body:
  text: 進本草綱目疏湖廣黃州府儒學增廣生員李建元謹奏為遵奉明例訪書進獻本草以備採擇事臣伏讀禮部儀制司勘合一款恭請聖明敕儒臣開書局纂修正史移文中外凡名家著述有關國家典章及紀君臣事迹他如天文樂律醫術方技諸書但成一家名言可以垂於方來者即訪求解送以備採入藝文志如已刻行者即刷印一部送部或其家自欲進獻者聽奉此臣故父李時珍原任楚府奉祠奉敕進封文林郎四川蓬溪知縣生平篤學刻意纂修曾著本草一部甫及刻成忽值數盡撰有遺表令臣代獻臣切思之父有遺命而子不遵何以承先志父有遺書而子不獻何以應朝命矧今修史之時又值取書之會臣不揣譾陋不避斧鉞謹述故父遺表臣父時珍幼多羸疾長成鈍椎耽嗜典籍若啖蔗飴考古證今奮發編摩苦志辨疑訂誤留心纂述諸書伏念本草一書關係頗重注解群氏謬誤亦多行年三十力肆校讎歷歲七旬功始成就野人炙背食芹尚欲獻之天子微臣採珠聚玉敢不上之明君昔炎黃辨百穀嘗百草而分別氣味之良毒軒轅師岐伯遵伯高而剖析經絡之本標遂有神農本草三卷藝文録為醫家一經及漢末而李當之始加校修至梁末而陶弘景益以注釋古藥三百六十五種以應重卦唐高宗命司空李績重修長史蘇恭表請伏定增藥一百一十四種宋太祖命醫官劉翰詳校宋仁宗再詔補注增藥一百種召醫唐慎微合為證類修補衆本草五百種自是人皆指為全書醫則目為奧典夷考其間玼瑕不少有當析而混者如葳蕤女葳二物而併入一條有當並而析者如南星虎掌一物而分為二種生薑薯蕷菜也而列草品檳榔龍眼果也而列木部八谷生民之天也不能明辨其種類三菘日用之蔬也罔克的別其名稱黑豆赤菽大小同條硝石芒硝水火混注以蘭花為蘭草卷丹為百合此寇氏衍義之舛謬謂黃精即鉤吻旋花即山薑乃陶氏別録之差訛酸漿苦耽草菜重出掌氏之不審天花栝蔞兩處圖形蘇氏之欠明五倍子構蟲窠也而認為木實大蘋草田字草也而指為浮萍似茲之類不可枚陳略摘一二以見錯誤若不類分品列何以印定群疑臣不揣猥愚僭肆刪述重復者芟之遺缺者補之如磨刀水潦水桑柴火艾火鎖陽山奈土茯苓番木鱉金柑樟腦蠍虎狗蠅白蠟水蛇狗寶秋蟲之類並今方所用而古本則無三七地羅九仙子蜘蛛香豬腰子勾金皮之類皆方物土苴而稗官不載今增新藥凡三百七十四種類析舊本分為一十六部雖非集成實亦粗備有數名或散見各部總標正名為綱余各附釋為目正始也次以集解辨疑正誤詳其出産形狀也次以氣味主治附方著其體用也上自墳典下至傳奇凡有相關靡不收採雖命醫書實該物理我太祖高皇帝首設醫院重設醫學沛仁心仁術於九有之中世宗肅皇帝既刻醫方選要又刻衛生易簡藹仁政仁聲於率土之遠伏願皇帝陛下體道守成遵祖繼志當離明之正位司考文之大權留情民瘼再修司命之書特詔良臣著成昭代之典治身以治天下書當與日月爭光壽國以壽萬民臣不與草木同朽臣不勝冀望屏營之至臣建元為此一得之愚上干九重之覽或準行禮部轉發史館採擇或行醫院重修父子銜恩存歿均戴臣無任瞻天仰聖之至萬曆二十四年十一月日進呈十八日奉聖旨書留覽禮部知道欽此本草綱目凡例一神農本草三卷三百六十種分上中下三品梁陶弘景增藥一倍隨品附入唐宋重修各有增附或並或退品目雖存舊額淆混義意俱失今通列一十六部為綱六十類為目各以類從三品書名俱注各藥之下一覽可知免尋索也一舊本玉石水土混同諸蟲鱗介不別或蟲入木部或木入草部今各列為部首以水火次之以土水火為萬物之先土為萬物母也次之以金石從土也次之以草谷菜果木從微至巨也次之以服器從草木也次之以蟲鱗介禽獸終之以人從賤至貴也一藥有數名今古不同但標正名為綱余皆附於釋名之下正始也仍注各本草名目紀原也一唐宋增入藥品或一物再出三出或二物三物混注今俱考正分別歸併但標其綱而附列其目如標龍為綱而齒角骨腦胎涎皆列為目標粱為綱而赤黃粱米皆列為目之類一諸品首以釋名正名也次以集解解其出産形狀採取也次以辨疑正誤辨其可疑正其謬誤也次以修治謹炮炙也次以氣味明性也次以主治録功也次以發明疏義也次以附方著用也或欲去方是有體無用矣舊本附方二千九百三十五今增八千一百六十一一唐宋以朱墨圈蓋分別古今經久訛謬今既板刻但直書諸家本草名目於藥名主治之下便覽也一諸家本草重復者刪去疑誤者辨正採其精粹各以人名書於諸款之下不沒其實且是非有歸也一諸物有相類而無功用宜參考者或有功用而人卒未識者俱附録之無可附者附於各部之末蓋有隱於古而顯於今者如莎根即香附子陶氏不識而今則盛行闢虺雷昔人罕言而今充方物之類雖冷僻不可遺也一唐宋本所無金元我明諸醫所用者增入三十九種時珍續補三百七十四種雖曰醫家藥品其考釋性理實吾儒格物之學可裨爾雅詩疏之缺一舊本序例重繁今止取神農為正而旁採別録諸家附於下益以張李諸家用藥之例一古本百病主治藥略而不切王氏集要祝氏證治亦約而不純今分病原列之以便施用雖繁不紊也一神農舊目及宋本總目附於例後存古也
