front:
  text: 本草綱目原序紀稱望龍光知古劍覘寶氣辨明珠故萍實商羊非天明莫洞厥後博物稱華辨字稱康析寶玉稱倚頓亦僅僅晨星耳楚蘄陽李君東璧一日過豫弇山園謁豫留飲數日豫窺其人晬然貌也癯然身也津津然談議也真北斗以南一人解其裝無長物有本草綱目數十卷謂豫曰時珍荊楚鄙人也幼多羸疾質成鈍椎長耽典籍若啖蔗飴遂漁獵群書搜羅百氏凡子史經傳聲韻農圃醫卜星相樂府諸家稍有得處輒著數言古有本草一書自炎黃及漢梁唐宋下逮國朝注解群氏舊矣第其中舛謬差訛遺漏不可枚數乃敢奮編摩之志僭纂述之權歲歷三十稔書考八百餘家稿凡三易復者芟之闕者緝之訛者繩之舊本一千五百一十八種今增藥三百七十四種分為一十六部著成五十二卷雖非集成亦粗大備僭名曰本草綱目願乞一言以托不朽豫開卷細玩每藥標正名為綱附釋名為目正始也次以集解辨疑正誤詳其土産形狀也次以氣味主治附方著其體用也上自墳典下及傳奇凡有相關靡不備採如入金谷之園種色奪目如登龍君之宮寶藏悉陳如對冰壺玉鑑毛髮可指數也博而不繁詳而有要綜核究竟直窺淵海茲豈僅以醫書覯哉實性理之精微格物之通典帝王之祕籙臣民之重寶也李君用心嘉惠何勤哉噫碔玉莫剖朱紫相傾弊也久矣故辨專車之骨必俟魯儒博支機之石必訪賣卜豫方著弇州卮言恚博古如丹鉛卮言後乏人也何幸睹茲集哉茲集也藏之深山石室無當盍鍥之以共天下後世味太玄如子云者時萬曆歲庚寅春上元日弇州山人鳳洲王世貞拜撰
