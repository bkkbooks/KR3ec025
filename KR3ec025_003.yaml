痰氣疝痛同海石末薑汁服商陸天南星貝母芫花防葵巴豆乾漆五加皮鼠李山楂核同枳實末服青橘皮並主疝瘕積氣胡蘆巴小腸疝同茴香蕎麵丸服取下白膿去根蟲獸斑蝥小腸氣棗包煨食芫青地膽桑螵蛸雀糞五靈脂並主疝瘕蝟皮疝積燒灰酒服挾虛甘草緩火止痛蒼朮疝多濕熱有挾虛者先疏滌而後用參術佐以疏導虛損偏墜四製蒼朮丸赤箭當歸芎藭芍藥並主疝瘕搜肝止痛山茱萸巴戟遠志牡丹皮並主奔豚冷氣熟地黃臍下急痛豬脬疝氣墜痛入諸藥煮食陰㿉外治地膚子野蘇槐白皮並煎湯洗馬鞭草大黃和醋白堊土並塗敷蒺藜粉摩莧根塗陰下冷痛入腹殺人熱灰上症醋調塗釜月下土同上白頭翁搗塗一夜成瘡二十日愈木芙蓉同黃柏末以木鱉子磨醋和塗雄雞翅灰同蛇床子末敷石灰同梔子五倍子末醋和敷牡蠣粉水㿉同乾薑末敷鐵精粉蓬砂水研地龍糞馬齒莧並塗小兒陰腫茱萸冷氣內外腎釣痛同鹽研罨蜀椒陰冷漸入囊欲死作袋包
