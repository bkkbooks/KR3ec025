body:
  text: 主治第三卷百病主治藥諸風有中臟中腑中經中氣痰厥痛風破傷風麻痹吹鼻皂莢末細辛末半夏末梁上塵蔥莖插鼻耳熏鼻巴豆煙萆麻煙黃耆湯擦牙白梅肉南星末蜈蚣末蘇合丸白礬鹽龍腦南星吐痰藜蘆或煎或散皂莢末酒服食鹽煎湯人參蘆或煎或散瓜蒂赤小豆齏汁調服萊蔔子擂汁桐油掃入桔梗蘆為末湯服二錢牙皂萊蔔子為末煎服附子尖研末茶服牛蒡子末羌活酒服常山末水煎醋蜜和服膽礬末醋調灌牙皂晉礬末水服大蝦煮熟食蝦飲汁探吐苦茗茶探吐石緑醋糊為丸每化一丸砒霜研末湯服少許地松搗汁豨蘞搗汁離鬲草汁芭蕉油汁石胡荽汁三白草汁蘇方木煎酒調乳香末二錢服治男女中風口噤立吐惡物出橘紅一斤熬逆流水一碗服乃吐痰聖藥也貼喎南星末薑汁調貼萆麻仁搗貼炒石灰醋調貼烏頭末龜血調貼雞冠血蝸牛搗貼生鹿肉切貼鮎魚尾切貼皂莢末醋調貼伏龍肝鱉血調貼鱔魚血蛞蝓搗貼寒食麵醋貼桂末水調貼馬膏桂酒大麥面栝蔞汁調蟹膏貼衣魚摩之蜘蛛向火摩之牛角䚡炙尉水牛鼻火炙尉之大蒜膏貼合谷穴巴豆貼手掌心各經主治藁本手太陽羌活足太陽白芷手陽明葛根足陽明黃耆手少陽柴胡足少陽防風手太陰升麻足太陰細辛手少陰獨活足少陰芎藭手足厥陰發散麻黃發散賊風風寒風熱風濕身熱麻痹不仁熬膏服之治風病取汗荊芥散風熱祛表邪清頭目行瘀血主賊風頑痹喎斜同薄荷熬膏服治偏風研末童尿酒服治産後中風神效薄荷治賊風散風熱風寒利關節發毒汗為小兒風涎要藥葛根發散肌表風寒風熱止渴白芷解利陽明及肺經風寒風熱皮膚風痹瘙癢利九竅表汗不可缺之升麻發散陽明風邪蔥白散風寒風熱風濕身痛生薑散風寒風濕桂枝治一切風冷風濕骨節攣痛解肌開腠理抑肝氣扶脾土尉陰痹黃荊根治肢體諸風心風頭風解肌發汗鐵線草治男女諸風産後風發出黏汗水萍治熱毒風濕麻痹左癱右瘓三十六風蜜丸酒服取汗治風熱瘙癢煎水浴取汗風寒風濕草部羌活一切風寒風濕不問久新透關利節為太陽厥陰少陰要藥防風三十六般風去上焦風邪頭目滯氣經絡留濕一身骨節痛除風去濕仙藥藁本一百六十惡風頭面身體風濕手足嚲曳石菖蒲浸酒服治三十六風一十二痹主骨痿丸服治中風濕痹不能屈伸豨蘞治肝腎風氣麻痹癱緩諸病九蒸九曬丸服枲耳大風濕痹毒在骨髓為末水服或丸服百日病出如瘑如疥如駁起皮亦可釀酒牛蒡根風毒緩弱浸酒服老人中風口目瞤動風濕久痹筋攣骨痛一二十年風疾病茵陳蒿風濕攣縮釀酒服浴風痹白朮逐風濕舌本強消痰益胃蒼朮大風頑痹筋骨軟弱散風除濕解鬱汁釀酒治一切風濕筋骨痛車前子水蓼陸英飛廉忍冬坐拿草蒴藋伏牛花石南藤百靈藤酒青藤酒鉤吻並主風邪濕痹骨痛拘攣防己中風濕不語拘攣口目喎斜瀉血中濕熱茵芋年久風濕痹痛拘急軟弱艾葉灸諸風口噤浴風濕麻痹白附子諸風冷氣失音頭面遊風足弱無力風喎同殭蠶全蠍研末酒服附子烏頭天雄並主風濕痰氣麻痹拘攣不遂通經絡開氣道燥濕痰草烏頭惡風冷痰癱緩年久麻痹芫花毒風冷痰四肢拘攣羊躑躅賊風走皮中淫淫痛風濕痹痛不遂言蹇酒蒸為末牛乳酒服亦效萆麻子油酒煮日服治偏風不遂作膏通關拔風邪出外谷菜大豆炒焦投酒中飲主風痹癱緩口噤口喎破傷中風産後風痙頭風煮食治濕痹膝痛醋蒸臥治四肢攣縮豆豉浸酒治膝攣不遂骨痛大豆黃卷巨勝釀酒治風痹痛麻仁骨髓風毒痛不能動炒香浸酒飲麻勃一百二十種惡風黑色遍身苦痹攣麥麩醋蒸尉風濕痹痛薏苡久風濕痹筋急拘攣亦煮酒服茄子腰腳風血積冷筋攣痛煎汁熬膏入粟粉麝香硃砂丸服果木秦椒治風濕痹蜀椒大風肉枯生蟲遊走痹痛死肌寒熱腰腳不遂散寒除濕為丸吳茱萸煎酒治頑風痹癢同薑豉煎酒冷服取汗治賊風口喎不語柏葉釀酒松節酒秦皮風寒濕痹五加皮名追風使治一切風濕痿痹攣急宜釀酒皂莢通關節搜肝風瀉肝氣蔓荊實除賊風搜肝氣筋骨間寒濕痹頭旋腦鳴欒荊子大風諸風不遂蟲部蠶砂風緩頑痹不隨炒浸酒服亦蒸尉蠍半身不遂抽掣口目喎斜研入麝香酒服竹蝨半身不遂同麝香浸酒服出汗鱗介守宮中風癱緩同諸藥煎服鯪鯉甲中風癱緩寒熱風痹及風濕強直痛不可忍烏蛇酒白花蛇酒蚺蛇酒並主賊風頑痹痛癢大風瘡癬有蟲鱔魚逐十二風邪濕氣作臛取汗水龜釀酒主大風緩急拘攣煮食除風痹痛禽部雞屎白炒研豆淋酒服主風寒濕痹口噤不省人事五靈脂散血活血引經有功癱緩熱酒服二錢風冷痹痛同乳沒川烏丸服雁肪鵜鶘油主風痹透經絡引藥氣入內獸部羊脂賊風痿痛腫痛徹毒氣引藥入內熊脂風痹青羖羊角炒研酒服治風痰恍惚悶絶復蘇驢毛骨中一切風炒黃浸酒服取汗貍骨一切遊風羊脛骨酒虎脛骨酒並主諸風注痛金石雄黃除百節中大風搜肝氣金牙石一切腰腳不遂火煅酒淬飲河砂風濕頑痹冷風癱緩曬熱坐之冷即易取汗鼠壤土蒸尉中風冷痹偏枯死肌風熱濕熱草部甘草瀉火利九竅百脈黃芩黃連菊花秦艽並治風熱濕熱玄參大青苦參白蘚皮白頭翁白英青葙子敗醬桔梗並治風熱大黃蕩滌濕熱下一切風熱柴胡治濕痹拘攣平肝膽三焦包絡相火少陽寒熱必用之藥升麻去皮膚肌肉風熱白薇暴中風身熱腹滿忽忽不知人龍葵治風消熱令人少睡麥門冬清肺火止煩熱天門冬風濕偏痹及熱中風牡丹皮寒熱中風瘛瘲驚癇煩熱手足少陰厥陰四經伏火鉤藤肝風心熱大人頭眩小兒十二驚癇紫葳及莖葉熱風遊風風刺蒺藜諸風瘙癢大便結谷果胡麻久食不生風熱風病人宜食之緑豆浮風風疹白扁豆行風氣除濕熱茶茗中風昏憒多睡梨汁除風熱不語葉亦作煎木部槐實氣熱煩悶枝釀酒治大風痿痹白皮治中風皮膚不仁身直不得屈伸煎酒及水服膠一切風熱口噤筋攣四肢不收頑痹周身如蟲行側柏葉凡中風不省口噤手足嚲曳便取一握同蔥白搗酒煎服能退風和氣不成廢人花桑枝炒香煎飲治風氣拘攣身體風疹久服終身不患偏風葉煎酒治一切風蒸罨風痛出汗白楊皮毒風緩弱毒氣在皮膚中浸酒服皂莢子疏導五臟風熱丸服治腰腳風痛不能行梔子去熱毒風除煩悶黃柏皮腎經風熱地骨皮腎家風濕痹柳葉遠近一切風煎汁和竹瀝服荊瀝除風熱開經絡導痰涎日飲之竹瀝暴中風痹大熱煩悶失音不語子冒風痙破傷風噤養血清痰並宜同薑汁飲之竹葉痰熱中風不語煩熱天竹黃諸風熱痰涎失音不語蟲獸蟬花一切風熱瘙癢犀角大熱風毒毷氉煩悶中風失音羚羊角一切熱溫風注毒伏在骨間及毒風卒死子癇痙疾金石石膏風熱煩躁鐵華粉平肝除風熱鐵落勞鐵赤銅併除賊風反折燒赤浸酒飲痰氣草部天南星中風中氣痰厥不省人事同木香煎服諸風口噤同蘇葉生薑煎服半夏消痰除濕痰厥中風同甘草防風煎服前胡化痰熱下氣散風旋覆花風氣濕痹胸上痰結留飲中風壅滯蜜丸服香附子心肺虛氣客熱行肝氣升降諸氣煎湯浴風疹木香中氣不省人事研末服之行肝氣調諸氣藿香升降諸氣蘇葉散風寒行氣利肺蘇子治腰腳中濕風結氣治風順氣化痰利膈寬腸煮粥食治風寒濕痹四肢攣急不能踐地延胡索除風治氣活血通經絡蘭葉浴風痛俗名風藥大戟甘遂並治經絡痰飲留滯麻痹隱痛牽引走注威靈仙治諸風宣通五臟去冷滯痰水利腰膝牽牛子除風毒下一切壅滯果木杏仁頭面風氣往來煩熱散風降氣化痰逐日生吞治偏風不遂失音不語肺中風熱陳橘皮理氣除濕痰枳實枳殼大風在皮膚中如麻豆苦癢麻木破氣勝濕化痰枳茹漬酒服治中風身直及口僻目斜檳榔除一切風一切氣宣利臟腑烏藥治中風中氣氣順則風散氣降則痰下龍腦香入骨治骨痛散經絡壅滯蘇合香安息香通諸竅臟腑闢一切不正之氣蟲獸麝香入骨治風在骨髓中風不省香油灌二錢白殭蠶散風痰酒服七枚治口噤發汗並一切風疾風疹金石鉛霜墜中風痰濕礬石除風消痰血滯草部當歸芎藭並主一切風一切氣一切虛破惡血養新血蜜丸服治風痰行氣解鬱丹參除風邪留熱骨節痛四肢不遂破宿血生新血漬酒飲治風毒足軟名奔馬草芍藥治風除血痹瀉肝安脾肺風毒在骨髓痛同虎骨浸酒飲地黃逐血痹填骨髓茺蔚子治風解熱莖葉治血風痛地榆汁釀酒治風痹補腦虎杖煮酒治風在骨節間薑黃止暴風痛除風熱理血中之氣紅藍花治六十二種風及血氣痛子煎服治女子中風煩渴谷菜麻仁中風汗出下氣逐一切風利血脈韭汁肥白人中風失音果木桃仁血滯風痹大便結酒浸作丸治偏風蘇枋木男女中風口噤同乳香服乳香中風口噤燒煙燻口目喎斜活血止痛蟲獸蜜蠟暴風身冷如癱化貼並裹手足阿膠男女一切風病骨節痛不隨醍醐酒服治中風煩熱野駝脂一切風疾皮膚急痹酒服並摩之風虛草部天麻主肝氣不足風虛內作頭暈目旋麻痹不仁語言不遂為定風神藥黃耆風虛自汗遂五臟惡血瀉陰火去虛熱無汗則發有汗則止人參補元氣定魂魄止煩躁生津液消痰沙參去皮肌浮風宣五臟風氣養肝氣長松煮酒治一切風虛黃精補中除風濕葳蕤治中風暴熱不能動搖虛風濕毒風溫自汗灼熱一切虛乏牛膝寒濕痿痹拘攣膝痛強筋補肝臟風虛石龍芮骨碎補巴戟天狗脊萆薢菝葜土茯苓何首烏並主風虛風濕痹痛軟弱補肝腎利關節列當煮酒去風血補腰腎白芨胃中邪氣風痱不收補肺氣仙茅一切風氣腰腳風冷攣痹不能行九蒸九曬浸酒服淫羊藿一切冷風攣急不仁老人昏耄浸酒服治偏風蛇床子男女風虛濕痹毒風腰胯痠痛浴大風身癢補骨脂風虛冷痹骨髓傷敗一切風氣痛作丸服菟絲子補肝風虛利腰腳覆盆子勞損風虛補肝明目石斛腳膝軟弱久冷風痹酥浸蒸服至一鎰永不骨痛絡石木蓮葉扶芳藤並主風血暖腰腳一切冷氣浸酒飲菜果薯蕷去冷風頭面遊風強筋骨壯脾胃栗腎虛腰腳無力日食十顆栗楔治筋骨風痛松子諸風骨節風木部松葉風痛腳痹浸酒服出汗松節風虛久痹骨節痛能燥血中之濕杜仲海桐皮山茱萸枸杞子並主風虛腰腳痛冬青子浸酒去風虛神木治周痹偏毒風不語石南逐諸風腳弱南燭熬膏治一切風強筋益氣不雕木浸酒去風氣補虛放杖木為風痹腎弱要藥木天蓼釀酒治風勞虛冷有奇效石部磁石周痹風濕肢節中痛男女風虛同白石英浸水煮粥食白石英風虛冷痹諸陽不足燒淬酒飲孔公蘖風冷膝痹同石斛浸酒飲石腦石鐘乳陽起石代赭石禹餘糧石硫黃並主風冷濕痹雲母粉中風寒熱如在舟車海蠶諸風冷氣虛勞禽獸烏雞中風舌強煩熱麻痹酒煮食練鵲浸酒飲治風麋角風虛冷痹暖腰膝壯陽痙風即痓病屬太陽督脈二經其證發熱口噤如癇身體強直角弓反張甚則搐搦傷風有汗者為柔痓傷寒濕無汗者為剛痓金瘡折傷癰疽産後俱有破傷風濕發痙之症風寒風濕草部麻黃桂枝術並主風寒風濕痙羌活風寒風濕傷金瘡癇痙産後中風口噤不知人酒水煎服葛根金瘡中風寒發痙欲死煮汁服乾者為末荊芥散風濕風熱産後中風口噤四肢強直角弓反張或搐搦欲死為末豆淋酒服入童尿尤妙防風主金瘡中風濕內痙天南星打撲傷損金瘡破傷風及傷濕牙關緊急角弓反張同防風末熱酒小便調服名玉真散三服即蘇南星半夏等分為末薑汁竹瀝灌服一錢仍灸印堂口噤生研同薑汁