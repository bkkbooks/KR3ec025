body:
  text: 主治第四卷百病主治藥痛風屬風寒濕熱挾痰及血虛汙血風寒風濕草木麻黃風寒風濕風熱痹痛發汗羌活風濕相搏一身盡痛非此不除同松節煮酒日飲防風主周身骨節盡痛乃治風去濕仙藥蒼朮散風除濕燥痰解鬱發汗通治上中下濕氣濕氣身痛熬汁作膏點服桔梗寒熱風痹滯氣作痛在上者宜加之茜根治骨節痛燥濕行血紫葳除風熱血滯作痛蒼耳子風濕周痹四肢拘痛為末煎服牽牛子除氣分濕熱氣壅腰腳痛羊躑躅風濕痹痛走注同糯米黑豆酒水煎服取吐利風痰注痛同生南星搗餅蒸四五次收之臨時焙丸溫酒下三丸靜臥避風芫花風濕痰注作痛草烏頭風濕痰涎歷節走痛不止入豆腐中煮過曬研每服五分仍外敷痛處烏頭附子並燥濕痰為引經藥百靈藤酒石南藤酒青藤酒並主風濕骨痛頑痹薏苡仁久風濕痹筋急不可屈伸風濕身痛日晡甚者同麻黃杏仁甘草煎服豆豉松節去筋骨痛能燥血中之濕歷節風痛四肢如脫浸酒日服桂枝引諸藥橫行手臂同椒姜浸酒絮尉陰痹海桐皮腰膝注痛血脈頑痹同諸藥浸酒服五加皮風濕骨節攣痛浸酒服枸杞根及苗去皮膚骨節間風子補腎蟲獸蠶砂浸酒蠍梢肝風蚯蚓腳風宜用穿山甲風痹疼痛引經通竅守宮通經絡入血分歷節風痛同地龍草烏頭諸藥丸服白花蛇骨節風痛烏蛇同上水龜風濕拘攣筋骨疼痛同天花粉枸杞子雄黃麝香槐花煎服版亦入陰虛骨痛方五靈脂散血活血止諸痛引經有效虎骨筋骨毒風走注疼痛脛骨尤良白虎風痛膝腫同通草煮服取汗同沒藥末服風濕痛同附子末服頭骨浸酒飲風痰濕熱草部半夏天南星並治風痰濕痰熱痰凝滯歷節走注右臂濕痰作痛南星蒼朮煎服大戟甘遂並治濕氣化為痰飲流注胸膈經絡發為上下走注疼痛麻痹能泄臟腑經隧之濕大黃泄脾胃血分之濕熱酥炒煎服治腰腳風痛取下冷膿惡物即止威靈仙治風濕痰飲為痛風要藥上下皆宜腰膝積年冷病諸痛為末酒下或丸服以微利為效黃芩三焦濕熱風熱歷節腫痛秦艽除陽明風濕濕熱養血榮筋龍膽草木通煎服防己木鱉子並主濕熱腫痛在下加之薑黃治風痹臂痛能入手臂破血中之滯氣紅藍花活血滯止痛瘦人宜之菜果白芥子暴風毒腫痰飲流入四肢經絡作痛桃仁血滯風痹攣痛橘皮下滯氣化濕痰風痰麻木或手木或十指麻木皆是濕痰死血以一斤去白逆流水五碗煮爛去滓至一碗頓服取吐乃吐痰之聖藥也檳榔一切風氣能下行木石枳殼風癢麻痹散痰疏滯黃柏除下焦濕熱痛腫下身甚者加之茯苓滲濕熱竹瀝化熱痰蘇枋木活血止痛滑石滲濕熱禽獸羚羊角入肝平風舒筋止熱毒風歷節掣痛效羊脛骨除濕熱止腰腳筋骨痛浸酒服補虛草部當歸芎藭芍藥地黃丹參並養新血破宿血止痛牛膝補肝腎逐惡血治風寒濕痹膝痛不可屈伸能引諸藥下行痛在下者加之石斛腳膝冷痛痹弱酒浸酥蒸服滿一鎰永不骨痛天麻諸風濕痹不仁補肝虛利腰膝腰腳痛同半夏細辛袋盛蒸熱互尉汗出則愈萆薢狗脊寒濕膝痛腰背強補肝腎土茯苓治瘡毒筋骨痛去風濕利關節鎖陽潤燥養筋谷木罌粟殼收斂固氣能入腎治骨痛尤宜松脂歷節風痠痛煉淨和酥煎服乳香補腎活血定諸經之痛沒藥逐經絡滯血定痛歷節諸風痛不止同虎脛骨末酒服外治白花菜敷風濕痛芥子走注風毒痛同醋塗萆麻油入膏拔風邪出外鵜鶘油入膏引藥氣入內羊脂入膏引藥氣入內拔邪出外野駝脂摩風痛牛皮膠同薑汁化貼骨節痛驢骨浴歷節風蠶砂蒸尉頭痛有外感氣虛血虛風熱濕熱寒濕痰厥腎厥真痛偏痛右屬風虛左屬痰熱引經太陽麻黃藁本羌活蔓荊陽明白芷葛根升麻石膏少陽柴胡芎藭太陰蒼朮半夏少陰細辛厥陰吳茱萸芎藭濕熱痰濕草部黃芩一味酒浸曬研茶服治風濕濕熱相火偏正諸般頭痛荊芥散風熱清頭目作枕去頭項風同石膏末服去風熱頭痛薄荷除風熱清頭目蜜丸服菊花頭目風熱腫痛同石膏芎藭末服蔓荊實頭痛腦鳴目淚太陽頭痛為末浸酒服水蘇風熱痛同皂莢芫花丸服半夏痰厥頭痛非此不除同蒼朮用栝蔞熱病頭痛洗瓤溫服香附子氣鬱頭痛同川芎末常服偏頭風同烏頭甘草丸服大黃熱厥頭痛酒炒三次為末茶服鉤藤平肝風心熱茺蔚子血逆大熱頭痛木通青黛大青白蘚皮茵陳白蒿澤蘭沙參丹參知母吳藍景天並主天行頭痛前胡旋覆花菜果竹筍並主痰熱頭痛東風菜鹿藿苦茗並治風熱頭痛清上止痛同蔥白煎服用巴豆煙燻過服止氣虛頭痛楊梅頭痛為末茶服橘皮木石枳殼並主痰氣頭痛櫸皮時行頭痛熱結在腸枸杞寒熱頭痛竹茹飲酒人頭痛煎服竹葉竹瀝荊瀝並痰熱頭痛黃柏梔子茯苓白堊土並濕熱頭痛合王瓜為末服止疼石膏陽明頭痛如裂壯熱如火並風熱同竹葉煎風寒同蔥茶煎風痰同川芎甘草煎鐵粉頭痛鼻塞同龍腦水服光明鹽獸人犀角傷寒頭痛寒熱諸毒氣痛童尿寒熱頭痛至極者一盞入蔥豉煎服陶隱居盛稱之風寒濕厥草谷菜果芎藭風入腦戶頭痛行氣開鬱必用之藥風熱及氣虛為末茶服偏頭風浸酒服卒厥同烏藥末服防風頭面風去來偏正頭風同白芷蜜丸服天南星風痰頭痛同荊芥丸服痰氣同茴香丸服婦人頭風為末酒服烏頭附子浸酒服煮豆食治頭風同白芷末服治風毒痛同川芎或同高良薑服治風寒痛同蔥汁丸或同鍾乳全蠍丸治氣虛痛同全蠍韭根丸腎厥痛同釜墨止痰厥痛天雄頭面風去來痛草烏頭偏正頭風同蒼朮蔥汁丸服白附子偏正頭風同牙皂末服痰厥痛同半夏南星丸服地膚子雷頭風腫同生姜擂酒服取汗杜衡風寒頭痛初起末服發汗蒴藋煎酒取汁萆麻子同川芎燒服取汗萆薢同虎骨旋覆花末服取汗南藤釀酒服並治頭風通草燒研酒服治洗頭風菖蒲頭風淚下杜若風入腦戶痛腫涕淚胡蘆巴氣攻痛同三稜乾薑末酒服牛膝腦中痛當歸煮酒地黃芍藥並血虛痛葳蕤天麻人參黃耆並氣虛痛蒼耳大豆黃卷並頭風痹胡麻頭面遊風百合頭風目眩胡荽蔥白生薑並風寒頭痛杏仁時行頭痛解肌風虛痛欲破研汁入粥食得大汗即解茱萸厥陰頭痛嘔涎同薑棗人參煎服蜀椒枳椇木石蟲獸柏實並主頭風桂枝傷風頭痛自汗烏藥氣厥頭痛及産後頭痛同川芎末茶服皂莢時氣頭痛燒研同薑蜜水服取汗山茱萸腦骨痛辛夷伏牛花空青曾青並風眩頭痛石硫黃腎厥頭痛頭風同硝石丸服同胡粉丸服同食鹽丸服同烏藥丸服蜂子全蠍白殭蠶蔥湯服或入高良薑或以蒜製為末服治痰厥腎厥痛白花蛇腦風頭痛及偏頭風同南星荊芥諸藥末服魚鰾八般頭風燒存性末蔥酒熱飲醉醒則愈羊肉頭腦大風汗出虛勞羊屎雷頭風研酒服吐痰見風及痰飲外治穀精草為末㗜鼻調糊貼腦燒煙燻鼻延胡索同牙皂青黛為丸瓜蒂藜蘆細辛蒼耳子大黃遠志蓽茇高良薑牽牛同砂仁楊梅末蕓薹子皂莢白棘針同丁香麝香雄黃同細辛玄精石硝石人中白同地龍末羊膽為丸旱蓮汁蘿蔔汁大蒜汁苦瓠汁並㗜鼻艾葉揉丸嗅之取出黃水萆麻仁同棗肉紙卷插入鼻內半夏煙木槿子煙龍腦煙並熏鼻燈火淬之蕎麥麵作大餅更互合頭出汗或作小餅貼四眼角灸之黃蠟和鹽作兜鍪合之即止麝香同皂莢末安頂上炒鹽尉之茱萸葉蒸熱枕之治大寒犯腦痛亦浴頭桐木皮冬青葉石南葉牡荊根槵子皮莽草葶藶豉汁驢頭汁並治頭風全蠍同地龍土狗五倍子末柚葉同蔥白山豆根南星同川烏烏頭草烏頭同梔子蔥汁乳香同萆麻仁決明子並貼太陽穴露水八月朔旦取磨墨點太陽止頭疼桂木陰雨即發痛酒調塗頂額井底泥同硝黃敷朴硝熱痛塗頂上訶子同芒硝醋摩之牛蒡根同酒煎膏摩之緑豆作枕去頭風決明菊花皆良麥面頭皮虛腫薄如裹水口嚼敷之良梔子蜜和敷舌上追涎去風甚妙眩暈眩是目黑暈是頭旋皆是氣虛挾痰挾火挾風或挾血虛或兼外感四氣風虛草菜天麻目黑頭旋風虛內作非此不能除為治風神藥名定風草首風旋運消痰定風同川芎蜜丸服術頭忽眩暈瘦削食土同曲丸服荊芥頭旋目眩産後血暈欲死童尿調服白芷頭風血風眩暈蜜丸服蒼耳子諸風頭暈蜜丸服女人血風頭旋悶絶不省為末酒服能通頂門菊苗男女頭風眩暈發落有痰發則昏倒四月收陰乾為末每酒服二錢秋月收花浸酒或釀酒服蒴藋根頭風旋暈同獨活石膏煎酒服産後血暈煎服貝母洗洗惡風寒目眩項直杜若風入腦戶眩倒目䀮䀮鉤藤平肝風心火頭旋目眩排風子目赤頭旋同甘草菊花末當歸失血眩暈芎藭煎服芎藭首風旋暈紅藥子産後血暈附子烏頭薄荷細辛木香紫蘇水蘇白蒿飛廉卷柏蘼蕪羌活藁本地黃人參黃耆升麻柴胡山藥並治風虛眩暈生薑木蟲鱗獸松花頭旋腦腫浸酒飲槐實風眩欲倒吐涎如醉漾漾如舟車上辛夷眩冒身兀兀如在車船上蔓荊實腦鳴昏悶伏牛花丁香茯神茯苓山茱萸地骨皮全蠍白花蛇烏蛇並頭風眩暈鹿茸眩暈或見一為二半兩煎酒入麝服驢頭中風頭眩身顫心肺浮熱同豉煮食兔頭骨及肝羚羊角羊頭蹄及頭骨羊肉牛胃豬腦豬血熊腦並主風眩瘦弱痰熱草菜天南星風痰眩暈吐逆同半夏天麻白麵煮丸半夏痰厥昏暈同甘草防風煎服風痰眩暈研末水沉粉入硃砂丸服金花丸同南星寒水石天麻雄黃白麵煮丸服白附子風痰同石膏硃砂龍腦丸服大黃濕熱眩暈炒末茶服旋覆花天花粉前胡桔梗黃芩黃連澤瀉白芥子熱痰煩運同黑芥子大戟甘遂芒硝硃砂丸服果木橘皮荊瀝竹瀝頭風旋暈目眩心頭漾漾欲吐枳殼黃柏梔子金石石膽女人頭暈天地轉動名曰心眩非血風也以胡餅劑和切小塊焙乾每服一塊竹茹湯下雲母中風寒熱如在舟船上同恆山服吐痰飲石膏風熱鉛汞結砂硫黃硝石併除上盛下虛痰涎眩暈硃砂雄黃蟲禽白殭蠶並風痰鶻嘲頭風目眩炙食一枚鷹頭頭目虛暈同川芎末服鴟頭頭風旋暈同䕡茹白朮丸服外治甘蕉油吐痰瓜蒂吐痰痰門吐法可用茶子頭中鳴響為末㗜鼻眼目有赤目傳變內障昏盲外障翳膜物傷眯目赤腫草部黃連消目赤腫瀉肝膽心火不可久服赤目痛癢出淚羞明浸雞子白點蒸人乳點同冬青煎點同乾薑杏仁煎點水調貼足心爛弦風赤同人乳槐花輕粉蒸尉風熱盲翳羊肝丸服胡黃連浸人乳點赤目小兒塗足心黃芩消腫赤瘀血芍藥目赤澀痛補肝明目桔梗赤目腫痛肝風盛黑睛痛同牽牛丸服白牽牛風熱赤目同蔥白煮丸龍膽赤腫瘀肉高起痛不可忍除肝膽邪熱去目中黃佐柴胡為眼疾必用之藥暑月目澀同黃連汁點漏膿同當歸末服葳蕤目痛眥爛淚出赤目澀痛同芍藥當歸黃連煎洗白芷赤目弩肉頭風侵目癢淚一切目疾同雄黃丸服薄荷去風熱爛弦以薑汁浸研泡湯洗荊芥頭目一切風熱疾為末酒服藍葉赤目熱痛同車前淡竹葉煎洗山茵陳赤腫同車前子末服王瓜子赤目痛澀同槐花芍藥丸服香附子肝虛睛痛羞明同夏枯草末沙糖水服頭風睛痛同川芎末茶服防己目睛暴痛酒洗三次末服夏枯草補養厥陰血脈故治目痛如神菖蒲諸般赤目搗汁熬膏點之同鹽敷挑針地黃血熱睡起目赤煮粥食暴赤痛小兒蓐內目赤並貼之地膚子風熱赤目同地黃作餅曬研服苦參細辛並明目益肝膽止風眼下淚黃耆連翹又洗爛弦大黃並主熱毒赤目赤芍藥白芨防風羌活白蘚皮柴胡澤蘭麻黃並主風熱赤目腫痛野狐絲草汁積雪草汁瞿麥汁車前草汁並點赤目葉亦貼之千里及汁點爛弦風眼覆盆草汁滴風爛眼去蟲五味子同蔓荊子