body:
  text: 水部第五卷李時珍曰水者坎之象也其文橫則為縱則為其體純陰其用純陽上則為雨露霜雪下則為海河泉井流止寒溫氣之所鍾既異甘淡鹹苦味之所入不同是以昔人分別九州水土以辨人之美惡壽夭蓋水為萬化之源土為萬物之母飲資於水食資於土飲食者人之命脈也而營衛賴之故曰水去則營竭谷去則衛亡然則水之性味尤慎疾衛生者之所當潛心也今集水之關於藥食者凡四十三種分為二類曰天曰地舊本水類共三十二種散見玉石部名醫別錄二種梁陶弘景注本草拾遺二十六種唐陳藏器嘉祐本草四種宋掌禹錫本草綱目一十一種明李時珍附註魏李當之藥錄吳普本草宋雷斅炮炙齊徐之才藥對唐蘇恭本草孫思邈千金唐李珣海藥甄權藥性楊損之刪繁唐孟詵食療陳士良食性蜀韓保升重注宋馬志開寶蘇頌圖經唐慎微證類寇宗奭衍義大明日華金張元素珍珠囊元李杲法象王好古湯液朱震亨補遺明汪穎食物汪機會編王綸集要水之一天水類一十三種雨水拾遺釋名時珍曰地氣升為云天氣降為雨故人之汗以天地之雨名之氣味咸平無毒立春雨水主治夫妻各飲一杯還房當獲時有子神效藏器宜煎發散及補中益氣藥時珍發明時珍曰虞摶醫學正傳云立春節雨水其性始是春升生髮之氣故可以煮中氣不足清氣不升之藥古方婦人無子是日夫婦各飲一杯還房有孕亦取其資始發育萬物之義也梅雨水主治洗瘡疥滅瘢痕入醬易熟藏器發明藏器曰江淮以南地氣卑濕五月上旬連下旬尤甚月令土潤溽暑是五月中氣過此節以後皆須曝書畫梅雨沾衣便腐黑浣垢如灰汁有異他水但以梅葉湯洗之乃脫余並不脫時珍曰梅雨或作黴雨言其沾衣及物皆生黑黴也芒種後逢壬為入梅小暑後逢壬為出梅又以三月為迎梅雨五月為送梅雨此皆濕熱之氣郁遏熏蒸釀為霏雨人受其氣則生病物受其氣則生黴故此水不可造酒醋其土潤溽暑乃六月中氣陳氏之說誤矣液雨水主治殺百蟲宜煎殺蟲消積之藥時珍發明時珍曰立冬後十日為入液至小雪為出液得雨謂之液雨亦曰藥雨百蟲飲此皆伏蟄至來春雷鳴起蟄乃出也潦水綱目釋名時珍曰降注雨水謂之潦又淫雨為潦韓退之詩云潢潦無根源朝灌夕已除是矣氣味甘平無毒主治煎調脾胃去濕熱之藥時珍發明成無己曰仲景治傷寒瘀熱在裡身發黃麻黃連軺赤小豆湯煎用潦水者取其味薄則不助濕氣露水拾遺釋名時珍曰露者陰氣之液也夜氣著物而潤澤於道旁也氣味甘平無毒主治秋露繁時以盤收取煎如飴令人延年不飢藏器稟肅殺之氣宜煎潤肺殺祟之藥及調疥癬蟲癩諸散虞摶百草頭上秋露未晞時收取愈百疾止消渴令人身輕不飢肥肉悅澤別有化雲母作粉服法藏器八月朔日收取摩墨點太陽穴止頭痛點膏肓穴治勞瘵謂之天灸時珍百花上露令人好顏色藏器柏葉上露菖蒲上露並能明目旦旦洗之時珍韭葉上露去白癜風旦旦塗之時珍凌霄花上露入目損目時珍發明藏器曰薛用弱續齊諧記云司農鄧紹八月朝入華山見一童子以五采囊盛取柏葉下露珠滿囊紹問之答云赤松先生取以明目也今人八月朝作露華囊象此也又郭憲洞冥記云漢武帝時有吉云國出吉云草食之不死日照之露皆五色東方朔得玄青黃三露各盛五合以獻於帝賜群臣服之病皆愈朔曰日初出處露皆如飴今人煎露如飴久服不飢呂氏春秋云水之美者有三危之露為水即重於水也時珍曰秋露造酒最清冽姑射神人吸風飲露漢武帝作金盤承露和玉屑服食楊貴妃每晨吸花上露以止渴解酲番國有薔薇露甚芬香云是花上露水未知是否藏器曰凡秋露春雨著草人素有瘡及破傷者觸犯之瘡頓不癢痛乃中風及毒水身必反張似角弓之狀急以鹽豉和麵作碗子於瘡上灸一百壯出惡水數升乃知痛癢而瘥也甘露拾遺釋名膏露綱目瑞露綱目天酒綱目神漿時珍曰按瑞應圖云甘露美露也神靈之精仁瑞之澤其凝如脂其甘如飴故有甘膏酒漿之名晉中興書云王者敬養耆老則降於松柏尊賢容眾則降於竹葦列星圖云天乳一星明潤則甘露降以上諸說皆瑞氣所感者也呂氏春秋云水之美者三危之露和之美者揭雩之露其色紫拾遺記云崑崙之山有甘露望之如丹著草木則皎瑩如雪山海經云諸沃之野搖山之民甘露是飲不壽者八百歲一統志云雅州蒙山常有甘露以上諸說皆方域常產者也杜鎬言甘露非瑞也乃草木將枯精華頓發於外謂之雀餳於理甚通氣味甘大寒無毒主治食之潤五臟長年不飢神仙藏器甘露蜜拾遺集解藏器曰生巴西絕域中狀如餳也時珍曰按方國志云大食國秋時收露朝陽曝之即成糖霜蓋此物也又一統志云撒馬兒罕地在西番有小草叢生葉細如藍秋露凝其上味如蜜可熬為餳夷人呼為達即古賓蓋甘露也此與刺蜜相近又見果部氣味甘平無毒主治胸膈諸熱明目止渴藏器明水拾遺釋名方諸水藏器曰方諸大蚌也熟摩令熱向月取之得水二三合亦如朝露陽燧向日方諸向月皆能致水火也周禮明諸承水於月陳饌為玄酒是也時珍曰明水者取其清明純潔敬之至也周禮司烜氏以夫燧取明火於日鑑取明水於月以恭祭祀魏伯陽參同契云陽燧以取火非日不生光方諸非星月安能得水漿淮南子云方諸見月則津而為水注者或以方諸為石或以為大蚌或以為五石煉成皆非也按考工記云銅錫相半謂之鑑燧之劑是火為燧水為鑑也高堂隆云陽燧一名陽符取火於日陰燧一名陰符取水於月並以銅作之謂之水火之鏡此說是矣干寶搜神記云金錫之性一也五月丙午日午時鑄為陽燧十一月壬子日子時鑄為陰燧氣味甘寒無毒主治明目定心去小兒煩熱止渴藏器冬霜拾遺釋名時珍曰陰盛則露凝為霜霜能殺物而露能滋物性隨時異也乾象占云天氣下降而為露清風薄之而成霜霜所以殺萬物消祲沴當降而不降當殺物而不殺物皆政弛而慢也不當降而降不當殺物而殺物皆政急而殘也許慎說文云早霜曰𩅀白霜曰皚又有玄霜承曰凡取霜以雞羽掃之瓶中密封陰處久亦不壞氣味甘寒無毒主治食之解酒熱傷寒鼻塞酒後諸熱面赤者藏器和蚌粉敷暑月痱瘡及腋下赤腫立瘥陳承附方新一寒熱瘧疾秋後霜一錢半熱酒服之集玄方臘雪宋嘉祐釋名時珍曰按劉熙釋名云雪洗也洗除瘴癘蟲蝗也凡花五出雪花六出陰之成數也冬至後第三戊為臘臘前三雪大宜菜麥又殺蟲蝗臘雪密封陰處數十年亦不壞用水浸五穀種則耐旱不生蟲灑几席間則蠅自去淹藏一切果食不蛀蠹豈非除蟲蝗之驗乎藏器曰春雪有蟲水亦易敗所以不收氣味甘冷無毒主治解一切毒治天行時氣溫疫小兒熱癇狂啼大人丹石發動酒後暴熱黃疸仍小溫服之藏器洗目退赤張從正煎茶煮粥解熱止渴吳瑞宜煎傷寒火暍之藥抹痱亦良時珍發明宗奭曰臘雪水大寒之水也故治以上諸病雹音駁拾遺釋名時珍曰程子云雹者陰陽相搏之氣蓋沴氣也或云雹者炮也中物如炮也曾子云陽之專氣為雹陰之專氣為霰陸農師云陰包陽為雹陽包陰為霰雪六出而成花雹三出而成實陰陽之辨也五雷經云雹乃陰陽不順之氣結成亦有懶龍鱗甲之內寒凍生冰為雷所發飛走墮落大者如斗升小者如彈丸又蜥蜴含水亦能作雹未審果否氣味咸冷有毒時珍曰按五雷經云人食雹患疫疾大風顛邪之證藏器曰醬味不正者當時取一二升納入甕中即還本味也夏冰拾遺釋名凌去聲時珍曰冰者太陰之精水極似土變柔為剛所謂物極反兼化也故字從水從仌周禮凌人掌冰以供祭祀賓客左傳古者日在北陸而藏冰西陸朝覿而出之其藏之也深山穹谷涸陰冱寒其用之也錄位賓客喪祭郎顗曰藏冰以時則雷出不震棄冰不用則雷不發而震今人冬月藏冰於窖登之以鹽是也淮南萬畢術有凝水石作冰法非真也氣味甘冷無毒主治去熱煩熨人乳石發熱腫藏器解煩渴消暑毒吳瑞傷寒陽毒熱盛昏迷者以冰一塊置於膻中良亦解燒酒毒時珍發明藏器曰夏暑盛熱食冰應與氣候相反便非宜人誠恐入腹冷熱相激卻致諸疾也食譜云凡夏用水只可隱映飲食令氣涼爾不可食之雖當時暫快久皆成疾也時珍曰宋徽宗食冰太過病脾疾國醫不效召楊介診之介用大理中丸土曰服之屢矣介曰疾因食冰臣因以冰煎此藥是治受病之原也服之果愈若此可謂舌機之士矣附方新一滅瘢痕以凍凌頻熨之良千金方神水綱目集解時珍曰金門記云五月五日午時有雨急伐竹竿中必有神水瀝取為藥氣味甘寒無毒主治心腹積聚及蟲病和獺肝為丸服又飲之清熱化痰定驚安神時珍半天河別錄下品釋名上池水弘景曰此竹籬頭水及空樹穴中水也時珍曰戰國策云長桑君飲扁鵲以上池之水能洞見臟腑注云上池水半天河也然別有法氣味甘微寒無毒主治鬼疰狂邪氣惡毒別錄洗諸瘡弘景主蠱毒日華殺鬼精恍惚妄語與飲之勿令知之甄權槐樹間者主諸風及惡瘡風瘙疥癢藏器發明宗奭曰半天河水在上天澤之水也故治心病鬼疰狂邪惡毒附方舊一新一闢禳時疫半天河水飲之醫林集要身體白駁取樹木孔中水洗之搗桂末唾和敷之日再上張文仲備急方屋漏水拾遺氣味辛苦有毒李廷飛曰水滴脯肉食之成癥瘕生惡瘡又檐下雨滴菜亦有毒不可食之主治洗犬咬瘡更以水澆屋檐取滴下土敷之效藏器塗疣目敷丹毒時珍水之二地水類三十種流水拾遺集解時珍曰流水者大而江河小而溪澗皆流水也其外動而性靜其質柔而氣剛與湖澤陂塘之止水不同然江河之水濁而溪澗之水清復有不同焉觀濁水流水之魚與清水止水之魚性色迥別淬劍染帛各色不同煮粥烹茶味亦有異則其入藥豈可無辨乎千里水東流水甘瀾水一名勞水氣味甘平無毒主治病後虛弱揚之萬遍煮藥禁神最驗藏器主五勞七傷腎虛脾弱陽盛陰虛目不能瞑及霍亂吐利傷寒後欲作奔豚時珍逆流水主治中風卒厥頭風瘧疾咽喉諸病宣吐痰飲時珍發明藏器曰千里水東流水二水皆堪盪滌邪穢煎煮湯藥噤咒神鬼潢汙行潦尚可薦之王公況其靈長者哉本經云東流水為雲母石所畏煉雲母用之與諸水不同即其效也思邈曰江水流泉遠涉順勢歸海不逆上流用以治頭必歸於下故治五勞七傷羸弱之病煎藥宜以陳蘆勞水取其水不強火不盛也無江水則以千里東流水代之如涇渭之類時珍曰勞水即揚泛水張仲景謂之甘瀾水用流水二斗置大盆中以杓高揚之千遍有沸珠相逐乃取煎藥蓋水性本咸而體重勞之則甘而輕取其不助腎氣而益脾胃也虞摶醫學正傳云甘瀾水甘溫而性柔故烹傷寒陰證等藥用之順流水性順而下流故治下焦腰膝之證及通利大小便之藥用之急流水湍上峻急之水其性急速而下達故通二便風痹之藥用之逆流水洄瀾之水其性逆而倒上故發吐痰飲之藥用之也宗奭曰東流水取其性順疾速通膈下關也倒流水取其迴旋流止上而不下也張從正曰昔有患小便閟者眾工不能治令取長川急流之水煎前藥一飲立溲則水可不擇乎附方新三目不得瞑乃陽氣盛不得入於陰陰氣虛故目不得瞑治法飲以半夏湯用流水千里外者八升揚之萬遍取其清五升煮之炊葦薪火置秫米一升半夏五合徐炊令竭為一升半去滓飲汁一小杯日三飲以知為度詳半夏下靈樞經汗後奔豚茯苓桂枝甘草大棗湯治發汗後臍下悸欲作奔豚者茯苓一兩炙甘草二錢半桂枝三錢大棗二枚以甘瀾水二升先煮茯苓納諸藥煮服之日三張仲景金匱要略服藥過劑煩悶東流水飲一二升肘後方井泉水宋嘉祐釋名時珍曰井字象井形泉字象水流穴中之形集解穎曰井水新汲療病利人平旦第一汲為井華水其功極廣又與諸水不同凡井水有遠從地脈來者為上有從近處江湖滲來者次之其城市近溝渠汙水雜入者成鹼用須煎滾停一時候鹼澄乃用之否則氣味俱惡不堪入藥食茶酒也雨後水渾須擂入桃杏仁澄之時珍曰凡井以黑鉛為底能清水散結人飲之無疾入丹砂鎮之令人多壽按麻知幾水解云九疇昔訪靈臺太史見銅壺之漏水焉太史召司水者曰此水已三周環水滑則漏迅漏迅則刻差當易新水子因悟曰天下之水用之滅火則同濡槁則同至於性從地變質與物遷未嘗同也故蜀江濯錦則鮮濟源烹楮則皛南陽之潭漸於菊其人多壽遼東之澗通於參其人多發晉之山產礬石泉可愈疽戎之麓伏硫黃湯可浴癘揚子宜荈淮菜宜醪滄鹵能鹽阿井能膠澡垢以汙茂田以苦癭消於藻帶之波痰破於半夏之洳冰水咽而霍亂息流水飲而癃閟通雪水洗目而赤退鹹水濯肌而瘡干菜之為齏鐵之為漿曲之為酒蘖之為醋千派萬種言不可盡至於井之水一也尚數名焉況其他者乎反酌而傾曰倒流出甃未放曰無根無時初出曰新汲將旦首汲曰井華夫一井之水而功用不同豈可烹煮之間將行藥勢獨不擇夫水哉昔有患小溲閟者眾不能瘥張子和易之以長川之急流煎前藥一飲立溲此正與靈樞經治不瞑半夏湯用千里流水同意味後之用水者當以子和之法為制予於是作水解井華水氣味甘平無毒主治酒後熱痢洗目中膚翳治人大驚九竅四肢指歧皆出血以水噀面和硃砂服令人好顏色鎮心安神治口臭堪煉諸藥石投酒醋令不腐嘉祐宜煎補陰之藥虞摶宜煎一切痰火氣血藥時珍新汲水主治消渴反胃熱痢熱淋小便赤澀卻邪調中下熱氣並宜飲之射癰腫令散洗漆瘡治墜損腸出冷噴其身面則腸自入也又解閉口椒毒下魚骨哽嘉祐解馬刀毒之才解砒石烏喙燒酒煤炭毒治熱悶昏瞀煩渴時珍發明禹錫曰凡飲水療疾皆取新汲清泉不用停汙濁暖非直無效亦且損人虞摶曰新汲井華水取天一真氣浮於水面用以煎補陰之劑及煉丹煮茗性味同於雪水也時珍曰井泉地脈也人之經血象之須取其土厚水深源遠而質潔者食用可也易曰井泥不食井冽寒泉食是矣人乃地產資稟與山川之氣相為流通而美惡壽夭亦相關涉金石草木尚隨水土之性而況萬物之靈者乎貪淫有泉仙壽有井載在往牒必不我欺淮南子云土地各以類生人是故山氣多男澤氣多女水氣多瘖風氣多聾林氣多癃木氣多傴岸下氣多尰石氣多力險阻氣多癭暑氣多夭寒氣多壽穀氣多痹丘氣多狂廣氣多仁陵氣多貪堅土人剛弱土人脆壚土人大沙土人細息土人美耗土人醜輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重皆應其類也又河圖括地象云九州殊題水泉剛柔各異青州角徵會其氣慓輕人聲急其泉酸以苦梁州商徵接其氣剛勇人聲塞其泉苦以辛兗豫宮徵會其氣平靜人聲端其泉甘以苦雍冀商羽合其氣快烈人聲捷其泉咸以辛觀此二說則人賴水土以養生可不慎所擇乎時珍曰按後漢書云有婦人病經年世謂寒熱注病十一月華佗令坐石槽中平旦用冷水灌云當至百始灌七十冷顫欲死灌者懼欲止佗不許灌至八十熱氣乃蒸出囂囂然高二三尺滿百灌乃使燃火溫床厚覆而臥良久冷汗出以粉撲之而愈又南史云將軍房伯玉服五石散十許劑更患冷疾夏月常復衣徐嗣伯診之曰乃伏熱也須以水發之非冬月不可十一月冰雪大盛時令伯玉解衣坐石上取新汲冷水從頭澆之盡二十斛口噤氣絕家人啼哭請止嗣伯執撾諫者又盡水百斛伯玉始能動背上彭彭有氣俄而起坐云熱不可忍乞冷飲嗣伯以水一升飲之疾遂愈自爾常發熱冬月猶單衫體更肥壯時珍竊謂二人所病皆伏火之證素問所謂諸噤鼓慄皆屬於火也治法火鬱則發之而二子乃於冬月平旦澆以冷水者冬至後陽氣在內也平旦亦陽氣方盛時也折之以寒使熱氣鬱遏至極激發而汗解乃物不極不反是亦發之之意素問所謂逆者正治從者反治逆而從之從而逆之疏通道路令氣調和者也春月則陽氣已泄夏秋則陰氣在內故必於十一月至後乃可行之二子之醫可謂神矣附方舊八新二十一九竅出血方見主治下衄血不止葉氏用新汲水隨左右洗足即止累用有效一方用冷水噀面一方冷水浸紙貼囟上以熨斗熨之立止一方用冷水一瓶淋射頂上及啞門上或以濕紙貼之金瘡血出不止冷水浸之即止延壽方犬咬血出以水洗至血止綿裹之千金方蠍蠆螫傷以水浸故布拓之暖即易千金方馬汗入瘡或馬毛入瘡腫入腹殺人以冷水浸之頻易水仍飲好酒立瘥千金方魚骨哽咽取水一杯合口向水張口取水氣哽當自下肘後方中砒石毒多飲新汲井水得吐利佳集簡方中烏喙毒方同上中蒙汗毒飲冷水即安濟急方中煤炭毒一時暈倒不救殺人急以清水灌之唐瑤經驗方服藥過劑卒嘔不已飲新汲水一升肘後方燒酒醉死急以新汲水浸其發外以故帛浸濕貼其胸膈仍細細灌之至蘇乃已瀕湖集簡方飲酒齒痛井水頻含漱之直指方破傷風病用火命婦人取無根水一盞入百草霜調捏作餅放患處三五換如神此蔣亞香方也談野翁試驗方墜損腸出方見主治下眼睛突出一二寸者以新汲水灌漬睛中數易之自入梅師方時行火眼患人每日於井上視井旋匝三遍能泄火氣集玄方心悶汗出不識人新汲水和蜜飲之甚效千金方嘔吐陽厥卒死者飲新汲水三升佳千金方霍亂吐瀉勿食熱物飲冷水一碗仍以水一盆浸兩足立止急救良方厭禳瘟疫臘旦除夜以小豆川椒各七七粒投井中勿令人知能卻瘟疫又法元旦以大麻子三七粒投井中口氣臭惡正旦含井華水吐棄廁下數度即瘥也肘後方心腹冷痛男子病令女人取水一杯飲之女人病令男子取水一杯飲之肘後方寒熱注病方見發明下火病惡寒方見發明下疔毒疽瘡凡手指及諸處有瘡起發癢身熱惡寒或麻木此極毒之瘡也急用針刺破擠去惡血候血盡口噙涼水吮之水溫再換吮至痛癢皆住即愈此妙法也保壽堂方婦人將產井華水服半升不作運千金方初生不啼取冷水灌之外以蔥白莖細鞭之即啼全幼心鑑節氣水綱目集解時珍曰一年二十四節氣一節主半月水之氣味隨之變遷此乃天地之氣候相感又非疆域之限也月令通纂云正月初一至十二日止一日主一月每旦以瓦瓶秤水視其輕重重則雨多輕則雨少觀此雖一日之內尚且不同況一月乎立春清明二節貯水謂之神水主治宜浸造諸風脾胃虛損諸丹丸散及藥酒久留不壞寒露冬至小寒大寒四節及臘日水主治宜浸造滋補五臟及痰火積聚蟲毒諸丹丸並煮釀藥酒與雪水同功立秋日五更井華水主治長幼各飲一杯能卻瘧痢百病重午日午時水主治宜造瘧痢瘡瘍金瘡百蟲蠱毒諸丹丸小滿芒種白露三節內水主治並有毒造藥釀酒醋一應食物皆易敗壞人飲之亦生脾胃疾並時珍醴泉拾遺釋名甘泉時珍曰醴薄酒也泉味如之故名出無常處王者德至淵泉時代昇平則醴泉出可以養老瑞應圖云醴泉水之精也味甘如醴流之所及草木皆茂飲之令人多壽東觀記云光武中元元年醴泉出京師人飲之者痼疾皆除氣味甘平無毒主治心腹痛疰忤鬼氣邪穢之屬並就泉空腹飲之又止熱消渴及反胃霍亂為上亦以新汲者為佳藏器玉井水拾遺集解藏器曰諸有玉處山谷水泉皆是也山有玉而草木潤身有玉而毛髮黑玉既重寶水又靈長故有延生之望今人近山多壽者豈非玉石津液之功乎太華山有玉水溜下土人得服之多長生氣味甘平無毒主治久服神仙令人體潤毛髮不白藏器乳穴水拾遺集解藏器曰近乳穴處流出之泉也人多取水作飲釀酒大有益其水濃者秤之重於他水煎之上有鹽花此真乳液也氣味甘溫無毒主治久服肥健人能食體潤不老與鍾乳同功藏器溫湯拾遺釋名溫泉綱目沸泉藏器曰下有硫黃即令水熱猶有硫黃臭硫黃主諸瘡故水亦宜然當其熱處可燖豬羊熟雞子也時珍曰溫泉有處甚多按胡仔漁隱叢話云湯泉多作硫黃氣浴之則襲人肌膚唯新安黃山是硃砂泉春時水即微紅色可煮茗長安驪山是礜石泉不甚作氣也硃砂泉雖紅而不熱當是雄黃爾有砒石處亦有湯泉浴之有毒氣味辛熱微毒主治諸風筋骨攣縮及肌皮頑痹手足不遂無眉發疥癬諸疾在皮膚骨節者入浴浴訖當大虛憊可隨病與藥及飲食補養非有病人不宜輕入藏器發明穎曰廬山有溫泉方士往往教患疥癬風癩楊梅瘡者飽食入池久浴得汗出乃止旬日自愈也碧海水拾遺集解藏器曰東方朔十洲記云夜行海中撥之有火星者鹹水也色既碧故曰碧海時珍曰海乃百川之會天地四方皆海水相通而地在其中其味鹹其色黑水行之正也氣味咸小溫有小毒主治煮浴去風瘙疥癬飲一合吐下宿食臚脹藏器鹽膽水拾遺釋名滷水藏器曰此乃鹽初熟槽中瀝下黑汁也時珍曰鹽下瀝水則味苦不堪食今人用此水收豆腐獨孤滔云鹽膽煮四黃焊物氣味咸苦有大毒主治䘌蝕疥癬瘻疾蟲咬及馬牛為蟲蝕毒蟲入肉生子六畜飲一合當時死人亦然凡瘡有血者不可塗之藏器痰厥不省灌之取吐良時珍阿井水綱目氣味甘咸平無毒主治下膈疏痰止吐時珍發明時珍曰阿井在今兗州陽穀縣即古東阿縣也沈括筆談云古說濟水伏流地中今歷下凡發地下皆是流水東阿亦濟水所經取井水煮膠謂之阿膠其性趣下清而且重用攪濁水則清故以治淤濁及逆上之痰也又青州范公泉亦濟水所注其水用造白丸子利膈化痰管子云齊之水其泉青白其人堅勁寡有疥瘙終無痟酲水性之不同如此陸羽烹茶辨天下之水性美惡烹藥者反不知辨此豈不戾哉山岩泉水拾遺釋名時珍曰此山岩土石間所出泉流為溪澗者也爾雅云水正出曰濫泉懸出曰沃泉仄出曰氿泉其泉源遠清冷或山有玉石美草木者為良其山有黑土毒石惡草者不可用陸羽云凡瀑湧漱湍之水飲之令人有頸疾穎曰昔在潯陽忽一日城中馬死數百詢之云數日前雨洗出山谷中蛇蟲之毒馬飲其水然也氣味甘平無毒主治霍亂煩悶嘔吐腹空轉筋恐入腹宜多服之名曰洗腸勿令腹空空則更服人皆懼此然嘗試有效但身冷力弱者防致臟寒當以意消息之藏器古塚中水拾遺主治有毒殺人洗諸瘡皆瘥藏器糧罌中水拾遺集解藏器曰乃古塚中食罌中水也取清澄久遠者佳古文曰蔗留余節瓜表遺犀言二物不爛余皆成水也氣味辛平有小毒主治鬼氣中惡疰忤心腹痛惡夢鬼神殺蛔蟲進一合不可多飲令人心悶又云洗眼見鬼未試藏器附方新一噎疾古塚內罐罌中水但得飲之即愈極有神效壽域方赤龍浴水拾遺集解藏器曰此澤間小泉有赤蛇在中者人或遇之經雨取水服氣味有小毒主治瘕結氣諸瘕惡蟲入腹及咬人生瘡者藏器車轍中水綱目釋名時珍曰轍乃車行跡也主治癧瘍風五月五日取洗之甚良牛蹄中水亦可時珍地漿別錄下品釋名土漿弘景曰此掘黃土地作坎深三尺以新汲水沃入攪濁少頃取清用之故曰地漿亦曰土漿氣味甘寒無毒主治解中毒煩悶別錄解一切魚肉果菜藥物諸菌毒療霍亂及中暍卒死者飲一升妙時珍發明弘景曰楓上菌食之令人笑不休飲此即解時珍曰按羅天益衛生寶鑑云中暑霍亂乃暑熱內傷七神迷亂所致陰氣靜則神臟躁則消亡非至陰之氣不愈坤為地地屬陰土平曰靜順地漿作於牆陰坎中為陰中之陰能瀉陽中之陽也附方舊一新六熱渴煩悶地漿一盞飲之聖惠方乾霍亂病不吐不利脹痛欲死地漿三五盞服即愈大忌米湯千金方服藥過劑悶亂者地漿飲之肘後方閉口椒毒吐白沫身冷欲死者地漿飲之張仲景金匱方中野芋毒土漿飲之集簡方黃鱨魚毒食此魚犯荊芥能害人服地漿解之集簡方中砒霜毒地漿調鉛粉服之立解集玄方熱湯宋嘉祐釋名百沸湯綱目麻沸湯仲景太和湯氣味甘平無毒時珍曰按汪穎云熱湯須百沸者佳若半沸者飲之反傷元氣作脹或云熱湯漱口損齒病目人勿以熱湯洗浴凍僵人勿以熱湯灌之能脫指甲銅瓶煎湯服損人之聲主治助陽氣行經絡宗奭熨霍亂轉筋入腹及客忤死嘉祐發明宗奭曰熱湯能通經絡患風冷氣痹人以湯渫腳至膝上厚覆取汗周身然別有藥亦假湯氣而行爾四時暴泄痢四肢冷臍腹疼深湯中坐浸至腹上頻頻作之生陽佐藥無速於此虛寒人始坐湯中必顫仍常令人伺守之張從正曰凡傷寒傷風傷食傷酒初起無藥便飲太和湯碗許或酸齏汁亦可以手揉肚覺恍惚再飲再揉至無所容探吐汗出則已時珍曰張仲景治心下痞按之濡關上脈浮大黃黃連瀉心湯用麻沸湯煎之取其氣薄而泄虛熱也朱真人靈驗篇云有人患風疾數年掘坑令坐坑內解衣以熱湯淋之良久以簟蓋之汗出而愈此亦通經絡之法也時珍常推此意治寒濕加艾煎湯治風虛加五枝或五加煎湯淋洗覺效更速也附方舊四新九傷寒初起取熱湯飲之候吐則止陳藏器本草初感風寒頭痛憎寒者用水七碗燒鍋令赤投水於內取起再燒再投如此七次名沸湯乘熱飲一碗以衣被覆頭取汗神效傷寒蘊要忤惡卒死銅器或瓦器盛熱湯隔衣熨其腹上冷即易立愈陳藏器本草霍亂轉筋以器盛湯熨之仍令蹋器使足底熱徹冷則易嘉祐本草暑月暍死以熱湯徐徐灌之小舉其頭令湯入腹即蘇千金方火眼赤爛緊閉目以熱湯沃之湯冷即止頻沃取安妙在閉目或加薄荷防風荊芥煎湯沃之亦妙趙原陽濟急方金瘡血出不止以故布蘸熱湯盦之延壽書代指腫痛麻沸湯漬之即安千金方癰腫初起以熱湯頻沃之即散也集簡方凍瘡不瘥熱湯洗之陳藏器馬汗入瘡腫痛欲死沸湯溫洗即瘥千金方蠍蠆螫傷溫湯漬之數易至旦愈華佗治彭城夫人方蛇繞不解熱湯淋之即脫千金方生熟湯拾遺釋名陰陽水時珍曰以新汲水百沸湯合一盞和勻故曰生熟今人謂之陰陽水氣味甘咸無毒主治調中消食凡痰瘧及宿食毒惡之物臚脹欲作霍亂者即以鹽投中進一二升令吐盡痰食便愈藏器凡霍亂及嘔吐不能納食及藥危甚者先飲數口即定時珍發明時珍曰上焦主納中焦腐化下焦主出三焦通利陰陽調和升降周流則臟腑暢達一失其道二氣淆亂濁陰不降清陽不升故發為霍亂嘔吐之病飲此湯輒定者分其陰陽使得其平也藏器曰凡人大醉及食瓜果過度者以生熟湯浸身則湯皆為酒及瓜味博物志云浸至腰食瓜可五十枚至頸則無限也未試齏水綱目集解時珍曰此乃作黃齏菜水也氣味酸咸無毒主治吐諸痰飲宿食酸苦湧泄為陰也時珍漿水宋嘉祐釋名酸漿嘉謨曰漿酢也炊粟米熱投冷水中浸五六日味酢生白花色類漿故名若浸至敗者害人氣味甘酸微溫無毒宗奭曰不可同李食令人霍亂吐利妊婦勿食令兒骨瘦水漿尤不可飲令絕產醉後飲之失音主治調中引氣宣和強力通關開胃止渴霍亂泄利消宿食宜作粥薄暮啜之解煩去睡調理腑臟煎令酸止嘔噦白人膚體如繒帛嘉祐利小便時珍發明震亨曰漿水性涼善走故解煩渴而化滯物附方舊五新一霍亂吐下酸漿水煎乾姜屑呷之兵部手集過食脯臘筋痛悶絕漿水煮粥入少鷹屎和食孫真人方滑胎易產酸漿水和水少許頓服產寶手指腫痛漿水入少鹽熱漬之冷即易之孫真人方面上黑子每夜以暖漿水洗面以布揩赤用白檀香磨汁塗之外臺秘要骨哽在咽磁石火煅醋淬陳橘紅焙多年漿水腳炒等分為末別以漿水腳和丸芡子大每含咽一丸聖濟錄甑氣水拾遺主治以器承取沐頭長毛髮令黑潤朝朝用梳摩小兒頭久覺有益也藏器附方新一小兒諸瘡遍身或面上生瘡爛成孔臼如大人楊梅瘡用蒸糯米時甑蓬四邊滴下氣水以盤承取掃瘡上不數日即效百藥不效者用之神妙集簡方銅壺滴漏水綱目主治性滑上可至顛下可至泉宜煎四末之藥虞摶三家洗碗水拾遺主治惡瘡久不瘥煎沸入鹽洗之不過三五度立效藏器磨刀水綱目氣味咸寒無毒時珍曰洗手則生癬主治利小便消熱腫時珍附方新五小便不通磨刀交股水一盞服之效集簡方肛門腫痛欲作痔瘡急取屠刀磨水服甚效集簡方盤腸生產腸幹不上者以磨刀水少潤腸煎好磁石二杯溫服自然收上乃扁鵲方也蛇咬毒攻入腹以兩刀於水中相摩飲其汁救急方耳中卒痛磨刀鐵漿滴入即愈活人心統浸藍水綱目氣味辛苦寒無毒主治除熱解毒殺蟲治誤吞水蛭成積脹痛黃瘦飲之取下則愈時珍染布水療咽喉病及噎疾溫服一鍾良時珍發明時珍曰藍水染布水皆取藍及石灰能殺蟲解毒之義昔有人因醉飲田中水誤吞水蛭胸腹脹痛面黃遍醫不效因宿店中渴甚誤飲此水大瀉數行平明視之水蛭無數其病頓愈也豬槽中水拾遺氣味無毒主治蠱毒服一盞又療蛇咬瘡浸之效藏器市門溺坑水拾遺氣味無毒主治止消渴重者服一小盞勿令知之三度瘥藏器洗手足水綱目主治病後勞復或因梳頭或食物復發取一合飲之效聖惠洗兒湯綱目主治胎衣不下服一盞勿令知之延年秘錄諸水有毒拾遺水府龍宮不可觸犯藏器曰水之怪魍魎溫嶠然犀照水為神所怒是也水中有赤脈不可斷之井水沸溢不可飲時珍曰但於三十步內取青石一塊投之即止古井眢井不可入有毒殺人時珍曰夏月陰氣在下尤忌之但以雞毛投之盤旋而舞不下者必有毒也以熱醋數斗投之則可入矣古塚亦然古井不可塞令人盲聾陰地流泉有毒二八月行人飲之成瘴瘧損腳力澤中停水五六月有魚鱉精人飲之成瘕病沙河中水飲之令人喑兩山夾水其人多癭流水有聲其人多癭花瓶水飲之殺人臘梅尤甚炊湯洗面令人無顏色洗體令人成癬洗腳令人疼痛生瘡銅器上汗入食中令人生疽發惡瘡冷水沐頭熱泔沐頭併成頭風女人尤忌之水經宿面上有五色者有毒不可洗手時病後浴冷水損心胞盛暑浴冷水成傷寒汗後入冷水成骨痹時珍曰顧閔遠行汗後渡水遂成骨痹痿蹶數年而死也產後洗浴成痙風多死酒中飲冷水成手顫酒後飲茶水成酒癖飲水便睡成水癖小兒就瓢及瓶飲水令語訥夏月遠行勿以冷水濯足冬月遠行勿以熱湯濯足
