body:
  text: 土部第七卷上李時珍曰土者五行之主坤之體也具五色而以黃為正色具五味而以甘為正味是以禹貢辨九州之土色周官辨十有二壤之土性蓋其為德至柔而剛至靜有常兼五行生萬物而不與其能坤之德其至矣哉在人則脾胃應之故諸土入藥皆取其裨助戊己之功今集土屬六十一種為土部舊本三十九種散見玉石部神農本經二種梁陶弘景注名醫別録三種梁陶弘景唐本草三種唐蘇恭本草拾遺二十八種唐陳藏器四聲本草一種唐蕭炳開寶本草一種宋馬志證類本草一種宋唐慎微衍義補遺一種元朱震亨本草綱目二十一種明李時珍附注魏李當之藥録吳普本草宋雷斆炮灸齊徐之才藥封唐甄權藥性孫思邈千金唐楊損之刪繁李珣海藥蜀韓保升重注宋掌禹錫補注蘇頌圖經大明日華宋寇宗奭衍義金張元素珍珠囊元王好古湯液明汪機會編元李杲法象陳嘉謨蒙筌綱目第七卷下土之一凡六十一種白堊音惡本經下品釋名白善土別録白土粉衍義畫粉時珍曰土以黃為正色則白者為惡色故名堊後人諱之呼為白善集解別録曰白堊生邯鄲山谷採無時弘景曰即今畫家用者甚多而賤俗方稀用頌曰胡居士云始興小桂縣晉陽鄉有白善而今處處皆有之人家往往用以浣衣西山經云大次之山其陽多堊中山經云蔥聾之山其中有大谷多白黑青黃堊堊有五色入藥唯白者耳宗奭曰白善土京師謂之白土子切成方塊賣於人浣衣時珍曰白土處處有之用燒白瓷器坯者修治斆曰凡使勿用色青並底白者搗篩末以鹽湯飛過曝乾用則免結澀人腸也每堊二兩用鹽一分大明曰入藥燒用不入湯飲氣味苦溫無毒別録曰辛無毒不可久服傷五臟令人羸瘦權曰甘平溫暖主治女子寒熱症瘕月閉積聚本經陰腫痛漏下無子泄痢別録療女子血結澀腸止痢甄權治鼻洪吐血痔瘻泄精男子水臟冷女子子宮冷大明合王瓜等分為末湯點二錢服治頭痛宗奭發明時珍曰諸土皆能勝濕補脾而白堊土則兼入氣分也附方新九衄血不止白土末五錢井華水調服二服除根瑞竹堂方水泄不化日夜不止白堊煅乾薑炮各一兩楮葉生研二兩為末糊丸緑豆大每米飲下二十丸普濟方翻胃吐食男婦皆治白善土煅赤以米醋一升淬之再煅再淬醋乾為度取一兩研乾薑二錢半炮為末每服一錢調下服至一斤以上為妙千金翼卒暴咳嗽白善土粉白礬各一兩為末薑汁糊丸梧子大臨臥薑湯服二十丸普濟方風赤爛眼倒睫拳毛華他方用白土一兩銅青一錢為末每以半錢泡湯洗乾坤生意加焰硝半兩為末湯泡杏仁杵和丸皂子大每用涼水浸一丸洗眼乾坤祕韞小兒熱丹白土一分寒水石半兩為末新水調塗錢乙小兒方痱子瘙癢舊屋梁上刮赤白堊末敷之普濟方代指腫痛豬膏和白善土敷之肘後方臁瘡不幹白善土煅研末生油調搽集玄方甘土拾遺集解藏器曰甘土出安西及東京龍門土底澄取之洗膩服如灰水和塗衣去油垢氣味無毒主治草藥及諸菌毒熱湯調末服之藏器赤土綱目氣味甘溫無毒主治主湯火傷研末塗之時珍附方新三牙宣疳䘌赤土荊芥葉同研揩之日三次普濟方風疹瘙癢甚不能忍者赤土研末空心溫酒服一錢御藥院方身面印文刺破以醋調赤土敷之干又易以黑滅為度千金方黃土拾遺釋名藏器曰張司空言三尺以上曰糞三尺以下曰土凡用當去上惡物勿令入客水氣味甘平無毒藏器曰土氣久觸令人面黃掘土犯地脈令人上氣身腫掘土犯神殺令人生腫毒主治泄痢冷熱赤白腹內熱毒絞結痛下血取乾土水煮三五沸絞去滓暖服一二升又解諸藥毒中肉毒合口椒毒野菌毒藏器發明時珍曰按劉跂錢乙傳云元豐中皇子儀國公病瘛瘲國醫未能治長公主舉乙入進黃土湯而愈神宗召見問黃土愈疾之狀乙對曰以土勝水木得其平則風自退爾上悅擢太醫丞又夷堅志云吳少師得疾數月消瘦每日飲食入咽如萬蟲攢攻且癢且病皆以為勞瘵迎明醫張鋭診之鋭令明旦勿食遣卒詣十里外取行路黃土至以溫酒二升攪之投藥百粒飲之覺痛幾不堪及登溷下馬蝗千餘宛轉其半已困死吳亦憊甚調理三日乃安因言夏月出師燥渴飲澗水一杯似有物入咽遂得此病鋭曰蟲入人臟勢必孳生飢則聚咂精血飽則散處臟腑苟知殺之而不能掃取終無益也是以請公枵腹以誘之蟲久不得土味又喜酒故乘飢畢集一洗而空之公大喜厚賂謝之以禮送歸附方舊二新十小兒吃土用干黃土一塊研末濃煎黃連湯調下救急方烏紗驚風小兒驚風遍身都烏者急推向下將黃土一碗搗末入久醋一鍾炒熱包定尉之引下至足刺破為妙小兒祕訣卒患心痛畫地作王字撮取中央土水和一升服良陳藏器本草目卒無見黃土攪水中澄清洗之肘後方牛馬肉毒及肝毒取好土三升水煮清一升服即愈一方入頭髮寸截和之發皆貫肝而出也肘後方內痔痛腫朝陽黃土黃連末皮硝各一兩用豬膽汁同研如泥每日旋丸棗大納入肛內過一夜隨大便去之內服烏梅黃連二味丸藥孫氏集效方顛撲欲死一切傷損從高墜下及木石所迮落馬撲車淤血凝滯氣絶欲死者亦活用淨土五升蒸熱以故布重裹作二包更互尉之勿大熱恐破肉取痛止則已神效之方孫真人千金方杖瘡未破干黃土末童尿入雞子清調塗刷上干即上隨以熱水洗去復刷復洗數十次以紫轉紅為度仍刷兩胯以防血攻陰也攝生方湯火傷灼醋調黃土塗之談野翁方蜈蚣螫傷畫地作王字內取土摻之即愈集簡方蜂蟻叮螫反手取地上土敷之或入醋調千金方蠼螋尿瘡畫地作蠼螋形以刀細取腹中土唾和塗之再塗即愈孫真人云豫得此疾經五六日不愈或教此法遂瘳乃知萬物相感莫曉其由也千金方鑄鐘黃土拾遺主治卒心痛疰忤惡氣溫酒服一錢藏器鑄鏵鉏孔中黃土拾遺主治丈夫陰囊濕癢及陰汗細末撲之藏器東壁土別録下品氣味甘溫無毒主治下部瘡脫肛別録止泄痢霍亂煩悶藏器溫瘧點目去翳同蜆殼為末敷豌豆瘡甄權療小兒風臍弘景摩干濕二癬極效蘇恭發明弘景曰此屋之東壁上土也常先見日故爾又可除油垢衣勝石灰滑石藏器曰取其向陽久干也宗奭曰久干之說不然蓋東壁先得太陽真火烘炙故治瘟疫初出少火之氣壯及當午則壯火之氣衰故不用南壁而用東壁時珍曰昔一女忽嗜河中汙泥日食數碗玉田隱者以壁間敗土調水飲之遂愈又凡脾胃濕多吐瀉霍亂者以東壁土新汲水攪化澄清服之即止蓋脾主土喜燥而惡濕故取太陽真火所照之土引真火生髮之氣補土而勝濕則吐瀉自止也嶺南方治瘴瘧香椿散內用南壁土近方治反胃嘔吐用西壁土者或取太陽離火所照之氣或取西方收斂之氣然皆不過借氣補脾胃也附方舊三新九急心痛五十年陳壁土枯礬各二錢為末蜜丸艾湯服集玄方霍亂煩悶向陽壁土煮汁服聖濟録藥毒煩悶欲死者東壁土調水三升頓飲之肘後方解烏頭毒不拘川烏草烏毒用多年陳壁土泡湯服之冷水亦可通變要法六畜肉毒東壁土末水服一錢即安集玄方目中翳膜東壁土細末日點之淚出佳肘後方肛門凸出故屋東壁上土一升研末以長皂莢挹末粉之仍炙皂莢更互尉之外臺祕要痱子瘙癢干壁土末敷之隨手愈普濟方耳瘡唇瘡東壁土和胡粉敷之救急方癧破經年膿水不絶用百年茅屋廚中壁土為末入輕粉調敷半月即干愈永類方諸般惡瘡拔毒散東牆上土大黃等分為末用無根井華水調搽干再上瑞竹堂方發背癰癤多年煙燻壁土黃柏等分為末薑汁拌調攤貼之更以茅香湯調服一錢匕經驗方太陽土綱目主治人家動土犯禁主小兒病氣喘但按九宮看太陽在何宮取其土煎湯飲之喘即定時珍出正傳附録執日天星上土藏器曰取和薰草柏葉以塗門戶方一尺令盜賊不來執日六癸上土時珍曰抱朴子云常以執日取六癸上土市南門土歲破土月建土合作人著朱鳥地上闢盜二月上壬日土藏器曰泥屋之四角宜蠶清明日戌上土時珍曰同狗毛作泥塗房戶內孔穴蛇鼠諸蟲永不入神后土時珍曰逐月旦日取泥屋之四角及塞鼠穴一年鼠皆絶跡此李處士禁鼠法也神後正月起申順行十二辰天子藉田三推犁下土拾遺釋名時珍曰月令天子以元日祈谷於上帝親載耒耜率三公九卿諸侯大夫躬耕天子三推三公五推卿諸侯九推反執爵於太寢命曰勞酒氣味無毒主治水服主驚悸癲邪安神定魄強志藏之入官不懼利見大官宜婚市王者封禪五色土次之藏器附録社稷壇土藏器曰牧宰臨官自取塗門戶令盜賊不入境也春牛土藏器曰收角上土置戶上令人宜田時珍曰宋時立春日進春牛御藥院取牛睛以充眼藥今人鞭春時庶民爭取牛土云宜蠶取土撒檐下云闢蚰蜒富家土藏器曰七月丑日取中庭土泥灶令人富勿令人知時珍曰除日取富家田中土泥灶招吉亭部中土時珍曰取作泥塗灶水火盜賊不經塗屋四角鼠不食蠶塗倉囷鼠不食稻塞穴百日鼠皆絶去出陰陽雜書云道中熱土拾遺主治夏月暍死以土積心口少冷即易氣通則蘇藏器亦可以熱土圍臍旁令人尿臍中仍用熱土大蒜等分搗水去滓灌之即活時珍十字道上土主治主頭面黃爛瘡同灶下土等分敷之時珍車輦土拾遺主治惡瘡出黃汁取鹽車邊脂角上土塗之藏器行人暍死取車輪土五錢水調澄清服一碗即蘇又小兒初生無膚色赤因受胎未得土氣也取車輦土碾敷之三日後生膚時珍市門土拾遺釋名時珍曰日中為市之處門柵也氣味無毒主治婦人易産入月帶之産時酒服一錢藏器戶限下土拾遺釋名時珍曰限即門閾也氣味無毒主治産後腹痛熱酒服一錢又治吹奶和雄雀糞暖酒服方寸匕藏器千步峰綱目集解時珍曰此人家行步地上高起土也乃人往來鞋履沾積而成者技家言人宅有此主興旺主治便毒初發用生薑蘸醋磨泥塗之時珍鞋底下土拾遺主治適他方不伏水土刮下和水服即止藏器柱下土拾遺氣味無毒主治腹痛暴卒水服方寸匕藏器胎衣不下取宅中柱下土研末雞子清和服之思邈床腳下土拾遺主治猘犬咬和水敷之灸七壯藏器燒尸場上土綱目主治邪瘧取帶黑土同蔥搗作丸塞耳或系膊上即止男左女右時珍附方新四好魘多夢燒人灰置枕中履中自止本草拾遺尸厥猝死不知人者燒尸場土二三錢擂細湯泡灌之即活如無以灶心土代之何氏方小兒夜啼燒尸場土置枕邊集簡方腳底多汗燒人場上土鋪於鞋底內蹉之灰亦可集玄方冢上土拾遺主治瘟疫五月一日取土或磚石入瓦器中埋著門外階下閣家不患時氣又正旦取古冢磚咒懸大門上一年無疫疾藏器附方新一腸癰死人冢上土作泥塗之良千金方桑根下土拾遺主治中惡風惡水而肉腫者水和敷上灸二三十壯熱氣透入即平藏器胡燕窠土拾遺氣味無毒主治同屎作湯浴小兒去驚邪弘景主風瘙癮疹及惡刺瘡浸淫瘑瘡繞身至心者死並水和敷之三兩日瘥藏器治口吻白禿諸瘡時珍附方舊三新八濕瘑疥瘡胡燕窠大者用抱子處土為末以淡鹽湯洗拭干敷之日一上小品方黃水肥瘡燕窠土一分麝香半分研敷之善濟方浸淫濕瘡發於心下者不早治殺人用胡燕窠中土研末水和敷葛氏口角爛瘡燕窠泥敷之良救急方白禿頭瘡百年屋下燕窠泥蠮螉窠研末剃後麻油調搽聖濟録蠼螋尿瘡繞身汁出以燕窠中土和豬脂苦酒敷之外臺祕要瘭疽惡瘡著手足肩背纍纍如赤豆出汁剝痂以溫醋米泔洗淨用胡燕窠土和百日男兒屎敷之千金方皮膚中毒名症疰用醋和燕窠土敷之千金方風瘙癮疹胡燕窠土水和敷之千金方小兒丹毒向陽燕窠土為末雞子白和敷衛生易簡方一切惡瘡燕窠內外泥糞研細油調搽一加黃柏末瑞竹堂方百舌窠中土拾遺主治蚯蚓及諸惡蟲咬瘡醋調敷之藏器土蜂窠拾遺釋名蠮螉窠時珍曰即細腰蜂也氣味甘平無毒主治癰腫風頭別録小兒霍亂吐瀉炙研乳汁服一錢聖惠醋調塗腫毒及蜘蛛咬藏器醋調塗蜂蠆毒宗奭治疔腫乳蛾婦人難産時珍附方新六女人難産土蜂兒窠水泡湯飲之取時逢單是男雙是女最驗婦人良方腫毒焮痛陳藏器本草用醋和泥蜂窠塗之直指加川烏頭等分云未結則散已結則破也疔瘡腫痛土蜂窠煅蛇皮燒等分酒服一錢直指方咽喉乳蛾土蜂窠一個為末先用楮葉擦破病人舌令血出以醋和末用翎點之令痰涎出為效後用扁竹根擂水服數口取利瑞竹堂方手足髮指毒痛不可忍用壁間泥蜂窠為末入乳香少許研勻以醋調塗干即以醋潤之奇效方蠼螋尿瘡螟蛉窠水調敷之集玄方蜣螂轉丸拾遺釋名土硝藏器曰此蜣螂所推丸也藏在土中掘地得之正圓如人捻作彌久者佳氣味咸苦大寒無毒主治湯淋絞汁服療傷寒時氣黃疸煩熱及霍亂吐瀉燒存性酒服治項癭塗一切瘻瘡藏器鬼屎拾遺集解藏器曰生陰濕地如屎亦如地錢黃白色主治人馬反花瘡刮取和油塗之藏器鼠壤土拾遺釋名時珍曰柔而無塊曰壤主治中風筋骨不隨冷痹骨節疼手足拘急風掣痛偏枯死肌多收曝乾蒸熱袋盛更互尉之藏器小兒尿和塗疔腫思邈蚡鼠壤土拾遺集解藏器曰此是田中尖嘴小鼠也陰穿地中不能見日主治鬼疰氣痛秫米泔汁和作餅燒熱綿裹尉之又主腫毒和醋敷之極效藏器孕婦腹內鐘鳴研末二錢麝香湯下立愈時珍屋內壖下蟲塵土拾遺釋名時珍曰壖音軟平聲河邊地及垣下地皆謂之壖主治惡瘡久不幹油調敷之藏器蟻垤土拾遺釋名蟻封時珍曰垤音迭高起也封聚土也主治狐刺瘡取七粒和醋搽又死胎在腹及胞衣不下炒三升囊盛拓心下自出也藏器白蟻泥綱目主治惡瘡腫毒用松木上者同黃丹各炒黑研和香油塗之取愈乃止時珍蚯蚓泥綱目釋名蚓螻音婁六一泥氣味甘酸寒無毒主治赤白久熱痢取一升炒煙盡沃汁半升濾淨飲之藏器小兒陰囊忽虛熱腫痛以生甘草汁入輕粉末調塗之以鹽研敷瘡去熱毒及蛇犬傷日華敷狂犬傷出犬毛神效蘇恭附方舊五新十七斷截熱瘧邵氏青囊方用五月五日午時取蚯蚓糞以面和丸梧子大硃砂為衣每服三丸無根水下忌生冷即止皆效或加菖蒲末獨蒜頭同丸傷寒譫語蚯蚓屎涼水調服簡便方小便不通蚯蚓糞朴硝等分水和敷臍下即通皆效方小兒吐乳取田中地龍糞一兩研末空心以米湯服半錢不過二三服效聖惠方小兒卵腫地龍糞以薄荷汁和塗之危氏得效方婦人吹乳用韭地中蚯蚓屎研細篩過米醋調厚敷干則換三次即愈涼水調亦可藺氏經驗方時行腮腫柏葉汁調蚯蚓泥塗之丹溪方一切丹毒水和蛐蟺泥敷之外臺腳心腫痛因久行久立致者以水和蚯蚓糞厚敷一夕即愈永類鈐方耳後月蝕燒蚯蚓糞豬脂和敷子母祕録聤耳出水成瘡蚯蚓糞為末敷之並吹入千金方齒齦宣露蚯蚓泥水和成團煅赤研末臘豬脂調敷之日三千金方咽喉骨哽五月五日午時韭畦中面東勿語取蚯蚓泥收之每用少許搽喉外其骨自消名六一泥蜈蚣螫傷蚯蚓泥敷之效集效方金瘡困頓蚯蚓屎末水服方寸匕日三服千金方解射罔毒蚯蚓屎末井水服二方寸匕千金方吐血不止石榴根下地龍糞研末新汲水服三錢聖惠反胃轉食地龍糞一兩木香三錢大黃七錢為末每服五錢無根水調服忌煎爆酒醋椒姜熱物一二服其效如神邵真人經驗方燕窩生瘡韭地蛐蟺屎米泔水和煅過入百草霜等分研末香油調塗之摘玄方小兒頭熱鼻塞不通濕地龍糞研餅貼囟上日數易之聖惠方足臁爛瘡韭地蚯蚓泥乾研入輕粉清油調敷便民圖纂外腎生瘡蚯蚓屎二分緑豆粉一分水研塗之干又上之便民圖纂螺螄泥綱目氣味性涼主治反胃吐食取螺螄一斗水浸取泥曬乾每服一錢火酒調下時珍白鱔泥綱目主治火帶瘡水洗取泥炒研香油調敷時珍豬槽上垢土拾遺主治難産取一合和麵半升烏豆二十顆煮汁服藏器火焰丹毒赤黑色取槽下泥敷之干又上時珍犬尿泥綱目主治妊娠傷寒令子不落塗腹上干即易時珍驢尿泥拾遺主治蜘蛛咬敷之藏器尿坑泥綱目主治主蜂蠍諸蟲咬取塗之時珍糞坑底泥綱目主治發背諸惡瘡陰乾為末新水調敷其痛立止時珍附方新一疔腫糞下土蟬蛻全蠍等分搗作錢大餅香油煎滾溫服以滓敷瘡四圍疔自出也聖濟總録檐溜下泥綱目主治豬咬蜂螫蟻叮蛇傷毒並取塗之又和羊脂塗腫毒丹毒時珍附方新一蠍蠆螫叮蠍有雌雄雄者痛在一處以井底泥封之干則易雌者痛牽諸處以瓦溝下泥封之若無雨以新汲水從屋上淋下取泥肘後方田中泥綱目主治馬蝗入人耳取一盆枕耳邊聞氣自出人誤吞馬蝗入腹者酒和一二升服當利出時珍井底泥證類氣味至冷主治塗湯火瘡證類療妊娠熱病取敷心下及丹田可護胎氣時珍附方新五頭風熱痛井底泥和大黃芒硝末敷之千金方胎衣不下井底泥以雞子大井華水服即下集玄方臥忽不寤勿以火照但痛齧其踵及足拇趾甲際而多唾其面以井底泥塗其目令人垂頭入井中呼其姓名便蘇也肘後方小兒熱癤井底泥敷其四圍談野翁方蜈蚣螫人井底泥頻敷之千金方烏爹泥綱目釋名烏疊泥綱目孩兒茶時珍曰烏爹或作烏丁皆番語無正字集解時珍曰烏爹泥出南番爪哇暹羅老撾諸國今雲南等地造之云是細茶末入竹筒中堅塞兩頭埋汙泥溝中日久取出搗汁熬製而成其塊小而潤澤者為上塊大而焦枯者次之氣味苦澀平無毒主治清上膈熱化痰生津塗金瘡一切諸瘡生肌定痛止血收濕時珍附方新八鼻淵流水孩兒茶末吹之良本草權度牙疳口瘡孩兒茶硼砂等分為末搽之積德堂方治走馬牙疳用孩兒茶雄黃貝母等分為末米泔漱淨搽之下疳陰瘡外科用孩兒茶末米泔洗淨敷之神效或加胡黃連等分纂奇方孩兒茶一錢珍珠一分片腦半分為末敷之唐氏用孩兒茶一錢輕粉一分片腦一字為末搽之痔瘡腫痛孩兒茶麝香為末唾津調敷孫氏集效方脫肛氣熱孩兒茶二分熊膽五分片腦一分為末人乳搽肛上熱汁自下而肛收也亦治痔瘡董炳方彈丸土拾遺主治婦人難産熱酒服一錢藏器自然灰拾遺集解藏器曰生南海畔狀如黃土灰可浣衣琉璃瑪瑙玉石以此灰埋之即爛如泥至易雕刻主治白癜風癧瘍風重淋取汁和醋敷之以布揩破乃敷之為瘡勿怪藏器伏龍肝別録下品釋名灶心土弘景曰此灶中對釜月下黃土也以灶有神故號為伏龍肝並以迂隱其名爾今人又用廣州鹽城屑以療漏血瘀血亦是近月之土蓋得火燒之義也斆曰凡使勿誤用灶下土其伏龍肝是十年以來灶額內火氣積久自結如赤色石中黃其形貌八稜取得研細以水飛過用時珍曰按廣濟歷作灶忌日云伏龍在不可移作則伏龍者乃灶神也後漢書言陰子方臘日晨炊而灶神見形注云宜市買豬肝泥灶令婦孝則伏龍肝之名義又取此也臨安陳輿言砌灶時納豬肝一具於土俟其日久與土為一乃用之始與名符蓋本於此獨孤滔丹書言伏龍肝取經十年灶下掘深一尺有色如紫瓷者是真可縮賀伏丹砂蓋亦不知豬肝之義而用灶下土以為之也氣味辛微溫無毒權曰咸大明曰熱微毒主治婦人崩中吐血止咳逆血醋調塗癰腫毒氣別録止鼻洪腸風帶下尿血泄精催生下胞及小兒夜啼大明治心痛狂癲風邪蠱毒妊娠護胎小兒臍瘡重舌風噤反胃中惡猝魘諸瘡時珍附方舊十六新十七猝中惡氣伏龍肝末一雞子大水服取吐千金方魘寐暴絶灶心對鍋底土研末水服二錢更吹入鼻千金方中風口噤不語心煩恍惚手足不隨或腹中痛滿或時絶而復蘇伏龍肝末五升水八升攪澄清濯之千金方狂癲謬亂不識人伏龍肝末水服方寸匕日三服千金方小兒夜啼伏龍肝末二錢硃砂一錢麝香少許為末蜜丸緑豆大每服五丸桃符湯下普濟方小兒重舌釜下土和苦酒塗之千金方重舌腫木伏龍肝末牛蒡汁調塗之聖惠方冷熱心痛伏龍肝末方寸匕熱以水溫冷以酒服外臺祕要反胃吐食灶中土年久者為末米飲服三錢經驗百一選方猝然咳嗽釜月土一分豉七分搗丸梧桐子大每飲下四十丸肘後方吐血衄血伏龍肝末半升新汲水一升淘汁和蜜服廣利方吐血瀉血心腹痛伏龍肝地壚土多年煙壁土等分每服五錢水二碗煎一碗澄清空心服白粥補之普濟方婦人血漏伏龍肝半兩阿膠蠶砂炒各一兩為末每空肚酒服二三錢以知為度寇氏衍義赤白帶下日久黃瘁六脈微澀伏龍肝炒令煙盡棕櫚灰屋梁上塵炒煙盡等分為末入龍腦麝香各少許每服三錢溫酒或淡醋湯下一年者半月可安大全方産後血氣攻心痛惡物不下用灶中心土研末酒服二錢瀉出惡物立效救急方妊娠熱病伏龍肝末一雞子許水調服之仍以水和塗臍方寸干又上傷寒類要子死腹中母氣欲絶伏龍肝末三錢水調下十全博救方橫生逆産灶中心對鍋底土細研每服一錢酒調仍搽母臍中救急方胞衣不下灶下土一寸醋調納臍中續服甘草湯三四合産寶中諸蠱毒伏龍肝末一雞子大水服取吐千金方六畜肉毒方同上陰冷發悶冷氣入腹腫滿殺人釜月下土和雞子白敷之千金方男陰猝腫方同上諸腋狐臭伏龍肝末頻敷之千金方聤耳出汁綿裹伏龍肝末塞之日三易聖濟録小兒臍瘡伏龍肝末敷之聖惠方小兒丹毒多年灶下黃土末和屋漏水敷之新汲水亦可雞子白或油亦可干即易肘後方小兒熱癤釜下土生椒末等分醋和塗之千金方臁瘡久爛灶內黃土年久者研細入黃柏黃丹赤石脂輕粉末等分清油調入油絹中貼之勿動數日愈縱癢忍之良濟急方發背欲死伏龍肝末酒調厚敷之干即易平乃止千金一切癰腫伏龍肝以蒜和作泥貼之干再易或雞子黃和亦可外臺祕要杖瘡腫痛釜月下土為末油和塗之臥羊皮上頻塗千金方灸瘡腫痛灶中黃土末煮汁淋之千金方土墼音急綱目釋名煤赭時珍曰此是燒石灰窯中流結土渣也輕虛而色赭主治婦人鱉瘕及頭上諸瘡凡人生痰核如指大紅腫者為末以菜子油調搽其腫即消或出膿以膏藥貼之時珍附方新一白禿臘梨灰窯內燒過紅土墼四兩百草霜一兩雄黃一兩膽礬六錢榆皮三錢輕粉一錢為末豬膽汁調剃頭後搽之百發百中神方也陸氏積德堂方坩鍋綱目釋名銷金銀鍋吳人收瓷器屑碓舂為末篩澄取粉呼為滓粉用膠水和劑作鍋以銷金銀者主治偏墜疝氣研末熱酒調服二錢又主煉眉瘡湯火瘡研末入輕粉少許敷之鍋上黝爛肉時珍砂鍋綱目集解時珍曰沙土埏埴燒成者主治消積塊黃腫用年久者研末水飛過作丸每酒服五錢時珍白瓷器唐本草集解恭曰定州者良余皆不如時珍曰此以白土為坯坯燒成者古人以代白堊用今饒州者亦良氣味平無毒主治婦人帶下白崩止嘔吐破血止血水磨塗瘡滅瘢唐本研末敷癰腫可代針又點目去翳時珍附方舊二新七鼻衄不止定州白瓷細末吹少許立止經驗方吐血不止上色白瓷器末二錢皂莢子仁煎湯下連服三服即愈聖濟録小便淋痛真定瓷器煅研二兩生熟地黃末各一兩每用二錢木通煎湯服傳信適用方一切𪖲齁處州瓷器為末發時用二錢以手指點津液蘸藥點舌下咽之即效普濟方目生翳膜用細料白瓷鍾一個大火煅過研末紙篩加雄黃二分為末早晚各點少許不可多用牛角簪撥出翳膜為妙若紅用人退末點四角即愈孫天仁集效方身面白丹白瓷瓦末和豬脂塗之梅師方赤黑丹疥或癢或燥不急治遍身即死白瓷末豬脂和塗之聖濟録湯火傷灼多能鄙事用青瓷碗片為末水飛過和桐油敷數次瘥活幼口議用景德鎮瓷器打碎埋灶內炭火鋪上一夜取出去火毒為末入黃丹少許敷之立愈烏古瓦唐本草集解時珍曰夏桀始以泥坯燒作瓦氣味甘寒無毒主治以水煮及漬汁飲止消渴取屋上年深者良唐本煎湯服解人心中大熱甄權止小便煎汁服大明研末塗湯火傷藏器治折傷接骨時珍附方舊一新六暑月暍死屋上兩畔瓦熱尉心頭冷即易之千金方折傷筋骨祕傳神效散治跌撲傷損骨折骨碎筋斷痛不可忍此藥極能理傷續斷纍用纍驗用路上牆腳下往來人便溺處久碎瓦片一塊洗淨火煅米醋淬五次黃色為度刀刮細末每服三錢好酒調下在上食前在下食後不可以輕易而賤之誠神方也邵以正真人經驗方湯火傷灼取多年屋上吻獸為末油和塗之立效儒門事親方灸牙痛法取土底年深既古且潤三角瓦一塊令三姓童子候星初出時指第一星下火於瓦上灸之本草拾遺唇吻生瘡新瓦為末生油調塗集玄方瘢痕凸起熱瓦頻尉之千金方蜂蠆螫傷瓦摩其上唾二七遍置瓦於故處千金古磚拾遺主治噦氣水煮汁服之久下白痢虛寒者秋月小腹多冷者並燒熱布裹坐之令熱氣入腹良又治婦人五色帶下以面作煎餅七個安於燒赤黃磚上以黃栝蔞敷面上安布兩重令患者坐之令藥氣入腹熏之當有蟲出如蠶子不過三五度瘥藏器附方新三寒濕腳氣磚燒紅以陳臭米泔水淬之乘熱布包三塊用膝夾住綿被覆之三五次愈扶壽方赤眼腫痛新磚浸糞池中年久取放陰處生花刷下入腦子和點之普濟方臀生濕瘡日以新磚坐之能去濕氣集玄方煙膠綱目集解時珍曰此乃熏消牛皮灶上及燒瓦窯上黑土也主治頭瘡白禿疥瘡風癬癢痛流水取牛皮灶岸為末麻油調塗或和輕粉少許時珍附方新三牛皮血癬煙膠三錢寒水石三錢白礬二錢花椒一錢半為末臘豬脂調搽積德堂方消渴引飲瓦窯突上黑煤干似鐵屎者半斤為末入生薑四兩同搗絹袋盛水五升浸汁每飲五合聖濟録胞衣不下灶突後黑土三指撮五更酒下陳藏器墨宋開寶釋名烏金綱目陳玄綱目玄香綱目烏玉玦時珍曰古者以黑土為墨故字從黑土許慎說文云墨煙煤所成土之類也故從黑土劉熙釋名云墨者晦也集解宗奭曰墨松之煙也世有以粟草灰僞為者不可用須松煙墨方可入藥唯遠煙細者為佳粗者不可用今高麗國所餽墨於中國不知何物合不宜入藥鄜延有石油其煙甚濃其煤可為墨黑光如漆不可入藥時珍曰上墨以松煙用梣皮汁解膠和造或加香藥等物今人多以窯突中墨煙再三以麻油入內用火燒過造墨謂之墨煙墨光雖黑而非松煙矣用者詳之石墨見石炭下烏賊魚腹中有墨馬之寶墨各見本條氣味辛溫無毒主治止血生肌膚合金瘡治産後血運崩中猝下血醋磨服之又止血痢及小兒客忤搗篩溫水服之又眯目物芒入目點摩瞳子上開寶利小便通月經治癰腫時珍發明震亨曰墨屬金而有火入藥甚健性又能止血附方舊十新六吐血不止金墨磨汁同萊蔔汁飲或生地黃汁亦可集簡方衄血不止眩冒欲死濃墨汁滴入鼻中梅師方熱病衄血出數升者取好墨為末雞子白丸梧子大用生地黃汁下一二十丸少頃再服仍以蔥汁磨墨滴入鼻內即止外臺祕要大小便血好墨細末二錢阿膠化湯調服熱多者尤相宜寇氏本草衍義猝淋不通好墨燒一兩為末每服一字溫水服之普濟方赤白下痢姜墨丸用乾薑好墨各五兩為末醋漿和丸梧子大每服三四十丸米飲下日夜六七服愈肘後方崩中漏下青黃赤白使人無子好墨一錢水服日二服肘後方墮胎血溢不止墨三兩火燒醋淬三次出火毒沒藥一兩為末每服二錢醋湯下普濟方婦人難産墨一寸末之水服立産肘後方胎死腹中新汲水磨金墨服之普濟方胞衣不出痛引腰脊好墨溫酒服二錢肘後方癰腫發背醋磨濃墨塗四圍中以豬膽汁塗之干又上一夜即消趙氏方客忤中惡多於道間門外得之令人心腹絞痛脹滿氣衝心胸不即治殺人搗墨水和服二錢肘後方飛絲入目磨濃墨點之即出千金方塵物入目方同上産後血運心悶氣絶以丈夫小便研濃墨一升服子母祕録釜臍墨四聲釋名釜月中墨四聲鐺墨開寶釜煤綱目釜炲綱目鍋底墨時珍曰大者曰釜曰鍋小者曰鐺氣味辛溫無毒主治中惡蠱毒吐血血運以酒或水溫服二錢亦塗金瘡止血生肌開寶消食積舌腫喉痹口瘡陽毒發狂時珍發明頌曰古方治傷寒黑奴丸用釜底墨灶突墨梁上塵三物同合諸藥為其功用相近耳附方舊七新六猝心氣痛鐺墨二錢熱小便調下千金方中惡心痛鐺墨五錢鹽一錢研勻熱水一盞調下千金方轉筋入腹釜底墨末和酒服一錢肘後方霍亂吐下鍋底墨煤半錢灶額上墨半錢百沸湯一盞急攪數千下以碗覆之通口服一二口立止經驗方吐血咯血鍋底墨炒過研細井華水服二錢連進三服濟急方婦人逆産以手中指取釜下墨交畫兒足下即順千金方産血不下鍋底墨煙熱酒服二錢生生編舌猝腫大如豬脬狀滿口不治殺人釜墨和酒塗之千金方鼻氣壅塞水服釜墨一錢千金方鼻中息肉方同上三五日愈普濟方聤耳膿血月下灰吹滿耳深入無苦即自出肘後方小兒口瘡釜底墨時時搽之普濟方手搔瘡腫作膿用鍋臍墨研細清油調搽簡便方百草霜綱目釋名灶突墨綱目灶額墨時珍曰此乃灶額及煙爐中墨煙也其質輕細故謂之霜氣味辛溫無毒主治消化積滯入下食藥中用蘇頌止上下諸血婦人崩中帶下胎前産後諸病傷寒陽毒發狂黃疸瘧痢噎膈咽喉口舌一切諸瘡時珍發明時珍曰百草霜釜底墨梁上倒掛塵皆是煙氣結成但其體質有輕虛結實之異重者歸中下二焦輕者入心肺之分古方治陽毒發狂黑奴丸三者並用而內有麻黃大黃亦是攻解三焦結熱兼取火化從治之義其消積滯亦是取其從化故疸膈瘧痢諸病多用之其治失血胎産諸病雖是血見黑則止亦不離從化之理附方新二十衄血不止百草霜末吹之立止也衄血吐血劉長春經驗方治吐血及傷酒食醉飽低頭掬損肺臟吐血汗血口鼻妄行但聲未失者用鄉外人家百草霜末糯米湯服二錢一方百草霜五錢槐花末二兩每服二錢茅根湯下齒縫出血百草霜末摻之立止集簡方婦人崩中百草霜二錢狗膽汁拌勻分作二服當歸酒下經驗方胎動下血或胎已死百草霜二錢棕灰一錢伏龍肝五錢為末每服一二錢白湯入酒及童尿調下筆峰雜興方胎前産後逆生橫生瘦胎産前産後虛損月候不調崩中百草霜白芷等分為末每服二錢童子小便醋各少許調勻熱湯化服不過二服杜壬方婦人白帶百草霜一兩香金墨半兩研末每服三錢豬肝一葉批開入藥在內紙裹煨熟細嚼溫酒送之永類方臟毒下血百草霜五錢以米湯調露一夜次早空心服邵真人經驗方暴作瀉痢百草霜末米飲調下二錢續十全方一切痢下初起一服如神名鐵刷丸百草霜三錢金墨一錢半夏七分巴豆煮十四粒研勻黃蠟三錢同香油化開和成劑量大小每服三五丸或四五十丸薑湯下灊江方小兒積痢駐車丸用百草霜二錢巴豆煨去油一錢研勻以飛羅麵糊和丸緑豆大每服三五丸赤痢甘草湯下白痢米飲下紅白薑湯下全幼心鑑挾熱下痢膿血灶突中墨黃連各一兩為末每酒下二錢日二服聖惠方寒熱瘧疾方見鉛丹下魘寐猝死鍋底墨水灌二錢並吹鼻醫說尸厥不醒脈動如故灶突墨彈丸漿水和飲仍針百會足大趾中趾甲側千金方咽中結塊不通水食危困欲死百草霜蜜和丸芡子大每新汲水化一丸灌下甚者不過二丸名百靈丸普濟方鼻瘡膿臭百草霜末冷水服二錢三因方白禿頭瘡百草霜和豬脂塗之簡便方頭瘡諸瘡以醋湯洗淨百草霜入膩粉少許生油調塗立愈證類本草瘭疽出汁著手足肩背纍纍如米用灶突墨灶屋塵釜下土研勻水一斗煮三沸取汁洗日三四度外臺祕要梁上塵唐本草釋名倒掛塵名烏龍尾綱目煙珠修治斆曰凡梁上塵須去煙火大遠高堂殿上者拂下篩淨末用時珍曰凡用倒掛塵燒令煙盡篩取末入藥雷氏所說似是梁上灰塵今人不見用氣味辛苦微寒無毒大明曰平主治腹痛噎膈中惡鼻衄小兒軟瘡唐本食積止金瘡血出齒齦出血時珍附方舊七新十二翻胃吐食梁上塵黑驢尿調服之集簡方霍亂吐利屋下倒掛塵滾湯泡澄清服即止衛生易簡方小便不通梁上塵二指撮水服之外臺祕要大腸脫肛烏龍尾即梁上塵同鼠屎燒煙於桶內坐上熏之數次即不脫也濟急喉痹乳蛾烏龍尾枯礬豬牙皂莢以鹽炒黃等分為末或吹或點皆妙孫氏集效方牙疼㗜鼻壁上掃土用鹽炒過為末隨左右㗜鼻普濟方鼻中息肉梁塵吹之普濟方夜臥魘死勿用火照急取梁塵納鼻中即活瑣碎録猝自縊死梁上塵如豆大各納一筒中四人同時極力吹兩耳及鼻中即活外臺祕要經血不止烏龍尾炒煙盡荊芥穗各半兩為末每服二錢茶下聖濟録婦人胎動日月未足欲産梁上塵灶突墨等分酒服方寸匕千金方橫生逆産梁上塵酒服方寸匕子母祕録婦人妒乳醋和梁上塵塗之千金方石癰不膿梁上塵灰葵根莖灰等分用醋和敷之千金翼發背腫痛廚內倒吊塵為末以生蔥極嫩心同搗膏敷之留頂一日一換干則以水潤之瀕湖集簡方無名惡瘡梁上倒掛塵二條韭地蚯蚓泥少許生蜜和捻作餅如錢大陰乾用蜜水調頻敷之楊起簡便方小兒頭瘡浸淫成片梁上塵和油瓶下滓以皂莢湯洗後塗之子母祕録小兒赤丹屋塵和臘豬脂敷之千金方老嗽不止故茅屋上塵年久著煙火者和石黃款冬花婦人月經衣帶為末水和塗茅上待乾入竹筒中燒煙吸咽無不瘥也陳藏器本草門臼塵綱目主治止金瘡出血又諸般毒瘡切蒜蘸擦至出汗即消時珍寡婦床頭塵土拾遺主治耳上月割瘡和油塗之藏器瓷甌中白灰拾遺集解藏器曰瓷器物初燒時相隔皆以灰為泥然後燒之但看瓷里有灰即收之備用主治遊腫醋磨敷之藏器香爐灰綱目主治跌撲金刃傷損罨之止血生肌香爐岸主疥瘡時珍鍛灶灰別録下品集解弘景曰此鍛鐵灶中灰爾兼得鐵力故也主治癥瘕堅積去邪惡氣別録恭曰療暴症有效古方二車丸中用之附方新一産後陰脫鐵爐中紫塵羊脂二味和勻布裹炙熱尉推納上徐氏胎産方冬灰本經下品釋名宗奭曰諸灰一爇面成其體輕力劣唯冬灰則經三四月方撤爐其灰既曉夕燒灼其力全燥烈而體益重故也集解別録曰冬灰生方谷川澤弘景曰此即今浣衣黃灰爾燒諸蒿藜積聚煉作之性亦烈荻灰尤烈恭曰冬灰本是藜灰余草不真又有青蒿灰柃灰一作苓字乃燒木葉作併入染家用亦蝕惡肉時珍曰冬灰乃冬月灶中所燒薪柴之灰也專指作蒿藜之灰亦未必然原本一名藜灰生方谷川澤殊為不通此灰既不當言川澤又豈獨方谷乃有耶今人以灰淋汁取鹼浣衣發麵令皙治瘡蝕惡肉浸藍靛染青色氣味辛微溫有毒主治去黑子疣息肉疽蝕疥瘙本經煮豆食大下水腫蘇恭醋和熱灰尉心腹冷氣痛及血氣絞痛冷即易藏器治犬咬熱灰敷之又治溺死凍死蝕諸癰疽惡肉時珍發明時珍曰古方治人溺水死用灶中灰一石埋之從頭至足唯露七孔良久即蘇凡蠅溺水死試以灰埋之少頃即便活甚驗蓋灰性暖而能拔水也附方新五人溺水死方見上墮水凍死只有微氣者勿以火炙用布袋盛熱灰放在心頭冷即換待眼開以溫酒與之普濟方陰冷疼悶冷氣入腹腫滿殺人醋和熱灰頻尉之千金方湯火傷灼餅爐中灰麻油調敷不得著水仍避風寇氏衍義犬咬傷人苦酒和灰敷之或熱湯和之千金方石鹼補遺釋名灰鹼花鹼時珍曰狀如石類鹼故亦得鹼名集解時珍曰石鹼出山東濟寧諸處彼人採蒿蓼之屬開窖浸水漉起曬乾燒灰以原水淋汁每百引入粉面二三斤久則凝澱如石連汁貨之四方浣衣發麵甚獲利也他處以灶灰淋濃汁亦去垢發麵氣味辛苦溫微毒主治去濕熱止心痛消痰磨積塊去食滯洗滌垢膩量虛實用過服損人震亨殺齒蟲去目翳治噎膈反胃同石灰爛肌肉潰癰疽瘰癧去瘀血點痣黶疣贅痔核神效時珍附方新五多年反胃方見鉛下消積破氣石鹼三錢山楂三兩阿魏五錢半夏皂莢水制過一兩為末以阿魏化醋煮糊丸服摘玄方一切目疾石鹼揀去黑碎者厚紙七層包掛風處四十九日取研極細日日點之普濟方拳毛倒睫用刀微划動以藥泥眼胞上睫自起也石鹼一錢石灰一錢醋調塗之摘玄方蟲牙疼痛花鹼填孔內立止儒門事親痣黶疣贅花鹼礦灰以小麥稈灰汁煎二味令乾等分為末以針刺破水調點之三日三上即去須新合乃效聖濟録
