蠟紙調卷作筒十枚燒煙吸咽取吐止一日一熏惟食白粥七日後以羊肉羹補之千金方水腫上氣咳嗽腹脹熏黃一兩款冬花二分熟艾一分以蠟紙鋪艾灑二末於上葦管捲成筒燒煙吸咽三十口則瘥三日盡一劑百日斷鹽醋外臺祕要手足甲疽熏黃蛇皮等分為末以泔洗淨割去甲入肉處敷之一頃痛定神效近效方雌黃本經中品釋名坐七火切時珍曰生山之陰故曰雌黃土宿本草云陽石氣未足者為雌已足者為雄相距五百年而結為石造化有夫婦之道故曰雌雄集解別録曰雌黃生武都山谷與雄黃同山生其陰山有金金精熏則生雌黃採無時弘景曰今雌黃出武都仇池者謂之武都仇池黃色小赤出扶南林邑者謂之崑崙黃色如金而似雲母甲錯畫家所重既有雌雄之名又同山之陰陽合藥便當以武都為勝仙經無單服法惟以合丹砂雄黃飛煉為丹爾金精是雌黃銅精是空青而服空青反勝於雌黃其義難了斆曰雌黃一塊重四兩拆開得千重軟如爛金者佳其夾石及黑如鐵色者不可用時珍曰按獨孤滔丹房鏡源云背陰者雌黃也淄成者即黑色輕干如焦錫塊臭黃作者硬而無衣試法但於甲上磨之上色者好又燒尉斗底以雌劃之如赤黃線一道者好舶上來如噀血者上湘南者次之青者尤佳葉子者為上造化黃金非此不成亦能柔五金干汞轉硫黃伏粉霜又云雄黃變鐵雌黃變錫修治斆曰凡修事勿令婦人雞犬新犯淫人有患人不男人非形人及曾是刑獄臭穢之地犯之則雌黃黑如鐵色不堪用也反損人壽每四兩用天碧枝和陽草粟遂子草各五兩入瓷鍋中煮三伏時其色如金汁一垛在鍋底下用東流水猛投於中如此淘三度去水拭乾臼中搗篩研如塵用又曰雌得芹花立便成庾芹花一名立起草形如芍藥煮雌能住火也氣味辛平有毒別録曰大寒不入湯用土宿真君曰芎藭地黃獨帚益母羊不食草地榆五加皮瓦松冬瓜汁皆可制伏又雌見鉛及胡粉則黑主治惡瘡頭禿痂疥殺毒蟲蝨身癢邪氣諸毒煉之久服輕身增年不老本經蝕鼻內息肉下部𧈟瘡身面白駁散皮膚死肌及恍惚邪氣殺蜂蛇毒久服令人腦滿別録治冷痰勞嗽血氣蟲積心腹痛癲癇解毒時珍發明保升曰雌黃法土故色黃而主脾時珍曰雌黃雄黃同産但以山陽山陰受氣不同分別故服食家重雄黃取其得純陽之精也雌黃則兼有陰氣故爾若夫治病則二黃之功亦倣佛大要皆取其溫中搜肝殺蟲解毒祛邪焉爾附方舊七新五反胃吐食雌黃一分甘草生半分為末飯丸梧子大以五葉草糯米煎湯每服四丸聖濟録停痰在胃喘息不通呼吸欲絶雌黃一兩雄黃一錢為末化蠟丸彈子大每服一丸半夜時投熱糯米粥中食之濟生方心痛吐水不下飲食發止不定雌黃二兩醋二斤慢火煎成膏用干蒸餅和丸梧子大每服七丸薑湯下聖惠方婦人久冷血氣攻心痛不止以葉子雌黃二兩細研醋一升煎濃和丸小豆大每服十五丸醋湯下聖惠方小腹痛滿天行病小腹滿不得小便雌黃末蜜丸納尿孔中入半寸肘後方癲癇瘛瘲眼暗嚼舌雌黃黃丹炒各一兩為末入麝香少許以牛乳汁半升熬成膏和杵千下丸麻子大每溫水服三五丸直指方肺勞咳嗽雌黃一兩入瓦合內不固濟坐地上以灰培之厚二寸以炭一斤簇定頂火煅三分去一退火出毒為末蟾酥和丸粟米大每日空心杏仁湯下三丸斗門方久嗽暴嗽金粟丸用葉子雌黃一兩研以紙筋泥固濟小合子一個令乾盛藥水調赤石脂封口更以泥封待乾架在地上炭火十斤簇煅候火消三分之一去火候冷取出當如鏡面光明紅色鉢內細研蒸餅丸粟米大每服三丸五丸甘草水服服後睡良久勝金方腎消尿數乾薑半兩以鹽四錢炒黃成顆雌黃一兩半為末蒸餅和丸緑豆大每服十丸至三十丸空心鹽湯下聖濟録小便不禁顆塊雌黃一兩半研乾薑半兩鹽四錢同炒薑色黃為末水和蒸餅丸緑豆大每服十丸至二十丸空心鹽湯下之經驗方烏癩蟲瘡雌黃粉醋和雞子黃調塗之聖惠方牛皮頑癬雌黃末入輕粉和豬膏敷之直指方石膏本經中品釋名細理石別録寒水石綱目震享曰火煅細研醋調封丹灶其固密甚於脂膏此蓋兼質與能而得名正與石脂同意時珍曰其紋理細密故名細理石其性大寒如水故名寒水石與凝水石同名異物集解別録曰石膏生齊山山谷及齊盧山魯蒙山採無時細理白澤者良黃者令人淋弘景曰二郡之山即青州徐州也今出錢塘縣皆在地中雨後時時自出取之如棋子白徹最佳彭城者亦好近道多有而大塊用之不及彼也仙經不須此恭曰石膏方解石大體相似而以未破為異今市人皆以方解代石膏未見有真石膏也石膏生於石旁其方解不因石而生端然獨處大者如升小者如拳或在土中或生溪水其上皮隨土及水苔色破之方解大者方尺今人以此為石膏療風去熱雖同而解肌發汗不如真者大明曰石膏通亮理如雲母者上又名方解石斆曰凡使勿用方解石方解雖白不透明其性燥若石膏則出剡州茗山縣義情山其色瑩淨如水精性良善也頌曰石膏今汾孟虢耀州興元府亦有之生於山石上色至瑩白與方解石肌理形段剛柔絶相類今難得真者用時惟以破之皆作方稜者為方解石今石膏中時時有瑩徹可愛有縱理而不方解者或以為石膏然據本草又似長石或又謂青石間往往有白脈貫徹類肉之膏肪者為石膏此又本草所謂理石也不知石膏定是何物今且依市人用方解石爾閻孝忠曰南方以寒水石為石膏以石膏為寒水石正與汴京相反乃大誤也石膏潔白堅硬有牆壁寒水石則軟爛以手可碎外微青黑中有細紋又一種堅白全類石膏而敲之成方者名方解石也承曰陶言錢塘山中雨後時自出今錢塘人鑿山取之甚多搗作齒藥貨用浙人呼為寒水石入藥最勝他處者宗奭曰石膏紛辨不決未悉缺理本草只言生齊山盧山蒙山細理白澤者良即知他處者非石膏也震亨曰本草藥之命名多有意義或以色或以形或以氣或以質或以味或以能或以時是也石膏固濟丹爐苟非有膏豈能為用此蓋兼質與能而得名昔人以方解為石膏誤矣石膏味甘而辛本陽明經藥陽明主肌肉其甘也能緩脾益氣止渴去火其辛也能解肌出汗上行至頭又入太陰少陽彼方解石只有體重質堅性寒而已求其有膏而可為三經之主治者焉在哉時珍曰石膏有軟硬二種軟石膏大塊生於石中作層如壓扁米糕形每層厚數寸有紅白二色紅者不可服白者潔淨細紋短密如束針正如凝成白蠟狀鬆軟易碎燒之即白爛如粉其中明潔色帶微青而紋長細如白絲者名理石也與軟石膏乃一物二種碎之則形色如一不可辨矣硬石膏作塊而生直理起稜如馬齒堅白擊之則段段橫解光亮如雲母白石英有牆壁燒之亦易散仍硬不作粉其似硬石膏成塊擊之塊塊方解牆壁光明者名方解石也燒之則烢散亦不爛與硬石膏乃一類二種碎之則形色如一不可辨矣自陶弘景蘇恭大明雷斆蘇頌閻孝忠皆以硬者為石膏軟者為寒水石至朱震亨始斷然以軟者為石膏而後人遵用有驗千古之惑始明矣蓋昔人所謂寒水石者即軟石膏也所謂硬石膏者乃長石也石膏理石長石方解石四種性氣皆寒俱能去大熱結氣但石膏又能解肌發汗為異爾理石即石膏之類長石即方解之類俱可代用各從其類也今人以石膏收豆腐乃昔人所不知修治斆曰凡使石臼中搗成粉羅過生甘草水飛過澄曬篩研用時珍曰古法惟打碎如豆大絹包入湯煮之近人因其性寒火煅過用或糖拌炒過則不妨脾胃氣味辛微寒無毒別録曰甘大寒好古曰入足陽明手太陰少陽經氣分之才曰雞子為之使惡莽草巴豆馬目毒公畏鐵主治中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡本經除時氣頭痛身熱三焦大熱皮膚熱腸胃中結氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作浴湯別録治傷寒頭痛如裂壯熱皮如火燥和蔥煎茶去頭痛甄權治天行熱狂頭風旋下乳揩齒益齒大明除胃熱肺熱散陰邪緩脾益氣李杲止陽明經頭痛發熱惡寒日晡潮熱大渴引飲中暑潮熱牙痛元素發明成無己曰風陽邪也寒陰邪也風喜傷陽寒喜傷陰營衛陰陽為風寒所傷則非輕劑所能獨散必須輕重之劑同散之乃得陰陽之邪俱去營衛之氣俱和是以大青龍湯以石膏為使石膏乃重劑而又專達肌表也又云熱淫所勝佐以苦甘知母石膏之苦甘以散熱元素曰石膏性寒味辛而淡氣味俱薄體重而沉降也陰也乃陽明經大寒之藥善治本經頭痛牙痛止消渴中暑潮熱然能寒胃令人不食非腹有極熱者不宜輕用又陽明經中熱發熱惡寒燥熱日晡潮熱肌肉壯熱小便濁赤大渴引飲自汗苦頭痛之藥仲景用白虎湯是也若無以上諸證勿服之多有血虛發熱象白虎證及脾胃虛勞形體病證初得之時與此證同醫者不識而誤用之不可勝救也杲曰石膏足陽明藥也故仲景治傷寒陽明證身熱目痛鼻乾不得臥身以前胃之經也胸前肺之室也邪在陽明肺受火制故用辛寒以清肺氣所以有白虎之名又治三焦皮膚大熱入手少陽也凡病脈數不退者宜用之胃弱者不可用宗奭曰孫兆言四月以後天氣熱時宜用白虎但四方氣候不齊歲中運氣不一亦宜兩審其説甚雅時珍曰東垣李氏云立夏前多服白虎湯者令人小便不禁此乃降令太過也陽明津液不能上輸於肺肺之清氣亦復下降故爾甄立言古今録驗方治諸蒸病有五蒸湯亦是白虎加人參茯苓地黃葛根因病加減王燾外臺祕要治骨蒸勞熱久嗽用石膏紋如束針者一斤粉甘草一兩細研如面日以水調三四服言其無毒有大益乃養命上藥不可忽其賤而疑其寒名醫録言睦州楊士丞女病骨蒸內熱外寒衆醫不瘥處州吳醫用此方而體遂涼愚謂此皆少壯肺胃火盛能食而病者言也若衰暮及氣虛血虛胃弱者恐非所宜廣濟林訓導年五十病痰嗽發熱或令單服石膏藥至一斤許遂不能食而咳益頻病益甚遂至不起此蓋用藥者之瞀瞀也石膏何與焉楊士瀛云石膏煅過最能收瘡暈不至爛肌按劉跂錢乙傳云宗室子病嘔泄醫用溫藥加喘乙曰病本中熱奈何以剛劑燥之將不得前後溲宜與石膏湯宗室與醫皆不信後二日果來召乙曰仍石膏湯證也竟如言而愈又按古方所用寒水石是凝水石唐宋以來諸方所用寒水石即今之石膏也故寒水石諸方多附於後近人又以長石方解石為寒水石不可不辨之附方舊四新二十五傷寒發狂逾垣上屋寒水石二錢黃連一錢為末煎甘草冷服名鵲石散本事方風熱心躁口乾狂言渾身壯熱寒水石半斤燒半日淨地坑內盆合四面濕土擁起經宿取出入甘草末天竺黃各二兩龍腦二分糯米糕丸彈子大蜜水磨下集驗方解中諸毒方同上乳石發渴寒水石一塊含之以瘥為度聖濟録男女陰毒寒水石不拘多少為末用兩餾飯搗丸栗子大日乾每用一丸炭火煅紅燒研以滾酒調服飲蔥醋湯投之得汗愈蔡氏經驗必用方小兒丹毒寒水石末一兩和水塗之集玄方小兒身熱石膏一兩青黛一錢為末糕糊丸龍眼大每服一丸燈心湯化下普濟方骨蒸勞病外寒內熱附骨而蒸也其根在五臟六腑之中必因患後得之骨肉日消飲食無味或皮燥而無光蒸盛之時四肢漸細足趺腫起石膏十兩研如乳粉法水和服方寸匕日再以身涼為度外臺祕要熱盛喘嗽石膏二兩甘草炙半兩為末每服三錢生薑蜜調下普濟方痰熱喘嗽痰湧如泉石膏寒水石各五錢為末每入參湯服三錢保命集食積痰火瀉肺火胃火白石膏火煅出火毒半斤為末醋糊丸梧子大每服四五十丸白湯下丹溪方胃火牙疼好軟石膏一兩火煅淡酒淬過為末入防風荊芥細辛白芷五分為末日用揩牙甚效保壽堂方老人風熱內熱目赤頭痛視不見物石膏三兩竹葉五十片沙糖一兩粳米三合水三大盞煎石膏竹葉去滓取二盞煮粥入糖食養老方風邪眼寒乃風入頭系敗血凝滯不能上下流通故風寒客之而眼寒也石膏煅二兩川芎二兩甘草炙半兩為末每服一錢蔥白茶湯調下日二服宣明方頭風涕淚疼痛不已方同上鼻衄頭痛心煩石膏牡蠣各一兩為末每新汲水服二錢並滴鼻內普濟方筋骨疼痛因風熱者石膏三錢飛羅面七錢為末水和煅紅冷定滾酒化服被蓋取汗連服三日即除根筆峰雜興雀目夜昏百治不效石膏末每服一錢豬肝一片薄批摻藥在上纏定沙瓶煮熟切食之一日一服明目方濕溫多汗妄言煩渴石膏炙甘草等分為末每服二錢匕漿水調下龐安時傷寒論小便猝數非淋令人瘦石膏半斤搗碎水一斗煮五升每服五合肘後方小兒吐瀉黃色者傷熱也玉露散用石膏水石各五錢生甘草二錢半為末滾湯調服一錢錢乙小兒方水瀉腹鳴如雷有火者石膏火煅倉米飯和丸梧子大黃丹為衣米飲下二十丸不二服效李樓奇方乳汁不下石膏三兩水二升煮三沸三日飲盡妙子母祕録婦人乳癰一醉膏用石膏煅紅出火毒研每服三錢溫酒下添酒盡醉睡覺再進一服陳日華經驗方油傷火灼痛不可忍石膏末敷之良梅師方金瘡出血寒水石瀝青等分為末乾摻勿經水積德堂方刀瘡傷濕潰爛不生肌寒水石煅一兩黃丹二錢為末洗敷甚者加龍骨一錢孩兒茶一錢積德堂方瘡口不斂生肌肉止疼痛去惡水寒水石燒赤研二兩黃丹半兩為末摻之名紅玉散和劑局方口瘡咽痛上膈有熱寒水石煅三兩硃砂三錢半腦子半字為末摻之三因方附録玉火石頌曰密州九仙山東南隅地中出一種石青白而脆擊之內有火謂之玉火石彼醫用之其味甘微辛溫療傷寒發汗止頭目昏眩痛功與石膏等土人以當石膏用之龍石膏別録曰有名未用無毒主消渴益壽生杜陵如鐵脂中黃理石本經中品釋名肌石別録立制石本經時珍曰理石即石膏之順理而微硬有肌者故曰理石肌石弘景曰仙經時須呼為長理石石膽一名立制此今又名立制疑必相類集解別録曰理石如石膏順理而細生漢中山谷及廬山採無時弘景曰漢中屬梁州廬山屬青州今出寧州俗用亦稀恭曰此石夾兩石間如石脈打用之或在土中重疊而生皮黃赤肉白作斜理紋全不似石膏市人或刮削去皮以代寒水石並以當礜石並是假偽今廬山亦無此物見出襄州西泛水側宗奭曰理石如長石但理石如石膏順理而細其非順理而細者為長石療體亦不相遠時珍曰理石即石膏中之長紋細直如絲而明潔色帶微青者唐人謂石膏為寒水石長石為石膏故蘇恭言其不似石膏也此石與軟石膏一類二色亦可通用詳石膏下氣味辛寒無毒別録曰甘大寒之才曰滑石為之使惡麻黃主治身熱利胃解煩益精明目破積聚去三蟲本經除營衛中去來大熱結熱解煩毒止消渴及中風痿痹別録漬酒服療癖令人肥悅蘇恭附録白肌石別録有名未用曰味辛無毒主強筋骨止渴不飢陰熱不足一名肌石一名洞石生廣焦國卷山青石間時珍曰按此即理石也其形名氣味主療皆同長石本經中品釋名方石本經直石別録土石別録硬石膏綱目集解別録曰長石理如馬齒方而潤澤玉色生長子山谷及泰山臨淄採無時弘景曰長子縣屬上黨臨淄縣屬青州俗方仙經並無用此者恭曰此石狀同石膏而厚大縱理而長紋似馬齒今均州遼阪山有之土人以為理石頌曰今惟潞州有之如蘇恭所説按本經理石長石二物味效亦別又云理石似石膏順理而細陶隱居言亦呼為長理石今靈寶丹用長理石為一物醫家相承用者乃似石膏與今潞州所出長石無異而諸郡無復出理石者醫方亦不見單用往往呼長石為長理石時珍曰長石即俗呼硬石膏者狀似軟石膏而塊不扁性堅硬潔白有粗理起齒稜擊之則片片橫碎光瑩如雲母白石英亦有牆壁似方解石但不作方塊爾燒之亦不粉爛而易散方解燒之亦然但烢聲為異爾昔人以此為石膏以為方解今人以此為寒水石皆誤矣但與方解乃一類二種故亦名方石氣味功力相同通用無妨唐宋諸方所用石膏多是此石昔醫亦以取效則亦可與石膏通用但不可解肌發汗耳氣味辛苦寒無毒主治身熱胃中結氣四肢寒厥利小便通血脈明目去翳眇下三蟲殺蠱毒久服不飢本經止消渴下氣除脅肋肺間邪氣別録方解石別録下品釋名黃石志曰敲破塊塊方解故以為名集解別録曰方解石生方山採無時弘景曰本經長石一名方石療體相似疑即此也恭曰此物大體與石膏相似不附石而生端然獨處大者如升小者如拳甚大者方尺或在土中或生溪水其上皮隨土及水苔色破之方解今人以為石膏用療風去熱雖同而解肌發汗不及也志曰今沙州大鳥山出者佳頌曰方解石本草言生方山陶隱居疑與長石為一物蘇恭云療熱不減石膏若然似可通用但主頭風不及石膏也其肌理形段剛柔皆同但以附石不附石為言豈得功力頓異如雌黃雄黃亦有端然獨處者亦有附石生者不聞別有名號功力相異也時珍曰方解石與硬石膏相似皆光潔如白石英但以敲之段段片碎者為硬石膏塊塊方稜者為方解石蓋一類二種亦可通用唐宋諸方皆以此為石膏今人又以為寒水石雖俱不是而其性寒治熱之功大抵不相遠惟解肌發汗不能如硬石膏為異爾氣味苦辛大寒無毒之才曰惡巴豆主治胸中留熱結氣黃疸通血脈去蠱毒別録滑石本經上品釋名畫石衍義液石別録膋石音遼脫石音奪冷石弘景番石別録共石宗奭曰滑石今謂之畫石因其軟滑可寫畫也時珍曰滑石性滑利竅其質又滑膩故以名之表畫家用刷紙代粉最白膩膋乃脂膏也因以名縣脫乃肉無骨也此物最滑膩無硬者為良故有諸名集解別録曰滑石生赭陽山谷及泰山之陰或掖北白山或卷山採無時弘景曰滑石色正白仙經用之為泥今出湘州始安郡諸處初取軟如泥久漸堅強人多以作冢中明器物赭陽屬南陽掖縣屬青州東萊卷縣屬司州滎陽又有冷石小青黃並冷利能尉油汙衣物恭曰此石所在皆有嶺南始安出者白如凝脂極軟滑出掖縣者理粗質青有黑點惟可為器不可入藥齊州南山神通寺南谷亦大有色青白不佳而滑膩則勝藏器曰始安掖縣所出二石形質既異所用又殊始安者軟滑而白宜入藥東萊者硬澀而青乃作器石也斆曰凡使有多般其白滑石如方解石色似冰白畫石上有白膩紋者真也烏滑石似醫畫石上有青白膩紋入用亦妙緑滑石性寒有毒不入藥用黃滑石似金顆顆圓畫石上有青黑色者勿用殺人冷滑石青蒼色畫石上作白膩紋亦勿用之頌曰今道永萊濠州皆有之凡二種道永州出者白滑如凝脂南越志云膋城縣出膋石即滑石也土人以為燒器烹魚食是也萊濠州出者理粗質青有黑點亦謂之斑石二種皆可作器甚精好初出軟柔彼人就穴中製作用力殊少也本草所載土地皆是北方而今醫家所用白色者自南方來或云沂州所出甚白佳與本草所云泰山之陰相合而彼土不取為藥今濠州所供青滑石云性寒無毒主心氣澀滯與本經大同小異又張勃吳録地理志及大康地記云鬱林州布山縣馬湖馬嶺山皆有虺甚毒殺人有冷石可以解之石色赤黑味苦屑之著瘡中並以切齒立蘇一名切齒石今人多用冷石作粉治痱瘡或云即滑石也但味之甘苦不同爾時珍曰滑石廣之桂林各邑及瑤洞中皆出之即古之始安也白黑二種功皆相似山東蓬萊縣桂府村所出者亦佳故醫方有桂府滑石與桂林者同稱也今人亦以刻圖書不甚堅牢滑石之根為不灰木滑石中有光明黃子為石腦芝修治斆曰凡用白滑石先以刀刮淨研粉以牡丹皮同煮一伏時去牡丹皮取滑石以東流水淘過曬乾用氣味甘寒無毒別録曰大寒之才曰石葦為之使惡曾青制雄黃主治身熱泄澼女子乳難癃閉利小便蕩胃中積聚寒熱益精氣久服輕身耐飢長年本經通九竅六腑津液去留結止渴令人利中別録燥濕分水道實大腸化食毒行積滯逐凝血解燥渴補脾胃降心火偏主石淋為要藥震亨療黃疸水腫腳氣吐血衄血金瘡血出諸瘡腫毒時珍發明頌曰古方治淋瀝多單使滑石又與石葦同搗末飲服刀圭更快又主石淋發煩悶取十二分研粉分作兩服水調下煩熱定即停後服權曰滑石療五淋主産難服其末又末與丹參蜜豬脂為膏入其月即空心酒下彈丸大臨産倍服令胎滑易生除煩熱心躁元素曰滑石氣溫味甘治前陰竅澀不利性沉重能泄上氣令下行故曰滑則利竅不與諸淡滲藥同好古曰入足太陽經滑能利竅以通水道為至燥之劑豬苓湯用滑石阿膠同為滑劑以利水道蔥豉生薑同煎去滓澄清以解利淡味滲泄為陽故解表利小便也若小便自利者不宜用時珍曰滑石利竅不獨小便也上能利毛腠之竅下能利精溺之竅蓋甘淡之味先入於胃滲走經絡遊溢津氣上輸於肺下通膀胱肺主皮毛為水之上源膀胱司津液氣化則能出故滑石上能發表下利水道為蕩熱燥濕之劑發表是蕩上中之熱利水道是蕩中下之熱發表是燥上中之濕利水道是燥中下之濕熱散則三焦寧而表裡和濕去則闌門通而陰陽利劉河間之用益元散通治表裡上下諸病蓋是此意但未發出爾附方舊六新一十三益元散又名天水散太白散六一散解中暑傷寒疫癘飢飽勞損憂愁思慮驚恐悲怒傳染並汗後遺熱勞復諸疾兼解兩感傷寒百藥酒食邪熱毒治五勞七傷一切虛損內傷陰痿驚悸健忘癇瘛煩滿短氣痰嗽肌肉疼痛腹脹悶痛淋閟澀痛服石石淋療身熱嘔吐泄瀉腸澼下痢赤白除煩熱胸中積聚寒熱止渴消畜水婦人産後損液血虛陰虛熱甚催生下乳治吹乳乳癰牙瘡齒疳此藥大養脾腎之氣通九竅六腑去留結益精氣壯筋骨和氣通經脈消水穀保真元明耳目安魂定魄強志輕身駐顏益壽耐勞役飢渴乃神驗之仙藥也白滑石水飛過六兩粉甘草一兩為末每服三錢蜜少許溫水調下實熱用新汲水下解利用蔥豉湯下通乳用豬肉麵湯調下催生用香油漿下凡難産或死胎不下皆由風熱燥澀結滯緊斂不能舒緩故也此藥力至則結滯頓開而瘥矣劉河間傷寒直格膈上煩熱多渴利九竅滑石二兩搗水三大盞煎二盞去滓入粳米煮粥食聖惠女勞黃疸日晡發熱惡寒小腹急大便溏黑額黑滑石石膏等分研末大麥汁服方寸匕日三小便大利愈腹滿者難治千金方傷寒衄血滑石末飯丸梧子大每服十丸微嚼破新水咽下立止湯晦叔云鼻衄乃當汗不汗所致其血紫黑時不以多少不可止之且服溫和藥調其營衛待血鮮時急服此藥止之也本事方乳石發動煩熱煩渴滑石粉半兩水一盞絞白汁頓服聖惠方暴得吐逆不下食生滑石末二錢匕溫水服仍以細面半盞押定寇氏衍義氣壅關格不通小便淋結臍下煩悶兼痛滑石粉一兩水調服廣利方小便不通滑石末一升以車前汁和塗臍之四畔方四寸干即易之冬月水和楊氏産乳婦人轉脬因過忍小便而致滑石末蔥湯服二錢聖惠方妊娠子淋不得小便滑石末水和泥臍下二寸外臺祕要伏暑水泄白龍丸滑石火煅過一兩硫黃四錢為末麵糊丸緑豆大每用淡薑湯隨大小服普濟方伏暑吐泄或吐或泄或瘧小便赤煩渴玉液散用桂府滑石燒四兩藿香一錢丁香一錢為末米湯服二錢普濟方霍亂及瘧方同上痘瘡狂亂循衣摸床大熱引飲用益元散加硃砂二錢冰片三分麝香一分每燈草湯下二三服王氏痘疹方風毒熱瘡遍身出黃水桂府滑石末敷之次日愈先以虎杖豌豆甘草等分煎湯洗後乃搽普濟方陰下濕汗滑石一兩石膏煅半兩枯白礬少許研摻之集簡方腳指縫爛方同上杖瘡腫痛滑石赤石脂大黃等分為末茶湯洗淨貼趙氏經驗方熱毒怪病目赤鼻脹大喘渾身出斑毛髮如鐵乃因中熱毒氣結於下焦用滑石白礬各一兩為末作一服水三碗煎減半冷不住飲之夏子益奇疾方不灰木宋開寶釋名無灰木見下集解頌曰不灰木出上黨今澤潞山中皆有之蓋石類也其色白如爛木燒之不燃以此得名或云滑石之根也出滑石處皆有之採無時藏器曰要燒成灰但斫破以牛乳煮了黃牛糞燒之即成灰時珍曰不灰木有木石二種石類者其體堅重或以紙裹蘸石腦油燃燈徹夜不成灰人多用作小刀靶開山圖云徐無山出不灰之木生火之石山在今順天府玉田縣東北庚辛玉册云不灰木陰石也生西南蠻夷中黎州茂州者好形如針文全若木燒之無煙此皆言石者也伏深齊地記云東武城有勝火木其木經野火燒之不滅謂之不灰木楊慎丹鉛録云太平寰宇記云不灰木俗多為鋌子燒之成炭而不灰出膠州其葉如蒲草今人束以為燎謂之萬年火把此皆言木者也時珍常得此火把乃草葉束成而中夾松脂之類一夜僅燒一二寸爾氣味甘大寒無毒獨孤滔曰煮汞結草砂煅三黃匱五金主治熱痱瘡和棗葉石灰為粉敷之開寶除煩熱陽厥時珍發明時珍曰不灰木性寒而同諸熱藥治陰毒劉河間宣明方治陽絶心腹痞痛金針丸中亦用服之蓋寒熱並用所以調停陰陽也附方新四肺熱咳嗽臥時盛者不灰木一兩半太陰玄精石二兩甘草炙半兩貝母一兩半天南星白礬水煮過半兩為末每服半錢薑湯下聖濟録咽喉腫痛五心煩熱不灰木以牛糞燒赤四兩太陰玄精石煅赤四兩真珠一錢為末糯米粥丸芡子大每服一丸以生地黃汁粟米泔研化服日二次聖濟録霍亂煩滿氣逆腹脹手足厥冷不灰木陽起石煅阿魏各半兩巴豆去心杏仁去皮各二十五個為末粟飯丸櫻桃大穿一孔每服一丸燈上燒煙盡研末米薑湯下以利為度聖濟録陰毒腹痛回陽丹用不灰木煅牡蠣煅高良薑炒川烏頭炮白芍藥各一錢為末入麝香少許每用一錢男用女唾調塗外腎女用男唾調塗乳上得汗即愈玉機微義附録松石頌曰今處州出一種松石如松干而實石也或云松久化為石人多取飾山亭及琢為枕雖不入藥與不灰相類故附之五色石脂本經上品校正併入五種石脂釋名時珍曰膏之凝者曰脂此物性黏固濟爐鼎甚良蓋兼體用而言也集解別録曰五色石脂生南山之陽山谷中又曰青石脂生齊區山及海涯黃石脂生嵩高山色如鶯雛黑石脂生潁川陽城白石脂生泰山之陰赤石脂生濟南射陽又泰山之陰並採無時普曰五色石脂一名五色符青符生南山或海涯黃符生嵩山色如豚腦雁雛黑符生洛西山空地白符生少室天婁山或泰山赤符生少室或泰山色絳滑如脂弘景曰今俗惟用赤石白石二脂好者出吳郡亦出武陵建平義陽義陽者出鄳縣界東八十里狀如豚腦赤者鮮紅可愛隨採復生餘三色石脂無正用但黑石脂入畫用爾恭曰義陽即申州所出乃桃花石非石脂也白石脂今出慈州諸山勝於余處者赤石脂今出虢州盧氏縣澤州陵川縣又慈州呂鄉縣宜州諸山亦有並色理鮮膩為佳二脂泰山不聞有之舊出蘇州餘杭山今不收採承曰今蘇州見貢赤白二石脂但入藥不甚佳惟延州山中所出最良揭兩石中取之頌曰白石脂赤石脂今惟潞州出之潞與慈州相近也宗奭曰赤白石脂四方皆有以理膩黏舌綴唇者為上修治斆曰凡使赤脂研如粉新汲水飛過三度曬乾用時珍曰亦有火煅水飛者氣味五種石脂並甘平大明曰並溫無毒畏黃芩大黃官桂主治黃疸泄痢腸澼膿血陰蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五石脂各隨五色補五臟本經治泄痢血崩帶下吐血衄血澀精淋瀝除煩療驚悸壯筋骨補虛損久服悅色治瘡癤痔漏排膿大明青石脂氣味酸平無毒普曰青符神農甘雷公酸無毒桐君辛無毒李當之小寒主治養肝膽氣明目療黃疸泄痢腸澼女子帶下百病及疽痔惡瘡久服補髓益氣不飢延年別録黃石脂氣味苦平無毒普曰黃符雷公苦李當之小寒之才曰曾青為之使惡細辛畏蜚蠊黃連甘草斆曰服之忌卵味主治養脾氣安五臟調中大人小兒泄痢腸澼下膿血去白蟲除黃疸癰疽蟲久服輕身延年別録黑石脂別録曰一名石墨一名石涅時珍曰此乃石脂之黑者亦可為墨其性黏舌與石炭不同南人謂之畫眉石許氏説文云黛畫眉石也氣味咸平無毒普曰黑符桐君甘無毒主治養腎氣強陰主陰蝕瘡止腸澼泄痢療口瘡咽痛久服益氣不飢延年別録白石脂氣味甘酸平無毒普曰白符一名隨岐伯雷公酸無毒桐君甘無毒扁鵲辛李當之小寒權曰甘辛杲曰溫之才曰得厚朴米汁飲止便膿燕屎為之使惡松脂畏黃芩頌曰畏黃連甘草飛廉馬目毒公主治養肺氣厚腸補骨髓療五臟驚悸不足心下煩止腹痛下水小腸澼熱溏便膿血女子崩中漏下赤白沃排癰疽瘡痔久服安心不飢輕身延年別録澀大腸甄權附方舊四新二小兒水痢形羸不勝湯藥白石脂半兩研粉和白粥空肚食之子母祕録小兒滑泄白龍丸白石脂白龍骨等分為末水丸黍米大每量大小木瓜紫蘇湯下全幼心鑑久泄久痢白石脂乾薑等分研百沸湯和麵為稀糊搜之並手丸梧子大每米飲下三十丸斗門方兒臍汁出赤腫白石脂末熬溫撲之日三度勿揭動韋宙獨行方兒臍血出多啼方同上寇氏衍義粉滓面皯白石脂六兩白蘞十二兩為末雞子白和夜塗旦洗聖濟録赤石脂氣味甘酸辛大溫無毒普曰赤符神農雷公甘黃帝扁鵲無毒李當之小寒之才曰畏芫花惡大黃松脂頌曰古人亦單服食云發則心痛飲熱酒不解用綿裹蔥豉煮水飲之主治養心氣明目益精療腹痛腸澼下痢赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出久服補髓好顏色益智不飢輕身延年別録補五臟虛乏甄權補心血生肌肉厚腸胃除水濕收脫肛時珍發明弘景曰五色石脂本經療體亦相似別録分條具載今俗惟用赤白二脂斷下痢耳元素曰赤白石脂俱甘酸陽中之陰固脫杲曰降也陽中陰也其用有二固腸胃有收斂之能下胎衣無推蕩之峻好古曰澀可去脫石脂為收斂之劑赤入丙白入庚時珍曰五石脂皆手足陽明藥也其味甘其氣溫其體重其性澀澀而重故能收濕止血而固下甘而溫故能益氣生肌而調中中者腸胃肌肉驚悸黃疸是也下者腸澼泄痢崩帶失精是也五種主療大抵相同故本經不分條目但云各隨五色補五臟別録雖分五種而性味主治亦不甚相遠但以五味配五色為異亦是強分爾赤白二種一入氣分一入血分故時用尚之張仲景用桃花湯治下痢便膿血取赤石脂之重澀入下焦血分而固脫乾薑之辛溫暖下焦氣分而補虛粳米之甘溫佐石脂乾薑而潤腸胃也附方舊五新七小兒疳瀉赤石脂末米飲調服半錢立瘥加京芎等分更妙斗門方大腸寒滑小便精出赤石脂乾薑各一兩胡椒半兩為末醋糊丸梧子大每空心米飲下五七十丸有人病此熱藥服至一斗二升不效或教服此終四劑而愈寇氏衍義赤白下痢赤石脂末飲服一錢普濟方冷痢腹痛下白凍如魚腦桃花丸赤石脂煅乾薑炮等分為末蒸餅和丸量大小服日三服和劑局方老人氣痢虛冷赤石脂五兩水飛白麵六兩水煮熟入蔥醬作臛空心食三四次即愈養老方傷寒下痢便膿血不止桃花湯主之赤石脂一斤一半全用一半末用乾薑一兩粳米半升水七升煮米熟去滓每服七合納末方寸匕日三服愈乃止仲景方痢後脫肛赤石脂伏龍肝為末敷之一加白礬錢氏小兒方反胃吐食絶好赤石脂為末蜜丸梧子大每空腹薑湯下一二十丸先以巴豆仁一枚勿令破以津吞之後乃服藥聖惠方痰飲吐水無時節者其原因冷飲過度遂令脾胃氣弱不能消化飲食飲食入胃皆變成冷水反吐不停赤石脂散主之赤石脂一斤搗篩服方寸匕酒飲自任稍加至三匕服盡一斤則終身不吐痰水又不下痢補五臟令人肥健有人痰飲服諸藥不效用此遂愈千金翼方心痛徹背赤石脂乾薑蜀椒各四分附子炮二分烏頭炮一分為末蜜丸梧子大先食服一丸不知稍增之張仲景金匱方經水過多赤石脂破故紙一兩為末每服二錢米飲下普濟方小便不禁赤石脂煅牡蠣煅各三兩鹽一兩為末糊丸梧子大每鹽湯下十五丸普濟方桃花石唐本草集解恭曰桃花石出申州鐘山縣似赤石脂但舐之不著舌者是也珣曰其狀亦似紫石英色若桃花光潤而重目之可愛頌曰今信州有之形塊似赤石脂紫石英輩採無時陶弘景言赤石脂出義陽者狀如豚腦鮮紅可愛蘇恭非之云是桃花石久服肥人今土人以療痢功用亦不相遠宗奭曰桃花石有赤白二種有赤地淡白點如桃花片者有淡白地赤點如桃花片者人往往鐫磨為器用人亦罕服之時珍曰此即赤白石脂之不黏舌堅而有花點者非別一物也故其氣味功用皆同石脂昔張仲景治痢用赤石脂名桃花湯和劑局方治冷痢有桃花丸皆即此物耳氣味甘溫無毒主治大腸中冷膿血痢久服令人肥悅能食唐本爐甘石綱目釋名爐先生土宿真君曰此物點化為神藥絶妙九天三清俱尊之曰爐先生非小藥也時珍曰爐火所重其味甘故名集解時珍曰爐甘石所在坑冶處皆有川蜀湘東最多而太原澤州陽城高平靈丘融縣及雲南者為勝金銀之苗也其塊大小不一狀似羊腦松如石脂亦黏舌産於金坑者其色微黃為上産於銀坑者其色白或帶青或帶緑或粉紅赤銅得之即變為黃今之黃銅皆此物點化也造化指南云爐甘石受黃金白銀之氣薰陶三十年方能結成以大穢浸及砒煮過皆可點化不減三黃崔昉外丹本草云用銅一斤爐甘石一斤煉之即成鍮石一斤半非石中物取出乎真鍮石生波斯如黃金燒之赤而不黑修治時珍曰凡用爐甘石以炭火煅紅童子小便淬七次水洗淨研粉水飛過曬用氣味甘溫無毒主治止血消腫毒生肌明目去翳退赤收濕除爛同龍腦點治目中一切諸病時珍發明時珍曰爐甘石陽明經藥也受金銀之氣故治目病為要藥時珍常用爐甘石煅淬海螵蛸硼砂各一兩為細末以點諸目病甚妙入硃砂五錢則性不黏也附方新十五目暴赤腫爐甘石火煅尿淬風化硝等分為末新水化一粟點之御藥院方諸般翳膜爐甘石青礬朴硝等分為末每用一字沸湯化開溫洗日三次宣明方一切目疾真爐甘石半斤用黃連四兩銼豆大銀石器內水二碗煮二伏時去黃連為末入片腦二錢半研勻罐收每點少許頻用取效又方爐甘石煅一錢盆硝一錢為末熱湯泡洗目中諸病石連光明散治眼中五輪八廓諸證神效爐甘石半斤取如羊腦鴨頭色者以桑柴灰一斗火煅赤研末用雅州黃連各四兩切片煎水浸石澄取粉曬乾用鉛粉二定以二連水浸過炒之雄黃研末每用甘石鉛粉各三分雄黃一分片腦半分研勻點眼甚妙張氏方目暗昏花爐甘石火煅童尿淬七次代赭石火煅醋淬七次黃丹水飛各四兩為末白沙蜜半斤以銅鐺煉去白沫更添清水五六碗熬沸下藥文武火熬至一碗滴水不散以夾紙濾入瓷器收之頻點日用衛生易簡方爛弦風眼劉長春方治風眼流淚爛弦白爐甘石四兩火煅童尿淬七次地上出毒三日細研每用椒湯洗目後臨臥點三四次次早以茶湯洗去甚妙又方爐甘石一斤火煅黃連四兩煎水淬七次為末入片腦每用點目宣明眼科方用爐甘石石膏各一錢海螵蛸三分為末入片腦麝香各少許收點衛生易簡方用爐甘石二兩以黃連一兩煎水入童尿半盞再熬下朴硝一兩又熬成以火煅石淬七次洗淨為末入蜜陀僧末一兩研勻收點之聤耳出汁爐甘石礬石各二錢胭脂半錢麝香少許為末繳淨吹之普濟方齒疏陷物爐甘石煅寒水石等分為末每用少許擦牙忌用刷牙久久自密集玄方漏瘡不合童尿制爐甘石牡蠣粉外塞之內服滋補藥雜病治例下疳陰瘡爐甘石火煅醋淬五次一兩孩兒茶三錢為末麻油調敷立愈通妙邵真人方陰汗濕癢爐甘石一分真蚌粉半分研粉撲之直指方井泉石宋嘉祐釋名時珍曰性寒如井泉故名集解禹錫曰井泉石近道處處有之以出饒陽郡者為勝生田野中間穿地深丈餘得之形如土色圓方長短大小不等內實而外圓重重相疊採無時又一種如薑石者時人多指為井泉石非是頌曰深州城西二十里劇家村出之修治禹錫曰凡用細研水飛過不爾令人淋氣味甘大寒無毒主治諸熱解心臟熱結熱嗽小兒熱疳雀目青盲眼赤腫痛消腫毒得決明菊花療小兒眼疳生翳膜得大黃梔子治眼瞼腫赤嘉祐附方新四膀胱熱閉小便不快井泉石海金沙車前子滑石各一兩為末每服二錢蜜湯下聖濟録風毒赤目井泉石半兩井中苔焙穀精草一兩豉焙一合為末每服二錢空心井華水服聖濟録産後搐搦俗名雞爪風舒筋散用井泉石四兩另研天麻酒浸木香各一兩人參川芎官桂丁香各半兩為末每服三錢大豆淋酒調下出汗即愈宣明方痤痱瘙癢井泉石生三兩寒水石煅四兩腦子半錢為末撲之聖濟録無名異宋開寶釋名時珍曰無名異瘦詞也集解志曰無名異出大食國生於石上狀如黑石炭番人以油煉如黳石嚼之如餳頌曰今廣州山石中及宜州南八里龍濟山中亦有之黑褐色大者如彈丸小者如黑石子採無時斆曰無名異形似石炭味別時珍曰生川廣深山中而桂林極多一包數百枚小黑石子也似蛇黃而色黑近處山中亦時有之用以煮蟹殺腥氣煎煉桐油收水氣塗剪剪燈則燈自斷也氣味甘平無毒頌曰咸寒伏硫黃主治金瘡折傷內損止痛生肌肉開寶消腫毒癰疽醋磨敷之蘇頌收濕氣時珍發明時珍曰按雷斆炮炙論序云無名止楚截指而似去甲毛崔昉外丹本草云無名異陽石也昔人見山雞被網損其足脫去銜一石摩其損處遂愈而去乃取其石理傷折大效人因傅之附方新十一打傷腫痛無名異為末酒服趕下四肢之末血皆散矣集驗方損傷接骨無名異甜瓜子各一兩乳香沒藥各一錢為末每服五錢熱酒調服小兒三錢服畢以黃米粥塗紙上摻左顧牡蠣末裹之竹篦夾住多能鄙事臨杖預服無名異末臨時溫服三五錢則杖不甚痛亦不甚傷談野翁試效方赤瘤丹毒無名異末蔥汁調塗立消簡便方痔漏腫痛無名異炭火煅紅米醋淬七次為細末以溫水洗瘡綿裹箸頭填末入瘡口數次愈簡便方天泡濕瘡無名異末井華水調服之普濟方臁瘡潰爛無名異虢丹細研清油調搽濕則干搽之濟急方股陰𤷍癧無名異二錢麝香一字研酒半碗午後空腹服立效多能鄙事拳毛倒睫無名異末紙卷作捻點燈吹殺熏之睫自起保命集消渴引飲無名異一兩黃連二兩為末蒸餅丸緑豆大每服百丸以茄根蠶繭煎湯送下聖濟録腳氣痛楚無名異末化牛皮膠調塗之頻換衛生易簡方蜜栗子綱目集解時珍曰蜜栗子生川廣江浙金坑中狀如蛇黃而有刺上有金線纏之色紫褐亦無名異之類也丹爐家採作五金匱藥制三黃主治金瘡折傷有效時珍石鐘乳本經上品釋名公乳別録虛中吳普蘆石別録鵝管石綱目夏石別録黃石砂藥性時珍曰石之津氣鍾聚成乳滴溜成石故名石鐘乳蘆與鵝管象其空中之狀也集解別録曰石鐘乳生少室山谷及泰山採無時普曰生泰山山谷陰處岸下溜汁所成如乳汁黃白色空中相通二月三月採陰乾弘景曰第一齣始興而江陵及東境名山石洞亦皆有惟通中輕薄如鵝翎管碎之如爪甲中無雁齒光明者為善長挺乃有一二尺者色黃以苦酒洗刷則白仙經少用而俗方所重恭曰第一始興其次廣連澧朗郴等州者雖厚而光潤可受餌之並佳今峽州青溪房州三洞出者亞於始興自余非其土地不可輕服多發淋渴止可搗篩白練裹之合諸藥草浸酒服之陶云有一二尺者謬説也思邈曰乳石必須土地清白光潤羅紋鳥翮蟬翼一切皆成白者可用其非土地者慎勿服之殺人甚於鴆毒志曰別本注云凡乳生於深洞幽穴皆龍蛇潛伏或龍蛇毒氣或洞口陰陽不均或通風氣雁齒澀或黃或赤乳無潤澤或煎煉火色不調一煎以後不易水則生火毒服即令人發淋又乳有三種石乳者其山洞純石以石津相滋陰陽交備蟬翼紋成其性溫竹乳者其山洞遍生小竹以竹津相滋乳如竹狀其性平茅山之乳者其山有土石相雜遍生茅草以茅津相滋為乳乳色稍黑而滑潤其性微寒一種之中有上中下色皆以光澤為好余處亦有不可輕信炳曰如蟬翅者上爪甲者次鵝管者下明白而薄者可服頌曰今道州江華縣及連英韶階峽州山中皆有之生巖穴陰處溜山液而成空中相通長者六七寸如鵝翎管狀色白微紅唐李補闕煉乳法云取韶州鍾乳無問厚薄但令顏色明淨光澤者即堪入煉惟黃赤二色不任用柳宗元書亦云取其色之美而已不必惟土之信是此藥所重惟在明白者不必如上所説數種也今醫家但以鵝管中空者為最又本經中品載殷蘖云鍾乳根也孔公蘖殷蘖根也石花石床並與殷蘖同又有石腦亦鍾乳之類凡此五種醫家亦復稀用但用鍾乳爾時珍曰按范成大桂海志所説甚詳明云桂林接宜融山洞穴中鍾乳甚多仰視石脈湧起處即有乳床白如玉雪石液融結成者乳床下垂如倒數峰小山峰端漸鋭且長如冰柱柱端輕薄中空如鵝翎乳水滴瀝不已且滴且凝此乳之最精者以竹管仰承取之煉治家又以鵝管之端尤輕明如雲母爪甲者為勝修治斆曰凡使勿用頭粗厚並尾大者為孔公石不用色黑及經大火驚過並久在地上收者曾經藥物制者並不得用須要鮮明薄而有光潤者似鵝翎筒子為上有長五六寸者凡修事法鍾乳八兩用沉香零陵香藿香甘松白茅各一兩水煮過再煮汁方用煮乳一伏時漉出以甘草紫背天葵各二兩同煮漉出拭乾緩火焙之入臼杵粉篩過入鉢中令有力少壯者二三人不住研三日三夜勿歇然後以水飛澄過絹籠於日中曬乾入鉢再研二萬遍乃以瓷盒收之慎微曰太清經煉鍾乳法取好細末置金銀器中瓦一片密蓋勿令泄氣蒸之自然化作水也李補闕煉乳法見後氣味甘溫無毒普曰神農辛桐君黃帝醫和甘扁鵲甘無毒權曰有大毒之才曰蛇床為之使惡牡丹玄石牡蒙畏紫石英蘘草忌羊血時珍曰相感志云服乳石忌參術犯者多死土宿真君曰鍾乳産於陽洞之內陽氣所結伏之可柔五金麥門冬獨蒜韭實胡蔥胡荽貓兒眼草皆可伏之主治咳逆上氣明目益精安五臟通百節利九竅下乳汁本經益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽好顏色不老令人有子不煉服之令人淋別録主泄精寒嗽壯元氣益陽事通聲甄權補五勞七傷大明補髓治消渴引飲青霞子發明慎微曰柳宗元與崔連州書云草木之生也依於土有居山之陰陽或近木或附石其性移焉況石鐘乳直産於石石之精粗疏密尋尺特異而穴之上下土之厚薄石之高下不可知則其依而産者固不一性然由其精密而出者則油然而清炯然而輝其竅滑以夷其肌廉以微食之使人榮華溫柔其氣宣流生胃通腸壽考康寧其粗疏而下者則奔突結澀乍大乍小色如枯骨或類死灰奄悴不發叢齒積纇重濁頑璞食之使人偃蹇壅鬱泄火生風戟喉癢肺幽關不聰心煩喜怒肝舉氣剛不能平和故君子慎取其色之美而不必惟土之信以求其至精凡為此也震享曰石鐘乳為剽悍之劑內經云石藥之氣悍仁哉言也凡藥氣之偏者可用於暫而不可久夫石藥又偏之甚者也自唐時太平日久膏粱之家惑於方士服食致長生之説以石藥體厚氣厚習以成俗逮宋至今猶未已也斯民何辜受此氣悍之禍而莫之能救哀哉本草贊其久服延年之功柳子厚又從而述美之豫不得不深言也時珍曰石鐘乳乃陽明經氣分藥也其氣慓疾令陽氣暴充飲食倍進而形體壯盛昧者得此自慶益肆淫泆精氣暗損石氣獨存孤陽愈熾久之營衛不從發為淋渴變為癰疽是果乳石之過耶抑人之自取耶凡人陽明氣衰用此合諸藥以救其衰疾平則止夫何不可五穀五肉久嗜不已猶有偏絶之弊況石藥乎種樹書云凡果樹作穴納鍾乳末少許固密則子多而味美納少許於老樹根皮間則樹復茂信然則鍾乳益氣令人有子之説亦可類推但恐嗜欲者未獲其福而先受其禍也然有稟賦異常之人又不可執一而論張杲醫説載武帥雷世賢多侍妾常餌砂母鍾乳日夜煎煉以濟其欲其妾父苦寒泄不嗜食求丹十粒服之即覺臍腹如火少焉熱狂投井中救出遍身發紫泡數日而死而世賢服餌千計了無病惱異哉沈括筆談載夏英公性豪侈而稟賦異於人才睡即身冷而僵如死者常服仙茅鍾乳硫黃莫知紀極每晨以鍾乳粉入粥食之有小吏竊食遂發疽死此與終身服附子無恙者同一例也沈括又云醫之為術苟非得之於心未見能臻其妙也如服鍾乳當終身忌術術能動鍾乳也然有藥勢不能蒸須要其動而激發者正如火少必借風氣鼓之而後發火盛則鼓之反為害此自然之理也凡服諸藥皆宜仿此又十便良方云凡服乳人服乳三日即三日補之服乳十日即十日補之欲飽食以牛羊獐鹿等骨煎汁任意作羹食之勿食倉米臭肉及犯房事一月後精氣滿盛百脈流通身體覺熱繞臍肉起此為得力可稍近房事不可頻數令藥氣頓竭彌更害人戒之慎之名之為乳以其狀人之乳也與神丹相配與凡石迥殊故乳稱石語云上士服石服其精下士服石服其滓滓之與精其力遠也此説雖明快然須真病命門火衰者宜之否則當審附方新十一李補闕服乳法主五勞七傷咳逆上氣治寒嗽通音聲明目益精安五臟通百節利九竅下乳汁益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽不老令人有子取韶州鍾乳無問厚薄但顏色明淨光澤者即堪入煉惟黃赤二色不任用置於金銀器中大鐺著水沉器煮之令如魚眼沸水減即添乳少三日三夜乳多七日七夜候乾色變黃白即熟如疑生更煮滿十日最佳取出去水更以清水煮半日其水色清不變即止乳無毒矣入瓷鉢中玉槌著水研之覺乾澀即添水常令如稀米泔狀研至四五日揩之光膩如書中白魚便以水洗之不隨水落者即熟落者更研乃澄取曝乾每用一錢半溫酒空腹調下兼和丸散用其煮乳黃濁水切勿服服之損人咽喉傷肺令人頭痛或下利不止其有犯者但食豬肉解之孫真人千金方鍾乳煎治風虛勞損腰腳無力補益強壯用鍾乳粉煉成者三兩以夾練袋盛之牛乳一大升煎減三之一去袋飲乳分二服日一作不吐不利虛冷人微溏無苦一袋可煮三十度即力盡別作袋每煎訖須濯淨令通氣其滓和麵餵雞生子食之此崔尚書方也孫真人千金翼鍾乳酒安五臟通百節利九竅主風虛補下焦益精明目鍾乳煉成粉五兩以夾練袋盛之清酒六升瓶封湯內煮減三之二取出添滿封七日日飲三合忌房事蔥豉生食硬食外臺祕要鍾乳丸治丈夫衰老陽絶肢冷少氣減食腰疼腳痹下氣消食和中長肌鍾乳粉二兩菟絲子酒浸焙石斛各一兩吳茱萸湯泡七次炒半兩為末煉蜜和丸梧子大每服七丸空心溫酒或米湯下日二服服訖行數百步覺胸口熱稍定即食乾飯豆醬忌食粗臭惡食及聞尸穢等氣初服七日勿為陽事過七日乃可行不宜傷多服過半劑覺有功乃續服此曹公卓方也和劑局方元氣虛寒方見陽起石下一切勞嗽胸膈痞滿焚香透膈散用鵝管石雄黃佛耳草款冬花等分為末每用一錢安香爐上焚之以筒吹煙入喉中日二次宣明肺虛喘急連綿不息生鍾乳粉光明者五錢蠟三兩化和飯甑內蒸熟研丸梧子大每溫水下一丸聖濟録吐血損肺煉成鍾乳粉每服二錢糯米湯下立止十便良方大腸冷滑不止鍾乳粉一兩肉豆寇煨半兩為末煮棗肉丸梧子大每服七十丸空心米飲下濟生方乳汁不通氣少血衰脈澀不行故乳少也煉成鍾乳粉二錢濃煎漏蘆湯調下或與通草等分為末米飲服方寸匕日三次外臺祕要精滑不禁大腑溏泄手足厥冷方見陽起石下孔公蘖本經中品釋名孔公石綱目通石時珍曰孔竅空通附垂於石如木之芽蘖故曰孔空蘖而俗訛為孔公爾恭曰此蘖次於鍾乳狀如牛羊角中有孔通故名通石別録誤以此為殷蘖之根而俗猶呼為孔公蘖是也集解別録曰孔公蘖殷蘖根也青黃色生梁山山谷弘景曰梁山屬馮翊郡此即今鍾乳床也亦出始興皆大塊打破之凡鍾乳之類有三種同一體從石室上汁溜積久盤結者為鍾乳床即孔公蘖也其以次小巃嵸者為殷蘖大如牛羊角長一二尺今人呼此為孔公蘖也殷蘖復溜輕好者為鍾乳雖同一類而療體各異貴賤懸殊三種同根而所生各處當是隨其土地為勝爾保升曰鍾乳之類凡五種鍾乳殷蘖孔公蘖石床石花也雖同一體而主療各異頌曰孔公蘖殷蘖既是鍾乳同生則有蘖處皆當有乳今不聞有之豈用之既寡則採者亦稀乎抑時人不知蘖中有乳不盡採乎不能盡究也恭曰孔公蘖次於鍾乳別録誤以為殷蘖之根殷蘖即孔公蘖之根俗人乃以孔公蘖為殷蘖陶氏依之以孔公蘖為鍾乳床非矣時珍曰以薑石通石二石推之則似附石生而粗者為殷蘖接殷蘖而生以漸空通者為孔公蘖接孔公蘖而生者為鍾乳當從蘇恭之説為優蓋殷蘖如人之乳根孔公蘖如乳房鍾乳如乳頭也氣味辛溫無毒普曰神農辛岐伯咸扁鵲酸無毒大明曰甘暖權曰甘有小毒之才曰木蘭為之使惡細辛術忌羊血主治傷食不化邪結氣惡瘡疽瘻痔利九竅下乳汁本經男子陰瘡女子陰蝕及傷食病常欲眠睡別録主腰冷膝痹毒氣能使喉聲圓亮甄權輕身充肌青霞子發明弘景曰二蘖不堪丸散只可水煮湯並酒浸飲之甚療腳弱腳氣附方新一風氣腳弱孔公蘖二斤石斛五兩酒二斗浸服肘後方殷蘖本經中品釋名薑石時珍曰殷隱也生於石上隱然如木之蘖也恭曰此即孔公蘖根也盤結如薑故名薑石俗人乃以孔公蘖為之誤矣詳孔公蘖下集解別録曰殷蘖鍾乳根也生趙國山谷又梁山及南海採無時弘景曰趙國屬冀州亦出始興氣味辛溫無毒之才曰惡防己畏術主治爛傷瘀血泄痢寒熱鼠瘻癥瘕結氣本經腳冷疼弱別録熏筋骨弱並痔瘻及下乳汁大明發明見孔公蘖下附録石床唐本草恭曰味甘溫無毒酒漬服與殷蘖同功一名乳床一名逆石一名石筍生鍾乳堂中採無時鍾乳水滴下凝積生如筍狀久漸與上乳相接為柱也陶謂孔公蘖為乳床非也殷蘖孔公蘖在上石床石花在下性體雖同上下有別石花唐本草恭曰味甘溫無毒主腰腳風冷漬酒服與殷蘖同功一名乳花生乳穴堂中乳水滴石上散如霜雪者三月九月採之大明曰壯筋骨助陽道宗奭曰石花白色圓如覆大馬杓上有百十枝每枝各搓牙分歧如鹿角上有細紋起以指撩之錚錚然有聲其體甚脆不禁觸擊多生海中石上世方難得家中曾得一本本條所注皆非是時珍曰石花是鍾乳滴於石上迸散日久積成如花者蘇恭所説甚明寇宗奭所説乃是海中石梅石柏之類亦名石花不入藥用非本草石花正自誤矣石骨恭曰石骨服之力勝鍾乳似骨如玉堅潤生五石脂中土殷蘖別録下品釋名土乳唐本志曰此則土脂液也生於土穴狀如殷蘖故名集解別録曰生高山崖上之陰色白如脂採無時弘景曰此猶似鍾乳孔公蘖之類故亦有蘖名但在崖上爾今不知用恭曰此即土乳也出渭州鄣縣三交驛西北坡平地土窟中見有六十餘坎昔人採處土人云服之亦同鍾乳而不發熱陶及本草云生崖上非也時珍曰此即鍾乳之生於山崖土中者南方名山多有之人亦掘為石山貨之充玩不知其為土鍾乳也氣味咸平無毒主治婦人陰蝕大熱干痂別録石腦宋嘉祐釋名石飴餅別録石芝綱目化公石時珍曰其狀如結腦故名昔有化公服此又名化公石集解別録曰石腦生名山土石中採無時弘景曰此石亦鍾乳之類形如曾青而白色黑斑軟易破今茅山東及西平山並有之鑿土龕取出恭曰出徐州宋里山初在爛石中入土一丈以下得之大如雞卵或如棗許觸著即散如面黃白色土人號為握雪礜石云服之長生保升曰蘇恭引握雪礜石為注非矣時珍曰按抱朴子內篇云石腦芝生滑石中亦如石中黃子狀但不皆有耳打破大滑石千計乃可得一枚初破之在石中五色光明而自得服一升得長生乃石芝也別録所謂石腦及諸仙服食當是此物也蘇恭所説本是石腦而又以注握雪礜石誤矣握雪乃石上之液與此不同見後本條氣味甘溫無毒主治風寒虛損腰腳疼痹安五臟益氣別録發明弘景曰俗方不見用仙經有劉君導仙散用之又真誥云李整採服療風痹虛損而得長生恭曰隋時化公所服亦名石腦時珍曰真誥載薑伯真在大橫山服石腦時時使人身熱而不渴即此石髓拾遺集解藏器曰石髓生臨海華蓋山石窟土人採取澄淘如泥作丸如彈子有白有黃彌佳時珍曰按列仙傳言卬疏煮石髓服即鍾乳也仙經云神山五百年一開石髓出服之長生王列入山見石裂得髓食之因撮少許與嵇康化為青石北史云龜茲北大山中有如膏者流出成川行數里入地狀如醍醐服之齒髮更生病人服之皆愈方鎮編年録云高展為並州判官一日見砌間沫出以手撮塗老吏面皺皮頓改如少年色展以為神藥問承天道士道士曰此名地脂食之不死乃發砌無所見此數説皆近石髓也氣味甘溫無毒主治寒熱羸瘦無顏色積聚心腹脹滿食飲不消皮膚枯稿小便數疾癖塊腹內腸鳴下痢腰腳疼冷性壅宜寒瘦人藏器石腦油宋嘉祐校正併入拾遺石漆釋名石油綱目石漆拾遺猛火油雄黃油硫黃油綱目集解禹錫曰石腦油宜以瓷器貯之不可近金銀器雖至完密直爾透過道家多用俗方不甚須宗奭曰真者難收多滲蝕器物入藥最少燒煉家研生砒入油再研如膏入坩鍋內瓦蓋置火上俟油泣盡出之又研又入油又上火煉之砒即伏矣時珍曰石油所出不一出陝之肅州鄜州延州延長廣之南雄以及緬甸者自石岩流出與泉水相雜汪汪而出肥如肉汁土人以草挹入缶中黑色頗似淳漆作雄硫氣土人多以燃燈甚明得水愈熾不可入食其煙甚濃沈存中宦西時掃其煤作墨光黑如漆勝於松煙張華博物志載延壽縣南山石泉注為溝其水有脂挹取著器中始黃後黑如凝膏燃之極明謂之石漆段成式酉陽雜俎載高奴縣有石脂水膩浮水上如漆採以膏車及燃燈康譽之昨夢録載猛火油出高麗東日烘石熱所出液也惟真琉璃器可貯之入水涓滴烈焰遽發餘力入水魚鱉皆死邊人用以禦敵此數説皆石腦油也國朝正德末年嘉州開鹽井偶得油水可以照夜其光加倍沃之以水則焰彌甚撲之以灰則滅作雄硫氣土人呼為雄黃油亦曰硫黃油近復開出數井官司主之此亦石油但出於井爾蓋皆地産雄硫石脂諸石源脈相通故有此物王冰謂龍火得濕而焰遇水而燔光焰詣天物窮方止正是此類皆陰火也氣味辛苦有毒獨孤滔曰化銅制砒主治小兒驚風化涎可和諸藥作丸散嘉祐塗瘡癬蟲癩治針箭入肉藥中用之時珍發明時珍曰石油氣味與雄硫同故殺蟲治瘡其性走竄諸器皆滲惟瓷器琉璃不漏故錢乙治小兒驚熱膈實嘔吐痰涎銀液丸中用和水銀輕粉龍腦蠍尾白附子諸藥為丸不但取其化痰亦取其能透經絡走關竅也附録地溲時珍曰溝澗流水及引水灌田之次多有之形狀如油又如泥色如黃金甚腥烈冬月收取以柔鐵燒赤投之二三次剛可切玉石炭綱目釋名煤炭石墨鐵炭烏金石綱目焦石時珍曰石炭即烏金石上古以書字謂之石墨今俗呼為煤炭煤墨音相近也拾遺記言焦石如炭嶺表録言康州有焦石穴即此也集解時珍曰石炭南北諸山産處亦多昔人不用故識之者少今則人以代薪炊爨煅煉鐵石大為民利土人皆鑿山為穴橫入十餘丈取之有大塊如石而光者有疏散如炭末者俱作硫黃氣以酒噴之則解入藥用堅塊如石者昔人言夷陵黑土為劫灰者即此疏散者也孝經援神契云王者德至山陵則出黑丹水經言石炭可書燃之難盡煙氣中人酉陽雜俎云無勞縣出石墨爨之彌年不消夷堅志云彰德南郭村井中産石墨宜陽縣有石墨山汧陽縣有石墨洞燕之西山楚之荊州興國州江西之廬山袁州豐城贛州皆産石炭可以炊爨並此石也又有一種石墨舐之黏舌可書字畫眉名畫眉石者即黑石脂也見石脂下氣味甘辛溫有毒時珍曰人有中煤氣毒者昏瞀至死惟飲冷水即解獨孤滔曰去錫暈制三黃硇砂硝石主治婦人血氣痛及諸瘡毒金瘡出血小兒痰癇時珍附方新五金瘡出血急以石炭末厚敷之瘡深不宜速合者加滑石醫學集成誤吞金銀及錢在腹中不下者光明石炭一杏核大硫黃一皂子大為末酒下普濟方腹中積滯烏金石即鐵炭也三兩自然銅為末醋熬一兩當歸一兩大黃童尿浸曬一兩為末每服二錢紅花酒一盞童尿半盞同調食前服日二服張子和儒門事親月經不通巴豆去油如緑豆大三丸以烏金石末一錢調湯送下即通衛生易簡方産後兒枕刺痛黑白散用烏金石燒酒淬七次寒水石煅為末等分每用粥飲服一錢半即止未止再服潔古保命集附録然石時珍曰曹叔雅異物志云豫章有石黃色如理疏以水灌之便熱可以烹鼎冷則再灌張華謂之然石高安亦有之石灰本經下品釋名石堊弘景堊灰本經希灰別録鍛石日華白虎綱目礦灰綱目集解別録曰石灰生中山川穀弘景曰近山生石青白色作灶燒竟以水沃之即熱蒸而解俗名石堊頌曰所在近山處皆有之燒青石為灰也又名石鍛有風化水化二種風化者取鍛了石置風中自解此為有力水化者以水沃之熱蒸而解其力差劣時珍曰今人作窯燒之一層柴或煤炭一層在下上纍青石自下發火層層自焚而散入藥惟用風化不夾石者良氣味辛溫有毒大明曰甘無毒獨狐滔曰伏雄黃硫黃硇砂去錫暈主治疽瘍疥瘙熱氣惡瘡癩疾死肌墮眉殺痔蟲去黑子息肉本經療髓骨疽別録治瘑疥蝕惡肉止金瘡血甚良甄權生肌長肉止血白癜癧瘍瘢疵痔瘻癭贅疣子婦人粉刺産後陰不能合解酒酸治酒毒暖水臟治氣大明墮胎保升散血定痛止水瀉血痢白帶白淫收脫肛陰挺消積聚結核貼口喎黑鬚發時珍發明弘景曰石灰性至烈人以度酒飲之則腹痛下利古今多以構冢用捍水而闢蟲故古冢中水洗諸瘡皆即瘥恭曰別録及今人用療金瘡止血大效若五月五日採繁縷葛葉鹿活草槲葉芍藥地黃葉蒼耳葉青蒿葉合石灰搗為團如雞卵曝乾末以療瘡生肌大妙神驗權曰止金瘡血和雞子白敗船茹甚良不入湯飲頌曰古方多用合百草團末治金瘡殊勝今醫家或以臘月黃牛膽汁搜和納入膽中風乾研用更勝草藥者古方以諸草雜石灰熬煎點疣痣黑子丹灶家亦用之時珍曰石灰止血神品也但不可著水著水即爛肉附方舊十四新三十二人落水死裹石灰納下部中水出盡即活千金方痰厥氣絶心頭尚溫者千年石灰一合水一盞煎滾去清水再用一盞煎極滾澄清灌之少頃痰下自愈集玄方中風口喎新石灰醋炒調如泥塗之左塗右右塗左立便牽正寇氏衍義風牙腫痛二年石灰細辛等分研搽即止普濟方蟲牙作痛礦灰沙糖和塞孔中普濟方風蟲牙痛百年陳石灰為末四兩蜂蜜三兩拌勻鹽泥固濟火煅一日研末擦牙神效名神仙失笑散張三丰方乾霍亂病千年石灰沙糖水調服二錢或淡醋湯亦可名落盞湯摘玄方偏墜氣痛陳石灰炒五倍子山梔子等分為末面和醋調敷之一夜即消醫方摘要婦人血氣方見獸部豬血下産後血渴不煩者新石灰一兩黃丹半錢渴時漿水調服一錢名桃花散張潔古活法機要白帶白淫風化石灰一兩白茯苓三兩為末糊丸梧子大每服二三十丸空心米飲下絶妙集玄方水瀉不止方同上酒積下痢石灰五兩水和作團黃泥包煅一日夜去泥為末醋糊丸梧子大每服三十丸薑湯空心下摘玄方血痢十年石灰三升熬黃水一斗投之澄清一服一升日三服崔知悌方虛冷脫肛石灰燒熱故帛裹坐冷即易之聖惠方産門不閉産後陰道不閉或陰脫出石灰一斗熬黃以水二斗投之澄清熏肘後方産門生合不開用銅錢磨利割開以陳石灰敷之即愈通變方腹脅積塊風化石灰半斤瓦器炒極熱入大黃末一兩炒紅取起入桂末半兩略燒入米醋和成膏攤絹上貼之內服消塊藥甚效丹溪心法瘧疾寒熱一日一發或二三發或三日一發古城石灰二錢頭垢五靈脂各一錢研末飯丸皂子大每服一丸五更無根水下即止集玄方老小暴嗽石灰一兩蛤粉四錢為末蒸餅丸豌豆大焙乾每服三十丸溫齏汁下普濟方猝暴吐血石灰於刀頭上燒研井水下二錢普濟方發落不止乃肺有勞熱瘙癢用石灰三升水拌炒焦酒三升浸之每服三合常令酒氣相接則新發更生神驗千金翼染髮烏須礦灰一兩水化開七日用鉛粉一兩研勻好醋調搽油紙包一夜先以皂角水洗淨乃用集玄方身面疣目苦酒浸石灰六七日取汁頻滴之自落千金方面黶疣痣水調礦灰一盞好糯米全者半插灰中半在灰外經宿米色變如水精先以針微撥動點少許於上經半日汁出剔去藥不得著水二日而愈也集玄方疣痣瘤贅石灰一兩用桑灰淋汁熬成膏刺破點之普濟方癰疽瘀肉石灰半斤蕎麥秸灰半斤淋汁煎成霜密封每以針畫破塗之自腐普濟方疔瘡惡腫石灰半夏等分為末敷之普濟方腦上癰癤石灰入飯內搗爛合之李樓奇方痰核紅腫寒熱狀如瘰癧石灰火煅為末以白果肉同搗貼之蜜調亦可活人心統痄𤸛腫痛醋調石灰敷之簡便方多年惡瘡多年石灰研末雞子清和成塊煅過再研薑汁調敷救急方瘻瘡不合古冢中石灰厚敷之千金方痔瘡有蟲古石灰川烏頭炮等分為末燒飯丸梧子大每服二三十丸白湯下活法機要疥瘡有蟲石灰淋汁洗之數次孫真人方血風濕瘡千年陳石灰研搽痛即止瘡即愈神效藺氏方火焰丹毒醋和石灰塗之或同青靛塗摘玄方猝發風疹醋漿和石灰塗之隨手滅元希聲侍郎祕方也外臺祕要夏月痱疱石灰煅一兩蛤粉二兩甘草一兩研撲之集玄方湯火傷灼年久石灰敷之或加油調肘後方杖瘡腫痛新石灰麻油調搽甚妙集簡方刀刃金瘡石灰裹之定痛止血又速愈瘡深不宜速合者入少滑石敷之肘後方誤吞金銀或錢在腹內不下石灰硫黃一皂子大同研為末酒調服之孫用和祕寶方馬汗入瘡石灰敷之摘玄方螻蛄咬人醋和石灰塗之聖惠方蚯蚓咬人其毒如大風眉須皆落以石灰水浸之良經驗方古墓中石灰名地龍骨主治頑瘡瘻瘡膿水淋漓斂諸瘡口棺下者尤佳時珍艌船油石灰名水龍骨主治金瘡跌撲傷損破皮出血及諸瘡瘻止血殺蟲時珍附方新三軟癤不愈爛船底油石灰研末油調敷之胡氏方下體癬瘡艌船灰牛糞燒煙燻之一日一次即安醫方摘玄血風臁瘡船上舊油灰將泥作釜火煅過研末入輕粉少許苦茶洗淨敷之忌食發物鄧真人經驗方石面綱目集解時珍曰石面不常生亦瑞物也或曰飢荒則生之唐玄宗天寶三載武威番禾縣醴泉湧出石化為面貧民取食之憲宗元和四年山西云蔚代三州山谷間石化為面人取食之宋真宗祥符五年四月慈州民飢鄉寧縣山生石脂如面可作餅餌仁宗嘉祐七年三月彭城地生面五月鍾離縣地生面哲宗元豐三年五月青州臨朐益都石皆化面人取食之搜集於此以備食者考求云氣味甘平無毒主治益氣調中食之止飢時珍浮石日華校正併入拾遺水花釋名海石綱目水花集解時珍曰浮石乃江海間細沙水沫凝聚日久結成者狀如水沫及鐘乳石有細孔如蛀窠白色體虛而輕今皮作家用磨皮垢甚妙海中者味鹹入藥更良抱朴子云燒泥為瓦燔木為炭水沫為浮石此皆去其柔脆變為堅剛也交州記云海中有浮石輕虛可以磨腳煮水飲之止渴即此也氣味咸平無毒時珍曰小寒主治煮汁飲止渴治淋殺野獸毒大明止咳弘景去目翳宗奭清金降火消積塊化老痰震亨消瘤癭結核疝氣下氣消瘡腫時珍發明藏器曰水花主遠行無水止渴和苦栝蔞為丸每旦服二十丸永無渴也震亨曰海石治老痰積塊咸能軟堅也時珍曰浮石乃水沫結成色白而體輕其質玲瓏肺之象也氣味鹹寒潤下之用也故入肺除上焦痰熱止咳嗽而軟堅清其上源故又治諸淋按余琰席上腐談云肝屬木當浮而反沉肺屬金當沉而反浮何也肝實而肺虛也故石入水則沉而南海有浮水之石木入水則浮而南海有沉水之香虛實之反如此附方新十二咳嗽不止浮石末湯服或蜜丸服肘後方消渴引飲本事方浮石舶上青黛等分麝香少許為末溫湯服一錢又方白浮石蛤粉蟬殼等分為末鯽魚膽汁七個調服三錢神效血淋砂淋小便澀痛用黃爛浮石為末每服二錢生甘草煎湯調服直指方石淋破血浮石滿一手為末以水三升酢一升和煮二升澄清每服一升傳信適用方小腸疝氣莖縮囊腫者直指方用浮石為末每服二錢木通赤茯苓麥門冬煎湯調下丹溪方用海石香附等分為末每服二錢薑汁調下頭核腦痹頭枕後生痰核正者為腦側者為痹用輕虛白浮石燒存性為末入輕粉少許麻油調掃塗之勿用手按即漲或加焙乾黃牛糞尤好亦治頭𤷍直指方底耳有膿海浮石一兩沒藥一錢麝香一字為末繳淨吹之普濟方疳瘡不愈海浮石燒紅醋淬數次二兩金銀花一兩為末每服二錢半水煎服病在上食後在下食前一年者半年愈儒門事親疔瘡發背白浮石半兩沒藥二錢半為末醋糊丸梧子大每服六七丸臨臥冷酒下普濟方諸般惡瘡方同上附録暈石拾遺藏器曰生海底狀如薑石紫褐色極緊似石是鹹水結成自然生暈味鹹寒無毒主石淋磨汁飲之亦燒赤投酒中飲石芝綱目集解葛洪曰芝有石木草菌肉五類各近百種道家有石芝圖石芝者石象芝也生於海隅名山島嶼之涯有積石處其狀如肉有頭尾四足如生物附於大石赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金皆光明洞徹大者十餘斤小者三四斤須齋祭取之搗末服其類有七明九光芝生臨水高山石崖之間狀如盤碗不過徑尺有莖連綴之起三四寸有七孔者名七明九孔者名九光光皆如星百步內夜見其光常以秋分伺之搗服方寸匕入口則熻然身熱五味甘美得盡一斤長生不老可以夜視也玉脂芝生於有玉之山玉膏流出千百年凝而成芝有鳥獸之形色無常彩多似玄玉蒼玉及水精得而末之以無心草汁和之須臾成水服至一升長生也石蜜芝生少室石戶中有深谷不可過但望見石蜜從石戶上入石偃蓋中良久輒有一滴得服一升長生不老也石桂芝生石穴中有枝條似桂樹而實石也高尺許光明而味辛時珍曰神仙之説渺茫不知有無然其所述之物則非無也貴州普定分司署內有假山山間有樹根乾枝條皆石而中有葉如榴嫋嫋茂翠開花似桂微黃嘉靖丁巳僉事焦希程賦詩紀之以比康於斷松化石之事而不知其名時珍按圖及抱朴子之説此乃石桂芝也海邊有石梅枝幹橫斜石柏葉如側柏亦是石桂之類云主治諸芝搗末或化水服令人輕身長生不老葛洪
