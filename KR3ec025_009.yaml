body:
  text: 石部第九卷金石之三石類上三十二種丹砂本經上品釋名硃砂時珍曰丹乃石名其字從井中一點象丹在井中之形義出許慎説文後人以丹為硃色之名故呼硃砂集解別録曰丹砂生符陵山谷採無時光色如雲母可拆者良作末名真朱弘景曰即今硃砂也俗醫別取武都仇池雄黃夾雌黃者名為丹砂用之謬矣符陵是涪州接巴郡南今無復採者乃出武陵西川諸蠻夷中皆通屬巴地故謂之巴砂仙經亦用越砂即出廣州臨漳者此二處並好惟須光明瑩徹為佳如雲母片者謂之雲母砂如樗蒲子紫石英形者謂之馬齒砂亦好如大小豆及大塊圓滑者謂之豆砂細末碎者謂之末砂此二種粗不入藥用但可畫用爾採砂皆鑿坎入數丈許雖同出一郡縣亦有好惡地有水井勝火井也仙方煉餌最為長生之寶恭曰丹砂大略二種有土砂石砂其土砂復有塊砂末砂體並重而色黃黑不任畫用療瘡疥亦好但不入心腹之藥然可燒之出水銀乃多也其石砂有十數品最上者為光明砂云一顆別生一石龕內大者如雞卵小者如棗栗形似芙蓉破之如雲母光明照徹在龕中石臺上生得此者帶之辟惡為上其次或出石中或出水內形塊大者如拇指小者如杏仁光明無雜名馬牙砂一名無重砂入藥及畫俱善俗間亦少有之其磨𥰭新井別井水井火井芙蓉石末石堆豆末等砂形類頗相似入藥及畫當擇去其雜土石便可用矣別有越砂大者如拳小者如雞鴨卵形雖大其雜土石不如細而明淨者經言末之名真朱者謬矣豈有一物以全末殊名乎斆曰砂凡百等不可一一論有妙硫砂如拳許大或重一鎰有十四面面如鏡若遇陰沉天雨即鏡面上有紅漿汁出有梅柏砂如梅子許大夜有光生照見一室有白庭砂如帝珠子許大面上有小星現有神座砂金座砂玉座砂不經丹灶服之而自延壽命次有白金砂澄水砂陰成砂辰錦砂芙蓉砂鏡面砂箭鏃砂曹末砂土砂金星砂平面砂神末砂等不可一一細述也頌曰今出辰州宜州階州而辰砂為最生深山石崖間土人採之穴地數十尺始見其苗乃白石謂之硃砂床砂生石上其大塊者如雞子小者如石榴子狀若芙蓉頭箭鏃連床者紫黯若鐵色而光明瑩徹碎之嶄岩作牆壁又似雲母片可拆者真辰砂也無石者彌佳過此皆淘土石中得之非生於石床者宜砂絶有大塊者碎之亦作牆壁但罕有類物狀而色亦深赤為用不及辰砂蓋出土石間非白石床所生也然近宜州鄰地春州融州皆有砂故其水盡赤每煙霧鬱蒸之氣亦赤黃色土人謂之硃砂氣尤能作瘴癘為人患也階砂又次之都不堪入藥惟可畫色爾凡砂之絶好者為光明砂其次謂之顆塊其次謂之鹿簌其下謂之末砂惟光明砂入藥余並不用宗奭曰丹砂今人謂之硃砂辰州砂多出蠻洞錦州界狤獠洞老鴉井其井深廣數十丈先聚薪於井焚之其青石壁迸裂處即有小龕龕中自有白石床其石如玉床上乃生砂小者如箭鏃大者如芙蓉光明可鑑研之鮮紅砂洎床大者重七八兩至十兩晃州所出形如箭鏃帶石者得自土中非此比也承曰金州商州亦出一種砂色微黃作土氣陝西河東河北汴東汴西並以入藥長安蜀州研以代銀硃作漆器又信州近年出一種砂極有大者光芒牆壁略類宜州所産然有砒氣破之多作生砒色若入藥用見火恐殺人今浙中市肆往往貨之不可不審時珍曰丹砂以辰錦者為最麻陽即古錦州地佳者為箭鏃砂結不實者為肺砂細者為末砂色紫不染紙者為舊坑砂為上品色鮮染紙者為新坑砂次之蘇頌陳承所謂階州金商州砂者乃陶弘景所謂武都雄黃非丹砂也范成大桂海志云本草以辰砂為上宜砂次之然宜州出砂處與湖北大牙山相連北為辰砂南為宜砂地脈不殊無甚分別老者亦出白石床上蘇頌乃云宜砂出土石間非石床所生是未識此也別有一種色紅質嫩者名土坑砂乃土石間者不甚耐火雍州亦有砂大者數十百兩作塊黑暗少牆壁不堪入藥惟以燒取水銀頌云融州亦有今融州無砂乃雍州之訛也臞仙庚辛玉册云丹砂石以五溪山洞中産者得正南之氣為上麻陽諸山與五溪相接者次之雲南波斯西胡砂並光潔可用柳州一種砂全似辰砂惟塊圓如皂角子不入藥用商州黔州土丹砂宣信州砂皆內含毒氣及金銀銅鉛氣不可服張果丹砂要訣云丹砂者萬靈之主居之南方或赤龍以建號或朱鳥以為名上品生於辰錦二州石穴中品生於交桂下品生於衡邵名有數種清濁體異真偽不同辰錦上品砂生白石床之上十二枚為一座色如未開蓮花光明耀日亦有九枚為一座七枚五枚者次之每座中有大者為主四圍小者為臣朝護四面雜砂一二斗抱之中有芙蓉頭成顆者亦入上品又有如馬牙光明者為上品白光若雲母為中品又有紫靈砂圓長似筍而紅紫為上品石片稜角生青光為下品交桂所出但是座上及打石得形似芙蓉頭面光明者亦入上品顆粒而通明者為中品片段不明徹者為下品衡邵所出雖是紫砂得之砂石中者亦下品也有溪砂生溪州砂石之中土砂生土穴之中土石相雜故不入上品不可服餌唐李德裕黃冶論云光明砂者天地自然之寶在石室之間生雪床之上如初生芙蓉紅芭未拆細者環拱大者處中有辰居之象有君臣之位光明外徹採之者尋石脈而求此造化之所鑄也土宿真君曰丹砂受青陽之氣始生礦石二百年成丹砂而青女孕又二百年而成鉛又二百年成銀又二百年復得太和之氣化而為金故諸金皆不若丹砂金為上也修治斆曰凡修事硃砂靜室焚香齋沐後取砂以香水浴過拭乾碎搗之鉢中更研三伏時取一瓷鍋子每硃砂五兩用甘草二兩紫背天葵一鎰五方草一鎰著砂上下以東流水煮三伏時勿令水火闕去藥以東流水淘淨干曬又研如粉用小瓷瓶入青芝草山須草半兩蓋之下十斤火煅從巳至子方歇候冷取出細研用如要服則以熬蜜丸細麻子大空腹服一丸時珍曰今法惟取好砂研末以流水飛三次用其末砂多雜石末鐵屑不堪入藥又法以絹袋盛砂用蕎麥灰淋汁煮三伏時取出流水浸洗過研粉飛曬用又丹砂以石膽硝石和埋土中可化為水氣味甘微寒無毒普曰神農甘岐伯苦有毒扁鵲苦李當之大寒權曰有大毒大明曰涼微毒之才曰惡磁石畏鹼水忌一切血時珍曰丹砂別録云無毒岐伯甄權言有毒似相矛盾按何孟春余冬録云丹砂性寒而無毒入火則熱而有毒能殺人物性逐火而變此説是也丹砂之畏磁石鹼水者水剋火也斆曰鐵遇神砂如泥似粉土宿真君曰丹砂用陰地缺地骨皮車前草馬鞭草皂莢石葦決明瞿麥南星白附子烏頭三角酸藕荷桑椹地榆紫河車地丁皆可伏制而金公以砂為子有相生之道可變化主治身體五臟百病養精神安魂魄益氣明目殺精魅邪惡鬼久服通神明不老能化為汞本經通血脈止煩滿消渴益精神悅澤人面除中惡腹痛毒氣疥瘻諸瘡輕身神仙別録鎮心主尸疰抽風甄權潤心肺治瘡痂息肉並塗之大明治驚癇解胎毒痘毒驅邪瘧能發汗時珍發明保升曰硃砂法火色赤而主心杲曰丹砂純陰納浮溜之火而安神明凡心熱者非此不能除好古曰乃心經血分主藥主命門有餘青霞子曰丹砂外包八石內含金精稟氣於甲受氣於丙出胎見壬結塊成庚增光歸戊陰陽升降各本其原自然不死若以氣衰血敗體竭骨枯八石之功稍能添益若欲長生久視保命安神須餌丹砂且八石見火悉成灰燼丹砂伏火化為黃銀能重能輕能神能靈能黑能白能暗能明一斛人擎力難升舉萬斤遇火輕速上騰鬼神尋求莫知所在時珍曰丹砂生於炎方稟離火之氣而成體陽而性陰故外顯丹色而內含真汞其氣不熱而寒離中有陰也其味不苦而甘火中有土也是以同遠志龍骨之類則養心氣同當歸丹參之類則養心血同枸杞地黃之類則養腎同厚朴川椒之類則養脾同南星川烏之類則祛風可以明目可以安胎可以解毒可以發汗隨佐使而見功無所往而不可夏子益奇疾方云凡人自覺本形作兩人並行並臥不辨真假者離魂病也用辰砂人參茯苓濃煎日飲真者氣爽假者化也類編云錢丕少卿夜多惡夢通宵不寐自慮非吉遇鄧州推官胡用之曰昔常如此有道士教戴辰砂如箭鏃者涉旬即驗四五年不復有夢因解髻中一絳囊遺之即夕無夢神魂安靜道書謂丹砂辟惡安魂觀此二事可徵矣抱朴子曰臨沅縣廖氏家世世壽考後徙去子孫多夭折他人居其故宅復多壽考疑其井水赤乃掘之得古人埋丹砂數十斛也飲此水而得壽況煉服者乎頌曰鄭康成注周禮以丹砂石膽雄黃礜石磁石為五毒古人惟以攻瘡瘍而本經以丹砂為無毒故多煉治服食鮮有不為藥患者豈五毒之説勝乎當以為戒宗奭曰硃砂鎮養心神但宜生使若煉服少有不作疾者一醫疾服伏火者數粒一旦大熱數夕而斃沈存中雲表兄李善勝煉硃砂為丹歲余沐浴再入鼎誤遺一塊其徒丸服之遂發懵冒一夕而斃夫生硃砂初生小兒便可服因火力所變遂能殺人不可不謹陳文中曰小兒初生便服硃砂輕粉白蜜黃連水欲下胎毒此皆傷脾敗陽之藥輕粉下痰損心硃砂下涎損神兒實者服之軟弱弱者服之易傷變生諸病也時珍曰葉石林避暑録載林彥振謝任伯皆服伏火丹砂俱病腦疽死張杲醫説載張愨服食丹砂病中消數年髮鬢疽而死皆可為服丹之戒而周密野語載臨川周推官平生孱弱多服丹砂烏附藥晚年發背疽醫悉歸罪丹石服解毒藥不效瘍醫老祝診脈曰此乃極陰證正當多服伏火丹砂及三建湯乃用小劑試之復作大劑三日後用膏敷貼半月而瘡平凡服三建湯一百五十服此又與前諸説異蓋人之臟腑稟受萬殊在智者辨其陰陽脈證不以先入為主非妙入精微者不能企此附方舊八新二十七服食丹砂三皇真人煉丹方丹砂一斤研末重篩以醇酒沃之如泥狀盛以銅盤置高閣上勿令婦人見燥則復以酒沃令如泥陰雨疾風則藏之盡酒三斗乃曝之三百日當紫色齋戒沐浴七日靜室飯丸麻子大常以平旦向日吞三丸一月三蟲出半年諸病瘥一年鬚髮黑三年神人至太上玄變經小神丹方真丹末三斤白蜜六斤攪合日曝至可丸丸麻子大每旦服十丸一年白髮反黑齒落更生身體潤澤老翁成少抱朴子內編明目輕身去三尸除瘡癩美酒五升浸硃砂五兩五宿日乾研末蜜丸小豆大每服二十丸白湯下久服見效衛生易簡方神注丹方白茯苓四兩糯米酒煮軟竹刀切片陰乾為末入硃砂末二錢以乳香水打糊丸梧子大硃砂末二錢為衣陽日二丸陰日一丸要祕精新汲水下要逆氣過精溫酒下並空心王好古醫壘元戎烏髭變白小雌雞二隻只與烏油麻一件同水飼之放卵時收取先放者打竅以硃砂末填入糊定同衆卵抱出雞取出其藥自然結實研粉蒸餅和丸緑豆大每酒下五七丸不惟變白亦且愈疾張潞方小兒初生六日解胎毒溫腸胃壯氣血硃砂豆大細研蜜一棗大調與吮之一日令盡姚和衆至寶方預解痘毒初發時或未出時以硃砂末半錢蜜水調服多者可少少者可無重者可輕也丹溪方初生兒驚月內驚風欲死硃砂磨新汲水塗五心最驗斗門方小兒驚熱夜臥多啼硃砂半兩牛黃一分為末每服一字犀角磨水調下普濟方急驚搐搦丹砂半兩天南星一個一兩重者炮裂酒浸大蠍三個為末每服一字薄荷湯下聖濟録驚忤不語打撲驚忤血入心竅不能言語硃砂為末以雄豬心血和丸麻子大每棗湯下七丸直指方客忤猝死真丹方寸匕蜜三合和灌之肘後方癲癇狂亂歸神丹治一切驚憂思慮多忘及一切心氣不足癲癇狂亂獖豬心二個切入大硃砂二兩燈心三兩在內麻扎石器煮一伏時取砂為末以茯神末二兩酒打薄糊丸梧子大每服九丸至十五丸至二十五丸麥門冬湯下甚者乳香人參湯下百一選方産後癲狂敗血及邪氣入心如見祟物癲狂用大辰砂一二錢研細飛過用飲兒乳汁三四茶匙調濕以紫項地龍一條入藥滾三滾刮淨去地龍不用入無灰酒一盞分作三四次服何氏方心虛遺精豬心一個批片相連以飛過硃砂末摻入線縛白水煮熟食之唐瑤經驗方離魂異病方見發明夜多惡夢方見發明男婦心痛硃砂明礬枯等分為末沸湯調服摘玄方心腹宿症及猝得症硃砂研細搜飯以雄雞一隻餓二日以飯飼之收糞曝燥為末溫酒服方寸匕日三服服盡更服愈乃止外臺祕要霍亂轉筋身冷心下微溫者硃砂研二兩蠟三兩和丸著火籠中熏之周圍厚覆勿令煙泄兼床下著火令腹微暖良久當汗出而蘇外臺祕要闢瘴正陽丹砂三兩水飛每服半錢溫蜜湯下聖濟録傷寒發汗外臺祕要治傷寒時氣溫疫頭痛壯熱脈盛始得一二日者取真丹一兩水一斗煮一升頓服覆被取汗忌生血物肘後用真丹末酒調遍身塗之向火坐得汗愈闢禳溫疫上品硃砂一兩細研蜜和丸麻子大常以太歲日平旦一家大小勿食諸物向東各吞三七丸勿令近齒永無溫疫外臺諸般吐血硃砂蛤粉等分為末酒服二錢又方丹砂半兩金箔四片蚯蚓三條同研丸小豆大每冷酒下二丸聖濟録妊婦胎動硃砂末一錢和雞子白三枚攪勻頓服胎死即出未死即安普濟方子死腹中不出硃砂一兩水煮數沸為末酒服立出十全博救方目生障翳生辰砂一塊日日擦之自退王居云病此用之如故普濟方目膜息肉丹砂一兩五月五日研勻銅器中以水漿一盞臘水一盞浸七日曝乾銅刀刮下再研瓶收每點少許眥上聖濟録目生弩肉及珠管真丹貝母等分為末點注日三四度肘後方面上皯𪒟雞子一枚去黃硃砂末一兩入雞子內封固入白伏雌下抱至雛出取塗面即去不過五度面白如玉此乃陳朝張貴妃常用方出西王母枕中方外臺祕要沙蜂叮螫硃砂末水塗之摘玄方木蛭瘡毒南方多雨有物曰木蛭大類鼻涕生於枯木之上聞人氣則閃閃而動人過其下墮人體間即立成瘡久則遍體惟以硃砂麝香塗之即愈張杲醫説産後舌出不收丹砂敷之暗擲盆盎作墮地聲驚之即自收集簡方水銀本經中品釋名汞別録澒汞同靈液綱目奼女藥性時珍曰其狀如水似銀故名水銀澒者流動貌方術家以水銀和牛羊豕三脂杵成膏以通草為炷照於有金寶處即知金銀銅鐵鉛玉龜蛇妖怪故謂之靈液頌曰廣雅水銀謂之澒丹灶家名汞其字亦通用爾集解別録曰水銀生符陵平土出於丹砂弘景曰今水銀有生熟此云生符陵平土者是出硃砂腹中亦有別出沙地者青白色最勝出於丹砂者是今燒粗末硃砂所得色小白濁不及生者甚能消化金銀使成泥人以鍍物是也燒時飛著釜上灰名汞粉俗呼為水銀灰最能去蝨恭曰水銀出於硃砂皆因熱氣未聞硃砂腹中自出之者火燒飛取人皆解法南人蒸取之得水銀雖少而硃砂不損但色少變黑爾頌曰今出秦州商州道州邵武軍而秦州乃來自西羌界經云出於丹砂者乃是山石中採粗次硃砂作爐置砂於中下承以水上覆以盆器外加火煅養則煙飛於上水銀溜於下其色小白濁陶氏言別出沙地者青白色今不聞有此西羌人亦云如此燒取但其山中所生極多至於一山自拆裂人採得砂石皆大塊如升斗碎之乃可燒煅故西來水銀極多於南方者又取草汞法用細葉馬齒莧干之十斤得水銀八兩或十兩先以槐木槌之向日東作架曬之三二日即干如經年久燒存性盛入瓦甕內封口埋土坑中四十九日取出自成矣時珍曰汞出於砂為真汞雷斆言有草汞陶弘景言有沙地汞淮南子言弱土之氣生白礜石礜石生白澒蘇頌言陶説者不聞有之按陳霆墨談云拂林國當日沒之處地有水銀海周圍四五十里國人取之近海十里許掘坑井數十乃使健夫駿馬皆貼金箔行近海邊日照金光晃耀則水銀滾沸如潮而來其勢若黏裹其人即回馬疾馳水銀隨趕若行緩則人馬俱撲滅也人馬行速則水銀勢遠力微遇坑塹而溜積於中然後取之用香草同煎則成花銀此與中國所産不同按此説似與陶氏沙地所出相合又與陳藏器言人服水銀病拘攣但炙金物尉之則水銀必出蝕金之説相符蓋外番多丹砂其液自流為水銀不獨煉砂取出信矣胡演丹藥祕訣云取砂汞法用瓷瓶盛硃砂不拘多少以紙封口香湯煮一伏時取入水火鼎內炭塞口鐵盤蓋定鑿地一孔放碗一個盛水連盤覆鼎於碗上鹽泥固縫周圍加火煅之待冷取出汞自流入碗矣雍州溪洞燒取極易以百兩為一銚銚之制似豬脬外糊厚紙數重貯之即不走漏若撒失在地但以川椒末或茶末收之或以真金及鍮石引之即上嘉謨曰取去汞之砂殼名天流可點化修治斆曰凡使勿用草汞並舊朱漆中者經別藥制過者在尸中過者半生半死者其硃砂中水銀色微紅收得後用葫蘆貯之免遺失若先以紫背天葵並夜交藤自然汁二味同煮一伏時其毒自退若修十兩二汁各七鎰氣味辛寒有毒權曰有大毒大明曰無毒之才曰畏磁石砒霜宗奭曰水銀得鉛則凝得硫則結並棗肉研則散別法煅為膩粉粉霜唾研之死蝨銅得之則明灌尸中則後腐以金銀銅鐵置其上則浮得紫河車則伏得川椒則收可以勾金可為湧泉匱蓋借死水銀之氣也土宿真君曰荷葉松葉松脂穀精草萱草金星草瓦松夏枯草忍冬莨菪子雁來紅馬蹄香獨腳蓮水慈菰皆能制汞主治疥瘻痂瘍白禿殺皮膚中蝨墮胎除熱殺金銀銅錫毒熔化還復為丹久服神仙不死本經以敷男子陰陰消無氣別録利水道去熱毒藏器主天行熱疾除風安神鎮心治惡瘡瘑疥殺蟲催生下死胎大明治小兒驚熱涎潮宗奭鎮墜痰逆嘔吐反胃時珍發明弘景曰還復為丹事出仙經酒和日曝服之長生權曰水銀有大毒硃砂中液也乃還丹之元母神仙不死之藥能伏煉五金為泥抱朴子曰丹砂燒之成水銀積變又還成丹砂其去凡草木遠矣故能令人長生金汞在九竅則死人為之不朽況服食乎藏器曰水銀入耳能食人腦至盡入肉令百節攣縮倒陰絶陽人患瘡疥多以水銀塗之性滑重直入肉宜謹之頭瘡切不可用恐入經絡必緩筋骨百藥不治也宗奭曰水銀入藥雖各有法極須審謹有毒故也婦人多服絶娠今有水銀燒成丹砂醫人不曉誤用不可不謹唐韓愈云太學士李於遇方士柳泌能燒水銀為不死藥以鉛滿一鼎按中為空實以水銀蓋封四際燒為丹砂服之下血四年病益急乃死余不知服食説自何世起殺人不可計而世慕尚之益至此其惑也在文書所記及耳聞者不説今直取目見親與之遊而以藥敗者六七公以為世誡工部尚書歸登自説服水銀得病有若燒鐵杖自顛貫其下摧而為火射竅節以出狂痛呼號泣絶其裀席得水銀發且止唾血十數年以斃殿中御史李虛中疽發其背死刑部尚書李遜謂余曰我為藥誤遂死刑部侍郎李建一旦無病死工部尚書孟簡邀我於萬州屏人曰我得祕藥不可獨不死今遺子一器可用棗肉為丸服之別一年而病後有人至訊之曰前所服藥誤方且下之下則平矣病二歲卒東川節度御史大夫盧坦溺血肉痛不可忍乞死金吾將軍李道古以柳泌得罪食泌藥五十死海上此皆可為戒者也蘄不死乃速得死謂之智可不可也五穀三牲鹽醯果蔬人所常御人相厚勉必曰強食今惑者皆曰五穀令人夭三牲皆殺人當務減節一筵之饌禁忌十之二三不信常道而務鬼怪臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始動曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已時珍曰水銀乃至陰之精稟沉著之性得凡火煅煉則飛騰靈變得人氣熏蒸則入骨鑽筋絶陽蝕腦陰毒之物無似之者而大明言其無毒本經言其久服神仙甄權言其還丹元母抱朴子以為長生之藥六朝以下貪生者服食致成廢篤而喪厥軀不知若干人矣方士固不足道本草其可妄言哉水銀但不可服食爾而其治病之功不可掩也同黑鉛結砂則鎮墜痰涎同硫黃結砂則拯救危病此乃應變之兵在用者能得肯綮而執其樞機焉余見鉛白霜及靈砂下附方舊五新二十四初生不乳咽中有噤物如麻豆許用水銀米粒大與之下咽即愈聖惠方小兒癇疾能壓一切熱水銀小豆許安盞中沉湯內煮一食頃與服勿仰兒頭恐入腦也聖濟方急驚墜涎水銀半兩生南星一兩麝香半分為末入石腦油同搗和丸緑豆大每服一丸薄荷湯下失心風疾水銀一兩藕節八個研成砂子丸如芡子大每服二丸磨刀水下一二服經驗方精魅鬼病水銀一兩漿水一升炭火煎減三分取水銀一豆許神符裹吞之晚又服一二日止廣濟方反胃吐食水不能停黑鉛水銀各一錢半結砂舶硫黃五錢官桂一錢為末每服六錢一半米湯一半自然薑汁調作一處服聖濟録消渴煩熱水銀一兩鉛一兩結砂皂莢一挺酥炙麝香一錢為末每服半錢白湯下聖濟録膽熱衄蔑血上妄行水銀硃砂麝香等分為末每服半錢新汲水下宣明方血汗不止方同上妊婦胎動母欲死子尚在以此下之水銀硃砂各半兩研膏以牛膝半兩水五大盞煎汁入蜜調服半匙聖惠方婦人難産水銀二兩先煮後服立出梅師方胎死腹中其母欲死水銀二兩吞之立出梅師方婦人斷産水銀以麻油煎一日空心服棗大一丸永斷不損人婦人良方解金銀毒水銀一兩服之即出千金方誤吞金銀及環子叉子以汞半兩吞之再服即出聖惠方百蟲入耳水銀豆許傾入耳中以耳向下擊銅物數聲即出能食人腦非急切勿用聖濟録頭上生蝨水銀和蠟燭油揩之一夜皆死摘玄方腋下狐臭水銀胡粉等分以面脂和頻摻之千金方少年面皰水銀胡粉等分研臘豬脂和夜塗旦拭勿見水三度瘥肘後方老小口瘡水銀一分黃連六分水二升煮五合含之日十次普濟方白癜風癢水銀數拭之即消千金方蟲癬瘙癢水銀胡粉等分研敷又水銀蕪荑和酥敷之外臺祕要痔蟲作癢水銀棗膏各二兩同研綿裹納下部明日蟲出梅師方惡肉毒瘡一女年十四腕軟處生物如黃豆大半在肉中紅紫色痛甚諸藥不效一方士以水銀四兩白紙二張揉熟蘸銀擦之三日自落而愈李樓怪證方一切惡瘡水銀黃連胡粉熬黃各一兩研勻敷之干則以唾調肘後方楊梅毒瘡水銀黑鉛各一錢結砂黃丹一錢乳香沒藥各五分為末以紙卷作小捻染油點燈日照瘡三次七日見效方廣附余用水銀黑鉛結砂銀硃各二錢白花蛇一錢為末作紙捻七條頭日用三條自後日用一條香油點燈於爐中放被內熏之勿透風頭上有瘡連頭蓋之一方水銀一錢二分黑鉛白錫各八分共結砂黃丹四分硃砂六分為末分作十二紙捻以香油浸燈盞內點於小桶中以被圍病人坐之以鼻細細吸煙三日後口出惡物為效痘後生翳水銀一錢虢丹五錢研作六丸坩鍋糊定火煅一日取出薄綿裹之左翳塞右耳右翳塞左耳自然墜下危氏方水銀粉宋嘉祐釋名汞粉輕粉拾遺峭粉日華膩粉時珍曰輕言其質峭言其狀膩言其性昔蕭史與秦穆公煉飛雲丹第一轉乃輕粉即此修治時珍曰升煉輕粉法用水銀一兩白礬二兩食鹽一兩同研不見星鋪於鐵器內以小烏盆覆之篩灶灰鹽水和封固盆口以炭打二炷香取開則粉升於盆上矣其白如雪輕盈可愛一兩汞可升粉八錢又法水銀一兩皂礬七錢白鹽五錢同研如上升煉又法先以皂礬四兩鹽一兩焰硝五錢共炒黃為曲水銀一兩又曲二兩白礬二錢研勻如上升煉海客論云諸礬不與水銀相合而緑礬和鹽能制水銀成粉何也蓋水銀者金之魂魄緑礬者鐵之精華二氣同根是以暫製成粉無鹽則色不白氣味辛冷無毒大明曰畏磁石石黃忌一切血本出於丹砂故也時珍曰溫燥有毒升也浮也黃連土茯苓陳醬黑鉛鐵漿可制其毒主治通大腸轉小兒疳並瘰癧殺瘡疥癬蟲及鼻上酒皶風瘡瘙癢藏器治痰涎積滯水腫鼓脹毒瘡時珍發明宗奭曰水銀粉下膈涎並小兒涎潮瘛瘲藥多用然不可常服及過多多則損人若兼驚則危須審之蓋驚為心氣不足不可下下之裡虛驚氣入心不可治其人本虛更須禁此慎之至也劉完素曰銀粉能傷牙齒蓋上下齒齦屬手足陽明之經毒氣感於腸胃而精神氣血水穀既不勝其毒則毒即循經上行而至齒齦嫩薄之分為害也時珍曰水銀乃至陰毒物因火煅丹砂而出加以鹽礬煉而為輕粉以硫黃升而為銀硃輕飛靈變化純陰為燥烈其性走而不守善劫痰涎消積滯故水腫風痰濕熱毒瘡被劫涎從齒齦而出邪郁為之暫開而疾因之亦愈若服之過劑或不得法則毒氣被蒸竄入經絡筋骨莫之能出痰涎既去血液耗亡筋失所養營衛不從變為筋攣骨痛發為癰腫疳漏或手足皸裂蟲癬頑痹經年纍月遂成廢痼其害無窮觀丹客升煉水銀輕粉鼎器稍失固濟鐵石撼透況人之筋骨皮肉乎陳文中言輕粉下痰而損心氣小兒不可輕用傷脾敗陽必變他證初生尤宜慎之而演山氏謂小兒在胎受母飲食熱毒之氣畜在胸膈故生下個個發驚宜三日之內與黃連去熱膩粉散毒又與人參硃砂蜜湯解清心肺積毒既化兒可免此患二説不同各有所見一謂無胎毒者不可輕服一謂有胎毒者宜預解之用者宜審附方舊三新三十一小兒初生浴湯中入鹽少許拭乾以膩粉少許摩其身既不畏風又散諸氣全幼心鑑初生鎖肚證由胎中熱毒結於肛門兒生之後閉而不通三日者急令婦人咂兒前後心手足心並臍七處四五次以輕粉半錢蜜少許溫水化開時時與少許以通為度全幼心鑑小兒涎喘服藥不退者用無雄雞子一個取清入輕粉炒十錢拌和銀器盛置湯瓶上蒸熟三歲兒盡食當吐痰或泄而愈氣實者乃可用演山活幼口議幼兒哯乳不止服此立效膩粉一錢鹽豉七粒去皮研勻丸麻子大每服三丸藿香湯下活幼口議小兒吃泥及䑋肚用膩粉一分沙糖和丸麻子大空心米飲下一丸良久泄出泥土瘥經驗方大小便閉脹悶欲死二三日則殺人膩粉一錢生麻油一合相和空心服聖惠方大便壅結膩粉半錢沙糖一彈丸研丸梧子大每服五丸臨臥溫水下又方膩粉二錢黃丹一錢為末每米飲服一錢普濟方血痢腹痛膩粉五錢定粉三錢同研水浸蒸餅心少許和丸緑豆大每服七丸或十丸艾一枚水一盞煎湯下祕寶方消中嗜食多因外傷疸熱內積憂思啖食鹹物及面致脾胃乾燥飲食倍常不生肌肉大便反堅小便無度輕粉一錢為末薑汁拌勻長流水下齒浮是效後服豬肚丸補之危氏得效方一切虛風不二散用膩粉一兩湯煎五度如麻腳慢火焙乾麝香半兩細研每服一字溫水調下孫用和祕寶方水氣腫滿汞粉一錢烏雞子去黃盛粉蒸餅包蒸熟取出苦葶藶炒一錢同蒸餅杵丸緑豆大每車前湯下三五丸日三服神效醫壘元戎痘瘡生翳輕粉黃丹等分為末左目患吹右耳右目吹左耳即退王氏痘疹方女人面脂太真紅玉膏輕粉滑石杏仁去皮等分為末蒸過入腦麝少許以雞子清調勻洗面畢敷之旬日後色如紅玉閨閣事宜抓破面皮生薑自然汁調輕粉末搽之更無痕迹救急方牙齒疼痛輕粉一錢大蒜一瓣杵餅安膈骨前陷中先以銅錢隔了用蜆殼蓋定扎住一宿愈左疼安右右疼安左摘玄方風蟲牙疳膿血有蟲輕粉一錢黃連一兩為末摻之普濟方小兒耳爛輕粉棗子灰等分研油調敷摘玄方底耳腫痛汁水不絶輕粉一錢麝香一分為末摻之簡便方爛弦風眼膩粉末口津和點大眥日二三次聖惠方小兒頭瘡蔥汁調膩粉塗之又方雞子黃炒出油入麻油及膩粉末敷之集簡方小兒生癬豬脂和輕粉抹之直指方牛皮惡癬五更食炙牛肉一片少刻以輕粉半錢溫酒調下直指方楊梅瘡癬嶺南衛生方用汞粉大風子肉等分為末塗之即愈醫方摘玄用輕粉二錢杏仁四十二個去皮洗瘡拭乾搽之不過三次即愈干則以鵝膽汁調楊梅毒瘡醫學統旨用輕粉一錢雄黃丹砂各二錢半槐花炒龜板炙各一兩為末糊丸梧子大每服一錢冷茶下日二服七日愈楊誠經驗方用輕粉胡桃仁槐花炒研紅棗肉各二錢搗丸分作三服初日雞湯下二日酒下三日茶下三日服盡五日瘡干七日痂落一方用獖豬腎一對去膜批開各摻輕粉一錢扎定麻油二兩炸熟頓食不破口腫牙仍服金銀花藥一方用大雞卵一個去黃留白入輕粉一錢攪勻紙糊飯上蒸熟食下疳陰瘡輕粉末乾摻之即結靨而愈萬表積善堂方臁瘡不合以齏汁溫洗拭乾用蔥汁調輕粉敷之一方輕粉五分黃蠟一兩以粉摻紙上以蠟鋪之縛在瘡上黃水出即愈永類方癰疽惡瘡楊梅諸瘡水銀一兩硃砂雄黃各二錢半白礬緑礬各二兩半研勻罐盛燈盞蓋定鹽泥固濟文武火煉升罐口掃收每以三錢入乳香沒藥各五分灑太乙膏上貼之絶效名曰五寶霜粉霜綱目釋名水銀霜白雪綱目白靈砂時珍曰以汞粉轉升成霜故曰粉霜抱朴子云白雪粉霜也以海滷為匱蓋以土鼎勿泄精華七日乃成要足陽氣不為陰侵惟薑藕地丁河車可以煉之點化在仙為玄壺在人為精原在丹為木精在造化為白雪在天為甘露修治時珍曰升煉法用真汞粉一兩入瓦罐內令勻以燈盞仰蓋罐口鹽泥塗縫先以小炭火鋪罐底四圍以水濕紙不住手在燈盞內擦勿令間斷逐漸加火至罐頸住火冷定取出即成霜如白蠟按外臺祕要載古方崔氏造水銀霜法云用水銀十兩石硫黃十兩各以一鐺熬之良久銀熱黃硝急傾入一鐺少緩即不相入仍急攪之良久硫成灰銀不見乃下伏龍肝末十兩鹽末一兩攪之別以鹽末鋪鐺底一分入藥在上又以鹽末蓋面一分以瓦盆覆之鹽土和泥塗縫炭火煅一伏時先文後武開盆刷下凡一轉後分舊土為四分以一分和霜入鹽末二兩如前法飛之訖又以土一分鹽末二兩和飛如前凡四轉土盡更用新土如此七轉乃成霜用之此法後人罕知故附於此云氣味辛溫有毒時珍曰畏蕎麥稈灰硫黃主治下痰涎消積滯利水與輕粉同功時珍發明元素曰粉霜輕粉亦能潔淨腑去膀胱中垢膩既毒而損齒宜少用之時珍曰其功過與輕粉同附方新六小兒急驚搐搦涎盛粉霜二錢白牽牛炒輕粉各一錢為末每服一字薄荷湯下吐涎為效全嬰方小兒躁渴粉霜一字大兒半錢蓮花湯調下冬月用蓮肉保幼大全風熱驚狂神白丹治傷寒積熱及風生驚搐或如狂病諸藥不效粉霜一兩以白麵六錢和作餅子炙熟同研輕粉半兩鉛白霜二錢半為末滴水丸梧子大每服十丸至十五丸米飲下宣明方癍疹生翳粉霜八分硃砂一錢為末水調少許傾入耳內鴻飛集腋下狐臭粉霜水銀等分以面脂和塗之聖濟録楊梅惡瘡粉霜一味搽之集簡方銀硃綱目釋名猩紅紫粉霜時珍曰昔人謂水銀出於丹砂熔化還復為朱者即此也名亦由此集解時珍曰胡演丹藥祕訣云升煉銀硃用石亭脂二斤新鍋內熔化次下水銀一斤炒作青砂頭炒不見星研末罐盛石板蓋住鐵線縛定鹽泥固濟大火煅之待冷取出貼罐者為銀硃貼口者為丹砂今人多以黃丹及礬紅雜之其色黃黯宜辨之真者謂之水華朱每水銀一斤燒朱一十四兩八分次朱三兩五錢氣味辛溫有毒主治破積滯劫痰涎散結胸療疥癬惡瘡殺蟲及蝨功同粉霜時珍發明時珍曰銀硃乃硫黃同汞升煉而成其性燥烈亦能爛齦攣筋其功過與輕粉同也今廚人往往以之染色供饌宜去之附方新二十小兒內釣多啼銀硃半錢乳香煨蒜各一錢為末研丸黍米大半歲五丸薄荷湯下心鑑男女陰毒銀硃輕粉各一錢用五日獨蒜一枚搗和作餅貼手心男左女右兩手合定放陰下頃間氣回汗出即愈但口中微有氣即活唐瑤經驗方痰氣結胸鶴頂丹不問陰陽虛實炒過陷胸瀉心等藥用銀硃半兩明礬一兩同碾以尉斗盛火瓦盞盛藥熔化急刮搓丸每服一錢真茶入薑汁少許服之心上隱隱有聲結胸自散不動臟腑不傷真氣明礬化痰銀硃破積故也曾世榮活幼全書正水腫病大便利者銀硃半兩硫黃煅四兩為末麵糊丸梧子大每飲下三十丸普濟方咽喉疼痛銀硃海螵蛸末等分吹之取涎急救方火焰丹毒銀硃調雞子清塗之李樓怪症方湯火灼傷銀硃研細菜油調敷二次愈多能鄙事疽瘡發背銀硃白礬等分煎湯溫洗卻用桑柴火遠遠炙之日三次甚效救急方魚臍疔瘡四面赤中央黑銀硃水和丸每服一丸溫酒下名走馬丹普濟方楊梅毒瘡銀硃官香等分為末以紙卷作捻點燈置桶中以鼻吸煙一日一作七日愈又方銀硃二錢孩兒茶一錢龍挂香一錢皂角子一錢為末如上法用又方銀硃輕粉各一錢黃蠟清油各一兩化開和收以油紙攤貼瘡痂自脫也筋骨疼痛猩紅三錢枯礬四錢為末作三紙捻每旦以一捻蘸油點火熏臍被覆臥之取汗纂要奇方日久頑瘡不收者銀硃一錢千年地下石灰五分松香五錢香油一兩為末化攤紙上貼之應急良方臁瘡不斂方同上血風臁瘡生腳股上乃濕毒成風也黃蠟一兩溶化入銀硃一兩攪攤紙上刺孔貼之簡便方黃水濕瘡銀硃鹽梅和搗敷之集玄方癬瘡有蟲銀硃牛骨髓桐油調搽醫方摘要頭上生蝨銀硃浸醋日日梳頭包銀硃紙以碗覆燒之茶清洗下煙子揉之包頭一夜至旦蝨盡死積德堂方靈砂證類釋名二氣砂慎微曰茅亭客話載以靈砂餌胡孫鸚鵡鼠犬等變其心輒會人言丹之通為靈者時珍曰此以至陽勾至陰脫陰反陽故曰靈砂修治慎微曰靈砂用水銀一兩硫黃六銖細研炒作青砂頭後入水火既濟爐抽之如束針紋者成就也時珍曰按胡演丹藥祕訣云升靈砂法用新鍋安逍遙爐上蜜揩鍋底文火下燒入硫黃二兩熔化投水銀半斤以鐵匙急攪作青砂頭如有焰起噴醋解之待汞不見星取出細研盛入水火鼎內鹽泥固濟下以自然火升之乾水十二盞為度取出如束針紋者成矣庚辛玉册云靈砂者至神之物也硫汞制而成形謂之丹基奪天地造化之功竊陰陽不測之妙可以變化五行煉成九還其未升鼎者謂之青金丹頭已升鼎者乃曰靈砂靈砂有三以一伏時周天火而成者謂之金鼎靈砂以九度抽添用周天火而成者謂之九轉靈砂以地數三十日炒煉而成者謂之醫家老火靈砂並宜桑灰淋醋煮伏過用乃良氣味甘溫無毒主治五臟百病養神安魂魄益氣明目通血脈止煩滿益精神殺精魅惡鬼氣久服通神明不老輕身神仙令人心靈慎微主上盛下虛痰涎壅盛頭旋吐逆霍亂反胃心腹冷痛升降陰陽既濟水火調和五臟輔助元氣研末糯糊為丸棗湯服最能鎮墜神丹也時珍發明時珍曰硫黃陽精也水銀陰精也以之相配夫婦之道純陰純陽二體合璧故能奪造化之妙而升降陰陽既濟水火為扶危拯急之神丹但不可久服爾蘇東坡言此藥治久患反胃及一切吐逆小兒驚吐其效如神有配合陰陽之妙故也時珍常以陰陽水送之尤妙附方新七伏熱吐瀉陰陽丸用硫黃半兩水銀一錢研黑薑汁糊丸小豆大三歲三丸冷水下大人三四十丸鄭氏小兒方諸般吐逆方同上霍亂吐逆不問虛實冷熱二氣散一名青金丹用水銀硫黃等分研不見星每服一字至半錢生薑湯調下錢氏小兒方脾疼反胃靈砂一兩蚌粉一兩同炒赤丁香胡椒各四十九粒為末自然薑汁煮半夏粉糊丸梧子大每薑湯下二十丸普濟方冷氣心痛靈砂三分五靈脂一分為末稀糊丸麻子大每服二十丸食前石菖蒲生薑湯下直指方九竅出血因暴驚而得其脈虛者靈砂三十粒人參湯下三服愈此證不可錯認作血得熱則流妄用涼藥誤事楊仁齋直指方養正丹又名交泰丹乃寶林真人谷伯陽方也卻邪輔正助陽接真治元氣虧虛陰邪交蕩上盛下虛氣不升降呼吸不足頭旋氣短心怯驚悸虛煩狂言盜汗腹痛腰痛反胃吐食霍亂轉筋咳逆又治中風涎潮不省人事陽氣欲脫四肢厥冷傷寒陰盛自汗唇青脈沉婦人産後月候不勻帶下腹痛用黑盞一隻入黑鉛熔汁次下水銀次下硃砂末炒不見星少頃乃下硫黃末急攪有焰酒醋解之取出研末糯粉煮糊丸緑豆大每服二十丸鹽湯下四味皆等分此藥升降陰陽既濟心腎神效不可具述和濟局方雄黃本經中品釋名黃金石本經石黃唐本熏黃普曰雄黃生山之陽是丹之雄所以名雄黃也恭曰出石門者名石黃亦是雄黃而通名黃金石石門者為劣爾惡者名熏黃只用熏瘡疥故名之藏器曰今人敲取石黃中精明者為雄黃外黑者為熏黃雄黃燒之不臭熏黃燒之則臭以此分別權曰雄黃金之苗也故南方近金坑冶處時有之但不及西來者真好爾宗奭曰非金苗也有金窟處無雄黃時珍曰雄黃入點化黃金用故名黃金石非金苗也集解別録曰雄黃生武都山谷敦煌山之陽採無時弘景曰武都氐羌也是為仇池宕昌亦有之小劣敦煌在涼州西數千里近來紛擾皆用石門始興石黃之好者耳涼州黃好者作雞冠色不臭而堅實其黯黑及虛軟者不好也恭曰宕昌武都者為佳塊方數寸明徹如雞冠或以為枕服之辟惡其青黑堅者不入藥用貞觀年中以宕州新出有得方數尺者但重脆不可全致之耳禹錫曰水經注云黃水出零陵縣西北連巫山溪出雄黃頗有神異常以冬月祭祀鑿石深數丈方採得之故溪水取名焉又抱朴子云雄黃當得武都山中出者純而無雜其赤如雞冠光明曄曄者乃可用其但純黃似雌黃色無光者不任作仙藥可合理病藥耳頌曰今階州即古武都山中有之形塊如丹砂明徹不夾石其色如雞冠者真有青黑色而堅者名熏黃有形色似真而氣臭者名臭黃並不入服食只可療瘡疥其臭以醋洗之便去足以亂真尤宜辨又階州接西戎界出一種水窟雄黃生於山岩中有水流處其石名青煙石白鮮石雄黃出其中其塊大者如胡桃小者如粟豆上有孔竅其色深紅而微紫體極輕虛而功用更勝丹灶家尤貴重之時珍曰武都水窟雄黃北人以充丹砂但研細色帶黃耳丹房鏡源云雄黃千年化為黃金武都者上西番次之鐵色者上雞冠次之以沉水銀腳鐵末上拭了旋有黃衣生者為真一云驗之可以熁蟲死者為真細嚼口中含湯不臭辣者次之斆曰凡使勿用臭黃氣臭黑雞黃色如烏雞頭夾膩黃一重黃一重石並不堪用真雄黃似鷓鴣鳥肝色者為上修治斆曰每雄黃三兩以甘草紫背天葵地膽碧稜花各五兩細銼東流水入坩鍋中煮三伏時漉出搗如粉水飛澄去黑者曬乾再研用其內有劫鐵石又號赴矢黃能劫於鐵並不入藥用思邈曰凡服食用武都雄黃須油煎九日九夜乃可入藥不爾有毒慎勿生用時珍曰一法用米醋入蘿蔔汁煮乾用良抱朴子曰餌法或以蒸煮或以硝石化為水或以豬脂裹蒸之於赤土下或以松脂和之或以三物煉之引之如布白如冰服之令人長生除百病殺三蟲伏火者可點銅成金變銀成金氣味苦平寒有毒別録曰甘大溫權曰辛有大毒大明曰微毒土宿真君曰南星地黃萵苣五加皮紫河車地榆五葉藤黃芩白芷當歸地錦鵝腸草雞腸草苦參鵝不食草圓桑蝟脂皆可制雄黃主治寒熱鼠瘻惡瘡疽痔死肌殺精物惡鬼邪氣百蟲毒勝五兵煉食之輕身神仙本經療疥蟲𧈟瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰殺諸蛇虺毒解藜蘆毒悅澤人面餌服之者皆飛入腦中勝鬼神延年益壽保中不飢得銅可作金別録主疥癬風邪癲癇嵐瘴一切蟲獸傷大明搜肝氣瀉肝風消涎積好古治瘧疾寒熱伏暑泄痢酒飲成癖驚癇頭風眩暈化腹中瘀血殺勞蟲疳蟲時珍發明權曰雄黃能殺百毒闢百邪殺蠱毒人佩之鬼神不敢近入山林虎狼伏涉川水毒物不敢傷抱朴子曰帶雄黃入山林即不畏蛇若蛇中人以少許敷之登時愈吳楚之地暑濕鬱蒸多毒蟲及射工沙蝨之類但以雄黃大蒜等分合搗一丸佩之或已中者塗之亦良宗奭曰焚之蛇皆遠去治蛇咬方見五靈脂下唐書云甄立言究習方書為太常丞有尼年六十餘患心腹鼓脹身體羸瘦已二年立言診之曰腹內有蟲當是誤食發而然令餌雄黃一劑須臾吐出一蛇如拇指無目燒之猶有發氣乃愈又明皇雜録云有黃門奉使交廣回太醫周顧曰此人腹中有蛟龍上驚問黃門有疾否曰臣馳馬大庾嶺熱困且渴遂飲澗水覺腹中堅痞如石周遂以硝石雄黃煮服之立吐一物長數寸大如指視之鱗甲皆具此皆殺蠱毒之驗也頌曰雄黃治瘡瘍尚矣周禮瘍醫療瘍以五毒攻之鄭康成注云今醫方有五毒之藥作之合黃堥置石膽丹砂雄黃礜石磁石其中燒之三日三夜其煙上著雞羽掃取以注瘡惡肉破骨則盡出也楊億筆記載楊嵎少時有瘍生於頰連齒輔車外腫若覆甌內潰出膿血痛楚難忍百療彌年不瘥人令依鄭法燒藥注之少頃朽骨連牙潰出遂愈信古方攻病之速也黃堥音武即今有蓋瓦合也時珍曰五毒藥範汪東陽方變為飛黃散治緩疽惡瘡蝕惡肉其法取瓦盆一個安雌黃於中丹砂居南磁石居北曾青居東白石英居西礜石居上石膏次之鍾乳居下雄黃覆之雲母布於下各二兩末以一盆蓋之羊毛泥固濟作三隅灶以陳葦燒一日取其飛黃用之夫雄黃乃治瘡殺毒要藥也而入肝經氣分故肝風肝氣驚癇痰涎頭痛眩暈暑瘧泄痢積聚諸病用之有殊