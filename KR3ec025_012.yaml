body:
  text: 草部第十二卷李時珍曰天造地化而草木生焉剛交於柔而成根痎柔交於剛而成枝幹葉萼屬陽華實屬陰由是草中有木木中有草得氣之粹者為良得氣之戾者為毒故有五形焉金木水火土五氣焉香臭臊腥膻五色焉青赤黃白黑五味焉酸苦甘辛咸五性焉寒熱溫涼平五用焉升降浮沉中炎農嘗而辨之軒岐述而著之漢魏唐宋明賢良醫代有增益但三品雖存淄澠交混諸條重出涇渭不分苟不察其精微審其善惡其何以權七方衡十劑而寄死生耶於是剪繁去復繩繆補遺析族區類振綱分目除谷菜外凡得草屬之可供醫藥者六百一十一種分為十類曰山曰芳曰隰曰毒曰蔓曰水曰石曰苔曰雜曰有名未用舊本草部上中下三品共四百四十七種今併入三十一種移二十三種入菜部三種入谷部四種入果部二種入木部自木部移並一十四種蔓草二十九種菜部移並一十三種果部移並四種外類有名未用共二百四十七種神農本草經一百六十二種梁陶弘景注名醫別録一百三十一種陶弘景注七十八種有名未用李氏藥録一種魏李當之吳氏本草一種魏吳普唐本草三十三種唐蘇恭本草拾遺六十八種唐陳藏器食療本草二種唐孟詵海藥本草六種唐李珣四聲本草一種唐蕭炳開寶本草三十八種宋馬志嘉祐本草一十七種宋掌禹錫圖經本草五十四種宋蘇頌日華本草七種宋人大明用藥法象一種元李杲本草補遺一種元朱震亨救荒本草一種明定王本草會編一種明汪機本草綱目八十六種明李時珍附注宋雷斆炮炙論北齊徐之才藥對唐楊損之刪繁唐孫思邈千金蜀韓保升重注南唐陳士良食性宋寇宗奭衍義唐慎微證類陳承別說金張元素珍珠囊元王好古湯液吳瑞日用明汪穎食物王綸集要陳嘉謨蒙筌定王救荒寧原食鑑草之一山草類三十一種甘草本經上品釋名蜜甘別録蜜草別録美草別録蕗草別録靈通記事珠國老別録弘景曰此草最為衆藥之主經方少有不用者猶如香中有沉香也國老即帝師之稱雖非君而為君所宗是以能安和草石而解諸毒也甄權曰諸藥中甘草為君治七十二種乳石毒解一千二百般草木毒調和衆藥有功故有國老之號集解別録曰甘草生河西川穀積沙山及上郡二月八月除日採根曝乾十日成陶弘景曰河西上郡今不復通市今出蜀漢中悉從汶山諸地中來赤皮斷理看之堅實者是抱罕草最佳抱罕乃西羌地名亦有火炙乾者理多虛疏又有如鯉魚腸者被刀破不復好青州間有而不如又有紫甘草細而實乏時亦可用蘇頌曰今陝西河東州郡皆有之春生青苗高一二尺葉如槐葉七月開紫花似奈冬結實作角子如畢豆根長者三四尺粗細不定皮赤色上有橫梁梁下皆細根也採得去蘆頭及赤皮陰乾用今甘草有數種以堅實斷理者為佳其輕虛縱理及細韌者不堪惟貨湯家用之謹按爾雅云蘦大苦郭璞蘦似地黃又詩唐風云采苓采苓首陽之巔是也蘦與苓通用首陽之山在河東蒲阪縣乃今甘草所生處相近而先儒所說苗葉與今全別豈種類有不同者乎李時珍曰按沈括筆談云本草注引爾雅蘦大苦之注為甘草者非矣郭璞之注乃黃藥也其味極苦故謂之大苦非甘草也甘草枝葉悉如槐高五六尺但葉端微尖而糙澀似有白毛結角如相思角作一本生至熟時角拆子扁如小豆極堅齒齧不破今出河東西界寇氏衍義亦取此說而不言大苦非甘草也以理度之郭說形狀殊不相類沈說近之今人惟以大徑寸而結緊斷紋者為佳謂之粉草其輕虛細小者皆不及之劉績霏雪録言安南甘草大者如柱土人以架屋不識果然否也根修治雷斆曰凡使須去頭尾尖處其頭尾吐人每用切長三寸擘作六七片入瓷器中盛用酒浸蒸從巳至午取出曝乾銼細用一法每斤用酥七兩塗炙酥盡為度又法先炮令內外赤黃用時珍曰方書炙甘草皆用長流水蘸濕炙之至熟刮去赤皮或用漿水炙熟未有酥炙酒蒸者大抵補中宜炙用瀉火宜生用氣味甘平無毒寇宗奭曰生則微涼味不佳炙則溫王好古曰氣薄味厚升而浮陽也入足太陰厥陰經時珍曰通入手足十二經徐之才曰朮苦參乾漆為之使惡遠志反大戟芫花甘遂海藻權曰忌豬肉時珍曰甘草與藻戟遂芫四物相反而胡洽居士治痰澼以十棗湯加甘草大黃乃是痰在膈上欲令通泄以拔去病根也東垣李杲治項下結核消腫潰堅湯加海藻丹溪朱震亨治勞瘵蓮心飲用芫花二方俱有甘草皆本胡居士之意也故陶弘景言古方亦有相惡相反者乃不為害非妙達精微者不知此理主治五臟六腑寒熱邪氣堅筋骨長肌肉倍氣力金瘡腫解毒久服輕身延年本經腫音時勇切腫也溫中下氣煩滿短氣傷臟咳嗽止渴通經脈利血氣解百藥毒為九土之精安和七十二種石一千二百種草別録主腹中冷痛治驚癇除腹脹滿補益五臟養腎氣內傷令人陰不痿主婦人血瀝腰痛凡虛而多熱者加用之甄權安魂定魄補五勞七傷一切虛損驚悸煩悶健忘通九竅利百脈益精養氣壯筋骨大明生用瀉火熱熟用散表寒去咽痛除邪熱緩正氣養陰血補脾胃潤肺李杲吐肺痿之膿血消五發之瘡疽好古解小兒胎毒驚癇降火止痛時珍稍主治生用治胸中積熱去莖中痛加酒煮玄胡索苦楝子尤妙元素頭主治生用能行足厥陰陽明二經汙濁之血消腫導毒震亨主癰腫宜入吐藥時珍發明震亨曰甘草味甘大緩諸火黃中通理厚德載物之君子也欲達下焦須用梢子杲曰甘草氣薄味厚可升可降陰中陽也陽不足者補之以甘甘溫能除大熱故生用則氣平補脾胃不足而大瀉心火炙之則氣溫補三焦元氣而散表寒除邪熱去咽痛緩正氣養陰血凡心火乘脾腹中急痛腹皮急縮者宜倍用之其性能緩急而又協和諸藥使之不爭故熱藥得之緩其熱寒藥得之緩其寒寒熱相雜者用之得其平好古曰五味之用苦泄辛散酸收咸斂甘上行而發而本草言甘草下氣何也蓋甘味主中有升降浮沉可上可下可外可內有和有緩有補有泄居中之道盡矣張仲景附子理中湯用甘草恐其僭上也調胃承氣湯用甘草恐其速下也皆緩之之意小柴胡湯有柴胡黃芩之寒人參半夏之溫而用甘草者則有調和之意建中湯用甘草以補中而緩脾急也鳳髓丹用甘草以緩腎急而生元氣也乃甘補之意又曰甘者令人中滿中滿者勿食甘甘緩而壅氣非中滿所宜也凡不滿而用炙甘草為之補若中滿而用生甘草為之瀉能引諸藥直至滿所甘味入脾歸其所喜此升降浮沉之理也經云以甘補之以甘瀉之以甘緩之是矣時珍曰甘草外赤中黃色兼坤離味濃氣薄資全土德協和群品有元老之功普治百邪得王道之化贊帝力而人不知斂神功而己不與可謂藥中之良相也然中滿嘔吐酒客之病不喜其甘而大戟芫花甘遂海藻與之相反是亦迂緩不可以救昏昧而君子嘗見嫉於宵人之意歟頌曰按孫思邈千金方論云甘草解百藥毒如湯沃雪有中烏頭巴豆毒甘草入腹即定驗如反掌方稱大豆汁解百藥毒豫每試之不效加入甘草為甘豆湯其驗乃奇也又葛洪肘後備急方云席辨刺史嘗言嶺南俚人解蠱毒藥並是常用之物畏人得其法乃言三百頭牛藥或言三百兩銀藥久與親狎乃得其詳凡飲食時先取炙熟甘草一寸嚼之咽汁若中毒隨即吐出仍以炙甘草三兩生薑四兩水六升煮二升日三服或用都淋藤黃藤二物酒煎溫常服則毒隨大小溲出又常帶甘草數寸隨身備急若經含甘草而食物不吐者非毒物也三百頭牛藥即土常山也三百兩銀藥即馬兜鈴藤也詳見各條附方舊十五新二十二傷寒心悸脈結代者甘草二兩水三升煮一半服七合日一服傷寒類要傷寒咽痛少陰證甘草湯主之用甘草二兩蜜水炙水二升煮一升半服五合日二服張仲景傷寒論肺熱喉痛有痰熱者甘草炒二兩桔梗米泔浸一夜一兩每服五錢水一鍾半入阿膠半片煎服錢乙直訣肺痿多涎肺痿吐涎沫頭眩小便數而不咳者肺中冷也甘草乾薑湯溫之甘草炙四兩乾薑炮二兩水三升煮一升五合分服張仲景金匱要略肺痿久嗽涕唾多骨節煩悶寒熱以甘草三兩炙搗為末每日取小便三合調甘草末一錢服之廣利方小兒熱嗽甘草二兩豬膽汁浸五宿炙研末蜜丸緑豆大食後薄荷湯下十丸名涼膈丸聖惠方初生解毒小兒初生未可便與硃砂蜜只以甘草一指節長炙碎以水二合煮取一合以綿染點兒口中可為一蜆殼當吐出胸中惡汁此後待兒飢渴更與之令兒智慧無病出痘稀少王璆選方初生便閉甘草枳殼煨各一錢水半盞煎服全幼心鑑小兒撮口發噤用生甘草二錢半水一盞煎六分溫服令吐痰涎後以乳汁點兒口中金匱玉函嬰兒目澀月內目閉不開或腫羞明或出血者名慢肝風用甘草一截以豬膽汁炙為末每用米泔調少許灌之幼幼新書小兒遺尿大甘草頭煎湯夜夜服之危氏得效方小兒尿血甘草一兩二錢水六合煎二合一歲兒一日服盡姚和衆至寶方小兒羸瘦甘草三兩炙焦為末蜜丸緑豆大每溫水下五丸日二服金匱玉函大人羸瘦甘草三兩炙每旦以小便煮三四沸頓服之良外臺祕要赤白痢下崔宣州衍所傳方用甘草一尺炙劈破以淡漿水蘸三二度又以慢火炙之後用生薑去皮半兩二味以漿水一升半煎取八合服之立效梅師方用甘草一兩炙肉豆蔻七個煨銼以水三升煎一升分服舌腫塞口不治殺人甘草煎濃湯熱漱頻吐聖濟總録太陰口瘡甘草二寸白礬一粟大同嚼咽汁保命集發背癰疽崔元亮海上集驗方云李北海言此方乃神授極奇祕用甘草三大兩生搗篩末大麥面九兩和勻取好酥少許入內下沸水搜如餅狀方圓大於瘡一分熱敷腫上以綢片及故紙隔令通風冷則換之已成者膿水自出未成者腫便內消仍當吃黃耆粥為妙又一法甘草一大兩水炙搗碎水一大升浸之器上橫一小刀子露一宿平明以物攪令沫出去沫服之但是瘡腫發背皆甚效蘇頌圖經諸般癰疽甘草三兩微炙切以酒一斗同浸瓶中用黑鉛一片溶成汁投酒中取出如此九度令病者飲酒至醉寢後即愈也經驗方一切癰疽諸發預期服之能消腫逐毒使毒不內攻功效不可具述用大橫紋粉草二斤捶碎河水浸一宿揉取濃汁再以密絹過銀石器內慢火熬成膏以瓷罐收之每服一二匙無灰酒或白湯下曾服丹藥者亦解之或微利無妨名國老膏外科精要方癰疽祕塞生甘草二錢半井水煎服能疏導下惡物直指方乳癰初起炙甘草二錢新水煎服仍令人咂之直指方些小癰癤發熱時即用粉草節曬乾為末熱酒服一二錢連進數服痛熱皆止外科精要方痘瘡煩渴粉甘草炙栝蔞根等分水煎服之甘草能通血脈發瘡痘也直指方陰下懸癰生於穀道前後初發如松子大漸如蓮子數十日後赤腫如桃李成膿即破破則難愈也用橫紋甘草一兩四寸截斷以溪澗長流水一碗河水井水不用以文武火慢慢蘸水炙之自早至午令水盡為度劈開視之中心水潤乃止細銼用無灰好酒二小碗煎至一碗溫服次日再服便可保無虞此藥不能急消過二十日方得消盡興化守康朝病已破衆醫拱手服此兩劑即合口乃韶州劉從周方也李迅癰疽方陰頭生瘡蜜煎甘草末頻頻塗之神效千金方陰下濕癢甘草煎湯日洗三五度古今録驗代指腫痛甘草煎湯漬之千金方凍瘡發裂甘草煎湯洗之次以黃連黃柏黃芩末入輕粉麻油調敷談野翁方湯火灼瘡甘草煎蜜塗李樓奇方蠱毒藥毒甘草節以真麻油浸之年久愈妙每用嚼咽或水煎服神妙直指方小兒中蠱欲死者甘草半兩水一盞煎五分服當吐出金匱玉函牛馬肉毒甘草煮濃汁飲一二升或煎酒服取吐或下如渴不可飲水飲之即死千金方飲饌中毒未審何物猝急無藥只煎甘草薺苨湯入口便活金匱玉函方水莨菪毒菜中有水莨菪葉圓而光有毒誤食令人狂亂狀若中風或作吐以甘草煮汁服之即解金匱玉函妙方黃耆本經上品釋名黃耆綱目戴糝本經戴椹別録又名獨椹芰草別録又名蜀脂百本別録王孫藥性論時珍曰耆長也黃耆色黃為補藥之長故名今俗通作黃耆或作蓍者非矣蓍乃蓍龜之蓍音尸王孫與牡蒙同名異物集解別録曰黃耆生蜀郡山谷白水漢中二月十月採陰乾弘景曰第一齣隴西洮陽色黃白甜美今亦難得次用黑水宕昌者色白肌理粗新者亦甘而溫補又有蠶陵白水者色理勝蜀中者而冷補又有赤色者可作膏貼俗方多用道家不須恭曰今出原州及華原者最良蜀漢不復採用宜州寧州者亦佳頌曰今河東陝西州郡多有之根長二三尺以來獨莖或作叢生枝幹去地二三寸其葉扶疏作羊齒狀又如蒺藜苗七月中開黃紫花其實作莢子長寸許八月中採根用其皮折之如綿謂之綿黃耆然有數種有白水耆赤水耆木耆功用並同而力不及白水耆木耆短而理橫今人多以苜蓿根假作黃耆折皮亦似綿頗能亂真但苜蓿根堅而脆黃耆至柔韌皮微黃褐色肉中白色此為異耳承曰黃耆本出綿上者為良故名綿黃耆非謂其柔韌如綿也今圖經所繪憲州者地與綿上相鄰也好古曰綿上即出西沁州白水在陝西同州黃耆味甘柔軟如綿能令人肥苜蓿根味苦而堅脆俗呼為土黃耆能令人瘦用者宜審嘉謨曰綿上沁州鄉名今有巡檢司白水赤水二鄉俱屬隴西時珍曰黃耆葉似槐葉而微尖小又似蒺藜葉而微闊大青白色開黃紫花大如槐花結小尖角長寸許根長二三尺以緊實如箭竿者為良嫩苗亦可煠淘茹食其子收之十月下種如種菜法亦可修治斆曰凡使勿用木耆草真相似只是生時葉短並根橫也須去頭上皺皮蒸半日擘細於槐砧上銼用時珍曰今人但捶扁以蜜水塗炙數次以熟為度亦有以鹽湯潤透器盛於湯瓶蒸熟切用者根氣味甘微溫無毒本經白水者冷補別録元素曰味甘氣溫平氣薄味厚可升可降陰中陽也入手足太陰氣分又入手少陽足少陰命門之才曰茯苓為之使惡龜甲白蘚皮主治癰癰久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病本經婦人子臟風邪氣逐五臟間惡血補丈夫虛損五勞羸瘦止渴腹痛泄痢益氣利陰氣別録主虛喘腎衰耳聾療寒熱治發背內補甄權助氣壯筋骨長肉補血破症癖瘰癧癭贅腸風血崩帶下赤白痢産前後一切病月候不勻痰嗽頭風熱毒赤目日華治虛勞自汗補肺氣瀉肺火心火實皮毛益胃氣去肌熱及諸經之痛元素主太陰瘧疾陽維為病苦寒熱督脈為病逆氣裡急好古發明弘景曰出隴西者溫補出白水者冷補又有赤色者可作膏用消癰腫藏器曰虛而客熱用白水黃耆虛而客冷用隴西黃耆大明曰黃耆藥中補益呼為羊肉白水耆涼無毒排膿治血及煩悶熱毒骨蒸勞赤水耆涼無毒治血退熱毒余功並同木耆涼無毒治煩排膿之力微於黃耆遇闕即倍用之元素曰黃耆甘溫純陽其用有五補諸虛不足一也益元氣二也壯脾胃三也去肌熱四也排膿止痛活血生血內托陰疽為瘡家聖藥五也又曰補五臟諸虛治脈弦自汗瀉陰火去虛熱無汗則發之有汗則止之好古曰黃耆治氣虛盜汗並自汗及膚痛是皮表之藥治咯血柔脾胃是中州之藥治傷寒尺脈不至補腎臟元氣是里藥乃上中下內外三焦之藥也杲曰靈樞云衛氣者所以溫分肉而充皮膚肥腠理而司開闔黃耆既補三焦實衛氣與桂同功特比桂甘平不辛熱為異耳但桂則通血脈能破血而實衛氣耆則益氣也又黃耆與人參甘草三味為除躁熱肌熱之聖藥脾胃一虛肺氣先絶必用黃耆溫分肉益皮毛實腠理不令汗出以益元氣而補三焦震亨曰黃耆補元氣肥白而多汗者為宜若面黑形實而瘦者服之令人胸滿宜以三拗湯瀉之宗奭曰防風黃耆世多相須而用唐許胤宗初仕陳為新蔡王外兵參軍時柳太后病風不能言脈沉而口噤胤宗曰既不能下藥宜湯氣蒸之藥入腠理周時可瘥乃造黃耆防風湯數斛置於床下氣如煙霧其夕便得語也杲曰防風能制黃耆黃耆得防風其功愈大乃相畏而相使也震亨曰人之口通乎地鼻通乎天口以養陰鼻以養陽天主清故鼻不受有形而受無形地主濁故口受有形而兼乎無形柳太后之病不言若以有形之湯緩不及事今投以二物湯氣滿室則口鼻俱受非智者通神不可回生也杲曰小兒外物驚宜用黃連安神丸鎮心藥若脾胃寒濕嘔吐腹痛瀉痢青白宜用益黃散藥如脾胃伏火勞役不足之證及服巴豆之類胃虛而成慢驚者用益黃理中之藥必傷人命當於心經中以甘溫補土之源更於脾土中以甘寒瀉火以酸涼補金使金旺火衰風木自平矣今立黃耆湯瀉火補金益土為神治之法用炙黃耆二錢人參一錢炙甘草五分白芍藥五分水一大盞煎半盞溫服機曰蕭山魏直著博愛心鑑三卷言小兒痘瘡惟有順逆險三證順者為吉不用藥逆者為凶不必用藥惟險乃悔吝之象當以藥轉危為安宜用保元湯加減主之此方原出東垣治慢驚土衰火旺之法今借而治痘以其內固營血外護衛氣滋助陰陽作為膿血其證雖異其理則同去白芍藥加生薑改名曰保元湯炙黃耆三錢人參二錢炙甘草一錢生薑一片水煎服之險證者初出圓暈乾紅少潤也漿長光澤頂陷不起也既出雖起慘色不明也漿行色灰不榮也漿定光潤不消也漿老濕潤不斂也結痂而胃弱內虛也痂落而口渴不食也痂後生癰腫也癰腫潰而斂遲也凡有諸症並宜此湯或加芎藭加官桂加糯米以助之詳見本書嘉謨曰人參補中黃耆實表凡內傷脾胃發熱惡寒吐泄怠臥脹滿痞塞神短脈微者當以人參為君黃耆為臣若表虛自汗亡陽潰瘍痘疹陰瘡者當以黃耆為君人參為臣不可執一也附方舊五新九小便不通綿黃耆二錢水二盞煎一盞溫服小兒減半總微論酒疸黃疾心下懊痛足脛滿小便黃飲酒發赤黑黃斑由大醉當風入水所致黃耆二兩木蘭一兩為末酒服方寸匕日三服肘後方氣虛白濁黃耆鹽炒半兩茯苓一兩為末每服一錢白湯下經驗良方治渴補虛男子婦人諸虛不足煩悸焦渴面色萎黃不能飲食或先渴而後發瘡癤或先癰疽而後發渴並宜常服此藥平補氣血安和臟腑終身可免癰疽之疾用綿黃耆箭桿者去蘆六兩一半生焙一半以鹽水潤濕飯上蒸三次焙銼粉甘草一兩一半生用一半炙黃為末每服二錢白湯點服早晨日午各一服亦可煎服名黃耆六一湯外科精要老人祕塞綿黃耆陳皮去白各半兩為末每服三錢用大麻子一合研爛以水濾漿煎至乳起入白蜜一匙再煎沸調藥空心服甚者不過二服此藥不冷不熱常服無祕塞之患其效如神和劑局方腸風瀉血黃耆黃連等分為末麵糊丸緑豆大每服三十丸米飲下孫用和祕寶方尿血沙淋痛不可忍黃耆人參等分為末以大蘿蔔一個切一指厚大四五片蜜二兩淹炙令盡不令焦點末食無時以鹽湯下永類方吐血不止黃耆二錢半紫背浮萍五錢為末每服一錢薑蜜水下聖濟總録咳嗽膿血咽乾乃虛中有熱不可服涼藥以好黃耆四兩甘草一兩為末每服二錢點湯服席延賞方肺癰得吐黃耆二兩為末每服二錢水一中盞煎至六分溫服日三四服聖惠方甲疽瘡膿生足趾甲邊赤肉突出時常舉發者黃耆二兩䕡茹一兩醋浸一宿以豬脂五合微火上煎取二合絞去滓以封瘡口上日三度其肉自消外臺祕要胎動不安腹痛下黃汁黃耆川芎藭各一兩糯米一合水一升煎半升分服婦人良方陰汗濕癢綿黃耆酒炒為末以熟豬心點吃妙趙真人濟急方癰疽內固黃耆人參各一兩為末入真龍腦一錢用生藕汁和丸緑豆大每服二十溫水下日三服本事方莖葉主治療渴及筋攣癰腫疽瘡別録人參本經上品釋名人參音參或省作參黃參吳普血參別録人銜本經鬼蓋本經神草別録土精別録地精廣雅海腴皺面還丹廣雅時珍曰人𣿯年深浸漸長成者根如人形有神故謂之人參神草參字從參亦浸漸之義參即浸字後世因字文繁遂以參星之字代之從簡便爾然承誤日久亦不能變矣惟張仲景傷寒論尚作𣿯字別録一名人銜銜乃參字之訛也其成有階級故曰人銜其草背陽向陰故曰鬼蓋其在五參色黃屬土而補脾胃生陰血故有黃參血參之名得地之精靈故有土精地精之名廣五行記云隋文帝時上黨有人宅後每夜聞人呼聲求之不得去宅一里許見人參枝葉異常掘之入地五尺得人參一如人體四肢畢備呼聲遂絶觀此則土精之名尤可證也禮斗威儀云下有人參上有紫氣春秋運鬥樞云搖光星散而為人參人君廢山瀆之利則搖光不明人參不生觀此則神草之名又可證矣集解別録曰人參生上黨山谷及遼東二月四月八月上旬採根竹刀刮曝乾無令見風根如人形者有神普曰或生邯鄲三月生葉小鋭枝黑莖有毛三月九月採根根有手足面目如人者神弘景曰上黨在冀州西南今來者形長而黃狀如防風多潤實而甘俗乃重百濟者形細而堅白氣味薄於上黨者次用高麗者高麗地近遼東形大而虛軟不及百濟並不及上黨者其草一莖直上四五葉相對生花紫色高麗人作人參贊云三丫五葉背陽向陰欲來求我椵樹相尋椵音賈樹似桐甚大附廣則多生採作甚有法今近山亦有但作之不好恭曰人參見用多是高麗百濟者潞州太行紫團山所出者謂之紫團參保升曰今沁州遼州澤州箕州平州易州檀州幽州媯州並州並出人參蓋其山皆與太行連亙相接故也珣曰新羅國所産者有手足狀如人形長尺余以杉木夾定紅絲纏飾之又沙州參短小不堪用頌曰今河東諸州及泰山皆有之又有河北榷場及閩中來者名新羅人參俱不及上黨者佳春生苗多於深山背陰近椵漆下濕潤處初生小者三四寸許一丫五葉四五年後生兩丫五葉未有花莖至十年後生三丫年深者生四丫各五葉中心生一莖俗名百尺杵三月四月有花細小如粟蕊如絲紫白色秋後結子或七八枚如大豆生青熟紅自落根如人形者神泰山出者葉乾青根白殊別江淮間出一種土人參苗長一二尺葉如匙而小與桔梗相似相對生生五七節根亦如桔梗而柔味極甘美秋生紫花又帶青色春秋採根土人或用之相傳欲試上黨參但使二人同走一含人參一空口度走三五里許其不含人參者必大喘含者氣息自如其人參乃真也宗奭曰上黨者根頗纖長根下垂有及一尺余者或十歧者其價與銀等稍為難得土人得一窠則置板上以新彩絨飾之嘉謨曰紫團參紫大稍扁百濟參白堅且圓名白條參俗名羊角參遼東參黃潤纖長有須俗名黃參獨勝高麗參近紫體虛新羅參亞黃味薄肖人形者神其類雞腿者力洪時珍曰上黨今潞州也民以人參為地方害不復採取今所用者皆是遼參其高麗百濟新羅三國今皆屬於朝鮮矣其參猶來中國互市亦可收子於十月下種如種菜法秋冬採者堅實春夏採者虛軟非地産有虛實也遼參連皮者黃潤色如防風去皮者堅白如粉僞者皆以沙參薺苨桔梗採根造作亂之沙參體虛無心而味淡薺苨體虛無心桔梗體堅有心而味苦人參體實有心而味甘微帶苦自有餘味俗名金井玉闌也其似人形者謂之孩兒參尤多贋僞宋蘇頌圖經本草所繪潞州者三丫五葉真人參也其滁州者乃沙參之苗葉沁州兗州者皆薺苨之苗葉其所云江淮土人參者亦薺苨也並失之詳審今潞州者尚不可得則他處者尤不足信矣近又有薄夫以人參先浸取汁自啜乃曬乾復售謂之湯參全不任用不可不察考月池翁諱言聞字子郁銜太醫吏目嘗著人參傳上下卷甚詳不能備録亦略節要語於下條云耳修治弘景曰人參易蛀蚛唯納新器中密封可經年不壞炳曰人參頻見風日則易蛀惟用盛過麻油瓦罐泡淨焙乾入華陰細辛與參相間收之密封可留經年一法用淋過灶灰曬乾罐收亦可李言聞曰人參生時背陽故不喜見風日凡生用宜㕮咀熟用宜隔紙焙之或醇酒潤透㕮咀焙熟用並忌鐵器根氣味甘微寒無毒別録曰微溫普曰神農小寒桐君雷公苦黃帝岐伯甘無毒元素曰性溫味甘微苦氣味俱薄浮而升陽中之陽也又曰陽中微陰之才曰茯苓馬藺為之使惡溲疏滷鹼反藜蘆一云畏五靈脂惡皂莢黑豆動紫石英元素曰人參得升麻引用補上焦之元氣瀉肺中之火得茯苓引用補下焦之元氣瀉腎中之火得麥門冬則生脈得乾薑則補氣杲曰得黃耆甘草乃甘溫除大熱瀉陰火補元氣又為瘡家聖藥震亨曰人參入手太陰與藜蘆相反服參一兩入黎蘆一錢其功盡廢也言聞曰東垣李氏理脾胃瀉陰火交泰丸內用人參皂莢是惡而不惡也古方療月閉四物湯加人參五靈脂是畏而不畏也又療痰在胸膈以人參黎蘆同用而取湧越是激其怒性也此皆精微妙奧非達權衡者不能知主治補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延年本經療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脈破堅積令人不忘別録主五勞七傷虛損痰弱止嘔噦補五臟六腑保中守神消胸中痰治肺痿及癇疾冷氣逆上傷寒不下食凡虛而多夢紛紜者加之甄權止煩躁變酸水李珣消食開胃調中治氣殺金石藥毒大明治肺胃陽氣不足肺氣虛促短氣少氣補中緩中瀉心肺脾胃中火邪止渴生津液元素治男婦一切虛證發熱自汗眩暈頭痛反胃吐食痎瘧滑瀉久痢小便頻數淋瀝勞倦內傷中風中暑痿痹吐血嗽血下血血淋血崩胎前産後諸病時珍發明弘景曰人參為藥切要與甘草同功杲曰人參甘溫能補肺中元氣肺氣旺則四臟之氣皆旺精自生而形自盛肺主諸氣故也張仲景云病人汗後身熱亡血脈沉遲者下痢身涼脈微血虛者並加人參古人血脫者益氣蓋血不自生須得生陽氣之藥乃生陽生則陰長血乃旺也若單用補血藥血無由而生矣素問言無陽則陰無以生無陰則陽無以化故補氣須用人參血虛者亦須用之本草十劑云補可去弱人參羊肉之屬是也蓋人參補氣羊肉補形形氣者有無之象也好古曰潔古老人言以沙參代人參取其味甘也然人參補五臟之陽沙參補五臟之陰安得無異雖云補五臟亦須各用本臟藥相佐使引之言聞曰人參生用氣涼熟用氣溫味甘補陽微苦補陰氣主生物本呼天味主成物本呼地氣味生成陰陽之造化也涼者高秋清肅之氣天之陰也其性降溫者陽春生髮之氣天之陽也其性升甘者濕土化成之味地之陽也其性浮微苦者火土相生之味地之陰也其性沉人參氣味俱薄氣之薄者生降熟升味之薄者生升熟降如土虛火旺之病則宜生參涼薄之氣以瀉火而補土是純用其氣也脾虛肺怯之病則宜熟參甘溫之味以補土而生金是純用其味也東垣以相火乘脾身熱而煩氣高而喘頭痛而渴脈洪而大者用黃柏佐人參孫真人治夏月熱傷元氣人汗大泄欲成痿厥用生脈散以瀉熱火而救金水君以人參之甘寒瀉火而補元氣臣以麥門冬之苦甘寒清金而滋水源佐以五味子之酸溫生腎精而收耗氣此皆補天元之真氣非補熱火也白飛霞雲人參煉膏服回元氣於無何有之鄉凡病後氣虛及肺虛嗽者並宜之若氣虛有火者合天門冬膏對服之正誤斆曰夏月少使人參發心痃之患好古曰人參甘溫補肺之陽泄肺之陰肺受寒邪宜此補之肺受火邪則反傷肺宜以沙參代之王綸曰凡酒色過度損傷肺腎真陰陰虛火動勞嗽吐血咳血等證勿用之蓋人參入手太陰能補火故肺受火邪者忌之若誤服參耆甘溫之劑則病日增服之過多則死不可治蓋甘溫助氣氣屬陽陽旺則陰愈消惟宜苦甘寒之藥生血降火世人不識往往服參耆為補而死者多矣言聞曰孫真人云夏月服生脈散腎瀝湯三劑則百病不生李東垣亦言生脈散清暑益氣湯乃三伏瀉火益金之聖藥而雷斆反謂發心痃之患非矣痃乃臍旁積氣非心病也人參能養正破堅積豈有發痃之理觀張仲景治腹中寒氣上衝有頭足上下痛不可觸近嘔不能食者用大建中湯可知矣又海藏王好古言人參補陽泄陰肺寒宜用肺熱不宜用節齊王綸因而和之謂參耆能補肺火陰虛火動失血諸病多服必死二家之說皆偏矣夫人參能補元陽生陰血而瀉陰火東垣李氏之說也明矣仲景張氏言亡血血虛者並加人參又言肺寒者去人參加乾薑無令氣壅丹溪朱氏亦言虛火可補參耆之屬實火可瀉芩連之屬二家不察三氏之精微而謂人參補火謬哉夫火與元氣不兩立元氣勝則邪火退人參既補元氣而又補邪火是反復之小人矣何以與甘草苓術謂之四君子耶雖然三家之言不可盡廢也惟其語有滯故守之者泥而執一遂視人參加蛇蠍則不可也凡人面白面黃面青黧悴者皆脾肺腎氣不足可用也面赤面黑者氣壯神強不可用也脈之浮而芤濡虛大遲緩無力沉而遲澀弱細結代無力者皆虛而不足可用也若弦長緊實滑數有力者皆火鬱內實不可用也潔古謂喘嗽勿用者痰實氣壅之喘也若腎虛氣短喘促者必用也仲景謂肺寒而咳勿用者寒束熱邪壅鬱在肺之咳也若自汗惡寒而咳者必用也東垣謂久病鬱熱在肺勿用者乃火鬱於內宜發不宜補也若肺虛火旺氣短自汗者必用也丹溪言諸痛不可驟用者乃邪氣方鋭宜散不宜補也若裡虛吐利及久病胃弱虛痛喜按者必用也節齊謂陰虛火旺勿用者乃血虛火亢能食脈弦而數涼之則傷胃溫之則傷肺不受補者也若自汗氣短肢寒脈虛者必用也如此詳審則人參之可用不可用思過半矣機曰節齊王綸之說本於海藏王好古但綸又過於矯激丹溪言虛火可補須用參耆又云陰虛潮熱喘嗽吐血盜汗等證四物加人參黃柏知母又云好色之人肺腎受傷咳嗽不愈瓊玉膏主之又云肺腎虛極者獨參膏主之是知陰虛勞瘵之證未嘗不用人參也節齊私淑丹溪者也而乃相反如此斯言一出印定後人眼目凡遇前證不問病之宜用不宜輒舉以藉口致使良工掣肘惟求免夫病家之怨病家亦以此說橫之胸中甘受苦寒雖至上嘔下泄去死不遠亦不悟也古今治勞莫過於葛可久其獨參湯保真湯何嘗廢人參而不用耶節齊之說誠未之深思也楊起曰人參功載本草人所共知近因病者吝財薄醫醫復算本惜費不肯用參療病以致輕者至重重者至危然有肺寒肺熱中滿血虛四證只宜散寒消熱消脹補營不用人參其說近是殊不知各加人參在內護持元氣力助群藥其功更捷若曰氣無補法則謬矣古方治肺寒以溫肺湯肺熱以清肺湯中滿以分消湯血虛以養營湯皆有人參在焉所謂邪之所輳其氣必虛又曰養正邪自除陽旺則生陰血貴在配合得宜爾庸醫每謂人參不可輕用誠哉庸也好生君子不可輕命薄醫醫亦不可計利不用書此奉勉幸勿曰迂附方舊七新六十人參膏用人參十兩細切以活水二十盞浸透入銀石器內桑柴火緩緩煎取十盞濾汁再以水十盞煎取五盞與前汁合煎成膏瓶收隨病作湯使丹溪云多欲之人腎氣衰憊咳嗽不止用生薑橘皮煎湯化膏服之浦江鄭兄五月患痢又犯房室忽發昏暈不知人事手撒目暗自汗如雨喉中痰鳴如曳鋸聲小便遺失脈大無倫此陰虧陽絶之證也豫令急煎大料人參膏仍與灸氣海十八壯右手能動再三壯唇口微動遂與膏服一盞半夜後服三盞眼能動盡三斤方能言而索粥盡五斤而痢止至十斤而全安若作風治則誤矣一人背疽服內托十宣藥已多膿出作嘔發熱六脈沉數有力此潰瘍所忌也遂與大料人參膏入竹瀝飲之參盡一十六斤竹伐百餘竿而安後經旬余值大風拔木瘡起有膿中有紅線一道過肩胛抵右肋豫曰急作參膏以芎歸橘皮作湯入竹瀝薑汁飲之盡三斤而瘡潰調理乃安若癰疽潰後氣血俱虛嘔逆不食變證不一者以參耆歸術等分煎膏服之最妙治中湯頌曰張仲景治胸痹心中痞堅留氣結胸胸滿脅下逆氣搶心治中湯主之即理中湯人參朮乾薑甘草各三兩四味以水八升煮三升每服一升日三服隨證加減此方自晉宋以後至唐名醫治心腹病者無不用之或作湯或蜜丸或為散皆有奇效胡洽居士治霍亂謂之溫中湯陶隱居百一方云霍亂余藥乃或難求而治中方四順湯厚朴湯不可暫缺常須預合自隨也唐石泉公王方慶雲數方不惟霍亂可醫諸病皆療也四順湯用人參甘草乾薑附子炮各二兩水六升煎二升半分四服四君子湯治脾胃氣虛不思飲食諸病氣虛者以此為主人參一錢白朮二錢白茯苓一錢炙甘草五分姜三片棗一枚水二鍾煎一鍾食前溫服隨證加減和劑局方開胃化痰不思飲食不拘大人小兒人參焙二兩半夏薑汁浸焙五錢為末飛羅面作糊丸緑豆大食後薑湯下三五十丸日三服聖惠方加陳橘皮五錢經驗後方胃寒氣滿不能傳化易飢不能食人參末二錢生附子末半錢生薑二錢水七合煎二合雞子清一枚打轉空心服之聖濟總録脾胃虛弱不思飲食生薑半斤取汁白蜜十兩人參末四兩銀鍋煎成膏每米飲調服一匙普濟方胃虛噁心或嘔吐有痰人參一兩水二盞煎一盞入竹瀝一杯薑汁三匙食遠溫服以知為度老人尤宜簡便方胃寒嘔惡不能腐熟水穀食即嘔吐人參丁香藿香各二錢半橘皮五錢生薑三片水二盞煎一盞溫服拔萃方反胃嘔吐飲食入口即吐困弱無力垂死者上黨人參三大兩拍破水一大升煮取四合熱服日再兼以人參汁入粟米雞子白薤白煮粥與啖李直方司勳於漢南患此兩月餘諸方不瘥遂與此方當時便定後十餘日遂入京師絳每與名醫論此藥難可為儔也李絳兵部手集方食入即吐人參半夏湯用人參一兩半夏一兩五錢生薑十片水一斗以杓揚二百四十遍取三升入白蜜三合煮一升半分服張仲景金匱方霍亂嘔惡人參二兩水一盞半煎汁一盞入雞子白一枚再煎溫服一加丁香衛生家寶方霍亂煩悶人參五錢桂心半錢水二盞煎服聖惠方霍亂吐瀉煩躁不止人參二兩橘皮三兩生薑一兩水六升煮三升分三服聖濟總録妊娠吐水酸心腹痛不能飲食人參乾薑炮等分為末以生地黃汁和丸梧子大每服五十丸米湯下和劑局方陽虛氣喘自汗盜汗氣短頭暈人參五錢熟附子一兩分作四帖每帖以生薑十片流水二盞煎一盞食遠溫服濟生方喘急欲絶上氣鳴息者人參末湯服方寸匕日五六服效肘後方産後發喘乃血入肺竅危症也人參末一兩蘇木二兩水二碗煮汁一碗調參末服神效聖惠方産後血暈人參一兩紫蘇半兩以童尿酒水三合煎服醫方摘要産後不語人參石菖蒲石蓮肉等分每服五錢水煎服婦人良方産後諸虛發熱自汗人參當歸等分為末用豬腰子一個去膜切小片以水三升糯米半合蔥白二莖煮米熟取汁一盞入藥煎至八分食前溫服永類方産後祕塞出血多以人參麻子仁枳殼麩炒為末煉蜜丸梧子大每服五十丸米飲下濟生方橫生倒産人參末乳香末各一錢丹砂末五分研勻雞子白一枚入生薑自然汁三匙攪勻冷服即母子俱安神效此施漢卿方也婦人良方開心益智人參末一兩煉成獖豬肥肪十兩以淳酒和勻每服一杯日再服服至百日耳目聰明骨髓充盈肌膚潤澤日記千言兼去風熱痰病千金方聞雷即昏一小兒七歲聞雷即昏倒不知人事此氣怯也以人參當歸麥門冬各二兩五味子五錢水一斗煎汁五升再以水五升煎滓取汁二升合煎成膏每服三匙白湯化下服盡一斤自後聞雷自若矣楊起簡便方忽喘悶絶方見大黃下離魂異疾有人臥則覺身外有身一樣無別但不語蓋人臥則魂歸於肝此由肝虛邪襲魂不歸舍病名曰離魂用人參龍齒赤茯苓各一錢水一盞煎半盞調飛過硃砂末一錢睡時服一夜一服三夜後真者氣爽假者即化矣夏子益怪證奇疾方怔忡自汗心氣不足也人參半兩當歸半兩用獖豬腰子二個以水二碗煮至一碗半取腰子細切人參當歸同煎至八分空心吃腰子以汁送下其滓焙乾為末以山藥末作糊丸緑豆大每服五十丸食遠棗湯下不過兩服即愈此崑山神濟大師方也一加乳香二錢王璆百一選方心下結氣凡心下硬按之則無常覺膨滿多食則吐氣引前後噫厄不除由思慮過多氣不以時而行則結滯謂之結氣人參一兩橘皮去白四兩為末煉蜜丸梧子大每米飲下五六十丸聖惠方房後困倦人參七錢陳皮一錢水一盞半煎八分食前溫服日再服千金不傳趙永庵方虛勞發熱愚魯湯用上黨人參銀州柴胡各三錢大棗一枚生薑三片水一鍾半煎七分食遠溫服日再服以愈為度奇效良方肺熱聲啞人參二兩訶子一兩為末噙咽丹溪摘玄肺虛久咳人參末二兩鹿角膠炙研一兩每服三錢用薄荷豉湯一盞蔥少許入銚子煎一二沸傾入盞內遇咳時溫呷三五口甚佳食療本草止嗽化痰人參末一兩明礬二兩以釅醋二升熬礬成膏入參末煉蜜和收每以豌豆大一丸放舌下其嗽即止痰自消簡便方小兒喘咳發熱自汗吐紅脈虛無力者人參天花粉等分每服半錢蜜水調下以瘥為度經濟方喘咳嗽血咳喘上氣喘急嗽血吐血脈無力者人參末每服三錢雞子清調之五更初服便睡去枕仰臥只一服愈年深者再服咯血者服盡一兩甚好一方以烏雞子水磨千遍自然化作水調藥尤妙忌醋咸腥醬面酢醉飽將息乃佳沈存中靈苑方咳嗽吐血人參黃耆飛羅面各一兩百合五錢為末水丸梧子大每服五十丸食前茅根湯下朱氏集驗方用人參乳香辰砂等分為末烏梅肉和丸彈子大每白湯化下一丸日一服虛勞吐血甚者先以十灰散止之其人必困倦法當補陽生陰獨參湯主之好人參一兩肥棗五枚水二鍾煎一鍾服熟睡一覺即減五六繼服調理藥葛可久十藥神書吐血下血因七情所感酒色內傷氣血妄行口鼻俱出心肺脈破血如湧泉須臾不救用人參焙側柏葉蒸焙荊芥穗燒存性各五錢為末用二錢入飛羅面二錢以新汲水調如稀糊服少傾再啜一服立止華他中藏經衄血不止人參柳枝寒食採者等分為末每服一錢東流水服日三服無柳枝用蓮子心聖濟總録齒縫出血人參赤茯苓麥門冬各二錢水一鍾煎七分食前溫服日再蘇東坡得此自謂神奇後生小子多患此病豫纍試之纍如所言談野翁試驗方陰虛尿血人參焙黃耆鹽水炙等分為末用紅皮大蘿蔔一枚切作四片以蜜二兩將蘿蔔逐片蘸炙令乾再炙勿令焦以蜜盡為度每用一片蘸藥食之仍以鹽湯送下以瘥為度三因方沙淋石淋方同上消渴引飲人參為末雞子清調服一錢日三四服集驗用人參栝蔞根等分生研為末煉蜜丸梧子大每服百丸食前麥門冬湯下日二服以愈為度名玉壺丸忌酒面炙爆鄭氏家傳消渴方人參一兩粉草二兩以雄豬膽汁浸炙腦子半錢為末蜜丸芡子大每嚼一丸冷水下聖濟總録用人參一兩葛粉二兩為末發時以燖豬湯一升入藥三錢蜜二兩慢火熬至三合狀如黑餳以瓶收之每夜以一匙含咽不過三服取效也虛瘧寒熱人參二錢二分雄黃五錢為末端午日用粽尖搗丸梧子大發日侵晨井華水吞下七丸發前再服忌諸般熱物立效一方加神麯等分丹溪纂要冷痢厥逆六脈沉細人參大附子各一兩半每服半兩生薑十片丁香十五粒粳米一撮水二盞煎七分空心溫服經驗方下痢噤口人參蓮肉各三錢以井華水二盞煎一盞細細呷之或加薑汁炒黃連三錢經驗良方老人虛痢不止不能飲食上黨人參一兩鹿角去皮炒研五錢為末每服方寸匕米湯調下日三服十便良方傷寒壞證凡傷寒時疫不問陰陽老幼妊婦誤服藥餌困重垂死脈沉伏不省人事七日以後皆可服之百不失一此名奪命散又名復脈湯人參一兩水二鍾緊火煎一鍾以井水浸冷服之少頃鼻梁有汗出脈復立瘥蘇韜光侍郎云用此救數十人豫作清流宰縣倅申屠行輔之子婦患時疫三十餘日已成壤病令服此藥而安王璆百一選方傷寒厥逆身有微熱煩躁六脈沉細微弱此陰極發躁也無憂散用人參半兩水一鍾煎七分調牛膽南星末二錢熱服立蘇三因方夾陰傷寒先因欲事後感寒邪陽衰陰盛六脈沉伏小腹絞痛四肢逆冷嘔吐清水不假此藥無以回陽人參乾薑炮各一兩生附子一枚破作八片水四升半煎一升頓服脈出身溫即愈吳綬傷寒蘊要筋骨風痛人參四兩酒浸三日曬乾土茯苓一斤山慈菰一兩為末煉蜜丸梧子大每服一百丸食前米湯下經驗方小兒風癇瘛瘲用人參蛤粉辰砂等分為末以豭豬心血和丸緑豆大每服五十丸金銀湯下一日二服大有神效衛生寶鑑脾虛慢驚黃耆湯見黃耆發明下痘疹險證保元湯見黃耆發明下驚後瞳斜小兒驚後瞳人不正者人參阿膠糯米炒成珠各一錢水一盞煎七分溫服日再服愈乃止效直指方小兒脾風多困人參冬瓜仁各半兩南星一兩漿水煮過為末每用一錢水半盞煎二三分溫服本事方酒毒目盲一人形實好飲熱酒忽病目盲而脈澀此熱酒所傷胃氣汙濁血死其中而然以蘇木煎湯調人參末一錢服次日鼻及兩掌皆紫黑此滯血行矣再以四物湯加蘇木桃仁紅花陳皮調人參末服數日而愈丹溪纂要酒毒生疽一婦嗜酒胸生一疽脈緊而澀用酒炒人參酒炒大黃等分為末薑湯服一錢得睡汗出而愈效丹溪醫案狗咬風傷腫痛人參置桑柴炭上燒存性以碗覆定少頃為末摻之立瘥經驗後方蜈蚣咬傷嚼人參塗之醫學集成蜂蠆螫傷人參末敷之證治要訣脅破腸出急以油抹入煎人參枸杞汁淋之內吃羊腎粥十日愈危氏得效方氣奔怪疾方見虎杖蘆氣味苦溫無毒主治吐虛勞痰飲時珍發明吳綬曰人弱者以人參蘆代瓜蒂震亨曰人參入手太陰補陽中之陰蘆則反能瀉太陰之陽亦如麻黃苗能發汗根則止汗谷屬金而糠之性熱麥屬陽而麩之性涼先儒謂物物具一太極學者可不觸類而長之乎一女子性躁味厚暑月因怒而病厄每作則舉身跳動昏冒不知人其形氣俱實乃痰因怒郁氣不得降非吐不可遂以人參蘆半兩逆流水一盞半煎一大碗飲之大吐頑痰數碗大汗昏睡一日而安又一人作勞發瘧服瘧藥變為熱病舌短痰嗽六脈洪數而滑此痰蓄胸中非吐不愈以參蘆湯加竹瀝二服湧出膠痰三塊次與人參黃耆當歸煎服半月乃安沙參本經上品校正併入別録有名未用部羊乳釋名白參吳普知母別録羊乳別録羊婆奶綱目鈴兒草別録虎鬚別録苦心別録又名文希一名識美一名志取弘景曰此與人參玄參丹參苦參是為五參其形不盡相類而主療頗同故皆有參名又有紫參乃牡蒙也時珍曰沙參白色宜於沙地故名其根多白汁俚人呼為羊婆奶別録有名未用羊乳即此也此物無心味淡而別録一名苦心又與知母同名不知所謂也鈴兒草象花形也集解別録曰沙參生河內川穀及冤句般陽續山二月八月採根曝乾又名羊乳一名地黃三月採立夏後母死恭曰出華山者為善普曰二月生苗如葵葉青色根白實如芥根大如蕪菁三月採弘景曰今出近道叢生葉似枸杞根白實者佳保升曰其根若葵根其花白色頌曰今淄齊潞隨江淮荊湖州郡皆有之苗長一二尺以來叢生崖壁間葉似枸杞而有叉丫七月開紫花根如葵根大如指許赤黃色中正白實者佳二月八月採根南土生者葉有細有大花白瓣上仍有白黏此為小異藏器曰羊乳根加薺苨而圓大小如拳上有角節折之有白汁人取根當薺苨苗作蔓折之有白汁時珍曰沙參處處山原有之二月生苗葉如初生小葵葉而團扁不光八九月抽莖高一二尺莖上之葉則尖長如枸杞葉而小有細齒秋月葉間開小紫花長二三分狀如鈴鐸五出白蕊亦有白花者並結實大如冬青實中有細子霜後苗枯其根生沙地者長尺余大一虎口黃土地者則短而小根莖皆有白汁八九月採者白而實春月採者微黃而虛小人亦往往縶蒸壓實以亂人參但體輕鬆味淡而短耳根氣味苦微寒無毒別録曰羊乳溫無毒普曰沙參岐伯咸神農黃帝扁鵲無毒李當之大寒好古曰甘微苦之才曰惡防己反藜蘆主治血積驚氣除寒熱補中益肺氣本經療胃痹心腹痛結熱邪氣頭痛皮間邪熱安五臟久服利人又云羊乳主頭眩痛益氣長肌肉別録去皮肌浮風疝氣下墜治常欲眠養肝氣宣五臟風氣甄權補虛止驚煩益心肺並一切惡瘡疥癬及身癢排膿消腫毒大明清肺火治久咳肺痿時珍發明元素曰肺寒者用人參肺熱者用沙參代之取其味甘也好古曰沙參味甘微苦厥陰本經之藥又為脾經氣分藥微苦補陰甘則補陽故潔古取沙參代人參蓋人參性溫補五臟之陽沙參性寒補五臟之陰雖云補五臟亦須各用本臟藥相佐使隨所引而相輔之可也時珍曰人參甘苦溫其體重實專補脾胃元氣因而益肺與腎故內傷元氣者宜之沙參甘淡而寒其體輕虛專補肺氣因而益脾與腎故金能受火克者宜之一補陽而生陰一補陰而制陽不可不辨之也附方舊一新二肺熱咳嗽沙參半兩水煎服之衛生易簡方猝得疝氣小腹及陰中相引痛如絞自汗出欲死者沙參搗篩為末酒服方寸匕立瘥肘後方婦人白帶多因七情內傷或下元虛冷所致沙參為末每服二錢米飲調下證治要訣薺苨音齊尼並上聲別録中品校正併入圖經杏參釋名杏參圖經杏葉沙參救荒菧苨菧音底爾雅甜桔梗綱目白麵根救荒苗名隱忍時珍曰薺苨多汁有濟苨之狀故以名之濟苨濃露也其根如沙參而葉如杏故河南人呼為杏葉沙參蘇頌圖經杏參即此也俗謂之甜桔梗爾雅云苨菧苨也郭璞云即薺苨也隱忍說見下文集解弘景曰薺苨根莖都似人參而葉小異根味甜絶能殺毒以其與毒藥共處毒皆自然歇不正入方家用也又曰魏文帝言薺苨亂人參即此也薺苨葉甚似桔梗但葉下光明滑澤無毛為異又不如人參相對耳恭曰人參苗似五加而闊短莖圓有三四丫丫頭有五葉陶引薺苨亂人參誤矣且薺苨桔梗又有葉差互者亦有葉三四對者皆一莖直上葉既相亂惟以根有心為別爾頌曰今川蜀江浙皆有之春生苗莖都似人參而葉小異根似桔梗但無心為異潤州陝州尤多人家收以為果或作脯啖味甚甘美兼可寄遠二月八月採根曝乾承曰今人多以蒸過壓扁亂人參但味淡爾宗奭曰陶以根言故云薺苨亂人參蘇以苗言故以陶為誤也機曰薺苨苗莖與桔梗相似其根與人參相亂今言苗莖都似人參近於誤也當以人參薺苨桔梗三注參看自明矣時珍曰薺苨苗似桔梗根似沙參故奸商往往以沙參薺苨通亂人參蘇頌圖經所謂杏參周定王救荒本草所謂杏葉沙參皆此薺苨也圖經云杏參生淄州田野根如小菜根土人五月採苗葉治咳嗽上氣救荒本草云杏葉沙參一名白麵根苗高一二尺莖色青白葉似杏葉而小微尖而背白邊有叉牙杪間開五瓣白碗子花根形如野胡蘿蔔頗肥皮色灰黝中間白色味甜微寒亦有開碧花者嫩苗炸熟水淘油鹽拌食根換水煮亦可食人以蜜煎充果又陶弘景注桔梗言其葉名隱忍可煮食之治蠱毒謹按爾雅云蒡隱忍也郭璞注云似蘇有毛江東人藏以為菹亦可瀹食葛洪肘後方云隱忍草苗似桔梗人皆食之搗汁飲治蠱毒據此則隱忍非桔梗乃薺苨苗也薺苨苗甘可食桔梗苗苦不可食尤為可證神農本經無薺苨只有桔梗一名薺苨至別録始出薺苨蓋薺苨桔梗乃一類有甜苦二種則其苗亦可呼為隱忍也根氣味甘寒無毒主治解百藥毒別録殺蠱毒治蛇蟲咬熱狂溫疾罯毒箭大明利肺氣和中明目止痛蒸切作羹粥食或作齏菹食咱殷食之壓丹石發動孟詵主咳嗽消渴強中瘡毒疔腫闢沙蝨短狐毒時珍發明時珍曰薺苨寒而利肺甘而解毒乃良品也而世不知用惜哉按葛洪肘後方云一藥而兼解衆毒者惟薺苨汁濃飲二升或煮嚼之亦可作散服此藥在諸藥中毒皆自解也又張鷟朝野僉載云各醫言虎中藥箭食清泥而解野豬中藥箭豗薺苨而食物猶知解毒何況人乎又孫思邈千金方治強中為病莖長興盛不交精出消渴之後發為癰疽有薺苨丸豬腎薺苨湯方此皆本草所未及者然亦取其解熱解毒之功爾無他義附方舊四新三強中消渴豬腎薺苨湯治強中之病莖長興盛不交精液自出消渴之後即發癰疽皆由恣意色欲或餌金石所致宜此以制腎中熱也用豬腎一具薺苨石膏各三兩人參茯苓磁石知母葛根黃芩栝蔞根甘草各二兩黑大豆一升水一斗半先煮豬腎大豆取汁一斗去滓下藥再煮三升分三服後人名為石子薺苨湯又薺苨丸用薺苨大豆茯神磁石栝蔞根熟地黃地骨皮玄參石斛鹿茸各一兩人參沉香各半兩為末以豬肚治淨煮爛杵和丸梧子大每服七十丸空心鹽湯下並千金方疔瘡腫毒生薺苨根搗汁服一合以滓敷之不過三度千金翼面上皯皰薺苨肉桂各一兩為末每用方寸匕酢漿服之日一服又滅瘢痣聖濟總録解諸蠱毒薺苨根搗末飲服方寸匕立瘥陳延之小品方解鉤吻毒鉤吻葉與芹葉相似誤食之殺人惟以薺苨八兩水六升煮取三升每服五合日五服仲景金匱玉函解五石毒薺苨生搗汁多服之立瘥蘇頌圖經隱忍葉氣味甘苦寒無毒主治蠱毒腹痛面目青黃林露骨立煮汁一二升飲時珍主腹臟風壅咳嗽上氣蘇頌桔梗本經下品釋名白藥別録梗草別録薺苨本經時珍曰此草之根結實而梗直故名吳普本草一名利如一名符扈一名房圖方書並無見蓋亦瘦辭爾桔梗薺苨乃一類有甜苦二種故本經桔梗一名薺苨而今俗呼薺苨為甜桔梗也至別録始出薺苨條分為二物然其性味功用皆不同當以別録為是集解別録曰桔梗生嵩高山谷及冤句二八月採根曝乾普曰葉如薺苨莖如筆管紫赤色二月生苗弘景曰近道處處有二三月生苗可煮食之桔梗療蠱毒甚驗俗方用此乃名薺苨今別有薺苨能解藥毒可亂人參葉甚相似但薺苨葉下光明滑澤無毛為異葉生又不如人參相對耳恭曰薺苨桔梗葉有差互者亦有葉三四對者皆一莖直上葉既相亂惟以根有心為別耳頌曰今在處有之根如小指大黃白色春生苗莖高尺余葉似杏葉而長橢四葉相對而生嫩時亦可煮食夏開小花紫碧色頗似牽牛花秋後結子八月採根其根有心若無心者為薺苨關中所出桔梗根黃皮似蜀葵根莖細青色葉小青色似菊葉也根修治斆曰凡使勿用木梗真似桔梗只是咬之腥澀不堪凡用桔梗須去頭上尖硬二三分以來並兩畔附枝於槐砧上細銼用生百合搗膏投水中浸一伏時濾出緩火熬令乾用每桔梗四兩用百合二兩五錢時珍曰今但刮去浮皮米泔水浸一夜切片微炒用氣味辛微溫有小毒普曰神農醫和苦無毒黃帝扁鵲辛咸岐伯雷公甘無毒李當之大寒權曰苦辛時珍曰當以苦辛平為是之才曰節皮為之使畏白芨龍眼龍膽草忌豬肉得牡蠣遠志療恚怒得硝石石膏療傷寒白粥解其㿌毒時珍曰伏砒徐之才所云節皮不知何物也主治胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣本經利五臟腸胃補血氣除寒熱風痹溫中消穀療喉咽痛下蠱毒別録治下痢破血去積氣消積聚痰涎去肺熱氣促嗽逆除腹中冷痛主中惡及小兒驚癇甄權下一切氣止霍亂轉筋心腹脹痛補五勞養氣除邪辟溫破癥瘕肺癰養血排膿補內漏及喉痹大明利竅除肺部風熱清利頭目咽嗌胸膈滯氣及痛除鼻塞元素治寒嘔李杲主口舌生瘡赤目腫痛時珍發明好古曰桔梗氣微溫味苦辛味厚氣輕陽中之陰升也入手太陰肺經氣分及足少陰經元素曰桔梗清肺氣利咽喉其色白故為肺部引經與甘草同行為舟楫之劑如大黃苦泄峻下之藥欲引至胸中至高之分成功須用辛甘之劑升之譬如鐵石入江非舟楫不載所以諸藥有此一味不能下沉也時珍曰朱肱活人書治胸中痞滿不痛用桔梗枳殼取其通肺利膈下氣也張仲景傷寒論治寒實結胸用桔梗貝母巴豆取其溫中消穀破積也又治肺癰唾膿用桔梗甘草取其苦辛清肺甘溫瀉火又能排膿血補內漏也其治少陰證二三日咽痛亦用桔梗甘草取其苦辛散寒甘平除熱合而用之能調寒熱也後人易名甘桔湯通治咽喉口舌諸病宋仁宗加荊芥防風連翹遂名如聖湯極言其驗也按王好古醫壘元戎載之頗詳云失音加訶子聲不出加半夏上氣加陳皮涎嗽加知母貝母咳渴加五味子酒毒加葛根少氣加人參嘔加半夏生薑唾膿血加紫菀肺痿加阿膠胸膈不利加枳殼心胸痞滿加枳實目赤加梔子大黃面腫加茯苓膚痛加黃耆發斑加防風荊芥疫毒加鼠黏子大黃不得眠加梔子震亨曰乾咳嗽乃痰火之邪郁在肺中宜苦梗以開之痢疾腹痛乃肺金之氣鬱在大腸亦宜苦梗開之後用痢藥此藥能開提氣血故氣藥中宜用之附方舊十新八胸滿不痛桔梗枳殼等分水二鍾煎一鍾溫服南陽活人書傷寒腹脹陰陽不和也桔梗半夏湯主之桔梗半夏陳皮各三錢姜五片水二鍾煎一鍾服南陽活人書痰嗽喘急桔梗一兩半為末用童子小便半升煎四合去滓溫服簡要濟衆方肺癰咳嗽胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如粳米粥者桔梗湯主之桔梗一兩甘草二兩水三升煮一升分溫再服朝暮吐膿血則瘥張仲景金匱玉函方喉痹毒氣桔梗二兩水三升煎一升頓服千金方少陰咽痛少陰證二三日咽痛者可與甘草湯不瘥者與桔梗湯主之桔梗一兩甘草二兩水三升煮一升分服張仲景傷寒論口舌生瘡方同上齒䘌腫痛桔梗薏苡仁等分為末服永類方骨槽風痛牙根腫痛桔梗為末棗瓤和丸皂子大綿裹咬之仍以荊芥湯漱之經驗後方牙疳臭爛桔梗茴香等分燒研敷之衛生易簡方肝風眼黑目睛痛肝風盛也桔梗丸主之桔梗一斤黑牽牛頭末三兩為末蜜丸梧子大每服四十丸溫水下日二服保命集鼻出衄血桔梗為末水服方寸匕日四服一加生犀角屑普濟方吐血下血方同上打擊瘀血在腸內久不消時發動者桔梗為末米湯下一刀圭肘後要方中蠱下血如雞肝晝夜出血石余四臟皆損惟心未毀或鼻破將死者苦桔梗為末以酒服方寸匕日三服不能下藥以物拗口灌之心中當煩須臾自定七日止當食豬肝臛以補之神良一方加犀角等分古今録驗妊娠中惡心腹疼痛桔梗一兩銼水一鍾生薑三片煎六分溫服聖惠方小兒客忤死不能言桔梗燒研三錢米湯服之仍吞麝香少許張文仲備急方蘆頭主治吐上膈風熱痰實生研末白湯調服一二錢探吐時珍長松拾遺釋名仙茆時珍曰其葉如松服之長年功如松脂及仙茆故有二名集解藏器曰長松生關內山谷中葉似松葉上有脂山人服之時珍曰長松生古松下根色如薺苨長三五寸味甘微苦類人參清香可愛按張天覺文集云僧普明居五臺山患大風眉發俱墮哀苦不堪忽遇異人教服長松示其形狀明採服之旬余毛髮俱生顏色如故今並代間土人多以長松雜甘草山藥為湯煎甚佳然本草及方書皆不載獨釋慧祥清涼傳始敘其詳如此韓𢘅醫通云長松産太行西北諸山根似獨活而香根氣味甘溫無毒主治風血冷氣宿疾溫中去風藏器治大風惡疾眉發墮落百骸腐潰每以一兩入甘草少許水煎服旬日即愈又解諸蟲毒補益長年時珍附方新一長松酒滋補一切風虛乃廬山休休子所傳長松一兩五錢狀似獨活而香乃酒中聖藥也熟地黃八錢生地黃黃耆蜜炙陳皮各七錢當歸厚朴黃柏各五錢白芍藥煨人參枳殼各四錢蒼朮米泔制半夏制天門冬麥門冬砂仁黃連各三錢木香蜀椒胡桃仁各二錢小紅棗肉八個老米一撮燈心五寸長一百二十根一料分十劑絹袋盛之凡米五升造酒一尊煮一袋窨久乃飲韓氏醫通黃精別録上品校正併入拾遺救荒草釋名黃芝瑞草經戊己芝五符經菟竹別録鹿竹別録仙人餘糧弘景救窮草別録米鋪蒙筌野生薑蒙筌重樓別録雞格別録龍銜廣雅垂珠頌曰隋時羊公服黃精法云黃精是芝草之精也一名葳蕤一名白芨一名仙人餘糧一名苟格一名馬箭一名垂珠一名菟竹時珍曰黃精為服食要藥故別録列於草部之首仙家以為芝草之類以其得坤土之精粹故謂之黃精五符經云黃精獲天地之淳精故名為戊己芝是此義也餘糧救窮以功名也鹿竹菟竹因葉似竹而鹿兔食之也垂珠以子形也陳氏拾遺救荒草即此也今併為一嘉謨曰根如嫩姜俗名野生薑九蒸九曝可以代糧又名米餔集解別録曰黃精生山谷二月採根陰乾弘景曰今處處有之二月始生一枝多葉葉狀似竹而短根似葳蕤葳蕤根如荻根及菖蒲概節而平直黃精根如鬼臼黃連大節而不平雖燥並柔軟有脂潤俗方無用此而為仙經所貴根葉花實皆可餌服酒散隨宜具在斷谷方中其葉乃與鉤吻相似惟莖不紫花不黃為異而人多惑之其類乃殊遂致死生之反亦為奇事斆曰鉤吻真似黃精只是葉頭尖有毛鉤子二個若誤服之害人黃精葉似竹也恭曰黃精肥地生者即大如拳薄地生者猶如拇指葳蕤肥根頗類其小者肌理形色大都相似今以鬼臼黃連為比殊無倣佛黃精葉似柳及龍膽徐長卿輩而堅其鉤吻蔓生葉如柿葉殊非比類藏器曰黃精葉偏生不對者名偏精功用不如正精正精葉對生鉤吻乃野葛之別名二物殊不相似不知陶公憑何說此保升曰鉤吻一名野葛陶說葉似黃精者當是蘇說葉似柿者當別是一物頌曰黃精南北皆有以嵩山茅山者為佳三月生苗高一二尺以來葉如竹葉而短兩兩相對莖梗柔脆頗似桃枝本黃末赤四月開細青白花狀如小豆花結子白如黍粒亦有無子者根如嫩生薑而黃色二月採根蒸過曝乾用今遇八月採山中人九蒸九曝作果賣黃黑色而甚甘美其苗初生時人多采為菜茹謂之筆菜味極美江南人說黃精苗葉稍類鉤吻但鉤吻葉頭極尖而根細而蘇恭言鉤吻蔓生恐南北所産之異耳時珍曰黃精野生山中亦可劈根長二寸稀種之一年後極稠子亦可種其葉似竹而不尖或兩葉三葉四五葉俱對節而生其根橫行狀如葳蕤俗採其苗爆熟淘去苦味食之名筆管菜陳藏器本草言青黏是葳蕤見葳蕤發明下又黃精鉤吻之說陶弘景雷斆韓保升皆言二物相似蘇恭陳藏器皆言不相似蘇頌復設兩可之辭今考神農本草吳普本草並言鉤吻是野葛蔓生其莖如箭與蘇恭之說相合張華博物志云昔黃帝問天老曰天地所生有食之令人不死者乎天老曰太陽之草名黃精食之可以長生太陰之草名鉤吻不可食之入口立死人信鉤吻殺人不信黃精之益壽不亦惑乎按此但以黃精鉤吻相對待而言不言其相似也陶氏因此遂謂二物相似與神農所說鉤吻不合恐當以蘇恭所說為是而陶雷所說別一毒物非鉤吻也歷代本草惟陳藏器辨物最精審尤當信之余見鉤吻條根修治斆曰凡採得以溪水洗淨蒸之從巳至子薄切曝乾用頌曰羊公服黃精法二月三月採根入地八九寸為上細切一石以水二石五斗煮去苦味漉出囊中壓取汁澄清再煎如膏乃止以炒黑黃豆末相和得所捏作餅子如錢大初服二枚日益之亦可焙乾篩末水服詵曰餌黃精法取甕子去底釜內安置得所入黃精令滿密蓋蒸至氣溜即曝之如此九蒸九曝若生則刺人咽喉若服生者初時只可一寸半漸漸增之十日不食服止三尺五寸三百日後盡見鬼神久必升天根葉花實皆可食之但以相對者是正不對者名偏精也氣味甘平無毒權曰寒時珍曰忌梅實花葉子並同主治補中益氣除風濕安五臟久服輕身延年不飢別録補五勞七傷助筋骨耐寒暑益脾胃潤心肺單服九蒸九曝食之駐顏斷谷大明補諸虛止寒熱填精髓下三尸蟲時珍發明時珍曰黃精受戊己之淳氣故為補黃宮之勝品土者萬物之母母得其養則水火既濟木金交合而諸邪自去百病不生矣神仙芝草經云黃精寬中益氣使五臟調良肌肉充盛骨髓堅強其力增倍多年不老顏色鮮明發白更黑齒落更生又能先下三尸蟲上尸名彭質好寶貨百日下中尸名彭矯好五味六十日下下尸名彭居好五色三十日下皆爛出也根為精氣花實為飛英皆可服食又按雷氏炮炙論序云駐色延年精蒸神錦注云以黃精自然汁拌研細神錦於柳木甑中蒸七日以木蜜丸服之木蜜枳椇也神錦不知是何物或云硃砂也禹錫曰按抱朴子云黃精服其花勝其實服其實勝其根但花難得得其生花十斛干之才可得五六斗爾非大有力者不能辦也日服三合服之十年乃得其益其斷谷不及術術餌令人肥健可以負重涉險但不及黃精甘美易食凶年可與老少代糧謂之米脯也慎微曰徐鉉稽神録云臨川士家一婢逃入深山中久之見野草枝葉可愛取根食之久久不飢夜息大樹下聞草中動以為虎攫上樹避之及曉下地其身欻然凌空而去若飛鳥焉數歲家人採薪見之捕之不得臨絶壁下網圍之俄而騰上山頂或云此婢安有仙骨不過靈藥服食爾遂以酒餌置往來之路果來食訖遂不能去擒之具述其故指所食之草即是黃精也附方舊一新四服食法聖惠方用黃精根莖不限多少細銼陰乾搗末每日水調末服任多少一年內變老為少久久成地仙臞仙神隱書以黃精細切一石用水二石五斗煮之自旦至夕候冷以手挼碎布袋榨取汁煎之渣焙乾為末同入釜中煎至可丸丸如雞頭子大每服一丸日三服絶糧輕身除百病渴則飲水補肝明目黃精二斤蔓菁子一斤淘同和九蒸九曬為末空心每米飲下二錢日二服延年益壽聖惠方大風癩瘡營氣不清久風入脈因而成癩鼻壞色敗皮膚癢潰用黃精根去皮洗淨二斤日中曝令軟納粟米飯甑中同蒸至二斗米熟時時食之聖濟總録補虛精氣黃精枸杞子等分搗作餅日乾為末煉蜜丸梧子大每湯下五十丸奇效良方葳蕤音威緌本經上品釋名女萎本經葳蕤吳普萎䔟音威移委萎爾雅萎香綱目熒爾雅音行玉竹別録地節別録時珍曰按黃公紹古今韻會云葳蕤草木葉垂之貌此草根長多須如冠纓下垂之緌而有威儀故以名之凡羽蓋旌旗之纓緌皆象葳蕤是矣張氏瑞應圖云王者禮備則葳蕤生於殿前一名萎香則威儀之義於此可見別録作葳蕤省文也說文作萎䔟音相近也爾雅作委萎字相近也其葉光瑩而象竹其根多節故有熒及玉竹地節諸名吳普本草又有烏女蟲蟬之名宋本一名馬熏即烏萎之訛者也正誤弘景曰本經有女萎無葳蕤別録無女萎有葳蕤而功用正同疑女萎即葳蕤惟名異爾恭曰女萎功用及苗蔓與萎蕤全別今本經朱書是女萎功效故別録墨書乃葳蕤功效也藏器曰本草女萎葳蕤同傳陶云是一物蘇云二物不同於中品別出女萎一條然其主霍亂泄痢腸鳴正與上品女萎相合則是更非二物矣頌曰觀古方書所用胡洽治時氣洞下有女萎丸治傷寒冷下結腸丸中用女萎治虛勞下痢小黃耆酒中加女萎詳此數方所用乃似中品女萎緣其性溫主霍亂泄痢故也又治賊風手足枯痹四肢拘攣茵蕷酒中用女萎古今録驗治身體癧瘍斑駁有女萎膏乃似上品本經朱書女萎緣其主中風不能動搖及去皯好色故也又治傷寒七八日不解續命鱉甲湯及治腳弱鱉甲湯並用葳蕤及延年方治風熱項急痛四肢骨肉煩熱有葳蕤飲又主虛風熱發即頭熱有葳蕤丸乃似上品別録墨書葳蕤緣其主虛熱濕毒腰痛故也三者既別則非一物明矣且葳蕤甘平女萎辛溫安得為一物時珍曰本經女萎乃爾雅委萎二字即別録葳蕤也上古鈔寫訛為女萎爾古方治傷寒風虛用女萎者即葳蕤也皆承本草之訛而稱之諸家不察因中品有女萎名字相同遂致費辨如此今正其誤只依別録書葳蕤為綱以便尋檢其治泄痢女萎乃蔓草也見本條集解別録云葳蕤生泰山山谷及丘陵立春後採陰乾普曰葉青黃色相值如姜葉二月七月採弘景曰今處處有之根似黃精小異服食家亦用之頌曰今滁州舒州及漢中均州皆有之莖幹強直似竹箭桿有節葉狹而長表白里青亦類黃精根黃而多須大如指長一二尺或云可啖三月開青花結圓實時珍曰處處山中有之其根橫生似黃精差小黃白色性柔多須最難燥其葉如竹兩兩相值亦可採根種之極易繁也嫩葉及根並可煮淘食茹根修治斆曰凡使勿用黃精並鉤吻二物相似葳蕤節上有鬚毛莖斑葉尖處有小黃點為不同採得以竹刀刮去節皮洗淨以蜜水浸一宿蒸了焙乾用氣味甘平無毒普曰神農苦桐君雷公扁鵲甘無毒黃帝辛之才曰畏滷鹼主治女萎主中風暴熱不能動搖跌筋結肉諸不足久服去面黑䵟好顏色潤澤輕身不老本經葳蕤主心腹結氣虛熱濕毒腰痛莖中寒及目痛眥爛淚出別録時疾寒熱內補不足去虛勞客熱頭痛不安加而用之良甄權補中益氣蕭炳除煩悶止消渴潤心肺補五勞七傷虛損腰腳疼痛天行熱狂服食無忌大明服諸石人不調和者煮汁飲之弘景主風溫自汗灼熱及勞瘧寒熱脾胃虛乏男子小便頻數失精一切虛損時珍發明杲曰葳蕤能升能降陽中陰也其用有四主風淫四末兩目淚爛男子濕注腰痛女子面生黑䵟時珍曰葳蕤性平味甘柔潤可食故朱肱南陽活人書治風溫自汗身重語言難出用葳蕤湯以之為君藥豫每用治虛勞寒熱痁瘧及一切不足之證用代參耆不寒不燥大有殊功不只於去風熱濕毒而已此昔人所未闡者也藏器曰陳壽魏志樊阿傳云青黏一名黃芝一名地節此即葳蕤極似偏精本功外主聰明調血氣令人強壯和漆葉為散服主五臟益精去三蟲輕身不老變白潤肌膚暖腰腳惟有熱不可服晉嵇紹有胸中寒疾每酒後苦唾服之得愈草似竹取根花葉陰乾用昔華他入山見仙人所服以告樊阿服之壽百歲也頌曰陳藏器以青黏即葳蕤世無識者未敢以為信然時珍曰蘇頌注黃精疑青黏是黃精與此說不同今考黃精葳蕤性味功用大抵相近而葳蕤之功更勝故青黏一名黃芝與黃精同名一名地節與葳蕤同名則二物雖通用亦可附方舊一新六服食法二月九月採葳蕤根切碎一石以水二石煮之從旦至夕以手挼爛布囊榨取汁熬稠其渣曬為末同熬至可丸丸如雞頭子大每服一丸白湯下日三服導氣脈強筋骨治中風濕毒去面皺顏色久服延年臞仙神隱書赤眼澀痛葳蕤赤芍藥當歸黃連等分煎湯薰洗衛生家寶方眼見黑花赤痛昏暗甘露湯用葳蕤焙四兩每服二錢水一盞入薄荷二葉生薑一片蜜少許同煎七分臥時溫服日一服聖濟總録小便猝淋葳蕤一兩芭蕉根四兩水二大碗煎一碗半入滑石二錢分三服太平聖惠方發熱口乾小便澀用葳蕤五兩煎汁飲之外臺祕要乳石發熱葳蕤三兩炙甘草二兩生犀角一兩水四升煮一升半分三服聖惠方癇後虛腫小兒癇病瘥後血氣上虛熱在皮膚身面俱腫葳蕤葵子龍膽茯苓前胡等分為末每服一錢水煎服聖濟總録附録鹿藥開寶志曰鹿藥甘溫無毒主風血去諸冷益老起陽浸酒服之生姑藏已西苗根並似黃精鹿好食其根時珍曰胡洽居士言鹿食九種解毒之草此其一也或云即是萎蕤理亦近之姑附以俟考訪委蛇音威貽別録曰味甘平無毒主消渴少氣令人耐寒生人家園中大枝長鬚多葉而兩兩相值子如芥子時珍曰此亦似是葳蕤並俟考訪知母本經中品釋名蚔母本經音遲說文作耆連母本經蝭母𦳚音匙又音提或作𦳚貨母本經地參本經水參又名水須水浚𧂇爾雅音覃莐藩音沉煩苦心別録兒草別録又名兒踵草女雷女理鹿列韭逢東根野蓼昌支時珍曰宿根之旁初生子根狀如蚔虻之狀故謂之蚔母訛為知母蝭母也余多未詳集解別録曰知母生河內川穀二月八月採根曝乾弘景曰今出彭城形似菖蒲而柔潤葉至難死掘出隨生須枯燥乃止禹錫曰按範子云提母出三輔黃白者善郭璞釋爾雅云𧂇蝭母也生山上葉如韭頌曰今瀕河懷衛彰德諸郡及解州滁州亦有之四月開青花如韭花八月結實根修治斆曰凡使先於槐砧上銼細焙乾木臼杵搗勿犯鐵器時珍曰凡用揀肥潤里白者去毛切引經上行則用酒浸焙乾下行則用鹽水潤焙氣味苦寒無毒大明曰苦甘權曰平元素曰氣寒味大辛苦氣味俱厚沉而降陰也又云陰中微陽腎經本藥入足陽明手太陰經氣分時珍曰得黃柏及酒良能伏鹽及硼砂主治消渴熱中除邪氣肢體浮腫下水補不足益氣本經療傷寒久瘧煩熱脅下邪氣膈中惡及風汗內疸多服令人泄別録心煩躁悶骨熱勞往來産後蓐勞腎氣勞憎寒虛煩甄權熱勞傳尸疰痛通小腸消痰止嗽潤心肺安心止驚悸大明涼心去熱治陽明火熱瀉膀胱腎經火熱厥頭痛下痢腰痛喉中腥臭元素瀉肺火滋腎水治命門相火有餘好古安胎止子煩闢射工溪毒時珍發明權曰知母治諸熱勞患人虛而口乾者加用之杲曰知母入足陽明手太陰其用有四瀉無根之腎火療有汗之骨蒸止虛勞之熱滋化源之陰仲景用此入白虎湯治不得眠者煩躁也煩出於肺躁出於腎君以石膏佐以知母之苦寒以清腎之源緩以甘草粳米使不速下也又凡病小便閟塞而渴者熱在上焦氣分肺中伏熱不能生水膀胱絶其化源宜用氣薄味薄淡滲之藥以瀉肺火清肺金而滋水之化源若熱在下焦血分而不渴者乃真水不足膀胱乾涸乃無陰則陽無以化法當用黃柏知母大苦寒之藥以補腎與膀胱使陰氣行而陽自化小便自通方法詳載木部黃柏下時珍曰腎苦燥宜食辛以潤之肺苦逆宜食苦以瀉之知母之辛苦寒涼下則潤腎燥而滋陰上則清肺金而瀉火乃二經氣分藥也黃柏則是腎經血分藥故二藥必相須而行昔人譬之蝦與水母必相依附補陰之說詳黃柏條附方舊二新六久近痰嗽自胸膈下塞停飲至於臟腑用知母貝母各一兩為末巴豆三十枚去油研勻每服一字用姜三片二面蘸藥細嚼咽下便睡次早必瀉一行其嗽立止壯人乃用之一方不用巴豆醫學集成久嗽氣急知母去毛切五錢隔紙炒杏仁姜水泡去皮尖焙五錢以水一鍾半煎一鍾食遠溫服次以蘿蔔子杏仁等分為末米糊丸服五十丸薑湯下以絶病根鄧筆峰雜興方妊娠子煩因服藥致胎氣不安煩不得臥者知母一兩洗焙為末棗肉丸彈子大每服一丸人參湯下醫者不識此病作虛煩治反損胎氣産科鄭宗文得此方於陳藏器本草拾遺中用之良驗楊歸厚産乳集驗方妊娠腹痛月未足如欲産之狀用知母二兩為末蜜丸梧子大每粥飲下二十丸聖惠方溪毒射工凡中溪毒知母連根葉搗作散服亦可投水搗絞汁飲一二升夏月出行多取其屑自隨欲入水先取少許投水上流便無畏兼闢射工亦可煮湯浴之甚佳肘後良方紫癜風疾醋磨知母擦之日三次衛生易簡方嵌甲腫痛知母燒存性研摻之多能方肉蓯蓉本經上品釋名肉鬆容吳普黑司命吳普時珍曰此物補而不峻故有從容之號從容和緩之貌集解別録曰肉蓯蓉生河西山谷及代郡雁門五月五日採陰乾普曰生河西山陰地叢生二月至八月採弘景曰代郡雁門屬並州多馬處便有之言是野馬精落地所生生時似肉以作羊肉羹補虛乏極佳亦可生啖芮芮河南間至多今第一齣隴西形扁廣柔潤多花而味甘次出北地者形短而少花巴東建平間亦有而不嘉也恭曰此乃論草蓯蓉也陶未見肉者今人所用亦草蓯蓉刮去花代肉蓯蓉功力稍劣保升曰出肅州福祿縣沙中三月四月掘根長尺余切取中央好者三四寸繩穿陰乾八月始好皮有松子鱗甲其草蓯蓉四月中旬採長五六寸至一尺以來莖圓紫色大明曰生㪍落樹下並土塹上此即非馬交之處陶說誤爾又有花蓯蓉即暮春抽苗者力較微爾頌曰今陝西州郡多有之然不及西羌界中來者肉厚而力緊舊說是野馬遺瀝所生今西人云大木間及土塹垣中多生乃知自有種類爾或疑其初生於馬瀝後乃滋殖如茜根生於人血之類是也五月採取恐老不堪故多三月採之震亨曰河西混一之後今方識其真形何嘗有所謂鱗甲者蓋蓯蓉罕得人多以金蓮根用鹽盆制而為之又以草蓯蓉充之用者宜審嘉謨曰今人以嫩松梢鹽潤僞之修治斆曰凡使先須清酒浸一宿至明以棕刷去沙土浮甲劈破中心去白膜一重如竹絲草樣有此能隔人心前氣不散令人上氣也以甑蒸之從午至酉取出又用酥炙得所氣味甘微溫無毒別録曰酸咸普曰神農黃帝咸雷公酸李當之小溫主治五勞七傷補中除莖中寒熱痛養五腑強陰益精氣多子婦人癥瘕久服輕身本經除膀胱邪氣腰痛止痢別録益髓悅顏色延年大補壯陽日御過倍治女人血崩甄權男子絶陽不興女子絶陰不産潤五臟長肌肉暖腰膝男子泄精尿血遺瀝女子帶下陰痛大明發明好古曰命門相火不足者以此補之乃腎經血分藥也凡服蓯蓉以治腎必妨心震亨曰峻補精血驟用反動大便滑也藏器曰強筋健髓以蓯蓉鱔魚二味為末黃精汁丸服之力可十倍此說出乾寧記頌曰西人多用作食只刮去鱗甲以酒浸洗去黑汁薄切合山芋羊肉作羹極美好益人勝服補藥宗奭曰洗去黑汁氣味皆盡矣然嫩者方可作羹老者味苦入藥少則不效附方舊一新四補益勞傷精敗面黑用蓯蓉四兩水煮令爛薄切細研精羊肉分為四度下五味以米煮粥空心食藥性論腎虛白濁肉蓯蓉鹿茸山藥白茯苓等分為末米糊丸梧子大每棗湯下三十丸聖濟總録汗多便祕老人虛人皆可用肉蓯蓉酒浸焙二兩研沉香末一兩為末麻子仁汁打糊丸梧子大每服七十丸白湯下濟生方消中易飢肉蓯蓉山茱萸五味子為末蜜丸梧子大每鹽酒下二十丸醫學指南破傷風病口噤身強肉蓯蓉切片曬乾用一小盞底上穿定燒煙於瘡上熏之纍效衛生總微列當宋開寶釋名栗當開寶草蓯蓉開寶花蓯蓉日華集解志曰列當生山南岩石上如藕根初生掘取陰乾保升曰原州秦州渭州靈州皆有之暮春抽苗四月中旬採取長五六寸至一尺以來莖圓紫色採取壓扁日乾頌曰草蓯蓉根與肉蓯蓉極相類刮去花壓扁以代肉者功力殊劣即列當也根氣味甘溫無毒主治男子五勞七傷補腰腎令人有子去風血煮酒浸酒服之開寶附方舊一陽事不興栗當好者二斤即列當搗篩畢以好酒一斗浸之經宿隨性日飲之咱殷食醫心鏡鎖陽補遺集解時珍曰鎖陽出肅州按陶九成輟耕録云鎖陽生韃靼田地野馬或與蛟龍遺精入地久之發起如筍上豐下儉鱗甲櫛比筋脈連絡絶類男陽即肉蓯蓉之類或謂里之淫婦就而合之一得陰氣勃然怒長土人掘取洗滌去皮薄切曬乾以充藥貨功力百倍於蓯蓉也時珍疑此自有種類如肉蓯蓉列當亦未必盡是遺精所生也氣味甘溫無毒主治大補陰氣益精血利大便虛人大便燥結者啖之可代蓯蓉煮粥彌佳不燥結者勿用震亨潤燥養筋治痿弱時珍天麻宋開寶校正天麻系宋本重出今併為一釋名赤箭芝藥性獨搖芝抱朴子定風草藥性離母本經合離草抱朴子神草吳普鬼督郵本經弘景曰赤箭亦是芝類其莖如箭桿赤色葉生其端根如人足又云如芋有十二子為衛有風不動無風自搖如此亦非俗所見而徐長卿亦名鬼督郵又有鬼箭莖有羽其主療並相似而益大乖異並非此赤箭也頌曰按抱朴子云仙方有合離草一名獨搖芝一名離母所以謂之合離離母者此草下根如芋魁有遊子十二枚周環之以仿十二辰也去大魁數尺皆有細根如白髮雖相須而實不相連但以氣相屬爾如菟絲之草下有伏菟之根無此則絲不得上亦不相屬也然則赤箭之異陶隱居已云非俗所見菟絲之下有伏菟亦不聞有見者殆其種類時有神異者而如此爾時珍曰赤箭以狀而名獨搖定風以性異而名離母合離以根異而名神草鬼督郵以功而名天麻即赤箭之根開寶本草重出一條詳後集解下集解別録曰赤箭生陳倉川穀雍州及太山少室三月四月八月採根曝乾弘景曰陳倉今屬雍州扶風郡志曰天麻生鄆州利州太山嶗山諸處五月採根曝乾葉如芍藥而小當中抽一莖直上如箭桿莖端結實狀若續隨子至葉枯時子黃熟其根連一二十枚猶如天門冬之類形如黃瓜亦如蘆蔔大小不定彼人多生啖或蒸煮食之今多用鄆州者佳恭曰赤箭是芝類莖似箭桿赤色端有花葉赤色遠看如箭有羽四月開花結實似苦楝子核作五六稜中有肉如面日曝則枯萎其根皮肉汁大類天門冬惟無心脈爾去根五六寸有十餘子衛之似芋可生啖之無干服之法頌曰赤箭今江湖間亦有之然不中藥用其苗如蘇恭所說但本經云三月四月八月採根不言用苗而今方家乃三月四月採苗七月八月九月採根與本經參差不同難以兼著故但從今法又曰天麻今汴京東西湖南淮南州郡皆有之春生苗初出若芍藥獨抽一莖直上高三四尺如箭桿狀青赤色故名赤箭芝莖中空依半以上貼莖微有尖小葉梢頭生成穗開花結子如豆粒大其子至夏不落卻透虛入莖中潛生土內其根形如黃瓜連生一二十枚大者至重半斤或五六兩其皮黃白色名曰龍皮肉名天麻二月三月五月八月內採初得乘潤刮去皮沸湯略煮過曝乾收之嵩山衡山人或取生者蜜煎作果食甚珍之宗奭曰赤箭天麻苗也與天麻治療不同故後人分為二條承曰今醫家見用天麻即是赤箭根開寶本草又於中品出天麻一條云出鄆州今之赤箭根苗皆自齊鄆而來者為上蘇頌圖經所載天麻之狀即赤箭苗之未長大者也赤箭用苗有自表入里之功天麻用根有自內達外之理根則抽苗徑直而上苗則結子成熟而落返從杆中而下至土而生此粗可識其外內主治之理今翰林沈括最為博識嘗云古方用天麻不用赤箭用赤箭不用天麻則天麻赤箭本為一物明矣機曰赤箭天麻一物也經分為二以根與苗主治不同也産不同地者各有所宜也時珍曰本經止有赤箭後人稱為天麻甄權藥性論云赤箭芝一名天麻本自明白宋人馬志重修本草重出天麻遂致分辨如此沈括筆談云神農本草明言赤箭採根後人謂其根如箭疑當用莖蓋不然也譬如鳶尾牛膝皆因莖葉相似則用其根何足疑哉上品五芝之外補益上藥赤箭為第一世人惑於天麻之說遂止用之治風良可惜哉沈公此說雖是但根莖並皆可用天麻子從莖中落下俗名還筒子其根曝乾肉色堅白如羊角色呼羊角天麻蒸過黃皺如干瓜者俗呼醬瓜天麻皆可用者一種形尖而空薄如玄參狀者不堪用抱朴子云獨搖芝生高山深谷之處所生左右無草其莖大如手指赤如丹素葉似小莧根有大魁如斗細者如雞子十二枚繞之人得大者服之延年按此乃天麻中一種神異者如人參中之神參也斆曰凡使天麻勿用御風草二物相似只是葉莖不同御風草根莖斑葉背白有青點使御風草即勿使天麻若同用令人有腸結之患正誤藏器曰天麻生平澤似馬鞭草節節生紫花花中有子如青葙子子性寒作飲去熱氣莖葉搗敷癰腫承曰藏器所說與赤箭不相干乃別一物也時珍曰陳氏所說乃一種天麻草是益母草之類是也嘉祐本草誤引入天麻下耳今正其誤修治斆曰修事天麻十兩銼安於瓶中用蒺藜子一鎰緩火熬焦蓋於天麻上以三重紙封系從巳至未取出蒺藜炒過蓋系如前凡七遍用布拭上氣汗刀劈焙乾單搗用若用御風草亦同此法時珍曰此乃治風痹藥故如此修事也若治肝經風虛惟洗淨以濕紙包於糠火中煨熟取出切片酒浸一宿焙乾用赤箭本經上品氣味辛溫無毒志曰天麻辛平無毒大明曰甘暖權曰赤箭芝一名天麻味甘平無毒好古曰苦平陰中之陽也主治殺鬼精物蠱毒惡氣久服益氣力長陰肥健輕身增年本經消癰腫下支滿寒疝下血別録天麻主諸風濕痹四肢拘攣小兒風癇驚氣利腰膝強筋力久服益氣輕身長年開寶治冷氣𤸷痹攤緩不隨語多恍惚善驚失志甄權助陽氣補五勞七傷鬼疰通血脈開竅服食無忌大明治風虛眩運頭痛元素發明杲曰肝虛不足者宜天麻芎藭以補之其用有四療大人風熱頭痛小兒風癇驚悸諸風麻痹不仁風熱語言不遂時珍曰天麻乃肝經氣分之藥素問云諸風掉眩皆屬於肝故天麻入厥陰之經而治諸病按羅天益云眼黑頭旋風虛內作非天麻不能治天麻乃定風草故為治風之神藥今有久服天麻藥遍身發出紅丹者是其祛風之驗也宗奭曰天麻須別藥相佐使然後見其功仍須加而用之人或蜜漬為果或蒸煮食當深思則得矣附方新二天麻丸消風化痰清利頭目寬胸利膈治心忪煩悶頭暈欲倒項急肩背拘倦神昏多睡肢節煩痛皮膚瘙癢偏正頭痛鼻齆面目虛浮並宜服之天麻半兩芎藭二兩為末煉蜜丸如芡子大每食後嚼一丸茶酒任下普濟方腰腳疼痛天麻半夏細辛各二兩絹袋二個各盛藥令勻蒸熱交互尉痛處汗出則愈數日再尉衛生易簡方還筒子主治定風補虛功同天麻時珍附方新一益氣固精補血黑髮益壽有奇效還筒子半兩芡實半兩金銀花二兩破故紙酒浸春三夏一秋二冬五日焙研末二兩各研末蜜糊丸梧子大每服五十丸空心鹽湯溫酒任下鄭西泉所傳方鄧才雜興方術直律切本經上品釋名山薊本經楊桴音孚桴薊爾雅馬薊綱目山姜別録山連別録吃力伽日華時珍曰按六書本義術字篆文象其根乾枝葉之形吳普本草一名山芥一名天薊因其葉似薊而味似薑芥也西域謂之吃力伽故外臺祕要有吃力伽散揚州之域多種白朮其狀如桴故有楊桴及桴薊之名今人謂之吳術是也桴乃鼓槌之名古方二術通用後人始有蒼白之分詳見下集解別録曰術生鄭山山谷漢中南鄭二月三月八月九月採根曝乾弘景曰鄭山即南鄭也今處處有以蔣山白山茅山者為勝十一月十二月採者好多脂膏而甘其苗可作飲甚香美術有兩種白朮葉大有毛而作丫根甜而少膏可作丸散用赤朮葉細無丫根小苦而多膏可作煎用東境術大而無氣烈不任用今市人賣者皆以米粉塗令白非自然矣用時宜刮去之頌曰術今處處有之以茅山嵩山者為佳春生苗青色無丫莖作蒿干狀青赤色長三二尺以來夏開花紫碧色亦似刺薊花或有黃白色者入伏後結子至秋而苗枯根似姜而旁有細根皮黑心黃白色中有膏液紫色其根乾溼並通用陶隱居言術有二種則爾雅所謂桴薊即白朮也今白朮生杭越舒宣州高山岡上葉葉相對上有毛方莖莖端生花淡紫碧紅數色根作丫生二月三月八月九月採曝乾用以大塊紫花為勝古方所用術者皆白朮也宗奭曰蒼朮長如大拇指肥實皮色褐其氣味辛烈須米泔浸洗去皮用白朮粗促色微褐其氣亦微辛苦而不烈古方及本經止言術不分蒼白二種亦宜兩審時珍曰蒼朮山薊也處處山中有之苗高二三尺其葉抱莖而生梢間葉似棠梨葉其腳下葉有三五叉皆有鋸齒小刺根如老薑之狀蒼黑色肉白有油膏白朮桴薊也吳越有之人多取根栽蒔一年即稠嫩苗可茹葉稍大而有毛根如指大狀如鼓槌亦有大如拳者彼人剖開曝乾謂之削術亦曰片術陳自良言白而肥者是浙術瘦而黃者是幕阜山所出其力劣昔人用術不分赤白自宋以來始言蒼朮苦辛氣烈白朮苦甘氣和各自施用亦頗有理並以秋採者佳春採者虛軟易壞嵇含南方草木狀云藥有吃力伽即術也瀕海所産一根有至數斤者採餌尤良嘉謨曰浙術俗名雲頭術種平壤頗肥大由糞力也易潤油歙術俗名狗頭術雖瘦小得土氣充也甚燥白勝於浙術寧國昌化池州者並同歙術境相鄰也術白朮也氣味甘溫無毒別録曰甘權曰甘辛杲曰味苦而甘性溫味厚氣薄陽中陰也可升可降好古曰入手太陽少陰足太陰陽明少陰厥陰六經之才曰防風地榆為之使權曰忌桃李菘菜雀肉青魚嘉謨曰咀後人乳汁潤之制其性也脾病以陳壁土炒過竊土氣以助脾也主治風寒濕痹死肌痙疸止汗除熱消食作煎餌久服輕身延年不飢本經主大風在身面風眩頭痛目淚出消痰水逐皮間風水結腫除心下急滿霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食別録治心腹脹滿腹中冷痛胃虛下利多年氣痢除寒熱止嘔逆甄權止反胃利小便主五勞七傷補腰膝長肌肉治冷氣痃癖氣塊婦人冷癥瘕大明除濕益氣和中補陽消痰逐水生津止渴止瀉痢消足脛濕腫除胃中熱肌熱得枳實消痞滿氣分佐黃芩安胎清熱元素理胃益脾補肝風虛主舌本強食則嘔胃脘痛身體重心下急痛心下水痞衝脈為病逆氣裡急臍腹痛好古發明好古曰本草無蒼白朮之名近世多用白朮治皮間風止汗消痞補胃和中利腰臍間血通水道上而皮毛中而心胃下而腰臍在氣主氣在血主血無汗則發有汗則止與黃耆同功元素曰白朮除濕益燥和中補氣其用有九溫中一也去脾胃中濕二也除胃中熱三也強脾胃進飲食四也和胃生津液五也止肌熱六也四肢困倦嗜臥目不能開不思飲食七也止渴八也安胎九也凡中焦不受濕不能下利必須白朮以逐水益脾非白朮不能去濕非枳實不能消痞故枳朮丸以之為君機曰脾惡濕濕勝則氣不得施化津何由生故曰膀胱者津液之府氣化則能出焉用白朮以除其濕則氣得周流而津液生矣附方舊七新二十四枳朮丸消痞強胃久服令人食自不停也白朮一兩黃壁土炒過去土枳實麩炒去麩一兩為末荷葉包飯燒熟搗和丸梧子大每服五十丸白湯下氣滯加橘皮一兩有火加黃連一兩有痰加半夏一兩有寒加乾薑五錢木香三錢有食加神麯麥蘖各五錢潔古家珍枳朮湯心下堅大如盤邊如旋杯水飲所作寒氣不足則手足厥逆腹滿脅鳴相逐陽氣不通即身冷陰氣不通即骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺尿名曰氣分宜此主之白朮一兩枳實七個水五升煮三升分三服腹中軟即散仲景金匱玉函白朮膏服食滋補止久泄痢上好白朮十斤切片入瓦鍋內水淹過二寸文武火煎至一半傾汁入器內以渣再煎如此三次乃取前後汁同熬成膏入器中一夜傾去上面清水收之每服二三匙蜜湯調下千金良方參朮膏治一切脾胃虛損益元氣白朮一斤人參四兩切片以流水十五碗浸一夜桑柴文武火煎取濃汁熬膏入煉蜜收之每以白湯點服集簡方胸膈煩悶白朮末水服方寸匕千金方心下有水白朮三兩澤瀉五兩水三升煎一升半分三服梅師方五飲酒癖一留飲水停心下二癖飲水在兩脅下三痰飲水在胃中四溢飲水在五臟間五流飲水在腸間皆因飲食冒寒或飲茶過多致此倍術丸用白朮一斤乾薑炮桂心各半斤為末蜜丸梧子大每溫水服二三十丸惠民和劑局方四肢腫滿白朮三兩㕮咀每服半兩水一盞半大棗三枚煎九分溫服日三四服不拘時候本事方中風口噤不知人事白朮四兩酒三升煮取一升頓服千金方産後中寒遍身冷直口噤不識人白朮四兩澤瀉一兩生薑五錢水一升煎服産寶頭忽眩運經久不瘥四體漸羸飲食無味好食黃土用術三斤曲三斤搗篩酒和丸梧子大每飲服二十丸日三服忌菘菜桃李青魚外臺祕要濕氣作痛白朮切片煎汁熬膏白湯點服集簡方中濕骨痛術一兩酒三盞煎一盞頓服不飲酒以水煎之三因良方婦人肌熱血虛者吃力伽散用白朮白茯苓白芍藥各一兩甘草半兩為散薑棗煎服王燾外臺祕要小兒蒸熱脾虛羸瘦不能飲食方同上風瘙癮疹白朮為末酒服方寸匕日二服千金方面多䵟𪒟雀卵色苦酒漬術日日拭之極效肘後方自汗不止白朮末飲服方寸匕日二服千金方脾虛盜汗白朮四兩切片以一兩同黃耆炒一兩同牡蠣炒一兩同石斛炒一兩同麥麩炒揀術為末每服三錢食遠粟米湯下日三服丹溪方老小虛汗白朮五錢小麥一撮水煮乾去麥為末用黃耆湯下一錢全幼心鑑産後嘔逆別無他疾者白朮一兩二錢生薑一兩五錢酒水各二升煎一升分三服婦人良方脾虛脹滿脾氣不和冷氣客於中壅遏不通是為脹滿寬中丸用白朮二兩橘皮四兩為末酒糊丸梧子大每食前木香湯送下三十丸效指迷方脾虛泄瀉白朮五錢白芍藥一兩冬月用肉豆蔻煨為末米飯丸梧子大每米飲下五十丸日二服丹溪心法濕瀉暑瀉白朮車前子等分炒為末白湯下二三錢簡便方久瀉滑腸白朮炒茯苓各一兩糯米炒二兩為末棗肉拌食或丸服之簡便方老小滑瀉白朮半斤黃土炒過山藥四兩炒為末飯丸量人大小米湯服或加人參三錢瀕湖集簡方老人常瀉白朮二兩黃土拌蒸焙乾去土蒼朮五錢泔浸炒茯苓一兩為末米糊丸梧子大每米湯下七八十丸簡便方小兒久瀉脾虛米穀不化不進飲食溫白丸用白朮炒二錢半半夏曲二錢半丁香半錢為末薑汁麵糊丸黍米大每米飲隨大小服之全幼心鑑瀉血萎黃腸風痔漏脫肛瀉血面色萎黃積年不瘥者白朮一斤黃土炒過研末乾地黃半斤飯上蒸熟搗和干則入少酒丸梧子大每服十五丸米飲下日三服普濟方孕婦束胎白朮枳殼麩炒等分為末燒飯丸梧子大入月一日每食前溫水下三十丸胎瘦則易産也保命集牙齒日長漸至難食名髓溢病白朮煎湯漱服取效即愈也張鋭雞峰備急方蒼朮釋名赤朮別録山精抱朴仙術綱目山薊時珍曰異術言術者山之精也服之令人長生辟穀致神仙故有山精仙術之號術有赤白二種主治雖近而性味止發不同本草不分蒼白亦未可據今將本經並別録甄權大明四家所說功用參考分別各自附方庶使用者有所依憑修治大明曰用術以米泔浸一宿入藥宗奭曰蒼朮辛烈須米泔浸洗再換泔浸二日去上粗皮用時珍曰蒼朮性燥故以糯米泔浸去其油切片焙乾用亦有用脂麻同炒以制其燥者氣味苦溫無毒別録曰甘權曰甘辛時珍曰白朮甘而微苦性溫而和赤朮甘而辛烈性溫而燥陰中陽也可升可降入足太陰陽明手太陰陽明太陽之經忌同白朮主治風寒濕痹死肌痙疸作煎餌久服輕身延年不飢本經主頭痛消痰水逐皮間風水結腫除心下急滿及霍亂吐下不止暖胃消穀嗜食別録除惡氣弭災沴弘景主大風𤸷痹心腹脹痛水腫脹滿除寒熱止嘔逆下泄冷痢甄權治筋骨軟弱痃癖氣塊婦人冷氣癥瘕山嵐瘴氣溫疾大明明目暖水臟劉完素除濕發汗健胃安脾治痿要藥李杲散風益氣總解諸郁震亨治濕痰留飲或挾瘀血成窠囊及脾濕下流濁瀝帶下滑瀉腸風時珍發明宗奭曰蒼朮氣味辛烈白朮微辛苦而不烈古方及本經止言術未分蒼白只緣陶隱居言術有兩種自此人多貴白者往往將蒼朮置而不用如古方平胃散之類蒼朮為最要藥功效尤速殊不詳本草原無白朮之名嵇康曰聞道人遺言餌朮黃精令人久壽亦無白字用宜兩審杲曰本草但言術不分蒼白而蒼朮別有雄壯上行之氣能除濕下安太陰使邪氣不傳入脾也以其經泔浸火炒故能出汗與白朮止汗特異用者不可以此代彼蓋有止發之殊其餘主治則同元素曰蒼朮與白朮主治同但比白朮氣重而體沉若除上濕發汗功最大若補中焦除脾胃濕力少不如白朮腹中窄狹者須用之震亨曰蒼朮治濕上中下皆有可用又能總解諸郁痰火濕食氣血六郁皆因傳化失常不得升降病在中焦故藥必兼升降將欲升之必先降之將欲降之必先升之故蒼朮為足陽明經藥氣味辛烈強胃強脾發谷之氣能徑入諸經疏泄陽明之濕通行斂澀香附乃陰中快氣之藥下氣最速一升一降故郁散而平楊士瀛曰脾精不禁小便漏濁淋不止腰背痠疼宜用蒼朮以斂脾精精生於穀故也弘景曰白朮少膏可作丸散赤朮多膏可作煎用昔劉涓子挼取其精而丸之名守中金丸可以長生頌曰服食多單餌術或合白茯苓或合石菖蒲並搗末旦日水服晚再進久久彌佳斸取生術去土水浸再三煎如飴糖酒調飲之更善今茅山所造術煎是此法也陶隱居言取其精丸之今乃是膏煎恐非真也慎微曰梁庾肩吾答陶隱居齎術煎啓云緑葉抽條紫花標色百邪外御六腑內充山精見書華神在録木榮火謝盡採擷之難啓旦移申窮淋漉之劑又謝術蒸啓云味重金漿芳逾玉液足使坐致延生伏深銘感又葛洪抱朴子內篇云南陽文氏漢末逃難壺山中飢困欲死有人教之食術遂不飢數十年乃還鄉里顏色更少氣力轉勝故術一名山精神農藥經所謂必欲長生常服山精是也時珍曰按吐納經云紫微夫人術序云吾察草木之勝速益於己者並不及術之多驗也可以長生久視遠而更靈山林隱逸得服術者五嶽比肩又神仙傳云陳子皇得餌術要方其妻姜氏得疲病服之自愈顏色氣力如二十時也時珍謹按以上諸說皆似蒼朮不獨白朮今服食家亦呼蒼朮為仙術故皆列於蒼朮之後又張仲景闢一切惡氣用赤朮同豬蹄甲燒煙陶隱居亦言術能除惡氣弭災沴故今病疫及歲旦人家往往燒蒼朮以辟邪氣類編載越民高氏妻病恍惚譫語亡夫之鬼憑之其家燒蒼朮煙鬼遽求去夷堅志載江西一士人為女妖所染其鬼將別曰君為陰氣所浸必當暴泄但多服平胃散為良中有蒼朮能去邪也許叔微本事方云微患飲癖三十年始因少年夜坐寫文左向伏几是以飲食多墜左邊中夜必飲酒數杯又向左臥壯時不覺三五年後覺酒止從左下有聲脅痛食減嘈雜飲酒半杯即止十數日必嘔酸水數升暑月止右邊有汗左邊絶無遍訪名醫及海上方間或中病止得月餘復作其補如天雄附子礬石輩利如牽牛甘遂大戟備嘗之矣自揣必有癖囊如潦水之有科臼不盈科不行但清者可行而濁者停滯無路以決之故積至五七日必嘔而去脾土惡濕而水則流濕莫若燥脾以去濕崇土以填科臼乃悉屏諸藥只以蒼朮一斤去皮切片為末生油麻半兩水二盞研濾汁大棗五十枚煮去皮核搗和丸梧子大每日空腹溫服五十丸增至一二百丸忌桃李雀肉服三月而疾除自此常服不嘔不痛胸膈寬利飲啖如故暑月汗亦周身燈下能書細字皆術之力也初服時必覺微燥以山梔子末沸湯點服解之久服亦自不燥矣附方舊二新三十二服術法烏髭發駐顏色壯筋骨明耳目除風氣潤肌膚久服令人輕健蒼朮不計多少米泔水浸三日逐日換水取出刮去黑皮切片曝乾慢火炒黃細搗為末每一斤用蒸過白茯苓末半斤煉蜜和丸梧子大空心臥時熱水下十五丸別用術末六兩甘草末一兩拌和作湯點之吞丸尤妙忌桃李雀蛤及三白諸血經驗方蒼朮膏鄧才筆峰雜興方除風濕健脾胃變白駐顏補虛損大有功效蒼朮新者刮去皮薄切米泔水浸二日一日一換取出以井華水浸過二寸春秋五日夏三日冬七日漉出以生絹袋盛之放在一半原水中揉洗津液出紐干將渣又搗爛袋盛於一半原水中揉至汁盡為度將汁入大砂鍋中慢火熬成膏每一斤入白蜜四兩熬二炷香每膏一斤入水澄白茯苓末半斤攪勻瓶收每服三匙清早臨臥各一服以溫酒送下忌醋及酸物桃李雀蛤菘菜首魚等物吳球活人心統蒼朮膏治脾經濕氣少食足腫無力傷食酒色過度勞逸有傷骨熱用鮮白蒼朮二十斤浸刮去粗皮曬切以米泔浸一宿取出同溪水一石大砂鍋慢火煎半乾去渣再入石楠葉三斤刷去紅衣楮實子一斤川當歸半斤甘草四兩切同煎黃色濾去滓再煎如稀粥乃入白蜜三斤熬成膏每服三五錢空心好酒調服蒼朮丸薩謙齊瑞竹堂方云清上實下兼治內外障服茅山蒼朮洗刮淨一斤分作四分用酒醋糯泔童尿各浸三日一日一換取出洗搗曬焙以黑脂麻同炒香共為末酒煮麵糊丸梧子大每空心白湯下五十丸李仲南永類方八製蒼朮丸疏風順氣養腎治腰腳濕氣痹痛蒼朮一斤洗刮淨分作四分用酒醋米泔鹽水各浸三日曬乾又分作四分用川椒紅茴香補骨脂黑牽牛各一兩同炒香揀去不用只取術研末醋糊丸梧子大每服五十丸空心鹽酒送下五十歲後加沉香末一兩蒼朮散治風濕常服壯筋骨明目蒼朮一斤粟米泔浸過竹刀刮去皮半斤以無灰酒浸半斤以童子小便浸春五夏三秋七冬十日取出淨地上掘一坑炭火煅赤去炭將浸藥酒小便傾入坑內卻放術在中以瓦器蓋定泥封一宿取出為末每服一錢空心溫酒或鹽湯下萬表積善堂方六製蒼朮散治下元虛損偏墜莖痛茅山蒼朮淨刮六斤分作六分一斤倉米泔浸二日炒一斤酒浸二日炒一斤青鹽半斤炒黃去鹽一斤小茴香四兩炒黃去茴一斤大茴香四兩炒黃去茴一斤用桑椹子汁浸二日炒取術為末每服三錢空心溫酒下固真丹瑞竹堂方固真丹燥濕養脾助胃固真茅山蒼朮刮淨一斤分作四分一分青鹽一兩炒一分川椒一兩炒一分川楝子一兩炒一分小茴香破故紙各一兩炒並揀術研末酒煮麵糊丸梧子大每空心米飲下五十丸乾坤生意平補固真丹治元臟久虛遺精白濁婦人赤白帶下崩漏金州蒼朮刮淨一斤分作四分一分川椒一兩炒一分破故紙一兩炒一分茴香食鹽各一兩炒一分川楝肉一兩炒取淨術為末入白茯苓末二兩酒洗當歸末二兩酒煮麵糊丸梧子大每空心鹽酒下五十丸固元丹治元臟久虛遺精白濁五淋及小腸膀胱疝氣婦人赤白帶下血崩便血等疾以小便頻數為效好蒼朮刮淨一斤分作四分一分小茴香食鹽各一兩同炒一分川椒補骨脂各一兩同炒一分川烏頭川楝子肉各一兩同炒一分用醇醋老酒各半斤同煮乾焙連同炒藥通為末用酒煮糊丸梧子大每服五十丸男以溫酒女以醋湯空心下此高司法方也王璆百一選方少陽丹蒼朮米泔浸半日刮皮曬乾為末一斤地骨皮溫水洗淨去心曬研一斤熟桑椹二十斤入瓷盆揉爛絹袋壓汁和末如糊傾入盤內日曬夜露採日精月華待乾研末煉蜜和丸赤小豆大每服二十丸無灰酒下日三服一年辮髮返黑三年面如童子劉松石保壽堂方交感丹補虛損固精氣烏髭發此鐵甕城申先生方也久服令人有子茅山蒼朮刮淨一斤分作四分用酒醋米泔鹽湯各浸七日曬研川椒紅小茴香各四兩炒研陳米糊和丸梧子大每服四十丸空心溫酒下聖濟總録交加丸升水降火除百病蒼朮刮淨一斤分作四分一分米泔浸炒一分鹽水浸炒一分川椒炒一分破故紙炒黃柏皮刮淨一斤分作四分一分酒炒一分童尿浸炒一分小茴香炒一分生用揀去各藥只取朮柏為末煉蜜丸梧子大每服六十丸空心鹽湯下鄧才筆峰雜興方坎離丸滋陰降火開胃進食強筋骨去濕熱白蒼朮刮淨一斤分作四分一分川椒一兩炒一分破故紙一兩炒一分五味子一兩炒一分川芎藭一兩炒只取術研末川柏皮四斤分作四分一斤酥炙一斤人乳汁炙一斤童尿炙一斤米泔炙各十二次研末和勻煉蜜丸梧子大每服三十丸早用酒午用茶晚用白湯下積善堂方不老丹補脾益腎服之七十亦無白髮茅山蒼朮刮淨米泔浸軟切片四斤一斤酒浸焙一斤醋浸焙一斤鹽四兩炒一斤椒四兩炒赤白何首烏各二斤泔浸竹刀刮切以黑豆紅棗各五升同蒸至豆爛曝乾地骨皮去骨一斤各取淨末以桑椹汁和成劑鋪盆內汁高三指日曬夜露取日月精華待乾以石臼搗末煉蜜和丸梧子大每空心酒服一百丸此皇甫敬之方也王海藏醫壘元戎靈芝丸治脾腎氣虛添補精髓通利耳目蒼朮一斤米泔水浸春夏五日秋冬七日逐日換水竹刀刮皮切曬石臼為末棗肉蒸和丸梧子大每服三五十丸棗湯空心服奇效良方補脾滋腎生精強骨真仙方也蒼朮去皮五斤為末米泔水漂澄取底用脂麻二升半去殼研爛絹袋濾去渣澄漿拌術曝乾每服三錢米湯或酒空心調服孫氏集效方面黃食少男婦面無血色食少嗜臥蒼朮一斤熟地黃半斤乾薑炮冬一兩春秋七錢夏五錢為末糊丸梧子大每溫水下五十丸濟生拔萃方小兒癖疾蒼朮四兩為末羊肝一具竹刀批開撒術末線縛入砂鍋煮熟搗作丸服生生編好食生米男子婦人因食生熟物留滯腸胃遂至生蟲久則好食生米否則終日不樂至憔悴萎黃不思飲食以害其生用蒼朮米泔水浸一夜銼焙為末蒸餅丸梧子大每服五十丸食前米飲下日三服益昌伶人劉清嘯一娼名曰花翠年逾笄病此惠民局監趙尹以此治之兩旬而愈蓋生米留滯腸胃受濕則谷不磨而成此疾蒼朮能去濕暖胃消穀也楊氏家藏經驗方腹中虛冷不能飲食食輒不消羸弱生病術二斤曲一斤炒為末蜜丸梧子大每服三十丸米湯下日三服大冷加乾薑三兩腹痛加當歸三兩羸弱加甘草二兩肘後方脾濕水瀉注下困弱無力水穀不化腹痛甚者蒼朮二兩白芍藥一兩黃芩半兩淡桂二錢每服一兩水一盞半煎一盞溫服脈弦頭微痛去芍藥加防風二兩保命集暑月暴瀉壯脾溫胃及療飲食所傷曲術丸用神麯炒蒼朮米泔浸一夜焙等分為末糊丸梧子大每服三五十丸米飲下和劑局方飧瀉久痢椒術丸用蒼朮二兩川椒一兩為末醋糊丸梧子大每服二十丸食前溫水下惡痢久者加桂保命集脾濕下血蒼朮二兩地榆一兩分作二服水二盞煎一盞食前溫服久痢虛滑以此下桃花丸保命集腸風下血蒼朮不拘多少以皂角挼濃汁浸一宿煮乾焙研為末麵糊丸如梧子大每服五十丸空心米飲下日三服婦人良方濕氣身痛蒼朮泔浸切水煎取濃汁熬膏白湯點服簡便方補虛明目健骨和血蒼朮泔浸四兩熟地黃焙二兩為末酒糊丸梧子大每溫酒下三五十丸日三服普濟方青盲雀目聖惠方用蒼朮四兩泔浸一夜切焙研末每服三錢豬肝三兩劈開摻藥在內扎定入粟米一合水一碗砂鍋煮熟熏眼臨臥食肝飲汁不拘大人小兒皆治又方不計時月久近用蒼朮二兩泔浸焙搗為末每服一錢以好羊子肝一斤竹刀切破摻藥在內麻扎以粟米泔煮熟待冷食之以愈為度眼目昏澀蒼朮半斤泔浸七日去皮切焙木賊各二兩為末每服一錢茶酒任下聖惠方嬰兒目澀不開或出血蒼朮二錢入豬膽中扎煮將藥氣熏眼後更嚼取汁與服妙幼幼新書風牙腫痛蒼朮鹽水浸過燒存性研末揩牙去風熱普濟方臍蟲怪病腹中如鐵石臍中水出旋變作蟲行繞身匝癢難忍撥掃不盡用蒼朮濃煎湯浴之仍以蒼朮末入麝香少許水調服夏子益奇疾方苗主治作飲甚香去水弘景亦止自汗狗脊本經中品釋名強膂別録扶筋別録百枝本經狗青吳普恭曰此藥苗似貫衆根長多歧狀如狗之脊骨而肉作青緑色故以名之時珍曰強膂扶筋以功名也別録又名扶蓋乃扶筋之誤本經狗脊一名百枝別録萆薢一名赤節而吳普本草謂百枝為萆薢赤節為狗脊皆似誤也集解別録曰狗脊生常山川穀二月八月採根曝乾普曰狗脊如萆薢莖節如竹有刺葉圓赤根黃白亦如竹根毛有刺岐伯經云莖無節葉端圓青赤皮白有赤脈弘景曰今山野處處有之與菝葜相似而小異其莖葉小肥其節疏其莖大直上有刺葉圓有赤脈根凸凹巃嵸如羊角強細者是頌曰今太行山淄溫眉州亦有之苗尖細碎青色高一尺以來無花其莖葉似貫衆而細其根黑色長三四寸多歧似狗之脊骨大有兩指許其肉青緑色春秋採根曝乾今方亦有用金毛者陶氏所說乃有刺萆薢非狗脊也今江左俗猶用之斆曰凡使狗脊勿用透山藤根形狀一般只是入頂苦不可餌也時珍曰狗脊有二種一種根黑色如狗脊骨一種有金黃毛如狗形皆可入藥其莖細而葉花兩兩對生正似大葉蕨比貫衆葉有齒面背皆光其根大如拇指有硬黑鬚簇之吳普陶弘景所說根苗皆是菝葜蘇恭蘇頌所說即真狗脊也按張揖廣雅云菝葜狗脊也張華博物志云菝葜與萆薢相亂一名狗脊觀此則昔人以菝葜為狗脊相承之誤久矣然菝葜萆薢狗脊三者形狀雖殊而功用亦不甚相遠根修治斆曰凡修事火燎去須細銼了酒浸一夜蒸之從巳至申取出曬乾用時珍曰今人惟銼炒去毛須用氣味苦平無毒別録曰甘微溫普曰神農苦桐君黃帝岐伯雷公扁鵲甘無毒李當之小溫權曰苦辛微熱之才曰萆薢為之使惡敗醬莎草主治腰背強關機緩急周痹寒濕膝痛頗利老人本經療失溺不節男子腳弱腰痛風邪淋露少氣目暗堅脊利俯仰女子傷中關節重別録男子女人毒風軟腳腎氣虛弱續筋骨補益男子甄權強肝腎健骨治風虛時珍附方新四男子諸風四寶丹用金毛狗脊鹽泥固濟煅紅去毛蘇木萆薢川烏頭生用等分為末米醋和丸梧子大每服二十丸溫酒鹽湯下普濟方室女白帶衝任虛寒鹿茸丸用金毛狗脊燎去毛白蘞各一兩鹿茸酒蒸焙二兩為末用艾煎醋汁打糯米糊丸梧子大每服五十丸空心溫酒下濟生方固精強骨金毛狗脊遠志肉白茯神當歸身等分為末煉蜜丸梧子大每酒服五十丸集簡方病後足腫但節食以養胃氣外用狗脊煎湯漬洗吳綬蘊要貫衆本經下品釋名貫節本經貫渠本經百頭本經又名虎卷扁苻草鴟頭別録黑狗脊綱目鳳尾草圖經時珍曰此草葉莖如鳳尾其根一本而衆枝貫之故草名鳳尾根名貫衆貫節貫渠渠者魁也吳普本草作貫中俗名貫仲管仲者皆謬稱也爾雅云濼音灼貫衆即此也別録一名伯萍一名藥藻皆字訛也金星草一名鳳尾草與此同名宜互考之弘景曰近道皆有之葉如大蕨其根形色毛芒全似老鴟頭故呼為草鴟頭集解別録曰貫衆生玄山山谷及冤句少室山二月八月採根陰乾普曰葉青黃色兩兩相對莖有黑毛叢生冬夏不死四月花白七月實黑聚相連卷旁生三月八月採根五月採葉保升曰苗似狗脊狀如雉尾根直多枝皮黑肉赤曲者名草鴟頭所在山谷陰處則有之頌曰今陝西河東州郡及荊襄間多有之而少有花者春生苗赤葉大如蕨莖幹三稜葉緑色似雞翎又名鳳尾草其根紫黑色形如犬爪下有黑鬚毛又似老鴟郭璞注爾雅云葉圓鋭莖毛黑布地冬不死廣雅謂之貫節是矣時珍曰多生山陰近水處數根叢生一根數莖莖大如箸其涎滑其葉兩兩對生如狗脊之葉而無鋸齒青黃色面深背淺其根曲而有尖嘴黑鬚叢簇亦似狗脊根而大狀如伏鴟根氣味苦微寒有毒之才曰雚菌赤小豆為之使伏石鐘乳主治腹中邪熱氣諸毒殺三蟲本經去寸白破癥瘕除頭風止金瘡別録為末水服一錢止鼻血有效蘇頌治下血崩中帶下産後血氣脹痛斑疹毒漆毒骨哽解豬病時珍發明時珍曰貫衆大治婦人血氣根汁能制三黃化五金伏鍾乳結砂制汞且能解毒軟堅王海藏治夏月痘出不快快斑散用之云貫衆有毒而能解腹中邪熱之毒病因內感而發之於外者多效非古法之分經也又黃山谷煮豆帖言荒年以黑豆一升挼淨入貫衆一斤銼如骰子大同以水煮文火斟酌至豆熟取出日乾覆令展盡余汁簸去貫衆每日空心啖豆五七粒能食百草木枝葉有味可飽又王璆百一選方言滁州蔣教授因食鯉魚玉蟬羹為肋肉所哽凡藥皆不效或令以貫衆濃煎汁一盞半分三服連進至夜一咯而出亦可為末水服一錢觀此可知其軟堅之功不但治血治瘡而已也附方新一十五鼻衄不止貫衆根末水服一錢普濟方諸般下血腸風酒痢血痔鼠痔下血黑狗脊黃者不用須內肉赤色者即本草貫衆也去皮毛銼焙為末每服二錢空心米飲下或醋糊丸梧子大每米飲下三四十丸或燒存性出火毒為末入麝香少許米飲服二錢普濟方女人血崩貫衆半兩煎酒服之立止集簡方産後亡血過多心腹徹痛者用貫衆狀如刺蝟者一個全用不銼只揉去毛及花萼以好醋蘸濕慢火炙令香熟候冷為末米飲空心每服二錢甚效婦人良方赤白帶下年深諸藥不能療者用上方治之亦驗名獨聖湯方同上年深咳嗽出膿血貫衆蘇方木等分每服三錢水一盞生薑三片煎服日二服久咳漸成勞瘵鳳尾草為末用魚鮓蘸食之聖惠方痘瘡不快快斑散用貫衆赤芍藥各一錢升麻甘草各五分入淡竹葉三片水一盞半煎七分溫服王海藏方頭瘡白禿貫衆白芷為末油調塗之又方貫衆燒末油調塗聖惠方漆瘡作癢油調貫衆末塗之千金方雞魚骨哽貫衆縮砂甘草等分為粗末綿包少許含之咽汁久則隨痰自出普濟方解輕粉毒齒縫出血臭腫貫衆黃連各半兩煎水入冰片少許時時漱之陸氏積德堂方血痢不止鳳尾草根即貫衆五錢煎酒服陳解元吉言所傳集簡方便毒腫痛貫衆酒服二錢良多能鄙事花主治惡瘡令人泄別録巴戟天本經上品釋名不凋草日華三蔓草時珍曰名義殊不可曉集解別録曰巴戟天生巴郡及下邳山谷二月八月採根陰乾弘景曰今亦用建平宜都者根狀如牡丹而細外赤內黑用之打去心恭曰其苗俗名三蔓草葉似茗經冬不枯根如連珠宿根青色嫩根白紫用之亦同以連珠多肉厚者為勝大明曰紫色如小念珠有小孔子堅硬難搗宗奭曰巴戟天本有心干縮時偶自落或抽去故中心或空非自有小孔也今人欲要中間紫色則多僞以大豆汁沃之不可不察頌曰今江淮河東州郡亦有但不及蜀川者佳多生竹林內內地生者葉似麥門冬而厚大至秋結實今方家多以紫色為良蜀人云都無紫色者採時或用黑豆同煮欲其色紫殊失氣味尤宜辨之又有一種山葎根正似巴戟但色白土人採得以醋水煮之乃以雜巴戟莫能辨也但擊破視之中紫而鮮潔者僞也其中雖紫又有微白糝有粉色而理小暗者真也真巴戟嫩時亦白干時亦煮治使紫力劣弱耳根修治斆曰凡使須用枸杞子湯浸一宿待稍軟漉出再酒浸一伏時漉出同菊花熬焦黃去菊花以布拭乾用時珍曰今法惟以酒浸一宿銼焙入藥若急用只以溫水浸軟去心也氣味辛甘微溫無毒大明曰苦之才曰覆盆子為之使惡雷丸丹參朝生主治大風邪氣陰痿不起強筋骨安五臟補中增志益氣本經療頭面遊風小腹及陰中相引痛補五勞益精利男子別録治男子夜夢鬼交精泄強陰下氣治風癩甄權治一切風療水脹日華治腳氣去風疾補血海時珍出仙經發明好古曰巴戟天腎經血分藥也權曰病人虛損加而用之宗奭曰有人嗜酒日須五七杯後患腳氣甚危或教以巴戟半兩糯米同炒米微轉色去米不用大黃一兩銼炒同為末熟蜜丸溫水服五七十丸仍禁酒遂愈附録巴棘別録曰味苦有毒主惡疥瘡出蟲生高地葉白有刺根連數十枚一名女木遠志本經上品釋名苗名小草本經細草本經棘菀本經葽繞本經時珍曰此草服之能益智強志故有遠志之稱世說載郝隆譏謝安云處則為遠志出則為小草記事珠謂之醒心杖集解別録曰遠志生太山及冤句川穀四月採根葉陰乾弘景曰冤句屬兗州濟陰郡今此藥猶從彭城北蘭陵來用之去心取皮一斤止得三兩爾亦入仙方用小草狀似麻黃而青志曰莖葉似大青而小比之麻黃陶不識也禹錫曰按爾雅云葽繞棘菀郭璞注云今遠志也似麻黃赤華葉鋭而黃其上謂之小草頌曰今河陝洛西州郡亦有之根形如蒿根黃色苗似麻黃而青又如畢豆葉亦有似大青而小者三月開白花根長及一尺泗州出者花紅根葉俱大於他處商州出者根乃黑色俗傳夷門出者最佳四月採根曬乾古方通用遠志小草今醫但用遠志稀用小草時珍曰遠志有大葉小葉二種陶弘景所說者小葉也馬志所說者大葉也大葉者花紅根修治斆曰凡使須去心否則令人煩悶仍用甘草湯浸一宿曝乾或焙乾用氣味苦溫無毒之才曰遠志小草得茯苓冬葵子龍骨良畏珍珠藜蘆蜚蠊齊蛤弘景曰藥無齊蛤恐是百合也權曰是蠐螬也恭曰藥録下卷有齊蛤陶說非也主治咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力久服輕身不老本經利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黃別録殺天雄附子烏頭毒煎汁飲之之才治健忘安魂魄令人不迷堅壯陽道甄權長肌肉助筋骨婦人血噤失音小兒客忤日華腎積奔豚好古治一切癰疽時珍葉主治益精補陰氣止虛損夢泄別録發明好古曰遠志腎經氣分藥也時珍曰遠志入足少陰腎經非心經藥也其功專於強志益精治善忘蓋精與志皆腎經之所藏也腎經不足則志氣衰不能上通於心故迷惑善忘靈樞經云腎藏精精合志腎盛怒而不止則傷志志傷則喜忘其前言腰脊不可以俯仰屈伸毛悴色夭又云人之善忘者上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也陳言三因方遠志酒治癰疽云有奇功蓋亦補腎之力爾葛洪抱朴子云陵陽子仲服遠志二十年有子三十七人能開書所視不忘坐在立亡附方舊三新四心孔昏塞多忘善誤丁酉日密自至市買遠志著巾角中還為末服之勿令人知肘後方胸痹心痛逆氣膈中飲不下小草丸用小草桂心乾薑細辛蜀椒出汗各三分附子二分炮六物下篩蜜和丸梧子大先食米汁下三丸日三服不知稍增以知為度忌豬肉冷水生蔥生菜範汪東陽方喉痹作痛遠志肉為末吹之涎出為度直指方腦風頭痛不可忍遠志末㗜鼻宣明方吹乳腫痛遠志焙研酒服二錢以滓敷之袖珍方一切癰疽遠志酒治一切癰疽發背癤毒惡候侵大有死血陰毒在中則不痛敷之即痛有憂怒等氣積而怒攻則痛不可忍敷之即不痛或蘊熱在內熱逼人手不可近敷之即清涼或氣虛血冷潰而不斂敷之即斂此本韓大夫宅用以救人方極驗若七情內郁不問虛實寒熱治之皆愈用遠志不以多少米泔浸洗捶去心為末每服三錢溫酒一盞調澄少頃飲其清以滓敷患處三因方小便赤濁遠志甘草水煮半斤茯神益智仁各二兩為末酒糊丸梧子大每空心棗湯下五十丸普濟百脈根唐本集解恭曰出肅州巴西葉似苜蓿花黃根如遠志二月三月採根曬乾時珍曰按唐書作柏脈根肅州歲貢之千金外臺大方中亦時用之今不復聞此或者名稱又不同也根氣味甘苦微寒無毒主治下氣止渴去熱除虛勞補不足酒浸或水煮丸散兼用唐本淫羊藿本經中品釋名仙靈脾唐本放杖草日華棄杖草日華千兩金日華乾雞筋日華黃連祖日華三枝九葉草圖經剛前本經弘景曰服之使人好為陰陽西川北部有淫羊一日百遍合蓋食此藿所致故名淫羊藿時珍曰豆葉曰藿此葉似之故亦名藿仙靈脾千兩金放杖剛前皆言其功力也雞筋黃連祖皆因其根形也柳子厚文作仙靈毗入臍曰毗此物補下於理尤通集解別録曰淫羊藿生上郡陽山山谷恭曰所在皆有葉形似小豆而圓薄莖細亦堅俗名仙靈脾是也頌曰江東陝西泰山漢中湖湘間皆有之莖如粟稈葉青似杏葉上有刺根紫色有須四月開白花亦有紫花者碎小獨頭子五月採葉曬乾湖湘出者葉如小豆枝莖緊細經冬不凋根似黃連關中呼為三枝九葉草苗高一二尺許根葉俱堪用蜀本草言生處不聞水聲者良時珍曰生大山中一根數莖莖粗如線高一二尺一莖三丫一丫三葉葉長二三寸如杏葉及豆藿面光背淡甚薄而細齒有微刺根葉修治斆曰凡使時呼仙靈脾以夾刀夾去葉四畔花枝每一斤用羊脂四兩拌炒待脂盡為度氣味辛寒無毒普曰神農雷公辛李當之小寒權曰甘平可單用保升曰性溫時珍曰甘香微辛溫之才曰薯蕷紫芝為之使得酒良主治陰痿絶傷莖中痛利小便益氣力強志本經堅筋骨消瘰癧赤癰下部有瘡洗出蟲丈夫久服令人無子別録機曰無子字誤當作有子丈夫絶陽無子女人絶陰無子老人昏耄中年健忘一切冷風勞氣筋骨攣急四肢不仁補腰膝強心力大明發明時珍曰淫羊藿味甘氣香性溫不寒能益精氣乃手足陽明三焦命門藥也真陽不足者宜之附方舊三新五仙靈脾酒益丈夫興陽理腰膝冷用淫羊藿一斤酒一斗浸三日逐時飲之食醫心鏡偏風不遂皮膚不仁宜服仙靈脾酒仙靈脾一斤細銼生絹袋盛於不津器中用無灰酒二斗浸之重封春夏三日秋冬五日後每日暖飲常令醺然不得大醉酒盡再合無不效驗合時切忌雞犬見聖惠方三焦咳嗽腹滿不飲食氣不順仙靈脾覆盆子五味子炒各一兩為末煉蜜丸梧子大每薑茶下二十丸聖濟録目昏生翳仙靈脾生王瓜即小栝蔞紅色者等分為末每服一錢茶下日二服聖濟總録病後青盲日近者可治仙靈脾一兩淡豆豉一百粒水一碗半煎一碗頓服即瘳百一選方小兒雀目仙靈脾根晚蠶蛾各半兩炙甘草射干各二錢半為末用羊子肝一枚切開摻藥二錢扎定以黑豆一合米泔一盞煮熟分二次食以汁送之普濟方痘疹入目仙靈脾威靈仙等分為末每服五分米湯下痘疹便覽牙齒虛痛仙靈脾為粗末煎湯頻漱大效奇效方仙茅開寶釋名獨茅開寶茅爪子開寶婆羅門參珣曰其葉似茅久服輕身故名仙茅梵音呼為阿輸干陀頌曰其根獨生始因西域婆羅門僧獻方於唐玄宗故今江南呼為婆羅門參言其功補如人參也集解珣曰仙茅生西域葉似茅其根粗細有筋或如筆管有節紋理其花黃色多涎自武城來蜀中諸州亦皆有之頌曰今大庾嶺蜀川江湖兩浙諸州亦有之葉青如茅而軟且略闊面有縱紋又似初生棕櫚秧高尺許至冬盡枯春初乃生三月有花如梔子花黃色不結實其根獨莖而直大如小指下有短細肉根相附外皮稍粗褐色內肉黃白色二月八月採根曝乾用衡山出者花碧五月結黑子時珍曰蘇頌所說詳盡得之但四五月中抽莖四五寸開小花深黃色六出不似梔子處處大山中有之人惟取梅嶺者用而會典成都歲貢仙茅二十一斤根修治斆曰採得以清水洗刮去皮於槐砧上用銅刀切豆許大以生稀布袋盛於烏豆水中浸一宿取出用酒拌濕蒸之從巳至亥取出曝乾勿犯鐵器及牛乳斑人鬢須大明曰彭祖單服法以竹刀刮切糯米泔浸去赤汁出毒後無妨損氣味辛溫有毒斆曰甘微溫有小毒又曰辛平宣而復補無大毒有小熱小毒主治心腹冷氣不能食腰腳風冷攣痹不能行丈夫虛勞老人失溺無子益陽道久服通神強記助筋骨益肌膚長精神明目開寶治一切風氣補暖腰腳清安五臟久服輕身益顏色丈夫五勞七傷明耳目填骨髓李珣開胃消食下氣益房事不倦大明發明頌曰五代僞唐筠州刺史王顏著續傳信方因國書編録西域婆羅門僧服仙茅方當時盛行云五勞七傷明目益筋力宣而復補云十斤乳石不及一斤仙茅表其功力也本西域道人所傳開元元年婆羅門僧進此藥明皇服之有效當時禁方不傳天寶之亂方書流散上都僧不空三藏始得此方傳與司徒李勉尚書路嗣恭給事齊杭僕射張建封服之皆得力路公久服金石無效得此藥其益百倍齊給事守縉雲日少氣力風疹繼作服之遂愈八九月採得竹刀刮去黑皮切如豆粒米泔浸兩宿陰乾搗篩熟蜜丸梧子大每旦空心酒飲任便下二十丸忌鐵器禁食牛乳及黑牛肉大減藥力機曰五臺山有仙茅患大風者服之多瘥時珍曰按許真君書云仙茅久服長生其味甘能養肉辛能養肺苦能養氣咸能養骨滑能養膚酸能養筋宜和苦酒服之必效也又範成大虞衡志云廣西英州多仙茅其羊食之舉體悉化為筋不復有血肉食之補人名乳羊沈括筆談云夏文莊公稟賦異於人但睡則身冷如逝者既覺須令人溫之良久乃能動常服仙茅鍾乳硫黃莫知紀極觀此則仙茅蓋亦性熱補三焦命門之藥也惟陽弱精寒稟賦素怯者宜之若體壯相火熾盛者服之反能動火按張杲醫說云一人中仙茅毒舌脹出口漸大與肩齊因以小刀𠢐之隨破隨合𠢐至百數始有血一點出曰可救矣煮大黃朴硝與服以藥摻之應時消縮此皆火盛性淫之人過服之害也弘治間東海張弼梅嶺仙茅詩有使君昨日才持去今日人來乞墓銘之句皆不知服食之理惟借藥縱恣以速其生者於仙茅何尤附方新二仙茅丸壯筋骨益精神明目黑髭鬚仙茅二斤糯米泔浸五日去赤水夏月浸三日銅刀刮銼陰乾取一斤蒼朮二斤米泔浸五日刮皮焙乾取一斤枸杞子一斤車前子十二兩白茯苓去皮茴香炒柏子仁去殼各八兩生地黃焙熟地黃焙各四兩為末酒煮糊丸如梧子大每服五十丸食前溫酒下日二服聖濟總録定喘下氣補心腎神祕散用白仙茅半兩米泔浸三宿曬炒團參二錢半阿膠一兩半炒雞膍胵一兩燒為末每服二錢糯米飲空心下日二服三因方玄參本經中品釋名黑參綱目玄臺吳普重臺本經鹿腸吳普正馬別録逐馬藥性馥草開寶野脂麻綱目鬼藏吳普時珍曰玄黑色也別録一名端一名咸多未詳弘景曰其莖微似人參故得參名志曰合香家用之故俗呼馥草集解別録曰玄參生河間川穀及冤句三月四月採根曝乾普曰生冤句山陽三月生苗其葉有毛四四相值似芍藥黑莖莖方高四五尺葉亦生枝間四月實黑弘景曰今出近道處處有之莖似人參而長大根甚黑亦微香道家時用亦以合香恭曰玄參根苗並臭莖亦不似人參未見合香志曰其莖方大高四五尺紫赤色而有細毛葉如掌大而尖長根生青白干即紫黑新者潤膩陶云莖似人參蘇言根苗並臭似未深識頌曰二月生苗葉似脂麻對生又如槐柳而尖長有鋸齒細莖青紫色七月開花青碧色八月結子黑色又有白花者莖方大紫赤色而有細毛有節若竹者高五六尺其根一根五七枚三月八月採曝乾或云蒸過曝乾時珍曰今用玄參正如蘇頌所說其根有腥氣故蘇恭以為臭也宿根多地蠶食之故其中空花有紫白二種根修治斆曰凡採得後須用蒲草重重相隔入甑蒸兩伏時曬乾用勿犯銅器餌之噎人喉喪人目氣味苦微寒無毒別録曰咸普曰神農桐君黃帝雷公苦無毒岐伯寒元素曰足少陰腎經君藥也治本經須用之才曰惡黃耆乾薑大棗山茱萸反藜蘆主治腹中寒熱積聚女子産乳余疾補腎氣令人目明本經主暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧灑灑血瘕下寒血除胸中氣下水止煩渴散頸下核癰腫心腹痛堅症定五臟久服補虛明目強陰益精別録熱風頭痛傷寒勞復治暴結熱散瘤瘻瘰癧甄權治遊風補勞損心驚煩躁骨蒸傳尸邪氣止健忘消腫毒大明滋陰降火解斑毒利咽喉通小便血滯時珍發明元素曰玄參乃樞機之劑管領諸氣上下清肅而不濁風藥中多用之故活人書治傷寒陽毒汗下後毒不散及心下懊憹煩不得眠心神顛倒欲絶者俱用玄參以此論之治胸中氤氳之氣無根之火當以玄參為聖劑也時珍曰腎水受傷真陰失守孤陽無根發為火病法宜壯水以制火故玄參與地黃同功其消瘰癧亦是散火劉守真言結核是火病附方舊二新七諸毒鼠瘻玄參漬酒日日飲之開寶本草年久瘰癧生玄參搗敷上日二易之廣利方赤脈貫瞳玄參為末以米泔煮豬肝日日蘸食之濟急仙方發斑咽痛玄參升麻湯用玄參升麻甘草各半兩水三盞煎一盞半溫服南陽活人書急喉痹風不拘大人小兒玄參鼠黏子半生半炒各一兩為末新水服一盞立瘥聖惠方鼻中生瘡玄參末塗之或以水浸軟塞之衛生易簡方三焦積熱玄參黃連大黃各一兩為末煉蜜丸梧子大每服三四十丸白湯下小兒丸粟米大丹溪方小腸疝氣黑參㕮咀炒為丸每服一錢半空心酒服出汗即效孫天仁集效方燒香治癆經驗方用玄參一斤甘松六兩為末煉蜜一斤和勻入瓶中封閉地中埋罯十日取出更用炭末六兩煉蜜六兩同和入瓶更罯五日取出燒之常令聞香疾自愈頌曰初入瓶中封固煮一伏時破瓶取搗入蜜別以瓶盛埋地中罯過用亦可薰衣地榆本經中品校正併入別録有名未用酸赭釋名玉豉酸赭弘景曰其葉似榆而長初生布地故名其花子紫黑色如豉故又名玉豉時珍曰按外丹方言地榆一名酸赭其味酸其色赭故也今蘄州俚人呼地榆為酸赭又訛赭為棗則地榆酸赭為一物甚明其主治之功亦同因並別録有名未用酸赭為一云集解別録曰地榆生桐柏及冤句山谷二月八月採根曝乾又曰酸赭生昌陽山採無時頌曰今處處平原川澤皆有之宿根三月內生苗初生布地獨莖直上高三四尺對分出葉葉似榆葉而稍狹細長作鋸齒狀青色七月開花如椹子紫黑色根外黑裡紅似柳根弘景曰其根亦入釀酒道方燒作灰能爛石故煮石方用之其葉山人乏茗時採作飲亦好又可炸茹根氣味苦微寒無毒別録曰甘酸權曰苦平元素曰氣微寒味微苦氣味俱薄其體沉而降陰中陽也專主下焦血杲曰味苦酸性微寒沉也陰也之才曰得發良惡麥門冬伏丹砂雄黃硫黃主治婦人乳産痓痛七傷帶下五漏止痛止汗除惡肉療金瘡本經止膿血諸瘻惡瘡熱瘡補絶傷産後內塞可作金瘡膏消酒除渴明目別録止冷熱痢疳痢極效開寶止吐血鼻衄腸風月經不止血崩産前後諸血疾並水瀉大明治膽氣不足李杲汁釀酒治風痹補腦搗汁塗虎犬蛇蟲傷時珍酸赭味酸主內漏止血不足別録發明頌曰古者斷下多用之炳曰同樗皮治赤白痢宗奭曰其性沉寒入下焦若熱血痢則可用若虛寒人及水瀉白痢即未可輕使時珍曰地榆除下焦熱治大小便血證止血取上截切片炒用其梢則能行血不可不知楊士瀛云諸瘡痛者加地榆癢者加黃芩附方舊八新七男女吐血地榆三兩米醋一升煮十餘沸去滓食前稍熱服一合聖惠方婦人漏下赤白不止令人黃瘦方同上血痢不止地榆曬研每服二錢摻在羊血上炙熟食之以捻頭煎湯送下一方以地榆煮汁作飲每服三合聖濟赤白下痢骨立者地榆一斤水三升煮一升半去滓再煎如稠餳絞濾空腹服三合日再服崔元亮海上方久病腸風痛癢不止地榆五錢蒼朮一兩水二鍾煎一鍾空心服日一服活法機要下血不止二十年者取地榆鼠尾草各二兩水二升煮一升頓服若不斷以水漬屋塵飲一小杯投之肘後方結陰下血腹痛不已地榆四兩炙甘草三兩每服五錢水三盞入縮砂仁七枚煎一盞半分二服宣明方小兒疳痢地榆煮汁熬如飴糖與服便已肘後方毒蛇螫人新地榆根搗汁飲兼以漬瘡肘後方虎犬咬傷地榆煮汁飲併為末敷之亦可為末白湯服日三忌酒梅師方代指腫痛地榆煮汁漬之半日愈千金翼小兒濕瘡地榆煮濃汁日洗二次千金方小兒面瘡焮赤腫痛地榆八兩水一斗煎五升溫洗之衛生總微方煮白石法七月七日取地榆根不拘多少陰乾百日燒為灰復取生者與灰合搗萬下灰三分生末一分合之若石二三斗以水浸過三寸以藥入水攪之煮至石爛可食乃已臞仙神隱書葉主治作飲代茶甚解熱蘇恭丹參本經上品釋名赤參別録山參日華郤蟬草本經木羊乳吳普逐馬弘景奔馬草時珍曰五參五色配五臟故人參入脾曰黃參沙參入肺曰白參玄參入腎曰黑參牡蒙入肝曰紫參丹參入心曰赤參其苦參則右腎命門之藥也古人舍紫參而稱苦參未達此義爾炳曰丹參治風軟腳可逐奔馬故名奔馬草曾用實有效集解別録曰丹參生桐柏山川穀及太山五月採根曝乾弘景曰此桐柏山在義陽是淮水發源之山非江東臨海之桐柏也今近道處處有之莖方有毛紫花時人呼為逐馬普曰莖葉小房如荏有毛根赤色四月開紫花二月五月採根陰乾頌曰今陝西河東州郡及隨州皆有之二月生苗高一尺許莖方有稜青色葉相對如薄荷而有毛三月至九月開花成穗紅紫色似蘇花根赤色大者如指長尺余一苗數根恭曰冬採者良夏採者虛惡時珍曰處處山中有之一枝五葉葉如野蘇而尖青色皺毛小花成穗如蛾形中有細子其根皮丹而肉紫根氣味苦微寒無毒普曰神農桐君黃帝雷公苦無毒岐伯咸李當之大寒弘景曰久服多眼赤故應性熱今云微寒恐謬也權曰平之才曰畏鹹水反藜蘆主治心腹邪氣腸鳴幽幽如走水寒熱積聚破症除瘕止煩滿益氣本經養血去心腹痼疾結氣腰脊強腳痹除風邪留熱久服利人別録漬酒飲療風痹足軟弘景主中惡及百邪鬼魅腹痛氣作聲音鳴吼能定精甄權養神定志通利關脈治冷熱勞骨節疼痛四肢不遂頭痛赤眼熱溫狂悶破宿血生新血安生胎落死胎止血崩帶下調婦人經脈不勻血邪心煩惡瘡疥癬癭贅腫毒丹毒排膿止痛生肌長肉大明活血通心包絡治疝痛時珍發明時珍曰丹參色赤味苦氣平而降陰中之陽也入手少陰厥陰之經心與包絡血分藥也按婦人明理論云四物湯治婦人病不問産前産後經水多少皆可通用惟一味丹參散主治與之相同蓋丹參能破宿血補新血安生胎落死胎止崩中帶下調經脈其功大類當歸地黃芎藭芍藥故也附方舊三新四丹參散治婦人經脈不調或前或後或多或少産前胎不安産後惡血不下兼治冷熱勞腰脊痛骨節煩疼用丹參冼淨切曬為末每服二錢溫酒調下婦人明理方落胎下血丹參十二兩酒五升煮取三升溫服一升一日三服亦可水煮千金方寒疝腹痛小腹陰中相引痛白汗出欲死以丹參一兩為末每服二錢熱酒調下聖惠方小兒身熱汗出拘急因中風起丹參半兩鼠屎炒三十枚為末每服三錢漿水下聖濟總録驚癇發熱丹參摩膏用丹參雷丸各半兩豬膏二兩同煎七上七下濾去滓盛之每以摩兒身上日三次千金方婦人乳癰丹參白芷芍藥各二兩㕮咀以醋醃一夜豬脂半斤微火煎成膏去滓敷之孟詵必效方熱油火灼除痛生肌丹參八兩銼以水微調取羊脂二斤煎三上三下以塗瘡上肘後方紫參本經中品釋名牡蒙本經童腸別録馬行別録衆戎別録五鳥花綱目時珍曰紫參王孫並有牡蒙之名古方所用牡蒙多是紫參也按錢起詩集云紫參幽芳也五葩連萼狀如飛禽羽舉故俗名五鳥花集解別録曰紫參生河西及冤句山谷三月採根火炙使紫色普曰紫參一名牡蒙生河西或商山圓聚生根黃赤有紋皮黑中紫五月花紫赤實黑大如豆弘景曰今方家皆呼為牡蒙用之亦少恭曰紫參葉似羊蹄紫花青穗其根皮紫黑肉紅白肉淺皮深所在有之長安見用者出蒲州牡蒙乃王孫也葉似及己而大根長尺余皮肉亦紫色根苗不相似頌曰今河中晉解齊及淮蜀州郡皆有之苗長一二尺莖青而細其葉青似槐葉亦有似羊蹄者五月開花白色似蔥花亦有紅紫而似水葒者根淡紫根皮紫黑色如地黃狀肉紅白色肉淺而皮深三月採根火炙紫色又云六月採曬乾用時珍曰紫參根乾紫黑色肉帶紅白狀如小紫草範子計然云紫參出三輔有三色以青赤色為善根氣味苦辛寒無毒別録曰微寒普曰牡蒙神農黃帝苦李當之小寒之才曰畏辛夷主治心腹積聚寒熱邪氣通九竅利大小便本經療腸胃大熱唾血衄血腸中聚血癰腫諸瘡止渴益精別録治心腹堅脹散瘀血治婦人血閉不通甄權主狂瘧瘟瘧鼽血汗出好古治血痢好古牡蒙治金瘡破血生肌肉止痛赤白痢補虛益氣除腳腫發陰瘍蘇恭發明時珍曰紫參色紫黑氣味俱厚陰也沉也入足厥陰之經肝臟血分藥也故治諸血病及寒熱瘧痢癰腫積塊之屬厥陰者古方治婦人腸覃病烏啄丸所用牡蒙即此物也唐蘇恭注王孫引陳延之小品方牡蒙所主之證正是紫參若王孫則止治風濕痹證不治血病故今移附於此附方舊一新三紫參湯治痢下紫參半斤水五升煎二升入甘草二兩煎取半升分三服張仲景金匱玉函吐血不止紫參人參阿膠炒等分為末烏梅湯服一錢一方去人參加甘草以糯米湯服聖惠方面上酒刺五參丸用紫參丹參人參苦參沙參各一兩為末胡桃仁杵和丸梧子大每服三十丸茶下普濟王孫本經中品校正併入拾遺旱藕釋名牡蒙弘景黃孫別録黃昏別録旱藕普曰楚名王孫齊名長孫又名海孫吳名白功章又名蔓延時珍曰紫參一名牡蒙木部合歡一名黃昏皆與此名同物異集解別録曰王孫生海西川穀及汝南城郭垣下普曰蔓延赤文莖葉相當弘景曰今方家皆呼為黃昏云牡蒙市人少識者恭曰按陳延之小品方述本草牡蒙一名王孫徐之才藥對有牡蒙無王孫此則一物明矣牡蒙葉似及己而大根長尺余皮肉皆紫色藏器曰旱藕生太行山中狀如藕時珍曰王孫葉生顛頂似紫河車葉按神農及吳普本草紫參一名牡蒙陶弘景亦曰今方家呼紫參為牡蒙其王孫並無牡蒙之名而陶氏於王孫下乃云又名牡蒙且無形狀唐蘇恭始以紫參牡蒙為二物謂紫參葉似羊蹄王孫葉似及己但古方所用牡蒙皆為紫參後人所用牡蒙乃王孫非紫參也不可不辨唐玄宗時隱民姜撫上言終南山有旱藕餌之延年狀類葛粉帝取作湯餅賜大臣右驍騎將軍甘守誠曰旱藕者牡蒙也方家久不用撫易名以神之爾據此牡蒙乃王孫也蓋紫參止治血證積聚瘧痢而王孫主五臟邪氣痹痛療百病之文自可推也蘇恭引小品方牡蒙所主之證乃紫參非王孫故今移附紫參之下根氣味苦平無毒普曰神農雷公苦無毒黃帝甘藏器曰旱藕甘平無毒主治五臟邪氣寒濕痹四肢疼酸膝冷痛本經療百病益氣別録旱藕主長生不飢黑毛髮藏器紫草本經中品釋名紫丹別録紫芺音襖茈䓞廣雅音紫戾藐爾雅音邈地血吳普鴉銜草時珍曰此草花紫根紫可以染紫故名爾雅作茈草瑤侗人呼為鴉銜草集解別録曰紫草生碭山山谷及楚地三月採根陰乾弘景曰今出襄陽多從南陽新野來彼人種之即是今染紫者方藥都不復用博物志云平氏陽山紫草特好魏國者染色殊黑比年東山亦種之色小淺於北者恭曰所在皆有人家或種之苗似蘭香莖赤節青二月開花紫白色結實白色秋月熟時珍曰種紫草三月逐壟下子九月子熟時刈草春社前後採根陰乾其根頭有白毛如茸未花時採則根色鮮明花過時採則根色黯惡採時以石壓扁曝乾收時忌人溺及驢馬糞並煙氣皆令草黃色根修治斆曰凡使每一斤用蠟三兩溶水拌蒸之待水乾取去頭並兩畔髭細銼用氣味苦寒無毒權曰甘平完素曰苦溫時珍曰甘咸寒入手足厥陰經主治心腹邪氣五疸補中益氣利九竅通水道本經療腹腫脹滿痛以合膏療小兒瘡及面皶別録治惡瘡瘑癬甄權治斑疹痘毒活血涼血利大腸時珍發明頌曰紫草古方稀用今醫家多用治傷寒時疾發瘡疹不出者以此作藥使其發出韋宙獨行方治豌豆瘡煮紫草湯飲後人相承用之其效尤速時珍曰紫草味甘鹹而氣寒入心包絡及肝經血分其功長於涼血活血利大小腸故痘疹欲出未出血熱毒盛大便閉澀者宜用之已出而紫黑便閉者亦可用若已出而紅活及白陷大便利者切宜忌之故楊士瀛直指方云紫草治痘能導大便使發出亦輕得木香白朮佐之尤為有益又曾世榮活幼心書云紫草性寒小兒脾氣實者猶可用脾氣虛者反能作瀉古方惟用茸取其初得陽氣以類觸類所以用發痘瘡今人不達此理一概用之非矣附方舊三新六消解痘毒紫草一錢陳皮五分蔥白三寸新汲水煎服直指方嬰童疹痘三四日隱隱將出未出色赤便閉者紫草二兩銼以百沸湯一盞泡封勿泄氣待溫時服半合則瘡雖出亦輕大便利者勿用煎服亦可經驗後方痘毒黑疔紫草三錢雄黃一錢為末以胭脂汁調銀簪挑破點之極妙集簡方癰疽便閉紫草栝蔞實等分新水煎服直指方小兒白禿紫草煎汁塗之聖惠方小便卒淋紫草一兩為散每食前用井華水服二錢聖惠方産後淋瀝方同上産寶惡蟲咬人紫草煎油塗之聖惠方火黃身熱午後卻涼身有赤點如生黑點者不可治宜烙手足心背心百會下廉內服紫草湯紫草吳藍各一兩木香黃連各半兩粗搗篩每服五錢匕水煎服三十六黃方白頭翁本經下品釋名野丈人本經胡王使者本經奈何草別録弘景曰處處有之近根處有白茸狀似白頭老翁故以為名時珍曰丈人胡使奈何皆狀老翁之意集解別録曰白頭翁生高山山谷及田野四月採恭曰其葉似芍藥而大抽一莖莖頭一花紫色似木槿花實大者如雞子白毛寸余皆披下似纛頭正似白頭老翁故名焉陶言近根有白茸似不識也太常所貯蔓生者乃是女葳其白頭翁根似續斷而扁保升曰所在有之有細毛不滑澤花蕊黃二月採花四月採實八月採根皆曬乾頌曰處處有之正月生苗作叢生狀似白薇而柔細稍長葉生莖頭如杏葉上有細白毛而不滑澤近根有白茸根紫色深如蔓菁其苗有風則靜無風而搖與赤箭獨活同也陶注未述莖葉蘇注言葉似芍藥實如雞子白毛寸余者皆誤矣宗奭曰白頭翁生河南洛陽界其新安山野中屢嘗見之正如蘇恭所說至今本處山中人賣白頭翁丸言服之壽考又失古人命名之義陶氏所說失於不審宜其排叱也機曰寇宗奭以蘇恭為是蘇頌以陶說為是大抵此物用根命名取象當準蘇頌圖經而恭說恐別是一物也根氣味苦溫無毒別録曰有毒吳綬曰苦辛寒權曰甘苦有小毒豚實為之使大明曰得酒良花子莖葉同主治溫瘧狂𬌺寒熱癥瘕積聚癭氣逐血止痛療金瘡本經鼻衄別録止毒痢弘景赤痢腹痛齒痛百骨節痛項下瘤癧甄權一切風氣暖腰膝明目消贅大明發明頌曰俗醫合補下藥甚驗亦沖人杲曰氣厚味薄可升可降陰中陽也張仲景治熱痢下重用白頭翁湯主之蓋腎欲堅急食苦以堅之痢則下焦虛故以純苦之劑堅之男子陰疝偏墜小兒頭禿膻腥鼻衄無此不效毒痢有此獲功吳綬曰熱毒下痢紫血鮮血者宜之附方舊二新三白頭翁湯治熱痢下重用白頭翁二兩黃連黃柏秦皮各三兩水七升煮二升每服一升不愈更服婦人産後痢虛極者加甘草阿膠各二兩仲景金匱玉函方下痢咽痛春夏病此宜用白頭翁黃連各一兩木香二兩水五升煎一升半分三服聖惠方陰㿗偏腫白頭翁根生者不限多少搗敷腫處一宿當作瘡二十日愈外臺祕要外痔腫痛白頭翁草一名野丈人以根搗塗之逐血止痛衛生易簡方小兒禿瘡白頭翁根搗敷一宿作瘡半月愈肘後方花主治瘧疾寒熱白禿頭瘡時珍白芨本經下品校正併入別録白給釋名連及草本經甘根本經白給時珍曰其根白色連及而生故曰白芨其味苦而曰甘根反言也吳普作白根其根有白亦通金光明經謂之罔達羅喝悉多又別録有名未用白給即白芨也性味功用皆同系重出今併為一集解別録曰白芨生北山川穀及冤句及越山又曰白給生山谷葉如藜蘆根白相連九月採普曰莖葉如生薑藜蘆十月花直上紫赤色根白連二月八月九月採弘景曰近道處處有之葉似杜若形根似菱米節間有毛方用亦稀可以作糊保升曰今出申州葉似初生棕苗葉及藜蘆三四月抽出一苔開紫花七月實熟黃黑色冬凋根似菱有三角白色角頭生芽八月採根用頌曰今江淮河陝漢黔諸州皆有之生石山上春生苗長一尺許葉似棕櫚兩指大青色夏開紫花二月七月採根時珍曰韓保升所說形狀正是但一科止抽一莖開花長寸許紅紫色中心如舌其根如菱米有臍如鳧茈之臍又如扁扁螺旋紋性難乾根氣味苦平無毒別録曰辛微寒白給辛平無毒普曰神農苦黃帝辛李當之大寒雷公辛無毒大明曰甘辛杲曰苦甘微寒性澀陽中之陰也之才曰紫石英為之使惡理石畏李核杏仁反烏頭主治癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱緩不收本經除白癬疥蟲別録結熱不消陰下痿面上皯皰令人肌滑甄權止驚邪血邪血痢癇疾風痹赤眼癥結溫熱瘧疾發背瘰癧腸風痔瘻撲損刀箭瘡湯火瘡生肌止痛大明止肺血李杲白給主伏蟲白癬腫痛別録發明恭曰山野人患手足皸拆者嚼以塗之有效為其性黏也頌曰今醫家治金瘡不瘥及癰疽方多用之震亨曰凡吐血不止宜加白芨時珍曰白芨性澀而收得秋金之令故能入肺止血生肌治瘡也按洪邁夷堅志云台州獄吏憫一大囚囚感之因言吾七次犯死罪遭訊拷肺皆損傷至於嘔血人傳一方只用白芨為末米飲日服其效如神後其囚凌遲劊者剖其胸見肺間竅穴數十處皆白芨填補色猶不變也洪貫之聞其說赴任洋州一卒忽苦咯血甚危用此救之一日即止也摘玄云試血法吐在水碗內浮者肺血也沉者肝血也半浮半沉者心血也各隨所見以羊肺羊肝羊心煮熟蘸白芨末日日服之附方舊一新八鼻衄不止津調白芨末塗山根上仍以水服一錢立止經驗方心氣疼痛白芨石榴皮各二錢為末煉蜜丸黃豆大每服三丸艾醋湯下生生編重舌鵝口白芨末乳汁調塗足心聖惠方婦人陰脫白芨川烏頭等分為末絹裹一錢納陰中入三寸腹內熱即止日用一次廣濟方疔瘡腫毒白芨末半錢以水澄之去水攤於厚紙上貼之袖珍方打跌骨折酒調白芨末二錢服其功不減自然銅古銖錢也永類方刀斧傷損白芨石膏煅等分為末摻之亦可收口濟急方手足皸裂白芨末水調塞之勿犯水濟急方湯火傷灼白芨末油調敷之趙真人方三七綱目釋名山漆綱目金不換時珍曰彼人言其葉左三右四故名三七蓋恐不然或云本名山漆謂其能合金瘡如漆黏物也此說近之金不換貴重之稱也集解時珍曰生廣西南丹諸州番峒深山中採根曝乾黃黑色團結者狀略似白芨長者如老幹地黃有節味微甘而苦頗似人參之味或云試法以末糝豬血中血化為水者乃真近傳一種草春生苗夏高三四尺葉似菊艾而徑厚有歧尖莖有赤稜夏秋開黃花蕊如金絲盤紐可愛而氣不香花干則吐絮如苦蕒絮根葉味甘治金瘡折傷出血及上下血病甚效云是三七而根大如牛蒡根與南中來者不類恐是劉寄奴之屬甚易繁衍根氣味甘微苦溫無毒主治止血散血定痛金刃箭傷跌撲杖瘡血出不止者嚼爛塗或為末摻之其血即止亦主吐血衄血下血血痢崩中經水不止産後惡血不下血運血痛赤目癰腫虎咬蛇傷諸病時珍發明時珍曰此藥近時始出南人軍中用為金瘡要藥云有奇功又云凡杖撲傷損瘀血淋漓者隨即嚼爛罨之即止青腫者即消散若受杖時先服一二錢則血不衝心杖後尤宜服之産後服亦良大抵此藥氣溫味甘微苦乃陽明厥陰血分之藥故能治一切血病與騏驎竭紫礦相同附方新八吐血衄血山漆一錢自嚼米湯送下或以五分加入八核湯瀕湖集簡方赤痢血痢三七三錢研末米泔水調服即愈同上大腸下血三七研末同淡白酒調一二錢服三服可愈加五分入四物湯亦可同上婦人血崩方同上産後血多山漆研末米湯服一錢同上男婦赤眼十分重者以山漆根磨汁塗四圍甚妙同上無名癰腫疼痛不止山漆磨米醋調塗即散已破者研末干塗虎咬蛇傷山漆研末米飲服三錢仍嚼塗之並同上葉主治折傷跌撲出血敷之即止青腫經夜即散余功同根時珍
