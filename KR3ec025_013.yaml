body:
  text: 草部第十三卷草之二山草類下三十九種黃連本經上品釋名王連本經支連藥性時珍曰其根連珠而色黃故名集解別録曰黃連生巫陽川穀及蜀郡太山之陽二月八月採根弘景曰巫陽在建平今西間者色淺而虛不及東陽新安諸縣最勝臨海諸縣者不佳用之當布裹挼去毛令如連珠保升曰苗似茶叢生一莖生三葉高尺許凌冬不凋花黃色江左者節高若連珠蜀都者節下不連珠今秦地及杭州柳州者佳頌曰今江湖荊夔州郡亦有而以宣城九節堅重相擊有聲者為勝施黔者次之東陽歙州處州者又次之苗高一尺以來葉似甘菊四月開花黃色六月結實似芹子色亦黃江左者根若連珠其苗經冬不凋葉如小雉尾草正月開花作細穗淡白微黃色六七月根緊始堪採恭曰蜀道者粗大味極濃苦療渴為最江東者節如連珠療痢大善澧州者更勝時珍曰黃連漢末李當之本草惟取蜀郡黃肥而堅者為善唐時以澧州者為勝今雖吳蜀皆有惟以雅州眉州者為良藥物之興廢不同如此大抵有二種一種根粗無毛有珠如鷹雞爪形而堅實色深黃一種無珠多毛而中虛黃色稍淡各有所宜根修治斆曰凡使以布拭去肉毛用漿水浸二伏時漉出於柳木火上焙乾用時珍曰五臟六腑皆有火平則治動則病故有君火相火之說其實一氣而已黃連入手少陰心經為治火之主藥治本臟之火則生用之治肝膽之實火則以豬膽汁浸炒治肝膽之虛火則以醋浸炒治上焦之火則以酒炒治中焦之火則以薑汁炒治下焦之火則以鹽水或朴硝研細調水和炒治氣分濕熱之火則以茱萸湯浸炒治血分塊中伏火則以乾漆末調水炒治食積之火則以黃土研細調水和炒諸法不獨為之引導蓋辛熱能制其苦寒鹹寒能制其燥性在用者詳酌之氣味苦寒無毒別録曰微寒普曰神農岐伯黃帝雷公苦無毒李當之小寒之才曰黃芩龍骨理石為之使惡菊花玄參白蘚皮芫花白殭蠶畏款冬牛膝勝烏頭解巴豆毒權曰忌豬肉惡冷水斆曰服此藥至十兩不得食豬肉若服至三年一生不得食也時珍曰道書言服黃連犯豬肉令人泄瀉而方家有豬肚黃連丸豬臟黃連丸豈只忌肉而不忌臟腑乎主治熱氣目痛眥傷泣出明目腸澼腹痛下痢婦人陰中腫痛久服令人不忘本經主五臟冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽療口瘡別録治五勞七傷益氣止心腹痛驚悸煩躁潤心肺長肉止血天行熱疾止盜汗並瘡疥豬肚蒸為丸治小兒疳氣殺蟲大明羸瘦氣急藏器治鬱熱在中煩躁噁心兀兀欲吐心下痞滿元素主心病逆而盛心積伏梁好古去心竅惡血解服藥過劑煩悶及巴豆輕粉毒時珍發明元素曰黃連性寒味苦氣味俱厚可升可降陰中陽也入手少陰經其用有六瀉心臟火一也去中焦濕熱二也諸瘡必用三也去風濕四也赤眼暴發五也止中部見血六也張仲景治九種心下痞五等瀉心湯皆用之成無己曰苦入心寒勝熱黃連大黃之苦寒以導心下之虛熱蛔得甘則動得苦則安黃連黃柏之苦以安蛔也好古曰黃連苦燥苦入心火就燥瀉心者其實瀉脾也實則瀉其子也震亨曰黃連去中焦濕熱而瀉心火若脾胃氣虛不能轉運者則以茯苓黃芩代之以豬膽汁拌炒佐以龍膽草則大瀉肝膽之火下痢胃口熱禁口者用黃連人參煎湯終日呷之如吐再強飲但得一呷下咽便好劉完素曰古方以黃連為治痢之最蓋治痢惟宜辛苦寒藥辛能發散開通鬱結苦能燥濕寒能勝熱使氣宣平而已諸苦寒藥多泄惟黃連黃柏性冷而燥能降火去濕而止瀉痢故治痢以之為君宗奭曰今人多用黃連治痢蓋執以苦燥之義下俚但見腸虛滲泄微似有血便即用之又不顧寒熱多少惟欲盡劑由是多致危困若氣實初病熱多血痢服之便止不必盡劑虛而冷者慎勿輕用杲曰諸痛癢瘡瘍皆屬心火凡諸瘡宜以黃連當歸為君甘草黃芩為佐凡眼暴發赤腫痛不可忍者宜黃連當歸以酒浸煎之宿食不消心下痞滿者須用黃連枳實頌曰黃連治目方多而羊肝丸尤奇異今醫家洗眼以黃連當歸芍藥等分用雪水或甜水煎湯熱洗之冷即再溫甚益眼目但是風毒赤目花翳用之無不神效蓋眼目之病皆是血脈凝滯使然故以行血藥合黃連治之血得熱則行故乘熱洗也韓𢘅曰火分之病黃連為主不但瀉心火而與芩柏諸苦藥例稱者比也目疾入以人乳浸蒸或點或服之生用為君佐以官桂少許煎百沸入蜜空心服之能使心腎交於頃刻入五苓滑石大治夢遺以黃土薑汁酒蜜四炒為君以使君子為臣白芍藥酒煮為佐廣木香為使治小兒五疳以茱萸炒者加木香等分生大黃倍之水丸治五痢此皆得制方之法也時珍曰黃連治目及痢為要藥古方治痢香連丸用黃連木香姜連散用乾薑黃連變通丸用黃連茱萸薑黃散用黃連生薑治消渴用酒蒸黃連治伏暑用酒煮黃連治下血用黃連大蒜治肝火用黃連茱萸治口瘡用黃連細辛皆是一冷一熱一陰一陽寒因熱用熱因寒用君臣相佐陰陽相濟最得制方之妙所以有成功而無偏勝之害也弘景曰俗方多用黃連治痢及渴道方服食長生慎微曰劉宋王微黃連贊云黃連味苦左右相因斷涼滌暑闡命輕身縉雲昔御飛蹕上旻不行而至吾聞其人又梁江淹黃連頌云黃連上草丹砂之次御孽闢妖長靈久視驂龍行天馴馬匝地鴻飛以儀順道則利時珍曰本經別録並無黃連久服長生之說惟陶弘景言道方久服長生神仙傳載封君達黑穴公並服黃連五十年得仙竊謂黃連大苦大寒之藥用之降火燥濕中病即當止豈可久服使肅殺之令常行而伐其生髮沖和之氣乎素問載岐伯言五味入胃各歸所喜攻久而增氣物化之常也氣增而久夭之由也王冰注云酸入肝為溫苦入心為熱辛入肺為清鹹入腎為寒甘入脾為至陰而四氣兼之皆增其味而益其氣故各從本臟之氣為用所以久服黃連苦參反熱從火化也餘味皆然久則臟氣偏勝即有偏絶則有暴夭之道是以絶粒服餌之人不暴亡者無五味偏助也又秦觀與喬希聖論黃連書云聞公以眼疾餌黃連至十數兩猶不巳殆不可也醫經有久服黃連苦參反熱之說此雖大寒其味至苦入胃則先歸於心久而不己心火偏勝則熱乃其理也況眼疾本於肝熱肝與心為子母心火也肝亦火也腎孤臟也人患一水不勝二火豈可久服苦藥使心有所偏勝是以火救火其可乎秦公此書蓋因王公之說而推詳之也我明荊端王素多火病醫令服金花丸乃芩連梔柏四味餌至數年其火愈熾遂至內障喪明觀此則寒苦之藥不但使人不能長生久則氣增偏勝速夭之由矣當以素問之言為法陶氏道書之說皆謬談也楊士瀛云黃連能去心竅惡血附方舊二十二新五十三心經實熱瀉心湯用黃連七錢水一盞半煎一盞食遠溫服小兒減之和劑局方猝熱心痛黃連八錢㕮咀水煎熱服外臺祕要肝火為痛黃連薑汁炒為末粥糊丸梧子大每服三十丸白湯下左金丸用黃連六兩茱萸一兩同炒為末神麯糊丸梧子大每服三四十丸白湯下丹溪方伏暑發熱作渴嘔惡及赤白痢消渴腸風酒毒泄瀉諸病並宜酒煮黃龍丸主之川黃連一斤切以好酒二升半煮乾焙研糊丸梧子大每服五十丸熟水下日三服和劑局方陽毒發狂奔走不定宜黃連寒水石等分為末每服三錢濃煎甘草湯下易簡方骨節積熱漸漸黃瘦黃連四分切以童子小便五大合浸經宿微煎三四沸去滓分作二服廣利方小兒疳熱流注遍身瘡蝕或潮熱肚脹作渴豬肚黃連丸用豬肚一個洗淨宣黃連五兩切碎水和納入肚中縫定放在五升粳米上蒸爛石臼搗千杵或入少飯同杵丸緑豆大每服二十丸米飲下仍服調血清心之藥佐之蓋小兒之病不出於疳則出於熱常須識此直指方三消骨蒸黃連末以冬瓜自然汁浸一夜曬乾又浸如此七次為末以冬瓜汁和丸梧子大每服三四十丸大麥湯下尋常渴只一服見效易簡方消渴尿多肘後方用黃連末蜜丸梧子大每服三十丸白湯下寶鑑用黃連半斤酒一升浸重湯內煮一伏時取曬為末水丸梧子大每服五十丸溫水下崔氏治消渴小便滑數如油黃連五兩栝蔞根五兩為末生地黃汁丸梧子大每牛乳下五十丸日二服忌冷水豬肉總録用黃連末入豬肚內蒸爛搗丸梧子大飯飲下濕熱水病黃連末蜜丸梧子大每服二丸至四五丸飲下日三四服範汪方破傷風病黃連五錢酒二盞煎七分入黃蠟三錢溶化熱服之高文虎蓼花洲閒録小便白淫因心腎氣不足思想無窮所致黃連白茯苓等分為末酒糊丸梧子大每服三十丸煎補骨脂湯下日三服普濟方熱毒血痢宣黃連一兩水二升煮取半升露一宿空腹熱服少臥將息一二日即止千金方赤痢久下纍治不瘥黃連一兩雞子白和為餅炙紫為末以漿水三升慢火煎成膏每服半合溫米飲下一方只以雞子白和丸服勝金方熱毒赤痢黃連二兩切瓦焙令焦當歸一兩焙為末入麝香少許每服二錢陳米飲下佛智和尚在閩以此濟人本事方赤白久痢並無寒熱隻日久不止用黃連四十九個鹽梅七個入新瓶內燒煙盡熱研每服二錢鹽米湯下楊子建護命方赤白暴痢如鵝鴨肝者痛不可忍用黃連黃芩各一兩水二升煎一升分三次熱服經驗方冷熱諸痢胡洽九盞湯治下痢不問冷熱赤白谷滯休息久下悉主之黃連長三寸三十枚重一兩半龍骨如棋子大四枚重一兩大附子一枚乾薑一兩半膠一兩半細切以水五合著銅器中去火三寸煎沸便取下坐土上沸止又上水五合如此九上九下納諸藥入水內再煎沸輒取下沸止又上九上九下度可得一升頓服即止圖經本草下痢腹痛赤白痢下令人下部疼重故名重下日夜數十行臍腹絞痛以黃連一斤酒五升煮取一升半分再服當止絞痛也肘後方治痢香連丸李絳兵部手集治赤白諸痢裡急後重腹痛用宣黃連青木香等分搗篩白蜜丸梧子大每服二三十丸空腹飲下日再服其效如神久冷者以煨蒜搗和丸之不拘大人嬰孺皆效易簡方黃連茱萸炒過四兩木香麵煨一兩粟米飯丸錢仲陽香連丸治小兒冷熱痢加煨熟訶子肉又治小兒瀉痢加煨熟肉豆蔻又治小兒氣虛瀉痢腹痛加白附子尖劉河間治久痢加龍骨朱丹溪治禁口痢加石蓮肉王氏治痢渴加烏梅肉以阿膠化和為丸五疳八痢四治黃連丸用連珠黃連一斤分作四分一分用酒浸炒一分用自然薑汁炒一分用吳茱萸湯浸炒一分用益智仁同炒去益智研末白芍藥酒煮切焙四兩使君子仁焙四兩廣木香二兩為末蒸餅和丸緑豆大每服三十丸米飲食前下日三服忌豬肉冷水韓氏醫通傷寒下痢不能食者黃連一斤烏梅二十枚去核炙燥為末蠟一棋子大蜜一升合煎和丸梧子大一服二十丸日三服又方黃連二兩熟艾如鴨子大一團水三升煮取一升頓服立止並肘後方氣痢後重裡急或下泄杜壬方姜連散用宣連一兩乾薑半兩各為末收每用連一錢姜半錢和勻空心溫酒下或米飲下神妙濟生方祕傳香連丸用黃連四兩木香二兩生薑四兩以姜鋪砂鍋底次鋪連上鋪香新汲水三碗煮焙研醋調倉米糊為丸如常日服五次小兒下痢赤白多時體弱不堪以宣連用水濃煎和蜜日服五六次子母祕録諸痢脾泄臟毒下血雅州黃連半斤去毛切裝肥豬大腸內扎定入砂鍋中以水酒煮爛取連焙研末搗腸和丸梧子大每服百丸米湯下極效直指濕痢腸風百一選方變通丸治赤白下痢日夜無度及腸風下血用川黃連去毛吳茱萸湯泡過各二兩同炒香揀出各為末以粟米飯和丸梧子大各收每服三十丸赤痢甘草湯下黃連丸白痢薑湯下茱萸丸赤白痢各用十五丸米湯下此乃浙西河山純老方救人甚效局方戊己丸治脾胃受濕下痢腹痛米穀不化用二味加白芍藥同炒研蒸餅和丸服積熱下血聚金丸治腸胃積熱或因酒毒下血腹痛作渴脈弦數黃連四兩分作四分一分生用一分切炒一分炮切一分水浸曬研末條黃芩一兩防風一兩為末麵糊丸如梧子大每服五十丸米泔浸枳殼水食前送下冬月加酒蒸大黃一兩楊氏家藏方臟毒下血黃連為末獨頭蒜煨研和丸梧子大每空心陳米飲下四十丸濟生方酒痔下血黃連酒浸煮熟為末酒糊丸梧子大每服三四十丸白湯下一方用自然薑汁浸焙炒醫學集成雞冠痔疾黃連末敷之加赤小豆末尤良斗門方痔病祕結用此寬腸黃連枳殼等分為末糊丸梧子大每服五十丸空心米飲下醫方大成痢痔脫肛冷水調黃連末塗之良經驗良方脾積食泄川黃連二兩為末大蒜搗和丸梧子大每服五十丸白湯下活人心統水泄脾泄神聖香黃散宣連一兩生薑四兩同以文火炒至姜脆各自揀出為末水泄用薑末脾泄用連末每服二錢空心白湯下甚者不過二服亦治痢疾博濟方吐血不止黃連一兩搗散每服一錢水七分入豉二十粒煎至五分去滓溫服大人小兒皆治簡要濟衆方眼目諸病勝金黃連丸用宣連不限多少捶碎以新汲水一大碗浸六十日綿濾取汁入原碗內重湯上熬之不住攪之候乾即穿地坑子可深一尺以瓦鋪底將熟艾四兩坐在瓦上以火燃之以藥碗覆上四畔泥封開孔出煙盡取刮下丸小豆大每甜竹葉湯下十丸劉禹錫傳信方羊肝丸治男女肝經不足風熱上攻頭目昏暗羞明及障翳青盲用黃連末一兩羊子肝一具去膜擂爛和丸梧子大每食後暖漿水吞十四丸連作五劑瘥昔崔承元活一死囚囚後病死一旦崔病內障逾年半夜獨坐聞階除悉窣之聲問之答曰是昔蒙活之囚今故報恩遂告以此方而沒崔服之不數月眼復明因傳於世暴赤眼痛宣黃連銼以雞子清浸置地下一夜次早濾過雞羽蘸滴目內又方苦竹兩頭留節一頭開小孔入黃連片在內油紙封浸井中一夜次早服竹節內水加片腦少許外洗之海上方用黃連冬青葉煎湯洗之選奇方用黃連乾薑杏仁等分為末綿包浸湯閉目乘熱淋洗之小兒赤眼水調黃連末貼足心甚妙全幼心鑑爛弦風眼黃連十文槐花輕粉少許為末男兒乳汁和之飯上蒸過帛裹尉眼上三四次即效屢試有驗仁存方目猝癢痛乳汁浸黃連頻點眥中抱朴子云治目中百病外臺祕要淚出不止黃連浸濃汁漬拭之肘後方牙痛惡熱黃連末摻之立止李樓奇方口舌生瘡肘後用黃連煎酒時含呷之赴筵散用黃連乾薑等分為末摻之小兒口疳黃連蘆薈等分為末每蜜湯服五分走馬疳入蟾灰等分青黛減半麝香少許簡便方小兒鼻䘌鼻下兩道赤色有疳以米泔洗淨用黃連末敷之日三四次張傑子母祕録小兒月蝕生於耳後黃連末敷之同上小兒食土取好黃土煎黃連汁搜之曬乾與食姚和衆童子祕訣預解胎毒小兒初生以黃連煎湯浴之不生瘡及丹毒又方未出聲時以黃連煎汁灌一匙令終身不出斑已出聲者灌之斑雖發亦輕此祖方也王海藏湯液本草腹中兒哭黃連煎濃汁母常呷之熊氏補遺因驚胎動出血取黃連末酒服方寸匕日三服子母祕録妊娠子煩口乾不得臥黃連末每服一錢粥飲下或酒蒸黃連丸亦妙婦人良方癰疽腫毒已潰未潰皆可用黃連檳榔等分為末以雞子清調搽之王氏簡易方中巴豆毒下利不止黃連乾薑等分為末水服方寸匕肘後方胡黃連宋開寶釋名割孤露澤時珍曰其性味功用似黃連故名割孤露澤胡語也集解恭曰胡黃連出波斯國生海畔陸地苗若夏枯草根頭似鳥嘴折之內似鸜鵒眼者良八月上旬採之頌曰今南海及秦隴間亦有之初生似蘆干則似楊柳枯枝心黑外黃不拘時月收採承曰折之塵出如煙者乃為真也根氣味苦平無毒恭曰大寒惡菊花玄參白蘚皮解巴豆毒忌豬肉令人漏精主治補肝膽明目治骨蒸勞熱三消五心煩熱婦人胎蒸虛驚冷熱泄痢五痔厚腸胃益顏色浸人乳汁點目甚良蘇恭治久痢成疳小兒驚癇寒熱不下食霍亂下痢傷寒咳嗽溫瘧理腰腎去陰汗開寶去果子積震亨附方舊二新一十二傷寒勞復身熱大小便赤如血色用胡黃連一兩山梔子二兩去殼入蜜半兩拌和炒令微焦為末用豬膽汁和丸梧子大每服十丸用生薑二片烏梅一個童子小便三合浸半日去滓食後暖小便令溫吞之臥時再服甚效蘇頌圖經本草小兒潮熱往來盜汗用南番胡黃連柴胡等分為末煉蜜丸芡子大每服一丸至五丸安器中以酒少許化開更入水五分重湯煮二三十沸和滓服孫兆祕寶方小兒疳熱肚脹潮熱發焦不可用大黃黃芩傷胃之藥恐生別證以胡黃連五錢靈脂一兩為末雄豬膽汁和丸緑豆大米飲服每服一二十丸全幼心鑑肥熱疳疾胡黃連丸用胡黃連黃連各半兩硃砂二錢半為末入豬膽內扎定以杖子鉤懸於砂鍋內漿水煮一炊久取出研爛入蘆薈麝香各一分飯和丸麻子大每服五七丸至一二十丸米飲下錢乙小兒方訣五心煩熱胡黃連末米飲服一錢易簡方小兒疳瀉冷熱不調胡黃連半兩綿姜一兩炮為末每服半錢甘草節湯下衛生總微論小兒自汗盜汗潮熱往來胡黃連柴胡等分為末蜜丸芡子大每用一二丸水化開入酒少許重湯煮一二十沸溫服保幼大全小兒黃疸胡黃連川黃連各一兩為末用黃瓜一個去瓤留蓋入藥在內合定麵裹煨熟去面搗丸緑豆大每量大小溫水下總微論吐血衄血胡黃連生地黃等分為末豬膽汁丸梧子大臥時茅花湯下五十丸普濟方血痢不止胡黃連烏梅肉灶下土等分為末臘茶清下普濟方熱痢腹痛胡黃連末飯丸梧子大每米湯下三十丸鮮于樞鉤玄嬰兒赤目茶調胡黃連末塗手足心即愈濟急仙方癰疽瘡腫已潰未潰皆可用之胡黃連穿山甲燒存性等分為末以茶或雞子清調塗簡易方痔瘡疼腫不可忍者胡黃連末鵝膽汁調搽之孫氏集效方血餘怪病方見木部茯苓下黃芩本經中品釋名腐腸本經空腸別録內虛別録妒婦吳普經芩別録黃文別録印頭吳普苦督郵記事內實者名子芩弘景條芩綱目㹠尾芩唐本鼠尾芩弘景曰圓者名子芩破者名宿芩其腹中皆爛故名腐腸時珍曰芩說文作菳謂其色黃也或云芩者黔也黔乃黃黑之色也宿芩乃舊根多中空外黃內黑即今所謂片芩故又有腐腸妒婦諸名妒婦心黯故以比之子芩乃新根多內實即今所謂條芩或云西芩多中空而色黔北芩多內實而深黃集解別録曰黃芩生秭歸川穀及冤句三月三日採根陰乾弘景曰秭歸屬建平郡今第一齣彭城郁州亦有之惟深色堅實者好俗方多用道家不須恭曰今出宜州鄜州涇州者佳兗州大實亦好名㹠尾芩頌曰今川蜀河東陝西近郡皆有之苗長尺余莖幹粗如箸葉從地四面作叢生類紫草高一尺許亦有獨莖者葉細長青色兩兩相對六月開紫花根如知母粗細長四五寸二月八月採根曝乾吳普本草云二月生赤黃葉兩兩四四相值其莖空中或方圓高三四尺四月花紫紅赤五月實黑根黃二月至九月採與今所說有小異也根氣味苦平無毒別録曰大寒普曰神農桐君雷公苦無毒李當之小溫杲曰可升可降陰也好古曰氣寒味微苦而甘陰中微陽入手太陰血分元素曰氣涼味苦甘氣厚味薄浮而升陽中陰也入手少陽陽明經酒炒則上行之才曰山茱萸龍骨為之使惡蔥實畏丹砂牡丹藜蘆得厚朴黃連止腹痛得五味子牡蒙牡蠣令人有子得黃耆白蘞赤小豆療鼠瘻時珍曰得酒上行得豬膽汁除肝膽火得柴胡退寒熱得芍藥治下痢得桑白皮瀉肺火得白朮安胎主治諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火瘍本經療痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛別録治熱毒骨蒸寒熱往來腸胃不利破擁氣治五淋令人宣暢去關節煩悶解熱渴甄權下氣主天行熱疾疔瘡排膿治乳癰發背大明涼心治肺中濕熱瀉肺火上逆療上熱目中腫赤瘀血壅盛上部積血補膀胱寒水安胎養陰退陽元素治風熱濕熱頭疼奔豚熱痛火咳肺痿喉腥諸失血時珍發明杲曰黃芩之中枯而飄者瀉肺火利氣消痰除風熱清肌表之熱細實而堅者瀉大腸火養陰退陽補膀胱寒水滋其化源高下之分與枳實枳殼同例元素曰黃芩之用有九瀉肺熱一也上焦皮膚風熱風濕二也去諸熱三也利胸中氣四也消痰膈五也除脾經諸濕六也夏月須用七也婦人産後養陰退陽八也安胎九也酒炒上行主上部積血非此不能除下痢膿血腹痛後重身熱久不能止者與芍藥甘草同用之凡諸瘡痛不可忍者宜芩連苦寒之藥詳上下分身梢及引經藥用之震亨曰黃芩降痰假其降火也凡去上焦濕熱須以酒洗過用片芩瀉肺火須用桑白皮佐之若肺虛者多用則傷肺必先以天門冬保定肺氣而後用之黃芩白朮乃安胎聖藥俗以黃芩為寒而不敢用蓋不知胎孕宜清熱涼血血不妄行乃能養胎黃芩乃上中二焦藥能降火下行白朮能補脾也羅天益曰肺主氣熱傷氣故身體麻木又五臭入肺為腥故黃芩之苦寒能瀉火補氣而利肺治喉中腥臭頌曰張仲景治傷寒心下痞滿瀉心湯凡四方皆用黃芩以其主諸熱利小腸故也又太陽病下之利不止喘而汗出者有葛根黃芩黃連湯及主妊娠安胎散亦多用之時珍曰潔古張氏言黃芩瀉肺火治脾濕東垣李氏言片芩治肺火條芩治大腸火丹溪朱氏言黃芩治上中二焦火而張仲景治少陽證小柴胡湯太陽少陽合病下利黃芩湯少陽證下後心下滿而不痛瀉心湯並用之成無己言黃芩苦而入心泄痞熱是黃芩能入手少陰陽明手足太陰少陽六經矣蓋黃芩氣寒味苦色黃帶緑苦入心寒勝熱瀉心火治脾之濕熱一則金不受刑一則胃火不流入肺即所以救肺也肺虛不宜者苦寒傷脾胃損其母也少陽之證寒熱胸脅痞滿默默不欲飲食心煩嘔或渴或痞或小便不利雖曰病在半表半裡而胸脅痞滿實兼心肺上焦之邪心煩喜嘔默默不欲飲食又兼脾胃中焦之證故用黃芩以治手足少陽相火黃芩亦少陽本經藥也成無己注傷寒論但云柴胡黃芩之苦以發傳邪之熱芍藥黃芩之苦以堅斂腸胃之氣殊昧其治火之妙楊士瀛直指方云柴胡退熱不及黃芩蓋亦不知柴胡之退熱乃苦以發之散火之標也黃芩之退熱乃寒能勝熱折火之本也仲景又云少陽證腹中痛者去黃芩加芍藥心下悸小便不利者去黃芩加茯苓似與別録治少腹絞痛利小腸之文不合成氏言黃芩寒中苦能堅腎故去之蓋亦不然至此當以意逆之辨以脈證可也若因飲寒受寒腹中痛及飲水心下悸小便不利而脈不數者是里無熱證則黃芩不可用也若熱厥腹痛肺熱而小便不利者黃芩其可不用乎故善觀書者先求之理毋徒泥其文昔有人素多酒欲病少腹絞痛不可忍小便如淋諸藥不效偶用黃芩木通甘草三味煎服遂止王海藏言有人因虛服附子藥多病小便祕服芩連藥而愈此皆熱厥之痛也學者其可拘乎豫年二十時因感冒咳嗽既久且犯戒遂病骨蒸發熱膚如火燎每日吐痰碗許暑月煩渴寢食幾廢六脈浮洪遍服柴胡麥門冬荊瀝諸藥月餘益劇皆以為必死矣先君偶思李東垣治肺熱如火燎煩躁引飲而晝盛者氣分熱也宜一味黃芩湯以瀉肺經氣分之火遂按方用片芩一兩水二鍾煎一鍾頓服次日身熱盡退而痰嗽皆愈藥中肯綮如鼓應桴醫中之妙有如此哉附方舊三新一十四三黃丸孫思邈千金方云巴郡太守奏加減三黃丸療男子五癆七傷消渴不生肌肉婦人帶下手足寒熱瀉五臟火春三月黃芩四兩大黃三兩黃連四兩夏三月黃芩六兩大黃一兩黃連七兩秋三月黃芩六兩大黃二兩黃連三兩冬三月黃芩三兩大黃五兩黃連二兩三物隨時合搗下篩蜜丸烏豆大米飲每服五丸日三不知增至七丸服一月病愈久服走及奔馬人用有驗禁食豬肉圖經本草三補丸治上焦積熱瀉五臟火黃芩黃連黃柏等分為末蒸餅丸梧子大每白湯下二三十丸丹溪纂要肺中有火清金丸用片芩炒為末水丸梧子大每服二三十丸白湯下同上膚熱如燎方見發明下小兒驚啼黃芩人參等分為末每服一字水飲下普濟方肝熱生翳不拘大人小兒黃芩一兩淡豉三兩為末每服三錢以熟豬肝裹吃溫湯送下日二服忌酒面衛生家寶方少陽頭痛亦治太陽頭痛不拘偏正小清空膏用片黃芩酒浸透曬乾為末每服一錢茶酒任下東垣蘭室祕藏眉眶作痛風熱有痰黃芩酒浸白芷等分為末每服二錢茶下潔古家珍吐血衄血或發或止積熱所致黃芩一兩去中心黑朽者為末每服三錢水一盞煎六分和滓溫服聖惠方吐衄下血黃芩三兩水三升煎一升半每溫服一盞亦治婦人漏下血龐安時總病論血淋熱痛黃芩一兩水煎熱服千金方經水不斷芩心丸治婦人四十九歲以後天癸當住每月卻行或過多不止用條芩心二兩米醋浸七日炙乾又浸如此七次為末醋糊丸梧子大每服七十丸空心溫酒下日二次瑞竹堂方崩中下血黃芩為細末每服一錢霹靂酒下以稱錘燒赤淬酒中也許學士云崩中多用止血及補血藥此方乃治陽乘於陰所謂天暑地熱經水沸溢者也本事方安胎清熱條芩白朮等分炒為末米飲和丸梧子大每服五十丸白湯下或加神麯凡妊娠調理以四物去地黃加白朮黃芩為末常服甚良丹溪纂要産後血渴飲水不止黃芩麥門冬等分水煎溫服無時楊氏家藏方灸瘡血出一人灸火至五壯血出不止如尿手冷欲絶以酒炒黃芩二錢為末酒服即止李樓怪證奇方老小火丹黃芩末水調塗之梅師方子主治腸澼膿血別録秦艽音交本經中品釋名秦糾唐本秦爪蕭炳恭曰秦艽俗作秦膠本名秦糾與糾同時珍曰秦艽出秦中以根作羅紋交糾者佳故名秦艽秦糾集解別録曰秦艽生飛鳥山谷二月八月採根曝乾弘景曰今出甘松龍洞蠶陵以根作羅紋相交長大黃白色者為佳中多銜土用宜破去恭曰今出涇州鄜州岐州者良頌曰今河陝州郡多有之其根土黃色而相交糾長一尺以來粗細不等枝幹高五六寸葉婆娑連莖梗俱青色如萵苣葉六月中開花紫色似葛花當月結子每於春秋採根陰乾根修治斆曰秦艽須於腳紋處認取左紋列為秦治疾右紋列為艽即髮腳氣凡用秦以布拭去黃白毛乃用還元湯浸一宿曬乾用時珍曰秦艽但以左紋者為良分秦與艽為二名謬矣氣味苦平無毒別録曰辛微溫大明曰苦冷元素曰氣微溫味苦辛陰中微陽可升可降入手陽明經之才曰菖蒲為之使畏牛乳主治寒熱邪氣寒濕風痹肢節痛下水利小便本經療風無問久新通身攣急別録傳尸骨蒸治疳及時氣大明牛乳點服利大小便療酒黃黃疸解酒毒去頭風甄權除陽明風濕及手足不遂口噤牙痛口瘡腸風瀉血養血榮筋元素泄熱益膽氣好古治胃熱虛勞發熱時珍發明時珍曰秦艽手足陽明經藥也兼入肝膽故手足不遂黃疸煩渴之病須之取其去陽明之濕熱也陽明有濕則身體痠疼煩熱有熱則日晡潮熱骨蒸所以聖惠方治急勞煩熱身體痠疼用秦艽柴胡各一兩甘草五錢為末每服三錢白湯調下治小兒骨蒸潮熱減食瘦弱用秦艽炙甘草各一兩每用一二錢水煎服之錢乙加薄荷葉五錢附方舊六新七五種黃疸崔元亮海上方云凡黃有數種傷酒發黃誤食鼠糞亦作黃因勞發黃多痰涕目有赤脈益憔悴或面赤噁心者是也用秦艽一大兩銼作兩帖每帖用酒半升浸絞取汁空腹服或利便止就中飲酒人易治屢用得力貞元廣利方治黃病內外皆黃小便赤心煩口乾者以秦艽三兩牛乳一大升煮取七合分溫再服此方出於許仁則又孫真人方加芒硝六錢暴瀉引飲秦艽二兩甘草炙半兩每服三錢水煎服聖惠方傷寒煩渴心神躁熱用秦艽一兩牛乳一大盞煎六分分作二服太平聖惠方急勞煩熱方見發明下小兒骨蒸同上小便艱難或轉胞腹滿悶不急療殺人用秦艽一兩水一盞煎七分分作二服又方加冬葵子等分為末酒服一匕聖惠方胎動不安秦艽甘草炙鹿角膠炒各半兩為末每服三錢水一大盞糯米五十粒煎服又方秦艽阿膠炒艾葉等分如上煎服聖惠方發背初起疑似者便以秦艽牛乳煎服得快利三五行即愈崔元亮海上集驗方瘡口不合一切皆治秦艽為末摻之直指方茈胡本經上品釋名地熏本經藝蒿別録山菜吳普茹草吳普恭曰茈是古柴字上林賦云茈姜及爾雅云茈草並作此茈字此草根紫色今太常用茈胡是也又以木代系相承呼為柴胡且檢諸本草無名此者時珍曰茈字有柴紫二音茈薑茈草之茈皆音紫茈胡之茈音柴茈胡生山中嫩則可茹老則採而為柴故苗有藝蒿山菜茹草之名而根名柴胡也蘇恭之說殊缺明古本張仲景傷寒論尚作茈字也集解別録曰茈胡葉名藝蒿辛香可食生弘農川穀及冤句二月八月採根曝乾弘景曰今出近道狀如前胡而強博物志云藝蒿葉似邪蒿春秋有白蒻長四五寸香美可食長安及河內並有之恭曰傷寒大小柴胡湯為痰氣之要若以藝蒿根為之大謬矣頌曰今關陝江湖間近道皆有之以銀州者為勝二月生苗甚香莖青紫堅硬微有細線葉似竹葉而稍緊小亦有似斜蒿者亦有似麥門冬葉而短者七月開黃花根淡赤色似前胡而強生丹州者結青子與他處者不類其根似蘆頭有赤毛如鼠尾獨窠長者好斆曰茈胡出在平州平縣即今銀州銀縣也西畔生處多有白鶴緑鶴於此飛翔是茈胡香直上云間若有過往聞者皆氣爽也承曰柴胡以銀夏者最良根如鼠尾長一二尺香味甚佳今圖經所載俗不識其真市人以同華者代之然亦勝於他處者蓋銀夏地方多沙同華亦沙苑所出也機曰解散用北柴胡虛熱用海陽軟柴胡為良時珍曰銀州即今延安府神木縣五原城是其廢跡所産柴胡長尺余而微白且軟不易得也北地所産者亦如前胡而軟今人謂之北柴胡是也入藥亦良南土所産者不似前胡正如蒿根強硬不堪使用其苗有如韭葉者竹葉者以竹葉者為勝其如邪蒿者最下也按夏小正月令云仲春藝始生倉頡解詁云藝蒿也似邪蒿可食亦柴胡之類入藥不甚良故蘇恭以為非柴胡云近時有一種根似桔梗沙參白色而大市人以僞充銀柴胡殊無氣味不可不辨根修治斆曰凡採得銀州柴胡去須及頭用銀刀削去赤薄皮少許以粗布拭淨銼用勿令犯火立便無效也氣味苦平無毒別録曰微寒普曰神農岐伯雷公苦無毒大明曰甘元素曰氣味俱輕陽也升也少陽經藥引胃氣上升苦寒以發散表熱杲曰升也陰中之陽手足少陽厥陰四經引經藥也在臟主血在經主氣欲上升則用根以酒浸欲中及下降則用梢之才曰半夏為之使惡皂莢畏女菀藜蘆時珍曰行手足少陽以黃芩為佐行手足厥陰以黃連為佐主治心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新久服輕身明目益精本經除傷寒心下煩熱諸痰熱結實胸中邪逆五臟間遊氣大腸停積水脹及濕痹拘攣亦可作浴湯別録治熱勞骨節煩疼熱氣肩背疼痛勞乏羸瘦下氣消食宣暢氣血主時疾內外熱不解單煮服之良甄權補五勞七傷除煩止驚益氣力消痰止嗽潤心肺添精髓健忘大明除虛勞散肌熱去早晨潮熱寒熱往來膽疸婦人産前産後諸熱心下痞胸脅痛元素治陽氣下陷平肝膽三焦包絡相火及頭痛眩運目昏赤痛障翳耳聾鳴諸瘧及肥氣寒熱婦人熱入血室經水不調小兒痘疹餘熱五疳羸熱時珍發明之才曰茈胡得茯苓桔梗大黃石膏麻子仁甘草桂以水一斗煮取四升入硝石三方寸匕療傷寒寒熱頭痛心下煩滿頌曰張仲景治傷寒有大小柴胡及柴胡加龍骨柴胡加芒硝等湯故後人治寒熱此為最要之藥杲曰能引清氣而行陽道傷寒外諸有熱則加之無熱則不加也又能引胃氣上行升騰而行春令者宜加之又凡諸瘧以柴胡為君隨所發時所在經分佐以引經之藥十二經瘡疽中須用柴胡以散諸經血結氣聚功與連翹同也好古曰柴胡能去臟腑內外俱乏既能引清氣上行而順陽道又入足少陽在經主氣在臟主血證前行則惡熱卻退則惡寒惟氣之微寒味之薄者故能行經若佐以三稜廣朮巴豆之類則能消堅積是主血也婦人經水適來適斷傷寒雜病易老俱用小柴胡湯加以四物之類並秦艽牡丹皮輩為調經之劑又言婦人産後血熱必用之藥也宗奭曰柴胡本經並無一字治勞今人治勞方中鮮有不用者嗚呼凡此誤世甚多嘗原病勞有一種其臟虛損復受邪熱因虛而致勞故曰勞者牢也當須斟酌用之如經驗方中治勞熱青蒿煎之用柴胡正合宜爾服之無不效熱去即須急止若或無熱得此愈甚雖至死人亦不怨目擊甚多日華子又謂補五勞七傷藥性論亦謂治勞乏羸瘦若此等病苟無實熱醫者執而用之不死何待注釋本草一字亦不可忽蓋萬世之後所誤無窮可不謹哉如張仲景治寒熱往來如瘧狀用柴胡湯正合其宜也時珍曰勞有五勞病在五臟若勞在肝膽心及包絡有熱或少陽經寒熱者則柴胡乃手足厥陰少陽必用之藥勞在脾胃有熱或陽氣下陷則柴胡乃引清氣退熱必用之藥惟勞在肺腎者不用可爾然東垣李氏言諸有熱者宜加之無熱則不加又言諸經之瘧皆以柴胡為君十二經瘡疽須用柴胡以散結聚則是肺瘧腎瘧十二經之瘡有熱者皆可用之矣但要用者精思病原加減佐使可也寇氏不分臟腑經絡有熱無熱乃謂柴胡不治勞乏一概擯斥殊非通論如和劑局方治上下諸血龍腦雞蘇丸用銀柴胡浸汁熬膏之法則世人知此意者鮮矣按龐元英談藪云張知閣久病瘧熱時如火年餘骨立醫用茸附諸藥熱益甚召醫官孫琳診之琳投小柴胡湯一帖熱減十之九三服脫然琳曰此名勞瘧熱從髓出加以剛劑氣血愈虧安得不瘦蓋熱有在皮膚在臟腑在骨髓非柴胡不可若得銀柴胡只須一服南方者力減故三服乃效也觀此則得用藥之妙的矣寇氏之說可盡憑乎附方舊一新五傷寒餘熱傷寒之後邪入經絡體瘦肌熱推陳致新解利傷寒時氣伏暑倉卒並治不論長幼柴胡四兩甘草一兩每用三錢水一盞煎服許學士本事方小兒骨熱十五歲以下遍身如火日漸黃瘦盜汗咳嗽煩渴柴胡四兩丹砂三兩為末豶豬膽汁拌和飯上蒸熟丸緑豆大每服一丸桃仁烏梅湯下日三服聖濟總録虛勞發熱柴胡人參等分每服三錢薑棗同水煎服淡寮方濕熱黃疸柴胡一兩甘草二錢半作一劑以水一碗白茅根一握煎至七分任意時時服一日盡孫尚藥祕寶方眼目昏暗柴胡六銖決明子十八銖治篩人乳汁和敷目上久久夜見五色千金方積熱下痢柴胡黃芩等分半酒半水煎七分浸冷空心服之濟急方苗主治猝聾搗汁頻滴之千金前胡別録中品釋名時珍曰按孫愐唐韻作湔胡名義未解集解別録曰前胡二月八月採根曝乾弘景曰近道皆有生下濕地出吳興者為勝根似柴胡而柔軟為療殆欲同而本經上品有茈胡而無此晚來醫乃用之大明曰越衢婺睦等處者皆好七八月採之外黑裡白頌曰今陝西梁漢江淮荊襄州郡及相州孟州皆有之春生苗青白色似斜蒿初出時有白芽長三四寸味甚香美又似藝蒿七月內開白花與蔥花相類八月結實根青紫色今鄜延將來者大與柴胡相似但柴胡赤色而脆前胡黃而柔軟為不同爾一說今諸方所用前胡皆不同汴京北地者色黃白枯脆絶無氣味江東乃有三四種一種類當歸皮斑黑肌黃而脂潤氣味濃烈一種色理黃白似人參而細短香味都微一種如草烏頭膚赤而堅有兩三歧為一本食之亦戟人咽喉中破以薑汁漬搗服之甚下膈解痰實然皆非真前胡也今最上者出吳中又壽春生者皆類柴胡而大氣芳烈味亦濃苦療痰下氣最勝諸道者斆曰凡使勿用野蒿根緣真似前胡只是味粗酸若誤用之令人反胃不受食若是前胡味甘微苦也時珍曰前胡有數種惟以苗高一二尺色似斜蒿葉如野菊而細瘦嫩時可食秋月開黲白花類蛇床子花其根皮黑肉白有香氣為真大抵北地者為勝故方書稱北前胡云根修治斆曰修事先用刀刮去蒼黑皮並髭土了細銼以甜竹瀝浸令潤日中曬乾用氣味苦微寒無毒權曰甘辛平之才曰半夏為之使惡皂莢畏藜蘆主治痰滿胸脅中痞心腹結氣風頭痛去痰實下氣治傷寒寒熱推陳致新明目益精別録能去熱實及時氣內外俱熱單煮服之甄權治一切氣破癥結開胃下食通五臟主霍亂轉筋骨節煩悶反胃嘔逆氣喘咳嗽安胎小兒一切疳氣大明清肺熱化痰熱散風邪時珍發明時珍曰前胡味甘辛氣微平陽中之陰降也乃手足太陰陽明之藥與柴胡純陽上升入少陽厥陰者不同也其功長於下氣故能治痰熱喘嗽痞膈嘔逆諸疾氣下則火降痰亦降矣所以有推陳致新之績為痰氣要藥陶弘景言其與柴胡同功非矣治證雖同而所入所主則異附方舊一小兒夜啼前胡搗篩蜜丸小豆大日服一丸熟水下至五六丸以瘥為度普濟方防風本經上品釋名銅藝本經茴藝吳普茴草別録屏風別録蕳根別録百枝別録百蜚吳普時珍曰防者御也其功療風最要故名屏風者防風隱語也曰藝曰茴曰蕳者其花如茴香其氣如藝蒿蕳蘭也集解別録曰防風生沙苑川澤及邯鄲琅琊上蔡二月十月採根曝乾普曰正月生葉細圓青黑黃白五月黃花六月結實黑色弘景曰郡縣無名沙苑今第一齣彭城蘭陵即近琅琊者郁州百市亦有之次出襄陽義陽縣界亦可用惟以實而脂潤頭節堅如蚯蚓頭者為好恭曰今出齊州龍山最善淄州兗州青州者亦佳葉似牡蒿附子苗等沙苑在同州南亦出防風輕虛不如東道者陶云無沙苑誤矣頌曰今汴東淮浙州郡皆有之莖葉俱青緑色莖深而葉淡似青蒿而短小春初時嫩紫紅色江東宋毫人採作菜茹極爽口五月開細白花中心攢聚作大房似蒔蘿花實似胡荽子而大根土黃色與蜀葵根相類二月十月採之關中生者三月六月採之然輕虛不及齊州者良又有石防風出河中府根如蒿根而黃葉青花白五月開花六月採根曝乾亦療頭風眩痛時珍曰江淮所産多是石防風生於山石之間二月採嫩苗作菜辛甘而香呼為珊瑚菜其根粗醜其子亦可種吳綬云凡使以黃色而潤者為佳白者多沙條不堪氣味甘溫無毒別録曰辛無毒叉頭者令人發狂叉尾者發人痼疾普曰神農黃帝岐伯桐君雷公扁鵲甘無毒李當之小寒元素曰味辛而甘氣溫氣味俱薄浮而升陽也手足太陽經之本藥好古曰又行足陽陰太陰二經為肝經氣分藥杲曰防風能制黃耆黃耆得防風其功愈大乃相畏而相使者也之才曰得蔥白能行周身得澤瀉蒿本療風得當歸芍藥陽起石禹餘糧療婦人子臟風畏萆薢殺附子毒惡藜蘆白蘞乾薑芫花主治大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹煩滿久服輕身本經脅痛脅風頭面去來四肢攣急字乳金瘡內痙別録治三十六般風男子一切勞劣補中益神風赤眼止冷淚及癱瘓通利五臟關脈五勞七傷羸損盜汗心煩體重能安神定志勻氣脈大明治上焦風邪瀉肺實散頭目中滯氣經絡中留濕主上部見血元素搜肝氣好古葉主治中風熱汗出別録頌曰江東一種防風茹其嫩苗云動風與此文相反豈別是一物耶花主治四肢拘急行履不得經脈虛羸骨節間痛心腹痛甄權子主治療風更優調食之蘇恭發明元素曰防風治風通用身半以上風邪用身身半以下風邪用梢治風去濕之仙藥也風能勝濕故爾能瀉肺實誤服瀉人上焦元氣杲曰防風治一身盡痛乃猝伍卑賤之職隨所引而至乃風藥中潤劑也若補脾胃非此引用不能行凡脊痛項強不可回顧腰似折項似拔者乃手足太陽證正當用防風凡瘡在胸膈以上雖無手足太陽證亦當用之為能散結去上部風病人身體拘倦者風也諸瘡見此證亦須用之錢仲陽瀉黃散中倍用防風者乃於土中瀉木也附方舊二新十一自汗不止防風去蘆為末每服二錢浮麥煎湯服朱氏集驗方防風用麩炒豬皮煎湯下睡中盜汗防風二兩芎藭一兩人參半兩為末每服三錢臨臥飲下易簡方消風順氣老人大腸祕澀防風枳殼麩炒一兩甘草半兩為末每食前白湯服二錢簡便方偏正頭風防風白芷等分為末煉蜜丸彈子大每嚼一丸茶清下普濟方破傷中風牙關緊急天南星防風等分為末每服二三匙童子小便五升煎至四升分二服即止也經驗後方小兒解顱防風白芨柏子仁等分為末以乳汁調塗一日一換養生主論婦人崩中獨聖散用防風去蘆頭炙赤為末每服一錢以麵糊酒調下更以麵糊酒投之此藥纍經效驗一方加炒黑蒲黃等分經驗後方解烏頭毒附子天雄毒並用防風煎汁飲之千金方解芫花毒同上解野菌毒同上解諸藥毒已死只要心間溫暖者乃是熱物犯之只用防風一味擂冷水灌之萬氏積善堂獨活本經上品釋名羌活本經羌青本經獨搖草別録護羌使者本經胡王使者吳普長生草弘景曰一莖直上不為風搖故曰獨活別録曰此草得風不搖無風自動故名獨搖草大明曰獨活是羌活母也時珍曰獨活以羌中來者為良故有羌活胡王使者諸名乃一物二種也正如川芎撫芎白朮蒼朮之義入用微有不同後人以為二物者非矣集解別録曰獨活生雍州川穀或隴西南安二月八月採根曝乾弘景曰此州郡縣並是羌地羌活形細而多節軟潤氣息極猛烈出益州北都西川者為獨活色微白形虛大為用亦相似而小不如至易蛀宜密器藏之頌曰獨活羌活今出蜀漢者佳春生苗葉如青麻六月開花作叢或黃或紫結實時葉黃者是夾石上所生葉青者是土脈中所生本經云二物同一類今人以紫色而節密者為羌活黃色而作塊者為獨活而陶隱居言獨活色微白形虛大用與羌活相似今蜀中乃有大獨活類桔梗而大氣味亦不與羌活相類用之微寒而少效今又有獨活亦自蜀中來類羌活微黃而極大收時寸解干之氣味亦芳烈小類羌活又有槐葉氣者今京下多用之極效驗意此為真者而市人或擇羌活之大者為獨活殊未為當大抵此物有兩種西蜀者黃色香如蜜隴西者紫色秦隴人呼為山前獨活古方但用獨活今方既用獨活而又用羌活茲為謬矣機曰本經獨活一名羌活本非二物後人見其形色氣味不同故為異論然物多不齊一種之中自有不同仲景治少陰所用獨活必緊實者東垣治太陽所用羌活必輕虛者正如黃芩取枯飄者名片芩治太陰條實者名子芩治陽明之義同也況古方但用獨活無羌活今方俱用不知病宜兩用耶抑未之考耶時珍曰獨活羌活乃一類二種以他地者為獨活西羌者為羌活蘇頌所說頗明按王貺全生指迷方云羌活須用紫色有蠶頭鞭節者獨活是極大羌活有臼如鬼眼者尋常皆以老宿前胡為獨活者非矣近時江淮山中出一種土當歸長近尺許白肉黑皮氣亦芬香如白芷氣人亦謂之水白芷用充獨活解散亦或用之不可不辨根修治斆曰採得細銼以淫羊藿拌蒸二日曝乾去藿用免煩人心時珍曰此乃服食家治法尋常去皮或焙用爾氣味苦甘平無毒別録曰微溫權曰苦辛元素曰獨活微溫甘苦辛氣味俱薄浮而升陽也足少陰行經氣分之藥羌活性溫辛苦氣味俱薄浮而升陽也手足太陽行經風藥併入足厥陰少陰經氣分之才曰豚實為之使弘景曰藥無豚實恐是蠡實也主治風寒所擊金瘡止痛奔豚癇痙女子疝瘕久服輕身耐老本經療諸賊風百節痛風無問久新別録獨活治諸中風濕冷奔喘逆氣皮膚苦癢手足攣痛勞損風毒齒痛羌活治賊風失音不語多癢手足不遂口面喎斜遍身𤸷痹血癩甄權羌獨活治一切風並氣筋骨攣拳骨節痠疼頭旋目赤疼痛五勞七傷利五臟及伏梁水氣大明治風寒濕痹痠痛不仁諸風掉眩頸項難伸李杲去腎間風邪搜肝風瀉肝氣治項強腰脊痛好古散癰疽敗血元素發明恭曰療風宜用獨活兼水宜用羌活劉完素曰獨活不搖風而治風浮萍不沉水而利水因其所勝而為制也張元素曰風能勝濕故羌活能治水濕獨活與細辛同用治少陰頭痛頭運目眩非此不能除羌活與川芎同用治太陽少陰頭痛透關利節治督脈為病脊強而厥好古曰羌活乃足太陽厥陰少陰藥與獨活不分二種後人因羌活氣雄獨活氣細故雄者治足太陽風濕相搏頭痛肢節痛一身盡痛者非此不能除乃卻亂反正之主君藥也細者治足少陰伏風頭痛兩足濕痹不能動止者非此不能治而不治太陽之證時珍曰羌活獨活皆能逐風勝濕透關利節但氣有剛劣不同爾素問云從下上者引而去之二味苦辛而溫味之薄者陰中之陽故能引氣上升通達周身而散風勝濕按文系曰唐劉師貞之兄病風夢神人曰但取胡王使者浸酒服便愈師貞訪問皆不曉復夢其母曰胡王使者即羌活也求而用之兄疾遂愈嘉謨曰羌活本手足太陽表裡引經之藥又入足少陰厥陰名列君部之中非比柔懦之主小無不入大無不通故能散肌表八風之邪利周身百節之痛附方舊八新七中風口噤通身冷不知人獨活四兩好酒一升煎半升服千金方中風不語獨活一兩酒二升煎一升大豆五合炒有聲以藥酒熱投蓋之良久溫服三合未瘥再服陳延之小品方熱風癱瘓常舉發者羌活二斤構子一升為末每酒服方寸匕日三服廣濟方産後中風語澀四肢拘急羌活三兩為末每服五錢酒水各一盞煎減半服小品方産後風虛獨活白蘚皮各三兩水三升煮二升分三服耐酒者入酒同煮小品方産後腹痛羌活二兩煎酒服必效方産腸脫出方同上子母祕録妊娠浮腫羌活蘿蔔子同炒香只取羌活為末每服二錢溫酒調下一日一服二日二服三日三服乃嘉興主簿張昌明所傳許學士本事方風水浮腫方同上歷節風痛獨活羌活松節等分用酒煮過每日空心飲一杯外臺祕要風牙腫痛肘後方用獨活煮酒熱漱之文潞公藥准用獨活地黃各三兩為末每服三錢水一盞煎和滓溫服臥時再服喉閉口噤羌活三兩牛蒡子二兩水煎一鍾入白礬少許灌之取效聖濟録睛垂至鼻人睛忽垂至鼻如黑角色痛不可忍或時時大便血出名曰肝脹用羌活煎汁服數盞自愈夏子益奇疾方太陽頭痛羌活防風紅豆等分為末搐鼻玉機微義土當歸綱目集解生密縣山野莖圓而有線楞葉似芹菜葉而硬邊有細鋸齒刺又似蒼朮葉而大每三葉攢生一處開黃花根似前胡又似野胡蘿蔔根根氣味辛溫無毒主治除風和血煎酒服之閃拗手足同荊芥蔥白煎湯淋洗之時珍出衛生易簡方都管草宋圖經集解頌曰都管草生宜州田野根似羌活頭歲長一節苗高一尺許葉似土當歸有重臺二月八月採根陰乾施州生者作蔓又名香球蔓長丈餘赤色秋結紅實四時皆有採其根枝淋洗風毒瘡腫時珍曰按範成大桂海志云廣西出之一莖六葉根氣味苦辛寒無毒主治風腫癰毒赤疣以醋摩塗之亦治咽喉腫痛切片含之立愈蘇頌解蜈蚣蛇毒時珍升麻別録上品釋名周麻時珍曰其葉似麻其性上升故名按張揖廣雅及吳普本草並云升麻一名周升麻則周或指周地如今人呼川升麻之義今別録作周麻非省文即脫誤也集解別録曰升麻生益州山谷二月八月採根曬乾弘景曰舊出寧州者第一形細而黑極堅實今惟出益州好者細削皮青緑色謂之雞骨升麻北部亦有而形虛大黃色建平亦有而形大味薄不堪用人言是落新婦根不然也其形相似氣色非也落新婦亦解毒取葉挼作小兒浴湯主驚忤藏器曰落新婦今人多呼為小升麻功用同於升麻亦大小有殊也志曰升麻今嵩高出者色青功用不如蜀者頌曰今蜀漢陝西淮南州郡皆有之以蜀川者為勝春生苗高三尺以來葉似麻葉並青色四月五月著花似粟穗白色六月以後結實黑色根如蒿根紫黑色多須根修治斆曰採得刮去粗皮用黃精自然汁浸一宿曝乾銼蒸再爆用時珍曰今人惟取里白外黑而緊實者謂之鬼臉升麻去須及頭蘆銼用氣味甘苦平微寒無毒元素曰性溫味辛微苦氣味俱薄浮而升陽也為足陽明太陰引經的藥得蔥白白芷亦入手陽明太陰杲曰引蔥白散手陽明風邪引石膏止陽明齒痛人參黃耆非此引之不能上行時珍曰升麻同柴胡引生髮之氣上行同葛根能發陽明之汗主治解百毒殺百精老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡久服不夭輕身長年別録安魂定魄鬼附啼泣疳䘌遊風腫毒大明小兒驚癇熱壅不通療癰腫豌豆瘡水煎綿沾拭瘡上甄權治陽明頭痛補脾胃去皮膚風邪解肌肉間風熱療肺痿咳唾膿血能發浮汗元素牙根浮爛惡臭太陽鼽衄為瘡家聖藥好古消斑疹行瘀血治陽陷眩運胸脅虛痛久泄下痢後重遺濁帶下崩中血淋下血陰痿足寒時珍發明元素曰補脾胃藥非此為引用不能取效脾痹非此不能除其用有四手足陽明引經一也升陽氣於至陰之下二也去至高之上及皮膚風邪三也治陽明頭痛四也杲曰升麻發散陽明風邪升胃中清氣又引甘溫之藥上升以補衛氣之散而實其表故元氣不足者用此於陰中升陽又緩帶脈之縮急有胃虛傷冷郁遏陽氣於脾土者宜升麻葛根以升散其火鬱好古曰升麻葛根湯乃陽明發散藥若初病太陽證便服之發動其汗必傳陽明反成其害也朱肱活人書言瘀血入里吐血衄血者犀角地黃湯乃陽明經聖藥如無犀角以升麻代之二物性味相遠何以代之蓋以升麻能引地黃及余藥同入陽明也時珍曰升麻引陽明清氣上行柴胡引少陽清氣上行此乃稟賦素弱元氣虛餒及勞役飢飽生冷內傷脾胃引經最要藥也升麻葛根湯乃發散陽明風寒藥也時珍用治陽氣鬱遏及元氣下陷諸病時行赤眼每有殊效神而明之方可執泥乎一人素飲酒因寒月哭母受冷遂病寒中食無薑蒜不能一啜至夏酷暑又多飲水兼懷怫鬱因病右腰一點脹痛牽引右脅上至胸口則必欲臥發則大便裡急後重頻欲登圊小便長而數或吞酸或吐水或作瀉或陽痿或厥逆或得酒少止或得熱稍止但受寒食寒或勞役或入房或怒或飢即時舉發一止則諸證泯然如無病人甚則日發數次服溫脾勝濕滋補消導諸藥皆微止隨發時珍思之此乃飢飽勞逸內傷元氣清陽陷遏不能上升所致也遂用升麻葛根湯合四君子湯加柴胡蒼朮黃耆煎服服後仍飲酒一二杯助之其藥入腹則覺清氣上行胸膈爽快手足和暖頭目精明神采迅發諸證如掃每發一服即止神驗無比若減升麻葛根或不飲酒則效便遲大抵人年五十以後其氣消者多長者少降者多升者少秋冬之令多而春夏之令少若稟受弱而有前諸證者並宜此藥活法治之素問云陰精所奉其人壽陽精所降其人夭千古之下窺其奧而闡其微者張潔古李東垣二人而已外此則著參同契悟真篇者旨與此同也又升麻能解痘毒惟初發熱時可用解毒痘已出後氣弱或泄瀉者亦可少用其升麻葛根湯則見斑後必不可用為其解散也本草以升麻為解毒吐蠱毒要藥蓋以其為陽明本經藥而性又上升故也按範石湖文集云李燾為雷州推官鞫獄得治蠱方毒在上用升麻吐之在腹用鬱金下之或合二物服之不吐則下此方活人甚多也附方舊五新八服食丹砂石泉公王方慶嶺南方云南方養生治病無過丹砂其方用升麻末三兩研煉過光明砂一兩以蜜丸梧子大每日食後服三丸蘇頌圖經本草豌豆斑瘡比歲有病天行發斑瘡頭面及身須臾周匝狀如火燒瘡皆戴白漿隨決隨生不治數日必死瘥後瘢黯彌歲方減此惡毒之氣所為云晉元帝時此病自西北流起名虜瘡以蜜煎升麻時時食之並以水煮升麻綿沾拭洗之葛洪肘後方闢瘴明目七物升麻丸升麻犀角黃芩朴硝梔子大黃各二兩豉二升微熬同搗末蜜丸梧子大覺四肢大熱大便難即服三十丸取微利為度若四肢小熱只食後服二十丸非但闢瘴甚能明目王方慶嶺南方猝腫毒起升麻磨醋頻塗之肘後喉痹作痛升麻片含咽或以半兩煎服取吐直指方胃熱齒痛升麻煎湯熱漱咽之解毒或加生地黃直指方口舌生瘡升麻一兩黃連三分為末綿裹含咽本事方熱痱瘙癢升麻煎湯飲並洗之千金方小兒尿血蜀升麻五分水五合煎一合服之一歲兒一日一服姚和衆至寶方産後惡血不盡或經月半年以升麻三兩清酒五升煮取二升分半再服當吐下惡物極良千金翼方解莨菪毒升麻煮汁多服之外臺祕要挑生蠱毒野葛毒並以升麻多煎頻飲之直指方射工溪毒升麻烏翣煎水服以滓塗之肘後方苦參本經中品釋名苦蘵本經苦骨綱目地槐別録水槐本經菟槐別録驕槐別録野槐綱目白莖別録又名芩莖祿白陵郎虎麻時珍曰苦以味名參以功名槐以葉形名也苦蘵與菜部苦蘵同名異物集解別録曰苦參生汝南山谷及田野三月八月十月採根曝乾弘景曰近道處處有之葉極似槐葉花黃色子作莢根味至苦惡頌曰其根黃色長五七寸許兩指粗細三五莖並生苗高三四尺以來葉碎青色極似槐葉春生冬凋其花黃白色七月結實如小豆子河北生者無花子五月六月八月十月採根曝乾時珍曰七八月結角如蘿蔔子角內有子二三粒如小豆而堅根修治斆曰採根用糯米濃泔汁浸一宿其腥穢氣並浮在水面上須重重淘過即蒸之從巳至申取曬切用氣味苦寒無毒之才曰玄參為之使惡貝母菟絲漏蘆反藜蘆時珍曰伏汞制雌黃焰硝主治心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚本經養肝膽氣安五臟平胃氣令人嗜食輕身定志益精利九竅除伏熱腸澼止渴醒酒小便黃赤療惡瘡下部蝕別録漬酒飲治疥殺蟲弘景治惡蟲脛酸蘇恭治熱毒風皮肌煩躁生瘡赤癩眉脫除大熱嗜睡治腹中冷痛中惡腹痛甄權殺疳蟲炒存性米飲服治腸風瀉血並熱痢大明發明元素曰苦參味苦氣沉純陰足少陰腎經君藥也治本經須用能逐濕頌曰古今方用治風熱瘡疹最多宗奭曰沈存中筆談載其苦腰重久坐不能行有一將佐曰此乃病齒數年用苦參揩齒其氣味入齒傷腎所致也後有太常少卿舒昭亮亦用苦參揩齒歲久亦病腰自後悉不用之腰疾皆愈此皆方書不載者震亨曰苦參能峻補陰氣或得之而致腰重者因其氣降而不升也非傷腎之謂也其治大風有功況風熱細疹乎時珍曰子午乃少陰君火對化故苦參黃柏之苦寒皆能補腎蓋取其苦燥濕寒除熱也熱生風濕生蟲故又能治風殺蟲惟腎水弱而相火勝者用之相宜若火衰精冷真元不足及年高之人不可用也素問云五味入胃各歸其所喜攻久而增氣物化之常也氣增而久夭之由也王冰注云入肝為溫入心為熱入肺為清入腎為寒入脾為至陰而兼四氣皆為增其味而益其氣各從本臟之氣故久服黃連苦參而反熱者此其類也氣增不已則臟氣有偏勝偏勝則臟有偏絶故有暴夭是以藥不具五味不備四氣而久服之雖且獲勝久必暴夭但人疏忽不能精候爾張從正亦云凡藥皆毒也雖甘草苦參不可不謂之毒久服則五味各歸其臟必有偏勝氣增之患諸藥皆然學者當觸類而長之可也至於飲食亦然又按史記云太倉公淳于意醫齊大夫病齲齒灸左手陽明脈以苦參湯日漱三升出入五六日其風愈此亦取其去風氣濕熱殺蟲之義附方舊十新一十八熱病狂邪不避水火欲殺人苦參末蜜丸梧子大每服十丸薄荷湯下亦可為末二錢水煎服千金方傷寒結胸天行病四五日結胸滿痛壯熱苦參一兩以醋三升煮取一升二合飲之取吐即愈天行毒病非苦參醋藥不解及溫覆取汗良外臺祕要谷疸食勞食畢頭旋心怫鬱不安而發黃由失飢大食胃氣衝熏所致苦參三兩龍膽一合為末牛膽丸梧子大生大麥苗汁服五丸日三服肘後方小兒身熱苦參煎湯浴之良外臺祕要毒熱足腫作痛欲脫者苦參煮酒漬之姚僧坦集驗方夢遺食減白色苦參三兩白朮五兩牡蠣粉四兩為末用雄豬肚一具冼淨砂罐煮爛石臼搗和藥干則入汁丸小豆大每服四十丸米湯下日三服久服身肥食進而夢遺立止劉松石保壽堂方小腹熱痛青黑或赤色不能喘者苦參一兩醋一升半煎八合分二服張傑子母祕録中惡心痛苦參三兩苦酒一升半煮取八合分二服肘後方飲食中毒魚肉菜等毒上方煎服取吐即愈梅師方血痢不止苦參炒焦為末水丸梧子大每服十五丸米飲下孫氏仁存堂方大腸脫肛苦參五倍子陳壁土等分煎湯洗之以木賊末敷之醫方摘要妊娠尿難方見貝母下産後露風四肢苦煩熱頭痛者與小柴胡頭不痛者用苦參二兩黃芩一兩生地黃四兩水八升煎二升分數服齒縫出血苦參一兩枯礬一錢為末日三揩之立驗普濟方齲齒風痛方見發明下鼻瘡膿臭有蟲也苦參枯礬一兩生地黃汁三合水二盞煎三合少少滴之普濟方肺熱生瘡遍身皆是用苦參末粟米飲丸梧子大每服五十丸空心米飲下御藥院方遍身風疹癢痛不可忍胸頸臍腹及近隱皆然者亦多涎痰夜不得睡用苦參末一兩皂角二兩水一升揉濾取汁銀石器熬成膏和末丸梧子大每服三十丸食後溫水服次日便愈寇宗奭衍義大風癩疾頌曰用苦參五兩切以好酒三斗漬三十日每飲一合日三服常服不絶若覺痹即瘥張子和儒門事親用苦參末二兩以豬肚盛之縫合煮熟取出去藥先餓一日次早先飲新水一盞將豬肚食之如吐再食待一二時以肉湯調無憂散五七錢服取出大小蟲一二萬為效後以不蛀皂角一斤去皮子煮汁入苦參末調糊下何首烏末二兩防風末一兩半當歸末一兩芍藥末五錢人參末三錢丸梧子大每服三五十丸溫酒或茶下日三服仍用麻黃苦參荊芥煎水洗之聖濟總録苦參丸治大風癩及熱毒風瘡疥癬苦參九月末掘取去皮曝乾取粉一斤枳殼麩炒六兩為末蜜丸每溫酒下三十丸日二夜一服一方去枳殼腎臟風毒及心肺積熱皮膚生疥癩瘙癢時出黃水及大風手足壞爛一切風疾苦參三十二兩荊芥穗一十六兩為末水糊丸梧子大每服三十丸茶下和劑局方上下諸瘻或在項或在下部用苦參五升苦酒一斗漬三四日服之以知為度肘後方鼠瘻惡瘡苦參二斤露蜂房二兩曲二斤水三斗漬二宿去滓入黍米二升釀熟稍飲日三次肘後方下部漏瘡苦參煎湯日日洗之直指方瘰癧結核苦參四兩搗末牛膝汁丸緑豆大每暖水下二十丸張文仲備急方湯火傷灼苦參末油調敷之衛生寶鑑赤白帶下苦參二兩牡蠣粉一兩五錢為末以雄豬肚一個水三碗煮爛搗泥和丸梧子大每服百丸溫酒下陸氏積德堂方實十月收採氣味同根主治久服輕身不老明目餌如槐子法有驗蘇恭白蘚音仙本經中品釋名白膻弘景白羊蘚弘景地羊蘚圖經金雀兒椒日華弘景曰俗呼為白羊蘚氣息正似羊膻故又名白膻時珍曰蘚者羊之氣也此草根白色作羊膻氣共子纍纍如椒故有諸名集解別録曰白蘚皮生上谷川谷及冤句四月五月採根陰乾弘景曰近道處處有以蜀中者為良恭曰其葉似茱萸苗高尺余根皮白而心實花紫白色根宜二月採若四月五月採便虛惡矣頌曰今河中江寧府滁州潤州皆有之苗高尺余莖青葉稍白如槐亦似茱萸四月開花淡紫色似小蜀葵花根似小蔓菁皮黃白而心實山人採嫩苗為菜茹根皮氣味苦寒無毒別録曰咸之才曰惡螵蛸桔梗茯苓萆薢主治頭風黃疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步本經療四肢不安時行腹中大熱飲水欲走大呼小兒驚癇婦人産後余痛別録治一切熱毒風惡風風瘡疥癬赤爛眉發脫脆皮肌急壯熱惡寒解熱黃酒黃急黃谷黃勞黃甄權通關節利九竅及血脈通小腸水氣天行時疾頭痛眼疼其花同功大明治肺嗽蘇頌發明時珍曰白蘚皮氣寒善行味苦性燥足太陰陽明經去濕熱藥也兼入手太陰陽明為諸黃風痹要藥世醫只施之瘡科淺矣附方舊一新一鼠瘻已破出膿血者白蘚皮煮汁服一升當吐若鼠子也肘後方産後中風人虛不可服他藥者一物白蘚皮湯用新汲水三升煮取一升溫服陳延之小品方延胡索宋開寶釋名玄胡索好古曰本名玄胡索避宋真宗諱改玄為延也集解藏器曰延胡索生於奚從安東道來根如半夏色黃時珍曰奚乃東北夷也今二茅山西上龍洞種之每年寒露後栽立春後生苗葉如竹葉樣三月長三寸高根叢生如芋卵樣立夏掘起根氣味辛溫無毒珣曰苦甘杲曰甘辛溫可升可降陰中陽也好古曰苦辛溫純陽浮也入手足太陰經主治破血婦人月經不調腹中結塊崩中淋露産後諸血病血運暴血衝上因損下血煮酒或酒磨服開寶除風治氣暖腰膝止暴腰痛破症癖撲損瘀血落胎大明治心氣小腹痛有神好古散氣治腎氣通經絡李珣活血利氣止痛通小便時珍發明珣曰主腎氣及破産後惡露或兒枕與三稜鱉甲大黃為散甚良蟲蛀成末者尤良時珍曰玄胡索味苦微辛氣溫入手足太陰厥陰四經能行血中氣滯氣中血滯故專治一身上下諸痛用之中的妙不可言荊穆王妃胡氏因食蕎麥麵著怒遂病胃脘當心痛不可忍醫用吐下行氣化滯諸藥皆入口即吐不能奏功大便三日不通因思雷公炮炙論云心痛欲死速覓延胡乃以玄胡索末三錢溫酒調下即納入少頃大便行而痛遂止又華老年五十餘病下痢腹痛垂死已備棺木豫用此藥三錢米飲服之痛即減十之五調理而安按方勺泊宅編云一人病遍體作痛殆不可忍都下醫或云中風或去中濕或云腳氣藥悉不效周離亨言是氣血凝滯所致用玄胡索當歸桂心等分為末溫酒服三四錢隨量頻進以止為度遂痛止蓋玄胡索能活血化氣第一品藥也其後趙待制霆因導引失節肢體拘攣亦用此數服而愈附方舊三新一十二老小咳嗽玄胡索一兩枯礬二錢半為末每服二錢軟餳一塊和含之仁存堂方鼻出衄血玄胡索末綿裹塞耳內左衄塞右右衄塞左普濟方小便尿血玄胡索一兩朴硝七錢半為末每服四錢水煎服活人書小便不通捻頭散治小兒小便不通用玄胡索川苦楝子等分為末每服半錢或一錢白湯滴油數點調下錢仲陽小兒直訣膜外氣疼及氣塊玄胡索不限多少為末豬胰一具切作塊子炙熟蘸末頻食之勝金方熱厥心痛或發或止久不愈身熱足寒者用玄胡索去皮金鈴子肉等分為末每溫酒或白湯下二錢聖惠方下痢腹痛方見發明下婦女血氣腹中刺痛經候不調用玄胡索去皮醋炒當歸酒浸炒各一兩橘紅二兩為末酒煮米糊丸梧子大每服一百丸空心艾醋湯下濟生方産後諸病凡産後穢汙不盡腹滿及産後血運心頭硬或寒熱不禁或心悶手足煩熱氣力欲絶諸病並用玄胡索炒研酒服一錢甚效聖惠方小兒盤腸氣痛玄胡索茴香等分炒研空心米飲量兒大小與服衛生易簡方疝氣危急玄胡索鹽炒全蠍去毒生用等分為末每服半錢空心鹽酒下直指方冷氣腰痛玄胡索當歸桂心三味方見發明下肢體拘痛方同上偏正頭痛不可忍者玄胡索七枚青黛二錢牙皂二個去皮子為末水和丸如杏仁大每以水化一丸灌入病人鼻內隨左右口咬銅錢一個當有涎出成盆而愈永類方墜落車馬筋骨痛不止玄胡索末豆淋酒服二錢日二服聖惠方貝母本經中品釋名莔爾雅音萌勤母別録苦菜別録苦花別録空草本經藥實弘景曰形似聚貝子故名貝母時珍曰詩云言採其𦯶即此一作虻謂根狀如虻也苦菜藥實與野苦蕒黃藥子同名集解別録曰貝母生晉地十月採根曝乾恭曰其葉似大蒜四月蒜熟時採之良若十月苗枯根亦不佳也出潤州荊州襄州者最佳江南諸州亦有頌曰今河中江陵府郢壽隨鄭蔡潤滁州皆有之二月生苗莖細青色葉亦青似蕎麥葉隨苗出七月開花碧緑色形如鼓子花八月採根根有瓣子黃白色如聚貝子此有數種陸璣詩疏云𦯶貝母也葉如栝蔞而細小其子在根下如芋子正白四方連纍相著有分解今近道出者正類此郭璞注爾雅言白花葉似韭此種罕復見之斆曰貝母中有獨顆團不作兩片無皺者號曰丹龍精不入藥用誤服令人筋脈永不收惟以黃精小藍汁服之立解根修治斆曰凡使先於柳木灰中炮黃擘破去內口鼻中有米許大者心一顆後拌糯米於𨫼上同炒待米黃去米用氣味辛平無毒別録曰苦微寒恭曰味甘苦不辛之才曰厚朴白薇為之使惡桃花畏秦艽莽草礜石反烏頭主治傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙本經療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩熱渴出汗安五臟利骨髓別録服之不飢斷谷弘景消痰潤心肺末和沙糖丸含止嗽燒灰油調敷人畜惡瘡斂瘡口大明主胸脅逆氣時疾黃疸研末點目去膚翳以七枚作末酒服治産難及胞衣不出與連翹同服主項下瘤癭疾甄權發明承曰貝母能散心胸鬱結之氣故詩云言採其莔是也作詩者本以不得志而言今用治心中氣不快多愁郁者殊有功信矣好古曰貝母乃肺經氣分藥也仲景治寒實結胸外無熱證者三物小陷胸湯主之白散亦可以其內有貝母也成無己云辛散而苦泄桔梗貝母之苦辛用以下氣機曰俗以半夏有毒用貝母代之夫貝母乃太陰肺經之藥半夏乃太陰脾經陽明胃經之藥何可以代若虛勞咳嗽吐血咯血肺痿肺癰婦人乳癰癰疽及諸郁之證半夏乃禁忌皆貝母為嚮導猶可代也至於脾胃濕熱涎化為痰久則生火痰火上攻昏憒僵仆蹇澀諸證生死旦夕亦豈貝母可代乎頌曰貝母治惡瘡唐人記其事云江左嘗有商人左膊上有瘡如人面亦無他苦商人戲以酒滴口中其面赤色以物食之亦能食多則膊內肉脹起或不食則一臂痹焉有名醫教其歷試諸藥金石草木之類悉無所苦至貝母其瘡乃聚眉閉口商人喜因以小葦筒毀其口灌之數日成痂遂愈然不知何疾也本經言主金瘡此豈金瘡之類歟附方新二十一憂鬱不伸胸膈不寬貝母去心薑汁炒研薑汁麵糊丸每服七十丸徵士鎖甲煎湯下集效方化痰降氣止咳解鬱消食除脹有奇效用貝母去心一兩薑製厚朴半兩蜜丸梧子大每白湯下五十丸筆峰方小兒晬嗽百日內咳嗽痰壅貝母五錢甘草半生半炙二錢為末沙糖丸芡子大每米飲化下一丸全幼心鑑孕婦咳嗽貝母去心麩炒黃為末沙糖拌丸芡子大每含咽一丸神效救急易方妊娠尿難飲食如故用貝母苦參當歸各四兩為末蜜丸小豆大每飲服三丸至十丸金匱要略乳汁不下二母散貝母知母牡蠣粉等分為細末每豬蹄湯調服二錢此祖傳方也王海藏湯液本草冷淚目昏貝母一枚胡椒七粒為末點之儒門事親方目生弩肉肘後用貝母真丹等分為末日點摘玄方用貝母丁香等分為末乳汁調點吐血不止貝母炮研溫漿水服二錢聖惠方衄血不止貝母炮研末漿水服二錢良久再服普濟方小兒鵝口滿口白爛貝母去心為末半錢水五分蜜少許煎三沸繳淨抹之日四五度聖惠方吹奶作痛貝母末吹鼻中大效危氏得效方乳癰初腫貝母末酒服二錢仍令人吮之即通仁齊直指方便癰腫痛貝母白芷等分為末酒調服或酒煎服以滓貼之永類鈐方紫白癜斑貝母南星等分為末生薑帶汁擦之德生堂方用貝母乾薑等分為末如澡豆入密室中浴擦得汗為妙談野翁方以生薑擦動醋磨貝母塗之聖惠方用貝母百部等分為末自然薑汁調搽蜘蛛咬毒縛定咬處勿使毒行以貝母末酒服半兩至醉良久酒化為水自瘡口出水盡仍塞瘡口甚妙仁齊直指方蛇蠍咬傷方同上山慈菰宋嘉祐釋名金燈拾遺鬼燈檠綱目朱姑綱目鹿蹄草綱目無義草時珍曰根狀如水慈菰花狀如燈籠而硃色故有諸名段成式酉陽雜俎云金燈之花與葉不相見人惡種之謂之無義草又有試劍草亦名鹿蹄草與此同名見後草之五集解藏器曰山慈菰生山中濕地葉似車前根如慈菰大明曰零陵間有一種團慈菰根如小蒜所主略同時珍曰山慈菰處處有之冬月生葉如水仙花之葉而狹二月中抽一莖如箭桿高尺許莖端開花白色亦有紅色黃色者上有黑點其花乃衆花簇成一朵如絲紐成可愛三月結子有三稜四月初苗枯即掘取其根狀如慈菰及小蒜遲則苗腐難尋矣根苗與老鴉蒜極相類但老鴉根無毛慈菰有毛殼包裹為異爾用之去毛殼根氣味甘微辛有小毒主治癰腫瘡瘻瘰癧結核等醋磨敷之亦剝人面皮除皯䵴藏器主疔腫攻毒破皮解諸毒蠱毒蛇蟲狂犬傷時珍附方新五粉滓面䵟山慈菰根夜塗旦洗普濟方牙齦腫痛紅燈籠枝根煎湯漱吐孫天仁集效方癰疽疔腫惡瘡及黃疸慈菰連根同蒼耳草等分搗爛以好酒一鍾濾汁溫服或干之為末每酒服三錢乾坤生意風痰癇疾金燈花根似蒜者一個以茶清研如泥日中時以茶調下即臥日中良久吐出雞子大物永不發如不吐以熱茶投之奇效良方萬病解毒丸一名太乙紫金丹一名玉樞丹解諸毒療諸瘡利關節治百病起死回生不可盡述凡居家遠出行兵動衆不可無此山慈菰去皮洗極淨焙二兩川五倍子洗刮焙二兩千金子仁白者研紙壓去油一兩紅芽大戟去蘆洗焙一兩半麝香三錢以端午七夕重陽或天德月德黃道上吉日預先齊戒盛服精心治藥為末陳設拜禱乃重羅令勻用糯米濃飲和之木臼杵千下作一錢一錠病甚者連服取利一二行用溫粥補之凡一切飲食藥毒蠱毒瘴氣河豚土菌死牛馬等毒並用涼水磨服一錠或吐或利即愈癰疽發背疔腫楊梅等一切惡瘡風疹赤遊痔瘡並用涼水或酒磨塗日數次立消陰陽二毒傷寒狂亂瘟疫喉痹喉風並用冷水入薄荷汁數匙化下心氣痛並諸氣用淡酒化下泄瀉痢下霍亂絞腸沙用薄荷湯下中風中氣口緊眼歪五癲五癇鬼邪鬼胎筋攣骨痛並暖酒下自縊溺水鬼迷心頭溫者冷水磨灌之傳尸癆瘵涼水化服取下惡物蟲積為妙久近瘧疾將發時東流水煎桃枝湯化服女人經閉紅花酒化服小兒驚風五疳五痢薄荷湯下頭風頭痛酒研貼兩太陽上諸腹鼓脹麥芽湯化下風蟲牙痛酒磨塗之亦吞少許打撲傷損松節煎酒下湯火傷毒蛇惡犬一切蟲傷並冷水磨塗仍服之王璆百一選方葉主治瘡腫入蜜搗塗瘡口候清血出效慎微塗乳癰便毒尤妙時珍附方新一中溪毒生瘡朱菰葉搗爛塗之生東間葉如蒜葉外臺祕要花主治小便血淋澀痛同地柏花陰乾每用三錢水煎服聖惠石蒜宋圖經釋名烏蒜綱目老鴉蒜救荒蒜頭草綱目婆婆酸綱目一枝箭綱目水麻圖經時珍曰蒜以根狀名箭以莖狀名集解頌曰水麻生鼎州黔州其根名石蒜九月採之或云金燈花根亦名石蒜即此類也時珍曰石蒜處處下濕地有之古謂之烏蒜俗謂之老鴉蒜一枝箭是也春初生葉如蒜秧及山慈菰葉背有劍脊四散布地七月苗枯乃於平地抽出一莖如箭桿長尺許莖端開花四五朵六出紅色如山丹花狀而瓣長黃蕊長鬚其根狀如蒜皮色紫赤肉白色此有小毒而救荒本草言其可炸熟水浸過食蓋為救荒爾一種葉如大韭四五月抽莖開花如小萱花黃白色者謂之鐵色箭功與此同二物並抽莖開花後乃生葉葉花不相見與金燈同根氣味辛甘溫有小毒主治敷貼腫毒蘇頌疔瘡惡核可水煎服取汗及搗敷之又中溪毒者酒煎半升服取吐良時珍附方新三便毒諸瘡一枝箭搗爛塗之即消若毒太甚者冼淨以生白酒煎服得微汗即愈王永輔濟世方産腸脫下老鴉蒜即酸頭草一把以水三碗煎一碗半去滓熏洗神效危氏得效方小兒驚風大叫一聲就死者名老鴉驚以散麻纏住脅下及手心足心以燈火爆之用老鴉蒜曬乾車前子等分為末水調貼手足心仍以燈心淬手足心及肩膊眉心鼻心即醒也王日新小兒方水仙會編釋名金盞銀臺時珍曰此物宜卑濕處不可缺水故名水仙金盞銀臺花之狀也集解機曰水仙花葉似蒜其花香甚清九月初栽於肥壤則花茂盛瘦地則無花五月初收根以童尿浸一宿曬乾懸火暖處若不移宿根更旺時珍曰水仙叢生下濕處其根似蒜及薤而長外有赤皮裹之冬月生葉似薤及蒜春初抽莖如蔥頭莖頭開花數朵大如簪頭狀如酒杯五尖上承黃心宛然盞樣其花瑩韻其香清幽一種千葉者花皺下輕黃而上淡白不作杯狀人重之指為真水仙蓋不然乃一物二種爾亦有紅花者按段成式酉陽雜俎云捺祗出拂林國根大如雞卵苗長三四尺葉似蒜葉中心抽條莖端開花六出紅白色花心黃赤不結子冬生夏死取花壓油塗身去風氣據此形狀與水仙倣佛豈外國名謂不同耶根氣味苦微辛滑寒無毒土宿真君曰取汁伏汞煮雄黃拒火主治癰腫及魚骨哽時珍花氣味缺主治作香澤塗身理髮去風氣又療婦人五心發熱同乾荷葉赤芍藥等分為末白湯每服二錢熱自退也時珍出衛生易簡方白茅本經中品釋名根名茹根本經蘭根本經地筋別録時珍曰茅葉如矛故謂之茅其根牽連故謂之茹易曰拔茅連茹是也有數種夏花者為茅秋花者為菅二物功用相近而名謂不同詩云白華菅兮白茅束兮是也別録不分茅菅乃二種謂茅根一名地菅一名地筋而有名未用又出地筋一名菅根蓋二物之根狀皆如筋可通名地筋不可併名菅也正之集解別録曰茅根生楚地山谷田野六月採根弘景曰此即今白茅菅詩云露彼菅茅是也其根如渣芹甜美頌曰處處有之春生芽布地如針俗謂之茅針亦可啖甚益小兒夏生白花茸茸然至秋而枯其根至潔白六月採之又有菅亦茅類也陸璣草木疏云菅似茅而滑無毛根下五寸中有白粉者柔韌宜為索漚之尤善其未漚者名野菅入藥與茅功等時珍曰茅有白茅菅茅黃茅香茅芭茅數種葉皆相似白茅短小三四月開白花成穗結細實其根甚長白軟如筋而有節味甘俗呼絲茅可以苫蓋及供祭祀苞苴之用本經所用茅根是也其根干之夜視有光故腐則變為螢火菅茅只生山上似白茅而長入秋抽莖開花成穗如荻花結實尖黑長分許黏衣刺人其根短硬如細竹根無節而微甘亦可入藥功不及白茅爾雅所謂白華野菅是也黃茅似菅茅而莖上開葉莖下有白粉根頭有黃毛根亦短而細硬無節秋深開花穗如菅可為索綯古名黃菅別録所用菅根是也香茅一名菁茅一名瓊茅生湖南及江淮間葉有三脊其氣香芬可以包藉及縮酒禹貢所謂荊州苞匭菁茅是也芭茅叢生葉大如蒲長六七尺有二種即芒也見後芒下茅根氣味甘寒無毒主治勞傷虛羸補中益氣除瘀血血閉寒熱利小便本經下五淋除客熱在腸胃止渴堅筋婦人崩中久服利人別録主婦人月經不勻通血脈淋瀝大明止吐衄諸血傷寒噦逆肺熱喘急水腫黃疸解酒毒時珍發明弘景曰茅根服食斷谷甚良俗方稀用惟煎汁療淋及崩中爾時珍曰白茅根甘能除伏熱利小便故能止諸血噦逆喘急消渴治黃疸水腫乃良物也世人因微而忽之惟事苦寒之劑致傷沖和之氣烏足知此哉附方舊二新一十三山中辟穀凡闢難無人之境取白茅根冼淨咀嚼或石上曬焦搗末水服方寸匕可辟穀不飢肘後方溫病冷啘因熱甚飲水成暴冷啘者茅根切枇杷葉拭去毛炙香各半斤水四升煎二升去滓稍熱飲之龐安常傷寒總病論溫病熱噦乃伏熱在胃令人胸滿則氣逆逆則噦或大下後胃中虛冷亦致噦也茅根切葛根切各半斤水三升煎一升半每溫飲一盞噦止即停同上反胃上氣食入即吐茅根蘆根二兩水四升煮二升頓服得下良聖濟總録肺熱氣喘生茅根一握㕮咀水二盞煎一盞食後溫服甚者三服止名如神湯聖惠方虛後水腫因飲水多小便不利用白茅根一大把小豆三升水三升煮乾去茅食豆水隨小便下也肘後方五種黃病黃疸谷疸酒疸女疸勞疸也黃汗者乃大汗出入水所致身體微腫汗出如黃柏汁用生茅根一把細切以豬肉一斤合作羹食肘後解中酒毒恐爛五臟茅根汁飲一升千金方小便熱淋白茅根四升水一斗五升煮取五升適冷暖飲之日三服肘後方小便出血茅根煎湯頻飲為佳談野翁方勞傷溺血茅根乾薑等分入蜜一匙水二鍾煎一鍾日一服鼻衄不止茅根為末米泔水服二錢聖惠方吐血不止千金翼用白茅根一握水煎服之婦人良方用根洗搗汁日飲一合竹木入肉白茅根燒末豬脂和塗之風入成腫者亦良肘後方茅針即初生苗也拾遺氣味甘平無毒大明曰涼主治下水別録治消渴能破血甄權通小腸治鼻衄及暴下血水煮服之惡瘡癰腫軟癤未潰者以酒煮服一針一孔二針二孔生挼敷金瘡止血藏器花氣味甘溫無毒主治煎飲止吐血衄血並塞鼻又敷灸瘡不合罯刀箭金瘡止血並痛大明屋上敗茅氣味苦平無毒主治猝吐血銼三升酒浸煮一升服和醬汁研敷斑瘡及蠶齧瘡藏器屋四角茅主鼻洪大明發明時珍曰按陳文中小兒方治痘瘡潰爛難靨不幹多年牆屋上爛茅擇洗焙乾為末摻之此蓋取其性寒而解毒又多受雨露霜雪之氣兼能燥濕也附方新三婦人陰癢牆頭爛茅荊芥牙皂等分煎水頻熏洗之摘玄方大便閉塞服藥不通者滄鹽三錢屋檐爛草節七個為末每用一錢竹筒吹入肛內一寸即通名提金散聖濟録卒中五尸其狀腹痛脹急不得氣息上衝心胸旁攻兩脅或磈礧湧起或牽引腰脊此乃身中尸鬼接引為害取屋上四角茅入銅器中以三赤布覆腹著器布上燒茅令熱隨痛追逐跖下癢即瘥也肘後方地筋別録有名未用釋名菅根別録土筋同集解別録曰地筋生澤中根有毛三月生四月實白三月三日採根弘景曰疑此即是白茅而小異也藏器曰地筋如地黃根葉並相似而細多毛生平澤功用亦同地黃李雍方中用之時珍曰此乃黃菅茅之根也功與白茅根相同詳見白茅下陳藏器所說別是一物非菅根也氣味甘平無毒主治益氣止渴除熱在腹臍利筋別録根苗花功與白茅同時珍芒拾遺校正併入拾遺石芒敗芒箔釋名杜榮爾雅笆芒寰宇志笆茅時珍曰芒爾雅作莣今俗謂之笆茅可以為籬笆故也集解藏器曰爾雅莣杜榮郭璞注云草似茅皮可為繩索履屩也今東人多以為箔又曰石芒生高山如芒而節短江西呼為折草六七月生穗如荻時珍曰芒有二種皆叢生葉皆如茅而大長四五尺甚快利傷人如鋒刃七月抽長莖開白花成穗如蘆葦花者芒也五月抽短莖開花如芒者石芒也並於花將放時剝其籜皮可為繩箔草履諸物其莖穗可為掃帚也莖氣味甘平無毒主治人畜為虎狼等傷恐毒入內取莖雜葛根濃煮汁服亦生取汁服藏器煮汁服散血時珍敗芒箔主治産婦血滿腹脹痛血渴惡露不盡月閉止好血下惡血去鬼氣疰痛癥結酒煮服之亦燒末酒下彌久著煙者佳藏器龍膽本經上品釋名陵遊本經志曰葉如龍葵味苦如膽因以為名集解別録曰龍膽生齊朐山谷及冤句二月八月十一月十二月採根陰乾弘景曰今出近道以吳興者為勝根狀似牛膝其味甚苦頌曰宿根黃白色下抽根十餘條類牛膝而短直上生苗高尺余四月生葉如嫩蒜細莖如小竹枝七月開花如牽牛花作鈴鐸狀青碧色冬後結子苗便枯俗呼草龍膽又有山龍膽味苦澀其葉經霜雪不凋山人用治四肢疼痛與此同類而別種也採無時根修治斆曰採得陰乾用時銅刀切去須土頭了銼細甘草湯浸一宿漉出曝乾用氣味苦澀大寒無毒斆曰空腹餌之令人溺不禁之才曰貫衆小豆為之使惡地黃防葵主治骨間寒熱驚癇邪氣續絶傷定五臟殺蠱毒本經除胃中伏熱時氣溫熱熱泄下痢去腸中小蟲益肝膽氣止驚惕久服益智不忘輕身耐老別録治小兒壯熱骨熱驚癇入心時疾熱黃癰腫口瘡甄權客忤疳氣熱病狂語明目止煩治瘡疥大明去目中黃及睛赤腫脹瘀肉高起痛不可忍元素退肝經邪熱除下焦濕熱之腫瀉膀胱火李杲療咽喉痛風熱盜汗時珍發明元素曰龍膽味苦性寒氣味俱厚沉而降陰也足厥陰少陽經氣分藥也其用有四除下部風濕一也及濕熱二也臍下至足腫痛三也寒濕腳氣四也下行之功與防己同酒浸則能上行外行以柴胡為主龍膽為使治眼中疾必用之藥好古曰益肝膽之氣而泄火時珍曰相火寄在肝膽有瀉無補故龍膽之益肝膽之氣正以其能瀉肝膽之邪熱也但大苦大寒過服恐傷胃中生髮之氣反助火邪亦久服黃連反從火化之義別録久服輕身之說恐不足信附方舊四新六傷寒發狂草龍膽為末入雞子清白蜜化涼水服二錢傷寒蘊要四肢疼痛山龍膽根細切用生薑自然汁浸一宿去其性焙乾搗末水煎一錢匕溫服之此與龍膽同類別種經霜不凋蘇頌圖經本草谷疸勞疸谷疸因食而得勞疸因勞而得用龍膽一兩苦參三兩為末牛膽汁和丸梧子大先食以麥飲服五丸日三服不愈稍增勞疸加龍膽一兩梔子仁三七枚以豬膽和丸刪繁方一切盜汗婦人小兒一切盜汗又治傷寒後盜汗不止龍膽草研末每服一錢豬膽汁三兩點入溫酒少許調服楊氏家藏方小兒盜汗身熱龍膽草防風各等分為末每服一錢米飲調下亦可丸服及水煎服嬰童百問咽喉熱痛龍膽擂水服之集簡方暑行目澀生龍膽搗汁一合黃連二寸切爛浸汁一匙和點之危氏得效方眼中漏膿龍膽草當歸等分為末每服二錢溫水下鴻飛集蛔蟲攻心刺痛吐清水龍膽一兩去頭銼水二盞煮一盞隔宿勿食平旦頓服之聖惠方猝然下血不止龍膽一虎口水五升煮取二升半分為五服姚僧坦集驗方細辛本經上品釋名小辛本經少辛頌曰華州真細辛根細而味極辛故名之曰細辛時珍曰小辛少辛皆此義也按山海經云浮戲之山多少辛管子云五沃之土群藥生少辛是矣集解別録曰細辛生華陰山谷二月八月採根陰乾弘景曰今用東陽臨海者形段乃好而辛烈不及華陰高麗者用之去其頭節當之曰細辛如葵赤黑一根一葉相連頌曰今處處有之皆不及華陰者為真其根細而極辛今人多以杜衡為之杜衡根似飯帚密鬧細長四五寸微黃白色江淮呼為馬蹄香不可誤用宗奭曰細辛葉如葵赤黑色非此則杜衡也杜衡葉如馬蹄之下故俗名馬蹄香蓋根似白前又似細辛按沈括夢溪筆談云細辛出華山極細而直柔韌深紫色味極辛嚼之習習如椒而更甚於椒本草云細辛水漬令直是以杜衡僞為之也東南所用細辛皆杜衡也杜衡黃白色拳曲而脆干則作團又謂之馬蹄襄漢間又有一種細辛極細而直色黃白乃是鬼督郵亦非細辛也時珍曰博物志言杜衡亂細辛自古已然矣沈氏所說甚詳大抵能亂細辛者不止杜衡皆當以根苗色味細辨之葉似小葵柔莖細根直而色紫味極辛者細辛也葉似馬蹄莖微粗根曲而黃白色味亦辛者杜衡也一莖直上莖端生葉如傘根似細辛微粗直而黃白色味辛微苦者鬼督郵也似鬼督郵而色黑者及己也葉似小桑根似細辛微粗長而黃色味辛而有臊氣者徐長卿也葉似柳而根似細辛粗長黃白色而味苦者白薇也似白薇而白直味甘者白前也根修治斆曰凡使細辛切去頭土了以瓜水浸一宿曝乾用須揀去雙葉者服之害人氣味辛溫無毒普曰神農黃帝雷公桐君辛小溫岐伯無毒李當之小寒權曰苦辛之才曰曾青棗根為之使得當歸芍藥白芷芎藭牡丹藁本甘草共療婦人得決明鯉魚膽青羊肝共療目痛惡黃耆狼毒山茱萸忌生菜貍肉畏硝石滑石反藜蘆主治咳逆上氣頭痛腦動百節拘攣風濕痹痛死肌久服明目利九竅輕身長年本經溫中下氣破痰利水道開胸中滯結除喉痹齆鼻不聞香臭風癇癲疾下乳結汗不出血不行安五臟益肝膽通精氣別録添膽氣治嗽去皮風濕癢風眼淚下除齒痛血閉婦人血瀝腰痛甄權含之去口臭弘景潤肝燥治督脈為病脊強而厥好古治口舌生瘡大便燥結起目中倒睫時珍發明宗奭曰治頭面風痛不可缺此元素曰細辛氣溫味大辛氣厚於味陽也升也入足厥陰少陰血分為手少陰引經之藥香味俱細故入少陰與獨活相類以獨活為使治少陰頭痛如神亦止諸陽頭痛諸風通用之味辛而熱溫少陰之經散水氣以去內寒成無己曰水停心下不行則腎氣燥宜辛以潤之細辛之辛以行水氣而潤燥杲曰膽氣不足細辛補之又治邪氣自里之表故仲景少陰證用麻黃附子細辛湯時珍曰氣之厚者能發熱陽中之陽也辛溫能散故諸風寒風濕頭痛痰飲胸中滯氣驚癇者宜用之口瘡喉痹䘌齒諸病用之者取其能散浮熱亦火鬱則發之之義也辛能泄肺故風寒咳嗽上氣者宜用之辛能補肝故膽氣不足驚癇眼目諸病宜用之辛能潤燥故通少陰及耳竅便澀者宜用之承曰細辛非華陰者不得為真若單用末不可過一錢多則氣悶塞不通者死雖死無傷近年開平獄中嘗治此不可不記非本有毒但不識多寡耳附方舊二新六暗風猝倒不省人事細辛末吹入鼻中危氏得效方虛寒嘔噦飲食不下細辛去葉半兩丁香二錢半為末每服一錢柿蒂湯下小兒客忤口不能言細辛桂心末等分以少許納口中外臺祕要小兒口瘡細辛末醋調貼臍上衛生家寶方口舌生瘡細辛黃連等分為末摻之漱涎甚效名兼金散一方用細辛黃柏三因方口臭䘌齒腫痛細辛煮濃汁熱含冷吐取瘥聖惠方鼻中息肉細辛末時時吹之聖惠方諸般耳聾細辛末溶黃蠟丸鼠屎大綿裹一丸塞之一二次即愈須戒怒氣名聰耳丸龔氏經驗方杜衡別録中品釋名杜葵綱目馬蹄香唐本土滷爾雅土細辛綱目恭曰杜衡葉似葵形似馬蹄故俗名馬蹄香頌曰爾雅杜又名土滷然杜若亦名杜衡或疑是杜若而郭璞注云似葵當是杜衡也集解別録曰杜衡生山谷三月三日採根熟洗曝乾弘景曰根葉都似細辛惟氣小異爾處處有之方藥少用惟道家服之令人身衣香恭曰生山之陰水澤下濕地葉似葵形如馬蹄根似細辛白前等今俗以及己代之謬矣及己獨莖莖端四葉葉間白花殊無芳氣有毒服之令人吐惟療瘡疥不可亂杜衡也頌曰今江淮間皆有之春初於宿根上生苗葉似馬蹄下狀高二三寸莖如麥稿粗細每窠上有五七葉或八九葉別無枝蔓又於莖葉間罅內蘆頭上貼地生紫花其花似見不見暗結實如豆大窠內有碎子似天仙子苗葉俱青經霜即枯其根成空有似飯帚密鬧細長四五寸粗於細辛微黃白色味辛江淮俗呼為馬蹄香謹按山海經云天帝之山有草焉其狀如葵其臭如蘼蕪名曰杜衡可以走馬食之已癭郭璞注云帶之可以走馬或曰馬得之而健走也宗奭曰杜衡用根似細辛但根色白葉如馬蹄之下市人往往以亂細辛將二物相對便見真僞況細辛惟出華州者良杜衡色黃拳局而脆干則作團詳細辛下時珍曰按土宿本草云杜細辛葉圓如馬蹄紫背者良江南荊湖川陝閩廣俱有之取自然汁可伏硫砒制汞根氣味辛溫無毒主治風寒咳逆作浴湯香人衣體別録止氣奔喘促消痰飲破留血項間癭瘤之疾甄權下氣殺蟲時珍發明時珍曰古方吐藥往往用杜衡者非杜衡也乃及己也及己似細辛而有毒吐人昔人多以及己當杜衡杜衡當細辛故爾錯誤也杜衡則無毒不吐人功雖不及細辛而亦能散風寒下氣消痰行水破血也附方新六風寒頭痛傷風傷寒頭痛發熱初覺者馬蹄香為末每服一錢熱酒調下少頃飲熱茶一碗催之出汗即愈名香汗散王英杏林摘要飲水停滯大熱行極及食熱餅後飲冷水過多不消停滯在胸不利呼吸喘息者杜衡三分瓜蒂二分人參一分為末湯服一錢日二服取吐為度肘後方痰氣哮喘馬蹄香焙研每服二三錢正發時淡醋調下少頃吐出痰涎為驗普濟方噎食膈氣馬蹄香四兩為末好酒三升熬膏每服二匙好酒調下日三服孫氏集效方吐血瘀聚凡吐血後心中不悶者必止若煩躁悶亂刺脹者尚有瘀血在胃宜吐之方同飲水停滯喉閉腫痛草藥金鎖匙即馬蹄草以根搗井華水調下即效救急方附録木細辛藏器曰味苦溫有毒主腹內結聚癥瘕大便不利推陳去惡破冷氣未可輕服令人利下至困生終南山冬月不凋苗如大戟根似細辛及己別録下品釋名獐耳細辛時珍曰及己名義未詳二月生苗先開白花後方生葉三片狀如獐耳根如細辛故名獐耳細辛集解恭曰及己生山谷陰虛軟地其草一莖莖頭四葉隙著白花根似細辛而黑有毒今人以當杜衡非也二月採根曬乾根氣味苦平有毒恭曰入口使人吐血主治諸惡瘡疥痂瘻蝕及牛馬諸瘡唐本頭瘡白禿風瘙皮膚蟲癢可煎汁浸並敷之大明殺蟲時珍發明弘景曰今人以合瘡疥膏甚驗時珍曰今人不知及己往往以當杜衡卻以杜衡當細辛故杜衡諸方多是及己也辨見細辛杜衡二條附方新一頭瘡白禿獐耳細辛其味香辣為末以槿木煎油調搽活幼全書鬼督郵唐本草釋名獨搖草唐本時珍曰此草獨莖而葉攢其端無風自動故曰鬼獨搖草後人訛為鬼督郵爾因其專主鬼病猶司鬼之督郵也古者傳舍有督郵之官主之徐長卿赤箭皆治鬼病故並有鬼督郵之名名同而物異集解恭曰鬼督郵所在有之有必叢生苗惟一莖莖端生葉若傘狀根如牛膝而細黑今人以徐長卿代之非也保升曰莖似細箭桿高二尺以下葉生莖端狀如傘花生葉心黃白色根橫生而無須二月八月採根徐長卿赤箭並有鬼督郵之名而主治不同宜審用之時珍曰鬼督郵與及己同類根苗皆相似但以根如細辛而色黑者為及己根如細辛而色黃白者為鬼督郵根修治斆曰凡採得細銼用生甘草水煮一伏時曬乾用氣味辛苦平無毒時珍曰有小毒主治鬼疰卒忤中惡心腹邪氣百精毒溫瘧疫疾強腰腳益膂力唐本發明時珍曰按東晉深師方治上氣嗽飲嗽邪嗽燥嗽冷嗽四滿丸用鬼督郵同蜈蚣芫花躑躅諸毒藥為丸則其有毒可知矣非毒藥不能治鬼疰邪惡之病唐本云無毒蓋不然徐長卿本經上品校正今據吳氏本草併入石下長卿釋名鬼督郵本經別仙蹤蘇頌時珍曰徐長卿人名也常以此藥治邪病人遂以名之名醫別録於有名未用復出石下長卿條云一名徐長卿陶弘景注云此是誤爾方家無用亦不復識今考二條功療相似按吳普本草云徐長卿一名石下長卿其為一物甚明但石間生者為良前人缺審故爾差舛弘景曰鬼督郵之名甚多今俗用徐長卿者其根正如細辛小短扁扁爾氣亦相似今狗脊散用鬼督郵者取其強悍宜腰腳故知是徐長卿而非鬼箭赤箭集解別録曰徐長卿生泰山山谷及隴西三月採又曰石下長卿生隴西山谷池澤三月採恭曰所在川澤有之葉似柳兩葉相當有光澤根如細辛微粗長黃色而有臊氣今俗以代鬼督郵非也鬼督郵自有本條保升曰生下濕川澤之間苗似小桑兩葉相對三月苗青七月八月著子似蘿摩子而小九月苗黃十月凋八月採根曬乾頌曰今淄齊淮泗間皆有之三月四月採謂之別仙蹤時珍曰鬼督郵及己之亂杜衡其功不同苗亦不同也徐長卿之亂鬼督郵其苗不同其功同也杜衡之亂細辛則根苗功用皆倣佛乃彌近而大亂也不可不審根修治斆曰凡採得粗杵拌少蜜令遍以瓷器盛蒸三伏時曬乾用氣味辛溫無毒別録曰石下長卿咸平有毒普曰徐長卿一名石下長卿神農雷公辛時珍曰治鬼之藥多有毒當從別録主治鬼物百精蠱毒疫疾邪惡氣溫瘧久服強悍輕身本經益氣延年又曰石下長卿主鬼疰精物邪惡氣殺百精蠱毒老魅注易亡走啼哭悲傷恍惚別録發明時珍曰抱朴子言上古闢瘟疫有徐長卿散良效今人不知用此附方新二小便關格徐長卿湯治氣壅關格不通小便淋結臍下妨悶徐長卿炙半兩茅根三分木通冬葵子一兩滑石二兩檳榔一分瞿麥穗半兩每服五錢水煎入朴硝一錢溫服日二服聖惠方注車注船凡人登車船煩悶頭痛欲吐者宜用徐長卿石長生車前子車下李根皮各等分搗碎以方囊系半合於衣帶及頭上則免此患肘後方白薇本經中品釋名薇草別録白幕別録春草別録葞音尾骨美時珍曰薇細也其根細而白也按爾雅葞春草也薇葞音相近則白薇又葞音之轉也別録以葞為莽草之名誤矣集解別録曰白薇生平原川穀三月三日採根陰乾弘景曰近道處處有之頌曰今陝西諸郡及舒滁潤遼州亦有之莖葉俱青頗類柳葉六七月開紅花八月結實其根黃白色類牛膝而短小今人八月採之根修治斆曰凡採得以糯米泔汁浸一宿取出去髭於槐砧上細銼蒸之從巳至申曬乾用時珍曰後人惟以酒洗用氣味苦咸平無毒別録曰大寒之才曰惡黃耆大黃大戟乾薑大棗乾漆山茱萸主治暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱痠疼溫瘧洗洗發作有時本經療傷中淋露下水氣利陰氣益精久服利人別録治驚邪風狂痓病百邪鬼魅弘景風溫灼熱多眠及熱淋遺尿金瘡出血時珍發明好古曰古方多用治婦人以本草有療傷中淋露之故也時珍曰白薇古人多用後世罕能知之按張仲景治婦人産中虛煩嘔逆安中益氣竹皮丸方中用白薇同桂枝各一分竹皮石膏各三分甘草七分棗肉為大丸每以飲化一丸服云有熱者倍白薇則白薇性寒乃陽明經藥也徐之才藥對言白薇惡大棗而此方又以棗肉為丸蓋恐諸藥寒涼傷脾胃爾朱肱活人書治風溫發汗後身猶灼熱自汗身重多眠鼻息必鼾語言難出者葳蕤湯中亦用之孫真人千金方有詔書發汗白薇散焉附方新五肺實鼻塞不知香臭白薇貝母款冬花各一兩百部二兩為末每服一錢米飲下普濟方婦人遺尿不拘胎前産後白薇芍藥各一兩為末酒服方寸匕日三服千金方血淋熱淋方同上婦人血厥人平居無疾苦忽如死人身不動搖目閉口噤或微知人眩冒稱時方寤此名血厥亦名鬱冒出汗過多血少陽氣獨上氣塞不行故身如死氣過血還陰陽復通故移時方寤婦人尤多此證宜服白薇湯用白薇當歸各一兩人參半兩甘草二錢半每服五錢水二盞煎一盞溫服本事方金瘡血出白薇為末貼之儒門事親白前別録中品釋名石藍唐本嗽藥同上時珍曰名義未詳集解弘景曰白前出近道根似細辛而大色白不柔易折氣嗽方多用之恭曰苗高尺許其葉似柳或似芫花根長於細辛白色生州渚沙磧之上不生近道俗名石藍又名嗽藥今用蔓生者味苦非真也志曰根似白薇牛膝輩二月八月採陰乾用嘉謨曰似牛膝粗長堅直易斷者白前也似牛膝短小柔軟能彎者白薇也近道俱有形色頗同以此別之不致差誤根修治斆曰凡用以生甘草水浸一伏時漉出去頭須了焙乾收用氣味甘微溫無毒權曰辛恭曰微寒主治胸脅逆氣咳嗽上氣呼吸欲絶別録主一切氣肺氣煩悶奔豚腎氣大明降氣下痰時珍發明宗奭曰白前能保定肺氣治嗽多用以溫藥相佐使尤佳時珍曰白前色白而味微辛甘手太陰藥也長於降氣肺氣壅實而有痰者宜之若虛而長哽氣者不可用也張仲景治嗽而脈沉澤漆湯中亦用之其方見金匱要略藥多不録附方舊二新一久嗽唾血白前桔梗桑白皮三兩炒甘草一兩炙水六升煮一升分三服忌豬肉菘菜外臺久咳上氣體腫短氣脹滿晝夜倚壁不得臥常作水雞聲者白前湯主之白前二兩紫菀半夏各三兩大戟七合以水一斗漬一宿煮取三升分作三服禁食羊肉餳糖大佳深師方久患暇呷咳嗽喉中作聲不得眠取白前焙搗為末每溫酒服二錢梅師方草犀拾遺釋名時珍曰其解毒之功如犀角故曰草犀集解藏器曰草犀生衢婺洪饒間苗高二三尺獨莖根如細辛生水中者名水犀珣曰廣州記云生嶺南及海中獨莖對葉而生如燈臺草根若細辛根氣味辛平無毒主治解一切毒氣虎狼蟲虺所傷溪毒野蠱惡刺等毒並宜燒研服之臨死者亦得活李珣天行瘧瘴寒熱咳嗽痰壅飛尸喉痹瘡腫小兒寒熱丹毒中惡注忤痢血等病煮汁服之嶺南及睦婺間中毒者以此及千金藤並解之藏器叉子股海藥校正併入拾遺金叉股釋名金叉股時珍曰石斛名金叉花此草狀似之故名集解藏器曰金叉股生嶺南及南海山谷根如細辛每莖三四十根珣曰忠州萬州者亦佳草莖功力相似緣嶺南多毒家家貯之時珍曰按嶺表録云廣中多蠱毒彼人以草藥金叉股治之十救八九其狀如石斛也又忍冬藤解毒亦號金叉股與此同名云根氣味苦平無毒主治解毒癰疽神驗以水煎服李珣解諸藥毒煮汁服亦生研更烈必大吐下如無毒亦吐去熱痰瘧瘴天行蠱毒喉痹藏器吉利草綱目集解時珍曰按嵇含南方草木狀云此草生交廣莖如金叉股形類石斛根類芍藥吳黃武中江夏李俁徙合浦遇毒其奴吉利偶得此草與服遂解而吉利即遁去俁以此濟人不知其數也又高涼郡産良耀草枝葉如麻黃花白似牛李秋結子如小粟煨食解毒功亞於吉利草始因梁耀得之因以為名轉梁為良耳根氣味苦平無毒主治解蠱毒極驗時珍百兩金硃砂根綱目集解時珍曰硃砂根生深山中今惟太和山人採之苗高尺許葉似冬青葉背甚赤夏月長茂根大如箸赤色此與百兩金倣佛根氣味苦涼無毒主治咽喉腫痹磨水或醋咽之甚良時珍闢虺雷唐本草釋名闢蛇雷唐本時珍曰此物闢蛇虺有威故以雷名之集解恭曰闢虺雷狀如粗塊蒼朮節中有眼時珍曰今川中峨嵋鶴鳴諸山皆有之根狀如蒼朮大者若拳彼人以充方物苗狀當俟訪問根氣味苦大寒無毒主治解百毒消痰祛大熱療頭痛闢瘟疫唐本治咽喉痛痹解蛇虺毒時珍錦地羅綱目集解時珍曰錦地羅出廣西慶遠山岩間鎮安歸順柳州皆有之根似萆薢及栝蔞根狀彼人頗重之以充方物根氣味微苦平無毒主治山嵐瘴毒瘡毒並中諸毒以根研生酒服一錢匕即解時珍紫金牛宋圖經集解頌曰生福州葉如茶葉上緑下紫結實圓紅色如丹朱根微紫色八月採根去心曝乾頗似巴戟氣味辛平無毒主治時疾膈氣去風痰蘇頌解毒破血時珍拳參宋圖經集解頌曰生淄州田野葉如羊蹄根似海蝦黑色土人五月採之氣味缺主治為末淋泄腫氣蘇頌鐵線草宋圖經集解頌曰生饒州三月採根陰乾時珍曰今俗呼萹蓄為鐵線草蓋同名耳氣味微苦平無毒主治療風消腫毒有效蘇頌附方新一男女諸風産後風尤妙鐵線草根五錢五加皮一兩防風二錢為末以烏骨雞一斤重者水內淹死去毛腸砍作肉鬆入藥剁勻下麻油些少炒黃色隨人量入酒煮熟先以排風藤煎濃湯沐浴頭身乃飲酒食雞發出黏汗即愈如不沐浴必發出風丹乃愈滑伯仁攖寧心要金絲草綱目集解時珍曰金絲草出慶陽山谷苗狀當俟訪問氣味苦寒無毒主治吐血咳血衄血下血血崩瘴氣解諸藥毒療癰疽疔腫惡瘡涼血散熱時珍附方新四婦人血崩金絲草海柏枝砂仁花椒蠶退紙舊錦灰等分為末煮酒空心服陳光述傳談野翁方癰疽疔腫一切惡瘡金絲草忍冬藤五葉藤天蕎麥等分煎湯溫洗黑色者加醋又鐵箍散用金絲草灰二兩醋拌曬乾貝母五兩去心白芷二兩為末以涼水調貼瘡上香油亦可或加龍骨少許天蛇頭毒落蘇即金絲草金銀花藤五葉紫葛天蕎麥等分切碎用絶好醋濃煎先熏後洗救急方
