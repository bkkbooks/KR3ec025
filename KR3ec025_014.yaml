body:
  text: 草部第十四卷草之三芳草類五十六種當歸本經中品釋名乾歸本經山蘄爾雅白蘄爾雅文無綱目頌曰按爾雅薜山蘄又云薜白蘄薜音百蘄即古芹字郭璞注云當歸也似芹而粗大許慎說文云生山中者名薜一名山蘄然則當歸芹類也在平地者名芹生山中粗大者名當歸也宗奭曰今川蜀皆以畦種尤肥好多脂不以平地山中為等差也時珍曰當歸本非芹類特以花葉似芹故得芹名古人娶妻為嗣續也當歸調血為女人要藥有思夫之意故有當歸之名正與唐詩胡麻好種無人種正是歸時又不歸之旨相同崔豹古今注云古人相贈以芍藥相招以文無文無一名當歸芍藥一名將離故也承曰當歸治妊婦産後惡血上衝倉猝取效氣血昏亂者服之即定能使氣血各有所歸恐當歸之名必因此出也集解別録曰當歸生隴西川穀二月八月採根陰乾弘景曰今隴西四陽黑水當歸多肉少枝氣香名馬尾當歸西川北部當歸多根枝而細歷陽所出者色白而氣味薄不相似呼為草當歸缺少時亦用之恭曰今出當州宕州翼州松州以宕州者最勝有二種一種似大葉芎藭者名馬尾當歸今人多用一種似細葉芎藭者名蠶頭當歸即陶稱歷陽者不堪用莖葉並卑下於芎藭頌曰今川蜀陝西諸郡及江寧府滁州皆有之以蜀中者為勝春生苗緑葉有三瓣七八月開花似蒔蘿淺紫色根黑黃色以肉厚而不枯者為勝時珍曰今陝蜀秦州汶州諸處人多栽蒔為貨以秦歸頭圓尾多色紫氣香肥潤者名馬尾歸最勝他處頭大尾粗色白堅枯者為攙頭歸止宜入發散藥爾韓𢘅言川産者力剛而善攻秦産者力柔而善補是矣根修治斆曰凡用去蘆頭以酒浸一宿入藥止血破血頭尾效各不同若要破血即使頭一節硬實處若要止痛止血即用尾若一併用服食無效不如不使惟單使妙也元素曰頭止血尾破血身和血全用即一破一止也先以水洗淨土治上酒浸治外酒洗過或火干曬乾入藥杲曰頭止血而上行身養血而中守梢破血而下流全活血而不走時珍曰雷張二氏所說頭尾功效各異凡物之根身半以上氣脈上行法乎天身半以下氣脈下行法乎地人身法象天地則治上當用頭治中當用身治下當用尾通治則全用乃一定之理也當以張氏之說為優凡曬乾乘熱紙封甕收之不蛀氣味甘溫無毒別録曰辛大溫普曰神農黃帝桐君扁鵲甘無毒岐伯雷公辛無毒李當之小溫杲曰甘辛溫無毒氣厚味薄可升可降陽中微陰入手少陰足太陰厥陰經血分之才曰惡䕡茹濕面畏菖蒲海藻牡蒙生薑制雄黃主治咳逆上氣溫瘧寒熱洗洗在皮膚中婦人漏下絶子諸惡瘡瘍金瘡煮汁飲之本經溫中止痛除客血內塞中風痓汗不出濕痹中惡客氣虛冷補五臟生肌肉別録止嘔逆虛勞寒熱下痢腹痛齒痛女人瀝血腰痛崩中補諸不足甄權治一切風一切血補一切勞破惡血養新血及症癖腸胃冷大明治頭痛心腹諸痛潤腸胃筋骨皮膚治癰疽排膿止痛和血補血時珍主痿癖嗜臥足下熱而痛衝脈為病氣逆裡急帶脈為病腹痛腰溶溶如坐水中好古發明權曰患人虛冷者加而用之承曰世俗多謂惟能治血而金匱外臺千金諸方皆為大補不足決取立效之藥古方用治婦人産後惡血上衝取效無急於此凡氣血昏亂者服之即定可以補虛備産後要藥也宗奭曰藥性論補女子諸不足一說盡當歸之用矣成無己曰脈者血之府諸血皆屬心凡通脈者必先補心益血故張仲景治手足厥寒脈細欲絶者用當歸之苦溫以助心血元素曰其用有三一心經本藥二和血三治諸病夜甚凡血受病必須用之血壅而不流則痛當歸之甘溫能和血辛溫能散內寒苦溫能助心散寒使氣血各有所歸好古曰入手少陰以其心生血也入足太陰以其脾裹血也入足厥陰以其肝藏血也頭能破血身能養血尾能行血全用同人參黃耆則補氣而生血同牽牛大黃則行氣而破血從桂附茱萸則熱從大黃芒硝則寒佐使分定用者當知酒蒸治頭痛諸痛皆屬木故以血藥主之機曰治頭痛酒煮服清取其浮而上也治心痛酒調末服取其濁而半沉半浮也治小便出血用酒煎服取其沉入下極也自有高低之分如此王海藏言當歸血藥如何治胸中咳逆上氣按當歸其味辛散乃血中氣藥也況咳逆上氣有陰虛陽無所附者故用血藥補陰則血和而氣降矣韓𢘅曰當歸主血分之病川産力剛可攻秦産力柔宜補凡用本病宜酒製有痰以薑製導血歸源之理血虛以人參石脂為佐血熱以生地黃條芩為佐不絶生化之源血積配以大黃要之血藥不容舍當歸故古方四物湯以為君芍藥為臣地黃為佐芎藭為使也附方舊八新一十九血虛發熱當歸補血湯治肌熱燥熱目赤面紅煩渴引飲晝夜不息其脈洪大而虛重按全無力此血虛之候也得於飢困勞役證象白虎但脈不長實為異耳若誤服白虎湯即死宜此主之當歸身酒洗二錢綿黃耆蜜炙一兩作一服水二鍾煎一鍾空心溫服日再服東垣蘭室祕藏失血眩運凡傷胎去血産後去血崩中去血金瘡去血拔牙去血一切去血過多心煩眩運悶絶不省人事當歸二兩芎藭一兩每用五錢水七分酒三分煎七分熱服日再婦人良方衄血不止當歸焙研末每服一錢米飲調下聖濟録小便出血當歸四兩銼酒三升煮取一升頓服肘後頭痛欲裂當歸二兩酒一升煎取六合飲之日再服外臺祕要方內虛目暗補氣養血用當歸生曬六兩附子火炮一兩為末煉蜜丸梧子大每服三十丸溫酒下名六一丸聖濟總録心下痛刺當歸為末酒服方寸匕必效方手臂疼痛當歸三兩切酒浸三日溫飲之飲盡別以三兩再浸以瘥為度事林廣記溫瘧不止當歸一兩水煎飲日一服聖濟總録久痢不止當歸二兩吳茱萸一兩同炒香去萸不用為末蜜丸梧子大每服三十丸米飲下名勝金丸普濟方大便不通當歸白芷等分為末每服二錢米湯下聖濟總録婦人百病諸虛不足者當歸四兩地黃二兩為末蜜丸梧子大每食前米飲下十五丸太醫支法存方月經逆行從口鼻出先以京墨磨汁服止之次用當歸尾紅花各三錢水一鍾半煎八分溫服其經即通簡便方室女經閉當歸尾沒藥各一錢為末紅花浸酒面北飲之一日一服普濟方婦人血氣臍下氣脹月經不利血氣上攻欲嘔不得睡當歸四錢乾漆燒存性二錢為末煉蜜丸梧子大每服十五丸溫酒下永類方墮胎下血不止當歸焙一兩蔥白一握每服五錢酒一盞半煎八分溫服聖濟總録妊娠胎動神妙佛手散治婦人妊娠傷動或子死腹中血下疼痛口噤欲死服此探之不損則痛止已損便立下此乃徐王神驗方也當歸二兩芎藭一兩為粗末每服三錢水一盞煎令泣泣欲干投酒一盞再煎一沸溫服或灌之如人行五里再服不過三五服便效張文仲備急方産難胎死橫生倒生用當歸三兩芎藭一兩為末先以大黑豆炒焦入流水一盞童便一盞煎至一盞分為二服未效再服婦人良方倒産子死不出當歸末酒服方寸匕子母祕録産後血脹腹痛引脅當歸二錢乾薑炮五分為末每服三錢水一盞煎八分入鹽酢少許熱服婦人良方産後腹痛如絞當歸末五錢白蜜一合水一盞煎一盞分為二服未效再服婦人良方産後自汗壯熱氣短腰腳痛不可轉當歸三錢黃耆白芍藥酒炒各二錢生薑五片水一盞半煎七分溫服和劑局方産後中風不省人事口吐涎沫手足瘛瘲當歸荊芥穗等分為末每服三錢水一盞酒少許童尿少許煎七分灌之下咽即有生意神效聖惠方小兒胎寒好啼晝夜不止因此成癇當歸末一小豆大以乳汁灌之日夜三四度肘後方小兒臍濕不早治成臍風或腫赤或出水用當歸末敷之一方入麝香少許一方用胡粉等分試之最驗若愈後因尿入復作再敷即愈聖惠方湯火傷瘡焮赤潰爛用此生肌拔熱止痛當歸黃蠟各一兩麻油四兩以油煎當歸焦黃去滓納蠟攪成膏出火毒攤貼之和劑局方白黃色枯舌縮恍惚若語亂者死當歸白朮二兩水煎入生芣汁蜜和服三十六黃方芎藭音窮穹本經上品釋名胡藭別録川芎綱目香果別録山鞠窮綱目時珍曰芎本作營名義未詳或云人頭穹窿窮高天之象也此藥上行專治頭腦諸疾故有芎藭之名以胡戎者為佳故曰胡芎古人因其根節狀如馬銜謂之馬銜芎藭後世因其狀如雀腦謂之雀腦芎其出關中者呼為京芎亦曰西芎出蜀中者為川芎出天台者為臺芎出江南者為撫芎皆因地而名也左傳楚人謂蕭人曰有麥曲乎有山鞠窮乎河魚腹疾奈何二物皆御濕故以諭之丹溪朱氏治六郁越鞠丸中用越桃鞠窮故以命名金光明經謂之闍莫迦集解別録曰芎藭葉名蘼蕪生武功川穀斜谷西嶺三月四月採根曝乾普曰芎藭或生胡無桃山陰或泰山葉細香青黑紋赤如藁本冬夏叢生五月花赤七月實黑附端兩葉三月採根有節如馬銜弘景曰武功斜谷西嶺俱近長安今出歷陽處處亦有人家多種之葉似蛇床而香節大莖細狀如馬銜謂之馬銜芎藭蜀中亦有而細恭曰今出秦州其歷陽出者不復用其人間種者形塊大重實多脂山中採者瘦細味苦辛以九月十月採之為佳若三月四月虛惡非時也頌曰關陝川蜀江東山中多有之而以蜀川者為勝四五月生葉似水芹胡荽蛇床輩作叢而莖細其葉倍香江東蜀人採葉作飲七八月開碎白花如蛇床子花根堅瘦黃黑色關中出者形塊重實作雀腦狀者為雀腦芎最有力時珍曰蜀地少寒人多栽蒔深秋莖葉亦不萎也清明後宿根生苗分其枝橫埋之則節節生根八月根下始結芎藭乃可掘取蒸曝貨之救荒本草云葉似芹而微細窄有丫叉又似白芷葉亦細又似胡荽葉而微壯一種似蛇床葉而亦粗嫩葉可炸食宗奭曰凡用以川中大塊里色白不油嚼之微辛甘者佳他種不入藥止可為末煎湯沐浴而已根氣味辛溫無毒普曰神農黃帝岐伯雷公辛無毒扁鵲酸無毒李當之生溫熟寒元素曰性溫味辛苦氣厚味薄浮而升陽也少陽本經引經藥入手足厥陰氣分之才曰白芷為之使畏黃連伏雌黃得細辛療金瘡止痛得牡蠣療頭風吐逆主治中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子本經除腦中冷動面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡猝急腫痛脅風痛溫中內寒別録腰腳軟弱半身不遂胞衣不下甄權一切風一切氣一切勞損一切血補五勞壯筋骨調衆脈破癥結宿血養新血吐血鼻血溺血腦癰發背瘰癧癭贅痔瘻瘡疥長肉排膿消瘀血大明搜肝氣補肝血潤肝燥補風虛好古燥濕止瀉痢行氣開鬱時珍蜜和大丸夜服治風痰殊效蘇頌齒根出血含之多瘥弘景發明宗奭曰今人用此最多頭面風不可缺也然須以他藥佐之元素曰川芎上行頭目下行血海故清神及四物湯皆用之能散肝經之風治少陽厥陰經頭痛及血虛頭痛之聖藥也其用有四為少陽引經一也諸經頭痛二也助清陽之氣三也去濕氣在頭四也杲曰頭痛必用川芎如不愈加各引經藥太陽羌活陽明白芷少陽柴胡太陰蒼朮厥陰吳茱萸少陰細辛是也震亨曰郁在中焦須撫芎開提其氣以升之氣升則鬱自降故撫芎總解諸郁直達三焦為通陰陽氣血之使時珍曰芎藭血中氣藥也肝苦急以辛補之故血虛者宜之辛以散之故氣鬱者宜之左傳言麥曲鞠窮御濕治河魚腹疾豫治濕瀉每加二味其應如響也血痢已通而痛不止者乃陰虧氣鬱藥中加芎為佐氣行血調其病立止此皆醫學妙旨圓機之士始可語之宗奭曰沈括筆談云一族子舊服芎藭醫鄭叔熊見之云芎藭不可久服多令人暴死後族子果無疾而卒又朝士張子通之妻病腦風服芎藭甚久一旦暴亡皆目見者此皆單服既久則走散真氣若使他藥佐使又不久服中病便已則焉能至此哉虞搏曰骨蒸多汗及氣弱之人不可久服其性辛散令真氣走泄而陰愈虛也時珍曰五味入胃各歸其本臟久服則增氣偏勝必有偏絶故有暴夭之患若藥具五味備四氣君臣佐使配合得宜豈有此害哉如芎藭肝經藥也若單服既久則辛喜歸肺肺氣偏勝金來賊木肝必受邪久則偏絶豈不夭亡故醫者貴在格物也附方舊七新一十三生犀丸宋真宗賜高相國去痰清目進飲食生犀丸用川芎十兩緊小者粟米泔浸二日換切片子曬乾為末分作兩料每料入麝腦各一分生犀半兩重湯煮蜜和丸小彈子大茶酒嚼下一丸痰加硃砂半兩膈壅加牛黃一分水飛鐵粉一分頭目昏眩加細辛一分口眼喎斜加炮天南星一分御藥院方氣虛頭痛真川芎藭為末臘茶調服二錢甚捷曾有婦人産後頭痛一服即愈集簡方氣厥頭痛婦人氣盛頭痛及産後頭痛川芎藭天台烏藥等分為末每服二錢蔥茶調下御藥院方加白朮水煎服風熱頭痛川芎一錢茶葉二錢水一鍾煎五分食前熱服簡便方頭風化痰川芎洗切曬乾為末煉蜜丸如小彈子大不拘時嚼一丸茶清下經驗後方偏頭風痛京芎細銼浸酒日飲之斗門方風熱上衝頭目運眩或胸中不利川芎槐子各一兩為末每服三錢用茶清調下胸中不利以水煎服張潔古保命集首風旋運及偏正頭疼多汗惡風胸膈痰飲川芎藭一斤天麻四兩為末煉蜜丸如彈子大每嚼一丸茶清下劉河間宣明方失血眩暈方見當歸下一切心痛大芎一個為末燒酒服之一個住一年兩個住二年孫氏集效方經閉驗胎經水三個月不行驗胎法川芎生為末空心煎艾湯服一匙腹內微動者是有胎不動者非也靈苑方損動胎氣因跌撲舉重損胎不安或子死腹中者芎藭為末酒服方寸匕須臾一二服立出續十全方崩中下血晝夜不止千金方用芎藭一兩清酒一大盞煎取五分徐徐進之聖惠加生地黃汁二合同煎酒癖脅脹時復嘔吐腹有水聲川芎藭三稜炮各一兩為末每服二錢蔥白湯下聖濟總録小兒腦熱好閉目或太陽痛或目赤腫川芎藭薄荷朴硝各二錢為末以少許吹鼻中全幼心鑑齒敗口臭水煎芎藭含之廣濟方牙齒疼痛大川芎藭一個入舊糟內藏一月取焙入細辛同研末揩牙本事方諸瘡腫痛撫芎煅研入輕粉麻油調塗普濟方産後乳懸婦人産後兩乳忽長細小如腸垂過小肚痛不可忍危亡須臾名曰乳懸將芎藭當歸各一斤以半斤銼散於瓦石器內用水濃煎不拘多少頻服仍以一斤半銼塊於病人桌下燒煙令將口鼻吸烟用盡未愈再作一料仍以萆麻子一粒貼其頂心夏子益奇疾方蘼蕪本經上品釋名薇蕪本經蘄茝爾雅江蘺別録頌曰蘄茝古芹芷字也時珍曰蘼蕪一作蘪蕪其莖葉靡弱而繁蕪故以名之當歸名蘄白芷名蘺其葉似當歸其香似白芷故有蘄茝江蘺之名王逸云蘺草生江中故曰江蘺是也余見下集解別録曰芎藭葉名蘼蕪又曰蘼蕪一名江蘺芎藭苗也生雍州川澤及冤句四月五月採葉曝乾弘景曰今出歷陽處處人家多種之葉似蛇床而香騷人藉以為譬方藥稀用恭曰此有二種一種似芹葉一種似蛇床香氣相似用亦不殊時珍曰別録言蘼蕪一名江蘺芎藭苗也而司馬相如子虛賦稱芎藭菖蒲江蘺蘼蕪上林賦云被以江蘺揉以蘼蕪似非一物何耶蓋嫩苗未結根時則為蘼蕪既結根後乃為芎藭大葉似芹者為江蘺細葉似蛇床者為蘼蕪如此分別自明白矣淮南子云亂人者若芎藭之與藁本蛇床之與蘼蕪亦指細葉者言也廣志云蘼蕪香草可藏衣中管子云五沃之土生蘼蕪郭璞贊云蘼蕪香草亂之蛇床不損其真自烈以芳又海中苔發亦名江蘺與此同名耳氣味辛溫無毒主治咳逆定驚氣辟邪惡除蠱毒鬼疰去三蟲久服通神本經主身中老風頭中久風風眩別録作飲止泄瀉蘇頌花主治入面脂用時珍蛇床本經上品釋名蛇粟本經蛇米本經虺床爾雅馬床廣雅牆蘼別録又名思益繩毒棗棘時珍曰蛇虺喜臥於下食其子故有蛇床蛇粟諸名其葉似蘼蕪故曰牆蘼爾雅云盱虺床也集解別録曰蛇床生臨淄川穀及田野五月採實陰乾弘景曰田野墟落甚多花葉正似蘼蕪保升曰葉似小葉芎藭花白子如黍粒黃白色生下濕地所在皆有以揚州襄州者為良頌曰三月生苗高三二尺葉青碎作叢似蒿枝每枝上有花頭百餘結同一窠似馬芹類四五月乃開白色又似傘狀子黃褐色如黍米至輕虛時珍曰其花如碎米攢簇其子兩片合成似蒔羅子而細亦有細稜凡花實似蛇床者當歸芎藭水芹藁本胡蘿蔔是也子修治斆曰凡使須用濃藍汁並百部草根自然汁同浸一伏時漉出曬乾卻用生地黃汁相拌蒸之從巳至亥取出曬乾用大明曰凡服食即挼去皮殼取仁微炒殺毒即不辣也作湯洗浴則生用之氣味苦平無毒別録曰辛甘無毒權曰有小毒之才曰惡牡丹貝母巴豆伏硫黃主治婦人陰中腫痛男子陰痿濕癢除痹氣利關節癲癇惡瘡久服輕身本經溫中下氣令婦人子臟熱男子陰強久服好顏色令人有子別録治男子女人虛濕痹毒風𤸷痛去男子腰痛浴男子陰去風冷大益陽事甄權暖丈夫陽氣助女人陰氣治腰胯痠疼四肢頑痹縮小便去陰汗濕癬齒痛赤白帶下小兒驚癇撲損瘀血煎湯浴大風身癢大明發明斆曰此藥令人陽氣盛數號曰鬼考也時珍曰蛇床乃右腎命門少陽三焦氣分之藥神農列之上品不獨輔助男子而又有益婦人世人舍此而求補藥於遠域豈非賤目貴耳乎附方舊四新十二陽事不起蛇床子五味子菟絲子等分為末蜜丸梧子大每服三十丸溫酒下日三服千金方赤白帶下月水不來用蛇床子枯白礬等分為末醋麵糊丸彈子大胭脂為衣綿裹納入陰戶如熱極再換日一次儒門事親方子宮寒冷溫陰中坐藥蛇床子散取蛇床子仁為末入粉少許和勻如棗大綿裹納之自然溫也金匱玉函方婦人陰癢蛇床子一兩白礬二錢煎湯頻洗集簡方産後陰脫絹盛蛇床子蒸熱尉之又法蛇床子五兩烏梅十四個煎水日洗五六次千金方婦人陰痛方同上男子陰腫脹痛蛇床子末雞子黃調敷之永類方大腸脫肛蛇床子甘草各一兩為末每服一錢白湯下日三服並以蛇床末敷之經驗方痔瘡腫痛不可忍蛇床子煎湯熏洗簡便方小兒癬瘡蛇床子杵末和豬脂塗之千金方小兒甜瘡頭面耳邊連引流水極癢久久不愈者蛇床子一兩輕粉三錢為細末油調搽之普濟方耳內濕瘡蛇床子黃連各一錢輕粉一字為末吹之全幼心鑑風蟲牙痛千金用蛇床子燭燼同研塗之集簡方用蛇床子煎湯乘熱漱數次立止冬月喉痹腫痛不可下藥者蛇床子燒煙於瓶中口含瓶嘴吸烟其痰自出聖惠方藁本本經中品釋名藁茇綱目鬼卿本經地新本經微莖別録恭曰根上苗下似禾藁故名藁本本根也時珍曰古人香料用之呼為藁本香山海經名藁茇集解別録曰藁本生崇山山谷正月二月採根曝乾三十日成弘景曰俗中皆用芎藭根鬚其形氣乃相類而桐君藥録說芎藭苗似藁本論說花實皆不同所生處又異今東山別有藁本形氣甚相似惟長大耳恭曰藁本莖葉根味與芎藭小別今出宕州者佳頌曰今西川河東州郡及兗州杭州皆有之葉似白芷香又似芎藭但芎藭似水芹而大藁本葉細爾五月有白花七八月結子根紫色時珍曰江南深山中皆有之根似芎藭而輕虛味麻不堪作飲也根氣味辛溫無毒別録曰微寒權曰微溫元素曰氣溫味苦大辛無毒氣厚味薄升也陽也足太陽本經藥之才曰惡䕡茹畏青葙子主治婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色本經闢霧露潤澤療風邪嚲曳金瘡可作沐藥面脂別録治一百六十種惡風鬼疰流入腰痛冷能化小便通血去頭風䵟疱甄權治皮膚疵皯酒齇粉刺癇疾大明治太陽頭痛巔頂痛大寒犯腦痛連齒頰元素頭面身體皮膚風濕李杲督脈為病脊強而厥好古治癰疽排膿內塞時珍發明元素曰藁本乃太陽經風藥其氣雄壯寒氣鬱於本經頭痛必用之藥巔頂痛非此不能除與木香同用治霧露之清邪中於上焦與白芷同作面脂既治風又治濕亦各從其類也時珍曰邵氏聞見録云夏英公病泄太醫以虛治不效霍翁曰風客於胃也飲以藁本湯而止蓋藁本能去風濕故耳附方新三大實心痛以用利藥用此徹其毒藁本半兩蒼朮一兩作二服水二鍾煎一鍾溫服活法機要乾洗頭屑藁本白芷等分為末夜擦旦梳垢自去也便民圖纂小兒疥癬藁本煎湯浴之並以浣衣保幼大全實主治風邪流入四肢別録附録徐黃別録有名未用曰味辛平無毒主心腹積瘕莖主惡瘡生澤中大莖細葉香如藁本蜘蛛香綱目集解時珍曰蜘蛛香出蜀西茂州松潘山中草根也黑色有粗須狀如蜘蛛及藁本芎藭氣味芳香彼人亦重之或云貓喜食之根氣味辛溫無毒主治闢瘟疫中惡邪精鬼氣尸疰時珍白芷本經中品釋名白茝音止又昌海切芳香本經澤芬別録苻蘺別録䖀許驕切莞音官葉名蒚麻音力藥音約時珍曰徐鍇云初生根干為芷則白芷之義取乎此也王安石字說云茝香可以養鼻又可養體故茝字從臣臣音怡養也許慎說文云晉謂之䖀齊謂之茝楚謂之蘺又謂之藥生於下澤芬芳與蘭同德故騷人以蘭茝為詠而本草有芬香澤芬之名古人謂之香白芷云集解別録曰白芷生河東川穀下澤二月八月採根曝乾弘景曰今處處有之東間甚多葉可合香頌曰所在有之吳地尤多根長尺余粗細不等白色枝幹去地五寸以上春生葉相對婆娑紫色闊三指許花白微黃入伏後結子立秋後苗枯二月八月採根曝乾以黃澤者為佳斆曰凡採勿用四條一處生者名喪公藤又勿用馬蘭根根修治斆曰採得刮去土皮細銼以黃精片等分同蒸一伏時曬乾去黃精用時珍曰今人採根洗刮寸截以石灰拌勻曬收為其易蛀並欲色白也入藥微焙氣味辛溫無毒元素曰氣溫味苦大辛氣味俱輕陽也手陽明引經本藥同升麻則通行手足陽明經亦入手太陰經之才曰當歸為之使惡旋覆花制雄黃硫黃主治女人漏下赤白血閉陰腫寒熱頭風侵目淚出長肌膚潤澤顏色可作面脂本經療風邪久渴吐嘔兩脅滿風痛頭眩目癢可作膏藥別録治目赤弩肉去面皯疵瘢補胎漏滑落破宿血補新血乳癰發背瘰癧腸風痔瘻瘡痍疥癬止痛排膿大明能蝕膿止心腹血刺痛女人瀝血腰痛血崩甄權解利手陽明頭痛中風寒熱及肺經風熱頭面皮膚風痹燥癢元素治鼻淵鼻衄齒痛眉稜骨痛大腸風祕小便去血婦人血風眩運翻胃吐食解砒毒蛇傷刀箭金瘡時珍發明杲曰白芷療風通用其氣芳香能通九竅表汗不可缺也劉完素曰治正陽明頭痛熱厥頭痛加而用之好古曰同辛夷細辛用治鼻病入內托散用長肌肉則入陽明可知矣時珍曰白芷色白味辛行手陽明庚金性溫氣厚行足陽明戊土芳香上達入手太陰肺經肺者庚之弟戊之子也故所主之病不離三經如頭目眉齒諸病三經之風熱也如漏帶癰疽諸病三經之濕熱也風熱者辛以散之濕熱者溫以除之為陽明主藥故又能治血病胎病而排膿生肌止痛按王璆百一選方云王定國病風頭痛至都梁求名醫楊介治之連進三丸即時病失懇求其方則用香白芷一味洗曬為末煉蜜丸彈子大每嚼一丸以茶清或荊芥湯化下遂命名都梁丸其藥治頭風眩運女人胎前産後傷風頭痛血風頭痛皆效戴原禮要訣亦云頭痛挾熱項生磊塊者服之甚宜又臞仙神隱書言種白芷能闢蛇則夷堅志所載治腹蛇傷之方亦制以所畏也而本草不曾言及宗奭曰藥性論言白芷能蝕膿今人用治帶下腸有敗膿淋露不已腥穢殊甚遂致臍腹冷痛皆由敗膿血所致須此排膿白芷一兩單葉紅蜀葵根二兩白芍藥白枯礬各半兩為末以蠟化丸梧子大每空心及飯前米飲下十丸或十五丸俟膿盡乃以他藥補之附方舊一新三十四一切傷寒神白散又名聖僧散治時行一切傷寒不問陰陽輕重老少男女孕婦皆可服之用白芷一兩生甘草半兩姜三片蔥白三寸棗一枚豉五十粒水二碗煎服取汗不汗再服病至十餘日未得汗者皆可服之此藥可卜人之好惡也如煎得黑色或誤打翻即難愈如煎得黃色無不愈者煎時要至誠忌婦人雞犬見衛生家寶方一切風邪方同上風寒流涕香白芷一兩荊芥穗一錢為末蠟茶點服二錢百一選方小兒流涕是風寒也白芷末蔥白搗丸小豆大每茶下二十丸仍以白芷末薑汁調塗太陽穴乃食熱蔥粥取汗聖惠方小兒身熱白芷煮湯浴之取汗避風子母祕録頭面諸風香白芷切以蘿蔔汁浸透曬乾為末每服二錢白湯下或以搐鼻直指方偏正頭風百藥不治一服便可天下第一方也香白芷炒二兩五錢川芎炒甘草炒川烏頭半生半熟各一兩為末每服一錢細茶薄荷湯調下談野翁試效方頭風眩運都梁丸見發明下眉稜骨痛屬風熱與痰白芷片芩酒炒等分為末每服二錢茶清調下丹溪纂要風熱牙痛香白芷一錢硃砂五分為末蜜丸芡子大頻用擦牙此乃濠州一村婦以醫人者廬州郭醫云絶勝他藥也或以白芷吳茱萸等分浸水漱涎醫林集要一切眼疾白芷雄黃為末煉蜜丸龍眼大硃砂為衣每服一丸食後茶下日二服名還睛丸普濟方口齒氣臭百一選方用香白芷七錢為末食後井水服一錢濟生方用白芷川芎等分為末蜜丸芡子大日噙之盜汗不止太平白芷一兩辰砂半兩為末每服二錢溫酒下屢驗朱氏集驗方血風反胃香白芷一兩切片瓦炒黃為末用豬血七片沸湯泡七次蘸末食之日一次婦人良方腳氣腫痛白芷芥子等分為末薑汁和塗之效醫方摘要婦人白帶白芷四兩以石灰半斤淹三宿去灰切片炒研末酒服二錢日二服醫學集成婦人難産白芷五錢水煎服之唐瑤經驗胎前産後烏金散治胎前産後虛損月經不調崩漏及橫生逆産用白芷百草霜等分為末以沸湯入童子小便同醋調服二錢丹溪加滑石以芎歸湯調之普濟方大便風祕香白芷炒為末每服二錢米飲入蜜少許連進二服十便良方小便氣淋結澀不通白芷醋浸焙乾二兩為末煎木通甘草酒調下一錢連進二服普濟方鼻衄不止就以所出血調白芷末塗山根立止簡便方小便出血白芷當歸等分為末米飲每服二錢經驗方腸風下血香白芷為末每服二錢米飲下神效余居士選奇方痔漏出血方同上並煎湯熏洗直指方痔瘡腫痛先以皂角煙燻之後以鵝膽汁調白芷末塗之即消醫方摘要腫毒熱痛醋調白芷末敷之衛生易簡方乳癰初起白芷貝母各二錢為末溫酒服之祕傳外科方疔瘡初起白芷一錢生薑一兩擂酒一盞溫服取汗即散此陳指揮方也袖珍方癰疽赤腫白芷大黃等分為末米飲服二錢經驗方小兒丹瘤遊走入腹必死初發急以截風散截之白芷寒水石為末生蔥汁調塗全幼心鑑刀箭傷瘡香白芷嚼爛塗之集簡方解砒石毒白芷末井水服二錢事林廣記諸骨哽咽白芷半夏等分為末水服一錢即嘔出普濟方毒蛇傷螫臨川有人被蝮傷即昏死一臂如股少頃遍身皮脹黃黑色一道人以新汲水調香白芷末一斤灌之覺臍中搰搰然黃水自口出腥穢逆人良久消縮如故云以麥門冬湯調尤妙仍以末搽之又經山寺僧為蛇傷一腳潰爛百藥不愈一遊僧以新水數洗淨腐敗見白筋挹干以白芷末入膽礬麝香少許摻之惡水湧出日日如此一月平復洪邁夷堅志葉主治作浴湯去尸蟲別録浴丹毒癮疹風瘙時珍附方新一小兒身熱白芷苗苦參等分煎漿水入鹽少許洗之衛生總微論芍藥芍音杓又音勺本經中品釋名將離綱目犁食別録白朮別録余容別録鋌別録白者名金芍藥圖經赤者名木芍藥時珍曰芍藥猶婥約也婥約美好貌此草花容婥約故以為名羅願爾雅翼言制食之毒莫良於芍故得藥名亦通鄭風詩云伊其相謔贈之以芍藥韓詩外傳云芍藥離草也董子云芍藥一名將離故將別贈之俗呼其花之千葉者為小牡丹赤者為木芍藥與牡丹同名也集解別録曰芍藥生中嶽川穀及丘陵二月八月採根曝乾弘景曰今出白山蔣山茅山最好白而長尺許余處亦有而多赤赤者小利志曰此有赤白兩種其花亦有赤白二色頌曰今處處有之淮南者勝春生紅芽作叢莖上三枝五葉似牡丹而狹長高一二尺夏初開花有紅白紫數種結子似牡丹子而小秋時採根崔豹古今注云芍藥有二種有草芍藥木芍藥木者花大而色深俗呼為牡丹非矣安期生服煉法芍藥有金芍藥色白多脂肉木芍藥色紫瘦多脈承曰本經芍藥生丘陵今世多用人家種植者乃欲其花葉肥大必加糞壤每歲八九月取根分削因利以為藥今淮南真陽尤多根雖肥大而香味不佳入藥少效時珍曰昔人言洛陽牡丹揚州芍藥甲天下今藥中所用亦多取揚州者十月生芽至春乃長三月開花其品凡三十餘種有千葉單葉樓子之異入藥宜單葉之根氣味全厚根之赤白隨花之色也根修治斆曰凡採得竹刀刮去皮並頭土銼細以蜜水拌蒸從巳至未曬乾用時珍曰今人多生用惟避中寒者以酒炒入女人血藥以醋炒耳氣味苦平無毒別録曰酸微寒有小毒普曰神農苦桐君甘無毒岐伯咸雷公酸李當之小寒元素曰性寒味酸氣厚味薄升而微降陽中陰也杲曰白芍藥酸平有小毒可升可降陰也好古曰味酸而苦氣薄味厚陰也降也為手足太陰行經藥入肝脾血分之才曰須丸為之使惡石斛芒硝畏硝石鱉甲小薊反藜蘆禹錫曰別本須丸作雷丸時珍同白朮補脾同芎藭瀉肝同人參補氣同當歸補血以酒炒補陰同甘草止腹痛同黃連止瀉痢同防風發痘疹同薑棗溫經散濕主治邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣本經通順血脈緩中散惡血逐賊血去水氣利膀胱大小腸消癰腫時行寒熱中惡腹痛腰痛別録治臟腑壅氣強五臟補腎氣治時疾骨熱婦人血閉不通能蝕膿甄權女人一切病胎前産後諸疾治風補勞退熱除煩益氣驚狂頭痛目赤明目腸風瀉血痔瘻發背瘡疥大明瀉肝安脾肺收胃氣止瀉利固腠理和血脈收陰氣斂逆氣元素理中氣治脾虛中滿心下痞脅下痛善噫肺急脹逆喘咳太陽鼽衄目澀肝血不足陽維病苦寒熱帶脈病苦腹痛滿腰溶溶如坐水中好古止下痢腹痛後重時珍發明志曰赤者利小便下氣白者止痛散血大明曰赤者補氣白者補血弘景曰赤者小利俗方以止痛不減當歸白者道家亦服食之及煮石用成無己曰白補而赤瀉白收而赤散酸以收之甘以緩之故酸甘相合用補陰血收逆氣而除肺燥又云芍藥之酸斂津液而益營血收陰氣而泄邪熱元素曰白補赤散瀉肝補脾胃酒浸行經止中部腹痛與姜同用溫經散濕通塞利腹中痛胃氣不通白芍入脾經補中焦乃下利必用之藥蓋瀉利皆太陰病故不可缺此得炙甘草為佐治腹中痛夏月少加黃芩惡寒加桂此仲景神方也其用凡六安脾經一也治腹痛二也收胃氣三也止瀉痢四也和血脈五也固腠理六也宗奭曰芍藥須用單葉紅花者為佳然血虛寒人禁之古人云減芍藥以避中寒誠不可忽震亨曰芍藥瀉脾火性味酸寒冬月必以酒炒凡腹痛多是血脈凝澀亦必酒炒用然止能治血虛腹痛余並不治為其酸寒收斂無溫散之功也下痢腹痛必炒用後重者不炒産後不可用者以其酸寒伐生髮之氣也必不得已亦酒炒用之時珍曰白芍藥益脾能於土中瀉木赤芍藥散邪能行血中之滯日華子言赤補氣白治血缺審矣産後肝血已虛不可更瀉故禁之酸寒之藥多矣何獨避芍藥耶以此頌曰張仲景治傷寒多用芍藥以其主寒熱利小便故也杲曰或言古人以酸澀為收本經何以言利小便曰芍藥能益陰滋濕而停津液故小便自行非因通利也曰又言緩中何也曰損其肝者緩其中即調血也故四物湯用芍藥大抵酸澀者為收斂停濕之劑故主手足太陰經收斂之體又能治血海而入於九地之下後至厥陰經白者色在西方故補赤者色在南方故瀉附方舊六新一十服食法頌曰安期生服煉芍藥法云芍藥有二種救病用金芍藥色白多脂肉其木芍藥色紫瘦多脈若取審看勿令差錯凡採得淨洗去皮以東流水煮百沸陰乾停三日又於木甑內蒸之上覆以淨黃土一日夜熟出陰乾搗末以麥飲或酒服三錢匕日三服滿三百日可以登嶺絶谷不飢圖經本草腹中虛痛白芍藥三錢炙甘草一錢夏月加黃芩五分惡寒加肉桂一錢冬月大寒再加桂一錢水二盞煎一半溫服潔古用藥法象風毒骨痛在髓中芍藥二分虎骨一兩炙為末夾絹袋盛酒三升漬五日每服三合日三服經驗後方腳氣腫痛白芍藥六兩甘草一兩為末白湯點服事林廣記消渴引飲白芍藥甘草等分為末每用一錢水煎服日三服鄂渚辛祐之患此九年服藥止而復作蘇朴授此方服之七日頓愈古人處方殆不可曉不可以平易而忽之也陳日華經驗方小便五淋赤芍藥一兩檳榔一個麵裹煨為末每服一錢水一盞煎七分空心服博濟方衄血不止赤芍藥為末水服二錢匕事林廣記衄血咯血白芍藥一兩犀角末二錢半為末新水服一錢匕血止為限古今録驗崩中下血小腹痛甚者芍藥一兩炒黃色柏葉六兩微炒每服二兩水一升煎六合入酒五合再煎七合空心分為兩服亦可為末酒服二錢聖惠方經水不止白芍藥香附子熟艾葉各一錢半水煎服之熊氏補遺血崩帶下赤芍藥香附子等分為末每服二錢鹽一捻水一盞煎七分溫服日二服十服見效名如神散良方赤白帶下年深月久不瘥者取白芍藥三兩並乾薑半兩銼熬令黃搗末空心水飲服二錢匕日再服廣濟方只用芍藥炒黑研末酒服之貞元廣利方金瘡血出白芍藥一兩熬黃為末酒或米飲服二錢漸加之仍以末敷瘡上即止良驗廣利方痘瘡脹痛白芍藥為末酒服半錢匕痘疹方木舌腫滿塞口殺人紅芍藥甘草煎水熱漱聖濟總録魚骨哽咽白芍藥嚼細咽汁事林廣記牡丹本經中品釋名鼠姑本經鹿韭本經百兩金唐本木芍藥綱目花王時珍曰牡丹以色丹者為上雖結子而根上生苗故謂之牡丹唐人謂之木芍藥以其花似芍藥而宿干似木也群花品中以牡丹第一芍藥第二故世謂牡丹為花王芍藥為花相歐陽修花譜所載凡三十餘種其名或以地或以人或以色或以異詳見本書集解別録曰牡丹生巴郡山谷及漢中二月八月採根陰乾弘景曰今東間亦有色赤者為好恭曰生漢中劍南苗似羊桃夏生白花秋實圓緑冬實赤色凌冬不凋根似芍藥肉白皮丹土人謂之百兩金長安謂之吳牡丹者是真也今俗用者異於此別有臊氣也炳曰今出合州者佳和州宣州者並良白者補赤者利大明曰此便是牡丹花根也巴蜀渝合州者上海鹽者次之頌曰今丹延青越滁和州山中皆有但花有黃紫紅白數色此當是山牡丹其莖梗枯燥黑白色二月於梗上生苗葉三月開花其花葉與人家所種者相似但花瓣止五六葉爾五月結子黑色如雞頭子大根黃白色可長五七寸大如筆管近世人多貴重欲其花之詭異皆秋冬移接培以壤土至春盛開其狀百變故其根性殊失本真藥中不可用此絶無力也宗奭曰牡丹花亦有緋者深碧色者惟山中單葉花紅者根皮入藥為佳市人或以枝梗皮充之尤謬時珍曰牡丹惟取紅白單瓣者入藥其千葉異品皆人巧所致氣味不純不可用花譜載丹州延州以西及褒斜道中最多與荊棘無異土人取以為薪其根入藥尤妙凡栽花者根下著白蘞末闢蟲穴中點硫黃殺蠹以烏賊骨針其樹必枯此物性亦不可不知也根皮修治斆曰凡採得根曬乾以銅刀劈破去骨銼如大豆許用清酒拌蒸從巳至未曬乾用氣味辛寒無毒別録曰苦微寒普曰神農岐伯辛雷公桐君苦無毒黃帝苦有毒好古曰氣寒味苦辛陰中微陽入手厥陰足少陰經之才畏貝母大黃菟絲子大明曰忌蒜胡荽伏砒主治寒熱中風瘛瘲驚癇邪氣除症堅瘀血留舍腸胃安五臟療癰瘡本經除時氣頭痛客熱五勞勞氣頭腰痛風噤癩疾別録久服輕身益壽吳普治冷氣散諸痛女子經脈不通血瀝腰痛甄權通關腠血脈排膿消撲損瘀血續筋骨除風痹落胎下胞産後一切冷熱血氣大明治神志不足無汗之骨蒸衄血吐血元素和血生血涼血治血中伏火除煩熱時珍發明元素曰牡丹乃天地之精為群花之首葉為陽發生也花為陰成實也丹者赤色火也故能瀉陰胞中之火四物湯加之治婦人骨蒸又曰牡丹皮入手厥陰足少陰故治無汗之骨蒸地骨皮入足少陰手少陽故治有汗之骨蒸神不足者手少陰志不足者足少陰故仲景腎氣丸用之治神志不足也又能治腸胃積血及吐血衄血必用之藥故犀角地黃湯用之杲曰心虛腸胃積熱心火熾甚心氣不足者以牡丹皮為君時珍曰牡丹皮治手足少陰厥陰四經血分伏火蓋伏火即陰火也陰火即相火也古方惟以此治相火故仲景腎氣丸用之後人乃專以黃柏治相火不知牡丹之功更勝也此乃千載祕奧人所不知今為拈出赤花者利白花者補人亦罕悟宜分別之附方舊三新三㿗疝偏墜氣脹不能動者牡丹皮防風等分為末酒服二錢甚效千金方婦人惡血攻聚上面多怒牡丹皮半兩乾漆燒煙盡半兩水二鍾煎一鍾服諸證辨疑傷損瘀血牡丹皮二兩虻蟲二十一枚熬過同搗末每旦溫酒服方寸匕血當化為水下貞元廣利方金瘡內漏血不出牡丹皮為末水服三指撮立尿出血也千金方下部生瘡以決洞者牡丹末湯服方寸匕日三服肘後方解中蠱毒牡丹根搗末服一錢匕日三服外臺祕要附録鼠姑別録曰味苦平無毒主咳逆上氣寒熱鼠瘻惡瘡邪氣一名𧸗生丹水弘景曰今人不識而牡丹一名鼠姑鼠婦亦名鼠姑未知孰是木香本經上品釋名蜜香別録青木香弘景五木香圖經南木香綱目時珍曰木香草類也本名蜜香因其香氣如蜜也緣沉香中有蜜香遂訛此為木香爾昔人謂之青木香後人因呼馬兜鈴根為青木香乃呼此為南木香廣木香以別之今人又呼一種薔薇為木香愈亂真矣三洞珠囊云五香者即青木香也一株五根一莖五枝一枝五葉葉間五節故名五香燒之能上徹九天也古方治癰疽有五香連翹湯內用青木香古樂府云氍毹𣯚𣰆五木香皆指此也頌曰修養書云正月一日取五木煮湯以浴令人至老鬚髮黑徐鍇注云道家謂青木香為五香亦云五木多以為浴是矣金光明經謂之矩琵他香集解別録曰木香生永昌山谷弘景曰此即青木香也永昌不復貢今多從外國舶上來乃云出大秦國今皆以合香不入藥用恭曰此有二種當以崑崙來者為佳西胡來者不善葉似羊蹄而長大花如菊花結實黃黑所在亦有之功用極多陶云不入藥用非也權曰南州異物志云青木香出天竺是草根狀如甘草也頌曰今惟廣州舶上來他無所出根窠大類茄子葉似羊蹄而長大亦有葉如山藥而根大開紫花者不拘時月採根芽為藥以其形如枯骨味苦黏牙者為良江淮間亦有此種名土青木香不堪藥用蜀本草言孟昶苑中亦嘗種之云苗高三四尺葉長八九寸皺軟而有毛開黃花恐亦是土木香種也斆曰其香是蘆蔓根條左盤旋採得二十九日方硬如朽骨其有蘆頭丁蓋子色青者是木香神也宗奭曰常自岷州出塞得青木香持歸西洛葉如牛蒡但狹長莖高二三尺花黃一如金錢其根即香也生嚼極辛香尤行氣承曰木香今多從外國來陶說為是蘇頌圖經所載廣州者乃是木類又載滁州海州者乃是馬兜鈴根治療冷熱殊不相似皆誤圖耳時珍曰木香南方諸地皆有一統志云葉類絲瓜冬月取根曬乾根修治時珍曰凡入理氣藥只生用不見火若實大腸宜麵煨熟用氣味辛溫無毒元素曰氣熱味辛苦氣味俱厚沉而降陰也杲曰苦甘辛微溫降也陰也好古曰辛苦熱味厚於氣陰中陽也主治邪氣闢毒疫溫鬼強志主淋露久服不夢寤魘寐本經消毒殺鬼精物溫瘧蠱毒氣劣氣不足肌中偏寒引藥之精別録治心腹一切氣膀胱冷痛嘔逆反胃霍亂泄瀉痢疾健脾消食安胎大明九種心痛積年冷氣痃癖症塊脹痛壅氣上衝煩悶羸劣女人血氣刺心痛不可忍末酒服之甄權散滯氣調諸氣和胃氣泄肺氣元素行肝經氣煨熟實大腸震亨治衝脈為病逆氣裡急主脬滲小便祕好古發明弘景曰青木香大秦國人以療毒腫消惡氣有驗今惟制蛀蟲丸用之常以煮汁沐浴大佳宗奭曰木香專泄決胸腹間滯塞冷氣他則次之得橘皮肉豆蔻生薑相佐使絶佳效尤速元素曰木香除肺中滯氣若治中下二焦氣結滯及不轉運須用檳榔為使震亨曰調氣用木香其味辛氣能上升如氣鬱不達者宜之若陰火衝上者則反助火邪當用黃柏知母而少以木香佐之好古曰本草云主氣劣氣不足補也通壅氣導一切氣破也安胎健脾胃補也除痃癖症塊破也其不同如此潔古張氏但言調氣不言補也機曰與補藥為佐則補與泄藥為君則泄也時珍曰木香乃三焦氣分之藥能升降諸氣諸氣膹郁皆屬於肺故上焦氣滯用之者乃金鬱則泄之也中氣不運皆屬於脾故中焦氣滯宜之者脾胃喜芳香也大腸氣滯則後重膀胱氣不化則癃淋肝氣鬱則為痛故下焦氣滯者宜之乃塞者通之也權曰隋書言樊子蓋為武威太守車駕入吐谷渾子蓋以彼多瘴氣獻青木香以御霧露之邪頌曰續傳信方著張仲景青木香丸主陽衰諸不足用崑崙青木香六路訶子皮各二十兩搗篩糖和丸梧桐子大每空腹酒下三十丸日再其效尤速鄭駙馬去沙糖用白蜜加羚羊角十二兩用藥不類古方而云仲景不知何從而得也附方舊二新一十八中氣不省閉目不語如中風狀南木香為末冬瓜子煎湯灌下三錢痰盛者加竹瀝薑汁濟生方氣脹懶食即青木香丸見發明下熱者牛乳下冷者酒下聖惠方心氣刺痛青木香一兩皂角炙一兩為末糊丸梧子大每湯服五十丸甚效攝生方一切走注氣痛不和廣木香溫水磨濃汁入熱酒調服簡便方內釣腹痛木香乳香沒藥各五分水煎服之阮氏小兒方小腸疝氣青木香四兩酒三斤煮過每日飲三次孫天仁集效方氣滯腰痛青木香乳香各二錢酒浸飯上蒸均以酒調服聖惠方耳猝聾閉崑崙真青木香一兩切以苦酒浸一夜入胡麻油一合微火煎三上三下以綿濾去滓日滴三四次以愈為度外臺祕要耳內作痛木香末以蔥黃染鵝脂蘸末深納入耳中聖濟録霍亂轉筋腹痛木香末一錢木瓜汁一盞入熱酒調服聖濟總録一切下痢不拘丈夫婦人小兒木香一塊方圓一寸黃連半兩二味用水半升同煎乾去黃連薄切木香焙乾為末分作三服第一服橘皮湯下二服陳米飲下三服甘草湯下此乃李景純所傳有一婦人久痢將死夢中觀音授此方服之而愈也孫兆祕寶方香連丸方方見黃連下腸風下血木香黃連等分為末入肥豬大腸內兩頭扎定煮極爛去藥食腸或連藥搗為丸服劉松石保壽堂方小便渾濁如精狀木香沒藥當歸等分為末以刺棘心自然汁和丸梧子大每食前鹽湯下三十丸普濟方小兒陰腫小兒陽明經風熱濕氣相搏陰莖無故腫或痛縮宜寬此一經自愈廣木香枳殼麩炒二錢半炙甘草二錢水煎服曾氏小兒方小兒天行壯熱頭痛木香六分白檀香三分為末清水和服仍溫水調塗囟頂上取瘥聖惠方天行發斑赤黑色青木香二兩水二升煮一升服外臺祕要一切癰疽瘡癤疳瘻惡瘡下疰臁瘡潰後外傷風寒惡汁臭敗不斂並主之木香黃連檳榔等分為末油調頻塗之取效和劑局方惡蛇虺傷青木香不拘多少煎水服效不可述袖珍方腋臭陰濕凡腋下陰下濕臭或作瘡青木香以好醋浸夾於腋下陰下為末敷之外臺祕要牙齒疼痛青木香末入麝香少許揩牙鹽湯漱之聖濟録甘松香宋開寶釋名苦彌哆音扯時珍曰産於川西松州其味甘故名金光明經謂之苦彌哆集解志曰廣志云甘松出姑臧涼州諸山細葉引蔓叢生可合諸香及裛衣頌曰今黔蜀州郡及遼州亦有之叢生山野葉細如茅草根極繁密八月採之作湯浴令人身香根氣味甘溫無毒好古曰平主治惡氣猝心腹痛滿下氣開寶黑皮䵟𪒟風疳齒䘌野雞痔得白芷附子良藏器理元氣去氣鬱好古腳氣膝浮煎湯淋洗時珍發明時珍曰甘松芳香能開脾郁少加入脾胃藥中甚醒脾氣杜寶拾遺録云壽禪師妙醫術作五香飲更加別藥止渴兼補益最妙一沉香飲二丁香飲三檀香飲四澤蘭飲五甘松飲也附方新四勞瘵熏法甘松六兩玄參一斤為末每日焚之奇效方風疳蟲牙蝕肉至盡甘松膩粉各二錢半蘆薈半兩豬腎一對切炙為末夜漱口後貼之有涎吐出聖濟總録腎虛齒痛甘松硫黃等分為末泡湯漱之神效經效濟世方面䵟風瘡香附子甘松各四兩黑牽牛半斤為末日用洗面婦人良方山奈綱目釋名山辣綱目三奈時珍曰山奈俗訛為三奈又訛為三賴皆土音也或云本名山辣南人舌音呼山為三呼辣如賴故致謬誤其說甚通集解時珍曰山奈生廣中人家栽之根葉皆如生薑作樟木香氣土人食其根如食姜切斷曝乾則皮赤黃色肉白色古之所謂廉姜恐其類也段成式酉陽雜俎云奈只出拂林國苗長三四尺根大如鴨卵葉似蒜中心抽條甚長莖端有花六出紅白色花心黃赤不結子其草冬生夏死取花壓油塗身去風氣按此說頗似山奈故附之根氣味辛溫無毒主治暖中闢瘴癘惡氣治心腹冷氣痛寒濕霍亂風蟲牙痛入合諸香用時珍附方新六一切牙痛三奈子一錢麵包煨熟入麝香二字為末隨左右㗜一字入鼻內口含溫水漱去神效名海上一字散普濟方風蟲牙痛仁存方用山奈為末鋪紙上卷作筒燒燈吹滅乘熱和藥吹入鼻內痛即止攝生方用肥皂一個去穰入山奈甘松各三分花椒食鹽不拘多少填滿麵包煅紅取研日用擦牙漱去面上雀斑三奈子鷹糞密陀僧萆麻子等分研勻以乳汁調之夜塗旦洗去醒頭去屑三奈甘松香零陵香一錢樟腦二分滑石半兩為末夜擦旦篦去水云録心腹冷痛三奈丁香當歸甘草等分為末醋糊丸梧子大每服三十丸酒下集簡方廉姜拾遺釋名姜匯綱目蔟葰音族綏集解弘景曰杜若苗似廉姜藏器曰廉姜似姜生嶺南劍南人多食之時珍曰按異物志云生沙石中似姜大如螺氣猛近於臭南人以為齏其法削皮以黑梅及鹽汁漬之乃成也又鄭樵云廉姜似山姜而根大氣味辛熱無毒主治胃中冷吐水不下食藏器溫中下氣消食益智時珍杜若本經上品校正併入圖經外類山姜釋名杜衡本經杜蓮別録若芝別録楚衡廣雅㺐子姜㺐音爪藥性論山姜別録云一名白蓮一名白芩頌曰此草一名杜衡而草部中品自有杜衡條即爾雅所謂土滷者也杜若即廣雅所謂楚衡者也其類自別古人多相雜引用故九歌云採芳洲兮杜若離騷云雜杜衡與芳芷王逸輩皆不分別但云香草故二名相混古方或用今人罕使故少有識者集解別録曰杜若生武陵川澤及冤句二月八月採根曝乾弘景曰今處處有之葉似姜而有紋理根似高良薑而細味辛香又絶似旋覆根殆欲相亂葉小異爾楚辭云山中人兮芳杜若是矣恭曰今江湖多有之生陰地苗似廉姜根似高良薑全少辛味陶云似旋覆根者即真杜若也保升曰苗似山姜花黃赤子赤大如棘子中似豆蔻今出嶺南硤州者甚好範子計然云杜衡杜若出南郡漢中大者大善頌曰衛州一種山姜莖葉如姜開紫花不結子八月採根入藥時珍曰杜若人無識者今楚地山中時有之山人亦呼為良薑根似姜味亦辛甄權注豆蔻所謂㺐子姜蘇頌圖經外類所謂山姜皆此物也或又以大者為高良薑細者為杜若唐時峽州貢之修治斆曰凡使勿用鴨喋草根真相似只是味效不同凡採得根以刀刮去黃赤皮細銼用三重絹袋陰乾臨使以蜜浸一夜漉出用根氣味辛微溫無毒之才曰得辛夷細辛良惡柴胡前胡蘇頌曰山姜辛平有小毒主治胸脅下逆氣溫中風入腦戶頭腫痛多涕淚出久服益精明目輕身令人不忘本經治眩倒目𥉂𥉂止痛除口臭氣別録山姜去皮間風熱可作炸湯又主暴冷及胃中逆冷霍亂腹痛蘇頌發明時珍曰杜若乃神農上品治足少陰太陽諸證要藥而世不知用惜哉山姜拾遺釋名美草弘景曰東人呼為山姜南人呼為美草時珍曰與杜若之山姜名同物異也集解藏器曰山姜根及苗並如姜而大作樟木臭南人食之又有㺐子姜黃色而緊辛辣破血氣殊強於此姜頌曰山姜出九真交趾今閩廣皆有之劉恂嶺表録異云莖葉皆姜也但根不堪食亦與豆蔻花相似而微小爾花生葉間作穗如麥粒嫩紅色南人取其未大開者謂之含胎花以鹽水淹藏入甜糟中經冬如琥珀色辛香可愛用為鱠無以加矣又以鹽殺治曝乾者煎湯服之極除冷氣甚佳時珍曰山姜生南方葉似姜花赤色甚辛子似草豆蔻根如杜若及高良薑今人以其子僞充草豆蔻然其氣甚猛烈根氣味辛熱無毒主治腹中冷痛煮服甚效作丸散服辟穀止飢弘景去惡氣溫中中惡霍亂心腹冷痛功用如姜藏器花及子氣味辛溫無毒主治調中下氣破冷氣作痛止霍亂消食殺酒毒大明高良薑別録中品校正併入開寶本草紅豆蔻釋名蠻姜綱目子名紅豆蔻時珍曰陶隱居言此姜始出高良郡故得此名按高良即今高州也漢為高涼縣吳改為郡其山高而稍涼因以為名則高良當作高涼也集解弘景曰出高良郡二月三月採根形氣與杜若相似而葉如山姜恭曰出嶺南者形大虛軟生江左者細緊亦不甚辛其實一也今人呼細者為杜若大者為高良薑亦非也頌曰今嶺南諸州及黔蜀皆有之內郡雖有而不堪入藥春生莖葉如姜苗而大高一二尺許花紅紫色如山姜花珣曰紅豆蔻生南海諸谷高良薑子也其苗如蘆其葉如姜花作穗嫩葉卷之而生微帶紅色嫩者入鹽纍纍作朵不散落須以朱槿花染令色深善醒醉解酒毒無他要使也時珍曰按范成大桂海志云紅豆蔻花叢生葉瘦如碧蘆春末始發初開花抽一干有大籜包之籜拆花見一穗數十蕊淡紅鮮妍如桃杏花色蕊重則下垂如葡萄又如火齊瓔珞及剪綵鸞枝之狀每蕊有心兩瓣人比之連理也其子亦似草豆蔻修治時珍曰高良薑紅豆蔻並宜炒過入藥亦有以姜同吳茱萸東壁土炒過入藥用者根氣味辛大溫無毒志曰辛苦大熱無毒張元素曰辛熱純陽浮也入足太陰陽明經主治暴冷胃中冷逆霍亂腹痛別録下氣益聲好顏色煮飲服之止痢藏器治風破氣腹內久冷氣痛去風冷痹弱甄權轉筋瀉痢反胃嘔食解酒毒消宿食大明含塊咽津治忽然噁心嘔清水逡巡即瘥若口臭者同草豆蔻為末煎飲蘇頌健脾胃寬噎膈破冷癖除瘴瘧時珍發明楊士瀛曰噫逆胃寒者高良薑為要藥人參茯苓佐之為其溫胃解散胃中風邪也時珍曰十全方言心脾冷痛用高良薑細銼微炒為末米飲服一錢立止太祖高皇帝御製周顛仙碑文亦載其有驗云又穢跡佛有治心口痛方云凡男女心口一點痛者乃胃脘有滯或有蟲也多因怒及受寒而起遂致終身俗言心氣痛者非也用高良薑以酒洗七次焙研香附子以醋洗七次焙研各記收之病因寒得用薑末二錢附末一錢因怒得用附末二錢薑末一錢寒怒兼有各一錢半以米飲加入生薑汁一匙鹽一捻服之立止韓飛霞醫通書亦稱其功云附方舊三新十霍亂吐利火炙高良薑令焦香每用五兩以酒一升煮三四沸頓服亦治腹痛中惡外臺霍亂腹痛高良薑一兩銼以水三大盞煎二盞半去滓入粳米一合煮粥食之便止聖惠方霍亂嘔甚不止用高良薑生銼二錢大棗一枚水煎冷服立定名冰壺湯普濟方腳氣欲吐蘇恭曰凡患腳氣人每旦飽食午後少食日晚不食若飢可食豉粥若覺不消欲致霍亂者即以高良薑一兩水三升煮一升頓服盡即消若猝無者以母姜一兩代之清酒煎服雖不及高良薑亦甚效也心脾冷痛高良薑丸用高良薑四兩切片分作四分一兩用陳廩米半合炒黃去米一兩用陳壁土半兩炒黃去土一兩用巴豆三十四個炒黃去豆一兩用斑蝥三十四個炒黃去蝥吳茱萸一兩酒浸一夜同姜再炒為末以浸茱酒打糊丸梧桐子大每空心薑湯下五十丸永類鈐方用高良薑三錢五靈脂六錢為末每服三錢醋湯調下養脾溫胃去冷消痰寬胸下氣大治心脾疼及一切冷物所傷用高良薑乾薑等分炮研末麵糊丸梧子大每食後橘皮湯下十五丸妊婦勿服和劑局方脾虛寒瘧寒多熱少飲食不思用高良薑麻油炒乾薑炮各一兩為末每服五錢用豬膽汁調成膏子臨發時熱酒調服以膽汁和丸每服四十丸酒下亦佳吳開內翰政和丁酉居全椒縣歲瘧大作用此救人以百計張大亨病此甚欲致仕亦服之愈大抵寒發於膽用豬膽引二姜入膽去寒而燥脾胃一寒一熱陰陽相制所以作效也一方只用二姜半生半炮各半兩穿山甲炮三錢為末每服二錢豬腎煮酒下朱氏集驗方妊婦瘧疾先因傷寒變成者用高良薑三錢銼以獖豬膽汁浸一夜東壁土炒黑去土以肥棗肉十五枚同焙為末每用三錢水一盞煎熱將發時服神妙永類鈐方暴赤眼痛以管吹良薑末入鼻取嚏或彈出鼻血即散談野翁試驗方風牙痛腫高良薑二寸全蠍焙一枚為末摻之吐涎以鹽湯漱口此乃樂清丐者所傳鮑季明病此用之果效王璆百一選方頭痛搐鼻高良薑生研頻搐普濟方紅豆蔻開寶氣味辛溫無毒權曰苦辛多食令人舌粗不思飲食時珍曰辛熱陽也浮也入手足太陰經生生編云最能動火傷目致衄食料不宜用之主治腸虛水瀉心腹絞痛霍亂嘔吐酸水解酒毒志冷氣腹痛消瘴霧毒氣去宿食溫腹腸吐瀉痢疾甄權治噎膈反胃虛瘧寒脹燥濕散寒時珍發明時珍曰紅豆蔻李東垣脾胃藥中常用之亦取其辛熱芳香能醒脾溫肺散寒燥濕消食之功爾若脾肺素有伏火者切不宜用附方新一風寒牙痛紅豆蔻為末隨左右以少許搐鼻中並摻牙取涎或加麝香衛生家寶方豆蔻別録上品校正自果部移入此釋名草豆蔻開寶漏蔻異物志草果鄭樵通志宗奭曰豆蔻草豆蔻也此是對肉豆蔻而名若作果則味不和前人編入果部不知有何義意花性熱淹至京師味微苦不甚美干則色淡紫為能消酒毒故為果爾時珍曰按揚雄方言云凡物盛多曰蔻豆蔻之名或取此義豆象形也南方異物志作漏蔻蓋南人字無正音也今雖不專為果猶入茶食料用尚有草果之稱焉金光明經三十二品香藥謂之蘇乞迷羅細集解別録曰豆蔻生南海恭曰苗似山姜花黃白色苗根及子亦似杜若頌曰草豆蔻今嶺南皆有之苗似蘆其葉似山薑杜若輩根似高良薑二月開花作穗房生於莖下嫩葉卷之而生初如芙蓉花微紅穗頭深紅色其葉漸展花漸出而色漸淡亦有黃白色者南人多采花以當果尤貴其嫩者並穗入鹽同醃治疊疊作朵不散又以木槿花同浸欲其色紅爾其結實若龍眼子而鋭皮無鱗甲皮中子如石榴瓣夏月熟時採之曝乾根苗微作樟木香根莖子並辛香珣曰豆蔻生交趾其根似益智皮殼小厚核如石榴而辛香葉如芄蘭而小三月採其葉細破陰乾用味近苦而有甘時珍曰草豆蔻草果雖是一物然微有不同今建寧所産豆蔻大如龍眼而形微長其皮黃白薄而稜峭其仁大如縮砂仁而辛香氣和滇廣所産草果長大如訶子其皮黑厚而稜密其子粗而辛臭正如斑蝥之氣彼人皆用芼茶及作食料恆用之物廣人取生草蔻入梅汁鹽漬令紅曝乾薦酒名紅鹽草果其初結小者名鸚哥舌元朝飲膳皆以草果為上供南人復用一種火楊梅僞充草豆蔻其形圓而粗氣味辛猛而不和人亦多用之或云即山姜實也不可不辨修治斆曰凡使須去蒂取向裡子及皮用茱萸同於𨫼上緩炒待茱萸微黃黑即去茱萸取草豆蔻皮及子杵用之時珍曰今人惟以麵裹煻火煨熟去皮用之仁氣味辛溫澀無毒好古曰大辛熱陽也浮也入足太陰陽明經主治溫中心腹痛嘔吐去口臭氣別録下氣止霍亂一切冷氣消酒毒開寶調中補胃健脾消食去客寒心與胃痛李杲治瘴癘寒瘧傷暑吐下泄痢噎膈反胃痞滿吐酸痰飲積聚婦人惡阻帶下除寒燥濕開鬱破氣殺魚肉毒制丹砂時珍發明弘景曰豆蔻辛烈甚香可常食之其五和糝中物皆宜人豆蔻廉薑枸櫞甘蕉麂目是也宗奭曰草豆蔻氣味極辛微香性溫而調散冷氣甚速虛弱不能飲食者宜此與木瓜烏梅縮砂益智麴櫱甘草生薑同用也杲曰風寒客邪在胃口之上當心作疼者宜煨熟用之震亨曰草豆蔻性溫能散滯氣消膈上痰若明知身受寒邪口食寒物胃脘作疼方可溫散用之如鼓應桴或濕痰鬱結成病者亦效若熱鬱者不可用恐積溫成熱也必用梔子之劑時珍曰豆蔻治病取其辛熱浮散能入太陰陽明除寒燥濕開鬱化食之力而已南地卑下山嵐煙瘴飲啖酸鹹脾胃常多寒濕鬱滯之病故食料必用與之相宜然過多亦能助脾熱傷肺損目或云與知母同用治瘴瘧寒熱取其一陰一陽無偏勝之害蓋草果治太陰獨勝之寒知母治陽明獨勝之火也附方舊一新九心腹脹滿短氣用草豆蔻一兩去皮為末以木瓜生薑湯調服半錢千金方胃弱嘔逆不食用草豆蔻仁二枚高良薑半兩水一盞煮取汁入生薑汁半合和白麵作撥刀以羊肉臛汁煮熟空心食之普濟霍亂煩渴草豆蔻黃連各一錢半烏豆五十粒生薑三片水煎服之聖濟總録虛瘧自汗不止用草果一枚麵裹煨熟連面研入平胃散二錢水煎服經效濟世方氣虛瘴瘧熱少寒多或單寒不熱或虛熱不寒用草果仁熟附子等分水一盞姜七片棗一枚煎半盞服名果附湯濟生方脾寒瘧疾寒多熱少或單寒不熱或大便泄而小便多不能食用草果仁熟附子各二錢半生薑七片棗肉二枚水三盞煎一盞溫服醫方大成脾腎不足草果仁一兩以舶茴香一兩炒香去茴不用吳茱萸湯泡七次以破故紙一兩炒香去故紙不用葫蘆巴一兩以山茱萸一兩炒香去茱萸不用上三味為散酒糊丸梧子大每服六十丸鹽湯下百一選方赤白帶下連皮草果一枚乳香一小塊麵裹煨焦黃同面研細每米飲服二錢日二服衛生易簡方香口闢臭豆蔻細辛為末含之肘後方脾痛脹滿草果仁二個酒煎服之直指方花氣味辛熱無毒主治下氣止嘔逆除霍亂調中補胃氣消酒毒大明白豆蔻宋開寶釋名多骨集解志曰白豆蔻出伽古羅國呼為多骨其草形如芭蕉葉似杜若長八九尺而光滑冬夏不凋花淺黃色子作朵如葡萄初出微青熟則變白七月採之頌曰今廣州宜州亦有之不及番舶來者佳時珍曰白豆蔻子圓大如白牽牛子其殼白厚其仁如縮砂仁入藥去皮炒用仁氣味辛大溫無毒好古大辛熱味薄氣厚輕清而升陽也浮也入手太陰經主治積冷氣止吐逆反胃消穀下氣開寶散肺中滯氣寬膈進食去白睛翳膜李杲補肺氣益脾胃理元氣收脫氣好古治噎膈除瘧疾寒熱解酒毒時珍發明頌曰古方治胃冷吃食即欲吐及嘔吐六物湯皆用白豆蔻大抵主胃冷即相宜也元素曰白豆蔻氣味俱薄其用有五專入肺經本藥一也散胸中滯氣二也去感寒腹痛三也溫暖脾胃四也治赤眼暴發去太陽經目內大眥紅筋用少許五也時珍曰按楊士瀛云白豆蔻治脾虛瘧疾嘔吐寒熱能消能磨流行三焦營衛一轉諸證自平附方舊一新四胃冷噁心凡食即欲吐用白豆蔻子三枚搗細好酒一盞溫服並飲數服佳張文仲備急方人忽噁心多嚼白豆蔻子最佳肘後方小兒吐乳胃寒者白豆蔻仁十四個縮砂仁十四個生甘草二錢炙甘草二錢為末常摻入兒口中危氏得效方脾虛反胃白豆蔻縮砂仁各二兩丁香一兩陳廩米一升黃土炒焦去土研細薑汁和丸梧子大每服百丸薑湯下名太倉丸濟生方産後厄逆白豆蔻丁香各半兩研細桃仁湯服一錢少頃再服乾坤生意縮砂密宋開寶釋名時珍曰名義未詳藕下白蒻多密取其密藏之意此物實在根下仁藏殼內亦或此意歟集解珣曰縮砂密生西海及西戎等地波斯諸國多從安東道來志曰生南地苗似廉姜子形如白豆蔻其皮緊厚而皺黃赤色八月採之頌曰今惟嶺南山澤間有之苗莖似高良薑高三四尺葉青長八九寸闊半寸以來三月四月開花在根下五六月成實五七十枚作一穗狀似益智而圓皮緊厚而皺有粟紋外有細刺黃赤色皮間細子一團八隔可四十餘粒如大黍米外微黑色內白而香似白豆蔻仁七月八月採之辛香可調食味及蜜煎糖纏用仁氣味辛溫澀無毒權曰辛苦藏器曰酸珣曰辛咸平得訶子豆蔻白蕪夷鱉甲良好古曰辛溫陽也浮也入手足太陰陽明太陽足少陰七經得白檀香豆蔻為使入肺得人參益智為使入脾得黃柏茯苓為使入腎得赤白石脂為使入大小腸也主治虛勞冷瀉宿食不消赤白泄痢腹中虛痛下氣開寶主冷氣腹痛止休息氣痢勞損消化水穀溫暖脾胃甄權上氣咳嗽奔豚鬼疰驚癇邪氣藏器一切氣霍亂轉筋能起酒香味大明和中行氣止痛安胎楊士瀛治脾胃氣結滯不散元素補肺醒脾養胃益腎理元氣通滯氣散寒飲脹痞噎膈嘔吐止女子崩中除咽喉口齒浮熱化銅鐵骨哽時珍發明時珍曰按韓𢘅醫通云腎惡燥以辛潤之縮砂仁之辛以潤腎燥又云縮砂屬土主醒脾調胃引諸藥歸宿丹田香而能竄和合五臟沖和之氣如天地以土為沖和之氣故補腎藥用同地黃丸蒸取其達下之旨也又化骨食草木藥及方士煉三黃皆用之不知其性何以能制此物也附方舊三新一十三冷滑下痢不禁虛羸用縮砂仁熬為末以羊子肝薄切摻之瓦上焙乾為末入乾薑末等分飯丸梧子大每服四十丸白湯下日二服又方縮砂仁炮附子乾薑厚朴陳橘皮等分為末飯丸梧子大每服四十丸米飲下日二服並藥性論大便瀉血三代相傳者縮砂仁為末米飲熱服二錢以愈為度十便良方小兒脫肛縮砂去皮為末以豬腰子一片批開擦末在內縛定煮熟與兒食次服白礬丸如氣逆腫喘者不治保幼大全遍身腫滿陰亦腫者用縮砂仁土狗一個等分研和老酒服之直指方痰氣膈脹砂仁搗碎以蘿蔔汁浸透焙乾為末每服一二錢食遠沸湯服簡便方上氣咳逆砂仁洗淨炒研生薑連皮等分搗爛熱酒食遠泡服簡便方子癇昏冒縮砂和皮炒黑熱酒調下二錢不飲者米飲下此方安胎止痛皆效不可盡述陶隱居方妊娠胎動偶因所觸或跌墜傷損致胎不安痛不可忍者縮砂尉斗內炒熟去皮用仁搗碎每服二錢熱酒調下須臾覺腹中胎動處極熱即胎已安矣神效孫尚藥方婦人血崩新縮砂仁新瓦焙研末米飲服三錢婦人良方熱擁咽痛縮砂殼為末水服一錢戴原禮方牙齒疼痛縮砂常嚼之良直指方口吻生瘡縮砂殼煅研擦之即愈此蔡醫博祕方也黎居士簡易方魚骨入咽縮砂甘草等分為末綿裹含之咽汁當隨痰出矣王璆百一選方誤吞諸物金銀銅錢等物不化者濃煎縮砂湯飲之即下危氏得效方一切食毒縮砂仁末水服一二錢事林廣記益智子宋開寶釋名時珍曰脾主智此物能益脾胃故也與龍眼名益智義同按蘇軾記云海南産益智花實皆長穗而分為三節觀其上中下節以候早中晚禾之豐凶大豐則皆實大凶皆不實罕有三節並熟者其為藥只治水而無益於智其得此名豈以其知歲耶此亦一說也終近穿鑿集解藏器曰益智出崑崙及交趾國今嶺南州郡往往有之顧微廣州記云其葉似襄荷長丈餘其根上有小枝高八九寸無華萼莖如竹箭子從心出一枝有十子叢生大如小棗其中核黑而皮白核小者佳含之攝涎穢或四破去核取外皮蜜煮為粽食味辛晉盧循遺劉裕益智粽是此也恭曰益智子似連翹子頭未開者苗葉花根與豆無別惟子小爾時珍曰按嵇含南方草木狀云益智二月花連著實五六月熟其子如筆頭而兩頭尖長七八分雜五味中飲酒芬芳亦可鹽曝及作粽食觀此則顧微言其無華者誤矣今之益智子形如棗核而皮及仁皆似草豆蔻云仁氣味辛溫無毒主治遺精虛漏小便餘瀝益氣安神補不足安三焦調諸氣夜多小便者取二十四枚碎入鹽同煎服有奇驗志治客寒犯胃和中益氣及人多唾李杲益脾胃理元氣補腎虛滑瀝好古冷氣腹痛及心氣不足夢泄赤濁熱傷心系吐血血崩諸證時珍發明劉完素曰益智辛熱能開發鬱結使氣宣通王好古曰益智本脾藥主君相二火在集香丸則入肺在四君子湯則入脾在大鳳髓丹則入腎三藏互有子母相關之義當於補藥中兼用之勿多服時珍曰益智大辛行陽退陰之藥也三焦命門氣弱者宜之按楊士瀛直指方云心者脾之母進食不止於和脾火能生土當使心藥入脾胃藥中庶幾相得故古人進食藥中多用益智土中益火也又按洪邁夷堅志云秀川進士陸迎忽得吐血不止氣蹶驚顫狂躁直視至深夜欲投戶而出如是兩夕遍用方藥弗瘳夜夢觀音授一方命但服一料永除病根夢覺記之如方治藥其病果愈其方用益智子仁一兩生硃砂二錢青橘皮五錢麝香一錢碾為細末每服一錢空心燈心湯下附方新八小便頻數脬氣不足也雷州益智子鹽炒去鹽天台烏藥等分為末酒煮山藥粉為糊丸如梧子大每服七十丸空心鹽湯下名縮泉丸朱氏集驗方心虛尿滑及赤白二濁益智子仁白茯苓白朮等分為末每服三錢白湯調下白濁腹滿不拘男婦用益智仁鹽水浸炒厚朴薑汁炒等分姜三片棗一枚水煎服永類鈐方小便赤濁益智子仁茯神各二兩遠志甘草水煮各半斤為末酒糊丸梧子大空心薑湯下五十丸腹脹忽瀉日夜不止諸藥不效此氣脫也用益智子仁二兩濃煎飲之立愈危氏得效方婦人崩中益智子炒碾細米飲入鹽服一錢産寶香口闢臭益智子仁一兩甘草二錢碾粉舐之經驗良方漏胎下血益智仁半兩縮砂仁一兩為末每服三錢空心白湯下日二服胡氏濟陰方蓽茇宋開寶釋名蓽撥時珍曰蓽撥當作蓽茇出南方草木狀番語也陳藏器本草作畢勃扶南傳作逼撥大明會典作畢茇又段成式酉陽雜俎云摩伽陀國呼為蓽撥梨拂林國呼為阿梨訶陀集解恭曰蓽茇生波斯國叢生莖葉似蒟醬其子緊細味辛烈於蒟醬胡人將來入食味用也藏器曰其根名畢勃沒似柴胡而黑硬頌曰今嶺南有之多生竹林內正月發苗作叢高三四尺其莖如箸葉青圓如蕺菜闊二三寸如桑面光而厚三月開花白色在表七月結子如小指大長二寸以來青黑色類椹子而長九月取採灰殺曝乾南人愛其辛香或取葉生茹之復有舶上來者更辛香時珍曰段成式言青州防風子可亂蓽茇蓋亦不然蓽茇氣味正如胡椒其形長一二寸防風子圓如胡荽子大不相侔也修治斆曰凡使去挺用頭以醋浸一宿焙乾以刀刮去皮粟子令淨乃用免傷人肺令人上氣氣味辛大溫無毒時珍曰氣熱味辛陽也浮也入手足陽明經然辛熱耗散能動脾肺之火多用令人目昏食料尤不宜之主治溫中下氣補腰腳殺腥氣消食除胃冷陰疝痃癖藏器霍亂冷氣心痛血氣大明水瀉虛痢嘔逆醋心産後泄痢與阿魏和合良得訶子人參桂心乾薑治臟腑虛冷腸鳴泄痢神效李珣治頭痛鼻淵牙痛時珍發明宗奭曰蓽茇走腸胃冷氣嘔吐心腹滿痛者宜之多服走泄真氣令人腸虛下重頌曰按唐太宗實録云貞觀中上以氣痢久未痊服名醫藥不應因詔訪求其方有衛士進黃牛乳煎蓽茇方御用有效劉禹錫亦記其事云後纍試於虛冷者必效時珍曰牛乳煎詳見獸部牛乳下蓽茇為頭痛鼻淵牙痛要藥取其辛熱能入陽明經散浮熱也附方舊二新八冷痰噁心蓽茇一兩為末食前用米湯服半錢聖惠方暴泄身冷自汗甚則欲嘔小便清脈微弱宜已寒丸治之蓽茇肉桂各二錢半高良薑乾薑各三錢半為末糊丸梧子大每服三十丸薑湯下和劑局胃冷口酸流清水心下連臍痛用蓽茇半兩厚朴薑汁浸炙一兩為末入熱鯽魚肉和丸緑豆大每米飲下二十丸立效余居士選奇方瘴氣成塊在腹不散用蓽茇一兩大黃一兩並生為末入麝香少許煉蜜丸梧子大每冷酒服三十丸永類鈐方婦人血氣作痛及下血無時月水不調用蓽茇鹽炒蒲黃炒等分為末煉蜜丸梧子大每空心溫酒服三十丸兩服即止名二神丸陳氏方偏頭風痛蓽茇為末令患者口含溫水隨左右痛以左右鼻吸一次有效經驗後方鼻流清涕蓽茇末吹之有效衛生易簡方風蟲牙痛蓽茇末揩之煎蒼耳湯漱去涎本草權度用蓽茇末木鱉子肉研膏化開搐鼻聖濟總録用蓽茇胡椒等分為末化蠟丸麻子大每以一丸塞孔中蓽勃沒氣味辛溫無毒主治五勞七傷冷氣嘔逆心腹脹滿食不消化陰汗寒疝核腫婦人內冷無子治腰腎冷除血氣藏器蒟醬蒟音矩唐本草釋名蒟子廣志土蓽茇食療苗名扶留藤蔞葉時珍曰按嵇含云蒟子可以調食故謂之醬乃蓽茇之類也故孟詵食療謂之土蓽茇其蔓葉名扶留藤一作扶檑一作浮留莫解其義蔞則留字之訛也集解恭曰蒟醬生巴蜀中蜀都賦所謂流味於番禺者蔓生葉似王瓜而厚大光澤味辛香實似桑椹而皮黑肉白西戎亦時將來細而辛烈交州愛州人家多種之蔓生其子長大苗名浮留藤取葉合檳榔食之辛而香也頌曰今夔川嶺南皆有之昔漢武帝使唐蒙曉諭南越越王食蒙以蒟醬曰西北牂牁江廣數里出番禺城下武帝感之遂開牂牁越嶲也劉淵林注蜀都賦云蒟醬緣木而生其子如桑椹熟時正青長二三寸以蜜及鹽藏而食之辛香與蘇恭所說大同小異蓋淵林所云乃蜀産蘇恭所云乃海南者爾今惟貴蓽茇而不尚蒟醬故鮮有用者李珣曰廣州記云出波斯國實狀若桑椹紫褐色者為上黑者是老不堪然近多黑色少見褐者黔中亦有形狀滋味一般時珍曰蒟醬今兩廣滇南及川南渝瀘威茂施諸州皆有之其苗謂之蔞葉蔓生依樹根大如箸彼人食檳榔者以此葉及蚌灰少許同嚼食之云闢瘴癘去胸中惡氣故諺曰檳榔浮留可以忘憂其花實即蒟子也按嵇含草木狀云蒟醬即蓽茇也生於番國者大而紫謂之蓽茇生於番禺者小而青謂之蒟子本草以蒟易蔞子非矣蔞子一名扶留其草形全不相同時珍竊謂蒟子蔓生蓽茇草生雖同類而非一物然其花實氣味功用則一也嵇氏以二物為一物謂蒟子非扶留蓋不知扶留非一種也劉歆期交州記云扶留有三種一名獲扶留其根香美一名扶留藤其味亦辛一名南扶留其葉青味辛是矣今蜀人惟取蔞葉作酒麴云香美修治斆曰凡採得後以刀刮去粗皮搗細每五兩用生薑自然汁五兩拌之蒸一日曝乾用根葉子氣味辛溫無毒時珍曰氣熱味辛陽也浮也主治下氣溫中破痰積唐本咳逆上氣心腹蟲痛胃弱虛瀉霍亂吐逆解酒食味李珣散結氣心腹冷痛消穀孟詵解瘴癘去胸中惡邪氣溫脾燥熱時珍附方新一牙疼蒟醬細辛各半兩大皂莢五鋌去子每孔入青鹽燒存性同研末頻摻吐涎御藥院方肉豆蔻宋開寶釋名肉果綱目迦拘勒宗奭曰肉豆蔻對草豆蔻為名去殼只用肉肉油色者佳枯白瘦虛者劣時珍曰花實皆似豆蔻而無核故名集解藏器曰肉豆蔻生胡國胡名迦拘勒大舶來即有中國無之其形圓小皮紫緊薄中肉辛辣珣曰生崑崙及大秦國頌曰今嶺南人家亦種之春生苗夏抽莖開花結實似豆蔻六月七月採時珍曰肉豆蔻花及實狀雖似草豆蔻而皮肉之顆則不同顆外有皺紋而內有斑纈紋如檳榔紋最易生蛀惟烘乾蜜封則稍可留實修治斆曰凡使須以糯米粉熟湯搜裹豆蔻於煻灰火中煨熟去粉用勿令犯鐵氣味辛溫無毒權曰苦辛好古曰入手足陽明經主治溫中消食止泄治積冷心腹脹痛霍亂中惡鬼氣冷疰嘔沫冷氣小兒乳霍開寶調中下氣開胃解酒毒消皮外絡下氣大明治宿食痰飲止小兒吐逆不下乳腹痛甄權主心腹蟲痛脾胃虛冷氣並冷熱虛泄赤白痢研末粥飲服之李珣暖脾胃固大腸時珍發明大明曰肉豆蔻調中下氣消皮外絡下氣味珍力更殊宗奭曰亦善下氣多服則泄氣得中則和平其氣震亨曰屬金與土為丸溫中補脾日華子稱其下氣以脾得補而善運化氣自下也非若陳皮香附之快泄寇氏不詳其實遂以為不可服也機曰痢疾用此澀腸為傷乳泄瀉之要藥時珍曰土愛暖而喜芳香故肉豆蔻之辛溫理脾胃而治吐利附方舊一新七暖胃除痰進食消食肉豆蔻二個半夏薑汁炒五錢木香二錢半為末蒸餅丸芥子大每食後津液下五丸十丸普濟霍亂吐利肉豆蔻為末薑湯服一錢普濟方久瀉不止肉豆蔻煨一兩木香二錢半為末棗肉和丸米飲服四五十丸又方肉豆蔻煨一兩熟附子七錢為末糊丸米飲服四五十丸又方肉豆蔻煨粟殼炙等分為末醋糊丸米飲服四五十丸並百一選方老人虛瀉肉豆蔻三錢麵裹煨熟去面研乳香一兩為末陳米粉糊丸梧子大每服五七十丸米飲下此乃常州侯教授所傳方瑞竹堂方小兒泄瀉肉豆蔻五錢乳香二錢半生薑五片同炒黑色去姜研為膏收旋丸緑豆大每量大小米飲下全幼心鑑脾泄氣痢豆蔻一顆米醋調麵裹煨令焦黃和麵研末更以檔子炒研末一兩相和又以陳廩米炒焦為末和勻每以二錢煎作飲調前二味三錢旦暮各一服便瘥續傳信方冷痢腹痛不能食者肉豆蔻一兩去皮醋和麵裹煨搗末每服一錢粥飲調下聖惠方補骨脂宋開寶釋名破故紙開寶婆固脂藥性論胡韭子日華時珍曰補骨脂言其功也胡人呼為婆固脂而俗訛為破故紙也胡韭子因其子之狀相似非胡地之韭子也集解志曰補骨脂生嶺南諸州及波斯國頌曰今嶺外山阪間多有之四川合州亦有皆不及番舶者佳莖高三四尺葉小似薄荷花微紫色實如麻子圓扁而黑九月採大明曰徐表南州記云是胡韭子也南番者色赤廣南者色緑入藥微炒用子修治斆曰此性燥毒須用酒浸一宿漉出以東流水浸三日夜蒸之從巳至申曬乾用一法以鹽同炒過曝乾用氣味辛大溫無毒權曰苦辛珣曰惡甘草時珍曰忌蕓薹及諸血得胡桃胡麻良主治五勞七傷風虛冷骨髓傷敗腎冷精流及婦人血氣墮胎開寶男子腰疼膝冷囊濕逐諸冷痹頑止小便利腹中冷甄權興陽事明耳目大明治腎泄通命門暖丹田斂精神時珍發明頌曰破故紙今人多以胡桃合服此法出於唐鄭相國自敘云豫為南海節度年七十有五越地卑濕傷於內外衆疾俱作陽氣衰絶服乳石補藥百端不應元和七年有訶陵國舶主李摩訶知豫病狀遂傳此方並藥豫初疑而未服摩訶稽首固請遂服之經七八日而覺應驗自爾常服其功神效十年二月罷郡歸京録方傳之用破故紙十兩淨擇去皮洗過曝搗篩令細胡桃瓤二十兩湯浸去皮細研如泥即入前末更以好蜜和令如飴糖瓷器盛之旦日以暖酒二合調藥一匙服之便以飯壓如不飲酒人以暖熟水調之彌久則延年益氣悅心明目補添筋骨但禁蕓薹羊血余無所忌此物本自外番隨海舶而來非中華所有番人呼為補骨脂語訛為破故紙也王紹顏續傳信方載其事頗詳故録之時珍曰此方亦可作丸溫酒服之按白飛霞方外奇方云破故紙屬火收斂神明能使心包之火與命門之火相通故元陽堅固骨髓充實澀以治脫也胡桃屬木潤燥養血血屬陰惡燥故油以潤之佐破故紙有木火相生之妙故語云破故紙無胡桃猶水母之無蝦也又破故紙惡甘草而瑞竹堂方青娥丸內加之何也豈甘草能調和百藥惡而不惡耶又許叔微學士本事方云孫真人言補腎不若補脾豫曰補脾不若補腎腎氣虛弱則陽氣衰劣不能熏蒸脾胃脾胃氣寒令人胸膈痞塞不進飲食遲於運化或腹脅虛脹或嘔吐痰涎或腸鳴泄瀉譬如鼎釜中之物無火力雖終日不熟何能消化濟生二神丸治脾胃虛寒泄瀉用破故紙補腎肉豆蔻補脾二藥雖兼補但無斡旋往往常加木香以順其氣使之斡旋空虛倉廩倉廩空虛則受物矣屢用見效不可不知附方舊二新一十四補骨脂丸治下元虛敗腳手沉重夜多盜汗縱欲所致此藥壯筋骨益元氣補骨脂四兩炒香菟絲子四兩酒蒸胡桃肉一兩去皮乳香沒藥沉香各研二錢半煉蜜丸如梧子大每服二三十丸空心鹽湯溫酒任下自夏至起冬至止日一服此乃唐宣宗時張壽太尉知廣州得方於南番人有詩云三年時節向邊隅人信方知藥力殊奪得春光來在手青娥休笑白髭鬚和劑方男女虛勞男子女人五勞七傷下元久冷一切風病四肢疼痛駐顏壯氣烏髭鬚補骨脂一斤酒浸一宿曬乾卻用烏油麻一升和炒令麻子聲絶簸去只取補骨脂為末醋煮麵糊丸如梧子大每服二三十丸空心溫酒鹽湯任下經驗後方腎虛腰痛經驗後方用破故紙一兩炒為末溫酒服三錢神妙或加木香一錢和劑局方青娥丸治腎氣虛弱風冷乘之或血氣相搏腰痛如折俯仰不利或因勞役傷腎或卑濕傷腰或損墜墮傷或風寒客搏或氣滯不散皆令腰痛或腰間如物重墜用破故紙酒浸炒一斤杜仲去皮薑汁浸炒一斤胡桃肉去皮二十個為末以蒜搗膏一兩和丸梧子大每空心溫酒服二十丸婦人淡醋湯下常服壯筋骨活血脈烏髭鬚益顏色妊娠腰痛通氣散用破故紙二兩炒香為末先嚼胡桃肉半個空心溫酒調下二錢此藥神妙婦人良方定心補腎養血返精丸破故紙炒二兩白茯苓一兩為末沒藥五錢以無灰酒浸高一指煮化和末丸梧子大每服三十丸白湯下昔有人服此至老不衰蓋故紙補腎茯苓補心沒藥養血三者既壯自然身安朱氏集驗方精氣不固破故紙青鹽等分同炒為末每服二錢米飲下三因方小便無度腎氣虛寒破故紙十兩酒蒸茴香十兩鹽炒為末酒糊丸梧子大每服百丸鹽酒下或以末糝豬腎煨食之普濟方小兒遺尿膀胱冷也夜屬陰故小便不禁破故紙炒為末每夜熱湯服五分嬰童百問玉莖不痿精滑無歇時時如針刺捏之則脆此名腎漏用破故紙韭子各一兩為末每用三錢水二盞煎六分服日三次愈則止夏子益奇方脾腎虛瀉二神丸用破故紙炒半斤肉豆蔻生用四兩為末肥棗肉研膏和丸梧子大每空心米飲服五七十丸本事方加木香二兩名三神丸水瀉久痢破故紙炒一兩粟殼炙四兩為末煉蜜丸彈子大每服一丸薑棗同水煎服百一選方牙痛日久腎虛也補骨脂二兩青鹽半兩炒研擦之御藥院方風蟲牙痛上連頭腦補骨脂炒半兩乳香二錢半為末擦之或為丸塞孔內自用有效傳信適用方打墜腰痛瘀血凝滯破故紙炒茴香炒辣桂等分為末每熱酒服二錢故紙主腰痛行血直指方薑黃唐本草釋名蒁音述寶鼎香綱目集解恭曰薑黃根葉都似鬱金其花春生於根與苗並出入夏花爛無子根有黃青白三色其作之方法與鬱金同西戎人謂之蒁其味辛少苦多亦與鬱金同惟花生異耳藏器曰薑黃真者是經種三年以上老薑能生花花在根際一如蘘荷根節堅硬氣味辛辣種姜處有之終是難得西番亦有來者與鬱金蒁藥相似如蘇恭所說即是蒁藥而非薑黃又言薑黃是蒁鬱金是胡蒁如此則三物無別遞相連名總稱為蒁則功狀當不殊而今鬱金味苦寒色赤主馬熱病薑黃味辛溫色黃蒁味苦色青三物不同所用各別大明曰海南生者即蓬莪朮江南生者即為薑黃頌曰薑黃今江廣蜀川多有之葉青緑長一二尺許闊三四寸有斜紋如紅蕉葉而小花紅白色至中秋漸凋春末方生其花先生次方生葉不結實根盤屈黃色類生薑而圓有節八月採根片切曝乾蜀人以治氣脹及産後敗血攻心甚驗蠻人生啖云可以祛邪辟惡按鬱金薑黃術藥三物相近蘇恭不能分別乃如一物陳藏器以色味色味分別三物又言薑黃是三年老薑所生近年汴都多種姜往往有薑黃生賣乃是老薑市人買啖云治氣為最大方亦時用之又有廉姜亦是其類而自是一物時珍曰近時以扁如乾薑形者為片子薑黃圓如蟬腹形者為蟬肚鬱金並可浸水染色術形雖似鬱金而色不黃也根氣味辛苦大寒無毒藏器曰辛少苦多性熱不冷云大寒誤矣主治心腹結積疰忤下氣破血除風熱消癰腫功力烈於鬱金唐本治癥瘕血塊通月經治撲損瘀血止暴風痛冷氣下食大明祛邪辟惡治氣脹産後敗血攻心蘇頌治風痹臂痛時珍發明時珍曰薑黃鬱金術藥三物形狀功用皆相近但鬱金入心治血而薑黃兼入脾兼治氣術藥則入肝兼治氣中之血為不同爾古方五痹湯用片子薑黃治風寒濕氣手臂痛戴原禮要訣云片子薑黃能入手臂治痛其兼理血中之氣可知附方舊二新二心痛難忍薑黃一兩桂三兩為末醋湯服一錢經驗後方胎寒腹痛啼哭吐乳大便瀉青狀若驚搐出冷汗薑黃一錢沒藥木香乳香二錢為末蜜丸芡子大每服一丸鉤藤煎湯化下和劑方産後血痛有塊用薑黃桂心等分為末酒服方寸匕血下盡即愈咱殷産寶瘡癬初生薑黃末摻之妙千金翼鬱金唐本草釋名馬術震亨曰鬱金無香而性輕揚能致達酒氣於高遠古人用治郁遏不能升者恐命名因此也時珍曰酒和郁鬯昔人言是大秦國所産鬱金花香惟鄭樵通志言即是此鬱金其大秦三代時未通中國安得有此草羅願爾雅翼亦云是此根和酒令黃如金故謂之黃流其說並通此根形狀皆似莪朮而醫馬病故名馬術集解恭曰鬱金生蜀地及西戎苗似薑黃花白質紅末秋出莖心而無實其根黃赤取四畔子根去皮火干馬藥用之破血而補胡人謂之馬術嶺南者有實似小豆蔻不堪啖頌曰今廣南江西州郡亦有之然不及蜀中者佳四月初生苗似薑黃如蘇恭所說宗奭曰鬱金不香今人將染婦人衣最鮮明而不耐日炙微有鬱金之氣時珍曰鬱金有二鬱金香是用花見本條此是用根者其苗如姜其根大小如指頭長者寸許體圓有橫紋如蟬腹狀外黃內赤人以浸水染色亦微有香氣根氣味辛苦寒無毒元素曰氣味俱厚純陰獨孤滔曰灰可結砂子主治血積下氣生肌止血破惡血血淋尿血金瘡唐本單用治女人宿血氣心痛冷氣結聚溫醋摩服之亦治馬脹甄權涼心元素治陽毒入胃下血頻痛李杲治血氣心腹痛産後敗血衝心欲死失心顛狂蠱毒時珍發明震亨曰鬱金屬火屬土與水其性輕揚上行治吐血衄血唾血血腥及經脈逆行並宜鬱金末加韭汁薑汁童尿同服其血自清痰中帶血者加竹瀝又鼻血上行者鬱金韭汁加四物湯服之時珍曰鬱金入心及包絡治血病經驗方治失心顛狂用真鬱金七兩明礬三兩為末薄糊丸梧子大每服五十丸白湯下有婦人顛狂十年至人授此初服心胸間有物脫去神氣灑然再服而蘇此驚憂痰血絡聚心竅所致鬱金入心去惡血明礬化頑痰故也龐安常傷寒論云斑豆始有白泡忽搐入腹漸作紫黑色無膿日夜叫亂者鬱金一枚甘草二錢半水半碗煮乾去甘草切片焙研為末入真腦子炒半錢每用一錢以生豬血五七滴新汲水調下不過二服甚者毒氣從手足心出如癰狀乃瘥此乃五死一生之候也又範石湖文集云嶺南有挑生之害於飲食中行厭勝法魚肉能反生於人腹中而人以死則陰役其家初得覺胸腹痛次日刺人十日則生在腹中也凡胸膈痛即用升麻或膽礬吐之若膈下痛急以米湯調鬱金末二錢服即瀉出惡物或合升麻鬱金服之不吐則下李巽岩侍郎為雷州推官鞫獄得此方活人甚多也附方舊三新十失心顛狂方見發明下痘毒入心方見發明下厥心氣痛不可忍鬱金附子乾薑等分為末醋糊丸梧子大硃砂為衣每服三十丸男酒女醋下奇效方産後心痛血氣上衝欲死鬱金燒存性為末二錢米醋一呷調灌即蘇袖珍方自汗不止鬱金末臥時調塗於乳上集簡方衄血吐血川鬱金為末井水服二錢甚者再服黎居士易簡方陽毒下血熱氣入胃痛不可忍鬱金五大個牛黃一皂莢子為散每服用醋漿水一盞同煎三沸溫服孫用和祕寶方尿血不定鬱金末一兩蔥白一握水一盞煎至三合溫服日三服經驗方風痰壅滯鬱金一分藜蘆十分為末每服一字溫漿水調下仍以漿水一盞漱口以食壓之經驗後方挑生蠱毒方見發明下中砒霜毒鬱金末二錢入蜜少許冷水調服事林廣記痔瘡腫痛鬱金末水調塗之即消醫方摘要耳內作痛鬱金末一錢水調傾入耳內急傾出之聖濟總録蓬莪朮音述宋開寶釋名蒁藥集解志曰蓬莪朮生西戎及廣南諸州葉似蘘荷子似干椹術在根下並生一好一惡惡者有毒西戎人取之先放羊食羊不食者棄之藏器曰一名蓬莪黑色二名蒁黃色三名波殺味甘有大毒大明曰即南中薑黃根也海南生者名蓬莪朮頌曰今江浙或有之三月生苗在田野中其莖如錢大高二三尺葉青白色長一二尺大五寸以來頗類蘘荷五月有花作穗黃色頭微紫根如生薑而術在根下似雞鴨卵大小不常九月採削去粗皮蒸熟曝乾用根修治斆曰凡使於砂盆中以醋磨令盡然後於火畔熁干重篩過用頌曰此物極堅硬難搗治用時熱灰火中煨令透乘熱搗之即碎如粉時珍曰今人多以醋炒或煮熟入藥取其引入血分也氣味苦辛溫無毒大明曰得酒醋良主治心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒食飲不消酒研服之又療婦人血氣結積丈夫奔豚開寶破痃癖冷氣以酒醋磨服甄權治一切氣開胃消食通月經消瘀血止撲損痛下血及內損惡血大明通肝經聚血好古發明頌曰蓬莪朮古方不見用者今醫家治積聚諸氣為最要之藥與荊三稜同用之良婦人藥中亦多使好古曰蓬莪色黑破氣中之血入氣藥發諸香雖為泄劑亦能益氣故孫尚藥用治氣短不能接續及大小七香丸集香丸諸湯散多用此也又為肝經血分藥時珍曰鬱金入心專治血分之病薑黃入脾兼治血中之氣術入肝治氣中之血稍為不同按王執中資生經云執中久患心脾疼服醒脾藥反脹用耆域所載蓬莪朮麵裹炮熟研末以水與酒醋煎服立愈蓋此藥能破氣中之血也附方舊二新六一切冷氣搶心切痛發即欲死久患心腹痛時發者此可絶根蓬莪朮二兩醋煮木香一兩煨為末每服半錢淡醋湯下衛生家寶方小腸臟氣非時痛不可忍蓬莪朮研末空心蔥酒服一錢楊子建護命方婦人血氣遊走作痛及腰痛蓬莪朮乾漆二兩為末酒服二錢腰痛核桃酒下普濟方小兒盤腸內釣痛以莪朮半兩用阿魏一錢化水浸一日夜焙研每服一字紫蘇湯下保幼大全小兒氣痛蓬莪朮炮熟為末熱酒服一大錢十全博救方上氣喘急蓬莪朮五錢酒一盞半煎八分服保生方氣短不接正元散治氣不接續兼治滑泄及小便數王丞相服之有驗用蓬莪朮一兩金鈴子去核一兩為末入蓬砂一錢煉過研細每服二錢溫酒或鹽湯空心服孫用和祕寶方初生吐乳不止蓬莪朮少許鹽一緑豆以乳一合煎三五沸去滓入牛黃兩粟大服之甚效也保幼大全渾身燎泡方見荊三稜荊三稜宋開寶校正併入開寶草三稜釋名京三稜開寶草三稜開寶雞爪三稜開寶黑三稜圖經石三稜頌曰三稜葉有三稜也生荊楚地故名荊三稜以著其地開寶本草作京者誤矣又出草三稜條云即雞爪三稜生蜀地二月八月採之其實一類隨形命名爾故並見之集解藏器曰三稜總有三四種京三稜黃色體重狀若鯽魚而小又有黑三稜狀如烏梅而稍大體輕有須相連蔓延作漆色蜀人以織為器一名䔷者是也療體並同頌曰京三稜舊不著所出地土今荊襄江淮濟南河陝間皆有之多生淺水旁及陂澤中春生苗高三四尺葉似莎草極長又似茭蒲葉而有三稜五六月抽莖高四五尺大如人指有三稜如削成莖端開花大體皆如莎草而大黃紫色苗下即魁初生成塊如附子大或有扁者其旁有根橫貫一根則連數魁魁上亦出苗其魁皆扁長如小鯽魚體重者三稜也其根末將盡一魁未發苗小圓如烏梅者黑三稜也又根之端鉤曲如爪者雞爪三稜也皆皮黑肌白而至輕或云不出苗只生細根者謂之雞爪三稜又不生細根者謂之黑三稜大小不常其色黑去皮即白三者本一種但力有剛柔各適其用因其形為名如烏頭烏喙雲母雲華之類本非兩物也今人乃妄以鳧茈香附子為之又河中府有石三稜根黃白色形如叉股葉緑如蒲苗高及尺葉上亦有三稜四月開花白色如蓼葓花五月採根亦消積氣今舉世所用三稜皆淮南紅蒲根也泰州尤多其體至堅重刻削魚形葉扁莖圓不復有三稜不知何緣命名為三稜也雖太醫亦不以為謬流習既久用根者不識其苗採藥者莫究其用因緣差失不復辨別今三稜皆獨旁引二根無直下根其形大體多如鯽魚時珍曰三稜多生荒廢陂池濕地春時叢生夏秋抽高莖莖端復生數葉開花六七枝花皆細碎成穗黃紫色中有細子其葉莖花實俱有三稜並與香附苗葉花實一樣但長大爾其莖光滑三稜如棕之葉莖莖中有白穰剖之織物柔韌如藤呂忱字林云䔷草生水中根可緣器即此草莖非根也抱朴子言䔷根花鱓亦是此草其根多黃黑鬚削去須皮乃如鯽狀非本根似鯽也根修治元素曰入用須炮熟時珍曰消積須用醋浸一日炒或煮熟焙乾入藥乃良氣味苦平無毒志曰甘平溫大明曰甘澀涼元素曰苦甘無毒陰中之陽能瀉真氣真氣虛者勿用主治老癖癥瘕積聚結塊産後惡血血結通月水墮胎止痛利氣開寶治氣脹破積氣消撲損瘀血婦人血脈不調心腹痛産後腹痛血運大明心膈痛飲食不消元素通肝經積血治瘡腫堅硬好古下乳汁時珍發明好古曰三稜色白屬金破血中之氣肝經血分藥也三稜莪朮治積塊瘡硬者乃堅者削之也志曰俗傳昔人患症癖死遺言令開腹取之得病塊乾硬如石紋理有五色以為異物削成刀柄後因以刀刈三稜柄消成水乃知此藥可療症癖也時珍曰三稜能破氣散結故能治諸病其功可近於香附而力峻故難久服按戴原禮證治要訣云有人病症癖腹脹用三稜莪朮以酒煨煎服之下一黑物如魚而愈也附方舊三新五癥瘕鼓脹三稜煎用三稜根切一石水五石煮三石去滓更煎取三斗汁入鍋中重湯煎如稠糖密器收之每旦酒服一匕日二服千金翼方痃癖氣塊草三稜荊三稜石三稜青橘皮陳橘皮木香各半兩肉豆蔻檳榔各一兩硇砂二錢為末糊丸梧子大每薑湯服三十丸奇效方痃癖不瘥脅下硬如石京三稜一兩炮川大黃一兩為末醋熬成膏每日空心生薑橘皮湯下一匙以利下為度聖惠方小兒氣癖三稜煮汁作羹粥與奶母食日亦以棗許與兒食小兒新生百日及十歲以下無問癇熱痃癖等皆理之祕妙不可具言大效子母祕録痞氣胸滿口乾肌瘦食減或時壯熱石三稜京三稜雞爪三稜並炮蓬莪朮三枚檳榔一枚青橘皮五十片醋浸去白陳倉米一合醋浸淘過巴豆五十個去皮同青皮倉米炒乾去豆為末糊丸緑豆大每米飲下三丸日一服聖濟總録反胃噁心藥食不下京三稜炮一兩半丁香三分為末每服一錢沸湯點服聖濟總録乳汁不下京三稜三個水二碗煎汁一碗洗奶取汁出為度極妙外臺祕要渾身燎泡如棠梨狀每個出水有石一片如指甲大其泡復生抽盡肌膚肉即不可治用荊三稜蓬莪朮各五兩為末分三服酒調連進愈危氏得效方莎草香附子別録中品釋名雀頭香唐本草附子圖經水香稜圖經水巴戟圖經水莎圖經侯莎爾雅莎結圖經夫須別録續根草圖經地藾根圖經地毛廣雅時珍曰別録止云莎草不言用苗用根後世皆用其根名香附子而不知莎草之名也其草可為笠及雨衣疏而不沾故字從草從沙亦作蓑字因其為衣垂緌如孝子衰衣之狀故又從衰也爾雅云薃音浩侯莎其實緹是也又云苔夫須也苔乃笠名賤夫所須也其根相附連續而生可以合香故謂之香附子上古謂之雀頭香按江表傳云魏文帝遣使於吳求雀頭香即此其葉似三稜及巴戟而生下濕地故有水三稜水巴戟之名俗人呼為雷公頭金光明經謂之月萃哆記事珠謂之抱靈居士集解別録曰莎草生田野二月八月採弘景曰方藥不復用古人為詩多用之而無識者乃有鼠蓑療體異此恭曰此草根名香附子一名雀頭香所在有之莖葉都似三稜合和香用之頌曰今處處有之苗葉如薤而瘦根如箸頭大謹按唐玄宗天寶單方圖載水香稜功狀與此相類雲水香稜原生博平郡池澤中苗名香稜根名莎結亦名草附子河南及淮南下濕地即有名水莎隴西謂之地藾根蜀郡名續根草亦名水巴戟今涪都最饒名三稜草用莖作鞋履所在皆有採苗及花與根療病宗奭曰香附子今人多用雖生於莎草根然根上或有或無有薄皸皮紫黑色非多毛也刮去皮則色白若便以根為之則誤矣時珍曰莎葉如老韭葉而硬光澤有劍脊稜五六月中抽一莖三稜中空莖端復出數葉開青花成穗如黍中有細子其根有須須下結子一二枚轉相延生子上有細黑毛大者如羊棗而兩頭尖採得燎去毛曝乾貨之此乃近時日用要藥而陶氏不識諸注亦略乃知古今藥物興廢不同如此則本草諸藥亦不可以今之不識便廢棄不收安知異時不為要藥如香附者乎根修治斆曰凡採得陰乾於石臼中搗之切忌鐵器時珍曰凡採得連苗曝乾以火燎去苗及毛用時以水洗淨石上磨去皮用童子小便浸透洗曬搗用或生或炒或以酒醋鹽水浸諸法各從本方詳見於下又稻草煮之味不苦氣味甘微寒無毒宗奭曰苦頌曰天寶單方云辛微寒無毒性澀元素曰甘苦微寒氣厚於味陽中之陰血中之氣藥也時珍曰辛微苦甘平足厥陰手少陽藥也能兼行十二經入脈氣分得童子小便醋芎藭蒼朮良主治除胸中熱充皮毛久服利人益氣長鬚眉別録治心中客熱膀胱間連脅下氣妨常日憂愁不樂兼心忪者蘇頌治一切氣霍亂吐瀉腹痛腎氣膀胱冷氣李杲散時氣寒疫利三焦解六郁消飲食積聚痰飲痞滿胕腫腹脹腳氣止心腹肢體頭目齒耳諸痛癰疽瘡瘍吐血下血尿血婦人崩漏帶下月候不調胎前産後百病時珍苗及花主治丈夫心肺中虛風及客熱膀胱間連脅下時有氣妨皮膚瘙癢癮疹飲食不多日漸瘦損常有憂愁心忪少氣等證並收苗花二十餘斤銼細以水二石五斗煮一石五斗斛中浸浴令汗出五六度其瘙癢即止四時常用癮疹風永除天寶單方圖煎飲散氣鬱利胸膈降痰熱時珍發明好古曰香附治膀胱兩脅氣妨心忪少氣是能益氣乃血中之氣藥也本草不言治崩漏而方中用治崩漏是能益氣而止血也又能逐去瘀血是推陳也正如巴豆治大便不通而又止泄瀉同意又云香附陽中之陰血中之氣藥凡氣鬱血氣必用之炒黑能止血治崩漏此婦人之仙藥也多服亦能走氣震亨曰香附須用童子小便浸過能總解諸郁凡血氣必用之藥引至氣分而生血此正陰生陽長之義本草不言補而方家言於老人有益意有存焉蓋於行中有補理天之所以為天者健而有常也健運不息所以生生無窮即此理爾今即香中亦用之時珍曰香附之氣平而不寒香而能竄其味多辛能散微苦能降微甘能和乃足厥陰肝手少陽三焦氣分主藥而兼通十二經氣分生則上行胸膈外達皮膚熟則下走肝腎外徹腰足炒黑則止血得童溲浸炒則入血分而補虛鹽水浸炒則入血分而潤燥青鹽炒則補腎氣酒浸炒則行經絡醋浸炒則消積聚薑汁炒則化痰飲得參術則補氣得歸芐則補血得木香則疏滯和中得檀香則理氣醒脾得沉香則升降諸氣得芎藭蒼朮則總解諸郁得梔子黃連則能降火熱得茯神則交濟心腎得茴香破故紙則引氣歸元得厚朴半夏則決壅消脹得紫蘇蔥白則解散邪氣得三稜莪朮則消磨積塊得艾葉則治血氣暖子宮乃氣病之總司女科之主帥也飛霞子韓𢘅云香附能推陳致新故諸書皆云益氣而俗有耗氣之說宜於女人不宜於男子者非矣蓋婦人以血用事氣行則無疾老人精枯血閉惟氣是資小兒氣日充則形乃日固大凡病則氣滯而餒故香附於氣分為君藥世所罕知臣以參耆佐以甘草治虛怯甚速也𢘅遊方外時懸壺輕賚治百病黃鶴丹治婦人青囊丸隨宜用引輒有小效人索不已用者當思法外意可也黃鶴丹乃銖衣翁在黃鶴樓所授之方故名其方用香附一斤黃連半斤洗曬為末水糊丸梧子大假如外感蔥薑湯下內傷米飲下氣病木香湯下血病酒下痰病薑湯下火病白湯下余可類推青囊丸乃邵應節真人禱母病感方士所授者方用香附略炒一斤烏藥略炮五兩三錢為末水醋煮麵糊為丸隨證用引如頭痛茶下痰氣薑湯下多用酒下為妙附方舊一新四十八服食法頌曰唐玄宗天寶單方圖云水香稜根名莎結亦名草附子說已見前其味辛微寒無毒凡丈夫心中客熱膀胱間連脅下氣妨常日憂愁不樂兼心忪者取根二大升搗熬令香以生絹袋盛貯於三大斗無灰清酒中浸之春三月後浸一日即堪服冬十月後即七日近暖處乃佳每空腹溫飲一盞日夜三四次常令酒氣相續以知為度若不飲酒即取根十兩加桂心五兩蕪荑三兩和搗為散以蜜和為丸搗一千杵丸如梧子大每空腹酒及姜蜜湯飲汁等下二十丸日再服漸加至三十丸以瘥為度交感丹凡人中年精耗神衰蓋由心血少火不下降腎氣憊水不上升致心腎隔絶營衛不和上則多驚中則塞痞飲食不下下則虛冷遺精愚醫徒知峻補下田非惟不能生水滋陰而反見衰悴但服此方半年屏去一切暖藥絶嗜欲然後習祕固溯流之術其效不可殫述俞通奉年五十一遇鐵甕城申先生授此服之老猶如少年至八十五乃終也因普示群生同登壽域香附子一斤新水浸一宿石上擦去毛炒黃茯神去皮木四兩為末煉蜜丸彈子大每服一丸侵早細嚼以降氣湯下降氣湯用香附子如上法半兩茯神二兩炙甘草一兩半為末點沸湯服前藥薩謙齊瑞竹堂經驗方一品丸治氣熱上攻頭目昏眩及治偏正頭痛大香附子去皮水煮一時搗曬焙研為末煉蜜丸彈子大每服一丸水一盞煎八分服女人醋湯煎之奇效良方升降諸氣治一切氣病痞脹喘噦噫酸煩悶虛痛走注常服開胃消痰散壅思食早行山行尤宜服之去邪辟瘴香附子炒四百兩沉香十八兩縮砂仁四十八兩炙甘草一百二十兩為末每服一錢入鹽少許白湯點服和劑局方一切氣疾心腹脹滿胸膈噎塞噫氣吞酸痰逆嘔惡及宿酒不解香附子一斤縮砂仁八兩甘草炙四兩為末每白湯入鹽點服為粗末煎服亦可名快氣湯和劑局方調中快氣心腹刺痛小烏沉湯香附子擦去毛焙二十兩烏藥十兩甘草炒一兩為末每服二錢鹽湯隨時點服和劑局方心脾氣痛白飛霞方外奇方云凡人胸膛軟處一點痛者多因氣及寒起或致終身或子母相傳俗名心氣痛非也乃胃脘有滯爾惟此獨步散治之甚妙香附米醋浸略炒為末高良薑酒洗七次略炒為末俱各封收因寒者姜二錢附一錢因氣者附二錢姜一錢因氣與寒者各等分和勻以熱米湯入薑汁一匙鹽一捻調下立止不過七八次除根王璆百一方云內翰吳開夫人心痛欲死服此即愈類編云梁混心脾痛數年不愈供事穢跡佛夢傳此方一服而愈因名神授一匕散心腹諸病艾附丸治男女心氣痛腹痛少腹痛血氣痛不可忍者香附子二兩蘄艾葉半兩以醋湯同煮熟去艾炒為末米醋糊丸梧子大每白湯服五十丸集簡方停痰宿飲風氣上攻胸膈不利香附皂莢水浸半夏各一兩白礬末半兩薑汁麵糊丸梧子大每服三四十丸薑湯隨時下仁存方元臟腹冷及開胃香附子炒為末每用二錢薑鹽同煎服普濟方酒腫虛腫香附子去皮米醋煮乾焙研為末米醋糊丸服久之敗水從小便出神效經驗良方氣虛浮腫香附子一斤童子小便浸三日焙為末糊丸每米飲下四五十丸日二丹溪心法老小痃癖往來疼痛香附南星等分為末薑汁糊丸梧子大每薑湯下三三十丸聖惠㿗疝脹痛及小腸氣香附末二錢以海藻一錢煎酒空心調下並食海藻瀕湖集簡方腰痛揩牙香附子五兩生薑二兩取自然汁浸一宿炒黃為末入青鹽二錢擦牙數次其痛即止乾坤生意血氣刺痛香附子炒一兩荔枝核燒存性五錢為末每服二錢米飲調下婦人良方女人諸病瑞竹堂方四制香附丸治婦人女子經候不調兼諸病大香附子擦去毛一斤分作四分四兩醇酒浸四兩醇醋浸四兩鹽水浸四兩童子小便浸春三秋五夏一冬七日淘洗淨曬乾搗爛微焙為末醋煮麵糊丸梧子大每酒下七十丸瘦人加澤蘭赤茯苓末二兩氣虛加四君子料血虛加四物料法生堂方煮附濟陰丸治婦人月經不調久成症積一切風氣用香附子一斤分作四分以童溲鹽水酒醋各浸三日艾葉一斤漿水浸過醋糊和作餅曬乾晚蠶砂半斤炒莪朮四兩酒浸當歸四兩酒浸各焙為末醋糊丸梧子大每服七十丸米飲下日二醋附丸治婦人室女一切經候不調血氣刺痛腹脅膨脹心怔乏力面色痿黃頭暈噁心崩漏帶下便血癥瘕積聚及婦人數墮胎由氣不升降服此尤妙香附子米醋浸半日砂鍋煮乾搗焙石臼為末醋糊為丸醋湯下淡寮方艾附丸治同上香附子一斤熟艾四兩醋煮當歸酒浸二兩為末如上丸服婦人氣盛血衰變生諸症頭暈腹滿皆宜抑氣散主之香附子四兩炒茯苓甘草炙各一兩橘紅二兩為末每服二錢沸湯下濟生方下血血崩血如山崩或五色漏帶並宜常服滋血調氣乃婦人之仙藥也香附子去毛炒焦為末極熱酒服二錢立愈昏迷甚者三錢米飲下亦可加棕灰許學士本事方赤白帶下及血崩不止香附子赤芍藥等分為末鹽一捻水二盞煎一盞食前溫服聖惠方安胎順氣鐵罩散香附子炒為末濃煎紫蘇湯服一二錢一加砂仁中藏經妊娠惡阻胎氣不安氣不升降嘔吐酸水起坐不便飲食不進二香散用香附子一兩藿香葉甘草各二錢為末每服二錢沸湯入鹽調下聖惠方臨産順胎九月十月服此永無驚恐福胎飲用香附子四兩縮砂仁炒三兩甘草炙一兩為末每服二錢米飲下朱氏集驗方産後狂言血暈煩渴不止生香附子去毛為末每服二錢薑棗水煎服同上氣鬱吐血丹溪用童子小便調香附末二錢服淡寮方治吐血不止莎草根一兩白茯苓半兩為末每服二錢陳粟米飲下肺破咯血香附末一錢米飲下日二服百一選方小便尿血香附子新地榆等分各煎湯先服香附湯三五呷後服地榆湯至盡未效再服指迷方小便血淋痛不可忍香附子陳皮赤茯苓等分水煎服十便良方諸般下血香附童子小便浸一日搗碎米醋拌焙為末每服二錢米飲下直指方用香附以醋酒各半煮熟焙研為末黃秫米糊丸梧子大每服四十丸米飲下日二服戴原禮云只以香附子末二錢入百草霜麝香各少許同服效尤速也老小脫肛香附子荊芥穗等分為末每用三匙水一大碗煎十數沸淋洗三因方偏正頭風香附子炒一斤烏頭炒一兩甘草二兩為末煉蜜丸彈子大每服一丸蔥茶嚼下本事方氣鬱頭痛淡寮方用香附子炒四兩川芎藭二兩為末每服二錢臘茶清調下常服除根明目華他中藏經加甘草一兩石膏二錢半頭風睛痛方同妊娠惡阻女人頭痛香附子末茶服三錢日三五服經驗良方肝虛睛痛冷淚羞明補肝散用香附子一兩夏枯草半兩為末每服一錢茶清下簡易方耳卒聾閉香附子瓦炒研末蘿蔔子煎湯早夜各服二錢忌鐵器衛生易簡方聤耳出汁香附末以綿杖送入蔡邦度知府常用有效經驗良方諸般牙痛香附艾葉煎湯漱之仍以香附末擦之去涎普濟方牢牙去風益氣烏髭治牙疼牙宣乃鐵甕先生妙方也香附子炒存性三兩青鹽生薑各半兩為末日擦濟生方消渴纍年不愈莎草根一兩白茯苓半兩為末每陳粟米飲服三錢日二癰疽瘡瘍曾孚先云凡癰疽瘡瘍皆因氣滯血凝而致宜服諸香藥引氣通血常器之云凡氣血聞香即行聞臭即逆瘡瘍皆由氣澀而血聚最忌臭穢不潔觸之毒必引蔓陳正節公云大凡疽疾多因怒氣而得但服香附子藥進食寬氣大有效也獨勝散用香附子去毛以生薑汁醃一宿焙乾碾為細末無時以白湯服二錢如瘡初作以此代茶瘡潰後亦宜服之或只以局方小烏沉湯少用甘草愈後服至半年尤妙陳自明外科精要蜈蚣咬傷嚼香附塗之立效袖珍方瑞香綱目集解時珍曰南方州郡山中有之枝幹婆娑柔條厚葉四時青茂冬春之交開花成簇長三四分如丁香狀有黃白紫三色格古論云瑞香高者三四尺有數種有枇杷葉者楊梅葉者柯葉者球子者攣枝者惟攣枝者花紫香烈枇杷葉者結子其始出於廬山宋時人家栽之始著名攣枝者其節攣曲如斷折之狀也其根綿軟而香根氣味甘咸無毒主治急喉風用白花者研水灌之時珍出醫學集成茉莉綱目釋名奈花時珍曰稽含草木狀作末利洛陽名園記作抹厲佛經作抹利王龜齡集作沒利洪邁集作末麗蓋末利本胡語無正字隨人會意而已韋君呼為狎客張敏叔呼為遠客楊慎丹鉛録云晉書都人簪奈花即今末利花也集解時珍曰茉莉原出波斯移植南海今滇廣人栽蒔之其性畏寒不宜中土弱莖繁枝緑葉團尖初夏開小白花重瓣無蕊秋盡乃止不結實有千葉者紅色者蔓生者其花皆夜開芬香可愛女人穿為首飾或合面脂亦可熏茶或蒸取液以代薔薇水又有似茉莉而瓣大其香清絶者謂之狗牙亦名雪瓣海南有之素馨指甲皆其類也並附於下花氣味辛熱無毒主治蒸油取液作面脂頭澤長髮潤燥香肌亦入茗湯時珍根氣味熱有毒主治以酒磨一寸服則昏迷一日乃醒二寸二日三寸三日凡跌損骨節脫臼接骨者用此則不知痛也汪機附録素馨時珍曰素馨亦自西域移來謂之耶悉茗花即酉陽雜俎所載野悉蜜花也枝幹嫋娜葉似茉莉而小其花細瘦四瓣有黃白二色採花壓油澤頭甚香滑也指甲花有黃白二色夏月開香似木犀可染指甲過於鳳仙花鬱金香宋開寶校正禹錫曰陳氏言郁是草英不當附於木部今移入此釋名鬱金御覽紅藍花綱目紫述香綱目草麝香茶矩摩佛書頌曰許慎說文解字云郁芳草也十葉為貫百二十貫築以煮之郁鬯乃百草之英合而釀酒以降神乃遠方郁人所貢故謂之郁郁今鬱林郡也時珍曰漢鬱林郡即今廣西貴州潯柳雍賓諸州之地一統志惟載柳州羅城縣出鬱金香即此也金光明經謂之茶矩摩香此乃鬱金花香與今時所用鬱金根名同物異唐慎微本草收此入彼下誤矣按趙古則六書本義鬯字象米在器中以匕扱之之意郁字從臼奉缶置於几上鬯有彡飾五體之意俗作郁則鬱乃取花築酒之意非指地言地乃因此草得名耳集解藏器曰鬱金香生大秦國二月三月有花狀如紅藍四月五月採花即香也時珍曰按鄭玄雲郁草似蘭楊孚南州異物志云鬱金出罽賓國人種之先以供佛數日萎然後取之色正黃與芙蓉花裹嫩蓮者相似可以香酒又唐書云太宗時伽毗國獻鬱金香葉似麥門冬九月花開狀似芙蓉其色紫碧香聞數十步花而不實欲種者取根二說皆同但花色不同種或不一也古樂府云中有鬱金蘇合香者是此鬱金也晉左貴嬪有鬱金頌云伊有奇草名曰鬱金越自殊域厥珍來尋芳香酷烈悅目怡心明德惟馨淑人是欽氣味苦溫無毒藏器曰平主治蠱野諸毒心腹間惡氣鬼疰鴉鶻等一切臭入諸香藥用藏器茅香宋開寶校正併入宋圖經香麻釋名嗢尸羅金光明經香麻時珍曰蘇頌圖經復出香麻一條云出福州煎湯浴風甚良此即香茅也閩人呼茅如麻故爾今併為一集解志曰茅香生劍南道諸州其莖葉黑褐色花白色即非白茅香也頌曰今陝西河東汴東州郡亦有之遼澤州充貢三月生苗似大麥五月開白花亦有黃花者有結實者有無實者並正月二月採根五月採花八月採苗宗奭曰茅香根如茅但明潔而長可作浴湯同藁本尤佳仍入印香中合香附子用時珍曰茅香凡有二此是一種香茅也其白茅香別是南番一種香草唐慎微本草不知此義乃以白茅花及白茅香諸注引入茅香之下今並提歸各條花氣味苦溫無毒主治中惡溫胃止嘔吐療心腹冷痛開寶附方新一冷勞久病茅香花艾葉四兩燒存性研末粟米飯丸梧子大初以蛇床子湯下二十丸至三十丸微吐不妨後用棗湯下立效聖濟總録苗葉主治作浴湯辟邪氣令人身香開寶白茅香拾遺集解藏器曰白茅香生安南如茅根道家用作浴湯珣曰廣志云生廣南山谷合諸名香甚奇妙尤勝舶上來者時珍曰此乃南海白茅香亦今排香之類非近道之白茅及北土茅香花也根氣味甘平無毒主治惡氣令人身香煮湯服治腹內冷痛藏器小兒遍身瘡疱合桃葉煎湯浴之李珣排草香綱目集解時珍曰排草香出交趾今嶺南亦或蒔之草根也白色狀如細柳根人多僞雜之案范成大桂海志云排草香狀如白茅香芬烈如麝香人亦用以合香諸香無及之者又有麝香木出古城乃老朽樹心節氣頗類麝根氣味辛溫無毒主治闢臭去邪惡氣時珍附録瓶香珣曰案陳藏器云生南海山谷草之狀也其味寒無毒主鬼魅邪精天行時氣並宜燒之水煮洗水腫浮氣與生薑芥子煎湯浴風瘧甚效耕香藏器曰生烏滸國莖生細葉味辛溫無毒主鬼氣調中去臭時珍曰二香皆草狀恐亦排草之類也故附之迷迭香拾遺集解藏器曰廣志云出西海魏略云出大秦國時珍曰魏文帝時自西域移植庭中同曹植等各有賦大意其草修干柔莖細枝弱根繁花結實嚴霜弗凋收採幽殺摘去枝葉入袋佩之芳香甚烈與今之排香同氣氣味辛溫無毒主治惡氣令人衣香燒之去鬼藏器珣曰性平不溫合羌活為丸燒之闢蚊蚋䔾車香拾遺集解藏器曰廣志云䔾車香生徐州高數尺黃葉白花爾雅䔾車乞輿郭璞云香草也珣曰生海南山谷齊民要術云凡諸樹木蟲蛀者煎此香冷淋之即闢也時珍曰楚詞畦留夷與䔾車則昔人常栽蒔之與今蘭香零陵相類也氣味辛溫無毒珣曰微寒主治鬼氣去臭及蟲魚蛀蠹藏器治霍亂辟惡氣薰衣佳珣艾納香宋開寶集解志曰廣志云艾納出西國似細艾又有松樹皮上緑衣亦名艾納可以和合諸香燒之能聚其煙青白不散而與此不同禹錫曰案古樂府云行胡從何方列國持何來氍毹𣯚𣰆五木香迷迭艾納及都梁是也氣味甘溫平無毒主治去惡氣殺蟲主腹冷泄痢志傷寒五泄心腹注氣止腸鳴下寸白燒之闢瘟疫合蜂窠浴腳氣良珣治癬闢蛇藏器兜納香海藥集解珣曰案廣志云出西海剽國諸山魏略云出大秦國草類也氣味辛平無毒藏器曰甘溫主治溫中除暴冷藏器惡瘡腫瘻止痛生肌併入膏用燒之闢遠近惡氣帶之夜行壯膽安神與茅香柳枝煎湯浴小兒易長李珣線香綱目集解時珍曰今人合香之法甚多惟線香可入瘡科用其料加減不等大抵多用白芷芎藭獨活甘松三奈丁香藿香藁本高良薑角茴香連喬大黃黃芩柏木兜婁香末之類為末以榆皮面作糊和劑以唧筒笮成線香成條如線也亦或盤成物象字形用鐵銅絲懸爇者名龍掛香氣味辛溫無毒主治熏諸瘡癬時珍附方新一楊梅毒瘡龍掛香孩兒茶皂角子各一錢銀硃二錢為末紙卷作捻點燈置桶中以鼻吸烟一日三次三日止內服解毒藥瘡即干集簡方藿香宋嘉祐校正承曰宜入草部釋名兜婁婆香時珍曰豆葉曰藿其葉似之故名楞嚴經云壇前以兜婁婆香煎水洗浴即此法華經謂之多摩羅跋香金光明經謂之鉢怛羅香皆兜婁二字梵言也涅槃又謂之迦算香集解禹錫曰按南州異物志云藿香出海邊國形如都梁葉似水蘇可著衣服中嵇含南方草木狀云出交址九真武平興古諸地吏民自種之榛生五六月採曬乾乃芬香頌曰藿香嶺南多有之人家亦多種二月生苗莖梗甚密作叢葉似桑而小薄六月七月採之須黃色乃可收金樓子及俞益期箋皆云扶南國人言五香共是一木其根是旃檀節是沈香花是雞舌葉是藿香膠是熏陸故本草以五香共條義亦出此今南中藿香乃是草類與嵇含所說正相符合范曄合香方云零藿虛燥古人乃以合薰香即此扶南之說似涉欺罔也時珍曰藿香方莖有節中虛葉微似茄葉潔古東垣惟用其葉不用枝梗今人並枝梗用之因葉多僞故耳唐史云頓遜國出藿香插枝便生葉如都梁者是也劉欣期交州記言藿香似蘇合香者謂其氣相似非謂形狀也枝葉氣味辛微溫無毒元素曰辛甘又曰甘苦氣厚味薄浮而升陽也杲曰可升可降陽也入手足太陰經主治風水毒腫去惡氣止霍亂心腹痛別録脾胃吐逆為要藥蘇頌助胃氣開胃口進飲食元素溫中快氣肺虛有寒上焦壅熱飲酒口臭煎湯漱口好古發明杲曰芳香之氣助脾胃故藿香能止嘔逆進飲食好古曰手足太陰之藥故入順氣烏藥散則補肺入黃耆四君子湯則補脾也附方新六升降諸氣藿香一兩香附炒五兩為末每以白湯點服一錢經效濟世方霍亂吐瀉垂死者服之回生用藿香葉陳皮各半兩水二盞煎一盞溫服百一選方暑月吐瀉滑石炒二兩藿香二錢半丁香五分為末每服一二錢淅米泔調服禹講師經驗方胎氣不安氣不升降嘔吐酸水香附藿香甘草二錢為末每服二錢入鹽少許沸湯調服之聖惠香口去臭藿香洗淨煎湯時時噙漱摘玄方冷露瘡爛藿香葉細茶等分燒灰油調塗葉上貼之應驗方零陵香宋開寶釋名蕙草別録香草開寶燕草綱目黃零草玉冊時珍曰古者燒香草以降神故曰薰曰蕙薰者熏也蕙者和也漢書云薰以香自燒是矣或云古人祓除以此草熏之故謂之薰亦通範成大虞衡志言零陵即今永州不出此香惟融宜等州甚多土人以編席薦性暖宜人謹按零陵舊治在今全州全乃湘水之源多生此香今人呼為廣零陵香者乃真薰草也若永州道州武岡州皆零陵屬地也今鎮江丹陽皆蒔而刈之以酒灑制貨之芬香更烈謂之香草與蘭草同稱楚辭云既滋蘭之九畹又樹蕙之百畝則古人皆栽之矣張揖廣雅云滷薰也其葉謂之蕙而黃山谷言一干數花者為蕙蓋因不識蘭草蕙草強以蘭花為分別也鄭樵修本草言蘭即蕙蕙即零陵香亦是臆見殊缺分明但蘭草蕙草乃一類二種耳集解別録曰薰草一名蕙草生下濕地三月採陰乾脫節者良又曰蕙實生魯山平澤弘景曰桐君藥録薰草葉如麻兩兩相對山海經云浮山有草麻葉而方莖赤華而黑實氣如蘼蕪名曰薰草可以已癘今俗人皆呼燕草狀如茅而香者為薰草人家頗種之者非也詩書家多用蕙而竟不知是何草尚其名而迷其實皆此類也藏器曰薰草即是零陵香薰乃蕙草根也志曰零陵香生零陵山谷葉如羅勒南越志云土人名燕草又名薰草即香草也山海經薰草即是此頌曰零陵香今湖嶺諸州皆有之多生下濕地葉如麻兩兩相對莖方常以七月中旬開花至香古云薰草是也嶺南人皆作窯灶以火炭焙乾令黃色乃佳江淮亦有土生者亦可作香但不及湖嶺者至枯槁香尤芬熏耳古方但用薰草不用零陵香今合香家及面脂澡豆諸法皆用之都下市肆貨之甚便時珍曰今惟吳人栽造貨之亦廣薰草別録中品氣味甘平無毒權曰苦無毒珣曰辛溫無毒不宜多服令人氣喘玉冊云伏三黃硃砂主治明目止淚療泄精去臭惡氣傷寒頭痛上氣腰痛別録單用治鼻中息肉鼻齆甄權零陵香主惡氣疰心腹痛滿下氣令體香和諸香作湯丸用得酒良開寶主風邪衝心虛勞疳䘌得升麻細辛煎飲治牙齒腫痛善李珣治血氣腹脹莖葉煎酒服大明婦人浸油飾發香無以加宗奭發明時珍曰薰草芳馨其氣辛散上達故心腹惡氣齒痛鼻塞皆用之脾胃喜芳香芳香可以養鼻是也多服作喘為能耗散真氣也附方新十傷寒下痢蕙草湯用蕙草當歸各二兩黃連四兩水六升煮二升服日三服範汪方傷寒狐惑食肛者蕙草黃連各四兩㕮咀以白酸漿一斗漬一宿煮取二升分三服小品方頭風旋運痰逆噁心懶食真零陵香霍香葉莎草根炒等分為末每服二錢茶下日三服本事方小兒鼻塞頭熱用薰草一兩羊髓三兩銚內慢火熬成膏去滓日摩背上三四次聖惠方頭風白屑零陵香白芷等分水煎汁入雞子白攪勻敷數十次終身不生聖惠方牙齒疼痛零陵香梗葉煎水含漱之普濟方風牙疳牙零陵香洗炙蓽茇炒等分為末摻之普濟方夢遺失精薰草湯用薰草人參白朮白芍藥生地黃各二兩茯神桂心甘草炙各二兩大棗十二枚水八升煮三升分二服外臺祕要婦人斷産零陵香為末酒服二錢每服至一兩即一年絶孕蓋血聞香即散也醫林集要五色諸痢返魂丹用零陵香草去根以鹽酒浸半月炒乾每兩入廣木香一錢半為末裡急腹痛者用冷水服一錢半通了三四次用熱米湯服一錢半止痢只忌生梨一味集簡方薏實別録有名未用部藏器曰即蘭蕙之蕙也五月採之辛香氣味辛平無毒主治明目補中別録根莖中涕主治傷寒寒熱出汗中風面腫消渴熱中逐水別録主五痔脫肛有蟲時珍出千金蘭草本經上品釋名蕑音閒水香本經香水蘭開寶女蘭綱目香草綱目燕尾香開寶大澤蘭炮炙論煎澤草弘景蘭澤草唐本省頭草綱目都梁香李當之孩兒菊綱目千金草志曰葉似馬蘭故名蘭草其葉有歧俗呼燕尾香時人煮水以浴療風故又名香水蘭藏器曰蘭草生澤畔婦人和油澤頭故云蘭澤盛弘之荊州記云都梁有山下有水清淺其中生蘭草因名都梁香時珍曰都梁即今之武岡州也又臨淮盱眙縣亦有都梁山産此香蘭乃香草能闢不祥陸璣詩疏言鄭俗三月男女秉蕑於水際以自祓除蓋蘭以闌之蕑以閒之其義一也淮南子云男子種蘭美而不芳則蘭須女子種之女蘭之名或因乎此其葉似菊女子小兒喜佩之則女蘭孩菊之名又或以此也唐瑤經驗方言江南人家種之夏月採置發中令頭不䐈故名省頭草其說正合煎澤之義古人蘭蕙皆稱香草如零陵香草都梁香草後人省之通呼為香草爾近世但知蘭花不知蘭草惟虛谷方回考訂極言古之蘭草即今之千金草俗名孩兒菊者其說可據詳下正誤集解別録曰蘭草生太吳池澤四月五月採弘景曰方藥俗人並不識用太吳應是吳國太伯所居故呼太吳今東間有煎澤草名蘭香或是此也李當之云是今人所種都梁香草也澤蘭亦名都梁香恭曰蘭即蘭澤香草也圓莖紫萼八月花白俗名蘭香煮以洗浴生溪澗水旁人間亦多種之以飾庭池陶所引煎澤草都梁香者是也而不能的識保升曰生下濕地葉似澤蘭尖長有歧花紅白色而香藏器曰蘭草澤蘭二物同名陶不能知蘇亦浪別蘭草生澤畔葉光潤陰小紫五月六月採陰乾即都梁香也澤蘭葉尖微有毛不光潤莖方節紫初採微辛干之亦辛蘇云八月花白者即澤蘭也以注蘭草殊誤矣時珍曰蘭草澤蘭一類二種也俱生水旁下濕處二月宿根生苗成叢紫莖素枝赤節緑葉葉對節生有細齒但以莖圓節長而葉光有岐者為蘭草莖微方節短而葉有毛者為澤蘭嫩時並可挼而佩之八九月後漸老高者三四尺開花成穗如雞蘇花紅白色中有細子雷斆炮炙論所謂大澤蘭即蘭草也小澤蘭即澤蘭也禮記佩帨蘭茝楚辭紉秋蘭以為佩西京雜記載漢時池苑種蘭以降神或雜粉藏衣書中闢蠹者皆此二蘭也今吳人蒔之呼為香草夏月刈取以酒油灑制纏作把子貨為頭澤佩帶與別録所出太吳之文正相符合諸家不知二蘭乃一物二種但功用有氣血之分故無定指惟寇氏朱氏之誤尤甚故考證於下或云家蒔者為蘭草野生者為澤蘭亦通正誤寇宗奭曰蘭草諸家之說異同乃未的識故無定論今江陵鼎澧州山谷之間頗有之山外平田即無多生陰地幽谷葉如麥門冬而闊且韌長及一二尺四時常青花黃緑色中間瓣上有細紫點春芳者為春蘭色深秋芳者為秋蘭色淡開時滿室盡香與他花香又別朱震亨曰蘭葉稟金水之氣而似有火人知其花香之貴而不知其葉有藥方蓋其葉能散久積陳郁之氣甚有力即今之栽置座右者時珍曰二氏所說乃近世所謂蘭花非古之蘭草也蘭有數種蘭草澤蘭生水旁山蘭即蘭草之生山中者蘭花亦生山中與三蘭迥別蘭花生近處者葉如麥門冬而春花生福建者葉如菅茅而秋花黃山谷所謂一干一花為蘭一干數花為蕙者蓋因不識蘭草蕙草遂以蘭花強生分別也蘭草與澤蘭同類故陸璣言蘭似澤蘭但廣而長節離騷言其緑葉紫莖素枝可紉可佩可藉可膏可浴鄭詩言士女秉蕑應劭風俗通言尚書奏事懷香握蘭禮記言諸侯贄薰大夫贄蘭漢書言蘭以香自燒也若夫蘭花有葉無枝可玩而不可紉佩藉浴秉握膏焚故朱子離騷辨證言古之香草必花葉俱香而燥濕不變故可刈佩今之蘭蕙但花香而葉乃無氣質弱易萎不可刈佩必非古人所指甚明古之蘭似澤蘭而蕙即今之零陵香今之似茅而花有兩種者不知何時誤也熊太古冀越集言世俗之蘭生於深山窮谷決非古時水澤之蘭也遁齊閒覽言楚騷之蘭或以為都梁香或以為澤蘭或以為猗蘭當以澤蘭為正今人所種如麥門冬者名幽蘭非真蘭也故陳止齊著盜蘭說以譏之方虛谷訂蘭說言古之蘭草即今之千金草俗名孩兒菊者今之所謂蘭其葉如茅而嫩者根名土續斷因花馥郁故得蘭名也楊升庵云世以如蒲萱者為蘭九畹之受誣久矣又吳草廬有蘭說甚詳云蘭為醫經上品之藥有枝有莖草之植者也今所謂蘭無枝無莖因黃山谷稱之世遂謬指為離騷之蘭寇氏本草亦溺於俗反疑舊說為非夫醫經為實用豈可誤哉今之蘭果可利水殺蠱而除痰癖乎其種盛於閩朱子乃閩人豈不識其土産而反辨析如此世俗至今猶以非蘭為蘭何其惑之難解也嗚呼觀諸儒之明析如此則寇朱二氏之誤可知而醫家用蘭草者當不復疑矣葉修治見澤蘭下氣味辛平無毒杲曰甘寒主治利水道殺蠱毒闢不祥久服益氣輕身不老通神明本經除胸中痰癖別録生血調氣養營雷斆其氣清香生津止渴潤肌肉治消渴膽疸李杲煮水浴風病馬志消癰腫調月經煎水解中牛馬毒時珍主惡氣香澤可作膏塗發藏器發明時珍曰按素問云五味入口藏於脾胃以行其精氣津液在脾令人口甘此肥美所發也其氣上溢轉為消渴治之以蘭除陳氣也王冰注云辛能發散故也李東垣治消渴生津飲用蘭葉蓋本於此詳見澤蘭下又此草浸油塗發去風垢令香潤史記所謂羅襦襟解微聞香澤者是也崔實四時月令作香澤法用清油浸蘭香藿香雞舌香苜蓿葉四種以新綿裹浸胡麻油和豬脂納銅鐺中沸定下少許青蒿以綿冪瓶鐺嘴瀉出瓶收用之附方新一食牛馬毒殺人者省頭草連根葉煎水服即消唐瑤經驗方澤蘭本經中品校正併入嘉祐地筍釋名水香吳普都梁香弘景虎蘭本經虎蒲別録龍棗本經孩兒菊綱目風藥綱目根名地筍嘉祐弘景曰生於澤旁故名澤蘭亦名都梁香時珍曰此草亦可為香澤不獨指其生澤旁也齊安人呼為風藥吳普本草一名水香陶氏云亦名都梁今俗通呼為孩兒菊則其與蘭草為一物二種尤可證矣其根可食故曰地筍集解別録曰澤蘭生汝南諸大澤旁三月三日採陰乾普曰生下地水旁葉如蘭二月生苗赤節四葉相值枝節間弘景曰今處處有之多生下濕地葉微香可煎油及作浴湯人家多種之而葉小異今山中又有一種甚相似莖方葉小強不甚香既云澤蘭則山中者為非而藥家乃採用之恭曰澤蘭莖方節紫葉似蘭草而不甚香今京下用者是也陶說乃是蘭草莖圓紫萼白花殊非澤蘭也頌曰今荊徐隨壽蜀梧州河中府皆有之根紫黑色如粟根二月生苗高二三尺莖幹青紫色作四稜葉生相對如薄荷微香七月開花帶紫白色萼通紫色亦似薄荷花三月採苗陰乾荊湖嶺南人家多種之壽州出者無花子此與蘭草大抵相類但蘭草生水旁葉光潤陰小紫五六月盛而澤蘭生水澤中及下濕地葉尖微有毛不光潤方莖紫節七月八月初採微辛此為異爾斆曰凡使須別雌雄大澤蘭莖葉皆圓根青黃能生血調氣與榮合小澤蘭迥別葉上斑根頭尖能破血通久積宗奭曰澤蘭出土便分枝梗葉皆如菊但尖長爾吳普言葉似蘭誤矣今蘭葉如麥門冬殊不相似時珍曰吳普所說乃真澤蘭也雷斆所說大澤蘭即蘭草也小澤蘭即此澤蘭也寇宗奭所說澤蘭則是而破吳普之說則非蓋由誤認蘭花為蘭草也詳見蘭草正誤下葉修治斆曰凡用大小澤蘭細銼以絹袋盛懸於屋南畔角上令乾用氣味苦微溫無毒別録曰甘普曰神農黃帝岐伯桐君酸無毒李當之小溫權曰苦辛之才曰防己為之使主治乳婦內衄中風余疾大腹水腫身面四肢浮腫骨節中水金瘡癰腫瘡膿本經産後金瘡內塞別録産後腹痛頻産血氣衰冷成勞瘦羸婦人血瀝腰痛甄權産前産後百病通九竅利關節養血氣破宿血消癥瘕通小腸長肌肉消撲損瘀血治鼻血吐血頭風目痛婦人勞瘦丈夫面黃大明發明頌曰澤蘭婦人方中最為急用古人治婦人澤蘭丸甚多時珍曰蘭草澤蘭氣香而溫味辛而散陰中之陽足太陰厥陰經藥也脾喜芳香肝宜辛散脾氣舒則三焦通利而正氣和肝鬱散則營衛流行而病邪解蘭草走氣道故能利水道除痰癖殺蠱辟惡而為消渴良藥澤蘭走血分故能治水腫塗癰毒破瘀血消癥瘕而為婦人要藥雖是一類而功用稍殊正如赤白茯苓芍藥補瀉皆不同也雷斆言雌者調氣生血雄者破血通積正合二蘭主治大澤蘭之為蘭草尤可憑據血生於氣故曰調氣生血也又荀子云澤芷以養鼻謂澤蘭白芷之氣芳香通乎肺也附方舊一新四産後水腫血虛浮腫澤蘭防己等分為末每服二錢醋湯下張文仲備急方小兒蓐瘡嚼澤蘭心封之良子母祕録瘡腫初起澤蘭搗封之良集簡方損傷瘀腫方同上産後陰翻産後陰戶燥熱遂成翻花澤蘭四兩煎湯熏洗二三次再入枯礬煎洗之即安集簡方地筍宋嘉祐氣味甘辛溫無毒主治利九竅通血脈排膿治血藏器止鼻洪吐血産後心腹痛産婦可作蔬菜食佳大明子主治婦人三十六疾千金方承澤丸中用之馬蘭日華釋名紫菊時珍曰其葉似蘭而大其花似菊而紫故名俗稱物之大者為馬也集解藏器曰馬蘭生澤旁如澤蘭而氣臭楚詞以惡草喻惡人北人見其花呼為紫菊以其似單瓣菊花而紫也又有山蘭生山側似劉寄奴葉無丫不對生花心微黃赤亦大破血皆可用時珍曰馬蘭湖澤卑濕處甚多二月生苗赤莖白根長葉有刻齒狀似澤蘭但不香爾南人多采汋曬乾為蔬及饅餡入夏高二三尺開紫花花罷有細子楚辭無馬蘭之名陳氏指為惡草何據根葉氣味辛平無毒主治破宿血養新血止鼻衄吐血合金瘡斷血痢解酒疸及諸菌毒蠱毒生搗塗蛇咬大明主諸瘧及腹中急痛痔瘡時珍發明時珍曰馬蘭辛平能入陽明血分故治血與澤蘭同功近人用治痔漏云有效春夏取生秋冬取乾者不用鹽醋白水煮食並飲其汁或以酒煮焙研糊丸米飲日日服之仍用煎水入鹽少許日日熏洗之醫學集成云治痔用馬蘭根搗敷片時看肉平即去之稍遲恐肉反出也附方新六諸瘧寒熱赤腳馬蘭搗汁入水少許發日早服或入少糖亦可聖濟總録絞腸沙痛馬蘭根葉細嚼咽汁立安壽域神方打傷出血竹節草即馬蘭同旱蓮草松香皂子葉即匱子葉冬用皮為末搽入刀口摘玄方喉痹口緊用地白根即馬蘭根或葉搗汁入米醋少許滴鼻孔中或灌喉中取痰自開孫一鬆試效方水腫尿澀馬蘭菜一虎口黑豆小麥各一撮酒水各一鍾煎一鍾食前溫服以利小水四五日愈楊起簡便方纏蛇丹毒馬蘭甘草擂醋搽之濟急方附録麻伯別録有名未用曰味酸無毒主益氣出汗一名君莒一名衍草一名道止一名自死生平陵如蘭葉黑厚白裹莖實赤黑九月採根相烏又曰味苦主陰痿一名烏葵如蘭香赤莖生山陽五月十五日採陰乾天雄草又曰味甘溫無毒主益氣陰痿生山澤中狀如蘭實如大豆赤色益奶草拾遺藏器曰味苦平無毒主五痔脫肛止血炙令香浸酒服生永嘉山谷葉如澤蘭莖赤高二三尺也香薷音柔別録中品校正自菜部移入此釋名香柔食療香茸同上香菜千金蜜蜂草綱目時珍曰薷本作葇玉篇云葇菜蘇之類是也其氣香其葉柔故以名之草初生曰茸孟詵食療作香戎者非是俗呼蜜蜂草象其花房也集解弘景曰家家有此作菜生食十月中取干之頌曰所在皆種但北土差少似白蘇而葉更細壽春及新安皆有之彼間又有一種石香葇生石上莖葉更細色黃而辛香彌甚用之尤佳吳人以為茵陳用之宗奭曰香薷生山野間荊湖南北二川皆有之汴洛作圃種之暑月亦作蔬菜葉如茵陳花茸紫連邊成穗凡四五十房為一穗如荊芥穗別是一種香氣時珍曰香薷有野生有家蒔中州人三月種之呼為香菜以充蔬品丹溪朱氏惟取大葉者為良而細葉者香烈更甚今人多用之方莖尖葉有刻缺頗似黃荊葉而小九月開紫花成穗有細子細葉者僅高數寸葉如落帚葉即石香薷也修治斆曰凡採得去根留葉銼曝乾勿令犯火服至十兩一生不得食白山桃也時珍曰八九月開花著穗時採之陰乾入用氣味辛微溫無毒主治霍亂腹痛吐下散水腫別録去熱風猝轉筋者煮汁頓服半升即止為末水服止鼻衄孟詵下氣除煩熱療嘔逆冷氣大明春月煮飲代茶可無熱病調中溫胃含汁漱口去臭氣汪穎主腳氣寒熱時珍發明弘景曰霍亂煮飲無不瘥者作煎除水腫尤良頌曰霍亂轉筋者單煮服之若四肢煩冷汗出而渴者加蓼子同煮服震亨曰香薷屬金與水有徹上徹下之功解暑利小便又治水甚捷以大葉者濃煎丸服肺得之清化行而熱自降也時珍曰世醫治暑病以香薷飲為首藥然暑有乘涼飲冷致陽氣為陰邪所遏遂病頭痛發熱惡寒煩躁口渴或吐或瀉或霍亂者宜用此藥以發越陽氣散水和脾若飲食不節勞役作喪之人傷暑大熱大渴汗泄如雨煩躁喘促或瀉或吐者乃勞倦內傷之證必用東垣清暑益氣湯人參白虎湯之類以瀉火益元可也若用香薷之藥是重虛其表而又濟之以熱矣蓋香薷乃夏月解表之藥如冬月之用麻黃氣虛者尤不可多服而今人不知暑傷元氣不拘有病無病概用代茶謂能闢暑真癡前說夢也且其性溫不可熱飲反致吐逆飲者惟宜冷服則無拒格之患其治水之功果有奇效一士妻自腰以下胕腫面目亦腫喘急欲死不能伏枕大便溏泄小便短少服藥罔效時珍診其脈沉而大沉主水大主虛乃病後冒風所致是名風水也用千金神祕湯加麻黃一服喘定十之五再以胃苓湯吞深師薷術丸二日小便長腫消十之七調理數日全安益見古人方皆有至理但神而明之存乎其人而已附方舊四新六一切傷暑和劑局方香薷飲治暑月臥濕當風或生冷不節真邪相干便致吐利或發熱頭痛體痛或心腹痛或轉筋或乾嘔或四肢逆冷或煩悶欲死並主之用香薷一斤厚朴薑汁炙白扁豆微炒各半斤銼散每服五錢水二盞酒半盞煎一盞水中沉冷連進二服立效活人書去扁豆入黃連四兩薑汁同炒黃色用水病洪腫胡洽居士香薷煎用干香薷五十斤銼入釜中以水淹過三寸煮使氣力都盡去滓澄之微火煎至可丸丸如梧子大一服五丸日三服日漸增之以小便利則愈蘇頌圖經本草通身水腫深師薷術丸治暴水風水氣水通身皆腫服至小便利為效用香薷葉一斤水一斗熬極爛去滓再熬成膏加白朮末七兩和丸梧子大每服十丸米飲下日五夜一服外臺祕要四時傷寒不正之氣用水香薷為末熱酒調服一二錢取汗衛生易簡方心煩脅痛連胸欲死者香薷搗汁一二升服肘後鼻衄不止香薷研末水服一錢聖濟總録舌上出血如鑽孔者香薷煎汁服一升日三服肘後方口中臭氣香薷一把煎汁含之千金方小兒發遲陳香薷二兩水一盞煎汁三分入豬脂半兩和勻日日塗之永類鈐方白禿慘痛即上方入胡粉和塗之子母祕録石香葇宋開寶附釋名石蘇集解志曰石香葇生蜀郡陵榮資簡州及南中諸處生山岩石縫中二月八月採苗莖花實俱可用宗奭曰處處有之但山中臨水附崖處或有之不必山岩石縫也九月十月尚有花時珍曰香薷石香薷一物也但隨所生而名爾生平地者葉大崖石者葉細可通用之氣味辛香溫無毒主治調中溫胃止霍亂吐瀉心腹脹滿臍腹痛腸鳴開寶功比香薷更勝蕭炳制硫黃時珍爵床本經中品釋名爵麻吳普香蘇別録赤眼老母草唐本時珍曰爵床不可解按吳氏本草作爵麻甚通集解別録曰爵床生漢中川穀及田野恭曰此草生平澤熟田近道旁似香葇葉長而大或如荏且細俗名赤眼老母草時珍曰原野甚多方莖對節與大葉香薷一樣但香薷搓之氣香而爵床搓之不香微臭以此為別莖葉氣味咸寒無毒時珍曰微辛主治腰脊痛不得著床俯仰艱難除熱可作浴湯本經療血脹下氣治杖瘡搗汁塗之立瘥蘇恭赤車使者唐本草釋名小錦枝炮炙論集解恭曰赤車使者苗似香葇蘭香葉莖赤根紫赤色八月九月採根曬乾保升曰生荊州襄州根紫如茜根二月八月採時珍曰此與爵床相類但以根色紫赤為別爾根修治斆曰此草原名小錦枝凡用並粗搗以七歲童子小便拌蒸曬乾入藥氣味辛苦溫有毒權曰有小毒主治風冷邪疰蠱毒症瘕五臟積氣蘇恭治惡風冷氣服之悅澤肌皮好顏色甄權發明頌曰古方治大風風痹有赤車使者酒今人稀用鮮有識者時珍曰上古闢瘟疫邪氣有赤車使者丸此藥不怪苟加詢採必能得之但古今名稱或不同耳假蘇本經中品校正自菜部移入此釋名姜芥別録荊芥吳普鼠蓂本經弘景曰假蘇方藥不復用恭曰此即菜中荊芥也姜芥聲訛爾先居草部今録入菜部士良曰荊芥本草呼為假蘇假蘇又別是一物葉鋭圓多野生以香氣似蘇故呼為蘇頌曰醫官陳巽言江左人謂假蘇荊芥實兩物蘇恭以本草一名姜芥荊姜聲訛謂為荊芥非矣時珍曰按吳普本草云假蘇一名荊芥葉似落藜而細蜀中生啖之普乃東漢末人去別録時未遠其言當不謬故唐人蘇恭祖其說而陳士良蘇頌復啓為兩物之疑亦臆說爾曰蘇曰薑曰芥皆因氣味辛香如蘇如薑如芥也集解別録曰假蘇生漢中川澤頌曰今處處有之葉似落藜而細初生香辛可啖人取作生菜古方稀用近世醫家為要藥並取花實成穗者曝乾入藥又有胡荊芥俗呼新羅荊芥又有石荊芥生山石間體性相近入藥亦同時珍曰荊芥原是野生今為世用遂多栽蒔二月布子生苗炒食辛香方莖細葉似獨帚葉而狹小淡黃緑色八月開小花作穗成房房如紫蘇房內有細子如葶藶子狀黃赤色連穗收採用之正誤藏器曰張鼎食療本草荊芥一名析蓂誤矣菥蓂自有本條見草部時珍曰汪機本草會編言假蘇是白蘇亦誤矣白蘇乃荏也見後莖穗氣味辛溫無毒詵曰作菜食久動渴疾燻人五臟神反驢肉無鱗魚詳後發明下主治寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕痹本經去邪除勞渴冷風出汗煮汁服之搗爛醋和敷疔腫腫毒藏器單用治惡風賊風口面喎斜遍身𤸷痹心虛忘事益力添精辟邪毒氣通利血脈傳送五臟不足氣助脾胃甄權主血勞風氣壅滿背脊疼痛虛汗理丈夫腳氣筋骨煩疼及陰陽毒傷寒頭痛頭旋目眩手足筋急士良利五臟消食下氣醒酒作菜生熟皆可食並煎茶飲之以豉汁煎服治暴傷寒能發汗日華治婦人血風及瘡疥為要藥蘇頌産後中風身強直研末酒服孟詵散風熱清頭目利咽喉消瘡腫治項強目中黑花及生瘡陰㿗吐血衄血下血血痢崩中痔漏時珍發明元素曰荊芥辛苦氣味俱薄浮而升陽也好古曰肝經氣分藥也能搜肝氣時珍曰荊芥入足厥陰經氣分其功長於祛風邪散瘀血破結氣消瘡毒蓋厥陰乃風木也主血而相火寄之故風病血病瘡病為要藥其治風也賈丞相稱為再生丹許學士謂有神聖功戴院使許為産後要藥蕭存敬呼為一捻金陳無擇隱為舉卿古拜散夫豈無故而得此隆譽哉按唐韻荊字舉卿切芥字古拜切蓋二字之反切隱語以祕其方也又曰荊芥反魚蟹河豚之說本草醫方並未言及而稗官小說往往載之按李廷飛延壽書云凡食一切無鱗魚忌荊芥食黃鱔魚後食之令人吐血惟地漿可解與蟹同食動風又蔡絛鐵圍山叢話云豫居嶺嶠見食黃顙魚犯姜芥者立死甚於鉤吻洪邁夷堅志云吳人魏幾道啖黃顙魚羹後採荊芥和茶飲少頃足癢上徹心肺狂走足皮欲裂急服藥兩日乃解陶九成輟耕録云凡食河豚不可服荊芥藥大相反豫在江陰見一儒者因此喪命葦航紀談云凡服荊芥風藥忌食魚楊誠齊曾見一人立致於死也時珍按荊芥乃日用之藥其相反如此故詳録之以為警戒又按物類相感志言河豚用荊芥同煮三五次換水則無毒其說與諸書不同何哉大抵養生者寧守前說為戒可也附方舊四新二十七頭項風強八月後取荊芥穗作枕及鋪床下立春日去之千金方風熱頭痛荊芥穗石膏等分為末每服二錢茶調下永類鈐方風熱牙痛荊芥根烏桕根蔥根等分煎湯頻含漱之小兒驚癇一百二十種用荊芥穗二兩白礬半生半枯一兩為末糊丸黍米大硃砂為衣每薑湯下二十丸日二服醫學集成一切偏風口眼喎斜用青荊芥一斤青薄荷一斤同入砂盆內研爛生絹絞汁於瓷器中煎成膏漉去滓三分之一將二分曬乾為末以膏和丸梧子大每服三十丸白湯下早暮各一服忌動風物經驗後方中風口噤荊芥穗為末酒服二錢立愈名荊芥散賈似道云此方出曾公談録前後用之甚驗其子名順者病此已革服之立定真再生丹也産後中風華他愈風散治婦人産後中風口噤手足瘛瘲如角弓或産後血運不省人事四肢強直或築心眼倒吐瀉欲死用荊芥穗子微焙為末每服三錢豆淋酒調服或童子小便服之口噤則挑齒灌之齦噤則灌入鼻中其效如神大抵産後太暖則汗出而腠理疏則易於中風也時珍曰此方諸書盛稱其妙姚僧坦集驗方以酒服名如聖散云藥下可立待應效陳氏方名舉卿古拜散蕭存敬方用古老錢煎湯服名一捻金王貺指迷方加當歸等分水煎服許叔微本事方云此藥委有奇效神聖之功一婦人産後睡久及醒則昏昏如醉不省人事醫用此藥及交加散云服後當睡睡中必以左手搔頭用之果然咱殷産寶方云此病多因怒氣傷肝或憂氣內郁或坐草受風而成急宜服此藥也戴原禮證治要訣名獨行散賈似道悅生隨抄呼為再生丹産後迷悶因怒氣發熱迷悶者獨行散用荊芥穗以新瓦半炒半生為末童子小便服一二錢若角弓反張以豆淋酒下或銼散童尿煎服極妙蓋荊芥乃産後要藥而角弓反張乃婦人急候得此證者十存一二而已戴原禮要訣産後血運築心眼倒風縮欲死者取干荊芥穗搗篩末每用二錢匕童子小便一酒盞調勻熱服立效口噤者挑齒口閉者灌鼻中皆效近世名醫用之無不如神也圖經本草産後血眩風虛精神昏冒荊芥穗一兩三錢桃仁五錢去皮尖炒為末水服三錢若喘加杏仁去皮尖炒甘草炒各三錢保命集産後下痢大荊芥四五穗於盞內燒存性不得犯油火入麝香少許以沸湯些須調下此藥雖微能愈大病不可忽之深師方産後鼻衄荊芥焙研末童子小便服二錢海上方也婦人良方九竅出血荊芥煎酒通口服之直指方口鼻出血如湧泉因酒色太過者荊芥燒研陳皮湯服二錢不過二服也吐血不止經驗方用荊芥連根洗搗汁半盞服干穗為末亦可聖惠方用荊芥穗為末生地黃汁調服二錢小便尿血荊芥縮砂等分為末糯米飲下三錢日三服集簡崩中不止荊芥穗於麻油燈上燒焦為末每服二錢童子小便服此夏太君娘娘方也婦人良方痔漏腫痛荊芥煮湯日日洗之簡易方大便下血經驗方用荊芥炒為末每米飲服二錢婦人用酒下亦可拌麵作餛飩食之簡便方用荊芥二兩槐花一兩同炒紫為末每服三錢清茶送下小兒脫肛荊芥皂角等分煎湯洗之以鐵漿塗上亦治子宮脫出經驗方陰㿗腫痛荊芥穗瓦焙為散酒服二錢即消壽域神方小兒臍腫荊芥煎湯洗淨以煨蔥刮薄出火毒貼之即消海上方瘰癧潰爛癧瘡牽至胸前兩腋塊如茄子大或牽至兩肩上四五年不能療者皆治之其效如神武進縣朱守仁傳云其項不能回頭用此數日減可如瘡爛破者用荊芥根下一段剪碎煎沸湯溫洗良久看爛破處紫黑以針一刺去血再洗三四次愈用樟腦雄黃等分為末麻油調掃上出水次日再洗再掃以愈為度活法機要疔腫諸毒荊芥一握切以水五升煮取二升分二服冷飲藥性論一切瘡疥荊芥末以地黃自然汁熬膏和丸梧子大每服三五十丸茶酒任下普濟方腳丫濕爛荊芥葉搗敷之簡便方纏腳生瘡荊芥燒灰蔥汁調敷先以甘草湯洗之摘玄方小兒風寒煩熱有痰不省人事荊芥穗半兩焙麝香片腦各一字為末每茶服半錢大人亦治普濟方頭目諸疾一切眼疾血勞風氣頭痛頭旋目眩荊芥穗為末每酒服三錢龍樹論癃閉不通小腹急痛無問久新荊芥大黃為末等分每溫水服三錢小便不通大黃減半大便不通荊芥減半名倒換散普濟方薄荷唐本草校正自菜部移入此釋名菝𦽅音跋活蕃荷菜蕃音鄱吳菝𦽅食性南薄荷衍義金錢薄荷時珍曰薄荷俗稱也陳士良食性本草作菝𦽅揚雄甘泉賦作茇葀呂忱字林作茇䒷則薄荷之為訛稱可知矣孫思邈千金方作蕃荷又方音之訛也今人藥用多以蘇州者為勝故陳士良謂之吳菝𦽅以別胡菝𦽅也宗奭曰世稱此為南薄荷為有一種龍腦薄荷所以別之機曰小兒方多用金錢薄荷謂其葉小頗圓如錢也書作金銀誤矣集解頌曰薄荷處處有之莖葉似荏而尖長經冬根不死夏秋採莖葉曝乾古方稀用或與薤作齏食近世治風寒為要藥故人家多蒔之又有胡薄荷與此相類但味少甘為別生江浙間彼人多以作茶飲之欲呼新羅薄荷近汴洛僧寺或植一二本者天寶單方所謂連錢草者是也又有石薄荷生江南山石間葉微小至冬紫色不聞有別功用恭曰薄荷人家種之亦堪生食一種蔓生者功用相似時珍曰薄荷人多栽蒔二月宿根生苗清明前後分之方莖赤色其葉對生初時形長而頭圓及長則尖吳越川湖人多以代茶蘇州所蒔者莖小而氣芳江西者稍粗川蜀者更粗入藥以蘇産為勝物類相感志云凡收薄荷須隔夜以糞水澆之雨後乃可刈收則性涼不爾不涼也野生者莖葉氣味都相似莖葉氣味辛溫無毒思邈曰苦辛平元素曰辛涼斆曰莖性燥甄權曰同薤作齏食相宜新病瘥人勿食之令人虛汗不止瘦弱人久食之動消渴病主治賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣煮汁服之發汗大解勞乏亦堪生食唐本作菜久食卻腎氣辟邪毒除勞氣令人口氣香潔煎湯洗漆瘡思邈通利關節發毒汗去憤氣破血止痢甄權療陰陽毒傷寒頭痛四季宜食士良治中風失音吐痰日華主傷風頭腦風通關格及小兒風涎為要藥蘇頌杵汁服去心臟風熱孟詵清頭目除風熱李杲利咽喉口齒諸病治瘰癧瘡疥風瘙癮疹搗汁含漱去舌苔語澀挼葉塞鼻止衄血塗蜂螫蛇傷時珍發明元素曰薄荷辛涼氣味俱薄浮而升陽也故能去高巔及皮膚風熱士良曰薄荷能引諸藥入營衛故能發散風寒宗奭曰小兒驚狂壯熱須此引藥又治骨蒸熱勞用其汁與衆藥熬為膏貓食薄荷則醉物相感爾好古曰薄荷手足厥陰氣分藥也能搜肝氣又主肺盛有餘肩背痛及風寒汗出時珍曰薄荷入手太陰足厥陰辛能發散涼能清利專於消風散熱故頭痛頭風眼目咽喉口齒諸病小兒驚熱及瘰癧瘡疥為要藥戴原禮氏治貓咬取其汁塗之有效蓋取其相制也陸農師曰薄荷貓之酒也犬虎之酒也桑椹鳩之酒也苬草魚之酒也咱殷食醫心鏡云薄荷煎豉湯暖酒和飲煎茶生食並宜蓋菜之有益者也附方舊二新八清上化痰利咽膈治風熱以薄荷末煉蜜丸芡子大每噙一丸白砂糖和之亦可簡便單方風氣瘙癢用大薄荷蟬蛻等分為末每溫酒調服一錢永類鈐方舌苔語蹇薄荷自然汁和白蜜薑汁擦之醫學集成眼弦赤爛薄荷以生薑汁浸一宿曬乾為末每用一錢沸湯炮洗明目經驗方瘰癧結核或破未破以新薄荷二斤取汁皂莢一挺水浸去皮搗取汁同於銀石器內熬膏入連翹末半兩連白青皮陳皮黑牽牛半生半炒各一兩皂莢仁一兩半同搗和丸梧子大每服三十丸煎連翹湯下濟生方衄血不止薄荷汁滴之或以乾者水煮綿裹塞鼻許學士本事方血痢不止薄荷葉煎湯常服普濟水入耳中薄荷汁滴入立效經驗方蜂蠆螫傷薄荷葉挼貼之外臺祕要火毒生瘡冬間向火火氣入內兩股生瘡汁水淋漓者用薄荷煎汁頻塗立愈張杲醫說積雪草本經中品釋名胡薄荷天寶方地錢草唐本連錢草藥圖海蘇弘景曰積雪草方藥不用想此草以寒涼得名耳恭曰此草葉圓如錢荊楚人謂為地錢草徐議藥草圖名連錢草余見下集解別録曰積雪草生荊州川穀恭曰此草葉圓大如錢莖細而徑蔓生溪澗側生處亦稀頌曰今處處有之八九月採苗葉陰乾用段成式酉陽雜俎云地錢葉圓莖細有蔓延地一曰積雪草一曰連錢草謹按天寶單行方云連錢草生咸陽下濕地亦生臨淄郡濟陽郡池澤中甚香俗間或云圓葉似薄荷江東吳越丹陽郡極多彼人常充生菜食之河北柳城郡盡呼為海蘇好近水生經冬不死咸陽洛陽亦有之或名胡薄荷所在皆有單服療女子小腹疼宗奭曰積雪草南方多有生陰濕地不必荊楚形如水荇而小面亦光潔微尖為異葉葉各生今人謂之連錢草蓋取象也時珍曰按蘇恭注薄荷云一種蔓生功用相似蘇頌圖經云胡薄荷與薄荷相類但味少甘生江浙間彼人多以作茶飲俗呼為新羅薄荷天寶方所用連錢草是也據二說則積雪草即胡薄荷乃薄荷之蔓生者爾又臞仙庚辛玉冊云地錢陰草也生荊楚江淮閩浙間多在宮院寺廟磚砌間葉圓似錢引蔓鋪地香如細辛不見開花也莖葉氣味苦寒無毒大明曰苦辛頌曰甘平無毒時珍曰取汁結草砂伏硫黃主治大熱惡瘡癰疽浸淫赤熛皮膚赤身熱本經搗敷熱腫丹毒蘇恭主暴熱小兒寒熱腹內熱結搗汁服之藏器單用治瘰癧鼠漏寒熱時節來往甄權以鹽挼貼腫毒並風疹疥癬日華胡菝𦽅主風氣壅並攻胸膈作湯飲之立效士良研汁點暴赤眼良時珍附方舊二新二熱毒癰腫秋後收連錢草陰乾為末水調敷之生搗亦可寇氏衍義女子少腹痛頌曰天寶單行方云女子忽得小腹中痛月經初來便覺腰中切痛連脊間如刀錐所刺不可忍者衆醫不別謂是鬼疰妄服諸藥終無所益其疾轉增審察前狀相當即用此藥其藥夏五月正放花時即採曝乾搗篩為散每服二方寸匕和好醋二小合攪勻平旦空腹頓服之每旦一服以知為度如女子陰冷者即取前藥五兩加桃仁二百枚去皮尖熬搗為散以蜜為丸如梧子大每旦空腹米飲及酒下三十丸日再服以愈為度忌麻子蕎麥圖經本草方男女血病九仙驅紅散治嘔吐諸血及便血婦人崩中神效用積雪草五錢當歸酒洗梔子仁酒炒蒲黃炒黃連炒條黃芩酒炒生地黃酒洗陳槐花炒各一錢上部加藕節一錢五分下部加地榆一錢五分水二鍾煎一鍾服神效此方得之甚祕此草與本草主治不同不可曉也董炳集驗方牙痛塞耳用連錢草即積雪草和水溝汙泥同搗爛隨左右塞耳內摘玄方蘇別録中品校正自菜部移入此釋名紫蘇食療赤蘇肘後方桂荏時珍曰蘇從酥音酥舒暢也蘇性舒暢行氣和血故謂之蘇曰紫蘇者以別白蘇也蘇乃荏類而味更辛如桂故爾雅謂之桂荏集解弘景曰蘇葉下紫色而氣甚香其無紫色不香似荏者名野蘇不堪用頌曰蘇紫蘇也處處有之以背面皆紫者佳夏採莖葉秋採子有數種水蘇魚蘇山魚蘇皆是荏類各有別條時珍曰紫蘇白蘇皆以二三月下種或宿子在地自生其莖方其葉團而有尖四圍有鋸齒肥地者面背皆紫瘠地者面青背紫其面背皆白者即白蘇乃荏也紫蘇嫩時採葉和蔬茹之或鹽及梅滷作俎食甚香夏月作熟湯飲之五六月連根採收以火煨其根陰乾則經久葉不落八月開細紫花成穗作房如荊芥穗九月半枯時收子子細如芥子而色黃赤亦可取油如荏油務本新書云凡地畔近道可種蘇以遮六畜收子打油燃燈甚明或熬之以油器物丹房鏡源云蘇子油能柔五金八石沙州記云乞弗虜之地不種五穀惟食蘇子故王禎云蘇有遮護之功又有燈油之用不可闕也今有一種花紫蘇其葉細齒密紐如剪成之狀香色莖子並無異者人稱回回蘇云斆曰薄荷根莖真似紫蘇但葉不同爾薄荷莖燥紫蘇莖和入藥須以刀刮去青薄皮銼之莖葉氣味辛溫無毒李廷飛曰不可同鯉魚食生毒瘡主治下氣除寒中其子尤良別録除寒熱治一切冷氣孟詵補中益氣治心腹脹滿止霍亂轉筋開胃下食止腳氣通大小腸日華通心經益脾胃煮飲尤勝與橘皮相宜蘇頌解肌發表散風寒行氣寬中消痰利肺和血溫中止痛定喘安胎解魚蟹毒治蛇犬傷時珍以葉生食作羹殺一切魚肉毒甄權發明頌曰若宣通風毒則單用莖去節尤良時珍曰紫蘇近世要藥也其味辛入氣分其色紫入血分故同橘皮砂仁則行氣安胎同藿香烏藥則溫中止痛同香附麻黃則發汗解肌同芎藭當歸則和血散血同木瓜厚朴則散濕解暑治霍亂腳氣同桔梗枳殼則利膈寬腸同杏仁萊蔔子則消痰定喘也機曰宋仁宗命翰林院定湯飲奏曰紫蘇熟水第一以其能下胸膈浮氣也蓋不知其久則泄人真氣焉宗奭曰紫蘇其氣香其味微辛甘能散今人朝暮飲紫蘇湯甚無益醫家謂芳草致豪貴之疾者此有一焉若脾胃寒人多致滑泄往往不覺正誤頌曰蘇主雞瘕本經不著南齊褚澄治李道念食白淪雞子成瘕以蘇煮服吐出雞雛而愈也時珍曰按南齊書褚澄所用者蒜也非蘇也蓋二字相似譽録誤耳蘇氏缺考矣詳見蒜下附方舊二新一十三感寒上氣蘇葉三兩橘皮四兩酒四升煮一升半分再服肘後方傷寒氣喘不止用赤蘇一把水三升煮一升稍稍飲之肘後勞復食復欲死者蘇葉煮汁二升飲之亦可入生薑豆豉同煮飲肘後卒啘不止香蘇濃煮頓服三升良千金霍亂脹滿未得吐下用生蘇搗汁飲之佳干蘇煮汁亦可肘後方諸失血病紫蘇不限多少入大鍋內水煎令乾去滓熬膏以炒熟赤豆為末和丸梧子大每酒下三五十丸常服之斗門方金瘡出血不止以嫩紫蘇葉桑葉同搗貼之永類鈐方顛撲傷損紫蘇搗敷之瘡口自合談野翁試驗方傷損血出不止以陳紫蘇葉蘸所出血挼爛敷之血不作膿且愈後無瘢甚妙也永類鈐方瘋狗咬傷紫蘇葉嚼敷之千金方蛇虺傷人紫蘇葉搗飲之千金方食蟹中毒紫蘇煮汁飲二升金匱要略飛絲入目令人舌上生泡用紫蘇葉嚼爛白湯咽之危氏得效方乳癰腫痛紫蘇煎湯頻服並搗封之海上仙方咳逆短氣紫蘇莖葉二錢人參一錢水一鍾煎服普濟子氣味辛溫無毒主治下氣除寒溫中別録治上氣咳逆冷氣及腰腳中濕風結氣研汁煮粥長食令人肥白身香甄權調中益五臟止霍亂嘔吐反胃補虛勞肥健人利大小便破癥結消五膈消痰止嗽潤心肺日華治肺氣喘急宗奭治風順氣利膈寬腸解魚蟹毒時珍發明弘景曰蘇子下氣與橘皮相宜時珍曰蘇子與葉同功發散風氣宜用葉清利上下則宜用子也附方舊三新六順氣利腸紫蘇子麻子仁等分研爛水濾取汁同米煮粥食之濟生方治風順氣利腸寬中用紫蘇子一升微炒杵以生絹袋盛於三鬥清酒中浸三宿少少飲之聖惠一切冷氣紫蘇子高良薑橘皮等分蜜丸梧子大每服十丸空心酒下藥性論風濕腳氣方同上風寒濕痹四肢攣急腳腫不可踐地用紫蘇子二兩杵碎以水三升研取汁煮粳米二合作粥和蔥椒薑豉食之聖惠方消渴變水服此令水從小便出用紫蘇子炒三兩蘿蔔子炒三兩為末每服二錢桑根白皮煎湯服日三次聖濟總録夢中失精蘇子一升熬杵研末酒服方寸匕日再服外臺祕要食蟹中毒紫蘇子煮汁飲之金匱要略上氣咳逆紫蘇子入水研濾汁同粳米煮粥食簡便方水蘇本經中品校正自菜部移入此釋名雞蘇吳普香蘇肘後龍腦薄荷日用芥蒩音祖芥苴並別録時珍曰此草似蘇而好生水旁故名水蘇其葉辛香可以煮雞故有龍腦香蘇雞蘇諸名芥蒩芥苴當作芥蘇乃是一名而誤録爾亦因味辛如芥故名宋惠民和劑局方有龍腦薄荷丸專治血病元吳瑞日用本草謂即水蘇必有所據也周定王救荒本草言薄荷即雞蘇以生東平龍腦岡者為良故名陳嘉謨本草蒙筌以薄荷種於蘇州府學地名龍腦者得名俱不同何哉集解別録曰水蘇生九真池澤七月採弘景曰方藥不用莫能識九真遼遠亦無能訪之恭曰此蘇生下澤水側苗似旋覆兩葉相當大香馥青齊河間人名為水蘇江左名為薺薴吳會謂之雞蘇而陶氏更於菜部出雞蘇誤矣保升曰葉似白薇兩葉相當花生節間紫白色味辛而香六月採莖葉曬乾頌曰水蘇處處有之多生水岸旁南人多以作菜江北甚多而人不取食又江左人謂雞蘇水蘇是兩種陳藏器謂薺薴自是一物非水蘇水蘇葉有雁齒氣香而辛薺薴葉上有毛稍長氣臭也又茵陳注云江南所用茵陳莖葉都似家茵陳而大高三四尺氣極芬香味甘辛俗名龍腦薄荷宗奭曰水蘇氣味與紫蘇不同辛而不和然狀一如蘇但面不紫及周圍槎牙如雁齒耳瑞曰水蘇即雞蘇俗呼為龍腦薄荷時珍曰水蘇薺薴一類二種爾水蘇氣香薺薴氣臭為異水蘇三月生苗方莖中虛葉似蘇葉而微長密齒面皺色青對節生氣甚辛烈六七月開花成穗如蘇穗水紅色穗中有細子狀如荊芥子可種易生宿根亦自生沃地者苗高四五尺莖葉氣味辛微溫無毒主治下氣殺穀除飲食闢口臭去邪毒辟惡氣久服通神明輕身耐老本經主吐血衄血血崩別録治肺痿血痢崩中帶下日華主諸氣疾及腳腫蘇頌釀酒漬酒及酒煮汁常服治頭昏目眩及産後中風惡血不止服之彌妙孟詵作生菜食除胃間酸水藏器發明時珍曰雞蘇之功專於理血下氣清肺辟惡消穀故太平和劑局方治吐血衄血唾血咳血下血血淋口臭口苦口甜喉腥邪熱諸病有龍腦薄荷丸方藥多不録用治血病果有殊效也附方舊六新九漏血欲死雞蘇煮汁一升服之梅師方吐血下血雞蘇莖葉煎汁飲之梅師方吐血咳嗽龍腦薄荷焙研末米飲服一錢取效衄血不止梅師方用雞蘇五合香豉二合同搗搓如棗核大納鼻孔中即止聖惠方用雞蘇二兩防風一兩為末每服二錢溫水下仍以葉塞鼻普濟方用龍腦薄荷生地黃等分為末冷水服腦熱鼻淵肺壅多涕雞蘇葉麥門冬川芎藭桑白皮炒黃耆炙甘草炙生地黃焙等分為末煉蜜丸梧子大每服四十丸人參湯下聖濟總録風熱頭痛熱結上焦致生風氣痰厥頭痛用水蘇葉五兩皂莢炙去皮子三兩芫花醋炒焦一兩為末煉蜜丸梧子大每服二十丸食後荊芥湯下聖惠方耳猝聾閉雞蘇葉生搗綿裹塞之孟詵食療沐發令香雞蘇煮汁或燒灰淋汁沐之食療頭生白屑方同上暑月目昏多眵淚生龍腦薄荷葉搗爛生絹絞汁點之聖濟總録霍亂困篤雞蘇三兩水二升煎一升分三服聖惠中諸魚毒香蘇濃煮汁飲之良肘後方蛇虺螫傷龍腦薄荷葉研末酒服並塗之易簡方薺薴拾遺釋名臭蘇日華青白蘇時珍曰日華子釋水蘇云一名臭蘇一名青白蘇正此草也誤作水蘇爾其形似水蘇而臭似白蘇而青故有二名集解藏器曰按蘇恭言江左名水蘇為薺薴按水蘇葉有雁齒氣香而辛薺薴葉稍長其上有毛氣臭亦可為生菜時珍曰薺薴處處平地有之葉似野蘇而稍長有毛氣臭山人茹之葉不甚佳莖葉氣味辛溫無毒主治冷氣泄痢生食除胃間酸水挼碎敷蟻瘻藏器附録石薺薴藏器曰味辛溫無毒主風冷氣瘡疥瘙癢痔瘻下血煮汁服之生山石間細葉紫花高一二尺山人用之
