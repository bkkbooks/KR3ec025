body:
  text: 草部第十八卷草之七蔓草類七十三種附一十九種菟絲子本經上品釋名菟縷別録菟纍別録菟蘆本經菟丘廣雅赤網別録玉女爾雅唐蒙爾雅火焰草綱目野狐絲綱目金線草禹錫曰按呂氏春秋云或謂菟絲無根也其根不屬地茯苓是也抱朴子云菟絲之草下有伏菟之根無此菟則絲不得生於上然實不屬也伏菟抽則菟絲死又云菟絲初生之根其形似兔掘取割其血以和丹服立能變化則菟絲之名因此也弘景曰舊言下有茯苓上有菟絲不必爾也頌曰抱朴所説今未見豈別一類乎孫炎釋爾雅云唐也蒙也女蘿也菟絲也一物四名而本草唐蒙為一名詩云蔦與女蘿毛萇云女蘿菟絲也而本草菟絲無女蘿之名惟松蘿一名女蘿豈二物皆是寄生同名而本草脫漏乎震亨曰菟絲未嘗與茯苓共類女蘿附松而生不相關涉皆承訛而言也時珍曰毛詩注女蘿即菟絲吳普本草菟絲一名松蘿陸佃言在木為女蘿在草為菟絲二物殊別皆由爾雅釋詩誤以為一物故也張揖廣雅云菟丘菟絲也女蘿松蘿也陸璣詩疏言菟絲蔓草上黃赤如金松蘿蔓松上生枝正青無雜蔓者皆得之詳見木部松蘿下又菟絲茯苓説見茯苓下集解別録曰菟絲子生朝鮮川澤田野蔓延草木之上九月採實曝乾色黃而細者為赤網色淺而大者為菟纍功用並同弘景曰田野墟落中甚多皆浮生藍紵麻蒿上其實仙經俗方並以為補藥須酒浸一宿用宜丸不宜煮大明曰苗莖似黃絲無根株多附田中草被纏死或生一叢如席闊開花結子不分明子如碎黍米粒八月九月以前採之頌曰今近道亦有之以冤句者為勝夏生苗初如細絲遍地不能自起得他草梗則纏繞而生其根漸絶於地而寄空中或云無根假氣而生信然時珍曰按寧獻王庚辛玉册云火焰草即菟絲子陽草也多生荒園古道其子入地初生有根及長延草物其根自斷無葉有花白色微紅香亦襲人結實如秕豆而細色黃生於梗上尤佳惟懷孟林中多有之入藥更良子修治斆曰凡使勿用天碧草子真相似只是味酸澀並黏也菟絲採得去殼了用苦酒浸二日漉出以黃精自然汁相對浸一宿至明用微火煎至干入臼中燒熱鐵杵一去三千餘杵成粉用之時珍曰凡用以溫水淘去沙泥酒浸一宿曝乾搗之不盡者再浸曝搗須臾悉細又法酒浸四五日蒸曝四五次研作餅焙乾再研末或云曝乾時入紙條數枚同搗即刻成粉且省力也氣味辛甘平無毒之才曰得酒良薯蕷松脂為之使惡雚菌主治續絶傷補不足益氣力肥健人本經養肌強陰堅筋骨主莖中寒精自出溺有餘瀝口苦燥渴寒血為積久服明目輕身延年別録治男女虛冷添精益髓去腰疼膝冷消渴熱中久服去面皯悅顏色甄權補五勞七傷治鬼交泄精尿血潤心肺大明補肝臟風虛好古發明斆曰菟絲子稟中和凝正陽氣一莖從樹感枝而成從中春上陽結實故偏補人衛氣助人筋脈頌曰抱朴子仙方單服法取實一斗酒一斗浸曝乾再浸又曝令酒盡乃止搗篩每酒服二錢日二服此藥治腰膝去風兼能明目久服令人光澤老變為少十日外飲啖如湯沃雪也附方舊六新七消渴不止菟絲子煎汁任意飲之以止為度事林廣記陽氣虛損簡便方用菟絲子熟地黃等分為末酒糊丸梧子大每服五十丸氣虛人參湯下氣逆沉香湯下經驗後方用菟絲子二兩酒浸十日水淘杜仲焙研蜜炙一兩以薯蕷末酒煮糊丸梧子大每空心酒下五十丸白濁遺精茯菟丸治思慮太過心腎虛損真陽不固漸有遺瀝小便白濁夢寐頻泄菟絲子五兩白茯苓三兩石蓮肉二兩為末酒糊丸梧子大每服三五十丸空心鹽湯下和劑局方小便淋瀝菟絲子煮汁飲範汪方小便赤濁心腎不足精少血燥口乾煩熱頭暈怔仲菟絲子麥門冬等分為末蜜丸梧子大鹽湯每下七十丸腰膝疼痛或頑麻無力菟絲子洗一兩牛膝一兩同入銀器內酒浸過一寸五日曝乾為末將原酒煮糊丸梧子大每空心酒服三二十丸經驗後方肝傷目暗菟絲子三兩酒浸三日曝乾為末雞子白和丸梧子大空心溫酒下二十丸聖惠方身面卒腫洪大用菟絲子一升酒五升漬二三宿每飲一升日三服不消再造肘後方婦人橫生菟絲子末酒服二錢一加車前子等分聖惠方眉煉癬瘡菟絲子炒研油調敷之山居四要穀道赤痛菟絲子熬黃黑為末雞子白和塗之肘後方痔如蟲咬方同上苗氣味甘平無毒玉册云汁伏三黃硫汞結草砂主治研汁塗面去面皯本經挼碎煎湯浴小兒療熱痱弘景附方舊二新一面瘡粉刺菟絲子苗絞汁塗之不過三上肘後方小兒頭瘡菟絲苗煮湯頻洗之子母祕録目中赤痛野狐漿草搗汁點之聖惠方附録難火蘭拾遺藏器曰味酸溫無毒主冷氣風痹開胃下食去腹脹久服明目生巴西胡國狀似菟絲子而微長五味子本經上品釋名荎蕏爾雅音知除玄及別録會及恭曰五味皮肉甘酸核中辛苦都有鹹味此則五味具也本經但云味酸當以木為五行之先也集解別録曰五味子生齊山山谷及代郡八月採實陰乾弘景曰今第一齣高麗多肉而酸甜次出青州冀州味過酸其核並似豬腎又有建平者少肉核形不相似味苦亦良此藥多膏潤烈日曝之乃可搗篩恭曰蔓生木上其葉似杏而大子作房如落葵大如櫻子出蒲州及藍田山中今河中府歲貢之保升曰蔓生莖赤色花黃白子生青熟紫亦具五色味甘者佳頌曰今河東陝西州郡尤多杭越間亦有之春初生苗引赤蔓於高木其長六七尺葉尖圓似杏葉三四月開黃白花類蓮花狀七月成實叢生莖端如豌豆許大生青熟紅紫入藥生曝不去子今有數種大抵相近雷斆言小顆皮皺泡者有白撲鹽霜一重其味酸鹹苦辛甘皆全者為真也時珍曰五味今有南北之分南産者色紅北産者色黑入滋補藥必用北産者乃良亦可取根種之當年就旺若二月種子次年乃旺須以架引之修治斆曰凡用以銅刀劈作兩片用蜜浸蒸從巳至申卻以漿浸一宿焙乾用時珍曰入補藥熟用入嗽藥生用氣味酸溫無毒好古曰味酸微苦咸味厚氣輕陰中微陽入手太陰血分足少陰氣分時珍曰酸鹹入肝而補腎辛苦入心而補肺甘入中宮益脾胃之才曰蓯蓉為之使惡葳蕤勝烏頭主治益氣咳逆上氣勞傷羸瘦補不足強陰益男子精本經養五臟除熱生陰中肌別録治中下氣止嘔逆補虛勞令人體悅澤甄權明目暖水臟壯筋骨治風消食反胃霍亂轉筋痃癖奔豚冷氣消水腫心腹氣脹止渴除煩熱解酒毒大明生津止渴治瀉痢補元氣不足收耗散之氣瞳子散大李杲治喘咳燥嗽壯水鎮陽好古發明成無己曰肺欲收急食酸以收之以酸補之芍藥五味之酸以收逆氣而安肺杲曰收肺氣補氣不足升也酸以收逆氣肺寒氣逆則宜此與乾薑同治之又五味子收肺氣乃火熱必用之藥故治嗽以之為君但有外邪者不可驟用恐閉其邪氣必先發散而後用之乃良有痰者以半夏為佐喘者阿膠為佐但分兩少不同耳宗奭曰今華州以西至秦州多産之方紅熟時彼人採得蒸爛研濾汁熬成稀膏量酸甘入蜜煉勻待冷收器中肺虛寒人作湯時時飲之作果可以寄遠本經言其性溫今食之多致虛熱小兒益甚藥性論謂其除熱氣日華子謂其暖水臟除煩熱後學至此多惑今既用治肺虛寒則更不取其除熱之説震亨曰五味大能收肺氣宜其有補腎之功收肺氣非除熱乎補腎非暖水臟乎乃火熱嗽必用之藥寇氏所謂食之多致虛熱者蓋收補之驟也何惑之有又黃昏嗽乃火氣浮入肺中不宜用涼藥宜五味子五倍子斂而降之思邈曰五六月宜常服五味子湯以益肺金之氣在上則滋源在下則補腎其法以五味子一大合木臼搗細瓷瓶中以百沸湯投之入少蜜封置火邊良久湯成任飲元素曰孫真人千金月令言五月常服五味以補五臟之氣遇夏月季夏之間困乏無力無氣以動與黃耆人參麥門冬少加黃柏煎湯服之使人精神頓加兩足筋力湧出也蓋五味子之酸輔人參能瀉丙火而補庚金收斂耗散之氣好古曰張仲景八味丸用此補腎亦兼述類象形也機曰五味治喘嗽須分南北生津止渴潤肺補腎勞嗽宜用北者風寒在肺宜用南者慎微曰抱朴子云五味者五行之精其子有五味淮南公羡門子服之十六年面色如玉女入水不沾入火不灼附方新一十一久咳肺脹五味二兩粟殼白餳炒過半兩為末白餳丸彈子大每服一丸水煎服衛生家寶方久咳不止丹溪方用五味子五錢甘草一錢半五倍子風化硝各二錢為末干噙攝生方用五味子一兩真茶四錢曬研為末以甘草五錢煎膏丸緑豆大每服三十丸沸湯下數日即愈也痰嗽並喘五味子白礬等分為末每服三錢以生豬肺炙熟蘸末細嚼白湯下漢陽庫兵黃六病此百藥不效於嶽陽遇一道人傳此兩服病遂不發普濟方陽事不起新五味子一斤為末酒服方寸匕日三服忌豬魚蒜醋盡一劑即得力百日以上可御十女四時勿絶藥功能知千金方腎虛遺精北五味子一斤洗淨水浸挼去核再以水洗核取盡餘味通置砂鍋中布濾過入好冬蜜二斤炭火慢熬成膏瓶收五日出火性每空心服一二茶匙百滾湯下劉松石保壽堂方腎虛白濁及兩脅並背脊穿痛五味子一兩炒赤為末醋糊丸梧子大每醋湯下三十丸經驗良方五更腎泄凡人每至五更即溏泄一二次經年不止者名曰腎泄蓋陰盛而然脾惡濕濕則濡而困困則不能治水水性下流則腎水不足用五味子以強腎水養五臟吳茱萸以除脾濕則泄自止矣五味去梗二兩茱萸湯泡七次五錢同炒香為末每日陳米飲服二錢許叔微本事方女人陰冷五味子四兩為末以口中玉泉和丸兔矢大頻納陰中取效近效方爛弦風眼五味子蔓荊子煎湯頻洗之談野翁種子方赤遊風丹漸漸腫大五味子焙研熱酒頓服一錢自消神效保幼大全蓬藟音纍本經上品校正自果部移入此釋名覆盆本經陵藟別録陰藟別録寒莓會編割田藨音苞時珍曰蓬藟與覆盆同類故本經謂一名覆盆此種生於丘陵之間藤葉繁衍蓬蓬纍纍異於覆盆故曰蓬藟陵藟即藤也其實八月始熟俚人名割田藨集解別録曰蓬藟生荊山平澤及冤句弘景曰蓬藟是根名方家不用乃昌容所服以易顏者也覆盆是實名李當之云是人所食莓子以津汁為味其核微細今藥中用覆盆小異未詳孰是恭曰覆盆蓬藟乃一物異名本謂實非根也李云莓子者近之矣然生處不同沃地則子大而甘瘠地則子細而酸此乃子有酸味根無酸味陶以根酸子甘列入果部重出二條殊為孟浪志曰蓬藟乃復盆之苗莖覆盆乃蓬藟之子也按切韻莓音茂其子覆盆也藟者藤也則蓬藟明是藤蔓矣陶言蓬藟是根蘇言是子一物異名皆非矣頌曰蓬藟是覆盆苗處處有之秦吳尤多苗短不過尺莖葉皆有刺花白子赤黃如半彈丸大而下有蒂承之如柿蒂小兒多食之五月採實其苗葉採無時江南謂之莓然其地所生差晚三月始有苗八九月花開十月實用則同士良曰今觀採取之家説蓬藟似蠶莓子紅色而大其味酸甘葉似野薔薇有刺覆盆子小其苗各別諸家本草不識故皆説蓬藟是覆盆子之根大明曰莓子是蓬藟子也樹莓是覆盆子也宗奭曰蓬藟非覆盆也別是一種雖枯敗而枝梗不散今人不見用此藏器曰其類有三種惟四月熟狀如覆盆子而味甘美者為是余不堪入藥機曰蓬藟徽人謂之寒莓沿塹作叢蔓生莖小葉密多刺其實四五十顆作一朵一朵大如盞面霜後始紅蘇頌圖經以此注覆盆誤矣江南覆盆亦四五月熟何嘗差晚耶覆盆莖粗葉疏結實大而疏散不似寒莓莖細葉密結實小而成朵一則夏熟一則秋熟豈得同哉時珍曰此類凡五種豫嘗親採以爾雅所列者校之始得其的諸家所説皆未可信也一種藤蔓繁衍莖有倒刺逐節生葉葉大如掌狀類小葵葉面青背白厚而有毛六七月開小白花就蒂結實三四十顆成簇生則青黃熟則紫黯微有黑毛狀如熟椹而扁冬月苗葉不凋者俗名割田藨即本草所謂蓬藟也一種蔓小於蓬藟亦有鉤刺一枝五葉葉小而面背皆青光薄而無毛開白花四五月實成子亦小於蓬藟而稀疏生則青黃熟則烏赤冬月苗凋者俗名插田藨即本草所謂覆盆子爾雅所謂茥缺盆也此二者俱可入藥一種蔓小於蓬藟一枝三葉葉面青背淡白而微有毛開小白花四月實熟其色紅如櫻桃者俗名𧂭田藨即爾雅所謂藨者也故郭璞注云藨即莓也子似覆盆而大赤色酢甜可食此種不入藥用一種樹生者樹高四五尺葉似櫻桃葉而狹長四月開小白花結實與覆盆子一樣但色紅為異俗亦名藨即爾雅所謂山莓陳藏器本草所謂懸鉤子者也詳見本條一種就地生蔓長數寸開黃花結實如覆盆而鮮紅不可食者本草所謂蛇莓也見本條如此辨析則蓬藟覆盆自定矣李當之陳士良陳藏器寇宗奭汪機五説近是而欠明悉陶弘景以蓬藟為根覆盆為子馬志蘇頌以蓬藟為苗覆盆為子蘇恭以為一物大明以樹生者為覆盆皆臆説不可據氣味酸平無毒別録曰咸士良曰甘酸微熱主治安五臟益精氣長陰令堅強志倍力有子久服輕身不老本經療暴中風身熱大驚別録益顏色長髮耐寒濕恭發明見覆盆子下附方新一長髮不落蓬藟子榨油日塗之聖惠方苗葉同覆盆覆盆子別録上品校正自果部移入此釋名茥爾雅音奎蒛葐爾雅西國草圖經畢楞伽圖經大麥莓音母插田藨音苞烏藨子綱目當之曰子似覆盆之形故名之宗奭曰益腎臟縮小便服之當覆其溺器如此取名也時珍曰五月子熟其色烏赤故俗名烏藨大麥莓插田藨亦曰栽秧藨甄權本草一名馬瘻一名陸荊殊無義意集解別録曰五月採藏器曰佛説蘇密那花點燈正言此花也其類有三種以四月熟狀如覆盆子味甘美者為是余不堪入藥今人取茅莓當覆盆誤矣宗奭曰處處有之秦州永興華州尤多長條四五月紅熟山中人及時採來賣其味酸甘外如荔枝大如櫻桃軟紅可愛失時則就枝生蛆食之多熱收時五六分熟便可採烈日曝乾今人取汁作煎為果採時著水則不堪煎時珍曰蓬藟子以八九月熟故謂之割田藨覆盆以四五月熟故謂之插田藨正與別録五月採相合二藨熟時色皆烏赤故能補腎其四五月熟而色紅者乃𧂭田藨也不入藥用陳氏所謂以茅莓當覆盆者蓋指此也正誤詵曰覆盆江東名懸鉤子大小形狀氣味功力同北土無懸鉤南地無覆盆是土地有前後生非兩種物也時珍曰南土覆盆極多懸鉤是樹生覆盆是藤生子狀雖同而覆盆色烏赤懸鉤色紅赤功亦不同今正之修治詵曰覆盆子五月採之烈日曝乾不爾易爛雷曰凡使用東流水淘去黃葉並皮蒂取子以酒拌蒸一宿以東流水淘兩遍又曬乾方用時珍曰採得搗作薄餅曬乾密貯臨時以酒拌蒸尤妙氣味甘平無毒權曰甘辛微熱主治益氣輕身令發不白別録補虛續絶強陰健陽悅澤肌膚安和五臟溫中益力療癆損風虛補肝明目並宜搗篩每旦水服三錢馬志男子腎精虛竭陰痿能令堅長女子食之有子權食之令人好顏色榨汁塗發不白藏器益腎臟縮小便取汁同少蜜煎為稀膏點服治肺氣虛寒宗奭發明時珍曰覆盆蓬藟功用大抵相近雖是二物其實一類而二種也一早熟一晚熟兼用無妨其補益與桑椹同功若樹莓則不可混採者也附方新一陽事不起覆盆子酒浸焙研為末每旦酒服三錢集簡方葉氣味微酸咸平無毒主治挼絞取汁滴目中去膚赤出蟲如絲線藏器明目止淚收濕氣時珍發明頌曰按崔元亮海上集驗方治目暗不見物冷淚浸淫不止及青盲天行目暗等疾取西國草一名畢楞伽一名覆盆子日曝乾搗極細以薄綿裹之用飲男乳汁浸如人行八九里久用點目中即仰臥不過三四日視物如少年禁酒面油物時珍曰按洪邁夷堅志云潭州趙太尉母病爛弦疳眼二十年有老嫗云此中有蟲吾當除之入山取草蔓葉咀嚼留汁入筒中還以皂紗矇眼滴汁漬下弦轉盼間蟲從紗上出數日下弦干復如法滴上弦又得蟲數十而愈後以治人多驗乃復盆子葉也蓋治眼妙品附方新二牙疼點眼用覆盆子嫩葉搗汁點目眥三四次有蟲隨眵淚出成塊也無新葉乾者煎濃汁亦可即大麥莓也摘玄方臁瘡潰爛覆盆葉為末用酸漿水洗後摻之日一次以愈為度直指方根主治痘後目翳取根洗搗澄粉日乾蜜和少許點於翳疔上日二三次自散百日內治之久即難療時珍活幼口議懸鉤子拾遺校正自果部移入此釋名沿鉤子日用葥爾雅音箭山莓爾雅木莓郭璞樹莓日華藏器曰莖上有刺如懸鉤故名集解藏器曰生江淮林澤間莖上有刺其子如梅子酸美人多食之機曰樹莓枝梗柔軟有刺頗類金櫻四五月結實如覆盆子採之擎蒂而中實味酸覆盆則蒂脫而中虛味甘為異時珍曰懸鉤樹生高四五尺其莖白色有倒刺其葉有細齒青色無毛背後淡青頗似櫻桃葉而狹長又似地棠花葉四月開小白花結實色紅今人亦通呼為藨子爾雅云葥山莓也郭璞注云今之木莓也實似藨莓而大可食孟詵大明並以此為覆盆誤矣氣味酸平無毒主治醒酒止渴除痰去酒毒藏器搗汁服解射工沙蝨毒時珍莖主治燒研水服主喉中塞藏器根皮氣味苦平無毒主治子死腹中不下破血婦人赤帶下久患赤白痢膿血腹痛殺蟲毒卒下血並濃煮汁飲之藏器附方新二血崩不止木莓根四兩酒一碗煎七分空心溫服臞仙乾坤生意崩中痢下治婦人崩中及下痢日夜數十起欲死者以此入腹即活懸鉤根薔薇根柿根菝葜各一斛銼入釜中水淹上四五寸煮減三之一去滓取汁煎至可丸丸梧子大每溫酒服十丸日三服千金翼蛇莓別録下品釋名蛇藨音苞地莓會編蠶莓機曰近地而生故曰地莓瑞曰蠶老時熟紅於地其中空者為蠶莓中實極紅者為蛇殘莓人不啖之恐有蛇殘也集解弘景曰蛇莓園野多有之子赤色極似莓子而不堪啖亦無以此為藥者保升曰所在有之生下濕地莖頭三葉花黃子赤儼若覆盆子根似敗醬四月五月採子二月八月採根宗奭曰田野道旁處處有之附地生葉如覆盆子但光潔而小微有皺紋花黃比蒺藜花差大春末夏初結紅子如荔枝色機曰蛇莓莖長不盈尺莖端惟結實一顆小而光潔誤食脹人非若覆盆苗長大而結實數顆微有黑毛也時珍曰此物就地引細蔓節節生根每枝三葉葉有齒刻四五月開小黃花五出結實鮮紅狀似覆盆而面與蒂則不同也其根甚細本草用汁當是取其莖葉並根也仇遠稗史訛作蛇繆草言有五葉七葉者又言俗傳食之能殺人亦不然止發冷涎耳汁氣味甘酸大寒有毒主治胸腹大熱不止別録傷寒大熱及溪毒射工毒甚良弘景通月經熁瘡腫敷蛇傷大明主孩子口噤以汁灌之孟詵敷湯火傷痛即止時珍附方舊二新一口中生瘡天行熱甚者蛇莓自然汁半升稍稍咽之傷寒類要傷寒下𧈟生瘡以蛇莓汁服二合日三服仍水漬烏梅令濃入崖蜜飲之肘後方水中毒病蛇莓根搗末服之並導下部亦可飲汁一二升夏月欲入水先以少末投中流更無所畏又闢射工家中以器貯水浴身亦宜投少許肘後使君子宋開寶釋名留求子志曰俗傳潘州郭使君療小兒多是獨用此物後醫家因號為使君子也時珍曰按嵇含南方草木狀謂之留求子療嬰孺之疾則自魏晉已用但名異耳集解志曰生交廣等州形如梔子稜瓣深而兩頭尖似訶黎勒而輕頌曰今嶺南州郡皆有之生山野中及水岸其莖作藤如手指大其葉青如兩指頭長二寸三月生花淡紅色久乃深紅有五瓣七八月結子如拇指大長一寸許大類梔子而有五稜其殼青黑色內有仁白色七月採之宗奭曰其仁味如椰子醫家亦兼用殼時珍曰原出海南交趾今閩之邵武蜀之眉州皆栽種之亦易生其藤如葛繞樹而上葉青如五加葉五月開花一簇一二十葩紅色輕盈如海棠其實長寸許五瓣合成有稜先時半黃老則紫黑其中仁長如棐仁色味如栗久則油黑不可用氣味甘溫無毒主治小兒五疳小便白濁殺蟲療瀉痢開寶健脾胃除虛熱治小兒百病瘡癬時珍發明時珍曰凡殺蟲藥多是苦辛惟使君子棐子甘而殺蟲亦異也凡大人小兒有蟲病但每月上旬侵晨空腹食使君子仁數枚或以殼煎湯咽下次日蟲皆死而出也或云七生七煨食亦良忌飲熱茶犯之即瀉此物味甘氣溫既能殺蟲又益脾胃所以能斂虛熱而止瀉痢為小兒諸病要藥俗醫乃謂殺蟲至盡無以消食鄙俚之言也樹有蠹屋有蟻國有盜福耶禍耶修養者先去三尸可類推矣附方新六小兒脾疳使君子蘆薈等分為末米飲每服一錢儒門事親小兒痞塊腹大肌瘦面黃漸成疳疾使君子仁三錢木鱉子仁五錢為末水丸龍眼大每以一丸用雞子一個破頂入藥在內飯上蒸熟空心食之楊起簡便單方小兒蛔痛口流涎沫使君子仁為末米飲五更調服一錢全幼心鑑小兒虛腫頭面陰囊俱浮用使君子一兩去殼蜜五錢炙盡為末每食後米湯服一錢簡便方鼻渣面瘡使君子仁以香油少許浸三五個臨臥時細嚼香油送下久久自愈普濟方蟲牙疼痛使君子煎湯頻漱集簡方木鱉子宋開寶校正自木部移入此釋名木蟹志曰其核似鱉蟹狀故以為名集解志曰出朗州及南中七八月採實頌曰今湖廣諸州及杭越全嶽州皆有之春生苗作藤生葉有五丫狀如山藥青色面光四月生黃花六月結實似栝蔞而極大生青熟紅黃色肉上有軟刺每一實有核三四十枚其狀扁而如鱉八九月採之嶺南人取嫩實及苗葉作茹蒸食宗奭曰木鱉子蔓歲一枯但根不死春旋生苗葉如葡萄其子一頭尖者為雄凡植時須雌雄相合麻纏定及其生也則去雄者方結實時珍曰木鱉核形扁礧砢大如圍棋子其仁青緑色入藥去油者仁氣味甘溫無毒時珍曰苦微甘有小毒主治折傷消結腫惡瘡生肌止腰痛除粉刺皯𪒟婦人乳癰肛門腫痛開寶醋摩消腫毒大明治疳積痞塊利大腸瀉痢痔瘤瘰癧時珍發明機曰按劉績霏雪録云木鱉子有毒不可食昔薊門有人生二子恣食成痞其父得一方以木鱉子煮豬肉食之其幼子當夜長子明日死友人馬文誠方書亦載此方因著此為戒時珍曰南人取其苗及嫩實食之無恙則其毒未應至此或者與豬肉不相得或犯他物而然不可盡咎木鱉也附方舊一新十九酒疸脾黃木鱉子磨醋服一二盞見利效劉長春濟急方腳氣腫痛木鱉子仁每個作兩邊麩炒過切碎再炒去油盡為度每兩入厚桂半兩為末熱酒服二錢令醉得汗愈夢祕授方也永類方濕瘡腳腫行履難者木鱉子四兩去皮甘遂半兩為末以豬腰子一個去膜切片用藥四錢在中濕紙包煨熟空心米飲送下服後便伸兩腳如大便行者只吃白粥二三日為妙楊拱醫方摘要陰疝偏墜痛甚者木鱉子一個磨醋調黃柏芙蓉末敷之即止壽域神方久瘧有母木鱉子穿山甲炮等分為末每服三錢空心溫酒下醫方摘要腹中痞塊木鱉子仁五兩用獖豬腰子二付批開入在內簽定煨熟同搗爛入黃連三錢末蒸餅和丸緑豆大每白湯下三十丸醫方集成小兒疳疾木鱉子仁使君子仁等分搗泥米飲丸芥子大每服五分米飲下一日二服孫天仁集效方疳病目蒙不見物用木鱉子仁二錢胡黃連一錢為末米糊丸龍眼大入雞子內蒸熟連雞子食之為妙同上倒睫拳毛因風入脾經致使風癢不住手擦日久赤爛拳毛入內將木鱉子仁槌爛以絲帛包作條左患塞右鼻右患塞左鼻其毛自分上下次服蟬蛻藥為妙孫天仁集效方肺虛久嗽木鱉子款冬花各一兩為末每用三錢焚之吸煙良久吐涎以茶潤喉如此五六次後服補肺藥一方用木鱉子一個雄黃一錢聖濟録小兒咸鼻孝大木鱉子三四個磨水飲以雪糕壓下即吐出痰重者三服效摘玄方水瀉不止木鱉仁五個母丁香五個麝香一分研末米湯調作膏納臍中貼之外以膏藥護住吳旻扶壽精方痢疾禁口木鱉仁六個研泥分作二分用面燒餅一個切作兩半只用半餅作一竅納藥在內乘熱覆在病人臍上一時再換半個熱餅其痢即止遂思飲食邵真人經驗方腸風瀉血木鱉子以桑柴燒存性候冷為末每服一錢煨蔥白酒空心服之名烏金散普濟方肛門痔痛孫用和祕寶方用木鱉仁三枚砂盆擂如泥入百沸湯一碗乘熱先熏後洗日用三次仍塗少許瀕湖集簡方用木鱉仁帶潤者雌雄各五個乳細作七丸碗覆濕處勿令乾每以一丸唾化開貼痔上其痛即止一夜一丸自消也江夏鐵佛寺蔡和尚病此痛不可忍有人傳此而愈用治數人皆有效瘰癧經年木鱉仁二個去油研以雞子白和入瓶內安甑中蒸熟食後食之每日一服半月效小兒丹瘤木鱉子仁研如泥醋調敷之一日三五上效外科精義耳卒熱腫木鱉子仁一兩赤小豆大黃各半兩為末每以少許生油調塗之聖惠方風牙腫痛木鱉子仁磨醋搽之普濟方番木鱉綱目釋名馬錢子綱目苦實把豆綱目火失刻把都時珍曰狀似馬之連錢故名馬錢集解時珍曰番木鱉生回回國今西土卭州諸處皆有之蔓生夏開黃花七八月結實如栝蔞生青熟赤亦如木鱉其核小於木鱉而色白彼人言治一百二十種病每證各有湯引或云以豆腐制過用之良或云能毒狗至死仁氣味苦寒無毒主治傷寒熱病咽喉痹痛消痞塊並含之咽汁或磨水噙咽時珍附方新四喉痹作痛番木鱉青木香山豆根等分為末吹之楊拱醫方摘要纏喉風腫番木鱉仁一個木香三分同磨水調熊膽三分膽礬五分以雞毛掃患處取效唐瑤經驗方癍瘡入目苦實把豆兒即馬錢子半個輕粉水花銀硃各五分片腦麝香枯礬少許為末左目吹右耳右目吹左耳日二次田日華飛鴻集病欲去胎苦實把豆兒研膏納入牝戶三四寸集簡方馬兜鈴宋開寶校正併入唐本草獨行根釋名都淋藤肘後獨行根唐本土青木香唐本雲南根綱目三百兩銀藥宗奭曰蔓生附木而上葉脫時其實尚垂狀如馬項之鈴故得名也時珍曰其根吐利人微有香氣故有獨行木香之名嶺南人用治蠱隱其名為三百兩銀藥肘後方作都淋蓋誤傳也集解志曰獨行根生古堤城旁所在平澤叢林中皆有之山南名為土青木香一名兜鈴根蔓生葉似蘿藦而圓且澀花青白色其子大如桃李而長十月以後枯則頭開四系若囊其中實薄扁似榆莢其根扁而長尺許作葛根氣亦似漢防己二月八月採根頌曰馬兜鈴今關中河東河北江淮夔浙州郡皆有之春生苗作蔓繞樹而生葉如山蕷葉而厚大背白六月開黃紫花頗類枸杞花七月結實如棗大狀似鈴作四五瓣其根名雲南根微似木香大如小指赤黃色七八月採實曝乾實修治斆曰凡採得實去葉及蔓以生絹袋盛於東屋角畔待乾劈開去革膜取淨子焙用氣味苦寒無毒權曰平時珍曰微苦辛杲曰味厚氣薄陰中微陽入手太陰經主治肺熱咳嗽痰結喘促血痔瘻瘡開寶肺氣上急坐息不得咳逆連連不止甄權清肺氣補肺去肺中濕熱元素發明時珍曰馬兜鈴體輕而虛熟則懸而四開有肺之象故能入肺氣寒味苦微辛寒能清肺熱苦辛能降肺氣錢乙補肺阿膠散用之非取其補肺乃取其清熱降氣也邪去則肺安矣其中所用阿膠糯米則正補肺之藥也湯劑中用多亦作吐故崔氏方用以吐蠱其不能補肺又可推矣附方舊三新二水腫腹大喘急馬兜鈴煎湯日服之千金方肺氣喘急馬兜鈴二兩去殼及膜酥半兩入碗內拌勻慢火炒乾甘草炙一兩為末每服一錢水一盞煎六分溫呷或噙之簡要濟衆一切心痛不拘大小男女大馬兜鈴一個燈上燒存性為末溫酒服立效摘玄方解蛇蠱毒飲食中得之咽中如有物咽不下吐不出心下熱悶兜鈴一兩煎水服即吐出崔行功纂要方痔瘻腫痛以馬兜鈴於瓶中燒煙熏病處良日華本草獨行根氣味辛苦冷有毒大明曰無毒志曰有毒不可多服吐利不止主治鬼疰積聚諸毒熱腫蛇毒水磨為泥封之日三四次立瘥水煮一二兩取汁服吐蠱毒又搗末水調塗疔腫大效唐本治血氣大明利大腸治頭風瘙癢禿瘡時珍出精義附方舊一新五五種蠱毒肘後方云席辨刺史言嶺南俚人多於食中毒人漸不能食胸背漸脹先寒似瘴用都淋藤十兩水一斗酒二升煮三升分三服毒逐小便出十日慎食毒物不瘥更服土人呼為三百兩銀藥又支太醫云兜鈴根一兩為末水煎頓服當吐蠱出未盡再服或為末水調服亦驗中草蠱毒此術在西涼之西及嶺南人中此毒入咽欲死者用兜鈴苗一兩為末溫水調服一錢即消化蠱出神效聖惠方腸風漏血馬兜鈴藤穀精草荊三稜用烏頭炒過三味各等分煎水先熏後洗之普濟方疔腫復發馬兜鈴根搗爛用蜘蛛網裹敷少時根出肘後方惡蛇所傷青木香半兩煎湯飲之袖珍方榼藤子宋開寶校正自木部移入此釋名象豆開寶榼子日華合子拾遺時珍曰其子象榼形故名之集解藏器曰按廣州記云榼藤子生廣南山林間作藤著樹如通草藤其實三年方熟角如弓袋子若雞卵其外紫黑色其殼用貯丹藥經年不壞取其中仁入藥炙用時珍曰子紫黑色微光大一二寸圓而扁人多剔去肉作藥瓢垂於腰間也仁氣味澀甘平無毒主治五痔蠱毒飛尸喉痹以仁為粉微熬水服一二匕亦和大豆澡面去皯𪒟藏器治小兒脫肛血痢瀉血並燒灰服或以一枚割瓤熬研空腹熱酒服二錢不過三服必效開寶解諸藥毒時珍草木狀附方舊一新三喉痹腫痛榼藤子燒研酒服一錢聖惠方五痔下血榼藤子燒存性米飲服二錢有功寇氏衍義腸風下血華陀中藏經用榼藤子二個不蛀皂莢子四十九個燒存性為末每服二錢溫酒下少頃再飲酒一盞趁口服極效聖惠方用榼藤子三枚厚重者濕紙七重包煨熟去殼取肉為末每服一錢食前黃耆湯下日一服附録合子草拾遺藏器曰子及葉有小毒主蠱毒及蛇咬搗敷瘡上蔓生岸旁葉尖花白子中有兩片如合子預知子宋開寶釋名聖知子日華聖先子日華盍合子日華仙沼子日華志曰相傳取子二枚綴衣領上遇有蠱毒則聞其有聲當預知之故有諸名時珍曰仙沼疑是仙棗之訛集解志曰預知子有皮殼其實如皂莢子頌曰舊不著所出州土今淮蜀漢黔壁諸州皆有之作蔓生依大木上葉緑有三角面深背淺七月八月有實作房生青熟深紅色每房有子五七枚如皂莢子斑褐色光潤如飛蛾今蜀人極貴重之云亦難得採無時其根冬月採之陰乾治蠱其功勝於子也山民目為聖無憂子仁氣味苦寒無毒大明曰溫雙仁者可帶主治殺蟲療蠱治諸毒去皮研服有效開寶治一切風補五勞七傷其功不可備述治痃癖氣塊消宿食止煩悶利小便催生中惡失音發落天行溫疾塗一切蛇蟲蠶咬治一切病每日吞二七粒不過三千粒永瘥大明附方新三預知子丸治心氣不足精神恍惚語言錯妄忪悸煩郁憂愁慘戚喜怒多恐健忘少睡夜多異夢寤即驚魘或發狂眩暴不知人並宜服此預知子去皮白茯苓枸杞子石菖蒲茯神柏子仁人參地骨皮遠志山藥黃精蒸熟硃砂水飛等分為末煉蜜丸芡子大每嚼一丸人參湯下和劑局方耳卒聾閉八九月取石榴開一孔留蓋入米醋滿中蓋定麵裹煻火中煨熟取出入少仙沼子黑李子末取水滴耳中腦痛勿驚如此二夜又點一耳聖惠方癘風有蟲眉落聲變預知子膏用預知子雄黃各二兩為末以乳香三兩同水一斗銀鍋煮至五升入二末熬成膏瓶盛之每服一匙溫酒調下有蟲如馬尾隨大便而出聖惠方根氣味苦冷無毒主治解蠱毒石臼搗篩每用三錢溫水服立已蘇頌牽牛子別録下品釋名黑醜綱目草金鈴炮炙論盆甑草綱目狗耳草救荒弘景曰此藥始出田野人牽牛謝藥故以名之時珍曰近人隱其名為黑醜白者為白醜蓋以醜屬牛也金鈴象子形盆甑狗耳象葉形段成式酉陽雜俎云盆甑草蔓如薯蕷結實後斷之狀如盆甑是矣集解弘景曰牽牛作藤生花狀如扁豆黃色子作小房實黑色形如梂子核恭曰此花似旋花作碧色不黃亦不似扁豆頌曰處處有之二月種子三月生苗作藤蔓繞籬牆高者或二三丈其葉青有三尖角七月生花微紅帶碧色似鼓子花而大八月結實外有白皮裹作球每球內有子四五枚大如蕎麥有三稜有黑白二種九月後收之宗奭曰花朵如鼓子花但碧色日出開日西萎其核如木猴梨子而色黑謂子似蕎麥非也時珍曰牽牛有黑白二種黑者處處野生尤多其蔓有白毛斷之有白汁葉有三尖如楓葉花不作瓣如旋花而大其實有蒂裹之生青枯白其核與棠梂子核一樣但色深黑爾白者人多種之其蔓微紅無毛有柔刺斷之有濃汁葉團有斜尖並如山藥莖葉其花小於黑牽牛花淺碧帶紅色其實蒂長寸許生青枯白其核白色稍粗人亦採嫩實蜜煎為果食呼為天茄因其蒂似茄也子修治斆曰凡採得子曬乾水淘去浮者再曬拌酒蒸從巳至未曬乾收之臨用舂去黑皮時珍曰今多隻碾取頭末去皮麩不用亦有半生半熟用者氣味苦寒有毒權曰甘有小毒詵曰多食稍冷杲曰辛熱雄烈泄人元氣大明曰味蘞得青木香乾薑良主治下氣療腳滿水腫除風毒利小便別録治痃癖氣塊利大小便除虛腫落胎甄權取腰痛下冷膿瀉蠱毒藥並一切氣壅滯大明和山茱萸服去水病孟詵除氣分濕熱三焦壅結李杲逐痰消飲通大腸氣祕風祕殺蟲達命門時珍發明宗奭曰牽牛丸服治大腸風祕壅結不可久服亦行脾腎氣故也好古曰牽牛以氣藥引則入氣以大黃引則入血利大腸下水積色白者瀉氣分濕熱上攻喘滿破血中之氣震亨曰牽牛屬火善走黑者屬水白者屬金若非病形與證俱實不脹滿不大便祕者不可輕用驅逐致虛先哲深戒杲曰牽牛非神農藥也名醫續注云味苦寒能除濕氣利小便治下注腳氣此説氣味主治俱誤矣何也凡用牽牛少則動大便多則泄下如水乃瀉氣之藥其味辛辣久嚼猛烈雄壯所謂苦寒安在哉夫濕者水之別稱有形者也若肺先受濕濕氣不得施化致大小便不通則宜用之蓋牽牛感南方熱火之化所生火能平金而泄肺濕去則氣得周流所謂五臟有邪更相平也今不問有濕無濕但傷食或有熱證俱用牽牛克化之藥豈不誤哉況牽牛止能泄氣中之濕熱不能除血中之濕熱濕從下受之下焦主血血中之濕宜苦寒之味反以辛藥泄之傷人元氣且牽牛辛烈比之諸辛藥泄氣尤甚其傷人必矣經云辛泄氣辛走氣辛泄肺氣病者無多食辛況飲食失節勞役所傷是胃氣不行心火乘之腸胃受火邪名曰熱中脾胃主血當血中泄火以黃芩之苦寒泄火當歸身之辛溫和血生地黃之苦寒涼血益血少加紅花之辛溫以泄血絡桃仁之辛溫除燥潤腸仍不可專用須於補中益氣泄陰火之藥內加而用之何則上焦元氣已自虛弱若反用牽牛大辛熱氣味俱陽之藥以泄水泄元氣利其小便竭其津液是謂重虛重則必死輕則夭人故張文懿云牽牛不可耽嗜脫人元氣見人有酒食病痞者多服牽牛丸散取快一時藥過仍痞隨服隨效效後復痞以致久服脫人元氣猶不知悔也張仲景治七種濕熱小便不利無一藥犯牽牛者仲景豈不知牽牛能泄濕利小便乎為濕病之根在下焦是血分中氣病不可用辛辣之藥泄上焦太陰之氣是血病瀉氣使氣血俱損也經云毋盛盛毋虛虛毋絶人長命此之謂也用者戒之白牽牛亦同時珍曰牽牛自宋以後北人常用取快及劉守真張子和出又倡為通用下藥李明之目擊其事故著此説極力闢之然東漢時此藥未入本草故仲景不知假使知之必有用法不應捐棄況仲景未用之藥亦多矣執此而論蓋矯枉過中矣牽牛治水氣在肺喘滿腫脹下焦郁遏腰背脹腫及大腸風祕氣祕卓有殊功但病在血分及脾胃虛弱而痞滿者則不可取快一時及常服暗傷元氣也一宗室夫人年幾六十平生苦腸結病旬日一行甚於生産服養血潤燥藥則泥膈不快服硝黃通利藥則若罔知如此三十餘年矣時珍診其人體肥膏粱而多憂鬱日吐酸痰碗許乃寬又多火病此乃三焦之氣壅滯有升無降津液皆化為痰飲不能下滋腸腑非血燥比也潤劑留滯硝黃徒入血分不能通氣俱為痰阻故無效也乃用牽牛末皂莢膏丸與服即便通利自是但覺腸結一服就順亦不妨食且復精爽蓋牽牛能走氣分通三焦氣順則痰逐飲消上下通快矣外甥柳喬素多酒色病下極脹痛二便不通不能坐臥立哭呻吟者七晝夜醫用通利藥不效遣人叩豫豫思此乃濕熱之邪在精道壅脹隧路病在二陰之間故前阻小便後阻大便病不在大腸膀胱也乃用楝實茴香穿山甲諸藥入牽牛加倍水煎服一服而減三服而平牽牛能達右腎命門走精隧人所不知惟東垣李明之知之故明之治下焦陽虛天真丹用牽牛以鹽水炒黑入佐沉香杜仲破故紙官桂諸藥深得補瀉兼施之妙方見醫學發明又東垣治脾濕太過通身浮腫喘不得臥腹如鼓海金沙散亦以牽牛為君則東垣未盡棄牽牛不用但貴施之得道耳附方舊八新三十三搜風通滯風氣所攻臟腑積滯用牽牛子以童尿浸一宿長流水上洗半日生絹袋盛挂當風處令乾每日鹽湯下三十粒極能搜風亦消虛腫久服令人體清瘦斗門方三焦壅塞胸膈不快頭昏目眩涕唾痰涎精神不爽利膈丸用牽牛子四兩半生半炒不蛀皂莢酥炙二兩為末生薑自然汁煮糊丸梧子大每服二十丸荊芥湯下王袞博濟方一切積氣宿食不消黑牽牛頭為末四兩用蘿蔔剜空安末蓋定紙封蒸熟取出入白豆蔻末一錢搗丸梧子大每服一二十丸白湯下名順氣丸普濟方男婦五積五般積氣成聚用黑牽牛一斤生搗末八兩余滓以新瓦炒香再搗取四兩煉蜜丸梧子大至重者三五十丸陳橘皮生薑煎湯臥時服半夜未動再服三十丸當下積聚之物尋常行氣每服十丸甚妙經驗方胸膈食積牽牛末一兩巴豆霜三個研末水丸梧子大每服二三十丸食後隨所傷物湯下儒門事親氣築奔沖不可忍牛郎丸用黑牽牛半兩炒檳榔二錢半為末每服一錢紫蘇湯下普濟方追蟲取積方同上用酒下亦消水腫腎氣作痛黑白牽牛等分炒為末每服三錢用豬腰子切縫入茴香百粒川椒五十粒摻牽牛末入內扎定紙包煨熟空心食之酒下取出惡物效楊仁齋直指方傷寒結胸心腹硬痛用牽牛頭末一錢白糖化湯調下鄭氏家傳方大便不通簡要濟衆方用牽牛子半生半熟為末每服二錢薑湯下未通再以茶服一方加大黃等分一方加生檳榔等分大腸風祕結澀牽牛子微炒搗頭末一兩桃仁去皮尖麩炒半兩為末熟蜜丸梧子大每湯服三十丸寇氏衍義水蠱脹滿白牽牛黑牽牛各取頭末二錢大麥面四兩和作燒餅臥時烙熟食之以茶下降氣為驗河間宣明方諸水飲病張子和云病水之人如長川泛溢非杯杓可取必以神禹決水之法治之故名禹功散用黑牽牛頭末四兩茴香一兩炒為末每服一二錢以生薑自然汁調下當轉下氣也儒門事親陰水陽水黑牽牛頭末三兩大黃末三兩陳米飯鍋糕一兩為末糊丸梧子大每服五十丸薑湯下欲利服百丸醫方捷徑水腫尿澀牽牛末每服方寸匕以小便利為度千金方濕氣中滿足脛微腫小便不利氣急咳嗽黑牽牛末一兩厚朴制半兩為末每服二錢薑湯下或臨時水丸每棗湯下三十丸普濟方水氣浮腫氣促坐臥不得用牽牛子二兩微炒搗末以烏牛尿一升浸一宿平旦入蔥白一握煎十餘沸空心分二服水從小便中出聖惠方脾濕腫滿方見海金沙下風毒腳氣捻之沒指者牽牛子搗末蜜丸小豆大每服五丸生薑湯下取小便利乃止亦可吞之其子黑色正如梂子核肘後方小兒腫病大小便不利黑牽牛白牽牛各二兩炒取頭末井華水和丸緑豆大每服二十丸蘿蔔子煎湯下聖濟總録小兒腹脹水氣流腫膀胱實熱小便赤澀牽牛生研一錢青皮湯空心下一加木香減半丸服鄭氏小兒方疳氣浮腫常服自消黑牽牛白牽牛各半生半炒取末陳皮青皮等分為末糊丸緑豆大每服三歲兒服二十丸米湯下鄭氏小兒方疳氣耳聾疳氣攻腎耳聾陰腫牽牛末一錢豬腰子半個去膜薄切摻入內加少鹽濕紙包煨空心服鄭氏方小兒雀目牽牛子末每以一錢用羊肝一片同面作角子二個炙熟食米飲下普濟方風熱赤眼白牽牛末以蔥白煮研丸緑豆大每服五丸蔥湯下服訖睡半時衛生家寶方面上風刺黑牽牛酒浸三宿為末先以薑汁擦面後用藥塗之摘玄方面上粉刺㿔子如米粉黑牽牛末對入面脂藥中日日洗之聖惠方面上雀斑黑牽牛末雞子清調夜敷日洗摘玄方馬脾風病小兒急驚肺脹喘滿胸高氣急腎縮鼻張悶亂咳嗽煩渴痰潮聲嗄俗名馬脾風不急治死在旦夕白牽牛半生半炒黑牽牛半生半炒大黃煨檳榔各取末一錢每用五分蜜湯調下痰盛加輕粉一字名牛黃奪命散全幼心鑑小兒夜啼黑牽牛末一錢水調敷臍上即止生生編臨月滑胎牽牛子一兩赤土少許研末覺胎轉痛時白榆皮煎湯下一錢王袞博濟方小便血淋牽牛子二兩半生半炒為末每服二錢薑湯下良久熱茶服之經驗良方腸風瀉血牽牛五兩牙皂三兩水浸三日去皂以酒一升煮乾焙研末蜜丸梧子大每服七丸空心酒下日三服下出黃物不妨病減後日服五丸米飲下本事方痔漏有蟲黑白牽牛各一兩炒為末以豬肉四兩切碎炒熟蘸末食盡以白米飯三匙壓之取下白蟲為效又方白牽牛頭末四兩沒藥一錢為細末欲服藥時先日勿夜飯次早空心將豬肉四兩炙切片蘸末細細嚼食取下膿血為效量人加減用忌酒色油膩三日儒門事親漏瘡水溢乃腎虛也牽牛末二錢半入切開豬腎中竹葉包定煨熟空心食溫酒送下借腎入腎一縱一橫兩得其便惡水既泄不復淋瀝直指方一切癰疽發背無名腫毒年少氣壯者用黑白牽牛各一合布包捶碎以好醋一碗熬至八分露一夜次日五更溫服以大便出膿血為妙名濟世散張三丰仙方濕熱頭痛黑牽牛七粒砂仁一粒研末井華水調汁仰灌鼻中待涎出即愈聖濟録氣滯腰痛牽牛不拘多少以新瓦燒赤安於上自然一半生一半熟不得撥動取末一兩入硫黃末二錢半同研勻分作三分每分用白麵三匙水和捍開切作棋子五更初以水一盞煮熟連湯溫下痛即已未住隔日再作豫常有此疾每發一服痛即止許學士本事方旋花本經上品釋名旋葍蘇恭筋根本經續筋根圖經鼓子花圖經豚腸草圖經美草別録天劍草綱目纏枝牡丹恭曰旋花即平澤旋葍也其根似筋故一名筋根炳曰旋葍當作葍旋音福旋用根入藥別有旋覆音璇伏用花入藥今云旋葍誤矣頌曰別録言其根主續筋故南人呼為續筋根一名豚腸草象形也宗奭曰世俗謂之鼓子花言其花形肖也時珍曰其花不作瓣狀如軍中所吹鼓子故有旋花鼓子之名一種千葉者色似粉紅牡丹俗呼為纏枝牡丹集解別録曰旋花生豫州平澤五月採陰乾保升曰此旋葍花也所在川澤皆有蔓生葉似薯蕷而狹長花紅白色根無毛節蒸煮堪啖味甘美名筋根二月八月採根日乾宗奭曰今河北汴西關陝田野中甚多最難鋤艾治之又生四五月開花其根寸截置土灌溉涉旬苗生韓保升説是矣時珍曰旋花田野塍塹皆生逐節延蔓葉如波菜葉而小至秋開花如白牽牛花粉紅色亦有千葉者其根白色大如筋不結子頌曰黔南施州出一種旋花粗莖大葉無花不作蔓恐別是一物也正誤本經曰花一名金沸弘景曰旋花東人呼為山薑南人呼為美草根似杜若亦似高良薑腹中冷痛煮服甚效作丸散服辟穀止飢近有人從江南還用此術與人斷谷皆得半年百日不飢不瘦但志淺嗜深不能久服爾其葉似薑花赤色味辛美子狀如豆蔻此旋花即其花也今山東甚多又注旋覆花曰別有旋葍根出河南來北國亦有形似芎藭惟合旋葍膏用之余無所入恭曰旋花乃旋葍花也陶説乃山薑爾山薑味辛都非此類又因旋覆花名金沸遂作此花別名皆誤矣又云從北國來者根似芎藭芎藭與高良薑全無倣佛亦誤也氣味花甘根辛溫無毒時珍曰花根莖葉並甘滑微苦能制雄黃主治去面皯黑色媚好益氣根主腹中寒熱邪氣利小便久服不飢輕身本經續筋骨合金瘡搗汁服主丹毒小兒毒熱藏器補勞損益精氣時珍發明時珍曰凡藤蔓之屬象人之筋所以多治筋病旋花根細如筋可啖故本經言其久服不飢時珍自京師還見北土車伕每載之云暮歸煎湯飲可補損傷則益氣續筋之説尤可徵矣附方舊一新一被斫斷筋旋葍根搗汁瀝瘡中仍以滓敷之日三易半月即斷筋便續此方出蘇景中家獠奴用效王燾外臺祕要祕精益髓太乙金鎖丹用五色龍骨五兩覆盆子五兩蓮花蕊四兩未開者陰乾鼓子花三兩五月五日採之雞頭子仁一百顆併為末以金櫻子二百枚去毛木臼搗爛水七升煎濃汁一升去渣和藥杵二千下丸梧子大每空心溫鹽酒下三十丸服之至百日永不泄如要泄以冷水調車前末半合服之忌葵菜薩謙齋瑞竹堂方紫葳本經中品校正自木部移入此釋名凌霄蘇恭陵苕別録陵時郭璞女葳甄權茇華別録武威吳普瞿陵吳普鬼目吳氏時珍曰俗謂赤豔曰紫葳葳此花赤豔故名附木而上高數丈故曰凌霄正誤弘景曰是瞿麥根方用至少博物志云郝晦行太行山北得紫葳華必當奇異今瞿麥處處有之不應乃在太行山恭曰紫葳瞿麥皆本經藥體性既乖生處亦不相關爾雅云苕一名陵苕郭璞注云一名陵時又名凌霄此為真也頌曰孔穎達詩疏亦云苕一名陵時今本草無陵時之名惟鼠尾草有之豈所傳不同抑陶蘇之誤耶時珍曰按吳氏本草紫葳一名瞿陵陶弘景誤作瞿麥字爾鼠尾止名陵翹無陵時蘇頌亦誤矣並正之集解別録曰紫葳生西海川穀及山陽恭曰此凌霄花也連莖葉用詩云有苕之華云其黃矣爾雅云陵苕黃華蔈白華茇山中亦有白花者頌曰今處處皆有多生山中人家園圃亦或栽之初作蔓生依大木久延至巔其花黃赤夏中乃盛今醫家多采花干之入女科藥用時珍曰凌霄野生蔓才數尺得木而上即高數丈年久者藤大如杯春初生枝一枝數葉尖長有齒深青色自夏至秋開花一枝十餘朵大如牽牛花而頭開五瓣赭黃色有細點秋深更赤八月結莢如豆莢長三寸許其子輕薄如榆仁馬兜鈴仁其根長亦如兜鈴根狀秋後採之陰乾花根同氣味酸微寒無毒普曰神農雷公岐伯辛扁鵲苦咸黃帝甘無毒權曰畏滷鹼時珍曰花不可近鼻聞傷腦花上露入目令人昏蒙主治婦人産乳余疾崩中癥瘕血閉寒熱羸瘦養胎本經産後奔血不定淋瀝主熱風風癇大小便不利腸中結實甄權酒渣熱毒風刺風婦人血膈遊風崩中帶下大明莖葉氣味苦平無毒主治痿躄益氣別録熱風身癢遊風風疹瘀血帶下花及根功同大明治喉痹熱痛涼血生肌時珍發明時珍曰凌霄花及根甘酸而寒莖葉帶苦手足厥陰經藥也行血分能去血中伏火故主産乳崩漏諸疾及血熱生風之證也附方舊一新十三婦人血崩凌霄花為末每酒服二錢後服四物湯丹溪纂要糞後下血凌霄花浸酒頻飲之普濟方消渴飲水凌霄花一兩搗碎水一盞半煎一盞分二服聖濟録嬰兒不乳百日內小兒無故口青不飲乳用凌霄花大藍葉芒硝大黃等分為末以羊髓和丸梧子大每研一丸以乳送下便可吃乳熱者可服寒者勿服昔有人休官後雲遊湖湘修合此方救危甚多普濟方久近風癇凌霄花或根葉為末每服三錢溫酒下服畢解發不住手梳口噙冷水溫則吐去再噙再梳至二十口乃止如此四十九日絶根百無所忌方賢奇效方通身風癢凌霄花為末酒服一錢醫學正傳大風癘疾潔古家珍用凌霄花五錢地龍焙殭蠶炒全蠍炒各七個為末每服二錢溫酒下先以藥湯浴過服此出臭汗為效儒門事親加蟬蛻五品各九個作一服鼻上酒渣王璆百一選方用凌霄花山梔子等分為末每茶服二錢日二服數日除根臨川曾子仁用之有效楊氏家藏方用凌霄花半兩硫黃一兩胡桃四個膩粉一錢研膏生絹包揩走皮趨瘡滿頰滿頂浸淫濕爛延及兩耳癢而出水發歇不定田野名悲羊瘡用凌霄花並葉煎湯日日洗之楊仁齋直指方婦人陰瘡紫葳為末用鯉魚腦或膽調搽摘玄方耳卒聾閉凌霄葉杵取自然汁滴之斗門方女經不行凌霄花為末每服二錢食前溫酒下徐氏胎産方附録骨路支拾遺藏器曰味辛平無毒主上氣浮腫水氣嘔逆婦人崩中余血症瘕殺三蟲生崑崙國苗似凌霄藤根如青木香越南亦有一名飛藤營實牆蘼音眉本經上品釋名薔薇別録山棘別録牛棘本經牛勒別録刺花綱目時珍曰此草蔓柔靡依牆援而生故名牆蘼其莖多棘刺勒人牛喜食之故有山棘牛勒諸名其子成簇而生如營星然故謂之營實集解別録曰營實生零陵川穀及蜀郡八月九月採陰乾弘景曰營實即薔薇子也以白花者為良莖葉可煮作飲其根亦可煮釀酒保升曰所在有之蔓生莖間多刺其花有百葉八出六出或赤或白子若杜棠子時珍曰薔薇野生林塹間春抽嫩蕻小兒掐去皮刺食之既長則成叢似蔓而莖硬多刺小葉尖薄有細齒四五月開花四出黃心有白色粉紅二者結子成簇生青熟紅其核有白毛如金櫻子核八月採之根採無時人家栽玩者莖粗葉大延長數丈花亦厚大有白黃紅紫數色花最大者名佛見笑小者名木香皆香豔可人不入藥用南番有薔薇露云是此花之露水香馥異常營實氣味酸溫無毒別録曰微寒主治癰疽惡瘡結肉跌筋敗瘡熱氣陰蝕不瘳利關節本經久服輕身益氣別録治上焦有熱好瞑時珍附方新一眼熱昏暗營實枸杞子地膚子各二兩為末每服三錢溫酒下聖惠方根氣味苦澀冷無毒主治止泄痢腹痛五臟客熱除邪逆氣疽癩諸惡瘡金瘡傷撻生肉復肌別録治熱毒風除邪氣止赤白痢腸風瀉血通結血治牙齒痛小兒疳蟲肚痛癰疽疥癬大明頭瘡白禿甄權除風熱濕熱縮小便止消渴時珍發明時珍曰營實薔薇根能入陽明經除風熱濕熱生肌殺蟲故癰疽瘡癬古方常用而泄痢消渴遺尿好瞑亦皆陽明病也附方舊七新六消渴尿多薔薇根一把水煎日服之千金方小便失禁薔薇根煮汁飲或為末酒服野生白花者更良聖惠方少小尿床薔薇根五錢煎酒夜飲外臺祕要小兒疳痢頻數用生薔薇根洗切煎濃汁細飲以愈為度千金方尸咽痛癢語聲不出薔薇根皮射干一兩甘草炙半兩每服二錢水煎服之普濟方口舌糜爛薔薇根避風打去土煮濃汁溫含冷吐冬用根皮夏用枝葉口瘡日久延及胸中生瘡三年以上不瘥者皆效千金方小兒月蝕薔薇根四兩地榆二錢為末先以鹽湯洗過敷之全幼心鑑癰腫癤毒潰爛疼痛用薔薇皮更炙尉之千金方筋骨毒痛因患楊梅瘡服輕粉毒藥成者野薔薇根白皮洗三斤水酒十斤煮一炷香每日任飲以愈為度鄧筆峰雜興方用刺薔薇根三錢五加皮木瓜當歸茯苓各二錢以酒二盞煎一盞日服一次金瘡腫痛薔薇根燒灰每白湯服方寸匕一日三服抱朴子箭刺入肉膿囊不出以薔薇根末摻之服鼠撲十日即穿皮出也外臺祕要骨哽不出薔薇根末水服方寸匕日三同上葉主治下疳瘡焙研洗敷之黃花者更良攝生方月季花綱目釋名月月紅見下勝春瘦客鬥雪紅集解時珍曰處處人家多栽插之亦薔薇類也青莖長蔓硬刺葉小於薔薇而花深紅千葉厚瓣逐月開放不結子也氣味甘溫無毒主治活血消腫敷毒時珍附方新一瘰癧未破用月季花頭二錢沉香五錢芫花炒三錢碎銼入大鯽魚腹中就以魚腸封固酒水各一盞煮熟食之即愈魚須安糞水內遊死者方效此是家傳方活人多矣談野翁試驗方栝蔞本經中品校正併入圖經天花粉釋名果裸音裸栝蔞綱目天瓜別録黃瓜別録地蔞本經澤姑別録根名白藥圖經天花粉圖經瑞雪時珍曰裸與蓏同許慎云木上曰果地下曰蓏此物蔓生附木故得兼名詩云果裸之實亦施於宇是矣栝蔞即果裸二字音轉也亦作䒷𧁾後人又轉為栝蔞愈轉愈失其真矣古者瓜姑同音故有澤姑之名齊人謂之天瓜象形也雷斆炮炙論以圓者為栝長者為蔞亦出牽強但分雌雄可也其根作粉潔白如雪故謂之天花粉蘇頌圖經重出天花粉謬矣今削之集解別録曰栝蔞生弘農川穀及山陰地根入土深者良生鹵地者有毒二月八月採根曝乾三十日成弘景曰出近道藤生狀如土瓜而葉有叉入土六七尺大二三圍者服食亦用之實入摩膏用恭曰出陝州者白實最佳頌曰所在有之三四月生苗引藤蔓葉如甜瓜葉而窄作叉有細毛七月開花似壺盧花淺黃色結實在花下大如拳生青至九月熟赤黃色其形有正圓者有鋭而長者功用皆同根亦名白藥皮黃肉白時珍曰其根直下生年久者長數尺秋後掘者結實有粉夏月掘者有筋無粉不堪用其實圓長青時如瓜黃時如熟柿山家小兒亦食之內有扁子大如絲瓜子殼色褐仁色緑多脂作青氣炒乾搗爛水熬取油可點燈實修治斆曰凡使皮子莖根其效各別其栝圓黃皮厚蒂小蔞則形長赤皮蒂粗陰人服蔞陽人服栝並去殼皮革膜及油用根亦取大二三圍者去皮搗爛以水澄粉用時珍曰栝蔞古方全用後世乃分子瓤各用氣味苦寒無毒時珍曰味甘不苦主治胸痹悅澤人面別録潤肺燥降火治咳嗽滌痰結利咽喉止消渴利大腸消癰腫瘡毒時珍子炒用補虛勞口乾潤心肺治吐血腸風瀉血赤白痢手面皺大明發明震亨曰栝蔞實治胸痹者以其味甘性潤甘能補肺潤能降氣胸中有痰者乃肺受火逼失其降下之令今得甘緩潤下之助則痰自降宜其為治嗽之要藥也且又能洗滌胸膈中垢膩鬱熱為治消渴之神藥時珍曰張仲景治胸痹痛引心背咳唾喘息及結胸滿痛皆用栝蔞實乃取其甘寒不犯胃氣能降上焦之火使痰氣下降也成無己不知此意乃云苦寒以瀉熱蓋不嘗其味原不苦而隨文傅會爾附方舊十二新二十八痰咳不止栝蔞仁一兩文蛤七分為末以薑汁澄濃腳丸彈子大噙之摘玄方乾咳無痰熟栝蔞搗爛絞汁入蜜等分加白礬一錢熬膏頻含咽汁楊起簡便方咳嗽有痰熟栝蔞十個明礬二兩搗和餅陰乾研末糊丸梧子大每薑湯下五七十丸醫方摘要痰喘氣急䒷𧁾二個明礬一棗大同燒存性研末以熟蘿蔔蘸食藥盡病除普濟方熱咳不止用濃茶湯一鍾蜜一鍾大熟栝蔞一個去皮將瓤入茶蜜湯洗去子以碗盛於飯上蒸至飯熟取出時時挑三四匙咽之摘玄方肺熱痰咳胸膈塞滿用栝蔞仁半夏湯泡七次焙研各一兩薑汁打麵糊丸梧子大每服五十丸食後薑湯下嚴用和濟生方肺痿咳血不止用栝蔞五十個連瓤瓦焙烏梅肉五十個焙杏仁去皮尖炒二十一個為末每用一捻以豬肺一片切薄摻末入內炙熟冷嚼咽之日二服聖濟録酒痰咳嗽用此救肺栝蔞仁青黛等分研末薑汁蜜丸芡子大每噙一丸丹溪心法飲酒發熱即上方研膏日食數匙一男子年二十病此服之而愈摘玄方飲酒痰澼兩脅脹滿時復嘔吐腹中如水聲栝蔞實去殼焙一兩神麯炒半兩為末每服二錢蔥白湯下聖惠方小兒痰喘咳嗽膈熱久不瘥瓜蔞實一枚去子為末以寒食麵和作餅子炙黃再研末每服一錢溫水化下日三服效乃止劉河間宣明方婦人夜熱痰嗽月經不調形瘦者用栝蔞仁一兩青黛香附童尿浸曬一兩五錢為末蜜調噙化之丹溪心法胸痹痰嗽胸痛徹背心腹痞滿氣不得通及治痰嗽大栝蔞去瓤取子炒熟和殼研末麵糊丸梧子大每米飲下二三十丸日二服杜壬方胸中痹痛引背喘息咳唾短氣寸脈沉遲關上緊數用大栝蔞實一枚切薤白半斤以白酒七斤煮二升分再服加半夏四兩更善仲景金匱方清痰利膈治咳嗽用肥大栝蔞洗取子切焙半夏四十九個湯洗十次捶焙等分為末用洗栝蔞水並瓤同熬成膏和丸梧子大每薑湯下三五十丸良楊文蔚方中風喎斜用栝蔞絞汁和大麥面作餅炙熱尉之正便止勿令太過聖惠方熱病頭痛發熱進退用大栝蔞一枚取瓤細銼置瓷碗中用熱湯一盞沃之蓋定良久去滓服聖惠方時疾發黃狂悶煩熱不識人者大栝蔞實黃者一枚以新汲水九合浸淘取汁入蜜半合朴硝八分合攪令消盡分再服便瘥蘇頌圖經本草小兒黃疸眼黃脾熱用青栝蔞焙研每服一錢水半盞煎七分臥時服五更瀉下黃物立可名逐黃散普濟方酒黃疸疾方同上小便不通腹脹用栝蔞焙研每服二錢熱酒下頻服以通為度紹興劉駐云魏明州病此御醫用此方治之得效聖惠方消渴煩亂黃栝蔞一個酒一盞洗去皮子取瓤煎成膏入白礬末一兩丸梧子大每米飲下十丸聖惠方燥渴腸祕九月十月熟䒷𧁾實取瓤拌乾葛粉銀石器中慢火炒熟為末食後夜臥各以沸湯點服二錢寇宗奭衍義吐血不止栝蔞泥固煅存性研三錢糯米飲服日再服聖濟録腸風下血栝蔞一個燒灰赤小豆半兩為末每空心酒服一錢普濟方久痢五色大熟䒷蔞一個煅存性出火毒為末作一服溫酒服之胡大卿一僕患痢半年杭州一道人傳此而愈本事方大腸脫肛生栝蔞搗汁溫服之以豬肉汁洗手挼之令暖自入葛洪肘後方小兒脫肛唇白齒焦久則兩頰光眉赤唇焦啼哭黃䒷蔞一個入白礬五錢在內固濟煅存性為末糊丸梧子大每米飲下二十丸摘玄方牙齒疼痛䒷蔞皮露蜂房燒灰擦牙以烏桕根荊柴根蔥根煎湯嗽之危氏得效方咽喉腫痛語聲不出經進方用栝蔞皮白殭蠶炒甘草炒各二錢半為末每服三錢半薑湯下或以綿裹半錢含咽一日二服名發聲散御藥院方堅齒烏須大栝蔞一個開頂入青鹽二兩杏仁去皮尖三七粒原頂合扎定蚯蚓泥和鹽固濟炭火煅存性研末每日揩牙三次令熱百日有驗如先有白鬚拔去以藥投之即生黑者其治口齒之功未易具陳普濟方面黑令白栝蔞瓤三兩杏仁一兩豬胰一具同研如膏每夜塗之令人光潤冬月不皴聖濟録胞衣不下栝蔞實一個取子細研以酒與童子小便各半盞煎七分溫服無實用根亦可陳良甫婦人良方乳汁不下䒷蔞子淘洗控乾炒香瓦上拓令白色為末酒服一錢匕合面臥一夜流出姚僧坦集驗方乳癰初發大熟栝蔞一枚熟搗以白酒一斗煮取四升去滓溫服一升日三服子母祕録諸癰發背初起微赤栝蔞搗末井華水服方寸匕梅師方便毒初發黃䒷蔞一個黃連五錢水煎連服效李仲南永類方風瘡疥癩生栝蔞一二個打碎酒浸一日夜熱飲臞仙乾坤祕韞熱遊丹腫栝蔞子仁末二大兩釅醋調塗楊氏産乳集驗方楊梅瘡痘小如指頂遍身者先服敗毒散後用此解皮膚風熱不過十服愈用栝蔞皮為末每服三錢燒酒下日三服集簡方根修治天花粉周定王曰秋冬採根去皮寸切水浸逐日換水四五日取出搗泥以絹袋濾汁澄粉曬乾用氣味苦寒無毒時珍曰甘微苦酸微寒之才曰枸杞為之使惡乾薑畏牛膝乾漆反烏頭主治消渴身熱煩滿大熱補虛安中續絶傷本經除腸胃中痼熱八疸身面黃唇乾口燥短氣止小便利通月水別録治熱狂時疾通小腸消腫毒乳癰發背痔瘻瘡癤排膿生肌長肉消撲損瘀血大明發明恭曰用根作粉潔白美好食之大宜虛熱人杲曰栝蔞根純陰解煩渴行津液心中枯涸者非此不能除與辛酸同用導腫氣成無己曰津液不足則為渴栝蔞根味苦微寒潤枯燥而通行津液是為渴所宜也時珍曰栝蔞根味甘微苦酸其莖葉味酸酸能生津感召之理故能止渴潤枯微苦降火甘不傷胃昔人只言其苦寒似未深察附方舊十二新十三消渴飲水千金方作粉法取大栝蔞根去皮寸切水浸五日逐日易水取出搗研濾過澄粉曬乾每服方寸匕水化下日三服亦可入粥及乳酪中食之肘後方用栝蔞根薄切炙取五兩水五升煮四升隨意飲之外臺祕要用生栝蔞根三十斤以水一石煮取一斗半去滓以牛脂五合煎至水盡用暖酒先食服如雞子大日三服最妙聖惠方用栝蔞根黃連三兩為末蜜丸梧子大每服三十丸日二服又玉壺丸用栝蔞根人參等分為末蜜丸梧子大每服三十丸麥門冬湯下傷寒煩渴思飲栝蔞根三兩水五升煮一升分二服先以淡竹瀝一升水二升煮好銀二兩減半去銀冷飲汁然後服此外臺祕要百合病渴栝蔞根牡蠣熬等分為散飲服方寸匕永類方黑疸危疾䒷蔞根一斤搗汁六合頓服隨有黃水從小便出如不出再服楊起簡便方小兒發黃皮肉面目皆黃用生栝蔞根搗取汁二合蜜二大匙和勻暖服日一服廣利方小兒熱病壯熱煩渴用栝蔞根末乳汁調服半錢聖惠方虛熱咳嗽天花粉一兩人參三錢為末每服一錢米湯下集簡方偏疝痛極劫之立住用綿袋包暖陰囊取天花粉五錢以醇酒一碗浸之自卯至午微煎滾露一夜次早低凳坐定兩手按膝飲下即愈未效再一服本草蒙筌小兒囊腫天花粉一兩炙甘草一錢半水煎入酒服全幼心鑑耳卒烘烘栝蔞根削尖以臘豬脂煎三沸取塞耳三日即愈肘後方耳聾未久栝蔞根三十斤細切以水煮汁如常釀酒久服甚良肘後方産後吹乳腫硬疼痛輕則為妒乳重則為乳癰用栝蔞根末一兩乳香一錢為末溫酒每服二錢李仲南永類方乳汁不下栝蔞根燒存性研末飲服方寸匕或以五錢酒水煎服楊氏産乳癰腫初起孟詵食療用栝蔞根苦酒熬燥搗篩以苦酒和塗紙上貼之楊文蔚方用栝蔞根赤小豆等分為末醋調塗之天泡濕瘡天花粉滑石等分為末水調搽之普濟方楊梅天泡天花粉川芎藭各四兩槐花一兩為末米糊丸梧子大每空心淡薑湯下七八十丸簡便方折傷腫痛栝蔞根搗塗重布裹之熱除痛即止葛洪肘後方箭鏃不出栝蔞根搗敷之日三易自出崔元亮海上方針刺入肉方同上痘後目障天花粉蛇蛻洗焙等分為末羊子肝批開入藥在內米泔汁煮熟切食次女病此服之旬余而愈周密齊東野語莖葉氣味酸寒無毒主治中熱傷暑別録王瓜本經中品釋名土瓜本經鉤𧁾郭璞老鴉瓜圖經馬匏瓜匏音雹赤雹子衍義野甜瓜綱目師姑草土宿公公須頌曰月令四月王瓜生即此也均房間人呼為老鴉瓜亦曰菟瓜按爾雅云蔩菟瓜郭璞注云似土瓜而土瓜自謂之藈姑又名鉤𧁾則菟瓜別是一物也又曰芴菲亦謂之土瓜別是一物非此土瓜也異類同名甚多不可不辨時珍曰土瓜其根作土氣其實似瓜也或云根味如瓜故名土瓜王字不知何義瓜似雹子熟則色赤鴉喜食之故俗名赤雹老鴉瓜一葉之下一須故俚人呼為公公須與地黃苗名婆婆奶可為屬對集解別録曰生魯地平澤田野及人家垣牆間三月採根陰乾弘景曰今土瓜生籬院間子熟時赤如彈丸其根不入大方正單行小小爾鄭玄注月令四月王瓜生以為菝葜殊謬矣恭曰四月生苗延蔓葉似栝蔞葉圓無叉缺有毛刺五月開黃花花下結子如彈丸生青熟赤根似葛細而多糝謂之土瓜根北間者其實纍纍相連大如棗皮黃肉白苗子相似根狀不同若療黃疸破血南者大勝也宗奭曰王瓜其殼徑寸長二寸許上微圓下尖長七八月熟紅赤色殼中子如螳螂頭者今人又謂之赤雹子其根即土瓜根也於細根上又生淡黃根三五相連如大指許根與子兩用時珍曰王瓜三月生苗其蔓多須嫩時可茹其葉圓如馬蹄而有尖面青背淡澀而不光六七月開五出小黃花成簇結子纍纍熟時有紅黃二色皮亦粗澀根不似葛但如栝蔞根之小者澄粉甚白膩須深掘二三尺乃得正根江西人栽之沃土取根作蔬食味如山藥根氣味苦寒無毒權曰平藏器曰有小毒能吐下人取汁制雄汞主治消渴內痹瘀血月閉寒熱痠疼益氣愈聾本經療諸邪氣熱結鼠瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水治馬骨刺人瘡別録天行熱疾酒黃病壯熱心煩悶熱勞排膿消撲損瘀血破症癖落胎大明主蠱毒小兒閃癖痞滿痰瘧並取根及葉搗汁少少服當吐下藏器利大小便治面黑麵瘡時珍附方舊五新七小兒發黃土瓜根生搗汁三合與服不過三次蘇頌圖經黃疸變黑醫所不能治用土瓜根汁平旦溫服一小升午刻黃水當從小便出不出再服肘後方小便如泔乃腎虛也王瓜散用王瓜根一兩白石脂二兩菟絲子酒浸二兩桂心一兩牡蠣粉二兩為末每服二錢大麥粥飲下衛生寶鑑小便不通土瓜根搗汁入少水解之筒吹入下部肘後方大便不通上方吹入肛門內二便不通前後吹之取通肘後方乳汁不下土瓜根為末酒服一錢一日二服楊氏産乳方經水不利帶下少腹滿或經一月再見者土瓜根散主之土瓜根芍藥桂枝蟅蟲各三兩為末酒服方寸匕日三服仲景金匱方婦人陰㿗方同上一切漏疾土瓜根搗敷之燥則易千金方中諸蠱毒土瓜根大如指長三寸切以酒半升漬一宿服當吐下外臺祕要面上痱磊土瓜根搗末漿水和勻入夜別以漿水洗面塗藥旦復洗之百日光彩射人夫妻不相識也曾用有效肘後方耳聾灸法濕土瓜根削半寸塞耳內以艾灸七壯每旬一灸愈乃止聖濟録子氣味酸苦平無毒主治生用潤心肺治黃病炒用治肺痿吐血腸風瀉血赤白痢大明主蠱毒甄權反胃吐食時珍附方新八消渴飲水雹瓜去皮每食後嚼二三兩五七度瘥聖惠方傳尸勞瘵赤雹兒俗名王瓜焙為末每酒服一錢十藥神書反胃吐食馬雹兒燈上燒存性一錢入好棗肉平胃散末二錢酒服食即可下即野甜瓜北方多有之丹溪纂要痰熱頭風懸栝蔞一個赤雹兒七個焙大力子即牛蒡子焙四兩為末每食後茶或酒服三錢忌動風發熱之物筋骨痛攣馬雹兒子炒開口為末酒服一錢日二服集簡方赤目痛澀不可忍小圓瓜𧁾籬上大如彈丸紅色皮上有刺者九月十月採日乾槐花炒赤芍藥等分為末每服二錢臨臥溫酒下衛生家寶方瘀血作痛赤雹兒燒存性研末無灰酒空心服二錢集簡方大腸下血王瓜一兩燒存性地黃二兩黃連半兩為末蜜丸梧子大米飲下三十丸指南方葛本經中品校正併入開寶葛粉釋名雞齊本經鹿藿別録黃斤別録時珍曰葛從曷諧聲也鹿食九草此其一種故曰鹿藿黃斤未詳集解別録曰葛根生汶山川穀五月採根曝乾弘景曰即今之葛根人皆蒸食之當取入土深大者破而日乾之南康廬陵間最勝多肉而少筋甘美但為藥不及耳恭曰葛雖除毒其根入土五六寸以上者名葛脰脰者頸也服之令人吐以有微毒也本經葛谷即是其實也頌曰今處處有之江浙尤多春生苗引藤蔓長一二丈紫色葉頗似楸葉而小色青七月著花粉紫色似豌豆花不結實根形大如手臂紫黑色五月五日午時採根曝乾以入土深者為佳今人多作粉食宗奭曰澧鼎之間冬月取生葛搗爛入水中揉出粉澄成垛入沸湯中良久色如膠其體甚韌以蜜拌食擦入生薑少許尤妙又切入茶中待賓雖甘而無益又將生葛根煮熟作果實賣虔吉州南安軍亦然時珍曰葛有野生有家種其蔓延長取治可作絺綌其根外紫內白長者七八尺其葉有三尖如楓葉而長面青背淡其花成穗纍纍相綴紅紫色其莢如小黃豆莢亦有毛其子緑色扁扁如鹽梅子核生嚼腥氣八九月採之本經所謂葛谷是也唐蘇恭亦言葛谷是實而宋蘇頌謂葛花不結實誤矣其花曬乾亦可炸食葛根氣味甘辛平無毒別録曰生根汁大寒好古曰氣平味甘升也陽也陽明經行經的藥也主治消渴身大熱嘔吐諸痹起陰氣解諸毒本經療傷寒中風頭痛解肌發表出汗開腠理療金瘡止脅風痛別録治天行上氣嘔逆開胃下食解酒毒甄權治胸膈煩熱發狂止血痢通小腸排膿破血敷蛇蟲齧罯毒箭傷大明殺野葛巴豆百藥毒之才生者墮胎蒸食消酒毒可斷谷不飢作粉尤妙藏器作粉止渴利大小便解酒去煩熱壓丹石敷小兒熱瘡搗汁飲治小兒熱痞開寶猘狗傷搗汁飲並末敷之蘇恭散鬱火時珍發明弘景曰生葛搗汁飲解溫病發熱五月五日日中時取根為屑療金瘡斷血為要藥亦療瘧及瘡至良頌曰張仲景治傷寒有葛根湯以其主大熱解肌發腠理故也元素曰升陽生津脾虛作渴者非此不除勿多用恐傷胃氣張仲景治太陽陽明合病桂枝湯內加麻黃葛根又有葛根黃芩黃連解肌湯是用此以斷太陽入陽明之路非即太陽藥也頭顱痛如破乃陽明中風可用葛根蔥白湯為陽明仙藥若太陽初病未入陽明而頭痛者不可便服升麻葛根發之是反引邪氣入陽明為引賊破家也震亨曰凡癍痘已見紅點不可用葛根升麻湯恐表虛反增斑爛也杲曰乾葛其氣輕浮鼓舞胃氣上行生津液又解肌熱治脾胃虛弱泄瀉聖藥也徐用誠曰葛根氣味俱薄輕而上行浮而微降陽中陰也其用有四止渴一也解酒二也發散表邪三也發瘡疹難出四也時珍曰本草十劑云輕可去實麻黃葛根之屬蓋麻黃乃太陽經藥兼入肺經肺主皮毛葛根乃陽明經藥兼入脾經脾主肌肉所以二味藥皆輕揚發散而所入迥然不同也附方舊十七新四數種傷寒庸人不能分別今取一藥兼治天行時氣初覺頭痛內熱脈洪者葛根四兩水二升入豉一升煮取半升服搗生根汁尤佳傷寒類要時氣頭痛壯熱生葛根洗淨搗汁一大盞豉一合煎六分去滓分服汗出即瘥未汗再服若心熱加梔子仁十枚聖惠方傷寒頭痛二三日發熱者葛根五兩香豉一升以童子小便八升煎取二升分三服食蔥豉粥取汗梅師方妊娠熱病葛根汁二升分三服傷寒類要預防熱病急黃賊風葛粉二升生地黃一升香豉半升為散每食後米飲服方寸匕日三服有病五服龐安常傷寒論闢瘴不染生葛搗汁一小盞服去熱毒氣也聖惠方煩躁熱渴葛粉四兩先以水浸粟米半升一夜漉出拌勻煮粥食之聖惠方小兒熱渴久不止葛根半兩水煎服聖惠方乾嘔不息葛根搗汁服一升瘥肘後方小兒嘔吐壯熱食癇葛粉二錢水二合調勻傾入錫鑼中重湯燙熟以糜飲和食咱殷食醫心鏡心熱吐血不止生葛搗汁半升頓服立瘥廣利方衄血不止生葛根搗汁服一小盞三服即止聖惠方熱毒下血因食熱物發者生葛根二斤搗汁一升入藕汁一升和服梅師方傷筋出血葛根搗汁飲乾者煎服仍熬屑敷之外臺祕要䐴腰疼痛生葛根嚼之咽汁取效乃止肘後方金創中風痙強欲死生葛根四大兩以水三升煮取一升去滓分溫四服口噤者灌之若干者搗末調三指撮仍以此及竹瀝多服取效貞元廣利方服藥過劑苦煩生葛汁飲之乾者煎汁服肘後方酒醉不醒生葛根汁飲二升便愈千金方諸菜中毒發狂煩悶吐下欲死葛根煮汁服肘後方解中鴆毒氣欲絶者葛粉三合水三盞調服口噤者灌之聖惠方虎傷人瘡生葛根煮濃汁洗之仍搗末水服方寸匕日夜五六服梅師方葛谷氣味甘平無毒主治下痢十歲以上本經解酒毒時珍葛花氣味同谷主治消酒別録弘景曰同小豆花乾末酒服飲酒不醉也腸風下血時珍葉主治金瘡止血挼敷之別録蔓主治卒喉痹燒研水服方寸匕蘇恭消癰腫時珍附方新三婦人吹乳葛蔓燒灰酒服二錢三服效衛生易簡方癤子初起葛蔓燒灰水調敷之即消千金方小兒口噤病在咽中如麻豆許令兒吐沫不能乳食葛蔓燒灰一字和乳汁點之即瘥聖惠方附録鐵葛拾遺藏器曰根味甘溫無毒主一切風血氣羸弱令人壯健久服治風緩偏風生山南峽中葉似枸杞根如葛黑色黃環本經下品狼跋子別録下品釋名凌泉本經大就本經就葛唐本生芻吳普根韭吳普實名狼跋子別録度谷唐本時珍曰此物葉黃而圓故名黃環如蘿藦呼白環之義亦是葛類故名就葛跋乃狼足名其莢似之故曰狼跋子集解別録曰黃環生蜀郡山谷三月採根陰乾普曰蜀黃環一名生芻二月生苗正赤高二尺葉黃圓端大經日葉有汁黃白五月實圓三月採根黃色從理如車輻解弘景曰似防己亦作車輻理解蜀都賦云青珠黃環即此或云是大戟花定非矣用甚稀市人鮮有識者又曰狼跋子出交廣形扁扁制搗以雜米投水中魚無大小皆浮出而死恭曰黃環惟襄陽大有余處雖有亦稀巴西人謂之就葛今園庭亦種之作藤生大者莖徑六七寸根亦葛類陶云似防己者近之取葛根誤食之吐利不止土漿解之此真黃環也今太常收劍南來者乃雞屎葛根非黃環也其花紫色其子名狼跋子角生似皂莢交廣送入太常者正是黃環子也花實與葛同時時珍曰吳普所説甚詳而唐宋本草不收何也範子計然云黃環出魏郡以黃色者為善黃環根也氣味苦平有毒普曰神農黃帝有毒桐君扁鵲苦權曰大寒有小毒之才曰鳶尾為之使惡茯苓防己乾薑主治蠱毒鬼疰鬼魅邪氣在臟中除咳逆寒熱本經治上氣急及百邪甄權治痰嗽消水腫利小便時珍附方新一水腫黃環根曬乾每服五錢水煎服小便利為效儒門事親狼跋子氣味苦寒有小毒主治惡瘡蝸疥殺蟲魚別録苦酒摩塗瘡疥效弘景天門冬本經上品釋名虋冬音門顛勒本經顛棘爾雅天棘綱目萬歲藤禹錫曰按爾雅云薔蘼虋冬注云門冬也一名滿冬抱朴子云一名顛棘或名地門冬或名筵門冬在東嶽名淫羊藿在中嶽名天門冬在西嶽名管松在北嶽名無不愈在南嶽名百部在京陸山阜名顛棘在越人名浣草雖處處有之其名不同其實一也別有百部草其根有百許如一而苗小異其苗似菝葜惟可治咳不中服食須分別之時珍曰草之茂者為虋俗作門此草蔓茂而功同麥門冬故曰天門冬或曰天棘爾雅云髦顛棘也因其細葉如髦有細棘也顛天音相近也按救荒本草云俗名萬歲藤又名娑蘿樹其形與治肺之功頗同百部故亦名百部也薔蘼乃營實苗而爾雅指為虋冬蓋古書錯簡也集解別録曰天門冬生奉高山谷二月三月七月八月採根曝乾弘景曰奉高泰山下縣名也今處處有之以高地大根味甘者為好桐君藥録云蔓生葉有刺五月花白十月實黑根連數十枚張華博物志云天門冬莖間有逆刺若葉滑者名絺體一名顛棘挼根入湯可以浣縑素白如絨紵類也今越人名為浣草勝於用灰此非門冬乃相似爾按此説與桐君之説相亂今人所採皆是有刺者本名顛勒亦粗相似用此浣衣則淨不復更有門冬恐門冬自一種或即是浣草耶又有百部根亦相類但苗異爾恭曰此有二種一種苗有刺而澀一種無刺而滑皆是門冬俗云顛棘浣草者形貌詺之雖作數名終是一物二根浣垢俱淨門冬浣草互名也詺音命目之也頌曰處處有之春生藤蔓大如叉股高至丈餘葉如茴香極尖細而疏滑有逆刺亦有澀而無刺者其葉如絲杉而細散皆名天門冬夏生細白花亦有黃色及紫色者秋結黑子在其根枝旁入伏後無花暗結子其根白或黃紫色大如手指圓實而長二三寸大者為勝一科一二十枚同撮頗與百部根相類洛中出者大葉粗干殊不相類嶺南者無花余無他異禹錫曰抱朴子言生高地根短味甜氣香者為上生水側下地葉細似蘊而微黃根長而味多苦氣臭者次之若以服食令人下氣為益又遲也入山便可蒸煮啖之斷谷或為散仍取汁作酒以服散尤佳時珍曰生苗時亦可以沃地栽種子亦堪種但晚成根修治弘景曰門冬採得蒸剝去皮食之甚甘美止飢雖曝乾尤脂潤難搗必須曝於日中或火烘之今人呼苗為棘刺煮作飲宜人而終非真棘刺也頌曰二三七八月採根蒸剝去皮四破去心曝乾用斆曰採得去皮心用柳木甑及柳木柴蒸一伏時灑酒令遍更添火蒸作小架去地二尺攤於上曝乾用氣味苦平無毒別録曰甘大寒好古曰氣寒味微苦而辛氣薄味厚陽中之陰入手太陰足少陰經氣分之藥之才曰垣衣地黃貝母為之使畏曾青損之曰服天門冬禁食鯉魚誤食中毒者浮萍汁解之搗汁制雄黃硇砂主治諸暴風濕偏痹強骨髓殺三蟲去伏尸久服輕身益氣延年不飢本經保定肺氣去寒熱養肌膚利小便冷而能補別録肺氣咳逆喘息促急肺痿生癰吐膿除熱通腎氣止消渴去熱中風治濕疥宜久服煮食之令人肌體滑澤白淨除身上一切惡氣不潔之疾甄權鎮心潤五臟補五勞七傷吐血治嗽消痰去風熱煩悶大明主心病嗌乾心痛渴而欲飲痿蹶嗜臥足下熱而痛好古潤燥滋陰清金降火時珍陽事不起宜常服之思邈發明權曰天門冬冷而能補患人體虛而熱者宜加用之和地黃為使服之耐老頭不白宗奭曰治肺熱之功為多其味苦專泄而不專收寒多人禁服之元素曰苦以泄滯血甘以助元氣及治血妄行此天門冬之功也保定肺氣治血熱侵肺上氣喘促宜加人參黃耆為主用之神效嘉謨曰天麥門冬併入手太陰祛煩解渴止咳消痰而麥門冬兼行手少陰清心降火使肺不犯邪故止咳立效天門冬復走足少陰滋腎助元全其母氣故消痰殊功蓋腎主津液燥則凝而為痰得潤劑則化所謂治痰之本也好古曰入手太陰足少陰經營衛枯涸宜以濕劑潤之二門冬人參五味枸杞子同為生脈之劑此上焦獨取寸口之意趙繼宗曰五藥雖為生脈之劑然生地黃貝母為天門冬之使地黃車前為麥門冬之使茯苓為人參之使若有君無使是獨行無功也故張三丰與胡濙尚書長生不老方用天門冬三斤地黃一斤乃有君而有使也禹錫曰抱朴子言入山便可以天門冬蒸煮啖之取足以斷谷若有力可餌之或作散酒服或搗汁作液膏服至百日丁壯兼倍快於朮及黃精也二百日強筋髓駐顏色與煉成松脂同蜜丸服尤善杜紫微服之御八十妾一百四十歲日行三百里慎微曰列仙傳云赤鬚子食天門冬齒落更生細發覆出太原甘始服天門冬在人間三百餘年聖化經云以天門冬茯苓等分為末日服方寸匕則不畏寒大寒時單衣汗出也時珍曰天門冬清金降火益水之上源故能下通腎氣入滋補方合群藥用之有效若脾胃虛寒人單餌既久必病腸滑反成痼疾此物性寒而潤能利大腸故也附方舊三新十五服食法孫真人枕中記云八九月採天門冬根曝乾為末每服方寸匕日三服無問山中人間久服補中益氣治虛勞絶傷年老衰損偏枯不隨風濕不仁冷痹惡瘡癰疽癩疾鼻柱敗爛者服之皮脫蟲出釀酒服去癥瘕積聚風痰顛狂三蟲伏尸除濕痹輕身益氣令人不飢百日還年耐老釀酒初熟微酸久停則香美諸酒不及也忌鯉魚臞仙神隱云用干天門冬十斤杏仁一斤搗末蜜漬每服方寸匕名仙人糧辟穀不飢天門冬二斤熟地黃一斤為末煉蜜丸彈子大每溫酒化三丸日三服居山遠行辟穀良服至十日身輕目明二十日百病愈顏色如花三十日發白更黑齒落重生五十日行及奔馬百日延年又法天門冬搗汁微火煎取五斗入白蜜一斗胡麻炒末二升合煎至可丸即止火下大豆黃末和作餅徑三寸厚半寸一服一餅一日三服百日以上有益又法天門冬末一升松脂末一升蠟蜜一升和煎丸如梧子大每日早午晚各服三十丸天門冬酒補五臟調六腑令人無病天門冬三十斤去心搗碎以水二石煮汁一石糯米一斗細曲十斤如常炊釀酒熟日飲三杯天門冬膏去積聚風痰補肺療咳嗽失血潤五臟殺三蟲伏尸除瘟疫輕身益氣令人不飢以天門冬流水泡過去皮心搗爛取汁砂鍋文武炭火煮勿令大沸以十斤為率熬至三斤卻入蜜四兩熬至滴水不散瓶盛埋土中一七去火毒每日早晚白湯調服一匙若動大便以酒服之醫方摘要肺痿咳嗽吐涎沫心中溫溫咽燥而不渴生天門冬搗汁一斗酒一斗飴一升紫菀四合銅器煎至可丸每服杏仁大一丸日三服肘後方陰虛火動有痰不堪用燥劑者天門冬一斤水浸洗去心取肉十二兩石臼搗爛五味子水洗去核取肉四兩曬乾不見火共搗丸梧子大每服二十丸茶下日三服簡便方滋陰養血溫補下元三才丸用天門冬去心生地黃二兩二味用柳甑箅以酒灑之九蒸九曬待乾稱之人參一兩為末蒸棗肉搗和丸梧子大每服三十丸食前溫酒下日三服潔古活法機要虛勞體痛天門冬末酒服方寸匕日三忌鯉魚千金方肺勞風熱止渴去熱天門冬去皮心煮食或曝乾為末蜜丸服尤佳亦可洗面孟詵食療婦人骨蒸煩熱寢汗口乾引飲氣喘天門冬十兩麥門冬八兩並去心為末以生地黃三斤取汁熬膏和丸梧子大每服五十丸以逍遙散去甘草煎湯下活法機要風顛發作則吐耳如蟬鳴引脅牽痛天門冬去心皮曝搗為末酒服方寸匕日三服久服良外臺祕要小腸偏墜天門冬三錢烏藥五錢以水煎服吳球活人心統面黑令白天門冬曝乾同蜜搗作丸日用洗面聖濟總録口瘡連年不愈者天門冬麥門冬並去心玄參等分為末煉蜜丸彈子大每噙一丸乃僧居寮所傳方也齊德之外科精義諸般癰腫新掘天門冬三五兩洗淨沙盆擂細以好酒濾汁頓服未效再服必愈此祖傳經驗方也虞摶醫學正傳百部別録中品釋名婆婦草日華野天門冬綱目時珍曰其根多者百十連屬如部伍然故以名之集解弘景曰山野處處有之其根數十相連似天門冬而苦強但苗異爾博物志云九真一種草似百部但長大爾懸火上令乾夜取四五寸切短含咽汁主暴嗽甚良名為嗽藥疑此即百部也其土肥潤是以長大也藏器曰天門冬根有十餘莖根圓短實潤味甘百部多者五六十莖根長尖內虛味苦不同苗蔓亦別今人以門冬當百部説不明也頌曰今江湖淮陝齊魯州郡皆有之春生苗作藤蔓葉大而尖長頗似竹葉面青色而光根下一撮十五六枚黃白色二三八月採曝乾用時珍曰百部亦有細葉如茴香者其莖青肥嫩時亦可煮食其根長者近尺新時亦肥實但干則虛瘦無脂潤爾生時擘開去心曝之鄭樵通志言葉如薯蕷者謬矣根修治斆曰凡採得以竹刀劈去心皮花作數十條懸簷下風乾卻用酒浸一宿漉出焙乾銼用或一窠八十三條者號曰地仙苗若修事餌之可千歲也氣味甘微溫無毒權曰甘無毒大明曰苦無毒恭曰微寒有小毒時珍曰苦微甘無毒主治咳嗽上氣火炙酒漬飲之別録治肺熱潤肺甄權治傳尸骨蒸勞治疳殺蛔蟲寸白蟯蟲及一切樹木蛀蟲燼之即死殺蝨及蠅蠓大明弘景曰作湯洗牛犬去蝨火炙酒浸空腹飲治疥癬去蟲蠶咬毒藏器發明時珍曰百部亦天門冬之類故皆治肺病殺蟲但百部氣溫而不寒寒嗽宜之天門冬性寒而不熱熱嗽宜之此為異耳附方舊五新五暴咳嗽張文仲方用百部根漬酒每溫服一升日三服葛洪方用百部生薑各搗汁等分煎服二合續十全方用百部藤根搗自然汁和蜜等分沸湯煎膏噙咽普濟方治卒咳不止用百部根懸火上炙乾每含咽汁勿令人知小兒寒嗽百部丸用百部炒麻黃去節各七錢半為末杏仁去皮尖炒仍以水略煮三五沸研泥入熟蜜和丸皂子大每服二三丸溫水下錢乙小兒方三十年嗽百部根二十斤搗取汁煎如飴服方寸匕日三服深師加蜜二斤外臺加飴一斤千金方遍身黃腫掘新鮮百條根洗搗罨臍上以糯米飯半升拌水酒半合揉軟蓋在藥上以帛包住待一二日後口內作酒氣則水從小便中出腫自消也百條根一名野天門冬一名百奶狀如蔥頭其苗葉柔細一根下有百餘個數楊氏經驗方誤吞銅錢百部根四兩酒一升漬一宿溫服一升日再服外臺祕要百蟲入耳百部炒研生油調一字於耳門上聖濟録薰衣去蝨百部秦艽為末入竹籠燒煙燻之自落亦可煮湯洗衣經驗方附録白並別録曰味苦無毒主肺咳上氣行五藏令百病不起一名玉簫一名箭桿生山陵葉如小竹根黃皮白三月四月採根曝乾時珍曰此物氣味主治俱近百部故附之何首烏宋開寶釋名交藤本傳夜合本傳地精本傳陳知白開寶馬肝石綱目桃柳藤日華九真藤綱目赤葛斗門瘡帚綱目紅內消大明曰其藥本草無名因何首烏見藤夜交便即採食有功因以採人為名爾時珍曰漢武時有馬肝石能烏人發故後人隱此名亦曰馬肝石赤者能消腫毒外科呼為瘡帚紅內消斗門方云取根若獲九數者服之乃仙故名九真藤集解頌曰何首烏本出順州南河縣今在處有之嶺外江南諸州皆有以西洛嵩山及河南柘城縣者為勝春生苗蔓延竹木牆壁間莖紫色葉葉相對如薯蕷而不光澤夏秋開黃白花如葛勒花結子有稜似蕎麥而細小才如粟大秋冬取根大者如拳各有五稜瓣似小甜瓜有赤白二種赤者雄白者雌一云春採根秋採花九蒸九曝乃可服此藥本名交藤因何首烏服而得名也唐元和七年僧文象遇茅山老人遂傳此事李翱乃著何首烏傳云何首烏者順州南河縣人祖名能嗣父名延秀能嗣本名田兒生而閹弱年五十八無妻子常慕道術隨師在山一日醉臥山野忽見有藤二株相去三尺余苗蔓相交久而方解解了又交田兒驚訝其異至旦遂掘其根歸問諸人無識者後有山老忽來示之答曰子既無嗣其藤乃異此恐是神仙之藥何不服之遂杵為末空心酒服一錢七日而思人道數月似強健因此常服又加至二錢經年舊疾皆痊發烏容少十年之內即生數男乃改名能嗣又與其子延秀服皆壽百六十歲延秀生首烏首烏服藥亦生數子年百三十歲發猶黑有李安期者與首烏鄉里親善竊得方服其壽亦長遂敘其事傳之云何首烏味甘性溫無毒茯苓為使治五痔腰膝之病冷氣心痛積年勞瘦痰癖風虛敗劣長筋力益精髓壯氣駐顏黑髮延年婦人惡血痿黃産後諸疾赤白帶下毒氣入腹久痢不止其功不可具述一名野苗二名交藤三名夜合四名地精五名何首烏本出虔州江南諸道皆有苗如木藁葉有光澤形如桃柳其背偏皆單生不相對有雌雄雄者苗色黃白雌者黃赤根遠不過三尺夜則苗蔓相交或隱化不見春末夏中秋初三時候晴明日兼雌雄採之乘潤以布帛拭去泥土勿損皮烈日曝乾密器貯之每月再曝用時去皮為末酒下最良遇有疾即用茯苓湯下為使凡服用偶日二四六八日服訖以衣覆汗出導引尤良忌豬肉血羊血無鱗魚觸藥無力其根形大如拳連珠其有形如鳥獸山嶽之狀者珍也掘得去皮生吃得味甘甜可休糧灒曰神效助道著在仙書雌雄相交夜合晝疏服之去谷日居月諸返老還少變安病軀有緣者遇最爾自如明州刺史李遠附録云何首烏以出南河縣及嶺南恩州韶州潮州賀州廣州四會縣潘州者為上雍州晉興縣桂州康州春州高州勤州循州出者次之真仙草也五十年者如拳大號山奴服之一年發髭青黑一百年者如碗大號山哥服之一年顏色紅悅一百五十年者如盆大號山伯服之一年齒落更生二百年者如斗栲栳大號山翁服之一年顏如童子行及奔馬三百年者如三斗栲栳大號山精純陽之體久服成地仙也時珍曰凡諸名山深山産者即大而佳也根修治志曰春夏秋採其根雌雄共用乘濕以布拭去土曝乾臨時以苦竹刀切米泔浸經宿曝乾木杵臼搗之忌鐵器慎微曰方用新採者去皮銅刀切薄片入甑內以瓷鍋蒸之旋以熱水從上淋下勿令滿溢直候無氣味乃取出曝乾用時珍曰近時治法用何首烏赤白各一斤竹刀刮去粗皮米泔浸一夜切片用黑豆三斗每次用三升三合三勺以水泡過砂鍋內鋪豆一層首烏一層重重鋪盡蒸之豆熟取出去豆將何首烏曬乾再以豆蒸如此九蒸九曬乃用氣味苦澀微溫無毒時珍曰茯苓為之使忌諸血無鱗魚蘿蔔蒜蔥鐵器同於地黃能伏硃砂主治瘰癧消癰腫療頭面風瘡治五痔止心痛益血氣黑髭發悅顏色久服長筋骨益精髓延年不老亦治婦人産後及帶下諸疾開寶久服令人有子治腹臟一切宿疾冷氣腸風大明瀉肝風好古發明時珍曰何首烏足厥陰少陰藥也白者入氣分赤者入血分腎主閉藏肝主疏泄此物氣溫味苦澀苦補腎溫補肝澀能收斂精氣所以能養血益肝固精益腎健筋骨烏髭發為滋補良藥不寒不燥功在地黃天門冬諸藥之上氣血太和則風虛癰腫瘰癧諸疾可知矣此藥流傳雖久服者尚寡嘉靖初邵應節真人以七寶美髯丹方上進世宗肅皇帝服餌有效連生皇嗣於是何首烏之方天下大行矣宋懷州知州李治與一武臣同官怪其年七十餘而輕健面如渥丹能飲食叩其術則服何首烏丸也乃傳其方後治得病盛暑中半體無汗已二年竊自憂之造丸服至年餘汗遂浹體其活血治風之功大有補益其方用赤白何首烏各半斤米泔浸三夜竹刀刮去皮切焙石臼為末煉蜜丸梧子大每空心溫酒下五十丸亦可末服附方舊四新十二七寶美髯丹烏鬚髮壯筋骨固精氣續嗣延年用赤白何首烏各一斤米泔水浸三四日瓷片刮去皮用淘淨黑豆二升以砂鍋木甑鋪豆及首烏重重鋪蓋蒸之豆熟取出去豆曝乾換豆再蒸如此九次曝乾為末赤白茯苓各一斤去皮研末以水淘去筋膜及浮者取沉者捻塊以人乳十碗浸勻曬乾研末牛膝八兩去苗酒浸一日同何首烏第七次蒸之至第九次止曬乾當歸八兩酒浸曬枸杞子八兩酒浸曬菟絲子八兩酒浸生芽研爛曬補骨脂四兩以黑脂麻炒香並忌鐵器石臼為末煉蜜和丸彈子大一百五十丸每日三丸侵晨溫酒下午時薑湯下臥時鹽湯下其餘並丸梧子大每日空心酒服一百丸久服極驗忌見前積善堂方服食滋補和劑局方何首烏丸專壯筋骨長精髓補血氣久服黑鬚發堅陽道令人多子輕身延年月計不足歲計有餘用何首烏三斤銅刀切片乾者以米泔水浸軟切之牛膝去苗一斤切以黑豆一斗淘淨用木甑鋪豆一層鋪藥一層重重鋪盡瓦鍋蒸至豆熟取出去豆曝乾換豆又蒸如此三次為末蒸棗肉和丸梧子大每服三五十丸空心溫酒下忌見前鄭岩山中丞方只用赤白何首烏各半斤去粗皮陰乾石臼杵末每旦無灰酒服二錢積善堂方用赤白何首烏各半極大者八月採以竹刀削去皮切片用米泔水浸一宿曬乾以壯婦男兒乳汁拌曬三度候乾木臼舂為末以密雲棗肉和杵為丸如梧子大每服二十丸每十日加十丸至百丸止空心溫酒鹽湯任下一方不用人乳筆峰雜興方用何首烏雌雄各半斤分作四分一分用當歸汁浸一分生地黃汁浸一分旱蓮汁浸一分人乳浸三日取出各曝乾瓦焙石臼為末蒸棗肉和丸梧子大每服四十丸空心百沸湯下禁忌見前骨軟風疾腰膝疼行步不得遍身瘙癢用何首烏大而有花紋者同牛膝各一斤以好酒一升浸七宿曝乾木臼杵末棗肉和丸梧子大每一服三五十丸空心酒下經驗方寬筋治損何首烏十斤生黑豆半斤同煎熟皂莢一斤燒存性牽牛十兩炒取頭末薄荷十兩木香牛膝各五兩川烏頭炮二兩為末酒糊丸梧子大每服三十丸茶湯下永類方皮里作痛不問何處用何首烏末薑汁調成膏塗之以帛裹住火炙鞋底尉之經驗方自汗不止何首烏末津調封臍中集簡方腸風臟毒下血不止何首烏二兩為末食前米飲服二錢聖惠方小兒龜背龜尿調紅內消點背上骨節久久自安破傷血出何首烏末敷之即止神效筆峰雜興方瘰癧結核或破或不破下至胸前者皆治之用九真藤一名赤葛即何首烏其葉如杏其根如雞卵亦類癧子取根洗淨日日生嚼並取葉搗塗之數服即止其藥久服延年黑髮用之神效斗門方癰疽毒瘡紅內消不限多少瓶中文武火熬煎臨熟入好無灰酒相等再煎數沸時時飲之其滓焙研為末酒煮麵糊丸梧子大空心溫酒下三十丸疾退宜常服之即赤何首烏也建昌産者良陳自明外科精要大風癘疾何首烏大而有花紋者一斤米泔浸一七九蒸九曬胡麻四兩九蒸九曬為末每酒服二錢日二聖惠方疥癬滿身不可治者何首烏艾葉等分水煎濃湯洗浴甚能解痛生肌肉王袞博濟方莖葉主治風瘡疥癬作癢煎湯洗浴甚效時珍萆薢本經中品釋名赤節別録百枝吳普竹木炮炙論白菝葜時珍曰萆薢名義未詳日華本草言時人呼為白菝葜象形也赤節百枝與狗脊同名集解別録曰萆薢生真定山谷二月八月採根曝乾弘景曰今處處有之根似菝葜而小異根大不甚有角節色小淺恭曰此有二種莖有刺者根白實無刺者根虛軟軟者為勝蔓生葉似薯蕷頌曰今河陝汴東荊蜀諸郡皆有之作蔓生苗葉俱青葉作三叉似山薯又似緑豆葉花有黃紅白數種亦有無花結白子者根黃白色多節三指許大春秋採根曝乾今成德軍所産者根亦如山薯而體硬其苗引蔓葉似蕎麥子三稜不拘時月採根利刀切片曝乾用時珍曰萆薢蔓生葉似菝葜而大如碗其根長硬大者如商陸而堅今人皆以土茯苓為萆薢誤矣莖葉根苗皆不同吳普本草又以萆薢為狗脊亦誤矣詳狗脊下宋史以懷慶萆薢充貢根氣味苦平無毒別録曰甘之才曰薏苡為之使畏葵根大黃柴胡前胡牡蠣主治腰背痛強骨節風寒濕周痹惡瘡不瘳熱氣本經傷中恚怒陰痿失溺老人五緩關節老血別録冷氣𤸷痹腰腳癱緩不遂手足驚掣男子䐴腰痛久冷腎間有膀胱宿水甄權頭旋癇疾補水臟堅筋骨益精明目中風失音大明補肝虛好古治白濁莖中痛痔瘻壞瘡時珍發明時珍曰萆薢足陽明厥陰經藥也厥陰主筋屬風陽明主肉屬濕萆薢之功長於去風濕所以能治緩弱𤸷痹遺濁惡瘡諸病之屬風濕者萆薢菝葜土茯苓三物形雖不同而主治之功不相遠豈亦一類數種乎雷斆炮炙論序云囊皺漩多夜煎竹木竹木萆薢也漩多白濁皆是濕氣下流萆薢能除陽明之濕而固下焦故能去濁分清楊倓家藏方治真元不足下焦虛寒小便頻數白濁如膏有萆薢分清飲正此意也又楊子建萬全護命方云凡人小便頻數不計度數便時莖內痛不可忍者此疾必先大腑祕熱不通水液只就小腸大腑愈加干竭甚則渾身熱心躁思涼水如此即重證也此疾本因貪酒色積有熱毒腐物瘀血之類隨虛水入於小腸故便時作痛也不飲酒者必平生過食辛熱葷膩之物又因色傷而然此乃小便頻數而痛與淋證澀而痛者不同也宜用萆薢一兩水浸少時以鹽半兩同炒去鹽為末每服二錢水一盞煎八分和滓服之使水道轉入大腸仍以蔥湯頻洗穀道令氣得通則小便數及痛自減也附方舊二新三腰腳痹軟行履不穩者萆薢二十四分杜仲八分搗篩每旦溫酒服三錢匕禁牛肉唐德宗貞元廣利方小便頻數川萆薢一斤為末酒糊丸梧子大每鹽酒下七十丸集玄方白濁頻數漩面如油澄下如膏乃真元不足下焦虛寒萆薢分清飲用萆薢石菖蒲益智仁烏藥等分每服四錢水一盞入鹽一捻煎七分食前溫服日一服效乃止腸風痔漏如聖散用萆薢貫衆去土等分為末每服三錢溫酒空心服之孫尚藥傳家祕寶方頭痛發汗萆薢旋覆花虎頭骨酥炙等分為散欲發時以溫酒服二錢暖臥取汗立瘥聖濟録菝葜上蒲八切下棄八切別録中品釋名菝葜同葜金剛根日華鐵菱角綱目王瓜草日華時珍曰菝葜猶𥎱䂒也𥎱䂒短也此草莖蔓強堅短小故名菝葜而江浙人謂之菝葜根亦曰金剛根楚人謂之鐵菱角皆狀其堅而有尖刺也鄭樵通志云其葉頗近王瓜故名王瓜草集解別録曰生山野二月八月採根曝乾弘景曰此有三種大略根苗並相類菝葜莖紫而短小多細刺小減萆薢而色深人用作飲恭曰陶云三種乃狗脊菝葜萆薢相類非也萆薢有刺者葉粗相類根不相類萆薢細長而白色菝葜根作塊結黃赤色殊非狗脊之流頌曰今近道及江浙州郡多有之苗莖成蔓長二三尺有刺其葉如冬青烏藥葉而差大秋生黃花結黑子如櫻桃大其根作塊人呼金剛根時珍曰菝葜山野中甚多其莖似蔓而堅強植生有刺其葉團大狀如馬蹄光澤似柿葉不類冬青秋開黃花結紅子其根甚硬有硬須如刺其葉煎飲酸澀野人採其根葉入染家用名鐵菱角吳普本草以菝葜為狗脊非矣詳見狗脊下根氣味甘酸平溫無毒主治腰背寒痛風痹益血氣止小便利別録治時疾瘟瘴大明補肝經風虛好古治消渴血崩下痢時珍發明時珍曰菝葜足厥陰少陰藥氣溫味酸性澀而收與萆薢倣佛孫真人元旦所飲辟邪屠蘇酒中亦用之頌曰取根浸赤汁煮粉食闢瘴附方新五小便滑數金剛骨為末每服三錢溫酒下睡時儒門事親方沙石淋疾重者取去根本用菝葜二兩為末每米飲服二錢後以地椒煎湯浴腰腹須臾即通也聖濟録消渴不止菝谷即菝葜㕮咀半兩水三盞烏梅一個煎一盞溫服普濟方下痢赤白金剛根蠟茶等分為末白梅肉搗丸芡子大每服五七丸小兒三丸白痢甘草湯下赤痢烏梅湯下衛生易簡方風毒腳弱痹滿上氣田舍貧家用此最良菝葜洗銼一斛以水三斛煮取九斗漬曲去滓取一斛漬飲如常釀酒任意日飲之肘後方土茯苓綱目校正併入拾遺草禹餘糧釋名土萆薢綱目刺豬苓圖經山豬糞綱目草禹餘糧拾遺仙遺糧綱目冷飯糰綱目硬飯綱目山地栗綱目時珍曰按陶弘景注石部禹餘糧云南中平澤有一種藤葉如菝葜根作塊有節似菝葜而色赤味如薯蕷亦名禹餘糧言昔禹行山乏食採此充糧而棄其餘故有此名觀陶氏此説即今土茯苓也故今尚有仙遺糧冷飯糰之名亦其遺意陳藏器本草草禹餘糧蘇頌圖經豬苓下刺豬苓皆此物也今皆並之茯苓豬苓山地栗皆象形也俗又名過岡龍謬稱也集解藏器曰草禹餘糧生海畔山谷根如盞連綴半在土上皮如茯苓肉赤味澀人取以當穀食不飢頌曰施州一種刺豬苓蔓生春夏採根削皮焙乾彼土人用敷瘡毒殊效時珍曰土茯苓楚蜀山箐中甚多蔓生如蓴莖有細點其葉不對狀頗類大竹葉而質厚滑如瑞香葉而長五六寸其根狀如菝葜而圓其大若雞鴨子連綴而生遠者離尺許近或數寸其肉軟可生啖有赤白二種入藥用白者良按中山經云鼓鐙之山有草焉名曰榮草其葉如柳其本如雞卵食之已風恐即此也昔人不知用此近時弘治正德間因楊梅瘡盛行率用輕粉藥取效毒留筋骨潰爛終身至人用此遂為要藥諸醫無從考證往往指為萆薢及菝葜然其根苗迥然不同宜參考之但其功用亦頗相近蓋亦萆薢菝葜之類也根氣味甘淡平無毒時珍曰忌茶茗主治食之當谷不飢調中止泄健行不睡藏器健脾胃強筋骨去風濕利關節止泄瀉治拘攣骨痛惡瘡癰腫解汞粉銀硃毒時珍發明機曰近有好淫之人多病楊梅毒瘡藥用輕粉愈而復發久則肢體拘攣變為癰漏延綿歲月竟致廢篤惟銼土萆薢三兩或加皂莢牽牛各一錢水六碗煎三碗分三服不數劑多瘥蓋此疾始由毒氣干於陽明而發加以輕粉燥烈久而水衰肝挾相火來凌脾土土屬濕主肌肉濕熱鬱蓄於肌腠故發為癰腫甚則拘攣內經所謂濕氣害人皮肉筋骨是也土萆薢甘淡而平能去脾濕濕去則營衛從而筋脈柔肌肉實而拘攣癰漏愈矣初病服之不效者火盛而濕未郁也此藥長於去濕不能去熱病久則熱衰氣耗而濕鬱為多故也時珍曰楊梅瘡古方不載亦無病者近時起於嶺表傳及四方蓋嶺表風土卑炎嵐瘴熏蒸飲啖辛熱男女淫猥濕熱之邪積蓄既深發為毒瘡遂致互相傳染自南而北遍及海宇然皆淫邪之人病之其類有數種治之則一也其證多屬厥陰陽明二經而兼乎他經邪之所在則先發出如兼少陰太陰則發於咽喉兼太陽少陽則發於頭耳之類蓋相火寄於厥陰肌肉屬於陽明故也醫用輕粉銀硃劫劑五七日即愈蓋水銀性走而不守加以鹽礬升為輕粉銀硃其性燥烈善逐痰涎涎乃脾之液此物入胃氣歸陽明故涎被劫隨火上升從喉頰齒縫而出故瘡即干痿而愈若服之過劑及用不得法則毒氣竄入經絡筋骨之間莫之能出痰涎既去血液耗涸筋失所養營衛不從變為筋骨攣痛發為癰毒疳漏久則生蟲為癬手足皴裂遂成廢痼惟土茯苓氣平味甘而淡為陽明本藥能健脾胃去風濕脾胃健則營衛從風濕去則筋骨利故諸證多愈此亦得古人未言之妙也今醫家有搜風解毒湯治楊梅瘡不犯輕粉病深者月餘淺者半月即愈服輕粉藥筋骨攣痛癱瘓不能動履者服之亦效其方用土茯苓一兩薏苡仁金銀花防風木瓜木通白蘚皮各五分皂莢子四分氣虛加人參七分血虛加當歸七分水二大碗煎飲一日三服惟忌飲茶及牛羊雞鵝魚肉燒酒法面房勞蓋祕方也附方新六楊梅毒瘡鄧筆峰雜興方用冷飯糰四兩皂角子七個水煎代茶飲淺者二七深者四七見效一方冷飯糰一兩五加皮皂角子苦參各三錢金銀花一錢用好酒煎日一服小兒楊梅瘡起於口內延及遍身以土萆薢末乳汁調服月餘自愈外科發揮骨攣癰漏薛己外科發揮云服輕粉致傷脾胃氣血筋骨疼痛久而潰爛成癰連年纍月至於終身成廢疾者土萆薢一兩有熱加芩連氣虛加四君子湯血虛加四物湯水煎代茶月餘即安朱氏集驗方用過山龍四兩即硬飯加四物湯一兩皂角子七個川椒四十九粒燈心七根水煎日飲瘰癧潰爛冷飯糰切片或為末水煎服或入粥內食之須多食為妙江西所出色白者良忌鐵器發物陸氏積德堂方白蘞本經下品釋名白草本經白根別録兔核本經貓兒卵綱目崑崙別録宗奭曰白蘞服餌方少用惟斂瘡方多用之故名白蘞時珍曰兔核貓兒卵皆象形也崑崙言其皮黑也集解別録曰白蘞生衡山山谷二月八月採根曝乾弘景曰近道處處有之作藤生根如白芷破片竹穿日乾恭曰根似天門冬一株下有十許根皮赤黑肉白如芍藥不似白芷保升曰蔓生枝端有五葉所在有之頌曰今江淮及荊襄懷孟商齊諸州皆有之二月生苗多在林中作蔓赤莖葉如小桑五月開花七月結實根如雞鴨卵而長三五枚同一窠皮黑肉白一種赤蘞花實功用皆同但表裡俱赤爾根氣味苦平無毒別録曰甘微寒權曰有毒之才曰代赭為之使反烏頭主治癰腫疽瘡散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛帶下赤白本經殺火毒別録治發背瘰癧面上疱瘡腸風痔漏血痢刀箭瘡撲損生肌止痛大明解狼毒毒時珍發明弘景曰生取根搗敷癰腫有效頌曰今醫治風及金瘡面藥方多用之往往與白芨相須而用附方舊四新十發背初起水調白蘞末塗之肘後方疔瘡初起方同上聖惠方一切癰腫權曰白蘞赤小豆菵草為末雞子白調塗之陶隱居方用白蘞二分藜蘆一分為末酒和貼之日三上面鼻酒渣白蘞白石脂杏仁各半兩為末雞子清調塗旦洗御藥院方面生粉刺白蘞二分杏仁半分雞屎白一分為末蜜和雜水拭面肘後方凍耳成瘡白蘞黃柏等分為末生油調搽談野翁方湯火灼傷白蘞末敷之外臺方諸物哽咽白蘞白芷等分為末水服二錢聖惠方鐵刺諸哽及竹木哽在咽中白蘞半夏泡等分為末酒服半錢日二服聖惠方刺在肉中方同上胎孕不下白蘞生半夏等分為末滴水丸梧子大每榆皮湯下五十丸保命集風痹筋急腫痛展轉易常處白蘞二分熟附子一分為末每酒服半刀圭日二服以身中熱行為候十日便覺忌豬肉冷水千金方諸瘡不斂白蘞赤蘞黃柏各三錢炒研輕粉一錢為細末先用蔥白漿水洗淨敷之瑞竹堂方女萎李當之本草集解恭曰女萎葉似白蘞蔓生花白子細荊襄之間名為女萎亦名蔓楚用苗不用根與葳蕤全別今太常謬以為白頭翁者是也時珍曰諸家誤以女萎解葳蕤正誤見葳蕤下修治斆曰凡採得陰乾去頭並白蕊於槐砧上銼拌豆淋酒蒸之從巳至未出曬乾氣味辛溫無毒主治止下痢消食當之風寒灑灑霍亂泄痢腸鳴遊氣上下無常驚癇寒熱百病出汗唐本附方新三久痢脫肛女萎切一升燒熏之楊氏産乳方𧈟下不止女萎雲實各一兩川烏頭二兩桂心五錢為末蜜丸梧子大每服五丸水下一日三服肘後方身體癧瘍斑駁女葳膏用魯國女葳白芷各一分附子一枚雞舌香木香各二分為末臘豬脂七合和煎入麝香一錢以浮石磨破日擦之古今録驗赭魁別録下品釋名時珍曰其根如魁有汁如赭故名魁乃酒器名集解別録曰生山谷中二月採弘景曰狀如小芋肉白皮黃近道亦有恭曰赭魁大者如斗小者如升蔓生草木上葉似杜衡陶所説乃土卵也土卵不堪藥用梁漢人蒸食之名黃獨非赭魁也保升曰苗蔓延生葉似蘿藦根若菝葜皮紫黑肉黃赤大者輪囷如升小者如拳所在有之時珍曰赭魁閩人用入染青缸中云易上色沈括筆談云本草所謂赭魁皆未詳審今南中極多膚黑肌赤似何首烏切破中有赤理如檳榔有汁赤如赭彼人以染皮製靴閩人謂之餘糧本草石部禹餘糧陶氏所引乃此物也謹按沈氏所説赭魁甚明但謂是禹餘糧者非矣禹餘糧乃今之土茯苓可食故得糧名赭魁不可食豈得稱糧耶土卵即土芋也見菜部根氣味甘平無毒恭曰有小毒主治心腹積聚除三蟲本經鵝抱宋圖經集解頌曰生宜州山林中附石而生作蔓葉似大豆其根形似萊蔔大者如三升器小者如拳二月八月採根切片陰乾用氣味苦寒無毒主治風熱上壅咽喉腫痛及解蠻箭藥毒搗末酒服有效亦消風熱結毒赤腫酒摩塗之立愈蘇頌伏雞子根拾遺釋名承露仙集解藏器曰生四明天台山蔓延生葉圓薄似錢根似鳥形者良氣味苦寒無毒主治解百藥毒諸熱煩悶急黃天行黃疸瘧瘴中惡寒熱頭痛疽瘡馬黃牛疫水磨服之新者尤佳亦敷癰腫與陳家白藥同功藏器附録仰盆拾遺藏器曰味辛溫有小毒水磨服少許治蠱飛尸喉痹亦磨敷皮膚惡腫生東陽山谷苗似承露仙根圓如仰盆狀大如雞卵人肝藤拾遺藏器曰主解諸藥毒遊風手腳軟痹並生研服之塗之生嶺南山石間引蔓而生葉有三丫花紫色與伏雞子同名承露仙而伏雞子葉圓時珍曰以根三兩磨汁或煎濃汁服並解蠱毒千金藤宋開寶校正自木部移入此集解藏器曰千金藤有數種南北名模不同大略主療相似或是皆近於藤也生北地者根大如指色似漆生南土者黃赤如細辛舒廬間有一種藤似木蓼又有烏虎藤繞樹生冬青亦名千金藤江西林間有草生葉頭有癭子似鶴膝葉如柳亦名千金藤又一種似荷葉只大如錢許亦呼為千金藤又名古藤主痢及小兒大腹千金者以貴為名豈俱一物亦狀異而名同耶若取的稱未知孰是又嶺南有陳思岌亦名千金藤氣味缺主治一切血毒諸氣霍亂中惡天行虛勞瘧瘴痰嗽不利癰腫大毒藥石發癲癇悉主之藏器附録陳思岌拾遺藏器曰出嶺南山野蔓生如小豆根及葉辛香一名石黃香一名千金藤其根味辛平無毒解諸藥毒熱毒丹毒癰腫天行壯熱喉痹蠱毒並煮汁服之亦磨塗瘡腫珣曰味苦平浸酒服治風補益輕身九仙子綱目釋名仙女嬌集解時珍曰九仙子出均州太和山一根連綴九枚大者如雞子小者如半夏白色二月生苗蔓高六七尺莖細而光葉如烏桕葉而短扁不團每葉丫生子枝或一或二嫋嫋下垂六七月開碎青黃色花隨即結實碎子叢簇如穀精草子狀九月採根氣味苦涼無毒主治咽痛喉痹散血以新汲水或醋磨汁含咽甚良時珍山豆根宋開寶釋名解毒綱目黃結綱目中藥頌曰其蔓如大豆因以為名集解頌曰山豆根生劍南及宜州果州山谷今廣西亦有以忠州萬州者為佳苗蔓如豆葉青經冬不凋八月採根廣南者如小槐高尺余石鼠食其根故嶺南人捕鼠取腸胃曝乾解毒攻熱效氣味甘寒無毒時珍曰按沈括筆談云山豆根味極苦本草言味甘大誤矣主治解諸藥毒止痛消瘡腫毒發熱咳嗽治人及馬急黃殺小蟲開寶含之咽汁解咽喉腫毒極妙蘇頌研末湯服五分治腹脹喘滿酒服三錢治女人血氣腹脹又下寸白諸蟲丸服止下痢磨汁服止卒患熱厥心腹痛五種痔痛研汁塗諸熱腫禿瘡蛇狗蜘蛛傷時珍附方舊十新三解中蠱毒密取山豆根和水研服少許未定再服已禁聲者亦愈五般急黃山豆根末水服二錢若帶蠱氣以酒下霍亂吐利山豆根末橘皮湯下三錢赤白下痢山豆根末蜜丸梧子大每服二十丸空腹白湯下三服自止以上並備急方水蠱腹大有聲而皮色黑者山豆根末酒服二錢聖惠方卒患腹痛山豆根水研半盞服入口即定頭風熱痛山豆根末油調塗兩太陽頭上白屑山豆根末浸油日塗之牙齦腫痛山豆根一片含於痛所以上並備急方喉中發癰山豆根磨醋噙之追涎即愈勢重不能言者頻以雞翎掃入喉中引涎出就能言語永類方麩豆諸瘡煩熱甚者水研山豆根汁服少許經驗方疥癬蟲瘡山豆根末臘豬脂調塗備急方喉風急證牙關緊閉水穀不下山豆根白藥等分水煎噙之咽下二三口即愈楊清叟外科黃藥子宋開寶校正自木部移入此釋名木藥子綱目大苦綱目赤藥圖經紅藥子時珍曰按沈括筆談云本草甘草注引郭璞注爾雅云蘦大苦者云即甘草也蔓生葉似薄荷而色青黃莖赤有節節有枝相當此乃黃藥也其味極苦故曰大苦非甘草也集解頌曰黃藥原出嶺南今夔峽州郡及明越秦隴山中亦有之以忠州萬州者為勝藤生高三四尺根及莖似小桑十月採根秦州出者謂之紅藥子施州謂之赤藥葉似蕎麥枝梗赤色七月開白花其根濕時紅赤色曝乾即黃本經有藥實根云生蜀郡山谷蘇恭云即藥子也用其核仁疑即黃藥之實但言葉似杏其花紅白色子肉味酸此為不同時珍曰黃藥子今處處人栽之其莖高二三尺柔而有節似藤實非藤也葉大如拳長三寸許亦不似桑其根長者尺許大者圍二三寸外褐內黃亦有黃赤色者肉色頗似羊蹄根人皆搗其根入染藍缸中云易變色也唐蘇恭言藥實根即藥子宋蘇頌遂以為黃藥之實然今黃藥冬枯春生開碎花無實蘇恭所謂藥子亦不專指黃藥則蘇頌所以言亦未可憑信也根氣味苦平無毒大明曰涼治馬心肺熱疾主治諸惡腫瘡瘻喉痹蛇犬咬毒研水服之亦含亦塗開寶涼血降火消癭解毒時珍發明頌曰孫思邈千金月令方療忽生癭疾一二年者以萬州黃藥子半斤須緊重者為上如輕虛即是他州者力慢須用加倍取無灰酒一斗投藥入中固濟瓶口以粳火燒一復時待酒冷乃開時時飲一杯不令絶酒氣經三五日後常把鏡自照覺消即停飲不爾便令人項細也劉禹錫傳信方亦著其效云得之雍州從事張岧岧目擊有效復試其驗如神其方並同惟小有異處是燒酒候香出外瓶頭有津出即止不待一宿火不可過猛耳附方舊二新五項下癭氣黃藥子一斤洗銼酒一斗浸之每日早晚常服一盞忌一切毒物及戒怒仍以線逐日度之乃知其效也斗門方吐血不止藥子一兩水煎服聖惠方咯血吐血百一選方用蒲黃黃藥子等分為末掌中舐之王袞博濟方用黃藥子漢防己各一兩為末每服一錢小麥湯食後調服一日二服鼻衄不止黃藥子為末每服二錢煎淡膠湯下良久以新水調面一匙頭服之兵部手集方只以新汲水磨汁一碗頓服簡要濟衆方産後血暈惡物衝心四肢冰冷唇青腹脹昏迷紅藥子一兩頭紅花一錢水二盞婦人油叉二隻同煎一盞服大小便俱利血自下也禹講師經驗方天泡水瘡黃藥子末搽之集簡方解毒子唐本草釋名地不容唐本苦藥子圖經集解恭曰地不容生川西山谷採無時鄉人呼為解毒子也頌曰出戎州蔓生葉青如杏葉而大厚硬凌冬不凋無花實根黃白色外皮微粗褐纍纍相連如藥實而圓大採無時又開州興元府出苦藥子大抵與黃藥相類春採根曝乾亦入馬藥用時珍曰四川志云苦藥子出忠州性寒解一切毒川蜀諸處皆有即解毒子也或云卭州苦藥子即黃藥子方言稱呼不同耳理亦近之根氣味苦大寒無毒主治解蠱毒止煩熱闢瘴癘利喉閉及痰毒唐本治五臟邪氣清肺壓熱蘇頌消痰降火利咽喉退目赤時珍附方新二咽喉腫痛水漿不下苦藥山豆根甘草硝石各一分射干柑皮升麻各半兩為末蜜丸噙之聖惠方眉稜骨痛熱毒攻眼頭痛眉痛壯熱不止解毒子木香川大黃各三分為末漿水調膏攤貼干即易之普濟方附録奴會子海藥珣曰味辛平無毒主小兒無辜冷疳虛渴脫肛骨立瘦損脾胃不磨劉五娘方用為煎服生西國諸戎大小如苦藥子藥實根本經曰味辛溫無毒主邪氣諸痹疼酸續絶傷補骨髓一名連木別録曰生蜀郡山谷採無時恭曰此藥子也當今盛用胡名那疏出通州渝州其子味辛平無毒主破血止痢消腫除蠱疰蛇毒樹生葉似杏花紅白色子肉味酸止用其仁本經誤載根字時珍曰此藥子雖似黃藥苦藥子而稍有不同二藥子不結子此則樹之子也葛洪肘後方云婆羅門名那疏樹子中國人名藥子去皮取中仁細研服治諸病也白藥子唐本草集解恭曰白藥子出原州三月生苗葉似苦苣四月抽赤莖長似壺盧蔓六月開白花八月結子亦名栝蔞九月葉落枝折採根洗切日乾根皮黃色名白藥子頌曰今夔施合州江西嶺南亦有之江西出者葉似烏桕子如緑豆至八月變成赤色治馬熱方用之根氣味辛溫無毒權曰苦冷主治金瘡生肌唐本消腫毒喉痹消痰止嗽治渴並吐血大明治喉中熱塞不通咽中常痛腫甄權解野葛生金巴豆藥毒刀斧折傷乾末敷之能止血痛馬志散血降火消痰解毒時珍附方舊三新九天行熱病白藥為末漿水一盞冷調二錢服仰臥少頃心悶或腹鳴㽱痛當吐利數行如不止吃冷粥一碗止之崔元亮海上方心痛解熱白藥根野豬尾二味洗去粗皮焙乾等分搗篩酒服一錢甚效黔人用之蘇頌圖經風熱上壅咽喉不利白藥三兩黑牽牛半兩同炒香去牽牛一半為末防風末三兩和勻每茶服一錢聖惠方喉中熱塞腫痛散血消痰白藥朴硝等分為末吹之日四五次直指方咽喉腫痛白藥末一兩龍腦一分蜜和丸芡子大每含咽一丸聖惠方吐血不止白藥燒存性糯米飲服三錢聖惠方衄血不止紅棗白藥各燒存性等分為末糯米飲服或煎湯洗鼻頻頻縮藥令入經驗良方胎熱不安鐵罩散用白藥子一兩白芷半兩為末每服二錢紫蘇湯下心煩熱入砂糖少許聖惠方一切疳眼赤爛生翳白藥子一兩甘草半兩為末豬肝一具批開摻末五錢煮熟食之直指方小兒疳瀉吐利方同上諸骨哽咽白藥煎米醋細咽在上即吐出在下即下出普濟方癰腫不散生白藥根搗貼干則易之無生者研末水和貼圖經附録陳家白藥拾遺藏器曰味苦寒無毒主解諸藥毒水研服之入腹與毒相攻必吐出未盡更服亦去心胸煩熱天行瘟瘴出蒼梧陳家故有陳家之號明山有之蔓及根並似土瓜葉如錢根似防己緊小者良人亦採食之與婆羅門白藥及赤藥功用並相似時珍曰按劉恂嶺表録異云陳家白藥善解毒諸藥皆不及之救人甚多封州康州有種之者廣府每歲充土貢按此藥當時充貢今無復有或有之古今名謂不同耳甘家白藥拾遺藏器曰味苦大寒有小毒解諸藥毒水研服即吐出未盡再吐與陳家白藥功相似二物性冷與霍亂下利人相反出龔州以南生陰處葉似車前根如半夏其汁飲之如蜜甘家亦因人而名嶺南多毒物亦多解毒物豈天資之乎會州白藥拾遺藏器曰主金瘡生膚止血碎末敷之出會州葉如白蘞沖洞根拾遺藏器曰味苦平無毒主熱毒蛇犬蟲癰瘡等毒出嶺南恩州取根陰乾功用同陳家白藥而苗蔓不相似珣曰苗蔓如土瓜根亦相似味辛溫主一切毒氣及蛇傷取根磨水服之諸毒悉皆吐出也突厥白宋開寶藏器曰味苦主金瘡生肉止血補腰續筋出突厥色白如灰乃雲石灰共諸藥合成者志曰今所用者出潞州其根黃白色狀似茯苓而虛軟苗高三四尺春夏葉如薄荷花似牽牛而紫上有白稜二月八月採根曝乾威靈仙宋開寶釋名時珍曰威言其性猛也靈仙言其功神也集解志曰出商州上洛山及華山並平澤以不聞水聲者良生先於衆草方莖數葉相對冬月丙丁戊己日採根用保升曰九月末至十二月採根陰乾余月並不堪採頌曰今陝西及河東河北汴東江湖州郡皆有之初生作蔓莖如叉股四稜葉似柳葉作層每層六七葉如車輪有六層至七層者七月內生花六出淺紫或碧白色作穗似莆臺子亦有似菊花頭者實青色根稠密多須似谷每年朽敗九月採根時珍曰其根每年旁引年深轉茂一根叢須數百條長者二尺許初時黃黑色干則深黑俗稱鐵腳威靈仙以此別有數種根鬚一樣但色或黃或白皆不可用根氣味苦溫無毒元素曰味甘純陽入太陽經杲曰可升可降陰中陽也時珍曰味微辛咸不苦忌茗麵湯主治諸風宣通五臟去腹內冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷疼療折傷久服無有溫疫瘧開寶推新舊積滯消胸中痰唾散皮膚大腸風邪李杲發明頌曰唐貞元中嵩陽子周君巢作威靈仙傳云威靈仙去衆風通十二經脈朝服暮效疏宣五臟冷膿宿水變病微利不瀉人服此四肢輕健手足微暖並得清涼先時商州有人病手足不遂不履地者數十年良醫殫技莫能療所親置之道旁以求救者遇一新羅僧見之告曰此疾一藥可活但不知此土有否因為之入山求索果得乃威靈仙也使服之數日能步履其後山人鄧思齊知之遂傳其事此藥治丈夫婦人中風不語手足不遂口眼喎斜言語蹇滯筋骨節風繞臍風胎風頭風暗風心風風狂大風皮膚風癢白癜風熱毒風瘡頭旋目眩手足頑痹腰膝疼痛久立不得曾經損墜䐴腰痛腎臟風壅傷寒瘴氣憎寒壯熱頭痛流涕黃疸黑疸頭面浮腫腹內宿滯心頭痰水膀胱宿膿口中涎水冷熱氣壅肚腹脹滿好吃茶滓心痛注氣膈氣冷氣攻衝脾肺諸氣痰熱咳嗽氣急坐臥不安氣衝眼赤攻耳成膿陰汗盜汗大小腸祕服此立通氣痢痔疾瘰癧疥癬婦人月水不來動經多日氣血衝心産後祕澀孩子無辜並皆治之其法採得根陰乾月餘搗末溫酒調一錢匕空腹服之如人本性殺藥可加及六錢利過兩行則減之病除乃停服其性甚善不觸諸藥但惡茶及麵湯以甘草梔子代飲可也又以一味洗焙為末以好酒和令微濕入在竹筒內緊塞九蒸九曝如干添酒灑之以白蜜和丸梧子大每服二十至三十丸溫酒下崔元亮海上集驗方著其詳如此恭曰腰腎腳膝積聚腸內諸冷病積年不瘥者服之無不立效宗奭曰其性快多服疏人五臟真氣震亨曰威靈仙屬木治痛風之要藥也在上下者皆宜服之尤效其性好走亦可橫行故崔元亮言其去衆風通十二經脈朝服暮效凡採得聞流水聲者知其性好走也須不聞水聲者乃佳時珍曰威靈仙氣溫味微辛咸辛泄氣咸泄水故風濕痰飲之病氣壯者服之有捷效其性大抵疏利久服恐損真氣氣弱者亦不可服之附方舊四新一十五腳氣入腹脹悶喘急用威靈仙末每服二錢酒下痛減一分則藥亦減一分簡便方腰腳諸痛千金方用威靈仙末空心溫酒服一錢逐日以微利為度經驗方用威靈仙一斤洗干好酒浸七日為末麵糊丸梧子大以浸藥酒每服二十丸腎臟風壅腰膝沉重威靈仙末蜜丸梧子大溫酒服八十丸平明微利惡物如青膿膠即是風毒積滯如未利夜再服一百丸取下後食粥補之一月仍常服溫補藥孫兆方名放杖丸集驗筋骨毒痛因患楊梅瘡服輕粉毒藥年久不愈者威靈仙三斤水酒十瓶封煮一炷香出火毒逐日飲之以愈為度集簡方破傷風病威靈仙半兩獨頭蒜一個香油一錢同搗爛熱酒沖服汗出即愈衛生易簡方手足麻痹時發疼痛或打撲傷損痛不可忍或癱瘓等證威靈仙炒五兩生川烏頭五靈脂各四兩為末醋糊丸梧子大每服七丸用鹽湯下忌茶普濟方男婦氣痛不拘久近威靈仙五兩生韭根二錢半烏藥五分好酒一盞雞子一個灰火煨一宿五更視雞子殼軟為度去渣溫服以乾物壓之側睡向塊邊渣再煎次日服覺塊刺痛是其驗也摘玄方噎塞膈氣威靈仙一把醋蜜各半碗煎五分服之吐出宿痰愈唐瑤經驗方停痰宿飲喘咳嘔逆全不入食威靈仙焙半夏薑汁浸焙為末用皂角水熬膏丸緑豆大每服七丸至十丸薑湯下一日三服一月為驗忌茶面腹中痞積威靈仙楮桃兒各一兩為末每溫酒服三錢名化鐵丸普濟大腸冷積威靈仙末蜜丸梧子大一更時生薑湯下十丸至二十丸經驗良方腸風瀉血久者威靈仙雞冠花各二兩米醋二升煮乾炒為末以雞子白和作小餅炙乾再研每服二錢陳米飲下日二服聖濟痔瘡腫痛威靈仙三兩水一斗煎湯先熏後洗冷再溫之外科精義諸骨哽咽威靈仙一兩二錢砂仁一兩沙糖一盞水二鍾煎一鍾溫服乾坤生意用威靈仙米醋浸二日曬研末醋糊丸梧子大每服二三丸半茶半湯下如欲吐以銅青末半匙入油一二點茶服探吐聖濟録治雞鵝骨哽赤莖威靈仙五錢井華水煎服即軟如綿吞下也甚效飛絲纏陰腫痛欲斷以威靈仙搗汁浸洗一人病此得效李樓怪證方痘瘡黑陷鐵腳威靈仙炒研一錢腦子一分溫水調服取下瘡痂為效意同百祥丸儒門事親茜草本經上品校正併入有名未用別録苗根釋名蒨音茜茅搜音搜茹藘音如閭地血別録染緋草蜀本血見愁土宿風車草土宿過山龍補遺牛蔓時珍曰按陸佃云許氏説文言搜乃人血所化則草鬼為搜以此也陶隱居本草言東方有而少不如西方多則西草為茜又以此也陸璣云齊人謂之茜徐人謂之牛蔓又草之盛者為蒨牽引為茹連覆為藘則蒨茹藘之名又取此義也人血所化之説恐亦俗傳耳土宿真君本草云四補草其根茜草也一名西天王草一名四嶽近陽草一名鐵塔草風車兒草藏器曰有名未用苗根即茜根也茜苗二字相似傳寫之誤爾宜並之集解別録曰茜根生喬山川穀二月三月採根曝乾又曰苗根生山陰谷中蔓草木上莖有刺實如椒弘景曰此即今染絳茜草也東間諸處乃有而少不如西多詩云茹藘在阪者是也保升曰染緋草葉似棗葉頭尖下闊莖葉俱澀四五葉對生節間蔓延草木上根紫赤色所在皆有八月採頌曰今圃人亦作畦種蒔故史記云千畝梔茜其人與千戶侯等言其利厚也時珍曰茜草十二月生苗蔓延數尺方莖中空有筋外有細刺數寸一節每節五葉葉如烏藥葉而糙澀面青背緑七八月開花結實如小椒大中有細子根修治斆曰凡使用銅刀於槐砧上銼日乾勿犯鉛鐵器勿用赤柳草根真相似只是味酸澀誤服令人患內障眼速服甘草水解之即毒氣散氣味苦寒無毒權曰甘大明曰酸入藥炒用震亨曰熱元素曰微酸咸溫陰中之陰別録曰苗根咸平無毒之才曰畏鼠姑汁制雄黃主治寒濕風痹黃疸補中本經止血內崩下血膀胱不足踒跌蠱毒久服益精氣輕身可以染絳又苗根主痹及熱中傷跌折別録治六極傷心肺吐血瀉血甄權止鼻洪尿血産後血暈月經不止帶下撲損淤血泄精痔瘻瘡癤排膿酒煎服大明通經脈治骨節風痛活血行血時珍發明藏器曰茜草主蠱毒煮汁服周禮庶氏掌除蠱毒以嘉草攻之嘉草者蘘荷與茜也主蠱為最震亨曰俗人治痛風用草藥取速效如石絲為君過山龍等佐之皆性熱而燥不能養陰卻能燥濕病之淺者濕痰得燥而開瘀血得熱而行故亦暫效若病深而血少者則愈劫愈虛而病愈深矣時珍曰茜根赤色而氣溫味微酸而帶咸色赤入營氣溫行滯味酸入肝而咸走血手足厥陰血分之藥也專於行血活血俗方用治女子經水不通以一兩煎酒服之一日即通甚效名醫別録言其久服益精氣輕身日華子言其泄精殊不相合恐未可憑附方舊三新八吐血不定茜根一兩搗末每服二錢水煎冷服亦可水和二錢服周應簡要濟衆方吐血燥渴及解毒用茜根雄黑豆去皮甘草炙等分為末井水丸彈子大每溫水化服一丸聖濟録鼻血不止茜根艾葉各一兩烏梅肉二錢半為末煉蜜丸梧子大每烏梅湯下五十丸本事方五旬行經婦人五十後經水不止者作敗血論用茜根一名過山薑一兩阿膠側柏葉炙黃芩各五錢生地黃一兩小兒胎髮一枚燒灰分作六帖每帖水一盞半煎七分入發灰服之唐瑤經驗方女子經閉方見前發明心疸心煩內熱茜根煮汁服傷寒類要解中蠱毒吐下血如爛肝茜草根蘘荷葉各三兩水四升煮二升服即愈自當呼蠱主姓名也陳延之小品方黑髭烏髮茜草一斤生地黃三斤取汁以水五大碗煎茜絞汁將滓再煎三度以汁同地黃汁微火煎如膏以瓶盛之每日空心溫酒服半匙一月髭發如漆也忌蘿蔔五辛聖濟録螻蛄漏瘡茜根燒灰千年石灰等分為末油調敷之儒門事親方脫肛不收茜根石榴皮各一握酒一盞煎七分溫服聖惠方預解瘡疹時行瘡疹正發服此則可無患茜根煎汁入少酒飲之奇效良方附録血藤宋圖經頌曰生信州葉如蔢𦽅葉根如大拇指其色黃彼人五月採用攻血治氣塊時珍曰按虞摶云血藤即過山龍理亦相近未知的否姑附之剪草日華集解藏器曰剪草生山澤間葉如茗而細江東用之頌曰生潤州二月三月採曝乾用時珍曰按許叔微本事方言剪草狀如茜草又如細辛婺臺二州皆有之惟婺州者可用其説殊詳今遍詢訪無識者或云即茜草也未有的據根氣味苦涼無毒頌曰平主治諸惡瘡疥癬風瘙瘻蝕有蟲浸酒服大明主一切失血時珍發明元素曰上部血須用剪草牡丹皮天門冬麥門冬時珍曰許學士本事方云剪草治勞瘵吐血損肺及血妄行名曰神傳膏其法每用一斤淨洗曬為末入生蜜二斤和為膏以器盛之不得犯鐵器一日一蒸九蒸九曝乃止病人五更起面東坐不得語言以匙抄藥四匙食之良久以稀粟米飲壓之藥只冷服米飲亦勿大熱或吐或下不妨如久病肺損咯血只一服愈尋常嗽血妄行每服一匙可也有一貴婦病瘵得此方九日藥成前一夕病者夢人戒令翌日勿亂服藥次日將服藥屋上土墜器中不可用再合成將服為貓覆器又不得食再合未就而夫人卒矣此藥之異有如此若小小血妄行只一啜而愈也此藥絶妙若此而世失傳惜哉附方新二風蟲牙痛剪草細辛藁本等分煎水熱漱少頃自止中藏經風瘡瘙癢滑肌散治風邪客於肌中渾身瘙癢致生瘡疥及脾肺風毒攻衝生瘡乾溼日久不瘥用剪草七兩不見火輕粉一錢為末摻之乾者麻油調摻和劑局方防己本經中品釋名解離本經石解時珍曰按東垣李杲云防己如險健之人幸災樂禍能首為亂階若善用之亦可禦敵其名或取此義解離因其紋解也集解別録曰防己生漢中川穀二月八月採根陰乾當之曰其莖如葛蔓延其根外白內黃如桔梗內有黑紋如車輻解者良弘景曰今出宜都建平大而青白色虛軟者好黑點木強者不佳服食亦須之頌曰今黔中亦有之但漢中出者破之紋作車輻解黃實而香莖梗甚嫩苗葉小類牽牛折其莖一頭吹之氣從中貫如木通然他處者青白虛軟又有腥氣皮皺上有丁足子名木防己蘇恭言木防己不任用而古方張仲景治傷寒有增減木防己湯及防己地黃湯五物防己湯黃耆六物等湯孫思邈治遺尿小便澀亦有三物木防己湯藏器曰如陶所説漢木二防己即是根苗為名修治斆曰凡使勿用木條色黃腥皮皺上有丁足子不堪用惟要心有花紋黃色者細銼以車前草根相對蒸半日曬乾取用時珍曰今人多去皮銼酒洗曬乾用氣味辛平無毒別録曰苦溫普曰神農辛黃帝岐伯桐君苦無毒李當之大寒權曰苦有小毒元素曰大苦辛寒陰也泄也之才曰殷蘖為之使殺雄黃毒惡細辛畏萆薢女菀滷鹼伏硝石主治風寒溫瘧熱氣諸癇除邪利大小便本經療水腫風腫去膀胱熱傷寒寒熱邪氣中風手腳攣急通腠理利九竅止泄散癰腫惡結諸瘑疥癬蟲瘡別録治濕風口面喎斜手足拘痛散留痰肺氣喘嗽甄權治中下濕熱腫泄腳氣行十二經元素木防己主治男子肢節中風毒風不語散結氣癰腫溫瘧風水腫治膀胱甄權發明弘景曰防己是療風水要藥藏器曰治風用木防己治水用漢防己元素曰去下焦濕腫及痛並泄膀胱火邪必用漢防己草龍膽為君黃柏知母甘草佐之防己乃太陽本經藥也杲曰本草十劑云通可去滯通草防己之屬是也夫防己大苦寒能瀉血中濕熱通其滯塞亦能瀉大便補陰瀉陽助秋冬瀉春夏之藥也比之於人則險而健者也幸災樂禍能首為亂階然善用之亦可敵凶突險此瞑眩之藥也故聖人存而不廢大抵聞其臭則可惡下咽則令人身心煩亂飲食減少至於十二經有濕熱壅塞不通及下注腳氣除膀胱積熱而庇其基本非此藥不可真行經之仙藥無可代之者若夫飲食勞倦陰虛生內熱元氣穀食已虧以防己泄大便則重亡其血此不可用一也如人大渴引飲是熱在上焦肺經氣分宜滲泄而防己乃下焦血分藥此不可用二也外傷風寒邪傳肺經氣分濕熱而小便黃赤乃至不通此上焦氣病禁用血藥此不可用三也大抵上焦濕熱者皆不可用下焦濕熱流入十二經致二陰不通者然後審而用之附方舊三新九皮水胕腫按之沒指不惡風水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己黃耆桂枝各三兩茯苓六兩甘草二兩每服一兩水一升煎半升服日二服張仲景方風水惡風汗出身重脈浮防己黃耆湯主之防己一兩黃耆一兩二錢半白朮七錢半炙甘草半兩銼散每服五錢生薑四片棗一枚水一盞半煎八分溫服良久再服腹痛加芍藥仲景方風濕相搏關節沉痛微腫惡風方同上小便淋澀三物木防己湯用木防己防風葵子各二兩㕮咀水五升煮二升半分三服千金方膈間支飲其人喘滿心下痞堅面黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與之不愈去石膏加茯苓芒硝主之用木防己三兩人參四兩桂枝二兩石膏雞子大十二枚水六升煮二升分溫再服張仲景方傷寒喘急防己人參等分為末桑白湯服二錢不拘老小肺痿喘嗽漢防己末二錢漿水一盞煎七分細呷儒門事親肺痿咯血多痰者漢防己葶藶等分為末糯米飲每服一錢古今録驗鼻衄不止生防己末新汲水服二錢仍以少許搐之聖惠方霍亂吐利防己白芷等分為末新汲水服二錢聖惠方目睛暴痛防己酒浸三次為末每一服二錢溫酒下摘玄方解雄黃毒防己煎汁服之肘後方實主治脫肛焙研煎飲代茶肘後通草本經中品釋名木通士良附支本經丁翁吳普萬年藤甄權子名燕覆時珍曰有細細孔兩頭皆通故名通草即今所謂木通也今之通草乃古之通脫木也宋本草混注為一名實相亂今分出之集解別録曰通草生石城山谷及山陽正月二月採枝陰乾弘景曰今出近道繞樹藤生汁白莖有細孔兩頭皆通含一頭吹之則氣出彼頭者良或云即葍藤莖也恭曰此物大者徑三寸每節有二三枝枝頭有五葉子長三四寸核黑瓤白食之甘美南人謂為燕覆子或名烏覆子遇七八月採之藏器曰江東人呼為蓄葍子江西人呼為拿子如算袋瓤黃子黑食之去皮蘇云色白者乃猴葍也頌曰今澤潞漢中江淮湖南州郡亦有之藤生蔓大如指其莖幹大者徑三寸一枝五葉頗類石葦又似芍藥三葉相對夏秋開紫花亦有白花者結實如小木瓜食之甘美即陳士良本草所謂桴棪子也其枝今人謂之木通而俗間所謂通草乃通脫木也古方所用通草皆今之木通其通脫木稀有用者或以木通為葡萄苗者非矣按張氏燕吳行紀載揚州甘泉東院兩廊前有通草其形如椿少葉子垂梢際如苦楝與今所説不同或別一物也時珍曰今之木通有紫白二色紫者皮厚味辛白者皮薄味淡本經言味辛別録言味甘是二者皆能通利也氣味辛平無毒別録曰甘權曰微寒普曰神農黃帝辛雷公苦杲曰味甘而淡氣平味薄降也陽中陰也主治除脾胃寒熱通利九竅血脈關節令人不忘去惡蟲本經療脾疸常欲眠心煩噦出音聲治耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆鼻息肉墮胎去三蟲別録治五淋利小便開關格治人多睡主水腫浮大甄權利諸經脈寒熱不通之氣孟詵理風熱小便數急疼小腹虛滿宜煎湯並蔥食之有效士良安心除煩止渴退熱明耳目治鼻塞通小腸下水破積聚血塊排膿治瘡癤止痛催生下胞女人血閉月候不勻天行時疾頭痛目眩羸劣乳結及下乳大明利大小便令人心寬下氣藏器主諸瘻瘡喉痹咽痛濃煎含咽珣通經利竅導小腸火杲發明杲曰本草十劑通可去滯通草防己之屬是也夫防己大苦寒能瀉血中濕熱之滯又通大便通草甘淡能助西方秋氣下降利小便專瀉氣滯也肺受熱邪津液氣化之原絶則寒水斷流膀胱受濕熱癃閉約縮小便不通宜此治之其症胸中煩熱口燥舌乾咽乾大渴引飲小便淋瀝或閉塞不通脛酸腳熱並宜通草主之凡氣味與之同者茯苓澤瀉燈草豬苓琥珀瞿麥車前子之類皆可以滲濕利小便泄其滯氣也又曰木通下行泄小腸火利小便與琥珀同功無他藥可比時珍曰木通手厥陰心包絡手足太陽小腸膀胱之藥也故上能通心清肺治頭痛利九竅下能泄濕熱利小便通大腸治遍身拘痛本經及別録皆不言及利小便治淋之功甄權日華子輩始發揚之蓋其能泄丙丁之火則肺不受邪能通水道水源既清則津液自化而諸經之濕與熱皆由小便泄去故古方導赤散用之亦瀉南補北扶西抑東之意楊仁齋直指方言人遍身胸腹隱熱疼痛拘急足冷皆是伏熱傷血血屬於心宜木通以通心竅則經絡流行也附方舊三新一心熱尿赤面赤唇乾咬牙口渴導赤散用木通生地黃炙甘草等分為末每服三錢入竹葉七片水煎服錢氏方婦人血氣木通濃煎三五盞飲之即通孟詵本草金瘡踒折通草煮汁釀酒日飲鼠瘻不消方同上根主治項下癭瘤甄權子氣味甘寒無毒詵曰平南人多食之北人不知其功主治厚腸胃令人能食下三焦惡氣續五臟斷絶氣使語聲足氣通十二經脈和核食之孟詵除三焦客熱胃口熱閉反胃不下食士良止渴利小便時珍通脫木法象釋名通草綱目活莌音奪離南頌曰爾雅離南活莌即通脫也山海經名寇脫又名倚商杲曰陰竅澀而不利水腫閉而不行用之立通因有通草之名與木通同功嘉謨曰白瓤中藏脫木得之故名通脫集解藏器曰通脫木生山側葉似萆麻其莖空心中有白瓤輕白可愛女人取以飾物俗名通草頌曰郭璞言生江南高丈許大葉似荷而肥莖中瓤正白今園圃亦有種蒔者或作蜜煎充果食之甘美時珍曰蔓生山中莖大者圍數寸氣味甘淡寒無毒杲曰甘平降也陽中陰也主治利陰竅治五淋除水腫癃閉瀉肺李杲解諸毒蟲痛蘇頌明目退熱下乳催生汪機發明杲曰通草瀉肺利小便甘平以緩陰血也與燈草同功宜生用之時珍曰通草色白而氣寒味淡而體輕故入太陰肺經引熱下降而利小便入陽明胃經通氣上達而下乳汁其氣寒降也其味淡升也附方新一洗頭風痛新通草瓦上燒存性研末二錢熱酒下牙關緊者斡口灌之王璆百一選方花上粉主治諸蟲瘻惡瘡痔疾納之藏器療瘰癧及胸中伏氣攻胃咽蘇頌附録天壽根圖經頌曰出臺州每歲土貢其性涼治胸膈煩熱土人常用有效釣藤別録下品校正自木部移入此釋名弘景曰出建平亦作吊藤療小兒不入余方時珍曰其刺曲如釣鉤故名或作吊從簡耳集解恭曰釣藤出梁州葉細長其莖間有刺若釣鉤頌曰今秦中興元府有之三月採宗奭曰湖南湖北江南江西山中皆有之藤長八九尺或一二丈大如拇指其中空小人用致酒甕中盜取酒以氣吸之涓涓不斷時珍曰狀如葡萄藤而有鉤紫色古方多用皮後世多用鉤取其力鋭爾氣味甘微寒無毒保升曰苦權曰甘平時珍曰初微甘後微苦平主治小兒寒熱十二驚癇別録小兒驚啼瘛瘲熱擁客忤胎風甄權大人頭旋目眩平肝風除心熱小兒內釣腹痛發斑疹時珍發明時珍曰釣藤手足厥陰藥也足厥陰主風手厥陰主火驚癇眩暈皆肝風相火之病釣藤通心包於肝木風靜火息則諸證自除或云入數寸於小麥中蒸熟餵馬易肥附方新三小兒驚熱釣藤一兩硝石半兩甘草炙一分為散每服半錢溫水服日三服名延齡散聖濟録卒得癇疾釣藤甘草炙各二錢水五合煎二合每服棗許日五夜三度聖惠方斑疹不快釣藤鉤子紫草茸等分為末每服一字或半錢溫酒服錢氏方附録倒挂藤拾遺藏器曰味苦無毒主一切老血及産後諸疾結痛血上欲死煮汁服之生深山有逆刺如懸鉤倒挂於樹葉尖而長黃藤綱目集解時珍曰黃藤生嶺南狀若防己俚人常服此藤縱飲食有毒亦自然不發席辨刺史云甚有效氣味甘苦平無毒主治飲食中毒利小便煮汁頻服即解時珍白兔藿本經上品釋名白葛本經集解別録曰生交州山谷弘景曰此藥解毒莫之與敵而人不復用不聞識者恭曰荊襄山谷大有之蔓生山南人謂之白葛苗似蘿藦葉圓厚莖有白毛與衆草異用藿療毒有效而交廣又有白花藤亦解毒用根不用苗保升曰蔓生葉圓若蓴今襄州北汝州南岡上有五月六月採苗日乾氣味苦平無毒主治蛇虺蜂蠆猘狗菜肉蠱毒鬼疰本經風疰諸大毒不可入口者皆消除之又去血可末著痛上立消毒入腹者煮汁飲即解別録風邪熱極煮汁飲搗末敷諸毒妙李珣白花藤唐本草集解恭曰生嶺南交州廣州平澤苗似野葛葉似女貞莖葉俱無毛而白花其根似葛而骨柔皮厚肉白大療毒用根不用苗保升曰蔓生白花葉有細毛根似牡丹骨柔皮白而厚凌冬不凋斆曰凡使勿用菜花藤真相似只是味酸澀白花藤味甘香採得去根細銼陰乾用氣味苦寒無毒主治解諸藥菜肉中毒漬酒主虛勞風熱唐本發明時珍曰蘇言用根雷言用苗都可用爾按葛洪肘後方云席辨刺史在嶺南日久言俚人皆因飲食入毒多不即覺漸不能食或心中漸脹先寒似瘴急含白銀一宿變色者即是也銀青是藍藥銀黃赤是𦵣藥𦵣音混草名也但取白花藤四兩出嶲州者為上不得取近野葛生者洗切同干藍實四兩水七升煮取半空腹頓服少悶勿怪其毒即解白英本經上品校正併入別録鬼目釋名縠菜本經白草別録白幕拾遺排風同上子名鬼目時珍曰白英謂其花色縠菜象其葉文排風言其功用鬼目象其子形別録有名未用復出鬼目雖苗子不同實一物也故並之集解別録曰白英生益州山谷春採葉夏採莖秋採花冬採根又曰鬼目一名來甘實赤如五味十月採弘景曰鬼目俗人呼為白草子是矣又曰白英方藥不復用此有斛菜生水中可蒸食非是此類有白草作羹飲甚療勞而不用根花益州乃有苦菜土人專食之充健無病疑或是此恭曰白英鬼目草也蔓生葉似王瓜小長而五丫實圓若龍葵子生青熟紫黑東人謂之白草陶云白草似識之而不的辨藏器曰白英鬼目菜也蔓生三月延長爾雅名苻郭璞云似葛葉有毛子赤色如耳璫珠若雲子熟黑誤矣江東夏月取其莖葉煮粥食極解熱毒時珍曰此俗名排風子是也正月生苗白色可食秋開小白花子如龍葵子熟時紫赤色吳志云孫皓時有鬼目菜緣棗樹長丈餘葉廣四寸厚三分人皆異之即此物也又羊蹄草一名鬼目嶺南有木果亦名鬼目葉似楮子大如鴨子七八月熟黃色味酸可食皆與此同名異物也根苗氣味甘寒無毒主治寒熱八疸消渴補中益氣久服輕身延年本經葉作羹飲甚療勞弘景煩熱風疹丹毒瘴瘧寒熱小兒結熱煮汁飲之藏器鬼目子也氣味酸平無毒主治明目別録附方新一目赤頭旋眼花面腫風熱上攻用排風子焙甘草炙菊花焙各一兩為末每服二錢臥時溫水下聖濟録蘿藦唐本草校正併入拾遺斫合子釋名雚音貫芄蘭詩疏白環藤拾遺實名雀瓢陸璣斫合子拾遺羊婆奶綱目婆婆針線包藏器曰漢高帝用子敷軍士金瘡故名斫合子時珍曰白環即芄字之訛也其實嫩時有漿裂時如瓢故有雀瓢羊婆奶之稱其中一子有一條白絨長二寸許故俗呼婆婆針線包又名婆婆針袋兒也集解弘景曰蘿藦作藤生摘之有白乳汁人家多種之葉厚而大可生啖亦蒸煮食之諺云去家千里勿食蘿藦枸杞言其補益精氣強盛陰道與枸杞葉同也恭曰按陸璣詩疏云蘿藦一名芄蘭幽州謂之雀瓢然雀瓢是女青別名也蘿藦葉似女青故亦名雀瓢女青葉似蘿藦兩葉相對子似瓢形大如棗許故名雀瓢根似白薇莖葉並臭生平澤別録云葉嫩時似蘿藦圓端大莖實黑藏器曰蘿藦東人呼為白環藤生籬落間折之有白汁一名雀瓢其女青終非白環二物相似不能分別又曰斫合子作藤生蔓延籬落間至秋霜子如柳絮一名雞腸一名薰桑時珍曰斫合子即蘿藦子也三月生苗蔓延籬垣極易繁衍其根白軟其葉長而後大前尖根與莖葉斷之皆有白乳如構汁六七月開小長花如鈴狀紫白色結實長二三寸大如馬兜鈴一頭尖其殼青軟中有白絨及漿霜後枯裂則子飛其子輕薄亦如兜鈴子商人取其絨作坐褥代綿云甚輕暖詩云芄蘭之支童子佩觿芄蘭之葉童子佩韘觿音畦解結角錐也此物實尖垂於支間似之韘音涉張弓指彄也此葉後彎似之故以比興也一種莖葉及花皆似蘿藦但氣臭根紫結子圓大如豆生青熟赤為異此則蘇恭所謂女青似蘿藦陳藏器所謂二物相似者也蘇恭言其根似白薇子似瓢形則誤矣當從陳説此乃藤生女青與蛇銜根之女青名同物異宜互考之子葉同氣味甘辛溫無毒時珍曰甘微辛主治虛勞補益精氣強陰道葉煮食功同子唐本搗子敷金瘡生膚止血搗葉敷腫毒藏器取汁敷丹毒赤腫及蛇蟲毒即消蜘蛛傷頻治不愈者搗封二三度能爛絲毒即化作膿也時珍附方新二補益虛損極益房勞用蘿藦四兩枸杞根皮五味子柏子仁酸棗仁乾地黃各三兩為末每服方寸匕酒下日三服千金方損傷血出痛不可忍用籬上婆婆針袋兒擂水服渣罨瘡口立效袖珍赤地利唐本草校正併入拾遺五毒草釋名赤薜荔綱目五毒草拾遺五蕺拾遺蛇菵拾遺山蕎麥圖經時珍曰並未詳集解恭曰所在山谷有之蔓生葉似蘿藦根皮赤黑肉黃赤二月八月採根日乾頌曰云所在皆有今惟華山有之春夏生苗作蔓繞草木上莖赤葉青似蕎麥葉七月開白花亦如蕎麥結子青色根若菝葜皮紫赤肉黃赤八月採根曬乾收藏器曰五毒草生江東平地花葉並如蕎麥根緊硬似狗脊亦名蛇菵名同物異時珍曰五毒草即赤地利今併為一根修治斆曰凡採得細銼用藍葉並根同入生絹袋盛之蒸一伏時去藍曬用氣味苦平無毒藏器曰酸平伏丹砂主治赤白冷熱諸痢斷血破血帶下赤白生肌肉唐本主癰疽惡瘡毒腫赤白遊疹蟲蠶蛇犬咬並醋摩敷之亦搗莖葉敷之恐毒入腹煮汁飲藏器發明時珍曰唐張文仲備急方治青赤黃白等痢鹿茸丸方中用之則其功長於涼血解毒可知矣附方舊二小兒熱瘡身面皆有如火燒者赤地利末粉之外臺火瘡滅瘢赤地利末油調塗聖惠紫葛唐本草集解恭曰生山谷中苗似葡萄長丈許根紫色大者徑二三寸保升曰所在皆有今出雍州葉似櫻薁其根皮肉俱紫色三八月採根皮日乾大明曰紫葛有二種此是藤生者頌曰今惟江寧府及台州有之春生冬枯似葡萄而紫色根皮氣味甘苦寒無毒大明曰苦滑冷燒灰制硝石主治癰腫惡瘡搗末醋和封之蘇恭主癱緩攣急並熱毒風通小腸大明生肌散血時珍附方舊二産後煩渴血氣上衝也紫葛三兩水二升煎一升去滓呷之金瘡傷損生肌破血用紫葛二兩順流水三盞煎一盞半分三服酒煎亦妙並經驗方烏蘞莓唐本草釋名五葉莓弘景蘢草保升拔爾雅蘢葛同赤葛綱目五爪龍同赤潑藤時珍曰五葉如白蘞故曰烏蘞俗名五爪龍江東呼龍尾亦曰虎葛曰龍曰葛並取蔓形赤潑與赤葛及拔音相近集解弘景曰五葉莓生籬牆間作藤搗根敷癰癤有效恭曰蔓生平澤葉似白蘞四月五月採之保升曰莖端五葉開花青白色所在有之夏採苗用時珍曰塍塹間甚多其藤柔而有稜一枝一須凡五葉葉長而光有疏齒面青背淡七八月結苞成簇青白色花大如粟黃色四出結實大如龍葵子生青熟紫內有細子其根白色大者如指長一二尺搗之多涎滑傅滋醫學集成謂即紫葛楊起簡便方謂即老鴉眼睛草斗門方謂即何首烏並誤矣氣味酸苦寒無毒主治癰癤瘡腫蟲咬搗根敷之弘景風毒熱腫遊丹搗敷並飲汁恭涼血解毒利小便根擂酒服消癤腫神效時珍附方新五小便尿血五葉藤陰乾為末每服二錢白湯下衛生易簡方喉痹腫痛五爪龍草車前草馬蘭菊各一握搗汁徐咽祖傳方也醫學正傳項下熱腫俗名蝦蟆瘟五葉藤搗敷之丹溪纂要一切腫毒發背乳癰便毒惡瘡初起者並用五葉藤或根一握生薑一塊搗爛入好酒一碗絞汁熱服取汗以渣敷之即散一用大蒜代薑亦可壽域神方跌撲損傷五爪龍搗汁和童尿熱酒服之取汗簡便方葎草唐本草校正併入有名未用勒草釋名勒草別録葛勒蔓蜀圖經來莓草別本時珍曰此草莖有細刺善勒人膚故名勒草訛為葎草又訛為來莓皆方音也別録勒草即此今併為一集解恭曰葎草生故墟道旁葉似萆麻而小且薄蔓生有細刺亦名葛葎蔓古方亦時用之保升曰野處多有之葉似大麻花黃白色子若大麻子俗名葛勒蔓夏採莖葉曝乾用別録曰勒草生山谷如栝蔞時珍曰二月生苗莖有細刺葉對節生一葉五尖微似萆麻而有細齒八九月開細紫花成簇結子狀如黃麻子氣味甘苦寒無毒主治勒草主瘀血止精溢盛氣別録葎草主五淋利小便止水痢除瘧虛熱渴煮汁或生搗汁服恭生汁一合服治傷寒汗後虛熱宗奭療膏淋久痢疥癩頌潤三焦消五穀益五臟除九蟲闢溫疫敷蛇蠍傷時珍附方舊三新六小便石淋葛葎掘出根挽斷以杯於坎中承取汁服一升石當出不出更服範汪方小便膏淋葎草搗生汁三升酢二合合和頓服當尿下白汁尿血淋瀝同上産婦汗血汙衣赤色方同上久痢成疳葛勒蔓末以管吹入肛門中不過數次如神新久瘧疾用葛葎草一握一名勒蔓去兩頭秋冬用乾者恆山末等分以淡漿水二大盞浸藥星月下露一宿五更煎一盞分二服當吐痰愈遍體癩瘡葎草一擔以水二石煮取一石漬之不過三作愈並韋宙獨行方烏癩風瘡葛葎草三稱切洗益母草一稱切以水二石五斗煮取一石五斗去滓入甕中浸浴一時方出坐密室中又暖湯浴一時乃出暖臥取汗勿令見風明日又浴如浴時瘙癢不可忍切勿搔動少頃漸定後隔三日一作以愈為度聖濟録羊桃本經下品釋名鬼桃本經羊腸同萇楚爾雅銚芅音姚弋或作御弋細子並未詳集解別録曰羊桃生山林川穀及田野二月採陰乾弘景曰山野多有甚似家桃又非山桃花甚赤子小細而苦不堪食詩云隰有萇楚即此方藥不復用保升曰生平澤中處處有之苗長而弱不能為樹葉花皆似桃子細如棗核今人呼為細子其根似牡丹郭璞云羊桃葉似桃其花白色子如小麥亦似桃形陸璣詩疏云葉長而狹花紫赤色其枝莖弱過一尺引蔓於草上今人以為汲灌重而善沒不如楊柳也近下根刀切其皮著熱灰中脫之可韜筆管也時珍曰羊桃莖大如指似樹而弱如蔓春長嫩條柔軟葉大如掌上緑下白有毛狀似苧麻而團其條浸水有涎滑莖根氣味苦寒有毒藏器曰甘無毒主治熛熱身暴赤色除小兒熱風水積聚惡瘍本經去五臟五水大腹利小便益氣可作浴湯別録煮汁洗風癢及諸瘡腫極效恭根浸酒服治風熱羸老藏器附方舊一新三傷寒變𧈟四肢煩疼不食多睡羊桃十斤搗熟浸熱湯三斗日正午時入坐一炊久不過三次愈千金傷寒毒攻手足腫痛羊桃煮汁入少鹽豉漬之肘後水氣鼓脹大小便澀羊桃根桑白皮木通大戟炒各半斤銼水一斗煮五升熬如稀餳每空心茶服一匙二便利食粥補之聖惠方蜘蛛咬毒羊桃葉搗敷之立愈備急方絡石本經上品釋名石鯪本經吳普作鯪石石龍藤別録懸石同耐冬恭云花普雲英普云丹普石血恭云珠普別録又名略石領石明石石磋恭曰俗名耐冬以其包絡石木而生故名絡石山南人謂之石血療産後血結大良也集解別録曰絡石生太山川穀或石山之陰或高山岩石上或生人間五月採弘景曰不識此藥方法無用者或云是石類既生人間則非石猶如石斛等系石為名耳恭曰此物生陰濕處冬夏常青實黑而圓其莖蔓延繞樹石側若在石間者葉細厚而圓短繞樹生者葉大而薄人家亦種之為飾保升曰所在有之生木石間凌冬不凋葉似細橘葉莖節著處即生根鬚包絡石旁花白子黑六月七月採莖葉日乾藏器曰在石者良在木者隨木性有功與薜荔相似更有石血地錦等十餘種藤並是其類大略皆主風血暖腰腳變白不老蘇恭言石血即絡石殊誤矣絡石葉圓正青石血葉尖一頭赤色時珍曰絡石貼石而生其蔓折之有白汁其葉小於指頭厚實木強面青背淡澀而不光有尖葉圓葉二種功用相同蓋一物也蘇恭所説不誤但欠詳耳莖葉修治雷曰凡採得用粗布揩去毛了以熟甘草水浸一伏時切曬用氣味苦溫無毒別録曰微寒普曰神農苦小溫雷公苦平無毒扁鵲桐君甘無毒當之曰大寒藥中君也採無時時珍曰味甘微酸不苦之才曰杜仲牡丹為之使惡鐵落畏貝母菖蒲殺殷蘖毒主治風熱死肌癰傷口乾舌焦癰腫不消喉舌腫閉水漿不下本經大驚入腹除邪氣養腎主腰髖痛堅筋骨利關節久服輕身明目潤澤好顏色不老延年通神別録主一切風變白宜老藏器蝮蛇瘡毒心悶服汁並洗之刀斧傷瘡敷之立瘥恭發明時珍曰絡石性質耐久氣味平和神農列之上品李當之稱為藥中之君其功主筋骨關節風熱癰腫變白耐老即醫家鮮知用者豈以其近賤而忽之耶服之當浸酒耳仁存堂方云小便白濁緣心腎不濟或由酒色遂至已甚謂之上淫蓋有虛熱而腎不足故土邪乾水史載之言夏則土燥水濁冬則土堅水清即此理也醫者往往峻補其疾反甚惟服博金散則水火既濟源潔而流清矣用絡石人參茯苓各二兩龍骨煅一兩為末每服二錢空心米飲下日二服附方舊一新二小便白濁方同上喉痹腫塞喘息不通須臾欲絶神驗方用絡石草一兩水一升煎一大盞細細呷之少頃即通外臺祕要癰疽焮痛止痛靈寶散用鬼繫腰生竹籬陰濕石岸間絡石而生者好絡木者無用其藤柔細兩葉相對形生三角用莖葉一兩洗曬勿見火皂莢刺一兩新瓦炒黃甘草節半兩大栝蔞一個取仁炒香乳香沒藥各三錢每服二錢水一盞酒半盞慢火煎至一盞溫服外科精要木蓮拾遺釋名薜荔拾遺木饅頭綱目鬼饅頭時珍曰木蓮饅頭象其實形也薜荔音壁利未詳山海經作草荔集解藏器曰薜荔夤緣樹木三五十年漸大枝葉繁茂葉圓長二三寸厚若石葦生子似蓮房打破有白汁停久如漆中有細子一年一熟子亦入藥採無時頌曰薜荔絡石極相類莖葉粗大如藤狀木蓮更大於絡石其實若蓮房時珍曰木蓮延樹木垣牆而生四時不凋厚葉莖強大於絡石不花而實實大如杯微似蓮蓬而稍長正如無花果之生者六七月實內空而紅八月後則滿腹細子大如稗子一子一須其味微澀其殼虛輕烏鳥童兒皆食之葉氣味酸平無毒主治背癰乾末服之下利即愈頌主風血暖腰腳變白不衰藏器治血淋痛澀藤葉一握甘草炙一分日煎服之時珍發明艾晟曰圖經言薜荔治背瘡近見宜興縣一老舉人年七十餘患發背村中無醫藥急取薜荔葉爛研絞汁和蜜飲數升以滓敷之後用他藥敷貼遂愈其功實在薜荔乃知圖經之言不妄藤汁主治白癜風癧瘍風惡瘡疥癬塗之大明木蓮氣味甘平澀無毒時珍曰嶺南人言食之發瘴主治壯陽道尤勝頌固精消腫散毒止血下乳治久痢腸痔心痛陰㿗時珍附方新八驚悸遺精木饅頭炒白牽牛等分為末每服二錢用米飲調下乾坤祕韞陰㿉囊腫木蓮即木饅頭燒研酒服二錢又方木饅頭子小茴香等分為末每空心酒服二錢取效集簡酒痢腸風黑散子治風入臟或食毒積熱大便鮮血疼痛肛出或久患酒痢木饅頭燒存性棕櫚皮燒存性烏梅去核粉草炙等分為末每服二錢水一盞煎服惠民和劑局方腸風下血大便更澀木饅頭燒枳殼炒等分為末每服二錢槐花酒下楊倓家藏方大腸脫下木饅頭連皮子切炒茯苓豬苓等分為末每服二錢米飲下亦治夢遺名鎖陽丹普濟方一切癰疽初起不問發於何處用木蓮四十九個揩去毛研細酒解開溫服功與忍冬草相上下陳自明外科精要乳汁不通木蓮二個豬前蹄一個爛煮食之並飲汁盡一日即通無子婦人食之亦有乳也集簡方附録地錦拾遺藏器曰味甘溫無毒主破老血産後血結婦人瘦損不能飲食腹中有塊淋瀝不盡赤白帶下天行心悶並煎服之亦浸酒生淮南林下葉如鴨掌藤蔓著地節處有根亦緣樹石冬月不死山人産後用之一名地噤時珍曰別有地錦草與此不同見草之六扶芳藤拾遺釋名滂藤集解藏器曰生吳郡藤苗小時如絡石蔓延樹木山人取楓樹上者用亦如桑上寄生之意忌採冢墓間者隋朝稠禪師作青飲進煬帝止渴者即此莖葉氣味苦小溫無毒主治一切血一切氣一切冷大主風血腰腳去百病久服延年變白不老銼細浸酒飲藏器常春藤拾遺釋名土鼓藤拾遺龍鱗薜荔日華藏器曰小兒取其藤於地打作鼓聲故名土鼓李雍改為常春藤集解藏器曰生林薄間作蔓繞草木上其葉頭尖結子正圓熟時如珠碧色氣味莖葉苦子甘溫無毒主治風血羸老腹內諸冷血閉強腰腳變白煮服浸酒皆宜藏器凡一切癰疽腫毒初起取莖葉一握研汁和酒溫服利下惡物去其根本時珍外科精要附方新二疔瘡黑凹用發繩扎住將尖葉薜荔搗汁和蜜一盞服之外以蔥蜜搗敷四圍聖惠方衄血不止龍鱗薜荔研水飲之聖濟録千歲藟別録上品校正併入有名未用別録藟根釋名藟蕪別録苣瓜拾遺藏器曰此藤冬只凋葉大者盤薄故曰千歲藟集解別録曰千歲藟生太山川穀弘景曰藤生如葡萄葉似鬼桃蔓延木上汁白今俗人方藥都不識用仙經數處須之藏器曰蔓似葛葉下白其子赤條中有白汁陸璣草木疏云一名苣瓜邊蔓而生蔓白子赤可食酢而不美幽州人謂之推藟毛詩云葛藟注云似葛之草蘇恭謂為櫻薁深是妄言頌曰處處有之藤生蔓延木上葉如葡萄而小四月摘其莖汁白而味甘五月開花七月結實八月採子青黑微赤冬惟凋葉春夏間取汁用陶陳二氏所説得之宗奭曰唐開元末訪隱民薑撫年幾百歲召至集賢院言服常春藤使白髮還黑長生可致藤生太湖終南帝遣使多取以賜老臣詔天下使自求之擢撫銀青光祿大夫號沖和先生又言終南山有旱藕餌之延年狀類葛粉帝取之作湯餅賜大臣右驍騎將軍甘守誠云常春藤乃千歲藟也旱藕乃牡蒙也方家久不用故撫易名以神之民以酒漬藤飲之多暴死乃止撫內慚乃請求藥牢山遂逃去今書此以備世疑時珍曰按千歲藟原無常春之名惟陳藏器本草土鼓藤下言李雍名為常春藤浸酒服羸老變白則撫所用乃土鼓藤也其葉與千歲藟不同或名同耳正誤見果部櫻薁下氣味甘平無毒主治補五臟益氣續筋骨長肌肉去諸痹久服輕身不飢耐老通神明別録藟根主治緩筋令不痛別録忍冬別録上品釋名金銀藤綱目鴛鴦藤綱目鷺鷥藤綱目老翁須綱目左纏藤綱目金叉股綱目通靈草土宿蜜桶藤弘景曰處處有之藤生凌冬不凋故名忍冬時珍曰其花長瓣垂須黃白相半而藤左纏故有金銀鴛鴦以下諸名金叉股貴其功也土宿真君云蜜桶藤陰草也取汁能伏硫制汞故有通靈之稱集解別録曰忍冬十二月採陰乾恭曰藤生繞覆草木上莖苗紫赤色宿蔓有薄皮膜之其嫩蔓有毛葉似胡豆亦上下有毛花白蕊紫今人或以絡石當之非矣時珍曰忍冬在處有之附樹延蔓莖微紫色對節生葉葉似薜荔而青有澀毛三四月開花長寸許一蒂兩花二瓣一大一小如半邊狀長蕊花初開者蕊瓣俱色白經二三日則色變黃新舊相參黃白相映故呼金銀花氣甚芬芳四月採花陰乾藤葉不拘時採陰乾氣味甘溫無毒權曰辛藏器曰小寒云溫者非也主治寒熱身腫久服輕身長年益壽別録治腹脹滿能止氣下澼甄權熱毒血痢水痢濃煎服藏器治飛尸遁尸風尸沉尸尸注鬼擊一切風濕氣及諸腫毒癰疽疥癬楊梅諸惡瘡散熱解毒時珍發明弘景曰忍冬煮汁釀酒飲補虛療風此既長年益壽可常採服而仙經少用凡易得之草人多不肯為之更求難得者貴遠賤近庸人之情也時珍曰忍冬莖葉及花功用皆同昔人稱其治風除脹解痢逐尸為要藥而後世不復知用後世稱其消腫散毒治瘡為要藥而昔人並未言及乃知古今之理萬變不同未可一轍論也按陳自明外科精要云忍冬酒治癰疽發背初發便當服此其效甚奇勝於紅內消洪內翰邁沈內翰括諸方所載甚詳如瘍醫丹陽僧江西僧鑑清金陵王琪王尉子駿海州劉秀才純臣等所載療癰疽發背經效奇方皆是此物故張相公云誰知至賤之中乃有殊常之效正此類也附方舊一新十七忍冬酒治癰疽發背不問發在何處發眉發頤或頭或項或背或腰或脅或乳或手足皆有奇效鄉落之間僻陋之所貧乏之中藥材難得但虔心服之俟其疽破仍以神異膏貼之其效甚妙用忍冬藤生取一把以葉入砂盆研爛入生餅子酒少許稀稠得所塗於四圍中留一口泄氣其藤只用五兩木槌槌損不可犯鐵大甘草節生用一兩同入沙瓶內以水二碗文武火慢煎至一碗入無灰好酒一大碗再煎十數沸去滓分為三服一日一夜吃盡病勢重者一日二劑服至大小腸通利則藥力到沈內翰云如無生者只用乾者然力終不及生者效速陳自明外科精要忍冬圓治消渴愈後預防發癰疽先宜服此用忍冬草根莖花葉皆可不拘多少入瓶內以無灰好酒浸以粳火煨一宿取出曬乾入甘草少許碾為細末以浸藥酒打麵糊丸梧子大每服五十丸至百丸湯酒任下此藥不特治癰疽大能止渴外科精要五痔諸瘻方同上一切腫毒不問已潰未潰或初起發熱用金銀花俗名甜藤採花連莖葉自然汁半碗煎八分服之以滓敷上敗毒托裡散氣和血其功獨勝萬表積善堂方疔瘡便毒方同上喉痹乳蛾方同上敷腫拔毒金銀藤大者燒存性葉焙乾為末各三錢大黃焙為末四錢凡腫毒初發以水酒調搽四圍留心泄氣楊誠經驗方癰疽托裡治癰疽發背腸癰奶癰無名腫毒焮痛寒熱狀類傷寒不問老幼虛實服之未成者內消已成者即潰忍冬葉黃耆各五兩當歸一兩甘草八錢為細末每服二錢酒一盞半煎一盞隨病上下服日再服以渣敷之和劑局方惡瘡不愈左纏藤一把搗爛入雄黃五分水二升瓦罐煎之以紙封七重穿一孔待氣出以瘡對孔熏之三時久大出黃水後用生肌藥取效選奇方輕粉毒癰方同上瘡久成漏忍冬草浸酒日日常飲之戴原禮要訣熱毒血痢忍冬藤濃煎飲聖惠方五種尸注飛尸者遊走皮膚洞穿臟腑每發刺痛變動不常也遁尸者附骨入肉攻鑿血脈每發不可見死尸聞哀哭便作也風尸者淫躍四末不知痛之所在每發恍惚得風雪便作也沉尸者纏結臟腑沖引心脅每發絞切遇寒冷便作也尸注者舉身沉重精神錯雜常覺昏廢每節氣至則大作也並是身中尸鬼引接外邪宜用忍冬莖葉銼數斛煮取濃汁煎稠每服雞子大許溫酒化下一日二三服肘後方鬼擊身青作痛用金銀花一兩水煎飲之李樓怪病奇方腳氣作痛筋骨引痛鷺鷥藤即金銀花為末每服二錢熱酒調下衛生易簡方中野菌毒急採鴛鴦藤啖之即今忍冬草也洪邁夷堅志口舌生瘡赤梗蜜桶藤高腳地銅盤馬蹄香等分以酒搗汁雞毛刷上取涎出即愈普濟方忍冬膏治諸般腫痛金刃傷瘡惡瘡用金銀藤四兩吸鐵石三錢香油一斤熬枯去滓入黃丹八兩待熬至滴水不散如常攤用乾坤祕韞甘藤宋嘉祐校正自木部移入此釋名甜藤嘉祐感藤時珍曰甘感音相近也又有甜藤甘露藤皆此類並附之忍冬一名甜藤與此不同集解藏器曰生江南山谷其藤大如雞卵狀如木防己斫斷吹之氣出一頭其汁甘美如蜜汁氣味甘平無毒主治調中益氣通血氣解諸熱止渴藏器除煩悶利五臟治腎釣氣其葉研敷蛇蟲咬大明解熱痢及膝腫時珍附録甘露藤嘉祐藏器曰生嶺南藤蔓如箸人服之得肥一名肥藤味甘溫無毒主風血氣諸病久服調中溫補令人肥健好顏色大明曰止消渴潤五臟除腹內諸冷甜藤拾遺藏器曰生江南山林下蔓如葛味甘寒無毒主去熱煩解毒調中氣令人肥健搗汁和米粉作糗餌食甜美止泄又治剝馬血毒入肉及狂犬牛馬熱黃敷蛇咬瘡又有小葉尖長氣辛臭者搗敷小兒腹除痞滿閃癖含水藤海藥校正自木部移入此併入拾遺大瓠藤釋名大瓠藤集解珣曰按劉欣期交州記云含水藤生嶺南及諸海邊山谷狀若葛葉似枸杞多在路旁行人乏水處便吃此藤故以為名藏器曰越南朱崖儋耳無水處皆種大瓠藤取汁用之藤狀如瓠斷之水出飲之清美時珍曰顧微廣州記云水藤去地一丈斷之更生根至地水不絶山行口渴斷取汁飲之陳氏所謂大瓠藤蓋即此物也藤中水氣味甘平無毒藏器曰寒主治解煩渴心燥瘴癘丹石發動亦宜服之李珣止渴潤五臟去濕痹天行時氣利小便其葉搗敷中水爛瘡皮皸藏器治人體有損痛沐發令長時珍廣州記附録鼠藤拾遺珣曰顧微廣州記云鼠愛食此藤故名其咬處人取為藥藏器曰生南海海畔山谷作藤繞樹莖葉滑淨似枸杞花白有節心虛苗頭有毛彼人食之如甘蔗味甘溫無毒主丈夫五勞七傷陰痿益陽道小便數白腰腳痛冷除風氣壯筋骨補衰老好顏色濃煮服之取微汗亦浸酒服性溫稍令人悶無苦也天仙藤宋圖經集解頌曰生江淮及浙東山中春生苗蔓延作藤葉似葛葉圓而小有白毛四時不凋根有須夏月採取根苗南人多用之氣味苦溫無毒主治解風勞同麻黃治傷寒發汗同大黃墮胎氣蘇頌流氣活血治心腹痛時珍附方新六疝氣作痛天仙藤一兩好酒一碗煮至半碗服之神效孫天仁集效方痰注臂痛天仙藤白朮羌活白芷梢各三錢片子薑黃六錢半夏制五錢每服五錢薑五片水煎服仍間服千金五套丸楊仁齋直指方妊娠水腫始自兩足漸至喘悶似水足趾出水謂之子氣乃婦人素有風氣或衝任有血風不可作水妄投湯藥宜天仙藤散主之天仙藤洗微炒香附子炒陳皮甘草烏藥等分為末每服三錢水一大盞薑三片木瓜三片紫蘇三葉煎至七分空心服一日三服小便利氣脈通腫漸消不須多服此乃淮南名醫陳景初祕方也得於李伯時家陳自明婦人良方産後腹痛兒枕痛天仙藤五兩炒焦為末每服二錢炒生薑汁童子小便和細酒調服經驗婦人方一切血氣腹痛即上方用溫酒調服肺熱鼻渣桐油入黃連末用天仙藤燒熱油敷之摘玄方紫金藤宋圖經釋名山甘草集解頌曰生福州山中春初單生葉青色至冬凋落其藤似枯條採皮曬乾氣味缺主治丈夫腎氣蘇頌消損傷瘀血搗敷惡瘡腫毒時珍附方新二紫金藤丸補腎臟暖丹田興陽道減小便填精髓駐顏色潤肌肉治元氣虛憊面目黧黑口乾舌澀夢想虛驚耳鳴目淚腰胯沉重百節痠疼項筋緊急背胛勞倦陰汗盜汗及婦人子宮久冷月水不調或多或少赤白帶下並宜服之用紫金藤十六兩巴戟天去心三兩吳茱萸高良薑肉桂青鹽各二兩為末酒糊丸梧子大每溫酒下二十丸日三服和劑方死胎不下紫金藤葵根各七錢土牛膝三兩土當歸四錢肉桂二錢麝香三分為末米糊丸梧子大硃砂為衣每服五十丸乳香湯下極驗葛靜觀方南藤宋開寶校正自木部移入此併入有名未用別録丁公寄圖經石南藤釋名石南藤圖經丁公藤開寶丁公寄別録丁父別録風藤志曰生依南樹故號南藤藏器曰丁公寄即丁公藤也始因丁公用有效因以得名集解別録曰丁公寄生石間蔓延木上葉細大枝赤莖母大如磧黃有汁七月七日採頌曰南藤即丁公藤也生南山山谷今泉州榮州有之生依南木莖如馬鞭有節紫褐色葉如杏葉而尖採無時又曰天台石南藤四時不凋土人採葉治腰痛時珍曰今江南湖南諸大山有之細藤圓膩紫緑色一節一葉葉深緑色似杏葉而微短厚其莖貼樹處有小紫瘤疣中有小孔四時不凋莖葉皆臭而極辣白花蛇食其葉氣味辛溫無毒別録曰甘主治金瘡痛延年別録主風血補衰老起陽強腰腳除痹變白逐冷氣排風邪煮汁服冬月浸酒服藏器煮汁服治上氣咳嗽時珍發明志曰按南史云解叔謙雁門人母有疾夜禱聞空中語云得丁公藤治之即瘥訪醫及本草皆無此藥至宜都山中見一翁伐木云是丁公藤療風乃拜泣求翁並示以漬酒法受畢失翁所在母服之遂愈也時珍曰近俗醫治諸風以南藤和諸藥熬膏市之號南藤膏白花蛇喜食其葉故治諸風尤捷附録烈節宋圖經頌曰生榮州多在林箐中春生蔓苗莖葉俱似丁公藤而纖細無花實九月採莖曬乾味辛溫無毒主肢節風冷筋脈急痛作湯浴之佳時珍曰楊倓家藏經驗方有烈節酒治歷節風痛用烈節松節牛膝熟地黃當歸各一兩為粗末絹袋盛之以無灰酒二百盞浸三日每用一盞入生酒一盞溫服表弟武東叔年二十餘患此痛不可忍涪城馬東之以此治之而安清風藤宋圖經釋名青藤綱目尋風藤綱目集解頌曰生台州天台山中其苗蔓延木上四時常青土人採莖用氣味缺主治風疾蘇頌治風濕流注歷節鶴膝麻痹瘙癢損傷瘡腫入酒藥中用時珍附方新二風濕痹痛青藤根三兩防己一兩㕮咀入酒一瓶煮飲普濟方一切諸風青藤膏用青藤出太平荻港上者二三月採之不拘多少入釜內微火熬七日夜成膏收入瓷器內用時先備梳三五把量人虛實以酒服一茶匙畢將患人身上拍一掌其後遍身發癢不可當急以梳梳之要癢止即飲冷水一口便解風病皆愈也避風數日良集簡方百稜藤宋圖經釋名百靈藤綱目集解頌曰生台州山中春生苗蔓延木上無花葉冬採皮入藥土人用氣味缺主治盜汗蘇頌治一切風痛風瘡以五斤銼水三斗煮汁五升熬膏每酒服一匙日三服時珍附方新三頭風腦痛百靈藤十斤水一石煎汁三斗入糯米三斗作飯候冷拌神麯炒末九兩同入甕中如常釀酒經三五日看沫盡更炊一斗糯米飯冷投之待熟澄清每溫飲一小盞服後渾身汗出為效聖惠方一切風痹不拘久近百靈藤五斤水三斗煎一斗濾汁再煎至三升入牛膝附子仙靈脾赤箭何首烏乳香鹿角膠各二兩為末同煎別入白蜜五合熬如餳狀瓷瓶收之每服一匙溫酒下一日二服忌毒物滑物聖惠方大風瘡疾百靈藤四兩水一斗煮三升去滓入粳米四合煮粥於密室中浴畢乃食曖臥取汗汗後皮膚起如麩片每隔日一作五六十日後漸愈毛髮即生聖惠方省藤拾遺校正自木部移入此釋名赤藤綱目紅藤綱目集解藏器曰生南地深山皮赤大如指堪縛物片片自解也氣味苦平無毒主治蛔蟲煮汁服之齒痛打碎含之煮粥飼狗去瘑藏器治諸風通五淋殺蟲時珍發明時珍曰赤藤善殺蟲利小便洪邁夷堅志云趙子山苦寸白蟲病醫令戒酒而素性耽之一日寓居邵武天王寺夜半醉歸口渴甚見廡間甕水映月瑩然即連酌飲之其甘如飴逮曉蟲出盈席心腹頓寬宿疾遂愈皆驚異之視所飲水乃寺僕織草履浸紅藤根水也附方新一五淋澀痛赤藤即做草鞋者白茯苓苧麻根等分為末百沸湯下每服一錢如神究原方紫藤宋開寶集解藏器曰藤皮著樹從心重重有皮四月生紫花可愛長安人亦種之以飾庭池江東呼為招豆藤其子作角角中仁熬香著酒中令酒不敗敗酒中用之亦正其花挼碎拭酒醋白腐壞氣味甘微溫有小毒主治作煎如糖服下水主水癊病藏器落雁木海藥校正自木部移入此釋名珣曰藤蘿高丈餘雁過皆綴其中或云雁銜至代州雁門而生以此為名集解珣曰按徐表南州記云落雁木生南海山野中蔓生四邊如刀削代州雁門亦有之蜀中雅州亦有頌曰雅州出者苗作蔓纏繞大木苗葉形色大都似茶無花實彼人四月採苗入藥用莖葉氣味甘平溫無毒主治風痛傷折腳氣腫腹滿虛脹以枌木皮同煮汁洗之立效又婦人陰瘡浮泡以椿木皮同煮汁洗之李珣産後血氣痛並折傷內損諸疾煮汁服蘇頌附録折傷木唐本草恭曰生資州山谷藤繞樹木上葉似莽草葉而光厚八月九月採莖日乾味甘咸平無毒主傷折筋骨疼痛散血補血産後血悶止痛酒水各半煮濃汁飲每始王木唐本草恭曰生資州藤繞樹木上葉似蘿藦葉二月八月採莖陰乾味苦平無毒主傷折跌筋骨生肌破血止痛以酒水各半煮濃汁飲之風延母拾遺藏器曰生南海山野中他處無有也蔓繞草木上細葉南都賦云風衍蔓延于衡皋是也味苦寒無毒主小兒發熱發強驚癇寒熱熱淋利小便解煩明目並煮服之珣曰主三消五淋下痰小兒赤白毒痢蛇毒瘴溪毒一切瘡腫並宜煎服千里及校正併入圖經千里光集解藏器曰千里及藤生道旁籬落間葉細而厚宣湖間有之頌曰千里急生天台山中春生苗秋有花土人採花葉入眼藥又筠州有千里光生淺山及路旁葉似菊葉而長背有毛枝幹圓而青春生苗秋有黃花不結實採莖葉入眼藥名黃花演蓋一物也氣味苦平有小毒頌曰苦甘寒無毒主治天下疫氣結黃瘴瘧蠱毒煮汁服取吐下亦搗敷蛇犬咬藏器同甘草煮汁飲退熱明目不入衆藥蘇頌同小青煎服治赤痢腹痛時珍附方新一爛弦風眼千里光草以筍殼葉包煨熟捻汁滴入目中經驗良方藤黃海藥校正自木部移入此釋名樹名海藤珣曰按郭義恭廣志云出嶽鄂等州諸山崖樹名海藤花有蕊散落石上彼人收之謂之沙黃就樹採者輕妙謂之臘黃今人訛為銅黃銅藤音謬也此與石淚採之無異畫家及丹灶家時用之時珍曰今畫家所用藤黃皆經煎煉成者舐之麻人按周達觀真臘記云國有畫黃乃樹脂番人以刀斫樹枝滴下次年收之似與郭氏説微不同不知即一物否也氣味酸澀有毒主治蚛牙蛀齒點之便落李珣附録諸藤一十九種地龍藤拾遺藏器曰生天目山繞樹蟠屈如龍故名吳中亦有而小異味苦無毒主風血羸老腹內腰腳諸冷食不調不作肌膚浸酒服之龍手藤藏器曰出安荔浦石上向陽者葉如龍手採無時味甘溫無毒主偏風口喎手足癱緩補虛益陽去冷氣風痹以醇酒浸近火令溫空心服之取微汗牛領藤藏器曰生嶺南高山形褊如牛領取之陰乾味甘溫無毒主腹內冷腰膝痛弱小便白數陽道乏煮汁或浸酒服牛奶藤藏器曰生深山大如樹牛好食之其中有粉味甘溫無毒主救荒令人不飢其根食之令人發落鬼膊藤藏器曰生江南林澗邊葉如梨葉子如楂子藤味苦溫無毒浸酒服去風血同葉搗敷癰腫斑珠藤藏器曰生山谷中不凋子如珠而斑冬月取之味甘溫無毒浸酒服主風血羸瘦婦人諸疾息王藤藏器曰生嶺南山谷冬月不凋味苦溫無毒主産後腹痛血露不盡濃煮汁服萬一藤藏器曰生嶺南蔓如小豆一名萬吉主蛇咬杵末水和敷之曼遊藤藏器曰生犍為牙門山谷狀如寄生著大樹葉如柳春花色紫蜀人謂之沉花藤味甘溫無毒久服長生延年去久嗽治癬百丈青藏器曰生江南林澤藤蔓緊硬葉如薯蕷對生味苦寒平無毒解諸毒物天行瘴瘧疫毒並煮汁服亦生搗汁服其根令人下痢溫藤藏器曰生江南山谷著樹不凋莖葉味甘溫無毒浸酒服主風血積冷藍藤藏器曰生新羅國根如細辛味辛溫無毒主冷氣咳嗽煮汁服瓜藤宋圖經頌曰生施州四時有葉無花採皮無時味甘涼無毒主諸熱毒惡瘡同刺豬苓洗去粗皮焙乾等分搗羅用甘草水調貼之金稜藤頌曰生施州四時有葉無花採無時味辛溫無毒主筋骨疼痛與續筋根馬接腳同洗去粗皮焙乾等分為末酒服二錢無所忌含春藤頌曰生台州其苗延木冬夏常青採葉治諸風有效獨用藤頌曰生施州四時有葉無花葉上有倒刺採皮無時味苦辛熱無毒主心氣痛和小赤藥頭焙等分研末酒服一錢祁婆藤頌曰生天台山中蔓延木上四時常有土人採葉治諸風有效野豬尾頌曰生施州藤纏大木四時有葉無花味苦澀涼無毒主心氣痛解熱毒同白藥頭等分焙研為末每酒服二錢石合草頌曰生施州藤纏木上四時有葉無花土人採葉味甘涼無毒主一切惡瘡斂瘡口焙研溫水調貼
