body:
  text: 草部第十九卷草之八水草類二十三種澤瀉本經上品釋名水瀉本經鵠瀉本經及瀉別録蕍音俞芒芋本經禹孫時珍曰去水曰瀉如澤水之瀉也禹能治水故曰禹孫余未詳集解別録曰澤瀉生汝南池澤五月採葉八月採根九月採實陰乾弘景曰汝南郡屬豫州今近道亦有不堪用惟用漢中南鄭青州代州者形大而長尾間必有兩歧為好此物易朽蠹常須密藏之叢生淺水中葉狹而長恭曰今汝南不復採惟以涇州華州者為善頌曰今山東河陝江淮亦有之漢中者為佳春生苗多在淺水中葉似牛舌獨莖而長秋時開白花作叢似穀精草秋末採根曝乾根修治斆曰不計多少細銼酒浸一宿取出曝乾任用氣味甘寒無毒別録曰咸權曰苦元素曰甘平沉而降陰也杲曰甘咸寒降陰也好古曰陰中微陽入足太陽少陰經扁鵲曰多服病人眼之才曰畏海蛤文蛤主治風寒濕痹乳難養五臟益氣力肥健消水久服耳目聰明不飢延年輕身面生光能行水上本經補虛損五勞除五臟痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水別録主腎虛精自出治五淋利膀胱熱宣通水道甄權主頭旋耳虛鳴筋骨攣縮通小腸止尿血主難産補女人血海令人有子大明入腎經去舊水養新水利小便消腫脹滲泄止渴元素去脬中留垢心下水痞李杲滲濕熱行痰飲止嘔吐瀉痢疝痛腳氣時珍發明頌曰素問治酒風身熱汗出用澤瀉術深師方治支飲亦用澤瀉術但煮法小別爾張仲景治雜病心下有支飲苦冒有澤瀉湯治傷寒有大小澤瀉湯五苓散輩皆用澤瀉行利停水為最要藥元素曰澤瀉乃除濕之聖藥入腎經治小便淋瀝去陰間汗無此疾服之令人目盲宗奭曰澤瀉之功長於行水張仲景治水蓄渴煩小便不利或吐或瀉五苓散主之方用澤瀉故知其長於行水本草引扁鵲云多服病人眼誠為行去其水也凡服澤瀉散人未有不小便多者小便既多腎氣焉得復實今人止泄精多不敢用之仲景八味丸用之者亦不過引接桂附等歸就腎經別無他意好古曰本經云久服明目扁鵲云多服昏目何也易老云去脬中留垢以其味鹹能瀉伏水故也瀉伏水去留垢故明目小便利腎氣虛故昏目王履曰寇宗奭之說王好古韙之竊謂八味丸以地黃為君余藥佐之非止補血兼補氣也所謂陽旺則能生陰血也地黃山茱萸茯苓牡丹皮皆腎經之藥附子官桂乃右腎命門之藥皆不待澤瀉之接引而後至也則八味丸之用此蓋取其瀉腎邪養五臟益氣力起陰氣補虛損五勞之功而已雖能瀉腎從於諸補藥群衆之中則亦不能瀉矣時珍曰澤瀉氣平味甘而淡淡能滲泄氣味俱薄所以利水而泄下脾胃有濕熱則頭重而目昏耳鳴澤瀉滲去其濕則熱亦隨去而土氣得令清氣上行天氣明爽故澤瀉有養五臟益氣力治頭旋聰明耳目之功若久服則降令太過清氣不升真陰潛耗安得不目昏耶仲景地黃丸用茯苓澤瀉者乃取其瀉膀胱之邪氣非引接也古人用補藥必兼瀉邪邪去則補藥得力一闢一闔此乃玄妙後世不知此理專一於補所以久服必致偏勝之害也正誤弘景曰仙經服食斷谷皆用之亦云身輕能步行水上頌曰仙方亦單服澤瀉一物搗篩取末水調日分服六兩百日體輕而健行時珍曰神農書列澤瀉於上品復云久服輕身面生光能行水上典術云澤瀉久服令人身輕日行五百里走水上一名澤芝陶蘇皆以為信然愚竊疑之澤瀉行水瀉腎久服且不可又安有此神功耶其謬可知附方舊三新四酒風汗出方見麋銜下水濕腫脹白朮澤瀉各一兩為末或為丸每服三錢茯苓湯下保命集冒暑霍亂小便不利頭運引飲三白散用澤瀉白朮白茯苓各三錢水一盞姜五片燈心十莖煎八分溫服局方支飲苦冒仲景澤瀉湯用澤瀉五兩白朮二兩水二升煮一升分二服深師方先以水二升煮二物取一升又以水一升煮澤瀉取五合合此二汁分再服病甚欲眩者服之必瘥腎臟風瘡澤瀉皂莢水煮爛焙研煉蜜丸如梧子大空心溫酒下十五丸至二十丸經驗方瘧後怪症口鼻中氣出盤旋不散凝如黑蓋色過十日漸至肩胸與肉相連堅勝金石無由飲食煎澤瀉湯日飲三盞連服五日愈夏子益奇疾方葉氣味咸平無毒主治大風乳汁不出産難強陰氣久服輕身別録壯水臟通血脈大明實氣味甘平無毒主治風痹消渴益腎氣強陰補不足除邪濕久服面生光令人無子別録發明時珍曰別録言澤瀉葉及實強陰氣久服令人無子而日華子言澤瀉催生補女人血海令人有子似有不同既云強陰何以令人無子既能催生何以令人有子蓋澤瀉同補藥能逐下焦濕熱邪垢邪氣既去陰強海淨謂之有子可也若久服則腎氣大泄血海反寒謂之無子可也所以讀書不可執一附録酸惡別録有名未用曰主惡瘡去白蟲生水旁狀如澤瀉蔛草唐本草釋名蔛菜恭蔛榮集解恭曰蔛菜所在有之生水旁葉圓似澤瀉而小花青白色亦堪蒸啖江南人用蒸魚食甚美五六月採莖葉曝乾用氣味甘寒無毒主治暴熱喘息小兒丹腫恭羊蹄本經下品釋名蓄別録禿菜弘景敗毒菜綱目牛舌菜同羊蹄大黃庚辛玉冊鬼目本經東方宿同連蟲陸同水黃芹俗子名金蕎麥弘景曰今人呼為禿菜即蓄字音訛也時珍曰羊蹄以根名牛舌以葉形名禿菜以治禿瘡名也詩小雅云言採其蓫陸璣注云蓫即蓄字今之羊蹄也幽州人謂之蓫根似長蘆蔔而莖赤亦可瀹為茹滑美鄭樵通志指蓫為爾雅之菲及蕢者誤矣金蕎麥以相似名集解別録曰羊蹄生陳留川澤保升曰所在有之生下濕地春生苗高者三四尺葉狹長頗似萵苣而色深莖節間紫赤開青白花成穗結子三稜夏中即枯根似牛蒡而堅實宗奭曰葉如菜中波稜但無歧而色差青白葉厚花與子亦相似葉可潔擦䃋石子名金蕎麥燒煉家用以制鉛汞時珍曰近水及濕地極多葉長尺余似牛舌之形不似波稜入夏起苔開花結子花葉一色夏至即枯秋深即生凌冬不死根長近尺赤黃色如大黃胡蘿蔔形根氣味苦寒無毒恭曰辛苦有小毒時珍曰能制三黃砒石丹砂水銀主治頭禿疥瘙除熱女子陰蝕本經浸淫疽痔殺蟲別録療蠱毒恭治癬殺一切蟲醋磨貼腫毒大明搗汁二三匙入水半盞煎之空腹溫服治産後風祕殊驗宗奭發明震亨曰羊蹄根屬水走血分頌曰新採者磨醋塗癬速效亦煎作丸服採根不限多少搗絞汁一大升白蜜半升同熬如稠餳更用防風末六兩搜和令可丸丸如梧子大用栝蔞甘草煎酒下三二十丸日二三服附方舊六新七大便卒結羊蹄根一兩水一大盞煎六分溫服聖惠方腸風下血敗毒菜根洗切用連皮老薑各半盞同炒赤以無灰酒淬之碗蓋少頃去滓任意飲永類方喉痹不語羊蹄獨根者勿見風日及婦人雞犬以三年醋研如泥生布拭喉外令赤塗之千金方面上紫塊如錢大或滿面俱有野大黃四兩取汁穿山甲十片燒存性川椒末五錢生薑四兩取汁和研生絹包擦如干入醋潤濕數次如初纍效陸氏積德堂方癧瘍風駁羊蹄草根於生鐵上磨好醋旋旋刮塗入硫黃少許更妙日日用之聖惠汗斑癜風羊蹄根二兩獨科掃帚頭一兩枯礬五錢輕粉一錢生薑半兩同杵如泥以湯澡浴用手抓患處起粗皮以布包藥著力擦之暖臥取汗即愈也乃鹽山劉氏方比用硫黃者更妙藺氏經驗方頭風白屑羊蹄草根曝乾杵末同羊膽汁塗之永除聖惠方頭上白禿獨根羊蹄勿見婦女雞犬風日以陳醋研如泥生布擦赤敷之日一次肘後癬久不瘥簡要濟衆方用羊蹄根杵絞汁入輕粉少許和如膏塗之三五次即愈永類方治癬經年者敗毒菜根獨生者即羊蹄根搗三錢入川百藥煎二錢白梅肉擂勻以井華水一盞濾汁澄清天明空心服之不宜食熱物其滓抓破擦之三次即愈千金方治細癬用羊蹄根五升桑柴灰汁煮四五沸取汁洗之仍以羊蹄汁和礬末塗之瘑疥濕癬浸淫日廣癢不可忍愈後復發出黃水羊蹄根搗和大醋洗淨塗上一時以冷水洗之日一次千金翼疥瘡有蟲羊蹄根搗和豬脂入鹽少許日塗之外臺祕要葉氣味甘滑寒無毒主治小兒疳蟲殺胡夷魚鮭魚檀胡魚毒作菜多食滑大腑大明時珍曰胡夷鮭魚皆河豚名檀胡未詳作菜止癢不宜多食令人下氣詵連根爛蒸一碗食治腸痔瀉血甚效時珍附方舊一懸壅舌腫咽生息肉羊蹄草煮汁熱含冷即吐之聖惠實氣味苦澀平無毒主治赤白雜痢恭婦人血氣時珍酸模日華釋名山羊蹄綱目山大黃拾遺薞蕪爾雅酸母綱目蓨同當藥時珍曰薞蕪乃酸模之音轉酸模又酸母之轉皆以味而名與三葉酸母草同名掌禹錫以薞蕪為蔓菁菜誤矣集解弘景曰一種極似羊蹄而味酸呼為酸模根亦療疥也大明曰所在有之生山岡上狀似羊蹄葉而小黃莖葉俱細節間生子若茺蔚子藏器曰即是山大黃一名當藥其葉酸美人亦採食其英爾雅須薞蕪郭璞注云似羊蹄而葉細味酸可食一名蓨也時珍曰平地亦有根葉花形並同羊蹄但葉小味酸為異其根赤黃色連根葉取汁煉霜可制雄汞氣味酸寒無毒時珍曰葉酸根微苦主治暴熱腹脹生搗汁服當下利殺皮膚小蟲藏器治疥弘景療痢乃佳保升去汗斑同紫萍搗擦數日即沒時珍附方新一瘭疽毒瘡肉中忽生黯子如粟豆大者如梅李或赤或黑或青或白其中有核核有深根應心腫泡紫黑色能爛筋骨毒入臟腑殺人宜灸黯上百壯以酸模葉薄其四面防其長也內服葵根汁其毒自愈千金方附録牛舌實別録有名未用曰味鹹溫無毒主輕身益氣生水中澤旁實大葉長尺五月採實一名豕首器曰今東土人呼田水中大葉如牛耳者為牛耳菜時珍曰今人呼羊蹄為牛舌菜恐羊蹄是根此是其實否則是羊蹄之生水中者也麕舌別録曰味辛微溫無毒主霍亂腹痛吐逆心煩生水中五月採之弘景曰生小小水中今人五月五日採干以治霍亂甚良蛇舌別録有名未用曰味酸平無毒主除留血驚氣蛇癇生大水之陽四月採花八月採根龍舌草綱目集解時珍曰龍舌生南方池澤湖泊中葉如大葉菘菜及芣苡狀根生水底抽莖出水開白花根似胡蘿蔔根而香杵汁能軟鵝鴨卵方家用煮丹砂煅白礬制三黃氣味甘咸寒無毒主治癰疽湯火灼傷搗塗之時珍附方新一乳癰腫毒龍舌草忍冬藤研爛蜜和敷之多能鄙事菖蒲本經上品釋名昌陽本經堯韭普水劍草時珍曰菖蒲乃蒲類之昌盛者故曰菖蒲又呂氏春秋云冬至後五十七日菖始生菖者百草之先生者於是始耕則菖蒲昌陽又取此義也典術云堯時天降精於庭為韭感百陰之氣為菖蒲故曰堯韭方士隱為水劍因葉形也集解別録曰菖蒲生上洛池澤及蜀郡嚴道一寸九節者良露根不可用五月十二月採根陰乾弘景曰上洛郡屬梁州嚴道縣在蜀郡今乃處處有生石磧上穊節為好在下濕地大根者名昌陽不堪服食真菖蒲葉有脊一如劍刃四月五月亦作小釐花也東間溪澤又有名溪蓀者根形氣色極似石上菖蒲而葉正如蒲無脊俗人多呼此為石上菖蒲者謬矣此止主咳逆斷蚤蝨不入服食用詩詠多雲蘭蓀正謂此也大明曰菖蒲石澗所生堅小一寸九節者上出宣州二月八月採頌曰處處有之而池州戎州者佳春生青葉長一二尺許其葉中心有脊狀如劍無花實今以五月五日收之其根盤屈有節狀如馬鞭大一根旁引三四根旁根節尤密亦有一寸十二節者採之初虛軟曝乾方堅實折之中心色微赤嚼之辛香少滓人多植於乾燥砂石土中臘月移之尤易活黔蜀蠻人常將隨行以治卒患心痛其生蠻谷中者尤佳人家移種者亦堪用但干后辛香堅實不及蠻人持來者此皆醫方所用石菖蒲也又有水菖蒲生溪澗水澤中不堪入藥今藥肆所貨多以二種相雜尤難辨也承曰今陽羡山中生水石間者其葉逆水而生根鬚絡石略無少泥土根葉極緊細一寸不啻九節入藥極佳二浙人家以瓦石器種之旦暮易水則茂水濁及有泥滓則萎近方多用石菖蒲必此類也其池澤所生肥大節疏粗慢恐不可入藥唯可作果盤氣味不烈而和淡爾時珍曰菖蒲凡五種生於池澤蒲葉肥根高二三尺者泥菖蒲白菖也生於溪澗蒲葉瘦根高二三尺者水菖蒲溪蓀也生於水石之間葉有劍脊瘦根密節高尺余者石菖蒲也人家以砂栽之一年至春剪洗愈剪愈細高四五寸葉如韭根如匙柄粗者亦石菖蒲也甚則根長二三分葉長寸許謂之錢蒲是矣服食入藥須用二種石菖蒲余皆不堪此草新舊相代四時常青羅浮山記言山中菖蒲一寸二十節抱朴子言服食以一寸九節紫花者尤善蘇頌言無花實然今菖蒲二三月間抽莖開細黃花成穗而昔人言菖蒲難得見花非無花也應劭風俗通云菖蒲放花人得食之長年是矣根修治斆曰凡使勿用泥菖夏菖二件如竹根鞭形黑氣穢味腥惟石上生者根條嫩黃緊硬節稠一寸九節者是真也採得以銅刀刮去黃黑硬節皮一重以嫩桑枝條相拌蒸熟曝乾銼用時珍曰服食須如上法制若常用但去毛微炒耳氣味辛溫無毒權曰苦辛平之才曰秦皮秦艽為之使惡地膽麻黃大明曰忌飴糖羊肉勿犯鐵器令人吐逆主治風寒濕痹咳逆上氣開心孔補五臟通九竊明耳目出音聲主耳聾癰瘡溫腸胃止小便利久服輕身不忘不迷惑延年益心智高志不老本經四肢濕痹不得屈伸小兒溫瘧身積熱不解可作浴湯別録治耳鳴頭風淚下鬼氣殺諸蟲惡瘡疥瘙甄權除風下氣丈夫水臟女人血海冷敗多忘除煩悶止心腹痛霍亂轉筋及耳痛者作末炒乘熱裹罯甚驗大明心積伏梁好古治中惡卒死客忤癲癇下血崩中安胎漏散癰腫搗汁服解巴豆大戟毒時珍發明頌曰古方有單服菖蒲法蜀人治心腹冷氣搊痛者取一二寸捶碎同吳茱萸煎湯飲之亦將隨行卒患心痛嚼一二寸熱湯或酒送下亦效時珍曰國初周顛仙對太祖高皇帝常嚼菖蒲飲水問其故云服之無腹痛之疾高皇御製碑中載之菖蒲氣溫味辛乃手少陰足厥陰之藥心氣不足者用之虛則補其母也肝苦急以辛補之是矣道藏經有菖蒲傳一卷其語粗陋今略節其要云菖蒲者水草之精英神仙之靈藥也其法採緊小似魚鱗者一斤以水及米泔浸各一宿刮去皮切曝乾搗篩以糯米粥和勻更入熟蜜搜和丸如梧子大稀葛袋盛置當風處令乾每旦酒飲任下三十丸臨臥更服三十丸服至一月消食二月痰除服至五年骨髓充顏色澤白髮黑落齒更生其藥以五德配五行葉青花赤節白心黃根黑能治一切諸風手足頑痹癱緩不遂五勞七傷填血補腦堅骨髓長精神潤五臟裨六腑開胃口和血脈益口齒明耳目澤皮膚去寒熱除三尸九蟲天行時疾瘴疫瘦病瀉痢痔漏婦人帶下産後血運並以酒服河內葉敬母中風服之一年而百病愈寇天師服之得道至今廟前猶生菖蒲鄭魚曾原等皆以服此得道也又按葛洪抱朴子云韓衆服菖蒲十三年身上生毛冬袒不寒日記萬言商丘子不娶惟食菖蒲根不飢不老不知所終神仙傳云咸陽王典食菖蒲得長生安期生採一寸九節菖蒲服仙去又按臞仙神隱書云石菖蒲置一盆於几上夜間觀書則收煙無害目之患或置星露之下至旦取葉尖露水洗目大能明視久則白晝見星端午日以酒服尤妙蘇東坡云凡草生石上必須微土以附其根惟石菖蒲濯去泥土漬以清水置盆中可數十年不枯節葉堅瘦根鬚連絡蒼然於几案間久更可喜其延年輕身之功既非昌陽可比至於忍寒淡泊不待泥土而生又豈昌陽所能倣佛哉楊士瀛曰下痢噤口雖是脾虛亦熱氣閉隔心胸所致俗用木香失之溫用山藥失之閉惟參苓白朮散加石菖蒲粳米飲調下或用參苓石蓮肉少入菖蒲服胸次一開自然思食附方舊十新一十七服食法甲子日取菖蒲一寸九節者陰乾百日為末每酒服方寸匕日三服久服耳目聰明益智不忘千金方健忘益智七月七日取菖蒲為末酒服方寸匕飲酒不醉好事者服而驗之久服聰明忌鐵器千金方三十六風有不治者服之悉效菖蒲薄切日乾三斤盛以絹袋玄水一斛即清酒也懸浸之密封一百日視之如菜緑色以一斗熟黍米納中封十四日取出日飲夏禹神仙經癲癇風疾九節菖蒲不聞雞犬聲者去毛木臼搗末以黑豶豬心一個批開砂罐煮湯調服三錢日一服醫學正傳尸厥魘死尸厥之病卒死脈猶動聽其耳中如微語聲股間暖者是也魘死之病臥忽不寤勿以火照但痛齧其踵及足拇趾甲際唾其面即蘇仍以菖蒲末吹鼻中桂末納舌下並以菖蒲根汁灌之肘後方卒中客忤菖蒲生根搗汁灌之立瘥肘後方除一切惡端午日切菖蒲漬酒飲之或加雄黃少許洞天保生録喉痹腫痛菖蒲根嚼汁燒鐵稱錘淬酒一杯飲之聖濟總録霍亂脹痛生菖蒲銼四兩水和搗汁分溫四服聖惠方諸積鼓脹食積氣積血積之類石菖蒲八兩銼斑蝥四兩去翅足同炒黃去斑蝥不用以布袋盛拽去蝥末為末醋糊丸梧子大每服三五十丸溫白湯下治腫脹尤妙或入香附末二錢奇效方肺損吐血九節菖蒲末白麵等分每服三錢新汲水下一日一服聖濟録解一切毒石菖蒲白礬等分為末新汲水下事林廣記赤白帶下石菖蒲破故紙等分炒為末每服二錢更以菖蒲浸酒調服日一婦人良方胎動半産卒動不安或腰痛胎轉搶心下血不止或日月未足而欲産並以菖蒲根搗汁一二升服之千金産後崩中下血不止菖蒲一兩半酒二盞煎取一盞去滓分三服食前溫服千金方耳卒聾閉菖蒲根一寸巴豆一粒去心同搗作七丸綿裹一丸塞耳日一換一方不用巴豆用萆麻仁肘後方病後耳聾生菖蒲汁滴之聖惠方蚤蝨入耳菖蒲末炒熱袋盛枕之即愈聖濟録諸般赤眼攀睛雲翳菖蒲擂自然汁文武火熬作膏日點之效聖濟録眼瞼挑針獨生菖蒲根同鹽研敷壽域神方飛絲入目石菖蒲捶碎左目塞右鼻右目塞左鼻百發百中危氏得效方頭瘡不瘥菖蒲末油調敷之日三夜二次法天生意癰疽發背生菖蒲搗貼之瘡乾者為末水調塗之孫用和祕寶方露岐便毒生菖蒲根搗敷之證治要訣熱毒濕瘡宗奭曰有人遍身生瘡痛而不癢手足尤甚黏著衣被曉夕不得睡有人教以菖蒲三斗日乾為末布席上臥之仍以衣被覆之既不黏衣又復得睡不五七日其瘡如失後以治人應手神驗本草衍義風癬有蟲菖蒲末五斤以酒三升漬釜中蒸之使味出先絶酒一日每服一升或半升千金方陰汗濕癢石菖蒲蛇床子等分為末日搽二三次濟急仙方葉主治洗疥大風瘡時珍白菖別録有名未用釋名水菖別録水宿別録莖蒲別録菖陽拾遺溪蓀拾遺蘭蓀弘景時珍曰此即今池澤所生菖蒲葉無劍脊根肥白而節疏慢故謂之白菖古人以根為菹食謂之菖本亦曰菖歜文王好食之其生溪澗者名溪蓀集解別録曰白菖十月採藏器曰即今之溪蓀也一名菖陽生水畔人亦呼為菖蒲與石上菖蒲都別根大而臭色正白頌曰水菖蒲生溪澗水澤中甚多失水則枯葉似石菖但中心無脊其根干後輕虛多滓不堪入藥時珍曰此有二種一種根大而肥白節疏者白菖也俗謂之泥菖蒲一種根瘦而赤節稍密者溪蓀也俗謂之水菖蒲葉俱無劍脊溪蓀氣味勝似白菖並可殺蟲不堪服食氣味甘無毒別録曰甘辛溫汁制雄黃雌黃砒石主治食諸蟲別録主風濕咳逆去蟲斷蚤蝨弘景研末油調塗疥瘙蘇頌香蒲本經上品蒲黃本經上品釋名甘蒲蘇恭醮石吳普花上黃粉名蒲黃恭曰香蒲即甘蒲可作薦者春初生取白為菹亦堪蒸食山南人謂之香蒲以菖蒲為臭蒲也蒲黃即此蒲之花也集解別録曰香蒲生南海池澤蒲黃生河東池澤四月採之頌曰香蒲蒲黃苗也處處有之以泰州者為良春初生嫩葉未出水時紅白色茸茸然取其中心入地白蒻大如匕柄者生啖之甘脆又以醋浸如食筍大美周禮謂之蒲菹今人罕有食之者至夏抽梗於叢葉中花抱梗端如武士棒杵故俚俗謂之蒲槌亦曰蒲釐花其蒲黃即花中蕊屑也細若金粉當欲開時便取之市𠪨以蜜搜作果食貨賣時珍曰蒲叢生水際似莞而褊有脊而柔二三月苗採其嫩根瀹過作鮓一宿可食亦可炸食蒸食及曬乾磨粉作餅食詩云其蔌伊何惟筍及蒲是矣八九月收葉以為席亦可作扇軟滑而溫正誤弘景曰香蒲方藥不復用人無採者南海人亦不復識江南貢菁茅一名香茅以供宗廟縮酒或云是薰草又云是燕麥此蒲亦相類耳恭曰陶氏所引菁茅乃三脊茅也香茅燕麥薰草野俗皆識都非香蒲類也蒲蒻一名蒲筍食物蒲兒根野菜譜氣味甘平無毒時珍曰寒主治五臟心下邪氣口中爛臭堅齒明目聰耳久服輕身耐老本經去熱燥利小便寧原生啖止消渴汪穎補中益氣和血脈正要搗汁服治妊婦勞熱煩躁胎動下血時珍出産乳附方舊一新一妒乳乳癰蒲黃草根搗封之並煎汁飲及食之咱殷産寶熱毒下痢蒲根二兩粟米二合水煎服日二次聖濟總録蒲黃本經上品修治斆曰凡使勿用松黃並黃蒿其二件全似只是味跙及吐人真蒲黃鬚隔三重紙焙令色黃蒸半日卻再焙乾用之妙大明曰破血消腫者生用之補血止血者須炒用氣味甘平無毒主治心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙本經治痢血鼻衄吐血尿血瀉血利水道通經脈止女子崩中甄權婦人帶下月候不勻血氣心腹痛妊婦下血墜胎血運血症兒枕急痛顛撲血悶排膿瘡癤遊風腫毒下乳汁止泄精大明涼血活血止心腹諸痛時珍發明弘景曰蒲黃即蒲釐花上黃粉也甚療血仙經亦用之宗奭曰汴人初得羅去滓以水調為膏擘為塊人多食之以解心臟虛熱小兒尤嗜之過月則燥色味皆淡須蜜水和不可多食令人自利極能虛人時珍曰蒲黃手足厥陰血分藥也故能治血治痛生則能行熟則能止與五靈脂同用能治一切心腹諸痛詳見禽部寒號蟲下按許叔微本事方云有士人妻舌忽脹滿口不能出聲一老叟教以蒲黃頻摻比曉乃愈又芝隱方云宋度宗欲賞花一夜忽舌腫滿口蔡御醫用蒲黃乾薑末等分干搽而愈據此二說則蒲黃之涼血活血可證矣蓋舌乃心之外候而手厥陰相火乃心之臣使得乾薑是陰陽相濟也附方舊十四新十一舌脹滿口方見上重舌生瘡蒲黃末敷之不過三上瘥千金方肺熱衄血蒲黃青黛各一錢新汲水服之或去青黛入油發灰等分生地黃汁調下簡便單方吐血唾血蒲黃末二兩每日溫酒或冷水服三錢妙簡要濟衆方幼兒吐血蒲黃末每服半錢生地黃汁調下量兒大小加減或入發灰等分同上小便出血方同上小便轉胞以布包蒲黃裹腰腎令頭致地數次取通肘後方金瘡出血悶絶蒲黃半兩熱酒灌下危氏方瘀血內漏蒲黃末二兩每服方寸匕水調下服盡止肘後方腸痔出血蒲黃末方寸匕水服之日三服肘後方鼠奶痔瘡蒲黃末空心溫酒服方寸匕日三塞上方脫肛不收蒲黃和豬脂敷日三五度子母祕録胎動欲産日月未足者蒲黃二錢井華水服同上産婦催生蒲黃地龍洗焙陳橘皮等分為末另收臨時各抄一錢新汲水調服立産此常親用甚妙唐慎微方胞衣不下蒲黃二錢井水服之集驗方産後下血羸瘦逮死蒲黃二兩水二升煎八合頓服産寶方産後血瘀蒲黃三兩水三升煎一升頓服梅師方兒枕血瘕蒲黃三錢米飲服産寶産後煩悶蒲黃方寸匕東流水服極良産寶墜傷撲損瘀血在內煩悶者蒲黃末空心溫酒服三錢塞上方關節疼痛蒲黃八兩熟附子一兩為末每服一錢涼水下日一肘後方陰下濕癢蒲黃末敷三四度瘥千金方聤耳出膿蒲黃末摻之聖惠口耳大衄蒲黃阿膠炙各半兩每用二錢水一盞生地黃汁一合煎至六分溫服急以帛系兩乳止乃已聖惠方耳中出血蒲黃炒黑研末摻入簡便方滓大明曰蒲黃中篩出赤滓名曰蒲萼也主治炒用澀腸止瀉血血痢妙大明菰別録下品釋名茭草說文蔣草時珍曰按許氏說文菰本作苽從瓜諧聲也有米謂之凋菰已見谷部菰米下江南人呼菰為茭以其根交結也蔣義未詳集解保升曰菰根生水中葉如蔗荻久則根盤而厚夏月生菌堪啖名菰菜三年者中心生白苔如藕狀似小兒臂而白軟中有黑脈堪啖者名菰首也藏器曰菰首小者擘之內有黑灰如墨者名烏郁人亦食之晉張翰思吳中蓴菰即此也頌曰菰根江湖陂澤中皆有之生水中葉如蒲葦輩刈以秣馬甚肥春末生白茅如筍即菰菜也又謂之茭白生熟皆可啖甜美其中心如小兒臂者名菰手作菰首者非矣爾雅云出隧蘧蔬注云生菰草中狀似土菌江東人啖之甜滑即此也故南方人至今謂菌為菰亦緣此義其根亦如蘆根冷利更甚二浙下澤處菰草最多其根相結而生久則並土浮於水上彼人謂之菰葑刈去其葉便可耕蒔又名葑田其苗有莖梗者謂之菰蔣草至秋結實乃雕胡米也歲飢人以當糧宗奭曰菰乃蒲類河朔邊人止以飼馬作薦八月開花如葦結青子合粟為粥食甚濟飢杜甫所謂波漂菰米沉云黑者是也菰筍一名茭筍日用茭白圖經菰菜同氣味甘冷滑無毒詵曰滑中不可多食頌曰菰之種類皆極冷不可過食甚不益人惟服金石人相宜耳主治利五臟邪氣酒齇面赤白癩癧瘍目赤熱毒風氣卒心痛可鹽醋煮食之孟詵去煩熱止渴除目黃利大小便止熱痢雜鯽魚為羹食開胃口解酒毒壓丹石毒發藏器菰手一名菰菜日用茭白通志茭粑俗名蘧蔬音氍㲣氣味甘冷滑無毒大明曰微毒詵曰性滑發冷氣令人下焦寒傷陽道禁蜜食發痼疾服巴豆人不可食主治心胸中浮熱風氣滋人齒孟詵煮食止渴及小兒水痢藏器菰根氣味甘大寒無毒頌曰菰根亦如蘆根冷利更甚主治腸胃痼熱消渴止小便利搗汁飲之別録燒灰和雞子白塗火燒瘡藏器附方舊二小兒風瘡久不愈者用菰蔣節燒研敷之子母祕録毒蛇傷齧菰蔣草根燒灰敷之廣濟方葉主治利五臟大明菰米見谷部苦草綱目集解時珍曰生湖澤中長二三尺狀如茅蒲之類氣味缺主治婦人白帶煎湯服又主好嗜干茶不已面黃無力為末和炒脂麻不時干嚼之時珍水萍本經中品釋名水花本經水白別録水蘇別録水廉吳普集解別録曰水萍生雷澤池澤三月採曝乾弘景曰此是水中大萍非今浮萍子藥録云五月有花白色即非今溝渠所生者楚王渡江所得乃斯實也藏器曰水萍有三種大者曰蘋葉圓闊寸許小萍子是溝渠間者本經雲水萍應是小者頌曰爾雅云萍蓱其大者蘋蘇恭言有三種大者曰蘋中者曰荇小者即水上浮萍今醫家鮮用大蘋惟用浮萍時珍曰本草所用水萍乃小浮萍非大蘋也陶蘇俱以大蘋注之誤矣萍之與蘋音雖相近字卻不同形亦迥別今釐正之互見蘋下浮萍處處池澤止水中甚多季春始生或云楊花所化一葉經宿即生數葉葉下有微須即其根也一種背面皆緑者一種面青背紫赤若血者謂之紫萍入藥為良七月採之淮南萬畢術云老血化為紫萍恐自有此種不盡然也小雅呦呦鹿鳴食野之蘋者乃蒿屬陸佃指為此萍誤矣修治時珍曰紫背浮萍七月採之揀淨以竹篩攤曬下置水一盆映之即易干也氣味辛寒無毒別録曰酸主治暴熱身癢下水氣勝酒長鬚發止消渴久服輕身本經下氣以沐浴生毛髮別録治熱毒風熱熱狂熁腫毒湯火傷風疹大明搗汁服主水腫利小便為末酒服方寸匕治人中毒為膏敷面䵟藏器主風濕麻痹腳氣打撲傷損目赤翳膜口舌生瘡吐血衄血癜風丹毒時珍發明震亨曰浮萍發汗勝於麻黃頌曰俗醫用治時行熱病亦堪發汗甚有功其方用浮萍一兩四月十五日採之麻黃去根節桂心附子炮裂去臍皮各半兩四物搗細篩每服一錢以水一中盞生薑半分煎至六分和滓熱服汗出乃瘥又治惡疾癘瘡遍身者濃煮汁漬浴半日多效此方甚奇古也時珍曰浮萍其性輕浮入肺經達皮膚所以能發揚邪汗也世傳宋時東京開河掘得石碑梵書大篆一詩無能曉者真人林靈素逐字辨譯乃是治中風方名去風丹也詩云天生靈草無根干不在山間不在岸始因飛絮逐東風泛梗青青飄水面神仙一味去沉疴採時須在七月半選甚癱風與大風些小微風都不算豆淋酒化服三丸鐵鏷頭上也出汗其法以紫色浮萍曬乾為細末煉蜜和丸彈子大每服一粒以豆淋酒化下治左癱右瘓三十六種風偏正頭風口眼喎斜大風癩風一切無名風及腳氣並打撲傷折及胎孕有傷服過百粒即為全人此方後人易名紫萍一粒丹附方舊七新十八夾驚傷寒紫背浮萍一錢犀角屑半錢釣藤鉤三七個為末每服半錢蜜水調下連進三服出汗為度聖濟録消渴飲水日至一石者浮萍搗汁服之又方用干浮萍栝蔞根等分為末人乳汁和丸梧子大空腹飲服二十丸三年者數日愈千金方小便不利膀胱水氣流滯浮萍日乾為末飲服方寸匕日二服千金翼水氣洪腫小便不利浮萍日乾為末每服方寸匕白湯下日二服聖惠方霍亂心煩蘆根炙一兩半水萍焙人參枇杷葉炙各一兩每服五錢入薤白四寸酒煎溫服聖惠方吐血不止紫背浮萍焙半兩黃耆炙二錢半為末每服一錢薑蜜水調下聖濟總録鼻衄不止浮萍末吹之聖惠方中水毒病手足指冷至膝肘即是以浮萍日乾為末飲服方寸匕良千金方大腸脫肛水聖散用紫浮萍為末干貼之危氏得效方身上虛癢浮萍末一錢以黃芩一錢同四物湯煎湯調下丹溪纂要風熱癮疹浮萍蒸過焙乾牛蒡子酒煮曬乾炒各一兩為末每薄荷湯服一二錢日二次古今録驗風熱丹毒浮萍搗汁遍塗之子母祕録汗斑癜風端午日收紫背浮萍曬乾每以四兩煎水浴並以萍擦之或入漢防己二錢亦可袖珍方少年面皰聖惠方用浮萍日挼盦之並飲汁少許普濟方用紫背萍四兩防己一兩煎濃汁洗之仍以萍於斑䵟上熱擦日三五次物雖微末其功甚大不可小看普濟方粉滓面䵟溝渠小萍為末日敷之聖惠方大風癘疾浮萍草三月採淘三五次窨三五日焙為末不得見日每服三錢食前溫酒下常持觀音聖號忌豬魚雞蒜又方七月七日取紫背浮萍日乾為末半升入好消風散五兩每服五錢水煎頻飲仍以煎湯洗浴之十便良方癍瘡入目浮萍陰乾為末以生羊子肝半個同水半盞煮熟搗爛絞汁調末服甚者不過一服已傷者十服見效危氏得效方弩肉攀睛青萍少許研爛入片腦少許貼眼上效危氏得效方毒腫初起水中萍子草搗敷之肘後方發背初起腫焮赤熱浮萍搗和雞子清貼之聖惠方楊梅瘡癬水萍煎汁浸洗半日數日一作集簡方燒煙去蚊五月取浮萍陰乾用之孫真人方蘋吳普本草釋名芣菜拾遺四葉菜卮言田字草時珍曰蘋本作薲左傳蘋蘩蘊藻之菜可薦於鬼神可羞於王公則薲有賓之之義故字從賓其草四葉相合中折十字故俗呼為四葉菜田字草破銅錢皆象形也諸家本草皆以蘋注水萍蓋由蘋萍二字音相近也按韻書蘋在真韻蒲真切萍在庚韻蒲經切切腳不同為物亦異今依吳普本草別出於此集解普曰水萍一名水廉生池澤水上葉圓小一莖一葉根入水底五月花白三月採日乾之弘景曰水中大萍五月有花白色非溝渠所生之萍楚王渡江所得即斯實也恭曰萍有三種大者名蘋中者名荇葉皆相似而圓其小者即水上浮萍也藏器曰蘋葉圓闊寸許葉下有一點如水沫一名芣菜曝乾可入藥用小萍是溝渠間者禹錫曰按爾雅云萍蓱也其大者曰蘋又詩云於以採蘋於澗之濱陸璣注云其粗大者謂之蘋小者為萍季春始生可糝蒸為茹又可以苦酒淹之按酒今醫家少用此蘋惟用小萍耳時珍曰蘋乃四葉菜也葉浮水面根連水底其莖細於蓴荇其葉大如指頂面青背紫有細紋頗似馬蹄決明之葉四葉合成中折十字夏秋開小白花故稱白蘋其葉攢簇如萍故爾雅謂大者為蘋也呂氏春秋云菜之美者有崑崙之蘋即此韓詩外傳謂浮者為薸沉者為蘋臞仙謂白花者為蘋黃花者為荇即金蓮也蘇恭謂大者為蘋小者為荇楊慎卮言謂四葉菜為荇陶弘景謂楚王所得者為蘋皆無一定之言蓋未深加體審惟據紙上猜度而已時珍一一採視頗得其真云其葉徑一二寸有一缺而形圓如馬蹄者蓴也似蓴而稍尖長者荇也其花並有黃白二色葉徑四五寸如小荷葉而黃花結實如小角黍者萍蓬草也楚王所得萍實乃此萍之實也四葉合成一葉如田字形者蘋也如此分別自然明白又項氏言白蘋生水中青蘋生陸地按今之田字草有水陸二種陸生者多在稻田沮洳之處其葉四片合一與白蘋一樣但莖生地上高三四寸不可食方士取以煅硫結砂煮汞謂之水田翁項氏所謂青蘋蓋即此也或以青蘋為水草誤矣氣味甘寒滑無毒主治暴熱下水氣利小便吳普搗塗熱瘡搗汁飲治蛇傷毒入腹內曝乾栝蔞等分為末人乳和丸服止消渴藏器食之已勞山海經萍蓬草拾遺釋名水粟綱目水栗子時珍曰陳藏器拾遺萍蓬草即今水粟也其子如粟如蓬子也俗人呼水粟包又云水栗子言其根味也或作水笠集解藏器曰萍蓬草生南方池澤葉大如荇花亦黃未開時狀如算袋其根如藕饑年可以當谷時珍曰水粟三月出水莖大如指葉似荇葉而大徑四五寸初生如荷葉六七月開黃花結實狀如角黍長二寸許內有細子一包如罌粟澤農採之洗擦去皮蒸曝舂取米作粥飯食之其根大如栗亦如雞頭子根儉年人亦食之作藕香味如栗子昔楚王渡江得萍實大如斗赤如日食之甜如蜜者蓋此類也若水萍安得有實耶三四月採莖葉取汁煮硫黃能拒火又段公路北戶録有睡蓮亦此類也其葉如荇而大其花布葉數重當夏晝開花夜縮入水晝復出也子氣味甘澀平無毒主治助脾厚腸令人不飢時珍根氣味甘寒無毒主治煮食補虛益氣力久食不飢厚腸胃藏器荇菜唐本草釋名鳧葵唐本水葵馬融傳水鏡草土宿本草靨子菜野菜譜金蓮子接余時珍曰按爾雅云荇接余也其葉苻則鳧葵當作苻葵古文通用耳或云鳧喜食之故稱鳧葵亦通其性滑如葵其葉頗似荇故曰葵曰荇詩經作荇俗呼荇絲菜池人謂之荇公須淮人謂之靨子菜江東謂之金蓮子許氏說文謂之䖂音戀楚詞謂之屏風云紫莖屏風文緑波是矣集解恭曰鳧葵即荇菜也生水中頌曰處處池澤有之葉似蓴而莖澀根甚長花黃色郭璞注爾雅云叢生水中葉圓在莖端長短隨水深淺江東人食之陸璣詩疏云荇莖白而葉紫赤色正圓徑寸余浮在水上根在水底大如叉股上青下白可以按酒用苦酒浸其白莖肥美今人不食醫方亦鮮用之時珍曰荇與蓴一類二種也並根連水底葉浮水上其葉似馬蹄而圓者蓴也葉似蓴而微尖長者荇也夏月俱開黃花亦有白花者結實大如棠梨中有細子按寧獻王庚辛玉冊云鳧葵黃花者是荇菜白花者是白蘋即水鏡草一種泡子名水鱉雖有數種其用一也其莖葉根花並可伏硫煮砂制礬此以花色分別蘋荇似亦未穩詳見蘋下正誤恭曰鳧葵南人名豬蓴堪食有名未用條中載也志曰鳧葵即荇菜葉似蓴根極長江南人多食之今云是豬蓴誤矣今以春夏細長肥滑者為絲蓴至冬粗短者為豬蓴亦呼為龜蓴與鳧葵殊不相似也而有名未用類即無鳧葵豬蓴之名蓋後人刪去也時珍曰楊慎卮言以四葉菜為荇者亦非也四葉菜乃蘋也氣味甘冷無毒主治消渴去熱淋利小便唐本搗汁服療寒熱開寶搗敷諸腫毒火丹遊腫時珍附方新四一切癰疽及瘡癤用荇絲菜或根馬蹄草莖或子即蓴也各取半碗同苧麻根五寸去皮以石器搗爛敷毒四圍春夏秋日換四五次冬換二三次換時以薺水洗之甚效保生余録穀道生瘡荇葉搗爛綿裹納之下部日三次範汪方毒蛇螫傷牙入肉中痛不可堪者勿令人知私以荇葉覆其上穿以物包之一時折牙自出也肘後方點眼去翳荇絲菜根一錢半搗爛即葉如馬蹄開黃花者川楝子十五個膽礬七分石決明五錢皂莢一兩海螵蛸二錢各為末同菜根以水一鍾浸二宿去滓一日點數次七日見效也孫氏集效方蓴別録下品釋名茆卯柳二音水葵詩疏露葵綱目馬蹄草時珍曰蓴字本作蓴從純純乃絲名其莖似之故也齊民要術云蓴性純而易生種以淺深為候水深則莖肥而葉少水淺則莖瘦而葉多其性逐水而滑故謂之蓴菜並得葵名顏之推家訓云蔡朗父諱純改蓴為露葵北人不知以緑葵為之詩云薄採其茆即蓴也或諱其名謂之錦帶集解保升曰蓴葉似鳧葵浮在水上採莖堪啖花黃白色子紫色三月至八月莖細如叉股黃赤色短長隨水深淺名為絲蓴味甜體軟九月至十月漸粗硬十一月萌在泥中粗短名瑰蓴味苦體澀人惟取汁作羹猶勝雜菜時珍曰蓴生南方湖澤中惟吳越人善食之葉如荇菜而差圓形似馬蹄其莖紫色大如箸柔滑可羹夏月開黃花結實青紫色大如棠梨中有細子春夏嫩莖未葉者名稚蓴稚者小也葉稍舒長者名絲蓴其莖如絲也至秋老則名葵蓴或作豬蓴言可飼豬也又訛為瑰蓴黽蓴焉余見鳧葵下氣味甘寒無毒藏器曰蓴雖水草而性熱擁詵曰蓴雖冷補熱食及多食亦擁氣不下甚損人胃及齒令人顏色惡損毛髮和醋食令人骨痿李廷飛曰多食性滑發痔七月有蟲著上食之令人霍亂主治消渴熱痹別録和鯽魚作羹食下氣止嘔多食壓丹石補大小腸虛氣不宜過多孟詵治熱疸厚腸胃安下焦逐水解百藥毒並蠱氣大明發明弘景曰蓴性冷而補下氣雜鱧魚作羹食亦逐水而性滑服食家不可多用恭曰蓴久食大宜人合鮒魚作羹食主胃弱不下食者至效又宜老人應入上品故張翰臨秋風思吳中之鱸魚蓴羹也藏器曰蓴體滑常食發氣令關節急嗜睡腳氣論中令人食之此誤極深也溫病後脾弱不能磨化食者多死豫所居近湖湖中有蓴藕年中疫甚飢人取蓴食之雖病瘥者亦死至秋大旱人多血痢湖中水竭掘藕食之闔境無他蓴藕之功於斯見矣附方新三一切癰疽馬蹄草即蓴菜春夏用莖冬月用子就於根側尋取搗爛敷之未成即消已成即毒散用葉亦可保生余録頭上惡瘡以黃泥包豆豉煨熟取出為末以蓴菜汁調敷之保幼大全數種疔瘡馬蹄草又名缺盆草大青葉臭紫草各等分擂爛以酒一碗浸之去滓溫服三服立愈經驗良方水藻綱目釋名時珍曰藻乃水草之有紋者潔淨如澡浴故謂之藻集解頌曰藻生水中處處有之周南詩云於以採藻於沼於沚於彼行潦是也陸璣注云藻生水底有二種一種葉如雞蘇莖如箸長四五尺一種葉如蓬蒿莖如叉股謂之聚藻二藻皆可食煮熟挼去腥氣米麵糝蒸為茹甚滑美荊揚人饑荒以當穀食藏器曰馬藻生水中如馬齒相連時珍曰藻有二種水中甚多水藻葉長二三寸兩兩對生即馬藻也聚藻葉細如絲及魚鰓狀節節連生即水蘊也俗名鰓草又名牛尾蘊是矣爾雅云莙牛藻也郭璞注云細葉蓬茸如絲可愛一節長數寸長者二三十節即蘊也二藻皆可食入藥以藻為勝左傳云蘋蘩蘊藻之菜即此氣味甘大寒滑無毒主治去暴熱熱痢止渴搗汁服之小兒赤白遊疹火焱熱瘡搗爛封之藏器發明思邈曰凡天下極冷無過藻菜但有患熱毒腫並丹毒者取渠中藻菜切搗敷之厚三分干即易其效無比海藻本經中品釋名𧂇音單出爾雅別録作藫落首本經海蘿爾雅注集解別録曰海藻生東海池澤七月七日採曝乾弘景曰生海島上黑色如亂髮而大少許葉大都似藻葉藏器曰此有二種馬尾藻生淺水中如短馬尾細黑色用之當浸去鹹味大葉藻生深海中及新羅葉如水藻而大海人以繩繫腰沒水取之五月以後有大魚傷人不可取也爾雅云綸似綸組似組東海有之正為二藻也頌曰此即水藻生於海中者今登萊諸州有之陶隱居引爾雅綸組注昆布謂昆布似組青苔紫菜似綸而陳藏器以綸組為二藻陶說似近之時珍曰海藻近海諸地採取亦作海菜乃立名目貨之四方云修治斆曰凡使須用生烏豆並紫背天葵三件同蒸伏時日乾用時珍曰近人但洗淨鹹味焙乾用氣味苦咸寒無毒權曰咸有小毒之才曰反甘草時珍曰按東垣李氏治瘰癧馬刀散腫潰堅湯海藻甘草兩用之蓋以堅積之病非平和之藥所能取捷必令反奪以成其功也主治癭瘤結氣散頸下硬核痛癰腫癥瘕堅氣腹中上下雷鳴下十二水腫本經療皮間積聚暴㿉瘤氣結熱利小便別録闢百邪鬼魅治氣急心下滿疝氣下墜疼痛卵腫去腹中幽幽作聲甄權治奔豚氣腳氣水氣浮腫宿食不消五膈痰壅李珣發明元素曰海藻氣味俱厚純陰沉也治癭瘤馬刀諸瘡堅而不潰者經云咸能軟堅營氣不從外為浮腫隨各引經藥治之腫無不消成無己曰鹹味湧泄故海藻之咸以泄水氣也詵曰海藻起男子陰消男子㿉疾宜常食之南方人多食北方人效之倍生諸疾更不宜矣時珍曰海藻咸能潤下寒能泄熱引水故能消癭瘤結核陰㿉之堅聚而除浮腫腳氣留飲痰氣之濕熱使邪氣自小便出也附方舊二新二海藻酒治癭氣用海藻一斤絹袋盛之以清酒二升浸之春夏二日秋冬三日每服兩合日三酒盡再作其滓曝乾為末每服方寸匕日三服不過兩劑即瘥肘後方癭氣初起海藻一兩黃連二兩為末時時舐咽先斷一切厚味丹溪方項下瘰癧如梅李狀宜連服前方海藻酒消之肘後方蛇盤瘰癧頭項交接者海藻菜以蕎麵炒過白殭蠶炒等分為末以白梅泡湯和丸梧子大每服六十丸米飲下必泄出毒氣危氏得效方海蘊溫縕醞三音拾遺校正自草部移入此釋名時珍曰縕亂絲也其葉似之故名氣味咸寒無毒主治癭瘤結氣在喉間下水藏器主水癊蘇頌海帶宋嘉祐集解禹錫曰海帶出東海水中石上似海藻而粗柔韌而長今登州人干之以束器物醫家用以下水勝於海藻昆布氣味咸寒無毒主治催生治婦人病及療風下水嘉祐治水病癭瘤功同海藻時珍昆布別録中品釋名綸布時珍曰按吳普本草綸布一名昆布則爾雅所謂綸似綸東海有之者即昆布也綸音關青絲綬也訛而為昆耳陶弘景以綸為青苔紫菜輩謂組為昆布陳藏器又謂綸組是二種藻不同如此集解別録曰昆布生東海弘景曰今惟出高麗繩把索之如卷麻作黃黑色柔韌可食爾雅云綸似綸組似組東海有之今青苔紫菜皆似綸而昆布亦似組恐即是也藏器曰昆布生南海葉如手大似薄葦紫赤色其細葉者海藻也珣曰其草順流而生出新羅者葉細黃黑色胡人搓之為索陰乾從舶上來中國時珍曰昆布生登萊者搓如繩索之狀出閩浙者大葉似菜蓋海中諸菜性味相近主療一致雖稍有不同亦無大異也修治斆曰凡使昆布每一斤用甑箅大小十個同銼細以東流水煮之從巳至亥待鹹味去乃曬焙用氣味咸寒滑無毒普曰酸咸寒無毒權曰溫有小毒主治十二種水腫癭瘤聚結氣瘻瘡別録破積聚思邈治陰㿉腫含之咽汁藏器利水道去面腫治惡瘡鼠瘻甄權發明杲曰咸能軟堅故癭堅如石者非此不除與海藻同功詵曰昆布下氣久服瘦人無此疾者不可食海島之人愛食之為無好菜只食此物服久相習病亦不生遂傳說其功於北人北人食之皆生病是水土不宜耳凡是海中菜皆損人不可多食附方舊四昆布臛治膀胱結氣急宜下氣用高麗昆布一斤白米泔浸一宿洗去鹹味以水一斛煮熟劈細入蔥白一握寸斷之更煮極爛乃下鹽酢豉糝姜橘椒末調和食之仍宜食粱米粳米飯極能下氣無所忌海藻亦可依此法作之廣濟方癭氣結核癗癗腫硬以昆布一兩洗去咸曬乾為散每以一錢綿裹好醋中浸過含之咽津味盡再易之聖惠方項下五癭方同上千金翼項下卒腫其囊漸大欲成癭者昆布海藻等分為末蜜丸杏核大時時含之咽汁外臺越王余算拾遺釋名集解珣曰越王余算生南海水中如竹算子長尺許劉敬叔異苑云昔晉安越王渡南海將黑角白骨作算籌其有餘者棄於水中而生此故葉白者似骨黑者似角遂名之相傳可食氣味咸溫無毒主治水腫浮氣結聚宿滯不消腹中虛鳴並煮服之李珣附録沙箸時珍曰按劉恂嶺表録異有沙箸似是余算之類今附於此云海岸沙中生沙箸春吐苗其心若骨白而且徑可為酒籌凡欲採者須輕步向前拔之不然聞行聲遽縮入沙中不可得也石帆日華集解弘景曰石帆狀如柏水松狀如松藏器曰石帆生海底高尺余根如漆色至梢上漸軟作交羅紋大明曰石帆紫色梗大者如箸見風漸硬色如漆人以飾作珊瑚裝頌曰左思吳都賦草則石帆水松劉淵林注云石帆生海嶼石上草類也無葉高尺許其花離樓相貫連若死則浮水中人於海邊得之稀有見其生者氣味甜咸平無毒主治石淋弘景煮汁服主婦人血結月閉藏器水松綱目集解弘景曰水松狀如松頌曰出南海及交趾生海水中氣味甘咸寒無毒主治溪毒弘景水腫催生藏器
