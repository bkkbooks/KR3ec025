body:
  text: 草部第二十卷草之九石草類一十九種石斛本經上品釋名石蓫別錄金釵綱目禁生別錄林蘭本經杜蘭別錄時珍曰石斛名義未詳其莖狀如金釵之股故古有金釵石斛之稱今蜀人栽之呼為金釵花盛弘之荊州記云耒陽龍石山多石斛精好如金釵是矣林蘭杜蘭與木部木蘭同名恐誤集解別錄曰石斛生六安山谷水旁石上七月八月採莖陰乾弘景曰今用石斛出始興生石上細實以桑灰湯沃之色如金形如蚱蜢髀者佳近道亦有次於宣城者其生櫟木上者名木斛其莖至虛長大而色淺不入丸散惟可為酒漬煮之用俗方最以補虛療腳膝恭曰今荊襄及漢中江左又有二種一種似大麥累累相連頭生一葉而性冷名麥斛一種莖大如雀髀葉在莖頭名雀髀斛其他斛如竹而節間生葉也作干石斛法以酒洗蒸曝成不用灰湯或言生者漬酒勝於乾者頌曰今荊州光州壽州廬州江州溫州台州亦有之以廣南者為佳多在山谷中五月生苗莖似小竹節節間出碎葉七月開花十月結實其根細長黃色惟生石上者為勝宗奭曰石斛細若小草長三四寸柔韌折之如肉而實今人多以木斛混之亦不能明木斛中虛如禾草長尺余但色深黃光澤耳時珍曰石斛叢生石上其根糾結甚繁干則白軟其莖葉生皆青色干則黃色開紅花節上自生根鬚人亦折下以砂石栽之或以物盛掛屋下頻澆以水經年不死俗稱為千年潤石斛短而中實木斛長而中虛甚易分別處處有之以蜀中者為勝修治斆曰凡使去根頭用酒浸一宿曝乾以酥拌蒸之從巳至酉徐徐焙乾用入補藥乃效氣味甘平無毒普曰神農甘平扁鵲酸李當之寒時珍曰甘淡微咸之才曰陸英為之使惡凝水石巴豆畏雷丸殭蠶主治傷中除痹下氣補五臟虛勞羸瘦強陰益精久服厚腸胃本經補內絕不足平胃氣長肌肉逐皮膚邪熱痱氣腳膝疼冷痹弱定志除驚輕身延年別錄益氣除熱治男子腰腳軟弱健陽逐皮肌風痹骨中久冷補腎益力權壯筋骨暖水臟益智清氣日華治發熱自汗癰疽排膿內塞時珍發明斆曰石斛鎮涎澀丈夫元氣酒浸酥蒸服滿一鎰永不骨痛也宗奭曰石斛治胃中虛熱有功時珍曰石斛氣平味甘淡微咸陰中之陽降也乃足太陰脾足少陰右腎之藥深師云囊濕精少小便餘瀝者宜加之一法每以二錢入生薑一片水煎代茶飲甚清肺補脾也附方新二睫毛倒入川石斛川芎藭等分為末口內含水隨左右㗜鼻日二次袖珍方飛蟲入耳石斛數條去根如筒子一邊紝入耳中四畔以蠟封閉用火燒石斛盡則止熏右耳則蟲從左出未出更作聖濟骨碎補宋開寶釋名猴姜拾遺胡孫姜志石毛薑蘇頌石庵䕡藏器曰骨碎補本名猴姜開元皇帝以其主傷折補骨碎故命此名或作骨碎布訛矣江西人呼為胡孫姜象形也時珍曰庵䕡主折傷破血此物功同故有庵䕡之名集解志曰骨碎補生江南根寄樹石上有毛葉如庵䕡藏器曰嶺南虔吉州亦有之葉似石韋而一根余葉生於木大明曰是樹上寄生草根似姜而細長頌曰今淮浙陝西夔路州郡皆有之生木或石上多在背陰處引根成條上有黃赤毛及短葉附之又抽大葉成枝葉面青綠色有青黃點背青白色有赤紫點春生葉至冬干黃無花實採根入藥宗奭曰此苗不似姜亦不似庵䕡每一大葉兩旁小葉叉牙兩兩相對葉長有尖瓣也時珍曰其根扁長略似姜形其葉有丫缺頗似貫眾葉謂葉如庵䕡者殊謬如石韋者亦差根修治斆曰凡採得用銅刀刮去黃赤毛細切蜜拌潤甑蒸一日曬乾用急用只焙乾不蒸亦得也氣味苦溫無毒大明曰平主治破血止血補傷折開寶主骨中毒氣風血疼痛五勞六極足手不收上熱下冷權惡瘡蝕爛肉殺蟲大明研末豬腎夾煨空心食治耳鳴及腎虛久泄牙疼時珍發明頌曰骨碎補入婦人血氣藥蜀人治閃折筋骨傷損取根搗篩煮黃米粥和裹傷處有效時珍曰骨碎補足少陰藥也故能入骨治牙及久泄痢昔有魏刺史子久泄諸醫不效垂殆予用此藥末入豬腎中煨熟與食頓住蓋腎主大小便久泄屬腎虛不可專從脾胃也雷公炮炙論用此方治耳鳴耳亦腎之竅也案戴原禮證治要訣云痢後下虛不善調養或遠行或房勞或外感致兩足痿軟或痛或痹遂成痢風宜用獨活寄生湯吞虎骨四斤丸仍以骨碎補三分之一同研取汁酒解服之外用杜仲牛膝杉木節萆薢白芷南星煎湯頻頻熏洗此亦從腎虛骨痿而治也附方舊二新三虛氣攻牙齒痛血出或癢痛骨碎補二兩銅刀細銼瓦鍋慢火炒黑為末如常揩齒良久吐之嚥下亦可劉松石云此法出靈苑方不獨治牙痛極能堅骨固牙益精髓去骨中毒氣疼痛牙動將落者數擦立住再不復動經用有神風蟲牙痛骨碎補乳香等分為末糊丸塞孔中名金針丸聖濟總錄耳鳴耳閉骨碎補削作細條火炮乘熱塞之蘇氏圖經病後發落胡孫薑野薔薇嫩枝煎汁刷之腸風失血胡孫姜燒存性五錢酒或米飲服仁存方石韋本經中品釋名石䩾音蔗石皮別錄石蘭弘景曰蔓延石上生葉如皮故名石韋時珍曰柔皮曰韋䩾亦皮也集解別錄曰石韋生華陰山谷石上不聞水聲及人聲者良二月採葉陰乾弘景曰處處有之出建平者葉長大而厚恭曰此物叢生石旁陰處亦不作蔓其生古瓦屋上者名瓦韋療淋亦好頌曰今晉絳滁海福州江寧皆有之叢生石上葉如柳背有毛而斑點如皮福州別有一種石皮三月有花採葉作浴湯治風時珍曰多生陰崖險罅處其葉長者近尺闊寸余柔韌如皮背有黃毛亦有金星者名金星草葉凌冬不凋又一種如杏葉者亦生石上其性相同修治別錄曰凡用去黃毛毛射人肺令人咳不可療大明曰入藥去梗須微炙用一法以羊脂炒乾用氣味苦平無毒別錄曰甘權曰微寒之才曰滑石杏仁射干為之使得菖蒲良制丹砂礬石主治勞熱邪氣五癃閉不通利小便水道本經止煩下氣通膀胱滿補五勞安五臟去惡風益精氣別錄治淋瀝遺溺日華炒末冷酒調服治發背頌主崩漏金瘡清肺氣時珍附方新五小便淋痛石韋滑石等分為末每飲服刀圭最快聖惠小便轉脬石韋去毛車前子各二錢半水二盞煎一盞食前服指迷方崩中漏下石韋為末每服三錢溫酒服甚效便前有血石皮為末茄子枝煎湯下二錢普濟方氣熱咳嗽石韋檳榔等分為末薑湯服二錢聖濟錄金星草宋嘉祐釋名金釧草圖經鳳尾草綱目七星草時珍曰即石韋之有金星者圖經重出七星草併入集解禹錫曰金星草西南州郡多有之以戎州者為上喜生背陰石上淨處及竹箐中少日色處或生大木下及背陰古瓦屋上初出深綠色葉長一二尺至深冬背生黃星點子兩兩相對色如金因得金星之名無花實凌冬不凋其根盤屈如竹根而細折之有筋如豬馬鬃五月和根採之風乾用頌曰七星草生江州山谷石上葉如柳而長作蔓延長二三尺其葉堅硬背上有黃點如七星採無時氣味苦寒無毒頌曰微酸崔昉曰制三黃砂汞礬石主治發背癰瘡結核解硫黃丹石毒連根半斤酒五升銀器煎服先服石藥悉下亦可作末冷水服方寸匕塗瘡腫殊效根浸油塗頭大生毛髮嘉祐烏髭發頌解熱通五淋涼血時珍發明頌曰但是瘡毒皆可服之然性至冷服後下利須補治乃平復老年不可輒服宗奭曰丹石毒發於背及一切癰腫以其根葉二錢半酒一大盞煎服取下黑汁不惟下所服石藥兼毒去瘡愈也如不飲酒則為末以新汲水服以知為度時珍曰此藥大抵治金石發毒者若憂鬱氣血凝滯而發毒者非所宜也附方舊一新二五毒發背金星草和根淨洗慢火焙乾每四兩入生甘草一錢搗末分作四服每服用酒一升煎二三沸更以溫酒三二升相和入瓶器內封固時時飲之忌生冷油肥毒物經驗方熱毒下血金星草陳乾薑各三兩為末每服一錢新汲水下本事方腳膝爛瘡金星草背上星刮下敷之即干集簡方石長生本經下品釋名丹草本經丹沙草時珍曰四時不凋故曰長生集解別錄曰石長生生咸陽山谷弘景曰俗中時有采者方藥不復用近道亦有是細細草葉花紫色南中多生石岩下葉似蕨而細如龍鬚黑如光漆高尺余不與余草雜也恭曰苗高尺許五六月採莖葉用今市人用露筋草為之葉似青葙莖細勁紫色今太常用者是也時珍曰宋祁益部方物記長生草生山陰蕨地修莖茸葉色似檜而澤經冬不凋氣味咸微寒有毒普曰神農苦雷公辛桐君甘權曰酸有小毒主治寒熱惡瘡大熱闢鬼氣不祥本經下三蟲別錄治疥癬逐諸風治百邪魅權附錄紅茂草圖經頌曰味苦大涼無毒主癰疽瘡腫焙研為末冷水調貼一名地沒藥一名長生草生施州四季枝葉繁故有長生之名春採根葉時珍曰案庚辛玉冊云通泉草一名長生草多生古道丘壟荒蕪之地葉似地丁中心抽一莖開黃白花如雪又似麥飯摘下經年不槁根入地至泉故名通泉俗呼禿瘡花此草有長生之名不知與石長生及紅茂草亦一類否故並附之石莧宋圖經集解頌曰生筠州多附河岸沙石上春生苗莖青高一尺以來葉如水柳而短八九月土人採之氣味辛苦有小毒主治同甘草煎服主齁䶎又吐風涎頌附錄石垂頌曰生福州山中三月花四月採子生搗為末丸服治蠱毒景天本經上品釋名慎火本經戒火同救火別錄據火同護火綱目闢火同火母別錄弘景曰眾藥之名景天為麗人皆盆盛養於屋上云可闢火故曰慎火方用亦希集解別錄曰景天生太山川穀四月四日七月七日採陰乾頌曰今南北皆有之人家種於中庭或盆置屋上春生苗葉似馬齒莧而大作層而上莖極脆弱夏中開紅紫碎花秋後枯死亦有宿根者苗葉花並可用宗奭曰極易種折枝置土中澆溉旬日便生也時珍曰景天人多栽於石山上二月生苗脆莖微帶赤黃色高一二尺折之有汁葉淡綠色光澤柔厚狀似長匙頭及胡豆葉而不尖夏開小白花結實如連翹而小中有黑子如粟粒其葉味微甘苦炸熟水淘可食正誤弘景曰廣州城外有一樹大三四圍名慎火樹志曰嶺表人言並無此說蓋錄書者篡入謬言非陶氏語也氣味苦平無毒別錄曰酸大明曰寒有小毒可煅硃砂主治大熱火瘡身熱煩邪惡氣本經諸蠱毒痂疕寒熱風痹諸不足別錄療金瘡止血煎水浴小兒去煩熱驚氣弘景風疹惡癢小兒丹毒及發熱權熱狂赤眼頭痛寒熱遊風女人帶下日華附方舊四新五驚風煩熱慎火草煎水浴之普濟方小兒中風汗出中風一日頭頸腰背熱二日即腹熱手足不屈用慎火草乾者半兩麻黃丹參白朮各二錢半為末每服半錢漿水調服三四歲服一錢聖濟錄嬰孺風疹在皮膚不出及瘡毒取慎火苗葉五大兩和鹽三大兩同研絞汁以熱手摩塗日再上之圖經熱毒丹瘡千金用慎火草搗汁拭之日夜拭一二十遍一方入苦酒搗泥塗之楊氏產乳治煙火丹毒從兩股兩脅起赤如火景天草真珠末一兩搗如泥塗之干則易漆瘡作癢挼慎火草塗之外臺眼生花翳澀痛難開景天搗汁日點三五次聖惠產後陰脫慎火草一斤陰乾酒五升煮汁一升分四服子母秘錄花主治女人漏下赤白輕身明目本經佛甲草宋圖經集解頌曰佛甲草生筠州多附石向陽而生似馬齒莧而細小且長有花黃色不結實四季皆有時珍曰二月生苗成叢高四五寸脆莖細葉柔澤如馬齒莧尖長而小夏開黃花經霜則枯人多栽於石山瓦牆上呼為佛指甲救荒本草言高一二尺葉甚大者乃景天非此也氣味甘寒微毒主治湯火灼瘡研貼之頌虎耳草綱目釋名石荷葉見下集解時珍曰虎耳生陰濕處人亦栽於石山上莖高五六寸有細毛一莖一葉如荷蓋狀人呼為石荷葉葉大如錢狀似初生小葵葉及虎之耳形夏開小花淡紅色氣味微苦辛寒有小毒獨孤滔曰汁煮砂子主治瘟疫擂酒服生用吐利人熟用則止吐利又治聤耳搗汁滴之痔瘡腫痛者陰乾燒煙桶中熏之時珍石胡荽四聲本草校正自菜部移入此釋名天胡荽綱目野園荽同鵝不食草食性雞腸草詳見下名集解時珍曰石胡荽生石縫及陰濕處小草也高二三寸冬月生苗細莖小葉形狀宛如嫩胡荽其氣辛熏不堪食鵝亦不食之夏開細花黃色結細子極易繁衍僻地則鋪滿也案孫思邈千金方云一種小草生近水渠中濕處狀類胡荽名天胡荽亦名雞腸草即此草也與繁縷之雞腸名同物異氣味辛寒無毒時珍曰辛溫汁制砒石雄黃主治通鼻氣利九竅吐風痰炳去目翳挼塞鼻中翳膜自落藏器療痔病詵解毒明目散目赤腫雲翳耳聾頭痛腦酸治痰瘧齁䶎鼻窒不通塞鼻息自落又散瘡腫時珍發明時珍曰鵝不食草氣溫而升味辛而散陽也能通於天頭與肺皆天也故能上達頭腦而治頂痛目病通鼻氣而落息肉內達肺經而治齁䶎痰瘧散瘡腫其除翳之功尤顯神妙人謂陳藏器本草惟務廣博鄙俚之言也若此藥之類表出殊功可謂務博已乎案倪維德原機啟微集云治目翳㗜鼻碧雲散用鵝不食草解毒為君青黛去熱為佐川芎大辛破留除邪為使升透之藥也大抵如開鍋蓋法常欲邪毒不閉令有出路然力小而銳宜常㗜以聚其力凡目中諸病皆可用之生挼更神王璽集要詩云赤眼之餘翳忽生草中鵝不食為名塞於鼻內頻頻換三日之間復舊明附方新十寒痰齁喘野園荽研汁和酒服即住集簡方㗜鼻去翳碧雲散治目赤腫脹羞明昏暗隱澀疼痛眵淚風癢鼻塞頭痛腦酸外翳扳睛諸病鵝不食草曬乾二錢青黛川芎各一錢為細末噙水一口每以米許㗜入鼻內淚出為度一方去青黛倪氏啟微集貼目取翳鵝不食草搗汁熬膏一兩爐甘石火煅童便淬三次三錢上等瓷器末一錢半熊膽二錢硇砂少許為極細末和作膏貼在翳上一夜取下用黃連黃柏煎湯洗淨看如有再貼孫天仁集效方塞鼻治翳詩見發明牙疼㗜鼻鵝不食草綿裹懷干為末含水一口隨左右㗜之亦可挼塞聖濟一切腫毒野園荽一把穿山甲燒存性七分當歸尾三錢擂爛入酒一碗絞汁服以渣敷之集簡方濕毒脛瘡磚縫中生出野園荽夏月採取曬收為末每以五錢汞粉五分桐油調作隔紙膏周圍縫定以茶洗淨縛上膏藥黃水出五六日愈此吳竹卿方也簡便方脾寒瘧疾石胡荽一把杵汁半碗入酒半碗和服甚效集簡方痔瘡腫痛石胡荽搗貼之同上螺厴草拾遺釋名鏡面草時珍曰皆象形也集解藏器曰蔓生石上葉狀似螺厴微帶赤色而光如鏡背有少毛小草也氣味辛主治癰腫風疹腳氣腫搗爛敷之亦煮湯洗腫處藏器治小便出血吐血衄血齲齒痛時珍發明時珍曰案陳日華經驗方云年二十六忽病小便後出鮮血數點而不疼如是一月飲酒則甚市醫張康以草藥汁一器入少蜜水進兩服而愈求其方乃鏡面草也附方新七吐血衄血鏡面草水洗擂酒服朱氏集驗方牙齒蟲痛乾坤生意用鏡面草不拘多少以水缸下泥同搗成膏入香油二三點研勻貼於痛處腮上楊氏家藏方用鏡面草半握入麻油二點鹽半捻挼碎左疼塞右耳右疼塞左耳以薄泥餅貼耳門閉其氣仍仄臥泥耳一二時去泥取草放水中看有蟲浮出久者黑次者褐新者白須於午前用之徐克安一乳婢苦此不能食用之出數蟲而安小兒頭瘡鏡面草曬乾為末和輕粉麻油敷之立效楊氏家藏方手指腫毒又指惡瘡消毒止痛鏡面草搗爛敷之壽域神方蛇纏惡瘡鏡面草入鹽杵爛敷之妙解鼠莽毒鏡面草自然汁清油各一杯和服即下毒三五次以肉粥補之不可遲張杲醫說酢漿草唐本草校正併入圖經赤孫施釋名酸漿圖經三葉酸綱目三角酸綱目酸母綱目醋母蘇恭酸箕李當之鳩酸蘇恭雀兒酸綱目雀林草綱目小酸茅蘇恭赤孫施圖經時珍曰此小草三葉酸也其味如醋與燈籠草之酸漿名同物異唐慎微本草以此草之方收入彼下誤矣閩人鄭樵通志言福人謂之孫施則蘇頌圖經赤孫施生福州葉如浮萍者即此也孫施亦酸箕之訛耳今併為一集解恭曰酢漿生道旁陰濕處叢生莖頭有三葉葉如細萍四月五月採陰乾保升曰葉似水萍兩葉並大葉同枝黃花黑實頌曰南中下濕地及人家園圃中多有之北地亦或有生者初生嫩時小兒喜食之南人用揩鍮石器令白如銀時珍曰苗高一二寸叢生布地極易繁衍一枝三葉一葉兩片至晚自合帖整整如一四月開小黃花結小角長一二分內有細子冬亦不凋方士採製砂汞硇礬砒石氣味酸寒無毒主治殺諸小蟲惡瘡瘑瘻搗敷之食之解熱渴唐本主小便諸淋赤白帶下同地錢地龍治沙石淋煎湯洗痔痛脫肛甚效搗塗湯火蛇蠍傷時珍赤孫施治婦人血結用一搦洗細研暖酒服之蘇頌附方舊二新六小便血淋酸草搗汁煎五苓散服之俗名醋啾啾是也王璆百一選方諸淋赤痛三葉酸漿草洗研取自然汁一合酒一合和勻空心溫服立通沈存中靈苑方二便不通酸草一大把車前草一握搗汁入砂糖一錢調服一盞不通再服摘玄方赤白帶下三葉酸草陰乾為末空心溫酒服三錢匕千金方痔瘡出血雀林草一大握水二升煮一升服日三次見效外臺秘要癬瘡作癢雀兒草即酸母草擦之數次愈永類方蛇虺螫傷酸草搗敷崔氏方牙齒腫痛酸漿草一把洗淨川椒四十九粒去目同搗爛絹片裹定如箸大切成豆粒大每以一塊塞痛處即止節齋醫論附錄酸草別錄有名未用曰主輕身延年生名山醴泉上陰崖莖有五葉青澤根赤黃可以消玉一名醜草弘景曰李當之云是今酸箕草布地生者處處有之然恐非也三葉別錄有名未用曰味辛主寒熱蛇蜂螫人生田中莖小黑白高三尺根黑三月採陰乾一名三石一名當田一名赴魚地錦宋嘉祐校正併入有名未用別錄地朕釋名地朕吳普地噤拾遺夜光吳普承夜吳普草血竭綱目血見愁綱目血風草綱目馬蟻草綱目雀兒臥單綱目醬瓣草玉冊猢猻頭草別錄曰地朕三月採之藏器曰地朕一名地錦一名地噤蔓延著地葉光淨露下有光時珍曰赤莖布地故曰地錦專治血病故俗稱為血竭血見愁馬蟻雀兒喜聚之故有馬蟻雀單之名醬瓣猢猻頭象花葉形也集解禹錫曰地錦草生近道田野出滁州者尤良莖葉細弱蔓延於地莖赤葉青紫色夏中茂盛六月開紅花結細實取苗子用之絡石注有地錦是藤蔓之類與此同名異物時珍曰田野寺院及階砌間皆有之小草也就地而生赤莖黃花黑實狀如蒺藜之朵斷莖有汁方士秋月採煮雌雄丹砂硫黃氣味辛平無毒別錄曰地朕苦平無毒主治地朕主心氣女子陰疝血結別錄地錦通流血脈亦可治氣嘉祐主癰腫惡瘡金刃撲損出血血痢下血崩中能散血止血利小便時珍附方舊一新十一臟毒赤白地錦草洗曝乾為末米飲服一錢立止經驗方血痢不止地錦草曬研每服二錢空心米飲下乾坤生意大腸瀉血血見愁少許薑汁和搗米飲服之戴原禮證治要訣婦人血崩草血竭嫩者蒸熟以油鹽姜淹食之飲酒一二杯送下或陰乾為末姜酒調服一二錢一服即止生於磚縫井砌間少在地上也危亦林得效方小便血淋血風草井水擂服三度即愈劉長春經驗方金瘡出血不止血見愁草研爛塗之危氏得效方惡瘡見血方同上瘡瘍刺骨草血竭搗罨之自出本草權度癰腫背瘡血見愁一兩酸漿草半兩焙當歸二錢半焙乳香沒藥各一錢二分半為末每服七錢熱酒調下如有生者擂酒熱服以渣敷之亦效血見愁惟雄瘡用之雌瘡不用楊清叟外科方風瘡疥癬血見愁草同滿江紅草搗末敷之乾坤秘韞趾間雞眼割破出血以血見愁草搗敷之妙乾坤秘韞脾勞黃疸如聖丸用草血竭羊膻草桔梗蒼朮各一兩甘草五錢為末先以陳醋二碗入鍋下皂礬四兩煎熬良久下藥末再入白麵不拘多少和成一塊丸如小豆大每服三五十丸空腹醋湯下一日二服數日面色復舊也乾坤秘韞附錄金瘡小草拾遺藏器曰味甘平無毒主金瘡止血長肌斷鼻中衄血取葉挼敷亦煮汁服斷血瘀及卒下血又預和石灰杵為丸日乾臨時刮敷之生江南村落田野間下濕地高一二寸許如薺而葉短春夏間有淺紫花長一粳米許離鬲草拾遺集解藏器曰生人家階庭濕處高三二寸苗葉似冪罨江東有之北土無也氣味辛寒有小毒主治瘰癧丹毒小兒無辜寒熱大腹痞滿痰飲膈上熱生研汁服一合當吐出宿物去瘧為上藏器仙人草拾遺集解藏器曰生階庭間高二三寸葉細有雁齒似離鬲草北地不生氣味缺主治小兒酢瘡頭小而硬者煮湯浴並搗敷丹毒入腹者必危可飲冷藥及用此洗之又挼汁滴目明目去翳藏器仙人掌草宋圖經集解頌曰生合州筠州多於石上貼壁而生如人掌形故以名之葉細而長春生至冬猶有四時採之氣味微苦澀寒無毒主治腸痔瀉血與甘草浸酒服蘇頌焙末油調摻小兒白禿瘡時珍崖棕宋圖經集解頌曰生施州石崖上苗高一尺以來其狀如棕四季有葉無花土人採根去粗皮入藥氣味甘辛溫無毒主治婦人血氣並五勞七傷以根同半天回雞翁藤野蘭根四味洗焙為末每服二錢溫酒下丈夫無所忌婦人忌雞魚濕面蘇頌附錄雞翁藤頌曰生施州蔓延大木上有葉無花味辛性溫無毒採無時半天回頌曰生施州春生苗高二尺以來赤斑色至冬苗枯土人夏月採根味苦澀性溫無毒野蘭根頌曰生施州叢生高二尺以來四時有葉無花其根味微苦性溫無毒採無時方並見上紫背金盤草宋圖經集解頌曰生施州苗高一尺以來葉背紫無花土人採根用時珍曰湖湘水石處皆有之名金盤藤似醋筒草而葉小背微紫軟莖引蔓似黃絲搓之即斷無汁可見方士用以制汞他處少有醋筒草葉似木芙蓉而偏莖空而脆味酸開白花廣人以鹽醋淹食之氣味辛澀熱無毒主治婦人血氣痛洗焙研末酒服半錢孕婦勿服能消胎氣忌雞魚羊血濕面蘇頌白龍鬚綱目集解時珍曰劉松石保壽堂方云白龍鬚生近水旁有石處寄生搜風樹節乃樹之餘精也細如棕絲直起無枝葉最難得真者一種萬纏草生於白線樹根細絲相類但有枝莖稍粗為異誤用不效愚案所云二樹名皆隱語無從考證氣味缺平無毒主治男子婦人風濕腰腿疼痛左癱右瘓口目藭斜及產後氣血流散脛骨痛頭目昏暗腰腿痛不可忍並宜之惟虛勞癱痿不可服研末每服一錢氣弱者七分無灰酒下密室隨左右貼床臥待汗出自干勿多蓋被三日勿下床見風一方得疾淺者用末三錢瓷瓶煮酒一壺每日先服桔梗湯少頃飲酒二盞早一服晚一服保壽堂方發明時珍曰保壽方云成化十二年盧玄真道士六十七歲六月偶得癱瘓服白花蛇丸牙齒盡落三年扶病入山得此方服百日復舊壽至百歲乃卒凡男婦風濕腰腿痛先服小續命湯及滲濕湯後乃服此凡女人產後腰腿腫痛先服四物湯二服次日服此若癱瘓年久痰老氣微者服前藥出汗三日之後則日服龍鬚末一分好酒下隔一日服二分又隔一日服三分又隔一日服四分又隔一日服五分又隔一日復從一分起如前法周而復始至月餘其病漸愈謂之升陽降氣調髓蒸骨追風逐邪排血安神忌房事魚鵝雞羊韭蒜蝦蟹及寒冷動風之物又不可過飲酒及麵食只宜米粥蔬菜附方新一諸風癱瘓筋骨不收用白龍鬚根皮一兩鬧羊花即老虎花七分好燒酒三斤封固煮一炷香埋土中一夜能飲者三杯不能飲者一杯臥時服服至三五杯見效但知痛者可治坦仙皆效方
