body:
  text: 谷部第二十二卷李時珍曰太古民無粒食茹毛飲血神農氏出始嘗草別谷以教民耕藝又嘗草別藥以救民疾夭軒轅氏出教以烹飪製為方劑而後民始得遂養生之道周官有五穀六穀九穀之名詩人有八谷百穀之詠谷之類可謂繁矣素問云五穀為養麻麥稷黍豆以配肝心脾肺腎職方氏辨九州之谷地官辨土宜種稑之種以教稼穡樹藝皆所以重民天也五方之氣九州之産百穀各異其性豈可終日食之而不知其氣味損益乎於是集草實之可粒食者為谷部凡七十三種分為四類曰麻麥稻曰稷粟曰菽豆曰造釀舊本米穀部三品共五十九種今併入九種移一種入菜部自草部移入一種神農本草經七種梁陶弘景注名醫別録一十九種陶弘景注唐本草三種唐蘇恭藥性本草一種唐甄權本草拾遺十種唐陳藏器海藥本草一種唐李珣食療本草三種唐孟詵開寶本草二種宋馬志嘉祐本草三種宋掌禹錫圖經本草二種宋蘇頌日用本草一種元吳瑞本草補遺一種元朱震亨救荒本草一種周定王食鑑本草一種明寧原食物本草三種明汪穎本草綱目一十五種明李時珍附注魏李當之藥録吳普本草宋雷斆炮炙齊徐之才藥對唐楊損之刪繁蕭炳四聲孫思邈千金南唐陳士良食性蜀韓保升重注宋寇宗奭衍義金張元素珍珠囊元李杲法象王好古湯液明王綸集要汪機會編陳嘉謨蒙筌谷之一麻麥稻類十二種胡麻別録上品校正今據沈存中寇宗奭二說併入本經青蘘及嘉祐新立白油麻胡麻油為一條釋名巨勝本經方莖吳普狗蝨別録油麻食療脂麻衍義俗作芝麻非葉名青蘘音箱莖名麻䕸音皆亦作秸時珍曰按沈存中筆談云胡麻即今油麻更無他說古者中國止有大麻其實為蕡漢使張騫始自大宛得油麻種來故名胡麻以別中國大麻也寇宗奭衍義亦據此釋胡麻故今併入油麻焉巨勝即胡麻之角巨如方勝者非二物也方莖以莖名狗蝨以形名油麻脂麻謂其多脂油也按張揖廣雅胡麻一名藤弘弘亦巨也別録一名鴻藏者乃藤弘之誤也又杜寶拾遺記云隋大業四年改胡麻曰交麻集解別録曰胡麻一名巨勝生上黨川澤秋採之青蘘巨勝苗也生中原川穀弘景曰胡麻八谷之中惟此為良純黑者名巨勝巨者大也本生大宛故名胡麻又以莖方者為巨勝圓者為胡麻恭曰其角作八稜者為巨勝四稜者為胡麻都以烏者為良白者為劣詵曰沃地種者八稜山田種者四稜土地有異功力則同斆曰巨勝有七稜色赤味酸澀者乃真其八稜者兩頭尖者色紫黑者及烏油麻並呼胡麻誤矣頌曰胡麻處處種之稀復野生苗梗如麻而葉圓鋭光澤嫩時可作蔬道家多食之本經謂胡麻一名巨勝陶弘景以莖之方圓分別蘇恭以角稜多少分別仙方有服胡麻巨勝二法功用小別是皆以為二物矣或云即今油麻本生胡中形體類麻故名胡麻八谷之中最為大勝故名巨勝乃一物二名如此則是一物而有二種如天雄附子之類故葛洪云胡麻中有一葉兩尖者為巨勝別録序例云細麻即胡麻也形扁扁爾其莖方者名巨勝是也今人所用胡麻之葉如荏而狹尖莖高四五尺黃花生子成房如胡麻角而小嫩時可食甚甘滑利大腸皮亦可作布類大麻色黃而脆俗亦謂之黃麻其實黑色如韭子而粒細味苦如膽杵末略無膏油其說各異此乃服食家要藥乃爾差誤豈復得效也宗奭曰胡麻諸說參差不一止是今人脂麻更無他義以其種來自大宛故名胡麻今胡地所出者皆肥大其紋鵲其色紫黑取油亦多嘉祐本草白油麻與此乃一物但以色言之比胡地之麻差淡不全白爾今人通呼脂麻故二條治療大同如川大黃上黨人參之類特以其地所宜立名豈可與他土者為二物乎時珍曰胡麻即脂麻也有遲早二種黑白赤三色其莖皆方秋開白花亦有帶紫豔者節節結角長者寸許有四稜六稜者房小而子少七稜八稜者房大而子多皆隨土地肥瘠而然蘇恭以四稜為胡麻八稜為巨勝正謂其房勝巨大也其莖高者三四尺有一莖獨上者角纏而子少有開枝四散者角繁而子多皆因苗之稀稠而然也其葉有本團而末鋭者有本團而末分三丫如鴨掌形者葛洪謂一葉兩尖為巨勝者指此蓋不知烏麻白麻皆有二種葉也按本經胡麻一名巨勝吳普本草一名方莖抱朴子及五符經並云巨勝一名胡麻其說甚明至陶弘景始分莖之方圓雷斆又以赤麻為巨勝謂烏麻非胡麻嘉祐本草復出白油麻以別胡麻並不知巨勝即胡麻中丫葉巨勝而子肥者故承誤啓疑如此惟孟詵謂四稜八稜為土地肥瘠寇宗奭據沈存中之說斷然以脂麻為胡麻足以證諸家之誤矣又賈思協齊民要術種收胡麻法即今種收脂麻之法則其為一物尤為可據今市肆間因莖分方圓之說遂以茺蔚子僞為巨勝以黃麻子及大藜子僞為胡麻誤而又誤矣茺蔚子長一分許有三稜黃麻子黑如細韭子味苦大藜子狀如壁蝨及酸棗核仁味辛甘並無脂油不可不辨梁簡文帝勸醫文有云世誤以灰滌菜子為胡麻則胡麻之訛其來久矣慎微曰俗傳胡麻須夫婦同種則茂盛故本事詩云胡麻好種無人種正是歸時又不歸胡麻修治弘景曰服食胡麻取烏色者當九蒸九曝熬搗餌之斷谷長生充飢雖易得而學者未能常服況余藥耶蒸不熟令人發落其性與茯苓相宜俗方用之甚少時以合湯丸爾斆曰凡修事以水淘去浮者曬乾以酒拌蒸從巳至亥出攤曬乾臼中舂去粗皮留薄皮以小豆對拌同炒豆熟去豆用之氣味甘平無毒士良曰初食利大小腸久食即否去陳留新鏡源曰巨勝可煮丹砂主治傷中虛羸補五內益氣力長肌肉填髓腦久服輕身不老本經堅筋骨明耳目耐飢渴延年療金瘡止痛及傷寒溫瘧大吐後虛熱羸困別録補中益氣潤養五臟補肺氣止心驚利大小腸耐寒暑逐風濕氣遊風頭風治勞氣産後羸困催生落胞細研塗發令長白蜜蒸餌治百病日華炒食不生風病風人久食則步履端正語言不謇李廷飛生嚼塗小兒頭瘡煎湯浴惡瘡婦人陰瘡大效蘇恭白油麻嘉祐氣味甘大寒無毒宗奭曰白脂麻世用不可一日闕者亦不至於大寒也原曰生者性寒而治疾炒者性熱而發病蒸者性溫而補人詵曰久食抽人肌肉其汁停久者飲之發霍亂主治治虛勞滑腸胃行風氣通血脈去頭上浮風潤肌肉食後生啖一合終身勿輟又與乳母服之孩子永不生病客熱可作飲汁服之生嚼敷小兒頭上諸瘡良孟詵仙方蒸以辟穀蘇頌發明甄權曰巨勝乃仙經所重以白蜜等分合服名靜神丸治肺氣潤五臟其功甚多亦能休糧填人精髓有益於男子患人虛而吸吸者加而用之時珍曰胡麻取油以白者為勝服食以黑者為良胡地者尤妙取其黑色入通於腎而能潤燥也赤者狀如老茄子殼厚油少但可食爾不堪服食唯錢乙治小兒痘疹變黑歸腎百祥丸用赤脂麻煎湯送下蓋亦取其解毒耳五符經有巨勝丸云即胡麻本生大宛五穀之長也服之不息可以知萬物通神明與世常存參同契亦云巨勝可延年還丹入口中古以胡麻為仙藥而近世罕用或者未必有此神驗但久服有益而已耶劉阮入天台遇仙女食胡麻飯亦以胡麻同米作飯為仙家食品焉爾又按蘇東坡與程正輔書云凡痔疾宜斷酒肉與鹽酪醬菜厚味及粳米飯唯宜食淡面一味及以九蒸胡麻即黑脂麻同去皮茯苓入少白蜜為麨食之日久氣力不衰而百病自去而痔漸退此乃長生要訣但易知而難行爾據此說則胡麻為脂麻尤可憑矣其用茯苓本陶氏注胡麻之說也近人以脂麻擂爛去滓入緑豆粉作腐食其性平潤最益老人附方舊十六新十五服食胡麻抱朴子云用上黨胡麻三斗淘淨甑蒸令氣遍日乾以水淘去沫再蒸如此九度以湯脫去皮簸淨炒香為末白蜜或棗膏丸彈子大每溫酒化下一丸日三服忌毒魚狗肉生菜服至百日能除一切痼疾一年身面光澤不飢二年白髮返黑三年齒落更生四年水火不能害五年行及奔馬久服長生若欲下之飲葵菜汁孫真人云用胡麻三升去黃褐者蒸三十遍微炒香為末入白蜜三升杵三百下丸梧桐子大每旦服五十丸人過四十以上久服明目洞視腸柔如筋也神仙傳云魯女生服胡麻餌術絶谷八十餘年甚少壯日行三百里走及獐鹿服食巨勝治五臟虛損益氣力堅筋骨用巨勝九蒸九曝收貯每服二合湯浸布裹挼去皮再研水濾汁煎飲和粳米煮粥食之時珍曰古有服食胡麻巨勝二法方不出於一人故有二法其實一物也白髮返黑烏麻九蒸九曬研末棗膏丸服之千金方腰腳疼痛新胡麻一升熬香杵末日服一小升服至一斗永瘥溫酒蜜湯薑汁皆可下千金手腳痠痛微腫用脂麻五升熬研酒一升浸一宿隨意飲外臺入水肢腫作痛生胡麻搗塗之千金偶感風寒脂麻炒焦乘熱擂酒飲之暖臥取微汗出良中暑毒死救生散用新胡麻一升微炒令黑攤冷為末新汲水調服三錢或丸彈子大水下經驗後方嘔啘不止白油麻一大合清酒半升煎取三合去麻頓服近效方牙齒痛腫胡麻五升水一斗煮汁五升含漱吐之不過二劑神良肘後熱淋莖痛烏麻子蔓荊子各五合炒黃緋袋盛以井華水三升浸之每食前服一錢聖惠方小兒下痢赤白用油麻一合搗和蜜湯服之外臺解下胎毒小兒初生嚼生脂麻綿包與兒咂之其毒自下小兒急疳油麻嚼敷之外臺小兒軟癤油麻炒焦乘熱嚼爛敷之談氏小兒方頭面諸瘡脂麻生嚼敷之普濟小兒瘰癧脂麻連翹等分為末頻頻食之簡便方疔腫惡瘡胡麻燒灰針砂等分為末醋和敷之日三普濟方痔瘡風腫作痛胡麻子煎湯洗之即消坐板瘡疥生脂麻嚼敷之筆峰雜興陰癢生瘡胡麻嚼爛敷之良肘後乳瘡腫痛用脂麻炒焦研末以燈窩油調塗即安婦人乳少脂麻炒研入鹽少許食之唐氏湯火傷灼胡麻生研如泥塗之外臺蜘蛛咬瘡油麻研爛敷之經驗後方諸蟲咬傷同上蚰蜒入耳胡麻炒研作袋枕之梅師谷賊尸咽喉中痛癢此因誤吞谷芒搶刺癢痛也谷賊屬咽馬喉風屬喉不可不分用脂麻炒研白湯調下三因方癰瘡不合烏麻炒黑搗敷之千金小便尿血胡麻三升杵末以東流水二升浸一宿平旦絞汁頓熱服千金方胡麻油即香油弘景曰生榨者良若蒸炒者止可供食及然燈耳不入藥用宗奭曰炒熟乘熱壓出油謂之生油但可點照須再煎煉乃為熟油始可食不中點照亦一異也如鐵自火中出而謂之生鐵亦此義也時珍曰入藥以烏麻油為上白麻油次之須自榨乃良若市肆者不惟已經蒸炒而又雜之以僞也氣味甘微寒無毒主治利大腸産婦胞衣不落生油摩瘡腫生禿髮別録去頭面遊風孫思邈主天行熱閟腸內結熱服一合取利為度藏器主喑啞殺五黃下三焦熱毒氣通大小腸治蛔心痛敷一切惡瘡疥癬殺一切蟲取一合和雞子兩顆芒硝一兩攪服少時即瀉下熱毒甚良孟詵陳油煎膏生肌長肉止痛消癰腫補皮裂日華治癰疽熱病蘇頌解熱毒食毒蟲毒殺諸蟲螻蟻時珍發明藏器曰大寒乃常食所用而發冷疾滑精髓發臟腑渴困脾臟令人體重損聲士良曰有牙齒疾及脾胃疾人切不可吃治飲食物須逐日熬熟用之若經宿即動氣也劉完素曰油生於麻麻溫而油寒同質而異性也震亨曰香油乃炒熟脂麻所出食之美且不致疾若煎煉過與火無異矣時珍曰張華博物志言積油滿百石則自能生火陳霆墨談言衣絹有油蒸熱則出火星是油與火同性矣用以煎煉食物尤能動火生痰陳氏謂之大寒珍意不然但生用之有潤燥解毒止痛消腫之功似乎寒耳且香油能殺蟲而病發症者嗜油煉油能自焚而氣盡則反冷此又物之玄理也附方舊十新二十七發症飲油外臺云病發症者欲得飲油用油一升入香澤煎之盛置病人頭邊令氣入口鼻勿與飲之疲極眠睡蟲當從口出急以石灰粉手捉取抽盡即是發也初出如不流水中濃菜形又云治胸喉間覺有症蟲上下嘗聞蔥豉食香此乃發症蟲也二日不食開口而臥以油煎蔥豉令香置口邊蟲當出以物引去之必愈發瘕腰痛南史云宋明帝宮人腰痛牽心發則氣絶徐文伯診曰發瘕也以油灌之吐物如發引之長三尺頭已成蛇能動搖懸之滴盡唯一發爾吐解蠱毒以清油多飲取吐嶺南方解河豚毒一時倉卒無藥急以清麻油多灌取吐出毒物即愈衛生易簡方解砒石毒麻油一碗灌之衛生方大風熱疾近效方云婆羅門僧療大風疾並熱風手足不遂壓丹石熱毒用硝石一兩生烏麻油二大升同納鐺中以土墼蓋口紙泥固濟細火煎之初煎氣腥藥熟則香氣發更以生脂麻油二大升和合微煎之以意斟量得所即內不津器中凡大風人用紙屋子坐病人外面燒火發汗日服一大合壯者日二服三七日頭面疱瘡皆滅也圖經傷寒發黃生烏麻油一盞水半盞雞子白一枚和攪服盡外臺小兒發熱不拘風寒飲食時行痘疹並宜用之以蔥涎入香油內手指蘸油摩擦小兒五心頭面項背諸處最能解毒涼肌直指預解痘毒外臺云時行暄暖恐發痘瘡用生麻油一小盞水一盞旋旋傾下油內柳枝攪稠如蜜每服二三蜆殼大人二合臥時服之三五服大便快利瘡自不生矣此扁鵲油劑法也直指用麻油童便各半盞如上法服小兒初生大小便不通用真香油一兩皮硝少許同煎滾冷定徐徐灌入口中咽下即通藺氏經驗方卒熱心痛生麻油一合服之良肘後方鼻衄不止紙條蘸真麻油入鼻取嚏即愈有人一夕衄血盈盆用此而效普濟方胎死腹中清油和蜜等分入湯頓服普濟方漏胎難産因血乾澀也用清油半兩好蜜一兩同煎數十沸溫服胎滑即下他藥無益以此助血為效胎産須知産腸不收用油五斤煉熟盆盛令婦坐盆中飯久先用皂角炙去皮研末吹少許入鼻作嚏立上斗門癰疽發背初作即服此使毒氣不內攻以麻油一斤銀器煎二十沸和醇醋二碗分五次一日服盡直指腫毒初起麻油煎蔥黑色趁熱通手旋塗自消百一選方喉痹腫痛生油一合灌之立愈總録丹石毒發發熱者不得食熱物不用火為使但著厚衣暖臥取油一匙含咽戒怒二七日也枕中記云服丹石人先宜以麻油一升薤白三升切納油中微火煎黑去滓合酒每服三合百日氣血充盛也身面瘡疥方同下梅花禿癬用清油一碗以小竹子燒火入內煎沸瀝豬膽汁一個和勻剃頭擦之二三日即愈勿令日曬普濟方赤禿髮落香油水等分以銀叉攪和日日擦之發生乃止普濟方發落不生生胡麻油塗之普濟方令髮長黑生麻油桑葉煎過去滓沐發令長數尺普濟滴耳治聾生油日滴三五次候耳中塞出即愈總録蚰蜒入耳劉禹錫傳信方用油麻油作煎餅枕臥須臾自出李元淳尚書在河陽日蚰蜒入耳無計可為腦悶有聲至以頭擊門柱奏狀危困因發御藥療之不驗忽有人獻此方乃愈圖經蜘蛛咬毒香油和鹽摻之普濟方冬月唇裂香油頻頻抹之相感志身面白癜以酒服生胡麻油一合一日三服至五斗瘥忌生冷豬雞魚蒜等百日千金小兒丹毒生麻油塗之千金打撲傷腫熟麻油和酒飲之以火燒熱地臥之覺即疼腫俱消松陽民相毆用此法經官驗之了無痕跡趙葵行營雜録虎爪傷人先吃清油一碗仍以油淋洗瘡口趙原陽濟急方毒蜂螫傷清油搽之妙同上毒蛇螫傷急飲好清油一二盞解毒然後用藥也濟急良方燈盞殘油主治能吐風痰食毒塗癰腫熱毒又治猘犬咬傷以灌瘡口甚良時珍麻枯餅時珍曰此乃榨去油麻滓也亦名麻糝音辛荒歲人亦食之可以養魚肥田亦周禮草人強堅用蕡之義附方新二揩牙烏須麻枯八兩鹽花三兩用生地黃十斤取汁同入鐺中熬干以鐵蓋覆之鹽泥泥之煅赤取研末日用三次揩畢飲薑茶先從眉起一月皆黑也養老書疽瘡有蟲生麻油滓貼之綿裹當有蟲出千金方青蘘音穰本經上品恭曰自草部移附此釋名夢神巨勝苗也生中原山谷別録氣味甘寒無毒主治五臟邪氣風寒濕痹益氣補腦髓堅筋骨久服耳目聰明不飢不老增壽本經主傷暑熱思邈作湯沐頭去風潤髮滑皮膚益血色日華治崩中血凝注者生搗一升熱湯絞汁半升服立愈甄權祛風解毒潤腸又治飛絲入咽喉者嚼之即愈時珍發明宗奭曰青蘘即油麻葉也以湯浸良久涎出稠黃色婦人用之梳髮與日華作湯沐發之說相符則胡麻之為脂麻無疑弘景曰胡麻葉甚肥滑可沐頭但不知云何服之仙方並無用此亦當陰乾為丸散爾時珍曰按服食家有種青蘘作菜食法云秋間取巨勝子種畦中如生菜之法候苗出採食滑美不減於葵則本草所著者亦茹蔬之功非入丸散也胡麻花思邈曰七月採最上標頭者陰乾用之藏器曰陰乾漬汁溲麵食至韌滑主治生禿髮思邈潤大腸人身上生肉疔者擦之即愈時珍附方新一眉毛不生烏麻花陰乾為末以烏麻油漬之日塗外臺祕要麻秸主治燒灰入點痣去惡肉方中用時珍附方新二小兒鹽哮脂麻秸瓦內燒存性出火毒研末以淡豆腐蘸食之摘玄方聤耳出膿白麻秸刮取一合花胭脂一枚為末綿裹塞耳中聖濟總録亞麻宋圖經釋名鴉麻圖經壁蝨胡麻綱目集解頌曰亞麻子出兗州威勝軍苗葉俱青花白色八月上旬採其實用時珍曰今陝西人亦種之即壁蝨胡麻也其實亦可榨油點燈氣惡不堪食其莖穗頗似茺蔚子不同子氣味甘微溫無毒主治大風瘡癬蘇頌大麻本經上品釋名火麻日用黃麻俗名漢麻爾雅翼雄者名枲麻詩疏牡麻同上雌者名苴麻同上茡麻音字花名麻蕡本經麻勃時珍曰麻從兩𠂢在廣下象屋下派麻之形也𠂢音派廣音儼余見下注雲漢麻者以別胡麻也集解正誤本經曰麻蕡一名麻勃麻花上勃勃者七月七日採之良麻子九月採入土者損人生太山川穀弘景曰麻蕡即牡麻牡麻則無實今人作布及履用之恭曰蕡即麻實非花也爾雅云蕡枲實儀禮云苴麻之有蕡者注云有子之麻為苴皆謂子也陶以蕡為麻勃謂勃勃然如花者復重出麻子誤矣既以蕡為米穀上品花豈堪食乎藏器曰麻子早春種為春麻子小而有毒晚春種為秋麻子入藥佳壓油可以油物宗奭曰麻子海東毛羅島來者大如蓮實最勝其次出上郡北地者大如豆南地者子小頌曰麻子處處種之績其皮以為布者農家擇其子之有斑黑文者謂之雌麻種之則結子繁他子則不然也本經麻蕡麻子所主相同而麻花非所食之物蘇恭之論似當矣然本草朱字云麻蕡味辛麻子味甘又似二物疑本草與爾雅禮記稱謂有不同者又藥性論用麻花云味苦主諸風女經不利然則蕡也子也花也其三物乎時珍曰大麻即今火麻亦曰黃麻處處種之剝麻收子有雌有雄雄者為枲雌者為苴大科如油麻葉狹而長狀如益母草葉一枝七葉或九葉五六月開細黃花成穗隨即結實大如胡荽子可取油剝其皮作麻其秸白而有稜輕虛可為燭心齊民要術云麻子放勃時拔去雄者若未放勃先拔之則不成子也其子黑而重可搗治為燭即此也本經有麻蕡麻子二條謂蕡即麻勃謂麻子入土者殺人蘇恭謂蕡是麻子非花也蘇頌謂蕡子花為三物疑而不決謹按吳普本草云麻勃一名麻花味辛無毒麻藍一名麻蕡一名青葛味辛甘有毒麻葉有毒食之殺人麻子中仁無毒先藏地中者食之殺人據此說則麻勃是花麻蕡是實麻仁是實中仁也普三國時人去古未遠說甚分明神農本經以花為蕡以藏土入土殺人其文皆傳寫脫誤爾陶氏及唐宋諸家皆不考究而臆度疑似可謂疏矣今依吳氏改正於下麻勃普曰一名麻花時珍曰觀齊民要術有放勃時拔去雄者之文則勃為花明矣氣味辛溫無毒甄權曰苦微熱無毒畏牡蠣入行血藥以䗪蟲為之使主治一百二十種惡風黑色遍身苦癢逐諸風惡血治女人經候不通藥性治健忘及金瘡內漏時珍發明弘景曰麻勃方藥少用術家合人參服之逆知未來事時珍曰按範汪方有治健忘方七月七日收麻勃一升人參二兩為末蒸令氣遍每臨臥服一刀圭能盡知四方之事此乃治健忘服之能記四方事也陶云逆知未來事過言矣又外臺言生疔腫人忌見麻勃見之即死者用胡麻針砂燭燼為末醋和敷之不知麻勃與疔何故相忌亦如人有見漆即生瘡者此理皆不可曉附方舊一新二瘰癧初起七月七日麻花五月五日艾葉等分作炷灸之百壯外臺祕要金瘡內漏麻勃一兩蒲黃二兩為末酒服一錢匕日三夜一同上風病麻木麻花四兩草烏一兩炒存性為末煉蜜調成膏每服三分白湯調下麻蕡普曰一名麻藍一名青葛時珍曰此當是麻子連殼者故周禮朝事之籩供蕡月令食麻與大麻可食蕡可供稍有分別殼有毒而仁無毒也氣味辛平有毒普曰神農辛雷公甘岐伯有毒畏牡蠣白薇主治五勞七傷多服令人見鬼狂走本經詵曰要見鬼者取生麻子菖蒲鬼臼等分杵丸彈子大每朝向日服一丸滿百日即見鬼也利五臟下血寒氣破積止痹散膿久服通神明輕身別録附方舊一風癲百病麻子四升水六升猛火煮令芽生去滓煎取二升空心服之或發或不發或多言語勿怪之但令人摩手足頃定進三劑愈千金麻仁修治宗奭曰麻仁極難去殼取帛包置沸湯中浸至冷出之垂井中一夜勿令著水次日日中曝乾就新瓦上挼去殼簸揚取仁粒粒皆完張仲景麻仁丸即此大麻子中仁也氣味甘平無毒詵曰微寒普曰先藏地中者食之殺人士良曰多食損血脈滑精氣痿陽氣婦人多食即髮帶疾畏牡蠣白薇惡茯苓主治補中益氣久服肥健不老神仙本經治中風汗出逐水氣利小便破積血復血脈乳婦産後余疾沐發長潤別録下氣去風痹皮頑令人心歡炒香浸小便絞汁服之婦人倒産吞二七枚即正藏器潤五臟利大腸風熱結燥及熱淋士良補虛勞逐一切風氣長肌肉益毛髮通乳汁止消渴催生難産日華取汁煮粥去五臟風潤肺治關節不通發落孟詵利女人經脈調大腸下痢塗諸瘡癩殺蟲取汁煮粥食止嘔逆時珍發明弘景曰麻子中仁合丸藥並釀酒大善但性滑利劉完素曰麻木谷也而治風同氣相求也好古曰麻仁手陽明足太陰藥也陽明病汗多胃熱便難三者皆燥也故用之以通潤也成無己曰脾欲緩急食甘以緩之麻仁之甘以緩脾潤燥附方舊十九新十九服食法麻子仁一升白羊脂七兩蜜蠟五兩白蜜一合和杵蒸食之不飢耐老食療耐老益氣久服不飢麻子仁二升大豆一升熬香為末蜜丸日二服藥性論大麻仁酒治骨髓風毒疼痛不可運動用大麻仁水浸取沉者一大升曝乾於銀器中旋旋慢炒香熟入木臼中搗至萬杵待細如白粉即止平分為十帖每用一帖取家釀無灰酒一大碗同麻粉用柳槌蘸入砂盆中擂之濾去殼煎至減半空腹溫服一帖輕者四五帖見效甚者不出十帖必失所苦效不可言篋中方麻子仁粥治風水腹大腰臍重痛不可轉動用冬麻子半斤研碎水濾取汁入粳米二合煮稀粥下蔥椒鹽豉空心食食醫心鏡老人風痹麻子煮粥上法食之五淋澀痛麻子煮粥如上法食之同上大便不通麻子煮粥如上法服之肘後方麻子仁丸治脾約大便祕而小便數麻子仁二升芍藥半斤厚朴一尺大黃枳實各一斤杏仁一升熬研煉蜜丸梧桐子大每以漿水下十丸日三服不知再加張仲景方産後祕塞許學士云産後汗多則大便祕難於用藥惟麻子蘇子粥最穩不惟産後可服凡老人諸虛風祕皆得力也用大麻子仁紫蘇子各二合洗淨研細再以水研濾取汁一盞分二次煮粥啜之本事方産後瘀血不盡麻子仁五升酒一升漬一夜明旦去滓溫服一升先食服不瘥夜再服一升不吐不下不得與男子通一月將養如初産法千金方胎損腹痛冬麻子一升杵碎熬香水二升煮汁分服心鏡妊娠心痛煩悶麻子仁一合研水二盞煎六分去滓服聖惠月經不通或兩三月或半年一年者用麻子仁二升桃仁二兩研勻熟酒一升浸一夜日服一升普濟嘔逆不止麻仁三合杵熬水研取汁著少鹽吃立效李諫議常用極妙外臺虛勞內熱下焦虛熱骨節煩疼肌肉急小便不利大便數少氣吸吸口燥熱淋用大麻仁五合研水二升煮減半分服四五劑瘥外臺補下治渴麻子仁一升水三升煮四五沸去滓冷服半升日二藥性論消渴飲水日至數斗小便赤澀用秋麻子仁一升水三升煮三四沸飲汁不過五升瘥肘後方乳石發渴大麻仁三合水三升煮二升時時呷之外臺飲酒咽爛口舌生瘡大麻仁一升黃芩二兩為末蜜丸含之千金方腳氣腫渴大麻仁熬香水研取一升別以水三升煮一升赤小豆取一升汁即內麻汁更煎三五沸食豆飲汁外臺祕要腳氣腹痹大麻仁一升研碎酒三升漬三宿溫服大良外臺血痢不止必效方用麻子仁汁煮緑豆空心食極效外臺小兒痢下赤白體弱大困者麻子仁三合炒香研細末每服一錢漿水服立效子母祕録截腸怪病大腸頭出寸余痛苦干則自落又出名為截腸病若腸盡即不治但初覺截時用器盛脂麻油坐浸之飲大麻子汁數升即愈也夏子益奇疾方金瘡瘀血在腹中用大麻仁三升蔥白十四枚搗熟水九升煮一升半頓服血出不盡更服千金腹中蟲病大麻子仁三升東行茱萸根八升漬水平旦服二升至夜蟲下食療小兒疳瘡嚼麻子敷之日六七度子母祕録小兒頭瘡麻子五升研細水絞汁和蜜敷之千金白禿無發麻子三升炒焦研末豬脂和塗發生為度普濟方發落不生蕡麻子汁煮粥頻食之聖濟總録聤耳出膿麻子一合花胭脂一分研勻作梃子綿裹塞之聖惠方大風癩疾大麻仁三升淘曬以酒一斗浸一夜研取白汁濾入瓶中重湯煮數沸收之每飲一小盞兼服茄根散乳香丸取效聖惠方卒被毒箭麻仁數升杵汁飲肘後解射罔毒大麻子汁飲之良千金闢禳溫疫麻子仁赤小豆各二七枚除夜著井中飲水良龍魚河圖赤遊丹毒麻仁搗末水和敷之千金方濕癬肥瘡大麻㶆敷之五日瘥千金方瘭疽出汁生手足肩背纍纍如赤豆狀剝淨以大麻子炒研末摩之千金方油主治熬黑壓油敷頭治發落不生煎熟時時啜之治硫黃毒發身熱時珍出千金方外臺祕要附方新一尸咽痛癢麻子燒取脂酒調一錢服之聖濟總録葉氣味辛有毒主治搗汁服五合下蛔蟲搗爛敷蠍毒俱效蘇恭浸湯沐髮長潤令白髮不生甄權曰以葉一握同子五升搗和浸三日去滓沐發發明時珍曰按郭文瘡科心要烏金散治癰疽疔腫時毒惡瘡方中用火麻頭同麻黃諸藥發汗則葉之有毒攻毒可知矣普濟方用之截瘧尤可推焉附方新二治瘧不止火麻葉不問榮枯鍋內文武火慢炒香連鍋取下以紙蓋之令出汗盡為末臨發前用茶或酒下移病人原睡處其狀如醉醒即愈又方火麻葉如上法為末一兩加縮砂丁香陳皮木香各半兩酒糊丸梧子大每酒茶任下五七丸能治諸瘧壯元氣普濟方黃麻主治破血通小便時珍附方新二熱淋脹痛麻皮一兩炙甘草三分水二盞煎一盞服日二取效聖惠方跌撲折傷疼痛接骨方黃麻燒灰頭髮灰各一兩乳香五錢為末每服三錢溫酒下立效王仲勉經驗方麻根主治搗汁或煮汁服主瘀血石淋陶弘景治産難衣不出破血壅脹帶下崩中不止者以水煮服之效蘇恭治熱淋下血不止取三九枚洗淨水五升煮三升分服血止神驗藥性根及葉搗汁服治撾打瘀血心腹滿氣短及踠折骨痛不可忍者皆效無則以麻煮汁代之蘇頌出韋宙獨行方漚麻汁主治止消渴治瘀血蘇恭小麥別録中品校正拾遺麥苗並歸為一釋名來時珍曰來亦作䅘許氏說文云天降瑞麥一來二牟象芒刺之形天所來也如足行來故麥字從來從攴攴音綏足行也詩云貽我來牟是矣又云來象其實攴象其根梵書名麥曰迦師錯集解頌曰大小麥秋種冬長春秀夏實具四時中和之氣故為五穀之貴地暖處亦可春種至夏便收然比秋種者四氣不足故有毒時珍曰北人種麥漫撒南人種麥撮撒北麥皮薄面多南麥反此或云收麥以蠶沙和之闢蠹或云立秋前以蒼耳銼碎同曬收亦不蛀秋後則蟲已生矣蓋麥性惡濕故久雨水潦即多不熟也小麥氣味甘微寒無毒入少陰太陽之經甄權曰平有小毒恭曰小麥作湯不許皮坼坼則性溫不能消熱止煩也藏器曰小麥秋種夏熟受四時氣足兼有寒熱溫涼故麥涼曲溫麩冷面熱宜其然也河渭之西白麥面亦涼以其春種闕二氣也時珍曰新麥性熱陳麥平和主治除客熱止煩渴咽燥利小便養肝氣止漏血唾血令女人易孕別録養心氣心病宜食之思邈煎湯飲治暴淋宗奭熬末服殺腸中蛔蟲藥性陳者煎湯飲止虛汗燒存性油調塗諸瘡湯火傷灼時珍發明時珍曰按素問云麥屬火心之谷也鄭玄雲麥有孚甲屬木許慎云麥屬金金王而生火王而死三說各異而別録云麥養肝氣與鄭說合孫思邈云麥養心氣與素問合夷考其功除煩止渴收汗利溲止血皆心之病也當以素問為準蓋許以時鄭以形而素問以功性故立論不同爾震亨曰饑年用小麥代谷須曬燥以少水潤舂去皮煮為飯食可免面熱之患附方舊二新五消渴心煩用小麥作飯及粥食心鏡老人五淋身熱腹滿小麥一升通草二兩水三升煮一升飲之即愈奉親書項下癭氣用小麥一升醋一升漬之曬乾為末以海藻洗研末三兩和勻每以酒服方寸匕日三小品眉煉頭瘡用小麥燒存性為末油調敷儒門事親白癜風癬用小麥攤石上燒鐵物壓出油搽之甚效醫學正傳湯火傷灼未成瘡者用小麥炒黑研入膩粉油調塗之勿犯冷水必致爛袖珍方金瘡腸出用小麥五升水九升煮取四升綿濾取汁待極冷令病人臥席上含汁噀之腸漸入噀其背並勿令病人知及多人見傍人語即腸不入也乃抬席四角輕搖使腸自入十日中但略食羹物慎勿驚動即殺人劉涓子鬼遺方浮麥即水淘浮起者焙用氣味甘咸寒無毒主治益氣除熱止自汗盜汗骨蒸虛熱婦人勞熱時珍麥麩主治時疾熱瘡湯火瘡爛撲損傷折瘀血醋炒罯貼之日華和麵作餅止泄痢調中去熱健人以醋拌蒸熱袋盛包尉人馬冷失腰腳傷折處止痛散血藏器醋蒸尉手足風濕痹痛寒濕腳氣互易至汗出並良末服止虛汗時珍發明時珍曰麩乃麥皮也與浮麥同性而止汗之功次於浮麥蓋浮麥無肉也凡人身體疼痛及瘡瘍腫爛沾漬或小兒暑月出痘瘡潰爛不能著席睡臥者並用夾褥盛麩縫合藉臥性涼而軟誠妙法也附方新七虛汗盜汗衛生寶鑑用浮小麥文武火炒為末每服二錢半米飲下日三服或煎湯代茶飲一方以豬觜唇煮熟切片蘸食亦良産後虛汗小麥麩牡蠣等分為末以豬肉汁調服二錢日二服胡氏婦人方走氣作痛用釅醋拌麩皮炒熱袋盛尉之生生編滅諸瘢痕春夏用大麥麩秋冬用小麥麩篩粉和酥敷之總録小兒眉瘡小麥麩炒黑研末酒調敷之小便尿血面麩炒香以肥豬肉蘸食之集玄面氣味甘溫有微毒不能消熱止煩別録大明曰性壅熱小動風氣發丹石毒思邈曰多食長宿澼加客氣畏漢椒蘿蔔主治補虛久食實人膚體厚腸胃強氣力藏器養氣補不足助五臟日華水調服治人中暑馬病肺熱宗奭敷癰腫損傷散血止痛生食利大腸水調服止鼻衄吐血時珍發明詵曰面有熱毒者多是陳黝之色又為磨中石末在內故也但杵食之即良藏器曰面性熱惟第二磨者涼為其近麩也河渭以西白麥面性涼以其春種闕二氣也穎曰東南卑濕春多雨水麥已受濕氣又不曾出汗故食之作渴動風氣助濕發熱西北高燥春雨又少麥不受濕復入地窖出汗北人稟厚少濕故常食而不病也時珍曰北面性溫食之不渴南面性熱食之煩渴西邊面性涼皆地氣使然也吞漢椒食蘿蔔皆能解其毒見蘿蔔條醫方中往往用飛羅面取其無石末而性平易爾陳麥面水煮食之無毒以糟發脹者能發病發瘡惟作蒸餅和藥取其易消也按李鵬飛延壽書云北多霜雪故面無毒南方雪少故面有毒顧元慶檐曝偶談云江南麥花夜發故發病江北麥花晝發故宜人又曰魚稻宜江淮羊面宜京洛亦五方有宜不宜也面性雖熱而寒食日以紙袋盛懸風處數十年亦不壞則熱性皆去而無毒矣入藥尤良附方舊六新二十三熱渴心悶溫水一盞調面一兩飲之聖濟總録中暍卒死井水和麵一大抄服之千金夜出盜汗麥面作彈丸空心臥時煮食之次早服妙香散一帖取效內損吐血飛羅面略炒以京墨汁或藕節汁調服二錢醫學集成大衄血出口耳皆出者用白麵入鹽少許冷水調服三錢普濟方中蠱吐血小麥面二合水調服半日當下出廣記嘔噦不止醋和麵作彈丸二三十枚以沸湯煮熟漉出投漿水中待溫吞三兩枚噦定即不用再吞未定至晚再吞兵部手集寒痢白色炒麵每以方寸匕入粥中食之能療日瀉百行師不救者外臺泄痢不固白麵一斤炒焦黃每日空心溫水服一二匙正要諸瘧久瘧用三姓人家寒食麵各一合五月五日午時採青蒿擂自然汁和丸緑豆大臨發日早無根水一丸一方加炒黃丹少許德生堂頭皮虛腫薄如蒸餅狀如裹水以口嚼面敷之良梅師方咽喉腫痛卒不下食白麵和醋塗喉外腫處普濟方婦人吹奶水調面煮糊欲熟即投無灰酒一盞攪勻熱飲令人徐徐按之藥行即瘳經驗方乳癰不消白麵半斤炒黃醋煮為糊塗之即消聖惠方破傷風病白麵燒鹽各一撮新水調塗之普濟方金瘡血出不止用生面干敷五七日即愈藺氏經驗方遠行腳趼成泡者水調生面塗之一夜即平海上折傷瘀損白麵梔子仁同搗以水調敷之即散火燎成瘡炒麵入梔子仁末和油敷之千金瘡中惡肉寒食麵二兩巴豆五分水和作餅燒末摻之仙傳外科白禿頭瘡白麵豆豉和研酢和敷之普濟方小兒口瘡寒食麵五錢硝石七錢水調半錢塗足心男左女右普濟方婦人斷産白麵一升酒一升煮沸去渣分三服經水至時前日夜次日早及天明服之陰冷悶痛漸入腹腫滿醋和麵尉之千金方一切漏瘡鹽面和團燒研敷之千金方瘭疽出汁生手足肩背纍纍如赤豆剝淨以酒和麵敷之千金方一切疔腫面和臘豬脂封之良梅師方傷米食積白麵一兩白酒麴二丸炒為末每服二匙白湯調下如傷肉食山楂湯下簡便方麥粉氣味甘涼無毒主治補中益氣脈和五臟調經絡又炒一合湯服斷下痢孟詵醋熬成膏消一切癰腫湯火傷時珍發明時珍曰麥粉乃是麩面面洗筋澄出漿粉今人漿衣多用之古方鮮用按萬表積善堂方云烏龍膏治一切癰腫發背無名腫毒初發焮熱未破者取效如神用隔年小粉愈久者愈佳以鍋炒之初炒如餳久炒則干成黃黑色冷定研末陳米醋調成糊熬如黑漆瓷罐收之用時攤紙上剪孔貼之即如冰冷疼痛即止少頃覺癢干亦不能動久則腫毒自消藥力亦盡而脫落甚妙此方蘇州杜水庵所傳屢用有驗藥易而功大濟生者宜收藏之麵筋氣味甘涼無毒主治解熱和中勞熱人宜煮食之時珍寬中益氣寧原發明時珍曰麵筋以麩與面水中揉洗而成者古人罕知今為素食要物煮食甚良今人多以油炒則性熱矣宗奭曰生嚼白麵成筋可黏禽蟲麥麨即糗也以麥蒸磨成屑氣味甘微寒無毒主治消渴止煩蜀本麥苗拾遺氣味辛寒無毒主治消酒毒暴熱酒疸目黃並搗爛絞汁日飲之又解蠱毒煮汁濾服藏器除煩悶解時疾狂熱退胸膈熱利小腸作齏食甚益顏色日華麥奴藏器曰麥穗將熟時上有黑黴者也主治熱煩天行熱毒解丹石毒藏器治陽毒溫毒熱極發狂大渴及溫瘧時珍發明時珍曰朱肱南陽活人書治陽毒溫毒熱極發狂發斑大渴倍常者用黑奴丸水化服一丸汗出或微利即愈其方用小麥奴梁上塵釜底煤灶突墨同黃芩麻黃硝黃等分為末蜜丸彈子大蓋取火化者從治之義也麥乃心之谷屬火而奴則麥實將成為濕熱所蒸上黑黴者與釜煤灶墨同一理也其方出陳延之小品方名麥奴丸初虞世古今録驗名高堂丸水解丸誠救急良藥也稈主治燒灰入去疣痣蝕惡肉膏中用時珍大麥別録中品釋名牟麥時珍曰麥之苗粒皆大於來故得大名牟亦大也通作牟集解弘景曰今稞麥一名牟麥似穬麥惟皮薄爾恭曰大麥出關中即青稞麥形似小麥而大皮厚故謂大麥不似穬麥也頌曰大麥今南北皆能種蒔穬麥有二種一種類小麥而大一種類大麥而大藏器曰大穬二麥前後兩出蓋穬麥是連皮者大麥是麥米但分有殼無殼也蘇以青稞為大麥非矣青稞似大麥天生皮肉相離秦隴巴西種之今人將當大麥米糶之不能分也陳承曰小麥今人以磨面日用者為之大麥今人以粒皮似稻者為之作飯滑飼馬良穬麥今人以似小麥而大粒色青黃作面脆硬食多脹人汴洛河北之間又呼為黃稞關中一種青稞比近道者粒微小色微青專以飼馬未見入藥用然大穬二麥其名差互今之穬麥似小麥而大者當謂之大麥今之大麥不似小麥而礦脆者當謂之穬麥不可不審時珍曰大穬二麥注者不一按吳普本草大麥一名穬麥五穀之長也王禎農書云青稞有大小二種似大小麥而粒大皮薄多面無麩西人種之不過與大小麥異名而已郭義恭廣志云大麥有黑穬麥有𥟶麥出涼州似大麥有赤麥赤色而肥據此則穬麥是大麥中一種皮厚而青色者也大抵是一類異種如粟粳之種近百總是一類但方土有不同爾故二麥主治不甚相遠大麥亦有黏者名糯麥可以釀酒氣味咸溫微寒無毒為五穀長令人多熱詵曰暴食似腳弱為下氣故也久服宜人熟則有益帶生則冷而損人石蜜為之使主治消渴除熱益氣調中別録補虛劣壯血脈益顏色實五臟化穀食止泄不動風氣久食令人肥白滑肌膚為面勝於小麥無躁熱士良面平胃止渴消食療脹滿蘇恭久食頭髮不白和針砂沒石子等染髮黑色孟詵寬胸下氣涼血消積進食時珍發明宗奭曰大麥性平涼滑膩有人患纏喉風食不能下用此面作稀糊令咽以助胃氣而平三伏中朝廷作麨以賜臣下震亨曰大麥初熟人多炒食此物有火能生熱病人不知也時珍曰大麥作飯食響而有益煮粥甚滑磨面作醬甚甘美附方舊三新六食飽煩脹但欲臥者大麥面熬微香每白湯服方寸匕佳肘後方膜外水氣大麥面甘遂末各半兩水和作餅炙熟食取利總録小兒傷乳腹脹煩悶欲睡大麥面生用水調一錢服白麵微炒亦可保幼大全蠼螋尿瘡大麥嚼敷之日三上傷寒類要腫毒已破青大麥去須炒暴花為末敷之成靨揭去又敷數次即愈麥芒入目大麥煮汁洗之即出孫真人方湯火傷灼大麥炒黑研末油調搽之被傷腸出以大麥粥汁洗腸推入但飲米糜百日乃可千金卒患淋痛大麥三兩煎湯入薑汁蜂蜜代茶飲聖惠方麥蘖見蘖米下苗主治諸黃利小便杵汁日日服類要冬月面目手足皴瘃煮汁洗之時珍附方新一小便不通陳大麥秸煎濃汁頻服簡便方大麥奴主治解熱疾消藥毒藏器穬麥音礦別録中品釋名時珍曰穬之殼厚而粗礦也集解弘景曰穬麥是馬所食者服食家並食大穬二麥令人輕健炳曰穬麥西川人種食之山東河北人正月種之名春穬形狀與大麥相似時珍曰穬麥有二種一類小麥而大一類大麥而大頌曰穬麥即大麥一種皮厚者陳藏器謂即大麥之連殼者非也按別録自有穬麥功用其皮豈可食乎詳大麥下氣味甘微寒無毒弘景曰此麥性熱而云微寒恐是作屑與合殼異也恭曰穬麥性寒陶云性熱非矣江東少有故也大明曰暴食似動冷氣久即益人主治輕身除熱久服令人多力健行作蘖溫中消食別録補中不動風氣作餅食良蕭炳發明時珍曰別録麥蘖附見穬麥下而大麥下無之則作蘖當以穬為良也今人通用不復分別矣雀麥唐本草校正自草部移入此釋名燕麥唐本蘥音藥杜姥草外臺牛星草時珍曰此野麥也燕雀所食故名日華本草謂此為瞿麥者非矣集解恭曰雀麥在處有之生故墟野林下苗葉似小麥而弱其實似穬麥而細宗奭曰苗與麥同但穗細長而疏唐劉夢得所謂菟葵燕麥動搖春風者也周定王曰燕麥穗極細每穗又分小叉十數個子亦細小舂去皮作面蒸食及作餅食皆可救荒附方舊三胎死腹中胞衣不下上搶心用雀麥一把水五升煮二升溫服子母祕録齒䘌並蟲積年不瘥從少至老者用雀麥一名杜姥草俗名牛星草用苦瓠葉三十枚洗淨取草剪長二寸以瓠葉作五包包之廣一寸厚五分以三年酢漬之至日中以兩包火中炮令熱納口中尉齒外邊冷更易之取包置水中解視即有蟲長三分老者黃色少者白色多即二三十枚少即一二十枚此方甚妙外臺祕要米氣味甘平無毒主治充飢滑腸時珍苗氣味甘平無毒主治女人産不出煮汁飲之蘇恭蕎麥宋嘉祐釋名荍麥音翹烏麥吳瑞花蕎時珍曰蕎麥之莖弱而翹然易長易收磨面如麥故曰蕎曰荍而與麥同名也俗亦呼為甜蕎以別苦蕎楊慎丹鉛録指烏麥為燕麥蓋未讀日用本草也集解炳曰蕎麥作飯須蒸使氣餾烈日曝令開口舂取米仁作之時珍曰蕎麥南北皆有立秋前後下種八九月收刈性最畏霜苗高一二尺赤莖緑葉如烏桕樹葉開小白花繁密粲粲然結實纍纍如羊蹄實有三稜老則烏黑色王禎農書云北方多種磨而為面作煎餅配蒜食或作湯餅謂之河漏以供常食滑細如粉亞於麥面南方亦種但作粉餌食乃農家居冬谷也氣味甘平寒無毒思邈曰酸微寒食之難消久食動風令人頭眩作面和豬羊肉熱食不過八九頓即患熱風鬚眉脫落還生亦希涇邠以北多此疾又不可合黃魚食主治實腸胃益氣力續精神能煉五臟滓穢孟詵作飯食壓丹石毒甚良蕭炳以醋調粉塗小兒丹毒赤腫熱瘡吳瑞降氣寬腸磨積滯消熱腫風痛除白濁白帶脾積泄瀉以沙糖水調炒麵二錢服治痢疾炒焦熱水沖服治絞腸沙痛時珍發明穎曰本草言蕎麥能煉五臟滓穢俗言一年沉積在腸胃者食之亦消去也時珍曰蕎麥最降氣寬腸故能煉腸胃滓滯而治濁帶泄痢腹痛上氣之疾氣盛有濕熱者宜之若脾胃虛寒人食之則大脫元氣而落鬚眉非所宜矣孟詵云益氣力者殆未然也按楊起簡便方云肚腹微微作痛出即瀉瀉亦不多日夜數行者用蕎麥麵一味作飯連食三四次即愈豫壯年患此兩月瘦怯尤甚用消食化氣藥俱不效一僧授此而愈轉用皆效此可徵其煉積滯之功矣普濟治小兒天吊及歷節風方中亦用之附方新十六咳嗽上氣蕎麥粉四兩茶末二錢生蜜二兩水一碗順手攪千下飲之良久下氣不止即愈儒門事親十水腫喘生大戟一錢蕎麥麵二錢水和作餅炙熟為末空心茶服以大小便利為度聖惠男子白濁魏元君濟生丹用荍麥炒焦為末雞子白和丸梧子大每服五十丸鹽湯下日三服赤白帶下方同上禁口痢疾蕎麥麵每服二錢沙糖水調下坦仙方癰疽發背一切腫毒荍麥面硫黃各二兩為末井華水和作餅曬收每用一餅磨水敷之痛則令不痛不痛則令痛即愈直指瘡頭黑凹蕎麥麵煮食之即發起直指痘瘡潰爛用蕎麥粉頻頻敷之痘疹方湯火傷灼用蕎麥麵炒黃研末水和敷之如神奇效方蛇盤瘰癧圍接項上用蕎麥炒去殼海藻白殭蠶炒去絲等分為末白梅浸湯取肉減半和丸緑豆大每服六七十丸食後臨臥米飲下日五服其毒當從大便泄去若與淡菜連服尤好淡菜生於海藻上亦治此也忌豆腐雞羊酒面阮氏方積聚敗血通仙散治男子敗積女人敗血不動真氣用荍麥面三錢大黃二錢半為末臥時酒調服之多能鄙事頭風畏冷李樓云一人頭風首裹重綿三十年不愈豫以蕎麥粉二升水調作二餅更互合頭上微汗即愈怪證奇方頭風風眼蕎麥作錢大餅貼眼四角以米大艾炷灸之即效如神染髮令黑蕎麥針砂各二錢醋和先以漿水洗淨塗之荷葉包至一更洗去再以無食子訶子皮各二兩為末每用二錢大麥面二錢醋和漿水調塗之荷葉包至天明洗去即黑普濟絞腸沙痛蕎麥麵一撮炒黃水烹服簡便方小腸疝氣蕎麥仁炒去尖胡盧巴酒浸曬乾各四兩小茴香炒一兩為末酒糊丸梧子大每空心鹽酒下五十丸兩月大便出白膿去根孫天仁集效方葉主治作茹食下氣利耳目多食即微泄士良孫思邈曰生食動刺風令人身癢秸主治燒灰淋汁取鹼熬干同石灰等分蜜收能爛癰疽蝕惡肉去靨痣最良穰作薦闢壁蝨時珍日華曰燒灰淋汁洗六畜瘡並驢馬躁蹄附方新二噎食蕎麥秸燒灰淋汁入鍋內煎取白霜一錢入蓬砂一錢研末每酒服半錢海上方壁蝨蜈蚣蕎麥秸作薦並燒煙燻之苦蕎麥綱目集解時珍曰苦蕎出南方春社前後種之莖青多枝葉似蕎麥而尖開花帶緑色結實亦似蕎麥稍尖而稜角不峭其味苦惡農家磨搗為粉蒸使氣餾滴去黃汁乃可作為糕餌食之色如豬肝谷之下者聊濟荒爾氣味甘苦溫有小毒時珍曰多食傷胃發風動氣能發諸病黃疾人尤當禁之附方新一明目枕苦蕎皮黑豆皮緑豆皮決明子菊花同作枕至老明目鄧才雜興稻別録下品釋名稌音杜糯亦作糯時珍曰稻稌者粳糯之通稱物理論所謂稻者溉種之總稱是矣本草則專指糯以為稻也稻從舀音函象人在臼上治稻之義稌則方言稻音之轉爾其性黏軟故謂之糯穎曰糯米緩筋令人多睡其性懦也集解弘景曰道家方藥有稻米粳米俱用者此則兩物也稻米白如霜江東無此故通呼粳為稻耳不知色類復云何也恭曰稻者穬谷之通名爾雅云稌稻也粳者不黏之稱一曰秈泛勝之云三月種粳稻四月種秫稻即並稻也陶謂為二蓋不可解也志曰此稻米即糯米也其粒大小似粳米細糠白如雪今通呼粳糯二谷為稻所以惑之按李含光音義引字書解粳字云稻也粳字云稻屬也不黏粢字云稻餅也粢蓋糯也禹錫曰爾雅云稌稻郭璞注云別二名也今沛國呼稌周頌云豐年多黍多稌禮記云牛宜稌幽風云十月獲稻皆是一物也說文云粳稻屬也沛國謂稻為糯字林云糯黏稻也粳不黏稻也然粳糯甚相類以黏不黏為異爾當依說文以稻為糯顏師古刊謬正俗云本草稻米即今之糯米也或通呼粳糯為稻孔子云食夫稻周官有稻人漢有稻田使者並通指粳糯而言所以後人混稱不知稻即糯也宗奭曰稻米今造酒糯稻也其性溫故可為酒酒為陽故多熱西域記天竺國土溽熱稻歲四熟亦可驗矣時珍曰糯稻南方水田多種之其性黏可以釀酒可以為粢可以蒸糕可以熬餳可以炒食其類亦多其穀殼有紅白二色或有毛或無毛其米亦有赤白二色赤者酒多糟少一種粒白如霜長三四分者齊民要術糯有九格雉木大黃馬首虎皮火色等名是矣古人釀酒多用秫故諸說論糯稻往往費辨也秫乃糯粟見本條稻米氣味苦溫無毒思邈曰味甘宗奭曰性溫頌曰糯米性寒作酒則熱糟乃溫平亦如大豆與豉醬之性不同也詵曰涼發風動氣使人多睡不可多食藏器曰久食令人身軟緩人筋也小貓犬食之亦腳屈不能行馬食之足重妊婦雜肉食之令子不利蕭炳曰擁諸經絡氣使四肢不收發風昏昏士良曰久食發心悸及癰疽瘡癤中痛合酒食之醉難醒時珍曰糯性黏滯難化小兒病人最宜忌之主治作飯溫中令人多熱大便堅別録能行營衛中血積解芫青斑蝥毒士良益氣止泄思邈補中益氣止霍亂後吐逆不止以一合研水服之大明以駱駝脂作煎餅食主痔疾蕭炳作糜一斗食主消渴藏器暖脾胃止虛寒泄痢縮小便收自汗發痘瘡時珍發明思邈曰糯米味甘脾之谷也脾病宜食之楊士瀛曰痘疹用糯米取其解毒能釀而發之也時珍曰糯米性溫釀酒則熱熬餳尤甚故脾肺虛寒者宜之若素有痰熱風病及脾病不能轉輸食之最能發病成積孟詵蘇頌或言其性涼性寒者謬說也別録已謂其溫中堅大便令人多熱是豈寒涼者乎今人冷泄者炒食即止老人小便數者作粢糕或丸子夜食亦止其溫肺暖脾可驗矣痘證用之亦取此義附方舊五新十六霍亂煩渴不止糯米三合水五升蜜一合研汁分服或煮汁服楊氏産乳消渴飲水方同上三消渴病梅花湯用糯谷炒出白花桑根白皮等分每用一兩水二碗煎汁飲之三因方下痢禁口糯谷一升炒出白花去殼用薑汁拌濕再炒為末每服一匙湯下三服即止經驗良方久泄食減糯米一升水浸一宿瀝乾慢炒熟磨篩入懷慶山藥一兩每日清晨用半盞入砂糖二匙胡椒末少許以極滾湯調食其味極佳大有滋補久服令人精暖有子祕方也松篁經驗方鼻衄不止服藥不應獨聖散用糯米微炒黃為末每服二錢新汲水調下仍吹少許入鼻中簡要濟衆方勞心吐血糯米半兩蓮子心七枚為末酒服孫仲盈云曾用多效或以墨汁作丸服之淡寮自汗不止糯米小麥麩同炒為末每服三錢米飲下或煮豬肉點食小便白濁白糯丸治人夜小便腳停白濁老人虛人多此證令人卒死大能耗人精液主頭昏重用糯米五升炒赤黑白芷一兩為末糯粉糊丸梧子大每服五十丸木饅頭煎湯下無此用局方補腎湯下若後生稟賦怯弱房室太過小便太多水管蹇澀小便如膏脂入石菖蒲牡蠣粉甚效經驗良方女人白淫糙糯米花椒等分炒為末醋糊丸梧子大每服三四十丸食前醋湯下楊起簡便方胎動不安下黃水用糯米一合黃耆芎藭各五錢水一升煎八合分服産寶小兒頭瘡糯米飯燒灰入輕粉清油調敷普濟方纏蛇丹毒糯米粉和鹽嚼塗之濟急方打撲傷損諸瘡寒食日浸糯米逐日易水至小滿取出日乾為末用水調塗之便民圖纂金瘡癰腫及竹木簽刺等毒用糯米三升於端午前四十九日以冷水浸之一日兩換水輕淘轉勿令攪碎至端午日取出陰乾絹袋盛掛通風處每用旋取炒黑為末冷水調如膏藥隨瘡大小裹定瘡口外以布包定勿動直候瘡瘥若金瘡犯生水作膿腫甚者急裹一二食久即不作膿腫也若癰疽初發才覺焮腫急貼之一夜便消靈苑方喉痹吒腮用前膏貼項下及腫處一夜便消干即換之常令濕為妙竹木簽刺用前膏貼之一夜刺出在藥內也顛犬咬傷糯米一合斑蝥七枚同炒蝥黃去之再入七枚再炒黃去之又入七枚待米出煙去蝥為末油調敷之小便利下佳醫方大成荒年代糧稻米一斗淘汰百蒸百曝搗末日食一飧以水調之服至三十日止可一年不食肘後虛勞不足糯米入豬肚內蒸乾搗作丸子日日服之腰痛虛寒糯米二升炒熟袋盛拴靠痛處內以八角茴香研酒服談野翁試驗方米泔氣味甘涼無毒主治益氣止煩渴霍亂解毒食鴨肉不消者頓飲一盞即消時珍附方舊一煩渴不止糯米泔任意飲之即定研汁亦可外臺糯稻花主治陰乾入揩牙烏須方用時珍稻穰即稻稈氣味辛甘熱無毒主治黃病如金色煮汁浸之仍以谷芒炒黃為末酒服藏器燒灰治墜撲傷損蘇頌燒灰浸水飲止消渴淋汁浸腸痔挼穰藉靴鞋暖足去寒濕氣時珍發明頌曰稻稈灰方出劉禹錫傳信方云湖南李從事墜馬撲傷損用稻稈燒灰以新熟酒連糟入鹽和淋取汁淋痛處立瘥也時珍曰稻穰煮治作紙嫩心取以為鞋皆大為民利其紙不可貼瘡能爛肉按江湖紀聞云有人壁蝨入耳頭痛不可忍百藥不效用稻稈灰煎汁灌入即死而出也附方舊一新八消渴飲水取稻穰中心燒灰每以湯浸一合澄清飲之危氏喉痹腫痛稻草燒取墨煙醋調吹鼻中或灌入喉中滾出痰立愈普濟熱病餘毒攻手足疼痛欲脫用稻穰灰煮汁漬之肘後方下血成痔稻藁燒灰淋汁熱漬三五度瘥崔氏纂要湯火傷瘡用稻草灰冷水淘七遍帶濕攤上干即易若瘡濕者焙乾油敷二三次可愈衛生易簡方惡蟲入耳香油合稻稈灰汁滴入之聖濟總録噎食不下赤稻細梢燒灰滾湯一碗隔絹淋汁三次取汁入丁香一枚白豆蔻半枚米一盞煮粥食神效摘玄妙方小便白濁糯稻草煎濃汁露一夜服之同上解砒石毒稻草燒灰淋汁調青黛三錢服醫方摘要谷穎谷芒也作穩非主治黃病為末酒服藏器又解蠱毒煎汁飲日華糯糠主治齒黃燒取白灰旦旦擦之時珍粳音庚別録中品釋名粳與粳同時珍曰粳乃谷稻之總名也有早中晚三收諸本草獨以晚稻為粳者非矣黏者為糯不黏者為粳糯者懦也粳者硬也但入解熱藥以晚粳為良爾集解弘景曰粳米即今人常食之米但有白赤小大異族四五種猶同一類也可作廩米詵曰淮泗之間最多襄洛土粳米亦堅實而香南方多收火稻最補益人諸處雖多粳米但充飢耳時珍曰粳有水旱二稻南方土下塗泥多宜水稻北方地平惟澤土宜旱稻西南夷亦有燒山地為畬田種旱稻者謂之火米古者惟下種成畦故祭祀謂稻為嘉蔬今人皆拔秧栽插矣其種近百名各不同俱隨土地所宜也其谷之光芒長短大細百不同也其米之赤白紫烏堅松香否不同也其性之溫涼寒熱亦因土産形色而異也真臘有水稻高丈許隨水而長南方有一歲再熟之稻蘇頌之香粳長白如玉可充御貢皆粳之稍異者也粳米氣味甘苦平無毒思邈曰生者寒燔者熱時珍曰北粳涼南粳溫赤粳熱白粳涼晚白粳寒新粳熱陳粳涼凡人嗜生米久成米瘕治之以雞屎白穎曰新米乍食動風氣陳者下氣病人尤宜詵曰常食干粳飯令人熱中唇口乾不可同馬肉食發痼疾不可和蒼耳食令人卒心痛急燒倉米灰和蜜漿服之不爾即死主治益氣止煩止渴止泄別録溫中和胃氣長肌肉蜀本補中壯筋骨益腸胃日華煮汁主心痛止渴斷熱毒下痢孟詵合芡實作粥食益精強志聰耳明目好古通血脈和五臟好顏色時珍出養生集要常食干粳飯令人不噎孫思邈發明詵曰粳米赤者粒大而香水漬之有味益人大抵新熟者動氣經再年者亦發病惟江南人多收火稻貯倉燒去毛至春舂米食之即不發病宜人溫中益氣補下元也宗奭曰粳以白晚米為第一早熟米不及也平和五臟補益胃氣其功莫逮然稍生則復不益脾過熟乃佳穎曰粳有早中晚三收以晚白米為第一各處所産種類甚多氣味不能無少異而亦不大相遠也天生五穀所以養人得之則生不得則死惟此谷得天地中和之氣同造化生育之功故非他物可比入藥之功在所略爾好古曰本草言粳米益脾胃而張仲景白虎湯用之入肺以味甘為陽明之經色白為西方之象而氣寒入手太陰也少陰證桃花湯用之以補正氣竹葉石膏湯用之以益不足時珍曰粳稻六七月收者為早粳止可充食八九月收者為遲粳十月收者為晚粳北方氣寒粳性多涼八九月收者即可入藥南方氣熱粳性多溫惟十月晚稻氣涼乃可入藥遲粳晚粳得金氣多故色白者入肺而解熱也早粳得土氣多故赤者益脾而白者益胃若滇嶺之粳則性熱惟彼土宜之耳附方舊二新十霍亂吐瀉煩渴欲絶用粳米二合研粉入水二盞研汁和淡竹瀝一合頓服普濟赤痢熱躁粳米半升水研取汁入油瓷瓶中蠟紙封口沉井底一夜平旦服之吳內翰家乳母病此服之有效普濟方自汗不止粳米粉絹包頻頻撲之五種尸病粳米二升水六升煮一沸服日三肘後卒心氣痛粳米二升水六升煮六七沸服肘後方米症嗜米有人好啞米久則成症不得米則吐出清水得米即止米不消化久亦斃人用白米五合雞屎一升同炒焦為末水一升頓服少時吐出症如研米汁或白沫淡水乃愈也千金方小兒初生三日應開腸胃助穀神者碎米濃作汁飲如乳酪頻以豆許與兒飲之二七日可與哺慎不得與雜藥也肘後方初生無皮色赤但有紅肉乃受胎未足也用早白米粉撲之肌膚自生普濟方小兒甜瘡生於面耳令母頻嚼白米臥時塗之不過三五次即愈荒年辟穀粳米一斗酒三升漬之曝乾又漬酒盡止取出稍食之可闢三十日足一斛三升辟穀一年肘後方胎動腹痛急下黃汁用粳米五升黃耆六兩水七升煎二升分四服聖惠赤根疔腫白粉熬黑和蜜敷之千金方淅二泔釋名米瀋時珍曰淅音錫洗米也瀋汁也泔甘汁也第二次者清而可用故曰淅二泔氣味甘寒無毒主治清熱止煩渴利小便涼血時珍發明戴原禮曰風熱赤眼以淅二泔睡時冷調洗肝散菊花散之類服之附方新四吐血不止陳紅米泔水溫服一鍾日三次普濟方鼻出衄血頻飲淅二泔仍以真麻油或蘿蔔汁滴入之證治要訣鼻上酒齇以淅二泔食後冷飲外以硫黃入大菜頭內煨碾塗之證治要訣服藥過劑悶亂者粳米瀋飲之外臺炒米湯主治益胃除濕不去火毒令人作渴時珍粳谷奴穀穗煤黑者主治走馬喉痹燒研酒服方寸匕立效時珍出千金禾稈主治解砒毒燒灰新汲水淋汁濾清冷服一碗毒當下出時珍出衛生易簡方秈音仙綱目釋名占稻綱目早稻時珍曰秈亦粳屬之先熟而鮮明之者故謂之秈種自占城國故謂之占俗作黏者非矣集解時珍曰秈似粳而粒小始自閩人得種於占城國宋真宗遣使就閩取三萬斛分給諸道為種故今各處皆有之高仰處俱可種其熟最早六七月可收品類亦多有赤白二色與粳大同小異秈米氣味甘溫無毒主治溫中益氣養胃和脾除濕止泄時珍稈主治反胃燒灰淋汁溫服令吐蓋胃中有蟲能殺之也普濟
