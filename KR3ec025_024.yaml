body:
  text: 谷部第二十四卷谷之三菽豆類一十四種大豆本經中品校正禹錫曰原附大豆黃卷下今分出釋名叔俗作菽時珍曰豆叔皆莢谷之總稱也篆文叔象莢生附莖下垂之形豆象子在莢中之形廣雅云大豆菽也小豆答也角曰莢葉曰藿莖曰萁集解別録曰大豆生太山平澤九月採之頌曰今處處種之有黑白二種入藥用黑者緊小者為雄用之尤佳宗奭曰大豆有緑褐黑三種有大小兩類大者出江浙湖南湖北小者生他處入藥力更佳又可磑為腐食時珍曰大豆有黑白黃褐青斑數色黑者名烏豆可入藥及充食作豉黃者可作腐榨油造醬余但可作腐及炒食而已皆以夏至前後下種苗高三四尺葉團有尖秋開小白花成叢結莢長寸余經霜乃枯按呂氏春秋云得時之豆長莖短足其莢二七為族多枝數節競葉蕃實大菽則圓小菽則團先時者必長以蔓浮葉疏節小莢不實後時者必短莖疏節本虛不實又泛勝之種植書云夏至種豆不用深耕豆花憎見日見日則黃爛而根焦矣知歲所宜以囊盛豆子平量埋陰地冬至後十五日發取量之最多者種焉蓋大豆保歲易得可以備凶年小豆不保歲而難得也黑大豆氣味甘平無毒久服令人身重岐伯曰生溫熟寒藏器曰大豆生平炒食極熱煮食甚寒作豉極冷造醬及生黃卷則平牛食之溫馬食之冷一體之中用之數變之才曰惡五參龍膽得前胡烏喙杏仁牡蠣諸膽汁良詵曰大豆黃屑忌豬肉小兒以炒豆豬肉同食必壅氣致死十有八九十歲已上不畏也時珍曰服萆麻子者忌炒豆犯之脹滿致死服厚朴者亦忌之動氣也主治生研塗癰腫煮汁飲殺鬼毒止痛本經逐水脹除胃中熱痹傷中淋露下瘀血散五臟結積內寒殺烏頭毒炒為屑主胃中熱除痹去腫止腹脹消穀別録煮食治溫毒水腫蜀本調中下氣通關脈制金石藥毒治牛馬溫毒日華煮汁解礜石砒石甘遂天雄附子射罔巴豆芫青斑蝥百藥之毒及蠱毒入藥治下痢臍痛沖酒治風痙及陰毒腹痛牛膽貯之止消渴時珍炒黑熱投酒中飲之治風痹癱緩口噤産後頭風食罷生吞半兩去心胸煩熱熱風恍惚明目鎮心溫補久服好顏色變白不老煮食性寒下熱氣腫壓丹石煩熱汁消腫藏器主中風腳弱産後諸疾同甘草煮湯飲去一切熱毒氣治風毒腳氣煮食治心痛筋攣膝痛脹滿同桑柴灰汁煮食下水鼓腹脹和飯搗塗一切毒腫療男女陰腫以綿裹納之孟詵治腎病利水下氣制諸風熱活血解諸毒時珍發明頌曰仙方修治末服之可以辟穀度飢然多食令人體重久則如故也詵曰每食後磨拭吞三十粒令人長生初服時似身重一年以後便覺身輕又益陽道也穎曰陶華以黑豆入鹽煮常時食之云能補腎蓋豆乃腎之谷其形類腎而又黑色通腎引之以鹽所以妙也時珍曰按養老書云李守愚每晨水吞黑豆二七枚謂之五臟谷到老不衰夫豆有五色各治五臟惟黑豆屬水性寒為腎之谷入腎功多故能治水消脹下氣制風熱而活血解毒所謂同氣相求也又按古方稱大豆解百藥毒豫每試之大不然又加甘草其驗乃奇如此之事不可不知附方舊三十一新三十六服食大豆令人長肌膚益顏色填骨髓加氣力補虛能食不過兩劑大豆五升如作醬法取黃搗末以豬肪煉膏和丸梧子大每服五十丸至百丸溫酒下神驗祕方也肥人不可服之延年祕録救荒濟飢博物志云左慈荒年法用大豆粗細調勻者生熟挼令光暖徹豆內先日不食以冷水頓服訖一切魚肉菜果不得復經口渴即飲冷水初小困十數日後體力壯健不復思食也黃山谷救荒法黑豆貫衆各一升煮熟去衆曬乾每日空心啖五七粒食百木枝葉皆有味可飽也王氏農書云辟穀之方見於石刻水旱蟲荒國有代有甚則懷金立鵠易子炊骸為民父母者不可不知此法也昔晉惠帝永寧二年黃門侍郎劉景先表奏臣遇太白山隱士傳濟飢辟穀仙方臣家大小七十餘口更不食別物若不如斯臣一家甘受刑戮其方用大豆五斗淘淨蒸三遍去皮用大麻子三斗浸一宿亦蒸三遍令口開取仁各搗為末和搗作團如拳大入甑內蒸從戌至子時止寅時出甑午時曬乾為末干服之以飽為度不得食一切物第一頓得七日不飢第二頓得四十九日不飢第三頓三百日不飢第四頓得二千四百日不飢更不必服永不飢也不問老少但依法服食令人強壯容貌紅白永不憔悴口渴即研大麻子湯飲之轉更滋潤臟腑若要重吃物用葵子三合研末煎湯冷服取下藥如金色任吃諸物並無所損前知隨州朱頌教民用之有驗序其首尾勒石於漢陽大別山太平興國寺又方用黑豆五斗淘淨蒸三遍曬乾去皮為末秋麻子三升浸去皮曬研糯米三斗作粥和搗為劑如拳大入甑中蒸一宿取曬為末用紅小棗五斗煮去皮核和為劑如拳大再蒸一夜服之至飽為度如渴飲麻子水便滋潤臟腑也脂麻亦可但不得食一切之物炒豆紫湯頌曰古方有紫湯破血去風除氣防熱産後兩日尤宜服之用烏豆五升清酒一斗炒豆令煙絶投酒中待酒紫赤色去豆量性服之可日夜三盞神驗中風口噤加雞屎白二升和炒投之豆淋酒法宗奭曰治産後百病或血熱覺有餘血水氣或中風困篤或背強口噤或但煩熱瘛瘲口渴或身頭皆腫或身癢嘔逆直視或手足頑痹頭旋眼眩此皆虛熱中風也用大豆三升熬熟至微煙出入瓶中以酒五升沃之經一日以上服酒一升溫覆令少汗出身潤即愈口噤者加獨活半斤微微捶破同沃之産後宜常服以防風氣又消結血中風口喎即上方日服一升千金頭風頭痛即上方密封七日溫服千金破傷中風口噤千金方用大豆一升熬去腥氣勿使太熟杵末蒸令氣遍取下甑以酒一升淋之溫服一升取汗敷膏瘡上即愈經驗方用黑豆四十枚硃砂二十文同研末以酒半盞調一字服之頸項強硬不得顧視大豆一升蒸變色囊裹枕之千金暴得風疾四肢攣縮不能行取大豆三升淘淨濕蒸以醋二升傾入瓶中鋪於地上設席豆上令病人臥之仍重蓋五六層衣豆冷漸漸卻衣仍令一人於被內引挽攣急處更蒸豆再作並飲荊瀝湯如此三日三夜即休崔氏纂要風入臟中治新久腫風入臟中以大豆一斗水五斗煮取一斗二升去滓入美酒鬥半煎取九升旦服三升取汗神驗千金翼風毒攻心煩躁恍惚大豆半升淘淨以水二升煮取七合食後服之心鏡卒風不語大豆煮汁煎稠如飴含之並飲汁肘後方喉痹不語同上法千金卒然失音詵曰用生大豆一升青竹算子四十九枚長四寸闊一分水煮熟日夜二服瘥熱毒攻眼赤痛臉浮用黑豆一升分作十袋沸湯中蒸過更互尉之三遍則愈普濟方卒然中惡大豆二七枚雞子黃一個酒半升和勻頓服千金陰毒傷寒危篤者用黑豆炒乾投酒熱飲或灌之吐則復飲汗出為度居家必用脅痛如打大豆半升熬焦入酒一升煮沸飲取醉肘後腰脅卒痛大豆炒二升酒三升煮二升頓服肘後卒然腰痛大豆六升水拌濕炒熱布裹尉之冷即易乃張文仲所處方也延年祕録腳氣衝心煩悶不識人以大豆一升水三升濃煮汁服半升未定再服半升廣利方身面浮腫千金用烏豆一升水五升煮汁三升入酒五升更煮三升分溫三服不瘥再合王璆百一選方用烏豆煮至皮乾為末每服二錢米飲下建炎初吳內翰女孫忽發腫凸吳檢外臺得此方服之立效新久水腫大豆一斗清水一斗煮取八升去豆入薄酒八升再煎取八升服之再三服水當從小便中出範汪方腹中痞硬夏秋之交露坐夜久腹中痞如群石在腹用大豆半升生薑八分水三升煎一升已來頓服瘥經驗方霍亂脹痛大豆生研水服方寸匕普濟水痢不止大豆一升炒白朮半兩為末每服三錢米飲下指南方赤痢臍痛黑豆茱萸子二件搓摩吞咽之良經驗赤白下痢方見豬膽男子便血黑豆一升炒焦研末熱酒淋之去豆飲酒神效活人心統一切下血雄黑豆緊小者以皂角湯微浸炒熟去皮為末煉豬脂和丸梧子大每服三十丸陳米飲下華他中藏經小兒沙淋黑豆一百二十個生甘草一寸新水煮熱入滑石末乘熱飲之良全幼心鑑腎虛消渴難治者黑大豆炒天花粉等分為末麵糊丸梧子大每黑豆湯下七十丸日二名救活丸普濟方消渴飲水烏豆置牛膽中陰乾百日吞盡即瘥肘後方晝夜不眠以新布火炙尉目並蒸大豆更番囊盛枕之冷即易終夜常枕之即愈肘後方疫癘發腫大黑豆二合炒熟炙甘草一錢水一盞煎汁時時飲之夷堅志云靖康二年春京師大疫有異人書此方於壁間用之立驗也乳石發熱烏豆二升水九升銅器煮五升汁熬稠一升飲之外臺祕要解礜砒毒大豆煮汁飲之良肘後酒食諸毒大豆一升煮汁服得吐即愈廣記解諸魚毒大豆煮汁飲之衛生方解巴豆毒下利不止大豆煮汁一升飲之肘後方惡刺瘡痛大豆濃煮汁漬之取瘥千金方湯火灼瘡大豆煮汁塗之易愈無斑子母祕録打頭青腫豆黃末水和敷之千金方折傷墮墜瘀血在腹氣短大豆五升水一斗煮汁二升頓服劇者不過三作千金方豌瘡煩躁大豆煮汁飲之佳子母祕録痘瘡濕爛黑大豆研末敷之小兒頭瘡黑豆炒存性研水調敷之普濟方身面疣目七月七日以大豆拭疣上三過使本人種豆於南向屋東頭第二溜中豆生葉以熱湯沃殺即愈外臺祕要染髮令烏醋煮黑大豆去豆煎稠染之千金牙齒不生不拘大人小兒年多者用黑豆三十粒牛糞火內燒令煙盡研入麝香少許先以針挑破血出以少許揩之不得見風忌酸鹹物經驗方牙齒疼痛黑豆煮酒頻頻漱之良周密浩然齊視聽抄月經不斷用前紫湯服之佳妊娠腰痛大豆一升酒三升煮七合空心飲之心鏡子死腹中月數未足母欲悶絶者用大豆三升以醋煮濃汁頓服立出産乳胞衣不下大豆半升醇酒三升煮一升半分三服産書闢禳時氣以新布盛大豆一斗納井中一宿取出每服七粒佳類要菜中蛇蠱蛇毒入菜果中食之令人得病名蛇蠱大豆為末酒漬絞汁服半升身如蟲行大豆水漬絞漿旦旦洗之或加少面沐發亦良千金方小兒丹毒濃煮大豆汁塗之甚良千金風疽瘡疥凡腳腨及𦚼䐐中癢搔則黃汁出者是也以青竹筒三尺著大豆一升在內以馬屎糠火燒熏以器承兩頭取汁搽之先以泔清和鹽熱洗之不過三度極效千金肝虛目暗迎風下淚用臘月牯牛膽盛黑豆懸風處取出每夜吞三七粒久久自明龍木論小兒胎熱黑豆二錢甘草一錢入燈心七寸淡竹葉一片水煎不拘時候服全幼心鑑天蛇頭指痛臭甚者黑豆生研末入繭內籠之濟急方大豆皮主治生用療痘瘡目翳嚼爛敷小兒尿灰瘡時珍豆葉主治搗敷蛇咬頻易即瘥時珍出廣利方發明時珍曰按抱朴子內篇云相國張文蔚莊內有鼠狼穴養四子為蛇所吞鼠狼雌雄情切乃於穴外坌土壅穴俟蛇出頭度其回轉不便當腰咬斷而劈腹銜出四子尚有氣置於穴外銜豆葉嚼而敷之皆活後人以豆葉治蛇咬蓋本於此附方新二止渴急方大豆苗嫩者三五十莖塗酥炙黃為末每服二錢人參湯下聖濟總録小便血淋大豆葉一把水四升煮二升頓服千金方花主治主目盲翳膜時珍大豆黃卷本經中品釋名豆蘖弘景曰黑大豆為蘖牙生五寸長便乾之名為黃卷用之熬過服食所須時珍曰一法壬癸日以井華水浸大豆候生芽取皮陰乾用氣味甘平無毒普曰得前胡杏子牡蠣烏喙天雄鼠屎共蜜和良惡海藻龍膽主治濕痹筋攣膝痛本經五臟不足胃氣結積益氣止痛去黑皯潤肌膚皮毛別録破婦人惡血孟詵頌曰古方蓐婦藥中多用之宜腎思邈除胃中積熱消水病脹滿時珍附方新四大豆蘖散治周痹在血脈之中隨脈上下本痹不痛今能上下周身故名治周痹注五臟留滯胃中結聚益氣出毒潤皮毛補腎氣用大豆蘖一斤炒香為末每服半錢溫酒調下空心加至一錢日三服宣明方諸風濕痹筋攣膝痛胃中積熱口瘡煩悶大便祕澀黃卷散用大豆黃卷炒熟搗末一升酥半兩研勻食前溫水服一匙日二服普濟方水病腫滿喘急大小便澀大豆黃卷醋炒大黃炒等分為細末蔥橘皮湯服二錢平明以利為度聖濟總録小兒撮口初生豆芽研爛絞汁和乳灌少許良普濟方黃大豆食鑑集解時珍曰大豆有黑青黃白斑數色惟黑者入藥而黃白豆炒食作腐造醬笮油盛為時用不可不知別其性味也周定王曰黃豆苗高一二尺葉似黑大豆葉而大結角比黑豆角稍肥大其莢葉嫩時可食甘美氣味甘溫無毒時珍曰生溫炒熱微毒多食壅氣生痰動嗽令人身重發麵黃瘡疥主治寬中下氣利大腸消水脹腫毒寧原研末熟水和塗痘後癰時珍附方新一痘後生瘡黃豆燒黑研末香油調塗豆油氣味辛甘熱微毒主治塗瘡疥解發䐈時珍秸主治燒灰入點痣去惡肉藥時珍赤小豆本經中品校正自大豆分出釋名赤豆恭紅豆俗答廣雅葉名藿時珍曰案詩云黍稷稻粱禾麻菽麥此即八谷也董仲舒注云菽是大豆有兩種小豆名答有三四種王禎云今之赤豆白豆緑豆萱豆皆小豆也此則入藥用赤小者也集解頌曰赤小豆今江淮間多種之宗奭曰關西河北汴洛多食之時珍曰此豆以緊小而赤黯色者入藥其稍大而鮮紅淡紅色者並不治病俱於夏至後下種苗科高尺許枝葉似豇豆葉微圓峭而小至秋開花似豇豆花而小淡銀褐色有腐氣結莢長二三寸比緑豆莢稍大皮色微白帶紅三青二黃時即收之可煮可炒可作粥飯餛飩餡並良也氣味甘酸平無毒思邈曰甘咸冷合魚鮓食成消渴作醬同飯食成口瘡藏器曰驢食足輕人食身重主治下水腫排癰腫膿血本經療寒熱熱中消渴止泄痢利小便下腹脹滿吐逆卒澼別録消熱毒散惡血除煩滿通氣健脾胃令人美食搗末同雞子白塗一切熱毒癰腫煮汁洗小兒黃爛瘡不過三度權縮氣行風堅筋骨抽肌肉久食瘦人士良散氣去關節煩熱令人心孔開暴痢後氣滿不能食者煮食一頓即愈和鯉魚煮食甚治腳氣詵解小麥熱毒煮汁解酒病解油衣黏綴日華闢瘟疫治産難下胞衣通乳汁和鯉魚蠡魚鯽魚黃雌雞煮食並能利水消腫時珍發明弘景曰小豆逐津液利小便久服令人肌膚枯燥頌曰水氣腳氣最為急用有人患腳氣以袋盛此豆朝夕展轉踐踏之久久遂愈好古曰治水者惟知治水而不知補胃則失之壅滯赤小豆消水通氣而健脾胃乃其藥也藏器曰赤小豆和桑根白皮煮食去濕氣痹腫和通草煮食則下氣無限名脫氣丸時珍曰赤小豆小而色赤心之谷也其性下行通乎小腸能入陰分治有形之病故行津液利小便消脹除腫止吐而治下痢腸澼解酒病除寒熱癰腫排膿散血而通乳汁下胞衣産難皆病之有形者久服則降令太過津血滲泄所以令人肌瘦身重也其吹鼻瓜蒂散以闢瘟疫用之亦取其通氣除濕散熱耳或言共工氏有不才子以冬至死為疫鬼而畏赤豆故於是日作小豆粥厭之亦傅會之妄說也又案陳自明婦人良方云豫婦食素産後七日乳脈不行服藥無效偶得赤小豆一升煮粥食之當夜遂行因閲本草載此謾記之又朱氏集驗方云宋仁宗在東宮時患痄腮命道士贊寧治之取小豆七十粒為末敷之而愈中貴人任承亮後患惡瘡近死尚書郎傅永授以藥立愈叩其方赤小豆也豫苦脅疽既至五臟醫以藥治之甚驗承亮曰得非赤小豆耶醫謝曰某用此活三十口願勿復言有僧發背如爛瓜鄰家乳婢用此治之如神此藥治一切癰疽瘡疥及赤腫不拘善惡但水調塗之無不愈者但其性黏干則難揭入苧根末即不黏此法尤佳附方舊十五新十九水氣腫脹頌曰用赤小豆五合大蒜一顆生薑五錢商陸根一條並碎破同水煮爛去藥空心食豆旋旋啜汁令盡腫立消也韋宙獨行方治水腫從腳起入腹則殺人赤小豆一斗煮極爛取汁五升溫漬足膝若已入腹但食小豆勿雜食亦愈梅師治水腫以東行花桑枝燒灰一升淋汁煮赤小豆一升以代飯良水蠱腹大動搖有聲皮膚黑者用赤小豆三升白茅根一握水煮食豆以消為度肘後闢禳瘟疫五行書云正月朔旦及十五日以赤小豆二七枚麻子七枚投井中闢瘟疫甚效又正月七日新布囊盛赤小豆置井中三日取出男吞七枚女吞二七枚竟年無病也肘後方闢厭疾病正月元旦面東以齏水吞赤小豆三七枚一年無諸疾又七月立秋日面西以井華水吞赤小豆七枚一秋不犯痢疾傷寒狐惑張仲景曰狐惑病脈數無熱微煩默默但欲臥汗出初得三四日目赤如鳩眼七八日目四眥黃黑若能食者膿已成也赤豆當歸散主之赤小豆三升水浸令芽出當歸三兩為末漿水服方寸匕日三服金匱要略下部卒痛如鳥啄之狀用小豆大豆各一升蒸熟作二囊更互坐之即止肘後方水穀痢疾小豆一合熔蠟三兩頓服取效必效方熱毒下血或因食熱物發動赤小豆末水服方寸匕梅師方腸痔下血小豆二升苦酒五升煮熟日乾再浸至酒盡乃止為末酒服一錢日三服肘後方舌上出血如簪孔小豆一升杵碎水三升和絞汁服肘後方熱淋血淋不拘男女用赤小豆三合慢火炒為末煨蔥一莖擂酒熱調二錢服修真祕旨重舌鵝口赤小豆末醋和塗之普濟方小兒不語四五歲不語者赤小豆末酒和敷舌下千金牙齒疼痛紅豆末擦牙吐涎及吹鼻中一方入銅青少許一方入花鹼少許家寶方中酒嘔逆赤小豆煮汁徐徐飲之食鑑本草頻致墮胎赤小豆末酒服方寸匕日二服千金妊娠行經方同上婦人難産産寶用赤小豆生吞七枚佳集驗治難産日久氣乏用赤小豆一升以水九升煮取汁入炙過黃明膠一兩同煎少時一服五合不過三四服即産胞衣不下用赤小豆男七枚女二七枚東流水吞服之救急方産後目閉心悶赤小豆生研東流水服方寸匕不瘥更服肘後方産後悶滿不能食用小豆三七枚燒研冷水頓服佳千金方乳汁不通赤小豆煮汁飲之産書婦人吹奶赤小豆酒研溫服以滓敷之熊氏婦人乳腫小豆莽草等分為末苦酒和敷佳梅師癰疽初作赤小豆末水和塗之毒即消散頻用有效小品方石癰諸癰赤小豆五合納苦酒中五宿炒研以苦酒和塗即消加栝蔞根等分範汪方痘後癰毒赤小豆末雞子白調塗敷之腮頰熱腫赤小豆末和蜜塗之一夜即消或加芙蓉葉末尤妙丹毒如火赤小豆末和雞子白時時塗之不已逐手即消小品方風瘙癮疹赤小豆荊芥穗等分為末雞子清調塗之金瘡煩滿赤小豆一升苦酒浸一日熬燥再浸滿三日令黑色為末每服方寸匕日三服千金六畜肉毒小豆一升燒研水服三方寸匕神良千金方葉主治去煩熱止小便數別録煮食明目日華發明時珍曰小豆利小便而藿止小便與麻黃髮汗而根止汗同意物理之異如此附方舊一新一小便頻數小豆葉一斤入豉汁中煮調和作羹食之心鏡小兒遺尿小豆葉搗汁服之千金芽主治妊娠數月經水時來名曰漏胎或因房室名曰傷胎用此為末溫酒服方寸匕日三得效乃止時珍出普濟腐婢本經下品集解別録曰腐婢生漢中小豆花也七月採之陰乾四十日弘景曰花與實異用故不同品方家不用未解何故有腐婢之名本經不言是小豆花別録乃云未審是否今海邊有小樹狀如梔子莖條多曲氣似腐臭土人呼為腐婢療瘧有效以酒漬皮服療心腹疾此當是真此條應入木部也恭曰腐婢相承以為葛花葛花消酒大勝而小豆全無此效當以葛花為真禹錫曰按別本云小豆花亦有腐氣與葛花同服飲酒不醉與本經治酒病相合陶蘇二說並非甄權曰腐婢即赤小豆花也頌曰海邊小樹葛花赤小豆花三物皆有腐婢之名名同物異也宗奭曰腐婢既在谷部豆花為是不必多辨時珍曰葛花已見本條小豆能利小便治熱中下氣止渴與腐婢主療相同其為豆花無疑但小豆有數種甄氏藥性論獨指為赤小豆今姑從之氣味辛平無毒主治痎瘧寒熱邪氣泄痢陰不起止消渴病酒頭痛本經心鏡云上證用花同豉汁五味煮羹食之消酒毒明目下水氣治小兒丹毒熱腫散氣滿不能食煮一頓食之藥性治熱中積熱痔瘻下血時珍宣明葛花丸中用之附方新二飲酒不醉小豆花葉陰乾百日為末水服方寸匕或加葛花等分千金疔瘡惡腫小豆花末敷之普濟方緑豆宋開寶釋名時珍曰緑以色名也舊本作菉者非矣集解志曰緑豆圓小者佳粉作餌炙食之良大者名稙豆苗子相似亦能下氣治霍亂也瑞曰有官緑油緑主療則一時珍曰緑豆處處種之三四月下種苗高尺許葉小而有毛至秋開小花莢如赤豆莢粒粗而色鮮者為官緑皮薄而粉多粒小而色深者為油緑皮厚而粉少早種者呼為摘緑可頻摘也遲種呼為拔緑一拔而已北人用之甚廣可作豆粥豆飯豆酒炒食麨食磨而為面澄濾取粉可以作餌頓糕蕩皮搓索為食中要物以水浸濕生白芽又為菜中佳品牛馬之食亦多賴之真濟世之良谷也氣味甘寒無毒藏器曰用之宜連皮去皮則令人小壅氣蓋皮寒而肉平也反棐子殼害人合鯉魚鮓食久則令人肝黃成渴病主治煮食消腫下氣壓熱解毒生研絞汁服治丹毒煩熱風疹藥石發動熱氣奔豚開寶治寒熱熱中止泄痢卒澼利小便脹滿思邈厚腸胃作枕明目治頭風頭痛除吐逆日華補益元氣和調五臟安精神行十二經脈去浮風潤皮膚宜常食之煮汁止消渴孟詵解一切藥草牛馬金石諸毒寧原治痘毒利腫脹時珍發明時珍曰緑豆肉平皮寒解金石砒霜草木一切諸毒宜連皮生研水服按夷堅志云有人服附子酒多頭腫如斗唇裂血流急求緑豆黑豆各數合嚼食並煎湯飲之乃解也附方新十一扁鵲三豆飲治天行痘瘡預服此飲疏解熱毒縱出亦少用緑豆赤小豆黑大豆各一升甘草節二兩以水八升煮極熟任意食豆飲汁七日乃止一方加黃大豆白大豆名五豆飲痘後癰毒初起以三豆膏治之神效緑豆赤小豆黑大豆等分為末醋調時時掃塗即消醫學正傳防痘入眼用緑豆七粒令兒自投井中頻視七遍乃還小兒丹腫緑豆五錢大黃二錢為末用生薄荷汁入蜜調塗全幼心鑑赤痢不止以大麻子水研濾汁煮緑豆食之極效粥食亦可必效方老人淋痛青豆二升橘皮二兩煮豆粥下麻子汁一升空心漸食之並飲其汁甚驗養老書消渴飲水緑豆煮汁並作粥食普濟方心氣疼痛緑豆草一粒胡椒十四粒同研白湯調服即止多食易飢緑豆黃麥糯米各一升炒熟磨粉每以白湯服一杯三五日見效十種水氣用緑豆二合半大附子一隻去皮臍切作兩片水三碗煮熟空心臥時食豆次日將附子兩片作四片再以緑豆二合半如前煮食第三日別以緑豆附子如前煮食第四日如第二日法煮食水從小便下腫自消未消再服忌生冷毒物鹽酒六十日無不效者朱氏集驗方緑豆粉氣味甘涼平無毒原曰其膠黏者脾胃虛人不可多食瑞曰勿近杏仁則爛不能作索主治解諸熱益氣解酒食諸毒治發背癰疽瘡腫及湯火傷灼吳瑞痘瘡濕爛不結痂疕者干撲之良寧原新水調服治霍亂轉筋解諸藥毒死心頭尚溫者時珍解菰菌砒毒汪穎發明時珍曰緑豆色緑小豆之屬木者也通於厥陰陽明其性稍平消腫治痘之功雖同赤豆而壓熱解毒之力過之且益氣厚腸胃通經脈無久服枯人之忌但以作涼粉造豆酒或偏於冷或偏於熱能致人病皆人所為非豆之咎也豆粉須以緑色黏膩者為真外科治癰疽有內托護心散極言其神效丹溪朱氏有論發揮震亨曰外科精要謂內托散一日至三日進十數服可免毒氣內攻臟腑竊詳緑豆解丹毒治石毒味甘入陽明性寒能補為君以乳香去惡腫入少陰性溫善竄為佐甘草性緩解五金八石百藥毒為使想此方專為服丹石發疽者設也若夫年老者病深者證備者體虛者緑豆雖補將有不勝其任之患五香連翹湯亦非必用之劑必當助氣壯胃使根本堅固而行經活血為佐參以經絡時令使毒氣外發此則內托之本意治施之早可以內消也附方新十二護心散又名內托散乳香萬全散凡有疽疾一日至三日之內宜連進十餘服方免變證使毒氣出外服之稍遲毒氣內攻漸生嘔吐或鼻生瘡菌不食即危矣四五日後亦宜間服之用真緑豆粉一兩乳香半兩燈心同研和勻以生甘草濃煎湯調下一錢時時呷之若毒氣衝心有嘔逆之證大宜服此蓋緑豆壓熱下氣消腫解毒乳香消諸癰腫毒服至一兩則香徹瘡孔中真聖藥也李嗣立外科方瘡氣嘔吐緑豆粉三錢干胭脂半錢研勻新汲水調下一服立止普濟霍亂吐利緑豆粉白糖各二兩新汲水調服即愈生生編解燒酒毒緑豆粉蕩皮多食之即解解鴆酒毒緑豆粉三合水調服解砒石毒緑豆粉寒水石等分以藍根汁調服三五錢衛生易簡解諸藥毒已死但心頭溫者用緑豆粉調水服衛生易簡方打撲損傷用緑豆粉新銚炒紫新汲井水調敷以杉木皮縛定其效如神此汀人陳氏夢傳之方淡寮方杖瘡疼痛緑豆粉炒研以雞子白和塗之妙生生編外腎生瘡緑豆粉蚯蚓糞等分研塗之暑月痱瘡緑豆粉二兩滑石一兩和勻撲之一加蛤粉二兩簡易方一切腫毒初起用緑豆粉炒黃黑色豬牙皂莢一兩為末用米醋調敷之皮破者油調之邵真人經驗方豆皮氣味甘寒無毒主治解熱毒退目翳時珍附方新一通神散治癍痘目生翳緑豆皮白菊花穀精草等分為末每用一錢以乾柿餅一枚粟米泔一盞同煮乾食柿日三服淺者五七日見效遠者半月見效直指方豆莢主治赤痢經年不愈蒸熟隨意食之良時珍出普濟豆花主治解酒毒時珍豆芽氣味甘平無毒主治解酒毒熱毒利三焦時珍發明時珍曰諸豆生芽皆腥韌不堪惟此豆之芽白美獨異今人視為尋常而古人未知者也但受濕熱鬱浥之氣故頗發瘡動氣與緑豆之性稍有不同豆葉主治霍亂吐下絞汁和醋少許溫服開寶白豆宋嘉祐釋名飯豆集解詵曰白豆苗嫩者可作菜食生食亦妙穎曰浙東一種味甚勝用以作醬作腐極佳北方水白豆相似而不及也原曰白豆即飯豆也粥飯皆可拌食時珍曰飯豆小豆之白者也亦有土黃色者豆大如緑豆而長四五月種之苗葉似赤小豆而略大可食莢亦似小豆一種蓘豆葉如大豆可作飯作腐亦其類也氣味甘平無毒原曰咸平主治補五臟調中助十二經脈孟詵暖腸胃日華殺鬼氣腎之谷腎病宜食之思邈葉主治煮食利五臟下氣日華穭豆拾遺音呂釋名時珍曰穭乃自生稻名也此豆原是野生故名今人亦種之於下地矣集解藏器曰穭豆生田野小而黑堪作醬爾雅戎菽一名驢豆古名䝁豆是也瑞曰穭豆即黑豆中最細者時珍曰此即黑小豆也小科細粒霜後乃熟陳氏指為戎菽誤矣爾雅亦無此文戎菽乃胡豆䝁豆乃鹿豆見菜部並四月熟氣味甘溫無毒主治去賊風風痹婦人産後冷血炒令焦黑及熱投酒中漸漸飲之藏器豌豆拾遺釋名胡豆拾遺戎菽爾雅回鶻豆遼志飲膳正要作回回豆回回即回鶻也畢豆唐史崔實月令作𧰆豆青小豆千金青斑豆別録麻纍時珍曰胡豆豌豆也其苗柔弱宛宛故得豌名種出胡戎嫩時青色老則斑麻故有胡戎青斑麻纍諸名陳藏器拾遺雖有胡豆但云苗似豆生田野間米中往往有之然豌豆蠶豆皆有胡豆之名陳氏所云蓋豌豆也豌豆之粒小故米中有之爾雅戎菽謂之荏菽管子山戎出荏菽布之天下並注云即胡豆也唐史畢豆出自西戎回鶻地面張揖廣雅畢豆豌豆留豆也別録序例云丸藥如胡豆大者即青斑豆也孫思邈千金方云青小豆一名胡豆一名麻纍鄴中記云石虎諱胡改胡豆為國豆此數說皆指豌豆也蓋古昔呼豌豆為胡豆今則蜀人專呼蠶豆為胡豆而豌豆名胡豆人不知矣又鄉人亦呼豌豆大者為淮豆蓋回鶻音相近也集解時珍曰豌豆種出西胡今北土甚多八九月下種苗生柔弱如蔓有須葉似蒺藜葉兩兩對生嫩時可食三四月開小花如蛾形淡紫色結莢長寸許子圓如藥丸亦似甘草子出胡地者大如杏仁煮炒皆佳磨粉面甚白細膩百穀之中最為先登又有野豌豆粒小不堪惟苗可茹名翹搖見菜部氣味甘平無毒思邈曰甘咸溫平澀瑞曰多食發氣病主治消渴淡煮食之良藏器治寒熱熱中除吐逆止泄痢澼下利小便腹脹滿思邈調營衛益中平氣煮食下乳汁可作醬用瑞煮飲殺鬼毒心病解乳石毒發研末塗癰腫痘瘡作澡豆去䵟𪒟令人面光澤時珍發明時珍曰豌豆屬土故其所主病多系脾胃元時飲膳每用此豆搗去皮同羊肉治食云補中益氣今為日用之物而唐宋本草見遺可謂缺典矣千金外臺洗面澡豆方盛用畢豆麵亦取其白膩耳附方新三四聖丹治小兒痘中有疔或紫黑而大或黑壞而臭或中有黑線此症十死八九惟牛都御史得祕傳此方點之最妙用豌豆四十九粒燒存性頭髮灰三分真珠十四粒炒研為末以油燕脂同杵成膏先以簪挑疔破咂去惡血以少許點之即時變紅活色服石毒發胡豆半升搗研以水八合絞汁飲之即愈外臺霍亂吐利豌豆三合香葇三兩為末水三盞煎一盞分二服聖惠蠶豆食物釋名胡豆時珍曰豆莢狀如老蠶故名王禎農書謂其蠶時始熟故名亦通吳瑞本草以此為豌豆誤矣此豆種亦自西胡來雖與豌豆同名同時種而形性迥別太平御覽云張騫使外國得胡豆種歸指此也今蜀人呼此為胡豆而豌豆不復名胡豆矣集解時珍曰蠶豆南土種之蜀中尤多八月下種冬生嫩苗可茹方莖中空葉狀如匙頭本圓末尖面緑背白柔厚一枝三葉二月開花如蛾狀紫白色又如豇豆花結角連綴如大豆頗似蠶形蜀人收其子以備荒歉氣味甘微辛平無毒主治快胃和臟腑汪穎發明時珍曰蠶豆本草失載萬表積善堂方言一女子誤吞針入腹諸醫不能治一人教令煮蠶豆同韭菜食之針自大便同出此亦可驗其性之利臟腑也苗氣味苦微甘溫主治酒醉不省油鹽炒熟煮湯灌之效穎豇豆綱目江絳二音釋名豇䝄音絳雙時珍曰此豆紅色居多莢必雙生故有豇豇䝄之名廣雅指為胡豆誤矣集解時珍曰豇豆處處三四月種之一種蔓長丈餘一種蔓短其葉俱本大末尖嫩時可茹其花有紅白二色莢有白紅紫赤斑駁數色長者至二尺嫩時充菜老則收子此豆可菜可果可谷備用最多乃豆中之上品而本草失收何哉氣味甘咸平無毒主治理中益氣補腎健胃和五臟調營衛生精髓止消渴吐逆泄痢小便數解鼠莽毒時珍發明時珍曰豇豆開花結莢必兩兩並垂有習坎之義豆子微曲如人腎形所謂豆為腎谷者宜以此當之昔盧廉夫教人補腎氣每日空心煮豇豆入少鹽食之蓋得此理與諸疾無禁但水腫忌補腎不宜多食耳又袖珍方云中鼠莽毒者以豇豆煮汁飲即解欲試者先刈鼠莽苗以汁潑之便根爛不生此則物理然也藊豆音扁別録中品釋名沿籬豆俗蛾眉豆時珍曰藊本作扁莢形扁也沿籬蔓延也蛾眉象豆脊白路之形也集解弘景曰藊豆人家種之於籬垣其莢蒸食甚美頌曰蔓延而上大葉細花花有紫白二色莢生花下其實有黑白二種白者溫而黑者小冷入藥用白者黑者名鵲豆蓋以其黑間有白道如鵲羽也時珍曰扁豆二月下種蔓生延纏葉大如杯團而有尖其花狀如小蛾有翅尾形其莢凡十餘樣或長或團或如龍爪虎爪或如豬耳刀鐮種種不同皆纍纍成枝白露後實更繁衍嫩時可充蔬食茶料老則收子煮食子有黑白赤斑四色一種莢硬不堪食惟豆子粗圓而色白者可入藥本草不分別亦缺文也白扁豆修治時珍曰凡用取硬殼扁豆子連皮炒熟入藥亦有水浸去皮及生用者從本方氣味甘微溫無毒詵曰微寒患冷人勿食弘景曰患寒熱者不可食主治和中下氣別録補五臟主嘔逆久服頭不白孟詵療霍亂吐利不止研末和醋服之同上行風氣治女子帶下解酒毒河豚魚毒蘇頌解一切草木毒生嚼及煮汁飲取效甄權止泄痢消暑暖脾胃除濕熱止消渴時珍發明時珍曰硬殼白扁豆其子充實白而微黃其氣腥香其性溫平得乎中和脾之谷也入太陰氣分通利三焦能化清降濁故專治中宮之病消暑除濕而解毒也其軟殼及黑鵲色者其性微涼但可供食亦調脾胃附方新九霍亂吐利扁豆香薷各一升水六升煮二升分服千金霍亂轉筋白扁豆為末醋和服普濟方消渴飲水金豆丸用白扁豆浸去皮為末以天花粉汁同蜜和丸梧子大金箔為衣每服二三十丸天花粉汁下日二服忌炙爆酒色次服滋腎藥仁存堂方赤白帶下白扁豆炒為末用米飲每服二錢毒藥墮胎女人服草藥墮胎腹痛者生白扁豆去皮為末米飲服方寸匕濃煎汁飲亦可丸服若胎氣已傷未墮者或口噤手強自汗頭低似乎中風九死一生醫多不識作風治必死無疑中砒霜毒白扁豆生研水絞汁飲並永類方六畜肉毒白扁豆燒存性研冷水服之良事林廣記諸鳥肉毒生扁豆末冷水服之同上惡瘡痂癢作痛以扁豆搗封痂落即愈肘後花主治女子赤白帶下乾末米飲服之蘇頌焙研服治崩帶作餛飩食治泄痢擂水飲解中一切藥毒垂死功同扁豆時珍附方新二血崩不止白扁豆花焙乾為末每服二錢空心炒米煮飲入鹽少許調下即效奇效良方一切泄痢白扁豆花正開者擇淨勿洗以滾湯瀹過和小豬脊𦛗肉一條蔥一根胡椒七粒醬汁拌勻就以瀹豆花汁和麵包作小餛飩炙熟食之必用食治方葉主治霍亂吐下不止別録吐利後轉筋生搗一把入少酢絞汁服立瘥醋炙研服治瘕疾孟詵杵敷蛇咬大明藤主治霍亂同蘆蘀人參倉米等分煎服時珍刀豆綱目釋名挾劍豆時珍曰以莢形命名也案段成式酉陽雜俎云樂浪有挾劍豆莢生橫斜如人挾劍即此豆也集解穎曰刀豆長尺許可入醬用時珍曰刀豆人多種之三月下種蔓生引一二丈葉如豇豆葉而稍長大五六七月開紫花如蛾形結莢長者近尺微似皂莢扁而劍脊三稜宛然嫩時煮食醬食蜜煎皆佳老則收子子大如拇指頭淡紅色同豬肉雞肉煮食尤美氣味甘平無毒主治溫中下氣利腸胃止厄逆益腎補元時珍發明時珍曰刀豆本草失載惟近時小書載其暖而補元陽也又有人病後厄逆不止聲聞鄰家或令取刀豆子燒存性白湯調服二錢即止此亦取其下氣歸元而逆自止也黎豆拾遺校正自草部移入此釋名貍豆綱目虎豆藏器曰豆子作貍首文故名時珍曰黎亦黑色也此豆莢老則黑色有毛露筋如虎貍指爪其子亦有點如虎貍之斑煮之汁黑故有諸名集解藏器曰黎豆生江南蔓如葛子如皂莢子作貍首文人炒食之別無功用陶氏注蚺蛇膽云如黎豆者即此也爾雅云諸慮一名虎涉又注櫐根云苗如豆爾雅攝虎櫐郭璞注云江東呼櫐為藤似葛而粗大纏蔓林樹莢有毛刺一名豆搜今虎豆也千歲櫐是矣時珍曰爾雅虎櫐即貍豆也古人謂藤為櫐後人訛櫐為貍矣爾雅山櫐虎櫐原是二種陳氏合而為一謂諸慮一名虎涉又以為千歲櫐並誤矣千歲櫐見草部貍豆野生山人亦有種之者三月下種生蔓其葉如豇豆葉但文理偏斜六七月開花成簇紫色狀如扁豆花一枝結莢十餘長三四寸大如拇指有白茸毛老則黑而露筋宛如干熊指爪之狀其子大如刀豆子淡紫色有斑點如貍文煮去黑汁同豬雞肉再煮食味乃佳氣味甘微苦溫有小毒多食令人悶主治溫中益氣時珍
