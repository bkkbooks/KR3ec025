body:
  text: 菜部第二十七卷菜之二柔滑類四十一種菠薐宋嘉祐釋名菠菜綱目波斯草綱目赤根菜慎微曰按劉禹錫嘉話録云菠薐種出自西國有僧將其子來云本是頗陵國之種語訛為波稜耳時珍曰按唐會要云太宗時尼波羅國獻波稜菜類紅藍實如蒺藜火熟之能益食味即此也方士隱名為波斯草云集解時珍曰波稜八月九月種者可備冬食正月二月種者可備春蔬其莖柔脆中空其葉緑膩柔厚直出一尖旁出兩尖似鼓子花葉之狀而長大其根長數寸大如桔梗而色赤味更甘美四月起苔尺許有雄雌就莖開碎紅花叢簇不顯雌者結實有刺狀如蒺藜子種時須砑開易浸脹必過月朔乃生亦一異也菜及根氣味甘冷滑無毒士良曰微毒多食令人腳弱發腰痛動冷氣先患腹冷者必破腹不與鱔魚同食發霍亂取汁煉霜制砒汞伏雌黃硫黃主治利五臟通腸胃熱解酒毒服丹石人食之佳孟詵通血脈開胸膈下氣調中止渴潤燥根尤良時珍發明詵曰北人食肉面食之即平南人食魚鱉水米食之即冷故多食冷大小腸也時珍曰按張從正儒門事親云凡人久病大便澀滯不通及痔漏之人宜常食菠薐葵菜之類滑以養竅自然通利附方新一消渴引飲日至一石者菠薐根雞內金等分為末米飲服一錢日三經驗方蕹菜蕹去聲宋嘉祐釋名時珍曰蕹與壅同此菜惟以壅成故謂之壅集解藏器曰蕹菜嶺南種之蔓生開白花堪茹時珍曰蕹菜今金陵及江夏人多蒔之性宜濕地畏霜雪九月藏入土窖中三四月取出壅以糞土即節節生芽一本可成一畦也干柔如蔓而中空葉似菠薐及鏨頭形味短須同豬肉煮令肉色紫乃佳段公路北戶録言其葉如柳者誤矣按嵇含草木狀云蕹菜葉如落葵而小南人編葦為筏作小孔浮水上種子於水中則如萍根浮水面及長成莖葉皆出於葦筏孔中隨水上下南方之奇蔬也則此菜水陸皆可生之也氣味甘平無毒主治解胡蔓草毒即野葛毒煮食之亦生搗服藏器搗汁和酒服治産難時珍出唐瑤方發明藏器曰南人先食蕹菜後食野葛二物相伏自然無苦取汁滴野葛苗當時萎死相殺如此張華博物志云魏武帝啖野葛至一尺應是先食此菜也菾菜菾音甜別録中品校正併入嘉祐莙薘菜釋名莙薘菜時珍曰菾菜即莙薘也菾與甜通因其味也莙薘之義未詳集解弘景曰菾菜即今以作鮓蒸者恭曰菾菜葉似升麻苗南人蒸炮食之大香美保升曰苗高三四尺莖若蒴藋有細稜夏盛冬枯其莖燒灰淋汁洗衣白如玉色士良曰葉似紫菊而大花白時珍曰菾菜正二月下種宿根亦自生其葉青白色似白菘菜葉而短莖亦相類但差小耳生熟皆可食微作土氣四月開細白花結實狀如茱萸梂而輕虛土黃色內有細子根白色氣味甘苦大寒滑無毒禹錫曰平微毒冷氣人不可多食動氣先患腹冷人食之必破腹主治時行壯熱解風熱毒搗汁飲之便瘥別録夏月以菜作粥食解熱止熱毒痢搗爛敷灸瘡止痛易瘥蘇恭搗汁服主冷熱痢又止血生肌及諸禽獸傷敷之立愈藏器煎湯飲開胃通心膈宜婦人大明補中下氣理脾氣去頭風利五臟嘉祐根氣味甘平無毒主治通經脈下氣開胸膈正要子主治煮半生搗汁服治小兒熱孟詵醋浸揩面去粉滓潤澤有光藏器附方新一痔瘻下血莙薘子蕓薹子荊芥子芫荽子萵苣子蔓荊子蘿蔔子蔥子等分以大鯽魚一個去鱗腸裝藥在內縫合入銀石器內上下用火煉熟放冷為末每服二錢米飲下日二服東風菜宋開寶釋名冬風志曰此菜先春而生故有東風之號一作冬風言得冬氣也集解志曰東風菜生嶺南平澤莖高二三尺葉似杏葉而長極厚軟上有細毛煮食甚美時珍曰按裴淵廣州記云東風菜花葉似落妊娠莖紫宜肥肉作羹食香氣似馬蘭味如酪氣味甘寒無毒主治風毒壅熱頭痛目眩肝熱眼赤堪入羹臛食開寶薺別録上品釋名護生草時珍曰薺生濟澤故謂之薺釋家取其莖作挑燈杖可闢蟻蛾謂之護生草云能護衆生也集解普曰薺生野中弘景曰薺類甚多此是今人所食者葉作菹羹亦佳詩云誰謂荼苦其甘如薺是也時珍曰薺有大小數種小薺葉花莖扁味美其最細小者名沙薺也大薺科葉皆大而味不及其莖硬有毛者名菥蓂味不甚佳並以冬至後生苗二三月起莖五六寸開細白花整整如一結莢如小萍而有三角莢內細子如葶藶子其子名蒫音嵯四月收之師曠云歲欲甘甘草先生薺是也菥蓂葶藶皆是薺類葶藶見草部隰草類氣味甘溫無毒主治利肝和中別録利五臟根治目痛大明明目益胃時珍根葉燒灰治赤白痢極效甄權附方舊一新二暴赤眼痛脹磣澀薺菜根杵汁滴之聖惠眼生翳膜薺菜和根莖葉洗淨焙乾為細末每夜臥時先洗眼挑末米許安兩大眥頭澀痛忍之久久膜自落也聖濟總録腫滿腹大四肢枯瘦尿澀用甜葶藶炒薺菜根等分為末煉蜜丸彈子大每服一丸陳皮湯下只二三丸小便清十餘丸腹如故三因蒫實普曰五月五日採陰乾士良曰亦名菥蓂子四月八日收之良周王曰飢歲採子水調成塊煮粥作餅甚黏滑氣味甘平無毒權曰患氣人食之動冷疾詵曰不與面同食令人背悶服丹石人不可食主治明目目痛別録青盲不見物補五臟不足甄權治腹脹吳普去風毒邪氣治壅去翳解熱毒久服視物鮮明士良花主治布席下闢蟲又闢蚊蛾士良陰乾研末棗湯日服二錢治久痢大明菥蓂音錫覓本經上品校正自草部移入此釋名大薺別録大蕺本經馬辛時珍曰諸名不可解吳普本草又云一名析目一名榮目一名馬駒集解別録曰菥蓂生咸陽川澤及道旁四月五月採曝乾弘景曰今處處有之是大薺子也方用甚希少保升曰似薺葉而細俗呼為老薺恭曰爾雅云菥蓂大薺也注云似薺俗呼為老薺然其味甘而不辛也藏器曰本經菥蓂一名大薺蘇氏引爾雅為注案大薺即葶藶非菥蓂也菥蓂大而扁葶藶細而圓二物殊別也頌曰爾雅葶藶謂之蕇音典子葉皆似芥一名狗薺菥蓂即大薺大抵二物皆薺類故人多不能細分乃爾致疑也古今眼目方多用之時珍曰薺與菥蓂一物也但分大小二種耳小者為薺大者為菥蓂菥蓂有毛故其子功用相同而陳士良之本草亦謂薺實一名菥蓂也葶藶與菥蓂同類但菥蓂味甘花白葶藶味苦花黃為異耳或言菥蓂即甜葶藶亦通苗氣味甘平無毒主治和中益氣利肝明目時珍菥蓂子氣味辛微溫無毒恭曰甘而不辛普曰神農雷公辛李當之小溫之才曰得蔓荊實細辛良惡乾薑苦參一云苦參為之使主治明目目痛淚出除痹補五臟益精光久服輕身不老本經療心腹腰痛別録治肝家積聚眼目赤腫甄權附方舊一新一眼目熱痛淚出不止菥蓂子搗篩為末臥時銅簪點少許入目當有熱淚及惡物出甚佳眼中胬肉方同上夜夜點之崔元亮海上方繁縷別録下品釋名䕅縷爾雅蔜音敖𦼔縷郭璞滋草千金鵝腸菜時珍曰此草莖蔓甚繁中有一縷故名俗呼鵝兒腸菜象形也易於滋長故曰滋草古樂府云為樂當及時何能待來滋滋乃草名即此也集解別録曰繁縷五月五日日中採乾用恭曰此即是雞腸也多生濕地坑渠之側流俗通謂雞腸雅士總名繁縷詵曰繁縷即藤也又恐白軟草是保升曰葉青花白採苗入藥頌曰即雞腸也南中多有之生於田野間近汴下濕地亦或有之葉似荇菜而小夏秋間生小白黃花其莖梗作蔓斷之有絲縷又細而中空似雞腸因得此名本草繁縷雞腸作兩條蘇恭以為一物謹按郭璞注爾雅云䕅縷一名雞腸草實一物也今南北所生或肥瘠不同故人疑為二物而葛洪肘後方治卒淋云用雞腸及繁縷如此又似是二物其用大概主血故人宜食之時珍曰繁縷即鵝腸非雞腸也下濕地極多正月生苗葉大如指頭細莖引蔓斷之中空有一縷如絲作蔬甘脆三月以後漸老開細瓣白花結小實大如稗粒中有細子如葶藶子吳瑞本草謂黃花者為繁縷白花者為雞腸亦不然二物蓋相似但鵝腸味甘莖空有縷花白色雞腸味微苦咀之涎滑莖中無縷色微紫花亦紫色以此為別氣味酸平無毒權曰苦時珍曰甘微咸詵曰溫思邈曰黃帝云合鱔鮓食發消渴令人多忘主治積年惡瘡痔不愈別録破血下乳汁産婦宜食之産後腹有塊痛以酒炒絞汁溫服又曝乾為末醋糊和丸空腹服五十丸取下惡血藏器發明弘景曰此菜五月五日採曝乾燒作屑療雜瘡有效亦雜百草服之不止此一種也詵曰治惡瘡有神效之功搗汁塗之作菜食益人須五月五日者乃驗又曰能去惡血不可久食恐血盡附方舊二新二食治烏髭繁縷為齏久久食之能烏髭發聖惠方小便卒淋繁縷草滿兩手水煮常常飲之範汪東陽方産婦有塊作痛繁縷方見上丈夫陰瘡莖及頭潰爛痛不可忍久不瘥者以五月五日繁縷燒焦五分入新出蚯蚓屎二分入少水和研作餅貼之干即易禁酒面五辛及熱食等物甚效扁鵲方雞腸草別録下品校正原在草部唐本移入此集解弘景曰人家園庭亦有此草小兒取挼汁以捋蜘蛛網至黏可掇蟬恭曰此即繁縷也剩出此條時珍曰雞腸生下濕地二月生苗葉似鵝腸而色微深莖帶紫中不空無縷四月有小莖開五出小紫花結小實中有細子其苗作蔬不如鵝腸故別録列繁縷於菜部而列此於草部以此故也蘇恭不識疑為一物誤矣生嚼涎滑故可掇蟬鵝腸生嚼無涎亦自可辨鄭樵通志謂雞腸似蓼而小其味小辛非繁縷者得之又石胡荽亦名雞腸草與此不同氣味微辛苦平無毒權曰苦之才曰微寒主治毒腫止小便利別録療蠼螋溺瘡弘景主遺溺洗手足傷水爛甄權五月五日作灰和鹽療一切瘡及風丹遍身癢痛亦可搗封日五六易之作菜食益人去脂膏毒氣又燒敷疳𧈟取汁和蜜服療小兒赤白痢甚良孟詵研末或燒灰揩齒去宣露蘇頌附方舊四新五止小便利雞腸草一斤於豆豉汁中煮和米作羹及粥頻食之食醫心鏡小兒下痢赤白雞腸草搗汁一合和蜜服甚良孟詵食療氣淋脹痛雞腸草三兩石葦去毛一兩每用三錢水一盞煎服聖濟總録風熱牙痛浮腫發歇元臟氣虛小兒疳蝕雞腸草旱蓮草細辛等分為末每日擦三次名祛痛散普濟方發背欲死雞腸草搗敷之肘後方反花惡瘡雞腸草研汁拂之或為末豬脂調搽極效醫林正宗一切頭瘡雞腸草燒灰和鹽敷之孟詵食療漆瘡瘙癢雞腸草搗塗之肘後方射工中人成瘡者以雞腸草搗塗之經日即愈盧氏方苜蓿別録上品釋名木粟綱目光風草時珍曰苜蓿郭璞作牧宿謂其宿根自生可飼牧牛馬也又羅願爾雅翼作木粟言其米可炊飯也葛洪西京雜記云樂遊苑多苜蓿風在其間常蕭蕭然日照其花有光采故名懷風又名光風茂陵人謂之連枝草金光明經謂之塞鼻力迦集解弘景曰長安中乃有苜蓿園北人甚重之江南不甚食之以無味故也外國復有苜蓿草以療目非此類也詵曰彼處人採其根作土黃耆也宗奭曰陝西甚多用飼牛馬嫩時人兼食之有宿根刈訖復生時珍曰雜記言苜蓿原出大宛漢使張騫帶歸中國然今處處田野有之陝隴人亦有種者年年自生刈苗作蔬一年可三刈二月生苗一科數十莖莖頗似灰藋一枝三葉葉似決明葉而小如指頂緑色碧豔入夏及秋開細黃花結小莢圓扁旋轉有刺數莢纍纍老則黑色內有米如穄米可為飯亦可釀酒羅願以此為鶴頂草誤矣鶴頂乃紅心灰藋也氣味苦平澀無毒宗奭曰微甘淡詵曰涼少食好多食令冷氣入筋中即瘦人李鵬飛曰同蜜食令人下利主治安中利人可久食別録利五臟輕身健人洗去脾胃間邪熱氣通小腸諸惡熱毒煮和醬食亦可作羹孟詵利大小腸宗奭干食益人蘇頌根氣味寒無毒主治熱病煩滿目黃赤小便黃酒疸搗取汁服一升令人吐利即愈蘇恭搗汁煎飲治沙石淋痛時珍莧本經上品釋名時珍曰按陸佃埤雅云莧之莖葉皆高大而易見故其字從見指事也集解別録曰莧實一名莫實細莧亦同生淮陽川澤及田中葉如藍十一月採李當之曰莧實即莧菜也弘景曰莧實當是白莧所以云細莧亦同葉如藍也細莧即是粳莧食之乃勝而並冷利被霜乃熟故云十一月採又有赤莧莖純紫不堪食馬莧別一種布地生實至微細俗呼馬齒莧恐非莧實也恭曰赤莧一名蕢音匱經言莧實一名莫實疑莫字誤矣保升曰莧凡六種赤莧白莧人莧紫莧五色莧馬莧也惟人白二莧實可入藥用赤莧味辛別有功用頌曰人莧白莧俱大寒亦謂之粳莧又謂之胡莧或謂之細莧其實一也但大者為白莧小者為人莧耳其子霜後方熟細而色黑紫莧莖葉通紫吳人用染爪者諸莧中惟此無毒不寒赤莧亦謂之花莧莖葉深赤根莖亦可糟藏食之甚美味辛五色莧今亦稀有細莧俗謂之野莧豬好食之又名豬莧時珍曰莧並三月撒種六月以後不堪食老則抽莖如人長開細花成穗穗中細子扁而光黑與青葙子雞冠子無別九月收之細莧即野莧也北人呼為粳莧柔莖細葉生即結子味比家莧更勝俗呼青葙苗為雞冠莧亦可食見草部菜氣味甘冷利無毒恭曰赤莧辛寒鼎曰莧動氣令人煩悶冷中損腹不可與鱉同食生鱉症又取鱉肉如豆大以莧菜封裹置土坑內以土蓋之一宿盡變成小鱉也機曰此説屢試不驗主治白莧補氣除熱通九竅孟詵赤莧主赤痢射工沙蝨蘇恭紫莧殺蟲毒治氣痢藏器六莧並利大小腸治初痢滑胎時珍發明弘景曰人莧細莧並冷利赤莧療赤下而不堪食方用莧菜甚稀斷谷方中時用之頌曰赤莧微寒故主血痢紫莧不寒比諸莧無毒故主氣痢詵曰五月五日收莧菜和馬齒莧為細末等分與妊娠人常服令易産也震亨曰紅莧入血分善走故與馬莧同服能下胎或煮食之令人易産附方舊二新五産後下痢赤白者用紫莧菜一握切煮汁入粳米三合煮粥食之立瘥也壽親養老書小兒緊唇赤莧搗汁洗之良聖惠漆瘡搔癢莧菜煎湯洗之蜈蚣螫傷取灰莧葉擦之即止談野翁方蜂蠆螫傷野莧挼擦之諸蛇螫人紫莧搗汁飲一升以滓塗之集驗方射工中人狀如傷寒寒熱發瘡偏在一處有異於常者取赤莧合莖葉搗汁飲一升日再服之集驗方莧實氣味甘寒無毒主治青盲明目除邪利大小便去寒熱久服益氣力不飢輕身本經治白翳殺蛔蟲別録益精大明肝風客熱翳目黑花時珍發明時珍曰莧實與青葙子同類異種故其治目之功亦倣佛也附方新一利大小便莧實為末半兩分二服新汲水下聖惠根主治陰下冷痛入腹則腫滿殺人搗爛敷之時珍附方新一牙痛莧根曬乾燒存性為末揩之再以紅燈籠草根煎湯漱之孫氏集效方馬齒莧蜀本草釋名馬莧別録五行草圖經五方草綱目長命菜同上九頭獅子草時珍曰其葉比並如馬齒而性滑利似莧故名俗呼大葉者為豚耳草小葉者為鼠齒莧又名九頭獅子草其性耐久難燥故有長命之稱寶藏論及八草靈變篇併名馬齒龍芽又名五方草亦五行之義頌曰馬齒莧雖名莧類而苗葉與莧都不相似一名五行草以其葉青梗赤花黃根白子黑也藏器曰別録以馬齒與莧同類二物既殊今從別品集解弘景曰馬莧與莧別是一種布地生實至微細俗呼馬齒莧亦可食小酸保升曰此有二種葉大者不堪用葉小者節葉間有水銀每十斤有八兩至十兩已來然至難燥當以槐木捶碎向日東作架曬之三兩日即干如隔年矣入藥須去莖其莖無效斆曰凡使勿用大葉者不是馬齒莧亦無水銀時珍曰馬齒莧處處園野生之柔莖布地細葉對生六七月開細花結小尖實實中細子如葶藶子狀人多采苗煮曬為蔬方士採取伏砒結汞煮丹砂伏硫黃死雄制雌別有法度一種水馬齒生水中形狀相類亦可汋食見王西樓野菜譜菜氣味酸寒無毒恭曰辛溫宗奭曰人多食之然性寒滑主治諸腫瘻疣目搗揩之破痃癖止消渴藏器能肥腸令人不思食治女人赤白下蘇頌飲汁治反胃諸淋金瘡流血破血癖癥瘕小兒尤良用汁治緊唇面皰解馬汗射工毒塗之瘥蘇恭治自尸腳陰腫保升作膏塗濕癬白禿杖瘡又主三十六種風煮粥止痢及疳痢治腹痛孟詵服之長年不白治癰瘡殺諸蟲生搗汁服當利下惡物去白蟲和梳垢封疔腫又燒灰和陳醋滓先灸後封之即根出開寶散血消腫利腸滑胎解毒通淋治産後虛汗時珍發明時珍曰馬齒莧所主諸病皆只取其散血消腫之功也頌曰多年惡瘡百方不瘥或痛焮不已者並搗爛馬齒敷上不過三兩遍此方出於武元衡相國武在西川自苦脛瘡焮癢不可堪百醫無效及到京有廳吏上此方用之便瘥也李絳記其事於兵部手集附方舊十六新二十三三十六風結瘡馬齒莧一石水二石煮取汁入蜜蠟三兩重煎成膏塗之食療諸氣不調馬齒莧煮粥食之食醫心鏡禳解疫氣六月六日採馬齒莧曬乾元旦煮熟同鹽醋食之可解疫癘氣唐瑤經驗方筋骨疼痛不拘風濕氣楊梅瘡及女人月家病先用此藥止疼然後調理干馬齒莧一斤濕馬齒莧二斤五加皮半斤蒼朮四兩舂碎以水煎湯洗澡急用蔥薑擂爛沖熱湯三碗服之暖處取汗立時痛止也海上名方腳氣浮腫心腹脹滿小便澀少馬齒草和少粳米醬汁煮食之食醫心鏡男女瘧疾馬齒莧搗扎手寸口男左女右産後虛汗馬齒莧研汁三合服如無以乾者煮汁婦人良方産後血痢小便不通臍腹痛生馬齒莧菜杵汁三合煎沸入蜜一合和服産寶小兒血痢方同上心鏡肛門腫痛馬齒莧葉三葉酸草等分煎湯熏洗一日二次有效瀕湖方痔瘡初起馬齒莧不拘鮮干煮熟急食之以湯熏洗一月內外其孔閉即愈矣楊氏經驗方赤白帶下不問老稚孕婦悉可服取馬齒莧搗絞汁三大合和雞子白二枚先溫令熱乃下莧汁微溫頓飲之不過再作即愈崔云亮海上方小便熱淋馬齒莧汁服之聖惠方陰腫痛極馬齒莧搗敷之良永類鈐方中蠱欲死馬齒莧搗汁一升飲並敷之日四五次壽域腹中白蟲馬齒莧水煮一碗和鹽醋空腹食之少頃白蟲盡出也孟詵食療緊唇面皰馬齒莧煎湯日洗之聖惠方目中息肉淫膚赤白膜馬齒莧一大握洗淨和芒硝末少許綿裹安上頻易之龍木論風齒腫痛馬齒莧一把嚼汁漬之即日腫消本事方漏耳諸瘡治耳內外惡瘡及頭瘡肥瘡瘑瘡黃馬散用黃柏半兩干馬齒莧一兩為末敷之聖惠項上癧瘡外臺用馬莧陰乾燒研臘豬脂和以暖泔洗拭敷之簡便治瘰癧未破馬齒莧同靛花搗摻日三次腋下狐臭馬齒莧杵以蜜和作團紙裹泥固半寸厚日乾燒過研末每以少許和蜜作餅先以生布揩之以藥夾脅下令極痛久忍然後以手巾勒兩臂日用一次以瘥為度千金方小兒火丹熱如火繞臍即損人馬莧搗塗日二廣利方小兒臍瘡久不瘥者馬齒菜燒研敷之千金豌豆癍瘡馬齒莧燒研敷之須臾根逐藥出不出更敷肘後疔瘡腫毒馬齒萊二分石灰三分為末雞子白和敷之反花惡瘡馬齒莧一斤燒研豬脂和敷聖惠蛀腳臁瘡干馬齒莧研末蜜調敷上一宿其蟲自出神效海上方足趾甲疽腫爛者屋上馬齒莧崑崙青木香印成鹽等分和勻燒存性入光明硃砂少許敷之外臺祕要瘡久不瘥積年者馬齒莧搗爛封之取汁煎稠敷亦可千金馬咬人瘡毒入心者馬齒莧煮並湯食之聖惠射工溪毒馬齒莧搗汁一升服以滓敷之日四五次良崔元亮海上方毛蟲螫人赤痛不止馬齒莧搗熟封之妙靈苑方蜂蠆螫人方同上張文仲方蜈蚣咬傷馬莧汁塗之肘後小兒白禿馬齒莧煎膏塗之或燒灰豬脂和塗聖惠方身面瘢痕馬齒莧湯日洗二次聖惠方雜物眯目不出用東牆上馬齒莧燒灰研細點少許於眥頭即出也聖惠方子主治明目仙經用之開寶延年益壽孟詵青盲白翳除邪氣利大小腸去寒熱以一升搗末每以一匙用蔥豉煮粥食或著米糝五味作羹食心鏡附方新一目中出淚或出膿用馬齒莧子人莧子各半兩為末綿裹銅器中蒸熟尉大眥頭膿水出處每尉以五十度為率久久自絶聖惠苦菜本經上品校正併入嘉祐苦苣苦蕒釋名荼音荼本經苦苣嘉祐苦蕒綱目遊冬別録褊苣日用老鸛菜救荒天香菜時珍曰苦荼以味名也經歷冬春故曰遊冬許氏説文苣作𦼫吳人呼為苦蕒其義未詳嘉祐本草言嶺南吳人植苣供饌名苦苣而又重出苦苣及苦蕒條今並並之集解別録曰苦菜生益州川穀山陵道旁凌冬不死三月三日採陰乾桐君藥録曰苦菜三月生扶疏六月花從葉出莖直花黃八月實黑實落根復生冬不枯恭曰爾雅云荼苦菜也易通卦驗玄圖云苦菜生於寒秋經冬歷春得夏乃成一名遊冬葉似苦苣而細斷之有白汁花黃似菊所在有之其説與桐君略同苦𧄹俗亦名苦菜非此荼也保升曰春花夏實至秋復生花而不實經冬不凋宗奭曰此月令四月小滿節後苦菜秀者是也四方皆有在北道者則冬方凋生南方者冬夏常青葉如苦苣而狹緑色差淡折之白乳汁出味苦花似野菊春夏秋皆旋開時珍曰苦菜即苦蕒也家栽者呼為苦苣實一物也春初生苗有赤莖白莖二種其莖中空而脆折之有白汁胼葉似花蘿蔔菜葉而色緑帶碧上葉抱莖梢葉似鸛嘴每葉分叉攛挺如穿葉狀開黃花如初綻野菊一花結子一叢如茼蒿子及鶴蝨子花罷則收斂子上有白毛茸茸隨風飄揚落處即生士良曰蠶蛾出時不可折取令蛾子青爛蠶婦亦忌食之然野苣若五六回拗後味反甘滑勝於家苦蕒也正誤弘景曰苦菜疑即茗也茗一名荼凌冬不凋作飲能令人不眠恭曰詩云誰謂荼苦即苦菜異名也陶氏謂荼為茗茗乃木類按爾雅釋草云荼苦菜也音途釋木云檟苦荼也音遲遐切二物全別不得比例陶説誤矣菜氣味苦寒無毒張機曰野苣不可共蜜食令人作內痔時珍曰脾胃虛寒人不可食主治五臟邪氣厭延葉反伏也谷胃痹久服安心益氣聰察少臥輕身耐老本經腸澼渴熱中疾惡瘡久服耐飢寒高氣不老別録調十二經脈霍亂後胃氣煩逆久服強力雖冷甚益人嘉祐搗汁飲除面目及舌下黃其白汁塗疔腫拔根滴癰上立潰藏器點瘊子自落衍義敷蛇咬大明明目主諸痢汪機血淋痔瘻時珍發明宗奭曰苦苣搗汁敷疔瘡殊驗青苗陰乾以備冬月為末水調敷之時珍曰按洞天保生録云夏三月宜食苦蕒能益心和血通氣也又陸文量菽園雜記云凡病痔者宜用苦苣菜或鮮或干煮至熟爛連湯置器中橫安一板坐之先熏後洗冷即止日洗數次屢用有效附方新六血淋尿血苦蕒菜一把酒水各半煎服資生經血脈不調苦蕒菜曬乾為末每服二錢溫酒下衛生易簡方喉痹腫痛野苦蕒搗汁半盞燈心以湯浸捻汁半盞和勻服普濟方對口惡瘡野苦蕒擂汁一鍾入薑汁一匙和酒服以渣敷一二次即愈唐瑤經驗方中沙蝨毒沙蝨在水中人澡浴則著人身鑽入皮里初得皮上正赤如小豆黍粟摩之痛如刺三日後寒熱發瘡毒若入骨殺人嶺南多此即以茅葉刮去以苦菜汁塗之佳肘後方壺蜂叮螫苦蕒汁塗之良摘玄方根主治赤白痢及骨蒸並煮服之嘉祐治血淋利小便時珍花子氣味甘平無毒主治去中熱安心神宗奭黃疸疾連花子研細二錢水煎服日二次良汪穎白苣宋嘉祐釋名石苣綱目生菜時珍云白苣苦苣萵苣俱不可煮烹皆宜生挼去汁鹽醋拌食通可曰生菜而白苣稍美故獨得專稱也王氏農書謂之石苣陸璣詩疏云青州謂之芑可生食亦可蒸為茹集解藏器云白苣似萵苣葉有白毛時珍曰處處有之似萵苣而葉色白折之有白汁正二月下種四月開黃花如苦蕒結子亦同八月十月可再種故諺云生菜不離園按事類合璧云苣有數種色白者為白苣色紫者為紫苣味苦者為苦苣菜氣味苦寒無毒炳曰平患冷氣人食之即腹冷亦不至苦損人産後不可食令人寒中小腸痛思邈曰不可共酪食生蟲𧈟主治補筋骨利五臟開胸膈壅氣通經脈止脾氣令人齒白聰明少睡可煮食之孟詵解熱毒酒毒止消渴利大小腸寧原附方舊一魚臍瘡其頭白似腫痛不可忍先以針刺破頭及四畔以白苣取汁滴孔中良外臺祕要萵苣食療釋名萵菜千金菜時珍曰按彭乘墨客揮犀云萵菜自咼國來故名集解藏器曰萵苣有白者紫者紫者入燒煉藥用時珍曰萵苣正二月下種最宜肥地葉似白苣而尖色稍青折之有白汁黏手四月抽苔高三四尺剝皮生食味如胡瓜糟食亦良江東人鹽曬壓實以備方物謂之萵筍也花子並與白苣同菜氣味苦冷微毒李鵬飛曰久食昏人目患冷人不宜食時珍曰按彭乘雲萵苣有毒百蟲不敢近蛇虺觸之則目暝不見物人中其毒以薑汁解之藏器曰紫萵苣有毒入燒煉藥用丹房鏡源曰萵苣用硫黃種結砂子制硃砂又曰紫色萵苣和土作器火煅如銅也主治利五臟通經脈開胸膈功同白苣藏器利氣堅筋骨去口氣白齒牙明眼目寧原通乳汁利小便殺蟲蛇毒時珍附方舊一新五乳汁不通萵苣菜煎酒服海上方小便不通萵苣菜搗敷臍上即通衛生易簡方小便尿血同上方甚效楊氏方沙蝨水毒萵苣菜搗汁塗之良肘後方蚰蜒入耳萵苣葉乾者一分雄黃一分為末糊丸棗核大蘸生油塞耳中引出聖惠方百蟲入耳萵苣搗汁滴入自出也聖濟總録子入藥炒用主治下乳汁通小便治陰腫痔漏下血傷損作痛時珍附方舊一新六乳汁不行萵苣子三十枚研細酒服又方萵苣子一合生甘草三錢糯米粳米各半合煮粥頻食之小便不通萵苣子搗餅貼臍中即通海上仙方腎黃如金萵苣子一合細研水一盞煎五分服外臺祕要陰囊㿗腫萵苣子一合搗末水一盞煎五沸溫服閃損腰痛趁痛丸用白萵苣子炒三兩白粟米炒一撮乳香沒藥烏梅肉各半兩為末煉蜜丸彈子大每嚼一丸熱酒下玉機微義髭發不生癤瘡疤上不生髭發先以竹刀刮損以萵苣子拗猢猻薑末頻擦之摘玄方水苦蕒宋圖經校正自外類移入此釋名謝婆菜圖經半邊山集解頌曰水苦蕒生宜州溪澗側葉似苦蕒厚而光澤根似白朮而軟二八九月採其根食之根氣味微苦辛寒無毒主治風熱上壅咽喉腫痛及項上風癧以酒磨服蘇頌翻白草救荒釋名雞腿根救荒天藕野菜譜時珍曰翻白以葉之形名雞腿天藕以根之味名也楚人謂之湖雞腿淮人謂之天藕集解周定王曰翻白草高七八寸葉硬而厚有鋸齒背白似地榆而細長開黃花根如指大長三寸許皮赤肉白兩頭尖峭生食煮熟皆宜時珍曰雞腿兒生近澤田地高不盈尺春生弱莖一莖三葉尖長而厚有皺紋鋸齒面青背白四月開小黃花結子如胡荽子中有細子其根狀如小白朮頭剝去赤皮其內白色如雞肉食之有粉小兒生食之荒年人掘以和飯食根氣味甘微苦平無毒主治吐血下血崩中瘧疾癰瘡時珍附方新七崩中下血用湖雞腿根一兩搗碎酒二盞煎一盞服瀕湖集簡方吐血不止翻白草每用五七科㕮咀水二鍾煎一鍾空心服瘧疾寒熱翻白草根五七個煎酒服之無名腫毒方同上丁毒初起不拘已成未成用翻白草十科酒煎服出汗即愈渾身疥癩端午日午時採翻白草每用一握煎水洗之臁瘡潰爛端午日午時採翻白草洗收每用一握煎湯盆盛圍住熏洗效劉松石保壽堂方仙人杖草拾遺校正自草部移入此集解藏器曰仙人杖生劍南平澤葉似苦苣叢生陳子昂觀玉篇序云豫從補闕喬公北征夏四月次於張掖河洲草木無他異者惟有仙人杖往往叢生豫家世代服食者昔常餌之因為喬公言其功同族王仲烈甘心食之人或謂喬公曰此白棘也公乃譏豫因作觀玉篇焉頌曰仙人杖有三物同名一種是菜類一種是枯死竹筍之色黑者枸杞一名仙人杖是也此仙人杖乃作菜茹者白棘木類何因相似或曰喬公所謂白棘乃枸棘是枸杞之有針者本經枸棘無白棘之名又其味苦此菜味甘乃知草木之類多而難識使人惑疑似之言以真為偽宜乎子昂論著之詳也時珍曰別有仙人草生階除間高二三寸又有仙人掌草生於石壁上皆與此名同物異不可不審並見石草類氣味甘小溫無毒主治作茹食去痰癖除風冷大明久服長生堅筋骨令人不老藏器蒲公英唐本草校正自草部移入此釋名耩耨草音構糯金簪草綱目黃花地丁時珍曰名義未詳孫思邈千金方作鳧公英蘇頌圖經作僕公罌庚辛玉册作鵓鴣英俗呼蒲公丁又呼黃花地丁淮人謂之白鼓釘蜀人謂之耳瘢草關中謂之狗乳草按土宿本草云金簪草一名地丁花如金簪頭獨腳如丁故以名之集解保升曰蒲公英草生平澤田園中莖葉似苦苣斷之有白汁堪生啖花如單菊而大四月五月採之頌曰處處有之春初生苗葉如苦苣有細刺中心抽一莖莖端出一花色黃如金錢俗訛為僕公罌是也宗奭曰即今地丁也四時常有花花罷飛絮絮中有子落處即生所以庭院間皆有者因風而來時珍曰地丁江之南北頗多他處亦有之嶺南絶無小科布地四散而生莖葉花絮並似苦苣但小耳嫩苗可食庚辛玉册云地丁葉似小萵苣花似大旋葍一莖聳上三四寸斷之有白汁二月採花三月採根可制汞伏三黃有紫花者名大丁草出太行王屋諸山陳州亦有名燒金草能煅硃砂一種相類而無花者名地膽草亦可伏三黃砒霜苗氣味甘平無毒主治婦人乳癰腫水煮汁飲及封之立消恭解食毒散滯氣化熱毒消惡腫結核疔腫震亨摻牙烏鬚髮壯筋骨時珍白汁塗惡刺狐尿刺瘡即愈頌發明杲曰蒲公英苦寒足少陰腎經君藥也本經必用之震亨曰此草屬土開黃花味甘解食毒散滯氣可入陽明太陰經化熱毒消腫核有奇功同忍冬藤煎湯入少酒佐服治乳癰服罷欲睡是其功也睡覺微汗病即安矣頌曰治惡刺方出孫思邈千金方其序云邈以貞觀五年七月十五日夜以左手中指背觸著庭木至曉遂患痛不可忍經十日痛日深瘡日高大色如熟小豆色常聞長者論有此方遂用治之手下則愈痛亦除瘡亦即瘥未十日而平復如故楊炎南行方亦著其效云時珍曰薩謙齋瑞竹堂方有擦牙烏鬚髮還少丹甚言此草之功蓋取其能通腎也故東垣李氏言其為少陰本經必用之藥而著本草者不知此義附方新五還少丹昔日越王曾遇異人得此方極能固齒牙壯筋骨生腎水凡年未及八十者服之鬚髮返黑齒落更生年少服之至老不衰得遇此者宿有仙緣當珍重之不可輕泄用蒲公英一斤一名耩耨草又名蒲公罌生平澤中三四月甚有之秋後亦有放花者連根帶葉取一斤洗淨勿令見天日晾乾入斗子解鹽一兩香附子五錢二味為細末入蒲公草內淹一宿分為二十團用皮紙三四層裹扎定用六一泥即蚯蚓糞如法固濟入灶內焙乾乃以武火煅通紅為度冷定取出去泥為末早晚擦牙漱之吐咽任便久久方效瑞竹堂方乳癰紅腫蒲公英一兩忍冬藤二兩搗爛水二鍾煎一鍾食前服睡覺病即去矣積德堂方疳瘡疔毒蒲公英搗爛覆之即黃花地丁也別更搗汁和酒煎服取汗唐氏方多年惡瘡蒲公英搗爛貼救急方蛇螫腫痛方同上黃瓜菜食物釋名黃花菜時珍曰其花黃其氣如瓜故名集解穎曰黃瓜菜野生田澤形似油菜但味少苦取為羹茹甚香美時珍曰此菜二月生苗田野遍有小科如薺三四五月開黃花花與莖葉並同地丁但差小耳一科數花結細子不似地丁之花成絮也野人茹之亦採以飼鵝兒氣味甘微苦微寒無毒主治通結氣利腸胃汪穎生瓜菜宋圖經釋名其味作生瓜氣故以為名集解頌曰生瓜菜生資州平田陰畦間春生苗長三四寸作叢生葉青而圓似白莧菜夏開紫白花結細實黑色氣味甘微寒無毒主治走注攻頭面四肢及陽毒傷寒壯熱頭痛心神煩躁利胸膈搗汁飲之又生搗貼腫蘇頌落葵別録下品釋名蔠葵爾雅藤葵食鑑藤菜綱目天葵別録繁露同御菜俗胭脂菜志曰落葵一名藤葵俗呼為胡胭脂時珍曰落葵葉冷滑如葵故得葵名釋家呼為御菜亦曰藤兒菜爾雅云蔠葵繁露也一名承露其葉最能承露其子垂垂亦如綴露故得露名而蔠落二字相似疑落字乃蔠字之訛也案考工記云大圭終葵首也注云齊人謂椎曰終葵圭首六寸為椎然則此菜亦以其葉似椎頭而名之乎集解弘景曰落葵又名承露人家多種之葉惟可𩚫鮓食冷滑其子紫色女人以漬粉敷面為假色少入藥用保升曰蔓生葉圓厚如杏葉子似五味子生青熟黑所在有之時珍曰落葵三月種之嫩苗可食五月蔓延其葉似杏葉而肥厚軟滑作蔬和肉皆宜八九月開細紫花纍纍結實大如五味子熟則紫黑色揉取汁紅如胭脂女人飾面點唇及染布物謂之胡胭脂亦曰染絳子但久則色易變耳葉氣味酸寒滑無毒時珍曰甘微酸冷滑脾冷人不可食弘景曰曾為狗齧者食之終身不瘥主治滑中散熱別録利大小腸時珍子主治悅澤人面別録可作面脂蘇頌詵曰取子蒸過烈日中曝乾挼去皮取仁細研和白蜜塗面鮮華立見蕺音戢別録下品釋名菹菜恭魚腥草時珍曰蕺字段公路北戶録作蕊音戢秦人謂之菹子菹蕺音相近也其葉腥氣故俗呼為魚腥草集解恭曰蕺菜生濕地山谷陰處亦能蔓生葉似蕎麥而肥莖紫赤色山南江左人好生食之關中謂之菹菜保升曰莖葉俱紫赤英有臭氣時珍曰案趙叔文醫方云魚腥草即紫蕺葉似荇其狀三角一邊紅一邊青可以養豬又有五蕺即五毒草花葉相似但根似狗脊見草部葉氣味辛微溫有小毒別録曰多食令人氣喘弘景曰俗傳食蕺不利人腳恐由閉氣故也今小兒食之便覺腳痛詵曰小兒食之三歲不行久食發虛弱損陽氣消精髓思邈曰素有腳氣人食之一世不愈主治蠼螋尿瘡別録淡竹筒內煨熟搗敷惡瘡白禿大明散熱毒癰腫瘡痔脫肛斷痁疾解硇毒時珍附方舊一新七背瘡熱腫蕺菜搗汁塗之留孔以泄熱毒冷即易之經驗方痔瘡腫痛魚腥草一握煎湯熏洗仍以草挹痔即愈一方洗後以枯礬入片腦少許敷之救急方疔瘡作痛魚腥草搗爛敷之痛一二時不可去草痛後一二日即愈徽人所傳方也陸氏積德堂方小兒脫肛魚腥草擂如泥先以朴硝水洗過用芭蕉葉托住藥坐之自入也永類方蟲牙作痛魚腥草花椒菜子油等分搗勻入泥少許和作小丸如豆大隨牙左右塞耳內兩邊輪換不可一齊用恐閉耳氣塞一日夜取看有細蟲為效簡便方斷截瘧疾紫蕺一握搗爛絹包周身摩擦得睡有汗即愈臨發前一時作之救急易方惡蛇蟲傷魚腥草皺面草槐樹葉草決明一處杵爛敷之甚效同上蕨拾遺釋名鱉時珍曰爾雅云蕨鱉也菜名陸佃埤雅云蕨初生無葉狀如雀足之拳又如人足之蹶故謂之蕨周秦曰蕨齊魯曰鱉初生亦類鱉腳故也其苗謂之蕨萁集解藏器曰蕨生山間根如紫草人採茹食之時珍曰蕨處處山中有之二三月生芽拳曲狀如小兒拳長則展開如鳳尾高三四尺其莖嫩時採取以灰湯煮去涎滑曬乾作蔬味甘滑亦可醋食其根紫色皮內有白粉搗爛再三洗澄取粉作粔籹蕩皮作線食之色淡紫而甚滑美也野人飢年掘取治造不精聊以救荒味即不佳耳詩云陟彼南山言採其蕨陸璣謂其可以供祭故採之然則蕨之為用不獨救荒而已一種紫萁似蕨有花而味苦謂之迷蕨初生亦可食爾雅謂之月爾三蒼謂之紫蕨郭璞云花繁曰爾紫蕨拳曲繁盛故有月爾之名萁及根氣味甘寒滑無毒詵曰久食令人目暗鼻塞發落又冷氣人食之多腹脹小兒食之腳弱不能行思邈曰久食成瘕主治去暴熱利水道令人睡藏器補五臟不足氣壅經絡筋骨間毒氣孟詵根燒灰油調敷蛇𬠡傷時珍𬠡音蕭蟲名發明藏器曰多食消陽氣故令人睡弱人腳四皓食芝而壽夷齊食蕨而夭固非良物干寶搜神記云郗鑑鎮丹徒二月出獵有甲士折蕨一枝食之覺心中淡淡成疾後吐一小蛇懸屋前漸幹成蕨遂明此物不可生食也時珍曰蕨之無益為其性冷而滑能利水道泄陽氣降而不升耗人真元也四皓採芝而心逸夷齊採蕨而心憂其壽其夭於蕨何與焉陳公之言可謂迂哉然飢人瀕死賴蕨延活又不無濟世之功附方新一腸風熱毒蕨菜花焙為末每服二錢米飲下聖惠水蕨綱目集解時珍曰水蕨似蕨生水中呂氏春秋云菜之美者有云夢之䔇即此菜也䔇音豈氣味甘苦寒無毒主治腹中痞積淡煮食一二日即下惡物忌雜食一月餘乃佳時珍衛生方薇拾遺校正自草部移入此釋名垂水爾雅野豌豆綱目大巢菜時珍曰案許慎説文云薇似藿乃菜之微者也王安石字説云微賤所食因謂之薇故詩以采薇賦戍役孫炎注爾雅云薇草生水旁而枝葉垂於水故名垂水也巢菜見翹搖下集解藏器曰薇生水旁葉似萍蒸食利人三秦記云夷齊食之三年顏多不異武王誡之不食而死李珣曰薇生海池澤中水菜也時珍曰薇生麥田中原澤亦有故詩云山有蕨薇非水草也即今野豌豆蜀入謂之巢菜蔓生莖葉氣味皆似豌豆其藿作蔬入羹皆宜詩云采薇采薇薇亦柔止禮記云芼豕以薇皆此物也詩疏以為迷蕨鄭氏通志以為金櫻芽皆謬矣項氏云巢菜有大小二種大者即薇乃野豌豆之不實者小者即蘇東坡所謂元修菜也此説得之氣味甘寒無毒主治久食不飢調中利大小腸藏器利水道下浮腫潤大腸珣翹搖拾遺釋名搖車爾雅野蠶豆綱目小巢菜藏器曰翹搖幽州人謂之翹饒爾雅云柱夫搖車俗呼翹搖車是矣蔓生細葉紫花可食時珍曰翹搖言其莖葉柔婉有翹然飄搖之狀故名蘇東坡云菜之美者蜀鄉之巢故人巢元修嗜之因謂之元修菜陸放翁詩序云蜀蔬有兩巢大巢即豌豆之不實者小巢生稻田中吳地亦多一名漂搖草一名野蠶豆以油炸之綴以米糝名草花食之佳作羹尤美集解藏器曰翹搖生平澤蔓生如䝁豆紫花時珍曰處處皆有蜀人秋種春採老時耕轉壅田故薛田詩云剩種豌巢沃晚田蔓似䝁豆而細葉似初生槐芽及蒺藜而色青黃欲花未萼之際採而蒸食點酒下鹽芼羹作餡味如小豆藿至三月開小花紫白色結角子似豌豆而小氣味辛平無毒詵曰煮食佳生食令人吐水主治破血止血生肌搗汁服之療五種黃病以瘥為度藏器利五臟明耳目去熱風令人輕健長食不厭甚益人孟詵止熱瘧活血平胃時珍附方新二活血明目漂搖豆為末甘草湯服二錢日二錢衛生易簡方熱瘧不止翹搖杵汁服之廣利方鹿藿本經下品校正自草部移入此釋名鹿豆郭璞䝁豆音勞亦作蹽野緑豆時珍曰豆葉曰藿鹿喜食之故名俗呼䝁豆䝁鹿音相近也王磐野菜譜作野緑豆爾雅云蔨音卷鹿藿也其實莥音紐即此集解別録曰鹿藿生汶山山谷弘景曰方藥不用人亦無識者但葛苗一名鹿藿恭曰此草所在有之苗似豌豆而引蔓長粗人採為菜亦微有豆氣山人名為鹿豆也保升曰鹿豆可生啖五月六月採苗曬乾之郭璞注爾雅云鹿豆葉似大豆蔓延生根黃而香是矣時珍曰鹿豆即野緑豆又名䝁豆多生麥地田野中苗葉似緑豆而小引蔓生生熟皆可食三月開淡粉紫花結小莢其子大如椒子黑色可煮食或磨面作餅蒸食氣味苦平無毒主治蠱毒女子腰腹痛不樂腸癰瘰癧癧瘍氣本經止頭痛梁簡文勸醫文灰藋音狄宋嘉祐校正原自草部移入谷部今復移入此釋名灰滌菜綱目金鎖夭時珍曰此菜莖葉上有細灰如沙而枝葉翹躍故名梁簡文帝勸醫文作灰𦵦菜俗訛為灰條菜雷公炮炙論謂之金鎖夭集解藏器曰灰藋生於熟地葉心有白粉似藜但藜心赤莖大堪為杖入藥不如白藋也其子炊為飯香滑時珍曰灰藋處處原野有之四月生苗莖有紫紅線稜葉尖有刻面青背白莖心嫩葉背面皆有白灰為蔬亦佳五月漸老高者數尺七八月開細白花結實簇簇如球中有細子蒸曝取仁可炊飯及磨粉食救荒本草云結子成穗者味甘散穗者微苦生牆下樹下者不可用修治斆曰灰藋即金鎖夭葉撲蔓翠上往往有金星堪用若白青色者是忌女莖不中用也若使金鎖夭莖高二尺五六寸為妙若長若短皆不中使凡用勿令犯水去根曬乾以布拭去肉毛令盡細銼焙乾用之時珍曰妓女莖即地膚子苗與灰藋莖相似而葉不同亦可為蔬詳見本條莖葉氣味甘平無毒主治惡瘡蟲蠶蜘蛛等咬搗爛和油敷之亦可煮食作湯浴疥癬風瘙燒灰納齒孔中殺蟲𧈟含漱去甘瘡以灰淋汁蝕息肉除白癜風黑子面皯著肉作瘡藏器附方新一疔瘡惡腫野灰藋菜葉燒灰撥破瘡皮唾調少許點之血出為度普濟子仁氣味甘平無毒主治炊飯磨麵食殺三蟲藏器藜綱目釋名萊詩疏紅心灰藋玉册鶴頂草土宿本草胭脂菜詳下文集解時珍曰藜處處有之即灰藋之紅心者莖葉稍大河朔人名落藜南人名胭脂菜亦曰鶴頂草皆因形色名也嫩時亦可食故昔人謂藜藿與膏粱不同老則莖可為杖詩云南山有臺北山有萊陸璣注云萊即藜也初生可食譙沛人以雞蘇為萊三蒼以茱萸為萊皆名同物異也韻府謂藜為落帚亦誤矣寶藏論云鶴頂龍芽其頂如鶴八九月和子收之入外丹用葉氣味甘平微毒時珍曰按庚辛玉册云鶴頂陰草也搗汁煮粉霜燒灰淋汁煎粉霜伏礬石結草砂制硫伏汞及雌黃砒石主治殺蟲藏器煎湯洗蟲瘡漱齒𧈟搗爛塗諸蟲傷去癜風時珍附方新一白癜風紅灰藋五斤茄子根莖三斤蒼耳根莖五斤並曬乾燒灰以水一斗煎湯淋汁熬成膏別以好乳香半兩鉛霜一分膩粉一分煉成牛脂二兩和勻每日塗三次聖惠莖主治燒灰和荻灰蒿灰等分水和蒸取汁煎膏點疣贅黑子蝕惡肉時珍秦荻藜唐本草附釋名時珍曰按山海經云秦山有草名曰藜如荻可以為菹此即秦荻藜也蓋亦藜類其名亦由此得之集解恭曰秦荻藜生下濕地所在有之入所啖者詵曰此物於生菜中最香美氣味辛溫無毒主治心腹冷脹下氣消食和醬醋食之唐本破氣甚良又末之和酒服療卒心痛悒悒塞滿氣孟詵子主治腫毒搗末和醋封之日三易孟詵醍醐菜證類集解時珍曰唐慎微證類本草收此而形狀莫考惟雷斆炮炙論云形似牛皮蔓掐之有乳汁出香甜入頂採得以苦竹刀細切入砂盆中研如膏用生絹挼汁出暖飲然亦不云治何病也氣味甘溫無毒主治月水不利搗葉絞汁和酒煎服一盞千金附方舊一傷中崩赤醍醐杵汁拌酒煎沸空心服一盞千金方附録茅膏菜拾遺藏器曰味甘平無毒煮服主赤白久痢生茅中高一尺有毛如油膩黏人手子作角生雞侯菜又曰味辛溫無毒久食溫中益氣顧微廣州記云生嶺南似艾二月生苗宜雞羹食之故名孟娘菜又曰味苦小溫無毒主婦人腹中血結羸瘦男子陰囊濕癢強陽道令人健行不睡補虛去痔瘻瘰癧癭瘤生四明諸山冬夏常有葉似升麻方莖山人採茹之優殿又曰味辛溫無毒溫中去惡氣消食生安南人種為茹南方草木狀云合浦有優殿人種之以豆醬食之芳香好味芋別録中品校正自果部移入此釋名土芝別録蹲鴟時珍曰按徐鉉注説文云芋猶籲也大葉實根駭籲人也籲音芋疑怪貌又史記卓氏云岷山之下沃野下有蹲鴟至死不飢注云芋也蓋芋魁之狀若鴟之蹲坐故也芋魁東漢書作芋渠渠魁義同集解弘景曰芋錢塘最多生則有毒味蘞不可食種芋三年不採則成梠芋又別有野芋名老芋形葉相似如一根並殺人恭曰芋有六種青芋紫芋真芋白芋連禪芋野芋也其類雖多苗並相似莖高尺余葉大如扇似荷葉而長根類薯蕷而圓其青芋多子細長而毒多初煮須灰汁更易水煮熟乃堪食爾白芋真芋連禪紫芋並毒少正可煮啖之兼肉作羹甚佳蹲鴟之饒蓋謂此也野芋大毒不可啖之關陝諸芋遍有山南江左惟有青白紫三芋而已頌曰今處處有之閩蜀淮楚尤多植之種類雖多大抵性效相近蜀川出者形圓而大狀若蹲鴟謂之芋魁彼人種以當糧食而度飢年江西閩中出者形長而大其細者如卵生於魁旁食之尤美凡食芋並須栽蒔者其野芋有大毒不可食宗奭曰江浙二川者最大而長京洛者差圓小然味佳他處不及也當心出苗者為芋頭四邊附之而生者為芋子八九月以後掘食之時珍曰芋屬雖多有水旱二種旱芋山地可種水芋水田蒔之葉皆相似但水芋味勝莖亦可食芋不開花時或七八月間有開者抽莖生花黃色旁有一長萼護之如半邊蓮花之狀也按郭義恭廣志云芋凡十四種君子芋魁大如斗赤鸇芋即連禪芋魁大子少白果芋魁大子繁畝收百斛青邊芋旁巨芋車轂芋三種並魁大子少葉長丈餘長味芋味美莖亦可食雞子芋色黃九面芋大而不美青芋曹芋象芋皆不可食惟莖可作菹旱芋九月熟蔓芋緣枝生大者如二三升也芋子氣味辛平滑有小毒大明曰冷弘景曰生則有毒味蘞不可食性滑下石服餌家所忌恭曰多食動宿冷宗奭曰多食難克化滯氣困脾主治寬腸胃充肌膚滑中別録冷啖療煩熱止渴蘇恭令人肥白開胃通腸閉産婦食之破血飲汁止血渴藏器破宿血去死肌和魚煮食甚下氣調中補虛大明發明詵曰芋白色者無味紫色者破氣煮汁啖之止渴十月後曬乾收之冬月食不發病他時月不可食又和鯽魚鱧魚作臛良久食令人虛勞無力又煮汁洗膩衣白如玉也大明曰芋以薑同煮過換水再煮方可食之附方舊二新二腹中癖氣生芋子一斤壓破酒五斤漬二七日空腹每飲一升神良韋宙獨行方身上浮風芋煮汁浴之慎風半日孟詵食療瘡冒風邪腫痛用白芋燒灰敷之干即易千金方頭上軟癤用大芋搗敷之即干簡便方葉莖氣味辛冷滑無毒主治除煩止瀉療妊婦心煩迷悶胎動不安又鹽研敷蛇蟲咬並癰腫毒痛及罯毒箭大明梗擦蜂螫尤良宗奭汁塗蜘蛛傷時珍發明慎微曰沈括筆談云處士劉易隱居王屋山見一蜘蛛為蜂所螫墜地腹鼓欲裂徐行入草齧破芋梗以瘡就齧處磨之良久腹消如故自後用治蜂螫有驗由此附方新一黃水瘡芋苗曬乾燒存性研搽邵真人經驗方附録野芋弘景曰野芋形葉與芋相似芋種三年不採成梠芋音呂並能殺人誤食之煩悶垂死者惟以土漿及糞汁大豆汁飲之則活矣藏器曰野芋生溪澗側非人所種者根葉相似又有天荷亦相似而大時珍曰小者為野芋大者為天荷俗名海芋詳見草部毒草類野芋根辛冷有大毒醋摩敷蟲瘡惡癬其葉搗塗毒腫初起無名者即消亦治蜂蠆螫塗之良土芋拾遺校正自草部移入此釋名土卵拾遺黃獨綱目土豆集解藏器曰土芋蔓生葉如豆其根圓如卵鶗鴂食後彌吐人不可食又云土卵蔓生如芋人以灰汁煮食之恭曰土卵似小芋肉白皮黃梁漢人名為黃獨可蒸食之根氣味甘辛寒有小毒主治解諸藥毒生研水服當吐出惡物便止煮熟食之甘美不飢厚人腸胃去熱嗽藏器薯蕷本經上品校正自草部移入此釋名薯藇音諸預土薯音除山薯圖經山芋吳普山藥衍義玉延吳普曰薯蕷一名薯薯一名兒草一名修脆齊魯名山芋鄭越名土薯秦楚名玉延頌曰江閩人單呼為薯音若殊及韶亦曰山薯山海經云景山北望少澤其草多薯藇音同薯蕷則是一種但字或音殊或音諸不一或語有輕重或相傳之訛耳宗奭曰薯蕷因唐代宗名預避諱改為薯藥又因宋英宗諱署改為山藥盡失當日本名恐歲久以山藥為別物故詳著之集解別録曰薯蕷生嵩高山谷二月八月採根曝乾普曰亦生臨朐鐘山始生赤莖細蔓五月開白花七月結實青黃八月熟落其根內白外黃類芋弘景曰近道處處有之江南山東皆多掘取食之以充糧南康間最大而美服食亦用之恭曰此有兩種一者白而且佳曬乾搗粉食大美且愈疾而補一者青黑味殊不美蜀道者尤良頌曰處處有以北都四明者為佳春生苗蔓延籬援莖紫葉青有三尖似白牽牛葉更厚而光澤夏開細白花大類棗花秋生實於葉間狀如鈴今人冬春採根刮之白色者為上青黑者不堪近汴洛人種之極有息春取宿根頭以黃沙和牛糞作畦種之苗生以竹梢作援高一二尺夏月頻溉之當年可食極肥美南中一種生山中根細如指極緊實刮磨入湯煮之作塊不散味更珍美云食之尤益人過於家園種者又江湖閩中一種根如薑芋之類而皮紫極有大者一枚可重數斤削去皮煎煮食俱美但性冷於北地者耳彼土人呼為薯南北之産或有不同故形類差別也甄權曰按劉敬叔異苑云薯蕷野人謂之土薯根既入藥又復可食人植之者隨所種之物而像之也時珍曰薯蕷入藥野生者為勝若供饌則家種者為良四月生苗延蔓紫莖緑葉葉有三尖似白牽牛葉而更光潤五六月開花成穗淡紅色結莢成簇莢凡三稜合成堅而無仁其子別結於一旁狀似雷丸大小不一皮色土黃而肉白煮食甘滑與其根同王旻山居録云曾得山芋子如荊棘子者食之更愈於根即此也霜後收子留種或春月採根截種皆生修治頌曰採白根刮去黃皮以水浸之糝白礬末少許入水中經宿淨洗去涎焙乾用宗奭曰入藥貴生干之故古方皆用乾山藥蓋生則性滑不可入藥熟則滯氣只堪啖耳其法冬月以布裹手用竹刀剮去皮竹篩盛置簷風處不得見日一夕干五分候全乾收之或置焙籠中微火烘乾亦佳斆曰凡使勿用平田生二三紀者須要山中生經十紀者皮赤四面有須者妙採得以銅刀刮去赤皮洗去涎蒸過曝乾用根氣味甘溫平無毒普曰神農甘小溫桐君雷公甘涼無毒之才曰紫芝為之使惡甘遂主治傷中補虛羸除寒熱邪氣補中益氣力長肌肉強陰久服耳目聰明輕身不飢延年本經主頭面遊風頭風眼眩下氣止腰痛治虛勞羸瘦充五臟除煩熱別録補五勞七傷去冷風鎮心神安魂魄補心氣不足開達心孔多記事甄權強筋骨主泄精健忘大明益腎氣健脾胃止泄痢化痰涎潤皮毛時珍生搗貼腫硬毒能消散震亨發明權曰凡患人體虛羸者宜加而用之詵曰利丈夫助陰力熟煮和蜜或為湯煎或為粉並佳干之入藥更妙惟和麵作餺飥則動氣為不能制面毒也李杲曰山藥入手太陰張仲景八味丸用乾山藥以其涼而能補也亦治皮膚乾燥以此潤之時珍曰按吳綬云山藥入手足太陰二經補其不足清其虛熱又按王履溯洄集云山藥雖入手太陰然肺為腎之上源源既有滋流豈無益此八味丸所以用其強陰也又按曹毗杜蘭香傳云食薯蕷可以闢霧露附方舊一新十補益虛損益顏色補下焦虛冷小便頻數瘦損無力用薯蕷於沙盆中研細入銚中以酥一大匙熬令香旋添酒一盞煎攪令勻空心飲之每旦一服聖惠方心腹虛脹手足厥逆或飲苦寒之劑多未食先嘔不思飲食山藥半生半炒為末米飲服二錢一日二服大有功效忌鐵器生冷普濟方小便數多山藥以礬水煮過白茯苓等分為末每水飲服二錢儒門事親下痢禁口山藥半生半炒為末每服二錢米飲下衛生易簡方痰風喘急生山藥搗爛半碗入甘蔗汁半碗和勻頓熱飲之立止簡便單方脾胃虛弱不思飲食山芋白朮各一兩人參七錢半為末水糊丸小豆大每米飲下四五十丸普濟方濕熱虛泄山藥蒼朮等分飯丸米飲服大人小兒皆宜瀕湖經驗方腫毒初起帶泥山藥萆麻子糯米等分水浸研敷之即散也普濟方胯眼脊瘍山藥沙糖同搗塗上即消先以面塗四圍乃上此簡便單方項後結核或赤腫硬痛以生山藥一挺去皮萆麻子二個同研貼之如神救急易方手足凍瘡山藥一截磨泥敷之儒門事親零餘子拾遺校正自草部移入此集解藏器曰零餘子大者如雞子小者如彈丸在葉下生曬乾功用強於薯蕷薯蕷有數種此其一也時珍曰此即山藥藤上所結子也長圓不一皮黃肉白煮熟去皮食之勝於山藥美於芋子霜後收之墜落在地者亦易生根氣味甘溫無毒主治補虛損強腰腳益腎食之不飢藏器甘薯綱目集解時珍曰按陳祈暢異物志云甘薯出交廣南方民家以二月種十月收之其根似芋亦有巨魁大者如鵝卵小者如雞鴨卵剝去紫皮肌肉正白如脂肪南人用當米穀果食蒸炙皆香美初時甚甜經久得風稍淡也又按嵇含草木狀云甘薯薯蕷之類或云芋類也根葉亦如芋根大如拳甌蒸煮食之味同薯蕷性不甚冷珠崖之不業耕者惟種此蒸切曬收以充糧糗名薯糧海中之人多壽亦由不食五穀而食甘薯故也氣味甘平無毒主治補虛乏益氣力健脾胃強腎陰功同薯蕷時珍百合本經中品校正自草部移入此釋名䪤音藩強瞿別録蒜腦薯別録曰一名摩羅一名重箱一名中逢花吳普曰一名重邁一名中庭弘景曰百合俗人呼為強仇仇即瞿也聲之訛耳時珍曰百合之根以衆瓣合成也或云專治百合病故名亦通其根如大蒜其味如山薯故俗稱蒜腦薯顧野王玉篇亦云䪤乃百合蒜也此物花葉根皆四向故曰強瞿凡物旁生謂之瞿義出韓詩外傳集解別録曰百合生荊州山谷二月八月採根陰乾弘景曰近道處處有之根如葫蒜數十斤相纍人亦蒸煮食之乃云是蚯蚓相纏結變作之亦堪服食恭曰此有二種一種葉大莖長根粗花白者宜入藥一種細葉花紅色頌曰百合三月生苗高二三尺竿粗如箭四面有葉如雞距又似柳葉青色近莖處微紫莖端碧白四五月開紅白花如石榴嘴而大根如葫蒜重疊生二三十瓣又一種花紅黃有黑斑點細葉葉間有黑子者不堪入藥按徐鍇歲時廣記二月種百合法宜雞糞或云百合是蚯蚓化成而反好雞糞理不可知也時珍曰百合一莖直上四向生葉葉似短竹葉不似柳葉五六月莖端開大白花長五寸六出紅蕊四垂向下色亦不紅紅者葉似柳乃山丹也百合結實略似馬兜鈴其內子亦似之其瓣種之如種蒜法山中者宿根年年自生未必盡是蚯蚓化成也蚯蚓多處不聞盡有百合其説恐亦浪傳耳正誤宗奭曰百合莖高三尺許葉如大柳葉四向攢枝而上其顛即開淡黃白花四垂向下覆長蕊花心有檀色每一枝顛須五六花子紫色圓如梧子生於枝葉間每葉一子不在花中亦一異也根即百合白色其形如松子殼四向攢生中間出苗時珍曰寇氏所説乃卷丹非百合也蘇頌所傳不堪入藥者今正其誤葉短而闊微似竹葉白花四垂者百合也葉長而狹尖如柳葉紅花不四垂者山丹也莖葉似山丹而高紅花帶黃而四垂上有黑斑點其子先結在枝葉間者卷丹也卷丹以四月結子秋時開花根似百合其山丹四月開花根小少瓣蓋一類三種也吳瑞本草言白花者名百合紅花者名強仇不知何所據也根氣味甘平無毒權曰有小毒主治邪氣腹脹心痛利大小便補中益氣本經除浮腫臚脹痞滿寒熱通身疼痛及乳難喉痹止涕淚別録百邪鬼魅涕泣不止除心下急滿痛治腳氣熱咳甄權安心定膽益志養五臟治顛邪狂叫驚悸産後血狂運殺蠱毒氣脅癰乳癰發背諸瘡腫大明心急黃宜蜜蒸食之孟詵治百合病宗奭溫肺止嗽元素發明頌曰張仲景治百合病有百合知母湯百合滑石代赭湯百合雞子湯百合地黃湯凡四方病名百合而用百合治之不識其義穎曰百合新者可蒸可煮和肉更佳乾者作粉食最益人時珍曰按王維詩云冥搜到百合真使當重肉果堪止淚無欲縱望江目蓋取本草百合止涕淚之説附方舊三新十三百合病百合知母湯治傷寒後百合病行住坐臥不定如有鬼神狀已發汗者用百合七枚以泉水浸一宿明旦更以泉水二升煮取一升卻以知母三兩用泉水二升煮一升同百合汁再煮取一升半分服百合雞子湯治百合病已經吐後者用百合七枚泉水浸一宿明旦更以泉水二升煮取一升入雞子黃一個分再服百合代赭湯治百合病已經下後者用百合七枚泉水浸一宿明旦更以泉水二升煮取一升卻以代赭石一兩滑石三兩水二升煮取一升同百合汁再煮取一升半分再服百合地黃湯治百合病未經汗吐下者用百合七枚泉水浸一宿明旦更以泉水二升煮取一升入生地黃汁一升同煎取一升半分再服並仲景金匱要略方百合變渴病已經月變成消渴者百合一升水一斗漬一宿取汁溫浴病人浴畢食白湯餅陳延之小品方百合變熱者用百合一兩滑石三兩為末飲服方寸匕微利乃良小品方百合腹滿作痛者用百合炒為末每飲服方寸匕日二小品陰毒傷寒百合煮濃汁服一升良孫真人食忌肺臟壅熱煩悶咳嗽者新百合四兩蜜和蒸軟時時含一片吞津聖惠方肺病吐血新百合搗汁和水飲之亦可煮食衛生易簡耳聾耳痛干百合為末溫水服二錢日二服勝金方拔白換黑七月七日取百合熟搗用新瓷瓶盛之密封挂門上陰乾百日每拔去白者摻之即生黑者也便民圖纂遊風隱疹以楮葉摻動用鹽泥二兩百合半兩黃丹二錢醋一分唾四分搗和貼之摘玄方瘡腫不穿野百合同鹽搗泥敷之良應驗方天泡濕瘡生百合搗塗一二日即安瀕湖集簡方魚骨哽咽百合五兩研末蜜水調圍頸項包住不過三五次即下聖濟花主治小兒天泡濕瘡曝乾研末菜子油塗良時珍子主治酒炒微赤研末湯服治腸風下血思邈山丹日華釋名紅百合日華連珠同川強瞿通志紅花菜集解詵曰百合紅花者名山丹其根食之不甚良不及白花者時珍曰山丹根似百合小而瓣少莖亦短小其葉狹長而尖頗似柳葉與百合迥別四月開紅花六瓣不四垂亦結小子燕齊人採其花跗未開者干而貨之名紅花菜卷丹莖葉雖同而稍長大其花六瓣四垂大於山丹四月結子在枝葉間入秋開花在顛頂誠一異也其根有瓣似百合不堪食別一種也根氣味甘涼無毒正要云平主治瘡腫驚邪大明女人崩中時珍花氣味同根主治活血其蕊敷疔瘡惡腫時珍草石蠶拾遺校正自草部移入此釋名地蠶日用土蛹余冬録甘露子食物滴露綱目地瓜兒時珍曰蠶蛹皆以根形而名甘露以根味而名或言葉上滴露則生珍常蒔之無此説也其根長大者救荒本草謂之地瓜兒集解藏器曰陶氏注蟲部石蠶云今俗用草根黑色按草石蠶生高山石上根如簪上有毛節如蠶葉似卷柏山人取食之頌曰草根之似蠶者亦名石蠶出福州及信州山石上四時常有其苗青亦有節三月採根用機曰草石蠶徽州甚多土人呼為地蠶肥白而促節大如三眠蠶生下濕地及沙磧間秋時耕犁遍地皆是收取以醋淹作菹食冬月亦掘取之穎曰地蠶生郊野麥地中葉如薄荷少狹而尖文微皺欠光澤根白色狀如蠶四月採根水瀹和鹽為菜茹之時珍曰草石蠶即今甘露子也荊湘江淮以南野中有之人亦栽蒔二月生苗長者近尺方莖對節狹葉有齒並如雞蘇但葉皺有毛耳四月開小花成穗一如紫蘇花穗結子如荊芥子其根連珠狀如老蠶五月掘根蒸煮食之味如百合或以蘿蔔滷及鹽菹水收之則不黑亦可醬漬蜜藏既可為菜又可充果陳藏器言石蠶葉似卷柏者若與此不同也根氣味甘平無毒時珍曰不宜生食及多食生寸白蟲與諸魚同食令人吐主治浸酒除風破血煮食治溪毒藏器焙乾主走注風散血止痛其節亦可搗末酒服蘇頌和五臟下氣清神正要竹筍蜀本草校正併入木部拾遺桃竹筍釋名竹萌爾雅竹芽筍譜竹胎説文竹子神異經時珍曰筍從竹旬諧聲也陸佃云旬內為筍旬外為竹故字從旬今謂竹為妒母草謂筍生旬有六日而齊母也僧贊寧筍譜云筍一名萌一名箬一名虇一名茁一名初篁皆會意也俗作筍者非集解弘景曰竹類甚多筍以實中竹篁竹者為佳於藥無用頌曰竹筍諸家惟以苦竹筍為最貴然苦竹有二種一種出江西及閩中者本極粗大筍味殊苦不可啖一種出江浙及近道者肉厚而葉長闊筍味微苦俗呼甜苦筍食品所宜亦不聞入藥用也時珍曰晉武昌戴凱之宋僧贊寧皆著竹譜凡六十餘種其所産之地發筍之時各各不同詳見木部竹下其筍亦有可食不可食者大抵北土鮮竹惟秦蜀吳楚以南則多有之竹有雌雄但看根上第一枝雙生者必雌也乃有筍土人於竹根行鞭時掘取嫩者謂之鞭筍江南湖南人冬月掘大竹根下未出土者為冬筍東觀漢記謂之苞筍並可鮮食為珍品其他則南人淡乾者為玉版筍明筍火筍鹽曝者為鹽筍並可為蔬食也按贊寧云凡食筍者譬如治藥得法則益人反是則有損採之宜避風日見風則本堅入水則肉硬脫殼煮則失味生著刃則失柔煮之宜久生必損人苦筍宜久煮干筍宜取汁為羹茹蒸之最美煨之亦佳味蘞者戟人咽先以灰湯煮過再煮乃良或以薄荷數片同煮亦去蘞味詩云其蔌伊何惟筍及蒲禮云加豆之實筍菹魚醢則筍之為蔬尚之久矣諸竹筍氣味甘微寒無毒藏器曰諸筍皆發冷血及氣瑞曰筍同羊肝食令人目盲主治消渴利水道益氣可久食別録利膈下氣化熱消痰爽胃寧原苦竹筍氣味苦甘寒主治不睡去面目並舌上熱黃消渴明目解酒毒除熱氣健人藏器理心煩悶益氣力利水道下氣化痰理風熱腳氣並蒸煮食之心鏡治出汗中風失音汪穎乾者燒研入鹽擦牙疳時珍發明時珍曰四川敘州宜賓長寧所出苦筍彼人重之宋黃山谷有苦筍賦云僰道苦筍冠冕兩川甘脆愜當小苦而成味溫潤縝密多啖而不悁食肴以之啓迪酒客為之流涎其許之也如此䈽竹筍主治消渴風熱益氣力消腹脹蒸煮炒食皆宜寧原淡竹筍氣味甘寒主治消痰除熱狂壯熱頭痛頭風並妊婦頭旋顛仆驚悸溫疫迷悶小兒驚癇天吊汪穎冬筍鞭筍氣味甘寒主治小兒痘疹不出煮粥食之解毒有發生之義汪穎發明詵曰淡竹筍及中母筍雖美然發背悶腳氣箭竹筍新者可食陳者不宜諸竹筍多食皆動氣發冷症惟苦竹筍主逆氣不發疾穎曰筍與竹瀝功近有人素患痰病食筍而愈也瑞曰淡筍甘筍苦筍冬筍鞭筍皆可久食其他雜竹筍性味不一不宜多食宗奭曰筍難化不益人脾病不宜食之一小兒食干筍三寸許噎於喉中壯熱喘粗如驚服驚藥不效後吐出筍諸證乃定其難化也如此時珍曰贊寧筍譜云筍雖甘美而滑利大腸無益於脾俗謂之刮腸篦惟生薑及麻油能殺其毒人以麻滓沃竹叢則次年凋疏可驗矣其蘄州叢竹毛斑竹匡廬扁竹灃州方竹嶺南𥯨竹簩竹月竹諸筍皆苦韌不堪食也時珍常見俗醫治痘往往勸飲筍湯云能發痘蓋不知痘瘡不宜大腸滑利而筍有刮腸之名則暗受其害者不知若干人也戒之哉戒之哉桃竹筍拾遺藏器曰南人謂之黃筍灰汁煮之可食不爾戟人喉其竹叢生醜類非一時珍曰桃枝竹出川廣中皮滑而廣犀紋瘦骨四寸有節可以為席氣味苦有小毒主治六畜瘡中蛆搗碎納之蛆盡出藏器刺竹筍時珍曰生交廣中叢生大者圍二尺枝節皆有刺夷人種以為城伐竹為弓根大如車輻一名芭竹氣味甘苦有小毒食之落人發竹譜酸筍集解時珍曰酸筍出粵南顧玠海槎録云筍大如臂摘至用沸湯泡去苦水投冷井水中浸二三日取出縷如絲繩醋煮可食好事者攜入中州成罕物云氣味酸涼無毒主治作湯食止渴解酲利膈時珍
