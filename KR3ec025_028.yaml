body:
  text: 菜部二十八卷菜之三蓏菜類一十一種茄音伽宋開寶釋名落蘇拾遺崑崙瓜御覽草鱉甲頌曰按段成式云茄音加乃蓮莖之名今呼茄菜其音若伽未知所自也時珍曰陳藏器本草云茄一名落蘇名義未詳按五代貽子録作酪酥蓋以其味如酥酪也於義似通杜寶拾遺録云隋煬帝改茄曰崑崙紫瓜又王隱君養生主論治瘧方用干茄諱名草鱉甲蓋以鱉甲能治寒熱茄亦能治寒熱故爾集解頌曰茄子處處有之其類有數種紫茄黃茄南北通有白茄青水茄惟北土有之入藥多用黃茄其餘惟可作菜茹爾江南一種藤茄作蔓生皮薄似壺盧亦不聞中藥宗奭曰新羅國出一種茄形如雞子淡光微紫色蒂長味甘今中國已遍有之時珍曰茄種宜於九月黃熟時收取洗淨曝乾至二月下種移栽株高二三尺葉大如掌自夏至秋開紫花五瓣相連五稜如縷黃蕊緑蒂蒂包其茄茄中有瓤瓤中有子子如脂麻其茄有團如栝蔞者長四五寸者有青茄紫茄白茄白茄亦名銀茄更勝青者諸茄至老皆黃蘇頌以黃茄為一種似未深究也王禎農書云一種渤海茄白色而堅實一種番茄白而扁甘脆不澀生熟可食一種紫茄色紫蒂長味甘一種水茄形長味甘可以止渴洪容齊隨筆云浙西常茄皆皮紫其白者為水茄江西常茄皆皮白其紫者為水茄亦一異也劉恂嶺表録異云交嶺茄樹經冬不凋有二三年漸成大樹者其實如瓜也茄葉摘布路上以灰圍之則子必繁謂之嫁茄茄子氣味甘寒無毒志曰凡久冷人不可多食損人動氣發瘡及痼疾李鵬飛曰秋後食多損目時珍曰按生生編云茄性寒利多食必腹痛下利女人能傷子宮也主治寒熱五臟勞孟詵治溫疾傳尸勞氣醋摩敷腫毒大明老裂者燒灰治乳裂震亨散血止痛消腫寬腸時珍發明宗奭曰蔬圃中惟此無益開寶本草並無主治只說損人後人雖有處治之法終與正文相失圃人又下於暖處厚加糞壤遂於小滿前後求貴價以售既不以時損人益多不時不食烏可忽也震亨曰茄屬土故甘而喜降大腸易動者忌之老實治乳頭裂茄根煮湯漬凍瘡折蒂燒灰治口瘡俱獲奇效皆甘以緩火之意也時珍曰段成式酉陽雜俎言茄厚腸胃動氣發疾蓋不知茄之性滑不厚腸胃也附方舊六新十婦人血黃黃茄子竹刀切陰乾為末每服二錢溫酒調下摘玄方腸風下血經霜茄連蒂燒存性為末每日空心溫酒服二錢匕靈苑方久患下血大茄種三枚每用一枚濕紙包煨熟安瓶內以無灰酒一升半沃之蠟紙封閉三日去茄暖飲普濟方腹內鱉症陳醬茄兒燒存性入麝香輕粉少許脂調貼之壽域方卵㿉偏墜用雙蒂茄子懸於房門上出入用眼視之茄蔫所患亦蔫茄干亦干矣又法用雙茄懸門上每日抱兒視之二三次釘針於上十餘日消矣劉松石保壽堂方大風熱痰用黃老茄子大者不計多少以新瓶盛埋土中經一年盡化為水取出入苦參末同丸梧子大食已及臥時酒下三十丸甚效此方出江南人傳蘇頌圖經本草腰腳拘攣腰腳風血積冷筋急拘攣疼痛者取茄子五十斤切洗以水五斗煮取濃汁濾去滓更入小鐺中煎至一斗以來即入生粟粉同煎令稀稠得所取出搜和更入麝香硃砂末同丸如梧子大每旦用秫米酒送下三十丸近暮再服一月乃瘥男子女人通用皆驗圖經本草磕撲青腫老黃茄極大者切片如一指厚新瓦焙研為末欲臥時溫酒調服二錢匕一夜消盡無痕跡也勝金墜損跌撲散血止痛重陽日收老茄子百枚去蒂四破切之硝石十二兩搗碎以不津器先鋪茄子一重乃下硝石一重如此間鋪令盡以紙數層密封安置淨處上下以新磚承覆勿犯地氣至正月後取出去紙兩重日中曝之逐日如此至二三月度茄已爛開瓶傾出濾去滓別入新器中以薄綿蓋頭又曝至成膏乃可用每以酒調半匙空腹飲之日再惡血散則痛止而愈矣若膏久乾硬即以飯飲化動用之圖經本草發背惡瘡用上方以酒服半匙更以膏塗瘡口四圍覺冷如冰雪瘡干便瘥其有根本在膚腠者亦可內消同上熱毒瘡腫生茄子一枚割去二分去瓤二分似罐子形合於瘡上即消也如已出膿再用取瘥聖濟總録牙齒腫痛隔年糟茄燒灰頻頻乾擦立效海上名方蟲牙疼痛黃茄種燒灰擦之效摘玄方喉痹腫痛糟茄或醬茄細嚼咽汁德生堂方婦人乳裂秋月冷茄子裂開者陰乾燒存性研末水調塗補遺方蒂主治燒灰米飲服二錢治腸風下血不止及血痔吳瑞燒灰治口齒瘡䘌生切擦癜風時珍發明時珍曰治癜風用茄蒂蘸硫附末摻之取其散血也白癜用白茄蒂紫癜用紫茄蒂亦各從其類耳附方新一風蛀牙痛茄蒂燒灰摻之或加細辛末等分日用之仁存方花主治金瘡牙痛時珍附方新一牙痛秋茄花干之旋燒研塗痛處立止海上名方根及枯莖葉主治凍瘡皴裂煮湯漬之良開寶散血消腫治血淋下血血痢陰挺齒䘌口菌時珍附方新九血淋疼痛茄葉熏干為末每服二錢溫酒或鹽湯下隔年者尤佳經驗良方腸風下血方同上米飲下久痢不止茄根燒灰石榴皮等分為末以沙糖水服之簡便單方女陰挺出茄根燒存性為末油調在紙上捲筒安入內一日一上乾坤生意口中生菌用醋漱口以茄母燒灰飛鹽等分米醋調稀時時擦之摘玄方牙齒䘌痛茄根搗汁頻塗之陳茄樹燒灰敷之先以露蜂房煎湯漱過海上名方牙痛取牙茄科以馬尿浸三日曬炒為末每用點牙即落真妙鮑氏方夏月趾腫不能行走者九月收茄根懸檐下逐日煎湯洗之簡便苦茄拾遺集解藏器曰苦茄野生嶺南樹小有刺子主治醋摩塗癰腫根亦可作湯浴又主瘴氣藏器壺盧日華釋名瓠瓜說文匏瓜論語時珍曰壺酒器也盧飲器也此物各象其形又可為酒飯之器因以名之俗作葫蘆者非矣葫乃蒜名蘆乃葦屬也其圓者曰匏亦曰瓢因其可以浮水如泡如漂也凡蓏屬皆得稱瓜故曰瓠瓜匏瓜古人壺瓠匏三名皆可通稱初無分別故孫愐唐韻云瓠音壺又音護瓠𤬜瓢也陶隱居本草作瓠𤬏云是瓠類也許慎說文云瓠匏也又云瓢瓠也匏大腹瓠也陸璣詩疏云壺瓠也又云匏瓠也莊子云有五石之瓠諸書所言其字皆當與壺同音而後世以長如越瓜首尾如一者為瓠音護瓠之一頭有腹長柄者為懸瓠無柄而圓大形扁者為匏匏之有短柄大腹者為壺壺之細腰者為蒲蘆各分名色迥異於古以今參詳其形狀雖各不同而苗葉皮子性味則一故茲不復分條焉懸瓠今人所謂茶酒瓢者是也蒲蘆今之藥壺盧是也郭義恭廣志謂之約腹壺以其腹有約束也亦有大小二種也集解弘景曰瓠與冬瓜氣類同輩又有瓠𤬏亦是瓠類小者名瓢食之乃勝瓠此等皆利水道所以在夏月食之大約不及冬瓜也恭曰瓠與瓠𤬏冬瓜全非類例三物苗葉相似而實形則異瓠形似越瓜長尺余頭尾相似夏中便熟秋末便枯瓠𤬏形狀大小非一夏末始實秋中方熟取其為器經霜乃堪瓠與甜瓠𤬏體性相類啖之俱勝冬瓜陶言不及乃是未悉此等原種各別也時珍曰長瓠懸瓠壺盧匏瓜蒲盧名狀不一其實一類各色也處處有之但有遲早之殊陶氏言瓠與冬瓜氣類同輩蘇氏言瓠與瓠𤬏全非類例皆未可憑數種並以正二月下種生苗引蔓延緣其葉似冬瓜葉而稍團有柔毛嫩時可食故詩云幡幡瓠葉採之烹之五六月開白花結實白色大小長短各有種色瓤中之子齒列而長謂之瓠犀竊謂壺匏之屬既可烹曬又可為器大者可為甕盎小者可為瓢樽為舟可以浮水為笙可以奏樂膚瓤可以養豕犀瓣可以澆燭其利溥矣壺瓠氣味甘平滑無毒恭曰甘冷多食令人吐利扁鵲曰患腳氣虛脹冷氣者食之永不除也主治消渴惡瘡鼻口中肉爛痛思邈利水道弘景消熱服丹石人宜之孟詵除煩治心熱利小腸潤心肺治石淋大明發明時珍曰按名醫録云浙人食匏瓜多吐瀉謂之發暴蓋此物以暑月壅成故也惟與香葇同食則可免附方新一腹脹黃腫用亞腰壺盧連子燒存性每服一個食前溫酒下不飲酒者白湯下十餘日見效簡便方葉氣味甘平無毒主治為茹耐飢思邈蔓須花主治解毒時珍附方新一預解胎毒七八月或三伏日或中秋日剪壺盧須如環子腳者陰乾於除夜煎湯浴小兒則可免出痘唐瑤經驗方子主治齒齦或腫或露齒搖疼痛用八兩同牛膝四兩每服五錢煎水含漱日三四次御藥院方苦瓠本經下品釋名苦匏國語苦壺盧集解別録曰苦瓠生晉地弘景曰今瓠忽有苦者如膽不可食非別生一種也又有瓠𤬏亦是瓠類恭曰本經所論都是苦瓠𤬏爾陶謂瓠中苦者大誤矣瓠中時有苦者不入藥用無所主療亦不堪啖瓠與瓠𤬏原種各別非甘者變為苦也保升曰瓠即匏也有甘苦二種甘者大苦者小機曰瓠壺有原種是甘忽變為苦者俗謂以雞糞壅之或牛馬踏踐則變為苦陶說亦有所見未可盡非也時珍曰詩云匏有苦葉國語云苦匏不材於人共濟而已皆指苦壺而言即苦瓠也瓠壺同音陶氏以瓠作護音釋之所以不穩也應劭風俗通云燒穰可以殺瓠或云畜瓠之家不燒穰種瓜之家不焚漆物性相畏也蘇恭言服苦瓠過分吐利不止者以黍穰灰汁解之蓋取乎此凡用苦瓠須細理瑩淨無黶翳者乃佳不爾有毒瓤及子氣味苦寒有毒主治大水面目四肢浮腫下水令人吐本經利石淋吐呀嗽囊結疰蠱痰飲又煮汁漬陰療小便不通蘇恭煎汁滴鼻中出黃水去傷冷鼻塞黃疸藏器吐蛔蟲大明治癰疽惡瘡疥癬齲齒有蟲䘌者又可制汞時珍附方舊八新十七急黃病苦瓠一枚開孔以水煮之攪取汁滴入鼻中去黃水陳藏器黃疸腫滿苦壺盧瓤如大棗許以童子小便二合浸之一時取兩酸棗大納兩鼻中深吸氣待黃水出良又方用瓠瓤熬黃為末每服半錢日一服十日愈然有吐者當詳之傷寒類要大水脹滿頭面洪大用瑩淨好苦瓠白瓤捻如豆粒以麵裹煮一沸空心服七枚至午當出水一斗二日水自出不止大瘦乃瘥二年內忌咸物外臺聖惠用苦壺盧瓤一兩微炒為末每日粥飲服一錢通身水腫苦瓠膜炒二兩苦葶藶五分搗合丸小豆大每服五丸日三水下止又用苦瓠膜五分大棗七枚搗丸一服三丸如人行十里許又服三丸水出更服一丸即止並千金方石水腹腫四肢皆瘦削用苦瓠膜炒一兩杏仁半兩炒去皮尖為末糊丸小豆大每飲下十丸日三水下止聖濟總録水蠱洪腫苦瓠瓤一枚水二升煮至一升煎至可丸如小豆大每米飲下十丸待小便利作小豆羹食勿飲水小便不通脹急者用苦瓠子三十枚炒螻蛄三個焙為末每冷水服一錢並聖濟總録小兒閃癖取苦瓠未破者煮令熱解開尉之陳藏器本草風痰頭痛苦瓠膜取汁以葦管灌入鼻中其氣上衝腦門須臾惡涎流下其病立愈除根勿以昏運為疑乾者浸汁亦效其子為末吹入亦效年久頭風皆愈普濟方鼻窒氣塞苦壺盧子為末醇酒浸之夏一日冬七日日日少少點之聖惠方眼目昏暗七月七日取苦瓠白瓤絞汁一合以酢二升古錢七文同以微火煎減半每日取沫納眥中神效千金胬肉血翳秋間取小柄壺盧或小藥壺盧陰乾於緊小處鋸斷內挖一小孔如眼孔大遇有此病將眼皮上下用手掙開將壺盧孔合定初雖甚痛苦然瘀肉血翳皆漸下不傷睛也劉松石經驗方齒䘌口臭苦瓠子為末蜜丸半棗大每旦漱口了含一丸仍塗齒齦上涎出吐去妙聖惠方風蟲牙痛壺盧子半升水五升煎三升含漱之莖葉亦可不過三度聖惠方惡瘡癬癩十年不瘥者苦瓠一枚煮汁搽之日三度肘後方九瘻有孔苦瓠四枚大如盞者各穿一孔如指大湯煮十數沸取一竹筒長一尺一頭插瓠孔中一頭注瘡孔上冷則易之用遍乃止千金方痔瘡腫痛苦壺盧苦蕒菜煎湯先熏後洗乃貼熊膽密陀僧膽礬片腦末良摘玄方下部懸癰擇人神不在日空心用井華水調百藥煎末一碗服之微利後卻用秋壺盧一名苦不老生在架上而苦者切片置瘡上灸二七壯肅端式病此連年一灸遂愈永類鈐方卒中蠱毒或吐血或下血皆如爛肝者苦瓠一枚水二升煮一升服立吐即愈又方用苦酒一升煮令消服之取吐神驗肘後方死胎不下苦壺盧燒存性研末每服一錢空心熱酒下海上名方聤耳出膿干瓠子一分黃連半錢為末以綿先繳淨吹入半字日二次聖惠方鼻中息肉苦壺盧子苦丁香等分入麝香少許為末紙捻點之聖惠方花主治一切瘻瘡霜後收曝研末敷之時珍蔓主治麻瘡煎湯浴之即愈時珍出仇遠稗史附方新一小兒白禿瓠藤同裹鹽荷葉煎濃汁洗三五次愈總録敗瓢綱目集解時珍曰瓢乃匏壺破開為之者近世方藥亦時用之當以苦瓠者為佳年久者尤妙氣味苦平無毒主治消脹殺蟲治痔漏下血崩中帶下赤白時珍附方新六中滿鼓脹用三五年陳壺盧瓢一個以糯米一斗作酒待熟以瓢於炭火上炙熱入酒浸之如此三五次將瓢燒存性研末每服三錢酒下神效余居士選奇方大便下血敗瓢燒存性黃連等分研末每空心溫酒服二錢簡便方赤白崩中舊壺盧瓢炒存性蓮房煅存性等分研末每服二錢熱水調服三服有汗為度即止甚者五服止最妙忌房事發物生冷海上方腦漏流膿破瓢白雞冠花白螺螄殼各燒存性等分血竭麝香各五分為末以好酒灑濕熟艾連藥揉成餅貼在頂門上以尉斗尉之以愈為度孫氏集效方腋下瘤癭用長柄茶壺盧燒存性研末搽之以消為度一府校老嫗右腋生一瘤漸長至尺許其狀如長瓠子久而潰爛一方士教以此法用之遂出水消盡而愈瀕湖集簡方湯火傷灼舊壺盧瓢燒灰敷之同上冬瓜本經上品校正今併入白瓜子釋名白瓜本經水芝同上地芝廣雅志曰冬瓜經霜後皮上白如粉塗其子亦白故名白冬瓜而子云白瓜子也時珍曰冬瓜以其冬熟也又賈思協云冬瓜正二三月種之若十月種者結瓜肥好乃勝春種則冬瓜之名或又以此也別録曰冬瓜原附於本經瓜子之下宋開寶本草加作白瓜子復分白冬瓜為別録一種遂致諸注辨說紛紛今併為一集解別録曰白瓜子生嵩高平澤冬瓜仁也八月採之頌曰今處處園圃蒔之其實生苗蔓下大者如斗而更長皮厚而有毛初生正青緑經霜則白粉人家多藏蓄彌年作菜果入藥須霜後取置之經年破出核洗燥乃擂取仁用之亦堪單作服餌時珍曰冬瓜三月生苗引蔓大葉團而有尖莖葉皆有刺毛六七月開黃花結實大者徑尺余長三四尺嫩時緑色有毛老則蒼色有粉其皮堅厚其肉肥白其瓤謂之瓜練白虛如絮可以浣練衣服其子謂之瓜犀在瓤中成列霜後取之其肉可煮為茹可蜜為果其子仁亦可食蓋兼蔬果之用凡收瓜忌酒漆麝香及糯米觸之必爛白冬瓜氣味甘微寒無毒弘景曰冷利主治小腹水脹利小便止渴別録搗汁服止消渴煩悶解毒弘景益氣耐老除心胸滿去頭面熱孟詵消熱毒癰腫切片摩痱子甚良大明利大小腸壓丹石毒蘇頌發明詵曰熱者食之佳冷者食之瘦人煮食練五臟為其下氣故也欲得體瘦輕健者則可長食之若要肥則勿食也宗奭曰凡患發背及一切癰疽者削一大塊置瘡上熱則易之分散熱毒氣甚良震亨曰冬瓜性走而急寇氏謂其分散熱毒氣蓋亦取其走而性急也久病者陰虛者忌之孫真人言九月勿食令人反胃須被霜食之乃佳詵曰取瓜一顆和桐葉與豬食之一冬更不要與諸物食自然不飢長三四倍也附方舊七新七積熱消渴白瓜去皮每食後吃三二兩五七度良孟詵食療消渴不止冬瓜一枚削皮埋濕地中一月取出破開取清水日飲之或燒熟絞汁飲之聖濟總録消渴骨蒸大冬瓜一枚去瓤入黃連末填滿安甕內待瓜消盡同研丸梧子大每服三四十丸煎冬瓜湯下經驗産後痢渴久病津液枯竭四肢浮腫口舌乾燥用冬瓜一枚黃土泥厚五寸煨熟絞汁飲亦治傷寒痢渴古今録驗小兒渴利冬瓜汁飲之千金小兒鬾病寒熱如疳用冬瓜萹蓄各四兩水二升煎湯浴之千金方嬰孩寒熱冬瓜炮熟絞汁飲子母祕録水病危急冬瓜不拘多少任意吃之神效無比兵部手集十種水氣浮腫喘滿用大冬瓜一枚切蓋去瓤以赤小豆填滿蓋合簽定以紙筋泥固濟曬乾用糯糠兩大籮入瓜在內煨至火盡取出切片同豆焙乾為末水糊丸梧子大每服七十丸煎冬瓜子湯下日三服小便利為度楊氏家藏方發背欲死冬瓜截去頭合瘡上瓜爛截去更合之瓜未盡瘡已小斂矣乃用膏貼之肘後方痔瘡腫痛冬瓜煎湯洗之袖珍方馬汗入瘡干冬瓜燒研洗淨敷之食魚中毒冬瓜汁飲之良小品方面黑令白冬瓜一個竹刀去皮切片酒一升半水一升煮爛濾去滓熬成膏瓶收每夜塗之聖濟總録瓜練瓤也氣味甘平無毒主治絞汁服止煩躁熱渴利小腸治五淋壓丹石毒甄權洗面澡身去䵟𪒟令人悅澤白皙時珍附方新二消渴煩亂冬瓜瓤乾者一兩水煎飲聖惠方水腫煩渴小便少者冬瓜白瓤水煎汁淡飲之聖濟總録白瓜子別録曰冬瓜仁也八月採之正誤恭曰此甘瓜也甘字似白字後人誤寫耳當改從甘字志曰本草注白瓜子冬瓜仁也蘇氏所言殊為孟浪且甘瓜即甜瓜亦有青白二種其子色黃主療與冬瓜全異但冬瓜經霜有白衣其子亦白白瓜之號因斯而得況諸方惟用冬瓜子不見用甘瓜子者蘇說不可憑也氣味甘平無毒別録曰寒久服寒中主治令人悅澤好顏色益氣不飢久服輕身耐老本經除煩滿不樂可作面脂別録去皮膚風及黑䵟潤肌膚大明治腸癰時珍發明頌曰冬瓜仁亦堪單作服餌又研末作湯飲及作面脂藥並令人顏色光澤宗懍荊楚歲時記云七月採瓜犀以為面脂即瓜瓣也亦堪作澡豆宗奭曰服食方亦稀用之附方舊四新四服食法取冬瓜仁七升以絹袋盛投三沸湯中須臾取曝乾如此三度又與清苦酒漬之一宿曝乾為末日服方寸匕令人肥悅明目延年不老又法取子三五升去皮為丸空心日服三十丸令人白淨如玉孟詵食療補肝明目治男子五勞七傷明目用冬瓜仁方同上外臺祕要悅澤面容白瓜仁五兩桃花四兩白楊皮二兩為末食後飲服方寸匕日三服欲白加瓜仁欲紅加桃花三十日面白五十日手足俱白一方有橘皮無楊皮肘後方多年損傷不瘥者瓜子末溫酒服之孫真人方消渴不止小便多用干冬瓜子麥門冬黃連各二兩水煎飲之冬瓜苗葉俱治消渴不拘新幹摘玄方男子白濁陳冬瓜仁炒為末每空心米飲服五錢救急易方女子白帶方同上瓜皮主治可作丸服亦入面脂蘇頌主驢馬汗入瘡腫痛陰乾為末塗之又主折傷損痛時珍附方新二跌撲傷損用干冬瓜皮一兩真牛皮膠一兩銼入鍋內炒存性研末每服五錢好酒熱服仍飲酒一甌厚蓋取微汗其痛即止一宿如初極效摘玄方損傷腰痛冬瓜皮燒研酒服一錢生生編葉主治治腫毒殺蜂療蜂叮大明主消渴瘧疾寒熱又焙研敷多年惡瘡時珍附方新一積熱瀉痢冬瓜葉嫩心拖面煎餅食之海上名方藤主治燒灰可出繡黥煎湯洗黑䵟並瘡疥大明搗汁服解木耳毒煎水洗脫肛燒灰可淬銅鐵伏砒石時珍南瓜綱目集解時珍曰南瓜種出南番轉入閩浙今燕京諸處亦有之矣三月下種宜沙沃地四月生苗引蔓甚繁一蔓可延十餘丈節節有根近地即著其莖中空其葉狀如蜀葵而大如荷葉八九月開黃花如西瓜花結瓜正圓大如西瓜皮上有稜如甜瓜一本可結數十顆其色或緑或黃或紅經霜收置暖處可留至春其子如冬瓜子其肉厚色黃不可生食惟去皮瓤瀹食味如山藥同豬肉煮食更良亦可蜜煎按王禎農書云浙中一種陰瓜宜陰地種之秋熟色黃如金皮膚稍厚可藏至春食之如新疑此即南瓜也氣味甘溫無毒時珍曰多食髮腳氣黃疸不可同羊肉食令人氣壅主治補中益氣時珍越瓜宋開寶釋名梢瓜食物菜瓜時珍曰越瓜以地名也俗名梢瓜南人呼為菜瓜集解藏器曰越瓜生越中大者色正白越人當果食之亦可糟藏時珍曰越瓜南北皆有二三月下種生苗就地引蔓青葉黃花並如冬瓜花葉而小夏秋之間結瓜有青白二色大如瓠子一種長者至二尺許俗呼羊角瓜其子狀如胡瓜子大如麥粒其瓜生食可充果蔬醬豉糖醋藏浸皆宜亦可作菹氣味甘寒無毒詵曰生食多冷中動氣令人心痛臍下癥結發諸瘡又令人虛弱不能行不益小兒天行病後不可食又不得與牛乳酪及鮓同食時珍曰按蕭子真云菜瓜能暗人耳目觀驢馬食之即眼爛可知矣主治利腸胃止煩渴開寶利小便去煩熱解酒毒宣泄熱氣燒灰敷口吻瘡及陰莖熱瘡藏器和飯作鮓久食益腸胃心鏡胡瓜宋嘉祐釋名黃瓜藏器曰北人避石勒諱改呼黃瓜至今因之時珍曰張騫使西域得種故名胡瓜按杜寶拾遺録云隋大業四年避諱改胡瓜為黃瓜與陳氏之說微異今俗以月令王瓜生即此誤矣王瓜土瓜也見草部集解時珍曰胡瓜處處有之正二月下種三月生苗引蔓葉如冬瓜葉亦有毛四五月開黃花結瓜圍二三寸長者至尺許青色皮上有㾦㿔如疣子至老則黃赤色其子與菜瓜子同一種五月種者霜時結瓜白色而短並生熟可食兼蔬蓏之用糟醬不及菜瓜也氣味甘寒有小毒詵曰不可多食動寒熱多瘧病積瘀熱發疰氣令人虛熱上逆少氣損陰血發瘡疥腳氣虛腫百病天行病後不可食之小兒切忌滑中生疳蟲不可多用醋主治清熱解渴利水道寧原附方舊一新六小兒熱痢嫩黃瓜同蜜食十餘枚良海上名方水病肚脹四肢浮腫用胡瓜一個破開連子以醋煮一半水煮一半至爛空心俱食之須臾下水也千金髓小兒出汗香瓜丸用黃連胡黃連黃柏川大黃煨熟鱉甲醋炙柴胡蘆薈青皮等分為末用大黃瓜黃色者一個割下頭填藥至滿蓋定簽住慢火煨熟同搗爛入麵糊丸緑豆大每服二三丸大者五七丸至十丸食後新水下錢乙小兒方咽喉腫痛老黃瓜一枚去子入消填滿陰乾為末每以少許吹之醫林集要杖瘡焮腫六月六日取黃瓜入瓷瓶中水浸之每以水掃於瘡上立效醫林集要火眼赤痛五月取老黃瓜一條上開小孔去瓤入芒硝令滿懸陰處待消透出刮下留點眼甚效壽域神方湯火傷灼五月五日掐黃瓜入瓶內封掛檐下取水刷之良醫方摘要葉氣味苦平有小毒主治小兒閃癖一歲用一葉生挼攪汁服得吐下良藏器根主治搗敷狐刺毒腫大明絲瓜綱目釋名天絲瓜本事天羅事類合璧布瓜同上蠻瓜本事魚鰦時珍曰此瓜老則筋絲羅織故有絲羅之名昔人謂之魚鰦或云虞刺始自南方來故曰蠻瓜集解時珍曰絲瓜唐宋以前無聞今南北皆有之以為常蔬二月下種生苗引蔓延樹竹或作棚架其葉大於蜀葵而多丫尖有細毛刺取汁可染緑其莖有稜六七月開黃花五出微似胡瓜花蕊瓣俱黃其瓜大寸許長一二尺甚則三四尺深緑色有皺點瓜頭如鱉首嫩時去皮可烹可曝點茶充蔬老則大如杵筋絡纏紐如織成經霜乃枯惟可藉靴履滌釜器故村人呼為洗鍋羅瓜內有隔子在隔中狀如栝蔞子黑色而扁其花苞及嫩葉卷鬚皆可食也瓜氣味甘平無毒入藥用老者主治痘瘡不快枯者燒存性入硃砂研末蜜水調服甚妙震亨煮食除熱利腸老者燒存性服去風化痰涼血解毒殺蟲通經絡行血脈下乳汁治大小便下血痔漏崩中黃積疝痛卵腫血氣作痛癰疽瘡腫齒䘌痘疹胎毒時珍暖胃補陽固氣和胎生生編發明穎曰絲瓜本草諸書無考惟痘瘡及腳癰方中燒灰用之亦取其性冷解毒耳時珍曰絲瓜老者筋絡貫串房隔聯屬故能通人脈絡臟腑而去風解毒消腫化痰祛痛殺蟲及治諸血病也附方新二十八痘瘡不快初出或未出多者令少少者令稀老絲瓜近蒂三寸連皮燒存性研末砂糖水服直指癰疽不斂瘡口太深用絲瓜搗汁頻抹之直指方風熱腮腫絲瓜燒存性研末水調搽之嚴月軒方肺熱面瘡苦絲瓜牙皂莢並燒灰等分油調搽摘玄方玉莖瘡潰絲瓜連子搗汁和五倍子末頻搽之丹溪方坐板瘡疥絲瓜皮焙乾為末燒酒調搽之攝生衆妙方天泡濕瘡絲瓜汁調辰粉頻搽之手足凍瘡老絲瓜燒存性和臘豬脂塗之海上方肛門酒痔絲瓜燒存性研末酒服二錢嚴月軒方痔漏脫肛絲瓜燒灰多年石灰雄黃各五錢為末以豬膽雞子清及香油和調貼之收上乃止孫氏集效方腸風下血霜後乾絲瓜燒存性為末空心酒服二錢一名蠻瓜一名天羅一名天絲瓜是矣許叔微本事方下血危篤不可救者絲瓜即天羅一個燒存性槐花減半為末每空心米飲服二錢普濟方酒痢便血腹痛或如魚腦五色者乾絲瓜一枚連皮燒研空心酒服二錢一方煨食之俗名魚鰦是也經驗良方血崩不止老絲瓜燒灰棕櫚燒灰等分鹽酒或鹽湯服奇效良方經脈不通乾絲瓜一個為末用白鴿血調成餅曬乾研末每服二錢空心酒下先服四物湯三服海上名方乳汁不通絲瓜連子燒存性研酒服一二錢被覆取汗即通簡便單方乾血氣痛婦人血氣不行上衝心膈變為乾血氣者用絲瓜一枚燒存性空心溫酒服壽域神方小腸氣痛繞臍衝心連蒂老絲瓜燒存性研末每服三錢熱酒調下甚者不過二三服即消卵腫偏墜絲瓜架上初結者留下待瓜結盡葉落取下燒存性為末煉蜜調成膏每晚好酒服一匙如在左左睡在右右睡劉松石保壽堂方腰痛不止天羅布瓜子仁炒焦擂酒熱服以渣炒熱敷之熊氏補遺喉閉腫痛天羅瓜研汁灌之普濟卒然中風防風荊芥一兩升麻半兩姜三片水一盞煎半盞以絲瓜子研取漿半盞和勻灌之如手足麻癢以羌活煎湯洗之唐瑤經驗方化痰止嗽天羅即絲瓜燒存性為末棗肉和丸彈子大每服一丸溫酒化下攝生衆妙方風蟲牙痛經霜乾絲瓜燒存性為末擦之直指方風氣牙痛百藥不效者用此大能去風惟蛀牙不效天羅即生絲瓜一個擦鹽火燒存性研末頻擦涎盡即愈腮腫以水調貼之馬敏叔云此乃嚴月軒家傳屢效之方一試即便可睡也食積黃疸絲瓜連子燒存性為末每服二錢因面得病麵湯下因酒得病溫酒下連進數服愈衛生易簡方小兒浮腫天羅燈草蔥白等分煎濃汁服並洗之普濟方水蠱腹脹老絲瓜去皮一枚剪碎巴豆十四粒同炒豆黃去豆以瓜同陳倉米再炒熟去瓜研米為末糊丸梧子大每服百丸白湯下蓋米收胃氣巴豆逐水絲瓜象人脈絡借其氣以引之也此乃元時杭州名醫宋會之之方鮮于樞鉤玄葉主治癬瘡頻挼摻之療癰疽疔腫卵焮時珍附方新六蟲癬清晨採露水絲瓜葉七片逐片擦七下如神忌雞魚發物攝生衆妙方陰子偏墜絲瓜葉燒存性三錢雞子殼燒灰二錢溫酒調服余居士選奇方頭瘡生蛆頭皮內時有蛆出以刀切破擠絲瓜葉汁搽之蛆出盡絶根小山怪證方湯火傷灼絲瓜葉焙研入辰粉一錢蜜調搽之生者搗敷一日即好也海上名方魚臍疔瘡絲瓜葉即虞刺葉也連須蔥白韭菜等分同入石鉢內研爛取汁以熱酒和服以渣貼腋下病在左手貼左腋右手貼右腋病在左腳貼左胯右腳貼右胯在中貼心臍用帛縛住候肉下紅線處皆白則散矣如有潮熱亦用此法卻令人抱住恐其顫倒則難救矣危氏得效方刀瘡神藥古石灰新石灰絲瓜根葉初种放兩葉者韭菜根各等分搗一千下作餅陰乾為末擦之止血定痛生肌如神效侍御蘇海峰所傳董炳集驗方藤根氣味同葉主治齒䘌腦漏殺蟲解毒時珍附方新八預解痘毒五六月取絲瓜蔓上卷鬚陰乾至正月初一日子時用二兩半煎湯父母只令一人知溫浴小兒身面上下以去胎毒永不出痘縱出亦少也體仁彙編諸瘡久潰絲瓜老根熬水掃之大涼即愈應驗方喉風腫痛絲瓜根以瓦瓶盛水浸飲之海上名方腦崩流汁鼻中時時流臭黃水腦痛名控腦砂有蟲食腦中也用絲瓜藤近根三五尺燒存性每服一錢溫酒下以愈為度醫學正傳牙宣露痛海上妙方用絲瓜藤陰乾臨時火煅存性研搽即止最妙惠生堂方用絲瓜藤一握川椒一撮燈心一把水煎濃汁漱吐其痛立住如神咽喉骨鯁七月七日取絲瓜根陰乾燒存性每服二錢以原鯁物煮湯服之筆峰雜興腰痛不止絲瓜根燒存性為末每溫酒服二錢神效甚捷鄧筆峰雜興附録天羅勒拾遺藏器曰生江南平地主溪毒挼碎敷之時珍曰陳氏注此不詳又江南呼絲瓜為天羅疑即此物然無的據姑附之苦瓜救荒釋名錦荔枝救荒癩葡萄時珍曰苦以味名瓜及荔枝葡萄皆以實及莖葉相似得名集解周定王曰錦荔枝即癩葡萄蔓延草木莖長七八尺莖有毛澀葉似野葡萄而花又開黃花實大如雞子有皺紋似荔枝時珍曰苦瓜原出南番今閩廣皆種之五月下子生苗引蔓莖葉卷鬚並如葡萄而小七八月開小黃花五瓣如碗形結瓜長者四五寸短者二三寸青色皮上痱㿔如癩及荔枝殼狀熟則黃色自裂內有紅瓤裹子瓤味甘可食其子形扁如瓜子亦有痱㿔南人以青皮煮肉及鹽醬充蔬苦澀有青氣按費信星槎勝覽云蘇門答剌國一等瓜皮若荔枝未剖時甚臭如爛蒜剖開如囊味如酥香甜可口疑此即苦瓜也瓜氣味苦寒無毒主治除邪熱解勞乏清心明目時珍生生編子氣味苦甘無毒主治益氣壯陽時珍菜之四水菜類六種紫菜食療釋名紫䓴音軟集解詵曰紫菜生南海中附石正青色取而干之則紫色時珍曰閩越海邊悉有之大葉而薄彼人挼成餅狀曬乾貨之其色正紫亦石衣之屬也氣味甘寒無毒藏器曰多食令人腹痛發氣吐白沫飲熱醋少許即消主治熱氣煩塞咽喉煮汁飲之孟詵病癭瘤腳氣者宜食之時珍發明震亨曰凡癭結積塊之疾宜常食紫菜乃咸能軟堅之義石蓴拾遺校正自草部移入此集解藏器曰石蓴生南海附石而生似紫菜色青氣味甘平無毒主治下水利小便藏器主風祕不通五膈氣並臍下結氣煮汁飲之胡人用治疳疾李珣石花菜食鑑釋名瓊枝時珍曰並以形名也集解時珍曰石花菜生南海沙石間高二三寸狀如珊瑚有紅白二色枝上有細齒以沸湯泡去砂屑沃以薑醋食之甚脆其根埋沙中可再生枝也一種稍粗而似雞爪者謂之雞腳菜味更佳二物久浸皆化成膠凍也郭璞海賦所謂水物則玉珧海月土肉石華即此物也氣味甘咸大寒滑無毒主治去上焦浮熱發下部虛寒寧原鹿角菜食性釋名猴葵時珍曰按沈懷遠南越志云猴葵一名鹿角蓋鹿角以形名猴葵因其性滑也集解士良曰鹿角菜生海州登萊沂密諸處海中時珍曰鹿角菜生東南海中石崖間長三四寸大如鐵線分丫如鹿角狀紫黃色土人採曝貨為海錯以水洗醋拌則脹起如新味極滑美若久浸則化如膠狀女人用以梳髮黏而不亂氣味甘大寒滑無毒詵曰微毒丈夫不可久食發痼疾損腰腎經絡血氣令人腳冷痹少顏色主治下熱風氣療小兒骨蒸熱勞服丹石人食之能下石力士良解面熱大明龍鬚菜綱目集解時珍曰龍鬚菜生東南海邊石上叢生無枝葉狀如柳根鬚長者尺余白色以醋浸食之和肉蒸食亦佳博物志一種石發似指此物與石衣之石發同名也氣味甘寒無毒主治癭結熱氣利小便時珍睡菜綱目釋名瞑菜瞑音眠綽菜醉草懶婦針記事珠未詳集解時珍曰按稽含南方草木狀云綽菜夏生池沼間葉類慈菰根如藕條南海人食之令人思睡呼為瞑菜段公路北戶録云睡菜五六月生田塘中土人採根為鹽菹食之好睡郭憲洞冥記有卻睡草食之令人不睡與此相反也珍按苦菜龍葵皆能使人不睡卻睡之草其此類乎氣味甘微苦寒無毒主治心膈邪熱不得眠時珍菜之五芝栭類一十五種芝本經上品校正併入本經青赤黃白黑紫六芝釋名苬音囚時珍曰芝本作之篆文象草生地上之形後人借之字為語辭遂加草以別之也爾雅云苬芝也注云一歲三華瑞草或曰生於剛處曰菌生於柔處曰芝昔四皓採芝群仙服食則芝亦菌屬可食者故移入菜部集解別録曰青芝生泰山赤芝生霍山黃芝生嵩山白芝生華山黑芝生常山紫芝生高夏山谷六芝皆六月八月採弘景曰南嶽本是衡山漢武帝始以小霍山代之此赤芝當生衡山也郡縣無高夏名恐是山名也此六芝皆仙草之類俗所稀見族類甚多形色瓌異並載芝草圖中今俗所用紫芝乃是朽木株上所生狀如木𣚊名為紫芝止療痔不宜合諸補丸藥也凡得芝草便正爾食之無餘節度故皆不云服法也恭曰五芝經云皆以五色生於五嶽諸方所獻白芝未必華山黑芝又非常嶽且多黃白稀有黑青者然紫芝最多非五芝類但芝自難得縱獲一二豈得終久服耶禹錫曰王充論衡云芝生於土土氣和故芝草生瑞命記云王者仁慈則芝草生是也時珍曰芝類甚多亦有花實者本草惟以六芝標名然其種屬不可不識神農經云山川雲雨四時五行陰陽晝夜之精以生五色神芝為聖王休祥瑞應圖云芝草常以六月生春青夏紫秋白冬黑葛洪抱朴子云芝有石芝木芝草芝肉芝菌芝凡數百種也石芝石象生於海隅石山島嶼之涯肉芝狀如肉附於大石頭尾具有乃生物也赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金皆光明洞徹如堅冰也大者十餘斤小者三四斤凡求芝草入名山必以三月九月乃山開出神藥之月必以天輔時出三奇吉門到山須六陰之日明堂之時帶靈寶符牽白犬抱白雞包白鹽一斗及開山符檄著大石上執吳唐草一把入山山神喜必得見芝須禹步往採以王相專和支幹相生之日刻以骨刀陰乾為末服乃有功效若人不至精久齊行穢德薄又不曉入山之術雖得其圖鬼神不以與人終不可得見也曰菌芝生深山之中大木之下泉水之側其狀或如宮室如龍虎如車馬如飛鳥五色無常凡百二十種自有圖也曰木威喜芝乃松脂淪地千年化為茯苓萬歲其上生小木狀似蓮花夜視有光持之甚滑燒之不焦帶之闢兵服之神仙曰飛節芝三千歲老松上皮中有脂狀如龍形服之長生曰木渠芝寄生大木上狀如蓮花九莖一叢味甘而辛曰黃柏芝生於千歲黃柏根下有細根如縷服之地仙曰建木芝生於都廣其皮如纓蛇其實如鸞鳥曰參成芝赤色有光扣其枝葉如金石之音曰樊桃芝其木如升龍其花葉如丹蘿其實如翠鳥並可服食曰千歲芝生枯木下根如坐人刻之有血血塗二足可行水隱形又可治病以上皆木芝也曰獨搖芝無風自動其莖大如手指葉似莧根有大魁如斗周繞有細子十二枚繞之相去丈許生高山深谷服之神仙曰牛角芝生虎壽山及吳陵上狀似蔥而特出如牛角長三四尺青色曰龍仙芝似升龍相負之形曰紫珠芝莖黃葉赤實如李而紫色曰白符芝似梅大雪而花季冬而實曰朱草芝九曲三葉葉有實也其莖如針曰五德芝狀似樓殿五色各具方莖紫氣以上皆草芝也有百二十種人得服之神仙曰玉脂芝生於有玉之山狀似鳥獸色無常彩多似山水蒼玉亦如鮮明水晶曰七明九光芝生於臨水石崖之間狀如盤碗有莖蒂連綴之此芝有七孔者名七明九孔者名九光夜見其光食至七枚七孔洞徹一名螢火芝曰石蜜芝生少室石戶中石上終難得曰石桂芝生石穴中似桂樹乃石也光明味辛曰石腦芝石中黃皆石芝類也千歲燕千歲蝙蝠千歲龜萬歲蟾蜍山中見小人皆肉芝類也凡百二十種又按採芝圖云鳳凰芝生名山金玉間服食一年與鳳凰俱也曰燕胎芝形如葵紫色有燕象曰黑雲芝生山谷之陰黑蓋赤理黑莖味鹹苦又有五色龍芝五方芝天芝地芝人芝山芝土芝石芝金芝水芝火芝雷芝甘露芝青雲芝雲氣芝白虎芝車馬芝太一芝等名狀不一張華博物志云名山生神芝不死之草上芝為車馬中芝人形下芝六畜形又按段成式酉陽雜俎云屋柱無故生芝者白主喪赤主血黑主賊黃主喜形如人面者亡財如牛馬者遠役如龜蛇者蠶耗時珍嘗疑芝乃腐朽餘氣所生正如人生瘤贅而古今皆以為瑞草又云服食可仙誠為迂謬近讀成式之言始知先得我所欲言其揆一也又方士以木積濕處用藥敷之即生五色芝嘉靖中王金嘗生以獻世宗此昔人所未言者不可不知青芝一名龍芝本經氣味酸平無毒時珍曰五色之芝配以五行之味蓋亦據理而已未必其味便隨五色也即如五畜以羊屬火五果以杏配心皆云味苦之義之才曰青赤黃白黑紫六芝並以薯蕷為之使得發良得麻子仁白瓜子牡桂甚益人惡常山畏扁青茵陳蒿主治明目補肝氣安精魂仁恕久食輕身不老延年神仙本經不忘強志唐本赤芝一名丹芝本經氣味苦平無毒主治胸中結益心氣補中增智慧不忘久食輕身不老延年神仙本經黃芝一名金芝本經氣味甘平無毒主治心腹五邪益脾氣安神忠信和樂久食輕身不老延年神仙本經白芝一名玉芝素芝本經氣味辛平無毒主治咳逆上氣益肺氣通利口鼻強志意勇悍安魄久食輕身不老延年神仙本經黑芝一名玄芝本經氣味咸平無毒主治癃利水道益腎氣通九竅聰察久服輕身不老延年神仙本經紫芝一名木芝本經氣味甘溫無毒甄權曰平主治耳聾利關節保神益精氣堅筋骨好顏色久服輕身不老延年本經療虛勞治痔時珍附方新一紫芝丸治虛勞短氣胸脅苦傷手足逆冷或時煩躁口乾目視䀮䀮腹內時痛不思飲食此藥安神保精也紫芝一兩半山芋焙天雄炮去皮柏子仁炒巴戟天去心白茯苓去皮枳實去瓤麩炒各三錢五分生地黃焙麥門冬去心焙五味子炒半夏制炒附子炒去皮牡丹皮人參各七錢五分遠志去心蓼實各二錢五分瓜子仁炒澤瀉各五錢為末煉蜜丸梧子大每服十五丸漸至三十丸溫酒下日三服聖濟總録木耳本經中品校正自桑根白皮條分出釋名木𣚊而軟二音木菌窘卷二音木㙡音縱樹雞韓文木蛾時珍曰木耳生於朽木之上無枝葉乃濕熱餘氣所生曰耳曰蛾象形也曰𣚊以軟濕者佳也曰雞曰㙡因味似也南楚人謂雞為㙡曰菌猶蜠也亦象形也蜠乃貝子之名或曰地生為菌木生為蛾北人曰蛾南人曰菌集解別録曰五木耳生犍為山谷六月多雨時採即曝乾弘景曰此云五木耳而不顯言是何木惟老桑樹生桑耳有青黃赤白者軟濕者人採以作菹無復藥用恭曰桑槐楮榆柳此為五木耳軟者並堪啖楮耳人常食槐耳療痔煮漿粥安諸木上以草覆之即生菌爾時珍曰木耳各木皆生其良毒亦必隨木性不可不審然今貨者亦多雜木惟桑柳楮榆之耳為多雲氣味甘平有小毒權曰菌耳古槐桑樹上者良柘木者次之其餘樹上多動風氣發痼疾令人肋下急損經絡背膊悶人藏器曰木耳惡蛇蟲從下過者有毒楓木上生者令人笑不止採歸色變者有毒夜視有光者欲爛不生蟲者並有毒並生搗冬瓜蔓汁解之時珍曰按張仲景云木耳赤色及仰生者並不可食主治益氣不飢輕身強志本經斷谷治痔時珍發明穎曰一人患痔諸藥不效用木耳煮羹食之而愈極驗時珍曰按生生編云柳蛾補胃木耳衰精言老柳之蛾能補胃理氣木耳乃朽木所生得一陰之氣故有衰精冷腎之害也附方新六眼流冷淚木耳一兩燒存性木賊一兩為末每服二錢以清米泔煎服惠濟方血注腳瘡桑耳楮耳牛屎菰各五錢胎髮灰男用女女用男三錢研末油和塗之或干塗之奇效良方崩中漏下木耳半斤炒見煙為末每服二錢一分頭髮灰三分共二錢四分以應二十四氣好酒調服出汗孫氏集效方新久泄痢干木耳一兩炒鹿角膠二錢半炒為末每服三錢溫酒調下日二御藥院方血痢下血木耳炒研五錢酒服即可亦用井花水服或以水煮鹽醋食之以汁送下普濟方一切牙痛木耳荊芥等分煎湯頻漱普濟方桑耳釋名桑𣚊唐本桑蛾宋本桑雞綱目桑黃藥性桑臣藥性桑上寄生弘景曰斷谷方桑𣚊又呼為桑上寄生名同物異也時珍曰桑𣚊以下皆軟耳之名桑黃以下皆硬菰之名其功性則一也氣味甘平有毒詵曰寒無毒大明曰溫微毒權曰桑槐耳甘辛平無毒主治黑者主女人漏下赤白汁血病症瘕積聚陰痛陰陽寒熱無子本經療月水不調其黃熟陳白者止久泄益氣不飢其金色者治癖飲積聚腹痛金瘡別録治女子崩中帶下月閉血凝産後血凝男子痃癖甄權止血衄腸風瀉血婦人心腹痛大明利五臟宣腸胃氣排毒氣壓丹石人發熱和蔥豉作羹食孟詵附方舊三新十一少小鼻衄小勞輒出桑耳熬焦搗末每發時以杏仁大塞鼻中數度即可斷肘後方五痔下血桑耳作羹空心飽食三日一作待孔卒痛如鳥啄狀取大小豆各一升合搗作兩囊蒸之及熱更互坐之即瘥外臺脫肛瀉血不止用桑黃一兩熟附子一兩為末煉蜜丸梧子大每米飲下二十丸聖惠血淋疼痛桑黃槲白皮各二錢水煎服日一次聖惠方月水不斷肉色黃瘦血竭暫止數日復發小勞輒劇久疾失治者皆可服之桑黃焙研每服二錢食前熱酒下日二服普濟方崩中漏下桑耳炒黑為末酒服方寸匕日三服取效千金方赤白帶下桑耳切碎酒煎服蘇頌圖經遺尿且澀桑耳為末每酒下方寸匕日三服聖濟總録留飲宿食桑耳二兩巴豆一兩去皮五升米下蒸過和棗膏搗丸麻子大每服一二丸取利止範汪方心下急痛桑耳燒存性熱酒服二錢集簡方瘰癧潰爛桑黃菰五錢水紅豆一兩百草霜三錢青苔二錢片腦一分為末雞子白調敷以車前艾葉桑皮煎湯洗之纂要奇方咽喉痹痛五月五日收桑上木耳白如魚鱗者臨時搗碎綿包彈子大蜜湯浸含之立效便民方面上黑斑桑耳焙研每食後熱湯服一錢一月愈摘玄方足趾肉刺先以湯浸刮去一層用黑木耳貼之自消爛不痛近效方槐耳釋名槐𣚊唐本槐菌唐本槐雞蜀本赤雞綱目槐蛾恭曰此槐樹上菌也當取堅如桑耳者權曰煮漿粥安槐木上草覆之即生菌耳氣味苦辛平無毒主治五痔脫肛下血心痛婦人陰中瘡痛蘇恭治風破血益力甄權附方舊三新三腸痔下血槐樹上木耳為末飲服方寸匕日三服肘後方崩中下血不問年月遠近用槐耳燒存性為末每服方寸匕溫酒下産寶方産後血疼欲死者槐雞半兩為末酒濃煎飲服立愈婦人良方蛔蟲心痛槐木耳燒存性為末水服棗許若不止飲熱水一升蛔蟲立出張文仲備急方月水不斷勞損黃瘦暫止復發小勞輒劇者槐蛾炒黃赤石脂各一兩為末食前熱酒服二錢桑黃亦可聖惠方臟毒下血槐耳燒二兩乾漆燒一兩為末每服一錢溫酒下聖濟總録榆耳八月採之主治令人不飢時珍附方新一服食方淮南萬畢術云八月榆𣚊以美酒漬曝同青粱米紫莧實蒸熟為末每服三指撮酒下令人辟穀不飢柳耳主治補胃理氣時珍附方新一反胃吐痰柳樹菌五七個煎湯服即愈活人心統柘耳釋名柘黃主治肺癰咳唾膿血腥臭不問膿成未成用一兩研末同百齒霜二錢糊丸梧子大米飲下三十丸效甚捷時珍楊櫨耳藏器曰出南山氣味平無毒主治老血結塊破血止血煮服之藏器杉菌宋圖經集解頌曰杉菌出宜州生積年杉木上狀若菌採無時氣味甘辛微溫無毒主治心脾氣疼及暴心痛蘇頌皂莢菌綱目集解時珍曰生皂莢樹上木耳也不可食採得焙乾備用氣味辛有毒主治積垢作痛泡湯飲之微泄效未已再服又治腫毒初起磨醋塗之良時珍附方新一腸風瀉血皂角樹上菌瓦焙為末每服一錢溫酒下許學士本事方香菌日用釋名時珍曰菌從覃覃延也菌味雋永有覃延之意集解瑞曰菌生桐柳枳椇木上紫色者名香菌白色者名肉菌皆因濕氣熏蒸而成生山僻處者有毒殺人穎曰香菌生深山爛楓木上小於菌而薄黃黑色味甚香美最為佳品時珍曰菌品不一宋人陳仁玉著菌譜甚詳今録其略於此云芝菌皆氣茁也自商山茹芝而五臺天花亦甲群匯仙居介乎天台括蒼之間叢山入天仙靈所宮爰産異菌林居岩棲者左右芼之乃藜莧之至腴近或以羞王公登玉食矣一曰合菌又名臺菌生臺之韋羌山寒極雪收春氣欲動土松芽活此菌候也其質外褐色肌理玉潔芳香韻味一發釜鬲聞於百步山人曝乾以售香味減於生者他山雖産其柄高而香劣不及矣二曰稠膏菌生孟溪諸山秋中雨零露浸釀山膏木腴發為菌花生絶頂樹杪初如蕊珠圓瑩類輕酥滴乳淺黃白色味尤甘已乃張傘大若掌味頓渝矣春時亦生而膏液少食之之法下鼎似沸漉起參和衆味而特全於酒切勿攪動則涎腥不可食矣亦可蒸熟致遠三曰松菌生松陰採無時凡物松出無不可愛者四曰麥菌生溪邊沙壤中味殊美絶類蘑菰五曰玉菌初寒時生潔皙可愛作羹微韌俗名寒蒲菌六曰黃菌叢生山中黃色俗名黃纘菌又名黃㹠七曰紫菌赭紫色産山中為下品八曰四季菌生林木中味甘而肌理粗峭九曰鵝膏菌生高山中狀類鵝子久而傘開味殊甘滑不減稠膏然與杜菌相亂不可不慎杜菌土菌也氣味甘平無毒主治益氣不飢治風破血吳瑞松菌治溲濁不禁食之有效菌譜葛花菜綱目釋名葛乳時珍曰諸名山皆有之惟太和山採取云乃葛之精華也秋霜浮空如芝菌湧生地上其色赤脆蓋菌類也氣味苦甘無毒主治醒神治酒積時珍太和山志天花菌日用釋名天花菜集解瑞曰天花菜出山西五臺山形如松花而大香氣如菌白色食之甚美時珍曰五臺多蛇菌感其氣而生故味美而無益其價頗珍段成式酉陽雜俎云代北有樹雞如杯棬俗呼胡孫眼其此類歟氣味甘平無毒時珍曰按正要云有毒主治益氣殺蟲吳瑞蘑菰菌綱目釋名肉菌集解時珍曰蘑菰出山東淮北諸處埋桑楮諸木於土中澆以米泔待菰生採之長二三寸本小末大白色柔軟其中空虛狀如未開玉簪花俗名雞腿蘑菰謂其味如雞也一種狀如羊肚有蜂窠眼者名羊肚菜氣味甘寒無毒正要曰有毒動氣發病不可多食主治益腸胃化痰理氣時珍出生生編雞㙡綱目釋名雞菌時珍曰南人謂為雞㙡皆言其味似之也集解時珍曰雞㙡出雲南生沙地間丁菌也高腳傘頭土人採烘寄遠以充方物點茶烹肉皆宜氣味皆似香菌而不及其風韻也又廣西橫州出雷菌遇雷過即生須疾採之稍遲則腐或老故名作羹甚美亦如雞㙡之屬此數種其價並珍氣味甘平無毒主治益胃清神治痔時珍舵菜綱目集解時珍曰此即海舶舵上所生菌也亦不多得氣味咸甘寒無毒主治癭結氣痰飲時珍土菌拾遺校正自草部移入此釋名杜菌菌譜地菌拾遺菰子食物地雞爾雅獐頭藏器曰地生者為菌木生者為𣚊江東人呼為菌爾雅云中馗菌也孫炎注云地菌子也或云地雞亦云獐頭郭璞注云地菌似釘蓋江東名為土菌可啖凡菌從地中出者皆主瘡疥牛糞上黑菌尤佳若燒灰地上經秋雨生菌重臺者名仙人帽大主血病時珍曰中馗神名又槌名也此菌釘上若傘其狀如槌及中馗之帽故以名之氣味甘寒有毒詵曰菌子有數般槐樹上者良野田中者有毒殺人又多發冷氣令人腹中微微痛發五臟風擁經脈動痔病令人昏昏多睡背膊四肢無力藏器曰菌冬春無毒夏秋有毒有蛇蟲從下過也夜中有光者欲爛無蟲者煮之不熟者煮訖照人無影者上有毛下無紋者仰卷赤色者並有毒殺人中其毒者地漿及糞汁解之穎曰凡煮菌投以姜屑飯粒若色黑者殺人否則無毒時珍曰按菌譜云杜菌生土中與山中鵝膏菌相亂俗言毒蠚之氣所成食之殺人甚美有惡食肉不食馬肝未為不知味也凡中其毒者必笑不止解之以苦茗白礬酌新水並咽之無不立愈又按楊士瀛直指方云廣南人殺毒蛇覆之以草以水灑之數日菌生採干為末入酒毒人遇再飲酒毒發立死又陳氏拾遺云南夷以胡蔓草毒人至死懸尸於樹汁滴地上生菌子收之名菌藥毒人至烈此皆不可不知故並記之馬勃亦菌類見草部主治燒灰敷瘡疥藏器附方新一疔腫黑牯牛撒糞石上待生菌子焙乾豨蘞草等分為末以竹筒去兩頭緊縛合住疔上用水和末一錢入筒內少頃沸起則根拔出未出再作二三次醫學正傳附録鬼蓋別録有名未用曰味甘平無毒主小兒寒熱癇叢生垣牆下赤色旦生暮死一名地蓋弘景曰一名朝生即今鬼傘也藏器曰一名鬼屋生陰濕處如菌其蓋黑而莖赤和醋敷腫毒惡瘡馬脊腫杜正倫曰鬼傘有小毒夏日得雨聚生糞堆見日即消黑時珍曰此亦土菌之類朝生夕死者燒灰治疔腫以針刺破四邊納灰入內經宿出根地芩別録曰味苦無毒主小兒癇除邪養胎風痹洗洗寒熱目中青翳女子帶下生腐木積草處天雨生蓋如朝生黃白色四月採之時珍曰此即鬼蓋之色黃白者其功亦相近鬼筆拾遺藏器曰鬼筆生糞穢處頭如筆紫色朝生暮死名朝生暮落花小兒呼為狗溺苔主治瘡疽䘌疥癰瘻並曬乾研末和油塗之凡菌從地出者皆主瘡疥牛糞上黑菌尤佳時珍曰此亦鬼蓋之類而無傘者紅紫松虛如花之狀故得花名研末敷下疳瘡竹蓐食療校正併入拾遺竹肉釋名竹肉拾遺竹菰綱目竹菌時珍曰草更生曰蓐得溽濕之氣而成也陳藏器本草作竹肉因其味也集解詵曰慈竹林夏月逢雨滴汁著地生蓐似鹿角白色可食藏器曰竹肉生苦竹枝上如雞子似肉臠有大毒以灰汁煮三度煉訖然後依常菜茹食之煉不熟者戟人喉出血手爪盡脫應別有功人未盡識之時珍曰此即竹菰也生朽竹根節上狀如木耳紅色段成式酉陽雜俎云江淮有竹肉大如彈丸味如白樹雞即此物也惟苦竹生者有毒耳氣味甘咸寒無毒藏器曰苦竹肉有大毒主治一切赤白痢和薑醬食之孟詵苦竹肉灰汁煉過食殺三蟲毒邪氣破老血藏器雚菌音桓郡本經下品校正自草部移入此釋名雚蘆本經時珍曰雚當作萑乃蘆葦之屬此菌生於其下故名也若雚音觀乃鳥名與萑蘆無關集解別録曰雚菌生東海池澤及渤海章武八月採陰乾弘景曰出北來此亦無有形狀似菌云鸛屎所化生一名鸛菌單末之豬肉臛和食可以遣蛔蟲恭曰雚菌今出渤海蘆葦澤中鹼鹵地自然有此菌爾非鸛屎所化生也其菌色白輕虛表裡相似與衆菌不同療蛔有效保升曰今出滄州秋雨以時即有天旱久霖即稀曬乾者良氣味咸平有小毒別録曰甘微溫權曰苦得酒良畏雞子主治心痛溫中去長蟲白癬蟯蟲蛇螫毒癥瘕諸蟲本經疽蝸去蛔蟲寸白惡瘡別録除腹內冷痛治白禿甄權附方舊一蛔蟲攻心如刺吐清汁者萑菌一兩杵末羊肉臛和食之日一頓大效外臺祕要附録蜀格別録曰味苦平無毒主寒熱痿痹女子帶下癰腫生山陽如萑菌而有刺地耳別録校正自有名未用移入此釋名地踏菰綱目集解別録曰地耳生丘陵如碧石青也時珍曰地耳亦石耳之屬生於地者也狀如木耳春夏生雨中雨後即早採之見日即不堪俗名地踏菰是也氣味甘寒無毒主治明目益氣令人有子別録石耳日用釋名靈芝靈苑方集解瑞曰石耳生天台四明河南宣州黃山巴西邊徼諸山石崖上遠望如煙時珍曰廬山亦多狀如地耳山僧採曝饋遠洗去沙土作茹勝於木耳佳品也氣味甘平無毒穎曰冷段成式曰熱主治久食益色至老不改令人不飢大小便少吳瑞明目益精時珍附方新一瀉血脫肛石耳五兩炒白枯礬一兩密陀僧半兩為末蒸餅丸梧子大每米飲下二十丸普濟方互考諸菜香薷紫蘇紫菀鏨菜牛膝苗防風苗薄荷荏蘇馬蘭蔞蒿澤蘭根地黃苗諸葵蔛菜酸模菖蒲牛蒡苗青葙苗龍葵決明甘藍蘿藦紅花苗車前苗萱草蘆筍茭筍蘋海苔菜獨帚苗羊蹄蒲筍蓴菜莕齊頭蒿昆布苗昆布地菘蓼芽海藻王瓜百部藕絲蘘荷蒻頭芡莖菱莖豆藿豆芽豆莢豆腐罌粟苗椿芽槐芽蕪荑枸杞皂莢苗榆芽槿芽棕筍五加
