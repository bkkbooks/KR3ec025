body:
  text: 果部第二十九卷李時珍曰木實曰果草實曰蓏熟則可食干則可脯豐儉可以濟時疾苦可以備藥輔助粒食以養民生故素問云五果為助五果者以五味五色應五臟李杏桃慄棗是矣古書欲知五穀之收否但看五果之盛衰李主小豆杏主大麥桃主小麥慄主稻棗主禾禮記內則列果品菱椇榛瓜之類周官職方氏辨五地之物山林宜皂物柞慄之屬川澤宜膏物菱芡之屬丘陵宜核物梅李之屬甸師掌野果蓏場人樹果蓏珍異之物以時藏之觀此則果蓏之土產常異性味良毒豈可縱嗜欲而不知物理乎於是集草木之實號為果蓏者為果部凡一百二十七種分為六類曰五果曰山曰夷曰味曰蓏曰水舊本果部三品共五十三種今移一種入菜部四種入草部自木部移入並附三十一種草部移入四種菜部移入一種外類移入四種神農本草經十二種梁陶弘景注名醫別錄十六種同上唐本草十一種唐蘇恭本草拾遺二十種唐陳藏器海藥本草一種唐李珣食性本草一種唐陳士良食療本草一種唐孟詵開寶本草十九種宋馬志嘉祐本草二種宋掌禹錫圖經本草五種宋蘇頌日華本草二種宋人大明食物本草一種明汪穎日用本草二種元吳瑞本草會編一種明汪機本草綱目三十三種明李時珍附註魏吳普本草李當之本草宋雷斅炮炙論齊徐之才藥對唐甄權藥性孫思邈千金唐蕭炳四聲楊損之刪繁蜀韓保升重注宋寇宗奭衍義唐慎微證類金張元素珍珠囊元李杲法象王好古湯液朱震亨補遺明寧原食鑑周定王救荒陳嘉謨蒙筌果之一五果類一十一種李別錄下品釋名嘉慶子時珍曰按羅願爾雅翼云李乃木之多子者故字從木子竊謂木之多子者多矣何獨李稱木子耶按素問言李味酸屬肝東方之果也則李於五果屬木故得專稱爾今人呼干李為嘉慶子按韋述兩京記云東都嘉慶坊有美李人稱為嘉慶子久之稱謂既熟不復知其所自矣梵書名李曰居陵迦集解弘景曰李類甚多京口有麥李麥秀時熟小而肥甜核不入藥姑熟有南居李解核如杏子形者入藥為佳志曰李有綠李黃李紫李牛李水李並甘美堪食核不中用有野李味苦核仁入藥頌曰李處處有之郭璞注爾雅休乃無實李也一名趙李痤音磋乃接慮李也一名麥李細熟有溝道與麥同熟駁乃赤李也陶氏所謂南居李今不復識醫家但用核若杏核者宗奭曰李樹大者高丈許一種御李子大如櫻桃紅黃色先諸李熟醫家用者亦少時珍曰李綠葉白花樹能耐久其種近百其子大者如杯如卵小者如彈如櫻其味有甘酸苦澀數種其色有青綠紫朱黃赤縹綺胭脂青皮紫灰之殊其形有牛心馬肝柰李杏李水李離核合核無核匾縫之異其產有武陵房陵諸李早則麥李御李四月熟遲則晚李冬李十月十一月熟又有季春李冬花春實也按王禎農書云北方一種御黃李形大而肉厚核小甘香而美江南建寧一種均亭李紫而肥大味甘如蜜有擘李熟則自裂有糕李肥黏如糕皆李之嘉美者也今人用鹽曝糖藏蜜煎為果惟曝乾白李有益其法夏李色黃時摘之以鹽挼去汁合鹽曬萎去核復曬乾薦酒作飣皆佳實氣味苦酸微溫無毒時珍曰李味甘酸其苦澀者不可食不沉水者有毒不可食大明曰多食令人臚脹發虛熱詵曰臨水食之令發痰瘧不可合雀肉食合蜜食損五臟宗奭曰不可合漿水食發霍亂澀氣而然服術人忌之主治暴食去痼熱調中別錄去骨節間勞熱孟詵肝病宜食之思邈核仁氣味苦平無毒主治僵仆踒折瘀血骨痛別錄令人好顏色吳普治女子少腹腫滿利小腸下水氣除浮腫甄權治面䵟黑子蘇頌附方舊一新一女人面䵟用李核仁去皮細研以雞子白和如稀餳塗之至旦以漿水洗去後塗胡粉不過五六日效忌見風崔元亮海上方蠍蠆螫痛苦李仁嚼塗之良古今錄驗根白皮修治時珍曰李根皮取東行者刮去皺皮炙黃入藥用別錄不言用何等李根亦不言其味但藥性論云入藥用苦李根皮味鹹而張仲景治奔豚氣奔豚湯中用甘李根白皮則甘苦二種皆可用歟氣味大寒無毒大明曰涼無毒主治消渴止心煩逆奔豚氣別錄治瘡吳普煎水含漱治齒痛弘景煎汁飲主赤白痢大明炙黃煎湯日再飲之治女人卒赤白下有驗孟詵治小兒暴熱解丹毒時珍苦李根皮味鹹治腳下氣主熱毒煩躁煮汁服止消渴甄權附方新二小兒丹毒從兩股走及陰頭用李根燒為末以田中流水和塗之千金咽喉卒塞無藥處以皂角末吹鼻取嚏仍以李樹近根皮磨水塗喉外良驗菽園雜記花氣味苦香無毒主治令人面澤去粉滓䵟𪒟時珍附方新一面黑粉滓用李花梨花櫻桃花白蜀葵花白蓮花紅蓮花旋覆花秦椒各六兩桃花木瓜花丁香沉香青木香鍾乳粉各三兩珍珠玉屑各二兩蜀水花一兩大豆末七合為細末瓶收每日盥靧用洗手面百日光潔如玉也普濟方葉氣味甘酸平無毒主治小兒壯熱痁疾驚癇煎湯浴之良大明附方新一惡刺瘡痛李葉棗葉搗汁點之效千金樹膠氣味苦寒無毒主治目翳定痛消腫時珍附錄徐李別錄有名未用曰生太山之陰樹如李而小其實青色無核熟則採食之輕身益氣延年時珍曰此即無核李也唐崔奉國家有之乃異種也謬言龍耳血墮地所生杏別錄下品釋名甜梅時珍曰杏字篆文象子在木枝之形或云從口及從可者並非也江南錄云楊行密改杏名甜梅集解別錄曰杏生晉山川穀五月採之頌曰今處處有之有數種黃而圓者名金杏相傳種出自濟南郡之分流山彼人謂之漢帝杏言漢武帝上苑之種也今近汴洛皆種之熟最早其扁而青黃者名木杏味酢不及之山杏不堪入藥杏仁今以從東來人家種者為勝宗奭曰金杏深赭色核大而扁乃接成者其味最勝又有白杏熟時色青白或微黃味甘淡而不酢生杏可曬脯作乾果食之山杏輩只可收仁用耳時珍曰諸杏葉皆圓而有尖二月開紅花亦有千葉者不結實甘而有沙者為沙杏黃而帶酢者為梅杏青而帶黃者為柰杏其金杏大如梨黃如橘西京雜記載蓬萊杏花五色蓋異種也按王禎農書云北方肉杏甚佳赤大而扁謂之金剛拳凡杏熟時榨濃汁塗盤中曬乾以手摩刮收之可和水調麨食亦五果為助之義也實氣味酸熱有小毒生食多傷筋骨別錄頌曰杏之類梅者味酢類桃者味甘宗奭曰凡杏性皆熱小兒多食致瘡癰膈熱扁鵲曰多食動宿疾令人目盲鬚眉落源曰多食生痰熱昏精神產婦尤忌之主治曝脯食止渴去冷熱毒心之果心病宜食之思邈核仁修治別錄曰五月採之弘景曰凡用杏仁以湯浸去皮尖炒黃或用面麩炒過斅曰凡用以湯浸去皮尖每斤入白火石一斤烏豆三合以東流水同煮從巳至午取出曬乾用時珍曰治風寒肺病藥中亦有連皮尖用者取其發散也氣味甘苦溫冷利有小毒兩仁者殺人可以毒狗震亨曰杏仁性熱因寒者可用思邈曰杏仁作湯如白沫不解者食之令氣壅身熱湯經宿者動冷氣時珍曰凡杏桃諸花皆五出若六出必雙仁為其反常故有毒也徐之才曰得火良惡黃芩黃耆葛根畏蘘草主治咳逆上氣雷鳴喉痹下氣產乳金瘡寒心奔豚本經驚癇心下煩熱風氣往來時行頭痛解肌消心下急滿痛殺狗毒別錄解錫毒之才治腹痹不通發汗主溫病腳氣咳嗽上氣喘促入天門冬煎潤心肺和酪作湯潤聲氣甄權除肺熱治上焦風燥利胸膈氣逆潤大腸氣秘元素殺蟲治諸瘡疥消腫去頭面諸風氣疱時珍發明元素曰杏仁氣薄味厚濁而沉墜降也陰也入手太陰經其用有三潤肺也消食積也散滯氣也杲曰杏仁散結潤燥除肺中風熱咳嗽杏仁下喘治氣也桃仁療狂治血也俱治大便秘當分氣血晝則便難行陽氣也夜則便難行陰血也故虛人便閉不可過泄脈浮者屬氣用杏仁陳皮脈沉者屬血用桃仁陳皮手陽明與手太陰為表裡賁門主往來魄門主收閉為氣之通道故並用陳皮佐之好古曰張仲景麻黃湯及王朝奉治傷寒氣上喘逆並用杏仁者為其利氣瀉肺解肌也時珍曰杏仁能散能降故解肌散風降氣潤燥消積治傷損藥中用之治瘡殺蟲用其毒也按醫余云凡索麵豆粉近杏仁則爛頃一兵官食粉成積醫師以積氣丸杏仁相半研為丸熟水下數服愈又野人閒話云翰林學士辛士遜在青城山道院中夢皇姑謂曰可服杏仁令汝聰明老而健壯心力不倦求其方則用杏仁一味每盥漱畢以七枚納口中良久脫去皮細嚼和津液頓咽日日食之一年必換血令人輕健此申天師方也又楊士瀛直指方云凡人以水浸杏仁五枚五更端坐逐粒細嚼至盡和津吞下久則能潤五臟去塵滓驅風明目治肝腎風虛瞳人帶青眼翳風癢之病珍按杏仁性熱降氣亦非久服之藥此特其咀嚼吞納津液以消積穢則可耳古有服杏丹法云是左慈之方唐慎微收入本草云久服壽至千萬其說妄誕可鄙今刪其紕謬之辭存之於下使讀者毋信其誑也附方舊三十七新二十二杏金丹左慈秘訣云亦名草金丹方出渾皇子服之長年不死夏姬服之壽年七百乃仙去也世人不信皆由不肯精心修治故也其法須人罕到處寅月钁斸杏樹地下通陽氣二月除樹下草三月離樹五步作畦壟以通水亢旱則引泉灌溉有霜雪則燒火樹下以救花苞至五月杏熟自落收仁六斗以湯浸去皮及雙仁者用南流水三石和研取汁兩石八斗去滓以新鐵釜用酥三斤以糠火及炭然釜少少磨酥至盡乃內汁入釜釜上安盆盆上鑽孔用弦懸車轄至釜底以紙塞孔勿令泄氣初著糠火一日三動車轄以袞其汁五日有露液生十日白霜起又二日白霜盡即金花出丹乃成也開盆炙乾以翎掃下棗肉和丸梧子大每服三丸空心暖酒下至七日宿疾皆除喑盲攣跛疝痔癭癇瘡腫萬病皆愈久服通靈不死云云衍文不錄頌曰古方用杏仁修治如法自朝蒸至午便以慢火微烘至七日乃收之每旦空腹啖之久久不止駐顏延年云是夏姬之法然杏仁能使人血溢少誤必出血不已或至委頓故近人少有服者或云服至二三年往往或瀉或臍中出物皆不可治也杏酥法頌曰去風虛除百病搗爛杏仁一石以好酒二石研濾取汁一石五斗入白蜜一斗五升攪勻封於新甕中勿泄氣三十日看酒上酥出即掠取納瓷器中貯之取其酒滓團如梨大置空屋中作格安之候成飴脯狀旦服一枚以前酒下藏器曰杏酪服之潤五臟去痰嗽生熟吃俱可若半生半熟服之殺人又法宗奭曰治肺燥喘熱大腸秘潤五臟用杏仁去皮研細每一升入水一升半搗稠汁入生蜜四兩甘草一寸銀石器中慢火熬成稀膏入酥二兩同收每夜沸湯點服一匙衍義萬病丸治男婦五勞七傷一切諸疾杏仁一斗二升童子小便煮七次以蜜四兩拌勻再以童便五升於碗內重蒸取出日曬夜露數日任意嚼食即愈補肺丸治咳嗽用杏仁二大升山中者不用去雙仁者以童子小便二斗浸之春夏七日秋冬二七日連皮尖於砂盆中研濾取汁煮令魚眼沸候軟如麵糊即成以粗布攤曝之可丸即丸服之食前後總須服三五十丸茶酒任下忌白水粥劉禹錫傳信方咳嗽寒熱旦夕加重少喜多嗔面色不潤忽進忽退積漸少食脈弦緊者杏仁半斤去皮尖童子小便二斗浸七日漉出溫水淘洗砂盆內研如泥以小便三升煎如膏每服一錢熟水下婦人室女服之尤妙千金方久患肺氣喘急至咳甚者不過二劑永瘥杏仁去皮尖二兩童子小便浸一日一換夏月三四換滿半月取出焙乾研細每服一棗大薄荷一葉蜜一雞頭大水一鍾煎七分食後溫服忌腥物勝金方咳逆上氣不拘大人小兒以杏仁三升去皮尖炒黃研膏入蜜一升杵熟每食前含之咽汁千金上氣喘急杏仁桃仁各半兩去皮尖炒研用水調生面和丸梧子大每服十丸薑蜜湯下微利為度聖濟總錄喘促浮腫小便淋瀝用杏仁一兩去皮尖熬研和米煮粥空心吃二合妙心鏡頭面風腫杏仁搗膏雞子黃和杵塗帛上厚裹之干則又塗不過七八次愈也千金方風虛頭痛欲破者杏仁去皮尖曬乾研末水九升研濾汁煎如麻腐狀取和羹粥食七日後大汗出諸風漸減此法神妙可深秘之慎風冷豬雞魚蒜醋千金方頭面諸風眼瞤鼻塞眼出冷淚用杏仁三升研細水煮四五沸洗頭待冷汗盡三度愈千金偏風不遂失音不語生吞杏仁七枚不去皮尖逐日加至七七枚周而復始食後仍飲竹瀝以瘥為度外臺秘要破傷風腫杏仁杵膏厚塗上然燭遙炙之千金方金瘡中風角弓反張用杏仁杵碎蒸令氣溜絞脂服一小升兼摩瘡上良必效方溫病食勞杏仁五兩酢二升煎取一升服之取汗瘥類要心腹結氣杏仁桂枝橘皮訶黎勒皮等分為丸每服三十丸白湯下無忌孟詵食療喉痹痰嗽杏仁去皮熬黃三分和桂末一分研泥裹含之咽汁陳藏器本草喉熱生瘡方同上卒失音聲方同上文潞公藥准肺病咯血杏仁四十個以黃蠟炒黃研入青黛一錢作餅用柿餅一個破開包藥濕紙裹煨熟食之取效丹溪方卒不小便杏仁二七枚去皮尖炒黃研末米飲服之古今錄驗方血崩不止諸藥不效服此立止用甜杏仁上黃皮燒存性為末每服三錢空心熱酒服保壽堂方五痔下血杏仁去皮尖及雙仁者水三升研濾汁煎減半同米煮粥食之食醫心鏡穀道䘌痛腫癢杏仁杵膏頻頻敷之肘後方陰瘡爛痛杏仁燒黑研成膏時時敷之鈐方產門蟲疽痛癢不可忍用杏仁去皮燒存性杵爛綿裹納入陰中取效孟詵食療本草身面疣目杏仁燒黑研膏擦破日日塗之千金方面上皯皰杏仁去皮搗和雞子白夜塗之旦以暖酒洗去孟詵食療兩頰赤癢其狀如痱名頭面風以杏仁頻頻揩之內服消風散證治要訣耳卒聾閉杏仁七枚去皮拍碎分作三分以綿裹之著鹽如小豆許以器盛於飯上蒸熟令病人側臥以一裹捻油滴耳中良久又以一裹滴之取效外臺耳出膿汁杏仁炒黑搗膏綿裹納入日三四易之妙梅師方鼻中生瘡杏仁研末乳汁和敷千金方疳瘡蝕鼻杏仁燒壓取油敷之千金方牙齒蟲䘌杏仁燒存性研膏發裹納蟲孔中殺蟲去風其痛便止重者不過再上本草拾遺牙齦癢痛杏仁一百枚去皮尖兩仁以鹽方寸匕水一升煮令汁出含漱吐之三度愈千金方風蟲牙痛杏仁針刺於燈上燒煙乘熱搭病牙上又復燒搭七次絕不疼病牙逐時斷落也普濟方目中赤脈癢痛時見黑花用初生杏子仁一升古五銖錢七文入瓶內密封埋門限下一百日化為水每夕點之聖濟總錄胎赤眼疾杏仁壓油半雞子殼食鹽一錢入石器中以柳枝一握緊束研至色黑以熟艾一團安碗內燒烘之令氣透火盡即成每點少許入兩眥甚效聖濟總錄目中翳遮但瞳子不破者用杏仁三升去皮麵裹作三包煻火煨熟去面研爛壓去油每用一錢入銅綠一錢研勻點之同上目生胬肉或癢或痛漸覆瞳人用杏仁去皮二錢半膩粉半錢研勻綿裹箸頭點之同上傷目生胬廣利方用生杏仁七枚去皮細嚼吐於掌中乘熱以綿裹箸頭點胬肉上不過四五度愈總錄用杏仁研膏人乳化開日點三次小兒血眼兒初生艱難血瘀眥睚遂濺滲其睛不見瞳人輕則外胞赤腫上下弦爛用杏仁二枚去皮尖嚼乳汁三五匙入膩粉少許蒸熟絹包頻點重者加黃連朴硝最良全幼心鑑小兒臍爛成風杏仁去皮研敷子母秘錄小兒咽腫杏仁炒黑研爛含咽普濟方針入肉內不出者雙杏仁搗爛以車脂調貼其針自出瑞竹堂方箭鏑在咽或刀刃在咽膈諸隱處杵杏仁敷之肘後方狐尿瘡痛杏仁研爛煮一兩沸及熱浸之冷即易必效方狗咬傷瘡爛嚼杏仁塗之寇氏食狗不消心下堅脹口乾發熱妄語杏仁一升去皮尖水三升煎沸去渣取汁分三服下肉為度梅師方解狼毒毒杏仁搗爛水和服之千金方一切食停氣滿膨脹用紅杏仁三百粒巴豆二十粒同炒色變去豆不用研杏為末橘皮湯調下楊氏家藏方白癜風斑杏仁連皮尖每早嚼二七粒揩令赤色夜臥再用聖濟總錄諸瘡腫痛杏仁去皮研濾取膏入輕粉麻油調搽神效不拘大人小兒鮑氏小兒頭瘡杏仁燒研敷之事林廣記蛆蟲入耳杏仁搗泥取油滴入非出則死扶壽精方花氣味苦溫無毒主治補不足女子傷中寒熱痹厥逆別錄附方新二婦人無子二月丁亥日取杏花桃花陰乾為末戊子日和井華水服方寸匕日三服衛生易簡方粉滓面䵟杏花桃花各一升東流水浸七日洗面三七遍極妙聖濟總錄葉主治人卒腫滿身面洪大煮濃汁熱漬亦少少服之肘後枝主治墮傷取一握水一升煮減半入酒三合和勻分再服大效蘇頌附方舊一墜撲瘀血在內煩悶者用東引杏樹枝三兩細銼微熬好酒二升煎十餘沸分二服塞上方根主治食杏仁多致迷亂將死切碎煎湯服即解時珍巴旦杏綱目釋名八擔杏正要忽鹿麻集解時珍曰巴旦杏出回回舊地今關西諸土亦有樹如杏而葉差小實亦尖小而肉薄其核如梅核殼薄而仁甘美點茶食之味如榛子西人以充方物氣味甘平溫無毒主治止咳下氣消心腹逆悶時珍出飲膳正要梅本經中品釋名時珍曰梅古文作呆象子在木上之形梅乃杏類故反杏為呆書家訛為甘木後作梅從每諧聲也或云梅者媒也媒合眾味故書云若作和羹爾惟鹽梅而梅字亦從某也陸佃埤雅言梅入北方變為杏郭璞注爾雅以柟為梅皆誤矣柟即柟木荊人呼為梅見陸璣草木疏集解別錄曰梅實生漢中山谷五月採實火干頌曰今襄漢川蜀江湖淮嶺皆有之時珍曰按陸璣詩疏云梅杏類也樹葉皆略似杏葉有長尖先眾木而花其實酢曝乾為脯入羹臛齏中又含之可以香口子赤者材堅子白者材脆范成大梅譜云江梅野生者不經栽接花小而香子小而硬消梅實圓鬆脆多液無滓惟可生啖不入煎造綠萼梅枝跗皆綠重葉梅花葉重疊結實多雙紅梅花色如杏杏梅色淡紅實扁而斑味全似杏鴛鴦梅即多葉紅梅也一蒂雙實一云苦楝接梅則花帶黑色譚子化書云李接桃而本強者其實毛梅接杏而本強者其實甘梅實採半黃者以煙燻之為烏梅青者鹽醃曝乾為白梅亦可蜜煎糖藏以充果飣熟者笮汁曬收為梅醬惟烏梅白梅可入藥梅醬夏月可調渴水飲之實氣味酸平無毒大明曰多食損齒傷筋蝕脾胃令人發膈上痰熱服黃精人忌食之食梅齒齼者嚼胡桃肉解之物類相感志云梅子同韶粉食則不酸不軟牙發明宗奭曰食梅則津液泄者水生木也津液泄則傷腎腎屬水外為齒故也時珍曰梅花開於冬而實熟於夏得木之全氣故其味最酸所謂曲直作酸也肝為乙木膽為甲木人之舌下有四竅兩竅通膽液故食梅則津生者類相感應也故素問云味過於酸肝氣以津又云酸走筋筋病無多食酸不然物之味酸者多矣何獨梅能生津耶烏梅修治弘景曰用須去核微炒之時珍曰造法取青梅籃盛於突上燻黑若以稻灰淋汁潤濕蒸過則肥澤不蠹氣味酸溫平澀無毒杲曰寒忌豬肉主治下氣除熱煩滿安心止肢體痛偏枯不仁死肌去青黑痣蝕惡肉本經去痹利筋脈止下痢好唾口乾別錄水漬汁飲治傷寒煩熱弘景止渴調中去痰治瘧瘴止吐逆霍亂除冷熱痢藏器治虛勞骨蒸消酒毒令人得睡和建茶乾薑為丸服止休息痢大驗大明斂肺澀腸止久嗽瀉痢反胃噎膈蛔厥吐利消腫湧痰殺蟲解魚毒馬汗毒硫黃毒時珍白梅釋名鹽梅霜梅修治取大青梅以鹽汁漬之日曬夜漬十日成矣久乃上霜氣味酸咸平無毒主治和藥點痣蝕惡肉弘景刺在肉中者嚼敷之即出孟詵治刀箭傷止血研爛敷之大明乳癰腫毒杵爛貼之佳汪穎除痰蘇頌治中風驚癇喉痹痰厥僵仆牙關緊閉者取梅肉揩擦牙齦涎出即開又治瀉痢煩渴霍亂吐下下血血崩功同烏梅時珍發明弘景曰生梅烏梅白梅功應相似好古曰烏梅脾肺二經血分藥也能收肺氣治燥嗽肺欲收急食酸以收之時珍曰烏梅白梅所主諸病皆取其酸收之義惟張仲景治蛔厥烏梅丸及蟲䘌方中用者取蟲得酸即止之義稍有不同耳醫說載曾魯公痢血百餘日國醫不能療陳應之用鹽水梅肉一枚研爛合臘茶入醋服之一啜而安大丞梁莊肅公亦痢血應之用烏梅胡黃連灶下土等分為末茶調服亦效蓋血得酸則斂得寒則止得苦則澀故也其蝕惡瘡胬肉雖是酸收卻有物理之妙說出本經其法載於劉涓子鬼遺方用烏梅肉燒存性研敷惡肉上一夜立盡聖惠用烏梅和蜜作餅貼者其力緩按楊起簡便方云起臂生一疽膿潰百日方愈中有惡肉突起如蠶豆大月餘不消醫治不效因閱本草得此方試之一日夜去其大半再上一日而平乃知世有奇方如此遂留心搜刻諸方始基於此方也附方舊十一新二十二諸瘡胬肉方見上癰疽瘡腫已潰未潰皆可用鹽白梅燒存性為末入輕粉少許香油調塗四圍王氏易簡方喉痹乳蛾冰梅丸用青梅二十枚鹽十二兩醃五日取梅汁入明礬三兩桔梗白芷防風各二兩豬牙皂角三十條俱為細末拌汁和梅入瓶收之每用一枚噙咽津液凡中風痰厥牙關不開用此擦之尤佳總錄用白梅包生礬末作丸含咽或納吞之消渴煩悶烏梅肉二兩微炒為末每服二錢水二盞煎一盞去滓入豉二百粒煎至半盞溫服簡要濟眾方泄痢口渴烏梅煎湯日飲代茶扶壽精方產後痢渴烏梅肉二十個麥門冬十二分以水一升煮七合細呷之必效方赤痢腹痛直指用陳白梅同真茶蜜水各半煎飲之聖惠用烏梅肉炒黃連各四兩為末煉蜜丸梧子大每米飲服二十丸日三服便痢膿血烏梅一兩去核燒過為末每服二錢米飲下立止聖濟總錄久痢不止腸垢已出肘後用烏梅肉二十個水一盞煎六分食前分二服袖珍用烏梅肉白梅肉各七個搗爛入乳香末少許杵丸梧桐子大每服二三十丸茶湯下日三大便下血及酒痢久痢不止用烏梅三兩燒存性為末醋煮米糊和丸梧子大每空心米飲服二十丸日三濟生方小便尿血烏梅燒存性研末醋糊丸梧子大每服四十丸酒下血崩不止烏梅肉七枚燒存性研末米飲服之日二大便不通氣奔欲死者烏梅十顆湯浸去核丸棗大納入下部少時即通食療本草霍亂吐利鹽梅煎湯細細飲之如宜方蛔蟲上行出於口鼻烏梅煎湯頻飲並含之即安食鑑本草水氣滿急烏梅大棗各三枚水四升煮二升納蜜和勻含咽之聖濟總錄梅核膈氣取半青半黃梅子每個用鹽一兩醃一日夜曬乾又浸又曬至水盡乃止用青錢三個夾二梅麻線縛定通裝瓷罐內封埋地下百日取出每用一枚含之咽汁入喉即消收一年者治一人二年者治二人其妙絕倫龔氏經驗方心腹脹痛短氣欲絕者烏梅二七枚水五升煮一沸納大錢二七枚煮二升半頓服之肘後勞瘧劣弱烏梅十四枚豆豉二合桃柳枝各一虎口甘草三寸生薑一塊以童子小便二升煎一半溫服即止圖經本草久咳不已烏梅肉微炒罌粟殼去筋膜蜜炒等分為末每服二錢睡時蜜湯調下痰厥頭痛如破者烏梅肉三十個鹽三撮酒三升煮一升頓服取吐即愈肘後方傷寒頭痛壯熱胸中煩痛四五日不解烏梅十四枚鹽五合水一升煎半升溫服取吐吐後避風良梅師方折傷金瘡乾梅燒存性敷之一宿瘥千金方馬汗入瘡作痛用烏梅連核搗爛以頭醋和敷仍先刺瘡出去紫血乃敷之系定經驗方猘犬傷毒烏梅末酒服二錢千金指頭腫毒痛甚者烏梅肉和魚鮓搗封之妙李樓奇方傷寒䘌瘡生下部者烏梅肉三兩炒為末煉蜜丸梧子大以石榴根皮煎湯食前下三十丸聖惠方小兒頭瘡烏梅燒末生油調塗聖濟錄香口去臭曝乾梅脯常時含之毛詩疏硫黃毒發令人背膊疼悶目暗漠漠烏梅肉焙一兩沙糖半兩漿水一大盞煎七分呷之總錄核仁氣味酸平無毒主治明目益氣不飢吳普除煩熱甄權治代指忽然腫痛搗爛和醋浸之時珍肘後方花氣味微酸澀無毒發明時珍曰白梅花古方未見用者近時有梅花湯用半開花溶蠟封花口投蜜罐中過時以一兩朵同蜜一匙點沸湯服又有蜜漬梅花法用白梅肉少許浸雪水潤花露一宿蜜浸薦酒又梅花粥法用落英入熟米粥再煮食之故楊誠齋有蜜點梅花帶露餐及脫蕊收將熬粥吃之句皆取其助雅緻清神思而已葉氣味酸平無毒主治休息痢及霍亂煮濃汁飲之大明藏器曰嵩陽子言清水揉梅葉洗蕉葛衣經夏不脆有驗時珍曰夏衣生黴點梅葉煎湯洗之即去甚妙附方舊一新二中水毒病初起頭痛惡寒心煩拘急旦醒暮劇梅葉搗汁三升飲之良肘後下部蟲䘌梅葉桃葉一斛杵爛蒸極熱納小器中隔布坐蒸之蟲盡死也外臺秘要月水不止梅葉焙棕櫚皮灰各等分為末每服二錢酒調下聖濟總錄根主治風痹別錄出土者殺人初生小兒取根同桃李根煮湯浴之無瘡熱之患崔氏纂要煎湯飲治霍亂止休息痢大明樃梅綱目集解時珍曰樃梅出均州太和山相傳真武折梅枝插於樃樹誓曰吾道若成開花結果後果如其言今樹尚在五龍宮北樃木梅實杏形桃核道士每歲採而蜜漬以充貢獻焉樃乃榆樹也實氣味甘酸平無毒主治生津止渴清神下氣消酒時珍桃本經下品校正木部有拾遺桃橛今併入此釋名時珍曰桃性早花易植而子繁故字從木兆十億曰兆言其多也或云從兆諧聲也集解別錄曰桃生太山川穀弘景曰今處處有之核仁入藥當取解核者種之為佳山桃仁不堪用頌曰汴東陝西者尤大而美大抵佳果肥美者皆圃人以他木接成殊失本性入藥當用本生者為佳今市肆賣者多雜接核之仁為不堪也宗奭曰山中一種桃正合月令桃始華者花多子少不堪啖惟堪取仁入藥汴中有油桃小於眾桃光如塗油不益脾胃太原有金桃色深黃洛中有崑崙桃肉深紅紫色又有餅子桃狀如香餅子其味皆甘時珍曰桃品甚多易於栽種且早結實五年宜以刀劙其皮出其脂液則多延數年其花有紅紫白千葉二色之殊其實有紅桃緋桃碧桃緗桃白桃烏桃金桃銀桃胭脂桃皆以色名者也有綿桃油桃御桃方桃匾桃偏核桃皆以形名者也有五月早桃十月冬桃秋桃霜桃皆以時名者也並可供食惟山中毛桃即爾雅所謂榹桃者小而多毛核黏味惡其仁充滿多脂可入藥用蓋外不足者內有餘也冬桃一名西王母桃一名仙人桃即崑崙桃形如栝蔞表裡微赤得霜始熟方桃形微方匾桃出南番形匾肉澀核狀如盒其仁甘美番人珍之名波淡樹樹甚高大偏核桃出波斯形薄而尖頭偏狀如半月其仁酷似新羅松子可食性熱又楊維楨宋濂集中並載元朝御庫蟠桃核大如碗以為神異按王子年拾遺記載漢明帝時常山獻巨核桃霜下始花隆暑方熟玄中記載積石之桃大如斗斛器酉陽雜俎載九疑有桃核半扇可容米一升及蜀後主有桃核杯半扇容水五升良久如酒味可飲此皆桃之極大者昔人謂桃為仙果殆此類歟生桃切片瀹過曝乾為脯可充果食又桃酢法取爛熟桃納甕中蓋口七日漉去皮核密封二七日酢成香美可食種樹書云柿接桃則為金桃李接桃則為李桃梅接桃則脆桃樹生蟲煮豬頭汁澆之即止皆物性之微妙也實氣味辛酸甘熱微毒多食令人有熱詵曰能發丹石毒生者尤損人思邈曰黃帝書云食桃飽入水浴令人成淋及寒熱病時珍曰生桃多食令人膨脹及生癰癤有損無益五果列桃為下以此瑞曰桃與鱉同食患心痛服術人忌食之主治作脯食益顏色大明肺之果肺病宜食之思邈冬桃食之解勞熱時珍出爾雅注核仁修治別錄曰七月採取仁陰乾斅曰凡使須去皮用白朮烏豆二味同於坩鍋中煮二伏時漉出劈開心黃如金色乃用時珍曰桃仁行血宜連皮尖生用潤燥活血宜湯浸去皮尖炒黃用或麥麩同炒或燒存性各隨本方雙仁者有毒不可食說見杏仁下氣味苦甘平無毒思邈曰苦甘辛平詵曰溫弘景曰桃仁作酪性冷香附為之使主治瘀血血閉癥瘕邪氣殺小蟲本經止咳逆上氣消心下堅硬除卒暴擊血通月水止心腹痛別錄治血結血秘血燥通潤大便破畜血元素殺三蟲又每夜嚼一枚和蜜塗手面良孟詵主血滯風痹骨蒸肝瘧寒熱鬼注疼痛產後血病時珍發明杲曰桃仁苦重於甘氣薄味厚沉而降陰中之陽手足厥陰經血分藥也苦以泄滯血甘以生新血故破凝血者用之其功有四治熱入血室一也泄腹中滯血二也除皮膚血熱燥癢三也行皮膚凝聚之血四也成無己曰肝者血之源血聚則肝氣燥肝苦急急食甘以緩之桃仁之甘以緩肝散血故張仲景抵當湯用之以治傷寒八九日內有畜血發熱如狂小腹滿痛小便自利者又有當汗失汗熱毒深入吐血及血結胸煩躁譫語者亦以此湯主之與虻蟲水蛭大黃同用附方舊十九新十一延年去風令人光潤用桃仁五合去皮用粳米飯漿同研絞汁令盡溫溫洗面極妙千金翼偏風不遂及癖疾用桃仁二千七百枚去皮尖雙仁以好酒一斗三升浸二十一日取出曬乾杵細作丸如梧子大每服二十丸以原酒吞之外臺秘要風勞毒腫攣痛或牽引小腹及腰痛桃仁一升去皮尖熬令黑煙出熱研如脂膏以酒三升攪和服暖臥取汗不過三度瘥食醫心鏡瘧疾寒熱桃仁一百枚去皮尖乳缽內研成膏不得犯生水入黃丹三錢丸梧子大每服三丸當發日面北溫酒吞下五月五日午時合之忌雞犬婦人見唐慎微本草骨蒸作熱桃仁一百二十枚留尖去皮及雙仁杵為丸平旦井花水頓服之令儘量飲酒至醉仍須任意吃水隔日一劑百日不得食肉外臺秘要上氣喘急方見杏仁上氣咳嗽胸滿氣喘桃仁三兩去皮尖以水一大升研汁和粳米二合煮粥食之心鏡卒得咳嗽桃仁三升去皮杵著器中密封蒸熟曬乾絹袋盛浸二斗酒中七日可飲日飲四五合屍疰鬼疰乃五屍之一又挾鬼邪為祟其病變動有三十六種至九十九種大略使人寒熱淋瀝沉沉默默不知所苦而無處不惡累年積月以至於死死後復傳旁人急以桃仁五十枚研泥水煮取四升服之取吐吐不盡三四日再吐肘後方傳屍鬼氣咳嗽痃癖注氣血氣不通日漸消瘦桃仁一兩去皮尖杵碎水一升半煮汁入米作粥空心食之心鏡鬼疰心痛桃仁一合爛研煎湯服之備急方卒然心痛桃仁七枚去皮尖研爛水一合服之肘後方人好魘寐桃仁熬去皮尖三七枚以小便服之千金方下部蟲䘌病人齒齦無色舌上白喜睡憒憒不知痛癢處或下痢乃下部生蟲食肛也桃仁十五枚苦酒二升鹽一合煮六合服之肘後方崩中漏下不止者桃核燒存性研細酒服方寸匕日三千金婦人難產數日不出桃仁一個劈開一片書可字一片書出字還合吞之即生刪繁方產後百病千金桃仁煎治婦人產後百病諸氣取桃仁一千二百枚去皮尖雙仁熬搗極細以清酒一斗半研如麥粥法納小項瓷瓶中面封入湯中煮一伏時每服一匙溫酒和服日再圖經本草產後身熱如火皮如粟粒者桃仁研泥同臘豬脂敷之日日易之千金方產後血閉桃仁二十枚去皮尖藕一塊水煎服之良唐瑤經驗方產後陰腫桃仁燒研敷之婦人陰癢桃仁杵爛綿裹塞之肘後方男子陰腫作癢用桃仁炒香為末酒服方寸匕日二仍搗敷之外臺小兒卵㿗方同上小兒爛瘡初起腫漿似火瘡桃仁研爛敷之秘錄小兒聤耳桃仁炒研綿裹日日塞之千金方風蟲牙痛針刺桃仁燈上燒煙出吹滅安痛齒上咬之不過五六次愈衛生家寶方唇乾裂痛桃仁搗和豬脂敷海上大便不快裡急後重用桃仁三兩去皮吳茱萸二兩食鹽一兩同炒熟去鹽茱每嚼桃仁五七粒總錄急勞咳嗽煩熱用桃仁三兩去皮尖豬肝一枚童子小便五升同煮乾於木臼內搗爛入蒸餅和丸梧子大每溫水下三十丸聖惠方冷勞減食漸至黑瘦用桃仁五百顆吳茱萸三兩同入鐵鐺中微火炒一炊久將桃仁一顆去皮看似微黃色即漸加火待微煙出即乘熱收入新瓶內厚紙封住勿令泄氣每日空心取桃仁二十粒去皮嚼之以溫酒下至重者服五百粒愈聖惠方預闢瘴癘桃仁一斤吳茱萸青鹽各四兩同炒熟以新瓶密封一七取出揀去茱鹽將桃仁去皮尖每嚼一二十枚山居尤宜之余居士選奇方桃毛毛桃實上毛也刮取用之氣味辛平微毒主治破血閉下血瘕寒熱積聚無子帶下諸疾別錄療崩中破癖氣大明治惡鬼邪氣孟詵桃梟釋名桃奴別錄梟景同上神桃別錄曰此是桃實著樹經冬不落者正月採之中實者良時珍曰桃子干懸如梟首磔木之狀故名奴者言其不能成實也家寶方謂之神桃言其辟惡也千葉桃花結子在樹不落者名鬼髑髏雷斅炮炙論有修治之法而方書未見用者斅曰鬼髑髏十一月採得以酒拌蒸之從巳至未焙乾以銅刀切焙取肉用氣味苦微溫有小毒主治殺百鬼精物本經殺精魅五毒不祥療中惡腹痛別錄頌曰胡洽治中惡毒氣蠱疰有桃梟湯治肺氣腰痛破血療心痛酒磨暖服之大明主吐血諸藥不效燒存性研末米湯調服有驗汪穎治小兒虛汗婦人妊娠下血破伏梁結氣止邪瘧燒煙燻痔瘡燒黑油調敷小兒頭上肥瘡軟癤時珍附方舊三新五伏梁結氣在心下不散桃奴三兩為末空心溫酒每服二錢聖惠鬼瘧寒熱樹上自干桃子二七枚為末滴水丸梧子大硃砂為衣每服一丸侵晨面東井華水下食聖濟總錄五種瘧疾家寶通神丸用神桃即桃奴十四枚巴豆七粒黑豆一兩研勻以冷水和丸梧子大硃砂為衣發日五更念藥王菩薩七遍井華水下一丸立瘥不過二次妙不可言王隱君養生主論妊娠下血不止用桃梟燒存性研水服取瘥葛洪方盜汗不止樹上干桃子一個霜梅二個蔥根七個燈心二莖陳皮一錢稻根大麥芽各一撮水二鍾煎服經驗方白禿頭瘡干桃一兩黑豆一合為末臘豬脂調搽聖惠小兒頭瘡樹上干桃燒研入膩粉麻油調搽聖惠食桃成病桃梟燒灰二錢水服取吐即愈陸光祿說有人食桃不消化作病時於林間得槁桃燒服登時吐出即愈此以類相攻也張文仲備急方花修治別錄曰三月三日採陰乾之斅曰桃花勿用千葉者令人鼻衄不止目黃收花揀淨以絹袋盛懸檐下令乾用氣味苦平無毒主治殺疰惡鬼令人好顏色本經悅澤人面除水氣破石淋利大小便下三蟲別錄消腫滿下惡氣蘇恭治心腹痛及禿瘡孟詵利宿水痰飲積滯治風狂研末敷頭上肥瘡手足瘑瘡時珍發明弘景曰肘後方言服三樹桃花盡則面色紅潤悅澤如桃花也頌曰太清草木方言酒漬桃花飲之除百疾益顏色時珍曰按歐陽詢初學記載北齊崔氏以桃花白雪與兒靧面云令面妍華光悅蓋得本草令人好顏色悅澤人面之義而陶蘇二氏乃引服桃花法則因本草之言而謬用者也桃花性走泄下降利大腸甚快用以治氣實人病水飲腫滿積滯大小便閉塞者則有功無害若久服即耗人陰血損元氣豈能悅澤顏色耶按張從正儒門事親載一婦滑瀉數年百治不效或言此傷飲有積也桃花落時以棘針刺取數十萼勿犯人手以面和作餅煨熟食之米飲送下不一二時瀉下如傾六七日行至數百行昏困惟飲涼水而平觀此則桃花之峻利可徵矣又蘇鶚杜陽編載範純佑女喪夫發狂閉之室中夜斷窗欞登桃樹上食桃花幾盡及旦家人接下自是遂愈也珍按此亦驚怒傷肝痰夾敗血遂致發狂偶得桃花利痰飲散滯血之功與張仲景治積熱發狂用承氣湯畜血發狂用桃仁承氣湯之意相同而陳藏器乃言桃花食之患淋何耶附方舊三新十三大便艱難桃花為末水服方寸匕即通千金產後秘塞大小便不通用桃花葵子滑石檳榔等分為末每空心蔥白湯服二錢即利集驗方心腹積痛三月三日採桃花曬乾杵末以水服二錢匕良孟詵食療本草瘧疾不已桃花為末酒服方寸匕良梅師方痰飲宿水桃花散收桃花陰乾為末溫酒服一合取利覺虛食少粥不似轉下藥也崔行功纂要方腳氣腫痛桃花一升陰乾為末每溫酒細呷之一宿即消外臺秘要腰脊作痛三月三日取桃花一斗一升井華水三斗曲六升米六斗炊熟如常釀酒每服一升日三服神良千金膿瘻不止桃花為末豬脂和敷之日二千金頭上禿瘡三月三日收未開桃花陰乾與桑椹赤者等分作末以豬脂和先取灰汁洗去痂即塗之食療頭上肥瘡一百五日寒食節收桃花為末食後以水半盞調服方寸匕日三甚良崔元亮海上方黃水面瘡方同上足上瘑瘡桃花食鹽等分杵勻醋和敷之肘後方雀卵面皰桃花冬瓜仁研末等分蜜調敷之聖惠干糞塞腸脹痛不通用毛桃花濕者一兩和麵三兩作餛飩煮熟空心食之日午腹鳴如雷當下惡物也聖惠方面上粉刺㿔子如米粉用桃花丹砂各三兩為末每服一錢空心井水下日三服十日知二十日小便當出黑汁面色瑩白也聖惠方令面光華三月三日收桃花七月七日收雞血和塗面上三二日後脫下則光華顏色也聖濟總錄葉頌曰採嫩者名桃心入藥尤勝氣味苦平無毒主治除屍蟲出瘡中小蟲別錄治惡氣小兒寒熱客忤大明療傷寒時氣風痹無汗治頭風通大小便止霍亂腹痛時珍發明頌曰桃葉蒸汗法張文仲備急方治天行病有支太醫桃葉湯熏法用水一石煮桃葉取七斗安床簀下厚被蓋臥床上乘熱熏之少時當雨汗汗遍去湯速粉之並灸大椎穴則愈又陳廩丘小品方有阮河南桃葉蒸法云連發汗汗不出者死可蒸之如中風法燒地令熱去火以少水灑之布干桃葉於上厚二三寸安席葉上臥之溫覆得大汗被中敷粉極燥便瘥也凡柏葉麥麩蠶砂皆可如此法用張苗言曾有人疲極汗出臥簟受冷但苦寒倦四日凡八發汗汗不出用此法而瘥也時珍曰按許叔微本事方云傷寒病醫者須顧表裡循次第昔範云為梁武帝屬官得時疫熱疾召徐文伯診之是時武帝有九錫之命期在旦夕云恐不預求速愈文伯曰此甚易政恐二年後不復起爾云曰朝聞道夕死可矣況二年乎文伯乃以火煅地布桃柏葉於上令云臥之少頃汗出粉之翌日遂愈後二年云果卒取汗先期尚能促壽況不顧表裡時日便欲速愈者乎夫桃葉發汗妙法也猶有此戒可不慎歟附方舊九新二風襲項強不得顧視穿地作坑煅赤以水灑之令冷鋪生桃葉於內臥席上以項著坑上蒸至汗出良久即瘥千金方小兒傷寒時氣用桃葉三兩水五升煮十沸取汁日五六遍淋之後燒雄鼠糞二枚服之妙傷寒類要二便不通桃葉杵汁半升服冬用桃皮孫真人方霍亂腹痛吐利桃葉三升切水五升煮一升三合分二服外臺除三尸蟲桃葉杵汁服一升外臺秘要腸痔出血桃葉一斛杵蒸之納小口器中坐有蟲自出肘後方女人陰瘡如蟲咬癢痛者生搗桃葉綿裹納之日三四易食療本草足上瘑瘡桃葉搗和苦酒敷之肘後方鼻內生瘡桃葉嫩心杵爛塞之無葉用枝簡便方身面癬瘡日午搗桃葉取汁搽之千金諸蟲入耳桃葉挼熟塞之或搗汁滴之或作枕枕一夕自出梅師方莖及白皮修治時珍曰樹皮根皮皆可用根皮尤良並取東行者刮去粗皮取白皮入藥氣味苦平無毒主治除邪鬼中惡腹痛去胃中熱別錄治疰忤心腹痛解蠱毒闢疫癘療黃疸身目如金殺諸瘡蟲時珍附方舊十五新五天行疫癘常以東行桃枝煎熬湯浴之佳類要黃疸如金晴明時清晨勿令雞犬婦人見取東引桃根細如箸若釵股者一握切細以水一大升煎一小升空腹頓服後三五日其黃離離如薄雲散開百日方平復也黃散後可時時飲清酒一杯則眼中易散否則散遲忌食熱面豬魚等物此是徐之才家秘方也類要肺熱喘急集驗治肺熱悶喘急客熱往來欲死不堪服藥者用桃皮芫花各一升以水四升煮取一升五合以故布納汁中取薄胸口溫四肢不盈數刻即止圖經喉痹塞痛桃皮煮汁三升服千金方心虛健忘聖惠令耳目聰明用戊子日取東引桃枝二七寸枕之又方五月五日日未出時取東引桃枝刻作三寸木人著衣領帶中佩之千金方卒得心痛東引桃枝一把切以酒一升煎半升頓服大效肘後方鬼疰心痛東引桃枝一握去粗皮切水二升煎半升頻服崔氏解中蠱毒用東引桃白皮烘乾大戟斑蝥去足翅熬三物等分為末以冷水服半方寸匕即出不出更服或因酒得以酒服因食得以食服必效方云此乃李饒州法也亦可以米泔丸服蘇頌圖經卒得惡瘡人不識者取桃皮作屑納之孫真人方卒患瘰癧不痛者取桃樹白皮貼瘡上灸二七壯良孫真人方熱病口瘡成䘌桃枝煎濃汁含之下部有瘡納入之類要下部䘌瘡桃白皮煮取濃汁如稀餳入熊膽少許以綿蘸藥納入下部瘡上梅師五痔作痛桃根水煎汁浸洗之當有蟲出小兒濕癬桃樹青皮為末和醋頻敷之子母秘錄狂狗咬傷桃白皮一握水三升煎一升服梅師方水腫尿短桃皮三斤去內外皮秫米一斗女曲一升以水二斗煮桃皮取汁一斗以一半漬曲一半漬秫飯如常釀成酒每服一合日三次以體中有熱為候小便多是病去忌生冷一切毒物聖濟總錄婦人經閉數年不通面色萎黃唇口青白腹內成塊肚上筋起腿脛或腫桃根煎主之用桃樹根牛蒡根馬鞭草根牛膝蓬蘽各一斤銼以水三斗煎一斗去滓更以慢火煎如餳狀收之每以熱酒調服一匙聖惠牙疼頰腫桃白皮柳白皮槐白皮等分煎酒熱漱冷則吐之聖惠方小兒白禿桃皮五兩煎汁入白麵沐之並服同上桃膠修治時珍曰桃茂盛時以刀割樹皮久則膠溢出採收以桑灰湯浸過曝乾用如服食當依本方修煉氣味苦平無毒主治煉服保中不飢忍風寒別錄下石淋破血治中惡疰忤蘇恭主惡鬼邪氣孟詵和血益氣治下痢止痛時珍發明頌曰本草言桃膠煉服保中不飢按仙方服膠法取膠二十斤絹袋盛於櫟木灰汁一石中煮三五沸取掛高處候乾再煮如此三度曝乾研篩蜜和丸梧子大每空腹酒服二十丸久服身輕不老時珍曰按抱朴子云桃膠以桑灰汁漬過服之除百病數月斷谷久則晦夜有光如月又列仙傳云高丘公服桃膠得仙古方以桃膠為仙藥而後人不復用之豈其功亦未必如是之殊耶附方舊二新三虛熱作渴桃膠如彈丸大含之佳外臺石淋作痛桃木膠如棗大夏以冷水三合冬以湯三合和服日三服當下石石盡即止古今錄驗血淋作痛桃膠炒木通石膏各一錢水一盞煎七分食後服楊氏家藏方產後下痢赤白裡急後重㽲痛用桃膠焙乾沉香蒲黃炒各等分為末每服二錢食前米飲下婦人良方痘黶發搐黑陷者用桃膠煎湯飲之或水熬成膏酒化服之大效總微論桃符主治中惡精魅邪氣水煮汁服之孟詵發明時珍曰典術云桃乃西方之木五木之精仙木也味辛氣惡故能厭伏邪氣制百鬼今人門上用桃符以此玉燭寶典云戶上著桃板辟邪取山海經神荼鬱壘居東海蟠桃樹下主領眾鬼之義許慎云羿死於桃棓棓仗也故鬼畏桃而今人用桃梗作杙橛以闢鬼也禮記云王吊則巫祝以桃茢前引以闢不祥茢者桃枝作帚也博物志云桃根為印可以召鬼甄異傳云鬼但畏東南枝爾據此諸說則本草桃之枝葉根核桃梟桃橛皆闢鬼祟產忤蓋有由來矣錢乙小兒方疏取積熱及結胸用巴豆硇汞之藥以桃符煎湯下亦是厭之之義也桃橛拾遺時珍曰橛音掘即杙也人多釘於地上以鎮家宅三載者良主治卒心腹痛鬼疰破血辟邪惡氣脹滿煮汁服之與桃符同功藏器附方新一風蟲牙痛門下桃橛燒取汁少少納孔中以蠟固之聖惠方桃寄生見木部桃蠹蟲移入虫部慄別錄上品釋名時珍曰慄說文作㮚從𠧪音條象花實下垂之狀也梵書名篤迦集解別錄曰慄生山陰九月採弘景曰今會稽諸暨慄形大皮厚不美剡及始豐慄皮薄而甜乃佳頌曰慄處處有之而兗州宣州者最勝木高二三丈葉極類櫟四月開花青黃色長條似胡桃花實有房蝟大者若拳中子三五小者若桃李中子惟一二將熟則罅拆子出慄類亦多按陸璣詩疏云慄五方皆有之周秦吳揚特饒惟濮陽及范陽慄甜美味長他方者不及也倭韓國諸島上慄大如雞子味短不美桂陽有莘慄叢生實大如杏仁皮子形色與慄無異但小耳又有奧慄皆與慄同子圓而細惟江湖有之或云即莘也莘音榛詩云樹之莘慄是矣保升曰板栗錐慄二樹皆大茅慄似板栗而細如橡子其樹雖小葉亦不殊但春生夏花秋實冬枯為異耳宗奭曰湖北一種旋慄頂圓末尖即榛慄象榛子形也慄欲干收莫如曝之欲生收莫如潤沙藏之至夏初尚如新也時珍曰慄但可種成不可移栽按事類合璧云慄木高二三丈苞生多刺如蝟毛每枝不下四五個苞有青黃赤三色中子或單或雙或三或四其殼生黃熟紫殼內有膜裹仁九月霜降乃熟其苞自裂而子墜者乃可久藏苞未裂者易腐也其花作條大如箸頭長四五寸可以點燈慄之大者為板栗中心扁子為慄楔稍小者為山慄山慄之圓而末尖者為錐慄圓小如橡子者為莘慄小如指頂者為茅慄即爾雅所謂栭慄也一名栵慄可炒食之劉恂嶺表錄異云廣中無慄惟勤州山中有石慄一年方熟圓如彈子皮厚而味如胡桃得非慄乃水果不宜於炎方耶實氣味咸溫無毒詵曰吳慄雖大味短不如北慄凡慄日中曝乾食即下氣補益不爾猶有木氣不補益也火煨去汗亦殺水氣生食則發氣蒸炒熟食則壅氣凡患風水人不宜食味鹹生水也恭曰慄作粉食勝於菱芡但以飼孩兒令齒不生宗奭曰小兒不可多食生則難化熟則滯氣膈食生蟲往往致病主治益氣厚腸胃補腎氣令人耐飢別錄生食治腰腳不遂思邈療筋骨斷碎腫痛瘀血生嚼塗之有效蘇恭慄楔音屑時珍曰一球三顆其中扁者慄楔也主治筋骨風痛士良活血尤效頌曰今衡山合活血丹用之每日生食七枚破冷痃癖又生嚼罯惡刺出箭頭敷瘰癧腫毒痛大明發明思邈曰慄腎之果也腎病宜食之弘景曰相傳有人患腰腳弱往慄樹下食數升便能起行此是補腎之義然應生啖若服餌則宜蒸曝之宗奭曰慄之補腎為其味鹹又滯其氣也時珍曰慄於五果屬水水潦之年則慄不熟類相應也有人內寒暴泄如注令食煨慄二三十枚頓愈腎主大便慄能通腎於此可驗經驗後方治腎虛腰腳無力以袋盛生慄懸干每旦吃十餘顆次吃豬腎粥助之久必強健蓋風乾之慄勝於日曝而火煨油炒勝於煮蒸仍須細嚼連液吞嚥則有益若頓食至飽反致傷脾矣按蘇子由詩云老去自添腰腳病山翁服慄舊傳方客來為說晨興晚三咽徐收白玉漿此得食慄之訣也王禎農書云史記載秦飢應侯請發五苑棗慄則本草慄厚腸胃補腎氣令人耐飢之說殆非虛語矣附方舊三新五小兒疳瘡生嚼栗子敷之外臺葦刺入肉方同上馬汗入肉成瘡者方同上勝金方馬咬成瘡獨顆栗子燒研敷之醫說熊虎爪傷嚼慄敷之肘後小兒口瘡大慄煮熟日日與食之甚效普濟衄血不止宣州大慄七枚刺破連皮燒存性出火毒入麝香少許研勻每服二錢溫水下聖濟總錄金刃斧傷用獨殼大慄研傅或倉卒嚼敷亦可集簡方慄荴音孚恭曰慄內薄皮也氣味甘平澀無毒主治搗散和蜜塗面令光急去皺紋蘇恭附方新二骨鯁在咽栗子內薄皮燒存性研末吹入咽中即下聖濟總錄用栗子肉上皮半兩為末鮎魚肝一個乳香二錢半同搗丸梧子大看鯁遠近以線系綿裹一丸水潤吞之提線釣出也慄殼慄之黑殼也氣味同荴主治反胃消渴煮汁飲之孟詵煮汁飲止瀉血大明附方新一鼻衄不止累醫不效慄殼燒存性研末粥飲服二錢聖惠方毛球慄外刺包也主治煮汁洗火丹毒腫蘇恭花主治瘰癧吳瑞樹皮主治煮汁洗沙蝨溪毒蘇恭療瘡毒蘇頌治丹毒五色無常剝皮有刺者煎水洗之孟詵出肘後方根主治偏腎氣酒煎服之汪穎天師慄綱目集解時珍曰按宋祁益州方物記云天師慄惟西蜀青城山中有之他處無有也云張天師學道於此所遺故名似慄而味美惟獨房若橡為異耳今武當山所賣娑羅子恐即此物也氣味甘溫無毒主治久食已風攣時珍出益州記棗本經上品釋名時珍曰按陸佃埤雅云大曰棗小曰棘棘酸棗也棗性高故重朿棘性低故並朿朿音次棗棘皆有刺針會意也集解別錄曰棗生河東平澤弘景曰世傳河東猗氏縣棗特異今青州出者形大而核細多膏甚甜郁州互市者亦好小不及耳江東臨沂金城棗形大而虛少脂好者亦可用之南棗大惡不堪啖頌曰近北州郡皆出棗惟青州之種特佳晉州絳州者雖大而不及青州肉厚也江南出者堅燥少脂今園圃種蒔者其種甚多美者有水菱棗御棗之類皆不堪入藥蓋肌肉輕虛故也南郡人煮而曝乾皮薄而皺味更甘於他棗謂之天蒸棗亦不入藥按郭璞注爾雅云壺棗大而銳壺猶瓠也邊腰棗也細腰今謂之轆轤棗櫅白棗也子白乃熟洗大棗也出河東猗氏縣大如雞卵遵羊棗也實小紫黑俗名羊矢棗樲酸棗也木小而實酢還味棯棗也其味短蹶泄苦棗也其味苦晰無實棗也宗奭曰大棗先青州次晉州皆可曬曝入藥益脾胃余者止可充食用耳青州人以棗去皮核焙乾為棗圈以為奇果有御棗甘美輕脆後眾棗熟而易生蟲今人所謂撲落酥者是也又有牙棗先眾棗熟亦甘美微酸而尖長二棗皆可啖不堪收曝時珍曰棗木赤心有刺四月生小葉尖觥光澤五月開小花白色微青南北皆有惟青晉所出者肥大甘美入藥為良其類甚繁爾雅所載之外郭義恭廣志有狗牙雞心牛頭羊矢獼猴細腰赤心三星駢白之名又有木棗氐棗桂棗夕棗灌棗墟棗蒸棗白棗丹棗棠棗及安邑信都諸棗谷城紫棗長二寸羊角棗長三寸密雲所出小棗脆潤核細味亦甘美皆可充果食不堪入藥入藥須用青州及晉地曬乾大棗為良按賈思勰齊民要術云凡棗全赤時日日撼而收曝則紅皺若半赤收者肉未充滿干即色黃而皮皺將赤收者味亦不佳食經作干棗法須治淨地鋪菰箔之類承棗日曬夜露擇去胖爛曝乾收之切而曬乾者為棗脯煮熟榨出者為棗膏亦曰棗瓤蒸熟者為膠棗加以糖蜜拌蒸則更甜以麻油葉同蒸則色更潤澤搗膠棗曬乾者為棗油其法取紅軟干棗入釜以水僅淹平煮沸漉出砂盆研細生布絞取汁塗盤上曬乾其形如油以手摩刮為末收之每以一匙投湯碗中酸甜味足即成美漿用和米麨最止飢渴益脾胃也盧諶祭法云春祀用棗油即此生棗氣味甘辛熱無毒多食令人寒熱凡羸瘦者不可食思邈曰多食令人熱渴膨脹動臟腑損脾元助濕熱大棗釋名干棗別錄美棗別錄良棗別錄曰八月採曝乾瑞曰此即曬乾大棗也味最良美故宜入藥今人亦有用膠棗之肥大者氣味甘平無毒思邈曰甘辛熱滑無毒杲曰溫大明曰有齒病疳病蟲䘌人不宜啖棗小兒尤不宜食又忌與蔥同食令人五臟不和與魚同食令人腰腹痛時珍曰今人蒸棗多用糖蜜拌過久食最損脾助濕熱也啖棗多令人齒黃生䘌故嵇康養生論云齒處晉而黃蝨處頭而黑主治心腹邪氣安中養脾氣平胃氣通九竅助十二經補少氣少津液身中不足大驚四肢重和百藥久服輕身延年本經宗奭曰煮取肉和脾胃藥甚佳補中益氣堅志強力除煩悶療心下懸除腸澼久服不飢神仙別錄潤心肺止嗽補五臟治虛損除腸胃癖氣和光粉燒治疳痢大明小兒患秋痢與蛀棗食之良孟詵殺烏頭附子天雄毒之才和陰陽調營衛生津液李杲發明弘景曰道家方藥以棗為佳餌其皮利肉補虛所以合湯皆擘之也杲曰大棗氣味俱厚陽也溫以補不足甘以緩陰血成無己曰邪在營衛者辛甘以解之故用薑棗以和營衛生髮脾胃升騰之氣張仲景治奔豚用大棗滋脾土以平腎氣也治水飲脅痛有十棗湯益土而勝水也震亨曰棗屬土而有火味甘性緩甘先入脾補脾者未嘗用甘故今人食甘多者脾必受病也時珍曰素問言棗為脾之果脾病宜食之謂治病和藥棗為脾經血分藥也若無故頻食則生蟲損齒貽害多矣按王好古云中滿者勿食甘甘令人滿故張仲景建中湯心下痞者減餳棗與甘草同例此得用棗之方矣又按許叔微本事方云一婦病臟燥悲泣不止祈禱備至予憶古方治此證用大棗湯遂治與服盡劑而愈古人識病治方妙絕如此又陳自明婦人良方云程虎卿內人妊娠四五個月遇晝則慘慼悲傷淚下數欠如有所憑醫巫兼治皆無益管伯周說先人曾語此治須大棗湯乃愈虎卿借方治藥一投而愈方見下條又摘玄方治此證用紅棗燒存性酒服三錢亦大棗湯變法也附方舊七新十二調和胃氣以干棗去核緩火逼燥為末量多少入少生薑末白湯點服調和胃氣甚良衍義反胃吐食大棗一枚去核用斑蝥一枚去頭翅入在內煨熟去蝥空心食之白湯下良小腸氣痛大棗一枚去核用斑蝥一枚去頭足翅入棗內紙包煨熟去蝥食棗以桂心蓽澄茄湯下直指傷寒熱病後口乾咽痛喜唾大棗二十枚烏梅十枚搗入蜜丸含如杏核大咽汁甚效千金方婦人臟燥悲傷欲哭象若神靈數欠者大棗湯主之大棗十枚小麥一升甘草二兩每服一兩水煎服之亦補脾氣金匱妊娠腹痛大紅棗十四枚燒焦為末以小便服之梅師大便燥塞大棗一枚去核入輕粉半錢縛定煨熟食之仍以棗湯送下直指咒棗治瘧執棗一枚咒曰吾有棗一枚一心歸大道優他或優降或劈火燒之念七遍吹棗上與病人食之即愈𡵺嶁神書煩悶不眠大棗十四枚蔥白七莖水三升煮一升頓服千金上氣咳嗽治傷中筋脈急上氣咳嗽者用棗二十枚去核以酥四兩微火煎入棗肉中泣盡酥取收之常含一枚微微咽之取瘥聖惠方肺疽吐血因啖辛辣熱物致傷者用紅棗連核燒存性百藥煎煅過等分為末每服二錢米飲下三因耳聾鼻塞不聞音聲香臭者取大棗十五枚去皮核蓖麻子三百枚去皮和搗綿裹塞耳鼻日一度三十餘日聞聲及香臭也先治耳後治鼻不可並塞孟詵食療久服香身用大棗肉和桂心白瓜仁松樹皮為丸久服之食療本草走馬牙疳新棗肉一枚同黃柏燒焦為末油和敷之若加砒少許更妙王氏博濟諸瘡久壞不愈者棗膏三升煎水頻洗取愈千金痔瘡疼痛大肥棗一枚剝去皮取水銀掌中以唾研令極熟敷棗瓤上納入下部良外臺下部蟲癢蒸大棗取膏以水銀和捻長三寸以綿裹夜納下部中明日蟲皆出也肘後卒急心疼海上方訣云一個烏梅二個棗七枚杏仁一處搗男酒女醋送下之不害心疼直到老食椒閉氣京棗食之即解也百一選方三歲陳棗核中仁氣味燔之苦平無毒主治腹痛邪氣別錄惡氣卒疰忤孟詵核燒研摻脛瘡良時珍發明時珍曰按劉根別傳云道士陳孜如癡人江夏袁仲陽敬事之孜曰今春當有疾可服棗核中仁二十七枚後果大病服之而愈又云常服棗仁百邪不復干也仲陽服之有效則棗果有治邪之說矣又道書云常含棗核治氣令口行津液咽之佳謝承後漢書亦云孟節能含棗核不食可至十年也此皆藉棗以生津受氣而咽之又能達黃宮以交離坎之義耳葉氣味甘溫微毒別錄曰散服使人瘦久則嘔吐主治覆麻黃能令出汗本經和葛粉揩熱痱瘡良別錄治小兒壯熱煎湯浴之大明附方新二小兒傷寒五日以後熱不退用棗葉半握麻黃半兩蔥白豆豉各一合童子小便二鍾煎一鍾分二服取汗總錄反胃嘔噦干棗葉一兩藿香半兩丁香二錢半每服二錢姜三片水一盞煎服聖惠方木心氣味甘澀溫有小毒主治中蠱腹痛面目青黃淋露骨立銼取一斛水淹三寸煮至二斗澄清煎五升旦服五合取吐即愈又煎紅水服之能通經脈時珍出小品方根主治小兒赤丹從腳趺起煎湯頻浴之時珍出千金附方舊一令發易長取東行棗根三尺橫安甑上蒸之兩頭汗出收取敷發即易長聖惠方皮主治同老桑樹皮並取北向者等分燒研每用一合井水煎澄取清洗目一月三洗昏者復明忌葷酒房事時珍仲思棗宋開寶釋名仙棗志曰北齊時有仙人仲思得此棗種之因以為名集解志曰仲思棗形如大棗長一二寸正紫色細紋小核味甘今亦少有時珍曰按杜寶大業拾遺記云隋時信都郡獻仲思棗長四寸圍五寸肉肥核小有味勝於青州棗亦名仙棗觀此則廣志之西王母棗谷城紫棗皆此類也氣味甘溫無毒主治補虛益氣潤五臟去痰嗽冷氣久服令人肥健好顏色神仙不飢開寶苦棗食性釋名蹶泄爾雅名義未詳集解士良曰苦棗處處有之色青而小味苦不堪人多不食實氣味苦大寒無毒主治傷寒熱伏在臟腑狂蕩煩滿大小便閉澀取肉煮研和蜜丸服士良
