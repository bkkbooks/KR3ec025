body:
  text: 果部第三十卷果之二山果類三十四種梨別録下品釋名快果果宗玉乳蜜父震亨曰梨者利也其性下行流利也弘景曰梨種殊多並皆冷利多食損人故俗人謂之快果不入藥用集解頌曰梨處處皆有而種類殊別醫方相承用乳梨鵝梨乳梨出宣城皮厚而肉實其味極長鵝梨河之南北州郡皆有之皮薄而漿多味差短其香則過之其餘水梨消梨紫糜梨赤梨青梨茅梨甘棠梨御兒梨之類甚多俱不入藥也一種桑梨惟堪蜜煮食之止口乾生食不益人冷中又有紫花梨療心熱唐武宗有此疾百藥不效青城山邢道人以此梨絞汁進之帝疾遂愈復求之不可得常山郡忽有一株因緘封以進帝多食之解煩燥殊效歲久木枯不復有種今人不得而用之矣時珍曰梨樹高二三丈尖葉光膩有細齒二月開白花如雪六出上巳無風則結實必佳故古語云上巳有風梨有蠹中秋無月蚌無胎賈思協言梨核每顆有十餘子種之惟一二子生梨余皆生杜此亦一異也杜即棠梨也梨品甚多必須棠梨桑樹接過者則結子早而佳梨有青黃紅紫四色乳梨即雪梨鵝梨即綿梨消梨即香水梨也俱為上品可以治病御兒梨即玉乳梨之訛或云御兒一作語兒地名也在蘇州嘉興縣見漢書注其他青皮早谷半斤沙糜諸梨皆粗澀不堪只可蒸煮及切烘為脯爾一種醋梨易水煮熟則甜美不損人也昔人言梨皆以常山真定山陽巨野梁國睢陽齊國臨淄巨鹿弘農京兆鄴都洛陽為稱蓋好梨多産於北土南方惟宣城者為勝故司馬遷史記云淮北滎南河濟之間千株梨其人與千戶侯等也又魏文帝詔云真定御梨大如拳甘如蜜脆如菱可以解煩釋悁辛氏三秦記云含消梨大如五升器墜地則破須以囊承取之漢武帝嘗種於上苑此又梨之奇品也物類相感志言梨與蘿蔔相間收藏或削梨蒂插於蘿蔔上藏之皆可經年不爛今北人每於樹上包裹過冬乃摘亦妙實氣味甘微酸寒無毒多食令人寒中萎困金瘡乳婦血虛者尤不可食志曰別本云梨甘寒多食成冷痢桑梨生食冷中不益人主治熱嗽止渴切片貼燙火傷止痛不爛蘇恭治客熱中風不語治傷寒熱發解丹石熱氣驚邪利大小便開寶除賊風止心煩氣喘熱狂作漿吐風痰大明猝喑風不語者生搗汁頻服胸中痞塞熱結者宜多食之孟詵潤肺涼心消痰降火解瘡毒酒毒時珍發明宗奭曰梨多食動脾少則不及病用梨者當斟酌之惟病酒煩渴人食之甚佳終不能卻疾慎微曰孫光憲北夢瑣言云有一朝士見奉御梁新診之曰風疾已深請速歸去復見鄜州馬醫趙鄂診之言與梁同但請多吃消梨咀齕不及絞汁而飲到家旬日唯吃消梨頓爽也時珍曰別録著梨只言其害不著其功陶隱居言梨不入藥蓋古人論病多主風寒用藥皆是桂附故不知梨有治風熱潤肺涼心消痰降火解毒之功也今人痰病火病十居六七梨之有益蓋不為少但不宜過食爾按類編云一士人狀若有疾厭厭無聊往謁楊吉老診之楊曰君熱症已極氣血消鑠此去三年當以疽死士人不樂而去聞茅山有道士醫術通神而不欲自鳴乃衣僕衣詣山拜之願執薪水之役道士留置弟子中久之以實白道士道士診之笑曰汝便下山但日日吃好梨一顆如生梨已盡則取乾者泡湯食滓飲汁疾自當平士人如其戒經一歲復見吉老見其顏貌腴澤脈息和平驚曰君必遇異人不然豈有痊理士人備告吉老吉老具衣冠望茅山設拜自咎其學之未至此與瑣言之説倣佛觀夫二條則梨之功豈小補哉然惟乳梨鵝梨消梨可食余梨則亦不能去病也附方舊八新四消渴飲水用香水梨或鵝梨或江南雪梨皆可取汁以蜜湯熬成瓶收無時以熱水或冷水調服愈乃止普濟方猝得咳嗽頌曰崔元亮海上方用好梨去核搗汁一碗入椒四十粒煎一沸去滓納黑餳一大兩消訖細細含咽立定詵曰用梨一顆刺五十孔每孔納椒一粒麵裹灰火煨熟停冷去椒食之又方去核納酥蜜麵裹燒熟冷食又方切片酥煎食之又方搗汁一升入酥蜜各一兩地黃汁一升煎成含咽凡治嗽須喘急定時冷食之若熱食反傷肺令嗽更劇不可救也若反可作羊肉湯餅飽食之便臥少時即佳痰喘氣急梨剜空納小黑豆令滿留蓋合住系定粳火煨熟搗作餅每日食之至效摘玄喑風失音生梨搗汁一盞飲之日再服食療本草小兒風熱昏懵躁悶不能食用消梨三枚切破以水二升煮取汁一升入粳米一合煮粥食之聖惠方赤目弩肉日夜痛者取好梨一顆搗絞汁以綿裹黃連片一錢浸汁仰臥點之圖經赤眼腫痛鵝梨一枚搗汁黃連末半兩膩粉一字和勻綿裹浸梨汁中日日點之聖惠反胃轉食藥物不下用大雪梨一個以丁香十五粒刺入梨內濕紙包四五重煨熟食之總録花主治去面黑粉滓時珍方見李花下葉主治霍亂吐利不止煮汁服作煎治風蘇恭治小兒寒疝蘇頌搗汁服解中菌毒吳瑞附方舊三新一小兒寒疝腹痛大汗出用梨葉濃煎七合分作數服飲之大良此徐玉經驗方也圖經本草中水毒病初起頭痛惡寒拘急心煩用梨葉一把搗爛以酒一盞攪飲篋中方蠼螋尿瘡出黃水用梨葉汁塗之干即易篋中方食梨過傷梨葉煎汁解之黃記木皮主治解傷寒時氣時珍附方新四傷寒溫疫已發未發用梨木皮大甘草各一兩黃秫谷一合為末鍋底煤一錢每服三錢白湯下日二服取愈此蔡醫博方也黎居士簡易方霍亂吐利梨枝煮汁飲聖惠氣積鬱冒人有氣從臍左右起上衝胸滿氣促鬱冒厥者用梨木灰伏出雞卵殼中白皮紫菀麻黃去節等分為末糊丸梧桐子大每服十丸酒下亦可為末服方寸匕或煮湯服總録結氣咳逆三十年者服之亦瘥方同上鹿梨圖經校正原附梨下今分出釋名鼠梨詩疏山梨毛詩楊檖爾雅羅時珍曰爾雅云檖羅也其木有紋如羅故名詩云隰有樹檖毛萇注云檖一名赤羅一名山梨一名樹梨今人謂之楊檖陸機詩疏云檖即鹿梨也一名鼠梨集解頌曰江寧府信州一種小梨名鹿梨葉如茶根如小拇指彼人取皮治瘡八月採之近處亦有但採實作干不知入藥也時珍曰山梨野梨也處處有之梨大如杏可食其木紋細密赤者紋急白者紋緩按陸機云鹿梨齊郡堯山魯國河內皆有人亦種之實似梨而酢亦有美脆者實氣味酸澀寒無毒主治煨食治痢蘇頌根皮氣味同實主治瘡疥煎汁洗之蘇頌附方新二一切瘡鹿梨散用鹿梨根蛇床子各半斤真剪草四兩硫黃三錢輕粉一錢為末麻油調敷之小兒塗於絹衣上著之七日不解自愈仁存方一切癬鹿梨根刮皮搗爛醋和麻布包擦之乾者為末以水和搗唐瑤經驗方棠梨綱目釋名甘棠時珍曰爾雅云杜甘棠也赤者杜白者棠或云牝曰杜牡曰棠或云澀者杜甘者棠杜者澀也棠者糖也三説俱通末説近是集解時珍曰棠梨野梨也處處山林有之樹似梨而小葉似蒼朮葉亦有團者三叉者葉邊皆有鋸齒色頗黲白二月開白花結實如小楝子大霜後可食其樹接梨甚嘉有甘酢赤白二種按陸機詩疏云白棠甘棠也子多酸美而滑赤棠子澀而酢木理亦赤可作弓材救荒本草云其葉味微苦嫩時炸熟水浸淘淨油鹽調食或蒸曬代茶其花亦可炸食或曬乾磨面作燒餅食以濟飢又楊慎丹鉛録言尹伯奇採楟花以濟飢注者言楟即山梨乃今棠梨也未知是否實氣味酸甘澀寒無毒主治燒食止滑痢時珍枝葉氣味同實主治霍亂吐瀉不止轉筋腹痛取一握同木瓜二兩煎汁細呷之時珍聖惠方附方新一反胃吐食棠梨葉油炒去刺為末每旦酒服一錢山居四要海紅綱目釋名海棠梨時珍曰按李德裕草木記云凡花木名海者皆從海外來如海棠之類是也又李白詩注云海紅乃花名出新羅國甚多則海棠之自海外有據矣集解時珍曰飲膳正要果類有海紅不知出處此即海棠梨之實也狀如木瓜而小二月開紅花實至八月乃熟鄭樵通志云海棠子名海紅即爾雅赤棠也沈立海棠記云棠有甘棠沙棠棠梨皆非海棠也海棠盛於蜀中其出江南者名南海棠大抵相類而花差小棠性多類梨其核生者長慢十數年乃花以枝接梨及木瓜者易茂其根色黃而盤徑其木堅而多節外白中赤其枝葉密而條暢其葉類杜大者縹緑色小者淺紫色二月開花五出初如胭脂點點然開則漸成纈暈落則有若素妝淡粉其蒂長寸余淡紫色或三萼五萼成叢其蕊如金粟中有紫須其實狀如梨大如櫻桃至秋可食味甘酸大抵海棠花以紫綿色者為正余皆棠梨耳海棠花不香惟蜀之嘉州者有香而木大有黃海棠花黃貼干海棠花小而鮮垂絲海棠花粉紅向下皆無子非真海棠也子氣味酸甘平無毒主治泄痢時珍出正要木瓜別録中品釋名楙音茂時珍曰按爾雅云楙木瓜郭璞注云木實如小瓜酢而可食則木瓜之名取此義也或云木瓜味酸得木之正氣故名亦通楙從林矛諧聲也集解弘景曰木瓜山陰蘭亭尤多彼人以為良果又有榠楂大而黃有楂子小而澀禮云楂梨鑽之古亦以楂為果今則不也保升曰其樹枝狀如奈花作房生子形似栝蔞火幹甚香楂子似梨而酢江外常為果食頌曰木瓜處處有之而宣城者為佳木狀如奈春末開花深紅色其實大者如瓜小者如拳上黃似著粉宣人種蒔尤謹遍滿山谷始實成則鏃紙花黏於上夜露日烘漸變紅花文如生本州以充土貢故有宣城花木瓜之稱榠楂酷類木瓜但看蒂間別有重蒂如乳者為木瓜無者為榠楂也斆曰真木瓜皮薄色赤黃香而甘酸不澀其向裡子頭尖一面方食之益人有和圓子色微黃蒂粗其子小圓味澀微咸能傷人氣有蔓子顆小味絶澀不堪用有土伏子味絶苦澀不堪子如大樣油麻餌之令人目澀目赤筋痛也宗奭曰西洛大木瓜其味和美至熟只青白色入藥絶有功勝宣州者味淡時珍曰木瓜可種可接可以枝壓其葉光而厚其實如小瓜而有鼻津潤味不木者為木瓜圓小於木瓜味木而酢澀者為木桃似木瓜而無鼻大於木桃味澀者為木李亦曰木梨即榠楂及和圓子也鼻乃花脫處非臍蒂也木瓜性脆可蜜漬之為果去子蒸爛搗泥入蜜與薑作煎冬月飲尤佳木桃木李性堅可蜜煎及作糕食之木瓜燒灰散池中可以毒魚説出淮南萬畢術又廣志云木瓜枝一尺有百二十節可為杖實修治斆曰凡使木瓜勿犯鐵器以銅刀削去硬皮並子切片曬乾以黃牛乳汁拌蒸從巳至未待如膏煎乃曬用也時珍曰今人但切片曬乾入藥爾按大明會典宣州歲貢烏爛蟲蛀木瓜入御藥局亦取其陳久無木氣如栗子去木氣之義爾氣味酸溫無毒思邈曰酸咸溫澀詵曰不可多食損齒及骨主治濕痹邪氣霍亂大吐下轉筋不止別録治腳氣衝心取嫩者一顆去子煎服佳強筋骨下冷氣止嘔逆心膈痰唾消食止水利後渴不止作飲服之藏器止吐瀉奔豚及水腫冷熱痢心腹痛大明調營衛助穀氣雷斆去濕和胃滋脾益肺治腹脹善噫心下煩痞好古發明杲曰木瓜入手足太陰血分氣脫能收氣滯能和弘景曰木瓜最療轉筋如轉筋時但呼其名及書上作木瓜字皆愈此理亦不可解俗人拄木瓜杖云利筋脛也宗奭曰木瓜得木之正酸能入肝故益筋與血病腰腎腳膝無力皆不可缺也人以鉛霜或胡粉塗之則失酢味且無渣蓋受金之制也時珍曰木瓜所主霍亂吐利轉筋腳氣皆脾胃病非肝病也肝雖主筋而轉筋則由濕熱寒濕之邪襲傷脾胃所致故筋轉必起於足腓腓及宗筋皆屬陽明木瓜治轉筋非益筋也理脾而伐肝也土病則金衰而木盛故用酸溫以收脾肺之耗散而借其走筋以平肝邪乃土中瀉木以助金也木平則土得令而金受蔭矣素問云酸走筋筋病無多食酸孟詵云多食木瓜損齒及骨皆伐肝之明驗而木瓜入手足太陰為脾肺藥非肝藥益可徵矣又針經云多食酸令人癃酸入於胃其氣澀以收上之兩焦不能出入流入胃中下去膀胱胞薄以軟得酸則縮卷約而不通故水道不利而癃澀也羅天益寶鑑云太保劉仲海日食蜜煎木瓜三五枚同伴數人皆病淋疾以問天益天益曰此食酸所致也但奪食則已陰之所生本在五味陰之所營傷在五味五味太過皆能傷人不獨酸也又陸佃埤雅云俗言梨百損一益楙百益一損故詩云投我以木瓜取其有益也附方舊二新十項強筋急不可轉側肝腎二臟受風也用宣州木瓜二個取蓋去瓤沒藥二兩乳香二錢半二味入木瓜內縛定飯上蒸三四次爛研成膏每用三錢入生地黃汁半盞無灰酒二盞暖化溫服許叔微云有人患此自午後發黃昏時定豫謂此必先從足起足少陰之筋自足至項筋者肝之合今日中至黃昏陽中之陰肺也自離至兌陰旺陽弱之時故靈寶畢法云離至乾腎氣絶而肝氣弱肝腎二臟受邪故發於此時豫授此及都梁丸服之而愈本事方腳氣腫急用木瓜切片囊盛踏之廣德顧安中患腳氣筋急腿腫因附舟以足閣一袋上漸覺不痛乃問舟子袋中何物曰宣州木瓜也及歸制木瓜袋用之頓愈名醫録腳筋攣痛用木瓜數枚以酒水各半煮爛搗膏乘熱貼於痛處以帛裹之冷即換日三五度食療本草臍下絞痛木瓜三片桑葉七片大棗三枚水三升煮半升頓服即愈食療小兒洞痢木瓜搗汁服之千金方霍亂轉筋木瓜一兩酒一升煎服不飲酒者煎湯服仍煎湯浸青布裹其足聖惠霍亂腹痛木瓜五錢桑葉三片棗肉一枚水煎服聖惠方四蒸木瓜丸治肝腎脾三經氣虛為風寒暑濕相搏流注經絡凡遇六氣更變七情不和必至發動或腫滿或頑痹憎寒壯熱嘔吐自汗霍亂吐利用宣州大木瓜四個切蓋剜空聽用一個入黃耆續斷末各半兩於內一個入蒼朮橘皮末各半兩於內一個入烏藥黃松節末各半兩於內黃松節即茯神中心木也一個入威靈仙苦葶藶末各半兩於內以原蓋簪定用酒浸透入甑內蒸熟曬三浸三蒸三曬搗末以榆皮末水和糊丸如梧桐子大每服五十丸溫酒鹽湯任下御藥院方腎臟虛冷氣攻腹脅脹滿疼痛用大木瓜三十枚去皮核剜空以甘菊花末青鹽末各一斤填滿置籠內蒸熟搗成膏入新艾茸二斤搜和丸如梧桐子大每米飲下三十丸日二聖濟總録發稿不澤木瓜浸油梳頭聖惠方反花痔瘡木瓜為末以鱔魚身上涎調貼之以紙護住醫林集要闢除壁蝨以木瓜切片鋪於席下臞仙神隱木瓜核主治霍亂煩躁氣急每嚼七粒溫水咽之時珍出聖惠枝葉皮根氣味並酸澀溫無毒主治煮汁飲並止霍亂吐下轉筋療腳氣別録枝作杖利筋脈根葉煮湯淋足脛可以已蹶木材作桶濯足甚益人蘇頌枝葉煮汁飲治熱痢時珍出千金花主治面黑粉滓方見李花楂子音渣食療校正原附木瓜下今分出釋名木桃埤雅和圓子時珍曰木瓜酸香而性脆木桃酢澀而多渣故謂之楂雷公炮炙論和圓子即此也集解藏器曰楂子生中都似榲桲而小江外常為果食北土無之頌曰處處有之孟州特多弘景曰禮云楂梨鑽之謂鑽去核也鄭玄不識以為梨之不臧者郭璞以為似梨而酢澀古以為果今不入例矣時珍曰楂子乃木瓜之酢澀者小於木瓜色微黃蒂核皆粗核中之子小圓也按王禎農書云楂似小梨西川唐鄧間多種之味劣於梨與木瓜而入蜜煮湯則香美過之莊子云楂梨橘柚皆可於口淮南子云樹楂梨橘食之則美嗅之則香皆指此也氣味酸澀平無毒詵曰多食傷氣損齒及筋主治斷痢弘景去噁心咽酸止酒痰黃水藏器煮汁飲治霍亂轉筋功與木瓜相近孟詵榠楂音冥渣宋圖經校正原附木瓜下今分出釋名蠻楂通志瘙楂拾遺木李詩經木梨埤雅時珍曰木李生於吳越故鄭樵通志謂之蠻楂云俗呼為木梨則榠楂蓋蠻楂之訛也集解頌曰榠楂木葉花實酷類木瓜但比木瓜大而黃色辨之惟看蒂間別有重蒂如乳者為木瓜無此則榠楂也可以進酒去痰道家生壓取汁和甘松玄參末作濕香云甚爽神也詵曰榠楂氣辛香置衣箱中殺蠹蟲時珍曰榠楂乃木瓜之大而黃色無重蒂者也楂子乃木瓜之短小而味酢澀者也榲桲則楂類之生於北土者也三物與木瓜皆是一類各種故其形狀功用不甚相遠但木瓜得木之正氣為可貴耳氣味酸平無毒主治解酒去痰弘景食之去噁心止心中酸水藏器煨食止痢浸油梳頭治發白發赤大明煮汁服治霍亂轉筋吳瑞榲桲音溫孛宋開寶釋名時珍曰榲桲性溫而氣馞故名馞音孛香氣也集解志曰榲桲生北土似楂子而小頌曰今關陝有之沙苑出者更佳其實大抵類楂但膚慢而多毛味尤甘其氣芬馥置衣笥中亦香藏器曰樹如林檎花白緑色宗奭曰食之須淨去浮毛不爾損人肺花白色亦香最多生蟲少有不蛀者時珍曰榲桲蓋榠楂之類生於北土者故其形狀功用皆相倣佛李珣南海藥録言關中謂林檎為榲桲按述徵記云林檎佳美榲桲微大而狀醜有毛其味香關輔乃有江南甚希觀此則林檎榲桲蓋相似而二物也李氏誤矣氣味酸甘微溫無毒士良曰發毒熱祕大小腸聚胸中痰壅澀血脈不宜多食瑞曰同車螯食發疝氣主治溫中下氣消食除心間酸水去臭闢衣魚開寶去胸膈積食止渴除煩將臥時啖一兩枚生熟皆宜蘇頌宗奭曰臥時啖此太多亦痞塞胃脘也主水瀉腸虛煩熱散酒氣並宜生食李珣木皮主治搗末敷瘡蘇頌山楂音渣唐本草校正唐本草木部赤爪木宋圖經外類棠梂子丹溪補遺山楂皆一物也今並於一但以山楂標題釋名赤爪子側巧切唐本鼠楂唐本猴楂危氏茅楂日用朹子音求檕梅音計並爾雅羊梂唐本棠梂子圖經山裡果食鑑時珍曰山楂味似楂子故亦名楂世俗皆作查字誤矣查音槎乃水中浮木與楂何關郭璞注爾雅云朹音求樹如梅其子大如指頭赤色似小奈可食此即山楂也世俗作梂字亦誤矣梂乃櫟實於朹何關楂朹之名見於爾雅自晉宋以來不知其原但用查梂耳此物生於山原茅林中猴鼠喜食之故又有諸名也唐本草赤爪木當作赤棗蓋棗爪音訛也楂狀似赤棗故爾范成大虞衡志有赤棗子王璆百一選方云山裡紅果俗名酸棗又名鼻涕團正合此義矣集解恭曰赤爪木赤楂也出山南申安隨諸州小樹高五六尺葉似香葇子似虎掌大如小林檎赤色藏器曰赤爪草即鼠楂梂也生高原梂似小楂而赤人食之頌曰棠梂子生滁州三月開白花隨便結實採無時彼人用治下痢及腰疼有效他處亦有不入藥用時珍曰赤爪棠梂山楂一物也古方罕用故唐本雖有赤爪後人不知即此也自丹溪朱氏始著山楂之功而後遂為要藥其類有二種皆生山中一種小者山人呼為棠朹子茅楂猴楂可入藥用樹高數尺葉有五尖丫間有刺三月開五出小白花實有赤黃二色肥者如小林檎小者如指頭九月乃熟小兒採而賣之閩人取熟者去皮核搗和糖蜜作為楂糕以充果物其核狀如牽牛子黑色甚堅一種大者山人呼為羊朹子樹高丈餘花葉皆同但實稍大而色黃緑皮澀肉虛為異爾初甚酸澀經霜乃可食功用相同而採藥者不收實修治時珍曰九月霜後取帶熟者去核曝乾或蒸熟去皮核搗作餅子日乾用氣味酸冷無毒時珍曰酸甘微溫生食多令人嘈煩易飢損齒齒齲人尤不宜也主治煮汁服止水痢沐頭洗身治瘡癢唐本煮汁洗漆瘡多瘥弘景治腰痛有效蘇頌消食積補脾治小腸疝氣發小兒瘡疹吳瑞健胃行結氣治婦人産後兒枕痛惡露不盡煎汁入沙糖服之立效震亨化飲食消肉積癥瘕痰飲痞滿吞酸滯血痛脹時珍化血塊氣塊活血寧原發明震亨曰山楂大能克化飲食若胃中無食積脾虛不能運化不思食者多服之則反克伐脾胃生髮之氣也時珍曰凡脾弱食物不克化胸腹酸刺脹悶者於每食後嚼二三枚絶佳但不可多用恐反克伐也按物類相感志言煮老雞硬肉入山楂數顆即易爛則其消肉積之功蓋可推矣珍鄰家一小兒因食積黃腫腹脹如鼓偶往羊朹樹下取食之至飽歸而大吐痰水其病遂愈羊朹乃山楂同類醫家不用而有此效則其功應相同矣附方新七偏墜疝氣山棠梂肉茴香炒各一兩為末糊丸梧桐子大每服一百丸空心白湯下衛生易簡方老人腰痛及腿痛用棠梂子鹿茸炙等分為末蜜丸梧桐子大每服百丸日二服腸風下血用寒藥熱藥及脾弱藥俱不效者獨用山裡果俗名酸棗又名鼻涕團乾者為末艾湯調下應手即愈百一選方痘疹不快干山楂為末湯點服之立出紅活又法猴楂五個酒煎入水溫服即出危氏得效方痘瘡乾黑危困者用棠梂子為末紫草煎酒調服一錢全幼心鑑食肉不消山楂肉四兩水煮食之並飲其汁簡便方核主治吞之化食磨積治㿗疝時珍附方新一難産山楂核七七粒百草霜為衣酒吞下海上方陰腎㿗腫方見橄欖赤爪木氣味苦寒無毒主治水痢頭風身癢唐本根主治消積治反胃時珍莖葉主治煮汁洗漆瘡時珍出肘後庵羅果宋開寶釋名庵摩羅迦果出佛書香蓋時珍曰庵羅梵音二合者也庵摩羅梵音三合者也華言清淨是也集解志曰庵羅果樹生若林檎而極大宗奭曰西洛甚多梨之類也其狀似梨先諸梨熟七夕前後已堪啖色黃如鵝梨才熟便鬆軟入藥亦希時珍曰按一統志云庵羅果俗名香蓋乃果中極品種出西域亦奈類也葉似茶葉實似北梨五六月熟多食亦無害今安南諸地亦有之氣味甘溫無毒士良曰酸微寒志曰動風疾凡天行病及食飽後俱不可食同大蒜辛物食令人患黃病主治食之止渴開寶主婦人經脈不通丈夫營衛中血脈不行久食令人不飢士良葉主治渴疾煎湯飲士良奈別録下品釋名頻婆音波時珍曰篆文奈字象子綴於木之形梵言謂之頻婆今北人亦呼之猶雲端好也集解弘景曰奈江南雖有而北國最豐作脯食之不宜人林檎相似而小俱不益人士良曰此有三種大而長者為奈圓者為林檎皆夏熟小者味澀為梣秋熟一名楸子時珍曰奈與林檎一類二種也樹實皆似林檎而大西土最多可栽可壓有白赤青三色白者為素奈赤者為丹奈亦曰朱奈青者為緑奈皆夏熟涼州有冬奈冬熟子帶碧色孔氏六帖言涼州白奈大如兔頭西京雜記言上林苑紫奈大如升核紫花青其汁如漆著衣不可浣名脂衣奈此皆異種也郭義恭廣志云西方例多奈家家收切曝乾為脯數十百斛以為蓄積謂之頻婆糧亦取奈汁為豉用其法取熟奈納甕中勿令蠅入六七日待爛以酒醃痛拌令如粥狀下水更拌濾去皮子良久去清汁傾布上以灰在下引汁盡劃開曬乾為末調物甘酸得所也劉熙釋名載奈油以奈搗汁塗繒上曝燥取下色如油也今關西人以赤奈楸子取汁塗器中曝乾名果單是矣味甘酸可以饋遠杜恕篤論云日給之花似奈奈實而日給零落虛偽與真實相似也則日給乃奈之不實者而王羲之帖云來禽日給皆囊盛為佳果則又似指奈為日給矣木槿花亦名日及或同名耳實氣味苦寒有小毒多食令人肺壅臚脹有病人尤甚別録思邈曰酸苦寒澀無毒時珍曰案正要云頻婆甘無毒主治補中焦諸不足氣和脾治猝食飽氣壅不通者搗汁服孟詵益心氣耐飢千金生津止渴正要林檎宋開寶校正併入拾遺文林郎果釋名來禽法帖文林郎果藏器曰文林郎生渤海間云其樹從河中浮來有文林郎拾得種之因以為名珣曰文林郎南人呼為榲桲是矣時珍曰案洪玉父云此果味甘能來衆禽於林故有林禽來禽之名又唐高宗時紀王李謹得五色林檎似朱奈以貢帝大悅賜謹為文林郎人因呼林檎為文林郎果又述徵記云林檎實佳美其榲桲微大而狀醜有毛而香關輔乃有江南甚希據此則林檎是文林郎非榲桲也集解志曰林檎在處有之樹似奈皆二月開粉紅花子亦如奈而差圓六月七月熟頌曰亦有甘酢二種甘者早熟而味脆美酢者差晚須爛熟乃堪啖今醫家干之入治傷寒藥謂之林檎散時珍曰林檎即奈之小而圓者其味酢者即楸子也其類有金林檎紅林檎水林檎蜜林檎黑林檎皆以色味立名黑者色似紫奈有冬月再實者林檎熟時曬乾研末點湯服甚美謂之林檎麨僧贊寧物類相感志云林檎樹生毛蟲埋蠶蛾於下或以洗魚水澆之即止皆物性之妙也氣味酸甘溫無毒思邈曰酸苦平澀無毒多食令人百脈弱志曰多食發熱及冷痰澀氣令人好唾或生瘡癤閉百脈其子食之令人煩心主治下氣消痰治霍亂肚痛大明消渴者宜食之蘇頌療水穀痢泄精孟詵小兒閃癖時珍附方舊三水痢不止林檎半熟者十枚水二升煎一升並林檎食之食醫心鏡小兒下痢林檎構子同杵汁任意服之子母祕録小兒閃癖頭髮豎黃瘰癧瘦弱者干林檎脯研末和醋敷之同上東行根主治白蟲蛔蟲消渴好唾孟詵柿音士別録中品釋名時珍曰柿從𠂔音滓諧聲也俗作柿非矣柿音肺削木片也胡名鎮頭迦集解頌曰柿南北皆有之其種亦多紅柿所在皆有黃柿生汴洛諸州朱柿出華山似紅柿而圓小皮薄可愛味更甘珍椑柿色青可生啖諸柿食之皆美而益人又有一種小柿謂之軟棗俗呼為牛奶柿世傳柿有七絶一多壽二多陰三無鳥巢四無蟲蠹五霜葉可玩六嘉賓七落葉肥滑可以臨書也宗奭曰柿有數種著蓋柿於蒂下別有一重又有牛心柿狀如牛心蒸餅柿狀如市賣蒸餅華州朱柿小而深紅塔柿大於諸柿去皮挂木上風曬乾之佳火乾者味不甚佳其生者可以溫水養去澀味也時珍曰柿高樹大葉圓而光澤四月開小花黃白色結實青緑色八九月乃熟生柿置器中自紅者謂之烘柿曬乾者謂之白柿火乾者謂之烏柿水浸藏者謂之醂柿其核形扁狀如木鱉子仁而硬堅其根甚固謂之柿盤案事類合璧云柿朱果也大者如碟八稜稍扁其次如拳小或如雞子鴨子牛心鹿心之狀一種小而如拆二錢者謂之猴棗皆以核少者為佳烘柿時珍曰烘柿非謂火烘也即青緑之柿收置器中自然紅熟如烘成澀味盡去其甘如蜜歐陽修歸田録言襄鄧人以榠楂或榲桲或橘葉於中則熟亦不必氣味甘寒澀無毒弘景曰生柿性冷鹿心柿尤不可食令人腹痛宗奭曰凡柿皆涼不至大寒食之引痰為其味甘也曬乾者食多動風頌曰凡柿同蟹食令人腹痛作瀉二物俱寒也時珍曰按王璆百一選方云一人食蟹多食紅柿至夜大吐繼之以血昏不省人一道者云惟木香可解乃磨汁灌之即漸蘇醒而愈也主治通耳鼻氣治腸澼不足解酒毒壓胃間熱止口乾別録續經脈氣詵發明藏器曰飲酒食紅柿令人易醉或心痛欲死別録言解酒毒失之矣白柿柿霜修治時珍曰白柿即乾柿生霜者其法用大柿去皮捻扁日曬夜露至干內甕中待生白霜乃取出今人謂之柿餅亦曰柿花其霜謂之柿霜氣味甘平澀無毒弘景曰曬乾者性冷生柿彌冷火熏者性熱主治補虛勞不足消腹中宿血澀中厚腸健脾胃氣詵開胃澀腸消痰止渴治吐血潤心肺療肺痿心熱咳嗽潤聲喉殺蟲大明溫補多食去面皯藏器治反胃咯血血淋腸澼痔漏下血時珍霜清上焦心肺熱生津止渴化痰寧嗽治咽喉口舌瘡痛時珍發明震亨曰乾柿屬金而有土屬陰而有收意故止血治咳亦可為助也時珍曰柿乃脾肺血分之果也其味甘而氣平性澀而能收故有健脾澀腸治嗽止血之功蓋大腸者肺之合而胃之子也真正柿霜乃其精液入肺病上焦藥尤佳按方勺泊宅編云外兄劉掾云病臟毒下血凡半月自分必死得一方只以乾柿燒灰飲服二錢遂愈又王璆百一方云曾通判子病下血十年亦用此方一服而愈為散為丸皆可與本草治腸澼消宿血解熱毒之義相合則柿為太陰血分之藥益可證矣又經驗方云有人三世死於反胃病至孫得一方用乾柿餅同乾飯日日食之絶不用水飲如法食之其病遂愈此又一證也附方舊四新十二腸風臟毒方説見上小便血淋葉氏用乾柿三枚燒存性研末陳米飲服經驗方用白柿烏豆鹽花煎湯入墨汁服之熱淋澀痛乾柿燈心等分水煎日飲朱氏方小兒秋痢以粳米煮粥熟時入乾柿末再煮三兩沸食之奶母亦食之食療反胃吐食乾柿三枚連蒂搗爛酒服甚效切勿以他藥雜之腹薄食減凡男女脾虛腹薄食不消化面上黑點者用乾柿三斤酥一斤蜜半斤以酥蜜煎勻下柿煮十餘沸用不津器貯之每日空腹食三五枚甚良孟詵食療痰嗽帶血青州大柿餅飯上蒸熟批開每用一枚摻真青黛一錢臥時食之薄荷湯下丹溪纂要産後咳逆氣亂心煩用乾柿切碎水煮汁呷産寶婦人蒜髮乾柿五枚以茅香煮熟枸杞子酒浸焙研各等分搗丸梧桐子大每服五十丸茅香湯下日三普濟面生皯𪒟乾柿日日食之普濟方鼻窒不通乾柿同粳米煮粥日食聖濟耳聾鼻塞乾柿三枚細切以粳米三合豆豉少許煮粥日日空心食之聖惠痘瘡入目白柿日日食之良臁脛爛瘡用柿霜柿蒂等分燒研敷之甚效筆峰雜興解桐油毒乾柿餅食之普濟烏柿火熏乾者氣味甘溫無毒主治殺蟲療金瘡火瘡生肉止痛別録治狗齧瘡斷下痢弘景服藥口苦及嘔逆者食少許即止藏器醂柿音覽修治瑞曰水藏者性冷鹽藏者有毒時珍曰醂藏柿也水收鹽浸之外又有以熟柿用灰汁澡三四度令汁盡著器中經十餘日即可食治病非宜主治澀下焦健脾胃消宿血詵柿糕修治時珍曰案李氏食經云用糯米洗淨一斗大幹柿五十個同搗粉蒸食如干入煮棗泥和拌之主治作餅及糕與小兒食治秋痢詵黃柿和米粉作糗蒸與小兒食止下痢下血有效藏器柿蒂氣味澀平無毒主治咳逆噦氣煮汁服詵發明震亨曰人之陰氣依胃為養土傷則木挾相火直衝清道而上作咳逆古人以為胃寒既用丁香柿蒂不知其孰為補虛孰為降火不能清氣利痰惟有助火而已時珍曰咳逆者氣自臍下衝脈直上至咽膈作厄忒蹇逆之聲也朱肱南陽書以噦為咳逆王履溯洄集以咳嗽為咳逆皆誤矣噦者乾嘔有聲也咳逆有傷寒吐下後及久病産後老人虛人陰氣大虧陽氣暴逆自下焦逆至上焦而不能出者有傷寒失下及平人痰氣抑遏而然者當視其虛實陰陽或溫或補或泄熱或降氣或吐或下可也古方單用柿蒂煮汁飲之取其苦溫能降逆氣也濟生柿蒂散加以丁香生薑之辛熱以開痰散郁蓋從治之法而昔人亦常用之收效矣至易水張氏又益以人參治病後虛人咳逆亦有功績丹溪朱氏但執以寒治熱之理而不及從治之法矯枉之過矣若陳氏三因又加以良薑之類是真以為胃寒而助其邪火者也附方新一咳逆不止濟生柿蒂散治咳逆胸滿用柿蒂丁香各二錢生薑五片水煎服或為末白湯點服潔古加人參一錢治虛人咳逆三因加良薑甘草等分衛生寶鑑加青皮陳皮王氏易簡加半夏生薑木皮主治下血曬焙研末米飲服二錢兩服可止頌湯火瘡燒灰油調敷時珍根主治血崩血痢下血時珍椑柿音卑士宋開寶釋名漆柿日華緑柿日用青椑廣志烏椑開寶花椑日用赤棠椑時珍曰椑乃柿之小而卑者故謂之椑他柿至熟則黃赤惟此雖熟亦青黑色搗碎浸汁謂之柿漆可以染罾扇諸物故有漆柿之名集解志曰椑柿生江淮以南似柿而青黑潘嶽間居賦所謂梁侯烏椑之柿是也頌曰椑柿出宣歙荊襄閩廣諸州柿大如杏惟堪生啖不可為干也氣味甘寒澀無毒弘景曰椑生啖性冷服石家宜之不入藥用不可與蟹同食主治壓丹石藥發熱利水解酒毒去胃中熱久食令人寒中開寶止煩渴潤心肺除腹臟冷熱日華君遷子拾遺釋名㮕棗千金作軟棗梬棗廣志音逞牛奶柿名苑丁香柿日用紅藍棗齊民要術時珍曰君遷之名始見於左思吳都賦而著其狀於劉欣期交州記名義莫詳㮕棗其形似棗而軟也司馬光名苑云君遷子似馬奶即今牛奶柿也以形得名崔豹古今注云牛奶柿即㮕棗葉如柿子亦如柿而小唐宋諸家不知君遷㮕棗牛奶柿皆一物故詳證之集解藏器曰君遷子生海南樹高丈餘子中有汁如乳汁甜美吳都賦平仲君遷是也時珍曰君遷即㮕棗其木類柿而葉長但結實小而長狀如牛奶干熟則紫黑色一種小圓如指頂大者名丁香柿味尤美救荒本草以為羊矢棗誤矣其樹接大柿最佳廣志云㮕棗小柿也肌細而厚少核可以供御即此氣味甘澀平無毒主治止消渴去煩熱令人潤澤藏器鎮心久服悅人顏色令人輕健珣安石榴別録下品釋名若榴廣雅丹若古今注金罌時珍曰榴者瘤也丹實垂垂如贅瘤也博物志云漢張騫出使西域得塗林安石國榴種以歸故名安石榴又按齊民要術云凡植榴者須安僵石枯骨於根下即花實繁茂則安石之名義或取此也若木乃扶桑之名榴花丹頳似之故亦有丹若之稱傅玄榴賦所謂灼若旭日棲扶桑者是矣筆衡云五代吳越王錢鏐改榴為金罌酉陽雜俎言榴甜者名天漿道家書謂榴為三尸酒言三尸蟲得此果則醉也故范成大詩云玉池咽清肥三彭迹如掃集解弘景曰石榴花赤可愛故人多植之尤為外國所重有甜酢二種醫家惟用酢者之根殼榴子乃服食者所忌頌曰安石榴本生西域今處處有之木不甚高大枝柯附干自地便生作叢種極易息折其條盤土中便生也花有黃赤二色實有甘酢二種甘者可食酢者入藥又一種山石榴形頗相類而絶小不作房生青齊間甚多不入藥但蜜漬以當果甚美宗奭曰石榴有酸淡二種旋開單葉花旋結實實中子紅孫枝甚多秋後經霜則自坼裂一種子白瑩徹如水晶者味亦甘謂之水晶石榴惟酸石榴入藥須老木所結收留陳久者乃佳時珍曰榴五月開花有紅黃白三色單葉者結實千葉者不結實或結亦無子也實有甜酸苦三種抱朴子言苦者出積石山或云即山石榴也酉陽雜俎言南詔石榴皮薄如紙瑣碎録言河陰石榴名三十八者其中只有三十八子也又南中有四季榴四時開花秋月結實實方綻隨復開花有火石榴赤色如火海石榴高一二尺即結實皆異種也案事類合璧云榴大如杯赤色有黑斑點皮中如蜂窠有黃膜隔之子形如人齒淡紅色亦有潔白如雪者潘嶽賦云榴者天下之奇樹九州之名果千房同膜千子如一御飢療渴解酲止醉甘石榴氣味甘酸溫澀無毒多食損人肺別録詵曰多食損齒令黑凡服食藥物人忌食之震亨曰榴者留也其汁酸性滯黏膈成痰主治咽喉燥渴別録能理乳石毒段成式制三尸蟲時珍酸石榴氣味酸溫澀無毒主治赤白痢腹痛連子搗汁頓服一枚孟詵止瀉痢崩中帶下時珍發明時珍曰榴受少陽之氣而榮於四月盛於五月實於盛夏熟於深秋丹花赤實其味甘酸其氣溫澀具木火之象故多食損肺齒而生痰涎酸者則兼收斂之氣故入斷下崩中之藥或云白榴皮治白痢紅榴皮治紅痢亦通附方新五腸滑久痢黑神散用酸石榴一個煅煙盡出火毒一夜研末仍以酸榴一塊煎湯服神效無比久瀉不止方同上並普濟方痢血五色或膿或水冷熱不調酸石榴五枚連子搗汁二升每服五合神妙聖濟小便不禁酸石榴燒存性無則用枝燒灰代之每服二錢用柏白皮切焙四錢煎湯一盞入榴灰再煎至八分空心溫服晚再服聖惠捻鬚令黑酸石榴結成時就東南枝上揀大者一個頂上開一孔內水銀半兩於中原皮封之麻扎定牛屎封護待經霜摘下傾出殼內水以魚鰾籠指蘸水捻鬚久久自黑也普濟酸榴皮修治斆曰凡使榴皮葉根勿犯鐵並不計乾溼皆以漿水浸一夜取出用其水如墨汁也氣味同實主治止下痢漏精別録治筋骨風腰腳不遂行步攣急疼痛澀腸取汁點目止淚下權煎服下蛔蟲藏器止瀉痢下血脫肛崩中帶下時珍附方舊六新四赤白痢下腹痛食不消化者食療本草用醋榴皮炙黃為末棗肉或粟米飯和丸梧桐子大每空腹米飲服三十丸日三服以知為度如寒滑加附子赤石脂各一倍肘後方用皮燒存性為末每米飲服方寸匕日三服效乃止糞前有血令人面黃用酢石榴皮炙研末每服二錢用茄子枝煎湯服孫真人方腸滑久痢神妙無比方也用石榴一個劈破炭火簇燒存性出火毒為末每服一錢別以酸石榴一瓣水一盞煎湯調服經驗方久痢久瀉陳石榴皮酢者焙研細末每服二錢米飲下患二三年或二三月百方不效者服之便止不可輕忽之也普濟方小兒風癇大生石榴一枚割去頂剜空入全蠍五枚黃泥固濟煅存性為末每服半錢乳汁調下或防風湯下亦可聖濟録猝病耳聾八九月間取石榴一個上作孔如球子大內米醋令滿以原皮蓋之水和麵裹煨熟取起去蓋入少黑李子仙沼子末取水滴耳中勿動腦中若痛勿驚如此三夜再作必通案唐慎微本草收採此方云出孫真人而黑李子不知為何物也其仙沼子即預知子食榴損齒石榴黑皮炙黃研末棗肉和丸梧桐子大每日空腹三丸白湯下日二服普濟疔腫惡毒以針刺四畔用榴皮著瘡上以面圍四畔灸之以痛為度仍納榴末敷上急裹經宿連根自出也肘後百一方腳肚生瘡初起如粟搔之漸開黃水浸淫癢痛潰爛遂致繞脛而成痼疾用酸榴皮煎湯冷定日日掃之取愈乃止醫學正宗酸榴東行根氣味同皮主治蛔蟲寸白別録青者入染須用權治口齒病頌止澀瀉痢帶下功與皮同時珍附方舊三新二金蠶蠱毒吮白礬味甘嚼黑豆不腥者即是中蠱也石榴根皮煎濃汁服即吐出活蠱無不愈者丹溪摘玄方寸白蛔蟲酢石榴東引根一握洗銼用水三升煎取半碗五更溫服盡至明取下蟲一大團永絶根本食粥補之崔元亮海上方用榴皮煎水煮米作粥食之亦良女子經閉不通用酢榴根東生者一握炙乾水二大盞濃煎一盞空心服之未通再服斗門赤白下痢方同上榴花主治陰乾為末和鐵丹服一年變白髮如漆藏器鐵丹飛鐵為丹也亦鐵粉之屬千葉者治心熱吐血又研末吹鼻止衄血立效亦敷金瘡出血蘇頌附方舊一新二金瘡出血榴花半斤石灰一升搗和陰乾每用少許敷之立止崔元亮方鼻出衄血酢榴花二錢半黃蜀葵花一錢為末每服一錢水一盞煎服效乃止聖濟録九竅出血石榴花揉塞之取效葉亦可橘本經上品校正志曰自木部移入此釋名時珍曰橘從矞音鷸諧聲也又云五色為慶二色為矞矞雲外赤內黃非煙非霧鬱郁紛紛之象橘實外赤內黃剖之香霧紛郁有似乎矞雲橘之從矞又取此意也集解別録曰橘柚生江南及山南山谷十月採恭曰柚之皮厚味甘不似橘皮味辛苦其肉亦如橘有甘有酸酸者名胡柑今俗謂橙為柚非矣案郭璞云柚似橙而實酢大於橘孔安國云小曰橘大曰柚皆為柑也頌曰橘柚今江浙荊襄湖嶺皆有之木高一二丈葉與枳無辨刺出莖間夏初生白花六七月成實至冬黃熟舊説小為橘大為柚今醫家乃用黃橘青橘不言柚豈青橘是柚之類乎宗奭曰橘柚自是兩種本草云一名橘皮後人誤加柚字妄生分別且青橘黃橘治療尚殊況柚為別種乎惟郭璞所言乃真識橘柚者若不如此分別誤以柚皮為橘皮是貽無窮之患矣時珍曰橘柚蘇恭所説甚是蘇頌不知青橘即橘之未黃者乃以為柚誤矣夫橘柚柑三者相類而不同橘實小其瓣味微酢其皮薄而紅味辛而苦柑大於橘其瓣味甘其皮稍厚而黃味辛而甘柚大小皆如橙其瓣味酢其皮最厚而黃味甘而不甚辛如此分之即不誤矣按事類合璧云橘樹高丈許枝多生刺其葉兩頭尖緑色光面大寸余長二寸許四月著小白花甚香結實至冬黃熟大者如杯包中有瓣瓣中有核也宋韓彥直著橘譜三卷甚詳其略云柑橘出蘇州台州西出荊州南出閩廣撫州皆不如溫州者為上也柑品有八橘品十有四多是接成惟種成者氣味尤勝黃橘扁小而多香霧乃橘之上品也朱橘小而色赤如火緑橘紺碧可愛不待霜後色味已佳隆冬採之生意如新乳橘狀似乳柑皮堅瓤多味絶酸芳塌橘狀大而扁外緑心紅瓣巨多液經春乃甘美包橘外薄內盈其脈瓣隔皮可數綿橘微小極軟美可受而不多結沙橘細小甘美油橘皮似油飾中堅外黑乃橘之下品也早黃橘秋半已丹凍橘八月開花冬結春採穿心橘實大皮光而心虛可穿荔枝橘出衡陽膚理皺密如荔子也俗傳橘下埋鼠則結實加倍故物類相感志曰橘見尸而實繁涅槃經云如橘見鼠其果實多周禮言橘逾淮而北變為枳地氣然也余見柑下橘實氣味甘酸溫無毒弘景曰食之多痰恐非益也原曰多食黏膈生痰滯肺氣瑞曰同螃蟹食令人患軟癰主治甘者潤肺酸者聚痰藏器止消渴開胃除胸中膈氣大明發明時珍曰橘皮下氣消痰其肉生痰聚飲表裡之異如此凡物皆然今人以蜜煎橘充果食甚佳亦可醬菹也黃橘皮釋名紅皮湯液陳皮食療弘景曰橘皮療氣大勝以東橘為好西江者不如須陳久者為良好古曰橘皮以色紅日久者為佳故曰紅皮陳皮去白者曰橘紅也修治斆曰凡使勿用柚皮皺子皮二件用不得凡修事須去白膜一重銼細以鯉魚皮裹一宿至明取用宗奭曰本草橘柚作一條蓋傳誤也後世不知以柚皮為橘皮是貽無窮之患矣此乃六陳之一天下日用所須今人又多以乳柑皮亂之不可不擇也柑皮不甚苦橘皮極苦至熟亦苦或以皮之緊慢分別又因方土不同亦互有緊慢也時珍曰橘皮紋細色紅而薄內多筋脈其味苦辛柑皮紋粗色黃而厚內多白膜其味辛甘柚皮最厚而虛紋更粗色黃內多膜無筋其味甘多辛少但以此別之即不差矣橘皮性溫柑柚皮性冷不可不知今天下多以廣中來者為勝江西者次之然亦多以柑皮雜之柑皮猶可用柚皮則懸絶矣凡橘皮入和中理胃藥則留白入下氣消痰藥則去白其説出於聖濟經去白者以白湯入鹽洗潤透刮去筋膜曬乾用亦有煮焙者各隨本方氣味苦辛溫無毒主治胸中瘕熱逆氣利水穀久服去臭下氣通神本經下氣止嘔咳治氣衝胸中吐逆霍亂療脾不能消穀止泄除膀胱留熱停水五淋利小便去寸白蟲別録清痰涎治上氣咳嗽開胃主氣痢破癥瘕痃癖甄權療嘔噦反胃嘈雜時吐清水痰痞痎瘧大腸祕塞婦人乳癰入食料解魚腥毒時珍發明杲曰橘皮氣薄味厚陽中之陰也可升可降為脾肺二經氣分藥留白則補脾胃去白則理肺氣同白朮則補脾胃同甘草則補肺獨用則瀉肺損脾其體輕浮一能導胸中寒邪二破滯氣三益脾胃加青皮減半用之去滯氣推陳致新但多用久服能損元氣也原曰橘皮能散能瀉能溫能補能和化痰治嗽順氣理中調脾快膈通五淋療酒病其功當在諸藥之上時珍曰橘皮苦能泄能燥辛能散溫能和其治百病總是取其理氣燥濕之功同補藥則補同瀉藥則瀉同升藥則升同降藥則降脾乃元氣之母肺乃攝氣之籥故橘皮為二經氣分之藥但隨所配而補瀉升降也潔古張氏云陳皮枳殼利其氣而痰自下蓋此義也同杏仁治大腸氣祕同桃仁治大腸血祕皆取其通滯也詳見杏仁下按方勺泊宅編云橘皮寬膈降氣消痰飲極有殊功他藥貴新惟此貴陳外舅莫強中令豐城時得疾凡食已輒胸滿不下百方不效偶家人合橘紅湯因取嘗之似相宜連日飲之一日忽覺胸中有物墜下大驚目瞪自汗如雨須臾腹痛下數塊如鐵彈子臭不可聞自此胸次廓然其疾頓愈蓋脾之冷積也其方用橘皮去穰一斤甘草鹽花各四兩水五碗慢火煮乾焙研為末白湯點服名二賢散治一切痰氣特驗世醫徒知半夏南星之屬何足以語此哉珍按二賢散丹溪變之為潤下丸用治痰氣有效惟氣實人服之相宜氣不足者不宜用之也附方舊八新二十潤下丸治濕痰因火泛上停滯胸膈咳唾稠黏陳橘皮半斤入砂鍋內下鹽五錢化水淹過煮乾粉甘草二兩去皮蜜炙各取淨末蒸餅和丸梧桐子大每服百丸白湯下丹溪方寬中丸治脾氣不和冷氣客於中壅遏不通是為脹滿用橘皮四兩白朮二兩為末酒糊丸梧桐子大每食前木香湯下三十丸日三服是齋指迷方橘皮湯治男女傷寒並一切雜病嘔噦手足逆冷者用橘皮四兩生薑一兩水二升煎一升徐徐呷之即止仲景方嘈雜吐水真橘皮去白為末五更安五分於掌心舐之即睡三日必效皮不真則不驗怪證奇方霍亂吐瀉不拘男女但有一點胃氣存者服之再生廣陳皮去白五錢真藿香五錢水二盞煎一盞時時溫服出百一選方聖惠用陳橘皮末二錢湯點服不省者灌之仍燒磚沃醋布裹磚安心下尉之便活反胃吐食真橘皮以日照西壁土炒香為末每服二錢生薑三片棗肉一枚水二鍾煎一鍾溫服直指方猝然食噎橘皮一兩湯浸去瓤焙為末以水一大盞煎半盞熱服食醫心鏡諸氣厄噫橘皮二兩去瓤水一升煎五合頓服或加枳殼尤良孫尚藥方痰膈氣脹陳皮三錢水煎熱服楊氏簡便方猝然失聲橘皮半兩水煎徐呷肘後方經年氣嗽橘皮神麯生薑焙乾等分為末蒸餅和丸梧桐子大每服三五十丸食後夜臥各一服有人患此服之兼舊患膀胱氣皆愈也寇氏衍義化食消痰胸中熱氣用橘皮半兩微熬為末水煎代茶細呷心鏡下焦冷氣干陳橘皮一斤為末蜜丸梧桐子大每食前溫酒下三十丸食療本草腳氣衝心或心下結硬腹中虛冷陳皮一斤和杏仁五兩去皮尖熬少加蜜搗和丸如梧桐子大每日食前米飲下三十丸食療老人氣祕方同上濟生大腸祕塞陳皮連白酒煮焙研末每溫酒服二錢一方米飲下普濟途中心痛橘皮去白煎湯飲之甚良談野翁方食魚蟹毒方同上肘後風痰麻木凡手及十指麻木大風麻木皆是濕痰死血用橘紅一斤逆流水五碗煮爛去渣再煮至一碗頓服取吐乃吐痰聖藥也不吐加瓜蒂末摘玄方脾寒諸瘧不拘老少孕婦只兩服便止真橘皮去白切生薑自然汁浸過一指銀器內重湯煮焙乾研末每服三錢用隔年青州棗十個水一盞煎半盞發前服以棗下之適用方小兒疳瘦久服消食和氣長肌肉用陳橘皮一兩黃連以米泔水浸一日一兩半研末入麝三分用豬膽盛藥以漿水煮熟取出用粟米飯和丸緑豆大每服一二十丸米飲下錢氏小兒方産後尿祕不通者陳皮一兩去白為末每空心溫酒服二錢一服即通此張不愚方也婦人良方産後吹奶陳皮一兩甘草一錢水煎服即散婦人乳癰未成者即散已成者即潰痛不可忍者即不疼神驗不可云喻也用真陳橘皮湯浸去白曬麵炒微黃為末每服二錢麝香調酒下初發者一服見效名橘香散張氏方聤耳出汁陳皮燒研一錢麝香少許為末日摻名立效散魚骨鯁咽橘皮常含咽汁即下聖惠方嵌甲作痛不能行履者濃煎陳皮湯浸良久甲肉自離輕手剪去以虎骨末敷之即安醫林集要青橘皮修治時珍曰青橘皮乃橘之未黃而青色者薄而光其氣芳烈今人多以小柑小柚小橙偽為之不可不慎辨之入藥以湯浸去瓤切片醋拌瓦炒過用氣味苦辛溫無毒主治氣滯下食破積結及膈氣頌破堅癖散滯氣去下焦諸濕治左脅肝經積氣元素治胸膈氣逆脅痛小腹疝痛消乳腫疏肝膽瀉肺氣時珍發明元素曰青橘皮氣味俱厚沉而降陰也入厥陰少陽經治肝膽之病杲曰青皮乃足厥陰引經之藥能引食入太陰之倉破滯削堅皆治在下之病有滯氣則破滯氣無滯氣則損真氣好古曰陳皮治高青皮治低與枳殼治胸膈枳實治心下同意震亨曰青皮乃肝膽二經氣分藥故人多怒有滯氣脅下有鬱積或小腹疝疼用之以疏通二經行其氣也若二經實者當先補而後用之又云疏肝氣加青皮炒黑則入血分也時珍曰青橘皮古無用者至宋時醫家始用之其色青氣烈味苦而辛治之以醋所謂肝欲散急食辛以散之以酸泄之以苦降之也陳皮浮而升入脾肺氣分青皮沉而降入肝膽氣分一體二用物理自然也小兒消積多用青皮最能發汗有汗者不可用説出楊仁齋直指方人罕知之嘉謨曰久瘧熱甚必結癖塊宜多服清脾湯內有青皮疏利肝邪則癖自不結也附方舊二新七快膈湯治冷膈氣及酒食後飽滿用青橘皮一斤作四分四兩用鹽湯浸四兩用百沸湯浸四兩用醋浸四兩用酒浸各三日取出去白切絲以鹽一兩炒微焦研末每用二錢以茶末五分水煎溫服亦可點服經驗後方理脾快氣青橘皮一斤曬乾焙研末甘草末一兩檀香末半兩和勻收之每用一二錢入鹽少許白湯點服法制青皮常服安神調氣消食解酒益胃不拘老人小兒宋仁宗每食後咀數片乃邢和璞真人所獻名萬年草劉跂改名延年草仁宗以賜呂丞相用青皮一斤浸去苦味去瓤煉淨白鹽花五兩炙甘草六兩舶茴香四兩甜水一斗煮之不住攪勿令著底候水盡慢火焙乾勿令焦去甘草茴香只取青皮密收用王氏易簡方瘧疾寒熱青皮一兩燒存性研末發前溫酒服一錢臨時再服聖惠方傷寒厄逆聲聞四鄰四花青皮全者研末每服二錢白湯下醫林集要産後氣逆青橘皮為末蔥白童子小便煎二錢服經驗後方婦人乳癌因久積憂鬱乳房內有核如指頭不痛不癢五七年成癰名乳癌不可治也用青皮四錢水一盞半煎一盞徐徐服之日一服或用酒服丹溪方聤耳出汁青皮燒研末綿包塞之唇燥生瘡青皮燒研豬脂調塗橘瓤上筋膜主治口渴吐酒炒熟煎湯飲甚效大明橘核修治時珍曰凡用須以新瓦焙香去殼取仁研碎入藥氣味苦平無毒主治腎疰腰痛膀胱氣痛腎冷炒研每溫酒服一錢或酒煎服之大明治酒齇風鼻赤炒研每服一錢胡桃肉一個擂酒服以知為度宗奭小腸疝氣及陰核腫痛炒研五錢老酒煎服或酒糊丸服甚效時珍發明時珍曰橘核入足厥陰與青皮同功故治腰痛㿉疝在下之病不獨取象於核也和劑局方治諸疝痛及內㿉卵腫偏墜或硬如石或腫至潰有橘核丸用之有效品味頗多詳見本方附方新一腰痛橘核杜仲各二兩炒研末每服二錢鹽酒下簡便方葉氣味苦平無毒主治導胸膈逆氣入厥陰行肝氣消腫散毒乳癰脅痛用之行經震亨附方新一肺癰緑橘葉洗搗絞汁一盞服之吐出膿血即愈經驗良方柑宋開寶釋名木奴志曰柑未經霜時猶酸霜後甚甜故名柑子時珍曰漢李衡種柑於武陵洲上號為木奴焉集解炳曰乳柑出西戎者佳志曰柑生嶺南及江南樹似橘實亦似橘而圓大皮色生青熟黃赤惟乳柑皮入藥山柑皮療咽痛余皆不堪用又有沙柑青柑體性相類藏器曰柑有朱柑黃柑乳柑石柑沙柑橘有朱橘乳橘塌橘山橘黃淡子此輩皮皆去氣調中實俱堪食就中以乳柑為上也時珍曰柑南方果也而閩廣溫臺蘇撫荊州為盛川蜀雖有不及之其樹無異於橘但刺少耳柑皮比橘色黃而稍厚理稍粗而味不苦橘可久留柑易腐敗柑樹畏冰雪橘樹略可此柑橘之異也柑橘皮今人多混用不可不辨詳見橘下案韓彥直橘譜云乳柑出溫州諸邑惟泥山者為最以其味似乳酪故名彼人呼為真柑似以它柑為假矣其木婆娑其葉纖長其花香韻其實圓正膚理如澤蠟其大六七寸其皮薄而味珍脈不黏瓣食不留滓一顆僅二三核亦有全無者擘之香霧噀人為柑中絶品也生枝柑形不圓色青膚粗味帶微酸留之枝間可耐久也俟味變甘乃帶葉折故名海紅柑樹小而顆極大有圍及尺者皮厚色紅可久藏今獅頭柑亦是其類也洞庭柑種出洞庭山皮細味美其熟最早也甜柑類洞庭而大每顆必八瓣不待霜而黃也木柑類洞庭膚粗頑瓣大而少液故謂之木也朱柑類洞庭而大色絶嫣紅其味酸人不重之饅頭柑近蒂起如饅頭尖味香美也氣味甘大寒無毒頌曰冷志曰多食令人肺冷生痰脾冷發痼癖大腸瀉利發陰汗主治利腸胃中熱毒解丹石止暴渴利小便開寶附方新一難産柑橘瓤陰乾燒存性研末溫酒服二錢集效皮氣味辛甘寒無毒時珍曰橘皮苦辛溫柑皮辛甘寒外形雖似而氣味不同詵曰多食令肺燥主治下氣調中藏器解酒毒及酒渴去白焙研末點湯入鹽飲之大明治産後肌浮為末酒服藏器傷寒飲食勞復者濃煎汁服時珍山柑皮治咽喉痛效開寶核主治作塗面藥蘇頌葉主治聤耳流水或膿血取嫩頭七個入水數滴杵取汁滴之即愈藺氏橙宋開寶釋名金球鵠殼時珍曰案陸佃埤雅云橙柚屬也可登而成之故字從登又諧聲也集解志曰橙樹似橘而葉大其形圓大於橘而香皮厚而皺八月熟時珍曰橙産南土其實似柚而香葉有兩刻缺如兩段亦有一種氣臭者柚乃柑屬之大者早黃難留橙乃橘屬之大者晚熟耐久皆有大小二種案事類合璧云橙樹高枝葉不甚類橘亦有刺其實大者如碗頗似朱欒經霜早熟色黃皮厚蹙衄如沸香氣馥郁其皮可以薰衣可以芼鮮可以和菹醢可以為醬齏可以蜜煎可以糖製為橙丁可以蜜製為橙膏嗅之則香食之則美誠佳果也宗奭曰橙皮今只以為果或合湯待賓未見入藥宿酒未解者食之速醒氣味酸寒無毒士良曰暖多食傷肝氣發虛熱與獱肉同食發頭旋噁心時珍曰獱乃水獺之屬也諸家本草皆作檳榔誤矣主治洗去酸汁切和鹽蜜煎成貯食止噁心能去胃中浮風惡氣開寶行風氣療癭氣發瘰癧殺魚蟹毒士良皮氣味苦辛溫無毒主治作醬醋香美散腸胃惡氣消食下氣去胃中浮風氣開寶和鹽貯食止噁心解酒病孟詵糖作橙丁甘美消痰下氣利膈寬中解酒時珍附方新二香橙湯寬中快氣消酒用橙皮二斤切片生薑五兩切焙擂爛入炙甘草末一兩檀香末半兩和作小餅每嚼一餅沸湯入鹽送下奇效良方痔瘡腫痛隔年風乾橙子桶內燒煙燻之神效醫方摘要核主治面皯粉刺濕研夜夜塗之時珍附方新一閃挫腰痛橙子核炒研酒服三錢即愈攝生方柚音又日華釋名柚與柚同條爾雅壺柑唐本臭橙食性朱欒時珍曰柚色油然其狀如卣故名壺亦象形今人呼其黃而小者為蜜筒正此意也其大者謂之朱欒亦取團欒之象最大者謂之香欒爾雅謂之櫠音廢又曰椵音賈廣雅謂之鐳柚鐳亦壺也桂海志謂之臭柚皆一物但以大小古今方言稱呼不同耳集解恭曰柚皮厚味甘不似橘皮薄味辛而苦其肉亦如橘有甘有酸酸者名壺柑今俗人謂橙為柚非矣案呂氏春秋云果之美者江浦之橘雲夢之柚郭璞云柚出江南似橙而實酢大如橘禹貢云揚州厥包橘柚孔安國云小曰橘大曰柚皆為柑也頌曰閩中嶺外江南皆有柚比橘黃白色而大襄唐間柚色青黃而實小其味皆酢皮厚不堪入藥時珍曰柚樹葉皆似橙其實有大小二種小者如柑如橙大者如瓜如升有圍及尺余者亦橙之類也今人呼為朱欒形色圓正都類柑橙但皮厚而粗其味甘其氣臭其瓣堅而酸惡不可食其花甚香南人種其核長成以接柑橘云甚良也蓋橙乃橘屬故其皮皺厚而香味苦而辛柚乃柑屬故其皮粗厚而臭味甘而辛如此分柚與橙橘自明矣郭璞云櫠大柚也實大如盞皮厚二三寸子似枳食之少味范成大云廣南臭柚大如瓜可食其皮甚厚染墨打碑可代氈刷且不損紙也列子云吳越之間有木焉其名為柚碧樹而冬青實丹而味酸食其皮汁已憤厥之疾渡淮而北化而為枳此言地氣之不同如此氣味酸寒無毒主治消食解酒毒治飲酒人口氣去腸胃中惡氣療妊婦不思食口淡大明皮氣味甘辛平無毒正誤時珍曰案沈括筆談云本草言橘皮苦柚皮甘誤矣柚皮極苦不可入口甘者乃橙也此説似與今柚不同乃沈氏自誤也不可為據主治下氣宜食不入藥弘景消食快膈散憤悶之氣化痰時珍附方新一痰氣咳嗽用香欒去核切砂瓶內浸酒封固一夜煮爛蜜拌勻時時含咽葉主治頭風痛同蔥白搗貼太陽穴時珍花主治蒸麻油作香澤面脂長髮潤燥時珍枸櫞音矩員宋圖經校正原附豆蔻下今分出釋名香櫞俗作圓佛手柑時珍曰義未詳佛手取象也集解藏器曰枸櫞生嶺南柑橘之屬也其葉大其實大如盞味辛酸頌曰今閩廣江南皆有之彼人呼為香櫞子形長如小瓜狀其皮若橙而光澤可愛肉甚厚白如蘿蔔而鬆虛雖味短而香芬大勝置衣笥中則數日香不歇寄至北方人甚貴重古作五和糝用之時珍曰枸櫞産閩廣間木似朱欒而葉尖長枝間有刺植之近水乃生其實狀如人手有指俗呼為佛手柑有長一尺四五寸者皮如橙柚而厚皺而光澤其色如瓜生緑熟黃其核細其味不甚佳而清香襲人南人雕鏤花鳥作蜜煎果食置之几案可供玩賞若安芋片於蒂而以濕紙圍護經久不癟或搗蒜罨其蒂上則香更充溢異物志云浸汁浣葛紵勝似酸漿也皮瓤氣味辛酸無毒弘景曰性溫恭曰性冷陶説誤矣藏器曰性溫不冷主治下氣除心頭痰水藏器煮酒飲治痰氣咳嗽煎湯治心下氣痛時珍根葉主治同皮橘譜金橘綱目釋名金柑橘譜盧橘漢書夏橘廣州記山橘北戶録給客橙魏王花木志時珍曰此橘生時青盧色黃熟則如金故有金橘盧橘之名盧黑色也或云盧酒器之名其形肖之故也注文選者以枇杷為盧橘誤矣案司馬相如上林賦云盧橘夏熟枇杷橪柿以二物並列則非一物明矣此橘夏冬相繼故云夏熟而裴淵廣州記謂之夏橘給客橙者其芳香如橙可供給客也集解時珍曰金橘生吳粵江浙川廣間或言出營道者為冠而江浙者皮甘肉酸次之其樹似橘不甚高大五月開白花結實秋冬黃熟大者徑寸小者如指頭形長而皮堅肌理細瑩生則深緑色熟乃黃如金其味酸甘而芳香可愛糖造蜜煎皆佳案魏王花木志云蜀之成都臨邛江源諸處有給客橙一名盧橘似橘而非若柚而香夏冬花實常相繼或如彈丸或如櫻桃通歲食之又劉恂嶺表録異云山橘子大如土瓜次如彈丸小樹緑葉夏結冬熟金色薄皮而味酸偏能破氣容廣人連枝藏之入膾醋尤加香美韓彥直橘譜云金柑出江西北人不識景祐中始至汴都因溫成皇后嗜之價遂貴重藏緑豆中可經時不變蓋橘性熱豆性涼也又有山金柑一名山金橘俗名金豆木高尺許實如櫻桃內只一核俱可蜜漬香味清美以上諸説皆指今之金橘但有一類數種之異耳氣味酸甘溫無毒主治下氣快膈止渴解酲闢臭皮尤佳時珍枇杷別録中品釋名宗奭曰其葉形似琵琶故名集解頌曰枇杷舊不著所出州土今襄漢吳蜀閩嶺江西南湖南北皆有之木高丈餘肥枝長葉大如驢耳背有黃毛陰密婆娑可愛四時不凋盛冬開白花至三四月成實作梂生大如彈丸熟時色如黃杏微有毛皮肉甚薄核大如茅栗黃褐色四月採葉曝乾用時珍曰案郭義恭廣志云枇杷易種葉微似栗冬花春實其子簇結有毛四月熟大者如雞子小者如龍眼白者為上黃者次之無核者名焦子出廣州又楊萬里詩云大葉聳長耳一枝堪滿盤荔枝分與核金橘卻無酸頗盡其狀注文選者以枇杷為盧橘誤矣詳金橘實氣味甘酸平無毒志曰寒詵曰溫多食發痰熱傷脾同炙肉及熱麵食令人患熱毒黃疾主治止渴下氣利肺氣止吐逆主上焦熱潤五臟大明葉修治恭曰凡用須火炙以布拭去毛不爾射人肺令咳不已或以粟稈作刷刷之尤易潔淨斆曰凡採得稱濕葉重一兩乾者三葉重一兩乃為氣足堪用粗布拭去毛以甘草湯洗一遍用綿再拭乾每一兩以酥二錢半塗上炙過用時珍曰治胃病以薑汁塗炙治肺病以蜜水塗炙乃良氣味苦平無毒權曰甘微辛弘景曰煮汁飲之則小冷主治猝啘不止下氣煮汁服別録弘景曰若不暇煮但嚼汁咽亦瘥治嘔噦不止婦人産後口乾大明煮汁飲主渴疾治肺氣熱嗽及肺風瘡胸面上瘡詵和胃降氣清熱解暑毒療腳氣時珍發明時珍曰枇杷葉氣薄味厚陽中之陰治肺胃之病大都取其下氣之功耳氣下則火降痰順而逆者不逆嘔者不嘔渴者不渴咳者不咳矣宗奭曰治肺熱嗽甚有功一婦人患肺熱久嗽身如火炙肌瘦將成癆以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半如常治訖為末蜜丸櫻桃大食後夜臥各含化一丸未終劑而愈矣附方新七溫病發噦因飲水多者枇杷葉去毛炙香茅根各半斤水四升煎二升稍稍飲之龐安常方反胃嘔噦枇杷葉去毛炙丁香各一兩人參二兩為末每服三錢水一盞薑三片煎服聖惠衄血不止枇杷葉去毛焙研末茶服一二錢日二同上酒齇赤鼻枇杷葉梔子仁等分為末每服二錢溫酒調下日三服本事面上風瘡方同上痔瘡腫痛枇杷葉蜜灸烏梅肉焙為末先以烏梅湯洗貼之集要痘瘡潰爛枇杷葉煎湯洗之摘玄花主治頭風鼻流清涕辛夷等分研末酒服二錢日二服時珍木白皮主治生嚼咽汁止吐逆不下食煮汁冷服尤佳思邈楊梅宋開寶釋名朹子音求時珍曰其形如水楊子而味似梅故名段氏北戶録名朹子揚州人呼白楊梅為聖僧集解志曰楊梅生江南嶺南山谷樹若荔枝樹而葉細陰青子形似水楊子而生青熟紅肉在核上無皮殼四月五月採之南人醃藏為果寄至北方時珍曰楊梅樹葉如龍眼及紫瑞香冬月不凋二月開花結實形如楮實子五月熟有紅白紫三種紅勝於白紫勝於紅顆大而核細鹽藏蜜漬糖收皆佳東方朔林邑記云邑有楊梅其大如杯碗青時極酸熟則如蜜用以釀酒號為梅香酎甚珍重之贊寧物類相感志云桑上接楊梅則不酸楊梅樹生癩以甘草釘釘之則無皆物理之妙也藏器曰張華博物志言地瘴處多生楊梅驗之信然實氣味酸甘溫無毒詵曰熱微毒久食令人發熱損齒及筋忌生蔥同食瑞曰發瘡致痰主治鹽藏食去痰止嘔噦消食下酒干作屑臨飲酒時服方寸匕止吐酒開寶止渴和五臟能滌腸胃除煩憒惡氣燒灰服斷下痢甚驗鹽者常含一枚咽汁利五臟下氣詵附方舊一新三下痢不止楊梅燒研每米飲服二錢日二服普濟頭痛不止楊梅為末以少許嗅鼻取嚏妙頭風作痛楊梅為末每食後薄荷茶服二錢或以消風散同煎服或同搗末以白梅肉和丸彈子大每食後蔥茶嚼下一丸朱氏集驗一切損傷止血生肌令無瘢痕用鹽藏楊梅和核搗如泥做成挺子以竹筒收之凡遇破傷研末敷之神聖絶妙經驗後方核仁主治腳氣時珍曰案王明清揮塵録云會稽楊梅為天下冠童貫苦腳氣或云楊梅仁可治之郡守王嶷饋五十石貫用之而愈取仁法以柿漆拌核曝之則自裂出也樹皮及根主治煎湯洗惡瘡疥癬大明煎水漱牙痛服之解砒毒燒灰油調塗燙火傷時珍附方新三中砒毒心腹絞痛欲吐不吐面青肢冷用楊梅樹皮煎湯二三碗服之即愈王碩易簡方風蟲牙痛普濟方用楊梅根皮厚者焙一兩川芎藭五錢麝香少許研末每用半錢鼻內嗅之口中含水涎出痛止摘要方用楊梅根皮韭菜根廚案上油泥等分搗勻貼於兩腮上半時辰其蟲從眼角出也屢用有效之方櫻桃別録上品釋名鶯桃禮注含桃月令荊桃宗奭曰孟詵本草言此乃櫻非桃也雖非桃類以其形肖桃故曰櫻桃又何疑焉如沐猴梨胡桃之類皆取其形相似耳禮記仲春天子以含桃薦宗廟即此故王維詩云才是寢園春薦後非干御苑鳥銜殘藥中不甚用時珍曰其顆如瓔珠故謂之櫻而許慎作鶯桃云鶯所含食故又曰含桃亦通案爾雅云楔音戛荊桃也孫炎注云即今櫻桃最大而甘者謂之崖蜜集解頌曰櫻桃處處有之而洛中者最勝其木多陰先百果熟故古人多貴之其實熟時深紅色者謂之朱櫻紫色皮里有細黃點者謂之紫櫻味最珍重又有正黃明者謂之蠟櫻小而紅者謂之櫻珠味皆不及極大者有若彈丸核細而肉厚尤難得時珍曰櫻桃樹不甚高春初開白花繁英如雪葉團有尖及細齒結子一枝數十顆三月熟時須守護否則鳥食無遺也鹽藏蜜煎皆可或同蜜搗作糕食唐人以酪薦食之林洪山家清供云櫻桃經雨則蟲自內生人莫之見用水浸良久則蟲皆出乃可食也試之果然氣味甘熱澀無毒大明曰平微毒多食令人吐詵曰食多無損但發虛熱耳有暗風人不可食食之立發李鵬飛曰傷筋骨敗血氣有寒熱病人不可食主治調中益脾氣令人好顏色美志別録止泄精水穀痢孟詵發明宗奭曰小兒食之過多無不作熱此果三月末四月初熟得正陽之氣先諸果熟故性熱也震亨曰櫻桃屬火而有土性大熱而發濕舊有熱病及喘嗽者得之立病且有死者也時珍曰案張子和儒門事親云舞水一富家有二子好食紫櫻每日啖一二升半月後長者發肺痿幼者發肺癰相繼而死嗚呼百果之生所以養人非欲害人富貴之家縱其嗜欲取死是何天耶命耶邵堯夫詩云爽口物多終作疾真格言哉觀此則寇朱二氏之言益可證矣王維詩云飽食不須愁內熱大官還有蔗漿寒蓋謂寒物同食猶可解其熱也葉氣味甘平無毒煮老鵝易軟熟主治蛇咬搗汁飲並敷之頌東行根主治煮汁服立下寸白蛔蟲頌枝主治雀卵斑皯同紫萍牙皂白梅肉研和日用洗面時珍花主治面黑粉滓方見李花山嬰桃別録上品校正唐本退入有名未用今移入此釋名朱桃別録麥櫻吳普英豆別録李桃詵曰此嬰桃俗名李桃又名奈桃前櫻桃名櫻非桃也集解別録曰嬰桃實大如麥多毛四月採陰乾弘景曰櫻桃即今朱櫻可煮食者嬰桃形相似而實乖異山間時有之方藥不用時珍曰樹如朱嬰但葉長尖不團子小而尖生青熟黃赤亦不光澤而味惡不堪食實氣味辛平無毒主治止泄腸澼除熱調中益脾氣令人好顏色美志別録止泄精孟詵銀杏日用釋名白果日用鴨腳子時珍曰原生江南葉似鴨掌因名鴨腳宋初始入貢改呼銀杏因其形似小杏而核色白也今名白果梅堯臣詩鴨腳類緑李其名因葉高歐陽修詩絳囊初入貢銀杏貴中州是矣集解時珍曰銀杏生江南以宣城者為勝樹高二三丈葉薄縱理儼如鴨掌形有刻缺面緑背淡二月開花成簇青白色二更開花隨即卸落人罕見之一枝結子百十狀如楝子經霜乃熟爛去肉取核為果其核兩頭尖三稜為雄二稜為雌其仁嫩時緑色久則黃須雌雄同種其樹相望乃結實或雌樹臨水亦可或鑿一孔內雄木一塊泥之亦結陰陽相感之妙如此其樹耐久肌理白膩術家取刻符印云能召使也文選吳都賦注平仲果其實如銀未知即此果否核仁氣味甘苦平澀無毒時珍曰熟食小苦微甘性溫有小毒多食令人臚脹瑞曰多食壅氣動風小兒食多昏霍發驚引疳同鰻鱺魚食患軟風主治生食引疳解酒熟食益人李鵬飛熟食溫肺益氣定喘嗽縮小便止白濁生食降痰消毒殺蟲嚼漿塗鼻面手足去齇疱皯𪒟皴皺及疥癬疳𧈟陰蝨時珍發明時珍曰銀杏宋初始著名而修本草者不收近時方藥亦時用之其氣薄味厚性澀而收色白屬金故能入肺經益肺氣定喘嗽縮小便生搗能浣油膩則其去痰濁之功可類推矣其花夜開人不得見蓋陰毒之物故又能殺蟲消毒然食多則收令太過令人氣壅臚脹昏頓故物類相感志言銀杏能醉人而三元延壽書言白果食滿千個者死又云昔有飢者同以白果代飯食飽次日皆死也附方新十八寒嗽痰喘白果七個煨熟以熟艾作七丸每果入艾一丸紙包再煨香去艾吃祕韞方哮喘痰嗽鴨掌散用銀杏五個麻黃二錢半甘草炙二錢水一鍾半煎八分臥時服又金陵一鋪治哮喘白果定喘湯服之無不效者其人以此起家其方用白果二十一個炒黃麻黃三錢蘇子二錢款冬花法制半夏桑白皮蜜炙各二錢杏仁去皮尖黃芩微炒各一錢半甘草一錢水三鍾煎二鍾隨時分作二服不用薑並攝生方咳嗽失聲白果仁四兩白茯苓桑白皮二兩烏豆半升炒蜜半斤煮熟曬乾為末以乳汁半碗拌濕九蒸九曬丸如緑豆大每服三五十丸白湯下神效余居士方小便頻數白果十四枚七生七煨食之取效止小便白濁生白果仁十枚擂水飲日一服取效止赤白帶下下元虛憊白果蓮肉江米各五錢胡椒一錢半為末用烏骨雞一隻去腸盛藥瓦器煮爛空心食之集簡方腸風下血銀杏煨熟出火氣食之米飲下腸風臟毒銀杏四十九枚去殼生研入百藥煎末和丸彈子大每服二三丸空心細嚼米飲送下戴原禮證治要訣牙齒蟲𧈟生銀杏每食後嚼一二個良永類鈐方手足皴裂生白果嚼爛夜夜塗之鼻面酒齇銀杏酒浮糟同嚼爛夜塗旦洗醫林集要頭面癬瘡生白果仁切斷頻擦取效邵氏經驗方下部疳瘡生白果杵塗之趙原陽陰蝨作癢陰毛際肉中生蟲如蝨或紅或白癢不可忍者白果仁嚼細頻擦之取效劉長春方狗咬成瘡白果仁嚼細塗之乳癰潰爛銀杏半斤以四兩研酒服之以四兩研敷之救急易方水疔暗疔水疔色黃麻木不痛暗疔瘡凸色紅使人昏狂並先刺四畔後用銀杏去殼浸油中年久者搗敷之普濟方胡桃宋開寶釋名羌桃名物志核桃頌曰此果本出羌胡漢時張騫使西域始得種還植之秦中漸及東土故名之時珍曰此果外有青皮肉包之其形如桃胡桃乃其核也羌音呼核如胡名或以此或作核桃梵書名播羅師集解頌曰胡桃生北土今陝洛間甚多大株厚葉多陰實亦有房秋冬熟時採之出陳倉者薄皮多肌出陰平者大而皮脆急捉則碎汴州雖有而實不佳江表亦時有之南方則無時珍曰胡桃樹高丈許春初生葉長四五寸微似大青葉兩兩相對頗作惡氣三月開花如栗花穗蒼黃色結實至秋如青桃狀熟時漚爛皮肉取核為果人多以櫸柳接之案劉恂嶺表録異云南方有山胡桃底平如檳榔皮厚而大堅多肉少穰其殼甚厚須椎之方破然則南方亦有但不佳耳核仁氣味甘平溫無毒頌曰性熱不可多食思邈曰甘冷滑多食動痰飲令人噁心吐水吐食物志曰多食動風脫人眉同酒食多令人咯血穎曰多食生痰動腎火發明震亨曰胡桃屬土而有火性熱本草云甘平是無熱矣然又云動風脫人眉非熱何以傷肺耶時珍曰胡桃仁味甘氣熱皮澀肉潤孫真人言其冷滑誤矣近世醫方用治痰氣喘嗽醋心及癘風諸病而酒家往往醉後嗜之則食多吐水吐食脫眉及酒同食咯血之説亦未必盡然也但胡桃性熱能入腎肺惟虛寒者宜之而痰火積熱者不宜多食耳主治食之令人肥健潤肌黑鬚發多食利小便去五痔搗和胡粉拔白鬚發內孔中則生黑毛燒存性和松脂研敷瘰癧瘡開寶食之令人能食通潤血脈骨肉細膩詵方見下治損傷石淋同破故紙蜜丸服補下焦頌補氣養血潤燥化痰益命門利三焦溫肺潤腸治虛寒喘嗽腰腳重痛心腹疝痛血痢腸風散腫毒發痘瘡制銅毒時珍油胡桃氣味辛熱有毒主治殺蟲攻毒治癰腫癘風疥癬楊梅白禿諸瘡潤鬚髮時珍發明韓懋曰破故紙屬火能使心包與命門之火相通胡桃屬木主潤血養血血屬陰陰惡燥故油以潤之佐破故紙有木火相生之妙故古有云黃柏無知母破故紙無胡桃猶水母之無蝦也時珍曰三焦者元氣之別使命門者三焦之本原蓋一原一委也命門指所居之腑而名為藏精系胞之物三焦指分治之部而名為出納腐熟之司蓋一以體名一以用名其體非脂非肉白膜裹之在七節之旁兩腎之間二系著脊下通二腎上通心肺貫屬於腦為生命之原相火之主精氣之腑人物皆有之生人生物皆由此出靈樞本臟論已著其厚薄緩急直結之狀而扁鵲難經不知原委體用之分以右腎為命門謂三焦有名無狀而高陽生偽撰脈訣承其謬説以誤後人至朱肱南陽活人書陳言三因方論戴起宗脈訣刊誤始著説闢之而知之者尚鮮胡桃仁頗類其狀而外皮水汁皆青黑故能入北方通命門利三焦益氣養血與破故紙同為補下焦腎命之藥夫命門氣與腎通藏精血而惡燥若腎命不燥精氣內充則飲食自健肌膚光澤腸腑潤而血脈通此胡桃佐補藥有令人肥健能食潤肌黑髮固精治燥調血之功也命門既通則三焦利故上通於肺而虛寒喘嗽者宜之下通於腎而腰腳虛痛者宜之內而心腹諸痛可止外而瘡腫之毒可散矣洪氏夷堅志只言胡桃治痰嗽能斂肺蓋不知其為命門三焦之藥也油胡桃有毒傷人咽肺而瘡科取之用其毒也胡桃制銅此又物理之不可曉者洪邁云邁有痰疾因晚對上遣使諭令以胡桃肉三顆生薑三片臥時嚼服即飲湯兩三呷又再嚼桃薑如前數即靜臥必愈邁還玉堂如旨服之及旦而痰消嗽止又溧陽洪輯幼子病痰喘凡五晝夜不乳食醫以危告其妻夜夢觀音授方令服人參胡桃湯輯急取新羅人參寸許胡桃肉一枚煎湯一蜆殼許灌之喘即定明日以湯剝去胡桃皮用之喘復作仍連皮用信宿而瘳此方不載書册蓋人參定喘胡桃連皮能斂肺故也附方舊五新二十七服胡桃法詵曰凡服胡桃不得並食須漸漸食之初日服一顆每五日加一顆至二十顆止周而復始常服令人能食骨肉細膩光潤鬚髮黑澤血脈通潤養一切老痔青娥丸方見草部補骨脂胡桃丸益血補髓強筋壯骨延年明目悅心潤肌能除百病用胡桃仁四兩搗膏入破故紙杜仲萆薢末各四兩杵勻丸梧桐子大每空心溫酒鹽湯任下五十丸御藥院方消腎溢精胡桃丸治消腎病因房欲無節及服丹石或失志傷腎遂致水弱火強口舌乾精自溢出或小便赤黃大便燥實或小便大利而不甚渴用胡桃肉白茯苓各四兩附子一枚去皮切片薑汁蛤粉同焙為末蜜丸梧桐子大每服三十丸米飲下普濟方小便頻數胡桃煨熟臥時嚼之溫酒下石淋痛楚便中有石子者胡桃肉一升細米煮漿粥一升相和頓服即瘥崔元亮海上方風寒無汗發熱頭痛核桃肉蔥白細茶生薑等分搗爛水一鍾煎七分熱服覆衣取汗談野翁方痰喘咳嗽方見發明老人喘嗽氣促睡臥不得服此立定胡桃肉去皮杏仁去皮尖生薑各一兩研膏入煉蜜少許和丸彈子大每臥時嚼一丸薑湯下普濟方産後氣喘胡桃肉人參各二錢水一盞煎七分頓服久嗽不止核桃仁五十個煮熟去皮人參五兩杏仁三百五十個麩炒湯浸去皮研勻入煉蜜丸梧桐子大每空心細嚼一丸人參湯下臨臥再服蕭大尹方食物醋心胡桃爛嚼以生薑湯下立止傳信適用方食酸齒齼細嚼胡桃即解日華子本草誤吞銅錢多食胡桃自化出也胡桃與銅錢共食即成粉可證矣李樓方揩齒烏須胡桃仁燒過貝母各等分為散日用之聖惠眼目暗昏四月內取風落小胡桃每日午時食飽以無根水吞下偃臥覺鼻孔中有泥腥氣為度衛生易簡方赤痢不止胡桃仁枳殼各七個皂角不蛀者一挺新瓦上燒存性研為細末分作八服每臨臥時一服二更一服五更一服荊芥茶下總録血崩不止胡桃肉十五枚燈上燒存性研作一服空心溫酒調下神效急心氣痛核桃一個棗子一枚去核夾桃紙裹煨熟以生薑湯一鍾細嚼送下永久不發名盞落湯趙氏經驗小腸氣痛胡桃一枚燒炭研末熱酒服之奇效良方便毒初起子和儒門事親用胡桃七個燒研酒服不過三服見效楊氏經驗用胡桃三枚夾銅錢一個食之即愈魚口毒瘡端午日午時取樹上青胡桃筐內陰乾臨時全燒為末黃酒服少行一二次有膿自大便出無膿即消二三服平楊氏經驗一切癰腫背癰附骨疽未成膿者胡桃十個煨熟去殼槐花一兩研末杵勻熱酒調服古今録驗疔瘡惡腫胡桃一個平破取仁嚼爛安殼內合在瘡上頻換甚效普濟痘瘡倒陷胡桃肉一枚燒存性干胭脂半錢研勻胡荽煎酒調服儒門事親小兒頭瘡久不愈胡桃和皮燈上燒存性碗蓋出火毒入輕粉少許生油調塗一二次愈保幼大全酒齇鼻赤方見橘核聤耳出汁胡桃仁燒研狗膽汁和作挺子綿裹塞之普濟方傷耳成瘡出汁者用胡桃杵取油納入同上火燒成瘡胡桃仁燒黑研敷梅師方壓撲傷損胡桃仁搗和溫酒頓服便瘥圖經本草疥瘡瘙癢油核桃一個雄黃一錢艾葉杵熟一錢搗勻綿包夜臥裹陰囊立效勿洗集簡方胡桃青皮氣味苦澀無毒主治染髭及帛皆黑志曰仙方取青皮壓油和詹糖香塗毛髮色如漆也附方新五烏髭發胡桃皮蝌蚪等分搗泥塗之一染即黑總録用青胡桃三枚和皮搗細入乳汁三盞於銀石器內調勻搽鬚髮三五次每日用胡桃油潤之良癧瘍風青胡桃皮搗泥入醬清少許硇砂少許合勻先以泔洗後敷之外臺白癜風青胡桃皮一個硫黃一皂子大研勻日日摻之取效嵌甲胡桃皮燒灰貼樹皮主治止水痢春月斫皮汁沐頭至黑煎水可染褐開寶附方新一染鬚髮胡桃根皮一稱蓮子草十斤切以甕盛之入水五斗浸一月去滓熬至五升入蕓薹子油一斗慢火煎取五升收之凡用先以炭灰汁洗用油塗之外以牛蒡葉包住絹裹一夜洗去用七日即黑也聖惠方殼主治燒存性入下血崩中藥時珍榛宋開寶釋名榛古榛字時珍曰案羅氏爾雅翼云禮記鄭玄注云關中甚多此果關中秦地也榛之從秦蓋取此意左傳云女贄不過榛栗棗修以告虔也則榛有臻至之義以其名告己之虔也古作榛從辛從木俗作莘誤矣莘音詵集解志曰榛生遼東山谷樹高丈許子如小栗軍行食之當糧中土亦有鄭玄雲關中鄜坊甚多頌曰桂陽有榛而叢生實大如杏子中仁皮子形色與栗無異但小耳大明曰新羅榛子肥白最良時珍曰榛樹低小如荊叢生冬末開花如櫟花成條下垂長二三寸二月生葉如初生櫻桃葉多皺紋而有細齒及尖其實作苞三五相黏一苞一實實如櫟實下壯上鋭生青熟褐其殼厚而堅其仁白而圓大如杏仁亦有皮尖然多空者故諺云十榛九空按陸機詩疏云榛有兩種一種大小枝葉皮樹皆如栗而子小形如橡子味亦如栗枝莖可以為燭詩所謂樹之榛栗者也一種高丈餘枝葉如木蓼子作胡桃味遼代上黨甚多久留亦易油壞者也仁氣味甘平無毒主治益氣力實腸胃令人不飢健行開寶止飢調中開胃甚驗大明阿月渾子拾遺校正自木部移入此併入海藥無名木皮釋名胡榛子拾遺無名子海藥集解藏器曰阿月渾子生西國諸番與胡榛子同樹一歲胡榛子二歲阿月渾子也珣曰按徐表南州記云無名木生嶺南山谷其實狀若榛子號無名子波斯家呼為阿月渾子也仁氣味辛溫澀無毒主治諸痢去冷氣令人肥健藏器治腰冷陰腎虛弱房中術多用之得木香山茱萸良李珣無名木皮海藥氣味辛大溫無毒主治陰腎萎弱囊下濕癢並煎汁小浴極妙珣櫧子拾遺校正原附鉤栗今析出集解藏器曰櫧子生江南皮樹如栗冬月不凋子小於橡子穎曰櫧子有苦甜二種治作粉食糕食褐色甚佳時珍曰櫧子處處山谷有之其木大者數抱高二三丈葉長大如栗葉稍尖而厚堅光澤鋸齒峭利凌冬不凋三四月開白花成穗如栗花結實大如槲子外有小苞霜後苞裂子墜子圓褐而有尖大如菩提子內仁如杏仁生食苦澀煮炒乃帶甘亦可磨粉甜櫧子粒小木紋細白俗名面櫧苦櫧子粒大木紋粗赤俗名血櫧其色黑者名鐵櫧按山海經云前山有木其名曰櫧郭璞注曰櫧子似柞子可食冬月採之木作屋柱棺材難腐也仁氣味苦澀平無毒時珍曰案正要云酸甘微寒不可多食主治食之不飢令人健行止泄痢破惡血止渴藏器皮葉主治煮汁飲止産婦血藏器嫩葉貼臁瘡一日三換良吳瑞鉤栗拾遺釋名巢鉤子拾遺甜櫧子瑞曰鉤栗即甜櫧子時珍曰鉤櫧二字方音相近其狀如櫟當作鉤櫟集解藏器曰鉤栗生江南山谷木大數圍冬月不凋其子似栗而圓小又有雀子相似而圓黑久食不飢詳櫧子下仁氣味甘平無毒主治食之不飢厚腸胃令人肥健藏器橡實音象唐本草校正自木部移入釋名橡斗説文皂鬥同櫟梂音歷求柞子音作芧杼同序暑二音栩音許禹錫曰案爾雅云栩杼也又曰櫟其實梂孫炎注云栩一名杼也櫟似樗之木也梂盛實之房也其實名橡有梂蝟自裹之詩唐風云集於苞栩秦風云山有苞櫟陸機注云即柞櫟也秦人謂之櫟徐人謂之杼或謂之栩其子謂之皂亦曰皂鬥其殼煮汁可染皂也今京洛河內亦謂之杼蓋五方通語皆一物也時珍曰櫟柞木也實名橡斗皂鬥謂其鬥刓剜象鬥可以染皂也南人呼皂如柞音相近也集解頌曰橡實櫟木子也所在山谷皆有木高二三丈三四月開花黃色八九月結實其實為皂鬥槲櫟皆有鬥而以櫟為勝宗奭曰櫟葉如栗葉所在有之木堅而不堪充材亦木之性也為炭則他木皆不及其殼雖可染皂若曾經雨水者其色淡槲亦有殼但小而不及櫟也時珍曰櫟有二種一種不結實者其名曰棫其木心赤詩云瑟彼柞棫是也一種結實者其名曰栩其實為橡二者樹小則聳枝大則偃蹇其葉如櫧葉而紋理皆斜勾四五月開花如栗花黃色結實如荔枝核而有尖其蒂有鬥包其半截其仁如老蓮肉山人儉歲採以為飯或搗浸取粉食豐年可以肥豬北人亦種之其木高二三丈堅實而重有斑紋點點大者可作柱棟小者可為薪炭周禮職方氏山林宜皂物柞栗之屬即此也其嫩葉可煎飲代茶實修治雷曰霜後收採去殼蒸之從巳至未銼作五片曬乾用周定王曰取子換水浸十五次淘去澀味蒸極熟食之可以濟飢氣味苦微溫無毒主治下痢厚腸胃肥健人蘇恭澀腸止瀉煮食止飢御歉歲大明發明思邈曰橡子非果非谷而最益人服食未能斷谷啖之尤佳無氣而受氣無味而受味消食止痢令人強健不極時珍曰木實為果橡蓋果也儉歲人皆取以御飢昔摯虞入南山飢甚拾橡實而食唐杜甫客秦州採橡栗自給是矣附方新五水穀下痢日夜百餘行者橡實二兩楮葉炙一兩為末每服一錢食前烏梅湯調下聖惠方血痢不止上方加縮砂仁半兩下痢脫肛橡斗子燒存性研末豬脂和敷直指方痔瘡出血橡子粉糯米粉各一升炒黃滾水調作果子飯上蒸熟食之不過四五次效李樓奇方石癰堅硬如石不作膿用橡子一枚以醋於青石上磨汁塗之干則易不過十度即平千金方鬥殼修治大明曰入藥並宜搗細炒焦或燒存性研用氣味澀溫無毒主治為散及煮汁服止下痢並可染皂恭止腸風崩中帶下冷熱瀉痢並染鬚髮大明附方新五下痢脫肛橡斗殼燒存性研末豬脂和搽並煎汁洗之直指方腸風下血橡斗子殼用白梅肉填滿兩個合定鐵線札住煅存性研末每服二錢米飲下一方用硫黃填滿煅研酒服余居士選奇方走馬牙疳橡斗殼入鹽填滿合定燒透出火毒研末入麝香少許先以米泔漱過搽之全幼心鑑風蟲牙痛橡斗五個入鹽在內皂莢一條入鹽在內同煅過研末日擦三五次荊芥湯漱之良經驗良方木皮根皮拾遺氣味苦平無毒主治惡瘡因風犯露致腫者煎汁日洗令膿血盡乃止亦治痢藏器止水痢消瘰癧大明附方新一蝕爛癰腫及疣贅瘤痣柞櫟木灰四斗桑柴灰四斗石灰一斗五升以沸湯調濕甑中蒸一日取釜中沸湯七斗合甑灰淋之取汁再熬至一升投亂頭髮一雞子大消盡又剪五色彩投入消盡瓶盛密收每以少許挑破點之煎時勿令雞犬婦人小兒見普濟方槲實音斛唐本草校正自木部移附此釋名槲樕音速朴樕並爾雅大葉櫟俗櫟橿子時珍曰槲樕猶觳觫也栗子綻懸有顫栗之象故謂之栗槲葉搖動有觳觫之態故曰槲樕也朴樕者婆娑蓬然之貌其樹偃蹇其葉芃芃故也俗稱衣物不整者為朴樕本此其實木強故俗謂之櫟橿子史言武后挂赦書於槲樹人遂呼為金雞樹云集解頌曰槲處處山林有之木高丈餘與櫟相類亦有鬥但小不中用耳不拘時採其皮葉入藥宗奭曰槲亦有鬥木雖堅而不堪充材只宜作柴為炭不及櫟木時珍曰槲有二種一種叢生小者名枹音孚見爾雅一種高者名大葉櫟樹葉俱似栗長大粗厚冬月凋落三四月開花亦如栗八九月結實似橡子而稍短小其蒂亦有鬥其實僵澀味惡荒歲人亦食之其木理粗不及橡木所謂樗櫟之材者指此仁氣味苦澀平無毒主治蒸煮作粉澀腸止痢功同橡子時珍槲若修治頌曰若即葉之名也入藥須微炙令焦氣味甘苦平無毒主治療痔止血及血痢止渴恭活血利小便除面上齇赤時珍附方舊五新三猝然吐血槲葉為末每服二錢水一盞煎七分和滓服簡要濟衆鼻衄不止槲葉搗汁一小盞頓服即止聖惠方腸風血痔熱多者尤佳槲葉微炙研末一錢槐花炒研末一錢米飲調服未止再服寇氏衍義冷淋莖痛槲葉研末每服三錢水一盞蔥白七寸煎六分去滓食前溫服日二聖惠方孩子淋疾槲葉三片煎湯服一雞子殼小便即時下也孫真人方螻蛄漏疾槲葉燒存性研以米泔別浸槲葉取汁洗瘡後乃納灰少許於瘡中聖惠方鼻上齇疱出膿血者以泔水煮槲葉取汁洗之拭乾納槲葉灰少許於中良聖惠腋下胡臭槲若三升切水煮濃汁洗畢即以甘苦瓠殼煙燻之後用辛夷細辛杜衡末醋浸一夜敷之千金方木皮俗名赤龍皮氣味苦澀無毒主治煎服除蠱及漏甚效恭煎湯洗惡瘡良權能吐瘰癧澀五臟大明止赤白痢腸風下血時珍附方舊四新六赤龍皮湯治諸敗爛瘡乳瘡用槲皮切三升水一斗煮五升春夏冷用秋冬溫用洗之洗畢乃敷諸膏肘後附骨疽瘡槲皮燒研米飲每服方寸匕千金方下部生瘡槲皮櫸皮煮汁熬如飴糖以導下部肘後方一切瘻疾千金用槲樹北陰白皮三十斤銼以水一石煮一斗去滓煎如飴又取通都廁上雄鼠屎雌鼠屎各十四枚燒汁盡研和之納溫酒一升和勻瘦人食五合當有蟲出也崔氏纂要用槲白皮切五升水八升煮令泣泣去滓再煎成膏日服棗許並塗瘡上宜食苜蓿鹽飯以助之以瘥為度小兒瘰癧槲樹皮去粗皮切煎湯頻洗之聖惠方蠱毒下血槲木北陰白皮一大握長五寸以水三升煮取一升空腹分服即吐毒出也千金及翼赤白久痢不拘大人小兒用新槲皮一斤去黑皮切以水一斗煎取五升去滓煎膏和酒服子母祕録久痢不止槲白皮薑汁炙五度一兩乾薑炮半兩為末每服二錢米飲調下聖濟總録久瘡不已槲木皮一尺闊六寸切以水一斗煮取五升入白沙糖十挺煎取一升分三服即吐而愈肘後方
