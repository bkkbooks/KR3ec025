body:
  text: 果部第三十一卷果之三夷果類三十一種荔枝宋開寶釋名離枝綱目丹荔頌曰按朱應扶南記云此木結實時枝弱而蒂牢不可摘取必以刀斧劙取其枝故以為名劙音利與劦同時珍曰司馬相如上林賦作離支按白居易云若離本枝一日色變三日味變則離支之名又或取此義也集解頌曰荔枝生嶺南及巴中今閩之泉福漳州興化軍蜀之嘉蜀渝涪州及二廣州郡皆有之其品以閩中為第一蜀川次之嶺南為下其木高二三丈自徑尺至於合抱類桂木冬青之屬緑葉蓬蓬然四時榮茂不凋其木性至堅徑土人取其根作阮咸槽及彈棋局其花青白狀若冠之蕤綏其子喜雙實狀如初生松球殼有皺紋如羅初青漸紅肉色淡白如肪玉味甘而多汁夏至將中則子翕然俱赤乃可食也大樹下子至百斛五六月盛熟時彼方皆燕會其下以賞之極量取啖雖多亦不傷人稍過則飲蜜漿便解荔枝始傳於漢世初惟出嶺南後出蜀中故左思蜀都賦云旁挺龍目側生荔枝唐白居易圖序論之詳矣今閩中四郡所出特奇蔡襄譜其種類至三十餘品肌肉甚厚甘香瑩白非廣蜀之比也福唐歲貢白曝荔枝蜜煎荔枝肉俱為上方珍果白曝須嘉實乃堪其市貨者多用雜色荔枝入鹽梅曝成皮色深紅味亦少酸殊失本真經曝則可經歲商販流布遍及華夏味猶不歇百果之盛皆不及此又有焦核荔枝核如雞舌香味更甜美或云是木生背陽結實不完就者又有緑色蠟色皆其品之奇者本土亦自難得其蜀嶺荔枝初生小酢肉薄核大不堪白曝花及根亦入藥藏器曰顧微廣州記云荔枝冬夏常青其實大如雞卵殼朱肉白核黃黑色似半熟蓮子精者核如雞舌香甘美多汁極益人也時珍曰荔枝炎方之果性最畏寒易種而根浮其木甚耐久有經數百年猶結實者其實生時肉白干時肉紅日曬火烘滷浸蜜煎皆可致遠成朵曬乾者謂之荔錦按白居易荔枝圖序云荔枝生巴峽間樹形團團如帷蓋葉如冬青花如橘而春榮實如丹而夏熟朵如蒲桃核如枇杷殼如紅繒膜如紫綃瓤肉潔白如冰雪漿液甘酸如醴酪大略如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣又蔡襄荔枝譜云廣蜀所出早熟而肉薄味甘酸不及閩中下等者閩中惟四郡有之福州最多興化最奇泉漳次之福州延亙原野一家甚至萬株興化上品大徑寸余香氣清遠色紫殼薄瓤厚膜紅核如丁香母剝之如水精食之如絳雪荔枝以甘為味雖百千樹莫有同者過甘與淡皆失於中若夫厚皮尖刺肌理黃色附核而赤食之有渣食已而澀雖無酢味亦自下等矣最忌麝香觸之花實盡落也又洪邁夷堅志云莆田荔枝名品皆出天成雖以其核種之亦失本體形狀百出不可以理求也沈括筆談謂焦核荔枝乃土人去其大根燔焦種成者大不然也珣曰荔枝樹似青木香熟時人未採則百蟲不敢近人才採之烏鳥蝙蝠之類無不傷殘之也故採荔枝者必日中而衆採之一日色變二日味變三日色味俱變故古詩云色味不逾三日變也實氣味甘平無毒珣曰甘酸熱多食令人發虛熱李鵬飛曰生荔枝多食發熱煩渴口乾衄血頌曰多食不傷人如稍過度飲蜜漿一杯便解也時珍曰荔枝氣味純陽其性畏熱鮮者食多即齦腫口痛或衄血也病齒𧈟及火病人尤忌之開寶本草言其性平蘇氏謂多食無傷皆謬説也按物類相感志云食荔枝多則醉以殼浸水飲之即解此即食物不消還以本物消之之意主治止渴益人顏色開寶食之止煩渴頭重心躁背膊勞悶李珣通神益智健氣孟詵治瘰癧瘤贅赤腫疔腫發小兒痘瘡時珍發明震亨曰荔枝屬陽主散無形質之滯氣故消瘤贅赤腫者用之苟不明此雖用之無應附方新六痘瘡不發荔枝肉浸酒飲並食之忌生冷聞人規痘疹論疔瘡惡腫普濟方用荔枝五個或三個不用雙數以狗糞中米淘淨為末與糯米粥同研成膏攤紙上貼之留一孔出毒氣濟生祕覽用荔枝肉白梅各三個搗作餅子貼於瘡上根即出也風牙疼痛普濟用荔枝連殼燒存性研末擦牙即止乃治諸藥不效仙方也孫氏集效方用大荔枝一個剔開填鹽滿殼煅研搽之即愈厄逆不止荔枝七個連皮核燒存性為末白湯調下立止楊拱醫方摘要核氣味甘溫澀無毒主治心痛小腸氣痛以一枚煨存性研末新酒調服宗奭治㿗疝氣痛婦人血氣刺痛時珍發明時珍曰荔枝核入厥陰行散滯氣其實雙結而核肖睪丸故其治㿗疝卵腫有述類象形之義附方新六脾痛不止荔枝核為末醋服二錢數服即愈衛生易簡方婦人血氣刺痛用荔枝核燒存性半兩香附子炒一兩為末每服二錢鹽湯米飲任下名蠲痛散婦人良方疝氣㿗腫孫氏用荔枝核炒黑色大茴香炒等分為末每服一錢溫酒下皆效方玉環來笑丹用荔枝核四十九個陳皮連白九錢硫黃四錢為末鹽水打麵糊丸緑豆大遇痛時空心酒服九丸良久再服不過三服甚效如神亦治諸氣痛陰腎腫痛荔枝核燒研酒服二錢腎腫如斗荔枝核青橘皮茴香等分各炒研酒服二錢日三殼主治痘瘡出不爽快煎湯飲之又解荔枝熱浸水飲時珍附方新一赤白痢荔枝殼橡斗殼炒石榴皮炒甘草炙各等分每以半兩水一盞半煎七分溫服日二服普濟方花及皮根主治喉痹腫痛用水煮汁細細含咽取瘥止蘇頌出崔元亮海上方龍眼本經中品校正自木部移入此宗奭曰龍眼專為果未見入藥本草編入木部非矣釋名龍目吳普圓眼俗名益智本經亞荔枝開寶荔枝奴驪珠燕卵蜜脾鮫淚川彈子南方草木狀時珍曰龍眼龍目象形也吳普本草謂之龍目又曰比目曹憲博雅謂之益智弘景曰廣州有龍眼非益智也恐彼人別名耳志曰甘味歸脾能益人智故名益智非今之益智子也頌曰荔枝才過龍眼即熟故南人目為荔枝奴又名木彈曬乾寄遠北人以為佳果目為亞荔枝集解別録曰龍眼生南海山谷一名益智其大者似檳榔恭曰龍眼樹似荔枝葉若林檎花白色子如檳榔有鱗甲大如雀卵頌曰今閩廣蜀道出荔枝處皆有之嵇含南方草木狀云木高一二丈似荔枝而枝葉微小凌冬不凋春末夏初開細白花七月實熟殼青黃色紋作鱗甲形圓大如彈丸核若木梡子而不堅肉薄於荔枝白而有漿其甘如蜜實極繁每枝三二十顆作穗如蒲桃漢時南海常貢之大為民害臨武長唐羌上書言狀和帝感其言下詔止之時珍曰龍眼正圓別録蘇恭比之檳榔殊不類也其木性畏寒白露後方可採摘曬焙令乾成朵乾者名龍眼錦按范成大桂海志有山龍眼出廣中色青肉如龍眼夏月實熟可啖此亦龍眼之野生者歟實氣味甘平無毒恭曰甘酸溫李鵬飛曰生者沸湯瀹過食不動脾主治五臟邪氣安志厭食除蠱毒去三蟲久服強魂聰明輕身不老通神明本經開胃益脾補虛長智時珍發明時珍曰食品以荔枝為貴而資益則龍眼為良蓋荔枝性熱而龍眼性和平也嚴用和濟生方治思慮勞傷心脾有歸脾湯取甘味歸脾能益人智之義附方新一歸脾湯治思慮過度勞傷心脾健忘怔忡虛煩不眠自汗驚悸用龍眼肉酸棗仁炒黃耆炙白朮焙茯神各一兩木香人參各半兩炙甘草二錢半㕮咀每服五錢薑三片棗一枚水二鍾煎一鍾溫服濟生方核主治胡臭六枚同胡椒二七枚研遇汗出即擦之時珍龍荔綱目釋名見下集解時珍曰按范成大桂海志云龍荔出嶺南狀如小荔枝而肉味如龍眼其木之身葉亦似二果故名曰龍荔三月開小白花與荔枝同時熟不可生啖但可蒸食實主治甘熱有小毒生食令人發癇或見鬼物時珍出桂海志橄欖宋開寶釋名青果梅聖俞集忠果記事珠諫果出農書時珍曰橄欖名義未詳此果雖熟其色亦青故俗呼青果其有色黃者不堪病物也王禎云其味苦澀久之方回甘味王元之作詩比之忠言逆耳世亂乃思之故人名為諫果集解志曰橄欖生嶺南樹似木槵子樹而高端直可愛結子形如生訶子無稜瓣八月九月採之又有一種波斯橄欖生雍州色類相似但核作兩瓣蜜漬食之詵曰其樹大數圍實長寸許先生者向下後生者漸高熟時生食味酢蜜漬極甜珣曰按南州異物志云閩廣諸郡及緣海浦嶼間皆有之樹高丈餘葉似櫸柳二月開花八月成實狀如長棗兩頭尖青色核亦兩頭尖而有稜核內有三竅竅中有仁可食頌曰按劉恂嶺表録異云橄欖樹枝皆高聳其子深秋方熟南人重之生咀嚼之味雖苦澀而芬香勝於含雞舌香也有野生者子繁而樹峻不可梯緣但刻根下方寸許納鹽入內一夕子皆自落木亦無損其枝節間有脂膏如桃膠南人採取和皮葉煎汁熬如黑餳謂之欖糖用泥船隙牢如膠漆著水益干也時珍曰橄欖樹高將熟時以木釘釘之或納鹽少許於皮內其實一夕自落亦物理之妙也其子生食甚佳蜜漬鹽藏皆可致遠其木脂狀如黑膠者土人採取爇之清烈謂之欖香雜以牛皮膠者即不佳矣又有緑欖色緑烏欖色青黑肉爛而甘取肉捶碎干放自有霜如白鹽謂之欖醬青欖核內仁干小惟烏欖仁最肥大有文層疊如海螵蛸狀而味甘美謂之欖仁又有一種方欖出廣西兩江洞中似橄欖而有三角或四角即是波斯橄欖之類也實氣味酸甘溫無毒宗奭曰味澀良久乃甘震亨曰味澀而甘醉飽宜之然性熱多食能致上壅時珍曰橄欖鹽過則不苦澀同栗子食甚香按延壽書云凡食橄欖必去兩頭其性熱也過白露摘食庶不病痁主治生食煮飲並消酒毒解鯸鮐魚毒開寶嚼汁咽之治魚鯁宗奭生啖煮汁能解諸毒蘇頌開胃下氣止瀉大明生津液止煩渴治咽喉痛咀嚼咽汁能解一切魚鱉毒時珍發明志曰鯸鮐魚即河豚也人誤食其肝及子必迷悶至死惟橄欖及木煮汁能解之其木作舟楫撥著魚皆浮出故知物有相畏如此者時珍曰按名醫録云吳江一富人食鱖魚被鯁橫在胸中不上不下痛聲動鄰里半月餘幾死忽遇漁人張九令取橄欖與食時無此果以核研末急流水調服骨遂下而愈張九云我父老相傳橄欖木作取魚棹篦魚觸著即浮出所以知魚畏橄欖也今人煮河豚團魚皆用橄欖乃知橄欖能治一切魚鱉之毒也附方新四初生胎毒小兒落地時用橄欖一個燒研硃砂末五分和勻嚼生脂麻一口吐唾和藥絹包如棗核大安兒口中待咂一個時頃方可與乳此藥取下腸胃穢毒令兒少疾及出痘稀少也孫氏集效方唇裂生瘡橄欖炒研豬脂和塗之牙齒風疳膿血有蟲用橄欖燒研入麝香少許貼之聖惠方下部疳瘡橄欖燒存性研末油調敷之或加孩兒茶等分乾坤生意欖仁氣味甘平無毒主治唇吻燥痛研爛敷之開寶核氣味甘澀溫無毒主治磨汁服治諸魚骨鯁及食鱠成積又治小兒痘瘡倒黶燒研服之治下血時珍附方新三腸風下血橄欖核燈上燒存性研末每服二錢陳米飲調下仁齋直指方陰腎㿗腫橄欖核荔枝核山楂核等分燒存性研末每服二錢空心茴香湯調下耳足凍瘡橄欖核燒研油調塗之乾坤生意木威子拾遺釋名未詳集解藏器曰木威生嶺南山谷樹高丈餘葉似楝葉子如橄欖而堅亦似棗削去皮可為粽食時珍曰木威子橄欖之類也陳氏説出顧微廣州記中而梁元帝金樓子云橄欖樹之南向者為橄欖東向者為木威此亦傳聞謬説也實氣味酸辛無毒時珍曰按廣州記云苦澀主治心中惡水水氣藏器庵摩勒唐本校正自木部移入此釋名余甘子唐本庵摩落迦果藏器曰梵書名庵摩勒又名摩勒落迦果其味初食苦澀良久更甘故曰余甘集解恭曰庵摩勒生嶺南交廣愛等州樹葉細似合昏其花黃實似李奈青黃色核圓有稜或六或七其中仁亦入藥用珣曰生西國者大小如枳橘子狀頌曰余甘子今二廣諸郡及西川戎瀘蠻界山谷皆有之木高一二丈枝條甚軟葉青細密朝開暮斂如夜合而葉微小春生冬凋三月有花著條而生如粟粒微黃隨即結實作莛每條三兩子至冬而熟如李子狀青白色連核作五六瓣干即並核皆裂俗作果子啖之時珍曰余甘泉州山中亦有之狀如川楝子味類橄欖亦可蜜漬鹽藏其木可制器物按陳祈暢異物志云余甘樹葉如夜合及槐葉其枝如柘其花黃其子圓大如彈丸色微黃有紋理如定陶瓜核有五六稜初入口苦澀良久飲水更甘鹽而蒸之尤美其説與兩蘇所言相合而臨海異物志云余甘子如梭形大如梅子其核兩頭鋭與橄欖一物異名也然橄欖形長尖余甘形圓稍有不同葉形亦異蓋二物也又蘇恭言其仁可入藥而未見主治何病豈亦與果同功耶實氣味甘寒無毒珣曰苦酸甘微寒澀主治風虛熱氣唐本補益強氣合鐵粉一斤用變白不老取子壓汁和油塗頭生髮去風癢令發生如漆黑也藏器主丹石傷肺上氣咳嗽久服輕身延年長生服乳石人宜常食之李珣為末點湯服解金石毒宗奭解硫黃毒時珍出益部方物圖發明宗奭曰黃金得余甘則體柔亦物類相感相伏也故能解金石之毒云仁毗梨勒唐本草校正自木部移入此釋名三果珣曰木似訶梨勒而子亦相似但圓而毗故以名之毗即臍也集解恭曰毗梨勒出西域及南海諸國嶺南交愛等州戎人謂之三果樹似胡桃子形亦似胡桃核似訶梨勒而圓短無稜用亦同法番人以此作漿甚熱實氣味苦寒無毒珣曰味苦帶澀微溫無毒作漿性熱主治風虛熱氣功同庵摩勒唐本暖腸腹去一切冷氣作漿染鬚髮變黑色甄權下氣止瀉痢大明燒灰乾血有效李珣發明時珍曰毗梨勒古方罕用惟千金方補腎鹿角丸用三果漿吞之云無則以酒代之則此果亦余甘之類而性稍溫澀也附方新一大風發脫毗梨勒燒灰頻擦有效聖惠方沒離梨集解藏器曰沒離梨生西南諸國似毗梨勒上有毛少許也實氣味辛平無毒珣曰微溫主治上氣下食藏器主消食澀腸下氣及上氣咳嗽並宜入面藥李珣五斂子綱目釋名五稜子桂海志陽桃時珍曰按稽含草木狀云南人呼稜為斂故以為名集解時珍曰五斂子出嶺南及閩中閩人呼為陽桃其大如拳其色青黃潤緑形甚詭異狀如田家碌碡上有五稜如刻起作劍脊形皮肉脆軟其味初酸久甘其核如奈五月熟一樹可得數石十月再熟以蜜漬之甘酢而美俗亦曬乾以充果食又有三廉子蓋亦此類也陳祈暢異物志云三廉出熙安諸郡南人呼稜為廉雖名三廉或有五六稜者食之多汁味甘且酸尤宜與衆果參食實氣味酸甘澀平無毒主治風熱生津止渴時珍五子實綱目集解時珍曰五子樹今潮州有之按裴淵廣州記云五子實大如梨而內有五核故名實氣味甘溫無毒主治霍亂金瘡宜食之時珍潮州志棐實別録下品校正時珍曰別録木部有棐實又有棑華神農本草魚蟲部有柀子宋開寶本草退柀子入有名未用今據蘇恭之説合併於下釋名柀子音彼神農赤果日用玉棐日用玉山果時珍曰棐亦作棑其木名文木斐然章採故謂之棐信州玉山縣者為佳故蘇東坡詩云彼美玉山果粲為金盤實柀子見下瑞曰土人呼為赤果亦曰玉棐集解別録曰棐實生永昌彼子生永昌山谷弘景曰彼子亦名羆子從來無用者古今諸醫不復識之棐實出東陽諸郡恭曰彼子當從木作柀子誤入蟲部也爾雅柀亦名煔其葉似杉木如柏而微軟子名棐子宜入果部又注棐實云即蟲部彼子也其木大連抱高數仞其葉似杉其木如柏其理似松肌細軟堪為器用宗奭曰棐實大如橄欖殼色紫褐而脆其中子有一重黑粗衣其仁黃白色嚼久漸甘美也藏器曰棑華即棐子之華也棑與棐同棐樹似杉子如長檳榔食之肥美本經蟲部有彼子陶氏復於木部出棐實棑華皆一物也穎曰棐有一種粗棐其木與棐相似但理粗色赤耳其子稍肥大僅圓不尖神農本草柀子即粗棐也時珍曰棐生深山中人呼為野杉按羅願爾雅翼云柀似杉而異於杉彼有美實而木有文采其木似桐而葉似杉絶難長木有牝牡牡者華而牝者實冬月開黃圓花結實大小如棗其核長如橄欖核有尖者不尖者無稜而殼薄黃白色其仁可生啖亦可焙收以小而心實者為佳一樹不下數十斛陶氏不識柀子惟蘇恭能辨為一物也棐實別録氣味甘平澀無毒瑞曰性熱同鵝肉食生斷節風又上壅人忌火氣時珍曰按物類相感志云棐煮素羹味更甜美豬脂炒棐黑皮自脫棐子同甘蔗食其渣自軟又云棐子皮反緑豆能殺人也主治常食治五痔去三蟲蠱毒鬼疰惡毒別録食之療寸白蟲弘景消穀助筋骨行營衛明目輕身令人能食多食一二升亦不發病孟詵多食滑腸五痔人宜之宗奭治咳嗽白濁助陽道生生編柀子本經舊作彼氣味甘溫有毒主治腹中邪氣去三蟲蛇螫蠱毒鬼疰伏尸本經發明震亨曰棐子肺家果也火炒食之香酥甘美但多食則引火入肺大腸受傷爾原曰棐子殺腹間大小蟲小兒黃瘦有蟲積者宜食之蘇東坡詩云驅除三彭蟲已我心腹疾是矣時珍曰棐實柀子治療相同當為一物無疑但本經柀子有毒似有不同亦因其能殺蟲蠱爾汪穎以粗棐為柀子終是一類不甚相遠也附方舊一新五寸白蟲詵曰日食棐子七顆滿七日蟲皆化為水也外臺祕要用棐子一百枚去皮火燃啖之經宿蟲消下也胃弱者啖五十枚好食茶葉面黃者每日食棐子七枚以愈為度楊起簡便方令發不落棐子三個胡桃二個側柏葉一兩搗浸雪水梳頭發永不落且潤也聖惠方猝吐血出先食蒸餅兩三個以棐子為末白湯服三錢日三服聖濟總録尸咽痛癢語言不出棐實半兩蕪荑一兩杏仁桂各半兩為末蜜丸彈子大含咽聖濟總録棑華別録春月生採之藏器曰即棐子華也氣味苦主治水氣去赤蟲令人好色不可久服別録海松子宋開寶釋名新羅松子集解志曰海松子狀如小栗三角其中仁香美東夷當果食之亦代麻腐食之與中國松子不同炳曰五粒松一叢五葉如叉道家服食絶粒子如巴豆新羅往往進之頌曰五粒字當作五鬣音傳訛也五鬣為一叢或有兩鬣七鬣者松歲久則實繁中原雖有小而不及塞上者佳好也瑞曰松子有南松北松華陰松形小殼薄有斑極香新羅者肉甚香美時珍曰海松子出遼東及雲南其樹與中國松樹同惟五葉一叢者球內結子大如巴豆而有三稜一頭尖爾久收亦油馬志謂似小栗殊失本體中國松子大如柏子亦可入藥不堪果食詳見木部松下按段成式酉陽雜俎云豫種五鬣松二株根大如碗結實與新羅南詔者無別其三鬣者俗呼孔雀松亦有七鬣者或云三針者為栝子松五針者為松子松仁氣味甘小溫無毒珣曰新羅松子甘美大溫去皮食之甚香與雲南松子不同雲南松子似巴豆其味不及與卑占國偏桃仁相似多食發熱毒時珍曰按醫説云食胡羊肉不可食松子而物類相感志云凡雜色羊肉入松子則無毒其説不同何哉主治骨節風頭眩去死肌變白散水氣潤五臟不飢開寶逐風痹寒氣虛羸少氣補不足潤皮膚肥五臟大明主諸風溫腸胃久服輕身延年不老李珣潤肺治燥結咳嗽時珍同柏子仁治虛祕宗奭發明時珍曰服食家用松子皆海松子曰中國松子肌細力薄只可入藥耳按列仙傳云偓佺好食松實體毛數寸走及奔馬又犢子少在黑山食松子茯苓壽數百歲又赤松子好食松實天門冬石脂齒落更生發落更出莫知所終皆指此松子也附方舊一新三服松子法七月取松實過時即落難收也去木皮搗如膏收之每服雞子大酒調下日三服百日身輕三百日行五百里絶谷久服神仙渴即飲水亦可以煉過鬆脂同服之聖惠方肺燥咳嗽蘇遊鳳髓湯用松子仁一兩胡桃仁二兩研膏和熟蜜半兩收之每服二錢食後沸湯點服外臺祕要小兒寒嗽或作壅喘用松子仁五個百部炒麻黃各三分杏仁四十個去皮尖以少水略煮三五沸化白砂糖丸芡子大每食後含化十丸大妙錢乙小兒方大便虛祕松子仁柏子仁麻子仁等分研泥溶白蠟和丸梧桐子大每服五十丸黃耆湯下寇宗奭檳榔別録中品校正自木部移入此釋名賓門李當之藥對仁頻音賓洗瘴丹時珍曰賓與郎皆貴客之稱稽含南方草木狀言交廣人凡貴勝族客必先呈此果若邂逅不設用相嫌恨則檳榔名義蓋取於此雷斆炮炙論謂尖者為檳圓者為榔亦似強説又顏師古注上林賦云仁頻即檳榔也詵曰閩中呼為橄欖子集解別録曰檳榔生南海弘景曰此有三四種出交州者形小味甘廣州以南者形大味澀又有大者名豬檳榔皆可作藥小者名蒳子俗呼為檳榔孫亦可食恭曰生交州愛州及崑崙頌曰今嶺外州郡皆有之木大如桄榔而高五七丈正直無枝皮似青桐節似桂枝葉生木顛大如盾頭又似芭蕉葉其實作房從葉中出旁有刺若棘針重疊其下一房數百實如雞子狀皆有皮殼其實春生至夏乃熟肉滿殼中色正白蘇恭言其肉極易爛不經數日今入北者皆先以灰煮熟焙熏令乾始可留久也小而味甘者名山檳榔大而味澀核亦大者名豬檳榔最小者名蒳子雷氏言尖長而有紫紋者名檳圓大而矮者名榔榔力大而檳力小今醫家亦不細分但以作雞心狀正穩心不虛破之作錦紋者為佳爾嶺南人啖之以當果食言南方地濕不食此無以祛瘴癘也生食其味苦澀得扶留藤與瓦屋子灰同咀嚼之則柔滑甘美也劉恂嶺表録異云真檳榔來自舶上今交廣生者皆大腹子也彼中悉呼為檳榔或云檳榔難得真者今賈人所貨者皆是大腹檳榔也與檳榔相似但莖葉干小異爾連皮收之時珍曰檳榔樹初生若筍竿積硬引莖直上莖幹頗似桄榔椰子而有節旁無枝柯條從心生端頂有葉如甘蕉條派開破風至則如羽扇掃天之狀三月葉中腫起一房因自拆裂出穗凡數百顆大如桃李又生刺重纍於下以護衛其實五月成熟剝去其皮煮其肉而干之皮皆筋絲與大腹皮同也按漢喻益期與韓康伯箋云檳榔子既非常木亦特異大者三圍高者九丈葉聚樹端房構葉下華秀房中子結房外其擢穗似禾其綴實似谷其皮似桐而厚其節似竹而概其內空其外徑其屈如伏虹其申如縋繩本不大末不小上不傾下不斜調直亭亭千百如一步其林則寥朗庇其陰則蕭條信可長吟遠想但性不耐霜不得北植必當遐樹海南遼然萬里弗遇長者之目令人恨深也又竺法真羅山疏云山檳榔一名蒳子生日南樹似栟櫚而小與檳榔同狀一叢十餘干一干十餘房一房數百子子長寸余五月採之味近苦甘觀此則山檳榔即蒳子豬檳榔即大腹子也蘇頌以味甘者為山檳榔澀者為豬檳榔似欠分明檳榔子修治斆曰頭圓矮毗者為榔形尖紫紋者為檳檳力小榔力大凡使用白檳及存坐穩正心堅有錦紋者為妙半白半黑並心虛者不入藥用以刀刮去底細切之勿令經火恐無力若熟使不如不用時珍曰近時方藥亦有以火煨焙用者然初生白檳榔須本境可得若他處者必經煮熏安得生者耶又檳榔生食必以扶留藤古賁灰為使相合嚼之吐去紅水一口乃滑美不澀下氣消食此三物相去甚遠為物各異而相成相合如此亦為異矣俗謂檳榔為命賴扶留以此古賁灰即蠣蚌灰也賁乃蚌字之訛瓦屋子灰亦可用氣味苦辛溫澀無毒甄權曰味甘大寒大明曰味澀弘景曰交州者味甘廣州者味澀珣曰白者味甘赤者味苦元素曰味辛而苦純陽也無毒詵曰多食亦發熱主治消穀逐水除痰澼殺三蟲伏尸療寸白別録治腹脹生搗末服利水穀道敷瘡生肌肉止痛燒灰敷口吻白瘡蘇恭宣利五臟六腑壅滯破胸中氣下水腫治心痛積聚甄權除一切風下一切氣通關節利九竅補五勞七傷健脾調中除煩破癥結大明主賁豚膀胱諸氣五膈氣風冷氣腳氣宿食不消李珣治衝脈為病氣逆裡急好古治瀉痢後重心腹諸痛大小便氣祕痰氣喘急療諸瘧御瘴癘時珍發明元素曰檳榔味厚氣輕沉而降陰中陽也苦以破滯辛以散邪泄胸中至高之氣使之下行性如鐵石之沉重能墜諸藥至於下極故治諸氣後重如神也時珍曰按羅大經鶴林玉露云嶺南人以檳榔代茶御瘴其功有四一曰醒能使之醉蓋食之久則熏然頰赤若飲酒然蘇東坡所謂紅潮登頰醉檳榔也二曰醉能使之醒蓋酒後嚼之則寬氣下痰餘酲頓解朱晦庵所謂檳榔收得為祛痰也三曰飢能使之飽四曰飽能使之飢蓋空腹食之則充然氣盛如飽飽後食之則飲食快然易消又且賦性疏通而不泄氣稟味嚴正而更有餘甘有是德故有是功也又按吳興章傑瘴説云嶺表之俗多食檳榔日至十數夫瘴癘之作率因飲食過度氣痞積結而檳榔最能下氣消食去痰故人狃於近利而暗於遠患也夫嶠南地熱四時出汗人多黃瘠食之則臟器疏泄一旦病瘴不敢發散攻下豈盡氣候所致檳榔蓋亦為患殆未思爾又東陽盧和云閩廣人常服檳榔云能祛瘴有瘴服之可也無瘴而服之寧不損正氣而有開門延寇之禍乎南人喜食此果故備考諸説以見其功過焉又朱晦庵檳榔詩云憶昔南遊日初嘗面發紅藥囊知有用茗碗詎能同蠲疾收殊效修真録異功三彭如不避糜爛七非中亦與其治疾殺蟲之功而不滿其代茶之俗也附方舊十一新十五痰涎為害檳榔為末白湯每服一錢御藥院方嘔吐痰水白檳榔一顆煨熱橘皮二錢半炙為末水一盞煎半盞溫服千金醋心吐水檳榔四兩橘皮一兩為末每服方寸匕空心生蜜湯調下梅師方傷寒痞滿陰病下早成痞按之虛軟而不痛檳榔枳實等分為末每服二錢黃連煎湯下宣明方傷寒結胸已經汗下後者檳榔二兩酒二盞煎一盞分二服龐安時傷寒論蛔厥腹痛方同上心脾作痛雞心檳榔高良薑各一錢半陳米百粒同以水煎服之直指膀胱諸氣檳榔二枚一生一熟為末酒煎服之良此太醫秦鳴鶴方也海藥本草本臟氣痛雞心檳榔以小便磨半個服或用熱酒調末一錢服之斗門方腰重作痛檳榔為末酒服一錢斗門方腳氣壅痛以沙牛尿一盞磨檳榔一枚空心暖服梅師腳氣論腳氣衝心悶亂不識人用白檳榔十二分為末分二服空心暖小便五合調下日二服或入薑汁溫酒同服廣利腳氣脹滿非冷非熱或老人弱人病此用檳榔仁為末以檳榔殼煎汁或茶飲蘇湯或豉汁調服二錢甚利外臺祕要乾霍亂病心腹脹痛不吐不利煩悶欲死用檳榔末五錢童子小便半盞水一盞煎服聖濟總録大腸濕祕腸胃有濕大便祕塞大檳榔一枚麥門冬煎湯磨汁溫服或以蜜湯調末二錢服亦可普濟大小便閟檳榔為末蜜湯調服二錢或以童子小便蔥白同煎服之亦良普濟方小便淋痛麵煨檳榔赤芍藥各半兩為末每服三錢入燈心水煎空心服日二服十便良方血淋作痛檳榔一枚以麥門冬煎湯細磨濃汁一盞頓熱空心服日二服蟲痔裡急檳榔為末每日空心以白湯調服二錢寸白蟲病檳榔二七枚為末先以水二升半煮檳榔皮取一升空心調末方寸匕服之經日蟲盡出未盡再服以盡為度千金方諸蟲在臟久不瘥者檳榔半兩炮為末每服一錢至二錢空心以蔥蜜煎湯調服簡要濟衆金瘡噁心白檳榔四兩橘皮一兩為末每空心生蜜湯服二錢聖惠方丹從臍起檳榔末醋調敷之本事方小兒頭瘡水磨檳榔曬取粉和生油塗之聖惠方口吻生瘡檳榔燒研入輕粉末敷之良聖惠方聤耳出膿檳榔末吹之鮑氏方大腹子宋開寶校正自木部移入此釋名大腹檳榔圖經豬檳榔時珍曰大腹以形名所以別雞心檳榔也集解志曰大腹生南海諸國所出與檳榔相似莖葉根干小異耳弘景曰向陽者為檳榔向陰者為大腹時珍曰大腹子出嶺表滇南即檳榔中一種腹大形扁而味澀者不似檳榔尖長味良耳所謂豬檳榔者是矣蓋亦土産之異今人不甚分別陶氏分陰陽之説亦是臆見按劉恂嶺表録異云交廣生者非舶上檳榔皆大腹子也彼中悉呼為檳榔自嫩及老採實啖之以扶留藤瓦屋灰同食之以祛瘴癘收其皮入藥皮外黑色皮內皆筋絲如椰子皮又雲南記云大腹檳榔每枝有三二百顆青時剖之以一片蔞葉及蛤粉卷和食之即減澀味觀此二説則大腹子與檳榔皆可通用但力比檳榔稍劣耳大腹子氣味辛澀溫無毒主治與檳榔同功時珍大腹皮修治思邈曰鴆鳥多集檳榔樹上凡用檳榔皮宜先以酒洗後以大豆汁再洗過曬乾入灰火燒煨切用氣味辛微溫無毒主治冷熱氣攻心腹大腸壅毒痰膈醋心並以薑鹽同煎入疏氣藥用之良開寶下一切氣止霍亂通大小腸健脾開胃調中大明降逆氣消肌膚中水氣浮腫腳氣壅逆瘴瘧痞滿胎氣惡阻脹悶時珍附方新二漏瘡惡穢大腹皮煎湯洗之直指烏癩風瘡大腹子生者或乾者連全皮勿傷動以酒一升浸之慢火熬干為末臘豬脂和敷聖濟總録椰子宋開寶校正自木部移入此釋名越王頭綱目胥余時珍曰按稽含南方草木狀云相傳林邑王與越王有怨使刺客乘其醉取其首懸於樹化為椰子其核猶有兩眼故俗謂之越王頭而其漿猶如酒也此説雖謬而俗傳以為口實南人稱其君長為爺則椰名蓋取於爺義也相如上林賦作胥余或作胥耶集解志曰椰子生安南樹如棕櫚子中有漿飲之得醉頌曰椰子嶺南州郡皆有之郭義恭廣志云木似桄榔無枝條高數丈葉在木末如束蒲其實大如瓠垂於枝間如挂物然實外有粗皮如棕包皮內有堅殼圓而微長殼內有膚白如豬肪厚半寸許味如胡桃膚內裹漿四五合如乳飲之冷而動氣醺人殼可為器肉可糖煎寄遠作果甚佳珣曰按劉欣期交州記云椰樹狀若海棕實大如碗外有粗皮如大腹子豆寇之類內有漿似酒飲之不醉生雲南者亦好宗奭曰椰子開之有汁白色如乳如酒極香別是一種氣味強名為酒中有白瓤形圓如栝蔞上起細壠亦白色而微虛其紋若婦人裙褶味亦如汁與著殼一重白肉皆可糖煎為果其殼可為酒器如酒中有毒則酒沸起或裂破今人漆其里即失用椰子之意時珍曰椰子乃果中之大者其樹初栽時用鹽置根下則易發木至斗大方結實大者三四圍高五六丈木似桄榔檳榔之屬通身無枝其葉在木頂長四五尺直聳指天狀如棕櫚勢如鳳尾二月著花成穗出於葉間長二三尺大如五斗器仍連著實一穗數枚小者如栝蔞大者如寒瓜長七八寸徑四五寸懸著樹端六七月熟有粗皮包之皮內有核圓而黑潤甚堅硬厚二三分殼內有白肉瓤如凝雪味甘美如牛乳瓤肉空處有漿數合鑽蒂傾出清美如酒若久者則混濁不佳矣其殼磨光有斑纈點紋橫破之可作壺爵縱破之可作瓢杓也又唐史言番人以其花造酒飲之亦醉也類書有青田核樹頭酒嚴樹酒皆椰酒椰花之類並附於下附録青田核崔豹古今注云烏孫國有青田核狀如桃核不知其樹核大如數斗剖之盛水則變酒味甚醇美飲盡隨即注水隨盡隨成但不可久久則苦澀爾謂之青田酒漢末蜀王劉璋曾得之樹頭酒一統志云緬甸在滇南有樹類棕高五六丈結實如椰子土人以罐盛曲懸於實下劃其實汁流於罐中以成酒名樹頭酒或不用曲惟取汁熬為白糖其樹即貝樹也緬人取其葉寫書嚴樹酒一統志云瓊州有嚴樹搗其皮葉浸以清水和以粳釀或入石榴花葉數日成酒能醉人又梁書云頓遜國有酒樹似安石榴取花汁貯杯中數日成酒蓋此類也又有文章草可以成酒椰子瓤氣味甘平無毒主治益氣開寶治風汪穎食之不飢令人面澤時珍出異物志椰子漿氣味甘溫無毒珣曰多食冷而動氣時珍曰其性熱故飲之者多昏如醉狀異物志云食其肉則不飢飲其漿則增渴主治止消渴塗頭益發令黑開寶治吐血水腫去風熱李珣發明震亨曰椰子生海南極熱之地土人賴此解夏月毒渴天之生物各因其材也椰子皮修治頌曰不拘時月採其根皮入藥炙用一云其實皮亦可用氣味苦平無毒主治止血療鼻衄吐逆霍亂煮汁飲之開寶治猝心痛燒存性研以新汲水服一錢極驗時珍出龔氏方殼主治楊梅瘡筋骨痛燒存性臨時炒熱以滾酒泡服二三錢暖覆取汗其痛即止神驗時珍無漏子拾遺釋名千年棗開寶萬年棗一統志海棗草木狀波斯棗拾遺番棗嶺表録異金果輟耕録木名海棕嶺表録異鳳尾蕉時珍曰無漏名義未詳千年萬歲言其樹性耐久也曰海曰波斯曰番言其種自外國來也金果貴之也曰棕曰蕉象其干葉之形也番人名其木曰窟莽名其實曰苦魯麻棗苦麻窟莽皆番音相近也集解藏器曰無漏子即波斯棗生波斯國狀如棗珣曰樹若栗木其實若橡子有三角頌曰按劉恂嶺表録異云廣州有一種波斯棗木無旁枝直聳三四丈至巔四向共生十餘枝葉如棕櫚彼土人呼為海棕木三五年一著子每朵約三二十顆都類北方青棗但小爾舶商亦有攜本國者至中國色類沙糖皮肉軟爛味極甘似北地天蒸棗而其核全別兩頭不尖雙卷而圓如小塊紫礦種之不生蓋蒸熟者也時珍曰千年棗雖有棗名別是一物南番諸國皆有之即杜甫所賦海棕也按段成式酉陽雜俎云波斯棗生波斯國彼人呼為窟莽樹長三四丈圍五六尺葉似土藤不凋二月生花狀如蕉花有兩甲漸漸開罅中有十餘房子長二寸黃白色狀如楝子有核六七月熟則紫黑狀類干棗食之味甘如飴也又陶九成輟耕録云四川成都有金果樹六株相傳漢時物也高五六十丈圍三四尋挺直如矢木無枝柯頂上有葉如棕櫚皮如龍鱗葉如鳳尾實如棗而大每歲仲冬有司具祭收採令醫工以刀剝去青皮石灰湯瀹過入冷熟蜜浸換四次瓶封進獻不如此法則生澀不可食番人名為苦魯麻棗蓋鳳尾蕉也一名萬歲棗泉州有萬年棗即此物也又稽含草木狀云海棗大如杯碗以比安期海上如瓜之棗似未得其詳也巴旦杏亦名忽鹿麻另是一物也實氣味甘溫無毒主治補中益氣除痰嗽補虛損好顏色令人肥健藏器消食止咳治虛羸悅人久服無損李珣桄榔子宋開寶校正自木部移入此釋名木名姑榔木臨海異物志面木伽藍記董棕楊慎卮言鐵木時珍曰其木似檳榔而光利故名桄榔姑榔其音訛也面言其粉也鐵言其堅也集解頌曰桄榔木嶺南二廣州郡皆有之人家亦植之庭院間其木似栟櫚而堅硬斫其內取面大者至數石食之不飢其皮至柔堅韌可以作綆其子作穗生木端不拘時月採之按劉恂嶺表録異云桄榔木枝葉並蕃茂與檳榔小異然葉下有須如粗馬尾廣人採之以織巾子得鹹水浸即粗脹而韌彼人以縛海舶不用釘線木性如竹紫黑色有紋理而堅工人解之以制博奕局其樹皮中有屑如面可作餅食藏器曰按臨海異物志云姑榔木生牂牁山谷外皮有毛如棕櫚而散生其木剛利如鐵可作釤鋤中濕更利惟中焦則易敗爾物之相伏如此皮中有白粉似稻米粉及麥面可作餅餌食名桄榔面彼土少谷常以牛酪食之時珍曰桄榔二廣交蜀皆有之按郭義恭廣志云木大者四五圍高五六丈拱直無旁枝巔頂生葉數十破似棕葉其木肌堅斫入數寸得粉赤黃色可食又顧玠海槎録云桄榔木身直如杉又如棕櫚椰子檳榔波斯棗古散諸樹而稍異有節似大竹樹杪挺出數枝開花成穗緑色結子如青珠每條不下百顆一樹近百餘條團團懸挂若傘極可愛其木最重色類花梨而多紋番舶用代鐵槍鋒鋩甚利古散亦木名可為杖又名虎散子氣味苦平無毒主治破宿血開寶面氣味甘平無毒主治作餅炙食腴美令人不飢補益虛羸損乏腰腳無力久服輕身辟穀李珣莎木面莎音梭海藥校正自木部移入此釋名欀木音襄時珍曰莎字韻書不載惟孫愐唐韻莎字注云樹似桄榔則莎字當作莎衣之莎其葉離披如莎衣之狀故謂之莎也張勃吳録地理志言交趾欀木皮中有白粉如米屑干之搗末以水淋過似面可作餅食者即此木也後人訛欀為莎音相近爾楊慎卮言乃謂欀木即桄榔誤矣按左思吳都賦云面有桄榔又曰文欀楨橿既是一物不應兩用矣集解珣曰按蜀記云莎木生南中八郡樹高十許丈闊四五圍峰頭生葉兩邊行列如飛鳥翼皮中有白麵石許搗篩作餅或磨屑作飯食之彼人呼為莎面輕滑美好勝於桄榔面也藏器曰莎木生嶺南山谷大者木皮內出面數斛色黃白時珍曰按劉欣期交州記云都勾樹似棕櫚木中出屑如桄榔面可作餅餌恐此即欀木也莎面氣味甘平溫無毒主治補益虛冷消食李珣溫補久食不飢長生藏器波羅蜜綱目釋名曩伽結時珍曰波羅蜜梵語也因此果味甘故借名之安南人名曩枷結波斯人名婆那娑拂林人名阿薩嚲皆一物也集解時珍曰波羅蜜生交趾南邦諸國今嶺南滇南亦有之樹高五六丈樹類冬青而黑潤倍之葉極光淨冬夏不凋樹至斗大方結實不花而實出於枝間多者十數枚少者五六枚大如冬瓜外有厚皮裹之若栗球上有軟刺礧砢五六月熟時顆重五六斤剝去外皮殼內肉層疊如橘囊食之味至甜美如蜜香氣滿室一實凡數百核核大如棗其中仁如栗黃煮炒食之甚佳果中之大者惟此與椰子而已瓤氣味甘香微酸平無毒主治止渴解煩醒酒益氣令人悅澤時珍核中仁氣味同瓤主治補中益氣令人不飢輕健時珍無花果食物釋名映日果便民圖纂優曇鉢廣州志阿駔音楚時珍曰無花果凡數種此乃映日果也即廣中所謂優曇鉢及波斯所謂阿駔也集解時珍曰無花果出揚州及雲南今吳楚閩越人家亦或折枝插成枝柯如枇杷樹三月發葉如花構葉五月內不花而實實出枝間狀如木饅頭其內虛軟採以鹽漬壓實令扁曬乾充果食熟則紫色軟爛甘味如柿而無核也按方輿志云廣西優曇鉢不花而實狀如枇杷又段成式酉陽雜俎云阿駔出波斯拂林人呼為底珍樹長丈餘枝葉繁茂葉有五丫如萆麻無花而實色赤類椑柿一月而熟味亦如柿二書所説皆即此果也又有文光果天仙果古度子皆無花之果並附於下附録文光果出景州形如無花果肉味如栗五月成熟天仙果出四川樹高八九尺葉似荔枝而小無花而實子如櫻桃纍纍綴枝間六七月熟其味至甘宋祁方物贊云有子孫枝不花而實薄言採之味埒蜂蜜古度子出交廣諸州樹葉如栗不花而實枝柯間生子大如石榴及楂子而色赤味醋煮以為粽食之若數日不煮則化作飛蟻穿皮飛去也實氣味甘平無毒主治開胃止泄痢汪穎治五痔咽喉痛時珍葉氣味甘微辛平有小毒主治五痔腫痛煎湯頻熏洗之取效震亨阿勒勃拾遺校正自木部移入此釋名婆羅門皂莢拾遺波斯皂莢時珍曰婆羅門西域國名波斯西南國名也集解藏器曰阿勒勃生拂林國狀似皂莢而圓長味甘好吃時珍曰此即波斯皂莢也按段成式酉陽雜俎云波斯皂莢彼人呼為忽野簷拂林人呼為阿梨去伐樹長三四丈圍四五尺葉似枸櫞而短小經寒不凋不花而實莢長二尺中有隔隔內各有一子大如指頭赤色至堅硬中黑如墨味甘如飴可食亦入藥也子氣味苦大寒無毒主治心膈間熱風心黃骨蒸寒熱殺三蟲藏器炙黃入藥治熱病下痰通經絡療小兒疳氣李珣附録羅望子時珍曰按桂海志云出廣西殼長數寸如肥皂及刀豆色正丹內有二三子煨食甘美沙棠果綱目集解時珍曰按呂氏春秋云果之美者沙棠之實今嶺外寧鄉瀧水羅浮山中皆有之木狀如棠黃花赤實其味如李而無核實氣味甘平無毒主治食之卻水病時珍山海經棎子音蟾拾遺集解藏器曰棎子似梨生江南左思吳都賦棎留御霜是也時珍曰棎留二果名按薛瑩荊陽以南異物志云棎子樹南越丹陽諸郡山中皆有之其實如梨冬熟味酢劉子樹生交廣武平興古諸郡山中三月著花結實如梨七八月熟色黃味甘酢而核甚堅實氣味甘澀平無毒主治生食之止水痢熟和蜜食之去嗽藏器麂目拾遺校正自木部移入此釋名鬼目藏器曰此出嶺南狀如麂目故名陶氏注豆蔻引麂目小冷即此也後人訛為鬼目集解時珍曰鬼目有草木三種此乃木生者其草鬼目別見草部白英下又羊蹄菜亦名鬼目並物異名同按劉欣期交州記云鬼目出交趾九真武平興古諸處樹高大似棠梨葉似楮而皮白二月生花仍連著子大者如木瓜小者如梅李而小斜不周正七八月熟色黃味酸以蜜浸食之佳氣味酸甘小冷無毒多食發冷痰藏器都桷子拾遺釋名構子時珍曰桷音角太平御覽作桶子音同上聲蓋傳寫之訛也亦與楮構之構名同實異陳祈暢異物志贊云構子之樹枝葉四布名同種異實味甜酢果而無核裡面如素析酒止酲更為遺賂解集珣曰按徐表南州記云都桷子生廣南山谷樹高丈餘二月開花連著實大如雞卵七月熟時珍曰按魏王花木志云都桷樹出九真交趾野生二三月開花赤色子似木瓜八九月熟俚民取食之味酢以鹽酸漚食或蜜藏皆可一云狀如青梅實氣味酸澀平無毒主治久食益氣止泄藏器安神溫腸治痔久服無損李珣解酒止煩渴時珍都念子拾遺釋名倒捻子詳下文集解藏器曰杜寶拾遺録云都念子生嶺南隋煬帝時進百株植於西苑樹高丈餘葉如白楊枝柯長細花心金色花赤如蜀葵而大子如小棗蜜漬食之甘美益人時珍曰按劉恂嶺表録異云倒捻子窠叢不大葉如苦李花似蜀葵小而深紫南中婦女多用染色子如軟柿外紫內赤無核頭上有四葉如柿蒂食之必捻其蒂故謂之倒捻子訛而為都念子也味甚甘軟實氣味甘酸小溫無毒主治痰嗽噦氣藏器暖腹臟益肌肉時珍嶺表録異都咸子拾遺校正自木部移入此集解藏器曰都咸子生廣南山谷按徐表南州記云其樹如李子大如指取子及皮葉曝乾作飲極香美也時珍曰按嵇含南方草木狀云都咸樹出日南三月生花仍連著實大如指長三寸七八月熟其色正黑子及皮葉氣味甘平無毒主治火干作飲止渴潤肺去煩除痰藏器去傷寒清涕咳逆上氣宜煎服之李珣摩廚子拾遺集解藏器曰摩廚子生西域及南海並斯調國子如瓜可為茹其汁香美如中國用油陳祈暢異物志贊云木有摩廚生自斯調厥汁肥潤其澤如膏馨香馥郁可以煎熬彼州之人以為嘉肴珣曰摩廚二月開花四五月結實如瓜狀時珍曰又有齊墩果德慶果亦其類也今附於下附録齊墩果酉陽雜俎云齊墩樹生波斯及拂林國高二三丈皮青白花似柚極香子似楊桃五月熟西域人壓為油以煎餅果如中國之用巨勝也德慶果一統志云廣之德慶州出之其樹冬榮子大如杯炙而食之味如豬肉也實氣味甘香平無毒主治益氣潤五臟久服令人肥健藏器安神養血生肌久服輕健李珣韶子拾遺集解藏器曰韶子生嶺南按裴淵廣州記云韶葉如栗赤色子大如栗有棘刺破其皮內有肉如豬肪著核不離味甘酢核如荔枝時珍曰按范成大虞衡志云廣南有山韶子夏熟色紅肉如荔枝又有藤韶子秋熟大如鳧卵柿也實氣味甘溫無毒主治暴痢心腹冷氣藏器馬檳榔會編釋名馬金囊雲南志馬金南記事珠紫檳榔綱目集解時珍曰馬檳榔生滇南金齒沅江諸夷地蔓生結實大如葡萄紫色味甘內有核頗似大風子而殼稍薄團長斜扁不等核內有仁亦甜實氣味甘寒無毒核仁氣味苦甘寒無毒機曰凡嚼之者以冷水一口送下其甜如蜜亦不傷人也主治産難臨時細嚼數枚井華水送下須臾立産再以四枚去殼兩手各握二枚惡水自下也欲斷産者常嚼二枚水下久則子宮冷自不孕矣汪機傷寒熱病食數枚冷水下又治惡瘡腫毒內食一枚冷水下外嚼塗之即無所傷時珍枳椇音止矩唐本草校正自木部移入此併入拾遺木蜜釋名蜜枳𣕌音止矩蜜屈律廣記木蜜拾遺木餳同上木珊瑚廣志雞距子蘇文雞爪子俗名木名白石木唐注金鉤木地志枅栱音雞拱交加枝時珍曰枳椇徐鍇注説文作枳𣕌又作枳枸皆屈曲不伸之意此樹多枝而曲其子亦捲曲故以名之曰蜜曰餳因其味也曰珊瑚曰雞距曰雞爪象其形也曰交加曰枅栱言其實之紐屈也枅栱枋梁之名按雷公炮炙序云弊箅淡滷如酒沾交注云交加枝即蜜枳𣕌也又詩話云子生枝端橫折歧出狀若枅栱故土人謂之枅栱也珍謂枅栱及俗稱雞矩蜀人之稱桔枸棘枸滇人之稱雞橘子巴人之稱金鉤廣人之稱結留子散見書記者皆枳椇雞距之字方音轉異爾俗又訛雞爪為曹公爪或謂之梨棗樹或謂之癩漢指頭崔豹古今注一名樹蜜一名木石皆一物也集解恭曰枳椇子其樹徑尺木名白石葉如桑柘其子作房似珊瑚核在其端人皆食之頌曰此詩小雅所謂南山有枸也陸機疏義云枳枸樹高大如白楊所在皆有枝柯不直子著枝端啖之甘美如飴八九月熟江南特美之謂之木蜜能敗酒味若以其木為柱則屋中之酒皆薄也詵曰昔有南人修舍用此木誤落一片入酒甕中酒化為水也藏器曰木蜜樹生南方人呼白石木枝葉俱甜嫩葉可生啖味如蜜老枝細破煎汁成蜜倍甜止渴解煩也時珍曰枳椇木高三四丈葉圓大如桑柘夏月開花枝頭結實如雞爪形長寸許紐曲開作二三歧儼若雞之足距嫩時青色經霜乃黃嚼之味甘如蜜每開歧盡處結一二小子狀如蔓荊子內有扁核赤色如酸棗仁形飛鳥喜巢其上故宋玉賦云枳枸來巢曲禮云婦人之贄椇榛脯修即此也鹽藏荷裹可以備冬儲實氣味甘平無毒詵曰多食發蛔蟲主治頭風小腹拘急唐本止渴除煩去膈上熱潤五臟利大小便功用同蜂蜜枝葉煎膏亦同藏器止嘔逆解酒毒闢蟲毒時珍發明震亨曰一男子年三十餘因飲酒發熱又兼房勞虛乏乃服補氣血之藥加葛根以解酒毒微汗出人反懈怠熱如故此乃氣血虛不禁葛根之散也必須雞距子解其毒遂煎藥中加而服之乃愈時珍曰枳椇本草只言木能敗酒而丹溪朱氏治酒病往往用其實其功當亦同也按蘇東坡集云眉山揭穎臣病消渴日飲水數斗飯亦倍常小便頻數服消渴藥逾年疾日甚自度必死豫令延蜀醫張肱診之笑曰君幾誤死乃取麝香當門子以酒濡濕作十許丸用棘枸子煎湯吞之遂愈問其故肱曰消渴消中皆脾弱腎敗土不制水而成疾今穎臣脾脈極熱而腎氣不衰當由果實酒物過度積熱在脾所以食多而飲水水飲既多溺不得不多非消非渴也麝香能制酒果花木棘枸亦勝酒屋外有此木屋內釀酒多不佳故以此二物為藥以去其酒果之毒也棘枸實如雞距故俗謂之雞距亦曰癩漢指頭食之如牛乳本草名枳椇小兒喜食之籲古人重格物若肱蓋得此理矣醫云乎哉木汁氣味同枳椇附方新一腋下狐氣用桔枸樹鑿孔取汁一二碗用青木香東桃西柳七姓婦人乳一處煎一二沸就熱於五月五日雞叫時洗了將水放在十字路口速回勿顧即愈只是他人先遇者必帶去也桔枸樹即梨棗樹也胡濙衛生易簡方木皮氣味甘溫無毒主治五痔和五臟唐本
