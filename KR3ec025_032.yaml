body:
  text: 果部第三十二卷果之四味類一十三種秦椒本經中品校正自木部移入此釋名大椒爾雅檓毀花椒集解別録曰秦椒生泰山山谷及秦嶺上或琅琊八月九月採實弘景曰今從西來形似椒而大色黃黑味亦頗有椒氣或云即今樛樹子樛乃豬椒恐謬恭曰秦椒樹葉及莖子都似蜀椒但味短實細爾藍田秦嶺間大有之頌曰今秦鳳明越金商州皆有之初秋生花秋末結實九月十月採之爾雅云檓大椒郭璞注云椒叢生實大者為檓也詩唐風云椒聊之實繁衍盈升陸機疏義云椒樹似茱萸有針刺莖葉堅而滑澤味亦辛香蜀人作茶吳人作茗皆以其葉合煮為香今成皋諸山有竹葉椒其木亦如蜀椒小毒熱不中合藥也可入飲食中及蒸雞豚用東海諸島上亦有椒枝葉皆相似子長而不圓甚香其味似橘皮島上獐鹿食其葉其肉自然作椒橘香今南北所生一種椒其實大於蜀椒與陶氏及郭陸之說正相合當以實大者為秦椒也宗奭曰此秦地所産者故言秦椒大率椒株皆相似但秦椒葉差大粒亦大而紋低不若蜀椒皺紋高為異也然秦地亦有蜀椒種時珍曰秦椒花椒也始産於秦今處處可種最易蕃衍其葉對生尖而有刺四月生細花五月結實生青熟紅大於蜀椒其目亦不及蜀椒目光黑也範子計然云蜀椒出武都赤色者善秦椒出隴西天水粒細者善蘇頌謂其秋初生花蓋不然也修治同蜀椒椒紅氣味辛溫有毒別録曰生溫熟寒有毒權曰苦辛之才曰惡栝蔞防葵畏雌黃主治除風邪氣溫中去寒痹堅齒髮明目久服輕身好顏色耐老增年通神本經療喉痹吐逆疝瘕去老血産後余疾腹痛出汗利五臟別録上氣咳嗽久風濕痹孟詵治惡風遍身四肢𤸷痹口齒浮腫搖動女人月閉不通産後惡血痢多年痢療腹中冷痛生毛髮滅瘢甄權能下腫濕氣震亨附方舊六膏疸尿多其人飲少用秦椒一分出汗瓜蒂二分為末水服方寸匕日三服傷寒類要手足心腫乃風也椒鹽末等分醋和敷之良肘後方損瘡中風以面作餛飩包秦椒於灰中燒之令熱斷使開口封於瘡上冷即易之孟詵食療久患口瘡大椒去閉口者水洗面拌煮作粥空腹吞之以飯壓下重者可再服以瘥為度食療本草牙齒風痛秦椒煎醋含漱孟詵食療百蟲入耳椒末一錢醋半盞浸良久稍稍滴入自出續十全方蜀椒本經下品校正自木部移入此釋名巴椒別録漢椒日華川椒綱目南椒炮炙論蓎藙唐毅點椒時珍曰蜀古國名漢水名今川西成都廣漢潼川諸處是矣巴亦國名又水名今川東重慶夔州順慶閬中諸處是矣川則巴蜀之總稱因岷沱黑白四大水分東西南北為四川也集解別録曰蜀椒生武都山谷及巴郡八月採實陰乾弘景曰蜀郡北部人家種之皮肉厚腹裡白氣味濃江陽晉康及建平間亦有而細赤辛而不香力勢不如巴郡者恭曰今出金州西城者最佳頌曰今歸陝及蜀川陝洛間人家多作園圃種之木高四五尺似茱萸而小有針刺葉堅而滑可煮飲食四月結子無花但生於枝葉間顆如小豆而圓皮紫赤色八月採實焙乾江淮北土亦有之莖葉都相類但不及蜀中者良而皮厚里白味烈也時珍曰蜀椒肉厚皮皺其子光黑如人之瞳仁故謂之椒目他椒子雖光黑亦不似之若土椒則子無光彩矣修治斆曰凡使南椒須去目及閉口者以酒拌濕蒸從巳至午放冷密蓋無氣後取出便入瓷器中勿令傷風也宗奭曰凡用秦椒蜀椒並微炒使出汗乘熱入竹筒中以梗搗去裡面黃殼取紅用未盡再搗或只炒熱隔紙鋪地上以碗覆待冷碾取紅用椒紅氣味辛溫有毒別録曰大熱多食令人乏氣喘促口閉者殺人詵曰十月食椒損氣傷心令人多忘李鵬飛曰久食令人失明傷血脈之才曰杏仁為之使得鹽味佳畏款冬花防風附子雄黃可收水銀中其毒者涼水麻仁漿解之主治邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣久服頭不白輕身增年本經除六腑寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸澼下痢泄精女子字乳余疾散風邪瘕結水腫黃疸鬼疰蠱毒殺蟲魚毒久服開腠理通血脈堅齒髮明目調關節耐寒暑可作膏藥別録治頭風下淚腰腳不遂虛損留結破血下諸石水治咳嗽腹內冷痛除齒痛甄權破癥結開胸治天行時氣産後宿血壯陽療陰汗暖腰膝縮小便止嘔逆大明通神去老益血利五臟下乳汁滅瘢生毛髮孟詵散寒除濕解鬱結消宿食通三焦溫脾胃補右腎命門殺蛔蟲止泄瀉時珍發明頌曰服食方單服椒紅補下宜用蜀椒乃佳段成式言椒氣下達餌之益下不上衝也時珍曰椒純陽之物乃手足太陰右腎命門氣分之藥其味辛而麻其氣溫以熱稟南方之陽受西方之陰故能入肺散寒治咳嗽入脾除濕治風寒濕痹水腫瀉痢入右腎補火治陽衰溲數足弱久痢諸證一婦年七十餘病瀉五年百藥不效豫以感應丸五十丸投之大便二日不行再以平胃散加椒紅茴香棗肉為丸與服遂瘳每因怒食舉發服之即止此除濕消食溫脾補腎之驗也按歲時記言歲旦飲椒柏酒以闢疫癘椒乃玉衡星精服之令人體健耐老柏乃百木之精為仙藥能伏邪鬼故也吳猛真人服椒訣云椒稟五行之氣而生葉青皮紅花黃膜白子黑其氣馨香其性下行能使火熱下達不致上薰芳草之中功皆不及其方見下時珍竊謂椒紅丸雖云補腎不分水火未免誤人大抵此方惟脾胃及命門虛寒有濕鬱者相宜若肺胃素熱者大宜遠之故丹溪朱氏云椒屬火有下達之能服之既久則火自水中生故世人服椒者無不被其毒也又上清訣云凡人吃飯傷飽覺氣上衝心胸痞悶者以水吞生椒一二十顆即散取其能通三焦引正氣下惡氣消宿食也又戴原禮云凡人嘔吐服藥不納者必有蛔在膈間蛔聞藥則動動則藥出而蛔不出但於嘔吐藥中加炒川椒十粒良蓋蛔見椒則頭伏也觀此則張仲景治蛔厥烏梅丸中用蜀椒亦此義也許叔微云大凡腎氣上逆須以川椒引之歸經則安附方舊十二新二十三椒紅丸治元臟傷憊目暗耳聾服此百日覺身輕少睡足有力是其效也服及三年心智爽悟目明倍常面色紅悅髭發光黑用蜀椒去目及合口者炒出汗曝乾搗取紅一斤以生地黃搗自然汁入銅器中煎至一升候稀稠得所和椒末丸梧桐子大每空心暖酒下三十丸合藥時勿令婦人雞犬見詩云其椒應五行其仁通六義欲知先有功夜間無夢寐四時去煩勞五臟調元氣明目腰不痛身輕心健記別更有異能三年精自祕回老返嬰童康強不思睡九蟲頓消亡三尸自逃避若能久餌之神仙應可冀補益心腎仙方椒苓丸補益心腎明目駐顏順氣祛風延年真川椒一斤炒去汗白茯苓十兩去皮為末煉蜜丸梧桐子大每服五十丸空心鹽湯下忌鐵器邵真人經驗方虛冷短氣川椒三兩去目併合口者以生絹袋盛浸無灰酒五升中三日隨性飲之腹內虛冷用生椒擇去不拆者用四十粒以漿水浸一宿令合口空心新汲水吞下久服暖臟腑駐顏黑髮明目令人思飲食斗門方心腹冷痛以布裹椒安痛處用尉斗尉令椒出汗即止孫真人方冷蟲心痛川椒四兩炒出汗酒一碗淋之服酒壽域神方陰冷入腹有人陰冷漸漸冷氣入陰囊腫滿日夜疼悶欲死以布裹椒包囊下熱氣大通日再易之以消為度千金厄噫不止川椒四兩炒研麵糊丸梧桐子大每服十丸醋湯下神效邵以正經驗方傳尸勞疰最殺勞蟲用真川椒紅色者去子及合口以黃草紙二重隔之炒出汗取放地上以砂盆蓋定以火灰密遮四旁約一時許為細末去殼以老酒浸白糕和丸梧子大每服四十丸食前鹽湯下服至二斤其疾自愈此藥兼治諸痹用肉桂煎湯下腰痛用茴香湯下腎冷用鹽湯下昔有一人病此遇異人授是方服至二斤吐出一蟲如蛇而安遂名神授丸陳言三因方歷節風痛白虎歷節風痛甚肉理枯虛生蟲遊走癢痛兼治痹疾半身不遂即上治勞疰神授丸方世醫得效方寒濕腳氣川椒二三升稀布囊盛之日以踏腳貴人所用大全良方諸瘡中風生蜀椒一升以少面和溲裹椒勿令漏氣分作兩裹於煻灰火中燒熟刺頭作孔當瘡上罨之使椒氣射入瘡中冷即易之須臾瘡中出水及遍體出冷汗即瘥也韋宙獨行方瘡腫作痛生椒末釜下土蕎麥粉等分研醋和敷之外臺祕要囊瘡痛癢紅椒七粒蔥頭七個煮水洗之一人途中苦此湘山寺僧授此方數日愈名驅風散經驗方手足皴裂椒四合以水煮之去渣漬之半食頃出令燥須臾再浸候乾塗豬羊腦髓極妙深師方漆瘡作癢談氏方用漢椒煎湯洗之相感志云凡至漆所嚼川椒塗鼻上不生漆瘡夏月濕瀉川椒炒取紅肉豆蔻煨各一兩為末粳米飯丸梧桐子大每量人米飲服百丸飧瀉不化及久痢小椒一兩炒蒼朮二兩土炒碾末醋糊丸梧桐子大每米飲服五十丸普濟久冷下痢或不痢腰腹苦冷用蜀椒三升酢漬一宿曲三升同椒一升拌作粥食不過三升瘥千金方老小泄瀉小兒水瀉及人年五十以上患瀉用椒二兩醋二升煮醋盡慢火焙乾碾末瓷器貯之每服二錢匕酒或米飲下談氏水瀉奶疳椒一分去目碾末酥調稍稍塗腦上日三度姚和仲延齡方食茶麵黃川椒紅炒碾末糊丸梧桐子大每服十丸茶湯下勝金方傷寒齒衄傷寒嘔血繼而齒縫出血不止用開口川椒四十九粒入醋一盞同煎熟入白礬少許服之直指方風蟲牙痛總録用川椒紅末水和白麵丸皂子大燒熱咬之數度愈一方花椒四錢牙皂七七個醋一碗煎漱之頭上白禿花椒末豬脂調敷三五度便愈普濟方婦人禿鬢漢椒四兩酒浸密室內日日搽之自然長也聖惠方蠍螫作痛川椒嚼細塗之微麻即止杏林摘要百蟲入耳川椒碾細浸醋灌之自出危氏方毒蛇咬螫以閉口椒及葉搗封之良肘後方蛇入人口因熟取涼臥地下有蛇入口不得出者用刀破蛇尾納生椒二三粒裹定須臾即自退出也聖惠方小兒暴驚啼哭絶死蜀椒左顧牡蠣各六銖以酢漿水一升煮五合每灌一合千金方舌謇語吃川椒以生面包丸每服十粒醋湯送下救急方痔漏脫肛每日空心嚼川椒一錢涼水送下三五次即收同上腎風囊癢川椒杏仁研膏塗掌心合陰囊而臥甚效直指方椒目氣味苦寒無毒權曰苦辛有小毒主治水腹脹滿利小便蘇恭治十二種水氣及腎虛耳猝鳴聾膀胱急甄權止氣喘震亨發明權曰椒氣下達故椒目能治腎虛耳鳴用巴豆菖蒲同碾細以松脂黃蠟溶和為挺納耳中抽之治腎氣虛耳中如風水鳴或如打鐘磬之聲猝暴聾者一日一易神驗宗奭曰椒目治盜汗有功將目微炒碾細用半錢以生豬上唇煎湯一合睡時調服無不效蓋椒目能行水又治水蠱也震亨曰諸喘不止用椒目炒碾二錢白湯調服二三服以上劫之後乃隨痰火用藥時珍曰椒目下達能行滲道不行穀道所以能下水燥濕定喘消蠱也附方新六水氣腫滿椒目炒搗如膏每酒服方寸匕千金方留飲腹痛椒目二兩巴豆一兩去皮心熬搗以棗膏和丸麻子大每服二丸吞下其痛即止又方椒目十四枚巴豆一枚豉十六枚合搗為二丸服之取吐利肘後方痔漏腫痛椒目一撮碾細空心水服三錢如神海上方崩中帶下椒目炒碾細每溫酒服一勺金匱鉤玄眼生黑花年久不可治者椒目炒一兩蒼朮炒一兩為末醋糊丸梧桐子大每服二十丸醋湯下本事方葉氣味辛熱無毒主治奔豚伏梁氣及內外腎釣並霍亂轉筋和艾及蔥碾以醋拌罨之大明殺蟲洗腳氣及漆瘡時珍根氣味辛熱微毒主治腎與膀胱虛冷血淋色瘀者煎湯細飲色鮮者勿服時珍出證治要訣崖椒宋圖經釋名野椒集解頌曰施州一種崖椒葉大於蜀椒彼土人四季採皮入藥時珍曰此即俗名野椒也不甚香而子灰色不黑無光野人用炒雞鴨食椒紅氣味辛熱無毒忌鹽時珍曰有毒主治肺氣上喘兼咳嗽並野薑為末酒服一錢匕蘇頌蔓椒本經下品校正自木部移入此釋名豬椒別録豕椒本經彘椒別録豨椒弘景狗椒別録金椒圖經時珍曰此椒蔓生氣臭如狗彘故得諸名集解別録曰蔓椒生雲中川穀及丘冢間採莖根煮釀酒弘景曰山野處處有之俗呼為樛子似椒檔而小不香一名豨椒可以蒸病出汗時珍曰蔓椒野生林箐間枝軟如蔓子葉皆似椒山人亦食之爾雅云椒榝醜梂謂其子叢生也陶氏所謂樛子當作梂子諸椒之通稱非獨蔓椒也實根莖氣味苦溫無毒主治風寒濕痹歷節疼除四肢厥氣膝痛煎湯蒸浴取汗本經根主痔燒末服並煮汁浸之藏器賊風攣急孟詵通身水腫用枝葉煎汁熬如餳狀每空心服一匙日三服時珍出千金地椒宋嘉祐校正自草部移入此集解禹錫曰地椒出上黨郡其苗覆地蔓生莖葉甚細花作小朵色紫白因舊莖而生時珍曰地椒出北地即蔓椒之小者貼地生葉形小味微辛土人以煮羊肉食香美實氣味辛溫有小毒主治淋泄腫痛可作殺蛀蟲藥嘉祐附方新一牙痛地花椒川芎藭尖等分為末擦之海上名方胡椒唐本草校正自木部移入此釋名昧履支時珍曰胡椒因其辛辣似椒故得椒名實非椒也集解恭曰胡椒生西戎形如鼠李子調食用之味甚辛辣慎微曰按段成式酉陽雜俎云胡椒出摩伽陀國呼為昧履支其苗蔓生莖極柔弱葉長寸半有細條與葉齊條條結子兩兩相對其葉晨開暮合合則裹其子於葉中形似漢椒至辛辣六月採今食料用之時珍曰胡椒今南番諸國及交趾滇南海南諸地皆有之蔓生附樹及作棚引之葉如扁豆山藥輩正月開黃白花結椒纍纍纏藤而生狀如梧桐子亦無核生青熟紅青者更辣四月熟五月採收曝乾乃皺今遍中國食品為日用之物也實氣味辛大溫無毒時珍曰辛熱純陽走氣助火昏目發瘡珣曰多食損肺令人吐血主治下氣溫中去痰除臟腑中風冷唐本去胃口虛冷氣宿食不消霍亂氣逆心腹猝痛冷氣上衝李珣調五臟壯腎氣治冷痢殺一切魚肉鱉菌毒大明去胃寒吐水大腸寒滑宗奭暖腸胃除寒濕反胃虛脹冷積陰毒牙齒浮熱作痛時珍發明宗奭曰胡椒去胃中寒痰食已則吐水甚驗大腸寒滑亦可用須以他藥佐之過劑則走氣也震亨曰胡椒屬火而性燥食之快膈喜之者衆積久則脾胃肺氣大傷凡病氣疾人益大其禍也牙齒痛必用胡椒蓽茇者散其中浮熱也時珍曰胡椒大辛熱純陽之物腸胃寒濕者宜之熱病人食之動火傷氣陰受其害時珍自少嗜之歲歲病目而不疑及也後漸知其弊遂痛絶之目病亦止才食一二粒即便昏澀此乃昔人所未試者蓋辛走氣熱助火此物氣味俱厚故也病咽喉口齒者亦宜忌之近醫每以緑豆同用治病有效蓋豆寒椒熱陰陽配合得宜且以豆制椒毒也按張從正儒門事親云噎膈之病或因酒得或因氣得或因胃火醫氏不察火里燒姜湯中煮桂丁香未已豆蔻繼之蓽茇未已胡椒繼之雖曰和胃胃本不寒雖曰補胃胃本不虛況三陽既結食必上潮只宜湯丸小小潤之可也時珍竊謂此說雖是然亦有食入反出無火之證又有痰氣鬱結得辛熱暫開之證不可執一也附方舊二新二十二心腹冷痛胡椒三七枚清酒吞之或云一歲一粒孟詵食療心下大痛壽域方用椒四十九粒乳香一錢研勻男用生薑女用當歸酒下又方用椒五分沒藥三錢研細分二服溫酒下又方胡椒緑豆各四十九粒研爛酒下神效霍亂吐瀉孫真人用胡椒三十粒以飲吞之直指方用胡椒四十九粒緑豆一百四十九粒研勻木瓜湯服一錢反胃吐食戴原禮方用胡椒醋浸曬乾如此七次為末酒糊丸梧桐子大每服三四十丸醋湯下聖惠方用胡椒七錢半煨姜一兩水煎分二服是齊百一方用胡椒半夏湯泡等分為末薑汁糊丸梧桐子大每薑湯下三十丸夏月冷瀉及霍亂用胡椒碾末飯丸梧桐子大每米飲下四十丸衛生易簡方赤白下痢胡椒緑豆各一歲一粒為末糊丸梧桐子大紅用生薑白用米湯下集簡方大小便閉關格不通脹悶二三日則殺人胡椒二十一粒打碎水一盞煎六分去滓入芒硝半兩煎化服總録小兒虛脹塌氣丸用胡椒一兩蠍尾半兩為末麵糊丸粟米大每服五七丸陳米飲下一加萊蔔子半兩錢乙方虛寒積癖在背膜之外流於兩脅氣逆喘急久則營衛凝滯潰為癰疽多致不救用胡椒二百五十粒蠍尾四個生木香二錢半為末粟米飯丸緑豆大每服二十丸橘皮湯下名磨積丸濟生方房勞陰毒胡椒七粒蔥心二寸半麝香一分搗爛以黃蠟溶和做成條子插入陰內少頃汗出即愈孫氏集效方驚風內釣胡椒木鱉子仁等分為末醋調黑豆末和杵丸緑豆大每服三四十丸荊芥湯下聖惠發散寒邪胡椒丁香各七粒碾碎以蔥白搗膏和塗兩手心合掌握定夾於大腿內側溫覆取汗則愈傷寒蘊要傷寒咳逆日夜不止寒氣攻胃也胡椒三十粒打碎麝香半錢酒一鍾煎半鍾熱服聖惠方風蟲牙痛衛生易簡方用胡椒蓽茇等分為末蠟丸麻子大每用一丸塞蛀孔中韓氏醫通治風蟲客寒三般牙痛呻吟不止用胡椒九粒緑豆十一粒布裹捶碎以絲綿包作一粒患處咬定涎出吐去立愈普濟方用胡椒一錢半以羊脂拌打四十丸擦之追涎阿伽陀丸治婦人血崩用胡椒紫檀香鬱金茜根小柏皮等分為末水丸梧桐子大每服二十丸阿膠湯下時珍曰按酉陽雜俎胡椒出摩伽陀國此方之名因此而訛者也沙石淋痛胡椒朴硝等分為末每服用二錢白湯下日二名二拗散普濟方蜈蚣咬傷胡椒嚼封之即不痛多能鄙事畢澄茄宋開寶校正自草部移入此釋名毗陵茄子時珍曰皆番語也集解藏器曰畢澄茄生佛誓國狀似梧桐子及蔓荊子而微大珣曰胡椒生南海諸國向陰者為澄茄向陽者為胡椒按顧微廣州志云澄茄生諸海國乃嫩胡椒也青時就樹採摘柄粗而蒂圓頌曰今廣州亦有之春夏生葉青滑可愛結實似梧桐子微大八月九月採之時珍曰海南諸番皆有之蔓生春開白花夏結黑實與胡椒一類二種正如大腹之與檳榔相近耳修治斆曰凡採得去柄及皺皮了用酒浸蒸之從巳至酉杵細曬乾入藥用實氣味辛溫無毒珣曰辛苦微溫主治下氣消食去皮膚風心腹間氣脹令人能食療鬼氣能染髮及香身藏器治一切冷氣痰澼並霍亂吐瀉肚腹痛腎氣膀胱冷大明暖脾胃止嘔吐噦逆時珍附方舊一新五脾胃虛弱胸膈不快不進飲食用蓽澄茄為末薑汁打神麯糊丸梧桐子大每薑湯下七十丸日二服濟生方噎食不納蓽澄茄白豆蔻等分為末干舐之壽域神方反胃吐食吐出黑汁治不愈者用蓽澄茄為末米糊丸梧桐子大每薑湯下三四十丸日一服愈後服平胃散三百帖永類鈐方傷寒咳逆厄噫日夜不定者用蓽澄茄高良薑各等分為末每服二錢水六分煎十沸入酢少許服之蘇頌圖經痘瘡入目羞明生翳蓽澄茄末吹少許入鼻中三五次效飛鴻集鼻塞不通肺氣上攻而致者蓽澄茄丸用蓽澄茄半兩薄荷葉三錢荊芥穗一錢半為末蜜丸芡子大時時含咽御藥院方附録山胡椒唐本草恭曰所在有之似胡椒色黑顆粒大如黑豆味辛大熱無毒主心腹冷痛破滯氣俗用有效吳茱萸本經中品校正自木部移入此釋名藏器曰茱萸南北總有入藥以吳地者為好所以有吳之名也時珍曰茱萸二字義未詳萸有俞由二音集解別録曰吳茱萸生上谷川谷及冤句九月九日採陰乾陳久者良頌曰今處處有之江浙蜀漢尤多木高丈餘皮青緑色葉似椿而闊厚紫色三月開紅紫細花七月八月結實似椒子嫩時微黃至熟則深紫或云顆粒緊小經久色青緑者是吳茱萸顆粒大經久色黃黑者是食茱萸恐亦不然按周處風土記云俗尚九月九日謂之上九茱萸到此日氣烈熟色赤可折其房以插頭云辟惡氣御冬又續齊諧記云汝南桓景隨費長房學道長房謂曰九月九日汝家有災厄宜令急去各作絳囊盛茱萸以係臂上登高飲菊花酒此禍可消景如其言舉家登高山夕還見雞犬牛羊一時暴死長房聞之曰此代之矣故人至此日登高飲酒戴茱萸囊由此爾時珍曰茱萸枝柔而肥葉長而皺其實結於梢頭纍纍成簇而無核與椒不同一種粒大一種粒小小者入藥為勝淮南萬畢術云井上宜種茱萸葉落井中人飲其水無瘟疫懸其子於屋闢鬼魅五行志云舍東種白楊茱萸增年除害修治斆曰凡使去葉梗每十兩以鹽二兩投東流水四斗中分作一百度洗之自然無涎曬乾入丸散用之若用醋煮者每十兩用醋一鎰煮三十沸後入茱萸熬乾用宗奭曰凡用吳茱萸須深湯中浸去苦烈汁七次始可焙用氣味辛溫有小毒權曰辛苦大熱有毒好古曰辛苦熱氣味俱厚陽中陰也半浮半沉入足太陰經血分少陰厥陰經氣分思邈曰陳久者良閉口者有毒多食傷神令人起伏氣咽喉不通時珍曰辛熱走氣動火昏目發瘡之才曰蓼實為之使惡丹參硝石白堊畏紫石英主治溫中下氣止痛除濕血痹逐風邪開腠理咳逆寒熱本經利五臟去痰冷逆氣飲食不消心腹諸冷絞痛中惡心腹痛別録霍亂轉筋胃冷吐瀉腹痛産後心痛治遍身𤸷痹刺痛腰腳軟弱利大腸壅氣腸風痔疾殺三蟲甄權殺惡蟲毒牙齒蟲䘌鬼魅疰氣藏器下産後余血治腎氣腳氣水腫通關節起陽健脾大明主痢止瀉厚腸胃肥健人孟詵治痞滿塞胸咽膈不通潤肝燥脾好古開鬱化滯治吞酸厥陰痰涎頭痛陰毒腹痛疝氣血痢喉舌口瘡時珍發明頌曰段成式言椒氣好下茱萸氣好上言其沖膈不可為服食之藥故多食沖眼又脫髮也宗奭曰此物下氣最速腸虛人服之愈甚元素曰氣味俱厚浮而降陽中陰也其用有三去胸中逆氣滿塞止心腹感寒㽲痛消宿酒為白豆蔻之使也杲曰濁陰不降厥氣上逆咽膈不通食則令人口開目瞪陰寒隔塞氣不得上下此病不已令人寒中腹滿膨脹下利宜以吳茱萸之苦熱泄其逆氣用之如神諸藥不可代也不宜多用恐損元氣好古曰衝脈為病逆氣裡急宜此主之震坤合見其色緑故仲景吳茱萸湯當歸四逆湯方治厥陰病及溫脾胃皆用此也時珍曰茱萸辛熱能散能溫苦熱能燥能堅故其所治之症皆取其散寒溫中燥濕解鬱之功而已案朱氏集驗方云中丞常子正苦痰飲每食飽或陰晴節變率同十日一發頭疼背寒嘔吐酸汁即數日伏枕不食服藥罔效宣和初為順昌司祿於太守蔡達道席上得吳仙丹方服之遂不再作每遇飲食過多腹滿服五七十丸便已少頃小便作茱萸氣酒飲皆隨小水而去前後痰藥甚衆無及此者用吳茱萸湯泡七次茯苓等分為末煉蜜丸梧桐子大每熟水下五十丸梅楊卿方只用茱萸酒浸三宿以茯苓末拌之曬乾每吞百粒溫酒下又咽喉口舌生瘡者以茱萸末醋調貼兩足心移夜便愈其性雖熱而能引熱下行蓋亦從治之義而謂茱萸之性上行不下者似不然也有人治小兒痘瘡口噤者齧茱萸一二粒抹之即開亦取其辛散耳附方舊二十四新二十二風𤸷癢痹茱萸一升酒五升煮取一升半溫洗之立止孟詵食療賊風口偏不能語者茱萸一升姜豉三升清酒五升和煎五沸待冷服半升一日三服得少汗即瘥同上冬月感寒吳茱萸五錢煎湯服之取汗頭風作痛茱萸煎濃湯以綿染頻拭髮根良千金翼方嘔涎頭痛吳茱萸湯用茱萸一升棗二十枚生薑一大兩人參一兩以水五升煎取三升每服七合日三服仲景方嘔而胸滿方同上腳氣衝心吳茱萸生薑擂汁飲甚良孟詵方腎氣上噦腎氣自腹中起上築於咽喉逆氣連屬而不能出或至數十聲上下不得喘息此由寒傷胃脘腎虛氣逆上乘於胃與氣相併難經謂之噦素問云病深者其聲噦宜服此方如不止灸期門關元腎俞穴用吳茱萸醋炒熱橘皮附子去皮各一兩為末麵糊丸梧桐子大每薑湯下七十丸孫氏仁存方陰毒傷寒四肢逆冷用茱萸一升酒拌濕絹袋二個包蒸極熱更互尉足心候氣透痛亦即止纍有效聖惠方中惡心痛吳茱萸五合酒三升煮沸分三服楊氏産乳心腹冷痛方同上千金冷氣腹痛吳茱萸二錢擂爛以酒一鐘調之用香油一杯入鍋煎熱傾茱萸酒入鍋煎一滾取服立止唐瑤經驗方脾元氣痛發歇不可忍用茱萸一兩桃仁一兩和炒茱萸焦去茱萸取桃仁去皮尖研細蔥白三莖煨熟酒浸溫服經驗方寒疝往來吳茱萸一兩生薑半兩清酒一升煎溫分服肘後方小腸疝氣奪命丹治遠年近日小腸疝氣偏墜掣疼臍下撮痛以致悶亂及外腎腫硬日漸滋長及陰間濕癢成瘡用吳茱萸去梗一斤分作四分四兩酒浸四兩醋浸四兩湯浸四兩童子小便浸一宿同焙乾澤瀉二兩為末酒糊丸梧桐子大每服五十丸空心鹽湯或酒吞下如宜方名星斗丸和劑局方小兒腎縮乃初生受寒所致用吳茱萸硫黃各半兩同大蒜研塗其腹仍以蛇床子煙燻之聖惠方婦人陰寒十年無子者用吳茱萸川椒各一升為末煉蜜丸彈子大綿裹納陰中日再易之但子宮開即有子也經心録子腸脫出茱萸三升酒五升煎二升分三服兵部手集醋心上攻如濃醋用茱萸一合水三盞煎七分頓服近有人心如蜇破服此二十年不發也纍用有效同上食已吞酸胃氣虛冷者吳茱萸湯泡七次焙乾薑炮等分為末湯服一錢聖惠方轉筋入腹茱萸炒二兩酒二盞煎一盞分二服得下即安聖濟録霍亂乾嘔不止吳茱萸泡炒乾薑炮等分水煎服之同上多年脾泄老人多此謂之水土同化吳茱萸三錢泡過入水煎汁入鹽少許通口服蓋茱萸能暖膀胱水道既清大腸自固他藥雖熱不能分解清濁也孫氏仁存方臟寒泄瀉倦怠減食吳茱萸湯泡過炒豬臟半條去脂洗淨裝滿扎定文火煮熟搗丸梧桐子大每服五十丸米飲下日二服普濟滑痢不止方同上下痢水泄吳茱萸泡炒黃連炒各二錢水煎服未止再服聖惠方赤白下痢和劑局方戊己丸治脾胃受濕下痢腹痛米穀不化用吳茱萸黃連白芍藥各一兩同炒為末蒸餅丸梧桐子大每服二三十丸米飲下百一選方變通丸治赤白痢日夜無度及腸風下血用川黃連二兩吳茱萸二兩湯泡七次同炒香揀出各自為末粟米飯丸梧桐子大另收每服三十丸赤痢甘草湯下黃連丸白痢乾薑湯下茱萸丸赤白痢各用十五丸米湯下此乃浙西河山純老以傳蘇韜光者救人甚效鄧筆峰雜興方二色丸治痢及水泄腸風用吳茱萸二兩黃連二兩同炒香各自為末以百草霜末二兩同黃連作丸以白芍藥末二兩同茱萸作丸各用飯丸梧桐子大各收每服五十丸赤痢烏梅湯下連霜白痢米飲下茱芍丸赤白痢各半服之赤痢臍痛茱萸合黑豆湯吞之千金方腸痔常血下部癢痛如蟲咬者掘地作坑燒赤以酒沃之搗茱萸二升入坑乘熱坐有孔板熏之冷乃下不過三四度愈肘後方腹中症塊茱萸三升搗和酒煮熟布裹尉症上冷更炒熱更番尉之症移走逐尉之消乃止姚僧坦集驗方産後盜汗嗇嗇惡寒茱萸一雞子大酒三升漬半日煮服千金翼口瘡口疳茱萸末醋調塗足心一夕愈集簡方咽喉作痛方同上牙齒疼痛茱萸煎酒含漱之孟詵本草小兒頭瘡吳茱萸炒焦為末入汞粉少許豬脂醋調塗之聖惠方小兒瘭瘡一名火灼瘡一名火爛瘡茱萸煎酒拭之良兵部手集老小風疹方同上千金癰疽發背及髮乳諸毒用吳茱萸一升搗為末用苦酒調塗帛上貼之外臺祕要陰下濕癢吳茱萸煎湯頻洗取效同上骨在肉中不出者咀茱萸封之骨當腐出孟詵食療魚骨入腹刺痛不得出者吳茱萸水煮一盞溫服其骨必軟出未出再服同上蛇咬毒瘡用吳茱萸一兩為末冷水和作三服立安勝金方肩疽白禿並用吳茱萸鹽淹過炒研醋和塗之活幼口議寒熱怪病寒熱不止數日四肢堅如石擊之似鐘磬聲日漸瘦惡用茱萸木香等分煎湯飲之愈夏子益方葉氣味辛苦熱無毒主治霍亂下氣止心腹痛冷氣內外腎釣痛鹽碾罨之神驗干即易轉筋者同艾搗以醋和罨之大明治大寒犯腦頭痛以酒拌葉袋盛蒸熟更互枕尉之痛止為度時珍枝主治大小便卒關格不通取南行枝如手第二指中節含之立下蘇頌出姚僧坦集驗方根及白皮氣味同葉主治殺三蟲本經蟯蟲治喉痹咳逆止泄注食不消女子經産余血療白癬別録殺牙齒蟲止痛藏器治中惡腹中刺痛下痢不禁療漆瘡甄權附方舊二新二寸白蟲茱萸東北陰細根大如指者勿用洗去土四兩切以水酒各一升漬一宿平旦分再服當取蟲下千金方肝勞生蟲眼中赤脈吳茱萸根為末一兩半粳米半合雞子白三個化蠟一兩半和丸小豆大每米湯下三十丸當取蟲下脾勞發熱有蟲在脾中為病令人好嘔者取東行茱萸根大者一尺大麻子八升橘皮二兩三物㕮咀以酒一斗浸一宿微火薄暖之絞去滓平旦空腹服一升取蟲下或死或半爛或下黃汁凡作藥時切忌言語刪繁方腎熱肢腫拘急茱萸根一合半桑白皮三合酒二升煮一升日二服普濟方食茱萸唐本草校正自木部移入此併入拾遺檔子釋名榝音殺藙音毅艾子圖經越椒博雅檔子拾遺辣子弘景曰禮記名藙而俗中呼為榝子當是不識藙字也恭曰爾雅云椒榝醜梂陸機詩疏云椒榝屬也並有榝名陶說誤矣時珍曰此即檔子也蜀人呼為艾子楚人呼為辣子古人謂之藙及榝子因其辛辣蜇口慘腹使人有殺毅黨然之狀故有諸名蘇恭謂茱萸之開口者為食茱萸孟詵謂茱萸之閉口者為檔子馬志謂粒大色黃黑者為食茱萸粒緊小色青緑者為吳茱萸陳藏器謂吳食二茱萸是一物入藥以吳地者為良不當重出此條只可言漢與吳不可言食與不食時珍竊謂數說皆因茱萸二字相混致誤耳不知吳茱食茱乃一類二種茱萸取吳地者入藥故名吳茱萸檔子則形味似茱萸惟可食用故名食茱萸也陳藏器不知食茱萸即檔子重出檔子一條正自誤矣按曹憲博雅云檔子越椒茱萸也鄭樵通志云檔子一名食茱萸以別吳茱萸禮記三牲用藙是食茱萸也二說足證諸人之謬集解頌曰檔子出閩中江東其木高大似樗莖間有刺其子辛辣如椒南人淹藏作果品或以寄遠吳越春秋云越以甘蜜丸檔報吳增封之禮則檔之相贈尚矣又曰食茱萸南北皆有之其木亦甚高大有長及百尺者枝莖青黃上有小白點葉類油麻其花黃色蜀人呼為艾子禮記所謂藙者是也藙艾聲相近也宜入食羹中能發辛香時珍曰食茱萸檔子辣子一物也高木長葉黃花緑子叢簇枝上味辛而苦土人八月採搗濾取汁入石灰攪成名曰艾油亦曰辣米油始辛辣蜇口入食物中用周處風土記以椒檔姜為三香則自古尚之矣而今貴人罕用之實氣味辛苦大熱無毒時珍曰有小毒動脾火病目者忌之穎曰發瘡痔浮腫虛恚之才曰畏紫石英主治功同吳茱萸力稍劣爾療水氣用之佳蘇恭心腹冷氣痛中惡除咳逆去臟腑冷溫中甚良孟詵療蠱毒飛尸著喉口者刺破以子揩之令血出當下涎沫煮汁服之去暴冷腹痛食不消殺腥物藏器治冷痢帶下暖胃燥濕時珍附方新二赤白帶下檔子石菖蒲等分為末每旦鹽酒溫服二錢經驗方久瀉虛痢腹痛者檔子丸治之檔子肉豆蔻各一兩陳米一兩半以米一分同二味炒黃為末一分生碾為末粟米粥丸梧桐子大每陳米飲下五十丸日三服普濟方鹽麩子開寶校正自木部移入此釋名五𣖾音倍鹽膚子綱目鹽梅子同鹽梂子同木鹽通志天鹽靈草篇叛奴鹽拾遺酸桶拾遺藏器曰蜀人謂之酸桶亦曰酢桶吳人謂之鹽麩戎人謂之木鹽時珍曰其味酸咸故有諸名山海經云橐山多𣖾木郭璞注云𣖾木出蜀中七八月吐穗成時如有鹽粉可以酢羹即此也後人訛為五倍矣集解藏器曰鹽麩子生吳蜀山谷樹狀如椿七月子成穗粒如小豆上有鹽似雪可為羹用嶺南人取子為末食之酸鹹止渴將以防瘴時珍曰膚木即𣖾木東南山原甚多木狀如椿其葉兩兩對生長而有齒面青背白有細毛味酸正葉之下節節兩邊有直葉貼莖如箭羽狀五六月開花青黃色成穗一枝纍纍七月結子大如細豆而扁生青熟微紫色其核淡緑狀如腎形核外薄皮上有薄鹽小兒食之滇蜀人採為木鹽葉上有蟲結成五倍子八月取之詳見蟲部後魏書云勿吉國水氣咸凝鹽生樹上即此物也別有鹹平樹咸草酸角皆其類也附見於下附録鹹平樹真臘國人不能為酸但用鹹平樹葉及莢與子為之酸角雲南臨安諸處有之狀如豬牙皂莢浸水和羹酸美如醋咸草扶桑東有女國産咸草葉似邪蒿而氣香味鹹彼人食之子氣味酸咸微寒無毒鹽霜制汞硫主治除痰飲瘴瘧喉中熱結喉痹止渴解酒毒黃疸飛尸蠱毒天行寒熱痰嗽變白生毛髮去頭上白屑搗末服之藏器生津降火化痰潤肺滋腎消毒止痢收汗治風濕眼病時珍發明時珍曰鹽麩子氣寒味酸而咸陰中之陰也咸能軟而潤故降火化痰消毒酸能收而澀故生津潤肺止痢腎主五液入肺為痰入脾為涎入心為汗入肝為淚自入為唾其本皆水也鹽麩五倍先走腎肝有救水之功所以痰涎盜汗風濕下淚涕唾之證皆宜用之樹白皮主治破血止血蠱毒血痢殺蛔蟲並煎服之開寶根白皮主治酒疸搗碎米泔浸一宿平旦空腹溫服一二升開寶諸骨鯁以醋煎濃汁時呷之時珍發明時珍曰按本草集議云鹽麩子根能軟雞骨岑公云有人被雞骨鯁項腫可畏用此根煎醋啜至三碗便吐出也又彭醫官治骨鯁以此根搗爛入鹽少許綿裹以線系定吞之牽引上下亦釣出骨也醋林子圖經校正自外類移入此釋名時珍曰以味得名集解頌曰醋林子生四川邛州山野林箐中木高丈餘枝葉繁茂三月開白花四出九月十月子熟纍纍數十枚成朵生青熟赤略類櫻桃而蒂短熟時採之陰乾連核用土人以鹽醋收藏充果食其葉味酸夷獠人採得入鹽和魚膾食云勝用醋也實氣味酸溫無毒主治久痢不瘥及痔漏下血蛔咬心痛小兒疳蛔心腹脹滿黃瘦下寸白蟲單搗為末酒調一錢匕服之甚效鹽醋藏者食之生津液醒酒止渴多食令人口舌粗拆也蘇頌茗唐本草校正自木部移入此釋名苦𣘻搽途二音唐本檟爾雅蔎音設荈音舛頌曰郭璞云早採為荼晚採為茗一名荈蜀人謂之苦荼陸羽云其名有五一荼二檟三蔎四茗五荈時珍曰楊慎丹鉛録云荼即古茶字音途詩云誰謂荼苦其甘如薺是也顏師古云漢時荼陵始轉途音為宅加切或言六經無茶字未深考耳集解神農食經曰荼茗生益州及山陵道旁凌冬不死三月三日採干恭曰茗生山南漢中山谷爾雅云檟苦荼郭璞注云樹小似梔子冬生葉可煮作羹飲頌曰今閩浙蜀荊江湖淮南山中皆有之通謂之荼春中始生嫩葉蒸焙去苦水末之乃可飲與古所食殊不同也陸羽茶經云茶者南方嘉木自一尺二尺至數十尺其巴川峽山有兩人合抱者伐而掇之木如瓜蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃其上者生爛石中者生礫壤下者生黃土藝法如種瓜三歲可採陽崖陰林紫者上緑者次筍者上芽者次葉卷者上舒者次在二月三月四月之間茶之筍者生於爛石之間長四五寸若蕨之始抽凌露採之茶之芽者發於叢薄之上有三枝四枝五枝於枝顛採之採得蒸焙封干有千類萬狀也略而言之如胡人靴者蹙縮然如犎牛臆者廉襜然浮雲出山者輪囷然飆風拂水者涵淡然皆茶之精好者也如竹籜如霜荷皆茶之瘠老者也其別者有石楠芽枸杞芽枇杷芽皆治風疾又有皂莢芽槐芽柳芽乃上春摘其芽和茶作之故今南人輸官茶往往雜以衆葉惟茅蘆竹箬之類不可入自余山中草木芽葉皆可和合椿柿尤奇真茶性冷惟雅州蒙山出者溫而主疾毛文錫茶譜云蒙山有五頂上有茶園其中頂曰上清峰昔有僧人病冷且久遇一老父謂曰蒙之中頂茶當以春分之先後多構人力俟雷發聲並手採擇三日而止若獲一兩以本處水煎服即能祛宿疾二兩當眼前無疾三兩能固肌骨四兩即為地仙矣其僧如說獲一兩餘服之未盡而疾瘳其四頂茶園採摘不廢惟中峰草木繁密雲霧蔽虧鷙獸時出故人跡不到矣近歲稍貴此品製作亦精於他處陳承曰近世蔡襄述閩茶極備惟建州北苑數處産者性味與諸方略不同今亦獨名蠟茶上供御用碾治作餅日曬得火愈良其他者或為芽或為末收貯若微見火便硬不可久收色味俱敗惟鼎州一種芽茶性味略類建茶今汴中及河北京西等處磨為末亦冒臘茶者是也宗奭曰苦荼即今茶也陸羽有茶經丁謂有北苑茶録毛文錫有茶譜蔡宗顏有茶對皆甚詳然古人謂茶為雀舌麥顆言其至嫩也又有新芽一發便長寸余其粗如針最為上品其根干水土力皆有餘故也雀舌麥顆又在下品前人未知爾時珍曰茶有野生種生種者用子其子大如指頂正圓黑色其仁入口初甘後苦最戟人喉而閩人以榨油食用二月下種一坎須百顆乃生一株蓋空殼者多故也畏水與日最宜坡地蔭處清明前採者上穀雨前者次之此後皆老茗爾採蒸揉焙修造皆有法詳見茶譜茶之稅始於唐德宗盛於宋元及於我朝乃與西番互市易馬夫茶一木爾下為民生日用之資上為朝廷賦稅之助其利博哉昔賢所稱大約謂唐人尚茶茶品益衆有雅州之蒙頂石花露芽穀芽為第一建寧之北苑龍鳳團為上供蜀之茶則有東川之神泉獸目硤州之碧澗明月夔州之真香邛州之火井思安黔陽之都濡嘉定之峨眉瀘州之納溪玉壘之沙坪楚之茶則有荊州之仙人掌湖南之白露長沙之鐵色蘄州蘄門之團面壽州霍山之黃芽廬州之六安英山武昌之樊山嶽州之巴陵辰州之漵浦湖南之寶慶茶陵吳越之茶則有湖州顧渚之紫筍福州方山之生芽洪州之白露雙井之白毛廬山之雲霧常州之陽羡池州之九華丫山之陽坡袁州之界橋睦州之鳩坑宣州之陽坑金華之舉岩會稽之日鑄皆産茶有名者其他猶多而猥雜更甚按陶隱居注苦菜云酉陽武昌廬江晉陵皆有好茗飲之宜人凡所飲物有茗及木葉天門冬苗菝葜葉皆益人余物並冷利又巴東縣有真茶火焙作卷結為飲亦令人不眠俗中多煮檀葉及大皂李葉作茶飲並冷利南方有瓜蘆木亦似茗也今人採櫧櫟山礬南燭烏藥諸葉皆可為飲以亂茶云葉氣味苦甘微寒無毒藏器曰苦寒久食令人瘦去人脂使人不睡飲之宜熱冷則聚痰胡洽曰與棐同食令人身重李鵬飛曰大渴及酒後飲茶水入腎經令人腰腳膀胱冷痛兼患水腫攣痹諸疾大抵飲茶宜熱宜少不飲尤佳空腹最忌之時珍曰服威靈仙土茯苓者忌飲茶主治瘻瘡利小便去痰熱止渴令人少睡有力悅志神農食經下氣消食作飲加茱萸蔥姜良蘇恭破熱氣除瘴氣利大小腸藏器清頭目治中風昏憒多睡不醒好古治傷暑合醋治泄痢甚效陳承炒煎飲治熱毒赤白痢同芎藭蔥白煎飲止頭痛吳瑞濃煎吐風熱痰涎時珍發明好古曰茗茶氣寒味苦入手足厥陰經治陰證湯藥內入此去格拒之寒及治伏陽大意相似經云苦以泄之其體下行所以能清頭目機曰頭目不清熱熏上也以苦泄其熱則上清矣且茶體輕浮採摘之時芽蘖初萌正得春升之氣味雖苦而氣則薄乃陰中之陽可升可降利頭目蓋本諸此汪穎曰一人好燒鵝炙爆日常不缺人咸防其生癰疽後卒不病訪知其人每夜必啜涼茶一碗乃知茶能解炙爆之毒也楊士瀛曰薑茶治痢姜助陽茶助陰並能消暑解酒食毒且一寒一熱調平陰陽不問赤白冷熱用之皆良生薑細切與真茶等分新水濃煎服之蘇東坡以此治文潞公有效時珍曰茶苦而寒陰中之陰沉也降也最能降火火為百病火降則上清矣然火有五火有虛實若少壯胃健之人心肺脾胃之火多盛故與茶相宜溫飲則火因寒氣而下降熱飲則茶借火氣而升散又兼解酒食之毒使人神思闓爽不昏不睡此茶之功也若虛寒及血弱之人飲之既久則脾胃惡寒元氣暗損土不制水精血潛虛成痰飲成痞脹成痿痹成黃瘦成嘔逆成洞瀉成腹痛成疝瘕種種內傷此茶之害也民生日用蹈其弊者往往皆是而婦嫗受害更多習俗移人自不覺爾況真茶既少雜茶更多其為患也又可勝言哉人有嗜茶成癖者時時咀啜不止久而傷營傷精血不華色黃瘁痿弱抱病不悔尤可嘆惋晉干寶搜神記載武官因時病後啜茗一斛二升乃止才減升合便為不足有客令更進五升忽吐一物狀如牛脾而有口澆之以茗盡一斛二升再澆五升即溢出矣人遂謂之斛茗瘕嗜茶者觀此可以戒矣陶隱居雜録言丹丘子黃山君服茶輕身換骨壺公食忌言苦茶久食羽化者皆方士謬言誤世者也按唐右補闕母炅代茶飲序云釋滯消擁一日之利暫佳瘠氣侵精終身之纍斯大獲益則功歸茶力貽患則不謂茶災豈非福近易知禍遠難見乎又宋學士蘇軾茶說云除煩去膩世故不可無茶然暗中損人不少空心飲茶入鹽直入腎經且冷脾胃乃引賊入室也惟飲食後濃茶漱口既去煩膩而脾胃不知且苦能堅齒消蠹深得飲茶之妙古人呼茗為酪奴亦賤之也時珍早年氣盛每飲新茗必至數碗輕汗發而肌骨清頗覺痛快中年胃氣稍損飲之即覺為害不痞悶嘔惡即腹冷洞泄故備述諸說以警同好焉又濃茶能令人吐乃酸苦湧泄為陰之義非其性能升也附方舊六新十四氣虛頭痛用上春茶末調成膏置瓦盞內覆轉以巴豆四十粒作二次燒煙燻之曬乾乳細每服一字別入好茶末食後煎服立效醫方大成熱毒下痢食醫心鏡赤白下痢以好茶一斤炙搗末濃煎一二盞服久患痢者亦宜服之直指用蠟茶赤痢以蜜水煎服白痢以連皮自然薑汁同水煎服二三服即愈經驗良方用蠟茶二錢湯點七分入麻油一蜆殼和服須臾腹痛大下即止一少年用之有效一方蠟茶末以白梅肉和丸赤痢甘草湯下白痢烏梅湯下各百丸一方建茶合醋煎熱服即止大便下血營衛氣虛或受風邪或食生冷或啖炙爆或飲食過度積熱腸間使脾胃受傷糟粕不聚大便下利清血臍腹作痛裡急後重及酒毒一切下血並皆治之用細茶半斤碾末川百藥煎五個燒存性每服二錢米飲下日二服普濟方産後祕塞以蔥涎調蠟茶末丸百丸茶服自通不可用大黃利藥利者百無一生郭稽中婦人方久年心痛十年五年者煎湖茶以頭醋和勻服之良兵部手集腰痛難轉煎茶五合投醋二合頓服食醫心鏡嗜茶成癖一人病此一方士令以新鞋盛茶令滿任意食盡再盛一鞋如此三度自不吃也男用女鞋女用男鞋用之果愈也集簡方解諸中毒芽茶白礬等分碾末冷水調下簡便方痘瘡作癢房中宜燒茶煙恆熏之陰囊生瘡用蠟麵茶為末先以甘草湯洗後貼之妙經驗方腳丫濕爛茶葉嚼爛敷之有效攝生方蠼螋尿瘡初如糝粟漸大如豆更大如火烙漿疱疼痛至甚者速以草茶並蠟茶俱可以生油調敷藥至痛立止勝金方風痰顛疾茶芽梔子各一兩煎濃汁一碗服良久探吐摘玄方霍亂煩悶茶末一錢煎水調幹薑末一錢服之即安聖濟總録月水不通茶清一瓶入沙糖少許露一夜服雖三個月胎亦通不可輕視鮑氏痰喘咳嗽不能睡臥好末茶一兩白殭蠶一兩為末放碗內蓋定傾沸湯一小盞臨臥再添湯點服瑞竹堂方茶子氣味苦寒有毒主治喘急咳嗽去痰垢搗仁洗衣除油膩時珍附方新三上氣喘急時有咳嗽茶子百合等分為末蜜丸梧桐子大每服七丸新汲水下聖惠方喘嗽齁䶎不拘大人小兒用糯米泔少許磨茶子滴入鼻中令吸入口服之口咬竹筒少頃涎出如線不過二三次絶根屢驗經驗良方頭腦鳴響狀如蟲蛀名大白蟻以茶子為末吹入鼻中取效楊拱醫方摘要皋蘆拾遺校正自木部移入此釋名瓜蘆弘景苦䔲藏器曰南越志云龍川縣有皋蘆一名瓜蘆葉似茗土人謂之過羅或曰物羅皆夷語也集解弘景苦菜注曰南方有瓜蘆亦似茗若摘取其葉作屑煮飲即通夜不睡煮鹽人惟資此飲而交廣最所重客來先設乃加以香芼之物李珣曰按此木即皋蘆也生南海諸山中葉似茗而大味苦澀出新平縣南人取作茗飲極重之如蜀人飲茶也時珍曰皋蘆葉狀如茗而大如手掌挼碎泡飲最苦而色濁風味比茶不及遠矣今廣人用之名曰苦䔲葉氣味苦平無毒時珍曰寒胃冷者不可用主治煮飲止渴明目除煩令人不睡消痰利水藏器通小腸治淋止頭痛煩熱李珣噙咽清上膈利咽喉時珍
