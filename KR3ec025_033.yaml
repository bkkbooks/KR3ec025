body:
  text: 果部第三十三卷果之五蓏類九種甜瓜宋嘉祐校正自菜部移入此併入本經瓜蒂釋名甘瓜唐本果瓜時珍曰瓜字篆文象瓜在須蔓間之形甜瓜之味甜於諸瓜故獨得甘甜之稱舊列菜部誤矣按王禎云瓜類不同其用有二供果者為果瓜甜瓜西瓜是也供菜者為菜瓜胡瓜越瓜是也在木曰果在地曰蓏大曰瓜小曰瓞其子曰䔇其肉曰瓤其跗曰環謂脫花處也其蒂曰疐謂系蔓處也禮記為天子削瓜及瓜祭皆指果瓜也本草瓜蒂亦此瓜之蒂也集解別録曰瓜蒂生嵩高平澤七月七日採陰乾頌曰瓜蒂即甜瓜蒂也處處有之園圃所蒔有青白二種子色皆黃入藥當用早青瓜蒂為良時珍曰甜瓜北土中州種蒔甚多二三月下種延蔓而生葉大數寸五六月花開黃色六七月瓜熟其類甚繁有團有長有尖有扁大或徑尺小或一捻其稜或有或無其色或青或緑或黃斑糝斑或白路黃路其瓤或白或紅其子或黃或赤或白或黑按王禎農書云瓜品甚多不可枚舉以狀得名則有龍肝虎掌兔頭貍首羊髓蜜筒之稱以色得名則有烏瓜白團黃㼐白㼐小青大斑之別然其味不出乎甘香而已廣志惟以遼東敦煌廬江之瓜為勝然瓜州之大瓜陽城之御瓜西蜀之溫瓜永嘉之寒瓜未可以優劣論也甘肅甜瓜皮瓤皆甘勝糖蜜其皮曝乾猶美浙中一種陰瓜種於陰處熟則色黃如金膚皮稍厚藏之至春食之如新此皆種藝之功不必拘於土地也甜瓜子曝裂取仁可充果食凡瓜最畏麝氣觸之甚至一蒂不收瓜瓤氣味甘寒滑有小毒大明曰無毒思邈曰多食發黃疸令人虛羸多忘解藥力病後食多或反胃腳氣人食之患永不除也詵曰多食令人陰下濕癢生瘡動宿冷症癖病破腹發虛熱令人惙惙氣弱腳手無力少食則可龍魚河圖云凡瓜有兩鼻兩蒂者殺人五月瓜沉水者食之得冷病終身不瘥九月被霜者食之冬病寒熱與油餅同食發病多食瓜作脹者食鹽花即化弘景曰食瓜多即入水自漬便消時珍曰張華博物志言人以冷水漬至膝可頓啖瓜至數十枚漬至項其啖轉多水皆作瓜氣也則水浸消瓜亦物性也瓜最忌麝與酒凡食瓜過多但飲酒及水服麝香尤勝於食鹽漬水也主治止渴除煩熱利小便通三焦間壅塞氣治口鼻瘡嘉祐暑月食之永不中暑宗奭發明宗奭曰甜瓜雖解暑氣而性冷消損陽氣多食未有不下利者貧下多食深秋作痢最為難治惟以皮蜜浸收之良皮亦可作羹食弘景曰凡瓜皆冷利早青者尤甚熟瓜除瓤食之不害人時珍曰瓜性最寒曝而食之尤冷故稽聖賦云瓜寒於曝油冷於煎此物性之異也王冀洛都賦云瓜則消暑蕩悁解渴療飢又奇效良方云昔有男子病膿血惡痢痛不可忍以水浸甜瓜食數枚即愈此亦消暑之驗也瓜子仁修治斆曰凡收得曝乾杵細馬尾篩篩過成粉以紙三重裹壓去油用不去油其力短也西瓜子仁同氣味甘寒無毒主治腹內結聚破潰膿血最為腸胃脾內壅要藥別録止月經太過研末去油水調服藏器炮炙論序曰血泛經過飲調瓜子炒食補中宜人孟詵清肺潤腸和中止渴時珍附方舊一新二口臭用甜瓜子杵末蜜和為丸每旦漱口後含一丸亦可貼齒千金腰腿疼痛甜瓜子三兩酒浸十日為末每服三錢空心酒下日三壽域神方腸癰已成小腹腫痛小便似淋或大便難澀下膿用甜瓜子一合當歸炒一兩蛇蛻皮一條㕮咀每服四錢水一盞半煎一盞食前服利下惡物為妙聖惠瓜蒂本經上品釋名瓜丁千金苦丁香象形修治斆曰凡使勿用白瓜蒂要取青緑色瓜氣足時其蒂自然落在蔓上採得系屋東有風處吹乾用宗奭曰此甜瓜蒂也去瓜皮用蒂約半寸許曝極干臨時研用時珍曰按唐瑤云甜瓜蒂以團而短瓜團瓜者良若香甜瓜及長如瓠子者皆供菜之瓜其蒂不可用也氣味苦寒有毒大明曰無毒主治大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之本經去鼻中息肉療黃疸別録治腦塞熱齆眼昏吐痰大明吐風熱痰涎治風眩頭痛癲癇喉痹頭目有濕氣時珍得麝香細辛治鼻不聞香臭好古發明張機曰病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸中有寒也當吐之太陽中暍身熱疼重而脈微弱此夏月傷冷水水行皮中也宜吐之少陽病頭痛發寒熱脈緊不大是膈上有痰也宜吐之病胸上諸實鬱郁而痛不能食欲人按之而反有濁唾下利日十餘行寸口脈微弦者當吐之懊憹煩躁不得眠未經汗下者謂之實煩當吐之宿食在上管者當吐之並宜以瓜蒂散主之惟諸亡血虛家不可與瓜蒂散也成無己曰高者越之在上者湧之故越以瓜蒂香豉之苦湧以赤小豆之酸酸苦湧泄為陰也杲曰難經云上部有脈下部無脈其人當吐不吐者死此飲食內傷填塞胸中食傷太陰風木生髮之氣伏於下宜瓜蒂散吐之素問所謂木鬱則達之也吐去上焦有形之物則木得舒暢天地交而萬物通矣若尺脈絶者不宜用此恐損真元令人胃氣不復也宗奭曰此物吐涎甚不損人全勝石緑硇砂輩也震亨曰瓜蒂性急能損胃氣胃弱者宜以他藥代之病後産後尤宜深戒時珍曰瓜蒂乃陽明經除濕熱之藥故能引去胸脘痰涎頭目濕氣皮膚水氣黃疸濕熱諸證凡胃弱人及病後産後用吐藥皆宜加慎何獨瓜蒂為然附方舊七新十五瓜蒂散治證見上其方用瓜蒂二錢半熬黃赤小豆二錢半為末每用一錢以香豉一合熱湯七合煮糜去滓和服稍稍加之快吐乃止仲景傷寒論太陽中暍身熱頭痛而脈微弱此夏月傷冷水水行皮中所致瓜蒂二七個水一升煮五合頓服取吐金匱要略風涎暴作氣塞倒僕用瓜蒂為末每用一二錢膩粉一錢匕以水半合調灌良久涎自出不出含沙糖一塊下咽即涎出也寇氏衍義諸風諸癇諸風膈痰諸癇涎湧用瓜蒂炒黃為末量人以酸齏水一盞調下取吐風癇加蠍梢半錢濕氣腫滿加赤小豆末一錢有蟲加狗油五七點雄黃一錢甚則加芫花半錢立吐蟲出東垣活法機要風癇喉風咳嗽及遍身風疹急中涎潮等症不拘大人小兒此藥不大吐逆只出涎水瓜蒂為末壯年服一字老少半字早晨井華水下一食頃含沙糖一塊良久涎如水出年深者出墨涎有塊布水上也涎盡食粥一兩日如吐多人困甚即以麝香泡湯一盞飲之即止經驗後方急黃喘息心上堅硬欲得水吃者瓜蒂二小合赤小豆一合研末暖漿水五合服方寸匕一炊久當吐不吐再服吹鼻取水亦可傷寒類要遍身如金瓜蒂四十九枚丁香四十九枚甘鍋內燒存性為末每用一字吹鼻取出黃水亦可揩牙追涎經驗方熱病發黃瓜蒂為末以大豆許吹鼻中輕則半日重則一日流取黃水乃愈千金翼黃疸癊黃並取瓜蒂丁香赤小豆各七枚為末吹豆許入鼻少時黃水流出隔日一用瘥乃止孟詵食療身面浮腫方同上十種蠱氣苦丁香為末棗肉和丸梧桐子大每服三十丸棗湯下甚效瑞竹堂方濕家頭痛瓜蒂末一字嗅入鼻中口含冷水取出黃水愈活人書瘧疾寒熱瓜蒂二枚水半盞浸一宿頓服取吐愈千金發狂欲走瓜蒂末井水服一錢取吐即愈聖惠方大便不通瓜蒂七枚研末綿裹塞入下部即通必效方鼻中息肉聖惠用陳瓜蒂末吹之日三次瘥乃已又方瓜蒂末白礬末各半錢綿裹塞之或以豬脂和挺子塞之日一換又方青甜瓜蒂二枚雄黃麝香半分為末先抓破後貼之日三次湯液用瓜蒂十四個丁香一個黍米四十九粒研末口中含水嗅鼻取下乃止風熱牙痛瓜蒂七枚炒研麝香少許和之綿裹咬定流涎聖濟總録雞屎白禿甜瓜蔓連蒂不拘多少以水浸一夜砂鍋熬取苦汁去滓再熬如餳盛收每剃去痂疕洗淨以膏一盞加半夏末二錢薑汁一匙狗膽汁一枚和勻塗之不過三上忌食動風之物儒門事親齁喘痰氣苦丁香三個為末水調服吐痰即止朱氏集驗方蔓陰乾主治女人月經斷絶同使君子各半兩甘草六錢為末每酒服二錢花主治心痛咳逆別録葉主治人無發搗汁塗之即生嘉祐補中治小兒疳及打傷損折為末酒服去瘀血孟詵附方新一面上黶子七月七日午時取生瓜葉七枚直入北堂中向南立逐枚拭靨即滅去也淮南萬畢術西瓜日用釋名寒瓜見下集解瑞曰契丹破回紇始得此種以牛糞覆而種之結實如斗大而圓如匏色如青玉子如金色或黑麻色北地多有之時珍曰按胡嶠陷虜記言嶠徵回紇得此種歸名曰西瓜則西瓜自五代時始入中國今則南北皆有而南方者味稍不及亦甜瓜之類也二月下種蔓生花葉皆如甜瓜七八月實熟有圍及徑尺者長至二尺者其稜或有或無其色或青或緑其瓤或白或紅紅者味尤勝其子或黃或紅或黑或白白者味更劣其味有甘有淡有酸酸者為下陶弘景注瓜蒂言永嘉有寒瓜甚大可藏至春者即此也蓋五代之先瓜種已入浙東但無西瓜之名未遍中國爾其瓜子曝裂取仁生食炒熟俱佳皮不堪啖亦可蜜煎醬藏頌曰一種楊溪瓜秋生冬熟形略長扁而大瓤色如胭脂味勝可留至次年云是異人所遺之種也瓜瓤氣味甘淡寒無毒瑞曰有小毒多食作吐利胃弱者不可食同油餅食損脾時珍曰按延壽書云北人稟厚食之猶慣南人稟薄多食易至霍亂冷病終身也又按相感志云食西瓜後食其子即不噫瓜氣以瓜劃破曝日中少頃食即冷如水也得酒氣近糯米即易爛貓踏之即易沙主治消煩止渴解暑熱吳瑞療喉痹汪穎寬中下氣利小水治血痢解酒毒寧原含汁治口瘡震享發明穎曰西瓜性寒解熱有天生白虎湯之號然亦不宜多食時珍曰西瓜甜瓜皆屬生冷世俗以為醍醐灌頂甘露灑心取其一時之快不知其傷脾助濕之害也真西山衛生歌云瓜桃生冷宜少飧免致秋來成瘧痢是矣又李鵬飛延壽書云防州太守陳逢原避暑食瓜過多至秋忽腰腿痛不能舉動遇商助教療之乃愈此皆食瓜之患也故集書於此以為鑑戒云又洪忠宣松漠紀聞言有人苦目病或令以西瓜切片曝乾日日服之遂愈由其性冷降火故也皮氣味甘涼無毒主治口舌唇內生瘡燒研噙之震亨附方新二間挫腰痛西瓜青皮陰乾為末鹽酒調服三錢攝生衆妙方食瓜過傷瓜皮煎湯解之諸瓜皆同事林廣記瓜子仁氣味甘寒無毒主治與甜瓜仁同時珍葡萄本經上品釋名蒲桃古字草龍珠時珍曰葡萄漢書作蒲桃可以造酒人酺飲之則醄然而醉故有是名其圓者名草龍珠長者名馬乳葡萄白者名水晶葡萄黑者名紫葡萄漢書言張騫使西域還始得此種而神農本草已有葡萄則漢前隴西舊有但未入關耳集解別録曰葡萄生隴西五原敦煌山谷弘景曰魏國使人多齎來南方狀如五味子而甘美可作酒云用藤汁殊美北人多肥健耐寒蓋食斯乎不植淮南亦如橘之變於河北也人説即是此間櫻薁恐亦如枳之與橘耶恭曰櫻薁即山葡萄苗葉相似亦堪作酒葡萄取子汁釀酒陶云用藤汁謬矣頌曰今河東及近汴州郡皆有之苗作藤蔓而極長太盛者一二本綿被山谷間花極細而黃白色其實有紫白二色有圓如珠者有長似馬乳者有無核者皆七月八月熟取汁可釀酒按史記云大宛以葡萄釀酒富人藏酒萬餘石久者十數年不敗張騫使西域得其種還中國始有蓋北果之最珍者今太原尚作此酒寄遠也其根莖中空相通暮溉其根而晨朝水浸子中矣故俗呼其苗為木通以利小腸江東出一種實細而酸者名櫻薁子宗奭曰段成式言葡萄有黃白黑三種唐書言波斯所出者大如雞卵此物最難乾不幹不可收不問土地但收皆可釀酒時珍曰葡萄折藤壓之最易生春月萌苞生葉頗似栝蔞葉而有五尖生須延蔓引數十丈三月開小花成穗黃白色仍連著實星編珠聚七八月熟有紫白二色西人及太原平陽皆作葡萄乾貨之四方蜀中有緑葡萄熟時色緑雲南所出者大如棗味尤長西邊有瑣瑣葡萄大如五味子而無核按物類相感志云甘草作釘針葡萄立死以麝香入葡萄皮內則葡萄盡作香氣其愛憎異於他草如此又言其藤穿過棗樹則實味更美也三元延壽書言葡萄架下不可飲酒恐蟲屎傷人實氣味甘平澀無毒詵曰甘酸溫多食令人猝煩悶眼暗主治筋骨濕痹益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年可作酒本經逐水利小便別録除腸間水調中治淋甄權時氣痘瘡不出食之或研酒飲甚效蘇頌發明頌曰按魏文帝詔群臣曰蒲桃當夏末涉秋尚有餘暑醉酒宿酲掩露而食甘而不飴酸而不酢冷而不寒味長汁多除煩解渴又釀為酒甘於麴櫱善醉而易醒他方之果寧有匹之者乎震亨曰葡萄屬土有水與木火東南人食之多病熱西北人食之無恙蓋能下走滲道西北人稟氣厚故耳附方新三除煩止渴生葡萄搗濾取汁以瓦器熬稠入熟蜜少許同收點湯飲甚良居家必用熱淋澀痛葡萄搗取自然汁生藕搗取自然汁生地黃搗取自然汁白沙蜜各五合每服一盞石器溫服聖惠方胎上衝心葡萄煎湯飲之即下聖惠方根及藤葉氣味同實主治煮濃汁細飲止嘔噦及霍亂後噁心孕婦子上衝心飲之即下胎安孟詵治腰腳肢腿痛煎湯淋洗之良又飲其汁利小便通小腸消腫滿時珍附方新一水腫葡萄嫩心十四個螻蛄七個去頭尾同研露七日曝乾為末每服半錢淡酒調下暑月尤佳潔古保命集櫻薁音嬰郁綱目校正原附葡萄下今分出釋名燕薁毛詩嬰舌廣雅山葡萄唐注野葡萄俗名藤名木龍時珍曰名義未詳集解恭曰櫻薁蔓生苗葉與葡萄相似而小亦有莖大如碗者冬月惟葉凋而藤不死藤汁味甘子味甘酸即千歲藟也頌曰櫻薁子生江東實似葡萄細而味酸亦堪為酒時珍曰櫻薁野生林墅間亦可插植蔓葉花實與葡萄無異其實小而圓色不甚紫也詩云六月食薁即此其莖吹之氣出有汁如通草也正誤藏器曰蘇恭注千歲藟即是櫻薁妄言也千歲藟藤如葛而葉背白子赤可食櫻薁藤斫斷通氣更無甘汁詳見草部千歲藟下時珍曰蘇恭所説櫻薁形狀甚是但以為千歲藟則非矣實氣味甘酸平無毒主治止渴悅色益氣蘇恭藤氣味甘平無毒主治噦逆傷寒後嘔噦搗汁飲之良蘇恭止渴利小便時珍附方新三嘔啘厥逆櫻薁藤煎汁呷之肘後方目中障翳櫻薁藤以水浸過吹氣取汁滴入目中去熱翳赤白障拾遺本草五淋血淋木龍湯用木龍即野葡萄藤也竹園荽淡竹葉麥門冬連根苗紅棗肉燈心草烏梅當歸各等分煎湯代茶飲百一選方根氣味同藤主治下焦熱痛淋祕消腫毒時珍附方新四男婦熱淋野葡萄根七錢葛根三錢水一鍾煎七分入童子小便三分空心溫服乾坤祕韞女人腹痛方同上一切腫毒赤龍散用野葡萄根曬研為末水調塗之即消也儒門事親方赤遊風腫忽然腫癢不治則殺人用野葡萄根搗如泥塗之即消通變要法獼猴桃宋開寶釋名獼猴梨開寶藤梨同上陽桃日用木子時珍曰其形如梨其色如桃而獼猴喜食故有諸名閩人呼為陽桃集解志曰生山谷中藤著樹生葉圓有毛其實形似雞卵大其皮褐色經霜始甘美可食皮堪作紙宗奭曰今陝西永興軍南山甚多枝條柔弱高二三丈多附木而生其子十月爛熟色淡緑生則極酸子繁細其色如芥子淺山傍道則有存者深山則多為猴所食矣實氣味酸甘寒無毒藏器曰咸酸無毒多食冷脾胃動泄澼宗奭曰有實熱者宜食之太過則令人臟寒作泄主治止暴渴解煩熱壓丹石下石淋開寶詵曰並宜取瓤和蜜作煎食調中下氣主骨節風癱緩不隨長年白髮野雞內痔病藏器藤中汁氣味甘滑寒無毒主治熱壅反胃和生薑汁服之又下石淋藏器枝葉主治殺蟲煮汁飼狗療瘑疥開寶甘蔗音柘別録中品釋名竿蔗草木狀薯音遮時珍曰按野史云呂惠卿言凡草皆正生嫡出惟蔗側種根上庶出故字從庶也嵇含作竿蔗謂其莖如竹竿也離騷漢書皆作柘字通用也薯字出許慎説文蓋蔗音之轉也集解弘景曰蔗出江東為勝廬陵亦有好者廣州一種數年生皆大如竹長丈餘取汁為沙糖甚益人又有荻蔗節疏而細亦可啖也頌曰今江浙閩廣湖南蜀川所生大者亦高丈許有二種荻蔗其葉似荻莖細短而節疏但堪生啖亦可煎稀糖竹蔗莖粗而長可榨汁為沙糖泉福吉廣諸州多作之煉沙糖和牛乳為乳糖惟蜀川作之南人販至北地者荻蔗多而竹蔗少也詵曰蔗有赤色者名崑崙蔗白色者名荻蔗竹蔗以蜀及嶺南者為勝江東雖有而劣於蜀産會稽所作乳糖殆勝於蜀時珍曰蔗皆畦種叢生最困地力莖似竹而內實大者圍數寸長六七尺根下節密以漸而疏抽葉如蘆葉而大長三四尺扶疏四垂八九月收莖可留過春充果食按王灼糖霜譜云蔗有四色曰杜蔗即竹蔗也緑嫩薄皮味極醇厚專用作霜曰西蔗作霜色淺曰艻蔗亦名蠟蔗即荻蔗也亦可作沙糖曰紅蔗亦名紫蔗即昆倉蔗也止可生啖不堪作糖凡蔗榨漿飲固佳又不若咀嚼之味雋永也蔗氣味甘平澀無毒大明曰冷詵曰共酒食發痰瑞曰多食發虛熱動衄血相感志云同棐子食則渣軟主治下氣和中助脾氣利大腸別録利大小腸消痰止渴除心胸煩熱解酒毒大明止嘔噦反胃寬胸膈時珍發明時珍曰蔗脾之果也其漿甘寒能瀉火熱素問所謂甘溫除大熱之意煎煉成糖則甘溫而助濕熱所謂積溫成熱也蔗漿消渴解酒自古稱之故漢書郊祀歌云百末旨酒布蘭生泰尊柘漿析朝酲唐王維櫻桃詩云飽食不須愁內熱大官還有蔗漿寒是矣而孟詵乃謂共酒食發痰者豈不知其有解酒除熱之功耶日華子大明又謂沙糖能解酒毒則不知既經煎煉便能助酒為熱與生漿之性異矣按朝氏客話云甘草遇火則熱麻油遇火則冷甘蔗煎飴則熱水成湯則冷此物性之異醫者可不知乎又野史云盧絳中病痁疾疲瘵忽夢白衣婦人云食蔗可愈及旦買蔗數挺食之翌日疾愈此亦助脾和中之驗歟附方舊三新四發熱口乾小便赤澀取甘蔗去皮嚼汁咽之飲漿亦可外臺祕要痰喘氣急方見山藥反胃吐食朝食暮吐暮食朝吐旋旋吐者用甘蔗汁七升生薑汁一升和勻日日細呷之梅師方乾嘔不息蔗汁溫服半升日三次入薑汁更佳肘後方痁瘧疲瘵見前眼暴赤腫磣澀疼痛甘蔗汁二合黃連半兩入銅器內慢火養濃去滓點之普濟虛熱咳嗽口乾涕唾用甘蔗汁一升半青粱米四合煮粥日食二次極潤心肺董氏方小兒口疳蔗皮燒研摻之簡便方滓主治燒存性研末烏桕油調塗小兒頭瘡白禿頻塗取瘥燒煙勿令入人目能使暗明時珍沙糖唐本草集解恭曰沙糖蜀地西戎江東並有之榨甘蔗汁煎成紫色瑞曰稀者為蔗糖乾者為沙糖球者為球糖餅者為糖餅沙糖中凝結如石破之如沙透明白者為糖霜時珍曰此紫沙糖也法出西域唐太宗始遣人傳其法入中國以蔗汁過樟木槽取而煎成清者為蔗糖凝結有沙者為沙糖漆甕造成如石如霜如冰者為石蜜為糖霜為冰糖也紫糖亦可煎化印成鳥獸果物之狀以充席獻今之貨者又多雜以米餳諸物不可不知氣味甘寒無毒恭曰冷利過於石蜜詵曰性溫不冷多食令人心痛生長蟲消肌肉損齒發疳𧈟與鯽魚同食成疳蟲與葵同食生流澼與筍同食不消成症身重不能行主治心腹熱脹口乾渴唐本潤心肺大小腸熱解酒毒臘月瓶封窖糞坑中患天行熱狂者絞汁服甚良大明和中助脾緩肝氣時珍發明宗奭曰蔗汁清故費煎煉致紫黑色今醫家治暴熱多用為先導兼啖駝馬解熱小兒多食則損齒生蟲者土製水倮蟲屬土得甘即生也震亨曰糖生胃火乃濕土生熱故能損齒生蟲與食棗病齲同意非土製水也時珍曰沙糖性溫殊於蔗漿故不宜多食與魚筍之類同食皆不益人今人每用為調和徒取其適口而不知陰受其害也但其性能和脾緩肝故治脾胃及瀉肝藥用為先導本草言其性寒蘇恭謂其冷利皆昧此理附方舊一新五下痢禁口沙糖半斤烏梅一個水二碗煎一碗時時飲之摘玄方腹中緊脹白糖以酒三升煮服之不過再服子母祕録痘不落痂沙糖調新汲水一杯服之白湯調亦可日二服劉提點方虎傷人瘡水化沙糖一碗服並塗之摘玄方上氣喘嗽煩熱食即吐逆用沙糖薑汁等分相和慢煎二十沸每咽半匙取效食韭口臭沙糖解之摘要方石蜜唐本草釋名白沙糖恭曰石蜜即乳糖也與蟲部石蜜同名時珍曰按萬震涼州異物志云石蜜非石類假石之名也實乃甘蔗汁煎而曝之則凝如石而體甚輕故謂之石蜜也集解志約曰石蜜出益州及西戎煎煉沙糖為之可作餅塊黃白色恭曰石蜜用水牛乳米粉和煎成塊作餅堅重西戎來者佳江左亦有殆勝於蜀詵曰自蜀中波斯來者良東吳亦有不及兩處者皆煎蔗汁牛乳則易細白耳宗奭曰石蜜川浙者最佳其味厚他處皆次之煎煉以型象物達京師至夏月及久陰雨多自消化土人先以竹葉及紙裹包外用石夾埋之不得見風遂可免今人謂之乳糖其作餅黃白色者謂之捻糖易消化入藥至少時珍曰石蜜即白沙糖也凝結作餅塊如石者為石蜜輕白如霜者為糖霜堅白如冰者為冰糖皆一物有精粗之異也以白糖煎化模印成人物獅象之形者為饗糖後漢書注所謂猊糖是也以石蜜和諸果仁及橙橘皮縮砂薄荷之類作成餅塊者為糖纏以石蜜和牛乳酥酪作成餅塊者為乳糖皆一物數變也唐本草明言石蜜煎沙糖為之而諸注皆以乳糖即為石蜜殊欠分明按王灼糖霜譜云古者惟飲蔗漿其後煎為蔗餳又曝為石蜜唐初以蔗為酒而糖霜則自大曆間有鄒和尚者來住蜀之遂寧傘山始傳造法故甘蔗所在植之獨有福建四明番禺廣漢遂寧有冰糖他處皆顆碎色淺味薄惟竹蔗緑嫩味厚作霜最佳西蔗次之凡霜一甕其中品色亦自不同惟疊如假山者為上團枝次之甕鑑次之小顆塊又次之沙腳為下紫色及如水晶色者為上深琥珀色次之淺黃又次之淺白為下氣味甘寒冷利無毒主治心腹熱脹口乾渴唐本治目中熱膜明目和棗肉巨勝末為丸噙之潤肺氣助五臟生津孟詵潤心肺燥熱治嗽消痰解酒和中助脾氣緩肝氣時珍發明震亨曰石蜜甘喜入脾食多則害必生於脾西北地高多燥得之有益東北地下多濕得之未有不病者亦兼氣之厚薄不同耳時珍曰石蜜糖霜冰糖比之紫沙糖性稍平功用相同入藥勝之然不冷利若久食則助熱損齒生蟲之害同也刺蜜拾遺校正自草部移入此釋名草蜜拾遺給勃羅集解藏器曰交河沙中有草頭上有毛毛中生蜜胡人名為給勃羅時珍曰按李延壽北史云高昌有草名羊刺其上生蜜味甚甘美又梁四公子記云高昌貢刺蜜傑公云南平城羊刺無葉其蜜色白而味甘鹽城羊刺葉大其蜜色青而味薄也高昌即交河在西番今為火州又段成式酉陽雜俎云北天竺國有蜜草蔓生大葉秋冬不死因受霜露遂成蜜也又大明一統志云西番撒馬兒罕地有小草叢生葉細如藍秋露凝其上味甘如蜜可熬為餳土人呼為達即古賓蓋甘露也按此二説皆草蜜也但不知其草即羊刺否也又有𥡎齊樹亦出蜜云可入藥而不得其詳今附於下附録𥡎齊音別按段成式云𥡎齊出波斯國拂林國亦有之名𩑒勃梨他𩑒音奪樹長丈餘皮色青薄光淨葉似阿魏生於枝端一枝三葉八月伐之蠟月更抽新條七月斷其枝有黃汁如蜜微香可以入藥療病也氣味甘平無毒主治骨蒸發熱痰嗽暴痢下血開胃止渴除煩藏器果之六水果類六種蓮藕本經上品釋名其根藕爾雅其實蓮同上其莖葉荷韓保升曰藕生水中其葉名荷按爾雅云荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中菂菂中薏邢昺注云芙蕖總名也別名芙蓉江東人呼為荷菡萏蓮花也菂蓮實也薏菂中青心也郭璞注云蔤乃莖下白蒻在泥中者蓮乃房也菂乃子也薏乃中心苦薏也江東人呼荷花為芙蓉北人以藕為荷亦以蓮為荷蜀人以藕為茄此皆習俗傳誤也陸機詩疏云其莖為荷其花未發為菡萏已發為芙蕖其實蓮蓮之皮青里白其子菂菂之殼青肉白菂內青心二三分為苦薏也時珍曰爾雅以荷為根名韓氏以荷為葉名陸機以荷為莖名按莖乃負葉者也有負荷之義當從陸説蔤乃嫩蒻如竹之行鞭者節生二莖一為葉一為花盡處乃生藕為花葉根實之本顯仁藏用功成不居可謂退藏於密矣故謂之蔤花葉常偶生不偶不生故根曰藕或云藕善耕泥故字從耦耦者耕也茄音加加於蔤上也蕸音遐遠於密也菡萏函合未發之意芙蓉敷布容豔之意蓮者連也花實相連而出也菂者的也子在房中點點如的也的乃凡物點注之名薏猶意也含苦在內也古詩云食子心無棄苦心生意存是矣集解別録曰藕實莖生汝南池澤八月採當之曰所在池澤皆有豫章汝南者良苗高五六尺葉團青大如扇其花赤子黑如羊矢時珍曰蓮藕荊揚豫益諸處湖澤陂池皆有之以蓮子種者生遲藕芽種者最易發其芽穿泥成白蒻即蔤也長者至丈餘五六月嫩時沒水取之可作蔬茹俗呼藕絲菜節生二莖一為藕荷其葉貼水其下旁行生藕也一為芰荷其葉出水其旁莖生花也其葉清明後生六七月開花花有紅白粉紅三色花心有黃鬚蕊長寸余須內即蓮也花褪連房成菂菂在房如蜂子在窠之狀六七月採嫩者生食脆美至秋房枯子黑其堅如石謂之石蓮子八九月收之斫去黑殼貨之四方謂之蓮肉冬月至春掘藕食之藕白有孔有絲大者如肱臂長六七尺凡五六節大抵野生及紅花者蓮多藕劣種植及白花者蓮少藕佳也其花白者香紅者豔千葉者不結實別有合歡並頭者有夜舒荷夜布晝卷睡蓮花夜入水金蓮花黃碧蓮花碧繡蓮花如繡皆是異種故不述相感志云荷梗塞穴鼠自去煎湯洗鑞垢自新物性然也蓮實釋名藕實本經菂爾雅薂音吸同上石蓮子別録水芝本經澤芝古今注修治弘景曰藕實即蓮子八九月採黑堅如石者干搗破之頌曰其菂至秋黑而沉水為石蓮子可磨為飯食時珍曰石蓮剁去黑殼謂之蓮肉以水浸去赤皮青心生食甚佳入藥須蒸熟去心或曬或焙乾用亦有每一斤用獖豬肚一個盛貯煮熟搗焙用者今藥肆一種石蓮子狀如土石而味苦不知何物也氣味甘平澀無毒別録曰寒大明曰蓮子石蓮性俱溫時珍曰嫩菂性平石蓮性溫得茯苓山藥白朮枸杞子良詵曰生食過多微動冷氣脹人蒸食甚良大便燥澀者不可食主治補中養神益氣力除百疾久服輕身耐老不飢延年本經主五臟不足傷中氣絶益十二經脈血氣孟詵止渴去熱安心止痢治腰痛及泄精多食令人歡喜大明交心腎厚腸胃固精氣強筋骨補虛損利耳目除寒濕止脾泄久痢赤白濁女人帶下崩中諸血病時珍搗碎和米作粥飯食輕身益氣令人強健蘇頌出詩疏安靖上下君相火邪嘉謨發明時珍曰蓮産於淤泥而不為泥染居於水中而不為水沒根莖花實凡品難同清淨濟用群美兼得自蒻蔤而節節生莖生葉生花生藕由菡萏而生蕊生蓮生菂生薏其蓮菂則始而黃黃而青青而緑緑而黑中含白肉內隱青心石蓮堅剛可歷永久薏藏生意藕覆萌芽展轉生生造化不息故釋氏用為引譬妙理具存醫家取為服食百病可卻蓋蓮之味甘氣溫而性嗇稟清芳之氣得稼穡之味乃脾之果也脾者黃宮所以交媾水火會合木金者也土為元氣之母母氣既和津液相成神乃自生久視耐老此其權輿也昔人治心腎不交勞傷白濁有清心蓮子飲補心腎益精血有瑞蓮丸皆得此理藏器曰經秋正黑名石蓮子入水必沉惟煎鹽滷能浮之此物居山海間經百年不壞人得食之令發黑不老詵曰諸鳥猿猴取得不食藏之石室內人得三百年者食之永不老也又雁食之糞于田野山岩之中不逢陰雨經久不壞人得之每旦空腹食十枚身輕能登高涉遠也附方舊四新十服食不飢詵曰石蓮肉蒸熟去心為末煉蜜丸梧桐子大日服三十丸此仙家方也清心寧神宗奭曰用蓮蓬中干石蓮子肉於砂盆中擦去赤皮留心同為末入龍腦點湯服之補中強志益耳目聰明用蓮實半兩去皮心研末水煮熟以粳米三合作粥入末攪勻食聖惠方補虛益損水芝丹用蓮實半升酒浸二宿以牙豬肚一個洗淨入蓮在內縫定煮熟取出曬乾為末酒煮米糊丸梧桐子大每服五十丸食前溫酒送下醫學發明小便頻數下焦真氣虛弱者用上方醋糊丸服白濁遺精石蓮肉龍骨益智仁等分為末每服二錢空心米飲下普濟用蓮肉白茯苓等分為末白湯調服心虛赤濁蓮子六一湯用石蓮肉六兩炙甘草一兩為末每服一錢燈心湯下直指方久痢禁口石蓮肉炒為末每服二錢陳倉米湯調下便覺思食甚妙加入香連丸尤妙丹溪心法脾泄腸滑方同上噦逆不止石蓮肉六枚炒赤黃色研末冷熟水半盞和服便止蘇頌圖經産後咳逆嘔吐心忡目暈用石蓮子兩半白茯苓一兩丁香五錢為末每米飲服二錢良方補遺眼赤作痛蓮實去皮研末一盞粳米半升以水煮粥常食普濟方小兒熱渴蓮實二十枚炒浮萍二錢半生薑少許水煎分三服聖濟總録反胃吐食石蓮肉為末入少肉豆寇末米湯調服之直指方藕氣味甘平無毒大明曰溫時珍曰相感志云藕以鹽水共食則不損口同油炸面米果食則無渣煮忌鐵器主治熱渴散留血生肌久服令人心歡別録止怒止泄消食解酒毒及病後乾渴藏器搗汁服止悶除煩開胃治霍亂破産後血悶搗膏罯金瘡並傷折止暴痛蒸煮食之大能開胃大明生食治霍亂後虛渴蒸食甚補五臟實下焦同蜜食令人腹臟肥不生諸蟲亦可休糧孟詵汁解射罔毒蟹毒徐之才搗浸澄粉服食輕身益年臞仙發明弘景曰根入神仙家宋時太官作血䘓音勘庖人削藕皮誤落血中遂散渙不凝故醫家用以破血多效也䘓者血羹也詵曰産後忌生冷物獨藕不同生冷者為能破血也時珍曰白花藕大而孔扁者生食味甘煮食不美紅花及野藕生食味澀煮蒸則佳夫藕生於卑汙而潔白自若質柔而穿堅居下而有節孔竅玲瓏絲綸內隱生於嫩蒻而發為莖葉花實又復生芽以續生生之脈四時可食令人心歡可謂靈根矣故其所主者皆心脾血分之疾與蓮之功稍不同云附方舊四新八時氣煩渴生藕汁一盞生蜜一合和勻細服聖惠傷寒口乾生藕汁生地黃汁童子小便各半盞煎溫服之龐安時傷寒論霍亂煩渴藕汁一鍾薑汁半鍾和勻飲聖濟總録霍亂吐利生藕搗汁服聖惠上焦痰熱藕汁梨汁各半盞和服簡便産後悶亂血氣上衝口乾腹痛梅師方用生藕汁三升飲之龐安時用藕汁生地黃汁童子小便等分煎服小便熱淋生藕汁生地黃汁葡萄汁各等分每服囗盞入蜜溫服墜馬血瘀積在胸腹唾血無數者干藕根為末酒服方寸匕日二次千金方食蟹中毒生藕汁飲之聖惠凍腳裂坼蒸熟藕搗爛塗之塵芒入目大藕洗搗綿裹滴汁入目中即出也普濟方藕蔤釋名藕絲菜五六月嫩時採為蔬茹老則為藕梢味不堪矣氣味甘平無毒主治生食主霍亂後虛渴煩悶不能食解酒食毒蘇頌功與藕同時珍解煩毒下瘀血汪穎藕節氣味澀平無毒大明曰冷伏硫黃主治搗汁飲主吐血不止及口鼻出血甄權消瘀血解熱毒産後血悶和地黃研汁入熱酒小便飲大明能止咳血唾血血淋溺血下血血痢血崩時珍發明時珍曰一男子病血淋痛脹祈死豫以藕汁調發灰每服二錢服三日而血止痛除按趙溍養疴漫筆云宋孝宗患痢衆醫不效高宗偶見一小藥肆召而問之其人問得病之由乃食湖蟹所致遂診脈曰此冷痢也乃用新採藕節搗爛熱酒調下數服即愈高宗大喜就以搗藥金杵臼賜之人遂稱為金杵臼嚴防禦家可謂不世之遇也大抵藕能消瘀血解熱開胃而又解蟹毒故也附方新五鼻衄不止藕節搗汁飲並滴鼻中猝暴吐血雙荷散用藕節荷蒂各七個以蜜少許擂爛用水二鍾煎八分去滓溫服或為末丸服亦可聖惠大便下血藕節曬乾研末人參白蜜煎湯調服二錢日二服全幼心鑑遺精白濁心虛不寧金鎖玉關丸用藕節蓮花須蓮子肉芡實肉山藥白茯苓白茯神各二兩為末用金櫻子二斤捶碎以水一斗熬八分去滓再熬成膏入少面和藥丸梧桐子大每服七十丸米飲下鼻淵腦瀉藕節芎藭焙研為末每服二錢米飲下普濟蓮薏即蓮子中青心也釋名苦薏氣味苦寒無毒藏器曰食蓮子不去心令人作吐主治血渴産後渴生研末米飲服二錢立愈士良止霍亂大明清心去熱時珍出統旨附方新二勞心吐血蓮子心七個糯米二十一粒為末酒服此臨安張上舍方也是齋百一方小便遺精蓮子心一撮為末入辰砂一分每服一錢白湯下日二醫林集要蓮蕊須釋名佛座須花開時採取陰乾亦可充果食氣味甘澀溫無毒大明曰忌地黃蔥蒜主治清心通腎固精氣烏鬚髮悅顏色益血止血崩吐血時珍發明時珍曰蓮鬚本草不收而三因諸方固真丸巨勝子丸各補益方中往往用之其功大抵與蓮子同也附方新一久近痔漏三十年者三服除根用蓮花蕊黑牽牛頭末各一兩半當歸五錢為末每空心酒服二錢忌熱物五日見效孫氏集效方蓮花釋名芙蓉古今注芙蕖同上水華氣味苦甘溫無毒忌地黃蔥蒜主治鎮心益色駐顏輕身大明弘景曰花入神仙家用入香尤妙附方舊二新二服食駐顏七月七日採蓮花七分八月八日採根八分九月九日採實九分陰乾搗篩每服方寸匕溫酒調服太清草木方天疱濕瘡荷花貼之簡便方難産催生蓮花一瓣書人字吞之即易産肘後方墜損嘔血墜跌積血心胃嘔血不止用乾荷花為末每酒服方寸匕其效如神楊拱醫方摘要蓮房釋名蓮蓬殼陳久者良氣味苦澀溫無毒主治破血孟詵治血脹腹痛及産後胎衣不下酒煮服之水煮服之解野菌毒藏器止血崩下血溺血時珍發明時珍曰蓮房入厥陰血分消瘀散血與荷葉同功亦急則治標之意也附方新六經血不止瑞蓮散用陳蓮蓬殼燒存性研末每服二錢熱酒下婦人經驗方血崩不止不拘冷熱用蓮蓬殼荊芥穗各燒存性等分為末每服二錢米飲下聖惠方産後血崩蓮蓬殼五個香附二兩各燒存性為末每服二錢米飲下日二婦人良方漏胎下血蓮房燒研麵糊丸梧桐子大每服百丸湯酒任下日二朱氏集驗方小便血淋蓮房燒存性為末入麝香少許每服二錢半米飲調下日二經驗方天疱濕瘡蓮蓬殼燒存性研末井泥調塗神效海上方荷葉釋名嫩者荷錢象形貼水者藕荷生藕者出水者芰荷生花者蒂名荷鼻修治大明曰入藥並炙用氣味苦平無毒時珍曰畏桐油伏白銀伏硫黃主治止渴落胞破血治産後口乾心肺躁煩大明治血脹腹痛産後胎衣不下酒煮服之荷鼻安胎去惡血留好血止血痢殺菌菌毒並煮水服藏器生髮元氣裨助脾胃澀精滑散瘀血消水腫癰腫發痘瘡治吐血咯血衄血下血溺血血淋崩中産後惡血損傷敗血時珍發明杲曰潔古張先生口授枳朮丸方用荷葉燒飯為丸當時未悟其理老年味之始得夫震者動也人感之生足少陽甲膽是屬風木為生化萬物之根蒂人之飲食入胃營氣上行即少陽甲膽之氣與手少陽三焦元氣同為生髮之氣素問云履端於始序則不愆荷葉生於水土之下汙穢之中挺然獨立其色青其形仰其中空象震卦之體食藥感此氣之化胃氣何由不升乎用此為引可謂遠識合道矣更以燒飯和藥與白朮協力滋養補令胃厚不致內傷其利廣矣大矣世之用巴豆牽牛者豈足語此時珍曰燒飯見谷部飯下按東垣試效方云雷頭風症頭面疙瘩腫痛憎寒發熱狀如傷寒病在三陽不可過用寒藥重劑誅伐無過一人病此諸藥不效余處清震湯治之而愈用荷葉一枚升麻五錢蒼朮五錢水煎溫服蓋震為雷而荷葉之形象震體其色又青乃涉類象形之義也又案聞人規痘疹八十一論云痘瘡已出復為風寒外襲則竅閉血凝其點不長或變黑色此為倒黶必身痛四肢微厥但溫肌散邪則熱氣復行而斑自出也宜紫背荷葉散治之蓋荷葉能升發陽氣散瘀血留好血殭蠶能解結滯之氣故也此藥易得而活人甚多勝於人牙龍腦也又戴原禮證治要訣云荷葉服之令人瘦劣故單服可以消陽水浮腫之氣附方舊四新二十三陽水浮腫敗荷葉燒存性研末每服二錢米飲調下日三服證治要訣腳膝浮腫荷葉心藁本等分煎湯淋洗之永類方痘瘡倒黶紫背荷葉散又名南金散治風寒外襲倒黶勢危者萬無一失用霜後荷葉貼水紫背者炙乾白殭蠶直者炒去絲等分為末每服半錢用胡荽湯或溫酒調下聞人規痘疹論諸般癰腫拔毒止痛荷葉中心蒂如錢者不拘多少煎湯淋洗拭乾以飛過寒水石同臘豬脂塗之又治癰腫柞木飲方中亦用之本事方打撲損傷惡血攻心悶亂疼痛者以乾荷葉五片燒存性為末每服三錢童子熱尿一盞食前調下日三服利下惡物為度聖惠方産後心痛惡血不盡也荷葉炒香為末每服方寸匕沸湯或童子小便調下或燒灰或煎汁皆可救急方胎衣不下方同上傷寒産後血暈欲死用荷葉紅花薑黃等分炒研末童子小便調服二錢龐安常傷寒論孕婦傷寒大熱煩渴恐傷胎氣用嫩卷荷葉焙半兩蚌粉二錢半為末每服三錢新汲水入蜜調服並塗腹上名罩胎散鄭氏方妊娠胎動已見黃水者乾荷蒂一枚炙研為末糯米淘汁一鍾調服即安唐氏經驗方吐血不止嫩荷葉七個擂水服之甚佳又方乾荷葉生蒲黃等分為末每服三錢桑白皮煎湯調下肘後方用經霜敗荷燒存性研末新水服二錢吐血咯血經驗後方荷葉焙乾為末米湯調服二錢一日二服以知為度聖濟總録用敗荷葉蒲黃各一兩為末每服二錢麥門冬湯下吐血衄血陽乘於陰血熱妄行宜服四生丸陳日華云屢用得效用生荷葉生艾葉生柏葉生地黃等分搗爛丸雞子大每服一丸水三盞煎一盞去滓服濟生方崩中下血荷葉燒研半兩蒲黃黃芩各一兩為末每空心酒服三錢血痢不止荷葉蒂水煮汁服之普濟方下痢赤白荷葉燒研每服二錢紅痢蜜白痢沙糖湯下脫肛不收貼水荷葉焙研酒服二錢仍以荷葉盛末坐之經驗良方牙齒疼痛青荷葉剪取錢蒂七個以濃米醋一盞煎半盞去滓熬成膏時時抹之妙唐氏經驗方赤遊火丹新生荷葉搗爛入鹽塗之摘玄方漆瘡作癢乾荷葉煎湯洗之良集驗方遍身風癘荷葉三十枚石灰一斗淋汁合煮漬之半日乃出數日一作良聖惠方偏頭風痛升麻蒼朮各一兩荷葉一個水二鍾煎一鍾食後溫服或燒荷葉一個為末以煎汁調服簡便方刀斧傷瘡荷葉燒研搽之集簡方陰腫痛癢荷葉浮萍蛇床等分煎水日洗之醫壘元戎紅白蓮花拾遺校正自草部移入此集解藏器曰紅蓮花白蓮花生西國胡人將來也時珍曰此不知即蓮花否而功與蓮同以類相從姑移入此氣味甘平無毒主治久服令人好顏色變白卻老藏器芰實音妓別録上品釋名菱別録水栗風俗通沙角時珍曰其葉支散故字從支其角稜峭故謂之菱而俗呼為菱角也昔人多不分別惟伍安貧武陵記以三角四角者為芰兩角者為菱左傳屈到嗜芰即此物也爾雅謂之厥攗音眉又許慎説文云菱楚謂之芰秦謂之薢茩楊氏丹鉛録以芰為雞頭引離騷緝芰荷以為衣言菱葉不可緝衣皆誤矣案爾雅薢茩乃決明之名非厥攗也又埤雅芰荷乃藕上出水生花之莖非雞頭也與菱同名異物許楊二氏失於詳考故正之集解弘景曰芰實廬江間最多皆取火燔以為米充糧今多蒸暴食之頌曰菱處處有之葉浮水上花黃白色花落而實生漸向水中乃熟實有二種一種四角一種兩角兩角中又有嫩皮而紫色者謂之浮菱食之尤美江淮及山東人曝其實以為米代糧時珍曰芰菱有湖濼處則有之菱落泥中最易生髮有野菱家菱皆三月生蔓延引葉浮水上扁而有尖光面如鏡葉下之莖有股如蝦股一莖一葉兩兩相差如蝶翅狀五六月開小白花背日而生晝合宵炕隨月轉移其實有數種或三角四角或兩角無角野菱自生湖中葉實俱小其角硬直刺人其色嫩青老黑嫩時剝食甘美老則蒸煮食之野人曝乾剁米為飯為粥為糕為果皆可代糧其莖亦可曝收和米作飯以度荒歉蓋澤農有利之物也家菱種於陂塘葉實俱大角軟而脆亦有兩角彎卷如弓形者其色有青有紅有紫嫩時剝食皮脆肉美蓋佳果也老則殼黑而硬墜入江中謂之烏菱冬月取之風乾為果生熟皆佳夏月以糞水澆其葉則實更肥美按段成式酉陽雜俎云蘇州折腰菱多兩角荊州郢城菱三角無刺可以按莎漢武帝昆明池有浮根菱亦曰青水菱葉沒水下根出水上或云玄都有雞翔菱碧色狀如雞飛仙人鳧伯子常食之氣味甘平無毒詵曰生食性冷利多食傷人臟腑損陽氣痿莖生蟯蟲水族中此物最不治病若過食腹脹者可暖薑酒服之即消亦可含吳茱萸咽津時珍曰仇池筆記言菱花開背日芡花開向日故菱寒而芡暖別録言芰實性平豈生者性冷而乾者則性平歟主治安中補五臟不飢輕身別録蒸曝和蜜餌之斷谷長生弘景解丹石毒蘇頌鮮者解傷寒積熱止消渴解酒毒射罔毒時珍搗爛澄粉食補中延年臞仙芰花氣味澀主治入染鬚髮方時珍烏菱殼主治入染鬚髮方亦止泄痢時珍芡實音儉本經上品釋名雞頭本經雁喙同雁頭古今注鴻頭韓退之雞雍莊子卯菱管子蒍子音唯水流黃弘景曰此即今蒍子也莖上花似雞冠故名雞頭頌曰其苞形類雞雁頭故有諸名時珍曰芡可濟儉歉故謂之芡雞雍見莊子徐無鬼篇卯菱見管子五行篇揚雄方言云南楚謂之雞頭幽燕謂之雁頭徐青淮泗謂之芡子其莖謂之蒍亦曰䓈鄭樵通志以鉤芺為芡誤矣鉤芺陸生草也其莖可食水流黃見下集解別録曰雞頭實生雷澤池澤八月採之保升曰苗生水中葉大如荷皺而有刺花子若拳大形似雞頭實若石榴其皮青黑肉白如菱米也頌曰處處有之生水澤中其葉俗名雞頭盤花下結實其莖嫩者名蒍𦵸亦名䓈菜人採為蔬茹宗奭曰天下皆有之臨水居人採子去皮搗仁為粉蒸炸作餅可以代糧時珍曰芡莖三月生葉貼水大於荷葉皺紋如縠蹙衄如沸面青背紫莖葉皆有刺其莖長至丈餘中亦有孔有絲嫩者剝皮可食五六月生紫花花開向日結苞外有青刺如蝟刺及栗球之形花在苞頂亦如雞喙及蝟喙剝開內有斑駁軟肉裹子纍纍如珠璣殼內白米狀如魚目深秋老時澤農廣收爛取芡子藏至囷石以備歉荒其根狀如三稜煮食如芋修治詵曰凡用蒸熟烈日曬裂取仁亦可舂取粉用時珍曰新者煮食良入澀精藥連殼用亦可案劉跂暇日記云芡實一斗以防風四兩煎湯浸過用且經久不壞氣味甘平澀無毒弘景曰小兒多食令不長詵曰生食多動風冷氣宗奭曰食多不益脾胃兼難消化主治濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙本經開胃助氣日華止渴益腎治小便不禁遺精白濁帶下時珍發明弘景曰仙方取此合蓮實餌之甚益人恭曰作粉食益人勝於菱也頌曰取其實及中子搗爛曝乾再搗篩末熬金櫻子煎和丸服之云補下益人謂之水陸丹時珍曰案孫升談圃云芡本不益人而俗謂之水流黃何也蓋人之食芡必咀嚼之終日囁囁而芡味甘平腴而不膩食之者能使華液流通轉相灌溉其功勝於乳石也淮南子云貍頭愈癙雞頭已瘻注者云即芡實也附方舊一新三雞頭粥益精氣強志意利耳目雞頭實三合煮熟去殼粳米一合煮粥日日空心食經驗後方玉鎖丹治精氣虛滑用芡實蓮莖方見藕節下四精丸治思慮色欲過度損傷心氣小便數遺精用秋石白茯苓芡實蓮肉各二兩為末蒸棗和丸梧桐子大每服三十丸空心鹽湯送下永類方分清丸治濁病用芡實粉白茯苓粉黃蠟化蜜和丸梧桐子大每服百丸鹽湯下摘玄方雞頭菜即䓈菜芡莖也氣味咸甘平無毒主治止煩渴除虛熱生熟皆宜時珍根氣味同莖主治小腹結氣痛煮食之士良附方新一偏墜氣塊雞頭根切片煮熟鹽醋食之法天生意烏芋別録中品釋名鳧茈音疵鳧茨音瓷荸薺衍義黑三稜博濟方芍音曉地栗鄭樵通志時珍曰烏芋其根如芋而色烏也鳧喜食之故爾雅名鳧茈後遂訛為鳧茨又訛為荸薺蓋切韻鳧荸同一字母音相近也三稜地栗皆形似也瑞曰小者名鳧茈大者名地栗集解頌曰烏芋今鳧茨也苗似龍鬚而細色正青根如指頭大黑色皮厚有毛又有一種皮薄無毛者亦同田中人並食之宗奭曰皮厚色黑肉硬而白者謂之豬荸薺皮薄澤色淡紫肉軟而脆者謂之羊荸薺正二月人採食之此二等藥中罕用荒歲人多采以充糧時珍曰鳧茈生淺水田中其苗三四月出土一莖直上無枝葉狀如龍鬚肥田栽者粗近蔥蒲高二三尺其根白蒻秋後結顆大如山楂栗子而臍有聚毛纍纍下生入泥底野生者黑而小食之多滓種出者紫而大食之多毛吳人以沃田種之三月下種霜後苗枯冬春掘收為果生食煮食皆良正誤別録曰烏芋一名借姑二月生葉如芋三月三日採根曝乾弘景曰借姑生水田中葉有丫狀如澤瀉不正似芋其根黃似芋子而小疑有烏者根極相似細而美葉狀如莧草呼為鳧茨恐即此也恭曰烏芋一名槎丫一名慈菰時珍曰烏芋慈菰原是二物慈菰有葉其根散生烏芋有莖無葉其根下生氣味不同主治亦異而別録誤以借菰為烏芋謂其葉如芋陶蘇二氏因鳧茨慈菰字音相近遂致混注而諸家説者因之不明今正其誤根氣味甘微寒滑無毒詵曰性冷先有冷氣人不可食令人腹脹氣滿小兒秋月食多臍下結痛也主治消渴痹熱溫中益氣別録下丹石消風毒除胸中實熱氣可作粉食明耳目消黃疸孟詵開胃下食大明作粉食厚人腸胃不飢能解毒服金石人宜之蘇頌療五種膈氣消宿食飯後宜食之治誤吞銅物汪機主血痢下血血崩闢蠱毒時珍發明機曰烏芋善毀銅合銅錢嚼之則錢化可見其為消堅削積之物故能化五種膈疾而消宿食治誤吞銅也時珍曰按王氏博濟方治五積冷氣攻心變為五膈諸病金鎖丸中用黑三稜注云即鳧茈乾者則汪氏所謂消堅之説蓋本於此又董炳集驗方云地栗曬乾為末白湯每服二錢能闢蠱毒傳聞下蠱之家知有此物便不敢下此亦前人所未知者附方新五大便下血荸薺搗汁大半鍾好酒半鍾空心溫服三日見效神祕方下痢赤白午日午時取完好荸薺洗淨拭乾勿令損破於瓶內入好燒酒浸之黃泥密封收貯遇有患者取二枚細嚼空心用原酒送下唐瑤經驗方婦人血崩鳧茈一歲一個燒存性研末酒服之李氏方小兒口瘡用荸薺燒存性研末摻之楊起簡便方誤吞銅錢生鳧茈研汁細細呷之自然消化成水王璆百一選方慈菰日華校正原混烏芋下今分出仍併入圖經外類剪刀草釋名借姑別録水萍別録河鳧茈圖經白地栗同上苗名剪刀草圖經箭搭草救荒槎丫草蘇恭燕尾草大明時珍曰慈菰一根歲生十二子如慈菰之乳諸子故以名之作茨菰者非矣河鳧茈白地栗所以別烏芋之鳧茈地栗也剪刀箭搭槎丫燕尾並象葉形也集解別録曰借姑三月三日採根曝乾弘景曰借姑生水田中葉有丫狀如澤瀉其根黃似芋子而小煮之可啖恭曰慈菰生水中葉似錍箭之鏃澤瀉之類也頌曰剪刀草生江湖及汴洛近水河溝沙磧中葉如剪刀形莖幹似嫩蒲又似三稜苗甚軟其色深青緑每叢十餘莖內抽出一兩莖上分枝開小白花四瓣蕊深黃色根大者如杏小者如栗色白而瑩滑五六七月採葉正二月採根即慈菰也煮熟味甘甜時人以作果子福州別有一種小異三月開花四時採根功亦相似時珍曰慈姑生淺水中人亦種之三月生苗青莖中空其外有稜葉如燕尾前尖後歧霜後葉枯根乃練結冬及春初掘以為果須灰湯煮熟去皮食乃不麻澀戟人咽也嫩莖亦可炸食又取汁可制粉霜雌黃又有山慈菰名同實異見草部根氣味苦甘微寒無毒大明曰冷有毒多食發虛熱及腸風痔漏崩中帶下瘡癤以生薑同煮佳懷孕人不可食詵曰吳人常食之令人髮腳氣癱緩風損齒失顏色皮肉乾燥猝食之使人乾嘔也主治百毒産後血悶攻心欲死産難胞衣不出搗汁服一升又下石淋蘇恭葉主治諸惡瘡腫小兒遊瘤丹毒搗爛塗之即便消退甚佳蘇頌治蛇蟲咬搗爛封之大明調蚌粉塗瘙痱時珍附録諸果綱目二十一種拾遺一種時珍曰方册所記諸果名品甚多不能詳其性味狀既列於果則養生者不可不知因略採附以俟津符子時珍曰孫真人千金方云味苦平滑多食令人口爽不知五味必思答又曰忽思慧飲膳正要云味甘無毒調中順氣出回回田地甘劍子又曰范成大桂海志云狀似巴欖子仁附肉有白靨不可食發人病北人呼為海胡桃是也楊搖子又曰沈瑩臨海異物志云生閩越其子生樹皮中其體有脊形甚異而味甘無奇色青黃長四五寸海梧子又曰嵇含南方草木狀云出林邑樹似梧桐色白葉似青桐其子如大栗肥甘可食木竹子又曰桂海志云皮色形狀全似大枇杷肉味甘美秋冬實熟出廣西櫓罟子又曰桂海志云大如半升碗數十房攢聚成球每房有縫冬生青至夏紅破其瓣食之微甘出廣西羅晃子又曰桂海志云狀如橄欖其皮七重出廣西顧玠海槎録云橫州出九層皮果至九層方見肉也夏熟味如栗㯆子又曰徐表南州記云出九真交趾樹生子如桃實長寸余二月開花連著子五月熟色黃鹽藏食之味酸似梅夫編子又曰南州記云樹生交趾山谷三月開花仍連著子五六月熟入雞魚豬鴨羹中味美亦可鹽藏白緣子又曰劉欣期交州記云出交趾樹高丈餘實味甘美如胡桃系彌子又曰郭義恭廣志云狀圓而細赤如軟棗其味初苦後甘可食人面子又曰草木狀云出南海樹似含桃子如桃實無味以蜜漬可食其核正如人面可玩祝穆方輿勝覽云出廣中大如梅李春花夏實秋熟蜜煎甘酸可食其核兩邊似人面口目鼻皆具黃皮果又曰海槎録云出廣西橫州狀如楝子及小棗而味酸四味果又曰段成式酉陽雜俎云出祁連山木生如棗剖以竹刀則甘鐵刀則苦木刀則酸蘆刀則辛行旅得之能止飢渴千歲子又曰草木狀云出交趾蔓生子在根下須緑色交加如織一苞恆二百餘顆皮殼青黃色殼中有肉如栗味亦如之干則殼肉相離撼之有聲桂海志云狀似青黃李味甘侯騷子又曰酉陽雜俎云蔓生子大如雞卵既甘且冷消酒輕身王太僕曾獻之酒杯藤子又曰崔豹古今注云出西域藤大如臂花堅硬可以酌酒文章映徹實大如指味如豆蔻食之消酒張騫得其種於大宛蕳音間子又曰賈思協齊民要術云藤生交趾合浦緣樹木正二月花四五月熟實如梨赤如雞冠核如魚鱗生食味淡泊山棗又曰寰宇志云出廣西肇慶府葉似梅果似荔枝九月熟可食隈支又曰宋祁益州方物圖云生邛州山谷中樹高丈餘枝修而弱開白花實大若雀卵狀似荔枝肉黃膚甘靈床上果子拾遺藏器云入夜譫語食之即止諸果有毒拾遺凡果未成核者食之令人發癰癤及寒熱凡果落地有惡蟲緣過者食之令人患九漏凡果雙仁者有毒殺人凡瓜雙蒂者有毒殺人沉水者殺人凡果忽有異常者根下必有毒蛇食之殺人互考楮實梧桐子枸杞子金櫻子山茱萸桑椹木半夏胡頽子松花桂花櫟實已上木部黃精葳蕤蒲黃菰首蒟醬豆蔻益智子使君子燕覆子蓬藟覆盆子已上草部
