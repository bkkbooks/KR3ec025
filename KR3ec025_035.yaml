body:
  text: 木部第三十五卷木之二喬木類五十二種柏木本經上品釋名黃檗別録根名檀桓時珍曰檗木名義未詳本經言檗木及根不言檗皮豈古時木與皮通用乎俗作黃柏者省寫之謬也集解別録曰柏木生漢中山谷及永昌弘景曰今出邵陵者輕薄色深為勝出東山者厚而色淺其根於道家入木芝品今人不知取服又有一種小樹狀如石榴其皮黃而苦俗呼為子柏亦主口瘡又一種小樹多刺皮亦黃色亦主口瘡恭曰子柏亦名山石榴子似女貞皮白不黃亦名小柏所在有之今云皮黃謬矣按今俗用子柏皆多刺小樹名刺柏非小柏也禹錫曰按蜀本圖經云黃柏樹高數丈葉似吳茱萸亦如紫椿經冬不凋皮外白里深黃色其根結塊如松下茯苓今所在有本出房商合等州山谷中皮緊厚二三分鮮黃者上二月五月採皮曬乾機曰房商者治里治下用之邵陵者治表治上用之各適其宜爾頌曰處處有之以蜀中出者肉厚色深為佳修治斆曰凡使柏皮削去粗皮用生蜜水浸半日漉出曬乾用蜜塗文武火炙令蜜盡為度每五兩用蜜三兩元素曰二制治上焦單制治中焦不制治下焦也時珍曰黃柏性寒而沉生用則降實火熟用則不傷胃酒製則治上鹽制則治下蜜制則治中氣味苦寒無毒元素曰性寒味苦氣味俱厚沉而降陰也又云苦厚微辛陰中之陽入足少陰經為足太陽引經藥好古曰黃芩梔子入肺黃連入心黃柏入腎燥濕所歸各從其類也故活人書四味解毒湯乃上下內外通治之藥之才曰惡乾漆伏硫黃主治五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡本經療驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神別録熱瘡疱起蟲瘡血痢止消渴殺蛀蟲藏器男子陰痿及敷莖上瘡治下血如雞鴨肝片甄權安心除勞治骨蒸洗肝明目多淚口乾心熱殺疳蟲治蛔心痛鼻衄腸風下血後分急熱腫痛大明瀉膀胱相火補腎水不足堅腎壯骨髓療下焦虛諸痿癱瘓利下竅除熱元素瀉伏火救腎水治衝脈氣逆不渴而小便不通諸瘡痛不可忍李杲得知母滋陰降火得蒼朮除濕清熱為治痿要藥得細辛瀉膀胱火治口舌生瘡震亨敷小兒頭瘡時珍發明元素曰黃柏之用有六瀉膀胱龍火一也利小便結二也除下焦濕腫三也痢疾先見血四也臍中痛五也補腎不足壯骨髓六也凡腎水膀胱不足諸痿厥腳膝無力於黃耆湯中加用使兩足膝中氣力湧出痿軟即便去也乃癱瘓必用之藥蜜炒研末治口瘡如神故雷公炮炙論云口瘡舌坼立愈黃酥謂以酥炙根黃含之也杲曰黃柏蒼朮乃治痿要藥凡去下焦濕熱作腫及痛並膀胱有火邪並小便不利及黃澀者並用酒洗黃柏知母為君茯苓澤瀉為佐凡小便不通而口渴者邪熱在氣分肺中伏熱不能生水是絶小便之源也法當用氣味俱薄淡滲之藥豬苓澤瀉之類瀉肺火而清肺氣滋水之化源若邪熱在下焦血分不渴而小便不通者乃素問所謂無陰則陽無以生無陽則陰無以化膀胱者州都之官津液藏焉氣化則能出矣法當用氣味俱厚陰中之陰藥治之黃柏知母是也長安王善夫病小便不通漸成中滿腹堅如石腳腿裂破出水雙睛凸出飲食不下痛苦不可名狀治滿利小便滲泄之藥服遍矣豫診之曰此乃奉養太過膏粱積熱損傷腎水致膀胱久而乾涸小便不化火又逆上而為嘔噦難經所謂關則不得小便格則吐逆者潔古老人言熱在下焦但治下焦其病必愈遂處以北方寒水所化大苦寒之藥黃柏知母各一兩酒洗焙碾入桂一錢為引熟水丸如芡子大每服二百丸沸湯下少時如刀刺前陰火燒之狀溺如瀑泉湧出床下成流顧盼之間腫脹消散內經云熱者寒之腎惡燥急食辛以潤之以黃柏之苦寒瀉熱補水潤燥為君知母之苦寒瀉腎火為佐肉桂辛熱為使寒因熱用也震亨曰黃柏走至陰有瀉火補陰之功非陰中之火不可用也火有二君火者人火也心火也可以濕伏可以水滅可以直折黃連之屬可以制之相火者天火也龍雷之火也陰火也不可以水濕折之當從其性而伏之惟黃柏之屬可以降之時珍曰古書言知母佐黃柏滋陰降火有金水相生之義黃柏無知母猶水母之無蝦也蓋黃柏能制膀胱命門陰中之火知母能清肺金滋腎水之化源故潔古東垣丹溪皆以為滋陰降火要藥上古所未言也蓋氣為陽血為陰邪火煎熬則陰血漸涸故陰虛火動之病須之然必少壯氣盛能食者用之相宜若中氣不足而邪火熾甚者久服則有寒中之變近時虛損及縱欲求嗣之人用補陰藥往往以此二味為君日日服餌降令太過脾胃受傷真陽暗損精氣不暖致生他病蓋不知此物苦寒而滑滲且苦味久服有反從火化之害故葉氏醫學統旨有四物加知母黃柏久服傷胃不能生陰之戒附方舊十三新三十陰火為病大補丸用黃柏去皮鹽酒炒褐為末水丸梧子大血虛四物湯下氣虛四君子湯下丹溪方男女諸虛孫氏集效方坎離丸治男子婦人諸虛百損小便淋漓遺精白濁等症黃柏去皮切二斤熟糯米一升童子小便浸之九浸九曬蒸過曬研為末酒煮麵糊丸梧桐子大每服一百丸溫酒送下上盛下虛水火偏盛消中等症黃柏一斤分作四分用醇酒蜜湯鹽水童尿浸洗曬炒為末以知母一斤去毛切搗熬膏和丸梧桐子大每服七十丸白湯下活人心統四治坎離諸丸方見草部蒼朮下臟毒痔漏下血不止孫探玄集效方柏皮丸用川黃柏皮刮淨一斤分作四分三分用酒醋童尿各浸七日洗曬焙一分生炒黑色為末煉蜜丸梧桐子大每空心溫酒下五十丸久服除根楊誠經驗方百補丸專治諸虛赤白濁用川柏皮刮淨一斤分作四分用酒蜜人乳糯米泔各浸透炙乾切研廩米飯丸如上法服又陸一峰柏皮丸黃柏一斤分作四分三分用醇酒鹽湯童尿各浸二日焙研一分用酥炙研末以豬臟一條去膜入藥在內扎煮熟搗丸如上法服之下血數升黃柏一兩去皮雞子白塗炙為末水丸緑豆大每服七丸溫水下名金虎丸普濟方小兒下血或血痢黃柏半兩赤芍藥四錢為末飯丸麻子大每服一二十丸食前米飲下閻孝忠集效方妊娠下痢白色晝夜三五十行根黃厚者蜜炒令焦為末大蒜煨熟去皮搗爛作膏和丸梧桐子大每空心米飲下三五十丸日三服神妙不可述婦人良方小兒熱瀉黃柏削皮焙為末用米湯和丸粟米大每服一二十丸米湯下十全博救方赤白濁淫及夢泄精滑真珠粉丸黃柏炒真蛤粉各一斤為末滴水丸梧桐子大每服一百丸空心溫酒下黃柏苦而降火蛤粉咸而補腎也又方加知母炒牡蠣粉煅山藥炒等分為末糊丸梧桐子大每服八十丸鹽湯下潔古家珍積熱夢遺心忪恍惚膈中有熱宜清心丸主之黃柏末一兩片腦一錢煉蜜丸梧桐子大每服十五丸麥門冬湯下此大智禪師方也許學士本事方消渴尿多能食黃柏一斤水一升煮三五沸渴即飲之恣飲數日即止韋宙獨行方嘔血熱極黃柏蜜塗炙乾為末麥門冬湯調服二錢立瘥經驗方時行赤目黃柏去粗皮為末濕紙包裹黃泥固煨乾每用一彈子大紗帕包之浸水一盞飯上蒸熟乘熱熏洗極效此方有金木水火土故名五行湯一丸可用三二次龍木論嬰兒赤目在蓐內者人乳浸黃柏汁點之小品方眼目昏暗每旦含黃柏一片吐津洗之終身行之永無目疾普濟方猝喉痹痛黃柏片含之又以一斤酒一斗煮二沸恣飲便愈肘後方咽喉猝腫食飲不通苦酒和黃柏末敷之冷即易肘後方小兒重舌黃柏浸苦竹瀝點之千金方口舌生瘡外臺用黃柏含之良深師用蜜漬取汁含之吐涎寇氏衍義治心脾有熱舌頰生瘡蜜炙黃柏青黛各一分為末入生龍腦一字摻之吐涎赴筵散用黃柏細辛等分為末摻或用黃柏乾薑等分亦良口疳臭爛緑雲散用黃柏五錢銅緑二錢為末摻之漱去涎三因方鼻疳有蟲黃柏二兩冷水浸一宿絞汁溫服聖惠方鼻中生瘡黃柏檳榔末豬脂和敷普濟方唇瘡痛癢黃柏末以薔薇根汁調塗立效聖濟録鬈毛毒瘡生頭中初生如蒲桃痛甚黃柏一兩乳香二錢半為末槐花煎水調作餅貼於瘡口普濟方小兒囟腫生下即腫者黃柏末水調貼足心普濟方傷寒遺毒手足腫痛欲斷黃柏五斤水三升煮漬之肘後方癰疽乳發初起者黃柏末和雞子白塗之干即易梅師方癰疽腫毒黃柏皮炒川烏頭炮等分為末唾調塗之留頭頻以米泔水潤濕集簡方小兒臍瘡不合者黃柏末塗之子母祕録小兒膿瘡遍身不幹用黃柏末入枯礬少許摻之即愈楊起簡便方男子陰瘡有二種一者陰蝕作臼膿出一者只生熱瘡熱瘡用黃柏黃芩等分煎湯洗之仍以黃柏黃連作末敷之又法黃柏煎湯洗之塗以白蜜肘後方臁瘡熱瘡黃柏末一兩輕粉三錢豬膽汁調搽之或只用蜜炙黃柏一味火毒生瘡凡人冬月向火火氣入內兩股生瘡其汁淋漓用黃柏末摻之立愈一婦病此人無識者用此而愈張杲醫說凍瘡裂痛乳汁調黃柏末塗之儒門事親自死肉毒自死六畜有毒以黃柏末水服方寸匕肘後方斂瘡生肌黃柏末麵糊調塗效宣明方檀桓拾遺集解藏器曰檀桓乃百歲柏之根如天門冬長三四尺別在一旁以小根綴之一名檀桓芝出靈寶方時珍曰本經但言黃柏根名檀桓陳氏所說乃柏旁所生檀桓芝也與陶弘景所說同氣味苦寒無毒主治心腹百病安魂魄不飢渴久服輕身延年通神別録長生神仙去萬病為散飲服方寸匕盡一枚有驗藏器小柏唐本草釋名子柏弘景山石榴時珍曰此與金櫻子杜鵑花併名山石榴非一物也集解弘景曰子柏樹小狀如石榴其皮黃而苦又一種多刺皮亦黃並主口瘡恭曰小柏生山石間所在皆有襄陽峴山東者為良一名山石榴其樹枝葉與石榴無別但花異子細黑圓如牛李子及女貞子爾其樹皮白陶云皮黃恐謬矣今太常所貯乃小樹多刺而葉細者名刺柏非小柏也藏器曰凡是柏木皆皮黃今既不黃非柏也小柏如石榴皮黃子赤如枸杞子兩頭尖人銼枝以染黃若雲子黑而圓恐是別物非小柏也時珍曰小柏山間時有之小樹也其皮外白里黃狀如柏皮而薄小氣味苦大寒無毒主治口瘡疳䘌殺諸蟲去心腹中熱氣唐本治血崩時珍婦人良方治血崩阿茄陀丸方中用之黃櫨宋嘉祐集解藏器曰黃櫨生商洛山谷四川界甚有之葉圓木黃可染黃色木氣味苦寒無毒主治除煩熱解酒疸目黃水煮服之藏器洗赤眼及湯火漆瘡時珍附方新一大風癩疾黃櫨木五兩銼用新汲水一斗浸二七日焙研蘇方木五兩烏麻子一斗九蒸九曝天麻二兩丁香乳香各一兩為末以赤黍米一升淘淨用浸黃櫨水煮米粥搗和丸梧桐子大每服二三十丸食後漿水下日二夜一聖濟總録厚朴本經中品校正併入有名未用逐折釋名烈朴日華赤朴別録厚皮同重皮廣雅樹名榛別録子名逐折別録時珍曰其木質朴而皮厚味辛烈而色紫赤故有厚朴烈赤諸名頌曰廣雅謂之重皮方書或作厚皮也集解別録曰厚朴生交趾冤句三月九月十月採皮陰乾弘景曰今出建平宜都極厚肉紫色為好殼薄而白者不佳俗方多用道家不須也頌曰今洛陽陝西江淮湖南蜀川山谷中往往有之而以梓州龍州者為上木高三四丈徑一二尺春生葉如槲葉四季不凋紅花而青實皮極鱗皺而厚紫色多潤者佳薄而白者不堪宗奭曰今伊陽縣及商州亦有但薄而色淡不如梓州者厚而紫色有油時珍曰朴樹膚白肉紫葉如槲葉五六月開細花結實如冬青子生青熟赤有核七八月採之味甘美皮修治斆曰凡使要紫色味辛者為好刮去粗皮入丸散每一斤用酥四兩炙熟用若入湯飲用自然薑汁八兩炙盡為度大明曰凡入藥去粗皮用薑汁炙或浸炒用宗奭曰味苦不以薑製則棘人喉舌氣味苦溫無毒別録曰大溫吳普曰神農岐伯雷公苦無毒李當之小溫權曰苦辛大熱元素曰氣溫味苦辛氣味俱厚體重濁而微降陰中陽也杲曰可升可降之才曰乾薑為之使惡澤瀉硝石寒水石忌豆食之動氣主治中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲本經溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃別録健脾治反胃霍亂轉筋冷熱氣瀉膀胱及五臟一切氣婦人産前産後腹臟不安殺腸中蟲明耳目調關節大明治積年冷氣腹內雷鳴虛吼宿食不消去結水破宿血化水穀止吐酸水大溫胃氣治冷痛主病人虛而尿白甄權主肺氣脹滿膨而喘咳好古發明宗奭曰厚朴平胃散中用最調中至今此藥盛行既能溫脾胃又能走冷氣為世所須也元素曰厚朴之用有三平胃一也去腹脹二也孕婦忌之三也雖除腹脹若虛弱人宜斟酌用之誤服脫人元氣惟寒脹大熱藥中兼用乃結者散之之神藥也震亨曰厚朴屬土有火其氣溫能瀉胃中之實也平胃散用之佐以蒼朮正為瀉胃中之濕平胃土之太過以致於中和而已非謂溫補脾胃也習以成俗皆謂之補哀哉其治腹脹者因其味辛以提其滯氣滯行則宜去之若氣實人誤服參耆藥多補氣脹悶或作喘宜此瀉之好古曰本草言厚朴治中風傷寒頭痛溫中益氣消痰下氣厚腸胃去腹滿果泄氣乎果益氣乎蓋與枳實大黃同用則能泄實滿所謂消痰下氣是也若與橘皮蒼朮同用則能除濕滿所謂溫中益氣是也與解利藥同用則治傷寒頭痛與瀉痢藥同用則厚腸胃大抵其性味苦溫用苦則泄用溫則補也故成無己云厚朴之苦以泄腹滿杲曰苦能下氣故泄實滿溫能益氣故散濕滿附方舊九新五厚朴煎丸孫兆云補腎不如補脾脾胃氣壯則能飲食飲食既進則益營衛養精血滋骨髓是以素問云精不足者補之以味形不足者補之以氣此藥大補脾胃虛損溫中降氣化痰進食去冷飲嘔吐泄瀉等症用厚朴去皮銼片用生薑二斤連皮切片以水五升同煮乾去姜焙朴以乾薑四兩甘草二兩再同厚朴以水五升煮乾去草焙薑朴為末用棗肉生薑同煮熟去姜搗棗和丸梧子大每服五十丸米飲下一方加熟附子王璆百一選方痰壅嘔逆心胸滿悶不下飲食厚朴一兩薑汁炙黃為末非時米飲調下二錢匕聖惠方腹脹脈數厚朴三物湯用厚朴半斤枳實五枚以水一斗二升煎取五升入大黃四兩再煎三升溫服一升轉動更服不動勿服張仲景金匱要略腹痛脹滿厚朴七物湯用厚朴半斤制甘草大黃各三兩棗十枚大枳實五枚桂二兩生薑五兩以水一斗煎取四升溫服八合日三嘔者加半夏五合金匱要略男女氣脹心悶飲食不下冷熱相攻久患不愈厚朴薑汁炙焦黑為末以陳米飲調服二錢匕日三服斗門方反胃止瀉方同上中滿洞瀉厚朴乾薑等分為末蜜丸梧桐子大每服五十丸米飲下鮑氏方小兒吐瀉胃虛及有痰驚梓朴散用梓州厚朴一兩半夏湯泡七次薑汁浸半日曬乾一錢以米泔三升同浸一百刻水盡為度如未盡少加火熬干去厚朴只研半夏每服半錢或一字薄荷湯調下錢乙小兒直訣霍亂腹痛厚朴湯用厚朴炙四兩桂心二兩枳實五枚生薑二兩水六升煎取二升分三服此陶隱居方也唐石泉公王方慶廣南方云此方不惟治霍亂凡諸病皆治聖惠方用厚朴薑汁炙研末新汲水服二錢如神下痢水穀久不瘥者厚朴三兩黃連三兩水三升煎一升空心細服梅師方大腸乾結厚朴生研豬臟煮搗和丸梧桐子大每姜水下三十丸十便良方尿渾白濁心脾不調腎氣渾濁用厚朴薑汁炙一兩白茯苓一錢水酒各一碗煎一碗溫服經驗良方月水不通厚朴三兩炙切水三升煎一升分二服空心飲不過三四劑神驗一加桃仁紅花子母祕録逐折氣味甘溫無毒主治療鼠瘻明目益氣別録正誤別録有名未用曰逐折殺鼠益氣明目一名百合一名厚實生木間莖黃七月實黑如大豆弘景曰杜仲子亦名逐折別録厚朴條下已言子名逐折而有名未用中復出逐折主治相同惟鼠瘻殺鼠字誤未知孰是爾所云厚實乃厚朴實也故皮謂之厚皮陶氏不知援引杜仲為注皆誤矣今正之附録浮爛羅勒藏器曰生康國皮似厚朴味酸平無毒主一切風氣開胃補心除冷痹調臟腑杜仲本經上品釋名思仲別録思仙本經木綿吳普檰時珍曰昔有杜仲服此得道因以名之思仲思仙皆由此義其皮中有銀絲如綿故曰木綿其子名逐折與厚朴子同名集解別録曰杜仲生上虞山谷及上黨漢中二月五月六月九月採皮弘景曰上虞在豫州虞虢之虞非會稽上虞縣也今用出建平宜都者狀如厚朴折之多白絲者為佳保升曰生深山大谷所在有之樹高數丈葉似辛夷頌曰今出商州成州峽州近處大山中葉亦類柘其皮折之白絲相連江南謂之檰初生嫩葉可食謂之檰芽花實苦澀亦堪入藥木可作屐益腳皮修治斆曰凡使削去粗皮每一斤用酥一兩蜜三兩和塗火炙以盡為度細銼用氣味辛平無毒別録曰甘溫權曰苦暖元素曰性溫味辛甘氣味俱薄沉而降陰也杲曰陽也降也好古曰肝經氣分藥也之才曰惡玄參蛇蛻皮主治腰膝痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝久服輕身耐老本經腳中痠疼不欲踐地別録治腎勞腰脊攣大明腎冷䐴腰痛人虛而身強直風也腰不利加而用之甄權能使筋骨相著李杲潤肝燥補肝經風虛好古發明時珍曰杜仲古方只知滋腎惟王好古言是肝經氣分藥潤肝燥補肝虛發昔人所未發也蓋肝主筋腎主骨腎充則骨強肝充則筋健屈伸利用皆屬於筋杜仲色紫而潤味甘微辛其氣溫平甘溫能補微辛能潤故能入肝而補腎子能令母實也按龐元英談藪一少年新娶後得腳軟病且疼甚醫作腳氣治不效路鈐孫琳診之用杜仲一味寸斷片拆每以一兩用半酒半水一大盞煎服三日能行又三日痊愈琳曰此乃腎虛非腳氣也杜仲能治腰膝痛以酒行之則為效容易矣附方舊六新三青娥丸方見補骨脂下腎虛腰痛崔元亮海上集驗方用杜仲去皮炙黃一大斤分作十劑每夜取一劑以水一大升浸至五更煎三分減一取汁以羊腎三四枚切下再煮三五沸如作羹法和以椒鹽空腹頓服聖惠方入薤白七莖篋中方加五味子半斤風冷傷腎腰背虛痛杜仲一斤切炒酒二升漬十日日服三合此陶隱居得效方也三因方為末每旦以溫酒服二錢病後虛汗及目中流汁杜仲牡蠣等分為末臥時水服五匕不止更服肘後方頻慣墮胎或三四月即墮者於兩月前以杜仲八兩糯米煎湯浸透炒去絲續斷二兩酒浸焙乾為末以山藥五六兩為末作糊丸梧桐子大每服五十丸空心米飲下肘後方用杜仲焙研棗肉為丸糯米飲下楊起簡便方産後諸疾及胎臟不安杜仲去皮瓦上焙乾木臼搗末煮棗肉和丸彈子大每服一丸糯米飲下日二服勝金方檰芽氣味缺主治作蔬去風毒腳氣久積風冷腸痔下血亦可煎湯蘇頌椿樗唐本草校正併入嘉祐椿莢釋名香者名椿集韻作櫄夏書作杶左傳作橁臭者名樗音醜居切亦作㯉山樗名栲音考虎目樹拾遺大眼桐時珍曰椿樗易長而多壽考故有椿栲之稱莊子言大椿以八千歲為春秋是矣椿香而樗臭故椿字又作櫄其氣熏也㯉字從呼其氣臭人呵呼之也樗亦椿音之轉爾藏器曰俗呼椿為豬椿北人呼樗為山椿江東呼為虎目樹亦名虎眼謂葉脫處有痕如虎之眼目又如樗蒱子故得此名集解恭曰椿樗二樹形相似但樗木疏椿木實為別也頌曰二木南北皆有之形干大抵相類但椿木實而葉香可啖樗木疏而氣臭膳夫亦能熬去其氣並採無時樗木最為無用莊子所謂吾有大木人謂之樗其本擁腫不中繩墨小枝曲拳不中規矩者爾雅云栲山樗郭璞注云栲似樗色小白生山中因名亦類漆樹俗語云櫄樗栲漆相似如一陸機詩疏云山樗與田樗無異葉差狹爾吳人以葉為茗宗奭曰椿樗皆臭但一種有花結子一種無花不實世以無花而木身大其干端直者為椿椿木用葉其有花莢而木身小干多迂矮者為樗樗用根及莢葉又蟲部有樗雞不言椿雞以顯有雞者為樗無雞者為椿古人命名其義甚明禹錫曰樗之有花者無莢有莢者無花其莢夏月常生臭樗上未見椿上有莢者然世俗不辨椿樗之異故呼樗莢為椿莢爾時珍曰椿樗栲乃一木三種也椿木皮細肌實而赤嫩葉香甘可茹樗木皮粗肌虛而白其葉臭惡歉年人或採食栲木即樗之生山中者木亦虛大梓人亦或用之然爪之如腐朽故古人以為不材之木不似椿木堅實可入棟梁也葉氣味苦溫有小毒詵曰椿芽多食動風熏十二經脈五臟六腑令人神昏血氣微若和豬肉熱面頻食則中滿蓋壅經絡也時珍曰椿葉無毒樗葉有小毒主治煮水洗瘡疥風疽樗木根葉尤良唐本白禿不生髮取椿桃楸葉心搗汁頻塗之時珍嫩芽瀹食消風祛毒生生編白皮及根皮修治斆曰凡使椿根不近西頭者為上採出拌生蔥蒸半日銼細以袋盛掛屋南畔陰乾用時珍曰椿樗木皮根皮並刮去粗皮陰乾臨時切焙入用氣味苦溫無毒權曰微熱震亨曰涼而燥藏器曰樗根有小毒時珍曰樗根制硫黃砒石黃金主治疳䘌樗根尤良唐本去口鼻疳蟲殺蛔蟲疥䘌鬼疰傳尸蠱毒下血及赤白久痢藏器得地榆止疳痢蕭炳止女子血崩産後血不止赤帶腸風瀉血不住腸滑瀉縮小便蜜炙用大明利溺澀雷斆治赤白濁赤白帶濕氣下痢精滑夢遺燥下濕去肺胃陳積之痰震亨發明詵曰女子血崩及産後血不止月信來多並赤帶下宜取東引細椿根一大握洗淨以水一大升煮汁分服便斷小兒疳痢亦宜多服仍取白皮一握粳米五十粒蔥白一握炙甘草三寸豉兩合水一升煮半升以意服之枝葉功用皆同震亨曰椿根白皮性涼而能澀血凡濕熱為病瀉痢濁帶精滑夢遺諸症無不用之有燥下濕及去肺胃陳痰之功治泄瀉有除濕實腸之力但痢疾滯氣未盡者不可遽用宜入丸散亦可煎服不見有害豫每用炒研糊丸看病作湯使名固腸丸也時珍曰椿皮色赤而香樗皮色白而臭多服微利人蓋椿皮入血分而性澀樗皮入氣分而性利不可不辨其主治之功雖同而澀利之效則異正如茯苓芍藥赤白頗殊也凡血分受病不足者宜用椿皮氣分受病有郁者宜用樗皮此心得之微也乾坤生意治瘡腫下藥用樗皮以無根水研汁服二三碗取利數行是其驗矣故陳藏器言樗皮有小毒蓋有所試也宗奭曰洛陽一女人年四十六七耽飲無度多食魚蟹畜毒在臟日夜二三十瀉大便與膿血雜下大腸連肛門痛不堪任醫以止血痢藥不效又以腸風藥則益甚蓋腸風則有血無膿如此半年餘氣血漸弱食減肌瘦服熱藥則腹愈痛血愈下服冷藥即注泄食減服溫平藥則病不知如此期年垂命待盡或人教服人參散一服知二服減三服膿血皆定遂常服之而愈其方治大腸風虛飲酒過度挾熱下痢膿血痛甚多日不瘥用樗根白皮一兩人參一兩為末每服二錢空心溫酒調服米飲亦可忌油膩濕面青菜果子甜物雞豬魚羊蒜薤等附方舊六新十一去鬼氣樗根皮一握細切以童兒小便二升豉一合浸一宿絞汁煎一沸三五日一度服之陳藏器本草小兒疳疾椿白皮曬乾二兩為末以粟米淘淨研濃汁和丸梧桐子大十歲三四丸米飲下量人加減仍以一丸納竹筒中吹入鼻內三度良子母祕録小兒疳痢困重者用樗白皮搗粉以水和棗作大餛飩子日曬少時又搗如此三遍以水煮熟空肚吞七枚重者不過七服忌油膩熱面毒物又方用樗根濃汁一蜆殼和粟米泔等分灌下部再度即瘥其驗如神大人亦宜外臺祕要休息痢疾日夜無度腥臭不可近臍腹撮痛東垣脾胃論用椿根白皮訶黎勒各半兩母丁香三十個為末醋糊丸梧桐子大每服五十丸米飲下唐瑤經驗方用椿根白皮東南行者長流水內漂三日去黃皮焙為末每一兩加木香二錢粳米飯為丸每服一錢二分空腹米飲下水穀下利及每至立秋前後即患痢兼腰痛取樗根一大兩搗篩以好面捻作餛飩如皂子大水煮熟每日空心服十枚並無禁忌神良劉禹錫傳信方下利清血腹中刺痛椿根白皮洗刮曬研醋糊丸梧桐子大每空心米飲下三四十丸一加蒼朮枳殼減半經驗方臟毒下痢赤白用香椿洗刮取皮曬乾為末飲下一錢立效經驗方臟毒下血溫白丸用椿根白皮去粗皮酒浸曬研棗肉和丸梧桐子大每淡酒服五十丸或酒糊丸亦可儒門事親下血經年樗根三錢水一盞煎七分入酒半盞服或作丸服虛者加人參等分即虎眼樹仁存方血痢下血臘月日未出時取背陰地北引樗根皮東流水洗淨掛風處陰乾為末每二兩入寒食麵一兩新汲水丸梧子大陰乾每服三十丸水煮滾傾出溫水送下忌見日則無效名如神丸普濟方脾毒腸風因營衛虛弱風氣襲之熱氣乘之血滲腸間故大便下血用臭椿根刮去粗皮焙乾四兩蒼朮米泔浸焙枳殼麩炒各一兩為末醋糊丸如梧桐子大每服五十丸米飲下日三服本事方産後腸脫不能收拾者樗枝取皮焙乾一握水五升連根蔥五莖漢椒一撮同煎至三升去滓傾盆內乘熱熏洗冷則再熱一服可作五次用洗後睡少時忌鹽鮓醬面發風毒物及用心勞力等事年深者亦治之婦人良方女人白帶椿根白皮滑石等分為末粥丸梧桐子大每空腹白湯下一百丸又方椿根白皮一兩半乾薑炒黑白芍藥炒黑黃柏炒黑各二錢為末如上法丸服丹溪方男子白濁方同上莢釋名鳳眼草象形主治大便下血嘉祐附方新四腸風瀉血椿莢半生半燒為末每服二錢米飲下普濟方誤吞魚刺生生編用椿樹子燒研酒服二錢保壽堂方用香椿樹子陰乾半碗擂碎熱酒沖服良久連骨吐出洗頭明目用鳳眼草即椿樹上叢生莢也燒灰淋水洗頭經一年眼如童子加椿皮灰尤佳正月七日二月八日三月四日四月五日五月二日六月四日七月七日八月三日九月二十日十月二十三日十一月二十九日十二月十四日洗之衛生易簡方漆本經上品釋名漆時珍曰許慎說文云漆本作漆木汁可以髹物其字象水滴而下之形也集解別録曰乾漆生漢中山谷夏至後採干之弘景曰今梁州漆最甚益州亦有廣州漆性急易燥其諸處漆桶中自然乾者狀如蜂房孔孔隔者為佳保升曰漆樹高二三丈餘皮白葉似椿花似槐其子似牛李子木心黃六月七月刻取滋汁金州者最善漆性並急凡取時須荏油解破故淳者難得可重重別制拭之上等清漆色黑如醫若鐵石者好黃嫩若蜂窠者不佳頌曰今蜀漢金峽襄歙州皆有之以竹筒釘入木中取汁崔豹古今注云以剛斧斫其皮開以竹管承之滴汁則成漆也宗奭曰濕漆藥中未見用凡用者皆乾漆爾其濕者在燥熱及霜冷時則難乾得陰濕雖寒月亦易干亦物之性也若沾漬人以油治之凡驗漆惟稀者以物蘸起細而不斷斷而急收起又塗於干竹上蔭之速乾者並佳時珍曰漆樹人多種之春分前移栽易成有利其身如柿其葉如椿以金州者為佳故世稱金漆人多以物亂之試訣有云微扇光如鏡懸絲急似鉤撼成琥珀色打著有浮漚今廣浙中出一種漆樹似小檟而大六月取汁漆物黃澤如金即唐書所謂黃漆者也入藥仍當用黑漆廣南漆作飴糖氣沾沾無力乾漆修治大明曰乾漆入藥須搗碎炒熟不爾損人腸胃若是濕漆煎乾更好亦有燒存性者氣味辛溫無毒權曰辛咸宗奭曰苦元素曰辛平有毒降也陽中陰也之才曰半夏為之使畏雞子忌油脂弘景曰生漆毒烈人以雞子和服之去蟲猶自齧腸胃也畏漆人乃致死者外氣亦能使身肉瘡腫自有療法大明曰毒發飲鐵漿並黃櫨汁甘豆湯吃蟹並可制之時珍曰今人貨漆多雜桐油故多毒淮南子云蟹見漆而不幹相感志云漆得蟹而成水蓋物性相制也凡人畏漆者嚼蜀椒塗口鼻則可免生漆瘡者杉木湯紫蘇湯漆姑草湯蟹湯浴之皆良主治絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹生漆去長蟲久服輕身耐老本經乾漆療咳嗽消瘀血痞結腰痛女子疝瘕利小腸去蛔蟲別録殺三蟲主女人經脈不通甄權治傳尸勞除風大明削年深堅結之積滯破日久凝結之瘀血元素發明弘景曰仙方用蟹消漆為水煉服長生抱朴子云淳漆不黏者服之通神長生或以大蟹投其中或以雲母水或以玉水合之服九蟲悉下惡血從鼻出服至一年六甲行廚至也震亨曰漆屬金有水與火性急而飛補用為去積滯之藥中節則積滯去後補性內行人不知也時珍曰漆性毒而殺蟲降而行血所主諸症雖繁其功只在二者而已附方舊四新七小兒蟲病胃寒危惡症與癇相似者乾漆搗燒煙盡白蕪荑等分為末米飲服一字至一錢杜壬方九種心痛及腹脅積聚滯氣筒內乾漆一兩搗炒煙盡研末醋煮麵糊丸梧桐子大每服五丸至九丸熱酒下簡要濟衆女人血氣婦人不曾生長血氣疼痛不可忍及治丈夫疝氣小腸氣撮痛者並宜服二聖丸濕漆一兩熬一食頃入乾漆末一兩和丸梧桐子大每服三四丸溫酒下怕漆人不可服經驗方女人經閉指南方萬應丸治女人月經瘀閉不來繞臍寒疝痛徹及産後血氣不調諸癥瘕等病用乾漆一兩打碎炒煙盡牛膝末一兩以生地黃汁一升入銀石器中慢熬俟可丸丸如梧桐子大每服一丸加至三五丸酒飲任下以通為度産寶方治女人月經不利血氣上攻欲嘔不得睡用當歸四錢乾漆三錢炒煙盡為末煉蜜丸梧桐子大每服十五丸空心溫酒下千金治女人月水不通臍下堅如杯時發熱往來下痢羸瘦此為血瘕若生肉症不可治也乾漆一斤燒研生地黃二十斤取汁和煎至可丸丸梧桐子大每服三丸空心酒下産後青腫疼痛及血氣水疾乾漆大麥芽等分為末新瓦罐相間鋪滿鹽泥固濟鍛赤放冷研散每服一二錢熱酒下但是産後諸疾皆可服婦人經驗方五勞七傷補益方用乾漆柏子仁山茱萸酸棗仁各等分為末蜜丸梧桐子大每服二七丸溫酒下日二服千金方喉痹欲絶不可針藥者乾漆燒煙以筒吸之聖濟總録解中蠱毒平胃散末以生漆和丸梧桐子大每空心溫酒下七十丸至百丸直指方下部生瘡生漆塗之良肘後方漆葉氣味缺主治五尸勞疾殺蟲曝乾研末日用酒服一錢匕時珍發明頌曰華他傳載彭城樊阿少師事他他授以漆葉青黏散方云服之去三蟲利五臟輕身益氣使人頭不白阿從其言年五百餘歲漆葉所在有之青黏生豐沛彭城及朝歌一名地節一名黃芝主理五臟益精氣本出於迷人入山見仙人服之以告他他以為佳語阿阿祕之近者人見阿之壽而氣力強盛問之因醉誤說人服多驗後無復有人識青黏或云即黃精之正葉者也時珍曰按葛洪抱朴子云漆葉青黏凡藪之草也樊阿服之得壽二百歲而耳目聰明猶能持針治病此近代之實事良史所記注者也洪說猶近於理前言阿年五百歲者誤也或云青黏即葳蕤漆子主治下血時珍漆花主治小兒解顱腹脹交脛不行方中用之時珍梓本經下品釋名木王時珍曰梓或作杍其義未詳按陸佃埤雅云梓為百木長故呼梓為木王蓋木莫良於梓故書以梓材名篇禮以梓人名匠朝廷以梓宮名棺也羅願云屋室有此木則余材皆不震其為木王可知集解別録曰梓白皮生河內山谷弘景曰此即梓樹之皮梓有三種當用朴素不腐者頌曰今近道皆有之宮寺人家園亭亦多植之木似桐而葉小花紫爾雅云椅梓郭璞注云即楸也詩鄘風云椅桐梓漆爰伐琴瑟陸機注云楸之疏理白色而生子者為梓梓實桐皮為椅大同而小異也入藥當用有子者又一種鼠梓一名楰亦楸屬也枝葉木理皆如楸今人謂之苦楸江東人謂之虎梓詩小雅云北山有楰是也鼠李一名鼠梓或云即此然花實都不相類恐別一物而名同爾藏器曰楸生山谷間與梓樹本同末異或以為一物者誤矣大明曰梓有數般惟楸梓皮入藥佳余皆不堪機曰按爾雅翼云說文言椅梓也梓楸也檟亦楸也然則椅梓檟楸一物四名而陸機詩疏以楸之疏理白色生子者為梓梓實桐皮者為椅賈思協齊民要術又以白色有角者為梓即角楸也又名子楸黃色無子者為椅楸又名荊黃楸但以子之有無為別其角細長如箸其長近尺冬後葉落而角猶在樹其實亦名豫章時珍曰梓木處處有之有三種木理白者為梓赤者為楸梓之美紋者為椅楸之小者為檟諸家疏注殊缺分明桐亦名椅與此不同此椅即尸子所謂荊有長松文椅者也梓白皮氣味苦寒無毒主治熱毒去三蟲本經療目中疾主吐逆胃反小兒熱瘡身頭熱煩蝕瘡煎湯浴之並搗敷別録煎湯洗小兒壯熱一切瘡疥皮膚瘙癢大明治溫病復感寒邪變為胃啘煮汁飲之時珍附方新一時氣溫病頭痛壯熱初得一日用生梓木削去黑皮取里白者切一升水二升五合煎汁每服八合取瘥肘後方葉主治搗敷豬瘡飼豬肥大三倍本經療手腳火爛瘡別録弘景曰桐葉梓葉肥豬之法未見應在商丘子養豬經中恭曰二樹花葉飼豬並能肥大且易養見李當之本草及博物志然不云敷豬瘡也附方新一風癬疙瘩梓葉木綿子羯羊屎鼠屎等分入瓶中合定燒取汁塗之試效録驗方楸拾遺釋名檟時珍曰楸葉大而早脫故謂之楸檟葉小而早秀故謂之檟唐時立秋日京師賣楸葉婦女兒童剪花戴之取秋意也爾雅云葉小而皵檟葉大而皵楸皵音鵲皮粗也集解見梓下周定王曰楸有二種一種刺楸其樹高大皮色蒼白上有黃白斑點枝梗間多大刺葉似楸而薄味甘嫩時炸熟水淘過拌食時珍曰楸有行列莖幹直聳可愛至秋垂條如線謂之楸線其木濕時脆燥則堅故謂之良材宜作棋枰即梓之赤者也木白皮氣味苦小寒無毒珣曰微溫主治吐逆殺三蟲及皮膚蟲煎膏黏敷惡瘡疽瘻癰腫疳痔除膿血生肌膚長筋骨藏器消食澀腸下氣治上氣咳嗽亦入面藥李珣口吻生瘡貼之頻易取效時珍附方舊一新一瘻瘡楸枝作煎頻洗取效肘後方白癜風瘡楸白皮五斤水五斗煎五升去滓煎如稠膏日三摩之聖濟總録葉氣味同皮主治搗敷瘡腫煮湯洗膿血冬取干葉用之諸癰腫潰及內有刺不出者取葉十重貼之藏器出範汪方發明時珍曰楸乃外科要藥而近人少知葛常之韻語陽秋云有人患發背潰壞腸胃可窺百方不瘥一醫用立秋日太陽未升時採楸樹葉熬之為膏敷其外內以雲母膏作小丸服盡四兩不纍日而愈也東晉範汪名醫也亦稱楸葉治瘡腫之功則楸有拔毒排膿之力可知附方舊七新一上氣咳嗽腹滿羸瘦者楸葉三斗水三斗煮三十沸去滓煎至可丸如棗大以筒納入下部中立愈崔元亮海上集驗方一切毒腫不問硬軟取楸葉十重敷腫上舊帛裹之日三易之當重重有毒氣為水流在葉上冬月取干葉鹽水浸軟或取根皮搗爛敷之皆效止痛消腫食膿血勝於衆藥範汪東陽方瘰癧瘻瘡楸煎神方秋分前後早晚令人持袋摘楸葉納袋中稱取十五斤以水一石淨釜中煎取三斗又換鍋煎取七八升又換鍋煎取二升乃納不津器中用時先取麻油半合蠟一分酥一栗子許同消化又取杏仁七粒生薑少許同研米粉二錢同入膏中攪勻先塗瘡上經二日來乃拭卻即以篦子勻塗楸煎滿瘡上仍以軟帛裹之且日一拭更上新藥不過五六上已破者即便生肌未破者即內消瘥後須將慎半年採藥及煎時並禁孝子婦人僧道雞犬見之篋中方灸瘡不瘥癢痛不瘥楸葉及根皮為末敷之聖惠方頭癢生瘡楸葉搗汁頻塗聖惠方兒發不生楸葉中心搗汁頻塗千金翼小兒目翳嫩楸葉三兩爛搗紙包泥裹燒乾去泥入水少許絞汁銅器慢熬如稀餳瓷合收之每旦點之普濟方小兒禿瘡楸葉搗汁塗之子母祕録桐本經下品釋名白桐弘景黃桐圖經泡桐綱目椅桐弘景榮桐時珍曰本經桐葉即白桐也桐華成筒故謂之桐其材輕虛色白而有綺紋故俗謂之白桐泡桐古謂之椅桐也先花後葉故爾雅謂之榮桐或言其花而不實者未之察也陸機以椅為梧桐郭璞以榮為梧桐並誤集解別録曰桐葉生桐柏山谷弘景曰桐樹有四種青桐葉皮青似梧桐而無子梧桐皮白葉似青桐而有子子肥可食白桐一名椅桐人家多植之與岡桐無異但有花子二月開花黃紫色禮云三月桐始華者也堪作琴瑟岡桐無子是作琴瑟者本草用桐華應是白桐頌曰桐處處有之陸機草木疏言白桐宜為琴瑟雲南牂牁人取花中白毳淹漬績以為布似毛布謂之華布椅即梧桐也今江南人作油者即岡桐也有子大於梧子江南有赬桐秋開紅花無實有紫桐花如百合實堪糖煮以啖嶺南有刺桐花色深紅宗奭曰本經桐葉不指定是何桐致難執用但四種各有治療白桐葉三杈開白花不結子無花者為岡桐不中作琴體重荏桐子可作桐油梧桐結子可食時珍曰陶注桐有四種以無子者為青桐岡桐有子者為梧桐白桐寇注言白桐岡桐皆無子蘇注以岡桐為油桐而賈思協齊民要術言實而皮青者為梧桐華而不實者為白桐白桐冬結似子者乃是明年之華房非子也岡桐即油桐也子大有油其說與陶氏相反以今咨訪互有是否蓋白桐即泡桐也葉大徑尺最易生長皮色粗白其木輕虛不生蟲蛀作器物屋柱甚良二月開花如牽牛花而白色結實大如巨棗長寸余殼內有子片輕虛如榆莢葵實之狀老則殼裂隨風飄揚其花紫色者名岡桐荏桐即油桐也青桐即梧桐之無實者按陳翥桐譜分別白桐岡桐甚明云白花桐紋理粗而體性慢喜生朝陽之地因子而出者一年可起三四尺由根而出者可五七尺其葉圓大而尖長有角光滑而毳先花後葉花白色花心微紅其實大二三寸內為兩房房內有肉肉上有薄片即其子也紫花桐紋理細而體性堅亦生朝陽之地不如白桐易長其葉三角而圓大如白桐色青多毛而不光且硬微赤亦先花後葉花色紫其實亦同白桐而微尖狀如訶子而黏房中肉黃色二桐皮色皆一但花葉小異體性堅慢不同爾亦有冬月復花者桐葉氣味苦寒無毒主治惡蝕瘡著陰本經消腫毒生髮時珍附方新四手足腫浮桐葉煮汁漬之並飲少許或加小豆尤妙聖惠方癰疽發背大如盤臭腐不可近桐葉醋蒸貼上退熱止痛漸漸生肉收口極驗祕方也醫林正宗發落不生桐葉一把麻子仁三升米泔煮五六沸去滓日日洗之則長肘後方發白染黑經霜桐葉及子多收搗碎以甑蒸之生布絞汁沐頭普濟方木皮主治五痔殺三蟲本經療奔豚氣病別録五淋沐發去頭風生髮滋潤甄權治惡瘡小兒丹毒煎汁塗之時珍附方新三腫從腳起削桐木煮汁漬之並飲少許肘後方傷寒發狂六七日熱極狂言見鬼欲走取桐皮削去黑擘斷四寸一束以酒五合水一升煮半升去滓頓服當吐下青黃汁數升即瘥肘後方跌撲傷損水桐樹皮去青留白醋炒搗敷集簡方花主治敷豬瘡飼豬肥大三倍本經附方新一眼見諸物禽蟲飛走乃肝膽之疾青桐子花酸棗仁玄明粉羌活各一兩為末每服二錢水煎和滓日三服經驗良方梧桐綱目釋名櫬時珍曰梧桐名義未詳爾雅謂之櫬因其可為棺左傳所謂桐棺三寸是矣舊附桐下今別出條集解弘景曰梧桐皮白葉似青桐而子肥可食頌曰陶氏謂白桐一名椅桐陸機謂梓實桐皮為椅即今梧桐是二種俱有椅名也遁甲書云梧桐可知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二葉有閏十三葉小余者視之則知閏何月也故曰梧桐不生則九州異宗奭曰梧桐四月開嫩黃小花一如棗花枝頭出絲墮地成油沾漬衣履五六月結子人收炒食味如菱芡此是月令清明桐始華者時珍曰梧桐處處有之樹似桐而皮青不皵其木無節直生理細而性緊葉似桐而稍小光滑有尖其花細蕊墜下如醭其莢長三寸許五片合成老則裂開如箕謂之櫜鄂其子綴於櫜鄂上多者五六少或二三子大如胡椒其皮皺羅願爾雅翼云梧桐多陰青皮白骨似青桐而多子其木易生鳥銜子墮輒生但晚春生葉早秋即凋古稱鳳凰非梧桐不棲豈亦食其實乎詩云梧桐生矣於彼朝陽齊民要術云梧桐生山石間者為樂器更鳴響也木白皮氣味缺主治燒研和乳汁塗鬚髮變黃赤時珍治腸痔蘇頌刪繁方治痔青龍五生膏中用之葉主治發背炙焦研末蜜調敷干即易肘後子氣味甘平無毒主治搗汁塗拔去白髮根下必生黑者又治小兒口瘡和雞子燒存性研摻時珍罌子桐拾遺釋名虎子桐拾遺荏桐衍義油桐時珍曰罌子因實狀似罌也虎子以其毒也荏者言其油似荏油也集解藏器曰罌子桐生山中樹似梧桐頌曰南人作油者乃岡桐也有子大於梧子宗奭曰荏桐早春先開淡紅花狀如鼓子花成筒子子可作桐油時珍曰岡桐即白桐之紫花者油桐枝干花葉並類岡桐而小樹長亦遲花亦微紅但其實大而圓每實中有二子或四子大如大風子其肉白色味甘而吐人亦或謂之紫花桐人多種蒔收子貨之為油入漆家及艌船用為時所須人多僞之惟以篾圈蘸起如鼓面者為真桐子油氣味甘微辛寒有大毒大明曰冷微毒時珍曰桐油吐人得酒即解主治摩疥癬蟲瘡毒腫毒鼠至死藏器敷惡瘡及宣水腫塗鼠咬處能闢鼠大明塗脛瘡湯火傷瘡吐風痰喉痹及一切諸疾以水和油掃入喉中探吐或以子研末吹入喉中取吐又點燈燒銅箸頭烙風熱爛眼亦妙時珍附方新七癰腫初起桐油點燈入竹筒內熏之得出黃水即消醫林正宗血風臁瘡胡粉煅過研桐油調作隔紙膏貼之又方用船上陳桐油石灰煅過又以人發拌桐油炙乾為末仍以桐油調作膏塗紙上刺孔貼之楊起簡便方腳肚風瘡如癩桐油人乳等分掃之數次即愈集簡方酒渣赤鼻桐油入黃丹雄黃敷之摘玄方凍瘡皸裂桐油一碗發一握熬化瓶收每以溫水洗令軟敷之即安救急方解砒石毒桐油二升灌之吐即毒解華他危病方附録𣗐桐音而郢切藏器曰生山谷間狀似青桐葉有丫人取皮以漚絲木皮味甘溫無毒治蠶咬毒氣入腹末服之雞犬食蠶欲死者煎汁灌之絲爛即愈葉主蛇蟲蜘蛛咬毒搗爛封之海桐宋開寶釋名刺桐珣曰生南海山谷中樹似桐而皮黃白色有刺故以名之集解頌曰海桐生南海及雷州近海州郡亦有之葉大如手作三花尖皮若梓白皮而堅韌可作繩入水不爛不拘時月採之又云嶺南有刺桐葉如梧桐其花附干而生側敷如掌形若金鳳枝幹有刺花色深紅江南有赬桐紅花無實時珍曰海桐皮有巨刺如黿甲之刺或云即刺桐皮也按嵇含南方草木狀云九真有刺桐布葉繁密三月開花赤色照映三五房凋則三五復發陳翥桐譜云刺桐生山谷中紋理細緊而性喜拆裂體有巨刺如檔樹其葉如楓赬桐身青葉圓大而長高三四尺便有花成朵而繁紅色如火為夏秋榮觀木皮氣味苦平無毒大明曰溫主治霍亂中惡赤白久痢除疳䘌疥癬牙齒蟲痛並煮服及含之水浸洗目除膚赤開寶主腰腳不遂血脈頑痹腿膝疼痛赤白瀉痢李珣去風殺蟲煎湯洗赤目時珍發明頌曰古方多用浸酒治風蹶南唐筠州刺史王紹顏撰續傳信方云頃年豫在姑孰得腰膝痛不可忍醫以腎臟風毒攻刺諸藥莫療因覽劉禹錫傳信方備有此驗修服一劑便減五分其方用海桐皮二兩牛膝芎藭羌活地骨皮五加皮各一兩甘草半兩薏苡仁二兩生地黃十兩並淨洗焙乾細銼以綿包裹入無灰酒二斗浸之冬二七夏一七空心飲一盞每日早午晚各一次長令醺醺此方不得添減禁毒食時珍曰海桐皮能行經絡達病所又入血分及去風殺蟲附方新三風癬有蟲海桐皮蛇床子等分為末以臘豬脂調搽之艾元英如宜方風蟲牙痛海桐皮煎水漱之聖惠方中惡霍亂海桐皮煮汁服之聖濟總録刺桐花主治止金瘡血殊效蘇頌附録雞桐時珍曰生嶺南山間其葉如楝用葉煮湯洗泄足膝風濕痹氣楝本經下品釋名苦楝圖經實名金鈴子時珍曰按羅願爾雅翼云楝葉可以練物故謂之楝其子如小鈴熟則黃色名金鈴象形也集解別録曰楝實生荊山山谷弘景曰處處有之俗人五月五日取葉佩之云辟惡也恭曰此有雌雄兩種雄者無子根赤有毒服之使人吐不能止時有至死者雌者有子根白微毒入藥當用雌者頌曰楝實以蜀川者為佳木高丈餘葉密如槐而長三四月開花紅紫色芬香滿庭實如彈丸生青熟黃十二月採之根採無時時珍曰楝長甚速三五年即可作椽其子正如圓棗以川中者為良王禎農書言鵷雛食其實應劭風俗通言獬豸食其葉宗懍歲時記言蛟龍畏楝故端午以葉包粽投江中祭屈原實修治斆曰凡採得曬乾酒拌令透蒸待皮軟刮去皮取肉去核用凡使肉不使核使核不使肉如使核捶碎用漿水煮一伏時曬乾其花落子謂之石茱萸不入藥用嘉謨曰石茱萸亦入外科用氣味苦寒有小毒元素曰酸苦平陰中之陽時珍曰得酒煮乃寒因熱用也茴香為之使主治溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道本經主中大熱狂失心躁悶作湯浴不入湯使甄權入心及小腸止上下部腹痛李杲瀉膀胱好古治諸疝蟲痔時珍發明元素曰熱厥暴痛非此不能除時珍曰楝實導小腸膀胱之熱因引心包相火下行故心腹痛及疝氣為要藥甄權乃言不入湯使則本經何以有治熱狂利小便之文耶近方治疝有四治五治七治諸法蓋亦配合之巧耳附方舊三新八熱厥心痛或發或止身熱足寒久不愈者先灸太溪崑崙引熱下行內服金鈴散用金鈴子玄胡索各一兩為末每服三錢溫酒調下潔古活法機要小兒冷疝氣痛膚囊浮腫金鈴子去核五錢吳茱萸二錢半為末酒糊丸黍米大每鹽湯下二三十丸全幼心鑑丈夫疝氣本臟氣傷膀胱連小腸等氣金鈴子一百個溫湯浸過去皮巴豆二百個微打破以面二升同於銅鐺內炒至金鈴子赤為度放冷取出去核為末巴面不用每服三錢熱酒或醋湯調服一方入鹽炒茴香半兩經驗方㿗疝腫痛淡寮方楝實丸治釣腎偏墜痛不可忍用川楝子肉五兩分作五分一兩用破故紙二錢炒黃一兩用小茴香三錢食鹽半錢同炒一兩用萊蔔子一錢同炒一兩用牽牛子三錢同炒一兩用斑蝥七枚去頭足同炒揀去食鹽萊蔔牽牛斑蝥只留故紙茴香同研為末以酒打麵糊丸梧桐子大每空心酒下五十丸得效方楝實丸治一切疝氣腫痛大有神效用川楝子酒潤取肉一斤分作四分四兩用小麥一合斑蝥四十九個同炒熟去蝥四兩用小麥一合巴豆四十九枚同炒熟去豆四兩用小麥一合巴戟肉一兩同炒熟去戟四兩用小茴香一合食鹽一兩同炒熟去鹽加破故紙酒炒一兩廣木香不見火一兩為末酒煮麵糊丸梧桐子大每服五十丸鹽湯空心下日三服直指方楝實丸治外腎脹大麻木痛破及奔豚疝氣用川楝子四十九個分七處切取肉七個用小茴香五錢同炒七個用破故紙二錢半同炒七個用黑牽牛二錢半同炒七個用食鹽二錢同炒七個用蘿蔔子二錢半同炒七個用巴豆十四個同炒七個用斑蝥十四個去頭足同炒揀去蘿蔔子巴豆斑蝥三味不用入青木香五錢南木香官桂各二錢半為末酒煮麵糊丸梧桐子大每服三十丸食前用鹽湯下一日三服臟毒下血苦楝子炒黃為末蜜丸梧桐子大米飲每吞十丸至二十丸經驗方腹中長蟲楝實以淳苦酒漬一宿綿裹塞入穀道中三寸許日二易之外臺祕要耳猝熱腫楝實五合搗爛綿裹塞之頻換聖惠方腎消膏淋病在下焦苦楝子茴香等分炒為末每溫酒服一錢聖惠方小兒五疳川楝子肉川芎藭等分為末豬膽汁丸米飲下摘玄方根及木皮氣味苦微寒微毒大明曰雄者根赤有毒吐瀉殺人不可誤服雌者入服食每一兩可入糯米五十粒同煎殺毒若瀉者以冷粥止之不瀉者以熱蔥粥發之主治蛔蟲利大腸別録苦酒和塗疥癬甚良弘景治遊風熱毒風疹惡瘡疥癩小兒壯熱並煎湯浸洗大明附方舊四新六消渴有蟲苦楝根白皮一握切焙入麝香少許水二碗煎至一碗空心飲之雖困頓不妨下蟲如蛔而紅色其渴自止消渴有蟲人所不知洪邁夷堅志小兒蛔蟲楝木皮削去蒼皮水煮汁量大小飲之斗門方用為末米飲服二錢集簡方用根皮同雞卵煮熟空心食之次日蟲下經驗方抵聖散用苦楝皮二兩白蕪荑半兩為末每以一二錢水煎服之簡便方用楝根白皮去粗二斤切水一斗煮取汁三升沙鍋熬成膏五更初溫酒服一匙以蟲下為度小兒諸瘡惡瘡禿瘡蠼螋瘡浸淫瘡並宜楝樹皮或枝燒灰敷之乾者豬脂調千金方口中瘻瘡東行楝根細銼水煮濃汁日日含漱吐去勿咽肘後方蜈蚣蜂傷楝樹枝葉汁塗之良楊起簡便方疥瘡風蟲楝根皮皂角去皮子等分為末豬脂調塗奇效方花主治熱痱焙末摻之鋪席下殺蚤蝨時珍葉主治疝入囊痛臨發時煎酒飲時珍槐本經上品校正併入嘉祐槐花槐膠釋名櫰音懷時珍曰按周禮外朝之法面三槐三公位焉吳澄注云槐之言懷也懷來人於此也王安石釋云槐華黃中懷其美故三公位之春秋元命包云槐之言歸也古者樹槐聽訟其下使情歸實也集解別録曰槐實生河南平澤可作神燭頌曰今處處有之其木有極高大者按爾雅槐有數種葉大而黑者名櫰槐晝合夜開者名守宮槐葉細而青緑者但謂之槐其功用不言有別四月五月開黃花六月七月結實七月七日採嫩實搗汁作煎十月採老實入藥皮根採無時醫家用之最多時珍曰槐之生也季春五日而兔目十日而鼠耳更旬而始規二旬而葉成初生嫩芽可炸熟水淘過食亦可作飲代茶或採槐子種畦中採苗食之亦良其木材堅重有青黃白黑色其花未開時狀如米粒炒過煎水染黃甚鮮其實作莢連珠中有黑子以子連多者為好周禮秋取槐檀之火淮南子老槐生火天玄主物簿云老槐生丹槐之神異如此藏器曰子上房七月收之堪染皂槐實修治斆曰凡採得去單子並五子者只取兩子三子者以銅錘捶破用烏牛乳浸一宿蒸過用氣味苦寒無毒別録曰酸咸之才曰景天為之使主治五內邪氣熱止涎唾補絶傷火瘡婦人乳瘕子藏急痛本經久服明目益氣頭不白延年治五痔瘡瘻以七月七日取之搗汁銅器盛之日煎令可丸如鼠屎納竅中日三易乃愈又墮胎別録治大熱難産甄權殺蟲去風合房陰乾煮飲明目除熱淚頭腦心胸間熱風煩悶風眩欲倒心頭吐涎如醉漾漾如船車上者藏器治丈夫女人陰瘡濕癢催生吞七粒大明疏導風熱宗奭治口齒風涼大腸潤肝燥李杲發明好古曰槐實純陰肝經氣分藥也治證與桃仁同弘景曰槐子以十月巳日採相連多者新盆盛合泥百日皮爛為水核如大豆服之令腦滿發不白而長生頌曰折嫩房角作湯代茗主頭風明目補腦水吞黑子以變白髮扁鵲明目使發不落法十月上巳日取槐子去皮納新瓶中封口二七日初服一枚再服二枚日加一枚至十日又從一枚起終而復始令人可夜讀書延年益氣力大良時珍曰按太清草木方云槐者虛星之精十月上巳日採子服之去百病長生通神梁書言庾肩吾常服槐實年七十餘髮鬢皆黑目看細字亦其驗也古方以子入冬月牛膽中漬之陰乾百日每食後吞一枚云久服明目通神白髮還黑有痔及下血者尤宜服之附方舊一新四槐角丸治五種腸風瀉血糞前有血名外痔糞後有血名內痔大腸不收名脫肛穀道四面胬肉如奶名舉痔頭上有孔名瘻瘡內有蟲名蟲痔並皆治之槐角去梗炒一兩地榆當歸酒焙防風黃芩枳殼麩炒各半兩為末酒糊丸梧桐子大每服五十丸米飲下和劑局方大腸脫肛槐角槐花各等分炒為末用羊血蘸藥炙熟食之以酒送下豬腰子去皮蘸炙亦可百一選方內痔外痔許仁則方用槐角子一斗搗汁曬稠取地膽為末同煎丸梧桐子大每飲服十丸兼作挺子納下部或以苦參末代地膽亦可外臺祕要目熱昏暗槐子黃連去須各二兩為末蜜丸梧桐子大每漿水下二十丸日二服聖濟總録大熱心悶槐子燒末酒服方寸匕傷寒類要槐花修治宗奭曰未開時採收陳久者良入藥炒用染家以水煮一沸出之其稠滓為餅染色更鮮也氣味苦平無毒元素曰味厚氣薄純陰也主治五痔心痛眼赤殺腹臟蟲及皮膚風熱腸風瀉血赤白痢並炒研服大明涼大腸元素炒香頻嚼治失音及喉痹又療吐血衄血崩中漏下時珍發明時珍曰槐花味苦色黃氣涼陽明厥陰血分藥也故所主之病多屬二經附方舊一新二十衄血不止槐花烏賊魚骨等分半生半炒為末吹之普濟方舌衄出血槐花末敷之即止朱氏集驗吐血不止槐花燒存性入麝香少許研勻糯米飲下三錢普濟方咯血唾血槐花炒研每服三錢糯米飲下仰臥一時取效朱氏方小便尿血槐花炒鬱金煨各一兩為末每服二錢淡豉湯下立效篋中祕寶方大腸下血經驗方用槐花荊芥穗等分為末酒服一錢匕集簡方用柏葉三錢槐花六錢煎湯日服袖珍用槐花枳殼等分炒存性為末新汲水服二錢暴熱下血生豬臟一條洗淨控干以炒槐花末填滿扎定米醋沙鍋內煮爛擂丸彈子大曬乾每服一丸空心當歸煎酒化下永類鈐方酒毒下血槐花半生半炒一兩山梔子焙五錢為末新汲水服二服經驗良方臟毒下血新槐花炒研酒服三錢日三服或用槐白皮煎湯服普濟方婦人漏血不止槐花燒存性研每服二三錢食前溫酒下聖惠方血崩不止槐花三兩黃芩二兩為末每服半兩酒一碗銅稱錘一枚桑柴火燒紅浸入酒內調服忌口乾坤祕韞中風失音炒槐花三更後仰臥嚼咽危氏得效方癰疽發背凡人中熱毒眼花頭暈口乾舌苦心驚背熱四肢麻木覺有紅暈在背後者即取槐花子一大抄鐵杓炒褐色以好酒一碗汗之乘熱飲酒一汗即愈如未退再炒一服極效縱成膿者亦無不愈彭幸庵云此方三十年屢效者劉松石保壽堂方楊梅毒瘡乃陽明積熱所生槐花四兩略炒入酒二盞煎十餘沸熱服胃虛寒者勿用集簡方外痔長寸用槐花煎湯頻洗並服之數日自縮集簡方疔瘡腫毒一切癰疽發背不問已成未成但焮痛者皆治槐花微炒核桃仁二兩無灰酒一鍾煎十餘沸熱服未成者二三服已成者一二服見效醫方摘要發背散血槐花緑豆粉各一升同炒作象牙色研末用細茶一兩煎一碗露一夜調末三錢敷之留頭勿犯婦女手攝生衆妙方下血血崩槐花一兩棕灰五錢鹽一錢水三鍾煎減半服摘玄方白帶不止槐花炒牡蠣煅等分為末每酒服三錢取效同上葉氣味苦平無毒主治煎湯治小兒驚癇壯熱疥癬及疔腫皮莖同用大明邪氣産難絶傷及癮疹牙齒諸風採嫩葉食孟詵附方舊二新一霍亂煩悶槐葉桑葉各一錢炙甘草三分水煎服之聖惠方腸風痔疾用槐葉一斤蒸熟曬乾研末煎飲代茶久服明目食醫心鏡鼻氣窒塞以水五升煮槐葉取三升下蔥豉調和再煎飲千金方枝氣味同葉主治洗瘡及陰囊下濕癢八月斷大枝候生嫩蘖煮汁釀酒療大風痿痹甚效別録炮熱尉蠍毒恭青枝燒瀝塗癬煅黑揩牙去蟲煎湯洗痔核頌燒灰沐頭長髮藏器治赤目崩漏時珍發明頌曰劉禹錫傳信方著硤州王及郎中槐湯灸痔法甚詳以槐枝濃煎湯先洗痔便以艾灸其上七壯以知為度王及素有痔疾充西川安撫使判官乘騾入駱谷其痔大作狀如胡瓜熱氣如火至驛僵仆郵吏用此法灸至三五壯忽覺熱氣一道入腸中因大轉瀉先血後穢其痛甚楚瀉後遂失胡瓜所在登騾而馳矣附方舊五新一風熱牙痛槐枝燒熱烙之聖惠方胎赤風眼槐木枝如馬鞭大長二尺作二段齊頭麻油一匙置銅鉢中晨使童子一人以其木研之至暝乃止令仰臥以塗目日三度瘥九種心痛當太歲上取新生槐枝一握去兩頭用水三大升煎取一升頓服千金崩中赤白不問遠近取槐枝燒灰食前酒下方寸匕日二服梅師方胎動欲産日月未足者取槐樹東引枝令孕婦手把之即易生子母祕録陰瘡濕癢槐樹北面不見日枝煎水洗三五遍冷再暖之孟詵必效方木皮根白皮氣味苦平無毒主治爛瘡喉痹寒熱別録煮汁淋陰囊墜腫氣痛煮漿水漱口齒風疳䘌血甄權治中風皮膚不仁浴男子陰疝卵腫浸洗五痔一切惡瘡婦人産門癢痛及湯火瘡煎膏止痛長肉消癰腫大明煮汁服治下血蘇頌附方舊四新二中風身直不得屈伸反復者取槐皮黃白者切之以酒或水六升煮取二升稍稍服之肘後方破傷中風避陰槐枝上皮旋刻一片安傷處用艾灸皮上百壯不痛者灸至痛痛者灸至不痛用手摩之普濟風蟲牙痛槐樹白皮一握切以酪一升煮去滓入鹽少許含漱廣濟方陰下濕癢槐白皮炒煎水日洗生生方痔瘡有蟲作癢或下膿血多取槐白皮濃煮汁先熏後洗良久欲大便當有蟲出不過三度即愈仍以皮為末綿裹納下部中梅師方蠼螋惡瘡槐白皮醋浸半日洗之孫真人千金翼槐膠氣味苦寒無毒主治一切風化涎肝臟風筋脈抽掣及急風口噤或四肢不收頑痹或毒風周身如蟲行或破傷風口眼偏斜腰脊強硬任作湯散丸煎雜諸藥用之亦可水煮和藥為丸嘉祐煨熱綿裹塞耳治風熱聾閉時珍槐耳見菜部木耳檀拾遺釋名時珍曰朱子云檀善木也其字從亶以此亶者善也集解藏器曰按蘇恭言檀似秦皮其葉堪為飲樹體細堪作斧柯至夏有不生者忽然葉開當有大水農人候之以占水旱號為水檀又有一種葉如檀高五六尺生高原四月開花正紫亦名檀樹其根如葛頌曰江淮河朔山中皆有之亦檀香類但不香爾時珍曰檀有黃白二種葉皆如槐皮青而澤肌細而膩體重而堅狀與梓榆莢蒾相似故俚語云斫檀不諦得莢蒾莢蒾尚可得駁馬駁馬梓榆也又名六駁皮色青白多癬駁也檀木宜杵楤錘器之用皮及根皮氣味辛平有小毒主治皮和榆皮為粉食可斷谷救荒根皮塗瘡疥殺蟲藏器莢蒾唐本草釋名系迷詩疏羿先同上集解恭曰莢蒾葉似木槿及榆作小樹其子如溲疏兩兩相併四四相對而色赤味甘陸機詩疏云檀榆之類也所在山谷有之藏器曰生北土山林中皮堪為索枝葉氣味甘苦平無毒主治三蟲下氣消穀煮汁和米作粥飼小兒甚美唐本作粥灌六畜瘡中生蛆立出藏器秦皮本經中品校正併入拾遺樳木釋名梣皮音岑樳木音尋石檀別録樊槻弘景盆桂日華苦樹蘇恭苦櫪時珍曰秦皮本作梣皮其木小而岑高故以為名人訛為樳木又訛為秦或云本出秦地故得秦名也高誘注淮南子云梣苦櫪木也恭曰樹葉似檀故名石檀俗因味苦呼為苦樹集解別録曰秦皮生廬江川穀及冤句水邊二月八月採皮陰乾弘景曰俗云是樊槻皮而水漬以和墨書色不脫微青恭曰此樹似檀葉細皮有白點而不粗錯取皮漬水便碧色書紙看之皆青色者是真頌曰今陝西州郡及河陽亦有之其木大都似檀枝幹皆青緑色葉如匙頭許大而不光並無花實根似槐根俗呼為白樳木皮氣味苦微寒無毒別録曰大寒普曰神農雷公黃帝岐伯酸無毒李當之小寒權曰平惡苦瓠防葵之才曰惡吳茱萸大戟為之使主治風寒濕痹洗洗寒氣除熱目中青翳白膜久服頭不白輕身本經療男子少精婦人帶下小兒癇身熱可作洗目湯久服皮膚光澤肥大有子別録明目去目中久熱兩目赤腫疼痛風淚不止作湯浴小兒身熱煎水澄清洗赤目極效甄權主熱痢下重下焦虛好古同葉煮湯洗蛇咬並研末敷之藏器發明弘景曰秦皮俗方惟以療目道家亦有用處大明曰秦皮之功洗肝益精明目退熱元素曰秦皮沉也陰也其用有四治風寒濕邪成痹青白幻翳遮睛女子崩中帶下小兒風熱驚癇好古曰痢則下焦虛故張仲景白頭翁湯以黃柏黃連秦皮同用皆苦以堅之也秦皮浸水青藍色與紫草同用治目病以增光暈尤佳時珍曰梣皮色青氣寒味苦性澀乃是厥陰肝少陽膽經藥也故治目病驚癇取其平木也治下痢崩帶取其收澀也又能治男子少精益精有子皆取其澀而補也故老子云天道貴澀此藥乃服食及驚癇崩痢所宜而人只知其治目一節幾於廢棄良為可惋淮南子云梣皮色青治目之要藥也又萬畢術云梣皮止水謂其能收淚也高誘解作致水言能使水沸者謬也附方舊三新三赤眼生翳秦皮一兩水一升半煮七合澄清日日溫洗一方加滑石黃連等分外臺祕要眼暴腫痛秦皮黃連各一兩苦竹葉半升水二升半煮取八合食後溫服此乃謝道人方也外臺祕要赤眼睛瘡秦皮一兩清水一升白碗中浸春夏一食頃以上看碧色出即以箸頭纏綿仰臥點令滿眼微痛勿畏良久瀝去熱汁日點十度以上不過兩日瘥也外臺祕要眼弦挑針乃肝脾積熱銼秦皮夾沙糖水煎調大黃末一錢微利佳仁齊直指方血痢連年秦皮鼠尾草薔薇根等分以水煎取汁銅器重釜煎成丸如梧桐子大每服五六丸日二服稍增以知為度亦可煎飲千金方天蛇毒瘡似癩非癩天蛇乃草間黃花蜘蛛也人被其螫為露水所濡乃成此疾以秦皮煮汁一斗飲之即瘥沈存中合歡本經中品釋名合昏唐本夜合日華青裳圖經萌葛綱目烏賴樹頌曰崔豹古今注云欲蠲人之忿則贈以青裳青裳合歡也植之庭除使人不忿故嵇康養生論云合歡蠲忿萱草忘憂藏器曰其葉至暮即合故云合昏時珍曰按王璆百一選方云夜合俗名萌葛越人謂之烏賴樹又金光明經謂之尸利灑樹集解本經曰合歡生豫州河內山谷樹如狗骨樹別録曰生益州山谷弘景曰俗間少識當以其非療病之功也恭曰此樹葉似皂莢及槐極細五月花發紅白色上有絲茸秋實作莢子極薄細所在山谷有之今東西京第宅山池間亦有種者名曰合昏頌曰今汴洛間皆有之人家多植於庭除間木似梧桐枝甚柔弱葉似皂角極細而繁密互相交結每一風來輒自相解了不相牽綴採皮及葉用不拘時月宗奭曰合歡花其色如今之醮暈線上半白下半肉紅散垂如絲為花之異其緑葉至夜則合也嫩時炸熟水淘亦可食木皮去粗皮炒用氣味甘平無毒主治安五臟和心志令人歡樂無憂久服輕身明目得所欲本經煎膏消癰腫續筋骨大明殺蟲搗末和鐺下墨生油調塗蜘蛛咬瘡用葉洗衣垢藏器折傷疼痛花研末酒服二錢匕宗奭和血消腫止痛時珍發明震亨曰合歡屬土補陰之功甚捷長肌肉續筋骨概可見矣與白蠟同入膏用神效而外科家未曾録用何也附方舊二新三肺癰唾濁心胸甲錯取夜合皮一掌大水三升煮取一半分二服韋宙獨行方撲損折骨夜合樹皮即合歡皮去粗皮炒黑色四兩芥菜子炒一兩為末每服二錢溫酒臥時服以滓敷之接骨甚妙王璆百一選方發落不生合歡木灰二合牆衣五合鐵精一合水萍末二合研勻生油調塗一夜一次普濟方小兒撮口夜合花枝濃煮汁拭口中並洗之子母祕録中風攣縮夜合枝酒夜合枝柏枝槐枝桑枝石榴枝各五兩並生銼糯米五升黑豆五升羌活二兩防風五錢細曲七斤半先以水五斗煎五枝取二斗五升浸米豆蒸熟入曲與防風羌活如常釀酒法封三七日壓汁每飲五合勿過醉致吐常令有酒氣也奇效良方皂莢本經下品釋名皂角綱目雞棲子綱目烏犀綱目懸刀時珍曰莢之樹皂故名廣志謂之雞棲子曾氏方謂之烏犀外丹本草謂之懸刀集解別録曰皂莢生雍州山谷及魯鄒縣如豬牙者良九月十月採莢陰乾弘景曰處處有之長尺二者良俗人見其有蟲孔而未嘗見蟲形皆言不可近令人惡病殊不爾也其蟲狀如草葉上青蟲莢微黑便出所以難見恭曰此物有三種豬牙皂莢最下其形曲戾薄惡全無滋潤洗垢不去其尺二者粗大長虛而無潤若長六七寸圓厚節促直者皮薄多肉味濃大好頌曰所在有之以懷孟州者為勝木極有高大者本經用如豬牙者陶用尺二者蘇用六寸圓厚者今醫家作疏風氣丸煎多用長皂莢治齒及取積藥多用牙皂莢所用雖殊性味不甚相遠其初生嫩芽以為蔬茹更益人時珍曰皂樹高大葉如槐葉瘦長而尖枝間多刺夏開細黃花結實有三種一種小如豬牙一種長而肥厚多脂而黏一種長而瘦薄枯燥不黏以多脂者為佳其樹多刺難上採時以蔑箍其樹一夜自落亦一異也有不結實者樹鑿一孔入生鐵三五斤泥封之即結莢人以鐵砧捶皂莢即自損鐵碾碾之久則成孔鐵鍋爨之多爆片落豈皂莢與鐵有感召之情耶皂莢修治斆曰凡使要赤肥並不蛀者以新汲水浸一宿用銅刀削去粗皮以酥反復炙透捶去子弦用每莢一兩用酥五錢好古曰凡用有蜜炙酥炙絞汁燒灰之異各依方法氣味辛咸溫有小毒好古曰入厥陰經氣分時珍曰入手太陰陽明經氣分之才曰柏實為之使惡麥門冬畏空青人參苦參機曰伏丹砂粉霜硫黃硇砂主治風痹死肌邪氣風頭淚出利九竅殺精物本經療腹脹滿消穀除咳嗽囊結婦人胞不落明目益精可為沐藥不入湯別録通關節除頭風消痰殺蟲治骨蒸開胃中風口噤大明破堅症腹中痛能墮胎又將浸酒中取盡其精煎成膏塗帛貼一切腫痛甄權溽暑久雨時合蒼朮燒煙闢瘟疫邪濕氣宗奭燒煙熏久痢脫肛汪機搜肝風瀉肝氣好古通肺及大腸氣治咽喉痹塞痰氣喘咳風癘疥癬時珍發明好古曰皂莢厥陰之藥活人書治陰毒正陽散內用皂莢引入厥陰也時珍曰皂莢屬金入手太陰陽明之經金勝木燥勝風故兼入足厥陰治風木之病其味辛而性燥氣浮而散吹之導之則通上下諸竅服之則治風濕痰喘腫滿殺蟲塗之則散腫消毒搜風治瘡按龐安時傷寒總病論云元祐五年自春至秋蘄黃二郡人患急喉痹十死八九速者半日一日而死黃州推官潘昌言得黑龍膏方救活數人也其方治九種喉痹急喉痹纏喉風結喉爛喉遁蟲蟲喋重舌木舌飛絲入口用大皂莢四十挺切水三斗浸一夜煎至一斗半入人參末半兩甘草末一兩煎至五升去滓入無灰酒一升釜煤二匕煎如餳入瓶封埋地中一夜每溫酒化下一匙或掃入喉內取惡涎盡為度後含甘草片又孫用和家傳祕寶方云凡人猝中風昏昏如醉形體不收或倒或不倒或口角流涎出斯須不治便成大病此症風涎潮於上胸痹氣不通宜用急救稀涎散吐之用大皂莢肥實不蛀者四挺去黑皮白礬光明者一兩為末每用半錢重者三字溫水調灌不大嘔吐只是微微稀冷涎或出一升二升當待惺惺乃用藥調治不可便大吐之恐過劑傷人纍效不能盡述宗奭曰此法用皂莢末一兩生礬末半兩膩粉半兩水調一二錢過咽即吐涎用礬者分膈下涎也附方舊二十新三十七中風口噤不開涎潮壅上皂角一挺去皮豬脂塗炙黃色為末每服一錢溫酒調下氣壯者二錢以吐出風涎為度簡要濟衆方中風口喎皂角五兩去皮為末三年大醋和之左喎塗右右喎塗左干更上之外臺祕要中暑不省皂莢一兩燒存性甘草一兩微炒為末溫水調一錢灌之淡寮方鬼魘不寤皂莢末刀圭吹鼻中能起死人千金方自縊將絶皂角末吹鼻中外臺方水溺卒死一宿者尚可活紙裹皂莢末納下部須臾出水即活外臺祕要急喉痹塞逡巡不救靈苑方皂莢生研末每以少許點患處外以醋調厚封項下須臾便破出血即愈或挼水灌之亦良直指方用皂角肉半截銼細米醋半盞煎七分破出膿血即愈咽喉腫痛牙皂一挺去皮米醋浸炙七次勿令太焦為末每吹少許入咽吐涎即止聖濟總録風癇諸痰五癇膏治諸風取痰如神大皂角半斤去皮子以蜜四兩塗上慢火炙透捶碎以熱水浸一時挼取汁慢火熬成膏入麝香少許攤在夾綿紙上曬乾煎作紙花每用三四片入淡漿水一小盞中洗淋下以筒吹汁入鼻內待痰涎流盡吃芝麻餅一個涎盡即愈立效普濟方風邪癇疾皂莢燒存性四兩蒼耳根莖葉曬乾四兩密陀僧一兩為末成丸梧桐子大硃砂為衣每服三四十丸棗湯下日二服稍退只服二十丸名抵住丸永類方一切痰氣皂莢燒存性蘿蔔子炒等分薑汁入煉蜜丸梧桐子大每服五七十丸白湯下簡便方胸中痰結皂莢三十挺去皮切水五升浸一夜挼取汁慢熬至可丸丸如梧桐子大每食後鹽漿水下十丸又釣痰膏用半夏醋煮過以皂角膏和勻入明礬少許以柿餅搗膏丸如彈子噙之聖惠方咳逆上氣唾濁不得臥皂莢丸用皂莢炙去皮子研末蜜丸梧桐子大每服一丸棗膏湯下日三夜一服張仲景方痰喘咳嗽長皂莢三條去皮子一莢入巴豆十粒一莢入半夏十粒一莢入杏仁十粒用薑汁製杏仁麻油制巴豆蜜製半夏一處火炙黃色為末每用一字安手心臨臥以薑汁調之吃下神效余居士選奇方猝寒咳嗽皂莢燒研豉湯服二錢千金方牙病喘息喉中水雞鳴用肥皂莢兩挺酥炙取肉為末蜜丸豆大每服一丸取微利為度不利更服一日一服必效方腫滿入腹脹急皂莢去皮子炙黃為末酒一斗石器煮沸服一升日三服肘後方二便關格千金方用皂莢燒研粥飲下三錢立通宣明方鐵腳丸用皂莢炙去皮子為末酒麵糊丸每服五十丸酒下聖惠方用皂莢燒煙於桶內坐上熏之即通食氣黃腫氣喘胸滿用不蛀皂角去皮子醋塗炙焦為末一錢巴豆七枚去油膜以淡醋研好墨和丸麻子大每服三丸食後陳橘皮湯下日三服隔一日增一丸以愈為度經驗方胸腹脹滿欲令瘦者豬牙皂角相續量長一尺微火煨去皮子搗篩蜜丸大如梧桐子服時先吃羊肉兩臠汁三兩口後以肉汁吞藥十丸以快利為度覺得力更服以利清水即止藥瘥後一月不得食肉及諸油膩崔元亮海上集驗方身面猝腫洪滿用皂莢去皮炙黃銼三升酒一斗漬透煮沸每服一升一日三服肘後方猝熱勞疾皂莢續成一尺以上酥一大兩微塗緩炙酥盡搗篩蜜丸梧桐子大每日空腹飲下十五丸漸增至二十丸重者不過兩劑愈崔元亮海上方急勞煩熱體瘦三皂丸用皂莢皂莢樹皮皂莢刺各一斤同燒灰以水三斗淋汁再淋如此三五度煎之候少凝入麝香末一分以童子小便浸蒸餅丸小豆大每空心溫水下七丸聖惠方腳氣腫痛皂角赤小豆為末酒醋調貼腫處永類方傷寒初得不問陰陽以皂角一挺肥者燒赤為末以水五合和頓服之陰病極效千金方時氣頭痛煩熱用皂角燒研新汲水一中盞薑汁蜜各少許和二錢服之先以暖水淋浴後服藥取汗即愈聖惠猝病頭痛皂角末吹鼻取嚏斗門方腦宣不止不蛀皂角去皮子蜜炙捶碎入水挼取濃汁熬成膏㗜鼻口內咬箸良久涎出為度張子和儒門事親齆鼻不通皂角末吹之千金方風熱牙痛皂角一挺去子入鹽滿殼仍加白礬少許黃泥固濟煅研日擦之楊誠經驗方風蟲牙痛外臺祕要方用皂莢末塗齒上有涎吐之十全方用豬牙皂角食鹽等分為末日揩之揩牙烏須大皂角二十挺以薑汁地黃汁蘸炙十遍為末日用揩牙甚妙普濟方霍亂轉筋皂角末吹豆許入鼻取嚏即安梅師方腸風下血用長尺皂角五挺去皮子酥炙三次研末精羊肉十兩細切搗爛和丸梧桐子大每溫水下二十丸聖惠大腸脫肛不蛀皂角五挺捶碎水挼取汁二升浸之自收上收後以湯蕩其腰肚上下令皂角氣行則不再作仍以皂角去皮酥炙為末棗肉和丸米飲下三十丸聖惠方下部䘌瘡皂莢燒研綿裹導之肘後方外腎偏疼皂角和皮為末水調敷之良梅師方便毒腫痛皂角炒焦水粉炒等分研末以熱醋調攤貼患處頻以水潤之即效又方用豬牙皂角七片煨黃去皮弦出火毒為末空心溫酒服五錢袖珍方便毒癰疽皂角一條醋熬膏敷之屢效直指方婦人吹乳袖珍方用豬牙皂角去皮蜜炙為末酒服一錢又詩云婦人吹奶法如何皂角燒灰蛤粉和熱酒一杯調八字管教時刻笑呵呵疔腫惡瘡皂角去皮酥炙焦為末入麝香少許人糞少許和塗五日後根出普濟方小兒頭瘡黏肥及白禿用皂角燒黑為末去痂敷之不過三次即愈鄧筆峰衛生雜興小兒惡瘡先以皂莢水洗拭乾以少油麻搗爛塗之肘後方足上風瘡作癢甚者皂角炙熱烙之潘氏方大風諸癩長皂角二十條炙去皮子以酒煎稠濾過候冷入雪糕丸梧桐子大每酒下五十丸直指方積年疥瘡豬肚內放皂角煮熟去皂角食之袖珍方射工水毒生瘡皂莢長尺二者苦酒一升煎汁熬如飴塗之肘後方咽喉骨哽豬牙皂角二條切碎生絹袋盛縫滿線縛項中立消簡便方魚骨哽咽皂角末吹鼻取嚏聖惠方九里蜂毒皂莢鑽孔貼叮處艾灸孔上三五壯即安救急方腎風陰癢以稻草燒皂角煙燻十餘次即止濟急仙方子修治斆曰揀取圓滿堅硬不蛀者以瓶煮熟剝去硬皮一重取向里白肉兩片去黃以銅刀切曬用其黃消人腎氣氣味辛溫無毒主治炒舂去赤皮以水浸軟煮熟糖漬食之疏導五臟風熱壅宗奭核中白肉入治肺藥核中黃心嚼食治膈痰吞酸蘇頌仁和血潤腸李杲治風熱大腸虛祕瘰癧腫毒瘡癬時珍發明機曰皂角核燒存性治大便燥結其性得濕則滑滑則燥結自通也時珍曰皂莢味辛屬金能通大腸陽明燥金乃辛以潤之之義非得濕則滑也附方舊三新十一腰腳風痛不能履地皂角子一千二百個洗淨以少酥熬香為末蜜丸梧子大每空心以蒺藜子酸棗仁湯下三十丸千金方大腸虛祕風人虛人腳氣人大腸或祕或利用上方服至百丸以通為度下痢不止諸藥不效服此三服宿垢去盡即變黃色屢驗皂角子瓦焙為末米糊丸梧桐子大每服四五十丸陳茶下醫方摘要腸風下血皂莢子槐實各一兩用黏穀糠炒香去糠為末陳粟米飲下一錢名神效散普濟方裡急後重不蛀皂角子米糠炒過枳殼炒等分為末飯丸梧桐子大每米飲下三十丸普濟方小兒流涎脾熱有痰皂莢子仁半兩半夏薑湯泡七次一錢二分為末薑汁丸麻子大每溫水下五丸聖濟總録惡水入口及皂莢水入口熱痛不止以皂莢子燒存性一分沙糖半兩和膏含之博濟方婦人難産皂角子二枚吞之千金方風蟲牙痛皂角子末綿裹彈子大兩顆醋煮熱更互尉之日三五度聖惠方粉滓面䵟皂角子杏仁等分研勻夜以津和塗之聖惠方預免瘡癤凡小兒每年六月六日照年歲吞皂莢子可免瘡癤之患大人亦可吞七枚或二十一枚林靜齊所傳方也吳旻扶壽方便癰初起皂角子七個研末水服效一方照年歲吞之儒門事親方一切疔腫皂角子仁作末敷之五日愈千金方年久瘰癧阮氏經驗方用不蛀皂角子一百粒米醋一升硇砂二錢同煮乾炒令酥看癧子多少如一個服一粒十個服十粒細嚼米湯下酒浸煮服亦可聖濟總録言虛人不可用硇砂也刺一名天丁氣味辛溫無毒主治米醋熬嫩刺作煎塗瘡癬有奇效蘇頌治癰腫妒乳風癘惡瘡胎衣不下殺蟲時珍發明楊士瀛曰皂莢刺能引諸藥性上行治上焦病震亨曰能引至癰疽潰處甚驗時珍曰皂莢刺治風殺蟲功與莢同但其鋭利直達病所為異耳神仙傳云左親騎軍崔言一旦得大風惡疾雙目昏盲眉發自落鼻梁崩倒勢不可救遇異人傳方用皂角刺三斤燒灰蒸一時久曬乾為末食後濃煎大黃湯調一匕飲之一旬眉發再生肌潤目明後入山修道不知所終又劉守真保命集云癘風乃營氣熱風寒客於脈而不去宜先用樺皮散服五七日後灸承漿穴七壯三灸後每旦早服樺皮散午以升麻葛根湯下錢氏瀉青丸晚服二聖散用大黃末半兩煎湯調皂角刺灰三錢乃緩疏泄血中之風熱也仍戒房室三年樺皮散見樺皮下又追風再造散即二聖散云服之便出黑蟲為驗數日再服直候蟲盡為絶根也新蟲嘴赤老蟲嘴黑附方新十二小兒重舌皂角刺灰入朴硝或腦子少許漱口摻入舌下涎出自消普濟方小便淋閉皂角刺燒存性破故紙等分為末無灰酒服聖濟總録腸風下血便前近腎肝便後近心肺皂角刺灰二兩胡桃仁破故紙炒槐花炒各一兩為末每服一錢米飲下普濟方傷風下痢風傷久不已而下痢膿血日數十度用皂角刺枳實麩炒槐花生用各半兩為末煉蜜丸梧桐子大每服三十丸米湯下日二服袖珍方胎衣不下皂角棘燒為末每服一錢溫酒調下熊氏補遺婦人乳癰皂角刺燒存性一兩蚌粉一錢和研每服一錢溫酒下直指方乳汁結毒産後乳汁不泄結毒者皂角刺蔓荊子各燒存性等分為末每溫酒服二錢袖珍方腹內生瘡在腸臟不可藥治者取皂角刺不拘多少好酒一碗煎至七分溫服其膿血悉從小便中出極效不飲酒者水煎亦可藺氏經驗方瘡腫無頭皂角刺燒灰酒服三錢嚼葵子三五粒其處如針刺為效儒門事親癌瘭惡瘡皂角刺燒存性研白芨少許為末敷之直指方大風癘瘡選奇方用黃柏末皂角刺灰各三錢研勻空心酒服取下蟲物並不損人食白粥兩三日服補氣藥數劑名神效散如四肢腫用針刺出水再服忌一切魚肉發風之物取下蟲大小長短其色不一約一二升其病乃愈也仁存方發背不潰皂角刺麥麩炒黃一兩綿黃耆焙一兩甘草半兩為末每服一大錢酒一盞乳香一塊煎七分去滓溫服普濟本事方木皮根皮氣味辛溫無毒主治風熱痰氣殺蟲時珍附方新二肺風惡瘡瘙癢用木乳即皂莢根皮秋冬採如羅紋者陰乾炙黃白蒺藜炒黃耆人參枳殼炒甘草炙等分為末沸湯每服一錢普濟方産後腸脫不收用皂角樹皮半斤皂角核一合川楝樹皮半斤石蓮子炒去心一合為粗末以水煎湯乘熱以物圍定坐熏洗之挹干便吃補氣丸藥一服仰睡婦人良方葉主治入洗風瘡泄用時珍附録鬼皂莢藏器曰生江南澤畔狀如皂莢高一二尺作湯浴去風瘡疥癬挼葉去衣垢沐發令長肥皂莢綱目集解時珍曰肥皂莢生高山中其樹高大葉如檀及皂莢葉五六月開白花結莢長三四寸狀如雲實之莢而肥厚多肉內有黑子數顆大如指頭不正圓其色如漆而甚堅中有白仁如栗煨熟可食亦可種之十月採莢煮熟搗爛和白麵及諸香作丸澡身面去垢而膩潤勝於皂莢也相感志言肥皂莢水死金魚闢馬蟻麩見之則不就亦物性然耳莢氣味辛溫微毒主治去風濕下痢便血瘡癬腫毒時珍附方新九腸風下血獨子肥皂燒存性一片為末糕糊丸一片為末米飲調吞下普濟方下痢禁口肥皂莢一枚以鹽實其內燒存性為末以少許入白米粥內食之即效乾坤生意風虛牙腫老人腎虛或因涼藥擦牙致痛用獨子肥皂以青鹽實之燒存性研末摻之或入生樟腦十五文衛生家寶方頭耳諸瘡眉癬燕窩瘡並用肥皂煅存性一錢枯礬一分研勻香油調塗之摘玄方小兒頭瘡因傷湯水成膿出水不止用肥皂燒存性入膩粉麻油調搽海上方臘梨頭瘡不拘大人小兒用獨核肥皂去核填入沙糖入巴豆二枚扎定鹽泥包煅存性入檳榔輕粉五七分研勻香油調搽先以灰汁洗過溫水再洗拭乾乃搽一宿見效不須再洗普濟方癬瘡不愈以川槿皮煎湯用肥皂去核及內膜浸湯時時搽之楊起簡便方便毒初起肥皂搗爛敷之甚效簡便方玉莖濕癢肥皂一個燒存性香油調搽即愈攝生方核氣味甘腥溫無毒主治除風氣時珍無患子宋開寶釋名桓拾遺木患子綱目噤婁拾遺肥珠子綱目油珠子綱目菩提子綱目鬼見愁藏器曰桓患字聲訛也崔豹古今注云昔有神巫曰瑤㲘能符劾百鬼得鬼則以此木為棒棒殺之世人相傳以此木為器用以厭鬼魅故號曰無患人又訛為木患也時珍曰俗名為鬼見愁道家禳解方中用之緣此義也釋家取為數珠故謂之菩提子與薏苡同名纂文言其木名盧鬼木山人呼為肥珠子油珠子因其實如肥油而子圓如珠也集解藏器曰無患子高山大樹也子黑如漆珠博物志云桓葉似櫸柳葉核堅正黑如醫可作香纓及浣垢宗奭曰今釋子取為念珠以紫紅色小者佳入藥亦少西洛亦有之時珍曰生高山中樹甚高大枝葉皆如椿特其葉對生五六月開白花結實大如彈丸狀如銀杏及苦楝子生青熟黃老則紋皺黃時肥如油炸之形味辛氣䐈且硬其蒂下有二小子相黏承之實中一核堅黑似肥皂莢之核而正圓如珠殼中有仁如榛子仁亦辛䐈可炒食十月採實煮熟去核搗和麥面或豆麵作澡藥去垢同於肥皂用洗真珠甚妙山海經云秩周之山其木多桓郭璞注云葉似柳皮黃不錯子似楝著酒中飲之辟惡氣浣衣去垢核堅正黑即此也今武當山中所出鬼見愁亦是樹莢之子其形正如刀豆子而色褐彼人亦以穿數珠別又是一物非無患也子皮即核外肉也氣味微苦平有小毒主治浣垢去面䵟喉痹研納喉中立開又主飛尸藏器附方新二洗頭去風明目用槵子皮皂角胡餅菖蒲同捶碎漿水調作彈子大每用泡湯洗頭良多能鄙事洗面去䵟槵子肉皮搗爛入白麵和丸大丸每日用洗面去垢及䵟甚良集簡方子中仁氣味辛平無毒主治燒之辟邪惡氣藏器煨食辟惡去口臭時珍附方新一牙齒腫痛肥珠子一兩大黃香附各一兩青鹽半兩泥固煅研日用擦牙普濟方欒華本經下品集解別録曰欒華生漢中川穀五月採恭曰此樹葉似木槿而薄細花黃似槐而稍長大子殼似酸漿其中有實如熟豌豆圓黑堅硬堪為數珠者是也五月六月花可收南人以染黃甚鮮明又以療目赤爛頌曰今南方及汴中園圃間或有之宗奭曰長安山中亦有之其子謂之木欒子攜至京都為數珠未見入藥華氣味苦寒無毒之才曰決明為之使主治目痛淚出傷眥消目腫本經合黃連作煎療目赤爛蘇恭無食子唐本草釋名沒石子開寶墨石子炮炙論麻荼澤珣曰波斯人每食以代果故番胡呼為沒食子梵書無與沒同音今人呼為墨石沒石轉傳訛矣集解恭曰無食子生西戎沙磧間樹似柳禹錫曰按段成式酉陽雜俎云無食子出波斯國呼為摩澤樹高六七丈圍八九尺葉似桃葉而長三月開花白色心微紅子圓如彈丸初青熟乃黃白蟲蝕成孔者入藥用其樹一年生無食子一年生拔屢子大如指長三寸上有殼中仁如栗黃可啖時珍曰按方輿志云大食國有樹一年生如栗子而長名曰蒲盧子可食次年則生麻荼澤即沒石子也間歲互生一根異産如此一統志云沒石子出大食諸地樹如樟實如中國茅栗子修治斆曰凡使勿犯銅鐵並被火驚用顆小無鍁米者妙用漿水於砂盆中研令盡焙乾再研如烏犀色入藥氣味苦溫無毒主治赤白痢腸滑生肌肉唐本腸虛冷痢益血生精和氣安神烏髭發治陰毒痿燒灰用李珣溫中治陰瘡陰汗小兒疳䘌冷滑不禁馬志發明宗奭曰沒石子合他藥染須造墨家亦用之珣曰張仲景用治陰汗燒灰先以湯浴了布裹灰撲之甚良附方舊三新五血痢不止沒石子一兩為末飲丸小豆大每食前米飲下五十丸普濟方小兒久痢沒石子二個熬黃研末作餛飩食之宮氣方産後下痢沒石子一個燒存性研末冷即酒服熱即用飲下日二子母祕録牙齒疼痛綿裹無食子末一錢咬之涎出吐去聖濟總録鼻面酒齇南方沒石子有孔者水磨成膏夜夜塗之甚妙危氏得效方口鼻急疳沒石子末吹下部即瘥千金方大小口瘡沒石子炮三分甘草一分研末摻之月內小兒生者少許置乳上吮之入口即啼不過三次聖惠方足趾肉刺無食子三枚肥皂莢一挺燒存性為末醋和敷之立效奇效方訶黎勒唐本草釋名訶子時珍曰訶黎勒梵言天主持來也集解恭曰訶黎勒生交州愛州頌曰今嶺南皆有而廣州最盛樹似木患子花白子形似梔子橄欖青黃色皮肉相著七月八月實熟時採六路者佳嶺南異物志云廣州法性寺有四五十株子極小而味不澀皆是六路每歲州貢只以此寺者寺有古井木根蘸水水味不咸每子熟時有佳客至則院僧煎湯以延之其法用新摘訶子五枚甘草一寸破之汲井水同煎色若新茶今其寺謂之乾明古寺尚在舊木猶有六七株南海風俗尚貴此湯然煎之不必盡如昔時之法也訶子未熟時風飄墮者謂之隨風子曝乾收之益小者佳彼人尤珍貴之蕭炳曰波斯舶上來者六路黑色肉厚者良六路即六稜也斆曰幾使勿用毗黎勒個個毗頭也若訶黎勒文只有六路或多或少並是雜路勒皆圓而露文或八路至十三路號曰榔精勒澀不堪用修治斆曰凡用訶黎勒酒浸後蒸一伏時刀削去路取肉銼焙用用核則去肉氣味苦溫無毒權曰苦甘炳曰苦酸珣曰酸澀溫好古曰苦酸平苦重酸輕味厚陰也降也主治冷氣心腹脹滿下食唐本破胸膈結氣通利津液止水道黑髭發甄權下宿物止腸澼久泄赤白痢蕭炳消痰下氣化食開胃除煩治水調中止嘔吐霍亂心腹虛痛奔豚腎氣肺氣喘急五膈氣腸風瀉血崩中帶下懷孕漏胎及胎動欲生脹悶氣喘並患痢人肛門急痛産婦陰痛和蠟燒煙燻之及煎湯熏洗大明治痰嗽咽喉不利含三數枚殊勝蘇頌實大腸斂肺降火震亨發明宗奭曰訶黎勒氣虛人亦宜緩緩煨熟少服此物雖澀腸而又泄氣其味苦澀故爾杲曰肺苦氣上逆急食苦以泄之以酸補之訶子苦重瀉氣酸輕不能補肺故嗽藥中不用震亨曰訶子下氣以其味苦而性急肺苦急急食苦以瀉之謂降而下走也氣實者宜之若氣虛者似難輕服又治肺氣因火傷極遂郁遏脹滿其味酸苦有收斂降火之功也時珍曰訶子同烏梅五倍子用則收斂同橘皮厚朴用則下氣同人參用則能補肺治咳嗽東垣言嗽藥不用者非矣但咳嗽未久者不可驟用爾嵇含草木狀言作飲久服令髭發白者變黑亦取其澀也珣曰訶黎皮主嗽肉主眼澀痛波斯人將訶黎勒大腹等在舶上用防不虞或遇大魚放涎滑水中數里船不能通乃煮此洗其涎滑尋化為水則其治氣消痰功力可知矣慎微曰金光明經流水長者子除病品云熱病下藥服訶黎勒又廣異記云高仙芝在大食國得訶黎勒長五寸置抹肚中便覺腹中痛因大利十餘行疑訶黎勒為祟後問大食長老云此物人帶一切病消利者乃出惡物爾仙芝寶之後被誅失所在頌曰訶黎主痢唐本草不載張仲景治氣痢有方唐劉禹錫傳信方云豫曾苦赤白下諸藥服遍久不瘥轉為白膿令狐將軍傳此方用訶黎勒三枚兩炮一生並取皮末之以沸漿水一合服之若只水痢加一錢匕甘草末若微有膿血加二匕血多加三匕附方舊十新五下氣消食訶黎一枚為末瓦器中水一大升煎三兩沸下藥更煎三五沸如麴塵色入少鹽飲之食醫心鏡一切氣疾宿食不消訶黎一枚入夜含之至明嚼咽又方訶黎三枚濕紙包煨熟去核細嚼以牛乳下千金方氣嗽日久生訶黎一枚含之咽汁瘥後口爽不知食味卻煎檳榔湯一碗服立便有味此知連州成密方也經驗方嘔逆不食訶黎勒皮二兩炒研糊丸梧桐子大空心湯服二十丸日三服廣濟方風痰霍亂食不消大便澀訶黎三枚取皮為末和酒頓服三五次妙外臺祕要小兒霍亂訶黎一枚為末沸湯服一半未止再服子母祕録小兒風痰壅閉語音不出氣促喘悶手足動搖訶子半生半炮去核大腹皮等分水煎服名二聖散全幼心鑑風熱沖頂熱悶訶黎二枚為末芒硝一錢同入醋中攪令消摩塗熱處外臺祕要氣痢水瀉訶黎勒十枚麵裹煻火煨熟去核研末粥飲頓服亦可飯丸服一加木香又長服方訶黎勒陳橘皮厚朴各三兩搗篩蜜丸大如梧子每服二三十丸白湯下圖經本草水瀉下痢訶黎勒炮二分肉豆蔻一分為末米飲每服二錢聖惠方下痢轉白訶子三個二炮一生為末沸湯調服水痢加甘草末一錢普濟方赤白下痢訶子十二個六生六煨去核焙為末赤痢生甘草湯下白痢炙甘草湯下不過再服趙原陽濟急方妒精下疳大訶子燒灰入麝香少許先以米泔水洗後搽之或以荊芥黃柏甘草馬鞭草蔥白煎湯洗亦可昔方士周守真醫唐靖爛莖一二寸用此取效也洪邁夷堅志核主治磨白蜜注目去風赤澀痛神良蘇頌止咳及痢時珍葉主治下氣消痰止渴及泄痢煎飲服功同訶黎時珍唐包佶有病中謝李吏部惠訶黎勒葉詩婆羅得宋開寶釋名婆羅勒時珍曰婆羅得梵言重生果也集解珣曰婆羅得生西海波斯國樹似中華柳樹子如萆麻子方家多用之時珍曰按王燾外臺祕要婆羅勒似萆麻子但以指甲爪之即有汁出即此物也子氣味辛溫無毒主治冷氣塊溫中補腰腎破痃癖可染髭發令黑藏器附方新一拔白生黑婆羅勒十顆去皮取汁熊脂二兩白馬鬐膏煉過一兩生薑炒一兩母丁香半兩二味為末和勻每拔白點之揩令入肉即生黑者此嚴中丞所用方也孟詵近效方櫸別録下品釋名櫸柳衍義鬼柳時珍曰其樹高舉其木如柳故名山人訛為鬼柳郭璞注爾雅作櫃柳云似柳皮可煮飲也集解弘景曰櫸樹山中處處有之皮似檀槐葉如櫟槲人多識之恭曰所在皆有多生溪澗水側葉似樗而狹長樹大者連抱高數仞皮極粗厚殊不似檀宗奭曰櫸木今人呼為櫸柳其葉謂柳非柳謂槐非槐最大者木高五六丈合二三人抱湖南北甚多然亦不材也不堪為器嫩皮取以緣栲栳及箕唇時珍曰櫸材紅紫作箱案之類甚佳鄭樵通志云櫸乃榆類而鍁烈其實亦如榆錢之狀鄉人採其葉為甜茶木皮修治斆曰凡使勿用三四年者無力用二十年以來者心空其樹只有半邊向西生者良剝下去粗皮細銼蒸之從巳至未出焙乾用氣味苦大寒無毒主治時行頭痛熱結在腸胃別録夏日煎飲去熱弘景俗用煮汁服療水氣斷痢蘇恭安胎止妊婦腹痛山櫸皮性平治熱毒風熁腫毒大明附方舊一新四通身水腫櫸樹皮煮汁日飲聖惠方毒氣攻腹手足腫痛櫸樹皮和槲皮煮汁煎如飴糖以樺皮煮濃汁化飲肘後方蠱毒下血櫸皮一尺蘆根五寸水二升煮一升頓服當下蠱出千金方小兒痢血梁州櫸皮二十分炙犀角十二分水三升煮取一升分三服取瘥古今録驗方飛血赤眼櫸皮去粗皮切二兩古錢七文水一升半煎七合去滓熱洗日二次聖濟總録葉氣味苦冷無毒主治挼貼火爛瘡有效蘇恭治腫爛惡瘡鹽搗罯之大明柳本經下品釋名小楊說文楊柳弘景曰柳即今水楊柳也恭曰柳與水楊全不相似水楊葉圓闊而尖枝條短硬柳葉狹長而青緑枝條長軟陶以柳為水楊非也藏器曰江東人通名楊柳北人都不言楊楊樹枝葉短柳樹枝葉長時珍曰楊枝硬而揚起故謂之楊柳枝弱而垂流故謂之柳蓋一類二種也蘇恭所說為是按說文云楊蒲柳也從木昜聲柳小楊也從木丣聲昜音陽丣音酉又爾雅云楊蒲柳也旄澤柳也柳河柳也觀此則楊可稱柳柳亦可稱楊故今南人猶並稱楊柳俞宗本種樹書言順插為柳倒插為楊其說牽強且失揚起之意宗奭曰釋家謂柳為尼俱律陀木集解別録曰柳華生琅邪川澤頌曰今處處有之俗所謂楊柳者也其類非一蒲柳即水楊也枝徑韌可為箭笴多生河北杞柳生水旁葉粗而白木理微赤可為車轂今人取其細條火逼令柔屈作箱篋孟子所謂杞柳為杯棬者魯地及河朔尤多柳柳見本條時珍曰楊柳縱橫倒順插之皆生春初生柔荑即開黃蕊花至春晚葉長成後花中結細黑子蕊落而絮出如白絨因風而飛子著衣物能生蟲入池沼即化為浮萍古者春取榆柳之火陶朱公言種柳千樹可足柴炭其嫩芽可作飲湯柳華釋名柳絮本經正誤見下氣味苦寒無毒主治風水黃疸面熱黑本經痂疥惡瘡金瘡柳實主潰癰逐膿血子汁療渴別録華主止血治濕痹四肢攣急膝痛甄權發明弘景曰柳華熟時隨風狀如飛雪當用其未舒時者子亦隨花飛止應水漬汁爾藏器曰本經以柳絮為花其誤甚矣花即初發時黃蕊其子乃飛絮也承曰柳絮可以捍氈代羊毛為茵褥柔軟性涼宜與小兒臥尤佳宗奭曰柳花黃蕊干時絮方出收之貼灸瘡良絮之下連小黑子因風而起得水濕便生如苦蕒地丁之花落結子成絮古人以絮為花謂花如雪者皆誤矣藏器之說為是又有實及子汁之文諸家不解今人亦不見用時珍曰本經主治風水黃疸者柳花也別録主治惡瘡金瘡潰癰逐膿血藥性論止血療痹者柳絮及實也花乃嫩蕊可搗汁服子與絮連難以分別惟可貼瘡止血裹痹之用所謂子汁療渴者則連絮浸漬研汁服之爾又崔實四民月令言三月三日及上除日採絮愈疾則入藥多用絮也附方新六吐血咯血柳絮焙研米飲服一錢經驗方金瘡血出柳絮封之即止外臺祕要面上膿瘡柳絮膩粉等分以燈盞油調塗普濟方走馬牙疳楊花燒存性入麝香少許搽保幼大全大風癘瘡楊花四兩搗成餅貼壁上待乾取下米泔水浸一時取起瓦焙研末二兩白花蛇烏蛇各一條去頭尾酒浸取肉全蠍蜈蚣蟾酥雄黃各五錢苦參天麻各一兩為末水煎麻黃取汁熬膏和丸梧桐子大硃砂為衣每服五十丸溫酒下一日三服以愈為度孫氏集效良方腳多汗濕楊花著鞋及襪內穿之摘玄葉氣味同華主治惡疥痂瘡馬疥煎煮洗之立愈又療心腹內血止痛別録煎水洗漆瘡弘景天行熱病傳尸骨蒸勞下水氣煎膏續筋骨長肉止痛主服金石人發大熱悶湯火瘡毒入腹熱悶及疔瘡日華療白濁解丹毒時珍附方舊一新五小便白濁清明柳葉煎湯代茶以愈為度集簡方小兒丹煩柳葉一斤水一斗煮取汁三升拓洗赤處日七八度子母祕録眉毛脫落垂柳葉陰乾為末每薑汁於鐵器中調夜夜摩之聖惠方猝得惡瘡不可名識者柳葉或皮水煮汁入少鹽頻洗之肘後方面上惡瘡方同上痘爛生蛆嫩柳葉鋪席上臥之蛆盡出而愈也李樓奇方枝及根白皮氣味同華主治痰熱淋疾可為浴湯洗風腫瘙癢煮酒漱齒痛蘇恭小兒一日五日寒熱煎枝浴之藏器煎服治黃疸白濁酒煮尉諸痛腫去風止痛消腫時珍發明頌曰柳枝皮及根亦入藥葛洪肘後方治癰疽腫毒妒乳等多用之韋宙獨行方主疔瘡及反花瘡並煎柳枝葉作膏塗之今人作浴湯膏藥牙齒藥亦用其枝為最要之藥時珍曰柳枝去風消腫止痛其嫩枝削為牙杖滌齒甚妙附方舊十新十黃疸初起柳枝煮濃汁半升頓服外臺祕要脾胃虛弱不思飲食食下不化病似翻胃噎膈清明日取柳枝一大把熬湯煮小米作飯灑面滾成珠子曬乾袋懸風處每用燒滾水隨意下米米沉住火少時米浮取看無硬心則熟可頓食之久則面散不黏矣名曰絡索米楊起簡便方走注氣痛氣痛之病忽有一處如打撲之狀不可忍走注不定靜時其處冷如霜雪此皆暴寒傷之也以白酒煮楊柳白皮暖尉之有赤點處鑱去血妙凡諸猝腫急痛尉之皆即止姚增坦集驗方風毒猝腫方同上陰猝腫痛柳枝三尺長二十枚細銼水煮極熱以故帛裹包腫處仍以熱湯洗之集驗方項下癭氣水涯露出柳根三十斤水一斛煮取五升以糯米三斗如常釀酒日飲範汪方齒齦腫痛垂柳枝槐白皮桑白皮白楊皮等分煎水熱含冷吐又方柳枝槐枝桑枝煎水熬膏入薑汁細辛芎藭末每用擦牙聖惠方風蟲牙痛楊柳白皮卷如指大含咀以汁漬齒根數過即愈又方柳枝一握銼入少鹽花漿水煎含甚驗又方柳枝銼一升大豆一升合炒豆熟瓷器盛之清酒三升漬三日頻含漱涎三日愈古今録驗耳痛有膿柳根細切熟搗封之燥即易之斗門方漏瘡腫痛柳根紅須煎水日洗摘玄方用楊柳條罐內燒煙燻之出水即效乳癰妒乳初起堅紫衆療不瘥柳根皮熟搗火溫帛裹尉之冷更易一宿消肘後方反花惡瘡肉出如飯粒根深膿潰柳枝葉三斤水五升煎汁二升熬如餳日三塗之聖惠方天灶丹毒赤從背起柳木灰水調塗之外臺祕要湯火灼瘡柳皮燒灰塗之亦可以根白皮煎豬脂頻敷之肘後方痔瘡如瓜腫痛如火柳枝煎濃湯洗之艾灸三五壯王及郎中病此驛吏用此方灸之覺熱氣入腸大下血穢至痛一頃遂消馳馬而去本事方柳膠主治惡瘡及結砂子時珍柳寄生見後寓木類柳耳見菜部木耳柳蠹見蟲部柳柳音偵宋開寶釋名赤柳日華赤楊古今注河柳爾雅雨師詩疏垂絲柳綱目人柳綱目三眠柳衍義觀音柳時珍曰按羅願爾雅翼云天之將雨柳先知之起氣以應又負霜雪不凋乃木之聖者也故字從聖又名雨師或曰得雨則垂垂如絲當作雨絲又三輔故事云漢武帝苑中有柳狀如人號曰人柳一日三起三眠則柳柳之聖又不獨知雨負雪而已今俗稱長壽仙人柳亦曰觀音柳謂觀音用此灑水也宗奭曰今人謂之三春柳以其一年三秀故名集解志曰赤柳木生河西沙地皮赤色細葉禹錫曰爾雅柳河柳也郭璞注云今河旁赤莖小楊也陸機詩疏云生水旁皮赤如絳枝葉如松時珍曰柳柳小干弱枝插之易生赤皮細葉如絲婀娜可愛一年三次作花花穗長三四寸水紅色如蓼花色南齊時益州獻蜀柳條長狀若絲縷者即此柳也段成式酉陽雜俎言涼州有赤白柳大者為炭其灰汁可以煮銅為銀故沈炯賦云柳似柏而香王禎農書云山柳赤而脆河柳白而明則柳又有白色者也宗奭汴京甚多河西戎人取滑枝為鞭木氣味甘咸溫無毒主治剝驢馬血入肉毒取木片火炙尉之並煮汁浸之開寶枝葉消痞解酒毒利小便時珍附方新三腹中痞積觀音柳煎湯露一夜五更空心飲數次痞自消衛生易簡方一切諸風不問遠近柳葉半斤切枝亦可荊芥半斤水五升煮二升澄清入白蜜五合竹瀝五合新瓶盛之油紙封入重湯煮一伏時每服一小盞日三服普濟方酒多致病長壽仙人柳曬乾為末每服一錢溫酒調下衛生易簡方柳乳即脂汁主治合質汗藥治金瘡開寶水楊唐本草釋名青楊綱目蒲柳爾雅蒲楊古今注蒲栘音移栘柳古今注萑苻音丸蒲時珍曰楊枝硬而揚起故謂之楊多宜水涘蒲萑之地故有水楊蒲柳萑苻之名集解恭曰水楊葉圓闊而尖枝條短硬與柳全別柳葉狹長枝條長軟頌曰爾雅楊蒲柳也其枝徑韌可為箭笴左傳所謂董澤之蒲又謂之萑苻今河北沙地多生之楊柳之類亦多崔豹古今注云白楊葉圓青楊葉長柳葉長而細栘楊葉圓而弱水楊即蒲柳亦曰蒲楊葉似青楊莖可作矢赤楊霜降則葉赤材理亦赤然今人鮮能分別機曰蘇恭說水楊葉圓闊崔豹說蒲楊似青楊青楊葉長似不相類時珍曰按陸機詩疏云蒲柳有二種一種皮正青一種皮正白可為矢北土尤多花與柳同枝葉氣味苦平無毒主治久痢赤白搗汁一升服日二大效唐本主癰腫痘毒時珍發明時珍曰水楊根治癰腫故近人用枝葉治痘瘡魏直博愛心鑑云痘瘡數日陷頂漿滯不行或風寒所阻者宜用水楊枝葉無葉用枝五斤流水一大釜煎湯溫浴之如冷添湯良久照見纍起有暈絲者漿行也如不滿再浴之力弱者只洗頭面手足如屢浴不起者氣血敗矣不可再浴始出及癢塌者皆不可浴痘不行漿乃氣澀血滯腠理固密或風寒外阻而然浴令暖氣透達和暢鬱蒸氣血通徹每隨暖氣而發行漿貫滿功非淺也若內服助氣血藥藉此升之其效更速風寒亦不得而阻之矣直見一嫗在村中用此有驗叩得其方行之百發百中慎勿易之誠有燮理之妙也蓋黃鐘一動而蟄蟲啓戶東風一吹而堅冰解釋同一春也群書皆無此法故詳著之木白皮及根氣味同華主治金瘡痛楚乳癰諸腫痘瘡時珍發明時珍曰按李仲南永類鈐方云有人治乳癰持藥一根生擂貼瘡其熱如火再貼遂平求其方乃水楊柳根也葛洪肘後方治乳癰用柳根則楊與柳性氣不遠可通用也附方新一金瘡苦痛楊木白皮熬燥碾末水服方寸匕仍敷之日三次千金方白楊唐本草釋名獨搖宗奭曰木身似楊微白故曰白楊非如粉之白也時珍曰鄭樵通志言白楊一名高飛與栘楊同名今俗通呼栘楊為白楊且白楊亦因風獨搖故得同名也集解恭曰白楊取葉圓大蒂小無風自動者藏器曰白楊北土極多人種墟墓間樹大皮白其無風自動者乃栘楊非白楊也頌曰今處處有之北土尤多株甚高大葉圓如梨葉皮白色木似楊採無時崔豹古今注云白楊葉圓青楊葉長是也宗奭曰陝西甚多永耀間居人修蓋多此木也其根易生斫木時碎札入土即生根故易繁植土地所宜爾風才至葉如大雨聲謂無風自動則無此事但風微時其葉孤絶處則往往獨搖以其蒂細長葉重大勢使然也時珍曰白楊木高大葉圓似梨而肥大有尖面青而光背甚白色有鋸齒木肌細白性堅直用為梁栱終不撓曲與栘楊乃一類二種也治病之功大抵倣佛嫩葉亦可救荒老葉可作酒麴料木皮修治斆曰凡使銅刀刮去粗皮蒸之從巳至未以布袋盛掛屋東角待乾用氣味苦寒無毒大明曰酸冷主治毒風腳氣腫四肢緩弱不隨毒氣遊昜在皮膚中痰癖等酒漬服之唐本去風痹宿血折傷血瀝在骨肉間痛不可忍及皮膚風瘙腫雜五木為湯浸損處藏器治撲損瘀血並煎酒服煎膏可續筋骨大明煎湯日飲止孕痢煎醋含漱止牙痛煎漿水入鹽含漱治口瘡煎水釀酒消癭氣時珍附方舊一新一妊娠下痢白楊皮一斤水一斗煮取二升分三服千金方項下癭氣秫米三斗炊熟取圓葉白楊皮十兩勿令見風切水五升煮取二升漬曲末五兩如常釀酒每旦一盞日再服崔氏方枝主治消腹痛治吻瘡時珍附方舊二新一口吻爛瘡白楊嫩枝鐵上燒灰和脂敷之外臺祕要腹滿癖堅如石積年不損者必效方用白楊木東南枝去粗皮闢風細銼五升熬黃以酒五升淋訖用絹袋盛滓還納酒中密封再宿每服一合日三服外臺祕要面色不白白楊皮十八兩桃花一兩白瓜子仁三兩為末每服方寸匕日三服五十日面及手足皆白聖濟總録葉主治齲齒煎水含漱又治骨疽久發骨從中出頻搗敷之時珍枎栘音夫移拾遺釋名栘楊古今注唐棣爾雅高飛崔豹獨搖時珍曰栘乃白楊同類故得楊名按爾雅唐棣栘也崔豹曰栘楊江東呼為夫栘圓葉弱蒂微風則大搖故名高飛又曰獨搖陸機以唐棣為郁李者誤矣郁李乃常棣非唐棣也集解藏器曰枎栘木生江南山谷樹大十數圍無風葉動花反而後合詩云棠棣之華偏其反而是也時珍曰栘楊與白楊是同類二種今南人通呼為白楊故俚人有白楊葉有風掣無風掣之語其入藥之功大抵相近木皮氣味苦平有小毒主治去風血腳氣疼痹踠損瘀血痛不可忍取白皮火炙酒浸服之和五木皮煮湯捋腳氣殺瘃蟲風瘙燒作灰置酒中令味正經時不敗藏器發明時珍曰白楊栘楊皮並雜五木皮煮湯浸捋損痹諸痛腫所謂五木者桑槐桃楮柳也並去風和血附方新一婦人白崩枎楊皮半斤牡丹皮四兩升麻牡蠣煅各一兩每用一兩酒二鍾煎一鍾食前服集簡方松楊拾遺校正併入唐本草椋子木釋名椋子木音涼時珍曰其材如松其身如楊故名松楊爾雅云椋即來也其陰可蔭涼故曰椋木藏器曰江西人呼為涼木松楊縣以此得名集解藏器曰松楊生江南林落間大樹葉如梨志曰椋子木葉似柿兩葉相當子細圓如牛李生青熟黑其木堅重煮汁色赤郭璞云椋材中車輞八月九月採木曬乾用木氣味甘咸平無毒主治折傷破惡血養好血安胎止痛生肉唐本木皮氣味苦平無毒主治水痢不問冷熱濃煎令黑服一升藏器榆俞由二音本經上品釋名零榆本經白者名枌時珍曰按王安石字說云榆瀋俞柔故謂之榆其枌則有分之之道故謂之枌其莢飄零故曰零榆集解別録曰榆皮生穎川山谷二月採皮取白曝乾八月採實並勿令中濕濕則傷人弘景曰此即今之榆樹取皮刮去上赤皮亦可臨時用之性至滑利初生莢仁以作糜羹令人多睡嵇康所謂榆令人瞑也恭曰榆三月實熟尋即落矣今云八月採實恐誤也藏器曰江東無大榆有刺榆秋實故經云八月採者誤也刺榆皮不滑利頌曰榆處處有之三月生莢古人採仁以為糜羹今無復食者惟用陳老實作醬耳按爾雅疏云榆類有數十種葉皆相似但皮及木理有異耳刺榆有針刺如柘其葉如榆瀹為蔬羹滑於白榆即爾雅所謂樞荎詩經所謂山有樞是也白榆先生葉卻著莢皮白色二月剝皮刮去粗皵中極滑白即爾雅所謂榆白枌是也荒歲農人取皮為粉食之當糧不損人四月採實宗奭曰榆皮初春先生莢者是也嫩時收貯為羹茹嘉祐中豐沛人缺食多用之時珍曰邢昺爾雅疏云榆有數十種今人不能盡別惟知莢榆白榆刺榆榔榆數者而已莢榆白榆皆大榆也有赤白二種白者名枌其木甚高大未生葉時枝條間先生榆莢形狀似錢而小色白成串俗呼榆錢後方生葉似山茱萸葉而長尖𧣪潤澤嫩葉炸浸淘過可食故內則云堇荁枌榆免藁滫瀡以滑之三月採榆錢可作羹亦可收至冬釀酒瀹過曬乾可為醬即榆仁醬也崔實月令謂之𨡭䤅音牟偷者是也山榆之莢名蕪荑與此相近但味稍苦耳諸榆性皆扇地故其下五穀不植古人春取榆火今人採其白皮為榆面水調和香劑黏滑勝於膠漆承曰榆皮濕搗如糊用黏瓦石極有力汴洛人以石為碓嘴用此膠之白皮氣味甘平滑利無毒主治大小便不通利水道除邪氣久服斷谷輕身不飢其實尤良本經療腸胃邪熱氣消腫治小兒頭瘡痂疕別録通經脈搗涎敷癬瘡大明滑胎利五淋治齁喘療不眠甄權生皮搗和三年醋滓封暴患赤腫女人妒乳腫日六七易效孟詵利竅滲濕熱行津液消癰腫時珍發明詵曰高昌人多搗白皮為末和菜菹食甚美令人能食仙家長服服丹石人亦服之取利關節故也時珍曰榆皮榆葉性皆滑利下降手足太陽手陽明經藥也故人小便不通五淋腫滿喘嗽不眠經脈胎産諸症宜之本草十劑云滑可去著冬葵子榆白皮之屬蓋亦取其利竅滲濕熱消留著有形之物爾氣盛而壅者宜之若胃寒而虛者久服滲利恐泄真氣本經所謂久服輕身不飢蘇頌所謂榆粉多食不損人者恐非確論也附方舊九新九斷谷不飢榆皮檀皮為末日服數合救荒本草齁喘不止榆白皮陰乾焙為末每日旦夜用水五合末二錢煎如膠服藥性論久嗽欲死許明有效方用厚榆皮削如指大去黑刻令如鋸長尺余納喉中頻出入當吐膿血而愈古今録驗虛勞白濁榆白皮二升水二斗煮取五升分五服千金方小便氣淋榆枝石燕子煎水日服普濟方五淋澀痛榆白皮陰乾焙研每以二錢水五合煎如膠日二服普濟方渴而尿多非淋也用榆皮二斤去黑皮以水一斗煮取五升一服三合日三服外臺祕要身體暴腫榆皮搗末同米作粥食之小便利即消備急方臨月易産榆皮焙為末臨月日三服方寸匕令産極易陳承本草別說墮胎下血不止榆白皮當歸焙各半兩入生薑水煎服之普濟方胎死腹中或母病欲下胎榆白皮煮汁服二升子母祕録身首生瘡榆白皮末油和塗之蟲當出楊氏産乳火灼爛瘡榆白皮嚼塗之千金髓五色丹毒俗名遊腫犯者多死不可輕視以榆白皮末雞子白和塗之千金小兒蟲瘡榆皮末和豬脂塗綿上覆之蟲出立瘥千金方癰疽發背榆根白皮切清水洗搗極爛和香油敷之留頭出氣燥則以苦茶頻潤不黏更換新者將愈以桑葉嚼爛隨大小貼之口合乃止神效救急方小兒瘰癧榆白皮生搗如泥封之頻易必效方小兒禿瘡醋和榆白皮末塗之蟲當出子母祕録葉氣味同上主治嫩葉作羹及炸食消水腫利小便下石淋壓丹石藏器時珍曰曝乾為末淡鹽水拌或炙或曬乾拌菜食之亦辛滑下水氣煎汁洗酒齇鼻同酸棗仁等分蜜丸日服治膽熱虛勞不眠時珍花主治小兒癇小便不利傷熱別録莢仁氣味微辛平無毒主治作糜羹食令人多睡弘景主婦人帶下和牛肉作羹食藏器子醬似蕪荑能助肺殺諸蟲下氣令人能食消心腹間惡氣猝心痛塗諸瘡癬以陳者良孟詵榆耳見木耳朗榆拾遺集解藏器曰朗榆生山中狀如榆其皮有滑汁秋生莢如大榆時珍曰大榆二月生莢朗榆八月生莢可分別皮氣味甘寒無毒主治下熱淋利水道令人睡藏器治小兒解顱時珍蕪荑本經中品釋名莁荑爾雅無姑本經𦽄䕋音殿唐木名楩音偏時珍曰按說文云楩山枌榆也有刺實為蕪荑爾雅云無姑其實荑又云莁荑蔱蘠則此物乃莁樹之荑故名也恭曰𦽄䕋乃蔱蘠二字之誤集解別録曰蕪荑生晉山川穀三月採實陰乾弘景曰今惟出高麗狀如榆莢氣臭如𤜢彼人皆以作醬食之性殺蟲置物中亦闢蛀但患其臭恭曰今延州同州者甚好志曰河東河西處處有之頌曰近道亦有之以太原者良大抵榆類而差小其實亦早成比榆乃大氣臭郭璞爾雅注云無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香所謂蕪荑也採實陰乾用今人又多取作屑以芼五味惟陳者良人收藏之多以鹽漬則失氣味但宜食品不堪入藥珣曰按廣州記云生大秦國是波斯蕪荑也藏器曰蕪荑氣膻者良乃山榆仁也時珍曰蕪荑有大小兩種小者即榆莢也揉取仁醞為醬味尤辛人多以外物相和不可不擇去之入藥皆用大蕪荑別有種氣味辛平無毒權曰苦平珣曰辛溫詵曰作醬甚香美功尤勝於榆仁可少食之過多發熱為辛故也秋月食之尤宜人主治五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食本經逐寸白散腸中嗢嗢喘息別録主積冷氣心腹症痛除肌膚節中風淫淫如蟲行甄權五臟皮膚肢節邪氣長食治五痔殺中惡蟲毒諸病不生孟詵治腸風痔瘻惡瘡疥癬大明殺蟲止痛治婦人子宮風虛孩子疳瀉冷痢得訶子豆蔻良李珣和豬膽搗塗熱瘡和蜜治濕癬和沙牛酪或馬酪治一切瘡孟詵附方舊三新七脾胃有蟲食即作痛面黃無色以石州蕪荑仁二兩和麵炒黃色為末非時米飲服二錢匕千金方制殺諸蟲生蕪荑生檳榔各四兩為末蒸餅丸梧子大每服二十丸白湯下本事方疳熱有蟲瘦悴久服充肥用榆仁一兩黃連一兩為末豬膽汁七枚和入碗內飯上蒸之一日蒸一次九蒸乃入麝香半錢湯浸蒸餅和丸緑豆大每服五七丸至一二十丸米飲下錢氏小兒直訣小兒蟲癇胃寒蟲上諸症危惡與癇相似用白蕪荑乾漆燒存性等分為末米飲調服一字至一錢杜壬方結陰下血蕪荑一兩搗爛紙壓去油為末以雄豬膽汁丸梧桐子大每服九丸甘草湯下日五服三日斷根普濟方脾胃氣泄久患不止蕪荑五兩搗末飯丸梧子大每日空心午飯前陳米飲下三十丸久服去三尸益神駐顏此方得之章鐐曾用得力王紹顏續傳信方膀胱氣急宜下氣用蕪荑搗和食鹽末等分以綿裹如棗大納下部或下惡汁並下氣佳外臺祕要嬰孩驚喑風后失音不能言肥兒丸用蕪荑炒神麯炒麥蘖炒黃連炒各一錢為末豬膽汁打糊丸黍米大每服十丸木通湯下黃連能去心竅惡血全幼心鑑蟲牙作痛以蕪荑仁安蛀孔中及縫中甚效危氏得效方腹中鱉瘕平時嗜酒血入於酒則為酒鱉平時多氣血凝於氣則為氣鱉虛勞痼冷敗血雜痰則為血鱉搖頭掉尾如蟲之行上侵人咽下蝕人肛或附脅背或隱胸腹大則如鱉小或如錢治法惟用蕪荑炒煎服之兼用暖胃益血理中之類乃可殺之若徒事雷丸錫灰之類無益也仁齊直指方蘇方木唐本草釋名蘇木時珍曰海島有蘇方國其地産此木故名今人省呼為蘇木爾集解恭曰蘇方木自南海崑崙來而交州愛州亦有之樹似庵羅葉若榆葉而無澀抽條長丈許花黃子生青熟黑其木人用染絳色珣曰按徐表南州記云生海畔葉似絳木若女貞時珍曰按嵇含南方草木狀云蘇方樹類槐黃花黑子出九真煎汁忌鐵器則色黯其木蠹之糞名曰紫納亦可用暹羅國人賤用如薪修治斆曰凡使去上粗皮並節若得中心紋橫如紫角者號曰木中尊其力倍常百等須細銼重搗拌細梅樹枝蒸之從巳至申陰乾用氣味甘咸平無毒杲曰甘咸涼可升可降陽中陰也好古曰味甘而微酸辛其性平主治破血産後血脹悶欲死者水煮五兩取濃汁服唐本婦人血氣心腹痛月候不調及蓐癆排膿止痛消癰腫撲損瘀血女人失音血噤赤白痢並後分急痛大明虛勞血癖氣壅滯産後惡露不安心腹攪痛及經絡不通男女中風口噤不語並宜細研乳頭香末方寸匕以酒煎蘇方木調服立吐惡物瘥海藥霍亂嘔逆及人常嘔吐用水煎服藏器破瘡瘍死血産後敗血李杲發明元素曰蘇木性涼味微辛發散表裡風氣宜與防風同用又能破死血産後血腫脹滿欲死者宜之時珍曰蘇方木乃三陰經血分藥少用則和血多用則破血附方舊一新五産後血暈蘇方木三兩水五升煎取二升分再服肘後方産後氣喘面黑欲死乃血入肺也用蘇木二兩水兩碗煮一碗入人參末一兩服隨時加減神效不可言胡氏方破傷風病蘇方木為散三錢酒服立效名獨聖散普濟方腳氣腫痛蘇方木鷺鷥藤等分細銼入澱粉少許水二斗煎一斗五升先熏後洗普濟方偏墜腫痛蘇方木二兩好酒一壺煮熟頻飲立好集簡方金瘡接指凡指斷及刀斧傷用真蘇木末敷之外以蠶繭包縛完固數日如故攝生方烏木綱目釋名烏樠木樠音漫烏文木時珍曰木名文木南人呼文如樠故也集解時珍曰烏木出海南雲南南番葉似棕櫚其木漆黑體重堅緻可為箸及器物有間道者嫩木也南人多以系木染色僞之南方草物狀云文木樹高七八丈其色正黑如水牛角作馬鞭日南有之古今注云烏文木出波斯舶上將來烏文𨶲然溫括婺等州亦出之皆此物也氣味甘咸平無毒主治解毒又主霍亂吐利取屑研末溫酒服時珍樺木宋開寶釋名𣛛藏器曰晉中書令王珉傷寒身驗方中作𣛛字時珍曰畫工以皮燒煙燻紙作古畫字故名𣛛俗省作樺字也集解藏器曰樺木似山桃皮堪為燭宗奭曰皮上有紫黑花勻者裹鞍弓鐙時珍曰樺木生遼東及臨洮河州西北諸地其木色黃有小斑點紅色能收肥膩其皮厚而輕虛軟柔皮匠家用襯靴里及為刀靶之類謂之暖皮胡人尤重之以皮卷蠟可作燭點木皮氣味苦平無毒主治諸黃疸濃煮汁飲之良開寶煮汁冷飲主傷寒時行熱毒瘡特良即今豌豆瘡也藏器燒灰合他藥治肺風毒宗奭治乳癰時珍附方舊一新四乳癰初發腫痛結硬欲破一服即瘥以北來真樺皮燒存性研無灰酒溫服方寸匕即臥覺即瘥也沈存中靈苑方乳癰腐爛靴內年久樺皮燒灰酒服一錢日一服唐瑤經驗肺風毒瘡遍身瘡疥如癘及癮疹瘙癢面上風刺婦人粉刺並用樺皮散主之樺皮燒灰四兩枳殼去穰燒四兩荊芥穗二兩炙甘草半兩各為末杏仁水煮過去皮尖二兩研泥爛研勻每服二錢食後溫酒調下瘡疥甚者日三服和劑方小便熱短樺皮濃煮汁飲集簡方染黑鬚發𣛛皮一片包側柏一枝燒煙燻香油碗內成煙以手抹在須鬢上即黑也多能鄙事脂主治燒之闢鬼邪藏器綟木拾遺釋名集解藏器曰生林澤山谷木文側戾故曰綟木氣味甘溫無毒主治風血羸瘦補腰腳益陽道宜浸酒飲藏器櫚木拾遺集解藏器曰出安南及南海用作床幾似紫檀而色赤性堅好時珍曰木性堅紫紅色亦有花紋者謂之花櫚木可作器皿扇骨諸物俗作花梨誤矣氣味辛溫無毒主治産後惡露衝心癥瘕結氣赤白漏下並銼煎服李珣破血塊冷嗽煮汁熱服為枕令人頭痛性熱故也藏器棕櫚宋嘉祐釋名栟櫚時珍曰皮中毛縷如馬之鬃䰕故名棕俗作棕䰕音閭鬣也栟音並集解頌曰棕櫚出嶺南西川今江南亦有之木高一二丈無枝條葉大而圓有如車輪萃於樹杪其下有皮重疊裹之每皮一匝為一節二旬一採皮轉復生上六七月生黃白花八九月結實作房如魚子黑色九月十月採其皮用山海經云石翠之山其木多棕是也藏器曰其皮作繩入土千歲不爛昔有人開冢得一索已生根嶺南有桄榔檳榔椰子冬葉虎散多羅等木葉皆與栟櫚相類時珍曰棕櫚川廣甚多今江南亦種之最難長初生葉如白芨葉高二三尺則木端數葉大如扇上聳四散歧裂其莖三稜四時不凋其干正直無枝近葉處有皮裹之每長一層即為一節干身赤黑皆筋絡宜為鍾杵亦可旋為器物其皮有絲毛錯縱如織剝取縷解可織衣帽褥椅之屬大為時利每歲必兩三剝之否則樹死或不長也三月於木端莖中出數黃苞苞中有細子成列乃花之孕也狀如魚腹孕子謂之棕魚亦曰棕筍漸長出苞則成花穗黃白色結實纍纍大如豆生黃熟黑甚堅實或云南方此木有兩種一種有皮絲可作繩一種小而無絲惟葉可作帚鄭樵通志以為王彗者非也王彗乃落帚之名即地膚子別有蒲葵葉與此相似而柔薄可為扇笠許慎說文以為棕櫚亦誤矣筍及子花氣味苦澀平無毒藏器曰有小毒戟人喉未可輕服珣曰溫有大毒不堪食時珍曰棕魚皆言有毒不可食而廣蜀人蜜煮醋浸以供佛寄遠蘇東坡亦有食棕筍詩乃制去其毒爾主治澀腸止瀉痢腸風崩中帶下及養血藏器附方新一大腸下血棕筍煮熟切片曬乾為末蜜湯或酒服一二錢集簡方皮氣味同子主治止鼻衄吐血破症治腸風赤白痢崩中帶下燒存性用大明主金瘡疥癬生肌止血李珣發明宗奭曰棕皮燒黑治婦人血露及吐血須佐以他藥時珍曰棕灰性澀若失血去多瘀滯已盡者用之切當所謂澀可去脫也與亂髮同用更良年久敗棕入藥尤妙附方新六鼻血不止棕櫚灰隨左右吹之黎居士方血崩不止棕櫚皮燒存性空心淡酒服三錢一方加煅白礬等分婦人良方血淋不止棕櫚皮半燒半炒為末每服二錢甚效衛生家寶方下血不止棕櫚皮半斤栝蔞一個燒灰每服二錢米飲調下百一選方水穀痢下棕櫚皮燒研水服方寸匕近效方小便不通棕皮毛燒存性以水酒服二錢即通利纍試甚驗攝生方橉木橉良刃切拾遺釋名橝木音潭集解藏器曰橉木生江南深山大樹樹有數種取葉厚大白花者入藥自余灰入染家用時珍曰此木最硬梓人謂之橉筋木是也木入染絳用葉亦可釀酒木灰氣味甘溫小毒主治猝心腹癥瘕堅滿痃癖淋汁八升釀米一斗待酒熟每溫飲半合漸增至一二盞即愈藏器出肘後柯樹拾遺釋名木奴集解珣曰按廣志云生廣南山谷波斯家用木為船舫者也白皮氣味辛平有小毒主治大腹水病採皮煮汁去滓煎令可丸如梧桐子大平旦空心飲下三丸須臾又一丸氣水並從小便出也藏器烏桕木唐本草釋名鴉臼時珍曰烏桕烏喜食其子因以名之陸龜蒙詩云行歇每依鴉舅影挑頻時見鼠姑心是矣鼠姑牡丹也或云其木老則根下黑爛成臼故得此名鄭樵通志言烏桕即櫃柳者非集解恭曰生山南平澤樹高數仞葉似梨杏五月開細花黃白色子黑色藏器曰葉可染皂子可壓油燃燈極明宗奭曰葉如小杏葉但微薄而緑色差淡子八九月熟初青後黑分為三瓣時珍曰南方平澤甚多今江西人種植採子蒸煮取脂澆燭貨之子上皮脂勝於仁也根白皮氣味苦微溫有毒大明曰性涼慢火炙乾黃乃用主治暴水癥結積聚唐本療頭風通大小便大明解蛇毒震亨發明時珍曰烏桕根性沉而降陰中之陰利水通腸功勝大戟一野人病腫滿氣壯令掘此根搗爛水煎服一碗連行數行而病平氣虛人不可用之此方出太平聖惠方言其功神聖但不可多服爾誠然附方舊一新九小便不通烏桕根皮煎湯飲之肘後方大便不通烏桕木根方長一寸劈破水煎半盞服之立通不用多吃其功神聖兼能取水斗門方二便關格二三日則殺人烏桕東南根白皮干為末熱水服二錢先以芒硝二兩煎湯服取吐甚效肘後方水氣虛腫小便澀烏桕皮二兩檳榔木通各一兩為末每服二錢米飲下聖惠方腳氣濕瘡極癢有蟲烏桕根為末敷之少時有涎出良摘玄方尸注中惡心腹痛刺沉默錯亂用烏桕根皮煎濃汁一合調硃砂末一錢服之肘後方無硃砂永類方暗疔昏狂瘡頭凸紅桕樹根經行路者取二尺許去皮搗爛井華水調一盞服待瀉過以三角銀杏仁浸油搗盦患處聖濟總録嬰兒胎毒滿頭用水邊烏桕樹根曬研入雄黃末少許生油調搽經驗良方鼠莽砒毒烏桕根半兩擂水服之醫方大成鹽齁痰喘桕樹皮去粗搗汁和飛面作餅烙熟早晨與兒吃三四個待吐下鹽涎乃佳如不行熱茶催之摘玄方葉氣味同根主治食牛馬六畜肉生疔腫欲死者搗自然汁一二碗頓服得大利去毒即愈未利再服冬用根時珍桕油氣味甘涼無毒主治塗頭變白為黑服一合令人下利去陰下水氣炒子作湯亦可藏器塗一切腫毒瘡疥時珍附方新二膿疱疥瘡桕油二兩水銀二錢樟腦五錢同研頻入唾津不見星乃止以溫湯洗淨瘡以藥填入唐瑤經驗方小兒蟲瘡用舊絹作衣化桕油塗之與兒穿著次日蟲皆出油上取下爁之有聲是也別以油衣與穿以蟲盡為度瀕湖集簡方巴豆本經下品釋名巴菽本經剛子炮炙老陽子時珍曰此物出巴蜀而形如菽豆故以名之宋本草一名巴椒乃菽字傳訛也雷斆炮炙論又分緊小色黃者為巴有三稜色黑者為豆小而兩頭尖者為剛子云巴與豆可用剛子不可用殺人其說殊乖蓋緊小者是雌有稜及兩頭尖者是雄雄者峻利雌者稍緩也用之得宜皆有功力用之失宜參術亦能為害況巴豆乎集解別録曰巴豆生巴郡川穀八月採陰乾用之去心皮頌曰今嘉州眉州戎州皆有之木高一二丈葉如櫻桃而厚大初生青色後漸黃赤至十二月葉漸凋二月復漸生四月舊葉落盡新葉齊生即花發成穗微黃色五六月結實作房生青至八月熟而黃類白豆蔻漸漸自落乃收之一房有三瓣一瓣一子共三子子仍有殼用之去殼戎州出者殼上有縱紋隱起如線一道至兩三道彼土人呼為金線巴豆最為上等他處亦稀有時珍曰巴豆房似大風子殼而脆薄子及仁皆似海松子所云似白豆蔻者殊不類修治弘景曰巴豆最能瀉人新者佳用之去心皮熬令黃黑搗如膏乃和丸散斆曰凡用巴與豆敲碎以麻油並酒等煮乾研膏用每一兩用油酒各七合大明曰凡入丸散炒用不如去心膜換水煮五度各一沸也時珍曰巴豆有用仁者用殼者用油者有生用者麩炒者醋煮者燒存性者有研爛以紙包壓去油者謂之巴豆霜氣味辛溫有毒別録曰生溫熟寒有大毒普曰神農岐伯桐君辛有毒黃帝甘有毒李當之熱元素曰性熱味苦氣薄味厚體重而沉降陰也杲曰性熱味辛有大毒浮也陽中陽也時珍曰巴豆氣熱味辛生猛熟緩能吐能下能止能行是可升可降藥也別録言其熟則性寒張氏言其降李氏言其浮皆泥於一偏矣蓋此物不去膜則傷胃不去心則作嘔以沉香水浸則能升能降與大黃同用瀉入反緩為其性相畏也王充論衡云萬物含太陽火氣而生者皆有毒故巴豆辛熱有毒之才曰芫花為之使畏大黃黃連蘆筍菰筍藜蘆醬豉冷水得火良惡蘘草與牽牛相反中其毒者用冷水黃連汁大豆汁解之主治傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹蕩練五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚本經療女子月閉爛胎金瘡膿血不利丈夫陰殺斑蝥蛇虺毒可煉餌之益血脈令人色好變化與鬼神通別録治十種水腫痿痹落胎藥性通宣一切病泄壅滯除風補勞健脾開胃消痰破血排膿消腫毒殺腹臟蟲治惡瘡息肉及疥癩疔腫日華導氣消積去臟腑停寒治生冷硬物所傷元素治瀉痢驚癇心腹痛疝氣風喎耳聾喉痹牙痛通利關竅時珍發明元素曰巴豆乃斬關奪門之將不可輕用震亨曰巴豆去胃中寒積無寒積者勿用元素曰世以巴豆熱藥治酒病膈氣以其辛熱能開腸胃鬱結也但鬱結雖開而亡血液損其真陰從正曰傷寒風濕小兒瘡痘婦人産後用之下膈不死亦危奈何庸人畏大黃而不畏巴豆以其性熱而劑小耳豈知以蠟匱之猶能下後使人津液枯竭胸熱口燥耗卻天真留毒不去他病轉生故下藥宜以為禁藏器曰巴豆主症癖痃氣痞滿積聚冷氣血塊宿食不消痰飲吐水取青黑大者每日空腹服一枚去殼勿令白膜破乃作兩片並四邊不得有損缺吞之以飲壓令下少頃腹內熱如火利出惡物雖利而不虛若久服亦不利白膜破者不用好古曰若急治為水穀道路之劑去皮心膜油生用若緩治為消堅磨積之劑炒去煙令紫黑用可以通腸可以止瀉世所不知也張仲景治百病客忤備急丸用之時珍曰巴豆峻用則有戡亂劫病之功微用亦有撫緩調中之妙譬之蕭曹絳灌乃勇猛武夫而用之為相亦能輔治太平王海藏言其可以通腸可以止瀉此發千古之祕也一老婦年六十餘病溏泄已五年肉食油物生冷犯之即作痛服調脾升提止澀諸藥入腹則泄反甚延余診之脈沉而滑此乃脾胃久傷冷積凝滯所致王太僕所謂大寒凝內久利溏泄愈而復發綿歷歲年者法當以熱下之則寒去利止遂用蠟匱巴豆丸藥五十丸與服二日大便不通亦不利其泄遂愈自是每用治泄痢積滯諸病皆不瀉而病愈者近百人妙在配合得宜藥病相對耳苟用所不當用則犯輕用損陰之戒矣正誤弘景曰道家亦有煉餌法服之云可神仙人吞一枚便死而鼠食之三年重三十斤物性乃有相耐如此時珍曰漢時方士言巴豆煉餌令人色好神仙名醫別録採入本草張華博物志言鼠食巴豆重三十斤一謬一誣陶氏信為實語誤矣又言人吞一枚即死亦近過情今並正之附方舊十三新二十六一切積滯巴豆一兩蛤粉二兩黃柏三兩為末水丸緑豆大每水下五丸醫學切問寒澼宿食久飲不消大便閉塞巴豆仁一升清酒五升煮三日三夜研熟合酒微火煎令可丸如豌豆大每服一丸水下欲吐者二丸千金方水蠱大腹動搖水聲皮膚色黑巴豆九十枚去心皮熬黃杏仁六十枚去皮尖熬黃搗丸小豆大水下一丸以利為度勿飲酒張文仲備急方飛尸鬼擊中惡心痛腹脹大便不通走馬湯用巴豆二枚去皮心熬黃杏仁二枚以綿包椎碎熱湯一合捻取白汁服之當下而愈量老小用之外臺食瘧積瘧巴豆去皮心二錢皂莢去皮子六錢搗丸緑豆大一服一丸冷湯下肘後方積滯泄痢腹痛裡急杏仁去皮尖巴豆去皮心各四十九個同燒存性研泥熔蠟和丸緑豆大每服二三丸煎大黃湯下間日一服一加百草霜三錢劉守真宣明方氣痢赤白巴豆一兩去皮心熬研以熟豬肝丸緑豆大空心米飲下三四丸量人用此乃鄭獬侍御所傳方也經驗方瀉血不止巴豆一個去皮以雞子開一孔納入紙封煨熟去豆食之其病即止虛人分作二服決效普濟方小兒下痢赤白用巴豆煨熟去油一錢百草霜二錢研末飛羅面煮糊丸黍米大量人用之赤用甘草湯白用米湯赤白用薑湯下全幼心鑑夏月水瀉不止巴豆一粒針頭燒存性化蠟和作一丸倒流水下危氏得效方小兒吐瀉巴豆一個針穿燈上燒過黃蠟一豆大燈上燒滴入水中同杵丸黍米大每用五七丸蓮子燈心湯下同上伏暑霍亂傷冷吐利煩渴水浸丹用巴豆二十五個去皮心及油黃丹炒研一兩二錢半化黃蠟和丸緑豆大每服五七丸水浸少頃別以新汲水吞下和劑方乾霍亂病心腹脹痛不吐不利欲死巴豆一枚去皮心熱水研服得吐利即定也二便不通巴豆連油黃連各半兩搗作餅子先滴蔥鹽汁在臍內安餅於上灸二七壯取利為度楊氏家藏寒痰氣喘青橘皮一片展開入剛子一個麻扎定火上燒存性研末薑汁和酒一鍾呷服天台李翰林用此治莫秀才到口便止神方也張杲醫說風濕痰病人坐密室中左用滾水一盆右用炭火一盆前置一桌書一冊先將無油新巴豆四十九粒研如泥紙壓去油分作三餅如病在左令病人將右手仰置書上安藥於掌心以碗安藥上傾熱水入碗內水涼即換良久汗出立見神效病在右安左掌心一云隨左右安之保壽堂經驗方陰毒傷寒心結按之極痛大小便閉但出氣稍暖者急取巴豆十粒研入面一錢捻作餅安臍內以小艾炷灸五壯氣達即通此太師陳北山方也仁齊直指方解中藥毒巴豆去皮不去油馬牙硝等分研丸冷水服一彈丸初虞世方喉痹垂死只有餘氣者巴豆去皮線穿內入喉中牽出即蘇千金纏喉風痹巴豆兩粒紙卷作角切斷兩頭以針穿作孔子入鼻中氣透即通勝金方傷寒舌出巴豆一粒去油取霜以紙捻卷內入鼻中舌即收上普濟方舌上出血如簪孔巴豆一枚亂髮雞子大燒研酒服聖惠中風口喎巴豆七枚去皮研左喎塗右手心右喎塗左手心仍以暖水一盞安藥上須臾即正洗去聖惠方小兒口瘡不能食乳剛子一枚連油研入黃丹少許剃去囟上發貼之四邊起粟泡便用溫水洗去乃以菖蒲湯再洗即不成瘡神效瑞竹堂方風蟲牙痛聖惠用巴豆一粒煨黃去殼蒜一瓣切一頭剜去中心入豆在內蓋定綿裹隨左右塞耳中經驗方用巴豆一粒研綿裹咬之又方針刺巴豆燈上燒令煙出熏痛處三五次神效天絲入咽凡露地飲食有飛絲入上食之令人咽喉生瘡急以白礬巴豆燒灰吹入即愈瑣碎録耳猝聾閉巴豆一粒蠟裹針刺孔通氣塞之取效經驗風瘙隱疹心下迷悶巴豆五十粒去心皮水七升煮三升以帛染拭之隨手愈千金翼疥瘡搔癢巴豆十粒炮黃去皮心右順手研入酥少許膩粉少許抓破點上不得近目並外腎上如熏目著腎則以黃丹塗之甚妙十全方荷錢癬瘡巴豆仁三個連油杵泥以生絹包擦日一二次三日痊好碑以正經驗方一切惡瘡巴豆三十粒麻油煎黑去豆以油調硫黃輕粉末頻塗取效普濟癰疽惡肉烏金膏解一切瘡毒及腐化瘀肉最能推陳致新巴豆仁炒焦研膏點痛處則解毒塗瘀肉上則自化加乳香少許亦可若毒深不能收斂者宜作捻紝之不致成瘡外科理例疣痣黑子巴豆一錢石灰炒過人言一錢糯米五分炒研點之怪症方箭鏃入肉不可拔出者用新巴豆仁略熬與蜣螂同研塗之斯須痛定微癢忍之待極癢不可忍便撼拔動之取出速以生肌膏敷之而痊亦治瘡腫夏侯鄲在潤州得此方後至洪州旅舍主人妻病背瘡呻吟不已鄲用此方試之即痛止也經驗方小兒痰喘巴豆一粒杵爛綿裹塞鼻男左女右痰即自下龔氏醫鑑牛疫動頭巴豆二粒研生麻油三兩漿水半升和灌之賈相公牛經油主治中風痰厥氣厥中惡喉痹一切急病咽喉不通牙關緊閉以研爛巴豆綿紙包壓取油作捻點燈吹滅熏鼻中或用熱煙刺入喉內即時出涎或惡血便蘇又舌上無故出血以熏舌之上下自止時珍殼主治消積滯治瀉痢時珍附方新二一切瀉痢脈浮洪者多日難已脈微小者服之立止名勝金膏巴豆皮楮葉同燒存性研化蠟丸緑豆大每甘草湯下五丸劉河間宣明方痢頻脫肛黑色堅硬用巴豆殼燒灰芭蕉自然汁煮入朴硝少許洗軟用真麻油點火滴於上以枯礬龍骨少許為末摻肛頭上以芭蕉葉托入危氏得效方樹根主治癰疽發背腦疽鬢疽大患掘取洗搗敷患處留頭妙不可言收根陰乾臨時水搗亦可時珍出楊誠經驗方大風子補遺釋名時珍曰能治大風疾故名集解時珍曰大風子今海南諸國皆有之按周達觀真臘記云大風乃大樹之子狀如椰子而圓其中有核數十枚大如雷丸子中有仁白色久則黃而油不堪入藥仁修治時珍曰取大風子油法用子三斤去殼及黃油者研極爛瓷器盛之封口入滾湯中蓋鍋密封勿令透氣文武火煎至黑色如膏名大風油可以和藥氣味辛熱有毒主治風癬疥癩楊梅諸瘡攻毒殺蟲時珍發明震亨曰粗工治大風病佐以大風油殊不知此物性熱有燥痰之功而傷血至有病將愈而先失明者時珍曰大風油治瘡有殺蟲劫毒之功蓋不可多服用之外塗其功不可沒也附方新五大風諸癩大風子油一兩苦參末三兩入少酒糊丸梧桐子大每服五十丸空心溫酒下仍以苦參湯洗之普濟方大風瘡裂大風子燒存性和麻油輕粉研塗仍以殼煎湯洗之嶺南衛生方楊梅惡瘡方同上風刺赤鼻大風子仁木鱉子仁輕粉硫黃為末夜夜唾調塗之手背皴裂大風子搗泥塗之壽域海紅豆海藥釋名集解珣曰按徐表南州記云生南海人家園圃中大樹而生葉圓有莢近時蜀中種之亦成時珍曰樹高二三丈葉似梨葉而圓按宋祁益部方物圖云紅豆葉如冬青而圓澤春開花白色結莢枝間其子纍纍如綴珠若大紅豆而扁皮紅肉白以似得名蜀人用為果飣豆氣味微寒有小毒主治人黑皮䵟𪒟花癬頭面遊風宜入面藥及澡豆李珣相思子綱目釋名紅豆時珍曰按古今詩話云相思子圓而紅故老言昔有人歿於邊其妻思之哭於樹下而卒因以名之此與韓憑冢上相思樹不同彼乃連理梓木也或云即海紅豆之類未審的否集解時珍曰相思子生嶺南樹高丈餘白色其葉似槐其花似皂莢其莢似扁豆其子大如小豆半截紅色半截黑色彼人以嵌首飾段公路北戶録言有蔓生用子收龍腦香相宜令香不耗也氣味苦平有小毒吐人主治通九竅去心腹邪氣止熱悶頭痛風痰瘴瘧殺腹臟及皮膚內一切蟲除蠱毒取二七枚研服即當吐出時珍附方新三瘴瘧寒熱相思子十四枚水研服取吐立瘥千金貓鬼野道眼見貓鬼及耳有所聞用相思子萆麻子巴豆各一枚硃砂末蠟各四銖合搗丸如麻子大含之即以灰圍患人面前著一斗灰火吐藥入火中沸即畫十字於火上其貓鬼者死也千金方解中蠱毒必效方用未鑽相思子十四枚杵碎為末溫水半盞和服欲吐抑之勿吐少頃當大吐輕者但服七枚非常神效外臺祕要豬腰子綱目集解時珍曰豬腰子生柳州蔓生結莢內子大若豬之內腎狀酷似之長三四寸色紫而肉堅彼人以充土宜饋送中土氣味甘微辛無毒主治一切瘡毒及毒箭傷研細酒服一二錢並塗之時珍石瓜綱目集解時珍曰石瓜出四川峨眉山中及芒部地方其樹修干樹端挺葉肥滑如冬青狀似桑其花淺黃色結實如綴長而不圓殼裂則子見其形似瓜其堅如石煮液黃色氣味苦平微毒主治心痛煎汁洗風痹時珍
