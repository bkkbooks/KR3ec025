body:
  text: 木部第三十七卷木之四寓木類一十二種茯苓本經上品釋名伏靈綱目伏菟本經松腴不死麵記事珠抱根者名伏神別録宗奭曰多年樵斫之松根之氣味抑鬱未絶精英未淪其精氣盛者發泄於外結為茯苓故不抱根離其本體有零之義也津氣不盛只能附結本根既不離本故曰伏神時珍曰茯苓史記龜策傳作伏靈蓋松之神靈之氣伏結而成故謂之伏靈伏神也仙經言伏靈大如拳者佩之令百鬼消滅則神靈之氣亦可徵矣俗作苓者傳寫之訛爾下有伏靈上有菟絲故又名伏兔或云其形如兔故名亦通集解別録曰茯苓茯神生太山山谷大松下二月八月採陰乾弘景曰今出郁州大者如三四升器外皮黑而細皺內堅白形如鳥獸龜鱉者良虛赤者不佳性無朽蛀埋地中三十年猶色理無異也恭曰今泰山亦有茯苓白實而塊小不復採用第一齣華山形極粗大雍州南山亦有不如華山保升曰所在大松處皆有惟華山最多生枯松樹下形塊無定以似龜鳥形者為佳禹錫曰範子計然言茯苓出嵩山及三輔淮南子言千年之松下有茯苓上有菟絲典術言松脂入地千歲為茯苓望松樹赤者下有之廣志言茯神乃松汁所作勝於茯苓或云即茯苓貫著松根者生朱提濮陽縣頌曰今太華嵩山皆有之出大松下附根而生無苗葉花實作塊如拳在土底大者至數斤有赤白二種或云松脂變成或云假鬆氣而生今東人見山中古松久為人斬伐其枯折槎枿枝葉不復上生者謂之茯苓撥即於四面丈餘地內以鐵頭錐刺地如有茯苓則錐固不可拔乃掘取之其撥大者茯苓亦大皆自作塊不附著根其包根而輕虛者為茯神則假氣生者其說勝矣龜策傳云茯苓在菟絲之下狀如飛鳥之形新雨已霽天靜無風以火夜燒菟絲去之即篝燭此地罩之火滅即記其處明乃掘取入地四尺或七尺得矣此類今不聞有之宗奭曰上有菟絲之說甚為輕信時珍曰下有茯苓則上有靈氣如絲之狀山人亦時見之非菟絲子之菟絲也注淮南子者以菟絲子及女蘿為說誤矣茯苓有大如斗者有堅如石者絶勝其輕虛者不佳蓋年淺未堅故爾劉宋王微茯苓贊云皓苓下居彤絲上薈中狀雞鳧其容龜蔡神侔少司保延幼艾終志不移柔紅可佩觀此彤絲即菟絲之證矣寇氏未解此義修治斆曰凡用去皮心搗細於水盆中攪濁浮者濾去之此是茯苓赤筋若誤服餌令人瞳子並黑睛點小兼盲目弘景曰作丸散者先煮二三沸乃切曝乾用氣味甘平無毒元素曰性溫味甘而淡氣味俱薄浮而升陽也之才曰馬間為之使得甘草防風芍藥紫石英麥門冬共療五臟惡白蘞畏牡蒙地榆雄黃秦艽龜甲忌米醋及酸物弘景曰藥無馬間或是馬莖也恭曰李氏本草馬刀為茯苓使間字草書似刀字傳訛爾志曰二注恐皆非也當是馬藺字主治胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便久服安魂養神不飢延年本經止消渴好睡大腹淋瀝膈中痰水水腫淋結開胸腑調臟氣伐腎邪長陰益氣力保神守中別録開胃止嘔逆善安心神主肺痿痰壅心腹脹滿小兒驚癇女人熱淋甄權補五勞七傷開心益志止健忘暖腰膝安胎大明止渴利小便除濕益燥和中益氣利腰臍間血元素逐水緩脾生津導氣平火止泄除虛熱開腠理李杲瀉膀胱益脾胃治腎積奔豚好古赤茯苓主治破結氣甄權瀉心小腸膀胱濕熱利竅行水時珍茯苓皮主治水腫膚脹開水道開腠理時珍發明弘景曰茯苓白色者補赤色者利俗用甚多仙方服食亦為至要云其通神而致靈和魂而煉魄利竅而益肌厚腸而開心調營而理衛上品仙藥也善能斷谷不飢宗奭曰茯苓行水之功多益心脾不可缺也元素曰茯苓赤瀉白補上古無此說氣味俱薄性浮而升其用有五利小便也開腠理也生津液也除虛熱也止瀉也如小便利或數者多服則損人目汗多人服之亦損元氣夭人壽為其淡而滲也又云淡為天之陽陽當上行何以利水而瀉下氣薄者陽中之陰所以茯苓利水瀉下不離陽之體故入手太陽杲曰白者入壬癸赤者入丙丁味甘而淡降也陽中陰也其用有六利竅而除濕益氣而和中治驚悸生津液小便多者能止小便結者能通又云濕淫所勝小便不利淡以利竅甘以助陽甘平能益脾逐水乃除濕之聖藥也好古曰白者入手太陰足太陽少陽經氣分赤者入足太陰手少陰太陽氣分伐腎邪小便多能止之小便澀能利之與車前子相似雖利小便而不走氣酒浸與光明硃砂同用能祕真元味甘而平如何是利小便耶震亨曰茯苓得松之餘氣而成屬金仲景利小便多用之此暴新病之要藥也若陰虛者恐未為宜此物有行水之功久服損人八味丸用之者亦不過接引他藥歸就腎經去胞中久陳積垢為搬運之功爾時珍曰茯苓本草又言利小便伐腎邪至李東垣王海藏乃言小便多者能止澀者能通同硃砂能祕真元而朱丹溪又言陰虛者不宜用義似相反何哉茯苓氣味淡而滲其性上行生津液開腠理滋水之源而下降利小便故張潔古謂其屬陽浮而升言其性也東垣謂其為陽中之陰降而下言其功也素問云飲食入胃遊溢精氣上輸於肺通調水道下輸膀胱觀此則知淡滲之藥俱皆上行而後下降非直下行也小便多其源亦異素問云肺氣盛則小便數而缺虛則缺㰦小便遺數心虛則少氣遺溺下焦虛則遺溺胞移熱於膀胱則遺溺膀胱不利為癃不約為遺溺厥陰病則遺溺閉癃所謂肺氣盛者實熱也其人必氣壯脈強宜用茯苓甘淡以滲其熱故曰小便多者能止也若夫肺虛心虛胞熱厥陰病者皆虛熱也其人必上熱下寒脈虛而弱法當用升陽之藥以升水降火膀胱不約下焦虛者乃火投於水水泉不藏脫陽之症其人必肢冷脈遲法當用溫熱之藥峻補其下交濟坎離二症皆非茯苓輩淡滲之藥所可治故曰陰虛者不宜用也仙家雖有服食之法亦當因人而用焉茯神氣味甘平無毒主治闢不祥療風眩風虛五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神別録補勞乏主心下急痛堅滿人虛而小腸不利者加而用之甄權神木即伏神心內木也又名黃松節主治偏風口面喎斜毒風筋攣不語心神驚掣虛而健忘甄權治腳氣痹痛諸筋牽縮時珍發明弘景曰仙方只雲茯苓而無茯神為療既同用應無嫌時珍曰神農本草只言茯苓名醫別録始添茯神而主治皆同後人治心病必用茯神故潔古張氏云風眩心虛非茯神不能除然茯苓亦未嘗不治心病也陶弘景始言茯苓赤瀉白補李杲復分赤入丙丁白入壬癸此其發前人之祕者時珍則謂茯苓茯神只當云赤入血分白入氣分各從其類如牡丹芍藥之義不當以丙丁壬癸分也若以丙丁壬癸分則白茯神不能治心病赤茯苓不能入膀胱矣張元素不分赤白之說於理缺通聖濟録松節散用茯神心中木一兩乳香一錢石器炒研為末每服二錢木瓜酒下治風寒冷濕搏於筋骨足筋攣痛行步艱難但是諸筋攣縮疼痛並主之附方舊六新二十服茯苓法頌曰集仙方多單餌茯苓其法取白茯苓五斤去黑皮搗篩以熟絹囊盛於二鬥米下蒸之米熟即止曝乾又蒸如此三遍乃取牛乳二斗和合著銅器中微火煮如膏收之每食以竹刀割隨性飽食辟穀不飢也如欲食谷先煮葵汁飲之又茯苓酥法白茯苓三十斤山之陽者甘美山之陰者味苦去皮薄切曝乾蒸之以湯淋去苦味淋之不止其汁當甜乃曝乾篩末用酒三石蜜三升相和置大甕中攪之百匝密封勿泄氣冬五十日夏二十五日酥自浮出酒上掠取其味極甘美作掌大塊空室中陰乾色赤如棗飢時食一枚酒送之終日不食名神仙度世之法又服食法以茯苓合白菊花或合桂心或合術為散丸自任皆可常服補益殊勝儒門事親方用茯苓四兩頭白麵二兩水調作餅以黃蠟三兩煎熟飽食一頓便絶食辟穀至三日覺難受以後氣力漸生也經驗後方服法用華山挺子茯苓削如棗大方塊安新甕內好酒浸之紙封三重百日乃開其色當如餳糖可日食一塊至百日肌體潤澤一年可夜視物久久腸化為筋延年耐老面若童顏嵩高記用茯苓松脂各二斤淳酒浸之和以白蜜日三服之久久通靈又法白茯苓去皮酒浸十五日漉出為散每服三錢水調下日三服孫真人枕中記云茯苓久服百日病除二百日晝夜不眠二年役使鬼神四年後玉女來侍葛洪抱朴子云任子季服茯苓十八年玉女從之能隱能彰不食谷灸瘢滅面體玉澤又黃初起服茯苓五萬日能坐在立亡日中無影交感丸方見草部莎根下吳仙丹方見果部吳茱萸下胸脅氣逆脹滿茯苓一兩人參半兩每服三錢水煎服日三聖濟總録養心安神朱雀丸治心神不定恍惚健忘不樂火不下降水不上升時復振跳常服消陰養火全心氣茯神二兩去皮沉香半兩為末煉蜜丸小豆大每服三十丸食後人參湯下百一選方血虛心汗別處無汗獨心孔有汗思慮多則汗亦多宜養心血以艾湯調茯苓末日服一錢證治要訣心虛夢泄或白濁白茯苓末二錢米湯調下日二服蘇東坡方也直指方虛滑遺精白茯苓二兩縮砂仁一兩為末入鹽二錢精羊肉批片摻藥炙食以酒送下普濟方漏精白濁方見菜部薯蕷下濁遺帶下威喜丸治丈夫元陽虛憊精氣不固小便下濁餘瀝常流夢寐多驚頻頻遺泄婦人白淫白帶並治之白茯苓去皮四兩作匱以豬苓四錢半入內煮二十餘沸取出曬乾擇去豬苓為末化黃蠟搜和丸彈子大每嚼一丸空心津下以小便清為度忌米醋李時珍曰抱朴子言茯苓千萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光燒之不焦帶之闢兵服之長生和劑局方威喜丸之名蓋取諸此小便頻多白茯苓去皮乾山藥去皮以白礬水瀹過焙等分為末每米飲服二錢儒門事親方小便不禁茯苓丸治心腎俱虛神志不守小便不禁用白茯苓赤茯苓等分為末以新汲水挼洗去筋控干以酒煮地黃汁搗膏搜和丸彈子大每嚼一丸空心鹽酒下三因方小便淋濁由心腎氣虛神志不守小便淋瀝或夢遺白濁赤白茯苓等分為末新汲水飛去沫控干以地黃汁同搗酒熬作膏和丸彈子大空心鹽湯嚼下一丸三因方下虛消渴上盛下虛心火炎爍腎水枯涸不能交濟而成渴症白茯苓一斤黃連一斤為末熬天花粉作糊丸梧桐子大每溫湯下五十丸德生堂經驗方下部諸疾龍液膏用堅實白茯苓去皮焙研取清溪流水浸去筋膜復焙入瓷罐內以好蜜和勻入銅釜內重湯桑柴灰煮一日取出收之每空心白湯下二三匙解煩郁燥渴一切下部疾皆可除積善堂方飧泄滑痢不止白茯苓一兩木香煨半兩為末紫蘇木瓜湯下二錢百一選方妊娠水腫小便不利惡寒赤茯苓去皮葵子各半兩為末每服二錢新汲水下禹講師方猝然耳聾黃蠟不拘多少和茯苓末細嚼茶湯下普濟方面䵟雀斑白茯苓末蜜和夜夜敷之二七日愈姚僧坦集驗方豬雞骨哽五月五日取楮子曬乾白茯苓等分為末每服二錢乳香湯下一方不用楮子以所哽骨煎湯下經驗良方痔漏神方赤白茯苓去皮沒藥各二兩破故紙四兩石臼搗成一塊春秋酒浸三日夏二日冬五日取出木籠蒸熟曬乾為末酒糊丸梧桐子大每酒服二十丸漸加至五十丸董炳集驗方血餘怪病手十指節斷壞惟有筋連無節肉蟲出如燈心長數尺遍身緑毛卷名曰血餘以茯苓胡黃連煎湯飲之愈夏子益奇疾方水腫尿澀茯苓皮椒目等分煎湯日飲取效普濟方琥珀別録上品釋名江珠時珍曰虎死則精魄入地化為石此物狀似之故謂之虎魄俗文從玉以其類玉也梵書謂之阿濕摩揭婆集解別録曰琥珀生永昌弘景曰舊說松脂淪入地千年所化今燒之亦作鬆氣亦有中有一蜂形色如生者博物志乃云燒蜂巢所作恐非實也此或蜂為松脂所沾因墜地淪沒爾亦有煮毈雞子及青魚枕作者並非真惟以手心摩熱拾芥為真今並從外國來而出茯苓處並無不知出琥珀處復有茯苓否也珣曰琥珀是海松木中津液初若桃膠後乃凝結復有南珀不及舶上來者保升曰楓脂入地千年變為琥柏不獨松脂變也大抵木脂入地千年皆化但不及楓松有脂而多經年歲爾蜂巢既燒安有蜂形尚在其間宗奭曰今西戎亦有其色差淡而明徹南方者色深而重濁彼土人多碾為物形若謂千年茯苓所化則其沾著蜂蟻宛然具在極不然也地理志云海南林邑多出琥珀松脂淪入地所化有琥珀則旁無草木入土淺者五尺深者八九尺大者如斛削去皮乃成此說為勝但土地有所宜不宜故有能化不化燒蜂之說不知何據承曰諸家所說茯苓琥珀雖有小異同皆云松脂所化但茯苓茯神乃大松摧折或斫伐而根瘢不朽津液下流而結成故治心腎通津液也若琥珀乃是松樹枝節榮盛時為炎日所灼流脂出樹身外日漸厚大因墮土中津潤歲久為土所滲泄而光瑩之體獨存今可拾芥尚有黏性故其蟲蟻之類乃未入土時所黏者二物皆自松出而所稟各異茯苓生於陰而成於陽琥珀生於陽而成於陰故皆治營安心而利水也斆曰凡用須分紅松脂石珀水珀花珀物象珀醫珀琥珀其紅松脂如琥珀只是濁大脆紋橫水珀多無紅色如淺黃多皺紋石珀如石重色黃不堪用花珀紋似新馬尾松心紋一路赤一路黃物象珀其內自有物命入用神妙醫珀是衆珀之長琥珀如血色以布拭熱吸得芥子者真也時珍曰琥珀拾芥乃草芥即禾草也雷氏言拾芥子誤矣唐書載西域康干河松木入水一二年化為石正與松楓諸木沉入土化珀同一理也今金齒麗江亦有之其茯苓千年化琥珀之說亦誤傳也按曹昭格古論云琥珀出西番南番乃楓木津液多年所化色黃而明瑩者名蠟珀色若松香紅而且黃者名明珀有香者名香珀出高麗倭國者色深紅有蜂蟻松枝者尤好修治斆曰入藥用水調側柏子末安瓷鍋中置琥珀於內煮之從巳至申當有異光搗粉篩用氣味甘平無毒主治安五臟定魂魄殺精魅邪鬼消瘀血通五淋別録壯心明目磨翳止心痛癲邪療蠱毒破結瘕治産後血枕痛大明止血生肌合金瘡藏器清肺利小腸元素發明震亨曰古方用為利小便以燥脾土有功脾能運化肺氣下降故小便可通若血少不利者反致其燥急之苦弘景曰俗中多帶之辟惡刮屑服療瘀血至驗仙經無正用藏器曰和大黃鱉甲作散酒下方寸匕下惡血婦人腹內血盡即止宋高祖時寧州貢琥珀枕碎以賜軍士敷金瘡附方舊四新五琥珀散止血生肌鎮心明目破癥瘕氣塊産後血暈悶絶兒枕痛並宜餌此方琥珀一兩鱉甲一兩京三稜一兩延胡索半兩沒藥半兩大黃六銖熬搗為散空心酒服三錢匕日再服神驗莫及産後即減大黃海藥本草小兒胎驚琥珀防風各一錢硃砂半錢為末豬乳調一字入口中最妙直指方小兒胎癇琥珀硃砂各少許全蠍一枚為末麥門冬湯調一字服直指方小便轉胞真琥珀一兩為末用水四升蔥白十莖煮汁三升入珀末二錢溫服沙石諸淋三服皆效聖惠方小便淋瀝琥珀為末二錢麝香少許白湯服之或萱草煎湯服老人虛人以人參湯下亦可蜜丸以赤茯苓湯下普濟方小便尿血琥珀為末每服二錢燈心湯下直指方從高墜下有瘀血在內刮琥珀屑酒服方寸匕或入蒲黃三二匕日服四五次外臺祕要金瘡悶絶不識人琥珀研粉童子小便調一錢三服瘥鬼遺方魚骨哽咽六七日不出用琥珀珠一串推入哽所牽引之即出外臺祕要醫音黟宋嘉祐釋名醫珀斆曰醫是衆珀之長故號醫珀時珍曰亦作䃜其色黳黑故名集解恭曰古來相傳松脂千年為茯苓又千年為琥珀又千年為醫二物燒之皆有鬆氣狀似玄玉而輕出西戎而有茯苓處無此物今西州南三百里磧中得者大則方尺黑潤而輕燒之腥臭高昌人名為木醫謂玄玉為石醫洪州土石間得者燒作鬆氣功同琥珀見風拆破不堪為器恐此二種及琥珀或非松脂所為也慎微曰梁四公記傑公云交河之間平磧中掘深一丈下有醫珀黑逾純漆或大如車輪末服攻婦人小腸癥瘕諸疾時珍曰醫即琥珀之黑色者或因土色薰染或是一種木沉結成未必是千年琥珀復化也玉策經言松脂千年作茯苓茯苓千年作琥珀琥珀千年作石膽石膽千年作威喜大抵皆是神異之說未可深憑雷斆琥珀下所說諸珀可據氣味甘平無毒主治補心安神破血生肌治婦人癥瘕唐本小兒帶之辟惡磨滴目翳赤障藏器豬苓本經中品釋名豭豬屎本經豕橐莊子地烏桃圖經弘景曰其塊黑似豬屎故以名之司馬彪注莊子云豕橐一名苓其根似豬矢是也時珍曰馬屎曰通豬屎曰零即苓字其塊零落而下故也集解別録曰豬苓生衡山山谷及濟陰冤句二月八月採陰乾弘景曰是楓樹苓其皮黑色肉白而實者佳削去皮用頌曰今蜀州眉州亦有之生土底不必楓根下始有也時珍曰豬苓亦是木之餘氣所結如松之餘氣結茯苓之義他木皆有楓木為多耳修治斆曰採得銅刀削去粗皮薄切以東流水浸一夜至明漉出細切以升麻葉對蒸一日去葉曬乾用時珍曰豬苓取其行濕生用更佳氣味甘平無毒普曰神農甘雷公苦無毒權曰微熱元素曰氣平味甘氣味俱薄升而微降與茯苓同杲曰淡甘平降也陽中陰也好古曰甘重於苦陽也入足太陽足少陰經主治痎瘧解毒蠱疰不祥利水道久服輕身耐老本經解傷寒溫疫大熱發汗主腫脹滿腹急痛甄權治渴除濕去心中懊憹元素瀉膀胱好古開腠理治淋腫腳氣白濁帶下妊娠子淋胎腫小便不利時珍發明頌曰張仲景治消渴脈浮小便不利微熱者豬苓散發其汗病欲飲水而復吐名為水逆冬時寒嗽如瘧狀者亦與豬苓散此即五苓散也豬苓茯苓術各三分澤瀉五分桂二分細搗篩水服方寸匕日三多飲暖水汗出即愈利水道諸湯劑無若此快今人皆用之杲曰苦以泄滯甘以助陽淡以利竅故能除濕利小便宗奭曰豬苓行水之功多久服必損腎氣昏人目久服者宜詳審之元素曰豬苓淡滲大燥亡津液無濕症者勿服之時珍曰豬苓淡滲氣升而又能降故能開腠理利小便與茯苓同功但入補藥不如茯苓也附方舊五傷寒口渴邪在臟也豬苓湯主之豬苓茯苓澤瀉滑石阿膠各一兩以水四升煮取二升每服七合日三服嘔而思水者亦主之張仲景方小兒祕結豬苓一兩以水少許煮雞屎白一錢調服立通外臺祕要通身腫滿小便不利豬苓五兩為末熟水服方寸匕日三服楊氏産乳妊娠腫渴從腳至腹小便不利微渴引飲方同上法子母祕録妊娠子淋方同上法日三夜二以通為度小品方壯年夢遺方見草部半夏下雷丸本經下品釋名雷實別録雷矢同上竹苓時珍曰雷斧雷楔皆霹靂擊物精氣所化此物生土中無苗葉而殺蟲逐邪猶雷之丸也竹之餘氣所結故曰竹苓苓亦屎也古者屎苓字通用集解別録曰雷丸生石城山谷及漢中土中八月採根曝乾弘景曰今出建平宜都間纍纍相連如丸恭曰雷丸竹之苓也無有苗蔓皆零無相連者今出房州金州時珍曰雷丸大小如栗狀如豬苓而圓皮黑肉白甚堅實修治斆曰凡使用甘草水浸一夜銅刀刮去黑皮破作四五片以甘草水再浸一宿蒸之從巳至未曬乾酒拌再蒸曬乾用大明曰入藥炮用氣味苦寒有小毒別録曰咸微寒有小毒赤者殺人白者善普曰神農苦黃帝岐伯桐君甘有毒扁鵲甘無毒李當之大寒權曰苦有小毒時珍曰甘微苦平之才曰荔實厚朴芫花為之使惡蓄根葛根主治殺三蟲逐毒氣胃中熱利丈夫不利女子本經作摩膏除小兒百病逐邪氣惡風汗出除皮中熱結積蠱毒白蟲寸白自出不止久服令人陰痿別録逐風主癲癇狂走甄權發明弘景曰本經云利丈夫別録曰久服陰痿於事相反志曰經言利丈夫不利女子乃疏利男子元氣不疏利女子臟氣故曰久服令人陰痿也時珍曰按範正敏遁齊閒覽云楊勔中年得異疾每發語腹中有小聲應之久漸聲大有道士見之曰此應聲蟲也但讀本草取不應者治之讀至雷丸不應遂頓服數粒而愈附方舊一新一小兒出汗有熱雷丸四兩粉半斤為末撲之千金方下寸白蟲雷丸水浸去皮切焙為末五更初食炙肉少許以稀粥飲服一錢匕須上半月服蟲乃下經驗前方筋肉化蟲方見石部雄黃下桑上寄生本經上品釋名寄屑本經寓木本經宛童本經蔦鳥吊二音時珍曰此物寄寓他木而生如鳥立於上故曰寄生寓木蔦木俗呼為寄生草東方朔傳云在樹為寄生在地為窶藪集解別録曰桑上寄生生弘農川穀桑樹上三月三日採莖葉陰乾弘景曰寄生松上楊上楓上皆有形類是一般但根津所因處為異則各隨其樹名之生樹枝間根在枝節之內葉圓青赤厚澤易折旁自生枝節冬夏生四月花白五月實赤大如小豆處處皆有以出彭城者為勝俗呼為續斷用之而本經續斷別在上品主療不同市人混雜無識者恭曰此多生楓槲櫸柳水楊等樹上葉無陰陽如細柳葉而厚脆莖粗短子黃色大如小棗惟虢州有桑上者子汁甚黏核大似小豆九月始熟黃色陶言五月實赤大如小豆蓋未見也江南人相承用其莖為續斷殊不相關保升曰諸樹多有寄生莖葉並相似云是烏鳥食一物子糞落樹上感氣而生葉如橘而厚軟莖如槐而肥脆處處雖有須桑上者佳然非自採即難以別可斷莖視之色深黃者為驗又圖經云葉似龍膽而厚闊莖短似雞腳作樹形三月四月花黃白色六月七月結子黃緑色如小豆以汁稠黏者良也大明曰人多收櫸樹上者為桑寄生桑上極少縱有形與櫸上者亦不同次即楓樹上者力與櫸樹上者相同黃色七月八月採宗奭曰桑寄生皆言處處有之從官南北處處難得豈歲歲斫踐之苦不能生耶抑方宜不同耶若以為鳥食物子落枝節間感氣而生則麥當生麥谷當生谷不當生此一物也自是感造化之氣別是一物古人惟取桑上者是假其氣爾第以難得真者真者下咽必驗如神向有求此於吳中諸邑者豫遍搜不可得遂以實告之鄰邑以他木寄生送上服之逾月而死可不慎哉震亨曰桑寄生藥之要品而人不諳其的惜哉近海州邑及海外之境其地暖而不蠶桑無採捋之苦氣厚意濃自然生出也何嘗節間可容他子耶時珍曰寄生高者二三尺其葉圓而微尖厚而柔面青而光澤背淡紫而有茸人言川蜀桑多時有生者他處鮮得須自採或連桑採者乃可用世俗多以雜樹上者充之氣性不同恐反有害也按鄭樵通志云寄生有兩種一種大者葉如石榴葉一種小者葉如麻黃葉其子皆相似大者曰蔦小者曰女蘿今觀蜀本韓氏所說亦是兩種與鄭說同修治斆曰採得銅刀和根枝莖葉細銼陰乾用勿見火氣味苦平無毒別録曰甘無毒主治腰痛小兒背強癰腫充肌膚堅發齒長鬚眉安胎本經去女子崩中內傷不足産後余疾下乳汁主金瘡去痹別録助筋骨益血脈大明主懷妊漏血不止令胎牢固甄權附方新四膈氣生桑寄生搗汁一盞服之集簡方胎動腹痛桑寄生一兩半阿膠炒半兩艾葉半兩水一盞半煎一盞去滓溫服或去艾葉聖惠方毒痢膿血六脈微小並無寒熱宜以桑寄生二兩防風大芎二錢半炙甘草三銖為末每服二錢水一盞煎八分和滓服楊子建護命方下血後虛下血止後但覺丹田元氣虛乏腰膝沉重少力桑寄生為末每服一錢非時白湯點服楊子建護命方實氣味甘平無毒主治明目輕身通神本經松蘿本經中品釋名女蘿別録松上寄生時珍曰名義未詳集解別録曰松蘿生熊耳山谷松樹上五月採陰乾弘景曰東山甚多生雜樹上而以松上者為真詩云蔦與女蘿施於松上蔦是寄生以桑上者為真不用松上者互有異同爾時珍曰按毛萇詩注云女蘿菟絲也吳普本草菟絲一名松蘿陶弘景謂蔦是桑上寄生松蘿是松上寄生陸佃埤雅言蔦是松柏上寄生女蘿是松上浮蔓又言在木為女蘿在草為菟絲鄭樵通志言寄生有二種大曰蔦小曰女蘿陸機詩疏言菟絲蔓生草上黃赤如金非松蘿也松蘿蔓延松上生枝正青與菟絲殊異羅願爾雅翼云女蘿色青而細長無雜蔓故山鬼云被薜荔兮帶女蘿謂青長如帶也菟絲黃赤不相類然二者皆附木而生有時相結故古樂府云南山冪冪菟絲花北陵青青女蘿樹由來花葉同一根今日枝條分兩處唐樂府云菟絲故無情隨風任顛倒誰使女蘿枝而來強縈抱兩草猶一心人心不如草據此諸說則女蘿之為松上蔓當以二陸羅氏之說為的其曰菟絲者誤矣氣味苦甘平無毒主治嗔怒邪氣止虛汗頭風女子陰寒腫痛本經療痰熱溫瘧可為吐湯利水道別録治寒熱吐胸中客痰涎去頭瘡項上瘤癭令人得眠甄權發明時珍曰松蘿能平肝邪去寒熱同瓜蒂諸藥則能吐痰非松蘿能吐人也葛洪肘後方治胸中有痰頭痛不欲食氣壯者用松蘿杜蘅各三兩瓜蒂三十枚酒一升二合漬再宿旦飲一合取吐不吐晚再服一合孫思邈千金方治胸膈痰澼積熱斷膈湯用松蘿甘草各一兩恆山三兩瓜蒂二十一枚水酒各一升半煮取一升半分三服取吐楓柳唐本草集解恭曰楓柳出原州葉似槐莖赤根黃子六月熟緑色而細剝取莖皮用時珍曰蘇恭言楓柳有毒出原州陳藏器駁之以為楓柳皮即今楓樹皮性澀能止水痢按斗門方言即今楓樹上寄生其葉亦可制粉霜此說是也若是楓樹則處處甚多何必專出原州耶陳說誤矣楓皮見前楓香脂下皮氣味辛大熱有毒主治風齲齒痛唐本積年痛風不可忍久治無效者細銼焙不限多少入腦麝浸酒常服以醉為度斗門方桃寄生綱目氣味苦辛無毒主治小兒中蠱毒腹內堅痛面目青黃淋露骨立取二兩為末如茶點服日四五服時珍聖惠方柳寄生綱目集解時珍曰此即寄生之生柳上者氣味苦平無毒主治膈氣刺痛搗汁服一杯時珍占斯別録下品釋名炭皮別録良無極綱目時珍曰占斯範汪方謂之良無極劉涓子鬼遺方謂之木占斯盛稱其功而別録一名炭皮殊不可曉集解別録曰占斯生太山山谷採無時弘景曰李當之云是樟樹上寄生樹大銜枝在肌肉今人皆以胡桃皮為之非是真也按桐君採藥録云生上洛是木皮狀如厚朴色似桂白其理一縱一橫今市人皆削乃似厚朴而無正縱橫理不知此復是何物莫測真假也氣味苦溫無毒權曰辛平無毒茱萸為之使主治邪氣濕痹寒熱疽瘡除水堅積血症月閉無子小兒躄不能行諸惡瘡癰腫止腹痛令女人有子別録主脾熱洗手足水爛傷甄權解狼毒毒藏器附方新一木占斯散治發背腸癰疽痔婦人乳癰諸産癥瘕無有不療服之腫去痛止膿消已潰者便早愈也木占斯甘草炙厚朴炙細辛栝蔞防風乾薑人參桔梗敗醬各一兩為散酒服方寸匕晝七夜四以多為善此藥入咽當覺流入瘡中令化為水也癰疽灸不發敗壞者尤可服之內癰在上者當吐膿血在下者當下膿血其瘡未壞及長服者去敗醬一方加桂心劉涓子鬼遺方石刺木拾遺集解藏器曰石刺木乃木上寄生也生南方林筤間其樹江西人呼為靳刺亦種為籬院樹似棘而大枝上有逆鉤根皮氣味苦平無毒主治破血産後余血結瘕煮汁服神驗不可言藏器木之五苞木類四種竹本經中品釋名時珍曰竹字象形許慎說文云竹冬生草也故字從倒草戴凱之竹譜云植物之中有名曰竹不剛不柔非草非木小異實虛大同節目集解弘景曰竹類甚多入藥用䈽竹次用淡苦竹又一種薄殼者名甘竹葉最勝又有實中竹篁竹並以筍為佳於藥無用頌曰竹處處有之其類甚多而入藥惟用䈽竹淡竹苦竹三種人多不能盡別按竹譜䈽竹堅而促節體圓而質徑皮白如霜大者宜刺船細者可為笛苦竹有白有紫甘竹似篁而茂即淡竹也然今之刺船者多用桂竹竹笛自有一種亦不名䈽竹苦竹亦有二種一出江西閩中本極粗大筍味殊苦不可啖一出江浙肉厚而葉長闊筍微有苦味俗呼甜苦筍是也今南人入藥燒瀝惟用淡竹一品肉薄節間有粉者時珍曰竹惟江河之南甚多故曰九河鮮有五嶺實繁大抵皆土中苞筍各以時而出旬日落籜而成竹也莖有節節有枝枝有節節有葉葉必三之枝必兩之根下之枝一為雄二為雌雌者生筍其根鞭喜行東南而宜死貓畏皂刺油麻以五月十三日為醉日六十年一花花結實其竹則枯竹枯曰箹竹實曰筱小曰篠簜大曰篠其中皆虛而有實心竹出滇廣其外皆圓而有方竹出川蜀其節或暴或無或促或疏暴節竹出蜀中高節磊砢即筇竹也無節竹出溱州空心直上即通竹也篃竹一尺數節出荊南笛竹一節尺余出吳楚篔簹竹一節近丈出南廣其干或長或短或巨或細交廣由吾竹長三四丈其肉薄可作屋柱䈏竹大至數圍其肉厚可為梁棟永昌漢竹可為桶斛𥳍竹可為舟船嚴州越王竹高只尺余辰州龍孫竹細僅如針高不盈尺其葉或細或大鳳尾竹葉細三分龍公竹葉若芭蕉百葉竹一枝百葉其性或柔或徑或滑或澀澀者可以錯甲謂之𥯨簩滑者可以為席謂之桃枝徑者可以為戈刀箭矢謂之矛竹箭竹筋竹石麻柔者可為繩索謂之蔓竹弓竹苦竹把發其色有青有黃有白有赤有烏有紫有斑斑者駁紋點染紫者黯色黝然烏者黑而害母赤者厚而直白者薄而曲黃者如金青者如玉其別種有棘竹一名竻竹芒棘森然大者圍二尺可御盜賊棕竹一名實竹其葉似棕可為柱杖慈竹一名義竹叢生不散人栽為玩廣人以筋竹絲為竹布甚脆䈽竹葉氣味苦平無毒別録曰大寒主治咳逆上氣溢筋急惡瘍殺小蟲本經除煩熱風痙喉痹嘔吐別録煎湯尉霍亂轉筋時珍淡竹葉氣味辛平大寒無毒權曰甘寒主治胸中痰熱咳逆上氣別録吐血熱毒風止消渴壓丹石毒甄權消痰治熱狂煩悶中風失音不語壯熱頭痛頭風止驚悸溫疫迷悶妊婦頭旋倒地小兒驚癇天吊大明喉痹鬼疰惡氣煩熱殺小蟲孟詵涼心經益元氣除熱緩脾元素煎濃汁漱齒中出血洗脫肛不收時珍苦竹葉氣味苦冷無毒主治口瘡目痛明目利九竅別録治不睡止消渴解酒毒除煩熱發汗療中風喑啞大明殺蟲燒末和豬膽塗小兒頭瘡耳瘡疥癬和雞子白塗一切惡瘡頻用取效時珍發明弘景曰甘竹葉最勝詵曰竹葉䈽苦淡甘之外余皆不堪入藥不宜人淡竹為上甘竹次之宗奭曰諸竹筍性皆微寒故知其葉一致也張仲景竹葉湯惟用淡竹元素曰竹葉苦平陰中微陽杲曰竹葉辛苦寒可升可降陽中陰也其用有二除新久風邪之煩熱止喘促氣勝之上衝附方新二上氣發熱因奔趁走馬後飲冷水所致者竹葉三斤橘皮三兩水一斗煮五升細服三日一劑肘後方時行發黃竹葉五升切小麥七升石膏三兩水一斗半煮取七升細服盡劑愈肘後方䈽竹根主治作湯益氣止渴補虛下氣本經消毒別録淡竹根主治除煩熱解丹石發熱渴煮汁服藏器消痰去風熱驚悸迷悶小兒驚癇大明同葉煎湯洗婦人子宮下脫時珍苦竹根主治下心肺五臟熱毒氣銼一斤水五升煮汁一升分三服孟詵甘竹根主治煮汁服安胎止産後煩熱時珍附方新一産後煩熱逆氣用甘竹根切一斗五升煮取七升去滓入小麥二升大棗二十枚復煮麥熟三四沸入甘草一兩麥門冬一升再煎至二升每服五合婦人良方淡竹茹氣味甘微寒無毒主治嘔啘溫氣寒熱吐血崩中溢筋別録止肺痿唾血鼻衄治五痔甄權噎膈孟詵傷寒勞復小兒熱癇婦人胎動時珍苦竹茹主治下熱壅孟詵水煎服止尿血時珍筀竹茹主治勞熱大明附方舊五新五傷寒勞復傷寒後交接勞復卵腫腹痛竹皮一升水三升煮五沸服汁朱肱南陽活人書婦人勞復病初愈有所勞動致熱氣衝胸手足搐搦拘急如中風狀淡竹青茹半斤栝蔞二兩水二升煎一升分二服活人書産後煩熱內虛短氣甘竹茹湯用甘竹茹一升人參茯苓甘草各二兩黃芩二兩水六升煎二升分服日三服婦人良方婦人損胎孕八九月或墜傷牛馬驚傷心痛用青竹茹五兩酒一升煎五合服子母祕録月水不斷青竹茹微炙為末每服三錢水一盞煎服普濟方小兒熱痛口噤體熱竹青茹三兩醋三升煎一升服一合子母祕録齒血不止生竹皮醋浸令人含之噀其背上三過以茗汁漱之千金方牙齒宣露黃竹葉當歸尾研末煎湯入鹽含漱永類方飲酒頭痛竹茹二兩水五升煮三升納雞子三枚煮三沸食之千金方傷損內痛兵杖所加木石所迮血在胸背脅中刺痛用青竹茹亂髮各一團炭火炙焦為末酒一升煮三沸服之三服愈千金方淡竹瀝修治機曰將竹截作二尺長劈開以磚兩片對立架竹於上以火炙出其瀝以盤承取時珍曰一法以竹截長五六寸以瓶盛倒懸下用一器承之周圍以炭火逼之其油瀝於器下也氣味甘大寒無毒時珍曰薑汁為之使主治暴中風風痹胸中大熱止煩悶消渴勞復別録中風失音不語養血清痰風痰虛痰在胸膈使人癲狂痰在經絡四肢及皮裡膜外非此不達不行震亨治子冒風痓解射罔毒時珍䈽竹瀝主治風痓別録苦竹瀝主治口瘡目痛明目利九竅別録功同淡竹大明治牙疼時珍慈竹瀝主治療熱風和粥飲服孟詵發明弘景曰凡取竹瀝惟用淡苦䈽竹者雷曰久渴心煩宜投竹瀝震亨曰竹瀝滑痰非助以薑汁不能行諸方治胎産金瘡口噤與血虛自汗消渴小便多皆是陰虛之病無不用之産後不礙虛胎前不損子本草言其大寒似與石膏黃芩同類而世俗因大寒二字棄而不用經云陰虛則發熱竹瀝味甘性緩能除陰虛之有大熱者寒而能補與薯蕷寒補義同大寒言其功非獨言其氣也世人食筍自幼至老未有因其寒而病者瀝即筍之液也又假於火而成何寒如此之甚耶但能食者用荊瀝不能食者用竹瀝時珍曰竹瀝性寒而滑大抵因風火燥熱而有痰者宜之若寒濕胃虛腸滑之人服之則反傷腸胃筍性滑利多食瀉人僧家謂之刮腸篦即此義也丹溪朱氏謂大寒言其功不言其氣殊悖於理謂大寒為氣何害於功淮南子云槁竹有火不鑽不然今苗僚人以干竹片相戛取火則竹性雖寒亦未必大寒也神仙傳云離婁公服竹汁餌桂得長生蓋竹汁性寒以桂濟之亦與用薑汁佐竹瀝之意相同淡竹今人呼為水竹有大小二種此竹汁多而甘沈存中言苦竹之外皆為淡竹誤矣附方舊十四新七中風口噤竹瀝薑汁等分日日飲之千金方小兒口噤體熱用竹瀝二合暖飲分三四服兵部手集産後中風口噤身直面青手足反張竹瀝飲一二升即蘇梅師方破傷中風凡閃脫折骨諸瘡慎不可當風用扇中風則發痓口噤項急殺人急飲竹瀝二三升忌冷飲食及酒竹瀝卒難得可合十許束並燒取之外臺祕要金瘡中風口噤欲死竹瀝半升微微暖服廣利方大人喉風筀竹油頻飲之集簡方小兒重舌竹瀝漬黃柏時時點之簡便方小兒傷寒淡竹瀝葛根汁各六合細細與服千金方小兒狂語夜後便發竹瀝夜服二合姚和衆至寶方婦人胎動妊娠因夫所動困絶以竹瀝飲一升立愈産寶孕婦子煩楊氏産乳竹瀝頻頻飲之梅師方茯苓二兩竹瀝一升水四升煎二升分三服不瘥更作之時氣煩躁五六日不解青竹瀝半盞新水半盞相和令勻非時服千金方消渴尿多竹瀝恣飲數日愈肘後方咳嗽肺痿大人小兒咳逆短氣胸中吸吸咳出涕唾嗽出臭膿用淡竹瀝一合服之日三五次以愈為度李絳兵部手集産後虛汗淡竹瀝三合暖服須臾再服咱殷産寶小兒吻瘡竹瀝和黃連黃柏黃丹敷之全幼心鑑小兒赤目淡竹瀝點之或入人乳古今録驗赤目眥痛不得開者肝經實熱所致或生障翳用苦竹瀝五合黃連二分綿裹浸一宿頻點之令熱淚出梅師方猝牙齒痛苦竹燒一頭其一頭汁出熱揩之姚僧坦集驗方丹石毒發頭眩耳鳴恐懼不安淡竹瀝頻服二三升古今録驗竹筍見菜部慈竹籜主治小兒頭身惡瘡燒散和油塗之或入輕粉少許時珍竹實主治通神明輕身益氣本經發明別録曰竹實出益州弘景曰竹實出藍田江東乃有花而無實頃來斑斑有實狀如小麥可為飯食承曰舊有竹實鸞鳳所食今近道竹間時見開花小白如棗花亦結實如小麥子無氣味而澀江浙人號為竹米以為荒年之兆其竹即死必非鸞鳳所食者近有餘幹人言竹實大如雞子竹葉層層包裹味甘勝蜜食之令人心膈清涼生深竹林茂盛蒙密處頃因得之但日久汁枯乾而味尚存爾乃知鸞鳳所食非常物也時珍曰按陳藏器本草云竹肉一名竹實生苦竹枝上大如雞子似肉臠有大毒須以灰汁煮二度煉訖乃依常菜茹食煉不熟則戟人喉出血手爪盡脫也此說與陳承所說竹實相似恐即一物但苦竹上者有毒爾與竹米之竹實不同山白竹即山間小白竹也主治燒灰入腐爛癰疽藥時珍爆竹主治闢妖氣山魈慎微曰李畋該聞集云仲叟者家為山魈所祟擲石開戶畋令旦夜於庭中爆竹數十竿若除夕然其祟遂止竹黃宋開寶釋名竹膏志曰天竺黃生天竺國今諸竹內往往得之人多燒諸骨及葛粉等雜之大明曰此是南海邊竹內塵沙結成者宗奭曰此是竹內所生如黃土著竹成片者時珍曰按吳僧贊寧云竹黃生南海鏞竹中此竹極大又名天竹其內有黃可以療疾本草作天竺者非矣𥳍竹亦有黃此說得之氣味甘寒無毒大明曰平伏粉霜主治小兒驚風天吊去諸風熱鎮心明目療金瘡止血滋養五臟開寶治中風痰壅猝失音不語小兒客忤癇疾大明制石藥毒發熱保升發明宗奭曰天竹黃涼心經去風熱作小兒藥尤宜和緩故也時珍曰竹黃出於大竹之津氣結成其氣味功用與竹瀝同而無寒滑之害附方新一小兒驚熱天竹黃二錢雄黃牽牛末各一錢研勻麵糊丸粟米大每服三五丸薄荷湯下錢乙方仙人杖宋嘉祐集解藏器曰此是筍欲成竹時立死者色黑如漆五六月收之苦竹桂竹多生此別有仙人杖草見草部又枸杞亦名仙人杖與此同名氣味咸平無毒大明曰冷主治噦氣嘔逆小兒吐乳大人吐食反胃闢痁並水煮服之藏器小兒驚癇及夜啼置身伴睡良又燒為末水服方寸匕主痔病忌牛肉大明煮汁服下魚骨鯁時珍鬼齒拾遺釋名鬼針藏器曰此腐竹根先入地者為其賊惡故隱其名草部亦有鬼針氣味苦平無毒主治中惡注忤心腹痛煮汁服之藏器煮汁服下骨鯁燒存性入輕粉少許油調塗小兒頭瘡時珍附方新二魚骨鯁咽籬腳朽竹去泥研末蜜丸芡子大綿裹含之其骨自消也王璆百一選方小便尿血籬下竹根入土多年者不拘多少洗淨煎湯並服數碗立止救急良方木之六雜木類七種附録一十九種淮木本經下品校正併入別録有名未用城裡赤柱釋名百歲城中木本經城裡赤柱別録曰淮木生晉陽平澤又云城裡赤柱生晉平陽時珍曰按吳普本草淮木生晉平陽河東平澤與別録城裡赤柱出處及主治相同乃一物也即古城中之木晉人用之故云生晉平陽及河東今併為一但淮木字恐有差訛耳氣味苦平無毒別録曰辛普曰神農雷公無毒主治久咳上氣傷中虛羸女子陰蝕漏下赤白沃本經城裡赤柱療婦人漏血白沃陰蝕濕痹邪氣補中益氣並別録煮湯服主難産杜正倫城東腐木別録有名未用校正併入拾遺腐木地主二條釋名地主藏器曰城東腐木即城東古木在土中腐爛者一名地主城東者猶東牆土之義也杜正倫方用古城柱木煮湯服治難産即其類也氣味咸溫無毒藏器曰平主治心腹痛止泄便膿血別録主鬼氣心痛酒煮一合服蜈蚣咬者取腐木漬汁塗之亦可研末和醋敷之藏器凡手足掣痛不仁不隨者朽木煮湯熱漬痛處甚良時珍東家雞棲木拾遺釋名時珍曰酉陽雜俎作東門雞棲木主治無毒主失音不語燒灰水服盡一升效藏器古廁木拾遺廁籌附主治鬼魅傳尸溫疫魍魎神祟以太歲所在日時當戶燒熏又熏杖瘡令冷風不入藏器附録廁籌見服器部器物類古櫬板拾遺集解藏器曰此古冢中棺木也彌古者佳杉材最良千歲者通神宜作琴底爾雅注云杉木作棺埋之不腐主治無毒主鬼氣注忤中惡心腹痛背急氣喘惡夢悸常為鬼神所祟撓者水及酒和東引桃枝煎服當得吐下藏器附方新一小兒夜啼死人朽棺木燒明照之即止聖濟震燒木拾遺釋名霹靂木時珍曰此雷所擊之木也方士取刻符印以召鬼神周日用注博物志云用擊鳥影其鳥必自墮也主治火驚失心煮汁服之又掛門戶大厭火災藏器河邊木拾遺主治令人飲酒不醉五月五日取七寸投酒中二遍飲之必能飲也藏器附録諸木一十九種新雉木別録曰味苦香溫無毒主風眩痛可作沐藥七月採陰乾實如桃合新木別録曰味辛平無毒解心煩止瘡痛生遼東俳蒲木別録曰味甘平無毒主少氣止煩生陵谷葉如奈實赤三核遂陽木別録曰味甘無毒主益氣生山中如白楊葉三月實十月熟赤可食學木核別録曰味甘寒無毒主脅下留飲胃氣不平除熱如蕤核五月採陰乾栒音荀核別録曰味苦療水身面癰腫五月採木核別録曰療腸澼花療不足子療傷中根療心腹逆氣止渴十月採荻皮別録曰味苦止消渴白蟲益氣生江南如松葉有別刺實赤黃十月採柵木皮珣曰味苦溫無毒主霍亂吐瀉小兒吐乳暖胃正氣並宜水煎服按廣志云生廣南山野其樹如桑干陀木皮珣曰按西域記云生西國彼人用染僧褐故名干陀褐色也樹大皮厚葉如櫻桃安南亦有溫平無毒主癥瘕氣塊溫腹暖胃止嘔逆並良破宿血婦人血閉腹內血塊酒煎服之馬瘍木根皮藏器曰有小毒主惡瘡疥癬有蟲為末和油塗之出江南山谷樹如櫪也角落木皮藏器曰味苦溫無毒主赤白痢煮汁服之生江西山谷似茱萸獨莖也芺樹藏器曰有大毒主風痹偏枯筋骨攣縮癱緩皮膚不仁疼冷等取枝葉搗碎大甑蒸熱鋪床上臥之冷更易骨節間風盡出當得大汗用補藥及羹粥食之慎風冷勞復生江南深山葉長厚冬月不凋山人識之白馬骨藏器曰無毒主惡瘡和黃連細辛白調牛膝雞桑皮黃荊等燒末淋汁取治瘰癧惡瘡蝕息肉白癜風揩破塗之又單取莖葉煮汁服止水痢生江東似石榴而短小對節慈母枝葉藏器曰炙香作飯下氣止渴令人不睡主小兒痰痞生山林間葉如櫻桃而小樹高丈餘山人並識之黃屑藏器曰味苦寒無毒主心腹痛霍亂破血酒煎服之酒疸目黃及野雞病熱痢下血並水煮服之從西南來者並作屑染黃用之樹如檀那耆悉藏器曰味苦寒無毒主結熱熱黃大小便澀赤丹毒諸熱明目取汁洗目主赤爛熱障生西南諸國一名龍花帝休藏器曰主不愁帶之愁自銷生少室山嵩高山山海經云少室山有木名帝休其枝五衢黃花黑實服之不愁今嵩山應有此木人未識固宜求之亦如萱草之忘憂也大木皮頌曰生施州四時有葉無花樹之高下大小不定其皮味苦澀性溫無毒採無時土人與苦桃皮櫻桃皮三皮刮洗淨焙乾等分搗羅酒服一錢治一切熱毒氣服食無忌
