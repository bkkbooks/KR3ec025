body:
  text: 服器部第三十八卷李時珍曰敝帷敝蓋聖人不遺木屑竹頭賢者注意無棄物也中流之壺拯溺雪窖之氈救危無微賤也服帛器物雖屬尾瑣而倉猝值用亦奏奇功豈可藐視而漫不經神耶舊本散見草木玉石蟲魚人部今集其可備醫用者凡七十九種為服器部分為二部曰服帛曰器物草部十六種木部十九種玉石部二種蟲魚部五種人部一種共四十三種名醫別録四種梁陶弘景注唐本草三種唐蘇恭本草拾遺三十四種唐陳藏器藥性本草一種唐甄權開寶本草一種宋馬志嘉祐本草一種宋掌禹錫本草綱目三十五種明李時珍附注魏吳普本草唐李珣海藥蜀韓保升重注宋蘇頌圖經宋唐慎微證類寇宗奭衍義元朱震亨補遺服器之一服帛類二十五種錦拾遺釋名時珍曰錦以五色絲織成文章故字從帛從金諧聲且貴之也禹貢兗州厥篚織文是也主治故錦煮汁服療蠱毒燒灰敷小兒口中熱瘡藏器燒灰主失血下血血崩金瘡出血小兒臍瘡濕腫時珍附方新二吐血不止紅錦三寸燒灰水服聖惠方上氣喘急故錦一寸燒灰茶服神效普濟方絹綱目釋名時珍曰絹疏帛也生曰絹熟曰練入藥用黃絲絹乃蠶吐黃絲所織非染色也主治黃絲絹煮汁服止消渴産婦脬損洗痘瘡潰爛燒灰止血痢下血吐血血崩時珍緋絹燒灰入瘧藥時珍附方新三婦人血崩黃絹灰五分棕櫚灰一錢貫衆灰京墨灰荷葉灰各五分水酒調服即止集簡方産婦脬損小便淋瀝不斷黃絲絹三尺以炭灰淋汁煮至極爛清水洗淨入黃蠟半兩蜜一兩茅根二錢馬勃末二錢水一升煎一盞空心頓服服時勿作聲作聲即不效名固脬散又方産時傷脬終日不小便只淋濕不斷用生絲黃絹一尺白牡丹根皮末白芨末各一錢水二碗煮至絹爛如餳服之不宜作聲婦人良方帛拾遺釋名時珍曰素絲所織長狹如巾故字從白巾厚者曰繒雙絲者曰縑後人以染絲造之有五色帛主治緋帛燒研敷初生兒臍未落時腫痛又療惡瘡疔腫諸瘡有根者入膏用為上仍以掌大一片同露蜂房棘刺鉤爛草節亂髮等分燒研空腹服飲下方寸匕藏器主墜馬及一切筋骨損好古燒研療血崩金瘡出血白駁風時珍五色帛主盜汗拭乾訖棄道頭藏器附方新一肥脈癮疹曹姓帛拭之愈千金方布拾遺釋名時珍曰布有麻布絲布木綿布字從手從巾會意也主治新麻布能逐瘀血婦人血閉腹痛産後血痛以數重包白鹽一合煅研溫酒服之舊麻布同旱蓮草等分瓶內泥固煅研日用揩齒能固牙烏須時珍白布治口唇緊小不能開合飲食不治殺人作大炷安刀斧上燒令汗出拭塗之日三五度仍以青布燒灰酒服時珍青布解諸物毒天行煩毒小兒寒熱丹毒並水漬取汁飲之浸汁和生薑汁服止霍亂燒灰敷惡瘡經年不瘥者及灸瘡止血令不傷風水燒煙熏嗽殺蟲熏虎狼咬瘡能出水毒入諸膏藥療疔腫狐尿等惡瘡藏器燒灰酒服主唇裂生瘡口臭仍和脂塗之與藍靛同功時珍附方舊二新六惡瘡防水青布和蠟燒煙筒中熏之入水不爛陳藏器本草瘡傷風水青布燒煙於器中以器口熏瘡得惡汁出知痛癢瘥陳藏器本草臁瘡潰爛陳艾五錢雄黃二錢青布卷作大炷點火熏之熱水流數次愈鄧筆峰雜興方交接違禮女人血出不止青布同發燒灰納之僧坦集驗方霍亂轉筋入腹無可奈何者以酢煮青布拓之冷則易千金方傷寒陽毒狂亂甚者青布一尺浸冷水貼其胸前活人書目痛磣澀不得瞑用青布炙熱以時尉之仍蒸大豆作枕千金方病後目赤有方同上千金方用冷水漬青布掩之數易綿拾遺集解時珍曰古之綿絮乃繭絲纏延不可紡織者今之綿絮則多木綿也入藥仍用絲綿主治新綿燒灰治五野雞病每服酒二錢衣中故綿絮主下血及金瘡出血不止以一握煮汁服藏器綿灰主吐血衄血下血崩中赤白帶下疳瘡臍瘡聤耳時珍附方新十霍亂轉筋腹痛以苦酒煮絮裹之聖惠方吐血咯血新綿一兩燒灰白膠切片炙黃一兩每服一錢米飲下普濟方吐血衄血好綿燒灰打麵糊入清酒調服之普濟方腸風瀉血破絮燒灰枳殼麩炒等分麝香少許為末每服一錢米飲下聖惠方血崩不止好綿及婦人頭髮共燒存性百草霜等分為末每服三錢溫酒下或加棕灰東垣方用白綿子蓮花心當歸茅花紅花各一兩以白紙裹定黃泥固濟燒存性為末每服一錢入麝香少許食前好酒服乾坤祕韞用舊綿絮去灰土一斤新蠶絲一斤陳蓮房十個舊炊箅一枚各燒存性各取一錢空心熱酒下日三服不過五日愈氣結淋病不通用好綿四兩燒灰麝香半分每服二錢溫蔥酒連進三服聖惠方臍瘡不幹綿子燒灰敷之傅氏活嬰方聤耳出汁故綿燒灰綿裹塞之聖惠方褌襠拾遺釋名褲綱目犢鼻綱目觸衣綱目小衣時珍曰褌亦作裩褻衣也以渾復為之故曰褌其當隱處者為襠縫合者為褲短者為犢鼻犢鼻穴名也在膝下主治洗褌汁解毒箭並女勞復別録陰陽易病燒灰服之並取所交女人衣裳覆之藏器主女勞疸及中惡鬼忤時珍發明時珍曰按張仲景云陰陽易病身體重少氣少腹裡急或引陰中拘急熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之取中裩近隱處燒灰水服方寸匕日三服小便即利陰頭微腫則愈男用女女用男成無己解云此以導陰氣也童女者尤良附方新四金瘡傷重被驚者以女人中衣舊者炙襠尉之李筌太白陰經胞衣不下以本婦裩覆井上或以所著衣籠灶上千金方房勞黃病體重不眠眼赤如朱心下塊起若瘕十死一生宜先烙上脘及心俞次烙舌下灸關元下廉百壯以婦人內衣燒灰酒服二錢三十六黃方中鬼昏厥四肢拳冷口鼻出血用久汙溺衣燒灰每服二錢沸湯下男用女女用男趙原陽真人濟急方附録月經衣見人部天癸下汗衫綱目釋名中單綱目裲襠羞袒時珍曰古者短襦為衫今謂長衣亦曰衫矣王睿炙轂子云漢王與項羽戰汗透中單改名汗衫劉熙釋名云汗衣詩謂之澤受汗澤也或曰鄙袒或曰羞袒用六尺裁足覆胸背言羞鄙於袒故衣此爾又前當胸後當背故曰裲襠主治卒中忤惡鬼氣卒倒不知人逆冷口鼻出清血或胸脅腹內絞急切痛如鬼擊之狀不可按摩或吐血衄血用久垢汗衫燒灰百沸湯或酒服二錢男用女女用男中襯衣亦可時珍附方新一小兒夜啼用本兒初穿毛衫兒放瓶內自不哭也生生編孝子衫拾遺釋名時珍曰枲麻布所為者主治面皯燒灰敷之藏器帽主鼻上生瘡私竊拭之勿令人知時珍病人衣綱目主治天行疫瘟取初病人衣服於甑上蒸過則一家不染時珍衣帶拾遺主治婦人難産及日月未至而産臨時取夫衣帶五寸燒為末酒服之裩帶最佳藏器療小兒下痢客忤妊婦下痢難産時珍附方新五小兒客忤卒中者燒母衣帶三寸併發灰少許乳汁灌之外臺祕要小兒下痢腹大且堅用多垢故衣帶切一升水五升煮一升分三服千金方妊娠下痢中衣帶三寸燒研水服千金方金瘡犯內血出不止取所交婦人中衣帶三寸燒末水服千金方令病不復取女中下裳帶一尺燒研米飲服即免勞復肘後方頭巾綱目釋名時珍曰古以尺布裹頭為巾後世以紗羅布葛縫合方者曰巾圓者曰帽加以漆制曰冠又束髮之帛曰繻覆發之巾曰幘罩發之絡曰網巾近制也主治故頭巾治天行勞復後渴取多膩者浸汁暖服一升時珍千金方附方新四霍亂吐利偷本人頭繒以百沸湯泡汁服一呷勿令知之集玄方猝忽心痛三年頭繻沸湯淋汁飲之以碗覆繻於間地周時即愈聖惠方惡氣心痛破網巾燒灰一錢貓屎燒灰五分溫酒服馬氏方下蝕疳瘡破絲網燒存性孩兒茶各等分研末以濃茶洗淨擫之三五次效忌生冷房事發物集簡方幞頭綱目釋名時珍曰幞頭朝服也北周武帝始用漆紗制之至唐又有紗帽之制逮今用之主治燒煙熏産後血暈燒灰水服治血崩及婦人交腸病時珍發明時珍曰按陳總領方治暴崩下血琥珀散用漆紗帽灰云取陽氣衝上之義又夏子益奇疾方云婦人因生産陰陽易位前陰出糞名曰交腸病取舊撲頭燒灰酒服仍間服五苓散分利之如無撲頭凡舊漆紗帽皆可代之此皆取漆能行敗血之義耳皮巾子綱目主治下血及大風癘瘡燒灰入藥時珍附方新一積年腸風瀉血百藥不瘥敗皮巾子燒灰白礬燒各一兩人指甲燒焦麝香各一分乾薑炮三兩為末每服一錢米飲下聖惠方皮腰袋綱目主治大風癘瘡燒灰入藥時珍繳腳布拾遺釋名時珍曰即裹腳布也李斯書云天下之士裹足不入秦是矣古名行滕氣味無毒主天行勞復馬駿風黑汗出者洗汁服之多垢者佳藏器婦人欲回乳用男子裹足布勒住經宿即止時珍敗天公別録下品釋名笠弘景曰此乃人所戴竹笠之敗者取竹燒灰用時珍曰笠乃賤者御雨之具以竹為胎以箬葉夾之穹天論云天形如笠而冒地之表則天公之名蓋取於此近代又以牛馬尾棕毛皂羅漆制以蔽日者亦名笠子乃古所謂褦襶子者也主治平主鬼疰精魅燒灰酒服別録故蓑衣拾遺釋名襏襫音潑適時珍曰蓑草結衣御雨之具管子云農夫首戴茅蒲身服襏襫即此也主治蠼螋溺瘡取故蓑衣結燒灰油和敷之藏器氈屜別録下品釋名屜音替屧音燮時珍曰凡履中薦襪下氈皆曰屜可以代替也主治瘰癧燒灰五匕酒一升和平旦向日服取吐良思邈附方新三痔瘡初起癢痛不止用氈襪烘熱尉之冷又易集玄方一切心痛氈襪後跟一對燒灰酒服男用女女用男壽域方斷酒不飲以酒漬氈屜一宿平旦飲得吐即止也千金方皮靴綱目釋名靴時珍曰靴皮履也所以華足故字從革華劉熙釋名云靴跨也便於跨馬也本胡服趙武靈王好著短靿靴後世乃作長靿靴入藥當用牛皮者主治癬瘡取舊靴底燒灰同皂礬末摻之先以蔥椒湯洗淨時珍附方新六牛皮癬瘡舊皮鞋底燒灰入輕粉少許麻油調抹直指方小兒頭瘡聖惠方用皮鞋底洗淨煮爛洗訖敷之又方舊皮鞋面燒灰入輕粉少許生油調敷瘰癧已潰牛皮油靴底燒灰麻油調敷之集玄方身項粉瘤舊皮鞋底洗淨煮爛成凍子常食之瘤自破如豆腐極臭直指方腸風下血皮鞋底蠶繭蛻核桃殼紅雞冠花等分燒灰每酒服一錢聖惠方麻鞋別録下品釋名履綱目屝音費靸音先立切時珍曰鞋古作鞋即履也古者以草為屨以帛為履周人以麻為鞋劉熙釋名云鞋者解也縮其上易舒解也履者禮也飾足為禮也靸者襲也履頭深襲覆足也皮底曰屝屝者皮也木底曰舄干臘不畏濕也入藥當用黃麻苧麻結者主治舊底洗淨煮汁服止霍亂吐下不止及食牛馬肉毒腹脹吐利不止又解紫石英發毒蘇恭煮汁服止消渴藏器附方舊六新六霍亂轉筋故麻鞋底燒赤投酒中煮取汁服陳藏器本草瘧疾不止故鞋底去兩頭燒灰井華水服之千金方鼻塞不通麻鞋燒灰吹之立通經驗方鼻中衄血鞋𩍥燒灰吹之立效貞元廣利方小便遺床麻鞋尖頭二七枚燒灰歲朝井華水服之近效方大腸脫肛炙麻鞋底頻按入仍以故麻鞋底鱉頭各一枚燒鱉頭研敷之將履底按入即不出也千金方子死腹中取本婦鞋底炙熱尉腹上下二七次即下集玄方胎衣不下方同上夜臥禁魘凡臥時以鞋一仰一覆則無魘及惡夢起居雜忌折傷接骨市上乞兒破鞋底一隻燒灰白麵等分好醋調成糊敷患處以絹束之杉片夾定須臾痛止骨節有聲為效楊誠經驗方白駁癜風麻鞋底燒灰擦之聖惠蜈蚣傷螫麻履底炙熱揩之即安外臺祕要草鞋拾遺釋名草屨綱目屩音蹺不借綱目千里馬時珍曰世本言黃帝之臣始作屨即今草鞋也劉熙釋名云屨者拘也所以拘足也屩者蹺也著之蹺蹺輕便也不借者賤而易得不假借人也主治破草鞋和人亂髮燒灰醋調敷小兒熱毒遊腫藏器催生治霍亂時珍附方新五産婦催生路旁破草鞋一隻洗淨燒灰酒服二錢如得左足生男右足生女覆者兒死側者有驚自然之理也胎産方霍亂吐瀉出路在家應急方用路旁破草鞋去兩頭洗三四次水煎湯一碗滾服之即愈事海文山渾身骨痛破草鞋燒灰香油和貼痛處即止救急方行路足腫被石墊傷者草鞋浸尿缸內半日以磚一塊燒紅置鞋於上將足踏之令熱氣入皮里即消救急方臁瘡潰爛海上方詩云左腳草鞋將棒挑水中洗淨火中燒細研為末加輕粉洗以鹽湯敷即消屐屜鼻繩別録下品釋名木屐時珍曰屐乃木履之下有齒者其施鐵者曰人輦音局劉熙釋名云屐者支也支以踏泥也志曰別本注云屐屜江南以桐木為底用蒲為鞋麻穿其鼻江北不識也久著斷爛者乃堪入藥主治哽咽心痛胸滿燒灰水服唐本附方舊一新五婦人難産路旁破草鞋鼻子燒灰酒服集玄方睡中尿床麻鞋綱帶及鼻根等惟不用底七兩以水七升煮二升分再服外臺祕要尸咽痛癢聲音不出履鼻繩燒灰水服之葛洪肘後方燕口吻瘡木履尾煻火中煨熱取拄兩吻各二七遍千金方小兒頭瘡草鞋鼻子燒灰香油調敷之聖濟録手足瘑瘡故履系燒灰敷之千金方狐尿刺瘡麻鞋綱繩如棗大婦人內衣有血者手大一片鉤頭棘針二七枚並燒研以豬脂調敷當有蟲出陳藏器本草自經死繩拾遺主治卒發顛狂燒末水服三指撮陳蒲煮汁服亦佳藏器發明時珍曰按張耒明道雜志云蘄水一富家子遊倡宅驚走僕於刑人尸上大駭發狂明醫龐安常取絞死囚繩燒灰和藥與服遂愈觀此則古書所載冷僻之物無不可用者在遇圓機之士耳靈床下鞋拾遺主治腳氣藏器死人枕席拾遺主治尸疰石蛔又治疣目以枕及席拭之二七遍令爛去疣藏器療自汗盜汗死人席緣燒灰煮汁浴身自愈時珍聖惠方發明藏器曰有嫗人患冷滯積年不瘥宋徐嗣伯診之曰此尸疰也當以死人枕煮服之乃愈於是往古冢中取枕枕已一邊腐缺嫗服之即瘥張景聲十五歲患腹脹面黃衆藥不能治以問嗣伯嗣伯曰此石蛔爾極難療當取死人枕煮服之得大蛔蟲頭堅如石者五六升病即瘥沈僧翼患眼痛又多見鬼物嗣伯曰邪氣入肝可覓死人枕煮服之竟可埋枕於故處如其言又愈王晏問曰三病不同皆用死人枕而俱瘥何也答曰尸疰者鬼氣也伏而未起故令人沉滯得死人枕治之魂氣飛越不復附體故尸疰自瘥石蛔者醫療既僻蛔蟲轉堅世間藥不能遣須以鬼物驅之然後乃散故用死人枕煮服之邪氣入肝則使人眼痛而見魍魎須邪物以鉤之故用死人枕之氣因不去之故令埋於故處也時珍曰按謝士泰刪繁方治尸疰或見尸或聞哭聲者取死人席斬棺內余棄路上者一虎口長三寸水三升煮一升服立效此即用死人枕之意也故附之服器之二器物類五十四種紙綱目釋名時珍曰古者編竹炙青書字謂之汗青故簡策字皆從竹至秦漢間以繒帛書事謂之幡紙故紙字從糸或從巾也從氏諧聲也劉熙釋名云紙者砥也其平如砥也東漢和帝時耒陽蔡倫始採樹皮故帛魚網麻繒煮爛造紙天下乃通用之蘇易簡紙譜云蜀人以麻閩人以嫩竹北人以桑皮剡溪以藤海人以苔浙人以麥麵稻稈吳人以繭楚人以楮為紙又云凡燒藥以墨塗紙裹藥最能拒火藥品中有閃刀紙乃摺紙之際一角疊在紙中匠人不知漏裁者醫人取入藥用今方中未見用此何歟氣味諸紙甘平無毒主治楮紙燒灰止吐血衄血血崩金瘡出血時珍竹紙包犬毛燒末酒服止瘧聖惠藤紙燒灰敷破傷出血及大人小兒內熱衄血不止用故藤紙瓶中燒存性二錢入麝香少許酒服仍以紙捻包麝香燒煙燻鼻時珍草紙作捻紝癰疽最拔膿蘸油燃燈照諸惡瘡浸淫濕爛者出黃水數次取效時珍麻紙止諸失血燒灰用時珍紙錢主癰疽將潰以筒燒之乘熱吸患處其灰止血其煙久嗅損人肺氣時珍附方舊二新六吐血不止白薄紙五張燒灰水服效不可言普濟方衄血不止屏風上故紙燒灰酒服一錢即止普濟方皮膚血濺出者以煮酒罈上紙扯碎如楊花攤在出血處按之即止王璆百一選方血痢不止白紙三張裹鹽一匙燒赤研末分三服米飲下聖惠方月經不絶來無時者案紙三十張燒灰清酒半升和服頓定冬月用暖酒服之劉禹錫傳信方産後血暈上方服之立驗已斃經一日者去板齒灌之亦活諸蟲入耳以紙塞耳鼻留蟲入之耳不塞閉口勿言少頃蟲當出也集玄方老小尿床白紙一張鋪席下待遺於上取紙曬燒酒服集簡方青紙綱目主治妒精瘡以唾黏貼數日即愈且護痛也彌久者良上有青黛殺蟲解毒時珍印紙拾遺主治令婦人斷産無子剪有印處燒灰水服一錢匕效藏器桐油傘紙綱目主治蛀干陰瘡燒灰出火毒一夜敷之便結痂時珍附方新一疔瘡發汗千年石灰炒十分舊黑傘紙燒灰一分每用一小匙先以齏水些少次傾香油些少入末攪勻沸湯一盞調下厚被蓋之一時大汗出也醫方捷徑歷日綱目集解時珍曰太昊始作歷日是有書禮記十二月天子頒朔於諸侯主治邪瘧用隔年全歷端午午時燒灰糊丸梧子大發日早用無根水下五十丸衛生易簡方鍾馗綱目集解時珍曰逸史云唐高祖時鍾馗應舉不第觸階而死後明皇夢有小鬼盜玉笛一大鬼破帽藍袍捉鬼啖之上問之對曰臣終南山進士鍾馗也蒙賜袍帶之葬誓除天下虛耗之鬼乃命吳道子圖象傳之天下時珍謹按爾雅云鍾馗菌名也考工記注云終葵椎名也菌似椎形椎似菌形故得同稱俗畫神執一椎擊鬼故亦名鍾馗好事者因作鍾馗傳言是未第進士能啖鬼遂成故事不知其訛矣主治辟邪止瘧時珍附方新二婦人難産鍾馗左腳燒灰水服楊起簡便方鬼瘧來去畫鍾馗紙燒灰二錢阿魏砒霜丹砂各一皂子大為末寒食麵和丸小豆大每服一丸發時冷水下正月十五日五月初五日修合聖濟録桃符藥性集解時珍曰漢舊儀云東海度朔山有大桃蟠屈千里其北有鬼門二神守之曰神荼鬱壘主領衆鬼黃帝因立桃板於門畫二神以御凶鬼典術云桃乃西方之木五木之精仙木也味辛氣惡故能厭伏邪氣制百鬼今人門上用桃符辟邪以此也主治中惡精魅邪氣煮汁服甄權發明時珍曰錢乙小兒方有桃符丸疏取積熱及結胸用巴豆霜黃柏大黃各一錢一字輕粉硇砂各半錢為末麵糊丸粟米大量大小用桃符湯下無則以桃枝代之蓋桃性快利大腸兼取厭伏邪惡之義耳桃橛拾遺釋名桃杙時珍曰橛音厥即杙也人多削桃木釘於地上以鎮家宅三載者尤良許慎云羿死於桃棓棓杖也故鬼畏桃而今人以桃梗作杙橛以闢鬼也禮記云王吊則巫祝以桃茢前引以闢不祥茢者桃枝作帚也博物志云桃根為印可以召鬼甄異傳云鬼但畏東南桃枝爾觀諸説則桃之闢鬼祟疰忤其來有由矣主治卒心腹痛鬼疰破血辟邪惡氣腹滿煮汁服之與桃符同功藏器風蟲牙痛燒取汁少少納孔中以蠟錮之時珍救月杖拾遺集解藏器曰即月食時救月擊物木也主治月蝕瘡及月割耳燒為灰油和敷之藏器乃治𧈟之神藥思邈撥火杖拾遺釋名火槽頭拾遺火柴頭時珍曰撥火之杖燒殘之柴同一理主治蠍螫以橫井上立愈其上立炭刮敷金瘡止血生肉帶之辟邪惡鬼帶火納水底取得水銀著出藏器止小兒驚忤夜啼時珍附方新一客忤夜啼用本家廚下燒殘火柴頭一個削平焦處向上硃砂書云撥火杖撥火杖天上五雷公差來作神將捉住夜啼鬼打殺不要放急急如律令書畢勿令人知安立床前腳下男左女右岣嶁神書吹火筒綱目主治小兒陰被蚯蚓呵腫令婦人以筒吹其腫處即消時珍鑿柄木拾遺釋名千椎草綱目主治難産取入鐵孔中木燒末酒服藏器刺在肉中燒末酒服二方寸匕思邈發明時珍曰女科有千椎草散用鑿柄承斧處打卷者燒灰淋汁飲李魁甫言其有驗此亦取下往之義耳附方新一反胃吐食千槌花一枚燒研酒服衛生易簡方鐵椎柄拾遺主治鬼打及強鬼排突人中惡者和桃奴鬼箭等作丸服之藏器時珍曰務成子治瘟疾鬼病螢火丸中亦用之銃楔綱目主治難産燒灰酒服又闢忤惡邪氣時珍刀鞘拾遺主治鬼打卒得取二三寸燒末水服腰刀者彌佳藏器馬鞭綱目釋名馬策時珍曰竹柄編革為之故鞭從革便策從竹朿會意主治馬汗氣入瘡或馬毛入瘡腫痛煩熱入腹殺人燒鞭皮末和膏敷之又治狐尿刺瘡腫痛取鞭稍二寸鼠屎二七枚燒研和膏敷之時珍箭笴及鏃拾遺釋名時珍曰揚雄方言云自關而東謂之矢自關而西謂之箭江淮之間謂之鏃劉熙釋名云矢又謂之鏑本曰足末曰栝體曰干旁曰羽主治婦人産後腹中癢密安所臥席下勿令婦知藏器刺傷風水刮箭下漆塗之又主疔瘡惡腫刮箭笴茹作炷灸二七壯時珍附方新一婦人難産外臺祕要用箭干三寸弓弦三寸燒末酒服方出崔氏小品方治難産飛生丸用故箭羽方見禽部鼯鼠下弓弩弦別録下品釋名時珍曰黃帝時始作弓有臂者曰弩以木為干以絲為弦氣味平無毒權曰微寒主治難産胞衣不出別録鼻衄及口鼻大衄不止取折弓弦燒灰同枯礬等分吹之即止時珍發明弘景曰産難取弓弩弦以縛腰及燒弩牙納酒中飲之皆取發放快速之義時珍曰弓弩弦催生取其速離也折弓弦止血取其斷絶也禮云男子生以桑弧蓬矢射天地四方示男子之事也巢元方論胎教云妊娠三月欲生男宜操弓矢乘牡馬孫思邈千金方云婦人始覺有孕取弓弩弦一枚縫袋盛帶左臂上則轉女為男房室經云凡覺有娠取弓弩弦縛婦人腰下滿百日解卻此乃紫宮玉女祕傳方也附方新四胎動上逼弩弦繫帶之立下醫林集要胎滑易産弓弩弦燒末酒服二錢續十全方胞衣不出水煮弓弩弦飲汁五合或燒灰酒服千金方耳中有物不出用弓弩弦長三寸打散一頭塗好膠拄著耳中徐徐黏引出聖惠方紡車弦綱目主治坐馬癰燒灰敷之時珍凡人逃走取其發於緯車上逆轉之則迷亂不知所適藏器梭頭拾遺主治失音不語病吃者刺手心令痛即語男左女右藏器連枷關綱目主治轉胞小便不通燒灰水服時珍千金方楤擔尖綱目主治腸癰已成取少許燒灰酒服當作孔出膿血愈思邈梳篦拾遺釋名櫛時珍曰劉熙釋名云梳其齒疏通也篦其齒細密相比也櫛其齒連節也赫連氏始作之主治蝨病煮汁服之蝨病是活蝨入腹為病如癥瘕者藏器主小便淋瀝乳汁不通霍亂轉筋噎塞時珍附方新八齧蝨成症山野人好齧蝨在腹生長為蝨症用敗梳敗篦各一枚各破作兩分以一分燒研以一分用水五升煮取一升調服即下出千金方霍亂轉筋入腹痛用敗木梳一枚燒灰酒服永瘥千金方噎塞不通寡婦木梳一枚燒灰煎鎖匙湯調下二錢生生編小便淋痛多年木梳燒存性空心冷水服男用女女用男救急方發哽咽中舊木梳燒灰酒服之集玄方乳汁不行內服通乳藥外用木梳梳乳周回百餘遍即通儒門事親方猘犬咬傷故梳一枚銼韭根一兩切水二升煮一升頓服外臺祕要蜂蠆叮螫油木梳炙熱尉之救急方針線袋拾遺主治痔瘡用二十年者取袋口燒灰水服又婦人産後腸中癢不可忍密安所臥褥下勿令知之凡人在牢獄日經赦得出就於囚枷上取線為囚縫衣令人犯罪經恩也藏器蒲扇拾遺釋名箑時珍曰上古以羽為扇故字從羽後人以竹及紙為箑故字從竹揚雄方言云自關而東謂之箑自關而西謂之扇東人多以蒲為之嶺南以蒲葵為之主治敗蒲扇灰和粉粉身止汗彌敗者佳新造屋柱下四隅埋之蚊永不入藏器燒灰酒服一錢止盜汗及婦人血崩月水不斷時珍蒲席別録下品釋名薦弘景曰蒲席惟船家用之狀如蒲帆人家所用席皆是菅草而薦多是蒲也方家燒用恭曰席薦皆人所臥以得人氣為佳不論薦席也青齊間人謂蒲薦為蒲席亦曰蒲篕音合謂藁作者為薦山南江左機上織者為席席下重厚者為薦時珍曰席薦皆以蒲及稻藁為之有精粗之異吳人以龍鬚草為席主治敗蒲席平主筋溢惡瘡別録單用破血從高墜下損瘀在腹刺痛取久臥者燒灰酒服二錢或以蒲黃當歸大黃赤芍藥朴硝煎湯調服血當下甄權編薦索燒研酒服二指撮治霍亂轉筋入腹藏器寡婦薦治小兒吐利霍亂取二七莖煮汁服藏器附方舊三新三霍亂轉垂死者敗蒲席一握切漿水一盞煮汁溫服聖惠方小便不利蒲席灰七分滑石三分為散飲服方寸匕日三金匱要略婦人血奔舊敗蒲席燒灰酒服二錢勝金方五色丹遊多致殺人蒲席燒灰和雞子白塗之良千金翼癰疽不合破蒲席燒灰臘月豬脂和納孔中千金方夜臥尿床本人薦草燒灰水服立瘥千金方簟綱目釋名籧篨筕簹筍席時珍曰簟可延展故字從竹覃覃延長也主治蜘蛛尿蠼螋尿瘡取舊者燒灰敷之時珍附方新一小兒初生吐不止者用籧篨少許同人乳二合鹽二粟許煎沸入牛黃粟許與服此劉五娘方也外臺祕要簾箔宋嘉祐釋名時珍曰其形方廉而薄故曰簾曰簿以竹及葦芒編成其帛幕曰㡩藏器曰今東人多以芒草為箔入藥用彌久著煙者佳敗芒箔主治無毒主産婦血滿腹脹痛血渴惡露不盡月閉下惡血止好血去鬼氣疰痛癥結酒煮服之亦燒末酒服藏器箔經繩主治癰疽有膿不潰燒研和臘豬脂敷下畔即潰不須針灸時珍千金方廁屋戶簾主治小兒霍亂燒灰飲服一錢時珍外臺祕要漆器綱目主治産後血暈燒煙燻之即蘇又殺諸蟲時珍附方新三血崩不止漆器灰棕灰各一錢柏葉煎湯下集簡方白禿頭瘡破硃紅漆器剝取漆朱燒灰油調敷之救急方蠍蠆螫傷漆木碗合螫處神驗不傳古今録驗方研朱石槌拾遺主治妒乳煮熱尉乳上以二槌更互用之數十遍熱徹取瘥藏器燈盞綱目釋名缸主治上元盜取富家燈盞置床下令人有子時珍韻府燈盞油綱目釋名燈窩油氣味辛苦有毒主治一切急病中風喉痹痰厥用鵝翎掃入喉內取吐即效又塗一切惡瘡疥癬時珍附方新二乳上生癰脂麻炒焦搗爛以燈盞內油腳調敷即散集玄方走馬喉痹詩云急喉腫痹最堪憂急取盛燈盞內油甚者不過三五呷此方原是至人留車脂宋開寶校正併入缸中膏釋名車轂脂綱目軸脂綱目轄脂綱目缸膏音公時珍曰轂即軸也轄即缸也乃裹軸頭之鐵頻塗以油則滑而不澀史記齊人嘲淳于髡為炙轂輠即此今云油滑是矣氣味辛無毒主治卒心痛中惡氣以熱酒服之中風發狂取膏如雞子大熱醋攪消服又主婦人妒乳乳癰取熬熱塗之並和熱酒服開寶去鬼氣溫酒煬熱服藏器治霍亂中蠱妊娠諸腹痛催生定驚除瘧消腫毒諸瘡時珍附方舊八新九中惡蠱毒車缸脂如雞子大酒化服千金方蛤蟆蠱病及蝌蚪蠱心腹脹滿痛口乾思水不能食悶亂大喘用車轄脂半斤漸漸服之其蠱即出聖惠方霍亂轉筋入腹痛車轂中脂塗足心千金方少小腹脹車轂中脂和輪下土如彈丸吞之立愈千金方妊婦腹痛燒車缸脂末納酒中隨意飲千金方妊婦熱病車轄脂隨意酒服大良千金方婦人難産三日不出車軸脂吞大豆許二丸千金方婦人逆産車缸膏畫兒腳底即正開寶本草産後陰脫燒車缸頭脂納酒中服子母祕録小兒驚啼車軸脂小豆許納口中及臍中良千金方兒臍不合車轄脂燒灰敷之外臺祕要瘧疾不止不拘久近車軸垢水洗下面和丸彈子大作燒餅未發時食一枚發時又食一枚聖惠方瘭疽已潰車缸脂和梁上塵敷之外臺祕要灸瘡不瘥車缸脂塗之良千金方聤耳膿血綿裹車轄脂塞之外臺祕要諸蟲入耳車缸脂塗孔中自出梅師方針刺入肉車脂攤紙上如錢大貼上二日一易三五次即出集玄方敗船茹音如別録下品集解弘景曰此是大艑𦪙刮竹茹以補漏處者時珍曰古人以竹茹今人只以麻筋和油石灰為之主治平療婦人崩中吐血痢血不止別録治金瘡刮敗船茹灰敷之功同牛膽石灰蘇頌附方舊一新二婦人遺尿船故茹為末酒服三錢千金方月水不斷船茹一斤淨洗河水四升半煮二升半分二服千金方婦人尿血方同上故木砧拾遺釋名百味拾遺㭢幾几上屑主治吻上饞瘡燒末敷之藏器砧上垢主治卒心腹痛又凡人病後食勞復取當時來參病人行止腳下土一錢許男左女右和垢及鼠頭一或鼠屎三七枚煮服神效藏器乾霍亂不吐不利煩脹欲死或轉筋入腹取屠兒幾垢一雞子大溫酒調服得吐即愈又主唇瘡耳瘡蟲牙時珍附方新二唇緊瘡裂屠幾垢燒存性敷之千金方小兒耳瘡屠几上垢敷之千金方杓音妁拾遺釋名時珍曰木曰杓瓠曰瓢杓者勺也瓢者漂也主治人身上結筋打之三下自散藏器瓠瓢見菜部箸拾遺釋名箸時珍曰古箸以竹故字從竹近人兼用諸木及象牙為之矣主治吻上咽口瘡取箸頭燒灰敷之又狂狗咬者乞取百家箸煎汁飲藏器咽喉痹塞取漆箸燒煙含咽煙氣入腹發咳即破時珍甑別録下品校正併入拾遺瓦甑故甑蔽集解時珍曰黃帝始作甑釜北人用瓦甑南人用木甑夷人用竹甑術家云凡甑鳴釜鳴者不得驚怖但男作女拜女作男拜即止亦無殃咎感應類從志云瓦甑之契投梟自止注云取故甑書契字置牆上有梟鳴時投之自止也瓦甑主治魘寐不寤取覆人面疾打破之藏器甑垢一名陰膠主治口舌生瘡刮敷之時珍發明時珍曰雷氏炮炙論序云知瘡所在口點陰膠注云取甑中氣垢少許於口中即知臟腑所起直徹至患處知痛所在可醫也甑帶氣味辛溫無毒主治煮汁服除腹脹痛脫肛胃反小便失禁不通及淋中惡尸注燒灰封金瘡止血止痛出刃蘇恭主大小便不通瘧疾婦人帶下小兒臍瘡重舌夜啼癜風白駁時珍發明志曰江南以蒲為甑帶取久用敗爛者用之取其久被蒸氣故能散氣也附方舊五新六小便不通以水四升洗甑帶取汁煮葵子二升半分三服聖惠方大小便閉甑帶煮汁和蒲黃方寸匕服日三次千金方五色帶下甑帶煮汁溫服一盞日二服千金方小兒下血甑帶灰塗乳上飲之外臺祕要小兒夜啼甑帶懸戶上即止子母祕録小兒重舌甑帶燒灰敷舌下聖惠方小兒鵝口方同上小兒臍瘡甑帶燒灰敷之子母祕録五色丹毒甑帶燒灰雞子白和塗之衛生易簡方沙芒眯目甑帶灰水服一錢外臺祕要草石在咽不出方同上故甑蔽拾遺或作閉氣味無毒主治主石淋燒研水服三指撮又主盜汗藏器燒灰水服三撮治喉閉咽痛及食復下死胎時珍發明時珍曰甑蔽通氣理似優於甑帶雷氏炮炙論序云弊箄淡滷注云常使舊甑中箄能淡鹽味此物理之相感也附方新二胎死腹中及衣不下者取炊蔽戶前燒末水服即下千金方骨疽出骨愈而復發骨從孔中出宜瘡上灸之以烏雌雞一隻去肉取骨燒成炭以三家甑蔽三家砧木刮屑各一兩皆燒存性和導瘡中碎骨當出盡而愈千金方鍋蓋綱目主治牙疳陰疳取黑垢同雞䏶胵黃皮灰蠶繭灰枯礬等分為末米泔洗後頻敷之時珍飯籮拾遺釋名筐藏器曰以竹為之南方人謂之筐主治時行病後食勞復燒取方寸匕水服藏器蒸籠綱目主治取年久竹片同弊帚扎縛草舊麻鞋底系及蛇蛻皮燒灰擦白癜風時珍聖惠方炊單布綱目主治墜馬及一切筋骨傷損張仲景方中用之時珍發明時珍曰按王璆百一選方云一人因開甑熱氣蒸麵即浮腫眼閉一醫以意取久用炊布燒灰存性為末隨敷隨消蓋此物受湯上之氣多故用此引出湯毒亦猶鹽水取鹹味以類相感也故炊帚拾遺主治人面生白駁以月食夜和諸藥燒灰苦酒調敷之藏器弊帚綱目釋名彗時珍曰許慎説文云帚從手持巾以掃除也竹帚曰彗凡竹枝荊苕黍秫茭蒲芒草落帚之類皆可為帚也主治白駁癩風燒灰入藥時珍附方新二白駁風弊帚弊帛履底甑帶脯臘蟬頸蛇皮等分以月食時合燒為末酒服方寸匕日三服仍以醇醋和塗之忌食發風物此乃徐王方也古今録驗身面疣目每月望子時以禿帚掃疣目上三七遍聖惠方簸箕舌綱目釋名時珍曰簸揚之箕也南人用竹北人用杞柳為之主治重舌出涎燒研酒服一錢又主月水不斷時珍千金方聖惠方附方新一催生簸箕淋水一盞飲數口集玄方竹籃拾遺釋名藏器曰竹器也主治取耳燒灰敷狗咬瘡藏器魚笱綱目釋名時珍曰徐堅初學記云取魚之器曰笱音苟曰𥰣音留曰罛音孤曰篧音罩曰罺音抄主治舊笱須療魚骨哽燒灰粥飲服方寸匕時珍肘後方魚網拾遺釋名罟時珍曰易云庖犧氏結繩而為網罟以畋以漁蓋取諸離主治魚骨哽者以網覆頸或煮汁飲之當自下藏器亦可燒灰水服或乳香湯服甚者並進三服時珍草麻繩索綱目釋名時珍曰小曰索大曰繩主治大腹水病取三十枚去皮研水三合旦服日中當吐下水汁結囊若不盡三日後再作未盡更作瘥後禁水飲咸物時珍附方新二斷瘟不染以繩度所住戶中壁屈繩結之即不染也肘後方消渴煩躁取七家井索近瓶口結處燒灰新汲水服二錢不過三五服效聖惠方馬絆繩綱目主治煎水洗小兒癇蘇恭燒灰摻鼻中瘡時珍縛豬繩綱目主治小兒驚啼發歇不定用臘月者燒灰水服少許藏器牛鼻桊音卷綱目釋名時珍曰穿牛鼻繩木也主治木桊主小兒癇草桊燒研敷小兒鼻下瘡別録草桊灰吹喉風有效木桊煮汁或燒灰酒服治消渴時珍附方新二消渴飲水牛鼻木二個男用牝牛女用牡牛者洗銼人參甘草各半兩大白梅十個水四碗煎三碗熱服甚妙普濟方冬月皸裂牛鼻繩末和五倍子末填入薄紙貼之救急方廁籌拾遺主治難産及霍亂身冷轉筋於床下燒取熱氣徹上亦主中惡鬼氣此物最微其功可録藏器附方新二小兒驚竄兩眼看地不上者皂角燒灰以童尿浸刮屎柴竹用火烘乾為末貼其囟門即蘇王氏小兒方小兒齒遲正旦取尿坑中竹木刮塗之即生聖惠方尿桶綱目舊板主治霍亂吐利煎水服山村宜之時珍如宜方舊箍主治腳縫搔癢或瘡有竅出血不止燒灰敷之年久者佳時珍
