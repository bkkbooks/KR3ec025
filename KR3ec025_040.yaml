body:
  text: 蟲部第四十卷蟲之二卵生類下二十二種青蚨拾遺釋名蚨蟬蟱蝸音謀瓜𧑒𧍪音敦隅蒲虻音萌魚父魚伯集解藏器曰青蚨生南海狀如蟬其子著木取以塗錢皆歸本處搜神記云南方有蟲名𧑒𧍪形大如蟬辛美可食子著草葉上如蠶種取其子則母飛來雖潛取之亦知其處殺其母塗錢以子塗貫用錢去則自還淮南子萬畢術云青蚨還錢高誘注云青蚨一名魚父魚伯以其子母各等置甕中埋東行陰垣下三日開之即相從以母血塗八十一錢子血塗八十一錢留子用母留母用子皆自還也李珣曰按異物志言𧑒𧍪生南海諸山雄雌常處不相舍青金色人採得以法末之用塗錢以貨易於人晝用夜歸又能祕精縮小便亦人間難得之物也時珍曰按異物志云青蚨形如蟬而長其子如蝦子著草葉上得其子則母飛來煎食甚辛而美岣嶁神書云青蚨一名蒲虻似小蟬大如虻青色有光生於池澤多集蒲葉上春生子於蒲上八八為行或九九為行如大蠶子而圓取其母血及火炙子血塗錢市物仍自還歸用之無窮誠仙術也其說俱倣佛但藏器雲子著木上稍有不同而許氏說文亦曰青蚨水蟲也蓋水蟲而産子於草木爾氣味辛溫無毒主治補中益陽道去冷氣令人悅澤藏器祕精縮小便海藥附録龐降時珍曰按劉恂嶺表録異云龐降生於嶺南多在橄欖樹上形如蜩蟬腹青而薄其名自呼但聞其聲而鮮能得之人以善價求為媚藥按此形狀似蟬可為媚藥與李珣海藥青蚨雌雄不捨祕精之說相符恐亦青蚨之類在木上者也蛺蝶綱目釋名𧌄蝶𧌄音葉蝴蝶時珍曰蛺蝶輕薄夾翅而飛枼枼然也蝶美於須蛾美於眉故又名蝴蝶俗謂須為胡也集解時珍曰蝶蛾類也大曰蝶小曰蛾其種甚繁皆四翅有粉好嗅花香以須代鼻其交以鼻交則粉退古今注謂橘蠹化蝶爾雅翼謂菜蟲化蝶列子謂烏足之葉化蝶埤雅謂蔬菜化蝶酉陽雜俎謂百合花化蝶北戶録謂樹葉化蝶如丹青野史謂彩裙化蝶皆各據其所見者而言爾蓋不知蠹蠋諸蟲至老俱各蛻而為蝶為蛾如蠶之必羽化也朽衣物亦必生蟲而化草木花葉之化者乃氣化風化也其色亦各隨其蟲所食花葉及所化之物色而然楊慎丹鉛録云有草蝶水蝶在水中嶺南異物志載有人浮南海見蛺蝶大如蒲帆稱肉得八十斤啖之極肥美氣味缺主治小兒脫肛陰乾為末唾調半錢塗手心以瘥為度時珍發明時珍曰蝴蝶古方無用者惟普濟方載此方治脫肛亦不知用何等蝶也蜻蛉別録下品釋名蜻虰音丁蜻蝏亦作蜓虰蛵音馨負勞爾雅䗓音匆諸乘弘景紗羊綱目赤者名赤卒時珍曰蜻䗓言其色青蔥也蛉虰言其狀伶仃也或云其尾如丁也或云其尾好亭而挺故曰蝏曰蜓俗名紗羊言其翅如紗也按崔豹古今注云大而色青者曰蜻蜓小而黃者江東名胡黎淮南名䗧蛜鄱陽名江雞小而赤者名曰赤卒曰絳騶曰赤衣使者曰赤辨丈人大而玄紺者遼海名紺蠜亦曰天雞陶氏謂胡黎為蜻蛉未考此耳集解弘景曰蜻蛉有五六種惟青色大眼一名諸乘俗呼為胡黎者入藥道家云眼可化為青珠其餘黃細及黑者不入藥保升曰所在有之好飛水際六足四翼宗奭曰蜻蜓中一種最大汴人呼為馬大頭者是也身緑色其雌者腰間有碧色一遭入藥用雄者此物生於水中故多飛水上其類眼皆大陶氏獨言蜻蜓眼大何也時珍曰蜻蛉大頭露目短頸長腰軃尾翼薄如紗食蚊虻飲露水造化權輿云水蠆化䗓羅願云水蠆化蜻蛉蜻蛉仍交於水上附物散卵復為水蠆也張華博物志亦言五月五日埋蜻蛉頭於戶內可化青珠未知然否古方惟用大而青者近時房中術亦有用紅色者崔豹云遼海間有紺蠜蟲如蜻蛉而玄紺色六七月群飛暗天夷人食之雲海中青蝦所化也雲南志云瀾滄蒲蠻諸地凡土蜂蜻蛉蚱蜢之類無不食之也氣味微寒無毒主治強陰止精別録壯陽暖水臟日華樗雞本經中品釋名紅娘子綱目灰花蛾時珍曰其鳴以時故得雞名廣雅作樗鳩廣志作犨雞皆訛矣其羽文彩故俗呼紅娘子灰花蛾云集解別録曰生河內川穀樗樹上七月採曝乾弘景曰今出梁州形似寒螿而小樗樹似漆而臭亦猶芫青亭長在芫葛上也恭曰河內無此今出岐州此有二種以五色具者為雄入藥良其青黑質白斑者是雌不入藥宗奭曰汴洛諸界尤多形類蠶蛾但腹大頭足微黑翅兩重外一重灰色內一重深紅五色皆具頌曰爾雅云螒天雞郭璞注云小蟲也黑身赤頭一名莎雞又曰樗雞然今之莎雞生樗木上六月中出飛而振羽索索作聲人或蓄之樊中但頭方腹大翅羽外青內紅而身不黑頭不赤此殊不類郭說樗上一種頭翅皆赤者乃如舊說人呼為紅娘子然不名樗雞疑即是此蓋古今之稱不同爾時珍曰樗即臭椿也此物初生頭方而扁尖喙向下六足重翼黑色及長則能飛外翼灰黃有斑點內翅五色相間其居樹上布置成行秋深生子在樗皮上蘇恭寇宗奭之說得之蘇頌引郭璞以為莎雞者誤矣莎雞居莎草間蟋蟀之類似蝗而斑有翅數重下翅正赤六月飛而振羽有聲詳見陸璣毛詩疏義而羅願爾雅翼以莎雞為絡緯即俗名紡絲者修治時珍曰凡使去翅足以糯米或用麵炒黃色去米面用氣味苦平有小毒不可近目別録主治心腹邪氣陰痿益精強志生子好色補中輕身本經腰痛下氣強陰多精別録通血閉行瘀血宗奭主瘰癧散目中結翳辟邪氣療猘犬傷時珍發明弘景曰方藥稀用為大麝香丸用之時珍曰古方闢瘟殺鬼丸中用之近世方中多用蓋厥陰經藥能行血活血也普濟方治目翳撥雲膏中與芫青斑蝥同用亦是活血散結之義也附方新四子宮虛寒杏林摘要云婦人無子由子宮虛寒下元虛月水不調或閉或漏或崩中帶下或産後敗血未盡內結不散用紅娘子六十枚大黃皂莢葶藶各一兩巴豆一百二十枚為末棗肉為丸如彈子大以綿裹留系用竹筒送入陰戶一時許發熱渴用熟湯一二盞解之後發寒靜睡要安三日方取出每日空心以雞子三枚胡椒末二分炒食酒下以補之久則子宮暖矣瘰癧結核用紅娘子十四枚乳香砒霜各一錢硇砂一錢半黃丹五分為末糯米粥和作餅貼之不過一月其核自然脫下矣衛生易簡方瘋狗咬傷不治即死用紅娘子二個斑蝥五個並去翅足若四十歲各加一個五十歲各加二個青娘子三個去翅足四十歲加一個五六十歲加二個海馬半個續隨子一分乳香沉香桔梗各半分酥油少許為末十歲者作四服十五歲作三服二十歲作二服三十歲作一服談野翁方橫痃便毒雞子一個開孔入紅娘子六個紙包煨熟去紅娘子食雞子以酒下小便淋瀝出濃血即愈陸氏積德堂方棗貓綱目集解時珍曰棗貓古方無考近世方廣丹溪心法附余治小兒方用之注云生棗樹上飛蟲也大如棗子青灰色兩角採得陰乾用之氣味缺主治小兒臍風時珍曰按方廣云小兒初生以綿裹臍帶離臍五六寸扎定咬斷以鵝翎筒送藥一二分入臍大孔輕輕揉散以艾炷灸臍頭三壯結住勿打動候其自落永無臍風之患萬不失一臍硬者用之軟者無病不必用也其法用陰乾棗貓兒研末三個真珠槌研四十九粒炒黃丹白枯礬蛤粉血竭各五分研勻如上法用臍有三孔一大二小也斑蝥本經下品校正陳藏器螌蝥蟲系重出今併為一釋名斑蝥本經龍尾同上螌蝥蟲拾遺龍蠔音刺斑蠔時珍曰斑言其色蝥刺言其毒如矛刺也亦作螌蝥俗訛為斑蝥又訛斑蠔為斑尾也吳普本草又名斑菌曰腃發曰晏青集解別録曰斑蝥生河東川穀八月取陰乾吳普曰生河內川穀亦生水石保升曰斑蝥所在有之七八月大豆葉上甲蟲也長五六分黃黑斑紋烏腹尖喙就葉上採取陰乾用弘景曰此一蟲五變主療皆相似二三月在芫花上即呼為芫青四五月在王不留行草上即呼為王不留行蟲六七月在葛花上即呼為葛上亭長八九月在豆花上即呼為斑蝥九月十月復還地蟄即呼為地膽此是僞地膽耳為療猶同也其斑蝥大如巴豆甲上有黃黑斑點芫青青黑色亭長身黑頭赤斆曰芫青斑蝥亭長赤頭四件樣各不同所居所食所效亦不同芫青嘴尖背上有一畫黃在芫花上食汁斑蝥背上一畫黃一畫黑嘴尖處有一小赤點在豆葉上食汁亭長形黃黑在葛葉上食汁赤頭身黑額上有大紅一點也頌曰四蟲皆是一類但隨時變耳深師方云四月五月六月為葛上亭長七月為斑蝥九月十月為地膽今醫家知用芫青斑蝥而地膽亭長少使故不得詳也恭曰本草古今諸方並無王不留行蟲若陶氏所言則四蟲專在一處今地膽出豳州芫青出寧州亭長出雍州斑蝥所在皆有四蟲出四處可一歲周遊四州乎芫青斑蝥形段相似亭長地膽狀貌大殊且豳州地膽三月至十月採自草菜上非地中取陶蓋浪言爾時珍曰按本經別録四蟲採取時月正與陶說相合深師方用亭長所注亦同自是一類隨其所居所出之時而命名爾蘇恭強闢陶說亦自缺明按太平御覽引神農本草經云春食芫花為芫青夏食葛花為亭長秋食豆花為斑蝥冬入地中為地膽黑頭赤尾其說甚明而唐宋校正者反失收取更致紛紜何哉陶氏之王不留行蟲雷氏之赤頭方藥未有用者要皆此類固可理推余見地膽修治斆曰凡斑蝥芫青亭長地膽修事並用糯米小麻子相拌炒至米黃黑色取出去頭足兩翅以血餘裹懸東牆角上一夜至明用之則毒去也大明曰入藥須去翅足糯米炒熟不可生用即吐瀉人時珍曰一法用麩炒過醋煮用之也氣味辛寒有毒普曰神農辛岐伯咸扁鵲甘有大毒馬刀為之使畏巴豆丹參空青惡膚青甘草豆花時珍曰斑蝥芫青亭長地膽之毒靛汁黃連黑豆蔥茶皆能解之主治寒熱鬼疰蠱毒鼠瘻惡瘡疽蝕死肌破石癃本經血積傷人肌治疥癬墮胎別録治瘰癧通利水道甄權療淋疾敷惡瘡瘻爛日華治疝瘕解疔毒猘犬毒沙蝨毒蠱毒輕粉毒時珍發明宗奭曰妊娠人不可服之為潰人肉治淋方多用極苦人須斟酌之時珍曰斑蝥人獲得之尾後惡氣射出臭不可聞故其入藥亦專主走下竅直至精溺之處蝕下敗物痛不可當葛氏云凡用斑蝥取其利小便引藥行氣以毒攻毒是矣楊登甫云瘰癧之毒莫不有根大抵以斑蝥地膽為主制度如法能使其根從小便中出或如粉片或如血塊或如爛肉皆其驗也但毒之行小便必澀痛不可當以木通滑石燈心輩導之又葛洪肘後方云席辨刺史傳云凡中蠱毒用斑蝥蟲四枚去翅足炙熟桃皮五月初五日採取去黑皮陰乾大戟去骨各為末如斑蝥一分二味各用二分合和棗核大以米清飲服之必吐出蠱一服不瘥十日更服此蠱洪州最多有老嫗解療之一人獲縑二十匹祕方不傳後有子孫犯法黃華公若於則時為都督因而得之也附方舊六新九內消瘰癧不拘大人小兒經驗方用斑蝥一兩去翅足以粟一升同炒米焦去米不用入干薄荷四兩為末烏雞子清丸如緑豆大空心臘茶下一丸加至五丸卻每日減一丸減至一丸後每日五丸以消為度廣利治瘰癧經久不瘥用斑蝥一枚去翅足微炙以漿水一盞空腹吞之用蜜水亦可重者不過七枚瘥也瘻瘡有蟲八月中多取斑蝥以苦酒浸半日曬乾每用五個銅器炒熟為末巴豆一粒黃犬背上毛二七根炒研硃砂五分同和苦酒頓服其蟲當盡出也癰疽拔膿癰疽不破或破而腫硬無膿斑蝥為末以蒜搗膏和水一豆許貼之少頃膿出即去藥直指疔腫拔根斑蝥一枚捻破以針劃瘡上作米字形樣封之即出根也外臺血疝便毒不拘已成未成隨即消散斑蝥三個去翅足炒滑石三錢同研分作三服空心白湯下日一服毒從小便出如痛以車前木通澤瀉豬苓煎飲名破毒飲甚效東垣方積年癬瘡外臺用斑蝥半兩微炒為末蜜調敷之永類用斑蝥七個醋浸露一夜搽之面上㾦㿔大風面上有紫㾦㿔未消用干斑蝥末以生油調敷約半日㾦㿔脹起以軟帛拭去藥以棘針挑破近下令水出干不得剝其瘡皮及不可以藥近口眼若是尖㾦㿔子即勿用此別用膽礬末合藥以治之聖濟總録疣痣黑子斑蝥三個人言少許以糯米五錢炒黃去米入蒜一個搗爛點之瘋狗咬傷衛生易簡方云此乃九死一生之病急用斑蝥七枚以糯米炒黃去米為末酒一盞煎半盞空心溫服取下小肉狗三四十枚為盡如數少數日再服七次無狗形永不再發也纍試纍驗醫方大成用大斑蝥三七枚去頭翅足用糯米一勺略炒過去斑蝥別以七枚如前炒色變復去之別以七枚如前至青煙為度去蝥只以米為粉用冷水入清油少許空心調服須臾再進一服以小便利下毒物為度如不利再進利後肚疼急用冷水調青靛服之以解其毒否則有傷黃連水亦可解之但不宜服一切熱物也中沙蝨毒斑蝥二枚一枚末服一枚燒至煙盡研末敷瘡中立瘥肘後塞耳治聾斑蝥炒二枚生巴豆去皮心二枚杵丸棗核大綿裹塞之聖惠方妊娠胎死斑蝥一枚燒研水服即下廣利方芫青別録下品釋名青娘子時珍曰居芫花上而色青故名芫青世俗諱之呼為青娘子以配紅娘子也集解別録曰三月取曝乾弘景曰二月三月在芫花上花時取之青黑色恭曰出寧州頌曰處處有之形似斑蝥但色純青緑背上一道黃紋尖喙三四月芫花發時乃生多就芫花上採之曝乾時珍曰但連芫花莖葉採置地上一夕儘自出也余見斑蝥修治見斑蝥氣味辛微溫有毒時珍曰芫青之功同斑蝥而毒尤猛蓋芫花有毒故也畏惡同斑蝥主治蠱毒風疰鬼疰墮胎別録治鼠瘻弘景主疝氣利小水消瘰癧下痰結治耳聾目翳猘犬傷毒余功同斑蝥時珍附方新三偏墜疼痛青娘子紅娘子各十枚白麵拌炒黃色去前二物熟湯調服立效也談野翁方目中頑翳發背膏用青娘子紅娘子斑蝥各二個去頭足麵炒黃色硼砂一錢蕤仁去油五個為末每點少許日五六次仍同春雪膏點之膏見黃連下普濟方塞耳治聾芫青巴豆仁萆麻仁各一枚研丸棗核大綿包塞之聖惠方葛上亭長別録下品釋名弘景曰此蟲黑身赤頭如亭長之著玄衣赤幘故名也集解別録曰七月取曝乾弘景曰葛花開時取之身黑頭赤腹中有卵白如米粒恭曰出雍州保升曰處處有之五六月葛葉上採之形似芫青而蒼黑色斆曰亭長形黑黃在葛上食蔓膠汁又有赤頭身黑色額上有大紅一點各有用處時珍曰陶言黑身赤頭故名亭長而雷氏別出赤頭不言出處似謬修治同斑蝥氣味辛微溫有毒惡畏同斑蝥主治蠱毒鬼疰破淋結積聚墮胎別録通血閉症塊鬼胎余功同斑蝥時珍發明頌曰深師療淋用亭長說之最詳云取葛上亭長折斷腹腹中有白子如小米三二分安白板上陰乾燥二三日收之若有人患十年淋服三枚八九年以還服二枚服時以水如棗許著小杯中爪甲研之當扁扁見於水中仰面吞之勿令近牙齒間藥雖微小下喉自覺當至下焦淋所有頃藥大作煩急不可堪者飲干麥飯汁則藥勢止也若無干麥飯但水亦可耳老小服三分之一當下淋疾如膿血連連爾石去者或如指頭或青或黃不拘男女皆愈若藥不快淋不下以意節度更增服之此蟲四月五月六月為亭長頭赤身黑七月為斑蝥九月十月為地膽隨時變耳附方新二經脈不通婦人經脈不通症塊脹滿腹有鬼胎用葛上亭長五枚以糙米和炒去翅足研末分三服空心甘草湯下須臾覺臍腹急痛以黑豆煎湯服之當通聖惠方肺風白癩葛上亭長四七枚去翅足與糯米同炒米熟為度不用米干蝮蛇一枚頭尾全者炙黃去鱗及腹中物共搗羅生絹袋貯以酒五升瓷瓶中慢火煅煮酒及一升以下將綿囊蘸藥汁摩塗癩上日二夜一如不急痛日夜可五七次塗之聖濟總録地膽本經下品釋名蚖青本經青蠵攜弘景曰地膽是芫青所化故亦名蚖青用蚖字者亦承誤爾時珍曰地膽者居地中其色如膽也按太平御覽引爾雅云地膽地要青蠵也又引吳普本草云地膽一名杜龍一名青虹陶弘景以蠵字為蛙字音烏媧切者誤矣宋本因之今俱釐政也集解別録曰生汶山川穀八月取之弘景曰真地膽出梁州狀如大螞蟻有翼僞者是斑蝥所化狀如大豆大抵療體略同亦難得真耳恭曰形如大螞蟻者今出邠州三月至十月草萊上採之非地中也狀如大豆者未見之陶亦浪證爾保升曰二月三月八月九月草萊上取之形倍黑色芫青所化也時珍曰今處處有之在地中或牆石內蓋芫青亭長之類冬月入蟄者狀如斑蝥蘇恭未見反非陶說非也本經別名芫青尤為可證既曰地膽不應覆在草萊上矣蓋芫青青緑色斑蝥黃斑色亭長黑身赤頭地膽黑頭赤尾色雖不同功亦相近修治同斑蝥氣味辛寒有毒主治鬼疰寒熱鼠瘻惡瘡死肌破癥瘕墮胎本經蝕瘡中惡肉鼻中息肉散結氣石淋去子服一刀圭即下別録宣拔瘰癧根從小便中出上亦吐出又治鼻齆藥性治疝積疼痛余功同斑蝥時珍發明頌曰今醫家多用斑蝥芫青而稀用亭長地膽蓋功亦相類耳時珍曰按楊氏直指方云有癌瘡顆顆纍垂裂如瞽眼其中帶青由是簇頭各露一舌毒深穿孔男則多發於腹女則多發於乳或項或肩令人昏迷急宜用地膽為君佐以白牽牛滑石木通利小便以宣其毒更服童尿灌滌餘邪乃可得安也附方新三小腸氣痛地膽去翅足頭微炒硃砂各半兩滑石一兩為末每苦杖酒食前調服二錢即愈宣明鼻中息肉地膽生研汁灌之乾者酒煮取汁又方細辛白芷等分為末以生地膽汁和成膏每用少許點之取消為度並聖惠方蜘蛛別録下品釋名次𧋌音秋爾雅蠾蝓屬俞方言䖦蟱亦作蝃蝥音拙謀時珍曰按王安石字說云設一面之網物觸而後誅之知乎誅義者故曰蜘蛛爾雅作鼅蛛從黽黽者大腹也揚雄方言云自關而東呼為蠾蝓侏儒語轉也北燕朝鮮之間謂之蝳蜍齊人又呼為社公䖦蟱見下集解弘景曰蜘蛛數十種今入藥惟用懸網如魚罾者亦名䖦蟱赤斑者俗名絡新婦亦入方術家用其餘並不入藥頌曰蜘蛛處處有之其類極多爾雅云次𧋌鼅蛛蝃蝥也土鼅蛛草鼅蛛蠨蛸長踦郭璞注云今江東呼鼅蛛為蝃蝥長腳者俗呼為蟢子則陶云䖦蟱者即蝃蝥也藏器曰䖦蟱在孔穴中及草木上陶言即蜘蛛非矣斆曰凡五色者及大身有刺毛生者並薄小者並不入藥惟身小尻大腹內有蒼黃膿者為真取屋西結網者去頭足研膏用宗奭曰蜘蛛品多皆有毒今人多用人家檐角籬頭陋巷之間空中作圓網大腹深灰色者耳遺尿著人令人生瘡癬恭曰劍南山東為此蟲所齧瘡中出絲屢有死者時珍曰蜘蛛布網其絲右繞其類甚多大小顏色不一爾雅但分蜘蛛草土及蠨蛸四種而已蜘蛛齧人甚毒往往見於典籍按劉禹錫傳信方云判官張延賞為斑蜘蛛咬頸上一宿有二赤脈繞項下至心前頭面腫如數斗幾至不救一人以大藍汁入麝香雄黃取一蛛投入隨化為水遂以點咬處兩日悉愈又云貞元十年崔從質員外言有人被蜘蛛咬腹大如孕婦有僧教飲羊乳數日而平又李絳兵部手集云蜘蛛咬人遍身成瘡者飲好酒至醉則蟲於肉中似小米自出也劉郁西使記云赤木兒城有蟲如蛛毒中人則煩渴飲水立死惟飲葡萄酒至醉吐則解此與李絳所言蜘蛛毒人飲酒至醉則愈之意同蓋亦蜘蛛也鄭曉吾學編云西域賽藍地方夏秋間草生小黑蜘蛛甚毒齧人痛聲徹地土人誦咒以薄荷枝拂之又以羊肝遍擦其體經一日夜痛方止愈後皮脫如蛻牛馬被傷輒死也元稹長慶集云巴中蜘蛛大而毒甚者身邊數寸踦長數倍其身竹木被網皆死中人瘡痏痛癢倍常惟以苦酒調雄黃塗之仍用鼠負蟲食其絲盡則愈不急救之毒及心能死人也段成式酉陽雜俎云深山蜘蛛有大如車輪者能食人物若此數說皆不可不知淮南萬畢術言赤斑蜘蛛食豬肪百日殺以塗布雨不能濡殺以塗足可履水上抱朴子言蜘蛛水馬合馮夷水仙丸服可居水中皆方士幻誕之談不足信也氣味微寒有小毒大明曰無毒畏蔓青雄黃時珍曰蛛入飲食不可食主治大人小兒㿉及小兒大腹丁奚三年不能行者別録蜈蚣蜂蠆螫人取置咬處吸其毒弘景主蛇毒溫瘧止嘔逆霍亂蘇恭取汁塗蛇傷燒啖治小兒腹疳蘇頌主口喎脫肛瘡腫胡臭齒䘌時珍斑者治瘧疾疔腫日華發明頌曰別録言蜘蛛治㿉張仲景治陰狐疝氣偏有大小時時上下者蜘蛛散主之蜘蛛十四枚炒焦桂半兩為散每服八分一匕日再或以蜜丸亦通恭曰蜘蛛能制蛇故治蛇毒而本條無此時珍曰鶴林玉露載蜘蛛能制蜈蚣以溺射之節節斷爛則陶氏言蜘蛛治蜈蚣傷亦相伏爾沈括筆談載蛛為蜂螫能齧芋梗磨創而愈今蛛又能治蜂蠍螫何哉又劉義慶幽明録云張甲與司徒蔡謨有親謨晝寢夢甲曰忽暴病心腹痛脹滿不得吐下名乾霍亂惟用蜘蛛生斷去腳吞之則愈但人不知甲某時死矣謨覺使人驗之甲果死矣後用此治乾霍亂輒驗也按此說雖怪正合唐注治嘔逆霍亂之文當亦不謬蓋蜘蛛服之能令人利也附方舊七新十五中風口喎向火取蜘蛛摩偏急頰車上候正即止千金方小兒口噤直指立聖散用干蜘蛛一枚去足竹瀝浸一宿炙焦蠍梢七個膩粉少許為末每用一字乳汁調時時灌入口中聖惠方治小兒十日內口噤不能吮乳蜘蛛一枚去足炙焦研末入豬乳一合和勻分作三服徐徐灌之神效無比止截瘧疾葛洪方用蜘蛛一枚同飯搗丸吞之楊氏家藏用蜘蛛一枚著蘆管中密塞綰項上勿令患人知之海上用蜘蛛三五枚綿包系寸口上宣明方用大蜘蛛三枚信砒一錢雄黑豆四十九粒為末滴水為丸豌豆大先夜以一丸獻於北斗下次早紙裹插耳內立見神聖一丸可醫二人泄痢脫肛疼痛已久者黑聖散主之大蜘蛛一個瓠葉兩重包扎定合子內燒存性入黃丹少許為末先以白礬蔥椒煎湯洗拭乾以前藥末置軟帛上托入收之甚是有效也乘閒方走馬牙疳出血作臭用蜘蛛一枚銅緑半錢麝香少許杵勻擦之無蛛用殼直指齒䘌斷爛用大蜘蛛一個以濕紙重裹荷葉包之灰火煨焦為末入麝香少許研敷永類鈐方聤耳出膿蜘蛛一個胭脂坯子半錢麝香一字為末用鵝翎吹之吹奶疼痛蜘蛛一枚麵裹燒存性為末酒服即止神效頦下結核大蜘蛛不計多少好酒浸過同研爛澄去滓臨臥時服之最效醫林集要瘰癧結核無問有頭無頭用大蜘蛛五枚日乾去足細研酥調塗之日再上聖惠方鼠瘻腫核已破出膿水者蜘蛛二七枚燒研敷之千金方便毒初起大黑蜘蛛一枚研爛熱酒一碗攪服隨左右側臥取利不退再服必效壽域疔腫拔根取戶邊蜘蛛杵爛醋和先挑四畔血出根稍露敷之干即易一日夜根拔出大有神效千金方腋下狐臭大蜘蛛一枚以黃泥入少赤石脂末及鹽少許和勻裹蛛煅之為末入輕粉一字醋調成膏臨臥敷腋下明早登廁必泄下黑汁也三因方蜂蠍螫傷蜘蛛研汁塗之並以生者安咬處吸其毒廣利方蜈蚣咬傷同上孫真人蛇虺咬傷蜘蛛搗爛敷之甚效一切惡瘡蜘蛛曬研末入輕粉麻油塗之直指方蛻殼主治蟲牙牙疳時珍附方舊一新一蟲牙有孔蜘蛛殼一枚綿裹塞之備急牙疳出血蜘蛛殼為末入胭脂麝香少許敷之直指方網主治喜忘七月七日取置衣領中勿令人知別録以纏疣贅七日消落有驗蘇恭療瘡毒止金瘡血出炒黃研末酒服治吐血時珍出聖惠方發明時珍曰按侯延慶退齊雅聞録云凡人卒暴吐血者用大蜘蛛網搓成小團米飲吞之一服立止此乃孫紹先所傳方也又酉陽雜俎云裴旻山行見山蜘蛛垂絲如匹布引弓射殺斷其絲數尺收之部下有金瘡者剪方寸貼之血立止也觀此則蛛網蓋止血之物也附方新四積年諸瘡蜘蛛膜貼之數易千金方反花瘡疾同上肛門鼠痔蜘蛛絲纏之即落疣瘤初起柳樹上花蜘蛛絲纏之久則自消簡便方草蜘蛛拾遺正誤舊標作䖦蚜今據爾雅改作草蜘蛛見下集解藏器曰䖦蟱在孔穴中及草木稠密處作網如蠶絲為幕絡者就中開一門出入形段微似蜘蛛而斑小陶言䖦蟱即蜘蛛誤矣時珍曰爾雅鼅蛛蝃蝥也草鼅蛛在草上絡幕者據此則陶氏所謂䖦蟱正與爾雅相合而陳氏所謂䖦蟱即爾雅之草蜘蛛也今改正之然草上亦有數種入藥亦取其大者爾有甚毒者不可不知李氏三元書云草上花蜘蛛絲最毒能纏斷牛尾有人遺尿絲纏其陰至斷爛也又沈存中筆談言草上花蜘蛛咬人為天蛇毒則誤矣詳見鱗部天蛇下氣味缺主治出疔腫根搗膏塗之藏器絲主治去瘤贅疣子禳瘧疾時珍附方新二瘤疣用稻上花蜘蛛十餘安桃枝上待絲垂下取東邊者捻為線系之七日一換自消落也總微論截瘧五月五日取花蜘蛛曬乾絳囊盛之臨期男左女右係臂上勿令知之普濟方壁錢拾遺釋名壁鏡時珍曰皆以窠形命名也集解藏器曰壁錢蟲似蜘蛛作白幕如錢貼牆壁間北人呼為壁繭時珍曰大如蜘蛛而形扁斑色八足而長亦時蛻殼其膜色光白如繭或云其蟲有毒咬人至死惟以桑柴灰煎取汁調白礬末敷之妙氣味無毒主治鼻衄及金瘡出血不止捺取蟲汁注鼻中及點瘡上亦療外野雞病下血藏器治大人小兒急疳牙蝕腐臭以壁蟲同人中白等分燒研貼之又主喉痹時珍出聖惠等方附方新一喉痹乳蛾已死者復活用牆上壁錢七個內要活蛛二枚捻作一處以白礬七分一塊化開以壁錢惹礬燒存性出火毒為末竹管吹入立時就好忌熱肉硬物窠幕主治小兒嘔逆取二七枚煮汁飲之藏器産後咳逆三五日不止欲死者取三五個煎汁呷之良又止金瘡諸瘡出血不止及治瘡口不斂取繭頻貼之止蟲牙痛時珍附方新二蟲牙疼痛普濟方以壁上白蟢窠四五個剝去黑者以鐵刀燒出汗將窠惹汗丸之納入牙中甚效又以乳香入窠內燒存性納之亦效一方用牆上白蛛窠包胡椒末塞耳左痛塞右右痛塞左手掩住側臥待額上有微汗即愈螲蟷拾遺釋名蛈蜴爾雅顛當蟲拾遺蛈母綱目土蜘蛛藏器曰螲蟷音窒當爾雅作蛈蜴音迭湯今轉為顛當蟲河北人呼為蛈蟷音侄唐鬼谷子謂之蛈母集解藏器曰螲蟷是處有之形似蜘蛛穴土為窠穴上有蓋覆穴口時珍曰蛈蜴即爾雅土蜘蛛也土中布網按段成式酉陽雜俎云齊前雨後多顛當窠深如蚓穴網絲其中土蓋與地平大如榆莢常仰捍其蓋伺蠅蠖過輒翻蓋捕之才入復閉與地一色無隙可尋而蜂復食之秦中兒謠云顛當顛當牢守門蠮螉寇汝無處奔氣味有毒主治一切疔腫附骨疽蝕等瘡宿肉贅瘤燒為末和臘月豬脂敷之亦可同諸藥敷疔腫出根為上藏器蠍開寶釋名蛜𧌴音伊祁蜀本主簿蟲開寶杜柏廣雅蠆尾蟲志曰段成式酉陽雜俎云江南舊無蠍開元初有主簿以竹筒盛過江至今往往有之故俗稱為主簿蟲時珍曰按唐史云劍南本無蠍有主簿將至遂呼為主簿蟲又張揖廣雅云杜伯蠍也陸璣詩疏云蠆一名杜伯幽州人謂之蠍觀此則主簿乃杜伯之訛而後人遂附會其說許慎云蠍蠆尾蟲也長尾為蠆短尾為蠍葛洪云蠍前為螫後為蠆古語云蜂蠆垂芒其毒在尾今入藥有全用者謂之全蠍有用尾者謂之蠍梢其力尤緊集解志曰蠍出青州形緊小者良段成式云鼠負蟲巨者多化為蠍蠍子多負於背子色白才如稻粒陳州古倉有蠍形如錢螫人必死蝸能食之先以跡規之不復去也宗奭曰今青州山中石下捕得慢火逼之或烈日中曬至蠍渴時食以青泥既飽以火逼殺之故其色多赤欲其體重而售之也用者當去其土頌曰今汴洛河陝州郡皆有之採無時以火逼乾死收之陶隱居集驗方言蠍有雄雌雄者螫人痛止在一處用井泥敷之雌者痛牽諸處用瓦屋溝下泥敷之皆可畫地作十字取土水服方寸匕或在手足以冷水漬之微暖即易在身以水浸布拓之皆驗又有咒禁法亦驗時珍曰蠍形如水黽八足而長尾有節色青今捕者多以鹽泥食之入藥去足焙用古今録驗云被蠍螫者但以木碗合之神驗不傳之方也氣味甘辛平有毒主治諸風癮疹及中風半身不遂口眼喎斜語澀手足抽掣開寶小兒驚癇風搐大人痎瘧耳聾疝氣諸風瘡女人帶下陰脫時珍發明宗奭曰大人小兒通用驚風尤不可闕頌曰古今治中風抽掣及小兒驚搐方多用之篋中方治小兒風癇有方時珍曰蠍産於東方色青屬木足厥陰經藥也故治厥陰諸病諸風掉眩搐掣瘧疾寒熱耳聾無聞皆屬厥陰風木故東垣李杲云凡疝氣帶下皆屬於風蠍乃治風要藥俱宜加而用之附方舊四新十九小兒臍風宣風散治初生斷臍後傷風濕唇青口撮出白沫不乳用全蠍二十一個無灰酒塗炙為末入麝香少許每用金銀煎湯調半字服之全幼心鑑小兒風癇取蠍五枚以一大石榴割頭剜空納蠍於中以頭蓋之紙筋和黃泥封裹微火炙乾漸加火煅赤候冷去泥取中焦黑者細研乳汁調半錢灌之便定兒稍大以防風湯調服篋中方慢脾驚風小兒久病後或吐瀉後生驚轉成慢脾用蠍梢一兩為末以石榴一枚剜空用無灰酒調末填入蓋定坐文武火上時時攪動熬膏取出放冷每服一字金銀薄荷湯調下本事方治吐利後虛困昏睡欲生風癇慢脾風症全蠍白朮麻黃去節等分為末二歲以下一字三歲以上半錢薄荷湯下天釣驚風翻眼向上用乾蠍全者一個瓦炒好硃砂三緑豆大為末飯丸緑豆大外以硃砂少許同酒化下一丸頓愈聖惠小兒胎驚蠍一枚薄荷葉包炙為末入硃砂麝香少許麥門冬煎湯調下一字效湯氏寶書小兒驚風用蠍一個頭尾全者以薄荷四葉裹定火上炙焦同研為末分四服白湯下經驗方大人風涎即上方作一服風淫濕痹手足不舉筋節攣疼先與通關次以全蠍七個瓦炒入麝香一字研勻酒三盞空心調服如覺已透則止未透再服如病未盡除自後專以婆蒿根洗淨酒煎日二服直指方破傷中風普濟方用乾蠍麝香各一分為末敷患處令風速愈聖惠用乾蠍酒炒天麻各半兩為末以蟾酥二錢湯化為糊和搗丸緑豆大每服一丸至二丸豆淋酒下甚者加至三丸取汗腎氣冷痛聖惠定痛丸治腎臟虛冷氣攻臍腹疼痛不可忍及兩脅疼痛用乾蠍七錢半焙為末以酒及童便各三升煎如稠膏丸梧子大每溫酒下二十丸又蛜𧌴散用蛜𧌴三十六枚頭足全者掘一地坑深闊各五寸用炭火五斤燒赤去火淋醋一升入內待滲干勻排蛜𧌴於坑底瓷碗蓋一夜取出木香蘿蔔子炒各一分胡椒三十粒檳榔肉豆蔻各一個為末每服一錢熱酒下小腸疝氣用緊小全蠍焙為末每發時服一錢入麝香半字溫酒調服少頃再進神效腎虛耳聾十年者二服可愈小蠍四十九個生薑如蠍大四十九片同炒姜干為度研末溫酒服之至一二更時更進一服至醉不妨次日耳中如笙簧聲即效杜壬方耳暴聾閉全蠍去毒為末酒服一錢以耳中聞水聲即效周密志雅堂雜鈔膿耳疼痛蠍梢七枚去毒焙入麝香半錢為末挑少許入耳中日夜三四次以為度楊氏家藏偏正頭風氣上攻不可忍用全蠍二十一個地龍六條土狗三個五倍子五錢為末酒調攤貼太陽穴上德生堂經驗方風牙疼痛全蠍三個蜂房二錢炒研擦之直指方腸風下血乾蠍炒白礬燒各二兩為末每服半錢米飲下聖惠方子腸不收全蠍炒研末口噙水鼻中㗜之立效衛生寶鑑諸痔發癢用全蠍不以多少燒煙燻之即效祕法也袖珍方諸瘡毒腫全蠍七枚梔子七個麻油煎黑去滓入黃蠟化成膏敷之淡寮方水蛭本經下品釋名蚑與蜞同爾雅作蟣至掌別録大者名馬蜞唐本馬蛭唐本馬蟥衍義馬鱉衍義時珍曰方音訛蛭為癡故俗有水癡草癡之稱宗奭曰汴人謂大者為馬鱉腹黃者為馬蟥集解別録曰水蛭生雷澤池澤五月六月採曝乾弘景曰處處河池有之蚑有數種以水中馬蜞得齧人腹中有血者干之為佳山蚑及諸小者皆不堪用恭曰有水蛭草蛭大者長尺許並能咂牛馬人血今俗多取水中小者用之大效不必食人血滿腹者其草蛭在深山草上人行即著脛股不覺入於肉中産育為害山人自有療法保升曰惟採水中小者用之別有石蛭生石上泥蛭生泥中二蛭頭尖腰粗色赤誤食之令人眼中如生煙漸致枯損時珍曰李石續博物志云南方水癡似鼻涕聞人氣閃閃而動就人體成瘡惟以麝香硃砂塗之即愈此即草蛭也修治保升曰採得以䈽竹筒盛待乾用米泔浸一夜曝乾以冬豬脂煎令焦黃然後用之藏器曰收干蛭當展其身令長腹中有子者去之性最難死雖以火炙亦如魚子煙燻經年得水猶活也大明曰此物極難修治須細銼以微火炒色黃乃熟不爾入腹生子為害時珍曰昔有途行飲水及食水菜誤吞水蛭入腹生子為害啖咂臟血腸痛黃瘦者惟以田泥或擂黃土水飲數升則必盡下出也蓋蛭在人腹忽得土氣而下爾或以牛羊熱血一二升同豬脂飲之亦下也氣味咸苦平有毒別録曰微寒畏石灰食鹽主治逐惡血瘀血月閉破血症積聚無子利水道本經墮胎別録治女子月閉欲成血勞藥性咂赤白遊疹及癰腫毒腫藏器治折傷墜撲蓄血有功寇宗奭發明成無己曰咸走血苦勝血水蛭之鹹苦以除蓄血乃肝經血分藥故能通肝經聚血弘景曰楚王食寒菹見蛭吞之果能去結積雖曰陰祐亦是物性兼然藏器曰此物難死故為楚王之病也時珍曰按賈誼新書云楚惠王食寒菹得蛭恐監食當死遂吞之腹有疾而不能食令尹曰天道無親惟德是輔王有仁德病不為傷王果病愈此楚王吞蛭之事也王充論衡亦云蛭乃食血之蟲楚王殆有積血之病故食蛭而病愈也與陶說相符附方舊四新八漏血不止水蛭炒為末酒服一錢日二服惡血消即愈千金産後血暈血結聚於胸中或偏於少腹或連於脅肋用水蛭炒虻蟲去翅足炒沒藥麝香各一錢為末以四物湯調下血下痛止仍服四物湯保命集折傷疼痛水蛭新瓦焙為細末酒服一錢食頃作痛可更一服痛止便將折骨藥封以物夾定調理經驗方跌撲損傷瘀血凝滯心腹脹痛大小便不通氣絶欲死用紅蛭石灰炒黃半兩大黃牽牛頭末各二兩為末每服二錢熱酒調下當下惡血以盡為度名奪命散濟生墜跌打擊內傷神效方水蛭麝香各一兩銼碎燒令煙出為末酒服一錢當下蓄血未止再服其效如神古今録驗方杖瘡腫痛水蛭炒研同朴硝等分研末水調敷之周密志雅堂雜抄赤白丹腫藏器曰以水蛭十餘枚令咂病處取皮皺肉白為效冬月無蛭地中掘取暖水養之令動先淨人皮膚以竹筒盛蛭合之須臾咬咂血滿自脫更用飢者癰腫初起同上方法紉染白鬚談野翁方用水蛭為極細末以龜尿調捻鬚梢自行入根也一用白烏骨雞一隻殺血入瓶中納活水蛭數十於內待化成水以豬膽皮包指蘸捻鬚梢自黑入根也普濟用大水蛭七枚為末汞一兩以銀三兩作小盒盛之用蚯蚓泥固濟半指厚深埋馬糞中四十九日取出化為黑油以魚脬籠指每蘸少許捻鬚上其油自然倒行至根變為黑色也又黑鬚倒捲簾方用大馬蜞二三十條竹筒裝之夜置露處受氣餓過七日以雞冠血磨京墨與食過四五次復陰乾將豬脛骨打斷放蜞入內仍合定鐵線纏住鹽泥塗之干時放地上火煅五寸香二次退開三寸火又五寸香三次再退遠火又五寸香取出為末將豬膽皮包指承末搽須梢即倒上也蟻綱目釋名玄駒亦作蚼蚍蜉時珍曰蟻有君臣之義故字從義亦作蟻大者為蚍蜉亦曰馬蟻赤者名蠪飛者名螱揚雄方言云齊魯之間謂之蚼蟓梁益之間謂之玄蚼幽燕謂之蛾蛘夏小正云十二月玄蚼奔謂蟻入蟄也大蟻喜酣戰故有馬駒之稱而崔豹古今注遂以蟻妖附會其說謬矣今不取集解時珍曰蟻處處有之有大小黑白黃赤數種穴居卵生其居有等其行有隊能知雨候春出冬蟄壅土成封曰蟻封以及蟻垤蟻塿蟻冢狀其如封垤塿冢也其卵名蚳音遲山人掘之有至鬥石者古人食之故內則周官饋食之豆有蚳醢也今惟南夷食之劉恂嶺表録異云交廣溪峒間酋長多取蟻卵淘淨為醬云味似肉醬非尊貴不可得也又云嶺南多蟻其窠如薄絮囊連帶枝葉彼人以布袋貯之賣與養柑子者以闢蠹蟲古今五行記云後魏時兗州有赤蟻與黑蟻鬥長六七步廣四寸赤蟻斷頭死則楚辭招魂所謂西方赤蟻若象玄蜂若壺者非寓言也又按陳藏器言嶺南有獨腳蟻一足連樹根下只能動搖不能脫去亦一異者也獨腳蟻主治疔腫疽毒搗塗之藏器附録白蟻時珍曰白蟻即蟻之白者一名螱一名飛蟻穴地而居蠹木而食因濕營土大為物害初生為蟻蝝至夏遺卵生翼而飛則變黑色尋亦隕死性畏烰炭桐油竹雞云蝝音鉛蟻垤土白蟻泥並見土部青腰蟲拾遺集解藏器曰蟲大如中蟻赤色腰中青黑似狗猲一尾而尖有短翅能飛春夏有之也主治有大毒著人皮肉腫起剝人面皮除印字至骨者亦盡食惡瘡息肉殺癬蟲藏器蛆綱目釋名時珍曰蛆行趑趄故謂之蛆或云沮洳則生亦通集解時珍曰蛆蠅之子也凡物敗臭則生之古法治醬生蛆以草烏切片投之張子和治癰疽瘡瘍生蛆以木香檳榔散末敷之李樓治爛痘生蛆以嫩柳葉鋪臥引出之高武用豬肉片引出以藜蘆貫衆白蘞為末用真香油調敷之也氣味寒無毒主治糞中蛆治小兒諸疳積疳瘡熱病譫妄毒痢作吐泥中蛆治目赤洗淨曬研貼之馬肉蛆治針箭入肉中及取蟲牙蛤蟆肉蛆治小兒諸疳並時珍附方新十一切疳疾聖濟總録六月取糞坑中蛆淘淨入竹筒中封之待乾研末每服一二錢入麝香米飲服之又方用蛆蛻米泔逐日換浸五日再以清水換浸三日曬焙為末入黃連末等分每半兩入麝香五分以獖豬膽汁和丸黍米大每服三四十丸米飲下神效小兒熱疳尿如米泔大便不調糞蛆燒灰雜物與食之小兒痹積用糞中蛆洗浸曬乾為末入甘草末少許米糊丸梧子大每服五七丸米飲下甚妙總微論小兒諸疳疳積及無辜疳一服退熱二服煩渴止三服瀉痢住用端午午時取蛤蟆金眼大腹不跳不鳴者槌死置尿桶中候生蛆食盡取蛆入新布袋懸長流水中三日新瓦焙乾入麝香少許為末每空心以砂糖湯調服一錢或粳米糊為丸每米飲服二三十丸直指齒鼻疳瘡糞蛆有尾者燒灰一錢褐衣灰五分和勻頻吹神效無比熱痢吐食因服熱藥而致者用糞中蛆流水洗淨曬乾為末每服一錢米飲下眼目赤瞎青泥中蛆淘淨日乾為末令患人仰臥合目每次用一錢散目上須臾藥行待少時去藥赤瞎亦無保命集利骨取牙普濟如神散取牙用肥赤馬肉一斤入硇砂二兩拌和候生蛆取日乾為末每一兩入粉霜半錢研勻先以針撥動牙根四畔空虛次以燈心蘸末少許點之良久自落祕韞利骨散用白馬腦上肉一二斤待生蛆與烏骨白雞一隻食之取糞陰乾每一錢入硇砂一錢研勻用少許擦疼處片時取之即落蠅綱目釋名時珍曰蠅飛營營其聲自呼故名集解時珍曰蠅處處有之夏出冬蟄喜暖惡寒蒼者聲雄壯負金者聲清括青者糞能敗物巨者首如火麻者茅根所化蠅聲在鼻而足喜交其蛆胎生蛆入灰中蛻化為蠅如蠶蠍之化蛾也蠅溺水死得灰復活故淮南子云爛灰生蠅古人憎之多有闢法一種小蟢蛛專捕食之謂之蠅虎者是也主治拳毛倒睫以臘月蟄蠅乾研為末以鼻頻嗅之即愈時珍發明時珍曰蠅古方未見用者近時普濟方載此法云出海上名方也狗蠅綱目集解時珍曰狗蠅生狗身上狀如蠅黃色能飛堅皮利喙啖咂狗血冬月則藏狗耳中氣味缺主治痰瘧不止活取一枚去翅足麵裹為丸衣以黃丹發日早米飲吞之得吐即止或以蠟丸酒服亦可又擂酒服治痘瘡倒黶時珍發明時珍曰狗蠅古方未見用者近世醫方大成載治瘧方齊東野語載托痘方蓋亦鼠負牛蝨之類耳周密云同僚括蒼陳坡老儒也言其孫三歲時發熱七日痘出而倒黶色黑唇口冰冷危證也遍試諸藥不效因求卜遇一士告以故士曰恰有藥可起此疾甚奇因為經營少許持歸服之移時即紅潤也常懇求其方乃用狗蠅七枚擂細和醅酒少許調服爾夫痘瘡固是危事然不可擾大要在固臟氣之外任其自然爾然或有變證則不得不資於藥也附録壁蝨時珍曰即臭蟲也狀如酸棗仁咂人血食與蚤皆為床榻之害古人多於席下置麝香雄黃或菖蒲末或蒴藋末或楝花末或蓼末或燒木瓜煙黃柏煙牛角煙馬蹄煙以闢之也牛蝨綱目釋名牛螕音卑時珍曰螕亦作蜱按呂忱字林云螕齧牛蝨也集解時珍曰牛蝨生牛身上狀如萆麻子有白黑二色齧血滿腹時自墜落也入藥用白色者氣味缺主治預解小兒痘疹毒焙研服之時珍發明時珍曰牛蝨古方未見用者近世預解痘毒方時或用之按高仲武痘疹管見云世俗用牛蝨治痘考之本草不載竊恐牛蝨啖血例比虻蟲終非痘家所宜而毒亦未必能解也附方新二預解痘毒談野翁方用白水牛蝨一歲一枚和米粉作餅與兒空腹食之取下惡糞終身可免痘瘡之患一方用白牛蝨四十九枚焙緑豆四十九粒硃砂四分九釐研末煉蜜丸小豆大以緑豆湯下人蝨拾遺釋名虱時珍曰蝨從虱從蟲䖵卂音迅蟲䖵音昆蝨行迅疾而昆繁故也俗作虱集解慎微曰按酉陽雜俎云人將死蝨離身或云取病人蝨於床前可卜病如將差蝨行向病者背則必死也荊州張典兵曾捫得兩頭蝨也時珍曰人物皆有蟲但形各不同始由氣化而後乃遺卵出蟣也草木子言其六足行必向北抱朴子云頭蝨黑著身變白身蝨白著頭變黑所漸然也又有蝨症蝨瘤諸方法可見蝨之為害非小也千金方云有人齧蝨在腹中生長為症能斃人用敗篦敗梳各以一半燒末一半煮湯調服即從下部出也徐鉉稽神録云浮梁李生背起如盂惟癢不可忍人皆不識醫士秦德立云此蝨瘤也以藥敷之一夕瘤破出蝨鬥余即日體輕但小竅不合時時蝨出無數竟死豫記唐小說載滑臺一人病此賈魏公言惟千年木梳燒灰及黃龍浴水乃能治之也洪邁夷堅志云臨川有人頰生瘤癢不可忍惟以火炙一醫剖之出蝨無數最後出二大蝨一白一黑頓愈亦無瘢痕此蝨瘤也又今人陰毛中多生陰蝨癢不可當肉中挑出皆八足而扁或白或紅古方不載醫以銀杏擦之或銀硃熏之皆愈也氣味咸平微毒畏水銀銀硃百部菖蒲蝨建草水中竹葉赤龍水大空主治人大發頭熱者令腦縫裂開取黑蝨三五百搗敷之又治疔腫以十枚置瘡上用荻箔繩作炷灸蝨上即根出也又治腳指間肉刺瘡以黑蝨敷之根亦出也藏器眼毛倒睫者拔去毛以蝨血點上數次即愈時珍附方新一腳指雞眼先挑破取黑白蝨各一枚置於上縛之數用自愈也便民圖纂
