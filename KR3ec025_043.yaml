body:
  text: 鱗部第四十三卷李時珍曰鱗蟲有水陸二類類雖不同同為鱗也是故龍蛇靈物魚乃水畜種族雖別變化相通是蓋質異而感同也鱗屬皆卵生而蝮蛇胎産水族皆不瞑而河豚目眨音𠰏藍蛇之尾解其頭毒沙魚之皮還消鱠積苟非知者孰能察之唐宋本草蟲魚不分今析為鱗部凡九十四種分為四類曰龍曰蛇曰魚曰無鱗魚舊凡五十八種神農本草經七種梁陶弘景注名醫別録九種梁陶弘景注唐本草二種唐蘇恭本草拾遺二十八種唐陳藏器食療本草六種唐孟詵張鼎開寶本草一十一種宋馬志嘉祐本草一種宋掌禹錫日華本草一種宋人大明食鑑本草一種明寧源本草綱目二十八種明李時珍附注魏吳普本草李當之藥録宋雷斆炮炙論齊徐之才藥對唐甄權藥性孫思邈千金食治唐李珣海藥楊損之刪繁南唐陳士良食性蜀韓保升重注宋蘇頌圖經唐慎微證類宋寇宗奭衍義陳承別說金張元素珍珠囊元李杲法象王好古湯液吳瑞日用元朱震亨補遺明汪穎食物汪機會編陳嘉謨蒙筌鱗之一龍類九種龍本經上品釋名時珍曰按許慎說文龍字篆文象形生肖論云龍耳虧聰故謂之龍梵書名那伽集解時珍曰按羅願爾雅翼云龍者鱗蟲之長王符言其形有九似頭似駝角似鹿眼似兔耳似牛項似蛇腹似蜃鱗似鯉爪似鷹掌似虎是也其背有八十一鱗具九九陽數其聲如戛銅盤口旁有鬚髯頷下有明珠喉下有逆鱗頭上有博山又名尺木龍無尺木不能升天呵氣成云既能變水又能變火陸佃埤雅云龍火得濕則焰得水則燔以人火逐之即息故人之相火似之龍卵生思抱雄鳴上風雌鳴下風因風而化釋典云龍交則變為二小蛇又小說載龍性粗猛而愛美玉空青喜嗜燕肉畏鐵及菵草蜈蚣楝葉五色絲故食燕者忌渡水祈雨者用燕鎮水患者用鐵激龍者用菵草祭屈原者用楝葉色絲裹粽投江醫家用龍骨者亦當知其性之愛惡如此龍骨別録曰生晉地川穀及太山岩水岸土穴中死龍處採無時弘景曰今多出梁益巴中骨欲得脊腦作白地錦紋舐之著舌者良齒小強猶有齒形角強而實皆是龍蛻非實死也斆曰剡州滄州太原者為上其骨細紋廣者是雌骨粗紋狹者是雄五色具者上白色黃色者中黑色者下凡經落不淨及婦人採者不用普曰色青白者良恭曰今並出晉地生硬者不好五色具者良其青黃赤白黑亦應隨色與臟腑相合如五芝五石英五石脂而本經不論及頌曰今河東州郡多有之李肇國史補云春水時至魚登龍門蛻骨甚多人採為藥有五色者龍門是晉地與本經合豈龍骨即此魚之骨乎又孫光憲北夢瑣言云五代時鎮州鬥殺一龍鄉豪曹寬取其雙角角前一物如藍色紋如亂錦人莫之識則龍亦有死者矣宗奭曰諸說不一終是臆度曾有崖中崩出一副肢體頭角皆備不知蛻耶斃耶謂之蛻斃則有形之物不得生見死方可見謂之化則其形獨不可化歟機曰經文言死龍之骨若以為蛻終是臆說時珍曰龍骨本經以為死龍陶氏以為蛻骨蘇寇諸說皆兩疑之竊謂龍神物也似無自死之理然觀蘇氏所引鬥死之龍及左傳云豢龍氏醢龍以食述異記云漢和帝時大雨龍墮宮中帝命作羹賜群臣博物志云張華得龍肉鮓言得醋則生五色光等說是龍固有自死者矣當以本經為正修治斆曰凡用龍骨先煎香草湯浴兩度搗粉絹袋盛之用燕子一隻去腸肚安袋於內懸井面上一宿取出研粉入補腎藥中其效如神時珍曰近世方法但煅赤為粉亦有生用者事林廣記云用酒浸一宿焙乾研粉水飛三度用如急用以酒煮焙乾或云凡入藥須水飛過曬乾每斤用黑豆一斗蒸一伏時曬乾用否則著人腸胃晚年作熱也氣味甘平無毒別録曰微寒權曰有小毒忌魚及鐵器之才曰得人參牛黃良畏石膏時珍曰許洪云牛黃惡龍骨而龍骨得牛黃更良有以制伏也其氣收陽中之陰入手足少陰厥陰經主治心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癇本經心腹煩滿恚怒氣伏在心下不得喘息腸癰內疽陰蝕四肢痿枯夜臥自驚汗出止汗縮小便溺血養精神定魂魄安五臟白龍骨主多寐泄精小便泄精別録逐邪氣安心神止夜夢鬼交虛而多夢紛紜止冷痢下膿血女子崩中帶下甄權懷孕漏胎止腸風下血鼻洪吐血止瀉痢渴疾健脾澀腸胃日華益腎鎮驚止陰瘧收濕氣脫肛生肌斂瘡時珍發明斆曰氣入丈夫腎臟中故益腎藥宜用之時珍曰澀可去脫故成氏云龍骨能收斂浮越之正氣固大腸而鎮驚又主帶脈為病附方舊十一新七健忘久服聰明益智慧用白龍骨虎骨遠志等分為末食後酒服方寸匕日三千金勞心夢泄龍骨遠志等分為末煉蜜丸如梧子大硃砂為衣每服三十丸蓮子湯下心統暖精益陽前方去硃砂每冷水空心下三十丸經驗睡即泄精白龍骨四分韭子五合為散空心酒服方寸匕梅師方遺尿淋瀝白龍骨桑螵蛸等分為末每鹽湯服二錢梅師方老瘧不止龍骨末方寸匕先發一時酒一升半煮三沸及熱服盡溫覆取汗即效肘後泄瀉不止白龍骨白石脂等分為末水丸梧子大紫蘇木瓜湯下量大人小兒用心鑑傷寒毒痢傷寒八九日至十餘日大煩渴作熱三焦有瘡䘌下痢或張口吐舌目爛口鼻生瘡不識人用此除熱毒止痢龍骨半斤水一斗煮四升沉之井底冷服五合漸漸進之外臺方熱病下痢欲死者龍骨半斤研水一斗煮取五升候極冷稍飲得汗即愈效肘後方久痢休息不止者龍骨四兩打碎水五升煮取二升半分五服冷飲仍以米飲和丸每服十丸肘後方久痢脫肛白龍骨粉撲之姚和衆方鼻衄眩冒欲死者龍骨末吹之梅師方吐血衄血九竅出血並用龍骨末吹入鼻中昔有人衄血一斛衆方不止用此即斷三因方耳中出血龍骨末吹入之三因方男婦溺血龍骨末水服方寸匕日三千金方小兒臍瘡龍骨煅研敷之聖惠方陰囊汗癢龍骨牡蠣粉撲之醫宗三法龍齒修治同龍骨或云以酥炙氣味澀涼無毒當之曰大寒之才曰平得人參牛黃良畏石膏鐵器主治殺精物大人驚癇諸痙癲疾狂走心下結氣不能喘息小兒五驚十二癇本經小兒身熱不可近大人骨間寒熱殺蠱毒別録鎮心安魂魄甄權治煩悶熱狂鬼魅日華發明時珍曰龍者東方之神故其骨與角齒皆主肝病許叔微云肝藏魂能變化故魂遊不定者治之以龍齒即此義也龍角修治同骨氣味甘平無毒之才曰畏乾漆蜀椒理石主治驚癇瘛瘲身熱如火腹中堅及熱泄久服輕身通神明延年別録小兒大熱甄權心熱風癇以爛角磨濃汁二合食上服日二次蘇頌出韋丹方發明頌曰骨齒醫家常用角則稀使惟深師五邪丸用之云無角用齒而千金治心病有角齒同用者龍腦主治其形肥軟能斷痢陶弘景龍胎主治産後余疾女人經閉弘景曰比來巴中數得龍胞形體具存云治産後余疾正當末服頌曰許孝宗篋中方言龍胎出蜀中山澗大類乾魚鱗煎時甚腥臊治女經積年不通同瓦松景天各少許以水兩盞煎一盞去滓分溫二服少頃腹中轉動便下按此物方家罕知而昔人曾用世當有識者時珍曰胞胎俱出巴蜀皆主血疾蓋一物也龍涎機曰龍吐涎沫可制香時珍曰龍涎方藥鮮用惟入諸香云能收腦麝數十年不散又言焚之則翠煙浮空出西南海洋中云是春間群龍所吐涎沫浮出番人採得貨之每兩千錢亦有大魚腹中剖得者其狀初若脂膠黃白色干則成塊黃黑色如百藥煎而膩理久則紫黑如五靈脂而光澤其體輕飄似浮石而腥臊吊拾遺釋名吉吊時珍曰吊舊無正條惟蘇頌圖經載吉吊脂雲龍所生也陳藏器拾遺有豫脂一條引廣州記云豫蛇頭鱉身膏主蛭刺云云今考廣州記及太平御覽止云吊蛇頭鼉身膏至輕利等語並無所謂蛇頭鱉身豫膏主蛭刺之說蓋吊字似豫鼉字似鱉至輕利三字似主蛭刺傳寫訛誤陳氏遂承其誤耳吊既龍種豈有鱉身病中亦無蛭刺之證其誤可知今改正之精名紫梢花集解藏器曰裴淵廣州記云吊生嶺南蛇頭鼉身亦水宿亦木棲其膏至輕利以銅及瓦器盛之浸出惟雞卵殼盛之不漏其透物甚於醍醐摩理毒腫大驗頌曰姚和衆延齡至寶方云吉吊脂出福建州甚難得須以琉璃瓶盛之更以樟木盒重貯之不爾則透氣失去也孫光憲北夢瑣言云海上人言龍每生二卵一為吉吊吉吊多與鹿遊或於水邊遺瀝值流槎則黏著木枝如蒲槌狀其色微青黃復似灰色號紫梢花坐湯多用之時珍曰按裴姚二說相同則吊脂即吉吊脂無疑矣又陳自明婦人良方云紫梢花生湖澤中乃魚蝦生卵於竹木之上狀如糖饊去木用之此說與孫說不同近時房中諸術多用紫梢花皆得於湖澤其色灰白而輕鬆恐非真者當以孫說為正或云紫梢花與龍涎相類未知是否吊脂一名吊膏氣味有毒主治風腫癰毒癮疹赤瘙瘑疥痔瘻皮膚頑痹踠跌折傷內損瘀血以脂塗上炙手熱摩之即透藏器治聾耳不問年月每日點入半杏仁許便瘥蘇頌出延齡方紫梢花氣味甘溫無毒主治益陽祕精療真元虛憊陰痿遺精餘瀝白濁如脂小便不禁囊下濕癢女人陰寒冷帶入丸散及坐湯用時珍又和劑玉霜丸注云如無紫梢花以木賊代之附方新二陽事痿弱紫梢花生龍骨各二錢麝香少許為末蜜丸梧子大每服二十丸燒酒下欲解飲生薑甘草湯集簡方陰癢生瘡紫梢花一兩胡椒半兩煎湯溫洗數次即愈總微論蛟龍綱目釋名時珍曰按任昉述異記云蛟乃龍屬其眉交生故謂之蛟有鱗曰蛟龍有翼曰應龍有角曰虯龍無角曰螭龍也梵書名宮毗羅集解時珍曰按裴淵廣州記云蛟長丈餘似蛇而四足形廣如楯小頭細頸頸有白嬰胸前赭色背上青斑脅邊若錦尾有肉環大者數圍其卵亦大能率魚飛得鱉可免王子年拾遺録云漢昭帝釣於渭水得白蛟若蛇無鱗甲頭有軟角牙出唇外命大官作鮓食甚美骨青而肉紫據此則蛟亦可食也精氣味缺有毒時珍曰按張仲景金匱要略云春夏二時蛟龍帶精入芹菜中人食之則病蛟龍症痛不可忍治以硬糖日服二三升當吐出如蜥蜴狀也唐醫周顧治此用雄黃朴硝煮服下之髓主治敷面令人好顏色又主易産時珍出東方朔別傳附録蜃之刃切時珍曰蛟之屬有蜃其狀亦似蛇而大有角如龍狀紅鬣腰以下鱗盡逆食燕子能吁氣成樓臺城郭之狀將雨即見名蜃樓亦曰海市其脂和蠟作燭香凡百步煙中亦有樓閣之形月令云雉入大水為蜃陸佃云蛇交龜則生龜交雉則生蜃物異而感同也類書云蛇與雉交而生子曰蟂似蛇四足能害人陸禋云蟂音梟即蛟也或曰蜃也又魯至剛云正月蛇與雉交生卵遇雷即入土數丈為蛇形經二三百年乃能升騰卵不入土但為雉爾觀此數說則蛟蜃皆是一類有生有化也一種海蛤與此同名羅願以為雉化之蜃未知然否詳介部車螯下鼉龍本經中品釋名鮀魚本經土龍藏器曰本經鮀魚合改作鼉鼉形如龍聲甚可畏長一丈者能吐氣成云致雨既是龍類宜去其魚時珍曰鼉字象其頭腹足尾之形故名博物志謂之土龍鮀乃魚名非此物也今依陳氏改正之集解別録曰鮀魚甲生南海池澤取無時弘景曰即鼉甲也皮可冒鼓性至難死沸湯沃口入腹良久乃剝之藏器曰鼉性嗜睡恆閉目力至猛能攻江岸人於穴中掘之百人掘須百人牽之一人掘亦一人牽之不然終不可出頌曰今江湖極多形似守宮鯪鯉輩而長一二丈背尾俱有鱗甲夜則鳴吼舟人畏之時珍曰鼉穴極深漁人以篾纜系餌探之候其吞鉤徐徐引出性能橫飛不能上騰其聲如鼓夜鳴應更謂之鼉鼓亦曰鼉更俚人聽之以占雨其枕瑩淨勝於魚枕生卵甚多至百亦自食之南人珍其肉以為嫁娶之敬陸佃云鼉身具十二生肖肉惟蛇肉在尾最毒也鼉甲修治酥炙或酒炙用氣味酸微溫有毒權曰甘平有小毒日華曰無毒蜀漆為之使畏芫花甘遂狗膽主治心腹癥瘕伏堅積聚寒熱女子小腹陰中相引痛崩中下血五色及瘡疥死肌本經五邪涕泣時驚腰中重痛小兒氣癃眥潰別録小腹氣疼及驚恐孟詵除腹內血積婦人帶下百邪魍魎甄權療牙齒疳䘌宣露日華殺蟲治瘰癧瘻瘡風頑瘙疥惡瘡炙燒浸酒服之功同鱉甲藏器治陰瘧時珍發明時珍曰鼉甲所主諸證多屬厥陰其功只在平肝木治血殺蟲也千金方治風癲有鼉甲湯今藥肆多懸之云能闢蠹亦殺蟲之意附方舊一腸風痔疾頌曰用皮及骨燒灰米飲空心服二錢甚者入紅雞冠花白礬為末和之肉氣味甘有小毒頌曰肉色似雞而發冷氣痼疾藏器曰梁周興嗣嗜此肉後為鼉所噴便生惡瘡此物有靈不食更佳其涎最毒陶曰肉至補益亦不必食主治少氣吸吸足不立地別録濕氣邪氣諸蠱腹內癥瘕惡瘡藏器脂主治摩風及惡瘡張鼎肝主治五尸病用一具炙熟同蒜齏食肘後鯪鯉別録下品釋名龍鯉郭璞穿山甲圖經石鯪魚時珍曰其形肖鯉穴陵而居故曰鯪鯉而俗稱為穿山甲郭璞賦謂之龍鯉臨海水土記云尾刺如三角菱故謂石鯪集解頌曰鯪鯉即今穿山甲也生湖廣嶺南及金商均房諸州深山大谷中皆有之弘景曰形似鼉而短小又似鯉而有四足黑色能陸能水日中出岸張開鱗甲如死狀誘蟻入甲即閉而入水開甲蟻皆浮出因接而食之時珍曰鯪鯉狀如鼉而小背如鯉而闊首如鼠而無牙腹無鱗而有毛長舌尖喙尾與身等尾鱗尖厚有三角腹內臟腑俱全而胃獨大常吐舌誘蟻食之曾剖其胃約蟻升許也甲修治時珍曰方用或炮或燒或酥炙醋炙童便炙或油煎土炒蛤粉炒當各隨本方未有生用者仍以尾甲乃力勝氣味咸微寒有毒主治五邪驚啼悲傷燒灰酒服方寸匕療蟻瘻別録小兒驚邪婦人鬼魅悲泣及疥癬痔漏大明療瘡癩及諸疰疾弘景燒灰敷惡瘡又治山嵐瘴瘧甄權除痰瘧寒熱風痹強直疼痛通經脈下乳汁消癰腫排膿血通竅殺蟲時珍發明弘景曰此物食蟻故治蟻瘻時珍曰穿山甲入厥陰陽明經古方鮮用近世風瘧瘡科通經下乳用為要藥蓋此物穴山而居寓水而食出陰入陽能竄經絡達於病所故也按劉伯溫多能鄙事云凡油籠滲漏剝穿山甲裡面肉靨投入自至漏處補住又永州記云此物不可於堤岸上殺之恐血入土則堤岸滲漏觀此二說是山可使穿堤可使漏而又能至滲處其性之走竄可知矣諺曰穿山甲王不留婦人食了乳長流亦言其迅速也李仲南言其性專行散中病即止不可過服又按德生堂經驗方云凡風濕冷痹之證因水濕所致渾身上下強直不能屈伸痛不可忍者於五積散加穿山甲七片看病在左右手足或臂脅疼痛處即於鯪鯉身上取甲炮熟同全蠍炒十一個蔥姜同水煎入無灰酒一匙熱服取汗避風甚良附方舊四新十九中風癱瘓手足不舉用穿山甲左癱用右甲右瘓用左甲炮熟大川烏頭炮熟紅海蛤如棋子大者各二兩為末每用半兩搗蔥白汁和成厚餅徑寸半隨左右貼腳心縛定密室安坐以貼藥腳浸熱湯盆中待身麻汗出急去藥宜謹避風自然手足可舉半月再行一次除根忌口遠色調養亦治諸風疾衛生寶鑑熱瘧不寒穿山甲一兩干棗十個同燒存性為末每服二錢發日五更井花水服楊氏家藏下痢裡急穿山甲蛤粉等分同炒研末每服一錢空心溫酒下普濟方腸痔氣痔出膿血用穿山甲燒存性一兩肉豆蔻三枚為末每米飲服二錢甚者加蝟皮灰一兩中病即止衍義鼠痔成瘡腫痛用穿山甲尾尖處一兩炙存性鱉甲酒炙酥一兩麝香半錢為末每服一錢半真茶湯服取效直指方蟻瘻不愈鯪鯉甲二七枚燒灰豬脂調敷千金方婦人陰㿗硬如卵狀隨病之左右取穿山甲之左右邊五錢以沙炒焦黃為末每服二錢酒下摘玄方乳汁不通湧泉散用穿山甲炮研末酒服方寸匕日二服外以油梳梳乳即通單驤方乳癌乳癰方同上吹奶疼痛穿山甲炙焦木通各一兩自然銅生用半兩為末每服二錢酒下取效圖經痘瘡變黑穿山甲蛤粉炒為末每服五分入麝香少許溫酒服即發紅色如神直指方腫毒初起穿山甲插入谷芒熱灰中炮焦為末二兩入麝香少許每服二錢半溫酒下仁齊直指方馬疔腫毒穿山甲燒存性貝母等分為末酒調服三四次乃用下藥利去惡物即愈鮑氏方便毒便癰穿山甲半兩豬苓三錢並以醋炙研末酒服二錢外穿山甲末和麻油輕粉塗之或只以末塗之直指瘰癧潰壞集驗方用鯪鯉甲二十一片燒研敷之壽域方用穿山甲土炒斑蝥熟艾等分為末敷之外以烏桕葉貼上灸四壯效眉煉癬瘡生眉中者穿山甲前膊鱗炙焦為末清油和輕粉調敷直指方蟻入耳內鯪鯉甲燒研水調灌入即出肘後聤耳出膿穿山甲燒存性入麝香少許吹之三日水乾即愈鮑氏小兒方耳內疼痛穿山甲二個夾土狗二個同炒焦黃為末每吹一字入耳內亦治耳聾普濟方耳鳴耳聾卒聾及腎虛耳內如風水鍾鼓聲用穿山甲一大片以蛤粉炒赤去粉蠍梢七個麝香少許為末以麻油一滴化蠟和作梃子綿裹塞之攝生衆妙方火眼赤痛穿山甲一片為末鋪白紙上卷作繩燒煙燻之壽域方倒睫拳毛穿山甲竹刀刮去肉將羊腎脂抹甲上炙黃如此七次為末隨左右眼用一字㗜鼻內口中噙水日用三次二月取效儒門事親肉氣味甘澀溫有毒時珍曰按張杲醫說云鯪鯉肉最動風風疾人才食數臠其疾一發四肢頓廢時珍竊謂此物性竄而行血風人多血虛故也然其氣味俱惡亦不中用石龍子本經中品釋名山龍子別録泉龍繁露注石蜴音易蜥蜴別録豬婆蛇綱目守宮時珍曰此物生山石間能吐雹可祈雨故得龍子之名蜥蜴本作析易許慎云易字篆文象形陸佃云蜴善變易吐雹有陰陽析易之義周易之名蓋取乎此今俗呼為豬婆蛇是矣弘景曰守宮蝘蜓也而此亦名守宮殊難分別詳見守宮條集解別録曰石龍子生平陽川穀及荊州山石間五月取著石上令乾保升曰山南襄州安州申州處處有之三四八九月採去腹中物熏干弘景曰其類有四種形大純黃者為蛇醫母亦名蛇舅母不入藥用似蛇醫而形小尾長見人不動者為龍子形小而五色尾青碧可愛者為蜥蜴並不螫人一種緣籬壁形小色黑者為蝘蜓言螫人必死亦未聞中之者恭曰龍子即蜥蜴形細而長尾與身類似蛇有四足去足便是蛇形以五色者為雄入藥良色不備者為雌力劣也蛇師生山谷頭大尾小而短色青黃或白斑也蝘蜓生人家屋壁間似蛇師即守宮也一名蠑螈爾雅互言之並非真說頌曰爾雅以蠑螈蜥蜴蝘蜓守宮為一物方言以在草為蜥蜴蛇醫在壁為守宮蝘蜓字林以蠑螈為蛇醫據諸說當以在草澤者為蠑螈蜥蜴在屋壁者為蝘蜓守宮也入藥以草澤者為良時珍曰諸說不定大抵是水旱二種有山石草澤屋壁三者之異本經惟用石龍後人但稱蜥蜴實一物也且生山石間正與石龍山龍之名相合自與草澤之蛇師屋壁之蝘蜓不同蘇恭言蛇師生山谷以守宮為蠑螈蘇頌以草澤者入藥皆與本經相戾術家祈雨以守宮為蜥蜴謬誤尤甚今將三者考正於下其義自明矣生山石間者曰石龍即蜥蜴俗呼豬婆蛇似蛇有四足頭扁尾長形細長七八寸大者一二尺有細鱗金碧色其五色全者為雄入藥尤勝生草澤間者曰蛇醫又名蛇師蛇舅母水蜥蜴蠑螈俗亦呼豬婆蛇蛇有傷則銜草以敷之又能入水與魚合故得諸名狀同石龍而頭大尾短形粗其色青黃亦有白斑者不入藥用生屋壁間者曰蝘蜓即守宮也似蛇醫而短小灰褐色並不螫人詳本條又按夷堅志云劉居中見山中大蜥蜴百枚長三四尺光膩如脂吐雹如彈丸俄頃風雷作而雨雹也宗奭曰有人見蜥蜴從石罅中出飲水數十次石下有冰雹一二升行未數里雨雹大作今人用之祈雨蓋取此義修治時珍曰古方用酥炙或酒炙惟治傳尸勞瘵天靈蓋丸以石蜥蜴連腸肚以醋炙四十九遍用之亦一異也氣味咸寒有小毒之才曰惡硫黃蕪荑斑蝥主治五癃邪結氣利小便水道破石淋下血本經消水飲陰㿉滑竅破血娠婦忌用時珍發明宗奭曰蜥蜴能吐雹祈雨故能治癃淋利水道時珍曰其功長於利水故千金治癥結水腫尸疰留飲有蜥蜴丸外臺治小兒陰潰用之皆取其利水也劉涓子用同斑蝥地膽治瘻疾取其利小便解二物之毒也附方新二小兒陰㿉用蜥蜴一枚燒灰酒服外臺祕要諸瘻不愈用蜥蜴炙三枚地膽炒三十枚斑蝥炒四十枚為末蜜丸小豆大每服二丸白湯下治諸法不效者劉涓子鬼遺方肝主治缺附方新一去生胎蜥蜴肝蛇脫皮等分以苦酒和勻摩妊婦臍上及左右令溫胎即下也聖惠守宮綱目釋名壁宮蘇恭壁虎時珍蠍虎蘇恭蝘蜓音偃殄弘景曰蝘蜓喜緣籬壁間以朱飼之滿三斤殺乾末以塗女人身有交接事便脫不爾如赤志故名守宮而蜥蜴亦名守宮殊難分別按東方朔雲若非守宮則蜥蜴是矣恭曰蝘蜓又名蠍虎以其常在屋壁故名守宮亦名壁宮飼朱點婦人謬說也時珍曰守宮善捕蠍蠅故得虎名春秋考異郵云守宮食蠆土勝水也點臂之說淮南萬畢術張華博物志彭乘墨客揮犀皆有其法大抵不真恐別有術今不傳矣揚雄方言云秦晉西夏謂之守宮亦曰蠦𧓋南陽人呼為蝘蜓在澤中者謂之蜥蜴楚人謂之蠑螈集解時珍曰守宮處處人家牆壁有之狀如蛇醫而灰黑色扁首長頸細鱗四足長者六七寸亦不聞噬人南人有十二時蟲即守宮之五色者附見於下附録十二時蟲時珍曰十二時蟲一名避役出容州交州諸處生人家籬壁樹木間守宮之類也大小如指狀同守宮而腦上連背有肉鬣如冠幘長頸長足身青色大者長尺許尾與身等齧人不可療嶺南異物志言其首隨十二時變色見者主有喜慶博物志言在陰多緗緑日中變易或青或緑或丹或黃或紅或赤北戶録言不能變十二色但黃褐青赤四色而已竊按陶弘景言石龍五色者為蜥蜴陸佃言蜥蜴能十二時變易故得易名若然則此蟲亦蜥蜴矣而生籬壁間蓋五色守宮爾陶氏所謂守宮螫人必死及點臂成志者恐是此物若尋常守宮既不堪點臂亦未有螫人至死者也氣味咸寒有小毒主治中風癱瘓手足不舉或歷節風痛及風痓驚癇小兒疳痢血積成痞癘風瘰癧療蠍螫時珍發明時珍曰守宮舊附見於石龍下云不入藥用近時方術多用之楊仁齊言驚癇皆心血不足其血與心血相類故治驚癇取其血以補心其說近似而實不然蓋守宮食蠍蠆蠍蠆乃治風要藥故守宮所治風痓驚癇諸病亦猶蜈蠍之性能透經絡也且入血分故又治血病瘡瘍守宮祛風石龍利水功用自別不可不知附方新十四小兒臍風用壁虎後半截焙為末男用女乳女用男乳調勻入稀雞矢少許摻舌根及牙關仍以手蘸摩兒取汗出甚妙筆峰雜興方久年驚癇守宮膏用守宮一個剪去四足連血研爛入珍珠麝香龍腦香各一字研勻以薄荷湯調服仍先或吐或下去痰涎而後用此大有神效奇效方小兒撮口用硃砂末安小瓶內捕活蠍虎一個入瓶中食砂末月餘待體赤陰乾為末每薄荷湯服三四分方廣附余心虛驚癇用褐色壁虎一枚連血研爛入硃砂麝香末少許薄荷湯調服繼服二陳湯神效仁齊直指癱瘓走痛用蠍虎即蝘蜓一枚炙黃陳皮五分罌粟殼蜜炒一錢甘草乳香沒藥各二錢半為末每服三錢水煎服醫學正傳歷節風痛不可忍者壁虎丸用壁虎三枚生研蠐螬三枚濕紙包煨研地龍五條生研草烏頭三枚生研木香五錢乳香末二錢半麝香一錢龍腦五分合研成膏入酒糊搗丸如梧桐子大每日空心乳香酒服三十丸取效總録破傷中風身如角弓反張筋急口噤者用守宮丸治之守宮炙乾去足七枚天南星酒浸三日曬乾一兩膩粉半錢為末以薄麵糊丸緑豆大每以七丸酒灌下少頃汗出得解更與一服再汗即瘥或加白附子一兩以蜜丸聖惠方癘風成癩祛風散用東行蠍虎一條焙乾大蠶砂五升水淘炒各為末以小麥面四升拌作絡索曝乾研末每服一二合煎柏葉湯下日三服取效衛生寶鑑瘰癧初起用壁虎一枚焙研每日服半分酒服青囊血積成塊用壁虎一枚白麵和一鴨子大包裹研爛作餅烙熟食之當下血塊不過三五次即愈甚驗青囊小兒疳疾蠍虎丹治一切疳瘦下痢證候全備及無辜疳毒如邪病者用干雄蠍虎一個微炙蝸牛殼蘭香根靛花雄黃麝香各一分龍腦半分各研為末米醋煮糊丸黍米大每脂麻湯下十丸日二服取效奇效良方蠆蠍螫傷端午日午時收壁虎一枚以雞膽開一竅盛之陰乾每以一星敷上即止神效青囊反胃膈氣地塘蟲即壁虎也七個砂鍋炒焦木香人參硃砂各一錢半乳香一錢為末蜜丸梧子大每服七丸木香湯下早晚各一服丹溪摘玄癰瘡大痛壁虎焙乾研末油調敷之即止醫方摘要糞主治爛赤眼時珍附方新一胎赤爛眼昏暗用蠍虎數枚以罐盛黃土按實入蠍虎在內勿令損傷以紙封口穿數孔出氣候有糞數粒去糞上一點黑者只取一頭白者唾津研成膏塗眼睫周回不得揩拭來早以溫漿水洗三次甚效聖濟總録蛤蚧宋開寶釋名蛤蟹日華仙蟾志曰一雌一雄常自呼其名時珍曰蛤蚧因聲而名仙蟾因形而名嶺南人呼蛙為蛤又因其首如蛙蟾也雷斆以雄為蛤以雌為蚧亦通集解志曰蛤蚧生嶺南山谷及城牆或大樹間形如大守宮身長四五寸尾與身等最惜其尾見人取之多自齧斷其尾而去藥力在尾尾不全者不效揚雄方言云桂林之中守宮能鳴者俗謂之蛤蚧蓋相似也禹錫曰按嶺表録異云蛤蚧首如蛤蟆背有細鱗如蠶子土黃色身短尾長多巢於榕木及城樓間雌雄相隨旦暮則鳴或云鳴一聲是一年者俚人採鬻云治肺疾珣曰生廣南水中夜即居於榕樹上雌雄相隨投一獲二近日西路亦有之其狀雖小滋力一般俚人採之割腹以竹張開曝乾鬻之頌曰人欲得首尾全者以兩股長柄鐵叉如黏黐竿狀伺於榕木間以叉刺之一股中腦一股著尾故不能齧也入藥須雌雄兩用或云陽人用雌陰人用雄斆曰雄為蛤皮粗口大身小尾粗雌為蚧皮細口尖身大尾小時珍曰按段公路北戶録云其首如蟾蜍背淺緑色上有土黃斑點如古錦紋長尺許尾短其聲最大多居古木竅間亦守宮蜥蜴之類也又顧玠海槎録云廣西橫州甚多蛤蚧牝牡上下相呼纍日情洽乃交兩相抱負自墮於地人往捕之亦不知覺以手分劈雖死不開乃用熟稿草細纏蒸過曝乾售之煉為房中之藥甚效尋常捕者不論牝牡但可為雜藥及獸醫方中之用耳修治斆曰其毒在眼須去眼及甲上尾上腹上肉毛以酒浸透隔兩重紙緩焙令乾以瓷器盛懸屋東角上一夜用之力可十倍勿傷尾也日華曰凡用去頭足洗去鱗鬣內不淨以酥炙用或用蜜炙李珣曰凡用須炙令黃色熟搗口含少許奔走不喘息者為真也宜丸散中用氣味咸平有小毒日華曰無毒主治久咳嗽肺勞傳尸殺鬼物邪氣下淋瀝通水道開寶下石淋通月經治肺氣療咳血日華肺痿咯血咳嗽上氣治折傷海藥補肺氣益精血定喘止嗽療肺癰消渴助陽道時珍發明宗奭曰補肺虛勞嗽有功時珍曰昔人言補可去弱人參羊肉之屬蛤蚧補肺氣定喘止渴功同人參益陰血助精扶羸功同羊肉近世治勞損痿弱許叔微治消渴皆用之俱取其滋補也劉純云氣液衰陰血竭者宜用之何大英云定喘止嗽莫佳於此附方舊二久嗽肺癰宗奭曰久嗽不愈肺積虛熱成癰咳出膿血曉夕不止喉中氣塞胸膈噎痛用蛤蚧阿膠鹿角膠生犀角羚羊角各二錢半用河水三升銀石器內文火熬至半升濾汁時時仰臥細呷日一服張刑部子皋病此田樞密況授方服之遂愈喘嗽面浮並四肢浮者蛤蚧一雌一雄頭尾全者法酒和蜜塗之炙熟紫團人參似人形者半兩為末化蠟四兩和作六餅每煮糯米薄粥一盞投入一餅攪化細細熱呷之普濟鹽龍綱目集解時珍曰按何薳春渚紀聞云宋徽宗時將軍蕭注破南蠻得其所養鹽龍長尺余籍以銀盤中置玉盂以玉箸托海鹽飼之每鱗中出鹽則收取云能興陽事每以溫酒服一錢匕後龍為蔡京所得及死以鹽封數日取用亦有力愚按此物生於殊方古所不載而有此功亦稀物也因附於此以俟鱗之二蛇類一十七種蛇蛻本經下品釋名蛇皮甄權蛇殼俗名龍蛻綱目龍子衣本經龍子皮別録弓皮本經蛇符同上蛇筋吳普時珍曰蛇字古文象其宛轉有盤曲之形蛻音脫又音退退脫之義也龍弓符筋並後世廋隱之名耳集解別録曰生荊州川穀及田野五月五日十五日取之良弘景曰草中少見虺蝮蛻惟有長者多是赤𧐖黃頷輩其皮不可辨但取石上完全者為佳頌曰南中木石上及人家牆屋間多有之蛇蛻無時但著不淨即脫或大飽亦脫修治斆曰凡使勿用青黃蒼色者只用白色如銀者先於地下掘坑深一尺二寸安蛻於中一宿取出醋浸炙乾用時珍曰今人用蛇蛻先以皂莢水洗淨纏竹上或酒或醋或蜜浸炙黃用或燒存性或鹽泥固煅各隨方法氣味咸甘平無毒火熬之良權曰有毒畏磁石及酒孕婦忌用主治小兒百二十種驚癇蛇癇癲疾瘛瘲弄舌搖頭寒熱腸痔蠱毒本經大人五邪言語僻越止嘔逆明目燒之療諸惡瘡別録喉痹百鬼魅甄權炙用辟惡止小兒驚悸客忤煎汁敷癧瘍白癜風催生日華安胎孟詵止瘧藏器曰正發日取塞兩耳又以手持少許並服鹽醋汁令吐辟惡去風殺蟲燒末服治婦人吹奶大人喉風退目翳消木舌敷小兒重舌重齶唇緊解顱面瘡月蝕天泡瘡大人疔腫漏瘡腫毒煮湯洗諸惡蟲傷時珍發明宗奭曰蛇蛻從口退出眼晴亦退今眼藥及去翳膜用之取此義也時珍曰入藥有四義一能辟惡取其變化性靈也故治邪僻鬼魅蠱瘧諸疾二能去風取其屬巽性竄也故治驚癇癜駁喉舌諸疾三能殺蟲故治惡瘡痔漏疥癬諸疾用其毒也四有蛻義故治翳膜胎産皮膚諸疾會意從類也附方舊十六新二十喉痹心鏡治小兒喉痹腫痛燒末以乳汁服一錢纏喉風疾氣閉者杜壬方用蛇蛻炙當歸等分為末溫酒服一錢取吐一方用蛇皮揉碎燒煙竹筒吸入即破一方蛇皮裹白梅一枚噙咽大小口瘡蛇蛻皮水浸軟拭口內一二遍即愈仍以藥貼足心嬰孩寶鑑小兒木舌蛇蛻燒灰乳和服少許千金方小兒重舌千金小兒重齶並用蛇蛻灰醋調敷之聖惠方小兒口緊不能開合飲食不語即死蛇蛻燒灰拭淨敷之千金方小兒解顱蛇蛻熬末以豬頰車髓和塗之日三四易千金方小兒頭瘡子母祕録小兒面瘡同上小兒月蝕並用蛇蛻燒灰臘豬脂和敷之肘後方小兒吐血蛇蛻灰乳汁調服半錢子母祕録痘後目翳周密齊東野語云小兒痘後障翳用蛇蛻一條洗焙天花粉五分為末以羊肝破開夾藥縛定米泔水煮食豫女及甥皆用此得效真奇方也卒生翳膜蛇蛻皮一條洗曬細剪以白麵和作餅炙焦黑色為末食後溫水服一錢日二次聖惠方小便不通全蛇蛻一條燒存性研溫酒服之胎痛欲産日月未足者以全蛻一條絹袋盛繞腰繫之千金方橫生逆生胞衣不下千金用蛇蛻炒焦為末向東酒服一刀圭即順十全博救方用蛇皮一條瓶子內鹽泥固煅研二錢榆白皮湯服濟生祕覽治逆生須臾不救用蛇蛻一具蟬蛻十四個頭髮一握並燒存性分二服酒下仍以小針刺兒足心三七下擦鹽少許即生婦人産難蛇蛻泡水浴産門自易寶鑑婦人吹乳蛇皮一尺七寸燒末溫酒一盞服産乳腫毒無頭蛇蛻灰豬脂和塗肘後石癰無膿堅硬如石用蛇蛻皮貼之經宿即愈千金諸腫有膿蛇蛻灰水和敷上即孔出千金翼疔腫魚臍外臺用蛇蛻雞子大水四升煮三四沸服汁立瘥直指治魚臍瘡出水四畔浮漿用蛇蛻燒存性研雞子清和敷惡瘡似癩十年不瘥者全蛻一條燒灰豬脂和敷仍燒一條溫酒服千金方癜風白駁聖惠用蛇皮燒灰醋調塗外臺用蛇蛻摩數百遍令熱棄草中勿回顧陷甲入肉常有血痛苦用蛇皮一具燒灰雄黃一彈丸同研末先以溫漿洗瘡針破貼之初虞世方耳忽大痛如有蟲在內奔走或血水流出或干痛不可忍者蛇退皮燒存性研鵝翎吹之立愈經驗祕方也楊拱醫方摘要蚺蛇蚺音髯別録下品釋名南蛇綱目埋頭蛇時珍曰蛇屬纖行此蛇身大而行更纖徐冉冉然也故名蚺蛇或云鱗中有毛如髯也産於嶺南以不舉首者為真故世稱為南蛇埋頭蛇集解頌曰蚺蛇陶弘景言出晉安蘇恭言出桂廣以南高賀等州今嶺南諸郡皆有之弘景曰大者二三圍在地行不舉頭者是真舉頭者非真其膏膽能相亂韓保升曰大者徑尺長丈許若蛇而粗短恭曰其形似鱧頭似鼉尾圓無鱗性難死土人截其肉作膾謂為珍味藏器曰其膾著醋能卷人箸終不可脫惟以芒草作箸乃可段成式酉陽雜俎云蚺蛇長十丈嘗吞鹿鹿消盡乃繞樹則腹中之骨穿鱗而出養創時肪腴甚美或以婦人衣投之則蟠而不起時珍曰按劉恂嶺表録異云蚺蛇大者五六丈圍四五尺小者不下三四丈圍亦稱是身有斑紋如故錦纈春夏于山林中伺鹿吞之蛇遂羸瘦待鹿消乃肥壯也或言一年食一鹿也又顧玠海槎録云蚺蛇吞鹿及山馬從後腳入毒氣呵及角自解脫其膽以小者為佳王濟手記云橫州山中多蚺蛇大者十餘丈食獐鹿骨角隨腐土人采葛藤塞入穴中蛇嗅之即靡乃發穴取之肉極腴美皮可冒鼓及飾刀劍樂器范成大虞衡志云寨兵捕蚺蛇滿頭插花蛇即注視不動乃逼而斷其首待其騰擲力竭乃斃舁歸食之又按山海經云巴蛇食象三年而出其骨君子服之無心腹之疾郭璞注云今蚺蛇即其類也南裔志蚺蛇贊曰蚺惟大蛇既洪且長采色駁映其文錦章食灰吞鹿腴成養創賓饗嘉食是豆是觴膽段成式曰其膽上旬近頭中旬近心下旬近尾頌曰嶺表録異云雷州有養蛇戶每歲五月五日即舁蛇入官取膽曝乾以充土貢每蛇以軟草借於籃中盤屈之將取則出於地上用杈拐十數翻轉蛇腹按定約分寸於腹間剖出肝膽膽狀若鴨子大取訖內肝於腹以線縫合舁歸放之或言蛇被取膽者他日捕之則遠遠露腹瘡以明無膽又言取後能活三年未知的否時珍曰南人嗜蛇至於發穴搜取能容蚺之再活露腹乎弘景曰真膽狹長通黑皮膜極薄舐之甜苦摩以注水即沉而不散恭曰試法剔取粟許著淨水中浮游水上回旋行走者為真其徑沉者諸膽血也勿多著亦沉散也陶未得法耳詵曰人多以豬膽虎膽僞之雖水中走但遲耳氣味甘苦寒有小毒主治目腫痛心腹䘌痛下部䘌瘡別録小兒八癇李珣殺五疳水化灌鼻中除小兒腦熱疳瘡䘌漏灌下部治小兒疳痢同麝香敷齒疳宣露孟詵破血止血痢蟲蠱下血藏器明目去翳膜療大風時珍發明時珍曰蚺稟己土之氣其膽受甲乙風木故其味苦中有甘所主皆厥陰太陰之病能明目涼血除疳殺蟲慎微曰顧含養嫂失明須用蚺蛇膽含求不得有一童子以一合授含含視之蚺蛇膽也童子化為青鳥而去含用之嫂目遂明附方舊二新二小兒急疳瘡水調蚺蛇膽敷之聖惠小兒疳痢羸瘦多睡坐則閉目食不下用蚺蛇膽豆許二枚煮通草汁研化隨意飲之並塗五心下部楊氏産乳齒䘌宣露出膿血用蚺蛇膽三錢枯白礬一錢杏仁四十七枚研勻以布揩齦嗍令血盡日三摻之愈乃止聖惠痔瘡腫痛蚺蛇膽研香油調塗立效醫方摘要肉氣味甘溫有小毒四月勿食主治飛尸遊蠱喉中有物吞吐不出藏器除疳瘡闢瘟疫瘴氣孟詵除手足風痛殺三蟲去死肌皮膚風毒癘風疥癬惡瘡時珍發明權曰度嶺南食蚺蛇瘴毒不侵時珍曰按柳子厚捕蛇者說云永州之野産異蛇黑質白章觸草木盡死以齧人無御之者然得而臘之以為餌可已大風攣踠瘻癘去死肌殺三蟲又張鷟朝野僉載云泉州盧元欽患癘風惟鼻根未倒五月五日官取蚺蛇膽進貢或言肉可治風遂取食之三五日頓可百日平復附方新三蚺蛇酒治諸風癱瘓筋攣骨痛痹木瘙癢殺蟲闢瘴及癘風疥癬惡瘡用蚺蛇肉一斤羌活一兩絹袋盛之用糯米二斗蒸熟安曲於缸底置蛇於曲上乃下飯密蓋待熟取酒以蛇焙研和藥其酒每隨量溫飲數杯忌風及欲事亦可袋盛浸酒飲集簡方急疳蝕爛蚺蛇肉作膾食之聖惠方狂犬齧人蛇脯為末水服五分日三服無蚺蛇他蛇亦可外臺祕要膏弘景曰真膏纍纍如梨豆子相著他蛇膏皆大如梅李子也氣味甘平有小毒主治皮膚風毒婦人産後腹痛余疾別録多入藥用亦療伯牛疾弘景癩也綿裹塞耳聾時珍出外臺牙長六七寸主治佩之闢不祥利遠行時珍異物志鱗蛇綱目集解時珍曰按方輿勝覽云鱗蛇出安南雲南鎮康州臨安沅江孟養諸處巨蟒也長丈餘有四足有黃鱗黑鱗二色能食麋鹿春冬居山夏秋居水能傷人土人殺而食之取膽治疾以黃鱗者為上甚貴重之珍按此亦蚺蛇之類但多足耳陶氏注蚺蛇分真假其亦此類歟膽氣味苦寒有小毒主治解藥毒治惡瘡及牙疼時珍出勝覽及一統志白花蛇宋開寶釋名蘄蛇綱目褰鼻蛇宗奭曰諸蛇鼻向下獨此鼻向上背有方勝花紋以此得名集解志曰白花蛇生南地及蜀郡諸山中九月十月採捕火干白花者良頌曰今黔中及蘄州鄧州皆有之其文作方勝白花喜螫人足黔人有被螫者立斷之續以木腳此蛇入人室屋中作爛瓜氣者不可向之須速闢除之時珍曰花蛇湖蜀皆有今惟以蘄蛇擅名然蘄地亦不多得市肆所貨官司所取者皆自江南興國州諸山中來其蛇龍頭虎口黑質白花脅有二十四個方勝文腹有念珠斑口有四長牙尾上有一佛指甲長一二分腸形如連珠多在石南藤上食其花葉人以此尋獲先撒沙土一把則蟠而不動以叉取之用繩懸起劙刀破腹去腸物則反尾洗滌其腹蓋護創爾乃以竹支定屈曲盤起扎縛炕干出蘄地者雖乾枯而眼光不陷他處者則否矣故羅願爾雅翼云蛇死目皆閉惟蘄州花蛇目開如生舒蘄兩界間者則一開一閉故人以此驗之又按元稹長慶集云巴蛇凡百類惟褰鼻白花蛇人常不見之毒人則毛髮豎立飲於溪澗則泥沙盡沸鷣鳥能食其小者巴人亦用禁術制之熏以雄黃煙則腦裂也此說與蘇頌所說黔蛇相合然今蘄蛇亦不甚毒則黔蜀之蛇雖同有白花而類性不同故入藥獨取蘄産者也修治頌曰頭尾各一尺有大毒不可用只用中段乾者以酒浸去皮骨炙過收之則不蛀其骨刺須遠棄之傷人毒與生者同也宗奭曰凡用去頭尾換酒浸三日火炙去盡皮骨此物甚毒不可不防時珍曰黔蛇長大故頭尾可去一尺蘄蛇止可頭尾各去三寸亦有單用頭尾者大蛇一條只得淨肉四兩而已久留易蛀惟取肉密封藏之十年亦不壞也按聖濟總録云凡用花蛇春秋酒浸三宿夏一宿冬五宿取出炭火焙乾如此三次以砂瓶盛埋地中一宿出火氣去皮骨取肉用肉氣味甘咸溫有毒時珍曰得酒良主治中風濕痹不仁筋脈拘急口面喎斜半身不遂骨節疼痛腳弱不能久立暴風瘙癢大風疥癩開寶頌曰花蛇治風速於諸蛇黔人治疥癩遍體諸藥不效者生取此蛇中劑以磚燒紅沃醋令氣蒸置蛇於上以盆覆一夜如此三次去骨取肉芼以五味令爛頓食之瞑眩一晝夜乃醒瘡疕隨皮便退其疾便愈治肺風鼻塞浮風癮疹身生白癜風癧瘍斑點甄權通治諸風破傷風小兒風熱急慢驚風搐搦瘰癧漏疾楊梅瘡痘瘡倒陷時珍發明斆曰蛇性竄能引藥至於有風疾處故能治風時珍曰風善行數變蛇亦善行數蛻而花蛇又食石南所以能透骨搜風截驚定搐為風痹驚搐癩癬惡瘡要藥取其內走臟腑外徹皮膚無處不到也凡服蛇酒藥切忌見風附方新十三驅風膏治風癱癘風遍身疥癬用白花蛇肉四兩酒炙天麻七錢半薄荷荊芥各二錢半為末好酒二升蜜四兩石器熬成膏每服一盞溫湯服日三服急於暖處出汗十日效醫壘元戎世傳百花蛇酒治諸風無新久手足緩弱口眼喎斜語言謇澀或筋脈攣急肌肉頑痹皮膚燥癢骨節疼痛或生惡瘡疥癩等疾用白花蛇一條溫水洗淨頭尾各去三寸酒浸去骨刺取淨肉一兩入全蠍炒當歸防風羌活各一錢獨活白芷天麻赤芍藥甘草升麻各五錢銼碎以絹袋盛貯用糯米二斗蒸熟如常造酒以袋置缸中待成取酒同袋密封煮熟置陰地七日出毒每溫飲數杯常令相續此方乃蘄人板印以侑蛇饋送者不知所始也瀕湖集簡方瑞竹白花蛇酒治諸風癘癬用白花蛇一條酒潤去皮骨取肉絹袋盛之蒸糯米一斗安曲於缸底置蛇於曲上以飯安蛇上用物密蓋三七日取酒以蛇曬乾為末每服三五分溫酒下仍以濁酒並糟作餅食之尤佳瑞竹堂經驗方瀕湖白花蛇酒治中風傷濕半身不遂口目喎斜膚肉𤸷痹骨節疼痛及年久疥癬惡瘡風癩諸症用白花蛇一條取龍頭虎口黑質白花尾有佛指甲目光不陷者為真以酒洗潤透去骨刺取肉四兩真羌活二兩當歸身二兩真天麻二兩真秦艽二兩五加皮二兩防風一兩各銼勻以生絹袋盛之入金華酒罈內懸胎安置入糯米生酒醅五壺浸袋箬葉密封安壇於大鍋內水煮一日取起埋陰地七日取出每飲一二杯仍以滓日乾碾末酒糊丸梧子大每服五十丸用煮酒吞下切忌見風犯欲及魚羊鵝面發風之物雞峰白花蛇膏治營衛不和陽少陰多手足舉動不快用白花蛇酒煮去皮骨瓦焙取肉一兩天麻狗脊各二兩為細末以銀盂盛無灰酒一升浸之重湯煮稠如膏銀匙攪之入生薑汁半杯同熬勻瓶收每服半匙頭用好酒或白湯化服日二次神效極佳備急方治癩白花蛇膏白花蛇五寸酒浸去皮骨炙乾雄黃一兩水飛研勻以白沙蜜一斤杏仁一斤去皮研爛同煉為膏每服一錢溫酒化下日三須先服通天再造散下去蟲物乃服此除根三因總録白花蛇散治腦風頭痛時作時止及偏頭風用白花蛇酒浸炙去皮骨天南星漿水煮軟切炒各一兩石膏荊芥各二兩地骨皮二錢半為末每服一錢茶下日三服聖濟總録潔古白花蛇散治大風病白花蛇烏稍蛇各取淨肉二錢酒炙雄黃二錢大黃五錢為末每服二錢白湯下三日一服家珍三蛇愈風丹治癘風手足麻木眉毛脫落皮膚瘙癢及一切風瘡白花蛇烏稍蛇土蝮蛇各一條並酒浸取肉曬乾苦參頭末四兩為末以皂角一斤切酒浸去酒以水一碗挼取濃汁石器熬膏和丸梧子大每服七十丸煎通聖散下以粥飯壓之日三服三日一浴取汗避風治例無蝮蛇有大楓子肉三兩三因白花蛇散治九漏瘰癧發項腋之間癢痛憎寒發熱白花蛇酒浸取肉二兩焙生犀角一兩二錢五分鎊研黑牽牛五錢半生半炒青皮五錢為末每服二錢入膩粉五分五更時糯米飲調下利下惡毒為度十日一服可絶病根忌發物俗傳白花蛇丸治楊梅瘡先服發散藥後服此用花蛇肉酒炙龜板酥炙穿山甲炙蜂房炙汞粉硃砂各一錢為末紅棗肉搗丸梧子大每服七丸冷茶下日三忌魚肉服盡即愈後服土茯苓藥調之方廣心法附余治楊梅瘡用花蛇肉一錢銀硃二錢鉛二錢汞二錢為末作紙捻九條每用一條於燈盞內香油浸點燈安烘爐里放被中蓋臥熏之勿透風一日三次托痘花蛇散治痘瘡黑陷白花蛇連骨炙勿令焦三錢大丁香七枚為末每服五分以水和淡酒下神效移時身上發熱其瘡頓出紅活也王氏手集頭氣味有毒主治癜風毒癩時珍附方新一紫癜風除風散以白花蛇頭二枚酒浸炙蠍梢一兩炒防風一兩上為末每服一錢溫酒下日一服聖濟總録目睛主治小兒夜啼以一隻為末竹瀝調少許灌之普濟烏蛇宋開寶附釋名烏梢蛇綱目黑花蛇綱目集解志曰烏蛇生商洛山背有三稜色黑如漆性善不噬物江東有黑梢蛇能纏物至死亦此類也頌曰蘄州黃州山中有之乾寧記云此蛇不食生命亦不害人多在蘆叢中吸南風及其花氣最難採捕多於蘆枝上得之其身烏而光頭圓尾尖眼有赤光至枯死眼不陷如活者稱之重七錢至一兩者為上十兩至一鎰者為中粗大者力彌減也作僞者用他蛇燻黑亦能亂真但眼不光耳宗奭曰烏蛇脊高世稱劍脊烏梢尾細長能穿小銅錢一百文者佳有身長丈餘者其性畏鼠狼蛇類中惟此入藥最多斆曰凡一切蛇須辨雌雄州土蘄州烏蛇頭上有逆毛二寸一路可長半分以來頭尾相對使之入藥如神只重一兩以下彼處得此多留進供蛇腹下有白帶子一條長一寸者雄也宜入藥用採得去頭及皮鱗帶子銼斷苦酒浸一宿漉出柳木炭火炙乾再以酥炙於屋下巳地上掘坑埋一夜再炙乾用或以酒煮乾用亦可時珍曰烏蛇有二種一種劍脊細尾者為上一種長大無劍脊而尾稍粗者名風梢蛇亦可治風而力不及肉氣味甘平無毒藥性論曰有小毒主治諸風頑痹皮膚不仁風瘙癮疹疥癬開寶熱毒風皮肌生癩眉髭脫落瘑疥等瘡甄權功與白花蛇同而性善無毒時珍附方舊二新五大風朝野僉載云商州有人患大風家人惡之山中為起茅屋有烏蛇墮酒罌中病人不知飲酒漸瘥罌底見有蛇骨始知其由治例治大風用烏蛇三條蒸熟取肉焙研末蒸餅丸米粒大以喂烏雞待盡殺雞烹熟取肉焙研末酒服一錢或蒸餅丸服不過三五雞即愈祕韞用大烏蛇一條打死盛之待爛以水二碗浸七日去皮骨入糙米一升浸一日曬乾用白雞一隻餓一日以米飼之待毛羽脫去殺雞煮熟食以酒下之吃盡以熱湯一盆浸洗大半日其病自愈紫白癜風烏蛇肉酒炙六兩枳殼麩炒羌活牛膝天麻各三兩熟地黃四兩白蒺藜炒五加皮防風桂心各二兩銼片以絹袋盛於無灰酒二斗中浸之密封七日每日三度溫服一小盞忌雞鵝魚肉發物聖惠面瘡䵟疱烏蛇肉二兩燒灰臘豬脂調敷聖惠嬰兒撮口不能乳者烏蛇酒浸去皮骨炙半兩麝香一分為末每用半分荊芥煎湯調灌之聖惠破傷中風項強身直定命散主之用白花蛇烏蛇並取項後二寸酒洗潤取肉蜈蚣一條全者並酒炙上為末每服三錢溫酒調服普濟方膏主治耳聾綿裹豆許塞之神效時珍出普濟方膽主治大風癘疾木舌脹塞時珍附方新二大風龍膽膏治大風疾神效用冬瓜一個截去五寸長去瓤掘地坑深三尺令淨安瓜於內以烏蛇膽一個消梨一個置於瓜上以土隔蓋之至三七日看一度瓜未甚壞候七七日三物俱化為水在瓜皮內取出每用一茶腳以酒和服之三兩次立愈小可風疾每服一匙頭王氏博濟方木舌塞脹不治殺人用蛇膽一枚焙乾為末敷舌上有涎吐去聖濟總録皮主治風毒氣眼生翳唇緊唇瘡時珍附方新一小兒緊唇脾熱唇瘡並用烏蛇皮燒灰酥和敷之聖惠卵主治大風癩疾時珍曰聖濟總録治癩風用烏蛇卵和諸藥為丸服云與蛇肉同功金蛇宋開寶附附銀蛇釋名金星地鱔圖經銀蛇亦名錫蛇時珍曰金銀錫以色與功命名也金星地鱔以形命名也集解頌曰金蛇生賓州澄州大如中指長尺許常登木飲露體作金色照日有光白者名銀蛇近皆少捕信州上饒縣靈山鄉出一種金星地鱔酷似此蛇冬月收捕亦能解毒時珍曰按劉恂嶺表録異云金蛇一名地鱔白者名錫蛇出黔州出桂州者次之大如拇指長尺許鱗甲上分金銀解毒之功不下吉利也據此則地鱔即金蛇非二種矣肉氣味咸平無毒主治解中金藥毒令人肉作雞腳裂夜含銀至曉變為金色者是也取蛇四寸炙黃煮汁頻飲以瘥為度銀蛇解銀藥毒開寶解衆毒止泄瀉除邪熱蘇頌療久痢時珍發明藏器曰嶺南多毒足解毒之藥金蛇白藥是矣時珍曰聖濟總録治久痢不止有金星地鱔散用金星地鱔醋炙鉛丹白礬燒各五錢為末每服二錢米飲下日二水蛇綱目釋名公蠣蛇集解時珍曰水蛇所在有之生水中大如鱔黃黑色有纈紋齧人不甚毒陶弘景言公蠣蛇能化鱧者即此也水中又有一種泥蛇黑色穴居成群齧人有毒與水蛇不同張文仲備急方言山中一種蛇與公蠣相似亦不齧人也肉氣味甘咸寒無毒主治消渴煩熱毒痢時珍附方新一聖惠水蛇丸治消渴四肢煩熱口乾心躁水蛇一條活者剝皮炙黃為末蝸牛五十個水浸五日取涎入天花粉末煎稠入麝香一分粟飯和丸緑豆大每服十丸薑湯下皮主治燒灰油調敷小兒骨疽膿血不止又治手指天蛇毒瘡時珍附方新二小兒骨瘡海上方詩云小兒骨痛不堪言出血流膿實可憐尋取水蛇皮一個燒灰油抹敷疼邊天蛇毒劉松篁經驗方云會水灣陳玉田妻病天蛇毒瘡一老翁用水蛇一條去頭尾取中截如手指長剖去骨肉勿令病者見以蛇皮包手指自然束緊以紙外裹之頓覺遍身皆涼其病即愈數日後解視手指有一溝如小繩蛇皮內宛然有一小蛇頭目俱全也蛇婆拾遺集解藏器曰蛇婆生東海水中一如蛇常自浮游採取無時時珍曰按此所言形狀功用似是水蛇然無考證姑各列條氣味咸平無毒主治赤白毒痢蠱毒下血五野雞病惡瘡炙食或燒末米飲服二錢藏器黃頷蛇綱目附赤楝蛇釋名黃喉蛇俗名赤楝蛇一名桑根蛇時珍曰頷喉下也以色名赤楝桑根象形陶氏作赤𧐖集解時珍曰按肘後千金外臺諸方多用自死蛇及蛇吞蛙鼠並不云是某蛇惟本草有蝮蛇腹中鼠陶氏注云術家所用赤𧐖黃頷多在人家屋間吞鼠子雀雛見腹中大者破取干之又蛇蛻注云草間不甚見虺蝮蛻多是赤𧐖黃頷輩據此則古方所用自死蛇及蛇吞蛙鼠當是二蛇雖蛇蛻亦多用之赤楝紅黑節節相間儼如赤楝桑根之狀黃頷黃黑相間喉下色黃大者近丈皆不甚毒丐兒多養為戲弄死即食之又有竹根蛇肘後謂之青蝰蛇不入藥用最毒喜緣竹木與竹同色大者長四五尺其尾三四寸有異點者名熇尾蛇毒尤猛烈中之者急灸三五壯毒即不行仍以藥敷之又有菜花蛇亦長大黃緑色方家亦有用之者肉氣味甘溫有小毒主治釀酒或入丸散主風癩頑癬惡瘡自死蛇漬汁塗大疥煮汁浸臂腕作痛燒灰同豬脂塗風癬漏瘡婦人妒乳猘犬咬傷時珍出肘後梅師千金諸方附方新三猘犬齧傷自死蛇一枚燒焦為末納入瘡孔中千金方貓鬼野道歌哭不自由五月五日自死赤蛇燒灰井華水服方寸匕日一服千金方惡瘡似癩及馬疥大如錢者自死蛇一條水漬至爛去骨取汁塗之隨手瘥千金蛇頭主治燒灰主久瘧及小腸癰入丸散用時珍附方新二發背腫毒蛇頭燒灰醋和敷之日三易千金蛤蟆瘻瘡五月五日蛇頭及野豬脂同水衣封之佳千金方骨主治久瘧勞瘧炙入丸散用時珍附方新一一切冷漏自死蛇取骨為末封之大痛以杏仁膏摩之即止千金方涎氣味有大毒思邈曰江南山間人有一種蠱毒以蛇涎合藥著飲食中使人病瘕積年乃死但以雄黃蜈蚣之藥治之乃佳蛇吞鼠主治鼠瘻蟻瘻有細孔如針者以臘月豬脂煎焦去滓塗之時珍出千金蛇吞蛙主治噎膈勞嗽蛇瘻時珍附方新三噎膈用蛇含蛤蟆泥包燒存性研末米飲服久勞咳嗽吐臭痰者尋水邊蛇吞青蛙未咽者連蛇打死黃泥固濟煅研空心酒服一二錢至效忌生冷五七日永不發也祕韞方蛙瘻不愈蛇腹蛙燒灰封之千金蝮蛇別録下品釋名反鼻蛇時珍曰按王介甫字說云蝮觸之則復其害人也人亦復之故謂之蝮集解弘景曰蝮蛇黃黑色如土白斑黃頷尖口毒最烈虺形短而扁毒與蚖同蛇類甚衆惟此二種及青蝰為猛不即療多死恭曰蝮蛇作地色鼻反口長身短頭尾相似山南漢沔間多有之一名蚖蛇無二種也頌曰蝮蛇形不長頭扁口尖頭斑身赤紋斑亦有青黑色者人犯之頭足貼著東間諸山甚多草行不可不慎藏器曰蝮蛇錦紋亦有與地同色者衆蛇之中此獨胎産著足斷足著手斷手不爾合身糜爛七八月毒盛時齧樹以泄其毒樹便死又吐涎沫於草木上著人成瘡身腫名曰蛇漠瘡卒難治療方與蛇螫同時珍曰蝮與虺陶氏言是二種蘇恭言是一種今按爾雅云蝮虺身博三寸首大如擘是以蝮虺為一種也郭璞云蝮蛇惟南方有之一名反鼻細頸大頭焦尾鼻上有針錦紋如綬紋間有毛如豬鬣大者長七八尺虺則所在有之俗呼土虺與地同色顏師古云以俗名證之郭說為是又北史高道穆謂爾朱榮云今若還師令元皓重完守具乃養虺成蛇是皆以蝮虺為二種矣蓋蝮長大虺短小自不難辨陶說為是柳子厚宥蝮蛇文云目兼蜂蠆色混泥塗其頸蹙恧其腹次且褰鼻鉤牙穴出榛居蓄怒而蟠銜毒而趨亦頗盡其狀也抱朴子曰蛇類最多惟蝮中人甚急但即時以刀割去瘡肉投於地其肉沸如火炙須臾焦盡人乃得活王充論衡云蝮蛇含太陽火氣而生故利牙有毒膽氣味苦微寒有毒主治䘌瘡別録殺下部蟲甄權療諸漏研敷之若作痛杵杏仁摩之時珍出外臺肉氣味甘溫有毒主治釀作酒療癩疾諸瘻心腹痛下結氣除蠱毒別録五痔腸風瀉血甄權大風諸惡風惡瘡瘰癧皮膚頑痹半身枯死手足臟腑間重疾藏器曰取活蛇一枚著器中投以醇酒一斗封定埋馬溺處周年取開蛇已消化酒味猶存有患諸證者不過服一升以來當覺舉身習習而愈然有小毒不可頓服若服他藥不復得力又曰生癩者取一枚或他蛇亦可燒熱坐上當有赤蟲如馬尾出仍取蛇肉塞鼻中發明時珍曰癩疾感天地肅殺之氣而成惡疾也蝮蛇稟天地陰陽毒烈之氣而生惡物也以毒物而攻毒病蓋從其類也附方舊一白癩大蝮蛇一條勿令傷以酒一斗漬之糠火溫令稍熱取蛇一寸和臘月豬脂搗敷肘後方脂藏器曰摩著物皆透也主治綿裹塞耳聾亦敷腫毒時珍皮主治燒灰療疔腫惡瘡骨疽蘇恭蛻主治身癢疥癬瘑瘡蘇恭骨主治赤痢燒灰飲服三錢雜蛇亦可藏器屎器中養取之主治痔瘻蘇恭腹中死鼠有小毒主治鼠瘻別録千金云燒末酒服方寸匕日二不過三日大驗附録千歲蝮頌曰東間一種千歲蝮狀如蝮而短有四腳能跳來齧人人或中之必死其齧已即跳上木作聲云斫木斫木者不可救也若云博叔博叔者猶可急治之用細辛雄黃等分為末納瘡中日三四易之又以栝蔞根桂末著管中密塞勿令走氣佩之中毒急敷之緩即不救時珍曰按字林云䎼聽形如蜥蜴出魏興居樹上見人則跳來齧之齧已還樹垂頭聽聞哭聲乃去即此也其狀頭尾一般大如搗衣杵俗名合木蛇長一二尺談野翁方名斫木蛇又名望板歸救之用嫩黃荊葉搗爛敷之蚖別録集解別録曰蚖類一名蚖短身土色而無紋時珍曰蚖與蝮同類即虺也長尺余蝮大而虺小其毒則一食經所謂虺色如土小如蝮蛇者是也詳見蝮下舊本作蚖類一名蚖誤矣當作蚖蝮類一名𧈭𧈭即虺字蚖𧈭字象相近傳寫脫誤爾陶氏注蝮即蚖亦誤矣蚖既是蝮別録不應兩出今並改正氣味缺主治療痹內漏別録治破傷中風大風惡疾時珍附方新一破傷風牙關緊急口噤不開口面喎斜肢體弛緩用土虺蛇一條去頭尾腸皮骨醋炙地龍五條去泥醋炙天南星八錢重一枚炮上為末醋煮麵糊丸如緑豆大每服三丸至五丸生薑酒下仍食稀蔥白粥取汗即瘥昔宮使明光祖向任統制官被重傷服此得效普濟方藍蛇拾遺集解藏器曰出蒼梧諸縣狀如蝮有約從約斷之頭毒尾良嶺南人呼為藍藥主治用頭合毒藥毒人至死以尾作脯食之即解藏器兩頭蛇拾遺釋名枳首蛇爾雅越王蛇時珍曰枳兩也郭璞云會稽人言是越王弩弦所化故名越王蛇江東人名越王約發續博物志云馬鱉食牛血所化然亦自有種類非盡化生也集解藏器曰兩頭蛇大如指一頭無口目兩頭俱能行云見之不吉故孫叔敖埋之恐後人見之必死也時珍曰按爾雅中央有枳首蛇中國之異氣也劉恂嶺表録異云嶺外極多長尺余大如小指背有錦紋腹下鱗紅人視為常不以為異羅願爾雅翼云寧國甚多數十同穴黑鱗白章又一種夏月雨後出如蚯蚓大有鱗其尾如首亦名兩頭蛇又張耒雜志云黃州兩頭蛇一名山蚓云是老蚓所化行不類蛇宛轉甚鈍此即羅氏所云者也肉氣味時珍曰按南越志云無毒夷人餌之主治瘧疾山人收取干之佩於項上時珍天蛇綱目集解時珍曰按沈存中筆談云天蛇生幽陰之地遇雨後則出越人深畏之其大如箸而扁長三四尺色黃赤澆之以醋則消或以石灰糝之亦死又云天蛇不知何物人遭其螫仍為露水所濡則遍身潰爛或云草間黃花蜘蛛者非矣廣西一吏為蟲所毒舉身潰爛一醫視云天蛇所螫不可為矣仍以藥敷其一有腫處以鉗拔出如蛇十餘而疾終不起又錢塘一田夫忽病癩通身潰爛號呼欲絶西溪寺僧視之曰此天蛇毒非癩也以秦皮煮汁一斗令其恣飲初日減半三日頓愈又水蛇治天蛇毒見前苟印拾遺集解藏器曰苟印一名苟鬥出潮州如蛇有四足膏主治滴耳中治聾令左右耳徹藏器蛇角綱目釋名骨咄犀亦作骨篤碧犀時珍曰按陶九成輟耕録云骨咄犀大蛇之角也當作蠱毒謂其解蠱毒如犀角也唐書有古都國亦産此則骨咄又似古都之訛也集解時珍曰按大明會典云蛇角出哈密衛劉郁西使記云骨篤犀即大蛇角出西番曹昭格古論云骨篤犀碧犀也色如淡碧玉稍有黃色其文理似角扣之聲清越如玉磨刮嗅之有香燒之不臭最貴重能消腫解毒洪邁松漠紀聞云骨咄犀犀不甚大紋如象牙帶黃色作刀靶者以為無價之寶也氣味有毒主治消腫毒解諸毒蠱毒以毒攻毒也時珍諸蛇綱目釋名時珍曰蛇字古作它俗作蛇有佘移他三音篆文象其宛轉屈曲之形其行委他故名嶺南人食之或呼為訛或呼為茅鱔按山海經云海外西南人以蟲為蛇號蛇為魚則自古已然矣集解時珍曰蛇類瑣語不可類從者萃族於下以便考閲蛇在禽為翼火天文象形居南方在卦為巽風巳為蛇在神為玄武北方之神玄龜纁蛇相合也在物為毒蟲出說文有水火草木土五種出北戶録青黃赤白黑金翠斑花諸色見各條毒蟲也而有無毒者金蛇水蛇無毒鱗蟲也而有生毛者蝮蛇紋間有毛山海經云長蛇毛如彘毫也卵生也而有胎産者蝮蛇胎生腹行也而有四足者鱗蛇千歲蝮苟印蜥蜴皆有足又有冠者雞冠蛇頭上有冠最毒角者三角蛇有角翼者西山經云太華山有蛇六足四翼名曰肥螿飛者山海經云柴桑多飛蛇荀子云螣蛇無足而飛獸首者大荒經云肅慎國有琴蛇獸首蛇身人面者江湖紀聞云嶺表有人面蛇能呼人姓名害人惟畏蜈蚣兩首者枳首蛇兩身者北山經云渾夕之山有蛇曰肥遺一首兩身見則大旱管子曰涸水之精名曰蟡狀如蛇一首兩身長八尺呼其名可取魚鱉歧尾者廣志云出雲南鉤尾者張文仲云鉤蛇尾如鉤能鉤人獸入水後而食之熇尾者葛洪云熇尾蛇似青蝰其尾三四寸有異色最毒舵形者張文仲云舵蛇形似舵長七八尺中人必死削船舵煮汁浸之杵形者即合木蛇又有青蝰即竹根蛇白蝰蒼虺文蝮白頸黑甲赤目黃口之類張文仲云惡蛇甚多四五月青蝰蒼虺白頸大蜴六七月竹狩白蝰文蝮黑甲赤目黃口反鉤三角之類皆毒之猛烈者又南方有𠯜蛇人若傷之不死終身伺其主雖百衆人中亦來取之惟百里外乃免耳蛇出以春出則食物蛇以春夏為晝秋冬為夜其蟄以冬蟄則含土至春吐出即蛇黃石其舌雙物理論云舌者心苗火旺於巳巳為蛇故蛇雙舌其耳聾埤雅云蛇聾虎齆其聽以目埤雅其蟠向壬淮南子其毒在涎弄蛇洗淨涎則無毒也蛇涎著人生蛇漠瘡吐涎成絲能害人目段成式云蛇怒時毒在頭尾其珠在口陸佃云龍珠在頷蛇珠在口懷珠之蛇多喜投暗見人張口吐氣如燼其行也紆淮南子云蛇屬紆行其食也吞有牙無齒皮數解蛻變化論云龍易骨蛇易皮性曉方藥出稽聖賦又異苑云田父見蛇被傷一蛇銜草敷之遂去其人採草治瘡名曰蛇銜蛇交蛇則雄入雌腹交巳即退出也段成式云人見蛇交三年死李鵬飛雲人見蛇交主有喜蛇交雉則生蜃及蟂詳見蛟龍魯至剛云蛇交雉生卵遇雷入土久則成蛟不入土但為雉耳述異記云江淮中有獸名能乃蛇精所化也冬則為雉春復為蛇蛇以龜鱉為雌埤雅云大腰純雌以蛇為雄蛇求於龜鱉則生龜鱉蛇求於雉則生蜃蛟物異而感同也又與鱧鱔通氣見本條入水交石斑魚見本條入山與孔雀匹禽經云鵲見蛇則噪而奔孔見蛇則喜而躍竹化蛇蛇化雉異苑云大元中汝南人伐木見一竹中央已成蛇形而枝葉如故又桐廬民伐竹見蛇化雉頭項已就身猶蛇也乃知竹化蛇蛇化雉蚿憐蛇蛇憐風出莊子水蛇化鱔名蛇鱔有毒螣蛇化龍神蛇能乘雲霧而飛遊千里螣蛇聽孕出變化論又抱朴子云螣蛇不交蟒蛇目圓出述異記大蛇曰蟒巴蛇吞象山海經云巴蛇食象三年而出其骨蚺蛇吞鹿詳本條玄蛇吞麈大鹿也出山海經活褥蛇能捕鼠唐書云貞觀中波斯國獻之狀同鼠色正青能捕鼠食蛇鼠能捕蛇唐書云罽賓國有食蛇鼠尖喙赤尾能食蛇被蛇螫者以鼠嗅而尿之立愈蛇吞鼠而有齧蛇之鼠狼寇曰嘗見一烏蛇長丈餘有鼠狼齧蛇頭曳之而去亦相畏伏耳蛇吞蛙而有制蛇之田父洽聞記云蛤蟆大者名田父見蛇則銜其尾良久蛇死尾後數寸皮不損而肉已盡矣蛇令豹止而有食蛇之貘淮南子云蛇令豹止物相制也貘乃白豹食蛇及鐵龜蛇同氣而有呷蛇之龜見攝龜玄龜食蟒王起云以小制大禽之制在氣也蝍蛆甘帶出莊子蝍蛆蜈蚣也帶蛇也陸佃云蜈蚣見大蛇能以氣禁之啖其腦眼蟾蜍食蝍蛆蝍蛆食蛇蛇食蟾蜍物畏其天也墨客揮犀云蜈蚣逐蛇蛇即張口乃入其腹食之鴆步則蛇出鵙鳴則蛇結出禽經鴆鳥能禹步禁咒使大石自轉取蛇食之蛇入口即糜也鸛亦然鵙伯勞也鸛鶴鷹鶻鶖皆鳥之食蛇者也蛇鷹蛇鶻余見本條虎猴麂麝牛皆獸之食蛇者也玃猴食蛇牛食蛇則獨肝有毒蛇所食之蟲則蛙鼠燕雀蝙蝠鳥雛所食之草則芹茄石南茱萸蛇粟噇子也所憎之物則蘘荷菴䕡蛇網草鵝糞所畏之藥則雄黃雌黃羖羊角蜈蚣千金云入山佩武都雄黃雌黃或燒羖羊角煙或筒盛蜈蚣則蛇不敢近誤觸萵菜則目不見物出續墨客揮犀炙以桑薪則足可立出藏器曰蛇有足見之不佳以桑薪火炙之則見不足怪也陶弘景曰五月五日燒地令熱以酒沃之置蛇於上則足見蛇蟠人足淋以熱尿或沃以熱湯則自解蛇入人竅灸以艾炷或辣以椒末則自出以艾炷灸蛇尾或割破蛇尾塞以椒末即出內解蛇毒之藥則雄黃貝母大蒜薤白蒼耳外治蛇蠚之藥則大青鶴蝨苦苣堇菜射罔薑黃乾薑白礬黑豆葉黃荊葉蛇含草犬糞鵝糞蔡苴機糞
