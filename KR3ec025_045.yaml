body:
  text: 介部第四十五卷李時珍曰介蟲三百六十而龜為之長龜蓋介蟲之靈長者也周官鱉人取互物以時簎昌角切春獻鱉蜃秋獻龜魚祭祀供蠯排螺螺蚳池以授醢人則介物亦聖世供饌之所不廢者而況又可充藥品乎唐宋本草皆混入蟲魚今析為介部凡四十六種分為二類曰龜鱉曰蚌蛤神農本草經八種梁陶弘景注名醫別録五種梁陶弘景注唐本草二種唐蘇恭本草拾遺一十種唐陳藏器海藥本草二種唐李珣蜀本草一種蜀韓保升開寶本草二種宋馬志嘉祐本草八種宋掌禹錫圖經本草一種宋蘇頌本草蒙筌一種明陳嘉謨本草綱目六種明李明珍附注魏吳普本草李當之藥録宋雷斆炮炙論齊徐之才藥對唐甄權藥性孫思邈千金唐孟詵張鼎食療楊損之刪繁蕭炳四聲南唐陳士良食性宋寇宗奭衍義大明日華金張元素珍珠囊元李杲法象王好古湯液吳瑞日用朱震亨補遺明汪穎食物明寧源食鑑明汪機會編介之一龜鱉類一十七種水龜本經上品釋名玄衣督郵時珍曰按許慎說文云龜頭與蛇頭同故字上從它其下象甲足尾之形它即古蛇字也又爾雅龜有十種郭璞隨文傅會殊缺分明蓋山澤水火四種乃因常龜所生之地而名也其大至一尺以上者在水曰寶龜亦曰蔡龜在山曰靈龜皆國之守寶而未能變化者也年至百千則具五色而或大或小變化無常在水曰神龜在山曰筮龜皆龜之聖者也火龜則生炎地如火鼠也攝龜則呷蛇龜也文龜則蟕蠵玳瑁也後世不分山澤水火之異通以小者為神龜年久者為靈龜誤矣本經龜甲止言水中者而諸注始用神龜然神龜難得今人惟取水中常龜入藥故今總標水龜而諸龜可該矣集解時珍曰甲蟲三百六十而神龜為之長龜形象離其神在坎上隆而文以法天下平而理以法地背陰向陽蛇頭龍頸外骨內肉腸屬於首能運任脈廣肩大腰卵生思抱其息以耳雌雄尾交亦與蛇匹或云大腰無雄者謬也今人視其底甲以辨雌雄龜以春夏出蟄脫甲秋冬藏穴導引故靈而多壽南越志云神龜大如拳而色如金上甲兩邊如鋸齒爪至利能緣樹食蟬抱朴子云千歲靈龜五色具焉如玉如石變化莫測或大或小或遊於蓮葉之上或伏於叢蓍之下張世南質龜論云龜老則神年至八百反大如錢夏則遊於香荷冬則藏於藕節其息有黑氣如煤煙在荷心狀甚分明人見此氣勿輒驚動但潛含油管噀之即不能遁形矣或云龜聞鐵聲則伏被蚊噆則死香油抹眼則入水不沉老桑煮之則易爛皆物理制伏之妙也龜甲釋名神屋本經敗龜版日華敗將日華漏天機圖經時珍曰並隱名也集解別録曰龜甲生南海池澤及湖水中採無時勿令中濕濕即有毒陶弘景曰此用水中神龜長一尺二寸者為善厴可供卜殼可入藥亦入仙方當以生龜炙取韓保升曰湖州江州交州者骨白而厚其色分明供卜入藥最良大明曰卜龜小而腹下曾鑽十遍者名敗龜版入藥良蘇頌曰今江湖間皆有之入藥須用神龜神龜版當心前一處四方透明如琥珀色者最佳其頭方腳短殼圓版白者陽龜也頭尖腳長殼長版黃者陰龜也陰人用陽陽人用陰今醫家亦不知如此分別時珍曰古者取龜用秋攻龜用春今之採龜者聚至百十生鋸取甲而食其肉彼有龜王龜相龜將等名皆視其腹背左右之紋以別之龜之直中紋名曰千里其首之橫紋第一級左右有斜理皆接乎千里者即龜王也他龜即無此矣言占事帝王用王文用相武用將各依等級其說與逸禮所載天子一尺二寸諸侯八寸大夫六寸士庶四寸之說相合亦甚有理若天神龜寶龜世所難得則入藥亦當依此用之可也日華用卜龜小甲蓋取便耳又按經云龜甲勿令中濕一名神屋陶言厴可供卜殼可入藥則古者上下甲皆用之至日華始用龜版而後人遂主之矣正誤吳球曰先賢用敗龜版補陰借其氣也今人用鑽過及煮過者性氣不存矣惟靈山諸谷因風墜自敗者最佳田池自敗者次之人打壞者又次之時珍曰按陶氏用生龜炙取日華用灼多者皆以其有生性神靈也曰敗者謂鑽灼陳久如敗也吳氏不達此理而反用自死枯敗之版復謂灼者失性謬矣縱有風墜自死者亦山龜耳淺學立異誤世鄙人據以為談故正之修治以龜甲鋸去四邊石上磨淨灰火炮過塗酥炙黃用亦用酒炙醋炙豬脂炙燒灰用者氣味甘平有毒甄權曰無毒時珍曰按經云中濕者有毒則不中濕者無毒矣之才曰惡沙參蜚蠊畏狗膽瘦銀主治甲治漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合久服輕身不飢本經驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或飢體寒熱欲死以作湯良久服益氣資智使人能食燒灰治小兒頭瘡難燥女子陰瘡別録溺主久嗽斷瘧弘景殼炙末酒服主風腳弱蕭炳版治血麻痹日華燒灰治脫肛甄權下甲補陰主陰血不足去瘀血止血痢續筋骨治勞倦四肢無力震亨治腰腳痠痛補心腎益大腸止久痢久泄主難産消癰腫燒灰敷臁瘡時珍發明震亨曰敗龜版屬金水大有補陰之功而本草不言惜哉蓋龜乃陰中至陰之物稟北方之氣而生故能補陰治血治勞也時珍曰龜鹿皆靈而有壽龜首常藏向腹能通任脈故取其甲以補心補腎補血皆以養陰也鹿鼻常反向尾能通督脈故取其角以補命補精補氣皆以養陽也乃物理之玄微神工之能事觀龜甲所主諸病皆屬陰虛血弱自可心解矣又見鱉甲附方舊二新十二補陰丸丹溪方用龜下甲酒炙熟地黃九蒸九曬各六兩黃柏鹽水浸炒知母酒炒各四兩石器為末以豬脊髓和丸梧子大每服百丸空心溫酒下一方去地黃加五味子炒一兩瘧疾不止龜版燒存性研末酒服方寸匕海上名方抑結不散用龜下甲酒炙五兩側柏葉炒一兩半香附童便浸炒三兩為末酒糊丸梧子大每空心溫酒服一百丸胎産下痢用龜甲一枚醋炙為末米飲服一錢日二經驗方難産催生祕録用龜甲燒末酒服方寸匕摘玄治産三五日不下垂死及矮小女子交骨不開者用干龜殼一個酥炙婦人頭髮一握燒灰川芎當歸各一兩每服稱七錢水煎服如人行五里許再一服生胎死胎俱下腫毒初起敗龜版一枚燒研酒服四錢小山婦人乳毒同上方小兒頭瘡龜甲燒灰敷之聖惠方月蝕耳瘡同上口吻生瘡同上臁瘡朽臭生龜一枚取殼醋炙黃更煅存性出火氣入輕粉麝香蔥湯洗淨搽敷之急救方人咬傷瘡龜版骨鱉肚骨各一片燒研油調搽之葉氏摘玄豬咬成瘡龜版燒研香油調搽之葉氏摘玄肉氣味甘酸溫無毒弘景曰作羹臛大補而多神靈不可輕殺書家所載甚多此不具說思邈曰六甲日十二月俱不可食損人神氣不可合豬肉菰米瓜莧食害人主治釀酒治大風緩急四肢拘攣或久癱緩不收皆瘥蘇頌煮食除濕痹風痹身腫踒折孟詵治筋骨疼痛及一二十年寒嗽止瀉血血痢時珍發明時珍曰按周處風土記云江南五月五日煮肥龜入鹽豉蒜蓼食之名曰葅龜取陰內陽外之義也附方舊一新六熱氣濕痹腹內激熱用龜肉同五味煮食之微泄為效普濟方筋骨疼痛用烏龜一個分作四腳每用一腳入天花粉枸杞子各一錢二分雄黃五分麝香五分槐花三錢水一碗煎服纂要奇方十年咳嗽或二十年醫不效者生龜三枚治如食法去腸以水五升煮取三升浸曲釀秫米四升如常法熟飲之令盡永不發又方用生龜一枚著坎中令人溺之浸至三日燒研以醇酒一升和屑如干飯頓服須臾大吐嗽囊出則愈小兒減半肘後方痢及瀉血烏龜肉以沙糖水拌椒和炙煮食之多度即愈普濟方勞瘵失血田龜煮取肉和蔥椒醬油煮食補陰降火治虛勞失血咯血咳嗽寒纍用經驗吳球便民食療年久痔漏田龜二三個煮取肉入茴香蔥醬常常食纍驗此疾大忌糟醋等熱物便民食療血氣味咸寒無毒主治塗脫肛甄權治打撲傷損和酒飲之仍搗生龜肉塗之時珍膽汁氣味苦寒無毒主治痘後目腫經月不開取點之良時珍溺採取頌曰按孫光憲北夢瑣言云龜性妒而與蛇交惟取龜置瓦盆中以鑑照之龜見其影則淫發失尿急以物收取之又法以紙炷火上熁熱以點其尻亦致失尿但差緩耳時珍曰今人惟以豬鬃或松葉刺其鼻即尿出似更簡捷也主治滴耳治聾藏器點舌下治大人中風舌喑小兒驚風不語摩胸背治龜胸龜背時珍發明時珍曰龜尿走竅透骨故能治喑聾及龜背染髭發也按岣嶁神書言龜尿磨瓷器能令軟磨墨書石能入數分即此可推矣附方舊一新二小兒龜背以龜尿摩其胸背久久即瘥孫真人中風不語烏龜尿點少許於舌下神妙壽域鬚髮早白以龜尿調水蛭細末日日捻之自黑末忌粗談野翁方秦龜別録上品釋名山龜宗奭曰龜則四方皆有但秦地山中多老龜極大而壽故取為用以地別名集解別録曰秦龜生山之陰土中二月八月採保升曰今江南嶺南處處有之冬月藏土中春夏秋即出遊溪谷古人獨取秦地者耳弘景曰此即山中龜不入水者其形大小無定方藥稀用恭曰秦龜即蟕蠵更無別也士良曰秦人呼蟕蠵為山龜是矣藏器曰蟕蠵生海水中秦龜生山陰是深山中大龜如碑下趺者食草根竹萌冬蟄春出卜人亦取以占山澤揭甲亦可飾器物頌曰蟕蠵生嶺南別是一種山龜非秦龜也龜類甚多罕能遍識蓋近世貨幣不用知卜者稀故爾弗貴也時珍曰山中常龜鹿喜食之其大而可卜者曰靈龜年至百歲能變化者曰筮龜或伏於蓍草之下或遊於卷耳芩葉之上抱朴子所謂山中巳日稱時君者為龜即此也其蟕蠵或以為山龜或云生海水中其說不定按山海經蠵龜生深澤中應劭注漢書云靈蠵大龜也雌曰蟕蠵雄曰玳瑁觀此則秦龜是山龜蟕蠵是澤龜與爾雅山龜澤龜水龜相合蓋一種二類故其占卜入藥飾器功用尤同甲修治李珣曰經卜者更妙以酥或酒炙黃用氣味苦溫無毒主治除濕痹氣身重四肢關節不可動搖別録頑風冷痹關節氣壅婦人赤白帶下破積症李珣補心宗奭治鼠瘻時珍發明宗奭曰大龜靈於物故方家用以補心然甚有驗時珍曰見龜甲附方新一鼠瘻劉涓子用山龜殼炙貍骨炙甘草炙雄黃桂心乾薑等分為末飲服方寸匕日三仍以艾灸瘡上用蜜和少許入瘡中良頭主治陰乾炙研服令人長遠入山不迷孟詵弘景曰前臛骨佩之亦然耳蠵龜綱目釋名蟕蠵音茲夷靈蠵漢書靈龜郭璞注𪓟鼊音拘璧一作蚼𧓄贔屓音備戲雜俎作係臂者非皮名龜筒時珍曰蟕蠵鳴聲如茲夷故名𪓟鼊者南人呼龜皮之音也贔屓者有力貌今碑趺象之或云大者為蟕蠵贔屓小者為𪓟鼊甚通集解弘景曰蟕蠵生廣州恭曰即秦龜也藏器曰蟕蠵生海邊甲有文堪為物飾非山龜也保升曰蘇恭之說非通論也按郭璞爾雅注云蟕蠵出涪陵郡大龜也其緣甲文似玳瑁能鳴甲亦可卜俗呼靈龜是矣頌曰蟕蠵別是一種山龜之大者非秦龜也嶺表録異云潮循間甚多人立背上可負而行鄉人取殼以生得全者為貴初用木換出其肉龜被楚毒鳴吼如牛聲振山谷古人謂生龜脫筒指此工人以其甲通明黃色者煮拍陷玳瑁為器謂之龜筒入藥亦以生脫為主日華曰蟕蠵即𪓟鼊也皮可寶裝飾物時珍曰蟕蠵諸說不一按山海經云蠵龜生深澤中注云大龜也甲有文采似玳瑁而薄應劭注漢書云靈蠵大龜也雄曰玳瑁雌曰蟕蠵據此二說皆出古典質以衆論則蟕蠵即𪓟鼊之大者當以藏器日華為準也生於海邊山居水食玳瑁之屬非若山龜不能入水也故功用專於解毒與玳瑁相同自可意會劉欣期交州記云蚼𧓄似玳瑁大如笠四足縵胡無指爪其甲有黑珠文采斑似錦紋但薄而色淺不任作器惟堪貼飾今人謂之鼊皮臨海水土記云其形如龜鱉身其甲黃點有光廣七八寸長二三尺彼人以亂玳瑁肉味如黿可食卵大如鴨卵正圓生食美於鳥卵酉陽雜俎云係臂狀如龜生南海捕者必先祭後取之肉氣味甘平無毒主治去風熱利腸胃時珍血氣味咸平微毒主治療俚人毒箭傷弘景中刀箭悶絶者刺飲便安日華藏器曰南人用燋銅及蛇汁毒亦多養此用龜筒釋名鼊皮氣味甘咸平無毒主治血疾及中刀箭毒煎汁飲大明解藥毒蠱毒時珍附録𪓬𪓹音迷麻鼂音朝時珍曰按臨海水土記云𪓬𪓹狀似𪓟鼊而甲薄形大如龜味極美一枚有膏三斛又有鼂亦如𪓟鼊腹如羊胃可啖並生海邊沙中玳瑁宋開寶釋名玳瑁音代昧又音毒目時珍曰其功解毒毒物之所媢嫉者故名集解藏器曰玳瑁生嶺南海畔山水間大如扇似龜甲中有紋士良曰其身似龜首嘴如鸚鵡頌曰今廣南皆有龜類也大者如盤其腹背甲皆有紅點斑紋入藥須用生者乃靈凡遇飲食有毒則必自搖動死者則不能神矣今人多用雜龜筒作器皿皆殺取之又經煮拍故生者殊難得時珍曰按范成大虞衡志云玳瑁生海洋深處狀如龜黿而殼稍長背有甲十三片黑白斑文相錯而成其裙邊有花缺如鋸齒無足而有四鬣前長後短皆有鱗斑紋如甲海人養以鹽水飼以小魚又顧玠海槎余録云大者難得小者時時有之但老者甲厚而色明小者甲薄而色暗世言鞭血成斑謬矣取時必倒懸其身用滾醋潑之則甲逐片應手落下南方異物志云大者如籧蒢背上有鱗大如扇取下乃見其紋煮柔作器治以鮫魚皮瑩以枯木葉即光輝矣陸佃云玳瑁不再交望卵影抱謂之護卵甲氣味甘寒無毒宗奭曰入藥用生者性味全也既經湯火即不堪用與生熟犀義同主治解嶺南百藥毒藏器破癥結消癰毒止驚癇日華療心風解煩熱行氣血利大小腸功與肉同士良磨汁服解蠱毒生佩之闢蠱毒蘇頌解痘毒鎮心神急驚客忤傷寒熱結狂言時珍發明時珍曰玳瑁解毒清熱之功同於犀角古方不用至宋時至寶丹始用之也又見鱉甲附方舊一新三解蠱毒生玳瑁磨濃汁水服一盞即消楊氏産乳預解痘毒遇行時服此未發內消已發稀少用生玳瑁生犀角各磨汁一合和勻溫服半合日三服最良靈苑方痘瘡黑陷乃心熱血凝也用生玳瑁生犀角同磨汁一合入豬心血少許紫草湯五匙和勻溫服聞人規痘疹論迎風目淚乃心腎虛熱也用生玳瑁羚羊角各一兩石燕子一雙為末每服一錢薄荷湯下日一服鴻飛集肉氣味甘平無毒主治諸風毒逐邪熱去胸膈風痰行氣血鎮心神利大小腸通婦人經脈士良血主治解諸藥毒刺血飲之開寶附録撒八兒時珍曰按劉郁西使記云出西海中乃玳瑁遺精蛟魚吞食吐出年深結成者其價如金僞作者乃犀牛糞也竊謂此物貴重如此必有功用亦不知果是玳瑁遺精否亦無所詢證姑附於此以俟博識緑毛龜蒙筌釋名緑衣使者綱目集解時珍曰緑毛龜出南陽之內鄉及唐縣今惟蘄州以充方物養鬻者取自溪澗畜水缸中飼以魚蝦冬則除水久久生毛長四五寸毛中有金線脊骨有三稜底甲如象牙色其大如五銖錢者為真他龜久養亦生毛但大而無金線底色黃黑為異爾南齊書載永明中有獻青毛神龜者即此也又録異記云唐玄宗時方士獻徑寸小龜金色可愛云置碗中能闢蛇虺之毒此亦龜之異也修治時珍曰此龜古方無用者近世滋補方往往用之大抵與龜甲同功劉氏先天丸用之其法用龜九枚以活鯉二尾安釜中入水覆以米篩安龜在篩上蒸熟取肉曬乾其甲仍以酥炙黃入藥用又有連甲肉頭頸俱用者氣味甘酸平無毒主治通任脈助陽道補陰血益精氣治痿弱時珍縛置額端能禁邪瘧收藏書笥可闢蠹蟲嘉謨瘧龜拾遺集解藏器曰生高山石下身偏頭大氣味無毒主治老瘧發作無時名痎瘧俚人呼為妖瘧用此燒灰頓服二錢當微利用頭彌佳或發時煮湯坐於中或懸於病人臥處藏器鶚龜拾遺集解藏器曰生南海狀如龜長二三尺兩目在側如鶚亦呼水龜非前水龜也氣味無毒主治婦人難産臨月佩之臨時燒末酒服藏器附録旋龜時珍曰按山海經云杻陽之山怪水出焉中多旋龜鳥首虺尾聲如破木佩之已聾亦此類也攝龜蜀本草釋名呷蛇龜日華作夾蛇陵龜郭璞鴦龜陶弘景蠳龜抱朴子恭曰鴦龜腹折見蛇則呷而食之故楚人呼呷蛇龜江東呼陵龜居丘陵也時珍曰既以呷蛇得名則攝亦蛇音之轉而蠳亦鴦音之轉也集解弘景曰鴦小龜也處處有之狹小而長尾用卜吉凶正與龜相反保升曰攝龜腹小中心橫折能自開闔好食蛇也肉氣味甘寒有毒詵曰此物啖蛇肉不可食殼亦不堪用主治生研塗撲損筋脈傷士良生搗罯蛇傷以其食蛇也陶弘景尾主治佩之闢蛇蛇咬則刮末敷之便愈抱朴子甲主治人咬瘡潰爛燒灰敷之時珍出摘玄賁龜音奔綱目釋名三足龜爾雅集解時珍曰按山海經云狂水西南注伊水中多三足龜食之無大疾可以已腫唐書云江州獻六眼龜大明會典云暹邏國獻六足龜宋史云趙霆獻兩頭龜此又前人所未知者也肉氣味主治食之闢時疾消腫山海經鱉本經中品釋名團魚俗名神守時珍曰鱉行蹩躄故謂之鱉淮南子曰鱉無耳而守神神守之名以此陸佃云魚滿三千六百則蛟龍引之而飛納鱉守之則免故鱉名神守河伯從事古今注集解時珍曰鱉甲蟲也水居陸生穹脊連脅與龜同類四緣有肉裙故曰龜甲里肉鱉肉裡甲無耳以目為聽純雌無雄以蛇及黿為匹故萬畢術云燒黿脂可以致鱉也夏日孚乳其抱以影埤雅云卵生思抱其狀隨日影而轉在水中上必有浮沫名鱉津人以此取之今有呼鱉者作聲撫掌望津而取百十不失管子云涸水之精名曰蟡以名呼之可取魚鱉正此類也類從云鼉一鳴而鱉伏性相制也又畏蚊生鱉遇蚊叮則死死鱉得蚊煮則爛而熏蚊者復用鱉甲物相報復如此異哉淮南子曰膏之殺鱉類之不可推也鱉甲修治別録曰鱉甲生丹陽池澤採無時頌曰今處處有之以嶽州沅江所出甲有九肋者為勝入藥以醋炙黃用弘景曰採得生取甲剔去肉者為好凡有連厭及干岩者便真若肋骨出者是煮熟不可用斆曰凡使要緑色九肋多裙重七兩者為上用六一泥固瓶子底待乾安甲於中以物支起若治症塊定心藥用頭醋入瓶內大火煎盡三升乃去裙肋骨炙乾入用若治勞去熱藥不用醋用童子小便煎盡一斗二升乃去裙留骨石臼搗粉以雞䏶皮裹之取東流水三斗盆盛閣於盆上一宿取用力有萬倍也時珍曰按衛生寶鑑云凡鱉甲以煅灶灰一斗酒五升浸一夜煮令爛如膠漆用更佳桑柴灰尤妙氣味咸平無毒之才曰惡礬石理石主治心腹癥瘕堅積寒熱去痞疾息肉陰蝕痔核惡肉本經療溫瘧血瘕腰痛小兒脅下堅別録宿食症塊痃癖冷瘕勞瘦除骨熱骨節間勞熱結實壅塞下氣婦人漏下五色下瘀血甄權去血氣破癥結惡血墮胎消瘡腫腸癰並撲損瘀血日華補陰補氣震亨除老瘧瘧母陰毒腹痛勞復食復斑痘煩喘小兒驚癇婦人經脈不通難産産後陰脫丈夫陰瘡石淋斂潰癰時珍發明宗奭曰經中不言治勞惟藥性論言治勞瘦骨熱故虛勞多用之然甚有據但不可過劑耳時珍曰鱉甲乃厥陰肝經血分之藥肝主血也試常思之龜鱉之屬功各有所主鱉色青入肝故所主者瘧勞寒熱痃瘕驚癇經水癰腫陰瘡皆厥陰血分之病也玳瑁色赤入心故所主者心風驚熱傷寒狂亂痘毒腫毒皆少陰血分之病也秦龜色黃入脾故所主者頑風濕痹身重蠱毒皆太陰血分之病也水龜色黑入腎故所主者陰虛精弱腰腳痠痿陰瘧泄痢皆少陰血分之病也介蟲陰類故並主陰經血分之病從其類也附方舊十二新七老瘧勞瘧用鱉甲醋炙研末酒服方寸匕隔夜一服清早一服臨時一服無不斷者入雄黃少許更佳肘後奔豚氣痛上衝心腹鱉甲醋炙三兩京三稜煨二兩搗二味為末桃仁去皮尖四兩湯浸研汁三升煎二升入末不住手攪煎良久下醋一升煎如餳以瓶收之每空心溫酒服半匙聖濟録血瘕症癖甄權曰用鱉甲琥珀大黃等分作散酒服二錢少時惡血即下若婦人小腸中血下盡即休服也痃癖症積甄權曰用鱉甲醋炙黃研末牛乳一合每調一匙朝朝服之婦人漏下甄權曰鱉甲醋炙研末清酒服方寸匕日二又用乾薑鱉甲訶黎勒皮等分為末糊丸空心下三十丸日再婦人難産鱉甲燒存性研末酒服方寸匕立出梅師勞復食復篤病初起受勞傷食致復欲死者鱉甲燒研水服方寸匕肘後方小兒癇疾用鱉甲炙研乳服一錢日二亦可蜜丸服子母録卒得腰痛不可俯仰用鱉甲炙研末酒服方寸匕日二肘後方沙石淋痛用九肋鱉甲醋炙研末酒服方寸匕日三服石出瘥肘後方陰虛夢泄九肋鱉甲燒研每用一字以酒半盞童尿半盞蔥白七寸同煎去蔥日晡時服之出臭汗為度醫壘元戎吐血不止鱉甲蛤粉各一兩同炒色黃熟地黃一兩半曬乾為末每服二錢食後茶下聖濟録癍痘煩喘小便不利者用鱉甲二兩燈心一把水一升半煎六合分二服凡患此小便有血者中壞也黑厭無膿者十死不治龐安時傷寒論癰疽不斂不拘發背一切瘡用鱉甲燒存性研摻甚妙李樓怪症奇方腸癰內痛鱉甲燒存性研水服一錢日三傳信方陰頭生瘡人不能治者鱉甲一枚燒研雞子白和敷千金翼瀋唇緊裂用鱉甲及頭燒研敷之類要人咬指爛久欲脫者鱉甲燒灰敷之葉氏摘玄方肉氣味甘平無毒頌曰久食性冷損人藏器曰禮記食鱉去醜謂頸下有軟骨如龜形者也食之令人患水病凡鱉之三足者赤足者獨目者頭足不縮者其目四陷者腹下有王字卜字文者腹有蛇文者是蛇化也在山上者名旱鱉並有毒殺人不可食弘景曰不可合雞子食莧菜食昔有人銼鱉以赤莧同包置濕地經旬皆成生鱉又有裹鱉甲屑經五月皆成鱉者思邈曰不可合豬兔鴨肉食損人不可合芥子食生惡瘡妊婦食之令子短項時珍曰案三元參贊書言鱉性冷發水病有冷勞氣癥瘕人不宜食之生生編言鱉性熱戴原禮言鱉之陽聚於上甲久食令人生髮背似與性冷之說相反蓋鱉性本不熱食之者和以椒姜熱物太多失其本性耳鱉性畏蔥及桑灰凡食鱉者宜取沙河小鱉斬頭去血以桑灰湯煮熟去骨甲換水再煮入蔥醬作羹膳食乃良其膽味辣破入湯中可代椒而闢腥氣李九華云鱉肉主聚鱉甲主散食鱉銼甲少許入之庶幾稍平又言薄荷煮鱉能害人此皆人之所不知者也主治傷中益氣補不足別録熱氣濕痹腹中激熱五味煮食當微泄藏器婦人漏下五色羸瘦宜常食之孟詵婦人帶下血瘕腰痛日華去血熱補虛久食性冷蘇頌補陰震亨作臛食治久痢長髭鬚作丸服治虛勞痃癖腳氣時珍附方新三痃癖氣塊用大鱉一枚以蠶砂一斗桑柴灰一斗淋汁五度同煮如泥去骨再煮成膏搗丸梧子大每服十丸日三聖惠方寒濕腳氣疼不可忍用團魚二個水二斗煮一斗去魚取汁加蒼耳蒼朮尋風藤各半斤煎至七升去渣以盆盛熏蒸待溫浸洗神效乾坤生意骨蒸咳嗽潮熱團魚丸用團魚一個柴胡前胡貝母知母杏仁各五錢同煮待熟去骨甲裙再煮食肉飲汁將藥焙研為末仍以骨甲裙煮汁和丸梧子大每空心黃耆湯下三十丸日二服服盡仍治參耆藥調之奇效方脂主治除日拔白髮取脂塗孔中即不生欲再生者白犬乳汁塗之藏器頭陰乾主治燒灰療小兒諸疾婦人産後陰脫下墜尸疰心腹痛恭敷歷年脫肛不愈日華附方舊一新二小兒尸疰勞瘦或時寒熱用鱉頭一枚燒灰新汲水服半錢日一服聖惠方産後陰脫千金用鱉頭五枚燒研井華水服方寸匕日三録驗加葛根二兩酒服大腸脫肛久積虛冷以鱉頭炙研米飲服方寸匕日二服仍以末塗腸頭上千金頭血主治塗脫肛出甄權風中血脈口眼喎僻小兒疳勞潮熱時珍發明時珍曰按千金方云目瞤唇動口喎皆風入血脈急以小續命湯服之外用鱉血或雞冠血調伏龍肝散塗之干則再上甚妙蓋鱉血之性急縮走血故治口喎脫肛之病附方新二中風口喎鱉血調烏頭末塗之待正則即揭去肘後方小兒疳勞治潮熱往來五心煩躁盜汗咳嗽用鱉血丸主之以黃連胡黃連各稱二兩以鱉血一盞吳茱萸一兩同入內浸過一夜炒乾去茱血研末入柴胡川芎蕪荑各一兩人參半兩使君子仁二十一個為末煮粟米粉糊和為丸如黍米大每用熟水量大小日服三全幼心鑑卵主治鹽藏煨食止小兒下痢時珍爪主治五月五日收藏衣領中令人不忘肘後納鱉宋圖經集解頌曰鱉之無裙而頭足不縮者名曰納亦作魶肉氣味有毒頌曰食之令人昏塞以黃耆吳藍煎湯服之立解甲氣味有小毒主治傳尸勞及女子經閉蘇頌能奴來切鱉綱目釋名三足鱉集解時珍曰爾雅云鱉三足為能郭璞云今吳興陽羡縣君山池中出之或以鯀化黃熊即此者非也肉氣味大寒有毒頌曰食之殺人時珍曰按姚福庚己編云太倉民家得三足鱉命婦烹食畢入臥少頃形化為血水只存發耳鄰人疑其婦謀害訟之官時知縣黃廷宣鞫問不決乃別取三足鱉令婦如前烹治取死囚食之入獄亦化如前人遂辨其獄竊謂能之有毒不應如此然理外之事亦未可以臆斷也而山海經云從水多三足鱉食之無蠱疫近亦有人誤食而無恙者何哉蓋有毒害人亦未必至於骨肉頓化也主治折傷止痛化血生搗塗之道家闢諸厭穢死氣或畫像止之蘇頌朱鱉拾遺集解藏器曰生南海大如錢腹赤如血云在水中著水馬腳皆令仆倒也時珍曰按淮南子云朱鱉浮波必有大雨主治丈夫佩之刀劍不能傷婦女佩之有媚色藏器珠鱉綱目集解時珍曰按山海經云葛山澧水有珠鱉狀如肺而有目六足有珠一統志云生高州海中狀如肺四目六足而吐珠呂氏春秋云澧水魚之美者名曰珠鱉六足有珠淮南子云蛤蟹珠鱉與月盛衰埤雅云鱉珠在足蚌珠在腹皆指此也氣味甘酸無毒主治食之闢疫癘時珍黿拾遺釋名時珍曰按說文云黿大鱉也甲蟲惟黿最大故字從元元者大也集解頌曰黿生南方江湖中大者圍一二丈南人捕食之肉有五色而白者多其卵圓大如雞鴨子一産一二百枚人亦掘取以鹽淹食煮之白不凝藏器曰性至難死剔其肉盡口猶咬物可張鳥鳶弘景曰此物老者能變為魅非急弗食之時珍曰黿如鱉而大背有𦢏𦞙青黃色大頭黃頸腸屬於首以鱉為雌卵生思化故曰黿鳴鱉應淮南萬畢術云燒黿脂以致鱉皆氣類相感也張鼎云其脂摩鐵則明或云此物在水食魚與人共體具十二生肖肉裂而懸之一夜便覺垂長也甲氣味甘平無毒主治炙黃酒浸治瘰癧殺蟲逐風惡瘡痔瘻風頑疥瘙功同鱉甲藏器五臟邪氣殺百蟲毒百藥毒續筋骨日華婦人血熱蘇頌肉氣味甘平微毒主治濕氣邪氣諸蟲藏器食之補益陶弘景脂主治摩風及惡瘡孟詵膽氣味苦寒有毒主治喉痹以生薑薄荷汁化少許服取吐時珍蟹本經中品釋名螃蟹蟹譜郭索揚雄方言橫行介士蟹譜無腸公子抱朴子雄曰螂蟻雌曰博帶廣雅宗奭曰此物每至夏末秋初如蟬蛻解名蟹之意必取此義時珍曰按傅肱蟹譜云蟹水蟲也故字從蟲亦魚屬也故古文從魚以其橫行則曰螃蟹以其行聲則曰郭索以其外骨則曰介士以其內空則曰無腸集解別録曰蟹生伊洛池澤諸水中取無時弘景曰蟹類甚多蝤蛑擁劍蟛螖皆是並不入藥海邊又有蟛蜞似蟛螖而大似蟹而小不可食蔡謨初渡江不識蟛蜞啖之幾死嘆曰讀爾雅不熟幾為勸學者所誤也頌曰今淮海汴東河北陂澤中多有之伊洛乃反難得也今人以為食品佳味俗傳八月一日取稻芒兩枝長一二寸許東行輸送其長故今南方捕蟹差早則有銜芒須霜後輸芒方可食之否則毒尤猛也其類甚多六足者名蛫音跪四足者名北皆有大毒不可食其殼闊而多黃者名蠘生南海中其螯最鋭斷物如芟刈也食之行風氣其扁而最大後足闊者名蝤蛑南人謂之撥棹子以其後腳如棹也一名蟳隨潮退殼一退一長其大者如升小者如盞碟兩螯如手所以異於衆蟹也其力至強八月能與虎鬥虎不如也一螯大一螯小者名擁劍一名桀步常以大螯鬥小螯食物又名執火以其螯赤也其最小無毛者名蟛螖音越吳人訛為彭越爾雅云螖蠌小者螃郭璞注云即蟛螖也時珍曰蟹橫行甲蟲也外剛內柔於卦象離骨眼蜩腹䖱腦鱟足二螯八跪利鉗尖爪殼脆而堅有十二星點雄者臍長雌者臍團腹中之黃應月盈虧其性多躁引聲噀沫至死乃已生於流水者色黃而腥生於止水者色紺而馨佛書言其散子後即自枯死霜前食物故有毒霜後將蟄故味美所謂入海輸芒者亦謬談也蟛蜞大於蟛螖生於陂池田港中故有毒令人吐下似蟛蜞而生於沙穴中見人便走者沙狗也不可食似蟛蜞而生海中潮至出穴而望者望潮也可食兩螯極小如石者蚌江也不可食生溪澗石穴中小而殼堅赤者石蟹也野人食之又海中有紅蟹大而色紅飛蟹能飛善苑國有百足之蟹海中蟹大如錢而腹下又有小蟹如榆莢者蟹奴也居蚌腹者蠣奴也又名寄居蟹並不可食蟹腹中有蟲如小木鱉子而白者不可食大能發風也宗奭曰取蟹以八九月蟹浪之時伺其出水而拾之夜則以火照捕之時黃與白滿殼也修治時珍曰凡蟹生烹鹽藏糟收酒浸醬汁浸皆為佳品但久留易沙見燈亦沙得椒易䐈得皂莢或蒜及韶粉可免沙䐈得白芷則黃不散得蔥及五味子同煮則色不變藏蟹名曰蝑蟹音瀉蟹氣味咸寒有小毒弘景曰未被霜甚有毒云食水莨所致人中之不療多死也獨螯獨目兩目相向六足四足腹下有毛腹中有骨頭背有星點足斑目赤者並不可食有毒害人冬瓜汁紫蘇汁蒜汁豉汁蘆根汁皆可解之楊歸厚曰娠婦食之令子橫生宗奭曰此物極動風風疾人不可食屢見其事時珍曰不可同柿及荊芥食發霍亂動風木香汁可解詳柿下主治胸中邪氣熱結痛喎僻面腫能敗漆燒之致鼠本經弘景曰仙方用之化漆為水服之長生以黑犬血灌之三日燒之諸鼠畢至頌曰其黃能化漆為水故塗漆瘡用之其螯燒煙可集鼠於庭也解結散血愈漆瘡養筋益氣別録散諸熱治胃氣理經脈消食以醋食之利肢節去五臟中煩悶氣益人孟詵産後肚痛血不下者以酒食之筋骨折傷者生搗炒罯之日華能續斷絶筋骨去殼同黃搗爛微炒納入瘡中筋即連也藏器小兒解顱不合以螯同白芨末搗塗以合為度宗奭殺莨菪毒解鱔魚毒漆毒治瘧及黃疸搗膏塗疥瘡癬瘡搗汁滴耳聾時珍蝤蛑氣味咸寒無毒主治解熱氣治小兒痞氣煮食日華蟛蜞氣味咸冷有毒主治取膏塗濕癬疽瘡藏器石蟹主治搗敷久疽瘡無不瘥者藏器發明慎微曰蟹非蛇鱔之穴無所寄故食鱔中毒者食蟹即解性相畏也沈括筆談云關中無蟹土人怪其形狀收乾者懸門上闢瘧不但人不識鬼亦不識也時珍曰諸蟹性皆冷亦無甚毒為蝑最良鮮蟹和以薑醋侑以醇酒咀黃持螯略賞風味何毒之有叨嗜者乃頓食十許枚兼以葷膻雜進飲食自倍腸胃乃傷腹痛吐利亦所必致而歸咎於蟹蟹亦何咎哉洪邁夷堅志云襄陽一盜被生漆塗兩目發配不能睹物有村叟令尋石蟹搗碎濾汁點之則漆隨汁出而瘡愈也用之果明如初漆之畏蟹莫究其義附方新三濕熱黃疸蟹燒存性研末酒糊丸如梧桐子大每服五十丸白湯下日服二次集簡方骨節離脫生蟹搗爛以熱酒傾入連飲數碗其渣塗之半日內骨內谷谷有聲即好干蟹燒灰酒服亦好唐瑤經驗方中鱔魚毒食蟹即解董炳驗方蟹爪主治破胞墮胎別録破宿血止産後血閉酒及醋湯煎服良日華能安胎鼎頌曰胡洽方治孕婦僵仆胎上搶心有蟹爪湯墮生胎下死胎辟邪魅時珍附方新二千金神造湯治子死腹中並雙胎一死一生服之令死者出生者安神驗方也用蟹爪一升甘草二尺東流水一斗以葦薪煮至二升濾去滓入真阿膠三兩令煬頓服或分二服若人困不能服者灌入即活下胎蟹爪散治妊婦有病欲去胎用蟹爪二合桂心瞿麥各一兩牛膝二兩為末空心溫酒服一錢千金殼主治燒存性蜜調塗凍瘡及蜂蠆傷酒服治婦人兒枕痛及血崩腹痛消積時珍附方新三崩中腹痛毛蟹殼燒存性米飲服一錢證治要訣蜂蠆螫傷蟹殼燒存性研末蜜調塗之同上熏闢壁蝨蟹殼燒煙燻之摘玄鹽蟹汁主治喉風腫痛滿含細咽即消時珍鱟魚音後宋嘉祐釋名時珍曰按羅願爾雅翼云鱟者候也鱟善候風故謂之鱟集解藏器曰鱟生南海大小皆牝牡相隨牝無目得牡始行牡去則牝死時珍曰鱟狀如惠文冠及尉斗之形廣尺余其甲瑩滑青黑色鏊背骨眼眼在背上口在腹下頭如蜣螂十二足似蟹在腹兩旁尺長五六寸尾長一二尺有三稜如棕莖背上有骨如角高七八寸如石珊瑚狀每過海相負於背乘風而遊俗呼鱟帆亦曰鱟簰其血碧色腹有子如黍米可為醯醬尾有珠如粟其行也雌常負雄失其雌則雄即不動漁人取之必得其雙雄小雌大置之水中雄浮雌沉故閩人婚禮用之其藏伏沙上亦自飛躍皮殼甚堅可為冠亦屈為杓入香中能髮香氣尾可為小如意脂燒之可集鼠其性畏蚊螫之即死又畏隙光射之亦死而日中曝之往往無恙也南人以其肉作鮓醬小者名鬼鱟食之害人肉氣味辛咸平微毒藏器曰無毒詵曰多食發嗽及瘡癬主治治痔殺蟲孟詵尾主治燒焦治腸風瀉血崩中帶下及産後痢日華發明藏器曰骨及尾燒灰米飲服大主産後痢但須先服生地黃蜜煎等訖然後服此無不斷膽主治大風癩疾殺蟲時珍附方新一鱟膽散治大風癩疾用鱟魚膽生白礬生緑礬膩粉水銀麝香各半兩研不見星每服一錢井華水下取下五色涎為妙聖濟總録殼主治積年呷嗽時珍附方新一積年咳嗽呀呷作聲用鱟魚殼半兩貝母煨一兩桔梗一分牙皂一分去皮酥炙為末煉蜜丸彈子大每含一丸咽汁服三丸即吐出惡涎而瘥聖惠
