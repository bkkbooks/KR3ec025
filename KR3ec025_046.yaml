body:
  text: 介部第四十六卷介之二蛤蚌類二十九種牡蠣本經上品釋名牡蛤別録蠣蛤本經古賁異物志蠔弘景曰道家方以左顧是雄故名牡蠣右顧則牝蠣也或以尖頭為左顧未詳孰是藏器曰天生萬物皆有牡牝惟蠣是鹹水結成塊然不動陰陽之道何從而生經言牡者應是雄耳宗奭曰本經不言左顧止從陶説而段成式亦云牡蠣言牡非謂雄也且如牡丹豈有牝丹乎此物無目更何顧盻時珍曰蛤蚌之屬皆有胎生卵生獨此化生純雄無雌故得牡名曰蠣曰蠔言其粗大也集解別録曰牡蠣生東海池澤採無時弘景曰今出東海永嘉晉安云是百歲雕所化十一月採以大者為好其生著石皆以口在上舉以腹向南視之口斜向東則是左顧出廣州南海者亦同但多右顧不堪用也丹方及煮鹽者皆以泥釜云耐水火不破漏皆除其甲口止取朏朏如粉耳頌曰今海旁皆有之而通泰及南海閩中尤多皆附石而生磈礧相連如房呼為蠣房晉安人呼為蠔莆初生止如拳石四面漸長有至一二丈者嶄岩如山俗呼蠔山每一房內有肉一塊大房如馬蹄小者如人指面每潮來諸房皆開有小蟲入則合之以充腹海人取者皆鑿房以烈火逼之挑取其肉當食品其味美好更有益也海族為最貴時珍曰南海人以其蠣房砌牆燒灰粉壁食其肉謂之蠣黃保升曰又有𮔻蠣形短不入藥用斆曰有石牡蠣頭邊皆大小夾沙石真似牡蠣只是圓如龜殼海牡蠣可用只丈夫服之令人無髭也其真牡蠣用火煅過以醫試之隨手走起者是也醫乃千年琥珀修治宗奭曰凡用須泥固燒為粉亦有生用者斆曰凡用牡蠣先用二十個以東流水入鹽一兩煮一伏時再入火中煅赤研粉用時珍曰按溫隱居云牡蠣將童尿浸四十九日五日一換取出以硫黃末和米醋塗上黃泥固濟煅過用氣味咸平微寒無毒之才曰貝母為之使得甘草牛膝遠志蛇床子良惡麻黃辛夷吳茱萸伏硇砂主治傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠瘻女子帶下赤白久服強骨節殺邪鬼延年本經除留熱在關節營衛虛熱去來不定煩滿心痛氣結止汗止渴除老血療泄精澀大小腸止大小便治喉痹咳嗽心脅下痞熱別録粉身止大人小兒盜汗同麻黃根蛇床子乾薑為粉去陰汗藏器治女子崩中止痛除風熱溫瘧鬼交精出甄權男子虛勞補腎安神去煩熱小兒驚癇李珣去脅下堅滿瘰癧一切瘡腫好古化痰軟堅清熱除濕止心脾氣痛痢下赤白濁消疝瘕積塊癭疾結核時珍發明權曰病虛而多熱者宜同地黃小草用之好古曰牡蠣入足少陰為軟堅之劑以柴胡引之能去脅下硬以茶引之能消項上結核以大黃引之能消股間腫以地黃為使能益精收澀止小便本腎經血分之藥也成無己曰牡蠣之咸以消胸膈之滿以泄水氣使痞者消硬者軟也元素曰壯水之主以制陽光則渴飲不思故蛤蠣之類能止渴也附方舊七新十四心脾氣痛氣實有痰者牡蠣煅粉酒服二錢丹溪心法瘧疾寒熱牡蠣粉杜仲等分為末蜜丸梧子大每服五十丸溫水下普濟方氣虛盜汗上方為末每酒服方寸匕千金方虛勞盜汗牡蠣粉麻黃根黃耆等分為末每服二錢水一盞煎七分溫服日一本事方産後盜汗牡蠣粉麥麩炒黃等分每服一錢用豬肉汁調下經驗消渴飲水臘日或端午日用黃泥固濟牡蠣煅赤研末每服一錢用活鯽魚煎湯調下只二三服愈經驗方百合變渴傷寒傳成百合病如寒無寒如熱無熱欲臥不臥欲行不行欲食不食口苦小便赤色得藥則吐利變成渴疾久不瘥者用牡蠣熬二兩栝蔞根二兩為細末每服方寸匕用米飲調下日三服取效張仲景金匱玉函方病後常衄小勞即作牡蠣十分石膏五分為末酒服方寸匕亦可蜜丸日三服肘後方小便淋閟服血藥不效者用牡蠣粉黃柏炒等分為末每服一錢小茴香湯下取效醫學集成小便數多牡蠣五兩燒灰小便三升煎二升分三服神效乾坤生意夢遺便溏牡蠣粉醋糊丸梧子大每服三十丸米飲下日二服丹溪方水病囊腫牡蠣煅粉二兩乾薑炮一兩研末冷水調糊掃上須臾囊熱如火干則再上小便利即愈一方用蔥汁白麵同調小兒不用幹薑初虞世古今録驗方月水不止牡蠣煅研米醋搜成團再煅研末以米醋調艾葉末熬膏丸梧子大每醋艾湯下四五十丸普濟方金瘡出血牡蠣粉敷之肘後破傷濕氣口噤強直用牡蠣粉酒服二錢仍外敷之取效三因方發背初起古賁粉灰以雞子白和塗四圍頻上取效千金方癰腫未成用此拔毒水調牡蠣粉末塗之干更上姚僧坦集驗方論男女瘰癧經驗用牡蠣煅研末四兩玄參末三兩麵糊丸梧子大每服三十丸酒下日三服服盡除根初虞世云瘰癧不拘已破未破用牡蠣四兩甘草一兩為末每食後用臘茶湯調服一錢其效如神甲疽潰痛胬肉裹趾甲膿血不瘥者用牡蠣頭厚處生研為末每服二錢紅花煎酒調下日三服仍用敷之取效勝金方面色黧黑牡蠣粉研末蜜丸梧子大每服三十丸白湯下日一服並炙其肉食之普濟方肉氣味甘溫無毒主治煮食治虛損調中解丹毒婦人血氣以薑醋生食治丹毒酒後煩熱止渴藏器炙食甚美令人細肌膚美顏色蘇頌蚌宋嘉祐釋名時珍曰蚌與蛤同類而異形長者通曰蚌圓者通曰蛤故蚌從豐蛤從合皆象形也後世混稱蛤蚌者非也集解弘景曰雉入大水為蜃蜃即蚌也藏器曰生江漢渠瀆間老蚌含珠殼堪為粉非大蛤也時珍曰蚌類甚繁今處處江湖中有之惟洞庭漢沔獨多大者長七寸狀如牡蠣輩小者長三四寸狀如石決明輩其肉可食其殼可為粉湖沔人皆印成錠市之謂之蚌粉亦曰蛤粉古人謂之蜃灰以飾牆壁闉墓壙如今用石灰也肉氣味甘咸冷無毒宗奭曰性微冷多食發風動冷氣震亨曰馬刀蚌蛤螄蜆大同小異寇氏止言冷而不言濕濕生熱熱久則氣上升而生痰生風何冷之有主治止渴除熱解酒毒去眼赤孟詵明目除濕主婦人勞損下血藏器除煩解熱毒血崩帶下痔瘻壓丹石藥毒以黃連末納入取汁點赤眼眼暗日華蚌粉氣味咸寒無毒日華曰能制石亭脂鏡源曰能制硫黃主治諸疳止痢並嘔逆醋調塗癰腫日華爛殼粉治反胃心胸痰飲用米飲服藏器解熱燥濕化痰消積止白濁帶下痢疾除濕腫水嗽明目搽陰瘡濕瘡痱癢時珍發明時珍曰蚌粉與海蛤粉同功皆水産也治病之要只在清熱行濕而已日華言其治疳近有一兒病疳專食此粉不復他食亦一異也附方新六反胃吐食用真正蚌粉每服稱過二錢搗生薑汁一盞再入米醋同調送下急救良方痰飲咳嗽用真蚌粉新瓦炒紅入青黛少許用淡齏水滴麻油數點調服二錢類編云徽宗時李防禦為入內醫官時有寵妃病痰嗽終夕不寐面浮如盤徽宗呼李治之詔令供狀三日不效當誅李憂惶技窮與妻泣別忽聞外叫賣咳嗽藥一文一帖吃了即得睡李市十帖視之其色淺碧恐藥性獷悍並三服自試之無他乃取三帖為一入內授妃服之是夕嗽止比曉面消內侍走報天顏大喜賜金帛值萬緡李恐索方乃尋訪前賣藥人飲以酒厚價求之則此方也云自少時從軍見主帥有此方剽得以度餘生耳癰疽赤腫用米醋和蚌蛤灰塗之待其干即易之千金雀目夜盲遇夜不能視物用建昌軍螺兒蚌粉三錢為末水飛過雄豬肝一葉披開納粉扎定以第二米泔煮七分熟仍別以蚌粉蘸食以汁送下一日一作與夜明砂同功直指方腳指濕爛用蚌蛤粉干搽之壽域積聚痰涎結於胸膈之間心腹疼痛日夜不止或乾嘔噦食者炒粉丸主之用蚌粉一兩以巴豆七粒同炒赤去豆不用醋和粉丸梧子大每服二十丸薑酒下丈夫臍腹痛茴香湯下女人血氣痛童便和酒下孫氏仁存方馬刀本經下品校正併入拾遺齊蛤釋名馬蛤別録齊蛤吳普蜌爾雅音陛蠯品脾排三音出周禮蝏䗒音亭蠯單姥音善母𤊿岸𤊿音掣時珍曰俗稱大為馬其形象刀故名曰蛤曰蠯皆蚌字之音轉也古今方言不同也説文云圓者曰蠣長者曰蠯江漢人呼為單姥汴人呼為𤊿岸吳普本草言馬刀即齊蛤而唐宋本草失收陳藏器重出齊蛤今併為一集解別録曰馬刀生江湖池澤及東海取無時弘景曰李當之言生江漢長六七寸食其肉似蚌今人多不識大抵似今蝏䗒而未見方用韓保升曰生江湖中細長小蚌也長三四寸闊五六分頌曰今處處有之多在沙泥中頭小鋭人亦謂之蚌藏器曰齊蛤生海中狀如蛤兩頭尖小海人食之別無功用時珍曰馬刀似蚌而小形狹而長其類甚多長短大小厚薄斜正雖有不同而性味功用大抵則一殼煉粉用氣味辛微寒有毒得水爛人腸又云得水良恭曰得火良時珍曰按吳普云神農岐伯桐君咸有毒扁鵲小寒大毒藏器曰遠志蠟皆畏齊蛤主治婦人漏下赤白寒熱破石淋殺禽獸賊鼠本經能除五臟間熱肌中鼠鼷止煩滿補中去厥痹利機關別録消水癭氣癭痰飲時珍肉同蚌螊䗯音咸進宋嘉祐釋名生䗯嘉祐螊蛤水土記集解藏器曰螊䗯生東海似蛤而扁有毛頌曰似蛤而長身扁宗奭曰順安軍界河中亦有之與馬刀相似肉頗冷人以作鮓食不堪致遠殼主治燒末服治痔病藏器肉宗奭曰多食發風蜆宋嘉祐釋名扁螺時珍曰蜆晛也殼內光耀如初出日採也隋書云劉臻父顯嗜蜆呼蜆為扁螺集解藏器曰處處有之小如蚌黑色能候風雨以殼飛時珍曰溪湖中多有之其類亦多大小厚薄不一漁家多食之耳肉氣味甘咸冷無毒藏器曰微毒多食發嗽及冷氣消腎主治治時氣開胃壓丹石藥毒及疔瘡下濕氣通乳糟煮食良生浸取汁洗疔瘡蘇恭去暴熱明目利小便下熱氣腳氣濕毒解酒毒目黃浸汁服治消渴日華生蜆浸水洗痘癰無瘢痕時珍爛殼氣味咸溫無毒主治止痢弘景治陰瘡蘇恭療失精反胃日華燒灰飲服治反胃吐食除心胸痰水藏器化痰止嘔治吞酸心痛及暴嗽燒灰塗一切濕瘡與蚌粉同功時珍附方舊一新二卒嗽不止用白蜆殼搗為細末以熟米飲調每服一錢日三服甚效出聖惠方痰喘咳嗽用白蜆殼多年陳者燒過存性為極細末以米飲調服一錢日三服急救方反胃吐食用黃蜆殼並田螺殼並取久在泥中者各炒成白灰每田螺殼灰二兩黃蜆殼灰一兩入白梅肉四個同搜拌令勻作團再入砂盒子內蓋定泥固煅存性研細末每服二錢用人參縮砂湯調下不然用陳米飲調服亦可凡覺心腹脹痛將發反胃即以此藥治之是齋百一選方真珠宋開寶釋名珍珠開寶蚌珠南方志蠙珠禹貢集解李珣曰真珠出南海石決明産也蜀中西路女瓜出者是蚌蛤産光白甚好不及舶上者採耀欲穿須得金剛鑽也頌曰今出廉州北海亦有之生於珠牡亦曰珠母蚌類也按嶺表録異云廉州邊海中有洲島島上有大池謂之珠池每歲刺史親監珠戶入池採老蚌剖取珠以充貢池雖在海上而人疑其底與海通池水乃淡此不可測也土人採小蚌肉作脯食亦往往得細珠如米乃知此池之蚌大小皆有珠也而今之取珠牡者云得之海旁不必是池中也其北海珠蚌種類小別人取其肉或有得珠者不甚光瑩亦不常有不堪入藥又蚌中一種似江珧者腹亦有珠皆不及南海者奇而且多宗奭曰河北溏濼中亦有圍及寸者色多微紅珠母與廉州者不相類但清水急流處其色光白濁水及不流處其色暗也時珍曰按廉州志云合浦縣海中有梅青嬰三池蛋人每以長繩繫腰攜籃入水拾蚌入籃即振繩令舟人急取之若有一線之血浮水則葬魚腹矣又熊太古冀越集云禹貢言淮夷蠙珠後世乃出嶺南今南珠色紅西洋珠色白北海珠色微青各隨方色也豫嘗見蛋人入海取得珠子樹數擔其樹狀如柳枝蚌生於樹不可上下樹生於石蛋人鑿石得樹以求蚌甚可異也又南越志云珠有九品以五分至一寸八九分者為大品有光彩一邊小平似覆釜者名璫珠次則走珠滑珠等品也格古論云南番珠色白圓耀者為上廣西者次之北海珠色微青者為上粉白油黃者下也西番馬價珠為上色青如翠其老色夾石粉青有油煙者下也凡蚌聞雷則㾭瘦其孕珠如懷孕故謂之珠胎中秋無月則蚌無胎左思賦云蚌蛤珠胎與月虧全是矣陸佃云蚌蛤無陰陽牝牡須雀蛤化成故能生珠專一於陰精也龍珠在頷蛇珠在口魚珠在眼鮫珠在皮鱉珠在足蚌珠在腹皆不及蚌珠也修治李珣曰凡用以新完未經鑽綴者研如粉方堪服食不細則傷人臟腑斆曰凡用以新淨者絹袋盛之置牡蠣約重四五斤以來於平底鐺中以物四向支穩然後著珠於上乃下地榆五花皮五方草各銼四兩籠住以漿水不住火煮三日夜取出用甘草湯淘淨於臼中搗細重篩更研二萬下方可服食慎微曰抱朴子云真珠徑寸以上服食令人長生以酪漿漬之皆化如水銀以浮石蜂巢蛇黃等物合之可引長三四尺為丸服之時珍曰凡入藥不用首飾及見尸氣者以人乳浸三日煮過如上搗研一法以絹袋盛入豆腐腹中煮一炷香云不傷珠也氣味咸甘寒無毒主治鎮心點目去膚翳障膜塗面令人潤澤好顏色塗手足去皮膚逆臚綿裹塞耳主聾開寶磨翳墜痰甄權除面皯止泄合知母療煩熱消渴合左纏根治小兒麩豆瘡入眼李珣除小兒驚熱宗奭安魂魄止遺精白濁解痘疔毒主難産下死胎胞衣時珍發明時珍曰真珠入厥陰肝經故能安魂定魄明目治聾附方舊五新六安魂定魄真珠末豆大一粒蜜一蜆殼和服日三尤宜小兒肘後卒忤不言真珠末用雞冠血和丸小豆大以三四粒納口中肘後灰塵迷目用大珠拭之則明也格古論婦人難産真珠末一兩酒服立出千金胞衣不下真珠一兩研末苦酒服千金子死腹中真珠末二兩酒服立出外臺癍痘不發珠子七枚為末新汲水調服儒門事親痘瘡疔毒方見谷部豌豆下肝虛目暗茫茫不見真珠末一兩白蜜二合鯉魚膽二枚和合銅器煎至一半新綿濾過瓶盛頻點取瘥聖惠方青盲不見方同上小兒中風手足拘急真珠末水飛一兩石膏末一錢每服一錢水七分煎四分溫服日三聖惠方目生頑翳真珠一兩地榆二兩水二大碗煮乾取真珠以醋浸五日熱水淘去醋氣研細末用每點少許以愈為度石決明別録上品釋名九孔螺日華殼名千里光時珍曰決明千里光以功名也九孔螺以形名也集解弘景曰俗云是紫貝人皆水漬尉眼頗明又云是鰒魚甲附石生大者如手明耀五色內亦含珠恭曰此是鰒魚甲也附石生狀如蛤惟一片無對七孔者良今俗用紫貝全非頌曰今嶺南州郡及萊州海邊皆有之採無時舊注或以為紫貝或以為鰒魚甲按紫貝即今砑螺殊非此類鰒魚乃王莽所嗜者一邊著石光明可愛自是一種與決明相近也決明殼大如手小者如三兩指大可以浸水洗眼七孔九孔者良十孔者不佳海人亦啖其肉宗奭曰登萊海邊甚多人採肉供饌及干充苞苴肉與殼兩可用時珍曰石決明形長如小蚌而扁外皮甚粗細孔雜雜內則光耀背側一行有孔如穿成者生於石崖之上海人泅水乘其不意即易得之否則緊黏難脫也陶氏以為紫貝雷氏以為真珠母楊倞注荀子以為龜腳皆非矣惟鰒魚是一種二類故功用相同吳越人以糟決明酒蛤蜊為美品者即此修治珣曰凡用以麵裹煨熟磨去粗皮爛搗再乳細如面方堪入藥斆曰每五兩用鹽半分同東流水入瓷器內煮一伏時搗末研粉再用五花皮地榆阿膠各十兩以東流水淘三度日乾再研一萬下入藥服至十兩永不得食山桃令人喪目時珍曰今方家只以鹽同東流水煮一伏時研末水飛用殼氣味咸平無毒保升曰寒宗奭曰肉與殼功同主治目障翳痛青盲久服益精輕身別録明目磨障日華肝肺風熱青盲內障骨蒸勞極李珣水飛點外障翳寇宗奭通五淋時珍附方舊一新五羞明怕日用千里光黃菊花甘草各一錢水煎冷服明目集驗方痘後目翳用石決明火煅研穀精草各等分共為細末以豬肝蘸食鴻飛集小便五淋用石決明去粗皮研為末飛過熟水服二錢每日二服如淋中有軟硬物即加朽木末五分勝金方肝虛目翳凡氣虛血虛肝虛眼白俱赤夜如雞啄生浮翳者用海蚌殼燒過成灰木賊焙各等分為末每服三錢用薑棗同水煎和渣通口服每日服二次經驗方青盲雀目用石決明一兩燒過存性外用蒼朮三兩去皮為末每服三錢以豬肝批開入藥末在內扎定砂罐煮熟以氣熏目待冷食肝飲汁龍木論解白酒酸用石決明不拘多少數個以火煉過研為細末將酒蕩熱以決明末攪入酒內蓋住一時取飲之其味即不酸海蛤本經上品釋名時珍曰海蛤者海中諸蛤爛殼之總稱不專指一蛤也舊本云一名魁蛤則又指是一物矣系是誤書今削之集解別録曰海蛤生東海保升曰今登萊滄州海沙湍處皆有四五月淘沙取之南海亦有之恭曰海蛤細如巨勝子光淨瑩滑者好其粗如半杏仁者為豚耳蛤不堪入藥時珍曰按沈存中筆談云海蛤即海邊沙泥中得之大者如棋子小者如油麻粒黃白色或黃赤相雜蓋非一類乃諸蛤之殼為海水礲礪日久光瑩都非舊質蛤類至多不能分別其為何蛤故通謂之海蛤也余見下條正誤吳普曰海蛤頭有紋紋如磨齒時珍曰此乃魁蛤非海蛤也蓋誤矣今正之弘景曰海蛤至滑澤云從雁屎中得之二三十過方為良今人多取相類者磨蕩之日華曰此是雁食鮮蛤糞出者有文彩為文蛤無文彩為海蛤鄉人又以海邊爛蛤殼風濤打磨瑩淨者偽作之藏器曰二説皆非也海蛤是海中爛殼久在沙泥風波淘洗自然圓淨無紋有大有小以小者為佳非一一從雁腹中出也文蛤是未爛時殼猶有文者二物本同一類正如爛蜆蚌殼所主亦與生者不同也假如雁食蛤殼豈擇文與不文耶宗奭曰海蛤文蛤陳説極是今海中無雁豈有糞耶蛤有肉時猶可食也肉既無矣安得更糞過二三十次耶陶説謬矣時珍曰海蛤是諸蛤爛殼文蛤自是一種陳氏言文蛤是未爛時殼則亦泛指諸蛤未爛者矣其説未穩但海中蛤蚌名色雖殊性味相類功用亦同無甚分別也修治斆曰凡使海蛤勿用遊波蟲骨真相似只是面上無光誤餌之令人狂走欲投水如鬼祟惟醋解之立愈其海蛤用漿水煮一伏時每一兩入地骨皮柏葉各二兩同煮一伏時東流水淘三次搗粉用保升曰取得以半天河煮五十刻以枸杞汁拌勻入䈽竹筒內蒸一伏時搗用氣味苦咸平無毒吳普曰神農苦岐伯甘扁鵲咸權曰有小毒之才曰蜀漆為之使畏狗膽甘遂芫花主治咳逆上氣喘息煩滿胸痛寒熱本經療陰痿別録主十二水滿急痛利膀胱大小腸唐注治水氣浮腫下小便治嗽逆上氣項下瘤癭甄權療嘔逆胸脅脹急腰痛五痔婦人崩中帶下日華止消渴潤五臟治服丹石人有瘡蕭炳清熱利濕化痰飲消積聚除血痢婦人血結胸傷寒反汗搐搦中風癱瘓時珍附方舊二新六水癊腫滿藏器曰用海蛤杏仁漢防己棗肉各二兩葶藶六兩為末研丸梧子大一服十丸服至利下水為妙水腫發熱小便不通者海蛤湯主之海蛤木通豬苓澤瀉滑石黃葵子桑白皮各一錢燈心三分水煎服日二聖惠方石水肢瘦其腹獨大者海蛤丸主之海蛤煅粉防己各七錢半葶藶赤茯苓桑白皮各一兩陳橘皮郁李仁各半兩為末蜜丸如梧子大每米飲下五十丸日二次聖濟總録氣腫濕腫用海蛤海帶海藻海螵蛸海昆布鳧茨荔枝殼等分流水煎服日二次何氏血痢內熱海蛤末蜜水調服二錢日二傳信傷寒血結胸膈痛不可近仲景無方宜海蛤散主之並刺期門穴用海蛤滑石甘草各一兩芒硝半兩為末每服二錢雞子清調服更服桂枝紅花湯發其汗則愈蓋膻中血聚則小腸壅小腸壅則血不行服此則小腸通血流行而胸膈利矣朱肱活人書傷寒搐搦寇宗奭曰傷寒出汗不徹手腳搐者用海蛤川烏頭各一兩穿山甲二兩為末酒丸如彈子大捏扁置所患足心下別擘蔥白蓋藥以帛纏定於暖室中熱水浸腳至膝上水冷又添候遍身汗出為度凡一二日一作以知為度中風癱瘓方同上又具鯪鯉甲下衄血不止蛤粉一兩羅七遍槐花半兩炒焦研勻每服一錢新汲水調下楊氏家藏方文蛤本經上品釋名花蛤時珍曰皆以形名也集解別録曰文蛤生東海表有文取無時弘景曰小大皆有紫斑保升曰今出萊州海中三月中旬採背上有斑紋恭曰大者圓三寸小者圓五六分時珍曰按沈存中筆談云文蛤即今吳人所食花蛤也其形一頭小一頭大殼有花斑的便是修治同海蛤氣味咸平無毒主治惡瘡蝕五痔本經咳逆胸痹腰痛脅急鼠瘻大孔出血女人崩中漏下別録能止煩渴利小便化痰軟堅治口鼻中蝕疳時珍發明時珍曰按成無己云文蛤之咸走腎可以勝水氣附方舊一新一傷寒文蛤散張仲景云病在陽當以汗解反以冷水噀之或灌之更益煩熱意欲飲水反不渴者此散主之文蛤五兩為末每服方寸匕沸湯下甚效疳蝕口鼻數日欲盡文蛤燒灰以臘豬脂和塗之千金翼蛤蜊梨宋嘉祐釋名時珍曰蛤類之利於人者故名集解機曰蛤蜊生東南海中白殼紫唇大二三寸者閩浙人以其肉充海錯亦作為醬醯其殼火煅作粉名曰蛤蜊粉也肉氣味咸冷無毒藏器曰此物性雖冷乃與丹石相反服丹石人食之令腹結痛主治潤五臟止消渴開胃治老癖為寒熱婦人血塊宜煮食之禹錫煮食醒酒弘景發明時珍曰按高武痘疹正宗云俗言蛤蜊海錯能發疹多致傷損脾胃生痰作嘔作瀉此皆嘻笑作罪也又言痘毒入目者以蛤蜊汁點之可代空青夫空青得銅之精氣而生性寒可治赤目若痘毒是臟腑毒氣上衝非空青可治蛤蜊雖寒而濕中有火亦不可不知矣蛤蜊粉釋名海蛤粉時珍曰海蛤粉者海中諸蛤之粉以別江湖之蛤粉蚌粉也今人指稱但曰海粉蛤粉寇氏所謂衆蛤之灰是矣近世獨取蛤蜊粉入藥然貨者亦多衆蛤也大抵海中蚌蛤蚶蠣性味鹹寒不甚相遠功能軟散小異大同非若江湖蚌蛤無鹹水浸漬但能清熱利濕而已今藥肆有一種狀如線粉者謂之海粉得水則易爛蓋後人因名售物也然出海中沙石間故功亦能化痰軟堅修治震亨曰蛤粉用蛤蜊燒煅成粉不入煎劑時珍曰按吳球云凡用蛤粉取紫口蛤蜊殼炭火煅成以熟栝蔞連子同搗和成團風乾用最妙正誤機曰丹溪有言蛤粉即是海石寇氏以海石注蛤粉則二物可通用矣海石即海蛤蛤粉即蛤蜊殼燒成也時珍曰海石乃海中浮石也詳見石部汪氏誣引朱寇之説為證陳嘉謨本草又引為據今考二公本書並無前説今正其誤氣味咸寒無毒主治熱痰濕痰老痰頑痰疝氣白濁帶下同香附末薑汁調服主心痛震亨清熱利濕化痰飲定喘嗽止嘔逆消浮腫利小便止遺精白濁心脾疼痛化積塊解結氣消癭核散腫毒治婦人血病油調塗湯火傷時珍發明震亨曰蛤粉能降能消能軟能燥時珍曰寒制火而咸潤下故能降焉寒散熱而咸走血故能消焉堅者軟之以咸取其屬水而性潤也濕者燥之以滲取其經火化而利小便也好古曰蛤粉乃腎經血分之藥故主濕嗽腎滑之疾附方新四氣虛水腫昔滁州酒庫攢司陳通患水腫垂死諸醫不治一嫗令以大蒜十個搗如泥入蛤粉丸梧子大每食前白湯下二十丸服盡小便下數桶而愈普濟方心氣疼痛真蛤粉沙過白佐以香附末等分白湯淬服聖惠方白濁遺精潔古云陽盛陰虛故精泄也真珠粉丸主之用蛤粉煅一斤黃柏新瓦炒過一斤為細末白水丸如梧子大每服一百丸空心用溫酒下日二次蛤粉味鹹而且能補腎陰黃柏苦而降心火也雀目夜盲真蛤粉炒黃為末以油蠟化和丸皂子大內於豬腰子中麻扎定蒸食之一日一服儒門事親蟶醜真切宋嘉祐釋名集解藏器曰蟶生海泥中長二三寸大如指兩頭開時珍曰蟶乃海中小蚌也其形長短大小不一與江湖中馬刀螊蜆相似其類甚多閩粵人以田種之候潮泥壅沃謂之蟶田呼其肉為蟶腸肉氣味甘溫無毒詵曰天行病後不可食主治補虛主冷痢煮食之去胸中邪熱煩悶飯後食之與服丹石人相宜治婦人産後虛損嘉祐擔羅拾遺集解藏器曰蛤類也生新羅國彼人食之氣味甘平無毒主治熱氣消食雜昆布作羹主結氣藏器車螯宋嘉祐釋名蜃音腎時珍曰車螯俗訛為昌娥蜃與蛟蜃之蜃同名異物周禮鱉人掌互物春獻鱉蜃秋獻龜魚則蜃似為大蛤之通稱亦不專指車螯也集解藏器曰車螯生海中是大蛤即蜃也能吐氣為樓臺春夏依約島漵常有此氣頌曰南海北海皆有之採無時其肉食之似蛤蜊而堅硬不及近世癰疽多用其殼北中者不堪用背紫色者海人亦名紫貝非矣時珍曰其殼色紫璀粲如玉斑點如花海人以火炙之則殼開取肉食之鍾岏云車螯蚶蠣眉目內缺獷殼外緘無香無臭瓦礫何殊宜充庖廚永為口食羅願云雀入淮為蛤雉入海為蜃比雀所化為大故稱大蛤也肉可以食殼可飾器物灰可闉塞牆壁又可為粉飾面俗呼蛤粉亦或生珠其為用多矣又臨海水土記云似車螯而角移不正者曰移角似車螯而殼薄者曰姑勞似車螯而小者曰羊蹄出羅江昔人皆謂雉化者乃蛟蜃之蜃而陳氏羅氏以為蛤蜃之蜃似誤詳鱗部蛟龍下肉氣味甘咸冷無毒詵曰不可多食主治解酒毒消渴並癰腫藏器殼氣味同肉主治瘡癤腫毒燒赤醋淬二度為末同甘草等分酒服並以醋調敷之日華消積塊解酒毒治癰疽發背焮痛時珍發明時珍曰車螯味鹹氣寒而降陰中之陰也入血分故宋人用治癰疽取惡物下云有奇功亦須審其氣血虛實老少如何可也今外科鮮知用者附方新二車螯轉毒散治發背癰疽不問淺深大小利去病根則免傳變用車螯即昌娥紫背光厚者以鹽泥固濟煅赤出火毒一兩生甘草末一錢半輕粉五分為末每服四錢用栝蔞一個酒一碗煎一盞調服五更轉下惡物為度未下再服甚者不過二服外科精要六味車螯散治症同上用車螯四個黃泥固濟煅赤出毒研末燈心三十莖栝蔞一個取仁炒香甘草節炒二錢通作一服將三味入酒二碗煎半碗去滓入蜂蜜一匙調車螯末二錢膩粉少許空心溫服下惡涎毒為度本事魁蛤別録上品校正時珍曰宋嘉祐別出蚶條今據郭璞説合併為一釋名魁陸別録蚶一作魽瓦屋子嶺表録瓦壟子時珍曰魁者羹鬥之名蛤形肖之故也蚶味甘故從甘案嶺表録異云南人名空慈子尚書盧鈞以其殼似瓦屋之壟改為瓦屋瓦壟也廣人重其肉炙以薦酒呼為天臠廣人謂之蜜丁名醫別録云一名活東誤矣活東蝌蚪也見爾雅伏老頌曰説文云老伏翼化為魁蛤故名伏老集解別録曰魁蛤生東海正圓兩頭空表有文採無時弘景曰形似紡軖小狹長外有縱橫紋理云是老蝠所化方用至少保升曰今出萊州形圓長似大腹檳榔兩頭有孔藏器曰蚶生海中殼如瓦屋時珍曰按郭璞爾雅注云魁陸即今之蚶也狀如小蛤而圓厚臨海異物志云蚶之大者徑四寸背上溝紋似瓦屋之壟肉味極佳今浙東以近海田種之謂之蚶田肉氣味甘平無毒鼎曰寒炳曰溫凡食訖以飯壓之否則令人口乾時珍曰按劉恂曰炙食益人過多即壅氣主治痿痹泄痢便膿血別録潤五臟止消渴利關節服丹石人宜食之免生瘡腫熱毒鼎心腹冷氣腰脊冷風利五臟健胃令人能食藏器溫中消食起陽蕭炳益血色日華殼修治日華曰凡用取陳久者炭火煅赤米醋淬三度出火毒研粉氣味甘咸平無毒主治燒過醋淬醋丸服治一切血氣冷氣症癖日華消血塊化痰積震亨連肉燒存性研敷小兒走馬牙疳有效時珍發明時珍曰咸走血而軟堅故瓦壟子能消血塊散痰積車渠海藥校正自玉石部移入此釋名海扇時珍按韻會云車渠海中大貝也背上壟紋如車輪之渠故名車溝曰渠劉績霏雪録云海扇海中甲物也其形如扇背紋如瓦屋三月三日潮盡乃出梵書謂之牟婆洛揭拉婆集解李珣曰車渠云是玉石之類生西國形如蚌蛤有紋理西域七寶此其一也時珍曰車渠大蛤也大者長二三尺闊尺許厚二三寸殼外溝壟如蚶殼而深大皆縱紋如瓦溝無橫紋也殼內白皙如玉亦不甚貴番人以飾器物謬言為玉石之類或云玉中亦有車渠而此蛤似之故也沈存中筆談云車渠大者如箕背有渠壟如蚶殼以作器致如白玉楊慎丹鉛録云車渠作杯注酒滿過一分不溢試之果然殼氣味甘咸大寒無毒主治安神鎮宅解諸毒藥及蟲螫同玳瑁等分磨人乳服之極驗珣發明時珍曰車渠蓋瓦壟之大者故其功用亦相倣佛貝子本經下品釋名貝齒別録白貝日華海蚆俗作𧴩音巴時珍曰貝字象形其中二點象其齒刻其下二點象其垂尾古者貨貝而寶龜用為交易以二為朋今獨雲南用之呼為海蚆以一為莊四莊為手四手為苗五苗為索頌曰貝腹下潔白有刻如魚齒故曰貝齒集解別録曰貝子生東海池澤採無時弘景曰出南海此是小小白貝子人以飾軍容服物者珣曰雲南極多用為錢貨交易頌曰貝子貝類之最小者亦若蝸狀長寸許色微白赤有深紫黑者今多穿與小兒戲弄北人用綴衣及氈帽為飾剃頭家用以飾鑑畫家用以砑物時珍曰貝子小白貝也大如拇指頂長寸許背腹皆白諸貝皆背隆如龜背腹下兩開相向有齒刻如魚齒其中肉如蝌蚪而有首尾故魏子才六書精蘊云貝介蟲也背穹而渾以象天之陽腹平而拆以象地之陰貝類不一按爾雅云貝在陸曰贆音標在水曰蜬音函大曰魧音杭小曰鰿音脊黑白玄赤曰貽黃質白紋曰餘貾音池白質黃紋曰余泉博而頯曰蚆音巴大而險曰蜠音囷小而橢曰鰿音責又古有相貝經甚詳其文云朱仲受之於琴高以遺會稽太守嚴助曰徑尺之貝三代之貞瑞靈奇之祕寶其次則盈尺狀如赤電黑雲者謂之紫貝素質紅章謂之珠貝青地緑紋謂之綬貝黑紋黃畫謂之霞貝紫貝愈疾珠貝明目綬貝消氣障霞貝伏蛆蟲雖不能延齡增壽其御害一也復有下此者鷹喙蟬脊但逐濕去水無奇功也貝之大者如輪可以明目南海貝如珠礫白駁性寒味甘可止水毒浮貝使人寡勿近婦人黑白各半是也濯貝使人善驚勿近童子黃唇點齒有赤駁是也雖貝使人病瘧黑鼻無皮是也皭貝使人胎消勿示孕婦赤帶通脊是也慧貝使人善忘赤熾內殼有赤絡是也醟貝使童子愚女人淫有青唇赤鼻是也碧貝使人盜脊上有縷勾唇雨則重霽則輕是也委貝使人志強夜行能伏鬼魅百獸赤而中圓雨則輕霽則重是也修治珣曰凡入藥燒過用斆曰凡使勿用花蟲殼真相似只是無效貝子以蜜醋相對浸之蒸過取出以清酒淘研氣味咸平有毒主治目翳五癃利水道鬼疰蠱毒腹痛下血本經溫疰寒熱解肌散結熱別録燒研點目去翳弘景傷寒狂熱甄權下水氣浮腫小兒疳蝕吐乳李珣治鼻淵出膿血下痢男子陰瘡解漏脯面臛諸毒射罔毒藥箭毒時珍附方舊三新六目花翳痛貝子一兩燒研如面入龍腦少許點之若有息肉加真珠末等分千金鼻淵膿血貝子燒研每生酒服二錢日三服二便關格不通悶脹二三日則殺人以貝齒三枚甘遂二銖為末漿水和服須臾即通也肘後方小便不通白海蚆一對生一個燒一個為末溫酒服田氏方下疳陰瘡白海蚆三個煅紅研末搽之簡便單方食物中毒孫真人貝子一枚含之自吐聖惠方治漏脯毒面臛毒及射罔在諸肉中有毒並用貝子燒研水調半錢服中射罔毒方同上藥箭鏃毒貝齒燒研水服三錢日三服千金方紫貝別録下品釋名文貝綱目砑螺時珍曰南州異物志云文貝甚大質白紋紫天姿自然不假外飾而光彩煥爛故名頌曰畫家用以砑物故名曰砑螺也集解恭曰紫貝出東南海中形似貝子而大二三寸背有紫斑而骨白南夷採以為貨市宗奭曰紫貝背上深紫有黑點頌曰貝類極多古人以為寶貨而紫貝尤貴後世以多見賤而藥中亦希使之時珍曰按陸璣詩疏云紫貝質白如玉紫點為紋皆行列相當大者徑一尺七八寸交趾九真以為杯盤修治同貝子氣味咸平無毒主治明目去熱毒唐本小兒癍疹目翳時珍附方新一癍疹入目紫貝一個即砑螺也生研細末用羊肝切片摻上扎定米泔煮熟瓶盛露一夜空心嚼食之嬰童百問珂別録下品釋名馬軻螺綱目珬恤時珍曰珂馬勒飾也此貝似之故名徐表作馬軻通典云老雕入海為珬即珂也集解別録曰珂生南海採無時白如蚌恭曰珂貝類也大如鰒皮黃黑而骨白堪以為飾時珍曰按徐表異物志云馬軻螺大者圍九寸細者圍七八寸長三四寸修治斆曰珂要冬採得色白膩者並有白旋水文勿令見火即無用也凡用以銅刀刮末研細重羅再研千下不入婦人藥也氣味咸平無毒主治目翳斷血生肌唐本消翳膜及筋胬肉刮點之李珣去面黑時珍附方新二目生浮翳馬珂三分白龍腦半錢枯過白礬一分研勻點之聖惠方面黑令白馬珂白附子珊瑚鷹矢白等分為末每夜人乳調敷旦以溫漿水洗之同上石蜐音劫綱目釋名紫𧉧音劫與蜐同紫虈音枵龜腳俗名集解時珍曰石蜐生東南海中石上蚌蛤之屬形如龜腳亦有爪狀殼如蟹螯其色紫可食真臘記云有長八九寸者江淹石蜐賦云亦有足翼得春雨則生花故郭璞賦云石蜐應節而揚葩荀子云東海有紫𧉧魚鹽是矣或指為紫貝及石決明者皆非矣氣味甘咸平無毒主治利小便時珍淡菜宋嘉祐釋名殼菜浙人所呼海蜌音陛東海夫人時珍曰淡以味殼以形夫人以似名也集解藏器曰東海夫人生東南海中似珠母一頭尖中銜少毛味甘美南人好食之詵曰常時燒食即苦不宜人與少米先煮熟後除去毛再入蘿蔔或紫蘇或冬瓜同煮即更妙日華曰雖形狀不典而甚益人時珍曰按阮氏云淡菜生海藻上故治癭與海藻同功氣味甘溫無毒日華曰不宜多食多食令人頭悶目暗得微利即止藏器曰多食發丹石令人腸結久食脫人發主治虛勞傷憊精血衰少及吐血久痢腸鳴腰痛疝瘕婦人帶下産後瘦瘠藏器産後血結腹內冷痛治癥瘕潤毛髮治崩中帶下燒食一頓令飽孟詵煮熟食之能補五臟益陽事理腰腳氣能消宿食除腹中冷氣痃癖亦可燒汁沸出食之日華消癭氣時珍海螺拾遺校正時珍曰唐本甲香今併為一釋名流螺圖經假豬螺交州記厴名甲香時珍曰螺與螺同亦作蠡螺從蟲羸省文蓋蟲之羸形者也厴音掩閉藏之貌集解頌曰海螺即流螺厴曰甲香生南海今嶺外閩中近海州郡及明州皆有之或只以台州小者為佳其螺大如小拳青黃色長四五寸諸螺之中此肉味最厚南人食之南州異物志云甲香大者如甌面前一邊直攙長數寸圍殼岨峿有刺其厴雜衆香燒之益芳獨燒則臭今醫家稀用惟合香者用之又有小甲香狀若螺子取其蒂修合成也海中螺類絶有大者珠螺螢潔如珠鸚鵡螺形如鸚鵡頭並可作杯梭尾螺形如梭今釋子所吹者皆不入藥時珍曰螺蚌屬也大者如斗出日南漲海中香螺厴可雜甲香老鈿螺光彩可飾鏡背者紅螺色微紅青螺色如翡翠蓼螺味辛如蓼紫貝螺即紫貝也鸚鵡螺質白而紫頭如鳥形其肉常離殼出食出則寄居蟲入居螺還則蟲出也肉為魚所食則殼浮出人因取之作杯肉氣味甘冷無毒主治目痛纍年或三四十年生螺取汁洗之或入黃連末在內取汁點之藏器合菜煮食治心痛孫思邈甲香修治斆曰凡使用生茅香皂角同煮半日石臼搗篩用之經驗方曰凡使用黃泥同水煮一日溫水浴過再以米泔或灰汁煮一日再浴過以蜜酒煮一日浴過爆乾用頌曰傳信方載其法云每甲香一斤以泔鬥半微火煮一復時換泔再煮凡三換漉出衆手刮去香上涎物以白蜜三合水一斗微火煮乾又以蜜三合水一斗再煮都三復時以香爛止乃以炭火燒地令熱灑酒令潤鋪香於上以新瓦蓋上一復時待冷硬石臼木杵搗爛入沉香末三兩麝一分和搗印成以瓶貯之埋過經久方燒凡燒此香須用大火爐多著熱灰剛炭猛燒令盡去之爐旁著火暖水即香不散此法出於劉兗奉禮也宗奭曰甲香善能管香煙與沉檀龍麝香用之尤佳氣味咸平無毒主治心腹滿痛氣急止痢下淋唐本和氣清神主腸風痔瘻李珣瘻瘡疥癬頭瘡饞瘡甲疽蛇蠍蜂螫藏器甲煎拾遺集解藏器曰甲煎以諸藥及美果花燒灰和蠟成口脂所主與甲香略同三年者良時珍曰甲煎以甲香同沉麝諸藥花物治成可作口脂及焚爇也唐李義山詩所謂沉香甲煎為廷燎者即此氣味辛溫無毒主治甲疽小兒頭瘡吻瘡口旁饞瘡耳後月蝕瘡蟲蜂蛇蠍所螫之瘡並敷之藏器田螺別録下品集解弘景曰田螺生水田中及湖瀆岸側形圓大如梨橘小者如桃李人煮食之保升曰狀類蝸牛而尖長青黃色春夏採之時珍曰螺蚌屬也其殼旋文其肉視月盈虧故王充云月毀於天螺消於淵説卦云離為螺為蚌為龜為鱉為蟹皆以其外剛而內柔也肉氣味甘大寒無毒主治目熱赤痛止渴別録煮汁療熱醒酒用真珠黃連末內入良久取汁注目中止目痛弘景煮食利大小便去腹中結熱目下黃腳氣衝上小腹急硬小便赤澀手足浮腫生浸取汁飲之止消渴搗肉敷熱瘡藏器壓丹石毒孟詵利濕熱治黃疸搗爛貼臍引熱下行止噤口痢下水氣淋閉取水搽痔瘡狐臭燒研治瘰癧癬瘡時珍附方舊三新二十一消渴飲水日夜不止小便數者心鏡用田螺五升水一斗浸一夜渴即飲之每日一換水及螺或煮食飲汁亦妙聖惠用糯米二升煮稀粥一斗冷定入田中活螺三升在內待螺食粥盡吐沫出乃收任性飲之立效肝熱目赤藥性論用大田螺七枚洗淨新汲水養去泥穢換水一升浸洗取起於淨器中著少鹽花於甲內承取自然汁點目逐個用了放去之爛弦風眼方法同上但以銅緑代鹽花飲酒口糜螺蚌煮汁飲聖惠酒醉不醒用水中螺蚌蔥豉煮食飲汁即解肘後小便不通腹脹如鼓用田螺一枚鹽半匕生搗敷臍下一寸三分即通熊彥誠曾得此疾異人授此方果愈類編噤口痢疾用大田螺二枚搗爛入麝香三分作餅烘熱貼臍間半日熱氣下行即思食矣甚效丹溪腸風下血因酒毒者大田螺五個燒至殼白肉乾研末作一服熱酒下是齋百一選方大腸脫肛脫下三五寸者用大田螺二三枚將井水養三四日去泥用雞爪黃連研細末入厴內待化成水以濃茶洗淨肛門將雞翎蘸掃之以軟帛托上自然不再復發也德生堂經驗方反胃嘔噎田螺洗淨水養待吐出泥澄取曬半乾丸梧子大每服三十丸藿香湯下爛殼研服亦可經驗方水氣浮腫用大田螺大蒜車前子等分搗膏攤貼臍上水從便旋而下象山縣民病此得是方而愈仇遠稗史酒疸諸疸用田螺將水養數日去泥取出生搗爛入好酒內用布帛濾過將汁飲之日三服自效壽域腳氣攻注用生大田螺搗爛敷兩股上便覺冷趨至足而安又可敷丹田利小便董守約曾用有效稗史痔漏疼痛乾坤生意用田螺一個入片腦一分在內取水搽之仍先以冬瓜湯洗淨孫氏用田螺一枚用針刺破入白礬末同埋一夜取螺內水掃瘡上又善能止痛也甚妙袖珍用馬齒莧湯洗淨搗活螺螄敷上其病即愈腋氣狐臭乾坤生意用田螺一個水養俟厴開挑巴豆仁一個在內取置杯內夏一夜冬七夜自然成水常取搽之久久絶根又方大田螺一個入麝香三分在內埋露地七七日取出看患洗拭以墨塗上再洗看有墨處是患竅以螺汁點之三五次即瘥瘰癧潰破用田螺連肉燒存性香油調搽集要方疔瘡惡腫用田螺入冰片化水點瘡上普濟風蟲癬瘡用螺螄十個槿樹皮末一兩同入碗內蒸熟搗爛入礬紅三錢以鹽水調搽孫氏繞指毒瘡生手足指上以活田螺一枚生用搗碎縛之即瘥多能鄙事妒精陰瘡大田螺二個和殼燒存性入輕粉同研敷之效醫林集要殼氣味甘平無毒主治燒研主尸疰心腹痛失精水漬飲汁止瀉別録爛者燒研水服止反胃去卒心痛藏器爛殼研細末服之止下血小兒驚風有痰瘡瘍膿水時珍附方新三心脾痛不止者水甲散主之用田螺殼溪間者亦可以松柴片層層疊上燒過火吹去松灰取殼研末以烏沉湯寬中散之類調服二錢不傳之妙集要小兒頭瘡田螺殼燒存性清油調摻之聖惠小兒急驚遠年白田螺殼燒灰入麝香少許水調灌之普濟蝸螺別録釋名螺螄時珍曰師衆多也其形似蝸牛其類衆多故有二名爛殼名鬼眼睛集解別録曰蝸螺生江夏溪水中小於田螺上有稜時珍曰處處湖溪有之江夏漢沔尤多大如指頭而殼厚于田螺惟食泥水春月人採置鍋中蒸之其肉自出酒烹糟煮食之清明後其中有蟲不堪用矣藏器曰此物難死誤泥入壁中數年猶活也肉氣味甘寒無毒主治燭館明目下水別録止渴藏器醒酒解熱利大小便消黃疸水腫治反胃痢疾脫肛痔漏時珍又曰燭館二字疑訛誤附方新六黃疸酒疸小螺螄養去泥土日日煮食飲汁有效永類黃疸吐血病後身面俱黃吐血成盆諸藥不效用螺十個水漂去泥搗爛露一夜五更取清服二三次血止即愈一人病此用之經驗小山怪證方五淋白濁螺螄一碗連殼炒熱入白酒三碗煮至一碗挑肉食之以此酒下數次即效扶壽精方小兒脫肛螺螄二三升鋪在桶內坐之少頃即愈簡便痘疹目翳水煮螺螄常食佳濟急仙方白遊風腫螺螄肉入鹽少許搗泥貼之神效葉氏摘玄方爛殼時珍曰泥中及牆壁上年久者良火煅過用氣味同主治痰飲積及胃脘痛震亨反胃膈氣痰嗽鼻淵脫肛痔疾瘡癤下疳湯火傷時珍發明時珍曰螺乃蚌蛤之屬其殼大抵與蚌粉蛤粉蚶蜆之類同功合而觀之自可神悟附方新十卒得咳嗽屋上白螺或白蜆殼搗為末酒服方寸匕肘後方濕痰心痛白螺螄殼洗淨燒存性研末酒服方寸匕立止正傳膈氣疼痛白玉散用壁上陳白螺螄燒研每服一錢酒下甚效孫氏小兒軟癤用鬼眼睛即牆上白螺螄殼燒灰入倒挂塵等分油調塗之壽域陰頭生瘡用溪港年久螺螄燒灰敷之奇效湯火傷瘡用多年乾白螺螄殼煅研油調敷淡寮楊梅瘡爛古牆上螺螄殼辰砂等分片腦少許為末搽之小兒哮疾向南牆上年久螺螄為末日晡時以水調成日落時舉手合掌皈依吞之即效葉氏摘玄方瘰癧已破土牆上白螺螄殼為末日日敷之談野翁方痘瘡不收牆上白螺螄殼洗淨煅研摻之醫方摘要蓼螺拾遺集解藏器曰蓼螺生永嘉海中味辛辣如蓼時珍曰按韻會云蓼螺紫色有斑文今寧波出泥螺狀如蠶豆可代充海錯肉氣味辛平無毒主治飛尸遊蠱生食之浸以薑醋彌佳藏器寄居蟲拾遺釋名寄生蟲集解藏器曰陶注蝸牛云海邊大有似蝸牛火炙殼便走出食之益人按寄居在螺殼間非螺也候螺蛤開即自出食螺蛤欲合已還殼中海族多被其寄又南海一種似蜘蛛入螺殼中負殼而走觸之即縮如螺火炙乃出一名𧶺無別功用時珍曰按孫愐云寄居在龜殼中者名曰蝞則寄居亦非一種也氣味缺主治益顏色美心志弘景海月拾遺釋名玉珧音姚江珧馬頰馬甲藏器曰海月蛤類也似半月故名水沫所化煮時猶變為水時珍曰馬甲玉珧皆以形色名萬震贊云厥甲美如珧玉是矣集解時珍曰劉恂嶺表録異云海月大如鏡白色正圓常死海旁其柱如搔頭尖其甲美如玉段成式雜俎云玉珧形似蚌長二三寸廣五寸上大下小殼中柱炙食味如牛頭胘項王氏宛委録云奉化縣四月南風起江珧一上可得數百如蚌稍大肉腥韌不堪惟四肉柱長寸許白如珂雪以雞汁瀹食肥美過火則味盡也氣味甘辛平無毒主治消渴下氣調中利五臟止小便消腹中宿物令人易飢能食生薑醬同食之藏器附録海鏡時珍曰一名鏡魚一名瑣蛣一名膏藥盤生南海兩片相合成形殼圓如鏡中甚瑩滑映日光如雲母內有少肉如蚌胎腹有寄居蟲大如豆狀如蟹海鏡飢則出食入則鏡亦飽矣郭璞賦云瑣蛣腹蟹水母目蝦即此海燕綱目集解時珍曰海燕出東海大一寸狀扁面圓背上青黑腹下白脆似海螵蛸有紋如菌茵口在腹下食細沙口旁有五路正勾即其足也臨海水土記云陽遂足生海中背青黑腹白有五足長短大小皆等不知頭尾所在生時體軟死即乾脆即此物也臨海異物志載燕魚長五寸陰雨則飛起丈餘此或同名者也氣味咸溫無毒主治陰雨發損痛煮汁服取汗即解亦入滋陰藥時珍郎君子海藥集解珣曰郎君子生南海有雌雄狀似杏仁青碧色欲驗真假口內含熱放醋中雌雄相逐逡巡便合即下卵如粟狀者真也亦難得之物時珍曰顧玠海槎録云相思子狀如螺中實如石大如豆藏篋笥積歲不壞若置醋中即盤旋不已按此即郎君子也氣味缺主治婦人難産手把之便生極驗
