body:
  text: 禽部第四十七卷李時珍曰二足而羽曰禽師曠禽經云羽蟲三百六十毛協四時色合五方山禽岩棲原鳥地處林鳥朝嘲水鳥夜㖡山禽咮短而尾修水禽咮長而尾促其交也或以尾臎或以睛睨或以聲音或合異類雉孔與蛇交之類其生也或以翼孚卵或以同氣變鷹化鳩之類或以異類化田鼠化鴽之類或變入無情雀入水為蛤之類噫物理萬殊若此學者其可不致知乎五鳩九扈少皞取以名官雄雉鴟鴞詩人得之觀感厥旨微矣不妖夭不覆巢不殈卵而庖人供六禽翨音翅氏攻猛鳥硩蔟覆夭鳥之巢聖人之於物也用舍仁殺之意夫豈徒然哉記曰天產作陽羽類則陽中之陽大抵多養陽於是集其可供庖藥及毒惡當知者為禽部凡七十七種分為四類曰水曰原曰林曰山舊本禽部三品共五十六種今併入一種自獸部移入一種虫部移入一種有名未用移入一種神農本草經四種梁陶弘景注名醫別錄一十二種梁陶弘景注唐本草二種唐蘇恭本草拾遺二十六種唐陳藏器食療本草二種唐孟詵張鼎開寶本草一種宋馬志嘉祐本草一十三種宋掌禹錫日華本草一種宋人大明圖經本草一種宋蘇頌食物本草十種明汪穎本草綱目五種明李時珍附註魏李當之藥錄吳普本草宋雷斆炮炙齊徐之才藥對唐甄權藥性蕭炳四聲唐李珣海藥孫思邈千金楊損之刪繁南唐陳士良食性蜀韓保升重注宋寇宗奭衍義唐慎微證類陳承別說金張元素珍珠囊元李杲法象王好古湯液吳瑞日用朱震亨補遺明徐用誠發揮寧源食鑑汪機會編陳嘉謨蒙筌禽之一水禽類二十三種鶴宋嘉祐釋名仙禽綱目胎禽時珍曰鶴字篆文象翹首短尾之形一云白色㿥㿥故名八公相鶴經云鶴乃羽族之宗仙人之驥千六百年乃胎產則胎仙之稱以此世謂鶴不卵生者誤矣集解禹錫曰鶴有玄有黃有白有蒼入藥用白者他色次之時珍曰鶴大於鵠長三尺高三尺余喙長四寸丹頂赤目赤頰青腳修頸凋尾粗膝纖指白羽黑翎亦有灰色蒼色者嘗以夜半鳴聲唳雲霄雄鳴上風雌鳴下風聲交而孕亦啖蛇虺聞降真香菸則降其糞能化石皆物類相感也按相鶴經云鶴陽鳥也而遊於陰行必依洲渚止不集林木二年落子毛易黑點三年產伏又七年羽翮具又七年飛薄雲漢又七年舞應節又七年鳴中律又七年大毛落氄毛生或白如雪或黑如漆百六十年雌雄相視而孕千六百年形始定飲而不食乃胎化也又按俞琰云龜鶴能運任脈故多壽無死氣於中也鶴骨為笛甚清越白鶴血氣味咸平無毒主治益氣力補虛乏去風益肺嘉祐發明禹錫曰按穆天子傳云天子至巨蒐氏巨蒐之人獻白鶴之血飲之云益人氣力也腦主治和天雄蔥實服之令人目明夜能書字抱朴卵氣味甘咸平無毒主治預解痘毒多者令少少者令不出每用一枚煮與小兒食之時珍出活幼全書骨主治酥炙入滋補藥時珍肫中砂石子主治磨水服解蠱毒邪嘉祐鸛別錄下品釋名皂君詩疏負釜同黑尻同時珍曰鸛字篆文象形其背尾色黑故陸璣詩疏有皂君諸名集解弘景曰鸛有兩種似鵠而巢樹者為白鸛黑色曲頸者為烏鸛今宜用白者宗奭曰鸛身如鶴但頭無丹項無烏帶兼不善唳止以喙相擊而鳴多在樓殿吻上作窠嘗日夕觀之並無作池養魚之說時珍曰鸛似鶴而頂不丹長頸赤喙色灰白翅尾俱黑多巢於高木其飛也奮於層霄旋繞如陣仰天號鳴必主有雨其抱卵以影或云以聲聒之禽經云鸛生三子一為鶴巽極成震極陰變陽也震為鶴巽為鸛也正誤藏器曰人探巢取鸛子六十里旱能群飛激散雨也其巢中以泥為池含水滿中養魚蛇以哺子鸛之伏卵恐冷取礜石圍之以助暖氣時珍曰寥郭之大陰陽升降油然作云沛然下雨區區微鳥豈能以私忿使天壤赤旱耶況鸛乃水鳥可以候雨乎作池取石之說俱出自陸璣詩疏張華博物志可謂愚矣骨氣味甘大寒無毒藏器曰有小毒入沐湯浴頭令發盡脫更不生也又殺樹木主治鬼蠱諸疰毒五屍心腹痛別錄甄權曰亦可單炙黃研空心暖酒服方寸匕時珍曰千金治屍疰有鸛骨丸腳骨及嘴主治喉痹飛屍蛇虺咬及小兒閃癖大腹痞滿並煮汁服之亦燒灰飲服藏器卵主治預解痘毒水煮一枚與小兒啖之令不出痘或出亦稀時珍出活幼全書屎主治小兒天釣驚風發歇不定炒研半錢入牛黃麝香各半錢炒蠍五枚為末每服半錢新汲水服時珍鶬雞食物釋名鶬鴰爾雅麋鴰爾雅鴰鹿爾雅翼麥雞時珍曰按羅願云鶬麋其色蒼如麋也鴰鹿其聲也關西呼曰鴰鹿山東呼曰鶬鴰訛為錯落南人呼為鶬雞江人呼為麥雞集解穎曰鶬雞狀如鶴大而頂無丹兩頰紅時珍曰鶬水鳥也食于田澤洲渚之間大如鶴青蒼色亦有灰色者長頸高腳群飛可以候霜或以為即古之鷫鸘其皮可為裘與鳳同名者也肉氣味甘溫無毒主治殺蟲解蠱毒汪穎發明時珍曰鶬古人多食之故宋玉小招云鵠酸臇鳧煎鴻鶬景差大招云炙鴰蒸鳧煔鶉陳今惟俚人捕食不復充饌品矣附錄鷫鸘時珍曰按羅願爾雅翼云鷫鸘水鳥雁屬也似雁而長頸綠色皮可為裘霜時乃來就暖故禽經云鸘飛則霜𪂕飛則雨𪂕即商羊也又西方之鳳亦名鷫鸘陽烏拾遺釋名陽鴉拾遺集解藏器曰陽烏出建州似鸛而殊小身黑頸長而白嘴主治燒灰酒服治惡蟲咬成瘡藏器鵚鶖食物釋名扶老古今注鴜𪀧俗作鷀𪀧時珍曰凡鳥至秋毛脫禿此鳥頭禿如秋毨又如老人頭童及扶杖之狀故得諸名說文作禿𪀖集解時珍曰禿鶖水鳥之大者也出南方有大湖泊處其狀如鶴而大青蒼色張翼廣五六尺舉頭高六七尺長頸赤目頭項皆無毛其頂皮方二寸許紅色如鶴頂其喙深黃色而扁直長尺余其嗉下亦有胡袋如鵜鶘狀其足爪如雞黑色性極貪惡能與人鬥好啖魚蛇及鳥雛詩云有鶖在梁即此自元入我朝常賦猶有鴜𪀧之供獻按飲膳正要云鴜𪀧有三種有白者黑者花者名為胡鴜𪀧其肉色亦不同也又案景煥閒談云海鳥鶢鶋即今之禿鶖其說與環氏吳紀所謂鳥之大者禿鶖小者鷦鷯相合今潦年鶖或飛來近市人或怪駭此又同魯人怪鶢鶋之意皆由不常見耳肉氣味咸微寒無毒正要曰甘溫主治中蟲魚毒汪穎補中益氣甚益人炙食尤美作脯饈食強氣力令人走及奔馬時珍出飲膳正要及古今注禽經髓氣味甘溫無毒主治補精髓正要喙主治魚骨哽汪穎毛主治解水蟲毒時珍出埤雅鸏𪆏音蒙童綱目釋名越王鳥綱目鶴頂同䴂雕同集解時珍曰案劉欣期交州志云鸏𪆏即越王鳥水鳥也出九真交趾大如孔雀喙長尺余黃白黑色光瑩如漆南人以為飲器羅山疏云越王鳥狀如烏鳶而足長口勾末如冠可受二升許以為酒器極堅緻不踐地不飲江湖不唼百草不食蟲魚惟啖木葉糞似薰陸香山人得之以為香可入藥用楊慎丹鉛錄云鸏𪆏即今鶴頂也糞主治水和塗雜瘡竺法真登羅山疏鵜鶘宋嘉祐釋名犁鶘鴮鸅音戶澤逃河一作淘淘鵝禹錫曰昔有人竊肉入河化為此鳥今猶有肉因名逃河時珍曰此俚言也案山海經云沙水多犁鶘其名自呼後人轉為鵜鶘耳又吳諺云夏至前來謂之犁鶘言主水也夏至後來謂之犁塗言主旱也陸璣云遇小澤即以胡盛水戽涸取魚食故曰鴮鸅曰淘河俗名淘鵝因形也又訛而為駝鶴集解禹錫曰鵜鶘大如蒼鵝頤下有皮袋容二升物展縮由之袋中盛水以養魚云身是水沫惟胸前有兩塊肉列如拳詩云惟鵜在梁不濡其咮咮喙也言愛其嘴也時珍曰鵜鶘處處有之水鳥也似鶚而甚大灰色如蒼鵝喙長尺余直而且廣口中正赤頷下胡大如數升囊好群飛沉水食魚亦能竭小水取魚俚人食其肉取其脂入藥用翅骨䯒骨作筒吹喉鼻藥甚妙其盛水養魚身是水沫之說蓋妄談也又案晁以道云鵜之屬有曰漫畫者以嘴畫水求魚無一息之停有曰信天緣者終日凝立不易其處俟魚過乃取之所謂信天緣者即俗名青翰者也又名青莊此可喻人之貪廉脂油時珍曰剝取其脂熬化掠取就以其嗉盛之則不滲漏他物即透走也氣味咸溫滑無毒主治塗癰腫治風痹透經絡通耳聾時珍發明時珍曰淘鵝油性走能引諸藥透入病所拔毒故能治聾痹腫毒諸病附方新一耳聾用淘鵝油半匙磁石一小豆麝香少許和勻以綿裹成挺子塞耳中口含生鐵少許用三五次即有效青囊嘴氣味咸平無毒主治赤白久痢成疳燒存性研末水服一方寸匕嘉祐舌主治疔瘡時珍毛皮主治反胃吐食燒存性每酒服二錢時珍出普濟鵝別錄上品釋名家雁綱目舒雁時珍曰鵝鳴自呼江東謂之舒雁似雁而舒遲也集解時珍曰江淮以南多畜之有蒼白二色及大而垂胡者並綠眼黃喙紅掌善鬥其夜鳴應更師曠禽經云腳近臎者能步鵝鶩是也又云鵝伏卵則逆月謂向月取氣助卵也性能啖蛇及蚓制射工故養之能闢蟲虺或言鵝性不食生蟲者不然白鵝膏臘月煉收氣味甘微寒無毒主治灌耳治卒聾別錄潤皮膚可合面脂日華塗面急令人悅白唇沈手足皴裂消癰腫解礜石毒時珍肉氣味甘平無毒日華曰白鵝辛涼無毒蒼鵝冷有毒發瘡腫詵曰鵝肉性冷多食令人易霍亂發痼疾李鵬飛曰嫩鵝毒老鵝良主治利五臟別錄解五臟熱服丹石人宜之孟詵煮汁止消渴藏器發明藏器曰蒼鵝食蟲主射工毒為良白鵝不食蟲止渴為勝時珍曰鵝氣味俱厚發風發瘡莫此為甚火熏者尤毒曾目擊其害而本草謂其性涼利五臟韓𢘅醫通謂其疏風豈其然哉又葛洪肘後方云人家養白鵝白鴨可闢食射工則謂白鵝不食蟲不發病之說亦非矣但比蒼鵝薄乎云耳若夫止渴凡發胃氣者皆能生津豈獨止渴者便曰性涼乎參苓白朮散乃治渴要藥何嘗寒涼耶臎一名尾罌尾肉也時珍曰內則舒雁臎不可食為氣臊可厭耳而俗夫嗜之主治塗手足皴裂納耳中治聾及聤耳日華血氣味咸平微毒主治中射工毒者飲之並塗其身陶弘景解藥毒時珍曰祈禱家多用之膽氣味苦寒無毒主治解熱毒及痔瘡初起頻塗抹之自消時珍附方新一痔瘡有核白鵝膽二三枚取汁入熊膽二分片腦半分研勻瓷器密封勿令泄氣用則手指塗之立效劉氏保壽堂方卵氣味甘溫無毒主治補中益氣多食發痼疾孟詵涎主治咽喉谷賊時珍發明時珍曰按洪邁夷堅志云小兒誤吞稻芒著咽喉中不能出者名曰谷賊惟以鵝涎灌之即愈蓋鵝涎化谷相制耳毛主治射工水毒別錄小兒驚癇又燒灰酒服治噎疾蘇恭發明弘景曰東川多溪毒養鵝以闢之毛羽亦佳並飲其血鵝未必食射工蓋以威相制耳時珍曰禽經云鵝飛則蜮沉蜮即射工也又嶺南異物志云邕州蠻人選鵝腹毳毛為衣被絮柔暖而性冷嬰兒尤宜之能闢驚癇柳子厚詩云鵝毛御臘縫山罽即此蓋毛與肉性不同也附方新二通氣散治誤吞銅錢及鉤繩鵝毛一錢燒灰磁石皂子大煅象牙一錢燒存性為末每服半錢新汲水下醫方妙選噎食病白鵝尾毛燒灰米湯每服一錢掌上黃皮主治燒研搽腳趾縫濕爛焙研油調塗凍瘡良時珍出談野翁諸方屎主治絞汁服治小兒鵝口瘡時珍出秘錄蒼鵝屎敷蟲蛇咬毒日華附方新一鵝口瘡自內生出可治自外生入不可治用食草白鵝下清糞濾汁入沙糖少許搽之或用雄鵝糞眠倒者燒灰入麝香少許搽之並效永類鈐方雁本經上品釋名鴻時珍曰按禽經云鳱以水言自北而南𩿪以山言自南而北張華注云鳱𩿪並音雁冬則適南集於水乾故字從干春則向北集於山岸故字從厈小者曰雁大者曰鴻鴻大也多集江渚故從江梵書謂之僧娑集解別錄曰雁生江南池澤取無時弘景曰詩疏云大曰鴻小曰雁今雁類亦有大小皆同一形又有野鵝大於雁似人家蒼鵝謂之駕鵝雁在江湖夏當產伏故皆往北恐雁門北人不食之也雖採無時以冬月為好恭曰雁為陽鳥與燕往來相反冬南翔夏北徂孳育於北也豈因北人不食之乎宗奭曰雁熱則即北寒則即南以就和氣所以為禮幣者一取其信二取其和也時珍曰雁狀似鵝亦有蒼白二色今人以白而小者為雁大者為鴻蒼者為野鵝亦曰鴚鵝爾雅謂之鵱鷜也雁有四德寒則自北而南止於衡陽熱則自南而北歸於雁門其信也飛則有序而前鳴後和其禮也失偶不再配其節也夜則群宿而一奴巡警晝則銜蘆以避繒繳其智也而捕者豢之為媒以誘其類是則一愚矣南來時瘠瘦不可食北向時乃肥故宜取之又漢唐書並載有五色雁云雁肪正誤一名鶩肪弘景曰鶩是野鴨本經雁肪亦名鶩肪是雁鶩相類而誤耳氣味甘平無毒主治風攣拘急偏枯血氣不通利久服益氣不飢輕身耐老本經心鏡云上證用肪四兩煉淨每日空心暖酒一杯服一匙長毛髮鬚眉別錄詵曰合生發膏用之殺諸石藥毒吳普治耳聾和豆黃作丸補勞瘦肥白人日華塗癰腫耳疳又治結熱胸痞嘔吐時珍曰外臺治此證有雁肪湯附方新一生髮雁肪日日塗之千金方肉氣味甘平無毒思邈曰七月勿食雁傷人神禮云食雁去腎不利人也主治風麻痹久食助氣壯筋骨日華利臟腑解丹石毒時珍發明弘景曰雁肪人不多食其肉亦應好宗奭曰人不食雁謂其知陰陽之升降分少長之行序也道家謂之天厭亦一說耳食之則治諸風骨主治燒灰和米泔沐頭長髮孟洗毛主治喉下白毛療小兒癇有效蘇恭自落翎毛小兒佩之闢驚癇日華發明時珍曰案酉陽雜俎云臨邑人春夏羅取鴻雁毛以御暑又淮南萬畢術云鴻毛作囊可以渡江此亦中流一壺之意水行者不可不知屎白主治灸瘡腫痛和人精塗之梅師鵠食物釋名天鵝時珍曰案師曠禽經云鵠鳴哠哠故謂之鵠吳僧贊寧云凡物大者皆以天名天者大也則天鵝名義蓋亦同此羅氏謂鵠即鶴亦不然集解時珍曰鵠大於雁羽毛白澤其翔極高而善步所謂鵠不浴而白一舉千里是也亦有黃鵠丹鵠湖海江漢之間皆有之出遼東者尤甚而畏海青鶻其皮毛可為服飾謂之天鵝絨案飲膳正要云天鵝有四等大金頭鵝似雁而長項入食為上美於雁小金頭鵝形差小花鵝色花一種不能鳴鵝飛則翔響其肉微腥並不及大金頭鵝各有所產之地肉氣味甘平無毒穎曰冷忽氏曰熱主治醃炙食之益人氣力利臟腑時珍油冬月取肪煉收氣味缺主治塗癰腫治小兒疳耳時珍附方新一疳耳出膿用天鵝油調草烏末入龍腦少許和敷立效無則以雁油代之通玄論絨毛主治刀杖金瘡貼之立愈汪穎鴇音保綱目釋名獨豹時珍曰案羅願云鴇有豹文故名獨豹而訛為鴇也陸佃云鴇性群居如雁有行列故字從𠤏𠤏音保相次也詩云鴇行是矣集解時珍曰鴇水鳥也似雁而斑紋無後趾性不木止其飛也肅肅其食也齝肥腯多脂肉粗味美閩語曰鴇無舌兔無脾或云純雌無雄與他鳥合或云鴇見鷙鳥激糞射之其毛自脫也肉氣味甘平無毒時珍曰禮記不食鴇奧奧者膍胵也深奧之處也主治補益虛人去風痹氣正要肪主治長毛髮澤肌膚塗癰腫時珍鶩音木別錄上品釋名鴨說文舒鳧爾雅家鳧綱目𩿣鴄音末匹時珍曰鶩通作木鶩性質木而無他心故庶人以為贄曲禮云庶人執匹匹雙鶩也匹夫卑末故廣雅謂鴨為𩿣鴄禽經云鴨鳴呷呷其名自呼鳧能高飛而鴨舒緩不能飛故曰舒鳧正誤弘景曰鶩即鴨有家鴨野鴨藏器曰屍子云野鴨為鳧家鴨為鶩不能飛翔如庶人守耕稼而已保升曰爾雅云野鳧鶩而本草鶩肪乃家鴨也宗奭曰據數說則鳧鶩皆鴨也王勃滕王閣序云落霞與孤鶩齊飛則鶩為野鴨明矣勃乃名儒必有所據時珍曰四家惟藏器為是陶以鳧鶩混稱寇以鶩為野鴨韓引爾雅錯舒鳧為野鳧並誤矣今正之蓋鶩有舒鳧之名而鳧有野鶩之稱故王勃可以通用而其義自明案周禮庶人執鶩豈野鴨乎國風弋鳧與雁豈家鴨乎屈原離騷云寧與騏驥抗軛乎將與雞鶩爭食乎寧昂昂若千里駒乎將泛泛若水中之鳧乎此以鳧鶩對言則家也野也益自明矣集解時珍曰案格物論云鴨雄者綠頭文翅雌者黃斑色但有純黑純白者又有白而烏骨者藥食更佳鴨皆雄喑雌鳴重陽後乃肥腯味美清明後生卵則內陷不滿伏卵聞礱磨之聲則毈而不成無雌抱伏則以牛屎嫗而出之此皆物理之不可曉者也鶩肪白鴨者良煉過用氣味甘大寒無毒思邈曰甘平主治氣虛寒熱水腫別錄附方新一瘰癧汁出不止用鴨脂調半夏末敷之永類方肉氣味甘冷微毒弘景曰黃雌鴨為補最勝詵曰白鴨肉最良黑鴨肉有毒滑中發冷利腳氣不可食目白者殺人瑞曰腸風下血人不可食時珍曰嫩者毒老者良尾臎不可食見禮記昔有人食鴨肉成症用秫米治之而愈見秫米下主治補虛除客熱利臟腑利水道療小兒驚癇別錄解丹毒止熱痢日華頭生瘡腫和蔥豉煮汁飲之去卒然煩熱孟詵並用白鴨發明劉完素曰鶩之利水因其氣相感而為使也時珍曰鴨水禽也治水利小便宜用青頭雄鴨取水木生髮之象治虛勞熱毒宜用烏骨白鴨取金水寒肅之象也附方舊三新一白鳳膏葛可久云治久虛發熱咳嗽吐痰咳血火乘金位者用黑嘴白鴨一隻取血入溫酒量飲使直入肺經以酒補之將鴨干撏去毛脅下開竅去腸拭淨入大棗肉二升參苓平胃散末一升縛定用沙甕一個置鴨在內以炭火慢煨將陳酒一瓶作三次入之酒干為度取起食鴨及棗頻作取愈十藥神書大腹水病小便短少百一方用青頭雄鴨煮汁飲厚蓋取汗心鏡治十種水病垂死用青頭鴨一隻如常治切和米並五味煮作粥食又方用白鴨一隻治淨以饙飯半升同薑椒入鴨腹中縫定蒸熟食之頭雄鴨者良主治煮服治水腫通利小便恭曰古方有鴨頭丸附方新一鴨頭丸治陽水暴腫面赤煩躁喘急小便澀其效如神此裴河東方也用甜葶藶炒二兩熬膏漢防己末二兩以綠頭鴨血同頭全搗三千杵丸梧子大每木通湯下七十丸日三服一加豬苓一兩外臺秘要腦主治凍瘡取塗之良時珍血白鴨者良氣味咸冷無毒主治解諸毒別錄熱飲解野葛毒已死者入咽即活孟詵熱血解中生金生銀丹石砒霜諸毒射工毒又治中惡及溺水死者灌之即活蚯蚓咬瘡塗之即愈時珍附方新三卒中惡死或先病痛或臥而忽絕並取雄鴨向死人口斷其頭瀝血入口外以竹筒吹其下部極則易人氣通即活也肘後解百蠱毒白鴨血熱飲之廣記小兒白痢似魚凍者白鴨殺取血滾酒泡服即止也摘玄方舌主治痔瘡殺蟲取相制也時珍涎主治小兒痓風頭及四肢皆往後以鴨涎滴之又治蚯蚓吹小兒陰腫取雄鴨抹之即消時珍出海上膽氣味苦辛寒無毒主治塗痔核良又點赤目初起亦效時珍肫衣即膍胵內皮也主治諸骨哽炙研水服一錢即愈取其消導也時珍卵氣味甘咸微寒無毒詵曰多食發冷氣令人氣短背悶小兒多食腳軟鹽藏食之即宜人士良曰生瘡毒者食之令惡肉突出弘景曰不可合鱉肉李子食害人合椹食令人生子不順主治心腹胸膈熱日華發明時珍曰今人鹽藏鴨子其法多端俗傳小兒泄痢炙咸卵食之亦間有愈者蓋鴨肉能治痢而炒鹽亦治血痢故耳白鴨通即鴨屎也與馬通同義氣味冷無毒主治殺石藥毒解結縛散畜熱別錄主熱毒毒痢又和雞子白塗熱瘡腫毒即消塗蚯蚓咬亦效孟詵絞汁服解金銀銅鐵毒時珍附方舊一新二石藥過劑白鴨屎為末水服二錢效百一方乳石發動煩熱用白鴨通一合湯一盞漬之澄清冷飲聖惠方熱瘡腫痛不可忍用家鴨糞同雞子清調敷即消聖惠鳧食療釋名野鴨詩疏野鶩同上鸍音施沉鳧時珍曰鳧從幾音殊短羽高飛貌鳧義取此爾雅云鸍沉鳧也鳧性好沒故也俗作晨鳧云鳧常以晨飛亦通集解時珍曰鳧東南江海湖泊中皆有之數百為群晨夜蔽天而飛聲如風雨所至稻粱一空陸璣詩疏云狀似鴨而小雜青白色背上有紋短喙長尾卑腳紅掌水鳥之謹願者肥而耐寒或云食用綠頭者為上尾尖者次之海中一種冠鳧頭上有冠乃石首魚所化也並宜冬月取之肉氣味甘涼無毒詵曰九月以後立春以前即中食大益病人全勝家者雖寒不動氣日華曰不可合胡桃木耳豆豉同食主治補中益氣平胃消食除十二種蟲身上有諸小熱瘡年久不愈者但多食之即瘥孟詵治熱毒風及惡瘡癤殺腹臟一切蟲治水腫日華血主治解挑生蠱毒熱飲探吐時珍出摘玄鸊鷉音甓梯拾遺釋名須鸁爾雅水𩿤音札正要䴇𩾚日用刁鴨蜀本注油鴨俗時珍曰鸊鷉須鸁並未詳𩿤刁零丁皆狀其小也油言其肥也集解藏器曰鸊鷉水鳥也大如鳩鴨腳連尾不能陸行常在水中人至即沉或擊之便起其膏塗刀劍不鏽續英華詩云馬銜苜蓿葉劍瑩鸊鷉膏是也韓保升曰野鴨有與家鴨相似者有全別者其甚小者名刁鴨味最佳時珍曰鸊鷉南方湖溪多有之似野鴨而小蒼白文多脂味美冬月取之其類甚多揚雄方言所謂野鳧甚小而好沒水中者南楚之外謂之鸊鷉大者謂之鶻鷉是也肉氣味甘平無毒主治補中益氣五味炙食甚美時珍出正要膏主治滴耳治聾藏器鴛鴦宋嘉祐釋名黃鴨綱目匹鳥時珍曰鴛鴦終日並遊有宛在水中央之意也或曰雄鳴曰鴛雌鳴曰鴦崔豹古今注云鴛鴦雄雌不相離人獲其一則一相思而死故謂之匹鳥涅槃經謂之婆羅迦鄰提集解時珍曰鴛鴦鳧類也南方湖溪中有之棲於土穴中大如小鴨其質杏黃色有文采紅頭翠鬣黑翅黑尾紅掌頭有白長毛垂之至尾交頸而臥其交不再肉氣味咸平有小毒孫曰苦微溫無毒瑞曰酸無毒禹錫曰多食令人患大風主治諸瘻疥癬以酒浸炙令熱敷貼瘡上冷即易嘉祐清酒炙食治瘻瘡作羹臛食之令人肥麗夫婦不和者私與食之即相愛憐孟詵炙食治夢寐思慕者孫思邈附方舊一新一五痔瘻瘡鴛鴦一隻治如常法炙熟細切以五味醋食之作羹亦妙食醫心鏡血痔不止鴛鴦一隻治淨切片以五味椒鹽醃炙空心食之奉親養老方鸂鶒音溪敕宋嘉祐釋名溪鴨異物志紫鴛鴦時珍曰按杜臺卿淮賦云鸂鶒尋邪而逐害此鳥專食短狐乃溪中敕逐害物者其遊於溪也左雄右雌群伍不亂似有式度者故說文又作溪𪀦其形大於鴛鴦而色多紫亦好並遊故謂之紫鴛鴦也集解禹錫曰鸂鶒南方有短狐處多有之性食短狐也所居處無復毒氣人家宜畜之形小如鴨毛有五采首有纓尾有毛如船柁形肉氣味甘平無毒冬月用之主治食之去驚邪及短狐毒嘉祐鵁鶄音交睛拾遺釋名交矑說文茭雞俗鳽音堅出爾雅時珍曰按禽經云白鵒相睨而孕鵁鶄睛交而孕又曰旋目其名䴉方目其名鴋交目其名鳽觀其眸子而命名之義備矣說文謂之交矑矑亦目瞳子也俗呼茭雞云多居茭菰中而腳高似雞其說亦通集解藏器曰鵁鶄水鳥也出南方池澤似鴨綠衣人家養之馴擾不去可厭火災異物志云鵁鶄巢於高樹顛生子穴中銜其母翼飛下飲食時珍曰鵁鶄大如鳧鶩而高似雞長喙好啄其頂有紅毛如冠翠鬣碧斑丹嘴青脛養之可玩肉氣味甘咸平無毒主治炙食解諸魚蝦毒時珍附錄旋目水鳥也生荊郢間大如鷺而短尾紅白色深目目旁毛皆長而旋上林賦云交睛旋目是矣方目一名鴋音紡一名澤虞俗名護田鳥西人謂之蛤蟆護水鳥也常在田澤中形似鷗鷺蒼黑色頭有白肉冠赤足見人輒鳴喚不去漁人呼為烏雞閩人訛為姑雞鷺食物釋名鷺鷥禽經絲禽陸龜蒙雪客李昉所命舂鋤爾雅白鳥時珍曰禽經云鸘飛則霜鷺飛則露其名以此步於淺水好自低昂如舂如鋤之狀故曰舂鋤陸璣詩疏云青齊之間謂之舂鋤遼東吳揚皆云白鷺集解時珍曰鷺水鳥也林棲水食群飛成序潔白如雪頸細而長腳青善翹高尺余解指短尾喙長三寸頂有長毛十數莖毿毿然如絲欲取魚則弭之郭景純云其毛可為睫䍦變化論云鷺以目盼而受胎穎曰似鷺而頭無絲腳黃色者俗名白鶴子又有紅鶴相類色紅禽經所謂朱鷺是也肉氣味咸平無毒主治虛瘦益脾補氣炙熟食之汪穎頭主治破傷風肢強口緊連尾燒研以臘豬脂調敷瘡口救急方鷗食物釋名鷖音醫水鴞時珍曰鷗者浮水上輕漾如漚也鷖者鳴聲也鴞者形似也在海者名海鷗在江者名江鷗江夏人訛為江鵝也海中一種隨潮往來謂之信鳧集解時珍曰鷗生南方江海湖溪間形色如白鴿及小白雞長喙長腳群飛耀日三月生卵羅氏謂青黑色誤矣肉氣味缺鸀鳿音燭玉拾遺釋名鸑鷟時珍曰鸀鳿名義未詳案許慎說文云鸑鷟鳳屬也又江中有鸑鷟似鳧而大赤目據此則鸀鳿乃鷟鸑聲轉蓋此鳥有紋彩如鳳毛故得同名耳集解藏器曰鸀鳿山溪有水毒處即有之因為食毒蟲所致也其狀如鴨而大長項赤目斑嘴毛紫紺色如鵁鶄色也時珍曰案三輔黃圖及事類合璧並以今人所呼白鶴子者為鸀鳿謂其鳥潔白如玉也與陳氏似鴨紫紺之說不同白鶴子狀白如鷺長喙高腳但頭無絲耳姿標如鶴故得鶴名林棲水食近水處極多人捕食之味不甚佳毛及屎主治燒灰水服治溪毒砂蝨水弩射工蜮短狐蝦鬚等病亦可將鳥近病人即能唼人身訖以物承之當有沙出其沙即含沙射人之箭也又可籠鳥近人令鳥氣相吸藏器發明藏器曰以上數病大略相似俱是山水間蟲含沙射影所致亦有無水處患者或如瘧或如天行寒熱或有瘡無瘡但夜臥時以手摩身體有辣痛處熟視當有赤點如針頭急捻之以芋葉入內刮出細沙以蒜封之則愈否則寒熱漸深也惟蝦鬚瘡最毒十活一二桂嶺獨多但早覺時以芋及甘蔗葉屈角入肉勾出其根如蝦鬚狀則愈遲則根入至骨有如疔腫最惡好著人隱處時珍曰水弩短狐射工蜮一物也陳氏分為四非矣溪毒有氣無形砂蝨沙中細蟲也鸕鷀別錄下品釋名鷧音意爾雅水老鴉衍義時珍曰案韻書盧與茲並黑也此鳥色深黑故名鷧者其聲自呼也集解時珍曰鸕鷀處處水鄉有之似鶂而小色黑亦如鴉而長喙微曲善沒水取魚日集洲渚夜巢林木久則糞毒多令木枯也南方漁舟往往縻畜數十令其捕魚杜甫詩家家養烏鬼頓頓食黃魚或謂即此又一種似鸕鷀而蛇頭長項冬月羽毛落盡棲息溪岸見人不能行即沒入水者此即爾雅所謂鴢頭魚鵁者不入藥用鴢音拗藏器曰一種頭細身長項上白者名魚鵁不入藥用正誤弘景曰此鳥不卵生口吐其雛亦一異也藏器曰此鳥胎生從口出如兔吐兒故產婦執之易生宗奭曰人言孕婦忌食鸕鷀為其口吐雛嘗官於澧州公廨後有一大木上有三四十窠日夕視之既能交合又有碧色卵殼布地則陶陳之說誤聽人言也時珍曰一種鶂鳥或作鷁似鸕鷀而色白人誤以為白鸕鷀是也雌雄相視雄鳴上風雌鳴下風而孕口吐其子莊周所謂白鶂相視眸子不運而風化者也昔人誤以吐雛為鸕鷀蓋鶂鷧音相近耳鶂善高飛能風能水故舟首畫之又有似鶂而短項背上綠色腹背紫白色者名青鶂一名烏𪇰陶氏謂烏賊魚乃此鳥所化或云即鴨非也肉氣味酸咸冷微毒主治大腹鼓脹利水道時珍發明時珍曰鸕鷀別錄不見功用惟雷氏炮炙論序云體寒腹大全賴鸕鷀注云治腹大如鼓體寒者以鸕鷀燒存性為末米飲服之立愈竊謂諸腹鼓大皆屬於熱衛氣並循於血脈則體寒此乃水鳥其氣寒冷而利水寒能勝熱利水能去濕故也又外臺云凡魚骨哽者但密念鸕鷀不已即下此乃厭伏之意耳頭氣味微寒主治哽及噎燒研酒服別錄骨主治燒灰水服下魚骨哽弘景附方新一雀卵面斑鸕鷀骨燒研入白芷末豬脂和夜塗旦洗摘玄方喙主治噎病發即銜之便安範汪嗉主治魚哽吞之最效時珍翅羽主治燒灰水服半錢治魚哽噎即愈時珍出太平御覽蜀水花別錄曰鸕鷀屎也弘景曰溪谷間甚多當自取之擇用白處市賣者不可信頌曰屎多在山石上色紫如花就石刮取別錄謂屎即蜀水花而唐面膏方中二物並用未知其的時珍曰當以別錄為正唐方蓋傳寫之訛誤也氣味冷微毒主治去面上黑䵟黶痣別錄療面瘢疵及湯火瘡痕和脂油敷疔瘡大明南人治小兒疳蛔乾研為末炙豬肉蘸食云有奇效蘇頌殺蟲時珍附方舊二新一鼻面酒齇鸕鷀屎一合研末以臘月豬脂和之每夜塗旦洗千金魚骨哽咽鸕鷀屎研水服方寸匕並以水和塗喉外範汪方斷酒鸕鷀屎燒研水服方寸匕日一服外臺魚狗拾遺釋名鴗爾雅天狗同水狗同魚虎禽經魚師同翠碧鳥爾雅翼時珍曰狗虎師皆獸之噬物者此鳥害魚故得此類命名集解藏器曰此即翠鳥也穴土為窠大者名翠鳥小者名魚狗青色似翠其尾可為飾亦有斑白者俱能水上取魚時珍曰魚狗處處水涯有之大如燕喙尖而長足紅而短背毛翠色帶碧翅毛黑色揚青可飾女人首物亦翡翠之類肉氣味咸平無毒主治魚哽及魚骨入肉不出痛甚者燒研飲服或煮汁飲亦佳藏器發明時珍曰今人治魚骨哽取得去腸用陰陽瓦泥固煅存性入藥用蓋亦取其相制之意附錄翡翠時珍曰爾雅謂之鷸出交廣南越諸地飲啄水側穴居生子亦巢於木似魚狗稍大或云前身翡後身翠如鵝翠雁翠之義或云雄為翡其色多赤雌為翠其色多青彼人亦以肉作臘食之方書不見用功應與魚狗相同蚊母鳥拾遺釋名吐蚊鳥鷏爾雅音田集解藏器曰此鳥大如雞黑色生南方池澤茹藘中江東亦多其聲如人嘔吐每吐出蚊一二升夫蚊乃惡水中蟲羽化所生而江東有蚊母鳥塞北有蚊母草嶺南有虻母木此三物異類而同功也時珍曰郭璞云蚊母似烏𪇰而大黃白雜紋鳴如鴿聲嶺南異物志言吐蚊鳥大如青鷁大嘴食魚豈各地之產差異耶翅羽主治作扇闢蚊藏器
