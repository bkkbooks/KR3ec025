半截者燒灰吹之唐氏經驗方牙齒不生普濟不拘大人小兒用雄雞矢雌雞矢各十四顆焙研入麝香少許先以針挑破出血敷之年高者不過二十日年少者十日必生又方但用烏雞雌雄糞入舊麻鞋底燒存性等分入麝香少許三日夜不住擦令熱為佳李察院亮卿嘗用有效耳聾不聽雞矢白炒半升烏豆炒一升以無灰酒二升乘熱投入服取汗耳如鼓鼙勿訝外臺面目黃疸雞矢白小豆秫米各二分為末分作三服水下當有黃汁出也肘後方子死腹中雄雞糞二十一枚水二升煎取五合下米作粥食胎即出産寶乳妒乳癰雞矢白炒研酒服方寸匕須叟三服愈産寶乳頭破裂方同上梅師內癰未成取伏雞屎水和服即瘥千金頭瘡白禿雄雞屎末和陳醬苦酒洗之千金消滅瘢痕以豬脂三斤飼烏雞一隻三日後取白矢同白芷當歸各一兩煎十沸去滓入鷹矢白半兩調敷外臺耳中惡瘡雞矢白炒研敷之聖惠瘰癧瘻瘡雄雞矢燒灰臘豬脂和敷之千金食金中毒已死取雞矢半升水淋取汁一升飲之日三肘後方縊死未絶雞矢白如棗大酒半盞和灌口鼻肘後尸腳拆裂無冬夏者雞屎煮湯漬半日取瘥乃止千金射工溪毒白雞矢白者二枚以餳和塗瘡上肘後骨疽不合骨從孔中出掘地作坑口小里大深三尺以乾雞屎二升同艾及荊葉搗碎入坑內燒令煙出以疽口就熏用衣擁之勿令泄氣半日當有蟲出甚效千金方陰毒腹痛雞糞烏豆地膚子各一把亂髮一團同炒煙起傾入好酒一碗浸之去滓熱服即止生生編小兒心痛白烏雞屎五錢曬研松脂五錢為末蔥頭汁和丸梧桐子大黃丹為衣每醋湯服五丸忌生冷硬物三四日立效嬰童百問雞子即雞卵也黃雌者為上烏雌者次之氣味甘平無毒思邈曰微寒畏醇醋鼎曰不宜多食令人腹中有聲動風氣和蔥蒜食之氣短同韭子食成風痛共鱉肉食損人共獺肉食成遁尸注藥不能治同兔肉食成泄痢歸厚曰妊婦以雞子鯉魚同食令兒生瘡同糯米食令兒生蟲時珍曰小兒患痘疹忌食雞子及聞煎食之氣令生翳膜主治除熱火灼爛瘡癇痓可作虎魄神物本經弘景曰用欲毈子黃白混雜者煮作之極相似惟不拾芥爾又煮白合銀口含須臾色如金也鎮心安五臟止驚安胎治妊娠天行熱疾狂走男子陰囊濕癢及開喉聲失音醋煮食之治赤白久痢及産後虛痢光粉同炒乾止疳痢及婦人陰瘡和豆淋酒服治賊風麻痹醋浸令壞敷疵䵟作酒止産後血暈暖水臟縮小便止耳鳴和蠟炒治耳鳴聾及疳痢日華益氣以濁水煮一枚連水服之主産後痢和蠟煎止小兒痢藏器大人及小兒發熱以白蜜一合和三顆攪服立瘥孟詵太平御覽云正旦吞烏雞子一枚可以練形岣嶁神書云八月晦日夜半面北吞烏雞子一枚有事可隱形發明時珍曰卵白象天其氣清其性微寒卵黃象地其氣渾其性溫卵則兼黃白而用之其性平精不足者補之以氣故卵白能清氣治伏熱目赤咽痛諸疾形不足者補之以味故卵黃能補血治下痢胎産諸疾卵則兼理氣血故治上列諸疾也附方舊九新二十二天行不解已汗者用新生雞子五枚傾盞中入水一雞子攪渾別以水一升煮沸投入雞子微攪才似熟則瀉置碗中納少醬清似變腥氣帶熱啜之覆令汗出愈許仁則方天行嘔逆食入即吐雞子一枚水煮三五沸冷水浸少頃吞之外臺傷寒發狂煩躁熱極吞生雞子一枚效食鑑三十六黃救急方用雞子一顆連殼燒灰研酢一合溫之頓服鼻中蟲出為效身體極黃者不過三枚神效外臺祕要白虎風病藏器曰取雞子揩病處咒願送糞堆頭上不過三次瘥白虎是糞神愛吃雞子也身面腫滿雞子黃白相和塗腫處干再上肘後方年深哮喘雞子略敲損浸尿缸中三四日煮食能去風痰集成心氣作痛雞子一枚打破醋二合調勻暖過頓服肘後小兒疳痢肚脹用雞子一個開孔入巴豆一粒去皮輕粉一錢用紙五十重裹於飯甑上蒸三度放冷去殼研入麝香少許糊和丸米粒大食後溫湯下二丸至三丸經驗方預解痘毒保和方用雞卵一枚活地龍一條入卵內飯上蒸熟去地龍與兒食每歲立春日食一枚終身不出痘也李氏用雞卵一枚童便浸七日水煮食之永不出痘李捷用頭生雞子三五枚浸廁坑內五七日取出煮熟與食數日再食一枚永不出痘徐都司得於浙人之方痘瘡赤瘢雞子一個酒醅浸七日白殭蠶二七枚搗末和勻揩赤塗之甚效聖惠雀卵面皰雞卵醋浸令壞取出敷之普濟妊娠時疾令胎不傷以雞子七枚納井中令冷取出打破吞之子母祕録病欲去胎雞子一枚入鹽三指撮服張文仲方胎動下血藏器曰雞子二枚打破以白粉和如稀粥頓食之子死腹中用三家雞卵各一枚三家鹽各一撮三家水各一升同煮令婦東向飲之立出千金方産後血多不止烏雞子三枚醋半升酒二升和攪煮取二升分四服拾遺産後心痛雞子煮酒食即安備急方産後口乾舌縮用雞子一枚打破水一盞攪服經驗後方婦人白帶用酒及艾葉煮雞卵日日食之袖珍方頭風白屑新下烏雞子三枚沸湯五升攪作三度沐之甚良集驗腋下狐臭雞子兩枚煮熟去殼熱夾待冷棄之三叉路口勿回顧如此三次效肘後方乳石發渴水浸雞子取清生服甚良普濟解野葛毒已死者以物開口後灌雞子三枚須臾吐出野葛乃蘇肘後方胡蔓草毒即斷腸草一葉入口百竅流血惟急取鳳凰胎即雞卵抱未成雛者已成者不用研爛和麻油灌之吐出毒物乃生少遲即死嶺南衛生方癰疽發背初作及經十日以上腫赤焮熱日夜疼痛百藥不效者用毈雞子一枚新狗屎如雞子大攪勻微火熬令稀稠得所捻作餅子於腫頭上貼之以帛包抹時時看視覺餅熱即易勿令轉動及歇氣經一宿定如日多者三日貼之一日一易至瘥乃止此方穢惡不可施之貴人一切諸方皆不能及但可備擇而已千金方蛛蠍蛇傷雞子一個輕敲小孔合之立瘥兵部手集蠼螋尿瘡同上法身體發熱不拘大人小兒用雞卵三枚白蜜一合和服立瘥普濟方卵白氣味甘微寒無毒主治目熱赤痛除心下伏熱止煩滿咳逆小兒下泄婦人産難胞衣不出並生吞之醋浸一宿療黃疸破大煩熱別録産後血閉不下取白一枚入醋一半攪服藏器和赤小豆末塗一切熱毒丹腫腮痛神效冬月以新生者酒漬之密封七日取出每夜塗面去䵟𪒟齄疱令人悅色時珍發明宗奭曰産後血暈身痙直口目向上牽急不知人取雞子一枚去殼分清以荊芥末二錢調服即安甚敏捷烏雞子尤善附方舊四新六時行發黃醋酒浸雞子一宿吞其白數枚肘後方下痢赤白生雞子一個取白攤連紙上日乾折作四重包肥烏梅十個安尉斗中以白炭燒存性取出碗覆冷定研末入水銀粉少許和勻大人分二服小兒三服空心井華水調下如覺微利不須再服類證蛔蟲攻心口吐清水以雞子一枚去黃納好漆入雞子殼中和合仰頭吞之蟲即出也古今録驗五種遁尸其狀腹脹氣急衝心或磊磈踴起或牽腰脊以雞卵白一枚頓吞之良千金咽塞鼻瘡及乾嘔頭痛食不下用雞子一枚開一竅去黃留白著米酢煻火頓沸取下更頓如此三次乘熱飲之不過一二度即愈廣濟方面生疱瘡雞子以三歲苦酒浸之三宿待軟取白塗之肘後湯火燒灼雞子清和酒調洗勤洗即易生肌忌發物或生敷之亦可經驗祕方頭髮垢䐈雞子白塗之少頃洗去光澤不燥瀕湖面黑令白雞子三枚酒浸密封四七日每夜以白敷面如雪白也普濟塗面駐顏雞子一枚開孔去黃留白入金華胭脂及硇砂少許紙封與雞抱之俟別卵抱出干以塗面洗之不落半年尚紅也普濟卵黃氣味甘溫無毒主治醋煮治産後虛及痢小兒發熱煎食除煩熱煉過治嘔逆和常山末為丸竹葉湯服治久瘧藥性炒取油和粉敷頭瘡日華猝乾嘔者生吞數枚良小便不通者亦生吞之數次效補陰血解熱毒治下痢甚驗時珍發明時珍曰雞子黃氣味俱厚陰中之陰故能補形昔人謂其與阿膠同功正此意也其治嘔逆諸瘡則取其除熱引蟲而已頌曰雞子入藥最多而發煎方特奇劉禹錫傳信方云亂髮雞子膏治孩子熱瘡用雞子五枚去白取黃亂髮如雞子大相和於鐵銚中炭火熬之初甚干少頃即發焦乃有液出旋取置碗中以液盡為度取塗瘡上即以苦參末粉之頃在武陵生子蓐內便有熱瘡塗諸藥無益而日益劇蔓延半身晝夜號啼不乳不睡因閲本草發髲條云合雞子黃煎之消為水療小兒驚熱下痢注云俗中嫗母為小兒作雞子煎用發雜熬之良久得汁與小兒服去痰熱主百病又雞子條云療火瘡因是用之果如神效也附方舊三新十一赤白下痢雞卵一枚取黃去白入胡粉滿殼燒存性以酒服一錢匕葛氏方妊娠下痢絞痛用烏雞子一枚開孔去白留黃入黃丹一錢在內厚紙裹定泥固煨乾為末每服三錢米飲下一服愈者是男兩服愈者是女三因方子死腹中雞子黃一枚薑汁一合和勻頓服當下普濟小腸疝氣雞子黃攪溫水服之三服效小兒癇疾雞子黃和乳汁攪服不過三兩枚自定普濟小兒頭瘡煮熟雞子黃炒令油出以麻油膩粉搽之事林廣記鼠瘻已潰雞卵一枚米下蒸半日取黃熬令黑先拭瘡令乾以藥納孔中三度即愈千金方腳上臭瘡熟雞子黃一個黃蠟一錢煎油塗之湯火傷瘡熟雞子十個取黃炒取油入膩粉十文攪勻用雞翎掃上三五日永除瘢痕集驗方杖瘡已破雞子黃熬油搽之甚效唐瑤經驗方天泡水瘡方同上消滅瘢痕雞子五七枚煮熟取黃炒黑拭塗日三久久自滅聖惠方妊娠胎漏血下不止血盡則子死用雞子黃十四枚以好酒二升煮如餳服之未瘥再作以瘥為度普濟方耳疳出汁雞子黃炒油塗之甚妙談野翁方抱出卵殼時珍曰俗名混沌池鳳凰蛻用抱出者取其蛻脫之義也李石續博物志云踏雞子殼令人生白癜風主治研末磨障翳日華傷寒勞復熬令黃黑為末熱湯和一合服取汗出即愈蘇頌出深師方燒灰油調塗癬及小兒頭身諸瘡酒服二錢治反胃時珍附方舊二新七小便不通雞子殼海蛤滑石等分為末每服半錢米飲下日三普濟方小兒煩滿欲死雞子殼燒末酒服方寸匕子母祕録癍痘入目雞子殼燒研入片腦少許點之鴻飛集頭瘡白禿雞子殼七個炒研油和敷之祕録頭上軟癤用抱出雞卵殼燒存性研末入輕粉少許清油調敷危氏方耳疳出膿用抱出雞卵殼炒黃為末油調灌之疼即止杏林摘要玉莖下疳雞卵殼炒研油調敷之同上外腎癰瘡抱出雞卵殼黃連輕粉等分為細末用煉過香油調塗醫林正宗痘瘡惡證癍痘倒陷毒氣壅遏於裡則為便血昏睡不醒其證甚惡用抱出雞子殼去膜新瓦焙研每服半錢熱湯調下嬰兒以酒調抹唇舌上並塗風池胸背神效卵殼中白皮主治久咳氣結得麻黃紫菀服立效別録發明時珍曰按仙傳外科云有人偶含刀在口割舌已垂未斷一人用雞子白皮袋之摻止血藥於舌根血止以蠟化蜜調沖和膏敷雞子皮上三日接住乃去皮只用蜜蠟勤敷七日全安若無速效以金槍藥參治之此用雞子白皮無他但取其柔軟而薄護舌而透藥也附方新二咳嗽日久雞子白皮炒十四枚麻黃三兩焙為末每服方寸匕食後飲下日二必效方風眼腫痛雞子白皮枸杞白皮等分為末吹鼻中一日三次聖濟總録雞白蠹肥脂本經弘景曰不知是何物恐別一種耳藏器曰今雞亦有白臺如卵而硬有白無黃云是牡雞所生名父公臺臺字似橐字疑傳誤也機曰此本經文列於黑雌雞條下似指雌雞之肥脂如蠹蟲之肥白因其似而名之也時珍曰蠹音妒而藏器以為橐何耶今牡雞生子亦時或有之然不當有肥脂字當以機說為近否則必雌雞之生腸也本經有其名不具其功蓋脫簡之文窠中草主治頭瘡白禿和白頭翁草燒灰豬脂調敷日華天絲入眼燒灰淋清汁洗之良時珍出不自祕方附方新一産後遺尿雞窠草燒末酒服一錢匕普濟方燖雞湯主治消渴飲水無度用燖雄雞水濾澄服之不過二雞之水愈神效楊氏經驗方附方新一雞眼作痛剝去皮以燖雞湯洗之簡便方雉別録中品釋名野雞宗奭曰雉飛若矢一往而墮故字從矢今人取其尾置舟車上欲其快速也漢呂太后名雉高祖改雉為野雞其實雞類也時珍曰黃氏韻會云雉理也雉有紋理也故尚書謂之華蟲曲禮謂之疏趾雉類甚多亦各以形色為辨耳禽經云雉介鳥也素質五采備曰翬雉青質五采備曰鷂雉朱黃曰鷩雉白曰鵫雉音罩玄曰海雉爾雅云鷂雉青質五采鳪雉黃色自呼翟雉山雉也長尾鷮雉長尾走且鳴秩秩海雉也梵書謂雉曰迦頻闍羅集解時珍曰雉南北皆有之形大如雞而斑色繡翼雄者紋採而尾長雌者紋暗而尾短其性好鬥其鳴曰鷕鷕音杳其交不再其卵褐色將卵時雌避其雄而潛伏之否則雄食其卵也月令季冬雉始雊謂陽動則雉鳴而勾其頸也孟冬雉入大水為蜃蜃大蛤也陸佃埤雅云蛇交雉則生蜃蜃蛟類也類書云蛇與雉交而生子曰蟂蟂水蟲也陸禋續水經云蛇雉遺卵於地千年而為蛟龍之屬似蛇四足能害人魯至剛俊靈機要云正月蛇與雉交生卵遇雷入土數丈為蛇形經二三百年成蛟飛騰若卵不入土仍為雉耳又任昉述異記云江淮中有獸名能音耐乃蛇精所化也冬則為雉春復為蛇晉時武庫有雉張華曰必蛇化也視之果得蛇蛻此皆異類同情造化之變易不可臆測者也肉氣味酸微寒無毒恭曰溫日華曰平微毒秋冬益春夏毒有痢人不可食頌曰周禮庖人供六禽雉是其一亦食品之貴然有小毒不可常食損多益少詵曰久食令人瘦九月至十二月稍有補他月則發五痔諸瘡疥不與胡桃同食發頭風眩暈及心痛與菌菌木耳同食發五痔立下血同蕎麥麵食生肥蟲卵同蔥食生寸白蟲自死爪甲不伸者殺人正誤思邈曰黃帝書云丙午日勿食雞雉肉丈夫燒死目盲女人血死妄見野雞肉同家雞子食成遁尸尸鬼纏身弘景曰雉非辰屬正是離禽丙午不可食明王於火也時珍曰雉屬離火雞屬巽木故雞煮則冠變雉煮則冠紅明其屬火也春夏不可食者為其食蟲蟻及與蛇交變化有毒也能發痔及瘡疥令人瘦病者為其能生蟲與雞肉同也有鄙人者假黃帝為書謂丙午日不可食及成遁尸之說乃不經謬談而陶氏和之孫氏取之皆誤矣今正其誤主治補中益氣力止泄痢除蟻瘻別録發明時珍曰雉肉諸家言其發痔下痢人不可食而別録用治痢瘻何邪蓋雉在禽上應胃土故能補中而又食蟲蟻故能治蟻瘻取其制伏耳若久食及食非其時則生蟲有毒故不宜也附方舊三新一脾虛下痢日夜不止野雞一隻如食法入橘皮蔥椒五味和作餛飩熟煮空心食之食醫心鏡産後下痢用野雞一隻作餛飩食之同上消渴飲水小便數用野雞一隻五味煮取三升以來汁飲之肉亦可食甚效同上心腹脹滿野雞一隻不拘雄雌茴香炒馬芹子炒川椒炒陳皮生薑等分用醋以一夜蒸餅和雉肉作餡料外以麵皮包作餛飩煮熟食仍早服嘉禾散辰服此午服導氣枳殼丸朱氏集驗方腦主治塗凍瘡時珍嘴主治蟻瘻孫思邈尾主治燒灰和麻油敷天火丹毒時珍屎主治久瘧時珍附方新一久瘧不止雄野雞屎熊膽五靈脂恆山等分為末醋糊丸黑豆大正發時冷水下一丸聖惠鸐雉音狄食療釋名鸐禽經山雞同上山雉時珍曰翟美羽貌雉居原野鸐居山林故得山名大者為鷮集解頌曰伊洛江淮間一種雉小而尾長者為山雞人多畜之樊中即爾雅所謂鸐山雉也時珍曰山雞有四種名同物異似雉而尾長三四尺者鸐雉也似鸐而尾長五六尺能走且鳴者鷮雉也俗通呼為鸐矣其二則鷩雉錦雞也鷮鸐皆勇健自愛其尾不入叢林雨雪則岩伏木棲不敢下食往往餓死故師曠云雪封枯原文禽多死南方隸人多插其尾於冠其肉皆美於雉傳云四足之美有麃兩足之美有鷮肉氣味甘平有小毒詵曰發五痔久食瘦人和蕎麥麵食生肥蟲同豉食害人卵同蔥食生寸白蟲余並同雉主治五臟氣喘不得息者作羹臛食孟詵炙食補中益氣時珍鷩雉敝鱉二音拾遺釋名山雞禽經錦雞同上金雞綱目採雞周書鵕䴊音峻儀時珍曰鷩性憋急耿介故名鵕䴊儀容俊秀也周有鷩冕漢有鵕䴊冠皆取其文明俊秀之義鷩與鸐同名山雞鸐大而鷩小鷩與鷊同名錦雞鷊紋在綬而鷩紋在身以此為異大抵皆雉屬也按禽經云首有采毛曰山雞腹有采色曰錦雞項有采囊曰避株是山雞錦雞又稍有分別而俗通呼為一矣蓋是一類不甚相遠也集解藏器曰鷩似雉五色山海經云小華之山多赤鷩養之禳火災是也時珍曰山雞出南越諸山中湖南湖北亦有之狀如小雞其冠亦小背有黃赤紋緑項紅腹紅嘴利距善鬥以家雞鬥之即可獲此乃爾雅所謂鷩山雞者也逸周書謂之採雞錦雞則小於鷩而背紋揚赤膺前五色炫耀如孔雀羽此乃爾雅所謂鶾天雞者也逸周書謂之文鶾音汗二種大抵同類而錦雞紋尤燦爛如錦或云錦雞乃其雄者亦通劉敬叔異苑云山雞愛其羽毛照水即舞目眩多死照鏡亦然與鸐雞愛尾餓死皆以紋纍其身者也肉氣味甘溫微毒主治食之令人聰慧汪穎養之禳火災藏器附録吐綬雞時珍曰出巴峽及閩廣山中人多畜玩大者如家雞小者如鴝鵒頭頰似雉羽色多黑雜以黃白圓點如真珠斑項有嗉囊內藏肉綬常時不見每春夏晴明則向日擺之頂上先出兩翠角二寸許乃徐舒其頷下之綬長闊近尺紅碧相間采色煥爛逾時悉斂不見或剖而視之一無所睹此鳥生亦反哺行則避草木故禽經謂之避株食物本草謂之吐錦雞古今注謂之錦囊蔡氏詩話謂之真珠雞倦遊録謂之孝鳥詩經謂之鷊音厄邛有旨鷊是矣鶡雞曷渴二音拾遺釋名時珍曰其羽色黑黃而褐故曰鶡青黑色者名曰䲸音介性耿介也青鳳亦名鶡取象於此也集解藏器曰鶡雞出上黨魏武帝賦云鶡雞猛氣其鬥期於必死今人以鶡為冠象此也時珍曰鶡狀類雉而大黃黑色首有毛角如冠性愛其黨有被侵者直往赴鬥雖死猶不置故古者虎賁戴鶡冠禽經云鶡毅鳥也毅不知死是矣性復粗暴每有所攫應手摧碎上黨即今潞州肉氣味甘平無毒主治炙食令人勇健藏器炙食令人肥潤汪穎白鷳圖經校正原附雉條今分出釋名白雗音寒閒客時珍曰按張華云行止閒暇故曰鷳李昉命為閒客薛氏以為雉類汪氏以為白雉按爾雅白雉名雗南人呼閒字如寒則鷳即雗音之轉也當作白雗如錦雞謂之文雗也雗者羽美之貌又西京雜記云南粵王獻白鷳黑鷳各一蓋雉亦有黑色者名鸕雉彼通呼為雗矣集解頌曰白鷳出江南雉類也白色而背有細黑紋可畜彼人亦食之穎曰即白雉也時珍曰鷳似山雞而色白有黑紋如漣漪尾長三四尺體備冠距紅頰赤嘴丹爪其性耿介李太白言其卵可以雞伏亦有黑鷳肉氣味甘平無毒主治補中解毒汪穎鷓鴣唐本草釋名越雉時珍曰按禽經云隨陽越雉也飛必南翥晉安曰懷南江左曰逐影張華注云鷓鴣其名自呼飛必南向雖東西回翔開翅之始必先南翥其志懷南不徂北也集解孔志約曰鷓鴣生江南行似母雞鳴云鉤輈格磔者是有鳥相似不作此鳴者則非矣頌曰今江西閩廣蜀夔州郡皆有之形似母雞頭如鶉臆前有白圓點如真珠背毛有紫赤浪紋時珍曰鷓鴣性畏霜露早晚稀出夜棲以木葉蔽身多對啼今俗謂其鳴曰行不得哥也其性好潔獵人因以𥻿竿黏之或用媒誘取南人專以炙食充庖云肉白而脆味勝雞雉肉氣味甘溫無毒日華曰微毒詵曰不可與竹筍同食令人小腹脹自死者不可食或言此鳥天地之神每月取一隻饗至尊所以自死者不可食主治嶺南野葛菌子毒生金毒及溫瘴久欲死不可瘥者合毛熬酒漬服之或生搗取汁服最良唐本酒服主蠱氣欲死日華能補五臟益心力聰明孟詵發明時珍曰按南唐書云丞相馮延已苦腦痛不已太醫吳廷紹曰公多食山雞鷓鴣其毒發也投以甘豆湯而愈此物多食烏頭半夏苗故以此解其毒爾又類說云楊立之通判廣州歸楚州因多食鷓鴣遂病咽喉間生癰潰而膿血不止寢食俱廢醫者束手適楊吉老赴郡邀診之曰但先啖生薑片一斤乃可投藥初食覺甘香至半斤覺稍寬盡一斤始覺辛辣粥食入口了無滯礙此鳥好啖半夏久而毒發耳故以薑製之也觀此二說則鷓鴣多食亦有微毒矣而其功用又能解毒解蠱功過不相掩也凡鳥獸自死者皆有毒不可食為其受厲氣也何獨鷓鴣即神取饗帝乎鄙哉其言也脂膏主治塗手皸瘃令不龜裂蘇頌竹雞拾遺釋名山菌子藏器雞頭鶻蘇東坡集泥滑滑穎曰山菌子即竹雞也時珍曰菌子言味美如菌也蜀人呼為雞頭鶻南人呼為泥滑滑因其聲也集解藏器曰山菌子生江東山林間狀如小雞無尾時珍曰竹雞今江南川廣處處有之多居竹林形比鷓鴣差小褐色多斑赤紋其性好啼見其儔必鬥捕者以媒誘其鬥因而網之諺云家有竹雞啼白蟻化為泥蓋好食蟻也亦闢壁蝨肉氣味甘平無毒時珍曰按唐小說云崔魏公暴亡太醫梁新診之曰中食毒也僕曰好食竹雞新曰竹雞多食半夏苗蓋其毒也命搗生薑汁折齒灌之遂蘇則吳廷紹楊吉老之治鷓毒蓋祖乎此主治野雞病殺蟲煮炙食之藏器附録杉雞時珍曰按臨海異物志云閩越有杉雞常居杉樹下頭上有長黃毛冠頰正青色如垂緌亦可食如竹雞英雞拾遺集解藏器曰英雞出澤州有石英處常食碎石英狀如雉而短尾體熱無毛腹下毛赤飛翔不遠腸中常有石英人食之取英之功也今人以石英末飼雞取卵食終不及此肉氣味甘溫無毒主治益陽道補虛損令人肥健悅澤能食不患冷常有實氣而不發也藏器秧雞食物集解時珍曰秧雞大如小雞白頰長嘴短尾背有白斑多居田澤畔夏至後夜鳴達旦秋後即止一種䳾音鄧雞亦秧雞之類也大如雞而長腳紅冠雄者大而色褐雌者稍小而色斑秋月即無其聲甚大人並食之肉氣味甘溫無毒主冶蟻瘻汪穎鶉嘉祐釋名時珍曰鶉性淳竄伏淺草無常居而有常匹隨地而安莊子所謂聖人鶉居是矣其行遇小草即旋避之亦可謂淳矣其子曰鳼宗奭曰其卵初生謂之羅鶉至秋初謂之早秋中秋已後謂之白唐一物四名也集解禹錫曰鶉蛤蟆所化也慎微曰楊億談苑云至道二年夏秋間汴人鬻鶉者車載積市皆蛙所化猶有未全變者列子所謂蛙變為鶉也宗奭曰鶉有雌雄常于田野屢得其卵何得言化也時珍曰鶉大如雞雛頭細而無尾毛有斑點甚肥雄者足高雌者足卑其性畏寒其在田野夜則群飛晝則草伏人能以聲呼取之畜令鬥摶萬畢術云蛤蟆得瓜化為鶉交州記云南海有黃魚九月變為鶉以鹽炙食甚肥美蓋鶉始化成終以卵生故四時常有之鴽則始由鼠化終復為鼠故夏有冬無肉氣味甘平無毒禹錫曰四月以前未堪食不可合豬肝食令人生黑子合菌子食令人發痔主治補五臟益中續氣實筋骨耐寒暑消結熱和小豆生薑煮食止泄痢酥煎食令人下焦肥嘉祐小兒患疳及下痢五色旦旦食之有效寇宗奭發明時珍曰按董炳集驗方云魏秀才妻病腹大如鼓四肢骨立不能貼席惟衣被懸臥穀食不下者數日矣忽思鶉食如法進之遂運劇少頃雨汗莫能言但有更衣狀扶而圊小便突出白液凝如鵝脂如此數次下盡遂起此蓋中焦濕熱積久所致也詳本草鶉解熱結療小兒疳亦理固然也董氏所說如此時珍謹按鶉乃蛙化氣性相同蛙與蛤蟆皆解熱治疳利水消腫則鶉之消鼓脹蓋亦同功云鷃拾遺釋名鵪一作䳺鸋音寧鴽音如鳸時珍曰鷃不木處可謂安寧自如矣莊子所謂騰躍不過數仞下翔蓬蒿之間者也張華注禽經謂之籬鷃即此鵪則鷃音之轉也青州謂之鴾母亦曰鷃雀又鳸有九種此其一也集解藏器曰鷃是小鳥鶉類也一名鴽鄭玄注禮記雉兔鶉鷃以鷃為鴽人多食之時珍曰鷃候鳥也常晨鳴如雞趨民收麥行者以為候易通卦驗云立春雨水鶉鵪鳴是矣鵪與鶉兩物也形狀相似俱黑色但無斑者為鵪也今人總以鵪鶉名之按夏小正云三月田鼠化為鴽八月鴽化為田鼠注云鵪也爾雅云鶉子鳼鴽子鸋注云鵪鶉屬也鴽鵪也禮記云鶉羹鴽釀之以蓼注云鴽小不可為羹以酒蓼釀之蒸煮食也據數說則鶉與鵪為兩物明矣因其俱在田野而形狀倣佛故不知別之則夫鶉也始由蛤蟆海魚所化終即自卵生故有斑而四時常有焉鷃也始由鼠化終復為鼠故無斑而夏有冬無焉本原既殊性療當別何可混邪肉氣味甘平無毒主治諸瘡陰䘌煮食去熱時珍鷸音述拾遺集解藏器曰鷸如鶉色蒼嘴長在泥塗間作鷸鷸聲村民云田雞所化亦鵪鶉類也蘇秦所謂鷸蚌相持者即此時珍曰說文云鷸知天將雨則鳴故知天文者冠鷸今田野間有小鳥未雨則啼者是矣與翡翠同名而物異肉氣味甘溫無毒主治補虛甚暖人藏器鴿宋嘉祐釋名鵓鴿食療飛奴時珍曰鴿性淫而易合故名鵓者其聲也張九齡以鴿傳書目為飛奴梵書名迦布德迦集解宗奭曰鴿之毛色於禽中品第最多惟白鴿入藥凡鳥皆雄乘雌此獨雌乘雄故其性最淫時珍曰處處人家畜之亦有野鴿名品雖多大要毛羽不過青白皂緑鵲斑數色眼目有大小黃赤緑色而已亦與鳩為匹偶白鴿肉氣味咸平無毒詵曰暖主治解諸藥毒及人馬久患疥食之立愈嘉祐調精益氣治惡瘡疥癬風瘙白癜癧瘍風炒熟酒服雖益人食多恐減藥力孟詵附方舊一新一消渴飲水不知足用白花鴿一隻切作小片以土蘇煎含咽心鏡預解痘毒每至除夜以白鴿煮炙飼兒仍以毛煎湯浴之則出痘稀少血主治解諸藥百蠱毒時珍出事林廣記卵主治解瘡毒痘毒時珍附方新一預解痘毒小兒食之永不出痘或出亦稀用白鴿卵一對入竹筒封置廁中半月取出以卵白和辰砂三錢丸緑豆大每服三十丸三豆飲下毒從大小便出也潛江方屎名左盤龍時珍曰野鴿者尤良其屎皆左盤故宣明方謂之左盤龍也氣味辛溫微毒主治人馬疥瘡炒研敷之驢馬和草飼之嘉祐消腫及腹中痞塊汪穎消瘰癧諸瘡療破傷風及陰毒垂死者殺蟲時珍附方舊四新六帶下排膿宗奭曰野鴿糞一兩炒微焦白朮麝香各一分赤芍藥青木香各半兩延胡索炒赤一兩柴胡三分為末溫無灰酒空心調服一錢候膿盡即止後服補子臟藥破傷中風病傳入里用左蟠龍即野鴿糞江鰾白殭蠶各炒半錢雄黃一錢為末蒸餅丸梧桐子大每服十五丸溫酒下取效保命集陰症腹痛面青甚者鴿子糞一大炒研末極熱酒一鍾和勻澄清頓服即愈劉氏蠱毒腹痛白鴿屎燒研飲和服之外臺冷氣心痛鴿屎燒存性酒服一錢即止項上瘰癧左盤龍炒研末陳米飯和丸梧桐子大每服三五十丸陳米飲下張子和方頭癢生瘡白鴿屎五合醋煮三沸杵敷之日三上聖惠頭瘡白禿鴿屎研末敷之先以醋米泔洗淨亦可燒研摻之同上反花瘡毒初生惡肉如米粒破之血出肉隨生反出於外用鵓鴿屎三兩炒黃為末先以溫漿水洗後敷之聖惠方鵝掌風鴿屎白雄雞屎炒研煎水日洗突厥雀拾遺釋名鵽鳩音奪寇雉藏器曰雀從北來當有賊下邊人候之故名時珍曰案唐書云高宗時突厥犯塞始虜未叛有鳴鵽群飛入塞邊人驚曰此鳥一名突厥雀南飛則突厥必入寇已而果然案此即爾雅鵽鳩寇雉也然則奪寇之義亦由此矣集解藏器曰突厥雀生塞北狀如雀而身赤時珍曰案郭璞云鵽鳩生北方沙漠地大如鴿形似雌雉鼠腳無後趾歧尾為鳥憨急群飛張華云鵽生關西飛則雌前雄後隨其行止莊周云青鵽愛其子而忘其母肉氣味甘熱無毒主治補虛暖中藏器雀別録中品釋名瓦雀賓雀時珍曰雀短尾小鳥也故字從小從佳佳音錐鳥之短尾也棲宿檐瓦之間馴近階除之際如賓客然故曰瓦雀賓雀又謂之嘉賓也俗呼老而斑者為麻雀小而黃口者為黃雀集解時珍曰雀處處有之羽毛斑褐頷嘴皆黑頭如顆蒜目如擘椒尾長二寸許爪距黃白色躍而不步其視驚瞿其目夜盲其卵有斑其性最淫小者名黃雀八九月群飛田間體絶肥背有脂如披綿性味皆同可以炙食作鮓甚美案逸周書云季秋雀入大水為蛤雀不入水國多淫泆又臨海異物志云南海有黃雀魚常以六月化為黃雀十月入海為魚則所謂雀化蛤者蓋此類若家雀則未常變化也又有白雀緯書以為瑞應所感肉氣味甘溫無毒弘景曰雀肉不可合李食不可合醬食妊婦食雀肉飲酒令子多淫食雀肉豆醬令子面䵟凡服白朮人忌之主治冬三月食之起陽道令人有子藏器壯陽益氣暖腰膝縮小便治血崩帶下日華益精髓續五臟不足氣宜常食之不可停輟孟詵發明宗奭曰正月以前十月以後宜食之取其陰陽靜定未泄也故卵亦取第一番者頌曰今人取雀肉和蛇床子熬膏和藥丸服補下有效謂之驛馬丸此法起於唐世云明皇服之有驗時珍曰聖濟總録治虛寒雀附丸用肥雀肉三四十枚同附子熬膏丸藥亦祖此意也附方新六補益老人治老人臟腑虛損羸瘦陽氣乏弱雀兒五隻如常治粟米一合蔥白三莖先炒雀熟入酒一合煮少時入水二盞半下蔥米作粥食食治方心氣勞傷朱雀湯治心氣勞傷因變諸疾用雄雀一隻取肉炙赤小豆一合人參赤茯苓大棗肉紫石英小麥各一兩紫菀遠志肉丹參各半兩甘草炙二錢半細銼拌勻每服三錢用水一盞煎六分去滓食遠溫服奇效方腎冷偏墜疝氣用生雀三枚燎毛去腸勿洗以舶上茴香三錢胡椒一錢縮砂桂肉各二錢入肚內濕紙裹煨熟空心食之酒下良直指方小腸疝氣用帶毛雀兒一枚去腸入金絲礬末五錢縫合以桑柴火煨成炭為末空心無灰酒服年深者二服愈瑞竹堂方赤白痢下臘月取雀兒去腸肚皮毛以巴豆仁一枚入肚內瓶固濟煅存性研末以好酒煮黃蠟百沸取蠟和丸梧桐子大每服一二十丸紅痢甘草湯下白痢乾薑湯下普濟方內外目障治目昏生翳遠視似有黑花及內障不見物用雀兒十個去毛翅足嘴連腸胃骨肉研爛磁石煅醋淬七次水飛神麯炒青鹽肉蓯蓉酒浸炙各一兩菟絲子酒浸三日曬三兩為末以酒二升少入煉蜜同雀鹽研膏和丸梧桐子大每溫酒下二十丸日二服聖惠方雀卵氣味酸溫無毒五月取之主治下氣男子陰痿不起強之令熱多精有子別録和天雄菟絲子末為丸空心酒下五丸治男子陰痿不起女子帶下便溺不利除疝瘕孟詵發明弘景曰雀利陰陽故卵亦然術云雀卵和天雄服之令莖不衰頌曰按素問云胸脅支滿者妨於食病至則先聞臊臭出清液先唾血四肢清目眩時時前後血病名血枯得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來治之以烏鰂魚骨藘茹二物併合之丸以雀卵大如小豆以五丸為後飯飲鮑魚汁以利腸中及傷肝也飲後藥先為後飯本草三藥並不治血枯而經法用之是攻其所生所起耳時珍曰今人知雀卵能益男子陽虛不知能治女子血枯蓋雀卵益精血耳肝主治腎虛陽弱聖惠四雄丸用之頭血主治雀盲別録弘景曰雀盲乃人患黃昏時無所見如雀目夜盲也日二取血點之腦氣味平主治綿裹塞耳治聾又塗凍瘡孟詵時珍曰按張子和方臘月雀腦燒灰油調塗之亦可喙及腳脛骨主治小兒乳癖每用一具煮汁服或燒灰米飲調服時珍雄雀屎一名白丁香俗名青丹拾遺雀蘇炮炙論修治日華曰凡鳥右翼掩左者是雄其屎頭尖挺直斆曰凡使勿用雀兒糞雀兒口黃未經淫者也其雀蘇底坐尖在上是雄兩頭圓者是雌陰人使雄陽人使雌臘月採得去兩畔附著者鉢中研細以甘草水浸一夜去水焙乾用時珍曰別録只用雄雀屎雌雄分用則出自雷氏也氣味苦溫微毒主治療目痛決癰癤女子帶下溺不利除疝瘕別録療齲齒陶弘景和首生男子乳點目中胬肉赤脈貫瞳子者即消神效和蜜丸服治癥瘕久痼冷病和少乾薑服之大肥悅人蘇恭癰苦不潰者點塗即潰急黃欲死者湯化服之立蘇腹中痃癖諸塊伏梁者和乾薑桂心艾葉為丸服之能令消爛藏器和天雄乾薑丸服能強陰孟詵消積除脹通咽塞口噤女人乳腫瘡瘍中風風蟲牙痛時珍發明時珍曰雀食諸谷易致消化故所治疝瘕積脹痃癖及目翳胬肉癰疽瘡癤咽噤齒齲諸症皆取其能消爛之義也附方舊六新八霍亂不通脹悶欲死因傷飽取涼者用雄雀糞二十一粒炒研末溫酒半盞調服未效再服總録目中翳膜治目熱生赤白膜以雄雀屎和人乳點上自爛肘後方風蟲牙痛雄雀屎綿裹塞孔中日二易之效外臺咽喉噤塞雄雀屎末溫水灌半錢外臺小兒口噤中風用雀屎水丸麻子大飲下二丸即愈千金方小兒不乳用雀屎四枚末之著乳上與吮總微小兒痘黶白丁香末入麝少許米飲服一錢保幼大全婦人吹乳獨勝散白丁香半兩為末以溫酒服一錢簡要濟衆破傷風瘡作白痂無血者殺人最急以雄雀糞直者研末熱酒服半錢普濟破決癰癤諸癰已成膿懼針者取雀屎塗瘡頭即易決梅師方瘭瘡作痛用雀屎燕窠土研敷之直指浸淫瘡癬洗淨以雀屎醬瓣和研日塗之千金翼喉痹乳蛾白丁香二十個以沙糖和作三丸每以一丸綿裹含咽即時遂愈甚者不過兩丸極有奇效普濟方面瘡酒刺白丁香十粒蜜一兩浸早夜點久久自去普濟方蒿雀拾遺集解藏器曰蒿雀似雀青黑色在蒿間塞外彌多食之美於諸雀肉氣味甘溫無毒主治食之益陽道補精髓藏器腦主治塗凍瘡手足不皸藏器巧婦鳥拾遺釋名鷦鷯詩疏桃蟲詩經蒙鳩荀子女匠方言黃脰雀俗時珍曰按爾雅云桃蟲鷦其雌曰鴱揚雄方言云桑飛自關而東謂之巧雀或謂之女匠自關而西謂之襪雀或謂之巧女燕人謂之巧婦江東謂之桃雀亦曰布母鳩性拙鷦性巧故得諸名集解藏器曰巧婦小於雀在林藪間為窠窠如小袋時珍曰鷦鷯處處有之生蒿木之間居藩籬之上狀似黃雀而小灰色有斑聲如吹噓喙如利錐取茅葦毛毳而窠大如雞卵而系之以麻發至為精密懸於樹上或一房二房故曰巢林不過一枝每食不過數粒小人畜馴教其作戲也又一種鳭鷯爾雅謂之剖葦似雀而青灰斑色長尾好食葦蠹亦鷦類也肉氣味甘溫無毒主治炙食甚美令人聰明汪穎窠主治燒煙燻手令婦人巧蠶藏器治膈氣噎疾以一枚燒灰酒服或一服三錢神驗時珍出衛生易簡方燕別録中品釋名乙鳥說文玄鳥禮記鷙鳥古今注鷾鴯莊子遊波炮炙論天女易占時珍曰燕字篆文象形乙者其鳴自呼也玄其色也鷹鷂食之則死能制海東青鶻故有鷙鳥之稱能興波祈雨故有遊波之號雷斆云海竭江枯投遊波而立泛是矣京房云人見白燕主生貴女故燕名天女集解別録曰燕生高山平谷弘景曰燕有兩種紫胸輕小者是越燕不入藥用胸斑黑而聲大者是胡燕可入藥用胡燕作窠喜長能容一匹絹者令人家富也若窠戶北向而尾屈色白者是數百歲燕仙經謂之肉芝食之延年時珍曰燕大如雀而身長銜口豐頷布翅歧尾背飛向宿營巢避戊己日春社來秋社去其來也銜泥巢於屋宇之下其去也伏氣蟄於窟穴之中或謂其渡海者謬談也玄鳥至時祈高禖可以求嗣或以為吞燕卵而生子者怪說也或云燕蟄於井底燕不入屋井虛也燕巢有艾則不居凡狐貉皮毛見燕則毛脫物理使然肉氣味酸平有毒弘景曰燕肉不可食損人神氣入水為蛟龍所吞亦不宜殺之時珍曰淮南子言燕入水為蜃蛤故高誘注謂蛟龍嗜燕人食燕者不可入水而祈禱家用燕召龍竊謂燕乃蟄而不化者化蛤之說未審然否但燕肉既有毒自不必食之主治出痔蟲瘡蟲別録胡燕卵黃主治卒水浮腫每吞十枚別録秦燕毛主治解諸藥毒取二七枚燒灰水服時珍屎氣味辛平有毒主治蠱毒鬼疰逐不祥邪氣破五癃利小便本經熬香用之思邈頌曰胡洽治疰病青羊脂丸中用之療痔殺蟲去目翳蘇恭治口瘡瘧疾孫思邈作湯浴小兒驚癇弘景附方舊三新三解蠱毒藏器曰取燕屎三合炒獨蒜去皮十枚和搗丸梧桐子大每服三丸蠱當隨利而出厭瘧疾藏器曰燕屎方寸匕發日平旦和酒一升令病人兩手捧住吸氣慎勿入口害人下石淋用燕屎末以冷水服五錢旦服至食時當尿石水下葛氏方通小便用燕屎豆豉各一合糊丸梧桐子大每白湯下三丸日三服千金止牙痛用燕子屎丸梧桐子大於疼處咬之丸化即疼止袖珍小兒猝驚似有痛處而不知用燕窠中糞煎湯洗浴之救急方窠中土見土部燕蓐草即窠草見草部之九石燕日華釋名土燕綱目集解詵曰石燕在乳穴石洞中者冬月採之堪食余月只可治病炳曰石燕似蝙蝠口方食石乳汁時珍曰此非石部之石燕也廣志云燕有三種此則土燕乳於巖穴者是矣肉氣味甘暖無毒主治壯陽暖腰膝添精補髓益氣潤皮膚縮小便御風寒嵐瘴溫疫氣日華詵曰治法取石燕二七枚和五味炒熟以酒一斗浸三日每夜臥時飲一二盞甚能補益令人健力能食伏翼本經中品校正時珍曰本經中品有伏翼條又有天鼠屎今依李當之本草合而為一釋名蝙蝠音編福天鼠本經仙鼠唐本飛鼠宋本夜燕恭曰伏翼者以其晝伏有翼也時珍曰伏翼爾雅作服翼齊人呼為仙鼠仙經列為肉芝集解別録曰伏翼生太山川穀及人家屋間立夏後採陰乾天鼠屎生合浦山谷十一月十二月採弘景曰伏翼非白色倒懸者不可服恭曰伏翼即仙鼠也在山孔中食諸乳石精汁皆千歲純白如雪頭上有冠大如鳩鵲陰乾服之令人肥健長生壽千歲其大如鶉未白者已百歲而並倒懸其腦重也其屎皆白色入藥當用此屎頌曰恭說乃仙經所謂肉芝者然今蝙蝠多生古屋中白而大者蓋稀其屎亦有白色料其出乳石孔者當應如此耳宗奭曰伏翼白日亦能飛但畏鷙鳥不敢出耳此物善服氣故能壽冬月不食可知矣時珍曰伏翼形似鼠灰黑色有薄肉翅連合四足及尾如一夏出冬蟄日伏夜飛食蚊蚋自能生育或云鼉蝨化蝠鼠亦化蝠蝠又化魁蛤恐不盡然生乳穴者甚大或云燕避戊己蝠伏庚申此理之不可曉者也若夫白色者自有此種爾仙經以為千百歲服之令人不死者乃方士誑言也陶氏蘇氏從而信之迂矣按李石續博物志云唐陳子真得白蝙蝠大如鴉服之一夕大泄而死又宋劉亮得白蝙蝠白蟾蜍合仙丹服之立死嗚呼書此足以破惑矣其說始載於抱朴子書葛洪誤世之罪通乎天下又唐書云吐番有天鼠狀如雀鼠其大如貓皮可為裘此則別是一種鼠非此天鼠也伏翼修治斆曰凡使要重一斤者先拭去肉上毛及去爪腸留肉翅並嘴腳以好酒浸一宿取出以黃精自然汁五兩塗炙至盡炙乾用時珍曰近世用者多煅存性耳氣味咸平無毒甄權曰微熱有毒之才曰莧實雲實為之使主治目瞑癢痛明目夜視有精光久服令人喜樂媚好無憂本經日華曰久服解愁療五淋利水道別録主女人生子余疾帶下病無子蘇恭治久咳上氣久瘧瘰癧金瘡內漏小兒鬾病驚風時珍藏器曰五月五日取倒懸者曬乾和桂心薰陸香燒煙闢蚊子夜明砂鱉甲為末燒煙亦闢蚊發明時珍曰蝙蝠性能瀉人故陳子真等服之皆致死觀後治金瘡方皆致下利其毒可知本經謂其無毒久服喜樂無憂日華云久服解愁者皆誤後世之言適足以增憂益愁而已治病可也服食不可也附方舊二新九仙乳丸治上焦熱晝常好瞑用伏翼五兩重一枚連腸胃炙燥雲實微炒五兩威靈仙三兩牽牛炒莧實各二兩丹砂雌黃鉛丹各一兩膩粉半兩為末蜜丸緑豆大每服七丸食後木通湯下以知為度普濟久咳上氣十年二十年諸藥不效用蝙蝠除翅足燒焦研末米飲服之百一方久瘧不止範汪方用蝙蝠七個去頭翅足搗千下丸梧桐子大每服一丸清湯下雞鳴時一丸禺中一丸久瘧不止伏翼丸用蝙蝠一枚炙蛇蛻皮一條燒蜘蛛五枚去足研如膏鱉甲一枚醋炙麝香半兩為末五月五日午時研勻以蜘蛛膏入煉蜜和丸麻子大每溫酒下五丸聖惠方小兒驚癇用入蟄蝙蝠一個入成塊硃砂三錢在腹內以新瓦合煅存性候冷為末空心分四服兒小分五服白湯下醫學集成小兒慢驚返魂丹治小兒慢驚及天吊夜啼用蝙蝠一枚去腸翅炙黃焦人中白乾蠍焙麝香各一分為末煉蜜丸緑豆大每服乳汁下三丸聖惠方多年瘰癧不愈神效方用蝙蝠一個貓頭一個俱撒上黑豆燒至骨化為末摻之干即油調敷內服連翹湯集要金瘡出血不止成內漏用蝙蝠二枚燒末水服方寸匕當下水而血消也鬼遺方腋下狐臭用蝙蝠一個以赤石脂末半兩塗遍黃泥包固曬乾煅存性以田螺水調塗腋下待毒氣上衝急服下藥行一二次妙乾坤祕韞乾血氣痛蝙蝠一個燒存性每酒服一錢即愈生生編婦人斷産蝙蝠一個燒研以五朝酒浮調下摘玄方腦主治塗面去女子面皰服之令人不忘蘇恭血及膽主治滴目令人不睡夜中見物藏器弘景曰伏翼目及膽術家用為洞視法天鼠屎本經釋名鼠法本經石肝同上夜明砂日華黑砂星弘景曰方家不用俗不識也李當之曰即伏翼屎也方言名天鼠爾修治時珍曰凡採得以水淘去灰土惡氣取細砂曬乾焙用其砂乃蚊蚋眼也氣味辛寒無毒之才曰惡白蘞白薇主治面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸本經去面上黑皯別録燒灰酒服方寸匕下死胎蘇恭炒服治瘰癧日華治馬撲損痛以三枚投熱酒一升取清服立止數服便瘥蘇頌出續傳信方熬搗為末拌飯與一歲至兩歲小兒食之治無辜病甚驗慎微治疳有效宗奭治目盲障翳明目除瘧時珍發明時珍曰夜明砂及蝙蝠皆厥陰肝經血分藥也能活血消積故所治目翳盲障瘧鬾疳驚淋帶瘰癧癰腫皆厥陰之病也按類說云定海徐道亨患赤眼食蟹遂成內障五年忽夢一僧以藥水洗之令服羊肝丸求其方僧曰用洗淨夜明砂當歸蟬蛻木賊去節各一兩為末黑羊肝四兩水煮爛和丸梧桐子大食後熟水下五十丸如法服之遂復明也附方舊一新十三內外障翳夜明砂末化入豬肝內煮食飲汁效直指方青盲不見夜明砂糯米炒黃一兩柏葉微炙一兩為末牛膽汁和丸梧桐子大每夜臥時竹葉湯下二十丸至五更米飲下二十丸瘥乃止聖惠小兒雀目夜明砂一兩微炒細研豬膽汁和丸緑豆大每米飲下五丸一方加黃芩等分為末米泔煮豬肝取汁調服半錢並聖惠五瘧不止簡要濟衆用夜明砂末每冷茶服一錢立效聖惠治瘧發作無時經久不瘥用蝙蝠糞五十粒硃砂半兩麝香一錢為末糯米飯丸小豆大未發時白湯下十丸胎前瘧疾夜明砂末三錢空心溫酒服經驗祕方咳嗽不止蝙蝠去翅足燒焦為末一錢食後白湯下壽域神方小兒鬾病以紅紗袋盛夜明砂佩之直指方一切疳毒夜明砂五錢入瓦瓶內以精豬肉三兩薄切入瓶內水煮熟了午前以肉與兒食飲其汁取下腹中胎毒次用生薑四兩和皮切炒同黃連末一兩煮麵糊丸黍米大食前米飲服日三次全幼心鑑聤耳出汁夜明砂二錢麝香一字為末拭淨摻之聖濟潰腫排膿夜明砂一兩桂半兩乳香一分為末入干砂糖半兩井水調敷直指方腋下狐臭夜明砂末豉汁調敷同上風蚛牙痛夜明砂炒吳茱萸湯泡炒等分為末蟾酥和丸麻子大綿裹二丸含之吐涎普濟方鸓鼠纍壘二音本經下品校正鼺鼠原在獸部今據爾雅說文移入禽部釋名鼺鼠本經鼯鼠爾雅耳鼠山海經夷由爾雅鵜禽經飛生鳥弘景時珍曰案許慎說文云鸓鼠形飛走且乳之鳥也故字從鳥又名飛生本經從鼠以形似也此物肉翅連尾飛不能上易至礧墜故謂之鸓俗謂癡物為鸓義取乎此亦名鼯鼠與螻蛄同名集解別録曰鼺鼠生山都平谷弘景曰此鼠即鼯鼠飛生鳥也狀如蝙蝠大如鴟鳶毛紫色暗夜行飛生人取其皮毛與産婦持之令兒易生頌曰今湖嶺山中多有之南人見之多以為怪宗奭曰關西山中甚有毛極密但向下飛不能致遠人捕取皮為暖帽時珍曰案郭氏注爾雅云鼯鼠狀如小狐似蝙蝠肉翅四足翅尾項脅毛皆紫赤色背上蒼艾色腹下黃色喙頷雜白色腳短爪長尾長三尺許飛而乳子子即隨母后聲如人呼食火煙能從高赴下不能從下上高性喜夜鳴山海經云耳鼠狀如鼠兔首麋身以其尾飛食之不䐆可御百毒即此也其形翅聯四足及尾與蝠同故曰以尾飛生嶺南者好食龍眼氣味微溫有毒主治墮胎令易産本經發明頌曰人取其皮毛與産婦臨蓐時持之令兒易生而小品方乃入服藥用飛生一枚槐子故弩箭羽各十四枚合搗丸梧桐子大以酒服二丸即易産也時珍曰鸓能飛而且産故寢其皮懷其爪皆能催生其性相感也濟生方治難産金液丸用其腹下毛為丸服之寒號蟲宋開寶校正自蟲部移入此釋名鶡鴠獨舂屎名五靈脂時珍曰楊氏丹鉛録謂寒號蟲即鶡鴠今從之鶡鴠詩作盍旦禮作曷旦說文作䳚鴠廣志作侃旦唐詩作渴旦皆隨義借名耳揚雄方言云鶡鴠自關而西謂之鶡鴠自關而東謂之城旦亦曰倒懸周魏宋楚謂之獨舂郭璞云鶡鴠夜鳴求旦之鳥夏月毛盛冬月裸體晝夜鳴叫故曰寒號曰鶡旦古刑有城旦舂謂晝夜舂米也故又有城旦獨舂之名月令云仲冬曷旦不鳴蓋冬至陽生漸暖故也其屎名五靈脂者謂狀如凝脂而受五行之靈氣也集解志曰五靈脂出北地寒號蟲糞也禹錫曰寒號蟲四足有肉翅不能遠飛頌曰今惟河東州郡有之五靈脂色黑如鐵採無時時珍曰曷旦乃候時之鳥也五臺諸山甚多其狀如小雞四足有肉翅夏月毛採五色自鳴若曰鳳凰不如我至冬毛落如鳥雛忍寒而號曰得過且過其屎恆集一處氣甚臊惡粒大如豆採之有如糊者有黏塊如糖者人亦以沙石雜而貨之凡用以糖心潤澤者為真肉氣味甘溫無毒主治食之補益人汪穎五靈脂修治頌曰此物多夾沙石絶難修治凡用研為細末以酒飛去沙石曬乾收用氣味甘溫無毒惡人參損人主治心腹冷氣小兒五疳闢疫治腸風通利氣脈女子血閉開寶療傷冷積聚蘇頌凡血崩過多者半炒半生為末酒服能行血止血治血氣刺痛甚效震亨止婦人經水過多赤帶不絶胎前産後血氣諸痛男女一切心腹脅肋少腹諸痛疝痛血痢腸風腹痛身體血痹刺痛肝瘧發寒熱反胃消渴及痰涎挾血成窠血貫瞳子血凝齒痛重舌小兒驚風五癇癲疾殺蟲解藥毒及蛇蠍蜈蚣傷時珍發明宗奭曰五靈脂引經有功不能生血此物入肝最速也嘗有人病目中翳往來不定此乃血所病也肝受血則能視目病不治血為背理也用五靈脂之藥而愈又有人被毒蛇所傷良久昏憒一老僧以酒調藥二錢灌之遂蘇仍以滓敷咬處少頃復灌二錢其苦皆去問之乃五靈脂一兩雄黃半兩同為末耳其後有中蛇毒者用之咸效時珍曰五靈脂足厥陰肝經藥也氣味俱厚陰中之陰故入血分肝主血諸痛皆屬於木諸蟲皆生於風故此藥能治血病散血和血而止諸痛治驚癇除瘧痢消積化痰療疳殺蟲治血痹血眼諸症皆屬肝經也失笑散不獨治婦人心痛血痛凡男女老幼一切心腹脅肋少腹痛疝氣並胎前産後血氣作痛及血崩經溢百藥不效者俱能奏功屢用屢驗真近世神方也又案李仲南云五靈脂治崩中非只治血之藥乃去風之劑風動物也衝任經虛被風傷襲營血以致崩中暴下與荊芥防風治崩義同方悟古人識見深奧如此此亦一說但未及肝血虛滯亦自生風之意附方舊六新三十一失笑散治男女老少心痛腹痛少腹痛小腸疝氣諸藥不效者能行能止婦人妊娠心痛及産後心痛少腹痛血氣痛尤妙用五靈脂蒲黃等分研末先以醋二杯調末熬成膏入水一盞煎至七分連藥熱服未止再服一方以酒代醋一方以醋糊和丸童尿酒服和劑局方紫金丸治産後惡露不快腰痛小腹如刺時作寒熱頭痛不思飲食又治久有瘀血月水不調黃瘦不食亦療心痛功與失笑散同以五靈脂水淘淨炒末一兩以好米醋調稀慢火熬膏入真蒲黃末和丸龍眼大每服一丸以水與童子小便各半盞煎至七分溫服少頃再服惡露即下血塊經閉者酒磨服之楊氏産乳五靈脂散治丈夫脾積氣痛婦人血崩諸痛飛過五靈脂炒煙盡研末每服一錢溫酒調下此藥氣惡難吃燒存性乃妙也或以酒水童尿煎服名抽刀散治産後心腹脅肋腰胯痛能散惡血如心煩口渴者加炒蒲黃減半霹靂酒下腸風下血者煎烏梅柏葉湯下中風麻痹痛者加草烏半錢同童尿水酒煎服永類鈐方産後血暈治産婦血暈不知人事用五靈脂二兩半生半炒為末每服一錢白水調下如口噤者斡開灌之入喉即愈圖經産後腹痛五靈脂香附桃仁等分研末醋糊丸服一百丸或用五靈脂末神麯糊丸白朮陳皮湯下丹溪方兒枕作痛五靈脂慢火炒研末酒服二錢危氏血氣刺痛五靈脂生研三錢酒一盞煎沸熱服靈苑方卒暴心痛五靈脂炒一錢半乾薑炮三分為末熱酒服立愈事林廣記心脾蟲痛不拘男女用五靈脂檳榔等分為末水煎石菖蒲調服三錢先嚼豬肉一二片海上仙方小兒蛔痛五靈脂末二錢白礬火飛半錢每服一錢水一盞煎五分溫服當吐蟲出愈閻孝忠集效方經血不止五靈脂炒煙盡研每服二錢當歸兩片酒一盞煎六分熱服三五度取效經效方血崩不止頌曰用五靈脂十兩研末水五盞煎三盞去滓澄清再煎為膏入神麯末二兩和丸梧桐子大每服二十丸空心溫酒下便止極效集要用五靈脂燒研以鐵稱錘燒紅淬酒調服以效為度胎衣不下惡血衝心用五靈脂半生半炒研末每服二錢溫酒下産寶子腸脫出五靈脂燒煙燻之先以鹽湯洗淨危氏吐血嘔血總録五靈脂一兩蘆薈二錢研末滴水丸芡子大捏作餅子每龍腦漿水化服二餅又治血妄行入胃吐血不止五靈脂一兩黃耆半兩為末新汲水服二錢吐逆不止不拘男女連日粥飲湯藥不能下者即效五靈脂治淨為末狗膽汁和丸芡子大每服一丸煎生薑酒磨化猛口熱吞不得漱口急將溫粥少許壓之經驗化食消氣五靈脂一兩木香半兩巴豆四十枚煨熟去油為末糊丸緑豆大每白湯下五丸普濟方久瘧不止或一日一發或一日二三發或二三日一發用五靈脂頭垢各一錢古城石灰二錢研末飯丸皂子大每服一丸五更無根水下即止神效方也海上消渴飲水竹籠散用五靈脂黑豆去皮臍等分為末每服三錢冬瓜皮湯下無皮用葉亦可日二服不可更服熱藥宜八味丸去附子加五味子若小渴者二三服即止保命集中風癱瘓追魂散用五靈脂三兩杵碎以水飛去上面黑濁下面沙石挹乾研末每服二錢熱酒調下日一服繼服小續命湯奇效方手足冷麻寇曰風冷氣血閉手足身體疼痛冷麻五靈脂二兩沒藥一兩乳香半兩川烏頭一兩半炮去皮為末滴水丸如彈子大每用一丸生薑溫酒磨服本草衍義骨折腫痛五靈脂白芨各一兩乳香沒藥各三錢為末熟水同香油調塗患處乾坤祕韞損傷接骨五靈脂一兩茴香一錢為末先以乳香末於極痛處敷上以小黃米粥塗之乃摻二末於粥上帛裹木片子夾定三五日效儒門事親五疳潮熱肚脹發焦不可用大黃黃芩損傷胃氣恐生別症五靈脂水飛一兩胡黃連五錢為末雄豬膽汁丸黍米大每服一二十丸米飲下全幼心鑑咳嗽肺脹皺肺丸用五靈脂二兩胡桃仁八個柏子仁半兩研勻滴水和丸小豆大每服二十丸甘草湯下普濟痰血凝結紫芝丸用五靈脂水飛半夏湯泡等分為末薑汁浸蒸餅丸梧桐子大每飲下二十丸百一選方酒積黃腫五靈脂末一兩入麝香少許飯丸小豆大每米飲下一丸普濟方目生浮翳五靈脂海螵蛸各等分為細末熟豬肝日蘸食明目經驗方重舌脹痛五靈脂一兩淘淨為末煎米醋漱經驗良方惡血齒痛五靈脂末米醋煎汁含咽直指方血痣潰血一人舊有一痣偶抓破血出一線七日不止欲死或用五靈脂末摻上即止也楊拱醫方摘要血潰怪病凡人目中白珠渾黑視物如常毛髮堅直如鐵條能飲食而不語如醉名曰血潰以五靈脂為末湯服二錢即愈夏子益奇疾方大風瘡癩油調五靈脂末塗之摘玄方蟲虺螫蠚凡蜈蚣蛇蠍毒蟲傷以五靈脂末塗之立愈金匱鉤玄毒蛇傷螫五靈脂為末酒調二錢服仍以少末摻瘡口妙普濟
