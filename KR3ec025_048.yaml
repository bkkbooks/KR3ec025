body:
  text: 禽部第四十八卷禽之二原禽類二十三種雞本經上品釋名燭夜時珍曰按徐鉉云雞者稽也能稽時也廣志云大者曰蜀小者曰荊其雛曰𪆪梵書曰曰鳩七吒集解別録曰雞生朝鮮平澤弘景曰雞屬甚多朝鮮乃在玄菟樂浪不應總是雞所出也馬志曰入藥取朝鮮者良爾頌曰今處處人家畜養不聞自朝鮮來時珍曰雞類甚多五方所産大小形色往往亦異朝鮮一種長尾雞尾長三四尺遼陽一種食雞一種角雞味俱肥美大勝諸雞南越一種長鳴雞晝夜啼叫南海一種石雞潮至即鳴蜀中一種鶤雞楚中一種傖雞並高三四尺江南一種矮雞腳才二寸許也雞在卦屬巽在星應昴無外腎而虧小腸凡人家無故群雞夜鳴者謂之荒雞主不祥若黃昏獨啼者主有天恩謂之盜啼老雞能人言者牝雞雄鳴者雄雞生卵者並殺之即已俚人畜雞無雄即以雞卵告灶而伏出之南人以雞卵畫墨煮熟驗其黃以卜凶吉又以雞骨占年其鳴也知時刻其棲也知陰晴太清外術言蓄蠱之家雞輒飛去萬畢術言其羽焚之可以致風五行志言雄雞毛燒著酒中飲之所求必得古人言雞能辟邪則雞亦靈禽也不獨充庖而已諸雞肉氣味食忌詵曰雞有五色者玄雞白首者六指者四距者雞死足不伸者並不可食害人時珍曰延壽書云閹雞能啼者有毒四月勿食抱雞肉令人作癰成漏男女虛乏弘景曰小兒五歲以下食雞生蛔蟲雞肉不可合葫蒜芥李食不可合犬肝犬腎食並令人泄痢同兔食成痢同魚汁食成心瘕同鯉魚食成癰癤同獺肉食成遁尸同生蔥食成蟲痔同糯米食生蛔蟲發明宗奭曰巽為風為雞雞鳴於五更者日將至巽位感動其氣而然也今有風病人食之無不發作巽為雞信可驗矣震亨曰雞屬土而有金木火又屬巽能助肝火寇言動風者習俗所移也雞性補能助濕中之火病邪得之為有助也若魚肉之類皆然且西北多寒中風者誠有之東南氣溫多濕有風病者非風也皆濕生痰痰生熱熱生風耳時珍曰禮記云天産作陽地産作陰雞卵生而地産羽不能飛雖為陽精實屬風木是陽中之陰也故能生熱動風風火相扇乃成中風朱駁寇說為非亦非矣頌曰雞肉雖有小毒而補虛羸是要故食治方多用之丹雄雞肉氣味甘微溫無毒扁鵲曰辛主治女人崩中漏下赤白沃通神殺惡毒闢不祥補虛溫中止血本經能愈久傷乏瘡不瘥者別録補肺孫思邈發明普曰丹雄雞一名載丹宗奭曰即赤雞也時珍曰雞雖屬木分而配之則丹雄雞得離火陽明之象白雄雞得庚金太白之象故辟邪惡者宜之烏雄雞屬木烏雌雞屬水故胎産宜之黃雌雞屬土故脾胃宜之而烏骨者又得水木之精氣故虛熱者宜之各從其類也吳球云三年鏾雞常食治虛損養血補氣附方新二闢禳瘟疫冬至日取赤雄雞作臘至立春日煮食至盡勿分他人肘後方百蟲入耳雞肉炙香塞耳中引出總録白雄雞肉氣味酸微溫無毒藏器曰甘寒主治下氣療狂邪安五臟傷中消渴別録調中除邪利小便去丹毒日華發明藏器曰白雄雞養三年能為鬼神所使時珍曰按陶弘景真誥云學道山中宜養白雞白犬可以辟邪今術家祈禳皆用白雞其原本此是乃異端一說耳雞亦何神何妖哉附方舊三新四癲邪狂妄自賢自聖行走不休白雄雞一隻煮以五味和作羹粥食心鏡驚憤邪僻治因驚憂怖迫或激憤惆悵致志氣錯越心行違僻者白雄雞一頭治如食法真珠四兩薤白四兩水三升煮二升盡食之飲汁令盡肘後卒然心痛白雞一頭治如食法水三升煮二升去雞煎取六合入苦酒六合真珠一錢復煎取六合納麝香二豆許頓服之肘後赤白痢下白雄雞一隻如常作臛及餛飩空心食心鏡猝得咳嗽白雞一隻苦酒一斗煮取三升分三服並淡食雞肘後水氣浮腫小豆一升白雄雞一隻治如食法以水三斗煮熟食之飲汁令盡肘後方肉壞怪病凡口鼻出腥臭水以碗盛之狀如鐵色蝦魚走躍捉之即化為水此肉壞也但多食雞饌即愈夏子益奇疾方烏雄雞肉氣味甘微溫無毒主治補中止痛別録止肚痛心腹惡氣除風濕麻痹補虛羸安胎治折傷並癰疽生搗塗竹木刺入肉日華發明時珍曰按李鵬飛雲黃雞宜老人烏雞宜産婦暖血馬益卿雲妊婦宜食牡雞肉取陽精之全於天産者此亦胎教宜見虎豹之意耳又唐崔行功纂要云婦人産死多是富貴家旁人擾攘致婦驚悸氣亂故耳惟宜屏除一切人令其獨産更爛煮牡雞取汁作粳米粥與食自然無恙乃和氣之效也蓋牡雞汁性滑而濡不食其肉恐難消也今俗産家每産後即食雞啖卵氣壯者幸而無恙氣弱者因而成疾皆由不解此意也附方舊四新六補益虛弱詵曰虛弱人用烏雄雞一隻治淨五味煮極爛空腹飽食之食生即反損人或五味淹炙食亦良反胃吐食用烏雄雞一隻治如食法入胡荽子半斤在腹內烹食二隻愈老人中風煩熱語澀每用烏雄雞一隻切蔥白一握煮臛下麻子汁五味空心食之養老書腳氣煩悶用烏雄雞一隻治如食法入米作羹食養老書寒疝絞痛用烏雄雞一頭治如食法生地黃七斤同銼著甑中蒸之以器盛取汁清旦溫服至晚令盡當下諸寒癖訖以白粥食之久疝不過三服肘後卒得咳嗽烏雄雞一隻治如食法酒漬半日飲之肘後腎虛耳聾烏雄雞一隻治淨以無灰酒三升煮熟乘熱食三五隻效狐尿刺瘡棘人腫痛欲死破烏雞拓之良肘後方貓眼睛瘡身面上瘡似貓兒眼有光采無膿血但痛癢不常飲食減少名曰寒瘡多吃雞魚蔥韭自愈夏子益奇疾方打傷顛撲及牛馬觸動胸腹破陷四肢摧折以烏雞一隻連毛杵一千二百下苦酒一升和勻以新布拓病處將膏塗布上覺寒振欲吐徐徐取下須臾再上一雞少則再作以愈為度肘後方黑雌雞肉氣味甘酸溫平無毒主治作羹食治風寒濕痹五緩六急安胎別録安心定志除邪辟惡氣治血邪破心中宿血治癰疽排膿補新血及産後虛羸益色助氣日華治反胃及腹痛踒折骨痛乳癰又新産婦以一隻治淨和五味炒香投二升酒中封一宿取飲令人肥白又和烏油麻二升熬香末之入酒中極效孟詵發明時珍曰烏色屬水牝象屬陰故烏雌所治皆血分之病各從其類也附方新三中風舌強不語目睛不轉煩熱烏雌雞一隻治淨以酒五升煮取二升去滓分作三次連服之食蔥姜粥暖臥取小汗飲膳正要死胎不下烏雞一隻去毛以水三升煮二升去雞用帛蘸汁摩臍下自出婦人良方虛損積勞治男女因積虛或大病後虛損沉困痠疼盜汗少氣喘惙或小腹拘急心悸胃弱多臥少起漸至瘦削若年深五臟氣竭則難治也用烏雌雞一頭治如食法以生地黃一斤切飴糖一升納腹內縛定銅器貯於瓶中蒸五升米熟取出食肉飲汁勿用鹽一月一作神效姚僧坦方黃雌雞肉氣味甘酸咸平無毒日華曰性溫患骨熱人勿食主治傷中消渴小便數而不禁腸澼泄痢補益五臟續絶傷療五勞益氣力別録治勞劣添髓補精助陽氣暖小腸止泄精補水氣日華補丈夫陽氣治冷氣瘦著床者漸漸食之良以光粉諸石末和飯飼雞煮食甚補益孟詵治産後虛羸煮汁煎藥服佳時珍發明時珍曰黃者土色雌者坤象味甘歸脾氣溫益胃故所治皆脾胃之病也丹溪朱氏謂雞屬土者當指此雞而發他雞不得侔此附方舊四新五水癖水腫詵曰腹中水癖水腫以黃雌雞一隻如常治淨和赤小豆一升同煮候豆爛即出食之其汁飲日二夜一每服四合時行黃疾時行發黃用金色腳黃雌雞治如食法煮熟食之並飲汁令盡不過再作亦可少下鹽豉肘後方消渴飲水小便數以黃雌雞煮汁冷飲並作羹食肉心鏡下痢噤口黃肥雌雞一隻如常為臛作濕餛飩空心食之心鏡脾虛滑痢用黃雌雞一隻炙以鹽醋塗煮熟乾燥空心食之心鏡脾胃弱乏人痿黃瘦黃雌雞肉五兩白麵七兩切肉作餛飩下五味煮熟空心食之日一作益顏色補臟腑壽親産後虛羸黃雌雞一隻去毛及腸肚背上開破入生百合三枚白粳米半升縫合入五味汁中煮熟開腹取百合並飯和汁作羹食之並食肉聖濟病後虛汗傷寒後虛弱日夜汗出不止口乾心躁用黃雌雞一隻去腸胃治淨麻黃根一兩水七大盞煮汁三大盞去滓及雞入肉蓯蓉酒浸一宿刮淨一兩牡蠣煅粉二兩煎取一盞半分為三服一日服盡聖惠老人噎食不通黃雌雞肉四兩切茯苓末二兩白麵六兩作餛飩入豉汁煮食三五服效養老書烏骨雞氣味甘平無毒主治補虛勞羸弱治消渴中惡鬼擊心腹痛益産婦治女人崩中帶下一切虛損諸病大人小兒下痢噤口並煮食飲汁亦可搗和丸藥時珍發明時珍曰烏骨雞有白毛烏骨者黑毛烏骨者斑毛烏骨者有骨肉俱烏者肉白骨烏者但觀雞舌黑者則肉骨俱烏入藥更良雞屬木而骨反烏者巽變坎也受水木之精氣故肝腎血分之病宜用之男用雌女用雄婦人方科有烏雞丸治婦人百病煮雞至爛和藥或併骨研用之按太平御覽云夏侯弘行江陵逢一大鬼引小鬼數百行弘潛捉末後一小鬼問之曰此廣州大殺也持弓戟往荊揚二州殺人若中心腹者死余處猶可救弘曰治之有方乎曰但殺白烏骨雞薄心即瘥時荊揚病心腹者甚衆弘用此治之十愈八九中惡用烏雞自弘始也此說雖涉迂怪然其方則神妙謂非神傳不可也鬼擊猝死用其血塗心下亦效附方新三赤白帶下白果蓮肉江米各五錢胡椒一錢為末烏骨雞一隻如常治淨裝末入腹煮熟空心食之遺精白濁下元虛憊者用前方食之良脾虛滑泄烏骨母雞一隻治淨用豆蔻一兩草果二枚燒存性摻入雞腹內扎定煮熟空心食之反毛雞主治反胃以一隻煮爛去骨入人參當歸食鹽各半兩再同煮爛食之至盡時珍出乾坤生意發明時珍曰反毛雞即翻翅雞也毛翮皆反生向前治反胃者述類之義耳泰和老雞氣味甘辛熱無毒主治內托小兒痘瘡時珍發明時珍曰江西泰和吉水諸縣俗傳老雞能發痘瘡家家畜之近則五六年遠則一二十年待痘瘡發時以五味煮爛與兒食之甚則加胡椒及桂附之屬此亦陳文中治痘用木香異功散之意取其能助濕熱發膿也風土有宜不宜不可以為法雞頭丹白雄雞者良主治殺鬼東門上者尤良本經治蠱禳惡闢瘟時珍發明時珍曰古者正旦磔雄雞祭門戶以辟邪鬼蓋雞乃陽精雄者陽之體頭者陽之會東門者陽之方以純陽勝純陰之義也千金轉女成男方中用之亦取此義也按應劭風俗通云俗以雞祀祭門戶雞乃東方之牲東方既作萬物觸戶而出也山海經祠鬼神皆用雄雞而今治賊風有雞頭散治蠱用東門雞頭治鬼痱用雄雞血皆以御死辟惡也又崔實月令云十二月東門磔白雞頭可以合藥周禮雞人凡祭祀禳釁供其雞牲注云禳郊及疆卻災變也作宮室器物取血塗釁隙淮南子曰雞頭已瘻此類之推也附方新一猝魘死昏東門上雞頭為末酒服之千金方雞冠血三年雄雞者良氣味咸平無毒主治烏雞者主乳難別録治目淚不止日點三次良孟詵亦點暴赤目時珍丹雞者治白癜風日華並療經絡間風熱塗頰治口喎不正塗面治中惡卒飲之治縊死欲絶及小兒猝驚客忤塗諸瘡癬蜈蚣蜘蛛毒馬齧瘡百蟲入耳時珍發明時珍曰雞冠血用三年老雄者取其陽氣充溢也風中血脈則口僻喎冠血咸而走血透肌雞之精華所聚本乎天者親上也丹者陽中之陽能辟邪故治中惡驚忤諸病烏者陽形陰色陽中之陰故治産乳目淚諸病其治蜈蚣蜘蛛諸毒者雞食百蟲制之以所畏也高武痘疹正宗云雞冠血和酒服發痘最佳雞屬巽屬風頂血至清至高故也附方舊九新十益助陽氣詵曰丹雄雞冠血和天雄太陽粉各四分桂心二分丸服之鬼擊猝死烏雞冠血瀝口中令咽仍破此雞拓心下冷乃棄之道邊妙肘後