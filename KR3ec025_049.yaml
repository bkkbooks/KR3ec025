body:
  text: 禽部第四十九卷禽之三林禽類一十七種斑鳩宋嘉祐釋名斑隹音錐錦鳩範汪方鵓鳩左傳注祝鳩時珍曰鳩也鵓也其聲也斑也錦也其色也隹者尾短之名也古者庖人以尸祝登尊俎謂之祝鳩此皆鳩之大而有斑者其小而無斑者曰隹曰𪆴音葵曰荊鳩曰楚鳩也鳩之子曰䳕鳩曰役鳩曰糠鳩曰郎皋曰闢皋揚雄方言混列諸鳩不足據集解禹錫曰斑鳩是處有之春分化為黃褐侯秋分化為斑䳡黃褐侯青䳡也宗奭曰斑鳩有有斑者有無斑者有灰色者有大者有小者雖有此數色其用則一也嘗養之數年並不見春秋分變化時珍曰鳴鳩能化鷹而斑鳩化黃褐侯之說不知所出處今鳩小而灰色及大而斑如梨花點者並不善鳴惟項下斑如真珠者聲大能鳴可以作媒引鳩入藥尤良鳩性愨孝而拙於為巢才架數莖往往墮卵天將雨即逐其雌霽則呼而反之故曰鷦巧而危鳩拙而安或云雄呼晴雌呼雨鳩肉氣味甘平無毒主治明目多食益氣助陰陽嘉祐久病虛損人食之補氣宗奭食之令人不噎時珍發明時珍曰範汪方治目有斑䳡丸總録治目有錦鳩丸倪惟德氏謂斑鳩補腎故能明目竊謂鳩能益氣則能明目矣不獨補腎已爾古者仲春羅氏獻鳩以養國老仲秋授年老者以鳩杖云鳩性不噎食之且復助氣也血主治熱飲解蠱毒良時珍屎主治治聤耳出膿疼痛及耳中生耵聹同夜明沙末等分吹之時珍青䳡音錐拾遺釋名黃褐侯拾遺集解藏器曰黃褐侯狀如鳩而緑褐色聲如小兒吹竿時珍曰鳩有白鳩緑鳩今夏月出一種糠鳩微帶紅色小而成群掌禹錫所謂黃褐侯秋化斑隹恐即此也好食桑椹及半夏苗昔有人食之過多患喉痹醫用生薑解之愈肉氣味甘平無毒主治蟻瘻惡瘡五味淹炙食之極美藏器安五臟助氣補虛損排膿活血並一切瘡癤癰瘻嘉祐鳲鳩拾遺釋名布穀列子鴶鵴音戛菊獲谷爾雅注郭公藏器曰布穀鳲鳩也江東呼為獲谷亦曰郭公北人名撥穀時珍曰布穀名多皆各因其聲似而呼之如俗呼阿公阿婆割麥插禾脫卻破褲之類皆因其鳴時可為農候故耳或云鳲鳩即月令鳴鳩也鳲乃鳴字之訛亦通禽經及方言並謂鳲鳩即戴勝郭璞云非也集解藏器曰布穀似鷂長尾牝牡飛鳴以翼相拂擊時珍曰案毛詩義疏云鳴鳩大如鳩而帶黃色啼鳴相呼而不相集不能為巢多居樹穴及空鵲巢中哺子朝自上下暮自下上也二月穀雨後始鳴夏至後乃止張華禽經注云仲春鷹化為鳩仲秋鳩復化為鷹故鳩之目猶如鷹之目列子云鷂之為鸇鸇之為布穀布穀久復為鷂是矣禽經又云鳩生三子一為鶚肉氣味甘溫無毒主治安神定志令人少睡汪穎腳脛骨主治令人夫妻相愛五月五日收帶之各一男左女右云置水中自能相隨也藏器桑鳸食物釋名竊脂爾雅青雀郭璞蠟觜雀時珍曰鳸意同扈止也左傳少皞氏以鳥名官九鳸為九農正所以止民無淫也桑鳸乃鳸之在桑間者其嘴或淡白如脂或凝黃如蠟故古名竊脂俗名蠟觜淺色曰竊陸璣謂其好盜食脂肉殆不然也集解時珍曰鳸鳥處處山林有之大如鴝鵒蒼褐色有黃斑點好食粟稻詩云交交桑鳸有鶯其羽是矣其觜喙微曲而厚壯光瑩或淺黃淺白或淺青淺黑或淺玄淺丹鳸類有九種皆以喙色及聲音別之非謂毛色也爾雅云春鳸鳻鶞夏鳸竊玄秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹行鳸唶唶宵鳸嘖嘖老鳸鷃鷃是矣今俗多畜其雛教作戲舞肉氣味甘溫無毒主治肌肉虛羸益皮膚汪穎伯勞宋嘉祐釋名伯鷯夏小正注博勞詩疏伯趙左傳鵙豳詩音狊鴂孟子音決時珍曰案曹植惡鳥論云鵙聲嗅嗅故以名之感陰氣而動殘害之鳥也謂其為惡聲者愚人信之通士略之世傳尹吉甫信後妻之讒殺子伯奇後化為此鳥故所鳴之家以為凶者好事傅會之言也伯勞象其聲也伯趙其色皂也趙乃皂訛集解時珍曰伯勞即鶪也夏鳴冬止乃月令候時之鳥本草不著形狀而後人無識之者郭璞注爾雅云鵙似鶷鶡而大服虔云鶷鶡音轄軋白項鴉也張華注禽經云伯勞形似鴝鵒鴝鵒喙黃伯勞喙黑許慎說文云鴝鵒似鵙而有幘顏師古注漢書謂鴂為子規王逸注楚詞謂鴂為巧婦揚雄方言謂鵙為鶡鴠陳正敏遁齊閒覽謂鵙為梟李肇國史補謂鴂為布穀楊慎丹鉛録謂鵙為駕犁九說各異竊謂鵙既可以候時必非稀見之鳥今通考其得失王說已謬不必致辨據郭說則似今苦鳥據張許二說則似今之百舌似鴝鵒而有幘者然鵙好單棲鳴則蛇結而百舌不能制蛇為不同也據顏說則子規名鷤鴂音弟桂伯勞名鴂音決且月令起於北方子規非北鳥也據揚說鶡鴠乃寒號蟲惟晉地有之據陳說則謂其目擊斷然以為梟矣而不具其形似與陳藏器梟即梟之說不合而爾雅鴟梟一名鸋鴂與此不同據李說則布穀一名鴶鵴字音相近又與月令鳴鳩拂其羽相犯據楊說則駕犁乃鷑鳩小如鴝鵒三月即鳴與禮記五月鵙始鳴豳風七月鳴鵙之義不合八說不同如此要之當以郭說為準案爾雅謂鵲鵙之醜其飛也翪斂足竦翅也既以鵲鵙並稱而今之苦鳥大如鳩黑色以四月鳴其鳴曰苦苦又名姑惡人多惡之俗以為婦被其姑苦死所化頗與伯奇之說相近但不知其能制蛇否淮南萬畢術云伯勞之血塗金人不敢取毛氣味平有毒主治小兒繼病取毛帶之繼病者母有娠乳兒兒病如瘧痢他日相繼腹大或瘥或發他人有娠相近亦能相繼也北人未識此病嘉祐發明時珍曰案淮南子云男子種蘭美而不芳繼子得食肥而不澤情不相與往來也蓋情在腹中之子故也繼病亦作鬾病鬾乃小鬼之名謂兒羸瘦如鬾鬼也大抵亦丁奚疳病踏枝主治小兒語遲鞭之即速語嘉祐發明時珍曰案羅氏爾雅翼云本草言伯勞所踏樹枝鞭小兒令速語者以其當萬物不能鳴時而獨能鳴之故以類求之也附録鷑鳩時珍曰鷑鳩爾雅名鵧鷑音批及又曰鵖鴔音匹汲戴勝也一曰鵯鵊訛作批鵊鳥羅願曰即祝鳩也江東謂之烏臼音掬又曰鴉䳎小於烏能逐烏三月即鳴今俗謂之駕犁農人以為候五更輒鳴曰架架格格至曙乃止故滇人呼為榨油郎亦曰鐵鸚鵡能啄鷹鶻烏鵲乃隼屬也南人呼為鳳凰皂隸汴人呼為夏雞古有催明之鳥名喚起者蓋即此也其鳥大如燕黑色長尾有歧頭上戴勝所巢之處其類不得再巢必相鬥不已楊氏指此為伯勞乃謂批鵊為䳾雞俱誤矣月令三月戴勝降於桑鸜鵒音劬欲唐本草釋名鴝鵒周禮哵哵鳥廣韻八哥俗名寒皋萬畢術時珍曰此鳥好浴水其睛瞿瞿然故名王氏字說以為其行欲也尾而足勾故曰鴝鵒從勾從欲省亦通哵哵其聲也天寒欲雪則群飛如告故曰寒皋皋者告也集解恭曰鸜鵒似鵙而有幘者是也藏器曰五月五日取雛剪去舌端即能效人言又可使取火也時珍曰鸜鵒巢於鵲巢樹穴及人家屋脊中身首俱黑兩翼下各有白點其舌如人舌剪剔能作人言嫩則口黃老則口白頭上有幘者亦有無幘者周禮鴝鵒不逾濟地氣使然也肉氣味甘平無毒詵曰寒主治五痔止血炙食或為散飲服唐本炙食一枚治吃噫下氣通靈日華治老嗽臘月臘日取得五味醃炙食或作羹食或搗散蜜丸服之非臘日者不可用孟詵附方原缺目睛主治和乳汁研滴目中令人目明能見霄外之物藏器百舌拾遺釋名反舌鶷𪆰音轄軋時珍曰按易通卦驗云能反復其舌如百鳥之音故名鶷𪆰亦象聲今俗呼為牛屎哵哥為其形似鴝鵒而氣臭也梵書名舍羅集解藏器肖百舌今之鶯也時珍曰百舌處處有之居樹孔窟穴中狀如鴝鵒而小身略長灰黑色微有斑點喙亦尖黑行則頭俯好食蚯蚓立春後則鳴囀不已夏至後則無聲十月後則藏蟄人或畜之冬月則死月令仲夏反舌無聲即此蔡雍以為蛤蟆者非矣陳氏謂即鶯服虔通俗文以鶷𪆰為白脰烏者亦非矣音雖相似而毛色不同肉氣味缺主治炙食治小兒久不語及殺蟲藏器窠及糞主治諸蟲咬研末塗之藏器練鵲宋嘉祐集解禹錫曰練鵲似鴝鵒而小黑褐色食槐子者佳冬春間採之時珍曰其尾有長白毛如練帶者是也禽經云冠鳥性勇纓鳥性樂帶鳥性仁張華云帶鳥練鵲之類是也今俗呼為拖白練氣味甘溫平無毒主治益氣治風疾細銼炒香袋盛浸酒中每日取酒溫服之嘉祐鶯食物釋名黃鳥詩經離黃說文黧黃爾雅倉庚月令爾雅作商庚青鳥左傳黃伯勞時珍曰禽經云鶯鳴嚶嚶故名或云鶯項有文故從賏賏項飾也或作鶯鳥羽有文也詩云有鶯其羽是矣其色黃而帶黧故有黧黃諸名陸璣云齊人謂之摶黍周人謂之楚雀幽州謂之黃鶯秦人謂之黃鸝鶹淮人謂之黃伯勞唐玄宗呼為金衣公子或謂之黃袍集解時珍曰鶯處處有之大於鸜鵒雌雄雙飛體毛黃色羽及尾有黑色相間黑眉尖觜青腳立春後即鳴麥黃椹熟時尤甚其音圓滑如織機聲乃應節趨時之鳥也月令云仲春倉庚鳴說文云倉庚鳴則蠶生冬月則藏蟄入田塘中以泥自裹如卵至春始出肉氣味甘溫無毒主治補益陽氣助脾汪穎食之不妒時珍發明穎曰此鳥感春陽先鳴所以補人時珍曰按山海經云黃鳥食之不妒楊夔止妒論云梁武帝郗後性妒或言倉庚為膳療忌遂令茹之妒果減半啄木鳥宋嘉祐釋名斫木爾雅鴷時珍曰此鳥斫裂樹木取蠹食故名禽經云鴷志在木鵜志在水集解禹錫曰異物志云啄木有大有小有褐有斑褐者是雌斑者是雄穿木食蠹俗云雷公採藥吏所化也山中一種大如鵲青黑色頭上有紅毛者土人呼為山啄木時珍曰啄木小者如雀大者如鴉面如桃花喙足皆青色剛爪利嘴嘴如錐長數寸舌長於咮其端有針刺啄得蠹以舌鉤出食之博物志云此鳥能以嘴畫字令蟲自出魯至剛云今閩廣蜀人巫家收其符字以收驚療瘡毒也其山啄木頭上有赤毛野人呼為火老鴉能食火炭王元之詩云淮南啄木大如鴉頂似仙鶴堆丹砂即此也亦入藥用其功相同肉氣味甘酸平無毒主治痔瘻及牙齒疳䘌蟲牙燒存性研末納孔子中不過三次嘉祐追勞蟲治風癇時珍發明禹錫曰淮南子云啄木愈齲以類相攝也荊楚歲時記云野人以五月五日取啄木主齒痛時珍曰追勞治癇治瘻皆取制蟲之義也附方舊一新二瘻瘡膿水不止不合用啄木一隻或火老鴉亦可鹽泥固濟煅存性研末酒下二錢匕姚大夫方追勞取蟲用啄木禽一隻硃砂四兩精豬肉四兩餓令一晝夜將二味和勻喂之至盡以鹽泥固濟煅一夜五更取出勿打破連泥埋入土中二尺次日取出破開入銀石器內研末以無灰酒入麝香少許作一服須謹候安排待蟲出速鉗入油鍋煎之後服局方嘉禾散一劑胡云翱勞瘵方多年癇病取臘月啄木鳥一個無灰酒三升先以瓦罐鋪荊芥穗一寸厚安鳥於上再以穗蓋一寸傾酒入內鹽泥固濟炭火煅之酒干為度放冷取出為末入石膏二兩鐵粉一兩炮附子一兩硃砂麝香各一分龍腦一錢共研勻每服一錢先服溫水三兩口以溫酒一盞調服即臥發時又一服間日再服不過十服即愈保幼大全舌主治齲齒作痛以綿裹尖咬之梅師附方新一啄木散治蟲牙啄木舌一枚巴豆一枚研勻每以豬鬃一莖點少許於牙根上立瘥聖惠血主治庚日向西熱飲令人面色如朱光彩射人時珍出岣嶁神書腦主治魯至剛俊靈機要云三月三日取啄木以丹砂大青拌肉餌之一年取腦和雄黃半錢作十丸每日向東水服一丸久能變形怒則如神鬼喜則常人也慈烏宋嘉祐釋名慈鴉嘉祐孝烏說文寒鴉時珍曰烏字篆文象形鴉亦作鴉禽經鴉鳴啞啞故謂之鴉此鳥初生母哺六十日長則反哺六十日可謂慈孝矣北人謂之寒鴉冬月尤甚也集解禹錫曰慈烏北土極多似烏鴉而小多群飛作鴉鴉聲不膻臭可食時珍曰烏有四種小而純黑小嘴反哺者慈烏也似慈烏而大嘴腹下白不反哺者雅烏也似鴉烏而大白項者燕烏也似鴉烏而小赤嘴穴居者山烏也山烏一名鸀出西方燕烏一名白脰一名鬼雀一名鶷𪆰音轄軋禽經云慈烏反哺白脰不祥大嘴善警玄烏吟夜又云烏鳥背飛而向啼也又蜀徼有火鴉能銜火肉氣味酸咸平無毒主治補勞治瘦助氣止咳嗽骨蒸羸弱者和五味淹炙食之良嘉祐詵曰北帝攝鬼録中亦用慈鴉卵烏鴉宋嘉祐釋名鴉烏小爾雅老雅雅與鴉同鸒音預鵯鶋音匹居楚烏詩義問大觜烏禽經集解時珍曰烏鴉大嘴而性貪鷙好鳴善避繒繳古有鴉經以占吉凶然北人喜鴉惡鵲南人喜鵲惡鴉惟師曠以白項者為不祥近之肉氣味酸澀平無毒詵曰肉澀臭不可食只可治病藏器曰肉及卵食之令人昏忘把其毛亦然蓋未必昏為其膻臭耳主治瘦病咳嗽骨蒸勞疾臘月以瓦瓶泥固燒存性為末每飲服一錢又治小兒癇疾及鬼魅嘉祐治暗風癇疾及五勞七傷吐血咳嗽殺蟲時珍發明頌曰烏鴉今人多用治急風而本經不著宜於臘月捕取翅羽觜足全者泥固煅過入藥治諸風烏犀丸中用之見和劑局方時珍曰聖濟總録治破傷中風牙關緊急四肢強直有金烏散煅過入藥品多不録附方新六五勞七傷吐血咳嗽烏鴉一枚栝蔞瓤一枚白礬少許入鴉肚中縫扎煮熟作四服壽域神方暗風癇疾用臘月烏鴉一個鹽泥固濟於瓶中煅過放冷取出為末入硃砂末半兩每服一錢酒下日三服不過十日愈又方用渾烏鴉一個瓶固煅研胡桃七枚蒼耳心子七枚為末每服一錢空心熱酒下並保幼大全疝氣偏墜即前胡桃蒼耳方加入新生兒胎衣一副煅研入之同上經脈不通積血不散用烏鴉散主之烏鴉去皮毛炙三分當歸焙好墨各三分延胡索炒蒲黃炒水蛭以糯米炒過各半兩芫青糯米炒過一分為末每服一錢酒下總録虛勞瘵疾烏鴉一隻絞死去毛腸入人參片花椒各五錢縫合水煮熟食以湯下鴉骨參椒焙研棗肉丸服吳球便民食療烏目氣味無毒主治吞之令人見諸魅或研汁注目中夜能見鬼藏器頭主治土蜂瘻燒灰敷之聖惠心主治猝得咳嗽炙熟食之肘後膽主治點風眼紅爛時珍翅羽主治從高墜下瘀血搶心面青氣短者取右翅七枚燒研酒服當吐血便愈蘇頌出肘後治針刺入肉以三五枚炙焦研末醋調敷之數次即出甚效又治小兒痘瘡不出復入時珍附方新一痘瘡復陷十二月取老鴉左翅辰日燒灰用獖豬血和丸芡子大每服一丸以獖豬尾血同溫水化服當出也聞人規痘疹論鵲別録下品釋名飛駁烏陶弘景喜鵲禽經干鵲新語時珍曰鵲古文作舄象形鵲鳴唶唶故謂之鵲鵲色駁雜故謂之駁靈能報喜故謂之喜性最惡濕故謂之干佛經謂之芻尼小說謂之神女集解時珍曰鵲烏屬也大如鴉而長尾尖嘴黑爪緑背白腹尾翮黑白駁雜上下飛鳴以音感而孕以視而抱季冬始巢開戶背太歲向太乙知來歲風多巢必卑下故曰干鵲知來猩猩知往段成式云鵲有隱巢木如梁令鷙鳥不見人若見之主富貴也鵲至秋則毛毨頭禿淮南子云鵲矢中蝟蝟即反而受啄火勝金也雄鵲肉氣味甘寒無毒日華曰涼主治石淋消結熱可燒作灰以石投中解散者是雄也別録藏器曰燒灰淋汁飲之令淋石自下治消渴疾去風及大小腸澀並四肢煩熱胸膈痰結婦人不可食蘇頌冬至埋鵲於圊前闢時疾溫氣時珍出肘後發明弘景曰凡鳥之雌雄難別者其翼左覆右者是雄右覆左者是雌又燒毛作屑納水中沉者是雌浮者是雄今云投石恐只是鵲余鳥未必爾腦主治弘景曰五月五日取鵲腦入術家用時珍曰按淮南萬畢術云丙寅鵲腦令人相思高誘注云取鵲腦雌雄各一道中燒之丙寅日入酒中飲令人相思又媚藥方中亦有用之者則陶氏所謂術家者亦此類耳巢主治多年者燒之水服療顛狂鬼魅及蠱毒仍呼祟物名號亦敷瘻瘡良日華正旦燒灰撒門內闢盜其重巢柴燒研飲服方寸匕一日三服治積年漏下不斷困篤者一月取效時珍出洞天録及千金方重巢者連年重産之巢也附方新一小便不禁重鵲巢中草一個燒灰每服二錢匕以薔薇根皮二錢煎湯服之日二聖惠山鵲食物釋名鷽渥學二音爾雅雗音汗說文山鷓俗名赤嘴烏酉陽雜俎集解時珍曰山鵲處處山林有之狀如鵲而烏色有文采赤嘴赤足尾長不能遠飛亦能食雞雀諺云朝鷽叫晴暮鷽叫雨說文以此為知來事之鳥字說云能效鷹鸇之聲而性惡其類相值則搏者皆指此也鄭樵以為喜鵲誤矣有文采如戴花勝人名戴鵀戴鳻氣味甘溫無毒主治食之解諸果毒汪穎鶻嘲宋嘉祐鶻骨猾二音釋名鶻鵃爾雅鶻鳩左傳鶌鳩爾雅鷽鳩渥學二音阿鵴雜俎𪈭鷜音藍呂時珍曰其目似鶻其形似鷽鷽山鵲也其聲啁嘲其尾屈促其羽如繿縷故有諸名阿鵴乃鷽鳩之訛也陸佃云凡鳥朝鳴曰嘲夜鳴曰㖡此鳥喜朝鳴故也禽經云林鳥朝嘲水鳥夜㖡是矣集解禹錫曰鶻嘲南北總有似山鵲而小短尾有青毛冠多聲青黑色在深林間飛翔不遠北人呼為𪈭鷜鳥東都賦云鶻嘲春鳴是也時珍曰此鳥春來秋去好食桑椹易醉而性淫或云鶻嘲即戴勝未審是否鄭樵以為鸜鵒非矣肉氣味咸平無毒主治助氣益脾胃主頭風目眩煮炙食之頓盡一枚至驗嘉祐今江東俚人呼頭風為腫頭先從兩項邊筋起直上入頭頭悶目眩者是也杜鵑拾遺釋名杜宇禽經子嶲音攜子規亦作秭歸鶗鴂音弟桂亦作鷤鴂催歸亦作思歸怨鳥周燕說文陽雀時珍曰蜀人見鵑而思杜宇故呼杜鵑說者遂謂杜宇化鵑訛矣鵑與子嶲子規鶗鴂催歸諸名皆因其聲似各隨方音呼之而已其鳴若曰不如歸去諺云陽雀叫鶗鴂央是矣禽經云江左曰子規蜀右曰杜宇甌越曰怨鳥服虔注漢書以鷤鴂為伯勞誤矣名同物異也伯勞一名鴂音決不音桂集解藏器曰杜鵑小如鷂鳴呼不已蜀王本紀云杜宇為望帝淫其臣鱉靈妻乃禪位亡去時子規鳥鳴故蜀人見鵑鳴而悲望帝荊楚歲時記云杜鵑初鳴先聞者主別離學其聲令人吐血登廁聞之不祥厭法但作狗聲應之異苑云有人山行見一群聊學之嘔血便殞人言此鳥啼至血出乃止故有嘔血之事時珍曰杜鵑出蜀中今南方亦有之狀如雀鷂而色慘黑赤口有小冠春暮即鳴夜啼達旦鳴必向北至夏尤甚晝夜不止其聲哀切田家候之以興農事惟食蟲蠹不能為巢居他巢生子冬月則藏蟄肉氣味甘平無毒主治瘡瘻有蟲薄切炙熱貼之蟲盡乃已時珍發明時珍曰按呂氏春秋云肉之美者嶲燕之翠則昔人亦嘗食之矣鸚䳇食物釋名鸚哥俗名干皋時珍曰按字說云鸚䳇如嬰兒之學母語故字從嬰母亦作鸚鵡熊太古云大者為鸚䳇小者為鸚哥則䳇義又取乎此師曠謂之干皋李昉呼為隴客梵書謂之臊陀集解時珍曰鸚䳇有數種緑鸚䳇出隴蜀而滇南交廣近海諸地尤多大如烏鵲數百群飛南人以為鮓食紅鸚䳇紫赤色大亦如之白鸚䳇出西洋南番大如母雞五色鸚䳇出海外諸國大於緑而小於白者性尤慧利俱丹咮鉤吻長尾赤足金睛深目上下目瞼皆能眨動舌如嬰兒其趾前後各二異於衆鳥其性畏寒即發顫如瘴而死飼以余甘子可解或云摩其背則喑或云雄者喙變丹雌者喙黑不變張思正倦遊録云海中有黃魚能化鸚䳇此必又一種也有秦吉了鳥鳳皆能人言並附於下附録秦吉了時珍曰即了哥也唐書作結遼鳥番音也出嶺南容管廉雍諸州峒中大如鸜鵒紺黑色夾腦有黃肉冠如人耳丹咮黃距人舌人目目下連頸有深黃紋頂尾有分縫能效人言音頗雄重用熟雞子和飯飼之亦有白色者鳥鳳按范成大虞衡志云鳥鳳出桂海左右兩江峒中大如喜鵲紺碧色項毛似雄雞頭上有冠尾垂二弱骨長一尺四五寸至秒始有毛其形略似鳳音聲清越如笙簫能度小曲合宮商又能為百鳥之音彼處亦自難得鸚䳇肉氣味甘咸溫無毒主治食之已虛嗽汪穎禽之四山禽類一十三種附一種鳳凰拾遺釋名瑞鶠時珍曰禽經云雄鳳雌凰亦曰瑞鶠鶠者百鳥偃伏也羽蟲三百六十鳳為之長故從鳥從凡凡總也古作朋字象形凰者美也大也集解時珍曰鳳南方朱鳥也按韓詩外傳云鳳之象鴻前麟後燕頷雞喙蛇頸魚尾鸛顙鴛腮龍紋龜背羽備五采高四五尺翱翔四海天下有道則見其翼若干其聲若簫不啄生蟲不折生草不群居不侶行非梧桐不棲非竹實不食非醴泉不飲山海經云丹穴之山有鳥狀如雞五采而紋飲食自然自歌自舞見則天下安寧蔡衡云象鳳有五赤多者鳳青多者鸞黃多者鵷雛紫多者鸑鷟白多者鵠又群書立名各異文繁不録按羅存齊爾雅翼云南恩州北甘山壁立千仞猿狖狽不能至鳳凰巢其上惟食蟲魚遇大風雨飄墮其雛小者猶如鶴而足差短鳳凰臺氣味辛平無毒主治勞損積血利血脈安神治驚邪癲癇雞癇發熱狂走水磨服之藏器發明藏器曰鳳凰腳下白物如石者名鳳凰臺鳳雖靈鳥時或來儀候其棲止處掘土二三尺取之狀如圓石白似卵者是也然鳳非梧桐不棲非竹實不食那復近地而有臺入土乎正物有自然之理不可曉也今有鳳處未必有竹有竹處未必有鳳恐是麟鳳洲有之如漢時所貢續絃膠煎鳳髓造成者曷足怪哉時珍曰按呂氏春秋云流沙之西丹山之南有鳳鳥之卵沃民所食則所産之地不以為異也續絃膠洞冥記以為鸞血作成故雷公炮炙論云斷絃折劍遇鸞血而如初陳氏以為鳳髓所作要皆誑言不必深辨孔雀別録下品釋名越鳥時珍曰孔大也李昉呼為南客梵書謂之摩由邏集解弘景曰出廣益諸州方家罕用恭曰交廣多有劍南元無時珍曰按南方異物志云孔雀交趾雷羅諸州甚多生高山喬木之上大如雁高三四尺不減於鶴細頸隆背頭戴三毛長寸許數十群飛棲遊岡陵晨則鳴聲相和其聲曰都護雌者尾短無金翠雄者三年尾尚小五年乃長二三尺夏則脫毛至春復生自背至尾有圓紋五色金翠相繞如錢自愛其尾山棲必先擇置尾之地雨則尾重不能高飛南人因往捕之或暗伺其過生斷其尾以為方物若回顧則金翠頓減矣山人養其雛為媒或探其卵雞伏出之飼以豬腸生菜之屬聞人拍手歌舞則舞其性妒見採服者必啄之北戶録云孔雀不匹以音影相接而孕或雌鳴下風雄鳴上風亦孕冀越集云孔雀雖有雌雄將乳時登木哀鳴蛇至即交故其血膽猶傷人禽經云孔見蛇則宛而躍者是矣肉氣味咸涼微毒藏器曰無毒主治解藥毒蠱毒日華發明時珍曰按紀聞云山谷夷人多食之或以為脯臘味如雞鶩能解百毒人食其肉者自後服藥必不效為其解毒也又續博物志云李衛公言鵝驚鬼孔雀辟惡鵁鶄厭火血主治生飲解蠱毒良日華發明時珍曰熊太古言孔雀與蛇交故血膽皆傷人而日華及異物志言其血與首能解大毒似不相合按孔雀之肉既能解毒何血獨傷人耶蓋亦猶雉與蛇交時即有毒而蛇伏蟄時即無毒之意耳屎氣味微寒主治女子帶下小便不利別録治崩中帶下可敷惡瘡日華尾氣味有毒宗奭曰不可入目令人昏翳駝鳥拾遺釋名駝蹄雞綱目食火雞同上骨托禽時珍曰駝象形托亦駝字之訛集解藏器曰駝鳥如駝生西戎高宗永徽中吐火羅獻之高七尺足如橐駝鼓翅而行日三百里食銅鐵也時珍曰此亦是鳥也能食物所不能食者按李延壽後魏書云波斯國有鳥形如駝能飛不高食草與肉亦啖火日行七百里郭義恭廣志云安息國貢大雀雁身駝蹄蒼色舉頭高七八尺張翅丈餘食大麥其卵如甕其名駝鳥劉郁西使記云富浪有大鳥駝蹄高丈餘食火炭卵大如升費信星槎勝覽云竹步國阿丹國俱出駝蹄雞高者六七尺其蹄如駝彭乘墨客揮犀云骨托禽出河州狀如雕高三尺余其名自呼能食鐵石宋祁唐書云開元初康國貢駝鳥卵鄭曉吾學編云洪武初三佛齊國貢火雞大於鶴長三四尺頸足亦似鶴鋭嘴軟紅冠毛色如青羊足二指利爪能傷人腹致死食火炭諸書所記稍有不同實皆一物也屎氣味無毒主治人誤吞鐵石入腹食之立消藏器鷹別録中品釋名角鷹綱目鷞鳩時珍曰鷹以膺擊故謂之鷹其頂有毛角故曰角鷹其性爽猛故曰鷞鳩昔少皞氏以鳥名官有祝鳩鳲鳩鶻鳩雎鳩鷞鳩五氏蓋鷹與鳩同氣禪化故得稱鳩也禽經云小而鷙者皆曰隼大而鷙者皆曰鳩是矣爾雅翼云在北為鷹在南為鷂一云大為鷹小為鷂梵書謂之嘶那夜集解時珍曰鷹出遼海者上北地及東北胡者次之北人多取雛養之南人八九月以媒取之乃鳥之疏暴者有雉鷹兔鷹其類以季夏之月習擊孟秋之月祭鳥隋魏彥深鷹賦頗詳其略云資金方之猛氣擅火德之炎精指重十字尾貴合盧嘴同鉤利腳等荊枯或白如散花或黑如點漆大紋若錦細斑似纈身重若金爪剛如鐵毛衣屢改厥色無常寅生酉就總號為黃二周作鴘三歲成蒼雌則體大雄則形小察之為易調之實難姜以取熱酒以排寒生於窟者好眠巢於木者常立雙骹長者起遲六翮短者飛急肉氣味缺主治食之治野狐邪魅藏器頭主治五痔燒灰飲服藥性治痔瘻燒灰入麝香少許酥酒服之治頭風眩暈一枚燒灰酒服時珍出王右軍法帖及溫隱居海上方附方新一頭目虛暈車風一個即鷹頭也去毛焙川芎一兩為末酒服三錢選奇嘴及爪主治五痔狐魅燒灰水服藏器睛主治和乳汁研之日三注眼中三日見碧霄中物忌烟熏藥性骨主治傷損接骨燒灰每服二錢酒服隨病上下食前食後時珍毛主治斷酒水煮汁飲即止酒也千金屎白氣味微寒有小毒主治傷撻滅痕別録燒灰酒服治中惡藥性燒灰酒服方寸匕主惡酒勿令飲人知蘇恭消虛積殺勞蟲去面皰䵟𪒟時珍發明弘景曰單用不能滅瘢須合殭蠶衣魚之屬為膏乃效附方舊二新四奶癖寇曰凡小兒脅下硬如有物乃俗名奶癖者也只服溫脾化積丸藥不可轉瀉用黃鷹屎白一錢密陀僧一兩舶上硫黃一分丁香二十一個為末每服一字三歲以上半錢用乳汁或白麵湯調下並不轉泄一復時取下青黑物後服補藥以醋石榴皮炙黑半兩蛜𧌴一分木香一分麝香半錢為末每服一字薄酒調下連吃二服面皰鷹屎白二分胡粉一分蜜和敷之外臺滅痕千金用鷹屎白和人精敷日三聖惠用鷹屎二兩殭蠶一兩半為末蜜和敷總録用鷹屎白白附子各一兩為末醋和敷日三五次痕滅止食哽鷹糞燒灰水服方寸匕外臺雕音凋綱目釋名鷲音就山海經鷻說文音團時珍曰禽經云鷹以膺之鶻以猾之隼以尹之雕以周之鷲以就之鷻以搏之皆言其擊搏之異也梵書謂之揭羅闍集解時珍曰雕似鷹而大尾長翅短土黃色鷙悍多力盤旋空中無細不睹皂雕即鷲也出北地色皂青雕出遼東最俊者謂之海東青羌鷲出西南夷黃頭赤目五色皆備雕類能搏鴻鵠獐鹿犬豕又有虎鷹翼廣丈餘能搏虎也鷹雕雖鷙而畏燕子物無大小也其翮可為箭羽劉郁西使記云皂雕一産三卵者內有一卵化犬短毛灰色與犬無異但尾背有羽毛數莖耳隨母影而走所逐無不獲者謂之鷹背狗骨氣味缺主治折傷斷骨燒灰每服二錢酒下在上食後在下食前骨即接如初時珍出接骨方發明時珍曰鷹鶚雕骨皆能接骨蓋鷙鳥之力在骨故以骨治骨從其類也屎主治諸鳥獸骨鯁燒灰酒服方寸匕時珍出外臺祕要鶚綱目釋名魚鷹禽經雕雞詩疏睢鳩周南王睢音疽沸波淮南子下窟烏時珍曰鶚狀可愕故謂之鶚其視睢健故謂之睢能入穴取食故謂之下窟烏翱翔水上扇魚令出故曰沸波禽經云王睢魚鷹也尾上白者名白鷢集解時珍曰鶚雕類也似鷹而土黃色深目好峙雄雌相得鷙而有別交則雙翔別則異處能翱翔水上捕魚食江表人呼為食魚鷹亦啖蛇詩云關關睢鳩在河之洲即此其肉腥惡不可食陸璣以為鷲揚雄以為白鷢黃氏以為杜鵑皆誤矣禽經云鳩生三子一為鶚鳩尸鳩也杜預以王睢為尸鳩或以此也骨主治接骨時珍附方新一接骨用下窟烏即鶚也取骨燒存性以古銅錢一個煅紅醋淬七次為末等分酒服一錢不可過多病在下空心在上食後服極有效驗須先夾縛定乃服此唐藺道人方嘴主治蛇咬燒存性研末一半酒服一半塗之時珍鴟別録下品釋名雀鷹詩疏鳶詩經鷣音淫隼本作隼音筍鷂時珍曰鴟鳶二字篆文象形一云鴟其聲也鳶攫物如射也隼擊物准也鷂目擊遙也詩疏云隼有數種通稱為鷂雀鷹春化布穀爾雅謂之茅鴟齊人謂之擊正或謂之題肩爾雅云鷣負雀也梵書謂之阿黎耶集解弘景曰鴟即俗呼老鴟者又有雕鶚並相似而大時珍曰鴟似鷹而稍小其尾如舵極善高翔專捉雞雀鴟類有數種按禽經云善摶者曰鶚竊玄者曰雕鴘曰鵕骨曰鶻了曰鷂展曰鸇奪曰鵽又云鶻生三子一為鴟鶻小於鴟而最猛捷能擊鳩鴿亦名鷸子一名籠脫鸇色青向風展翅迅搖搏捕鳥雀鳴則大風一名晨風鵽小於鸇其脰上下亦取鳥雀如攘掇也一名鷸子又月令二月鷹化為鳩七月鳩化為鷹列子云鷂為鸇鸇為布穀布穀復為鷂皆指此屬也隼鶻雖鷙而有義故曰鷹不擊伏隼不擊胎鶻握鳩而自暖乃至旦而見釋此皆殺中有仁也鴟頭修治弘景曰雖不限雌雄雄者當勝用須微炙不用蠹者古方治頭面方有鴟頭酒氣味咸平無毒時珍曰按段成式云唐肅宗張後專權每進酒置鴟腦於內云令人久醉健忘則鴟頭亦有微毒矣主治頭風目眩顛倒癇疾別録附方舊一新一癲癇瘛瘲飛鴟頭三枚鉛丹一斤為末蜜丸梧桐子大每酒服三丸日三次千金方旋風眩冒鴟頭丸用鴟頭一枚炒黃真蕳茹白朮各一兩川椒半兩微炒去汁為末蜜和丸梧桐子大每服食前以溫酒下二十丸聖惠肉氣味缺主治食之治癲癇孟詵食之消雞肉鵪鶉成積時珍骨主治鼻衄不止取老鴟翅關大骨微炙研末吹之時珍出聖濟總録鴟鵂拾遺釋名角鴟說文怪鴟爾雅雚音丸老兔爾雅鉤鵅音格鵋䳢音忌欺轂轆鷹蜀人所呼呼咵鷹楚人所呼夜食鷹吳人所呼時珍曰其狀似鴟而有毛角故曰鴟曰角曰雚雚字象鳥頭目有角形也老兔象頭目形鵂怪皆不祥也鉤鵅轂轆呼咵皆其聲似也蜀人又訛鉤格為鬼各哥集解藏器曰鉤鵅即爾雅鵋䳢也江東呼為鉤鵅其狀似鴟有角怪鳥也夜飛晝伏入城城空入室室空常在一處則無害若聞其聲如笑者宜速去之北土有訓狐二物相似各有其類訓狐聲呼其名兩目如貓兒大於鴝鵒作笑聲當有人死又有鵂鶹亦是其類微小而黃夜能入人家拾人手爪知人吉凶有人獲之嗉中猶有爪甲故除爪甲者埋之戶內為此也時珍曰此物有二種鴟鵂大如鴟鷹黃黑斑色頭目如貓有毛角兩耳晝伏夜出鳴則雌雄相喚其聲如老人初若呼後若笑所至多不祥莊子云鴟鵂夜拾蚤察毫末晝出瞋目而不見丘山何承天纂文云鴟鵂白日不見人夜能拾蚤蝨俗訛蚤為人爪妄矣一種鵂鶹大如鴝鵒毛色如鷂頭目亦如貓鳴則後竅應之其聲連轉如雲休留休留故名曰鵂鶹江東呼為車載板楚人呼為快扛鳥蜀人呼為春哥兒皆言其鳴主有人死也試之亦驗說文謂之䲵音爵言其小也藏器所謂訓狐者乃梟也所謂鵂鶹者乃鴟鵂之小者也並誤矣周禮硩蔟氏掌覆夭鳥之巢以方書十日之號十二支之號十二月之號十二歲之號二十有八宿之號懸其巢則去續博物志云鵂鶹鸛鵲其抱以聒肉氣味缺主治瘧疾用一隻去毛腸油炸食之時珍出陰憲副方附方新一風虛眩暈大頭鷹閉殺去毛煮食以骨燒存性酒服便民食療肝主治入法術家用時珍梟拾遺釋名梟鴟音嬌土梟爾雅山梟晉灼雞梟十六國史鵩漢書訓狐拾遺流離詩經𩴂魂時珍曰梟梟訓狐其聲也鵩其色如服色也俚人訛訓狐為幸胡者是也鴟與梟二物也周公合而詠之後人遂以鴟梟為一鳥誤矣𩴂字韻書無考當作胸擁切𩴂魂流離言其不祥也吳球方作逐魂梟長則食母故古人夏至磔之而其字從鳥首在木上集解藏器曰梟即梟也一名鵩吳人呼為𩴂魂惡聲鳥也賈誼云鵩似梟其實一物也入室主人當去此鳥盛午不見物夜則飛行常入人家捕鼠食周禮硩蔟氏掌覆夭鳥之巢注云惡鳴之鳥若梟鵩鬼車之屬時珍曰梟鵩鵂鶹梟皆惡鳥也說者往往混注賈誼謂鵩似梟藏器謂梟與訓狐為二物許慎張華謂梟鵩鵂鶹為一物王逸謂鵩即訓狐陳正敏謂梟為伯勞宗懍謂土梟為鴝鵒各執一說今通考據並咨詢野人則梟梟鵩訓狐一物也鵂鶹一物也藏器所謂訓狐之狀者鵂鶹也梟即今俗所呼幸胡者是也處處山林時有之少美好而長醜惡狀如母雞有斑紋頭如鴝鵒目如貓目其名自呼好食桑椹古人多食之故禮云不食梟胖謂脅側薄弱也莊子云見彈而求梟炙前涼録云張天錫言北方美物桑椹甘香雞梟革饗皆指此物也按巴蜀異物志云鵩如小雞體有文色土俗因名之不能遠飛行不出域盛弘之荊州記云巫縣有鳥如雌雞其名為梟楚人謂之鵩陸璣詩疏云梟大如鳩緑色入人家凶賈誼所賦鵩是也其肉甚美可為羹臛炙食劉恂嶺表録異云北方梟鳴人以為怪南中晝夜飛鳴與烏鵲無異桂林人家家羅取使捕鼠以為勝貍也合諸說觀之則梟鵩訓狐之為一物明矣又按郭義恭廣志云梟楚鳩所生也不能滋乳如騾駏驉焉然梟長則食母是自能孳乳矣抑所食者即鳩耶淮南萬畢術云甑瓦投之能止梟鳴性相勝也肉氣味甘溫無毒主治鼠瘻炙食之藏器風癇噎食病時珍附方新二風癇考寶鑑第九卷名神應丹惺神散醫方大成下冊噎食取鵩鳥未生毛者一對用黃泥固濟煅存性為末每服一匙以溫酒服壽域神方頭主治痘瘡黑陷用臘月者一二枚燒灰酒服之當起時珍出雲歧子保命集目主治吞之令人夜見鬼物藏器鴆音沉去聲別録下品校正自有名未用移入此釋名䲰日與運日同別録同力鳥陶弘景集解別録曰鴆生南海弘景曰鴆與䲰日是兩種鴆鳥狀如孔雀五色雜斑高大黑頸赤喙出廣之深山中䲰日狀如黑傖雞作聲似云同力故江東人呼為同力鳥並啖蛇人誤食其肉立死並療蛇毒昔人用鴆毛為毒酒故名鴆酒頃不復爾又海中有物赤色狀如龍名海姜亦有大毒甚於鴆羽恭曰鳩鳥商州以南江嶺間大有人皆諳識其肉腥有毒不堪啖云羽畫酒殺人亦是浪證按玉篇引郭璞云鴆大如雕長頸赤喙食蛇說文廣雅淮南子皆以鴆為䲰日交廣人亦云䲰日即鴆一名同力鳥更無如孔雀者陶為人所誑也時珍曰按爾雅翼云鴆似鷹而大狀如梟紫黑色赤喙黑目頸長七八寸雄名運日雌名陰諧運日鳴則晴陰諧鳴則雨食蛇及橡實知木石有蛇即為禹步以禁之須臾木倒石崩而蛇出也蛇入口即爛其屎溺著石石皆黃爛飲水處百蟲吸之皆死惟得犀角即解其毒又楊廉夫鐵崖集云鴆出蘄州黃梅山中狀類訓狐聲如擊腰鼓巢於大木之顛巢下數十步皆草不生也毛氣味有大毒入五臟爛殺人別録喙主治帶之殺蝮蛇毒別録時珍曰蛇中人刮末塗之登時愈也姑獲鳥拾遺釋名乳母鳥玄中記夜行遊女同天帝少女同無辜鳥同隱飛玄中記鬼鳥拾遺譩嘻杜預左傳注鉤星歲時記時珍曰昔人言此鳥産婦所化陰慝為妖故有諸名集解藏器曰姑獲能收人魂魄玄中記云姑獲鳥鬼神類也衣毛為飛鳥脫毛為女人云是産婦死後化作故胸前有兩乳喜取人子養為己子凡有小兒家不可夜露衣物此鳥夜飛以血點之為志兒輒病驚癇及疳疾謂之無辜疳也荊州多有之亦謂之鬼鳥周禮庭氏以救日之弓救月之矢射夭鳥即此也時珍曰此鳥純雌無雄七八月夜飛害人尤毒也治鳥綱目集解時珍曰按干寶搜神記云越地深山有治鳥大如鳩青色穿樹作窠大如五六升器口徑數寸飾以土堊赤白相間狀如射侯伐木者見此樹即避之犯之則能役虎害人燒人廬舍白日見之鳥形也夜聞其鳴鳥聲也時或作人形長三尺入澗中取蟹就人間火炙食山人謂之越祝之祖又段成式酉陽雜俎云俗說昔有人遇洪水食都樹皮餓死化為此物居樹根者為豬都居樹中者為人都居樹尾者為鳥都鳥都左脅下有鏡印闊二寸一分南人食其窠味如木芝也竊謂獸有山都山𤢖木客而鳥亦有治鳥山蕭木客鳥此皆戾氣所賦同受而異形者歟與今附於下附録木客鳥時珍曰按異物志云木客鳥大如鵲千百為群飛集有度俗呼黃白色有翼有綬飛獨高者為君長居前正赤者為五伯正黑者為鈴下緗色雜赤者為功曹左脅有白帶者為主簿各有章色廬陵郡東有之獨足鳥一名山蕭鳥廣州志云獨足鳥閩廣有之大如鵠其色蒼其聲自呼臨海異物志云獨足文身赤口晝伏夜飛或時晝出群鳥噪之惟食蟲豸不食稻粱聲如人嘯將雨轉鳴即孔子所謂一足之鳥商羊者也山海經云羭次之山有鳥狀如梟人面而一足名曰橐蜚音肥冬則蟄服之不畏雷孫愐唐韻云𪂅土精也似雁一足黃色毀之殺人窠表主治作履屜治腳氣時珍出酉陽雜俎鬼車鳥拾遺釋名鬼鳥拾遺九頭鳥同上蒼鸆白澤圖奇鶬時珍曰鬼車妖鳥也取周易載鬼一車之義似鶬而異故曰奇鶬集解藏器曰鬼車晦瞑則飛鳴能入人家收人魂氣相傳此鳥昔有十首犬齧其一猶餘九首其一常滴血血著人家則凶荊楚人夜聞其飛鳴但滅燈打門捩狗耳以厭之言其畏狗也白澤圖蒼鸆有九首及孔子與子夏見奇鶬九首皆此物也荊楚歲時記以為姑獲者非矣二鳥相似故同名鬼鳥時珍曰鬼車狀如鵂鶹而大者翼廣丈許晝盲夜了見火光輒墮按劉恂嶺表録異云鬼車出秦中而嶺外尤多春夏之交稍遇陰晦則飛鳴而過聲如刀車鳴愛入人家鑠人魂氣血滴之家必有凶咎便民圖纂云冬月鬼車夜飛鳴聲自北而南謂之出巢主雨自南而北謂之歸巢主晴周密齊東野語云宋李壽翁守長沙曾捕得此鳥狀類野鳧赤色身圓如箕十頸環簇有九頭其一獨無而滴鮮血每頸兩翼飛則霍霍並進又周漢公主病此鳥飛至砧石即薨嗚呼怪氣所鍾妖異如此不可不知諸鳥有毒拾遺凡鳥自死目不閉自死足不伸白鳥玄首玄鳥白首三足四距六指四翼異形異色並不可食食之殺人
