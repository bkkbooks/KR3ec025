body:
  text: 獸部第五十卷李時珍曰獸者四足而毛之總稱地産也豢養者謂之畜素問曰五畜為益是矣周制庖人供六畜馬牛雞羊犬豕六獸麋鹿狼麇免野豕也辨其死生鮮薧之物獸人辨其名物凡祭祀賓客供其死獸生獸皮毛筋骨人於玉府冥氏攻猛獸穴氏攻蟄獸嗚呼聖人之於養生事死辨物用物之道可謂慎且備矣後世如黃羊黃鼠今為御供犏尾貂皮盛為時用山獺之異狗寶之功皆服食所須而典籍失載羵羊之問宣父獨知鼨鼠之對終軍能究地生之羊彭侯之肉非博雅君子孰能別之況物之性理萬殊人之用舍宜慎蓋不但多識其名而已也於是集諸獸之可供膳食藥物服器者為獸類凡八十六種分為五類曰畜曰獸曰鼠曰寓爾雅釋獸有鼠屬寓屬邢昺注曰猴類漸肖於人寄寓山林故曰寓屬曰怪舊本獸部三品共五十八種今併入五種移一種入鱗部一種入禽部自蟲部移入三種神農本草經一十五種梁陶弘景注名醫別録一十一種梁陶弘景注唐本草八種唐蘇恭本草拾遺一十六種唐陳藏器炮炙論一種劉宋雷斆蜀本草一種蜀韓保升開寶本草四種宋馬志嘉祐本草一種宋掌禹錫圖經本草一種宋蘇頌證類本草一種宋唐慎微本草衍義一種宋寇宗奭日用本草一種元吳瑞食物本草一種明汪穎食鑑本草一種明寧源本草綱目二十三種明李時珍附注魏李當之藥録吳普本草宋雷斆炮炙齊徐之才藥對唐甄權藥性孫思邈千金唐李珣海藥楊損之刪繁蕭炳四聲唐孟詵食療南唐陳士良食性宋人大明日華金張元素珍珠囊李杲法象王好古湯液元朱震亨補遺明汪機會編王綸集要陳嘉謨蒙詮獸之一畜類二十八種豕本經下品釋名豬本經豚同上豭音加彘音滯豶音墳時珍曰按許氏説文云豕字象毛足而後有尾形林氏小説云豕食不潔故謂之豕坎為豕水畜而性趨下喜穢也牡曰豭曰牙牝曰彘曰豝音巴曰䝏音婁牡去勢曰豶四蹄白曰豥豬高五尺曰豟音厄豕之子曰豬曰豚曰豰音斛一子曰特二子曰師三子曰豵末子曰麼生三月曰豨六月曰豵何承天纂文云梁州曰䝕音攝河南曰彘吳楚曰豨音喜漁陽以大豬為豝齊徐以小豬為䝒音鋤頌曰按揚雄方言曰燕朝鮮之間謂豬為豭關東西謂之彘或曰豕南楚曰豨吳揚之間曰豬子其實一種也禮記謂之剛鬣崔豹古今注謂之參軍集解頌曰凡豬骨細少筋多膏大者有重百餘斤食物至寡故人畜養之甚易生息時珍曰豬天下畜之而各有不同生青兗徐淮者耳大生燕冀者皮厚生梁雍者足短生遼東者頭白生豫州者咮短生江南者耳小謂之江豬生嶺南者白而極肥豬孕四月而生在畜屬水在卦屬坎在禽應室星豭豬肉氣味酸冷無毒凡豬肉苦微寒有小毒江豬肉酸平有小毒豚肉辛平有小毒別録曰豭豬肉治狂病凡豬肉能閉血脈弱筋骨虛人肌不可久食病人金瘡者尤甚思邈曰凡豬肉久食令人少子精發宿病豚肉久食令人遍體筋肉碎痛乏氣鼎曰江豬多食令人體重作脯少有腥氣詵曰久食殺藥動風發疾傷寒瘧痢痰痼痔漏諸疾食之必再發時珍曰北豬味薄煮之汁清南豬味厚煮之汁濃毒尤甚入藥用純黑豭豬凡白豬花豬豥豬牝豬病豬黃膘豬米豬並不可食黃膘煮之汁黃米豬肉中有米説文豕食於星下則生息米周禮豕盲視而交睫者星皆指此也反烏梅桔梗黃連胡黃連犯之令人瀉利及蒼耳令人動風合生薑食生面皯發風合蕎麥食落毛髮患風病合葵菜食少氣合百花菜吳茱萸食發痔疾合胡荽食爛人臍合牛肉食生蟲合羊肝雞子鯽魚豆黃食滯氣合龜鱉肉食傷人凡煮豬肉得皂莢子桑白皮高良薑黃蠟不發風氣得舊籬篾易熟也主治療狂病久不愈別録壓丹石解熱毒宜肥熱人食之拾遺補腎氣虛竭千金療水銀風並中土坑惡氣日華發明時珍曰按錢乙治小兒疳病麝香丸以豬膽和丸豬肝湯服疳渴者以豬肉湯或燖豬湯服其意蓋以豬屬水而氣寒能去火熱耶弘景曰豬為用最多惟肉不宜多食令人暴肥蓋虛肌所致也震亨曰豬肉補氣世俗以為補陰誤矣惟補陽爾今之虛損者不在陽而在陰以肉補陰是以火濟水蓋肉性入胃便作濕熱熱生痰痰生則氣不降而諸證作矣諺云豬不薑食之發大風中年氣血衰面發黑皯也韓懋曰凡肉有補惟豬肉無補人習之化也附方舊五新十五噤口痢疾臘肉脯煨熟食之妙李樓奇方小兒刮腸痢疾噤口閉目至重者精豬肉一兩薄切炙香以膩粉末半錢鋪上令食或置鼻頭聞香自然要食也活幼口議上氣咳嗽煩滿氣喘用豬肉切作䭔子豬脂煎熟食之心鏡浮腫脹滿不食心悶用豬脊肉一雙切作生以蒜薤食之心鏡身腫攻心用生豬肉以漿水洗壓干切膾蒜薤啖之一日二次下氣去風乃外國方也張文仲方破傷風腫新殺豬肉乘熱割片貼患處連換三片其腫立消簡便白虎風病用豬肉三串以大麻子一合酒半盞相和口含噀上將肉擘向病處咒曰相州張如意張得興是汝白虎本師急出乃安肉於床下瘥則送於路神驗近效風狂歌笑行走不休用豭豬肉一斤煮熟切膾和醬醋食或羹粥炒任服之食醫心鏡解丹石毒發熱困篤用肥豬肉五斤蔥薤各半斤煮食或作臛食必腹鳴毒下以水淘之得石沙石盡則愈千金方解鍾乳毒下利不止食豬肉則愈千金翼服石英法白石英一大兩袋盛水三斗煎四升去石以豬肉一斤細切椒蔥鹽豉煮食十日一作外臺傷損不食凡打撲傷損三五日水食不入口用生豬肉二大錢打爛溫水洗去血水再擂爛以陰陽湯打和以半錢用雞毛送入咽內卻以陰陽湯灌下之其食蟲聞香拱開瘀血而上胸中自然開解此乃損血凝聚心間蟲食血飽他物蟲不來探故也謂之騙通之法邵氏打傷青腫炙豬肉熱拓之千金小兒重舌取三家屠肉切指大摩舌上兒立啼千金方小兒痘瘡豬肉煮汁洗之談氏方小兒火丹豬肉切片貼之漆瘡作癢宜啖豬肉嚼穄谷塗之千金男女陰蝕肥豬肉煮汁洗不過二十斤瘥千金方山行闢蛭山水中草木上有石蛭著人足則穿肌入肉中害人但以臘豬膏和鹽塗足脛趾即不著人也千金方竹刺入肉多年燻肉切片包裹之即出救急方豭豬頭肉以下並用豭豬者良豶豬亦可氣味有毒時珍曰按生生編云豬肉毒惟在首故有病者食之生風發疾主治寒熱五癃鬼毒千金同五味煮食補虛乏氣力去驚癇五痔下丹石亦發風氣食療臘豬頭燒灰治魚臍瘡發明時珍曰按名醫録云學究任道病體瘡腫黑狀狹而長北醫王通曰此魚臍瘡也一因風毒蘊結二因氣血凝滯三因誤食人汗而然乃以一異散敷之日數易而愈懇求其方曰但雪玄一味耳任遍訪四方無知之者有名醫郝允曰聖惠方治此用臘豬頭燒灰雞卵白調敷即此也又圖纂云五月戊辰日以豬頭祀灶所求如意以臘豬耳懸梁上令人豐足此亦厭禳之物也項肉俗名槽頭肉肥脆能動風主治酒積面黃腹脹以一兩切如泥合甘遂末一錢作丸紙裹煨香食之酒下當利出酒布袋也時珍出普濟脂膏修治時珍曰凡凝者為肪為脂釋者為膏為油臘月煉淨收用恭曰十二月上亥日取入新瓶埋亥地百日用之名膒脂每升入雞子白十四枚更良弘景曰勿令中水臘月者歷年不壞項下膏謂之負革肪入道家煉五金用氣味甘微寒無毒反烏梅梅子主治煎膏藥解斑蝥芫青毒別録解地膽亭長野葛硫黃毒諸肝毒利腸胃通小便除五疸水腫生毛髮時珍破冷結散宿血孫思邈利血脈散風熱潤肺入膏藥主諸瘡蘇頌殺蟲治皮膚風塗惡瘡日華治癰疽蘇恭悅皮膚作手膏不皸裂陶弘景胎産衣不下以酒多服佳徐之才鬐膏生髮悅面別録附方舊八新二十五傷寒時氣豬膏如彈丸溫水化服日三次肘後方五種疸疾黃疸谷疸酒疸黑疸女勞疸黃汗如黃柏汁用豬脂一斤溫熱服日三當利乃愈肘後方赤白帶下煉豬脂三合酒五合煎沸頓服千金方小便不通豬脂一斤水二升煎三沸飲之立通千金方關格閉塞豬脂薑汁各二升微火煎至二升下酒五合和煎分服千金痘瘡便祕四五日用肥豬膘一塊水煮熟切如豆大與食自然臟腑滋潤痂疕易落無損於兒陳文中方卒中五尸仲景用豬脂一雞子苦酒一升煮沸灌之肘後方中諸肝毒豬膏頓服一升千金方食發成症心腹作痛咽間如有蟲上下嗜食與油者是也用豬脂二升酒三升煮三沸服日三次同上上氣咳嗽豬肪四兩煮百沸以來切和醬醋食之心鏡肺熱暴喑豬脂油一斤煉過入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈無疾常服亦潤肺萬氏方小兒噤風小兒百日內風噤口中有物如蝸牛或如黃頭白蟲者薄豬肪擦之即消聖惠方小兒蛔病羸瘦豬膏服之千金方産後虛汗豬膏薑汁白蜜各一升酒五合煎五上五下每服方寸匕千金翼胞衣不下豬脂一兩水一盞煎五七沸服之當下聖惠方吹奶寒熱用豬肪冷水浸拓熱即易之立效子母祕録發落不生以酢泔洗淨布揩令熱以臘豬脂入細研鐵上生衣煮三沸塗之遍生千金翼冬月唇裂煉過豬脂日日塗之十便良方熱毒攻手腫痛欲脫豬膏和羊屎塗之外臺手足皴破豬脂著熱酒中洗之千金方代指疼痛豬膏和白墡土敷之肘後方口瘡塞咽用豬膏白蜜各一斤黃連末一兩合煎取汁熬稠每含如半棗許日四五夜二千金疥瘡有蟲豬膏煎芫花塗之肘後鼠瘻瘰癧用豬膏淹生地黃煎六七沸塗之千金漏瘡不合以紙紝黏臘豬脂納瘡中日五夜三千金翼漆瘡作癢豬膏頻塗之千金咽喉骨鯁吞脂膏一團不瘥更吞之千金方身面疣目以豬脂揩之令血出少許神驗不可加千金誤吞針釘豬脂多食令飽自然裹出普濟方雜物入目豬脂煮取水面如油者仰臥去枕點鼻中不過數度與物俱出聖惠方蜈蚣入耳炙豬肪肉令香掩耳自出梅師蟲蟻入耳方法同上發背髮乳豬脂切片冷水浸貼日易四五十片甚妙急救方腦氣味甘寒有毒時珍曰禮記云食豚去腦孫真人食忌云豬腦損男子陽道臨房不能行事酒後尤不可食延壽書云今人以鹽酒食豬腦是自引賊也主治風眩腦鳴凍瘡別録主癰腫塗紙上貼之干則易治手足皸裂出血以酒化洗並塗之時珍附方新一喉痹已破瘡口痛者豬腦髓蒸熟入薑醋吃之即愈普濟方髓氣味甘寒無毒主治撲損惡瘡頌塗小兒解顱頭瘡及臍腫眉瘡瘑疥服之補骨髓益虛勞時珍發明時珍曰按丹溪治虛損補陰丸多用豬脊髓和丸取其通腎命以骨入骨以髓補髓也附方新七骨蒸勞傷豬脊髓一條豬膽汁一枚童便一盞柴胡前胡胡黃連烏梅各一錢韭白七根同煎七分溫服不過三服其效如神瑞竹堂方小兒解顱豬牙車骨煎取髓敷日三千金方小兒臍腫豬頰車髓十八銖杏仁半兩研敷千金小兒眉瘡豬頸骨髓六七枚白膠香二錢同入銅器熬稠待冷為末麻油調塗小兒瘑瘡豬牙車骨年久者捶碎炙令髓出熱取塗之小品小兒頭瘡豬筒骨中髓和膩粉成劑復納骨中火中煨香取出研末先溫鹽水洗淨敷之亦治肥瘡出汁普濟方小兒疳瘡方同上血氣味咸平無毒思邈曰澀平時珍曰服地黃何首烏諸補藥者忌之云能損陽也同黃豆食滯氣主治生血療賁豚暴氣及海外瘴氣日華中風絶傷頭風眩暈及淋瀝蘇恭猝下血不止清酒和炒食之思邈清油炒食治嘈雜有蟲時珍壓丹石解諸毒吳瑞發明時珍曰按陳自明云婦人嘈雜皆血液淚汗變而為痰或言是血嘈多以豬血炒食而愈蓋以血導血歸原之意爾此固一説然亦有蛔蟲作嘈雜者蟲得血腥則飽而伏也附方新五交接陰毒腹痛欲死豭豬血乘熱和酒飲之肘後中滿腹脹旦食不能暮食用不著鹽水豬血漉去水曬乾為末酒服取泄甚效李樓奇方杖瘡血出豬血一升石灰七升和劑燒灰再以水和丸又燒凡三次為末敷之效外臺中射罔毒豬血飲之即解肘後蜈蚣入腹豬血灌之或飽食少頃飲桐油當吐出心血主治調硃砂末服治驚癇癲疾吳瑞治猝惡死及痘瘡倒靨時珍發明時珍曰古方治驚風癲癇痘疾多用豬心血蓋以心歸心以血導血之意用尾血者取其動而不息也豬為水畜其血性寒而能解毒制陽故也韓飛霞雲豬心血能引藥入本經實非其補沈存中雲豬血得龍腦直入心經是矣附方新三心病邪熱蕊珠丸用豬心一個取血靛花末一匙硃砂末一兩同研丸梧桐子大每酒服二十丸奇效痘瘡黑陷臘月收豶豬心血瓶盛挂風處干之每用一錢入龍腦少許研勻溫酒調服須臾紅活神效無干血用生血沈存中方婦人催生開骨膏用豬心血和乳香末丸梧桐子大硃砂為衣面東酒吞一丸未下再服婦人良方尾血主治痘瘡倒靨用一匙調龍腦少許新汲水服又治猝中惡死時珍附方舊一新一猝中惡死斷豬尾取血飲並縛豚枕之即活此乃長桑君授扁鵲法也出魏夫人傳肘後方蛇入七孔割母豬尾血滴入即出也千金方心氣味甘咸平無毒頌曰多食耗心氣不可合吳茱萸食主治驚邪憂恚別録虛悸氣逆婦人産後中風血氣驚恐思邈補血不足虛劣蘇頌五臟主小兒驚癇出汗蘇恭發明劉完素曰豬水畜也故心可以鎮恍惚附方舊一新三心虛自汗不睡者用獖豬心一個帶血破開入人參當歸各二兩煮熟去藥食之不過數服即愈證治要訣心虛嗽血沉香末一錢半夏七枚入豬心中以小便濕紙包煨熟去半夏食之證治要訣産後風邪心虛驚悸用豬心一枚五味豉汁煮食之心鏡急心疼痛豬心一枚每歲入胡椒一粒同鹽酒煮食肝入藥用子肝氣味苦溫無毒時珍曰餌藥人不可食之合魚鱠食生癰疽合鯉魚腸魚子食傷人神合鵪鶉食生面皯延壽書云豬臨殺驚氣入心絶氣歸肝俱不可多食必傷人主治小兒驚癇蘇恭切作生以薑醋食主腳氣當微泄若先利即勿服藏器治冷勞臟虛冷泄久滑赤白乳婦赤白帶下以一葉薄批搵著訶子末炙之再搵再炙盡末半兩空腹細嚼陳米飲送下蘇頌補肝明目療肝虛浮腫時珍發明時珍曰肝主藏血故諸血病用為嚮導入肝千金翼治痢疾有豬肝丸治脫肛有豬肝散諸眼目方多有豬肝散皆此意也附方舊七新七休息痢疾獖豬肝一具切片杏仁炒一兩於淨鍋內一重肝一重杏仁入童子小便二升文火煎乾取食日一次千金浮腫脹滿不下食心悶豬肝一具洗切著蔥豉薑椒炙食之或單煮羹亦可心鏡身面猝腫生豬肝一具細切醋洗入蒜醋食之勿用鹽肘後方腫自足起方法同上心鏡風毒腳氣豬肝作生膾食之取利千金翼水腫溲澀豬肝尖三塊緑豆四撮陳倉米一合同水煮粥食毒從小便出也中蠱腹痛支太醫祕方以豬肝一具蜜一升共煎分二十服或為丸服肘後食即汗出乃脾胃氣虛也豬肝一斤薄切瓦上曝乾為末煮白粥布絞汁和衆手丸梧桐子大空心飲下五十丸日五心鏡目難遠視肝虛也豬肝一具細切去皮膜蔥白一握用豉汁作羹待熟下雞子三個食之普濟方肝熱目赤磣痛用豬肝一具薄切水洗淨以五味食之食醫心鏡牙疳危急豬肝一具煮熟蘸赤芍藥末任意食之後服平胃散二三貼即效節要女人陰癢炙豬肝納入當有蟲出肘後打擊青腫炙豬肝貼之千金急勞瘦悴日晚即寒熱驚悸煩渴用獖豬肝一具切絲生甘草末十五兩於鐺中布肝一重摻甘草末一重以盡為度取童便五升文武火煮乾搗爛衆手丸梧桐子大每空心米飲下二十丸漸加至三十丸聖濟總録脾俗名聯貼氣味澀平無毒時珍曰諸獸脾味如泥其屬土也可驗思邈曰凡六畜脾人一生莫食之主治脾胃虛熱同陳橘紅人參生薑蔥白陳米煮羹食之蘇頌附方新二脾積痞塊豬脾七個每個用新針一個刺爛以皮硝一錢擦之七個並同以瓷器盛七日鐵器焙乾又用水紅花子七錢同搗為末以無灰酒空心調下一年以下者一服可愈五年以下者二服十年以下者三服保壽堂方瘧發無時胡椒吳茱萸高良薑各二錢為末以豬脾一條作膾炒熟一半滾藥一半不滾以墨記定並作餛飩煮熟有藥者吞之無藥者嚼下一服效衛生家寶方肺氣味甘微寒無毒頌曰得大麻仁良不與白花菜合食令人氣滯發霍亂思邈曰八月和飴食至冬發疽主治補肺蘇頌療肺虛咳嗽以一具竹刀切片麻油炒熟同粥食又治肺虛嗽血煮蘸薏苡仁末食之時珍出要訣諸方腎俗名腰子氣味咸冷無毒思邈曰平日華曰雖補腎而久食令人少子詵曰久食令人傷腎頌曰冬月不可食損人真氣兼發虛壅主治理腎氣通膀胱別録補膀胱水臟暖腰膝治耳聾日華補虛壯氣消積滯蘇頌除冷利孫思邈止消渴治産勞虛汗下痢崩中時珍發明時珍曰豬腎別録謂其理腎氣通膀胱日華亦曰補水臟膀胱暖腰膝而又曰雖補腎久食令人少子孟詵亦曰久食令人腎虛兩相矛盾如此何哉蓋豬腎性寒不能補命門精氣方藥所用借其引導而已別録理字通字最為有理日華暖腰膝補膀胱水臟之説為非矣腎有虛熱者宜食之若腎氣虛寒者非所宜矣今人不達此意往往食豬腎為補不可不審又千金治消渴有豬腎薺苨湯補腎虛勞損諸病有腎瀝湯方甚多皆用豬羊腎煮湯煎藥俱是引導之意附方舊四新十九腎虛遺精盜汗夜夢鬼交用豬腎一枚切開去膜入附子末一錢濕紙裹煨熟空心食之飲酒一杯不過三五服效經驗方腎虛陰痿羸瘦精衰少力用獖豬腎一對去脂膜切片枸杞葉半斤以豉汁二盞半相和同椒鹽蔥煮羹空腹食經驗後方腎虛腰痛用豬腰子一枚切片以椒鹽淹去腥水入杜仲末三錢在內荷葉包煨食之酒下本草權度閃肭腰痛用獖豬腎一枚批片鹽椒淹過入甘遂末三錢荷葉包煨熟食酒送下儒門事親老人耳聾豬腎一對去膜切以粳米二合蔥白二根薤白七根人參二分防風一分為末同煮粥食奉親養老方老人腳氣嘔逆者用豬腎一對以酣蒜五味治食之日作一服或以蔥白粳米同煮粥食亦可奉親養老方卒然腫滿用豬腎批開入甘遂末一錢紙裹煨熟食以小便利為效否則再服肘後方肘傷冷痛豬腎一對桂心二兩水八升煮三升分三服肘後猝得咳嗽豬腎二枚細切乾薑三兩末水七升煮二升稍服取汗肘後方久嗽不瘥豬腎二枚去脂膜入椒四七粒開口者水煮啖之張文仲方心氣虛損豬腰子一枚水二碗煮至一碗半切碎入人參當歸各半兩煮至八分吃腰子以汁送下未盡者同滓作丸服百一選方酒積面黃腹脹不消豬腰子一個批開七刀葛根粉一錢摻上合定每邊炙三遍半手扯作六塊空心吃之米湯送下普濟方久泄不止豬腎一個批開摻骨碎補末煨熟食之神效瀕湖集簡方赤白下痢腰痛用豬腎二枚研爛入陳皮椒醬作餛飩空心食之食醫心鏡赤白帶下常炙豬腎食之張文仲方崩中漏下方同上産後蓐勞寒熱用豬腎一對切細片以鹽酒拌之先用粳米一合蔥椒煮粥鹽醋調和將腰子鋪於盆底以熱粥傾於上蓋之如作盦生粥食之濟生産後虛汗發熱肢體疼痛亦名蓐勞永類鈐方用豬腎一對切水三升粳米半合椒鹽蔥白煮粥食梅師用豬腎同蔥豉米和成作稀臛食之小兒躽啼小兒五十日以來胎寒腹痛躽啼上視聚唾弄舌微熱而驚此癇候也豬腎一具當歸一兩焙以清酒一升煮七合每以杏仁大與咽之日三夜一聖惠方小兒頭瘡豬腰子一個批開去心膜入五倍子輕粉末等分在內以沙糖和麵固濟炭火炙焦為末清油調塗經驗良方傳尸勞瘵豬腰子一對童子小便二盞無灰酒一盞新瓷瓶盛之泥封炭火溫養自戌至子時止待五更初溫熟取開飲酒食腰子病篤者只一月效平日瘦怯者亦可用之蓋以血養血絶勝金石草木之藥也邵真人經驗方癰疽發背初起者用獖豬腰子一雙同飛面搗如泥塗之即愈𦚟音夷亦作胰時珍曰一名腎脂生兩腎中間似脂非脂似肉非肉乃人物之命門三焦發原處也肥則多瘦則少蓋頤養賴之故謂之𦚟氣味甘平微毒頌曰男子多食損陽主治肺痿咳嗽和棗肉浸酒服亦治痃癖羸瘦藏器又合膏練繒帛療肺氣干脹喘急潤五臟去皴疱皯𪒟殺斑蝥地膽亭長等毒治冷痢成虛蘇頌一切肺病咳嗽膿血不止以薄竹筒盛於煻火中煨熟食上啖之良心鏡通乳汁之才附方舊二新九豬胰酒治冷痢久不瘥此是脾氣不足暴冷入脾舌上生瘡飲食無味或食下還吐小腹雷鳴時時心悶干皮細起膝脛痠痛羸瘦漸成鬼氣及婦人血氣不通逆飯憂煩四肢無力丈夫痃癖兩肋虛脹變為水氣服之皆效此法出於傳尸方取豬胰一具細切與青蒿葉相和以無灰酒一大升微火溫之乘熱納胰中暖使消盡又取桂心末一小兩納酒中每旦溫服一小盞午夜各再一服甚驗忌熱面油膩等食崔元亮海上方膜內氣塊豬𦚟一具炙蘸玄胡索末食之衛生易簡方肺氣咳嗽豬胰一具薄切苦酒煮食不過二服肘後方二十年嗽豬胰三具大棗百枚酒五升漬之秋冬七日春夏五日絞去滓七日服盡忌鹽同上遠年肺氣豬胰一具去脂細切膩粉一兩瓷瓶固濟上留小竅煅煙盡為末每服二錢空心漿水下聖濟總録服石發熱豬腎脂一具勿中水以火炙取汁每服三合日夜五六服石隨大便下總録撥雲去翳用豬胰子一枚五錢蕤仁五分青鹽一錢共搗千下令如泥每點少許取下膜翳為效孫氏集效方赤白癜風豬胰一具酒浸一時飯上蒸熟食不過十具壽域方面粗醜黑皮厚皯𪒟者豬胰五具蕪青子二兩杏仁一兩土瓜根一兩淳酒浸之夜塗旦洗老者少黑者白神驗肘後手足皴裂以酒挼豬胰洗並敷之肘後唇燥緊裂豬胰浸酒搽之葉氏摘玄方肚氣味甘微溫無毒主治補中益氣止渴斷暴痢虛弱別録補虛損殺勞蟲釀黃糯米蒸搗為丸治勞氣並小兒疳蛔黃瘦病日華主骨蒸熱勞血脈不行補羸助氣四季宜食蘇頌消積聚癥瘕治惡瘡吳普發明時珍曰豬水畜而胃屬土故方藥用之補虛以胃治胃也附方舊二新九補益虛羸用豬肚一具入人參五兩蜀椒一兩乾薑一兩半蔥白七個粳米半升在內密縫煮熟食千金翼水瀉不止用獖豬肚一枚入蒜煮爛搗膏丸梧桐子大每鹽湯或米飲服三十丸丁必卿雲豫每日五更必水瀉一次百藥不效用此方入平胃散末三兩丸服遂安普濟消渴飲水日夜飲水數斗者心鏡用雄豬肚一枚煮取汁入少豉渴即飲之肚亦可食煮粥亦可仲景豬肚黃連丸治消渴用雄豬肚一枚入黃連末五兩栝蔞根白粱米各四兩知母三兩麥門冬二兩縫定蒸熟搗丸如梧桐子大每服三十丸米飲下老人腳氣豬肚一枚洗淨切作生以水洗布絞乾和蒜椒醬醋五味常食亦治熱勞養老方溫養胎氣胎至九月消息用豬肚一枚如常著蔥五味煮食至盡千金髓赤白癜風白煮豬肚一枚食之頓盡忌房事外臺疥瘡癢痛豬肚一枚同皂莢煮熟去莢食之救急頭瘡白禿普濟用新破豬肚勿洗及熱拓之須臾蟲出不盡再作孫氏方用豬肚一個入砒一兩扎定以黃泥固濟煅存性為末油和敷以椒湯洗蟲牙疼痛用新殺豬肚尖上涎絹包咬之數次蟲盡即愈唐氏用枳殼末拌之腸氣味甘微寒無毒主治虛渴小便數補下焦虛竭孟詵止小便日華去大小腸風熱宜食之蘇頌潤腸治燥調血痢臟毒時珍洞腸治人洞腸挺出血多孫思邈洞腸廣腸也附方新五腸風臟毒救急用豬大腸一條入芫荽在內煮食奇效用豬臟入黃連末在內煮爛搗丸梧桐子大每米飲服三十丸又方豬臟入槐花末令滿縛定以醋煮爛搗為丸如梧桐子大每服五十丸溫酒下脅熱血痢方法同上臟寒泄瀉體倦食減用豬大臟一條去脂膜洗淨以吳茱萸末填滿縛定蒸熟搗丸梧桐子大每服五十丸食前米飲下奇效良方脬亦作胞氣味甘咸寒無毒主治夢中遺溺疝氣墜痛陰囊濕癢玉莖生瘡發明時珍曰豬胞所主皆下焦病亦以類從爾蘄有一妓病轉脬小便不通腹脹如鼓數月垂死一醫用豬脬吹脹以翎管安上插入廷孔捻脬氣吹入即大尿而愈此法載在羅天益衛生寶鑑中知者頗少亦機巧妙術也附方新八夢中遺溺用豬脬洗炙食之千金産後遺尿豬胞豬肚各一個糯米半升入脬內更以脬入肚內同五味煮食醫林集要産後尿床方法同上疝氣墜痛用豬脬一枚洗入小茴香大茴香破故紙川楝子等分填滿入青鹽一塊縛定酒煮熟食之酒下其藥焙搗為丸服之消渴無度干豬胞十個剪破去蒂燒存性為末每溫酒服一錢聖濟總録腎風囊癢用豬尿胞火炙以鹽酒吃之救急玉莖生瘡臭腐用豬胞一枚連尿去一半留一半以煅紅新磚焙乾為末入黃丹一錢摻之三五次瘥先須以蔥椒湯洗奇效方白禿癩瘡洗刮令淨以豬胞乘熱裹之當引蟲出膽氣味苦寒無毒主治傷寒熱渴別録骨熱勞極消渴小兒五疳殺蟲蘇頌敷小兒頭瘡治大便不通以葦筒納入下部三寸灌之立下藏器通小便敷惡瘡殺疳𧈟治目赤目翳明目清心臟涼肝脾入湯沐發去膩光澤時珍發明成無己曰仲景以豬膽汁和醋少許灌穀道中通大便神效蓋酸苦益陰潤燥而瀉便也又治少陰下利不止厥逆無脈乾嘔煩者以白通湯加豬膽汁主之若調寒熱之逆者冷熱必行則熱物冷服下嗌之後冷體既消熱性便發故病氣自愈此所以和人尿豬膽鹹苦之物於白通熱劑之中使其氣相從而無拒格之患也又云霍亂病吐下已斷汗出而厥四肢拘急脈微欲絶者通脈四逆湯加豬膽汁主之蓋陽氣太虛陰氣獨勝純與陽藥恐陰氣格拒不得入故加豬膽汁苦入心而通脈寒補肝而和陰不致格拒也汪機曰朱奉議治傷寒五六日癍出有豬膽雞子湯時珍曰方家用豬膽取其寒能勝熱滑能潤燥苦能入心又能去肝膽之火也附方舊六新十四少陰下利不止厥逆無脈乾嘔煩者以白通湯加豬膽汁主之蔥白四莖乾薑一兩生附子一枚水三升煮一升入人尿五合豬膽汁一合分溫再服仲景傷寒論或瀉或止久而不愈二聖丸用黃連黃柏末各一兩以豬膽煮熟和丸如緑豆大量兒大小每米飲服之總微論赤白下痢十二月豬膽百枚俱盛雄黑豆入內著麝香少許陰乾每用五七粒為末如紅痢甘草湯下如白痢生薑湯調服奇效方濕𧈟下痢不止乾嘔羸瘦多睡面黃以膽汁和薑汁釅醋同灌下部手急捻令醋氣上至咽喉乃止當下五色惡物及蟲而愈也拾遺熱病有𧈟上下蝕人用豬膽一枚醋一合煎沸服蟲立死也梅師瘦病咳嗽豬膽和人溺薑汁橘皮訶黎勒桃皮同煮汁飲之拾遺方小便不通肘後豬膽一枚熱酒和服又用豬膽連汁籠住陰頭一二時汁入自通消渴無度雄豬膽五個定粉一兩同煎成丸芡子大每含化二丸咽下日二聖濟總録傷寒癍出豬膽雞子湯用豬膽汁苦酒各三合雞子一個合煎三沸分服汗出即愈張文仲方疔瘡惡腫十二月豬膽風乾和生蔥搗敷普濟方目翳目盲豬膽一枚文火煎稠丸黍米大每納一粒目中良外臺目赤腫痛豬膽汁一枚和鹽緑五分點之普濟方火眼赤痛豬膽一個銅錢三文同置盞內蒸乾取膽丸粟米大安眼中聖惠方拔白換黑豬膽塗孔中即生黑者聖惠方小兒初生豬膽入湯浴之不生瘡疥姚和衆産婦風瘡因出風早用豬膽一枚柏子油一兩和敷杏林摘要湯火傷瘡豬膽調黃柏末塗之外臺瘭疽出汁生手足肩背纍纍如赤豆剝淨以豬膽塗之千金喉風閉塞臘月初一日取豬膽不拘大小五六枚用黃連青黛薄荷殭蠶白礬朴硝各五錢裝入膽內青紙包了將地掘一孔方深各一尺以竹橫懸此膽在內以物蓋定候至立春日取出待風吹去膽皮青紙研末密收每吹少許神驗乃萬金不傳之方邵真人經驗方膽皮主治目翳如重者取皮曝乾作兩股繩如箸大燒灰出火毒點之不過三五度瘥時珍出外臺祕要膚汪機曰豬膚王好古以為豬皮吳綬以為燖豬時刮下黑膚二説不同今考禮運疏云革膚內厚皮也膚革外厚皮也則吳説為是淺膚之義氣味甘寒無毒主治少陰下痢咽痛時珍發明張仲景曰少陰病下利咽痛胸滿心煩者豬膚湯主之用豬膚一斤水一斗煮五升取汁入白蜜一升白粉五合熬香分六服成無己曰豬水畜也其氣先入腎解少陰客熱加白蜜以潤燥除煩白粉以益氣斷利也耳垢主治蛇傷狗咬塗之別録鼻唇氣味甘咸微寒無毒多食動風主治上唇治凍瘡痛癢思邈煎湯調蜀椒目末半錢夜服治盜汗宗奭鼻治目中風翳燒灰水服方寸匕日二服時珍出千金舌主治健脾補不足令人能食和五味煮汁食孟詵靨音掩俗名咽舌是矣又名豬氣子王璽曰在豬喉系下肉團一枚大如棗微扁色紅主治項下癭氣瓦焙研末每夜酒服一錢時珍發明見羊靨下附方新二癭氣杏林摘要用豬靨七枚酒熬三錢入水瓶中露一夜取出炙食二服效醫林集要開結散豬靨焙四十九枚沉香二錢真珠砂罐煅四十九粒沉香二錢橘紅四錢為末臨臥冷酒徐徐服二錢五服見效重者一料愈以除日合之忌酸咸油膩澀氣之物齒氣味甘平主治小兒驚癇五月五日取燒灰服別録又治蛇咬日華中牛肉毒者燒灰水服一錢又治痘瘡倒陷時珍骨主治中馬肝漏脯果菜諸毒燒灰水服方寸匕日三服頰骨燒灰治痘陷煎汁服解丹藥毒時珍附方新三三消渴疾豬脊湯用豬脊骨一尺二寸大棗四十九枚新蓮肉四十九粒炙甘草二兩西木香一錢半水五碗同煎取汁一碗渴則飲之三因方浸淫諸瘡豬牙車骨年久者椎破燒令脂出乘熱塗之普濟方下痢紅白臘豬骨燒存性研末溫酒調服三錢豚卵釋名豚顛本經豬石子別録曰陰乾藏之勿令敗頌曰豚卵當是豬子也時珍曰豚卵即牡豬外腎也牡豬小者多犗去卵故曰豚卵濟生方謂之豬石子者是也三因治消渴方中有石子薺苨湯治産後蓐勞有石子湯並用豬腎為石子誤矣氣味甘溫無毒主治驚癇癲疾鬼疰蠱毒除寒熱賁豚五癃邪氣攣縮本經除陰莖中痛孫思邈治陰陽易病少腹急痛用熱酒吞二枚即瘥時珍又古今録驗治五癇莨菪子散中用之附方新一驚癇中風壯熱掣瘲吐舌出沫用豚卵一雙細切當歸二分以醇酒三升煮一升分服普濟母豬乳時珍曰取法須馴豬待兒飲乳時提後腳急以手捋而承之非此法不得也氣味甘咸寒無毒主治小兒驚癇及鬼毒去來寒熱五癃綿蘸吮之蘇恭小兒天吊大人豬雞癇病日華發明時珍曰小兒體屬純陽其驚癇亦生於風熱豬乳氣寒以寒治熱謂之正治故錢乙云初生小兒至滿月以豬乳頻滴之最佳張煥云小兒初生無乳以豬乳代之出月可免驚癇痘疹之患楊士瀛云小兒口噤不開豬乳飲之甚良月內胎驚同硃砂牛乳少許抹口中甚妙此法諸家方書未知用豫傳之東宮吳觀察子病此用之有效附方舊一斷酒白豬乳一升飲之千金蹄以下並用母豬者氣味甘咸小寒無毒主治煮汁服下乳汁解百藥毒洗傷撻諸敗瘡別録滑肌膚去寒熱蘇頌煮羹通乳脈托癰疽壓丹石煮清汁洗癰疽漬熱毒消毒氣去惡肉有效時珍外科精要洗癰疽有豬蹄湯數方用豬蹄煮汁去油煎衆藥蘸洗也附方舊五新二婦人無乳外臺用母豬蹄一具水二斗煮五六升飲之或加通草六分廣濟用母豬蹄四枚水二斗煮一斗去蹄入土瓜根通草漏蘆各三兩再煮六升去滓納蔥豉作粥或羹食之或身體微熱有少汗出佳未通再作癰疽發背母豬蹄一雙通草六分綿裹煮羹食之梅師乳發初起方同上天行熱毒攻手足腫痛欲斷用母豬蹄一具去毛以水一斗蔥白一握煮汁去滓入少鹽漬之肘後老人面藥令面光澤用母豬蹄一具煮漿如膠夜以塗面曉則洗去千金翼硇砂損陰豬蹄一具浮萍三兩水三升煮汁半升漬之冷即出以粉敷之外臺懸蹄甲一名豬退思邈曰酒浸半日炙焦用時珍曰按古方有用左蹄甲者又有用後蹄甲者未詳其義也氣味咸平無毒主治五痔伏熱在腹中腸癰內蝕本經同赤木燒煙燻闢一切惡瘡仲景附方舊二新五肺氣齁喘豬爪甲二枚燒灰研入麝香當門子一枚同研茶服普濟定喘化痰用豬蹄甲四十九個洗淨控干每甲納半夏白礬各一字罐盛固濟煅赤為末入麝香一錢匕每用糯米飲下半錢經驗後方久咳喘急豬蹄甲四十九枚以瓶子盛之上以天南星一枚大者銼勻蓋之鹽泥固濟煅煙出為度取出入款冬花末半兩麝香一分龍腦少許研勻每服一錢食後煎桑根白皮湯下名黑金散總録小兒寒熱及熱氣中人用豬後蹄甲燒灰末乳汁調服一撮日二服傷寒類要痘瘡入目豬蹄爪甲燒灰浸湯濾淨洗之甚妙普濟方癍痘生翳半年以上者一月取效一年者不治用豬懸蹄甲二兩瓦瓶固濟煅蟬蛻一兩羚羊角一分為末每服一字三歲以上三錢溫水調服一日三服錢氏小兒方小兒白禿豬蹄甲七個每個入白礬一塊棗兒一個燒存性研末入輕粉麻油調搽不過五上愈尾主治臘月者燒灰水服治喉痹和豬脂塗赤禿髮落時珍出千金毛主治燒灰麻油調塗湯火傷留竅出毒則無痕時珍出袖珍附方新一赤白崩中豬毛燒灰三錢以黑豆一碗好酒一碗半煮一碗調服屎一名豬零日華曰取東行牡豬者為良頌曰今人又取南行豬零合太乙丹時珍曰古方亦有用豭豬屎者各隨本方豬零者其形纍纍零落而下也氣味寒無毒主治寒熱黃疸濕痹別録主蠱毒天行熱病並取一升浸汁頓服日華燒灰發痘瘡治驚癇除熱解毒治瘡時珍血溜出血不止取新屎壓之吳瑞發明時珍曰御藥院方治痘瘡黑陷無價散錢仲陽治急驚風癇惺惺丸皆用之取其除熱解毒也附方舊一新十六小兒客忤偃啼面青豭豬屎二升水絞汁溫浴之小兒夜啼豬屎燒灰淋汁浴兒並以少許服之聖惠方小兒陰腫豬屎五升煮熱袋盛安腫上千金方霧露瘴毒心煩少氣頭痛項強顫掉欲吐用新豬屎二升半酒一升絞汁暖服取汗瘥千金中豬肉毒豬屎燒灰水服方寸匕千金婦人血崩老母豬糞燒灰酒服三錢李樓方解一切毒母豬屎水和服之千金攪腸沙痛用母豬生兒時拋下糞日乾為末以白湯調服口唇生核豬屎絞汁溫服千金方白禿髮落臘月獵屎燒灰敷肘後疔瘡入腹牝豬屎和水絞汁服三合立瘥聖惠方十年惡瘡母豬糞燒存性敷之外臺方消蝕惡肉臘月豶豬糞燒存性一兩雄黃檳榔各一錢為末濕者滲乾者麻油輕粉調抹直指方胻疽青爛生於腨脛間惡水淋漓經年瘡冷敗為深疽深爛青黑好肉虛腫百藥不瘥或瘥而復發先以藥蝕去惡肉後用豭豬屎散甚效以豬屎燒研為末納瘡孔令滿白汁出吮去更敷有惡肉再蝕去乃敷以平為期有驗千金方男女下疳母豬糞黃泥包煅存性為末以米泔洗淨搽立效簡便單方雀瘻有蟲母豬糞燒灰以臘月豬膏和敷當有蟲出千金方赤遊火丹母豬屎水絞汁服並敷之外臺燖豬湯主治解諸毒蟲魘蘇頌産後血刺心痛欲死溫飲一盞汪機治消渴濾淨飲一碗勿令病人知又洗諸瘡良時珍豬窠中草主治小兒夜啼密安席下勿令母知日華縛豬繩主治小兒驚啼發歇不定用臘月者燒灰水服少許藏器狗本經中品釋名犬説文地羊時珍曰狗叩也吠聲有節如叩物也或云為物苟且故謂之狗韓非云蠅營狗苟是矣卷尾有懸蹄者為犬犬字象形故孔子曰視犬字如畫狗齊人名地羊俗又諱之以龍稱狗有烏龍白龍之號許氏説文云多毛曰尨長喙曰獫音斂短喙曰猲音歇去勢曰猗高四尺曰獒狂犬曰猘音折生一子曰𤢭曰玂音其二子曰獅三子曰𤡆集解時珍曰狗類甚多其用有三田犬長喙善獵吠犬短喙善守食犬體肥供饌凡本草所用皆食犬也犬以三月而生在畜屬木在卦屬艮在禽應婁星豺見之跪虎食之醉犬食番木鱉則死物性制伏如此又遼東有鷹背狗乃鷹産三卵一鷹一雕一犬也以禽乳獸古所未聞詳見雕條又有老木之精狀如黑狗而無尾名曰彭侯可以烹食無情化有情精靈之變也肉黃犬為上黑犬白犬次之氣味咸酸溫無毒反商陸畏杏仁同蒜食損人同菱食生癲思邈曰白犬合海鮋食必得惡病時珍曰鮋小魚也道家以犬為地厭不食之凡犬不可炙食令人消渴妊婦食之令子無聲熱病後食之殺人服食人忌食九月勿食犬傷神瘦犬有病猘犬發狂自死犬有毒懸蹄犬傷人赤股而躁者氣臊犬目赤者並不可食主治安五臟補絶傷輕身益氣別録宜腎思邈補胃氣壯陽道暖腰膝益氣力日華補五勞七傷益陽事補血脈厚腸胃實下焦填精髓和五味煮空心食之凡食犬若去血則力少不益人孟詵發明弘景曰白狗烏狗入藥用黃狗肉大補虛勞牡者尤勝大明曰黃犬大補益人余色微補古言薯蕷涼而能補犬肉暖而不補雖有此言服終有益但因食穢不食者衆震亨曰世言犬能治勞損陽虛之疾然人病多是陰虛若陽果虛其死甚易亦安能措手哉時珍曰脾胃屬土喜暖惡寒犬性溫暖能治脾胃虛寒之疾脾胃溫和而腰腎受蔭矣若素常氣壯多火之人則宜忌之丹溪獨指陰虛立説矯枉過正矣濟生治真陽虛憊諸虛證有黃犬肉丸藥多不載附方舊三新六戊戌酒大補元氣用黃犬肉一隻煮一伏時搗如泥和汁拌炊糯米三斗入曲如常釀酒候熟每旦空心飲之養老方戊戌丸治男子婦人一應諸虛不足骨蒸潮熱等證用黃童子狗一隻去皮毛腸肚同外腎於砂鍋內用酒醋八分水二升入地骨皮一斤前胡黃耆肉蓯蓉各四兩同煮一日去藥再煮一夜去骨再煮肉如泥擂濾入當歸末四兩蓮肉蒼朮末各一斤厚朴橘皮末十兩甘草末八兩和杵千下丸梧桐子大每空心鹽酒下五七十丸乾坤祕韞脾胃虛冷腹滿刺痛肥狗肉半斤以米同鹽豉煮粥頻食一兩頓心鏡虛寒瘧疾黃狗肉煮臛入五味食之氣水鼓脹狗肉一斤切和米煮粥空腹食之心鏡浮腫屎澀肥狗肉五斤熟蒸空腹食之心鏡猝中惡死破白狗拓心上即活肘後方痔漏有蟲鈐方用狗肉煮汁空腹服能引蟲也危氏用熟犬肉蘸濃藍汁空心食七日效蹄肉氣味酸平主治煮汁飲之能下乳汁別録血白狗者良氣味咸溫無毒弘景曰白狗血和白雞肉烏雞肉白鵝肝白羊肉蒲子羹等食皆病人時珍曰黑犬血灌蟹燒之集鼠主治白狗血治癲疾發作烏狗血治産難橫生血上搶心和酒服之別録補安五臟日華熱飲治虛勞吐血又解射罔毒點眼治痘瘡入目又治傷寒熱病發狂見鬼及鬼擊病闢諸邪魅時珍發明時珍曰術家以犬為地厭能禳闢一切邪魅妖術按史記云秦時殺狗磔四門以御災風俗通義云今人殺白犬血題門以闢不祥則自古已然矣又華他別傳云琅琊有女子右股病瘡癢而不痛愈而復作他取稻糖色犬一隻繫馬馬走五十里乃斷頭向癢處合之須臾一蛇在皮中動以鉤引出長三尺許七日而愈此亦怪證取狗之血腥以引其蟲耳附方舊三新三熱病發狂傷寒時氣溫病六七日熱極發狂見鬼欲走取白狗從背破取血乘熱攤胸上冷乃去之此治垂死者亦活無白犬但純色者亦可肘後方鬼擊之病脅腹絞痛或即吐血衄血下血一名鬼排白犬頭取熱血一升飲之百一方小兒猝癇刺白犬血一升含之並塗身上葛氏方猝得瘑瘡常時生兩腳間用白犬血塗之立愈肘後方兩腳癬瘡白犬血塗之立瘥奇效疔瘡惡腫取白犬血頻塗之有效肘後心血主治心痹心痛取和蜀椒末丸梧桐子大每服五丸日五服時珍出肘後乳汁白犬者良主治十年青盲取白犬生子目未開時乳頻點之狗子目開即瘥藏器赤禿髮落頻塗甚妙時珍附方新二拔白白犬乳塗之千金斷酒白犬乳酒服千金脂並𦚟白犬者良主治手足皴皺入面脂去皯𪒟柔五金時珍腦主治頭風痹鼻中息肉下部𧈟瘡別録猘犬咬傷取本犬腦敷之後不復發時珍出肘後附方新一眉發火瘢不生者蒲灰以正月狗腦和敷日三則生聖惠方涎主治諸骨哽脫肛及誤吞水蛭時珍附方新三諸骨鯁咽狗涎頻滴骨上自下仇遠稗史大腸脫肛狗涎抹之自上也扶壽精方誤吞水蛭以蒸餅半個絞出狗涎吃之連食二三其物自散德生堂方心主治憂恚氣除邪別録治風痹鼻衄及下部瘡狂犬咬日華腎氣味平微毒時珍曰內則食犬去腎為不利人也主治婦人産後腎勞如瘧者婦人體熱用豬腎體冷用犬腎藏器肝時珍曰按沈周雜記云狗肝色如泥土臭味亦然故人夜行土上則肝氣動蓋相感也又張華物類志云以狗肝和土泥灶令婦妾孝順則狗肝應土之説相符矣主治肝同心搗塗狂犬咬又治腳氣攻心作生以薑醋進之取泄先泄者勿用藏器附方舊一新一下痢腹痛狗肝一具切入米一升煮粥合五味食心鏡心風發狂黃石散用狗肝一具批開以黃丹硝石各一錢半研勻擦在肝內用麻縛定水一升煮熟細嚼以本汁送下楊氏家藏膽青犬白犬者良氣味苦平有小毒斆曰鮭魚插樹立便乾枯狗膽塗之卻還榮盛主治明目本經鼎曰上伏日採膽酒服之敷痂瘍惡瘡別録療鼻齆鼻中息肉甄權主鼻衄聤耳止消渴殺蟲除積能破血凡血氣痛及傷損者熱酒服半個瘀血盡下時珍治刀箭瘡日華去腸中膿水又和通草桂為丸服令人隱形孟詵發明慎微曰按魏志云河內太守劉勳女病左膝瘡癢華他視之用繩系犬後足不得行斷犬腹取膽向瘡口須臾有蟲若蛇從瘡上出長三尺病愈也附方舊二新七眼赤澀癢犬膽汁注目中效聖惠肝虛目暗白犬膽一枚螢火蟲二七枚陰乾為末點之聖惠目中膿水上伏日採犬膽酒服之聖濟總録聤耳出膿用狗膽一枚枯礬一錢調勻綿裹塞耳內三四次即瘥奇效良方拔白換黑狗膽汁塗之千金血氣撮痛不可忍者用黑狗膽一個半乾半濕剜開以篦子排丸緑豆大蛤粉滾過每服五丸以燒生鐵淬酒送下痛立止經驗方反胃吐食不拘丈夫婦人老少遠年近日用五靈脂末黃狗膽汁和丸龍眼大每服一丸好酒半盞磨化服不過三服即效本事痞塊疳積五靈脂炒煙盡真阿魏去砂研等分用黃雄狗膽汁和丸黍米大空心津咽三十丸忌羊肉醋面簡便赤白下痢臘月狗膽一百枚每枚入黑豆充滿麝香少許每服一枚赤以甘草白以乾薑湯送下奇效良方牡狗陰莖釋名狗精六月上伏日取陰乾百日別録氣味咸平無毒思邈曰酸主治傷中陰痿不起令強熱大生子除女子帶下十二疾本經治絶陽及婦人陰瘻日華補精髓孟詵陰卵主治婦人十二疾燒灰服蘇恭皮主治腰痛炙熱黃狗皮裹之頻用取瘥燒灰治諸風時珍發明時珍曰淮南萬畢術云黑犬皮毛燒灰揚之止天風則治風之義有取乎此也毛主治産難蘇恭頸下毛主小兒夜啼絳囊盛系兒兩手藏器燒灰湯服一錢治邪瘧尾燒灰敷犬傷時珍附方舊一湯火傷瘡狗毛細翦以煬膠和毛敷之痂落即瘥梅師齒氣味平微毒主治癲癇寒熱猝風痱伏日取之別録磨汁治犬癇燒研醋和敷發背及馬鞍瘡同人齒燒灰湯服治痘瘡倒陷有效時珍頭骨黃狗者良氣味甘酸平無毒主治金瘡止血別録燒灰治久痢勞痢和乾薑莨菪炒見煙為丸空心白飲服十丸極效甄權燒灰壯陽止瘧日華治癰疽惡瘡解顱女人崩中帶下時珍頷骨主小兒諸癇諸瘻燒灰酒服蘇恭附方舊三新十小兒久痢狗頭燒灰白湯服千金小兒解顱黃狗頭骨炙為末雞子白和塗之直指赤白久痢臘月狗頭骨一兩半燒灰紫筍茶末一兩為末每服二錢米飲下聖惠方赤白帶下不止者狗頭燒灰為末每酒服一錢日三服聖惠産後血亂奔入四肢並違墮以狗頭骨灰酒服二錢甚效經驗後方打損接骨狗頭一個燒存性為末熱醋調塗暖臥衛生易簡附骨疽瘡狗頭骨燒煙日熏之聖惠癰疽癤毒狗頭骨灰蕓薹子等分為末醋和敷之千金惡瘡不愈狗頭骨灰同黃丹末等分敷之壽域方長肉生肌老狗頭腦骨瓦炒二兩桑白皮一兩當歸二錢半為末麻油調敷直指鼻中息肉狗頭灰方寸匕苦丁香半錢研末吹之即化為水或同硇砂少許尤妙朱氏集驗夢中泄精狗頭鼻梁骨燒研臥時酒服一錢頭風白屑作癢狗頭骨燒灰淋汁沐之聖惠方骨白狗者良氣味甘平無毒主治燒灰療下痢生肌敷馬瘡別録燒灰療諸瘡瘻及妒乳癰腫弘景燒灰補虛理小兒驚癇客忤蜀本煎汁同米煮粥補婦人令有子藏器燒灰米飲日服治休息久痢豬脂調敷鼻中瘡時珍附方舊二産後煩悶不食者白犬骨燒研水服方寸匕千金翼桃李哽咽狗骨煮湯摩頭上子母祕録屎白狗者良氣味熱有小毒丹房鏡源云白狗糞煮銅主治疔瘡水絞汁服治諸毒不可入口者蘇恭瘭疽徹骨癢者燒灰塗瘡勿令病者知又和臘豬脂敷瘻瘡腫毒疔腫出根藏器燒灰服發痘瘡倒黶治霍亂症積止心腹痛解一切毒時珍發明時珍曰狗屎所治諸病皆取其解毒之功耳附方舊三新五小兒霍亂猝起者用白狗屎一丸絞汁服之心痛欲死狗屎炒研酒服二錢神效勞瘧瘴瘧久不愈用白狗糞燒灰發前冷水服二錢聖惠方月水不調婦人産後月水往來乍多乍少白狗糞燒末酒服方寸匕日三服千金魚肉成症並治諸毒用狗糞五升燒末綿裹於五升酒中浸二宿取清分十服日三服三日使盡症即便出也外臺漏脯中毒犬屎燒末酒服方寸匕梅師發背癰腫用白犬屎半升水絞取汁服以滓敷之日再外臺疔瘡惡腫牡狗屎五月五日取燒灰塗敷數易之又治馬鞍瘡神驗聖惠屎中粟白狗者良一名白龍沙主治噎膈風病痘瘡倒陷能解毒也時珍附方新二噎膈不食黃犬干餓數日用生粟或米干飼之俟其下糞淘洗米粟令淨煮粥入薤白一握泡熟去薤入沉香末二錢食之永類鈐方痘瘡倒黶用白狗或黑狗一隻喂以生粟米候下屎取未化米為末入麝香少許新汲水服二錢保幼大全屎中骨主治寒熱小兒驚癇別録羊本經中品校正別録另出羊乳今併為一釋名羖亦作羖羝音低羯時珍曰説文云羊字象頭角足尾之形孔子曰牛羊之字以形似也董子云羊祥也故吉禮用之牡羊曰羖曰羝牝羊曰𦍺曰牂音臧白曰羒黑曰羭多毛曰羖䍽胡羊曰䍲羺無角曰𦏆曰䐢去勢曰羯羊子曰羔羔五月曰羜音㝉六月曰𦎦音務七月曰羍音達未卒歲曰䍮音兆內則謂之柔毛又曰少牢古今注謂之長髯主簿云集解別録曰羖羊生河西弘景曰羊有三四種入藥以青色羖羊為勝次則烏羊其䍲羺羊及虜中無角羊只可啖食為藥不及都下者然其乳髓則肥好也頌曰羊之種類甚多而羖羊亦有褐色黑色白色者毛長尺余亦謂之羖䍽羊北人引大羊以此為群首又謂之羊頭詵曰河西羊最佳河東羊亦好若驅至南方則筋力自勞損安能補益人今南方羊多食野草毒草故江浙羊少味而發疾南人食之即不憂也惟淮南州郡或有佳者可亞北羊北羊至南方一二年亦不中食何況於南羊蓋土地使然也宗奭曰羖䍽羊出陝西河東尤狠健毛最長而厚入藥最佳如供食則不如北地無角白大羊也又同華之間有小羊供饌在諸羊之上時珍曰生江南者為吳羊頭身相等而毛短生秦晉者為夏羊頭小身大而毛長土人二歲而剪其毛以為氈物謂之綿羊廣南英州一種乳羊食仙茅極肥無復血肉之分食之甚補人諸羊皆孕四月而生其目無神其腸薄而縈曲在畜屬火故易繁而性熱也在卦屬兌故外柔而內剛也其性惡濕喜燥食鉤吻而肥食仙茅而肪食仙靈脾而淫食躑躅而死物理之宜忌不可測也契丹以其骨占灼謂之羊卜亦有一靈耶其皮極薄南番以書字吳人以畫採為燈羊肉氣味苦甘大熱無毒詵曰溫頌曰本經云甘素問云苦蓋經以味言素問以理言羊性熱屬火故配於苦羊之齒骨五臟皆溫平惟肉性大熱也時珍曰熱病及天行病瘧疾病後食之必發熱致危妊婦食之令子多熱白羊黑頭黑羊白頭獨角者並有毒食之生癰禮曰羊𣬹毛而毳者膻又云煮羊以杏仁或瓦片則易糜以胡桃則不臊以竹𪕋則助味中羊毒者飲甘草湯則解銅器煮之男子損陽女子絶陰物性之異如此不可不知汪機曰反半夏菖蒲同蕎麵豆醬食發痼疾同醋食傷人心主治緩中字乳余疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚別録止痛利産婦思邈治風眩瘦病丈夫五勞七傷小兒驚癇孟詵開胃健力日華發明頌曰肉多入湯劑胡洽方有大羊肉湯治婦人産後大虛心腹絞痛厥逆醫家通用大方也宗奭曰仲景治寒疝當歸生薑羊肉湯服之無不驗者一婦冬月生産寒入子戶腹下痛不可按此寒疝也醫欲投抵當湯豫曰非其治也以仲景羊肉湯減水二服即愈李杲曰羊肉有形之物能補有形肌肉之氣故曰補可去弱人參羊肉之屬人參補氣羊肉補形凡味同羊肉者皆補血虛蓋陽生則陰長也時珍曰按開河記云隋大總管麻叔謀病風逆起坐不得煬帝命太醫令巢元方視之曰風入腠理病在胸臆須用嫩肥羊蒸熟摻藥食之則瘥如其言未盡劑而痊自後每殺羊羔同杏酪五味日食數枚觀此則羊肉補虛之功益可證矣附方舊八新十六羊肉湯張仲景治寒勞虛羸及産後心腹疝痛用肥羊肉一斤水一斗煮汁八升入當歸五兩黃耆八兩生薑六兩煮取二升分四服胡洽方無黃耆千金方有芍藥金匱要略産後厥痛胡洽大羊肉湯治婦人産後大虛心腹絞痛厥逆用羊肉一斤當歸芍藥甘草各七錢半用水一斗煮肉取七升入諸藥煮二升服産後虛羸腹痛冷氣不調及腦中風汗自出白羊肉一斤切治如常調和食之心鏡産後帶下産後中風絶孕帶下赤白用羊肉二斤香豉大蒜各三升水一斗三升煮五升納酥一升更煮三升分溫三服千金方崩中垂死肥羊肉三斤水二斗煮一斗三升入生地黃汁二升乾薑當歸各三兩煮三升分四服千金補益虛寒用精羊肉一斤碎白石英三兩以肉包之外用荷葉裹定於一石米下蒸熟取出去石英和蔥薑作小餛飩子每日空腹以冷漿水吞一百枚甚補益外臺壯陽益腎用白羊肉半斤切生以蒜薤食之三日一度甚妙心鏡五勞七傷虛冷用肥羊肉一腿密蓋煮爛絞取汁服並食肉骨蒸久冷羊肉一斤山藥一斤各爛煮研如泥下米煮粥食之飲膳正要骨蒸傳尸用羊肉一拳大煮熟皂莢一尺炙以無灰酒一升銅鐺內煮三五沸去滓入黑餳一兩令病人先啜肉汁乃服一合當吐蟲如馬尾為效外臺虛寒瘧疾羊肉作臛餅飽食之更飲酒暖臥取汗燕國公常見有驗集驗方脾虛吐食羊肉半斤作生以蒜薤醬豉五味和拌空腹食之心鏡虛冷反胃羊肉去脂作生以蒜薤空腹食之立效外臺壯胃健脾羊肉三斤切粱米二升同煮下五味作粥食飲膳正要老人膈痞不下飲食用羊肉四兩切白麵六兩橘皮末一分薑汁搜如常法入五味作臛食每日一次大效多能鄙事胃寒下痢羊肉一片莨菪子末一兩和以綿裹納下部二度瘥外臺方身面浮腫商陸一升水二斗煮取一斗去滓羊肉一斤切入內煮熟下蔥豉五味調和如臛法食之肘後方腰痛腳氣木瓜湯治腰膝疼痛腳氣不仁羊肉一腳草果五枚粳米二升回回豆即胡豆半升木瓜二斤取汁入砂糖四兩鹽少許煮肉食之正要消渴利水羊肉一腳瓠子六枚薑汁半合白麵二兩同鹽蔥炒食正要損傷青腫用新羊肉貼之千金方婦人無乳用羊肉六兩獐肉八兩鼠肉五兩作臛啖之崔氏傷目青腫羊肉煮熟尉之聖濟總録小兒嗜土買市中羊肉一斤令人以繩系於地上拽至家洗淨炒炙食或煮汁亦可姚和衆頭上白禿羊肉如作脯法炙香熱拓上不過數次瘥肘後方頭蹄白羊者良氣味甘平無毒大明曰涼震亨曰羊頭蹄肉性極補水水腫人食之百不一愈主治風眩瘦疾小兒驚癇蘇恭腦熱頭眩日華安心止驚緩中止汗補胃治丈夫五勞骨熱熱病後宜食之冷病人勿多食孟詵心鏡云以上諸證並宜白羊頭或蒸或煮或作膾食療腎虛精竭附方新三老人風眩用白羊頭一具如常治食之五勞七傷白羊頭蹄一具淨治更以稻草燒煙熏令黃色水煮半熟納胡椒蓽茇乾薑各一兩蔥豉各一升再煮去藥食日一具七日即愈千金虛寒腰痛用羊頭蹄一具草果四枚桂一兩生薑半斤哈昔泥一豆許胡椒煮食正要皮主治一切風及腳中虛風補虛勞去毛作羹臛食孟詵濕皮臥之散打傷青腫干皮燒服治蠱毒下血時珍脂青羊者良氣味甘熱無毒丹房鏡源云柔銀軟銅主治生脂止下痢脫肛去風毒婦人産後腹中絞痛思邈治鬼疰蘇頌胡洽方有青羊脂丸去遊風及黑皯日華熟脂主賊風痿痹飛尸闢瘟氣止勞痢潤肌膚殺蟲治瘡癬入膏藥透肌肉經絡徹風熱毒氣時珍附方舊一新十三下痢腹痛羊脂阿膠蠟各二兩黍米二升煮粥食之千金妊娠下痢羊脂如棋子大十枚溫酒一升投中頓服日三千金虛勞口乾千金用羊脂一雞子大淳酒半升棗七枚漬七日食立愈外臺用羊脂雞子大納半斤酢中一宿絞汁含之猝汗不止牛羊脂溫酒頻化服之外臺脾橫爪赤煎羊脂摩之外臺産後虛羸令人肥白健壯羊脂二斤生地黃汁一斗薑汁五升白蜜三升煎如飴溫酒服一杯日三古今録驗婦人陰脫煎羊脂頻塗之廣利方發背初起羊脂豬脂切片冷水浸貼熱則易之數日瘥外臺牙齒疳𧈟黑羖羊脂莨菪子等分入杯中燒煙張口熏之千金方小兒口瘡羊脂煎薏苡根塗之活幼心書豌豆如疥赤黑色者煎青羊脂摩之千金方赤丹如疥不治殺人煎青羊脂摩之數次愈集驗誤吞釘針多食肥羊脂久則自出肘後血白羊者良氣味咸平無毒時珍曰按夏子益奇疾方云凡豬羊血久食則鼻中毛出晝夜長五寸漸如繩痛不可忍摘去復生惟用乳石硇砂等分為丸空心臨臥各一服水下十丸自落也主治女人中風血虛悶及産後血暈悶欲絶者熱飲一升即活蘇恭熱飲一升治産後血攻下胎衣治猝驚九竅出血解莽草毒胡蔓草毒又解一切丹石毒發時珍出延壽諸方發明時珍曰外臺云凡服丹石人忌食羊血十年一食前功盡亡此物能制丹砂水銀輕粉生銀硇砂砒霜硫黃乳石鐘乳空青曾青雲母石陽起石孔公蘖等毒凡覺毒發刺飲一升即解又服地黃何首烏諸補藥者亦忌之嶺表録異言其能解胡蔓草毒羊血解毒之功用如此而本草並不言及誠缺文也附方舊二新五衄血一月不止刺羊血熱飲即瘥聖惠産後血攻或下血不止心悶面青身冷欲絶者新羊血一盞飲之三兩服妙梅師大便下血羊血煮熟拌醋食最效吳球便民食療硫黃毒發氣悶用羊血熱服一合效聖惠方食菹吞蛭蛭啖臟血腸痛黃瘦飲熱羊血一二升次早化豬脂一升飲之蛭即下也肘後方誤吞蜈蚣刺豬羊血灌之即吐出昔有店婦吹火筒中有蜈蚣入腹店婦仆地號叫可畏道人劉復真用此法而愈三元延壽書妊娠胎死不出及胞衣不下産後諸疾狼狽者刺羊血熱飲一小盞極效聖惠方乳白𦍺者佳氣味甘溫無毒主治補寒冷虛乏別録潤心肺治消渴甄權療虛勞益精氣補肺腎氣和小腸氣合脂作羹食補腎虛及男女中風張鼎利大腸治小兒驚癇含之治口瘡日華主心猝痛可溫服之又蚰蜒入耳灌之即化成水孟詵治大人乾嘔及反胃小兒噦啘及舌腫並時時溫飲之時珍解蜘蛛咬毒頌曰劉禹錫傳信方云貞元十一年崔員外言有人為蜘蛛咬腹大如妊遍身生絲其家棄之乞食於道有僧教啖羊乳未幾疾平也發明弘景曰牛羊乳實為補潤故北人食之多肥健恭曰北人肥健由不啖咸腥方土使然何關飲乳陶以未達故屢有此言時珍曰方土飲食兩相資之陶説固偏蘇説亦過丹溪言反胃人宜時時飲之取其開胃脘大腸之燥也附方舊一新二小兒口瘡羊乳細濾入含之數次愈小品方漆瘡作癢羊乳敷之千金翼面黑令白白羊乳三斤羊胰三副和搗每夜洗淨塗之旦洗去總録腦氣味有毒詵曰發風病和酒服迷人心成風疾男子食之損精氣少子白羊黑頭食其腦作腸癰主治入面脂手膏潤皮膚去皯𪒟塗損傷丹瘤肉刺時珍附方新二發丹如瘤生綿羊腦同朴硝研塗之瑞竹堂方足指肉刺刺破以新酒酢和羊腦塗之一合愈古今録驗髓氣味甘溫無毒主治男子女人傷中陰陽氣不足利血脈益經氣以酒服之別録卻風熱止毒久服不損人孫思邈和酒服補血主女人血虛風悶孟詵潤肺氣澤皮毛滅瘢痕時珍刪繁治肺虛毛悴酥髓湯中用之附方新五肺痿骨蒸煉羊脂煉羊髓各五兩煎沸下煉蜜及生地黃汁各五合生薑汁一合不住手攪微火熬成膏每日空心溫酒調服一匙或入粥食飲膳正要目中赤翳白羊髓敷之千金舌上生瘡羊脛骨中髓和胡粉塗之妙聖惠白禿頭瘡生羊骨髓調輕粉搽之先以泔水洗淨一日二次數日愈經驗方痘痂不落痘瘡痂疕不落滅瘢方用羊𩩅骨髓煉一兩輕粉一錢和成膏塗之陳文中方心下並也用白羝羊者良氣味甘溫無毒日華曰有孔者殺人主治止憂恚膈氣別録補心藏器附方新一心氣鬱結羊心一枚咱夫蘭即回回紅花三錢浸玫瑰水一盞入鹽少許徐徐塗心上炙熟食之令人心安多喜正要肺氣味同心詵曰自三月至五月其中有蟲狀如馬尾長二三寸須去之不去令人痢下主治補肺止咳嗽別録傷中補不足去風邪思邈治渴止小便數同小豆葉煮食之蘇恭通肺氣利小便行水解蠱時珍附方舊一新六久嗽肺痿作燥羊肺湯用羊肺一具洗淨以杏仁柿霜真豆粉真酥各一兩白蜜二兩和勻灌肺中白水煮食之葛可久方咳嗽上氣積年垂死用莨菪子炒熟羊肺切曝等分為末以七月七日醋拌每夜不食空腹服二方寸匕粥飲下隔日一服千金水腫尿短青羖羊肺一具微炸切曝為末莨菪子一升以三年醋漬一晬時出熬令變色搗爛蜜丸梧桐子大食後麥門冬飲服四丸日三小便大利佳千金小便頻數下焦虛冷也羊肺一具切作羹入少羊肉和鹽豉食不過三具效集驗方渴利不止羊肺一具入少肉和鹽豉作羹食不過三具愈普濟方解中蠱毒生羊肺一具割開入雄黃麝香等分吞之濟生方鼻中息肉羊肺散用干羊肺一具白朮四兩肉蓯蓉通草乾薑芎藭各二兩為末食後米飲服五分匕加至方寸匕千金方腎氣味同心主治補腎氣虛弱益精髓別録補腎虛耳聾陰弱壯陽益胃止小便治虛損盜汗日華合脂作羹療勞痢甚效蒜薤食之一升療癥瘕蘇恭治腎虛消渴時珍發明時珍曰千金外臺深師諸方治腎虛勞損消渴腳氣有腎瀝湯方甚多皆用羊腎煮湯煎藥蓋用為引向各從其類也附方舊三新六下焦虛冷腳膝無力陽事不行用羊腎一枚煮熟和米粉半大兩煉成乳粉空腹食之妙心鏡腎虛精竭炮羊腎一雙切於豉汁中以五味米糅作羹粥食心鏡五勞七傷陽虛無力經驗後方用羊腎一對去脂切肉蓯蓉一兩酒浸一夕去皮和作羹下蔥鹽五味食正要治陽氣衰敗腰腳疼痛五勞七傷用羊腎三對羊肉半斤蔥白一莖枸杞葉一斤同五味煮成汁下米作粥食之虛損勞傷羊腎一枚術一升水一斗煮九升服一升日三肘後方腎虛腰痛千金用羊腎去膜陰乾為末酒服二方寸匕日三正要治猝腰痛羊腎一對咱夫蘭一錢玫瑰水一盞浸汁入鹽少許塗抹腎上徐徐炙熟空腹食之老人腎硬治老人腎臟虛寒內腎結硬雖服補藥不入用羊腎子一對杜仲長二寸闊一寸一片同煮熟空心食之令人內腎柔軟然後服補藥雞峰備急方脅破腸出以香油抹手送入煎人參枸杞子汁溫淋之吃羊腎粥十日即愈危氏羊石子即羊外腎也主治腎虛精滑時珍本事金鎖丹用之肝青羖羊者良氣味苦寒無毒頌曰溫弘景曰合豬肉及梅子小豆食傷人心思邈曰合生椒食傷人五臟最損小兒合苦筍食病青盲妊婦食之令子多厄主治補肝治肝風虛熱目赤暗痛熱病後失明並用子肝七枚作生食神效亦切片水浸貼之蘇恭解蠱毒吳瑞發明時珍曰按倪維德原機啓微集云羊肝肝與肝合引入肝經故專治肝經受邪之病今羊肝丸治目有效可徵汪機曰按三元延壽書云凡治目疾以青羊肝為佳有人年八十餘瞳子瞭然夜讀細字云別無服藥但自小不食畜獸肝耳或以本草羊肝明目而疑之蓋羊肝明目性也他肝則否凡畜獸臨殺之時忿氣聚於肝肝之血不利於目宜矣附方舊四新十一目熱赤痛看物如隔紗宜補肝益睛用青羊肝一具切洗和五味食之心鏡肝虛目赤青羊肝薄切水浸吞之極效龍木論病後失明方同上小兒赤眼羊肝切薄片井水浸貼普濟翳膜羞明有淚肝經有熱也用青羊子肝一具竹刀切和黃連四兩為丸梧桐子大食遠茶清下七十丸日三服忌鐵器豬肉冷水醫鏡目病䀮䀮以銅器煮青羊肝用麵餅覆器上鑽兩孔如人眼大以目向上熏之不過兩度千金方目病失明青羖羊肝一斤去脂膜切片入新瓦盆內炕干同決明子半升蓼子一合炒為末以白蜜漿服方寸匕日三不過三劑目明至一年能夜見文字食療不能遠視羊肝一具去膜細切以蔥子一勺炒為末以水煮熟去滓入米煮粥食多能鄙事青盲內障白羊子肝一具黃連一兩熟地黃二兩同搗丸梧桐子大食遠茶服七十丸日三服崔承元病內障喪明有人惠此方報德服之遂明傳信方牙疳腫痛羯羊肝一具煮熟蘸赤石脂末任意食之醫林集要虛損勞瘦用新豬脂煎取一升入蔥白一握煎黃平旦服至三日以枸杞一斤水三斗煮汁入羊肝一具羊脊膂肉一條曲末半斤著蔥豉作羹食千金方病後嘔逆天行病後嘔逆食即反出用青羊肝作生淡食不過三度食不出矣外臺休息痢疾五十日以上或一二年不瘥變成疳所下如泔澱者用生羊肝一具切絲入三年醋中吞之心悶則止不悶更服一日勿食物或以薑薤同食亦可不過二三具外臺小兒癇疾青羊肝一具薄切水洗和五味醬食之婦人陰𧈟作癢羊肝納入引蟲集簡方膽青羯羊者良氣味苦寒無毒主治青盲明目別録點赤障白翳風淚眼解蠱毒甄權療疳濕時行熱熛瘡和醋服之良蘇恭治諸瘡能生人身血脈思邈同蜜蒸九次點赤風眼有效朱震亨發明時珍曰肝開竅於目膽汁減則目暗目者肝之外候膽之精華也故諸膽皆治目病夷堅志載二百味草花膏治爛弦風赤眼流淚不可近光及一切暴赤目疾用羯羊膽一枚入蜂蜜於內蒸之候乾研為膏每含少許並點之一日淚止二日腫消三日痛定蓋羊食百草蜂採百花故有二百花草之名又張三丰真人碧雲膏臘月取羯羊膽十餘枚以蜜裝滿紙套籠住懸簷下待霜出掃下點之神效也附方舊三新四病後失明羊膽點之日二次肘後大便祕塞羊膽汁灌入即通千金目為物傷羊膽一枚雞膽三枚鯉魚膽二枚和勻日日點之聖惠方面黑皯皰羖羊膽牛膽各一個淳酒三升煮三沸夜夜塗之肘後産婦面皯産婦面如雀卵色以羊膽豬胰細辛等分煎三沸夜塗旦以漿水洗之録驗代指作痛崔氏云代指乃五臟熱注而然刺熱湯中七度刺冷水中又復如此三度即以羊膽塗之立愈甚效外臺方小兒疳瘡羊膽二枚和醬汁灌下部外臺胃一名羊膍胵氣味甘溫無毒思邈曰羊肚和飯飲久食令人多唾喜吐清水成反胃作噎病主治胃反止虛汗治虛羸小便數作羹食三五瘥思邈附方舊一新六久病虛羸不生肌肉水氣在脅下不能飲食四肢煩熱者用羊胃一枚切白朮一升切水二斗煮九升分九服日三不過三劑瘥張文仲方補中益氣羊肚一枚羊腎四枚地黃三兩乾薑昆布地骨皮各二兩白朮桂心人參厚朴海藻各一兩五錢甘草秦椒各六錢為末同腎入肚中縫合蒸熟搗爛曬為末酒服方寸匕日二千金中風虛弱羊肚一具粳米二合和椒薑豉蔥作羹食之正要胃虛消渴羊肚爛煮空腹食之古今録驗下虛尿床羊肚盛水令滿線縛兩頭煮熟即開取中水頓服之立瘥千金項下瘰癧用羊膍胵燒灰香油調敷蛇傷手腫新剝羊肚一個帶糞割一口將手入浸即時痛止腫消集要脬主治下虛遺溺以水盛入炙熟空腹食之四五次愈孫思邈胰白羊者良主治潤肺燥諸瘡瘍入面脂去皯𪒟澤肌膚滅瘢痕時珍附方新三遠年咳嗽羊胰三具大棗百枚酒五升漬七日飲之肘後方婦人帶下羊胰一具以酢洗淨空心食之不過三次忌魚肉滑物犯之即死外臺痘瘡瘢痕羊胰二具羊乳一升甘草末二兩和勻塗之明旦以豬蹄湯洗去千金舌主治補中益氣正要用羊舌二枚熟羊皮二具撏洗淨煮軟羊腎四枚熟蘑菰一斤洗淨糟薑四兩各切如甲葉肉汁食之靨即會咽也氣味甘淡溫無毒主治氣癭時珍發明時珍曰按古方治癭多用豬羊靨亦述類之義故王荊公癭詩有內療煩羊靨之句然癭有五氣血肉筋石也夫靨屬肺肺司氣故氣癭之證服之或效他癭恐亦少力附方舊一新二項下氣癭外臺用羊靨一具去脂酒浸炙熟含之咽汁日一具七日瘥千金用羊靨七枚陰乾海藻乾薑各二兩桂心昆布逆流水邊柳須各一兩為末蜜丸芡子大每含一丸咽津雜病治例用羊靨豬靨各二枚昆布海藻海帶各二錢洗焙牛蒡子炒四錢上為末搗二靨和丸彈子大每服一丸含化咽汁睛主治目赤及翳膜曝乾為末點之時珍出千金熟羊眼中白珠二枚於細石上和棗核磨汁點目翳羞明頻用三四日瘥孟詵發明時珍曰羊眼無瞳其睛不應治目豈以其神藏於內耶筋主治塵物入目熟嚼納眥中仰臥即出千金翼羖羊角青色者良氣味咸溫無毒別録曰苦微寒取之無時勿使中濕濕即有毒甄權曰大寒菟絲為之使鏡源云羖羊角灰縮賀賀錫也出賀州主治青盲明目止驚悸寒泄久服安心益氣輕身殺疥蟲入山燒之辟惡鬼虎狼本經療百節中結氣風頭痛及蠱毒吐血婦人産後余痛別録燒之闢蛇灰治漏下退熱主山障溪毒日華附方舊三新七風疾恍惚心煩腹痛或時悶絶復蘇以青羖羊角屑微炒為末無時溫酒服一錢聖惠氣逆煩滿水羊角燒研水服方寸匕普濟方吐血喘咳青羖羊角炙焦二枚桂末二兩為末每服一匕糯米飲下日三服同上産後寒熱心悶極脹百病羖羊角燒末酒服方寸匕子母祕録水泄多時羖羊角一枚白礬末填滿燒存性為末每新汲水服二錢聖惠方小兒癇疾羖羊角燒存性以酒服少許普濟赤禿髮落羖羊角牛角燒灰等分豬脂調敷普濟赤癍瘭子身面猝得赤癍或瘭子腫起不治殺人羖羊角燒灰雞子清和塗甚妙肘後打撲傷痛羊角灰以沙糖水拌瓦焙焦為末每熱酒下二錢仍揉痛處簡便腳氣疼痛羊角一副燒過為末熱酒調塗以帛裹之取汗永不發也齒三月三日取之氣味溫主治小兒羊癇寒熱別録頭骨以下並用羖羊者良氣味甘平無毒時珍曰按張景陽七命云耶溪之鋌赤山之精銷以羊頭鏷以鍛成注云羊頭骨能銷鐵也主治風眩瘦疾小兒驚癇蘇恭脊骨氣味甘熱無毒主治虛勞寒中羸瘦別録補腎虛通督脈治腰痛下痢時珍附方舊一新八老人胃弱羊脊骨一具捶碎水五升煎取汁二升入青粱米四合煮粥常食食治方老人虛弱白羊脊骨一具銼碎水煮取汁枸杞根銼一斗水五斗煮汁一斗五升合汁同骨煮至五升去骨瓷盒盛之每以一合和溫酒一盞調服多能鄙事腎虛腰痛心鏡用羊脊骨一具捶碎煮和蒜齏食飲少酒妙正要用羊脊骨一具捶碎肉蓯蓉一兩草果三枚蓽茇二錢水煮汁下蔥醬作面羹食腎虛耳聾羖羊脊骨一具炙研磁石煅醋淬七次白朮黃耆乾薑炮白茯苓各一兩桂三分為末每服五錢水煎服普濟虛勞白濁羊骨為末酒服方寸匕日三千金小便膏淋羊骨燒研榆白皮煎湯服二錢聖惠方洞注下痢羊骨灰水服方寸匕千金方疳瘡成漏膿水不止用羊羔兒骨不拘多少入藏瓶內鹽泥固濟煅過研末每用末五錢入麝香雄黃末各一錢填瘡口三日外必合總微論尾骨主治益腎明目補下焦虛冷正要附方新一虛損昏聾大羊尾骨一條水五碗煮減半入蔥白五莖荊芥一握陳皮一兩面三兩煮熟取汁搜面作索餅同羊肉四兩煮熟和五味食多能鄙事脛骨音行亦作䯒又名𩩅骨胡人名頗兒必入藥煅存性用氣味甘溫無毒詵曰性熱有宿熱人勿食鏡源云羊𩩅骨伏硇主治虛冷勞孟詵脾弱腎虛不能攝精白濁除濕熱健腰腳固牙齒去皯𪒟治誤吞銅錢時珍發明杲曰齒者骨之餘腎之標故牙疼用羊脛骨以補之時珍曰羊脛骨灰可以磨鏡羊頭骨可以消鐵故誤吞銅錢者用之取其相制也按張景陽七命云耶溪之鋌赤山之精銷以羊頭鏷以鍛成注云羊頭骨能銷鐵也又名醫録云漢上張成忠女七八歲誤吞金匱子一雙胸膈痛不可忍憂惶無措一銀匠炒末藥三錢米飲服之次早大便取下叩求其方乃羊脛灰一物耳談野翁亦有此方皆巧哲格物究理之妙也附方新十一擦牙固齒食鑑用火煅羊脛骨為末入飛鹽二錢同研勻日用又方燒白羊脛骨灰一兩升麻一兩黃連五錢為末日用瀕湖方用羊脛骨燒過香附子燒黑各一兩青鹽煅過生地黃燒黑各五錢研用濕熱牙疼用羊脛骨灰二錢白芷當歸牙皂青鹽各一錢為末擦之東垣方脾虛白濁過慮傷脾脾不能攝精遂成此疾以羊脛骨灰一兩薑製厚朴末二兩麵糊丸梧桐子大米飲下百丸日二服一加茯苓一兩半濟生方虛勞瘦弱用頗兒必四十枚以水一升熬減大半去滓及油待凝任食正要筋骨攣痛用羊脛骨酒浸服之月水不斷羊前左腳脛骨一條紙裹泥封令乾煅赤入棕櫚灰等分每服一錢溫酒服之皯𪒟醜陋治人面體黧黑皮厚狀醜用羖羊脛骨為末雞子白和敷旦以白粱米泔洗之三日如素神效肘後誤吞銅錢羊脛骨燒灰以煮稀粥食神效談野翁方咽喉骨鯁羊脛骨灰米飲服一錢普濟懸蹄毛主治轉筋醋煮裹腳孟詵又見氈須羖羊者良主治小兒口瘡蠼螋尿瘡燒灰和油敷時珍出廣濟附方新二香瓣瘡生面上耳邊浸淫水出久不愈用羖羊須荊芥干棗肉各二錢燒存性入輕粉半錢每洗拭清油調搽二三次必愈聖惠方口吻瘡方同上溺主治傷寒熱毒攻手足腫痛欲斷以一升和鹽豉搗漬之李時珍出肘後方屎青羖羊者良氣味苦平無毒時珍曰制粉霜主治燔之主小兒泄痢腸鳴驚癇別録燒灰理聤耳並罯竹刺入肉治箭鏃不出日華燒灰淋汁沐頭不過十度即生髮長黑和雁肪塗頭亦良藏器頌曰屎納鯽魚腹中瓦缶固濟燒灰塗發易生而黑甚效煮湯灌下部治大人小兒腹中諸疾疳濕大小便不通燒煙燻鼻治中惡心腹刺痛亦熏諸瘡中毒痔瘻等治骨蒸彌良蘇恭附方舊五新十六疳痢欲死新羊屎一升水一升漬一夜絞汁頓服日午乃食極重者不過三服瘥總録嘔逆酸水羊屎十枚酒二合煎一合頓服未定更服之兵部手集反胃嘔食羊糞五錢童子小便一大盞煎六分去滓分三服聖惠小兒流涎白羊屎頻納口中千金心氣疼痛不問遠近以山羊糞七枚油頭髮一團燒灰酒服永斷根孫氏集效方妊娠熱病青羊屎研爛塗臍以安胎氣外臺祕要傷寒肢痛手足疼欲脫取羊屎煮汁漬之瘥乃止或和豬膏塗之亦佳外臺時疾陰腫囊及莖皆熱腫以羊屎黃柏煮汁洗之外臺疔瘡惡腫青羊屎一升水二升漬少時煮兩沸絞汁一升頓服廣濟方裡外臁瘡羊屎燒存性研末入輕粉塗之集要痘風瘡證羊屎燒灰清油調敷之全幼心鑑小兒頭瘡羊糞煎湯洗淨仍以雄羊糞燒灰同屋上懸煤炒為末清油調塗普濟頭風白屑烏羊糞煎汁洗之聖惠發毛黃赤羊屎燒灰和臘豬脂塗之日三夜一取黑乃止聖惠方木刺入肉干羊屎燒灰豬脂和塗不覺自出千金箭鏃入肉方同上反花惡瘡鯽魚一個去腸以羯羊屎填滿燒存性先以米泔洗過搽之瘰癧已破羊屎燒五錢杏仁燒五錢研末豬骨髓調搽海上濕瘑浸淫新羊屎絞汁塗之乾者燒煙燻之聖濟總録雷頭風病羊屎焙研酒服二錢普濟方慢脾驚風活脾散用羊屎二十一個炮丁香一百粒胡椒五十粒為末每服半錢用六年東日照處壁土煎湯調下普濟方羊胲子乃羊腹內草積塊也主治翻胃煅存性每一斤入棗肉平胃散末一半和勻每服一錢空心沸湯調下葉氏摘玄附録大尾羊時珍曰羊尾皆短而哈密及大食諸番有大尾羊細毛薄皮尾上旁廣重一二十斤行則以車載之唐書謂之靈羊云可療毒胡羊方國志云大食國出胡羊高三尺余其尾如扇每歲春月割取脂再縫合之不取則脹死葉盛水東日記云莊浪衛近雪山有叨羊土人歲取其脂不久復滿洮羊出臨洮諸地大者重百斤郭義恭廣志云西域驢羊大如驢即此類也𦍧羊此思切出西北地其皮蹄可以割漆封羊其背有肉封如駝出涼州郡縣亦呼為駝羊地生羊出西域劉郁出使西域記以羊臍種於土中溉以水聞雷而生臍與地連及長驚以木聲臍乃斷便能行齧草至秋可食臍內復有種名壟種羊段公路北戶録云大秦國有地生羊其羔生土中國人築牆圍之臍與地連割之則死但走馬擊鼓以駭之驚鳴臍絶便逐水草吳策淵穎集云西域地生羊以脛骨種土中聞雷聲則羊子從骨中生走馬驚之則臍脫也其皮可為褥一云漠北人種羊角而生大如兔而肥美三説稍異未知果種何物也當以劉説為是然亦神矣造化之妙微哉羵羊土之精也其肝土也有雌雄不食季桓子曾掘土得之又千歲樹精亦為青羊黃羊綱目釋名羳羊音煩繭耳羊時珍曰羊腹帶黃故名或云幼稚曰黃此羊肥小故也爾雅謂之羳出西番也其耳甚小西人謂之繭耳集解時珍曰黃羊出關西西番及桂林諸處有四種狀與羊同但低小細肋腹下帶黃色角似羖羊喜臥沙地生沙漠能走善臥獨居而尾黑者名黑尾黃羊生野草內或群至數十者名曰黃羊生臨洮諸處甚大而尾似獐鹿者名洮羊其皮皆可為衾褥出南方桂林者則深褐色黑脊白斑與鹿相近也肉氣味甘溫無毒正要云煮湯少味腦不可食主治補中益氣治勞傷虛寒時珍出正要髓主治補益功同羊髓正要牛本經中品校正別録上品牛乳拾遺犢臍屎今併為一釋名時珍曰按許慎云牛件也牛為大牲可以件事分理也其文象角頭三封及尾之形周禮謂之大牢牢乃豢畜之室牛牢大羊牢小故皆得牢名內則謂之一元大武元頭也武足迹也牛肥則迹大猶史記稱牛為四蹄今人稱牛為一頭之義梵書謂之瞿摩帝牛之牡者曰牯曰特曰犅曰㹍牝者曰㸺曰牸南牛曰𤙬北牛曰𤚩純色曰犧黑曰𤚎白曰㹊赤曰騂駁曰犁去勢曰犍又曰犗無角曰汙子曰犢生二歲曰牬三歲曰犙四歲曰牭五歲曰𤘦六歲曰犕集解藏器曰牛有數種本經不言黃牛烏牛水牛但言牛爾南人以水牛為牛北人以黃牛烏牛為牛牛種既殊入用當別時珍曰牛有𤚩牛水牛二種𤚩牛小而水牛大𤚩牛有黃黑赤白駁雜數色水牛色青蒼大腹鋭頭其狀類豬角若擔矛衛護其犢能與虎鬥亦有白色者鬱林人謂之周留牛又廣南有稷牛即果下牛形最卑小爾雅謂之犤牛王會篇謂之紈牛是也牛齒有下無上察其齒而知其年三歲二齒四歲四齒五歲六齒六歲以後每年接脊骨一節也牛耳聾其聽以鼻牛瞳豎而不橫其聲曰牟項垂曰胡蹄肉曰𤜂百葉曰膍角胎曰䚡鼻木曰牶嚼草復出曰齝腹草未化曰聖齏牛在畜屬土在卦屬坤土緩而和其性順也造化權輿云乾陽為馬坤陰為牛故馬蹄圓牛蹄坼馬病則臥陰勝也牛病則立陽勝也馬起先前足臥先後足從陽也牛起先後足臥先前足從陰也獨以乾健坤順為説蓋知其一而已黃牛肉氣味甘溫無毒弘景曰𤚩牛惟勝青牛為良水牛惟可充食日華曰黃牛肉微毒食之發藥毒動病不如水牛詵曰黃牛動病黑牛尤不可食牛者稼穡之資不可多殺若自死者血脈已絶骨髓已竭不可食之藏器曰牛病死者發痼疾痃癖令人洞下疰病黑牛白頭者不可食獨肝者有大毒令人痢血至死北人牛瘦多以蛇從鼻灌之故肝獨也水牛則無之時珍曰張仲景云啖蛇牛毛髮向後順者是也人乳可解其毒內則云牛夜鳴則𤸈臭不可食病死者有大毒令人生疔暴亡食經云牛自死白首者食之殺人疥牛食之發癢黃牛水牛肉合豬肉及黍米酒食並生寸白蟲合韭薤食令人熱病合生薑食損齒煮牛肉入杏仁蘆葉易爛相宜詵曰惡馬食牛肉即馴亦物性也主治安中益氣養脾胃別録補益腰腳止消渴及唾涎孫思邈發明時珍曰韓懋言牛肉補氣與黃耆同功觀丹溪朱氏倒倉法論而引申觸類則牛之補土可心解矣今天下日用之物雖嚴法不能禁亦因肉甘而補皮角有用也朱震亨倒倉論曰腸胃為積穀之室故謂之倉倒者推陳以致新也胃屬土受物而不能自運七情五味有傷中宮停痰積血互相纏糾發為癱瘓為勞瘵為蠱脹成形成質為窠為臼以生百病而中宮愆和自非丸散所能去也此方出自西域異人其法用黃肥牡牛肉二十斤長流水煮成糜去滓濾取液再熬成琥珀色收之每飲一鍾隨飲至數十鍾寒月溫飲病在上則令吐在下則令利在中則令吐而利在人活變吐利後渴即服其小便一二碗亦可蕩滌余垢睡二日乃食淡粥養半月即精神強健沉疴悉亡也須五年忌牛肉蓋牛坤土也黃土色也以順德配乾牡之用也肉者胃之藥也熟而為液無形之物也故能由腸胃而透肌膚毛竅爪甲無所不到在表者因吐而得汗在清道者自吐而去在濁道者自利而除有如洪水泛漲陳莝順流而去盎然渙然潤澤枯稿而有精爽之樂也王綸云牛肉本補脾胃之物非吐下藥也特飲之既滿而溢爾借補為瀉故病去而胃得補亦奇法也但病非腸胃者似難施之附方新四小刀圭韓飛霞曰凡一切虛病皆可服之用小牛犢兒未交感者一隻臘月初八日或戊己日殺之去血燖毛洗淨同臟腑不遺分寸大銅鍋煮之每十斤入黃耆十兩人參四兩茯苓六兩官桂良薑各五錢陳皮三兩甘草蜀椒各二兩食鹽二兩淳酒二斗同煮水以八分為率文火煮至如泥其骨皆捶碎並濾取稠汁待冷以甕盛之埋於土內露出甕面凡飲食中皆任意食之或以酒調服更妙肥犬及鹿皆可依此法作之返本丸補諸虛百損用黃犍牛肉去筋膜切片河水洗數遍仍浸一夜次日再洗三遍水清為度用無灰好酒同入壇內重泥封固桑柴文武火煮一晝夜取出如黃沙為佳焦黑無用焙乾為末聽用山藥鹽炒過蓮肉去心鹽炒過並去鹽白茯苓小茴香炒各四兩為末每牛肉半斤入藥末一斤以紅棗蒸熟去皮和搗丸梧桐子大每空心酒下五十丸日三服乾坤生意腹中痞積牛肉四兩切片以風化石灰一錢擦上蒸熟食常食痞積自下經驗祕方腹中癖積黃牛肉一斤恆山三錢同煮熟食肉飲汁癖必自消甚效筆峰雜興牛皮風癬每五更炙牛肉一片食以酒調輕粉敷之直指方水牛肉氣味甘平無毒日華曰冷微毒宜忌同黃牛主治消渴止啘泄安中益氣養脾胃別録補虛壯健強筋骨消水腫除濕氣藏器附方舊二新一水腫尿澀牛肉一斤熟蒸以薑醋空心食之心鏡手足腫痛傷寒時氣毒攻手足腫痛欲斷生牛肉裹之腫消痛止範汪方白虎風痛寒熱發歇骨節微腫用水牛肉脯一兩炙黃燕窠土伏龍肝飛羅面各二兩砒黃一錢為末每以少許新汲水和作彈丸大於痛處摩之痛止即取藥拋於熱油鐺中聖惠頭蹄水牛者良氣味涼食經云患冷人勿食蹄中巨筋多食令人生肉刺主治下熱風孟詵附方舊一水腫脹滿小便澀者用水牛蹄一具去毛煮汁作羹蹄切食之或以水牛尾一條細切作腤䐶食或煮食亦佳食醫心鏡鼻水牛者良主治消渴同石燕煮汁服藏器治婦人無乳作羹食之不過兩日乳下無限氣壯人尤效孟詵療口眼喎斜不拘乾溼者以火炙熱於不患處一邊尉之即漸止宗奭皮水牛者良主治水氣浮腫小便澀少以皮蒸熟切入豉汁食之心鏡熬膠最良詳阿膠乳氣味甘微寒無毒弘景曰𤚩牛乳佳恭曰𤚩牛乳性平生飲令人利熱飲令人口乾微似溫也水牛乳作酪濃厚勝𤚩牛造石蜜須之藏器曰黑牛乳勝黃牛凡服乳必煮一二沸停冷啜之熱食即壅不欲頓服欲得漸消與酸物相反令人腹中結症患冷氣人忌之合生魚食作瘕時珍曰凡取以物撞之則易得余詳乳酪下制秦艽不灰木主治補虛羸止渴別録養心肺解熱毒潤皮膚日華冷補下熱氣和酥煎沸食去冷氣痃癖藏器患熱風人宜食之孟詵老人煮食有益入薑蔥止小兒吐乳補勞思邈治反胃熱噦補益勞損潤大腸治氣痢除疸黃老人煮粥甚宜時珍發明震亨曰反胃噎膈大便燥結宜牛羊乳時時咽之並服四物湯為上策不可用人乳人乳有飲食之毒七情之火也時珍曰乳煎蓽茇治氣痢有效蓋一寒一熱能和陰陽耳按獨異志云唐太宗苦氣痢衆醫不效下詔訪問金吾長張寶藏曾困此疾即具疏以乳煎蓽茇方上服之立愈宣下宰臣與五品官魏徵難之逾月不擬上疾復發復進之又平因問左右曰進方人有功未見除授何也徵懼曰未知文武二吏上怒曰治得宰相不妨授三品我豈不及汝耶即命與三品文官授鴻臚寺卿其方用牛乳半斤蓽茇三錢同煎減半空腹頓服附方舊二新九風熱毒氣煎過牛乳一升生牛乳一升和勻空腹服之日三服千金方小兒熱噦牛乳二合薑汁一合銀器文火煎五六沸一歲兒飲半合量兒大小加減與服之聖惠方下虛消渴心脾中熱下焦虛冷小便多漸羸瘦者牛羊乳渴即飲之每飲三四合廣利方病後虛弱取七歲以下五歲以上黃牛乳一升水四升煎取一升稍稍飲至十日止外臺方補益勞損千金翼崔尚書方鍾乳粉三兩袋盛以牛乳一升煎減三分之一去袋飲乳日三又方白石英末三斤與十歲以上生犢牸牛食每日與一兩和黑豆七日取牛乳或熱服一升或作粥食其糞以種菜食百無所忌能潤臟腑澤肌肉令人壯健腳氣痹弱牛乳五升硫黃三兩末之煎取三升每服三合羊乳亦可或以牛乳五合煎調硫黃末一兩服取汗尤良肘後肉人怪病人頂生瘡五色如櫻桃狀破則自頂分裂連皮剝脫至足名曰肉人常飲牛乳自消夏子益奇疾方重舌出涎特牛乳飲之聖惠蚰蜒入耳牛乳少少滴入即出若入腹者飲一二升即化為水聖惠方蜘蛛瘡毒牛乳飲之良生生編血氣味咸平無毒主治解毒利腸治金瘡折傷垂死又下水蛭煮拌醋食治血痢便血時珍發明時珍曰按元史云布智兒從太祖徵回回身中數矢血流滿體悶僕幾絶太祖命取一牛剖其腹納之牛腹中浸熱血中移時遂蘇又云李庭從伯顏攻郢州炮傷左脅矢貫於胸幾絶伯顏命剖水牛腹納其中良久而蘇何孟春云豫在職方時問各邊將無知此術者非讀元史弗知也故書於此以備緩急附方新一誤吞水蛭腸痛黃瘦牛血熱飲一二升次早化豬脂一升飲之即下出也肘後脂黃牛者良煉過用氣味甘溫微毒多食發痼疾瘡瘍鏡源云牛脂軟銅主治諸瘡疥癬白禿亦入面脂時珍附方新四消渴不止栝蔞根煎用生栝蔞根切十斤以水三斗煮至一斗濾淨入煉淨黃牛脂一合慢火熬成膏瓶收每酒服一杯日三總録腋下狐臭牛脂和胡粉塗之三度永瘥姚氏食物入鼻介介作痛不出用牛脂一棗大納鼻中吸入脂消則物隨出也千金方走精黃病面目俱黃多睡舌紫甚則舌面坼裂及加黑色若爪甲黑者死用豉半兩牛脂一兩煎過油脂綿裹烙舌去黑皮一重濃煎豉湯一盞飲之三十六黃方髓黑牛黃牛㸺牛者良煉過用氣味甘溫無毒主治補中填骨髓久服增年本經安五臟平三焦續絶傷益氣力止泄利去消渴皆以清酒暖服之別録平胃氣通十二經脈思邈治瘦病以黑牛髓地黃汁白蜜等分煎服孟詵潤肺補腎澤肌悅面理折傷擦損痛甚妙時珍附方新三補精潤肺壯陽助胃用煉牛髓四兩胡桃肉四兩杏仁泥四兩山藥末半斤煉蜜一斤同搗成膏以瓶盛湯煮一日每服一匙空心服之瑞竹方勞損風濕陸抗膏用牛髓羊脂各二升白蜜薑汁酥各三升煎三上三下令成膏隨意以溫酒和服之經心録手足皴裂牛髓敷之腦水牛黃牛者良氣味甘溫微毒心鏡曰牛熱病死者勿食其腦令生腸癰主治風眩消渴蘇恭脾積痞氣潤皴裂入面脂用時珍附方新四吐血咯血五勞七傷用水牛腦一枚塗紙上陰乾杏仁煮去皮胡桃仁白蜜各一斤香油四兩同熬干為末每空心燒酒服二錢匕乾坤祕韞偏正頭風不拘遠近諸藥不效者如神用白芷芎藭各三錢為細末以黃牛腦子搽末在上瓷器內加酒頓熟乘熱食之儘量一醉醒則其病如失甚驗保壽堂方脾積痞氣牛腦丸治男婦脾積痞病大有神效黃㸺牛腦子一個去皮筋擂爛皮硝末一斤蒸餅六個曬研和勻糊丸梧桐子大每服三十丸空心好酒下日三服百日有驗普濟方氣積成塊牛腦散用牛腦子一個去筋膜雄雞肫一個連皮黃並以好酒浸一宿搗爛入木香沉香砂仁各三兩皮硝一碗杵千下入生銅鍋內文武火焙乾為末入輕粉三錢令勻每服二錢空心燒酒服日三服同上心以下黃牛者良主治虛忘補心別録脾主治補脾藏器臘月淡煮日食一度治痔瘻和朴硝作脯食消痞塊時珍出千金醫通肺以下水牛者良主治補肺藏器肝主治補肝明目別録治瘧及痢醋煮食之孟詵婦人陰𧈟納之引蟲時珍腎主治補腎氣益精別録治濕痹孫思邈胃黃牛水牛俱良氣味甘溫無毒弘景曰青牛腸胃合犬肉犬血食病人主治消渴風眩補五臟醋煮食之詵補中益氣解毒養脾胃時珍附方新一啖蛇牛毒牛肚細切水一斗煮一升服取汗即瘥金匱要略膍一名百葉時珍曰膍音毗言其有比列也牛羊食百草與他獸異故其胃有膍有胘有蜂窠亦與他獸異也胘即胃之厚處主治熱氣水氣治痢解酒毒藥毒丹石毒發熱同肝作生以薑醋食之藏器膽臘月黃牛青牛者良弘景曰膽原附黃條中今拔出於此以類相從耳氣味苦大寒無毒主治可丸藥本經除心腹熱渴止下痢及口焦燥益目精別録臘月釀槐子服明目治疳濕彌佳蘇恭釀黑豆百日後取出每夜吞二七枚鎮肝明目藥性釀南星末陰乾治驚風有奇功蘇頌除黃殺蟲治癰腫時珍發明時珍曰淮南子萬畢術云牛膽塗熱釜釜即鳴牛膽塗桂莫知其誰注云能變亂人形詳見本書岣嶁云蛙得牛膽則不鳴此皆有所制也附方舊一新二谷疸食黃用牛膽汁一枚苦參三兩龍膽草一兩為末和少蜜丸梧桐子大每薑湯下五十丸千金男子陰冷以食茱萸納牛膽中百日令乾每取二七枚嚼納陰中良久如火千金痔瘻出水用牛膽蝟膽各一枚膩粉五十文麝香二十文以三味和勻入牛膽中懸四十九日取出為丸如大麥大以紙捻送入瘡內有惡物流出為驗也經驗胞衣附方新一臁瘡不斂牛胞衣一具燒存性研搽海上方喉白水牛者良主治小兒呷氣思邈療反胃吐食取一具去膜及兩頭逐節以醋浸炙燥燒存性每服一錢米飲下神效時珍出法天生意發明時珍曰牛喉嚨治呷氣反胃皆以類相從也按普濟方云反胃吐食藥食俱不下結腸三五日至七八日大便不通如此者必死昔全州周禪師得正胃散方於異人十痊八九君子收之可濟人命用白水牛喉一條去兩頭節並筋膜脂肉節節取下如阿膠片收之臨時旋炙用米醋一盞浸之微火炙乾淬之再炙再淬醋盡為度研末厚紙包收或遇陰濕時微火烘之再收遇此疾每服一錢食前陳米飲調下輕者一服立效靨水牛者良主治喉痹氣癭古方多用之時珍齒主治小兒牛癇別録發明時珍曰六畜齒治六癇皆比類之義也耳珠先生有固牙法用牛齒三十枚瓶盛固濟煅赤為末每以水一盞末二錢煎熱含漱冷則吐去有損動者以末揩之此亦以類從也牛角䚡釋名角胎時珍曰此即角尖中堅骨也牛之有䚡如魚之有鰓故名胎者言在角內也藏器曰水牛黃㸺牛者可用余皆不及久在糞土爛白者亦佳氣味苦溫無毒甄權曰苦甘主治下閉血瘀血疼痛女人帶下血燔之酒服本經燒灰主赤白痢藏器黃牛者燒之主婦人血崩大便下血冷痢宗奭黃牛者燒之止婦人血崩赤白帶下冷痢瀉血水泄藥性治水腫時珍千金徐王煮散用之發明時珍曰牛角䚡筋之粹骨之餘而䚡又角之精也乃厥陰少陰血分之藥燒之則性澀故止血痢崩中諸病附方舊三新三大腸冷痢㸺牛角䚡燒灰粥飲服二錢日二次經驗後方小兒滯下㸺牛角胎燒灰水服三方寸匕千金大便下血黃牛角䚡一具煅末食前濃煮豉汁服二錢日三神效近效方赤白帶下牛角䚡燒令煙斷附子以鹽水浸七度去皮等分為末每空心酒服二錢匕孫用和方鼠乳痔疾牛角䚡燒灰酒服方寸匕塞上方蜂蠆螫瘡牛角䚡燒灰醋和敷之肘後方角氣味苦寒無毒之才曰平主治水牛者燔之治時氣寒熱頭痛別録煎汁治熱毒風及壯熱日華㸺牛者治喉痹腫塞欲死燒灰酒服一錢小兒飲乳不快似喉痹者取灰塗乳上咽下即瘥蘇頌出崔元亮方治淋破血時珍附方舊一新二石淋破血牛角燒灰酒服方寸匕日五服普濟血上逆心煩悶刺痛水牛角燒末酒服方寸匕子母祕録赤禿髮落牛角羊角燒灰等分豬脂調塗普濟方骨氣味甘溫無毒主治燒灰治吐血鼻洪崩中帶下腸風瀉血水瀉日華治邪瘧燒灰同豬脂塗疳瘡蝕人口鼻有效時珍出十便發明時珍曰東夷以牛骨占卜吉凶無往不中牛非含智之物骨有先事之靈宜其可入藥治病也附方新二鼻中生瘡牛骨狗骨燒灰臘豬脂和敷千金水穀痢疾牛骨灰同六月六日曲炒等分為末飲服方寸匕乃御傳方也張文仲方蹄甲青牛者良主治婦人崩中漏下赤白蘇恭燒灰水服治牛癇和油塗臁瘡研末貼臍止小兒夜啼時珍出集要諸方附方新五猝魘不寤以青牛蹄或馬蹄臨人頭上即活肘後損傷接骨牛蹄甲一個乳香沒藥各一錢為末入甲內燒灰以黃米粉糊和成膏敷之祕韞牛皮風癬牛蹄甲驢糞各一兩燒存性研末油調抓破敷之五七日即愈藺氏經驗方臁脛爛瘡牛蹄甲燒灰桐油和敷海上方玉莖生瘡牛蹄甲燒灰油調敷之奚囊陰莖黃牛烏牛水牛並良主治婦人漏下赤白無子蘇恭牯牛卵囊主治疝氣一具煮爛入小茴香鹽少許拌食吳球毛主治臍中毛治小兒久不行蘇恭耳毛尾毛陰毛並主通淋閉時珍發明時珍曰古方牛耳毛陰毛尾毛治淋多用之豈以牛性順而毛性下行耶又治瘧病蓋禳之之義耳附方舊一新三猝患淋疾牛耳中毛燒取半錢水服尾毛亦可集驗方小兒石淋特牛陰毛燒灰漿水服一刀圭日再張文仲方邪氣瘧疾外臺用黑牛尾燒末酒服方寸匕日三服一用牯牛陰毛七根黃荊葉七片縛內關上亦效口涎日華曰以水洗老牛口用鹽塗之少頃即出或以荷葉包牛口使耕力乏涎出取之主治反胃嘔吐日華水服二匙終身不噎思邈吮小兒治客忤灌一合治小兒霍亂入鹽少許頓服一盞治喉閉口噤時珍出外臺胡居士方附方新七噎膈反胃集成用糯米末以牛涎拌作小丸煮熟食危氏得效香牛飲用牛涎一盞入麝香少許銀盞頓熱先以帛緊束胃脘令氣喘解開乘熱飲之仍以丁香汁入粥與食普濟千轉丹用牛涎好蜜各半斤木鱉仁三十個研末入銅器熬稠每以兩匙和粥與食日三服小兒流涎取東行牛口中涎沫塗口中及頤上自愈外臺方小兒口噤身熱吐沫不能乳方同上聖惠方損目破睛牛口涎日點二次避風黑睛破者亦瘥肘後身面疣目牛口涎頻塗之自落千金鼻津主治小兒中客忤水和少許灌之又塗小兒鼻瘡及濕癬時珍出外臺諸方耳垢烏牛者良時珍曰以鹽少許入牛耳中癢即易取主治蛇傷惡蠔毒恭蠔毛蟲也治癰腫未成膿封之即散疳蟲蝕鼻生瘡及毒蛇螫人並敷之時珍附方新三疔瘡惡腫黑牛耳垢敷之聖惠方脅漏出水不止用烏牛耳垢敷之即瘥普濟方鼻衄不止牛耳中垢車前子末等分和勻塞之良總録溺黃犍㸺牛黑牯牛者良氣味苦辛微溫無毒之才曰寒主治水腫腹脹腳滿利小便別録附方舊六新三水腫尿澀心鏡用烏犍牛尿半升空腹飲小便利良集驗用黃犍牛尿每飲三升老幼減半水氣喘促小便澀用㸺牛尿一斗訶黎勒皮末半斤先以銅器熬尿至三升入末熬至可丸丸梧桐子大每服茶下三十丸日三服當下水及惡物為效普濟方風毒腳氣以銅器取烏犢牛尿三升勤飲之小便利則消肘後腳氣脹滿尿澀取烏犢牛尿一升一日分服消乃止楊炎南行方久患氣脹烏牛尿一升空心溫服氣散止廣濟方症癖鼓脹烏牛尿一升微火煎如稠飴空心服棗許當鳴轉病出隔日更服之千金翼霍亂厥逆服烏牛尿二升千金方刺傷中水服烏牛尿二升三服止梅師屎稀者名牛洞烏牯黃牯牛者良氣味苦寒無毒鏡源云牛屎抽銅暈燒火能養一切藥力主治水腫惡氣乾者燔之敷鼠瘻惡瘡別録燒灰敷灸瘡不瘥藏器敷小兒爛瘡爛痘及癰腫不合能滅瘢痕時珍絞汁治消渴黃疸腳氣霍亂小便不通蘇恭發明時珍曰牛屎散熱解毒利溲故能治腫疸霍亂疳痢傷損諸疾燒灰則收濕生肌拔毒故能治癰疽瘡瘻爛痘諸疾也宋書孫法宗苦頭創夜有女人至曰我天使也事本不關善人使者誤及爾但取牛糞煮敷之即驗如其言果瘥此亦一異也附方舊七新二十二水腫溲澀黃牛屎一升絞汁飲溲利瘥勿食鹽梅師濕熱黃病黃牛糞日乾為末麵糊丸梧桐子大每食前白湯下七十丸簡便方霍亂吐下不止四肢逆冷外臺用黃牛屎半升水二升煮三沸服半升止聖惠用烏牛糞絞汁一合以百日兒乳汁一合和溫服疳痢垂死新牛屎一升水一升攪澄汁服不過三服必效方猝死不省四肢不收取牛屎一升和溫酒灌之或以濕者絞汁亦可此扁鵲法也肘後猝陰腎痛牛屎燒灰酒和敷之良梅師腳跟腫痛不能著地用黃牛屎入鹽炒熱罨之王永輔惠濟方妊娠腰痛牛屎燒末水服方寸匕日三外臺妊娠毒腫𤚩牛屎燒灰水服方寸匕日三並以酢和封千金方子死腹中濕牛糞塗腹上良千金小兒口噤白牛糞塗口中取瘥總録小兒夜啼牛屎一塊安席下勿令母知食療小兒頭瘡野外久干牛屎不壞者燒灰入輕粉麻油調搽普濟小兒白禿牛屎厚封之祕録小兒爛瘡牛屎燒灰封之滅瘢痕千金痘瘡潰爛王兌白龍散以臘月黃牛屎燒取白灰敷之或臥之即易痂疕而無瘢痕癰腫不合牛屎燒末用雞子白和封干即易之神驗也千金月令鼠瘻瘰癧千金五白膏白牛屎白馬屎白羊屎白雞屎白豬屎各一升於石上燒灰漏蘆末二兩以豬膏一升三合煎亂髮一兩半同熬五六沸塗之神驗肘後治鼠瘻有核膿血用熱牛屎封之日三蜣螂瘻疾熱牛屎封之日數易當有蜣螂出千金乳癰初起牛屎和酒敷之即消姚僧坦方燥瘑瘡癢熱牛屎塗之千金瘡傷風水痛劇欲死者牛屎燒灰熏令汗出即愈外臺祕要跌磕傷損黃牛屎炒熱封之裹定即效簡便湯火燒灼濕牛屎搗塗之姚和衆惡犬咬傷洗淨毒以熱牛屎封之即時痛止千金蜂蠆螫痛牛屎燒灰苦酒和敷千金方背瘡潰爛黃黑牛糞多年者曬乾為末入百草霜勻細糝之談野翁方黃犢子臍屎新生未食草者收干之主治九竅四肢指歧間血出乃暴怒所為燒此末水服方寸匕日四五服良藏器出姚僧坦方主中惡霍亂及鬼擊吐血以一升和酒三升煮汁服時珍出肘後屎中大豆洗曬收用主治小兒驚癇婦人難産蘇恭附方舊一新二小兒牛癇白牛屎中豆日日服之良總微論婦人難産牛屎中大豆一枚擘作兩片一書父一書子仍合住水吞之立産産書齒落不生牛屎中大豆十四枚小開豆頭以注齒根數度即生千金方聖齏時珍曰按劉恂嶺表録異云廣之容南好食水牛肉或炮或炙食訖即啜聖齏消之調以薑桂鹽醋腹遂不脹聖齏如青苔狀乃牛腸胃中未化草也主治食牛肉作脹解牛肉毒時珍齝草音癡一名牛轉草即牛食而復出者俗曰回噍主治絞汁服止噦藏器療反胃霍亂小兒口噤風時珍發明時珍曰牛齝治反胃噎膈雖取象回噍之義而沾濡口涎為多故主療與涎之功同附方新四反胃噎膈大力奪命丸牛轉草杵頭粳各半斤糯米一升為末取黃母牛涎和丸龍眼大煮熟食之入砂糖二兩尤妙醫學正傳霍亂吐利不止用烏牛齝草一團人參生薑各三兩甜漿水一升半煮汁五合服劉涓子鬼遺方小兒流涎用牛噍草絞汁少少與服普濟方初生口噤十日內者用牛口齝草絞汁灌之聖惠鼻桊音卷穿鼻繩木也主治木桊主小兒癇別録治消渴煎汁服或燒灰酒服時珍草桊燒研敷小兒鼻下瘡別録燒灰吹纏喉風甚效時珍附方新一消渴牛鼻木二個洗銼男用牝牛女用牡牛人參甘草各半兩大白梅十個水四碗煎三碗熱服甚妙普濟方馬本經中品校正別録上品出馬乳今併為一釋名時珍曰按許慎云馬武也其字象頭髦尾足之形牡馬曰騭音質曰兒牝馬曰騇曰騍曰草去勢曰騸一歲曰𩡧音弦二歲曰駒三歲曰駣音桃八歲曰𩡩音八名色甚多詳見爾雅及説文梵書謂馬為阿濕婆集解別録曰馬出雲中平澤弘景曰馬色類甚多入藥以純白者為良其口眼蹄皆白者俗中時有兩三爾小小用則不必拘也時珍曰別録以雲中馬為良雲中今大同府也大抵馬以西北方者為勝東南者劣弱不及馬應月故十二月而生其年以齒別之在畜屬火在辰屬午或云在卦屬乾屬金馬之眼光照人全身者其齒最少光愈近齒愈大馬食杜衡善走食稻則足重食鼠屎則腹脹食雞糞則生骨眼似殭蠶烏梅拭牙則不食得桑葉乃解挂鼠狼皮於槽亦不食遇海馬骨則不行以豬槽飼馬石灰泥馬槽馬汗著門並令馬落駒系獼猴於廄闢馬病皆物理當然耳肉以純白牡馬者為良氣味辛苦冷有毒詵曰有小毒士良曰有大毒思邈曰無毒日華曰只堪煮食餘食難消漬以清水搦洗血盡乃煮不然則毒不出患疔腫或曰以冷水煮之不可蓋釜鼎曰馬生角馬無夜眼白馬青蹄白馬黑頭者並不可食令人癲馬鞍下肉色黑及馬自死者並不可食殺人馬黑脊而斑臂者漏不可食蕭炳曰患痢生疥人勿食必加劇妊婦食之令子過月乳母食之令子疳瘦詵曰同倉米蒼耳食必得惡病十有九死同薑食生氣嗽同豬肉食成霍亂食馬肉毒發心悶者飲清酒則解飲濁酒則加弘景曰秦穆公云食駿馬肉不飲酒必殺人時珍曰食馬中毒者飲蘆根汁食杏仁可解主治傷中除熱下氣長筋骨強腰脊壯健強志輕身不飢作脯治寒熱痿痹別録煮汁洗頭瘡白禿時珍出聖惠附方舊一豌豆瘡毒馬肉煮清汁洗之兵部手集鬐膏鬐馬項上鬐也白馬者良氣味甘平有小毒鏡源云馬脂柔五金主治生髮別録治面皯手足皴粗入脂澤用療偏風口喎僻時珍發明時珍曰按靈樞經云猝口僻急者頰筋有寒則急引頰移頰筋有熱則縱緩不收以桑鉤鉤之以生桑灰置坎中坐之以馬膏尉其急頰以白酒和桂末塗其緩頰且飲美酒啖炙肉為之三拊而已靈樞無注本世多不知此方之妙竊謂口頰喎僻乃風中血脈也手足陽明之筋絡於口會太陽之筋絡於目寒則筋急而僻熱則筋緩而縱故左中寒則逼熱於右右中寒則逼熱於左寒者急而熱者緩也急者皮膚頑痹榮衛凝滯治法急者緩之緩者急之故用馬膏之甘平柔緩以摩其急以潤其痹以通其血脈用桂酒之辛熱急束以塗其緩以和其榮衛以通其經絡桑能治風痹通節竅也病在上者酒以行之甘以助之故飲美酒啖炙肉云乳時珍曰漢時以馬乳造為酒置挏馬之官謂挏撞而成也挏音同氣味甘冷無毒思邈曰性冷利同魚鱠食作瘕主治止渴別録治熱作酪性溫飲之消肉蘇恭心以下並用白馬者良主治喜忘別録肘後方治心昏多忘牛馬豬雞心干之為末酒服方寸匕日三則聞一知十詵曰患痢人食馬心則痞悶加甚肺主治寒熱小兒莖萎掌禹錫曰小兒無莖萎之疾疑誤時珍曰按千金方無小兒二字肝氣味有大毒弘景曰馬肝及鞍下肉殺人時珍曰按漢景帝云食肉毋食馬肝又漢武帝云文成食馬肝而死韋莊云食馬留肝則其毒可知矣方家以豉汁鼠矢解之附方新一月水不通心腹滯悶四肢疼痛用赤馬肝一片炙研每食前熱酒調服一錢通乃止聖惠腎時珍曰按熊太古冀越集云馬有墨在腎牛有黃在膽造物之所鍾也此亦牛黃狗寶之類當有功用惜乎前人不知漫記於此以俟白馬陰莖修治藏器曰凡收當取銀色無病白馬春月遊牝時力勢正強者生取陰乾百日用斆曰用時以銅刀破作七片將生羊血拌蒸半日曬乾以粗布拭去皮及乾血挫碎用氣味甘咸平無毒主治傷中脈絶陰不起強志益氣長肌肉肥健生子本經小兒驚癇別録益丈夫陰氣詵曰陰乾同肉蓯蓉等分為末蜜丸梧桐子大每空心酒下四十丸日再百日見效甄權曰主男子陰痿房中術偏用之駒胞衣主治婦人天癸不通煅存性為末每服三錢入麝香少許空腹新汲水下不過三服良孫氏集效眼白馬者生殺取之氣味平無毒主治驚癇腹滿瘧疾本經小兒鬾病與母帶之蘇恭夜眼在足膝上馬有此能夜行故名主治猝死尸厥齲齒痛時珍附方舊一新二猝死尸厥用白馬前腳夜目二枚白馬尾十四莖合燒以苦酒丸如小豆大白湯灌下二丸須臾再服即蘇肘後蟲牙齲痛肘後用馬夜眼如米大綿裹納孔中有涎吐去永斷根源或加生附子少許玉機微義用馬夜眼燒存性敷之立愈牙齒以下並用白馬者良氣味甘平有小毒主治小兒馬癇水磨服別録燒灰唾和塗癰疽疔腫出根效藏器附方舊一新三腸癰未成馬牙燒灰雞子白和塗之千金方疔腫未破白馬齒燒灰先以針刺破乃封之用濕面圍腫處醋洗去之根出大驗肘後赤根疔瘡馬牙齒搗末臘豬脂和敷根即出也燒灰亦可千金方蟲牙作痛馬牙一枚煅熱投醋中七次待冷含之即止唐瑤經驗方骨氣味有毒主治燒灰和醋敷小兒頭瘡及身上瘡孟詵止邪瘧燒灰和油敷小兒耳瘡頭瘡陰瘡瘭疽有漿如火灼敷乳頭飲兒止夜啼時珍出小品外臺諸方頭骨氣味甘微寒有小毒藏器曰頭骨埋於午地宜蠶浸於上流絶水蜞蟲主治喜眠令人不睡燒灰水服方寸匕日三夜一作枕亦良別録治齒痛燒灰敷頭耳瘡日華療馬汗氣入瘡痛腫燒灰敷之白汁出良時珍附方新三膽虛不眠用馬頭骨灰乳香各一兩酸棗仁炒二兩為末每服二錢溫酒服聖濟膽熱多眠馬頭骨灰鐵粉各一兩硃砂半兩龍腦半分為末煉蜜丸梧桐子大每服三十丸竹葉湯下聖惠方臁瘡潰爛三四年馬牙匡骨燒研先以土窖過小便洗數次搽之脛骨氣味甘寒無毒主治煅存性降陰火中氣不足者用之可代黃芩黃連朱震亨懸蹄赤白馬俱入用氣味甘平無毒甄權曰熱主治驚邪瘛瘲乳難辟惡氣鬼毒蠱疰不祥本經止衄血內漏齲齒赤馬者治婦人赤崩白馬者治漏下白崩別録主癲癇齒痛蜀本療腸癰下瘀血帶下殺蟲又燒灰入鹽少許摻走馬疳蝕甚良時珍出鉤玄諸方赤馬者闢溫瘧孟詵附方舊四新四損傷瘀血在腹用白馬蹄燒煙盡研末酒服方寸匕日三夜一血化為水也劉涓子鬼遺方婦人血病方同上五色帶下白馬左蹄燒灰酒服方寸匕日三外臺腸癰腹痛其狀兩耳輪甲錯腹痛或繞臍有瘡如粟皮熱下膿血用馬蹄灰和雞子白塗即拔毒氣出千金蟲蝕肛爛見五臟則死以豬脂和馬蹄灰綿裹導入下部日數度瘥肘後方齲齒疼痛削白馬蹄塞之不過三度千金方小兒頭瘡出膿晝開夜合馬蹄燒灰生油調塗聖惠方小兒夜啼馬蹄末敷乳上飲之普濟闢禳瘟疫以絳囊盛馬蹄屑二兩佩之男左女右肘後皮主治婦人臨産赤馬皮催生良孟詵治小兒赤禿以赤馬皮白馬蹄燒灰和臘豬脂敷之良時珍出聖惠鬐毛即鬃也一名鬣氣味有毒主治小兒驚癇女子崩中赤白別録思邈曰赤用赤馬白用白馬燒灰服止血塗惡瘡日華尾主治女人崩中小兒客忤時珍發明時珍曰馬尾濟生方治崩中十灰散中用之又延壽書云刷牙用馬尾令齒疏損近人多用燒灰揩拭最腐齒齦不可不知附方舊一新一小兒客忤小兒中馬毒客忤燒馬尾煙於前每日熏之瘥乃止聖惠方腹內蛇症白馬尾切酒服初服長五分一匕大者自出次服三分者一匕中者亦出更服二分者一匕小者復出不可頓服殺人千金方腦氣味有毒詵曰食之令人癲主治斷酒臘月者溫酒服之孫思邈血氣味有大毒詵曰凡生馬血入人肉中一二日便腫起連心即死有人剝馬傷手血入肉一夜致死汗氣味有大毒弘景曰患瘡人觸馬汗馬氣馬毛馬尿馬屎者並令加劇詵曰馬汗入瘡毒攻心欲死者燒粟稈灰淋汁浸洗出白沫乃毒氣也嶺南有人用此得力附方新二黥刺雕青以白馬汗搽上再以汗調水蛭末塗之子和飲酒欲斷刮馬汗和酒服之千金白馬溺氣味辛微寒有毒主治消渴破症堅積聚男子伏梁積疝婦人瘕積銅器承飲之別録洗頭瘡白禿漬惡刺瘡日十次愈乃止孟詵熱飲治反胃殺蟲時珍發明時珍曰馬尿治癥瘕有驗按祖臺之志怪云昔有人與其奴皆患心腹痛病奴死剖之得一白鱉赤眼仍活以諸藥納口中終不死有人乘白馬觀之馬尿墮鱉而鱉縮遂以灌之即化成水其人乃服白馬尿而疾愈此其徵效也反胃亦有蟲積者故亦能治之附方舊二新七肉症思肉用白馬尿三升空腹飲之當吐肉出不出者死千金食發成瘕咽中如有蟲上下是也白馬尿飲之佳千金伏梁心積銅器盛白馬尿一升旦旦服之妙小品婦人乳腫馬尿塗之立愈産寶小兒赤疵生身上者馬尿頻洗之千金蟲牙疼痛隨左右含馬溺不過三五度瘥千金方利骨取牙白馬尿浸茄科三日炒為末點牙即落或煎巴豆點牙亦落勿近好牙鮑氏狐尿刺瘡痛甚者熱白馬尿漬之千金痞塊心痛殭蠶末二錢白馬尿調服並敷塊上摘玄方白馬通時珍曰馬屎曰通牛屎曰洞豬屎曰零皆諱其名也凡屎必達胴腸乃出故曰通曰洞胴即廣腸也氣味微溫無毒鏡源云馬屎熅火養一切藥力主治止渴止吐血下血鼻衄金瘡止血婦人崩中別録敷頂止衄徐之才絞汁服治産後諸血氣傷寒時疾當吐下者藏器治時行病起合陰陽垂死者絞汁三合日夜各二服又治杖瘡打損傷瘡中風作痛者炒熱包尉五十遍極效孟詵絞汁灌之治猝中惡死酒服治産後寒熱悶脹燒灰水服治久痢赤白和豬脂塗馬咬人瘡及馬汗入瘡剝死馬骨刺傷人毒攻欲死者時珍出小品諸方附方舊四新十六吐血不止燒白馬通以水研絞汁一升服梅師方衄血不止録驗用綿裹白馬屎塞之千金用赤馬糞絞汁飲一二升並滴鼻內乾者浸水亦可口鼻出血用赤馬糞燒灰溫酒服一錢鈐方久痢赤白馬糞一丸燒灰水服肘後方猝中惡死吐利不止不知是何病不拘大人小兒馬糞一丸絞汁灌之乾者水煮汁亦可此扁鵲法也肘後攪腸沙痛欲死者用馬糞研汁飲之立愈經驗方小兒猝忤馬屎三升燒末以酒三斗煮三沸取汁浴兒避風千金小兒躽啼面青腹強是忤客氣新馬糞一團絞汁灌之千金傷寒勞復馬屎燒末冷酒服方寸匕便驗外臺熱毒攻肢手足腫痛欲脫以水煮馬屎汁漬之外臺風蟲牙痛白馬屎汁隨左右含之不過三口愈聖惠鼻齆不聞新馬屎汁仰頭含滿口灌入鼻中即通普濟筋骨傷破以熱白馬屎敷之無瘢千金疔腫傷風作腫以馬屎炒尉瘡上五十遍極效普濟方多年惡瘡或痛癢生釁用馬糞並齒同研爛敷上不過數次武丞相在蜀時脛有瘡癢不可忍用此而瘥兵部手集諸瘡傷水或傷風寒痛劇用馬屎燒煙燻令汁出愈千金方凍指欲墮馬糞煮水漬半日即愈千金積聚脹滿白馬糞同蒜搗膏敷患處效活人心統一切漏疾白馬通汁每服一升良千金屎中粟主治金創小兒客忤寒熱不能食蘇恭治小兒脅痛時珍千金有馬通粟丸附方舊一剝馬中毒被骨刺破欲死以馬腸中粟屎搗敷以尿洗之大效絞汁飲之亦可外臺白馬頭蛆見蟲部馬絆繩主治煎水洗小兒癇蘇恭燒灰摻鼻中生瘡時珍東行馬蹄下土弘景曰作方術可知女人外情時珍曰淮南萬畢術云東行白馬蹄下土合三家井中泥置人臍下即臥不能起也驢唐本草釋名時珍曰驢臚也臚腹前也馬力在膊驢力在臚也集解時珍曰驢長頰廣額磔耳修尾夜鳴應更性善馱負有褐黑白三色入藥以黑者為良女直遼東出野驢似驢而色駁鬃尾長骨骼大食之功與驢同西土出山驢有角如羚羊詳羚羊下東海島中出海驢能入水不濡又有海馬海牛海豬海獾等物其皮皆供用藏器曰海驢海馬海牛皮毛在陸地皆候風潮則毛起物性如此肉以下通用烏驢者良氣味甘涼無毒思邈曰酸平吳瑞曰食驢肉飲荊芥茶殺人妊婦食之難産同鳧茈食令人筋急病死者有毒主治解心煩止風狂釀酒治一切風日華主風狂憂愁不樂能安心氣同五味煮食或以汁作粥食孟詵補血益氣治遠年勞損煮汁空心飲療痔引蟲時珍野驢肉功同正要發明宗奭曰驢肉食之動風脂肥尤甚屢試屢驗日華子以為止一切風狂未可憑也頭肉主治煮汁服二三升治多年消渴無不瘥者又以漬曲醞酒服去大風動搖不休者孟詵亦洗頭風風屑日華同薑齏煮汁日服治黃疸百藥不治者時珍出張文仲方附方舊一中風頭眩心肺浮熱肢軟骨疼語蹇身顫用烏驢頭一枚如食法豉汁煮食心鏡脂主治敷惡瘡疥癬及風腫日華和酒服三升治狂癲不能語不識人和烏梅為丸治多年瘧未發時服三十丸又生脂和生椒搗熟綿裹塞耳治積年聾疾孟詵和酒等分服治猝咳嗽和鹽塗身體手足風腫時珍出千金附方舊一滴耳治聾烏驢脂少許鯽魚膽一個生油半兩和勻納樓蔥管中七日取滴耳中日二聖惠重出眼中息肉驢脂白鹽等分和勻注兩目眥頭日三夜一瘥千金方髓氣味甘溫無毒主治耳聾時珍附方新二多年耳聾重者用三兩度初起者一上便效用驢前腳脛骨打破向日中瀝出髓以瓷盒盛收每用綿點少許入耳內側臥候藥行其髓不可多用以白色者為上黃色者不堪又方驢髓以針砂一合水二合浸十日取清水少許和髓攪勻滴少許入耳中外以方新磚半個燒赤潑醋鋪磁石末一兩在磚上枕之至晚如此三度即通並普濟方血時珍曰熱血以麻油一盞和攪去沫煮熟即成白色此亦可異昔無言及者氣味咸涼無毒主治利大小腸潤燥結下熱氣時珍乳氣味甘冷利無毒思邈曰酸寒主治小兒熱急黃等多服使利唐本療大熱止消渴孫思邈小兒熱急驚邪赤痢蕭炳小兒癇疾客忤天吊風疾日華猝心痛絞結連腰臍者熱服三升孟詵蜘蛛咬瘡器盛浸之蚰蜒及飛蟲入耳滴之當化成水藏器頻熱飲之治氣鬱解小兒熱毒不生痘疹浸黃連取汁點風熱赤眼時珍出千金諸方附方舊一新三心熱風癇黑驢乳暖服三合日再服廣利方小兒口噤驢乳豬乳各一升煎一升五合服如杏仁許三四服瘥千金重舌出涎方同上聖惠撮口胎風先灸兩乳中三壯後用此方大驗用烏驢乳一合以東引槐枝三寸長十根火煨一頭出津拭淨浸乳中取乳滴口中甚妙聖惠方陰莖氣味甘溫無毒主治強陰壯筋時珍駒衣主治斷酒煅研酒服方寸匕外臺皮主治煎膠食之治一切風毒骨節痛呻吟不止和酒服更良其生皮覆瘧疾人良孟詵煎膠食主鼻洪吐血腸風血痢崩中帶下日華詳見阿膠附方舊一新一中風喎僻骨疼煩躁者用烏驢皮燖毛如常治淨蒸熟入豉汁中和五味煮食心鏡牛皮風癬生驢皮一塊以朴硝醃過燒灰油調搽之名一掃光李樓奇方毛主治頭中一切風病用一斤炒黃投一斗酒中漬三日空心細飲令醉暖臥取汗明日更飲如前忌陳倉米麥面孟詵附方新二小兒客忤剪驢膊上旋毛一彈子大以乳汁煎飲外臺襁褓中風取驢背前交脊中毛一拇指大入麝香豆許以乳汁和銅器中慢炒為末乳汁和灌之千金骨主治煮湯浴歷節風孟詵牝驢骨煮汁服治多年消渴極效時珍頭骨主治燒灰和油塗小兒顱解時珍懸蹄主治燒灰敷癰疽散膿水和油敷小兒解顱以瘥為度時珍附方舊一新三腎風下注生瘡用驢蹄二十片燒灰密陀僧輕粉各一錢麝香半錢為末敷之奇效方天柱毒瘡生脊大椎上大如錢赤色出水驢蹄二片胡粉熬一分麝香少許為末醋和塗之干則摻之聖惠飲酒穿腸飲酒過度欲至穿腸者用驢蹄硬處削下水煮濃汁冷飲之襄州散將樂小蠻得此方有效經驗方鬼瘧不止用白驢蹄銼炒砒霜各二分大黃四分緑豆三分雄黃一分硃砂半分研蜜丸梧桐子大未發平旦冷水服二丸即止七日忌油肘後溺氣味辛寒有小毒主治症癖反胃不止牙齒痛治水腫每服五合良畫體成字者為燥水用牝驢尿不成字者為濕水用䭸驢尿唐本浸蜘蛛咬瘡良藏器治反胃噎病狂犬咬傷癬癘惡瘡並多飲取瘥風蟲牙痛頻含漱之良時珍出千金諸方發明震亨曰一婦病噎用四物加驢尿與服以防其生蟲數十帖而愈時珍曰張文仲備急方言幼年患反胃每食羹粥諸物須臾吐出貞觀中許奉御兄弟及柴蔣諸名醫奉敕調治竟不能療漸疲困候絶旦夕忽一衛士云服驢小便極驗遂服二合後食止吐一半哺時再服二合食粥便定次日奏知則宮中五六人患反胃者同服一時俱瘥此物稍有毒服時不可過多須熱飲之病深者七日當效後用屢驗附方新三狐尿刺瘡烏驢尿頓熱漬之千金白癜風驢尿薑汁等分和勻頻洗聖惠方耳聾人中白一分乾地龍一條為末以烏驢駒尿一合和勻瓷器盛之每滴少許入耳立瘥聖惠屎主治熬之尉風腫漏瘡絞汁主心腹疼痛諸疰忤燒灰吹鼻止衄甚效和油塗惡瘡濕癬時珍附方新四猝心氣痛驢屎絞汁五合熱服即止肘後方經水不止及血崩用黑驢屎燒存性研末麵糊丸梧桐子大每空心黃酒下五七十丸神妙龔雲林醫鑑疔瘡中風腫痛用驢屎炒尉瘡上五十遍極效普濟方小兒眉瘡黑驢屎燒研油調塗立效聖惠方耳垢主治刮取塗蠍螫崔氏尾軸垢主治新久瘧無定期者以水洗汁和麵如彈丸二枚作燒餅未發前食一枚發時食一枚效蘇恭溺下泥主治敷蜘蛛傷藏器驢槽主治小兒拗哭不止令三姓婦人抱兒臥之移時即止勿令人知藏器發明時珍曰錦囊詩云系蟹懸門除鬼疾畫驢挂壁止兒啼言關西人以蟹殼懸之辟邪瘧江左人畫驢倒挂之止夜啼與驢槽止哭之義同皆厭禳法耳騾食鑑釋名時珍曰騾古文作騾從馬從𣎆諧聲集解時珍曰騾大於驢而健於馬其力在腰其後有鎖骨不能開故不孳乳其類有五牡驢交馬而生者騾也牡馬交驢而生者為駃騠音決題牡驢交牛而生者為馲𩢷音宅陌牡牛交驢而生者為䮰𩥃音謫冡牡牛交馬而生者為駏驉今俗通呼為騾矣肉氣味辛苦溫有小毒寧源曰騾性頑劣肉不益人孕婦食之難産時珍曰古方未見用騾者近時小籍時有其方云按呂氏春秋云趙簡子有白騾甚愛之其臣陽城胥渠有疾醫云得白騾肝則生不得則死簡子聞之曰殺畜活人不亦仁乎乃殺騾取肝與之胥渠病愈此亦剪須以救功臣之意書之於此以備醫案蹄主治難産燒灰入麝香少許酒服一錢普濟方屎主治打損諸瘡破傷中風腫痛炒焦裹尉之冷即易時珍駝宋開寶釋名橐駝漢書駱駝時珍曰駝能負囊橐故名方音訛為駱駝也集解馬志曰野駝家駝生塞北河西其脂在兩峰內入藥俱可頌曰野駝今惟西北番界有之家駝則北中人家蓄養生息者入藥不及野駝時珍曰駝狀如馬其頭似羊長項垂耳腳有三節背有兩肉峰如鞍形有蒼褐黃紫數色其聲曰𡇼其食亦齝其性耐寒惡熱故夏至退毛至盡毛可為毼其糞煙亦直上如狼煙其力能負重可至千斤日行二三百里又能知泉源水脈風候凡伏流人所不知駝以足踏處即得之流沙夏多熱風行旅遇之即死風將至駝必聚鳴埋口鼻於沙中人以為驗也其臥而腹不著地屈足露明者名明駝最能行遠于闐有風腳駝其疾如風日行千里土番有獨峰駝西域傳云大月氏出一封駝脊上有一峰隆起若封土故俗呼為封牛亦曰𤛑牛穆天子傳謂之牥牛爾雅謂之犦牛嶺南徐聞縣及海康皆出之南史云滑國有兩腳駝諸家所未聞也駝脂即駝峰脂在峰內謂之峰子油入藥以野駝者為良宗奭曰家駝峰蹄最精人多煮熟糟食氣味甘溫無毒鏡源曰能柔五金主治頑痹風瘙惡瘡毒腫死肌筋皮攣縮踠損筋骨火炙摩之取熱氣透肉亦和米粉作煎餅食之療痔開寶治一切風疾皮膚痹急及惡瘡腫毒漏爛並和藥敷之大明主虛勞風有冷積者以燒酒調服之正要附方新一周痹野駝脂煉淨一斤入好酥四兩同煉和勻每服半匙以熱酒半盞和化服之加至一匙日三服聖濟總録肉氣味甘溫無毒主治諸風下氣壯筋骨潤肌膚主惡瘡大明乳氣味甘溫無毒主治補中益氣壯筋骨令人不飢正要黃氣味苦平微毒主治風熱驚疾時珍發明時珍曰駱駝黃似牛黃而不香戎人以亂牛黃而功不及之毛主治婦人赤白帶下最良蘇恭頷毛療痔燒灰酒服方寸匕時珍出崔行功纂要附方新一陰上疳瘡駝絨燒灰水澄過入炒黃丹等分為末搽之即效龔氏經驗方屎主治乾研嗅鼻止衄寇宗奭燒煙殺蚊蝨博物志酪音洛唐本草釋名湩音棟集解恭曰牛羊水牛馬乳並可作酪水牛乳作者濃厚味勝𤚩牛馬乳作酪性冷驢乳尤冷不堪作酪也藏器曰酪有干濕乾酪更強時珍曰酪湩北人多造之水牛𤚩牛犛牛羊馬駝之乳皆可作之入藥以牛酪為勝蓋牛乳亦多爾按臞仙神隱云造法用乳半杓鍋內炒過入余乳熬數十沸常以杓縱橫攪之乃傾出罐盛待冷掠取浮皮以為酥入舊酪少許紙封放之即成矣又幹酪法以酪曬結掠去浮皮再曬至皮盡卻入釜中炒少時器盛曝令可作塊收用氣味甘酸寒無毒時珍曰水牛馬駝之酪冷𤚩牛羊乳酪溫詵曰患冷患痢人勿食羊乳酪甜酪合酢食成血瘕及尿血主治熱毒止渴解散發利除胸中虛熱身面上熱瘡肌瘡唐本止煩渴熱悶心膈熱痛日華潤燥利腸摩腫生精血補虛損壯顏色時珍發明時珍曰按戴原禮云乳酪血液之屬血燥所宜也附方舊三火丹癮疹以酪和鹽煮熱摩之即消千金翼蚰蜒入耳華他方用牛酪灌入即出若入腹則飲二升即化為黃水廣利方馬出黑汗水化乾酪灌之藏器酥別録上品釋名酥油北虜名馬思哥油集解弘景曰酥出外國亦從益州來本牛羊乳所作也恭曰酥乃酪作其性與酪異然牛酥勝羊酥其犛牛酥復勝家牛也思邈曰㸺牛犛牛乳者為上白羊者次之詵曰水牛酥與羊酪同功其羊酥勝牛酥汪機曰牛乳冷羊乳溫牛酥不離寒病之兼熱者宜之羊酥不離溫病之兼寒者宜之各有所長也犛酥雖勝然而難得時珍曰酥乃酪之浮面所成今人多以白羊脂雜之不可不辨按臞仙神隱云造法以牛乳入鍋煮二三沸傾入盆內冷定待面結皮取皮再煎油出去渣入在鍋內即成酥油一法以桶盛牛乳以木安板搗半日候沫出撇取煎去焦皮即成酥也凡入藥以微火熔化濾淨用之良㸺牛白羊酥氣味甘微寒無毒主治補五臟利大小腸治口瘡別録除胸中客熱益心肺思邈除心熱肺痿止渴止嗽止吐血潤毛髮日華益虛勞潤臟腑澤肌膚和血脈止急痛治諸瘡溫酒化服良時珍犛牛酥氣味甘平無毒主治去諸風濕痹除熱利大便去宿食思邈合諸膏摩風腫踠跌血瘀藏器發明時珍曰酥本乳液潤燥調營與血同功按生生編云酥能除腹內塵垢又追毒氣發出毛孔間也附方舊二新一蜂螫用酥塗之妙聖惠蟲咬以酥和鹽塗之聖惠方眯目以酥少許隨左右納鼻中垂頭臥少頃令流入目中物與淚同出也聖濟總録醍醐唐本草集解弘景曰佛書稱乳成酪酪成酥酥成醍醐色黃白作餅甚甘肥是也恭曰醍醐出酥中乃酥之精液也好酥一石有三四升醍醐熟抨煉貯器中待凝穿中至底便津出取之陶言黃白作餅乃未達之言也韓保升曰一説在酥中盛冬不凝盛夏不融者是也宗奭曰作酪時上一重凝者為酪面酪面上其色如油者為醍醐熬之即出不可多得極甘美用處亦少斆曰醍醐乃酪之漿凡用以重綿濾過銅器煎三兩沸用藏器曰此物性滑物盛皆透惟雞子殼及壺蘆盛之乃不出也氣味甘冷利無毒主治風邪痹氣通潤骨髓可為摩藥功優於酥唐本添精補髓益中填骨久服延年百鍊彌佳孫思邈主驚悸心熱頭疼明目敷腦頂心日華治月蝕瘡潤養瘡痂最宜宗奭發明機曰酥酪醍醐大抵性皆潤滑宜於血熱枯燥之人其功亦不甚相遠也附方舊三新二風虛濕痹醍醐二兩溫酒一杯每服和醍醐一匙效心鏡中風煩熱皮膚瘙癢醍醐四兩每服半匙溫酒一中盞和服日一聖惠方一切肺病咳嗽膿血不止用好酥五十斤煉三遍停凝當出醍醐每服一合日三服以瘥為度神效外臺方鼻中涕血以三煉酥中精液灌鼻中日三夜一良外臺小兒鼻塞不通不能食乳劉氏用醍醐二合木香零陵香各四分湯煎成膏塗頭上並塞鼻中外臺乳腐宋嘉祐釋名乳餅集解時珍曰諸乳皆可造今惟以牛乳者為勝爾臞仙神隱書云造乳餅法以牛乳一斗絹濾入釜煎三五沸水解之用醋點入如豆腐法漸漸結成漉出以帛裹之用石壓成入鹽甕底收之又造乳團法用酪五升煎滾入冷漿水半升必自成塊未成更入漿一盞至成以帛包搦如乳餅樣收之又造乳線法以牛乳盆盛曬至四邊清水出煎熱以酸奶漿點成漉出揉擦數次扯成塊又入釜蕩之取出捻成薄皮竹籤卷扯數次掤定曬乾以油炸熟食氣味甘微寒無毒詵曰水牛乳涼𤚩牛乳溫主治潤五臟利大小便益十二經脈微動氣孟詵治赤白痢切如豆大面拌酸漿水煮二十餘沸頓服小兒服之彌良蕭炳附方新一血痢不止乳腐一兩漿水一鍾煎服普濟方阿膠本經上品釋名傅致膠本經弘景曰出東阿故名阿膠時珍曰阿井在今山東兗州府陽穀縣東北六十里即古之東阿縣也有官舍禁之酈道元水經注云東阿有井大如輪深六七丈歲常煮膠以貢天府者即此也其井乃濟水所注取井水煮膠用攪濁水則清故人服之下膈疏痰止吐蓋濟水清而重其性趨下故治淤濁及逆上之痰也集解別録曰阿膠出東平郡東阿縣煮牛皮作之弘景曰今東都亦能作之用皮有老少膠有清濁熬時須用一片鹿角即成膠不爾不成也膠有三種清而薄者畫家用清而厚者名覆盆膠入藥用濁而黑者不入藥但可膠物爾頌曰今鄆州亦能作之以阿縣城北井水作煮者為真其井官禁真膠極難得貨者多偽其膠以烏驢皮得阿井水煎成乃佳爾今時方家用黃明膠多是牛皮本經阿膠亦用牛皮是二皮可通用但今牛皮膠製作不甚精只可膠物故不堪入藥也陳藏器言諸膠皆能療風止泄補虛而驢皮膠主風為最此阿膠所以勝諸膠也時珍曰凡造諸膠自十月至二三月間用㸺牛水牛驢皮者為上豬馬騾駝皮者次之其舊皮鞋履等物者為下俱取生皮水浸四五日洗刮極淨熬煮時時攪之恆添水至爛濾汁再熬成膠傾盆內待凝近盆底者名坌膠煎膠水以鹹苦者為妙大抵古方所用多是牛皮後世乃貴驢皮若偽者皆雜以馬皮舊革鞍靴之類其氣濁臭不堪入藥當以黃透如琥珀色或光黑如醫漆者為真真者不作皮臭夏月亦不濕軟修治弘景曰凡用皆火炙之斆曰凡用先以豬脂浸一夜取出柳木火上炙燥研用時珍曰今方法或炒成珠或以麵炒或以酥炙或以蛤粉炒或以草灰炒或酒化成膏或水化膏當各從本方氣味甘平無毒別録曰微溫張元素曰性平味淡氣味俱薄浮而升陽也入手太陰足少陰厥陰經得火良薯蕷為之使畏大黃主治心腹內崩勞極灑灑音蘚如瘧狀腰腹痛四肢痠痛女子下血安胎久服輕身益氣本經丈夫小腹痛虛勞羸瘦陰氣不足腳痠不能久立養肝氣別録堅筋骨益氣止痢藥性頌曰止泄痢得黃連蠟尤佳療吐血衄血血淋尿血腸風下痢女人血痛血枯經水不調無子崩中帶下胎前産後諸疾男女一切風病骨節疼痛水氣浮腫虛勞咳嗽喘急肺痿唾膿血及癰疽腫毒和血滋陰除風潤燥化痰清肺利小便調大腸聖藥也時珍發明藏器曰諸膠皆主風止泄補虛而驢皮主風為最宗奭曰驢皮煎膠取其發散皮膚之外也用烏者取烏色屬水以制熱則生風之義如烏蛇烏鴉烏雞之類皆然時珍曰阿膠大要只是補血與液故能清肺益陰而治諸證按陳自明云補虛用牛皮膠去風用驢皮膠成無己云陰不足者補之以味阿膠之甘以補陰血楊士瀛云凡治喘嗽不論肺虛肺實可下可溫須用阿膠以安肺潤肺其性和平為肺經要藥小兒驚風后瞳仁不正者以阿膠倍人參煎服最良阿膠育神人參益氣也又痢疾多因傷暑伏熱而成阿膠乃大腸之要藥有熱毒留滯者則能疏導無熱毒留滯者則能平安數説足以發明阿膠之蘊矣附方舊五新十四癱緩偏風治癱緩風及諸風手腳不遂腰腳無力者驢皮膠微炙熟先煮蔥豉粥一升別貯又以水一升煮香豉二合去滓入膠更煮七沸膠煬如餳頓服之及暖吃蔥豉粥如此三四劑即止若冷吃粥令人嘔逆廣濟方肺風喘促涎潮眼竄用透明阿膠切炒以紫蘇烏梅肉焙研等分水煎服之直指老人虛祕阿膠炒二錢蔥白三根水煎化入蜜二匙溫服胞轉淋閟阿膠三兩水二升煮七合溫服千金方赤白痢疾黃連阿膠丸治腸胃氣虛冷熱不調下痢赤白裡急後重腹痛口渴小便不利用阿膠炒過水化成膏一兩黃連三兩茯苓二兩為末搗丸梧子大每服五十丸粟米湯下日三和劑局方吐血不止千金翼用阿膠炒二兩蒲黃六合生地黃三升水五升煮三升分三服經驗治大人小兒吐血用阿膠炒蛤粉各一兩辰砂少許為末藕節搗汁入蜜調服肺損嘔血並開胃用阿膠炒三錢木香一錢糯米一合半為末每服一錢百沸湯點服日一普濟大衄不止口耳俱出用阿膠炙半兩蒲黃一兩每服二錢水一盞入生地黃汁一合煎至六分溫服急以帛系兩乳聖惠月水不調阿膠一錢蛤粉炒成珠研末熱酒服即安一方入辰砂末半錢月水不止阿膠炒焦為末酒服二錢祕韞妊娠尿血阿膠炒黃為末食前粥飲下二錢聖惠妊娠血痢阿膠二兩酒一升半煮一升頓服楊氏産乳妊娠下血不止阿膠三兩炙為末酒一升半煎化一服即愈又方用阿膠末二兩生地黃半斤搗汁入清酒三升絞汁分三服梅師方妊娠胎動刪繁用阿膠炙研二兩香豉一升蔥一升水三升煮二物取一升入膠化服産寶膠艾湯用阿膠炒二兩熟艾葉二兩蔥白一升水四升煮一升半分溫兩服産後虛閟阿膠炒枳殼炒各一兩滑石二錢半為末蜜丸梧桐子大每服五十丸溫水下未通再服和劑局方久嗽經年阿膠炒人參各二兩為末每用三錢豉湯一盞蔥白少許煎服日三次聖濟總録黃明膠綱目釋名牛皮膠食療水膠外臺海犀膏正誤權曰白膠一名黃明膠頌曰今方家所用黃明膠多是牛皮本經阿膠亦用牛皮是二膠亦通用但今牛皮膠製作不精故不堪用只以膠物耳而鹿角膠本經謂之白膠處處能作但功倍於牛膠故鮮有真者時珍曰案本經白膠一名鹿角膠煮鹿角作之阿膠一名傅致膠煮牛皮作之其説甚明黃明膠即今水膠乃牛皮所作其色黃明非白膠也但非阿井水所作耳甄權以黃明為鹿角白膠唐慎微又採黃明諸方附之並誤矣今正其誤析附阿膠之後但其功用亦與阿膠倣佛苟阿膠難得則真牛皮膠亦可權用其性味皆平補宜於虛熱若鹿角膠則性味熱補非虛熱者所宜不可不致辨也氣味甘平無毒主治吐血衄血下血血淋下痢妊婦胎動血下風濕走注疼痛打撲傷損湯火灼瘡一切癰疽腫毒活血止痛潤燥利大小腸時珍附方新二十四肺痿吐血黃明膠炙乾花桑葉陰乾各二兩研末每服三錢生地黃汁調下普濟方肺破出血或嗽血不止用海犀膏即水膠一大片炙黃塗酥再炙研末用白湯化三錢放冷服之即止斗門方吐血咯血黃明膠一兩切片炙黃新綿一兩燒研每服一錢食後米飲服日再食療衄血不止黃明膠蕩軟貼山根至髮際三因妊娠下血黃明膠二兩酒煮化頓服之肘後方咳嗽不瘥黃明膠炙研每服一錢人參末二錢薄豉湯二盞蔥白少許煎沸嗽時溫呷三五口即止食療腎虛失精水膠三兩研末以酒二碗化服日三服千金面上木痹牛皮膠化和桂末厚塗一二分良葉氏摘玄方寒濕腳氣牛皮膠一塊細切麵炒成珠研末每服一錢酒下其痛立止萬氏風濕走痛牛皮膠一兩薑汁半杯同化成膏攤紙上熱貼之冷即易甚效一加乳香沒藥一錢鄧筆峰方腳底木硬牛皮膠生薑汁化開調南星末塗上烘物尉之尸腳坼裂煬膠著布上烘貼之千金方破傷中風黃明膠燒存性研末酒服二錢取汗普濟方跌撲傷損真牛皮膠一兩干冬瓜皮一兩銼同炒存性研末每服五錢熱酒一鐘調服仍飲酒二三鍾暖臥微汗痛止一宿接元如故藺氏湯火傷灼水煎膠如糊冷掃塗之斗門一切腫毒已潰未潰用水膠一片水漬軟當頭開孔貼之未有膿者自消已潰還合者令膿自出王燾外臺祕要諸般癰腫黃明膠一兩水半升化開入黃丹一兩煮勻又放溫冷以翎掃上瘡口如未成者塗其四圍自消本事方便毒初起水膠熔化塗之即散直指方乳癤初發黃明水膠以濃醋化塗之立消楊起簡便方背疽初發阮氏經驗方用黃明牛皮膠四兩酒一碗重湯頓化隨意飲盡不能飲者滾白湯飲之服此毒不內攻不傳惡症談野翁試效方以新瓦上燒存性研末酒二碗服之唐氏經驗方又加穿山甲四片同燒存性云極妙無比瘰癧結核黑牛皮膠熔化攤膏貼之已潰者將膏搓作線長寸許紝入孔中頻換拭之取效楊氏經驗小兒痘瘢黃明膠炒研末溫酒調服一錢匕痘已出者服之無瘢未出者服之瀉下普濟物入耳中以麻繩剪令頭散著膠黏上徐引出之千金牛黃本經上品釋名醜寶時珍曰牛屬醜故隱其名金光明經謂之瞿盧折娜集解別録曰牛黃生隴西及晉地特牛膽中得之即陰乾百日使燥無令見日月光普曰牛死則黃入膽中如雞子黃也弘景曰舊云神牛出入鳴吼者有之夜視有光走入牛角中以盆水承而吐之即墮落水中今人多就膽中得之一子大如雞子黃相重疊藥中之貴莫復過此一子及三二分好者值五六千至一萬也多出梁州益州恭曰牛黃今出萊州密州淄州青州嶲州戎州牛有黃者必多吼喚喝迫而得者謂之生黃最佳黃有三種散黃粒如麻豆漫黃若雞卵中黃糊在肝膽間圓黃為塊形有大小並在肝膽中多生於𤚩特牛其𤙬牛未聞有黃也頌曰今出登萊州他處或有不甚佳凡牛有黃者身上夜有光眼如血色時復鳴吼恐懼人又好照水人以盆水承之伺其吐出乃喝迫即墮下水中取得陰乾百日一子如雞子黃大重疊可揭折輕虛而氣香者佳然人多偽之試法但揩摩手甲上透甲黃者為真雷曰此有四種喝迫而得者名生神黃殺死在角中得者名角中黃牛病死後心中剝得者名心黃初在心中如黃漿汁取得便投水中沾水乃硬如碎蒺藜及豆與帝珠子者是也肝膽中得者名肝黃大抵皆不及生黃為勝宗奭曰牛黃輕鬆自然微香西戎有犛牛黃堅而不香又有駱駝黃極易得亦能相亂不可不審之修治斆曰凡用單搗細研如塵絹裹定以黃嫩牛皮裹懸井中一宿去水三四尺明早取之氣味苦平有小毒日華曰甘涼普曰無毒之才曰人參為之使得牡丹菖蒲利耳目惡龍骨龍膽地黃常山蜚蠊畏牛膝乾漆時珍曰別録言牛黃惡龍膽而錢乙治小兒急驚疳病涼驚丸麝香丸皆兩用之何哉龍膽治驚癇解熱殺蟲與牛黃主治相近亦肝經藥也不應相惡如此主治驚癇寒熱熱盛狂痓除邪逐鬼本經療小兒百病諸癇熱口不開大人狂癲又墮胎久服輕身增年令人不忘別録主中風失音口噤婦人血噤驚悸天行時疾健忘虛乏日華安魂定魄辟邪魅猝中惡小兒夜啼甄權益肝膽定精神除熱止驚痢辟惡氣除百病思邈清心化熱利痰涼驚寧源痘瘡紫色發狂譫語者可用時珍出王氏方發明李杲曰牛黃入肝治筋病凡中風入臟者必用牛雄腦麝之劑入骨髓透肌膚以引風出若風中腑及血脈者用之恐引風邪流入於骨髓如油入面莫之能出也時珍曰牛之黃牛之病也故有黃之牛多病而易死諸獸皆有黃人之病黃者亦然因其病在心及肝膽之間凝結成黃故還能治心及肝膽之病正如人之淋石復能治淋也按宋史云宗澤知萊州使者取牛黃澤云方春疫癘牛飲其毒則結為黃今和氣流行牛無黃矣觀此則黃為牛病尤可徵矣附方舊四新四初生三日去驚邪辟惡氣以牛黃一豆許以赤蜜如酸棗許研勻綿蘸令兒吮之一日令盡姚和衆方七日口噤牛黃為末以淡竹瀝化一字灌之更以豬乳滴之聖惠方初生胎熱或身體黃者以真牛黃一豆大入蜜調膏乳汁化開時時滴兒口中形色不實者勿多服錢氏小兒方小兒熱驚牛黃一杏仁大竹瀝葛汁各一合和勻與服總微論驚癇嚼舌迷悶仰目牛黃一豆許研和蜜水灌之廣利方小兒驚候小兒積熱毛焦睡中狂語欲發驚者牛黃六分硃砂五錢同研以犀角磨汁調服一錢總微論腹痛夜啼牛黃一小豆許乳汁化服仍書田字於臍下聖惠方痘瘡黑陷牛黃二粒硃砂一分研末蜜浸胭脂取汁調搽一日一上王氏痘疹方鮓答綱目集解時珍曰鮓答生走獸及牛馬諸畜肝膽之間有肉囊裹之多至升許大者如雞子小者如栗如榛其狀白色似石非石似骨非骨打破層疊嘉靖庚子年蘄州侯屠殺一黃牛得此物人無識者有番僧云此至寶也牛馬豬畜皆有之可以祈雨西域有密咒則霖雨立至不知咒者但以水浸搬弄亦能致雨後考陶九成輟耕録所載鮓答即此物也其言曰蒙古人禱雨惟以淨水一盆浸石子數枚淘漉玩弄密持咒語良久輒雨石子名鮓答大者如雞卵小者不等乃走獸腹中所産狗牛馬者最妙蓋牛黃狗寶之類也又按京房易占云兵強主武則牛腹生石據此則鮓答狗寶同一類也但生於狗腹者為狗寶耳氣味甘咸平無毒主治驚癇毒瘡時珍狗寶綱目集解時珍曰狗寶生癩狗腹中狀如白石帶青色其理層疊亦難得之物也按賈似道悅生隨抄云任丘縣民家一犬甚惡後病衰為衆犬所噬而死剖之其心已化似石非石其重如石而包膜絡之如寒灰觀其脈理猶是心不知何緣致此嘗聞人患石淋有石塊刀斧不能破又嘗見龍脛骨中髓皆是白石虎目光落地亦成白石星之光氣也落則成石松亦化石蛇蟹蠶皆能成石萬物變化如此不可一概斷也時珍嘗靜思之牛之黃狗之寶馬之墨鹿之玉犀之通天獸之鮓答皆物之病而人以為寶人靈於物而猶不免此病況物乎人之病淋有沙石者非獸之鮓答乎人之病癖有心似金石者非狗之寶乎此皆囿於物而不能化者故禽鳥有生卵如石者焉按程氏遺書載有波斯人發閩中古冢棺內俱盡惟心堅如石鋸開觀之有山水青碧如畫傍有一女靚妝憑欄蓋此女有愛山癖朝夕注意故融結如此又宋潛溪文集載臨川浮屠法循行般舟三昧法示寂後火焚惟心不化出五色光有佛像高三寸非骨非石百體具足又徽水有優婆塞行禪觀之法及死火葬心內包觀音像如刻成此皆志局於物用志不分精靈氣液因感而凝形正如孕女感異像而成鬼胎之類非祥也病也有情之無情也氣味甘咸平有小毒主治噎食及癰疽瘡瘍時珍附方新四噎食病數月不愈者用狗寶為末每服一分以威靈仙二兩鹽二錢搗如泥將水一鍾攪勻去滓調服日二不過三日愈後服補劑杏林摘要狗寶丸治癰疽發背諸毒初覺壯熱煩渴者用癩狗寶一兩臘月黑狗膽臘月鯉魚膽各一枚蟾酥二錢蜈蚣炙七條硇砂乳香沒藥輕粉雄黃烏金石各一錢粉霜三錢麝香一分同為末用首生男兒乳一合黃蠟三錢熬膏和丸緑豆大每服一丸或三丸以白丁香七枚研調新汲水送下暖臥汗出為度不過三服立效後食白粥補之濟生方赤疔瘡狗寶丸用狗寶八分蟾酥二錢龍腦二錢麝香一錢為末好酒和丸麻子大每服三丸以生蔥三寸同嚼細用熱蔥酒送下暖臥汗出為度後服流氣追毒藥貼拔毒膏取愈通玄論反胃膈氣丁丹崖祖傳狗寶丸用硫黃水銀各一錢同炒成金色入狗寶三錢為末以雞卵一枚去白留黃和藥攪勻紙封泥固煻火煨半日取出研細每服五分燒酒調服不過三服見效楊氏頤真堂方底野迦唐本草集解恭曰出西戎彼人云用諸膽作之狀似久壞丸藥赤黑色胡人時將至此甚珍重之試用有效頌曰宋時南海亦或有之氣味辛苦寒無毒主治百病中惡客忤邪氣心腹積聚唐本草諸血拾遺集解時珍曰獸畜有水陸之産方土之殊寒熱溫涼之不同有毒無毒之各異陳氏概以諸血立條主病似欠分明姑存其舊而已其各血主治俱見本條氣味甘平主治補人身血不足或患血枯皮上膚起面無顏色者皆不足也並宜生飲又解諸藥毒菌毒止渴除丹毒去煩熱藏器諸朽骨拾遺集解時珍曰朽骨不分何骨然亦當取所知無毒之骨可也主治骨蒸東牆腐骨磨醋塗痕令滅又塗癧瘍風瘡癬白爛者東牆向陽也藏器治風牙痛止水痢時珍附方舊一新三骨蒸發熱多取諸朽骨洗淨土氣釜煮入桃柳枝各五斗煮枯再入棘針三斗煮減半去滓以酢漿水和之煮三五沸令患者正坐散發以湯從頂淋之唯熱為佳若心悶可少進冷粥當得大汗出惡氣汗乾乃粉身食豉粥拾遺水痢不止朽骨灰六月六日曲炒等分為末飲服方寸匕乃御傳方也張文仲方風牙作痛東牆下朽骨削之如疼牙齒許大煻灰中煨熱病處咬之冷即易外臺祕要打擊青腫牆上朽骨和唾於石上磨塗之干即易千金方震肉拾遺集解藏器曰此六畜為天雷所霹靂者因其事而用之也時珍曰按雷書云雷震六畜肉不可食令人成大風疾主治小兒夜驚大人因驚失心作脯食之藏器敗鼓皮別録下品校正原在草部宋本移入獸部集解宗奭曰此是穿敗者不言是何皮馬驢皮皆可為之當以黃牛皮者為勝唐韓退之所謂牛溲馬勃敗鼓之皮醫師收畜待用無遺者也今用處絶少尤好煎膠氣味平無毒主治中蠱毒別録弘景曰燒作屑水和服之病人即喚蠱主姓名往呼本主取蠱即瘥與白蘘荷同功治小便淋瀝塗月蝕耳瘡並燒灰用時珍出藥對附方舊二新一中蠱毒梅師方云凡中蠱毒或下血如鵝肝或吐血或心腹切痛如有物咬不即治之食人五臟即死欲知是蠱但令病人吐水沉者是浮者非也用敗鼓皮燒灰酒服方寸匕須臾自呼蠱主姓名外臺祕要云治蠱取敗鼓皮廣五寸長一尺薔薇根五寸如拇指大水一升酒三升煮二升服之當下蠱蟲即愈月蝕瘡集驗用救月蝕鼓皮掌大一片以苦酒三升漬一宿塗之或燒灰豬脂調塗外臺氈拾遺集解時珍曰氈屬甚多出西北方皆畜毛所作其白其黑者本色也其青烏黃赤者染色也其氈毯褐𦇧氍毹氆氌等稱者因物命名也大抵入藥不甚相遠烏氈氣味無毒主治火燒生瘡令不著風水止血除賊風燒灰酒服二錢匕治産後血下不止久臥吸人脂血損顏色上氣藏器附方新四墜損疼痛故馬氈兩段酒五升鹽一抄煮熱裹之冷即易三五度瘥廣濟方牙疳鼻疳氁褐不拘紅黑燒存性白礬燒枯各一錢尿桶白鹼一錢半燒過同研搽神效簡便夜夢魘寐以赤𦇧一尺枕之即安肘後赤白崩漏氈燒灰酒服二錢白崩用白氈紅崩用紅氈海上六畜毛蹄甲本經下品集解弘景曰六畜謂牛羊豬馬雞狗也驢騾亦其類各條已有主療亦不必出此矣時珍曰此係本經一品姑存以見古迹氣味咸平有毒主治鬼疰蠱毒寒熱驚癇癲痓狂走駱駝毛尤良本經六畜心綱目集解時珍曰古方多用六畜心治心病從其類也而又有殺時驚氣入心怒氣入肝諸心損心諸肝損肝之説與之相反主治心昏多忘心虛作痛驚悸恐惑時珍附方新二健忘心孔昏塞多忘喜誤取牛馬豬雞羊犬心干之為末向日酒服方寸匕日三服聞一知十外臺蛔蟲心痛用六畜心生切作四臠縱橫割路納硃砂或雄黃麝香於中平旦吞之蟲死即愈集驗諸肉有毒拾遺牛獨肝黑牛白頭牛馬生疔死羊獨角黑羊白頭豬羊心肝有孔馬生角白羊黑頭馬鞍下黑肉馬肝白馬黑頭六畜自死首北向馬無夜眼白馬青蹄六畜自死口不閉猘犬肉犬有懸蹄六畜疫病瘡疥死鹿白臆鹿文如豹諸畜帶龍形獸歧尾諸獸赤足諸畜肉中有米星獸並頭禽獸肝青諸獸中毒箭死脯沾屋漏米甕中肉脯六畜肉熱血不斷祭肉自動諸肉經宿未煮六畜五臟著草自動脯曝不燥生肉不斂水六畜肉得咸酢不變色肉煮不熟肉煮熟不斂水六畜肉墮地不沾塵肉落水浮肉汁器盛閉氣六畜肉與犬犬不食者乳酪煎膾以上並不可食殺人病人令人生癰腫疔毒諸心損心諸腦損陽滑精六畜脾一生不可食諸肝損肝諸血損血敗陽經夏臭脯痿人陰成水病魚餒肉敗諸脂燃燈損目本生命肉令人神魂不安春不食肝夏不食心秋不食肺冬不食腎四季不食脾解諸肉毒綱目中六畜肉毒六畜干屎末伏龍肝末黃柏末赤小豆燒末東壁土末白扁豆並水服飲人乳汁頭垢一錢水服起死人豆豉汁服馬肉毒蘆根汁甘草汁嚼杏仁飲美酒馬肝毒豬骨灰狗屎灰牡鼠屎人頭垢豆豉並水服牛馬生疔澤蘭根擂水生菖蒲擂酒甘菊根擂水豬牙灰水服甘草煎湯服取汗牛肉毒豬脂化湯飲豬牙灰水服甘草湯獨肝牛毒人乳服之狗肉毒杏仁研水服羊肉毒甘草煎水服豬肉毒杏仁研汁朴硝煎汁豬屎絞汁豬骨灰調水韭菜汁大黃湯藥箭肉毒大豆煎汁鹽湯諸肉過傷本畜骨灰水服芫荽煎汁生韭汁食肉不消還飲本汁即消食本獸腦亦消
