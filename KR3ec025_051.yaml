body:
  text: 獸部第五十一卷獸之二獸類三十八種獅綱目釋名狻猊音酸倪爾雅作狻麑虓許交切時珍曰獅為百獸長故謂之獅虓象其聲也梵書謂之僧伽彼說文云一名白澤今考瑞應圖白澤能言語非獅也集解時珍曰獅子出西域諸國狀如虎而小黃色亦如金色猱狗而頭大尾長亦有青色者銅頭鐵額鉤爪鋸牙弭耳昂鼻目光如電聲吼如雷有耐髯牡者尾上茸毛大如斗日走五百里為毛蟲之長怒則威在齒喜則威在尾每一吼則百獸辟易馬皆溺血爾雅言其食虎豹虞世南言其拉虎吞貔裂犀分象陶九成言其食諸禽獸以氣吹之羽毛紛落熊太古言其乳入牛羊馬乳中皆化成水雖死後虎豹不敢食其肉蠅不敢集其尾物理相畏如此然博物志載魏武帝至白狼山見物如貍跳至獅子頭殺之唐史載高宗時伽毗耶國獻天鐵獸能擒獅象則獅雖猛悍又有制之者也西域畜之七日內取其未開目者調習之若稍長則難馴矣屎時珍曰陶氏注蘇合香誤以為獅屎陳氏正其誤言獅屎極臭赤黑色今考補於此主治服之破宿血殺百蟲燒之去鬼氣藏器虎別録中品釋名烏䖘音徒左傳作於菟漢書作烏檡大蟲肘後李耳時珍曰虎象其聲也魏子才云其文從虍從幾象其蹲踞之形從人者非也揚雄方言云陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳或謂之𪂬䖘自關東西或謂之伯都珍按李耳當作貍兒蓋方音轉貍為李兒為耳也今南人猶呼虎為貓即此意也郭璞謂虎食物值耳則止故呼李耳觸其諱應邵謂南郡李翁化為虎故呼李耳皆穿鑿不經之言也爾雅云虎淺毛曰虦貓音棧白虎曰甝音含黑虎曰虪音育似虎而五指曰貙音傴似虎而非真曰彪似虎而有角曰虒音嘶集解頌曰虎本經不載所出今多山林處皆有之時珍曰按格物論云虎山獸之君也狀如貓而大如牛黃質黑章鋸牙鉤爪須健而尖舌大如掌生倒刺項短鼻齆夜視一目放光一目看物聲吼如雷風從而生百獸震恐易通卦驗云立秋虎始嘯仲冬虎始交或云月暈時乃交又云虎不再交孕七月而生又云虎知衝破能畫地觀奇偶以卜食今人效之謂之虎卜虎噬物隨月旬上下而齧其首尾其搏物三躍不中則舍之人死於虎則為倀鬼導虎而行虎食狗則醉狗乃虎之酒也聞羊角煙則走惡其臭也虎害人獸而蝟鼠能制之智無大小也獅駁酋耳黃腰渠搜能食虎勢無強弱也抱朴子云虎五百歲則變白又海中有虎鯊能變虎古有貙虎變人貙人變虎之說亦自有是理也附録酋耳瑞應圖云酋耳似虎絶大不食生物見虎豹即殺之太平則至郭璞云即騶虞也白虎黑紋尾長於身駁山海經云駁狀如馬白身黑尾一角鋸牙能食虎豹周書謂之茲白說苑云師曠言鵲食蝟蝟食駿駿食豹豹食駁駁食虎渠搜逸周書云渠搜西戎露犬也能食虎豹一云犴胡犬也能逐虎黃腰蜀志名黃腰獸鼬身貍首長則食母形雖小而能食虎及牛鹿也又孫愐云豰音斛似豹而小腰以上黃以下黑形類犬食獼猴又名黃腰䶂鼠見蝟下虎骨修治頌曰虎骨用頭及脛骨色黃者佳凡虎身數物俱用雄虎者勝藥箭射殺者不可入藥其毒浸潰骨血間能傷人也時珍曰凡用虎之諸骨並捶碎去髓塗酥或酒或醋各隨方法炭火炙黃入藥氣味辛微熱無毒之才曰平主治除邪惡氣殺鬼疰毒止驚悸治惡瘡鼠瘻頭骨尤良別録治筋骨毒風攣急屈伸不得走注疼痛治尸疰腹痛傷寒溫氣溫瘧殺犬咬毒甄權雜朱畫符療邪頭骨作枕辟惡夢魘置戶上闢鬼陶弘景煮汁浴之去骨節風毒腫和醋浸膝止腳痛腫脛骨尤良初生小兒煎湯浴之辟惡氣去瘡疥驚癇鬼疰長大無病孟詵追風定痛健骨止久痢脫肛獸骨鯁咽時珍發明頌曰李絳兵部手集有虎骨酒治臂脛痛崔元亮海上方治腰腳不隨並有虎脛骨酒方宗奭曰風從虎者風木也虎金也木受金制焉得不從故虎嘯而風生自然之道也所以治風病攣急屈伸不得走疰骨節風毒癲疾驚癇諸病皆此義也汪機曰虎之強悍皆賴於脛雖死而脛猶矻立不僕故治腳脛無力用之時珍曰虎骨通可用凡辟邪疰治驚癇溫瘧瘡疽頭風當用頭骨治手足諸風當用脛骨腰背諸風當用脊骨各從其類也按吳球諸證辨疑云虎陰也風陽也虎嘯風生陽出陰藏之義故其骨能追風定痛虎之一身筋節氣力皆出前足故以脛骨為勝附方舊十一新七健忘驚悸預知散用虎骨酥炙白龍骨遠志肉等分為末生薑湯服日三服久則令人聰慧永類鈐方臂脛疼痛虎骨酒治之不計深淺皆效用虎脛骨二大兩搗碎炙黃羚羊角屑一大兩新芍藥二大兩切三物以無灰酒浸之養至七日秋冬倍之每日空腹飲一杯若要速服即以銀器物盛於火爐中暖養三二日即可服也兵部手集腰腳不隨攣急冷痛取虎脛骨五六寸刮去肉膜塗酥炙黃搗細絹袋盛之以瓶盛酒一斗浸之糠火微溫七日後任情飲之當微利便效也又方虎腰脊骨一具前兩腳全骨一具並於石上以斧捶碎安鐵床上文炭火炙待脂出則投無灰濃酒中密封春夏七日秋冬三七日任性日飲三度患十年以上者不過三劑七年以下者一劑必瘥崔元亮海上方白虎風痛走注兩膝熱腫用虎脛骨塗酥炙黃黑附子炮裂去皮各一兩為末每服二錢酒下日再服經驗後方歷節痛風虎脛骨酒炙三兩沒藥半兩為末每服二錢溫酒下日三服聖濟總録歷節走痛百節皆痛不可忍用虎頭骨一具塗酥炙黃捶碎絹袋盛置二斗清酒中浸五宿隨性飲之妙聖惠方筋骨急痛虎骨和通草煮汁空肚服半升覆臥少時汗出為效切忌熱食損齒小兒齒生未足不可與食恐齒不生食療休息痢疾經時不愈取大蟲骨炙黃焦搗末飲服方寸匕日三取效張文仲方痔漏脫肛虎脛骨兩節以蜜二兩炙赤搗末蒸餅丸梧桐子大每凌晨溫酒下二十丸取效勝金肛門凸出虎骨燒末水服方寸匕日三外臺獸骨鯁咽虎骨為末水服方寸匕外臺狂犬咬傷虎骨刮末水服方寸匕並敷之小品方湯火傷灼虎骨炙焦研敷神效龔氏易簡方月蝕疳瘡虎頭骨二兩搗碎豬脂一斤熬膏塗之集驗方小兒白禿虎骨末油調塗之普濟足瘡嵌甲以橘皮湯浸洗輕剪去甲以虎骨末敷之痛即止便民圖纂臁脛爛瘡以齏汁洗拭刮虎骨末敷之便民圖纂威骨藏器曰虎有威骨如乙字長一寸在脅兩旁破肉取之尾端亦有不及脅骨令人有威帶之臨官佳無官則為人所憎肉氣味酸平無毒宗奭曰微咸弘景曰俗方言熱食虎肉壞人齒詵曰正月勿食虎傷神時珍曰虎肉作土氣味不甚佳鹽食稍可主治噁心欲嘔益氣力止多唾別録食之治瘧闢三十六種精魅入山虎見畏之孟詵附方新一脾胃虛弱噁心不欲飲食虎肉半斤切以蔥椒醬調炙熟空心冷食壽親養老方膏主治狗齧瘡別録納下部治五痔下血孟詵服之治反胃煎消塗小兒頭瘡白禿時珍附方新一一切反胃虎脂半斤切清油一斤瓦瓶浸一月密封勿令泄氣每以油一兩入無灰酒一盞溫服以瘥為度油盡再添壽域神方血主治壯神強志時珍曰獵人李次口云熱刺虎之心血飲之能壯神志又抱朴子云三月三日殺取虎血生駝血白虎頭皮紫綬履組流萍合種之初生草似胡麻子即取此實種之一生輒一異凡七種之取其實合用可以移形易貌肚主治反胃吐食取生者勿洗存滓穢新瓦固煅存性入平胃散末一兩和勻每白湯服三錢神效時珍出保壽堂方腎主治瘰癧時珍曰千金治瘰癧雌黃芍藥丸中用之袁達禽蟲述云虎腎懸於腹象口隱於頤膽主治小兒驚癇藏器小兒疳痢神驚不安研水服之孟詵睛修治頌曰虎睛多僞須自獲者乃真斆曰凡使虎睛須問獵人有雌有雄有老有嫩有殺得者惟中毒自死者勿用之能傷人虎睛以生羊血浸一宿漉出微火焙乾搗粉用時珍曰千金治狂邪有虎睛湯虎睛丸並用酒浸炙乾用主治癲疾別録瘧病小兒熱疾驚悸孟詵驚啼客忤疳氣鎮心安神日華明目去翳時珍附方舊二新二虎睛丸治癇疾發作涎潮搐搦時作譫語虎睛一對微炒犀角屑大黃遠志去心各一兩梔子仁半兩為末煉蜜丸緑豆大每溫酒服二十丸小兒驚癇掣瘲用虎睛細研水調灌之良經驗後方小兒夜啼用大蟲眼睛一隻為散以竹瀝調少許與吃姚和衆方邪瘧時作生虎睛一枚臘月豬血少許硃砂阿魏各一分為末端午日取粽尖七枚和丸黍米大每綿包一丸塞耳中男左女右聖惠方虎魄藏器曰凡虎夜視一目放光一目看物獵人候而射之弩箭才及目光即墮入地得之如白石者是也宗奭曰陳氏所謂乙骨及目光墮地之說終不免於誣也時珍曰乙骨之說不為怪目光之說亦猶人縊死則魄入於地隨即掘之狀如麩炭之義按茅亭客話云獵人殺虎記其頭項之處月黑掘下尺余方得狀如石子琥珀此是虎之精魄淪入地下故主小兒驚癇之疾其說甚詳寇氏未達此理耳主治驚邪辟惡鎮心藏器鼻主治癲疾小兒驚癇別録懸戶上令生男弘景時珍曰按龍魚河圖云虎鼻懸門中一年取燒作屑與婦飲便生貴子勿令人及婦知知則不驗又云懸於門上宜官子孫帶印綬此與古者胎教欲見虎豹皆取其勇壯之義同也牙主治丈夫陰瘡及疽瘻孫思邈殺勞蟲治猘犬傷發狂刮末酒服方寸匕時珍附方新一白虎風痛大虎牙一副四個赤足蜈蚣十條酒浸三日曬乾天麻二兩乳香沒藥各一兩麝香半兩為末每服二錢溫酒下一日三服聖濟總録爪頌曰爪並指骨毛俱可用以雄虎為勝主治系小兒臂辟惡魅別録時珍曰外臺辟惡魅用虎爪蟹爪赤朱雄黃為末松脂和丸每正旦焚之皮一名皋毗見莊子主治瘧疾藏器辟邪魅時珍發明時珍曰按應劭風俗通云虎者陽物百獸之長能闢鬼魅今人猝中惡病燒皮飲之或系衣服亦甚驗也起居雜記云虎豹皮上睡令人神驚其毛入瘡有大毒須主治齒痛弘景酉陽雜俎云許隱齒痛仙人鄭思遠拔虎鬚令插之痛即愈屎主治惡瘡別録鬼氣藏器療瘭疽痔漏燒研酒服治獸骨鯁時珍附方舊一瘭疽著手足肩背纍纍如米起色白刮之汁出愈而復發虎屎白者以馬尿和之曬乾燒灰粉之千金屎中骨主治為屑治火瘡別録破傷風時珍附方新一斷酒虎屎中骨燒灰酒服方寸匕即不飲千金方豹別録中品釋名程列子失刺孫時珍曰豹性暴故曰豹按許氏說文云豹之脊長行則脊隆豸豸然具司殺之形故字從豸從勺王氏字說云豹性勺物而取程度而食故字從勺又名曰程列子云青寧生程程生馬沈氏筆談云秦人謂豹為程至今延州猶然東胡謂之失刺孫集解弘景曰豹至稀有入用亦鮮惟尾可貴恭曰陰陽家有豹尾神車駕鹵簿有豹尾車名可尊重耳真豹尾有何可貴未審陶據奚說頌曰今河洛唐郢間或有之然豹有數種山海經有玄豹詩有赤豹尾赤而紋黑也爾雅有白豹即貘也毛白而紋黑郭璞注云貘能食銅鐵與貘同名不知入藥果用何類古今醫方鮮見之宗奭曰豹毛赤黃其紋黑如錢而中空比比相次又有土豹毛更無紋色亦不赤其形亦小此各有種非能變形也聖人假喻耳恐醫家不知故書之時珍曰豹遼東及西南諸山時有之狀似虎而小白麵團頭自惜其毛採其紋如錢者曰金錢豹宜為裘如艾葉者曰艾葉豹次之又西域有金線豹紋如金線海中有水豹上應箕宿禽蟲述云虎生三子一為豹則豹有變者寇氏未知爾豹畏蛇與䶂鼠而獅駁渠搜能食之淮南子云蝟令虎申蛇令豹止物有所制也廣志云狐死首丘豹死首山不忘本也豹胎至美為八珍之一肉氣味酸平無毒思邈曰溫微毒正月勿食傷神損壽主治安五臟補絶傷輕身益氣久服利人別録壯筋骨強志氣耐寒暑令人猛健日華闢鬼魅神邪宜腎孫思邈發明詵曰豹肉令人志性粗豪食之便覺少頃消化乃定久食亦然宗奭曰此獸猛捷過虎故能安五臟補絶傷輕身壯筋骨也脂主治合生發膏朝塗暮生孟詵亦入面脂時珍鼻主治狐魅同狐鼻水煮服藏器時珍曰按外臺治夢與鬼交及狐貍精魅載崔氏方中用之頭骨主治燒灰淋汁去頭風白屑孟詵作枕辟邪時珍出五行志皮藏器曰不可藉睡令人神驚其毛入人瘡中有毒時珍曰按林邑記云廣西南界有唼臘蟲食死人尸不可驅逐惟以豹皮覆之則畏而不來貘音陌亦作貊宋圖經校正原附豹下今分出釋名時珍曰按陸佃云皮為坐毯臥褥能消膜外之氣故字從膜省文集解頌曰郭璞云似熊而頭小腳卑黑白駁紋毛淺有光澤能舐食銅鐵及竹骨蛇虺其骨節強直中實少髓或云與爾雅貘白豹同名唐世多畫貘作屏白樂天有贊序之今黔蜀及峨眉山中時有貘象鼻犀目牛尾虎足土人鼎釜多為所食頗為山居之患亦捕以為藥其齒骨極堅以刀斧椎鍛鐵皆碎落火亦不能燒人得之詐充佛牙佛骨以誑俚俗時珍曰世傳羚羊角能碎金剛石者即此物相畏耳按說文云貘似熊黃白色出蜀中南中志云貘大如驢狀似熊蒼白色多力舐鐵消千斤其皮溫暖埤雅云貘似熊獅首豺髲鋭鬐卑腳糞可為兵切玉尿能消鐵為水又有齧鐵犴昆吾兔皆能食銅鐵亦貘類也並附之附録齧鐵時珍曰按神異經云南方有獸角足大小狀如水牛毛黑如漆食鐵而飲水糞可為兵其利如鋼名曰齧鐵唐史云吐火羅獻大獸高七尺食銅鐵日行三百里犴禽書云犴應井星胡狗也狀似狐而黑身長七尺頭生一角老則有鱗能食虎豹蛟龍銅鐵獵人亦畏之狡兔拾遺記云狡兔生昆吾山形如兔雄黃雌白食丹石銅鐵昔吳王武庫兵器皆盡掘得二兔一白一黃腹中腎膽皆鐵取鑄為劍切玉如泥皮主治寢之可驅溫癘闢濕氣邪氣蘇頌膏主治癰腫能透肌骨時珍曰段成式云貘膏性利銅鐵瓦器盛之悉透惟以骨盛則不漏尿主治吞銅鐵入腹者水和服之即化為水象宋開寶釋名時珍曰許慎說文云象字篆文象耳牙鼻足之形王安石字說云象牙感雷而文生天象感氣而文生故天象亦用此字南越志云象聞雷聲則牙花暴出逡巡覆沒古語云犀因望月紋生角象為聞雷花發牙伽耶出北戶録集解頌曰爾雅云南方之美者有梁山之犀象焉今多出交趾潮循諸州彼人捕得爭食其肉云肥脆堪作炙陳藏器云象具十二生肖肉各有分段惟鼻是其本肉炙食糟食更美又膽不附肝隨月在諸肉間如正月即在虎肉也徐鉉云象膽隨四時春在前左足夏在前右足秋後左足冬後右足也淳化中一象春斃太宗命取膽不獲使問鉉鉉以此對果得於前左足世傳荊蠻山中亦有野象然楚粵之象皆青黑惟西方拂林大食諸國乃多白象樊綽雲南記平居誨于闐行程記皆言其事時珍曰象出交廣雲南及西域諸國野象多至成群番人皆畜以服重酋長則飭而乘之有灰白二色形體臃腫面目醜陋大者身長丈餘高稱之大六尺許肉倍數牛目才若豕四足如柱無指而有爪甲行則先移左足臥則以臂著地其頭不能俯其頸不能回其耳下軃其鼻大如臂下垂至地鼻端甚深可以開合中有小肉爪能拾針芥食物飲水皆以鼻捲入口一身之力皆在於鼻故傷之則死耳後有穴薄如鼓皮刺之亦死口內有食齒兩吻出兩牙夾鼻雄者長六七尺雌者才尺余耳交牝則在水中以胸相貼與諸獸不同許慎云三年一乳古訓云五歲始産六十年骨方足其性能久識嗜芻豆甘蔗與酒而畏煙火獅子巴蛇南人殺野象多設機阱以陷之或埋象鞋於路以貫其足捕生象則以雌象為媒而誘獲之飼而狎之久則漸解人言使象奴牧之制之以鉤左右前後罔不如命也其皮可作甲齊鼓濕時切條可貫器物甄權曰西域重象牙用飾床座中國貴之以為笏象每蛻牙自埋藏之崑崙諸國人以木牙潛易取焉日華曰象蹄底似犀可作帶牙真臘風土記云象牙殺取者上也自死者次之蛻于山中多年者下矣或謂一歲一換牙者非也氣味甘寒無毒主治諸鐵及雜物入肉刮牙屑和水敷之立出治癇病刮齒屑炒黃研末飲服開寶生煮汁服治小便不通燒灰飲服治小便多日華諸物刺咽中磨水服之亦出舊梳屑尤佳蘇頌主風癇驚悸一切邪魅精物熱疾骨蒸及諸瘡並宜生屑入藥時珍發明時珍曰世人知然犀可見水怪而不知沉象可驅水怪按周禮壺涿氏掌水蟲欲殺其神者以橭木貫象齒而沉之則其神死而淵為陵注云橭木山榆也以象齒作十字貫於木而沉之則龍罔象之類死也又按陶貞白雲凡夏月合藥宜置象牙於旁合丹灶以象牙夾灶得雷聲乃能發光觀此則象之辟邪又不只於驅怪而已宜乎其能治心肝驚癇迷惑邪魅之疾也而昔人罕解用之何哉附方舊二新四小便不通脹急者象牙生煎服之救急小便過多象牙燒灰飲服之總録痘疹不收象牙屑銅銚炒黃紅色為末每服七八分或一錢白水下王氏痘疹方諸獸骨鯁象牙磨水吞之永類方骨刺入肉象牙刮末以水煮白梅肉調塗自軟簡要濟衆鐵箭入肉象牙刮末水和敷之即出也肉氣味甘淡平無毒主治燒灰和油塗禿瘡多食令人體重開寶發明時珍曰按呂氏春秋云肉之美者旄象之約又爾雅翼云象肉肥脆少類豬肉味淡而含滑則其通小便者亦淡滲滑竅之義燒之則從火化故又能縮小便也膽修治斆曰凡使勿用雜膽其象膽幹了上有青竹紋斑光膩其味微帶甘入藥勿便和衆藥須先搗成粉乃和衆藥氣味苦寒微毒主治明目治疳日華治瘡腫以水化塗之治口臭以綿裹少許貼齒根平旦漱去數度即瘥南海藥譜發明時珍曰象膽明目能去塵膜也與熊膽同功雷斆炮炙論序云象膽揮黏是矣附方新一內障目翳如偃月或如棗花用象膽半兩鯉魚膽七枚熊膽一分牛膽半兩麝香一錢石決明末一兩為末糊丸緑豆大每茶下十丸日二總録睛主治目疾和人乳滴目中藏器皮主治下疳燒灰和油敷之又治金瘡不合時珍發明時珍曰象肉臃腫人以斧刃刺之半日即合故近時治金瘡不合者用其皮灰骨主治解毒時珍胸前小橫骨燒灰酒服令人能浮開寶附方新一象骨散治脾胃虛弱水穀不消噫氣吞酸吐食霍亂泄瀉膿血臍腹疼痛裡急頻並不思飲食諸證用象骨四兩炒肉豆寇炮枳殼炒各一兩訶子肉炮甘草各二兩乾薑半兩炮為末每服三錢水一盞半煎至八分和滓熱服食前日三次宣明方犀本經中品釋名兕時珍曰犀字篆文象形其牸名兕亦曰沙犀爾雅翼云兕與牸字音相近猶羖之為牯也大抵犀兕是一物古人多言兕後人多言犀北音多言兕南音多言犀為不同耳詳下文梵書謂犀曰朅伽集解別録曰犀出永昌山谷及益州永昌即今滇南也弘景曰今出武陵交州寧州諸遠山犀有二角以額上者為勝又有通天犀角上有一白縷直上至端夜露不濡入藥至神驗或云此是水犀角出水中漢書所謂駭雞犀者置米飼雞皆驚駭不敢啄置屋上烏鳥不敢集又有牸犀角甚長紋理似犀不堪入藥恭曰牸是雌犀文理膩細斑白分明俗謂之斑犀服用為上入藥不如雄犀藏器曰犀無水陸二種但以精粗言之通天者腦上之角經千歲長且鋭白星徹端能出氣通天則能通神破水駭雞故曰通天抱朴子言此犀刻為魚銜之入水水開三尺是也頌曰犀角今以南海者為上黔蜀者次之犀似水牛豬首大腹卑腳腳似象有三蹄黑色舌上有刺好食棘刺皮上每一孔生三毛如豕有一角二角三角者爾雅云兕似牛犀似豕郭璞注云兕一角色青重千斤犀似水牛三角一在頂上一在額上一在鼻上鼻上者食角也又名奴角小而不橢亦有一角者劉恂嶺表録異云犀有二角一角額上為兕犀一在鼻上為胡帽犀牯犀亦有二角皆謂之毛犀而今人多傳一角之說此數種角俱有粟紋觀紋之粗細為貴賤貴者有通天花紋犀有此角者必自惡其影常飲濁水不欲照見也絶品者有百物之形或云犀之通天者乃其病理不可知也角紋有倒插者一半已下通有正插者一半已上通有腰鼓插者中斷不通其類極多故波斯呼象牙為白暗犀角為黑暗言難識也犀中最大者墮羅犀一株重七八斤云是牯犀額角其花多作撒豆斑色深者堪作帶胯斑散色淺者可作器皿耳或云兕乃犀之雌者亦似水牛而青色皮堅厚可以為鎧未知的否唐醫吳士皋言海人取犀先於山路多植朽木如豬羊棧其犀前腳直常依木而息爛木忽折倒僕久不能起因格殺之又云犀每歲一退角必自埋于山中海人潛作木角易之再三不離其處若直取之則後藏於別處不可尋矣李珣曰通天犀乃胎時見天上物過形於角上故曰通天但於月下以水盆映之則知按五溪記云山犀食竹木其小便即竟日不盡夷獠以弓矢採之名曰黔犀又異物志云山東海水中有牛樂聞絲竹彼人動樂則牛出聽因而採之有鼻角頂角以鼻角為上本草只知山犀未見水犀宗奭曰川犀南犀紋細烏犀有紋顯露黃犀紋絶少皆不及西番者紋高兩腳顯也物象黃外黑者為正透物象黑外黃者為倒透蓋以烏色為正以形象肖物為貴既曰通犀必須紋頭顯著黃黑分明有兩腳潤滑者為第一時珍曰犀出西番南番滇南交州諸處有山犀水犀兕犀三種又有毛犀似之山犀居山林人多得之水犀出入水中最為難得並有二角鼻角長而額角短水犀皮有珠甲而山犀無之兕犀即犀之牸者亦曰沙犀只有一角在頂紋理細膩斑白分明不可入藥蓋牯角紋大而牸角紋細也洪武初九真曾貢之謂之獨角犀是矣陳藏器謂犀無水陸郭璞謂犀有三角蘇頌謂毛犀為牯犀皆出訛傳今並正之毛犀即犛牛也見本條犀角紋如魚子形謂之粟紋紋中有眼謂之粟眼黑中有黃花者為正透黃中有黑花者為倒透花中復有花者為重透併名通犀乃上品也花如椒豆斑者次之烏犀純黑無花者為下品其通天夜視有光者名夜明犀故能通神開水飛禽走獸見之皆驚又山海經有白犀白色開元遺事有闢寒犀其色如金交趾所貢冬月暖氣襲人白孔六帖有闢暑犀唐文宗得之夏月能清暑氣嶺表録異有闢塵犀為簪梳帶胯塵不近身杜陽編有蠲忿犀云為帶令人蠲去忿怒此皆希世之珍故附見之犀角番名低密修治弘景曰入藥惟雄犀生者為佳若犀片及見成器物皆被蒸煮不堪用頌曰凡犀入藥有黑白二種以黑者為勝角尖又勝生犀不獨未經水火者蓋犀有捕得殺取者為上蛻角者次之宗奭曰鹿取茸犀取尖其精鋭之力盡在是也以西番生犀磨服為佳入湯散則屑之斆曰凡使勿用奴犀牸犀病水犀攣子犀無潤犀惟取烏黑肌皺坼裂光潤者銼屑入臼杵細研萬匝乃用李珣曰凡犀角鋸成當以薄紙裹於懷中蒸燥乘熱搗之應手如粉故歸田録云翡翠屑金人氣粉犀氣味苦酸咸寒無毒別録曰微寒李珣曰大寒無毒甄權曰牯犀角甘辛有小毒張元素曰苦酸寒陽中之陰也入陽明經之才曰松脂為之使惡雷丸雚菌時珍曰升麻為之使惡烏頭烏喙斆曰忌鹽及妊婦勿服能消胎氣主治百毒蠱疰邪鬼瘴氣殺鉤吻鴆羽蛇毒除邪不迷惑魘寐久服輕身本經傷寒溫疫頭痛寒熱諸毒氣令人駿健別録闢中惡毒氣鎮心神解大熱散風毒治發背癰疽瘡腫化膿作水療時疾熱如火煩悶毒入心中狂言妄語藥性治心煩止驚鎮肝明目安五臟補虛勞退熱消痰解山瘴溪毒日華主風毒攻心毷氉熱悶擁毒赤痢小兒麩豆風熱驚癇海藥燒灰水服治猝中惡心痛飲食中毒藥毒熱毒筋骨中風心風煩悶中風失音皆瘥以水磨服治小兒驚熱山犀水犀功用相同孟詵磨汁治吐血衄血下血及傷寒畜血發狂譫語發黃發斑痘瘡稠密內熱黑陷或不結痂瀉肝涼心清胃解毒時珍發明時珍曰犀角犀之精靈所聚足陽明藥也胃為水穀之海飲食藥物必先受之故犀角能解一切諸毒五臟六腑皆稟氣於胃風邪熱毒必先干之故犀角能療諸血及驚狂斑痘之證抱朴子云犀食百草之毒及衆木之棘所以能解毒凡蠱毒之鄉有飲食以此角攪之有毒則生白沫湧起無毒則否以之煮毒藥則無復毒勢也北戶録云凡中毒箭以犀角刺瘡中立愈由犀食百毒棘刺也昔溫嶠過武昌牛渚磯下多怪物嶠然犀角照之而水族見形淮南萬畢術云犀角置穴狐不敢歸則犀之精靈辟邪不惑於此益可見矣附方舊六新七吐血不止似鵝鴨肝用生犀角生桔梗各二兩為末每酒服二錢總録中忤中惡鬼氣其證或暮夜登廁或出郊外驀然倒地厥冷握拳口鼻出清血須臾不救似乎尸厥但腹不鳴心腹暖爾勿移動令人圍繞燒火打鼓或燒蘇合香安息香麝香之類候醒乃移動用犀角五錢麝香硃砂各二錢五分為末每水調二錢服即效華他方臥忽不寤若以火照之則殺人但唾其面痛齧其踵及大趾甲際即活以犀角為枕即令不魘肘後小兒驚癇不知人嚼舌仰目者犀角濃磨水服之立效為末亦可廣利方痘瘡稠密不拘大人小兒生犀於澀器中新汲水磨濃汁冷飲服之錢氏小兒方消毒解熱生犀角尖磨濃汁頻飲之同上服藥過劑犀角燒末水服方寸匕外臺中毒煩困方同上食雉中毒吐下不止用生犀角末方寸匕新汲水調服即瘥聖惠方蠼螋尿瘡狀如茱萸中央白膿惡寒壯熱磨犀角汁塗之千金方瘭疽毒瘡喜著十指狀如代指根深至肌能壞筋骨毒氣入臟殺人宜燒鐵烙之或灸百壯日飲犀角汁取瘥千金方山嵐瘴氣犀角磨水服之良集簡方下痢鮮血犀角地榆生地黃各一兩為末煉蜜丸彈子大每服一丸水一升煎五合去滓溫服聖惠方犛牛毛俚來三音綱目釋名毛犀廣志貓牛漢書注犘牛音麻㸲牛音作竹牛昨夢録犨牛音抽時珍曰犛者髦也其髦可為旌旄也其體多長毛而身角如犀故曰毛犀汲冢周書作犛牛顏師古作貓牛爾雅作犘牛音皆相近也山海經作㸲牛西人呼為竹牛因角理如竹也或云竹即㸲音之轉而犨又竹音之轉也楊慎丹鉛録云毛犀即彖也狀如犀而角小善知吉凶古人呼為貓豬交廣人謂之豬神是矣集解時珍曰犛牛出西南徼外居深山中野牛也狀及毛尾俱同犛牛犛小而犛大有重千斤者其尾名曰犛亦可為旌旄纓帽之用唐宋西徼諸州貢之中山經云荊山多犛牛郭璞注云犛牛之屬也其色黑又昨夢録云西夏竹牛重數百斤角甚長而黃黑相間制弓極徑彼人以僞犀角卒莫能辨曹昭格古論云毛犀即犛牛也角之花斑皆類山犀而無粟紋其理似竹不甚為奇故謂毛犀觀此則犛之角勝於犛而犛之毛尾勝於犛也又有野牛與此相類者並附於下附録犩牛音危又名夔牛如牛而大肉重數千斤出蜀山中𤛋牛廣志云出日南及潯州大賓縣色青黃與蛇同穴性嗜鹽人裹手塗鹽取之其角如玉可為器海牛齊地志云出登州海島中形似牛鼉腳鮎毛其皮甚軟可供百用脂可燃燈寰宇志名潛牛廣志名𤘺牛月支牛玄中記云出西胡及大月氏國今日割取肉明日其創即復合也山牛狀如牛而角有枝如鹿茸角氣味酸咸涼無毒主治驚癇熱毒諸血病時珍黃氣味原缺主治驚癇癲狂發明時珍曰犛牛亦有黃彼人以亂牛黃但堅而不香云功用亦相近也其角亦可亂犀但無粟紋蘇頌圖經誤以為牯犀角者是也亦可用而功不及犀昨夢録格古論說之詳矣牦牛音毛綱目釋名犣牛音鬣爾雅犏牛音偏時珍曰犛與旄同或作毛後漢書云冉䮾夷出犛牛一名犣牛重千斤毛可為旄觀此則旄牛之名蓋取諸此顏師古云犛牛即犏牛也而葉盛水東日記云毛牛與封牛合則生犏牛亦類毛牛偏氣使然故謂之犏然則犏又毛之遺種耶集解時珍曰犛牛出甘肅臨洮及西南徼外野牛也人多畜養之狀如水牛體長多力能載重迅行如飛性至粗梗髀膝尾背胡下皆有黑毛長尺許其尾最長大如斗亦自愛護草木鉤之則止而不動古人取為旌旄今人以為纓帽毛雜白色者以茜染紅色山海經云潘侯之山有旄牛狀如牛而四足節生毛即此也其肉味美故呂氏春秋云肉之美者犛象之肉也喉靨主治項下癭氣時珍發明時珍曰犛牛古方未見用者近世臞仙壽域方載治癭氣方用其喉靨亦因類之義也其方用犏牛喉脆骨二寸許一節連兩邊扇動脆骨取之或煮或燒仰臥頓服仍取巧舌即靨子也嚼爛噙之食頃乃咽病人容貌必瘦減而癭自內消矣不過二服即愈云神妙無比也野馬綱目集解時珍曰按郭璞云野馬似馬而小出塞外今西夏甘肅及遼東山中亦有之取其皮為裘食其肉云如家馬肉但落地不沾沙耳爾雅云驨如馬一角似鹿茸不角者騏也山海經云北海有獸狀如馬色青名曰騊駼此皆野馬類也肉氣味甘平有小毒主治人病馬癇筋脈不能自收周痹肌肉不仁思邈心鏡治上證用肉一斤豉汁煮熟入五味蔥白作醃臘及羹粥頻食之白煮亦可陰莖氣味酸咸溫無毒主治男子陰痿縮少精思邈發明時珍曰野馬孫思邈千金方載有功用而本草不收今採補之野豬唐本草集解宗奭曰野豬陝洛間甚多形如家豬但腹小腳長毛色褐作群行獵人惟敢射最後者若射中前者則散走傷人其肉赤色如馬肉食之勝家豬牝者肉更美詵曰冬月在林中食橡子其黃在膽中三歲乃有亦不常得時珍曰野豬處處深山中有之惟關西者時或有黃其形似豬而大牙出口外如象牙其肉有至二三百斤者能與虎鬥或云能掠松脂曳沙泥塗身以御矢也最害田稼亦啖蛇虺淮南子曰野彘有艽莦槎櫛窟虛連比以象宮室陰以防雨景以蔽日亦其知也範致能虞衡志云嶺南一種懶婦似山豬而小善害田禾惟以機軸紡織之器置田所則不復近也肉氣味甘平無毒宗奭曰微動風詵曰不發病減藥力與家豬不同但青蹄者不可食微動風時珍曰服巴豆藥者忌之主治癲癇補肌膚益五臟令人虛肥不發風虛氣孟詵炙食治腸風瀉血不過十頓日華附方舊一久痔下血野豬肉二斤著五味炙空腹食之作羹亦得食醫心鏡脂臘月煉過取之主治煉淨和酒日三服令婦人多乳十日後可供三四兒素無乳者亦下孟詵悅色除風腫毒瘡疥癬日華黃氣味辛甘平無毒主治金瘡止血生肉療癲癇水研如棗核許服之日二服效唐本研水服治血痢疰病藏器治惡毒風小兒疳氣客忤天吊日華膽主治惡熱毒氣孟詵鬼疰癲癇小兒諸疳水研棗許服日二時珍出衛生方齒主治燒灰水服治蛇咬毒藏器頭骨主治邪瘧聖惠方中用之附方新一積年下血野豬頭一枚桑西枝一握附子一枚同入瓶內煅過為末每服二錢粥飲空心服聖惠方外腎主治連皮燒存性研米飲服治崩中帶下及腸風瀉血血痢日華皮主治燒灰塗鼠瘻惡瘡時珍外臺方中用豪豬綱目釋名蒿豬唐本山豬通志豲𧱬音原俞𧱂豬音丸鸞豬時珍曰說文云豪豕鬣如筆管者能激毫射人故也郭璞曰吳楚呼為鸞豬星禽云壁水𧱬豪豬也集解頌曰豪豬陝洛江東諸山中並有之髦間有豪如箭能射人時珍曰豪豬處處深山中有之多者成群害稼狀如豬而項脊有棘鬣長近尺許粗如箸其狀似笄及帽刺白本而黑端怒則激去如矢射人羌人以其皮為靴郭璞云𧱂豬自為牝牡而孕也張師正倦遊録云南海有泡魚大如斗身有棘刺能化為豪豬巽為魚坎為豕豈巽變坎乎肉氣味甘大寒有毒頌曰不可多食發風令人虛羸主治多膏利大腸蘇頌肚及屎氣味寒無毒主治水病熱風鼓脹同燒存性空心溫酒服二錢匕用一具即消孟詵乾燒服之治黃疸蘇恭連屎燒研酒服治水腫腳氣奔豚時珍發明詵曰此豬多食苦參故能治熱風水脹而不治冷脹也時珍曰豪豬本草不載惟孟氏食療本草蝟條說之熊本經上品釋名時珍曰熊者雄也熊字篆文象形俗呼熊為豬熊羆為人熊馬熊各因形似以為別也述異記云在陸曰熊在水曰能即鯀所化者故熊字從能續搜神記云熊居樹孔中東土人擊樹呼為子路則起不呼則不動也又狒狒亦名人熊見本條集解別録曰熊生雍州山谷十一月取之弘景曰今東西諸山縣皆有之自非易得頌曰今雍洛河東及懷慶衛山中皆有之形類大豕而性輕捷好攀緣上高木見人則顛倒自投於地冬蟄入穴春月乃出其足名蹯為八珍之一古人重之然胹之難熟熊性惡鹽食之即死出淮南子時珍曰熊如大豕而豎目人足黑色春夏膘肥時皮厚筋駑每升木引氣或墮地自快俗呼跌膘即莊子所謂熊經鳥申也冬月蟄時不食飢則舐其掌故其美在掌謂之熊蹯其行山中雖數十里必有跧伏之所在石岩枯木山中人謂之熊館劉敬叔異苑云熊性惡穢物及傷殘捕者置此物於穴則合穴自死或為棘刺所傷出穴爪之至骨即斃也陸佃埤雅云其膽春近首夏在腹秋在左足冬在右足熊羆皆壯毅之物屬陽故書以喻不二心之臣而詩以為男子之祥也脂釋名熊白弘景曰脂即熊白乃背上肪色白如玉味甚美寒月則有夏月則無其腹中肪及身中脂煎煉過亦可作藥而不中啖修治斆曰凡取得每一斤入生椒十四個同煉過器盛收之氣味甘微寒無毒別録曰微溫日華曰涼其脂燃燈煙損人眼令失光明主治風痹不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白禿面上皯皰久服強志不飢輕身長年本經飲食嘔吐別録治風補虛損殺勞蟲酒煉服之日華長髮令黑悅澤人面蘇恭治面上䵟𪒟及瘡藥性附方舊二新一令髮長黑熊脂蔓荊子末等分和勻醋調塗之聖惠方發毛黃色以熊脂塗髮梳散入床底伏地一食頃即出便盡黑不過用脂一升效千金翼白禿頭癬熊白敷之楊氏産乳肉氣味甘平無毒別録曰微溫弘景曰有痼疾不可食熊肉令終身不除鼎曰若腹中有積聚寒熱者食之永不除也十月勿食之傷神主治風痹筋骨不仁功與脂同孫思邈補虛羸孟詵發明時珍曰按劉河間云熊肉振羸兔目明視因其氣有餘以補不足也附方舊二中風痹疾中風心肺風熱手足風痹不隨筋脈五緩恍惚煩躁熊肉一斤切入豉汁中和蔥薑椒鹽作醃臘空腹食之腳氣風痹五緩筋急用熊肉半斤如上法食之並食醫心鏡掌修治聖惠方云熊掌難胹得酒醋水三件同煮熟即大如皮球也主治食之可御風寒益氣力日華膽頌曰熊膽陰乾用然多僞者但取一粟許滴水中一道若線不散者為真時珍曰按錢乙云熊膽佳者通明每以米粒點水中運轉如飛者良余膽亦轉但緩爾周密齊東野語云熊膽善闢塵試之以淨水一器塵幕其上投膽米許則凝塵豁然而開也氣味苦寒無毒權曰惡防己地黃主治時氣熱盛變為黃疸暑月久痢疳䘌心痛疰忤蘇恭治諸疳耳鼻瘡惡瘡殺蟲日華小兒驚癇瘛瘲以竹瀝化兩豆許服之去心中涎甚良孟詵退熱清心平肝明目去翳殺蛔蟯蟲時珍發明時珍曰熊膽苦入心寒勝熱手少陰厥陰足陽明經藥也故能涼心平肝殺蟲為驚癇疰忤翳障疳痔蟲牙蛔痛之劑焉附方舊五新五赤目障翳熊膽丸每以膽少許化開入冰片一二片銅器點之絶奇或淚癢加生薑粉些須齊東野語初生目閉由胎中受熱也以熊膽少許蒸水洗之一日七八次如三日不開服四物加甘草天花粉全幼心鑑小兒鼻蝕熊膽半分湯化抹之聖惠方十年痔瘡熊膽塗之神效一切方不及也外臺腸風痔瘻熊膽半兩入片腦少許研和豬膽汁塗之壽域方蛔蟲心痛熊膽一大豆和水服之大效外臺小兒驚癇方見主治風蟲牙痛熊膽三錢片腦四分每以豬膽汁調少許搽之攝生方水弩射人熊膽塗之更以雄黃同用酒磨服即愈斗門方諸疳羸瘦熊膽使君子末等分研勻瓷器蒸溶蒸餅丸麻子大每米飲下二十丸保幼大全腦髓主治諸聾蘇恭療頭旋摩頂去白禿風屑生髮日華血主治小兒客忤蘇恭骨主治作湯浴歷節風及小兒客忤孟詵附録羆魋音頽時珍曰熊羆魋三種一類也如豕色黑者熊也大而色黃白者羆也小而色黃赤者魋也建平人呼魋為赤熊陸璣謂羆為黃熊是矣羆頭長腳高猛憨多力能拔樹木虎亦畏之遇人則人立而攫之故俗呼為人熊關西呼豭熊羅願爾雅翼云熊有豬熊形如豕有馬熊形如馬即羆也或云羆即熊之雄者其白如熊白而理粗味減功用亦同麢羊本經中品釋名羚羊俗麙羊音鈐九尾羊時珍曰按王安石字說云鹿則比類而環角外向以自防麢則獨棲懸角木上以遠害可謂靈也故字從鹿從靈省文後人作羚許慎說文云麙山羊也大而細角山海經作羬云狀如羊而馬尾費信星槎勝覽云阿丹國羚羊自胸中至尾垂九塊名九尾羊集解別録曰羚羊角出石城山川穀及華陰山採無時弘景曰今出建平宜都諸蠻山中及西域多兩角一角者為勝角多節蹙蹙圓繞別有山羊角極長惟一邊有節節亦疏大不入藥用乃爾雅名羱羊者羌夷以為羚羊能陟峻阪恭曰羚羊南山商淅間大有今出梁州真州洋州亦貢其角細如人指長四五寸而紋蹙細山羊或名野羊大者如牛角可為鞍橋又有山驢大如鹿皮可作靴有兩角大小如山羊角俗人亦用之陶氏所謂一邊有粗紋者是此非山羊也藏器曰山羊山驢羚羊三種相似而羚羊有神夜宿防患以角掛樹不著地但角彎中深鋭緊小有掛痕者為真如此分別其疏慢無痕者非也真角耳邊聽之集集鳴者良陶言一角者謬也頌曰今秦隴龍蜀金商州山中皆有之戎人多捕得來貨其形似羊青色而大其角長一二尺有節如人手指握痕又最堅徑郭璞注爾雅云麢似羊而大其角細而圓鋭好在山崖間羱似吳羊其角大而橢出西方本草諸注各異觀今所市者與爾雅之羱羊陶注之山羊蘇注之山驢大都相似今人相承用之以為羚羊其細角長四五寸如人指多節蹙蹙圓繞者其間往往彎中有磨角成痕處京師極多詳諸說此乃真羚羊角而世多不用何也又閩廣山中出一種野羊彼人亦謂之羚羊也陳氏謂耳邊聽之鳴者良今牛羊諸角但殺之者聽之皆有聲不獨羚角也自死角則無聲矣宗奭曰諸角附耳皆集集有聲不如有掛痕一說為盡之然有僞作者宜察焉時珍曰羚羊似羊而青色毛粗兩角短小羱羊似吳羊兩角長大山驢驢之身而羚之角但稍大而節疏慢耳陶氏言羚羊有一角者而陳氏非之按寰宇志云安南高石山出羚羊一角極堅能碎金剛石則羚固有一角者矣金剛石出西域狀如紫石英百鍊不消物莫能擊惟羚羊角扣之則自然冰泮也又貘骨僞充佛牙物亦不能破用此角擊之即碎皆相畏耳羚羊皮西人以作座褥羚羊角修治斆曰凡用有神羊角甚長有二十四節內有天生木胎此角有神力可抵千牛凡使不可單用須要不拆元對繩縛鐵銼銼細重重密裹避風以旋旋取用搗篩極細更研萬匝入藥免刮人腸氣味咸寒無毒別録曰苦微寒甄權曰甘溫能縮銀主治明目益氣起陰去惡血注下闢蠱毒惡鬼不祥常不魘寐本經除邪氣驚夢狂越僻謬療傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間及食噎不通久服強筋骨輕身起陰益氣利丈夫別録治中風筋攣附骨疼痛作末蜜服治猝熱悶及熱毒痢血疝氣摩水塗腫毒孟詵治一切熱毒風攻注中惡毒風猝死昏亂不識人散産後惡血衝心煩悶燒末酒服之治小兒驚癇治山瘴及噎塞藥性治驚悸煩悶心胸惡氣瘰癧惡瘡溪毒藏器平肝舒筋定風安魂散血下氣辟惡解毒治子癇痙疾時珍發明時珍曰羊火畜也而羚羊則屬木故其角入厥陰肝經甚捷同氣相求也肝主木開竅於目其發病也目暗障翳而羚羊角能平之肝主風在合為筋其發病也小兒驚癇婦人子癇大人中風搐搦及筋脈攣急歷節掣痛而羚角能舒之魂者肝之神也發病則驚駭不寧狂越僻謬魘寐卒死而羚角能安之血者肝之藏也發病則瘀滯下注疝痛毒痢瘡腫瘻癧産後血氣而羚角能散之相火寄於肝膽在氣為怒病則煩悶氣逆噎塞不通寒熱及傷寒伏熱而羚角能降之羚之性靈而筋骨之精在角故又能辟邪惡而解諸毒碎佛牙而燒煙走蛇虺也本經別録甚著其功而近俗罕能發揚惜哉附方舊七新四噎塞不通羚羊角屑為末飲服方寸匕並以角摩噎上外臺胸脅痛滿羚羊角燒末水服方寸匕子母祕録腹痛熱滿方同上墮胎腹痛血不出羚羊角燒灰三錢豆淋酒下普濟産後煩悶汗出不識人千金用羚羊角燒末東流水服方寸匕未愈再服又方加芍藥枳實等分炒研末湯服血氣逆煩羚羊角燒末水服方寸匕肘後方臨産催生羚羊角一枚刮尖為末酒服方寸匕産寶小兒下痢羚羊角中骨燒末飲服方寸匕祕録遍身赤丹羚羊角燒灰雞子清和塗之神效外臺赤癍如瘡瘙癢甚則殺人羚羊角磨水摩之數百遍為妙肘後方山嵐瘴氣羚羊角末水服一錢集簡方肉氣味甘平無毒主治惡瘡藏器和五味炒熟投酒中經宿飲之治筋骨急強中風北人恆食南人食之免蛇蟲傷孟詵肺氣味同肉主治水腫鼓脹小便不利時珍發明時珍曰羚羊肺本草不收千金翼載太醫山連治韋司業水腫莨菪丸用之蓋取其引藥入肺以通小便之上源也其方用羚羊肺一具沸湯微炸過曝乾為末莨菪子一升用三年醋浸一伏時蒸熟搗爛和丸梧桐子大每用四丸麥門冬湯食後服候口中乾妄語為驗數日小便大利即瘥無羚羊以青羊肺代之亦可膽氣味苦寒無毒主治面上皯𪒟如雀卵色以酒二升同煮三沸塗四五次良時珍附方新一面䵴羚羊膽牛膽各一枚醋二升同煮三沸頻塗之外臺鼻主治炙研治五尸遁尸邪氣時珍外臺方中用之附録山驢恭曰見上文時珍曰南史云滑國出野驢有角廣志云驢羊似驢山海經云晉陽懸甕之山女幾之山荊山綸山並多閭郭璞注云閭即羭也似驢而歧蹄馬尾角如羚羊一名山驢俗人亦用其角以代羚羊又北山經云太行之山有獸名䮝狀如羚羊而四角馬尾有距善旋其鳴自叫此亦山驢之類也山羊日用釋名野羊圖經羱羊時珍曰羊之在原野者故名集解弘景曰山羊即爾雅羱羊出西夏似吳羊而大角角橢者能陟峻阪羌夷以為羚羊角極長惟一邊有節節亦疏大不入藥用恭曰山羊大如牛或名野羊善鬥至死角堪為鞍橋頌曰閩廣山中一種野羊彼人謂之羚羊其皮厚硬不堪炙食其肉頗肥軟益人吳瑞曰山羊似羚羊色青其角有掛痕者為羚羊無者為山羊時珍曰山羊有二種一種大角盤環肉至百斤者一種角細者說文謂之莧羊音桓陸氏云羱羊狀如驢而群行其角甚大以時墮角暑天塵露在上生草戴行故代都賦云羱羊養草以盤桓肉氣味甘熱無毒頌曰南方野羊多啖石香薷故腸藏頗熱不宜多食之主治南人食之肥軟益人治冷勞山嵐瘧痢婦人赤白帶下蘇頌療筋骨急強虛勞益氣利産婦不利時疾人吳瑞鹿本經中品校正本經上品白膠中品鹿茸今併為一條釋名斑龍時珍曰鹿字篆文象其頭角身足之形爾雅云鹿牡曰䴥音加牝曰麀音攸其子曰麛音迷絶有力曰𪊑音堅斑龍名出淡寮方按乾寧記云鹿與游龍相戲必生異角則鹿得稱龍或以此歟梵書謂之密利迦羅集解時珍曰鹿處處山林中有之馬身羊尾頭側而長高腳而行速牡者有角夏至則解大如小馬黃質白斑俗稱馬鹿牝者無角小而無斑毛雜黃白色俗稱麀鹿孕六月而生子鹿性淫一牡常交數牝謂之聚麀性喜食龜能別良草食則相呼行則同旅居則環角外向以防害臥則口朝尾閭以通督脈殷仲堪云鹿以白色為正述異記云鹿千歲為蒼又五百歲為白又五百歲為玄玄鹿骨亦黑為脯食之可長生也埤雅云鹿乃仙獸自能樂性六十年必懷瓊於角下角有斑痕紫色如點行則有涎不復急走故曰鹿戴玉而角斑魚懷珠而鱗紫沈存中筆談云北狄有駝鹿極大而色蒼黃無斑角大而有文堅瑩如玉茸亦可用名苑云鹿之大者曰麈群鹿隨之視其尾為準其尾能闢塵拂氈則不蠹置茜帛中歲久紅色不黯也鹿茸修治別録曰四月五月解角時取陰乾使時燥恭曰鹿茸夏收之陰乾百不收一且易臭惟破之火干大好斆曰凡使鹿茸用黃精自然汁浸兩日夜漉出切焙搗用免渴人也又法以鹿茸鋸作片每五兩用羊脂三兩拌天靈蓋末塗之慢火炙令內外黃脆以鹿皮裹之安室中一宿則藥魂歸矣乃慢火焙乾搗末用日華曰只用酥炙炒研宗奭曰茸上毛先以酥薄塗勻於烈焰中灼之候毛盡微炙不以酥則火焰傷茸矣時珍曰淡寮濟生諸方有用酥炙酒炙及酒蒸焙用者當各隨本方發明抱朴子曰南山多鹿每一雄遊牝百數至春羸瘦入夏惟食菖蒲即肥當角解之時其茸甚痛獵人得之以索繫住取茸然後斃鹿鹿之血未散也宗奭曰茸最難得不破及不出卻血者蓋其力盡在血中獵時多有損傷故也此以如紫茄者為上名茄子茸取其難得耳然此太嫩血氣未具其實少力堅者又太老惟長四五寸形如分歧馬鞍茸端如瑪瑙紅玉破之肌如朽木者最善人亦將麋茸僞為之不可不察按沈存中筆談云月令冬至麋角解夏至鹿角解陰陽相反如此今人以麋鹿茸作一種者疏矣或刺麋鹿血以代茸云茸亦血此大誤矣麋茸利補陽鹿茸利補陰須佐以他藥則有功凡含血之物肉差易長筋次之骨最難長故人自胚胎至成人二十年骨髓方堅惟麋鹿角自生至堅無兩月之久大者至二十餘斤計一日夜須生數兩凡骨之生無速於此雖草木易生亦不及之此骨之至強者所以能補骨血堅陽道益精髓也頭者諸陽之會上鍾於茸角豈可與凡血為比哉時珍曰按熊氏禮記疏云鹿是山獸屬陽情淫而遊山夏至得陰氣解角從陽退之象麋是澤獸屬陰情淫而遊澤冬至得陽氣而解角從陰退之象也余見角下氣味甘溫無毒別録曰酸微溫甄權曰苦辛麻勃為之使詵曰鹿茸不可以鼻嗅之中有小白蟲視之不見入人鼻必為蟲顙藥不及也主治漏下惡血寒熱驚癇益氣強志生齒不老本經療虛勞灑灑如瘧羸瘦四肢痠疼腰脊痛小便數利泄精溺血破瘀血在腹散石淋癰腫骨中熱疽養骨安胎下氣殺鬼精物久服耐老不可近丈夫陰令痿別録補男子腰腎虛冷腳膝無力夜夢鬼交精溢自出女人崩中漏血赤白帶下炙末空心酒服方寸匕甄權壯筋骨日華生精補髓養血益陽強筋健骨治一切虛損耳聾目暗眩暈虛痢時珍發明時珍曰按淡寮方云昔西蜀藥市中嘗有一道人貨斑龍丸一名茸珠丹每大醉高歌曰尾閭不禁滄海竭九轉靈丹都漫說惟有斑龍頂上珠能補玉堂關下穴朝野遍傳之其方蓋用鹿茸鹿角膠鹿角霜也又戴原禮證治要訣治頭眩暈甚則屋轉眼黑或如物飛或見一為二用茸珠丹甚效或用鹿茸半兩無灰酒三盞煎一盞入麝香少許溫服亦效云茸生於頭類之相從也附方舊一新八斑龍丸治諸虛用鹿茸酥炙或酒炙亦可鹿角膠炒成珠鹿角霜陽起石煅紅酒淬肉蓯蓉酒浸酸棗仁柏子仁黃耆蜜炙各一兩當歸黑附子炮地黃九蒸九焙各八錢辰硃砂半錢各為末酒糊丸梧桐子大每空心溫酒下五十丸淡寮鹿茸酒治陽事虛痿小便頻數面色無光用嫩鹿茸一兩去毛切片山藥末一兩絹袋裹置酒瓶中七日開瓶日飲三盞將茸焙作丸服普濟方腎虛腰痛不能反側鹿茸炙菟絲子各一兩舶茴香半兩為末以羊腎二對法酒煮爛搗泥和丸梧桐子大陰乾每服三五十丸溫酒下日三服本事方精血耗涸面色黧黑耳聾目昏口渴腰痛腳弱白濁上燥下寒不受峻補者鹿茸酒蒸當歸酒浸各一兩焙為末烏梅肉煮膏搗丸梧桐子大每米飲服五十丸濟生方腰膝疼痛傷敗者鹿茸塗酥炙紫為末每溫酒服一錢續十全方小便頻數鹿茸一對酥炙為末每服二錢溫酒下日三服鄭氏家傳方虛痢危困因血氣衰弱者鹿茸酥炙一兩為末入麝香五分以燈心煮棗肉和丸梧桐子大每空心米飲下三五十丸濟生方飲酒成泄骨立不能食但飲酒即泄用嫩鹿茸酥炙肉豆蔻煨一兩生麝香五分為末陳白米飯丸梧桐子大每米飲下五十丸名香茸丸普濟方室女白帶因衝任虛寒者鹿茸酒蒸焙二兩金毛狗脊白蘞各一兩為末用艾煎醋打糯米糊丸梧桐子大每溫酒下五十丸日二濟生角頌曰七月採角以鹿年久者其角更好煮以為膠入藥彌佳斆曰鹿角要黃色緊重尖好者此鹿食靈草所以異衆鹿也修治詵曰凡用鹿角麋角並截段銼屑以蜜浸過微火焙令小變色曝乾搗篩為末或燒飛為丹服之至妙以角寸截泥裹於器中大火燒一日如玉粉也時珍曰按崔行功纂要方鹿角粉法以鹿角寸截炭火燒過搗末水和成團以絹袋三五重盛之再煅再和如此五度以牛乳和再燒過研用氣味咸溫無毒杜仲為之使主治惡瘡癰腫逐邪惡氣留血在陰中本經除少腹血急痛腰脊痛折傷惡血益氣別録貓鬼中惡心腹疰痛蘇恭水磨汁服治脫精尿血夜夢鬼交醋磨汁塗瘡瘍癰腫熱毒火炙熱尉小兒重舌鵝口瘡日華蜜炙研末酒服輕身強骨髓補陽道絶傷又治婦人夢與鬼交者清酒服一撮即出鬼精燒灰治女子胞中余血不盡欲死以酒服方寸匕日三夜一甚妙孟詵發明時珍曰鹿角生用則散熱行血消腫辟邪熟用則益腎補虛強精活血煉霜熬膏則專於滋補矣附方舊十六新十九服鹿角法鹿角屑十兩生附子三兩去皮臍為末每服二錢空心溫酒下令人少睡益氣力通神明彭祖方腎消尿數鹿角一具炙搗篩溫酒每服方寸匕日二外臺骨虛勞極面腫垢黑脊痛不能久立血氣衰憊發落齒枯甚則喜唾用鹿角二兩牛膝酒浸焙一兩半為末煉蜜丸梧桐子大每服五十丸空心鹽酒下濟生腎虛腰痛如錐刺不能動搖鹿角屑三兩炒黃研末空心溫酒服方寸匕日三肘後方猝腰脊痛不能轉側鹿角五寸燒赤投二升酒中浸一宿飲梅師婦人腰痛鹿角屑熬黃研酒服方寸匕日五六服楊氏産乳妊娠腰痛鹿角截五寸長燒赤投一升酒中又燒又浸如此數次細研空心酒服方寸匕産寶産後腹痛血不盡者鹿角燒研豉汁服方寸匕日二子母祕録妊娠下血不止鹿角屑當歸各半兩水三盞煎減半頓服不過二服普濟方胎死腹中鹿角屑三寸匕煮蔥豉湯和服立出百一方墮胎血瘀不下狂悶寒熱用鹿角屑一兩為末豉湯服一錢日三須臾血下聖惠方胞衣不下鹿角屑三分為末薑湯調下産乳産後血暈鹿角一段燒存性出火毒為末酒調灌下即醒楊拱醫方摘要婦人白濁滑數虛冷者鹿角屑炒黃為末酒服二錢婦人良方筋骨疼痛鹿角燒存性為末酒服一錢日二食後喜嘔鹿角燒末二兩人參一兩為末薑湯服方寸匕日三肘後方小兒噦疾鹿角粉大豆末等分相和乳調塗乳上飲之古今録驗小兒瘧疾鹿角生研為末先發時以乳調一字服千金小兒滯下赤白者用鹿角灰發灰等分水服三錢日二千金方小兒重舌鹿角末塗舌下日三姚和衆方小兒流涎脾熱也鹿角屑末米飲服一字普濟方面上皯皰鹿角尖磨濃汁厚塗之神效面上風瘡鹿角尖磨酒塗之聖惠咽喉骨鯁鹿角為末含之咽津斗門方蹉跌損傷血瘀骨痛鹿角末酒服方寸匕日三千金方竹木入肉不出者鹿角燒末水和塗上立出久者不過一夕千金方蠼螋尿瘡鹿角燒末苦酒調敷外臺五色丹毒鹿角燒末豬脂和敷肘後方發背初起鹿角燒灰醋和塗之日五六易千金方乳發初起不治殺人鹿角磨濃汁塗之並令人嗍去黃水隨手即散梅師方吹奶掀痛鹿角屑炒黃為末酒服二錢仍以梳梳之唐氏經驗方下注腳瘡鹿角燒存性入輕粉同研油調塗之集要癤毒腫毒鹿角尖磨濃汁塗之甚妙瀕湖方癰疽有蟲鹿角燒末苦酒和塗磨汁亦可妖魅貓鬼病人不肯言鬼以鹿角屑搗末水服方寸匕即言實也録驗白膠一名鹿角膠本經粉名鹿角霜甄權曰白膠一名黃明膠時珍正誤見黃明膠修治別録曰白膠生雲中煮鹿角作之弘景曰今人少復煮作惟合角弓用之其法先以米瀋汁漬七日令軟煮煎如作阿膠法耳又一法銼角令細入干牛皮一片即易消爛不爾雖百年無一熟也恭曰鹿角麋角但煮濃汁重煎即為膠矣何必使爛欲求爛亦不難陶未見耳詵曰作膠法細破寸截以饙水浸七日令軟方煮之斆曰採全角鋸開並長三寸以物盛於急水中浸一百日取出刀刮去黃皮拭淨以醶醋煮七日旋旋添醋勿令少歇戍時不用著火只從子至戌也日足角白色軟如粉搗爛每十兩入無灰酒一鎰煮成膠陰乾研篩用時珍曰今人呼煮爛成粉者為鹿角霜取粉熬成膠或只以濃汁熬成膏者為鹿角膠按胡熒衛生方云以米泔浸鹿角七日令軟入急流水中浸七日去粗皮以東流水桑柴火煮七日旋旋添水入醋少許搗成霜用其汁加無灰酒熬成膠用又邵以正濟急方云用新角三對寸截盛於長流水浸三日刮淨入楮實子桑白皮黃蠟各二兩鐵鍋中水煮三日夜不可少停水少即添湯日足取出刮淨曬研為霜韓懋醫通云以新鹿角寸截囊盛於流水中浸七日以瓦缶入水桑柴火煮每一斤入黃蠟半斤以壺掩住水少旋添其角軟以竹刀刮淨搗為霜用氣味甘平無毒別録曰溫得火良畏大黃主治傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎久服輕身延年本經療吐血下血崩中不止四肢痠疼多汗淋露折跌傷損別録男子腎臟氣氣弱勞損吐血婦人服之令有子安胎去冷治漏下赤白藥性炙搗酒服補虛勞長肌益髓令人肥健悅顏色又治勞嗽尿精尿血瘡瘍腫毒時珍發明斆曰凡使鹿角勝於麋角頌曰今醫家多用麋茸麋角云力緊於鹿也時珍曰蘇東坡良方云鹿陽獸見陰而角解麋陰獸見陽而角解故補陽以鹿角為勝補陰以麋角為勝其不同如此但云鹿勝麋麋勝鹿疏矣按此說與沈存中鹿茸利補陰麋茸利補陽之說相反以理與功推之蘇說為是詳見茸下附方舊三新五異類有情丸韓氏醫通云此方自制者凡丈夫中年覺衰便可服餌蓋鹿乃純陽龜虎屬陰血氣有情各從其類非金石草木比也其方用鹿角霜治法見上龜板酒浸七日酥炙研各三兩六錢鹿茸熏干酒洗淨酥塗炙研虎脛骨長流水浸七日蜜塗酥炙各二兩四錢水火煉蜜入豶豬脊髓九條搗丸梧桐子大每空心鹽湯下五七九十丸如厚味善飲者加豬膽汁一二合以寓降火之義盜汗遺精鹿角霜二兩生龍骨炒牡蠣煅各一兩為末酒糊丸梧桐子大每鹽湯下四十丸普濟虛勞尿精白膠二兩炙為末酒二升和溫服外臺虛損尿血白膠三兩炙水二升煮一升四合分再服外臺小便不禁上熱下寒者鹿角霜為末酒糊和丸梧桐子大每服三四十丸空心溫酒下普濟小便頻數鹿角霜白茯苓等分為末酒糊丸梧桐子大每服三十丸鹽湯下梁氏總要男子陽虛甚有補益方同上湯火灼瘡白膠水煎令稀稠得所待冷塗之斗門方齒主治鼠瘻留血心腹痛不可近丈夫陰蘇恭骨氣味甘微熱無毒主治安胎下氣殺鬼精物久服耐老可酒浸服之孟詵作酒主內虛續絶傷補骨除風思邈燒灰水服治小兒洞注下痢時珍附方新一補益虛羸鹿骨煎用鹿骨一具枸杞根二升各以水一斗煎汁五升和勻共煎五升日二服千金肉氣味甘溫無毒詵曰九月以後正月以前堪食他月不可食發冷痛白臆者豹文者並不可食鹿肉脯炙之不動及見水而動或曝之不燥者並殺人不可同雉肉蒲白鮠魚蝦食發惡瘡禮記云食鹿去胃主治補中益氣力強五臟生者療中風口僻割片薄之別録華陀云中風口偏者以生肉同生椒搗貼正即除之補虛羸瘦弱調血脈孟詵養血生容治産後風虛邪僻時珍外臺有鹿肉湯發明思邈曰壺居士言鹿性多警烈能別良草止食葛花葛葉鹿蔥鹿藥白蒿水芹甘草薺苨齊頭蒿山蒼耳他草不食處必山岡故産則歸下澤饗神用其肉者以其性烈清淨也凡藥餌之人久食鹿肉服藥必不得力為其食解毒之草制諸藥也弘景曰野獸之中獐鹿可食生則不膻腥又非十二辰屬八卦無主且溫補於人生死無尤道家許聽為脯過其餘雖雞犬牛羊補益於亡魂有愆責並不足食宗奭曰三祀皆以鹿臘亦取此義且味亦勝他肉時珍曰邵氏言鹿之一身皆益人或煮或蒸或脯同酒食之良大抵鹿乃仙獸純陽多壽之物能通督脈又食良草故其肉角有益無損陶說亦妄耳頭肉氣味平主治消渴夜夢鬼物煎汁服作膠彌善蘇恭宗奭曰頭可釀酒須於作漿時稍益蔥椒附方新一老人消渴鹿頭一個去毛煮爛和五味空心食以汁咽之鄙事蹄肉氣味平主治諸風腳膝骨中疼痛不能踐地同豉汁五味煮食孫思邈脂主治癰腫死肌溫中四肢不隨頭風通腠理不可近陰蘇恭時珍曰此乃本經麋脂正文而蘇氏以注鹿脂二脂功或同耶附方新一面上皯皰鹿脂塗之日再聖惠方髓煉淨入藥氣味甘溫無毒主治丈夫女子傷中絶脈筋急痛咳逆以酒和服之良別録同蜜煮服壯陽道令有子同地黃汁煎膏服填骨髓壯筋骨治嘔吐日華補陰強陽生精益髓潤燥澤肌時珍發明頌曰髓可作酒唐方多有其法時珍曰鹿髓近方稀用者刪繁方治肺虛毛悴酥髓湯用之御藥院方滋補藥用其脊髓和酒熬膏丸藥甚為有理白飛霞醫通云取鹿腦及諸骨髓煉成膏每一兩加煉蜜二兩煉勻瓷器密收用和滋補丸藥劑甚妙凡腰痛屬腎虛寒者以和古方摩腰膏薑汁化一粒擦腎俞則暖氣透入丹田如火大補元陽此法甚佳人鮮知之附方新一鹿髓煎治肺痿咳嗽傷中脈絶用鹿髓生地黃汁各七合酥蜜各一兩杏仁桃仁各三兩去皮炒酒一升同搗取汁先煎杏仁桃仁地黃汁減半入三味煎如稀餳每含一匙徐徐咽下日三聖濟腦主治入面脂令人悅澤蘇頌刺入肉內不出以腦厚敷之燥即易半日當出深師精主治補虛羸勞損時珍發明韓懋曰王師授豫鹿䘒丸方云鹿稟純陽而䘒者天地初分之氣牝牡相感之精也醫書稱鹿茸角血髓大有補益而此䘒則入神矣其法用初生牡鹿三五隻苑囿馴養每日以人參煎湯同一切草藥任其飲食久之以硫黃細末和入從少至多燥則漸減周而復始大約三年之內一旦毛脫筋露氣盛陽極卻以牝鹿隔苑誘之欲交不得則精泄於外或令其一交即設法取其精瓦器收之香黏如餳是為䘒也用和鹿角霜一味為丸空心鹽酒下大起胎羸虛瘵危疾凡服滋補丸藥用此入煉蜜和劑絶妙時珍曰按老子云骨弱筋柔而握固未知牝牡之合而䘒作者精之至也䘒音子催切赤子陰也今作鹿精之名亦未為穩血主治陰痿補虛止腰痛鼻衄折傷狂犬傷蘇恭和酒服治肺痿吐血及崩中帶下日華諸氣痛欲危者飲之立愈汪穎大補虛損益精血解痘毒藥毒時珍發明頌曰近世有服鹿血酒者云得於射生者因採捕入山失道數日飢渴將委頓惟獲一生鹿刺血數升飲之飢渴頓除及歸遂覺血氣充盛異人有效而服之者刺鹿頭角間血酒和飲之更佳時珍曰近世韓飛霞補益方有斑龍宴法孫氏解痘毒有陰陽二血丸皆古所未知者而沈存中又以刺血代茸為非亦一說也附方新三斑龍宴用馴養牡鹿一二隻每日以人參一兩煎水與飲將滓拌土産草料米豆以時喂之勿雜他水草百日之外露筋可用矣宴法夜前減食次早空心將布縛鹿於床首低尾昂令有力者抱定前足有角者執定角無角者以木囊頭拘之使頭不動用三稜針刺其眼之大眥前毛孔名天池穴以銀管長三寸許插向鼻梁坐定咂其血飲藥酒數杯再咂再飲以醉為度鼻中流出者亦可接和酒飲飲畢避風行升降工夫為一宴也用生肌藥敷鹿穴養之月可一度一鹿可用六七年不拘男女老少服之終身無疾而壽乃仙家服食丹方二十四品之一也藥酒以八珍散加沉香木香煮之陰陽二血丸治小兒痘瘡未出者稀已出者減用鹿血兔血各以青紙盛置灰上曬乾乳香沒藥各一兩雄黃黃連各五錢硃砂麝香各一錢為末煉蜜丸緑豆大每服十丸空心酒下兒小者減之孫氏集效方鼻血時作干鹿血炒枯將酒浮熏二三次仍用酒浮半杯和服之腎氣味甘平無毒主治補腎氣別録補中安五臟壯陽氣作酒及煮粥食之日華附方舊一腎虛耳聾用鹿腎一對去脂膜切以豉汁入粳米二合煮粥食亦可作羹聖惠方膽氣味苦寒無毒主治消腫散毒時珍筋主治勞損續絶蘇恭塵沙眯目者嚼爛挼入目中則黏出時珍附方舊一骨鯁鹿筋漬軟搓索令緊大如彈丸持筋端吞至鯁處徐徐引之鯁著筋出外臺靨主治氣癭以酒漬炙乾再浸酒中含咽汁味盡更易十具乃愈深師皮主治一切漏瘡燒灰和豬脂納之日五六易愈乃止時珍糞主治經日不産干濕各三錢研末薑湯服立效經驗胎糞主治解諸毒時珍曰按范曄後漢書云冉䮾夷出鹿食藥草其胎中麑糞可療毒也麋本經下品釋名時珍曰陸佃云麋喜音聲班固云麋性淫迷則麋之名義取乎此爾雅云牡曰麔音咎牝曰麎音辰其子曰䴠音夭集解別録曰麋生南山山谷及淮海邊十月取之弘景曰今海陵間最多千百為群多牝少牡時珍曰麋鹿屬也牡者有角鹿喜山而屬陽故夏至解角麋喜澤而屬陰故冬至解角麋似鹿而色青黑大如小牛肉蹄目下有二竅為夜目故淮南子云孕女見麋而子四目也博物志云南方麋千百為群食澤草踐處成泥名曰麋畯人因耕穫之其鹿所息處謂之鹿場也今獵人多不分別往往以麋為鹿牡者猶可以角退為辨牝者通目為麀鹿矣麋脂一名宮脂本經時珍曰別録言十月取脂煉過收用而周禮冬獻狼夏獻麋注云狼膏聚麋膏散聚則溫散則涼以順時也氣味辛溫無毒忌桃李畏大黃主治癰腫惡瘡死肌寒風濕痹四肢拘攣不收風頭腫氣通腠理本經柔皮膚不可近陰令痿別録治少年氣盛面生瘡疱化脂塗之時珍正誤弘景曰人言麋一牡輒交十餘牝交畢即死其脂墮地經年人得之名曰遁脂酒服至良夫麋性乃爾淫快不應痿人陰一方言不可近陰令陰不痿此乃有理恭曰遊牝畢即死者虛傳也遍問山澤人無此說肉氣味甘溫無毒詵曰多食令人弱房髮腳氣妊婦食之令子目病弘景曰不可合豬肉雉肉食發痼疾合蝦及生菜梅李食損男子精氣主治益氣補中治腰腳孟詵補五臟不足氣禹錫發明時珍曰按陸農師云鹿以陽為體其肉食之燠麋以陰為體其肉食之寒觀此則別録麋脂令人陰痿孟詵言多食肉令人弱房及角肉不同功之說亦此意也茸修治與鹿茸同氣味甘溫無毒主治陰虛勞損一切血病筋骨腰膝痠痛滋陰益腎時珍麋角修治斆曰麋角頂根上有黃毛若金線兼旁生小尖也色蒼白者為上詵曰凡用麋角可五寸截之中破炙黃為末入藥時珍曰麋鹿茸角今人罕能分別陳自明以小者為鹿茸大者為麋茸亦臆見也不若親視其採取時為有準也造麋角膠麋角霜並與鹿角膠鹿角霜同法又集靈方云用麋角一雙水浸七日刮去皮銼屑以銀瓶盛牛乳浸一日乳耗再加至不耗乃止用油紙密封瓶口別用大麥鋪鍋中三寸上安瓶再以麥四周填滿入水浸一伏時水耗旋加待屑軟如面取出焙研成霜用氣味甘熱無毒主治風痹止血益氣力別録刮屑熬香酒服大益人弘景出彭祖傳中酒服補虛勞添精益髓益血脈暖腰膝壯陽悅色療風氣偏治丈夫日華作粉常服治丈夫冷氣及風筋骨疼痛若猝心痛一服立瘥漿水磨泥塗面令人光華赤白如玉可愛孟詵滋陰養血功與茸同時珍發明詵曰麋角常服大益陽道不知何因與肉功不同也煎膠與鹿角膠同功茸亦勝鹿茸仙方甚重之恭曰麋茸功力勝鹿茸角煮膠亦勝白膠詳見鹿茸鹿角下日華曰麋角屬陰故治腰膝不仁補一切血病也時珍曰鹿之茸角補陽右腎精氣不足者宜之麋之茸角補陰左腎血液不足者宜之此乃千古之微祕前人方法雖具而理未發出故論者紛紜又楊氏家藏方治虛損有二至丸兩角並用但其藥性過溫止宜於陽虛寒濕血痹者耳於左腎無與焉孫思邈千金方言麋角丸凡一百一十方惟容成子羔所服者特出衆方之外子羔服之羽化今觀其方比二至丸似可常服並集於下附方新五麋角丸補心神安臟腑填骨髓理腰腳能久立聰耳明目發白更黑貌老還少凡麋角取當年新角連腦頂者為上看角根有斫痕處亦堪用蛻角根下平者不堪取角五具或四具三具二具一具為一劑去尖一大寸即角長七八寸取勢截斷量把鎊得即於長流水中以竹器盛懸浸十宿如無長流水處即於淨盆中滿著水浸每夜易換軟即將出削去皺皮以利鎊鎊取白處至心即止以清粟米泔浸兩宿初經一宿即干握瀝去舊水置新絹上曝乾擇去惡物粗骨皮及鎊不勻者以無灰美酒於大瓷器中浸經兩宿其藥及酒俱入淨釜中初用武火煮一食久後以文火微煎如蟹目沸以柳木篦徐徐攪不得住手時時添酒以成煎為度煎時皆須平旦下手不得經宿仍看屑消如稀膠即以牛乳五升酥一斤以次漸下後項藥仍以麋角一條炙令黃為末與諸藥同制之檳榔通草秦艽肉蓯蓉人參菟絲子酒浸兩宿曬乾別搗甘草各一兩上搗為末將膠再煎一食頃似稀稠粥即止火少時投諸藥末相和稠黏堪作丸即以新器盛貯以衆手一時丸如梧桐子大如黏手著少酥塗手其服餌之法空腹以酒下之初服三十丸日加一丸加至五十丸為度日二服初服一百日內忌房室服經一月腹內諸疾自相驅逐有微利勿怪漸後多泄氣能食患氣者加枳實青木香各一兩服至二百日面皺光澤一年齒落更生強記身輕若風日行數百里二年令人肥飽少食七十以上服之卻成後生三年腸作筋髓預見未明四年常飽不食自見仙人三十下服之不輟顏一定而不變修合時須在淨室中勿令陰人雞犬孝子等見婦人服之尤佳如飲酒食麵口乾眼澀內熱者即服三黃丸微利之如此一度發動以後方始調暢也千金二至丸補虛損生精血去風濕壯筋骨用鹿角鎊細以真酥一兩無灰酒一升慢火炒乾取四兩麋角鎊細以真酥二兩米醋一升煮乾慢火炒乾取半兩蒼耳子酒浸一宿焙半斤山藥白茯苓黃耆蜜炙各四兩當歸酒浸焙五兩肉蓯蓉酒浸焙遠志去心人參沉香各二兩熟附子一兩通為末酒煮糯米糊丸梧桐子大每服五十丸溫酒鹽湯任下日二服楊氏家藏方麋角丸三因方治五痿皮緩毛瘁血脈枯槁肌膚薄著筋骨羸弱飲食不美四肢無力爪枯發落眼昏唇燥用麋角屑一斤酒浸一宿大附子生去皮臍一兩半熟地黃四兩用大麥米二升以一半藉底以一半在上以二布巾隔覆炊一日取出藥麥各焙為末以浸藥酒添清酒煮麥粉為糊和杵三千下丸如梧桐子大每服五十丸食前用溫酒或米湯送下日三服一方只用麋角鎊屑酥炒黃色五兩熟附子末半兩酒糊丸服麋角霜丸補元臟駐顏色用麋角一副水浸七日刮去皺皮鎊為屑盛在一銀瓶內以牛乳汁浸一日常令乳高二寸如乳耗更添直候不耗用油單數重密封瓶口別用大麥一斗安在甑內約厚三寸上安麋角瓶更用大麥周圍填實露瓶口不住火蒸一復時如鍋內水耗即旋添熱湯須頻看角屑粉爛如面即住火取出用細篩子漉去乳焙乾每料八兩附子炮裂去皮乾山藥各三兩上為末蒸棗肉和丸如梧桐子大每服十五丸至二十丸空心用溫鹽酒送下煉蜜丸亦可總録麋角丸彭祖云使人丁壯不老房室不勞損氣力顏色不衰者莫過麋角其法刮為末十兩用生附子一枚合之雀卵和丸日服二十丸溫酒下二十日大效亦可單熬為末酒服亦令人不老但性緩不及附子者彭祖服食經骨主治虛勞至良煮汁釀酒飲令人肥白美顏色禹錫皮主治作靴襪除腳氣孟詵雙頭鹿拾遺釋名荼苜機時珍曰荼苜機音蔡茂機番言也出博物志舊本訛作蔡苴機又作余義亦荼苜之訛也集解藏器曰按張華博物志云荼苜機出永昌郡是兩頭鹿名也似鹿兩頭其胎中屎以四月取之范曄後漢書云雲南縣有神鹿兩頭能食毒草華陽國志云此鹿出雲南郡熊倉山即余義也時珍曰按盛弘之荊州記云武陵郡西有陽山産兩頭獸似鹿前後有頭一頭食一頭行山人時或見之段成式雜俎云雙頭鹿胎矢名耶希夷人謂鹿為耶謂屎為希按唐韻屎字又音希即此義也胎中屎主治敷惡瘡蛇虺毒藏器麂宋開寶附釋名𫜎即古麂字時珍曰麂味甘旨故從旨又字說云山中有虎麂必鳴以告其聲几几然故曰麂大者曰麖集解馬志曰麂生東南山谷頌曰今有山林處皆有之而均房湘漢間尤多乃獐類也按爾雅云麂大麕旄毛狗足謂毛長也南人往往食其肉然堅韌不及獐味美其皮作履舄勝於諸皮又有一種類麂而大者名麖不堪藥用山海經云女幾之山多麖麂即此宗奭曰麂獐屬而小於獐其口兩邊有長牙好鬥其皮為第一無出其右者但皮多牙傷痕其聲如擊破鈸四方皆有山深處頗多時珍曰麂居大山中似獐而小牡者有短角黧色豹腳腳矮而力徑善跳越其行草莽但循一徑皮極細膩靴襪珍之或云亦好食蛇宋書符瑞志有銀麂白色今施州山中出一種紅麂紅色肉氣味甘平無毒主治五痔病炸熟以薑醋進之大有效藏器頭骨氣味辛平無毒主治燒灰飲服治飛尸藏器皮主治作靴襪除濕氣腳痹時珍獐別録中品釋名麕音君亦作麏時珍曰獵人舞採則獐麋注視獐喜文章故字從章陸氏曰獐性驚慞故謂之獐又善聚散故又名麕囷圓倉也爾雅云麕牡曰麌音語牝曰麜音栗其子曰麆音助大者曰麃音庖古語云四足之美有麃是矣集解頌曰獐今陂澤淺草中多有之其類甚多麃乃總名也有有牙者有無牙者其牙不能噬齧時珍曰獐秋冬居山春夏居澤似鹿而小無角黃黑色大者不過二三十斤雄者有牙出口外俗稱牙獐其皮細軟勝於鹿皮夏月毛毨而皮厚冬月毛多而皮薄也宋符瑞志有銀獐白色云王者刑罰中理則出春秋運鬥樞云樞星散為獐正誤詵曰獐中往往得香如栗子大不能全香亦治惡病時珍曰獐無香有香者麝也俗稱土麝呼為香獐是矣今正之肉氣味甘溫無毒詵曰八月至十一月食之勝羊十二月至七月食之動氣多食令人消渴若瘦惡者食之發痼疾不可合鵠肉食成症痼又不可合梅李蝦食病人主治補益五臟別録發明弘景曰俗云白肉是獐其膽白易驚怖也詵曰肉同麋肉釀酒良道家以其肉供養星辰名為白脯云不屬十二辰不是腥膩無禁忌也時珍曰獐膽白性怯飲水見影輒奔道書謂獐鹿無魂也藏器曰人心粗豪者以其心肝曝乾為末酒服一具便即小膽若怯者食之則轉怯不知所為附方舊二通乳獐肉煮食勿令婦知子母祕録消瘤用獐肉或鹿肉剖如厚脯炙熱拓之可四炙四易出膿便愈不除再以新肉用之外臺祕要髓腦主治益氣力悅澤人面別録治虛風時珍曰千金治暗風薯蕷煎治虛損天門冬煎並用之頌曰唐方有獐髓煎及獐骨酒並補下骨氣味甘微溫無毒主治虛損泄精別録益精髓悅顏色日華時珍曰千金治産後虛損有獐骨湯煮汁煎藥釀酒有補下之功寧源麝本經上品釋名射父爾雅香獐時珍曰麝之香氣遠射故謂之麝或云麝父之香來射故名亦通其形似獐故俗呼香獐梵書謂麝香曰莫訶婆伽集解別録曰麝生中臺山谷及益州雍州山中春分取香生者益良弘景曰麝形似獐而小黑色常食柏葉又啖蛇其香正在陰莖前皮內別有膜袋裹之五月得香往往有蛇皮骨今人以蛇蛻皮裹香云彌香是相使也麝夏月食蛇蟲多至寒則香滿入春臍內急痛自以爪剔出著屎溺中覆之常在一處不移曾有遇得乃至一斗五升者此香絶勝殺取者昔人云是精溺凝作殊不爾也今出羌夷者多真好出隨郡義陽晉溪諸蠻中者亞之出益州者形扁仍以皮膜裹之多僞凡真香一子分作三四子刮取血膜雜以余物裹以四足膝皮而貨之貨者又復僞之彼人言但破看一片毛共在裹中者為勝今惟得活者看取必當全真耳頌曰今陝西益利河東諸路山中皆有而秦州文州諸蠻中尤多蘄州光州或時亦有其香絶小一子才若彈丸往往是真蓋彼人不甚作僞爾其香有三等第一生香名遺香乃麝自剔出者然極難得價同明珠其香聚處遠近草木不生或焦黃也今人帶香過園林則瓜果皆不實是其驗也其次臍香乃捕得殺取之其三心結香乃麝見大獸捕逐驚畏失心狂走墜死人有得之破心見血流出脾上作乾血塊者不堪入藥又有一種水麝其香更奇臍中皆水瀝一滴於鬥水中用灑衣物其香不歇唐天寶中虞人曾一獻之養於囿中每以針刺其臍捻以真雄黃則臍復合其香倍於肉麝此說載在酉陽雜俎近不復聞有之或有之而人不識矣慎微曰楊億談苑云商汝山中多麝遺糞常在一處不移人以是獲之其性絶愛其臍為人逐急即投岩舉爪剔裂其香就縶而死猶拱四足保其臍故李商隱詩云投岩麝退香許渾詩云尋麝採生香時珍曰麝居山獐居澤以此為別麝出西北者香結實出東南者謂之土麝亦可用而力次之南中靈貓囊其氣如麝人以雜之見本條麝臍香修治斆曰凡使麝香用當門子尤妙以子日開之微研用不必苦細也氣味辛溫無毒甄權曰苦辛忌大蒜李鵬飛曰麝香不可近鼻有白蟲入腦患癩久帶其香透關令人成異疾主治辟惡氣殺鬼精物去三蟲蠱毒溫瘧癇痓久服除邪不夢寤魘寐本經療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒去面䵴目中膚翳婦人産難墮胎通神仙別録佩服及置枕間辟惡夢及尸疰鬼氣又療蛇毒弘景抱朴子云入山闢蛇以麝香丸著足爪中有效因麝啖蛇故以厭之也治蛇蠶咬沙蝨溪瘴毒闢蠱氣殺臟腑蟲治瘧疾吐風痰療一切虛損惡病納子宮暖水臟止冷帶下日華熟水研服一粒治小兒驚癇客忤鎮心安神止小便利又能蝕一切癰瘡膿水藥性又云入十香丸服令人百毛九竅皆香除百病治一切惡氣及驚怖恍惚孟詵療鼻窒不聞香臭好古通諸竅開經絡透肌骨解酒毒消瓜果食積治中風中氣中惡痰厥積聚癥瘕時珍發明李杲曰麝香入脾治內病凡風病在骨髓者宜用之使風邪得出若在肌肉用之反引風入骨如油入面之不能出也朱震亨曰五臟之風不可用麝香以瀉衛氣口鼻出血乃陰盛陽虛有升無降當補陽抑陰不可用腦麝輕揚飛竄之劑婦人以血為主凡血海虛而寒熱盜汗者宜補養之不可用麝香之散琥珀之燥嚴用和曰中風不省者以麝香清油灌之先通其關則後免語蹇癱瘓之證而他藥亦有效也時珍曰嚴氏言風病必先用麝香而丹溪謂風病血病必不可用皆非通論蓋麝香走竄能通諸竅之不利開經絡之壅遏若諸風諸氣諸血諸痛驚癇癥瘕諸病經絡壅閉孔竅不利者安得不用為引導以開之通之耶非不可用也但不可過耳濟生方治食瓜果成積作脹者用之治飲酒成消渴者用之云果得麝則壞酒得麝則敗此得用麝之理者也附方舊七新十三中風不省麝香二錢研末入清油二兩和勻灌之其人自蘇也濟生方中惡客忤項強欲死麝香少許乳汁調塗兒口中取效醋調亦可廣利方小兒驚啼發歇不定真麝香一字清水調服日三廣利小兒中水單以麝香如大豆三枚奶汁調分三四服楊氏産乳破傷風水毒腫痛不可忍麝香末一字納瘡中出盡膿水便效普濟方中惡霍亂麝香一錢醋半盞調服聖惠方小兒邪瘧以麝香研墨書去邪辟魔四字於額上經驗後方諸果成積傷脾作脹氣急用麝香一錢生桂末一兩飯和丸緑豆大大人十五丸小兒七丸白湯下蓋果得麝則落木得桂即枯故也濟生消渴飲水因飲酒或食果實過度雖能食而口渴飲水數尿以麝香當門子酒相和作十餘丸枳椇子煎湯送下蓋麝香敗酒壞果枳椇亦敗酒也濟生偏正頭痛久不除者晴明時將發分開用麝香五分皂角末一錢薄紙裹置患處以布包炒鹽於上尉之冷則易如此數次永不再發簡便單方五種蠱毒麝香雄黃等分為末以生羊肝如指大以刀割開裹藥吞之衛生口內肉球有根如線五寸余如叉股吐出乃能食物捻之則痛徹心者麝香一錢研水服之日三自消夏子益奇疾方催生易産續十全方麝香一錢水研服立下濟生勝金散治人弱難産麝香一錢鹽豉一兩以舊青布裹之燒紅為末以稱錘淬酒服二錢即下郭稽中雲婦人産難及橫逆生者乃兒枕破而敗血裹子服勝金散逐其敗血自生也死胎不下麝香當門子一枚桂心末二錢溫酒服即下本事方痔瘡腫毒麝香當門子印城鹽等分塗之不過三次外臺鼠咬成瘡麝香封之妙經驗後方蠶咬成瘡蜜調麝香敷之廣利方山嵐瘴氣水服麝香三分解之集簡方蟲牙作痛香油抹箸頭蘸麝香末綿裹炙熱咬之換二三次其蟲即死斷根甚妙醫方摘要肉氣味甘溫無毒詵曰蠻人常食之似獐肉而腥氣云食之不畏蛇毒也主治腹中症病時珍附方新一小兒症病麝肉二兩切焙蜀椒三百枚炒搗末以雞子白和丸小豆大每服二三丸湯下以知為度範汪方靈貓拾遺釋名靈貍作蛉者非香貍雜俎神貍離騷注類時珍曰自為牝牡又有香氣可謂靈而神矣集解藏器曰靈貓生南海山谷狀如貍自為牝牡其陰如麝功亦相似按異物志云靈貍一體自為陰陽刳其水道連囊以酒灑陰乾其氣如麝若雜入麝香中罕能分別用之亦如麝焉頌曰香貍出南方人以作膾生如北地狐生法其氣甚香微有麝氣時珍曰按段成式言香貍有四外腎則自能牝牡者或由此也劉郁西使記云黑契丹出香貍文似土豹其肉可食糞溺皆香如麝氣楊慎丹鉛録云豫在大理府見香貓如貍其文如金錢豹此即楚辭所謂乘赤豹兮載文貍王逸注為神貍者也南山經所謂亶爰之山有獸焉狀如貍而有髦其名曰類自為牝牡食者不妒列子亦云亶爰之獸自孕而生曰類疑即此物也又星禽真形圖心月狐有牝牡兩體其神貍乎珍按劉楊二說與異物志所說相合則類即靈貍無疑矣類貍字音亦相近也肉氣味甘溫無毒陰氣味辛溫無毒主治中惡鬼氣飛尸蠱疰心腹猝痛狂邪鬼神鬼瘧疫氣夢寐邪魘鎮心安神藏器貓蜀本草釋名家貍時珍曰貓苗茅二音其名自呼陸佃云鼠害苗而貓捕之故字從苗禮記所謂迎貓為其食田鼠也亦通格古論云一名烏圓或謂蒙貴即貓非矣集解時珍曰貓捕鼠小獸也處處畜之有黃黑白駁數色貍身而虎面柔毛而利齒以尾長腰短目如金銀及上齶多稜者為良或云其睛可定時子午卯酉如一線寅申巳亥如滿月辰戌醜未如棗核也其鼻端常冷惟夏至一日則暖性畏寒而不畏暑能畫地卜食隨月旬上下齧鼠首尾皆與虎同陰類之相符如此其孕也兩月而生一乳數子恆有自食之者俗傳牝貓無牡但以竹帚掃背數次則孕或用鬥覆貓於灶前以刷帚頭擊鬥祝灶神而求之亦孕此與以雞子祝灶而抱雛者相同俱理之不可推者也貓有病以烏藥水灌之甚良世傳薄荷醉貓死貓引竹物類相感然耳肉氣味甘酸溫無毒主治勞疰鼠瘻蠱毒發明時珍曰本草以貓貍為一類注解然貍肉入食貓肉不佳亦不入食品故用之者稀胡濙易簡方云凡預防蠱毒自少食貓肉則蠱不能害此亦隋書所謂貓鬼野道之蠱乎肘後治癙瘻核腫或已潰出膿血者取貓肉如常作羹空心食之云不傳之法也昔人皆以癧子為鼠涎毒所致此乃淮南子所謂貍頭治鼠及鼠齧人瘡又云狐目貍腦鼠去其穴皆取其相制之義耳頭骨氣味甘溫無毒主治鬼疰蠱毒心腹痛殺蟲治疳及痘瘡變黑瘰癧癙瘻惡瘡時珍發明時珍曰古方多用貍今人多用貓雖是二種性氣相同故可通用孫氏治痘瘡倒黶用人貓豬犬四頭骨方見人類附方新九心下鱉瘕用黑貓頭一枚燒灰酒服方寸匕日三壽域痰齁發喘貓頭骨燒灰酒服三錢便止醫學正傳貓鬼野道病歌哭不自由臘月死貓頭燒灰水服一錢匕日二千金方多年瘰癧不愈用貓頭蝙蝠各一個俱撒上黑豆同燒存性為末摻之干則油調內服五香連翹湯取效集要走馬牙疳黑貓頭燒灰酒服方寸匕壽域方小兒陰瘡貓頭骨燒灰敷之即愈鼠咬瘡痛貓頭燒灰油調敷之以瘥為度趙氏方收斂癰疽貓頭一個煅研雞子十個煮熟去白以黃煎出油入白蠟少許調灰敷之外以膏護住神妙醫方摘要對口毒瘡貓頭骨燒存性研每服三五錢酒服吳球便民食療方腦紙上陰乾主治瘰癧鼠瘻潰爛同莽草等分為末納孔中時珍出千金眼睛主治瘰癧鼠瘻燒灰井華水服方寸匕日三出千金牙主治小兒痘瘡倒黶欲死同人牙豬牙犬牙燒炭等分研末蜜水服一字即便發起時珍發明時珍曰痘瘡歸腎則變黑凡牙皆腎之標能入腎發毒也內有貓牙又能解毒而熱證亦可用云舌主治瘰癧鼠瘻生曬研敷千金涎主治瘰癧刺破塗之時珍肝主治勞瘵殺蟲取黑貓肝一具生曬研末每朔望五更酒調服之時珍出直指胞衣主治反胃吐食燒灰入硃砂末少許壓舌下甚效時珍出楊氏經驗皮毛主治瘰癧諸瘻癰疽潰爛時珍附方新六乳癰潰爛見內者貓兒腹下毛坩鍋內煅存性入輕粉少許油調封之濟生祕覽瘰癧鼠瘻以石菖蒲生研盦之微破以貓兒皮連毛燒灰用香油調敷內服白蘞末酒下多多為上仍以生白蘞搗爛入酒少許敷之效證治要訣鬢邊生癤貓頸上毛豬頸上毛各一把鼠屎一粒燒研油調敷之壽域鬼舐頭瘡貓兒毛燒灰膏和敷之千金鼻擦破傷貓兒頭上毛剪碎唾黏敷之衛生易簡鼠咬成瘡貓毛燒灰入麝香少許唾和封之貓須亦可救急易方尿以姜或蒜擦牙鼻或生蔥紝鼻中即遺出主治蜒蚰諸蟲入耳滴入即出時珍出儒門事親屎修治臘月採乾者泥固燒存性收用主治痘瘡倒陷不發瘰癧潰爛惡瘡蠱疰蠍螫鼠咬時珍痘黶有無價散見人類燒灰水服治寒熱鬼瘧發無期度者極驗唐本注附方舊一新七小兒瘧疾烏貓屎一錢桃仁七枚同煎服一盞立瘥溫居士方腰腳錐痛支腿者貓兒屎燒灰唾津調塗之永類鈐方蠱疰腹痛雄貓屎燒灰水服外臺瘰癧潰爛臘月貓屎以陰陽瓦合鹽泥固濟煅過研末油調搽之儒門事親鬼舐頭禿貓兒屎燒灰臘豬脂和敷之千金鼠咬成瘡貓屎揉之即愈壽域方蠍螫作痛貓兒屎塗之三五次即瘥心鏡齁哮痰咳貓糞燒灰砂糖湯服一錢葉氏摘玄貍別録中品釋名野貓時珍曰按埤雅云豸之在裡者故從里穴居貍伏之獸也爾雅云貍子曰𧳙音曳其足蹯其跡𠫗音鈕指頭處也集解弘景曰貍類甚多今人用虎貍無用貓貍者然貓貍亦好又有色黃而臭者肉亦主鼠瘻頌曰貍處處有之其類甚多以虎斑文者堪用貓斑者不佳南方一種香貍其肉甚香微有麝氣宗奭曰貍形類貓其紋有二一如連錢一如虎紋皆可入藥肉味與狐不相遠江西一種牛尾貍其尾如牛人多糟食未聞入藥時珍曰貍有數種大小如狐毛雜黃黑有斑如貓而圓頭大尾者為貓貍善竊雞鴨其氣臭肉不可食有斑如貙虎而尖頭方口者為虎貍善食蟲鼠果實其肉不臭可食似虎貍而尾有黑白錢文相間者為九節貍皮可供裘領宋史安陸州貢野貓花貓即此二種也有紋如豹而作麝香氣者為香貍即靈貓也南方有白麵而尾似牛者為牛尾貍亦曰玉面貍專上樹木食百果冬月極肥人多糟為珍品大能醒酒張揖廣雅云玉面貍人捕畜之鼠皆帖伏不敢出也一種似貓貍而絶小黃斑色居澤中食蟲鼠及草根者名𤜢音迅又登州島上有海貍貍頭而魚尾也肉氣味甘平無毒詵曰溫正月勿食傷神時珍曰內則食貍去正脊為不利人也反藜蘆主治諸疰別録治風濕鬼毒氣皮中如針刺時珍出太平御覽作羹臛治痔及鼠瘻不過三頓甚妙蘇頌出外臺補中益氣去遊風孫思邈附方新二腸風痔瘻下血年深日近者如聖散用臘月野貍一枚蟠在罐內炒大棗半升枳殼半斤甘草四兩豬牙皂莢二兩同入罐內蓋定瓦上穿一孔鹽泥固濟煅令乾作一地坑以十字瓦支住罐子用炭五稱煅至黑煙盡青煙出取起濕土罨一宿為末每服二錢鹽湯下一方以貍作羹其骨燒灰酒服楊氏家藏方風冷下血脫肛疼痛野貍一枚大瓶盛之泥固火煅存性取研入麝香二錢每食前米飲服二錢聖惠方膏主治鼷鼠咬人成瘡用此摩之並食貍肉時珍肝主治鬼瘧時珍附方新一鬼瘧經久或發或止野貓肝一具瓶盛熱豬血浸之封口懸干去血取肝研末猢猻頭骨虎頭骨狗頭骨各一兩麝香一分為末醋糊丸芡子大發時手把一丸嗅之仍以緋帛包一丸系中指上聖惠方陰莖主治女人月水不通男子陰㿗燒灰東流水服別録骨頭骨尤良氣味甘溫無毒主治風疰尸疰鬼疰毒氣在皮中淫躍如針刺者心腹痛走無常處及鼠瘻惡瘡別録燒灰酒服治一切遊風日華炒末治噎病不通飲食藥性燒灰水服治食野鳥肉中毒頭骨炙研或燒灰酒服二錢治尸疰邪氣腹痛及痔瘻十服後見驗孟詵宗奭曰炙骨和雄黃麝香為丸服治痔及瘻甚效殺蟲治疳痢瘰癧時珍發明頌曰華他治尸疰有貍骨散用其頭時珍曰貍骨貓骨性相近可通用之衛生寶鑑治諸風心癇神應丹用貍全身燒過入藥附方舊一新一瘰癧腫痛久不瘥用貍頭蹄骨並塗酥炙黃為散每日空心米飲下一錢匕聖惠瘰癧已潰貍頭燒灰頻敷之千金屎五月收干主治燒灰水服主鬼瘧寒熱孟詵燒灰和臘豬脂敷小兒鬼舐頭瘡千金風貍拾遺校正原附貍下今分出釋名風母綱目風生獸同平猴同狤𤟎音吉屈時珍曰風貍能因風騰越死則得風復生而又治風疾故得風名狤𤟎言其詰崛也集解藏器曰風貍生雍州以南似兔而短棲息高樹上候風而吹至他樹食果子其尿如乳甚難得人取養之乃可得時珍曰今考十洲記之風生獸南州異物志之平猴嶺南異物志之風猩酉陽雜俎之狤𤟎虞衡志之風貍皆一物也但紋有大同小異爾其獸生嶺南及蜀西徼外山林中其大如貍如獺其狀如猿猴而小其目赤其尾短如無其色青黃而黑其文如豹或云一身無毛惟自鼻至尾一道有青毛廣寸許長三四分其尿如乳汁其性食蜘蛛亦啖薰陸香晝則蜷伏不動如蝟夜則因風騰躍甚捷越岩過樹如鳥飛空中人網得之見人則如羞而叩頭乞憐之態人撾擊之倏然死矣以口向風須臾復活惟碎其骨破其腦乃死一云刀斫不入火焚不焦打之如皮囊雖鐵擊其頭破得風復起惟石菖蒲塞其鼻即死也一云此獸常持一小杖遇物則指飛走悉不能去見人則棄之人獲得擊打至極乃指示人人取以指物令所欲如意也二說見十洲記及嶺南志未審然否腦主治酒浸服愈風疾時珍出嶺南志和菊花服至十斤可長生十洲記尿主治諸風藏器大風疾虞衡志狐別録下品釋名時珍曰埤雅云狐孤也狐性疑疑則不可以合類故其字從孤省或云狐知虛實以虛擊實實即孤也故從孤亦通集解弘景曰江東無狐狐出北方及益州形似貍而黃善為魅恭曰形似小黃狗而鼻尖尾大全不似貍頌曰今江南亦時有之汴洛尤多北土作膾生食之宗奭曰其性多疑審聽故捕者多用罝時珍曰狐南北皆有之北方最多有黃黑白三種白色者尤稀尾有白錢紋者亦佳日伏於穴夜出竊食聲如嬰兒氣極臊烈毛皮可為裘其腋毛純白謂之狐白許慎云妖獸鬼所乘也有三德其色中和小前大後死則首丘或云狐知上伏不度阡陌或云狐善聽冰或云狐有媚珠或云狐至百歲禮北斗而變化為男女淫婦以惑人又能擊尾出火或云狐魅畏狗千年老狐惟以千年枯木燃照則見真形或云犀角置穴狐不敢歸山海經云青丘之山有狐九尾能食人食之不蠱鼎曰狐魅之狀見人或叉手有禮或祗揖無度或靜處獨語或裸形見人也肉氣味甘溫無毒詵曰有小毒禮記云食狐去首為害人也主治同腸作臛食治瘡疥久不瘥蘇恭煮炙食補虛損又主五臟邪氣患蠱毒寒熱者宜多服之孟詵作膾生食暖中去風補虛勞蘇頌附方舊一狐肉羹治驚癇恍惚語言錯謬歌笑無度及五臟積冷蠱毒寒熱諸病用狐肉一片及五臟治淨入豉汁煮熟入五味作羹或作粥食京中以羊骨汁鯽魚代豉汁亦妙食醫心鏡五臟及腸肚氣味苦微寒有毒主治蠱毒寒熱小兒驚癇別録補虛勞隨臟而補治惡瘡疥生食治狐魅日華作羹臛治大人見鬼孟詵肝燒灰治風癇及破傷風口緊搐強時珍古方治諸風驚癇有狐肝散及衛生寶鑑神應散普濟方治破傷中風金烏散中並用之附方新四勞瘧瘴瘧野狐肝一具陰乾重五日更初北斗下受氣為末粳米飯作丸緑豆大每以一丸緋帛裹系手中指男左女右聖惠鬼瘧寒熱野狐肝膽一具新瓶內陰乾阿魏一分為末醋煮麵糊丸芡子大發時男左女右把一丸嗅之仍以緋帛包一丸系手中指聖惠中惡蠱毒臘月狐腸燒末水服方寸匕千金牛病疫疾恭曰狐腸燒灰和水灌之勝獺也膽臘月收之主治人猝暴亡即取雄狐膽溫水研灌入喉即活移時者無及矣蘇頌出續傳信方辟邪瘧解酒毒時珍萬畢術云狐血漬黍令人不醉高誘注云以狐血漬黍米麥門冬陰乾為丸飲時以一丸置舌下含之令人不醉也附方新一狐膽丸治邪瘧發作無時狐膽一個硃砂砒霜各半兩阿魏麝香黃丹緑豆粉各一分為末五月五日午時粽子尖和丸梧桐子大空心及發前冷醋湯服二丸忌熱物聖惠方陰莖氣味甘微寒有毒思邈曰平有小毒主治女子絶産陰中癢小兒陰㿗卵腫別録婦人陰脫時珍附方新一小兒陰腫狐陰莖炙為末空心酒服千金方頭主治燒之辟邪同貍頭燒灰敷瘰癧時珍千金目主治破傷中風時珍發明時珍曰狐目治破傷風方見劉氏保壽堂方云神效無比臘月收取狐目陰乾臨時用二目一副炭火微燒存性研末無灰酒服之又淮南萬畢術云狐目貍腦鼠去其穴謂塗穴闢鼠也鼻主治狐魅病同豹鼻煮食時珍唇主治惡刺入肉杵爛和鹽封之聖惠口中涎液主治入媚藥嘉謨曰取法小口瓶盛肉置狐常行處狐爪不得徘徊於上涎入瓶中乃收之也四足主治痔漏下血時珍附方新一痔漏反花瀉血者用狐手足一副陰乾穿山甲蝟皮各三兩黃明膠白附子五靈脂蜀烏頭川芎藭乳香各二兩銼細入砂鍋內固濟候乾炭火煅紅為末入木香末一兩以芫荽煎酒調下二錢日三服屢效永類鈐方皮主治辟邪魅時珍尾主治燒灰辟惡日華頭尾燒灰治牛疫和水灌之雄狐屎恭曰在竹木及石上尖頭者是也主治燒之辟惡別録去瘟疫氣蘇恭治肝氣心痛顏色蒼蒼如死灰狀而喘息大者以二升燒灰和薑黃三兩搗末空腹酒下方寸匕日再甚效蘇頌出崔元亮海上方療惡刺入肉燒灰和臘月豬脂封之千金附方舊一新一鬼瘧寒熱雄狐屎蝙蝠屎各一分為末醋糊丸芡子大發時男左女右手把一丸嗅之聖惠一切惡瘻中有冷息肉者用正月狐糞乾末食前新汲水下一錢匕日二千金貉音鶴衍義校正原系貒下今分出釋名時珍曰按俗云貉與獾同穴各處故字從各說文作貈亦作狢爾雅貈子曰貊音陌其雌曰𧳦音惱原本以貊作貆者訛矣集解宗奭曰貉形如小狐毛黃褐色時珍曰貉生山野間狀如貍頭鋭鼻尖斑色其毛深厚溫滑可為裘服與獾同穴而異處日伏夜出捕食蟲物出則獾隨之其性好睡人或蓄之以竹叩醒已而復寐故人好睡者謂之貉睡俗作渴睡謬矣俚人又言其非好睡乃耳聾也故見人乃知趨走考工記云貉逾汶則死地氣使然也王浚川言北曰狐南曰貉星禽書言氐土貉是千歲獨狐化成者並非也肉氣味甘溫無毒主治元臟虛勞及女子虛憊蘇頌貒音湍唐本草釋名獾㹠藏器豬獾時珍曰貒團也其狀團肥也爾雅云貒子曰貒其足蹯其跡𠫗蹯足掌也𠫗指頭跡也集解頌曰貒似犬而矮尖喙黑足褐色與獾貉三種而大抵相類而頭足小別郭璞注爾雅云貒一名獾以為一物然方書說其形狀差別也宗奭曰貒肥矮毛微灰色頭連脊毛一道黑短尾尖嘴而黑蒸食極美時珍曰貒即今豬獾也處處山野間有之穴居狀似小豬㹠形體肥而行鈍其耳聾見人乃走短足短尾尖喙褐毛能孔地食蟲蟻瓜果其肉帶土氣皮毛不如狗獾蘇頌所注乃狗獾非貒也郭璞謂獾即貒亦誤也肉氣味甘酸平無毒主治水脹久不瘥垂死者作羹食之下水大效蘇恭聖惠用粳米蔥豉作粥食服丹石動熱下痢赤白久不瘥煮肉露一宿空腹和醬食一頓即瘥瘦人煮和五味食長肌肉孟詵宗奭曰野獸中惟貒肉最甘美益瘦人治上氣虛乏咳逆勞熱和五味煮食吳瑞膏主治蜣螂蠱毒胸中哽噎怵怵如蟲行咳血以酒和服或下或吐或自消也崔行功胞主治蠱毒以臘月者湯摩如雞子許空腹服之唐本草骨主治上氣咳嗽炙研酒服三合日二取瘥孟詵獾食物釋名狗獾音歡天狗時珍曰獾又作貆亦狀其肥鈍之貌蜀人呼為天狗集解汪穎曰狗獾處處山野有之穴土而居形如家狗而腳短食果實有數種相似其肉味甚甘美皮可為裘時珍曰貒豬獾也獾狗獾也二種相似而略殊狗獾似小狗而肥尖喙矮足短尾深毛褐色皮可為裘領亦食蟲蟻瓜果又遼東女直地面有海獾皮可供衣裘亦此類也肉氣味甘酸平無毒主治補中益氣宜人汪穎小兒疳瘦殺蛔蟲宜啖之蘇頌功與貒同時珍木狗綱目集解時珍曰按熊太古冀越集云木狗生廣東左右江山中形如黑狗能登木其皮為衣褥能運動血氣元世祖有足疾取以為褲人遂貴重之此前所未聞也珍嘗聞蜀人言川西有玄豹大如狗黑色尾亦如狗其皮作裘褥甚暖冬月遠行用其皮包肉食數日猶溫彼土亦珍貴之此亦木狗之屬也故附見於此云皮主治除腳痹風濕氣活血脈暖腰膝時珍豺音儕唐本草釋名豺狗時珍曰按字說云豺能勝其類又知祭獸可謂才矣故字從才埤雅云豺柴也俗名體瘦如豺是矣集解時珍曰豺處處山中有之狼屬也俗名豺狗其形似狗而頗白前矮後高而長尾其體細瘦而健猛其毛黃褐色而鬇鬡其牙如錐而噬物群行虎亦畏之又喜食羊其聲如犬人惡之以為引魅不祥其氣臊臭可惡羅願云世傳狗為豺之舅見狗輒跪亦相制耳肉氣味酸熱有毒詵曰豺肉食之損人精神消人脂肉令人瘦皮氣味熱主治冷痹軟腳氣熟之以纏裹病上即瘥蘇恭療諸疳痢腹中諸瘡煮汁飲或燒灰酒服之其灰亦可敷䘌齒瘡孟詵又曰頭骨燒灰和酒灌解槽牛馬便馴良附人治小兒夜啼百法不效同狼屎中骨燒灰等分水服少許即定時珍出普濟方狼拾遺釋名毛狗時珍曰禽書云狼逐食能倒立先卜所向獸之良者也故字從良爾雅云牡曰獾牝曰狼其子曰獥音叫集解藏器曰狼大如狗蒼色鳴聲則諸孔皆沸時珍曰狼豺屬也處處有之北方尤多喜食之南人呼為毛狗是矣其居有穴其形大如犬而鋭頭尖喙白頰駢脅高前廣後腳不甚高能食雞鴨鼠物其色雜黃黑亦有蒼灰色者其聲能大能小能作兒啼以魅人野俚尤惡其冬鳴其腸直故鳴則後竅皆沸而糞為烽煙直上不斜其性善顧而食戾踐藉老則其胡如袋所以跋胡㚄尾進退兩患其象上應奎星穎曰狽足前短知食所在狼足後短負之而行故曰狼狽狼筋藏器曰狼筋如織絡袋子又若筋膠所作大小如鴨卵人有犯盜者熏之即腳攣縮因之獲賊也或言是狼䏶下筋又言是蟲所作未知孰是時珍曰按李石續博物志云唐時有狼巾一作狼筋狀如大蝸兩頭光帶黃色有段祐失金帛集奴婢於庭焚之一婢臉瞤乃竊器者此即陳氏所謂狼筋也愚謂其事蓋術者所為未必實有是理而羅氏爾雅翼解為狼䏶中筋大於雞卵謬矣肉氣味咸熱無毒味勝狐犬主治補益五臟厚腸胃填精髓腹有冷積者宜食之時珍出飲膳正要膏主治補中益氣潤燥澤皺塗諸惡瘡時珍發明時珍曰臘月煉淨收之禮記云小切狼臅膏與稻米為酏謂以狼胸臆中膏和米作粥糜也古人多食狼肉以膏煎和飲食故內則食狼去腸周禮獸人冬獻狼取其膏聚也諸方亦時用狼之靨牙皮糞而本草並不著其功用止有陳藏器述狼筋疑似一說可謂缺矣今通據飲膳正要諸書補之云牙主治佩之辟邪惡氣刮末水服治猘犬傷燒灰水服方寸匕治食牛中毒時珍出小品諸方喉靨主治噎病曬乾為末每以半錢入飯內食之妙聖惠皮主治暖人辟邪惡氣嗉下皮搓作條勒頭能去風止痛正要淮南子萬畢術云狼皮當戶羊不敢出尾主治繫馬胸前辟邪氣令馬不驚正要屎主治瘰癧燒灰油調封之又治骨哽不下燒灰水服之時珍出外臺千金方屎中骨主治小兒夜啼燒灰水服二黍米大即定又能斷酒千金附方新一破傷風狼虎穿腸骨四錢炙黃桑花蟬蛻各二錢為末每服一錢米湯調下若口乾者不治經驗方兔別録中品釋名明視時珍曰按魏子才六書精蘊云兔字篆文象形一云吐而生子故曰兔禮記謂之明視言其目不瞬而瞭然也說文兔子曰婏音萬狡兔曰㕙音俊曰毚音讒梵書謂兔為舍舍迦集解頌曰兔處處有之為食品之上味時珍曰按事類合璧云兔大如貍而毛褐形如鼠而尾短耳大而鋭上唇缺而無脾長鬚而前足短尻有九孔趺居趫捷善走舐雄豪而孕五月而吐子其大者為㚟音綽似兔而大青色首與兔同足與鹿同故字象形或謂兔無雄而中秋望月中顧兔以孕者不經之說也今雄兔有二卵古樂府有雄兔腳撲速雌兔眼迷離可破其疑矣主物簿云孕環之兔懷於左腋毛有紋採至百五十年環轉於腦能隱形也王廷相雅述云兔以潦而化為鱉鱉以旱而化為兔熒惑不明則雉生兔肉氣味辛平無毒詵曰酸冷時珍曰甘寒按內則云食兔去尻不利人也風俗通云食兔臏多令人面生臏骨弘景曰兔肉為羹益人妊娠不可食令子缺唇不可合白雞肉及肝心食令人面黃合獺肉食令人病遁尸與薑橘同食令人心痛霍亂又不可同芥食藏器曰兔尻有孔子從口出故妊婦忌之非獨為缺唇也大抵久食絶人血脈損元氣陽事令人痿黃八月至十月可食余月傷人神氣兔死而眼合者殺人主治補中益氣別録熱氣濕痹止渴健脾生食壓丹石毒日華臘月作醬食去小兒豌豆瘡藥性涼血解熱毒利大腸時珍發明宗奭曰兔者明月之精有白毛者得金之氣入藥尤效凡兔至秋深時可食金氣全也至春夏則味變矣然作醬必用五味既患豌豆瘡又食此物發毒太甚恐斑爛損人時珍曰兔至冬月齕木皮已得金氣而氣內實故味美至春食草麥而金氣衰故不美也今俗以飼小兒云令出痘稀蓋亦因其性寒而解熱耳故又能治消渴壓丹石毒若痘已出及虛寒者宜戒之劉純治例云反胃結腸甚者難治常食兔肉則便自行又可證其性之寒利矣附方舊一消渴羸瘦用兔一隻去皮爪五臟以水一斗半煎稠去滓澄冷渴即飲之極重者不過二兔崔元亮海上方血氣味咸寒無毒主治涼血活血解胎中熱毒催生易産時珍附方新六蟾宮丸乾坤祕韞治小兒胎毒遇風寒即發痘疹服此可免雖出亦稀用兔二隻臘月八日刺血於漆盤內以細麵炒熟和丸緑豆大每服三十丸緑豆湯下每一兒食一劑永安甚效楊氏經驗方加硃砂三錢酒下名兔砂丸兔血丸小兒服之終身不出痘瘡或出亦稀少臘月八日取生兔一隻刺血和蕎麥麵少加雄黃四五分候乾丸如緑豆大初生小兒以乳汁送下二三丸遍身發出紅點是其徵驗也但兒長成常以兔肉啖之尤妙劉氏保壽堂方催生丹治産難臘月兔血以蒸餅染之紙裹陰乾為末每服二錢乳香湯下指迷方心氣痛瑞竹堂方用臘兔血和茶末四兩乳香末二兩搗丸芡子大每溫醋化服一丸談野翁方臘月八日取活兔血和麵丸梧桐子大每白湯下二十一丸腦主治塗凍瘡別録催生滑胎時珍同膏治耳聾蘇恭附方舊四催生散用臘月兔腦髓一個攤紙上令勻陰乾剪作符子於面上書生字一個候母痛極時用叉股夾定燈上燒灰煎丁香酒調下博濟方催生丹臘月取兔腦髓二個塗紙上吹乾入通明乳香末二兩同研令勻於臘日前夜安桌子上露星月下設茶果齊戒焚香望北拜告曰大道弟子某修合救世上難生婦人藥願降威靈佑助此藥速令生産禱畢以紙包藥露一夜天未明時以豬肉搗和丸芡子大紙袋盛懸透風處每服一丸溫醋湯下良久未下更用冷酒下一丸即産乃神仙方也經驗方手足皸裂用兔腦髓生塗之聖惠發腦發背及癰疽熱癤惡瘡用臘月兔頭搗爛入瓶內密封惟久愈佳每用塗帛上厚封之熱痛即如冰也頻換取瘥乃止勝金骨主治熱中消渴煮汁服別録頌曰崔元亮海上方治消渴羸瘦小便不禁兔骨和大麥苗煮汁服極效煮汁服止霍亂吐利時珍外臺用之治鬼疰瘡疥刺風日華藏器曰醋磨塗久疥妙頭骨臘月收之氣味甘酸平無毒主治頭眩痛癲疾別録連皮毛燒存性米飲服方寸匕治天行嘔吐不止以瘥為度蘇頌出必效方連毛髓燒灰酒服治産難下胎及産後余血不下日華陸氏用蔥湯下燒末敷婦人産後陰脫癰疽惡瘡水服治小兒疳痢煮汁服治消渴不止時珍附方新二預解痘毒十二月取兔頭煎湯浴小兒除熱去毒令出痘稀飲膳正要産後腹痛兔頭炙熱摩之即定必效肝主治目暗別録明目補勞治頭旋眼眩日華和決明子作丸服甚明目切洗生食如羊肝法治丹石毒發上沖目暗不見物孟詵發明時珍曰按劉守真云兔肝明目因其氣有餘以補不足也眼科書云兔肝能瀉肝熱蓋兔目瞭而性冷故也附方新一風熱目暗肝腎氣虛風熱上攻目腫暗用兔肝一具米三合和豉汁如常煮粥食普濟皮毛臘月收之主治燒灰酒服方寸匕治産難後胞衣不出及余血搶心脹刺欲死者極驗蘇恭煎湯洗豌豆瘡藥性頭皮灰主鼠瘻及鬼疰毒氣在皮中如針刺者毛灰主灸瘡不瘥藏器皮灰治婦人帶下毛灰治小便不利余見敗筆下時珍附方舊二婦人帶下兔皮燒煙盡為末酒服方寸匕以瘥為度外臺火燒成瘡兔腹下白毛貼之候毛落即瘥百一方屎臘月收之釋名明月砂聖惠玩月砂集驗兔菌炮炙論主治目中浮翳勞瘵五疳疳瘡痔瘻殺蟲解毒時珍發明時珍曰兔屎能解毒殺蟲故治目疾疳勞瘡痔方中往往用之諸家本草並不言及亦缺漏也按沈存中良方云江陰萬融病勞四體如焚寒熱煩躁一夜夢一人腹擁一月光明使人心骨皆寒及寤而孫元規使人遺藥服之遂平扣之則明月丹也乃悟所夢附方舊二新五明月丹治勞瘵追蟲用兔屎四十九粒硇砂如兔屎大四十九粒為末生蜜丸梧桐子大月望前以水浸甘草一夜五更初取汁送下七丸有蟲下急鉗入油鍋內煎殺三日不下再服蘇沈良方五疳下痢兔屎炒半兩干蛤蟆一枚燒灰為末綿裹如蓮子大納下部日三易之聖惠方大小便祕明月砂一匙安臍中冷水滴之令透自通也聖惠痔瘡下血疼痛不止者用玩月砂慢火炒黃為末每服二錢入乳香五分空心溫酒下日三服即兔糞也集驗方月蝕耳瘡望夜取兔屎納蛤蟆腹中同燒末敷之肘後痘瘡入目生翳用兔屎日乾為末每服一錢茶下即安普濟方痘後目翳直往山中東西地上不許回顧尋兔屎二七粒以雌雄檳榔各一個同磨不落地井水調服百無一失其效如神藺氏經驗方敗筆唐本草集解時珍曰上古殺青書竹帛至蒙恬以兔毫作筆後世復以羊鼠諸毛為之惟兔毫入藥用筆頭灰氣味微寒無毒主治水服治小便不通小便數難淋瀝陰腫脫肛中惡唐本酒服二錢治男子交婚之夕莖萎藥性酒服二錢治難産漿飲服二錢治咽喉痛不下飲食時珍出範汪方發明時珍曰筆不用新而用敗者取其沾濡膠墨也膠墨能利小便胎産故耳附方舊二新二小便不通數而微腫用陳久筆頭一枚燒灰水服外臺心痛不止敗筆頭三個燒灰無根水服立效經驗方難産催生勝金方聖妙寸金散用敗筆頭一枚燒灰研生藕汁一盞調下立産若母虛弱及素有冷疾者溫汁服之陸氏治難産第一方用兔毫筆頭三個燒灰金箔三片以蠟和丸酒服山獺綱目集解時珍曰山獺出廣之宜州溪峒及南丹州土人號為插翹其性淫毒山中有此物凡牝獸皆避去獺無偶則抱木而枯瑤女春時成群入山以採物為事獺聞婦人氣必躍來抱之次骨而入牢不可脫因扼殺之負歸取其陰一枚直金一兩若得抱木死者尤奇貴峒獠甚珍重之私貨出界者罪至死然本地亦不常有方士多以鼠璞猴胎僞之試之之法但令婦人摩手極熱取置掌心以氣呵之即躍然而動蓋為陰氣所感故也此說出範石湖虞衡志周草窗齊東野語中而不載其形狀亦缺文也陰莖氣味甘熱無毒主治陽虛陰痿精寒而清者酒磨少許服之獠人以為補助要藥時珍骨主治解藥箭毒研少許敷之立消時珍水獺別録下品釋名水狗時珍曰王氏字說云正月十月獺兩祭魚知報本反始獸之多賴者其形似狗故字從犬從賴大者曰獱音賓曰猵音編又桓寬鹽鐵論以獨為猵群為獺如猿之與獨也集解弘景曰獺多出溪岸邊有兩種入藥惟取以魚祭天者一種獱獺形大而頭如馬身似蝙蝠不入藥用頌曰江湖多有之宗奭曰獺四足俱短頭與身尾皆褊毛色若故紫帛大者身與尾長三尺余食魚居水中亦休木上嘗縻置大水甕中在內旋轉如風水皆成旋渦西戎以其皮飾毳服領袖云垢不著染如風霾翳目但就拭之即去也時珍曰獺狀似狐而小毛色青黑似狗膚如伏翼長尾四足水居食魚能知水信為穴鄉人以占潦旱如鵲巢知風也古有熊食鹽而死獺飲酒而斃之語物之性也今川沔漁舟往往馴畜使之捕魚甚捷亦有白色者或云獱獺無雌以猿為雌故云猿鳴而獺候肉氣味甘寒無毒思邈曰甘溫弘景曰不可雜兔肉食主治煮汁服療疫氣溫病及牛馬時行病別録水氣脹滿熱毒風日華骨蒸熱勞血脈不行榮衛虛滿及女子經絡不通血熱大小腸祕消男子陽氣不宜多食蘇頌發明詵曰患熱毒風水虛脹者取水獺一頭去皮連五臟及骨頭尾等炙乾為末水服方寸匕日二服十日瘥若冷氣虛脹者服之益虛腫甚也只治熱不治冷為其性寒耳附方舊一折傷水獺一個支解入罐內固濟待乾煅存性為末以黃米煮粥攤患處糝獺末於粥上布裹之立止疼痛經驗後方肝頌曰諸畜肝葉皆有定數惟獺肝一月一葉十二月十二葉其間又有退葉用之須見形乃可驗不爾多僞也氣味甘溫有毒甄權曰咸微熱無毒頌曰肉及五臟皆寒惟肝溫也主治鬼疰蠱毒止久嗽除魚鯁並燒灰酒服之別録治上氣咳嗽虛勞瘦病藥性傳尸勞極虛汗客熱四肢寒瘧及産勞蘇頌殺蟲時珍發明宗奭曰獺肝治勞用之有驗頌曰張仲景治冷勞有獺肝丸崔氏治九十九種蠱疰傳尸骨蒸伏連殗殜諸鬼毒癘疫有獺肝丸二方俱妙詵曰疰病一門悉患者以肝一具火炙末水服方寸匕日再服之葛洪云尸疰鬼疰乃五尸之一又挾諸鬼邪為害其病變動乃有三十六種至九十九種大略使人寒熱沉沉默默不知病之所苦而無處不惡積月纍年淹滯至死死後傳人乃至滅門覺有此候惟以獺肝一具陰乾為末水服方寸匕日三以瘥為度時珍曰按朝野僉載云五月五日午時急砍一竹竹節中必有神水瀝取和獺肝為丸治心腹積聚病甚效也附方舊二新一鬼魅獺肝末水服方寸匕日三千金翼腸痔有血獺肝燒末水服一錢肘後方久痔下血不止用獺肝一副煮熟入五味空腹食之妙飲膳正要腎氣味同肉主治益男子蘇頌膽氣味苦寒無毒主治眼翳黑花飛蠅上下視物不明亦入點藥中蘇頌正誤宗奭曰古語云蟾肪軟玉獺膽分杯謂以膽塗竹刀或犀角篦上畫酒中即分也嘗試之不驗蓋妄傳耳但塗杯唇使酒稍高於盞面耳不可不正之附方新一月水不通獺膽丸用干獺膽一枚干狗膽硇砂川椒炒去汗目各一分水蛭炒黃十枚為末醋糊丸緑豆大每於食前服五丸當歸酒下日三服聖惠方髓主治去瘢痕時珍發明時珍曰按集異記云吳主鄧夫人為如意傷頰血流啼叫太醫云得白獺髓雜玉與琥珀敷之當滅此痕遂以百金購得白獺合膏而痊但琥珀太多猶有赤點如痣骨主治含之下魚骨鯁陶弘景煮汁服治嘔噦不止藥性足主治手足皴裂蘇恭煮汁服治魚骨鯁並以爪爬喉下藏器為末酒服殺勞瘵蟲時珍皮毛主治煮汁服治水癊病亦作褥及履屧著之藏器産母帶之易産張傑屎主治魚臍瘡研末水和敷之即膿出痛止藏器曰亦主驢馬蟲顙及牛疫疾研水灌之治下痢燒末清旦飲服一小盞三服愈赤用赤糞白用白糞時珍出古今録驗海獺拾遺集解藏器曰海獺生海中似獺而大如犬腳下有皮如人胼拇毛著水不濡人亦食其肉海中又有海牛海馬海驢等皮毛在陸地皆候風潮猶能毛起說出博物志時珍曰大獱小獺此亦獺也今人以其皮為風領云亞於貂焉如淳注博物志云海獱頭如馬自腰以下似蝙蝠其毛似獺大者五六十斤亦可烹食膃肭獸上烏忽切下女骨切宋開寶附釋名骨豽說文作貀與肭同海狗時珍曰唐韻膃肭肥貌或作骨貀訛為骨訥皆番言也集解藏器曰骨豽獸生突厥國胡人呼為阿慈勃他你其狀似狐而大長尾臍似麝香黃赤色如爛骨從西番來甄權曰膃肭臍是新羅國海內狗外腎也連而取之李珣曰按臨海志云出東海水中狀若鹿形頭似狗長尾每遇日出即浮在水面崑崙家以弓矢射之取其外腎陰乾百日味甘香美也頌曰今東海旁亦有之舊說似狐長尾今滄州所圖乃是魚類而豕首兩足其臍紅紫色上有紫斑點全不相類醫家多用之異魚圖云試其臍於臘月衝風處置盂水浸之不凍者為真也斆曰膃肭臍多僞者海中有獸號曰水烏龍海人取其腎以充膃肭臍其物自別真者有一對則兩重薄皮裹丸核其皮上自有肉黃毛一穴三莖收之器中年年濕潤如新或置睡犬頭上其犬忽驚跳若狂者為真也宗奭曰今出登萊州其狀非狗非獸亦非魚也但前即似獸而尾即魚身有短密淡青白毛毛上有深青黑點久則亦淡腹脅下全白色皮厚韌如牛皮邊將多取以飾鞍韉其臍治腹臍積冷精衰脾腎勞極有功不待別試也似狐長尾之說蓋今人多不識之時珍曰按唐書云骨貀獸出遼西營州及結骨國一統志云膃肭臍出女直及三佛齊國獸似狐腳高如犬走如飛取其腎漬油名膃肭臍觀此則似狐之說非無也蓋似狐似鹿者其毛色爾似狗者其足形也似魚者其尾形也入藥用外腎而曰臍者連臍取之也又異物志豽獸出朝鮮似貍蒼黑色無前兩足能捕鼠郭璞云晉時召陵扶夷縣獲一獸似狗豹文有角兩腳據此則豽有水陸二種而藏器所謂似狐長尾者其此類與膃肭臍一名海狗腎修治斆曰用酒浸一日紙裹炙香銼搗或於銀器中以酒煎熟合藥時珍曰以漢椒樟腦同收則不壞氣味咸大熱無毒李珣曰味甘香美大溫主治鬼氣尸疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣宿血結塊痃癖羸瘦藏器治男子宿症氣塊積冷勞氣腎精衰損多色成勞瘦悴藥性補中益腎氣暖腰膝助陽氣破癥結療驚狂癇疾日華五勞七傷陰痿少力腎虛背膊勞悶面黑精冷最良海藥發明時珍曰和劑局方治諸虛損有膃肭臍丸今之滋補丸藥中多用之精不足者補之以味也大抵與蓯蓉瑣陽之功相近亦可同糯米法曲釀酒服猾音滑炮炙論集解斆曰海中有獸名曰猾其髓入油中油即沾水水中生火不可救止以酒噴之即滅不可於屋下收故曰水中生火非猾髓而莫能時珍曰此獸之髓水中生火與樟腦相同其功亦當與樟腦相似也第今無識之者獸之三鼠類一十二種鼠別録下品校正舊在蟲魚部今據爾雅移入獸部釋名䶆鼠音錐老鼠綱目首鼠史記家鹿時珍曰此即人家常鼠也以其尖喙善穴故南陽人謂之䶆鼠其壽最長故俗稱老鼠其性疑而不果故曰首鼠嶺南人食而諱之謂為家鹿鼠字篆文象其頭齒腹尾之形集解弘景曰入藥用牡鼠即父鼠也其膽才死便消不易得也時珍曰鼠形似兔而小青黑色有四齒而無牙長鬚露眼前爪四後爪五尾紋如織而無毛長與身等五臟俱全肝有七葉膽在肝之短葉間大如黃豆正白色胋而不垂衛生家寶方言其膽紅色者何耶鼠孕一月而生多者六七子惠州獠民取初生閉目未有毛者以蜜養之用獻親貴挾而食之聲猶唧唧謂之蜜唧淮南子云魚食巴豆而死鼠食巴豆而肥段成式云鼠食鹽而身輕食砒而即死易云艮為鼠春秋運鬥樞云玉衡星散而為鼠抱朴子云鼠壽三百歲滿百歲則色白善憑人而卜名曰仲能知一年中吉凶及千里外事鼠類頗繁爾雅說文所載後世未能悉知後世所知者二書復未盡載可見格物無窮也附録鼨鼠音終郭璞云其大如拳其文如豹漢武帝曾獲得以問終軍者䶄鼠音平許慎云一名𪕛鼠音含斑紋𪖂𪕭音離艾孫愐云小鼠也相銜而行李時珍云按秦州記及草木子皆載群鼠數萬相銜而行以為鼠妖者即此也鼩鼱音劬精似鼠而小即今地鼠也又爾雅說文有鼸鼶鼮鼣鼭鼤䶅䶈八鼠皆無考證音歉斯廷吠時文鶴博也水鼠李時珍云似鼠而小食菱芡魚蝦或云小魚小蟹所化也冰鼠東方朔雲生北荒積冰下皮毛甚柔可為席臥之卻寒肉可作脯食之已熱火鼠李時珍云出西域及南海火洲其山有野火春夏生秋冬死鼠産於中甚大其毛及草木之皮皆可織布汙則燒之即潔名火浣布鼵鼠音突郭璞云鳥鼠同穴山在今隴西首陽縣之西南其鳥為䳜音塗狀如家雀而黃黑色其鼠為鼵狀如家鼠而色小黃尾短鳥居穴外鼠居穴內蟨鼠音蹶爾雅云西方有比肩獸焉與邛邛巨虛比為齧甘草即有難邛邛巨虛負而走其名曰蟨李時珍曰今契丹及交河北境有跳兔頭目毛色皆似兔而爪足似鼠前足僅寸許後足近尺尾亦長其端有毛一跳數尺止即蹶僕此即蟨鼠也土人掘食之郭璞以邛邛巨虛為獸名兔前鼠後張揖注漢書云邛邛青獸狀如馬巨虛似騾而小本草稱巨虛食庵䕡子而仙則是物之至駿者也牡鼠氣味甘微溫無毒日華曰涼牝鼠並不入藥主治療踒折續筋骨生搗敷之三日一易別録豬脂煎膏治打撲折傷凍瘡湯火傷詵曰臘月以油煎枯去滓熬膏收用頌曰油煎入蠟敷湯火傷滅瘢痕極良治小兒驚癇日華五月五日同石灰搗收敷金瘡神效時珍臘月燒之辟惡氣弘景梅師云正旦朝所居處埋鼠闢瘟疫也發明劉完素曰鼠善穿而用以治瘡瘻者因其性而為用也附方舊六新六鼠瘻潰爛鼠一枚亂髮一雞子大以三歲臘月豬脂煎令消盡以半塗之以半酒服姚云不傳之妙法也葛氏滅諸瘢痕大鼠一枚以臘豬脂四升煎至銷盡濾淨日塗三五次先以布拭赤避風普濟方瘡腫熱痛靈鼠膏用大雄鼠一枚清油一斤煎焦滴水不散濾再煎下炒紫黃丹五兩柳枝不住攪勻滴水成珠下黃蠟一兩熬帶黑色成膏瓷瓶收之出火毒每用攤貼去痛而涼經驗方潰癰不合老鼠一枚燒末敷之千金方蛇骨刺人痛甚用死鼠燒敷肘後破傷風病角弓反張牙噤肢強用鼠一頭和尾燒灰以臘豬脂和敷之梅師項強身急取活鼠去五臟乘熱貼之即瘥也肘後婦人狐瘕因月水來或悲或驚或逢疾風暴雨被濕致成狐瘕精神恍惚令人月水不通胸脅腰背痛引陰中小便難嗜食欲嘔如有孕狀其瘕手足成形者殺人未成者可治用新鼠一枚以新絮裹之黃泥固住入地坎中桑薪燒其上一日夜取出去絮入桂心末六銖為末每酒服二方寸匕不過二服當自下外臺素女經令子易産取鼠燒末井花水服方寸匕日三子母祕録乳汁清少死鼠一頭燒末酒服方寸匕勿令婦知同上杖瘡腫痛未毛鼠同桑椹子入麻油中浸釀臨時取塗甚效西湖志湯火傷瘡小老鼠泥包燒研菜油調塗之談野翁方小兒傷乳腹脹煩悶欲睡燒鼠二枚為末日服二錢湯下保幼大全鼠肉以下並用牡鼠氣味甘熱無毒主治小兒哺露大腹炙食之別録小兒疳疾腹大貪食者黃泥裹燒熟去骨取肉和五味豉汁作羹食之勿食骨甚瘦人孟詵主骨蒸勞極四肢羸瘦殺蟲及小兒疳瘦酒熬入藥蘇頌炙食治小兒寒熱諸疳時珍附方舊三新一水鼓石水腹脹身腫者以肥鼠一枚取肉煮粥空心食之兩三頓即愈心鏡小兒癥瘕老鼠肉煮汁作粥食之姚和衆方乳汁不通鼠肉作羹食勿令知之産書箭鏃入肉大雄鼠一枚取肉薄批焙研每服二錢熱酒下瘡癢則出矣集要肝主治箭鏃不出搗塗之聤耳出汁每用棗核大乘熱塞之能引蟲也時珍膽主治目暗弘景點目治青盲雀目不見物滴耳治聾時珍發明時珍曰癸水之位在子氣通於腎開竅於耳注精於瞳子其標為齒鼠亦屬子宮癸水其目夜明在卦屬艮其精在膽故膽能治耳聾青盲睛能明目而骨能生齒皆腎病也諸家本草不言鼠膽治聾而葛洪肘後方甚稱其妙云能治三十年老聾若猝聾者不過三度也有人側臥瀝膽入耳盡膽一個須臾汁從下耳出初時益聾半日乃瘥矣後世群方祖此亦多用之附方新四耳猝聾閉以鼠膽汁二枚滴之如雷鳴時即通本事方多年老聾衛生家寶方勝金透關散用活鼠一枚系定熱湯浸死破喉取膽真紅色者是也用川烏頭一個炮去皮華陰細辛各二錢膽礬半錢為末以膽和勻再焙乾研細入麝香半字用鵝翎管吹入耳中口含茶水日二次十日見效永除根本聖惠治久聾臘月取鼠膽二枚熊膽一分水和旋取緑豆大滴耳中日二次青盲不見雄鼠膽鯉魚膽各二枚和勻滴之立效聖惠方鼠印即外腎也主治令人媚悅時珍曰按南宮從岣嶁神書鼠印合歡注云雄鼠外腎之上有文似印兩腎相對有符篆朱文九遍者尤佳以十一二月或五月五日七月七日正月朔旦子時面北向子位刮取陰乾如篆刻下佩於青囊中男左女右係臂上人見之無不歡悅所求如心也脂主治煎之亦療諸瘡弘景湯火傷蘇頌耳聾時珍附方新一久聾鼠脂半合青鹽一錢蚯蚓一條同和化以綿蘸捻滴耳中塞之聖惠方腦主治針棘竹木諸刺在肉中不出搗爛厚塗之即出箭鏑針刃在咽喉胸膈諸隱處者同肝搗塗之又塗小兒解顱以綿裹塞耳治聾時珍出肘後總録頭主治瘻瘡鼻齄湯火傷瘡時珍附方舊一新二鼻齄膿血正月取鼠頭燒灰以臘月豬脂調敷之外臺湯火傷灼死鼠頭以臘月豬脂煎令消盡敷之則不作瘢神效千金方斷酒不飲臘鼠頭燒灰柳花末等分每睡時酒服一杯千金目主治明目能夜讀書術家用之陶弘景發明見膽下附方舊一目澀好眠取一目燒研和魚膏點入目眥兼以絳囊盛兩枚佩之肘後涎氣味有毒墜落食中食之令人生鼠瘻或發黃如金脊骨主治齒折多年不生者研末日日揩之甚效藏器發明見膽下雷公炮炙論序云長齒生牙賴雄鼠之骨末附方新一牙齒疼痛老鼠一個去皮以硇砂擦上三日肉爛化盡取骨瓦焙為末入蟾酥二分樟腦一錢每用少許點牙根上立止孫氏集效方四足及尾主治婦人墮胎易出別録足燒服催生日華皮主治燒灰封癰疽口冷不合者生剝貼附骨疽瘡即追膿出時珍糞弘景曰兩頭尖者是牡鼠屎氣味甘微寒無毒時珍曰有小毒食中誤食令人目黃成疸主治小兒疳疾大腹蔥豉同煎服治時行勞復別録頌曰張仲景及古今名方多用之治癇疾明目日華煮服治傷寒勞復發熱男子陰易腹痛通女子月經下死胎研末服治吹奶乳癰解馬肝毒塗鼠瘻瘡燒存性敷折傷疔腫諸瘡貓犬傷時珍發明時珍曰鼠屎入足厥陰經故所治皆厥陰血分之病上列諸證是矣附方舊八新十五傷寒勞復外臺用雄鼠屎二十枚豉五合水二升煮一升頓服活人書鼠屎豉湯治勞復發熱用雄鼠屎二七枚梔子十四枚枳殼三枚為粗末水一盞半蔥白二寸豉三十粒煎一盞分三服男子陰易及勞復豭鼠屎湯用豭鼠屎兩頭尖者十四枚韭根一大把水二盞煎一盞溫服得黏汗為效未汗再服南陽活人方大小便祕雄鼠屎末敷臍中立效普濟室女經閉牡鼠屎一兩炒研空心溫酒服半錢千金方子死腹中雄鼠屎二七枚水三升煮一升取汁作粥食胎即下子母祕録産後陰脫以溫水洗軟用雄鼠屎燒煙燻之即入熊氏婦人吹奶鼠屎七粒紅棗七枚去核包屎燒存性入麝香少許溫酒調服集要方乳癰初起雄鼠屎七枚研末溫酒服取汗即散壽域方乳癰已成用新濕鼠屎黃連大黃各等分為末以黍米粥清和塗四邊即散姚僧坦方鼠瘻潰壞新鼠屎一百粒收密器中五六十日杵碎即敷之效千金方疔瘡惡腫鼠屎亂髮等分燒灰針瘡頭納入大良普濟方鬼擊吐血胸腹刺痛鼠屎燒末水服方寸匕不省者灌之肘後方折傷瘀血傷損筋骨疼痛鼠屎燒末豬脂和敷急裹不過半日痛止梅師方中馬肝毒雄鼠屎三七枚和水研飲之梅師馬咬踏瘡腫痛作熱鼠屎二七枚故馬鞘五寸和燒研末豬脂調敷之梅師狂犬咬傷鼠屎二升燒末敷之梅師方貓咬成瘡雄鼠屎燒灰油和敷之曾經效驗壽域兒齒不生雌鼠屎兩頭圓者三七枚一日一枚拭其齒勿食鹹酸或入麝香少許尤妙小品小兒白禿鼠屎瓦煅存性同輕粉麻油塗之百一選方小兒鹽齁鼠屎燒研水酒空心服之一歲一錢小兒燕窩生瘡鼠屎研末香油調搽毒蛇傷螫野鼠屎水調塗之邵真人經驗方壤土見土部鼴鼠音偃別録下品釋名田鼠禮記蚡鼠音憤隱鼠時珍曰田鼠偃行地中能壅土成坌故得諸名集解別録曰鼴鼠在土中行五月取令乾燔之弘景曰此即蚡鼠也一名隱鼠形如鼠大而無尾黑色尖鼻甚強常穿地中行討掘即得今山林中別有大如水牛者一名隱鼠藏器曰隱鼠陰穿地中而行見日月光則死於深山林木下土中有之其大如牛者名同物異耳頌曰處處田壟間多有之月令田鼠化為鴽者即此其形類鼠而肥多膏旱歲為田害宗奭曰鼴腳絶短但能行尾長寸許目極小項尤短最易取或安竹弓射取飼鷹陶引如水牛者釋之誤矣時珍曰許慎言蚡乃伯勞所化月令季春田鼠化為鴽夏小正八月鴽為鼠是二物交化如鷹鳩然也鴽乃鶉類隆慶辛未夏秋大水蘄黃瀕江之地蚡鼠遍野皆櫛魚所化蘆稼之根齧食殆盡則蚡之化不獨一種也肉氣味咸寒無毒主治燔之療癰疽諸瘻蝕惡瘡陰䘌爛瘡別録久食去風主瘡疥痔瘻藏器治風熱久積血脈不行結成癰疽食之可消又小兒食之殺蛔蟲蘇頌膏主治摩諸惡瘡藏器糞主治蛇虺螫傷腫痛研末豬脂調塗時珍壤土見土部隱鼠拾遺釋名鼴鼠音偃偃鼠綱目鼠母同鼳古役反爾雅集解弘景注鼴鼠曰諸山林中有獸大如水牛形似豬灰赤色下腳似象胸前尾上皆白有力而鈍亦名隱鼠人取食之肉亦似牛多以作脯乃云是鼠王其精溺一滴落地輒成一鼠災年則多出也藏器曰此是獸類非鼠之儔大如牛而前腳短皮入鞦轡用莊子所謂鼴鼠飲河不過滿腹者陶言是鼠王精滴成鼠遍訪山人無其說亦不能土中行此乃妄說陶誤信爾頌曰鼴鼠出滄州及胡中似牛而鼠首黑足大者千斤多伏於水又能堰水放沫彼人食其肉時珍曰按異物志云鼠母頭腳似鼠口鋭毛蒼大如水牛而畏狗見則主水災晉書云宣城郡出隱鼠大如牛形似鼠腳類象而驢蹄毛灰赤色胸前尾上白色有力而鈍金樓子云晉寧縣境出大鼠狀如牛土人謂之偃鼠時出山遊毛落田間悉成小鼠苗稼盡耗梁書云倭國有山鼠如牛又有大蛇能吞之據此則隱鼠非無而陶說有本諸家闢之太甚者未深考耳又爾雅云鼳身似鼠而馬蹄長鬚而賊一歲千斤秦人謂之小驢者即此物也膏主治痔瘻惡瘡陶弘景鼫鼠音石綱目釋名碩鼠與鼫同出周易䶂鼠音酌出廣雅雀鼠出埤雅𪕞鼠音俊出唐韻時珍曰碩大也似鼠而大也關西方音轉鼫為䶂訛䶂為雀蜀人謂之𪕞鼠取其毛作筆俊亦大也集解時珍曰鼫鼠處處有之居土穴樹孔中形大於鼠頭似兔尾有毛青黃色善鳴能人立交前兩足而舞好食粟豆與蚡鼠俱為田害蚡小居田而鼫大居山也范成大云賓州鼫鼠專食山豆根土人取其腹干之入藥名鼫鼠肚陸璣謂此亦有五技與螻蛄同名者誤矣肚氣味甘寒無毒主治咽喉痹痛一切熱氣研末含咽神效時珍出虞衡志竹䶉留柳二音綱目釋名竹㹠時珍曰䶉狀其肥㹠言其美也集解時珍曰竹䶉食竹根之鼠也出南方居土穴中大如兔人多食之味如鴨肉燕山録云煮羊以䶉煮鱉以蚊物性相感也肉氣味甘平無毒主治補中益氣解毒時珍土撥鼠拾遺釋名鼧鼥音駝撥答刺不花出正要時珍曰按唐書有鼧鼥鼠即此也鼧鼥言其肥也唐韻作𪖈𪔿音僕朴俗訛為土撥耳蒙古人名答刺不花集解藏器曰土撥鼠生西番山澤間穴土為窠形如獺夷人掘取食之魏略云大秦國出闢毒鼠近似此也時珍曰皮可為裘甚暖濕不能透肉氣味甘平無毒時珍曰按飲膳正要云雖肥而煮之無油味短多食難克化微動風主治野雞瘻瘡煮食肥美宜人藏器頭骨主治小兒夜臥不寧懸之枕邊即安時珍貂鼠綱目釋名栗鼠爾雅翼松狗時珍曰貂亦作鼦羅願云此鼠好食栗及松皮夷人呼為栗鼠松狗集解時珍曰按許慎說文云貂鼠屬大而黃黑色出丁零國今遼東高麗及女直韃靼諸胡皆有之其鼠大如獺而尾粗其毛深寸許紫黑色蔚而不耀用皮為裘帽風領寒月服之得風更暖著水不濡得雪即消拂面如焰拭眯即出亦奇物也惟近火則毛易脫漢制侍中冠金璫飾首前插貂尾加以附蟬取其內徑而外溫毛帶黃色者為黃貂白色者為銀貂肉氣味甘平無毒毛皮主治塵沙眯目以裘袖抆之即去時珍黃鼠綱目釋名禮鼠韓文拱鼠同上鼲鼠音渾貔貍時珍曰黃鼠晴暖則出坐穴口見人則交其前足拱而如揖乃竄入穴即詩所謂相鼠有體人而無禮韓文所謂禮鼠拱而立者也古文謂之鼲鼠遼人呼為貔貍或以貔貍為竹䶉貍獾者非胡人亦名令邦集解時珍曰黃鼠出太原大同延綏及沙漠諸地皆有之遼人尤為珍貴狀類大鼠黃色而足短善走極肥穴居有土窖如床榻之狀者則牝牡所居之處秋時畜豆粟草木之實以御冬各為小窖別而貯之村民以水灌穴而捕之味極肥美如豚子而脆皮可為裘領遼金元時以羊乳飼之用供上膳以為珍饌千里贈遺今亦不甚重之矣最畏鼠狼能入穴銜出也北胡又有青鼠皮亦可用銀鼠白色如銀古名𪕯鼠音吸抱朴子言南海白鼠重數斤毛可為布也百感録云西北有獸類黃鼠短喙無目性狡善聽聞人足音輒逃匿不可卒得土人呼為瞎撞亦黃鼠類也肉氣味甘平無毒正要云多食發瘡主治潤肺生津煎膏貼瘡腫解毒止痛時珍發明時珍曰黃鼠北方所食之物而方書無載按經驗良方有靈鼠膏云治諸瘡腫毒去痛退熱用大黃鼠一個清油一斤慢火煎焦水上試油不散乃濾滓澄清再煎次入炒紫黃丹五兩柳枝不住攪勻滴水成珠下黃蠟一兩熬黑乃成去火毒三日如常攤貼鼬鼠音佑綱目釋名黃鼠狼綱目鼪鼠音生去聲𪕷鼠音谷地猴時珍曰按廣雅鼠狼即鼬也江東呼為鼪其色黃赤如柚故名此物健於捕鼠及禽畜又能制蛇虺莊子所謂騏驥捕鼠不如貍鼪者即此集解時珍曰鼬處處有之狀似鼠而身長尾大黃色帶赤其氣極臊臭許慎所謂似貂而大色黃而赤者是也其毫與尾可作筆嚴冬用之不折世所謂鼠須栗尾者是也肉氣味甘臭溫有小毒主治煎油塗瘡疥殺蟲時珍心肝氣味臭微毒主治心腹痛殺蟲時珍附方新一心腹痛用黃鼠心肝肺一具陰乾瓦焙為末入乳香沒藥孩兒茶血竭末各三分每服一錢燒酒調下立止海上仙方鼷鼠拾遺釋名甘口鼠時珍曰鼷乃鼠之最小者齧人不痛故曰甘口今處處有之集解藏器曰鼷鼠極細卒不可見食人及牛馬等皮膚成瘡至死不覺爾雅云有螫毒左傳云食郊牛角者皆此物也博物志云食人死膚令人患惡瘡醫書云正月食鼠殘多為鼠瘻小孔下血者皆此病也治之之法以貍膏摩之及食貍肉為妙鼷無功用而為人害故著之食蛇鼠綱目集解時珍曰按唐書云罽賓國貢食蛇鼠喙尖尾赤能食蛇有被蛇螫者以鼠嗅而尿之即愈今雖不聞說此恐時有貢者存此以備考證尿主治蛇虺傷螫時珍蝟本經中品校正舊在蟲魚部今據爾雅移入獸部釋名彙古蝟字或作蝟毛刺爾雅蝟鼠時珍曰按說文彙字篆文象形頭足似鼠故有鼠名宗奭曰蝟皮治胃逆開胃氣有功其字從蟲從胃深有理焉集解別録曰蝟生楚山川穀田野取無時勿使中濕弘景曰處處野中時有此獸人犯之便藏頭足毛刺人不可得捉能跳入虎耳中而見鵲便自仰腹受啄物相制如此其脂煬鐵中入少水銀則柔如鉛錫蜀圖經曰蝟狀如貒豚大者如豚小者如瓜腳短多刺尾長寸余惟蒼白色腳似豬蹄者佳鼠腳者次之去肉取皮火干又有山枳鼠皮正相似但尾端有兩歧為別又有虎鼠皮亦相類但以味酸為別又有山豚頗相似而皮類兔皮其色褐味甚苦俱不堪用時珍曰蝟之頭嘴似鼠刺毛似豪豬蜷縮則形如芡房及栗房攢毛外刺尿之即開炙轂子云刺端分兩頭者為蝟如棘針者為䖶與蜀說不同廣韻云似蝟而赤尾者名暨居宗奭曰干蝟皮並刺作刷治紕帛絶佳世有養者去而復來正誤恭曰蝟極獰鈍大如豚小如瓜惡鵲聲故反腹受啄欲掩取之猶鷸蚌也虎耳不受雞卵且去地三尺蝟何能跳之而入野俗鄙言遂為雅記深可怪也宗奭曰唐本注擯陶理亦當然時珍曰按淮南子云蝟使虎申蛇令豹止又云鵲屎中蝟緯書云火爍金故鵲啄蝟觀此則陶說非妄也而蘇氏斥之寇氏和之非矣蜈蚣制龍蛇蜒蚰蛞蝓制蜈蚣豈在大小利鈍耶物畏其天耳蜀圖經所謂虎鼠即䶂鼠亦蝟中一種也孫愐云䶂鼠屬能飛食虎豹談藪云虎不敢入山林而居草薄者畏木上有𧽤鼠也鼠見虎過則咆噪拔毛投之虎必生蟲瘡潰爛至死䶂𧽤音相近耳蝟能制虎觀此益可徵矣今正其誤皮修治細銼炒黑入藥氣味苦平無毒甄權曰甘有小毒得酒良畏桔梗麥門冬主治五痔陰蝕下血赤白五色血汁不止陰腫痛引腰背酒煮殺之本經療腹痛疝積燒灰酒服別録治腸風瀉血痔病有頭多年不瘥炙末白飲服方寸匕燒灰吹鼻止衄血甚解一切藥力藥性附方舊五新八五痔下血衍義云用蝟皮合穿山甲等分燒存性入肉豆蔻一半末之空腹熱米飲服二錢妙外臺用蝟皮方三指大熏黃如棗大熟艾一錢穿地作坑調和取便熏之取口中有煙氣為佳火氣稍盡即停三日將息更熏之三度永瘥勿犯風冷羹臛將養切忌雞魚豬生冷二十日後補之腸痔有蟲蝟皮燒末生油和塗簡要濟衆腸風下血白刺蝟皮一枚銚內煿焦去皮留刺木賊半兩炒黑為末每服二錢熱酒調下楊氏家藏方蠱毒下血蝟皮燒末水服方寸匕當吐出毒千金翼五色痢疾蝟皮燒灰酒服二錢壽域方大腸脫肛蝟皮一斤燒磁石煅五錢桂心五錢為末每服二錢米飲下葉氏摘玄塞鼻止衄蝟皮一枚燒末每用半錢綿裹塞之數易之瘥聖惠方鼻中息肉蝟皮炙為末綿裹塞之三日千金眼睫倒刺蝟刺棗針白芷青黛等分為末隨左右目搐鼻中口含冷水瑞竹堂方反胃吐食蝟皮燒灰酒服或煮汁或五味淹炙食普濟小兒驚啼狀如物刺用蝟皮三寸燒末敷乳頭飲兒子母祕録猘犬咬傷蝟皮頭髮等分燒灰水服外臺方肉氣味甘平無毒藏器曰食之去骨誤食令人瘦劣諸節漸小也主治反胃炙黃食之亦煮汁飲又主瘻藏器炙食肥下焦理胃氣令人能食孟詵脂氣味同肉詵曰可煮五金八石伏雄黃柔鐵主治腸風瀉血日華溶滴耳中治聾藏器塗禿瘡疥癬殺蟲時珍附方新一虎爪傷人刺蝟脂日日敷之內服香油腦主治狼瘻時珍心肝主治蟻瘻蜂瘻瘰癧惡瘡燒灰酒服一錢時珍膽主治點目止淚化水塗痔瘡時珍治鷹食病寇宗奭附方新一痘後風眼發則兩瞼紅爛眵淚用刺蝟膽汁用簪點入癢不可當二三次即愈尤勝烏鴉膽也董炳集驗方獸之四寓類怪類共八種獼猴證類釋名沐猴史記為猴說文胡孫格古論王孫柳文馬留倦遊録狙時珍曰按班固白虎通云猴候也見人設食伏機則憑高四望善於候者也猴好拭面如沐故謂之沐而後人訛沐為母又訛母為獼愈訛愈失矣說文云為字象母猴之形即沐猴也非牝也猴形似胡人故曰胡孫莊子謂之狙養馬者廄中畜之能闢馬病胡俗稱馬留云梵書謂之摩斯吒集解慎微曰獼猴有數種總名禺屬取色黃面赤尾長者用人家養者不主病為其食雜物違本性也按抱朴子云猴八百歲變為猿猿五百歲變為玃玃千歲變為蟾蜍時珍曰猴處處深山有之狀似人眼如愁胡而頰陷有嗛嗛音歉藏食處也腹無脾以行消食尻無毛而尾短手足如人亦能豎行聲嗝嗝若咳孕五月而生子生子多浴於澗其性躁動害物畜之者使坐杙上鞭掊旬月乃馴也其類有數種小而尾短者猴也似猴而多髯者豦也似猴而大者玃也大而尾長赤目者禺也小而尾長仰鼻者狖也似狖而大者果然也似狖而小者蒙頌也似狖而善躍越者獑𪕱也似猴而長臂者猿也似猿而金尾者狨也似猿而大能食猿猴者獨也不主病者並各以類附之附録玃音卻時珍曰玃老猴也生蜀西徼外山中似猴而大色蒼黑能人行善攫持人物又善顧盼故謂之玃純牡無牝故又名玃父亦曰猳玃善攝人婦女為偶生子又神異經云西方有獸名𧳜大如驢狀如猴善緣木純牝無牡群居要路執男子合之而孕此亦玃類而牝牡相反者豦音據按郭璞云建平山中有之大如狗狀如猴黃黑色多髯鬣好奮頭舉石擲人西山經云崇吾之山有獸焉狀如禺而長臂善投名曰舉父即此也肉氣味酸平無毒主治諸風勞釀酒彌佳作脯食治久瘧慎微食之闢瘴疫時珍發明時珍曰異物志言南方以獼猴頭為鮓臨海志言粵民喜啖猴頭羹又巴徼人捕猴鹽藏火熏食云甚美頭骨主治瘴瘧作湯浴小兒驚癇鬼魅寒熱慎微附方舊一鬼瘧進退不定用胡孫頭骨一枚燒研空心溫酒服一錢臨發再服聖惠方手主治小兒驚癇口噤慎微屎主治塗蜘蛛咬慎微小兒臍風撮口及急驚風燒末和生蜜少許灌之時珍出心鑑及衛生方皮慎微曰治馬疫氣時珍曰馬經言馬廄畜母猴闢馬瘟疫逐月有天癸流草上馬食之永無疾病矣狨戎松二音拾遺釋名猱難逃切時珍曰狨毛柔長如絨可以藉可以緝故謂之狨而猱字亦從柔也或云生於西戎故從戎也猱古文作蘷象形今呼長毛狗為猱取此象集解藏器曰狨生山南山谷中似猴而大毛長黃赤色人將其皮作鞍褥時珍曰楊億談苑云狨出川峽深山中其狀大小類猿長尾作金色俗名金線狨輕捷善緣木甚愛其尾人以藥矢射之中毒即自齧其尾也宋時文武三品以上許用狨座以其皮為褥也附録猿時珍曰猿善援引故謂之猿俗作猿産川廣深山中似猴而長大其臂甚長能引氣故多壽或言其通臂者誤矣臂骨作笛甚清亮其色有青白玄黃緋數種其性靜而仁慈好食果實其居多在林木能越數丈著地即泄瀉死惟附子汁飲之可免其行多群其雄善啼一鳴三聲悽切入人肝脾範氏桂海志云猿有三種金絲者黃色玉面者黑色及身面俱黑者或云純黑是牡金絲是牝牡能嘯牝不能也王濟日詢記云廣人言猿初生毛黑而雄老則變黃潰去勢囊轉雄為雌與黑者交而孕數百歲黃又變白也時珍按此說與列子貐變化為猿莊子獱狙以猿為雌之言相合必不妄也獨時珍曰獨似猿而大其性獨一鳴即止能食猿猴故諺曰獨一鳴而猿散獨夫蓋取諸此或云即黃腰也又見虎下肉及血氣味缺主治食之調五痔病久坐其皮亦良藏器脂主治瘡疥塗之妙同上果然拾遺釋名禺音遇狖音又或作貁𪕏蜼狖壘二音或作𤢹仙猴時珍曰郭璞云果然自呼其名羅願云人捕其一則舉群啼而相赴雖殺之不去也謂之果然以來之可必也大者為然為禺小者為狖為蜼南人名仙猴俗作猓𤡮集解藏器曰案南州異物志云交州有果然獸其名自呼狀大於猿其體不過三尺而尾長過頭鼻孔向天雨則掛木上以尾塞鼻孔其毛長柔細滑白質黑文如蒼鴨脅邊斑毛之狀集之為裘褥甚溫暖爾雅蜼仰鼻而長尾即此也時珍曰果然仁獸也出西南諸山中居樹上狀如猿白麵黑頰多髯而毛採斑斕尾長於身其末有歧雨則以歧塞鼻也喜群行老者前少者後食相讓居相愛生相聚死相赴柳子所謂仁讓孝慈者是也古者畫蜼為宗彝亦取其孝讓而有智也或云猶豫之猶即狖也其性多疑見人則登樹上下不一甚至奔觸破頭折脛故人以比心疑不決者而俗呼騃愚為癡𤢹也肉氣味咸平無毒主治瘧瘴寒熱同五味煮臛食之並坐其皮取效藏器發明時珍曰案鍾育果然賦云似猴象猿黑頰青身肉非佳品惟皮可珍而呂氏春秋云肉之美者玃猱之炙亦性各有不同耶附録蒙頌時珍曰蒙頌一名蒙貴乃蜼之又小者也紫黑色出交趾畜以捕鼠勝於貓貍獑猢音慚胡許氏說文作鼠斬𪕱乃猿蜼之屬黑身白腰如帶手有長毛白色似握版之狀蜀地志云獑猢似猴而甚捷常在樹上歘然騰躍如飛鳥也猩猩本作狌音生綱目釋名時珍曰猩猩能言而知來猶惺惺也集解時珍曰猩猩自爾雅逸周書以下數十說今參集之云出哀牢夷及交趾封溪縣山谷中狀如狗及獼猴黃毛如猿白耳如豕人面人足長髮頭顏端正聲如兒啼亦如犬吠成群伏行阮汧云封溪俚人以酒及草屐置道側猩猩見即呼人祖先姓名罵之而去頃復相與嘗酒著屐因而被擒檻而養之將烹則推其肥者泣而遣之西胡取其血染毛罽不黯刺血必箠而問其數至一斗乃已又按禮記亦云猩猩能言而郭義恭廣志云猩猩不能言山海經云猩猩能知人言三說不同大抵猩猩略似人形如猿猴類耳縱使能言當若鸚鵡之屬亦不必盡如阮氏所說也又羅願爾雅翼云古之說猩猩者如豕如狗如猴今之說猩猩者與狒狒不相遠云如婦人被髮袒足無膝群行遇人則手掩其形謂之野人據羅說則似乎後世所謂野女野婆者也豈即一物耶附録野女唐蒙博物志云日南出野女群行不見夫其狀皛且白裸袒無衣襦周密齊東野語云野婆出南丹州黃髮椎髻裸形跣足儼然若一媼也群雌無牡上下山谷如飛猱自腰以下有皮蓋膝每遇男子必負去求合嘗為健夫所殺至死以手護腰間剖之得印方寸瑩若蒼玉有文類符篆也時珍曰合此二說與前阮氏羅氏之說觀之則野女似即猩猩矣又雄鼠卵有文如符篆治鳥腋下有鏡印則野婆之印篆非異也亦當有功用但人未知耳肉氣味甘咸溫無毒主治食之不昧不飢令人善走窮年無厭可以辟穀時珍出逸書山海經水經發明時珍曰逸書言猩猩肉食之令人不昧其惺惺可知矣古人以為珍味故荀子言猩猩能言笑二足無毛而人啜其羹食其肉呂氏春秋云肉之美者猩猩之唇獾獾之炙是矣狒狒音費拾遺釋名𥝋𥝋與狒同亦作𥝃梟羊山海經野人方輿志人熊時珍曰爾雅作狒說文作𥝋從臼臼從囟從內象形許慎云北人呼為土螻今人呼為人熊按郭璞謂山都即狒狒稍似差別抑名同物異歟集解藏器曰狒狒出西南夷爾雅云狒狒如人被髮迅走食人山海經云梟羊人面長唇黑身有毛反踵見人則笑笑則上唇掩目郭璞云交廣及南康郡山中亦有此物大者長丈餘俗呼為山都宋孝建中獠人進雌雄二頭帝問土人丁鑾鑾曰其面似人紅赤色毛似獼猴有尾能人言如鳥聲善知生死力負千鈞反踵無膝睡則倚物獲人則先笑而後食之獵人因以竹筒貫臂誘之俟其笑時抽手以錐釘其唇著額任其奔馳候死而取之發極長可為頭髲血堪染靴及緋飲之使人見鬼也帝乃命工圖之時珍曰按方輿志云狒狒西蜀及處州山中亦有之呼為人熊人亦食其掌剝其皮閩中沙縣幼山有之長丈餘逢人則笑呼為山大人或曰野人及山魈也又鄧德明南康記云山都形如崑崙人通身生毛見人輒閉目開口如笑好在深澗中翻石覓蟹食之珍按鄧氏所說與北山經之山𤟤述異記之山都永嘉記之山鬼神異經之山𤢖玄中記之山精海録碎事之山丈文字指歸之旱魃搜神記之治鳥俱相類乃山怪也今並附之以備考證附録山都時珍曰任昉述異記云南康有神曰山都形如人長二尺余黑色赤目黃髮深山樹中作窠狀如鳥卵高三尺余內甚光彩體質輕虛以鳥毛為褥二枚相連上雄下雌能變化隱形罕睹其狀若木客山𤢖之類也山𤟤時珍曰北山經云山𤟤狀如犬而人面善投見人則笑其行如風見則天下大風木客又曰南康記云生南方山中頭面語言不全異人但手腳爪如鉤利居絶巖間死亦殯殮能與人交易而不見其形也今南方有鬼市亦類此又有木客鳥見禽部山𤢖又曰東方朔神異經云西方深山有人長尺余袒身捕蝦蟹就人火炙食之名曰山𤢖其名自呼人犯之則發寒熱蓋鬼魅耳所在亦有之惟畏爆竹煏爆聲劉義慶幽明録云東昌縣山岩間有物如人長四五尺裸身被髮髮長五六寸能作呼嘯聲不見其形每從澗中發石取蝦蟹就火炙食永嘉記云安國縣有山鬼形如人而一腳僅長一尺許好盜伐木人鹽炙石蟹食人不敢犯之能令人病及焚居也玄中記云山精如人一足長三四尺食山蟹夜出晝伏千歲蟾蜍能食之抱朴子云山精形如小兒獨足向後夜喜犯人其名曰鬾呼其名則不能犯人白澤圖云山之精狀如鼓色赤一足而行名曰夔呼之可使取虎豹海録雜事云嶺南有物一足反踵手足皆三指雄曰山丈雌曰山姑能夜叩人門求物也神異經云南方有魃一名旱母長二三尺裸形目在頂上行走如風見則大旱遇者得之投溷中則旱除文字指歸云旱魃山鬼也所居之處天不雨女魃入人家能竊物以出男魃入人家能竊物以歸時珍謹按諸說雖少有參差大抵俱是怪類今俗所謂獨腳鬼者是也邇來處處有之能隱形入人家淫亂致人成疾放火竊物大為家害法術不能驅醫藥不能治呼為五通七郎諸神而祀之蓋未知其原如此故備載之非但博聞而已其曰呼其名則無害千歲蟾蜍能食之者非治法歟引申觸類必有能制之者又有治鳥亦此類見禽部精怪之屬甚夥皆為人害惟白澤圖玄中記抱朴子酉陽雜俎諸書載之頗悉起居者亦不可不知然正人君子則德可勝妖自不敢近也肉氣味無毒主治作脯連脂薄割炙熱貼人癬疥能引蟲出頻易取瘥藏器罔兩綱目集解時珍曰罔兩一作魍魎又作方良周禮方相氏執戈入壙以驅方良是矣罔兩好食亡者肝故驅之其性畏虎柏故墓上樹石虎植柏國語云木石之怪夔罔兩水石之怪龍罔象即此述異記云秦時陳倉人獵得獸若彘若羊逢二童子曰此名弗述又名蝹在地下食死人腦但以柏插其首則死此即罔兩也雖於藥石無與而於死人有關故録之其方相有四目若二目者為魌皆鬼物也古人設人像之昔費長房識李娥藥丸用方相腦則其物亦入辟邪方藥而法失傳矣彭侯綱目集解時珍曰按白澤圖云木之精名曰彭侯狀如黑狗無尾可烹食千歲之木有精曰賈朏狀如豚食之味如狗搜神記云吳時敬叔伐大樟樹血出中有物人面狗身敬叔云此名彭侯乃烹而食之味如狗也肉氣味甘酸溫無毒主治食之辟邪令人志壯白澤封綱目集解時珍曰按江鄰幾雜志云徐積於廬州河次得一小兒手無指無血懼而埋之此白澤圖所謂封食之多力者也田汝成西湖志云董表儀撤屋掘土得一肉塊術士云太歲也棄之亦無害又山海經務隅之山及開明南北東南海外並有視肉郭璞注云聚肉形如牛肝有兩目食之無盡尋復更生如舊也此皆封類可食者但人不知耳又海中一種土肉正黑長五寸大如小兒臂有腹無口目有三十足可炙食此又蟲魚之屬類乎封者也
