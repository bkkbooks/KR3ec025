body:
  text: 人部第五十二卷李時珍曰神農本草人物惟發髲一種所以別人於物也後世方伎之士至於骨肉膽血咸稱為藥甚哉不仁也今於此部凡經人用者皆不可遺惟無害於義者則詳述之其慘忍邪穢者則略之仍闢斷於各條之下通計三十七種不復分類舊本二十五種今移五種入服器部自玉石部移入一種神農本草經一種梁陶弘景注名醫別録五種梁陶弘景注唐本草一種唐蘇恭本草拾遺八種唐陳藏器日華本草二種宋人大明開寶本草一種宋馬志嘉祐本草四種宋掌禹錫證類本草一種宋唐慎微本草蒙筌一種明陳嘉謨本草綱目一十三種明李時珍附注魏吳普本草李當之藥録宋雷斆炮炙齊徐之才藥對孫思邈千金甄權藥性唐孟詵食療蜀韓保升重注宋寇宗奭衍義元李杲法象王好古湯液朱震亨補遺明汪機會編人之一凡三十七種附二條發髲音被本經釋名𩮀音總甄立言髲髢音剃亦作鬄李當之曰發髲是童男發弘景曰不知發髲審是何物髲字書記所無或作蒜音今人呼斑發為蒜髮書家亦呼亂髮為鬈恐即鬈也童男之理或未全明恭曰此發髲根也年久者用之神效字書無髲字即發字誤矣既有亂髮則發髲去病用陳久者如船茹敗天公蒲席皆此例也甄立言本草作𩮀𩮀亦發也鬈乃發美貌有聲無質陶説非矣宗奭曰發髲亂髮自是兩等發髲味苦即陳舊經年歲者如橘皮半夏取陳者入藥更良之義今人謂之頭髲其亂髮條中自無用髲之義二義甚明不必過搜索也時珍曰發髲乃剪髢下發也亂髮乃梳櫛下發也按許慎説文云大人曰髡小兒曰剃顧野王玉篇云髲鬄也鬄發髲也二説甚明古者刑人鬄發婦人以之被髻故謂之發髲周禮云王后夫人之服有以發髢為首飾者是矣又詩云鬒髮如雲不屑髢也甄權所謂發𩮀雷斆所謂二十男子頂心剪下發者得之矣李當之以為童男發陶弘景以為鬈髮蘇恭以為髮根宗奭以為陳發者並誤矣且顧野王在蘇恭之前恭不知玉篇有髲字亦欠考矣毛萇詩傳云被之僮僮被首飾也編髮為之即此髲也修治斆曰發髲是男子年二十以來無疾患顏貌紅白於頂心剪下者入丸藥膏中用先以苦參水浸一宿漉出入瓶子以火煅赤放冷研用時珍曰今人以皂莢水洗淨曬乾入罐固濟煅存性用亦良氣味苦溫無毒別録小寒主治五癃關格不通利小便水道療小兒癇大人痓仍自還神化本經合雞子黃煎之消為水療小兒驚熱百病別録止血悶血暈金瘡傷風血痢入藥燒存性用煎膏長肉消瘀血大明發明韓保升曰本經云自還神化李當之云神化之事未見別方按異苑云人發變為鱔魚神化之異應此者也又藏器曰生人發挂果樹上烏鳥不敢來食其實又人逃走取其發於緯車上卻轉之則迷亂不知所適此皆神化時珍曰發者血之餘埋之土中千年不朽煎之至枯復有液出誤食入腹變為症蟲煅治服餌令發不白此正神化之應驗也附方舊三新三石淋痛澀發髲燒存性研末每服用一錢井水服之肘後方傷寒黃病發髲燒研水服一寸匕日三傷寒類要胎衣不下亂髮頭髲結撩喉口中孫真人方小兒客忤因見生人所致取來人囟上發十莖斷兒衣帶少許合燒研末和乳飲兒即愈千金方急肚疼病用本人頭髮三十根燒過酒服即以水調芥子末封在臍內大汗如雨即安談野翁方瘭癌惡瘡生髮灰米湯服二錢外以生髮灰三分皂莢刺灰二分白芨一分為末乾摻或以豬膽汁調直指方亂髮別録釋名血餘綱目人退時珍曰頭上曰發屬足少陰陽明耳前曰鬢屬手足少陽目上曰眉屬手足陽明唇上曰髭屬手陽明頦下曰須屬足少陰陽明兩頰曰髯屬足少陽其經氣血盛則美而長氣多血少則美而短氣少血多則少而惡氣血俱少則其處不生氣血俱熱則黃而赤氣血俱衰則白而落素問云腎之華在發王冰注云腎主髓腦者髓之海發者腦之華腦減則發素滑壽注云水出高原故腎華在發發者血之餘血者水之類也今方家呼發為血餘蓋本此義也龍木論謂之人退焉葉世傑草木子云精之榮以須氣之榮以眉血之榮以發類苑云發屬心稟火氣而上生須屬腎稟水氣而下生眉屬肝稟木氣而側生故男子腎氣外行而有須女子宦人則無須而眉發不異也説雖不同亦各有理終不若分經者為的劉君安云欲發不落梳頭滿千遍又云發宜多梳齒宜數叩皆攝精益腦之理爾又昆齋吳玉有白髮辨言發之白雖有遲早老少皆不繫壽之修短由祖傳及隨事感應而已援引古今為證亦自有理文多不録氣味苦微溫無毒主治咳嗽五淋大小便不通小兒驚癇止血鼻衄燒灰吹之立已別録燒灰療轉胞小便不通赤白痢哽噎癰腫狐尿刺尸疰疔腫骨疽雜瘡蘇恭消瘀血補陰甚捷震亨發明時珍曰發乃血餘故能治血病補陰療驚癇去心竅之血劉君安以己發合頭垢等分燒存性每服豆許三丸名曰還精丹令頭不白又老唐方亦用自己亂髮洗淨每一兩入川椒五十粒泥固入瓶煅黑研末每空心酒服一錢令髭髮長黑此皆補陰之驗也用椒者取其下達爾弘景曰俗中嫗母為小兒作雞子煎用其父梳頭亂髮雜雞子黃熬良久得汁與兒服去痰熱療百病附方舊十六新二十五孩子熱瘡亂髮一團如梨子大雞子黃十個煮熟同於銚子內熬至甚干始有液出旋置盞中液盡為度用敷瘡上即以苦參粉粉之神妙詳見雞子黃下劉禹錫傳信方小兒斑疹發灰飲服三錢子母祕録小兒斷臍即用清油調發灰敷之不可傷水臍濕不幹亦敷之小兒重舌欲死者以亂髮灰半錢調敷舌下不住用之簡要濟衆小兒燕口兩角生瘡燒亂髮和豬脂塗之子母祕録小兒吻瘡發灰和豬脂塗之聖惠方小兒驚啼亂髮燒研乳汁或酒服少許良千金鼻血眩冒欲死者亂髮燒研水服方寸匕仍吹之梅師方鼻血不止血餘燒灰吹之立止永不發男用母發女用父發聖惠用亂髮灰一錢人中白五分麝香少許為末搐鼻名三奇散肺疽吐血發灰一錢米醋二合白湯一盞調服三因方咳嗽有血小兒胎髮灰入麝香少許酒下每個作一服男用女女用男朱氏集驗齒縫出血頭髮切入銚內炒存性研摻之華他中藏經肌膚出血胎髮燒灰敷之即止或吹入鼻中證治要訣諸竅出血頭髮敗棕陳蓮蓬並燒灰等分每服三錢木香湯下仁齋直指上下諸血或吐血或心衄或內崩或舌上出血如簪孔或鼻衄或小便出血並用亂髮灰水服方寸匕一日三服聖濟無故遺血亂髮及爪甲燒灰酒服方寸匕千金方小便尿血發灰二錢醋湯服永類方血淋苦痛亂髮燒存性二錢入麝少許米飲服危氏方大便瀉血血餘半兩燒灰雞冠花根柏葉各一兩為末臥時酒服二錢來早以溫酒一盞投之一服見效普濟胎産便血發灰每飲服二錢咱殷産寶女人漏血亂髮洗淨燒研空心溫酒服一錢婦人良方月水不通童男童女發各三兩燒灰斑蝥二十一枚糯米炒黃麝香一錢為末每服一錢食前熱生薑酒下聖惠方婦人陰吹胃氣下泄陰吹而正喧此穀氣之實也宜豬膏發煎導之用豬膏半斤亂髮雞子大三枚和煎發消藥成矣分再服病從小便中出也張仲景方女勞黃疸因大熱大勞交接後入水所致身目俱黃發熱惡寒小腹滿急小便難用膏發煎治之即上方肘後方黃疸尿赤亂髮灰水服一錢日三次祕方也肘後大小便閉亂髮灰三指撮投半升水服姚氏乾霍亂病脹滿煩躁亂髮一團燒灰鹽湯二升和服取吐十便良方尸疰中惡子母祕録用亂髮如雞子大燒研水服一方用亂髮灰半兩杏仁半兩去皮尖研煉蜜丸梧桐子大每溫酒日下二三十丸破傷中風亂髮如雞子大無油器中熬焦黑研以好酒一盞沃之入何首烏末二錢灌之少頃再灌本草衍義沐發中風方同上令髮長黑亂髮洗曬油煎焦枯研末擦發良聖惠擦落耳鼻頭髮瓶盛泥固煅過研末以擦落耳鼻乘熱蘸發灰綴定軟帛縛住勿令動自生合也經驗良方耳猝腫痛亂髮裹杏仁末塞之聖惠方吞發在咽取自己亂髮燒灰水服一錢延齡至寶方蜈蚣螫咬頭髮燒煙燻之疔腫惡瘡亂髮鼠屎等分燒灰針入瘡內大良聖惠方瘡口不合亂髮露蜂房蛇蛻皮各燒存性一錢用溫酒食前調服神妙蘇沈良方下疳濕瘡發灰一錢棗核七個燒研洗貼心鏡大風癘瘡用新竹筒十個內裝黑豆一層頭髮一層至滿以稻粳火盆內煨之候汁滴出以盞接承翎掃瘡上數日即愈亦治諸瘡邵真人經驗方頭垢別録釋名梳上者名百齒霜弘景曰術云頭垢浮針以肥膩故耳今當用悅澤人者其垢可丸也氣味咸苦溫有毒主治淋閉不通別録療噎疾酸漿煎膏用之立愈又治勞復弘景中蠱毒菌毒米飲或酒化下並取吐為度大明附方舊八新十六天行勞復含頭垢棗核大一枚良類要預防勞復傷寒初愈欲令不勞復者頭垢燒研水丸梧桐子大飲服一丸外臺祕要頭身俱痛煩悶者頭垢豆許水服囊盛蒸豆尉之肘後小兒霍亂梳垢水服少許小兒哭疰方同上百邪鬼魅方同上並千金婦人吹乳百齒霜以無根水丸梧桐子大每服三丸食後屋上倒流水下隨左右暖臥取汗甚效或以胡椒七粒同百齒霜和丸熱酒下得汗立愈衛生寶鑑婦人乳癤酒下梳垢五丸即退消婦人足瘡經年不愈名裙風瘡用男子頭垢桐油調作隔紙膏貼之並簡便臁脛生瘡頭垢枯礬研勻豬膽調敷壽域方下疳濕瘡蠶繭盛頭垢再以一繭合定煅紅出火毒研搽楊氏小兒緊唇頭垢塗之肘後方菜毒脯毒凡野菜諸脯肉馬肝馬肉毒以頭垢棗核大含之咽汁能起死人或白湯下亦可千金方自死肉毒故頭巾中垢一錢熱水服取吐猘犬毒人頭垢蝟皮等分燒灰水服一杯口噤者灌之犬咬人瘡重發者以頭垢少許納瘡中用熱牛屎封之諸蛇毒人梳垢一團尿和敷上仍炙梳出汗尉之並千金方蜈蚣螫人頭垢苦參末酒調敷之篋中蜂蠆螫人頭垢封之蟲蟻螫人同上並集簡竹木刺肉不出頭垢塗之即出劉涓子飛絲入目頭上白屑少許揩之即出物類相感志赤目腫痛頭垢一芥子納入取淚摘玄方噫吐酸漿漿水煎頭垢豆許服一杯效普濟方耳塞日華釋名耳垢綱目腦膏日華泥丸脂時珍曰修真指南云腎氣從脾右畔上入於耳化為耳塞耳者腎之竅也腎氣通則無塞塞則氣不通故謂之塞氣味咸苦溫有毒主治癲狂鬼神及嗜酒大明蛇蟲蜈蚣螫者塗之良時珍附方新六蛇蟲螫傷人耳垢蚯蚓屎和塗出盡黃水立愈壽域方破傷中風用病人耳中膜並刮爪甲上末唾調塗瘡口立效儒門事親方抓瘡傷水腫痛難忍者以耳垢封之一夕水盡出而愈鄭師甫云余常病此一丐傳此方醫説疔疽惡瘡生人腦即耳塞也鹽泥等分研勻以蒲公英汁和作小餅封之大有效聖惠一切目疾耳塞曬乾每以粟許夜夜點之聖惠方小兒夜啼驚熱用人耳塞五分石蓮心人參各五錢乳香二分燈花一字丹砂一分為末每薄荷湯下五分普濟膝頭垢綱目主治緊唇瘡以綿裹燒研敷之外臺爪甲綱目釋名筋退時珍曰爪甲者筋之餘膽之外候也靈樞經云肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪軟色赤者膽緩爪直色白無紋者膽直爪惡色黑多紋者膽結氣味甘咸平無毒主治鼻衄細刮搐之立愈獨不可備則衆人甲亦可宗奭催生下胞衣利小便治尿血及陰陽易病破傷中風去目翳時珍懷妊婦人爪甲取末點目去翳障藏器附方舊二新十八斬三尸法太上玄科云常以庚辰日去手爪甲午日去足爪每年七月十六日將爪甲燒灰和水服之三尸九蟲皆滅名曰斬三尸一云甲寅日三尸遊兩手剪去手爪甲甲午日三尸遊兩足剪去足爪甲消除腳氣每寅日割手足甲少侵肉去腳氣外臺祕要破傷中風手足十指甲香油炒研熱酒調呷服之汗出便好普濟治破傷風手足顫掉搐搖不已用人手足指甲燒存性六錢薑製南星獨活丹砂各二錢為末分作二服酒下立效陰陽易病用手足爪甲二十片中衣襠一片燒灰分三服溫酒下男用女女用男小兒腹脹父母指爪甲燒灰敷乳上飲之千金小便轉胞自取爪甲燒灰水服男女淋疾同上並肘後小便尿血人指甲半錢頭髮二錢半燒研末每服一錢空心溫酒下聖濟録妊娠尿血取夫爪甲燒灰酒服千金方胞衣不下取本婦手足爪甲燒灰酒服即令有力婦人抱起將竹筒於胸前趕下聖惠諸痔腫痛蠶繭內入男子指甲令滿外用童子頂發纏裹燒存性研末蜜調敷之仍日日吞牛膽制過槐子甚效萬表積善堂方針刺入肉凡針折入肉及竹木刺者刮人指甲末同酸棗仁搗爛唾調塗之次日定出普濟方飛絲入目刮爪甲末箸頭同津液點之其絲自聚拔出也危氏得效方物入目中左手爪甲刀刮屑末燈草蘸點翳上三次即出也癍痘生翳一切目疾並以木賊擦取爪甲末同硃砂末等分研勻以露水搜丸芥子大每以一粒點入目內聖惠目生花翳刀刮爪甲細末和乳點之集簡方目生珠管手爪甲燒灰貝齒燒灰龍骨各半兩為末每用少許點珠管上日點三四次聖惠方積年瀉血百藥不效用人指甲炒焦麝香各二錢半乾薑炮三兩白礬枯過敗皮巾燒灰各一兩為末每粥飲一錢日二服聖濟總録鼻出衄血刀刮指甲細末吹之即止試驗簡便方牙齒日華釋名時珍曰兩旁曰牙當中曰齒腎主骨齒者骨之餘也女子七月齒生七歲齒齔三七腎氣平而真牙生七七腎氣衰齒稿發素男子八月齒生八歲齒齠三八腎氣平而真牙生五八腎氣衰齒稿發墮錢乙云小兒變蒸蛻齒如花之易苗不及三十二齒者由蒸之不及其數也氣味甘咸熱有毒主治除勞治瘧蠱毒氣入藥燒用大明治乳癰未潰痘瘡倒黶時珍發明時珍曰近世用人牙治痘瘡陷伏稱為神品然一概用之貽害不淺夫齒者腎之標骨之餘也痘瘡則毒自腎出方長之際外為風寒穢氣所冒腠理閉塞血澀不行毒不能出或變黑倒黶宜用此物以酒麝達之竄入腎經發出毒氣使熱令復行而瘡自紅活蓋劫劑也若伏毒在心昏冒不省人事及氣虛色白癢塌不能作膿熱痱紫泡之證只宜解毒補虛苟誤用此則鬱悶聲啞反成不救可不慎哉高武痘疹管見云左仲恕言變黑歸腎者宜用人牙散夫既歸腎矣人牙豈能復治之乎附方舊一新七痘瘡倒黶錢氏小兒方用人牙燒存性入麝香少許溫酒服半錢聞人規痘疹論云人牙散治痘瘡方出風寒外襲或變黑或青紫此倒黶也宜溫肌發散使熱氣復行而斑自出用人齒脫落者不拘多少瓦罐固濟煅過出火毒研末出不快而黑陷者獖豬血調下一錢因服涼藥血澀倒陷者入麝香溫酒服之其效如神無價散用人牙貓牙豬牙犬牙等分火煅研末蜜水調服一字乳癰未潰人牙齒燒研酥調貼之肘後方五般聤耳出膿血水人牙燒存性麝香少許為末吹之名佛牙散普濟方漏瘡惡瘡乾水生肌用人牙灰油發灰雄雞內金灰各等分為末入麝香輕粉少許油調敷之直指方陰疽不發頭凹沉黯不疼無熱服內補散不起必用人牙煅過穿山甲炙各一分為末分作兩服用當歸麻黃煎酒下外以薑汁和麵敷之又方川烏頭硫黃人牙煅過為末酒服亦妙楊仁齋直指方人屎別録附人中黃釋名人糞別録大便時珍曰屎糞乃糟粕所化故字從米會意也氣味苦寒無毒主治時行大熱狂走解諸毒搗末沸湯沃服之別録傷寒熱毒水漬飲之彌善新者封疔腫一日根爛蘇頌骨蒸勞復癰腫發背瘡漏痘瘡不起時珍糞清釋名黃龍湯弘景還元水菽園記人中黃弘景曰近城市人以空罌塞口納糞中積年得汁甚黑而苦名為黃龍湯療瘟病垂死者皆瘥大明曰臘月截淡竹去青皮浸滲取汁治天行熱疾中毒名糞清浸皂莢甘蔗治天行熱疾名人中黃震亨曰人中黃以竹筒入甘草末於內竹木塞兩頭冬月浸糞缸中立春取出懸風處陰乾破竹取草曬乾用汪機曰用棕皮綿紙上鋪黃土澆糞汁淋土上濾取清汁入新甕內碗覆定埋土中一年取出清若泉水全無穢氣年久者彌佳比竹筒滲法更妙主治天行熱狂熱疾中毒菌毒惡瘡大明熱毒濕毒大解五臟實熱飯和作丸清痰消食積降陰火震亨附方舊十三新二十勞復食復人屎燒灰酒服方寸匕千金方熱病發狂奔走似癲如見鬼神久不得汗及不知人事者以人中黃入大罐內以泥固濟煅半日去火毒研末新汲水服三錢未退再服斗門方大熱狂渴干陳人屎為末於陰地淨黃土中作五六寸小坑將末三兩匙於坑中以新汲水調勻良久澄清細細與飲即解世俗謂之地清寇宗奭衍義勞極骨蒸亦名伏連傳尸此方甚驗用人屎濕者五升小便一升新粟米飯五升六月六日曲半餅以瓷瓶盛封密室中二七日並消亦無惡氣每旦服一合午再服之神效張文仲備急方骨蒸熱勞取人屎乾者燒令外黑納水中澄清每旦服一小升薄晚服童便一小升以瘥為度既常服可就作坑燒屎二升夜以水三升漬之稍稍減服此方神妙非其人莫浪傳之外臺祕要嘔血吐痰心煩骨蒸者人中黃為末每服三錢茜根汁竹瀝薑汁和勻服之丹溪心法鼻衄不止人屎尖燒灰水服一二錢並吹鼻中千金方噎膈反胃諸藥不效真阿魏一錢野外幹人屎三錢為末五更以薑片蘸食能起死人乃趙玉淵方也永類鈐方噎食不下人屎入蘿蔔內火煉三炷香取研每服三分黃酒下三服效海上名方痘瘡不起儒門事親治痘瘡倒黶及灰白下陷用童子糞乾者新瓦煅過每一兩入龍腦一分研勻每服半錢至一錢蜜水調下四靈無價散治痘瘡黑陷腹脹危篤者此為劫劑用人糞貓糞豬糞犬糞等分臘月初旬收埋高燥黃土窖內至臘八日取出砂罐盛之鹽泥固濟炭火煅令煙盡為度取出為末入麝香少許研勻瓷器密封收之一歲一字二歲半錢三歲一錢蜜水調下須臾瘡起此乃以毒攻毒用火化者從治之義也發背欲死燒屎灰醋和敷之干即易肘後方一切癰腫未潰用幹人屎末麝香各半錢研勻以豆大津調貼頭外以醋面作錢護之膿潰去藥宗奭衍義疔腫初起刮破以熱屎尖敷之干即易不過十五遍即根出立瘥千金五色丹毒黃龍湯飲二合並塗之良千金方九漏有蟲幹人屎干牛屎隔綿貼之蟲聞其氣即出若癢則易之蟲盡乃止千金疳蝕口鼻唇頰穿者綿裹人屎貼之必有蟲出十便良方小兒唇緊人屎灰敷之崔知悌方小兒陰瘡人屎灰敷之外臺祕要産後陰脫人屎炒赤為末酒服方寸匕日三服千金方鬼舐頭瘡取小兒糞和臘豬脂敷之千金方金瘡腸出幹人屎末粉之即入千金方針瘡血出不止用人屎燒研敷之千金方馬血入瘡腫痛用人糞一雞子大服之並塗之千金方毒蛇咬螫人屎厚封之帛裹即消千金蠱毒百毒及諸熱毒時氣熱病口鼻出血用人屎尖七枚燒灰水調頓服溫覆取汗即愈勿輕此方神驗者也外臺祕要諸毒猝惡熱悶欲死者新糞汁水和服或乾者燒末漬汁飲名破棺湯蘇恭解藥箭毒毒箭有三種交廣夷人用焦銅作箭鏃嶺北諸處以蛇毒螫物汁著筒中漬箭鏃此二種才傷皮肉便洪膿沸爛而死若中之便飲汁並塗之惟此最妙又一種用射罔煎塗箭鏃亦宜此方姚僧坦集驗方野葛芋毒山中毒菌欲死者並飲糞汁一升即活肘後方漏肉脯毒人屎燒灰酒服方寸匕肘後方惡犬咬傷左盤龍即人屎也厚封之數日即愈藺氏經驗方心腹急痛欲死用人屎同蜜擂勻新汲水化下生生編小兒胎屎綱目主治惡瘡食息肉除面印字一月即瘥藏器治小兒鬼舐頭燒灰和臘豬脂塗之時珍人尿奴吊切亦作溺別録釋名溲素問小便素問輪回酒綱目還元湯時珍曰尿從尸從水會意也方家謂之輪回酒還元湯隱語也飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水道者闌門也主分泌水穀糟粕入於大腸水汁滲入膀胱膀胱者州都之官津液之府氣化則能出矣陰陽應象論云清陽為天濁陰為地地氣上為云天氣下為雨故清陽出上竅濁陰出下竅氣味咸寒無毒主治寒熱頭痛溫氣童男者尤良別録主久嗽上氣失聲及症積滿腹蘇恭明目益聲潤肌膚利大腸推陳致新去咳嗽肺痿鬼氣痓病停久者服之佳恐冷則和熱湯服藏器止勞渴潤心肺療血悶熱狂撲損瘀血在內運絶止吐血鼻衄皮膚皴裂難産胎衣不下蛇犬咬大明滋陰降火甚速震亨殺蟲解毒療瘧中暍時珍發明弘景曰若人初得頭痛直飲人尿數升亦多愈合蔥豉作湯服彌佳宗奭曰人溺須童子者佳産後溫飲一杯壓下敗血惡物有飲過七日者過多恐久遠血臟寒令人髮帶病人亦不覺若氣血虛無熱者尤不宜多服此物性寒故熱勞方中用之震亨曰小便降火甚速常見一老婦年逾八十貌似四十詢其故常有惡病人教服人尿四十餘年矣且老健無他病而何謂之性寒不宜多服耶凡陰虛火動熱蒸如燎服藥無益者非小便不能除時珍曰小便性溫不寒飲之入胃隨脾之氣上歸於肺下通水道而入膀胱乃其舊路也故能治肺病引火下行凡人精氣清者為血濁者為氣濁之清者為津液清之濁者為小便小便與血同類也故其味鹹而走血治諸血病也按褚澄遺書云人喉有竅則咳血殺人喉不停物毫髮必咳血既滲入愈滲愈咳愈咳愈滲惟飲溲溺則百不一死若服寒涼則百不一生又吳球諸證辨疑云諸虛吐衄咯血須用童子小便其效甚速蓋溲溺滋陰降火消瘀血止吐衄諸血但取十二歲以下童子絶其烹炮鹹酸多與米飲以助水道每用一盞入薑汁或韭汁二三點徐徐服之日進二三服寒天則重湯溫服久自有效也又成無已云傷寒少陰證下利不止厥逆無脈乾嘔欲飲水者加人尿豬膽汁鹹苦寒物於白通湯薑附藥中其氣相從可去格拒之患也附方舊七新三十八頭痛至極童便一盞豉心半合同煎至五分溫服聖濟總録熱病咽痛童便三合含之即止聖惠方骨蒸發熱三歲童便五升煎取一升以蜜三匙和之每服二碗半日更服此後常取自己小便服之輕者二十日重者五十日瘥二十日後當有蟲如蚰蜒在身常出十步內聞病人小便臭者瘥也台州丹仙觀道士張病此自服神驗孟詵必效方男婦怯證男用童女便女用童男便斬頭去尾日進二次乾燒餅壓之月餘全愈聖惠久嗽涕唾肺痿時時寒熱頰赤氣急用童便去頭尾少許五合取大粉甘草一寸炙令熱四破浸之露一夜去甘草平旦頓服或入甘草末一錢同服亦可一日一劑童子忌食五辛熱物姚僧垣集驗肺痿咳嗽鬼氣疰病停久臭溺日日溫服之集驗方吐血鼻洪人溺薑汁和勻服一升日華子齒縫衄血童便溫熱含之立止聖惠方消渴重者衆人溺坑中水取一盞服之勿令病人知三度瘥聖惠方症積滿腹諸藥不瘥者人溺一服一升下血片塊二十日即出也蘇恭本草絞腸沙痛童子小便服之即止聖惠方猝然腹痛令人騎其腹溺臍中肘後方下痢休息杏仁去皮麩炒研二兩以豶豬肝一具切片水洗血淨置淨鍋中一重肝一重杏仁鋪盡以童便二升同煎乾放冷任意食之聖惠方瘧疾渴甚童便和蜜煎沸頓服簡便方瘴癘諸瘧無問新久童便一升入白蜜二匙攪去白沫頓服取吐碧緑痰出為妙若不然終不除也聖惠中暍昏悶夏月人在途中熱死急移陰處就掬道上熱土擁臍上作窩令人溺滿暖氣透臍即蘇乃服地漿蒜水等藥林億云此法出自張仲景其意殊絶非常情所能及本草所能關實救急之大術也蓋臍乃命蒂暑暍傷氣溫臍所以接其元氣之意中惡不醒令人尿其面上即蘇此扁鵲法也肘後方三十年癇一切氣塊宿冷惡病苦參二斤童子小便一斗二升煎取六升和糯米及曲如常法作酒服但腹中諸疾皆治酒放二三年不壞多作救人神效聖惠金瘡中風自己小便日洗二三次不妨入水聖惠金瘡血出不止飲人尿五升千金方打傷瘀血攻心者人尿煎服一升日一服蘇恭本草折傷跌撲童便入少酒飲之推陳致新其功甚大薛已云豫在居庸見覆車被傷七人仆地呻吟俱令灌此皆得無事凡一切傷損不問壯弱及有無瘀血俱宜服此若脅脹或作痛或發熱煩躁口渴惟服此一甌勝似他藥他藥雖效恐無瘀血反致誤人童便不動臟腑不傷氣血萬無一失軍中多用此屢試有驗外科發揮杖瘡腫毒服童便良千金方火燒悶絶不省人事者新尿頓服二三升良千金方刺在肉中溫小便漬之千金人咬手指瓶盛熱尿浸一夜即愈通變要法蛇犬咬傷日華子云以熱尿淋患處千金方治蝮蛇傷人令婦人尿於瘡上良蛇纏人足就令尿之便解肘後方蜂蠆螫傷人尿洗之肘後方蜘蛛咬毒久臭人溺於大甕中坐浸仍取烏雞屎炒浸酒服之不爾恐毒殺人陳藏器本草百蟲入耳小便少少滴入聖濟總録勞聾已久童子小便乘熱少少頻滴之聖濟總録赤目腫痛自己小便乘熱抹洗即閉目少頃此以真氣退去邪熱也普濟方腋下狐臭自己小便乘熱洗兩腋下日洗數次久則自愈集簡方傷胎血結心腹痛取童子小便日服二升良楊氏産乳子死腹中以夫尿二升煮沸飲之千金方中土菌毒合口椒毒人尿飲之肘後方解諸菜毒小兒尿和乳汁服二升海上方催生下胞人溺一升入蔥薑各一分煎二三沸熱飲便下日華子本草痔瘡腫痛用熱童尿入礬三分服之一日二三次效救急方溺白垽音魚覲切唐本草釋名人中白時珍曰滓澱為垽此乃人溺澄下白垽也以風日久乾者為良入藥並以瓦煅過用氣味咸平無毒大明曰涼主治鼻衄湯火灼瘡唐本燒研主緊唇瘡蘇恭治傳尸熱勞肺痿心膈熱羸瘦渴疾大明降火消瘀血治咽喉口齒生瘡疳𧈟諸竅出血肌膚汗血時珍發明震亨曰人中白能瀉肝火三焦火併膀胱火從小便中出蓋膀胱乃此物之故道也時珍曰人中白降相火消瘀血蓋咸能潤下走血故也今人病口舌諸瘡用之有效降火之驗也張杲醫説云李七常苦鼻衄僅存喘息張思順用人中白散即時血止又延陵鎮官曾棠鼻血如傾白衣變紅頭空空然張用人中白藥治之即止並不再作此皆散血之驗也附方舊二新十三大衄久衄人中白一團雞子大綿五兩燒研每服二錢溫水服聖濟總録諸竅出血方同上鼻衄不止五七日不住者人中白新瓦煏干入麝香少許溫酒調服立效經驗方膚出汗血方同上偏正頭痛人中白地龍炒等分為末羊膽汁丸芥子大每新汲水化一丸注鼻中嗅之名一滴金普濟方水氣腫滿人尿煎令可丸每服一小豆大日三服千金方腳氣成漏跟有一孔深半寸許其痛異常用人中白煅有水出滴入瘡口戴原禮證治要訣小兒霍亂尿滓末乳上服之良千金方鼻中息肉人中白瓦焙每溫湯服一錢朱氏集驗方痘瘡倒陷臘月收人中白火煅為末溫水服三錢陷者自出儒門事親口舌生瘡溺桶垽七分枯礬三分研勻有涎拭去數次即愈集簡方小兒口疳人中白煅黃柏蜜炙焦為末等分入冰片少許以青布拭淨摻之纍效陸氏經驗方走馬牙疳以小便盆內白屑取下入瓷瓶內鹽泥固濟煅紅研末入麝香少許貼之此汴梁李提領方也又方用婦人尿桶中白垢火煅一錢銅緑三分麝香一分和勻貼之尤有神效痘疹煩熱人中白或老糞缸白垢洗淨研末每白湯或酒服二錢痘疹便覽方秋石蒙筌釋名秋冰時珍曰淮南子丹成號曰秋石言其色白質堅也近人以人中白煉成白質亦名秋石言其亦出於精氣之餘也再加升打其精緻者謂之秋冰此蓋仿海水煎鹽之義方士亦以鹽入爐火煅成偽者宜辨之嘉謨曰秋石須秋月取童子溺每缸入石膏末七錢桑條攪澄定傾去清液如此二三次乃入秋露水一桶攪澄如此數次滓穢滌淨鹹味減除以重紙鋪灰上曬乾完全取起輕清在上者為秋石重濁在下者刮去古人立名實本此義男用童女溺女用童男弱亦一陰一陽之道也世醫不取秋時雜收人溺但以皂莢水澄曬為陰煉煅為陽煉盡失於道何合於名媒利敗人安能應病況經火煉性卻變溫耶氣味咸溫無毒主治虛勞冷疾小便遺數漏精白濁時珍滋腎水養丹田返本還元歸根覆命安五臟潤三焦消痰咳退骨蒸軟堅塊明目清心延年益壽嘉謨發明時珍曰古人惟取人中白人尿治病取其散血滋陰降火殺蟲解毒之功也王公貴人惡其不潔方士遂以人中白設法煅煉治為秋石葉夢得水云録極稱陰陽二煉之妙而瑣碎録乃云秋石味鹹走血使水不制火久服令人成渴疾蓋此物既經煅煉其氣近溫服者多是淫欲之人藉此放肆虛陽妄作真水愈涸安得不渴耶況甚則加以陽藥助其邪火乎惟丹田虛冷者服之可耳觀病淋者水虛火極則煎熬成沙成石小便之煉成秋石與此一理也附方舊一新十一秋石還元丹久服去百病強骨髓補精血開心益志補暖下元悅色進食久則臍下常如火暖諸般冷疾皆愈久年冷勞虛憊甚者服之亦壯盛其法以男子小便十石更多尤妙先支大鍋一口於空室內上用深瓦甑接鍋口以紙筋杵石灰泥甑縫並鍋口勿令通風候乾下小便約鍋中七八分以來灶下用焰火煮之若湧出即少少添冷小便候煎乾即人中白也入好罐子內如法固濟入炭爐中煅之旋取二三兩再研如粉煮棗瓤和丸如緑豆大每服五七丸漸加至十五丸空心溫酒或鹽湯下其藥末常要近火收或時復養火三五日則功效更大也經驗方陰陽二煉丹世之煉秋石者但得火煉一法此藥須兼陰陽二煉方為至藥火煉乃陽中之陰得火而凝入水則釋歸干無體蓋質去味存此離中之虛也水煉乃陰中之陽得水而凝遇曝而潤千歲不變味去質留此坎中之實也二物皆出於心腎二臟而流於小腸水火螣蛇玄武正氣外假天地之水火凝而為體服之還補太陽相火二臟實為養命之本空心服陽煉日午服陰煉此法極省力與常法功用不侔久疾服之皆愈有人得瘦疾且嗽諸方不效服此即瘳有人病顛腹鼓日久加喘滿垂困亦服此而安也陽煉法用人尿十餘石各用桶盛每石入皂莢汁一碗竹杖急攪百千下候澄去清留垽並作一桶如前攪澄取濃汁一二斗濾淨入鍋熬干刮下搗細再以清湯煮化筲箕鋪紙淋過再熬如此數次直待色白如雪方止用沙盒固濟火煅成質傾出如藥未成更煅一二次候色如瑩玉細研入砂盒內固濟頂火養七晝夜取出攤土上去火毒為末棗膏丸梧桐子大每空心溫酒下三十丸陰煉法用人尿四五石以大缸盛入新水一半攪千回澄定去清留垽又入新水攪澄直候無臭氣澄下如膩粉方以曝乾刮下再研以男兒乳和如膏烈日曬乾蓋假太陽真氣也如此九度為末棗膏和丸梧桐子大每午後溫酒下三十丸葉石林水云録秋冰乳粉丸固元陽壯筋骨延年不老卻百病用秋冰五錢頭生男乳曬粉五錢頭生女乳曬粉五錢乳香二錢五分麝香一分為末煉蜜丸芡子大金箔為衣烏金紙包黃蠟匱收勿令泄氣每月用乳汁化服一丸仍日飲乳汁助之秋冰法用童男童女尿垽各一桶入大鍋內桑柴火熬干刮下入河水一桶攪化隔紙淋過復熬刮下再以水淋煉之如此七次其色如霜或有一斤入罐內上用鐵燈盞蓋定鹽泥固濟升打三炷香看秋石色白如玉再研再如前升打燈盞上用水徐徐擦之不可多多則不結不可少少則不升自辰至未退火冷定其盞上升起者為秋冰味淡而香乃秋石之精英也服之滋腎水固元陽降痰火其不升者即尋常秋石也味鹹苦蘸肉食之亦有小補楊氏頤真堂經驗方直指秋石丸治濁氣干清精散而成膏淋黃白赤黯如肥膏蜜油之狀用秋石鹿角膠炒桑螵蛸炙各半兩白茯苓一兩為末糕糊丸梧桐子大每服五十丸人參湯下仁齋直指方秋石交感丹治白濁遺精秋石一兩白茯苓五錢菟絲子炒五錢為末用百沸湯一盞井華水一盞煮糊丸梧桐子大每服一百丸鹽湯下鄭氏家傳方秋石四精丸治思慮色欲過度損傷心氣遺精小便數秋石白茯苓各四兩蓮肉芡實各二兩為末蒸棗肉和丸梧桐子大每空心鹽湯下三十丸永類鈐方秋石五精丸常服補益秋石一兩蓮肉六兩真川椒紅五錢小茴香五錢白茯苓二兩為末棗肉和丸梧子大每服三十丸鹽湯溫酒空心下秋石法用童男童女潔淨無體氣疾病者沐浴更衣各聚一石用潔淨飲食及鹽湯與之忌蔥蒜韭薑辛辣膻腥之物待尿滿缸以水攪澄取人中白各用陽城瓦罐鹽泥固濟鐵線扎定打火一炷香連換鐵線打七火然後以男女者稱勻和作一處研開以河水化之隔紙七層濾過仍熬成秋石其色雪白用潔淨香濃乳汁和成日曬夜露但干即添乳汁取日精月華四十九日數足收貯配藥劉氏保壽堂經驗方腫脹忌鹽只以秋石拌飲食待腫脹消以鹽入罐煅過少少用之摘玄方赤白帶下真秋石研末蒸棗肉搗丸梧桐子大每服六十丸空心醋湯下摘玄方噎食反胃秋石每用一錢白湯下妙醫方摘要服丹發熱有人服伏火丹藥多腦後生瘡熱氣冉冉而上一道人教灸風府數十壯而愈仍時復作又教以陰煉秋石用大豆黃卷煎湯下遂愈和其陰陽也王清明余話方淋石宋嘉祐校正自玉石部移入此集解藏器曰此是患石淋人溺中出者正如小石收之為用時珍曰此是淫欲之人精氣鬱結陰火煎熬遂成堅質正如滾水結鹼滷水煎鹽小便煉成秋石同一義理也氣味咸溫無毒主治石淋水磨服之當得碎石隨溺出大明噎病吐食俗名澀飯病藏器癖石綱目集解時珍曰有人專心成癖及病症塊凝結成石如牛黃狗寶鮓答之類皆諸獸之病也觀夫星隕為石沙淋石淋及釋氏顱囟結成舍利子皆精氣凝結而然故格物論云石者氣之核也群書所載如寶圭化石老樹化石皆無情之變異也魚蛇蝦蟹皆能化石乃有情之變異也世説載貞婦登山望夫化而為石此蓋志一不分遂入於無情也宋史載石工採石陷入石穴三年掘出猶活見風遂化為石此蓋吞納石氣久而與之俱化也夫生形尚全化石則頑心症癖之化石亦其理也程子遺書云波斯人發古墓見肌膚都盡惟心堅如石鋸開中有山水如畫旁有一女憑闌凝睇蓋此女有愛山水癖遂致融結如此宋濂云一浮屠行大般舟三昧法示寂後焚之惟心不化狀如佛像非金非石又一人行禪觀法及死火葬心內包觀音像悉具醫書云一人病症死火化有塊如石此皆症癖頑凝成石之迹故並録之主治消堅癖治噎膈時珍乳汁別録釋名奶汁綱目仙人酒時珍曰乳者化之信故字從孚化省文也方家隱其名謂之仙人酒生人血白硃砂種種名色蓋乳乃陰血所化生於脾胃攝於衝任未受孕則下為月水既受孕則留而養胎已産則赤變為白上為乳汁此造化玄微自然之妙也邪術家乃以童女嬌揉取乳及造反經為乳諸説巧立名謂以弄貪愚此皆妖人所為王法所誅君子當斥之可也凡入藥並取首生男兒無病婦人之乳白而稠者佳若色黃赤清而腥穢如涎者並不可用有孕之乳謂之忌奶小兒飲之吐瀉成疳鬾之病最為有毒也氣味甘咸平無毒大明曰涼主治補五臟令人肥白悅澤療目赤痛多淚解獨肝牛肉毒合濃豉汁服之神效別録和雀屎去目赤胬肉蘇恭益氣治瘦悴悅皮膚潤毛髮點眼止淚大明發明弘景曰漢張蒼年老無齒妻妾百數常服人乳故年百歲余身肥如瓠宗奭曰人乳汁治目之功多何也人心生血肝藏血肝受血則能視蓋水入於經其血乃成又曰上則為乳汁下則為月水故知乳汁則血也用以點眼豈不相宜血為陰故性冷臟寒人如乳餅酥酪之類不可多食雖曰牛羊乳然亦不出乎陰陽之造化耳老人患口瘡不能食但飲人熱乳甚良時珍曰人乳無定性其人和平飲食沖淡其乳必平其人暴躁飲酒食辛或有火病其乳必熱凡服乳須熱飲若曬曝為粉入藥尤佳南史載宋何尚之積年勞病飲婦人乳而瘥又言穰城老人年二百四十歲惟飲曾孫婦乳也按白飛霞醫通云服人乳大能益心氣補腦髓止消渴治風火證養老尤宜每用一吸即以紙塞鼻孔按唇貼齒而漱乳與口津相和然後以鼻內引上吸使氣由明堂入腦方可徐徐咽下如此五七吸為一度不漱而吸何異飲酪止於腸胃而已附方舊三新十一服乳歌仙家酒仙家酒兩個壺盧盛一斗五行釀出真醍醐不離人間處處有丹田若是乾涸時咽下重樓潤枯朽清晨能飲一升余返老還童天地久虛損勞瘵德生丹用無病婦人乳三酒杯將瓷碟曬極熱置乳於中次入麝香末少許木香末二分調勻服後飲濃茶一酒盞即陽敗次日服接命丹接命丹用乳三酒杯如前曬碟盛人乳並人胞末一具調服服畢面膝俱赤如醉思睡只以白粥少少養之集簡方虛損風疾接命丹治男婦氣血衰弱痰火上升虛損之證又治中風不語左癱右緩手足疼痛動履不便飲食少進諸證用人乳二杯香甜白者為佳以好梨汁一杯和勻銀石器內頓滾滾每日五更一服能消痰補虛生血延壽此乃以人補人其妙無加攝生衆妙方中風不語舌根強硬三年陳醬五合人乳汁五合相和研以生布絞汁隨時少少與服良久當語聖惠方猝不得語人乳半合美酒半升和服範汪方失音不語人乳竹瀝各二合溫服摘玄月經不通日飲人乳三合千金方眼熱赤腫人乳半合古銅錢十文銅器中磨令變色稀稠成煎瓶收日點數次或以乳浸黃連蒸熱洗之聖惠方初生不尿人乳四合蔥白一寸煎滾分作四服即利外臺初生吐乳人乳二合籧篨篾少許鹽二粟大同煎沸入牛黃粟許與服外臺癰膿不出人乳汁和麵敷之比曉膿盡出不可近手千金方臁脛生瘡人乳桐油等分和勻以鵝翎掃塗神效摘玄啖蛇牛毒牛啖蛇者毛髮向後其肉殺人但飲人乳汁一升立愈金匱要略中牛馬毒人乳飲之良千金百蟲入耳人乳滴之即出聖惠方婦人月水宋嘉祐附月經衣釋名月經素問天癸素問紅鉛時珍曰女子陰類也以血為主其血上應太陰下應海潮月有盈虧潮有朝夕月事一月一行與之相符故謂之月水月信月經經者常也有常軌也天癸者天一生水也邪術家謂之紅鉛謬名也女人之經一月一行其常也或先或後或通或塞其病也復有變常而古人並未言及者不可不知有行期只吐血衄血或眼耳出血者是謂逆行有三月一行者是謂居經俗名按季有一年一行是謂避年有一生不行而受胎者是謂暗經有受胎之後月月行經而産子者是謂盛胎俗名垢胎有受胎數月血忽大下而胎不隕者是謂漏胎此雖以氣血有餘不足言而亦異於常矣女子二七天癸至七七天癸絶其常也有女年十二十三而産子如褚記室所載平江蘇達卿女十二受孕者有婦年五十六十而産子如遼史所載亟普妻六十餘生二男一女者此又異常之尤者也學醫者之於此類恐亦宜留心焉氣味咸平無毒主治解毒箭並女勞復弘景月經衣主治金瘡血湧出炙熱尉之又主虎狼傷及箭鏃入腹藏器發明時珍曰女人入月惡液腥穢故君子遠之為其不潔能損陽生病也煎膏治藥出痘持戒修煉性命者皆避忌之以此也博物志云扶南國有奇術能令刀斫不入惟以月水塗刀便死此是穢液壞人神氣故合藥忌觸之此説甚為有據今有方士邪術鼓弄愚人以法取童女初行經水服食謂之先天紅鉛巧立名色多方配合謂參同契之金華悟真篇之首經皆此物也愚人信之吞咽穢滓以為祕方往往發出丹疹殊可嘆惡按蕭了真金丹詩云一等旁門性好淫強陽復去採他陰口含天癸稱為藥似恁洳沮枉用心嗚呼愚人觀此可自悟矣凡紅鉛方今並不録附方舊七新五熱病勞復丈夫熱病瘥後交接復發忽卵縮入腸腸痛欲死燒女人月經赤衣為末熟水服方寸匕即定梅師方女勞黃疸氣短聲沉用女人月經布和血衣燒灰酒服方寸匕一日再服三日瘥孟詵必效方霍亂困篤童女月經衣和血燒灰酒服方寸匕百方不瘥者用之千金方小兒驚癇發熱取月候血和青黛新汲水調服一錢入口即瘥量兒加減普濟方令婦不妒取婦人月水布裹蛤蟆於廁前一尺入地五寸埋之張華博物志癰疽發背一切腫毒用胡燕窠土鼠坌土榆白皮栝蔞根等分為末以女人月經衣水洗取汁和敷腫上干即易之潰者封其四圍五日瘥千金方男子陰瘡因不忌月事行房陰物潰爛用室女血衲瓦上燒存性研末麻油調敷之解藥箭毒交州夷人以焦銅為鏑塗毒藥於鏃鋒上中人即沸爛須臾骨壞但服月水屎汁解之博物志箭鏃入腹或肉中有聚血以婦人月經衣燒灰酒服方寸匕千金方馬血入瘡剝馬刺傷以婦人月水塗之神效姚僧坦集驗方虎狼傷瘡月經衣燒末敷之陳藏器人血拾遺集解時珍曰血猶水也水穀入於中焦泌別熏蒸化其精微上注於肺流溢於中布散於外中焦受汁變化而赤行於隧道以奉生身是之謂血命曰營氣血之與氣異名同類清者為營濁者為衛營行於陰衛行於陽氣主煦之血主濡之血體屬水以火為用故曰氣者血之帥也氣升則升氣降則降氣熱則行氣寒則凝火活則紅火死則黑邪犯陽經則上逆邪犯陰經則下流蓋人身之血皆生於脾攝於心藏於肝布於肺而施化於腎也仙家煉之化為白汁陰盡陽純也萇弘死忠血化為碧人血入土年久為磷皆精靈之極也氣味咸平有毒主治羸病人皮肉乾枯身上麩片起又狂犬咬寒熱欲發者並刺血熱飲之藏器發明時珍曰肉乾麩起燥病也不可卒潤也飲人血以潤之人之血可勝刺乎夫潤燥治狂犬之藥亦夥矣奚俟於此耶始作方者不仁甚矣其無後乎虐兵殘賊亦有以酒飲人血者此乃天戮之民必有其報不必責也諸方用血惟不悖於理者收附於下附方新七吐血不止就用吐出血塊炒黑為末每服三分以麥門冬湯調服蓋血不歸元則積而上逆以血導血歸元則止矣吳球諸證辨疑衄血不止聖濟總録用白紙一張接衄血令滿於燈上燒灰作一服新汲水下勿用病人知儒門事親就用本衄血紙捻蘸點眼內左點右右點左此法大妙金瘡內漏取瘡內所出血以水和服之千金産乳血暈取釅醋和産婦血如棗大服之普濟方小兒赤疵針父腳中取血貼之即落千金方小兒疣目以針決其四邊取患瘡膿汁敷之忌水三日即潰落也千金人精宋嘉祐集解時珍曰營氣之粹化而為精聚於命門命門者精血之府也男子二八而精滿一升六合養而充之可得三升損而喪之不及一升謂精為脧者精非血不化也謂精為寶者精非氣不養也故血盛則精長氣聚則精盈邪術家蠱惑愚人取童女交媾飲女精液或以己精和其天癸吞咽服食呼為鉛汞以為祕方放恣貪淫甘食穢滓促其天年籲愚之甚矣又將誰尤按鮑景翔云神為氣主神動則氣隨氣為水母氣聚則水生故人之一身貪心動則津生哀心動則淚生愧心動則汗生欲心動則精生氣味甘溫主治和鷹屎滅瘢弘景塗金瘡血出湯火瘡時珍附方舊三新二面上黶子人精和鷹屎白塗之數日愈千金方身麵粉瘤人精一合青竹筒盛於火上燒以器承取汁密封器中數數塗之取效止肘後方瘰癧腫毒女人精汁頻頻塗之湯火傷灼令不痛易愈無痕肘後用人精鷹屎白日日塗之千金用女人精汁頻頻塗之口津唾綱目釋名靈液綱目神水綱目金漿綱目醴泉時珍曰人舌下有四竅兩竅通心氣兩竅通腎液心氣流入舌下為神水腎液流入舌下為靈液道家謂之金漿玉醴溢為醴泉聚為華池散為津液降為甘露所以灌溉臟腑潤澤肢體故修養家咽津納氣謂之清水灌靈根人能終日不唾則精氣常留顏色不稿若久唾則損精氣成肺病皮膚枯涸故曰遠唾不如近唾近唾不如不唾人有病則心腎不交腎水不上故津液干而真氣耗也秦越人難經云腎主五液入肝為淚入肺為涕入脾為涎入心為汗自入為唾也氣味甘咸平無毒主治瘡腫疥癬皶疱五更未語者頻塗擦之又明目退翳消腫解毒辟邪粉水銀時珍發明時珍曰唾津乃人之精氣所化人能每旦漱口擦齒以津洗目及常時以舌舐拇指甲揩目久久令人光明不昏又能退翳凡人有云翳但每日令人以舌舐數次久則真氣熏及自然毒散翳退也範東陽方云凡人魘死不得叫呼但痛咬腳跟及拇指甲際多唾其面徐徐喚之自省也按黃震日抄云晉時南陽宗定伯夜遇鬼問之答曰我新死鬼也問其所惡曰不喜唾耳急持之化為羊恐其變化因大唾之賣得千錢乃知鬼真畏唾也附方新四代指腫痛以唾和白硇砂搜面作碗子盛唾令滿著硇末少許以指浸之一日即瘥千金方手足發疣以白粱米粉鐵鐺炒赤研末以衆人唾和敷厚一寸即消肘後方腋下狐氣用自己唾擦腋下數過以指甲去其垢用熱水洗手數遍如此十餘日則愈毒蛇螫傷急以小便洗去血隨取口中唾頻頻塗之楊拱醫方摘要齒垽音居近切宋嘉祐釋名齒垢氣味咸溫無毒主治和黑蝨研塗出箭頭及惡刺破癰腫李世績塗蜂螫時珍附方新二竹木入肉針撥不盡者以人齒垢封之即不爛也葉氏通變要法毒蛇螫傷先以小便洗去血次以牙垽封而護之甚妙且不痛腫醫方摘要人汗綱目集解時珍曰汗出於心在內則為血在外則為汗故曰奪汗者無血奪血者無汗氣味咸有毒飲食食之令人生疔毒時珍眼淚綱目集解時珍曰淚者肝之液五臟六腑津液皆上滲於目凡悲哀笑咳則火激於中心系急而臟腑皆搖搖則宗脈感而液道開津上溢故涕泣出焉正如甑上水滴之意也氣味咸有毒凡母哭泣墮子目令子傷睛生翳時珍人氣綱目主治下元虛冷日令童男女以時隔衣進氣臍中甚良凡人身體骨節痹痛令人更互呵尉久久經絡通透又鼻衄金瘡噓之能令血斷時珍發明時珍曰醫家所謂元氣相火仙家所謂元陽真火一也天非此火不能生物人非此火不能有生故老人虛人與二七以前少陰同寢借其熏蒸最為有益杜甫詩云暖老須燕玉正此意也但不可行淫以喪寶促生耳近時術家令童女以氣進入鼻竅臍中精門以通三田謂之接補此亦小法不得其道者反以致疾按謝承續漢書云太醫史循宿禁中寒疝病發求火不得衆人以口更噓其背至旦遂愈劉敬叔異苑云孫家奚奴治虎傷蛇噬垂死者以氣禁之皆安又葛洪抱朴子云人在氣中氣在人中天地萬物無不須氣以生善行氣者內以養身外以卻惡然行之有法從子至巳為生氣之時從午至亥為死氣之時常以生氣時鼻中引氣入多出少閉而數之從九九八八七七六六五五而止乃微吐之勿令耳聞習之既熟增至千數此為胎息或春食東方青氣夏食南方赤氣秋食西方白氣冬食北方黑氣四季食中央黃氣亦大有效故善行氣者可以避飢渴可以延年命可以行水上可以居水中可以治百病可以入瘟疫以氣噓水則水逆流噓火則火遙滅噓沸湯則手可探物噓金瘡則血即自止噓兵刃則刺不能入噓箭矢則矢反自射噓犬則不吠噓虎狼則伏退噓蛇蜂則不動吳越有禁咒行氣之法遇有大疫可與同床不相傳染遇有精魅或聞聲或現形擲石放火以氣禁之皆自絶或毒蛇所傷噓之即愈若在百里之外遙以我手噓咒男左女右亦即可安夫氣出於無形用之其效至此而況絶谷延年乎時珍按此即吾內養浩然靈氣也符篆家取祖氣即此但彼徒皆氣餒庸人依仿安得驗哉人魄綱目集解時珍曰此是縊死人其下有物如麩炭即時掘取便得稍遲則深入矣不掘則必有再縊之禍蓋人受陰陽二氣合成形體魂魄聚則生散則死死則魂升於天魄降於地魄屬陰其精沉淪入地化為此物亦猶星隕為石虎死目光墜地化為白石人血入地為磷為碧之意也主治鎮心安神魄定驚怖顛狂磨水服之時珍髭鬚證類集解時珍曰嘴上曰髭頤下曰須兩頰曰髯詳見亂髮下主治燒研敷癰瘡慎微發明慎微曰唐李績病醫云得須灰服之方止太宗聞之遂自剪髭燒灰賜服復令敷癰立愈故白樂天詩云剪須燒藥賜功臣又宋呂夷簡疾仁宗曰古人言髭可治疾今朕剪髭與之合藥表朕意也陰毛拾遺主治男子陰毛主蛇咬以口含二十條咽汁令毒不入腹藏器橫生逆産用夫陰毛二七莖燒研豬膏和丸大豆大吞之千金方婦人陰毛主五淋及陰陽易病時珍附方新二陰陽易病病後交接卵腫或縮入腹絞痛欲死取婦人陰毛燒灰飲服仍以洗陰水飲之普濟方牛脹欲死婦人陰毛草裹與食即愈外臺祕要人骨拾遺釋名時珍曰許慎云骨者肉之核也靈樞經云腎主骨有骨度篇論骨之大小長短廣狹甚詳見本書主治骨病接骨臁瘡並取焚棄者藏器發明時珍曰古人以掩暴骨為仁德每獲陰報而方伎之流心乎利欲乃收人骨為藥餌仁術固如此乎且犬不食犬骨而人食人骨可乎父之白骨惟親生子刺血瀝之即滲入又酉陽雜俎云荊州一軍人損脛張七政飲以藥酒破肉去碎骨一片塗膏而愈二年餘復痛張曰所取骨寒也尋之尚在床下以湯洗綿裹收之其痛遂止氣之相應如此孰謂枯骨無知乎仁者當悟矣附方新四代杖燒過人骨為末空心酒服三錢受杖不腫不作瘡久服皮亦厚也醫林集要接骨燒過童子骨一兩乳香二錢喜紅絹一方燒灰為末熱酒調服先以桐木片扎定立效醫林集要臁瘡燒過人骨碎者為末摻之壽域神方折傷死童子骨煅過香瓜子仁炒乾為末好酒下止痛極速扶壽精方天靈蓋宋開寶釋名腦蓋骨綱目仙人蓋綱目頭顱骨志曰此乃死人頂骨十字解者方家婉其名耳藏器曰此是天生天賜蓋押一身之骨囟門未合即未有也時珍曰人之頭圓如蓋穹窿象天泥丸之宮神靈所集修煉家取坎補離復其純乾聖胎圓成乃開顱囟而出入之故有天靈蓋諸名也修治藏器曰凡用彌腐爛者乃佳有一片如三指闊者取得用煻灰火罨一夜待腥穢氣盡卻用童男溺於瓷鍋子中煮一伏時漉出於屋下掘一坑深一尺置骨於中一伏時其藥魂歸神妙陽人使陰陰人使陽好古曰方家有用檀香湯洗過酥炙用或燒存性者男骨色不赤女骨色赤以此別之也氣味咸平無毒時珍曰有毒主治傳尸尸疰鬼氣伏連久瘴勞瘧寒熱無時者燒令黑研細白飲和服亦合丸散用開寶治肺痿乏力羸瘦骨蒸盜汗等酥炙用大明退心經蘊寒之氣本草權度發明楊士瀛曰天靈蓋治尸疰尸疰者鬼氣也伏而未起故令淹纏得枯骸枕骨治之則魂氣飛越不復附人故得瘥也陳承曰神農本經人部惟發髲一物其餘皆出後世醫家或禁術之流奇怪之論耳近見醫家用天靈蓋治傳尸病未有一效殘忍傷神殊非仁人之用心苟有可易仁者宜盡心焉必不得已則宜以年深漬朽絶尸氣者可也附方新十一天靈蓋散追取勞蟲天靈二指大以檀香煎湯洗過酥炙一氣咒七遍云雷公神電母聖逢傳尸便須定急急如律令尖檳榔五枚阿魏二分麝香三分辰砂一分安息香三分甘遂三分為末每服三錢用童便四升入銀石器內以蔥白薤白各二七莖青蒿二握甘草二莖五寸長者桃枝柳枝桑枝酸榴枝各二握七寸長同煎至一升分作三盞五更初調服前藥一服蟲不下約人行十里又進一服天明再進取下蟲物名狀不一急擒入油鐺煎之其蟲觜青赤黃色可治黑白色難治然亦可斷傳染之患凡修合先須齋戒於遠處淨室勿令病人聞藥氣及雞犬貓畜孝子婦人一切觸穢之物見之蟲下後以白粥補之數日之後夢人哭泣相別是其驗也上清紫庭仙方虛損骨蒸千金方用天靈蓋如梳大炙黃以水五升煮取二升分三服起死神方也張文仲備急方用人頭骨炙三兩麝香十兩為末和蜜搗千杵丸梧桐子大每服七丸粥飲下日再服若胸前有青脈出者以針刺看血色未黑者七日瘥小兒骨蒸體瘦心煩天靈蓋酥炙黃連等分研末每服半錢米飲下日二服聖惠方諸瘧寒熱天靈蓋煅研末水服一字取效普濟方膈氣不食天靈蓋七個每個用黑豆四十九粒層層隔封水火升降楊梅色冷定取出去豆不用研末每服一錢溫酒下孫氏集效方青盲不見天靈蓋酥炙龍膽各二兩白龍腦一錢為末取黑豆五升淨淘以水煮爛濾汁卻煉成煎拌藥丸梧桐子大每服溫水下二十丸日三頻用新汲水洗頭面先令患人沐浴及剃卻頂心發靜一室令安止晝夜不得見明令滿百日切忌羊血雜肉及動風壅滯熱物喜怒房室等聖惠方痘瘡陷伏灰平不長煩躁氣急用天靈蓋燒研酒服三分一方入雄黃二分其瘡自然起發痘疹經驗方下部疳瘡天靈蓋煅研末先以黃柏湯洗淨摻之神效又一方入紅褐小紅棗等分同燒研劉氏經驗方臁瘡濕爛人頂骨燒研二錢龍骨三錢金絲硫黃一錢為末用冬蘿蔔芽陰乾熬水洗之乃貼劉松石保壽堂方小兒白禿大豆髑髏骨各燒灰等分以臘豬脂和塗姚僧坦集驗方人胞拾遺釋名胞衣梅師胎衣綱目紫河車綱目混沌衣綱目混元母蒙筌佛袈裟綱目仙人衣時珍曰人胞包人如衣故曰胞衣方家諱之別立諸名焉丹書云天地之先陰陽之祖乾坤之橐籥鉛汞之匡廓胚胎將兆九九數足我則乘而載之故謂之河車其色有紅有緑有紫以紫者為良修治吳球曰紫河車古方不分男女近世男用男女用女一云男病用女女病用男初生者為佳次則健壯無病婦人者亦可取得以清米泔擺淨竹器盛於長流水中洗去筋膜再以乳香酒洗過篾籠盛之烘乾研末亦有瓦焙研者酒煮搗爛者甑蒸搗曬者以蒸者為佳董炳云今人皆酒煮火焙及去筋膜大誤矣火焙水煮其子多不育惟蒸搗和藥最良筋膜乃初結真氣不可剔去也氣味甘咸溫無毒主治血氣羸瘦婦人勞損面皯皮黑腹內諸病漸瘦者治淨以五味和之如䭔餄法與食之勿令婦知藏器餄音甲餅也治男女一切虛損勞極癲癇失志恍惚安心養血益氣補精吳球發明震亨曰紫河車治虛勞當以骨蒸藥佐之氣虛加補氣藥血虛加補血藥以側柏葉烏藥葉俱酒灑九蒸九曝同之為丸大能補益名補腎丸時珍曰人胞雖載於陳氏本草昔人用者猶少近因丹溪朱氏言其功遂為時用而括蒼吳球始創大造丸一方尤為世行其方藥味平補雖無人胞亦可服餌其説詳見本方下按隋書云琉球國婦人産乳必食子衣張師正倦遊録云八桂獠人産男以五味煎調胞衣會親啖之此則諸獸生子自食其衣之意非人類也崔行功小兒方云凡胎衣宜藏於天德月空吉方深埋緊築令男長壽若為豬狗食令兒顛狂蟲蟻食令兒瘡癬鳥鵲食令兒惡死棄於火中令兒瘡爛近於社廟汙水井灶街巷皆有所禁按此亦銅山西崩洛鐘東應自然之理也今復以之蒸煮炮炙和藥搗餌雖曰以人補人取其同類然以人食人獨不犯崔氏之禁乎其異於琉球獠人者亦幾希矣附方舊一新六河車丸治婦人瘵疾勞嗽虛損骨蒸等證用紫河車初生男子者一具以長流水中洗淨熟煮擘細焙乾研山藥二兩人參一兩白茯苓半兩為末酒糊丸梧桐子大麝香養七日每服三五十丸溫服鹽湯下永類鈐方大造丸吳球云紫河車即胞衣也兒孕胎中臍繫於胞胞系母脊受母之蔭父精母血相合生成真元所鍾故曰河車雖稟後天之形實得先天之氣超然非他金石草木之類可比愚每用此得效用之女人尤妙蓋本其所自出各從其類也若無子及多生女月水不調小産難産人服之必主有子危疾將絶者一二服可更活一二日其補陰之功極重百發百中久服耳聰目明鬚髮烏黑延年益壽有奪造化之功故名大造丸用紫河車一具男用女胎女用男胎初生者米泔洗淨新瓦焙乾研末或以淡酒蒸熟搗曬研末氣力尤全且無火毒敗龜板年久者童便浸三日酥炙黃二兩或以童便浸過石上磨淨蒸熟曬研尤妙黃柏去皮鹽酒浸炒一兩半杜仲去皮酥炙一兩半牛膝去苗酒浸曬一兩二錢肥生地黃二兩半入砂仁六錢白茯苓二兩絹袋盛入瓦罐酒煮七次去茯苓砂仁不用杵地黃為膏聽用天門冬去心麥門冬去心人參去蘆各一兩二錢夏月加五味子七錢各不犯鐵器為末同地黃膏入酒米糊丸如小豆大每服八九十丸空心鹽湯下冬月酒下女人去龜板加當歸二兩以乳煮糊為丸男子遺精女子帶下並加牡蠣粉一兩世醫用陽藥滋補非徒無益為害不小蓋邪火只能動欲不能生物龜板黃柏補陽補陰為河車之佐加以杜仲補腎強腰牛膝益精壯骨四味通為足少陰經藥古方加陳皮名補腎丸也生地黃涼血滋陰得茯苓砂仁同黃柏則走少陰白飛霞以此四味為天一生水丸也天麥門冬能保肺氣不令火炎使肺氣下行生水然其性有降無升得人參則鼓動元氣有升有降故同地黃為固本丸也又麥門冬人參五味子三味名生脈散皆為肺經藥此方配合之意大抵以金水二臟為生化之原加河車以成大造之功故也一人病弱陽事大痿服此二料體貌頓異連生四子一婦年六十已衰憊服此壽至九十猶強健一人病後不能作聲服此氣壯聲出一人病痿足不任地者半年服此後能遠行諸證辨疑五勞七傷吐血虛瘦用初生胞衣長流水中洗去惡血待清汁出乃止以酒煮爛搗如泥入白茯神末和丸梧桐子大每米飲下百丸忌鐵器朱氏集驗方久癲失志氣虛血弱者紫河車治淨爛煮食之劉氏經驗方大小癇疾初生胎衣一具長流水洗淨仍以水浸春三夏一秋五冬七日焙乾為末羌活天麻防風各半兩白殭蠶白附子各一兩南星二兩川烏一個全蠍二十一個為末糊丸梧桐子大硃砂為衣每服五十丸好酒下乾坤祕韞解諸蠱毒不拘草蠱蛇蠱蜣螂蠱其狀入咽刺痛欲死取胞衣一具洗切曝乾為末熟水調服一錢匕梅師方目赤生翳初生孩兒胞衣曝乾焙研細末日日敷目眥中愈乃止千金胞衣水拾遺修治藏器曰此乃衣埋地下七八年化為水澄徹如冰南方人以甘草升麻和諸藥瓶盛埋之三五年後掘出取為藥也氣味辛涼無毒主治小兒丹毒諸熱毒發寒熱不歇狂言妄語頭上無辜發豎虛痞等證天行熱病飲之立效藏器反胃久病飲一鍾當有蟲出時珍初生臍帶拾遺釋名命蒂時珍曰胎在母腹臍連於胞胎息隨母胎出母腹臍帶既剪一點真元屬之命門丹田臍乾自落如瓜脫蒂故臍者人之命蒂也以其當心腎之中前直神闕後直命門故謂之臍臍之為言齊也主治燒末飲服止瘧藏器解胎毒敷臍瘡時珍附方新三臍汁不幹綿裹落下臍帶燒研一錢入當歸頭末一錢麝香一字摻之全幼心鑑預解胎毒初生小兒十三日以本身剪下臍帶燒灰以乳汁調服可免痘患或入硃砂少許保幼大全痘風赤眼初生小兒臍帶血乘熱點之妙海上方人勢綱目釋名陰莖時珍曰人陰莖非藥物也陶九成輟耕録載杭州沈生犯姦事露引刀自割其勢流血經月不合或令尋所割勢搗粉酒服不數日而愈觀此則下蠶室者不可不知此法也故附於此云主治下蠶室創口不合時珍人膽拾遺氣味苦涼有毒主治鬼氣尸疰伏連藏器久瘧噎食金瘡時珍發明時珍曰北虜戰場中多取人膽汁敷金瘡云極效但不可再用他藥必傷爛也若先敷他藥即不可用此此乃殺場救急之法收膽干之亦可用無害於理也有等殘忍武夫殺人即取其膽和酒飲之云令人勇是雖軍中謬術君子不為也附方新三久瘧連年噎食不下用生人膽一個盛糯米令滿入麝香少許突上陰乾一半青者治瘧一半黑者治噎併為末每服十五粒瘧用陳皮湯下噎用通草湯下俱出普濟方鬼瘧進退不定者用人膽硃砂雄黃麝香等分為末醋糊丸緑豆大每綿裹一丸納鼻中即瘥男左女右一丸可治二人聖惠方人肉拾遺主治瘵疾藏器發明時珍曰張杲醫説言唐開元中明州人陳藏器著本草拾遺載人肉療羸瘵自此閭閻有病此者多相效割股按陳氏之先已有割股割肝者矣而歸咎陳氏所以罪其筆之於書而不立言以破惑也本草可輕言哉嗚呼身體髮膚受之父母不敢毀傷父母雖病篤豈肯欲子孫殘傷其支體而自食其骨肉乎此愚民之見也按何孟春余冬序録云江伯兒母病割脅肉以進不愈禱於神欲殺子以謝神母愈遂殺其三歲子事聞太祖皇帝怒其絶倫滅理杖而配之下禮部議曰子之事親有病則拜託良醫至於呼天禱神此懇切至情不容已者若臥冰割股事屬後世乃愚昧之徒一時激發務為詭異以驚世駭俗希求旌表規避徭役割股不已至於割肝割肝不已至於殺子違道傷生莫此為甚自今遇此不在旌表之例嗚呼聖人立教高出千古韙哉如此又陶九成輟耕録載古今亂兵食人肉謂之想肉或謂之兩腳羊此乃盜賊之無人性者不足誅矣木乃伊綱目集解時珍曰按陶九成輟耕録云天方國有人年七八十歲願捨身濟衆者絶不飲食惟澡身啖蜜經月便溺皆蜜既死國人殮以石棺仍滿用蜜浸之鐫年月於棺瘞之俟百年後起封則成蜜劑遇人折傷肢體服少許立愈雖彼中亦不多得亦謂之蜜人陶氏所載如此不知果有否姑附卷末以俟博識方民綱目李時珍曰人稟性於乾坤而囿形於一氣橫目二足雖則皆同而風土氣習自然不一是故蝨處頭而黑豕居遼而白水食者腥草食者膻膏粱藜莧腸胃天淵菒褐羅紈肌膚玉石居養所移其不能齊者亦自然之勢也故五方九州水土各異其民生長氣息亦殊乃集方民附於部末以備醫診云東方海濱傍水魚鹽之地其民食魚而嗜咸黑色疏理其病多瘡瘍其治宜砭石西方陵居多風水土剛強其民不衣而褐薦華食而肥脂其病生於內其治宜毒藥北方地高陵居風寒冰冽其民野處而乳食其病臟寒生滿其治宜灸焫南方地下水土弱霧露所聚其民嗜酸而食胕致理而赤色其病多攣痹其治宜微針中央地平濕其民食雜而不勞其病多痿躄其治宜導引按蹺素問九州殊題水泉各異風聲氣習剛柔不同青州其音角羽其泉咸以酸其氣舒遲其人聲緩荊揚其音角徵其泉酸以苦其氣剽輕其人聲急梁州其音商徵其泉苦以辛其氣剛勇其人聲塞兗豫其音宮徵其泉甘以苦其氣平靜其人聲端雍冀其音商羽其泉辛以咸其氣快烈其人聲捷徐州其音角宮其泉酸以甘其氣悍徑其人聲雄出河圖括地象堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美耗土之人醜出孔子家語山林之民毛而瘦得木氣多也川澤之民黑而津得水氣多也丘陵之民團而長得火氣多也墳衍之民皙而方得金氣多也原隰之民豐而痹得土氣多也出宋太史集荊州一男二女揚州二男五女青州二男二女兗州二男三女幽州一男三女並州二男三女豫州二男三女雍州三男二女冀州五男三女出周禮土地生人各以類應故山氣多男澤氣多女水氣多喑風氣多聾林氣多癃木氣多傴石氣多力岸下氣多腫險阻氣多癭穀氣多痹丘氣多狂廣氣多仁陵氣多貪暑氣多夭寒氣多壽輕土多利重土多遲清水音小濁水音大湍水人輕遲水人重中土多聖賢出淮南子鴻烈解人傀公回切怪異也綱目李時珍曰太初之時天地絪縕一氣生人乃有男女男女媾精乃自化生如草木之始生子一氣而後有根及子為種相繼也人之變化有出常理之外者亦司命之師所當知博雅之士所當識故撰為人傀附之部末以備多聞眚咎之徵易曰一陰一陽之謂道男女構精萬物化生乾道成男坤道成女此蓋言男女生生之機亦惟陰陽造化之良能焉耳齊司徒褚澄言血先至裹精則生男精先至裹血則生女陰陽均至非男非女之身精血散分駢胎品胎之兆道藏經言月水止後一三五日成男二四六日成女東垣李杲言血海始淨一二日成男三四五日成女聖濟經言因氣而左動陽資之則成男因氣而右動陰資之則成女丹溪朱震亨乃非褚氏而是東垣主聖濟左右之説而立論歸於子宮左右之系諸説可謂悉矣時珍竊謂褚氏未可非也東垣未盡是也蓋褚氏以精血之先後言道藏以日數之奇偶言東垣以女血之盈虧言聖濟丹溪以子宮之左右言各執一見會而觀之理自得矣夫獨男獨女之胎則可以日數論而駢胎品胎之感亦可以日數論乎稽之諸史載一産三子四子者甚多其子有半男半女或男多女少男少女多西樵野記載國朝天順時揚州民家一産五男皆育成觀此則一三五日為男二四六日為女之説豈其然哉焉有一日受男而二日復受女之理乎此則褚氏聖濟丹溪主精血子宮左右之論為有見而道藏東垣日數之論為可疑矣王叔和脈經以脈之左右浮沉辨猥生之男女高陽生脈訣以脈之縱橫逆順別駢品之胎形恐亦臆度非確見也王冰玄珠密語言人生三子主太平人生三女國淫失政人生十子諸侯競位人生肉塊天下飢荒此乃就人事而論則氣化所感又別有所關也夫乾為父坤為母常理也而有五種非男不可為父五種非女不可為母何也豈非男得陽氣之虧而女得陰氣之塞耶五不女螺紋鼓角脈也螺者牝竅內旋有物如螺也紋者竅小即實女也鼓者無竅如鼓角者有物如角古名陰挺是也脈者一生經水不調及崩帶之類是也五不男天犍漏怯變也天者陽痿不用古云天宦是也犍者陽勢閹去寺人是也漏者精寒不固常自遺泄也怯者舉而不強或見敵不興也變者體兼男女俗名二形晉書以為亂氣所生謂之人疴其類有三有值男即女值女即男者有半月陰半月陽者有可妻不可夫者此皆具體而無用者也胎足十月而生常理也而有七月八月生者十二三月生者十四五月生者或云氣虛也虞摶醫學正傳言有十七八月至二十四五月而生劉敬叔異苑言太原溫磐石母孕三年乃生豈亦氣虛至於許久耶今有孕七月而生子者多可育八月而生者多難育七變而八不變也魏略云黃牛羌人孕六月而生博物志云獠人孕七月而生晉書云符堅母孕十二月生劉搠母孕十三月生漢書云堯及昭帝皆以十四月生三十國春秋云劉聰母孕十五月乃生搜神記云黃帝母名附寶孕二十五月而生帝胞門子臟為奇恆之府所以為生人之戶常理也而有自脅産自額産自背産自髀産者何也豈子臟受氣駁雜而其繫有不同如宋史所記男陰生於脊女陰生於頭之類耶史記云陸終氏娶鬼方之女孕而左脅出三人右脅出三人六人子孫傳國千年天將興之必有尤物如修巳背折而生禹簡狄胸折而生契也魏志云黃初六年魏郡太守孔羡表言汝南屈雍妻王氏以去年十月十二日生男兒從右腋下小腹上而出其母自若無他畏痛今瘡已愈母子全安異苑云晉時魏興李宣妻樊氏義熙中懷孕不生而額上有瘡兒從瘡出長為軍將名胡兒又云晉時常山趙宣母妊身如常而髀上作癢搔之成瘡兒從瘡出母子平安野史云莆田尉舍之左有市人妻生男從股髀間出瘡合母子無恙可證屈雍之事浮屠氏言釋迦生於摩耶之右脅亦此理也嵩山記云陽翟有婦人妊三十月乃生子從母背上出五歲便入山學道琅琊漫鈔云我朝成化中宿州一婦孕脅腫如癰及期兒從癰出瘡痏隨合其子名佛記兒時珍曰我明隆慶五年二月唐山縣民婦有孕左脅腫起兒從脅生俱無恙陽生陰長孤陽不生獨陰不長常理也而有思士不妻而感思女不夫而孕婦女生須丈夫出湩男子産兒者何也豈其氣脈時有變易如女國自孕雄雞生卵之類耶史記云薑源見巨人迹履之而生棄有娀氏吞玄鳥卵而生契皆不夫而孕也宣政録云宋宣和初朱節妻年四十一夕頷癢至明須長尺余草木子云元至正間京師一達婦髭鬚長尺余也謝承後漢書云濟陽李元全家疫死只一孫初生數旬蒼頭南陽李善自哺乳之乳為生湩唐書云元德秀兄子襁褓喪親德秀自乳之數日乳中湩流能食乃止宋史云宣和六年都城有賣青果男子孕而生子蓐母不能收易七人始免而逃去西樵野記云明嘉靖乙酉橫涇傭農孔方忽患膨脹憒憒幾數月自脅産一肉塊剖視之一兒肢體毛髮悉具也男生而覆女生而仰溺水亦然陰陽秉賦一定不移常理也而有男化女女化男者何也豈乖氣致妖而變亂反常耶京房易占云男化為女宮刑濫也女化為男婦政行也春秋潛潭巴云男化女賢人去位女化男賤人為王此雖以人事言而其臟腑經絡變易之微不可測也漢書云哀帝建平中豫章男子化為女子嫁人生一子續漢書云獻帝建安二十年越嶲男子化為女子李時珍曰我朝隆慶二年山西御史宋纁疏言靜樂縣民李良雨娶妻張氏已四載矣後因貧出其妻自傭於人隆慶元年正月偶得腹痛時作時止二年二月初九日大痛不止至四月內腎囊不覺退縮入腹變為女人陰戶次月經水亦行始換女妝時年二十八矣洪範五行傳云魏襄王十三年有女子化為丈夫晉書云惠帝元康中安豐女子周世寧以漸化為男子至十七八而性氣成又孝武皇帝寧康初南郡女子唐氏漸化為丈夫南史云劉宋文帝元嘉二年燕有女子化為男唐書云僖宗光啓二年春鳳翔郿縣女子朱齔化為丈夫旬日而死人異於物常理也而有人化物物化人者何也豈人亦太虛中一物並囿於氣交得其靈則物化人失其靈則人化物耶抑談子所謂至淫者化為婦人至暴者化為猛虎心之所變不得不變孔子所謂物老則群精附之為五酉之怪者邪談子化書云老楓化為羽人自無情而之有情也賢婦化為貞石自有情而之無情也世説武昌貞婦望夫化而為石宋史云崑山石工採石陷入石穴三年掘出猶活見風遂化為石幽冥録云陽羡小吏吳龕於溪中拾一五色浮石歸置床頭至夜化為女子左傳云堯殛鯀於羽山其神化為黃熊入於淵黃熊龍類也續漢書云靈帝時江夏黃氏母浴水化為黿入於淵搜神記云魏文帝黃初中清河宋士宗母浴於室化為鱉入於水時復還家異苑云宋文帝元嘉中高平黃秀入山經日遂化為熊淮南子云牛哀病七日化而為虎搏殺其兄郡國志云藤州夷人往往化貙貙小虎也有五指博物志云江漢有貙人能化為虎唐書云武后時郴州左史因病化虎擒之乃止而虎毛生矣又憲宗元和二年商州役夫將化為虎衆以水沃之乃不果顧微廣州記云湞陽縣俚民一兒年十五六牧牛牛忽舐兒甚快舐處悉白俄而兒死殺牛以供客食此牛者男女二十餘人悉化為虎隋書云文帝七年相州一桑門化為蛇繞樹自抽長二丈許抱朴子云狐狼猴玃滿三百歲皆能變人參同契云燕雀不生鳳狐兔不字馬常理也而有人産蟲獸神鬼怪形異物者何也豈其視聽言動觸於邪思隨形感應而然耶又有人生於卵生於馬者何也豈有神異憑之或因有感遘而然耶博物志云徐偃王之母産卵棄之孤獨老母取覆之出一兒後繼徐國異説云漢末有馬生人名曰馬異及長亡入胡地人具四肢七竅常理也而荒裔之外有三首比肩飛頭垂尾之民此雖邊徼餘氣所生同於鳥獸不可與吾同胞之民例論然亦異矣山海經云三首國一身三首在崑崙東爾雅云北方有比肩民半體相合迭食而迭望南方異物志云嶺南溪洞中有飛頭蠻項有赤痕至夜以耳為翼飛去食蟲物將曉復還如故也搜神記載吳將軍朱桓一婢頭能夜飛即此種也永昌志云西南徼外有濮人生尾如龜長三四寸欲坐則先穿地作孔若誤折之便死也是故天地之造化無窮人物之變化亦無窮賈誼賦所謂天地為爐兮造化為工陰陽為炭兮萬物為銅合散消息兮安有常則千變萬化兮未始有極忽然為人兮何足控摶化為異物兮又何足患此亦言變化皆由於一氣也膚學之士豈可恃一隅之見而概指古今六合無窮變化之事物為迂怪耶
