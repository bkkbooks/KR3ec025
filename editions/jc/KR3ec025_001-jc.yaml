爾藥有君臣佐使以相宣攝合和宜一君二臣三佐五使又可一君三臣九佐使也弘景曰用藥猶如立人之制若多君少臣多臣少佐則氣力不周也然檢仙經世俗諸方亦不必皆爾大抵養命之藥多君養性之藥多臣療病之藥多佐猶依本性所主而復斟酌之上品君中復有貴賤臣佐之中亦復如之所以門冬遠志別有君臣甘草國老大黃將軍明其優劣皆不同秩也岐伯曰方制君臣者主病之謂君佐君之謂臣應臣之謂使非上中下三品之謂也所以明善惡之殊貫也張元素曰為君者最多為臣者次之佐者又次之藥之於證所主同者則各等分或云力大者為君李杲曰凡藥之所用皆以氣味為主補瀉在味隨時換氣主病為君假令治風防風為君治寒附子為君治濕防己為君治上焦熱黃芩為君中焦熱黃連為君兼見何證以佐使藥分治之此制方之要也本草上品為君之說各從其宜爾藥有陰陽配合子母兄弟韓保升曰凡天地萬物皆有陰陽大小各有色類並有法象故羽毛之類皆生於陽而屬於陰鱗介之類皆生於陰而屬於陽所以空青法木故色青而主肝丹砂法火故色赤而主心雲母法金故色白而主肺雌黃法土故色黃而主脾磁石法水故色黑而主腎余皆以此例推之子母兄弟若榆皮為母厚朴為子之類是也根莖花實苗皮骨肉元素曰凡藥根之在土中者中半已上氣脈之上行也以生苗者為根中半已下氣脈之下行也以入土者為梢病在中焦與上焦者用根在下焦者用梢根升梢降人之身半已上天之陽也用頭中焦用身身半已下地之陰也用梢乃述類象形者也時珍曰草木有單使一件者如羌活之根木通之莖款冬之花葶藶之實敗醬之苗大青之葉大腹之皮郁李之核柏木之皮沉香之節蘇木之肌胡桐之淚龍腦之膏是也有兼用者遠志小草蜀漆常山之類是也有全用者枸杞甘菊之類是也有一物兩用者當歸頭尾麻黃根節赤白茯苓牛膝春夏用苗秋冬用根之類是也羽毛鱗介玉石水火之屬往往皆然不可一律論也有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和視之當用相須相使者良勿用相惡相反者若有毒宜制可用相畏相殺者不爾勿合用也保升曰本經三百六十五種中單行者七十一種相須者十二種相使者九十種相畏者七十八種相惡者六十種相反者十八種相殺者三十六種凡此七情合和視之弘景曰凡檢舊方用藥亦有相惡相反者如仙方甘草丸有防己細辛俗方玉石散用栝蔞乾薑之類服之乃不為害或有制持之者譬如寇賈輔漢程周佐吳大體既正不得以私情為害雖爾不如不用尤良半夏有毒須用生薑取其相畏相制也又曰相反為害深於相惡者謂彼雖惡我我無忿心猶如牛黃惡龍骨而龍骨得牛黃更良此有以制伏故也相反者則彼我交讎必不和合今畫家用雌黃胡粉相近便自黯妒可證矣時珍曰藥有七情獨行者單方不用輔也相須者同類不可離也如人參甘草黃柏知母之類相使者我之佐使也相惡者奪我之能也相畏者受彼之制也相反者兩不相合也相殺者制彼之毒也古方多有用相惡相反者蓋相須相使同用者帝道也相畏相殺同用者王道也相惡相反同用者霸道也有經有權在用者識悟爾藥有酸咸甘苦辛五味又有寒熱溫涼四氣宗奭曰凡稱氣者是香臭之氣其寒熱溫涼是藥之性且如白鵝脂性冷不可言氣冷也四氣則是香臭腥臊如蒜阿魏鮑魚汗襪則其氣臭雞魚鴨蛇則其氣腥狐貍白馬莖人中白則其氣臊沉檀龍麝則其氣香是也則氣字當改為性字於義方允時珍曰寇氏言寒熱溫涼是性香臭腥臊是氣其說與禮記文合但自素問以來只以氣味言卒難改易姑從舊爾好古曰味有五氣有四五味之中各有四氣如辛則有石膏之寒桂附之熱半夏之溫薄荷之涼是也氣者天也味者地也溫熱者天之陽寒涼者天之陰辛甘者地之陽咸苦者地之陰本草五味不言淡四氣不言涼只言溫大溫熱大熱寒大寒微寒平小毒大毒有毒無毒何也淡附於甘微寒即涼也及有毒無毒岐伯曰病有久新方有大小有毒無毒固宜常制大毒治病十去其六常毒治病十去其七小毒治病十去其八無毒治病十去其九谷肉果菜食養盡之無使過之傷其正也又曰耐毒者以厚藥不勝毒者以薄藥王冰云藥氣有偏勝則臟氣有偏絕故十分去其六七八九而止也陰乾曝乾採造時月生熟弘景曰凡採藥時月皆是建寅歲首則從漢太初後所記也其根物多以二月八月採者謂春初津潤始萌未充枝葉勢力淳濃也至秋枝葉乾枯津潤歸流於下也大抵春寧宜早秋寧宜晚花實莖葉各隨其成熟爾歲月亦有早晏不必都依本文也所謂陰乾者就六甲陰中干之也又依遁甲法甲子旬陰中在癸酉以藥著酉地也實不必然但露暴於陰影處干之爾若可兩用益當為善孫思邈曰古之醫者自解採取陰乾曝乾皆如法用藥必依土地所以治病十愈八九今之醫者不知採取時節至於出產土地新陳虛實一皆不悉所以治病十不得五也馬志曰今按法陰乾者多惡如鹿茸陰乾悉爛火干且良草木根苗九月以前採者悉宜日乾十月以後採者陰乾乃好時珍曰生產有南北節氣有早遲根苗異收採製造異法度故市之地黃以鍋煮熟大黃用火焙乾松黃和蒲黃樟腦雜龍腦皆失製作偽者也孔志約云動植形生因地舛性春秋節變感氣殊功離其本土則質同而效異乖於採取則物是而時非名實既虛寒溫多謬施於君父逆莫大焉嘉謨曰醫藥貿易多在市家諺云賣藥者兩眼用藥者一眼服藥者無眼非虛語也古壙灰雲死龍骨苜蓿根為土黃耆麝香搗荔核攙藿香採茄葉雜煮半夏為玄胡索鹽松梢為肉蓯蓉草仁充草豆蔻西呆代南木香熬廣膠入蕎麵作阿膠煮雞子及魚枕為琥珀枇杷蕊代款冬驢腳脛作虎骨松脂混麒麟竭番硝和龍腦香巧詐百般甘受其侮甚至殺人歸咎用藥乃大關係非比尋常不可不慎也土地所出真偽陳新並各有法弘景曰諸藥所生皆的有境界秦漢以前當言列國今郡縣之名後人所增爾江東以來小小雜藥多出近道氣力性理不及本邦假令荊益不通則全用歷陽當歸錢塘三建豈得相似所以療病不及往人亦當緣此又且醫不識藥惟聽市人市人又不辨究皆委採送之家採送之家傳習造作真偽好惡並皆莫測所以鍾乳醋煮令白細辛水漬使直黃耆蜜蒸為甜當歸酒灑取潤蜈蚣朱足令赤螵蛸膠於桑枝以虺床當蘼蕪以薺苨亂人參此等既非事實合藥不量剝除只如遠志牡丹才不收半地黃門冬三分耗一凡去皮除心之屬分兩不應不知取足王公貴勝合藥之日群下竊換好藥終不能覺以此療病固難責效宗奭曰凡用藥必須擇土地所宜者則藥力具用之有據如上黨人參川西當歸齊州半夏華州細辛東壁土冬月灰半天河水熱湯漿水之類其物至微其用至廣蓋亦有理若不推究厥理治病徒費其功杲曰陶隱居本草言狼毒枳實橘皮半夏麻黃吳茱萸皆須陳久者良其餘須精新也然大黃木賊荊芥芫花槐花之類亦宜陳久不獨六陳也凡藥味須要專精至元庚辰六月許伯威年五十四中氣本弱病傷寒八九日熱甚醫以涼藥下之又食梨冷傷脾胃四肢逆冷時發昏憒心下悸動吃噫不止面色青黃目不欲開其脈動中有止時自還乃結脈也用仲景復脈湯加人參肉桂急扶正氣生地黃減半恐傷陽氣服二劑病不退再為診之脈證相對因念莫非藥欠專精陳腐耶再市新藥與服其證減半又服而安凡諸草木昆蟲產之有地根葉花實採之有時失其地則性味少異失其時則氣味不全又況新陳之不同精粗之不等倘不擇而用之其不效者醫之過也唐耿湋詩云老醫迷舊疾朽藥誤新方是矣歲物專精見後藥性有宜丸者宜散者宜水煮者宜酒漬者宜膏煎者亦有一物兼宜者亦有不可入湯酒者並隨藥性不得違越弘景曰又按病有宜服丸服散服湯服酒服膏煎者亦兼參用察病之源以為其制華佗曰病有宜湯者宜丸者宜散者宜下者宜吐者宜汗者湯可以盪滌臟腑開通經絡調品陰陽丸可以逐風冷破堅積進飲食散可以去風寒暑濕之邪散五臟之結伏開腸利胃可下而不下使人心腹脹滿煩亂可汗而不汗使人毛孔閉塞悶絕而終可吐而不吐使人結胸上喘水食不入而死杲曰湯者蕩也去大病用之散者散也去急病用之丸者緩也舒緩而治之也㕮咀者古制也古無鐵刃以口咬細煎汁飲之則易升易散而行經絡也凡治至高之病加酒煎去濕以生薑補元氣以大棗發散風寒以蔥白去膈上痰以蜜細末者不循經絡止去胃中及臟腑之積氣味厚者白湯調氣味薄者煎之和滓服去下部之疾其丸極大而光且圓治中焦者次之治上焦者極小稠麵糊取其遲化直至下焦或酒或醋取其收散之意也犯半夏南星欲去濕者丸以薑汁稀糊取其易化也水浸宿炊餅又易化滴水丸又易化煉蜜丸者取其遲化而氣循經絡也蠟丸取其難化而旋旋取效或毒藥不傷脾胃也元素曰病在頭面及皮膚者藥須酒炒在嚥下臍上者酒洗之在下者生用寒藥須酒浸曝乾恐傷胃也當歸酒浸助發散之用也嘉謨曰製藥貴在適中不及則功效難求太過則氣味反失火制四煅炮炙炒也水制三漬泡洗也水火共制蒸煮二者焉法造雖多不離於此酒製升提薑製發散入鹽走腎而軟堅用醋注肝而住痛童便制除劣性而降下米泔制去燥性而和中乳制潤枯生血蜜制甘緩益元陳壁土製竊真氣驟補中焦麥麩皮製抑酷性勿傷上膈烏豆湯甘草湯漬曝並解毒致令平和羊酥油豬脂油塗燒咸滲骨容易脆斷去瓤者免脹抽心者除煩大概具陳初學熟玩欲療病先察其源先候病機五臟未虛六腑未竭血脈未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全弘景曰自非明醫聽聲察色診脈孰能知未病之病乎且未病之人亦無肯自療故齊侯怠於皮膚之微以致骨髓之痼非但識悟之為難亦乃信受之弗易倉公有言信巫不信醫死不治也時珍曰素問云上古作湯液故為而弗服中古道德稍衰邪氣時至服之萬全當今之世必齊毒藥攻其中鑱石針艾治其外又曰中古治病至而治之湯液十日不已治以草蘇荄枝本末為助標本已得邪氣乃服暮世治病不本四時不知日月不審逆從病形已成以為可救故病未已新病復起淳于意曰病有六不治驕恣不論於理一不治輕身重財二不治衣食不適三不治陰陽臟氣不定四不治形羸不能服藥五不治信巫不信醫六不治六者有一則難治也宗奭曰病有六失失於不審失於不信失於過時失於不擇醫失於不識病失於不知藥六失有一即為難治又有八要一曰虛二曰實三曰冷四曰熱五曰邪六曰正七曰內八曰外也素問言凡治病察其形氣色澤觀人勇怯骨肉皮膚能知其情以為診法若患人脈病不相應既不得見其形醫止據脈供藥其可得乎今豪富之家婦人居帷幔之內復以帛蒙手臂既無望色之神聽聲之聖又不能盡切脈之巧未免詳問病家厭繁以為術疏往往得藥不服是四診之術不得其一矣可謂難也嗚呼若用毒藥療病先起如黍粟病去即止不去倍之不去十之取去為度弘景曰今藥中單行一兩種有毒只如巴豆甘遂將軍不可便令盡劑如經所云一物一毒服一丸如細麻二物一毒服二丸如大麻三物一毒服三丸如胡豆四物一毒服四丸如小豆五物一毒服五丸如大豆六物一毒服六丸如梧子從此至十皆以梧子為數其中又有輕重且如狼毒鉤吻豈如附子芫花輩耶此類皆須量宜宗奭曰雖有此例更合論人老少虛實病之新久藥之多毒少毒斟量之不可執為定法療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼疰蠱毒以毒藥癰腫瘡瘤以瘡藥風濕以風濕藥各隨其所宜弘景曰藥性一物兼主十餘病者取其偏長為本復觀人之虛實補瀉男女老少苦樂榮悴鄉壤風俗並各不同褚澄療寡婦尼僧異乎妻妾此是達其性懷之所致也時珍曰氣味有厚薄性用有躁靜治體有多少力化有淺深正者正治反者反治用熱遠熱用寒遠寒用涼遠涼用溫遠溫發表不遠熱攻裡不遠寒不遠熱則熱病至不遠寒則寒病至治熱以寒溫而行之治寒以熱涼而行之治溫以清冷而行之治清以溫熱而行之木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之氣之勝也微者隨之甚者制之氣之復也和者平之暴者奪之高者抑之下者舉之有餘折之不足補之堅者削之客者除之勞者溫之結者散之留者行之燥者濡之急者緩之散者收之損者益之逸者行之驚者平之吐之汗之下之補之瀉之久新同法又曰逆者正治從者反治反治者熱因寒用寒因熱用塞因塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可使潰堅可使氣和可使必已又曰諸寒之而熱者取之陰熱之而寒者取之陽所謂求其屬以衰之也此皆約取素問之粹言病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空腹而在旦病在骨髓者宜飽滿而在夜弘景曰今方家先食後食蓋此義也又有須酒服者飲服者冷服者熱服者服湯則有疏有數煮湯則有生有熟各有法用並宜詳審杲曰古人服藥活法病在上者不厭頻而少病在下者不厭頓而多少服則滋榮於上多服則峻補於下凡云分再服三服者要令勢力相及並視人之強弱病之輕重以為進退增減不必泥法夫大病之主有中風傷寒寒熱溫瘧中惡霍亂大腹水腫腸澼下痢大小便不通奔豚上氣咳逆嘔吐黃疸消渴留飲癖食堅積癥瘕驚邪癲癇鬼疰喉痹齒痛耳聾目盲金瘡踒折癰腫惡瘡痔瘻癭瘤男子五勞七傷虛乏羸瘦女子帶下崩中血閉陰蝕蟲蛇蠱毒所傷此大略宗兆其間變動枝葉各宜依端緒以取之弘景曰藥之所主止說病之一名假令中風乃有數十種傷寒證候亦有二十餘條更復就中求其類例大體歸其始終以本性為根宗然後配證以合藥爾病之變狀不可一概言之所以醫方千卷猶未盡其理春秋以前及和緩之書蔑聞而道經略載扁鵲數法其用藥猶是本草家意至漢淳于意及華佗等方今時有存者亦皆條理藥性惟張仲景一部最為眾方之祖又悉依本草但其善診脈明氣候以意消息之爾至於刳腸剖臆刮骨續筋之法乃別術所得非神農家事自晉代以來有張苗宮泰劉德史脫靳邵趙泉李子豫等一代良醫其貴勝阮德如張茂先輩逸民皇甫士安及江左葛洪蔡謨殷仲堪諸名人等並研精藥術宋有羊欣元徽胡洽秦承祖齊有尚書褚澄徐文伯嗣伯群從兄弟療病亦十愈八九凡此諸人各有所撰用方觀其指趣莫非本草者或時用別藥亦循其性度非相逾越範汪方百餘卷及葛洪肘後其中有細碎單行經用者或田舍試驗之法或殊域異識之術如藕皮散血起自庖人牽牛逐水近出野老餅店蒜齏乃是下蛇之藥路邊地菘而為金瘡所秘此蓋天地間物莫不為天地間用觸遇則會非其主對矣顏光祿亦云道經仙方服食斷谷延年卻老乃至飛丹煉石之奇云騰羽化之妙莫不以藥道為先用藥之理一同本草但制御之途小異世法所用不多遠至二十餘物或單行數種歲月深積便致大益即本草所云久服之效不如俗人微覺便止今庸醫處療皆恥看本草或倚約舊方或聞人傳說便攬筆疏之以此表奇其畏惡相反故自寡昧而藥類違僻分兩參差不以為疑偶爾值瘥則自信方驗旬月未瘳則言病源深結了不反求諸己虛構聲稱自應貽譴矣其五經四部軍國禮服少有乖越止於事蹟非宜爾至於湯藥一物有謬便性命及之千乘之君百金之長可不深思戒慎耶宗奭曰人有貴賤少長病當別論病有新久虛實理當別藥蓋人心如面各各不同惟其心不同臟腑亦異欲以一藥通治眾人之病其可得乎張仲景曰有土地高下不同物性剛柔食居亦異是故黃帝興四方之問岐伯舉四治之能且如貴豪之家形樂志苦者也衣食足則形樂而外實思慮多則志苦而內虛故病生於脈與貧下異當因人而治後世醫者委此不行所失甚矣又凡人少長老其氣血有盛壯衰三等故岐伯曰少火之氣壯壯火之氣衰蓋少火生氣壯火散氣況衰火乎故治法亦當分三等其少日服餌之藥於壯老之時皆須別處決不可忽又云人以氣血為本世有童男室女積想在心思慮過當多致勞損男則神色先散女則月水先閉蓋憂愁思慮則傷心心傷則血逆竭故神色先散而月水先閉也火既受病不能營養其子故不嗜食脾既虛則金氣虧故發嗽嗽既作水氣絕故四肢干木氣不充故多怒鬢髮焦筋痿俟五臟傳遍故卒不能死然終死矣此於諸勞最為難治或能改易心志用藥扶接間得九死一生耳有人病久嗽肺虛生寒熱以款冬花焚三兩芽俟煙出以筆管吸其煙滿口則咽之至倦乃已日作五七次遂瘥有人病瘧月餘又以藥吐下之氣遂弱觀其脈病乃夏傷暑秋又傷風因與柴胡湯一劑安後又飲食不節寒熱復作吐逆不食脅下急痛此名痰瘧以十棗湯一服下痰水數升服理中散二錢遂愈有婦人病吐逆大小便不通煩亂四肢冷漸無脈凡一日半與大承氣湯二劑至夜半大便漸通脈漸生翌日乃安此關格之病極難治經曰關則吐逆格則不得小便亦有不得大便者有人苦風痰頭痛顫掉吐逆飲食減醫以為傷冷物溫之不愈又以丸下之遂厥復與金液丹後譫言吐逆顫掉不省人狂若見鬼循衣摸床手足冷脈伏此胃中有結熱故昏瞀不省人以陽氣不能布於外陰氣不持於內即顫掉而厥遂與大承氣湯至一劑乃愈有婦人病溫已十二日診其脈六七至而澀寸稍大尺稍小發寒熱頰赤口乾不了了耳聾問之病後數日經水乃行此屬少陽熱入血室治不對症必死乃與小柴胡湯二日又加桂枝幹薑湯一日寒熱止但云我臍下急痛與抵當丸微利痛止身涼尚不了了復與小柴胡湯次日云我胸中熱燥口鼻乾又少與調胃承氣湯不利與大陷胸丸半服利三行次日虛煩不寧妄有所見狂言知有燥屎以其極虛不敢攻之與竹葉湯去其煩熱其大便自通中有燥屎數枚狂煩盡解惟咳嗽唾沫此肺虛也不治恐乘虛作肺痿以小柴胡去人參薑棗加乾薑五味子湯一日咳減二日悉痊有人年六十腳腫生瘡忽食豬肉不安醫以藥下之稍愈時出外中風汗出頭面暴腫起紫黑色多睡耳輪上有浮泡小瘡黃汁出乃與小續命湯倍加羌活服之遂愈有人年五十四素羸多中寒少年常服生硫黃數斤近服菟絲有效脈左上二部右下二部弦緊有力五七年來病右手足筋急拘攣言語稍遲遂與仲景小續命湯加薏苡仁一兩以治筋急減黃芩人參芍藥各半以避中寒杏仁只用一百五枚後云尚覺大冷因盡去人參芩芍加當歸一兩半遂安小續命湯今人多用不能逐證加減遂至危殆故舉以為例陶隱居名醫別錄合藥分劑法則古秤惟有銖兩而無分名今則以十黍為一銖六銖為一分四分成一兩十六兩為一斤雖有子谷秬黍之制從來均之已久依此用之蘇恭曰古秤皆復今南秤是也後漢以來分一斤為二斤一兩為二兩古方惟張仲景而已涉今秤若用古秤則水為殊少矣杲曰六銖為一分即二錢半也二十四銖為一兩古云三兩即今之一兩云二兩即今之六錢半也時珍曰蠶初吐絲曰忽十忽曰絲十絲曰釐四釐曰累音壘十釐曰分四累曰字二分半也十累曰銖四分也四字曰錢十分也六銖曰一分去聲二錢半也四分曰兩二十四銖也八兩曰錙二錙曰斤二十四兩曰鎰一斤半也准官秤十二兩三十斤曰鈞四鈞曰石一百二十斤也方中有曰少許者些子也今古異制古之一兩今用一錢可也今方家云等分者非分兩之分謂諸藥斤兩多少皆同爾多是丸散用之凡散云刀圭者十分方寸匕之一准如梧桐子大也方寸匕者作匕正方一寸抄散取不落為度錢五匕者即今五銖錢邊五字者抄之不落為度一撮者四刀圭也匕即匙也藥以升合分者謂藥有虛實輕重不得用斤兩則以昇平之十撮為一勺十勺為一合十合為一升升方作上徑一寸下徑六分深八分內散藥勿按抑之正爾微動令平爾時珍曰古之一升即今之二合半也量之所起為圭四圭為撮十撮為勺十勺為合十合為升十升為鬥五斗曰斛二斛曰石凡湯酒膏藥云㕮咀者謂秤畢搗之如大豆又吹去細末藥有易碎難碎多末少末今皆細切如㕮咀也恭曰㕮咀商量斟酌之也宗奭曰㕮咀有含味之意如人以口齒咀齧雖破而不塵古方多言㕮咀此義也杲曰㕮咀古制也古無鐵刃以口咬細令如麻豆煎之今人以刀銼細爾凡丸藥云如細麻者即胡麻也不必扁扁略相稱爾黍粟亦然云如大麻子者准三細麻也如胡豆者即今青斑豆也以二大麻准之如小豆者今赤小豆也以三大麻准之如大豆者以二小豆准之如梧子者以二大豆准之如彈丸及雞子黃者以四十梧子准之宗奭曰今人用古方多不效者何也不知古人之意爾如仲景治胸痹心中痞堅逆氣搶心用治中湯人參朮乾薑甘草四物共一十二兩水八升煮取三升每服一升日三服以知為度或作丸須雞子黃大皆奇效今人以一丸如楊梅許服之病既不去乃曰藥不神非藥之罪用藥者之罪也凡方云巴豆若干枚者粒有大小當去心皮秤之以一分准十六枚附子烏頭若干枚者去皮畢以半兩准一枚枳實若干枚者去瓤畢以一分准二枚橘皮一分准三枚棗大小三枚准一兩乾薑一累者以一兩為正凡方云半夏一升者洗畢秤五兩為正蜀椒一升三兩為正吳茱萸一升五兩為正菟絲子一升九兩為正庵䕡子一升四兩為正蛇床子一升三兩半為正地膚子一升四兩為正其子各有虛實輕重不可秤准者取平升為正凡方云用桂一尺者削去皮重半兩為正甘草一尺者二兩為正云某草一束者三兩為正云一把者二兩為正凡方云蜜一斤者有七合豬膏一斤者有一升二合也凡丸散藥亦先切細曝燥乃搗之有各搗者有合搗者並隨方其潤濕藥如天門冬地黃輩皆先增分兩切曝獨搗碎更曝若逢陰雨微火烘之既燥停冷搗之時珍曰凡諸草木藥及滋補藥並忌鐵器金性剋木之生髮之氣肝腎受傷也惟宜銅刀竹刀修治乃佳亦有忌銅器者並宜如法丸散須用青石碾石磨石臼其砂石者不良凡篩丸散用重密絹各篩畢更合於臼中搗數百遍色理和同乃佳也巴豆杏仁胡麻諸膏膩藥皆先熬黃搗令如膏指㩢莫結切視泯泯乃稍稍入散中合研搗散以輕疏絹篩度之再合搗勻凡煮湯欲微火令小沸其水依方大略二十兩藥用水一斗煮取四升以此為準然利湯欲生少水而多取汁補湯欲熟多水而少取汁不得令水多少用新布兩人以尺木絞之澄去垽濁紙覆令密溫湯勿用鐵器服湯寧小沸熱則易下冷則嘔湧之才曰湯中用酒須臨熟乃下之時珍曰陶氏所說乃古法也今之小小湯劑每一兩用水二甌為準多則加少則減之如劑多水少則藥味不出劑少水多又煎耗藥力也凡煎藥並忌銅鐵器宜用銀器瓦罐洗淨封固令小心者看守須識火候不可太過不及火用木炭蘆葦為佳其水須新汲味甘者流水井水沸湯等各依方詳見水部若發汗藥必用緊火熱服攻下藥亦用緊火煎熟下硝黃再煎溫服補中藥宜慢火溫服陰寒急病亦宜緊火急煎服之又有陰寒煩躁及暑月伏陰在內者宜水中沉冷服凡漬藥酒皆須細切生絹袋盛入酒密封隨寒暑日數漉出滓可曝燥微搗更漬亦可為散服時珍曰別有釀酒者或以藥煮汁和飯或以藥袋安置酒中或煮物和飯同釀皆隨方法又有煮酒者以生絹袋藥入壇密封置大鍋中水煮一日埋土中七日出火毒乃飲凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑皆先曝燥陳藏器曰凡湯中用麝香牛黃犀角羚羊角蒲黃丹砂芒硝阿膠輩須細末如粉臨時納湯中攪和服之凡合膏初以苦酒漬令淹浹不用多汁密覆勿泄云晬時者周時也從今旦至明旦亦有止一宿者煮膏當三上三下以泄其熱勢令藥味得出上之使匝匝沸乃下之使沸靜良久乃止中有薤白者以兩頭微焦黃為候有白芷附子者以小黃色為度以新布絞去滓滓亦可酒煮飲之摩膏滓可敷病上膏中有雄黃硃砂麝香輩皆別搗如面絞膏畢乃投中疾攪勿使沉聚在下有水銀胡粉者於凝膏中研令消散時珍曰凡熬貼癰疽風濕諸病膏者先以藥浸油中三日乃煎之煎至藥枯以絹濾淨煎熱下黃丹或胡粉或密陀僧三上三下煎至滴水成珠不散傾入器中以水浸三日去火毒用若用松脂者煎至成絲傾入水中拔扯數百遍乃止俱宜謹守火候勿令太過不及也其有硃砂雄黃龍腦麝香血竭乳香沒藥等料者並待膏成時投之黃丹胡粉密陀僧並須水飛瓦炒過松脂須煉數遍乃良凡丸中用蠟皆烊投少蜜中攪調以和藥杲曰丸藥用蠟取其固護藥之氣味勢力以過關膈而作效也若投以蜜下咽亦易散化如何得到臟中若有毒藥反又害之非用蠟之本意也凡用蜜皆先火煎掠去其沫令色微黃則丸藥經久不壞雷斅曰凡煉蜜每一斤止得十二兩半是數火少火過並不得用也修合丸藥用蜜只用蜜用餳只用餳用糖只用糖勿交雜用必瀉人也採藥分六氣歲物岐伯曰厥陰司天為風化在泉為酸化清毒不生少陰司天為熱化在泉為苦化寒毒不生太陰司天為濕化在泉為甘化燥毒不生少陽司天為火化在泉為苦化寒毒不生陽明司天為燥化在泉為辛化濕毒不生太陽司天為寒化在泉為咸化熱毒不生治病者必明六化分治五味五色所生五臟所宜乃可言盈虛病生之緒本乎天者天之氣本乎地者地之氣謹候氣宜無失病機司歲備物則無遺主矣歲物者天地之專精也非司歲物則氣散質同而異等也氣味有厚薄性用有躁靜治保有多少力化有淺深上淫於下所勝平之外淫於內所勝治之王冰曰化於天者為天氣化於地者為地氣五毒皆五行之氣所為故所勝者不生惟司天在泉之所生者其味正故藥工專司歲氣所收藥物則所主無遺略矣五運有餘則專精之氣藥物肥濃使用當其正氣味也不足則藥不專精而氣散物不純形質雖同力用則異矣故天氣淫於下地氣淫於內者皆以所勝平治之如風勝濕酸勝甘之類是也七方岐伯曰氣有多少形有盛衰治有緩急方有大小又曰病有遠近證有中外治有輕重近者奇之遠者偶之汗不以奇下不以偶補上治上制以緩補下治下制以急近而偶奇制小其服遠而奇偶制大其服大則數少小則數多多則九之少則二之奇之不去則偶之偶之不去則反佐以取之所謂寒熱溫涼反從其病也王冰曰臟位有高下腑氣有遠近病證有表裡藥用有輕重單方為奇複方為偶心肺為近肝腎為遠脾胃居中腸䐈胞膽亦有遠近識見高遠權以合宜方奇而分兩偶方偶而分兩奇近而偶制多數服之遠而奇制少數服之則肺服九心服七脾服五肝服三腎服一為常制也方與其重也寧輕與其毒也寧善與其大也寧小是以奇方不去偶方主之偶方不去則反佐以同病之氣而取之夫微小之熱折之以寒微小之冷消之以熱甚大寒熱則必能與異氣相格聲不同不相應氣不同不相合是以反其佐以同其氣復令寒熱參合使其始同終異也時珍曰逆者正治從者反治反佐即從治也謂熱在下而上有寒邪拒格則寒藥中入熱藥為佐下膈之後熱氣既散寒性隨發也寒在下而上有浮火拒格則熱藥中入寒藥為佐下膈之後寒氣既消熱性隨發也此寒因熱用熱因寒用之妙也溫涼仿此完素曰流變在乎病主病在乎方制方在乎人方有七大小緩急奇偶復也制方之體本於氣味寒熱溫涼四氣生於天酸苦辛咸甘淡六味成於地是以有形為味無形為氣氣為陽味為陰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽或收或散或緩或急或燥或潤或軟或堅各隨臟腑之證而施藥之品味乃分七方之制也故奇偶復者三方也大小緩急者四制之法也故曰治有緩急方有大小大方岐伯曰君一臣二佐九制之大也君一臣三佐五制之中也君一臣二制之小也又曰遠而奇偶制大其服近而奇偶制小其服大則數少小則數多多則九之少則二之完素曰身表為遠里為近大小者制奇偶之法也假如小承氣湯調胃承氣湯奇之小方也大承氣湯抵當湯奇之大方也所謂因其攻裡而用之也桂枝麻黃偶之小方也葛根青龍偶之大方也所謂因其發表而用之也故曰汗不以奇下不以偶張從正曰大方有二有君一臣三佐九之大方病有兼證而邪不一不可以一二味治者宜之有分兩大而頓服之大方肝腎及下部之病道遠者宜之王太僕以心肺為近腎肝為遠脾胃為中劉河間以身表為遠身里為近以予觀之身半以上其氣三天之分也身半以下其氣三地之分也中脘人之分也小方從正曰小方有二有君一臣二之小方病無兼證邪氣專一可一二味治者宜之有分兩少而頻服之小方心肺及在上之病者宜之徐徐細呷是也完素曰肝腎位遠數多則其氣緩不能速達於下必大劑而數少取其迅急下走也心肺位近數少則其氣急下走不能升發於上必小劑而數多取其易散而上行也王氏所謂肺服九心服七脾服五肝服三腎服一乃五臟生成之數也緩方岐伯曰補上治上制以緩補下治下制以急急則氣味厚緩則氣味薄適其至所病所遠而中道氣味之者食而過之無越其制度也王冰曰假如病在腎而心氣不足服藥宜急過之不以氣味飼心腎藥凌心心復益衰矣余上下遠近例同完素曰聖人治上不犯下治下不犯上治中上下俱無犯故曰誅伐無過命曰大惑好古曰治上必妨下治表必連里用黃芩以治肺必妨脾用蓯蓉以治腎必妨心服乾薑以治中必僭上服附子以補火必涸水從正曰緩方有五有甘以緩之之方甘草糖蜜之屬是也病在胸膈取其留戀也有丸以緩之之方比之湯散其行遲慢也有品件眾多之緩方藥眾則遞相拘制不得各騁其性也有無毒治病之緩方無毒則性純功緩也有氣味俱薄之緩方氣味薄則長於補上治上比至其下藥力已衰矣急方完素曰味厚者為陰味薄者為陰中之陽故味厚則下泄味薄則通氣氣厚者為陽氣薄為陽中之陰故氣厚則發熱氣薄則發汗是也好古曰治主宜緩緩則治其本也治客宜急急則治其標也表裡汗下皆有所當緩所當急從正曰急方有四有急病急攻之急方中風關格之病是也有湯散蕩滌之急方下咽易散而行速也有毒藥之急方毒性能上湧下泄以奪病勢也有氣味俱厚之急方氣味俱厚直趨於下而力不衰也奇方王冰曰單方也從正曰奇方有二有獨用一物之奇方病在上而近者宜之有藥合陽數一三五七九之奇方宜下不宜汗完素曰假如小承氣調胃承氣奇之小方也大承氣抵當湯奇之大方也所謂因其攻下而為之也桂枝麻黃偶之小方也葛根青龍偶之大方也所謂因其發散而用之也偶方從正曰偶方有三有兩味相配之偶方有古之二方相合之偶方古謂之複方皆病在下而遠者宜之有藥合陰數二四六八十之偶方宜汗不宜下王太僕言汗藥不以偶則氣不足以外發下藥不以奇則藥毒攻而致過意者下本易行故單行則力孤而微汗或難出故並行則力齊而大乎而仲景制方桂枝汗藥反以五味為奇大承氣下藥反以四味為偶何也豈臨事制宜復有增損乎複方岐伯曰奇之不去則偶之是謂重方好古曰奇之不去復以偶偶之不去復以奇故曰復復者再也重也所謂十補一泄數泄一補也又傷寒見風脈傷風得寒脈為脈證不相應宜以複方主之從正曰複方有三有二方三方及數方相合之複方如桂枝二越婢一湯五積散之屬是也有本方之外別加余藥如調胃承氣加連翹薄荷黃芩梔子為涼膈散之屬是也有分兩均齊之複方如胃風湯各等分之屬是也王太僕以偶為複方今七方有偶又有復豈非偶乃二方相合復乃數方相合之謂乎十劑徐之才曰藥有宣通補泄輕重澀滑燥濕十種是藥之大體而本經不言後人未述凡用藥者審而詳之則靡所遺失矣宣劑之才曰宣可去壅生薑橘皮之屬是也杲曰外感六淫之邪欲傳入里三陰實而不受逆於胸中天分氣分窒塞不通而或噦或嘔所謂壅也三陰者脾也故必破氣藥如薑橘藿香半夏之類瀉其壅塞從正曰俚人以宣為瀉又以宣為通不知十劑之中已有瀉與通矣仲景曰春病在頭大法宜吐是宣劑即湧劑也經曰高者因而越之木鬱則達之宣者升而上也以君召臣曰宣是矣凡風癇中風胸中諸實痰飲寒結胸中熱鬱上而不下久則嗽喘滿脹水腫之病生焉非宣劑莫能愈也吐中有汗如引涎追淚嚏鼻凡上行者皆吐法也完素曰鬱而不散為壅必宣以散之如痞滿不通之類是矣攻其里則宣者上也泄者下也湧劑則瓜蒂梔子之屬是矣發汗通表亦同好古曰經有五郁木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之皆宣也斅曰宣揚制曰宣朗君召臣曰宣喚臣奉君命宣布上意皆宣之意也時珍曰壅者塞也宣者布也散也鬱塞之病不升不降傳化失常或郁久生病或病久生郁必藥以宣布敷散之如承流宣化之意不獨湧越為宣也是以氣鬱有餘則香附撫芎之屬以開之不足則補中益氣以運之火鬱微則山梔青黛以散之甚則升陽解肌以發之濕鬱微則蒼朮白芷之屬以燥之甚則風藥以勝之痰鬱微則南星橘皮之屬以化之甚則瓜蒂藜蘆之屬以湧之血鬱微則桃仁紅花以行之甚則或吐或利以逐之食鬱微則山楂神麯以消之甚則上湧下利以去之皆宣劑也通劑之才曰通可去滯通草防己之屬是也完素曰留而不行必通以行之如水病為痰澼之類以木通防己之屬攻其內則留者行也滑石茯苓芫花甘遂大戟牽牛之類是也從正曰通者流通也前後不得溲便宜木通海金沙琥珀大黃之屬通之痹痛鬱滯經隧不利亦宜通之時珍曰滯留滯也濕熱之邪留於氣分而為痛痹癃閉者宜淡味之藥上助肺氣下降通其小便而泄氣中之滯木通豬苓之類是也濕熱之邪留於血分而為痹痛腫注二便不通者宜苦寒之藥下引通其前後而泄血中之滯防己之類是也經曰味薄者通故淡味之藥謂之通劑補劑之才曰補可去弱人參羊肉之屬是也杲曰人參甘溫能補氣虛羊肉甘熱能補血虛羊肉補形人參補氣凡氣味與二藥同者皆是也從正曰五臟各有補瀉五味各補其臟有表虛裡虛上虛下虛陰虛陽虛氣虛血虛經曰精不足者補之以味形不足者補之以氣五穀五菜五果五肉皆補養之物也時珍曰經云不足者補之又云虛則補其母生薑之辛補肝炒鹽之咸補心甘草之甘補脾五味子之酸補肺黃柏之苦補腎又如茯神之補心氣生地黃之補心血人參之補脾氣白芍藥之補脾血黃耆之補肺氣阿膠之補肺血杜仲之補腎氣熟地黃之補腎血芎藭之補肝氣當歸之補肝血之類皆補劑不特人參羊肉為補也泄劑之才曰泄可去閉葶藶大黃之屬是也杲曰葶藶苦寒氣味俱厚不減大黃能泄肺中之閉又泄大腸大黃走而不守能泄血閉腸胃渣穢之物一泄氣閉利小便一泄血閉利大便凡與二藥同者皆然從正曰實則瀉之諸痛為實痛隨利減芒硝大黃牽牛甘遂巴豆之屬皆瀉劑也其催生下乳磨積逐水破經泄氣凡下行者皆下法也時珍曰去閉當作去實經云實者瀉之實則瀉其子是矣五臟五味皆有瀉不獨葶藶大黃也肝實瀉以芍藥之酸心實瀉以甘草之甘脾實瀉以黃連之苦肺實瀉以石膏之辛腎實瀉以澤瀉之咸是矣輕劑之才曰輕可去實麻黃葛根之屬是也從正曰風寒之邪始客皮膚頭痛身熱宜解其表內經所謂輕而揚之也癰瘡疥痤俱宜解表汗以泄之毒以熏之皆輕劑也幾熏洗蒸炙熨烙刺砭導引按摩皆汗法也時珍曰當作輕可去閉有表閉里閉上閉下閉表閉者風寒傷營腠理閉密陽氣怫鬱不能外出而為發熱惡寒頭痛脊強諸病宜輕揚之劑發其汗而表自解也里閉者火熱鬱抑津液不行皮膚干閉而為肌熱煩熱頭痛目腫昏瞀瘡瘍諸病宜輕揚之劑以解其肌而火自散也上閉有二一則外寒內熱上焦氣閉發為咽喉閉痛之證宜辛涼之劑以揚散之則閉自開一則飲食寒冷抑遏陽氣在下發為胸膈痞滿閉塞之證宜揚其清而抑其濁則痞自泰也下閉亦有二有陽氣陷下發為裡急後重數至圊而不行之證但升其陽而大便自順所謂下者舉之也有燥熱傷肺金氣膹郁竅閉於上而膀胱閉於下為小便不利之證以升麻之類探而吐之上竅通而小便自利矣所謂病在下取之上也重劑之才曰重可去怯磁石鐵粉之屬是也從正曰重者鎮縋之謂也怯則氣浮如喪神守而驚悸氣上硃砂水銀沉香黃丹寒水石之倫皆體重也久病咳嗽涎潮於上形羸不可攻者以此縋之經云重者因而減之貴其漸也時珍曰重劑凡四有驚則氣亂而魂氣飛揚如喪神守者有怒則氣逆而肝火激烈病狂善怒者並鐵粉雄黃之類以平其肝有神不守舍而多驚健忘迷惑不寧者宜硃砂紫石英之類以鎮其心有恐則氣下精志失守而畏如人將捕者宜磁石沉香之類以安其腎大抵重劑壓浮火而墜痰涎不獨治怯也故諸風掉眩及驚癇痰喘之病吐逆不止及反胃之病皆浮火痰涎為害俱宜重劑以墜之滑劑之才曰滑可去著冬葵子榆白皮之屬是也完素曰澀則氣著必滑劑以利之滑能養竅故潤利也從正曰大便燥結宜麻仁郁李之類小便淋瀝宜葵子滑石之類前後不通兩陰俱閉也名曰三焦約約者束也宜先以滑劑潤養其燥然後攻之時珍曰著者有形之邪留著於經絡臟腑之間也便尿濁帶痰涎胞胎癰腫之類是矣皆宜滑藥以引去其留著之物此與木通豬苓通以去滯相類而不同木通豬苓淡泄之物去濕熱無形之邪葵子榆皮甘滑之類去濕熱有形之邪故彼曰滯此曰著也大便澀者菠菱牽牛之屬小便澀者車前榆皮之屬精竅澀者黃柏葵花之屬胞胎澀者黃葵子王不留行之屬引痰涎自小便去者則半夏茯苓之屬引瘡毒自小便去者則五葉藤萱草根之屬皆滑劑也半夏南星皆辛而涎滑能泄濕氣通大便蓋辛能潤能走氣能化液也或以為燥物謬矣濕去則土燥非二物性燥也澀劑之才曰澀可去脫牡蠣龍骨之屬是也完素曰滑則氣脫如開腸洞泄便溺遺失之類必澀劑以收斂之從正曰寢汗不禁澀以麻黃根防風滑泄不已澀以豆蔻枯礬木賊罌粟殼喘嗽上奔澀以烏梅訶子凡酸味同乎澀者收斂之義也然此種皆宜先攻其本而後收之可也時珍曰脫者氣脫也血脫也精脫也神脫也脫則散而不收故用酸澀溫平之藥以斂其耗散汗出亡陽精滑不禁泄痢不止大便不固小便自遺久嗽亡津皆氣脫也下血不已崩中暴下諸大亡血皆血脫也牡蠣龍骨海螵蛸五倍子五味子烏梅榴皮訶黎勒罌粟殼蓮房棕灰赤石脂麻黃根之類皆澀藥也氣脫兼以氣藥血脫兼以血藥及兼氣藥氣者血之帥也脫陽者見鬼脫陰者目盲此神脫也非澀藥所能收也燥劑之才曰燥可去濕桑白皮赤小豆之屬是也完素曰濕氣淫勝腫滿脾濕必燥劑以除之桑皮之屬濕勝於上以苦吐之以淡滲之是也從正曰積寒久冷吐利腥穢上下所出水液澄徹清冷此大寒之病宜薑附胡椒輩以燥之若病濕氣則白朮陳皮木香蒼朮之屬除之亦燥劑也而黃連黃柏梔子大黃其味皆苦苦屬火皆能燥濕此內經之本旨也豈獨薑附之儔為燥劑乎好古曰濕有在上在中在下在經在皮在裡時珍曰濕有外感有內傷外感之濕雨露嵐霧地氣水濕襲於皮肉筋骨經絡之間內傷之濕生於水飲酒食及脾弱腎強固不可一例言也故風藥可以勝濕燥藥可以除濕淡藥可以滲濕泄小便可以引濕利大便可以逐濕吐痰涎可以祛濕濕而有熱苦寒之劑燥之濕而有寒辛熱之劑燥之不獨桑皮小豆為燥劑也濕去則燥故謂之燥濕劑之才曰濕可去枯白石英紫石英之屬是也從正曰濕者潤濕也雖與滑類少有不同經云辛以潤之辛能走氣能化液故也鹽硝味雖咸屬真陰之水誠濡枯之上藥也人有枯涸皴揭之病非獨金化蓋有火以乘之故非濕劑不能愈完素曰津耗為枯五臟痿弱營衛涸流必濕劑以潤之好古曰有減氣而枯有減血而枯時珍曰濕劑當作潤劑枯者燥也陽明燥金之化秋令也風熱怫甚則血液枯涸而為燥病上燥則渴下燥則結筋燥則強皮燥則揭肉燥則裂骨燥則枯肺燥則痿腎燥則消凡麻仁阿膠膏潤之屬皆潤劑也養血則當歸地黃之屬生津則麥門冬栝蔞根之屬益精則蓯蓉枸杞之屬若但以石英為潤藥則偏矣古人以服石為滋補故爾劉完素曰制方之體欲成七方十劑之用者必本於氣味也寒熱溫涼四氣生於天酸苦辛咸甘淡六味成乎地是以有形為味無形為氣氣為陽味為陰陽氣出上竅陰味出下竅氣化則精生味化則形長故地產養形形不足者溫之以氣天產養精精不足者補之以味辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽辛散酸收甘緩苦堅咸軟各隨五臟之病而製藥性之品味故方有七劑有十方不七不足以盡方之變劑不十不足以盡劑之用方不對證非方也劑不蠲疾非劑也此乃太古先師設繩墨而取曲直叔世方士乃出規矩以為方圓夫物各有性制而用之變而通之施於品劑其功用豈有窮哉如是有因其性為用者有因其所勝而為制者有氣同則相求者有氣相剋則相制者有氣有餘而補不足者有氣相感則以意使者有質同而性異者有名異而實同者故蛇之性上竄而引藥蟬之性外脫而退翳虻飲血而用以治血鼠善穿而用以治漏所謂因其性而為用者如此弩牙速產以機發而不括也杵糠下噎以杵築下也所謂因其用而為使者如此浮萍不沉水可以勝酒獨活不搖風可以治風所謂因其所勝而為制也如此麻木谷而治風豆水穀而治水所謂氣相同則相求者如此牛土畜乳可以止渴疾豕水畜心可以鎮恍惚所謂因其氣相剋則相制也如此熊肉振羸兔肝明視所謂其氣有餘補不足也如此鯉之治水鶩之利水所謂因其氣相感則以意使者如此蜜成於蜂蜜溫而蜂寒油生於麻麻溫而油寒茲同質而異性也蘼蕪生於芎藭蓬蘽生於覆盆茲名異而實同者也所以如此之類不可勝舉故天地賦形不離陰陽形色自然皆有法象毛羽之類生於陽而屬於陰鱗甲之類生於陰而屬於陽空青法木色青而主肝丹砂法火色赤而主心雲母法金色白而主肺磁石法水色黑而主腎黃石脂法土色黃而主脾故觸類而長之莫不有自然之理也欲為醫者上知天文下知地理中知人事三者俱明然後可以語人之疾病不然則如無目夜遊無足登涉動致顛殞而欲愈疾者未之有也雷斅炮炙論序曰若夫世人使藥豈知自有君臣既辨君臣寧分相制只如栨毛今鹽草也沾溺立銷斑腫之毒象膽揮黏乃知藥有情異鮭魚插樹立便乾枯用狗膽塗之以犬膽灌之插魚處立如故也卻當榮盛無名無名異形似玉仰面又如石炭味別止楚截指而似去甲毛聖石開盲明目而如雲離日當歸止血破血頭尾效各不同頭止血尾破血蕤子熟生足睡不眠立據弊箅淡滷常使者甑中箅能淡鹽味如酒沾交今蜜枳繳枝又云交加枝鐵遇神砂如泥似粉石經鶴糞化作塵飛栨見橘花似髓斷絃折劍遇鸞血而如初以鸞血煉作膠黏折處鐵物永不斷海竭江枯投遊波燕子是也而立泛令鉛拒火須仗修天今呼為補天石如要形堅豈忘紫背有紫背天葵如常食葵菜只是背紫面青能堅鉛形留砒住鼎全賴宗心別有宗心草今呼石竹不是食者粽心恐誤其草出歘州生處多蟲獸雌得芹花其草名為立起其形如芍藥花色青可長三尺以來葉上黃斑色味苦澀堪用煮雌黃立住火立便成庾硇遇赤須其草名赤須今呼為虎鬚草是用煮硇砂即生火水留金鼎水中生火非猾髓而莫能海中有獸名曰猾以髓入在油中其油黏水水中火生不可救之用酒噴之即止勿於屋下收長齒生牙賴雄鼠之骨末其齒若年多不生者取雄鼠脊骨作末揩折處齒立生如故發眉墮落塗半夏而立生眉發墮落者以生半夏莖杵之取涎塗發落處立生目闢眼𥍃有五花而自正五加皮其葉有雄雌三葉為雄五葉為雌須使五葉者作末酒浸飲之其目𥍃者正腳生肉栨裩系菪根腳有肉栨者取莨菪根於裩帶上系之感應永不痛囊皺漩多夜煎竹木多小便者夜煎萆薢一件服之永不夜起也體寒腹大全賴鸕鷀若患腹大如鼓米飲調鸕鷀末服立愈如故也血泛經過飲調瓜子甜瓜子內仁搗作末去油飲調服之立絕咳逆數數酒服熟雄天雄泡過以酒調一錢服立定也遍體疹風冷調生側附子旁生者為側子作末冷酒服立瘥也腸虛瀉痢須假草零搗五倍子作末以熟水下之立止也久渴心煩宜投竹瀝除症去塊全仗硝硇硝硇即硇砂硝石二味於乳缽中研作粉同煅了酒服神效也益食加觴須煎蘆樸不食者並飲酒少者煎逆水蘆根並厚朴二味湯服強筋健骨須是蓯鱔蓯蓉並鱔魚二味作末以黃精汁丸服之可力倍常也出乾寧記中駐色延年精蒸神錦黃精自然汁拌細研神錦於柳木甑中蒸七日了以木蜜丸服顏貌可如幼女之容色也知瘡所在口點陰膠陰膠即是甑中氣垢少許於口中可知臟腑所起直至住處知痛乃可醫也產後肌浮甘皮酒服產後肌浮酒服甘皮立愈口瘡舌坼立愈黃蘇口瘡舌坼以根黃塗酥炙作末含之立瘥腦痛欲亡鼻投硝末頭痛者以硝石作末內鼻中立止心痛欲死速覓延胡以延胡索作散酒服之立愈如斯百種是藥之功某忝遇明時謬看醫理雖尋聖法難可窮微略陳藥餌之功能豈溺仙人之要術其製藥炮熬煮炙不能記年月哉欲審元由須看海集某不量短見直錄炮熬煮炙列藥制方分為上中下三卷有三百件名具陳於後氣味陰陽陰陽應象論曰積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形陽為氣陰為味味歸形形歸氣氣歸精精歸化精食氣形食味化生精氣生形味傷形氣傷精精化為氣氣傷於味陰味出下竅陽氣出上竅清陽發腠理濁陰走五臟清陽實四肢濁陰歸六腑味厚者為陰薄者為陰中之陽氣厚者為陽薄者為陽中之陰味厚則泄薄則通氣薄則發泄厚則發熱辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或潤或燥或軟或堅以所利而行之調其氣使之平也元素曰清之清者發腠理清之濁者實四肢濁之濁者歸六腑濁之清者走五臟附子氣厚為陽中之陽大黃味厚為陰中之陰茯苓氣薄為陽中之陰所以利小便入手太陽不離陽之體也麻黃味薄為陰中之陽所以發汗入手太陰不離陰之體也凡同氣之物必有諸味同味之物必有諸氣氣味各有厚薄故性用不同杲曰味之薄者則通酸苦咸平是也味之厚者則泄咸苦酸寒是也氣之厚者發熱辛甘溫熱是也氣之薄者滲泄甘淡平涼是也滲謂小汗泄謂利小便也宗奭曰天地既判生萬物者五氣耳五氣定位則五味生故曰生物者氣也成之者味也以奇生則成而偶以偶生則成而奇寒氣堅故其味可用以軟熱氣軟故其味可用以堅風氣散故其味可用以收燥氣收故其味可用以散土者沖氣之所生沖氣則無所不和故其味可用以緩氣堅則壯故苦可以養氣脈軟則和故咸可以養脈骨收則強故酸可以養骨筋散則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以軟收之而後可以散欲緩則用甘不欲則弗用用之不可太過太過亦病矣古之養生治疾者必先通乎此否則能以人之疾者蓋寡矣李杲曰夫藥有溫涼寒熱之氣辛甘淡酸苦咸之味也升降浮沉之相互厚薄陰陽之不同一物之內氣味兼有一藥之中理性具焉或氣一而味殊或味同而氣異氣象天溫熱者天之陽涼寒者天之陰天有陰陽風寒暑濕燥火三陰三陽上奉之也味象地辛甘淡者地之陽酸苦咸者地之陰地有陰陽金木水火土生長化收藏下應之也氣味薄者輕清成象本乎天者親上也氣味厚者重濁成形本乎地者親下也好古曰本草之味有五氣有四然一味之中有四氣如辛味則石膏寒桂附熱半夏溫薄荷涼之類是也夫氣者天也溫熱天之陽寒涼天之陰陽則升陰則降味者地也辛甘淡地之陽酸苦咸地之陰陽則浮陰則沉有使氣者使味者氣味俱使者先使氣而後使味者先使味而後使氣者有一物一味者一物三味者一物一氣者一物二氣者或生熟異氣味或根苗異氣味或溫多而成熱或涼多而成寒或寒熱各半而成溫或熱者多寒者少寒不為之寒或寒者多熱者少熱不為之熱不可一途而取也或寒熱各半晝服則從熱之屬而升夜服則從寒之屬而降或晴則從熱陰則從寒變化不一如此況四時六位不同五運六氣各異可以輕用為哉六節臟象論云天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生又曰形不足者溫之以氣精不足者補之以味王冰曰五氣者燥氣湊肝焦氣湊心香氣湊脾腥氣湊肺腐氣湊腎也心榮色肺主音故氣藏於心肺而明色彰聲也氣為水之母故味藏於腸胃而養五氣孫思邈曰精以食氣氣養精以榮色形以食味味養形以生力精順五氣以靈形受五味以成若食氣相反則傷精食味不調則損形是以聖人先用食禁以存生後製藥物以防命氣味溫補以存精形五味宜忌岐伯曰木生酸火生苦土生甘金生辛水生咸辛散酸收甘緩苦堅咸軟毒藥攻邪五穀為養五果為助五畜為益五菜為充氣味合而服之以補精益氣此五味各有所利四時五臟病隨所宜也又曰陰之所生本在五味陰之五宮傷在五味骨正筋柔氣血以流腠理以密骨氣以精長有天命又曰聖人春夏養陽秋冬養陰以從其根二氣常存春食涼夏食寒以養陽秋食溫冬食熱以養陰五欲肝欲酸心欲苦脾欲甘肺欲辛腎欲咸此五味合五臟之氣也五宜青色宜酸肝病宜食麻犬李韭赤色宜苦心病宜食麥羊杏薤黃色宜甘脾病宜食粳牛棗葵白色宜辛肺病宜食黃黍雞桃蔥黑色宜咸腎病宜食大豆黃卷豬慄藿五禁肝病禁辛宜食甘粳牛棗葵心病禁咸宜食酸麻犬李韭脾病禁酸宜食鹹大豆豕慄藿肺病禁苦宜食苦麥羊杏薤腎病禁甘宜食辛黃黍雞桃蔥思邈曰春宜省酸增甘以養脾夏宜省苦增辛以養肺秋宜省辛增酸以養肝冬宜省咸增苦以養心四季宜省甘增咸以養腎時珍曰五欲者五味入胃喜歸本臟有餘之病宜本味通之五禁者五臟不足之病畏其所勝而宜其所不勝也五走酸走筋筋病毋多食酸多食令人癃酸氣澀收胞得酸而縮卷故水道不通也苦走骨骨病毋多食苦多食令人變嘔苦入下脘三焦皆閉故變嘔也甘走肉肉病毋多食甘多食令人悗心甘氣柔潤胃柔則緩緩則蟲動故悗心也辛走氣氣病毋多食辛多食令人洞心辛走上焦與氣俱行久留心下故洞心也咸走血血病毋多食鹹多食令人渴血與咸相得則凝凝則胃汁注之故咽路焦而舌本干九針論作咸走骨骨病毋多食鹹苦走血血病毋多食苦五傷酸傷筋辛勝酸苦傷氣咸勝苦甘傷肉酸勝甘辛傷皮毛苦勝辛咸傷血甘勝咸五過味過於酸肝氣以津脾氣乃絕肉胝䐢而唇揭味過於苦脾氣不濡胃氣乃厚皮槁而毛拔味過於甘心氣喘滿色黑腎氣不平骨痛而發落味過於辛筋脈沮絕精神乃失筋急而爪枯味過於咸大骨氣勞短肌心氣抑脈凝澀而變色時珍曰五走五傷者本臟之味自傷也即陰之五宮傷在五味也五過者本臟之味伐其所勝也即臟氣偏勝也五味偏勝岐伯曰五味入胃各歸所喜酸先入肝苦先入心甘先入脾辛先入肺咸先入腎久而增氣物化之常氣增而久夭之由也王冰曰入肝為溫入心為熱入肺為清入腎為寒入脾為至陰而四氣兼之皆為增其味而益其氣故各從本臟之氣久則從化故久服黃連苦參反熱從苦化也餘味仿此氣增不已則臟氣偏勝必有偏絕臟有偏絕必有暴夭是以藥不具五味不備四氣而久服之雖暫獲勝久必致夭故絕粒服餌者不暴亡無五味資助也杲曰一陰一陽之謂道偏陰偏陽之謂疾陽劑剛勝積若燎原為消狂癰疽之屬則天癸竭而榮涸陰劑柔勝積若凝水為洞泄寒中之病則真火微而衛散故大寒大熱之藥當從權用之氣平而止有所偏助令人臟氣不平夭之由也標本陰陽李杲曰夫治病者當知標本以身論之外為標內為本陽為標陰為本故六腑屬陽為標五臟屬陰為本臟腑在內為本十二經絡在外為標而臟腑陰陽氣血經絡又各有標本焉以病論之先受為本後傳為標故百病必先治其本後治其標否則邪氣滋甚其病益蓄縱先生輕病後生重病亦先治其輕後治其重則邪氣乃伏有中滿及病大小便不利則無問先後標本必先治滿及大小便為其急也故曰緩則治其本急則治其標又從前來者為實邪後來者為虛邪實則瀉其子虛則補其母假如肝受心火為前來實邪當於肝經刺榮穴以瀉心火為先治其本於心經刺榮穴以瀉心火為後治其標用藥則入肝之藥為引用瀉心之藥為君經云本而標之先治其本後治其標是也又如肝受腎水為虛邪當於腎經刺井穴以補肝木為先治其標後於肝經刺合穴以瀉腎水為後治其本用藥則入腎之藥為引補肝之藥為君經云標而本之先治其標後治其本是也升降浮沉李杲曰藥有升降浮沉化生長收藏成以配四時春升夏浮秋收冬藏土居中化是以味薄者升而生氣薄者降而收氣厚者浮而長味厚者沉而藏氣味平者化而成但言補之以辛甘溫熱及氣味之薄者即助春夏之升浮便是瀉秋冬收藏之藥也在人之身肝心是矣但言補之以酸苦咸寒及氣味之厚者即助秋冬之降沉便是瀉春夏生長之藥也在人之身肺腎是矣淡味之藥滲即為升泄即為降佐使諸藥者也用藥者循此則生逆此則死縱令不死亦危困矣王好古曰升而使之降須知抑也沉而使之浮須知載也辛散也而行之也橫甘發也而行之也上苦泄也而行之也下酸收也其性縮咸軟也其性舒其不同如此鼓掌成聲沃火成沸二物相合象在其間矣五味相制四氣相和其變可輕用哉本草不言淡味涼氣亦缺文也味薄者升甘平辛平辛微溫微苦平之藥是也氣薄者降甘寒甘涼甘淡寒涼酸溫酸平鹹平之藥是也氣厚者浮甘熱辛熱之藥是也味厚者沉苦寒鹹寒之藥是也氣味平者兼四氣四味甘平甘溫甘涼甘辛平甘微苦平之藥是也李時珍曰酸鹹無升甘辛無降寒無浮熱無沉其性然也而升者引之以鹹寒則沉而直達下焦沉者引之以酒則浮而上至顛頂此非窺天地之奧而達造化之權者不能至此一物之中有根升梢降生升熟降是升降在物亦在人也四時用藥例李時珍曰經云必先歲氣毋伐天和又曰升降浮沉則順之寒熱溫涼則逆之故春月宜加辛溫之藥薄荷荊芥之類以順春升之氣夏月宜加辛熱之藥香薷生薑之類以順夏浮之氣長夏宜加甘苦辛溫之藥人參白朮蒼朮黃柏之類以順化成之氣秋月宜加酸溫之藥芍藥烏梅之類以順秋降之氣冬月宜加苦寒之藥黃芩知母之類以順冬沉之氣所謂順時氣而養天和也經又云春省酸增甘以養脾氣夏省苦增辛以養肺氣長夏省甘增咸以養腎氣秋省辛增酸以養肝氣冬省咸增苦以養心氣此則既不伐天和而又防其太過所以體天地之大德也昧者捨本從標春用辛涼以伐木夏用鹹寒以抑火秋用苦溫以泄金冬用辛熱以涸水謂之時藥殊背素問逆順之理以夏月伏陰冬月伏陽推之可知矣雖然月有四時日有四時或春得秋病夏得冬病神而明之機而行之變通權宜又不可泥一也王好古曰四時總以芍藥為脾劑蒼朮為胃劑柴胡為時劑十一臟皆取決於少陽為發生之始故也凡用純寒純熱之藥及寒熱相雜並宜用甘草以調和之惟中滿者禁用甘爾五運六淫用藥式厥陰司天巳亥年風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之王注云厥陰氣未為盛熱故以涼藥平之清反勝之治以酸溫佐以甘苦少陰司天子午年熱淫所勝平以鹹寒佐以苦甘以酸收之寒反勝之治以甘溫佐以苦酸辛太陰司天丑未年濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之濕上甚而熱治以苦溫佐以甘辛以汗為故身半以上濕氣有餘火氣復郁則宜解表流汗而祛之也熱反勝之治以苦寒佐以苦酸少陽司天寅申年火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之熱氣已退時發動者是為心虛氣散不斂以酸收之仍兼寒助乃能除根熱見太甚則以苦發之汗已便涼是邪氣盡汗已猶熱是邪未盡則以酸收之已汗又熱又汗復熱是臟虛也則補其心可也寒反勝之治以甘熱佐以苦辛陽明司天卯酉年燥淫所勝平以苦溫佐以酸辛以苦下之制燥之法以苦溫宜下必以苦宜補必以酸宜瀉必以辛熱反勝之治以辛寒佐以苦甘太陽司天辰戌年寒淫所勝平以辛熱佐以苦甘以咸瀉之熱反勝之治以鹹冷佐以苦辛厥陰在泉寅申年風淫於內治以辛涼佐以苦以甘緩之以辛散之風喜溫而惡清故以辛涼勝之估以苦隨所利也木苦急以甘緩之木苦抑以辛散之清反勝之治以酸溫佐以苦甘以辛平之少陰在泉卯酉年熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之熱性惡寒故以鹹寒熱甚於表以苦發之不盡復寒制之寒制不盡復苦發之以酸收之甚者再方微者一方可使必已時發時止亦以酸收之寒反勝之治以甘熱佐以苦辛以鹹平之太陰在泉辰戌年濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之濕與燥反故以苦熱佐以酸淡利竅也熱反勝之治以苦冷佐以鹹甘以苦平之少陽在泉巳亥年火淫於內治以鹹冷佐以苦辛以酸收之以苦發之火氣大行於心腹咸性柔軟以制之以酸收其散氣大法須汗者以辛佐之寒反勝之治以甘熱佐以苦辛以鹹平之陽明在泉子午年燥淫於內治以苦溫佐以甘辛以苦下之溫利涼性故以苦下之熱反勝之治以平寒佐以苦甘以酸平之以和為利太陽在泉丑未年寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之以熱治寒是為摧勝折其氣也熱反勝之治以鹹冷佐以甘辛以苦平之李時珍曰司天主上半年天氣司之故六淫謂之所勝上淫於下也故曰平之在泉主下半年地氣司之故六淫謂之於內外淫於內也故曰治之當其時而反得勝己之氣者謂之反勝六氣之勝何以徵之燥甚則地干暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂火勝則地涸是也其六氣勝復主客證治病機甚詳見素問至真要大論文多不載六腑六臟用藥氣味補瀉肝膽溫補涼瀉辛補酸瀉心小腸熱補寒瀉咸補甘瀉肺大腸涼補溫瀉酸補辛瀉腎膀胱寒補熱瀉苦補咸瀉脾胃溫熱補寒涼瀉各從其宜甘補苦瀉三焦命門同心張元素曰五臟更相平也一臟不平所勝平之故云安穀則昌絕谷則亡水去則營散谷消則衛亡神無所居故血不可不養衛不可不溫血溫氣和營衛乃行常有天命五臟五味補瀉肝苦急急食甘以緩之甘草以酸瀉之赤芍藥實則瀉子甘草欲散急食辛以散之川芎以辛補之細辛虛則補母地黃黃柏心苦緩急食酸以收之五味子以甘瀉之甘草參耆實則瀉子甘草欲軟急食鹹以軟之芒硝以咸補之澤瀉虛則補母生薑脾苦濕急食苦以燥之白朮以苦瀉之黃連實則瀉子桑白皮欲緩急食甘以緩之炙甘草以甘補之人參虛則補母炒鹽肺苦氣上逆急食苦以泄之訶子以辛瀉之桑白皮實則瀉子澤瀉欲收急食酸以收之白芍藥以酸補之五味子虛則補母五味子腎苦燥急食辛以潤之黃柏知母以咸瀉之澤瀉實則瀉子芍藥欲堅急食苦以堅之知母以苦補之黃柏虛則補母五味子張元素曰凡藥之五味隨五臟所入而為補瀉亦不過因其性而調之酸入肝苦入心甘入脾辛入肺鹹入腎辛主散酸主收甘主緩苦主堅咸主軟辛能散結潤燥致津液通氣酸能收緩斂散甘能緩急調中苦能燥濕堅軟咸能軟堅淡能利竅李時珍曰甘緩酸收苦燥辛散咸軟淡滲五味之本性一定而不變者也其或補或瀉則因五臟四時而迭相施用者也溫涼寒熱四氣之本性也其於五臟補瀉亦迭相施用也此特潔古張氏因素問飲食補瀉之義舉數藥以為例耳學者宜因意而充之臟腑虛實標本用藥式肝藏魂屬木膽火寄於中主血主目主筋主呼主怒本病諸風眩暈僵仆強直驚癇兩脅腫痛胸肋滿痛嘔血小腹疝痛痃瘕女人經病標病寒熱瘧頭痛吐涎目赤面青多怒耳閉頰腫筋攣卵縮丈夫㿗疝女人少腹腫痛陰病有餘瀉之瀉子甘草行氣香附芎藭瞿麥牽牛青橘皮行血紅花鱉甲桃仁莪朮京三稜穿山甲大黃水蛭虻蟲蘇木牡丹皮鎮驚雄黃金箔鐵落真珠代赭石夜明砂胡粉銀箔鉛丹龍骨石決明搜風羌活荊芥薄荷槐子蔓荊子白花蛇獨活防風皂莢烏頭白附子殭蠶蟬蛻不足補之補母枸杞杜仲狗脊熟地黃苦參萆薢阿膠菟絲子補血當歸牛膝續斷白芍藥血竭沒藥芎藭補氣天麻柏子仁白朮菊花細辛密蒙花決明穀精草生薑本熱寒之瀉木芍藥烏梅澤瀉瀉火黃連龍膽草黃芩苦茶豬膽攻裡大黃標熱發之和解柴胡半夏解肌桂枝麻黃心藏神為君火包絡為相火代君行令主血主言主汗主笑本病諸熱瞀瘛驚惑譫妄煩亂啼笑罵詈怔忡健忘自汗諸痛癢瘡瘍標病肌熱畏寒戰慄舌不能言面赤目黃手心煩熱胸脅滿痛引腰背肩胛肘臂火實瀉之瀉子黃連大黃氣甘草人參赤茯苓木通黃柏血丹參牡丹生地黃玄參鎮驚硃砂牛黃紫石英神虛補之補母細辛烏梅酸棗仁生薑陳皮氣桂心澤瀉白茯苓茯神遠志石菖蒲血當歸乳香熟地黃沒藥本熱寒之瀉火黃芩竹葉麥門冬芒硝炒鹽涼血地黃梔子天竺黃標熱發之散火甘草獨活麻黃柴胡龍腦脾藏意屬土為萬物之母主營衛主味主肌肉主四肢本病諸濕腫脹痞滿噫氣大小便閉黃疸痰飲吐瀉霍亂心腹痛飲食不化標病身體胕腫重困嗜臥四肢不舉舌本強痛足大趾不用九竅不通諸痙項強土實瀉之瀉子訶子防風桑白皮葶藶吐豆豉梔子蘿蔔子常山瓜蒂鬱金齏汁藜蘆苦參赤小豆鹽湯苦茶下大黃芒硝青礞石大戟甘遂續隨子芫花土虛補之補母桂心茯苓氣人參黃耆升麻葛根甘草陳橘皮藿香葳蕤縮砂仁木香扁豆血白朮蒼朮白芍藥膠飴大棗乾薑木瓜烏梅蜂蜜本濕除之燥中宮白朮蒼朮橘皮半夏吳茱萸南星草豆蔻白芥子潔淨府木通赤茯苓豬苓藿香標濕滲之開鬼門葛根蒼朮麻黃獨活肺藏魄屬金總攝一身元氣主聞主哭主皮毛本病諸氣膹郁諸痿喘嘔氣短咳嗽上逆咳唾膿血不得臥小便數而欠遺失不禁標病灑淅寒熱傷風自汗肩背痛冷臑臂前廉痛氣實瀉之瀉子澤瀉葶藶桑白皮地骨皮除濕半夏白礬白茯苓薏苡仁木瓜橘皮瀉火粳米石膏寒水石知母訶子通滯枳殼薄荷乾生薑木香厚朴杏仁皂莢桔梗紫蘇梗氣虛補之補母甘草人參升麻黃耆山藥潤燥蛤蚧阿膠麥門冬貝母百合天花粉天門冬斂肺烏梅粟殼五味子芍藥五倍子本熱清之清金黃芩知母麥門冬梔子沙參紫菀天門冬本寒溫之溫肺丁香藿香款冬花檀香白豆蔻益智縮砂糯米百部標寒散之解表麻黃蔥白紫蘇腎藏志屬水為天一之源主聽主骨主二陰本病諸寒厥逆骨痿腰痛腰冷如冰足胻腫寒少腹滿急疝瘕大便閉泄吐利腥穢水液澄徹清冷不禁消渴引飲標病發熱不惡熱頭眩頭痛咽痛舌燥脊股後廉痛水強瀉之瀉子大戟牽牛瀉腑澤瀉豬苓車前子防己茯苓水弱補之補母人參山藥氣知母玄參補骨脂砂仁苦參血黃柏枸杞熟地黃鎖陽肉蓯蓉山茱萸阿膠五味子本熱攻之下傷寒少陰證口燥咽乾大承氣湯寒溫之溫里附子乾薑官桂蜀椒白朮標寒解之解表麻黃細辛獨活桂枝標熱涼之清熱玄參連翹甘草豬膚命門為相火之原天地之始藏精生血降則為漏升則為鉛主三焦元氣本病前後癃閉氣逆裡急疝痛奔豚消渴膏淋精漏精寒赤白濁溺血崩中帶漏火強瀉之瀉相火黃柏知母牡丹皮地骨皮生地黃茯苓玄參寒水石火弱補之益陽附子肉桂益智子破故紙沉香川烏頭硫黃天雄烏藥陽起石舶茴香胡桃巴戟天丹砂當歸蛤蚧覆盆精脫固之澀滑牡蠣芡實金櫻子五味子遠志山茱萸蛤粉三焦為相火之用分布命門元氣主升降出入遊行天地之間總領五臟六腑營衛經絡內外上下左右之氣號中清之府上主納中主化下主出本病諸熱瞀瘛暴病暴死暴喑躁擾狂越譫妄驚駭諸血溢血泄諸氣逆衝上諸瘡瘍痘疹瘤核上熱則喘滿諸嘔吐酸胸痞脅痛食飲不消頭上出汗中熱則善飢而瘦解㑊中滿諸脹腹大諸病有聲鼓之如鼓上下關格不通霍亂吐利下熱則暴注下迫水液渾濁下部腫滿小便淋瀝或不通大便閉結下痢上寒則吐飲食痰水胸痹前後引痛食已還出中寒則飲食不化寒脹反胃吐水濕瀉不渴下寒則二便不禁臍腹冷疝痛標病惡寒戰慄如喪神守耳鳴耳聾嗌腫喉痹諸病胕腫疼酸驚駭手小指次指不用實火瀉之汗麻黃柴胡葛根荊芥升麻薄荷羌活石膏吐瓜蒂滄鹽齏汁下大黃芒硝虛火補之上人參天雄桂心中人參黃耆丁香木香草果下附子桂心硫黃人參沉香烏藥破故紙本熱寒之上黃芩連翹梔子知母玄參石膏生地黃中黃連連翹生地石膏下黃柏知母生地石膏牡丹地骨皮標熱散之解表柴胡細辛荊芥羌活葛根石膏膽屬木為少陽相火發生萬物為決斷之官十一臟之主主同肝本病口苦嘔苦汁善太息澹澹如人將捕狀目昏不眠標病寒熱往來痁瘧胸脅痛頭額痛耳痛鳴聾瘰癧結核馬刀足小指次指不用實火瀉之瀉膽龍膽牛膝豬膽生蕤仁生酸棗仁黃連苦茶虛火補之溫膽人參細辛半夏炒蕤仁炒酸棗仁當歸地黃本熱平之降火黃芩黃連芍藥連翹甘草鎮驚黑鉛水銀標熱和之和解柴胡芍藥黃芩半夏甘草胃屬土主容受為水穀之海主同脾本病噎膈反胃中滿腫脹嘔吐瀉痢霍亂腹痛消中善飢不消食傷飲食胃管當心痛支兩脅標病發熱蒸蒸身前熱身前寒發狂譫語咽痹上齒痛口眼喎斜鼻痛鼽衄赤皶胃實瀉之濕熱大黃芒硝飲食巴豆神麯山楂阿魏硇砂鬱金三稜輕粉胃虛補之濕熱蒼朮白朮半夏茯苓橘皮生薑寒濕乾薑附子草果官桂丁香肉豆蔻人參黃耆本熱寒之降火石膏地黃犀角黃連標熱解之解肌升麻葛根豆豉大腸屬金主變化為傳送之官本病大便閉結泄痢下血裡急後重疽痔脫肛腸鳴而痛標病齒痛喉痹頸腫口乾咽中如核鼽衄目黃手大指次指痛宿食發熱寒慄腸實瀉之熱大黃芒硝桃花牽牛巴豆郁李仁石膏氣枳殼木香橘皮檳榔腸虛補之氣皂莢燥桃仁麻仁杏仁地黃乳香松子當歸肉蓯蓉濕白朮蒼朮半夏硫磺陷升麻葛根脫龍骨白堊訶子粟殼烏梅白礬赤石脂禹餘糧石榴皮本熱寒之清熱秦艽槐角地黃黃芩本寒溫之溫里乾薑附子肉豆蔻標熱散之解肌石膏白芷升麻葛根小腸主分泌水穀為受盛之官本病大便水穀利小便短小便閉小便血小便自利大便後血小腸氣痛宿食夜熱旦止標病身熱惡寒嗌痛頷腫口糜耳聾實熱瀉之氣木通豬苓滑石瞿麥澤瀉燈草血地黃蒲黃赤茯苓梔子牡丹皮虛寒補之氣白朮楝實茴香砂仁神麯扁豆血桂心延胡索本熱寒之降火黃柏黃芩黃連連翹梔子標熱散之解肌藁本羌活防風蔓荊膀胱主津液為胞之府氣化乃能出號州都之官諸病皆干之本病小便淋瀝或短數或黃赤或白或遺失或氣痛標病發熱惡寒頭痛腰脊強鼻窒足小指不用實熱瀉之泄火滑石豬苓澤瀉茯苓下虛補之熱黃柏知母寒桔梗升麻益智烏藥山茱萸本熱利之降火地黃梔子茵陳黃柏牡丹皮地骨皮標寒發之發表麻黃桂枝羌活蒼朮防己黃耆木賊引經報使潔古珍珠囊手少陰心黃連細辛手太陽小腸藁本黃柏足少陰腎獨活桂知母細辛足太陽膀胱羌活手太陰肺桔梗升麻蔥白白芷手陽明大腸白芷升麻石膏足太陰脾升麻蒼朮葛根白芍足陽明胃白芷升麻石膏葛根手厥陰心包絡柴胡牡丹皮手少陽三焦連翹柴胡上地骨皮中青皮下附子足厥陰肝青皮吳茱萸川芎柴胡足少陽膽柴胡青皮
