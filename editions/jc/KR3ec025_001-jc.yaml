seq: 1
body:
  text: 序例第一卷上序例上歷代諸家本草神農本草經掌禹錫曰舊說本草經三卷神農所作而不經見漢書藝文志亦無錄焉漢平帝紀云元始五年舉天下通知方術本草者所在軺傳遣詣京師樓護傳稱護少誦醫經本草方術數十萬言本草之名蓋見於此唐李世勣等以梁七錄載神農本草三卷推以為始又疑所載郡縣有後漢地名似張機華佗輩所為皆不然也按淮南子云神農嘗百草之滋味一日而七十毒由是醫方興焉蓋上世未著文字師學相傳謂之本草兩漢以來名醫益眾張華輩始因古學附以新說通為編述本草由是見於經錄也寇宗奭曰漢書雖言本草不能斷自何代而作世本淮南子雖言神農嘗百草以和藥亦無本草之名惟帝王世紀云黃帝使岐伯嘗味草木定本草經造醫方以療眾疾乃知本草之名自黃帝始蓋上古聖賢具生知之智故能辨天下品物之性味合世人疾病之所宜後世賢智之士從而和之又增其品焉韓保升曰藥有玉石草木蟲獸而云本草者為諸藥中草類最多也名醫別錄李時珍曰神農本草藥分三品計三百六十五種以應周天之數梁陶弘景復增漢魏以下名醫所用藥三百六十五種謂之名醫別錄凡七卷首敘藥性之源論病名之診次分玉石一品草一品木一品蟲獸一品果菜一品米食一品有名未用三品以朱書神農墨書別錄進上梁武帝弘景字通明宋末為諸王侍讀歸隱勾曲山號華陽隱居武帝每咨訪之年八十五卒諡貞白先生其書頗有裨補亦多謬誤弘景自序曰隱居先生在乎茅山之上以吐納餘暇遊意方技覽本草藥性以為盡聖人之心故撰而論之舊稱神農本經予以為信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之弊宣藥療疾以拯夭傷之命此三道者歷眾聖而滋彰文王孔子彖象繇辭幽贊人天后稷伊尹播厥百穀惠被群生岐黃彭扁振揚輔導恩流含氣歲逾三千民到於今賴之但軒轅以前文字未傳藥性所主當以識識相因不爾何由得聞至於桐雷乃著在編簡此書應與素問同類但後人多更修飭之爾秦皇所焚醫方卜術不預故猶得全錄而遭漢獻遷徙晉懷奔迸文籍焚糜十不遺一今之所存有此三卷其所出郡縣乃後漢時制疑仲景元化等所記又有桐君採藥錄說其花葉形色藥對四卷論其佐使相須魏晉以來吳普李當之等更復損益或五百九十五或四百四十一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則智識有淺深今輒苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫別品亦三百六十五合七百三十種精粗皆取無復遺落分別科條區畛物類兼注詺時用土地所出及仙經道術所須並此序錄合為七卷雖未足追踵前良蓋亦一家撰制吾去世之後可貽諸知音爾桐君採藥錄時珍曰桐君黃帝時臣也書凡二卷紀其花葉形色今已不傳後人又有四時採藥太常採藥時月等書雷公藥對禹錫曰北齊徐之才撰以眾藥名品君臣性毒相反及所主疾病分類記之凡二卷時珍曰陶氏前已有此書吳氏本草所引雷公是也蓋黃帝時雷公所著之才增飾之爾之才丹陽人博識善醫歷事北齊諸帝得寵仕終尚書左僕射年八十卒贈司徒封西陽郡王諡文明北史有傳李氏藥錄保升曰魏李當之華佗弟子修神農本草三卷而世少行時珍曰其書散見吳氏陶氏本草中頗有發明吳氏本草保升曰魏吳普廣陵人華佗弟子凡一卷時珍曰其書分記神農黃帝岐伯桐君雷公扁鵲華佗李氏所說性味甚詳今亦失傳雷公炮炙論時珍曰劉宋時雷斅所著非黃帝時雷公也自稱內究守國安正公或是官名也胡洽居士重加定述藥凡三百種為上中下三卷其性味炮炙熬煮修事之法多古奧文亦古質別是一家多本於乾寧晏先生其首序論述物理亦甚幽玄錄載於後乾寧先生名晏封著制伏草石論六卷蓋丹石家書也唐本草時珍曰唐高宗命司空英國公李績等修陶隱居所注神農本草經增為七卷世謂之英公唐本草頗有增益顯慶中右監門長史蘇恭重加訂注表請修定帝覆命太尉趙國公長孫無忌等二十二人與恭詳定增藥一百一十四種分為玉石草木人獸禽蟲魚果米穀菜有名未用十一部凡二十卷目錄一卷別為藥圖二十五卷圖經七卷共五十三卷世謂之唐新本草蘇恭所釋雖明亦多駁誤禮部郎中孔志約序曰天地之大德曰生運陰陽以播物含靈之所保曰命資亭育以盡年蟄穴棲巢感物之情蓋寡範金揉木逐欲之道方滋而五味或爽時昧甘辛之節六氣斯沴易愆寒燠之宜中外交侵形神分戰飲食伺釁成腸胃之眚風濕候隙構手足之災機纏膚腠莫知救止漸固膏肓期於夭折暨炎暉紀物識藥石之功云瑞名官窮診候之術草木鹹得其性鬼神無所遁情刳麝剸犀驅泄邪惡飛丹煉石引納清和大庇蒼生普濟黔首功侔造化恩邁裁成日用不知於今是賴岐和彭緩騰絕軌於前李華張吳振英聲於後昔秦政煨燔茲經不預永嘉喪亂斯道尚存梁陶弘景雅好攝生研精藥術以為本草經者神農之所作不刊之書也惜其年代浸遠簡編殘蠹與桐雷眾記頗或踳駁興言撰緝勒成一家亦以雕琢經方潤色醫業然而時鐘鼎峙聞見闕於殊方事非僉議詮釋拘於獨學至如重建平之防己棄槐里之半夏秋採榆仁冬收雲實謬粱米之黃白混荊子之牡蔓異繁縷於雞腸合由跋於鳶尾防葵狼毒妄曰同根鉤吻黃精引為連類鉛錫莫辨橙柚不分凡此比例蓋亦多矣自時厥後以迄於今雖方技分鑣名醫繼軌更相祖述罕能釐正乃復採杜衡於及己求忍冬於絡石舍陟釐而取莂藤退飛廉而用馬薊承疑行妄曾無有覺疾瘵多殆良深慨嘆既而朝議郎行右監門府長史騎都尉臣蘇恭摭陶氏之乖違辨俗用之紕紊遂表請修定深副聖懷乃詔太尉揚州都督監修國史上柱國趙國公臣無忌大中大夫行尚藥奉御臣許孝崇等二十二人與蘇恭詳撰竊以動植形生因方舛性春秋節變感氣殊功離其本土則質同而效異乖於採摘乃物是而時非名實既爽寒溫多謬用之凡庶其欺已甚施之君父逆莫大焉於是上稟神規下詢眾議普頒天下營求藥物羽毛鱗介無遠不臻根莖花實有名咸萃遂乃詳探秘要博綜方術本經雖缺有驗必書別錄雖存無稽必正考其同異擇其去取鉛翰昭章定群言之得失丹青綺煥備庶物之形容撰本草並圖經目錄等凡成五十四卷庶以網羅今古開滌耳目盡醫方之妙極拯生靈之性命傳萬祀而無昧懸百王而不朽藥總訣禹錫曰梁陶隱居撰凡二卷論藥品五味寒熱之性主療疾病及採蓄時月之法一本題曰藥象口訣不著撰人名藥性本草禹錫曰藥性論凡四卷不著撰人名氏分藥品之性味君臣佐使主病之效一本云陶隱居撰然其藥性之功有與本草相戾者疑非隱居書也時珍曰藥性論即藥性本草乃唐甄權所著也權扶溝人仕隋為秘省正字唐太宗時年百二十歲帝幸其第訪以藥性因上此書授朝散大夫其書論主治亦詳又著脈經明堂人形圖各一卷詳見唐史千金食治時珍曰唐孫思邈撰千金備急方三十卷採摭素問扁鵲華佗徐之才等所論補養諸說及本草關於食用者分米穀果菜鳥獸蟲魚為食治附之亦頗明悉思邈隱於太白山隋唐徵拜皆不就年百餘歲卒所著有千金翼方枕中素書攝生真錄福祿論三教論老子莊子注食療本草禹錫曰唐同州刺史孟詵撰張鼎又補其不足者八十九種並舊為二百二十七條凡三卷時珍曰詵梁人也武后時舉進士累遷鳳閣舍人出為台州司馬轉同州刺史睿宗召用固辭卒年九十因周禮食醫之義著此書多有增益又撰必效方十卷補養方三卷唐史有傳本草拾遺禹錫曰唐開元中三原縣尉陳藏器撰以神農本經雖有陶蘇補集之說然遺沉尚多故別為序例一卷拾遺六卷解紛三卷總曰本草拾遺時珍曰藏器四明人其所著述博極群書精核物類訂繩謬誤蒐羅幽隱自本草以來一人而已膚譾之士不察其該詳惟誚其僻怪宋人亦多刪削豈知天地品物無窮古今隱顯亦異用舍有時名稱或變豈可以一隅之見而遽譏多聞哉如闢虺雷海馬胡豆之類皆隱於昔而用於今仰天皮燈花敗扇之類皆萬家所用者若非此書收載何從稽考此本草之書所以不厭詳悉也海藥本草禹錫曰南海藥譜二卷不著撰人名氏雜記南方藥物所產郡縣及療疾之功頗無倫次時珍曰此即海藥本草也凡六卷唐人李珣所撰珣蓋肅代時人收採海藥亦頗詳明又鄭虔有胡本草七卷皆胡中藥物今不傳四聲本草禹錫曰唐蘭陵處士蕭炳撰取本草藥名上一字以平上去入四聲相從以便討閱無所發明凡五卷進士王收序之刪繁本草禹錫曰唐潤州醫博士兼節度隨軍楊損之撰刪去本草不急及有名未用之類為五卷開元以後人也無所發明本草音義時珍曰凡二卷唐李含光撰又甄立言殷子嚴皆有音義本草性事類禹錫曰京兆醫工杜善方撰不詳何代人凡一卷以本草藥名隨類解釋附以諸藥制使畏惡相反相宜解毒者食性本草禹錫曰南唐陪戎副尉劍州醫學助教陳士良撰取神農陶隱居蘇恭孟詵陳藏器諸家藥關於飲食者類之附以食醫諸方及五時調養臟腑之法時珍曰書凡十卷總集舊說無甚新義古有淮南王食經一百二十卷崔浩食經九卷竺喧食經十卷膳饈養療二十卷昝殷食醫心鏡三卷婁居中食治通說一卷陳直奉親養老書二卷並有食治諸方皆祖食醫之意也蜀本草時珍曰蜀主孟昶命翰林學士韓保升等與諸醫士取唐本草參校增補註釋別為圖經凡二十卷昶自為序世謂之蜀本草其圖說藥物形狀頗詳於陶蘇也開寶本草時珍曰宋太祖開寶六年命尚藥奉御劉翰道士馬志等九人取唐蜀本草詳校仍取陳藏器拾遺諸書相參刊正別名增藥一百三十三種馬志為之註解翰林學士盧多遜等刊正七年復詔志等重定學士李昉等看詳凡神農者白字名醫所傳者墨字別之並目錄共二十一卷序曰三墳之書神農預其一百藥既辨本草存其錄舊經三卷世所流傳名醫別錄互為編纂至梁貞白先生陶弘景乃以別錄參其本經朱墨雜書時謂明白而又考彼功用為之註釋列為七卷南國行焉逮乎有唐別加參校增藥餘八百味添注為二十一卷本經漏功則補之陶氏誤說則證之然而載歷年祀又逾四百朱字墨字無本得同舊注新注其文互缺非聖主撫大同之運永無疆之休其何以改而正之哉乃命盡考傳誤刊為定本類例非允從而革焉至於筆頭灰兔毫也而在草部今移附兔頭骨之下半天河地漿皆水也亦在草部今移附玉石類之間敗鼓皮移附於獸皮胡桐淚改從於木類紫礦亦木也自玉石品而取焉伏翼實禽也由蟲魚部而移焉橘柚附於果實食鹽附於光鹽生薑乾薑同歸一說至於雞腸繁縷陸英蒴藋以類相似從而附之仍採陳藏器拾遺李含光音義或討源於別本或傳效於醫家參而較之辨其臧否至於突厥白舊說灰類也今是木根天麻根解以赤箭今又全異去非取是特立新條自余刊正不可悉數下采眾議定為印板乃以白字為神農所說墨字為名醫所傳唐附今附各加顯注詳其解釋審其形性證謬誤而辨之者署為今注考文記而述之者又為今按義既刊定理亦詳明今以新舊藥合九百八十三種並目錄二十一卷廣頒天下傳而行焉嘉祐補註本草時珍曰宋仁宗嘉祐二年詔光祿卿直秘閣掌禹錫尚書祠部郎中秘閣校理林億等同諸醫官重修本草新補八十二種新定一十七種通計一千八十二條謂之嘉祐補註本草共二十卷其書雖有校修無大發明其序略云神農本草經三卷藥止三百六十五種至陶隱居又進名醫別錄亦三百六十五種因而註釋分為七卷唐蘇恭等又增一百一十四種廣為二十卷謂之唐本草國朝開寶中兩詔醫工劉翰道士馬志等修增一百三十三種為開寶本草偽蜀孟昶亦嘗命其學士韓保升等稍有增廣謂之蜀本草嘉祐二年八月詔臣禹錫臣億等再加校正臣等被命遂更研核竊謂前世醫工原診用藥隨效輒記遂至增多概見諸書浩博難究雖屢加刪定而去取非一或本經已載而所述粗略或俚俗常用而太醫未聞向非因事詳著則遺散多矣乃請因其疏捂更為補註應諸家醫書藥譜所載物品功用並從採掇惟名近迂僻類乎怪誕則所不取自余經史百家雖非方餌之急其間或有參說藥驗較然可據者亦兼收載務從該洽以副詔意凡名本草者非一家今以開寶重定本為正其分布卷類經注雜糅間以朱墨並從舊例不復釐改凡補註並據諸書所說其意義與舊文相參者則從刪削以避重複其舊已著見而意有未完後書復言亦具存之欲詳而易曉仍每條並以朱書其端云臣等謹按某書云某事其別立條者則解於其末云見某書凡所引書唐蜀二本草為先他書則以所著先後為次第凡書舊名本草者今所引用但著其所作人名曰某人惟唐蜀本則曰唐本云蜀本云凡字朱墨之別所謂神農本經者以朱字名醫因神農舊條而有增補者以墨字間於朱字余所增者皆別立條並以墨字凡陶隱居所進者謂之名醫別錄並以其注附於末凡顯慶所增者亦注其末曰唐本先附凡開寶所增者亦注其末曰今附凡今所增補舊經未有於逐條後開列云新補凡藥舊分上中下三品今之新補難於詳辨但以類附見如綠礬次於礬石山姜花次於豆蔻枎栘次於水楊之類是也凡藥有功用本經未見而舊注已曾引注今之所增但涉相類更不立條並附本注之末曰續注如地衣附於垣衣燕覆附於通草馬藻附於海藻之類是也凡舊注出於陶氏者曰陶隱居云出於顯慶者曰唐本注出於開寶者曰今注其開寶考據傳記者別曰今按今詳又按皆以朱字別書於其端凡藥名本經已見而功用未備今有所益者亦附於本注之末凡藥有今世已嘗用而諸書未見無所辨證者如胡蘆巴海帶之類則請從太醫眾論參議別立為條曰新定舊藥九百八十三種新補八十二種附於注者不預焉新定一十七種總新舊一千八十二條皆隨類附著之英公陶氏開寶三序皆有義例所不可去仍載於首捲雲圖經本草時珍曰宋仁宗既命掌禹錫等編繹本草累年成書又詔天下郡縣圖上所產藥物用唐永徽故事專命太常博士蘇頌撰述成此書凡二十一卷考證詳明頗有發揮但圖與說異兩不相應或有圖無說或有物失圖或說是圖非如江州菝葜乃仙遺糧滁州青木香乃兜鈴根俱混列圖棠球子即赤瓜木天花粉即栝蔞根乃重出條之類亦其小小疏漏耳頌字子容同安人舉進士哲宗朝位至丞相封魏國公證類本草時珍曰宋徽宗大觀二年蜀醫唐慎微取嘉祐補註本草及圖經本草合為一書復拾唐本草陳藏器本草孟詵食療本草舊本所遺者五百餘種附入各部並增五種仍採雷公炮炙及唐本食療陳藏器諸說收未盡者附於各條之後又採古今單方並經史百家之書有關藥物者亦附之共三十一卷名證類本草上之朝廷改名大觀本草慎微貌寢陋而學該博使諸家本草及各藥單方垂之千古不致淪沒者皆其功也政和中覆命醫官曹孝忠校正刊行故又謂之政和本草本草別說時珍曰宋哲宗元祐中閬中醫士陳承合本草及圖經二書為一間綴數語謂之別說高宗紹興末命醫官王繼先等校正本草亦有所附皆淺俚無高論日華諸家本草禹錫曰國初開寶中四明人撰不著姓氏但云日華子大明序集諸家本草近世所用藥各以寒溫性味華實蟲獸為類其言功用甚悉凡二十卷時珍曰按千家姓大姓出東萊日華子蓋姓大名明也或云其姓田未審然否本草衍義時珍曰宋政和中醫官通直郎寇宗奭撰以補註及圖經二書參考事實核其情理援引辨證發明良多東垣丹溪諸公亦尊信之但以蘭花為蘭草卷丹為百合是其誤也書及序例凡二十卷平陽張魏卿以其說分附各藥之下合為一書潔古珍珠囊時珍曰書凡一卷金易州明醫張元素所著元素字潔古舉進士不第去學醫深闡軒岐秘奧參悟天人幽微言古方新病不相能自成家法辨藥性之氣味陰陽厚薄升降浮沉補瀉六氣十二經及隨證用藥之法立為主治秘訣心法要旨謂之珍珠囊大揚醫理靈素之下一人而已後人翻為韻語以便記誦謂之東垣珍珠囊謬矣惜乎止論百品未及遍評又著病機氣宜保命集四卷一名活法機要後人誤作河間劉完素所著偽撰序文詞調於卷首以附會之其他潔古諸書多是後人依託故駁雜不倫用藥法象時珍曰書凡一卷元真定明醫李杲所著杲字明之號東垣通春秋書易忠信有守富而好施援例為濟源監稅官受業於潔古老人盡得其學益加闡發人稱神醫祖潔古珍珠囊增以用藥凡例諸經嚮導綱要活法著為此書謂世人惑於內傷外感混同施治乃辨其脈證元氣陰火飲食勞倦有餘不足著辨惑論三卷脾胃論三卷推明素問難經本草脈訣及雜病方論著醫學發明九卷蘭室秘藏五卷辨析經絡脈法分比傷寒六經之則著此事難知二卷別有癰疽眼目諸書及試效方皆其門人所集述者也湯液本草時珍曰書凡二卷元醫學教授古趙王好古撰好古字進之號海藏東垣高弟醫之儒者也取本草及張仲景成無己張潔古李東垣之書間附己意集而為此別著湯液大法四卷醫壘元戎十卷陰證略例癍論萃英錢氏補遺各一卷日用本草時珍曰書凡八卷元海寧醫士吳瑞取本草之切於飲食者分為八門間增數品而