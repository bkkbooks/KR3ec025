夭之慮況大毒有毒乎是故三法猶刑罰也粱肉猶德教也治亂用刑治治用德理也余用三法常兼眾法有按有蹺有揃有導有減增有續止醫者不得余法而反誣之哀哉如引涎漉涎取嚏追淚凡上行者皆吐法也熏蒸渫洗熨烙針刺砭射導引按摩凡解表者皆汗法也催生下乳磨積逐水破經泄氣凡下行者皆下法也天之六氣風寒暑濕燥火發病多在上地之六氣霧露雨雪水泥發病多在乎下人之六味酸苦甘辛咸淡發病多在乎中發病者三出病者亦三風寒之邪結搏於皮膚之間滯於經絡之內留而不去或發痛注麻痹腫癢拘攣皆可汗而出之痰飲宿食在胸膈為諸病皆可湧而出之寒濕固冷火熱客下焦發為諸病皆可泄而出之吐中有汗下中有補經云知其要者一言而終是之謂也吐法凡病在胸膈中脘以上者皆宜吐之考之本草吐藥之苦寒者瓜蒂梔子茶末豆豉黃連苦參大黃黃芩辛苦而寒者常山藜蘆鬱金甘而寒者桐油甘而溫者牛肉甘苦而寒者地黃人參蘆苦而溫者青木香桔梗蘆遠志厚朴辛苦而溫者薄荷芫花菘蘿辛而溫者蘿蔔子穀精草蔥根鬚杜衡皂莢辛而寒者膽礬石綠石青辛而溫者蠍梢烏梅烏頭附子尖輕粉酸而寒者晉礬綠礬齏汁酸而平者銅綠甘酸而平者赤小豆酸而溫者飯漿咸而寒者青鹽滄鹽白米飲甘而寒者牙硝辛而熱者砒石諸藥惟常山膽礬瓜蒂有小毒藜蘆芫花烏附砒石有大毒他皆吐藥之無毒者凡用法先宜少服不湧漸加之仍以雞羽撩之不出以齏投之不吐再投且投且探無不吐者吐至瞑眩慎勿驚疑但飲冰水新水立解強者可一吐而安弱者作三次吐之吐之次日有頓快者有轉甚者引之未盡也俟數日再吐之吐後不禁物惟忌飽食酸鹹硬物乾物油肥之物吐後心火既降陰道必強大禁房室悲憂病人既不自責必歸罪於吐法也不可吐者有八性剛暴好怒喜淫者病勢已危老弱氣衰者自吐不止者陽敗血虛者吐血咯血衄血嗽血崩血溺血者病人粗知醫書不辨邪正者病人無正性反覆不定者左右多嘈雜之言者皆不可吐吐則轉生他病反起謗端雖懇切求之不可強從也汗法風寒暑濕之邪入於皮膚之間而未深欲速去之莫如發汗所以開玄府而逐邪氣也然有數法有溫熱發汗寒涼發汗熏漬發汗導引發汗皆所以開玄府而逐邪氣也以本草校之荊芥薄荷白芷陳皮半夏細辛蒼朮天麻生薑蔥白皆辛而溫者也蜀椒胡椒茱萸大蒜皆辛而熱者也青皮防己秦艽其辛而平者乎麻黃人參大棗其甘而溫者乎葛根赤茯苓其甘而平者乎桑白皮其甘而寒者乎防風當歸其甘辛而溫者乎官桂桂枝其甘辛而大熱者乎厚朴桔梗其苦而溫者乎黃芩知母枳實苦參地骨皮柴胡前胡其苦而寒者乎羌活獨活其苦辛而微溫者乎升麻其苦甘且平者乎芍藥其酸而微寒者乎浮萍其辛酸而寒者乎凡此皆發散之屬也善擇者當熱而熱當寒而寒不善擇者反此則病有變也發汗中病則止不必盡劑凡破傷風小兒驚風飧泄不止酒病火病皆宜汗之所謂火鬱則發之也下法積聚陳莝於中留結寒熱於內必用下之陳莝去而腸胃潔癥瘕盡而營衛通下之者所以補之也庸工妄投當寒反熱當熱反寒故謂下為害也考以本草下之寒者戎鹽之咸犀角之酸鹹滄鹽澤瀉之甘鹹枳實之苦酸膩粉之辛澤漆之苦辛杏仁之苦甘下之微寒者豬膽之苦下之大寒者牙硝之甘大黃牽牛瓜蒂苦瓠牛膽藍汁羊蹄根苗之苦大戟甘遂之苦甘朴硝芒硝之苦鹹下之溫者檳榔之辛芫花之苦辛石蜜之甘皂角之辛鹹下之熱者巴豆之辛下之涼者豬羊血之咸下之平者郁李仁之酸桃花之苦皆下藥也惟巴豆性熱非寒積不可輕用妄下則使人津液涸竭留毒不去胸熱口燥轉生他病也其不可下者凡四洞泄寒中者表裡俱虛者厥而唇青手足冷者小兒病後慢驚者誤下必致殺人其餘大積大聚大痞大秘大燥大堅非下不可但須寒熱積氣用之中病則止不必盡劑也病有八要六失六不治注見神農名例藥對歲物藥品立冬之日菊卷柏先生時為陽起石桑螵蛸凡十物使主二百草為之長立春之日木蘭射干先生為柴胡半夏使主頭痛四十五節立夏之日蜚蠊先生為人參茯苓使主腹中七節保神守中夏至之日豕首茱萸先生為牡蠣烏喙使主四肢三十二節立秋之日白芷防風先生為細辛蜀漆使主胸背二十四節禹錫曰五條出藥對中義旨淵深非俗所究而是主統之本故載之時珍曰此亦素問歲物之意出上古雷公藥對中而義不傳爾按楊慎卮言云白字本草相傳出自神農今觀其中如腸鳴幽幽勞極洒洒發髲仍自還神化及此五條文近素問決非後世醫所能為也此文以立冬日為始則上古以建子為正也神農本草經目錄時珍曰神農古本草凡三卷三品共三百六十五種首有名例數條至陶氏作別錄乃拆分各部而三品亦移改又拆出青葙赤小豆二條故有三百六十七種逮乎唐宋屢經變易舊制莫考今又併入已多故存此目以備考古云耳上品藥一百二十種丹砂雲母玉泉石鐘乳礬石硝石朴硝滑石空青曾青禹餘糧太一餘糧白石英紫石英五色石脂菖蒲菊花人參天門冬甘草乾地黃術菟絲子牛膝茺蔚子女萎防葵麥門冬獨活車前子木香薯蕷薏苡仁澤瀉遠志龍膽細辛石斛巴戟天白英白蒿赤箭庵䕡子菥蓂子蓍實赤芝黑芝青芝白芝黃芝紫芝卷柏藍實蘼蕪黃連絡石蒺藜子黃耆肉蓯蓉防風蒲黃香蒲續斷漏蘆天名精決明子丹參飛廉五味子旋花蘭草蛇床子地膚子景天茵陳蒿杜若沙參徐長卿石龍芻雲實王不留行牡桂菌桂松脂槐實枸杞橘柚柏實茯苓榆皮酸棗乾漆蔓荊實辛夷杜仲桑上寄生女貞實蕤核藕實莖大棗葡萄蓬蘽雞頭實胡麻麻蕡冬葵子莧實白瓜子苦菜龍骨麝香熊脂白膠阿膠石蜜蜂子蜜蠟牡蠣龜甲桑螵蛸中品藥一百二十種雄黃雌黃石硫黃水銀石膏磁石凝水石陽起石理石長石石膽白青扁青膚青乾薑枲耳實葛根栝蔞苦參茈胡芎藭當歸麻黃通草芍藥蠡實瞿麥玄參秦艽百合知母貝母白芷淫羊藿黃芩石龍芮茅根紫菀紫草茜根敗醬白蘚皮酸漿紫參藁本狗脊萆薢白兔藿營實白薇薇銜翹根水萍王瓜地榆海藻澤蘭防己牡丹款冬花石葦馬先蒿積雪草女菀王孫蜀羊泉爵床梔子竹葉檗木吳茱萸桑根白皮蕪荑枳實厚朴秦皮秦椒山茱萸紫葳豬苓白棘龍眼木蘭五加皮衛矛合歡彼子梅實桃核仁杏核仁蓼實蔥實薤假蘇水蘇水斳發髲白馬莖鹿茸牛角䚡羖羊角牡狗陰莖羚羊角犀角牛黃豚卵麋脂丹雄雞雁肪鱉甲鮀魚甲蠡魚鯉魚膽烏賊魚骨海蛤文蛤石龍子露蜂房蚱蟬白殭蠶下品藥一百二十五種孔公蘖殷蘖鐵精鐵落鐵鉛丹粉錫錫鏡鼻代赭戎鹽大鹽滷鹼青琅玕礜石石灰白堊冬灰附子烏頭天雄半夏虎掌鳶尾大黃葶藶桔梗莨菪子草蒿旋覆花藜蘆鉤吻射干蛇含常山蜀漆甘遂白蘞青葙子雚菌白芨大戟澤漆茵芋貫眾蕘花牙子羊躑躅芫花姑活別羈商陸羊蹄萹蓄狼毒鬼臼白頭翁羊桃女青連翹石下長卿䕡茹烏韭鹿藿蚤休石長生陸英藎草牛扁夏枯草屈草巴豆蜀椒皂莢柳華楝實郁李仁莽草雷丸梓白皮桐葉石南黃環溲疏鼠李松蘿藥實根蔓椒欒華淮木大豆黃卷腐婢瓜蒂苦瓠六畜毛蹄甲燕屎天鼠屎鼺鼠伏翼蛤蟆馬刀蟹蛇蛻蝟皮蠮螉蜣螂蛞蝓白頸蚯蚓蠐螬石蠶雀甕樗雞斑蝥螻蛄蜈蚣馬陸地膽螢火衣魚鼠婦水蛭木虻蜚虻蜚蠊䗪蟲貝子宋本草舊目錄李時珍曰舊目不錄可也錄之所以存古蹟也又以見三品之混亂不必泥古也新舊藥合一千八十二種三百六十種神農本經白字一百八十二種名醫別錄墨字一百一十四種唐本先附一百三十三種今附開寶所附一百九十四種有名未用八十二種新補一十七種新定以上皆宋嘉祐本草所定者四百八十八種陳藏器余二種唐本余一十三種海藥余八種食療余一百種圖經外類以上皆唐慎微續收補入者玉石部上品七十三種中品八十七種下品九十三種草部上品之上八十七種上品之下五十三種中品之上六十二種中品之下七十八種下品之上六十二種下品之下一百五種木部上品七十二種中品九十二種下品九十九種人部三品二十五種獸部上品二十種中品一十七種下品二十一種禽部三品五十六種蟲魚部上品五十種中品五十六種下品八十一種果部三品五十三種米穀部上品七種中品二十三種下品一十八種菜部上品三十種中品一十三種下品二十二種有名未用一百九十四種圖經外類一百種
