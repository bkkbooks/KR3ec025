  text: 序例目錄第二卷上序例下藥名同異相須相使相畏相惡諸藥相反諸藥服藥食忌妊娠禁忌飲食禁忌李東垣隨證用藥凡例陳藏器諸虛用藥凡例張子和汗吐下三法病有八要六失六不治藥對歲物藥品神農本草經目錄宋本草舊目錄序例第二卷序例藥名同異五物同名獨搖草羌活鬼臼鬼督郵天麻薇銜四物同名堇堇菜蒴藋烏頭石龍芮苦菜貝母龍葵苦苣敗醬鬼目白英羊蹄紫葳麂目紅豆赤小豆紅豆蔻相思子海紅豆白藥桔梗白藥子栝蔞會州白藥豚耳豬耳菘菜馬齒莧車前三物同名美草甘草旋花山姜山姜美草蒼朮杜若蜜香木香多香木沉香女萎萎蕤蔓楚紫葳鬼督郵徐長卿赤箭獨搖草王孫黃耆猢猻牡蒙百枝萆薢防風狗脊接骨草山蒴藋續斷攀倒甑虎鬚款冬花沙參燈心草鹿腸敗醬玄參斑龍腸解毒子苦藥子鬼臼山豆根羊乳𦍺羊乳沙參枸杞豕首豬頭蠡實天門冬山石榴金罌子小檗杜鵑花狗骨犬骨鬼箭貓兒刺木苦蘵敗醬苦參酸漿草仙人杖枸杞仙人草立死竹木蓮木饅頭木蘭木芙蓉白幕天雄白英白薇立制石理石礜石石膽守田半夏菵草狼尾草水玉半夏玻璃水精石芑地黃薏苡白黍黃牙金硫黃金牙石石花瓊枝菜烏韭鐘乳石汁淡竹葉水竹葉碎骨子鴨跖草牛舌牛之舌車前羊蹄虎膏虎脂豨薟天南星酸漿米漿水燈籠草三葉酸草石龍蜥蜴葒草絡石木蜜大棗蜜香枳椇石蜜乳糖櫻桃蜂蜜二物同名淫羊藿仙靈脾天門冬黃芝芝草黃精黑三稜京三稜烏芋知母蝭母沙參地精人參何首烏龍銜蛇含黃精金釵股釵子股忍冬藤薺苨桔梗杏葉沙參神草人參赤箭芰草黃耆菱長生草羌活紅茂草仙茅長松婆羅門參水香蘭草澤蘭兒草知母芫花千兩金淫羊藿續隨子牆蘼蛇床營實香草蘭草零陵草逐馬玄參丹參百兩金牡丹百兩金草牡蒙紫參王孫香菜香薷羅勒地筋白茅根菅茅根都梁香蘭草澤蘭杜蘅杜若馬蹄香香蘇爵床水蘇鼠姑牡丹鼠婦蟲孩兒菊蘭草澤蘭漏蘆飛廉鬼油麻蘭根蘭草白茅地血紫草茜草木芍藥牡丹赤芍藥白芨連及黃精䕡根蘭草防風藥實貝母黃藥子夏枯草乃東草茺蔚黃昏合歡王孫夜合合歡何首烏戴椹黃耆旋覆花甘露子地蠶甘蕉子雷丸竹苓菟葵馬薊術大薊龍珠赤珠石龍芻不死草卷柏麥門冬苦薏野菊蓮子心烏韭石發麥門冬地葵蒼耳地膚子紫河車蚤休人胞衣伏兔飛廉茯苓草蒿青蒿青葙子黃蒿鼠曲黃花蒿馬肝石何首烏烏須石火杴茺蔚豨薟露葵葵菜蓴益明茺蔚地膚千金藤解毒之草陳思岌忍冬金銀藤麥門冬香茅鼠麴草菁茅麗春罌粟仙女蒿仙人掌草射干旱蓮鱧腸連翹石發烏韭陟釐蘭華蘭草連翹羊婆奶沙參蘿藦子大蓼葒草馬蓼石衣烏韭陟釐鬼針鬼釵草鬼齒爛竹血見愁茜草地錦山蔥茖蔥藜蘆地椒野小椒水楊梅斑杖虎杖攀倒甑雞腸草蘩縷之類鵝不食草鹿蔥萱草藜蘆地節葳蕤枸杞芒草芭茅莽草鳳尾草金星草貫眾扁竹萹蓄射干莞草白芷茵芋妓女萱草地膚苗紫金牛草根似巴戟射干通草木通通脫木天豆雲實石龍芮重臺蚤休玄參胭脂菜藜落葵羊腸羊之腸羊桃白草白蘞白英更生菊雀翹燕尾草蘭草慈菇白昌商陸水菖蒲臭草雲實茺蔚地䒽草赤地利紅內硝紫荊皮何首烏龍鬚席草海菜水萍浮萍慈菇林蘭石斛木蘭承露仙人肝藤伏雞子根象膽象之膽蘆薈水葵水荇蓴杜蘭石斛木蘭冬葵子葵菜姑活馬尾馬之尾商陸水芝芡實冬瓜屏風防風水荇三白草候農之草牽牛鴉臼烏桕木鷑鳩鳥天葵菟葵落葵赤葛何首烏烏蘞莓猢猻頭鱧腸地錦鹿藿野綠豆葛苗水花浮萍浮石酸母酸模酢漿草菩提子薏苡無患子景天慎火草螢火蟲山芋山藥旱芋鬼蓋人參地菌相思子木紅豆郎君子蟲王瓜土瓜菝葜石南風藥南藤蘿藦雀瓢百合雞骨香沉香降真香黃瓜胡瓜栝蔞胡菜胡荽蕓薹甜藤甘藤忍冬白馬骨獸之骨又木名金罌金櫻子安石榴胡豆蠶豆豌豆機子山楂楊梅金盞銀臺水仙花王不留行木棉古貝杜仲水慄芰實萍蓬草根陽桃獼猴桃五蘞子胡王使者羌活白頭翁獐頭獐首土菌獨搖白楊枎栘菥蓂大薺白棘桑上寄生桑耳鼠矢鼠糞山茱萸苦心知母沙參日及木槿扶桑芨堇烏頭烏犀犀角皂莢梫木桂又木名大青大青草扁青石茆蓴女菀文蛤海蛤五倍子樺木樺皮木芙蓉終石草石榛榛子厚朴蜾蠃蠮螉栝蔞風藥石南澤蘭將軍大黃硫黃椑鼠李漆柿石鯪絡石藤穿山甲冬青凍青女貞石芝芝草石腦櫬梧桐木槿鉛華胡粉黃丹處石磁石玄石石腦石芝太一餘糧寒水石石膏凝水石石綠綠青綠鹽石英紫石英水晶石鹽礜石光明鹽蜃車螯蜃蛟石蠶沙蝨甘露子占斯樟寄生雀甕蟲鷸田間小鳥魚狗鳥地蠶蠐螬甘露子地雞土菌鼠婦沙蝨水蟲石蠶鳺伯勞杜鵑青蚨蚨蟬銅錢蟪蛄蟬螻蛄鼯鼠螻蛄鼺鼠飛生飛生蟲鼫鼠蝸蠃蝸牛螺螄負蠜鼠負蛗螽負盤蜚蠊行夜黃頰魚鱤魚黃顙魚土龍蚯蚓鼉龍白魚鱎魚衣魚魚師有毒之魚魚狗鳥魚虎土奴魚魚狗鳥人魚䱱魚鯢魚鯊魚吹沙魚鮫魚天狗獾魚狗鳥水狗獺魚狗鳥山雞翟雉鷩雉扶老禿鶖靈壽木鬼鳥姑獲鳥鬼車鳥醴泉瑞水名人口中津無心薇銜鼠麴草朝開暮落花木槿狗溺臺比類隱名土青木香馬兜鈴野天麻茺蔚鬼油麻漏蘆甜桔梗薺苨山牛蒡大薊草續斷石龍芻杜牛膝天名精野脂麻玄參甜葶藶菥蓂木羊乳丹參天蔓菁天名精草甘遂蚤休黃芫花蕘花杏葉沙參薺苨野雞冠青葙子山莧菜牛膝黃大戟芫花胡薄荷積雪草龍腦薄荷水蘇青蛤粉青黛野紅花大戟竹園荽海金沙野園荽鵝不食草野胡蘿蔔草鴟頭貫眾野茴香馬芹野甜瓜土瓜野萱花射干野天門冬百部黑狗脊貫眾草血竭地錦水巴戟香附土細辛杜衡獐耳細辛