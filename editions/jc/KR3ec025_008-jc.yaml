body:
  text: 金石部第八卷李時珍曰石者氣之核土之骨也大則為巖巖細則為砂塵其精為金為玉其毒為礜為砒氣之凝也則結而為丹青氣之化也則液而為礬汞其變也或自柔而剛乳滷成石是也或自動而靜草木成石是也飛走含靈之為石自有情而之無情也雷震星隕之為石自無形而成有形也大塊資生鴻鈞爐韛金石雖若頑物而造化無窮焉身家攸賴財劑衛養金石雖曰死瑤而利用無窮焉是以禹貢周官列其土產農經軒典詳其性功亦良相良醫之所當注意者也乃集其可以濟國卻病者一百六十一種為金石部分為四類曰金曰玉曰石曰滷舊本玉石部三品共二百五十三種今併入二十八種移三十二種入水部三十九種入土部三種入服器部一種入介部一種入人部神農本草經四十一種梁陶弘景注名醫別錄三十二種同上唐本草一十四種唐蘇恭本草拾遺一十七種唐陳藏器藥性本草一種唐甄權開寶本草九種宋馬志嘉祐本草八種宋掌禹錫圖經本草三種宋蘇頌日華本草八種宋人大明證類本草一種宋唐慎微本草綱目二十七種明李時珍附註魏李當之藥錄吳普本草宋雷斆炮炙齊徐之才藥對唐孫思邈千金李珣海藥唐楊損之刪繁蕭炳四聲蜀韓保升重注宋寇宗奭衍義陳承別說金張元素珍珠囊元李杲法象王好古湯液朱震亨補遺明汪機會編徐用誠發揮王綸集要金石之一金類二十八種金別錄中品校正併入拾遺金漿釋名黃牙鏡源太真時珍曰按許慎說文云五金黃為之長久埋不生衣百鍊不輕從革不違生於土故字左右注象金在土中之形爾雅云黃金謂之璗美者謂之鏐餅金謂之鈑絕澤謂之銑獨孤滔云天生牙謂之黃牙梵書謂之蘇伐羅弘景曰仙方名金為太真集解別錄曰金屑生益州採無時弘景曰金之所生處處皆有梁益寧三州多有出水沙中作屑謂之生金建平晉安亦有金沙出石中燒熔鼓鑄為砣雖被火亦未熟猶須更煉高麗扶南及西域等地成器皆煉熟可服藏器曰生金生嶺南夷獠峒穴山中如赤黑碎石金鐵屎之類南人云毒蛇齒落在石中又云蛇屎著石上及熓鳥屎著石上皆碎取毒處為生金有大毒殺人本草言黃金有毒誤矣生金與黃金全別也常見人取金掘地深丈餘至紛子石石皆一頭黑焦石下有金大者如指小者猶麻豆色如桑黃咬時極軟即是真金夫匠竊而吞者不見有毒其麩金出水沙中氈上淘取或鵝鴨腹中得之即便打成器物亦不重煉煎取金汁便堪鎮心志曰今醫家所用皆煉熟金箔及以水煮金器取汁用之則無毒矣皇朝收復嶺表詢訪彼人並無蛇屎之說藏器傳聞之言非矣頌曰今饒信南劍登州所出採亦多端或有若山石狀者若米豆粒者此類皆未經火併為生金珣曰山海經所說諸山出金極多不能備錄廣州記云大食國出金最多貨易並用金錢異物志云金生麗水又蔡州出瓜子金雲南出顆塊金在山石間採之黔南遂府吉州水中併產麩金嶺表錄異云五嶺內富州賓州澄州涪縣江溪河皆產金居人多養鵝鴨取屎以淘金片日得一兩或半兩有經日不獲一星者其金夜明宗奭曰顆塊金即穴山至百十尺見伴金石定見金也其石褐色一頭如火燒黑之狀其金色深赤黃麩金即在江沙水中淘汰而得其色淺黃皆是生金得之皆當鑄煉麩金耗多入藥當用塊金色既深則金氣足余須防藥製成及點化者此等焉得有造化之氣如紫雪之類用金煮汁蓋假其自然之氣爾又東南金色深西南金色淡亦土地所宜也時珍曰金有山金沙金二種其色七青八黃九紫十赤以赤為足色和銀者性柔試石則色青和銅者性硬試石則有聲寶貨辨疑云馬蹄金象馬蹄難得橄欖金出荊湖嶺南胯子金象帶胯出湖南北瓜子金大如瓜子麩金如麩片出湖南等地沙金細如沙屑出蜀中葉子金出雲南地鏡圖云黃金之氣赤夜有火光及白鼠或云山有薤下有金凡金曾在塚墓間及為釵釧溲器者陶隱居謂之辱金不可合煉寶藏論云金有二十種又外國五種還丹金出丹穴中體含丹砂色尤赤合丹服之稀世之寶也麩金出五溪漢江大者如瓜子小者如麥性平無毒山金出交廣南韶諸山銜石而生馬蹄金乃最精者二蹄一斤毒金即生金出交廣山石內赤而有大毒殺人煉十餘次毒乃已此五種皆真金也水銀金丹砂金雄黃金雌黃金硫黃金曾青金石綠金石膽金母砂金白錫金黑鉛金並藥製成者銅金生鐵金熟鐵金鍮石金並藥點成者已上十五種皆假金也性頑滯有毒外有五種乃波斯紫磨金東夷青金林邑赤金西戎金占城金也金屑氣味辛平有毒大明曰無毒珣曰生者有毒熟者無毒宗奭曰不曰金而更加屑字者是已經磨屑可用之義必須烹煉鍛屑為箔方可入藥金箔亦同生金有毒能殺人且難解有中其毒者唯鷓鴣肉可解之若不經鍛屑即不可用金性惡錫畏水銀得余甘子則體柔亦相感耳時珍曰洗金以鹽駱駝驢馬脂皆能柔金金遇鉛則碎翡翠石能屑金亦物性相制也金蛇能解生金毒晉賈后飲金屑酒而死則生金有毒可知矣凡用金箔須辨出銅箔主治鎮精神堅骨髓通利五臟邪氣服之神仙別錄療小兒驚傷五臟風癇失志鎮心安魂魄甄權癲癇風熱上氣咳嗽傷寒肺損吐血骨蒸勞極作渴並以箔入丸散服李珣破冷氣除風青霞子金漿拾遺氣味同金主治長生神仙久服腸中盡為金色藏器發明弘景曰生金辟惡而有毒不煉服之殺人仙經以醯蜜及豬肪牡荊酒輩煉至柔軟服之成仙亦以合水銀作丹砂醫方都無用者當是慮其有毒耳損之曰生者殺人百鍊者乃堪服水銀合膏飲即不煉頌曰金屑古方不見用者唯作金箔入藥甚便又古方金石凌紅雪紫雪輩皆取金銀煮汁此通用經煉者假其氣爾時珍曰金乃西方之行性能制木故療驚癇風熱肝膽之病而古方罕用唯服食家言之淮南三十六水法亦化為漿服餌葛洪抱朴子言餌黃金不亞於金液其法用豕負革肪苦酒煉之百遍即柔或以樗皮治之或以牡荊酒磁石消之為水或以雄黃雌黃合餌皆能地仙又言丹砂化為聖金服之昇仙別錄陳藏器亦言久服神仙其說蓋自秦皇漢武時方士傳流而來豈知血肉之軀水穀為賴可能堪此金石重墜之物久在腸胃乎求生而喪生可謂愚也矣故太清法云金稟中宮陰己之氣性本剛服之傷損肌肉又東觀秘記云亡人以黃金塞九竅則屍不朽此雖近於理然亦誨盜矣曷若速化歸虛之為愈也哉附方新五風眼爛弦金環燒紅掠上下瞼肉日數次甚妙集簡方牙齒風痛火燒金釵針之立止集簡方輕粉破口凡水腫及瘡病服輕粉後口瘡齦爛金器煮汁頻頻含漱能殺粉毒以愈為度外臺秘要水銀入耳能蝕人腦以金枕耳邊自出也張仲景方水銀入肉令人筋攣唯以金物熨之水銀當出蝕金候金白色是也頻用取效此北齊徐王方也本草拾遺銀別錄中品校正併入開寶生銀釋名白金綱目鋈時珍曰爾雅白金謂之銀其美者曰鏐說文云鋈白金也梵書謂之阿路巴集解別錄曰銀屑生永昌採無時弘景曰銀之所出處亦與金同但是生土中也煉餌法亦似金永昌屬益州今屬寧州恭曰銀與金生不同處所在皆有而以虢州者為勝此外多鉛穢為劣高麗作帖者云非銀礦所出然色青不如虢州者志曰生銀出饒州樂平諸坑銀礦中狀如硬錫紋理粗錯自然者真頌曰銀在礦中與銅相雜土人採得以鉛再三煎煉方成故為熟銀生銀則生銀礦中狀如硬錫其金坑中所得乃在土石中滲漏成條若絲髮狀土人謂之老翁須極難得方書用生銀必得此乃真珣曰按南越志波斯國有天生藥銀用為試藥指環又燒朱粉甕下多年沉積有銀號杯鉛銀光軟甚好與波斯銀功力相似只是難得今時燒煉家每一斤生鉛只得一二銖山海經云東北樂平郡堂少山出銀甚多黔中生銀體硬不堪入藥宗奭曰銀出於礦須煎煉成故名熟銀其生銀即不自礦中出而特然生者又謂之老翁須其入用不同世之術士以硃砂而成以鉛汞而成以焦銅而成者既無造化之氣豈可入藥不可不別時珍曰閩浙荊湖饒信廣滇貴州諸處山中皆產銀有礦中煉出者有沙土中煉出者其生銀俗稱銀筍銀牙者也亦曰出山銀獨孤滔丹房鏡源所謂鉛坑中出褐色石形如筍打破即白名曰自然牙曰自然鉛亦曰生鉛此有變化之道不堪服食者是也管子云上有鉛下有銀地鏡圖云山有蔥下有銀銀之氣入夜正白流散在地其精變為白雄雞寶藏論云銀有十七種又外有四種天生牙生銀坑內石縫中狀如亂絲色紅者上入火紫白如草根者次之銜黑石者最奇生樂平鄱陽產鉛之山一名龍牙一名龍鬚是正生銀無毒為至藥根本也生銀生石礦中成片塊大小不定狀如硬錫母砂銀生五溪丹砂穴中色理紅光黑鉛銀得子母之氣此四種為真銀有水銀銀草砂銀曾青銀石綠銀雄黃銀雌黃銀硫黃銀膽礬銀靈草銀皆是以藥製成者丹陽銀銅銀鐵銀白錫銀皆以藥點化者十三種皆假銀也外有四種新羅銀波斯銀林邑銀雲南銀並精好銀屑修治弘景曰醫方鎮心丸用之不可正服為屑當以水銀研令消也恭曰方家用銀屑取見成銀箔以水銀消之為泥合硝石及鹽研為粉燒出水銀淘去鹽石為粉極細用之乃佳不得只磨取屑耳時珍曰入藥只用銀箔易細若用水銀鹽硝制者反有毒矣龍木論謂之銀液又有錫箔可偽宜辨之氣味辛平有毒珣曰大寒無毒詳生銀下主治安五臟定心神止驚悸除邪氣久服輕身長年別錄定志去驚癇小兒癲疾狂走甄權破冷除風青霞子銀箔堅骨鎮心明目去風熱癲癇入丸散用李珣生銀氣味辛寒無毒獨孤滔云鉛內銀有毒保升曰畏黃連甘草飛廉石亭脂砒石惡羊血馬目毒公大明曰冷微毒畏磁石惡錫忌生血時珍曰荷葉蕈灰能粉銀羚羊角烏賊魚骨鼠尾龜殼生薑地黃磁石俱能瘦銀羊脂紫蘇子皆能柔銀主治熱狂驚悸發癇恍惚夜臥不安譫語邪氣鬼祟服之明目鎮心安神定志小兒諸熱丹毒並以水磨服之功勝紫雪開寶小兒中惡熱毒煩悶水磨服之大明煮水入蔥白粳米作粥食治胎動不安漏血時珍發明好古曰白銀屬肺頌曰銀屑葛洪肘後方治癰腫五石湯中用之宗奭曰本草言銀屑有毒生銀無毒釋者略漏不言蓋生銀已發於外無蘊郁之氣故無毒礦銀蘊於石中鬱結之氣全未敷暢故有毒也時珍曰此說非矣生銀初煎出如縵理乃其天真故無毒熔者投以少銅則成絲紋金花銅多則反敗銀去銅則復還銀而初入少銅終不能出作偽者又制以藥石鉛錫且古法用水銀煎消制銀箔成泥入藥所以銀屑有毒銀本無毒其毒則諸物之毒也今人用銀器飲食遇毒則變黑中毒死者亦以銀物探試之則銀之無毒可徵矣其入藥亦是平肝鎮怯之義故太清服煉書言銀稟西方辛陰之神結精為質性剛戾服之能傷肝是也抱朴子言銀化水服可成地仙者亦方士謬言也不足信斅曰凡使金銀銅鐵只可渾安在藥中借氣生藥力而已勿入藥服能消人脂附方舊二新四妊娠腰痛如折者銀一兩水三升煎二升服之子母秘錄胎動欲墮痛不可忍銀五兩苧根二兩清酒一盞水一大盞煎一盞溫服婦人良方胎熱橫悶生銀五兩蔥白三寸阿膠炒半兩水一盞煎服亦可入糯米作粥食聖惠方風牙疼痛文銀一兩燒紅淬燒酒一盞熱漱飲之立止集簡方口鼻疳蝕穿唇透頰銀屑一兩水三升銅器煎一升日洗三四次聖濟錄身面赤疵常以銀揩令熱久久自消千金翼附錄黃銀拾遺恭曰黃銀本草不載俗云為器辟惡乃為瑞物藏器曰黃銀載在瑞物圖經既堪為器明非瑞物時珍曰按方勺泊宅編云黃銀出蜀中色與金無異但上石則白色熊太古冀越集云黃銀絕少道家言鬼神畏之六帖載唐太宗賜房玄齡帶云世傳黃銀鬼神畏之春秋運鬥樞云人君秉金德而生則黃銀見世人以鍮石為黃銀非也鍮石即藥成黃銅也烏銀藏器曰今人用硫黃熏銀再宿瀉之則色黑矣工人用為器養生者以器煮藥兼於庭中高一二丈處夜承露醴飲之長年辟惡錫吝脂綱目集解時珍曰此乃波斯國銀礦也一作悉藺脂主治目生翳膜用火燒銅針輕點乃敷之不痛又主一切風氣及三焦消渴飲水併入丸藥用時珍附方新一小兒天吊多涎搐搦不定錫吝脂一兩水淘黑汁令盡水銀一分以少棗肉研不見星牛黃半分麝香半分研勻粳米飯丸黍米大每服三十二丸新汲水下名保命丹普濟方銀膏唐本草集解恭曰其法用白錫和銀薄及水銀合成之凝硬如銀合煉有法時珍曰今方士家有銀脆恐即此物也氣味辛大寒有毒主治熱風心虛驚悸恍惚狂走膈上熱頭面熱風衝心上下安神定志鎮心明目利水道治人心風健忘亦補牙齒缺落蘇恭硃砂銀日華集解時珍曰此乃方士用諸藥合硃砂煉製而成者鶴頂新書云丹砂受青陽之氣始生礦石二百年成丹砂而青女孕三百年而成鉛又二百年而成銀又二百年復得太和之氣化而為金又曰金公以丹砂為子是陰中之陽陽死陰凝乃成至寶氣味冷無毒大明曰畏石亭脂磁石鐵忌一切血主治延年益色鎮心安神止驚悸辟邪治中惡蠱毒心熱煎煩憂忘虛劣大明赤銅唐本草釋名紅銅綱目赤金弘景屑名銅落銅末銅花銅粉銅砂時珍曰銅與金同故字從金同也集解弘景曰銅為赤金生熟皆赤而本草無用今銅青及大錢皆入方用並是生銅應在下品之例也時珍曰銅有赤銅白銅青銅赤銅出川廣云貴諸處山中土人穴山採礦煉取之白銅出雲南青銅出南番唯赤銅為用最多且可入藥人以爐甘石煉為黃銅其色如金砒石煉為白銅雜錫煉為響銅山海經言出銅之山四百六十七今則不知其幾也寶藏論云赤金一十種丹陽銅武昌白慢銅一生銅生銀銅皆不出陶冶而生者無毒宜作鼎器波斯青銅可為鏡新羅銅可作鍾石綠石青白青等銅並是藥製成鐵銅以苦膽水浸至生赤煤熬煉成而黑堅錫坑銅大軟可點化自然銅見本條鶴頂新書云銅與金銀同一根源也得紫陽之氣而生綠綠二百年而生石銅始生於中其氣稟陽故質剛戾管子云上有陵石下有赤銅地鏡圖云山有磁石下有金若銅草莖黃秀下有銅器銅器之精為馬為僮抱朴子云銅有牝牡在火中尚赤時令童男童女以水灌之銅自分為兩段凸起者牡也凹下者牝也以牝為雌劍牡為雄劍帶之入江湖則蛟龍水神皆畏避也赤銅屑修治時珍曰即打銅落下屑也或以紅銅火煅水淬亦自落下以水淘淨用好酒入沙鍋內炒見火星取研末用氣味苦平微毒時珍曰蒼朮粉銅巴豆牛脂軟銅慈菇乳香啞銅物性然也主治賊風反折熬使極熱投酒中服五合日三或以五斤燒赤納二斗酒中百遍如上服之又治腋臭以醋和如麥飯袋盛先刺腋下脈去血封之神效唐本明目治風眼接骨焊齒療女人血氣及心痛大明同五倍子能染鬚髮時珍發明時珍曰太清服煉法云銅稟東方乙陰之氣結成性利服之傷腎既云傷腎而又能接骨何哉藏器曰赤銅屑主折傷能焊人骨及六畜有損者細研酒服直入骨損處六畜死後取骨視之猶有焊痕可驗打熟銅不堪用慎微曰朝野僉載云定州崔務墜馬折足醫者取銅末和酒服之遂瘥及亡後十年改葬視其脛骨折處猶有銅束之也附方舊一腋下狐臭崔氏方用清水洗淨又用清酢漿洗淨微揩破取銅屑和酢熱揩之甚驗外臺自然銅宋開寶釋名石髓鉛志曰其色青黃如銅不從礦煉故號自然銅集解志曰自然銅生邕州山岩間出銅處於坑中及石間採得方圓不定其色青黃如銅頌曰今信州火山軍銅坑中及石間皆有之信州出一種如亂銅絲狀云在銅礦中山氣熏蒸自然流出亦若生銀老翁須之類入藥最好火山軍出者顆塊如銅而堅重如石醫家謂之銗石用之力薄採無時今南方醫者說自然銅有兩三體一體大如麻黍或多方解累累相綴至如斗大者色煌煌明爛如黃金鍮石入藥最上一體成塊大小不定亦光明而赤一體如姜石鐵屎之類又有如不冶而成者形大小不定皆出銅坑中擊之易碎有黃赤有青黑煉之乃成銅也其說分析頗精而未嘗見似亂絲者又云今市人多以銗石為自然銅燒之成青焰如硫黃者是也此亦有二三種一種有殼如禹餘糧擊破其中光明如鑑色黃類鍮石也一種青黃而有牆壁成紋如束針一種碎理如團砂者皆光明如銅色多青白而赤少者燒之皆成煙焰頃刻都盡今醫家多誤以此為自然銅市中所貨往往是此而自然銅用須火煅此乃畏火不必形色只此可辨也獨孤滔曰自然銅出信州鉛山縣銀場銅坑中深處有銅礦多年礦氣結成似馬屁勃也色紫重食之苦澀者是真今人以大𥔒石為自然銅誤矣承曰今辰州川澤中出一種自然銅形圓似蛇含大者如胡桃小者如慄外有皮黑色光潤破之與銗石無別但比銗石不作臭氣耳入藥用之殊驗斆曰石髓鉛即自然銅勿用方金牙真相似若誤餌之吐殺人石髓鉛似干銀泥味微甘也時珍曰按寶藏論云自然銅生曾青石綠穴中狀如寒林草根色紅膩亦有牆壁又一類似丹砂光明堅硬有稜中含銅脈尤佳又一種似木根不紅膩隨手碎為粉至為精明近銅之山則有之今俗中所用自然銅皆非也修治斆曰採得石髓鉛捶碎同甘草湯煮一伏時至明漉出攤令乾入臼中搗了重篩過以醋浸一宿至明用六一泥泥瓷盒子盛二升文武火中養三日夜才幹用蓋蓋了火煅兩伏時去土研如粉用凡修事五兩以醋兩鎰為度時珍曰今人只以火煅醋淬七次研細水飛過用氣味辛平無毒大明曰涼主治折傷散血止痛破積聚開寶消瘀血排膿續筋骨治產後血邪安心止驚悸以酒磨服大明發明宗奭曰有人以自然銅飼折翅胡雁後遂飛去今人打撲損研細水飛過同當歸沒藥各半錢以酒調服仍手摩病處震亨曰自然銅世以為接骨之藥然此等方盡多大抵宜補氣補血補胃俗工唯在速效迎合病人之意而銅非煅不可用若新出火者其火毒金毒相扇挾香藥熱毒雖有接骨之功燥散之禍甚於刀劍戒之時珍曰自然銅接骨之功與銅屑同不可誣也但接骨之後不可常服即便理氣活血可爾附方新三心氣刺痛自然銅火煅醋淬九次研末醋調一字服即止衛生易簡方項下氣癭自然銅貯水甕中逐日飲食皆用此水其癭自消或火燒煙氣久久吸之亦可楊仁齋直指方暑濕癱瘓四肢不能動自然銅燒紅酒浸一夜川烏頭炮五靈脂蒼朮酒浸各一兩當歸二錢酒浸為末酒糊丸梧子大每服七丸酒下覺四肢麻木即止陸氏積德堂方銅礦石礦音古猛切亦作𨥥唐本草釋名時珍曰礦粗惡也五金皆有粗石銜之故名麥之粗者曰𪍿犬之惡者亦曰獷集解恭曰銅礦石狀如姜石而有銅星熔之取銅也出銅山中許慎說文云礦銅鐵樸石也氣味酸寒有小毒主治疔腫惡瘡為末敷之驢馬脊瘡臭腋磨汁塗之唐本銅青宋嘉祐釋名銅綠集解藏器曰生熟銅皆有青即是銅之精華大者即空綠以次空青也銅青則是銅器上綠色者淘洗用之時珍曰近時人以醋製銅生綠取收曬乾貨之氣味酸平微毒主治婦人血氣心痛合金瘡止血明目去膚赤息肉藏器主風爛眼淚出之才治惡瘡疳瘡吐風痰殺蟲時珍發明時珍曰銅青乃銅之液氣所結酸而有小毒能入肝膽故吐利風痰明目殺疳皆肝膽之病也抱朴子云銅青塗木入水不腐附方舊二新十一風痰猝中碧琳丹治痰涎潮盛卒中不語及一切風癱用生綠二兩乳細水化去石慢火熬干取辰日辰時辰位上修合再研入麝香一分糯米粉糊和丸彈子大陰乾猝中者每丸作二服薄荷酒研下餘風硃砂酒化下吐出青碧涎瀉下惡物大效治小兒用綠雲丹銅綠不計多少研粉醋麵糊丸芡子大每薄荷酒化服一丸須臾吐涎如膠神效經驗方爛弦風眼銅青水調塗碗底以艾熏干刮下塗爛處衛生易簡方赤發禿落油磨銅錢衣塗之即生普濟方面黶黑痣以草劃破銅綠末敷之三日勿洗水自落厚者再上之聖濟錄走馬牙疳銅青滑石杏仁等分為末擦之立愈邵真人經驗方口鼻疳瘡銅青枯礬等分研敷之又方人中白一錢銅綠三分研敷之楊梅毒瘡銅綠醋煮研末燒酒調搽極痛出水次日即干或加白礬等分研摻簡便方臁瘡頑癬銅綠七分研黃蠟一兩化熬以厚紙拖過表裡別以紙隔貼之出水妙亦治楊梅瘡及蟲咬筆峰雜興腸風痔瘻方見密陀僧下諸蛇螫毒銅青敷之千金方百蟲入耳生油調銅綠滴入衛生家寶方頭上生蝨銅青明礬末摻之摘玄方鉛日華釋名青金說文黑錫金公綱目水中金時珍曰鉛易沿流故謂之鉛錫為白錫故此為黑錫而神仙家拆其字為金公隱其名為水中金集解頌曰鉛生蜀郡平澤今有銀坑處皆有之燒礦而取時珍曰鉛生山穴石間人挾油燈入至數里隨礦脈上下曲折斫取之其氣毒人若連月不出則皮膚痿黃腹脹不能食多致疾而死地鏡圖云草青莖赤其下多鉛鉛錫之精為老婦獨孤滔云嘉州利州出草節鉛生鉛未煅者也打破脆燒之氣如硫黃紫背鉛即熟鉛鉛之精華也有變化能碎金剛鑽雅州出釣腳鉛形如皂子大又如蝌蚪子黑色生山澗沙中可干汞盧氏鉛粗惡力劣信州鉛雜銅氣陰平鉛出劍州是銅鐵之苗並不可用寶藏論云鉛有數種波斯鉛堅白為天下第一草節鉛出犍為銀之精也銜銀鉛銀坑中之鉛也內含五色並妙上饒樂平鉛次於波斯草節負版鉛鐵苗也不可用倭鉛可勾金土宿真君本草云鉛乃五金之祖故有五金狴犴追魂使者之稱言其能伏五金而死八石也雌黃乃金之苗而中有鉛氣是黃金之祖矣銀坑有鉛是白金之祖矣信鉛雜銅是赤金之祖矣與錫同氣是青金之祖矣硃砂伏於鉛而死於硫硫戀於鉛而伏於硇鐵戀於磁而死於鉛雄戀於鉛而死於五加故金公變化最多一變而成胡粉再變而成黃丹三變而成密陀僧四變而為白霜雷氏炮炙論云令鉛住火須仗修天如要形堅豈忘紫背注云修天補天石也紫背天葵也修治時珍曰凡用以鐵銚熔化瀉瓦上濾去渣腳如此數次收用其黑錫灰則以鉛沙取黑灰白錫灰不入藥氣味甘寒無毒藏器曰小毒主治鎮心安神治傷寒毒氣反胃嘔噦蛇蜴所咬炙熨之大明療癭瘤鬼氣疰忤錯為末和青木香敷瘡腫惡毒藏器消瘰癧癰腫明目固牙烏鬚髮治實女殺蟲墜痰治噎膈消渴風癇解金石藥毒時珍黑錫灰主治積聚殺蟲同檳榔末等分五更米飲服震亨發明好古曰黑錫屬腎時珍曰鉛稟北方癸水之氣陰極之精其體重實其性濡滑其色黑內通於腎故局方黑錫丹宣明補真丹皆用之得汞交感即能治一切陰陽混淆上盛下虛氣升不降發為嘔吐眩暈噎膈反胃危篤諸疾所謂鎮墜之劑有反正之功但性帶陰毒不可多服恐傷人心胃耳鉛性又能入肉故女子以鉛珠紝耳即自穿孔實女無竅者以鉛作鋌逐日紝之久久自開此皆昔人所未知者也鉛變化為胡粉黃丹密陀僧鉛白霜其功皆與鉛同但胡粉入氣分黃丹入血分密陀僧鎮墜下行鉛白霜專治上焦胸膈此為異耳方士又鑄為梳梳鬚髮令光黑或用藥煮之尤佳附方舊四新十七烏須明目黑鉛半斤鍋內熔汁旋入桑條灰柳木攪成沙篩末每早揩牙以水漱口洗目能固牙明目黑鬚發勝金方揩牙烏髭黑鉛消化以不蛀皂莢寸切投入炒成炭入鹽少許研勻日用揩牙摘去白髭黑者更不白也又方黑錫一斤炒灰埋地中五日入升麻細辛訶子同炒黑日用揩牙百日效普濟牙齒動搖方同上烏須鉛梳鉛十兩錫三兩婆羅得三個針砂熟地黃半兩茜根胡桃皮一兩沒石子訶黎勒皮硫黃石榴皮磁石皂礬烏麻油各二錢半為末先化鉛錫入末一半柳木攪勻傾入梳模子印成修齒余末同水煮梳三日三夜水耗加之取出故帛重包五日每以熟皮襯手梳一百下須先以皂莢水洗淨拭乾普濟腎臟氣發攻心面黑欲死及諸氣奔豚喘急鉛二兩石亭脂二兩丁香一兩木香一兩麝香一錢先化鉛炒乾入亭脂急炒焰起以醋噴之傾入地坑內覆住待冷取研粟飯丸芡子大每用二丸熱酒化服取汗或下或通氣即愈如大便不通再用一丸入玄明粉五分服聖濟錄婦人血氣冷痛攻心方同上風癇吐沫反目抽掣久患者黑鉛水銀結砂南星炮各一兩為末糯飯丸綠豆大一歲一丸乳汁下普濟方反胃噦逆黑鉛化汁入紙灰以柳木槌研成粉一兩入米醋一升砂鍋熬膏入蒸餅末少許搗丸小豆大每服一丸薑湯下聖濟錄多年反胃不止紫背鉛二兩石亭脂二兩鹽滷汁五兩燒鉛以滷汁淬盡與亭脂同炒或焰起銚子蓋上焰即止研勻蒸餅和丸梧子大每服二十丸煎石蓮乾柿湯下聖濟錄消渴煩悶黑鉛水銀等分結如泥常含豆許吞津聖惠方寸白蟲病先食豬肉一片乃以沙糖水調黑鉛灰四錢五更服之蟲盡下食白粥一日許學士病嘈雜服此下二蟲一寸斷一長二尺五寸節節有斑紋也本事方水腫浮滿烏錫五兩皂莢一挺炙酒二斗煮六沸頻服至小便出二三升即消千金翼小便不通黑鉛錯末一兩生薑半兩燈心一握井水煎服先以炒蔥貼臍聖惠方猝然咳嗽爐中鉛屑桂心皂莢等分為末蜜丸如梧子大每飲下十五丸忌蔥備急方瘰癧結核鉛三兩鐵器炒取黑灰醋和塗上故帛貼之頻換去惡汁如此半月不痛不破內消為水而愈劉禹錫傳信方癰疽發背黑鉛一斤甘草三兩微炙瓶盛酒一斗浸甘草乃熔鉛投酒中如此九度去滓飲酒醉臥即愈經驗方金石藥毒黑鉛一斤熔化投酒一升如此十餘次待酒至半升頓飲勝金方取輕粉毒出山黑鉛五斤打壺一把盛燒酒十五斤納土茯苓半斤乳香三錢封固重湯煮一日夜埋土中出火毒每日早晚任性飲數杯後用瓦盆接小便自有粉出為驗服至筋骨不痛乃止醫方摘要解砒霜毒煩躁如狂心腹疼痛四肢厥冷命在須臾黑鉛四兩磨水一碗灌之華佗危病方解硫黃毒黑錫煎湯服即解集簡方鉛霜日華釋名鉛白霜修治頌曰鉛霜用鉛雜水銀十五分之一合煉作片置醋甕中密封經久成霜時珍曰以鉛打成錢穿成串瓦盆盛生醋以串橫盆中離醋三寸仍以瓦盆覆之置陰處候生霜刷下仍合住氣味甘酸冷無毒宗奭曰鉛霜塗木瓜即失酸味金剋木也主治消痰止驚悸解酒毒去胸膈煩悶中風痰實止渴大明去膈熱涎塞宗奭治吐逆鎮驚去怯黑鬚發時珍發明頌曰鉛霜性極冷治風痰及嬰孺驚滯藥今醫家用之尤多時珍曰鉛霜乃鉛汞之氣交感英華所結道家謂之神符白雪其墜痰去熱定驚止瀉蓋有奇效但非久服常用之物爾病在上焦者宜此清鎮附方舊二新九小兒驚熱心肺積熱夜臥多驚鉛霜牛黃各半分鐵粉一分研勻每服一字竹瀝調下聖濟錄驚風癇疾喉閉牙緊鉛白霜一字蟾酥少許為末烏梅肉蘸藥於齦上揩之仍吹通關藥良久便開普濟方消渴煩熱鉛白霜枯白礬等分為末蜜丸芡子大綿裹含化咽汁又方鉛白霜一兩根黃硝石各一兩為末每冷水服一錢聖濟錄喉痹腫痛鉛白霜甘草半兩青黛一兩為末醋糊丸芡子大每含咽一丸立效聖濟錄懸癰腫痛鉛白霜一分甘草半生半炙一分為末綿裹含咽聖惠方口疳齦爛氣臭血出不拘大人小兒鉛白霜銅綠各二錢白礬豆許為末掃之宣明方鼻衄不止鉛白霜末新汲水服一字十全博救方痔瘡腫痛鉛白霜白片腦各半字酒調塗之隨手見效嬰童百問室女經閉恍惚煩熱鉛霜半兩生地黃汁一合調下日三服聖惠方梳髮令黑鉛霜包梳日日梳之勝於染者普濟方粉錫本經下品釋名解錫本經鉛粉綱目鉛華綱目胡粉弘景定粉藥性瓦粉湯液光粉日華白粉湯液水粉綱目官粉弘景曰即今化鉛所作胡粉也而謂之粉錫以與今乖時珍曰鉛錫一類也古人名鉛為黑錫故名粉錫釋名曰胡者糊也和脂以糊面也定瓦言其形光白言其色俗呼吳越者為官粉韶州者為韶粉辰州者為辰粉正誤恭曰鉛丹胡粉實用炒錫造陶言化鉛誤矣震亨曰胡粉是錫粉非鉛粉也古人以錫為粉婦人用以附面者其色類肌肉不可入藥志曰粉錫黃丹二物俱是化鉛為之英公李勣序云鉛錫莫辨者謂此也按李含光音義云黃丹胡粉皆是化鉛未聞用錫者參同契云胡粉投炭中色壞還為鉛抱朴子內篇云愚人不信黃丹胡粉是化鉛所作蘇恭以二物俱炒錫作大誤矣時珍曰錫炒則成黑灰豈有白粉蘇恭已誤而朱震亨復踵其誤何哉集解時珍曰按墨子云禹造粉張華博物志云紂燒鉛錫作粉則粉之來亦遠矣今金陵杭州韶州辰州皆造之而辰粉尤真其色帶青彼人言造法每鉛百斤熔化削成薄片卷作筒安木甑內甑下甑中各安醋一瓶外以鹽泥固濟紙封甑縫風爐安火四兩養一七便掃入水缸內依舊封養次次如此鉛盡為度不盡者留炒作黃丹每粉一斤入豆粉二兩蛤粉四兩水內攪勻澄去清水用細灰按成溝紙隔數層置粉於上將干截成瓦定形待乾收起而范成大虞衡志言桂林所作鉛粉最有名謂之桂粉以黑鉛著糟甕中罨化之何孟春余冬錄云嵩陽產鉛居民多造胡粉其法鉛塊懸酒缸內封閉四十九日開之則化為粉矣化不白者炒為黃丹黃丹滓為密陀僧三物收利甚博其鉛氣有毒工人必食肥豬犬肉飲酒及鐵漿以厭之枵腹中其毒輒病至死長幼為毒熏蒸多痿黃癱攣而斃其法略皆不同蓋巧者時出新意以速化為利故爾又可見昔人炒錫之謬相感志云韶粉蒸之不白以蘿蔔甕子蒸之則白氣味辛寒無毒權曰甘辛涼時珍曰胡粉能制硫黃又雌黃得胡粉而失色胡粉得雌黃而色黑蓋相惡也又入酒中去酸味收蟹不沙主治伏屍毒螫殺三蟲本經去鱉瘕療惡瘡止小便利墮胎別錄治積聚不消炒焦止小兒疳痢甄權治癰腫瘻爛嘔逆療癥瘕小兒疳氣大明止泄痢久積痢宗奭治食復勞復墜痰消脹治疥癬狐臭黑鬚發時珍發明弘景曰胡粉金色者療屍蟲彌良藏器曰久痢成疳者胡粉和水及雞子白服以糞黑為度為其殺蟲而止痢也時珍曰胡粉即鉛之變黑為白者也其體用雖與鉛及黃丹同而無硝鹽火燒之性內有豆粉蛤粉雜之只能入氣分不能入血分此為稍異人服食之則大便色黑者此乃還其本質所謂色壞還為鉛也亦可入膏藥代黃丹用附方舊十四新三十勞復食復欲死者水服胡粉少許肘後方小兒脾泄不止紅棗二十個去核將官粉入內以陰陽瓦焙乾去棗研粉每服三分米湯下孫真人集效方赤白痢下頻數腸痛定粉一兩雞子清和炙焦為末冷水服一錢肘後方小兒無辜疳下痢赤白胡粉熟蒸熬令色變以飲服半錢子母秘錄小兒腹脹胡粉鹽熬色變以摩腹上子母秘錄腹皮青色不速治須臾死方同上小兒夜啼水服胡粉三豆大日三服子母秘錄身熱多汗胡粉半斤雷丸四兩為末粉身千金方婦人心痛急者好官粉為末蔥汁和丸小豆大每服七丸黃酒送下即止粉能殺蟲蔥能透氣故也邵真人方寸白蛔蟲胡粉炒燥方寸匕入肉臛中空心服大效張文仲備急方服藥過劑悶亂者水和胡粉服之千金方鼻衄不止胡粉炒黑醋服一錢即止聖惠方齒縫出血胡粉半兩麝香半錢為末臥時揩牙聖濟錄墜撲瘀血從高落下瘀血搶心面青氣短欲死胡粉一錢和水服即安肘後方折傷接骨官粉硼砂等分為末每服一錢蘇木湯調下仍頻飲蘇木湯大效接骨方杖瘡腫痛水粉一兩赤石脂生一錢水銀一分以麻油杵成膏攤油紙貼之肉消者填滿緊縛救急方抓傷麵皮香油調鉛粉搽之一夕愈集簡方食梅牙齼韶粉揩之相感志染白鬚發胡粉石灰等分水和塗之以油紙包烘令溫暖候未燥間洗去以油潤之黑如漆也博物志腋下胡臭胡粉常粉之或以胡粉三合和牛脂煎稠塗之千金方陰股常濕胡粉粉之備急方乾溼癬瘡方同上黃水膿瘡官粉煅黃松香各三錢黃丹一錢飛礬二錢為末香油二兩熬膏敷之邵真人方小兒耳瘡月蝕胡粉和土塗之子母秘錄小兒疳瘡熬胡粉豬脂和塗張文仲方小兒舌瘡胡粉和豬𩩅骨中髓日三敷之食醫心鏡燕口吻瘡胡粉炒一分黃連半兩為末敷之普濟方痘瘡瘢痕或凸或凹韶粉一兩輕粉一定和研豬脂調敷陳文中小兒方妒精陰瘡鉛粉二錢銀杏仁七個銅銚內炒至杏黃去杏取粉出火毒研搽效集簡方反花惡瘡胡粉一兩胭脂一兩為末鹽湯洗淨敷之日五次聖惠方瘡似蜂窠愈而復發胡粉硃砂等分為末蜜和塗之聖濟錄血風臁瘡孫氏集效方用官粉四兩水調入碗內以蘄州艾葉燒煙燻干入乳香少許同研香油調作隔紙膏反復貼之楊氏簡便方用官粉炒過桐油調作隔紙貼之小兒丹毒唾和胡粉從外至內敷之良千金方湯火燒瘡胡粉羊髓和塗之孫真人方瘡傷水濕胡粉炭灰等分脂和塗孔上水即出也千金方蠼螋尿瘡酢和胡粉塗之千金方諸蛇螫傷胡粉和大蒜搗塗千金方誤吞金銀及錢胡粉一兩豬脂調分再服令消烊出也外臺秘要三年目翳胡粉塗之聖惠方口中乾燥煩渴無津雄豬膽五枚酒煮皮爛入定粉一兩研勻丸芡子大每含化一丸咽汁太平聖惠方腹中鱉症胡粉黍米淋汁溫服大效衛生易簡方接骨續筋止痛活血定粉當歸各一錢硼砂一錢半為末每服一錢蘇木煎湯調下仍頻飲湯同上發背惡瘡諸癰疽好光粉二兩真麻油三兩慢火熬以柳枝急攪至滴水成珠入白膠末少許入器水浸兩日油紙攤貼名神應膏直指方鉛丹本經下品釋名黃丹弘景丹粉唐本朱粉綱目鉛華正誤見粉錫下集解別錄曰鉛丹生於鉛出蜀郡平澤弘景曰即今熬鉛所作黃丹也俗方稀用惟仙經塗丹釜所須云化成九光者當謂九光丹以為釜爾無別法也宗奭曰鉛丹化鉛而成別錄言生於鉛則蘇恭炒錫作成之說誤矣不為難辨錫則色黯鉛則明白以此為異時珍曰按獨孤滔丹房鏡源云炒鉛丹法用鉛一斤土硫黃十兩硝石一兩熔鉛成汁下醋點之滾沸時下硫一塊少頃下硝少許沸定再點醋依前下少許硝黃待為末則成丹矣今人以作鉛粉不盡者用硝石礬石炒成丹若轉丹為鉛只用連須蔥白汁拌丹慢煎煅成金汁傾出即還鉛矣貨者多以鹽硝砂石雜之凡用以水漂去硝鹽飛去砂石澄干微火炒紫色地上去火毒入藥會典云黑鉛一斤燒丹一斤五錢三分也氣味辛微寒無毒大明曰微咸涼無毒伏砒制硇硫震亨曰一婦因多子月內服鉛丹二兩四肢冰冷食不入口時正仲冬急服理中湯加附子數十帖乃安謂之涼無毒可乎時珍曰鉛丹本無甚毒此婦產後冬月服之過劑其病宜矣主治吐逆胃反驚癇癲疾除熱下氣煉化還成九光久服通神明本經止小便除毒熱臍攣金瘡血溢別錄驚悸狂走消渴煎膏用止痛生肌甄權鎮心安神止吐血及嗽敷瘡長肉及湯火瘡染須大明治瘧及久積宗奭墜痰殺蟲去怯除忤惡止痢明目時珍發明成無己曰仲景龍骨牡蠣湯中用鉛丹乃收斂神氣以鎮驚也好古曰澀可去脫而固氣時珍曰鉛丹體重而性沉味兼鹽礬走血分能墜痰去怯故治驚癇癲狂吐逆反胃有奇功能消積殺蟲故治疳疾下痢瘧疾有實績能解熱拔毒長肉去瘀故治惡瘡腫毒及入膏藥為外科必用之物也附方舊八新二十五消渴煩亂黃丹新汲水服一錢以蕎麥粥壓之聖惠方吐逆不止碧霞丹用北黃丹四兩米醋半升煎乾炭火三秤就銚內煅紅冷定為末粟米飯丸梧子大每服七丸醋湯下集驗方伏暑霍亂水浸丹見木部巴豆下小兒吐逆不止宜此清鎮燒針丸用黃丹研末小棗肉和丸芡子大每以一丸針簽於燈上燒過研細乳汁調下一加硃砂枯礬等分謝氏小兒方反胃氣逆胃虛鉛丹二兩白礬二兩生石亭脂半兩以丹礬研勻入坩鍋內以炭半秤煅赤更養一夜出毒兩日入亭脂同研粟米飯和丸綠豆大每日米飲下十五丸聖濟錄泄瀉下痢赤白用棗肉搗爛入黃丹白礬各皂子大粳米飯一團和丸彈子大鐵線穿於燈上燒過為末米飲服之摘玄方赤白痢下黃丹炒紫黃連炒等分為末以糊丸麻子大每服五十丸生薑甘草湯下普濟方妊娠下痢疼痛用烏雞卵一個開孔去白留黃入鉛丹五錢攪勻泥裹煨乾研末每服二錢米飲下一服愈是男二服愈是女三因方吐血咯血咳血黃丹新汲水服一錢經驗方寒熱瘧疾體虛汗多者黃丹百草霜等分為末發日空心米飲服三錢不過二服愈或糊丸或蒜丸皆效肘後方用飛炒黃丹一兩恆山末三兩蜜丸梧子大每服五十丸溫酒下平旦及未發將發時各一服無不效普濟方端午日用黃丹炒二兩獨蒜一百個搗丸梧子大每服九丸空心長流水面東下二三發後乃用神效亦治痢疾三因方用黃丹炒建茶等分為末溫酒服二錢又黃丹飛焙麵糊丸芡子大每棗子一枚去核包一丸紙裹煨熟食之溫瘧不止黃丹炒半兩青蒿童尿浸二兩為末每服二錢寒多酒服熱多茶服仁存堂方小兒癉瘧壯熱不寒黃丹二錢蜜水和服冷者酒服名鬼哭丹劉涓子鬼遺方風癇發止驅風散用鉛丹二兩白礬二兩為末用三角磚相鬥以七層紙鋪磚上鋪丹於紙上礬鋪丹上以十斤柳木柴燒過為度取研每服二錢溫酒下王氏博濟方客忤中惡道間門外得之令人心腹刺痛氣衝心胸脹滿不治害人真丹方寸匕蜜三合和灌之肘後方一切目疾昏障治只障不治蜂蜜半斤銅鍋熬起紫色塊入飛過真黃丹二兩水一碗再煉至水氣盡以細生絹鋪薄紙一層濾淨瓶封埋地內三七每日點眼七次藥黏則洗之一方入訶子肉四個保壽堂方赤眼痛黃丹蜂蜜調貼太陽穴立效明目經驗方赤目及翳鉛丹白礬等分為末點之又方鉛丹烏賊骨等分合研白蜜蒸點之千金方眼生珠管鉛丹半兩鯉魚膽汁和如膏日點三五次聖惠方痘疹生翳黃丹輕粉等分為末吹少許入耳內左患吹右右患吹左疹痘方小兒重舌黃丹一豆大安舌下子母秘錄小兒口瘡糜爛黃丹一錢生蜜一兩相和蒸黑每以雞毛蘸搽甚效普濟方腋下胡臭黃丹入輕粉唾調頻摻之普濟方婦人逆產真丹塗兒足下集驗方蚰蜓入耳黃丹酥蜜杏仁等分熬膏綿裹包塞之聞香即出抽取聖惠方蠍蠆螫人醋調黃丹塗之肘後方金瘡出血不可以藥速合則內潰傷肉只以黃丹滑石等分為末敷之集玄方外痔腫痛黃丹滑石等分為末新汲水調日五上之嬰童百問血風臁瘡黃丹一兩黃蠟一兩香油五錢熬膏先以蔥椒湯洗貼之陸氏積德堂方遠近臁瘡黃丹飛炒黃柏酒浸七日焙各一兩輕粉半兩研細以苦茶洗淨輕粉填滿次用黃丹護之外以柏末攤膏貼之勿揭動一七見效孫氏集效方密陀僧唐本草釋名沒多僧唐本爐底恭曰密陀沒多並胡言也集解恭曰出波斯國形似黃龍齒而堅重亦有白色者作理石紋頌曰今嶺南閩中銀銅冶處亦有之是銀鉛腳其初採礦時銀銅相雜先以鉛同煎煉銀隨鉛出又採山木葉燒灰開地作爐填灰其中謂之灰池置銀鉛於灰上更加火煅鉛滲灰下銀住灰上罷火候冷出銀其灰池感鉛銀氣積久成此物未必自胡中來也承曰今市中所貨是小瓶實鉛丹鍛成者大塊尚有瓶形銀冶所出最良而罕有貨者外國者未嘗見之時珍曰密陀僧原取銀冶者今既難得乃取煎銷銀鋪爐底用之造黃丹者以腳滓煉成密陀僧其似瓶形者是也修治斆曰凡使搗細安瓷鍋中重紙袋盛柳蛀末焙之次下東流水浸滿火煮一伏時去柳末紙袋取用氣味咸辛平有小毒大明曰甘平無毒時珍曰制狼毒主治久痢五痔金瘡面上瘢䵟面膏藥用之唐本保升曰五痔謂牡酒腸血氣也鎮心補五臟治驚癇咳嗽嘔逆吐痰大明療反胃消渴瘧疾下痢止血殺蟲消積治諸瘡消腫毒除狐臭染髭發時珍發明時珍曰密陀僧感鉛銀之氣其性重墜下沉直走下焦故能墜痰止吐消積定驚癇治瘧痢止消渴療瘡腫洪邁夷堅志云驚氣入心絡喑不能言語者用密陀僧末一匕茶調服即愈昔有人伐薪為狼所逐而得是疾或授此方而愈又一軍校採藤逢惡蛇病此亦用之而愈此乃驚則氣亂密陀僧之重以去怯而平肝也其功力與鉛丹同故膏藥中用代鉛丹云附方舊三新一十五痰結胸中不散密陀僧一兩醋水各一盞煎乾為末每服二錢以酒水各一小盞煎一盞溫服少頃當吐出痰涎為妙聖惠方消渴飲水神效丸用密陀僧二兩研末湯浸蒸餅丸梧子大濃煎蠶繭鹽湯或茄根湯或酒下一日五丸日增五丸至三十丸止不可多服五六服後以見水噁心為度噁心時以乾物壓之日後自定甚奇選奇方赤白下痢密陀僧三兩燒黃色研粉每服一錢醋茶下日三服聖惠方腸風痔瘻銅青密陀僧各一錢麝香少許為末津和塗之濟急方小兒初生遍身如魚脬又如水晶破則成水流滲又生者密陀僧生研擫之仍服蘇合香丸救急方驚氣失音方見發明腋下狐臭漿水洗淨油調密陀僧塗之以一錢用熱蒸餅一個切開摻末夾之集簡方香口去臭密陀僧一錢醋調漱口普濟方大人口瘡密陀僧鍛研摻之聖濟方小兒口瘡不能吮乳密陀僧末醋調塗足心瘡愈洗去蔡醫博方也黎居士簡易方鼻內生瘡密陀僧香白芷等分為末蠟燭油調塗之簡便方鼻齄赤皰密陀僧二兩細研人乳調夜塗旦洗聖惠方痘瘡瘢黶方同上譚氏䵟𪒟斑點方同上外臺夏月汗斑如疹用密陀僧八錢雄黃四錢先以薑片擦熱仍以薑片蘸末擦之次日即焦活人心統骨疽出骨一名多骨瘡不時出細骨乃母受胎未及一月與六親骨肉交合感其精氣故有多骨之名以密陀僧末桐油調勻攤貼之即愈壽域方血風臁瘡密陀僧香油入粗碗內磨化油紙攤膏反覆貼之孫氏集效方陰汗濕癢密陀僧末敷之戴氏加蛇床子末錫拾遺釋名白鑞音臘鈏音引賀時珍曰爾雅錫謂之鈏郭璞注云白鑞也方術家謂之賀蓋錫以臨賀出者為美也集解別錄曰錫生桂陽山谷弘景曰今出臨賀猶是桂陽地界鉛與錫相似而入用大異時珍曰錫出雲南衡州許慎說文云錫者銀鉛之間也土宿本草云錫受太陰之氣而生二百年不動成砒砒二百年而錫始生錫稟陰氣故其質柔二百年不動遇太陽之氣乃成銀今人置酒於新錫器內浸漬日久或殺人者以砒能化錫歲月尚近便被採取其中蘊毒故也又曰砒乃錫根銀色而鉛質五金之中獨錫易制失其藥則為五金之賊得其藥則為五金之媒星槎勝覽言滿刺加國于山溪中淘沙取錫不假煎煉成塊名曰鬥錫也正誤恭曰臨賀採者名鉛一名白鑞惟此一處資天下用其錫出銀處皆有之體相似而入用大異時珍曰蘇恭不識鉛錫以錫為鉛以鉛為錫其謂黃丹胡粉為炒錫皆由其不識故也今正之氣味甘寒微毒獨孤滔曰羖羊角五靈脂伏龍肝馬鞭草皆能縮賀硇砒能硬錫巴豆蓖麻薑汁地黃能制錫松脂焊錫錫礦縮銀主治惡毒風瘡大明發明時珍曰洪邁夷堅志云汝人多病癭地饒風沙沙入井中飲其水則生癭故金房間人家以錫為井闌皆夾錫錢鎮之或沉錫井中乃免此患附方新二解砒霜毒錫器於粗石上磨水服之濟急方楊梅毒瘡黑鉛廣錫各二錢半結砂蜈蚣二條為末紙卷作小捻油浸一夜點燈日照瘡二次七日見效集玄方古鏡拾遺校正併入本經錫銅鏡鼻釋名鑑照子時珍曰鏡者景也有光景也鑑者監也監於前也軒轅內傳言帝會王母鑄鏡十二隨月用之此鏡之始也或云始於堯臣尹壽氣味辛無毒大明曰平微毒主治驚癇邪氣小兒諸惡煮汁和諸藥煮服文字彌古者佳藏器闢一切邪魅女人鬼交飛屍蠱毒催生及治暴心痛併火燒淬酒服百蟲入耳鼻中將鏡就敲之即出大明小兒疝氣腫硬煮汁服時珍發明時珍曰鏡乃金水之精內明外暗古鏡如古劍若有神明故能辟邪魅忤惡凡人家宜懸大鏡可辟邪魅劉根傳云人思形狀可以長生用九寸明鏡照面熟視令自識己身形久則身神不散疾患不入葛洪抱朴子云萬物之老者其精悉能託人形惑人唯不能易鏡中真形故道士入山以明鏡徑九寸以上者背之則邪魅不敢近自見其形必反卻走轉鏡對之視有踵者山神無踵者老魅也群書所載古鏡靈異往往可證謾撮於左方龍江錄云漢宣帝有寶鏡如八銖錢能見妖魅帝常佩之異聞記云隋時王度有一鏡歲疫令持鏡詣里中有疾者照之即愈樵牧閒談云孟昶時張敵得一古鏡徑尺余光照寢室如燭舉家無疾號無疾鏡西京雜記云漢高祖得始皇方鏡廣四尺高五尺表裡有明照之則影倒見以手捧心可見腸胃五臟人疾病照之則知病之所在女子有邪心則膽張心動酉陽雜俎云無勞縣舞溪石窟有方鏡徑丈照人五臟云是始皇照骨鏡松窗錄云葉法善有一鐵鏡照物如水人有疾病照見臟腑宋史云秦寧縣耕夫得鏡厚三寸徑尺二照見水底與日爭輝病熱者照之心骨生寒云仙錄云京師王氏有鏡六鼻常有云煙照之則左右前三方事皆見黃巢將至照之兵甲如在目前筆談云吳僧一鏡照之知未來吉凶出處又有火鏡取火水鏡取水皆鏡之異者也附方新一小兒夜啼明鑑掛床腳上聖惠方錫銅鏡鼻本經下品釋名弘景曰此物與胡粉異類而共條者古無純銅作鏡皆用錫雜之即今破古銅鏡鼻爾用之當燒赤納酒中若醯中出入百遍乃可搗也志曰凡鑄鏡皆用錫不爾即不明白故言錫銅鏡鼻今廣陵者為勝時珍曰錫銅相和得水澆之極硬故鑄鏡用之考工記云金錫相半謂之鑑燧之劑是也氣味酸平無毒權曰微寒藥訣曰冷無毒主治女子血閉癥瘕伏腸絕孕本經伏屍邪氣別錄產後余疹刺痛三十六候取七枚投醋中熬呷之亦可入當歸芍藥煎服甄權附方新一小兒客忤面青驚痛銅照子鼻燒赤少酒淬過與兒飲聖惠方鏡鏽即鏡上綠也俗名楊妃垢主治腋臭又療下疳瘡同五倍子末等分米泔洗後敷之時珍古文錢日華釋名泉孔方兄上清童子綱目青蚨時珍曰管子言禹以歷山之金鑄幣以救人困此錢之始也至周太公立九府泉法泉體圓含方輕重以銖周流四方有泉之象故曰泉後轉為錢魯褒錢神論云為世神寶親愛如兄字曰孔方又昔有錢精自稱上清童子青蚨血塗子母錢見虫部集解頌曰凡鑄銅之物多和以錫考工記云攻金之工金有六劑是也藥用古文錢銅弩牙之類皆有錫故其用近之宗奭曰古錢其銅焦赤有毒能腐蝕壞肉非特為有錫也此說非是但取周景王時大泉五十及寶貨秦半兩漢莢錢大小五銖吳大泉五百大錢當千宋四銖二銖及梁四柱北齊常平五銖之類方可用時珍曰古文錢但得五百年之外者即可用而唐高祖所鑄開元通寶得輕重大小之中尤為古今所重綦毋氏錢神論云黃金為父白銀為母鉛為長男錫為適婦其性堅剛須水終始體圓應天孔方效地此乃鑄錢之法也三伏鑄錢其汁不清俗名爐凍蓋火剋金也唐人端午於江心鑄鏡亦此意也氣味辛平有毒時珍曰同胡桃嚼即碎相制也主治翳障明目療風赤眼鹽滷浸用婦人生產橫逆心腹痛月膈五淋燒以醋淬用大明大青錢煮汁服通五淋磨入目主盲障膚赤和薏苡根煮服止心腹痛藏器發明宗奭曰古錢有毒治目中障瘀腐蝕壞肉婦人橫逆產五淋多用之予少時常患赤目腫痛數日不能開客有教以生薑一塊洗淨去皮以古青銅錢刮汁點之初甚苦熱淚蔑面然終無損後有患者教之往往疑惑信士點之無不一點遂愈更不須再但作瘡者不可用也時珍曰以胡桃同嚼食二三枚能消便毒便毒屬肝金伐木也附方舊一新二十一時氣欲死大錢百文水一斗煮八升入麝香末三分稍飲至盡或吐或下愈肘後方時氣溫病頭痛壯熱脈大始得一日者比輪錢一百五十七文水一斗煮取七升服汁須臾復以水五升更煮一升以水二升投中合得三升出錢飲汁當吐毒出也肘後方心腹煩滿及胸脅痛欲死者比輪錢二十枚水五升煮三升分三服肘後方急心氣痛古文錢一個打碎大核桃三個同炒熱入醋一碗沖服楊誠經驗方霍亂轉筋青銅錢四十九枚木瓜一兩烏梅炒五枚水二盞煎分溫服聖濟錄慢脾驚風利痰奇效用開元通寶錢背後上下有兩月痕者其色淡黑頗小以一個放鐵匙上炭火燒四圍上下各出珠子取出候冷傾入盞中作一服以南木香湯送下或人參湯亦可錢雖利痰非胃家所好須以木香佐之楊仁齋直指方下血不止大古錢四百文酒三升煮二升分三服普濟方赤白帶下銅錢四十文酒四升煮取二升分三服千金方小便氣淋比輪錢三百文水一斗煮取三升溫服千金方沙石淋痛古文錢煮汁服普濟方傷水喘急因年少飲冷水驚恐所致者古文錢七枚洗淨白梅七個水一鍾同浸三宿空心一呷良久得吐效仁存方唇腫黑痛癢不可忍四文大錢於石上磨豬脂汁塗之不過數遍愈幼幼新書口內熱瘡青錢二十文燒赤投酒中服之立瘥陳藏器本草眼赤生瘡連年不愈古錢一文青江石一個洗淨以錢於石上磨蜜取濃汁三四滴在盞覆瓦上以艾灸瓦內七壯熏蜜取點之效普濟方赤目浮翳古錢一文鹽方寸匕治篩點之千金方目猝不見錢於石上磨汁注眥中普濟方目生珠管及膚翳銅錢青一兩細墨半兩為末醋丸白豆大每以一丸乳汁新汲水各少許浸化點之聖惠方腋下狐臭古文錢十文鐵線串燒醋淬十次入麝香研末調塗應急良方跌撲傷損半兩錢五個火煅醋淬四十九次甜瓜子五錢珍珠二錢研末每服一字好酒調隨上下食前後青囊誤吞鐵錢古文銅錢十個白梅肉十個淹過即爛搗丸綠豆大每服一丸流水吞下即吐出聖濟錄百蟲入耳青錢十四文煎豬膏二合少少滴之聖濟錄便毒初起方見發明下銅弩牙別錄下品釋名時珍曰黃帝始作弩劉熙釋名云弩怒也有怒勢也其柄曰臂似人臂也鉤弦者曰牙似人牙也牙外曰郭下曰懸刀合名之曰機頌曰藥用銅弩牙以其有錫也氣味平微毒主治婦人難產血閉月水不通陰陽隔塞別錄發明弘景曰銅弩牙治諸病燒赤納酒中飲汁古者彌勝劉完素曰弩牙速產以機發而不括因其用而為使也附方舊一誤吞珠錢哽在咽者銅弩牙燒赤納水中冷飲汁立愈聖惠方諸銅器綱目氣味有毒時珍曰銅器盛飲食茶酒經夜有毒煎湯飲損人聲藏器曰銅器上汗有毒令人發惡瘡內疽主治霍亂轉筋腎堂及臍下疰痛並炙器隔衣熨其臍腹腎堂大明古銅器畜之辟邪祟時珍發明時珍曰趙希鵠洞天錄云山精水魅多歷年代故能為邪祟三代鐘鼎彝器歷年又過之所以能闢祟也銅鈷鉧一作鈷䥈熨斗也主治折傷接骨搗末研飛和少酒服不過二方寸匕又盛灰火熨臍腹冷痛時珍銅秤錘主治產難橫生燒赤淬酒服大明銅匙柄主治風眼赤爛及風熱赤眼翳膜燒熱烙之頻用妙時珍鐵本經中品校正併入別錄生鐵拾遺勞鐵釋名黑金說文烏金時珍曰鐵截也剛可截物也於五金屬水故曰黑金集解別錄曰鐵出牧羊平澤及祊城或析城採無時弘景曰生鐵是不破鑐槍釜之類鋼鐵是雜煉生鑐作刀鐮者鑐音柔頌曰鐵今江南西蜀有爐冶處皆有之初煉去礦用以鑄瀉器物者為生鐵再三銷拍可以作鐷者為鐷鐵亦謂之熟鐵以生柔相雜和用以作刀劍鋒刃者為鋼鐵鍛家燒鐵赤沸砧上打下細皮屑者為鐵落鍛灶中飛出如塵紫色而輕虛可以瑩磨銅器者為鐵精作針家磨鑢細末者謂之針砂取諸鐵於器中水浸之經久色青沫出可以染皂者為鐵漿以鐵拍作片段置醋糟中積久衣生刮取者為鐵華粉入火飛煉者為鐵粉又馬銜秤錘車轄及鋸杵刀斧並俗用有效時珍曰鐵皆取礦土煉成秦晉淮楚湖南閩廣諸山中皆產鐵以廣鐵為良甘肅土錠鐵色黑性堅宜作刀劍西番出賓鐵尤勝寶藏論云鐵有五種荊鐵出當陽色紫而堅利上饒鐵次之賓鐵出波斯堅利可切金玉太原蜀山之鐵頑滯剛鐵生西南瘴海中山石上狀如紫石英水火不能壞穿珠切玉如土也土宿本草云鐵受太陽之氣始生之初滷石產焉一百五十年而成磁石二百年孕而成鐵又二百年不經採煉而成銅銅復化為白金白金化為黃金是鐵與金銀同一根源也今取磁石碎之內有鐵片可驗矣鐵稟太陽之氣而陰氣不交故燥而不潔性與錫相得管子云上有赭下有鐵鐵本經恭曰此柔鐵也即熟鐵藏器曰經用辛苦者曰勞鐵氣味辛平有毒大明曰畏磁石灰炭能制石亭脂毒斆曰鐵遇神砂如泥似粉時珍曰鐵畏皂莢豬犬脂乳香朴硝硇砂鹽滷荔枝貘食鐵而蛟龍畏鐵凡諸草木藥皆忌鐵器而補腎藥尤忌之否則反消肝腎蓋肝傷則母氣愈虛矣主治堅肌耐痛本經勞鐵療賊風燒赤投酒中飲藏器生鐵別錄中品氣味辛微寒微毒見鐵下主治下部及脫肛別錄鎮心安五臟治癇疾黑鬢髮治癬及惡瘡疥蜘蛛咬蒜磨生油調敷大明散瘀血消丹毒時珍發明恭曰諸鐵療病並不入丸散皆煮取汁用之藏器曰鐵砂鐵精併入丸散時珍曰鐵於五金色黑配水而其性則制木故癇疾宜之素問治陽氣太盛病狂善怒者用生鐵落正取伐木之義日華子言其鎮心安五臟豈其然哉本草載太清服食法言服鐵傷肺者乃肝字之誤附方舊五新一脫肛歷年不入者生鐵二斤水一斗煮汁五升洗之日再集驗方熱甚耳聾燒鐵投酒中飲之仍以磁石塞耳日易夜去之千金方小兒丹毒燒鐵淬水飲一合陳氏本草小兒熛瘡一名爛瘡燒鐵淬水中二七遍浴之二三遍起作漿子母秘錄打撲瘀血在骨節及脅外不去以生鐵一斤酒三升煮一升服肘後方熊虎傷毒生鐵煮令有味洗之肘後方鋼鐵別錄中品校正併入開寶鐵粉拾遺針砂釋名跳鐵音條集解時珍曰鋼鐵有三種有生鐵夾熟鐵煉成者有精鐵百鍊出鋼者有西南海山中生成狀如紫石英者凡刀劍斧鑿諸刃皆是鋼鐵其針砂鐵粉鐵精亦皆用鋼鐵者按沈括筆談云世用鋼鐵以柔鐵包生鐵泥封煉令相入謂之團鋼亦曰灌鋼此乃偽鋼也真鋼是精鐵百鍊至斤兩不耗者純鋼也此乃鐵之精純其色明瑩磨之黯然青且黑與常鐵異亦有煉盡無鋼者地產不同也又有地溲淬柔鐵二三次即鋼可切玉見石腦油下凡鐵內有硬處不可打者名鐵核以香油塗燒之即散氣味甘平無毒主治金瘡煩滿熱中胸膈氣塞食不化別錄鐵粉宋開寶恭曰乃鋼鐵飛煉而成者人多取雜鐵作屑飛之其體重真鋼者不爾也氣味咸平無毒主治安心神堅骨髓除百病變黑潤肌膚令人不老體健能食久服令人身重肥黑合和諸藥各有所主開寶化痰鎮心抑肝邪特異許叔微發明見鐵落下附方新六驚癇發熱鐵粉水調少許服之聖惠方急驚涎潮壯熱悶亂鐵粉二錢硃砂一錢為末每服一字薄荷湯調下楊氏家藏方傷寒陽毒狂言妄語亂走毒氣在臟也鐵粉二兩龍膽草一兩為末磨刀水調服一錢小兒五分全幼心鑑頭痛鼻塞鐵粉二兩龍腦半分研勻每新汲水服一錢聖惠方雌雄疔瘡鐵粉一兩蔓菁根三兩搗如泥封之日二換集玄方風熱脫肛鐵粉研同白蘞末敷上按入直指方針砂拾遺藏器曰此是作針家磨鑢細末也須真鋼砂乃堪用人多以柔鐵砂雜和之飛為粉人莫能辨也亦堪染皂主治功同鐵粉和沒食子染須至黑藏器消積聚腫滿黃疸平肝氣散癭時珍附方新十風濕腳痛針砂川烏頭為末和勻炒熱綿包熨之摘玄方風痹暖手針砂四兩硇砂三錢黑腳白礬六錢研末以熱醋或水拌濕油紙裹置袋內任意執之冷再拌聖濟錄脾勞黃病針砂四兩醋炒七次乾漆燒存性二錢香附三錢平胃散五錢為末蒸餅丸梧子大任湯使下摘玄方濕熱黃瘡助脾去濕針砂丸用針砂不拘多少擂盡鏽淘洗白色以米醋於鐵銚內浸過一指炒乾再炒三五次候通紅取出用陳粳米半升水浸一夜搗粉作塊煮半熟杵爛入針砂二兩半百草霜炒一兩半搗千下丸梧子大每服五十丸用五加皮牛膝根木瓜浸酒下初服若泄瀉其病源去也乾坤生意水腫尿少針砂醋煮炒乾豬苓生地龍各三錢為末蔥涎研和敷臍中約一寸厚縛之待小便多為度日二易之入甘遂更妙德生堂方泄瀉無度諸藥不效方同上不用甘遂醫學正傳虛寒下痢腸滑不禁針砂七錢半官桂一錢枯礬一錢為末以涼水調攤臍上下縛之當覺大熱以水潤之可用三四次名玉胞肚仁存方項下氣癭針砂入水缸中浸之飲食皆用此水十日一換砂半年自消散楊仁齋直指方染白鬚發針砂醋炒七次一兩訶子白芨各四錢百藥煎六錢綠礬二錢為末用熱醋調刷鬚髮菜葉包住次早酸漿洗去此不壞須亦不作紅又方針砂蕎麵各一兩百藥煎為末茶調夜塗旦洗再以訶子五錢沒石子醋炒一個百藥煎少許水和塗一夜溫漿洗去黑而且光鐵落本經中品釋名鐵液別錄鐵屑拾遺鐵蛾弘景曰鐵落是染皂鐵漿也恭曰是鍛家燒鐵赤沸砧上鍛之皮甲落者若以漿為鐵落則鋼浸之汁復謂何等落是鐵皮滋液黑於余鐵故又名鐵液時珍曰生鐵打鑄皆有花出如蘭如蛾故俗謂之鐵蛾今煙火家用之鐵末浸醋書字於紙背後塗墨如碑字也氣味辛平無毒別錄曰甘主治風熱惡瘡瘍疽瘡痂疥氣在皮膚中本經除胸膈中熱氣食不下止煩去黑子可以染皂別錄治驚邪癲癇小兒客忤消食及冷氣並煎汁服之大明主鬼打鬼疰邪氣水漬沫出澄清暖飲一二杯藏器炒熱投酒中飲療賊風痙又裹以熨腋下療狐臭有驗蘇恭平肝去怯治善怒發狂時珍發明時珍曰按素問病態論云帝曰有病怒狂者此病安生岐伯曰生於陽也陽氣者暴折而不決故善怒病名陽缺曰何以知之曰陽明者常動巨陽少陽不動而動大疾此其候也治之當奪其食即已夫食入於陰長氣於陽故奪其食即已以生鐵落為飲夫生鐵落者下氣疾也此素問本文也愚嘗釋之云陽氣怫鬱而不得疏越少陽膽木挾三焦少陽相火巨陽陰火上行故使人易怒如狂其巨陽少陽之動脈可診之也奪其食不使胃火復助其邪也飲以生鐵落金以制木也木平則火降故曰下氣疾速氣即火也又李仲南永類方云腫藥用鐵蛾及針砂入丸子者一生須斷鹽蓋鹽性濡潤腫若再作不可為矣製法用上等醋煮半日去鐵蛾取醋和蒸餅為丸每薑湯服三四十丸以效為度亦只借鐵氣爾故日華子云煎汁服之不留滯於臟腑借鐵虎之氣以制肝木使不能克脾土土不受邪則水自消矣鐵精鐵粉鐵華粉針砂鐵漿入藥皆同此意附方新一小兒丹毒煅鐵屎研末豬脂和敷之千金方鐵精本經中品釋名鐵花弘景曰鐵精鐵之精華也出煅灶中如塵紫色輕為佳亦以磨瑩銅器用之氣味平微溫主治明目化銅本經療驚悸定心氣小兒風癇陰潰脫肛別錄發明見鐵落附方舊五新一下痢脫肛鐵精粉敷之至寶方女人陰脫鐵精羊脂布裹炙熱熨推之聖惠方男子陰腫鐵精粉敷之子母秘錄疔腫拔根鐵渣一兩輕粉一錢麝香少許為末針畫十字口點藥入內醋調麵糊敷之神效普濟方食中有蠱腹內堅痛面目青黃淋露骨立病變無常用爐中鐵精研末雞肝和丸梧子大食前酒下五丸不過十日愈肘後蛇骨刺人毒痛鐵精粉豆許吹入瘡內肘後方鐵華粉宋開寶釋名鐵胤粉日華鐵豔粉鐵霜修治志曰作鐵華粉法取鋼煅作葉如笏或團平面磨錯令光淨以鹽水灑之於醋甕中陰處埋之一百日鐵上衣生即成粉矣刮取細搗篩入乳缽研如面和合諸藥為丸散此鐵之精華功用強於鐵粉也大明曰懸於醬瓿上生霜者名鐵胤粉淘去粗滓鹹味烘乾用氣味咸平無毒主治安心神堅骨髓強志力除風邪養血氣延年變白去百病隨所冷熱和諸藥用棗膏為丸開寶止驚悸虛癇鎮五臟去邪氣治健忘冷氣心痛痃癖癥結脫肛痔瘻宿食等及敷竹木刺入肉大明發明見鐵落附方新一婦人陰挺鐵胤粉一錢龍腦半錢研水調刷產門危氏得效方鐵鏽拾遺釋名鐵衣藏器曰此鐵上赤衣也刮下用主治惡瘡疥癬和油塗之蜘蛛蟲咬蒜磨塗之藏器平肝墜熱消瘡腫口舌瘡醋磨塗蜈蚣咬時珍發明時珍曰按陶華云鐵鏽水和藥服性沉重最能墜熱開結有神也附方新八風瘙癮疹鏽鐵磨水塗之集簡方湯火傷瘡青竹燒油同鐵鏽搽之積德堂方疔腫初起多年土內鏽釘火煅醋淬刮下鏽末不論遍次煅取收之每用少許人乳和挑破敷之仍炒研二錢以齏水煎滾待冷調服普濟方腳腿紅腫熱如火炙俗名赤遊風用鐵鏽水塗解之惠濟方重舌腫脹鐵鏽鎖燒紅打下鏽研末水調一錢噙咽生生編小兒口瘡鐵鏽末水調敷之集簡方內熱遺精鐵鏽末冷水服一錢三服止活人心統婦人難產雜草燒鑊鏽白芷等分為末每服一錢童尿米醋各半和服見效救急方鐵爇拾遺釋名刀煙拾遺刀油藏器曰以竹木爇火於刀斧刃上燒之津出如漆者是也江東人多用之主治惡瘡蝕䘌金瘡毒物傷皮肉止風水不入入水不爛手足皸坼瘡根結筋瘰癧毒腫染髭發令永黑及熱未凝時塗之少頃當乾硬用之須防水又殺蟲立效藏器附方新一項邊癧子以桃核於刀上燒煙燻之陳氏本草鐵漿拾遺集解藏器曰陶氏謂鐵落為鐵漿非也此乃取諸鐵於器中以水浸之經久色青沫出即堪染皂者承曰鐵漿是以生鐵漬水服餌者旋入新水日久鐵上生黃膏則力愈勝唐太妃所服者乃此也若以染皂者為漿其酸苦臭澀不可近矧服食乎氣味咸寒無毒主治鎮心明目主癲癇發熱急黃狂走六畜癲狂人為蛇犬虎狼毒惡蟲等齧服之毒不入內也兼解諸毒入腹藏器附方舊二新三時氣生瘡胸中熱鐵漿飲之梅師方一切疔瘡鐵漿日飲一升千金方發背初起鐵漿飲二升取利外臺秘要蛇皮惡瘡鐵漿頻塗之談野翁方漆瘡作癢鐵漿頻洗愈外臺諸鐵器綱目集解時珍曰舊本鐵器條繁今撮為一大抵皆是借其氣平木解毒重墜無他義也鐵杵拾遺即藥杵也氣味無毒主治婦人橫產胞衣不下燒赤淬酒飲自順藏器鐵秤錘宋開寶氣味辛溫無毒主治賊風止產後血瘕腹痛及喉痹熱塞燒赤淬酒熱飲開寶治男子疝痛女子心腹妊娠脹滿漏胎猝下血時珍附方新四喉痹腫痛菖蒲根嚼汁燒秤錘淬一杯飲之普濟方舌腫咽痛咽生息肉舌腫秤錘燒赤淬醋一盞咽之聖惠方誤吞竹木秤錘燒紅淬酒飲之集玄方便毒初起極力提起令有聲以鐵秤錘摩壓一夜即散集簡方鐵銃綱目主治催生燒赤淋酒入內孔中流出乘熱飲之即產舊銃尤良時珍鐵斧綱目主治婦人產難橫逆胞衣不出燒赤淬酒服亦治產後血瘕腰腹痛時珍發明時珍曰古人轉女為男法懷妊三月名曰始胎血脈未流象形而變是時宜服藥用斧置床底系刃向下勿令本婦知恐不信以雞試之則一窠皆雄也蓋胎化之法亦理之自然故食牡雞取陽精之全於天產者佩雄黃取陽精之全於地產者操弓矢藉斧斤取剛物之見於人事者氣類潛感造化密移物理所必有故妊婦見神像異物多生鬼怪即其徵矣象牙犀角紋逐象生山藥雞冠形隨人變以雞卵告灶而抱雛以苕帚掃貓而成孕物且有感況於人乎藏器曰凡人身有弩肉可聽人家釘棺下斧聲之時便下手速擦二七遍以後自得消平產婦勿用鐵刀拾遺氣味辛平無毒主治蛇咬毒入腹取兩刀於水中相磨飲其汁百蟲入耳以兩刀於耳門上摩敲作聲自出藏器磨刀水服利小便塗脫肛痔核產腸不上耳中猝痛時珍大刀環綱目主治產難數日不出燒赤淬酒一杯頓服時珍剪刀股綱目主治小兒驚風錢氏有剪刀股丸用剪刀環頭研破煎湯服藥時珍故鋸拾遺氣味無毒主治誤吞竹木入咽燒故鋸令赤漬酒熱飲藏器布針拾遺主治婦人橫產取二七枚燒赤淬酒七遍服藏器附方新一眼生偷針布針一個對井睨視已而折為兩段投井中勿令人見張杲醫說鐵鏃綱目主治胃熱呃逆用七十二個煎湯啜之時珍鐵甲綱目主治憂鬱結滯善怒狂易入藥煎服時珍鐵鎖綱目主治齆鼻不聞香臭磨石上取末和豬脂綿裹塞之經日肉出瘥普濟鑰匙日華主治婦人血噤失音沖惡以生薑醋小便同煎服弱房人亦可煎服大明鐵釘拾遺主治酒醉齒漏出血不止燒赤注孔中即止時珍藏器曰有犯罪者遇恩赦免取枷上鐵及釘等收之後入官帶之得除免鐵鏵即鍤也綱目主治心虛風邪精神恍惚健忘以久使者四斤燒赤投醋中七次打成塊水二斗浸二七日每食後服一小盞時珍附方新三小兒傷寒百日內患壯熱用鐵鏵一斤燒赤水二斗淬三七次煎一半入柳葉七片浴之聖濟錄積年齒䘌舊鐵鏵頭一枚炭火燒赤捻硫黃一分豬脂一分於上熬沸以綿包柳杖搵藥熱烙齒縫數次愈普濟方灌頂油法治腦中熱毒風除目中翳障鎮心明目生油二斤故鐵鏵五兩打碎硝石半兩寒水石一兩馬牙硝半兩曾青一兩綿裹入油中浸七日每以一錢頂上摩之及滴少許入鼻內甚妙此大食國胡商方聖惠方鐵犁鑱尖日華主治得水制硃砂水銀石亭脂毒大明車轄即車軸鐵轄頭一名車缸宋開寶氣味無毒主治喉痹及喉中熱塞燒赤投酒中熱飲開寶主小兒大便下血燒赤淬水服外臺附方舊二新一小兒下血方見上妊娠咳嗽車缸一枚燒赤投酒中冷飲聖惠方走注氣痛車缸燒赤濕布裹熨病上千金方馬銜即馬勒口鐵也大明曰古舊者好亦可作醫工針也開寶氣味平無毒主治小兒癇婦人難產臨時持之並煮汁服一盞開寶治馬喉痹腫連頰壯熱吐氣數煎水服之聖惠馬鐙綱目主治田野磷火人血所化或出或沒來逼奪人精氣但以馬鐙相戛作聲即滅故張華云金葉一振遊光斂色時珍金石之二玉類一十四種玉別錄上品校正併入別錄玉屑釋名玄真時珍曰按許慎說文云玉乃石之美者有五德潤澤以溫仁也䚡理自外可以知中義也其聲舒揚遠聞智也不撓而折勇也銳廉而不技潔也其字象三玉連貫之形葛洪抱朴子云玄真者玉之別名也服之令人身飛輕舉故曰服玄真者其命不極集解別錄曰玉泉玉屑生藍田山谷採無時弘景曰好玉出藍田及南陽徐善亭部界中日南盧容水中外國於闐疏勒諸處皆善潔白如豬膏叩之鳴者是真也其比類者甚多相似宜精別之所以燕石入笥卞氏長號也珣曰異物志云玉出崑崙別寶經云凡石韞玉但將石映燈看之內有紅光明如初出日便知有玉也頌曰今藍田南陽日南不聞有玉惟于闐出之晉平居誨為鴻臚卿張匡鄴使于闐作行程記載其採玉之地云玉河在於闐城外其源出崑山西流一千三百里至於闐界牛頭山乃疏為三河一曰白玉河在城東三十里二曰綠玉河在城西二十里三曰烏玉河在綠玉河西七里其源雖一而其玉隨地而變故其色不同每歲五六月大水暴漲則玉隨流而至玉之多寡由水之大小七八月水退乃可取彼人謂之撈玉其地有禁器用服食往往用玉各地所有亦自彼來王逸玉論載玉之色曰赤如雞冠黃如蒸慄白如截肪黑如純漆謂之玉符而青玉獨無說焉今青白者常有黑者時有黃赤者絕無雖禮之六器亦不能得其真者今儀州出一種石如蒸栗色彼人謂之慄玉或云亦黃玉之類但少潤澤聲不清越為不及也然服食者惟貴純白他色亦不取焉承曰儀州慄玉乃黃石之光瑩者非玉也玉堅而有理火刃不可傷此石小刀便可雕刻與階州白石同體而異色爾時珍曰按太平御覽云交州出白玉夫余出赤玉挹婁出青玉大秦出菜玉西蜀出黑玉藍田出美玉色如藍故曰藍田淮南子云鐘山之玉炊以爐炭三日三夜而色澤不變得天地之精也觀此諸說則產玉之處亦多矣而今不出者地方恐為害也故獨以于闐玉為貴焉古禮玄圭蒼璧黃琮赤璋白琥玄璜以象天地四時而立名爾禮記云石蘊玉則氣如白虹精神見於山川也博物志云山有谷者生玉屍子云水圓折者有珠方折者有玉地鏡圖云二月山中草木生光下垂者有玉玉之精如美女玉書云玉有山玄文水蒼文生於山而木潤產於水而流芳藏於璞而文采露於外觀此諸說則玉有山產水產二種各地之玉多在山于闐之玉則在河也其石似玉者珷玞琨珉璁瓔也北方有罐子玉雪白有氣眼乃藥燒成者不可不辨然皆無溫潤稗官載火玉色赤可烹鼎暖玉可闢寒寒玉可闢暑香玉有香軟玉質柔觀日玉洞見日中宮闕此皆希世之寶也宗奭曰燕玉出燕北體柔脆如油和粉色不入藥用玉屑別錄修治弘景曰玉屑是以玉為屑非別一物也仙經服瑴玉有搗如米粒乃以苦酒輩消令如泥亦有合為漿者凡服玉皆不得用已成器物及塚中玉璞恭曰餌玉當以消作水者為佳屑如麻豆服者取其精潤臟腑滓穢當完出也又為粉服者即使人淋壅屑如麻豆其義殊深化水法在淮南三十六水法中氣味甘平無毒珣曰咸寒無毒時珍曰惡鹿角養丹砂主治除胃中熱喘息煩滿止渴屑如麻豆服之久服輕身長年別錄潤心肺助聲喉滋毛髮大明滋養五臟止煩躁宜共金銀麥門冬等同煎服有益李珣附方新三小兒驚啼白玉二錢半寒水石半兩為末水調塗心下聖惠方痃癖鬼氣往來疼痛及心下不可忍者不拘大人小兒白玉赤玉等分為末糊丸梧子大每服三十丸薑湯下聖惠方面身瘢痕真玉日日磨之久則自滅聖濟錄玉泉本經釋名玉札本經玉漿開寶瓊漿普曰玉泉一名玉屑弘景曰此當是玉之精華白者質色明澈可消之為水故名玉泉今人無復的識者通一為玉爾志曰按別本注云玉泉者玉之泉液也以仙室玉池中者為上故一名玉液今仙經三十六水法中化玉為玉漿稱為玉泉服之長年不老然功劣於自然泉液也宗奭曰本經言玉泉生藍田山谷採無時今藍田無玉而泉水古今不言採陶氏言玉為水故名玉泉如此則當言玉水不當言玉泉泉乃流布之義今詳泉字乃漿之誤去古既遠文字脫誤也道藏經有金飯玉漿之文唐李商隱有瓊漿未飲結成冰之詩是採玉為漿斷無疑矣別本所注不可取也若如所言則舉世不能得亦漫立此名耳時珍曰玉泉作玉漿甚是別本所注乃玉髓也別錄自有條諸家未深考爾修治青霞子曰作玉漿法玉屑一升地榆草一升稻米一升取白露二升銅器中煮米熟絞汁玉屑化為水以藥納入所謂神仙玉漿也藏器曰以玉投朱草汁化成醴朱草瑞草也術家取蟾蜍膏軟玉如泥以苦酒消之成水氣味甘平無毒普曰神農岐伯雷公甘李當之平畏款冬花青竹主治五臟百病柔筋強骨安魂魄長肌肉益氣利血脈久服耐寒暑不飢渴不老神仙人臨死服五斤三年色不變本經療婦人帶下十二病除氣癃明耳目久服輕身長年別錄治血塊大明發明慎微曰天寶遺事楊貴妃含玉咽津以解肺渴王莽遺孔休玉曰君面有疵美玉可以滅瘢後魏李預得餐玉之法乃採訪藍田掘得若環璧雜器形者大小百餘枚捶作屑日食之經年云有效驗而好酒損志及疾篤謂妻子曰服玉當屏居山林排棄嗜欲而吾酒色不絕自致於死非藥之過也屍體必當有異於人勿使速殯令後人知餐服之功時七月中旬長安毒熱停屍四日而體色不變口無穢氣弘景曰張華云服玉用藍田穀玉白色者平常服之則應神仙有人臨死服五斤死經三年其色不變古來發塚見屍如生者其身腹內外無不大有金玉漢制王公皆用珠襦玉匣是使不朽故也煉服之法水屑隨宜雖曰性平而服玉者亦多發熱如寒食散狀金玉既天地重寶不比余石若未深解節度勿輕用之志曰抱朴子云服金者壽如金服玉者壽如玉但其道遲成須服一二百斤乃可知也玉可以烏米酒及地榆酒化之為水亦可以蔥漿消之為䊀亦可餌以為丸亦可以燒為粉服之一年以上入水不沾入火不灼刃之不傷百毒不死不可用已成之器傷人無益得璞玉乃可用也赤松子以玄蟲血漬玉為水服之故能乘煙霞上下玉屑與水服之俱令人不死所以不及金者令人數數發熱似寒食散狀也若服玉屑宜十日一服雄黃丹砂各一刀圭散發洗沐冷水迎風而行則不發熱也董君異常以玉醴與盲人服旬日而目愈也時珍曰漢武帝取金莖露和玉屑服云可長生即此物也但玉亦未必能使生者不死惟使死者不朽爾養屍招盜反成暴棄曷若速朽歸虛之為見理哉白玉髓別錄有名未用校正併入拾遺玉膏釋名玉脂綱目玉膏拾遺玉液集解別錄曰生藍田玉石間時珍曰此即玉膏也別本以為玉泉者是矣山海經云密山上多丹木丹水出焉西流注於稷澤其中多白玉是有玉膏其源沸沸湯湯黃帝是食是饗是生玄玉玉膏所出以灌丹木黃帝乃取密山之玉禜而投之鐘山之陽瑾瑜之玉為良堅慄精密澤而有光五色發作以和柔剛天地鬼神是食是饗君子服之以御不祥謹按密山亦近於闐之間是食者服食也是饗者祭祀也服之者佩服也玉膏即玉髓也河圖玉版云少室之山有白玉膏服之成仙十洲記云瀛洲有玉膏如酒名曰玉醴飲數升輒醉令人長生抱朴子云生玉之山有玉膏流出鮮明如水精以無心草末和之須臾成水服之一升長生皆指此也藏器曰今玉石間水飲之亦長生潤澤氣味甘平無毒主治婦人無子不老延年別錄青玉別錄有名未用釋名谷玉時珍曰谷一作瑴又作玨谷角二音二玉相合曰瑴此玉常合生故也集解別錄曰生藍田弘景曰張華言合玉漿用谷玉正縹白色不夾石者大如升小者如雞子取於穴中者非今作器物玉也出襄鄉縣舊穴中黃初時詔徵南將軍夏侯尚求之時珍曰按格古論云古玉以青玉為上其色淡青而帶黃色綠玉深綠色者佳淡者次之菜玉非青非綠如菜色此玉之最低者氣味甘平無毒主治婦人無子輕身不老長年別錄附錄璧玉別錄曰味甘無毒主明目益氣使人多精生子時珍曰璧瑞玉圜也此玉可為璧故曰璧玉璧外圓象天內方象地爾雅云璧大六寸謂之瑄肉倍好謂之壁好倍肉謂之瑗玉英別錄曰味甘主風瘙皮膚癢生山竅中明白可作鏡一名石鏡十二月採合玉石別錄曰味甘無毒主益氣療消渴輕身辟穀生常山中丘如彘肪時珍曰此即碾玉砂也玉須此石碾之乃光青琅玕本經下品校正併入拾遺石闌干釋名石闌干拾遺石珠本經青珠別錄時珍曰琅玕象其聲也可碾為珠故得珠名集解別錄曰青琅玕生蜀郡平澤採無時弘景曰此蜀都賦所稱青珠黃環者也琅玕亦是崑崙山上樹名又九真經中大丹名恭曰琅玕有數種色以青者入藥為勝是琉璃之類火齊寶也今出巂州以西烏臼蠻中及於闐藏器曰石闌干生大海底高尺余如樹有根莖莖上有孔如物點之漁人以網罾得之初從水出微紅後漸青頌曰今秘書中有異魚圖載琅玕青色生海中雲海人以網於海底取之初出水紅色久而青黑枝柯似珊瑚而上有孔竅如蟲蛀擊之有金石之聲乃與珊瑚相類其說與別錄生蜀郡平澤及蘇恭所云不同人莫能的識謹按尚書雍州缺貢球琳琅玕爾雅云西北之美者有崑崙墟之璆琳琅玕孔安國郭璞注皆以為石之似珠者而山海經云崑崙山有琅玕若然是石之美者明瑩若珠之色而狀森植爾大抵古人謂石之美者多謂之珠廣雅謂琉璃珊瑚皆為珠是也以上所說皆出西北山中而今圖乃雲海底得之蓋珍貴之物山海或俱產焉今醫家亦以難得而稀用也宗奭曰書云雍州厥貢球琳琅玕西域記云天竺國正出此物蘇恭云是琉璃之類琉璃乃火成之物琅玕非火成者安得同類時珍曰按許慎說文云琅玕石之似玉者孔安國云石之似珠者總龜云生南海石崖間狀如筍質似玉玉冊云生南海崖石內自然感陰陽之氣而成似珠而赤列子云蓬萊之山珠玕之樹叢生據諸說則琅玕生於西北山中及海山崖間其云生於海底網取者是珊瑚非琅玕也在山為琅玕在水為珊瑚珊瑚亦有碧色者今回民地方出一種青珠與碧靛相似恐是琅玕所作者也山海經云開明山北有珠樹淮南子云曾城九重有珠樹在其西珠樹即琅玕也余見珊瑚下氣味辛平無毒之才曰殺錫毒得水銀良畏雞骨主治身癢火瘡癰瘍疥瘙死肌本經白禿浸淫在皮膚中煮煉服之起陰氣可化為丹別錄療手足逆臚弘景石闌干主石淋破血產後惡血磨服或煮服亦火燒投酒中服藏器珊瑚唐本草釋名缽擺娑福羅梵書集解恭曰珊瑚生南海又從波斯國及師子國來頌曰今廣州亦有云生海底作枝柯狀明潤如紅玉中多有孔亦有無孔者枝柯多者更難得採無時謹按海中經云取珊瑚先作鐵網沉水底珊瑚貫中而生歲高三二尺有枝無葉因絞網出之皆摧折在網中故難得完好者不知今之取者果爾否漢積翠池中有珊瑚高一丈二尺一本三柯上有四百六十三條云是南越王趙佗所獻夜有光景晉石崇家有珊瑚高六七尺今並不聞有此高大者宗奭曰珊瑚有紅油色者細縱紋可愛有如鉛丹色者無縱紋為下品入藥用紅油色者波斯國海中有珊瑚洲海人乘大舶墮鐵網水底取之珊瑚初生磐石上白如菌一歲而黃三歲變赤枝幹交錯高三四尺人沒水以鐵發其根系網舶上絞而出之失時不取則腐蠹時珍曰珊瑚生海底五七株成林謂之珊瑚林居水中直而軟見風日則曲而硬變紅色者為上漢趙佗謂之火樹是也亦有黑色者不佳碧色者亦良昔人謂碧者為青琅玕俱可作珠許慎說文云珊瑚色赤或生於海或生於山據此說則生於海者為珊瑚生於山者為琅玕尤可徵矣互見琅玕下氣味甘平無毒主治去目中翳消宿血為末吹鼻止鼻衄唐本明目鎮心止驚癇大明點眼去飛絲時珍發明珣曰珊瑚主治與金相似宗奭曰今人用為點眼箸治目翳藏器曰珊瑚刺之汁流如血以金投之為丸名金漿以玉投之為玉髓久服長生附方舊一小兒麩翳未堅不可亂藥宜以珊瑚研如粉日少少點之三日愈錢相公篋中方馬腦宋嘉祐釋名瑪瑙文石摩羅迦隸佛書藏器曰赤爛紅色似馬之腦故名亦云馬腦珠胡人云是馬口吐出者謬言也時珍曰按增韻云玉屬也紋理交錯有似馬腦因以名之拾遺記云是鬼血所化更謬集解藏器曰馬腦生西國玉石間亦美石之類重寶也來中國者皆以為器又出日本國用砑木不熱者為上熱者非真也宗奭曰馬腦非玉非石自是一類有紅白黑三種亦有紋如纏絲者西人以小者為玩好之物大者研為器時珍曰馬腦出西南諸國云得自然灰即軟可刻也曹昭格古論云多出北地南番西番非石非玉堅而且脆刀刮不動其中有人物鳥獸形者最貴顧薦負暄錄云馬腦品類甚多出產有南北大者如斗其質堅硬碾造費工南馬腦產大食等國色正紅無瑕可作杯斝西北者色青黑寧夏瓜沙羌地砂磧中得者尤奇有柏枝馬腦花如柏枝有夾胎馬腦正視瑩白側視則若凝血一物二色也截子馬腦黑白相間合子馬腦漆黑中有一白線間之錦江馬腦其色如錦纏絲馬腦紅白如絲此皆貴品漿水馬腦有淡水花醬斑馬腦有紫紅花蛐蟮馬腦粉紅花皆價低又紫雲馬腦出和州土馬腦出山東沂州亦有紅色雲頭纏絲胡桃花者又竹葉馬腦出淮右花如竹葉並可作桌面屏風金陵雨花臺小馬腦只可充玩耳試馬腦法以砑木不熱者為真氣味辛寒無毒主治辟惡熨目赤爛藏器主目生障翳為末日點時珍寶石綱目集解時珍曰寶石出西番回鶻地方諸坑井內雲南遼東亦有之有紅綠碧紫數色紅者名刺子碧者名靛子翠者名馬價珠黃者名木難珠紫者名蠟子又有鴉鶻石貓精石石榴子紅扁豆等名色皆其類也山海經言騍山多玉淒水出焉西注於海中多采石採石即寶石也碧者唐人謂之瑟瑟紅者宋人謂之靺蠍今通呼為寶石以鑲首飾器物大者如指頭小者如豆粒皆碾成珠狀張勃吳錄云越巂雲南河中出碧珠須祭而取之有縹碧綠碧此即碧色寶石也主治去翳明目入點藥用之灰塵入目以珠拭拂即去時珍玻璃拾遺釋名頗黎綱目水玉拾遺時珍曰本作頗黎頗黎國名也其瑩如水其堅如玉故名水玉與水精同名集解藏器曰玻璃西國之寶也玉石之類生土中或云千歲冰所化亦未必然時珍曰出南番有酒色紫色白色瑩澈與水精相似碾開有雨點花者為真外丹家亦用之藥燒者有氣眼而輕玄中記云大秦國有五色頗黎以紅色為貴梁四公子記云扶南人來賣碧頗黎鏡廣一尺半重四十斤內外皎潔嚮明視之不見其質蔡絛云御庫有玻璃母乃大食所產狀如鐵滓煅之但作珂子狀青紅黃白數色氣味辛寒無毒主治驚悸心熱能安心明目去赤眼熨熱腫藏器摩翳障大明水精拾遺釋名水晶綱目水玉綱目石英時珍曰瑩澈晶光如水之精英會意也山海經謂之水玉廣雅謂之石英集解時珍曰水精亦頗黎之屬有黑白二色倭國多水精第一南水精白北水精黑信州武昌水精濁性堅而脆刀刮不動色澈如泉清明而瑩置水中無瑕不見珠者佳古語云水化謬言也藥燒成者有氣眼謂之硝子一名海水精抱朴子言交廣人作假水精碗是此氣味辛寒無毒主治熨目除熱淚藏器亦入點目藥穿串吞嚥中推引諸哽物時珍附錄火珠時珍曰說文謂之火齊珠漢書謂之玫瑰音枚回唐書云東南海中有羅剎國出火齊珠大者如雞卵狀類水精圓白照數尺日中以艾承之則得火用灸艾炷不傷人今占城國有之名朝霞大火珠又續漢書云哀牢夷出火精琉璃則火齊乃火精之訛正與水精對碝石音軟時珍曰出雁門石次於玉白色如冰亦有赤者山海經云北山多碝石禮云士佩碝玫是也琉璃拾遺釋名火齊時珍曰漢書作流離言其流光陸離也火齊與火珠同名集解藏器曰集韻云琉璃火齊珠也南州異物志云琉璃本質是石以自然灰治之可為器石不得此則不可釋佛經所謂七寶者琉璃車渠馬腦玻璃真珠是也時珍曰按魏略云大秦國出金銀琉璃有赤白黃黑青綠縹紺紅紫十種此乃自然之物澤潤光采逾於眾玉今俗所用皆銷冶石汁以眾藥灌而為之虛脆不貞格古論云石琉璃出高麗刀刮不動色白厚半寸許可點燈明於牛角者異物志云南天竺諸國出火齊狀如雲母色如紫金重沓可開析之則薄如蟬翼積之乃如紗縠亦琉璃雲母之類也按此石今人以作燈球明瑩而堅耐久蘇頌言亦可入藥未見用者主治身熱目赤以水浸冷熨之藏器雲母本經上品釋名雲華云珠雲英雲液云砂磷石本經時珍曰雲母以五色立名詳見下文按荊南志云華容方台山出雲母土人候云所出之處於下掘取無不大獲有長五六尺可為屏風者但掘時忌作聲也據此則此石乃云之根故得雲母之名而云母之根則陽起石也抱朴子有云服雲母十年雲氣常覆其上服其母以致其子理自然也集解別錄曰雲母生泰山山谷齊山廬山及琅琊北定山石間二月採之雲華五色具雲英色多青云珠色多赤雲液色多白云砂色青黃磷石色正白弘景曰按仙經雲母有八種向日視之色青白多黑者名雲母色黃白多青者名雲英色青黃多赤者名云珠如冰露乍黃乍白者名云砂黃白皛皛者名雲液皎然純白明澈者名磷石此六種並好服各有時月其黯黯純黑有紋斑斑如鐵者名云膽色雜黑而強肥者名地涿此二種並不可服煉之有法宜精細不爾入腹大害人今江東惟用廬山者為勝青州者亦好以沙土養之歲月生長頌曰今兗州雲夢山及江州淳州杭越間亦有之生土石間作片成層可析明滑光白者為上其片有絕大而瑩潔者今人以飾燈籠亦古扇屏之遺意也江南生者多青黑不堪入藥謹按方書用雲母皆以白澤者為貴惟中山衛叔卿單服法用雲母五色具者葛洪抱朴子云雲母有五種而人不能別當舉以向日看之陰地不見雜色也五色並具而多青者名雲英宜春服之五色並具而多赤者名云珠宜夏服之五色並具而多白者名雲液宜秋服之五色並具而多黑者名雲母宜冬服之但有青黃二色者名云砂宜季夏服之皛皛純白者名磷石四時可服也古方服五云甚多然修煉節度恐非文字可詳不可輕餌也損之曰青赤黃紫白者並堪服白色輕薄通透者為上黑者不任用令人淋瀝發瘡修治斆曰凡使黃黑者厚而頑赤色者經婦人手把者並不中用須要光瑩如冰色者為上每一斤用小地膽草紫背天葵生甘草地黃汁各一鎰乾者細銼濕者取汁了於瓷鍋中安置下天池水三鎰著火煮七日夜水火勿令失度雲母自然成碧玉漿在鍋底卻以天池水猛投其中攪之浮如蝸涎者即去之如此三度淘淨取沉香一兩搗作末以天池水煎沉香湯三升以來分為三度再淘雲母漿了日曬任用抱朴子曰服五云之法或以桂蔥水玉化之為水或以露於鐵器中以玄水熬之為水或以硝石合於筒中埋之為水或以蜜溲為酪或以秋露漬之百日韋囊挻以為粉或以無顛草樗血合餌之服至一年百病除三年反老成童五年役使鬼神胡演曰煉粉法八九月間取雲母以礬石拌勻入瓦罐內封口三伏時則自柔軟去礬次日取百草頭上露水漬之百日韋囊挻以為粉時珍曰道書言鹽湯煮雲母可為粉又云雲母一斤鹽一斗漬之銅器中蒸一日臼中搗成粉又云雲母一斤白鹽一升同搗細入重布袋挼之沃令鹽味盡懸高處風吹自然成粉氣味甘平無毒權曰有小毒惡徐長卿忌羊血粉之才曰澤瀉為之使畏鮀甲及流水弘景曰煉之用礬則柔爛亦是相畏也百草上露乃勝東流水亦有用五月茅屋溜水者獨孤滔曰制汞伏丹砂主治身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目久服輕身延年本經下氣堅肌續絕補中療五勞七傷虛損少氣止痢久服悅澤不老耐寒暑志高神仙別錄主下痢腸澼補腎冷甄權發明保升曰雲母屬金故色白而主肺宗奭曰古雖有服煉法今人服者至少謹之至也惟合雲母膏治一切癰毒瘡等方見和劑局方慎微曰明皇雜錄云開元中名醫紀朋觀人顏色談笑知病淺深不待診脈帝召入掖庭看一宮人每日昃則笑歌啼號若狂疾而足不能履地朋視之曰此必因食飽而大促力頓僕於地而然乃飲雲母湯熟寐而失所苦問之乃言太華公主載誕某當主謳懼聲不能清長因吃㹠蹄羹飽而歌大麴唱罷覺胸中甚熱戲於砌臺因墜下久而方蘇遂病此也又經效方云青城山丈人觀主康道豐治百病雲母粉方用雲母一斤拆開揉入大瓶內築實上澆水銀一兩封固以十斤頂火煅赤取出卻拌香蔥紫連翹草二件合搗如泥後以夾絹袋盛於大水盆內搖取粉余滓未盡再添草藥重搗取粉以木盤一面於灰上印一淺坑鋪紙傾粉在內候乾焙之以麵糊丸梧子大遇有病者服之無不效知成都府辛諫議曾患大風眾醫不愈道豐進此服之神驗抱朴子曰他物埋之即朽著火即焦而五云入猛火中經時不焦埋之不腐故服之者長生入水不濡入火不燒踐棘不傷時珍曰昔人言云母壅屍亡人不朽盜發馮貴人塚形貌如生因共奸之發晉幽公塚百屍縱橫及衣服皆如生人中並有雲母壅之故也附方舊七新七服食雲母上白雲母二十斤薄擘以露水八斗作湯分半淘洗二次又取二斗作湯納芒硝十斤木器中漬二十日取出絹袋盛懸屋上勿見風日令燥以鹿皮為囊揉之從旦至午篩滓復揉得好粉五斗余者棄之以粉一斗納崖蜜二斤攪糊入竹筒中薄削封口漆固埋北垣南崖下入地六尺覆土春夏四十日秋冬三十日出之當成水若洞洞不消更埋三十日此水能治萬病及勞氣風疹每以溫水一合和服之日三服十日小便當變黃二十日腹中寒澼消三十日齲齒更生四十日不畏風寒五十日諸病皆愈顏色日少長生神仙千金方痰飲頭痛往來寒熱雲母粉二兩煉過恆山一兩為末每服方寸匕湯服取吐忌生蔥生菜深師方牝瘧多寒雲母燒二日夜龍骨蜀漆燒去腥等分為散未發前漿水服錢仲景金匱方小兒下痢赤白及水痢雲母粉半兩煮白粥調食之食醫心鏡赤白久痢積年不愈飲調雲母粉方寸匕服二服立見神效千金方婦人帶下水和雲母粉方寸匕服立見神效千金方小便淋疾溫水和雲母粉服三錢千金方婦人難產經日不生雲母粉半兩溫酒調服入口即產不順者即順萬不失一陸氏云此是何德揚方也已救三五十人積德堂方粉滓面䵟雲母粉杏仁等分為末黃牛乳拌略蒸夜塗旦洗聖濟錄風疹遍身百計不愈煅雲母粉清水調服二錢良千金方一切惡瘡雲母粉敷之千金方火瘡敗壞雲母粉和生羊髓塗之聖惠方金瘡出血雲母粉敷之絕妙事林廣記風熱汗出水和雲母粉服三錢不過再服立愈千金翼白石英本經上品釋名時珍曰徐鍇云英亦作瑛玉光也今五種石英皆石之似玉而有光瑩者集解別錄曰白石英生華陰山谷及泰山大如指長二三寸六面如削白澈有光長五六寸者彌佳其黃端白稜名黃石英赤端白稜名赤石英青端赤稜名青石英黑澤有光名黑石英二月採亦無時弘景曰今醫家用新安所出極細長白澈者壽陽八公山多大者不正用之仙經大小並有用惟須精白無瑕雜者如此說則大者為佳其四色英今不復用恭曰白石英所在皆有今澤州虢州洛州山中俱出虢州者大徑三四寸長五六寸今通以澤州者為勝宗奭曰白石英狀如紫石英但差大而六稜白色若水精時珍曰澤州有英雞食石英性最補見禽部氣味甘微溫無毒別錄曰辛普曰神農甘岐伯黃帝雷公扁鵲無毒之才曰惡馬目毒公主治消渴陰痿不足咳逆胸膈間久寒益氣除風濕痹久服輕身長年本經療肺痿下氣利小便補五臟通日月光耐寒熱別錄治肺癰吐膿咳逆上氣疸黃甄權實大腸好古五色石英主治心腹邪氣女人心腹痛鎮心胃中冷氣益毛髮悅顏色治驚悸安魂定魄壯陽道下乳隨臟而治青治肝赤治心黃治脾白治肺黑治腎大明發明藏器曰濕可去枯白石英紫石英之屬是也時珍曰白石英手太陰陽陰氣分藥也治痿痹肺癰枯燥之病但系石類只可暫用不宜久服頌曰古人服食惟白石英為重紫石英但入五石飲其黃赤青黑四種本草雖有名而方家都不見用者乳石論以鍾乳為乳以白石英為石是六英之貴惟白石也又曰乳者陽中之陰石者陰中之陽故陽生十一月後甲子服乳陰生五月後甲子服石然而相反畏惡動則為害不淺故乳石之發方治雖多而罕有濟者誠不可輕餌也宗奭曰紫白二石英攻疾可暫煮汁用未聞久服之益張仲景只令㕮咀不為細末豈無意焉若久服宜詳審附方舊二新八服石英法白石英一斤打成豆大於砂盆中和粗砂著水挼二三千下洗淨又挼仍安柳箕中入蒿葉少許同水熟挼至光淨即以綿袋盛懸門上每日未梳前以水或酒吞七粒用飯二匙壓下小腹一切穢惡白酒牛肉石家所忌者皆不忌久則新石推出陳石石常在小腹內溫暖則氣息調和經脈通達腰腎堅強百病自除石若得力一斤即止若不得力十斤亦須服此物光滑既無浮碎著人腸胃作瘡又無石氣發作諸病也又法澤州白石英光淨無點翳者打小豆大去細者水淘淨袋盛懸鐺內清水五大升煮汁一升澄清平早服以汁煮粥更佳服後飲酒三二杯可行百步一袋可煮二十度如無力以布裹埋南牆下三尺土內百日又堪用也石煮豬肉法白石英一兩袋盛水三斗煮四升豬肉一斤同蔥椒鹽豉煮以汁作羹食石蒸羊肉法白石英三兩打作小塊精羊肉一斤包之荷葉裹之於一石米飯中蒸熟取出去石切肉和蔥椒作小餛飩煮熟每旦空腹冷漿水吞一百個後以冷飯壓之百無所忌永不發動石煮牛乳法白石英五兩搗碎密絹盛以牛乳三升酒三升同煎至四升去石以瓶收之每食前暖服三合治虛損勞瘦皮燥陰痿腳弱煩疼石飼牸牛法白石英三斤搗篩取十歲以上生犢牸牛一隻每日和豆與食經七日即可收乳每旦熱服一升余者作粥食百無所忌潤養臟腑悅澤肌肉令人體健凡服石並忌芥菜蔓菁蕪荑葵菜薺苨宜食冬瓜龍葵壓石氣孫真人千金翼風虛冷痹諸陽不足及腎虛耳聾益精保神白石英三兩坩鍋內火煅酒淬三次入瓶中密封勿泄氣每早溫服一鍾以少飯壓之一法磁石火煅醋淬五次白石英各五兩絹袋盛浸一升酒中五六日溫服將盡更添酒千金翼驚悸善忘心臟不安上膈風熱化痰安神白石英一兩硃砂一兩為散每服半錢食後煎金銀湯下簡要濟眾方石水腹堅脹滿用白石英十兩捶豆大瓷瓶盛好酒二斗浸之以泥重封將馬糞及糠火燒之常令小沸從卯至午住火次日暖一中盞飲之日三度酒盡可再燒一度聖惠方紫石英本經上品集解別錄曰紫石英生泰山山谷採無時普曰生泰山或會稽欲令如削紫色達頭如樗蒲者弘景曰今第一用泰山石色重澈下有根次出雹零山亦好又有南城石無根又有青綿石色亦重黑明澈又有林邑石腹裡必有一物如眼吳興石四面才有紫色無光澤會稽諸暨石形色如石榴子先時並雜用今惟採泰山最勝仙經不正用而俗方重之禹錫曰按嶺表錄異云瀧州山中多紫石英其色淡紫其質瑩澈隨其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒比之北中白石英其力倍矣宗奭曰紫石英明澈如水精但色紫而不勻時珍曰按太平御覽云自大峴至泰山皆有紫石英泰山所出甚瑰瑋平氏陽山縣所出色深特好烏程縣北壟山所出甚光明但小黑東莞縣爆山所出舊以貢獻江夏礬山亦出之永嘉固陶村小山所出芒角甚好但色小薄爾修治時珍曰凡入丸散擴火煅醋淬七次碾末水飛過曬乾入藥氣味甘溫無毒別錄曰辛普曰神農扁鵲味甘平李當之大寒雷公大溫岐伯甘無毒之才曰長石為之使畏扁青附子惡鮀甲黃連麥句姜得茯苓人參療心中結氣得天雄菖蒲療霍亂時珍曰服食紫石英乍寒乍熱者飲酒良主治心腹咳逆邪氣補不足女子風寒在子宮絕孕十年無子久服溫中輕身延年本經療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中久寒散癰腫令人悅澤別錄養肺氣治驚癇蝕膿甄權發明好古曰紫石英入手少陰足缺陰經權曰虛而驚悸不安者宜加用之女子服之有子頌曰乳石論無單服紫石者惟五石散中用之張文仲備急方有鎮心單服紫石煮水法胡洽及千金方則多雜諸藥同用今方治婦人及心病時有使者時珍曰紫石英手少陰足缺陰血分藥也上能鎮心重以去怯也下能益肝濕以去枯也心生血肝藏血其性暖而補故心神不安肝血不足及女子血海虛寒不孕者宜之別錄言其補心氣甄權言其養肺者殊昧氣陽血陰營衛之別惟本經所言諸證甚得此理附方舊三虛勞驚悸補虛止驚令人能食紫石英五兩打如豆大水淘一遍以水一斗煮取二升細細服或煮粥食水儘可再煎之張文仲方風熱瘛瘲風引湯治風熱瘛瘲及驚癇瘛瘲紫石英赤石脂白石脂寒水石石膏乾薑大黃龍齒桂枝牡蠣甘草滑石等分㕮咀水一升煎去三分食後溫呷無不效者仲景金匱方癰腫毒氣紫石英火燒醋淬為末生薑米醋煎敷之磨亦得日華本草菩薩石日華釋名放光石陰精石綱目義見下集解宗奭曰嘉州峨眉山出菩薩石色瑩白明澈若泰山狼牙石上饒水精之類日中照之有五色如佛頂圓光因以名之時珍曰出峨眉五臺匡廬岩竇間其質六稜或大如棗慄其色瑩潔映日則光采微芒有小如櫻珠則五色粲然可喜亦石英之類也丹爐家煅制作五金三黃匱氣味甘平無毒主治解藥毒蠱毒及金石藥發動作癰疽渴疾消撲損瘀血止熱狂驚癇通月經解風腫除淋並水磨服蛇蟲蜂蠍狼犬毒箭等傷並末敷之大明明目去翳時珍
