body:
  text: 草部第十五卷草之四隰草類上五十三種菊本經上品釋名節華本經女節別錄女華別錄女莖別錄日精別錄更生別錄傅延年別錄治薔爾雅金蕊綱目陰成別錄周盈別錄時珍曰按陸佃埤雅云菊本作蘜從鞠鞠窮也月令九月菊有黃華華事至此而窮盡故謂之蘜節華之名亦取其應節候也崔實月令云女節女華菊華之名也治薔日精菊根之名也抱朴子云仙方所謂日精更生周盈皆一菊而根莖花實之名異也頌曰唐天寶單方圖載白菊云原生南陽山谷及田野中潁川人呼為回蜂菊汝南名荼苦蒿上黨及建安郡順政郡併名羊歡草河內名地薇蒿集解別錄曰菊花生雍州川澤及田野正月採根三月採葉五月採莖九月採花十一月採實皆陰乾弘景曰菊有兩種一種莖紫氣香而味甘葉可作羹食者為真菊一種青莖而大作蒿艾氣味苦不堪食者名苦薏非真菊也華正相似惟以甘苦別之南陽酈縣最多今近道處處有之取種便得又有白菊莖葉都相似惟花白五月取之仙經以菊為妙用但難多得宜常服之藏器曰白菊生平澤五月花紫白色頌曰處處有之以南陽菊潭者為佳初春布地生細苗夏茂秋花冬實然種類頗多惟紫莖氣香葉厚至柔者嫩時可食花微小味甚甘者為真其莖青而大葉細氣烈似蒿艾花大味苦者名苦薏非真也南陽菊亦有兩種白菊葉大如艾葉莖青根細花白蕊黃其黃菊葉似茼蒿花蕊都黃今服餌家多用白者又有一種開小花花瓣下如小珠子謂之珠子菊云入藥亦佳宗奭曰菊花近世有二十餘種惟單葉花小而黃綠葉色深小而薄九月應候而開者是也鄧州白菊單葉者亦入藥余皆醫經不用瑞曰花大而香者為甘菊花小而黃者為黃菊花小而氣惡者為野菊時珍曰菊之品凡百種宿根自生莖葉花色品品不同宋人劉蒙泉範致能史正志皆有菊譜亦不能盡收也其莖有株蔓紫赤青綠之殊其葉有大小厚薄尖禿之異其花有千葉單葉有心無心有子無子黃白紅紫間色深淺大小之別其味有甘苦辛之辨又有夏菊秋菊冬菊之分大抵惟以單葉味甘者入藥菊譜所載甘菊鄧州黃鄧州白者是矣甘菊始生於山野今則人皆栽植之其花細碎品不甚高蕊如蜂窠中有細子亦可捺種嫩葉及花皆可炸食白菊花稍大味不甚甘亦秋月採之菊之無子者謂之牡菊燒灰撒地中能死蛙黽說出周禮花葉根莖實並同氣味苦平無毒別錄曰甘損之曰甘者入藥苦者不入藥杲曰苦甘寒可升可降陰中微陽也時珍曰本經言菊花味苦別錄言菊花味甘諸家以甘者為菊苦者為苦薏惟取甘者入藥謹按張華博物志言菊有兩種苗花如一惟味小異苦者不中食範致能譜序言惟甘菊一種可食仍入藥餌其餘黃白二花皆味苦雖不可餌皆可入藥其治頭風則白者尤良據此二說則是菊類自有甘苦二種食品須用甘菊入藥則諸菊皆可但不得用野菊名苦薏者爾故景煥牧豎閒談云真菊延齡野菊泄人正如黃精益壽鉤吻殺人之意之才曰術及枸杞根桑根白皮青葙葉為之使主治諸風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹久服利血氣輕身耐老延年本經療腰痛去來陶陶除胸中煩熱安腸胃利五脈調四肢別錄陶陶縱緩貌治頭目風熱風旋倒地腦骨疼痛身上一切遊風令消散利血脈並無所忌甄權作枕明目葉亦明目生熟並可食大明養目血去翳膜元素主肝氣不足好古白菊氣味苦辛平無毒主治風眩能令頭不白弘景染髭發令黑和巨勝茯苓蜜丸服之去風眩變白不老益顏色藏器發明震亨曰黃菊花屬土與金有水與火能補陰血故養目時珍曰菊春生夏茂秋花冬實備受四氣飽經露霜葉枯不落花槁不零味兼甘苦性稟平和昔人謂其能除風熱益肝補陰蓋不知其得金水之精英尤多能益金水二臟也補水所以制火益金所以平木木平則風息火降則熱除用治諸風頭目其旨深微黃者入金水陰分白者入金水陽分紅者行婦人血分皆可入藥神而明之存乎其人其苗可蔬葉可啜花可餌根實可藥囊之可枕釀之可飲自本至末罔不有功宜乎前賢比之君子神農列之上品隱士採入酒斝騷人餐其落英費長房言九日飲菊酒可以闢不祥神仙傳言康風子朱孺子皆以服菊花成仙荊州記言胡廣久病風羸飲菊潭水多壽菊之貴重如此是豈群芳可伍哉鍾會菊有五美贊云圓花高懸准天極也純黃不雜后土色也早植晚發君子德也冒霜吐穎象貞質也杯中體輕神仙食也西京雜記言採菊花莖葉雜秫米釀酒至次年九月始熟用之附方舊五新六服食甘菊玉函方云王子喬變白增年方用甘菊三月上寅日採苗名曰玉英六月上寅日採葉名曰容成九月上寅日採花名曰金精十二月上寅日採根莖名曰長生四味並陰乾百日取等分以成日合搗千杵為末每酒服一錢匕或以蜜丸梧子大酒服七丸一日三服百日身輕潤澤一年發白變黑服之二年齒落再生五年八十歲老翁變為兒童也孟詵云正月採葉五月五日採莖九月九日採花服食白菊太清靈寶方引九月九日白菊花二斤茯苓一斤並搗羅為末每服二錢溫酒調下日三服或以煉過鬆脂和丸雞子大每服一丸主頭眩久服令人好顏色不老藏器曰抱朴子言劉生丹法用白菊汁蓮花汁地血汁樗汁和丹蒸服也白菊花酒天寶單方治丈夫婦人久患頭風眩悶頭髮乾落胸中痰壅每發即頭旋眼昏不覺欲倒者是其候也先灸兩風池各二七壯並服此酒及散永瘥其法春末夏初收白菊軟苗陰乾搗末空腹取一方寸匕和無灰酒服之日再服漸加三方寸匕若不飲酒者但和羹粥汁服亦得秋八月合花收曝乾切取三大斤以生絹袋盛貯三大斗酒中經七日服之日三次常令酒氣相續為佳蘇頌圖經風熱頭痛菊花石膏川芎各三錢為末每服一錢半茶調下簡便方膝風疼痛菊花陳艾葉作護膝久則自除也吳旻扶壽方癍痘入目生翳障用白菊花穀精草綠豆皮等分為末每用一錢以乾柿餅一枚粟米泔一盞同煮候泔盡食柿日食三枚淺者五七日遠者半月見效仁齋直指方病後生翳白菊花蟬蛻等分為散每用二三錢入蜜少許水煎服大人小兒皆宜屢驗救急方疔腫垂死菊花一握搗汁一升入口即活此神驗方也冬月採根肘後方女人陰腫甘菊苗搗爛煎湯先熏後洗危氏得效方酒醉不醒九月九日真菊花為末飲服方寸匕外臺秘要眼目昏花雙美丸用甘菊花一斤紅椒去目六兩為末用新地黃汁和丸梧子大每服五十丸臨臥茶清下瑞竹堂方花上水主治益色壯陽治一切風大明野菊拾遺釋名苦薏時珍曰薏乃蓮子之心此物味苦似之故與之同名集解藏器曰苦薏生澤畔莖如馬蘭花如菊菊甘而薏苦語曰苦如薏是也時珍曰苦薏處處原野極多與菊無異但葉薄小而多尖花小而蕊多如蜂窠狀氣味苦辛慘烈根葉莖花氣味苦辛溫有小毒震亨曰野菊花服之大傷胃氣主治調中止泄破血婦人腹內宿血宜之藏器治癰腫疔毒瘰癧眼息時珍附方新四癰疽疔腫一切無名腫毒孫氏集效方用野菊花連莖搗爛酒煎熱服取汗以渣敷之即愈衛生易簡方用野菊花莖葉蒼耳草各一握共搗入酒一碗絞汁服以渣敷之取汗即愈或六月六日採蒼耳葉九月九日採野菊花為末每酒服三錢亦可天泡濕瘡野菊花根棗木煎湯洗之醫學集成瘰癧未破野菊花根搗爛煎酒服以渣敷之自消不消亦自破也瑞竹堂經驗方庵䕡音淹閭本經上品釋名覆閭時珍曰庵草屋也閭里門也此草乃蒿屬老莖可以蓋覆庵閭故以名之貞元廣利方謂之庵䕡蒿云又史注云菴廬軍行宿室也則閭似當作廬集解別錄曰庵䕡子生雍州川穀亦生上黨及道邊十月採實陰乾弘景曰狀如蒿艾之類近道處處有之仙經亦時用之人家種此闢蛇也頌曰今江淮亦有之春生苗葉如艾蒿高二三尺七月開花八月結實九月採實時珍曰庵䕡葉不似艾似菊葉而薄多細丫面背皆青高者四五尺其莖白色如艾莖而粗八九月開細花淡黃色結細實如艾實中有細子極易繁衍藝花者以之接菊子氣味苦微寒無毒別錄曰微溫普曰神農雷公桐君岐伯苦小溫無毒李當之溫權曰辛苦時珍曰降也陰中微陽入足厥陰經血分之才曰荊實薏苡為之使主治五臟瘀血腹中水氣臚脹留熱風寒濕痹身體諸痛久服輕身延年不老本經療心下堅隔中寒熱周痹婦人月水不通消食明目駏驉食之神仙別錄益氣主男子陰痿不起治心腹脹滿甄權腰腳重痛膀胱痛及骨節煩痛不下食大明擂酒飲治閃挫腰痛及婦人產後血氣痛時珍發明頌曰本經言久服輕身不老而古方少有服食者惟入諸雜治藥中如胡洽治驚邪貍骨丸之類大方中用之孫思邈千金翼韋宙獨行方主踠折瘀血並單用庵䕡煮汁服亦可末服今人治打撲多用此法或飲或散其效最速時珍曰吳普本草及名醫別錄並言駏驉食庵䕡神仙此亦謂其多壽爾駏驉乃獸名似騾而小前足長後足短不能自食每負蹶鼠為之齧食附方舊一新二瘀血不散變成癰腫生庵䕡蒿搗汁一升服之廣利方月水不通婦人宿有風冷留血積聚月水不通庵䕡子一升桃仁二升酒浸去皮尖研勻入瓶內以酒二斗浸封五日後每飲三合日三服聖惠方產後血痛庵䕡子一兩水一升童子小便二杯煎飲頻湖集簡方附錄對廬別錄有名未用曰味苦寒無毒主疥瘡久不瘳生死肌除大熱煮汁洗之似庵䕡八月採蓍音屍本經上品釋名時珍曰按班固白虎通載孔子云蓍之為言耆也老人歷年多更事久事能盡知也陸佃埤雅云草之多壽者故字從耆博物志言蓍千歲而三百莖其本已老故知吉凶集解別錄曰蓍實生少室山谷八月九月採實日乾恭曰此草所在有之其莖可為筮陶氏誤以楮實為之楮實味甘此味苦今正之頌曰今蔡州上蔡縣白龜祠旁其生如蒿作叢高五六尺一本一二十莖至多者五十莖生便條直所以異於眾蒿也秋後有花出於枝端紅紫色形如菊花結實如艾實史記龜策傳云龜千歲乃遊於蓮葉之上蓍百莖共一根所生之處獸無虎狼蟲無毒螫徐廣注云劉向言龜千歲而靈蓍百年而一本生百莖也褚先生云蓍滿百莖其下必有神龜守之其上常有青雲覆之傳云天下和平王道得而蓍莖長丈其叢生滿百莖方今取蓍者八十莖以上長八尺者即已難得但得滿六十莖以上長六尺者即可用矣今蔡州所上皆不言如此則此類亦神物故不常有也時珍曰蓍乃蒿屬神草也故易曰蓍之德圓而神天子蓍長九尺諸侯七尺大夫五尺士三尺張華博物志言以末大於本者為主次蒿次荊皆以月望浴之然則無蓍揲卦亦可以荊蒿代之矣實氣味苦酸平無毒主治益氣充肌膚明目聰慧先知久服不飢不老輕身本經葉主治痞疾時珍附方新一腹中痞塊蓍葉獨蒜穿山甲末食鹽同以好醋搗成餅量痞大小貼之兩炷香為度其痞化為膿血從大便出劉松石保壽堂方艾別錄中品釋名冰臺爾雅醫草別錄黃草埤雅艾蒿時珍曰王安石字說云艾可乂疾久而彌善故字從乂陸佃埤雅云博物志言削冰令圓舉而向日以艾承其影則得火則艾名冰臺其以此乎醫家用灸百病故曰灸草一灼謂之一壯以壯人為法也集解別錄曰艾葉生田野三月三日採曝乾頌曰處處有之以復道及四明者為佳云此種灸百病尤勝初春布地生苗莖類蒿葉背白以苗短者為良三月三日五月五日採葉曝乾陳久方可用時珍曰艾葉本草不著土產但云生田野宋時以湯陰復道者為佳四明者圖形近代惟湯陰者謂之北艾四明者謂之海艾自成化以來則以蘄州者為勝用充方物天下重之謂之蘄艾相傳他處艾灸酒罈不能透蘄艾一灸則直透徹為異也此草多生山原二月宿根生苗成叢其莖直生白色高四五尺其葉四布狀如蒿分為五尖丫上覆有小尖面青背白有茸而柔厚七八月葉間出穗如車前穗細花結實累累盈枝中有細子霜後始枯皆以五月五日連莖刈取曝乾收葉先君月池子諱言聞嘗著蘄艾傳一卷有贊云產于山陽採以端午治病灸疾功非小補又宗懍荊楚歲時記云五月五日雞未鳴時採艾似人形者攬而取之收以灸病甚驗是日採艾為人懸於戶上可禳毒氣其莖幹之染麻油引火點灸炷滋潤灸瘡至愈不疼亦可代蓍策及作燭心葉修治宗奭曰艾葉乾搗去青滓取白入石硫黃末少許謂之硫黃艾灸家用之得米粉少許可搗為末入服食藥用時珍曰凡用艾葉須用陳久者治令細軟謂之熟艾若生艾灸火則傷人肌脈故孟子云七年之病求三年之艾揀取淨葉揚去塵屑入石臼內木杵搗熟羅去渣滓取白者再搗至柔爛如綿為度用時焙燥則灸火得力入婦人丸散須以熟艾用醋煮乾搗成餅子烘乾再搗為末用或以糯糊和作餅及酒炒者皆不佳洪氏容齋隨筆云艾難著力若入白茯苓三五片同碾即時可作細末亦一異也氣味苦微溫無毒恭曰生寒熟熱元素曰苦溫陰中之陽時珍曰苦而辛生溫熟熱可升可降陽也入足太陰厥陰少陰之經苦酒香附為之使主治灸百病可作煎止吐血下痢下部䘌瘡婦人漏血利陰氣生肌肉闢風寒使人有子作煎勿令見風別錄搗汁服止傷血殺蛔蟲弘景主衄血下血膿血痢水煮及丸散任用蘇恭止崩血腸痔血拓金瘡止腹痛安胎苦酒作煎治癬甚良搗汁飲治心腹一切冷氣鬼氣甄權治帶下止霍亂轉筋痢後寒熱大明治帶脈為病腹脹滿腰溶溶如坐水中好古溫中逐冷除濕時珍發明詵曰春月採嫩艾作菜食或和麵作餛飩如彈子吞三五枚以飯壓之治一切鬼惡氣長服止冷痢又以嫩艾作干餅子用生薑煎服止瀉痢及產後瀉血甚妙頌曰近世有單服艾者或用蒸木瓜和丸或作湯空腹飲甚補虛羸然亦有毒發則熱氣衝上狂躁不能禁至攻眼有瘡出血者誠不可妄服也震亨曰婦人無子多由血少不能攝精俗醫謂子宮虛冷投以辛熱或服艾葉不知艾性至熱入火灸則氣下行入藥服則氣上行本草止言其溫不言其熱世人喜溫率多服之久久毒發何嘗歸咎於艾哉予考蘇頌圖經而因默有感焉時珍曰艾葉生則微苦太辛熟則微辛太苦生溫熟熱純陽也可以取太陽真火可以回垂絕元陽服之則走三陰而逐一切寒濕轉肅殺之氣為融和灸之則透諸經而治百種病邪起沉疴之人為康泰其功亦大矣蘇恭言其生寒蘇頌言其有毒一則見其能止諸血一則見其熱氣上衝遂謂其性寒有毒誤矣蓋不知血隨氣而行氣行則血散熱因久服致火上衝之故爾夫藥以治病中病則止若素有虛寒痼冷婦人濕鬱帶漏之人以艾和歸附諸藥治其病夫何不可而乃妄意求嗣服艾不輟助以辛熱藥性久偏致使火躁是誰之咎歟於艾何尤艾附丸治心腹少腹諸痛調女人諸病頗有深功膠艾湯治虛痢及妊娠產後下血尤著奇效老人丹田氣弱臍腹畏冷者以熟艾入布袋兜其臍腹妙不可言寒濕腳氣亦宜以此夾入襪內附方舊二十三新二十九傷寒時氣溫病頭痛壯熱脈盛以干艾葉三升水一斗煮一升頓服取汗肘後方妊娠傷寒壯熱赤斑變為黑斑溺血用艾葉如雞子大酒三升煮二升半分為二服傷寒類要妊娠風寒卒中不省人事狀如中風用熟艾三兩米醋炒極熱以絹包熨臍下良久即蘇婦人良方中風口喎以葦筒長五寸一頭刺入耳內四面以面密封不透風一頭以艾灸之七壯患右灸左患左灸右勝金方中風口噤熟艾灸承漿一穴頰車二穴各五壯千金方中風掣痛不仁不隨並以干艾斛許揉團納瓦甑中並下塞諸孔獨留一目以痛處著甑目而燒艾熏之一時即知矣肘後方舌縮口噤以生艾搗敷之干艾浸濕亦可聖濟錄咽喉腫痛醫方大成同嫩艾搗汁細嚥之經驗方用青艾和莖葉一握同醋搗爛敷於喉上冬月取干艾亦得李亞所傳方也癲癇諸風熟艾於陰囊下穀道正門當中間隨年歲灸之斗門方鬼擊中惡卒然著人如刀刺狀胸脅腹內㽲刺切痛不可按或即吐血鼻中出血下血一名鬼排以熟艾如雞子大三枚水五升煎二升頓服肘後方小兒臍風撮口艾葉燒灰填臍中以帛縛定效或隔蒜灸之候口中有艾氣立愈簡便方狐惑蟲䘌病人齒無色舌上白或喜睡不知痛癢處或下痢宜急治下部不曉此者但攻其上而下部生蟲食其肛爛見五臟便死也燒艾於管中熏下部令煙入或少加雄黃更妙罌中燒煙亦可肘後方頭風久痛蘄艾揉為丸時時嗅之以黃水出為度青囊雜纂頭風面瘡癢出黃水艾葉二兩醋一斤砂鍋煎取汁每薄紙上貼之一日一兩上御藥院方心腹惡氣艾葉搗汁飲之藥性論脾胃冷痛白艾末沸湯服二錢衛生易簡方蛔蟲心痛如刺口吐清水白熟艾一升水三升煮一升服吐蟲出或取生艾搗汁五更食香脯一片乃飲一升當下蟲出肘後方口吐清水干蘄艾煎湯啜之怪證奇方霍亂洞下不止以艾一把水三升煮一升頓服外臺秘要老小白痢艾姜丸用陳北艾四兩乾薑炮三兩為末醋煮倉米糊丸梧子大每服七十丸空心米飲下甚有奇效永類方諸痢久下艾葉陳皮等分煎湯服之亦可為末酒煮爛飯和丸每鹽湯下二三十丸聖濟總錄暴泄不止陳艾一把生薑一塊水煎熱服生生編糞後下血艾葉生薑煎濃汁服三合千金方野雞痔病先以槐柳湯洗過以艾灸上七壯取效郎中王及乘騾入西川數日病痔大作如胡瓜貫於腸頭其熱如火忽至僵仆無計有主郵者云須灸即瘥乃用上法灸三五壯忽覺一道熱氣入腸中因大轉瀉血穢並出瀉後遂失胡瓜所在矣經驗方妊娠下血張仲景曰婦人有漏下者有半產後下血不絕者有妊娠下血者並宜膠艾湯主之阿膠二兩艾葉三兩芎藭甘草各二兩當歸地黃各三兩芍藥四兩水五升清酒三升煮取三升乃納膠令消盡每溫服一升日三服金匱要略妊娠胎動或腰痛或搶心或下血不止或倒產子死腹中艾葉一雞子大酒四升煮二升分二服肘後方胎動迫心作痛艾葉雞子大以頭醋四升煎二升分溫服子母秘錄婦人崩中連日不止熟艾雞子大阿膠炒為末半兩乾薑一錢水五盞先煮艾姜至二盞半傾出入膠烊化分三服一日服盡初虞世古今錄驗產後瀉血不止干艾葉半兩炙熟老生薑半兩濃煎湯一服止妙孟詵食療本草產後腹痛欲死因感寒起者陳蘄艾二斤焙乾搗鋪臍上以絹覆住熨斗熨之待口中艾氣出則痛自止矣楊誠經驗方忽然吐血一二口或心衄或內崩熟艾三團水五升煮二升服一方燒灰水服二錢千金方鼻血不止艾灰吹之亦可以艾葉煎服聖惠方盜汗不止熟艾二錢白茯神三錢烏梅三個水一鍾煎八分臨臥溫服通妙真人方火眼腫痛以艾燒煙起用碗覆之候煙盡碗上刮煤下以溫水調化洗眼即瘥更入黃連尤佳斗門方面上皯𪒟艾灰桑灰各三升以水淋汁再淋至三遍以五色布納於中同煎令可丸時每以少許敷之自爛脫甚妙外臺秘要婦人面瘡名粉花瘡以定粉五錢菜子油調泥碗內用艾一二團燒煙燻之候煙盡覆地上一夜取出調搽永無瘢痕亦易生肉談野翁試驗方身面疣目艾火灸三壯即除聖惠方鵝掌風病蘄艾真者四五兩水四五碗煮五六滾入大口瓶內盛之用麻布二層縛之將手心放瓶上熏之如冷再熱如神陸氏積德堂方瘡疥熏法熟蘄艾一兩木鱉子三錢雄黃二錢硫黃一錢為末揉入艾中分作四條每以一條安陰陽瓦中置被裡烘燻後服通聖散醫方摘要小兒疳瘡艾葉一兩水一升煮取四合分三服備急方小兒爛瘡艾葉燒灰敷之良子母秘錄臁瘡口冷不合熟艾燒煙燻之經驗方白癩風瘡干艾隨多少以浸曲釀酒如常法日飲之覺痹即瘥肘後方疔瘡腫毒艾蒿一擔燒灰於竹筒中淋取汁以一二合和石灰如糊先以針刺瘡至痛乃點藥三遍其根自拔玉山韓光以此治人神驗貞觀初衢州徐使君訪得此方予用治三十餘人得效孫真人千金方發背初起未成及諸熱腫以濕紙拓上先干處是頭著艾灸之不論壯數痛者灸至不痛不痛者灸至痛乃止其毒即散不散亦免內攻神方也李絳兵部手集癰疽不合瘡口冷滯以北艾煎湯洗後白膠熏之直指方咽喉骨哽用生艾蒿數升水酒共一斗煮四升細細飲之當下外臺秘要誤吞銅錢艾蒿一把水五升煎一升頓服便下錢相公篋中方諸蟲蛇傷艾灸數壯甚良集簡方風蟲牙痛化蠟少許攤紙上鋪艾以箸捲成筒燒煙隨左右熏鼻吸菸令滿口呵氣即疼止腫消靳季謙病此月餘一試即愈普濟方實氣味苦辛暖無毒主治明目療一切鬼氣甄權壯陽助水臟腰膝及暖子宮大明發明詵曰艾子和乾薑等分為末蜜丸梧子大空心每服三十丸以飯三五匙壓之日再服治百惡氣其鬼神速走出田野之人與此甚相宜也附錄夏臺別錄有名未用曰味甘主百疾濟絕氣弘景曰此藥神奇乃爾不復識用可恨也時珍曰艾名冰臺此名夏臺艾灸百病能回絕氣此主百病濟絕氣恐是一物重出也故附於艾後千年艾綱目集解時珍曰千年艾出武當太和山中小莖高尺許其根如蓬蒿其葉長寸余無尖丫面青背白秋開黃花如野菊而小結實如青珠丹顆之狀三伏日採葉曝乾葉不似艾而作艾香搓之即碎不似艾葉成茸也羽流以充方物葉氣味辛微苦溫無毒主治男子虛寒婦人血氣諸痛水煎服之時珍茵陳蒿本經上品釋名藏器曰此雖蒿類經冬不死更因舊苗而生故名茵陳後加蒿字耳時珍曰按張揖廣雅及吳普本草並作因塵不知何義集解別錄曰茵陳生太山及丘陵坡岸上五月及立秋採陰乾弘景曰今處處有之似蓬蒿而葉緊細秋後莖枯經冬不死至春又生韓保升曰葉似青蒿而背白大明曰茵陳出和州及南山嶺上一名石茵陳頌曰近道皆有之不及太山者佳春初生苗高三五寸似蓬蒿而葉緊細無花實五月七月採莖葉陰乾今謂之山茵陳江寧府一種茵陳葉大根粗黃白色至夏有花實階州一種白蒿亦似青蒿而背白本土皆以為茵陳入藥今南方醫人用山茵陳乃有數種或著其說云山茵陳汴京及北地用者如艾蒿葉細而背白其氣亦如艾味苦干則色黑江南所用者莖葉都似家茵陳而大高三四尺氣極芬香味甘辛俗又名龍腦薄荷吳中所用乃石香葇也葉至細色黃味辛甚香烈性溫若誤作解脾藥服大令人煩以本草論之但有茵陳蒿無山茵陳注云葉似蓬蒿而緊細今汴京北地所用山茵陳是也大體世方用山茵陳療腦痛解傷寒發汗行肢節滯氣化痰利膈治勞倦最要詳本草正經惟療黃疸利小便與世方都不應今試取汴京所用山茵陳為解肌發汗藥灼然少效江南山茵陳療傷寒腦痛絕勝比見諸醫議論謂家茵陳亦能解肌下隔去胸中煩方家少用但可研作飲服之本草所無自出俗方茵陳蒿當別是一物主療自異不得為山茵陳也此說亦未可據但以功較之則江南者為勝以經言之則非本草所出醫方所用更當考論爾斅曰凡使須用葉有八角者陰乾去根細銼勿令犯火時珍曰茵陳昔人多蒔為蔬故入藥用山茵陳所以別家茵陳也洪舜俞老圃賦云酣糟紫薑之掌沐醯青陳之絲是也今淮揚人二月二日猶採野茵陳苗和粉面作茵陳餅食之後人各據方士所傳遂致淆亂今山茵陳二月生苗其莖如艾其葉如淡色青蒿而背白葉歧緊細而扁整九月開細花黃色結實大如艾子花實並與庵䕡花實相似亦有無花實者莖葉氣味苦平微寒無毒普曰神農岐伯雷公苦無毒黃帝辛無毒權曰苦辛有小毒大明曰石茵陳苦涼無毒伏硇砂張元素曰苦甘陰中微陽入足太陽經主治風濕寒熱邪氣熱結黃疸久服輕身益氣耐老面白悅長年白兔食之仙本經治通身發黃小便不利除頭熱去伏瘕別錄通關節去滯熱傷寒用之藏器石茵陳治天行時疾熱狂頭痛頭旋風眼疼瘴瘧女人癥瘕並閃損乏絕大明發明弘景曰仙經云白蒿白兔食之仙而今茵陳乃云此恐是誤耳宗奭曰張仲景治傷寒熱甚發黃身面悉黃者用之極效一僧因傷寒後發汗不徹有留熱面身皆黃多熱期年不愈醫作食黃治不對而食不減予與此藥服五日病減三分之一十日減三分之二二十日病悉去方用山茵陳山梔子各三分秦艽升麻各四錢為散每用三錢水四合煎二合去滓食後溫服以知為度此藥以山茵陳為本故書之王好古曰張仲景茵陳梔子大黃湯治濕熱也梔子柏皮湯治燥熱也如苗澇則濕黃苗旱則燥黃濕則瀉之燥則潤之可也此二藥治陽黃也韓只和李思訓治陰黃用茵陳附子湯大抵以茵陳為君主而佐以大黃附子各隨其寒熱也附方舊二新六茵陳羹除大熱黃疸傷寒頭痛風熱瘴瘧利小便以茵陳細切煮羹食之生食亦宜食醫心鏡遍身風癢生瘡疥用茵陳煮濃汁洗之立瘥千金方癧瘍風病茵陳蒿兩握水一斗五升煮取七升先以皂莢湯洗次以此湯洗之冷更作隔日一洗不然恐痛也崔行功纂要風疾攣急茵陳蒿一斤秫米一石曲三斤和勻如常法釀酒服之聖濟總錄癇黃如金好眠吐涎茵陳蒿白蘚皮等分水二鍾煎服日二服三十六黃方遍身黃疸茵陳蒿一把同生姜一塊搗爛於胸前四肢日日擦之男子酒疸用茵陳蒿四根梔子七個大田螺一個連殼搗爛以百沸白酒一大盞沖汁飲之秘方也眼熱赤腫山茵陳車前子等分煎湯調茶調散服數服直指方青蒿本經下品釋名草蒿本經方潰本經菣音牽去聲𤜢蒿蜀本香蒿衍義保升曰草蒿江東人呼為𤜢蒿為其氣臭似𤜢也北人呼為青蒿爾雅云蒿菣也孫炎注云荊楚之間謂蒿為菣郭璞注云今人呼青蒿香中炙啖者為菣是也時珍曰晏子云蒿草之高者也按爾雅諸蒿獨菣得單稱為蒿豈以諸蒿葉背皆白而此蒿獨青異於諸蒿故耶集解別錄曰青蒿生華陰川澤弘景曰處處有之即今青蒿人亦取雜香菜食之保升曰嫩時醋淹為菹自然香葉似茵陳蒿而背不白高四尺許四月五月採日乾入藥詩云呦呦鹿鳴食野之蒿即此蒿也頌曰青蒿春生苗葉極細可食至夏高四五尺秋後開細淡黃花花下便結子如粟米大八九月採子陰乾根莖子葉併入藥用乾者炙作飲香尤佳宗奭曰青蒿得春最早人剔以為蔬根赤葉香沈括夢溪筆談云青蒿一類自有二種一種黃色一種青色本草謂之青蒿亦有所別也陝西銀綏之間蒿叢中時有一兩窠迥然青色者土人謂之香蒿莖葉與常蒿一同但常蒿色淡青此蒿深青如松檜之色至深秋余蒿並黃此蒿猶青其氣芬芳恐古人所用以深青者為勝不然諸蒿何嘗不青時珍曰青蒿二月生苗莖粗如指而肥軟莖葉色並深青其葉微似茵陳而面背俱青其根白硬七八月開細黃花頗香結實大如麻子中有細子修治斅曰凡使惟中為妙到膝即仰到腰即俯使子勿使葉使根勿使莖四件若同使翻然成痼疾採得葉用七歲兒七個溺浸七日七夜漉出曬乾葉莖根子氣味苦寒無毒時珍曰伏硫黃主治疥瘙痂癢惡瘡殺蝨治留熱在骨節間明目本經鬼氣屍疰伏連婦人血氣腹內滿及冷熱久痢秋冬用子春夏用苗並搗汁服亦曝乾為末小便入酒和服藏器補中益氣輕身補勞駐顏色長毛髮令黑不老兼去蒜髮殺風毒心痛熱黃生搗汁服並貼之大明治瘧疾寒熱時珍生搗敷金瘡止血止疼良蘇恭燒灰隔紙淋汁和石灰煎治惡瘡息肉黶瘢孟詵發明頌曰青蒿治骨蒸熱勞為最古方單用之時珍曰青蒿得春木少陽之氣最早故所主之證皆少陽厥陰血分之病也按月令通纂言伏內庚日採青蒿懸於門庭內可辟邪氣陰乾為末冬至元旦各服二錢亦良觀此則青蒿之治鬼疰伏屍蓋亦有所伏也附方舊四新十四男婦勞瘦青蒿細銼水三升童子小便五升同煎取二升半去滓入器中煎成膏丸如梧子大每空心及臥時溫酒吞下二十丸斗門方虛勞寒熱肢體倦疼不拘男婦八九月青蒿成實時採之去枝梗以童子小便浸三日曬乾為末每服二錢烏梅一個煎湯服靈苑方骨蒸鬼氣童子小便五大斗澄清青蒿五斗八九月揀帶子者最好細銼相和納大釜中以猛火煎取三大斗去滓溉釜令淨再以微火煎可二大斗入豬膽一枚同煎一大斗半去火待冷以瓷器盛之每欲服時取甘草二三兩炙熟為末以煎和搗千杵為丸空腹粥飲下二十丸漸增至三十丸止崔元亮海上方骨蒸煩熱青蒿一握豬膽汁一枚杏仁四十個去皮尖炒以童子小便一大盞煎五分空心溫服十便良方虛勞盜汗煩熱口乾用青蒿一斤取汁熬膏入人參末麥門冬末各一兩熬至可丸丸如梧子大每食後米飲服二十丸名青蒿丸聖方總錄瘧疾寒熱肘後方用青蒿一握水二升搗汁服之仁存方用五月五日天未明時採青蒿陰乾四兩桂心一兩為末未發前酒服二錢經驗方用端午日採青蒿葉陰乾桂心等分為末每服一錢先寒用熱酒先熱用冷酒發日五更服之切忌發物溫瘧痰甚但熱不寒用青蒿二兩童子小便浸焙黃丹半兩為末每服二錢白湯調下仁存方赤白痢下五月五日採青蒿艾葉等分同豆豉搗作餅日乾名蒿豉丹每用一餅以水一盞半煎服聖濟總錄鼻中衄血青蒿搗汁服之並塞鼻中極驗衛生易簡方酒痔便血青蒿用葉不用莖用莖不用葉為末糞前冷水糞後水酒調服永類鈐方金瘡撲損肘後方用青蒿搗封之血止則愈一方用青蒿麻葉石灰等分五月五日搗和曬乾臨時為末搽之牙齒腫痛青蒿一握煎水漱之濟急方毒蜂螫人嚼青蒿封之即安肘後方耳出濃汁青蒿末綿裹納耳中聖惠方鼻中息肉青蒿灰石灰等分淋汁熬膏點之聖濟總錄子氣味甘冷無毒主治明目開胃炒用治勞瘦壯健人小便浸用之治惡瘡疥癬風疹煎水洗之大明治鬼氣為末酒服方寸匕孟詵功同葉時珍附方新一積熱眼澀三月三日或五月五日採青蒿花或子陰乾為末每井華水空心服二錢久服明目可夜看書名青蒿散十便良方節間蟲見虫部黃花蒿綱目釋名臭蒿集解大明曰臭蒿一名草蒿時珍曰香蒿臭蒿通可名草蒿此蒿與青蒿相似但此蒿色綠帶淡黃氣辛臭不可食人家採以罨醬黃酒麴者是也葉氣味辛苦涼無毒主治小兒風寒驚熱時珍子氣味辛涼無毒主治治勞下氣開胃止盜汗及邪氣鬼毒大明白蒿本經上品釋名蘩爾雅由胡爾雅蔞蒿食療蔏音商時珍曰白蒿有水陸二種爾雅通謂之蘩以其易蘩衍也曰蘩皤蒿即今陸生艾蒿也辛熏不美曰蘩由胡即今水生蔞蒿也辛香而美曰蘩之醜秋為蒿則通指水陸二種而言謂其春時各有種名至秋老則皆呼為蒿矣曰賴曰蕭曰萩皆老蒿之通名象秋氣肅賴之氣集解別錄曰白蒿生中山川澤二月採弘景曰蒿類甚多而俗中不聞呼白蒿者方藥家既不用皆無復識之恭曰爾雅蘩皤蒿即白蒿也所在有之葉頗似細艾上有白毛錯澀粗於青蒿從初生至枯白於眾蒿禹錫曰蓬蒿可以為菹故詩箋云以豆薦蘩菹也陸璣詩疏云凡艾白色為皤蒿今白蒿先諸草發生香美可食生蒸皆宜頌曰此草古人以為菹今人但食蔞蒿不復食此或疑白蒿即蔞蒿而孟詵食療又別著蔞蒿條所說不同明是二物乃知古今食品之異也又今階州以白蒿為茵陳其苗葉亦相似然以入藥恐不可用也時珍曰白蒿處處有之有水陸二種本草所用蓋取水生者故曰生中山川澤不曰山谷平地也二種形狀相似但陸生辛熏不及水生者香美爾詩云呦呦鹿鳴食野之苹蘋即陸生皤蒿俗呼艾蒿是矣鹿食九種解毒之草白蒿其一也詩云於以采蘩於沼於沚左傳云蘋蘩蘊藻之菜可以薦於鬼神羞於王公並指水生白蒿而言則本草白蒿之為蔞蒿無疑矣鄭樵通志謂蘋為蔞蒿非矣鹿乃山獸蔞乃水蒿陸璣詩疏謂蘋為牛尾蒿亦非矣牛尾蒿色青不白細葉直上狀如牛尾也蔞蒿生陂澤中二月發苗葉似嫩艾而歧細面青背白其莖或赤或白其根白脆採其根莖生熟菹曝皆可食蓋嘉蔬也景差大招云吳酸蒿蔞不沾薄謂吳人善調酸瀹蔞蒿為齏不沾不薄而甘美此正指水生者也苗根氣味甘平無毒思邈曰辛平時珍曰發瘡疥主治五臟邪氣風寒濕痹補中益氣長毛髮令黑療心懸少食常飢久服輕身耳目聰明不老本經生挼醋淹為菹食甚益人搗汁服去熱黃及心痛曝為末米飲空心服一匙治夏月暴水痢燒灰淋汁煎治淋瀝疾孟詵利膈開胃殺河豚魚毒時珍發明弘景曰服食家七禽散云白兔食白蒿仙與庵䕡同法耳時珍曰本經列白蒿於上品有功無毒而古今方家不知用豈不得服之之訣歟附方舊一惡瘡癩疾但是惡疾遍體面目有瘡者皆可服之用白艾蒿十束如升大煮取汁以曲及米一如釀酒法候熟稍服之深師方子氣味缺主治鬼氣為末酒服之良孟詵角蒿唐本草集解恭曰角蒿葉似白蒿花如瞿麥紅赤可愛子似王不留行黑色作角七月八月採保升曰葉似蛇床青蒿子角似蔓荊實黑而細秋熟所在皆有之宗奭曰莖葉如青蒿開淡紅紫花大約徑三四分花罷結角長二寸許微彎斅曰凡使勿用紅蒿並邪蒿二味真似角蒿只是此香而角短爾採得於槐砧上細銼用之氣味辛苦平有小毒主治乾溼䘌諸惡瘡有蟲者唐本治口齒瘡絕勝宗奭附方舊二新一齒齦宣露多是疳也角蒿燒灰夜塗上切忌油膩沙糖干棗外臺秘要口瘡不瘥入胸中並生者不拘大人小兒以角蒿灰塗之有汁吐去一宿效千金方月蝕耳瘡用蒿灰摻之良集簡方𦾰蒿拾遺釋名莪蒿爾雅蘿蒿同上抱娘蒿時珍曰陸農師云𦾰之為言高也莪亦峨也莪科高也可以覆蠶故謂之蘿抱根叢生故曰抱娘集解時珍曰𦾰蒿生高崗似小薊宿根先於百草爾雅云莪蘿是也詩小雅云菁菁者莪陸璣注云即莪蒿也生澤國漸洳處葉似斜蒿而細科三月生莖葉可生食又可蒸食香美頗似蔞蒿但味帶麻不似蔞蒿甘香氣味辛溫無毒主治破血下氣煮食之藏器馬先蒿本經中品釋名馬新蒿唐本馬矢蒿本經練石草別錄爛石草同上虎麻時珍曰蒿氣如馬矢故名馬先乃馬矢字訛也馬新又馬先之訛也弘景曰練石草一名爛石草即馬矢蒿今方藥不復用之集解別錄曰馬先蒿練石草並生南陽川澤恭曰葉大如茺蔚花紅白色二月八月採莖葉陰乾用八月九月實熟俗謂之虎麻是也一名馬新蒿所在有之茺蔚苗短小其子夏中熟二物初生極相似也禹錫曰按爾雅云蔚牡菣注云即蒿之無子者詩云匪莪伊蔚陸璣云牡蒿也三月始生七月開花似胡麻花而紫赤八月生角似小豆角銳而長一名馬新蒿是也頌曰郭璞以牡菣為無子而陸璣云有子二說小異今當用有子者為正時珍曰別錄牡蒿馬先蒿原是二條陸璣所謂有子者乃馬先蒿而復引無子之牡蒿釋之誤矣牡蒿詳見本條氣味苦平無毒別錄曰練石草寒主治寒熱鬼疰中風濕痹女子帶下病無子本經練石草治五癃破石淋膀胱中結氣利水道小便別錄惡瘡弘景附方舊一大瘋癩疾骨肉疽敗眉須墮落身體癢痛以馬先蒿一名馬矢蒿一名爛石草炒搗末每服方寸匕食前溫酒下一日三服一年都瘥肘後方陰地厥宋圖經集解頌曰生鄧州順陽縣內鄉山谷葉似青蒿莖青紫色花作小穗微黃根似細辛七月採根苗用時珍曰江浙亦有之外家採製丹砂硫黃根苗氣味甘苦微寒無毒主治腫毒風熱蘇頌附方新一男婦吐血後胸膈虛熱陰地厥紫河車貫眾甘草各半兩每服三錢水煎服聖濟總錄牡蒿別錄下品釋名齊頭蒿時珍曰爾雅蔚牡菣蒿之無子者則牡之名以此也諸蒿葉皆尖此蒿葉獨奓而禿故有齊頭之名集解別錄曰牡蒿生田野五月八月採弘景曰方藥不復用恭曰齊頭蒿也所在有之葉似防風細薄而無光澤時珍曰齊頭蒿三四月生苗其葉扁而本狹末奓有禿歧嫩時可茹鹿食九草此其一也秋開細黃花結實大如車前實而內子微細不可見故人以為無子也苗氣味苦微甘溫無毒主治充肌膚益氣令人暴肥不可久服血脈滿盛別錄擂汁服治陰腫時珍附方新一瘧疾寒熱齊頭蒿根滴滴金根各一把擂生酒一鍾未發前服以滓敷寸口男左女右二日便止海上名方九牛草宋圖經集解頌曰生筠州山岡上二月生苗獨莖高一尺葉似艾葉圓而長背有白毛面青五月採苗用時珍曰陳嘉謨本草蒙筌以此為蘄艾謬矣苗氣味微苦有小毒主治解風勞治身體痛與甘草同煎服不入眾藥用蘇頌茺蔚本經上品釋名益母本經益明本經貞蔚別錄蓷爾雅音推野天麻會編豬麻綱目火杴本經郁臭草圖經苦低草圖經夏枯草外臺土質汗外臺時珍曰此草及子皆充盛密蔚故名茺蔚其功宜於婦人及明目益精故有益母益明之稱其莖方類麻故謂之野天麻俗呼為豬麻豬喜食之也夏至後即枯故亦有夏枯之名近效方謂之土質汗林億云質汗出西番乃熱血合諸藥煎成治金瘡折傷益母亦可作煎治折傷故名為土質汗也禹錫曰爾雅萑蓷注云今茺蔚也又名益母劉歆云蓷臭穢也臭穢即茺蔚也陸璣云蓷益母也故曾子見之感思集解別錄曰茺蔚生海濱池澤五月採弘景曰今處處有之葉如荏方莖子形細長有三稜方用亦稀頌曰今園圃及田野極多郭璞注爾雅云葉似荏方莖白華華生節間節節生花實似雞冠子黑色莖作四方稜五月採又云九月採實醫方稀有用實者宗奭曰茺蔚初春生時亦可浸洗淘去苦水煮作菜食凌冬不凋悴也時珍曰茺蔚近水濕處甚繁春初生苗如嫩蒿入夏長三四尺莖方如黃麻莖其葉如艾葉而背青一梗三葉葉有尖歧寸許一節節節生穗叢簇抱莖四五月間穗內開小花紅紫色亦有微白色者每萼內有細子四粒粒大如同蒿子有三稜褐色藥肆往往以作巨勝子貨之其草生時有臭氣夏至後即枯其根白色蘇頌圖經謂其葉似荏其子黑色似雞冠子九月採實寇宗奭衍義謂其凌冬不凋者皆誤傳也此草有白花紫花二種莖葉子穗皆一樣但白者能入氣分紅者能入血分別而用之可也按閨閣事宜云白花者為益母紫花者為野天麻返魂丹注云紫花者為益母白花者不是陳藏器本草云茺蔚生田野間人呼為郁臭草天麻生平澤似馬鞭草節節生紫花花中有子如青葙子孫思邈千金方云天麻草莖如火麻冬生苗夏著赤花如鼠尾花此皆似以茺蔚天麻為二物蓋不知其是一物二種凡物花皆有赤白如牡丹芍藥菊花之類是矣又按郭璞爾雅注云蓷音推即茺蔚又名益母葉似荏白華華生節間又云藬音推方莖葉長而銳有穗穗間有花紫縹色可以為飲江東呼為牛蘈據此則是蓷藬名本相同但以花色分別之其為一物無疑矣宋人重修本草以天麻草誤注天麻尤為謬失陳藏器本草又有鏨菜云生江南陰地似益母方莖對節白花主產後血病此即茺蔚之白花者故其功主血病亦相同子修治時珍曰凡用微炒香亦或蒸熟烈日曝燥舂簸去殼取仁用氣味辛甘微溫無毒別錄曰甘微寒時珍曰甘辛溫灰制硫黃主治明目益精除水氣久服輕身本經療血逆大熱頭痛心煩別錄產後血脹大明舂仁生食補中益氣通血脈填精髓止渴潤肺吳瑞治風解熱順氣活血養肝益心安魂定魄調女人經脈崩中帶下產後胎前諸病久服令人有子時珍發明震亨曰茺蔚子活血行氣有補陰之功故名益母凡胎前產後所恃者血氣也胎前無滯產後無虛以其行中有補也時珍曰茺蔚子味甘微辛氣溫陰中之陽手足厥陰經藥也白花者入氣分紫花者入血分治婦女經脈不調胎產一切血氣諸病妙品也而醫方鮮知用時珍常以之同四物香附諸藥治人獲效甚多蓋包絡生血肝藏血此物能活血補陰故能明目益精調經治女人諸病也東垣李氏言瞳子散大者禁用茺蔚子為其辛溫主散能助火也當歸雖辛溫而兼苦甘能和血故不禁之愚謂目得血而能視茺蔚行血甚捷瞳子散大血不足也故禁之非助火也血滯病目則宜之故曰明目莖大明曰苗葉根同功氣味藏器曰寒時珍曰莖葉味辛微苦花味微苦甘根味甘並無毒鏡源曰制硫黃雌黃砒石主治癮疹癢可作浴湯本經搗汁服主浮腫下水消惡毒疔腫乳癰丹遊等毒並敷之又服汁主子死腹中及產後血脹悶滴汁入耳中主聤耳搗敷蛇虺毒蘇恭入面藥令人光澤治粉刺藏器活血破血調經解毒治胎漏產難胎衣不下血暈血風血痛崩中漏下尿血瀉血疳痢痔疾打撲內損瘀血大便小便不通時珍發明時珍曰益母草之根莖花葉實並皆入藥可同用若治手足厥陰血分風熱明目益精調女人經脈則單用茺蔚子為良若治腫毒瘡瘍消水行血婦人胎產諸病則宜並用為良蓋其根莖花葉專於行而子則行中有補故也附方舊十三新十濟陰返魂丹昝殷產寶曰此方乃吉安文江高師禹備禮求於名醫所得者其效神妙活人甚多能治婦人胎前產後諸疾危證用野天麻又名益母又名火杴又名負擔即茺蔚子也葉似艾葉莖類火麻方梗凹面四五六月節節開花紅紫色如蓼花南北隨處皆有白花者不是於端午小暑或六月六日花正開時連根收採陰乾用葉及花子忌鐵器以石器碾為細末煉蜜丸如彈子大隨證嚼服用湯使其根燒存性為末酒服功與黑神散不相上下其藥不限丸數以病愈為度或丸如梧子大每服五七十丸又可搗汁濾淨熬膏服之胎前臍腹痛或作聲者米飲下胎前產後臍腹刺痛胎動不安下血不止當歸湯下產後以童子小便化下一丸能安魂定魄血氣自然調順諸病不生又能破血痛養脈息調經絡並溫酒下胎衣不下及橫生不順死胎不下經日脹滿心悶心痛並用炒鹽湯下產後血暈眼黑血熱口渴煩悶如見鬼神狂言不省人事以童子小便和酒化下產後結成血塊臍腹奔痛時發寒熱有冷汗或面垢顏赤五心煩熱並用童子小便酒下或薄荷自然汁下產後惡露不盡結滯刺痛上衝心胸滿悶童子小便酒下產後瀉血水以棗湯下產後痢疾米湯下產後血崩漏下糯米湯下產後赤白帶下煎膠艾湯下月水不調溫酒下產後中風牙關緊急半身不遂失音不語童便酒下產後氣喘咳嗽胸膈不利噁心吐酸水面目浮腫兩脅疼痛舉動失力溫酒下產後月內咳嗽自汗發熱久則變為骨蒸童便酒下產後鼻衄舌黑口乾童便酒下產後兩太陽穴痛呵欠心忪氣短羸瘦不思飲食血風身熱手足頑麻百節疼痛並米飲化下產後大小便不通煩躁口苦者薄荷湯下婦人久無子息溫酒下益母膏近效方治產婦諸疾及折傷內損有瘀血每天陰則痛神方也三月採益母草一名負擔一名夏枯草連根葉莖花洗擇令淨於箔上攤曝水乾以竹刀切長五寸勿用鐵刀置於大鍋中以水浸過二三寸煎煮候草爛水減三之二漉去草取汁約五六斗入盆中澄半日以綿濾去濁滓以清汁入釜中慢火煎取一斗如稀餳狀瓷瓶封收每取梨大暖酒和服日再服或和羹粥亦可如遠行即更煉至可丸收之服至七日則疼漸平復也產婦惡露不盡及血暈一二服便瘥其藥無忌又能治風益心力外臺秘要女人難產益母草搗汁七大合煎減半頓服立止無新者以乾者一大握水七合煎服韋宙獨行方胎死腹中益母草搗熟以暖水少許和絞取汁頓服之韋宙獨行方產後血暈心氣欲絕益母草研汁服一盞絕妙子母秘錄產後血閉不下者益母草汁一小盞入酒一合溫服聖惠方帶下赤白益母草花開時採搗為末每服二錢食前溫湯下集驗方小便尿血益母草搗汁服一升立瘥此蘇澄方也外臺秘要赤白雜痢困重者益母草日乾陳鹽梅燒存性等分為末每服三錢白痢乾薑湯赤痢甘草湯下名二靈散衛生家寶方小兒疳痢垂死者益母草嫩葉同米煮粥食之取足以瘥為度甚佳飲汁亦可廣濟方痔疾下血益母草葉搗汁飲之食醫心鏡一切癰瘡婦人妒乳乳癰小兒頭瘡及浸淫黃爛熱瘡疥疽陰蝕並用天麻草切五升以水一斗半煮一斗分數次洗之以殺癢千金急慢疔瘡聖惠方用益母草搗封之仍絞五合服即消醫方大成用益母草四月連花采之燒存性先以小尖刀十字劃開疔根令血出次繞根開破捻出血拭乾以稻草心蘸藥捻入瘡口令到底良久當有紫血出捻令血淨再捻藥入見紅血乃止一日夜捻藥三五度重者二日根爛出輕者一日出有瘡根脹起即是根出以針挑之出後仍敷藥生肌易愈忌風寒房室酒肉一切毒物癤毒己破益母草搗敷甚妙斗門方勒乳成癰益母為末水調塗乳上一宿自瘥生搗亦得聖惠方喉閉腫痛益母草搗爛新汲水一碗絞濃汁頓飲隨吐愈冬月用根衛生易簡方聤耳出汁茺蔚莖葉汁滴之聖惠方粉刺黑斑閨閣事宜云五月五日收帶根天麻紫花者曬乾燒灰以商陸根搗自然汁加酸醋和搜灰作餅炭火煅過收之半年方用入面藥甚能潤肌蘇頌曰唐天后煉益母草澤面法五月五日採根苗具者勿令著土曝乾搗羅以面水和成團如雞子大再曝乾仍作一爐四旁開竅上下置火安藥中央大火燒一炊久即去大火留小火養之勿令火絕經一復時出之瓷器中研治篩再研三日收用如澡豆法日用一方每十兩加滑石一兩胭脂一錢馬咬成瘡苦低草切細和醋炒塗之孫真人方新生小兒益母草五兩煎水浴之不生瘡疥簡要濟眾鏨菜音慚拾遺集解藏器曰鏨菜生江南陰地似益母方莖對節白花時珍曰此即益母之白花者乃爾雅所謂蓷是也其紫花者爾雅所謂藬是也蓷藬皆同一音乃一物二種故此條亦主血病與益母功同郭璞獨指白花者為益母昝殷謂白花者非益母皆欠詳審嫩苗可食故謂之菜寇宗奭言茺蔚嫩苗可煮食正合此也苗氣味辛平無毒主治破血產後腹痛煮汁服藏器薇銜薇音眉本經上品釋名糜銜本經鹿銜唐本吳風草唐本無心吳普無顛吳普承膏別錄承肌吳普恭曰南人謂之吳風草一名鹿銜草言鹿有疾銜此草即瘥也時珍曰據蘇說則薇銜糜銜當作麋銜也鹿麋一類也按酈道元水經注云魏興錫山多生薇銜草有風不偃無風獨搖則吳風亦當作無風乃通藏器曰一名無心草非草之無心者方藥少用集解別錄曰薇銜生漢中川澤及冤句邯鄲七月採莖葉陰乾恭曰此草叢生似茺蔚及白頭翁其葉有毛赤莖又有大小二種楚人謂大者為大吳風草小者為小吳風草保升曰葉似茺蔚叢生有毛其花黃色其根赤黑色莖葉氣味苦平無毒別錄曰微寒之才曰得秦皮良主治風濕痹歷節痛驚癇吐舌悸氣賊風鼠瘻癰腫本經暴症逐水療痿蹶久服輕身明目別錄婦人服之絕產無子藏器煎水洗瘭疽甲疽惡瘡時珍出外科精義發明時珍曰麋銜乃素問所用治風病自汗藥而後世不知用之誠缺略也素問黃帝曰有病身熱懈惰汗出如浴惡風少氣此為何病岐伯曰病名酒風治之以澤瀉術各三五分麋銜五分合以三指撮為後飯後飯者先服藥也附方新二年深惡瘡無心草根釣苓根狼毒白丁香各五錢麝香一字為末摻之又方無心草根乾薑各二錢釣苓根三錢為末摻之並外科精義小兒破傷風病拘急口噤沒心草半兩白附子炮二錢半為末每服一字薄荷酒灌下聖濟錄附錄無心草宋圖經頌曰生秦州及商州鳳翔各縣皆出之三月開花五月結實六七月採根苗陰乾用性溫無毒主積血逐氣塊益筋節補虛損潤顏色療澼泄腹痛時珍曰麋銜一名無心草此草功用與之相近其圖形亦相近恐即一物也故附之俟訪考焉鼠耳草亦名無心與此不同夏枯草本經下品釋名夕句本經乃東本經燕面別錄鐵色草震亨曰此草夏至後即枯蓋稟純陽之氣得陰氣則枯故有是名集解別錄曰夏枯草生蜀郡川穀四月採恭曰處處有之生平澤頌曰冬至後生葉似旋覆三月四月開花作穗紫白色似丹參花結子亦作穗五月便枯四月採之時珍曰原野間甚多苗高一二尺許其莖微方葉對節生似旋覆葉而長大有細齒背白多紋莖端作穗長一二寸穗中開淡紫小花一穗有細子四粒丹溪云無子亦欠察矣嫩苗瀹過浸去苦味油鹽拌之可食正誤宗奭曰今謂之郁臭自秋便生經冬不悴春開白花夏結子震亨曰郁臭草有臭味即茺蔚是也夏枯草無臭味明是兩物俱生於春夏枯先枯而無子郁臭後枯而結子莖葉氣味苦辛寒無毒之才曰土瓜為之使伏汞砂主治寒熱瘰癧鼠瘻頭瘡破症散癭結氣腳腫濕痹輕身本經發明震亨曰本草言夏枯草大治瘰癧散結氣有補養厥陰血脈之功而不言及觀其退寒熱虛者可使若實者以行散之藥佐之外以艾灸亦漸取效時珍曰黎居土易簡方夏枯草治目疼用沙糖水浸一夜用取其能解內熱緩肝火也樓全善云夏枯草治目珠疼至夜則甚者神效或用苦寒藥點之反甚者亦神效蓋目珠連目本即系也屬厥陰之經夜甚及點苦寒藥反甚者夜與寒亦陰故也夏枯稟純陽之氣補厥陰血脈故治此如神以陽治陰也一男子至夜目珠疼連眉稜骨及頭半邊腫痛用黃連膏點之反甚諸藥不效灸厥陰少陽疼隨止半日又作月餘以夏枯草二兩香附二兩甘草四錢為末每服一錢半清茶調服下咽則疼減半至四五服良愈矣附方舊一新六明目補肝肝虛目睛痛冷淚不止筋脈痛羞明怕日夏枯草半兩香附子一兩為末每服一錢臘茶湯調下簡要濟眾赤白帶下夏枯草花開時採陰乾為末每服二錢米飲下食前徐氏家傳方血崩不止夏枯草為末每服方寸匕米飲調下聖惠方產後血暈心氣欲絕者夏枯草搗絞汁服一盞大妙徐氏家傳方撲傷金瘡夏枯草口嚼爛罯上即愈衛生易簡汗斑白點夏枯草煎濃汁日日洗之乾坤生意瘰癧馬刀不問已潰未潰或日久成漏用夏枯草六兩水二鍾煎七分食遠溫服虛甚者則煎汁熬膏服並塗患處兼以十全大補湯加香附貝母遠志尤善此物生血乃治瘰癧之聖藥也其草易得其功甚多薛己外科經驗方劉寄奴草唐本草釋名金寄奴大明烏藤菜綱目時珍曰按李延壽南史云宋高祖劉裕小字寄奴微時伐荻新洲遇一大蛇射之明日往聞杵臼聲尋之見童子數人皆青衣於榛林中搗藥問其故答曰我主為劉寄奴所射今合藥敷之裕曰神何不殺之曰寄奴王者不可殺也裕叱之童子皆散乃收藥而反每遇金瘡敷之即愈人因稱此草為劉寄奴草鄭樵通志云江南人因漢時謂劉為卯金刀乃呼劉為金是以又有金寄奴之名江東人謂之烏藤菜云集解恭曰劉寄奴草生江南莖似艾蒿長三四尺葉似山蘭草而尖長一莖直上有穗葉互生其子似稗而細保升曰今出越州蒿之類也高四五尺葉似菊其花白色其實黃白色作穗夏月收苗日乾之頌曰今河中府孟州漢中滁州亦有之春生苗莖似艾蒿上有四稜高二三尺以來葉青似柳四月開碎小黃白花如瓦松七月結實似黍而細根淡紫色似萵苣六月七月採苗及花子通用時珍曰劉寄奴一莖直上葉似蒼朮尖長糙澀面深背淡九月莖端分開數枝一枝攢簇十朵小花白瓣黃蕊如小菊花狀花罷有白絮如苦蕒花之絮其子細長亦如苦蕒子所云實如黍稗者似與此不同其葉亦非蒿類子苗同修治斅曰凡採得去莖葉只用實以布拭去薄殼令淨拌酒蒸從巳至申曝乾用時珍曰莖葉花子皆可用氣味苦溫無毒主治破血下脹多服令人下痢蘇恭下血止痛治產後余疾止金瘡血極效別錄心腹痛下氣水脹血氣通婦人經脈癥結止霍亂水瀉大明小兒尿血新者研末服時珍附方舊一新七大小便血劉寄奴為末茶調空心服二錢即止集簡方折傷瘀血在腹內者劉寄奴骨碎補延胡索各一兩水二升煎七合入酒及童子小便各一合頓溫服之千金方血氣脹滿劉寄奴穗實為末每服三錢酒煎服不可過多令人吐利此破血之仙藥也衛生易簡方霍亂成痢劉寄奴草煎汁飲聖濟總錄湯火傷灼劉寄奴搗末先以糯米漿雞翎掃上後乃摻末並不痛亦無痕大驗之方凡湯火傷先以鹽末摻之護肉不壞後乃摻藥為妙經驗方風入瘡口腫痛劉寄奴為末摻之即止聖惠方小兒夜啼劉寄奴半兩地龍炒一分甘草一寸水煎灌少許聖濟總錄赤白下痢陰陽交帶不問赤白劉寄奴烏梅白姜等分水煎服赤加梅白加姜艾元英如宜方曲節草宋圖經釋名六月凌音令圖經六月霜綱目綠豆青圖經蛇藍時珍曰此草性寒故有凌霜綠豆之名集解頌曰曲節草生筠州四月生苗莖方色青有節葉似劉寄奴而青軟七八月著花似薄荷結子無用五月六月採莖葉陰乾莖葉氣味甘平無毒主治發背瘡消癰腫拔毒同甘草作末米汁調服蘇頌麗春草宋圖經釋名仙女蒿圖經定參草頌曰麗春草生檀嵎山川穀檀嵎山在高密界河南淮陽郡潁川及譙郡汝南郡等並呼為龍芊草河北近山鄴郡汲郡併名叢蘭艾上黨紫團山亦有名定參草又名仙女蒿今所在有之甚療癊黃人莫能知時珍曰此草有殊功而不著其形狀今罌粟亦名麗春草九仙子亦名仙女嬌與此同名恐非一物也當俟博訪花及根氣味甘微溫無毒主治癊黃黃疸蘇頌發明頌曰唐天寶中潁川郡楊正進方名醫皆用有效其方云麗春草療因時患傷熱變成癊黃遍身壯熱小便黃赤眼如金色面又青黑心頭氣痛繞心如刺頭旋欲倒兼脅下有瘕氣及黃疸等經用有驗其藥春三月採花陰乾一升搗散每平明空腹取三方寸匕和生麻油一盞頓服日一服隔五日再進以知為度其根療黃疸搗汁一盞空腹頓服須臾即利三兩行其疾立已一劑不能全愈隔七日更一劑永瘥忌酒面豬魚蒜粉酪等旋覆花本經下品釋名金沸草本經金錢花綱目滴滴金綱目盜庚爾雅夏菊綱目戴椹別錄宗奭曰花綠繁茂圓而覆下故曰旋覆時珍曰諸名皆因花狀而命也爾雅云蕧盜庚也蓋庚者金也謂其夏開黃花盜竊金氣也酉陽雜俎云金錢花一名毗屍沙自梁武帝時始進入中國集解別錄曰旋覆生平澤川穀五月採花日乾二十日成弘景曰出近道下濕地似菊花而大別有旋葍根出河南北國亦有形似芎藭惟合旋葍膏用之余無所用非此旋覆花根也保升曰葉似水蘇花黃如菊六月至九月採花頌曰今所在皆有二月以後生苗多近水旁大似紅藍而無刺長一二尺以來葉似柳莖細六月開花如菊花小銅錢大深黃色上黨田野人呼為金錢花七八月採花今近道人家園圃所蒔金錢花花葉並同極易繁盛恐即旋覆也宗奭曰旋覆葉如大菊又如艾蒿秋開花大如梧桐子花淡黃色其香過於菊別有旋花乃鼓子花非此花也見本條時珍曰花狀如金錢菊水澤邊生者花小瓣單人家栽者花大蕊簇蓋壤瘠使然其根細白俗傳露水滴下即生故易繁蓋亦不然花修治斅曰採得花去蕊並殼皮及蒂子蒸之從巳至午曬乾用氣味咸溫有小毒別錄曰甘微溫冷利權曰甘無毒大明曰無毒宗奭曰苦甘辛主治結氣脅下滿驚悸除水去五臟間寒熱補中下氣本經消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痹皮間死肉目中眵䁾利大腸通血脈益色澤別錄主水腫逐大腹開胃止嘔逆不下食甄權行痰水去頭目風宗奭消堅軟痞治噫氣好古發明頌曰張仲景治傷寒汗下後心下痞堅噫氣不除有七物旋覆代赭湯雜治婦人有三物旋覆湯胡洽居士治痰飲在兩脅脹滿有旋覆花丸用之尤多成無己曰硬則氣堅旋覆之咸以軟痞堅也震亨曰寇宗奭言其行痰水去頭目風亦走散之藥病人涉虛者不宜多服冷利大腸宜戒之時珍曰旋覆乃手太陰肺手陽明大腸藥也所治諸病其功只在行水下氣通血脈爾李衛公言嗅其花能損目唐慎微本草誤以旋花根方收附此下今改正之附方舊一新三中風壅滯旋覆花洗淨焙研煉蜜丸梧子大夜臥以茶湯下五丸至七丸十丸經驗後方半產漏下虛寒相摶其脈弦芤旋覆花湯用旋覆花三兩蔥十四莖新絳少許水三升煮一升頓服金匱要略月蝕耳瘡旋覆花燒研羊脂和塗之集簡方小兒眉癬小兒眉毛眼睫因癬退不生用野油花即旋覆花赤箭即天麻苗防風等分為末洗淨以油調塗之總微論葉主治敷金瘡止血大明治疔瘡腫毒時珍根主治風濕別錄青葙本經下品釋名草蒿本經萋蒿本經崑崙草唐本野雞冠綱目雞冠莧綱目子名草決明本經時珍曰青葙名義未詳胡麻葉亦名青蘘此草又多生於胡麻地中與之同名豈以其相似而然耶青蒿亦名草蒿其功相似而名亦相同何哉其子明目與決明子同功故有草決明之名其花葉似雞冠嫩苗似莧故謂之雞冠莧鄭樵通志言俗名牛尾蒿者誤矣集解別錄曰青葙生平谷道旁三月採莖葉陰乾五月六月採子弘景曰處處有之似麥柵花其子甚細別有草蒿或作草藁主療殊相類形名又相似可疑而實兩種也恭曰此草苗高尺余葉細軟花紫白色實作角子黑而扁光似莧實而大生下濕地四月五月採荊襄人名為崑崙草頌曰今江淮州郡近道亦有之二月生青苗長三四尺葉闊似柳而軟莖似蒿青紅色六月七月內生花上紅下白子黑光而扁似莨菪根亦似蒿根而白直下獨莖生根六月八月採子時珍曰青葙生田野間嫩苗似莧可食長則高三四尺苗葉花實與雞冠花一樣無別但雞冠花穗或有大而扁或團者此則梢間出花穗尖長四五寸狀如兔尾水紅色亦有黃白色者子在穗中與雞冠子及莧子一樣難辨蘇恭言其結角誤矣蕭炳言黃花者名陶朱術與陳藏器所說不同又有天靈草亦此類也並附於下莖葉修治斅曰凡用先燒鐵杵臼乃搗用之氣味苦微寒無毒主治邪氣皮膚中熱風瘙身癢殺三蟲本經惡瘡疥蝨痔蝕下部䘌瘡別錄搗汁服大療溫癘蘇恭止金瘡血大明子氣味苦微寒無毒權曰苦平主治唇口青本經治五臟邪氣益腦髓鎮肝明耳目堅筋骨去風寒濕痹大明治肝臟熱毒沖眼赤障青盲翳腫惡瘡疥瘡甄權發明炳曰理眼有青葙子丸宗奭曰青葙子經中不言治眼惟藥性論日華子始言治肝明目今人多用治眼殊與經意不相當時珍曰青葙子治眼與決明子莧實同功本經雖不言治眼而云一名草決明主唇口青則其明目之功可知矣目者肝之竅唇口青者足厥陰經之證古方除熱亦多用之青葙子之為厥陰藥又可知矣況用之治目往往有驗尤可徵據魏略云初平中有青牛先生常服青葙子丸年百餘歲如五六十者附方舊一鼻衄不止眩冒欲死青葙子汁三合灌入鼻中貞元廣利方附錄桃朱術炳曰青箱一種花黃者名陶朱術苗相似藏器曰桃朱術生園中細如芹花紫子作角以鏡向旁敲之則子自發五月五日乃收子帶之令婦人為夫所愛雁來紅時珍曰莖葉穗子並與雞冠同其葉九月鮮紅望之如花故名吳人呼為老少年一種六月葉紅者名十樣錦天靈草時珍曰按土宿真君本草云狀如雞冠花葉亦如之折之有液如乳生江湖荊南陂池間五月取汁可制雄硫煮雌煉砂思蓂子斅曰思莫子鼠細子二件真似青葙子只是味不同思蓂子味粗煎之有涎雞冠宋嘉祐釋名時珍曰以花狀命名集解時珍曰雞冠處處有之三月生苗入夏高者五六尺矬者才數寸其葉青柔頗似白莧菜而窄梢有赤脈其莖赤色或圓或扁有筋起六七月梢間開花有紅白黃三色其穗圓長而尖者儼如青葙之穗扁卷而平者儼如雄雞之冠花大有圍一二尺者層層卷出可愛子在穗中黑細光滑與莧實一樣其穗如秕麥狀花最耐久霜後始蔫苗氣味甘涼無毒主治瘡痔及血病時珍子氣味甘涼無毒主治止腸風瀉血赤白痢藏器崩中帶下入藥炒用大明花氣味同上主治痔漏下血赤白下痢崩中赤白帶下分赤白用時珍附方新十一吐血不止白雞冠花醋浸煮七次為末每服二錢熱酒下經驗方結陰便血雞冠花椿根白皮等分為末煉蜜丸梧子大每服三十丸黃耆湯下日二服聖濟總錄糞後下血白雞冠花並子炒煎服聖惠方五痔肛腫久不愈變成瘻瘡用雞冠花鳳眼草各一兩水二碗煎湯頻洗衛生寶鑑下血脫肛白雞冠花防風等分為末糊丸梧子大空心米飲每服七十丸一方白雞冠花炒棕櫚灰羌活一兩為末每服二錢米飲下永類鈐方經水不止紅雞冠花一味曬乾為末每服二錢空心酒調下忌魚腥豬肉孫氏集效方產後血痛白雞冠花酒煎服之李樓奇方婦人白帶白雞冠花曬乾為末每旦空心酒服三錢赤帶用紅者孫氏集效方白帶沙淋白雞冠花苦壺盧等分燒存性空心火酒服之摘玄赤白下痢雞冠花煎酒服赤用紅白用白集簡方紅藍花宋開寶釋名紅花開寶黃藍頌曰其花紅色葉頗似藍故有藍名集解志曰紅藍花即紅花也生梁漢及西域博物志云張騫得種於西域今魏地亦種之頌曰今處處有之人家場圃所種冬月布子於熟地至春生苗夏乃有花花下作梂蝟多刺花出梂上圃人乘露採之採已復出至盡而罷梂中結實白顆如小豆大其花曝乾以染真紅又作胭脂時珍曰紅花二月八月十二月皆可以下種雨後布子如種麻法初生嫩葉苗亦可食其葉如小薊葉至五月開花如大薊花而紅色侵晨採花搗熟以水淘布袋絞去黃汁又搗以酸粟米泔清又淘又絞袋去汁以青蒿覆一宿曬乾或捏成薄餅陰乾收之入藥搓碎用其子五月收採淘淨搗碎煎汁入醋拌蔬食極肥美又可為車脂及燭花氣味辛溫無毒元素曰入心養血謂其苦溫陰中之陽故入心佐當歸生新血好古曰辛而甘苦溫肝經血分藥也入酒良主治產後血暈口噤腹內惡血不盡絞痛胎死腹中並酒煮服亦主蠱毒開寶多用破留血少用養血震亨活血潤燥止痛散腫通經時珍發明時珍曰血生於心包藏於肝屬於衝任紅花汁與之同類故能行男子血脈通女子經水多則行血少則養血按養疴漫筆云新昌徐氏婦病產暈已死但胸膈微熱有名醫陸氏曰血悶也得紅花數十斤乃可活遂亟購得以大鍋煮湯盛三桶於窗格之下舁婦寢其上熏之湯冷再加有頃指動半日乃蘇按此亦得唐許胤宗以黃耆湯熏柳太后風病之法也附方舊四新四六十二種風張仲景治六十二種風兼腹內血氣刺痛用紅花一大兩分為四分以酒一大升煎鍾半頓服之不止再服圖經本草一切腫疾紅花熟搗取汁服不過三服便瘥外臺秘要喉痹壅塞不通者紅藍花搗絞取汁一小升服之以瘥為度如冬月無生花以乾者浸濕絞汁煎服極驗海上方熱病胎死紅花酒煮汁飲二三盞熊氏補遺胎衣不下方同上楊氏產乳產後血暈心悶氣絕紅花一兩為末分作二服酒二盞煎一盞連服如口噤斡開灌之或入小便尤妙子母秘錄聤耳出水紅藍花三錢半枯礬五錢為末以綿杖繳淨吹之無花則用枝葉一方去礬聖惠方噎膈拒食端午采頭次紅花無灰酒拌焙乾血竭瓜子樣者等分為末無灰酒一盞隔湯頓熱徐咽初服二分次日四分三日五分楊起簡便方子主治天行瘡痘水吞數顆開寶功與花同蘇頌附方舊二新一血氣刺痛紅藍子一升搗碎以無灰酒一大升拌子曝乾重搗篩蜜丸梧子大空心酒下四十丸張仲景方瘡疽不出紅花子紫草茸各半兩蟬蛻二錢半水酒鍾半煎減半量大小加減服龐安常傷寒論女子中風血熱煩渴以紅藍子五合熬搗旦日取半大匙以水一升煎取七合去渣細細嚥之貞元廣利方苗主治生搗塗遊腫開寶番紅花綱目釋名洎夫藍綱目撒法郎集解時珍曰番紅花出西番回回地面及天方國即彼地紅藍花也元時以入食饌用按張華博物志言張騫得紅藍花種於西域則此即一種或方域地氣稍有異耳氣味甘平無毒主治心憂鬱積氣悶不散活血久服令人心喜又治驚悸時珍附方新一傷寒發狂驚怖恍惚用撒法郎二分水一盞浸一夕服之天方國人所傳王璽醫林集要燕脂綱目釋名𧹬赦時珍曰按伏候中華古今注云燕脂起自紂以紅藍花汁凝作之調脂飾女面產於燕地故曰燕脂或作𧹬赦匈奴人名妻為閼氏音同燕脂謂其顏色可愛如燕脂也俗作胭肢胭支者並謬也集解時珍曰燕脂有四種一種以紅藍花汁染胡粉而成乃蘇鶚演義所謂燕脂葉似薊花似蒲出西方中國謂之紅藍以染粉為婦人面色者也一種以山燕脂花汁染粉而成乃段公路北戶錄所謂端州山間有花叢生葉類藍正月開花似蓼土人採含苞者為燕脂粉亦可染帛如紅藍者也一種以山榴花汁作成者鄭虔胡本草中載之一種以紫礦染綿而成者謂之胡燕脂李珣南海藥譜載之今南人多用紫礦燕脂俗呼紫梗是也大抵皆可入血病藥用又落葵子亦可取汁和粉飾面亦謂之胡燕脂見菜部氣味甘平無毒主治小兒聤耳浸汁滴之開寶活血解痘毒時珍附方新五乳頭裂破燕脂蛤粉為末敷之危氏得效方嬰孩鵝口白厚如紙用坯子燕脂以乳汁調塗之一宿效男用女乳女用男乳集簡方漏瘡腫痛豬膽七個綿燕脂十個洗水和勻搽七次即可救急方防痘入目燕脂嚼汁點之集簡方痘瘡倒陷干燕脂三錢胡桃燒存性一個研末用胡荽煎酒服一錢再服取效救急方大薊小薊別錄中品釋名虎薊弘景馬薊範汪貓薊弘景刺薊日華山牛蒡日華雞項草圖經千針草圖經野紅花綱目弘景曰大薊是虎薊小薊是貓薊葉並多刺相似田野甚多方藥少用時珍曰薊猶髻也其花如髻也曰虎曰貓因其苗狀猙獰也曰馬者大也牛蒡因其根似牛蒡根也雞項因其莖似雞之項也千針紅花皆其花狀也鄭樵通志謂爾雅之蘩曰狗毒者即此未知是否藏器曰薊門以多薊得名當以北方者為勝也集解別錄曰大小薊五月採恭曰大小薊葉雖相似功力有殊大薊生山谷根療癰腫小薊生平澤不能消腫而俱能破血頌曰小薊處處有之俗名青刺薊二月生苗二三寸時並根作菜茹食甚美四月高尺余多刺心中出花頭如紅藍花而青紫色北人呼為千針草四月採苗九月採根並陰乾用大薊苗根與此相似但肥大爾宗奭曰大小薊皆相似花如髻但大薊高三四尺葉皺小薊高一尺許葉不皺以此為異作菜雖有微芒不害人大薊根葉同氣味甘溫無毒弘景曰有毒權曰苦平大明曰葉涼主治女子赤白沃安胎止吐血鼻衄令人肥健別錄搗根絞汁服半升主崩中血下立瘥甄權葉治腸癰腹臟瘀血作暈撲損生研酒並小便任服又惡瘡疥癬同鹽研罯之大明小薊根苗同氣味甘溫無毒大明曰涼主治養精保血別錄破宿血生新血暴下血血崩金瘡出血嘔血等絞取汁溫服作煎和糖合金瘡及蜘蛛蛇蠍毒服之亦佳藏器治熱毒風並胸膈煩悶開胃下食退熱補虛損苗去煩熱生研汁服並大明作菜食除風熱夏月熱煩不止搗汁半升服立瘥孟詵發明大明曰小薊力微只可退熱不似大薊能健養下氣也恭曰大小薊皆能破血但大薊兼療癰腫而小薊專主血不能消腫也附方舊六新九心熱吐血口乾用刺薊葉及根搗絞取汁每頓服二小盞聖惠方舌硬出血不止刺薊搗汁和酒服乾者為末冷水服普濟方九竅出血方同上簡要濟眾卒瀉鮮血小薊葉搗汁溫服一升梅師方崩中下血大小薊根一升酒一斗漬五宿任飲亦可酒煎服或生搗汁溫服又方小薊莖葉洗切研汁一盞入生地黃汁一盞白朮半兩煎減半溫服千金方墮胎下血小薊根葉益母草五兩水二大碗煮汁一碗再煎至一盞分二服一日服盡聖濟總錄金瘡出血不止小薊苗搗爛塗之孟詵食療本草小便熱淋馬薊根搗汁服聖惠方鼻塞不通小薊一把水二升煮取一升分服外臺秘要方小兒浸淫瘡痛不可忍發寒熱者刺薊葉新水調敷瘡上干即易之簡要濟眾方癬瘡作癢刺薊葉搗汁服之千金方婦人陰癢小薊煮湯日洗三次普濟方諸瘻不合虎薊根貓薊根酸棗根枳根杜衡各一把斑蝥三分炒為末蜜丸棗大日一服並以小丸納瘡中肘後方疔瘡惡腫千針草四兩乳香一兩明礬五錢為末酒服二錢出汗為度普濟方續斷本經上品釋名屬折本經接骨別錄龍豆本經南草別錄時珍曰續斷屬折接骨皆以功命名也集解別錄曰續斷生常山山谷七月八月採陰乾普曰出梁州七月七日採弘景曰按桐君藥錄云續斷生蔓延葉細莖如荏大根本黃白有汁七月八月採根今皆用莖葉節節斷皮黃皺狀如雞腳者又呼為桑上寄生時人又有接骨樹高丈餘許葉似蒴藋皮主金瘡廣州又有續斷藤一名諾藤斷其莖以器承取汁飲療虛損絕傷用沐頭長髮折枝插地即生恐皆非真李當之云是虎薊與此大乖但虎薊亦療血恭曰所在山谷皆有今俗用者葉似苧而莖方根如大薊黃白色陶說非也頌曰今陝西河中興元舒越晉絳諸州亦有之三月以後生苗干四稜似苧麻葉兩兩相對而生四月開花紅白色似益母花根如大薊赤黃色謹按範汪方云續斷即是馬薊與小薊葉相似但大於小薊爾葉似旁翁菜而小厚兩邊有刺刺人其花紫色與今越州所圖者相類而市之貨者亦有數種少能辨其粗良醫人但以節節斷皮黃皺者為真斅曰凡使勿用草茅根緣真相似若誤服令人筋軟時珍曰續斷之說不一桐君言是蔓生葉似荏李當之範汪並言是虎薊日華子言是大薊一名山牛蒡蘇恭蘇頌皆言葉似苧麻根似大薊而名醫別錄復出大小薊條頗難依據但自漢以來皆以大薊為續斷相承久矣究其實則二蘇所云似與桐君相符當以為正今人所用以川中來色赤而瘦折之有煙塵起者為良焉鄭樵通志謂範汪所說者乃南續斷不知何據蓋以別川續斷耳根修治斅曰凡採得根橫切銼之又去向里硬筋以酒浸一伏時焙乾入藥用氣味苦微溫無毒別錄曰辛普曰神農雷公黃帝李當之苦無毒扁鵲辛無毒之才曰地黃為之使惡雷丸主治傷寒補不足金瘡癰瘍折跌續筋骨婦人乳難久服益氣力本經婦人崩中漏血金瘡血內漏止痛生肌肉及踠傷惡血腰痛關節緩急別錄去諸溫毒通宣血脈甄權助氣補五勞七傷破癥結瘀血消腫毒腸風痔瘻乳癰瘰癧婦人產前後一切病胎漏子宮冷面黃虛腫縮小便止泄精尿血大明發明時珍曰宋張叔潛秘書知劍州時其閣下病血痢一醫用平胃散一兩入川續斷末二錢半每服二錢水煎服即愈紹興壬子會稽時行痢疾叔潛之子以方傳人往往有驗小兒痢服之效附方舊二新二小便淋瀝生續斷搗絞汁服即馬薊根也古今錄驗妊娠胎動兩三月墮預宜服此川續斷酒浸杜仲薑汁炒去絲各二兩為末棗肉煮爛杵和丸梧子大每服三十丸米飲下產後諸疾血暈心悶煩熱厭厭氣欲絕心頭硬乍寒乍熱續斷皮一握水三升煎二升分三服如人行一里再服無所忌此藥救產後垂死子母秘錄打撲傷損閃肭骨節用接骨草葉搗爛罨之立效衛生易簡方苦芺音襖別錄下品釋名鉤芺爾雅苦板時珍曰凡物稚曰芺此物嫩時可食故以名之集解弘景曰苦芺處處有之傖人取莖生食之保升曰所在下濕地有之莖圓無刺可生啖子若貓薊五月五日採苗曝乾恭曰今人以為漏蘆非也時珍曰爾雅鉤芺即此苦芺也芺大如拇指中空莖頭有苔似薊初生可食許慎說文言江南人食之下氣今浙東人清明節採其嫩苗食之云一年不生瘡癤亦搗汁和米為食其色清久留不敗造化指南云苦板大者名苦藉葉如地黃味苦初生有白毛入夏抽莖有毛開白花甚繁結細實其無花實者名地膽草汁苦如膽也處處濕地有之入爐火家用苗氣味苦微寒無毒主治面目通身漆瘡燒灰敷之亦可生食別錄燒灰療金瘡甚驗弘景治丹毒大明煎湯洗痔甚驗汪穎下氣解熱時珍漏蘆本經上品釋名野蘭本經莢蒿蘇恭鬼油麻日華時珍曰屋之西北黑處謂之漏凡物黑色謂之蘆此草秋後即黑異於眾草故有漏蘆之稱唐韻作𦸢其莢如麻故俗呼為鬼油麻云集解別錄曰漏蘆生喬山山谷八月採根陰乾弘景曰喬山應是黃帝所葬處乃在上郡今出近道市人取苗用之俗中取根名鹿驪根苦酒摩以療瘡疥恭曰此藥俗名莢蒿莖葉似白蒿花黃生莢長似細麻之莢大如箸許有四五瓣七八月後皆黑異於眾草蒿之類也常用其莖葉及子未見用根其鹿驪山南謂之木藜蘆有毒非漏蘆也今人以馬薊似苦芺者為漏蘆亦非也志曰別本注言漏蘆莖大如箸高四五尺子房似油麻房而小江東人取其苗用勝於根江寧及上黨者佳陶云鹿驪蘇云木藜蘆皆非也漏蘆自別藏器曰南人用苗北土用根乃樹生如茱萸樹高二三尺有毒殺蠱山人以洗瘡疥保升曰葉似角蒿今曹兗州下濕處最多六月七月採莖日乾黑於眾草大明曰花苗並可用形並氣味似干牛蒡頭上有白花子頌曰今汴東州郡及秦海州皆有之舊說莖葉似白蒿花黃有莢莖若箸大房類油麻而小今諸郡所圖上惟單州者差相類沂州者花葉頗似牡丹秦州者花似單葉寒菊紫色五七枝同一干海州者花紫碧如單葉蓮花花萼下及根旁有白茸裹之根如蔓荊而細又類蔥本黑色淮甸人呼為老翁花三州所生花雖別而葉頗相類但秦海州者葉更作鋸齒狀一物而殊類如此醫家何所適從當依舊說以單州出者為勝又本草飛廉一名漏蘆云與苦芺相類其根生則肉白皮黑干則黑如玄參七八月採花陰乾用所說與秦州海州所圖漏蘆花葉及根頗相近然彼人但名漏蘆不曰飛廉也斅曰一種真似漏蘆只是味苦酸誤服令人吐不止時珍曰按沈存中筆談云今方家所用漏蘆乃飛廉也飛廉一名漏蘆苗似苦芺根如牛蒡綿頭者是也採時用根今閩中所謂漏蘆莖如油麻高六七寸秋深枯黑如漆採時用苗乃真漏蘆也余見飛廉下根苗修治斅曰凡採得漏蘆細銼以生甘草相對拌蒸之從巳至申揀出曬乾用氣味苦咸寒無毒別錄曰大寒藏器曰有毒杲曰無毒足陽明本經藥也大明曰連翹為之使主治皮膚熱毒惡瘡疽痔濕痹下乳汁久服輕身益氣耳目聰明不老延年本經止遺溺熱氣瘡癢如麻豆可作浴湯別錄通小腸泄精尿血腸風風赤眼小兒壯熱撲損續筋骨乳癰瘰癧金瘡止血排膿補血長肉通經脈大明發明弘景曰此藥久服甚益人而服食方罕見用之近道出者惟療瘻疥耳市人皆取苗用時珍曰漏蘆下乳汁消熱毒排膿止血生肌殺蟲故東垣以為手足陽明藥而古方治癰疽發背以漏蘆湯為首稱也龐安常傷寒論治癰疽及預解時行痘疹熱用漏蘆葉云無則以山梔子代之亦取其寒能解熱蓋不知其能入陽明之故也附方舊二新六腹中蛔蟲漏蘆為末以餅臛和方寸匕服之外臺秘要小兒無辜疳病肚脹或時泄痢冷熱不調以漏蘆一兩杵為散每服一錢以豬肝一兩入鹽少許以水同煮熟空心頓食之聖惠方冷勞泄痢漏蘆一兩艾葉炒四兩為末米醋三升入藥末一半同熬成膏入後末和丸梧子大每溫水下三十丸聖濟總錄產後帶下方同上乳汁不下乃氣脈壅塞也又治經絡凝滯乳內脹痛邪畜成癰服之自然內消漏二兩半蛇蛻十條炙焦栝蔞十個燒存性為末每服二錢溫酒調下良久以熱羹湯投之以通為度和劑方歷節風痛筋脈拘攣古聖散用漏蘆麩炒半兩地龍去土炒半兩為末生薑二兩取汁入蜜三兩同煎三五沸入好酒五合盛之每以三杯調末一錢溫服聖濟總錄一切癰疽發背初發二日但有熱證便宜服漏蘆湯退毒下膿乃是宣熱拔毒之劑熱退即住服漏蘆用有白茸者連翹生黃耆沉香各一兩生粉草半兩大黃微炒一兩為細末每服二錢薑棗湯調下李迅癰疽集驗方白禿頭瘡五月收漏蘆草燒灰豬膏和塗之聖濟總錄飛廉本經上品釋名漏蘆別錄木禾別錄飛雉同上飛輕本經伏兔別錄伏豬同天薺同時珍曰飛廉神禽之名也其狀鹿身豹文雀頭蛇尾有角能致風氣此草附莖有皮如箭羽復療風邪故有飛廉飛雉飛輕諸名集解別錄曰飛廉生河內川澤正月採根七月八月採花陰乾弘景曰處處有之極似苦芺惟葉多刻缺葉下附莖輕有皮起似箭羽其花紫色俗方殆無用而道家服其枝莖可得長生又入神枕方今既別有漏蘆則此漏蘆乃別名爾恭曰此有兩種一種生平澤中是陶氏所說者一種生山岡上者葉頗相似而無刻缺且多毛其莖亦無羽其根直下更無旁枝生則肉白皮黑中有黑脈日乾則黑如玄參用莖葉及根療疳蝕殺蟲與平澤者俱有驗今俗以馬薊似苦芺者為漏蘆並非是也保升曰葉似苦芺莖似軟羽花紫色子色白所在平澤皆有五月六月採日乾斅曰凡使勿用赤脂蔓與飛廉形狀相似只赤脂蔓見酒則色便如血以此可表識之頌曰今秦州所圖漏蘆花似單葉寒菊紫色五七枝同一干海州所圖漏蘆花紫碧色如單葉蓮花花萼下及根旁有白茸裹之根黑色如蔓荊而細又類蔥本與陶蘇所說飛廉相近然彼但謂之漏蘆今醫家罕有用飛廉者不能的識時珍曰飛廉亦蒿類也蘇頌圖經疑海州所圖之漏蘆是飛廉沈存中筆談亦言飛廉根如牛蒡而綿頭古方漏蘆散下云用有白茸者則是有白茸者乃飛廉無疑矣今考二物氣味功用俱不相遠似可通用豈或一類有數種而古今名稱各處不同乎根及花修治斅曰凡用根先刮去粗皮杵細以苦酒拌一夜漉出日乾細杵用氣味苦平無毒權曰苦咸有毒之才曰得烏頭良惡麻黃主治骨節熱脛重痠疼久服令人身輕本經頭眩頂重皮間邪風如蜂螫針刺魚子細起熱瘡癰疽痔濕痹止風邪咳嗽下乳汁久服益氣明目不老可煮可乾用別錄主留血甄權療疳蝕殺蟲蘇恭小兒疳痢為散漿水服大效蕭炳治頭風旋暈時珍發明時珍曰葛洪抱朴子書言飛廉單服可輕身延壽又言服飛廉煎可遠涉疾行力數倍於常本經別錄所列亦是良藥而後人不知用何哉附方舊一疳䘌蝕口及下部用飛廉蒿燒灰搗篩以兩錢匕著痛處甚痛則忍之若不痛非疳也下部蟲如馬尾大相纏出無數十日瘥二十日平復千金翼方苧麻別錄下品釋名時珍曰苧麻作紵可以績紵故謂之紵凡麻絲之細者為紵粗者為絟陶弘景雲苧即今績苧麻是也麻字從廣從林音派象屋下林麻之形廣音掩集解頌曰苧麻舊不著所出州土今閩蜀江浙多有之剝其皮可以績布苗高七八尺葉如楮葉而無叉面青背白有短毛夏秋間著細穗青花其根黃白而輕虛二月八月採按陸璣草木疏云苧一科數十莖宿根在土中至春自生不須栽種荊揚間歲三刈諸園種之歲再刈便剝取其皮以竹刮其表厚處自脫得里如筋者煮之用緝布今江浙閩中尚復如此宗奭曰苧如蕁麻花如白楊而長成穗每一朵凡數十穗青白色時珍曰苧家苧也又有山苧野苧也有紫苧葉面紫白苧葉面青其背皆白可刮洗煮食救荒味甘美其子茶褐色九月收之二月可種宿根亦自生根氣味甘寒無毒權曰甘平大明曰甘滑冷無毒主治安胎貼熱丹毒別錄治心膈熱漏胎下血產前後心煩天行熱疾大渴大狂服金石藥人心熱罯毒箭蛇蟲咬大明漚苧汁止消渴別錄發明震亨曰苧根大能補陰而行滯血方藥或惡其賤似未曾用也藏器曰苧性破血將苧麻與產婦枕之止血暈產後腹痛以苧安腹上即止也又蠶咬人毒入肉取苧汁飲之今人以苧近蠶種則蠶不生是矣附方舊四新八痰哮咳嗽苧根煅存性為末生豆腐蘸三五錢食即效未全可以肥豬肉二三片蘸食甚妙醫學正傳小便不通聖惠方用麻根蛤粉各半兩為末每服二錢空心新汲水下摘玄方用苧根洗研攤絹上貼少腹連陰際須臾即通小便血淋苧根煎湯頻服大妙亦治諸淋聖惠方五種淋疾苧麻根兩莖打碎以水一碗半煎半碗頓服即通大妙斗門方妊娠胎動忽下黃汁如膠或如小豆汁腹痛不可忍者苧根去黑皮切二升銀一斤水九升煎四升每服以水一升入酒半升煎一升分作二服一方不用銀梅師方肛門腫痛生苧根搗爛坐之良瀕湖集簡方脫肛不收苧根搗爛煎湯熏洗之聖惠方癰疽發背初起未成者苧根熟搗敷上日夜數易腫消則瘥圖經本草五色丹毒苧根煮濃汁日三浴之外臺秘要雞魚骨哽談野翁試驗方用苧麻根搗汁以匙挑灌之立效醫方大成用野苧麻根搗碎丸如龍眼大魚骨魚湯下雞骨雞湯下葉氣味同根主治金瘡傷折血出瘀血時珍發明時珍曰苧麻葉甚散血五月五日收取和石灰搗作團曬乾收貯遇有金瘡折損者研末敷之即時血止且易痂也按李仲南永類方云凡諸傷瘀血不散者五六月收野苧葉蘇葉擂爛敷金瘡上如瘀血在腹內順流水絞汁服即通血皆化水以生豬血試之可驗也秋冬用干葉亦可附方新三驟然水瀉日夜不止欲死不拘男婦用五月五日採麻葉陰乾為末每服二錢冷水調下勿吃熱物令人悶倒只吃冷物小兒半錢楊子建護命方冷痢白凍方同上蛇虺咬傷青麻嫩頭搗汁和酒等分服三盞以渣敷之毒從竅中出以渣棄水中即不發看傷處有竅是雄蛇無竅是雌蛇以針挑破傷處成竅敷藥摘玄方苘麻苘音頃唐本草釋名白麻時珍曰苘一作䔛又作檾種必連頃故謂之䔛也集解恭曰苘即䔛麻也今人取皮作布及索者實似大麻子九月十月採陰乾頌曰處處有之北人種以績布及打繩索苗高四五尺或六七尺葉似苧而薄花黃實殼如蜀葵其中子黑色時珍曰苘麻今之白麻也多生卑濕處人亦種之葉大似桐葉團而有尖六七月開黃花結實如半磨形有齒嫩青老黑中子扁黑狀如黃葵子其莖輕虛潔白北人取皮作麻以莖蘸硫黃作淬燈引火甚速其嫩子小兒亦食之實氣味苦平無毒主治赤白冷熱痢炒研為末每蜜湯服一錢癰腫無頭者吞一枚蘇恭生眼翳瘀肉起倒睫拳毛時珍根主治亦治痢古方用之蘇頌附方新三一切眼疾苘麻子一升為末以獖豬肝批片蘸末炙熟再蘸再炙末盡乃為末每服一字陳米飲下日三服聖濟總錄目生翳膜久不愈者用檾實以柳木作碨磨去殼馬尾篩取黃肉去焦殼每十兩可得四兩非此法不能去殼也用豬肝薄切滾藥慢炙熟為末醋和丸梧子大每服三十丸白湯下一方以檾實內袋中蒸熟暴為末蜜丸溫水下聖濟總錄大青別錄中品釋名時珍曰其莖葉皆深青故名集解別錄曰大青三四月採莖陰乾弘景曰今出東境及近道紫莖長尺許莖葉皆用頌曰今江東州郡及荊南眉蜀濠淄諸州皆有之春生青紫莖似石竹苗葉花紅紫色似馬蓼亦似芫花根黃三月四月採莖葉陰乾用時珍曰處處有之高二三尺莖圓葉長三四寸面青背淡對節而生八月開小花紅色成簇結青實大如椒顆九月色赤莖葉氣味苦大寒無毒權曰甘時珍曰甘微咸不苦主治時氣頭痛大熱口瘡別錄除時行熱毒甚良弘景治溫疫寒熱甄權治熱毒風心煩悶渴疾口乾小兒身熱疾風疹及金石藥毒塗罯腫毒大明主熱毒痢黃疸喉痹丹毒時珍發明頌曰古方治傷寒黃汗黃疸等有大青湯又治傷寒頭身強腰脊痛葛根湯內亦用大青大抵時疾多用之時珍曰大青氣寒味微苦鹹能解心胃熱毒不特治傷寒也朱肱活人書治傷寒發赤斑煩痛有犀角大青湯大青四物湯故李象先指掌賦云陽毒則狂斑煩亂以大青升麻可回困篤附方新六喉風喉痹大青葉搗汁灌之取效止衛生易簡方小兒口瘡大青十八銖黃連十二銖水三升煮一升服一日二服以瘥為度千金方熱病下痢困篤者大青湯用大青四兩甘草赤石脂三兩膠二兩豉八合水一斗煮三升分三服不過二劑瘥肘後方熱病發斑赤色煩痛大青四物湯用大青一兩阿膠甘草各二錢半豉二合分三服每用水一盞半煎一盞入膠烊化服又犀角大青湯用大青七錢半犀角二錢半梔子十枚豉二撮分二服每服水一盞半煎八分溫服南陽活人書肚皮青黑小兒卒然肚皮青黑乃血氣失養風寒乘之危惡之候也大青為末納口中以酒送下保幼大全方小青宋圖經集解頌曰小青生福州三月生花彼土人當月採葉用之葉氣味溫無毒主治生搗敷癰腫瘡癤甚效蘇頌治血痢腹痛研汁服解蛇毒時珍附方新三蛇虺螫傷衛生易簡方用小青一握細研入香白芷半兩酒調服手挼患處候黃水出為效摘玄方用小青大青牛膝葉同搗汁和酒服以渣敷之中暑發昏小青葉井水浸去泥控干入沙糖擂汁急灌之壽域方葫蘆巴宋嘉祐釋名苦豆集解禹錫曰葫蘆巴出廣州並黔州春生苗夏結子子作細莢至秋採今人多用嶺南者或云是番蘿蔔子未審的否頌曰今出廣州或云種出海南諸番蓋其地蘆菔子也舶客將種蒔於嶺外亦生然不及番中來者真好今醫家治元臟虛冷為要藥而唐已前方不見用本草不著蓋是近出修治時珍曰凡入藥淘淨以酒浸一宿曬乾蒸熟或炒過用氣味苦大溫無毒杲曰純陽主治元臟虛冷氣得附子硫黃治腎虛冷腹脅脹滿面色青黑得蘹香子桃仁治膀胱氣甚效嘉祐治冷氣疝瘕寒濕腳氣益右腎暖丹田時珍發明宗奭曰膀胱氣用此合桃仁麩炒等分為末半為散半以酒糊和丸梧子大每服五七十丸空心鹽酒下其散以熱米飲下與丸子相間空心服日各一二服時珍曰葫蘆巴右腎命門藥也元陽不足冷氣潛伏不能歸元者宜之宋惠民和劑局方有葫蘆巴丸治大人小兒小腸奔豚偏墜及小腹有形如卵上下走痛不可忍者用葫蘆巴八錢茴香六錢巴戟去心川烏頭炮去皮各二錢楝實去核四錢吳茱萸五錢並炒為末酒糊丸梧子大每服十五丸小兒五丸鹽酒下太醫薛已云一人病寒疝陰囊腫痛服五苓諸藥不效與此而平也又張子和儒門事親云有人病目不睹思食苦豆即葫蘆巴頻頻不缺不周歲而目中微痛如蟲行入眥漸明而愈按此亦因其益命門之功所謂益火之原以消陰翳是也附方新六小腸氣痛葫蘆巴炒研末每服二錢茴香酒下直指方腎臟虛冷腹脅脹滿葫蘆巴炒二兩熟附子硫黃各七錢五分為末酒煮曲糊丸梧桐子大每鹽湯下三四十丸聖濟總錄冷氣疝瘕葫蘆巴酒浸曬乾蕎麥炒研面各四兩小茴香一兩為末酒糊丸梧子大每服五十丸空心鹽湯或鹽酒下服至兩月大便出白膿則除根方廣心法附余陰㿗腫痛偏墜或小腸疝氣下元虛冷久不愈者沉香內消丸主之沉香木香各半兩葫蘆巴酒浸炒小茴香炒各二兩為末酒糊丸梧子大每服五七十丸鹽酒下氣攻頭痛葫蘆巴炒三稜酒浸焙各半兩乾薑炮二錢半為末薑湯或溫酒每服二錢濟生方寒濕腳氣腿膝疼痛行步無力胡蘆巴酒浸一宿焙破故紙炒香各四兩為末以木瓜切頂去瓤安藥在內令滿用頂合住簽定爛蒸搗丸梧子大每服七十丸空心溫酒下楊氏家藏方蠡實本經中品釋名荔實別錄馬藺子唐本馬楝子圖經馬薤禮記注馬帚爾雅鐵掃帚救荒劇草本經旱蒲禮記豕首本經三堅弘景曰方藥不用俗無識者惟天名精亦名豕首恭曰此即馬藺子也月令仲冬荔挺出鄭玄注云荔馬薤也通俗文云一名馬藺本草謂之荔實頌曰馬藺子北人訛為馬楝子廣雅云馬薤荔也高誘云荔挺出荔草挺出也講禮者不識呼為荔挺又作馬莧並誤矣馬莧亦名豚耳即馬齒也時珍曰爾雅云荓音瓶馬帚也此即荔草謂其可為馬刷故名今河南北人呼為鐵掃帚是矣集解別錄曰蠡實生河東川穀五月採實陰乾頌曰今陝西諸郡及鼎澧州亦有之近汴尤多葉似薤而長厚三月開紫碧花五月結實作角子如麻大而赤色有稜根細長通黃色人取以為刷三月開花五月採實並陰乾用許慎說文云荔似蒲而小根可為刷高誘云河北平澤率生之江東頗多種於階庭但呼為旱蒲不知即馬薤也時珍曰蠡草生荒野中就地叢生一本二三十莖苗高三四尺葉中抽莖開花結實正誤宗奭曰蠡實陶隱居言方藥不用俗無識者本草諸家所注不相應若果是馬藺則日華子本草不當更言可為蔬菜蓋馬藺葉出土已硬又無味馬牛皆不食豈堪人食今不敢以蠡實為馬藺更俟博識時珍曰別錄蠡實亦名荔實則蠡乃荔字之訛也張揖廣雅云荔又名馬藺其說已明又按周定王救荒本草言其嫩苗味苦炸熟換水浸去苦味油鹽調食則馬藺亦可作菜矣寇氏但據陶說疑之欠考矣陶氏不識藥多矣今正其誤實修治時珍曰凡入藥炒過用治疝則以醋拌炒之氣味甘平無毒保升曰寒頌曰山人服之云大溫甚有奇效主治皮膚寒熱胃中熱氣風寒濕痹堅筋骨令人嗜食久服輕身本經止心煩滿利大小便長肌膚肥大別錄療金瘡血內流癰腫有效蘇恭婦人血氣煩悶產後血暈並經脈不止崩中帶下消一切瘡癤止鼻衄吐血通小腸消酒毒治黃病殺蕈毒敷蛇蟲咬大明治小腹疝痛腹內冷積水痢諸病時珍附方舊二新六諸冷極病醫所不治者馬藺子九升洗淨空腹服一合酒下日三服千金方寒疝諸疾寒疝不能食及腹內一切諸疾消食肥肌馬藺子一升每日取一把以面拌煮吞之服盡愈姚僧坦集驗方喉痹腫痛衛生易簡方用蠡實一合升麻五分水一升煎三合入少蜜攪勻細呷大驗聖惠方用馬藺子二升升麻一兩為末蜜丸水服一錢又方馬藺子八錢牛蒡子六錢為末空心溫水服方寸匕水痢百病張文仲備急方用馬藺子以六月六日面熬各等分為末空心米飲服方寸匕如無六月六日面常面亦可牛骨灰亦可又方馬藺子乾薑黃連各等分為散熟湯服二方寸匕入腹即斷也冷熱皆治常用神效不得輕之忌豬肉冷水腸風下血有疙瘩瘡破者不治馬藺子一斤研破酒浸夏三冬七日曬乾何首烏半斤雄黃雌黃各四兩為末以浸藥酒打糊丸梧子大每服三十丸溫酒下日三服見效普濟方花莖及根葉主治去白蟲本經療喉痹多服令人溏泄別錄主癰疽惡瘡時珍發明頌曰蠡草花實皆入藥列仙傳云寇先生宋人好種荔食其葩實是矣時珍曰按葉水東日記云北方田野人患胸腹飽脹者取馬楝花擂涼水服即泄數行而愈據此則多服令人泄之說有驗而蠡實之為馬藺更無疑矣附方舊三新七睡死不寤蠡實根一握杵爛以水絞汁稍稍灌之外臺秘要喉痹口噤馬藺花二兩蔓荊子一兩為末溫水服一錢喉痹腫痛喘息欲死者外臺秘要用馬藺根葉二兩水一升半煮一盞細飲之立瘥聖惠方用根搗汁三合蜜一合慢火熬成徐徐點之日五七度一方單汁飲之口噤者灌下無生者以刷煎汁沙石熱淋馬藺花七枚燒故筆頭二七枚燒粟米一合炒為末每服三錢酒下日二服名通神散小便不通馬藺花炒茴香炒葶藶炒為末每酒服二錢十便良方一切癰疽發背惡瘡用鐵掃帚同松毛牛膝以水煎服乾坤生意面上瘢黶取鐵掃帚地上自落葉並子煎湯頻洗數次自消壽域神方面皰鼻渣馬藺子花杵敷之佳肘後方附錄必似勒拾遺藏器曰辛溫無毒主冷氣胃閉不消食心腹脹滿生崑崙狀似馬藺子惡實別錄中品釋名鼠黏別錄牛蒡別錄大力子綱目蒡翁菜綱目便牽牛綱目蝙蝠刺時珍曰其實狀惡而多刺鉤故名其根葉皆可食人呼為牛菜術人隱之呼為大力也俚人謂之便牽牛河南人呼為夜叉頭頌曰實殼多刺鼠過之則綴惹不可脫故謂之鼠黏子亦如羊負來之比集解別錄曰惡實生魯山平澤恭曰魯山在鄧州東北此草葉大如芋子殼似慄狀實細長如茺蔚子頌曰惡實即牛蒡子也處處有之葉大如芋葉而長實似葡萄核而褐色外殼似慄梂而小如指頭多刺根有極大者作菜茹益人秋後採子入藥時珍曰牛蒡古人種子以肥壤栽之剪苗汋淘為蔬取根煮曝為脯云甚益人今人亦罕食之三月生苗起莖高者三四尺四月開花成叢淡紫色結實如楓梂而小萼上細刺百十攢簇之一梂有子數十顆其根大者如臂長者近尺其色灰黲七月採子十月採根子修治斅曰凡用揀淨以酒拌蒸待有白霜重出以布拭去焙乾搗粉用氣味辛平無毒藏器曰苦元素曰辛溫陽中之陰升也杲曰辛平陽也降也主治明目補中除風傷別錄風毒腫諸瘻藏器研末浸酒每日服三二盞除諸風去丹石毒利腰膝又食前熟挼三枚吞之散諸結節筋骨煩熱毒甄權吞一枚出癰疽頭蘇恭炒研煎飲通利小便孟詵潤肺散氣利咽膈去皮膚風通十二經元素消斑疹毒時珍發明杲曰鼠黏子其用有四治風濕癮疹咽喉風熱散諸腫瘡瘍之毒利凝滯腰膝之氣是也附方舊四新十二風水身腫欲裂鼠黏子二兩炒研為末每溫水服二錢日三服聖惠方風熱浮腫咽喉閉塞牛蒡子一合半生半熟為末熱酒服一寸匕經驗方痰厥頭痛牛蒡子炒旋覆花等分為末臘茶清服一錢日二服聖惠方頭痛連睛鼠黏子石膏等分為末茶清調服醫方摘要咽膈不利疏風壅涎唾多牛蒡子微炒荊芥穗各一兩炙甘草半兩為末食後湯服二錢當緩緩取效寇氏本草衍義懸癰喉痛風熱上摶也惡實炒甘草生等分水煎含咽名啟關散普濟方喉痹腫痛牛蒡子六分馬藺子八分為散每空心溫水服方寸匕日再服仍以牛蒡子三兩鹽二兩研勻炒熱包熨喉外廣濟方咽喉痘疹牛蒡子二錢桔梗一錢半粉甘草節七分水煎服痘疹要訣風熱癮疹牛蒡子炒浮萍等分以薄荷湯服二錢日二服初虞世古今錄驗風齲牙痛鼠黏子炒煎水含冷吐之延年方小兒痘瘡時出不快壯熱狂躁咽膈壅塞大便秘澀小兒咽喉腫胸膈不利若大便利者勿服牛蒡子炒一錢二分荊芥穗二分甘草節四分水一盞同煎至七分溫服已出亦可服名必勝散和劑局方婦人吹乳鼠黏二錢麝香少許溫酒細吞下袖珍方便癰腫痛鼠黏子二錢炒研末入蜜一匙朴硝一匙空心溫酒服袖珍方蛇蠍蠱毒大力子煮汁服衛生易簡方水蠱腹大惡實微炒一兩為末麵糊丸梧子大每米飲下十丸張文仲方歷節腫痛風熱攻手指赤腫麻木甚則攻肩背兩膝遇暑熱則大便秘牛蒡子三兩新豆豉炒羌活各一兩為末每服二錢白湯下本事方根莖氣味苦寒無毒權曰甘平藏器曰根鬚蒸熟曝乾用不爾令人慾吐主治傷寒寒熱汗出中風面腫消渴熱中逐水久服輕身耐老別錄根主牙齒痛勞瘧諸風腳緩弱風毒癰疽咳嗽傷肺肺壅疝瘕冷氣積血蘇恭根浸酒服去風及惡瘡和葉搗碎敷杖瘡金瘡永不畏風藏器主面目煩悶四肢不健通十二經脈洗五臟惡氣可常作菜食令人身輕甄權切根如豆拌麵作飯食消脹壅莖葉煮汁作浴湯去皮間習習如蟲行又入鹽花生搗拓一切腫毒孟詵發明頌曰根作脯食甚良莖葉宜煮汁釀酒服冬月採根蒸曝入藥劉禹錫傳信方療暴中風用緊細牛蒡根取時避風以竹刀或荊刀刮去土生布拭了搗絞取汁一大升和好蜜四大合溫分兩服得汗出便瘥此方得之岳鄂鄭中丞鄭因食熱肉一頓便中暴風外甥盧氏為潁陽令有此方服當時便瘥附方舊五新一十六時氣餘熱不退煩躁發渴四肢無力不能飲食用牛蒡根搗汁服一小盞效聖惠方天行時疾生牛蒡根搗汁五合空腹分為二服服訖取桑葉一把炙黃以水一升煮取五合頓服取汗無葉用枝孫真人食忌熱攻心煩恍惚以牛蒡根搗汁一升食後分為二服食醫心鏡傷寒搐搦汗後覆蓋不密致腰背手足搐搦者牛蒡根散主之牛蒡根十條麻黃牛膝天南星各六錢銼於盆內研細好酒一升同研以新布絞取汁以炭火半秤燒一地坑令赤掃淨傾藥汁入坑內再燒令黑色取出於乳缽內細研每服一錢溫酒下日三服朱肱活人書一切風疾十年二十年者牛蒡根一升生地黃枸杞子牛膝各三升用袋盛藥浸無灰酒三升內每任意飲之外臺秘要方老人中風口目瞤動煩悶不安牛蒡根切一升去皮曬乾杵為面白米四合淘淨和作餔飥豉汁中煮加蔥椒五味空心食之恆服極效壽親養老書老人風濕久痹筋攣骨痛服此壯腎潤皮毛益氣力牛蒡根一升切生地黃一升切大豆二升炒以絹袋盛浸一斗酒中五六日任性空心溫服二三盞日二服集驗方頭面忽腫熱毒風氣內攻或連手足赤腫觸著痛者牛蒡子根一名蝙蝠刺洗淨研爛酒煎成膏絹攤貼腫處仍以熱酒服一二匙腫消痛減斗門方頭風掣痛不可禁者摩膏主之取牛蒡莖葉搗取濃汁二升無灰酒一升鹽花一匙頭煻火煎稠成膏以摩痛處風毒自散摩時須極力令熱乃效冬月用根篋中方頭風白屑牛蒡葉搗汁熬稠塗之至明皂莢水洗去聖惠方喉中熱腫鼠黏根一升水五升煎一升分三服延年方小兒咽腫牛蒡根搗汁細嚥之普濟方熱毒牙痛熱毒風攻頭面齒齦腫痛不可忍牛蒡根一斤搗汁入鹽花一錢銀器中熬成膏每用塗齒齦上重者不過三度瘥聖惠方項下癭疾鼠黏子根一升水三升煮取一升半分三服或為末蜜丸常服之救急方耳卒腫痛牛蒡根切絞汁二升銀鍋內熬膏塗之聖濟總錄小便不通臍腹急痛牛蒡葉汁生地黃汁二合和勻入蜜二合每服一合入水半盞煎三五沸調滑石末一錢服聖濟總錄癤子腫毒鼠黏子葉貼之千金方石瘻出膿堅實寒熱鼠黏子葉為末和雞子白封之外臺秘要諸瘡腫毒牛蒡根三莖洗煮爛搗汁入米煮粥食一碗甚良普濟方積年惡瘡反花瘡漏瘡不瘥者牛蒡根搗和臘月豬脂日日封之千金方月水不通結成症塊腹肋脹大欲死牛蒡根二斤銼蒸三遍以生絹袋盛之以酒二斗浸五日每食前溫服一盞普濟方枲耳本經中品釋名胡枲本經常思弘景蒼耳爾雅卷耳詩經爵耳詩疏豬耳綱目耳璫詩疏地葵本經葹音施羊負來弘景道人頭圖經進賢菜記事珠喝起草綱目野茄綱目縑絲草頌曰詩人謂之卷耳爾雅謂之蒼耳廣雅謂之枲耳皆以實得名也陸璣詩疏云其實正如婦人耳璫今或謂之耳璫草鄭康成謂是白鬍荽幽州人呼為爵耳博物志云洛中有人驅羊入蜀胡枲子多刺黏綴羊毛遂至中土故名羊負來俗呼為道人頭弘景曰傖人皆食之謂之常思菜以葉覆麥作黃衣者方用甚稀時珍曰其葉形如枲麻又如茄故有枲耳及野茄諸名其味滑如葵故名地葵與地膚同名詩人思夫賦卷耳之章故名常思菜張揖廣雅作常枲亦通集解別錄曰枲耳生安陸川穀及六安田野實熟時採頌曰今處處有之陸氏詩疏云其葉青白似胡荽白華細莖蔓生可煮為茹滑而少味四月中生子正如婦人耳璫郭璞云形如鼠耳叢生如盤今之所有皆類此但不作蔓生時珍曰按周定王救荒本草云蒼耳葉青白類黏糊菜葉秋間結實比桑椹短小而多刺嫩苗炸熟水浸淘拌食可救飢其子炒去皮研為面可作燒餅食亦可熬油點燈實修治大明曰入藥炒熟搗去刺用或酒拌蒸過用氣味甘溫有小毒別錄曰苦權曰甘無毒恭曰忌豬肉馬肉米泔害人主治風頭寒痛風濕周痹四肢拘攣痛惡肉死肌膝痛久服益氣耳目聰明強志輕身本經治肝熱明目甄權治一切風氣填髓暖腰腳治瘰癧疥癬及瘙癢大明炒香浸酒服去風補益時珍附方舊三新四久瘧不瘥蒼耳子或根莖亦可焙研末酒糊丸梧子大每酒服三十丸日二服生者搗汁服亦可朱氏集驗方大腹水腫小便不利蒼耳子灰葶藶末等分每服二錢水下日二服千金方風濕攣痹一切風氣蒼耳子三兩炒為末以水一升半煎取七合去滓呷之食醫心鏡牙齒痛腫蒼耳子五升水一斗煮取五升熱含之冷即吐去吐後復含不過一劑瘥莖葉亦可或入鹽少許孫真人千金翼鼻淵流涕蒼耳子即縑絲草子炒研為末每白湯點服一二錢證治要訣眼目昏暗枲耳實一升為末白米半升作粥日食之普濟方嗜酒不已氈中蒼耳子七枚燒灰投酒中飲之即不嗜陳藏器本草莖葉修治斅曰凡採得去心取黃精以竹刀細切拌之蒸從巳至亥時出去黃精陰乾用氣味苦辛微寒有小毒恭曰忌豬肉馬肉米泔伏硇砂主治溪毒別錄中風傷寒頭痛孟詵大風癲癇頭風濕痹毒在骨髓腰膝風毒夏月採曝為末水服一二匕冬月酒服或為丸每服二三十丸日三服滿百日病出如瘑疥或癢汁出或斑駁甲錯皮起皮落則肌如凝脂令人省睡除諸毒螫殺蟲疳濕䘌久服益氣耳目聰明輕身強志蘇恭挼葉安舌下出涎去目黃好睡燒灰和臘豬脂封疔腫出根煮酒服主狂犬咬毒藏器發明時珍曰蒼耳葉久服去風熱有效最忌豬肉及風邪犯之則遍身發出赤丹也按蘇沈良方云枲耳根苗葉實皆洗濯陰乾燒灰湯淋取濃汁泥連二灶煉之灰汁耗即旋取傍釜中熱灰湯益之一日夜不絕火乃旋得霜干瓷瓶收之每日早晚酒服二錢補暖去風駐顏尤治皮膚風令人膚革清淨每澡沐入少許尤佳宜州文學昌從諫服此十餘年至七八十紅潤輕健皆此藥力也斗門方云婦人血風攻腦頭旋悶絕忽死倒地不知人事者用喝起草嫩心陰乾為末以酒服一大錢其功甚效此物善通頂門連腦蓋即蒼耳也附方舊十二新十七萬應膏治一切癰疽發背無頭惡瘡腫毒疔癤一切風癢臁瘡杖瘡牙疼喉痹五月五日採蒼耳根葉數擔洗淨曬萎細銼以大鍋五口入水煮爛以篩濾去粗滓布絹再濾復入淨鍋武火煎滾文火煎稠攪成膏以新罐貯封每以敷貼即愈牙疼即敷牙上喉痹敷舌上或噙化二三次即效每日用酒服一匙極有效集簡方一切風毒並殺三蟲腸痔能進食若病胃脹滿心悶發熱即宜服之五月五日午時附地刈取枲耳葉洗暴燥搗下篩每服方寸匕酒或漿水下日二夜三若覺吐逆則以蜜丸服准計方寸匕數也風輕者日二服若身體作粟或麻豆出此為風毒出也可以針刺潰去黃汁乃止七月七九月九亦可採用千金方一切風氣蒼耳嫩葉一石切和麥蘖五升作塊於蒿艾中罯二十日成曲取米一斗炊作飯看冷暖入曲三升釀之封二七日成熟每空心暖服神驗封此酒可兩重布不得令密密則溢出忌馬肉豬肉孟詵食療本草諸風頭暈蒼耳葉曬乾為末每服一錢酒調下日三服若吐則以蜜丸梧子大每服二十丸十日全好矣楊氏經驗方血風腦暈方見發明下毒攻手足腫痛欲斷蒼耳搗汁漬之並以滓敷之立效春用心冬用子千金翼卒中水毒初覺頭目微痛惡寒骨節強急日醒暮劇手足逆冷三日則蟲蝕下部六七日膿潰食至五臟殺人也搗常思草絞汁服一二升並以綿染導其下部肘後方毒蛇溪毒沙蝨射工等所傷口噤眼黑手足強直毒攻腹內成塊逡巡不救蒼耳嫩苗一握取汁和酒溫灌之以滓厚敷傷處勝金方疫病不染五月五日午時多采蒼耳嫩葉陰乾收之臨時為末冷水服二錢或水煎舉家皆服能辟邪惡千金方風瘙癮疹身癢不止用蒼耳莖葉子等分為末每服二錢豆淋酒調下聖惠方面上黑斑蒼耳葉焙為末食後米飲調服一錢一月愈摘玄方赤白汗斑蒼耳嫩葉尖和青鹽擂爛五六月間擦之五七次效摘玄方大風癘疾袖珍方用嫩蒼耳荷葉等分為末每服二錢溫酒下日二服乾坤生意用蒼耳葉為末以大楓子油和丸梧子大每服三四十丸以茶湯下日二服又方五月五日或六月六日五更帶露採蒼耳草搗取汁熬作錠子取半斤鱧魚一尾剖開不去肚腸入藥一錠線縫以酒二碗慢火煮熟令吃不過三五個魚即愈也忌鹽一百日卒得惡瘡蒼耳桃皮作屑納瘡中百一方反花惡瘡有肉如飯粒破之血出隨生反出用蒼耳葉搗汁服三合並塗之日二上聖濟總錄一切疔腫詵曰危困者用蒼耳根葉搗和小兒尿絞汁冷服一升日三服拔根甚驗養生方用蒼耳根苗燒灰和醋澱塗之干再上不十次即拔根出邵真人方蒼耳根三兩半烏梅肉五個連須蔥三根酒二鍾煎一鍾熱服取汗齒風動痛蒼耳一握以漿水煮入鹽含漱外臺秘要纏喉風病蒼耳根一把老薑一塊研汁入酒服聖濟總錄赤目生瘡作痛道人頭末二兩乳香一錢每用一錢燒煙搐鼻聖濟總錄鼻衄不止蒼耳莖葉搗汁一小盞服聖惠方五痔下血五月五日採蒼耳莖葉為末水服方寸匕甚效千金翼赤白下痢蒼耳草不拘多少洗淨用水煮爛去滓入蜜用武火熬成膏每服一二匙白湯下醫方摘玄產後諸痢蒼耳葉搗絞汁溫服半中盞日三四服聖惠方誤吞銅錢蒼耳頭一把以水一升浸水中十餘度飲水愈肘後方花蜘蛛毒咬人與毒蛇無異用野縑絲即道人頭搗汁一盞服仍以渣敷之摘玄方花主治白癩頑癢時珍天名精本經上品校正時珍曰據蘇沈二說併入唐本鶴蝨開寶地菘別錄有名未用埊松釋名天蔓荊別錄天門精別錄地菘唐本埊松別錄埊與地同玉門精別錄麥句姜本經蟾蜍蘭別錄蛤蟆藍本經蚵蚾草綱目豕首本經彘顱別錄活鹿草異苑劉愐草愐音胡革反皺面草綱目母豬芥綱目實名鶴蝨根名杜牛膝恭曰天名精即活鹿草也別錄一名天蔓荊南人名為地菘葉與蔓荊菘菜相類故有此名其味甘辛故有姜稱狀如藍而蛤蟆好居其下故名蛤蟆藍香氣似蘭故又名蟾蜍蘭時珍曰天名精乃天蔓荊之訛也其氣如豕彘故有豕首彘顱之名昔人謂之活鹿草俗人因其氣臊訛為狐貍臊者是也爾雅云茢薽豕首也郭璞注云江東呼為豨首可以炒蠶蛹食藏器曰郭璞注爾雅蘧麥云即麥句姜者非也陶公注釣樟條云有一草似狼牙氣辛臭名為地菘人呼為劉愐草主金瘡按異苑云宋元嘉中青州劉愐射一獐剖五臟以此草塞之蹶然而起愐怪而拔草便倒如此三度愐因密錄此草種之主折傷愈多人因以名之既有活鹿之名雅與獐事相合陶蘇俱說是地菘定非二物正誤弘景曰天名精即今之豨薟亦名豨首夏月杵汁服之除熱病味至苦而云甘或非是也恭曰豨首苦而臭名精辛而香全不相類也禹錫曰蘇恭云天名精南人名地菘陳藏器本草解紛亦言天名精為地菘開寶本草不當重出地菘條例宜刊削時珍曰按沈括筆談云世人既不識天名精又妄認地菘為火杴本草又出鶴蝨一條都成紛亂不知地菘即天名精其葉似菘又似蔓荊故有二名鶴蝨即其實也又別錄有名未用埊松即此地菘亦系誤出今並正之合而為一集解別錄曰天名精生平原川澤五月採保升曰地菘也小品方名天蔓荊又名天蕪菁葉似山南菘菜夏秋抽條頗似薄荷花紫白色味辛而香志曰地菘所在皆有生人家及路旁陰處高二三寸葉似菘葉而小又曰鶴蝨出波斯者為勝今上黨亦有力勢薄于波斯者恭曰鶴蝨生西戎子似蓬蒿子而細合莖葉用之頌曰天名精江湖間皆有之狀如韓保升所說又曰鶴蝨江淮衡湘皆有之春生苗葉皺似紫蘇大而尖長不光莖高二尺許七月生黃白花似菊八月結實子極尖細干即黃黑色南人呼其葉為火杴按火杴即豨薟雖花實相類而別是一物不可雜用時珍曰天名精嫩苗綠色似皺葉菘芥微有狐氣淘淨炸之亦可食長則起莖開小黃花如小野菊花結實如茼蒿子亦相似最黏人衣狐氣尤甚炒熟則香故諸家皆云辛而香亦巴人食負蠜南人食山柰之意爾其根白色如短牛膝此物最賤而唐本草言鶴蝨出西戎宋本草言出波斯者何哉蓋當時人不知用之惟四戎波斯始知入藥且土產所宜故爾亦苜蓿云出西域而不知中土飼馬者即是也詳見豨薟下葉根同氣味甘寒無毒別錄曰埊松辛無毒時珍曰微辛甘有小毒生汁吐人之才曰垣衣地黃為之使主治瘀血血瘕欲死下血止血利小便久服輕身耐老本經除小蟲去痹除胸中結熱止煩渴逐水大吐下別錄破血生肌止鼻衄殺三蟲除諸毒腫疔瘡瘻痔金瘡內射身癢癮疹不止者揩之立已唐本地菘主金瘡止血解惡蟲蛇螫毒挼以敷之開寶吐痰止瘧治牙痛口緊喉痹時珍埊松主眩痹別錄有名未用發明時珍曰天名精並根苗而言也地菘埊松皆言其苗葉也鶴蝨言其子也其功大抵只是吐痰止血殺蟲解毒故擂汁服之能止痰瘧漱之止牙疼挼之敷蛇咬亦治豬瘟病也按孫天仁集效方云凡男婦乳蛾喉嚨腫痛及小兒急慢驚風牙關緊急不省人事者以鶴蝨草一名皺面草一名母豬芥一名杜牛膝取根洗淨搗爛入好酒絞汁灌之良久即蘇仍以渣敷項下或醋調搽亦妙朱端章集驗方云余被檄任淮西幕府時牙疼大作一刀鑷人以草藥一捻湯泡少時以手蘸湯挹痛處即定因求其方用之治人多效乃皺面地菘草也俗人訛為地蔥沈存中筆談專辯地菘其子名鶴蝨正此物也錢季誠方用鶴蝨一枚擢置齒中高監方以鶴蝨煎米醋漱口或用防風鶴蝨煎水噙漱仍研草塞痛處皆有效也附方舊二新九男女吐血皺面草即地菘曬乾為末每服一二錢以茅花泡湯調服日二次衛生易簡咽喉腫塞傷寒蘊要治痰涎壅滯喉腫水不可下者地菘一名鶴蝨草連根葉搗汁鵝翎掃入去痰最妙聖濟總錄用杜牛膝鼓錘草同搗汁灌之不得下者灌鼻得吐為妙又方杜牛膝春夏用莖秋冬用根一把青礬半兩同研點患處令吐膿血痰沫即愈纏喉風腫蚵蚾草即皺面草細研以生蜜和丸彈子大每噙一二丸即愈乾者為末蜜丸亦可名救生丸經效濟世方諸骨哽咽地菘馬鞭草各一握去根白梅肉一個白礬一錢搗作彈丸綿裹含咽其骨自軟而下也普濟方風毒瘰癧赤腫地菘搗敷干即易之聖惠方疔瘡腫毒鶴蝨草葉浮酒糟同搗敷之立效孫氏集效方發背初起地菘杵汁一升日再服瘥乃止傷寒類要惡瘡腫毒地菘搗汁日服三四次外臺秘要惡蛇咬傷地菘搗敷之易簡方鶴蝨唐本草氣味苦平有小毒大明曰涼無毒主治蛔蟯蟲為散以肥肉臛汁服方寸匕亦入丸散用唐本蟲心痛以淡醋和半匕服立瘥開寶殺五臟蟲止瘧敷惡瘡大明發明頌曰鶴蝨殺蟲方中為最要藥古今錄驗方療蛔咬心痛取鶴蝨十兩搗篩蜜丸梧子大以蜜湯空腹吞四五十丸忌酒肉韋云患心痛十年不瘥於雜方內見合服之便愈李絳兵部手集方治小兒蛔蟲齧心腹痛亦單用鶴蝨研末以肥豬肉汁下之五歲一服二分蟲出即止也附方新一大腸蟲出不斷斷之復生行坐不得鶴蝨末水調半兩服自愈怪疾奇方豨薟音喜杴唐本校正併入唐本豬膏莓釋名希仙綱目火杴草唐本豬膏莓唐本虎膏唐本狗膏唐本黏糊菜救荒時珍曰韻書楚人呼豬為豨呼草之氣味辛毒為薟此草氣臭如豬而味薟螫故謂之豨薟豬膏虎膏狗膏皆因其氣以及治虎狗傷也火杴當作虎薟俗音訛爾近人復訛豨薟為希仙矣救荒本草言其嫩苗炸熟浸去苦味油鹽調食故俗謂之黏糊菜集解恭曰豨薟田野皆識之一名火杴葉似酸漿而狹長花黃白色三月四月採苗葉曝乾又曰豬膏莓生平澤下濕地所在皆有一名虎膏一名狗膏葉似蒼耳莖圓有毛頌曰豨薟處處有之春生苗葉似芥葉而狹長文粗莖高二三尺秋初有花如菊秋末結實頗似鶴蝨夏採葉曝乾用藏器曰豬膏草葉似荏有毛保升曰豬膏葉似蒼耳兩枝相對莖葉俱有毛黃白色五月六月採苗日乾時珍曰按蘇恭唐本草謂豨薟似酸漿豬膏莓似蒼耳列為二種而成納進豨薟丸表言此藥與本草所述相異多生沃壤高三尺許節葉相對張詠豨薟丸表言此草金稜銀線素莖紫荄對節而生蜀號火杴莖葉頗同蒼耳又按沈括筆談云世人妄認地菘為火杴有單服火杴法者乃是地菘不當用火杴火杴乃本草名豬膏莓者後人不識重複出條也按此數說各異而今人風痹多用豨薟丸將何適從耶時珍嘗聚諸草訂視則豬膏草素莖有直稜兼有斑點葉似蒼耳而微長似地菘而稍薄對節而生莖葉皆有細毛肥壤一株分枝數十八九月開小花深黃色中有長子如茼蒿子外萼有細刺黏人地菘則青莖圓而無稜無斑無毛葉皺似菘芥亦不對節觀此則似與成張二氏所說相合今河南陳州採豨薟充方物其狀亦是豬膏草則沈氏謂豨薟即豬膏莓者其說無疑矣蘇恭所謂似酸漿者乃龍葵非豨薟蓋誤認爾但沈氏言世間單服火杴乃是地菘不當用豬膏莓似與成張之說相反今按豨薟豬膏莓條並無治風之說惟本經地菘條有去痹除熱久服輕身耐老之語則治風似當用地菘然成張進御之方必無虛謬之理或者二草皆有治風之功乎而今服豬膏莓之豨薟者復往往有效其地菘不見有服之者則豨薟之為豬膏尤不必疑矣豨薟氣味苦寒有小毒又曰豬膏莓辛苦平無毒藏器曰有小毒蘇恭曰豬膏無毒誤矣主治豨薟治熱䘌煩滿不能食生搗汁三合服多則令人吐又曰豬膏莓主金瘡止痛斷血生肉除諸惡瘡消浮腫搗封之湯漬散敷並良蘇恭主久瘧痰陰搗汁服取吐搗敷虎傷狗咬蜘蛛咬蠶咬蠼螋溺瘡藏器治肝腎風氣四肢麻痹骨痛膝弱風濕諸瘡時珍發明頌曰蜀人單服豨薟法五月五日六月六日九月九日採葉去根莖花實淨洗曝乾入甑中層層灑酒與蜜蒸之又曝如此九過則氣味極香美熬搗篩末蜜丸服之云甚益元氣治肝腎風氣四肢麻痹骨間疼腰膝無力者亦能行大腸氣諸州所說皆云性寒有小毒與唐本同惟文州及高郵軍云性熱無毒服之補益安五臟生毛髮兼主風濕瘡肌肉頑痹婦人久冷尤宜用須去粗莖留枝葉花實蒸曝兩說不同豈單用葉則寒而有毒並枝花實則熱而無毒乎抑土地所產不同而然歟時珍曰生搗汁服則令人吐故云有小毒九蒸九曝則補人去痹故云無毒生則性寒熟則性溫云熱者非也慎微曰按江陵府節度使成訥進豨薟丸方表略云臣有弟欣年三十一中風伏枕五年百醫不瘥有道人鍾針因睹此患曰可餌豨薟丸必愈其草多生沃壤高三尺許節葉相對當夏五月以來收之每去地五寸剪刈以溫水洗去泥土摘葉及枝頭凡九蒸九曝不必太燥但以取足為度仍熬搗為末煉蜜丸如梧子大空心溫酒或米飲下二三十丸服至二千丸所患忽加不得憂慮是藥攻之力服至四千丸必得復故至五千丸當復丁壯臣依法修合令欣服之果如其言服後須吃飯三五匙壓之五月五日採者佳奉敕宣付醫院詳錄又知益州張詠進豨薟丸表略云切以餐石飲水可作充腸之饌餌松含柏亦成救病之功是以療飢者不在於羞珍愈病者何煩於異術倘獲濟時之藥輒陳鄙物之形不恥管窺輒干天聽臣因換龍興觀掘得一碑內說修養氣術並藥方二件依方差人訪問採覓其草頗有異金稜銀線素莖紫荄對節而生蜀號火杴莖葉頗同蒼耳不費登高歷險每常求少獲多急採非難廣收甚易倘勤久服旋見神功誰知至賤之中乃有殊常之效臣自吃至百服眼目清明即至千服髭鬚烏黑筋力輕健效驗多端臣本州有都押衙羅守一曾因中風墜馬失音不語臣與十服其病立瘥又和尚智嚴年七十忽患偏風口眼喎斜時時吐涎臣與十服亦便得痊今合一百劑差職員史元奏進附方新五風寒泄瀉火杴丸治風氣行於腸胃泄瀉火杴草為末醋糊丸梧子大每服三十丸白湯下聖濟總錄癰疽腫毒一切惡瘡豨薟草端午採者一兩乳香一兩白礬燒半兩為末每服二錢熱酒調下毒重者連進三服得汗妙乾坤秘韞發背疔瘡豨薟草五葉草即五爪龍野紅花即小薊大蒜等分擂爛入熱酒一碗絞汁服得汗立效乾坤生意疔瘡腫毒端午採豨薟草日乾為末每服半兩熱酒調下汗出即愈極有效驗集簡方反胃吐食火杴草焙為末蜜丸梧子大每沸湯下五十丸百一選方附錄類鼻別錄有名未用曰味酸溫無毒主痿痹生田中高地葉如天名精美根五月採時珍曰此似豬膏草也古今名謂或不同故附於此羊屎柴時珍曰按乾坤生意云一名牛屎柴生山野中葉類鶴蝨四月開白花其葉主癰疽發背搗敷之冬月用根可以毒魚箬綱目釋名篛與箬同遼葉時珍曰箬若竹而弱故名其生疏遼故又謂之遼集解時珍曰箬生南方平澤其根與莖皆似小竹其節籜與葉皆似蘆荻而葉之面青背淡柔而韌新舊相代四時常青南人取葉作笠及裹茶鹽包米粽女人以襯鞋底葉氣味甘寒無毒主治男女吐血衄血嘔血咯血下血並燒存性溫湯服一錢匕又通小便利肺氣喉痹消癰腫時珍附方新一十二一切眼疾籠篛燒灰淋汁洗之久之自效經驗方咽喉閉痛遼葉燈心草燒灰等分吹之甚妙集簡方耳忽作痛或紅腫內脹將經霜青箬露在外將朽者燒存性為末敷入耳中其疼即止楊起簡便方肺壅鼻衄箬葉燒灰白麵三錢研勻井花水服二錢聖濟總錄經血不止箬葉灰蠶紙灰等分為末每服二錢米飲下聖濟總錄腸風便血茶簍內箬葉燒存性每服三匙空心糯米湯下或入麝香少許璆百一選方男婦血淋亦治五淋多年煮酒瓶頭箬葉三五年至十年者尤佳每用七個燒存性入麝香少許陳米飲下日三服有人患此二服愈福建煮過夏月酒多有之百一選方尿白如注小腹氣痛茶籠內箬葉燒存性入麝香少許米飲下經驗方小便澀滯不通干箬葉一兩燒灰滑石半兩為末每米飲服三錢普濟方男婦轉脬方同上吹奶乳癰五月五日粽箬燒灰酒服二錢即散累效濟急仙方痘瘡倒靨箬葉灰一錢麝香少許酒服張德恭痘疹便覽方蘆別錄下品校正併入拾遺江中採出蘆釋名葦音偉葭音加花名蓬蕽唐本筍名虇音拳時珍曰按毛萇詩疏云葦之初生曰葭未秀曰蘆長成曰葦葦者偉大也蘆者色盧黑也葭者嘉美也集解恭曰蘆根生下濕地莖葉似竹花若荻花名蓬蕽二月八月採根日乾用頌曰今在處有之生下濕陂澤中其狀都似竹而葉抱莖生無枝花白作穗若茅花根亦若竹根而節疏其根取水底味甘辛者其露出及浮水中者並不堪用按郭璞注爾雅云葭即蘆也葦即蘆之成者菼薍似葦而小中實江東呼為烏蓲音丘或謂之藡即荻也至秋堅成即謂之萑音桓蒹似萑而細長高數尺江東謂之蒹其花皆名芀音調其萌皆名虇堪食如竹筍若然則蘆葦通為一物也所謂蒹乃今作簾者是也所謂菼者今以當薪者是也而人罕能別蒹菼與蘆葦也又北人以葦與蘆為二物水旁下濕所生者皆名葦其細不及指大人家池圃所植者皆名蘆其干差大深碧色者謂之碧蘆亦難得然則蘆葦皆可通用矣時珍曰蘆有數種其長丈許中空皮薄色白者葭也蘆也葦也短小於葦而中空皮厚色青蒼者菼也薍也荻也萑也其最短小而中實者蒹也薕也皆以初生已成得名其身皆如竹其葉皆長如箬葉其根入藥性味皆同其未解葉者古謂之紫蘀斅曰蘆根鬚要逆水生並黃泡肥厚者去須節並赤黃皮用根氣味甘寒無毒主治消渴客熱止小便利別錄療反胃嘔逆不下食胃中熱傷寒內熱彌良蘇恭解大熱開胃治噎噦不止甄權寒熱時疾煩悶瀉痢大渴孕婦心熱大明筍氣味小苦冷無毒寧原曰忌巴豆主治膈間客熱止渴利小便解河豚及諸魚蟹毒寧原解諸肉毒時珍發明時珍曰按雷公炮炙論序云益食加觴須煎蘆樸注云用逆水蘆根並厚朴二味等分煎湯服蓋蘆根甘能益胃寒能降火故也附方舊六新六骨蒸肺痿不能食者蘇遊蘆根飲主之蘆根麥門冬地骨皮生薑各十兩橘皮茯苓各五兩水二斗煮八升去滓分五服取汗乃瘥外臺秘要勞復食復欲死並以蘆根煮濃汁飲肘後方嘔噦不止厥逆者蘆根三斤切水煮濃汁頻飲二升必效若以童子小便煮服不過三服愈肘後方五噎吐逆心膈氣滯煩悶不下食蘆根五兩銼以水三大盞煮取二盞去滓溫服金匱玉函方反胃上氣蘆根茅根各二兩水四升煮二升分服千金方霍亂煩悶蘆根三錢麥門冬一錢水煎服千金方霍亂脹痛蘆根一升生薑一升橘皮五兩水八升煎三升分服太平聖惠方食狗肉毒心下堅或腹脹口乾忽發熱妄語蘆根煮汁服梅師方中馬肉毒方同上聖惠鯸鮧魚毒方同上肘後方食蟹中毒方同上千金中藥箭毒方同上千金莖葉氣味甘寒無毒主治霍亂嘔逆肺癰煩熱癰疽燒灰淋汁煎膏蝕惡肉去黑子時珍蘀治金瘡生肉滅瘢徐之才江中採出蘆令夫婦和同用之有法藏器發明時珍曰古方煎藥多用勞水及陳蘆火取其水不強火不盛也蘆中空虛故能入心肺治上焦虛熱附方新七霍亂煩渴腹脹蘆葉一握水煎服又方蘆葉五錢糯米二錢半竹茹一錢水煎入薑汁蜜各半合煎兩沸時時呷之聖惠方吐血不止蘆荻外皮燒灰勿令白為末入蚌粉少許研勻麥門冬湯服一二錢三服可救一人聖惠方肺癰咳嗽煩滿微熱心胸甲錯葦莖湯用葦莖切二升水二斗煮汁五升入桃仁五十枚薏苡仁瓜瓣各半升煮取二升服當吐出膿血而愈張仲景金匱玉函方發背潰爛陳蘆葉為末以蔥椒湯洗淨敷之神效乾坤秘韞癰疽惡肉白炭灰荻灰等分煎膏塗之蝕盡惡肉以生肉膏貼之亦去黑子此藥只可留十日久則不效葛洪肘後方小兒禿瘡以鹽湯洗淨蒲葦灰敷之聖濟總錄蓬蕽氣味甘寒無毒主治霍亂水煮濃汁服大驗蘇恭煮汁服解中魚蟹毒蘇頌燒灰吹鼻止衄血亦入崩中藥時珍附方新二乾霍亂病心腹脹痛蘆蓬茸一把水煮濃汁頓服二升肘後方諸般血病水蘆花紅花槐花白雞冠花茅花等分水二鍾煎一鍾服萬表積善堂方甘蕉別錄下品釋名芭蕉衍義天苴史記注芭苴時珍曰按陸佃埤雅云蕉不落葉一葉舒則一葉焦故謂之焦俗謂乾物為巴巴亦蕉意也稽聖賦云竹布實而根苦蕉舒花而株槁芭苴乃蕉之音轉也蜀人謂之天苴曹叔雅異物志云芭蕉結實其皮赤如火其肉甜如蜜四五枚可飽人而滋味常在牙齒間故名甘蕉集解弘景曰甘蕉本出廣州今江東並有根葉無異惟子不堪食耳恭曰甘蕉出嶺南者子大味甘北間者但有花無實頌曰今二廣閩中川蜀皆有而閩廣者實極甘美可啖他處雖多而作花者亦少近時中州種之甚盛皆芭蕉也其類亦多有子者名甘蕉捲心中抽乾作花初生大萼似倒垂菡萏有十數層層皆作瓣漸大則花出瓣中極繁盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉其花大類象牙故謂之牙蕉其實亦有青黃之別品類亦多最甘美曝乾可寄遠北土得之以為珍果其莖解散如絲閩人以灰湯練治紡績為布謂之蕉葛宗奭曰芭蕉三年以上即有花自心中抽出一莖止一花全如蓮花瓣亦相似但色微黃綠中心無蕊悉是花葉也花頭常下垂每一朵自中夏開直至中秋後方盡凡三葉開則三葉脫落也時珍曰按萬震南州異物志云甘蕉即芭蕉乃草類也望之如樹株大者一圍余葉長丈許廣尺余至二尺其莖虛軟如芋皆重皮相裹根如芋魁青色大者如車轂花著莖末大如酒杯形色如蓮花子各為房實隨花長每花一闔各有六子先後相次子不俱生花不俱落也蕉子凡三種未熟時皆苦澀熟時皆甜而脆味如葡萄可以療飢一種子大如拇指長六七寸銳似羊角兩兩相抱者名羊角蕉剝其皮黃白色味最甘美一種子大如雞卵有類牛乳者名牛乳蕉味微減一種子大如蓮子長四五寸形正方者味最弱也並可蜜藏為果又顧玠海槎錄云海南芭蕉常年開花結實有二種板蕉大而味淡佛手蕉小而味甜通呼為蕉子不似江南者花而不實又范成大虞衡志云南中芭蕉有數種極大者凌冬不凋中抽一干長數尺節節有花花褪葉根有實去皮取肉軟爛如綠柿味極甘冷四季恆實土人以飼小兒云性涼去客熱謂之蕉子又名牛蕉子以梅汁漬曝乾壓扁味甘酸有微霜名芭蕉干一種雞蕉子小於牛蕉亦四季實一種芽蕉子小於雞蕉尤香嫩甘美惟秋初結子一種紅蕉花葉瘦類蘆箬花色正紅如榴花日拆一兩葉其端各有一點鮮綠尤可愛春開至秋盡猶芳俗名美人蕉一種膽瓶蕉根出土處特肥飽狀如膽瓶也又費信星槎勝覽云南番阿魯諸地無米穀惟種芭蕉椰子取實代糧也氣味甘大寒無毒恭曰性冷不益人多食動冷氣主治生食止渴潤肺蒸熟曬裂舂取仁食通血脈填骨髓孟詵生食破血合金瘡解酒毒乾者解肌熱煩渴吳瑞除小兒客熱壓丹石毒時珍根氣味甘大寒無毒恭曰寒頌曰甘蕉芭蕉性相同也主治癰腫結熱別錄搗爛敷腫去熱毒搗汁服治產後血脹悶蘇恭主黃疸孟詵治天行熱狂煩悶消渴患癰毒並金石發動躁熱口乾並絞汁服之又治頭風遊風大明附方舊四新六發背欲死芭蕉根搗爛塗之肘後方一切腫毒方同上赤遊風疹方同上風熱頭痛方同上風蟲牙痛芭蕉自然汁一碗煎熱含嗽普濟方天行熱狂芭蕉根搗汁飲之日華子本草消渴飲水骨節煩熱用生芭蕉根搗汁時飲一二合聖惠方血淋澀痛芭蕉根旱蓮草各等分水煎服日二聖惠方產後血脹搗芭蕉根絞汁溫服二三合瘡口不合芭蕉根取汁抹之良直指方蕉油以竹筒插入皮中取出瓶盛之氣味甘冷無毒主治頭風熱止煩渴及湯火傷梳頭止女人發落令長而黑大明暗風癇病涎作暈悶欲倒者飲之取吐極有奇效蘇頌附方新一小兒截驚以芭蕉汁薄荷汁煎勻塗頭頂留囟門塗四肢留手足心勿塗甚效鄧筆峰雜興葉主治腫毒初發研末和生薑汁塗之時珍聖惠方附方新一岐毒初起芭蕉葉熨斗內燒存性入輕粉麻油調塗一日三上或消或破皆無痕也仁齋直指方花主治心痹痛燒存性研鹽湯點服二錢日華蘘荷別錄中品校正自菜部移入此併入有名未用蘘草為一釋名覆菹別錄蘘草別錄猼苴音博葍苴說文嘉草弘景曰本草白蘘荷而今人呼赤者為蘘荷白者為覆菹蓋食以赤者為勝入藥以白者為良葉同一種爾時珍曰覆菹許氏說文作葍苴司馬相如上林賦作猼且與芭蕉音相近離騷大招云醢豚若狗膾苴蒪王逸注云苴蒪音博蘘荷也見本草而今之本草無之則脫漏亦多矣集解別錄曰蘘草生淮南山谷頌曰蘘荷荊襄江湖間多種之北地亦有春初生葉似甘蕉根似姜芽而肥其葉冬枯根堪為菹其性好陰在木下生者尤美潘岳閒居賦云蘘荷依陰時藿向陽是也宗懍荊楚歲時記云仲冬以鹽藏蘘荷用備冬儲又以防蟲史游急就篇云蘘荷冬日藏其來遠矣然有赤白二種白者入藥赤者堪啖及作梅果多用之宗奭曰蘘荷八九月間醃貯以備冬月作蔬果治病止用白者時珍曰蘇頌圖經言荊襄江湖多種今訪之無復識者惟楊慎丹鉛錄云急就章注蘘荷即今甘露考之本草形性相同甘露即芭蕉也崔豹古今注云蘘荷似芭蕉而白色其子花生根中花未敗時可食久則消爛矣根似姜宜陰翳地依蔭而生又按王旻山居錄云蘘荷宜樹陰下二月種之一種永生不須鋤耘但加糞耳八月初踏其苗令死則根滋茂九月初取其傍生根為菹亦可醬藏十月中以糠覆其根下則過冬不凍死也修治斅曰凡使勿用革牛草真相似其革牛草腥澀凡使白蘘荷以銅刀刮去粗皮一重細切入砂盆中研如膏取自然汁煉作煎新器攤冷如干膠狀刮取用之根氣味辛溫有小毒思邈曰辛微溫澀無毒主治中蠱及瘧搗汁服別錄溪毒沙蝨蛇毒弘景諸惡瘡根心主稻麥芒入目中不出以汁注目即出蘇恭赤眼澀痛搗汁點之時珍蘘草氣味苦甘寒無毒大明曰平主治溫瘧寒熱酸嘶邪氣闢不祥別錄發明弘景曰中蠱者服蘘荷汁並臥其葉即呼蠱主姓名多食損藥力又不利腳人家種之亦云闢蛇頌曰按干寶搜神記云外姊夫蔣士先得疾下血言中蠱其家密以蘘荷置於席下忽大笑曰蠱我者張小小也乃收小小小小亡走自此解蠱藥多用之往往驗也周禮庶氏以嘉草除蠱毒宗懍謂嘉草即蘘荷是也陳藏器云蘘荷茜根為主蠱之最謂此時珍曰別錄菜部蘘荷謂根也草部蘘草謂葉也其主治亦頗相近今併為一云附方舊八新一卒中蠱毒下血如雞肝晝夜不絕臟腑敗壞待死者以蘘荷葉密置病人席下勿令知之必自呼蠱主姓名也梅師方喉中似物吞吐不出腹脹羸瘦取白蘘荷根搗汁服蠱立出也梅師方喉舌瘡爛酒漬蘘荷根半日含漱其汁瘥乃止外臺秘要方吐血痔血向東蘘荷根一把搗汁三升服之肘後方婦人腰痛方同上月信澀滯蘘荷根細切水煎取二升空心入酒和服經驗方風冷失聲咽喉不利蘘荷根二兩搗絞汁入酒一大盞和勻細細服取瘥肘後方傷寒時氣溫病初得頭痛壯熱脈盛者用生蘘荷根葉合搗絞汁服三四升肘後雜物入目白蘘荷根取心搗絞取汁滴入目中立出普濟方麻黃本經中品釋名龍沙本經卑相別錄卑鹽別錄時珍曰諸名殊不可解或云其味麻其色黃未審然否張揖廣雅云龍沙麻黃也狗骨麻黃根也不知何以分別如此集解別錄曰麻黃生晉地及河東立秋採莖陰乾令青弘景曰今出青州彭城滎陽中牟者為勝色青而多沫蜀中亦有不好恭曰鄭州鹿臺及關中沙苑河旁沙洲上最多同州沙苑既多其青徐者亦不復用禹錫曰按段成式酉陽雜俎云麻黃莖頭開花花小而黃叢生子如覆盆子可食頌曰今近汴京多有之以滎陽中牟者為勝春生苗至夏五月則長及一尺以來梢上有黃花結實如百合瓣而小又似皂莢子味甜微有麻黃氣外皮紅里仁子黑根紫赤色俗說有雌雄二種雌者於三月四月內開花六月結子雄者無花不結子至立秋後收莖陰乾時珍曰其根皮色黃赤長者近尺莖修治弘景曰用之折去節根水煮十餘沸以竹片掠去上沫沫令人煩根節能止汗故也氣味苦溫無毒別錄曰微溫普曰神農雷公苦無毒扁鵲酸李當之平權曰甘平元素曰性溫味苦而甘辛氣味俱薄輕清而浮陽也升也手太陰之藥入足太陽經兼走手少陰陽明時珍曰麻黃微苦而辛性熱而輕揚僧繼洪云中牟有麻黃之地冬不積雪為泄內陽也故過用則泄真氣觀此則性熱可知矣服麻黃自汗不止者以冷水浸頭髮仍用撲法即止凡服麻黃藥須避風一日不爾病復作也凡用須佐以黃芩則無赤眼之患之才曰厚朴白薇為之使惡辛夷石葦主治中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚本經五臟邪氣緩急風脅痛字乳余疾止好唾通腠理解肌泄邪惡氣消赤黑斑毒不可多服令人虛別錄治身上毒風𤺋痹皮肉不仁主壯熱溫疫山嵐瘴氣甄權通九竅調血脈開毛孔皮膚大明去營中寒邪泄衛中風熱元素散赤目腫痛水腫風腫產後血滯時珍發明弘景曰麻黃療傷寒解肌第一藥頌曰張仲景治傷寒有麻黃湯及葛根湯大小青龍湯皆用麻黃治肺痿上氣有射干麻黃湯厚朴麻黃湯皆大方也杲曰輕可去實麻黃葛根之屬是也六淫有餘之邪客於陽分皮毛之間腠理閉拒營衛氣血不行故謂之實二藥輕清成象故可去之麻黃微苦其形中空陰中之陽入足太陽寒水之經其經循背下行本寒而又受外寒故宜發汗去皮毛氣分寒邪以泄表實若過發則汗多亡陽或飲食勞倦及雜病自汗表虛之證用之則脫人元氣不可不禁好古曰麻黃治衛實之藥桂枝治衛虛之藥二物雖為太陽證藥其實營衛藥也心主營為血肺主衛為氣故麻黃為手太陰肺之劑桂枝為手少陰心之劑傷寒傷風而咳嗽用麻黃桂枝即湯液之源也時珍曰麻黃乃肺經專藥故治肺病多用之張仲景治傷寒無汗用麻黃有汗用桂枝歷代明醫解釋皆隨文傅會未有究其精微者時珍常繹思之似有一得與昔人所解不同云津液為汗汗即血也在營則為血在衛則為汗夫寒傷營營血內澀不能外通於衛衛氣閉固津液不行故無汗發熱而憎寒夫風傷衛衛氣外泄不能內護於營營氣虛弱津液不固故有汗發熱而惡風然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身天之象也是證雖屬乎太陽而肺實受邪氣其證時兼面赤怫鬱咳嗽有痰喘而胸滿諸證者非肺病乎蓋皮毛外閉則邪熱內攻而肺氣膹郁故用麻黃甘草同桂枝引出營分之邪達之肌表佐以杏仁泄肺而利氣汗後無大熱而喘者加以石膏朱肱活人書夏至後加石膏知母皆是泄肺火之藥是則麻黃湯雖太陽發汗重劑實為發散肺經火鬱之藥也腠理不密則津液外泄而肺氣自虛虛則補其母故用桂枝同甘草外散風邪以救表內伐肝木以防脾佐以芍藥泄木而固脾泄東所以補西也使以薑棗行脾之津液而和營衛也下後微喘者加厚朴杏仁以利肺氣也汗後脈沉遲者加人參以益肺氣也朱肱加黃芩為陽旦湯以瀉肺熱也皆是脾肺之藥是則桂枝雖太陽解肌輕劑實為理脾救肺之藥也此千古未發之秘旨愚因表而出之又少陰病發熱脈沉有麻黃附子細辛湯麻黃附子甘草湯少陰與太陽為表裡乃趙嗣真所謂熟附配麻黃補中有發也一錦衣夏月飲酒達旦病水泄數日不止水穀直出服分利消導升提諸藥則反劇時珍診之脈浮而緩大腸下弩復發痔血此因肉食生冷茶水過雜抑遏陽氣在下木盛土衰素問所謂久風成飧泄也法當升之揚之遂以小續命湯投之一服而愈昔仲景治傷寒六七日大下後脈沉遲手足厥逆咽喉不利唾膿血泄利不止者用麻黃湯平其肝肺兼升發之即斯理也神而明之此類是矣附方舊五新七天行熱病初起一二日者麻黃一大兩去節以水四升煮去沫取二升去滓著米一匙及豉為稀粥先以湯浴後乃食粥厚覆取汗即愈孟詵必效方傷寒雪煎麻黃十斤去節杏仁四升去皮熬大黃一斤十三兩先以雪水五石四斗漬麻黃於東向灶釜中三宿後納大黃攪勻桑薪煮至二石去滓納杏仁同煮至六七斗絞去滓置銅器中更以雪水三斗合煎令得二斗四升藥成丸如彈子大有病者以沸白湯五合研一丸服之立汗出不愈再服一丸封藥勿令泄氣千金方傷寒黃疸表熱者麻黃醇酒湯主之麻黃一把去節綿裹美酒五升煮取半升頓服取小汗春月用水煮千金方里水黃腫張仲景云一身面目黃腫其脈沉小便不利甘草麻黃湯主之麻黃四兩水五升煮去沫入甘草二兩煮取三升每服一升重覆汗出不汗再服慎風寒千金云有患氣虛久不瘥變成水病從腰以上腫者宜此發其汗水腫脈沉屬少陰其脈浮者為風虛脹者為氣皆非水也麻黃附子湯汗之麻黃三兩水七升煮去沫入甘草二兩附子炮一枚煮取二升半每服八分日三服取汗張仲景金匱要略風痹冷痛麻黃去根五兩桂心二兩為末酒二升慢火熬如餳每服一匙熱酒調下至汗出為度避風聖惠方小兒慢脾風因吐泄後而成麻黃長五寸十個去節白朮指面大二塊全蠍二個生薄荷葉包煨為末二歲以下一字三歲以上半錢薄荷湯下聖惠方屍咽痛痹語聲不出麻黃以青布裹燒煙筒中熏之聖惠方產後腹痛及血下不盡麻黃去節為末酒服方寸匕一日二三服血下盡即止子母秘錄心下悸病半夏麻黃丸用半夏麻黃等分末之煉蜜丸小豆大每飲服三丸日三服金匱要略痘瘡倒黶寇宗奭曰鄭州麻黃去節半兩以蜜一匙同炒良久以水半升煎數沸去沫再煎去三分之一去滓乘熱服之避風其瘡復出也一法用無灰酒煎其效更速仙源縣筆工李用之子病斑瘡風寒倒黶已困用此一服便出如神中風諸病麻黃一秤去根以王相日乙卯日取東流水三石三斗以淨鐺盛五七斗先煮五沸掠去沫逐旋添水盡至三五斗漉去麻黃澄定濾去滓取清再熬至一斗再澄再濾取汁再熬至升半為度密封收之一二年不妨每服一二匙熱湯化下取汗熬時要勤攪勿令著底恐焦了仍忌雞犬陰人見之此劉守真秘方也宣明方根節氣味甘平無毒主治止汗夏月雜粉撲之弘景發明權曰麻黃根節止汗以故竹扇杵末同撲之又牡蠣粉粟粉並麻黃根等分為末生絹袋盛貯盜汗出即撲手摩之時珍曰麻黃髮汗之氣駛不能御而根節止汗效如影響物理之妙不可測度如此自汗有風濕傷風風溫氣虛血虛脾虛陰虛胃熱痰飲中暑亡陽柔痓諸證皆可隨證加而用之當歸六黃湯加麻黃根治盜汗尤捷蓋其性能行周身肌表故能引諸藥外至衛分而固腠理也本草但知撲之之法而不知服餌之功尤良也附方新入盜汗陰汗麻黃根牡蠣粉為末撲之盜汁不止麻黃根椒目等分為末每服一錢無灰酒下外以麻黃根故蒲扇為末撲之奇效良方小兒盜汗麻黃根三分故蒲扇灰一分為末以乳服三分日三服仍以乾薑三分同為末三分撲之古今錄驗諸虛自汗夜臥即甚久則枯瘦黃耆麻黃根各一兩牡蠣米泔浸洗煅過為散每服五錢水二盞小麥百粒煎服和濟局方虛汗無度麻黃根黃耆等分為末飛麵糊作丸梧子大每用浮麥湯下百丸以止為度談野翁試驗方產後虛汗黃耆當歸各一兩麻黃根二兩每服一兩煎湯下陰囊濕瘡腎有勞熱麻黃根石硫黃各一兩米粉一合為末敷之千金方內外障翳麻黃根一兩當歸身一錢同炒黑色入麝香少許為末搐鼻頻用此南京相國寺東黑孩兒方也普濟附錄云花草時珍曰按葛洪肘後方治馬疥有云花草云狀如麻黃而中堅實也木賊宋嘉祐釋名時珍曰此草有節面糙澀治木骨者用之磋擦則光淨猶云木之賊也集解禹錫曰木賊出秦隴華成諸郡近水地苗長尺許叢生每根一干無花葉寸寸有節色青凌冬不凋四月採之頌曰所在近水地有之採無時今用甚多時珍曰叢叢直上長者二三尺狀似鳧茈苗及粽心草而中空有節又似麻黃莖而稍粗無枝葉莖氣味甘微苦無毒時珍曰溫主治目疾退翳膜消積塊益肝膽療腸風止痢及婦人月水不斷崩中赤白嘉祐解肌止淚止血去風濕疝痛大腸脫肛時珍發明禹錫曰木賊得牛角䚡麝香治休息久痢得禹餘糧當歸芎藭治崩中赤白得槐蛾桑耳治腸風下血得槐子枳實治痔疾出血震亨曰木賊去節烘過發汗至易本草不曾言及時珍曰木賊氣溫味微甘苦中空而輕陽中之陰升也浮也與麻黃同形同性故亦能發汗解肌升散火鬱風濕治眼目諸血疾也附方舊三新九目昏多淚木賊去節蒼朮泔浸各一兩為末每服二錢茶調下或蜜丸亦可急喉痹塞木賊以牛糞火燒存性每冷水服一錢血出即安也聖惠方舌硬出血木賊煎水漱之即止聖惠方血痢不止木賊五錢水煎溫服一日一服聖惠方瀉血不止方同上日二服廣利方腸痔下血多年不止用木賊枳殼各二兩乾薑一兩大黃二錢半並於銚內炒黑存性為末每粟米飲服二錢甚效也蘇頌圖經本草大腸脫肛木賊燒存性為末摻之按入即止一加龍骨三因方婦人血崩血氣痛不可忍遠年近日不瘥者雷氏木賊散主之木賊一兩香附子一兩朴硝半兩為末每服三錢色黑者酒一盞煎紅赤者水一盞煎和滓服日二服臍下痛者加乳香沒藥當歸各一錢同煎忌生冷硬物豬魚油膩酒面醫壘元戎月水不斷木賊炒三錢水一盞煎七分溫服日一服聖惠方胎動不安木賊去節川芎等分為末每服三錢水一盞入金銀一錢煎服聖濟總錄小腸疝氣木賊細銼微炒為末沸湯點服二錢緩服取效一方用熱酒下寇氏本草衍義誤吞銅錢木賊為末雞子白調服一錢聖惠方附錄問荊藏器曰味苦平無毒主結氣瘤痛上氣氣急煮汁服之生伊洛洲渚間苗如木賊節節相接一名接續草石龍芻本經上品釋名龍鬚本經龍修山海經龍華別錄龍珠本經懸莞別錄草續斷本經縉雲草綱目方賓別錄西王母簪時珍曰刈草包束曰芻此草生水石之處可以刈束養馬故謂之龍芻述異記周穆王東海島中養八駿處有草名龍芻是矣故古語云一束龍芻化為龍駒亦孟子芻豢之義龍鬚王母簪因形也縉雲縣名屬今處州仙都山產此草因以名之崔豹古今注云世言黃帝乘龍上天群臣攀龍鬚墜地生草名曰龍鬚者謬也江東以草織蓆名西王母席亦豈西王母騎虎而墮其須乎集解別錄曰石龍芻生梁州山谷濕地五月七月採莖曝乾以九節多珠者良弘景曰莖青細相連實赤今出近道水石處似東陽龍鬚以作席者但多節爾藏器曰今出汾州沁州石州亦處處有之保升曰叢生莖如綖所在有之俗名龍鬚草可為席八月九月採根曝乾時珍曰龍鬚叢生狀如粽心草及鳧茈苗直上夏月莖端開小穗花結細實並無枝葉今吳人多栽蒔織蓆他處自生者不多也本經明言龍芻一名龍鬚而陶弘景言龍芻似龍鬚但多節似以為二物者非矣莖氣味苦微寒無毒別錄曰微溫主治心腹邪氣小便不利淋閉風濕鬼疰惡毒久服補虛羸輕身耳目聰明延年本經補內虛不足痞滿身無潤澤出汗除莖中熱痛療蛔蟲及不消食別錄敗席主治淋及小便卒不通彌敗有垢者方尺煮汁服之藏器龍常草別錄有名未用釋名粽心草時珍曰俚俗五月採系角黍之心呼為粽心草是也集解別錄曰生河水旁狀如龍芻冬夏生時珍曰按爾雅云𦸣鼠莞也鄭樵解為龍芻郭璞云纖細似龍鬚可為席蜀中出者好恐即此龍常也蓋是龍鬚之小者爾故其功用亦相近云莖氣味咸溫無毒主治輕身益陰氣療痹寒濕別錄燈心草宋開寶釋名虎鬚草綱目碧玉草綱目集解志曰燈心草生江南澤地叢生莖圓細而長直人將為席宗奭曰陝西亦有之蒸熟待乾折取中心白穰燃燈者是謂熟草又有不蒸者但生干剝取為生草入藥宜用生草時珍曰此即龍鬚之類但龍鬚緊小而瓤實此草稍粗而瓤虛白吳人栽蒔之取瓤為燈炷以草織蓆及蓑他處野生者不多外丹家以之伏硫砂雷公炮炙論序云硇遇赤須永留金鼎注云赤須亦呼虎鬚草煮硇能住火不知即此虎鬚否也莖及根修治時珍曰燈心難研以粳米粉漿染過曬乾研末入水澄之浮者是燈心也曬乾用氣味甘寒無毒元素曰辛甘陽也吳綬曰淡平主治五淋生煮服之敗席煮服更良開寶瀉肺治陰竅澀不利行水除水腫癃閉元素治急喉痹燒灰吹之甚捷燒灰塗乳上飼小兒止夜啼震亨降心火止血通氣散腫止渴燒灰入輕粉麝香治陰疳時珍附方舊一新九破傷出血燈心草嚼爛敷之立止勝金方衄血不止燈心一兩為末入丹砂一錢米飲每服二錢聖濟總錄喉風痹塞瑞竹堂方用燈心一握陰陽瓦燒存性又炒鹽一匙每吹一捻數次立愈一方用燈心灰二錢蓬砂末一錢吹之一方燈心箬葉燒灰等分吹之惠濟方用燈心草紅花燒灰酒服一錢即消痘瘡煩喘小便不利者燈心一把鱉甲二兩水一升半煎六合分二服龐安常傷寒論夜不合眼難睡燈草煎湯代茶飲即得睡集簡方通利水道白飛霞自制天一丸用燈心十斤米粉漿染曬乾研末入水澄去粉取浮者曬乾二兩五錢赤白茯苓去皮共五兩滑石水飛五兩豬苓二兩澤瀉三兩人參一斤切片熬膏和藥丸如龍眼大硃砂為衣每用一丸任病換引大段小兒生理向上本天一生水之妙諸病以水道通利為捷徑也韓氏醫通濕熱黃疸燈草根四兩酒水各半入瓶內煮半日露一夜溫服集玄方
