body:
  text: 草部第十六卷草之五隰草類下七十三種地黃本經上品釋名芐音戶芑音起地髓本經大明曰生者以水浸驗之浮者名天黃半浮半沉者名人黃沉者名地黃入藥沉者為佳半沉者次之浮者不堪時珍曰爾雅云芐地黃郭璞云江東呼為芐羅願云芐以沉下者為貴故字從下集解別錄曰地黃生咸陽川澤黃土地者佳二月八月採根陰乾弘景曰咸陽即長安也生渭城者乃有子實如小麥今以彭城乾地黃最好次歷陽近用江寧板橋者為勝作乾者有法搗汁和蒸殊用工意而此云陰乾恐以蒸作為失乎人亦以牛膝葳蕤作之人不能別頌曰今處處有之以同州者為上二月生葉布地便出似車前葉上有皺紋而不光高者及尺余低者三四寸其花似油麻花而紅紫色亦有黃花者其實作房如連翹中子甚細而沙褐色根如人手指通黃色粗細長短不常種之甚易根入土即生一說古稱種地黃宜黃土今不然大宜肥壤虛地則根大而多汁其法以葦蓆圍編如車輪徑丈餘以壤土實葦蓆中為壇壇上又以葦蓆實土為一級比下壇徑減一尺如此數級如浮屠乃以地黃根節多者寸斷之蒔壇上層層令滿逐日水灌令茂盛至春秋分時自上層取之根皆長大而不斷折不被斸傷故也得根曝乾出同州者光潤甘美宗奭曰地黃葉如甘露子花如脂麻花但有細斑點北人謂之牛奶子花莖有微細短白毛時珍曰今人惟以懷慶地黃為上亦各處隨時興廢不同爾其苗初生塌地葉如山白菜而毛澀葉面深青色又似小芥葉而頗厚不叉丫葉中攛莖上有細毛莖梢開小筒子花紅黃色結實如小麥粒根長四五寸細如手指皮赤黃色如羊蹄根及胡蘿蔔根曝乾乃黑生食作土氣俗呼其苗為婆婆奶古人種子今惟種根王旻山居錄云地黃嫩苗摘其旁葉作菜甚益人本草以二月八月採根殊未窮物性八月殘葉猶在葉中精氣未盡歸根二月新苗已生根中精氣已滋於葉不如正月九月採者殊好又與蒸曝相宜禮記云羊芐豕薇則自古已食之矣嘉謨曰江浙壤地種者受南方陽氣質雖光潤而力微懷慶山產者稟北方純陰皮有疙瘩而力大乾地黃修治藏器曰乾地黃本經不言生干及蒸乾方家所用二物各別蒸乾即溫補生干即平宣當依此法用時珍曰本經所謂乾地黃者即生地黃之乾者也其法取地黃一百斤擇肥者六十斤洗淨曬令微皺以揀下者洗淨木臼中搗絞汁盡投酒更搗取汁拌前地黃日中曬乾或火焙乾用氣味甘寒無毒別錄曰苦權曰甘平好古曰甘苦寒氣薄味厚沉而降陰也入手足少陰厥陰及手太陽之經酒浸上行外行日乾者平火乾者溫功用相同元素曰生地黃大寒胃弱者斟酌用之恐損胃氣之才曰得清酒麥門冬良惡貝母畏蕪荑權曰忌蔥蒜蘿蔔諸血令人營衛澀鬚髮白斅曰忌銅鐵器令人腎消併發白男損營女損衛時珍曰薑汁浸則不泥膈酒製則不妨胃鮮用則寒乾用則涼主治傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹療折跌絕筋久服輕身不老生者尤良本經主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絕補五臟內傷不足通血脈益氣力利耳目別錄助心膽氣強筋骨長志安魂定魄治驚悸勞劣心肺損吐血鼻衄婦人崩中血暈大明產後腹痛久服變白延年甄權涼血生血補腎水真陰除皮膚燥去諸濕熱元素主心病掌中熱痛脾氣痿蹶嗜臥足下熱而痛好古治齒痛唾血生地黃氣味大寒主治婦人崩中血不止及產後血上薄心悶絕傷身胎動下血胎不落墮墜踠折瘀血留血鼻衄吐血皆搗飲之別錄解諸熱通月水利水道搗貼心腹能消瘀血甄權發明好古曰生地黃入手少陰又為手太陽之劑故錢仲陽瀉丙火與木通同用以導赤也諸經之血熱與他藥相隨亦能治之溺血便血皆同權曰病人虛而多熱者宜加用之戴原禮曰陰微陽盛相火熾強來乘陰位日漸煎熬為虛火之證者宜地黃之屬以滋陰退陽宗奭曰本經只言干生二種不言熟者如血虛勞熱產後虛熱老人中虛燥熱者若與生干當慮太寒故後世改用蒸曝熟者生熟之功殊別不可不詳時珍曰本經所謂乾地黃者乃陰乾日乾火乾者故又云生者尤良別錄復云生地黃者乃新掘鮮者故其性大寒其熟地黃乃後人復蒸曬者諸家本草皆指乾地黃為熟地黃雖主治證同而涼血補血之功稍異故今別出熟地黃一條於下熟地黃修治頌曰作熟地黃法取肥地黃三二十斤淨洗別以揀下瘦短者三二十斤搗絞取汁投石器中浸漉令浹甑上浸三四過時時浸濾轉蒸訖又曝使汁盡其地黃當光黑如漆味甘如飴須瓷器收之以其脂柔喜潤也斅曰採生地黃去皮瓷鍋上柳木甑蒸之攤令氣歇拌酒再蒸又出令乾勿犯銅鐵器令人腎消併發白男損營女損衛也時珍曰近時造法揀取沉水肥大者以好酒入縮砂仁末在內拌勻柳木甑於瓦鍋內蒸令氣透晾乾再以砂仁酒拌蒸晾如此九蒸九晾乃止蓋地黃性泥得砂仁之香而竄合和五臟沖和之氣歸宿丹田故也今市中惟以酒煮熟售者不可用氣味甘微苦微溫無毒元素曰甘微苦寒假酒力灑蒸則微溫而大補味厚氣薄陰中之陽沉也入手足少陰厥陰之經治外治上須酒製忌蘿蔔蔥蒜諸血得牡丹皮當歸和血生血涼血滋陰補髓主治填骨髓長肌肉生精血補五臟內傷不足通血脈利耳目黑鬚發男子五勞七傷女子傷中胞漏經候不調胎產百病時珍補血氣滋腎水益真陰去臍腹急痛病後脛股痠痛元素坐而欲起目䀮䀮無所見好古發明元素曰地黃生則大寒而涼血血熱者須用之熟則微溫而補腎血衰者須用之又臍下痛屬腎經非熟地黃不能除乃通腎之藥也好古曰生地黃治心熱手足心熱入手足少陰厥陰能益腎水涼心血其脈洪實者宜之若脈虛者則宜熟地黃假火力蒸九數故能補腎中元氣仲景八味丸以之為諸藥之首天一所生之源也湯液四物湯治藏血之臟以之為君者癸乙同歸一治也時珍曰按王碩易簡方云男子多陰虛宜用熟地黃女子多血熱宜用生地黃又云生地黃能生精血天門冬引入所生之處熟地黃能補精血用麥門冬引入所補之處虞搏醫學正傳云生地黃生血而胃氣弱者服之恐妨食熟地黃補血而痰飲多者服之恐泥膈或云生地黃酒炒則不妨胃熟地黃薑汁炒則不泥膈此皆得用地黃之精微者也頌曰崔元亮海上方治一切心痛無問新久以生地黃一味隨人所食多少搗絞取汁搜面作餔飥或冷淘食良久當利出蟲長一尺許頭似壁宮後不復患矣昔有人患此病二年深以為恨臨終戒其家人吾死後當剖去病本從其言果得蟲置於竹節中每所食皆飼之因食地黃餔飥亦與之隨即壞爛由此得方劉禹錫傳信方亦紀其事云貞元十年通事舍人崔抗女患心痛垂絕遂作地黃冷淘食便吐一物可方寸匕狀如蛤蟆無足目似有口遂愈冷淘勿著鹽附方舊十二新五十三服食法地黃根淨洗搗絞汁煎令稠入白蜜更煎令可丸丸如梧子大每晨溫酒送下三十丸日三服亦可以青州棗和丸或別以乾地黃末入膏丸服亦可百日面如桃花三年身輕不老抱朴子云楚文子服地黃八年夜視有光神仙方地黃煎補虛除熱治吐血唾血取乳石去癰癤等疾生地黃不拘多少三搗三壓取汁令盡以瓦器盛之密蓋勿泄氣湯上煮減半絞去滓再煎如餳丸彈子大每溫酒服一丸日二服千金地髓煎生地黃十斤洗淨搗壓取汁鹿角膠一斤半生薑半斤絞取汁蜜二升酒四升文武火煮地黃汁數沸即以酒研紫蘇子四兩取汁入煎一二十沸下膠膠化下薑汁蜜再煎候稠瓦器盛之每空心酒化一匕服大補益同上地黃粥大能利血生精地黃切二合與米同入罐中煮之候熟以酥二合蜜一合同炒香入內再煮熟食臛仙神隱地黃酒見谷部酒下瓊玉膏常服開心益智發白返黑齒落更生辟穀延年治癰疽勞瘵咳嗽唾血等病乃鐵甕城申先生方也生地黃汁十六斤取汁人參末一斤半白茯苓末三斤白沙蜜十斤濾淨拌勻入瓶內箬封安砂鍋中桑柴火煮三日夜再換蠟紙重封浸井底一夜取起再煮一伏時每以白湯或酒點服一匙丹溪云好色虛人咳嗽唾血者服之甚捷國朝太醫院進御服食議加天門冬麥門冬枸杞子末各一斤賜名益壽永真臛仙方加琥珀沉香半兩明目補腎生芐熟芐各二兩川椒紅一兩為末蜜丸梧桐子大每空心鹽湯下三十丸普濟方固齒烏須一治齒痛二生津液三變白鬚其功極妙地黃五斤柳木甑內以土蓋上蒸熟曬乾如此三次搗為小餅每噙咽一枚御藥院方男女虛損或大病後或積勞後四體沉滯骨肉痠痛吸吸少氣或小腹拘急腰背強痛咽乾唇燥或飲食無味多臥少起久者積年輕者百日漸至瘦削用生地黃二斤面一斤搗爛炒乾為末每空心酒服方寸匕日三服忌如法肘後方虛勞困乏地黃一石取汁酒三斗攪勻煎收日服必效方病後虛汗口乾心躁熟地黃五兩水三盞煎一盞半分三服一日盡聖惠方骨蒸勞熱張文仲方用生地黃一斤搗三度絞取汁盡分再服若利即減之以身輕涼為度外臺秘要婦人發熱欲成勞病肌瘦食減經候不調地髓煎用乾地黃一斤為末煉蜜丸梧子大每酒服五十丸保慶集婦人勞熱心忪地黃煎用生乾地黃熟乾地黃等分為末生薑自然汁入水相和打糊丸梧子大每服三十丸用地黃湯下或酒醋茶湯下亦可日二服覺臟腑虛冷則晨服八味丸地黃性冷壞脾陰虛則發熱地黃補陰血故也婦人良方咳嗽唾血勞瘦骨蒸日晚寒熱生地黃汁三合煮白粥臨熟入地黃汁攪勻空心食之食醫心鏡吐血咳嗽熟地黃末酒服一錢日三聖惠方吐血不止生地黃汁一升二合白膠香二兩以瓷器盛入甑蒸令膠消服之梅師肺損吐血或舌上有孔出血生地黃八兩取汁童便五合同煎熱入鹿角膠炒研一兩分三服心熱吐衄脈洪數者生芐汁半升熬至一合入大黃末一兩待成膏丸梧子大每熟水下五丸至十丸並聖惠方鼻出衄血乾地黃龍腦薄荷等分為末冷水調下孫兆秘寶方吐血便血地黃汁六合銅器煎沸入牛皮膠一兩待化入薑汁半杯分三服便止或微轉一行不妨聖惠方腸風下血生地黃熟地黃並酒浸五味子等分為末以煉蜜丸梧子大每酒下七十丸百一選方初生便血小兒初生七八日大小便血出乃熱傳心肺不可服涼藥只以生地黃汁五七匙酒半匙蜜半匙和服之全幼心鑑小便尿血吐血及耳鼻出血生地黃汁半升生薑汁半合蜜一合和服聖惠方小便血淋生地黃汁車前葉汁各三合和煎服聖惠方小兒蠱痢生芐汁一升二合分三四服立效子母秘錄月水不止生地黃汁每服一盞酒一盞煎服日二次千金方月經不調久而無子乃衝任伏熱也熟地黃半斤當歸二兩黃連一兩並酒浸一夜焙研為末煉蜜丸梧子大每服七十丸米飲溫酒任下禹講師方妊娠漏胎下血不止百一方用生地黃汁一升漬酒四合煮三五沸服之不止又服崔氏方用生地黃為末酒服方寸匕日一夜一經心錄加乾薑為末保命集二黃丸用生地黃熟地黃等分為末每服半兩白朮枳殼煎湯空心調下日二服胎寒腹痛妊婦衝任脈虛惟宜抑陽助陰內補丸用熟地黃二兩當歸一兩微炒為末蜜丸梧子大每溫酒下三十丸許學士本事方妊娠胎動生地黃搗汁煎沸入雞子白一枚攪服聖惠方產後血痛有塊並經脈行後腹痛不調黑神散用熟地黃一斤陳生薑半斤同炒乾為末每服二錢溫酒調下婦人良方產後惡血不止乾地黃搗末每食前熱酒服一錢連進三服瑞竹堂方產後中風脅不得轉交加散用生地黃五兩研汁生薑五兩取汁交互相浸一夕次日各炒黃浸汁干乃焙為末每酒服一方寸匕濟生方產後煩悶乃血氣上衝生地黃汁清酒各一升相和煎沸分二服集驗方產後百病地黃酒用地黃汁漬曲二升淨秫米二斗令發如常釀之至熟封七日取清常服令相接忌生冷酢滑蒜雞豬魚一切毒物未產先一月釀成夏月不可造千金方胞衣不出生地黃汁一升苦酒三合相和暖服必效方寒疝絞痛來去用烏雞一隻治如常法生地黃七斤銼細甑中同蒸下以銅器承取汁清旦服至日晡令盡其間當下諸寒澼訖作白粥食之久疝者作三劑肘後方小兒陰腫以蔥椒湯暖處洗之唾調地黃末敷之外腎熱者雞子清調或加牡蠣少許危氏方小兒熱病壯熱煩渴頭痛生地黃汁三合蜜半合和勻時時與服普濟方熱暍昏沉地黃汁一盞服之熱瘴昏迷煩悶飲水不止至危者一服見效用地黃根生薄荷葉等分擂爛取自然汁入麝香少許井華水調下覺心下頓涼勿再服普濟方溫毒發斑黑膏治溫毒發斑嘔逆生地黃二兩六錢二字半好豆豉一兩六錢二字半以豬膏十兩合之露一夜煎減三分之一絞去滓入雄黃麝香如豆大攪勻分作三服毒從皮中出則愈忌蕪荑千金方血熱生癬地黃汁頻服之千金方疔腫乳癰地黃搗敷之熱即易性涼消腫無不效梅師方癰癤惡肉地黃三斤水一斗煮取三升去滓煎稠塗紙上貼之日三易鬼遺方一切癰疽及打撲傷損未破疼痛者以生地黃杵如泥攤在上摻木香末於中又攤地黃泥一重貼之不過三五度即內消也王袞博濟方打撲損傷骨碎及筋傷爛用生地黃熬膏裹之以竹簡編夾急縛勿令轉動一日一夕可十易之則瘥類說云許元公過橋墮馬右臂臼脫左右急挼入臼中昏迷不知痛苦急召田錄事視之曰尚可救乃以藥封腫處中夜方蘇達旦痛止痛處已白日日換貼其瘀腫移至肩背乃以藥下去黑血三升而愈即上方也出肘後方中損傷打撲瘀血在腹者用生地黃汁三升酒一升半煮二升半分三服出千金方物傷睛突輕者瞼胞腫痛重者目睛突出但目系未斷者即納入急搗生地黃綿裹敷之仍以避風膏藥護其四邊聖濟總錄睡起目赤腫起良久如常者血熱也臥則血歸於肝故熱則目赤腫良久血散故如常也用生地黃汁浸粳米半升曬乾三浸三曬每夜以米煮粥食一盞數日即愈有人病此用之得效醫余眼暴赤痛水洗生地黃黑豆各二兩搗膏臥時以鹽湯洗目閉目以藥厚罨目上至曉水潤取下聖濟總錄蓐內赤目生地黃薄切溫水浸貼小品方牙疳宣露膿血口氣生地黃一斤鹽二合末自搗和團以麵包煨令煙斷去面入麝一分研勻日夜貼之聖濟錄牙齒挺長出一分者常咋生地黃甚妙張文仲備急方牙動欲脫生地黃綿裹咂之令汁漬根並咽之日五六次千金方食蟹齦腫肉胬出者生地黃汁一碗牙皂角數條火炙蘸盡地黃汁為末敷之永類方耳中常鳴生地黃截塞耳中日數易之或煨熟尤妙肘後方鬚髮黃赤生地黃一斤生薑半斤各洗研自然汁留滓用不蛀皂角十條去皮弦蘸汁炙至汁盡為度同滓入罐內泥固煅存性為末用鐵器盛末三錢湯調停二日臨臥刷染鬚髮上即黑本事方竹木入肉生地黃嚼爛罨之救急方毒箭入肉煎生地黃汁作丸服至百日箭出千金方猘犬咬傷地黃搗汁飯餅塗之百度愈百一方葉主治惡瘡似癩十年者搗爛日塗鹽湯先洗千金方時珍曰按抱朴子云韓子治用地黃苗喂五十歲老馬生三駒又一百三十歲乃死也張鷟朝野僉載云雉被鷹傷銜地黃葉點之虎中藥箭食清泥解之鳥獸猶知解毒何況人乎實主治四月採陰乾搗末水服方寸匕日三服功與地黃等蘇頌弘景曰出渭城者有子淮南七精散用之花主治為末服食功同地黃蘇頌腎虛腰脊痛為末酒服方寸匕日三時珍附方新一內障青盲風赤生翳及墜睛日久瞳損失明地黃花曬黑豆花曬槐花曬各一兩為末豬肝一具同以水二斗煮至上有凝脂掠盡瓶收每點少許日三四次聖惠方附錄胡面莽拾遺藏器味甘溫無毒主去痃癖及冷氣止腹痛煮服生嶺南葉如地黃牛膝本經上品釋名牛莖廣雅百倍本經山莧菜救荒對節菜弘景曰其莖有節似牛膝故以為名時珍曰本經又名百倍隱語也言其滋補之功如牛之多力也其葉似莧其節對生故俗有山莧對節之稱集解別錄曰牛膝生河內川穀及臨朐二月八月十月採根陰乾普曰葉如夏藍莖本赤弘景曰今出近道蔡州者最長大柔潤其莖有節莖紫節大者為雄青細者為雌以雄為勝大明曰懷州者長白蘇州者色紫頌曰今江淮閩粵關中亦有之然不及懷州者為真春生苗莖高二三尺青紫色有節如鶴膝及牛膝狀葉尖圓如匙兩兩相對於節上生花作穗秋結實甚細以根極長大至三尺而柔潤者為佳莖葉亦可單用時珍曰牛膝處處有之謂之土牛膝不堪服食惟北土及川中人家栽蒔者為良秋間收子至春種之其苗方莖暴節葉皆對生頗似莧葉而長且尖𧣪秋月開花作穗結子狀如小鼠負蟲有澀毛皆貼莖倒生九月採取根水中浸兩宿挼去皮裹紮曝乾雖白直可貴而挼去白汁入藥不如留皮者力大也嫩苗可作菜茹根修治斅曰凡使去頭蘆以黃精自然汁浸一宿漉出銼焙乾用時珍曰今惟以酒浸入藥欲下行則生用滋補則焙用或酒拌蒸過用氣味苦酸平無毒普曰神農甘雷公酸無毒李當之溫之才曰惡螢火龜甲陸英畏白前忌牛肉主治寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎久服輕身耐老本經療傷中少氣男子陰消老人失溺補中續絕益精利陰氣填骨髓止發白除腦中痛及腰脊痛婦人月水不通血結別錄治陰痿補腎助十二經脈逐惡血甄權治腰膝軟怯冷弱破癥結排膿止痛產後心腹痛並血暈落死胎大明強筋補肝臟風虛好古同蓯蓉浸酒服益腎竹木刺入肉嚼爛罨之即出宗奭治久瘧寒熱五淋尿血莖中痛下痢喉痹口瘡齒痛癰腫惡瘡傷折時珍發明權曰病人虛羸者加而用之震亨曰牛膝能引諸藥下行筋骨痛風在下者宜加用之凡用土牛膝春夏用葉秋冬用根惟葉汁效尤速時珍曰牛膝乃足厥陰少陰之藥所主之病大抵得酒則能補肝腎生用則能去惡血二者而已其治腰膝骨痛足痿陰消失溺久瘧傷中少氣諸病非取其補肝腎之功歟其癥瘕心腹諸痛癰腫惡瘡金瘡折傷喉齒淋痛尿血經候胎產諸病非取其去惡血之功歟按陳日華經驗方云方夷吾所編集要方予刻之臨汀後在鄂渚得九江守王南強書云老人久苦淋疾百藥不效偶見臨汀集要方中用牛膝者服之而愈又葉朝議親人患血淋流下小便在盆內凝如蒟蒻久而有變如鼠形但無足爾百治不效一村醫用牛膝根煎濃汁日飲五服名地髓湯雖未即愈而血色漸淡久乃復舊後十年病又作服之又瘥因檢本草見肘後方治小便不利莖中痛欲死用牛膝並葉以酒煮服之今再拈出表其神功又按楊士瀛直指方云小便淋痛或尿血或沙石脹痛用川牛膝一兩水二盞煎一盞溫服一婦患此十年服之得效杜牛膝亦可或入麝香乳香尤良附方舊十三新七勞瘧積久不止者長大牛膝一握生切以水六升煮二升分三服清早一服未發前一服臨發時一服外臺秘要消渴不止下元虛損牛膝五兩為末生地黃汁五升浸之日曝夜浸汁盡為度蜜丸梧子大每空心溫酒下三十丸久服壯筋骨駐顏色黑髮津液自生經驗後方卒暴症疾腹中有如石刺晝夜啼呼牛膝二斤以酒一斗漬之密封於灰火中溫令味出每服五合至一升隨量飲肘後方痢下腸蠱凡痢下應先白後赤若先赤後白為腸蠱牛膝二兩搗碎以酒一升漬經一宿每服一兩杯日三服肘後方婦人血塊土牛膝根洗切焙搗為末酒煎溫服極效福州人單用之圖經本草女人血病萬病丸治女人月經淋閉月信不來繞臍寒疝痛及產後血氣不調腹中結瘕症不散諸病牛膝酒浸一宿焙乾漆炒令煙盡各一兩為末生地黃汁一升入石器內慢火熬至可丸丸如梧子大每服二丸空心米飲下拔萃方婦人陰痛牛膝五兩酒三升煮取一升半去滓分三服千金方生胎欲去牛膝一握搗以無灰酒一盞煎七分空心服仍以獨根土牛膝塗麝香插入牝戶中婦人良方胞衣不出牛膝八兩葵子一合水九升煎三升分三服延年方產後尿血川牛膝水煎頻服熊氏補遺喉痹乳蛾新鮮牛膝根一握艾葉七片搗和人乳取汁灌入鼻內須臾痰涎從口鼻出即愈無艾亦可一方牛膝搗汁和陳醋灌之口舌瘡爛牛膝浸酒含漱亦可煎飲肘後方牙齒疼痛牛膝研末含漱亦可燒灰致牙齒間千金方折傷閃肭杜牛膝搗罨之衛生易簡方金瘡作痛生牛膝搗敷立止梅師方猝得惡瘡人不識者牛膝根搗敷之千金方癰癤已潰用牛膝根略刮去皮插入瘡口中留半寸在外以嫩橘葉及地錦草各一握搗其上牛膝能去惡血二草溫涼止痛隨干隨換有十全之功也陳日華經驗方風瘙癮疹及㾦㿔牛膝末酒服方寸匕日三服千金方骨疽癩病方同上莖葉氣味缺主治寒濕痿痹老瘧淋秘諸瘡功同根春夏宜用之時珍附方舊三新一氣濕痹痛腰膝痛用牛膝葉一斤切以米三合於豉汁中煮粥和鹽醬空腹食之聖惠方老瘧不斷牛膝莖葉一把切以酒三升漬服令微有酒氣不即斷更作不過三劑止肘後方溪毒寒熱東間有溪毒中人似射工但無物初病惡寒發熱煩懊骨節強痛不急治生蟲食臟殺人用雄牛膝莖紫色節大者一把以酒水各一杯同搗絞汁溫飲日三服肘後方眼生珠管牛膝並葉搗汁日點三四次聖惠方紫菀本經中品釋名青菀別錄紫茜別錄返魂草綱目夜牽牛時珍曰其根色紫而柔宛故名許慎說文作茈菀斗門方謂之返魂草集解別錄曰紫菀生漢中房陵山谷及真定邯鄲二月三月採根陰乾弘景曰近道處處有之其生布地花紫色本有白毛根甚柔細有白者名白菀不復用大明曰形似重臺根作節紫色潤軟者佳頌曰今耀成泗壽臺孟諸州興國軍皆有之三月內布地生苗其葉二四相連五月六月內開黃白紫花結黑子余如陶說恭曰白菀即女菀也療體與紫菀相同無紫菀時亦用之穎曰紫菀連根葉採之醋浸入少鹽收藏作菜辛香號名仙菜鹽不宜多多則腐也時珍曰按陳自明云紫菀以牢山所出根如北細辛者為良沂兗以東皆有之今人多以車前旋覆根赤土染過偽之紫菀肺病要藥肺本自亡津液又服走津液藥為害滋甚不可不慎根修治斅曰凡使先去須有白如練色者號曰羊須草自然不同去頭及土用東流水洗淨以蜜浸一宿至明於火上焙乾用一兩用蜜二分氣味苦溫無毒別錄曰辛權曰苦平之才曰款冬為之使惡天雄瞿麥藁本雷丸遠志畏茵陳主治咳逆上氣胸中寒熱結氣去蠱毒痿蹶安五臟本經療咳唾膿血止喘悸五勞體虛補不足小兒驚癇別錄治屍疰補虛下氣勞氣虛熱百邪鬼魅甄權調中消痰止渴潤肌膚添骨髓大明益肺氣生息賁好古附方舊三新四肺傷咳嗽紫菀五錢水一盞煎七分溫服日三次衛生易簡方久嗽不瘥紫菀款冬花各一兩百部半兩搗羅為末每服三錢姜三片烏梅一個煎湯調下日二甚佳圖經本草小兒咳嗽聲不出者紫菀末杏仁等分入蜜同研丸芡子大每服一丸五味子湯化下全幼心鑑吐血咳嗽吐血後咳者紫菀五味炒為末蜜丸芡子大每含化一丸指南方產後下血紫菀末水服五撮聖惠方纏喉風痹不通欲死者用返魂草根一莖洗淨納入喉中待取惡涎出即瘥神效更以馬牙硝津咽之即絕根本一名紫菀南人呼為夜牽牛斗門方婦人小便卒不得出者紫菀為末井華水服三撮即通小便血者服五撮立止千金方女菀本經中品釋名白菀別錄織女菀別錄女復廣雅茆音柳時珍曰其根似女體柔婉故名集解別錄曰女宛生漢中山谷或山陽正月二月採陰乾弘景曰比來醫方無復用之復有白菀似紫菀恐非此也恭曰白菀即女菀有名未用重出一條故陶說疑之功與紫菀相似宗奭曰女宛即白菀非二物也唐修本草刪去白菀甚合宜時珍曰白菀即紫菀之色白者也雷斅言紫菀白如練色者名羊須草恐即此物也根氣味辛溫無毒之才曰畏滷鹼主治風寒洗洗霍亂泄痢腸鳴上下無常處驚癇寒熱百疾本經療肺傷咳逆出汗久寒在膀胱支滿飲酒夜食發病別錄發明時珍曰按葛洪肘後方載治人面黑令白方用真女菀三分鉛丹一分為末醋漿服一刀圭日三服十日大便黑十八日如漆二十一日全白便止過此太白矣年三十後不可服忌五辛孫思邈千金方用酒服男十日女二十日黑色皆從大便出也又名醫錄云宋興國時有女任氏色美聘進士王公輔不遂意郁久面色漸黑母家求醫一道人用女真散酒下二錢一日二服數日面貌微白一月如故懇求其方則用黃丹女菀二物等分爾據此則葛氏之方已試有驗者矣然則紫菀治手太陰血分白菀手太陰氣分藥也肺熱則面紫黑肺清則面白三十歲以後則肺氣漸減不可復泄故云不可服之也麥門冬本經上品釋名虋冬音門秦名羊韭齊名愛韭楚名馬韭越名羊耆並別錄禹韭吳普禹餘糧別錄忍冬吳普忍凌吳普不死藥吳普階前草弘景曰根似穬麥故謂之麥門冬時珍曰麥須曰虋此草根似麥而有須其葉如韭凌冬不凋故謂之麥虋冬及有諸韭忍冬諸名俗作門冬便於字也可以服食斷谷故又有餘糧不死之稱吳普本草一名僕壘一名隨脂集解別錄曰麥門冬葉如韭冬夏長生生函谷川谷及堤阪肥土石間久廢處二月三月八月十月採根陰乾普曰生山谷肥地叢生葉如韭實青黃採無時弘景曰函谷即秦關處處有之冬月作實如青珠以四月採根肥大者為好藏器曰出江寧者小潤出新安者大白其苗大者如鹿蔥小者如韭葉大小有三四種功用相似其子圓碧頌曰所在有之葉青似莎草長及尺余四季不凋根黃白色有須根如連珠形四月開淡紅花如紅蓼花實碧而圓如珠江南出者葉大或云吳地者尤勝時珍曰古人惟用野生者後世所用多是種蒔而成其法四月初採根於黑壤肥沙地栽之每年六月九月十一月三次上糞及耘灌夏至前一日取根洗曬收之其子亦可種但成遲爾浙中來者甚良其葉似韭而多縱紋且堅韌為異根修治弘景曰凡用取肥大者湯浸抽去心不爾令人煩大抵一斤須減去四五兩也時珍曰凡入湯液以滾水潤濕少頃抽去心或以瓦焙軟乘熱去心若入丸散須瓦焙熱即於風中吹冷如此三四次即易燥且不損藥力或以湯浸搗膏和藥亦可滋補藥則以酒浸擂之氣味甘平無毒別錄曰微寒普曰神農岐伯甘平黃帝桐君雷公甘無毒李當之甘小溫杲曰甘微苦微寒陽中微陰降也入手太陰經氣分之才曰地黃車前為之使惡款冬苦瓠苦芺畏苦參青蘘木耳伏石鐘乳主治心腹結氣傷中傷飽胃絡脈絕羸瘦短氣久服輕身不老不飢本經療身重目黃心下支滿虛勞客熱口乾燥渴止嘔吐愈痿蹶強陰益精消穀調中保神定肺氣安五臟令人肥健美顏色有子別錄去心熱止煩熱寒熱體勞下痰飲藏器治五勞七傷安魂定魄止嗽治肺痿吐膿時疾熱狂頭痛大明治熱毒大水面目肢節浮腫下水主泄精甄權治肺中伏火補心氣不足主血妄行及經水枯乳汁不下元素久服輕身明目和車前地黃丸服去溫瘴變白夜視有光藏器斷谷為要藥弘景發明宗奭曰麥門冬治肺熱之功為多其味苦但專泄而不專收寒多人禁服治心肺虛熱及虛勞與地黃阿膠麻仁同為潤經益血復脈通心之劑與五味子枸杞子同為生脈之劑元素曰麥門冬治肺中伏火脈氣欲絕者加五味子人參二味為生脈散補肺中元氣不足杲曰六七月間濕熱方旺人病骨乏無力身重氣短頭旋眼黑甚則痿軟故孫真人以生脈散補其天元真氣脈者人之元氣也人參之甘寒瀉熱火而益元氣麥門冬之苦寒滋燥金而清水源五味子之酸溫瀉丙火而補庚金兼益五臟之氣也時珍曰按趙繼宗儒醫精要云麥門冬以地黃為使服之令人頭不白補髓通腎氣定喘促令人肌體滑澤除身上一切惡氣不潔之疾蓋有君而有使也若有君無使是獨行無功矣此方惟火盛氣壯之人服之相宜若氣弱胃寒者必不可餌也附方舊三新九麥門冬煎補中益心悅顏色安神益氣令人肥健其力甚快取新麥門冬根去心搗熟絞汁和白蜜銀器中重湯煮攪不停手候如飴乃成溫酒日日化服之圖經本草消渴飲水用上元板橋麥門冬鮮肥者二大兩宣州黃連九節者二大兩去兩頭尖三五節小刀子調理去皮毛了吹去塵更以生布摩拭秤之搗末以肥大苦瓠汁浸麥門冬經宿然後去心即於臼中搗爛納黃連末和搗並手丸如梧子大食後飲下五十丸日再但服兩日其渴必定若重者即初服一百五十丸二日服一百二十丸三日一百丸四日八十丸五日五十丸合藥要天氣晴明之夜方浸藥須淨處禁婦人雞犬見之如覺可時每日只服二十五丸服訖覺虛即取白羊頭一枚治淨以水三大斗煮爛取汁一斗以來細細飲之勿食肉勿入鹽不過三劑平復也崔元亮海上集驗方勞氣欲絕麥門冬一兩甘草炙二兩粳米半合棗二枚竹葉十五片水二升煎一升分三服南陽活人書虛勞客熱麥門冬煎湯頻飲本草衍義吐血衄血諸方不效者麥門冬去心一斤搗取自然汁入蜜二合分作二服即止活人心統衄血不止麥門冬去心生地黃各五錢水煎服立止保命集齒縫出血麥門冬煎湯漱之蘭室寶鑑咽喉生瘡脾肺虛熱上攻也麥門冬一兩黃連半兩為末煉蜜丸梧子大每服二十丸麥門冬湯下普濟方乳汁不下麥門冬去心焙為末每用三錢酒磨犀角約一錢許溫熱調下不過二服便下熊氏補遺下痢口渴引飲無度麥門冬去心三兩烏梅肉二十個細銼以水一升煮取七合細細呷之必效金石藥發麥門冬六兩人參四兩甘草炙二兩為末蜜丸梧子大每服五十丸飲下日再服本草圖經男女血虛麥門冬三斤取汁熬成膏生地黃三斤取汁熬成膏等分一處濾過入蜜四之一再熬成瓶收每日白湯點服忌鐵器醫方摘要萱草宋嘉祐釋名忘憂說文療愁綱目丹棘古今注鹿蔥嘉祐鹿劍土宿妓女吳普宜男時珍曰萱本作諼諼忘也詩云焉得諼草言樹之背謂憂思不能自遣故欲樹此草玩味以忘憂也吳人謂之療愁董子云欲忘人之憂則贈之丹棘一名忘憂故也其苗烹食氣味如蔥而鹿食九種解毒之草萱乃其一故又名鹿蔥周處風土記云懷妊婦人佩其花則生男故名宜男李九華延壽書云嫩苗為蔬食之動風令人昏然如醉因名忘憂此亦一說也嵇康養生論神農經言中藥養性故合歡蠲忿萱草忘憂亦謂食之也鄭樵通志乃言萱草一名合歡者誤矣合歡見木部集解頌曰萱草處處田野有之俗名鹿蔥五月採花八月採根今人多采其嫩苗及花跗作菹食時珍曰萱宜下濕地冬月叢生葉如蒲蒜輩而柔弱新舊相代四時青翠五月抽莖開花六出四垂朝開暮蔫至秋深乃盡其花有紅黃紫三色結實三角內有子大如梧子黑而光澤其根與麥門冬相似最易繁衍南方草木狀言廣中一種水蔥狀如鹿蔥其花或紫或黃蓋亦此類也或言鹿蔥花有斑紋與萱花不同時者謬也肥土所生則花厚色深有斑紋起重臺開有數月瘠土所生則花薄而色淡開亦不久嵇含宜男花序亦云荊楚之土號為鹿蔥可以薦菹尤可憑據今東人採其花跗干而貨之名為黃花菜苗花氣味甘涼無毒主治煮食治小便赤澀身體煩熱除酒疸大明消食利濕熱時珍作菹利胸膈安五臟令人好歡樂無憂輕身明目蘇頌根主治沙淋下水氣酒疸黃色遍身者搗汁服藏器大熱衄血研汁一大盞和生薑汁半盞細呷之宗奭吹乳乳癰腫痛擂酒服以滓封之時珍發明震亨曰萱屬木性下走陰分一名宜男寧無微意存焉附方新四通身水腫鹿蔥根葉曬乾為末每服二錢入席下塵半錢食前米飲服聖惠方小便不通萱草根煎水頻飲杏林摘要大便後血萱草根和生薑油炒酒沖服聖濟總錄食丹藥毒萱草根研汁服之事林廣記捶胡根拾遺集解藏器曰生江南川穀蔭地苗如萱草其根似天門冬凡用抽去心氣味甘寒無毒主治潤五臟止消渴除煩去熱明目功如麥門冬藏器淡竹葉綱目釋名根名碎骨子時珍曰竹葉象形碎骨言其下胎也集解時珍曰處處原野有之春生苗高數寸細莖綠葉儼如竹米落地所生細竹之莖葉其根一窠數十須須上結子與麥門冬一樣但堅硬爾隨時採之八九月抽莖結小長穗俚人採其根苗搗汁和米作酒麴甚芳烈氣味甘寒無毒主治葉去煩熱利小便清心根能墮胎催生時珍鴨跖草蹠音只宋嘉祐補釋名雞舌草拾遺碧竹子同上竹雞草綱目竹葉菜同上淡竹葉同上耳環草同上碧蟬花同上藍姑草藏器曰鴨蹠生江東淮南平地葉如竹高一二尺花深碧好為色有角如鳥嘴時珍曰竹葉菜處處平地有之三四月出苗紫莖竹葉嫩時可食四五月開花如蛾形兩葉如翅碧色可愛結角尖曲如鳥喙實在角中大如小豆豆中有細子灰黑而皺狀如蠶屎巧匠採其花取汁作畫色及彩羊皮燈青碧如黛也苗氣味苦大寒無毒主治寒熱瘴瘧痰飲疔腫肉症澀滯小兒丹毒發熱狂癇大腹痞滿身面氣腫熱痢蛇犬咬癰疽等毒藏器和赤小豆煮食下水氣濕痹利小便大明消喉痹時珍附方新四小便不通竹雞草一兩車前草一兩搗汁入蜜少許空心服之集簡方下痢赤白藍姑草即淡竹葉菜煎湯日服之活幼全書喉痹腫痛鴨跖草汁點之袖珍方五痔腫痛耳環草一名碧蟬兒花挼軟納患處即效危亦林得效方葵本經上品校正自菜部移入此釋名露葵綱目滑菜時珍曰按爾雅翼云葵者揆也葵葉傾日不使照其根乃智以揆之也古人採葵必待露解故曰露葵今人呼為滑菜言其性也古者葵為五菜之主今不復食之故移入此集解別錄曰冬葵子生少室山弘景曰以秋種葵覆養經冬至春作子者謂之冬葵入藥性至滑利春葵子亦滑不堪藥用故是常葵耳術家取葵子微炒令燁灹音畢乍散著濕地遍踏之朝種暮生遠不過宿恭曰此即常食之葵也有數種多不入藥用頌曰葵處處有之苗葉作菜茹更甘美冬葵子古方入藥最多葵有蜀葵錦葵黃葵終葵菟葵皆有功用時珍曰葵菜古人種為常食今之種者頗鮮有紫莖白莖二種以白莖為勝大葉小花花紫黃色其最小者名鴨腳葵其實大如指頂皮薄而扁實內子輕虛如榆莢仁四五月種者可留子六七月種者為秋葵八九月種者為冬葵經年收採正月複種者為春葵然宿根至春亦生按王禎農書云葵陽草也其菜易生郊野甚多不拘肥瘠地皆有之為百菜之主備四時之饌本豐而耐旱味甘而無毒可防荒儉可以菹臘其枯枿可為榜簇根子又能療疾咸無遺棄誠蔬茹之要品民生之資益者也而今人不復食之亦無種者葉氣味甘寒滑無毒為百菜主其心傷人別錄弘景曰葵葉尤冷利不可多食頌曰苗葉作菜茹甚甘美但性滑利不益人詵曰其性雖冷若熱食之令人熱悶動風氣四季月食之發宿疾天行病後食之令人失明霜葵生食動五種留飲吐水凡服百藥忌食其心心有毒也黃背紫莖者勿食之不可合鯉魚黍米鮓食害人時珍曰凡被狂犬咬者永不可食食之即發食葵須用蒜無蒜勿食之又伏硫黃主治脾之菜也宜脾利胃氣滑大腸思邈宜導積滯妊婦食之胎滑易生蘇頌煮汁服利小腸治時行黃病干葉為末及燒灰服治金瘡出血甄權除客熱治惡瘡散膿血女人帶下小兒熱毒下痢丹毒並宜食之汪穎服丹石人宜食孟詵潤燥利竅功與子同同上發明張從正曰凡久病大便澀滯者宜食葵菜自然通利乃滑以養竅也時珍曰按唐王燾外臺秘要云天行斑瘡須臾通身皆戴白漿此惡毒氣也高宗永徽四年此瘡自西域東流於海內但煮葵菜葉以蒜齏啖之則止又聖惠方亦云小兒發斑用生葵菜葉絞汁少少與服散惡毒氣按此即今痘瘡也今之治者惟恐其大小二便頻數泄其元氣痘不起發葵菜滑竅能利二便似不相宜而昔人賴之豈古今運氣不同故治法亦隨時變易歟附方舊三新四天行斑瘡方見上肉錐怪疾有人手足甲忽長倒生刺肉如錐痛不可忍者但食葵菜即愈夏子益奇疾方諸瘻不合先以泔清溫洗拭淨取葵菜微火烘暖貼之不過二三百葉引膿盡即肉生也忌諸魚蒜房事必效方湯火傷瘡葵菜為末敷之食物本草蛇蠍螫傷葵菜搗汁服之千金方誤吞銅錢葵菜搗汁冷飲普濟方丹石發動口乾咳嗽者每食後飲冬月葵齏汁一盞便臥少時食療本草根氣味甘寒無毒主治惡瘡療淋利小便解蜀椒毒別錄小兒吞錢不出煮汁飲之神妙甄權治疳瘡出黃汁孟詵利竅滑胎止消渴散惡毒氣時珍附方舊五新七二便不通脹急者生冬葵根二斤搗汁三合生薑四兩取汁一合和勻分二服連用即通也消渴引飲小便不利葵根五兩水三大盞煮汁平旦服日一服並聖惠方消中尿多日夜尿七八升冬葵根五斤水五斗煮三斗每日平旦服二升外臺秘要漏胎下血血儘子死葵根莖燒灰酒服方寸匕日三千金方瘭疽惡毒肉中忽生一黤子大如豆粟或如梅李或赤或黑或白或青其黶有核核有深根應心能爛筋骨毒入臟腑即殺人但飲葵根汁可折其熱毒姚僧坦集驗方妒乳乳癰葵莖及子為末酒服方寸匕日二昝殷產寶身面疳瘡出黃汁者葵根燒灰和豬脂塗之食療本草小兒蓐瘡葵根燒末敷之子母秘錄小兒緊唇葵根燒灰酥調塗之聖惠方口吻生瘡用經年葵根燒灰敷之外臺秘要蛇虺螫傷葵根搗塗之古今錄驗解防葵毒葵根搗汁飲之千金方冬葵子別錄曰十二月採之機曰子乃春生不應十二月可採也氣味甘寒滑無毒黃芩為之使主治五臟六腑寒熱羸瘦五癃利小便久服堅骨長肌肉輕身延年本經療婦人乳難內閉腫痛別錄出癰疽頭孟詵下丹石毒弘景通大便消水氣滑胎治痢時珍發明時珍曰葵氣味俱薄淡滑為陽故能利竅通乳消腫滑胎也其根葉與子功用相同按陳自明婦人良方云乳婦氣脈壅塞乳汁不行及經絡凝滯奶房脹痛留蓄作癰毒者用葵菜子炒香縮砂仁等分為末熱酒服二錢此藥滋氣脈通營衛行津液極驗乃上蔡張不愚方也附方舊九新一十四大便不通十日至一月者肘後方冬葵子三升水四升煮取一升服不瘥更作聖惠用葵子末人乳汁等分和服立通關格脹滿大小便不通欲死者肘後方用葵子二升水四升煮取一升納豬脂一丸如雞子頓服千金用葵子為末豬脂和丸梧子大每服五十丸效止小便血淋葵子一升水三升煮汁日三服千金方妊娠患淋冬葵子一升水三升煮二升分服千金方妊娠下血方同上產後淋瀝不通用葵子一合朴硝八分水二升煎八合下硝服之集驗方妊娠水腫身重小便不利灑淅惡寒起即頭眩用葵子茯苓各三兩為散飲服方寸匕日三服小便利則愈若轉胞者加發灰神效金匱要略生產困悶冬葵子一合搗破水二升煮汁半升頓服少時便產昔有人如此服之登廁立撲兒於廁中也食療倒生口噤冬葵子炒黃為末酒服二錢匕效產書乳汁不通方見發明胎死腹中葵子為末酒服方寸匕若口噤不開者灌之藥下即蘇千金方胞衣不下冬葵子一合牛膝一兩水二升煎一升服千金方血痢產痢冬葵子為末每服二錢入蠟茶一錢沸湯調服日三聖惠方痎瘧邪熱冬葵子陰乾為末酒服二錢午日取花挼手亦去瘧聖惠方癰腫無頭孟詵曰三日後取葵子二百粒水吞之當日即開也經驗後方云只吞一粒即破如吞兩粒則有兩頭也便毒初起冬葵子末酒服二錢儒門事親面上疱瘡冬葵子柏子仁茯苓瓜瓣各一兩為末食後酒服方寸匕日三服陶隱居方解蜀椒毒冬葵子煮汁飲之千金方傷寒勞復葵子二升粱米一升煮粥食取汗立安聖惠蜀葵宋嘉祐校正自菜部移入此併入有名未用別錄吳葵華釋名戎葵爾雅吳葵藏器曰爾雅云菺音堅戎葵也郭璞注云今蜀葵也葉似葵花如木槿花戎蜀其所自來因以名之時珍曰羅願爾雅翼吳葵作胡葵云胡戎也夏小正云四月小滿後五日吳葵華別錄吳葵即此也而唐人不知退入有名未用嘉祐本草重於菜部出蜀葵條蓋未讀爾雅注及千金方吳葵一名蜀葵之文故也今併為一集解頌曰蜀葵似葵花如木槿花有五色小花者名錦葵功用更強時珍曰蜀葵處處人家植之春初種子冬月宿根亦自生苗嫩時亦可茹食葉似葵菜而大亦似絲瓜葉有岐叉過小滿後長莖高五六尺花似木槿而大有深紅淺紅紫黑白色單葉千葉之異昔人謂其疏莖密葉翠萼豔花金粉檀心者頗善狀之惟紅白二色入藥其實大如指頭皮薄而扁內仁如馬兜鈴仁及蕪荑仁輕虛易種其秸剝皮可緝布作繩一種小者名錦葵即荊葵也爾雅謂之荍音喬其花大如五銖錢粉紅色有紫縷紋掌禹錫補註本草謂此即戎葵非矣然功用亦相似苗氣味甘微寒滑無毒思邈曰不可久食鈍人志性若被狗齧者食之永不瘥也李廷飛曰合豬肉食人無顏色主治除客熱利腸胃思邈煮食治丹石發熱結大人小兒熱毒下痢藏器作蔬食滑竅治淋潤燥易產時珍搗爛塗火瘡燒研敷金瘡大明根莖主治客熱利小便散膿血惡汁藏器發明宗奭曰蜀葵四時取紅色單葉者根陰乾治帶下排膿血惡物極驗也附方新七小便淋痛葵花根洗銼水煎五七沸服之如神衛生寶鑑小便血淋葵花根二錢車前子一錢水煮日服之簡便單方小便尿血葵莖無灰酒服方寸匕日三千金腸胃生癰懷忠丹治內癰有敗血腥穢殊甚臍腹冷痛用此排膿下血單葉紅蜀葵根白芷各一兩白枯礬白芍藥各五錢為末黃蠟溶化和丸梧子大每空心米飲下二十丸待膿血出盡服十宣散補之坦仙皆效方諸瘡腫痛不可忍者葵花根去黑皮搗爛入井華水調稠貼之普濟方小兒吻瘡經年欲腐葵根燒研敷之聖惠方小兒口瘡赤葵莖炙乾為末蜜和含之聖惠方吳葵華別錄氣味咸寒無毒禹錫曰蜀葵華甘冷無毒主治理心氣不足別錄小兒風疹痎瘧嘉祐治帶下目中溜火和血潤燥通竅利大小腸時珍發明張元素曰蜀葵花陰中之陽也赤者治赤帶白者治白帶赤者治血燥白者治氣燥皆取其寒滑潤利之功也又紫葵花入染髭發方中用附方舊三新四二便關格脹悶欲死二三日則殺人蜀葵花一兩搗爛麝香半錢水一大盞煎服根亦可用痎瘧邪熱蜀葵花白者陰乾為末服之午日取花挼手亦能去瘧蘇頌圖經本草婦人帶下臍腹冷痛面色痿黃日漸虛困用葵花一兩陰乾為末每空心溫酒服二錢匕赤帶用赤葵白帶用白葵聖惠方橫生倒產葵花為末酒服方寸匕千金方酒渣赤鼻蜀葵花研末臘豬脂和勻夜敷旦洗仁存方誤吞針錢葵花煮汁服之普濟方蜂蠍螫毒五月五日午時收蜀葵花石榴花艾心等分陰乾為末水調塗之肘後方子氣味甘冷無毒主治淋澀通小腸催生落胎療水腫治一切瘡疥並瘢疵赤靨大明發明時珍曰按楊士瀛直指方云蜀葵子炒入宣毒藥中最驗又催生方用子二錢滑石三錢為末順流水服五錢即下附方舊一新二大小便閉不通者用白花胡葵子為末煮濃汁服之千金方石淋破血五月五日收葵子炒研食前溫酒下一錢當下石出聖惠方癰腫無頭蜀葵子為末水調敷之經驗後方菟葵唐本草釋名天葵圖經莃音希雷丸草外丹本草集解恭曰菟葵苗如石龍芮而葉光澤花白似梅其莖紫黑煮啖極滑所在下澤田間皆有人多識之六月七月採莖葉曝乾入藥禹錫曰郭璞注爾雅云菟葵似葵而小葉狀如藜有毛汋之可食而滑宗奭曰菟葵綠葉如黃蜀葵其花似拒霜甚雅其形至小如初開單葉蜀葵有檀心色如牡丹姚黃蕊則蜀葵也唐劉夢得所謂菟葵燕麥動搖春風者是也時珍曰按鄭樵通志云菟葵天葵也狀如葵菜葉大如錢而厚面青背微紫生於崖石凡丹石之類得此而後能神所以雷公炮炙論云如要形堅豈忘紫背謂其能堅鉛也此說得於天台一僧又按南宮從𡵺嶁神書云紫背天葵出蜀中靈草也生於水際取自然汁煮汞則堅亦能煮八石拒火也又按初虞世古今錄驗云五月五前齋戒看桑下有菟葵者至五日午時至桑下咒曰系黎乎俱當蘇婆訶咒畢乃以手摩桑陰一遍口齧菟葵及五葉草嚼熟以唾塗手熟揩令遍再齋七日不得洗手後有蛇蟲蠍蠆咬傷者以此手摩之即愈也時珍竊謂古有咒由一科此亦其類但不知必用菟葵取何義也若謂其相制則治毒蟲之草亦多矣苗氣味甘寒無毒主治下諸石五淋止虎蛇毒諸瘡搗汁飲之塗瘡能解毒止痛唐本黃蜀葵宋嘉祐校正自菜部移入此釋名時珍曰黃蜀葵別是一種宜入草部而嘉祐本草定入菜部為其與蜀葵同名而氣味主治亦同故也今移於此集解禹錫曰黃蜀葵花近道處處有之春生苗葉頗似蜀葵而葉尖狹多刻缺夏末開花淺黃色六七月採陰乾之宗奭曰黃蜀葵與蜀葵別種非是蜀葵中黃者也葉心下有紫檀色摘下剔散日乾之不爾即浥爛也時珍曰黃葵二月下種或宿子在土自生至夏始長葉大如蓖麻葉深綠色開岐丫有五尖如人爪形旁有小尖六月開花大如碗鵝黃色紫心六瓣而側旦開午收暮落人亦呼為側金盞花隨即結角大如拇指長二寸許本大末尖六稜有毛老則黑色其稜自綻內有六房如脂麻房其子累累在房內狀如苘麻子色黑其莖長者六七尺剝皮可作繩索花氣味甘寒滑無毒主治小便淋及催生治諸惡瘡膿水久不瘥者作末敷之即愈為瘡家要藥嘉祐消癰腫浸油塗湯火傷時珍附方新八沙石淋痛黃蜀葵花一兩炒為末每米飲服一錢名獨聖散普濟方難產催生如聖散治胎臟乾澀難產劇者並進三服良久腹中氣寬胎滑即下也用黃葵花焙研末熟湯調服二錢無花用子半合研末酒淘去滓服之產寶鑑胎死不下即上方用紅花酒下癰疽腫毒黃蜀葵花用鹽摻收瓷器中密封經年不壞每用敷之自平自潰無花用根葉亦可直指方小兒口瘡黃葵花燒末敷之肘後方小兒木舌黃蜀葵花為末一錢黃丹五分敷之直指方湯火灼傷用瓶盛麻油以箸就樹夾取黃葵花收入瓶內勿犯人手密封收之遇有傷者以油塗之甚妙經驗方小兒禿瘡黃蜀葵花大黃黃芩等分為末米泔淨洗香油調搽普濟方子及根氣味甘寒滑無毒主治癰腫利小便五淋水腫產難通乳汁時珍發明頌曰冬葵黃葵蜀葵形狀雖各不同而性俱寒滑故所主療不甚相遠時珍曰黃葵子古方少用今為催生及利小便要藥或單用或入湯散皆宜蓋其性滑與冬葵子同功故也花子與根性功相同可以互用無花用子無子用根附方舊二新三臨產催生宗奭曰臨產時以四十九粒研爛溫水服之良久即產經驗後方用子焙研三錢井華水服無子用根煎汁服便癰初起淮人用黃蜀葵子十七粒皂角半梃為末以石灰同醋調塗之永類鈐方癰腫不破黃葵子研酒服一粒則一頭神效衛生易簡方打撲傷損黃葵子研酒服二錢海上方龍葵唐本草校正併入圖經老鴉眼睛草釋名苦葵圖經苦菜唐本天茄子圖經水茄綱目天泡草綱目老鴉酸漿草綱目老鴉眼睛草圖經時珍曰龍葵言其性滑如葵也苦以菜味名茄以葉形名天泡老鴉眼睛皆以子形名也與酸漿相類故加老鴉以別之五爪龍亦名老鴉眼睛草敗醬苦苣併名苦菜名同物異也集解弘景曰益州有苦菜乃是苦蘵恭曰苦蘵即龍葵也俗亦名苦菜非荼也龍葵所在有之關河間謂之苦菜葉圓花白子若牛李子生青熟黑但堪煮食不任生啖頌曰龍葵近處亦稀惟北方有之北人謂之苦葵葉圓似排風而無毛花白色子亦似排風子生青熟黑其赤者名赤珠亦可入藥又曰老鴉眼睛草生江湖間葉如茄子葉故名天茄子或云即漆姑草也漆姑即蜀羊泉已見本經草部人亦不能決識之時珍曰龍葵龍珠一類二種也皆處處有之四月生苗嫩時可食柔滑漸高二三尺莖大如箸似燈籠草而無毛葉似茄葉而小五月以後開小白花五出黃蕊結子正圓大如五味子上有小蒂數顆同綴其味酸中有細子亦如茄子之子但生青熟黑者為龍葵生青熟赤者為龍珠功用亦相彷彿不甚遼遠蘇頌圖經菜部既注龍葵復於外類重出老鴉眼睛草蓋不知其即一物也又謂老鴉眼睛是蜀羊泉誤矣蜀羊泉葉似菊開紫花子類枸杞詳見草部本條楊慎丹鉛錄謂龍葵即吳葵反指本草為誤引素問千金四月吳葵華為證蓋不知千金方言吳葵即蜀葵已自明白矣今並正之苗氣味苦微甘滑寒無毒主治食之解勞少睡去虛熱腫唐本治風補益男子元氣婦人敗血蘇頌消熱散血壓丹石毒宜食之時珍附方舊一去熱少睡龍葵菜同米煮作羹粥食之食醫心鏡莖葉根氣味同苗主治搗爛和土敷疔腫火丹瘡良孟詵療癰疽腫毒跌撲傷損消腫散血時珍根與木通胡荽煎湯服通利小便蘇頌附方舊四新九通利小便方見上從高墜下欲死者取老鴉眼睛草莖葉搗汁服以渣敷患處唐瑤經驗方火焰丹腫老鴉眼睛草葉入醋細研敷之能消赤腫蘇頌圖經本草癰腫無頭龍葵莖葉搗敷經驗方發背癰疽成瘡者蘇頌圖經云用龍葵一兩為末麝香一分研勻塗之甚善袖珍方云一切發背癰疽惡瘡用蛤蟆一個同老鴉眼睛草莖葉搗爛敷之即散神效諸瘡惡腫老鴉眼睛草擂酒服以渣敷之普濟方疔腫毒瘡黑色焮腫者乃服丹石毒也赤色者肉面毒也用龍葵根一握洗切乳香末黃連三兩杏仁六十枚和搗作餅厚如三錢依瘡大小敷之覺癢即換去癢不可忍切勿搔動候炊久瘡中似石榴子戢戢然乃去藥時時以甘草湯溫洗洗後以蠟貼之終身不得食羊血如無龍葵以蔓荊根代之聖濟總錄天泡濕瘡龍葵苗葉搗敷之吐血不止天茄子苗半兩人參二錢半為末每服二錢新汲水下聖濟總錄闢除蚤蝨天茄葉鋪於席下次日盡死多年惡瘡天茄葉貼之或為末貼救急良方產後腸出不收老鴉酸漿草一把水煎先熏後洗收乃止救急方子七月採之主治疔腫唐本明目輕身甚良甄權治風益男子元氣婦人敗血蘇頌龍珠拾遺釋名赤珠頌曰龍葵子赤者名赤珠象形也集解甄權曰龍葵赤珠者名龍珠挼去汁可食能變白令黑藏器曰龍珠生道旁子圓似龍葵但熟時正赤耳時珍曰龍珠龍葵雖以子之黑赤分別其實一物二色強分為二也苗氣味苦寒無毒主治能變白髮令人不睡主諸熱毒石氣發動調中解煩藏器發明權曰龍珠服之變白令黑耐老若能生食得苦者不食他菜十日後即有靈異也不與蔥薤同啖根亦入藥用子氣味同菜主治疔腫藏器酸漿本經中品校正菜部苦耽草部酸漿燈籠草俱併為一釋名醋漿本經苦葴音針苦耽嘉祐燈籠草唐本皮弁草食療天泡草綱目王母珠嘉祐洛神珠同上小者名苦蘵藏器曰爾雅云葴寒漿也郭璞注云即今酸漿江東人呼為苦葴小者為苦蘵亦呼為小苦耽崔豹古今注云蘵一名蘵子實形如皮弁其子圓如珠時珍曰酸漿以子之味名也苦葴苦耽以苗之味名也燈籠皮弁以角之形名也王母洛神珠以子之形名也按楊慎卮言云本草燈籠草苦耽酸漿皆一物也修本草者非一時一人故重複耳燕京野果名紅姑娘外垂絳囊中含赤子如珠酸甘可食盈盈繞砌與翠草同芳亦自可愛蓋姑娘乃瓜囊之訛古者瓜姑同音娘囊之音亦相近耳此說得之故今以本經酸漿唐本草燈籠草宋嘉祐本草苦耽俱併為一焉集解別錄曰酸漿生荊楚川澤及人家田園中五月採陰乾弘景曰酸漿處處多有苗似水茄而小葉亦可食子作房房中有子如梅李大皆黃赤色小兒食之保升曰酸漿即苦葴也根如菹芹白色絕苦禹錫曰苦耽生故墟垣塹間高二三尺子作角如撮口袋中有子如珠熟則赤色關中人謂之洛神珠一名王母珠一名皮弁草一種小者名苦蘵爾雅謂之黃蒢恭曰燈籠草所在有之枝幹高三四尺有紅花狀若燈籠內有紅子可愛根莖花實併入藥用宗奭曰酸漿即苦耽也嘉祐重出苦耽條天下有之苗如天茄子開小白花結青殼熟則深紅殼中子大如櫻亦紅色櫻中復有細子如落蘇之子食之有青草氣也時珍曰龍葵酸漿一類二種也酸漿苦蘵一種二物也但大者為酸漿小者為苦蘵以此為別敗醬亦名苦蘵與此不同其龍葵酸漿苗葉一樣但龍葵莖光無毛五月入秋開小白花五出黃蕊結子無殼累累數顆同枝子有蒂蓋生青熟紫黑其酸漿同時開小花黃白色紫心白蕊其花如杯狀無瓣但有五尖結一鈴殼凡五稜一枝一顆下懸如燈籠之狀殼中一子狀如龍葵子生青熟赤以此分別便自明白按庚辛玉冊云燈籠草四方皆有惟川陝者最大葉似龍葵嫩時可食四五月開花結實有四葉盛之如燈籠河北呼為酸漿據此及楊慎之說則燈籠酸漿之為一物尤可證矣唐慎微以三葉酸草附於酸漿之後蓋不知其名同物異也其草見草之九酢漿下苗葉莖根氣味苦寒無毒禹錫曰有小毒恭曰苦大寒無毒時珍曰方士取汁煮丹砂伏白礬煮三黃煉硝硫主治酸漿治熱煩滿定志益氣利水道本經搗汁服治黃病多效弘景燈籠草治上氣咳嗽風熱明目根莖花實並宜唐本苦耽苗子治傳屍伏連鬼氣疰忤邪氣腹內熱結目黃不下食大小便澀骨熱咳嗽多睡勞乏嘔逆痰壅痃癖痞滿小兒無辜癧子寒熱大腹殺蟲落胎去蠱毒並煮汁飲亦生搗汁服研膏敷小兒閃癖嘉祐發明震亨曰燈籠草苦能除濕熱輕能治上焦故主熱咳咽痛此草治熱痰咳嗽佛耳草治寒痰咳嗽也與片芩清金丸同用更效時珍曰酸漿利濕除熱除熱故清肺治咳利濕故能化痰治疽一人病虛乏咳嗽有痰愚以此加入湯中用之有效附方新三熱咳咽痛燈籠草為末白湯服名清心丸仍以醋調敷喉外丹溪纂要喉瘡作痛燈籠草炒焦研末酒調呷之醫學正傳灸瘡不發酸漿葉貼之子氣味酸平無毒別錄曰寒主治熱煩滿定志益氣利水道產難吞之立產本經食之除熱治黃病尤益小兒蘇頌治骨蒸勞熱屍疰疳瘦痰癖熱結與苗莖同功嘉祐附方新二酸漿實丸治三焦腸胃伏熱婦人胎熱難產用酸漿實五兩莧實三兩馬藺子炒大鹽榆白皮炒二兩柴胡黃芩栝蔞根䕡茹各一兩為末煉蜜丸梧子大每服三十丸木香湯下聖濟總錄天泡濕瘡天泡草鈴兒生搗敷之亦可為末油調敷鄧才雜興方蜀羊泉本經中品釋名羊泉別錄羊飴別錄漆姑草時珍曰諸名莫解能治漆瘡故曰漆姑集解別錄曰蜀羊泉生蜀郡山谷弘景曰方不復用人無識者恭曰此草俗名漆姑葉似菊花紫色子類枸杞子根如遠志無心有糝所在平澤有之生陰濕地三月四月採苗葉陰乾藏器曰陶注杉材云漆姑葉細細多生石邊能療漆瘡蘇云漆姑是羊泉按羊泉乃大草漆姑草如鼠跡大生階墀間陰處氣辛烈挼敷漆瘡亦主溪毒乃同名也頌曰或言老鴉眼睛草即漆姑草漆姑乃蜀羊泉人不能決識時珍曰漆姑有二種蘇恭所說是羊泉陶陳所說是小草蘇頌所說老鴉眼睛草乃龍葵也又黃蜂作窠銜漆姑草汁為蒂即此草也氣味苦微寒無毒主治頭禿惡瘡熱氣疥瘙痂癬蟲本經療齲齒女子陰中內傷皮間實積別錄主小兒驚生毛髮搗塗漆瘡蘇恭蚯蚓氣呵者搗爛入黃丹盦之時珍出摘玄方附方新一黃疸疾漆草一把搗汁和酒服不過三五次即愈摘玄方鹿蹄草綱目釋名小秦王草綱目秦王試劍草時珍曰鹿蹄象葉形能合金瘡故名試劍草又山慈姑亦名鹿蹄與此不同集解時珍曰按軒轅述寶藏論云鹿蹄多生江廣平陸及寺院荒處淮北絕少川陝亦有苗似堇菜而葉頗大背紫色春生紫花結青實如天茄子可制雌黃丹砂氣味缺主治金瘡出血搗塗即止又塗一切蛇蟲犬咬毒時珍敗醬本經中品釋名苦菜綱目苦蘵綱目澤敗別錄鹿腸本經鹿首別錄馬草別錄弘景曰根作陳敗豆醬氣故以為名時珍曰南人採嫩者曝蒸作菜食味微苦而有陳醬氣故又名苦菜與苦蕒龍葵同名亦名苦蘵與酸漿同名苗形則不同也集解別錄曰敗醬生江夏川穀八月採根曝乾弘景曰出近道葉似豨薟根形如柴胡恭曰此藥不出近道多生岡嶺間葉似水莨及薇銜叢生花黃根紫作陳醬色其葉殊不似豨薟也頌曰江東亦有之狀如蘇恭所說時珍曰處處原野有之俗名苦菜野人食之江東人每採收儲焉春初生苗深冬始凋初時葉布地生似菘菜葉而狹長有鋸齒綠色面深背淺夏秋莖高二三尺而柔弱數寸一節節間生葉四散如傘顛頂開白花成簇如芹花蛇床子花狀結小實成簇其根白紫頗似柴胡吳普言其根似桔梗陳自明言其根似蛇莓根者皆不然根苗同修治斅曰凡收得便粗杵入甘草葉相拌對蒸從巳至未去甘草葉焙乾用氣味苦平無毒別錄曰咸微寒權曰辛苦微寒大明曰酸時珍曰微苦帶甘主治暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣本經除癰腫浮腫結熱風痹不足產後腹痛別錄治毒風𤸷痹破多年凝血能化膿為水產後諸病止腹痛余疹煩渴甄權治血氣心腹痛破癥結催生落胞血暈鼻衄吐血赤白帶下赤眼障膜胬肉聤耳瘡癤疥癬丹毒排膿補瘻大明發明時珍曰敗醬乃手足陽明厥陰藥也善排膿破血故仲景治癰及古方婦人科皆用之乃易得之物而後人不知用蓋未遇識者耳附方舊二新三腸癰有膿薏苡仁附子敗醬散用薏苡仁十分附子二分敗醬五分搗為末每以方寸匕水二升煎一升頓服小便當下即愈張仲景金匱玉函產後惡露七八日不止敗醬當歸各六分續斷芍藥各八分芎藭竹茹各四分生地黃炒十二分水二升煮取八合空心服外臺秘要產後腰痛乃血氣流入腰腿痛不可轉者敗醬當歸各八分芎藭芍藥桂心各六分水二升煮八合分二服忌蔥廣濟方產後腹痛如錐刺者敗醬草五兩水四升煮二升每服二合日三服良衛生易簡方蠼螋尿瘡繞腰者敗醬煎汁塗之良楊氏產乳迎春花綱目集解時珍曰處處人家栽插之叢生高者二三尺方莖厚葉葉如初生小椒葉而無齒面青背淡對節生小枝一枝三葉正月初開小花狀如瑞香花黃色不結實葉氣味苦澀平無毒主治腫毒惡瘡陰乾研末酒服二三錢出汗便瘥衛生易簡方款冬花本經中品釋名款凍郭璞顆凍爾雅氐冬別錄鑽凍衍義菟奚爾雅橐吾本經虎鬚本經時珍曰按述徵記云洛水至歲末凝厲時款冬生於草冰之中則顆凍之名以此而得後人訛為款冬乃款凍爾款者至也至冬而花也宗奭曰百草中惟此不顧冰雪最先春也故世謂之鑽凍雖在冰雪之下至時亦生芽春時人採以代蔬入藥須微見花者良如已芬芳則都無氣力今人多使如箸頭者恐未有花也集解別錄曰款冬生常山山谷及上黨水旁十一月採花陰乾弘景曰第一齣河北其形如宿蒪未舒者佳其腹裡有絲次出高麗百濟其花乃似大菊花次亦出蜀北部宕昌而並不如其冬月在冰下生十二月正月旦取之恭曰今出雍州南山溪水及華州山谷澗間葉似葵而大叢生花出根下頌曰今關中亦有之根紫色葉似萆薢十二月開黃花青紫萼去土一二寸初出如菊花萼通直而肥實無子則陶氏所謂出高麗百濟者近此類也又有紅花者葉如荷而鬥直大者容一升小者容數合俗呼為蜂鬥葉又名水斗葉則蘇氏所謂大如葵而叢生者是也敷咸款冬賦序云予曾逐禽登於北山於時仲冬之月冰凌盈谷積雪被崖顧見款冬煒然始敷華豔是也修治斅曰凡採得須去向里裹花蕊殼並向裡實如慄零殼者並枝葉以甘草水浸一宿卻取款冬葉相拌裛一夜曬乾去葉用氣味辛溫無毒別錄曰甘好古曰純陽入手太陰經之才曰杏仁為之使得紫菀良惡皂莢硝石玄參畏貝母辛夷麻黃黃耆黃芩黃連青葙主治咳逆上氣善喘喉痹諸驚癇寒熱邪氣本經消渴喘息呼吸別錄療肺氣心促急熱乏勞咳連連不絕涕唾稠黏肺痿肺癰吐膿血甄權潤心肺益五臟除煩消痰洗肝明目及中風等疾大明發明頌曰本經主咳逆古今方用為溫肺治嗽之最崔知悌療久咳熏法每旦取款冬花如雞子許少蜜拌花使潤納一升鐵鐺中又用一瓦碗鑽一孔孔內安一小筆管以面泥縫勿令漏氣鐺下著炭火少時煙從筒出以口含吸咽之如胸中少悶須舉頭即將指頭按住筒口勿使漏至煙盡乃止如是五日一為之待至六日飽食羊肉餔飥一頓永瘥宗奭曰有人病嗽多日或教然款冬花三兩於無風處以筆管吸其煙滿口則咽之數日果效附方新二痰嗽帶血款冬花百合蒸焙等分為末蜜丸龍眼大每臥時嚼一丸薑湯下濟生方口中疳瘡款冬花黃連等分為細末用唾津調成餅子先以蛇床子煎湯漱口乃以餅子敷之少頃確住其瘡立消也楊誠經驗方鼠麴草日華校正併入有名未用鼠耳及東垣藥類法象佛耳草釋名米曲綱目鼠耳別錄佛耳草法象無心草別錄香茅拾遺黃蒿會編茸母時珍曰曲言其花黃如曲色又可和米粉食也鼠耳言其葉形如鼠耳又有白毛蒙茸似之故北人呼為茸母佛耳則鼠耳之訛也今淮人呼為毛耳朵則香茅之茅似當作毛按段成式雜俎云蚍蜉酒草鼠耳也一名無心草豈蚍蜉食此故有是名耶集解別錄曰鼠耳一名無心生田中下地厚葉肥莖藏器曰鼠麴草生平崗熟地高尺余葉有白毛黃花荊楚歲時記云三月三日取鼠曲汁蜜和為粉謂之龍舌䉽以壓時氣䉽音板米餅也山南人呼為香茅取花雜櫸皮染褐至破猶鮮江西人呼為鼠耳草也汪機曰佛耳草徽人謂之黃蒿二三月苗長尺許葉似馬齒莧而細有微白毛花黃土人採莖葉和米粉搗作粑果食時珍曰日華本草鼠曲即別錄鼠耳也唐宋諸家不知乃退鼠耳入有名未用中李杲藥類法象用佛耳草亦不知其即鼠耳也原野間甚多二月生苗莖葉柔軟葉長寸許白茸如鼠耳之毛開小黃花成穗結細子楚人呼為米曲北人呼為茸母故邵桂子甕天語云北方寒食採茸母草和粉食宋徽宗詩茸母初生認禁菸者是也氣味甘平無毒別錄曰鼠耳酸無毒杲曰佛耳草酸性熱款冬花為之使宜少食之過則損目主治鼠耳主痹寒寒熱止咳別錄鼠曲調中益氣止泄除痰壓時氣去熱嗽雜米粉作糗食甜美日華佛耳治寒嗽及痰除肺中寒大升肺氣李杲發明震亨曰治寒痰嗽宜用佛耳草熱痰嗽宜用燈籠草時珍曰別錄云治寒熱止咳東垣云治寒嗽言其標也日華云治熱嗽言其本也大抵寒嗽多是火鬱於內而寒覆於外也按陳氏經驗方云三奇散治一切咳嗽不問久近晝夜無時用佛耳草五十文款冬花二百文熟地黃二兩焙研末每用二錢於爐中燒之以筒吸菸嚥下有涎吐去予家一獲久病此醫治不效偶在沅州得一婢用此法兩服而愈也決明本經上品釋名時珍曰此馬蹄決明也以明目之功而名又有草決明石決明皆同功者草決明即青葙子陶氏所謂萋蒿是也集解別錄曰決明子生龍門川澤十月十日採陰乾百日弘景曰龍門在長安北今處處有之葉如茳芒子形似馬蹄呼為馬蹄決明用之當搗碎又別有草決明是萋蒿子在下品中頌曰今處處人家園圃所蒔夏初生苗高三四尺許根帶紫色葉似苜蓿而大七月開黃花結角其子如青綠豆而銳十月採之按爾雅薢茩決光郭璞釋云藥草決明也葉黃銳赤華實如山茱萸或曰䔖也關西謂之薢茩音皆苟其說與此種頗不類又有一種馬蹄決明葉如江豆子形似馬蹄宗奭曰決明苗高四五尺春亦為蔬秋深結角其子生角中如羊腎今湖南北人家所種甚多或在村野成段蜀本圖經言葉似苜蓿而闊大者甚為允當時珍曰決明有二種一種馬蹄決明莖高三四尺葉大於苜蓿而本小末奓晝開夜合兩兩相貼秋開淡黃花五出結角如初生細豇豆長五六寸角中子數十粒參差相連狀如馬蹄青綠色入眼目藥最良一種茳芒決明救荒本草所謂山扁豆是也苗莖似馬蹄決明但葉之本小末尖正似槐葉夜亦不合秋開深黃花五出結角大如小指長二寸許角中子成數列狀如黃葵子而扁其色褐味甘滑二種苗葉皆可作酒麴俗呼為獨佔缸但茳芒嫩苗及花與角子皆可瀹茹及點茶食而馬蹄決明苗角皆韌苦不可食也蘇頌言薢茩即決明殊不類恐別一物也子氣味咸平無毒別錄曰苦甘微寒之才曰蓍實為之使惡大麻子主治青盲目淫膚赤白膜眼赤痛淚出久服益精光輕身本經療唇口青別錄助肝氣益精以水調末塗消腫毒熁太陽穴治頭痛又貼腦心止鼻洪作枕治頭風明目勝於黑豆日華治肝熱風眼赤淚每旦取一匙挼淨空心吞之百日後夜見物光甄權益腎解蛇毒震亨葉作菜食利五臟明目甚良甄權發明時珍曰相感志言圃中種決明蛇不敢入丹溪朱氏言決明解蛇毒本於此也王旻山居錄言春月種決明葉生採食其花陰乾亦可食切忌泡茶多食無不患風按馬蹄決明苗角皆韌而苦不宜於食縱食之有利五臟明目之功何遂至於患風耶又劉績霏雪錄言人家不可種決明生子多跛此迂儒誤聽之說也不可信附方舊一新七積年失明決明子二升為末每食後粥飲服方寸匕外臺秘要青盲雀目決明一升地膚子五兩為末米飲丸梧子大每米飲下二三十丸普濟方補肝明目決明子一升蔓荊子二升以酒五升煮曝乾為末每飲服二錢溫水下日二服聖惠方目赤腫痛決明子炒研茶調敷兩太陽穴干則易之一夜即愈醫方摘玄頭風熱痛方同上鼻衄不止方見主治癬瘡延蔓決明子一兩為末入水銀輕粉少許研不見星擦破上藥立瘥此東坡家藏方也奇效良方發背初起草決明生用一升搗生甘草一兩水三升煮一升分二服大抵血滯則生瘡肝主藏血決明和肝氣不損元氣也許學士本事方附錄茳芒拾遺藏器曰陶云決明葉如茳芒按茳芒生道旁葉小於決明性平無毒火炙作飲極香除痰止渴令人不睡調中隋稠禪師採作五色飲以進煬帝者是也又有茳芏字從土音吐一名江蘺子乃草似莞生海邊可為席者與決明葉不相類時珍曰茳芒亦決明之一種故俗猶稱獨佔缸說見前集解下合明草拾遺藏器曰味甘寒無毒主暴熱淋小便赤澀小兒瘈病明目下水止血痢搗絞汁服生下濕地葉如四出花向夜葉即合地膚本經上品釋名地葵本經地麥別錄落帚日華獨帚圖經王蔧爾雅王帚郭璞掃帚弘景益明藥性涎衣草唐本白地草綱目鴨舌草圖經千心妓女土宿本草時珍曰地膚地麥因其子形似也地葵因其苗味似也鴨舌因其形似也妓女因其枝繁而頭多也益明因其子功能明目也子落則老莖可為帚故有帚蔧諸名集解別錄曰地膚子生荊州平澤及田野八月十月採實陰乾弘景曰今田野間亦多皆取莖苗為掃帚其子微細入補藥丸散用仙經不甚用恭曰田野人名為地麥草北人名涎衣草葉細莖赤出熟田中苗極弱不能勝舉今云堪為掃帚恐未之識也大明曰地膚即落帚子也子色青似一眠起蠶砂之狀頌曰今蜀川關中近地皆有之初生薄地五六寸根形如蒿莖赤葉青大似荊芥三月開黃白花結子青白色八月九月採實神仙七精散云地膚子星之精也或曰其苗即獨帚也一名鴨舌草陶弘景所謂莖苗可為掃帚者蘇恭言其苗弱不勝舉二說不同而今醫家皆以為獨帚密州圖上者雲根作叢生每窠有二三十莖莖有赤有黃七月開黃花其實地膚也至八月而䕸幹成可採此正與獨帚相合恐西北出者短弱故蘇說云耳時珍曰地膚嫩苗可作蔬茹一科數十枝攢簇團團直上性最柔弱故將老時可為帚耐用蘇恭云不可帚止言其嫩苗而已其子最繁爾雅云葥王蔧郭璞注云王帚也似藜可以為掃帚江東呼為落帚此說得之子氣味苦寒無毒時珍曰甘寒主治膀胱熱利小便補中益精氣久服耳目聰明輕身耐老本經去皮膚中熱氣使人潤澤散惡瘡疝瘕強陰別錄治陰卵㿗疾去熱風可作湯沐浴與陽起石同服主丈夫陰痿不起補氣益力甄權治客熱丹腫日華發明藏器曰眾病皆起於虛虛而多熱者加地膚子甘草附方舊三新七風熱赤目地膚子焙一升生地黃半斤取汁和作餅曬乾研末每服三錢空心酒服聖惠方目痛眯目凡目痛及眯目中傷有熱瞑者取地膚子白汁頻注目中王燾外臺秘要雷頭風腫不省人事落帚子同生姜研爛熱沖酒服取汗即愈聖濟總錄脅下疼痛地膚子為末酒服方寸匕壽域神方疝氣危急地膚子即落帚子炒香研末每服一錢酒下簡便方狐疝陰㿗超越舉重卒得陰㿗及小兒狐疝傷損生㿗並用地膚子五錢白朮二錢半桂心五分為末飲或酒服三錢忌生蔥桃李必效方久疹腰痛積年有時發動六月七月取地膚子乾末酒服方寸匕日五六服肘後血痢不止地膚子五兩地榆黃芩各一兩為末每服方寸匕溫水調下聖惠方妊娠患淋熱痛酸楚手足煩疼地膚子十二兩水四升煎二升半分服子母秘錄肢體疣目地膚子白礬等分煎湯頻洗壽域神方苗葉氣味苦寒無毒時珍曰甘苦燒灰煎霜制砒石粉霜水銀硫黃雄黃硇砂主治搗汁服主赤白痢燒灰亦善煎水洗目去熱暗雀盲澀痛別錄主大腸泄瀉和氣澀腸胃解惡瘡毒蘇頌煎水日服治手足煩疼利小便諸淋時珍發明時珍曰按虞摶醫學正傳云摶兄年七十秋間患淋二十餘日百方不效後得一方取地膚草搗自然汁服之遂通至賤之物有回生之功如此時珍按聖惠方治小便不通用地麥草一大把水煎服古方亦常用之此物能益陰氣通小腸無陰則陽無以化亦東垣治小便不通用黃柏知母滋腎之意附方新一物傷睛陷胬肉突出地膚洗去土二兩搗絞汁每點少許冬月以乾者煮濃汁聖惠方瞿麥瞿音劬本經中品釋名蘧麥爾雅巨句麥本經大菊爾雅大蘭別錄石竹日華南天竺草綱目弘景曰子頗似麥故名瞿麥時珍曰按陸佃解韓詩外傳云生於兩旁謂之瞿此麥之穗旁生故也爾雅作遽有渠衢二音日華本草云一名燕麥一名杜姥草者誤矣燕麥即雀麥雀瞿二字相近傳寫之訛爾集解別錄曰瞿麥生太山山谷立秋採實陰乾弘景曰今出近道一莖生細葉花紅紫赤色可愛合子葉刈取之子頗似麥子有兩種一種微大花邊有叉丫未知何者是也今市人皆用小者復一種葉廣相似而有毛花晚而甚赤按經云採實其中子細燥熱便脫盡矣頌曰今處處有之苗高一尺以來葉尖小青色根紫黑色形如細蔓荊花紅紫赤色亦似映山紅二月至五月開七月結實作穗子頗似麥河陽河中府出者苗可用淮甸出者根細村民取作刷帚爾雅謂之大菊廣雅謂之茈萎是也時珍曰石竹葉似地膚葉而尖小又似初生小竹葉而細窄其莖纖細有節高尺余梢間開花田野生者花大如錢紅紫色人家栽者花稍小而嫵媚有紅白粉紅紫赤斑爛數色俗呼為洛陽花結實如燕麥內有小黑子其嫩苗炸熟水淘過可食穗修治斅曰凡使只用蕊殼不用莖葉若一時同使即空心令人氣噎小便不禁也用時以䈽竹瀝浸一伏時漉曬氣味苦寒無毒別錄曰辛權曰甘之才曰蘘草牡丹為之使惡螵蛸伏丹砂主治關格諸癃結小便不通出刺決癰腫明目去翳破胎墮子下閉血本經養腎氣逐膀胱邪逆止霍亂長毛髮別錄主五淋甄權月經不通破血塊排膿大明葉主治痔瘻並瀉血作湯粥食又治小兒蛔蟲及丹石藥發並眼目腫痛及腫毒搗敷治浸淫瘡並婦人陰瘡大明發明杲曰瞿麥利小便為君主之用頌曰古今方通心經利小腸為最要宗奭曰八正散用瞿麥今人為至要藥若心經雖有熱而小腸虛者服之則心熱未退而小腸別作病矣蓋小腸與心為傳送故用此入小腸本草並不治心熱若心無大熱止治其心或制之不盡當求其屬以衰之可也時珍曰近古方家治產難有石竹花湯治九孔出血有南天竺飲皆取其破血利竅也附方舊六新五小便石淋宜破血瞿麥子搗為末酒服方寸匕日三服三日當下石外臺秘要小便不利有水氣栝蔞瞿麥丸主之瞿麥二錢半栝蔞根二兩大附子一個茯苓山芋各三兩為末蜜和丸梧子大一服三丸日三未知益至七八丸以小便利腹中溫為知也張仲景金匱方下焦結熱小便淋閉或有血出或大小便出血瞿麥穗一兩甘草炙七錢五分山梔子仁炒半兩為末每服七錢連須蔥頭七個燈心五十莖生薑五片水二碗煎至七分時時溫服名立效散千金方子死腹中或產經數日不下以瞿麥煮濃汁服之千金方九竅出血服藥不止者南天竺草即瞿麥拇指大一把山梔子仁三十個生薑一塊甘草炙半兩燈草一小把大棗五枚水煎服聖濟總錄目赤腫痛浸淫等瘡瞿麥炒黃為末以鵝涎調塗眥頭即開或搗汁塗之聖惠方眯目生翳其物不出者生膚翳者瞿麥乾薑炮為末井華水調服二錢日二服聖惠方魚臍疔瘡瞿麥燒灰和油敷之甚佳崔氏方咽喉骨哽瞿麥為末水服方寸匕日二外臺秘要竹木入肉瞿麥為末水服方寸匕或煮汁日飲三次梅師方箭刀在肉及咽喉胸膈諸隱處不出酒服瞿麥末方寸匕日三服千金方王不留行本經上品釋名禁宮花日華剪金花日華金盞銀臺時珍曰此物性走而不住雖有王命不能留其行故名吳普本草作一名王不流行蓋誤也集解別錄曰王不留行生太山山谷二月八月採弘景曰今處處有之葉似酸漿子似菘子人言是蓼子不爾多入癰瘻方用保升曰所在有之葉似菘藍其花紅白色子殼似酸漿其中實圓黑似菘子大如黍粟三月收苗五月收子根苗花子並通用頌曰今江浙及並河近處皆有之苗莖俱青高七八寸以來根黃色如薺根葉尖如小匙頭亦有似槐葉者四月開花黃紫色隨莖而生如菘子狀又似豬藍花五月採苗莖曬乾用俗謂之剪金草河北生者葉圓花紅與此小別時珍曰多生麥地中苗高者一二尺三四月開小花如鐸鈴狀紅白色結實如燈籠草子殼有五稜殼內包一實大如豆實內細子大如菘子生白熟黑正圓如細珠可愛陶氏言葉似酸漿蘇氏言花如菘子狀者皆欠詳審以子為花葉狀也燈籠草即酸漿也苗子皆入藥苗子修治斅曰凡採得拌濕蒸之從巳至未以漿水浸一宿焙乾用氣味苦平無毒普曰神農苦平岐伯雷公甘元素曰甘苦平陽中之陰主治金瘡止血逐痛出刺除風痹內寒久服輕身耐老增壽本經止心煩鼻衄癰疽惡瘡瘻乳婦人難產別錄治風毒通血脈甄權遊風風疹婦人血經不勻發背日華下乳汁元素利小便出竹木刺時珍發明元素曰王不留行下乳引導用之取其利血脈也時珍曰王不留行能走血分乃陽明衝任之藥俗有穿山甲王不留婦人服了乳長流之語可見其性行而不住也按王執中資生經云一婦人患淋臥久諸藥不效其夫夜告予予按既效方治諸淋用剪金花十餘葉煎湯遂令服之明早來云病減八分矣再服而愈剪金花一名禁宮花一名金盞銀臺一名王不留行是也頌曰張仲景治金瘡有王不留行散貞元廣利方治諸風痙有王不留行湯皆最效附方舊一新八鼻衄不止剪金花連莖葉陰乾濃煎汁溫服立效指南方糞後下血王不留行末水服一錢聖濟總錄金瘡亡血王不留行散治身被刀斧傷亡血用王不留行十分八月八日採之蒴藋細葉十分七月七日採之桑東南根白皮十分三月三日採之川椒三分甘草十分黃芩乾薑芍藥厚朴各二分以前三味燒存性後六味為散合之每大瘡飲服方寸匕小瘡但粉之產後亦可服張仲景金匱要略婦人乳少因氣鬱者湧泉散王不留行穿山甲炮龍骨瞿麥穗麥門冬等分為末每服一錢熱酒調下後食豬蹄羹仍以木梳梳乳一日三次衛生寶鑑方頭風白屑王不留行香白芷等分為末乾摻一夜篦去聖惠癰疽諸瘡王不留行湯治癰疽妒乳月蝕白禿及面上久瘡去蟲止痛用王不留行東南桃枝東引茱萸根皮各五兩蛇床子牡荊子苦竹葉疾蒺子各三升大麻子一升以水二斗半煮取一斗頻頻洗之千金方誤吞鐵石骨刺不下危急者王不留行黃柏等分為末湯浸蒸餅丸彈子大青黛為衣線穿掛風處用一丸冷水化灌之百一選方竹木針刺在肉中不出疼痛以王不留行為末熟水調服方寸匕兼以根敷即出梅師方疔腫初起王不留行子為末蟾酥丸黍米大每服一丸酒下汗出即愈集簡方剪春羅綱目釋名剪紅羅集解時珍曰剪春羅二月生苗高尺余柔莖綠葉葉對生抱莖入夏開花深紅色花大如錢凡六出周迴如剪成可愛結實大如豆內有細子人家多種之為玩又有剪紅紗花莖高三尺葉旋覆夏秋開花狀如石竹花而稍大四圍如剪鮮紅可愛結穗亦如石竹穗中有細子方書不見用者計其功亦應利小便主癰腫也氣味甘寒無毒主治火帶瘡繞腰生者採花或葉搗爛蜜調塗之為末亦可時珍出證治要訣金盞草救荒校正併入宋圖經杏葉草釋名杏葉草圖經長春花時珍曰金盞其花形也長春言耐久也集解頌曰杏葉草一名金盞草生常州蔓生籬下葉葉相對秋後有子如雞頭實其中變生一小蟲脫而能行中夏採花周定王曰金盞兒花苗高四五寸葉似初生萵苣葉厚而狹抱莖而生莖柔脆莖頭開花大如指頭金黃色狀如盞子四時不絕其葉味酸炸熟水浸過油鹽拌食時珍曰夏月結實在萼內宛如尺蠖蟲數枚蟠屈之狀故蘇氏言其化蟲實非蟲也氣味酸寒無毒主治腸痔下血久不止蘇頌葶藶本經下品釋名丁歷別錄蕇蒿蕇音典大室本經大適本經狗薺郭璞時珍曰名義不可強解集解別錄曰葶藶生藁城平澤及田野立夏後採實陰乾弘景曰出彭城者最勝今近道亦有母即公薺也子細黃至苦用之當熬頌曰今汴東陝西河北州郡皆有之曹州者尤佳初春生苗葉高六七寸似薺根白色枝莖俱青三月開花微黃結角子扁小如黍粒微長黃色月令孟夏之月靡草死許慎鄭玄注皆云靡草薺葶藶之屬是也一說葶藶單莖向上葉端出角粗且短又有一種狗芥草葉近根下作歧生角細長取時必須分別此二種也斅曰凡使勿用赤鬚子真相似只是味微甘苦耳葶藶子之苦入頂也時珍曰按爾雅云蕇葶藶也郭璞注云實葉皆似薺一名狗薺然則狗薺即是葶藶矣蓋葶藶有甜苦二種狗薺味微甘即甜葶藶也或云甜葶藶是菥蓂子考其功用亦似不然子修治斅曰凡使葶藶以糯米相合置於燠上微焙待米熟去米搗用氣味辛寒無毒別錄曰苦大寒得酒良權曰酸有小毒入藥炒用杲曰沉也陰中陽也張仲景曰葶藶敷頭瘡藥氣入腦殺人之才曰榆皮為之使得酒良惡白殭蠶石龍芮時珍曰宜大棗主治癥瘕積聚結氣飲食寒熱破堅逐邪通利水道本經下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱痱癢利小腹久服令人虛別錄療肺壅上氣咳嗽止喘促除胸中痰飲開寶通月經時珍發明杲曰葶藶大降氣與辛酸同用以導腫氣本草十劑云泄可去閉葶藶大黃之屬此二味皆大苦寒一泄血閉一泄氣閉蓋葶藶之苦寒氣味俱厚不減大黃又性過於諸藥以泄陽分肺中之閉亦能泄大便為體輕象陽故也宗奭曰葶藶有甜苦二種其形則一也經既言味辛苦即甜者不復更入藥也大概治體皆以行水走泄為用故曰久服令人虛蓋取苦泄之義藥性論不當言味酸震亨曰葶藶屬火性急善逐水病人稍涉虛者宜遠之且殺人甚捷何必久服而後致虛也好古曰苦甜二味主治不同仲景瀉肺湯用苦余方或有用甜者或有不言甜苦者大抵苦則下泄甜則少緩量病人虛實用之不可不審本草雖云治同而甜苦之味安得不異時珍曰甘苦二種正如牽牛黑白二色急緩不同又如壺蘆甘苦二味良毒亦異大抵甜者下泄之性緩雖泄肺而不傷胃苦者下泄之性急既泄肺而易傷胃故以大棗輔之然肺中水氣膹滿急者非此不能除但水去則止不可過劑爾既不久服何至殺人淮南子云大戟去水葶藶愈脹用之不節乃反成病亦在用之有節附方舊十新十陽水暴腫面赤煩渴喘急小便澀其效如神甜葶藶一兩半炒研末漢防己末二兩以綠頭鴨血及頭合搗萬杵丸梧子大甚者空腹白湯下十丸輕者五丸日三四服五日止小便利為驗一加豬苓末二兩經驗方通身腫滿苦葶藶炒四兩為末棗肉和丸梧子大每服十五丸桑白皮湯下日三服此方人不甚信試之自驗水腫尿澀梅師方用甜葶藶二兩炒為末以大棗二十枚水一大升煎一小升去棗入葶藶末煎至可丸如梧子大每飲服六十丸漸加以微利為度崔氏方用葶藶三兩絹包飯上蒸熟搗萬杵丸梧子大不須蜜和每服五丸漸加至七丸以微利為佳不可多服令人不堪若氣發服之得利氣下即止此方治水氣無比蕭駙馬水腫服此得瘥外科精義治男婦大小頭面手足腫用苦葶藶炒研棗肉和丸小豆大每服十丸煎麻子湯下日三服五七日小便多則消腫也忌鹹酸生冷大腹水腫肘後方用苦葶藶二升炒為末割鵾雄雞血及頭合搗丸梧子大每小豆湯下十丸日三服又方葶藶二升春酒五升漬一夜稍服一合小便當利又方葶藶一兩杏仁二十枚並熬黃色搗分十服小便去當瘥腹脹積聚葶藶子一升熬以酒五升浸七日日服三合千金方肺濕痰喘甜葶藶炒為末棗肉丸服摘玄方痰飲咳嗽含膏丸用曹州葶藶子一兩紙襯炒令黑知母一兩貝母一兩為末棗肉半兩砂糖一兩半和丸彈子大每以新綿裹一丸含之咽津甚者不過三丸篋中方咳嗽上氣不得臥或遍體氣腫或單面腫或足腫並主之葶藶子三升微火熬研以絹袋盛浸清酒五升中冬七日夏三日初服如胡桃許大日三夜一冬月日二夜二量其氣力取微利一二為度如患急者不待日滿亦可絞服崔知悌方肺癰喘急不得臥葶藶大棗瀉肺湯主之葶藶炒黃搗末蜜丸彈子大每用大棗二十枚水三升煎取二升乃入葶藶一丸更煎取一升頓服亦主支飲不得息仲景金匱玉函方月水不通葶藶一升為末蜜丸彈子大綿裹納陰中二寸一宿易之有汁出止千金方卒發顛狂葶藶一升搗三千杵取白犬血和丸麻子大酒服一丸三服取瘥肘後頭風疼痛葶藶子為末以湯淋汁沐頭三四度即愈千金翼疳蟲蝕齒葶藶雄黃等分為末臘月豬脂和成以綿裹槐枝蘸點金匱要略白禿頭瘡葶藶末塗之子母秘錄瘰癧已潰葶藶二合豉一升搗作餅子如錢大厚二分安瘡孔上艾作炷灸之令溫熱不可破肉數易之而灸但不可灸初起之瘡恐葶藶氣入腦傷人也永類方馬汗毒氣入腹葶藶子一兩炒研水一升浸湯服取下惡血續十全方車前本經上品釋名當道本經芣苡音浮以馬舄音昔牛遺並別錄牛舌草詩疏車輪菜救荒地衣綱目蛤蟆衣別錄時珍曰按爾雅云芣苡馬舄馬舄車前陸璣詩疏云此草好生道邊及牛馬跡中故有車前當道馬舄牛遺之名舄足履也幽州人謂之牛舌草蛤蟆喜藏伏於下故江東稱為蛤蟆衣又韓詩外傳言直曰車前瞿曰芣苡恐亦強說也瞿乃生於兩旁者集解別錄曰車前生真定平澤丘陵阪道中五月五日採陰乾弘景曰人家及路邊甚多韓詩言芣苡是木似李食其實宜子孫者謬矣恭曰今出開州者勝頌曰今江湖淮甸近汴北地處處有之春初生苗葉布地如匙面累年者長及尺余中抽數莖作長穗如鼠尾花甚細密青色微赤結實如葶藶赤黑色今人五月採苗七月八月採實人家園圃或種之蜀中尤尚北人取根日乾作紫菀賣之甚誤所用陸璣言嫩苗作茹大滑今人不復啖之時珍曰王旻山居錄有種車前剪苗食法則昔人常以為蔬矣今野人猶採食之子修治時珍曰凡用須以水淘洗去泥沙曬乾入湯液炒過用入丸散則以酒浸一夜蒸熟研爛作餅曬乾焙研氣味甘寒無毒別錄曰咸權曰甘平大明曰常山為之使主治氣癃止痛利水道小便除濕痹久服輕身耐老本經男子傷中女子淋瀝不欲食養肺強陰益精令人有子明目療赤痛別錄去風毒肝中風熱毒風沖眼赤痛障翳腦痛淚出壓丹石毒去心胸煩熱甄權養肝蕭炳治婦人難產陸璣導小腸熱止暑濕瀉痢時珍發明弘景曰車前子性冷利仙經亦服餌之云令人身輕能跳越岸谷不老長生也頌曰車前子入藥最多駐景丸用車前菟絲二物蜜丸食下服古今以為奇方也好古曰車前子能利小便而不走氣與茯苓同功時珍曰按神仙服食經云車前一名地衣雷之精也服之形化八月採之今車前五月子已老而云七八月者地氣有不同爾唐張籍詩云開州午月車前子作藥人皆道有神慚愧文君憐病眼三千里外寄閒人觀此亦以五月採開州者為良又可見其治目之功大抵入服食須佐他藥如六味地黃丸之用澤瀉可也若單用則泄太過恐非久服之物歐陽公常得暴下病國醫不能治夫人買市人藥一帖進之而愈力叩其方則車前子一味為末米飲服二錢匕云此藥利水道而不動氣水道利則清濁分而谷藏自止矣附方舊六新六小便血淋作痛車前子曬乾為末每服二錢車前葉煎湯下普濟方石淋作痛車前子二升以絹袋盛水八升煮取三升服之須臾石下肘後方老人淋病身體熱甚車前子五合綿裹煮汁入青粱米四合煮粥食常服明目壽親養老書孕婦熱淋車前子五兩葵根切一升以水五升煎取一升半分三服以利為度梅師方滑胎易產車前子為末酒服方寸匕不飲酒者水調服詩云采采芣苡能令婦人樂有子也陸璣注云治婦人產難故也婦人良方橫產不出車前子末酒服二錢子母秘錄陰冷悶疼漸入囊內腫滿殺人車前子末飲服方寸匕日二服千金方隱疹入腹體腫舌強車前子末粉之良千金方陰下癢痛車前子煮汁頻洗外臺秘要久患內障車前子乾地黃麥門冬等分為末蜜丸如梧子大服之累試有效聖惠方補虛明目駐景丸治肝腎俱虛眼昏黑花或生障翳迎風有淚久服補肝腎增目力車前子熟地黃酒蒸焙各三兩菟絲子酒浸五兩為末煉蜜丸梧子大每溫酒下三十丸日二服和劑局方風熱目暗澀痛車前子宣州黃連各一兩為末食後溫酒服一錢日二服聖惠方草及根修治斅曰凡使須一窠有九葉內有蕊莖可長一尺二寸者和蕊葉根去土了稱一鎰者力全使葉勿使蕊莖銼細於新瓦上攤乾用氣味甘寒無毒土宿真君曰可伏硫黃結草砂伏五礬粉霜主治金瘡止血衄鼻瘀血血瘕下血小便赤止煩下氣除小蟲別錄主陰㿉之才葉主泄精病治尿血能補五臟明目利小便通五淋甄權發明弘景曰其葉搗汁服療泄精甚驗宗奭曰陶說大誤矣此藥甘滑利小便泄精氣有人作菜頻食小便不禁幾為所誤也附方舊四新七小便不通車前草一斤水三升煎取一升半分三服一方入冬瓜汁一方入桑葉汁百一方初生尿澀不通車前搗汁入蜜少許灌之全幼心鑑小便尿血車前草搗汁五合空心服外臺秘要鼻衄不止生車前葉搗汁飲之甚善圖經本草金瘡血出車前葉搗敷之千金方熱痢不止車前葉搗汁一盞入蜜一合煎溫服聖惠方產後血滲入大小腸車前草汁一升入蜜一合和煎一沸分二服崔氏方濕氣腰痛蛤蟆草連根七科蔥白連須七科棗七枚煮酒一瓶常服終身不發簡便方喉痹乳蛾蛤蟆衣鳳尾草擂爛入霜梅肉煮酒各少許再研絞汁以鵝翎刷患處隨手吐痰即消也趙溍養疴漫筆目赤作痛車前草自然汁調朴硝末臥時塗眼胞上次早洗去小兒目痛車前草汁和竹瀝點之聖濟總錄目中微翳車前葉枸杞葉等分手中揉汁出以桑葉兩重裹之懸陰處一夜破桑葉取點不過三五度十便良方狗舌草唐本草集解恭曰狗舌生渠塹濕地叢生葉似車前而無紋理抽莖開花黃白色四月五月採莖曝乾氣味苦寒有小毒主治蠱疥瘙瘡殺小蟲為末和塗之即瘥蘇恭馬鞭草別錄下品校正併入圖經龍牙草釋名龍牙草圖經鳳頸草恭曰穗類鞭鞘故名馬鞭藏器曰此說未近乃其節生紫花如馬鞭節耳時珍曰龍牙鳳頸皆因穗取名蘇頌圖經外類重出龍牙今併為一又今方士謬立諸草為各色龍牙之名甚為淆亂不足憑信集解弘景曰村墟陌甚多莖似細辛花紫色葉微似蓬蒿也恭曰苗似狼牙及茺蔚抽三四穗紫花似車前穗類鞭鞘都不似蓬蒿也保升曰花白色七月八月採苗葉日乾用頌曰今衡山廬山江淮州郡皆有之苗類益母而莖圓高二三尺又曰龍牙草生施州高二尺以來春夏有苗葉至秋冬而枯採根洗淨用時珍曰馬鞭下地甚多春月生苗方莖葉似益母對生夏秋開細紫花作穗如車前穗其子如蓬蒿子而細根白而小陶言葉似蓬蒿韓言花色白蘇言莖圓皆誤矣苗葉氣味苦微寒無毒保升大明曰辛涼無毒權曰苦有毒伏丹砂硫黃主治下部䘌瘡別錄症癖血瘕久瘧破血殺蟲搗爛煎取汁熬如飴每空心酒服一匕藏器治婦人血氣肚脹月候不勻通月經大明治金瘡行血活血震亨搗塗癰腫及蠼螋尿瘡男子陰腫時珍附方舊六新九瘧痰寒熱馬鞭草搗汁五合酒二合分二服千金方鼓脹煩渴身乾黑瘦馬鞭草細銼曝乾勿見火以酒或水同煮至味出去滓溫服以六月中旬雷鳴時採者有效衛生易簡方大腹水腫馬鞭草鼠尾草各十斤水一石煮取五斗去滓再煎令稠以粉和丸大豆大每服二三丸加至四五丸神效肘後方男子陰腫大如升核痛人所不能治者馬鞭草搗塗之集驗方婦人疝痛名小腸氣馬鞭草一兩酒煎滾服以湯浴身取汗甚妙纂要奇方婦人經閉結成瘕塊肋脹大欲死者馬鞭草根苗五斤銼細水五斗煎至一斗去滓熬成膏每服半匙食前溫酒化下日二服聖惠方酒積下血馬鞭草灰四錢白芷灰一錢蒸餅丸梧子大每米飲下五十丸摘玄方魚肉癥瘕凡食魚鱠及生肉在胸膈不化成癥瘕馬鞭草搗汁飲一升即消千金方馬喉痹風深腫連頰吐氣數者馬鞭草一握勿見風截去兩頭搗汁飲之良千金方乳癰腫痛馬鞭草一握酒一碗生薑一塊擂汁服渣敷之衛生易簡方白癩風瘡馬鞭草為末每服一錢食前荊芥薄荷湯下日三服忌鐵器太平聖惠方人疥馬疥馬鞭草不犯鐵器搗自然汁半盞飲盡十日內愈神效董炳集驗方赤白下痢龍牙草五錢陳茶一撮水煎服神效醫方摘要發背癰毒痛不可忍龍牙草搗汁飲之以滓敷患處集簡方楊梅惡瘡馬鞭草煎湯先熏後洗氣到便爽痛腫隨減陳嘉謨本草蒙筌根氣味辛澀溫無毒主治赤白下痢初起焙搗羅末每米飲服一錢匕無所忌蘇頌蛇含本經下品校正併入圖經紫背龍牙釋名蛇銜本經威蛇大明小龍牙綱目紫背龍牙恭曰陶氏本草作蛇合合乃含字之誤也含銜義同見古本草時珍曰按劉敬叔異苑云有田父見一蛇被傷一蛇銜一草著瘡上經日傷蛇乃去田父因取草治蛇瘡皆驗遂名曰蛇銜草也其葉似龍牙而小背紫色故俗名小龍牙又名紫背龍牙蘇頌圖經重出紫背龍牙今併為一集解別錄曰蛇含出益州山谷八月採陰乾弘景曰蛇銜處處有之有兩種並生石上亦生黃土地當用細葉有黃花者頌曰出益州今近處亦有生土石上或下濕地蜀中人家亦種之闢蛇一莖五葉或七葉有兩種八月採根陰乾日華子云莖葉俱用五月採之又曰紫背龍牙生蜀中春夏生葉採無時時珍曰此二種細葉者名蛇銜大葉者名龍銜龍銜亦入瘡膏用斅曰蛇銜只用葉曬乾勿犯火根莖不用勿誤用有蘖尖葉者號竟命草其味酸澀誤服令人吐血不止速服知時子解氣味苦微寒無毒權曰有毒頌曰紫背龍牙辛寒無毒主治驚癇寒熱邪氣除熱金瘡疽痔鼠瘻惡瘡頭瘍本經療心腹邪氣腹痛濕痹養胎利小兒別錄治小兒寒熱丹疹甄權止血協風毒癰腫赤眼汁敷蛇虺蜂毒大明紫背龍牙解一切蛇毒治咽喉中痛含咽之便效蘇頌發明藏器曰蛇含治蛇咬今以草納蛇口中縱傷人亦不能有毒也種之亦令無蛇頌曰古今治丹毒瘡腫方通用之古今錄驗治赤疹用蛇銜草搗極爛敷之即瘥赤疹由冷濕搏於肌中甚即為熱乃成赤疹天熱則劇冷則減是也時珍曰按葛洪抱朴子云蛇銜膏連已斷之指今考葛洪肘後方載蛇銜膏云治癰腫瘀血產後積血耳目諸病牛領馬鞍瘡用蛇銜大黃附子芍藥大戟細辛獨活黃芩當歸莽草蜀椒各一兩薤白十四枚上為末以苦酒淹一宿以豬膏二斤七星火上煎沸成膏收之每溫酒服一彈丸日再服病在外摩之敷之在耳綿裹塞之在目點之若入龍銜藤一兩則名龍銜膏也所謂連斷指者不知即此膏否附方舊三新一產後瀉痢小龍牙根一握濃煎服之甚效即蛇含是也斗門方金瘡出血蛇含草搗敷之肘後方身面惡癬紫背草入生礬研敷二三次斷根直指方蜈蚣蠍傷蛇銜挼敷之古今錄驗女青本經下品釋名雀瓢本經集解別錄曰女青蛇銜根也生朱崖八月採陰乾弘景曰若是蛇銜根不應獨生朱崖俗用者是草葉別是一物未詳孰是術云帶此屑一兩則疫癘不犯彌宜識真者又云今市人用一種根形狀如續斷莖葉至苦乃云是女青根出荊州恭曰此草即雀瓢也生平澤葉似蘿摩兩葉相對子似瓢形大如棗許故名雀瓢根似白薇莖葉並臭其蛇銜都非其類又別錄云葉嫩時似蘿摩圓端大莖實黑莖葉汁黃白亦與前說相似若是蛇銜根何得苗生益州根在朱崖相去萬里余也蘿摩葉似女青故亦名雀瓢藏器曰蘿摩是白環藤雀瓢是女青二物相似不能分別終非一物也機曰蘿摩以子言女青以根言蛇銜以苗言三者氣味功用大有不同諸注因其同名雀瓢而疑為一物又因其各出州郡而復疑為二物本草明言女青是蛇銜根豈可以根苗異地而致疑如靡蕪芎藭所產不同亦將分為二物乎如赤箭徐長卿同名鬼督郵亦將合為一物耶時珍曰女青有二一是藤生乃蘇恭所說似蘿摩者一種草生則蛇銜根也蛇銜有大小二種葉細者蛇銜用苗莖葉大者為龍銜用根故王燾外臺秘要龍銜膏用龍銜根煎膏治癰腫金瘡者即此女青也陳藏器言女青蘿摩不能分別張揖廣雅言女青是葛類皆指藤生女青非此女青也別錄明說女青是蛇銜根一言可據諸家止因其生朱崖致疑非矣方土各有相傳不同爾況又不知有兩女青乎又羅浮山記云山有男青似女青此則不知是草生藤生者也根氣味辛平有毒權曰苦無毒蛇銜為使主治蠱毒逐邪惡氣殺鬼溫瘧闢不祥本經附方舊三人卒暴死搗女青屑一錢安咽中以水或酒送下立活也南嶽魏夫人內傳吐利卒死及大人小兒卒腹皮青黑赤不能喘息即急用女青末納口中酒送下子母秘錄闢禳瘟疫正月上寅日搗女青末三角絳囊盛系帳中大吉肘後方鼠尾草別錄下品釋名葝音勍山陵翹吳普烏草拾遺水青拾遺時珍曰鼠尾以穗形命名爾雅云葝鼠尾也可以染皂故名烏草又曰水青蘇頌圖經謂鼠尾一名陵時者乃陵翹之誤也集解別錄曰鼠尾生平澤中四月採葉七月採花陰乾弘景曰田野甚多人採作滋染皂保升曰所在下濕地有之惟黔中人採為藥葉如蒿莖端夏生四五穗穗若車前花有赤白二種藏器曰紫花莖葉俱可染皂用花葉氣味苦微寒無毒藏器曰平主治鼠瘻寒熱下痢膿血不止白花者主白下赤花者主赤下別錄主瘧疾水蠱時珍發明弘景曰古方療痢多用之當濃煮令可丸服之或煎如飴服今人亦用作飲或末服亦得日三服附方舊一新二大腹水蠱方見馬鞭草下久痢休息時止時作鼠尾草花搗末飲服一錢聖惠方下血連年鼠尾草地榆各二兩水二升煮一升頓服二十年者不過再服亦可為末飲服之千金方反花惡瘡內生惡肉如飯粒破之血出隨生反出於外鼠尾草根切同豬脂搗敷聖濟總錄狼把草宋開寶校正併入拾遺郎耶草釋名郎耶草時珍曰此即陳藏器本草郎耶草也閩人呼爺為郎罷則狼把當作郎罷乃通又方士言此草即鼠尾草功用亦近之但無的據耳集解藏器曰狼把草生山道旁與秋穗子並可染皂又曰郎耶草生山澤間高三四尺葉似雁齒如鬼針苗鬼針即鬼釵也其葉有丫如釵腳狀禹錫曰狼把草出近世古方未見用者惟陳藏器言之而不詳太宗皇帝御書記其主療血痢甚為精至謹用書於本草圖經外類篇首氣味苦平無毒主治黑人發令人不老又云郎耶草主赤白久痢小兒大腹痞滿丹毒寒熱取根莖煮汁服藏器狼把草主丈夫血痢不療婦人根治積年疳痢取草二斤搗絞取汁一小升納白麵半雞子許和勻空腹頓服極重者不過三服或收苗陰乾搗末蜜水半盞服一方寸匕圖經可染鬚髮治積年癬天陰即癢搔出黃水者搗末摻之時珍狗尾草綱目釋名莠音酉光明草綱目阿羅漢草時珍曰莠草秀而不實故字從秀穗形象狗尾故俗名狗尾其莖治目痛故方士稱為光明草阿羅漢草集解時珍曰原野垣牆多生之苗葉似粟而小其穗亦似粟黃白色而無實採莖筒盛以治目病惡莠之亂苗即此也莖主治疣目貫發穿之即干滅也凡赤眼拳毛倒睫者翻轉目瞼以一二莖蘸水戛去惡血甚良時珍鱧腸唐本草釋名蓮子草唐本旱蓮草圖經金陵草圖經墨菸草綱目墨頭草綱目墨菜綱目猢孫頭必用豬牙草時珍曰鱧烏魚也其腸亦烏此草柔莖斷之有墨汁出故名俗呼墨菜是也細實頗如蓮房狀故得蓮名集解恭曰鱧腸生下濕地所在坑渠間多有苗似旋覆二月八月採陰乾頌曰處處有之南方尤多此有二種一種葉似柳而光澤莖似馬齒莧高一二尺開花細而白其實若小蓮房蘇恭謂似旋覆者是也一種苗梗枯瘦頗似蓮花而黃色實亦作房而圓南人謂之連翹者二種折其苗皆有汁出須臾而黑俗謂之旱蓮子亦謂之金陵草時珍曰旱蓮有二種一種苗似旋覆而花白細者是鱧腸一種花黃紫而結房如蓮房者乃是小蓮翹也爐火家亦用之見連翹條草氣味甘酸平無毒主治血痢針灸瘡發洪血不可止者敷之立已汁塗眉發生速而繁唐本烏髭發益腎陰時珍止血排膿通小腸敷一切瘡並蠶瘑大明膏點鼻中添腦蕭炳附方舊一新十一金陵煎益髭發變白為黑金陵草一秤六月以後收採揀青嫩無泥土者不用洗摘去黃葉爛搗新布絞取汁以紗絹濾過入通油器缽盛之日中煎五日又取生薑一斤絞汁白蜜一斤合和日中煎以柳本篦攪勿停手待如稀餳藥乃成矣每旦日及午後各服一匙以溫酒一盞化下如欲作丸日中再煎令可丸大如梧子每服三十丸及時多合為佳其效甚速孫真人千金月令方烏須固齒攝生妙用方七月取旱蓮草連根一斤用無灰酒洗淨青鹽四兩醃三宿同汁入油鍋中炒存性研末日用擦牙連津咽之又法旱蓮取汁同鹽煉乾研末擦牙壽親養老新書旱蓮散烏髭固牙溫尉云納合相公用此方年七十鬚髮不白懇求始得後遇張經歷朝請始傳分兩也旱蓮草一兩半麻枯餅三兩升麻青鹽各三兩半訶子連核二十個皂角三梃月蠶砂二兩為末薄醋麵糊丸彈子大曬乾入泥瓶中火煨令煙出存性取出研末日用揩牙偏正頭痛鱧腸草汁滴鼻中聖濟總錄一切眼疾翳膜遮障涼腦治頭痛能生髮五月五日平旦合之蓮子草一握藍葉一握油一斤同浸密封四十九日每臥時以鐵匙點藥摩頂上四十九遍久久甚佳聖濟總錄係臂截瘧旱蓮草捶爛男左女右置寸口上以古文錢壓定帛繫住良久起小泡謂之天灸其瘧即止甚效王執中資生經小便溺血金陵草一名墨頭草車前草各等分杵取自然汁每空心服三杯愈乃止醫學正傳腸風臟毒下血不止旱蓮子草瓦上焙研末每服二錢米飲下家藏經驗方痔漏瘡發旱蓮草一把連根鬚洗淨用石臼擂如泥以極熱酒一盞衝入取汁飲之滓敷患處重者不過三服即安太僕少卿王鳴鳳患此策杖方能移步服之得瘥累治有驗劉松石保壽堂方疔瘡惡腫五月五日收旱蓮草陰乾仍露一夜收遇疾時嚼一葉貼上外以消毒膏護之二三日疔脫聖濟總錄風牙疼痛猢孫頭草入鹽少許於掌心揉擦即止集玄方連翹本經下品校正併入有名未用本經翹根釋名連爾雅異翹爾雅旱蓮子藥性蘭華本經三廉本經根名連軺仲景折根本經恭曰其實似蓮作房翹出眾草故名宗奭曰連翹亦不翹出眾草太山山谷間甚多其子折之片片相比如翹應以此得名耳時珍曰按爾雅云連異翹則是本名連又名異翹人因合稱為連翹矣連軺亦作連苕即本經下品翹根是也唐蘇恭修本草退入有名未用中今併為一旱蓮乃小翹人以為鱧腸者故同名集解別錄曰連翹生太山山谷八月採陰乾弘景曰處處有之今用莖連花實恭曰此物有兩種大翹小翹大翹生下濕地葉狹長如水蘇花黃可愛著子似椿實之未開者作房翹出眾草其小翹生岡原之上葉花實皆似大翹而小細山南人並用之今長安惟用大翹子不用莖花也頌曰今近汴京及河中江寧潤淄澤兗鼎岳利諸州南康軍皆有之有大小二種大翹生下濕地或山岡上青葉狹長如榆葉水蘇輩莖赤色高三四尺獨莖梢間開花黃色秋結實似蓮內作房瓣根黃如蒿根八月採房其小翹生岡原之上花葉實皆似大翹而細南方生者葉狹而小莖短才高一二尺花亦黃實房黃黑內含黑子如粟粒亦名旱蓮南人用花葉今南方醫家說云連翹有兩種一種似椿實之未開者殼小堅而外完無跗萼剖之則中解氣甚芳馥其實才干振之皆落不著莖也一種乃如菡萏殼柔外有跗萼抱之而無解脈亦無香氣干之雖久著莖不脫此甚相異此種江南下澤間極多如椿實者乃自蜀中來入用勝似江南者據本草則亦當蜀中者為勝然未見其莖葉也氣味苦平無毒元素曰性涼味苦氣味俱薄輕清而浮升也陽也手搓用之好古曰陰中陽也入手足少陽手陽明經又入手少陰經時珍曰微苦辛主治寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒本經去白蟲別錄通利五淋小便不通除心家客熱甄權通小腸排膿治瘡癤止痛通月經大明散諸經血結氣聚消腫李杲瀉心火除脾胃濕熱治中部血證以為使震亨治耳聾渾渾焞焞好古發明元素曰連翹之用有三瀉心經客熱一也去上焦諸熱二也為瘡家聖藥三也杲曰十二經瘡藥中不可無此乃結者散之之義好古曰手足少陽之藥治瘡瘍瘤癭結核有神與柴胡同功但分氣血之異爾與鼠黏子同用治瘡瘍別有神功時珍曰連翹狀似人心兩片合成其中有仁甚香乃少陰心經厥陰包絡氣分主藥也諸痛癢瘡瘍皆屬心火故為十二經瘡家聖藥而兼治手足少陽手陽明三經氣分之熱也附方舊一新二瘰癧結核連翹脂麻等分為末時時食之簡便方項邊馬刀屬少陽經用連翹二斤瞿麥一斤大黃三兩甘草半兩每用一兩以水一碗半煎七分食後熱服十餘日後灸臨泣穴二七壯六十日決效張潔古活法機要痔瘡腫痛連翹煎湯熏洗後以刀上飛過綠礬入麝香貼之集驗方莖葉主治心肺積熱時珍翹根氣味甘寒平有小毒普曰神農雷公甘有毒李當之苦好古曰苦寒主治下熱氣益陰精令人面悅好明目久服輕身耐老本經以作蒸飲酒病人別錄治傷寒瘀熱欲發黃時珍發明本經曰翹根生嵩高平澤二月八月採弘景曰方藥不用人無識者好古曰此即連翹根也能下熱氣故張仲景治傷寒瘀熱在裡麻黃連軺赤小豆湯用之注云即連翹根也附方新一癰疽腫毒連翹草及根各一升水一斗六升煮汁三升服取汗外臺秘要陸英本經下品釋名解見下文集解別錄曰陸英生熊耳川穀及冤句立秋採恭曰此即蒴藋也古方無蒴藋惟言陸英後人不識浪出蒴藋條此葉似芹及接骨花三物亦同一類故芹名水英此名陸英接骨樹名木英此三英也花葉並相似志曰蘇恭以陸英蒴藋為一物今詳陸英味苦寒無毒蒴藋味酸溫有毒既此不同難謂一種蓋其類爾宗奭曰蒴藋與陸英性味及出產皆不同治療又別自是二物斷無疑矣頌曰本草陸英生熊耳川穀及冤句蒴藋不載所出州土但云生田野今所在有之春抽苗莖有節節間生枝葉大似水芹春夏採葉秋冬採根莖陶蘇皆以為一物馬志以性味不同疑非一種亦不能細別但爾雅木謂之華草謂之榮不榮而實謂之秀榮而不實謂之英此物既有英名當是其花故本經云立秋採正是其花時也時珍曰陶蘇本草甄權藥性論皆言陸英即蒴藋必有所據馬志寇宗奭雖破其說而無的據仍當是一物分根莖花葉用如蘇頌所云也氣味苦寒無毒權曰陸英一名蒴藋味苦辛有小毒主治骨間諸痹四肢拘攣疼酸膝寒痛陰痿短氣不足腳腫本經能捋風毒腳氣上衝心煩悶絕水氣虛腫風瘙皮肌惡癢煎湯入少酒浴之妙甄權蒴藋音朔吊別錄下品釋名堇草別錄芨別錄接骨草集解別錄曰蒴藋生田野春夏採葉秋冬採莖根弘景曰田野墟村甚多恭曰此陸英也剩出此條爾雅云芨堇草郭璞注云烏頭苗也檢三堇別名亦無此者別錄言此一名堇草不知所出處宗奭曰蒴藋花白子初青如綠豆顆每朵如盞面大又平生有一二百子十月方熟紅時珍曰每枝五葉說見陸英下氣味酸溫有毒大明曰苦涼有毒主治風瘙隱疹身癢濕痹可作浴湯別錄浴瘑癩風痹大明附方舊十二新七手足偏風蒴藋葉火燎厚鋪床上趁熱眠於上冷復易之冬月取根舂碎熬熱用外臺秘要風濕冷痹方同上寒濕腰痛方同上腳氣脛腫骨疼蒴藋根研碎和酒糟三分根一分合蒸熱封裹腫上日二即消亦治不仁千金方渾身水腫坐臥不得取蒴藋根去皮搗汁一合和酒一合暖服當微吐利梅師方頭風作痛蒴藋根二升酒二升煮服汗出止千金方頭風旋暈起倒無定蒴藋獨活白石膏各一兩枳實炒七錢半每服三錢酒一盞煎六分服聖惠方產後血暈心悶煩熱用接骨草即蒴藋破如算子一握水一升煎半升分二服或小便出血者服之亦瘥衛生易簡方產後惡露不除續骨木二十兩銼水一斗煮三升分三服即下千金方瘧疾不止蒴藋一大握炙令黃色以水濃煎一盞欲發前服斗門方卒暴症塊堅如石作痛欲死取蒴藋根一小束洗淨細擘以酒二升漬三宿溫服五合至一升日三服若欲速用於熱灰中溫出藥味服之此方無毒已愈十六人矣神驗藥盡再作之古今錄驗鱉瘕堅硬腫起如盆眠臥不得蒴藋根白皮一握搗汁和水服千金方下部閉塞蒴藋根一把搗汁水和絞去滓強人每服一升外臺秘要一切風疹蒴藋煮湯和少酒塗之無不瘥梅師方小兒赤遊上下游行至心即死蒴藋煎汁洗之子母秘錄五色丹毒蒴藋葉搗敷之千金方癰腫惡肉不消者蒴藋灰石灰各淋取汁合煎如膏敷之能蝕惡肉亦去痣疵此藥過十日即不中用也千金方手足疣目蒴藋赤子揉爛塗目上聖惠方熊羆傷人蒴藋一大把以水一升漬須臾取汁飲以滓封之張文仲備急方水英宋圖經釋名魚津草頌曰唐天寶單方圖言此草原生永陽池澤及河海邊臨汝人呼為牛葒草河北信都人名水節河內連內黃呼為水棘劍南遂寧等郡名龍移草淮南諸郡名海荏嶺南亦有土地尤宜莖葉肥大名海精木亦名魚津草時珍曰此草不著形狀氣味無以考證芹菜亦名水英不知是此否也氣味苦寒無毒主治骨風蘇頌發明頌曰蜀人採其花合面藥凡丈夫婦人無故兩腳腫滿連膝脛中痛屈申急強者名骨風其疾不宜針灸及服藥惟每日取此草五斤以水一石煮三斗及熱浸腳並淋膝上日夜三四度不經五日即瘥數用神驗其藥春取苗夏採葉及花秋冬用根腫甚者加生椒目三升水二斗用畢即摩粉避風忌油膩生菜豬魚等物藍本經上品釋名時珍曰按陸佃埤雅云月令仲夏令民無刈藍以染鄭玄言恐傷長養之氣也然則刈藍先王有禁制字從監以此故也集解別錄曰藍實生河內平澤其莖葉可以染青弘景曰此即今染䌝碧所用者以尖葉者為勝恭曰藍有三種一種葉圍徑二寸許厚三四分者堪染青出嶺南太常名為木藍子陶氏所說乃是菘藍其汁抨為澱甚青者本經所用乃是蓼藍實也其苗似蓼而味不辛不堪為澱惟作碧色爾頌曰藍處處有之人家蔬圃作畦種至三月四月生苗高三二尺許葉似水蓼花紅白色實亦若蓼子而大黑色五月六月採實但可染碧不堪作澱此名蓼藍即醫方所用者也別有木藍出嶺南不入藥有菘藍可為澱亦名馬藍爾雅所謂葴馬藍是也又福州一種馬藍四時俱有葉類苦蕒菜土人連根採服治敗血江寧一種吳藍二月內生如蒿葉青花白亦解熱毒此二種雖不類而俱有藍名且古方多用吳藍或恐是此故並附之宗奭曰藍實即大藍實也謂之蓼藍者非是乃爾雅所謂馬藍者解諸藥毒不可闕也實與葉兩用注不解實只解葉為未盡時珍曰藍凡五種各有主治惟藍實專取蓼藍者蓼藍葉如蓼五六月開花成穗細小淺紅色子亦如蓼歲可三刈故先王禁之菘藍葉如白菘馬藍葉如苦蕒即郭璞所謂大葉冬藍俗中所謂板藍者二藍花子並如蓼藍吳藍長莖如蒿而花白吳人種之木藍長莖如決明高者三四尺分枝布葉葉如槐葉七月開淡紅花結角長寸許累累如小豆角其子亦如馬蹄決明子而微小迥與諸藍不同而作澱則一也別有甘藍可食見本條蘇恭以馬藍為木藍蘇頌以菘藍為馬藍宗奭以藍實為大葉藍之實皆非矣今並開列於下藍實氣味苦寒無毒權曰甘主治解諸毒殺蠱蚑疰鬼螫毒久服頭不白輕身本經蚑音其小兒鬼也填骨髓明耳目利五臟調六腑通關節治經絡中結氣使人健少睡益心力甄權療毒腫蘇頌藍葉汁此蓼藍也氣味苦甘寒無毒主治殺百藥毒解狼毒射罔毒別錄弘景曰解毒不得生藍汁以青䌝布漬汁亦善汁塗五心止煩悶療蜂螫毒弘景斑蝥芫青樗雞毒硃砂砒石毒時珍馬藍主治婦人敗血連根焙搗下篩酒服一錢匕蘇頌吳藍氣味苦甘冷無毒主治寒熱頭痛赤眼天行熱狂疔瘡遊風熱毒腫毒風疹除煩止渴殺疳解毒藥毒箭金瘡血悶毒刺蟲蛇傷鼻衄吐血排膿產後血暈小兒壯熱解金石藥毒狼毒射罔毒大明發明震亨曰藍屬水能使敗血分歸經絡時珍曰諸藍形雖不同而性味不遠故能解毒除熱惟木藍葉力似少劣藍子則專用蓼藍者也至於用澱與青布則是刈藍浸水入石灰澄成者性味不能不少異不可與藍汁一概論也有人病嘔吐服玉壺諸丸不效用藍汁入口即定蓋亦取其殺蟲降火爾如此之類不可不知頌曰藍汁治蟲豸傷劉禹錫傳信方著其法云取大藍汁一碗入雄黃麝香二物少許以點咬處仍細服其汁神異之極也張薦員外在劍南為張延賞判官忽被斑蜘蛛咬項上一宿咬處有二道赤色細如箸繞項上從胸前下至心經兩宿頭面腫痛大如數升碗肚漸腫幾至不救張公出錢五百千並薦家財又數百千募能療者忽一人應召云可治張公甚不信之欲驗其方其人云不惜方但療人性命爾遂取大藍汁一碗以蜘蛛投之至汁而死又取藍汁加麝香雄黃更以一蛛投入隨化為水張公因甚異之遂令點於咬處兩日悉平作小瘡而愈附方舊十新七小兒赤痢搗青藍汁二升分四服子母秘錄小兒中蠱下血欲死搗青藍汁頻服之聖惠方陰陽易病傷寒初愈交合陰陽必病拘急手足拳小腹急熱頭不能舉名陰陽易當汗之滿四日難治藍一把雄鼠屎三十枚水煎服取汗肘後方驚癇發熱干藍凝水石等分為末水調敷頭上聖惠方上氣咳嗽呷呀息氣喉中作聲唾黏以藍葉水浸搗汁一升空腹頻服須臾以杏仁研汁煮粥食之一兩日將息依前法更服吐痰盡方瘥梅師方飛血赤目熱痛干藍葉切二升車前草半兩淡竹葉切三握水四升煎二升去滓溫洗冷即再暖以瘥為度聖濟總錄腹中鱉症藍葉一斤搗以水三升絞汁服一升日二次千金方應聲蟲病腹中有物作聲隨人語言名應聲蟲病用板藍汁一盞分五服效夏子益奇疾方卒中水毒搗藍青汁敷頭身令匝肘後方服藥過劑煩悶及中毒煩悶欲死搗藍汁服數升肘後方卒自縊死以藍汁灌之千金方毒箭傷人藍青搗飲並敷之如無藍以青布漬汁飲肘後方唇邊生瘡連年不瘥以八月藍葉一斤搗汁洗之不過三度瘥千金方齒䘌腫痛紫藍燒灰敷之日五度廣濟方白頭禿瘡糞藍煎汁頻洗聖濟錄天泡熱瘡藍葉搗敷之良集簡方瘡疹不快板藍根一兩甘草一分為末每服半錢或一錢取雄雞冠血三二點同溫酒少許調下錢氏小兒方藍澱綱目釋名時珍曰澱石殿也其滓澄殿在下也亦作澱俗作靛南人掘地作坑以藍浸水一宿入石灰攪至千下澄去水則青黑色亦可干收用染青碧其攪起浮沫掠出陰乾謂之靛花即青黛見下氣味辛苦寒無毒主治解諸毒敷熱瘡小兒禿瘡熱腫藏器止血殺蟲治噎膈時珍發明時珍曰澱乃藍與石灰作成其氣味與藍稍有不同而其止血拔毒殺蟲之功似勝於藍按廣五行記云唐永徽中絳州一僧病噎不下食數年臨終命其徒曰吾死後可開吾胸喉視有何物苦我如此及死其徒依命開視胸中得一物形似魚而有兩頭遍體悉似肉鱗安缽中跳躍不已戲投諸味雖不見食皆化為水又投諸毒物亦皆銷化一僧方作藍澱因以少澱投之即怖懼奔走須臾化成水世傳澱水能治噎疾蓋本於此今方士或以染缸水飲人治噎膈皆取其殺蟲也附方舊三新一時行熱毒心神煩躁用藍澱一匙新汲水一盞服聖惠方小兒熱丹藍澱敷之子母秘錄方口鼻急疳數日欲死以藍澱敷之令遍日十度夜四度千金翼誤吞水蛭青靛調水飲即瀉出普濟方青黛宋開寶釋名靛花綱目青蛤粉時珍曰黛眉色也劉熙釋名云滅去眉毛以此代之故謂之黛集解志曰青黛從波斯國來今以太原並廬陵南康等處染澱甕上沫紫碧色者用之與青黛同功時珍曰波斯青黛亦是外國藍靛花既不可得則中國靛花亦可用或不得已用青布浸汁代之貨者復以干澱充之然有石灰入服餌藥中當詳之氣味咸寒無毒權曰甘平主治解諸藥毒小兒諸熱驚癇發熱天行頭痛寒熱並水研服之亦磨敷熱瘡惡腫金瘡下血蛇犬等毒開寶解小兒疳熱殺蟲甄權小兒丹熱和水服之同雞子白大黃末敷瘡癰蛇虺螫毒藏器瀉肝散五臟鬱火解熱消食積震亨去熱煩吐血咯血斑瘡陰瘡殺惡蟲時珍發明宗奭曰青黛乃藍為之者有一婦人患臍下腹上下連二陰遍生濕瘡狀如馬爪瘡他處並無熱癢而痛大小便澀出黃汁食亦減身面微腫醫作惡瘡治用鰻鱺魚松脂黃丹之藥塗之熱痛甚問其人嗜酒食喜魚蟹發風等物急令洗其膏藥以馬齒莧四兩杵爛入青黛一兩再研勻塗之即時熱減痛癢皆去仍以八正散日三服之分敗客熱藥干即上如此二日減三分之一五日減三分之二二十日愈此蓋中下焦蓄風熱毒氣也若不出當作腸癰內痔仍須禁酒色發風物然不能禁後果患內痔附方舊三新十心口熱痛薑汁調青黛一錢服之醫學正傳內熱吐血青黛二錢新汲水下聖惠方肺熱咯血青餅子用青黛一兩杏仁以牡蠣粉炒過一兩研勻黃蠟化和作三十餅子每服一餅以乾柿半個夾定濕紙裹煨香嚼食粥飲送下日三服華佗中藏經小兒驚癇青黛量大小水研服之生生編小兒夜啼方同上小兒疳痢宮氣方歌云孩兒雜病變成疳不問強羸女與男煩熱毛焦鼻口燥皮膚枯槁四肢癱腹中時時更下痢青黃赤白一般般眼澀面黃鼻孔赤穀道開張不可看此方便是青黛散孩兒百病服之安耳疳出汁青黛黃柏末干搽談野翁方爛弦風眼青黛黃連泡湯日洗明目方產後發狂四物湯加青黛水煎服摘玄傷寒赤斑青黛二錢水研服活人書豌豆瘡毒未成膿者波斯青黛一棗許水研服梅師方瘰癧未穿靛花馬齒莧同搗日日塗敷取效簡便方諸毒蟲傷青黛雄黃等分研末新汲水服二錢古今錄驗附錄雀翹別錄有名未用曰味鹹益氣明目生藍中葉細黃莖赤有刺四月實銳黃中黑五月採陰乾一名去母一名更生甘藍拾遺校正自菜部移入此釋名藍菜千金集解藏器曰此是西土藍也葉闊可食時珍曰此亦大葉冬藍之類也按胡洽居士云河東隴西羌胡多種食之漢地少有其葉長大而厚煮食甘美經冬不死春亦有英其花黃生角結子其功與藍相近也氣味甘平無毒主治久食大益腎填髓腦利五臟六腑利關節通經絡中結氣去心下結伏氣明耳目健人少睡益心力壯筋骨作菹經宿色黃和鹽食治黃毒藏器子主治人多睡思邈蓼本經中品校正自菜部移入此釋名時珍曰蓼類皆高揚故字從翏音料高飛貌集解別錄曰蓼實生雷澤川澤弘景曰此類多人所食有三種一是青蓼人家常用其葉有圓有尖以圓者為勝所用即此也一是紫蓼相似而紫色一是香蓼相似而香並不甚辛好食保升曰蓼類甚多有青蓼香蓼水蓼馬蓼紫蓼赤蓼木蓼七種紫赤二蓼葉小狹而厚青香二蓼葉亦相似而俱薄馬水二蓼葉俱闊大上有黑點木蓼一名天蓼蔓生葉似柘葉六蓼花皆紅白子皆大如胡麻赤黑而尖扁惟木蓼花黃白子皮青滑諸蓼並冬死惟香蓼宿根重生可為生菜頌曰木蓼亦有大小二種皆蔓生陶氏以青蓼入藥余亦無用三茅君傳有作白蓼醬方藥譜無白蓼疑即青蓼也宗奭曰蓼實即草部下品水蓼之子也彼言水蓼是用莖此言蓼實是用子也春初以壺蘆盛水浸濕高掛火上日夜使暖遂生紅芽取為蔬以備五辛盤時珍曰韓保升所說甚明古人種蓼為蔬收子入藥故禮記烹雞豚魚鱉皆實蓼於其腹中而和羹膾亦須切蓼也後世飲食不用人亦不復栽惟造酒麴者用其汁耳今但以平澤所生香蓼青蓼紫蓼為良實氣味辛溫無毒詵曰多食吐水壅氣損陽主治明目溫中耐風寒下水氣面目浮腫癰瘍本經歸鼻除腎氣去癧瘍止霍亂治小兒頭瘡甄權附方舊二新二傷寒勞復因交後卵腫或縮入腹痛蓼子一把水挼汁飲一升肘後方霍亂煩渴蓼子一兩香薷二兩每服二錢水煎服聖濟錄小兒頭瘡蓼子為末蜜和雞子白同塗之蟲出不作痕藥性論蝸牛咬毒毒行遍身者蓼子煎水浸之立愈不可近陰令弱也陳藏器本草苗葉氣味辛溫無毒思邈曰黃帝云食蓼過多有毒發心痛和生魚食令人脫氣陰核痛求死二月食蓼傷人腎扁鵲云久食令人寒熱損髓減氣少精婦人月事來時食蓼蒜喜為淋與大麥面相宜主治歸舌除大小腸邪氣利中益志別錄干之釀酒主風冷大良弘景作生菜食能入腰腳煮湯捋腳治霍亂轉筋煮汁日飲治痃癖搗爛敷狐尿瘡藏器腳暴軟赤蓼燒灰淋汁浸之以桑葉蒸罯立愈大明殺蟲伏砒時珍附方舊四新三蓼汁酒治胃脘冷不能飲食耳目不聰明四肢有氣冬臥足冷八月三日取蓼日乾如五升大六十把水六石煮取一石去滓拌米飯如造酒法待熟日飲之十日後目明氣壯也千金方肝虛轉筋吐瀉赤蓼莖葉切三合水一盞酒三合煎至四合分二服聖惠方霍亂轉筋蓼葉一升水三升煮取汁二升入香豉一升更煮一升半分三服藥性論夏月暍死濃煮蓼汁一盞服外臺小兒冷痢蓼葉搗汁服千金血氣攻心痛不可忍蓼根洗銼浸酒飲斗門惡犬咬傷蓼葉搗泥敷肘後水蓼唐本草釋名虞蓼爾雅澤蓼志曰生於淺水澤中故名水蓼時珍曰按爾雅云薔虞蓼也山夾水曰虞集解恭曰水蓼生下濕水旁葉似馬蓼大於家蓼莖赤色水挼食之勝於蓼子宗奭曰水蓼大概與水葒相似但枝低耳今造酒取葉以水浸汁和麵作曲亦取其辛耳時珍曰此乃水際所生之蓼葉長五六寸比水葒葉稍狹比家蓼葉稍大而功用彷彿故寇氏謂蓼實即水蓼之子者以此故莖葉氣味辛無毒大明曰冷主治蛇傷搗敷之絞汁服之止蛇毒入腹心悶又治腳氣腫痛成瘡水煮汁漬捋之唐本馬蓼綱目釋名大蓼綱目墨記草時珍曰凡物大者皆以馬名之俗呼大蓼是也高四五尺有大小二種但每葉中間有黑跡如墨點記故方士呼為墨記草集解弘景曰馬蓼生下濕地莖斑葉大有黑點亦有二三種其最大者名蘢薣即水葒也莖葉氣味辛溫無毒時珍曰伏丹砂雌黃主治去腸中蛭蟲輕身本經葒草別錄中品校正併入有名未用別錄天蓼釋名鴻䕵音纈蘢古一作鼓游龍詩經石龍別錄天蓼別錄大蓼時珍曰此蓼甚大而花亦繁紅故曰葒曰鴻鴻亦大也別錄有名未用草部中有天蓼云一名石龍生水中陳藏器解云天蓼即水葒一名游龍一名大蓼據此則二條乃一指其實一指莖葉而言也今併為一集解別錄曰葒生水旁如馬蓼而大五月採實弘景曰今生下濕地甚多極似馬蓼而甚長大詩稱隰有游龍郭璞云即蘢古也頌曰葒即水葒也似蓼而葉大赤白色高丈餘爾雅云葒蘢古其大者蘬音詭陸璣云游龍一名馬蓼然馬蓼自是一種也時珍曰其莖粗如拇指有毛其葉大如商陸花色淺紅成穗秋深子成扁如酸棗仁而小其色赤黑而肉白不甚辛炊炒可食實氣味咸微寒無毒主治消渴去熱明目益氣別錄附方舊一新一瘰癧水葒子不以多少一半微炒一半生用同研末食後好酒調服二錢日三服已破者亦治久則效效則止寇宗奭本草衍義癖痞腹脹及堅硬如杯碗者用水葒花子一升另研獨顆蒜三十個去皮新狗腦一個皮硝四兩石臼搗爛攤在患處上用油紙以長帛束之酉時貼之次日辰時取之未效再貼二三次倘有膿潰勿怪仍看虛實日逐間服錢氏白餅子紫霜丸塌氣丸消積丸利之磨之服至半月甚者一月無不瘥矣以喘滿者為實不喘者為虛藺氏經驗方花主治散血消積止痛時珍附方新三胃脘血氣作痛水葒花一大撮水二鍾煎一鍾服百戶毛菊莊屢驗方也董炳避水集驗方心氣㽲痛水葒花為末熱酒服二錢又法男用酒水各半煎服女用醋水各半煎服一婦年三十病此一服立效摘玄方腹中痞積水葒花或子一碗以水三碗用桑柴文武火煎成膏量痞大小攤貼仍以酒調膏服忌腥葷油膩之物劉松石保壽堂方天蓼別錄時珍曰此指莖葉也氣味辛有毒主治惡瘡去痹氣別錄根莖除惡瘡腫水氣腳氣煮濃汁漬之蘇頌附方新一生肌肉水葒花根煎湯淋洗仍以其葉曬乾研末撒瘡上每日一次談野翁試驗方毛蓼拾遺集解藏器曰毛蓼生山足似馬蓼葉上有毛冬根不死時珍曰此即蓼之生於山麓者非澤隰之蓼也莖葉氣味辛溫有毒主治癰腫疽瘻瘰癧杵碎納瘡中引膿血生肌亦作湯洗瘡兼濯足治腳氣藏器海根拾遺集解藏器曰生會稽海畔山谷莖赤葉似馬蓼根似菝葜而小胡人蒸而用之也根氣味苦小溫無毒主治霍亂中惡心腹痛鬼氣疰忤飛屍喉痹蠱毒癰疽惡腫赤白遊疹蛇咬犬毒酒及水磨服並敷之藏器火炭母草宋圖經集解頌曰生南恩州原野中莖赤而柔似細蓼葉端尖近梗形方夏有白花秋實如菽青黑色葉甘可食葉氣味酸平有毒主治去皮膚風熱流注骨節癰腫疼痛不拘時採於垍器中搗爛以鹽酒炒敷腫痛處經宿一易之蘇頌三白草唐本草釋名弘景曰葉上有三白點俗因以名又見下集解恭曰三白草生池澤畔高尺許葉似水葒亦似蕺又似菝葜葉上有三黑點非白也古人秘之隱黑為白爾根如芹根黃白色而粗大藏器曰此草初生無白入夏葉端半白如粉農人候之蒔田三葉白則草便秀故謂之三白若云三黑點蘇未識矣其葉如薯蕷亦不似水葒保升曰今出襄州二月八月採根用時珍曰三白草生田澤畔三月生苗高二三尺莖如蓼葉如商陸及青葙四月其顛三葉面上三次變作白色余葉仍青不變俗云一葉白食小麥二葉白食梅杏三葉白食黍子五月開花成穗如蓼花狀而色白微香結細實根長白虛軟有節須狀如泥菖蒲根造化指南云五月採花及根可制雄黃蘇恭言似水葒有三黑點者乃馬蓼非三白也藏器所說雖是但葉亦不似薯蕷氣味甘辛寒有小毒主治水腫腳氣利大小便消痰破癖除積聚消疔腫唐本搗絞汁服令人吐逆除瘧及胸膈熱痰小兒痞滿藏器根療腳氣風毒脛腫搗酒服亦甚有驗又煎湯洗癬瘡時珍蠶網草拾遺集解藏器曰生濕地如蓼大莖赤花白東土亦有之氣味辛平無毒主治諸蟲如蠶類咬人恐毒入腹煮服之亦搗敷諸瘡藏器蛇網草拾遺集解藏器曰生平地葉似苦杖而小節赤高一二尺種之闢蛇又一種草莖圓似苧亦敷蛇毒慎微曰按百一方云東關有草狀如苧莖方節赤挼敷蛇毒如摘卻然名蛇網草又有鼠網草即後莽草氣味缺主治蛇虺毒蟲等螫取根葉搗敷咬處當下黃水藏器虎杖別錄中品釋名苦杖拾遺大蟲杖藥性斑杖日華酸杖時珍曰杖言其莖虎言其斑也或云一名杜牛膝者非也一種斑杖似蒻頭者與此同名異物集解弘景曰田野甚多狀如大馬蓼莖斑而葉圓保升曰所在有之生下濕地作樹高丈餘其莖赤根黃二月八月採根日乾頌曰今出汾州越州滁州處處有之三月生苗莖如竹筍狀上有赤斑點初生便分枝丫葉似小杏葉七月開花九月結實南中出者無花根皮黑色破開即黃似柳根亦有高丈餘者爾雅云蒣虎杖郭璞注云似葒草而粗大有細刺可以染赤是也宗奭曰此草藥也蜀本言作木高丈餘者非矣大率皆似寒菊然花葉莖蕊差大為異仍莖葉有淡黑斑六七月旋旋開花至九月中方已花片四出其色如桃花差大而外微深陝西山麓水次甚多斅曰凡使勿誤用天藍及斑袖根二味根形味皆相似也機曰諸注或云似葒似杏似寒菊各不相侔豈所產有不同耶時珍曰其莖似葒蓼其葉圓似杏其枝黃似柳其花狀似菊色似桃花合而觀之未嘗不同也根修治斅曰採得細銼卻用葉包一夜曬乾用氣味微溫權曰甘平無毒宗奭曰味微苦今天下暑月多煎根汁為飲不得甘草則不堪飲本文不言味藥性論云甘是甘草之味非虎杖味也主治通利月水破留血症結別錄漬酒服主暴瘕弘景風在骨節間及血瘀煮汁作酒服之藏器治大熱煩躁止渴利小便壓一切熱毒甄權治產後血暈惡血不下心腹脹滿排膿主瘡癤癰毒撲損瘀血破風毒結氣大明燒灰貼諸惡瘡焙研煉蜜為丸陳米飲服治腸痔下血蘇頌研末酒服治產後瘀血血痛及墜撲昏悶有效時珍發明權曰暑月以根和甘草同煎為飲色如琥珀可愛甚甘美瓶置井中令冷澈如冰時人呼為冷飲子啜之且尊於茗極解暑毒其汁染米作糜糕益美搗末浸酒常服破女子經脈不通有孕人勿服時珍曰孫真人千金方治女人月經不通腹內積聚虛脹雷鳴四肢沉重亦治丈夫積聚有虎杖煎取高地虎杖根銼二斛水二石五斗煮取一斗半去滓入醇酒五升煎如餳每服一合以知為度又許學士本事方治男婦諸般淋疾用苦杖根洗淨銼一合以水五盞煎一盞去滓入乳香麝香少許服之鄞縣尉耿夢得內人患沙石淋已十三年每漩痛楚不可忍溺器中小便下沙石剝剝有聲百方不效偶得此方服之一夕而愈乃予目擊者附方舊三新四小便五淋苦杖為末每服二錢用飯飲下集驗方月水不利虎杖三兩凌霄花沒藥一兩為末熱酒每服一錢又方治月經不通腹大如甕氣短欲死虎杖一斤去頭曝乾切土瓜根汁牛膝汁二斗水一斛浸虎杖一宿煎取二斗入二汁同煎如餳每酒服一合日再夜一宿血當下聖惠方時疫流毒攻手足腫痛欲斷用虎杖根銼煮汁漬之肘後方腹中暴症硬如石痛如刺不治百日內死取虎杖根勿令影臨水上可得石余洗干搗末梌米五升炊飯納入攪之好酒五斗漬之封候藥消飯浮可飲一升半勿食鮭魚及鹽但取一斗乾者薄酒浸飲從少起日三服亦佳症當下也此方治症勝諸大藥也外臺秘要氣奔怪病人忽遍身皮底混混如波浪聲癢不可忍抓之血出不能解謂之氣奔以苦杖人參青鹽白朮細辛各一兩作一服水煎細飲盡便愈夏子益奇疾方消渴引飲虎杖燒過海浮石烏賊魚骨丹砂等分為末渴時以麥門冬湯服二錢日三次忌酒色魚面鮓醬生冷衛生家寶方蕕拾遺校正併入有名未用別錄馬唐釋名馬唐別錄馬飯別錄羊麻別錄羊粟別錄蔓於爾雅軒於藏器曰馬食之如糖如飯故名馬唐馬飯時珍曰羊亦食之故曰羊麻羊粟其氣㾞臭故謂之蕕蕕者㾞也朽木臭也此草莖頗似蕙而臭故左傳云一薰一蕕十年尚猶有臭是也孫升談圃以為香薷者誤矣即別錄馬唐也今併為一集解別錄曰馬唐生下濕地莖有節生根五月採藏器曰生南方廢稻田中節節有根著土如結縷草堪飼馬又曰蕕生水田中狀如結縷草而葉長馬食之氣味甘寒無毒藏器曰大寒主治馬唐調中明耳目別錄煎取汁明目潤肺又曰蕕消水氣濕痹腳氣頑痹虛腫小腹急小便赤澀併合赤小豆煮食勿與鹽絞汁服止消渴搗葉敷毒腫藏器萹蓄音楄畜本經下品釋名扁竹弘景扁辨吳普扁蔓吳普粉節草綱目道生草時珍曰許慎說文作扁築與竹同音節間有粉多生道旁故方士呼為粉節草道生草集解別錄曰萹蓄生東萊山谷五月採陰乾弘景曰處處有之布地而生花節間白葉細綠人呼為扁竹頌曰春中布地生道旁苗似瞿麥葉細綠如竹赤莖如釵股節間花出甚細微青黃色根如蒿根四五月採苗陰乾蜀圖經云二月八月採苗日乾郭璞注爾雅云似小藜赤莖節好生道旁可食又殺蟲是也或云爾雅王芻即此也時珍曰其葉似落帚葉而不尖弱莖引蔓促節三月開細紅花如蓼藍花結細子爐火家燒灰煉霜用一種水扁築名𦺇音督出說文氣味苦平無毒權曰甘澀主治浸淫疥瘙疽痔殺三蟲本經療女子陰蝕別錄煮汁飲小兒療蛔蟲有驗甄權治霍亂黃疸利小便小兒鬾病時珍附方舊七新二熱淋澀痛扁竹煎湯頻飲生生編熱黃疸疾扁竹搗汁頓服一升多年者日再服之藥性論霍亂吐利扁竹入豉汁中下五味煮羹食食醫心鏡丹石沖眼服丹石人毒發沖眼腫痛扁竹根一握洗搗汁服之食療本草蛔咬心痛食療治小兒蛔咬心痛面青口中沫出臨死者取扁竹十斤銼以水一石煎至一斗去滓煎如餳隔宿勿食空心服一升蟲即下也仍常煮汁作飯食海上歌云心頭急痛不能當我有仙人海上方萹蓄醋煎通口咽管教時刻便安康蟲食下部蟲狀如蝸牛食下部作癢取扁竹一把水二升煮熟五歲兒空腹服三五合楊氏產乳痔發腫痛扁竹搗汁服一升一二服未瘥再服亦取汁和麵作餔飥煮食日三次藥性論惡瘡痂癢作痛扁竹搗封痂落即瘥肘後方藎草音燼本經下品釋名黃草吳普綠竹唐本綠蓐唐本䓞草綱目盭草音戾王芻爾雅鴟腳莎時珍曰此草綠色可染黃故曰黃曰綠也䓞盭乃北人呼綠字音轉也古者貢草入染人故謂之王芻而進忠者謂之藎臣也詩云終朝采綠不盈一掬許慎說文云䓞草可以染黃漢書云諸侯盭綬晉灼注云盭草出琅琊似艾可染因以名綬皆謂此草也禹錫曰爾雅綠王芻孫炎注云即綠蓐草也今呼為鴟腳莎詩云綠竹猗猗是也集解別錄曰藎草生青衣川穀九月十月採可以染作金色普曰生太山山谷恭曰青衣縣名在益州西今處處平澤溪澗側皆有葉似竹而細薄莖亦圓小荊襄人煮以染黃色極鮮好俗名綠蓐草氣味苦平無毒普曰神農雷公苦之才曰畏鼠負主治久咳上氣喘逆久寒驚悸痂疥白禿瘍氣殺皮膚小蟲本經治身熱邪氣小兒身熱吳普洗一切惡瘡有效大明蒺藜本經上品釋名茨爾雅旁通本經屈人本經止行本經豺羽本經升推弘景曰多生道上及牆上葉布地子有刺狀如菱而小長安最饒人行多著木履今軍家乃鑄鐵作之以布敵路名鐵蒺藜易云據於蒺藜言其凶傷詩云牆有茨不可掃也以刺梗穢方用甚稀時珍曰蒺疾也藜利也茨刺也其刺傷人甚疾而利也屈人止行皆因其傷人也集解別錄曰蒺藜子生馮翊平澤或道旁七月八月採實曝乾頌曰冬月亦採之黃白色郭璞注爾雅云布地蔓生細葉子有三角刺人是也又一種白蒺藜今生同州沙苑牧馬草地最多而近道亦有之綠葉細蔓綿布沙上七月開花黃紫色如豌豆花而小九月結實作莢子便可採其實味甘而微腥褐綠色與蠶種子相類而差大又與馬薸子酷相類但馬薸子微大不堪入藥須細辨之宗奭曰蒺藜有二等一等杜蒺藜即今之道旁布地而生者開小黃花結芒刺一種白蒺藜出同州沙苑牧馬處子如羊內腎大如黍粒補腎藥今人多用風家惟用刺蒺藜也時珍曰蒺藜葉如初生皂莢葉整齊可愛刺蒺藜狀如赤根菜子及細菱三角四刺實有仁其白蒺藜結莢長寸許內子大如脂麻狀如羊腎而帶綠色今人謂之沙苑蒺藜以此分別子修治斅曰凡使揀淨蒸之從午至酉日乾木臼舂令刺盡用酒拌再蒸從午至酉日乾用大明曰入藥不計丸散並炒去刺用氣味苦溫無毒別錄曰辛微寒權曰甘有小毒志曰其性宣通久服不冷而無壅熱當以性溫為是之才曰烏頭為之使主治惡血破癥結積聚喉痹乳難久服長肌肉明目輕身本經身體風癢頭痛咳逆傷肺肺痿止煩下氣小兒頭瘡癰腫陰潰可作摩粉別錄治諸風癧瘍療吐膿去燥熱甄權治奔豚腎氣肺氣胸膈滿催生墮胎益精療水藏冷小便多止遺瀝泄精溺血腫痛大明痔漏陰汗婦人髮乳帶下蘇頌治風秘及蛔蟲心腹痛時珍附方舊九新八服食法蒺藜子一石七八月熟時收取日乾舂去刺杵為末每服二錢新汲水調下日三服勿令中絕斷谷長生服之一年以後冬不寒夏不熱二年老者復少發白復黑齒落更生服之三年身輕長生神仙秘旨腰脊引痛蒺藜子搗末蜜和丸胡豆大酒服二丸日三服外臺秘要通身浮腫杜蒺藜日日煎湯洗之聖惠方卒中五屍蒺藜子搗末蜜丸胡豆大每服二丸日三服肘後方大便風秘蒺藜子炒一兩豬牙皂莢去皮酥炙五錢為末每服一錢鹽茶湯下普濟方月經不通杜蒺藜當歸等分為末米飲每服三錢儒門事親催生下衣難產胎在腹中幷包衣不下及胎死者蒺藜子貝母各四兩為末米湯服三錢少頃不下再服梅師方蛔蟲心痛吐清水七月七日採蒺藜子陰乾燒作灰先食服方寸匕日三服外臺秘要萬病積聚七八月收蒺藜子水煮熟曝乾蜜丸梧子大每酒服七丸以知為度其汁煎如飴服之三十年失明補肝散用蒺藜子七月七日收陰乾搗散食後水服方寸匕日二外臺秘要牙齒動搖疼痛及打動者土蒺藜去角生研五錢淡漿水半碗蘸水入鹽溫漱甚效或以根燒灰貼牙即牢固也御藥院方牙齒出血不止動搖白蒺藜末旦旦擦之道藏經打動牙疼蒺藜子或根為末日日揩之瑞竹堂方鼻塞出水多年不聞香臭蒺藜二握當道車碾過以水一大盞煮取半盞仰臥先滿口含飯以汁一合灌鼻中不過再灌嚏出一兩個息肉似赤蛹蟲即愈聖惠方面上瘢痕蒺藜子山梔子各一合為末醋和夜塗旦洗救急方白癜風疾白蒺藜子六兩生搗為末每湯服二錢日二錢一月絕根服至半月白處見紅點神效孫真人食忌一切疔腫蒺藜子一升作灰以醋和封頭上拔根外臺秘要花主治陰乾為末每溫酒服二三錢治白癜風宗奭苗主治煮湯洗疥癬風瘡作癢千金附方舊二新一鼻流清涕蒺藜苗二握黃連二兩水五升煎一升少少灌鼻中取嚏不過再灌聖濟錄諸瘡腫毒蒺藜蔓洗三寸截之取得一斗以水五升煮取二升去滓納銅器中又煮取一升納小器中煮如飴狀以塗腫處千金方蠼螋尿瘡繞身匝即死以蒺藜葉搗敷之無葉用子備急方白蒺藜氣味甘溫無毒主治補腎治腰痛泄精虛損勞乏時珍發明頌曰古方皆用有刺者治風明目最良神仙方亦有單服蒺藜法云不問黑白但取堅實者舂去刺用時珍曰古方補腎治風皆用刺蒺藜後世補腎多用沙苑蒺藜或以熬膏和藥恐其功亦不甚相遠也刺蒺藜炒黃去刺磨面作餅或蒸食可以救荒穀精草宋開寶釋名戴星草開寶文星草綱目流星草時珍曰谷田餘氣所生故曰穀精志曰白花似星故有戴星諸名集解頌曰處處有之春生於穀田中葉莖俱青根花並白色二月三月採花用花白小圓似星可餧馬令肥主蟲顙毛焦病又有一種莖梗長有節根微赤出秦隴間時珍曰此草收谷後荒田中生之江湖南北多有一科叢生葉似嫩谷秧抽細莖高四五寸莖頭有小白花點點如亂星九月採花陰乾云二三月採者誤也花氣味辛溫無毒藏器曰甘平大明曰可結水銀成砂子主治喉痹齒風痛諸瘡疥開寶頭風痛目盲翳膜痘後生翳止血時珍發明時珍曰穀精體輕性浮能上行陽明分野凡治目中諸病加而用之甚良明目退翳之功似在菊花之上也附方舊一新九腦痛眉痛穀精草二錢地龍三錢乳香一錢為末每用半錢燒煙筒中隨左右熏鼻聖濟錄偏正頭痛集驗方用穀精草一兩為末以白麵糊調攤紙花上貼痛處干換聖濟方用穀精草末銅綠各一錢硝石半分隨左右搐鼻鼻衄不止穀精草為末熟麵湯服二錢聖惠方目中翳膜穀精草防風等分為末米飲服之甚驗明目方痘後目翳隱澀淚出久而不退用穀精草為末以柿或豬肝片蘸食一方加蛤粉等分同入豬肝內煮熟日食之又方見夜明沙邵真人濟急方小兒雀盲至晚忽不見物用羯羊肝一具不用水洗竹刀剖開入穀精草一撮瓦罐煮熟日食之屢效忌鐵器如不肯食炙熟搗作丸綠豆大每服三十丸茶下衛生家寶方小兒中暑吐泄煩渴穀精草燒存性用器覆之放冷為末每冷米飲服半錢保幼大全海金沙宋嘉祐釋名竹園荽時珍曰其色黃如細沙也謂之海者神異之也俗名竹園荽象葉形也集解禹錫曰出黔中郡湖南亦有生作小株高一二尺七月收其全科於日中暴之小干以紙襯承以杖擊之有細沙落紙上且暴且擊以盡為度時珍曰江浙湖湘川陝皆有之生山林下莖細如線引於竹木上高尺許其葉細如園荽葉而甚薄背面皆青上多皺紋皺處有沙子狀如蒲黃粉黃赤色不開花細根堅強其沙及草皆可入藥方士採其草取汁煮砂縮賀氣味甘寒無毒主治通利小腸得梔子馬牙硝蓬沙療傷寒熱狂或丸或散嘉祐治濕熱腫滿小便熱淋膏淋血淋石淋莖痛解熱毒氣時珍發明時珍曰海金沙小腸膀胱血分藥也熱在二經血分者宜之附方舊一新五熱淋急痛海金沙草陰乾為末煎生甘草湯調服二錢此陳總領方也一加滑石夷堅志小便不通臍下滿悶海金沙一兩蠟麵茶半兩搗碎每服三錢生薑甘草煎湯下日二服亦可末服圖經本草膏淋如油海金沙滑石各一兩甘草梢二錢半為末每服二錢麥門冬煎湯服日二次仁存方血淋痛澀但利水道則清濁自分海金沙末新汲水或砂糖水服一錢普濟方脾濕腫滿腹脹如鼓喘不得臥海金沙散用海金沙三錢白朮四兩甘草半兩黑牽牛頭末一兩半為末每服一錢煎倒流水調下得利為妙東垣蘭室秘藏痘瘡變黑歸腎用竹園荽草煎酒敷其身即發起直指方地楊梅拾遺集解藏器曰生江東濕地苗如莎草四五月有子似楊梅也氣味辛平無毒主治赤白痢取莖子煎湯服藏器水楊梅綱目釋名地椒集解時珍曰生水邊條葉甚多生子如楊梅狀庚辛玉冊云地椒一名水楊梅多生近道陰濕處荒田野中亦有之叢生苗葉似菊莖端開黃花實類椒而不赤實可結伏三黃白礬制丹砂粉霜氣味辛溫無毒主治疔瘡腫毒時珍地蜈蚣草綱目集解時珍曰生村落塍野間左蔓延右右蔓延左其葉密而對生如蜈蚣形其穗亦長俗呼過路蜈蚣其延上樹者呼飛天蜈蚣根苗皆可用氣味苦寒無毒主治解諸毒及大便不通搗汁療癰腫搗塗並末服能消毒排膿蜈蚣傷者入鹽少許搗塗或末敷之時珍附方新一一切癰疽及腸癰奶癰赤腫未破或已破而膿血不散發熱疼痛能食者並宜排膿托裡散用地蜈蚣赤芍藥當歸甘草等分為末每服二錢溫酒下和劑局方半邊蓮綱目集解時珍曰半邊蓮小草也生陰濕塍塹邊就地細梗引蔓節節而生細葉秋開小花淡紅紫色止有半邊如蓮花狀故名又呼急解索氣味辛平無毒主治蛇虺傷搗汁飲以滓圍塗之又治寒齁氣喘及瘧疾寒熱同雄黃各二錢搗泥碗內覆之待色青以飯丸梧子大每服九丸空心鹽湯下時珍壽域方紫花地丁綱目釋名箭頭草綱目獨行虎綱目羊角子秘韞米布袋集解時珍曰處處有之其葉似柳而微細夏開紫花結角平地生者起莖溝壑邊生者起蔓普濟方云鄉村籬落生者夏秋開小白花如鈴兒倒垂葉微似木香花之葉此與紫花者相戾恐別一種也氣味苦辛寒無毒主治一切癰疽發背疔腫瘰癧無名腫毒惡瘡時珍附方新九黃疸內熱地丁末酒服三錢乾坤秘韞稻芒黏咽不得出者箭頭草嚼嚥下同上方癰疽惡瘡紫花地丁連根同蒼耳葉等分搗爛酒一鍾攪汁服楊誠經驗方癰疽發背無名諸腫貼之如神紫花地丁草三伏時收以白麵和成鹽醋浸一夜貼之昔有一尼發背夢得此方數日而痊孫天仁集效方一切惡瘡紫花地丁根日乾以罐盛燒煙對瘡熏之出黃水取盡愈衛生易簡方瘰癧疔瘡發背諸腫紫花地丁根去粗皮同白蒺藜為末油和塗神效乾坤秘韞疔瘡腫毒千金方用紫花地丁草搗汁服雖極者亦效楊氏方用紫花地丁草蔥頭生蜜共搗貼之若瘤瘡加新黑牛屎喉痹腫痛箭頭草葉入醬少許研膏點入取吐普濟方鬼針草拾遺集解藏器曰生池畔方莖葉有丫子作釵腳著人衣如針北人謂之鬼針南人謂之鬼釵氣味苦平無毒主治蜘蛛蛇咬杵汁服並敷藏器塗蠍蠆傷時珍附方新一割甲傷肉不愈鬼針草苗鼠黏子根搗汁和臘豬脂塗千金獨用將軍唐本草集解恭曰生林野中節節穿葉心生苗其葉似楠不時採根葉用氣味辛無毒主治毒腫乳癰解毒破惡血恭附方新一下痢噤口獨將軍草根有珠如豆者取珠搗汁三匙以白酒半杯和服簡便方附錄留軍待恭曰生劍州山谷葉似楠而細長採無時味辛溫無毒主肢節風痛筋脈不遂折傷瘀血五緩攣痛見腫消宋圖經集解頌曰生筠州春生苗葉莖紫色高一二尺葉似桑而光面青紫赤色採無時氣味酸澀有微毒主治消癰腫及狗咬搗葉貼之蘇頌附方新一一切腫毒及傷寒遺毒發於耳之前後及項下腫硬用見腫消草生白芨生白蘞土大黃生大薊根野苧麻根搗成餅入芒硝一錢和貼留頭干即易之若加金線重樓及山慈菇尤妙傷寒蘊要攀倒甑圖經集解頌曰生宜州郊野莖葉如薄荷一名斑杖一名接骨時珍曰斑杖名同虎杖接骨名同蒴藋不知是一類否氣味苦寒無毒主治解利風熱煩渴狂躁搗汁服甚效蘇頌水甘草圖經集解頌曰生筠州多在水旁春生苗莖青葉如柳無花土人七月八月採單用不入眾藥氣味甘寒無毒主治小兒風熱丹毒同甘草煎飲蘇頌
