body:
  text: 草部第十七卷草之六毒草類四十七種大黃本經下品釋名黃良本經將軍當之火參吳普膚如吳普弘景曰大黃其色也將軍之號當取其駿快也杲曰推陳致新如戡定禍亂以致太平所以有將軍之號集解別錄曰大黃生河西山谷及隴西二月八月採根火干普曰生蜀郡北部或隴西二月卷生黃赤其葉四四相當莖高三尺許三月花黃五月實黑八月採根根有黃汁切片陰乾弘景曰今採益州北部汶山及西山者雖非河西隴西好者猶作紫地錦色味甚苦澀色至濃黑西川陰乾者勝北部日乾亦有火乾者皮小焦不如而耐蛀堪久此藥至勁利粗者便不中服恭曰葉子莖並似羊蹄但莖高六七尺而脆味酸堪生啖葉粗長而厚根細者亦似宿羊蹄大者乃如碗長二尺其性濕潤而易蛀壞火干乃佳作時燒石使熱橫寸截著石上爆之一日微燥以繩穿晾乾今出宕州涼州西羌蜀地者皆佳幽並以北者漸細氣力不及蜀中者陶言蜀地不及隴西誤矣藏器曰凡用當分別之若取和厚深沉能攻病者可用蜀中似牛舌片緊硬者若取瀉泄駿快推陳去熱者當取河西錦紋者頌曰今蜀川河東陝西州郡皆有之以蜀川錦紋者佳其次秦隴來者謂之土番大黃正月內生青葉似蓖麻大者如扇根如芋大者如碗長一二尺其細根如牛蒡小者亦如芋四月開黃花亦有青紅似蕎麥花者莖青紫色形如竹二八月採根去黑皮切作橫片火干蜀大黃乃作豎片如牛舌形謂之牛舌大黃二者功用相等江淮出者曰土大黃二月開花結細實時珍曰宋祁益州方物圖言蜀大山中多有之赤莖大葉根巨若碗藥市以大者為枕紫地錦紋也今人以莊浪出者為最莊浪即古涇原隴西地與別錄相合正誤頌曰鼎州出一種羊蹄大黃治疥瘙甚效初生苗葉如羊蹄累年長大即葉似商陸而狹尖四月內抽條出穗五七莖相合花葉同色結實如蕎麥而輕小五月熟即黃色呼為金蕎麥三月採苗五月採實陰乾九月採根破之亦有錦紋亦呼為土大黃時珍曰蘇說即老羊蹄根也因其似大黃故謂之羊蹄大黃實非一類又一種酸模乃山大黃也狀似羊蹄而生山上所謂土大黃或指此非羊蹄也俱見本條根修治雷曰凡使細切以紋如水旋斑緊重者銼片蒸之從巳至未曬乾又灑臘水蒸之從未至亥如此凡七次曬乾卻灑淡蜜水再蒸一伏時其大黃必如烏膏樣乃曬乾用藏器曰凡用有蒸有生有熟不得一概用之承曰大黃採時皆以火石爆乾貨賣更無生者用之亦不須更多炮炙蒸煮氣味苦寒無毒別錄曰大寒普曰神農雷公苦有毒扁鵲苦無毒李當之小寒元素曰味苦氣寒氣味俱厚沉而降陰也用之須酒浸煨熟者寒因熱用酒浸入太陽經酒洗入陽明經余經不用酒杲曰大黃苦峻下走用之於下必生用若邪氣在上非酒不至必用酒浸引上至高之分驅熱而下如物在高巔必射以取之也若用生者則遺至高之邪熱是以愈後或目赤或喉痹或頭腫或膈上熱疾生也時珍曰凡病在氣分及胃寒血虛並妊娠產後並勿輕用其性苦寒能傷元氣耗陰血故也之才曰黃芩為之使無所畏權曰忌冷水惡乾漆主治下瘀血血閉寒熱破癥瘕積聚留飲宿食盪滌腸胃推陳致新通利水穀調中化食安和五臟本經平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結別錄通女子經候利水腫利大小腸貼熱腫毒小兒寒熱時疾煩熱蝕膿甄權通宣一切氣調血脈利關節泄壅滯水氣溫瘴熱瘧大明瀉諸實熱不通除下焦濕熱消宿食瀉心下痞滿元素下痢赤白裡急腹痛小便淋瀝實熱燥結潮熱譫語黃疸諸火瘡時珍發明之才曰得芍藥黃芩牡蠣細辛茯苓療驚恚怒心下悸氣得硝石紫石英桃仁療女子血閉宗奭曰張仲景治心氣不足吐血衄血瀉心湯用大黃黃芩黃連或曰心氣既不足而不用補心湯更用瀉心何也答曰若心氣獨不足則當不吐衄也此乃邪熱因不足而客之故令吐衄以苦泄其熱以苦補其心蓋一舉而兩得之有是證者用之無不效惟在量其虛實而已震亨曰大黃苦寒善泄仲景用之瀉心湯者正因少陰經不足本經之陽亢甚無輔以致陰血妄行飛越故用大黃瀉去亢甚之火使之平和則血歸經而自安夫心之陰氣不足非一日矣肺與肝俱各受火而病作故黃芩救肺黃連救肝肺者陰之主肝者心之母血之合也肝肺之火既退則陰血復其舊矣寇氏不明說而云邪熱客之何以明仲景之意而開悟後人也時珍曰大黃乃足太陰手足陽明手足厥陰五經血分之藥凡病在五經血分者宜用之若在氣分用之是謂誅伐無過矣瀉心湯治心氣不足吐血衄血者乃真心之氣不足而手厥陰心包絡足厥陰肝足太陰脾足陽明胃之邪火有餘也雖曰瀉心實瀉四經血中之伏火也又仲景治心下痞滿按之軟者用大黃黃連瀉心湯主之此亦瀉脾胃之濕熱非瀉心也病發於陰而反下之則作痞滿乃寒傷營血邪氣乘虛結於上焦胃之上脘在於心故曰瀉心實瀉脾也素問云太陰所至為痞滿又云濁氣在上則生䐜脹是矣病發於陽而反下之則成結胸乃熱邪陷入血分亦在上脘分野仲景大陷胸湯丸皆用大黃亦瀉脾胃血分之邪而降其濁氣也若結胸在氣分則只用小陷胸湯痞滿在氣分則用半夏瀉心湯矣成無己註釋傷寒論亦不知分別此義成無己曰熱淫所勝以苦泄之大黃之苦以盪滌瘀熱下燥結而泄胃強頌曰本草稱大黃推陳致新其效最神故古方下積滯多用之張仲景治傷寒用處尤多古人用毒藥攻病必隨人之虛實寒熱而處置非一切輕用也梁武帝因發熱欲服大黃姚僧坦曰大黃乃是快藥至尊年高不可輕用帝弗從幾至委頓梁元帝常有心腹疾諸醫咸謂宜用平藥可漸宣通僧坦曰脈洪而實此有宿妨非用大黃無瘥理帝從之遂愈以此言之今醫用一毒藥而攻眾病其偶中便謂此方神奇其差誤則不言用藥之失可不戒哉附方舊十三新四十二吐血衄血治心氣不足吐血衄血者瀉心湯主之大黃二兩黃連黃芩各一兩水三升煮一升熱服取利張仲景金匱玉函吐血刺痛川大黃一兩為散每服一錢以生地黃汁一合水半盞煎三五沸無時服簡要濟眾方傷寒痞滿病發於陰而反下之心下滿而不痛按之濡此為痞也大黃黃連瀉心湯主之大黃二兩黃連一兩以麻沸湯二升漬之須臾絞汁分作二次溫服仲景傷寒論熱病譫狂川大黃五兩銼炒微赤為散用臘雪水五升煎如膏每服半匙冷水下聖惠方傷寒發黃方同上氣壯者大黃一兩水二升漬一宿平旦煎汁一升入芒硝一兩緩服須臾當利下傷寒類要腰腳風氣作痛大黃二兩切如棋子和少酥炒乾勿令焦搗篩每用二錢空心以水三大合入姜三片煎十餘沸取湯調服當下冷膿惡物即痛止崔元亮海上方一切壅滯經驗後方治風熱積壅化痰涎治痞悶消食化氣導血用大黃四兩牽牛子半炒半生四兩為末煉蜜丸如梧子大每服十丸白湯下並不損人如要微利加一二十丸衛生寶鑑用皂莢熬膏和丸名墜痰丸又名全真丸金宣宗服之有驗賜名保安丸痰為百病滾痰丸治痰為百病惟水瀉胎前產後不可服用大黃酒浸蒸熟切曬八兩生黃芩八兩沉香半兩青礞石二兩以焰硝二兩同入砂罐固濟煅紅研末二兩上各取末以水和丸梧子大常服一二十丸小病五六十丸緩病七八十丸急病一百二十丸溫水吞下即臥勿動候藥逐上焦痰滯次日先下糟粕次下痰涎未下再服王隱君歲合四十餘斤愈疾數萬也養生主論男女諸病無極丸治婦人經血不通赤白帶下崩漏不止腸風下血五淋產後積血癥瘕腹痛男子五勞七傷小兒骨蒸潮熱等證其效甚速宜六癸日合之用錦紋大黃一斤分作四分一分用童尿一碗食鹽二錢浸一日切曬一分用醇酒一碗浸一日切曬再以巴豆仁三十五粒同炒豆黃去豆不用一分用紅花四兩泡水一碗浸一日切曬一分用當歸四兩入淡醋一碗同浸一日去歸切曬為末煉蜜丸梧子大每服五十丸空心溫酒下取下惡物為驗未下再服此武當高士孫碧雲方也醫林集要心腹諸疾三物備急丸治心腹諸疾卒暴百病用大黃巴豆乾薑各一兩搗篩蜜和搗一千杵丸小豆大每服三丸凡中惡客忤心腹脹滿痛如錐刀氣急口噤停屍卒死者以暖水或酒服之或灌之未知更服三丸腹中鳴轉當吐下便愈若口已噤者折齒灌之入喉即瘥此乃仲景方司空裴秀改為散用不及丸也圖經本草腹中痞塊大黃十兩為散醋三升蜜兩匙和煎丸梧子大每服三十丸生薑湯下吐利為度外臺秘要腹脅積塊風化石灰末半斤瓦器炒極熱稍冷入大黃末一兩炒熱入桂心末半兩略炒下米醋攪成膏攤布貼之又方大黃二兩朴硝一兩為末以大蒜同搗膏和貼之或加阿魏一兩尤妙丹溪心法久患積聚二便不利氣上搶心腹中脹滿害食大黃白芍各二兩為末水丸梧子大每湯下四十丸日三以知為度千金方脾癖疳積不拘大人小兒錦紋大黃三兩為末醋一盞沙鍋內文武火熬成膏傾瓦上日曬夜露三日再研用舶上硫黃一兩形如琥珀者官粉一兩同研勻十歲以下小兒半錢大人一錢半米飲下忌一切生冷魚肉只食白粥半月如一服不愈半月之後再服若不忌口不如勿服聖濟總錄小兒無辜閃癖瘰癧或頭干黃聳或乍痢乍瘥諸狀多者大黃煎主之大黃九兩錦紋新實者若微朽即不中用削去皮搗篩為散以好米醋三升和置瓦碗中於大鐺內浮湯上炭火慢煮候至成膏可丸乃貯器中三歲兒一服七丸梧子大日再服以下出青赤膿為度若不下或下少稍稍加丸若下多又須減之病重者七八劑方盡根大人亦可用之此藥惟下宿膿不令兒利也須禁食毒物乳母亦禁之一加木香一兩半崔知悌方小兒諸熱大黃煨熟黃芩各一兩為末煉蜜丸麻子大每服五丸至十丸蜜湯下加黃連名三黃丸錢氏小兒方骨蒸積熱漸漸黃瘦大黃四分以童子小便五六合煎取四合去滓空腹分為二服如人行五里再服廣利方赤白濁淋好大黃為末每服六分以雞子一個破頂入藥攪勻蒸熟空心食之不過三服愈簡便方相火秘結大黃末一兩牽牛頭末半兩每服三錢有厥冷者酒服無厥冷五心煩蜜湯服劉河間保命集諸痢初起大黃煨熟當歸各二三錢壯人各一兩水煎服取利或加檳榔集簡方熱痢裡急大黃一兩浸酒半日煎服取利集簡方忽喘悶絕不能語言涎流吐逆牙齒動搖氣出轉大絕而復甦名傷寒並熱霍亂大黃人參各半兩水二盞煎一盞熱服可安危氏得效方食已即吐胸中有火也大黃一兩甘草二錢半水一升煮半升溫服仲景金匱玉函方婦人血癖作痛大黃一兩酒二升煮十沸頓服取利千金翼產後血塊大黃末一兩頭醋半升熬膏丸梧子大每服五丸溫醋化下良久當下千金方乾血氣痛綿紋大黃酒浸曬乾四兩為末好醋一升熬成膏丸芡子大臥時酒化一丸服大便利一二行紅漏自下乃調經仙藥也或加香附董氏集驗方婦人嫁痛小戶腫痛也大黃一兩酒一升煮一沸頓服千金方男子偏墜作痛大黃末和醋塗之干則易梅師方濕熱眩暈不可當者酒炒大黃為末茶清服二錢急則治其標也丹溪纂要小兒腦熱常欲閉目大黃一分水三合浸一夜一歲兒每日服半合余者塗頂上干即再上姚和眾至寶方暴赤目痛四物湯加熟大黃酒煎服之傳信適用方胃火牙痛口含冰水一口以紙捻蘸大黃末隨左右搐鼻立止儒門事親風熱牙痛紫金散治風熱積壅一切牙痛去口氣大有奇效好大黃瓶內燒存性為末早晚揩牙漱去都下一家專貨此藥兩宮常以數千贖之其門如市也千金家藏方風蟲牙痛齦常出血漸至崩落口臭極效大黃米泔浸軟生地黃各旋切一片合定貼上一夜即愈未愈再貼忌說話恐引入風本事方口瘡糜爛大黃枯礬等分為末擦之吐涎聖惠方鼻中生瘡生大黃杏仁搗勻豬脂和塗又方生大黃黃連各一錢麝香少許為末生油調搽聖惠方仙茅毒發舌脹出口方見仙茅下傷損瘀血三因方雞鳴散治從高墜下木石壓傷及一切傷損血瘀凝積痛不可忍並以此藥推陳致新大黃酒蒸一兩杏仁去皮尖三七粒細研酒一碗煎六分雞鳴時服至晚取下瘀血即愈和劑方治跌壓瘀血在內脹滿大黃當歸等分炒研每服四錢溫酒服取下惡物愈打撲傷痕瘀血滾注或作潮熱者大黃末薑汁調塗一夜黑者紫二夜紫者白也瀕湖集簡方杖瘡腫痛大黃末醋調塗之童尿亦可調醫方摘玄金瘡煩痛大便不利大黃黃芩等分為末蜜丸先食水下十丸日三服千金方凍瘡破爛大黃末水調塗之衛生寶鑑湯火傷灼莊浪大黃生研蜜調塗之不惟止痛又且滅瘢此乃金山寺神人所傳方洪邁夷堅志灸瘡飛蝶因艾灸訖火痂便退瘡內鮮肉片飛如蝶形而去痛不可忍是火毒也大黃朴硝各半兩為末水服取利即愈張杲醫說蠼螋咬瘡大黃末塗之醫說火丹赤腫遍身者大黃磨水頻刷之急救方腫毒初起大黃五倍子黃柏等分為末新汲水調塗日四五次簡便方癰腫焮熱作痛大黃末醋調塗之燥即易不過數易即退甚驗神方也肘後方乳癰腫毒金黃散用川大黃粉草各一兩為末好酒熬成膏收之以絹攤貼瘡上仰臥仍先以溫酒服一大匙明日取下惡物婦人經驗方大風癩瘡大黃煨一兩皂莢刺一兩為末每服方寸匕空心溫酒下取出惡毒物如魚腦狀未下再服即取下如亂髮之蟲取盡乃服雄黃花蛇藥名通天再造散十便良方葉氣味酸寒無毒主治置薦下闢蝨蟲相感志商陸本經下品釋名蓫𦳝音逐湯當陸開寶章柳圖經白昌開寶馬尾廣雅夜呼本經時珍曰此物能逐蕩水氣故曰蓫𦳝訛為商陸又訛為當陸北音訛為章柳或云枝枝相值葉葉相當故曰當陸或云多當陸路而生也集解別錄曰商陸生咸陽山谷如人形者有神恭曰此有赤白二種白者入藥用赤者見鬼神甚有毒保升曰所在有之葉大如牛舌而厚脆赤花者根赤白花者根白二月八月採根日乾頌曰俗名章柳根多生於人家園圃中春生苗高三四尺青葉如牛舌而長莖青赤至柔脆夏秋開紅紫花作朵根如蘿蔔而長八九月採之爾雅謂之蓫𦳝廣雅謂之馬尾易經謂之莧陸斅曰一種赤昌苗葉絕相類不可服之有傷筋骨消腎之毒惟章陸花白年多者仙人採之作脯可下酒也時珍曰商陸昔人亦種之為蔬取白根及紫色者擘破作畦栽之亦可種子根苗莖並可洗蒸食或用灰汁煮過亦良服丹砂乳石人食之尤利其赤與黃色者有毒不可食按周定王救荒本草云章柳干粗似雞冠花干微有線楞色微紫赤極易生植根修治斅曰取花白者根銅刀刮去皮薄切以東流水浸兩宿漉出架甑蒸以黑豆葉一重商陸一重如此蒸之從午至亥取出去豆葉曝乾銼用無豆葉以豆代之氣味辛平有毒別錄曰酸權曰甘有大毒忌犬肉大明曰白者苦冷得大蒜良赤者有毒能伏硇砂砒石雌黃拔錫恭曰赤者但可貼腫服之傷人痢血不已殺人令人見鬼神張仲景曰商陸以水服殺人杲曰商陸有毒陽中之陰其味酸辛其形類人其用療水其效如神主治水腫疝瘕痹熨除癰腫殺鬼精物本經療胸中邪氣水腫痿痹腹滿洪直疏五臟散水氣別錄瀉十種水病喉痹不通薄切醋炒塗喉外良甄權通大小腸瀉蠱毒墮胎熁腫毒敷惡瘡大明發明弘景曰方家不甚乾用惟療水腫切生根雜生鯉魚煮作湯服道家乃散用之及煎釀服皆能去屍蟲見鬼神其實子亦入神藥花名𦳝花尤良頌曰古方術家多用之亦可單服五月五日採根竹𥰭盛掛屋東北角陰乾百日搗篩井華水調服云神仙所秘法也時珍曰商陸苦寒沉也降也陰也其性下行專於行水與大戟甘遂蓋異性而同功胃氣虛弱者不可用方家治腫滿小便不利者以赤根搗爛入麝香三分貼於臍心以帛束之得小便利即腫消又治濕水以指畫肉上隨散不成紋者用白商陸香附子炒乾出火毒以酒浸一夜日乾為末每服二錢米飲下或以大蒜同商陸煮汁服亦可其莖葉作蔬食亦治腫疾嘉謨曰古贊云其味酸辛其形類人療水貼腫其效如神斯言盡之矣附方舊九新六濕氣腳軟章柳根切小豆大煮熟更以綠豆同煮為飯每日食之以瘥為度最效斗門方水氣腫滿外臺秘要用白商陸根去皮切如豆大一大盞以水三升煮一升更以粟米一大盞同煮成粥每日空心服之取微利不得雜食千金髓用白商陸六兩取汁半合和酒半升看人與服當利下水取效梅師方用白商陸一升羊肉六兩水一斗煮取六升去滓和蔥豉作臛食之腹中暴症有物如石痛刺啼呼不治百日死多取商陸根搗汁或蒸之以布藉腹上安藥衣物覆冷即易晝夜勿息孫真人千金方痃癖如石在脅下堅硬生商陸根汁一升杏仁一兩浸去皮尖搗如泥以商陸汁絞杏泥火煎如餳每服棗許空腹熱酒服以利下惡物為度聖惠方產後腹大堅滿喘不能臥白聖散用章柳根三兩大戟一兩半甘遂炒一兩為末每服二三錢熱湯調下大便宣利為度此乃主水聖藥也潔古保命集五屍注痛腹痛脹急不得喘息上攻心胸旁攻兩脅痛或磊塊湧起用商陸根熬以囊盛更互熨之取效肘後方小兒痘毒小兒將痘發熱失表忽作腹痛及膨脹弩氣乾霍亂由毒氣與胃氣相搏欲出不得出也以商陸根和蔥白搗敷臍上斑止痘出方免無虞摘玄方耳卒熱腫生商陸削尖納入日再易聖濟錄喉卒攻痛商陸切根炙熱隔布熨之冷即易立愈圖經本草瘰癧喉痹攻痛生商陸根搗作餅置癧上以艾炷於上灸三四壯良外臺秘要一切毒腫商陸根和鹽少許搗敷日再易之孫真人食忌石癰如石堅硬不作膿者生商陸根搗擦之燥即易取軟為度亦治濕漏諸癤張文仲方瘡傷水毒商陸根搗炙布裹熨之冷即易之食忌𦳝花主治人心昏塞多忘喜臥取花陰乾百日搗末日暮水服方寸匕乃臥思念所欲事即於眠中醒悟也蘇頌狼毒本經下品釋名時珍曰觀其名知其毒矣集解別錄曰狼毒生秦亭山谷及奉高二月八月採根陰乾陳而沉水者良弘景曰宕昌亦出之乃言止有數畝地生蝮蛇食其根故為難得亦用太山者今用出漢中及建平云與防葵同根但置水中沉者是狼毒浮者是防葵俗用亦稀為療腹內要藥耳恭曰今出秦州成州秦亭原在二州之界秦隴地寒元無蝮蛇此物與防葵都不同類生處又別太山漢中亦不聞有陶說謬矣志曰狼毒葉似商陸及大黃莖葉上有毛根皮黃肉白以實重者為良輕者為力劣秦亭在隴西奉高是太山下縣陶云沉者是狼毒浮者是防葵此不足為信假使防葵秋冬採者堅實得水皆沉狼毒春夏採者輕虛得水皆浮且二物全別不可比類此與麻黃橘皮半夏枳實吳茱萸為六陳也保升曰根似玄參惟浮虛者為劣也頌曰今陝西州郡及遼石州亦有之狀如馬志所說時珍曰狼毒出秦晉地今人往往以草䕡茹為之誤矣見䕡茹下也根氣味辛平有大毒甄權曰苦辛有毒之才曰大豆為之使宜醋炒惡麥句姜畏占斯密陀僧也主治咳逆上氣破積聚飲食寒熱水氣惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸本經除脅下積癖別錄治痰飲癥瘕亦殺鼠甄權合野葛納耳中治聾抱朴子附方舊四新六心腹連痛作脹用狼毒二兩附子半兩搗篩蜜丸梧子大一日服一丸二日二丸三日三丸止又從一丸起至三丸止以瘥為度肘後方九種心痛一蟲二蛀三風四悸五食六飲七冷八熱九氣也又治連年積冷流注心胸及落馬墮車瘀血中惡等證九痛丸用狼毒炙香吳茱萸湯泡巴豆去心炒取霜乾薑炮人參各一兩附子泡去皮三兩為末煉蜜丸梧子大每空腹溫酒下一丸千金方腹中冷痛水穀陰結心下停痰兩脅痞滿按之鳴轉逆害飲食用狼毒三兩附子一兩旋覆花三兩搗末蜜丸梧子大每服三丸食前白湯下日三服肘後方陰疝欲死丸縮入腹急痛欲死狼毒四兩防風二兩附子三兩燒以蜜丸梧子大每服三丸日夜三度白湯下肘後方兩脅氣結方同腹中冷痛方一切蟲病用狼毒杵末每服一錢用餳一皂子大沙糖少許以水化開臥時空腹服之次早即下蟲也集效方乾溼蟲疥狼毒不拘多少搗爛以豬油馬油調搽患處方睡勿以被矇頭恐藥氣傷面此維揚潘氏所傳方藺氏經驗方積年疥癩狼毒一兩一半生研一半炒研輕粉三合水銀三錢以茶末少許於瓦器內以津液擦化為末同以清油浸藥高一寸三日待藥沉油清遇夜不見燈火蘸油塗瘡上仍以口鼻於藥盞上吸氣取效永類方積年乾癬生痂搔之黃水出每逢陰雨即癢用狼毒末塗之聖惠方惡疾風瘡狼毒秦艽等分為末每服方寸匕溫酒下日一二服千金方防葵本經上品釋名房苑吳普梨蓋本經利茹別錄又名爵離方蓋農果恭曰根葉似葵花子根香味似防風故名防葵集解別錄曰防葵生臨淄川穀及嵩高太山少室三月三日採根曝乾普曰莖葉如葵上黑黃二月生根根大如桔梗根中紅白六月花白七月八月實白三月採根恭曰此物亦稀有襄陽望楚山東及興州西方有之興州者乃勝南者為鄰蜀地也頌曰今惟出襄陽地他郡不聞也其葉似葵每莖三葉一本十數莖中發一干其端開花如蔥花景天輩而色白六月開花即結實根似防風香味亦如之依時採者乃沉水今乃用枯朽狼毒當之極為謬矣時珍曰唐時隴西成州貢之蘇頌所說詳明可據正誤弘景曰防葵今用建平者本與狼毒同根猶如三建其形亦相似但置水中不沉爾而狼毒陳久者亦不能沉矣斅曰凡使防葵勿誤用狼毒緣真相似而驗之有異效又不同切須審之恐誤人疾其防葵在蔡州沙土中生採得二十日便生蚛用之惟輕為妙恭曰狼毒與防葵都不同類生處亦別藏器曰二物一是上品一是下品善惡不同形質又別陶氏以浮沉為別後人因而用之將以防葵破堅積為下品之物與狼毒同功今古因循遂無甄別殊為謬誤根修治斅曰凡使須揀去蚛末用甘草湯浸一宿漉出曝乾用黃精自然汁一二升拌了土器中炒至汁盡用氣味辛寒無毒別錄曰甘苦普曰神農辛小寒桐君扁鵲無毒岐伯雷公黃帝辛苦無毒權曰有小毒主治疝瘕腸泄膀胱熱結溺不下咳逆溫瘧癲癇驚邪狂走久服堅骨髓益氣輕身本經療五臟虛氣小腹支滿臚脹口乾除腎邪強志中火者不可服令人恍惚見鬼別錄久服主邪氣驚狂蘇恭主痃癖氣塊膀胱宿水血氣瘤大如碗者悉能消散治鬼瘧百邪鬼魅精怪通氣甄權發明時珍曰防葵乃神農上品藥黃帝岐伯桐君雷公扁鵲吳普皆言其無毒獨別錄言中火者服之令人恍惚見鬼陳延之小品方云防葵多服令人迷惑恍惚如狂按難經云重陽者狂脫陽者見鬼是豈上品養性所宜乎是豈寒而無毒者乎不然則本經及蘇恭所列者是防葵功用而別錄所列者乃似防葵之狼毒功用非防葵也狼毒之亂防葵其來亦遠矣不可不辨古方治蛇瘕鱉瘕大方中多用防葵皆是狼毒也附方舊一新二腫滿洪大防葵研末溫酒服一刀圭至二三服身瞤及小不仁為效肘後方癲狂邪疾方同上傷寒動氣傷寒汗下後臍左有動氣防葵散用防葵一兩木香黃芩柴胡各半兩每服半兩水一盞半煎八分溫服云岐子保命集狼牙本經下品釋名牙子本經狼齒別錄狼子別錄犬牙吳普抱牙吳普支蘭李當之弘景曰其牙似獸之齒牙故有諸名集解別錄曰狼牙生淮南川穀及冤句八月採根曝乾中濕腐爛生衣者殺人普曰葉青根黃赤六七月華八月實黑正月八月採根保升曰所在有之苗似蛇莓而厚大深綠色根黑若獸之牙三月八月採根日乾頌曰今江東汴東州郡多有之時珍曰範子計然云出建康及三輔色白者善根氣味苦寒有毒別錄曰酸普曰神農黃帝苦有毒桐君辛岐伯雷公扁鵲苦無毒之才曰蕪荑為之使惡地榆棗肌主治邪氣熱氣疥瘙惡瘍瘡痔去白蟲本經治浮風瘙癢煎汁洗惡瘡甄權殺腹臟一切蟲止赤白痢煎服大明附方舊六新四金瘡出血狼牙草莖葉熟搗貼之肘後方小便溺血金粟狼牙草焙乾入蚌粉炒槐花百藥煎等分為末每服三錢米泔空心調服亦治酒病衛生易簡方寸白諸蟲狼牙五兩搗末蜜丸麻子大隔宿不食明旦以漿水下一合服盡即瘥外臺秘要蟲瘡瘙癢六月以前採狼牙葉以後用根生㕮咀以木葉裹之煻火炮熱於瘡上熨之冷即止楊炎南行方小兒陰瘡狼牙草濃煮汁洗之千金方婦人陰癢狼牙二兩蛇床子三兩煎水熱洗外臺秘要婦人陰蝕瘡爛者狼牙湯用狼牙三兩水四升煎取半升以箸纏綿浸湯瀝洗日四五遍張仲景金匱玉函聤耳出汁狼牙研末綿裹日塞之聖惠方毒蛇傷螫獨莖狼牙根或葉搗爛臘豬脂和塗立瘥崔氏方射工中人有瘡狼牙冬取根夏取葉搗汁飲四五合並敷之千金方䕡茹本經下品釋名離婁別錄掘據音結居白者名草䕡茹時珍曰䕡茹本作藘蕠其根牽引之貌掘據當作拮据詩云予手拮据手口共作之狀也集解別錄曰䕡茹生代郡川穀五月採根陰乾黑頭者良普曰草高四五尺葉圓黃四四相當四月華黃五月實黑根黃有汁亦黃色三月採葉四月五月採根弘景曰今第一齣高麗色黃初斷時汁出凝黑如漆故云漆頭次出近道名草䕡茹色白皆燒鐵爍頭令黑以當漆頭非真也頌曰今河陽淄齊州亦有之二月生苗葉似大戟而花黃色根如蘿蔔皮赤黃肉白初斷時汁出凝黑如漆三月開淺紅花亦淡黃色不著子陶隱居謂出高麗者此近之又有一種草䕡茹色白古方兩用之故姚僧坦治癰疽生惡肉有白䕡茹散敷之看肉盡便停止但敷諸膏藥若不生肉又敷黃耆散惡肉仍不盡者可以漆頭赤皮䕡茹為散半錢和白閭茹散三錢合敷之觀此則赤白皆可用也時珍曰範子計然云藘茹出武都黃色者善草䕡茹出建康白色今亦處處有之生山原中春初生苗高二三尺根長大如蘿蔔蔓荊狀或有歧出者皮黃赤肉白色破之有黃漿汁莖葉如大戟而葉長微闊不甚尖折之有白汁抱莖有短葉相對團而出尖葉中出莖莖中分二三小枝二三月開細紫花結實如豆大一顆三粒相合生青熟黑中有白仁如續隨子之狀今人往往皆呼其根為狼毒誤矣狼毒葉似商陸大黃輩根無漿汁根氣味辛寒有小毒別錄曰酸普曰神農辛岐伯酸咸有毒李當之大寒之才曰甘草為之使惡麥門冬主治蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不樂本經去熱痹破癥瘕除息肉別錄發明宗奭曰治馬疥尤善服食方用至少時珍曰素問治婦人血枯痛用烏鰂骨藘茹二物丸服方見烏鰂魚下王冰言藘茹取其散惡血又齊書云郡王子隆年二十身體過充徐嗣伯合藘茹丸服之自消則藘茹亦可服食但要斟酌爾孟詵必效方治甲疽生於腳趾邊腫爛用䕡茹三兩黃耆二兩苦酒浸一宿以豬脂五合合煎取膏三合日三塗之即消又聖惠方治頭風旋眩鴟頭丸中亦用之附方舊二新二緩疽腫痛䕡茹一兩為散溫水服二錢匕聖惠方傷寒咽痛毒攻作腫真䕡茹爪甲大納口中嚼汁咽之當微覺為佳張文仲備急方中焦熱痞善忘不禁䕡茹三分甘草炙二兩硝石為末每服一錢雞鳴時溫酒下以知為度聖惠方疥瘡瘙癢䕡茹末入輕粉香油調敷之多能鄙事大戟本經下品釋名卭巨爾雅下馬仙綱目時珍曰其根辛苦戟人咽喉故名今俚人呼為下馬仙言利人甚速也郭璞注爾雅云蕎卭巨即大戟也集解別錄曰大戟生常山十二月採根陰乾保升曰苗似甘遂而高大葉有白汁花黃根似細苦參皮黃黑肉黃白五月採苗二月八月採根用頌曰近道多有之春生紅芽漸長作叢高一尺以來葉似初生楊柳小團三月四月開黃紫花團圓似杏花又似蕪荑根似細苦參秋冬採根陰乾淮甸出者莖圓高三四尺花黃葉至心亦如百合苗江南生者葉似芍藥時珍曰大戟生平澤甚多直莖高二三尺中空折之有白漿葉長狹如柳葉而不團其梢葉密攢而上杭州紫大戟為上江南土大戟次之北方綿大戟色白其根皮柔韌如綿甚峻利能傷人弱者服之或至吐血不可不知根修治斅曰凡使勿用附生者誤服令人泄氣不禁即煎薺苨湯解之採得後於槐砧上細銼與海芋葉拌蒸從巳至申去芋葉曬乾用時珍曰凡採得以漿水煮軟去骨曬乾用海芋葉麻而有毒恐不可用也氣味苦寒有小毒別錄曰甘大寒權曰苦辛有大毒元素曰苦甘辛陰中微陽瀉肺損真氣時珍曰得棗即不損脾之才曰反甘草用菖蒲解之恭曰畏菖蒲蘆葦鼠屎大明曰赤小豆為之使惡薯蕷主治蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆本經頸腋癰腫頭痛發汗利大小便別錄瀉毒藥泄天行黃病溫瘧破癥結大明下惡血癖塊腹內雷鳴通月水墮胎孕甄權治隱疹風及風毒腳腫並煮水日日熱淋取愈蘇頌發明成無己曰大戟甘遂之苦以泄水者腎所主也好古曰大戟與甘遂同為泄水之藥濕勝者苦燥除之也時珍曰痰涎之為物隨氣升降無處不到入於心則迷竅而成癲癇妄言妄見入於肺則塞竅而成咳唾稠黏喘急背冷入於肝則留伏蓄聚而成脅痛乾嘔寒熱往來入於經絡則麻痹疼痛入於筋骨則頸項胸背腰脅手足牽引隱痛陳無擇三因方並以控涎丹主之殊有奇效此乃治痰之本痰之本水也濕也得氣與火則凝滯而為痰為飲為涎為涕為癖大戟能泄臟腑之水濕甘遂能行經隧之水濕白芥子能散皮裡膜外之痰氣惟善用者能收奇功也又錢仲陽謂腎為真水有補無瀉而復云痘瘡變黑歸腎一證用百祥圓下之以瀉腎非瀉腎也瀉其腑則臟自不實愚按百祥惟用大戟一味大戟能行水故曰瀉其腑則臟自不實腑者膀胱也竊謂百祥非獨瀉腑正實則瀉其子也腎邪實而瀉其肝也大戟味苦澀浸水色青綠肝膽之藥也故百祥圓又治嗽而吐青綠水夫青綠者少陽風木之色也仲景亦云心下痞滿引脅下痛乾嘔短氣者十棗湯主之其中亦有大戟夫乾嘔脅痛非肝膽之病乎則百祥之瀉肝膽也明矣肝乃東方宜瀉不宜補況瀉青瀉黃皆瀉其子同一瀉也何獨腎只瀉腑乎潔古老人治變黑歸腎證用宣風散代百祥圓亦是瀉子之意蓋毒勝火熾則水益涸風挾火勢則土受虧故津血內竭不能化膿而成青黑干陷之證瀉其風火之毒所以救腎扶脾也或云脾虛腎旺故瀉腎扶脾者非也腎之真水不可瀉瀉其陷伏之邪毒爾附方舊一新一十百祥圓治嗽而吐青綠水又治痘瘡歸腎紫黑干陷不發寒者宜下之不黑者慎勿下紅芽大戟不以多少陰乾漿水煮極軟去骨日乾復納原汁中煮汁盡焙為末水丸粟米大每服一二十丸研赤脂麻湯下潔古活法機要棗變百祥丸治斑瘡變黑大便閉結用大戟一兩棗三枚水一碗同煮曝乾去大戟以棗肉焙丸服從少至多以利為度控涎丹治痰涎留在胸膈上下變為諸病或頸項胸背腰脅手足胯髀隱痛不可忍筋骨牽引釣痛走易及皮膚麻痹似乎癱瘓不可誤作風氣風毒及瘡疽施治又治頭痛不可舉或睡中流涎或咳唾喘息或痰迷心竅並宜此藥數服痰涎自失諸疾尋愈紫大戟白甘遂白芥子微炒各一兩為末薑汁打麵糊丸梧子大每服七丸或二十丸以津液嚥下若取利則服五六十丸三因方水腫喘急小便澀及水蠱大戟炒二兩乾薑炮半兩為散每服三錢薑湯下大小便利為度聖濟總錄水病腫滿不問年月淺深大戟當歸橘皮各一兩切以水二升煮取七合頓服利下水二三斗勿怪至重者不過再服便瘥禁毒食一年永不復作此方出張尚客李絳兵部手集水氣腫脹大戟一兩廣木香半兩為末五更酒服一錢半取下碧水後以粥補之忌咸物簡便方用大戟燒存性研末每空心酒服一錢匕水腫腹大如鼓或遍身浮腫用棗一斗入鍋內以水浸過用大戟根苗蓋之瓦盆合定煮熟取棗無時食之棗盡決愈又大戟散用大戟白牽牛木香等分為末每服一錢以豬腰子一對批開摻末在內濕紙煨熟空心食之左則塌左右則塌右張潔古活法機要牙齒搖痛大戟咬於痛處良生生編中風發熱大戟苦參四兩白酢漿一斗煮熟洗之寒乃止千金方澤漆本經下品釋名漆莖別錄貓兒眼睛草綱目綠葉綠花草綱目五鳳草弘景曰是大戟苗生時摘葉有白汁故名澤漆亦齧人肉余見下集解別錄曰澤漆大戟苗也生太山川澤三月三日七月七日採莖葉陰乾大明曰此即大戟花也川澤中有莖梗小花黃色葉似嫩菜四五月採之頌曰今冀州鼎州明州及近道皆有之時珍曰別錄陶氏皆言澤漆是大戟苗日華子又言是大戟花其苗可食然大戟苗泄人不可為菜今考土宿本草及寶藏論諸書並云澤漆是貓兒眼睛草一名綠葉綠花草一名五鳳草江湖原澤平陸多有之春生苗一科分枝成叢柔莖如馬齒莧綠葉如苜蓿葉葉圓而黃綠頗似貓睛故名貓兒眼莖頭凡五葉中分中抽小莖五枝每枝開細花青綠色復有小葉承之齊整如一故又名五鳳草綠葉綠花草掐莖有白汁黏人其根白色有硬骨或以此為大戟苗者誤也五月採汁煮雄黃伏鍾乳結草砂據此則澤漆是貓兒眼睛草非大戟苗也今方家用治水蠱腳氣有效尤與神農本文相合自漢人集別錄誤以為大戟苗故諸家襲之爾用者宜審莖葉氣味苦微寒無毒別錄曰辛大明曰冷有小毒之才曰小豆為之使惡薯蕷主治皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足本經利大小腸明目輕身別錄主蠱毒蘇恭止瘧疾消痰退熱大明發明時珍曰澤漆利水功類大戟故人見其莖有白汁遂誤以為大戟然大戟根苗皆有毒泄人而澤漆根硬不可用苗亦無毒可作菜食而利丈夫陰氣甚不相侔也附方舊二新六肺咳上氣脈沉者澤漆湯主之澤漆三斤以東流水五斗煮取一斗五升去滓入半夏半升紫參白前生薑各五兩甘草黃芩人參桂心各三兩煎取五升每服五合日三服張仲景金匱要略方心下伏瘕大如杯不得食者澤漆四兩大黃葶藶熬各三兩搗篩蜜丸梧子大每服二丸日三服葛洪肘後方十種水氣澤漆十斤夏月取嫩莖葉入酒一斗研汁約二斗於銀鍋內慢火熬如稀餳入瓶內收每日空心溫酒調下一匙以愈為度聖惠方水氣蠱病生鮮貓眼睛草曬乾為末棗肉丸彈子大每服二丸白湯化下日二服覺腹中暖小便利為度乾坤秘韞腳氣赤腫行步腳痛貓兒眼睛草鷺鷥藤蜂窠等分每服一兩水五碗煎三碗熏洗之衛生易簡方牙齒疼痛貓兒眼睛草一搦研爛湯泡取汁含漱吐涎衛生易簡方男婦瘰癧貓兒眼睛草一二捆井水二桶五月五日午時鍋內熬至一桶去滓澄清再熬至一碗瓶收每以椒蔥槐枝煎湯洗瘡淨乃搽此膏數次愈便民圖纂方癬瘡有蟲貓兒眼睛草曬乾為末香油調搽之衛生易簡方甘遂本經下品釋名甘藁別錄陵藁吳普陵澤別錄甘澤吳普重澤別錄苦澤吳普白澤吳普主田本經鬼醜吳普時珍曰諸名義多未詳集解別錄曰甘遂生中山川穀二月採根陰乾普曰二月八月採弘景曰中山在代郡第一本出太山江東比來用京口者大不相似赤皮者勝白皮者都下亦有名草甘遂殊惡蓋贗偽者也恭曰甘遂苗似澤漆其根皮赤肉白作連珠實重者良草甘遂乃是蚤休療體全別苗亦不同俗名重臺葉似鬼臼蓖麻根皮白色大明曰西京者上汴滄吳者次之形似和皮甘草頌曰今陝西江東亦有之苗似澤漆莖短小而葉有汁根皮赤肉白作連珠大如指頭根修治斅曰凡採得去莖於槐砧上細銼用生甘草湯薺苨自然汁二味攪浸三日其水如墨汁乃漉出用東流水淘六七次令水清為度漉出於土器中熬脆用之時珍曰今人多以麵裹煨熟用以去其毒氣味苦寒有毒別錄曰甘大寒普曰神農桐君苦有毒岐伯雷公甘有毒元素曰純陽也之才曰瓜蒂為之使惡遠志反甘草主治大腹疝瘕腹滿面目浮腫留飲宿食破症堅積聚利水穀道本經下五水散膀胱留熱皮中痞熱氣腫滿別錄能瀉十二種水疾去痰水甄權瀉腎經及隧道水濕腳氣陰囊腫墜痰迷癲癇噎膈痞塞時珍發明宗奭曰此藥專於行水攻決為用元素曰味苦氣寒苦性泄寒勝熱直達水氣所結之處乃泄水之聖藥水結胸中非此不能除故仲景大陷胸湯用之但有毒不可輕用時珍曰腎主水凝則為痰飲溢則為腫脹甘遂能泄腎經濕氣治痰之本也不可過服但中病則止可也張仲景治心下留飲與甘草同用取其相反而立功也劉河間保命集云凡水腫服藥未全消者以甘遂末塗腹繞臍令滿內服甘草水其腫便去又王璆百一選方云腳氣上攻結成腫核及一切腫毒用甘遂末水調敷腫處即濃煎甘草汁服其腫即散二物相反而感應如此清流韓詠病腳疾用此一服病去七八再服而愈也附方舊三新一十九水腫腹滿甘遂炒二錢二分黑牽牛一兩半為末水煎時時呷之普濟方膜外水氣甘遂末大麥面各半兩水和作餅燒熟食之取利聖濟總錄身面洪腫甘遂二錢半生研為末以獖豬腎一枚分為七臠入末在內濕紙包煨令熟食之日一服至四五服當覺腹鳴小便利是其效也肘後方腎水流注腿膝攣急四肢腫痛即上方加木香四錢每用二錢煨熟溫酒嚼下當利黃水為驗御藥院方傳正水脹急大小便不利慾死甘遂五錢半生半炒胭脂壞子十文研勻每以一錢白麵四兩水和作棋子大水煮令浮淡食之大小便利後用平胃散加熟附子每以二錢煎服普濟方小兒疳水珠子甘遂炒青橘皮等分為末三歲用一錢以麥芽湯下以利為度忌酸鹹三五日名水寶散總微論水蠱喘脹甘遂大戟各一兩慢火炙研每服一字水半盞煎三五沸服不過十服聖濟錄水腫喘急大小便不通十棗丸用甘遂大戟芫花等分為末以棗肉和丸梧子大每服四十丸侵晨熱湯下利去黃水為度否則次午再服三因方妊娠腫滿氣急少腹滿大小便不利已服豬苓散不瘥者用太山赤皮甘遂二兩搗篩白蜜和丸梧子大每服五十丸得微下仍服豬苓散不下再服之豬苓散見豬苓下小品方心下留飲堅滿脈伏其人慾自利反快甘遂半夏湯用甘遂大者三枚半夏十二個以水一升煮半升去滓入芍藥五枚甘草一節水二升煮半升去滓以蜜半升同煎八合頓服取利張仲景金匱玉函腳氣腫痛腎臟風氣攻注下部瘡癢甘遂半兩木鱉子仁四個為末豬腰子一個去皮膜切片用藥四錢摻在內濕紙包煨熟空心食之米飲下服後便伸兩足大便行後吃白粥二三日為妙本事方二便不通甘遂末以生面糊調敷臍中及丹田內仍艾三壯飲甘草湯以通為度又太山赤皮甘遂末一兩煉蜜和勻分作四服日一服取利聖惠方小便轉脬甘遂末一錢豬苓湯調下立通筆峰雜興方疝氣偏腫甘遂茴香等分為末酒服二錢儒門事親婦人血結婦人少腹滿如敦狀小便微難而不渴此為水與血俱結在血室大黃二兩甘遂阿膠各一兩水一升半煮半升頓服其血當下張仲景方膈氣哽噎甘遂麵煨五錢南木香一錢為末壯者一錢弱者五分水酒調下怪病奇方痞證發熱盜汗胸背疼痛甘遂麵包漿水煮十沸去面以細糠火炒黃為末大人三錢小兒一錢冷蜜水臥時服忌油膩魚肉普濟方消渴引飲甘遂麩炒半兩黃連一兩為末蒸餅丸綠豆大每薄荷湯下二丸忌甘草楊氏家藏方癲癇心風遂心丹治風痰迷心癲癇及婦人心風血邪用甘遂二錢為末以豬心取三管血和藥入豬心內縛定紙裹煨熟取末入辰砂末一錢分作四丸每服一丸將心煎湯調下大便下惡物為效不下再服濟生方馬脾風病小兒風熱喘促悶亂不安謂之馬脾風甘遂麵包煮一錢半辰砂水飛二錢半輕粉一角為末每服一字漿水少許滴油一小點抄藥在上沉下去漿灌之名無價散全幼心鑑麻木疼痛萬靈膏用甘遂二兩蓖麻子仁四兩樟腦一兩搗作餅貼之內飲甘草湯摘玄方耳卒聾閉甘遂半寸綿裹插入兩耳內口中嚼少甘草耳卒自然通也永類方續隨子宋開寶釋名千金子開寶千兩金日華菩薩豆日華拒冬開寶聯步頌曰葉中出莖數數相續而生故名冬月始長故又名拒冬集解志曰續隨子生蜀郡處處亦有之苗如大戟頌曰今南中多有北土產少苗如大戟初生一莖莖端生葉葉中復出數莖相續花亦類大戟自葉中抽乾而生實青有殼人家園亭中多種以為飾秋種冬長春秀夏實時珍曰莖中亦有白汁可結水銀修治時珍曰凡用去殼取色白者以紙包壓去油取霜用氣味辛溫有毒主治婦人血結月閉瘀血症瘕痃癖除蠱毒鬼疰心腹痛冷氣脹滿利大小腸下惡滯物開寶積聚痰飲不下食嘔逆及腹內諸疾研碎酒服不過三顆當下惡物蜀本宣一切宿滯治肺氣水氣日服十粒瀉多以酸漿水或薄醋粥吃即止又塗疥癬瘡大明發明頌曰續隨下水最速然有毒損人不可過多時珍曰續隨與大戟澤漆甘遂莖葉相似主療亦相似其功皆長於利水惟在用之得法亦皆要藥也附方舊二新四小便不通臍腹脹痛不可忍諸藥不效者不過再服用續隨子去皮一兩鉛丹半兩同少蜜搗作團瓶盛埋陰處臘月至春末取出研蜜丸梧子大每服二三十丸木通湯下化破尤妙病急亦可旋合聖濟錄水氣腫脹聯步一兩去殼研壓去油重研分作七服每治一人用一服丈夫生餅子酒下婦人荊芥湯下五更服之當下利至曉自止後以厚朴湯補之頻吃益善忌鹽醋一百日乃不復作聯步即續隨子也斗門方陽水腫脹續隨子炒去油二兩大黃一兩為末酒水丸綠豆大每白湯下五十丸以去陳莝摘玄方涎積症塊續隨子三十枚膩粉二錢青黛炒一錢研勻糯米飯丸芡子大每服一丸打破以大棗一枚燒熟去皮核同嚼冷茶送下半夜後取下積聚惡物為效聖濟錄蛇咬腫悶欲死用重臺六分續隨子仁七粒搗篩為散酒服方寸匕兼唾和少許塗咬處立效崔元亮海上方黑子疣贅續隨子熟時塗之自落普濟方葉及莖中白汁主治剝人面皮去䵟𪒟開寶敷白癜癧瘍大明搗葉敷蠍螫立止時珍莨菪音浪蕩本經下品釋名天仙子圖經橫唐本經行唐別錄時珍曰莨菪一作䕞𦿆其子服之令人狂狼放宕故名集解別錄曰莨菪子生海濱川穀及雍州五月採子弘景曰今處處有之子形頗似五味核而極小保升曰所在皆有之葉似菘藍莖葉皆有細毛花白色子殼作罌狀結實扁細若粟米大青黃色六月七月採子日乾頌曰處處有之苗莖高二三尺葉似地黃王不留行紅藍等而闊如三指四月開花紫色莖莢有白毛五月結實有殼作罌子狀如小石榴房中子至細青白色如粟米粒斅曰凡使勿用蒼蓂子其形相似只是微赤服之無效時人多以雜之時珍曰張仲景金匱要略言菜中有水莨菪葉圓而光有毒誤食令人狂亂狀如中風或吐血以甘草汁解之子修治斅曰修事莨菪子十兩以頭醋一鎰煮乾為度卻用黃牛乳汁浸一宿至明日乳汁黑即是真者曬乾搗篩用氣味苦寒有毒別錄曰甘權曰苦辛微熱有大毒藏器曰性溫不寒大明曰溫有毒服之熱發以綠豆汁甘草升麻犀角並解之斅曰有大毒誤服之沖人心大煩悶眼生暹火頌曰本經言性寒後人多雲大熱而史記淳于意傳云淄川王美人懷子不乳飲以浪蕩藥一撮以酒飲旋乳且不乳豈熱藥所治又古方主卒顛狂亦多單用莨菪豈果性寒耶主治齒痛出蟲肉痹拘急久服輕身使人健行走及奔馬強志益力通神見鬼多食令人狂走本經療癲狂風癇顛倒拘攣別錄安心定志聰明耳目除邪逐風變白主痃癖取子洗曬隔日空腹水下一指捻亦可小便浸令泣盡曝乾如上服勿令子破破則令人發狂藏器炒焦研末治下部脫肛止冷痢主蛀牙痛咬之蟲出甄權燒熏蟲牙及洗陰汗大明發明弘景曰入療癲狂方用然不可過劑久服自無嫌通神健行足為大益而仙經不見用權曰以石灰清煮一伏時掬出去芽曝乾以附子乾薑陳橘皮桂心厚朴為丸服去一切冷氣積年氣痢甚溫暖也不可生服傷人見鬼拾針狂亂時珍曰莨菪之功未見如所說而其毒有甚焉煮一二日而芽方生其為物可知矣莨菪雲實防葵赤商陸皆能令人狂惑見鬼昔人未有發其義者蓋此類皆有毒能使痰迷心竅蔽其神明以亂其視聽故耳唐安祿山誘奚契丹飲以莨菪酒醉而坑之又嘉靖四十三年二月陝西遊僧武如香挾妖術至昌黎縣民張柱家見其妻美設飯間呼其全家同坐將紅散入飯內食之少頃舉家昏迷任其姦汙復將魘法吹入柱耳中柱發狂惑見舉家皆是妖鬼盡行殺死凡一十六人並無血跡官司執柱囚之十餘日柱吐痰二碗許聞其故乃知所殺者皆其父母兄嫂妻子姊侄也柱與如香皆論死世宗肅皇帝命榜示天下觀此妖藥亦是莨菪之流爾方其痰迷之時視人皆鬼矣解之之法可不知乎附方舊二新二十一卒發顛狂莨菪三升為末以酒一升漬數日絞去滓煎令可丸如小豆三丸日三服當覺口面急頭中如有蟲行額及手足有赤色處如此並是瘥候也未知再服取盡神良陳延之小品方風痹厥痛天仙子三錢炒大草烏頭甘草半兩五靈脂一兩為末糊丸梧子大以螺青為衣每服十丸男子菖蒲酒下女子芫花湯下聖濟錄久嗽不止有膿血莨菪子五錢淘去浮者煮令芽出炒研真酥一雞子大大棗七枚同煎令酥盡取棗日食三枚又方莨菪子三撮吞之日五六度光祿李丞服之神驗孟詵必效方年久呷嗽至三十年者莨菪子木香熏黃等分為末以羊脂塗青紙上撒末於上卷作筒燒煙燻吸之崔行功纂要方水腫蠱脹方見獸部羚羊下積冷痃癖不思飲食羸困者莨菪子三分水淘去浮者大棗四十九個水三升煮乾只取棗去皮核每空心食一個米飲下覺熱即止聖濟錄水瀉日久青州干棗十個去核入莨菪子填滿扎定燒存性每粟米飲服一錢聖惠方冷疳痢下莨菪子為末臘豬脂和丸綿裹棗許導下部因痢出更納新者不過三度瘥孟詵必效方赤白下痢腹痛腸滑後重大黃煨半兩莨菪子炒黑一撮為末每服一錢米飲下普濟方久痢不止變種種痢兼脫肛莨菪丸用莨菪子一升淘去浮者煮令芽出曬乾炒黃黑色青州棗一升去皮核釅醋二升同煮搗膏丸梧子大每服二十丸食前米飲下聖惠方腸風下血莨菪煎用莨菪實一升曝乾搗篩生薑半斤取汁銀鍋中更以無灰酒二升投之上火煎如稠餳即旋投酒度用酒可及五升即止慢火煎令可丸大如梧子每旦酒飲通下三丸增至五七丸止若丸時黏手則以菟絲粉襯隔之火候忌緊藥焦則失力也初服微熱勿怪疾甚者服過三日當下利疾去利亦止絕有效篋中方脫肛不收莨菪子炒研敷之聖惠方風牙蟲牙瑞竹堂方用天仙子一撮入小口瓶內燒煙竹筒引煙入蟲孔內熏之即死永不發普濟方用莨菪子入瓶內以熱湯淋下口含瓶口令氣熏之冷更作盡三合乃止有涎津可去甚效備急方用莨菪子數粒納孔中以蠟封之亦效牙齒宣落風痛莨菪子末綿裹咬之有汁勿咽必效方風毒咽腫咽水不下及瘰癧咽腫水服莨菪子末兩錢匕神良外臺秘要乳癰堅硬新莨菪子半匙清水一盞服之不得嚼破外臺秘要石癰堅硬不作膿者莨菪子為末醋和敷瘡頭根即拔出千金方惡瘡似癩十年不愈者莨菪子燒研敷之千金方打撲折傷羊脂調莨菪子末敷之千金方惡犬咬傷莨菪子七枚吞之日三服千金方根氣味苦辛有毒主治邪瘧疥癬殺蟲時珍附方新六瘧疾不止莨菪根燒炭水服一合量人強弱用千金方惡癬有蟲莨菪根搗爛蜜和敷之千金翼趾間肉刺莨菪根搗汁塗之雷公炮炙論序云腳生肉刺裩系菪根謂繫於裩帶上也狂犬咬人莨菪根和鹽搗敷日三上外臺秘要惡刺傷人莨菪根水煮汁浸之冷即易神方也千金方箭頭不出萬聖神應丹端午前一日不語尋見莨菪科根本枝葉花實全好者道云先生你卻在這裡道罷用柴灰自東南起圍了以木椑子掘取根下周回土次日日未出時依前不語用钁頭取出洗淨勿令雞犬婦人見於淨室中以石臼搗如泥丸彈子大黃丹為衣以紙袋封懸高處陰乾遇有箭頭不出者先以象牙末貼瘡口後用緋帛袋盛此藥放臍中綿兜肚繫了當便出也張子和儒門事親方雲實本經上品釋名員實別錄雲英別錄天豆吳普馬豆圖經羊石子圖經苗名草雲母唐本臭草圖經黏刺綱目時珍曰員亦音云其義未詳豆以子形名羊石當作羊矢其子肖之故也集解別錄曰雲實生河間川穀十月採曝乾普曰莖高四五尺大莖中空葉如麻兩兩相值六月花八月九月實十月採弘景曰處處有之子細如葶藶子而小黑其實亦類莨菪燒之致鬼未見其法術恭曰雲實大如黍及大麻子等黃黑似豆故名天豆叢生澤旁高五六尺葉如細槐亦如苜蓿枝間微刺俗謂苗為草雲母陶云似葶藶者非也保升曰所在平澤有之葉似細槐花黃白色其莢如豆其實青黃色大若麻子五月六月採實頌曰葉如槐而狹長枝上有刺苗名臭草又名羊石子草實名馬豆三月四月採苗十月採實過時即枯落也時珍曰此草山原甚多俗名黏刺赤莖中空有刺高者如蔓其葉如槐三月開黃花累然滿枝莢長三寸許狀如肥皂莢內有子五六粒正如鵲豆兩頭微尖有黃黑斑紋厚殼白仁咬之極堅重有腥氣實修治斅曰凡採得粗搗相對拌渾顆橡實蒸一日揀出曝乾氣味辛溫無毒別錄曰苦普曰神農辛小溫黃帝咸雷公苦主治泄痢腸澼澼殺蟲蠱毒去邪惡結氣止痛除寒熱本經消渴別錄治瘧多用蘇頌主下䘌膿血時珍附方新一䘌下不止雲實女萎各一兩桂半兩川烏頭二兩為末蜜丸梧子大每服五丸水下日三服肘後方花主治見鬼精物多食令人狂走久服輕身通神明本經殺精物下水燒之致鬼別錄發明時珍曰雲實花既能令人見鬼發狂豈有久服輕身之理此古書之訛也根主治骨哽及咽喉痛研汁咽之時珍蓖麻蓖音卑唐本草釋名頌曰葉似大麻子形宛如牛蜱故名時珍曰蓖亦作螕螕牛蝨也其子有麻點故名蓖麻集解恭曰此人間所種者葉似大麻葉而甚大結子如牛蜱今胡中來者莖赤高丈餘子大如皂莢核用之亦良頌曰今在處有之夏生苗葉似葎草而大厚莖赤有節如甘蔗高丈餘秋生細花隨便結實殼上有刺狀類巴豆青黃斑褐夏採莖葉秋採實冬採根日乾用時珍曰其莖有赤有白中空其葉大如瓠葉每葉凡五尖夏秋間丫里抽出花穗累累黃色每枝結實數十顆上有刺攢簇如蝟毛而軟凡三四子合成一顆枯時劈開狀如巴豆殼內有子大如豆殼有斑點狀如牛螕再去斑殼中有仁嬌白如續隨子仁有油可作印色及油紙子無刺者良子有刺者毒子修治斅曰凡使勿用黑夭赤利子緣在地蔞上生是顆兩頭尖有毒其蓖麻子節節有黃黑斑凡使以鹽湯煮半日去皮取子研用時珍曰取蓖麻油法用蓖麻仁五升搗爛以水一斗煮之有沫撇起待沫盡乃止去水以沫煎至點燈不炸滴水不散為度氣味甘辛平有小毒時珍曰凡服蓖麻者一生不得食炒豆犯之必脹死其油能伏丹砂粉霜主治水症以水研二十枚服之吐惡沫加至三十枚三日一服瘥則止又主風虛寒熱身體瘡癢浮腫屍疰惡氣榨取油塗之唐本研敷瘡痍疥癩塗手足心催生大明治瘰癧取子炒熟去皮每臥時嚼服二三枚漸加至十數枚有效宗奭主偏風不遂口眼喎斜失音口噤頭風耳聾舌脹喉痹齁喘腳氣毒腫丹瘤湯火傷針刺入肉女人胎衣不下子腸挺出開通關竅經絡能止諸痛消腫追膿拔毒時珍發明震亨曰蓖麻屬陰其性善收能追膿取毒亦外科要藥能出有形之滯物故取胎產胞衣剩骨膠血者用之時珍曰蓖麻仁甘辛有毒熱氣味頗近巴豆亦能利人故下水氣其性善走能開通諸竅經絡故能治偏風失音口噤口目喎斜頭風七竅諸病不止於出有形之物而已蓋鵜鶘油能引藥氣入內蓖麻油能拔病氣出外故諸膏多用之一人病偏風手足不舉時珍用此油同羊脂麝香鯪鯉甲等藥煎作摩膏日摩數次一月餘漸復兼服搜風化痰養血之劑三月而愈一人病手臂一塊腫痛亦用蓖麻搗膏貼之一夜而愈一人病氣鬱偏頭痛用此同乳香食鹽搗熁太陽穴一夜痛止一婦產後子腸不收搗仁貼其丹田一夜而上此藥外用屢奏奇勳但內服不可輕率爾或言搗膏以箸點於鵝馬六畜舌根下即不能食或點肛內即下血死其毒可知矣附方舊九新三十二半身不遂失音不語取蓖麻子油一升酒一斗銅鍋盛油著酒中一日煮之令熟細細服之外臺秘要口目喎斜蓖麻子仁搗膏左貼右右貼左即正婦人良方用蓖麻子仁七七粒研作餅右喎安在左手心左喎安在右手心卻以銅盂盛熱水坐藥上冷即換五六次即正也一方用蓖麻子仁七七粒巴豆十九粒麝香五分作餅如上用風氣頭痛不可忍者乳香蓖麻仁等分搗餅隨左右貼太陽穴解發出氣甚驗德生堂方用蓖麻油紙剪花貼太陽亦效又方蓖麻仁半兩棗肉十五枚搗塗紙上捲筒插入鼻中下清涕即止八種頭風蓖麻子剛子各四十九粒去殼雀腦芎一大塊搗如泥糊丸彈子大線穿掛風處陰乾用時先將好末茶調成膏子塗盞內後將炭火燒前藥煙起以盞覆之待煙盡以百沸蔥湯點盞內茶藥服之後以綿被裹頭臥汗出避風袖珍方鼻窒不通蓖麻子仁去皮三百粒大棗去皮核十五枚搗勻綿裹塞之一日一易三十餘日聞香臭也普濟方天柱骨倒小兒疳疾及諸病後天柱骨倒乃體虛所致宜生筋散貼之木鱉子六個去殼蓖麻子六十粒去殼研勻先包頭擦項上令熱以津調藥貼之鄭氏小兒方五種風癇不問年月遠近用蓖麻子仁二兩黃連一兩用銀石器納水一大碗文武火煮之干即添水三日兩夜取出黃連只用蓖麻風乾勿令見日以竹刀每個切作四段每服二十段食後荊芥湯下日二服終身忌食豆犯之必腹脹死衛生寶鑑舌上出血蓖麻子油紙燃燒煙燻鼻中自止摘玄方舌脹塞口蓖麻仁四十粒去殼研油塗紙上作燃燒煙燻之未退再熏以愈為度有人舌腫出口外一村人用此法而愈經驗良方急喉痹塞牙關緊急不通用此即破以蓖麻子仁研爛紙卷作筒燒煙燻吸即通或只取油作捻尤妙名聖煙筒咽中瘡腫杜壬方用蓖麻子仁一枚朴硝一錢同研新汲水服之連進二三服效三因方用蓖麻仁荊芥穗等分為末蜜丸綿包噙咽之水氣脹滿蓖麻子仁研水解得三合清旦一頓服盡日中當下青黃水也或云壯人止可服五粒外臺秘要腳氣作痛蓖麻子七粒去殼研爛同蘇合香丸貼足心痛即止也外臺秘要小便不通蓖麻仁三粒研細入紙捻內插入莖中即通摘玄方齁喘咳嗽蓖麻子去殼炒熟揀甜者食之須多服見效終身不可食炒豆衛生易簡方催生下胞崔元亮海上集驗方取蓖麻子七粒去殼研膏塗腳心若胎及衣下便速洗去不爾則子腸出即以此膏塗頂則腸自入也肘後方云產難取蓖麻子十四枚每手各把七枚須臾立下也子宮脫下蓖麻子仁枯礬等分為末安紙上托入仍以蓖麻子仁十四枚研膏塗頂心即入摘玄盤腸生產塗頂方同上催生下胎不拘生胎死胎蓖麻二個巴豆一個麝香一分研貼臍中並足心又下生胎一月一粒溫酒吞下集簡方一切毒腫痛不可忍蓖麻子仁搗敷即止也肘後方癘風鼻塌手指攣曲節間痛不可忍漸至斷落用蓖麻子一兩去皮黃連一兩銼豆大以小瓶子入水一升同浸春夏三日秋冬五日後取蓖麻子一枚劈破面東以浸藥水吞之漸加至四五枚微利不妨瓶中水盡更添兩月後吃大蒜豬肉試之如不發是效也若發動再服直候不發乃止杜壬方小兒丹瘤蓖麻子五個去皮研入面一匙水調塗之甚效修真秘旨瘰癧結核蓖麻子炒去皮每睡時服二三枚取效一生不可吃炒豆阮氏經驗方瘰癧惡瘡及軟癤用白膠香一兩瓦器溶化去滓以蓖麻子六十四個去殼研膏溶膠投之攪勻入油半匙頭柱點水中試軟硬添減膠油得所以緋帛量瘡大小攤貼一膏可治三五癤也儒門事親肺風面瘡起白屑或微有赤瘡用蓖麻子仁四十九粒白果膠棗各三粒瓦松三錢肥皂一個搗為丸洗面用之良吳旻扶壽方面上雀斑蓖麻子仁密陀僧硫黃各一錢為末用羊髓和勻夜夜敷之摘玄方發黃不黑蓖麻子仁香油煎焦去滓三日後頻刷之摘玄方耳卒聾閉蓖麻子一百個去殼與大棗十五枚搗爛入乳小兒乳汁和丸作鋌每以綿裹一枚塞之覺耳中熱為度一日一易二十日瘥千金方湯火灼傷蓖麻子仁蛤粉等分研膏湯傷以油調火灼以水調塗之古今錄驗針刺入肉蓖麻子去殼爛研先以帛襯傷處敷之頻看若見刺出即拔去恐藥緊弩出好肉或加白梅肉同研尤好衛生易簡方竹木骨哽蓖麻子仁一兩凝水石二兩研勻每以一捻置舌根噙咽自然不見又方蓖麻油紅曲等分研細沙糖丸皂子大綿裹含咽痰出大良雞魚骨哽蓖麻子仁研爛入百藥煎研丸彈子大井花水化下半丸即下惡犬咬傷蓖麻子五十粒去殼以井花研膏先以鹽水洗吹痛處乃貼此膏袖珍方葉氣味有毒主治腳氣風腫不仁蒸搗裹之日二三易即消又油塗炙熱熨囟上止鼻衄大驗蘇恭治痰喘咳嗽時珍附方新二齁喘痰嗽儒門事親方用九尖蓖麻葉三錢入飛過白礬二錢以豬肉四兩薄批摻藥在內荷葉裹之文武火煨熟細嚼以白湯送下名九仙散普濟方治咳嗽涎喘不問年深日近用經霜蓖麻葉經霜桑葉御米殼蜜炒各一兩為末蜜丸彈子大每服一丸白湯化下日一服名無憂丸附錄博落回拾遺藏器曰有大毒主惡瘡癭根瘤贅息肉白癜風蠱毒精魅溪毒瘡瘻和百丈青雞桑灰等分為末敷之蠱毒精魅當別有法生江南山谷莖葉如蓖麻莖中空吹之作聲如博落回折之有黃汁藥人立死不可輕用入口常山蜀漆本經下品釋名恆山吳普互草本經雞屎草日華鴨屎草日華時珍曰恆亦常也恆山乃北嶽名在今定州常山乃郡名亦今真定豈此藥始產於此得名歟蜀漆乃常山苗功用相同今併為一集解別錄曰常山生益州川穀及漢中二月八月採根陰乾又曰蜀漆生江林山川穀及蜀漢中常山苗也五月採葉陰乾弘景曰常山出宜都建平細實黃者呼為雞骨常山用之最勝蜀漆是常山苗而所出又異者江林山即益州江陽山名故是同處爾彼人採得縈結作丸得時燥者佳恭曰常山生山谷間莖圓有節高者不過三四尺葉似茗而狹長兩兩相當三月生白花青萼五月結實青圓三子為房其草暴燥色青白堪用若陰乾便黑爛郁壞矣保升曰今出金州房州梁州中江縣樹高三四尺根似荊根黃色而破五六月採葉名蜀漆也李含光曰蜀漆是常山莖八月九月採之頌曰今汴西淮浙湖南州郡亦有之並如上說而海州出者葉似楸葉八月有花紅白色子碧色似山楝子而小今天台山出一種草名土常山苗葉極甘人用為飲甘味如蜜又名蜜香草性涼益人非此常山也修治斅曰採時連根苗收如用莖葉臨時去根以甘草細銼同水拌濕蒸之臨時去甘草取蜀漆細銼又拌甘草水勻再蒸日乾用其常山凡用以酒浸一宿漉出日乾熬搗用時珍曰近時有酒浸蒸熟或瓦炒熟者亦不甚吐人又有醋製者吐人常山氣味苦寒有毒別錄曰辛微寒普曰神農岐伯苦桐君辛有毒李當之大寒權曰苦有小毒炳曰得甘草吐瘧之才曰畏玉札大明曰忌蔥菜及菘菜伏砒石主治傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆本經療鬼蠱往來水脹洒洒惡寒鼠瘻別錄治諸瘧吐痰涎治項下瘤癭甄權蜀漆氣味辛平有毒別錄曰微溫權曰苦有小毒元素曰辛純陽炳曰桔梗為之使之才曰栝蔞為之使惡貫眾主治瘧及咳逆寒熱腹中症堅痞結積聚邪氣蠱毒鬼疰本經療胸中邪結氣吐去之別錄治瘴鬼瘧多時不瘥溫瘧寒熱下肥氣甄權破血洗去腥與苦酸同用導膽邪元素發明斅曰蜀漆春夏用莖葉秋冬用根老人久病切忌服之頌曰常山蜀漆為治瘧之最要不可多進令人吐逆震亨曰常山性暴悍善驅逐能傷真氣病人稍近虛怯不可用也外臺乃用三兩作一服殊昧雷公老人久病切忌之戒時珍曰常山蜀漆有劫痰截瘧之功須在發散表邪及提出陽分之後用之得宜神效立見用失其法真氣必傷夫瘧有六經瘧五臟瘧痰濕食積瘴疫鬼邪諸瘧須分陰陽虛實不可一概論也常山蜀漆生用則上行必吐酒蒸炒熟用則氣稍緩少用亦不致吐也得甘草則吐得大黃則利得烏梅鯪鯉甲則入肝得小麥竹葉則入心得秫米麻黃則入肺得龍骨附子則入腎得草果檳榔則入脾蓋無痰不作瘧二物之功亦在驅逐痰水而已楊士瀛直指方云常山治瘧人皆薄之瘧家多蓄痰涎黃水或停瀦心下或結澼脅間乃生寒熱法當吐痰逐水常山豈容不用水在上焦則常山能吐之水在脅下則常山能破其澼而下其水但須行血藥品佐助之必收十全之功其有純熱發瘧或蘊熱內實之證投以常山大便點滴而下似泄不泄者須用北大黃為佐泄利數行然後獲愈也又待制李燾云嶺南瘴氣寒熱所感邪氣多在營衛皮肉之間欲去皮膚毛孔中瘴氣根本非常山不可但性吐人惟以七寶散冷服之即不吐且驗也附方舊三新二十五截瘧諸湯外臺秘要用常山三兩漿水三升浸一宿煎取一升欲發前頓服取吐肘後方用常山一兩秫米一百粒水六升煮三升分三服先夜未發臨發時服盡養生主論王隱者驅瘧湯云予用此四十年奇效不能盡述切勿加減萬無一吐者常山酒煮曬乾知母貝母草果各一錢半水一鍾半煎半熟五更熱服渣以酒浸發前服截瘧諸酒肘後方用常山一兩酒一升漬二三日分作三服平旦一服少頃再服臨發又服或加甘草酒煮服之宋俠經心錄醇醨湯治間日瘧支太醫云乃桂廣州方也甚驗恆山一錢二分大黃二錢半炙甘草一錢二分水一盞半煎減半曰醇發日五更溫服再以水一盞煎減半曰醨未發時溫服虞摶醫學正傳治久瘧不止常山一錢半檳榔一錢丁香五分烏梅一個酒一盞浸一宿五更飲之一服便止永不再發如神截瘧諸丸千金方恆山丸治數年不瘥者兩劑瘥一月以來者一劑瘥恆山三兩研末雞子白和丸梧子大瓦器煮熟殺腥氣則取曬乾收之每服二十丸竹葉湯下五更一服天明一服發前一服或吐或否即止肘後丹砂丸恆山搗末三兩真丹一兩研白蜜和杵百下丸梧子大先發服三丸少頃再服三丸臨時服三丸酒下無不斷者曾世榮活幼心書黃丹丸治大小久瘧恆山二兩黃丹半兩烏梅連核瓦焙一兩為末糯米粉糊丸梧子大每服三五十丸涼酒下隔一夜一服平旦一服午後方食葛洪肘後方用恆山三兩知母一兩甘草半兩搗末蜜丸梧子大先發時服十丸次服七丸後服五六丸以瘥為度和劑局方瞻仰丸治一切瘧常山四兩炒存性草果二兩炒存性為末薄糊丸梧子大每臥時冷酒服五十丸五更再服忌鵝羊熱物又勝金丸治一切瘧胸膈停痰發不愈者常山八兩酒浸蒸焙檳榔二兩生研末糊丸梧子大如上法服集簡方二聖丸治諸瘧不拘遠近大小雞骨恆山雞心檳榔各一兩生研鯪鯉甲煨焦一兩半為末糯粉糊丸綠豆大黃丹為衣每服三五十丸如上法服厥陰肝瘧寒多熱少喘息如死狀或少腹滿小便如膿不問久近不吐不泄如神恆山一兩醋浸一夜瓦器煮乾每用二錢水一盞煎半盞五更冷服趙真人濟急方太陰肺瘧痰聚胸中病至令人心寒寒甚乃熱熱間善驚如有所見恆山三錢甘草半錢秫米三十五粒水二鍾煎一鍾發日早分三次服千金方少陰腎瘧悽悽然寒手足寒腰脊痛大便難目眴眴然恆山二錢半豉半兩烏梅一錢竹葉一錢半蔥白三根水一升半煎一升發前分三服千金方牝瘧獨寒不熱者蜀漆散用蜀漆雲母煅三日夜龍骨各二錢為末每服半錢臨發日旦一服發前一服酢漿水調下溫瘧又加蜀漆一錢張仲景金匱要略牡瘧獨熱不冷者蜀漆一錢半甘草一錢麻黃二錢牡蠣粉二錢水二鍾先煎麻黃蜀漆去沫入藥再煎至一鍾未發前溫服得吐則止王燾外臺秘要溫瘧熱多恆山一錢小麥三錢淡竹葉二錢水煎五更服甚良藥性論三十年瘧肘後方治三十年老瘧及積年久瘧常山黃連各一兩酒三升漬一宿以瓦釜煮取一升半發日早服五合發時再服熱當吐冷當利無不瘥者張文仲備急方用恆山一兩半龍骨五錢附子炮二錢半大黃一兩為末雞子黃和丸梧子大未發時五丸將發時五丸白湯下支太醫云此方神驗無不斷者瘴瘧寒熱劉長春經驗方常山一寸草果一枚熱酒一碗浸一夜五更望東服之蓋臥酒醒即愈談野翁試驗方用常山檳榔甘草各二錢黑豆一百粒水煎服之乃彭司寇所傳葛稚川肘後方用常山黃連香豉各一兩附子炮七錢搗末蜜丸梧子大空腹飲服四丸欲發時三丸至午後乃食妊娠瘧疾酒蒸常山石膏煅各一錢烏梅炒五分甘草四分水一盞酒一盞浸一夜平旦溫服姚僧坦集驗方百日兒瘧水鑑仙人歌曰瘧是邪風寒熱攻直須術治免成空常山刻作人形狀釘在孩兒生氣宮如金生人金生在巳即釘巳上木生人釘亥上火生人釘寅上水土生人釘申上也小兒驚忤暴驚卒死中惡用蜀漆炒二錢左顧牡蠣一錢二分漿水煎服當吐痰而愈名千金湯阮氏胸中痰飲恆山甘草各一兩水五升煮取一升去滓入蜜二合溫服七合取吐不吐更服千金方附錄杜莖山圖經頌曰葉味苦性寒主溫瘴寒熱作止不定煩渴頭痛心躁杵爛新酒浸絞汁服吐出惡涎甚效生宜州莖高四五尺葉似苦蕒菜秋有花紫色實如枸杞子大而白土紅山頌曰葉甘苦微寒無毒主骨節疼痛勞熱瘴瘧生福州及南恩州山野中大者高七八尺葉似枇杷而小無毛秋生白花如粟粒不實福州生者作細藤似芙蓉葉其葉上青下白根如葛頭土人取根米泔浸一宿以清水再浸一宿炒黃為末每服一錢水一盞生薑一片同煎服亦治勞瘴甚效時珍曰杜莖山即土恆山土紅山又杜莖山之類故並附之藜蘆本經下品釋名山蔥別錄蔥苒本經蔥菼音毯別錄蔥葵普豐蘆普憨蔥綱目鹿蔥時珍曰黑色曰黎其蘆有黑皮裹之故名根際似蔥俗名蔥管藜蘆是矣北人謂之憨蔥南人謂之鹿蔥集解別錄曰藜蘆生太山山谷三月採根陰乾普曰大葉小根相連弘景曰近道處處有之根下極似蔥而多毛用之止剔取根微炙之保升曰所在山谷皆有葉似鬱金秦艽蘘荷等根若龍膽莖下多毛夏生冬凋八月採根頌曰今陝西山南東西州郡皆有之遼州均州解州者尤佳三月生苗葉青似初出棕心又似車前莖似蔥白青紫色高五六寸上有黑皮裹莖似棕皮有花肉紅色根似馬腸根長四五寸許黃白色二月三月採根陰乾此有二種一種水藜蘆莖葉大同只是生在近水溪澗石上根鬚百餘莖不中藥用今用者名蔥白藜蘆根鬚甚少只是三二十莖生高山者為佳均州土俗亦呼為鹿蔥範子計然云出河東黃白者善根修治雷曰凡採得去頭用糯米泔汁煮之從巳至未曬乾用氣味辛寒有毒別錄曰苦微寒普曰神農雷公辛有毒岐伯咸有毒李當之大寒大毒扁鵲苦有毒之才曰黃連為之使反細辛芍藥人參沙參紫參丹參苦參惡大黃時珍曰畏蔥白服之吐不止飲蔥湯即止主治蠱毒咳逆泄痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去死肌本經療噦逆喉痹不通鼻中息肉馬刀爛瘡不入湯用別錄主上氣去積年膿血泄痢權吐上膈風涎暗風癇病小兒𪖲齁痰疾頌末治馬疥癬宗奭發明頌曰藜蘆服錢匕一字則惡吐人又用通頂令人嚏而別本云治噦逆其效未詳時珍曰噦逆用吐藥亦反胃用吐法去痰積之義吐藥不一常山吐瘧痰瓜丁吐熱痰烏附尖吐濕痰萊菔子吐氣痰藜蘆則吐風痰者也按張子和儒門事親云一婦病風癇自六七歲得驚風后每一二年一作至五七年五七作三十歲至四十歲則日作或甚至一日十餘作遂昏癡健忘求死而已值歲大飢採百草食於野中見草若蔥狀採歸蒸熟飽食至五更忽覺心中不安吐涎如膠連日不止約一二斗汗出如洗甚昏困三日後遂輕健病去食進百脈皆和以所食蔥訪人乃憨蔥苗也即本草藜蘆是矣圖經言能吐風病此亦偶得吐法耳我朝荊和王妃劉氏年七十病中風不省人事牙關緊閉群醫束手先考太醫吏目月池翁診視藥不能入自午至子不獲已打去一齒濃煎藜蘆湯灌之少頃噫氣一聲遂吐痰而蘇調理而安藥弗瞑眩厥疾弗瘳誠然附方舊六新十三諸風痰飲藜蘆十分鬱金一分為末每以一字溫漿水一盞和服探吐經驗方中風不省牙關緊急者藜蘆一兩去蘆頭濃煎防風湯浴過焙乾碎切炒微褐色為末每服半錢小兒減半溫水調灌以吐風涎為效未吐再服簡要濟眾中風不語喉中如曳鋸聲口中涎沫取藜蘆一分天南星一個去浮皮於臍上剜一坑納入陳醋二橡斗四面火逼黃色研為末生面丸小豆大每服三丸溫酒下經驗後方諸風頭痛和州藜蘆一莖日乾研末入麝香少許吹鼻又方通頂散藜蘆半兩黃連三分搐鼻聖惠久瘧痰多不食欲吐不吐藜蘆末半錢溫齏水調下探吐保命集痰瘧積瘧藜蘆皂莢炙各一兩巴豆二十五枚熬黃研末蜜丸小豆大每空心服一丸未發時一丸臨發時又服一丸勿用飲食肘後黃疸腫疾藜蘆灰中炮為末水服半錢匕小吐不過數服效百一方胸中結聚如駭駭不去者巴豆半兩去皮心炒搗如泥藜蘆炙研一兩蜜和搗丸麻子大每吞一二丸肘後身面黑痣藜蘆灰五兩水一大碗淋汁銅器重湯煮成黑膏以針微刺破點之不過三次效聖惠鼻中息肉藜蘆三分雄黃一分為末蜜和點之每日三上自消勿點兩畔聖濟方牙齒蟲痛藜蘆末內入孔中勿吞汁神效千金翼白禿蟲瘡藜蘆末豬脂調塗之肘後方頭生蟣蝨藜蘆末摻之直指頭風白屑癢甚藜蘆末沐頭摻之緊包二日夜避風效本事方反花惡瘡惡肉反出如米藜蘆末豬脂和敷日三五上聖濟錄疥癬蟲瘡藜蘆末生油和塗斗門方羊疽瘡癢藜蘆二分附子八分為末敷之蟲自出也陶隱居方誤吞水蛭藜蘆炒為末水服一錢必吐出德生堂方附錄山磁石別錄有名未用曰苦平無毒主女子帶下生山之陽正月生葉如藜蘆莖有衣一名爰茈參果根又曰苦有毒主鼠瘻生百餘根根有衣裹莖三月三日採根一名百連一名烏蓼一名鼠莖一名鹿蒲馬腸根宋圖經頌曰苦辛寒有毒主蠱除風葉療瘡疥生秦州葉似桑三月採葉五月六月採根木藜蘆拾遺釋名黃藜蘆綱目鹿驪集解藏器曰陶弘景注漏蘆云一名鹿驪南人用苗北人用根按鹿驪乃木藜蘆非漏蘆也乃樹生如茱萸樹高二三尺有毒時珍曰鹿驪俚人呼為黃藜蘆小樹也葉如櫻桃葉狹而長多皺紋四月開細黃花五月結小長子如小豆大氣味苦辛溫有毒主治疥癬殺蟲藏器附子本經下品釋名其母名烏頭時珍曰初種為烏頭象烏之頭也附烏頭而生者為附子如子附母也烏頭如芋魁附子如芋子蓋一物也別有草烏頭白附子故俗呼此為黑附子川烏頭以別之諸家不分烏頭有川草兩種皆混雜註解今悉正之集解別錄曰附子生犍為山谷及廣漢冬月採為附子春月採為烏頭弘景曰烏頭與附子同根附子八月採八角者良烏頭四月採春時莖初生有腦頭如烏鳥之頭故謂之烏頭有兩歧共蒂狀如牛角者名烏喙取汁煎為射罔天雄似附子細而長乃至三四寸側子即附子邊角之大者並是同根而本經附子出犍為天雄出少室烏頭出朗陵分生三處當各有所宜也今則無別矣恭曰天雄附子烏頭並以蜀道綿州龍州者佳俱以八月採造余處雖有造得者力弱都不相似江南來者全不堪用大明曰天雄大而長少角刺而虛附子大而短有角平穩而實烏喙似天雄烏頭次於附子側子小於烏頭連聚生者名為虎掌並是天雄一裔子母之類氣力乃有殊等即宿根與嫩者爾斅曰烏頭少有莖苗身長而烏黑少有旁尖烏喙皮上蒼色有尖頭大者孕八九個周圍底陷黑如烏鐵天雄身全矮無尖周匝四面有附子孕十一個皮蒼色側子只是附子旁有小顆如棗核者木鱉子是喙附烏雄側中毗患者不入藥用保升曰正者為烏頭兩歧者為烏喙細長三四寸者為天雄根旁如芋散生者為附子旁連生者為側子五物同出而異名苗高二尺許葉似石龍芮及艾宗奭曰五者皆一物但依大小長短以象而名之爾頌曰五者今並出蜀土都是一種所產其種出於龍州冬至前先將陸田耕五七遍以豬糞糞之然後布種逐月耘耔至次年八月後方成其苗高三四尺莖作四稜葉如艾其花紫碧色作穗其實細小如桑椹狀黑色本只種附子一物至成熟後乃有四物以長二三寸者為天雄割削附子旁尖角為側子附子之絕小者亦名側子元種者為烏頭其餘大小者皆為附子以八角者為上綿州彰明縣多種之惟赤水一鄉者最佳然收採時月與本草不同謹按本草冬採為附子春採為烏頭博物志言附子烏頭天雄一物也春秋冬夏採之各異而廣雅云奚毒附子也一歲為側子二年為烏喙三年為附子四年為烏頭五年為天雄今一年種之便有此五物豈今人種蒔之法用力倍至故爾繁盛乎時珍曰烏頭有兩種出彰明者即附子之母今人謂之川烏頭是也春末生子故曰春採為烏頭冬則生子已成故曰冬採為附子其天雄烏喙側子皆是生子多者因象命名若生子少及獨頭者即無此數物也其產江左山南等處者乃本經所列烏頭今人謂之草烏頭者是也故曰其汁煎為射罔陶弘景不知烏頭有二以附子之烏頭注射罔之烏頭遂致諸家疑貳而雷斅之說尤不近理宋人楊天惠著附子記甚悉今撮其要讀之可不辯而明矣其說云綿州乃故廣漢地領縣八惟彰明出附子彰明領鄉二十惟赤水廉水昌明會昌四鄉產附子而赤水為多每歲以上田熟耕作壟取種於龍安龍州齊歸木門青堆小坪諸處十一月播種春月生苗其莖類野艾而澤其葉類地麻而厚其花紫瓣黃蕤長苞而圓七月採者謂之早水拳縮而小蓋未長成也九月採者乃佳其品凡七本同而末異其初種之小者為烏頭附烏頭而旁生者為附子又左右附而偶生者為鬲子附而長者為天雄附而尖者為天錐附而上出者為側子附而散生者為漏籃子皆脈絡連貫如子附母而附子以貴故專附名也凡種一而子六七以上則皆小種一而子二三則稍大種一而子特生則特大附子之形以蹲坐正節角少者為上有節多鼠乳者次之形不正而傷缺風皺者為下本草言附子八角者為良其角為側子之說甚謬矣附子之色以花白者為上鐵色者次之青綠者為下天雄烏頭天錐皆以豐實盈握者為勝漏籃側子則園人以乞役夫不足數也謹按此記所載漏籃即雷斅所謂木鱉子大明所謂虎掌者也其鬲子即烏喙也天錐即天雄之類醫方亦無此名功用當相同爾修治保升曰附子烏頭天雄側子烏喙採得以生熟湯浸半日勿令滅氣出以白灰裛之數易使干又法以米粥及糟曲等淹之並不及前法頌曰五物收時一處造釀其法先於六月內造大小面曲未採前半月用大麥煮成粥以曲造醋候熟去糟其醋不用太酸酸則以水解之將附子去根鬚於新甕內淹七日日攪一遍撈出以疏篩攤之令生白衣乃向慢風日中曬之百十日以透干為度若猛日則皺而皮不附肉時珍曰按附子記云此物畏惡最多不能常熟或種美而苗不茂或苗秀而根不充或以釀而腐或以曝而攣若有神物陰為之者故園人常禱於神目為藥妖其釀法用醋醅安密室中淹覆彌月乃發出晾乾方出釀時其大有如拳者已定輒不盈握故及一兩者極難得土人云但得半兩以上者皆良蜀人餌者少惟秦陝閩浙人宜之然秦人才市其下者閩浙才得其中者其上品則皆貴人得之矣弘景曰凡用附子烏頭天雄皆熱灰微炮令拆勿過焦惟姜附湯生用之俗方每用附子須甘草人參生薑相配者正制其毒故也斅曰凡使烏頭宜文武火中炮令皴拆擘破用若用附子須底平有九角如鐵色一個重一兩者即是氣全勿用雜木火只以柳木灰火中炮令皴拆以刀刮去上孕子並去底尖擘破於屋下平地上掘一土坑安之一宿取出焙乾用若陰制者生去皮尖底薄切以東流水並黑豆浸五日夜漉出日中曬乾用震亨曰凡烏附天雄須用童子小便浸透煮過以殺其毒並助下行之力入鹽少許尤好或以小便浸二七日揀去壞者以竹刀每個切作四片井水淘淨逐日換水再浸七日曬乾用時珍曰附子生用則發散熟用則峻補生用者須如陰制之法去皮臍入藥熟用者以水浸過炮令發拆去皮臍乘熱切片再炒令內外俱黃去火毒入藥又法每一個用甘草二錢鹽水薑汁童尿各半盞同煮熟出火毒一夜用之則毒去也氣味辛溫有大毒別錄曰甘大熱普曰神農辛岐伯雷公甘有毒李當之苦大溫有大毒元素曰大辛大熱氣厚味薄可升可降陽中之陰浮中沉無所不至為諸經引用之藥好古曰入手少陽三焦命門之劑其性走而不守非若乾薑止而不行趙嗣真曰熟附配麻黃發中有補仲景麻黃附子細辛湯麻黃附子甘草湯是也生附配乾薑補中有發仲景乾薑附子湯通脈四逆湯是也戴原禮曰附子無干姜不熱得甘草則性緩得桂則補命門李燾曰附子得生薑則能發散以熱攻熱又導虛熱下行以除冷病之才曰地膽為之使惡蜈蚣畏防風黑豆甘草人參黃耆時珍曰畏綠豆烏韭童溲犀角忌豉汁得蜀椒食鹽下達命門主治風寒咳逆邪氣溫中寒濕踒躄拘攣膝痛不能行步破症堅積聚血瘕金瘡本經腰脊風寒腳疼冷弱心腹冷痛霍亂轉筋下痢赤白強陰堅肌骨又墮胎為百藥長別錄溫暖脾胃除脾濕腎寒補下焦之陽虛元素除臟腑沉寒三陽厥逆濕淫腹痛胃寒蛔動治經閉補虛散壅李杲督脈為病脊強而厥好古治三陰傷寒陰毒寒疝中寒中風痰厥氣厥柔痓癲癇小兒慢驚風濕麻痹腫滿腳氣頭風腎厥頭痛暴瀉脫陽久痢脾泄寒瘧瘴氣久病嘔噦反胃噎膈癰疽不斂久漏冷瘡合蔥涕塞耳治聾時珍烏頭主治諸風風痹血痹半身不遂除寒冷溫養臟腑去心下堅痞感寒腹痛元素除寒濕行經散風邪破諸積冷毒李杲補命門不足肝風虛好古助陽退陰功同附子而稍緩時珍發明宗奭曰補虛寒須用附子風家即多用天雄大略如此其烏頭烏喙附子則量其材而用之時珍曰按王氏究原方云附子性重滯溫脾逐寒川烏頭性輕疏溫脾去風若是寒疾即用附子風疾即用川烏頭一云凡人中風不可先用風藥及烏附若先用氣藥後用烏附乃宜也又凡用烏附藥並宜冷服者熱因寒用也蓋陰寒在下虛陽上浮治之以寒則陰氣益甚而病增治之以熱則拒格而不納熱藥冷飲下嗌之後冷體既消熱性便發而病氣隨愈不違其情而致大益此反治之妙也昔張仲景治寒疝內結用蜜煎烏頭近效方治喉痹用蜜炙附子含之咽汁朱丹溪治疝氣用烏頭梔子並熱因寒用也李東垣治馮翰林侄陰盛格陽傷寒面赤目赤煩渴引飲脈來七八至但按之則散用姜附湯加人參投半斤服之得汗而愈此則神聖之妙也吳綬曰附子乃陰證要藥凡傷寒傳變三陰及中寒夾陰雖身大熱而脈沉者必用之或厥冷腹痛脈沉細甚則唇青囊縮者急須用之有退陰回陽之力起死回生之功近世陰證傷寒往往疑似不敢用附子直待陰極陽竭而用之已遲矣且夾陰傷寒內外皆陰陽氣頓衰必須急用人參健脈以益其原佐以附子溫經散寒舍此不用將何以救之劉完素曰俗方治麻痹多用烏附其氣暴能衝開道路故氣愈麻及藥氣盡而正氣行則麻病愈矣張元素曰附子以白朮為佐乃除寒濕之聖藥濕藥宜少加之引經又益火之原以消陰翳則便溺有節烏附是也虞摶曰附子稟雄壯之質有斬關奪將之氣能引補氣藥行十二經以追復散失之元陽引補血藥入血分以滋養不足之真陰引發散藥開腠理以驅逐在表之風寒引溫暖藥達下焦以祛除在裡之冷濕震亨曰氣虛熱甚者宜少用附子以行參耆肥人多濕亦宜少加烏附行經仲景八味丸用為少陰響導其補自是地黃後世因以附子為補藥誤矣附子走而不守取其健悍走下之性以行地黃之滯可致遠爾烏頭天雄皆氣壯形偉可為下部藥之佐無人表其害人之禍相習用為治風之藥及補藥殺人多矣王履曰仲景八味丸蓋兼陰火不足者設錢仲陽六味地黃丸為陰虛者設附子乃補陽之藥非為行滯也好古曰烏附非身涼而四肢厥者不可僭用服附子以補火必妨涸水時珍曰烏附毒藥非危病不用而補藥中少加引導其功甚捷有人才服錢匕即發燥不堪而昔人補劑用為常藥豈古今運氣不同耶荊府都昌王體瘦而冷無他病日以附子煎湯飲兼嚼硫黃如此數歲蘄州衛張百戶平生服鹿茸附子藥至八十餘康健倍常宋張杲醫說載趙知府耽酒色每日煎乾姜熟附湯吞硫黃金液丹百粒乃能健啖否則倦弱不支壽至九十他人服一粒即為害若此數人皆其臟腑稟賦之偏服之有益無害不可以常理概論也又瑣碎錄言滑颱風土極寒民啖附子如啖芋慄此則地氣使然爾附方舊二十七新九十二少陰傷寒初得二三日脈微細但欲寐小便色白者麻黃附子甘草湯微發其汗麻黃去節二兩甘草炙二兩附子炮去皮一枚水七升先煮麻黃去沫納二味煮取三升分作三服取微汗張仲景傷寒論少陰發熱少陰病始得反發熱脈沉者麻黃附子細辛湯發其汗麻黃去節二兩附子炮去皮一枚細辛二兩水一斗先煮麻黃去沫乃納二味同煮三升分三服同上少陰下利少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯用大附子一個去皮生破八片甘草炙二兩乾薑三兩水三升煮一升二合分溫再服其脈即出者愈面赤加蔥九莖腹痛加芍藥二兩嘔加生薑二兩咽痛加桔梗一兩利止脈不出加人參二兩同上陰病惡寒傷寒已發汗不解反惡寒者虛也芍藥甘草附子湯補之芍藥三兩甘草炙三兩附子炮去皮一枚水五升煮取一升五合分服同上傷寒發躁傷寒下後又發其汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯溫之乾薑一兩生附子一枚去皮破作八片水三升煮取一升頓服傷寒論陰盛格陽傷寒陰盛格陽其人必躁熱而不欲飲水脈沉手足厥逆者是此證也霹靂散用大附子一枚燒存性為末蜜水調服逼散寒氣然後熱氣上行而汗出乃愈孫兆口訣熱病吐下及下利身冷脈微發躁不止者附子炮一枚去皮臍分作八片入鹽一錢水一升煎半升溫服立效經驗後方陰毒傷寒孫兆口訣云房後受寒少腹疼痛頭疼腰重手足厥逆脈息沉細或作呃逆並宜退陰散用川烏頭乾薑等分切炒放冷為散每服一錢水一盞鹽一撮煎取半盞溫服得汗解本事方玉女散治陰毒心腹痛厥逆惡候川烏頭去皮臍冷水浸七日切曬紙裹收之遇有患者取為末一錢入鹽八分水一盞煎八分服壓下陰毒如豬血相似再進一服濟生回陽散治陰毒傷寒面青四肢厥逆腹痛身冷一切冷氣大附子三枚炮裂去皮臍為末每服三錢薑汁半盞冷酒半盞調服良久臍下如火暖為度續傳信方治陰毒傷寒煩躁迷悶急者用半兩重附子一個生破作四片生薑一大塊作三片糯米一撮以水一升煎六合溫服暖臥或汗出或不出候心定則以水解散之類解之不得與冷水如渴更煎滓服屢用多效中風痰厥昏不知人口眼喎斜並體虛之人患瘧疾寒多者三生飲用生川烏頭生附子並去皮臍各半兩生南星一兩生木香二錢五分每服五錢生薑十片水二盞煎一盞溫服和劑局方中風氣厥痰壅昏不知人六脈沉伏生附子去皮生南星去皮生木香半兩每服四錢姜九片水二盞煎七分溫服之濟生方中風偏廢羌活湯用生附子一個去皮臍羌活烏藥各一兩每服四錢生薑三片水一盞煎七分服王氏簡易方半身不遂遂令癖疰用生附子一兩以無灰酒一升浸一七日隔日飲一合延年秘錄風病癱緩手足嚲曳口眼喎斜語音蹇澀步履不正宜神驗烏龍丹主之川烏頭去皮臍五靈脂各五兩為末入龍腦麝香五分滴水為丸如彈子大每服一丸先以生薑汁研化暖酒調服一日二服至五七丸便覺抬得手移得步十丸可以梳頭也梅師方風寒濕痹麻木不仁或手足不遂生川烏頭末每以香白米煮粥一碗入末四錢慢熬得所下薑汁一匙蜜三大匙空腹啜之或入薏苡末二錢左傳云風淫末疾謂四末也脾主四肢風淫客肝則侵脾而四肢病也此湯極有力予每授人良驗許學士本事方體虛有風外受寒濕身如在空中生附子生天南星各二錢生薑十片水一盞半慢火煎服予曾病此醫博士張發授此方三服愈本事方口眼喎斜生烏頭青礬各等分為末每用一字搐入鼻內取涕吐涎立效無比名通關散篋中秘寶方口卒噤喑卒忤停屍並用附子末吹入喉中瘥千金翼產後中風身如角弓反張口噤不語川烏頭五兩銼塊黑大豆半升同炒半黑以酒三升傾鍋內急攪以絹濾取酒微溫服一小盞取汗若口不開拗開灌之未效加烏雞糞一合炒納酒中服以瘥為度聖惠方諸風血風烏荊丸治諸風縱緩言語蹇澀遍身麻痛皮膚瘙癢及婦人血風頭痛目眩腸風臟毒下血不止者服之尤效有痛風攣搐頤頷不收者服六七服即瘥也川烏頭炮去皮臍一兩荊芥穗二兩為末醋麵糊丸梧子大溫酒或熟水每服二十丸和劑方婦人血風虛冷月候不勻或手腳心煩熱或頭面浮腫頑麻用川烏頭一斤清油四兩鹽四兩鐺內同熬令裂如桑椹色為度去皮臍五靈脂四兩為末搗勻蒸餅丸如梧子大空心溫酒鹽湯下二十丸亦治丈夫風疾梅師方諸風癇疾生川烏頭去皮二錢半五靈脂半兩為末豬心血丸梧子大每薑湯化服一丸小兒慢驚搐搦涎壅厥逆川烏頭生去皮臍一兩全蠍十個去尾分作三服水一盞姜七片煎服湯氏嬰孩寶鑑小兒項軟乃肝腎虛風邪襲入用附子去皮臍天南星各二錢為末薑汁調攤貼天柱骨內服瀉青丸全幼心鑑小兒囟陷綿烏頭附子並生去皮臍二錢雄黃八分為末蔥根搗和作餅貼陷處全幼心鑑麻痹疼痛仙桃丸治手足麻痹或癱瘓疼痛腰膝痹痛或打撲傷損閃肭痛不可忍生川烏不去皮五靈脂各四兩威靈仙五兩洗焙為末酒糊丸梧子大每服七丸至十丸鹽湯下忌茶此藥常服其效如神普濟方風痹肢痛營衛不行川烏頭二兩炮去皮以大豆同炒至豆汁出為度去豆焙乾全蠍半兩焙為末釅醋熬稠丸綠豆大每溫酒下七丸日一服聖惠方腰腳冷痹疼痛有風川烏頭三個生去皮臍為散醋調塗帛上貼之須臾痛止聖惠方大風諸痹痰澼脹滿大附子半兩者二枚炮拆酒漬之春冬五日夏秋三日每服一合以瘥為度聖惠方腳氣腿腫久不瘥者黑附子一個生去皮臍為散生薑汁調如膏塗之藥干再塗腫消為度簡要濟眾十指疼痛麻木不仁生附子去皮臍木香各等分生薑五片水煎溫服王氏易簡方搜風順氣烏附丸用川烏頭二十個香附子半斤薑汁淹一宿炒焙為末酒糊丸梧子大每溫酒下十丸肌體肥壯有風疾者宜常服之澹寮方頭風頭痛外臺秘要用臘月烏頭一升炒令黃末之以絹袋盛浸三斗酒中逐日溫服孫兆口訣用附子炮石膏煅等分為末入腦麝少許每服半錢茶酒任下修真秘旨用附子一枚生去皮臍綠豆一合同入銚子內煮豆熟為度去附子食綠豆立瘥每個可煮五次後為末服之風毒頭痛聖惠方治風毒攻注頭目痛不可忍大附子一枚炮去皮為末以生薑一兩大黑豆一合炒熟同酒盞煎七分調附末一錢溫服又方治二三十年頭風不愈者用大川烏頭生去皮四兩天南星炮一兩為末每服二錢細茶三錢薄荷七葉鹽梅一個水一盞煎七分臨臥溫服朱氏集驗方治頭痛連睛者生烏頭一錢白芷四錢為末茶服一字仍以末搐鼻有人用之得效風寒頭痛十便良方治風寒客於頭中清涕項筋急硬胸中寒痰嘔吐清水用大附子或大川烏頭二枚去皮蒸過芎藭生薑各一兩焙研以茶湯調服一錢或銼片每用五錢水煎服隔三四日一服或加防風一兩三因方必效散治風寒流注偏正頭痛年久不愈最有神效用大附子一個生切四片以薑汁一盞浸炙再浸再炙汁盡乃止高良薑等分為末每服一錢臘茶清調下忌熱物少時頭風摩散沐頭中風頭面多汗惡風當先風一日則痛甚用大附子一個炮食鹽等分為末以方寸匕摩囟上令藥力行或以油調稀亦可一日三上張仲景方年久頭痛川烏頭天南星等分為末蔥汁調塗太陽穴經驗頭風斧劈難忍川烏頭末燒煙燻碗內溫茶泡服之集簡方痰厥頭痛如破厥氣上衝痰塞胸膈炮附子三分釜墨四錢冷水調服方寸匕當吐即愈忌豬肉冷水腎厥頭痛指南方用大附子一個炮熟去皮生薑半兩水一升半煎分三服經驗良方韭根丸治元陽虛頭痛如破眼睛如錐刺大川烏頭去皮微炮全蠍以糯米炒過去米等分為末韭根汁丸綠豆大每薄荷茶下十五丸一日一服氣虛頭痛氣虛上壅偏正頭痛不可忍者大附子一枚去皮臍研末蔥汁麵糊丸綠豆大每服十丸茶清下僧繼洪澹寮方蠍附丸元氣虛頭痛惟此方最合造化之妙附子助陽扶虛鍾乳補陽鎮墜全蠍取其鑽透蔥涎取其通氣湯使用椒以達下鹽以引用使虛氣下歸對證用之無不作效大附子一枚剜心入全蠍去毒三枚在內以余附末同鍾乳粉二錢半白麵少許水和作劑包附煨熟去皮研末蔥涎和丸梧子大每椒鹽湯下五十丸腎氣上攻頭項不能轉移椒附丸用大熟附子一枚為末每用二錢以椒二十粒用白麵填滿椒口水一盞半姜七片煎七分去椒入鹽空心點服椒氣下達以引逆氣歸經也本事方鼻淵腦泄生附子末蔥涎和如泥盦湧泉穴普濟耳鳴不止無晝夜者烏頭燒作灰菖蒲等分為末綿裹塞之日再用取效楊氏產乳耳卒聾閉附子醋浸削尖插之或更於上灸二七壯本草拾遺聤耳膿血生附子為末蔥涕和灌耳中肘後喉痹腫塞附子去皮炮令拆以蜜塗上炙之令蜜入含之勿咽汁已成者即膿出未成者即消出本草拾遺久患口瘡生附子為末醋面調貼足心男左女右日再換之經驗後方風蟲牙痛普濟方用附子一兩燒灰枯礬一分為末揩之又方川烏頭川附子生研麵糊丸小豆大每綿包一丸咬之刪繁方用炮附子末納孔中乃止眼暴赤腫磣痛不得開淚出不止削附子赤皮末如蠶砂大著眥中以定為度張文仲備急方一切冷氣去風痰定遍身疼痛益元氣強精力固精益髓令人少病川烏頭一斤用五升大瓷缽子盛以童子小便浸七日逐日添令溢出揀去壞者不用余以竹刀切作四片新汲水淘七次乃浸之日日換水日足取焙為末酒煮麵糊丸綠豆大每服十丸空心鹽湯下少粥飯壓之經驗方升降諸氣暖則宣流熟附子一大個分作二服水二盞煎一盞入沉香汁溫服和劑局方中寒昏困姜附湯治體虛中寒昏不知人及臍腹冷痛霍亂轉筋一切虛寒之病生附子一兩去皮臍乾薑炮一兩每服三錢水二鍾煎一鍾溫服和劑局方心腹冷痛冷熱氣不和山梔子川烏頭等分生研為末酒糊丸梧子大每服十五丸生薑湯下小腸氣痛加炒茴香蔥酒下二十丸王氏博濟方心痛疝氣濕熱因寒鬱而發用梔子降濕熱烏頭破寒鬱烏頭為梔子所引其性急速不留胃中也川烏頭山梔子各一錢為末順流水入薑汁一匙調下丹溪纂要寒厥心痛及小腸膀胱痛不可止者神砂一粒丹用熟附子去皮鬱金橘紅各一兩為末醋麵糊丸如酸棗大硃砂為衣每服一丸男子酒下女人醋湯下宣明方寒疝腹痛繞臍手足厥冷自汗出脈弦而緊用大烏頭煎主之大烏頭五枚去臍水三升煮取一升去滓納蜜二升煎令水氣盡強人服七合弱人服五合不瘥明日更服張仲景金匱玉函方寒疝身痛腹痛手足逆冷不仁或身痛不能眠用烏頭桂枝湯主之烏頭一味以蜜二斤煎減半入桂枝湯五合解之得一升初服二合不知再服又不知加至五合其知者如醉狀得吐為中病也金匱玉函寒疝引脅肋心腹皆痛諸藥不效者大烏頭五枚去角四破以白蜜一斤煎令透取焙為末別以熟蜜和丸梧子大每服二十丸冷鹽湯下永除崔氏方寒疝滑泄腹痛腸鳴自汗厥逆熟附子去皮臍延胡索炒各一兩生木香半兩每服四錢水二盞姜七片煎七分溫服濟生方小腸諸疝蘇沈良方倉卒散治寒疝腹痛小腸氣膀胱氣脾腎諸痛攣急難忍汗出厥逆大附子炒去皮臍一枚山梔子炒焦四兩每用三錢水一盞酒半盞煎七分入鹽一捻溫服宣明方治陰疝小腹腫痛加蒺藜子等分虛者加桂枝等分姜糊為丸酒服五十丸虛寒腰痛鹿茸去毛酥炙微黃附子炮去皮臍各二兩鹽花三分為末棗肉和丸梧子大每服三十丸空心溫酒下夷堅志云時康祖大夫病心胸一漏數竅流汁已二十年又苦腰痛行則傴僂形神憔悴醫不能治通判韓子溫為檢聖惠方得此方令服旬余腰痛減久服遂瘥心漏亦瘥精力倍常步履輕捷此方本治腰而效乃如此元臟傷冷斗門方用附子炮去皮臍為末以水二盞入藥二錢鹽蔥薑棗同煎取一盞空心服去積冷暖下元肥腸益氣酒食無礙梅師方二虎丸補元臟進飲食壯筋骨用烏頭附子各四兩釅醋浸三宿切作片子掘一小坑炭火燒赤以醋三升同藥傾入坑內用盆合之一宿取出去砂土入青鹽四兩同炒赤黃色為末醋打麵糊丸如梧子大空心冷酒下十五丸婦人亦宜胃冷有痰脾弱嘔吐生附子半夏各二錢姜十片水二盞煎七分空心溫服一方並炮熟加木香五分奇效良方久冷反胃經驗方用大附子一個生薑一斤銼細同煮研如麵糊每米飲化服一錢衛生家寶方用薑汁打糊和附子末為丸大黃為衣每溫水服十丸斗門方用最大附子一個坐於磚上四面著火漸逼以生薑自然汁淬之依前再逼再淬約薑汁盡半碗乃止研末每服一錢粟米飲下不過三服瘥或以豬腰子切片炙熟蘸食方便集用大附子一個切下頭子剜一竅安丁香四十九個在內仍合定線扎入砂銚內以薑汁浸過文火熬干為末每挑少許置掌心舐吃日十數次忌毒物生冷脾寒瘧疾濟生方云五臟氣虛陰陽相勝發為痎瘧寒多熱少或但寒不熱宜七棗湯主之用附子一枚炮七次鹽湯浸七次去皮臍分作二服水一碗生薑七片棗七枚煎七分露一宿發日空心溫服未久再進一服王璆百一選方云寒痰宜附子風痰宜烏頭若用烏頭則寒多者火炮七次熱多者湯泡七次去皮焙乾如上法用烏頭性熱泡多則熱散也又果附湯用熟附子去皮草果仁各二錢半水一盞姜七片棗一枚煎七分發日早溫服肘後方臨發時以醋和附子末塗於背上寒熱瘧疾附子一枚重五錢者麵煨人參丹砂各一錢為末煉蜜丸梧子大每服二十丸未發前連進三服中病則吐或身體麻木未中病來日再服龐安常傷寒論瘴瘧寒熱冷瘴寒熱往來頭痛身疼嘔痰或汗多引飲或自利煩躁宜姜附湯主之大附子一枚四破每以一片水一盞生薑十片煎七分溫服李待制云此方極妙章傑云嶺南以啞瘴為危急不過一二日而死醫謂極熱感寒也用生附子一味治之多愈得非以熱攻熱而發散寒邪乎真起死回生之藥也嶺南衛生方小便虛閉兩尺脈沉微用利小水藥不效者乃虛寒也附子一個炮去皮臍鹽水浸良久澤瀉一兩每服四錢水一盞半燈心七莖煎服即愈普濟方腫疾喘滿大人小兒男女腫因積得既取積而腫再作小便不利若再用利藥性寒而小便愈不通矣醫者到此多束手蓋中焦下焦氣不升降為寒痞隔故水凝而不通惟服沉附湯則小便自通喘滿自愈用生附子一個去皮臍切片生薑十片入沉香一錢磨水同煎食前冷飲附子雖三五十枚亦無害小兒每服三錢水煎服朱氏集驗方脾虛濕腫大附子五枚去皮四破以赤小豆半升藏附子於中慢火煮熟去豆焙研末以薏苡仁粉打糊丸梧子大每服十丸蘿蔔湯下朱氏集驗方陰水腫滿烏頭一升桑白皮五升水五升煮一升去滓銅器盛之重湯煎至可丸丸小豆大每服三五丸取小便利為佳忌油膩酒面魚肉又方大附子童便浸三日夜逐日換尿以布擦去皮搗如泥酒糊和丸小豆大每服三十丸煎流氣飲送下普濟方大腸冷秘附子一枚炮去皮取中心如棗大為末二錢蜜水空心服之聖濟總錄老人虛泄不禁熟附子一兩赤石脂一兩為末醋糊丸梧子大米飲下五十丸楊氏家藏方冷氣洞泄生川烏頭一兩木香半兩為末醋糊丸梧子大每陳皮湯下二十丸本事方臟寒脾泄及老人中氣不足久泄不止肉豆蔻二兩煨熟大附子去皮臍一兩五錢為末粥丸梧子大每服八十丸蓮肉煎湯下十便良方治脾胃虛冷大腸滑泄米穀不化乏力用大附子十兩連皮同大棗二升於石器內以水煮一日常令水過兩指取出每個切作三片再同煮半日削去皮切焙為末別以棗肉和丸梧子大每空心米飲服三四十丸小兒吐泄注下小便少白龍丸用熟附子五錢白石脂煅龍骨煅各二錢半為末醋麵糊丸黍米大每米飲量兒大小服全幼心鑑霍亂吐泄不止附子重七錢者炮去皮臍為末每服四錢水二盞鹽半錢煎一盞溫服立止孫兆秘寶方水泄久痢川烏頭二枚一生用一以黑豆半合同煮熟研丸綠豆大每服五丸黃連湯下普濟方久痢赤白獨聖丸用川烏頭一個灰火燒煙欲盡取出地上盞蓋良久研末酒化蠟丸如大麻子大每服三丸赤痢黃連甘草黑豆煎湯放冷吞下白痢甘草黑豆煎湯冷吞如瀉及肚痛以水吞下並空心服之忌熱物經驗後方久痢休息熟附子半兩研末雞子白二枚搗和丸梧子大傾入沸湯煮數沸漉出作兩服米飲下聖濟總錄下痢咳逆脈沉陰寒者退陰散主之陳自明云一人病此不止服此兩服而愈方見前陰毒傷寒下下血虛寒日久腸冷者熟附子去皮枯白礬一兩為末每服三錢米飲下又方熟附子一枚去皮生薑三錢半水煎服或加黑豆一百粒並聖惠方陽虛吐血生地黃一斤搗汁入酒少許以熟附子一兩半去皮臍切片入汁內石器煮成膏取附片焙乾入山藥三兩研末以膏和搗丸梧子大每空心米飲下三十丸昔葛察判妻苦此疾百藥皆試得此而愈屢發屢效余居士選奇方溲數白濁熟附子為末每服二錢姜三片水一盞煎六分溫服普濟方虛火背熱虛火上行背內熱如火炙者附子末津調塗湧泉穴摘玄方經水不調血臟冷痛此方平易捷徑熟附子去皮當歸等分每服三錢水煎服普濟方斷產下胎生附子為末淳苦酒和塗右足心胎下去之小品方折腕損傷卓氏膏用大附子四枚生切以豬脂一斤三年苦醋同漬三宿取脂煎三上三下日摩敷之深師方癰疽腫毒川烏頭炒黃柏炒各一兩為末唾調塗之留頭干則以米泔潤之同上癰疽久漏瘡口冷膿水不絕內無惡肉大附子以水浸透切作大片厚三分安瘡口上以艾灸之隔數日一灸灸至五七次仍服內托藥自然肌肉長滿研末作餅子亦可薛己外科心法癰疽胬肉如眼不斂諸藥不治此法極妙附子削如棋子大以唾黏貼上用艾火灸之附子焦復唾濕再灸令熱氣徹內即瘥千金方癰疽肉突烏頭五枚濃醋三升漬三日洗之日夜三四度古今錄驗疔瘡腫痛醋和附子末塗之干再上千金翼久生疥癬川烏頭生切以水煎洗甚驗聖惠手足凍裂附子去皮為末以水面調塗之良談野翁試驗方足釘怪疾兩足心凸腫上生黑豆瘡硬如釘脛骨生碎孔髓流出身發寒顫惟思飲酒此是肝腎冷熱相吞用炮川烏頭末敷之內服韭子湯效夏氏奇疾方烏頭附子尖主治為末茶服半錢吐風痰癲癇時珍發明時珍曰烏附用尖亦取其銳氣直達病所爾無他義也保幼大全云小兒慢脾驚風四肢厥逆用附子尖一個硫黃棗大一個蠍梢七個為末薑汁麵糊丸黃米大每服十丸米飲下亦治久瀉尫羸凡用烏附不可執為性熱審其手足冷者輕則用湯甚則用丸重則用膏候手足暖陽氣回即為佳也按此方乃和劑局方碧霞丹變法也非真慢脾風不可輒用故初虞世有金虎碧霞之戒附方舊一新七風厥癲癇凡中風痰厥癲癇驚風痰涎上壅牙關緊急上視搐搦並宜碧霞丹主之烏頭尖附子尖蠍梢各七十個石綠研九度飛過十兩為末麵糊丸芡子大每用一丸薄荷汁半盞化下更服溫酒半合須臾吐出痰涎為妙小兒驚癇加白殭蠶等分和劑局方臍風撮口生川烏尖三個金赤蜈蚣半條酒浸炙乾麝香少許為末以少許吹鼻得嚏乃以薄荷湯灌一字永類方木舌腫脹川烏尖巴豆研細醋調塗刷集簡方牙痛難忍附子尖天雄尖全蠍各七個生研為末點之永類方奔豚疝氣作痛或陰囊腫痛去鈴丸用生川烏尖七個巴豆七枚去皮油為末糕糊丸梧子大硃砂麝香為衣每服二丸空心冷酒或冷鹽湯下三兩日一服不可多澹寮方割甲成瘡連年不愈川烏頭尖黃柏等分為末洗了貼之以愈為度古今錄驗老幼口瘡烏頭尖一個天南星一個研末薑汁和塗足心男左女右不過二三次即愈天雄本經下品釋名白幕本經時珍曰天雄乃種附子而生出或變出其形長而不生子故曰天雄其長而尖者謂之天錐象形也集解別錄曰天雄生少室山谷二月採根陰乾弘景曰今採用八月中旬天雄似附子細而長乃至三四寸許此與烏頭附子三種本出建平故謂之三建今宜都佷山者最好謂為西建錢塘間者謂為東建氣力小弱不相似故曰西冰猶勝東白也其用灰殺之時有冰強者不佳恭曰天雄附子烏頭並以蜀道綿州龍州出者佳余處縱有力弱不相似陶以三物俱出建平故名之者非也烏頭苗名堇音靳爾雅云芨堇草是也今訛堇為建遂以建平釋之矣承曰天雄諸說悉備但始種而不生附子側子經年獨長大者是也蜀人種之尤忌生此以為不利如養蠶而成白僵之意時珍曰天雄有二種一種是蜀人種附子而生出長者或種附子而盡變成長者即如種芋形狀不一之類一種是他處草烏頭之類自生成者故別錄注烏喙云長三寸已上者為天雄是也入藥須用蜀產曾經釀製者或云須重一兩半有象眼者乃佳余見附子下修治斅曰宜炮皴去皮尖底用或陰制如附子法亦得大明曰凡丸散炮去皮用飲藥即和皮生使甚佳時珍曰熟用一法每十兩以酒浸七日掘土坑用炭半秤煅赤去火以醋二升沃之候乾乘熱入天雄在內小盆合一夜取出去臍用之氣味辛溫有大毒別錄曰甘大溫權曰大熱宜乾薑制之之才曰遠志為之使惡腐婢忌豉汁主治大風寒濕痹歷節痛拘攣緩急破積聚邪氣金瘡強筋骨輕身健行本經療頭面風去來疼痛心腹結積關節重不能行步除骨間痛長陰氣強志令人武勇力作不倦又墮胎別錄禹錫曰按淮南子云天雄雄雞志氣益注云取天雄一枚納雄雞腸中搗生食之令人勇治風痰冷痹軟腳毒風能止氣喘促急殺禽蟲毒甄權治一切風一切氣助陽道暖水臟補腰膝益精明目通九竅利皮膚調血脈四肢不遂下胸膈水破痃癖癥結排膿止痛續骨消瘀血背脊傴僂霍亂轉筋發汗止陰汗炮含治喉痹大明發明宗奭曰補虛寒須用附子風家多用天雄亦取其大者以其尖角多熱性不肯就下故取其敷散也元素曰非天雄不能補上焦之陽虛震亨曰天雄烏頭氣壯形偉可為下部之佐時珍曰烏附天雄皆是補下焦命門陽虛之藥補下所以益上也若是上焦陽虛即屬心脾之分當用參耆不當用天雄也且烏附天雄之尖皆是向下生者其氣下行其臍乃向上生苗之處寇宗奭言其不肯就下張元素言其補上焦陽虛皆是誤認尖為上爾惟朱震亨以為下部之佐者得之而未發出此義雷斅炮炙論序云咳逆數數酒服熟雄謂以天雄炮研酒服一錢也附方新三三建湯治元陽素虛寒邪外攻手足厥冷大小便滑數小便白渾六脈沉微除固冷扶元氣及傷寒陰毒用烏頭附子天雄並炮裂去皮臍等分㕮咀每服四錢水二盞姜十五片煎八分溫服肘後方男子失精天雄三兩炮白朮八兩桂枝六兩龍骨三兩為散每酒服半錢張仲景金匱要略大風惡癩三月四月採天雄烏頭苗及根去土勿洗搗汁漬細粒黑豆摩去皮不落者一夜取出曬乾又浸如此七次初吞三枚漸加至六七枚禁房室豬魚雞蒜犯之即死側子別錄下品釋名萴子時珍曰生於附子之側故名許慎說文作萴子集解弘景曰此附子邊角之大者削取之昔時不用比來醫家以療腳氣多驗恭曰側子附子皆是烏頭下旁出者以小者為側子大者為附子今以附子角為側子理必不然若當陽以下江左山南嵩高齊魯間附子時復有角如大豆許夔州以上劍南所出者附子之角但如黍粟豈可充用比來都下皆用細附子有效未嘗取角也保升曰今附子邊果有角如大棗核及檳榔以來者形狀自是一顆且不小乃烏頭旁出附子附子旁出側子甚明時珍曰側子乃附子旁黏連小者爾故吳普陶弘景皆指為附子角之大者其又小於側子者即漏籃子矣故楊氏附子記言側子漏籃園人皆不重之以乞役夫修治同附子氣味辛大熱有大毒普曰神農岐伯有大毒八月採畏惡與附子同主治癰腫風痹歷節腰腳疼冷寒熱鼠瘻又墮胎別錄療腳氣冷風濕痹大風筋骨攣急甄權冷酒調服治遍身風疹神妙雷斅發明機曰烏頭乃原生之腦得母之氣守而不移居乎中者也側子散生旁側體無定在其氣輕揚宜其發散四肢充達皮毛為治風之藥天雄長而尖其氣親上宜其補上焦之陽虛木鱉子則餘氣所結其形摧殘宜其不入湯服令人喪目也時珍曰唐元希聲侍郎治癱瘓風有側子湯見外臺秘要藥多不錄漏籃子綱目釋名木鱉子炮炙論虎掌日華時珍曰此乃附子之瑣細未成者小而漏籃故名南星之最小者名虎掌此物類之故亦同名大明會典載四川成都府歲貢天雄二十對附子五十對烏頭五十對漏籃二十斤不知何用氣味苦辛有毒斅曰服之令人喪目主治惡痢冷漏瘡惡瘡癘風時珍發明時珍曰按楊士瀛直指方云凡漏瘡年久者復其元陽當用漏籃子輩加減用之如不當用而輕用之又恐熱氣乘虛變移結核而為害尤甚也又按類編云一人兩足生瘡臭潰難近夜宿五夫人祠下夢神授方用漏籃子一枚生研為末入膩粉少許井水調塗依法治之果愈蓋此物不堪服餌止宜入瘡科也附方新一一切惡痢雜下及休息痢百歲丸用漏籃子一個大者阿膠木香黃連罌粟殼各半兩俱炒焦存性入乳香少許為末糊丸梧子大每一歲一丸米飲下羅天益衛生寶鑑烏頭本經下品校正併入拾遺獨白草釋名烏喙本經即兩頭尖草烏頭綱目土附子日華奚毒本經耿子吳普毒公吳普又名帝秋金鴉綱目苗名茛音艮芨音及堇音近獨白草拾遺鴛鴦菊綱目汁煎名射罔普曰烏頭形如烏之頭也有兩歧相合如烏之喙者名曰烏喙喙即烏之口也恭曰烏喙即烏頭異名也此有三歧者然兩歧者少若烏頭兩歧名烏喙則天雄附子之兩歧者復何以名之時珍曰此即烏頭之野生於他處者俗謂之草烏頭亦曰竹節烏頭出江北者曰淮烏頭日華子所謂土附子者是也烏喙即偶生兩歧者今俗呼為兩頭尖因形而名其實乃一物也附子天雄之偶生兩歧者亦謂之烏喙功亦同於天雄非此烏頭也蘇恭不知此義故反疑之草烏頭取汁曬為毒藥射禽獸故有射罔之稱後魏書言遼東塞外秋收烏頭為毒藥射禽獸陳藏器所引續漢五行志言西國生獨白草煎為藥敷箭射人即死者皆此烏頭非川烏頭也菊譜云鴛鴦菊即烏喙苗也集解別錄曰烏頭烏喙生朗陵山谷正月二月採陰乾長三寸以上者為天雄普曰正月始生葉厚莖方中空葉四四相當與蒿相似弘景曰今採用四月亦以八月採搗笮莖汁日煎為射罔獵人以敷箭射禽獸十步即倒中人亦死宜速解之朗陵屬汝南郡大明曰土附子生去皮搗濾汁澄清旋添曬乾取膏名為射罔以作毒箭時珍曰處處有之根苗花實並與川烏頭相同但此係野生又無釀造之法其根外黑內白皺而枯燥為異爾然毒則甚焉段成式酉陽雜俎言雀芋狀如雀頭置乾地反濕濕地反干飛鳥觸之墮走獸遇之僵似亦草烏之類而毒更甚也又言建寧郡烏勾山有牧靡草鳥鵲誤食烏喙中毒必急食此草以解之牧靡不知何藥也修治時珍曰草烏頭或生用或炮用或以烏大豆同煮熟去其毒用烏頭氣味辛溫有大毒別錄曰甘大熱大毒普曰神農雷公桐君黃帝甘有毒權曰苦辛大熱有大毒大明曰味薟辛熱有毒之才曰莽草遠志為之使反半夏栝蔞貝母白蘞白芨惡藜蘆時珍曰伏丹砂砒石忌豉汁畏飴糖黑豆冷水能解其毒主治中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱其汁煎之名射罔殺禽獸本經消胸上痰冷食不下心腹冷疾臍間痛肩胛痛不可俯仰目中痛不可久視又墮胎別錄主惡風憎寒冷痰包心腸腹㽲痛痃癖氣塊齒痛益陽事強志甄權治頭風喉痹癰腫疔毒時珍烏喙一名兩頭尖氣味辛微溫有大毒普曰神農雷公桐君黃帝有毒權曰苦辛大熱畏惡同烏頭主治風濕丈夫腎濕陰囊癢寒熱歷節掣引腰痛不能行步癰腫膿結又墮胎別錄男子腎氣衰弱陰汗瘰癧歲月不消甄權主大風頑痹時珍射罔氣味苦有大毒之才曰溫大明曰人中射罔毒以甘草藍汁小豆葉浮萍冷水薺苨皆可一味御之主治屍疰症堅及頭中風痹痛別錄瘻瘡瘡根結核瘰癧毒腫及蛇咬先取塗肉四畔漸漸近瘡習習逐病至骨瘡有熱膿及黃水塗之若無膿水有生血及新傷破即不可塗立殺人藏器發明時珍曰草烏頭射罔乃至毒之藥非若川烏頭附子人所栽種加以釀製殺其毒性之比自非風頑急疾不可輕投甄權藥性論言其益陽事治男子腎氣衰弱者未可遽然也此類止能搜風勝濕開頑痰治頑瘡以毒攻毒而已豈有川烏頭附子補右腎命門之功哉吾蘄郝知府自負知醫因病風癬服草烏頭木鱉子藥過多甫入腹而麻痹遂至不救可不慎乎機曰烏喙形如烏嘴其氣鋒銳宜其通經絡利關節尋蹊達徑而直抵病所煎為射罔能殺禽獸非氣之鋒銳捷利能如是乎楊清叟曰凡風寒濕痹骨內冷痛及損傷入骨年久發痛或一切陰疽腫毒並宜草烏頭南星等分少加肉桂為末薑汁熱酒調塗未破者能內消久潰者能去黑爛二藥性味辛烈能破惡塊逐寒熱遇冷即消遇熱即潰附方舊四新四十八陰毒傷寒生草烏頭為末以蔥頭蘸藥納穀道中名提盆散王海藏陰證略例二便不通即上方名霹靂箭中風癱瘓手足顫掉言語蹇澀左經丸用草烏頭炮去皮四兩川烏頭炮去皮二兩乳香沒藥各一兩為末生烏豆一升以斑蝥三七個去頭翅同煮豆熟去蝥取豆焙乾為末和勻以醋麵糊丸梧子大每服三十丸溫酒下簡易方癱瘓頑風骨節疼痛下元虛冷諸風痔漏下血一切風瘡草烏頭川烏頭兩頭尖各三錢硫黃麝香丁香各一錢木鱉子五個為末以熟蘄艾揉軟合成一處用草紙包裹燒熏病處名雷丸孫天仁集效方諸風不遂宋氏集驗方用生草烏頭晚蠶砂等分為末取生地龍搗和入少醋糊丸梧子大每服四五丸白湯下甚妙勿多服恐麻人名鄂渚小金丹經驗濟世方用草烏頭四兩去皮大豆半升鹽一兩同以沙瓶煮三伏時去豆將烏頭入木臼搗三百杵作餅焙乾為末酒糊丸梧子大每空心鹽湯下十丸名至寶丹一切頑風神應丹用生草烏頭生天麻各洗等分擂爛絞汁傾盆中砌一小坑其下燒火將盆放坑上每日用竹片攪一次夜則露之曬至成膏作成小鋌子每一鋌分作三服用蔥姜自然汁和好酒熱服乾坤秘韞一切風證不問頭風痛風黃鴉吊腳風痹生淮烏頭一斤生川烏頭一枚生附子一枚併為末蔥一斤姜一斤擂如泥和作餅子以草鋪盤內加楮葉於上安餅於葉上又鋪草葉蓋之待出汗黃一日夜乃曬之舂為末以生薑取汁煮麵糊和丸梧子大初服三十丸日二服服後身痹汗出即愈避風乾坤秘韞破傷風病壽域方用草烏頭為末每以一二分溫酒服之出汗儒門事親方用草烏尖白芷並生研末每服半錢冷酒一盞入蔥白一根同煎服少頃以蔥白熱粥投之汗出立愈年久麻痹或歷節走氣疼痛不仁不拘男女神授散用草烏頭半斤去皮為末以袋一個盛豆腐半袋入烏末在內再將豆腐填滿壓干入鍋中煮一夜其藥即堅如石取出曬乾為末每服五分冷風濕氣以生薑湯下麻木不仁以蔥白湯下之活人心統風濕痹木黑神丸草烏頭連皮生研五靈脂等分為末六月六日滴水丸彈子大四十歲以下分六服病甚一丸作二服薄荷湯化下覺微麻為度本事方風濕走痛黑弩箭丸用兩頭尖五靈脂各一兩乳香沒藥當歸各三錢為末醋糊丸梧子大每服十丸至三十丸臨臥溫酒下忌油膩濕面孕婦勿服瑞竹堂方腰腳冷痛烏頭三個去皮臍研末醋調貼須臾痛止十便良方膝風作痛草烏細辛防風等分為末摻靴襪中及安護膝內能除風濕健步扶壽方遠行腳腫草烏細辛防風等分為末摻鞋底內如草鞋以水微濕摻之用之可行千里甚妙經驗腳氣掣痛或胯間有核生草烏頭大黃木鱉子作末薑汁煎茶調貼之又法草烏一味為末以薑汁或酒糟同搗貼之永類方濕滯足腫早輕晚重用草烏頭一兩以生薑一兩同研交感一宿蒼朮一兩以蔥白一兩同研交感一宿各焙乾為末酒糊丸梧子大每服五十丸酒下艾元英如宜方除風去濕治脾胃虛弱久積冷氣飲食減少用草烏頭一斤蒼朮二斤以去白陳皮半斤生甘草四兩黑豆三升水一石同煮乾只揀烏術曬焙為末酒糊丸梧子大焙乾收之每空心溫酒下二三十丸覺麻即漸減之名烏術丸集簡方偏正頭風草烏頭四兩川芎藭四兩蒼朮半斤生薑四兩連須生蔥一把搗爛同入瓷瓶封固埋土中春五夏三秋五冬七日取出曬乾揀去蔥姜為末醋麵糊和丸梧子大每服九丸臨臥溫酒下立效戴古渝經驗方久患頭風草烏頭尖生用一分赤小豆三十五粒麝香一字為末每服半錢薄荷湯冷服更隨左右搐鼻指南方風痰頭痛體虛傷風停聚痰飲上厥頭痛或偏或正草烏頭炮去皮尖半兩川烏頭生去皮尖一兩藿香半兩乳香三皂子大為末每服二錢薄荷薑湯下食後服陳言三因方女人頭痛血風證草烏頭梔子等分為末自然蔥汁隨左右調塗太陽及額上勿過眼避風濟生方腦泄臭穢草烏去皮半兩蒼朮一兩川芎二兩並生研末麵糊丸綠豆大每服十丸茶下忌一切熱物聖濟總錄耳鳴耳癢如流水及風聲不治成聾用生烏頭掘得乘濕削如棗核大塞之日易二次不過三日愈千金方喉痹口噤不開欲死草烏頭皂莢等分為末入麝香少許擦牙並搐鼻內牙關自開也濟生方用草烏尖石膽等分為末每用一錢醋煮皂莢汁調稀掃入腫上流涎數次其毒即破也虛壅口瘡滿口連舌者草烏一個南星一個生薑一大塊為末睡時以醋調塗手心足心或以草烏頭吳茱萸等分為末蜜調塗足心本事方疳蝕口鼻穿透者草烏頭燒灰入麝香等分為末貼之風蟲牙痛草烏炒黑一兩細辛一錢為末揩之吐出涎一方草烏食鹽同炒黑摻之海上方寒氣心疝三十年者射罔食茱萸等分為末蜜丸麻子大每酒下二丸日三服劉國英所秘之方範汪東陽方寒瘧積瘧巴豆一枚去心皮射罔如巴豆大大棗去皮一枚搗成丸梧子大清旦先發時各服一丸白湯下肘後方脾寒厥瘧先寒後熱名寒瘧但寒不熱面色黑者名厥瘧寒多熱少面黃腹痛名脾瘧三者並宜服此賈耘老用之二十年累試有效不蛀草烏頭削去皮沸湯泡二七度以盞蓋良久切焙研稀糊丸梧子大每服三十丸姜十片棗三枚蔥三根煎湯清早服以棗壓之如人行十里許再一服絕勿飲湯便不發也蘇東坡良方腹中癥結害妨飲食羸瘦射罔二兩椒三百粒搗末雞子白和丸麻子大每服一丸漸至三丸以愈為度肘後方水泄寒痢大草烏一兩以一半生研一半燒灰醋糊和丸綠豆大每服七丸井華水下忌生冷魚肉十便良方泄痢注下三神丸治清濁不分泄瀉注下或赤或白腹臍刺痛裡急後重用草烏頭三個去皮尖以一個火炮一個醋煮一個燒灰為末醋糊丸綠豆大每服二十丸水瀉流水下赤痢甘草湯下白痢薑湯下忌魚腥生冷和劑局方結陰下血腹痛草烏頭蛤粉炒去皮臍切一兩茴香炒三兩每用三錢水一盞入鹽少許煎八分去滓露一夜五更冷服聖濟錄老人遺尿不知出者草烏頭一兩童便浸七日去皮同鹽炒為末酒糊丸綠豆大每服二十丸鹽湯下普濟內痔不出草烏為末津調點肛門內痔即反出乃用枯痔藥點之外科集驗方疔毒初起草烏頭七個川烏頭三個杏仁九個飛羅面一兩為末無根水調搽留口以紙蓋之干則以水潤之唐瑤經驗方疔毒惡腫生烏頭切片醋熬成膏攤貼次日根出又方兩頭尖一兩巴豆四個搗貼疔自拔出普濟方疔瘡發背草烏頭去皮為末用蔥白連須和搗丸豌豆大以雄黃為衣每服一丸先將蔥一根細嚼以熱酒送下或有噁心嘔三四口用冷水一口止之即臥以被厚蓋汗出為度亦治頭風乾坤秘韞惡毒諸瘡及發背疔瘡便毒等證二烏膏用草烏頭川烏頭於瓦上以井華水磨汁塗之如有口即塗四邊干再上亦可單用草烏磨醋塗之永類方大風癬瘡遍身黑色肌體麻木痹痛不常草烏頭一斤刮洗去皮極淨攤干以清油四兩鹽四兩同入銚內炒令深黃色傾出剩油只留鹽並藥再炒令黑煙出為度取一枚擘破心內如米一點白者始好白多再炒乘熱杵羅為末醋麵糊丸梧子大每服三十丸空心溫酒下草烏性毒難制五七日間以黑豆煮粥食解其毒繼洪澹寮方遍身生瘡陰囊兩腳尤甚者草烏一兩鹽一兩化水浸一夜炒赤為末豬腰子一具去膜煨熟竹刀切搗醋糊丸綠豆大每服三十丸空心鹽湯下澹寮方一切諸瘡未破者草烏頭為末入輕粉少許臘豬油和搽普濟方瘰癧初作未破作寒熱草烏頭半兩木鱉子二個以米醋磨細入搗爛蔥頭蚯蚓糞少許調勻敷上以紙條貼令通氣孔妙醫林正宗馬汗入瘡腫痛急療之遲則毒深以生烏頭末敷瘡口良久有黃水出即愈靈苑方蛇蠍螫人射罔敷之頻易血出愈梅師方中沙蝨毒射罔敷之佳千金白附子別錄下品釋名見後發明下集解別錄曰白附子生蜀郡三月採弘景曰此物久絕無復真者恭曰本出高麗今出涼州以西蜀郡不復有生砂磧下濕地獨莖似鼠尾草細葉周匝生於穗間根形似天雄珣曰徐表南州異物記云生東海新羅國及遼東苗與附子相似時珍曰根正如草烏頭之小者長寸許乾者皺紋有節氣味辛甘大溫有小毒保升曰甘辛溫大明曰無毒珣曰小毒入藥炮用杲曰純陽引藥勢上行主治心痛血痹面上百病行藥勢別錄中風失音一切冷風氣面皯瘢疵大明諸風冷氣足弱無力疥癬風瘡陰下濕癢頭面痕入面脂用李珣補肝風虛好古風痰震亨發明時珍曰白附子乃陽明經藥因與附子相似故得此名實非附子類也按楚國先賢傳云孔休傷頰有瘢王莽賜玉屑白附子香與之消瘢附方新十二中風口喎半身不遂牽正散用白附子白殭蠶全蠍並等分生研為末每服二錢熱酒調下楊氏家藏方小兒暑風暑毒入心痰塞心孔昏迷搐搦此乃危急之證非此丸生料瞑眩之劑不能伐之三生丸用白附子天南星半夏並去皮等分生研豬膽汁和丸黍米大量兒大小以薄荷湯下令兒側臥嘔出痰水即蘇全幼心鑑風痰眩暈頭痛氣鬱胸膈不利白附子炮去皮臍半斤石膏煅紅半斤硃砂二兩二錢半龍腦一錢為末粟米飯丸小豆大每服三十丸食後茶酒任下御藥院方偏正頭風白附子白芷豬牙皂角去皮等分為末每服二錢食後茶清調下右痛右側臥左痛左側臥兩邊皆痛仰臥少頃普濟方痰厥頭痛白附子天南星半夏等分生研為末生薑自然汁浸蒸餅丸綠豆大每服四十丸食後薑湯下濟生方赤白汗斑白附子硫黃等分為末薑汁調稀茄蒂蘸擦日數次簡便方面上皯𪒟白附子為末臥時漿水洗面以白蜜和塗紙上貼之久久自落衛生易簡方耳出膿水白附子炮羌活各一兩為末豬羊腎各一個每個入末半錢濕紙包煨熟五更食溫酒下聖濟錄喉痹腫痛白附子末枯礬等分研末塗舌上有涎吐出聖惠方偏墜疝氣白附子一個為末津調填臍上以艾灸三壯或五壯即愈楊起簡便方小兒吐逆不定虛風喘急白附子藿香等分為末每米飲下半錢保幼大全方慢脾驚風白附子半兩天南星半兩黑附子一錢並炮去皮為末每服二錢生薑五片水煎服亦治大人風虛止吐化痰宣和間真州李博士用治吳內翰女孫甚效康州陳侍郎病風虛極昏吳內翰令服三四服即愈楊氏家藏虎掌本經下品天南星宋開寶釋名虎膏綱目鬼蒟蒻日華恭曰其根四畔有圓牙看如虎掌故有此名頌曰天南星即本草虎掌也小者名由跋古方多用虎掌不言天南星南星近出唐人中風痰毒方中用之乃後人採用別立此名爾時珍曰虎掌因葉形似之非根也南星因根圓白形如老人星狀故名南星即虎掌也蘇頌說甚明白宋開寶不當重出南星條今併入集解別錄曰虎掌生漢中山谷及冤句二月八月採陰乾弘景曰近道亦有形似半夏但大而四邊有子如虎掌今用多破作三四片方藥不甚用也恭曰此是由跋宿根其苗一莖莖頭一葉枝丫挾莖根大者如拳小者如雞卵都似扁柿四畔有圓牙看如虎掌由跋是新根大如半夏二三倍四畔無子牙陶說似半夏乃由跋也保升曰莖頭有八九葉花生莖間藏器曰天南星生安東山谷葉如荷獨莖用根頌曰虎掌今河北州郡有之初生根如豆大漸長大似半夏而扁年久者根圓及寸大者如雞卵周匝生圓牙三四枚或五六枚三四月生苗高尺余獨莖上有葉如爪五六出分布尖而圓一窠生七八莖時出一莖作穗直上如鼠尾中生一葉如匙裹莖作房旁開一口上下尖中有花微青褐色結實如麻子大熟即白色自落布地一子生一窠九月苗殘取根今冀州人菜圃中種之呼為天南星又曰天南星處處平澤有之二月生苗似荷梗其莖高一尺以來葉如蒟蒻兩枝相抱五月開花似蛇頭黃色七月結子作穗似石榴子紅色二月八月採根似芋而圓扁與蒟蒻相類人多誤採了不可辨但蒟蒻莖斑花紫南星根小柔膩肌細炮之易裂為可辨爾南星即本經虎掌也大者四邊皆有牙子採時削去之江州一種草葉大如掌面青背紫四畔有牙如虎掌生三四葉為一本冬青不結花實治心疼寒熱積氣亦與虎掌同名故附見之時珍曰大者為虎掌南星小者為由跋乃一種也今俗又言大者為鬼臼小者為南星殊為謬誤修治頌曰九月採虎掌根去皮臍入器中湯浸五七日日換三四遍洗去涎曝乾用或再火炮裂用時珍曰凡天南星須用一兩以上者佳治風痰有生用者須以溫湯洗淨仍以白礬湯或入皂角汁浸三日夜日日換水曝乾用若熟用者須於黃土地掘一小坑深五六寸以炭火燒赤以好酒沃之安南星於內瓦盆覆定灰泥固濟一夜取出用急用即以濕紙包於煻灰火中炮裂也一法治風熱痰以酒浸一宿桑柴火蒸之常灑酒入甑內令氣猛一伏時取出竹刀切開味不麻舌為熟未熟再蒸至不麻乃止脾虛多痰則以生薑渣和黃泥包南星煨熟去泥焙用造南星曲法以薑汁礬湯和南星末作小餅子安籃內楮葉包蓋待上黃衣乃取曬收之造膽星法以南星生研末臘月取黃牯牛膽汁和劑納入膽中系懸風處干之年久者彌佳氣味苦溫有大毒別錄曰微寒普曰虎掌神農雷公苦有毒岐伯桐君辛有毒大明曰辛烈平杲曰苦辛有毒陰中之陽可升可降乃肺經之本藥震亨曰欲其下行以黃柏引之之才曰蜀漆為之使惡莽草大明曰畏附子乾薑生薑時珍曰得防風則不麻得牛膽則不燥得火炮則不毒生能伏雄黃丹砂焰硝主治心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道本經除陰下濕風眩別錄主疝瘕腸痛傷寒時疾強陰甄權天南星主中風麻痹除痰下氣利胸膈攻堅積消癰腫散血墮胎開寶金瘡折傷瘀血搗敷之藏器蛇蟲咬疥癬惡瘡大明去上焦痰及眩暈元素主破傷風口噤身強李杲補肝風虛治痰功同半夏好古治驚癇口眼喎斜喉痹口舌瘡糜結核解顱時珍發明時珍曰虎掌天南星乃手足太陰脾肺之藥味辛而麻故能治風散血氣溫而燥故能勝濕除涎性緊而毒故能攻積拔腫而治口喎舌糜楊士瀛直指方云諸風口噤宜用南星更以人參石菖蒲佐之附方舊八新三十二中風口噤目瞑無門下藥者開關散用天南星為末入白龍腦等分五月五日午時合之每用中指點末揩齒三二十遍揩大牙左右其口自開又名破棺散經驗方諸風口噤天南星炮銼大人三錢小兒三字生薑五片蘇葉一錢水煎減半入雄豬膽汁少許溫服仁齋直指方小兒口噤牙關不開譚氏方天南星一枚煨熱紙裹斜包剪一小孔透氣於口中牙關自開也一方用生南星同薑汁擦之自開小兒驚風墜涎散用天南星一兩重一個換酒浸七伏時取出安新瓦上周迴炭火炙裂合濕地出火毒為末入硃砂一分每服半錢荊芥湯調下每日空心一服午時一服經驗方吐瀉慢驚天王散治小兒吐瀉或誤服冷藥脾虛生風痰慢驚天南星一個重八九錢者去臍黃土坑深三寸炭火五斤煅赤入好酒半盞安南星在內仍架炭三條在上候發裂取銼再炒熟為末用五錢天麻煨熟研末一錢麝香一字和勻三歲小兒用半錢以生薑防風煎湯調下亦治久嗽噁心錢乙小兒方風癇痰迷墜痰丸用天南星九蒸九曬為末薑汁麵糊丸梧子大每服二十丸人參湯下石菖蒲麥門冬湯亦可衛生寶鑑小兒癇喑癇後喑不能言以天南星濕紙包煨為末雄豬膽汁調服二字全幼心鑑治癇利痰天南星煨香一兩硃砂一錢為末豬心血丸梧子大每防風湯化下一丸普濟方口眼喎斜天南星生研末自然薑汁調之左貼右右貼左仁存方角弓反張南星半夏等分為末薑汁竹瀝灌下一錢仍灸印堂摘玄方破傷中風胡氏奪命散又名玉真散治打撲金刃傷及破傷風傷濕發病強直如癇狀者天南星防風等分為末水調敷瘡出水為妙仍以溫酒調服一錢已死心尚溫者熱童便調灌二錢鬥毆內傷墜壓者酒和童便連灌三服即蘇亦可煎服三因方破傷風瘡生南星末水調塗瘡四圍水出有效普濟方婦人頭風攻目作痛天南星一個掘地坑燒赤安藥於中以醋一盞沃之蓋定勿令透氣候冷研末每服一字以酒調下重者半錢經驗方風痰頭痛不可忍天南星一兩荊芥葉一兩為末薑汁糊丸梧子大每食後薑湯下二十丸又上清丸用天南星茴香等分生研末鹽醋煮麵糊丸如上法服並出經效濟世方風痰頭暈目眩吐逆煩懣飲食不下玉壺丸用生南星生半夏各一兩天麻半兩白麵三兩為末水丸梧子大每服三十丸以水先煎沸入藥煮五七沸漉出放溫以薑湯吞之惠民和劑局方腦風流涕邪風入腦鼻內結硬遂流髓涕大白南星切片沸湯泡二次焙乾每用二錢棗七個甘草五分同煎服三四服其硬物自出腦氣流轉髓涕自收以大蒜蓽茇末作餅隔紗貼滷前熨斗熨之或以香附蓽茇末頻吹鼻中直指方小兒風痰熱毒壅滯涼心壓驚抱龍丸用牛膽南星一兩入金錢薄荷十片丹砂一錢半龍腦麝香各一字研末煉蜜丸芡子大每服一丸竹葉湯化下全幼心鑑壯人風痰及中風中氣初起星香飲用南星四錢木香一錢水二盞生薑十四片煎六分溫服王碩易簡方痰迷心竅壽星丸治心膽被驚神不守舍或痰迷心竅恍惚健忘妄言妄見天南星一斤先掘土坑一尺以炭火三十斤燒赤入酒五升滲干乃安南星在內盆覆定以灰塞之勿令走氣次日取出為末琥珀一兩硃砂二兩為末生薑汁打麵糊丸梧子大每服三十丸至五十丸煎人參石菖蒲湯下一日三服和劑局方風痰注痛方見羊躑躅下痰濕臂痛右邊者南星制蒼朮等分生薑三片水煎服之摘玄方風痰咳嗽大天南星一枚炮裂研末每服一錢水一盞姜三片煎五分溫服每日早午晚各一服十全博救氣痰咳嗽玉粉丸南星曲半夏曲陳橘皮各一兩為末自然薑汁打糊丸如梧子大每服四十丸薑湯下寒痰去橘皮加官桂東垣蘭室秘藏清氣化痰三仙丸治中脘氣滯痰涎煩悶頭目不清生南星去皮半夏各五兩並湯泡七次為末自然薑汁和作餅鋪竹篩內以楮葉包覆待生黃成曲曬乾每用二兩入香附末一兩糊丸梧子大每服四十丸食後薑湯下王璆百一選方溫中散滯消導飲食天南星炮高良薑炮各一兩砂仁二錢半為末薑汁糊丸梧子大每薑湯下五十丸和劑方酒積酒毒服此即解天南星丸用正端天南星一斤土坑燒赤沃酒一斗入坑放南星盆覆泥固濟一夜取出酒和水洗淨切片焙乾為末入硃砂末一兩薑汁麵糊丸梧子大每服五十丸薑湯下蔡丞相呂丞相嘗用有驗楊氏家藏方吐泄不止集效方四肢厥逆虛風不省人事服此則陽回名回陽散天南星為末每服三錢京棗三枚水二鍾煎八分溫服未省再服又方醋調南星末貼足心普濟方腸風瀉血諸藥不效天南星石灰炒焦黃色為末酒糊丸梧子大每酒下二十丸普濟方吐血不止天南星一兩銼如豆大以爐灰汁浸一宿洗焙研末每服一錢以自然銅磨酒調下勝金方初生貼囟頭熱鼻塞者天南星炮為末水調貼囟上炙手熨之危氏得效方小兒解顱囟開不合鼻塞不通天南星炮去皮為末淡醋調緋帛上貼囟門炙手頻熨之立效錢乙小兒直訣解頤脫臼不能收上用南星末薑汁調塗兩頰一夜即上醫說小兒口瘡白屑如鵝口不須服藥以生天南星去皮臍研末醋調塗足心男左女右閻孝忠集效方走馬疳蝕透骨穿腮生南星一個當心剜空入雄黃一塊麵裹燒候雄黃作汁以盞子合定出火毒去面為末入麝香少許拂瘡數日甚效經驗方風蟲牙痛南星末塞孔以霜梅盦住去涎摘玄方喉風喉痹天南星一個剜心入白殭蠶七枚紙包煨熟研末薑汁調服一錢甚者灌之吐涎愈名如聖散博濟方痰瘤結核南星膏治人皮肌頭面上生瘤及結核大者如拳小者如慄或軟或硬不疼不癢宜用此藥不可輒用針灸生天南星大者一枚研爛滴好醋五七點如無生者以乾者為末醋調先用針刺令氣透乃貼之覺癢則頻貼取效嚴子禮濟生方身面疣子醋調南星末塗之簡易方由跋別錄下品釋名集解恭曰由跋是虎掌新根大於半夏一二倍四畔未有子牙其宿根即虎掌也藏器曰由跋生林下苗高一二尺似蒟蒻根如雞卵保升曰春抽一莖莖端有八九葉根圓扁而肉白時珍曰此即天南星之小者其氣未足不堪服食故醫方罕用惟重八九錢至一兩餘者氣足乃佳正如附子之側子不如附子之義也正誤弘景曰由跋本出始興今人亦種之狀如烏翣而布地花紫色根似附子苦酒摩塗腫亦效恭曰陶氏所說乃鳶尾根即鳶頭也又言虎掌似半夏是以鳶尾為由跋以由跋為半夏非惟不識半夏亦不識鳶尾與由跋也今南人猶以由跋為半夏時珍曰陳延之小品方亦以東海鳶頭為由跋則其訛誤久矣氣味辛苦溫有毒主治毒腫結熱別錄蒟蒻宋開寶釋名蒻頭開寶鬼芋圖經鬼頭集解志曰蒻頭出吳蜀葉似由跋半夏根大如碗生陰地雨滴葉下生子又有斑杖苗相似至秋有花直出生赤子根如蒻頭毒猛不堪食虎杖亦名斑杖與此不同頌曰江南吳中出白蒟蒻亦曰鬼芋生平澤極多人採以為天南星了不可辨市中所收往往是此但南星肌細膩而蒟蒻莖斑花紫南星莖無斑花黃為異爾時珍曰蒟蒻出蜀中施州亦有之呼為鬼頭閩中人亦種之宜樹陰下掘坑積糞春時生苗至五月移之長一二尺與南星苗相似但多斑點宿根亦自生苗其滴露之說蓋不然經二年者根大如碗及芋魁其外理白味亦麻人秋後採根須淨擦或搗成片段以釅灰汁煮十餘沸以水淘洗換水更煮五六遍即成凍子切片以苦酒五味淹食不以灰汁則不成也切作細絲沸湯汋過五味調食狀如水母絲馬志言其苗似半夏楊慎丹鉛錄言蒟醬即此者皆誤也王禎農書云救荒之法山有粉葛蒟蒻橡慄之利則此物亦有益於民者也其斑杖即天南星之類有斑者根氣味辛寒有毒李廷飛曰性冷甚不益人冷氣人少食之生則戟人喉出血主治癰腫風毒摩敷腫上搗碎以灰汁煮成餅五味調食主消渴開寶發明機曰按三元延壽書云有人患瘵百物不忌見鄰家修蒟蒻求食之美遂多食而瘵愈又有病腮癰者數人多食之亦皆愈附錄菩薩草宋圖經頌曰生江浙州郡凌冬不凋秋冬有花直出赤子如蒻頭冬月採根用味苦無毒主中諸毒食毒酒研服之又諸蟲傷搗汁飲並敷之婦人妊娠咳嗽搗篩蜜丸服效半夏本經下品釋名守田別錄水玉本經地文本經和姑吳普時珍曰禮記月令五月半夏生蓋當夏之半也故名守田會意水玉因形集解別錄曰半夏生槐里川穀五月八月採根曝乾普曰生微丘或生野中二月始生葉三三相偶白花圓上弘景曰槐里屬扶風今第一齣青州吳中亦有以肉白者為佳不厭陳久恭曰所在皆有生平澤中者名羊眼半夏圓白為勝然江南者大乃徑寸南人特重之頃來互用功狀殊異其苗似是由跋誤以為半夏也頌曰在處有之以齊州者為佳二月生苗一莖莖端三葉淺綠色頗似竹葉而生江南者似芍藥葉根下相重上大下小皮黃肉白五月八月採根以灰裹二日湯洗曝乾蜀圖經云五月採則虛小八月採乃實大其平澤生者甚小名羊眼半夏由跋絕類半夏而苗不同斅曰白傍芁子真似半夏只是咬著微酸不入藥用修治弘景曰凡用以湯洗十許過令滑盡不爾有毒戟人咽喉方中有半夏必須用生薑者以制其毒故也斅曰修事半夏四兩用白芥子末二兩釅醋六兩攪濁將半夏投中洗三遍用之若洗涎不盡令人氣逆肝氣怒滿時珍曰今治半夏惟洗去皮垢以湯泡浸七日逐日換湯晾乾切片薑汁拌焙入藥或研為末以薑汁入湯浸澄三日瀝去涎水曬乾用謂之半夏粉或研末以薑汁和作餅子日乾用謂之半夏餅或研末以薑汁白礬湯和作餅楮葉包置籃中待生黃衣日乾用謂之半夏曲白飛霞醫通云痰分之病半夏為主造而為曲尤佳治濕痰以薑汁白礬湯和之治風痰以薑汁及皂莢煮汁和之治火痰以薑汁竹瀝或荊瀝和之治寒痰以薑汁礬湯入白芥子末和之此皆造麴妙法也根氣味辛平有毒別錄曰生微寒熟溫生令人吐熟令人下湯洗盡滑用元素曰味辛苦性溫氣味俱薄沉而降陰中陽也好古曰辛厚苦輕陽中陰也入足陽明太陰少陽三經之才曰射干為之使惡皂莢畏雄黃生薑乾薑秦皮龜甲反烏頭權曰柴胡為之使忌羊血海藻飴糖元素曰熱痰佐以黃芩風痰佐以南星寒痰佐以乾薑痰痞佐以陳皮白朮多用則瀉脾胃諸血證及口渴者禁用為其燥津液也孕婦忌之用生薑則無害主治傷寒寒熱心下堅胸脹咳逆頭眩咽喉腫痛腸鳴下氣止汗本經消心腹胸膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫療痿黃悅澤面目墮胎別錄消痰下肺氣開胃健脾止嘔吐去胸中痰滿生者摩癰腫除瘤癭氣甄權治吐食反胃霍亂轉筋腸腹冷痰瘧大明治寒痰及形寒飲冷傷肺而咳消胸中痞膈上痰除胸寒和胃氣燥脾濕治痰厥頭痛消腫散結元素治眉稜骨痛震亨補肝風虛好古除腹脹目不得瞑白濁夢遺帶下時珍發明權曰半夏使也虛而有痰氣宜加用之頌曰胃冷嘔噦方藥之最要成無己曰辛者散也潤也半夏之辛以散逆氣結氣除煩嘔發音聲行水氣而潤腎燥好古曰經云腎主五液化為五濕自入為唾入肝為泣入心為汗入脾為痰入肺為涕有痰曰嗽無痰曰咳痰者因咳而動脾之濕也半夏能泄痰之標不能泄痰之本泄本者泄腎也咳無形痰有形無形則潤有形則燥所以為流濕潤燥也俗以半夏為肺藥非也止嘔吐為足陽明除痰為足太陰柴胡為之使故今柴胡湯中用之雖為止嘔亦助柴胡黃芩主往來寒熱是又為足少陽陽明也宗奭曰今人惟知半夏去痰不言益脾蓋能分水故也脾惡濕濕則濡困困則不能治水經云濕勝則瀉一男子夜數如廁或教以生薑一兩半夏大棗各三十枚水一升瓷瓶中慢火燒為熟水時呷之便已也趙繼宗曰丹溪言二陳湯治一身之痰世醫執之凡有痰者皆用夫二陳內有半夏其性燥烈若風痰寒痰濕痰食痰則相宜至於勞痰失血諸痰用之反能燥血液而加病不可不知機曰俗以半夏性燥有毒多以貝母代之貝母乃太陰肺經之藥半夏乃太陰脾經陽明胃經之藥何可代也夫咳嗽吐痰虛勞吐血或痰中見血諸郁咽痛喉痹肺癰肺痿癰疽婦人乳難此皆貝母為嚮導半夏乃禁用之藥若涎者脾之液美味膏粱炙爆皆能生脾胃濕熱故涎化為痰久則痰火上攻令人昏憒口噤偏廢僵仆蹇澀不語生死旦夕自非半夏南星曷可治乎若以貝母代之則翹首待斃矣時珍曰脾無留濕不生痰故脾為生痰之源肺為貯痰之器半夏能主痰飲及腹脹者為其體滑而味辛性溫也涎滑能潤辛溫能散亦能潤故行濕而通大便利竅而泄小便所謂辛走氣能化液辛以潤之是矣潔古張氏云半夏南星治其痰而咳嗽自愈丹溪朱氏云二陳湯能使大便潤而小便長聊攝成氏云半夏辛而散行水氣而潤腎燥又和劑局方用半硫丸治老人虛秘皆取其滑潤也世俗皆以南星半夏為性燥誤矣濕去則土燥痰涎不生非二物之性燥也古方治咽痛喉痹吐血下血多用二物非禁劑也二物亦能散血故破傷打撲皆主之惟陰虛勞損則非濕熱之邪而用利竅行濕之藥是乃重竭其津液醫之罪也豈藥之咎哉甲乙經用治夜不眠是果性燥者乎岐伯云衛氣行於陽陽氣滿不得入於陰陰氣虛故目不得瞑治法飲以半夏湯一劑陰陽既通其臥立至方用流水千里者八升揚之萬遍取清五升煮之炊以葦薪大沸入秫米一升半夏五合煮一升半飲汁一杯日三以知為度病新發者覆杯則臥汗出則已久者三飲而已附方舊十四新五十四法制半夏清痰化飲壯脾順氣用大半夏湯洗七次焙乾再洗如此七轉以濃米泔浸一日夜每一兩用白礬一兩半溫水化浸五日焙乾以鉛白霜一錢溫水化又浸七日以漿水慢火內煮沸焙乾收之每嚼一二粒薑湯送化下御藥院方紅半夏法消風熱清痰涎降氣利咽大半夏湯浸焙制如上法每一兩入龍腦五分硃砂為衣染之先鋪燈草一重約一指厚排半夏於上再以燈草蓋一指厚以炒豆焙之候乾取出每嚼一兩粒溫水送下御藥院方化痰鎮心祛風利膈辰砂半夏丸用半夏一斤湯泡七次為末篩過以水浸三日生絹濾去滓澄清去水曬乾一兩入辰砂一錢薑汁打糊丸梧子大每薑湯下七十丸此周府方也袖珍化痰利氣三仙丸方見虎掌下消痰開胃去胸膈壅滯斗門方用半夏洗淨焙乾為末自然薑汁和作餅濕紙裹煨香以熟水二盞同餅二錢入鹽五分煎一盞服之大壓痰毒及治酒食傷極驗經驗後方用半夏天南星各二兩為末水五升入壇內浸一宿去清水焙乾重研每服二錢水二盞姜三片煎服中焦痰涎利咽清頭目進飲食半夏泡七次四兩枯礬一兩為末薑汁打糊或煮棗肉和丸梧子大每薑湯下十五丸寒痰加丁香五錢熱痰加寒水石煅四兩名玉液丸和劑局方老人風痰大腑熱不識人及肺熱痰實咽喉不利半夏泡七次焙硝石各半兩為末入白麵一兩搗勻水和丸綠豆大每薑湯下五十丸普濟膈壅風痰半夏不計多少酸漿浸一宿溫湯洗五七遍去惡氣日乾為末漿水搜作餅日乾再研為末每五兩入生龍腦一錢以漿水濃腳和丸雞頭子大紗袋盛通風處陰乾每服一丸好茶或薄荷湯嚼下御藥院方搜風化痰定志安神利頭目辰砂化痰丸用半夏曲三兩天南星炮一兩辰砂枯礬各半兩為末薑汁打糊丸梧子大每服三十丸食後薑湯送下和劑局方痰厥中風省風湯用半夏湯泡八兩甘草炙二兩防風四兩每服半兩姜二十片水二盞煎服奇效方風痰頭暈嘔逆目眩面色青黃脈弦者水煮金花丸用生半夏生天南星寒水石煅各一兩天麻半兩雄黃二錢小麥面三兩為末水和成餅水煮浮起漉出搗丸梧子大每服五十丸薑湯下極效亦治風痰咳嗽二便不通風痰頭痛潔古活法機要方風痰濕痰青壺丸半夏一斤天南星半兩各湯泡曬乾為末薑汁和作餅焙乾入神麯半兩白朮末四兩枳實末二兩薑汁麵糊丸梧子大每服五十丸薑湯下葉氏方風痰喘逆兀兀欲吐眩暈欲倒半夏一兩雄黃三錢為末薑汁浸蒸餅丸梧子大每服三十丸薑湯下已吐者加檳榔活法機要風痰喘急千緡湯用半夏湯洗七個甘草炙皂莢炒各一寸姜二片水一盞煎七分溫服蘇沈良方上焦熱痰咳嗽制過半夏一兩片黃芩末二錢薑汁打糊丸綠豆大每服七十丸淡薑湯食後服此周憲王親制方也袖珍方肺熱痰嗽製半夏栝蔞仁各一兩為末薑汁打糊丸梧子大每服二三十丸白湯下或以栝蔞瓤煮熟丸濟生方熱痰咳嗽煩熱面赤口燥心痛脈洪數者小黃丸用半夏天南星各一兩黃芩一兩半為末薑汁浸蒸餅丸梧子大每服五七十丸食後薑湯下潔古活法機要小兒痰熱咳嗽驚悸半夏南星等分為末牛膽汁和入膽內懸風處待乾蒸餅丸綠豆大每薑湯下三五丸摘玄方濕痰咳嗽面黃體重嗜臥驚兼食不消脈緩者白朮丸用半夏南星各一兩白朮一兩半為末薄糊丸梧子大每服五七十丸薑湯下活法機要氣痰咳嗽面白氣促灑淅惡寒愁憂不樂脈澀者玉粉丸用半夏南星各一兩官桂半兩為末糊丸梧子大每服五十丸薑湯下活法機要小結胸痛正在心下按之則痛脈浮滑者小陷胸湯主之半夏半升黃連一兩栝蔞實大者一個水六升先煮栝蔞取三升去滓內二味煮取二升分三服仲景傷寒論濕痰心痛喘急者半夏油炒為末粥糊丸綠豆大每服二十丸薑湯下丹溪心法急傷寒病半夏四錢生薑七片酒一盞煎服胡洽居士百病方結痰不出語音不清年久者亦宜玉粉丸半夏半兩桂心一字草烏頭半字為末薑汁浸蒸餅丸芡子大每服一丸夜臥含咽活法機要停痰冷飲嘔逆橘皮半夏湯用半夏水煮熟陳橘皮各一兩每服四錢生薑七片水二盞煎一盞溫服和劑局方停痰留飲胸膈滿悶氣短噁心飲食不下或吐痰水茯苓半夏湯用半夏泡五兩茯苓三兩每服四錢姜七片水一鍾半煎七分去滓空心服甚捷徑和劑局方支飲作嘔嘔家本渴不渴者心下有支飲也或似喘不喘似嘔不嘔似噦不噦心下憒憒並宜小半夏湯用半夏泡七次一升生薑半斤水七升煮一升五合分服張仲景金匱要略噦逆欲死半夏生薑湯主之即上方也痘瘡噦氣方同上嘔噦眩悸谷不得下小半夏加茯苓湯半夏一升生薑半斤茯苓三兩切以水七升煎一升半分溫服之金匱要略目不得眠見發明下心下悸忪半夏麻黃丸半夏麻黃等分為末蜜丸小豆大每服三十丸日三金匱要略傷寒干啘半夏熟洗研末生薑湯服一錢匕深師方嘔逆厥逆內有寒痰半夏一升洗滑焙研小麥面一升水和作彈丸水煮熟初吞四五枚日三服稍增至十五枚旋煮旋吞覺病減再作忌羊肉餳糖此乃許仁則方也外臺秘要嘔吐反胃大半夏湯半夏三升人參三兩白蜜一升水一斗二升和揚之一百二十遍煮取三升半溫服一升日再服亦治膈間支飲金匱要略胃寒噦逆停痰留飲藿香半夏湯用半夏湯泡炒黃二兩藿香葉一兩丁香皮半兩每服四錢水一盞姜七片煎服和劑局方小兒吐瀉脾胃虛寒齊州半夏泡七次陳粟米各一錢半姜十片水盞半煎八分溫服錢乙小兒小兒痰吐或風壅所致或咳嗽發熱飲食即嘔半夏泡七次半兩丁香一錢以半夏末水和包丁香用面重包煨熟去面為末生薑自然汁和丸麻子大每服二三十丸陳皮湯下活幼口議妊娠嘔吐半夏二兩人參乾薑各一兩為末薑汁麵糊丸梧子大每飲服十丸日三服仲景金匱要略霍亂腹脹半夏桂等分為末水服方寸匕肘後方小兒腹脹半夏末少許酒和丸粟米大每服二丸薑湯下不瘥加之或以火炮研末薑汁調貼臍亦佳子母秘錄黃疸喘滿小便自利不可除熱半夏生薑各半斤水七升煮一升五合分再服有人氣結而死心下暖以此少許入口遂活張仲景方伏暑引飲脾胃不利消暑丸用半夏醋煮一斤茯苓半斤生甘草半斤為末薑汁麵糊丸梧子大每服五十丸熱湯下和劑局方老人虛秘冷秘及痃癖冷氣半硫丸半夏泡炒生硫黃等分為末自然薑汁煮糊丸如梧子大每空心溫酒下五十丸和劑局方失血喘急吐血下血崩中帶下喘急痰嘔中滿宿瘀用半夏捶扁以薑汁和麵包煨黃研末米糊丸梧子大每服三十丸白湯下直指方白濁夢遺半夏一兩洗十次切破以木豬苓二兩同炒黃出火毒去豬苓入煅過牡蠣一兩以山藥糊丸梧子大每服三十丸茯苓湯送下腎氣閉而一身精氣無所管攝妄行而遺者宜用此方蓋半夏有利性豬苓導水使腎氣通也與下元虛憊者不同許學士本事方八般頭風三次見效半夏末入百草霜少許作紙捻燒煙就鼻內搐之口中含水有涎吐去再含衛生寶鑑少陰咽痛生瘡不能言語聲不出者苦酒湯主之半夏七枚打碎雞子一枚頭開一竅去黃納苦酒令小滿入半夏在內以鐶子坐於炭火上煎三沸去滓置杯中時時咽之極驗未瘥更作仲景傷寒論喉痹腫塞生半夏末搐鼻內涎出效集簡方骨哽在咽半夏白芷等分為末水服方寸匕當嘔出忌羊肉外臺秘要重舌木舌脹大塞口半夏煎醋含漱之又方半夏二十枚水煮過再泡片時乘熱以酒一升浸之密封良久熱漱冷吐之小兒囟陷乃冷也水調半夏末塗足心面上黑氣半夏焙研米醋調敷不可見風不計遍數從早至晚如此三日皂角湯洗下面瑩如玉也摘玄方癩風眉落生半夏羊屎燒焦等分為末自然薑汁日調塗聖濟錄盤腸生產產時子腸先出產後不收者名盤腸產以半夏末頻搐鼻中則上也婦人良方產後暈絕半夏末冷水和丸大豆大納鼻中即愈此扁鵲法也肘後方小兒驚風生半夏一錢皂角半錢為末吹少許入鼻名嚏驚散即蘇直指方卒死不寤半夏末吹鼻中即活南嶽夫人紫靈魏元君方也五絕急病一曰自縊二曰牆壓三曰溺水四曰魘魅五曰產乳並以半夏末納大豆一丸入鼻中心溫者一日可活也子母秘錄癰疽發背及乳瘡半夏末雞子白調塗之肘後方吹奶腫痛半夏一個煨研酒服立愈一方以末隨左右搐鼻效劉長春經驗方打撲瘀痕水調半夏末塗之一宿即沒也永類鈐方遠行足趼方同上集簡方金刃不出入骨脈中者半夏白蘞等分為末酒服方寸匕日三服至二十日自出李筌太白經飛蟲入耳生半夏末麻油調塗耳門外本事方蠍蠆螫人半夏末水調塗之立止錢相公篋中方蠍瘻五孔相通者半夏末水調塗之日二聖惠方咽喉骨哽半夏白芷等分為末水服方寸匕當嘔出忌羊肉外臺秘要莖涎主治煉取塗發眉墮落者即生雷斅蚤休本經下品釋名蚩休本經螫休日華紫河車圖經重臺唐本重樓金線圖經三層草綱目七葉一枝花蒙筌草甘遂唐本白甘遂時珍曰蟲蛇之毒得此治之即休故有蚤休螫休諸名重臺三層因其葉狀也金錢重樓因其花狀也甘遂因其根狀也紫河車因其功用也集解別錄曰蚤休生山陽川穀及冤句恭曰今謂重樓者是也一名重臺南人名草甘遂一莖六七葉似王孫鬼臼蓖麻輩葉有二三層根如肥大菖蒲細肌脆白保升曰葉似鬼臼牡蒙年久者二三重根如紫參皮黃肉白五月採根日乾大明曰根如尺二蜈蚣又如肥紫菖蒲頌曰即紫河車也今河中河陽華鳳文州及江淮間亦有之葉似王孫鬼臼等作二三層六月開黃紫花蕊赤黃色上有金絲垂下秋結紅子根似肥姜皮赤肉白四月五月採之宗奭曰蚤休無旁枝止一莖挺生高尺余顛有四五葉葉有歧似苦杖中心又起莖亦如是生葉惟根入藥用時珍曰重樓金線處處有之生於深山陰濕之地一莖獨上莖當葉心葉綠色似芍藥凡二三層每一層七葉莖頭夏月開花一花七瓣有金絲蕊長三四寸王屋山產者至五七層根如鬼臼蒼朮狀外紫中白有粳糯二種外丹家採製三黃砂汞入藥洗切焙用俗諺云七葉一枝花深山是我家癰疽如遇者一似手拈拿是也根氣味苦微寒有毒大明曰冷無毒伏雄黃丹砂蓬砂及鹽主治驚癇搖頭弄舌熱氣在腹中癲疾癰瘡陰蝕下三蟲去蛇毒本經生食一升利水唐本治胎風手足搐能吐泄瘰癧大明去瘧疾寒熱時珍發明恭曰摩醋敷癰腫蛇毒甚有效時珍曰紫河車足厥陰經藥也凡本經驚癇瘧疾瘰癧癰腫者宜之而道家有服食法不知果有益否也附方新五服食法紫河車根以竹刀刮去皮切作骰子大塊麵裹入瓷瓶中水煮候浮漉出凝冷入新布袋中懸風處待乾每服三丸五更初面東唸咒井水下連進三服即能休糧若要飲食先以黑豆煎湯飲之次以藥丸煮稀粥漸漸食之咒曰天朗氣清金雞鳴吾今服藥欲長生吾今不飢復不渴賴得神仙草有靈小兒胎風手足搐搦用蚤休即紫河車為末每服半錢冷水下衛生易簡方慢驚發搐帶有陽證者白甘遂末即蚤休一錢栝蔞根末二錢同於慢火上炒焦黃研勻每服一字煎麝香薄荷湯調下錢乙小兒方中鼠莽毒金線重樓根磨水服即愈集簡方咽喉谷賊腫痛用重臺赤色者川大黃炒木鱉子仁馬牙硝各半兩半夏泡一分為末蜜丸芡子大綿裹含之聖惠方鬼臼本經下品校正併入圖經瓊田草釋名九臼本經天臼別錄鬼藥綱目解毒別錄爵犀本經馬目毒公本經害母草圖經羞天花綱目術律草綱目瓊田草綱目獨腳蓮土宿本草獨荷草土宿山荷葉綱目旱荷綱目八角盤綱目唐婆鏡弘景曰鬼臼根如射干白而味甘九臼相連有毛者良故名時珍曰此物有毒而臼如馬眼故名馬目毒公殺蠱解毒故有犀名其葉如鏡如盤如荷而新苗生則舊苗死故有鏡盤荷蓮害母諸名蘇東坡詩集云瓊田草俗號唐婆鏡即本草鬼臼也歲生一臼如黃精根而堅瘦可以辟穀宋祁劍南方物贊云羞天花蜀地處處有之依莖綴花蔽葉自隱俗名羞天予改為羞寒花即本草鬼臼也贊云冒寒而茂莖修葉廣附莖作花葉蔽其上以其自蔽若有羞狀別有羞天草與此不同即海芋也集解別錄曰鬼臼生九真山谷及冤句二月八月採根弘景曰鬼臼生山谷中八月採陰乾似射干術輩又似鉤吻有兩種出錢塘近道者味甘上有叢毛最勝出會稽吳興者大而味苦無叢毛力劣今馬目毒公狀如黃精根其臼處似馬眼而柔潤今方家多用鬼臼而少用毒公不知此那復乖越如此恭曰鬼臼生深山岩石之陰葉如蓖麻重樓輩生一莖莖端一葉亦有兩歧者年長一莖莖枯則為一臼假令生來二十年則有二十臼豈惟九臼耶根肉皮須並似射干今俗用多是射干而江南別送一物非真者今荊州當陽縣硤州遠安縣襄州荊山縣山中並貢之亦極難得頌曰今江寧府滁舒商齊杭襄峽州荊門軍亦有之並如蘇恭所說花生莖間赤色三月開後結實又一說鬼臼生深山陰地葉六出或五出如雁掌莖端一葉如傘旦時東向及暮則西傾蓋隨日出沒也花紅紫如荔枝正在葉下常為葉所蔽未常見日一年生一莖既枯則為一臼及八九年則八九臼矣然一年一臼生而一臼腐蓋陳新相易也故俗名害母草如芋魁烏頭輩亦然新苗生則舊苗死前年之魁腐矣而本草注謂全似射干今射干體狀雖相似然臼形淺薄與鬼臼大異鬼臼如八九個南星側比相疊而色理正如射干用者當使人求苗採之市中不復有也時珍曰鬼臼根如天南星相疊之狀故市人通謂小者為南星大者為鬼臼殊為謬誤按黃山谷集云唐婆鏡葉底開花俗名羞天花即鬼臼也歲生一臼滿十二歲則可為藥今方家乃以鬼燈檠為鬼臼誤矣又鄭樵通志云鬼臼葉如小荷形如鳥掌年長一莖莖枯則根為一臼亦名八角盤以其葉似之也據此二說則似是今人所謂獨腳蓮者也又名山荷葉獨荷草旱荷葉八角鏡南方處處深山陰密處有之北方惟龍門山王屋山有之一莖獨上莖生葉心而中空一莖七葉圓如初生小荷葉面青背紫揉其葉作瓜李香開花在葉下亦有無花者其根全似蒼朮紫河車丹爐家採根制三黃砂汞或云其葉八角者更靈或云其根與紫河車一樣但以白色者為河車赤色者為鬼臼恐亦不然而庚辛玉冊謂蚤休陽草旱荷陰草亦有分別陶弘景以馬目毒公與鬼臼為二物殊不知正是一物而有二種也又唐獨孤滔丹房鏡源云術律草有二種根皆似南星赤莖直上莖端生葉一種葉凡七瓣一種葉作數層葉似蓖麻面青背紫而有細毛葉下附莖開一花狀如鈴鐸倒垂青白色黃蕊中空結黃子風吹不動無風自搖可制砂汞按此即鬼臼之二種也其說形狀甚明根氣味辛溫有毒別錄曰微溫弘景曰甘溫有毒權曰苦之才曰畏垣衣主治殺蠱毒鬼疰精物辟惡氣不祥逐邪解百毒本經殺大毒療咳嗽喉結風邪煩惑失魄妄見去目中膚翳不入湯別錄主屍疰殗殜勞疾傳屍瘦疾甄權下死胎治邪瘧癰疽蛇毒射工毒時珍發明頌曰古方治五屍鬼疰百毒惡氣多用之又曰今福州人三月採瓊田草根葉焙乾搗末蜜丸服治風疾附方新三子死腹中胞破不生此方累效救人歲萬數也鬼臼不拘多少黃色者去毛為細末不用篩羅只捻之如粉為度每服一錢無灰酒一盞同煎八分通口服立生如神名一字神散婦人良方射工中人寒熱發瘡鬼臼葉一把苦酒漬搗取汁服一升日二次千金方黑黃急病黑黃面黑黃身如土色不妨食脈沉若青脈入口者死宜烙口中黑脈百會玉泉絕骨章門心俞用生鬼臼搗汁一小盞服乾者為末水服三十六黃方射干本經下品釋名烏扇本經烏翣別錄烏吹別錄烏蒲本經鳳翼拾遺鬼扇土宿扁竹綱目仙人掌土宿紫金牛土宿野萱花綱目草姜別錄黃遠吳普弘景曰射干方書多音夜頌曰射干之形莖梗疏長正如射人長竿之狀得名由此爾而陶氏以夜音為疑蓋古字音多通呼若漢官僕射主射事而亦音夜非有別義也時珍曰其葉叢生橫鋪一面如烏翅及扇之狀故有烏扇烏翣鳳翼鬼扇仙人掌諸名俗呼扁竹謂其葉扁生而根如竹也根葉又如蠻姜故曰草姜翣音所甲切扇也集解別錄曰射干生南陽山谷田野三月三日採根陰乾弘景曰此是烏翣根黃色庭臺多種之人言其葉是鳶尾而復有鳶頭此若相似爾恐非烏翣也又別有射干相似而花白莖長似射人之執竿者故阮公詩云射干臨層城此不入藥用恭曰鳶尾葉都似射干而花紫碧色不抽高莖根似高良薑而肉白名鳶頭保升曰射干高二三尺花黃實黑根多須皮黃黑肉黃赤所在皆有二月八月採根去皮日乾藏器曰射干鳶尾二物相似人多不分射干即人間所種為花卉名鳳翼者葉如鳥翅秋生紅花赤點鳶尾亦人間所種苗低下於射干狀如鳶尾夏生紫碧花者是也大明曰射干根潤形似高良薑大小赤黃色淡硬五六七八月採頌曰今在處有之人家種之春生苗高一二尺葉大類蠻姜而狹長橫張疏如翅羽狀故名烏翣葉中抽莖似萱草莖而強硬六月開花黃紅色瓣上有細紋秋結實作房中子黑色一說射干多生山崖之間其莖雖細小亦類木故荀子云西方有木名曰射干莖長四寸生於高山之上是也陶弘景所說花白者自是射干之類震亨曰根為射干葉為烏翣紫花者是紅花者非機曰按諸注則射干非一種有花白者花黃者花紫者花紅者丹溪獨取紫花者必曾試有驗也時珍曰射干即今扁竹也今人所種多是紫花者呼為紫蝴蝶其花三四月開六出大如萱花結房大如拇指頗似泡桐子一房四隔一隔十餘子子大如胡椒而色紫極硬咬之不破七月始枯陶弘景謂射干鳶尾是一種蘇恭陳藏器謂紫碧花者是鳶尾紅花者是射干韓保升謂黃花者是射干蘇頌謂花紅黃者是射干白花者亦其類朱震亨謂紫花者是射干紅花者非各執一說何以憑依謹按張揖廣雅云鳶尾射干也易通卦驗云冬至射干生土宿真君本草云射干即扁竹葉扁生如側手掌形莖亦如之青綠色一種紫花一種黃花一種碧花多生江南湖廣川浙平陸間八月取汁煮雄黃伏雌黃制丹砂能拒火據此則鳶尾射干本是一類但花色不同正如牡丹芍藥菊花之類其色各異皆是同屬也大抵入藥功不相遠藏器曰射干之名有三佛經射干貂㩆此是惡獸似青黃狗食人能緣木阮公云射干臨層城者是樹殊有高大者本草射干是草即今人所種者也根修治斅曰凡採根先以米泔水浸一宿漉出然後以䈽竹葉煮之從午至亥日乾用氣味苦平有毒別錄曰微溫久服令人虛保升曰微寒權曰有小毒元素曰苦陽中陰也時珍曰寒多服瀉人主治咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱本經療老血在心脾間咳唾言語氣臭散胸中熱氣別錄苦酒摩塗毒腫弘景治疰氣消瘀血通女人月閉甄權消痰破癥結胸膈滿腹脹氣喘痃癖開胃下食鎮肝明目大明治肺氣喉痹為佳宗奭去胃中癰瘡元素利積痰疝毒消結核震亨降實火利大腸治瘧母時珍發明震亨曰射干屬金有木與火行太陰厥陰之積痰使結核自消甚捷又治便毒此足厥陰濕氣因疲勞而發取射干三寸與生薑同煎食前服利三兩行甚效時珍曰射干能降火故古方治喉痹咽痛為要藥孫真人千金方治喉痹有烏翣膏張仲景金匱玉函方治咳而上氣喉中作水雞聲有射干麻黃湯又治瘧母鱉甲煎丸亦用烏扇燒過皆取其降厥陰相火也火降則血散腫消而痰結自解癥瘕自除矣附方舊二新八咽喉腫痛射干花根山豆根陰乾為末吹之如神袖珍方傷寒咽閉腫痛用生射干豬脂各四兩合煎令微焦去滓每噙棗許取瘥龐安常傷寒論喉痹不通漿水不入外臺秘要用射干一片含咽汁良醫方大成用扁竹新根擂汁咽之大腑動即解或醋研汁噙引涎出亦妙便民方用紫蝴蝶根一錢黃芩生甘草桔梗各五分為末水調頓服立愈名奪命散二便不通諸藥不效紫花扁竹根生水邊者佳研汁一盞服即通普濟水蠱腹大動搖水聲皮膚黑用鬼扇根搗汁服一杯水即下肘後方陰疝腫刺發時腫痛如刺用生射干搗汁與服取利亦可丸服肘後方乳癰初腫扁竹根如殭蠶者同萱草根為末蜜調敷之神效永類方中射工毒生瘡者烏翣升麻各二兩水三升煎二升溫服以滓敷瘡上姚僧坦集驗方鳶尾本經下品釋名烏園別錄根名鳶頭時珍曰並以形命名烏園當作烏鳶集解別錄曰鳶尾生九嶷山谷五月採弘景曰方家言是射干苗而主療亦異當別是一種方用鳶頭當是其根療體相似而本草不題恭曰此草所在有之人家亦種葉似射干而闊短不抽長莖花紫碧色根似高良薑皮黃肉白嚼之戟人咽喉與射干全別射干花紅抽莖長根黃有臼保升曰此草葉名鳶尾根名鳶頭亦謂之鳶根葉似射干布地生黑根似高良薑而節大數個相連九月十月採根日乾時珍曰此即射干之苗非別一種也肥地者莖長根粗瘠地者莖短根瘦其花自有數色諸家皆是強分陳延之小品方言東海鳶頭即由跋者亦訛也東海出之故耳氣味苦平有毒恭曰有小毒主治蠱毒邪氣鬼疰諸毒破癥瘕積聚大水下三蟲本經殺鬼魅療頭眩別錄附方舊一新一飛屍遊蠱著喉中氣欲絕者鳶尾根削去皮納喉中摩病處令血出為佳陳藏器本草拾遺鬼魅邪氣四物鳶頭散東海鳶頭黃牙即金牙莨菪子防葵各一分為末酒服方寸匕欲令病人見鬼增防葵一分欲令知鬼又增一分立驗不可多服陳延之小品方玉簪綱目釋名白鶴仙時珍曰並以花象命名集解時珍曰玉簪處處人家栽為花草二月生苗成叢高尺許柔莖如白菘其葉大如掌團而有尖葉上紋如車前葉青白色頗嬌瑩六七月抽莖莖上有細葉中出花朵十數枚長二三寸本小末大未開時正如白玉搔頭簪形又如羊肚蘑菇之狀開時微綻四出中吐黃蕊頗香不結子其根連生如鬼臼射干生薑輩有鬚毛舊莖死則根有一臼新根生則舊根腐亦有紫花者葉微狹皆鬼臼射干之屬根氣味甘辛寒有毒主治搗汁服解一切毒下骨哽塗癰腫時珍附方新五乳癰初起內消花即玉簪花取根擂酒服以渣敷之海上方婦人斷產白鶴仙根白鳳仙子各一錢半紫葳二錢半辰砂二錢搗末蜜和丸梧子大產內三十日以酒半盞服之不可著牙齒能損牙齒也摘玄方解斑蝥毒玉簪根擂水服之即解趙真人濟急方下魚骨哽玉簪花根山裡紅果根同搗自然汁以竹筒灌入咽中其骨自下不可著牙齒臛仙乾坤生意刮骨取牙玉簪根乾者一錢白砒三分白硇七分蓬砂二分威靈仙三分草烏頭一分半為末以少許點疼處即自落也余居士選奇方葉氣味同根主治蛇虺螫傷搗汁和酒服以渣敷之中心留孔泄氣時珍鳳仙綱目釋名急性子救荒旱珍珠綱目金鳳花綱目小桃紅救荒夾竹桃救荒海蒳音納染指甲草救荒菊婢時珍曰其花頭翅尾足俱翹翹然如鳳狀故以名之女人採其花及葉包染指甲其實狀如小桃老則迸裂故有指甲急性小桃諸名宋光宗李後諱鳳宮中呼為好女兒花張宛丘呼為菊婢韋君呼為羽客集解時珍曰鳳仙人家多種之極易生二月下子五月可再種苗高二三尺莖有紅白二色其大如指中空而脆葉長而尖似桃柳葉而有鋸齒丫間開花或黃或白或紅或紫或碧或雜色亦自變易狀如飛禽自夏初至秋盡開謝相續結實累然大如櫻桃其形微長色如毛桃生青熟黃犯之即自裂皮卷如拳苞中有子似蘿蔔子而小褐色人採其肥莖汋酉邑以充萵筍嫩華酒浸一宿亦可食但此草不生蟲蠹蜂蝶亦不近恐亦不能無毒也子氣味微苦溫有小毒主治產難積塊噎膈下骨哽透骨通竅時珍發明時珍曰鳳仙子其性急速故能透骨軟堅庖人烹魚肉硬者投數粒即易軟爛是其驗也緣其透骨最能損齒與玉簪根同凡服者不可著齒也多用亦戟人咽附方新五產難催生鳳仙子二錢研末水服勿近牙外以蓖麻子隨年數搗塗足心集簡方噎食不下鳳仙花子酒浸三宿曬乾為末酒丸綠豆大每服八粒溫酒下不可多用即急性子也摘玄方咽中骨哽欲死者白鳳仙子研水一大呷以竹筒灌入咽其物即軟不可近牙或為末吹之普濟方牙齒欲取金鳳花子研末入砒少許點疼牙根取之摘玄方小兒痞積急性子水葒花子大黃各一兩俱生研末每味取五錢外用皮硝一兩拌勻將白鵓鴿一個或白鴨亦可去毛屎剖腹勿犯水以布拭淨將末裝入內用綿扎定沙鍋內入水三碗重重紙封以小火煮乾將鴿鴨翻調焙黃色冷定早辰食之日西時疾軟三日大便下血病去矣忌冷物百日孫天仁集效方花氣味甘滑溫無毒主治蛇傷擂酒服即解又治腰脅引痛不可忍者研餅曬乾為末空心每酒服三錢活血消積時珍附方新一風濕臥床不起用金鳳花柏子仁朴硝木瓜煎湯洗浴每日二三次內服獨活寄生湯吳旻扶壽精方根葉氣味苦甘辛有小毒主治雞魚骨哽誤吞銅鐵杖撲腫痛散血通經軟堅透骨時珍附方新三咽喉物哽金鳳花根嚼爛噙咽骨自下雞骨尤效即以溫水漱口免損齒也亦治誤吞銅鐵危氏得效方打杖腫痛風仙花葉搗如泥塗腫破處干則又上一夜血散即愈冬月收取乾者研末水和塗之葉廷器通變要法馬患諸病白鳳仙花連根葉熬膏遇馬有病抹其眼四角上即汗出而愈衛生易簡方坐拿草宋圖經集解頌曰生江西及滁州六月開紫花結實採其苗入藥甚易得後因人用有效今頗貴重時珍曰按一統志云出吉安永豐縣氣味辛熱有毒主治風痹壯筋骨兼治打撲傷損蘇頌發明頌曰神醫普救方治風藥中已有用者時珍曰危氏得效方麻藥煮酒方中用之聖濟錄治膈上虛熱咽喉噎塞小便赤澀神困多睡有坐拿丸用坐拿草大黃赤芍藥木香升麻麥門冬黃耆木通酸棗仁薏苡仁枳殼等分為末蜜丸梧子大每服二十丸麥門冬湯下附錄押不蘆時珍曰按周密癸辛雜誌云漠北迴回地方有草名押不蘆土人以少許磨酒飲即通身麻痹而死加以刀斧亦不知至三日則以少藥投之即活御藥院中亦儲之貪官汙吏罪甚者則服百日丹皆用此也昔華陀能刳腸滌胃豈不有此等藥耶曼陀羅花綱目釋名風茄兒綱目山茄子時珍曰法華經言佛說法時天雨曼陀羅花又道家北斗有陀羅星使者手執此花故後人因以名花曼陀羅梵言雜色也茄乃因葉形爾姚伯聲花品呼為惡客集解時珍曰曼陀羅生北土人家亦栽之春生夏長獨莖直上高四五尺生不旁引綠莖碧葉葉如茄葉八月開白花凡六瓣狀如牽牛花而大攢花中坼駢葉外包而朝開夜合結實圓而有丁拐中有小子八月採花九月採實花子氣味辛溫有毒主治諸風及寒濕腳氣煎湯洗之又主驚癇及脫肛併入麻藥時珍發明時珍曰相傳此花笑採釀酒飲令人笑舞採釀酒飲令人舞予嘗試之飲須半酣更令一人或笑或舞引之乃驗也八月採此花七月採火麻子花陰乾等分為末熱酒調服三錢少頃昏昏如醉割瘡灸火宜先服此則不覺苦也附方新三面上生瘡曼陀羅花曬乾研末少許貼之衛生易簡方小兒慢驚曼陀羅花七朵重一字天麻二錢半全蠍炒十枚天南星炮丹砂乳香各二錢半為末每服半錢薄荷湯調下御藥院方大腸脫肛曼陀羅子連殼一對橡斗十六個同銼水煎三五沸入朴硝少許洗之儒門事親羊躑躅本經下品釋名黃躑躅綱目黃杜鵑蒙筌羊不食草拾遺鬧羊花綱目驚羊花綱目老虎花綱目玉枝別錄弘景曰羊食其葉躑躅而死故名鬧當作惱惱亂也集解別錄曰羊躑躅生太行山川穀及淮南山三月採花陰乾弘景曰近道諸山皆有之花苗似鹿蔥不可近眼恭曰花亦不似鹿蔥正似旋花色黃者也保升曰小樹高二尺葉似桃葉花黃似瓜花三月四月採花日乾頌曰所在有之春生苗似鹿蔥葉似紅花莖高三四尺夏開花似凌霄花山石榴輩正黃色羊食之則死今嶺南蜀道山谷遍生皆深紅色如錦繡然或云此種不入藥時珍曰韓保升所說似桃葉者最的其花五出蕊瓣皆黃氣味皆惡蘇頌所謂深紅色者即山石榴名紅躑躅者無毒與此別類張揖廣雅謂躑躅一名決光者誤矣決光決明也按唐李紳文集言駱谷多山枇杷毒能殺人其花明豔與杜鵑花相似樵者識之其說似羊躑躅未知是否要亦其類耳花氣味辛溫有大毒權曰惡諸石及面不入湯使伏丹砂硇砂雌黃畏梔子主治賊風在皮膚中淫淫痛溫瘧惡毒諸痹本經邪氣鬼疰蠱毒別錄發明頌曰古之大方多用躑躅如胡洽治時行赤散及治五嗽四滿丸之類並治風諸酒方皆雜用之又治百病風濕等魯王酒中亦用躑躅花今醫方捋腳湯中多用之南方治蠱毒下血有躑躅花散云甚勝時珍曰此物有大毒曾有人以其根入酒飲遂至於斃也和劑局方治中風癱瘓伏虎丹中亦用之不多服耳附方新四風痰注痛躑躅花天南星並生時同搗作餅甑上蒸四五遍以稀葛囊盛之臨時取焙為末蒸餅丸梧子大每服三丸溫酒下腰腳骨痛空心服手臂痛食後服大良續傳信方痛風走注黃躑躅根一把糯米一盞黑豆半盞酒水各一碗徐徐服大吐大泄一服便能動也醫學集成風濕痹痛手足身體收攝不遂肢節疼痛言語蹇澀躑躅花酒拌蒸一炊久曬乾為末每以牛乳一合酒二合調服五分聖惠方風蟲牙痛躑躅一錢草烏頭二錢半為末化臘丸豆大綿包一丸咬之追涎海上仙方附錄山躑躅時珍曰處處山谷有之高者四五尺低者一二尺春生苗葉淺綠色枝少而花繁一枝數萼二月始開花如羊躑躅而蒂如石榴花有紅者紫者五出者千葉者小兒食其花味酸無毒一名紅躑躅一名山石榴一名映山紅一名杜鵑花其黃色者即有毒羊躑躅也羊不吃草拾遺藏器曰生蜀川山谷葉細長在諸草中羊不吃者是也味苦辛溫無毒主一切風血補益攻諸病煮之亦浸酒服時珍曰此草似羊躑躅而云無毒蓋別有此也芫花本經下品校正自木部移入此釋名杜芫別錄赤芫吳普去水本經毒魚別錄頭痛花綱目兒草吳普敗華吳普根名黃大戟吳普蜀桑別錄時珍曰芫或作杬其義未詳去水言其功毒魚言其性大戟言其似也俗人因其氣惡呼為頭痛花山海經云首山其草多芫是也集解別錄曰芫花生淮源川穀三月三日採花陰乾普曰芫根生邯鄲二月生葉青色加厚則黑華有紫赤白者三月實落盡葉乃生三月採花五月採葉八月九月採根陰乾保升曰近道處處有之苗高二三尺葉似白前及柳葉根皮黃似桑根正月二月花發紫碧色葉未生時收採日乾葉生花落即不堪用也頌曰在處有之宿根舊枝莖紫長一二尺根入土深三五寸白色似榆根春生苗葉小而尖似楊柳枝葉二月開紫花頗似紫荊而作穗又似藤花而細今絳州出者花黃謂之黃芫花時珍曰顧野王玉篇云杬木出豫章煎汁藏果及卵不壞洪邁容齋隨筆云今饒州處處有之莖幹不純是木小人爭鬥者取葉挼擦皮膚輒作赤腫如被傷以誣人至和鹽擦卵則又染其外若赭色也修治弘景曰用當微熬不可近眼時珍曰芫花留數年陳久者良用時以好醋煮十數沸去醋以水浸一宿曬乾用則毒滅也或以醋炒者次之氣味根同辛溫有小毒別錄曰苦微溫普曰神農黃帝雷公苦有毒扁鵲岐伯苦李當之有大毒多服令人泄之才曰決明為之使反甘草主治咳逆上氣喉鳴喘咽腫短氣蠱毒鬼瘧疝瘕癰腫殺蟲魚本經消胸中痰水喜唾水腫五水在五臟皮膚及腰痛下寒毒肉毒根療疥瘡可用毒魚別錄治心腹脹滿去水氣寒痰涕唾如膠通利血脈治惡瘡風痹濕一切毒風四肢攣急不能行步甄權療咳嗽瘴瘧大明治水飲痰澼脅下痛時珍發明時珍曰張仲景治傷寒太陽證表不解心下有水氣乾嘔發熱而咳或喘或利者小青龍湯主之若表已解有時頭痛出汗不惡寒心下有水氣乾嘔痛引兩脅或喘或咳者十棗湯主之蓋小青龍治未發散表邪使水氣自毛竅而出乃內經所謂開鬼門法也十棗湯驅逐里邪使水氣自大小便而泄乃內經所謂潔淨府去陳莝法也夫飲有五皆由內啜水漿外受濕氣郁蓄而為留飲流於肺則為支飲令人喘咳寒熱吐沫背寒流於脅下則為懸飲令人咳唾痛引缺盆兩脅流於心下則為伏飲令人胸滿嘔吐寒熱眩暈流於腸胃則為痰飲令人腹鳴吐水胸脅支滿或作泄瀉忽肥忽瘦流於經絡則為溢飲令人沉重注痛或作水氣胕腫芫花大戟甘遂之性逐水泄濕能直達水飲窠囊隱僻之處但可徐徐用之取效甚捷不可過劑泄人真元也陳言三因方以十棗湯藥為末用棗肉和丸以治水氣喘急浮腫之證蓋善變通者也楊士瀛直指方云破癖須用芫花行水後便養胃可也好古曰水者肺腎脾三經所主有五臟六腑十二經之部分上而頭中而四肢下而腰腳外而皮毛中而肌肉內而筋骨脈有尺寸之殊浮沉之別不可輕瀉當知病在何經何臟方可用之若誤投之則害深矣芫花與甘草相反而胡洽居士方治痰癖飲癖以甘遂大戟芫花大黃甘草同用蓋欲其大吐以泄濕因相反而相激也正誤慎微曰三國志云魏初平中有青牛先生常服芫花年百餘歲常如五六十人時珍曰芫花乃下品毒物豈堪久服此方外迂怪之言不足信也附方舊五新二十一卒得咳嗽芫花一升水三升煮汁一升以棗十四枚煮汁干日食五枚必愈肘後卒嗽有痰芫花一兩炒水一升煮四沸去滓白糖入半斤每服棗許勿食酸鹹物張文仲備急方喘嗽失音暴傷寒冷喘嗽失音取芫花連根一虎口切曝乾令病人以薦自裹舂令灰飛揚入其七孔中當眼淚出口鼻皆辣待芫根盡乃止病即愈古今錄驗乾嘔脅痛傷寒有時頭痛心下痞滿痛引兩脅乾嘔短氣汗出不惡寒者表解里未和也十棗湯主之芫花熬甘遂大戟各等分為散以大棗十枚水一升半煮取八合去滓納藥強人服一錢羸人半錢平旦服之當下利病除如不除明旦更服仲景傷寒論水腫支飲及澼飲用十棗湯加大黃甘草五物各一兩大棗十枚同煮如法服一方加芒硝一兩胡洽百病方天行煩亂凝雪湯治天行毒病七八日熱積胸中煩亂欲死用芫花一斤水三升煮取一升半漬故布薄胸上不過再三薄熱則除當溫四肢護厥逆也千金方久瘧結癖在腹脅堅痛者芫花炒二兩硃砂五錢為末蜜丸梧子大每服十丸棗湯下直指水蠱脹滿芫花枳殼等分以醋煮芫花至爛乃下枳殼煮爛搗丸梧子大每服三十丸白湯下普濟方酒疸尿黃髮黃心懊痛足脛滿芫花椒目等分燒末水服半錢日二服肘後背腿間痛一點痛不可忍者芫花根末米醋調敷之如不住以帛束之婦人產後有此尤宜袖珍諸般氣痛芫花醋煮半兩玄胡索炒一兩半為末每服一錢男子元臟痛蔥酒下瘧疾烏梅湯下婦人血氣痛當歸酒下諸氣痛香附湯下小腸氣痛茴香湯下仁存鬼胎癥瘕經候不通芫花根三兩銼炒黃為末每服一錢桃仁煎湯調下當利惡物而愈聖惠方催生去胎芫花根剝皮以綿裹點麝香套入陰穴三寸即下攝生妙用方產後惡物不下芫花當歸等分炒為末調一錢服保命集心痛有蟲芫花一兩醋炒雄黃一錢為末每服一字溫醋湯下乾坤生意牙痛難忍諸藥不效芫花末擦之令熱痛定以溫水漱之永類方白禿頭瘡芫花末豬脂和敷之集效方癰腫初起芫花末和膠塗之千金癰癤已潰芫花根皮搓作捻插入則不生合令膿易竭也集簡方痔瘡乳核芫根一握洗淨入木臼搗爛入少水絞汁於石器中慢火煎成膏將絲線於膏內度過以線系痔當微痛候痔乾落以紙捻蘸膏納竅內去根當永除根也一方只搗汁浸線一夜用不得使水經驗瘰癧初起氣壯人用芫根擂水一盞服大吐利即平黃州陳大用所傳瀕湖集簡方便毒初起芫根擂水服以渣敷之得下即消黃州熊珍所傳瀕湖集簡方贅瘤焦法甘草煎膏筆妝瘤之四圍上三次乃用芫花大戟甘遂等分為末醋調別以筆妝其中勿近甘草次日縮小又以甘草膏妝小暈三次如前仍上此藥自然焦縮危氏得效方一切菌毒因蛇蟲毒氣熏蒸所致用芫花生研新汲水服一錢以利為度危氏得效方蕘花音饒本經下品釋名時珍曰蕘者饒也其花繁饒也集解別錄曰蕘花生咸陽川穀及河南中牟六月採花陰乾弘景曰中牟者時從河上來形似芫花而極細白色恭曰苗似胡荽莖無刺花細黃色四月五月收與芫花全不相似也保升曰所在有之以雍州者為好生岡原上苗高二尺許宗奭曰今京洛間甚多時珍曰按蘇頌圖經言絳州所出芫花黃色謂之黃芫花其圖小株花成簇生恐即此蕘花也生時色黃干則如白故陶氏言細白也或言無蕘花以桃花代之取其利耳氣味苦寒有毒別錄曰辛微寒有毒主治傷寒溫瘧下十二水破積聚大堅癥瘕盪滌腸胃中留癖飲食寒熱邪氣利水道本經療痰飲咳嗽別錄治咳逆上氣喉中腫滿疰氣蠱毒痃癖氣塊甄權發明宗奭曰張仲景傷寒論以蕘花治利者取其行水也水去則利止其意如此今用之當斟酌不可過使與不及也須有是證乃用之好古曰仲景小青龍湯云若微利去麻黃加蕘花如雞子大熬令赤色用之蓋利水也時珍曰蕘花蓋亦芫花之類氣味主治大略相近醉魚草綱目釋名鬧魚花綱目魚尾草綱目樚木集解時珍曰醉魚草南方處處有之多在塹岸邊作小株生高者三四尺根狀如枸杞莖似黃荊有微稜外有薄黃皮枝易繁衍葉似水楊對節而生經冬不凋七八月開花成穗紅紫色儼如芫花一樣結細子漁人採花及葉以毒魚盡圉圉而死呼為醉魚兒草池沼邊不可種之此花色狀氣味並如芫花毒魚亦同但花開不同時為異爾按中山經云熊耳山有草焉其狀如蘇而赤華名曰葶苧可以毒魚其此草之類歟花葉氣味辛苦溫有小毒主治痰飲成齁遇寒便發取花研末和米粉作果炙熟食之即效又治誤食石斑魚子中毒吐不止及諸魚骨鯁者搗汁和冷水少許咽之吐即止骨即化也久瘧成癖者以花填鯽魚腹中濕紙裹煨熟空心食之仍以花和海粉搗貼便消時珍莽草本經下品校正自木部移入此釋名䒽草音罔芒草山海經鼠莽弘景曰莽本作䒽字俗訛呼爾時珍曰此物有毒食之令人迷罔故名山人以毒鼠謂之鼠莽正誤別錄曰一名葞一名春草禹錫曰按爾雅云葞春草孫炎注云藥草也俗呼為䒽草郭璞注云一名芒草所見異也時珍曰葞音尾白薇也薇葞字音相近爾別錄白薇下云一名春草而此又以為䒽草蓋因孫炎之誤也今正之集解別錄曰莽草生上谷山谷及冤句五月採葉陰乾弘景曰今東間處處皆有葉青辛烈者良人用搗以和陳粟米粉納水中魚吞即死浮出人取食之無妨頌曰今南中州郡及蜀川皆有之木若石南而葉稀無花實五月七月採葉陰乾一說藤生繞木石間既謂之草乃蔓生者是也宗奭曰莽草諸家皆謂之草而本草居木部今世所用皆木葉如石南葉枝梗干則皺揉之其臭如椒斅曰凡用葉勿用尖及攣生者時珍曰範子計然云莽草出三輔青色者善葉修治斅曰凡使取葉細銼以生甘草水蓼二味同盛入生稀絹袋中甑中蒸一日去二件曬乾用氣味辛溫有毒普曰神農辛雷公桐君苦有毒時珍曰莽草制雌黃雄黃而有毒誤食害人惟紫河車磨水服及黑豆煮汁服可解豆汁澆其根即爛性相制也主治風頭癰腫乳癰疝瘕除結氣疥瘙殺蟲魚本經療喉痹不通乳難頭風癢可用沐勿令入眼別錄治風疽疝氣腫墜凝血治瘰癧除濕風不入湯服主頭瘡白禿殺蟲與白蘞赤小豆為末雞子白調如糊熁毒腫干更易上甄權治皮膚麻痹煎濃湯淋風蟲牙痛大明發明頌曰古方治風毒痹厥諸酒皆用䒽草今醫家取葉煎湯熱含少頃吐之治牙齒風蟲及喉痹甚效宗奭曰濃煎湯淋渫皮膚麻痹周禮翦氏掌除蠹物以莽草熏之則死時珍曰古方治小兒傷寒有莽草湯又瑣碎錄云思村王氏之子生七日而兩腎縮入二醫云此受寒氣而然也以硫黃茱萸大蒜研塗其腹以䒽草蛇床子燒煙熏其下部而愈也附方舊四新十賊風腫痹風入五藏恍惚宜莽草膏主之莽草一斤烏頭附子躑躅各二兩切以水和醋一升漬一宿豬脂一斤煎三上三下絞去滓向火以手摩病上三百度應手即瘥若耳鼻疾可以綿裹塞之疥癬雜瘡並宜摩之肘後小兒風癇掣瘲戴眼極者日數十發又治大人賊風莽草雷丸各一雞子黃大化豬脂一斤煎七沸去滓摩痛處勿近目及陰日凡三四次外臺秘要頭風久痛莽草煎湯沐之勿令入目聖惠方風蟲牙痛肘後方用莽草煎湯熱漱冷吐一加山椒皮一加獨活一加郁李仁梅師方一加芫花一加川椒細辛各等分煎湯熱漱冷吐聖惠用莽草半兩皂角三挺去皮子漢椒七粒為末棗肉丸芥子大每以一丸塞孔中吐涎取效瘰癧結核䒽草一兩為末雞子白調塗帛上貼之日二易取效止聖惠方癰瘡未潰方同上得痛為良肘後方乳腫不消莽草小豆等分為末苦酒和敷之衛生易簡狗咬昏悶浸椒水調莽草末敷之便民圖纂茵芋本經下品釋名莞草別錄卑共別錄時珍曰茵芋本作因預未詳其義莞草與莆莞名同集解別錄曰茵芋生太山川穀三月三日採葉陰乾弘景曰好者出彭城今近道亦有莖葉狀似莽草而細軟連細莖採之方用甚稀惟合療風酒大明曰出自海鹽形似石南樹生葉厚五六七月採頌曰今雍州絳州華州杭州亦有之春生苗高三四尺莖赤葉似石榴而短厚又似石南葉四月開細白花五月結實三月四月七月採莖葉日乾莖葉氣味苦溫有毒別錄曰微溫有毒權曰苦辛有小毒主治五臟邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痹痛本經療久風濕走四肢腳弱別錄治男子女人軟腳毒風拘急攣痛甄權一切冷風筋骨怯弱羸顫入藥炙用大明發明時珍曰千金外臺諸古方治風癇有茵芋丸治風痹有茵芋酒治婦人產後中風有茵芋膏風濕諸方多用之茵芋石南莽草皆古人治風妙品而近世罕知亦醫家疏缺也附方舊一新二茵芋酒治賊風手足枯痹拘攣用茵芋附子天雄烏頭秦艽女萎防風防己石南葉躑躅花細辛桂心各一兩十二味切以絹袋盛清酒一斗漬之冬七夏三春秋五日藥成每服一合日二服以微痹為度方出胡洽居士百病方圖經本草茵芋丸治風氣積滯成腳氣發則痛者茵芋葉炒薏苡仁各半兩郁李仁一兩牽牛子三兩硃砂末半兩上為末煉蜜丸如梧子大每服二十丸五更薑棗湯下取利未利再服取快本事方產後中風茵芋五兩木防己半斤苦酒九升漬一宿豬脂四斤煎三上三下膏成炙手熱摩千遍千金方石龍芮本經中品校正併入菜部水堇釋名地椹本經天豆別錄石能別錄魯果能本經水堇吳普音謹又音芹苦堇爾雅堇葵郭璞胡椒菜救荒彭根別錄弘景曰生於石上其葉芮芮短小故名恭曰實如桑椹故名地椹禹錫曰爾雅云齧苦堇也郭璞云即堇葵也本草言味甘而此云苦者古人語倒猶甘草謂之大苦也時珍曰芮芮細貌其椹之子細芮故名地椹以下皆子名也水堇以下皆苗名也苗作蔬食味辛而滑故有椒葵之名唐本草菜部堇系重出今依吳普本草合併為一集解別錄曰石龍芮生太山川澤石邊五月五日採子二月八月採皮陰乾弘景曰今出近道子形粗似蛇床子而扁非真好者人言是蓄菜子也東山石上所生者其葉芮芮短小其子狀如葶藶黃色而味小辛此乃是真也恭曰今用者俗名水堇苗似附子實如桑椹生下濕地五月熟葉子皆味辛山南者粒大如葵子關中河北者細如葶藶氣力劣於山南者陶以細者為真未為通論又曰堇菜野生非人所種葉似蕺花紫色藏器曰爾雅云芨堇草注云烏頭苗也蘇恭注天雄亦云石龍芮葉似堇草故名水堇據此則堇草是烏頭苗水堇定是石龍芮更非別草也頌曰今惟出兗州一叢數莖莖青紫色每莖三葉其葉短小多刻缺子如葶藶而色黃蘇恭所說乃水堇非石龍芮也兗州所生者正與本經及陶氏說合為得其真宗奭曰石龍芮有兩種水中生者葉光而末圓陸地生者葉毛而末銳入藥須水生者陸生者又謂之天灸而補陰不足莖冷失精時珍曰蘇恭言水堇即石龍芮蘇頌非之非矣按魏吳普本草石龍芮一名水堇其說甚明唐本草菜部所出水堇言其苗也本經石龍芮言其子也寇宗奭所言陸生者乃是毛堇有大毒不可食水堇即俗稱胡椒菜者處處有之多生近水下濕地高者尺許其根如薺二月生苗叢生圓莖分枝一枝三葉葉青而光滑有三尖多細缺江淮人三四月採苗瀹過曬蒸黑色為蔬四五月開細黃花結小實大如豆狀如初生桑椹青綠色搓散則子甚細如葶藶子即石龍芮也宜半老時採之範子計然云石龍芮出三輔色黃者善子根皮同氣味苦平無毒普曰神農苦平岐伯酸扁鵲大寒雷公咸無毒之才曰大戟為之使畏吳茱萸蛇蛻皮主治風寒濕痹心腹邪氣利關節止煩滿久服輕身明目不老本經平腎胃氣補陰氣不足失精莖冷令人皮膚光澤有子別錄逐諸風除心熱躁大明發明時珍曰石龍芮乃平補之藥古方多用之其功與枸杞覆盆子相埒而世人不知用何哉水堇氣味甘寒無毒時珍曰微辛苦澀主治搗汁洗馬毒瘡並服之又塗蛇蠍毒及癰腫唐本久食除心下煩熱主寒熱鼠瘻瘰癧生瘡結核聚氣下瘀血止霍亂又生搗汁半升服能殺鬼毒即吐出孟詵發明詵曰堇葉止霍亂與香茙同功香茙即香薷也附方舊二新一結核氣堇菜日乾為末油煎成膏摩之日三五度便瘥孟詵食療蛇咬傷瘡生堇杵汁塗之萬畢術血疝初起胡椒菜葉挼按揉之集簡方毛茛音艮拾遺校正併入毛建草釋名毛建草拾遺水茛綱目毛堇音芹天灸衍義自灸綱目猴蒜時珍曰茛乃草烏頭之苗此草形狀及毒皆似之故名肘後方謂之水茛又名毛建亦茛字音訛也俗名毛堇似水堇而有毛也山人截瘧採葉挼貼寸口一夜作泡如火燎故呼為天灸自灸集解藏器曰陶注鉤吻云或是毛茛蘇恭云毛茛是有毛石龍芮也有毒與鉤吻無干葛洪百一方云菜中有水茛葉圓而光生水旁有毒蟹多食之人誤食之狂亂如中風狀或吐血以甘草汁解之又曰毛建草生江東地田野澤畔葉如芥而大上有毛花黃色子如蒺藜時珍曰毛建毛茛即今毛堇也下濕處即多春生苗高者尺余一枝三葉葉有三尖及細缺與石龍芮莖葉一樣但有細毛為別四五月開小黃花五出甚光豔結實狀如欲綻青桑椹如有尖峭與石龍芮子不同人以為鵝不食草者大誤也方士取汁煮砂伏硫沈存中筆談所謂石龍芮有兩種水生者葉光而末圓陸生者葉毛而末銳此即葉毛者宜辨之葉及子氣味辛溫有毒主治惡瘡癰腫疼痛未潰搗葉敷之不得入瘡令肉爛又患瘧人以一握微碎縛於臂上男左女右勿令近肉即便成瘡和姜搗塗腹破冷氣藏器附錄海薑陰命藏器曰陶注鉤吻云海姜生海中赤色狀如石龍芮有大毒又曰陰命生海中赤色著木懸其子有大毒今無的識者牛扁本經下品釋名扁特唐本扁毒唐本集解別錄曰牛扁生桂陽川穀弘景曰今人不復識此恭曰此藥似堇草石龍芮輩根如秦艽而細生平澤下濕地田野人名為牛扁療牛蝨甚效太常名扁特或名扁毒保升曰今出寧州葉似石龍芮附子等二月八月採根日乾頌曰今潞州一種名便特六月有花八月結實採其根苗搗末油調殺蟣蝨主療大都相似疑即扁特也但聲近而字訛耳氣味苦微寒無毒主治身皮瘡熱氣可作浴湯殺牛蝨小蟲又療牛病本經附錄蝨建草拾遺藏器曰苦無毒主蟣蝨挼汁沐頭蝨盡死人有誤吞蝨成病者搗汁服一小合亦主諸蟲瘡生山足濕地發葉似山丹微赤高一二尺又有水竹葉生水中葉如竹葉而短小可生食亦去蟣蝨蕁麻蕁音尋宋圖經釋名毛䕭時珍曰蕁字本作䕭杜子美有除䕭草詩是也集解頌曰蕁麻生江寧府山野中時珍曰川黔諸處甚多其莖有刺高二三尺葉似花桑或青或紫背紫者入藥上有毛芒可畏觸人如蜂蠆螫蠚以人溺濯之即解有花無實冒冬不凋挼投水中能毒魚氣味辛苦寒有大毒吐利人不止主治蛇毒搗塗之蘇頌風疹初起以此點之一夜皆失時珍格注草唐本草集解恭曰出齊魯山澤間葉似蕨根紫色若紫草根一株有二寸許二月八月採根五月六月採苗日乾用氣味辛苦溫有大毒主治蠱疰諸毒疼痛等唐本海芋綱目釋名觀音蓮綱目羞天草玉冊天荷綱目隔河仙見下集解時珍曰海芋生蜀中今亦處處有之春生苗高四五尺大葉如芋葉而有干夏秋間抽莖開花如一瓣蓮花碧色花中有蕊長作穗如觀音像在圓光之狀故俗呼為觀音蓮方士號為隔河仙云可變金其根似芋魁大者如升碗長六七寸蓋野芋之類也庚辛玉冊云羞天草陰草也生江廣深谷澗邊其葉極大可以御雨葉背紫色花如蓮花根葉皆有大毒可煅粉霜硃砂小者名野芋宋祁海芋贊云木干芋葉擁腫盤戾農經弗載可以治癘氣味辛有大毒主治瘧瘴毒腫風癩伏硇砂時珍附錄透山根時珍曰按𡵺嶁神書云透山根生蜀中山谷草類蘼蕪可以點鐵成金昔有人採藥誤斫此草刀忽黃軟成金也又庚辛玉冊云透山根出武都取汁點鐵立成黃金有大毒人誤食之化為紫水又有金英草亦生蜀中狀如馬齒莧而色紅模鐵成金亦有大毒入口殺人須臾為紫水也又何遠春渚紀聞云劉均父吏部罷官歸成都有水銀一篋過峽篋漏急取渡旁叢草塞之久而開視盡成黃金矣宋初有軍士在澤州澤中割馬草歸鐮皆成金以草燃釜亦成黃金又臨安僧法堅言有客過於潛山中見一蛇腹脹齧一草以腹磨之而消念此草必能消脹取置篋中夜宿旅館聞鄰房有人病腹脹呻吟以釜煎藥一杯與服頃之不復聞聲念已安矣至旦視之其人血肉俱化為水獨骸骨在床爾視其釜則通體成金矣觀何氏所載即是透山根及金英草之類如此毒草不可不知故備載之耳鉤吻本經下品釋名野葛本經毒根吳普胡蔓草圖經斷腸草綱目黃藤綱目火把花弘景曰言其入口則鉤人喉吻也或言吻當作挽字牽挽人腸而絕之也時珍曰此草雖名野葛非葛根之野者也或作冶葛王充論衡云冶地名也在東南其說甚通廣人謂之胡蔓草亦曰斷腸草入人畜腹內即黏腸上半日則黑爛又名爛腸草滇人謂之火把花因其花紅而性熱如火也岳州謂之黃藤集解別錄曰鉤吻生敷高山谷及會稽東野折之青煙出者名固活二月八月採普曰秦鉤吻一名除辛生南越山及寒石山或益州葉如葛赤莖大如箭而方根黃色正月採之恭曰野葛生桂州以南村墟閭巷間皆有彼人通名鉤吻亦謂苗為鉤吻根名野葛蔓生其葉如柿其根新採者皮白骨黃宿根似地骨嫩根如漢防己皮節斷者良正與白花藤相類不深別者頗亦惑之新者折之無塵氣經年以後則有塵起從骨之細孔中出今折枸杞根亦然本草言折之青煙起者名固活為良亦不達之言也人誤食其葉者致死而羊食其苗大肥物有相伏如此博物志云鉤吻蔓生葉似鳧葵是也時珍曰嵇含南方草木狀云野葛蔓生葉如羅勒光而厚一名胡蔓草人以雜生蔬中毒人半日輒死段成式酉陽雜俎云胡蔓草生邕州容州之間叢生花扁如梔子而稍大不成朵色黃白其葉稍黑又按嶺南衛生方云胡蔓草葉如茶其花黃而小一葉入口百竅潰血人無復生也時珍又訪之南人云鉤吻即胡蔓草今人謂之斷腸草是也蔓生葉圓而光春夏嫩苗毒甚秋冬枯老稍緩五六月開花似櫸柳花數十朵作穗生嶺南者花黃生滇南者花紅呼為火把花此數說皆與吳普蘇恭說相合陶弘景等別生分辨並正於下正誤弘景曰五符經亦言鉤吻是野葛核事而言似是兩物野葛是根狀如牡丹所生處亦有毒飛鳥不得集今人用合膏服之無嫌鉤吻別是一物葉似黃精而莖紫當心抽花黃色初生極類黃精故人採多惑之遂致死生之反或云鉤吻是毛茛參錯不同未詳云何斅曰凡使黃精勿用鉤吻真似黃精只是葉有毛鉤子二個黃精葉似竹葉又曰凡使鉤吻勿用地精莖苗相同鉤吻治人身上惡毒瘡其地精殺人也恭曰鉤吻蔓生葉如柿陶言飛鳥不集者妄也黃精直生葉似柳及龍膽草殊非比類毛茛乃有毛石龍芮與鉤吻何干頌曰江南人說黃精莖苗稍類鉤吻但鉤吻葉頭極尖而根細與蘇恭所說不同恐南北之產異也禹錫曰陶說鉤吻似黃精者當是蘇說似柿葉者別是一物也又言苗名鉤吻根名野葛者亦非通論時珍曰神農本草鉤吻一名野葛一句已明草木狀又名胡蔓草顯是藤生吳普蘇恭所說正合本文陶氏以藤生為野葛又指小草為鉤吻復疑是毛茛乃祖雷斅之說諸家遂無定見不辨其蔓生小草相去遠也然陶雷所說亦是一種有毒小草但不得指為鉤吻爾昔天姥對黃帝言黃精益壽鉤吻殺人乃是以二草善惡比對而言陶氏不審疑是相似遂有此說也余見黃精下氣味辛溫大有毒普曰神農辛雷公有毒殺人時珍曰其性大熱本草毒藥止云有大毒此獨變文曰大有毒可見其毒之異常也之才曰半夏為之使惡黃芩主治金瘡乳痓中惡風咳逆上氣水腫殺鬼疰蠱毒本經破症積除腳膝痹痛四肢拘攣惡瘡疥蟲殺鳥獸搗汁入膏中不入湯飲別錄主喉痹咽塞聲音變保升發明藏器曰鉤吻食葉飲冷水即死冷水發其毒也彼土毒死人懸屍樹上汁滴地上生菌子收之名菌藥烈於野葛也蕹菜搗汁解野葛毒取汁滴野葛苗即萎死南人先食蕹菜後食野葛二物相伏自然無苦魏武帝啖野葛至尺先食此菜也時珍曰按李石續博物志云胡蔓草出二廣廣人負債急每食此草而死以誣人以急水吞即死急慢水吞死稍緩或取毒蛇殺之覆以此草澆水生菌為毒藥害人葛洪肘後方云凡中野葛毒口不可開者取大竹筒洞節以頭拄其兩脅及臍中灌冷水入筒中數易水須臾口開乃可下藥解之惟多飲甘草汁人屎汁白鴨或白鵝斷頭瀝血入口中或羊血灌之嶺南衛生方云即時取雞卵抱未成雛者研爛和麻油灌之吐出毒物乃生稍遲即死也
