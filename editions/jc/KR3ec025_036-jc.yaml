body:
  text: 木部第三十六卷木之三灌木類五十一種桑本經中品釋名子名椹時珍曰徐鍇說文解字云叒音若東方自然神木之名其字象形桑乃蠶所食異於東方自然之神木故加木於叒下而別之典術云桑乃箕星之精集解頌曰方書稱桑之功最神在人資用尤多爾雅云桑辨有葚者梔又云女桑桋桑檿桑山桑郭璞云辨半也葚與椹同一半有椹一半無椹名梔俗間呼桑之小而條長者皆為女桑其山桑似桑材中弓弩檿桑絲中琴瑟皆材之美者也他木鮮及之時珍曰桑有數種有白桑葉大如掌而厚雞桑葉花而薄子桑先椹而後葉山桑葉尖而長以子種者不若壓條而分者桑生黃衣謂之金桑其木必將槁矣種樹書云桑以構接則桑大桑根下埋龜甲則茂盛不蛀桑根白皮修治別錄曰採無時出土上者殺人弘景曰東行桑根乃易得而江邊多出土不可輕信時珍曰古本草言桑根見地上者名馬領有毒殺人旁行出土者名伏蛇亦有毒而治心痛故吳淑事類賦云伏蛇療疾馬領殺人斅曰凡使採十年以上向東畔嫩根銅刀刮去青黃薄皮一重取里白皮切焙乾用其皮中涎勿去之藥力俱在其上也忌鐵及鉛或云木之白皮亦可用煮汁染褐色久不落氣味甘寒無毒權曰平大明曰溫元素曰苦酸杲曰甘辛寒可升可降陽中陰也好古曰甘厚而辛薄入手太陰經之才曰續斷桂心麻子為之使主治傷中五勞六極羸瘦崩中絕脈補虛益氣本經去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可以縫金瘡別錄治肺氣喘滿虛勞客熱頭痛內補不足甄權煮汁飲利五臟入散用下一切風氣水氣孟詵調中下氣消痰止渴開胃下食殺腹臟蟲止霍亂吐瀉研汁治小兒天吊驚癇客忤及敷鵝口瘡大驗大明瀉肺利大小腸降氣散血時珍發明杲曰桑白皮甘以固元氣之不足而補虛辛以瀉肺氣之有餘而止嗽又云桑白皮瀉肺然性不純良不宜多用時珍曰桑白皮長於利小水乃實則瀉其子也故肺中有水氣及肺火有餘者宜之十劑云燥可去濕桑白皮赤小豆之屬是矣宋醫錢乙治肺氣熱盛咳嗽而後喘面腫身熱瀉白散用桑白皮炒一兩地骨皮焙一兩甘草炒半兩每服一二錢入粳米百粒水煎食後溫服桑白皮地骨皮皆能瀉火從小便去甘草瀉火而緩中粳米清肺而養血此乃瀉肺諸方之準繩也元醫羅天益言其瀉肺中伏火而補正氣瀉邪所以補正也若肺虛而小便利者不宜用之頌曰桑白皮作線縫金瘡腸出更以熱雞血塗之唐安金藏剖腹用此法而愈附方舊九新五咳嗽吐血甚者殷鮮桑根白皮一斤米泔浸三宿刮去黃皮銼細入糯米四兩焙乾為末每服一錢米飲下經驗方消渴尿多入地三尺桑根剝取白皮炙黃黑銼以水煮濃汁隨意飲之亦可入少米勿用鹽肘後方產後下血炙桑白皮煮水飲之肘後方血露不絕鋸截桑根取屑五指撮以醇酒服之日三服肘後方墜馬拗損桑根白皮五斤為末水一升煎膏敷之便止已後亦無宿血終不發動經驗後方金刃傷瘡新桑白皮燒灰和馬糞塗瘡上數易之亦可煮汁服之廣利方雜物眯眼新桑根白皮洗淨捶爛入眼撥之自出聖惠方髮鬢墮落桑白皮銼二升以水淹浸煮五六沸去滓頻頻洗沐自不落也千金方發槁不澤桑根白皮柏葉各一斤煎汁沐之即潤聖惠方小兒重舌桑根白皮煮汁塗乳上飲之子母秘錄小兒流涎脾熱也胸膈有痰新桑根白皮搗自然汁塗之甚效乾者煎水聖惠方小兒天吊驚癇客忤家桑東行根取研汁服聖惠方小兒火丹桑根白皮煮汁浴之或為末羊膏和塗之千金方石癰堅硬不作膿者蜀桑白皮陰乾為末烊膠和酒調敷以軟為度千金方皮中白汁主治小兒口瘡白漫漫拭淨塗之便愈又塗金刃所傷燥痛須臾血止仍以白皮裹之甚良蘇頌塗蛇蜈蚣蜘蛛傷有驗取枝燒瀝治大風瘡疥生眉發時珍附方舊一新三小兒鵝口桑白皮汁和胡粉塗之子母秘錄小兒唇腫桑木汁塗之即愈聖惠方解百毒氣桑白汁一合服之須臾吐利自出肘後方破傷中風桑瀝好酒對和溫服以醉為度醒服消風散摘玄方桑椹一名文武實主治單食止消渴蘇恭利五臟關節通血氣久服不飢安魂鎮神令人聰明變白不老多收曝乾為末蜜丸日服藏器搗汁飲解中酒毒釀酒服利水氣消腫時珍發明宗奭曰本經言桑甚詳然獨遺烏椹桑之精英盡在於此採摘微研以布濾汁石器熬成稀膏量多少入蜜熬稠貯瓷器中每抄一二錢食後夜臥以沸湯點服治服金石發熱口渴生精神及小腸熱其性微涼故也仙方曬乾為末蜜和為丸酒服亦良時珍曰椹有烏白二種楊氏產乳云孩子不得與桑椹令兒心寒而陸機詩疏云鳩食桑椹多則醉傷其性何耶四民月令云四月宜飲桑椹酒能理百種風熱其法用椹汁三斗重湯煮至一斗半入白蜜二合酥油一兩生薑一合煮令得所瓶收每服一合和酒飲之亦可以汁熬燒酒藏之經年味力愈佳史言魏武帝軍乏食得干椹以濟飢金末大荒民皆食椹獲活者不可勝計則椹之乾溼皆可救荒平時不可不收採也附方舊一新七水腫脹滿水不下則滿溢水下則虛竭還脹十無一活宜用桑椹酒治之桑心皮切以水二斗煮汁一斗入桑椹再煮取五升以糯飯五升釀酒飲普濟方瘰癧結核文武膏用文武實即桑葚子二斗黑熟者以布取汁銀石器熬成薄膏每白湯調服一匙日三服保命集諸骨哽咽紅椹子細嚼先咽汁後咽滓新水送下乾者亦可聖惠方小兒赤禿桑椹取汁頻服千金方小兒白禿黑葚入罌中曝三七日化為水洗之三七日神效聖濟錄拔白變黑黑葚一斤蝌蚪一斤瓶盛封閉懸屋東頭一百日盡化為黑泥以染白髮如漆陳藏器本草發白不生黑熟桑椹水浸日曬搽塗令黑而復生也千金方陰症腹痛桑椹絹包風乾過伏天為末每服三錢熱酒下取汗集簡方葉氣味苦甘寒有小毒大明曰家桑葉暖無毒主治除寒熱出汗本經汁解蜈蚣毒別錄煎濃汁服能除腳氣水腫利大小腸蘇恭炙熟煎飲代茶止渴孟詵煎飲利五臟通關節下氣嫩葉煎酒服治一切風蒸熟搗罯風痛出汗並撲損瘀血挼爛塗蛇蟲傷大明研汁治金瘡及小兒吻瘡煎汁服止霍亂腹痛吐下亦可以干葉煮之雞桑葉煮汁熬膏服去老風及宿血藏器治勞熱咳嗽明目長髮時珍發明頌曰桑葉可常服神仙服食方以四月桑茂盛時採葉又十月霜後三分二分已落時一分在者名神仙葉即採取與前葉同陰乾搗末丸散任服或煎水代茶飲之又霜後葉煮湯淋渫手足去風痹殊勝又微炙和桑衣煎服治痢及金瘡諸損傷止血震亨曰經霜桑葉研末米飲服止盜汗時珍曰桑葉乃手足陽明之藥汁煎代茗能止消渴附方舊二新十一青盲洗法昔武勝軍宋仲孚患此二十年用此法二年目明如故新採青桑葉陰乾逐月按日就地上燒存性每以一合於瓷器內煎減二分傾出澄清溫熱洗目至百度屢試有驗正月初八二月初八三月初六四月初四五月初五六月初二七月初七八月二十九月十二十月十七十一月初二十二月三十普濟方風眼下淚臘月不落桑葉煎湯日日溫洗或入芒硝集簡方赤眼澀痛桑葉為末紙卷燒煙燻鼻取效海上方也普濟方頭髮不長桑葉麻葉煮泔水沐之七次可長數尺千金方吐血不止晚桑葉焙研涼茶服三錢只一服止後用補肝肺藥聖濟總錄小兒渴疾桑葉不拘多少逐片染生蜜線系蒂上繃陰乾細切煎汁日飲代茶勝金方霍亂轉筋入腹煩悶桑葉一握煎飲一二服立定聖惠方大腸脫肛黃皮桑樹葉三升水煎過帶溫罨納之仁齋直指方肺毒風瘡狀如大風綠雲散用好桑葉淨洗蒸熟一宿候曬乾為末水調二錢匕服經驗後方癰口不斂經霜黃桑葉為末敷之直指方穿掌腫毒新桑葉研爛盦之即愈通玄論湯火傷瘡經霜桑葉燒存性為末油和敷之三日愈醫學正傳手足麻木不知痛癢霜降後桑葉煎湯頻洗救急方枝氣味苦平主治遍體風癢乾燥水氣腳氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服輕身聰明耳目令人光澤療口乾及癰疽後渴用嫩條細切一升熬香煎飲亦無禁忌久服終身不患偏風蘇頌出近效方名桑枝煎一法用花桑枝寸銼炒香瓦器煮減一半再入銀器重湯熬減一半或入少蜜亦可發明頌曰桑枝不冷不熱可以常服抱朴子言仙經云一切仙藥不得桑煎不服時珍曰煎藥用桑者取其能利關節除風寒濕痹諸痛也觀靈樞經治寒痹內熱用桂酒法以桑炭炙布巾熨痹處治口僻用馬膏法以桑鉤鉤其口及坐桑灰上皆取此意也又癰疽發背不起發或瘀肉不腐潰及陰瘡瘰癧流注臁瘡頑瘡惡瘡久不愈者用桑木炙法未潰則拔毒止痛已潰則補接陽氣亦取桑通關節去風寒火性暢達出郁毒之意其法以干桑木劈成細片扎作小把然火吹息炙患處每吹炙片時以瘀肉腐動為度內服補托藥誠良方也又按趙溍養疴漫筆云越州一學錄少年苦嗽百藥不效或令用南向柔桑條一束每條寸折納鍋中以水五碗煎至一碗盛瓦器中渴即飲之服一月而愈此亦桑枝煎變法爾附方舊二新四服食變白久服通血氣利五臟雞桑嫩枝陰乾為末蜜和作丸每日酒服六十丸聖惠方水氣腳氣桑條二兩炒香以水一升煎二合每日空心服之亦無禁忌聖濟總錄風熱臂痛桑枝一小升切炒水三升煎二升一日服盡許叔微云嘗病臂痛諸藥不效服此數劑尋愈觀本草切用及圖經言其不冷不熱可以常服抱朴子言一切仙藥不得桑枝煎不服可知矣本事方解中蠱毒令人腹內堅痛面黃青色淋露骨立病變不常桑木心銼一斛著釜中以水淹令上有三寸煮取二斗澄清微火煎得五升空心服五合則吐蠱毒出也肘後方刺傷手足犯露水腫痛多殺人以桑枝三條煻火炮熱斷之以頭熨瘡上令熱冷即易之盡三條則瘡自爛仍取韭白或薤白敷上急以帛裹之有腫更作千金方紫白癜風桑枝十斤益母草三斤水五斗慢火煮至五斤去滓再煎成膏每臥時溫酒調服半合以愈為度聖惠方桑柴灰氣味辛寒有小毒詵曰淋汁入煉五金家用可結汞伏硫主治蒸淋取汁為煎與冬灰等分同滅痣疵黑子蝕惡肉煮小豆食大下水脹敷金瘡止血生肌蘇恭桑霜治噎食積塊時珍附方舊五新六目赤腫痛桑灰一兩黃連半兩為末每以一錢泡湯澄清洗之聖濟總錄洗青盲眼正月八二月八三月六四月四五月五六月二七月七八月二十九月十二十月十七十一月二十六十二月三十日每遇上件神日用桑柴灰一合煎湯沃之於瓷器中澄取極清稍熱洗之如冷即重湯頓溫不住手洗久久視物如鷹鶻也一法以桑灰童子小便和作丸每用一丸泡湯澄洗經驗方屍疰鬼疰其病變動乃有三十六種至九十九種使人寒熱淋瀝恍惚默默不得知所苦累年積月以至於死復傳親人宜急治之用桑樹白皮曝乾燒灰二斗著甑中蒸透以釜中湯三四斗淋之又淋凡三度極濃澄清只取二斗以漬赤小豆二斗一宿曝乾復漬灰汁盡乃止以豆蒸熟以羊肉或鹿肉作羹進此豆飯初食一升至二升取飽微者三四斗愈極者七八斗愈病去時體中自覺疼癢淫淫若根本不盡再為之神效方也肘後方腹中癥瘕方見介部鱉下身面水腫坐臥不得取東引花桑枝燒灰淋汁煮赤小豆每飢即飽食之不得吃湯飲梅師方面上痣疵寒食前後取桑條燒灰淋汁入石灰熬膏以自己唾調點之自落也皆效方白癜駁風桑柴灰二斗甑內蒸之取釜內熱湯洗不過五六度瘥聖惠方大風惡疾眉發脫落以桑柴灰熱湯淋取汁洗頭面以大豆水研漿解釋灰味彌佳次用熟水入綠豆麵濯之三日一洗頭一日一洗面不過十度良聖惠方狐尿刺人腫痛欲死熱桑灰汁漬之冷即易肘後方金瘡作痛桑柴灰篩細敷之梅師方瘡傷風水腫痛入腹則殺人多以桑灰淋汁漬之冷復易梅師方頭風白屑桑灰淋汁沐之神良聖惠方桑耳桑黃見菜部木耳桑花見草部苔類桑寄生見後寓木類桑柴火見火部桑螵蛸見虫部桑蠹見虫部柘宋嘉祐釋名時珍曰按陸佃埤雅云柘宜山石柞宜山阜柘之從石其取此義歟集解宗奭曰柘木里有紋亦可旋為器其葉可飼蠶曰柘蠶然葉硬不及桑葉入藥以無刺者良時珍曰處處山中有之喜叢生干疏而直葉豐而厚團而有尖其葉飼蠶取絲作琴瑟清響勝常爾雅所謂棘繭即此蠶也考工記云弓人取材以柘為上其實狀如桑子而圓粒如椒名隹子隹音錐其木染黃赤色謂之柘黃天子所服相感志云柘木以酒醋調礦灰塗之一宿則作間道烏木紋物性相伏也木白皮東行根白皮氣味甘溫無毒主治婦人崩中血結瘧疾大明煮汁釀酒服主風虛耳聾補勞損虛羸腰腎冷夢與人交接泄精者藏器發明時珍曰柘能通腎氣故聖惠方治耳鳴耳聾一二十年者有柘根酒用柘根二十斤菖蒲五斗各以水一石煮取汁五斗故鐵二十斤煅赤以水五斗浸取清合水一石五斗用米二石曲二斗如常釀酒成用真磁石三斤為末浸酒中三宿日夜飲之取小醉而眠聞人聲乃止附方新二飛絲入目柘漿點之以綿蘸水拭去醫學綱目洗目令明柘木煎湯按日溫洗自寅至亥乃止無不效者正月初二二月初二三月不洗四月初五五月十五六月十一七月初七八月初二九月初二十月十九十一月不洗十二月十四日徐神翁方也海上方小兒鵝口重舌柘根五斤銼水五升煮二升去滓煎取五合頻塗之無根弓材亦可千金方柘黃見菜部木耳奴柘拾遺集解藏器曰生江南山野似柘節有刺冬不凋時珍曰此樹似柘而小有刺葉亦如柞葉而小可飼蠶刺氣味苦小溫無毒主治老婦血瘕男子痃癖悶痞取刺和三稜草馬鞭草作煎如稠糖病在心食後在臍空心服當下惡物藏器楮別錄上品釋名榖音媾亦作構榖桑頌曰陸機詩疏云構幽州謂之榖桑或曰楮桑荊揚交廣謂之榖時珍曰楮本作柠其皮可績為苧故也楚人呼乳為榖其木中白汁如乳故以名之陸佃埤雅作穀米之谷訓為善者誤矣或以楮構為二物者亦誤矣詳下文集解別錄曰楮實生少室山所在有之八月九月採實曬乾四十日成弘景曰此即今構樹也南人呼榖紙亦為楮紙武陵人作榖皮衣甚堅好頌曰此有二種一種皮有斑花紋謂之斑榖今人用皮為冠者一種皮白無花枝葉大相類但取其葉似葡萄葉作瓣而有子者為佳其實初夏生大如彈丸青綠色至六七月漸深紅色乃成熟八九月採水浸去皮穰取中子段成式酉陽雜俎云谷田久廢必生構葉有瓣曰楮無曰構陸氏詩疏云江南人績其皮以為布又搗以為紙長數丈光澤甚好又食其嫩芽以當菜茹今楮紙用之最博楮布不見有之醫方但貴楮實余亦稀用大明曰皮斑者是楮皮白者是榖時珍曰按許慎說文言楮榖乃一種也不必分別惟辨雌雄耳雄者皮斑而葉無丫叉三月開花成長穗如柳花狀不結實歉年人採花食之雌者皮白而葉有丫叉亦開碎花結實如楊梅半熟時水澡去子蜜煎作果食二種樹並易生葉多澀毛南人剝皮搗煮造紙亦緝練為布不堅易朽裴淵廣州記言蠻夷取榖皮熟捶為揭里罽布以擬氈甚暖也其木腐後生菌耳味甚佳好楮實亦名榖實別錄楮桃綱目修治斅曰採得後水浸三日攪旋投水浮者去之曬乾以酒浸一伏時了蒸之從巳至亥焙乾用經驗後方煎法六月六日採取榖子五升以水一斗煮取五升去滓微火煎如餳用氣味甘寒無毒主治陰痿水腫益氣充肌明目久服不飢不老輕身別錄壯筋骨助陽氣補虛勞健腰膝益顏色大明發明弘景曰仙方採搗取汁和丹用亦干服使人通神見鬼頌曰仙方單服其實正赤時收子陰乾篩末水服二錢匕益久乃佳抱朴子云楮木實赤者服之老者成少令人徹視見鬼神道士梁須年七十服之更少壯到百四十歲能行及走馬時珍曰別錄載楮實功用大補益而修真秘旨書言久服令人成骨軟之痿濟生秘覽治骨哽用楮實煎湯服之豈非軟骨之徵乎按南唐書云烈祖食飴喉中噎國醫莫能愈吳廷紹獨請進楮實湯一服疾失去群醫他日取用皆不驗扣廷紹答云噎因甘起故以此治之愚謂此乃治骨鯁軟堅之義爾群醫用治他噎故不驗也附方新六水氣蠱脹楮實子丸以潔淨府用楮實子一斗水二斗熬成膏茯苓三兩白丁香一兩半為末以膏和丸梧桐子大從少至多服至小便清利脹減為度後服治中湯養之忌甘苦峻補及發動之物潔古活法機要肝熱生翳楮實子研細食後蜜湯服一錢日再服直指方喉痹喉風五月五日或六月六日七月七日採楮桃陰乾每用一個為末井華水服之重者以兩個集簡方身面石疽狀如痤癤而皮厚榖子搗敷之外臺秘要金瘡出血榖子搗敷之外臺秘要目昏難視楮桃荊芥穗各五百枚為末煉蜜丸彈子大食後嚼一丸薄荷湯送下一日三服衛生易簡方葉氣味甘涼無毒主治小兒身熱食不生肌可作浴湯又主惡瘡生肉別錄治刺風身癢大明治鼻衄數升不斷者搗汁三升再三服之良久即止嫩芽茹之去四肢風痹赤白下痢蘇頌炒研搜面作餺飥食之主水痢甄權利小便去風濕腫脹白濁疝氣癬瘡時珍附方舊六新十水穀下痢見果部橡實下老少瘴痢日夜百餘度者取干楮葉三兩熬搗為末每服方寸匕烏梅湯下日再服取羊肉裹末納肛中利出即止楊炎南行方小兒下痢赤白作渴得水又嘔逆者構葉炙香以飲漿半升浸至水綠去葉以木瓜一個切納汁中煮二三沸去木瓜細細飲之子母秘錄脫肛不收五花構葉陰乾為末每服二錢米飲調下兼塗腸頭聖惠方小便白濁構葉為末蒸餅丸梧桐子大每服三十丸白湯下經驗良方通身水腫楮枝葉煎汁如餳空腹服一匕日三服聖惠方虛肥面腫積年氣上如水病但腳不腫用榖楮葉八兩以水一斗煮取六升去滓納米煮粥常食勿絕外臺秘要猝風不語榖枝葉銼細酒煮沫出隨多少日匕飲之肘後方人耽睡臥花榖葉曬研末湯服一二錢取瘥止楊堯輔方吐血鼻血楮葉搗汁一二升旋旋溫飲之聖惠方一切眼翳三月收榖木軟葉曬乾為末入麝香少許每以黍米大注眥內其翳自落聖惠方木腎疝氣楮葉雄黃等分為末酒糊丸梧桐子大每鹽酒下五十丸醫學集成疝氣入囊五月五日採榖樹葉陰乾為末每服一二匙空心溫酒下簡便方癬瘡濕癢楮葉搗敷聖惠方痔瘻腫痛楮葉半斤搗爛封之集簡方蝮蛇螫傷楮葉麻葉合搗取汁漬之千金方魚骨哽咽楮葉搗汁啜之十便良方枝莖主治癮疹癢煮湯洗浴別錄搗濃汁飲半升治小便不通時珍附方舊一新一頭風白屑楮木作枕六十日一易新者外臺秘要暴赤眼痛磣澀者嫩楮枝去葉放地火燒以碗覆之一日取灰泡湯澄清溫洗聖惠方樹白皮氣味甘平無毒主治逐水利小便別錄治水腫氣滿甄權喉痹吳普煮汁釀酒飲治水腫入腹短氣咳嗽為散服治下血血崩時珍附方舊一新六腸風下血秋採楮皮陰乾為末酒服三錢或入麝香少許日二普濟方血痢血崩楮樹皮荊芥等分為末冷醋調服一錢血崩以煎匕服神效不可具述危氏得效方男婦腫疾不拘久近暴風入腹婦人新產上圊風入臟內腹中如馬鞭短氣楮皮枝葉一大束切煮汁釀酒不斷飲之不過三四日即退可常服之千金方風水腫浮一身盡浮楮皮散用楮白皮豬苓木通各二錢桑白皮三錢陳橘皮一錢生薑三片水二鍾煎服日一劑聖濟總錄膀胱石水四肢瘦削小腹脹滿構根白皮桑根白皮各二升白朮四兩黑大豆五升流水一斗煮四升入清酒二升再煮至三升日再夜一分服之集驗方目中翳膜楮白皮曝乾作一繩子如釵股大燒灰細研每點少許日三五次瘥乃止崔氏方魚骨哽咽楮樹嫩皮搗爛為丸水下二三十丸衛生易簡方皮間白汁釋名構膠綱目五金膠漆大明曰能合硃砂為團故名五金膠膝時珍曰構汁最黏今人用黏金薄古法黏經書以楮樹汁和白芨飛面調糊接紙永不脫解過於膠膝氣味甘平無毒主治療癬別錄敷蛇蟲蜂蠍犬咬大明附方舊一天行病後脹滿兩脅刺脹臍下如水腫以構樹枝汁隨意服之小便利即消外臺秘要楮皮紙見服器部紙楮耳見菜部木耳枳本經中品校正併入開寶枳殼釋名子名枳實本經枳殼宋開寶宗奭曰枳實枳殼一物也小則其性酷而速大則其性詳而緩故張仲景治傷寒倉猝之病承氣湯中用枳實皆取其疏通決泄破結實之義他方但導敗風壅之氣可常服者故用枳殼其義如此恭曰既稱枳實須合核瓤今殊不然時珍曰枳乃木名從只諧聲也實乃其子故曰枳實後人因小者性速又呼老者為枳殼生則皮厚而實熟則殼薄而虛正如青橘皮陳橘皮之義宋人復出枳殼一條非矣寇氏以為破結實而名亦未必然集解別錄曰枳實生河內川澤九月十月採陰乾志曰枳殼生商州川穀九月十月採陰乾藏器曰本經採實用九月十月不如七月八月既厚且辛舊云江南為橘江北為枳周禮亦云橘逾淮而化為枳今江南枳橘俱有江北有枳無橘此自別種非關變易也頌曰今洛西江湖州郡皆有之以商州者為佳木如橘而小高五七尺葉如橙多刺春生白花至秋成實七月八月採者為實九月十月採者為殼今醫家以皮厚而小者為枳實完大者為枳殼皆以翻肚如盆口狀陳久者為勝近道所出者俗呼臭橘不堪用修治弘景曰枳實採破令乾除核微炙令香用以陳者為良俗方多用道家不須斅曰枳實枳殼性效不同若使枳殼取辛苦腥並有隙油者要塵久年深者為佳並去穰核以小麥麩炒至麩焦去麩用枳實氣味苦寒無毒別錄曰酸微寒普曰神農苦雷公酸無毒李當之大寒權曰辛苦元素曰性寒味苦氣厚味薄浮而升微降陰中陽也杲曰沉也陰也主治大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身本經除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄明目別錄解傷寒結胸主上氣喘咳腎內傷冷陰痿而有氣加而用之甄權消食散敗血破積堅去胃中濕熱元素發明震亨曰枳實瀉痰能沖牆倒壁滑竅破氣之藥也元素曰心下痞及宿食不消並宜枳實黃連杲曰以蜜炙用則破水積以泄氣除內熱潔古用去脾經積血脾無積血則心下不痞也好古曰益氣則佐之以人參白朮乾薑破氣則佐之以大黃牽牛芒硝此本經所以言益氣而復言消痞也非白朮不能去濕非枳實不能除痞故潔古制枳朮丸方以調胃脾張仲景治心下堅大如盤水飲所作枳實白朮湯用枳實七枚術三兩水一斗煎三升分三服腹中軟即消也余見枳殼下附方舊九新四猝胸痹痛枳實搗末湯服方寸匕日三夜一肘後方胸痹結胸胸痹心中痞堅留氣結胸胸滿脅下逆氣搶心枳實薤白湯主之陳枳實四枚厚朴四兩薤白半斤栝蔞一枚桂一兩以水五升先煎枳樸取二升去滓納余藥煎三兩沸分溫三服當愈張仲景金匱要略傷寒胸痛傷寒後猝胸膈閉痛枳實麩炒為末米飲服二錢日二服濟眾方產後腹痛枳實麩炒芍藥酒炒各二錢水一盞煎服亦可為末服聖惠方奔豚氣痛枳實炙為末飲下方寸匕日三夜一外臺秘要婦人陰腫堅痛枳實半斤碎炒帛裹熨之冷即易子母秘錄大便不通枳實皂莢等分為末飯丸米飲下危氏得效方積痢脫肛枳實石上磨平蜜炙暖更互熨之縮乃止千金方小兒久痢水穀不調枳實搗末飲服一二錢廣利方腸風下血枳實半斤麩炒黃耆半斤為末米飲非時服二錢匕糊丸亦可經驗方小兒五痔不以年月枳實為末煉蜜丸梧桐子大空心飲下三十丸集驗方小兒頭瘡枳實燒灰豬脂調塗聖惠方皮膚風疹枳實醋浸火炙熨之即消外臺秘要枳殼氣味苦酸微寒無毒權曰苦辛元素曰氣味升降與枳實同杲曰沉也陰也主治風癢麻痹通利關節勞氣咳嗽背膊悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛開寶遍身風疹肌中如麻豆惡癢腸風痔疾心腹結氣兩脅脹虛關膈壅塞甄權健脾開胃調五臟下氣止嘔逆消痰治反胃霍亂瀉痢消食破癥結痃癖五膈氣及肺氣水腫利大小腸除風明目炙熱熨痔腫大明泄肺氣除胸痞元素治裡急後重時珍發明元素曰枳殼破氣勝濕化痰泄肺走大腸多用損胸中至高之氣只可二三服而已稟受素壯而氣刺痛者看在何部經分以別經藥導之杲曰氣血弱者不可服以其損氣也好古曰枳殼主高枳實主下高者主氣下者主血故殼主胸膈皮毛之病實主心腹脾胃之病大同小異朱肱活人書言治痞宜先用桔梗枳殼湯非用此治心下痞也果知誤下氣將陷而成痞故先用此使不致於痞也若已成痞而用此則失之晚矣不惟不能消痞反損胸中之氣先之一字有謂也時珍曰枳實枳殼氣味功用俱同上世亦無分別魏晉以來始分實殼之用潔古張氏東垣李氏又分治高治下之說大抵其功皆能利氣氣下則痰喘止氣行則痞脹消氣通則痛刺止氣利則後重除故以枳殼利胸膈枳實利腸胃然張仲景治胸痹痞滿以枳實為要藥諸方治下血痔痢大腸秘塞裡急後重又以枳殼為通用則枳實不獨治下而殼不獨治高也蓋自飛門至魄門皆肺主之三焦相通一氣而已則二物分之可也不分亦無傷杜壬方載湖陽公主苦難產有方士進瘦胎散方用枳殼四兩甘草二兩為末每服一錢白湯點服自五月後一日一服至臨月不惟易產仍無胎中惡病也張潔古活法機要改以枳朮丸日服令胎瘦易生謂之束胎丸而寇宗奭衍義言胎壯則子有力易生令服枳殼藥反致無力兼子亦氣弱難養所謂縮胎易產者大不然也以理思之寇氏之說似覺為優或胎前氣盛壅滯者宜用之所謂八九月胎必用枳殼蘇梗以順氣胎前無滯則產後無虛也若氣稟弱者即大非所宜矣震享曰難產多見於鬱悶安逸之人富貴奉養之家古方瘦胎飲為湖陽公主作也予妹苦於難產其形肥而好坐予思此與公主正相反也彼奉養之人其氣必實故耗其氣使平則易產今形肥則氣虛久坐則氣不運當補其母之氣以紫蘇飲加補氣藥與十數貼服之遂快產附方舊三新十六傷寒呃噫枳殼半兩木香一錢為末每白湯服一錢未知再服本事方老幼腹脹血氣凝滯用此寬腸順氣名四炒丸商州枳殼厚而綠背者去穰四兩分作四分一兩用蒼朮一兩同炒一兩用蘿蔔子一兩同炒一兩用乾漆一兩同炒一兩用茴香一兩同炒黃去四味只取枳殼為末以四味煎汁煮麵糊和丸梧桐子大每食後米飲下五十丸王氏易簡方消積順氣治五積六聚不拘男婦老小但是氣積並皆治之乃仙傳方也枳殼三斤去穰每個入巴豆仁一個合定扎煮慢火水煮一日湯減再加熱湯勿用冷水待時足汁盡去巴豆切片曬乾勿炒為末醋煮麵糊丸梧子大每服三四十丸隨病湯使邵真人經驗方順氣止痢枳殼炒二兩四錢甘草六錢為末每沸湯服二錢嬰童百問疏導腳氣即上方用木瓜湯服直指方小兒秘澀枳殼煨去穰甘草各一錢以水煎服全幼心鑑腸風下血不拘遠年近日博濟方用枳殼燒黑存性五錢羊脛炭為末三錢和令勻五更空心米飲服如人行五里再一服當日見效簡便方用枳殼一兩黃連五錢水一鍾煎半鍾空心服痔瘡腫痛必效方用枳殼煨熟熨之七枚立定本事方用枳殼末入瓶中水煎百沸先熏後洗懷胎腹痛枳殼三兩麩炒黃芩一兩為粗末每服五錢水一盞半煎一盞服若脹滿身重加白朮一兩活法機要產後腸出不收枳殼煎湯浸之良久即入也袖珍方小兒驚風不驚丸治小兒因驚氣吐逆作搐痰涎壅塞手足掣瘲眼睛斜視枳殼去穰麩炒淡豆豉等分為末每服一字甚者半錢急驚薄荷自然汁下慢驚荊芥湯入酒三五點下日三服陳文中小兒方牙齒疼痛枳殼浸酒含漱聖惠方風疹作癢枳殼三兩麩炒為末每服二錢水一盞煎六分去滓溫服仍以汁塗經驗後方小兒軟癤大枳殼一個去白磨口平以麵糊抹邊合癤上自出膿血盡更無痕也危氏得效方利氣明目枳殼麩炒一兩為末點湯代茶普濟方下早成痞傷寒陰症下早成痞心下滿而不痛按之虛軟枳殼檳榔等分為末每服三錢黃連湯調下宣明方脅骨疼痛因驚傷肝者枳殼一兩麩炒桂枝生半兩為細末每服二錢薑棗湯下本事方枳茹樹皮也或云枳殼上刮下皮也主治中風身直不得屈伸反復及口僻眼斜刮皮一升酒三升漬一宿每溫服五合酒盡再作蘇頌樹莖及皮主水脹暴風骨節疼急弘景根皮主治浸酒漱齒痛甄權煮汁服治大便下血末服治野雞病有血藏器嫩葉主治煎湯代茶去風時珍出茶譜枸橘綱目釋名臭橘集解時珍曰枸橘處處有之樹葉並與橘同但干多刺三月開白花青蕊不香結實大如彈丸形如枳實而殼薄不香人家多收種為藩蘺亦或收小實偽充枳實及青橘皮售之不可不辨葉氣味辛溫無毒主治下痢膿血後重同萆薢等分炒存性研每茶調二錢服又治喉瘻消腫導毒時珍附方新一咽喉怪症咽喉生瘡層層如疊不痛日久有竅出臭氣廢飲食用臭橘葉煎湯連服必愈夏子益奇病方刺主治風蟲牙痛每以一合煎汁含之時珍橘核主治腸風下血不止同樗根白皮等分炒研每服一錢皂莢子煎湯調服時珍附方新一白疹瘙癢遍身者小枸橘細切麥麩炒黃為末每服二錢酒浸少時飲酒初以枸橘煎湯洗患處救急方樹皮主治中風強直不得屈伸細切一升酒二升浸一宿每日溫服半升酒盡再作時珍梔子本經中品釋名木丹本經越桃別錄鮮支綱目花名薝蔔時珍曰卮酒器也梔子象之故名俗作梔司馬相如賦云鮮支黃礫注云鮮支即支子也佛書稱其花為薝蔔謝靈運謂之林蘭曾端伯呼為禪友或曰薝蔔金色非梔子也集解別錄曰梔子生南陽川穀九月採實曝乾弘景曰處處有之亦兩三種小異以七稜者為良經霜乃取入染家用於藥甚稀頌曰今南方及西蜀州郡皆有之木高七八尺葉似李而厚硬又似樗蒲子二三月生白花花皆六出甚芬香俗說即西域薝蔔也夏秋結實如訶子狀生青熟黃中仁深紅南人競種以售利史記貨殖傳云卮茜千石與千戶侯等言獲利博也入藥用山梔子方書所謂越桃也皮薄而圓小刻房七稜至九稜者為佳其大而長者雷斅炮炙論謂之伏屍梔子入藥無力時珍曰梔子葉如兔耳厚而深綠春榮秋瘁入夏開花大如酒杯白瓣黃蕊隨即結實薄皮細子有須霜後收之蜀中有紅梔子花爛紅色其實染物則赭紅色修治斅曰凡使須要如雀腦並須長有九路赤色者為上先去皮須取仁以甘草水浸一宿漉出焙乾搗篩為末用震亨曰治上焦中焦連殼用下焦去殼洗去黃漿炒用治血病炒黑用好古曰去心胸中熱用仁去肌表熱用皮氣味苦寒無毒別錄曰大寒元素曰氣薄味厚輕清上行氣浮而味降陽中陰也杲曰沉也陰也入手太陰肺經血分丹書梔子柔金主治五內邪氣胃中熱氣面赤酒疱齇鼻白癩赤癩瘡瘍本經療目赤熱痛胸心大小腸大熱心中煩悶別錄去熱毒風除時疾熱解五種黃病利五淋通小便解消渴明目主中惡殺䗪蟲毒甄權解玉支毒弘景羊躑躅也主喑啞紫癜風孟詵治心煩懊憹不得眠臍下血滯而小便不利元素瀉三焦火清胃脘血治熱厥心痛解熱鬱行結氣震亨治吐血衄血血痢下血血淋損傷瘀血及傷寒勞復熱厥頭痛疝氣燙火傷時珍發明元素曰梔子輕飄而象肺色赤而象火故能瀉肺中之火其用有四心經客熱一也除煩躁二也去上焦虛熱三也治風四也震亨曰梔子瀉三焦之火及痞塊中火邪最清胃脘之血其性屈曲下行能降火從小便中泄去凡心痛稍久不宜溫散反助火邪故古方多用梔子以導熱藥則邪易伏而病易退好古曰本草不言梔子能吐仲景用為吐藥梔子本非吐藥為邪氣在上拒而不納食令上吐則邪因以出所謂其高者因而越之也或用為利小便藥實非利小便乃清肺也肺清則化行而膀胱津液之府得此氣化而出也本草言治大小腸熱乃辛與庚合又與丙合又能泄戊先入中州故也仲景治煩躁用梔子豉湯煩者氣也躁者血也氣主肺血主腎故用梔子以治肺煩香豉以治腎躁杲曰仲景以梔子色赤味苦入心而治煩香豉色黑味鹹入腎而治躁宗奭曰仲景治傷寒發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯治之因其虛故不用大黃有寒毒故也梔子雖寒而無毒治胃中熱氣既亡血亡津液腑臟無潤養內生虛熱非此物不可去也又治心經留熱小便赤澀用去皮梔子火煨大黃連翹炙甘草等分末之水煎三錢服無不利也頌曰張仲景及古今名醫治發黃皆用梔子茵陳甘草香豉四物作湯飲又治大病後勞復皆用梔子鼠矢等湯利小便而愈其方極多不可悉載附方舊十新十七鼻中衄血山梔子燒灰吹之屢用有效黎居士簡易方小便不通梔子仁十四個獨頭蒜一個滄鹽少許搗貼臍及囊良久即通普濟方血淋澀痛生山梔子末滑石等分蔥湯下經驗良方下利鮮血梔子仁燒灰水服一錢匕食療本草酒毒下血老山梔子仁焙研每新汲水服一錢匕聖惠方熱毒血痢梔子十四枚去皮搗末蜜丸梧桐子大每服三丸日三服大效亦可水煎服肘後方臨產下痢梔子燒研空心熱酒服一匙甚者不過五服勝金方婦人胎腫屬濕熱山梔子一合炒研每服二三錢米飲下丸服亦可丹溪方熱水腫疾山梔子仁炒研米飲服三錢若上焦熱者連殼用丹溪纂要霍亂轉筋心腹脹滿未得吐下梔子二七枚燒研熟酒服之立愈肘後方冷熱腹痛㽲刺不思飲食山梔子川烏頭等分生研為末酒糊丸如梧桐子大每服十五丸生薑湯下小腹痛茴香湯下博濟方胃脘火痛大山梔子七枚或九枚炒焦水一盞煎七分入生薑汁飲之立止復發者必不效用玄明粉一錢服立止丹溪纂要五臟諸氣益少陰血用梔子炒黑研末生薑同煎飲之甚捷丹溪纂要五屍疰病沖發心脅刺痛纏綿無時梔子三七枚燒末水服肘後方熱病食復及交接後發動欲死不能語梔子三十枚水三升煎一升服令微汗梅師方小兒狂躁蓄熱在下身熱狂躁昏迷不食梔子仁七枚豆豉五錢水一盞煎七分服之或吐或不吐立效閻孝忠集效方盤腸釣氣越桃仁半兩草烏頭少許同炒過去草烏入白芷一錢為末每服半錢茴香蔥白酒下普濟方赤眼腸秘山梔子七個鑽孔煨熟水一升煎半升去滓入大黃末三錢溫服普濟方吃飯直出梔子二十個微炒去皮水煎服怪症奇方風痰頭痛不可忍梔子末和蜜濃敷舌上吐即止兵部手集鼻上酒齇梔子炒研黃蠟和丸彈子大每服一丸嚼細茶下日二服忌酒麩煎炙許學士本事方火焰丹毒梔子搗和水塗之梅師方火瘡未起梔子仁燒研麻油和封之已成瘡燒白糖灰粉之千金方眉中練癬梔子燒研和油敷之保幼大全折傷腫痛梔子白麵同搗塗之甚效集簡方猘犬咬傷梔子皮燒研石硫黃等分為末敷之日三梅師方湯蕩火燒梔子末和雞子清濃掃之救急方花主治悅顏色千金翼面膏用之時珍附錄木戟藏器曰生山中葉如梔子味辛溫無毒主痃癖氣在臟腑酸棗本經上品釋名樲爾雅山棗集解別錄曰酸棗生河東川澤八月採實陰乾四十日成弘景曰今出東山間云即山棗樹子似武昌棗而味極酸東人啖之以醒睡與經文療不得眠正相反恭曰此即樲棗也樹大如大棗實無常形但大棗中味酸者是今醫以棘實為酸棗大誤矣藏器曰酸棗既是大棗中之酸此即是真棗何復名酸既名酸又云小今棗中酸者未必即小小者未必即酸惟嵩陽子云余家於滑臺今酸棗縣即滑之屬邑也其樹高數丈徑圍一二尺木理極細堅而且重可為車軸及匙箸等其樹皮亦細而硬紋似蛇鱗其棗圓小而味酸其核微圓而仁稍長色赤如丹此醫之所重居人不易得今市人賣者皆棘子也又云山棗樹如棘其子如生棗其核如骨其肉酸滑好食山人以當果頌曰今近汴洛及西北州郡皆有之野生多在坡阪及城壘間似棗木而皮細其木心赤色莖葉俱青花似棗花八月結實紫紅色似棗而圓小味酸當月採實取核中仁孟子曰養其樲棘是也嵩陽子言酸棗縣所出為真今之貨者皆是棘實用者尤宜詳辨志曰酸棗即棘實更非他物若云是大棗味酸者全非也酸棗小而圓其核中仁微扁其大棗仁大而長不相類也宗奭曰天下皆有之但以土產宜與不宜爾嵩陽子言酸棗木高大今貨者皆棘子此說未盡蓋不知小則為棘大則為酸棗平地則易長居崖塹則難生故棘多生崖塹上久不樵則成干人方呼為酸棗更不言棘其實一本也此物才及三尺便開花結子但科小者氣味薄木大者氣味厚今陝西臨潼山野所出亦好乃土地所宜也後有白棘條乃酸棗未長大時枝上刺也及至長成其實大其刺亦少故棗取大木棘取小科不必強分別焉酸棗氣味酸平無毒宗奭曰微熱時珍曰仁味甘氣平斅曰用仁以葉拌蒸半日去皮尖之才曰惡防己主治心腹寒熱邪結氣聚四肢痠痛濕痹久服安五臟輕身延年本經煩心不得眠臍上下痛血轉久泄虛汗煩渴補中益肝氣堅筋骨助陰氣能令人肥健別錄筋骨風炒仁研湯服甄權發明恭曰本經用實療不得眠不言用仁今方皆用仁補中益肝堅筋骨助陰氣皆酸棗仁之功也宗奭曰酸棗經不言用仁而今天下皆用之志曰按五代史後唐刊石藥驗云酸棗仁睡多生使不得睡炒熟陶云食之醒睡而經云療不得眠蓋其子肉味酸食之使不思睡核中仁服之療不得眠正如麻黃髮汗根節止汗也時珍曰酸棗實味酸性收故主肝病寒熱結氣酸痹久泄臍下滿痛之症其仁甘而潤故熟用療膽虛不得眠煩渴虛汗之症生用療膽熱好眠皆足厥陰少陽藥也今人專以為心家藥殊昧此理附方舊六新二膽風沉睡膽風毒氣虛實不調昏沉多睡用酸棗仁一兩生用金挺蠟茶二兩以生薑汁塗炙微焦為散每服二錢水七分煎六分溫服簡要濟眾方膽虛不眠心多驚悸聖惠方用酸棗仁一兩炒香搗為散每服二錢竹葉湯調下和劑局方加人參一兩辰砂半兩乳香二錢半煉蜜丸服振悸不眠胡洽方酸棗仁湯用酸棗仁二升茯苓白朮人參甘草各二兩生薑六兩水八升煮三升分服圖經虛煩不眠深師方酸棗仁湯用酸棗仁二升蝭母乾薑茯苓芎藭各二兩甘草炙一兩以水一斗先煮棗仁減三升乃同煮取三升分服圖經本草骨蒸不眠心煩用酸棗仁二兩水二盞研絞取汁下粳米二合煮粥候熟下地黃汁一合再煮勻食太平聖惠方睡中汗出酸棗仁人參茯苓等分為末每服一錢米飲下簡便方刺入肉中酸棗核燒末水服立出外臺秘要白棘本經中品校正併入別錄棘刺花釋名棘刺別錄棘針別錄赤龍爪綱目花名刺原別錄菥蓂別錄馬朐音劬時珍曰獨生而高者為棗列生而低者為棘故重朿為棗平朿為棘二物觀名即可辨矣朿即刺字菥蓂與大薺同名非一物也集解別錄曰白棘生雍州川穀棘刺花生道旁冬至後一百二十日採之四月採實當之曰白棘是酸棗樹針今人用天門冬苗代之非真也恭曰棘有赤白二種白棘莖白如粉子葉與赤棘同棘中時復有之亦為難得其刺當用白者為佳然刺有鉤直二種直者宜入補益鉤者宜療瘡腫花即其花更無別物天門冬一名顛棘南人以代棘針非矣頌曰棘有赤白二種切韻云棘小棗也田野間皆有之叢高三二尺花葉莖實俱似棗也宗奭曰本文白棘一名棘針棘刺如此分明諸家強生疑惑今不取之白棘乃是肥盛紫色枝上自有皺薄白膜先剝起者故白棘取白之義不過如此白棘氣味辛寒無毒主治心腹痛癰腫潰膿止痛本經決刺結療丈夫虛損陰痿精自出補腎氣益精髓棗針療腰痛喉痹不通別錄附方舊六新八小便尿血棘刺三升水五升煮二升分三服外臺秘要臍腹疼痛因腎臟虛冷拘撮甚者棘針鉤子一合焙檳榔二錢半水一盞煎五分入好酒半盞更煎三五沸分二服聖惠方頭風疼痛倒鉤棘針四十九個燒存性丁香一個麝香一皂子為末隨左右㗜鼻聖惠方眼睫拳毛赤龍爪倒鉤棘也一百二十個地龍二條木賊一百二十節木鱉子仁二個炒為末摘去睫毛每日以此㗜鼻三五次普濟方齲齒蟲食腐爛棘針二百枚即棗樹刺朽落地者水三升煮一升含漱或燒瀝日塗之後敷雄黃末即愈外臺秘要小兒喉痹棘針燒灰水服半錢聖惠方小兒口噤驚風不乳白棘燒末水服一錢聖惠方小兒丹毒水煮棘根汁洗之千金方癰疽痔漏方同上疔瘡惡腫棘針倒鉤爛者三枚丁香七枚同入瓶燒存性以月內孩子糞和塗日三上之又方曲頭棘刺三百枚陳橘皮二兩水五升煎一升半分服聖惠方諸腫有膿棘針燒灰水服一錢一夜頭出千金方小兒諸疳棘針瓜蒂等分為末吹入鼻中日三次聖惠方枝主治燒油塗發解垢䐈宗奭棘刺花別錄氣味苦平無毒主治金瘡內漏別錄實主治心腹痿痹除熱利小便別錄葉主治脛臁瘡搗敷之亦可曬研麻油調敷時珍蕤核蕤儒誰切本經上品釋名白桵音蕤時珍曰爾雅棫白桵即此也其花實蕤蕤下垂故謂之桵後人作蕤柞木亦名棫而物異集解別錄曰蕤核生函谷川谷及巴西弘景曰今出彭城大如烏豆形圓而扁有紋理狀似胡桃核今人皆合殼用此應破取仁秤之保升曰今出雍州樹生葉細似枸杞而狹長花白子附莖生紫赤色大如五味子莖多細刺五月六月熟採實曬乾頌曰今河東幷州亦有之木高五七尺莖間有刺時珍曰郭璞云白桵小木也叢生有刺實如耳璫紫赤可食即此也仁修治斅曰凡使蕤核仁以湯浸去皮尖掰作兩片每四兩用芒硝一兩木通草七兩同水煮一伏時取仁研膏入藥氣味甘溫無毒別錄曰微寒普曰神農雷公甘無毒生平地八月採之主治心腹邪結氣明目目赤痛傷淚出目腫眥爛久服輕身益氣不飢本經強志明耳目吳普破心下結痰痞氣齆鼻別錄治鼻衄甄權生治足睡熟治不眠藏器發明弘景曰醫方惟以療眼仙經以合守中丸也頌曰按劉禹錫傳信方所著治眼法最奇云眼風淚癢或生翳或赤眥一切皆主之宣州黃連末蕤核仁去皮研膏等分和勻取無蚛干棗二枚割下頭去核以二物填滿卻以割下頭合定用少薄綿裹之以大茶碗量水半碗於銀器中文武火煎取一雞子大以綿濾罐收點眼萬萬不失前後試驗數十人皆應今醫家亦多用得效也附方新七春雪膏治肝虛風熱上攻眼目昏暗癢痛隱澀赤腫羞明不能遠視迎風有淚多見黑花用蕤仁去皮壓去油二兩腦子二錢半研勻生蜜六錢和收點眼和劑局方百點膏治一切眼疾蕤仁去油三錢甘草防風各六錢黃連五錢以三味熬取濃汁次下蕤仁膏日點孫氏集效方撥雲膏取下翳膜蕤仁去油五分青鹽一分豬胰子五錢共搗二千下如泥罐收點之又方蕤仁一兩去油入白硼砂一錢麝香二分研勻收之去翳妙不可言飛血眼蕤仁一兩去皮細辛半兩苦竹葉三握洗水二升煎一升濾汁頻微溫洗之聖濟總錄赤爛眼近效方用蕤仁四十九個去皮胡粉煅如金色一雞子大研勻入酥一杏仁許龍腦三豆許研勻油紙裹收每以麻子許塗大小眥上頻用取效經驗良方用蕤仁杏仁各一兩去皮研勻入膩粉少許為丸每用熱湯化洗山茱萸本經中品釋名蜀酸棗本經肉棗綱目鬾實別錄雞足吳普鼠矢吳普宗奭曰山茱萸與吳茱萸甚不相類治療大不同未審何緣命此名也時珍曰本經一名蜀酸棗今人呼為肉棗皆象形也集解別錄曰山茱萸生漢中山谷及琅琊冤句東海承縣九月十月採實陰乾頌曰葉如梅有刺毛二月開花如杏四月實如酸棗赤色五月採實弘景曰出近道諸山中大樹子初熟未乾赤色如胡頹子亦可啖既干皮甚薄當合核用也頌曰今海州兗州亦有之木高丈餘葉似榆花白色雷斅炮炙論言一種雀兒蘇真相似只是核八稜不入藥用時珍曰雀兒蘇即胡頹子也實修治斅曰凡使以酒潤去核取皮一斤只取四兩以來緩火熬干方用能壯元氣秘精其核能滑精不可服氣味酸平無毒別錄曰微溫普曰神農黃帝雷公扁鵲酸無毒岐伯辛權曰咸辛大熱好古曰陽中之陰入足厥陰少陰經氣分之才曰蓼實為之使惡桔梗防風防己主治心下邪氣寒熱溫中逐寒濕痹去三蟲久服輕身本經腸胃風邪寒熱疝瘕頭風風氣去來鼻塞目黃耳聾面皰下氣出汗強陰益精安五臟通九竅止小便利久服明目強力長年別錄治腦骨痛療耳鳴補腎氣興陽道堅陰莖添精髓止老人尿不節治面上瘡能發汗止月水不定甄權暖腰膝助水臟除一切風逐一切氣破癥結治酒渣大明溫肝元素發明好古曰滑則氣脫澀劑所以收之山茱萸止小便利秘精氣取其味酸澀以收滑也仲景八味丸用之為君其性味可知矣附方新一草還丹益元陽補元氣固元精壯元神乃延年續嗣之至藥也山茱萸酒浸取肉一斤破故紙酒浸焙乾半斤當歸四兩麝香一錢為末煉蜜丸梧桐子大每服八十一丸臨臥鹽酒下吳旻扶壽方胡頹子拾遺釋名蒲頹子綱目盧都子綱目雀兒酥炮炙半含春綱目黃婆奶時珍曰陶弘景注山茱萸及櫻桃皆言似胡頹子凌冬不凋亦應益人陳藏器又于山茱萸下詳註之別無識者今考訪之即雷斅炮炙論所謂雀兒酥也雀兒喜食之越人呼為蒲頹子南人呼為盧都子吳人呼為半含春言早熟也襄漢人呼為黃婆奶象乳頭也劉績霏雪錄言安南有小果紅色名盧都子則盧都乃蠻語也集解藏器曰胡頹子生平林間樹高丈餘冬不凋葉陰白冬花春熟最早小兒食之當果又有一種大相似冬凋春實夏熟人呼為木半夏無別功效時珍曰胡頹即盧都子也其樹高六七尺其枝柔軟如蔓其葉微似棠梨長狹而尖面青背白俱有細點如星老則星起如麩經冬不凋春前生花朵如丁香蒂極細倒垂正月乃敷白花結實小長儼如山茱萸上亦有細星斑點生青熟紅立夏前採食酸澀核亦如山茱萸但有八稜軟而不堅核內白綿如絲中有小仁其木半夏樹葉花實及星斑氣味並與盧都同但枝強硬葉微團而有尖其實圓如櫻桃而不長為異耳立夏後始熟故吳楚人呼為四月子亦曰野櫻桃其核亦八稜大抵是一類二種也子氣味酸平無毒弘景曰寒熱病不可用主治止水痢藏器根氣味同子主治煎湯洗惡瘡疥並犬馬瘑瘡藏器吐血不止煎水飲之喉痹痛塞煎酒灌之皆效時珍葉氣味同子主治肺虛短氣喘咳劇者取葉焙研米飲服二錢時珍發明時珍曰蒲頹葉治喘咳方出中藏經云甚者亦效如神云有人患喘三十年服之頓愈甚者服藥後胸上生小癮疹作癢則瘥也虛甚加人參等分名清肺散大抵皆取其酸澀收斂肺氣耗散之功耳金櫻子蜀本草釋名刺梨子開寶山石榴綱目山雞頭子時珍曰金櫻當作金罌謂其子形如黃罌也石榴雞頭皆象形又杜鵑花小檗併名山石榴非一物也斅曰林檎向裡子亦曰金櫻子與此同名而異物集解韓保升曰金櫻子在處有之花白子形似榲桲而小色黃有刺方術多用之頌曰今南中州郡多有而以江西劍南嶺外者為勝叢生郊野中大類薔薇有刺四月開白花夏秋結實亦有刺黃赤色形似小石榴十一月十二月採江南蜀中人熬作煎酒服云補治有殊效宜州所供云本草謂之營實今校之與營實殊別也時珍曰山林間甚多花最白膩其實大如指頭狀如石榴而長其核細碎而有白毛如營實之核而味甚澀子氣味酸澀平無毒主治脾泄下痢止小便利澀精氣久服令人耐寒輕身蜀本發明頌曰洪州昌州皆煮其子作煎寄饋人服食家用煎和雞頭實粉為丸服名水陸丹益氣補真最佳慎微曰沈存中筆談云金櫻子止遺泄取其溫且澀也世人待紅熟時取汁熬膏味甘全斷澀味都全失本性大誤也惟當取半黃者干搗末用之宗奭曰九月十月霜熟時採用不爾反令人利震亨曰經絡隧道以通暢為平和而昧者取澀性為快熬金櫻為煎食之自不作靖咎將誰執時珍曰無故而服之以取快欲則不可若精氣不固者服之何咎之有附方舊一新二金櫻子煎霜後用竹夾子摘取入木臼中杵去刺擘去核以水淘洗過搗爛入大鍋水煎不得絕火煎減半濾過仍煎似稀餳每服一匙用暖酒一盞調服活血駐顏其功不可備述孫真人食忌補血益精金櫻子即山石榴去刺及子焙四兩縮砂二兩為末煉蜜和丸梧桐子大每服五十丸空心溫酒服奇效良方久痢不止嚴緊絕妙方罌粟殼醋炒金櫻花葉及子等分為末蜜丸芡子大每服五七丸陳皮煎湯化下普濟方花氣味同子主治止冷熱痢殺寸白蛔蟲等和鐵粉研勻拔白髮塗之即生黑者亦可染須大明葉主治癰腫嫩葉研爛入少鹽塗之留頭泄氣又金瘡出血五月五日採同桑葉苧葉等分陰乾研末敷之血止口合名軍中一捻金時珍東行根氣味同子主治寸白蟲銼二兩入糯米三十粒水二升煎五合空心服須臾瀉下神驗其皮炒用止瀉血及崩中帶下大明止滑痢煎醋服化骨鯁時珍郁李本經下品釋名薁李詩疏郁李車下李別錄爵李本經雀梅詩疏常棣時珍曰郁山海經作栯馥郁也花實俱香故以名之陸機詩疏作薁字非也爾雅常棣即此或以為唐棣誤矣唐棣乃枎栘白楊之類也集解別錄曰郁李生高山川穀及丘陵上五月六月採根弘景曰山野處處有之子熟赤色亦可啖保升曰樹高五六尺葉花及樹並似大李惟子小若櫻桃甘酸而香有少澀味也禹錫曰按郭璞云棣樹生山中子如櫻桃可食詩小雅云常棣之華鄂不韡韡陸機注云白棣樹也如李而小正白今官園種之一名薁李又有赤棣樹亦似白棣葉如刺榆葉而微圓子正赤如郁李而小五月始熟關西天水隴西多有之宗奭曰郁李子如御李子紅熟堪啖微澀亦可蜜煎陝西甚多時珍曰其花粉紅色實如小李頌曰今汴洛人家園圃植一種枝莖作長條花極繁密而多葉者亦謂之郁李不堪入藥核仁修治斅曰先以湯浸去皮尖用生蜜浸一宿漉出陰乾研如膏用之氣味酸平無毒權曰苦辛元素曰辛苦陰中之陽脾經氣分藥也主治大腹水腫面目四肢浮腫利小便水道本經腸中結氣關格不通甄權通泄五臟膀胱急痛宣腰胯冷膿消宿食下氣大明破癖氣下四肢水酒服四十九粒能瀉結氣孟詵破血潤燥元素專治大腸氣滯燥澀不通李杲研和龍腦點赤眼宗奭發明時珍曰郁李仁甘苦而潤其性降故能下氣利水按宋史錢乙傳云一乳婦因悸而病既愈目張不得瞑乙曰煮郁李酒飲之使醉即愈所以然者目系內連肝膽恐則氣結膽橫不下郁李能去結隨酒入膽結去膽下則目能瞑矣此蓋得肯䏿之妙者也頌曰必效方療癖取車下李仁湯潤去皮及並仁者與乾麵相拌搗如餅若干入水少許作麵餅大小一如病人掌為二餅微炙使黃勿令至熟空腹食一餅當快利如不利更食一餅或飲熱米湯以利為度利不止以醋飯止之利後當虛若病未盡一二日量力更進一服以病盡為限不得食酪及牛馬肉等累試神驗但須量病輕重以意加減小兒亦可用附方舊三新二小兒多熱熟湯研郁李仁如杏酪一日服二合姚和眾至寶方小兒閉結襁褓小兒大小便不通並驚熱痰實欲得溏動者大黃酒浸炒郁李仁去皮研各一錢滑石末一兩搗和丸黍米大二歲小兒三丸量人加減白湯下錢乙直訣腫滿氣急不得臥用郁李仁一大合搗末和麵作餅吃入口即大便通泄氣便愈楊氏產乳腳氣浮腫心腹滿大小便不通氣急喘息者郁李仁十二分搗爛水研絞汁薏苡搗如粟大三合同煮粥食之韋宙獨行方猝心痛刺郁李仁三七枚嚼爛以新汲水或溫湯下須臾痛止卻熱呷薄鹽湯姚和眾至寶方皮膚血汗郁李仁去皮研一錢鵝梨搗汁調下聖濟總錄根氣味酸涼無毒主治齒齦腫齲齒堅齒本經去白蟲別錄治風蟲牙痛濃煎含漱治小兒身熱作湯浴之大明宣結氣破積聚甄權鼠李本經下品釋名楮李錢氏鼠梓別錄山李子圖經牛李別錄皂李蘇恭趙李蘇恭牛皂子綱目烏槎子綱目烏巢子圖經椑音卑時珍曰鼠李方音亦作楮李未詳名義可以染綠故俗稱皂李及烏巢巢槎趙皆皂子之音訛也一種苦楸亦名鼠梓與此不同見梓下集解別錄曰鼠李生田野採無時頌曰即烏巢子也今蜀川多有之枝葉如李其實若五味子色瑿黑其汁紫色熟時採曬乾用皮採無時宗奭曰即牛李也木高七八尺葉如李但狹而不澤子於條上四邊生生時青熟則紫黑色至秋葉落子尚在枝是處皆有今關陝及湖南江南北甚多時珍曰生道路邊其實附枝如穗人採其嫩者取汁刷染綠色子氣味苦涼微毒主治寒熱瘰癧瘡本經水腫腹脹滿大明下血及碎肉除疝瘕積冷九蒸酒漬服三合日再服又搗敷牛馬六畜瘡中生蟲蘇恭痘瘡黑陷及疥癬有蟲時珍發明時珍曰牛李治痘瘡黑陷及出不快或觸穢氣黑陷古昔無知之者惟錢乙小兒直訣必勝膏用之云牛李子即鼠李子九月後採黑熟者入砂盆擂爛生絹捩汁用銀石器熬成膏瓷瓶收貯常令透風每服一皂子大煎桃膠湯化下如人行二十里再進一服其瘡自然紅活入麝香少許尤妙如無生者以乾者為末水熬成膏又九籥衛生方亦云痘瘡黑陷者用牛李子一兩炒研桃膠半兩每服一錢水七分煎四分溫服附方新二諸瘡寒熱毒痹及六畜蟲瘡鼠李生搗敷之聖惠方齒䘌腫痛牛李煮汁空腹飲一盞仍頻含漱聖濟錄皮氣味苦微寒無毒恭曰皮子俱有小毒忌鐵主治身皮熱毒別錄風痹大明諸瘡寒熱毒痹蘇恭口疳齲齒及疳蟲蝕人脊骨者煮濃汁灌之神良孟詵發明頌曰劉禹錫傳信方治大人口中疳瘡發背萬不失一用山李子根一名牛李子薔薇根野外者各細切五升水五大斗煎半日汁濃即於銀銅器中盛之重湯煎至一二升待稠瓷瓶收貯每稍稍含咽必瘥忌醬醋油膩熱面及肉如發背以帛塗貼之神效襄州軍事柳岸妻竇氏患口疳十五年齒盡落齦亦斷壞不可近用此而愈女貞本經上品釋名貞木山海經冬青綱目蠟樹時珍曰此木凌冬青翠有貞守之操故以貞女狀之琴操載魯有處女見女貞木而作歌者即此也晉蘇彥女貞頌序云女貞之木一名冬青負霜蔥翠振柯凌風故清士欽其質而貞女慕其名是矣別有冬青與此同名今方書所用冬青皆此女貞也近時以放蠟蟲故俗呼為蠟樹集解別錄曰女貞實生武陵川穀立冬採弘景曰諸處時有葉茂盛凌冬不凋皮青肉白與秦皮為表裡其樹以冬生可愛仙方亦服食之俗方不復用人無識者恭曰女貞葉似冬青樹及枸骨其實九月熟黑似牛李子陶言與秦皮為表裡誤矣秦皮葉細冬枯女貞葉大冬茂殊非類也頌曰女貞處處有之山海經云泰山多貞木是也其葉似枸骨及冬青木凌冬不凋五月開細花青白色九月實成似牛李子或云即今冬青樹也而冬青木理肌白紋如象齒實亦治病嶺南一種女貞花極繁茂而深紅色與此殊異不聞入藥時珍曰女貞冬青枸骨三樹也女貞即今俗呼蠟樹者冬青即今俗呼凍青樹者枸骨即今俗呼貓兒刺者東人因女貞茂盛亦呼為冬青與冬青同名異物蓋一類二種爾二種皆因子自生最易長其葉厚而柔長綠色面青背淡女貞葉長者四五寸子黑色凍青葉微團子紅色為異其花皆繁子並累累滿樹冬月鸜鵒喜食之木肌皆白膩今人不知女貞但呼為蠟樹立夏前後取蠟蟲之種子裹置枝上半月其蟲化出延緣枝上造成白蠟民間大獲其利詳見虫部白蠟下枸骨詳本條實氣味苦平無毒時珍曰溫主治補中安五臟養精神除百病久服肥健輕身不老本經強陰健腰膝變白髮明目時珍發明時珍曰女貞實乃上品無毒妙藥而古方罕知用者何哉典術云女貞木乃少陰之精故冬不落葉觀此則其益腎之功尤可推矣世傳女貞丹方云女貞實即冬青樹子去梗葉酒浸一日夜布袋擦去皮曬乾為末待旱蓮草出多取數石搗汁熬濃和丸梧桐子大每夜酒送百丸不旬日間膂力加倍老者即不夜起又能變白髮為黑色強腰膝起陰氣附方新二虛損百病久服發白再黑返老還童用女貞實十月上巳日收陰乾用時以酒浸一日蒸透曬乾一斤四兩旱蓮草五月收陰乾十兩為末桑椹子三月收陰乾十兩為末煉蜜丸如梧桐子大每服七八十丸淡鹽湯下若四月收桑椹搗汁和藥七月收旱蓮搗汁和藥即不用蜜矣簡便方風熱赤眼冬青子不以多少搗汁熬膏淨瓶收固埋地中七日每用點眼濟急仙方葉氣味微苦平無毒主治除風散血消腫定痛治頭目昏痛諸惡瘡腫胻瘡潰爛久者以水煮乘熱貼之頻頻換易米醋煮亦可口舌生瘡舌腫脹出搗汁含浸吐涎時珍附方新三風熱赤眼普濟方用冬青葉五斗搗汁浸新磚數片五日掘坑架磚於內蓋之日久生霜刮下入腦子少許點之簡便方用雅州黃連二兩冬青葉四兩水浸三日夜熬成膏收點眼一切眼疾冬青葉研爛入朴硝貼之海上方也普濟方冬青綱目校正原附女貞下今分出釋名凍青藏器曰冬月青翠故名冬青江東人呼為凍青集解藏器曰冬青木肌白有紋作象齒笏其葉堪染緋李邕云冬青出五臺山葉似椿子赤如郁李微酸性熱與此小異當是兩種冬青時珍曰凍青亦女貞別種也山中時有之但以葉微團而子赤者為凍青葉長而子黑者為女貞按救荒本草云凍青樹高丈許樹似枸骨子樹而極茂盛又葉似楂子樹葉而小亦似椿葉微窄而頭頗圓不尖五月開細白花結子如豆大紅色其嫩芽炸熟水浸去苦味淘洗五味調之可食子及木皮氣味甘苦涼無毒主治浸酒去風虛補益肌膚皮之功同藏器附方新一痔瘡冬至日取凍青樹子鹽酒浸一夜九蒸九曬瓶收每日空心酒吞七十粒臥時再服集簡方葉主治燒灰入面膏治皸瘃滅瘢痕殊效蘇頌枸骨綱目校正原附女貞下今分出釋名貓兒刺藏器曰此木肌白如狗之骨時珍曰葉有五刺如貓之形故名又衛矛亦名枸骨與此同名集解藏器曰枸骨樹如杜仲詩云南山有枸是也陸機詩疏云山木也其狀如櫨木理白滑可為函板有木虻在葉中卷之如子羽化為虻頌曰多生江浙間南人取以旋盒器甚佳時珍曰狗骨樹如女貞肌理甚白葉長二三寸青翠而厚硬有五刺角四時不凋五月開細白花結實如女貞及菝葜子九月熟時緋紅色皮薄味甘核有四瓣人採其木皮煎膏以黏鳥雀謂之黏黐木皮氣味微苦涼無毒主治浸酒補腰腳令健藏器枝葉氣味同皮主治燒灰淋汁或煎膏塗白癜風藏器衛矛本經中品釋名鬼箭別錄神箭時珍曰劉熙釋名言齊人謂箭羽為衛此物乾有直羽如箭羽矛刃自衛之狀故名張揖廣雅謂之神箭寇宗奭衍義言人家多燔之遣祟則三名又或取此義也集解別錄曰衛矛生霍山山谷八月採陰乾普曰葉如桃箭如羽正月二月七月採陰乾或生田野弘景曰山野處處有之削取皮羽入藥為用甚稀頌曰今江淮州郡亦或有之三月以後生莖莖長四五尺許其干有三羽狀如箭翎羽葉似山茶青色八月十一月十二月採條莖陰乾其木亦名狗骨宗奭曰所在山谷皆有平陸未嘗見也葉絕少其莖黃褐色若柏皮三面如鋒刃人家多燔之遣祟方藥少用時珍曰鬼箭生山石間小株成叢春長嫩條條上四面有羽如箭羽視之若三羽爾青葉狀似野茶對生味酸澀三四月開碎花黃綠色結實大如冬青子山人不識惟樵採之斅曰凡使勿用石茆根頭真相似只是上葉不同味各別耳修治斅曰採得只使箭頭用拭去赤毛以酥拌緩炒每一兩用酥二錢半氣味苦寒無毒普曰神農黃帝桐君苦無毒大明曰甘澀權曰有小毒主治女子崩中下血腹滿汗出除邪殺鬼毒蠱疰本經中惡腹痛去白蟲消皮膚風毒腫令陰中解別錄療婦人血氣大效馬志破陳血能落胎主百邪鬼魅甄權通月經破癥結止血崩帶下殺腹臟蟲及產後血絞腹痛大明發明頌曰古方崔氏療惡疰在心痛不可忍有鬼箭羽湯姚僧坦集驗方療猝暴心痛或中惡氣毒痛大黃湯亦用之並大方也見外臺秘要千金諸書中時珍曰凡婦人產後血暈血結血聚於胸中或偏於少腹或連於脅肋者四物湯四兩倍當歸加鬼箭紅花玄胡索各一兩為末煎服附方新三產後敗血兒枕塊硬疼痛發歇及新產乘虛風寒內搏惡露不快臍腹堅脹當歸散用當歸炒鬼箭去中心木紅藍花各一兩每服三錢酒一大盞煎七分食前溫服和劑局方鬼瘧日發鬼箭羽鯪鯉甲燒灰各二錢半為末每以一字發時㗜鼻又法鬼箭羽末一分砒霜一錢五靈脂一兩為末發時冷水服一錢並聖濟總錄山礬綱目釋名芸香音云椗花音定柘花柘音鄭瑒花音暢春桂俗七里香時珍曰芸盛多也老子曰夫物芸芸是也此物山野叢生甚多而花繁香馥故名按周必大云柘音陣出南史荊俗訛柘為鄭呼為鄭礬而江南又訛鄭為瑒也黃庭堅云江南野中碇花極多野人採葉燒灰以染紫為黝不借礬而成子因以易其名為山礬集解時珍曰山礬生江淮湖蜀野中樹之大者株高丈許其葉似梔子葉生不對節光澤堅強略有齒凌冬不凋三月開花繁白如雪六出黃蕊甚芬香結子大如椒青黑色熟則黃色可食其葉味澀人取以染黃及收豆腐或雜入茗中按沈括筆談云古人藏書闢蠹用芸香謂之芸草即今之七里香也葉類豌豆作小叢生啜嗅之極芬香秋間葉上微白如粉汙闢蠹殊驗又按蒼頡解詁云芸香似邪蒿可食闢紙蠹許慎說文云芸似苜蓿成公綏芸香賦云莖類秋竹枝象青松郭義恭廣志有芸香膠杜陽編云芸香草也出於闐國其香潔白如玉入土不朽元載造芸暉堂以此為屑塗壁也據此數說則芸香非一種沈氏指為七里香者不知何據所云葉類豌豆啜嗅芬香秋間有粉者亦與今之七里香不相類狀頗似烏藥葉恐沈氏亦自臆度爾曾端伯以七里香為玉蕊花未知的否葉氣味酸澀微甘無毒主治久痢止渴殺蚤蠹用三十片同老薑三片浸水蒸熱洗爛弦風眼時珍梫木拾遺集解藏器曰梫木生江東林筤間樹如石榴葉細高丈餘四月開花白如雪時珍曰此木今無識者其狀頗近山礬恐古今稱謂不同爾姑附其後氣味苦平無毒主治破產後血煮汁服之其葉煎汁洗瘡癬搗研封蛇傷藏器南燭宋開寶釋名南天燭圖經南燭草木隱訣男續同上染菽同上猴菽草同上草木之王同上惟那木同上牛筋拾遺烏飯草日華墨飯草綱目楊桐綱目赤者名文燭時珍曰南燭諸名多不可解藏器曰取汁漬米作烏飯食之健如牛筋故曰牛筋集解藏器曰南燭生高山經冬不凋頌曰今惟江東州郡有之株高三五尺葉類苦楝而小凌冬不凋冬生紅子作穗人家多植庭除間俗謂之南天燭不拘時採枝葉用陶隱居登真隱訣載太極真人青精乾石𩛓飯法云其種是木而似草故號南燭草木一名男續一名猴藥一名後卓一名惟那木一名草木之王凡有八名各從其邦域所稱而正號是南燭也生嵩高少室抱犢雞頭山江左吳越至多土人名曰猴菽或曰染菽粗與真名相彷彿也此木至難長初生三四年狀若菘菜之屬亦頗似梔子二三十年乃成大株故曰木而似草也其子如茱萸九月熟酸美可食葉不相對似茗而圓厚味小酢冬夏常青枝莖微紫大者亦高四五丈而甚肥脆易摧折也作飯之法見谷部青精乾石𩛓飯下時珍曰南燭吳楚山中甚多葉似山礬光滑而味酸澀七月開小白花結實如朴樹子成簇生青九月熟則紫色內有細子其味甘酸小兒食之按古今詩話云即楊桐也葉似冬青而小臨水生者尤茂寒食採其葉漬水染飯色青而光能資陽氣又沈括筆談云南燭草木本草及傳記所說多端人少識者北人多誤以烏臼為之全非矣今人所謂南天燭是矣莖如蒴藋有節高三四尺廬山有盈丈者南方至多葉微似楝而小秋則實赤如丹枝葉氣味苦平無毒時珍曰酸澀主治止泄除睡強筋益氣力久服輕身長年令人不飢變白卻老藏器發明頌曰孫思邈千金月令方南燭煎益髭發及容顏兼補暖三月三日採葉並蕊子入大淨瓶中干盛以童子小便浸滿瓶固濟其口置閒處經一周年取開每用一匙溫酒調服一日二次極有效驗上元寶經曰子服草木之王氣與神通子食青燭之精命不復殞附方舊二一切風疾久服輕身明目黑髮駐顏用南燭樹春夏取枝葉秋冬取根皮細銼五斤水五斗慢火煎取二斗去滓淨鍋慢火煎如稀飴瓷瓶盛之每溫酒服一匙日三服一方入童子小便同煎聖惠方誤吞銅鐵不下用南燭根燒研熟水調服一錢即下聖惠方子氣味酸甘平無毒主治強筋骨益氣力固精駐顏時珍青精飯見谷部五加本經上品釋名五佳綱目五花炮炙論文章草綱目白刺綱目追風使圖經木骨圖經金鹽仙經豺漆本經豺節別錄時珍曰此藥以五葉交加者良故名五加又名五花楊慎丹鉛錄作五佳云一枝五葉者佳故也蜀人呼為白刺譙周巴蜀異物志名文章草有贊云文章作酒能成其味以金買草不言其貴是矣本草豺漆豺節之名不知取何義也頌曰蘄州人呼為木骨吳中俗名追風使集解別錄曰五加皮五葉者良生漢中及冤句五月七月採莖十月採根陰乾弘景曰近道處處有之東間彌多四葉者亦好頌曰今江淮湖南州郡皆有之春生苗莖葉俱青作叢赤莖又似藤蔓高三五尺上有黑刺葉生五叉作簇者良四葉三葉者最多為次每一葉下生一刺三四月開白花結細青子至六月漸黑色根若荊根皮黃黑肉白色骨堅硬一說今有數種汴京北地者大片類秦皮黃柏輩平直如板而色白絕無氣味療風痛頗效余無所用吳中乃剝野椿根皮為五加柔韌而無味殊為乖失今江淮所生者根類地骨皮輕脆芬香其苗莖有刺類薔薇長者至丈餘葉五出香氣如橄欖春時結實如豆粒而扁青色得霜乃紫黑俗但名為追風使以漬酒療風乃不知其為真五加皮也今江淮吳中往往以為藩蘺正似薔薇金櫻輩而北間多不知用此種斅曰五加皮樹本是白楸樹其上有葉如蒲葉三花者是雄五花者是雌陽人使陰陰人使陽剝皮陰乾機曰生南地者類草故小生北地者類木故大時珍曰春月於舊枝上抽條葉山人採為蔬茹正如枸杞生北方沙地者皆木類南方堅地者如草類也唐時惟取峽州者充貢雷氏言葉如蒲者非也根皮同莖氣味辛溫無毒之才曰遠志為之使惡玄參蛇皮主治心腹疝氣腹痛益氣療躄小兒三歲不能行疽瘡陰蝕本經男子陰痿囊下濕小便餘瀝女人陰癢及腰脊痛兩腳疼痹風弱五緩虛羸補中益精堅筋骨強志意久服輕身耐老別錄破逐惡風血四肢不遂賊風傷人軟腳䐴腰主多年瘀血在皮肌治痹濕內不足甄權明目下氣治中風骨節攣急補五勞七傷大明釀酒飲治風痹四肢攣急蘇頌作末浸酒飲治目僻眼𥍃雷斅葉作蔬食去皮膚風濕大明發明弘景曰煮根莖釀酒飲益人道家用此作灰煮石與地榆並有秘法慎微曰東華真人煮石經云昔有西域真人王屋山人王常云何以得長久何不食石蓄金鹽母何以得長壽何不食石用玉豉玉豉地榆也金鹽五加也皆是煮石而餌得長生之藥也昔孟綽子董士固相與言云寧得一把五加不用金玉滿車寧得一斤地榆不用明月寶珠又昔魯定公母服五加酒以致不死尸解而去張子聲楊建始王叔才於世彥等皆服此酒而房室不絕得壽三百年亦可為散以代湯茶王君云五加者五車星之精也水應五湖人應五德位應五方物應五車故青精入莖則有東方之液白氣入節則有西方之津赤氣入華則有南方之光玄精入根則有北方之飴黃煙入皮則有戊己之靈五神鎮生相轉育成餌之者真仙服之者反嬰時珍曰五加治風濕痿痹壯筋骨其功良深仙家所述雖若過情蓋獎辭多溢亦常理爾造酒之方用五加根皮洗淨去骨莖葉亦可以水煎汁和曲釀米酒成時時飲之亦可煮酒飲加遠志為使更良一方加木瓜煮酒服談野翁試驗方云神仙煮酒法用五加皮地榆刮去粗皮各一斤袋盛入無灰好酒二斗中大壇封固安大鍋內文武火煮之壇上安米一合米熟為度取出火毒以渣曬乾為丸每旦服五十丸藥酒送下臨臥再服能去風濕壯筋骨順氣化痰添精補髓久服延年益老功難盡述王綸醫論云風病飲酒能生痰火惟五加一味浸酒日飲數杯最有益諸浸酒藥惟五加與酒相合且味美也附方舊二新六虛勞不足五加皮枸杞根白皮各一斗水一石五斗煮汁七斗分取四斗浸曲一斗以三斗拌飯如常釀酒法待熟任飲千金方男婦腳氣骨節皮膚腫濕疼痛服此進飲食健氣力不忘事名五加皮丸五加皮四兩酒浸遠志去心四兩酒浸並春秋三日夏二日冬四日曬乾為末以浸酒為糊丸梧桐子大每服四五十丸空心溫酒下藥酒壞別用酒為糊薩謙齋瑞竹堂方小兒行遲三歲不能行者用此便走五加皮五錢牛膝木瓜二錢半為末每服五分米飲入酒二三點調服全幼心鑑婦人血勞憔悴困倦喘滿虛煩吸吸少氣發熱多汗口乾舌澀不思飲食名血風勞油煎散用五加皮牡丹皮赤芍藥當歸各一兩為末每用一錢水一盞用青錢一文蘸油入藥煎七分溫服常服能肥婦人太平惠民和劑局方五勞七傷五月五日採五加莖七月七日採葉九月九日取根治下篩每酒服方寸匕日三服久服去風勞千金目中息肉五加皮不聞水聲者搗末一升和酒二升浸七日一日服二次禁醋二七日遍身生瘡是毒出不出以生熟湯浴之取瘡愈千金方服石毒發或熱不禁多向冷地臥五加皮二兩水四升煮二升半發時便服外臺秘要火灶丹毒從兩腳起赤如火燒五加根葉燒灰五兩取煅鐵家槽中水和塗之楊氏產乳枸杞地骨皮本經上品釋名枸檵爾雅音計本經作枸忌枸棘衍義苦杞詩疏甜菜圖經天精抱朴地骨本經地輔本經地仙日華卻暑別錄羊乳別錄仙人杖別錄西王母杖時珍曰枸杞二樹名此物棘如枸之刺莖如杞之條故兼名之道書言千載枸杞其形如犬故得枸名未審然否頌曰仙人杖有三種一是枸杞一是菜類葉似苦苣一是枯死竹竿之色黑者也集解別錄曰枸杞生常山平澤及諸丘陵阪岸頌曰今處處有之春生苗葉如石榴葉而軟薄堪食俗呼為甜菜其莖幹高三五尺作叢六月七月生小紅紫花隨便結紅實形微長如棗核其根名地骨詩小雅云集於苞杞陸機詩疏云一名苦杞春生作羹茹微苦其莖似莓其子秋熟正赤莖葉及子服之輕身益氣今人相傳謂枸杞與枸棘二種相類其實形長而枝無刺者真枸杞也圓而有刺者枸棘也不堪入藥馬志注溲疏條云溲疏有刺枸杞無刺以此為別溲疏亦有巨骨之名如枸杞之名地骨當亦相類用之宜辨或云溲疏以高大者為別是不然也今枸杞極有高大者入藥尤神良宗奭曰枸杞枸棘徒勞分別凡杞未有無刺者雖大至於成架尚亦有棘但此物小則刺多大則刺少正如酸棗與棘其實一物也時珍曰古者枸杞地骨取常山者為上其他丘陵阪岸者皆可用後世惟取陝西者良而又以甘州者為絕品今陝之蘭州靈州九原以西枸杞並是大樹其葉厚根粗河西及甘州者其子圓如櫻桃曝乾緊小少核干亦紅潤甘美味如葡萄可作果食異於他處者沈存中筆談亦言陝西極邊生者高丈餘大可作柱葉長數寸無刺根皮如厚朴則入藥大抵以河西者為上也種樹書言收子及掘根種於肥壤中待苗生剪為蔬食甚佳氣味枸杞苦寒無毒別錄曰根大寒子微寒無毒冬採根春夏採葉秋採莖實權曰枸杞甘平子葉同宗奭曰枸杞當用梗皮地骨當用根皮子當用紅實其皮寒根大寒子微寒今人多用其子為補腎藥是未曾考竟經意當量其虛實冷熱用之時珍曰今考本經只云枸杞不指是根莖葉子別錄乃增根大寒子微寒字似以枸杞為苗而甄氏藥性論乃云枸杞甘平子葉皆同似以枸杞為根寇氏衍義又以枸杞為梗皮皆是臆說按陶弘景言枸杞根實為服食家用西河女子服枸杞法根莖葉花實俱採用則本經所列氣味主治蓋通根苗花實而言初無分別也後世以枸杞子為滋補藥地骨皮為退熱藥始歧而二之竊謂枸杞苗葉味苦甘而氣涼根味甘淡氣寒子味甘氣平氣味既殊則功用當別此後人發前人未到之處者也主治枸杞主五內邪氣熱中消渴周痹風濕久服堅筋骨輕身不老耐寒暑本經下胸脅氣客熱頭痛補內傷大勞噓吸強陰利大小腸別錄補精氣諸不足易顏色變白明目安神令人長壽甄權發明時珍曰此乃通指枸杞根苗花實並用之功也其單用之功今列於下苗氣味苦寒權曰甘平時珍曰甘涼伏砒砂主治除煩益志補五勞七傷壯心氣去皮膚骨節間風消熱毒散瘡腫大明和羊肉作羹益人除風明目作飲代茶止渴消熱煩益陽事解面毒與乳酪相惡汁注目中去風障赤膜昏痛甄權去上焦心肺客熱時珍地骨皮修治斅曰凡使根掘得以東流水浸刷去土捶去心以熟甘草湯浸一宿焙乾氣味苦寒別錄曰大寒權曰甘平時珍曰甘淡寒杲曰苦平寒升也陰也好古曰入足少陰手少陽經制硫黃丹砂主治細銼拌麵煮熟吞之去腎家風益精氣甄權去骨熱消渴孟詵解骨蒸肌熱消渴風濕痹堅筋骨涼血元素治在表無定之風邪傳屍有汗之骨蒸李杲瀉腎火降肺中伏火去胞中火退熱補正氣好古治上膈吐血煎湯嗽口止齒血治骨槽風吳瑞治金瘡神驗陳承去下焦肝腎虛熱時珍枸杞子修治時珍曰凡用揀淨枝梗取鮮明者洗淨酒潤一夜搗爛入藥氣味苦寒權曰甘平主治堅筋骨耐老除風去虛勞補精氣孟詵主心病嗌乾心痛渴而引飲腎病消中好古滋腎潤肺榨油點燈明目時珍發明弘景曰枸杞葉作羹小苦俗諺云去家千里勿食蘿摩枸杞此言二物補益精氣強盛陰道也枸杞根實為服食家用其說甚美名為仙人之杖遠有旨乎頌曰莖葉及子服之輕身益氣淮南枕中記載西河女子服枸杞法正月上寅採根二月上卯治服之三月上辰採莖四月上巳治服之五月上午採其葉六月上未治服之七月上申採花八月上酉治服之九月上戌採子十月上亥治服之十一月上子採根十二月上醜治服之又有花實根莖葉作煎或單榨子汁煎膏服之者其功並同世傳蓬萊縣南丘村多枸杞高者一二丈其根盤結甚固其鄉人多壽考亦飲食其水土之氣使然又潤州開元寺大井旁生枸杞歲久土人目為枸杞井云飲其水甚益人也斅曰其根似物形狀者為上時珍曰按劉禹錫枸杞井詩云僧房藥樹依寒井井有清泉藥有靈翠黛葉生籠石甃殷紅子熟照銅瓶枝繁本是仙人杖根老能成瑞犬形上品功能甘露味還知一勺可延齡又續仙傳云朱孺子見溪側二花犬逐入於枸杞叢下掘之得根形如二犬烹而食之忽覺身輕周密浩然齋日抄云宋徽宗時順州築城得枸杞於土中其形如獒狀馳獻闕下乃仙家所謂千歲枸杞其形如犬者據前數說則枸杞之滋益不獨子而根亦不止於退熱而已但根苗子之氣味稍殊而主治亦未必無別蓋其苗乃天精苦甘而涼上焦心肺客熱者宜之根乃地骨甘淡而寒下焦肝腎虛熱者宜之此皆三焦氣分之藥所謂熱淫於內瀉以甘寒也至於子則甘平而潤性滋而補不能退熱只能補腎潤肺生精益氣此乃平補之藥所謂精不足者補之以味也分而用之則各有所主兼而用之則一舉兩得世人但知用黃芩黃連苦寒以治上焦之火黃柏知母苦寒以治下焦陰火謂之補陰降火久服致傷元氣而不知枸杞地骨甘寒平補使精氣充而邪火自退之妙惜哉予嘗以青蒿佐地骨退熱屢有殊功人所未喻者兵部尚書劉松石諱天和麻城人所集保壽堂方載地仙丹云昔有異人赤腳張傳此方於猗氏縣一老人服之壽百餘行走如飛發白反黑齒落更生陽事強健此藥性平常服能除邪熱明目輕身春採枸杞葉名天精草夏採花名長生草秋採子名枸杞子冬採根名地骨皮並陰乾用無灰酒浸一夜曬露四十九晝夜取日精月華氣待乾為末煉蜜丸如彈子大每早晚各用一丸細嚼以隔夜百沸湯下此藥採無刺味甜者其有刺者服之無益附方舊十新二十三枸杞煎治虛勞退虛熱輕身益氣令一切癰疽永不發用枸杞三十斤春夏用莖葉秋冬用根實以水一石煮取五斗以滓再煮取五斗澄清去滓再煎取二斗入鍋煎如餳收之每早酒服一合千金方金髓煎枸杞子逐日摘紅熟者不拘多少以無灰酒浸之蠟紙封固勿令泄氣兩月足取入沙盆中擂爛濾取汁同浸酒入銀鍋內慢火熬之不住手攪恐黏住不勻候成膏如餳淨瓶密收每早溫酒服二大匙夜臥再服百日身輕氣壯積年不輟可以羽化也經驗方枸杞酒外臺秘要云補虛去勞熱長肌肉益顏色肥健人治肝虛沖感下淚用生枸杞子五升搗破絹袋盛浸好酒二斗中密封勿泄氣二七日服之任性勿醉經驗後方枸杞酒變白耐老輕身用枸杞子二升十月壬癸日面東採之以好酒二升瓷瓶內浸三七日乃添生地黃汁三升攪勻密封至立春前三十日開瓶每空心暖飲一盞至立春後髭發卻黑勿食蕪荑蔥蒜四神丸治腎經虛損眼目昏花或云翳遮睛甘州枸杞子一斤好酒潤透分作四分四兩用蜀椒一兩炒四兩用小茴香一兩炒四兩用芝麻一兩炒四兩用川楝肉一兩炒揀出枸杞加熟地黃白朮白茯苓各一兩為末煉蜜丸日服瑞竹堂方肝虛下淚枸杞子二升絹袋盛浸一斗酒中密封三七日飲之千金方目赤生翳枸杞子搗汁日點三五次神驗肘後方面𪒟皯皰枸杞子十斤生地黃三斤為末每服方寸匕溫酒下日三服久則童顏聖惠方注夏虛病枸杞子五味子研細滾水泡封三日代茶飲效攝生方地骨酒壯筋骨補精髓延年耐老枸杞根生地黃甘菊花各一斤搗碎以水一石煮取汁五斗炊糯米五斗細曲拌勻入甕如常封釀待熟澄清日飲三盞聖濟總錄虛勞客熱枸杞根為末白湯調服有痼疾人勿服千金方骨蒸煩熱及一切虛勞煩熱大病後煩熱並用地仙散地骨皮二兩防風一兩甘草炙半兩每用五錢生薑五片水煎服濟生方熱勞如燎地骨皮二兩柴胡一兩為末每服二錢麥門冬湯下聖濟總錄虛勞苦渴骨節煩熱或寒用枸杞根白皮切五升麥門冬三升小麥二升水二斗煮至麥熟去滓每服一升口渴即飲千金方腎虛腰痛枸杞根杜仲萆薢各一斤好酒三斗漬之罌中密封鍋中煮一日飲之任意千金方吐血不止枸杞根子皮為散水煎日日飲之聖濟總錄小便出血新地骨皮洗淨搗自然汁無汁則以水煎汁每服一盞入酒少許食前溫服簡便方帶下脈數枸杞根一斤生地黃五斤酒一斗煮五升日日服之千金方天行赤目暴腫地骨皮三斤水三斗煮三升去滓入鹽一兩取二升頻頻洗點隴上謝道人天竺經風蟲牙痛枸杞根白皮煎醋漱之蟲即出亦可煎水飲肘後方口舌糜爛地骨皮湯治膀胱移熱於小腸上為口糜生瘡潰爛心胃壅熱水穀不下用柴胡地骨皮各三錢水煎服之東垣蘭室秘藏小兒耳疳生於耳後腎疳也地骨皮一味煎湯洗之仍以香油調末搽之高文虎蓼花洲閒錄氣瘻疳瘡多年不愈者應效散又名托裡散用地骨皮冬月者為末每用紙捻蘸入瘡內頻用自然生肉更以米飲服二錢一日三服外科精義男子下疳先以漿水洗之後搽地骨皮末生肌止痛衛生寶鑑婦人陰腫或生瘡枸杞根煎水頻洗永類方十三種疔春三月上建日採葉名天精夏三月上建日採枝名枸杞秋三月上建日採子名卻老冬三月上建日採根名地骨並曝乾為末如不得依法採但得一種亦可用緋繒一片裹藥牛黃一梧桐子大反鉤棘針三七枚赤小豆七粒為末先於繒上鋪亂髮一雞子大乃鋪牛黃等末卷作團以髮束定熨斗中炒令沸沸定刮搗為末以一方寸匕合前枸杞末二匕空心酒服二錢半日再服千金方癰疽惡瘡膿血不止地骨皮不拘多少洗淨刮去粗皮取細白穰以粗皮同骨煎湯洗令膿血盡以細穰貼之立效有一朝士腹脅間病疽經歲或以地骨皮煎湯淋洗出血一二升家人懼欲止之病者曰疽似少快更淋之用五升許血漸淡乃止以細穰貼之次日結痂愈唐慎微本草瘭疽出汁著手足肩背累累如赤豆用枸杞根葵根葉煮汁煎如飴隨意服之千金方足趾雞眼作痛作瘡地骨皮同紅花研細敷之次日即愈閨閣事宜火赫毒瘡此患急防毒氣入心腹枸杞葉搗汁服立瘥肘後方目澀有翳枸杞葉二兩車前葉一兩挼汁以桑葉裹懸陰地一夜取汁點之不過三五度十便良方五勞七傷庶事衰弱枸杞葉半斤切粳米二合豉汁和煮作粥日日食之良經驗後方澡浴除病正月一日二月二日三月三日四月四日以至十二月十二日皆用枸杞葉煎湯洗澡令人光澤百病不生洞天保生錄溲疏本經下品釋名巨骨別錄集解別錄曰溲疏生熊耳川穀及田野故丘墟地四月採當之曰溲疏一名楊櫨一名牡荊一名空疏皮白中空時時有節子似枸杞子冬月熟赤色味甘苦末代乃無識者此非人籬垣之楊櫨也恭曰溲疏形似空疏樹高丈許白皮其子八九月熟赤色似枸杞必兩兩相對味苦與空疏不同空疏即楊櫨其子為莢不似溲疏志曰溲疏枸杞雖則相似然溲疏有刺枸杞無刺以此為別頌曰溲疏亦有巨骨之名如枸杞之名地骨當亦相類方書鮮用宜細辨之機曰按李當之但言溲疏子似枸杞子不曾言樹相似馬志因其子相似遂謂樹亦相似以有刺無刺為別蘇頌又因巨骨地骨之名疑其相類殊不知枸杞未嘗無刺但小則刺多大則刺少耳本草中異物同名甚多況一骨字之同耶以此為言尤見穿鑿時珍曰汪機所斷似矣而自亦不能的指為何物也氣味辛寒無毒別錄曰苦微寒之才曰漏盧為之使主治皮膚中熱除邪氣止遺溺利水道本經除胃中熱下氣可作浴湯別錄時珍曰按孫真人千金方治婦人下焦三十六疾承澤丸中用之楊櫨唐本草集解恭曰楊櫨一名空疏所在皆有生籬垣間其子為莢葉氣味苦寒有毒主治疽瘻惡瘡水煮汁洗之立瘥唐本木耳見菜部石南本經下品釋名風藥時珍曰生於石間向陽之處故名石南桂陽呼為風藥充茗及浸酒飲能愈頭風故名按範石湖集云修江出欒茶治頭風今南人無所謂欒茶者豈即此物耶集解別錄曰石南生華陰山谷三月四月採葉八月採實陰乾弘景曰今東間皆有之葉如枇杷葉方用亦稀恭曰葉似䒽草凌冬不凋關中者葉細為好江山以南者葉長大如枇杷葉無氣味殊不任用保升曰終南斜谷有石處甚饒今市人以石葦為之誤矣頌曰今南北皆有之生於石上株極有高大者江湖間出者葉如枇杷上有小刺凌冬不凋春生白花成簇秋結細紅實關隴間出者葉似莽草青黃色背有紫點雨多則並生長及二三寸根橫細紫色無花實葉至茂密南北人多移植亭院間陰翳可愛不透日氣入藥以關中葉細者為良魏王花木志云南方石南樹野生二月開花連著實實如燕覆子八月熟民採取核和魚羹尤美今無用者宗奭曰石南葉似枇杷葉之小者而背無毛光而不皺正二月間開花冬有二葉為花苞苞既開中有十五餘花大小如椿花甚細碎每一苞約彈許大成一球一花六葉一朵有七八球淡白綠色葉末微淡赤色花既開蕊滿花但見蕊不見花花才罷去年綠葉盡脫落漸生新葉京洛河北河東山東頗少人故少用湖南北江東西二浙甚多故人多用葉氣味辛苦平有毒之才曰五加皮為使惡小薊主治養腎氣內傷陰衰利筋骨皮毛本經療腳弱五臟邪氣除熱女子不可久服令思男別錄能添腎氣治軟腳煩悶疼殺蟲逐諸風甄權浸酒飲治頭風時珍發明恭曰石南葉為療風邪丸散之要今醫家不復用其實矣權曰雖能養腎亦令人陰痿時珍曰古方為治風痹腎弱要藥今人絕不知用識者亦少蓋由甄氏藥性論有令陰痿之說也殊不知服此藥者能令腎強嗜欲之人藉此放恣以致痿弱歸咎於藥良可慨也毛文錫茶譜云湘人四月採楊桐草搗汁浸水蒸作為飯食必採石南芽為茶飲乃去風也暑月尤宜楊桐即南燭也附方新三鼠瘻不合石南生地黃茯苓黃連雌黃等分為散日再敷之肘後方小兒通睛小兒誤跌或打著頭腦受驚肝系受風致瞳仁不正觀東則見西觀西則見東宜石南散吹鼻通頂石南一兩藜蘆三分瓜丁五七個為末每吹少許入鼻一日三度內服牛黃平肝藥普濟方乳石發動煩熱石南葉為末新汲水服一錢聖惠方實一名鬼目主治殺蠱毒破積聚逐風痹本經牡荊別錄上品校正併入別錄有名未用荊莖釋名黃荊圖經小荊本經楚弘景曰既是牡荊不應有子小荊應是牡荊牡荊子大於蔓荊子而反呼小荊恐以樹形為言不知蔓荊樹亦高大也恭曰牡荊作樹不為蔓生故稱為牡非無實之謂也蔓荊子大牡荊子小故呼小荊時珍曰古者刑杖以荊故字從刑其生成叢而疏爽故又謂之楚從林從匹匹即疏字也濟楚之義取此荊楚之地因多產此而名也集解別錄曰牡荊實生河間南陽冤句山谷或平壽都鄉高岸上及田野中八月九月採實陰乾弘景曰論蔓荊即應是今作杖棰之荊其子殊細正如小麻子色青黃牡荊乃出北方如烏豆大正圓黑仙術多用牡荊今人都無識者李當之藥錄言溲疏一名楊櫨一名牡荊理白中虛斷植即生按今溲疏主療與牡荊都不同形類乖異而仙方用牡荊云能通神見鬼非惟其實枝葉並好又云荊樹必枝葉相對者是牡荊不對者即非牡荊也並莫詳虛實更須博訪恭曰牡荊即作棰杖者所在皆有之實細黃色莖勁作樹生漢書郊祀志以牡荊莖為幡竿則明知非蔓荊也有青赤二種以青者為佳今人相承多以牡荊為蔓荊此極誤也頌曰牡荊今眉州蜀州及近汴京亦有之俗名黃荊是也枝莖堅勁作科不作蔓葉如蓖麻更疏瘦花紅作穗實細而黃如麻子大或云即小荊也按陶隱居登真隱訣云荊木之葉花通神見鬼精注云荊有三種荊木即今作棰杖者葉香亦有花子子不入藥方術則用牡荊其子入藥北人無識其木者天監三年天子將合神仙飯奉敕論牡荊曰荊花白多子子粗大歷歷疏生不過三兩莖多不能圓或扁或異或多似竹節葉與余荊不殊蜂多采牡荊牡荊汁冷而甜余荊被燒則煙火氣苦牡荊體慢汁實煙火不入其中主治心風第一於時遠近尋覓遂不值也保升曰陶氏不惟不別蔓荊亦不識牡荊蔓荊蔓生牡荊樹生理自明矣時珍曰牡荊處處山野多有樵採為薪年久不樵者其樹大如碗也其木心方其枝對生一枝五葉或七葉葉如榆葉長而尖有鋸齒五月杪間開花成穗紅紫色其子大如胡荽子而有白膜皮裹之蘇頌云葉似蓖麻者誤矣有青赤二種青者為荊赤者為楛嫩條皆可為筥囤古者貧婦以荊為釵即此二木也按裴淵廣州記云荊有三種金荊可作枕紫荊可作床白荊可作履與他處牡荊蔓荊全異寧浦有牡荊指病自愈節不相當者月暈時刻之與病人身齊等置床下病雖危亦無害也杜寶拾遺錄云南方林邑諸地在海中山中多金荊大者十圍盤屈瘤蹙紋如美錦色如真金工人用之貴如沉檀此皆荊之別類也春秋運鬥樞云玉衡星散而為荊實氣味苦溫無毒時珍曰辛溫之才曰防風為之使惡石膏主治除骨間寒熱通利胃氣止咳逆下氣別錄得柏實青葙術療風之才炒焦為末飲服治心痛及婦人白帶震亨用半升炒熟入酒一盞煎一沸熱服治小腸疝氣甚效浸酒飲治耳聾時珍附方新一濕痰白濁牡荊子炒為末每酒服二錢集簡方葉氣味苦寒無毒主治久痢霍亂轉筋血淋下部瘡濕䘌薄腳主腳氣腫滿別錄發明崔元亮海上集驗方治腰腳風濕痛蒸法用荊葉不限多少蒸令熟熱置大甕中其下著火溫之以病人置葉中須臾當汗出蒸時旋旋吃飯稍倦即止便以被蓋避風仍進蔥豉酒及豆酒並得以瘥為度時珍曰蒸法雖妙只宜施之野人李仲南永類方云治腳氣諸病用荊莖於壇中燒煙熏湧泉穴及痛處使汗出則愈此法貴賤皆可用者又談野翁試驗方治毒蛇望板歸螫傷滿身洪腫發泡用黃荊嫩頭搗汁塗泡上渣盦咬處即消此法乃出於葛洪肘後方治諸蛇以荊葉搗爛袋盛薄於腫上者也物類相感志云荊葉逼蚊附方舊一新一九竅出血荊葉搗汁酒和服二合千金方小便尿血荊葉汁酒服二合千金方根氣味甘苦平無毒時珍曰苦微辛主治水煮服治心風頭風肢體諸風解肌發汗別錄發明時珍曰牡荊苦能降辛溫能散降則化痰散則祛風故風痰之病宜之其解肌發汗之功世無知者按王氏奇方云一人病風數年予以七葉黃荊根皮五加根皮接骨草等分煎湯日服遂愈蓋得此意也荊莖別錄有名未用云八月十月採陰乾藏器曰即今荊杖也煮汁堪染主治灼爛別錄洗灼瘡及熱焱瘡有效藏器同荊芥蓽茇煎水漱風牙痛時珍附方新一青盲內障春初取黃荊嫩頭九蒸九曝半斤用烏雞一隻以米飼五日安淨板上飼以大麻子二三日收糞曝乾入瓶內熬黃和荊頭為末煉蜜丸梧桐子大每服十五丸至二十丸陳米飲下日二聖濟總錄荊瀝修治時珍曰取法用新採荊莖截尺五長架於兩磚上中間燒火炙之兩頭以器承取熱服或入藥中又法截三四寸長束入瓶中仍以一瓶合住固外以糠火煨燒其汁瀝入下瓶中亦妙氣味甘平無毒主治飲之去心悶煩熱頭風旋暈目眩心頭瀁瀁欲吐猝失音小兒心熱驚癇止消渴除痰唾令人不睡藏器除風熱開經絡導痰涎行血氣解熱痢時珍發明時珍曰荊瀝氣平味甘化痰去風為妙藥故孫思邈千金翼云凡患風人多熱常宜以竹瀝荊瀝薑汁各五合和勻熱服以瘥為度陶弘景亦云牡荊汁治心風為第一延年秘錄云熱多用竹瀝寒多用荊瀝震亨曰二汁同功並以薑汁助送則不凝滯但氣虛不能食者用竹瀝氣實能食者用荊瀝附方舊六新一中風口噤荊瀝每服一升範汪方頭風頭痛荊瀝日日服之集驗方喉痹瘡腫荊瀝細細嚥之或以荊一握水煎服之千金翼目中猝痛燒荊木取黃汁點之肘後方心虛驚悸羸瘦者荊瀝二升火煎至一升六合分作四服日三夜一小品方赤白下痢五六年者荊瀝每日服五合外臺秘要濕瘑瘡癬荊木燒取汁日塗之深師方蔓荊本經上品釋名恭曰蔓荊苗蔓生故名集解恭曰蔓荊生水濱苗莖蔓延長丈餘春因舊枝而生小葉五月葉成似杏葉六月有花紅白色黃蕊九月有實黑斑大如梧子而虛輕冬則葉凋今人誤以小荊為蔓荊遂將蔓荊為牡荊也大明曰海鹽亦有之大如豌豆蒂有輕軟小蓋子六七八月採之頌曰近汴京及秦隴明越州多有之苗莖高四五尺對節生枝葉類小楝至夏盛茂有花作穗淡紅色蕊黃白色花下有青萼至秋結子舊說蔓生而今所有並非蔓也宗奭曰諸家所解蔓荊牡荊紛糺不一經既言蔓荊明是蔓生即非高木也既言牡荊則自木上生又何疑焉時珍曰其枝小弱如蔓故曰蔓生實修治斅曰凡使去蒂子下白膜一重用酒浸一伏時蒸之從巳至未曬乾用時珍曰尋常只去膜打碎用之氣味苦微寒無毒別錄曰辛平溫元素曰味辛溫氣清陽中之陰入太陽經胃虛人不可服恐生痰疾之才曰惡烏頭石膏主治筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲久服輕身耐老小荊實亦等本經風頭痛腦鳴目淚出益氣令人光澤脂致別錄治賊風長髭發甄權利關節治癇疾赤眼大明太陽頭痛頭沉昏悶除目暗散風邪涼諸經血止目睛內痛元素搜肝風好古發明恭曰小荊實即牡荊子其功與蔓荊同故曰亦等也時珍曰蔓荊氣清味辛體輕而浮上行而散故所主者皆頭面風虛之症附方新三令髮長黑蔓荊子熊脂等分醋調塗之聖惠方頭風作痛蔓荊子一升為末絹袋盛浸一斗酒中七日溫飲三合日三次千金方乳癰初起蔓荊子炒為末酒服方寸匕渣敷之危氏得效方欒荊唐本草釋名頑荊圖經集解恭曰欒荊莖葉都似石南干亦反捲經冬不死葉上有細黑點者真也今雍州所用者是而洛州乃用石荊當之非也俗方大用而本草不載亦無別名但有欒華功用又別非此物花也頌曰欒荊今生東海及淄州汾州所生者皆枝莖白葉小圓而青色頗似榆葉而長冬夏不凋六月開花花有紫白二種子似大麻四月採苗葉八月採子宗奭曰欒荊即牡荊也子青色如茱萸不合更立此條蘇恭又稱石荊當之轉見穿鑿時珍曰按許慎說文云欒似木蘭木蘭葉似桂與蘇恭所說葉似石南者相近蘇頌所圖者即今牡荊與唐本草者不合欒荊是蘇恭收入本草不應自誤蓋後人不識遂以牡荊充之寇氏亦指為牡荊耳子氣味辛苦溫有小毒權曰甘辛微熱無毒決明為之使惡石膏主治大風頭面手足諸風癲癇狂痙濕痹寒冷疼痛唐本四肢不遂通血脈明目益精光甄權合桕油同熬塗人畜瘡疥蘇頌石荊拾遺集解藏器曰石荊似荊而小生水旁廣濟方一名水荊是也蘇頌言洛人以當欒荊者非也主治燒灰淋汁浴頭生髮令長藏器紫荊宋開寶校正併入拾遺紫珠釋名紫珠拾遺皮名肉紅綱目內消時珍曰其木似黃荊而色紫故名其皮色紅而消腫故瘍科呼為肉紅又曰內消與何首烏同名集解頌曰紫荊處處有之人多種於庭院間木似黃荊葉小無丫花深紫可愛藏器曰即田氏之荊也至秋子熟正紫圓如小珠名紫珠江東林澤間尤多宗奭曰春開紫花甚細碎共作朵生出無常處或生於木身之上或附根上枝下直出花花罷葉出光緊微圓園圃多植之時珍曰高樹柔條其花甚繁歲二三次其皮入藥以川中厚而紫色味苦如膽者為勝木並皮氣味苦平無毒藏器曰苦寒大明曰皮梗及花氣味功用並同主治破宿血下五淋濃煮汁服開寶通小腸大明解諸毒物癰疽喉痹飛屍蠱毒腫下瘻蛇虺蟲蠶狂犬毒並煮汁服亦以汁洗瘡腫除血長膚藏器活血行氣消腫解毒治婦人血氣疼痛經水凝澀時珍發明時珍曰紫荊氣寒味苦色紫性降入手足厥陰血分寒勝熱苦走骨紫入營故能活血消腫利小便而解毒楊清叟仙傳方有沖和膏以紫荊為君蓋亦得此意也其方治一切癰疽發背流注諸腫毒冷熱不明者紫荊皮炒三兩獨活去節炒三兩赤芍藥炒二兩生白芷一兩木蠟炒一兩為末用蔥湯調熱敷血得熱則行蔥能散氣也瘡不甚熱者酒調之痛甚者加乳香筋不伸者亦加乳香大抵癰疽流注皆是氣血凝滯所成遇溫則散遇涼則凝此方溫平紫荊皮乃木之精破血消腫獨活乃土之精止風動血引拔骨中毒去痹濕氣芍藥乃火之精生血止痛木蠟乃水之精消腫散血同獨活能破石腫堅硬白芷乃金之精去風生肌止痛蓋血生則不死血動則流通肌生則不爛痛止則不焮風去則血自散氣破則硬可消毒自除五者交治病安有不愈者乎附方新九婦人血氣紫荊皮為末醋糊丸櫻桃大每酒化服一丸熊氏補遺鶴膝風攣紫荊皮三錢老酒煎服日二次直指方傷眼青腫紫荊皮小便浸七日曬研用生地黃汁薑汁調敷不腫用蔥汁永類方猘犬咬傷紫荊皮末沙糖調塗留口退腫口中仍嚼咽杏仁去毒仙傳外科鼻中疳瘡紫荊花陰乾為末貼之衛生易簡方發背初生一切癰疽皆治單用紫荊皮為末酒調箍住自然撮小不開內服柞木飲子乃救貧良劑也仙傳外科癰疽未成用白芷紫荊皮等分為末酒調服外用紫荊皮木蠟赤芍藥等分為末酒調作箍藥同上痔瘡腫痛紫荊皮五錢新水食前煎服直指方產後諸淋紫荊皮五錢半酒半水煎溫服熊氏補遺木槿日華釋名椴音徒亂切櫬音襯蕣音舜日及綱目朝開暮落花綱目藩籬草綱目花奴王蒸時珍曰此花朝開暮落故名日及曰槿曰蕣猶僅榮一瞬之義也爾雅云椴木槿櫬木槿郭璞注云別二名也或云白曰椴赤曰櫬齊魯謂之王蒸言其美而多也詩云顏如舜華即此集解宗奭曰木槿花如小葵淡紅色五葉成一花朝開暮斂湖南北人家多種植為籬障花與枝兩用時珍曰槿小木也可種可插其木如李其葉末尖而有丫齒其花小而豔或白或粉紅有單葉千葉者五月始開故逸書月令云仲夏之月木槿榮是也結實輕虛大如指頭秋深自裂其中子如榆莢泡桐馬兜鈴之仁種之易生嫩葉可茹作飲代茶今瘍醫用皮治瘡癬多取川中來者厚而色紅皮並根氣味甘平滑無毒大明曰涼主治止腸風瀉血痢後熱渴作飲服之令人得睡並炒用藏器治赤白帶下腫痛疥癬洗目令明潤燥活血時珍發明時珍曰木槿皮及花並滑如葵花故能潤燥色如紫荊故能活血川中來者氣厚力優故尤有效附方新六赤白帶下槿根皮二兩切以白酒一碗半煎一碗空心服之白帶用紅酒甚妙纂要奇方頭面錢癬槿樹皮為末醋調重湯頓如膠內敷之王仲勉經效方牛皮風癬川槿皮一兩大風子仁十五個半夏五錢銼河水井水各一碗浸露七宿入輕粉一錢入水中禿筆掃塗覆以青衣數日有臭涎出妙忌浴澡夏月用尤妙扶壽方癬瘡有蟲川槿皮煎入肥皂浸水頻頻擦之或以槿皮浸汁磨雄黃尤妙簡便方痔瘡腫痛藩蘺草根煎湯先熏後洗直指方大腸脫肛槿皮或葉煎湯熏洗後以白礬五倍末敷之救急方花氣味同皮主治腸風瀉血赤白痢並焙入藥作湯代茶治風大明消瘡腫利小便除濕熱時珍附方新三下痢噤口紅木槿花去蒂陰乾為末先煎麵餅二個蘸末食之趙宜真濟急方風痰擁逆木槿花曬乾焙研每服一二匙空心沸湯下白花尤良簡便方反胃吐食千葉白槿花陰乾為末陳糯米湯調送三五口不轉再服袖珍方子氣味同皮主治偏正頭風燒煙燻患處又治黃水膿瘡燒存性豬骨髓調塗之時珍扶桑綱目釋名佛桑霏雪錄朱槿草木狀赤槿同日及時珍曰東海日出處有扶桑樹此花光豔照日其葉似桑因以比之後人訛為佛桑乃木槿別種故日及諸名亦與之同集解時珍曰扶桑產南方乃木槿別種其枝柯柔弱葉深綠微澀如桑其花有紅黃白三色紅者尤貴呼為朱槿嵇含草木狀云朱槿一名赤槿一名日及出高涼郡花莖葉皆如桑其葉光而厚木高四五尺而枝葉婆娑其花深紅色五出大如蜀葵重敷柔澤有蕊一條長於花葉上綴金屑日光所爍疑若焰生一叢之上日開數百朵朝開暮落自二月始至中冬乃歇插枝即活葉及花氣味甘平無毒主治癰疽腮腫取葉或花同白芙蓉葉牛蒡葉白蜜研膏敷之即散時珍木芙蓉綱目校正併入圖經地芙蓉釋名地芙蓉圖經木蓮綱目華木綱目杹木音化拒霜時珍曰此花豔如荷花故有芙蓉木蓮之名八九月始開故名拒霜俗呼為杹皮樹相如賦謂之華木注云皮可為索也蘇東坡詩云喚作拒霜猶未稱看來卻是最宜霜蘇頌圖經本草有地芙蓉云出鼎州九月採葉治瘡腫蓋即此物也集解時珍曰木芙蓉處處有之插條即生小木也其干叢生如荊高者丈許其葉大如桐有五尖及七尖者冬凋夏茂秋半始著花花類牡丹芍藥有紅者白者黃者千葉者最耐寒而不落不結實山人取其皮為索川廣有添色拒霜花初開白色次日稍紅又明日則深紅先後相間如數色霜時採花霜後採葉陰乾入藥葉並花氣味微辛平無毒主治清肺涼血散熱解毒治一切大小癰疽腫毒惡瘡消腫排膿止痛時珍發明時珍曰芙蓉花並葉氣平而不寒不熱味微辛而性滑涎黏其治癰腫之功殊有神效近時瘍醫秘其名為清涼膏清露散鐵箍散皆此物也其方治一切癰疽發背乳癰惡瘡不拘已成未成已穿未穿並用芙蓉葉或根皮或花或生研或乾研末以蜜調塗於腫處四圍中間留頭干則頻換初起者即覺清涼痛止腫消已成者即膿聚毒出已穿者即膿出易斂妙不可言或加生赤小豆末尤妙附方新十久咳羸弱九尖拒霜葉為末以魚鮓蘸食屢效危氏得效方赤眼腫痛芙蓉葉末水和貼太陽穴名清涼膏鴻飛集經血不止拒霜花蓮蓬殼等分為末每用米飲下二錢婦人良方偏墜作痛芙蓉葉黃柏各三錢為末以木鱉子仁一個磨醋調塗陰囊其痛自止簡便方杖瘡腫痛芙蓉花葉研末入皂角末少許雞子清調塗之方廣附余癰疽腫毒重陽前取芙蓉葉研末端午前取蒼耳燒存性研末等分蜜水調塗四圍其毒自不走散名鐵井闌簡便方疔瘡惡腫九月九日採芙蓉葉陰乾為末每以井水調貼次日用蚰蜒螺一個搗塗之普濟方頭上癩瘡芙蓉根皮為末香油調敷先以松毛柳枝煎湯洗之傅滋醫學集成湯火灼瘡油調芙蓉末敷之奇效方灸瘡不愈芙蓉花研末敷之奇效方一切瘡腫木芙蓉葉菊花葉同煎水頻熏洗之多能鄙事山茶綱目釋名時珍曰其葉類茗又可作飲故得茶名集解時珍曰山茶產南方樹生高者丈許枝幹交加葉頗似茶葉而厚硬有稜中闊頭尖面綠背淡深冬開花紅瓣黃蕊格古論云花有數種寶珠者花簇如珠最勝海榴茶花蒂青石榴茶中有碎花躑躅茶花如杜鵑花宮粉茶串珠茶皆粉紅色又有一捻紅千葉紅千葉白等名不可勝數葉各小異或云亦有黃色者虞衡志云廣中有南山茶花大倍中州者色微淡葉薄有毛結實如梨大如拳中有數核如肥皂子大周定王救荒本草云山茶嫩葉炸熟水淘可食亦可蒸曬作飲花氣味缺主治吐血衄血腸風下血並用紅者為末入童溺薑汁及酒調服可代鬱金震亨湯火傷灼研末麻油調塗時珍子主治婦人發䐈研末摻之時珍摘玄方蠟梅綱目釋名黃梅花時珍曰此物本非梅類因其與梅同時香又相近色似蜜蠟故得此名集解時珍曰蠟梅小樹叢枝尖葉種凡三種以子種出不經接者臘月開小花而香淡名狗蠅梅經接而花疏開時含口者名磬口梅花密而香濃色深黃如紫檀者名檀香梅最佳結實如垂鈴尖長寸余子在其中其樹皮浸水磨墨有光采花氣味辛溫無毒主治解暑生津時珍伏牛花宋開寶校正併入圖經虎刺釋名隔虎刺花未詳集解頌曰伏牛花生蜀地所在皆有今惟益州蜀地有之多生川澤中葉青細似黃柏葉而不光莖赤有刺開花淡黃色作穗似杏花而小三月採陰乾又睦州所生虎刺云凌冬不凋彼人無時採根葉治風腫疾花氣味苦甘平無毒主治久風濕痹四肢拘攣骨肉疼痛作湯治風眩頭痛五痔下血開寶發明時珍曰伏牛花治風濕有名而用者頗少楊子建護命方有伏牛花散治男女一切頭風發作有時甚則大腑熱秘用伏牛花山茵陳桑寄生白牽牛川芎藭白殭蠶蠍梢各二錢荊芥穗四錢為末每服二錢水煎一沸連滓服根葉枝主治一切腫痛風疾細銼焙研每服一錢匕用溫酒調下頌密蒙花宋開寶校正慎微曰自草部移入木部釋名水錦花炮炙論時珍曰其花繁密蒙茸如簇錦故名集解頌曰密蒙花蜀中州郡皆有之樹高丈餘葉似冬青葉而厚背白有細毛又似橘葉花微紫色二月三月採花曝乾用宗奭曰利州甚多葉冬不凋亦不似冬青柔而不光潔不深綠其花細碎數十房成一朵冬生春開花修治斅曰凡使揀淨酒浸一宿漉出候乾拌蜜令潤蒸之從卯至酉曬乾再拌蒸如此三度曬乾用每一兩用酒八兩蜜半兩氣味甘平微寒無毒主治青盲膚翳赤澀多眵淚消目中赤脈小兒麩豆及疳氣攻眼開寶羞明怕日劉守真入肝經氣血分潤肝燥好古附方新一目中障翳密蒙花黃柏根各一兩為末水丸梧桐子大每臥時湯服十丸至十五丸聖濟錄木綿綱目釋名古貝綱目古終時珍曰木綿有二種似木者名古貝似草者名古終或作吉貝者乃古貝之訛也梵書謂之睒婆又曰迦羅婆劫集解時珍曰木綿有草木二種交廣木綿樹大如抱其枝似桐其葉大如胡桃葉入秋開花紅如山茶花黃蕊花片極厚為房甚繁逼側相比結實大如拳實中有白綿綿中有子今人謂之斑枝花訛為攀枝花李延壽南史所謂林邑諸國出古貝花中如鵝毳抽其緒紡為布張勃吳錄所謂交州永昌木綿樹高過屋有十餘年不換者實大如杯花中綿軟白可為縕絮及毛布者皆指似木之木綿也江南淮北所種木綿四月下種莖弱如蔓高者四五尺葉有三尖如楓葉入秋開花黃色如葵花而小亦有紅紫者結實大如桃中有白綿綿中有子大如梧子亦有紫綿者八月採梂謂之綿花李延壽南史所謂高昌國有草實如繭中絲為細纑名曰白疊取以為帛甚軟白沈懷遠南越志所謂桂州出古終藤結實如鵝毳核如珠珣治出其核紡如絲綿染為斑布者皆指似草之木綿也此種出南番宋末始入江南今則遍及江北與中州矣不蠶而綿不麻而布利被天下其益大哉又南越志言南詔諸蠻不養蠶惟收娑羅木子中白絮紉為絲織為幅名娑羅籠段祝穆方輿志言平緬出娑羅樹大者高三五丈結子有綿紉綿織為白氈兜羅錦此亦斑枝花之類各方稱呼不同耳白綿及布氣味甘溫無毒主治血崩金瘡燒灰用時珍子油用兩瓶合燒取瀝氣味辛熱微毒主治惡瘡疥癬燃燈損目時珍柞木宋嘉祐釋名鑿子木時珍曰此木堅韌可為鑿柄故俗名鑿子木方書皆作柞木蓋昧此義也柞乃橡櫟之名非此木也集解藏器曰柞木生南方細葉今之作梳者是也時珍曰此木處處山中有之高者丈餘葉小而有細齒光滑而韌其木及葉丫皆有針刺經冬不凋五月開碎白花不結子其木心理皆白色木皮氣味苦平無毒時珍曰酸澀主治黃疸病燒末水服方寸匕日三藏器治鼠瘻難產催生利竅時珍附方新二鼠瘻柞木皮五升水一斗煮汁二升服當有宿肉出而愈乃張子仁方也外臺秘要婦人難產催生柞木飲不拘橫生倒產胎死腹中用此屢效乃上蔡張不愚方也用大柞木枝一大握長一尺洗淨大甘草五寸並寸折以新汲水三升半同入新沙瓶內以紙三重緊封文武火煎至一升半待腰腹重痛欲坐草時溫飲一小盞便覺心下開豁如渴又飲一盞至三四盞覺下重便生更無諸苦切不可坐草太早及坐婆亂為也婦人良方葉主治腫毒癰疽時珍附方新一柞木飲治諸般癰腫發背用干柞木葉四兩乾荷葉中心蒂干萱草根甘草節地榆各一兩細銼每用半兩水二碗煎一碗早晚各一服已成者其膿血自漸乾涸未成者其毒自消散也忌一切飲食毒物許學士普濟本事方黃楊木綱目集解時珍曰黃楊生諸山野中人家多栽種之枝葉攢簇上聳葉似初生槐芽而青厚不花不實四時不凋其性難長俗說歲長一寸遇閏則退今試之但閏年不長耳其木堅膩作梳剜印最良按段成式酉陽雜俎云世重黃楊以其無火也用水試之沉則無火凡取此木必以陰晦夜無一星伐之則不裂葉氣味苦平無毒主治婦人難產入達生散中用又主暑月生癤搗爛塗之時珍不凋木拾遺集解藏器曰生太白山岩谷樹高二三尺葉似槐莖赤有毛如棠梨四時不凋氣味苦溫無毒主治調中補衰治腰腳去風氣卻老變白藏器賣子木唐本草釋名買子木集解恭曰賣子木出嶺南邛州山谷中其葉似柿頌曰今惟川西渠州歲貢作買子木木高五七尺徑寸許春生嫩枝條葉尖長一二寸俱青綠色枝梢淡紫色四五月開碎花百十枝圍攢作大朵焦紅色隨花便生子如椒目在花瓣中黑而光潔每株花裁三五大朵爾五月採其枝葉用時珍曰宋史渠州貢買子木並子則子亦當與枝葉同功而本草缺載無從考訪木修治斅曰凡採得粗搗每一兩用酥五錢同炒乾入藥氣味甘微咸平無毒主治折傷血內溜續絕補骨髓止痛安胎唐本木天蓼唐本草校正併入拾遺小天蓼釋名時珍曰其樹高而味辛如蓼故名又馬蓼亦名天蓼而物異集解恭曰木天蓼所在皆有生山谷中今安州申州作藤蔓葉似柘花白子如棗許無定形中瓤似茄子味辛啖之以當薑蓼藏器曰木蓼今時所用出山南鳳州樹高如冬青不凋不當以藤天蓼為注既云木蓼豈是藤生自有藤蓼耳藤蓼生江南淮南山中藤著樹生葉如梨光而薄子如棗即蘇恭以為木天蓼者又有小天蓼生天目山四明山樹如梔子冬月不凋野獸食之是有三天蓼俱能逐風而小者為勝頌曰木天蓼今出信陽木高二三丈三月四月開花似柘花五月採子子作球形似檾麻子可藏作果食蘇恭所說自是藤天蓼也時珍曰天蓼雖有三種而功用彷彿蓋一類也其子可為燭其芽可食故陸機云木蓼為燭明如胡麻薛田詠蜀詩有地丁葉嫩和嵐採天蓼芽新入粉煎之句枝葉氣味辛溫有小毒主治癥結積聚風勞虛冷細切釀酒飲唐本附方舊一新三天蓼酒治風立有奇效木天蓼一斤去皮細銼以生絹盛入好酒三斗浸之春夏一七秋冬二七日每空心日午下晚各溫一盞飲若常服只飲一次老幼臨時加減聖惠方氣痢不止寒食一百五日採木蓼曝乾用時為末粥飲服一錢聖惠方大風白癩天蓼刮去粗皮銼四兩水一斗煎汁一升煮糯米作粥空心食之病在上吐出在中汗出在下泄出避風又方天蓼三斤天麻一斤半生銼以水三斗五升煎一斗去滓石器慢煎如餳每服半匙荊芥薄荷酒下日二夜一一月見效聖惠方小天蓼氣味甘溫無毒主治一切風虛羸冷手足疼痹無論老幼輕重浸酒及煮汁服之十許日覺皮膚間風出如蟲行藏器發明藏器曰木天蓼出深山中人云久服損壽以其逐風損氣故也藤天蓼小天蓼三者俱能逐風其中優劣小者為勝子氣味苦辛微熱無毒主治賊風口面喎斜冷痃癖氣塊女子虛勞甄權根主治風蟲牙痛搗丸塞之連易四五次除根勿咽汁時珍出普濟放杖木拾遺釋名集解藏器曰生溫括睦婺諸州山中樹如木天蓼老人服之一月放杖故以為名氣味甘溫無毒主治一切風血理腰腳輕身變白不老浸酒服之藏器接骨木唐本草釋名續骨木綱目木蒴藋頌曰接骨以功而名花葉都類蒴藋陸英水芹輩故一名木蒴藋集解恭曰所在皆有之葉如陸英花亦相似但作樹高一二丈許木體輕虛無心斫枝插之便生人家亦種之氣味甘苦平無毒藏器曰搗汁亦吐人有小毒主治折傷續筋骨除風癢齲齒可作浴湯唐本根皮主痰飲下水腫及痰瘧煮汁服之當利下及吐出不可多服藏器打傷瘀血及產婦惡血一切血不行或不止並煮汁服時珍出千金附方舊一新一折傷筋骨接骨木半兩乳香半錢芍藥當歸芎藭自然銅各一兩為末化黃蠟四兩投藥攪勻眾手丸如芡子大若止傷損酒化一丸若碎折筋骨先用此敷貼乃服衛生易簡產後血暈五心煩熱氣力欲絕及寒熱不禁以接骨木破如筭子一握用水一升煎取半升分服或小便頻數惡血不止服之即瘥此木煮之三次其力一般乃起死妙方產書葉主治痰瘧大人七葉小兒三葉生搗汁服取吐藏器靈壽木拾遺釋名扶老杖孟康椐集解藏器曰生劍南山谷圓長皮紫漢書孔光年老賜靈壽杖顏師古注云木似竹有節長不過八九尺圍三四寸自然有合杖制不須削理作杖令人延年益壽時珍曰陸氏詩疏云椐即樻也節中腫似扶老即今靈壽也人以作杖及馬鞭弘農郡共北山有之根皮氣味苦平主治止水藏器楤木音蔥拾遺集解藏器曰生江南山谷高丈餘直上無枝莖上有刺山人折取頭茹食謂之吻頭時珍曰今山中亦有之樹頂叢生葉山人採食謂之鵲不踏以其多刺而無枝故也白皮氣味辛平有小毒主治水癊煮汁服一盞當下水如病已困取根搗碎坐之取氣水自下又能爛人牙齒有蟲者取片許內孔中當自爛落藏器木麻拾遺集解藏器曰生江南山谷林澤葉似胡麻相對山人取以釀酒飲氣味甘溫無毒主治老血婦人月閉風氣羸瘦癥瘕久服令人有子藏器大空唐本草集解恭曰大空生襄州所在山谷中亦有之秦隴人名獨空作小樹抽條高六七尺葉似楮小圓厚根皮赤色時珍曰小樹大葉似桐葉而不尖深綠而皺紋根皮虛軟山人採殺蝨極妙搗葉篩蔬圃中殺蟲根皮氣味辛苦平有小毒主治殺三蟲作末和油塗發蟣蝨皆死藏器
